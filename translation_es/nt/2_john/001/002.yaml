translation:
  language: es
  text: a causa de la verdad que permanece en nosotros y estará con nosotros para siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que permanece en nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - por causa de
  - debido a
  lexicon: BDAG
  rationale: Con acusativo, διά expresa causa o razón. «A causa de» reproduce esa relación causal en español con naturalidad y sin añadir una interpretación más fuerte que el griego.
- source_word: ἀλήθειαν
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - la verdad
  - la realidad verdadera
  lexicon: BDAG
  rationale: ἀλήθεια se traduce de manera directa como «verdad». En contexto joánico puede tener densidad teológica, pero el sustantivo no pide ampliación interpretativa.
- source_word: τὴν μένουσαν
  english_pob_choice: that remains
  chosen_spanish: que permanece
  alternatives_spanish:
  - que abides
  - que mora
  - que se queda
  lexicon: BDAG
  rationale: El participio presente de μένω comunica permanencia continua. «Permanece» conserva ese aspecto durativo de forma clara y natural en español; «abide» no es idiomático aquí.
- source_word: ἐν ἡμῖν
  english_pob_choice: in us
  chosen_spanish: en nosotros
  alternatives_spanish:
  - entre nosotros
  - dentro de nosotros
  lexicon: BDAG
  rationale: ἐν con dativo aquí se entiende mejor como presencia interior o residente «en nosotros». «Entre nosotros» podría sugerir solo presencia comunitaria y debilitar el matiz directo del texto.
- source_word: καὶ μεθ’ ἡμῶν ἔσται
  english_pob_choice: and will be with us
  chosen_spanish: y estará con nosotros
  alternatives_spanish:
  - y permanecerá con nosotros
  - y será con nosotros
  lexicon: BDAG
  rationale: μετά con genitivo significa «con», y ἔσται es futuro de εἰμί. «Estará con nosotros» es la equivalencia más natural y no sobretraduce con «permanecerá», ya que la durabilidad ya está expresada por la frase anterior.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - por el siglo
  lexicon: BDAG
  rationale: La expresión idiomática indica duración perpetua. «Para siempre» es la equivalencia clara y publicada en español moderno sin perder el valor temporal absoluto.
theological_decisions:
- issue: Alcance teológico de «la verdad»
  english_pob_reading: Retain the simple term 'truth' without specifying whether it refers to the gospel message, Christ himself, or the Spirit-shaped reality of God's revelation.
  chosen_spanish_reading: Conservar «la verdad» sin precisar si se refiere al mensaje del evangelio, a Cristo mismo o a la realidad revelada por Dios.
  alternative_spanish_readings:
  - la verdad del evangelio
  - la enseñanza verdadera
  - la fe verdadera
  rationale: El contexto joánico permite una profundidad teológica rica, pero el griego no restringe explícitamente el referente. Mantener la ambigüedad preserva la tensión observada en la fuente y evita resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El control de revisión indica que no hubo cambios posteriores relevantes; el veredicto de concordancia fue alto y se mantuvo el sentido básico del borrador inglés auditado.
  spanish_consistency_notes:
  - Se mantiene la traducción directa de ἀλήθεια como «verdad», sin expansión doctrinal.
  - «Permanece» conserva el aspecto durativo de μένω mejor que opciones más libres.
  - La preposición causal se vierte con «a causa de» para reflejar claramente διά + acusativo.
  - «Para siempre» traduce el idiomatismo εἰς τὸν αἰῶνα con español natural y reverente.
  - La nota al pie conserva la alternativa verbal «permanece en nosotros», equivalente más literal de μένειν.
