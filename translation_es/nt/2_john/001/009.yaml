  text: πᾶς ὁ ⸀προάγων καὶ μὴ μένων ἐν τῇ διδαχῇ τοῦ Χριστοῦ θεὸν οὐκ ἔχει· ὁ μένων ἐν τῇ ⸀διδαχῇ, οὗτος καὶ τὸν πατέρα καὶ τὸν υἱὸν ἔχει.
base_translation:
  language: en
  yaml_path: translation/nt/2_john/001/009.yaml
  text: Everyone who goes on ahead and does not remain in the teaching of Messiah does not have God[a]. The one who remains in the teaching[b], this one has both the Father and the Son.
  footnotes:
  - marker: a
    text: Or 'goes too far' or 'runs ahead'; some manuscripts read 'transgresses' instead of 'goes on ahead.'
    reason: textual_variant
  - marker: b
    text: The phrase 'the teaching of the Messiah' may mean either 'the Messiah's teaching' or 'teaching about the Messiah.'
    reason: alternative_reading
