revisions:
- from: Todo el que va más adelante y no permanece en la enseñanza del Mesías no tiene a Dios[a]. El que permanece en la enseñanza[b], ese tiene al Padre y al Hijo.
  to: Todo el que se adelanta[a] y no permanece en la enseñanza del Mesías no tiene a Dios. El que permanece en la enseñanza[b], ese tiene al Padre y al Hijo.
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad y la precisión contextual de προάγων: «se adelanta» comunica mejor la idea de ir por delante o más allá sin endurecerla hasta «transgrede». También se corrigió la nota b para que exprese una alternativa semántica real. Se eliminó el ancla [a] de «Dios» porque la nota a pertenece a προάγων, no a θεόν.'
