review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: mantiene el paralelismo entre «no permanece» y «permanece», conserva «Mesías» para Χριστοῦ conforme a la política del proyecto, y traduce sin expansión interpretativa «no tiene a Dios» y «tiene al Padre y al Hijo». También preserva correctamente las dos notas del rastro auditado inglés. Sin embargo, «va más adelante» no suena natural en español para προάγων y puede sugerir solo posición espacial o progreso positivo, mientras que el griego aquí, aunque metafórico, apunta a adelantarse más allá de los límites de la enseñanza. Una reparación menor mejora fidelidad y legibilidad sin sobreinterpretar.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «Todo el que va más adelante» resulta poco idiomático en español bíblico natural. «Todo el que se adelanta» conserva mejor la metáfora, lee con fluidez y encaja con la nota alternativa «va demasiado lejos». Además, la nota b debe evitar repetir la misma frase dos veces; conviene explicitar la alternativa subjetiva/objetiva del genitivo con una formulación realmente distinta.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: Χριστός -> «Mesías», θεός -> «Dios», διδαχή -> «enseñanza», μένω -> «permanece». No hay conflictos con Yahvé ni otros términos controlados. El único ajuste léxico recomendado es προάγων -> «se adelanta» en lugar de «va más adelante», por naturalidad y precisión contextual.'
  issues:
  - severity: medium
    issue: «va más adelante» para προάγων suena poco natural y semánticamente débil en español
    rationale: Aunque intenta conservar la metáfora de ‘ir adelante’, en español actual esa expresión puede sonar espacial o incluso positiva. «Se adelanta» preserva el movimiento por delante con mejor idiomaticidad y mantiene la cautela exegética del inglés auditado.
  - severity: low
    issue: La nota b repite la misma formulación y no expresa con claridad la ambigüedad del genitivo
    rationale: «La enseñanza del Mesías» / «la enseñanza del Mesías» no presenta una alternativa real. Debe distinguirse entre «la enseñanza del Mesías» y «la enseñanza acerca del Mesías» para reflejar la decisión auditada.
  revised_spanish_text: Todo el que se adelanta[a] y no permanece en la enseñanza del Mesías no tiene a Dios. El que permanece en la enseñanza[b], ese tiene al Padre y al Hijo.
  revised_footnotes:
  - marker: a
    text: O «va demasiado lejos» o «va más adelante»; algunos manuscritos leen «transgrede» en lugar de «se adelanta».
    reason: textual_variant
  - marker: b
    text: La expresión «la enseñanza del Mesías» puede significar tanto «la enseñanza del Mesías» como «la enseñanza acerca del Mesías».
    reason: alternative_reading
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad y la precisión contextual de προάγων: «se adelanta» comunica mejor la idea de ir por delante o más allá sin endurecerla hasta «transgrede». También se corrigió la nota b para que exprese una alternativa semántica real. Se eliminó el ancla [a] de «Dios» porque la nota a pertenece a προάγων, no a θεόν.'
