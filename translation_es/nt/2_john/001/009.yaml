translation:
  language: es
  text: Todo el que se adelanta[a] y no permanece en la enseñanza del Mesías no tiene a Dios. El que permanece en la enseñanza[b], ese tiene al Padre y al Hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «va demasiado lejos» o «va más adelante»; algunos manuscritos leen «transgrede» en lugar de «se adelanta».
    reason: textual_variant
  - marker: b
    text: La expresión «la enseñanza del Mesías» puede significar tanto «la enseñanza del Mesías» como «la enseñanza acerca del Mesías».
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς ὁ προάγων
  english_pob_choice: Everyone who goes on ahead
  chosen_spanish: Todo el que va más adelante
  alternatives_spanish:
  - Todo el que corre adelante
  - Cualquiera que se adelanta
  - Todo el que va demasiado lejos
  lexicon: BDAG
  rationale: 'La construcción con artículo y participio pide un sustantivo genérico: «todo el que». προάγων conserva la imagen de ir delante o ir más allá; «va más adelante» mantiene la metáfora sin introducir una paráfrasis más fuerte que el griego de esta forma textual.'
- source_word: μὴ μένων
  english_pob_choice: does not remain
  chosen_spanish: no permanece
  alternatives_spanish:
  - no permanece en
  - no continúa
  lexicon: BDAG
  rationale: μένω en Juan es verbo clave de permanencia/abidencia. «Permanece» es natural en español y conserva la continuidad relacional del texto mejor que «continúa» o una versión más arcaica.
- source_word: ἐν τῇ διδαχῇ
  english_pob_choice: in the teaching
  chosen_spanish: en la enseñanza
  alternatives_spanish:
  - en la doctrina
  - en la instrucción
  lexicon: BDAG
  rationale: διδαχή se vierte mejor como «enseñanza» en español moderno y bíblicamente legible. «Doctrina» es posible, pero suena más eclesiástico y puede endurecer innecesariamente el sentido.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  - acerca del Mesías
  - la enseñanza del Mesías
  lexicon: 'DOCTRINE.md Contested terms: Χριστός'
  rationale: Siguiendo el criterio del proyecto, Χριστός como título se traduce «Mesías». El genitivo queda compacto como «del Mesías» para no resolver en la traducción principal si es enseñanza procedente del Mesías o enseñanza acerca del Mesías.
- source_word: θεὸν οὐκ ἔχει
  english_pob_choice: does not have God
  chosen_spanish: no tiene a Dios
  alternatives_spanish:
  - no posee a Dios
  - no tiene comunión con Dios
  lexicon: BDAG
  rationale: «Tiene a Dios» refleja con fuerza la formulación joánica breve y directa. La preposición personal «a» se conserva en español por tratarse de una referencia personal a Dios.
- source_word: ὁ μένων ἐν τῇ διδαχῇ
  english_pob_choice: The one who remains in the teaching
  chosen_spanish: El que permanece en la enseñanza
  alternatives_spanish:
  - Quien permanece en la enseñanza
  - El que abida en la enseñanza
  lexicon: BDAG
  rationale: El participio articular se traduce sustantivamente como «El que». Se mantiene el paralelismo con la primera cláusula y la misma elección léxica para διδαχή.
- source_word: οὗτος
  english_pob_choice: this one
  chosen_spanish: ese
  alternatives_spanish:
  - este
  - esa persona
  - él
  lexicon: BDAG
  rationale: οὗτος es enfático. En español, «ese» conserva la señalación enfática y evita la repetición pesada de un simple pronombre personal, manteniendo el tono sentencioso del versículo.
- source_word: καὶ τὸν πατέρα καὶ τὸν υἱὸν ἔχει
  english_pob_choice: has both the Father and the Son
  chosen_spanish: tiene al Padre y al Hijo
  alternatives_spanish:
  - tiene tanto al Padre como al Hijo
  - tiene al Padre y también al Hijo
  lexicon: BDAG
  rationale: 'La coordinación καὶ...καὶ se puede expresar naturalmente con «y...y» en español sin necesidad de añadir «ambos» si eso endurece el ritmo. Se conservan los títulos relacionales definidos: «el Padre» y «el Hijo».'
theological_decisions:
- issue: Sentido de προάγων en esta forma textual
  english_pob_reading: Rendered as 'goes on ahead' rather than an explicitly condemnatory paraphrase such as 'goes too far' or the variant-based 'transgresses.'
  chosen_spanish_reading: «Va más adelante» mantiene la imagen de adelantarse sin introducir una condena interpretativa más fuerte que la forma griega presente.
  alternative_spanish_readings:
  - va demasiado lejos
  - se adelanta
  - transgrede
  rationale: El texto griego leído aquí es προάγων, no παραβαίνων. Por eso la traducción principal conserva la metáfora de ir delante o más allá, dejando la severidad del contexto en el conjunto del versículo y no en una paráfrasis añadida.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Sentido de «la enseñanza del Mesías»
  english_pob_reading: Kept the genitive compact as 'the teaching of the Messiah' rather than resolving it to either 'the Messiah's teaching' or 'teaching about the Messiah.'
  chosen_spanish_reading: '«La enseñanza del Mesías» conserva la misma ambigüedad controlada: puede ser enseñanza que procede del Mesías o enseñanza acerca del Mesías.'
  alternative_spanish_readings:
  - la enseñanza del Mesías mismo
  - la enseñanza acerca del Mesías
  rationale: El genitivo griego admite ambas relaciones. La traducción española preserva esa tensión sin decidirla de forma prematura, de acuerdo con el tratamiento auditado en inglés.
  doctrine_reference: Translation philosophy §3
- issue: Título cristológico Χριστοῦ
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El criterio del proyecto para Χριστός como título es «Mesías». Aunque en español eclesial «Cristo» es común, aquí «Mesías» preserva mejor la decisión léxica auditada y evita una sustitución de registro no motivada por el griego.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός'
translation_notes:
  revision_awareness: El borrador sigue la lectura griega SBLGNT con προάγων y mantiene la decisión restaurada del proyecto para Χριστός como «Mesías». Se tuvo en cuenta el ciclo de revisión en inglés donde «Christ» fue propuesto y luego corregido de nuevo a «Messiah», por lo que la traducción española evita «Cristo» en el texto principal y preserva la ambigüedad del genitivo en forma compacta.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός, conforme al criterio terminológico del proyecto.
  - Se conserva «enseñanza» para διδαχή en ambos miembros del versículo.
  - La fórmula «no tiene a Dios» sigue de cerca el griego y la elección inglesa auditada.
  - La segunda cláusula usa «El que» para reflejar el participio articular y conservar el paralelismo.
  - La nota [b] marca la ambigüedad genitiva solo donde el español también la permite.
