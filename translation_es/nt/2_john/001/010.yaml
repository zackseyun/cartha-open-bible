  text: εἴ τις ἔρχεται πρὸς ὑμᾶς καὶ ταύτην τὴν διδαχὴν οὐ φέρει, μὴ λαμβάνετε αὐτὸν εἰς οἰκίαν καὶ χαίρειν αὐτῷ μὴ λέγετε·
base_translation:
  language: en
  yaml_path: translation/nt/2_john/001/010.yaml
  text: If anyone comes to you and does not bring this teaching[a], do not receive him into your house[b], and do not greet him.
  footnotes:
  - marker: a
    text: Or more idiomatically, 'do not greet him.' The Greek literally says, 'do not say a greeting to him.'
    reason: lexical_alternative
  - marker: b
    text: In context, the warning concerns one who comes without 'this teaching,' likely an itinerant teacher whose message departs from the apostolic confession described in the surrounding verses.
    reason: cross_reference
