  source_alignment_summary: El borrador conserva bien la estructura condicional, «esta enseñanza», y la doble prohibición de recibir y saludar. Sin embargo, en la segunda prohibición se desvía del griego y de la auditoría inglesa al especificar «¡Bienvenido!», que estrecha indebidamente χαίρειν αὐτῷ μὴ λέγετε a una fórmula particular de bienvenida en vez de la prohibición general de saludarlo. También conviene hacer explícito el posesivo implícito en οἰκία para reflejar mejor «into your house».
  spanish_quality_summary: 'El español es claro y natural, pero «no le digan: «¡Bienvenido!»» suena más interpretativo que fiel al original. «No lo saluden» es más natural, más amplio y coincide con la revisión inglesa final. «En su casa» o «en la casa de ustedes» refleja mejor el sentido posesivo que «en casa», que puede sonar algo más difuso en este contexto.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Enseñanza» para διδαχή está bien. El ajuste principal es lexical: χαίρειν αὐτῷ μὴ λέγετε debe ir como «no lo saluden», dejando la literalidad en nota; y εἰς οἰκίαν se representa mejor como «en su casa».'
  issues:
