translation:
  language: es
  text: Si alguien viene a ustedes y no trae esta enseñanza, no lo reciban en su casa[a], y no lo saluden[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En el contexto, la advertencia se dirige a quien llega sin «esta enseñanza», probablemente un maestro itinerante cuyo mensaje se desvía de la confesión apostólica descrita en los versículos cercanos.
    reason: cross_reference
  - marker: b
    text: O, más literalmente, «no le digan un saludo».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ τις
  english_pob_choice: If anyone
  chosen_spanish: Si alguien
  alternatives_spanish:
  - Si cualquiera
  - Si alguna persona
  lexicon: BDAG
  rationale: La construcción indefinida condicional introduce un caso general. «Si alguien» suena natural en español y conserva el valor abierto de la expresión griega sin volverla más específica de lo que permite el texto.
- source_word: ἔρχεται πρὸς ὑμᾶς
  english_pob_choice: comes to you
  chosen_spanish: viene a ustedes
  alternatives_spanish:
  - viene hacia ustedes
  - se acerca a ustedes
  lexicon: BDAG
  rationale: «Viene a ustedes» expresa con claridad el movimiento hacia los destinatarios. Se mantiene el plural de ὑμᾶς y un verbo sencillo, sin añadir matices eclesiales que no están en la frase misma.
- source_word: ταύτην τὴν διδαχήν
  english_pob_choice: this teaching
  chosen_spanish: esta enseñanza
  alternatives_spanish:
  - esta doctrina
  - esta instrucción
  lexicon: BDAG
  rationale: διδαχή puede ser enseñanza, doctrina o instrucción. «Enseñanza» comunica bien el contenido transmitido y evita el peso técnico de «doctrina», aunque esta sigue siendo una alternativa posible según el contexto.
- source_word: οὐ φέρει
  english_pob_choice: does not bring
  chosen_spanish: no trae
  alternatives_spanish:
  - no lleva
  - no presenta
  lexicon: BDAG
  rationale: Aquí φέρω funciona con el sentido de traer o aportar una enseñanza. «No trae» es directo, idiomático en español y cercano al valor verbal del griego.
- source_word: μὴ λαμβάνετε αὐτὸν
  english_pob_choice: do not receive him
  chosen_spanish: no lo reciban
  alternatives_spanish:
  - no lo acojan
  - no lo reciban como huésped
  lexicon: BDAG
  rationale: λαμβάνω puede significar recibir, acoger o aceptar. «No lo reciban» preserva el enlace con la hospitalidad sin decidir de antemano si el énfasis cae sobre aceptación social o alojamiento material.
- source_word: εἰς οἰκίαν
  english_pob_choice: into your house
  chosen_spanish: en casa
  alternatives_spanish:
  - en su casa
  - en su hogar
  lexicon: BDAG
  rationale: οἰκία es casa/hogar. «En casa» mantiene la referencia concreta a la hospitalidad con un español natural; el posesivo implícito puede entenderse por el contexto de destinatarios, sin forzarlo en la frase principal.
- source_word: χαίρειν αὐτῷ μὴ λέγετε
  english_pob_choice: do not greet him
  chosen_spanish: 'y no le digan: «¡Bienvenido!»'
  alternatives_spanish:
  - y no lo saluden
  - y no le digan un saludo
  lexicon: BDAG
  rationale: 'El griego dice literalmente «no le digan saludo». En español, «no le digan: ¡Bienvenido!» comunica de manera natural el acto de pronunciar un saludo y conserva la restricción de la frase, sin perder la tensión entre literalidad e idiomatismo que ya reflejó la auditoría inglesa.'
theological_decisions:
- issue: Alcance de la prohibición respecto del falso maestro
  english_pob_reading: The verse forbids receiving and greeting a person who comes without this teaching, in the context of endorsing or extending hospitality to a teacher, without expanding the wording into a universal ban on all contact.
  chosen_spanish_reading: El versículo prohíbe recibir y saludar a la persona que viene sin esta enseñanza, en el marco de la hospitalidad dada a un maestro, sin ampliar la frase a una prohibición universal de todo contacto.
  alternative_spanish_readings:
  - Una prohibición total de toda interacción social
  - Una restricción solo para recibirlo como maestro en la reunión de la iglesia
  rationale: La referencia inmediata es a una persona que llega sin la enseñanza apostólica, y el texto usa lenguaje concreto de casa y saludo. La traducción conserva esa concreción sin resolver interpretativamente más de lo que el griego permite.
  doctrine_reference: Principio de mantener la tensión teológica del texto sin sobreexplicarla.
- issue: Tratamiento del pronombre masculino singular αὐτόν
  english_pob_reading: him
  chosen_spanish_reading: lo / le
  alternative_spanish_readings:
  - la forma neutra "a esa persona"
  - '"les"'
  rationale: El griego usa un pronombre masculino singular; en español, el objeto directo se expresa naturalmente con «lo». En la frase de saludo, «le digan» conserva la fluidez del dativo sin neutralizar innecesariamente el referente singular masculino del texto.
  doctrine_reference: Política de precisión de género y número del texto fuente.
translation_notes:
  revision_awareness: 'La auditoría inglesa revisó la traducción de un saludo más literal («say a greeting to him») a la forma más natural «do not greet him». En español, se buscó una solución que mantenga esa naturalidad sin perder la literalidad subyacente del griego: la frase principal usa «no le digan: «¡Bienvenido!»», con nota alternativa que permite leerla como «no lo saluden».'
  spanish_consistency_notes:
  - Se mantuvo «enseñanza» para διδαχή, coherente con una opción clara y no excesivamente técnica.
  - Se preservó la concreción de οἰκία como «casa», evitando sustituirla por un término más abstracto.
  - No se añadió un equivalente de «su» antes de «casa» en la línea principal para no sobreespecificar lo implícito; la referencia a los destinatarios queda sugerida por el contexto.
  - Se evitó reemplazar el mandato de saludo por una formulación eclesiástica más interpretativa; la nota ofrece la alternativa idiomática permitida por el griego.
