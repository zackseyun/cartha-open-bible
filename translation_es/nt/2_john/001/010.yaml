    rationale: El griego prohíbe dirigirle un saludo, no específicamente decir «bienvenido». «Bienvenido» reduce el alcance semántico del saludo y añade un matiz de recepción que ya está cubierto por la cláusula anterior.
  - severity: medium
    issue: La nota al pie a/b está invertida respecto de los anclajes semánticos esperables.
    rationale: La nota lexical sobre el saludo debe anclarse a la expresión de saludo, no a «casa»; y la nota contextual sobre el hospedaje/maestro itinerante debe anclarse a «casa» o a la recepción en casa, en continuidad con la auditoría inglesa.
  - severity: low
    issue: «En casa» atenúa el posesivo implícito de εἰς οἰκίαν.
    rationale: Aunque idiomático, «en su casa» refleja mejor «into your house» y la concreción de la hospitalidad personal del texto.
  revised_spanish_text: Si alguien viene a ustedes y no trae esta enseñanza, no lo reciban en su casa[a], y no lo saluden[b].
