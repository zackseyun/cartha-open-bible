  to: Si alguien viene a ustedes y no trae esta enseñanza, no lo reciban en su casa[a], y no lo saluden[b].
  rationale: Se reemplaza «¡Bienvenido!» por «no lo saluden» para reflejar fielmente la prohibición general del griego y alinearse con la revisión inglesa final. Se explicita «su casa» para representar mejor εἰς οἰκίαν. También se reordenan las notas para que el anclaje contextual quede en «casa» y la alternativa lexical en «saluden».
