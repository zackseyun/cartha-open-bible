  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue de cerca la auditoría inglesa: mantiene la ambigüedad de κυρία como «señora», conserva «mandamiento nuevo», «desde el principio» y «que nos amemos unos a otros». Sin embargo, «te ruego» intensifica algo ἐρωτῶ frente al más neutral «te pido», y sobre todo «no como escribiéndote» suena poco natural en español y no representa tan claramente la comparación hipotética de οὐχ ὡς ... γράφων como «no como si te estuviera escribiendo».'
  spanish_quality_summary: 'El texto es mayormente claro y eclesialmente legible, pero tiene dos detalles de calidad: 1) «no como escribiéndote» resulta forzado y poco idiomático; 2) «el que hemos tenido» es comprensible, pero «el que hemos tenido» depende de un antecedente masculino implícito y funciona mejor si el resto de la cláusula se alisa. Una leve revisión mejora naturalidad sin alejarse del original.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Señora» para κυρία preserva la ambigüedad requerida; «mandamiento» y «amemos» son adecuados. La nota alternativa también sigue bien la auditoría inglesa, aunque conviene hispanizar el nombre propio potencial como «Kyria» solo en nota, no en texto principal.
  issues:
  - severity: medium
    issue: «te ruego» sobretraduce ligeramente ἐρωτῶ
    rationale: La decisión inglesa documentada es «I ask», no «I urge». En español, «te ruego» puede sonar más intenso o suplicante que el tono epistolar básico. «Te pido» preserva mejor la cortesía sin aumentar la fuerza semántica.
  - severity: high
    issue: «no como escribiéndote un mandamiento nuevo» es poco natural y gramaticalmente torpe
    rationale: Aunque intenta reflejar γράφων, en español esa construcción participial después de «no como» suena forzada y oscurece la relación comparativa/hipotética de οὐχ ὡς ... ἀλλά. «No como si te estuviera escribiendo un mandamiento nuevo» comunica el sentido con claridad y fidelidad.
  revised_spanish_text: 'Y ahora te pido[a], señora, no como si te estuviera escribiendo un mandamiento nuevo, sino el que hemos tenido desde el principio: que nos amemos unos a otros.'
  revised_footnotes:
