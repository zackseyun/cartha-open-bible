translation:
  language: es
  text: 'Y ahora te pido[a], señora, no como si te estuviera escribiendo un mandamiento nuevo, sino el que hemos tenido desde el principio: que nos amemos unos a otros.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, posiblemente, «a la iglesia», si «señora» se entiende figuradamente; alternativamente, algunos toman Kyria como nombre propio.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐρωτῶ
  english_pob_choice: I ask
  chosen_spanish: te ruego
  alternatives_spanish:
  - te pido
  - te pregunto
  lexicon: BDAG
  rationale: ἐρωτάω puede significar pedir o rogar en un contexto epistolar. En español, "te ruego" conserva el tono personal y cortés de la carta sin volver la frase mecánica ni demasiado débil con "pregunto".
- source_word: κυρία
  english_pob_choice: lady
  chosen_spanish: señora
  alternatives_spanish:
  - dama
  - señorita
  - Kyria
  lexicon: BDAG
  rationale: κυρία es el vocativo de "lady/mistress". "Señora" es la opción más natural y digna en español, y preserva la ambigüedad entre una destinataria literal y una referencia figurada sin resolverla en el texto principal.
- source_word: ἐντολὴν καινὴν
  english_pob_choice: a new commandment
  chosen_spanish: un mandamiento nuevo
  alternatives_spanish:
  - un nuevo mandamiento
  - un precepto nuevo
  lexicon: BDAG
  rationale: '"Mandamiento" reproduce bien ἐντολή en un registro bíblico claro. "Nuevo" mantiene el eco joánico de la expresión conocida, sin añadir matices no presentes en el griego.'
- source_word: γράφων σοι
  english_pob_choice: I were writing to you
  chosen_spanish: escribiéndote
  alternatives_spanish:
  - cuando te escribo
  - mientras te escribo
  lexicon: BDAG
  rationale: 'El participio con οὐχ ὡς se suaviza naturalmente en español como "escribiéndote". Esto conserva la comparación implícita: no se trata de una carta que introduzca algo novedoso.'
- source_word: ἣν εἴχομεν
  english_pob_choice: the one we have had
  chosen_spanish: el que hemos tenido
  alternatives_spanish:
  - la que teníamos
  - el mandamiento que hemos tenido
  lexicon: BDAG
  rationale: El imperfecto griego expresa posesión continua desde el pasado; en español, el perfecto compuesto "hemos tenido" comunica bien esa continuidad. Se usa "el que" porque el antecedente inmediato es "mandamiento".
- source_word: ἀπ’ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: BDAG
  rationale: '"Desde el principio" es la forma establecida y más reconocible para esta fórmula joánica. Mantiene la continuidad literaria y teológica del corpus.'
- source_word: ἵνα ἀγαπῶμεν ἀλλήλους
  english_pob_choice: that we love one another
  chosen_spanish: que nos amemos unos a otros
  alternatives_spanish:
  - para que nos amemos unos a otros
  - que nos amemos mutuamente
  lexicon: BDAG
  rationale: ἵνα con subjuntivo puede expresar contenido o propósito. "Que nos amemos unos a otros" es idiomático y fiel; "unos a otros" preserva la reciprocidad de ἀλλήλους.
theological_decisions:
- issue: Referente de κυρία
  english_pob_reading: Translate literally as 'lady' without identifying the addressee as either a specific woman or a church.
  chosen_spanish_reading: Traducir literalmente como "señora" sin decidir en el texto principal si se trata de una mujer concreta, una comunidad personificada o un nombre propio.
  alternative_spanish_readings:
  - Interpretar "señora" como una comunidad eclesial figurada
  - Tratarlo como el nombre propio Kyria
  rationale: El griego permite más de una identificación del destinatario. La traducción española debe preservar esa tensión interpretativa en lugar de resolverla en la línea principal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Valor de οὐχ ὡς ... γράφων
  english_pob_reading: not as though I were writing to you a new commandment
  chosen_spanish_reading: no como escribiéndote un mandamiento nuevo
  alternative_spanish_readings:
  - no como si te escribiera un mandamiento nuevo
  - no porque te escriba un mandamiento nuevo
  rationale: La construcción niega que la carta introduzca una novedad normativa. La forma elegida mantiene la relación entre la negación y el participio sin cargar el sentido con una explicación interpretativa excesiva.
  doctrine_reference: Translation philosophy §2 (Stay close to the source syntax when it bears meaning)
- issue: ἵνα ἀγαπῶμεν ἀλλήλους como contenido o propósito
  english_pob_reading: that we love one another
  chosen_spanish_reading: que nos amemos unos a otros
  alternative_spanish_readings:
  - para que nos amemos unos a otros
  - a fin de que nos amemos unos a otros
  rationale: El subjuntivo con ἵνα puede leerse como contenido del mandamiento o como finalidad. La formulación elegida mantiene ambas posibilidades sin forzar una sola lectura.
  doctrine_reference: Grammar-sensitive rendering of purpose/content clauses
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés, sin cambios respecto del consenso alto indicado en la revisión más reciente. Se preserva la ambigüedad de κυρία, y se mantiene una solución española natural para la construcción οὐχ ὡς ... γράφων σοι.
  spanish_consistency_notes:
  - Se usa "Yahvé" para el nombre divino cuando corresponda, pero este versículo no contiene un referente explícito al tetragrámaton.
  - '"Mandamiento" se mantiene como equivalente de ἐντολή para conservar el registro bíblico y el eco joánico.'
  - '"Amarnos unos a otros" conserva la reciprocidad de ἀλλήλους con un español natural y publicable.'
