revisions:
- from: 'Y ahora te ruego[a], señora, no como escribiéndote un mandamiento nuevo, sino el que hemos tenido desde el principio: que nos amemos unos a otros.'
  to: 'Y ahora te pido[a], señora, no como si te estuviera escribiendo un mandamiento nuevo, sino el que hemos tenido desde el principio: que nos amemos unos a otros.'
  rationale: 'La revisión hace dos ajustes menores pero importantes: «te pido» se alinea mejor con ἐρωτῶ y con la decisión léxica inglesa; «no como si te estuviera escribiendo» convierte una frase española forzada en una formulación natural que preserva mejor la construcción οὐχ ὡς ... γράφων. El resto del versículo puede mantenerse como fiel, claro y consistente con el proyecto.'
