translation:
  language: es
  text: Aunque tengo muchas cosas que escribirles[a], no quise hacerlo con papel y tinta. Más bien, espero ir a ustedes y hablar cara a cara, para que su alegría sea completa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «nuestra alegría» en lugar de «su alegría».
    reason: textual_variant
lexical_decisions:
- source_word: Πολλὰ ἔχων
  english_pob_choice: Though I have many things
  chosen_spanish: Aunque tengo muchas cosas
  alternatives_spanish:
  - Teniendo muchas cosas
  - Aunque tengo mucho que
  lexicon: BDAG
  rationale: El participio con valor concesivo se expresa naturalmente en español con «Aunque». «Muchas cosas» conserva mejor el plural neutro Πολλά que una paráfrasis más idiomática como «mucho que».
- source_word: ὑμῖν γράφειν
  english_pob_choice: to write to you
  chosen_spanish: escribirles
  alternatives_spanish:
  - escribir a ustedes
  - dirigirles por escrito
  lexicon: BDAG
  rationale: El dativo de destinatario se mantiene con un verbo de comunicación directo. «Les» es natural en español general y conserva el destinatario plural.
- source_word: οὐκ ἐβουλήθην
  english_pob_choice: I did not want
  chosen_spanish: no quise
  alternatives_spanish:
  - no deseé
  - no estuve dispuesto
  lexicon: BDAG
  rationale: βούλομαι expresa voluntad o deseo. «No quise» comunica esa voluntad de forma clara y sobria, sin endurecer el tono.
- source_word: διὰ χάρτου καὶ μέλανος
  english_pob_choice: with paper and ink
  chosen_spanish: con papel e tinta
  alternatives_spanish:
  - por papel y tinta
  - mediante papel e tinta
  lexicon: BDAG
  rationale: διά con genitivo indica medio o instrumento. «Con papel e tinta» resulta natural en español y preserva el sentido instrumental. Se usa «e» por la coordinación fonética antes de «tinta».
- source_word: ἀλλὰ ἐλπίζω γενέσθαι πρὸς ὑμᾶς
  english_pob_choice: Instead, I hope to come to you
  chosen_spanish: pero espero ir a ustedes
  alternatives_spanish:
  - pero espero venir a ustedes
  - pero espero llegar a ustedes
  lexicon: BDAG
  rationale: La construcción griega expresa el ir/presentarse en presencia de los destinatarios. «Ir a ustedes» preserva la dirección hacia ellos y suena natural en español.
- source_word: στόμα πρὸς στόμα
  english_pob_choice: face to face
  chosen_spanish: cara a cara
  alternatives_spanish:
  - boca a boca
  lexicon: BDAG
  rationale: Es un modismo de conversación directa. «Cara a cara» comunica el sentido idiomático en español actual sin introducir una imagen engañosa.
- source_word: λαλῆσαι
  english_pob_choice: speak
  chosen_spanish: hablar
  alternatives_spanish:
  - conversar
  - decir
  lexicon: BDAG
  rationale: λαλέω aquí se refiere a comunicación verbal personal. «Hablar» es el equivalente más directo y natural en español.
- source_word: ἵνα ἡ χαρὰ ὑμῶν πεπληρωμένη ᾖ
  english_pob_choice: so that your joy may be made complete
  chosen_spanish: para que su alegría sea completa
  alternatives_spanish:
  - para que su gozo sea completo
  - para que su alegría quede plena
  lexicon: BDAG
  rationale: La cláusula final expresa propósito y estado resultante. «Sea completa» refleja bien la idea de plenitud/completud de πεπληρωμένη ᾖ. Se usa «alegría» como equivalente natural de χαρά en español pastoral contemporáneo.
theological_decisions:
- issue: Variante pronominal sobre de quién es la alegría
  english_pob_reading: your joy
  chosen_spanish_reading: su alegría
  alternative_spanish_readings:
  - nuestra alegría
  rationale: El texto base SBLGNT lee ὑμῶν («de ustedes / su»), por lo que la traducción principal sigue esa lectura. Se preserva la variante interpretativa «nuestra alegría» como posible lectura textual sin resolverla silenciosamente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió el anclaje de nota al pie para que el marcador [a] aparezca exactamente en el texto español, evitando una nota sin marca visible. La redacción principal mantiene el sentido del SBLGNT y el audit trail en inglés, con ajuste natural de medio instrumental («con papel e tinta»).
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó «Cristo/Mesías» porque no aparecen en el texto.
  - Se usó «alegría» para χαρά por claridad natural en español, sin perder el sentido de gozo/plenitud.
  - Se preservó el contraste entre la comunicación escrita y la comunicación directa con «cara a cara».
