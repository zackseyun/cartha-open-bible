review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: la exhortación a vigilancia, la cláusula de prevención de pérdida, la lectura base de primera persona plural en εἰργασάμεθα y la meta de recibir un μισθός πλήρης. También preserva correctamente la variante textual en nota. Sin embargo, «lo que hemos trabajado» no expresa bien el matiz de εἰργασάμεθα en esta construcción; en español natural pide «por lo que hemos trabajado» o equivalente. Además, «premio» es menos fiel que «recompensa» para μισθός en este contexto.'
  spanish_quality_summary: El texto es legible, pero «Vigílense a sí mismos» suena algo redundante en español. «Cuídense ustedes mismos» o «Velen por ustedes mismos» serían más idiomáticos, aunque el borrador sigue siendo comprensible. La mejora principal necesaria es hacer natural la frase sobre el trabajo realizado y sustituir «premio completo», que suena competitivo/deportivo, por «recompensa completa», más adecuada y eclesialmente clara.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión principal es léxica/contextual: μισθός conviene verterlo como «recompensa» más que «premio». La variante textual está bien manejada en nota, pero debe ajustarse en español para reflejar también la construcción «trabajar por».'
  issues:
  - severity: medium
    issue: «lo que hemos trabajado» es poco natural y no refleja bien la idea de labor orientada a un resultado
    rationale: El inglés auditado eligió «worked for», y el contexto con μισθός sugiere esfuerzo en vista de un fruto. En español, «hemos trabajado» sin complemento queda incompleto o ambiguo; «por lo que hemos trabajado» comunica mejor el sentido.
  - severity: medium
    issue: «premio completo» no es la mejor equivalencia para μισθὸν πλήρη
    rationale: «Premio» puede sugerir certamen o concurso. En un contexto exhortativo espiritual, «recompensa completa» preserva mejor el valor semántico de μισθός y suena más natural en español bíblico moderno.
  - severity: low
    issue: «Vigílense a sí mismos» resulta redundante
    rationale: Aunque es fiel, la combinación del imperativo pronominal con «a sí mismos» carga innecesariamente la frase. Una forma como «Cuídense ustedes mismos» suena más natural sin perder el reflexivo explícito.
  revised_spanish_text: Cuídense ustedes mismos[a], para que no pierdan aquello por lo que hemos trabajado, sino que reciban una recompensa completa.
