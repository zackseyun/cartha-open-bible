translation:
  language: es
  text: Cuídense ustedes mismos[a], para que no pierdan aquello por lo que hemos trabajado, sino que reciban una recompensa completa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «aquello por lo que ustedes han trabajado» en lugar de «aquello por lo que hemos trabajado».
    reason: textual_variant
lexical_decisions:
- source_word: βλέπετε
  english_pob_choice: Watch
  chosen_spanish: Vigílense
  alternatives_spanish:
  - Estén atentos
  - Velen por ustedes mismos
  - Miren por ustedes mismos
  lexicon: BDAG
  rationale: El imperativo presente plural pide vigilancia continua. En español, «vigílense» conserva el tono de advertencia y el valor exhortativo sin sonar tan literal ni tan débil como otras opciones.
- source_word: ἑαυτούς
  english_pob_choice: yourselves
  chosen_spanish: a sí mismos
  alternatives_spanish:
  - ustedes mismos
  - a ustedes mismos
  lexicon: BDAG
  rationale: El reflexivo plural se expresa de manera natural con «a sí mismos» unido al imperativo reflexivo «vigílense». Mantiene el enfoque directo en los lectores.
- source_word: ἵνα μὴ ἀπολέσητε
  english_pob_choice: so that you may not lose
  chosen_spanish: para que no pierdan
  alternatives_spanish:
  - para que no lleguen a perder
  - a fin de que no pierdan
  - no sea que pierdan
  lexicon: BDAG
  rationale: La cláusula final expresa prevención de una pérdida. «Para que no pierdan» es natural en español y conserva el valor de propósito/resultdo evitado sin añadir fuerza interpretativa.
- source_word: ἃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - aquello que
  lexicon: BDAG
  rationale: El relativo neutro plural se vierte con «lo que», que es idiomático en español y mantiene la referencia abierta al fruto del trabajo anterior.
- source_word: εἰργασάμεθα
  english_pob_choice: we have worked for
  chosen_spanish: hemos trabajado
  alternatives_spanish:
  - hemos trabajado por
  - han trabajado
  - ustedes han trabajado
  lexicon: BDAG
  rationale: El texto griego base es primera persona plural; por eso se conserva «hemos trabajado». Se evita forzar el sentido con una segunda persona que correspondería a una variante textual distinta.
- source_word: μισθὸν
  english_pob_choice: reward
  chosen_spanish: premio
  alternatives_spanish:
  - recompensa
  - galardón
  - salario
  lexicon: BDAG
  rationale: En este contexto exhortativo y espiritual, «premio» comunica bien la idea de retribución sin el peso laboral de «salario». «Galardón» sería más tradicional, pero menos neutral; «recompensa» también sería viable.
- source_word: πλήρη
  english_pob_choice: full
  chosen_spanish: completo
  alternatives_spanish:
  - pleno
  - lleno
  - entero
  lexicon: BDAG
  rationale: «Completo» expresa la plenitud del premio en español contemporáneo de manera clara y sobria, conservando la idea de totalidad.
- source_word: ἀπολάβητε
  english_pob_choice: may receive
  chosen_spanish: reciban
  alternatives_spanish:
  - obtengan
  - reciban de nuevo
  lexicon: BDAG
  rationale: El verbo indica recibir/obtener. «Reciban» es natural en español y permite mantener la paridad con el subjuntivo de propósito sin sobrecargar el verso con una glosa innecesaria.
theological_decisions:
- issue: Sujetos y variante textual en εἰργασάμεθα
  english_pob_reading: we have worked for
  chosen_spanish_reading: hemos trabajado
  alternative_spanish_readings:
  - ustedes han trabajado
  rationale: Se conserva la lectura base primera persona plural del texto griego proporcionado, que sugiere el trabajo apostólico realizado entre los destinatarios. Se mantiene la tensión con la variante conocida que cambia el sujeto a segunda persona, registrándola en nota.
  doctrine_reference: Primacía del texto fuente y preservación de variantes significativas
- issue: Sentido de μισθός en un contexto cristiano de exhortación
  english_pob_reading: reward
  chosen_spanish_reading: premio
  alternative_spanish_readings:
  - recompensa
  - galardón
  rationale: El contexto no describe salario literal, sino la retribución/resultado esperado al perseverar. «Premio» conserva el valor de recompensa sin introducir una lectura técnica ajena al pasaje.
  doctrine_reference: Semántica contextual y recompensa escatológica
- issue: Fuerza de ἵνα μὴ con aoristo subjuntivo
  english_pob_reading: so that you may not lose
  chosen_spanish_reading: para que no pierdan
  alternative_spanish_readings:
  - no sea que pierdan
  - para que no lleguen a perder
  rationale: La construcción expresa un resultado evitado. «Para que no pierdan» refleja esa finalidad sin imponer una interpretación más dura o más débil de la cláusula.
  doctrine_reference: Sintaxis de propósito/resultados evitados
translation_notes:
  revision_awareness: El texto griego base y el audit trail inglés muestran alta concordancia y no registran revisiones posteriores. Se mantuvo la lectura primera persona plural de εἰργασάμεθα y se preservó la nota textual sobre la variante segunda persona.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo un registro sobrio y eclesial, evitando arcaísmos innecesarios.
  - La puntuación y el tono siguen un español bíblico moderno, claro y públicamente usable.
