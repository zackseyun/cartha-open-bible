revisions:
- from: Vigílense a sí mismos[a], para que no pierdan lo que hemos trabajado, sino que reciban un premio completo.
  to: Cuídense ustedes mismos[a], para que no pierdan aquello por lo que hemos trabajado, sino que reciban una recompensa completa.
  rationale: Se ajusta el imperativo a un español más natural, se expresa εἰργασάμεθα con la construcción «por lo que hemos trabajado» para reflejar el sentido contextual de labor orientada a un resultado, y se cambia «premio» por «recompensa» para representar mejor μισθός en este contexto. La nota textual se conserva y se adapta a la nueva redacción.
