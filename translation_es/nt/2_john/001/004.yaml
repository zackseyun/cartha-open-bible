base_translation:
  language: en
  yaml_path: translation/nt/2_john/001/004.yaml
  text: I rejoiced greatly that I have found some of your children walking in the truth[b][a], just as we received a commandment from the Father.
  footnotes:
  - marker: a
    text: Or 'from among your children.' The Greek expression indicates a subset rather than necessarily all of them.
    reason: lexical_alternative
  - marker: b
    text: Or 'walking in truth.' The phrase likely refers not merely to sincerity but to living in accord with the revealed truth.
    reason: lexical_alternative
