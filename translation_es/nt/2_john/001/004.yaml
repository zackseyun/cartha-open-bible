revisions:
- from: Me alegré mucho de haber hallado a algunos de tus hijos andando en la verdad[a][b], así como recibimos un mandamiento del Padre.
  to: Me alegré mucho de haber encontrado a algunos de tus hijos e hijas[a] andando en la verdad[b], así como recibimos un mandamiento del Padre.
  rationale: Se revisa «hijos» a «hijos e hijas» para reflejar con mayor precisión el sentido inclusivo de τέκνα y evitar una restricción masculina no exigida por el texto. También se cambia «hallado» por «encontrado» para mayor naturalidad en español neutral. Se mantienen la metáfora «andando en la verdad», el valor partitivo y «del Padre».
