review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del griego: saludo epistolar, referente filial, ''tu hermana'' y el adjetivo ἐκλεκτῆς sin resolver en el cuerpo principal la posible lectura eclesial. Sin embargo, ''Los hijos'' estrecha indebidamente τὰ τέκνα, que es inclusivo (''hijos e hijas'', ''niños/as'', más naturalmente ''hijos'' en inglés pero en español aquí conviene ''hijos e hijas'' o ''los hijos'' según contexto). Dado que se refiere a descendencia plural de una hermana, ''Los hijos'' puede entenderse genéricamente, pero no preserva tan claramente el valor inclusivo como ''Los hijos e hijas'' o ''Los hijos'' con menor precisión. Además, el English POB audit trail terminó prefiriendo ''elect'' en la línea principal; en español, ''elegida'' es legible, pero ''electa'' refleja mejor esa revisión formal sin dejar de ser comprensible en registro eclesial.'
  spanish_quality_summary: La frase es natural y clara, pero puede mejorarse en precisión y alineación terminológica. 'Los hijos de tu hermana elegida te saludan' suena bien, aunque 'hermana electa' también es idiomático en español bíblico digno. La nota a sobre 'congregación hermana' es útil. La nota b necesita ajustarse si el texto principal cambia a 'electa'.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la preferencia por conservar matices teológicos. Aquí conviene acercarse a la decisión auditada del POB inglés usando 'electa' en el texto principal y relegando 'elegida/escogida' a nota. También conviene representar mejor τέκνα con una forma inclusiva en español.
  issues:
  - severity: medium
    issue: τὰ τέκνα está traducido como 'Los hijos'
    rationale: Aunque 'hijos' puede funcionar como masculino genérico, τέκνα denota 'children' sin especificar sexo. En este contexto, 'Los hijos e hijas' preserva mejor el sentido inclusivo del griego y evita una posible restricción innecesaria.
  - severity: medium
    issue: ἐκλεκτῆς se traduce 'elegida' pese a que la auditoría inglesa revisada prefirió 'elect' en la línea principal
    rationale: La revisión auditada cambió deliberadamente a 'elect' por registro y fidelidad contextual. En español, 'electa' es una correspondencia válida y suficientemente inteligible; usarla mejora la alineación con la decisión documentada sin forzar una paráfrasis.
  revised_spanish_text: Los hijos e hijas de tu hermana[a] electa[b] te saludan.
  revised_footnotes:
  - marker: a
    text: O 'congregación hermana'. El griego permite una lectura literal de parentesco o, más probablemente en el lenguaje personificado de la carta, una referencia a una comunidad cristiana.
    reason: alternative_reading
  - marker: b
    text: O 'hermana elegida'. El adjetivo griego puede traducirse 'electa', 'elegida' o 'escogida'.
    reason: lexical_alternative
  revision_rationale: Se ajusta τὰ τέκνα a 'hijos e hijas' para preservar explícitamente el valor inclusivo de 'children' en el griego, y se cambia 'elegida' por 'electa' para alinearse con la decisión final auditada del English POB de mantener 'elect' en el texto principal. Las notas se actualizan para reflejar estas decisiones sin resolver de más la posible lectura eclesial.
