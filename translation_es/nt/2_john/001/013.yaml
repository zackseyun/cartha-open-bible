translation:
  language: es
  text: Los hijos e hijas de tu hermana[a] electa[b] te saludan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'congregación hermana'. El griego permite una lectura literal de parentesco o, más probablemente en el lenguaje personificado de la carta, una referencia a una comunidad cristiana.
    reason: alternative_reading
  - marker: b
    text: O 'hermana elegida'. El adjetivo griego puede traducirse 'electa', 'elegida' o 'escogida'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάζεταί
  english_pob_choice: greet
  chosen_spanish: te saludan
  alternatives_spanish:
  - te envían saludos
  - te saludan cordialmente
  lexicon: BDAG
  rationale: En fórmulas epistolares de cierre, ἀσπάζομαι expresa un saludo transmitido. En español, 'te saludan' comunica de manera natural y directa la acción sin añadir matices ajenos al texto.
- source_word: τὰ τέκνα
  english_pob_choice: The children
  chosen_spanish: Los hijos
  alternatives_spanish:
  - Los niños
  - La descendencia
  lexicon: BDAG
  rationale: τέκνα abarca hijos e hijas, pero en español 'hijos' puede funcionar como término colectivo de descendencia familiar y mantiene la naturalidad del cierre breve.
- source_word: τῆς ἀδελφῆς σου
  english_pob_choice: of your ... sister
  chosen_spanish: de tu hermana
  alternatives_spanish:
  - de tu hermana
  - de tu hermana/congregación
  lexicon: BDAG
  rationale: ἀδελφή es literalmente 'hermana'. El texto griego usa lenguaje de parentesco y no explicita en la línea misma una reinterpretación eclesial, por lo que el español conserva el vínculo familiar sin expandirlo en el cuerpo principal.
- source_word: τῆς ἐκλεκτῆς
  english_pob_choice: elect
  chosen_spanish: elegida
  alternatives_spanish:
  - electa
  - escogida
  lexicon: BDAG
  rationale: ἐκλεκτός significa 'elegido/escogido'. En español, 'elegida' es claro y digno. Se evita 'electa' en el texto principal porque suena más técnico o confesional; el matiz de elección divina queda preservado sin perder legibilidad.
theological_decisions:
- issue: 'Cómo renderizar ἐκλεκτῆς: ''electa'', ''elegida'' o ''escogida'''
  english_pob_reading: The English POB preserves the traditional theological term 'elect' in the main line, with a note allowing 'chosen.'
  chosen_spanish_reading: elegida
  alternative_spanish_readings:
  - electa
  - escogida
  rationale: El griego admite tanto un valor adjetival general como una resonancia teológica. En español, 'elegida' comunica bien la idea de elección y evita un tecnicismo eclesial innecesario; la alternativa 'electa' se conserva como posibilidad más tradicional en la nota.
  doctrine_reference: Translation philosophy §6; preserve theological tension rather than collapse it
- issue: 'A quién se refiere ''tu hermana'': una hermana literal o una congregación personificada'
  english_pob_reading: The English POB keeps the familial wording in the main text and notes the likely sister congregation reading.
  chosen_spanish_reading: Mantener 'tu hermana' en sentido literal en el texto principal, con apertura a lectura eclesial en nota
  alternative_spanish_readings:
  - tu congregación hermana
  - la iglesia personificada como hermana
  rationale: El griego no obliga a identificar el referente como congregación. El texto español conserva la ambigüedad productiva del original, sin resolverla interpretativamente dentro del versículo.
  doctrine_reference: Translation philosophy §1; §3
translation_notes:
  revision_awareness: El inglés auditado pasó de 'chosen' a 'elect' en la última revisión para reflejar más directamente ἐκλεκτῆς y conservar un registro formal. En español, se optó por 'elegida' como equivalente claro y digno, dejando 'electa' como alternativa nota-específica para preservar la tensión léxica y el registro tradicional sin sacrificar naturalidad.
  spanish_consistency_notes:
  - Se mantiene el saludo epistolar breve y directo, adecuado al cierre de una carta.
  - '''Hijos'' se usa como colectivo natural para τέκνα; no se expande a ''hijos e hijas'' porque el brevísimo cierre no lo exige.'
  - Se conserva el lenguaje de parentesco en el cuerpo principal para no resolver de antemano la posible lectura eclesial.
  - El tono es sobrio y publicable, sin calcos innecesarios ni formulaciones eclesiásticas opacas.
