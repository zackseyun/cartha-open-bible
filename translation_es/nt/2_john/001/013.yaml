revisions:
- from: Los hijos de tu hermana[a] elegida[b] te saludan.
  to: Los hijos e hijas de tu hermana[a] electa[b] te saludan.
  rationale: Se ajusta τὰ τέκνα a 'hijos e hijas' para preservar explícitamente el valor inclusivo de 'children' en el griego, y se cambia 'elegida' por 'electa' para alinearse con la decisión final auditada del English POB de mantener 'elect' en el texto principal. Las notas se actualizan para reflejar estas decisiones sin resolver de más la posible lectura eclesial.
