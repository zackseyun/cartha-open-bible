translation:
  language: es
  text: El anciano[a], a la señora elegida y a sus hijos, a quienes amo en la verdad[b]—y no solo yo, sino también todos los que han llegado a conocer la verdad—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «a la elegida señora»; algunos entienden que «señora» alude metafóricamente a una iglesia local, y algunos toman «Kyria» como nombre propio.'
    reason: alternative_reading
  - marker: b
    text: 'O: «verdaderamente»; la frase también puede llevar el sentido joánico de «en la verdad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ πρεσβύτερος
  english_pob_choice: The elder
  chosen_spanish: El anciano
  alternatives_spanish:
  - El presbítero
  - El anciano
  lexicon: BDAG
  rationale: Como autorretrato epistolar, πρεσβύτερος funciona con naturalidad como designación de cargo o estatus reconocido. En español, «el anciano» conserva esa ambigüedad entre edad, autoridad y liderazgo sin cargar el texto con el tecnicismo eclesiástico de «presbítero».
- source_word: ἐκλεκτῇ
  english_pob_choice: chosen
  chosen_spanish: escogida
  alternatives_spanish:
  - elegida
  - escogida
  - electa
  lexicon: BDAG
  rationale: «Escogida» comunica el sentido básico de ἐκλεκτός en un español actual y digno. Mantiene abierta la posibilidad de una mujer literal o de una comunidad personificada, sin resolver la tensión del texto.
- source_word: κυρίᾳ
  english_pob_choice: lady
  chosen_spanish: señora
  alternatives_spanish:
  - señora
  - dama
  - Señora (como nombre propio)
  lexicon: BDAG
  rationale: κυρία denota una mujer de trato respetuoso, mejor expresada en español por «señora». «Dama» es posible, pero menos natural en una salutación. Se conserva abierta la posibilidad de un nombre propio en la nota, en vez de adoptarlo en el texto principal.
- source_word: τοῖς τέκνοις αὐτῆς
  english_pob_choice: her children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos
  - a sus hijos e hijas
  - a sus hijos
  lexicon: BDAG
  rationale: τέκνα significa «hijos» en sentido amplio, no exclusivamente varones. En español, «sus hijos» es la forma más natural y puede abarcar tanto descendencia literal como miembros de una comunidad, sin forzar una interpretación.
- source_word: οὓς
  english_pob_choice: whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - a quienes
  - que
  - los cuales
  lexicon: BDAG
  rationale: El relativo acusa referencia personal. «A quienes» conserva el enlace directo con «sus hijos» y evita una reformulación innecesaria que borre la relación sintáctica del griego.
- source_word: ἀγαπῶ
  english_pob_choice: love
  chosen_spanish: amo
  alternatives_spanish:
  - amo
  - quiero
  - tengo amor por
  lexicon: BDAG
  rationale: El verbo ἀγαπάω se traduce con el verbo normal «amar». «Amo» mantiene la fuerza relacional del original y encaja bien con el registro epistolar.
- source_word: ἐν ἀληθείᾳ
  english_pob_choice: in truth
  chosen_spanish: en la verdad
  alternatives_spanish:
  - en la verdad
  - verdaderamente
  - en verdad
  lexicon: BDAG
  rationale: La frase puede expresar sinceridad y, en contexto johánico, también la esfera o estándar de la verdad. «En la verdad» preserva mejor esa resonancia teológica que «verdaderamente», y deja abierta la doble fuerza del giro.
- source_word: οὐκ ἐγὼ μόνος ἀλλὰ καὶ πάντες
  english_pob_choice: and not I alone, but also all
  chosen_spanish: y no solo yo, sino también todos
  alternatives_spanish:
  - y no solo yo, sino también todos
  - y no yo solo, sino también todos
  - y no únicamente yo, sino también todos
  lexicon: BDAG
  rationale: La construcción enfática en español queda natural con «y no solo yo, sino también todos». Mantiene el contraste entre el autor y la comunidad sin añadir matices ausentes en el griego.
- source_word: οἱ ἐγνωκότες
  english_pob_choice: who have come to know
  chosen_spanish: los que han llegado a conocer
  alternatives_spanish:
  - los que han llegado a conocer
  - los que conocen
  - los que han conocido
  lexicon: BDAG
  rationale: El participio perfecto sugiere un estado presente resultante de un conocimiento previo. «Han llegado a conocer» conserva esa idea mejor que el simple «conocen» y sigue siendo idiomático en español.
- source_word: τὴν ἀλήθειαν
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad
  lexicon: BDAG
  rationale: Se mantiene el término «verdad» por su valor ordinario y johánico. La repetición del sustantivo en la cláusula reforza el énfasis del versículo y no requiere sustitución por un sinónimo.
theological_decisions:
- issue: Identidad de ἐκλεκτῇ κυρίᾳ
  english_pob_reading: Rendered as 'the chosen lady,' while leaving open the possibility that it metaphorically refers to a local church.
  chosen_spanish_reading: «la señora escogida», manteniendo abierta la posibilidad de una mujer concreta, de una comunidad personificada o de un nombre propio.
  alternative_spanish_readings:
  - una mujer cristiana concreta y sus hijos
  - una iglesia local personificada como señora
  - ‘Kyria’ como nombre propio
  rationale: El griego admite varias lecturas legítimas. La traducción principal no debe cerrar el sentido ni imponer una identificación eclesiástica o privada. Por eso se conserva la forma común y se documentan las alternativas.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
- issue: Sentido de ἐν ἀληθείᾳ
  english_pob_reading: '''in truth'' to preserve both sincerity and Johannine theological resonance.'
  chosen_spanish_reading: «en la verdad», preservando tanto la sinceridad como la resonancia johánica.
  alternative_spanish_readings:
  - verdaderamente
  - en verdad
  - en la verdad
  rationale: En español, «en la verdad» mantiene la posibilidad de un sentido modal y de uno teológico, mientras que «verdaderamente» reduce el alcance a una simple manera de hablar. La elección evita empobrecer la carga conceptual de ἀλήθεια.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de origen; la presente redacción sigue el texto griego SBLGNT y el juicio de alta concordancia del control cruzado inglés, preservando las ambigüedades documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «anciano» para πρεσβύτερος, en coherencia con el valor epistolar de autorretrato y sin tecnicismo eclesiástico añadido.
  - Se conserva «verdad» de modo repetido para reflejar el énfasis del original y la teología joánica.
  - La nota [a] se ancla en «señora escogida» porque el griego permite tanto un destinatario literal como una lectura metafórica.
  - La nota [b] se ancla en «en la verdad» para conservar la alternativa «verdaderamente» sin perder la resonancia teológica.
