translation:
  language: es
  text: Gracia, misericordia y paz estarán con nosotros de parte de Dios el Padre y de parte de Jesús Mesías[a], el Hijo del Padre[b], en verdad y amor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesús Cristo». El título griego Χριστός puede transliterarse como «Cristo»; aquí se traduce como «Mesías» para conservar su valor titular.
    reason: alternative_reading
  - marker: b
    text: O «el Hijo del Padre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: estarán
  alternatives_spanish:
  - serán
  - habrá
  lexicon: BDAG
  rationale: El futuro indicativo de εἰμί se expresa naturalmente con «estarán» en un saludo epistolar plural; conserva el valor futuro y el sentido de presencia/acompañamiento del contexto benedictivo.
- source_word: μεθ’ ἡμῶν
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - entre nosotros
  - junto a nosotros
  lexicon: BDAG
  rationale: La preposición μετά con genitivo comunica compañía o acompañamiento; «con nosotros» es la equivalencia más natural en español y preserva el matiz relacional del saludo.
- source_word: χάρις ἔλεος εἰρήνη
  english_pob_choice: Grace, mercy, and peace
  chosen_spanish: la gracia, la misericordia y la paz
  alternatives_spanish:
  - gracia, misericordia y paz
  - la gracia, la compasión y la paz
  lexicon: BDAG
  rationale: Se mantiene la tríada nominal como en el griego y como en el POB inglés. «Gracia» y «paz» son transparentes; «misericordia» traduce ἔλεος de forma estándar y precisa, sin diluir su fuerza lexical.
- source_word: παρὰ θεοῦ πατρός
  english_pob_choice: from God the Father
  chosen_spanish: de parte de Dios el Padre
  alternatives_spanish:
  - de Dios el Padre
  - procedentes de Dios el Padre
  lexicon: BDAG
  rationale: παρά con genitivo señala origen o procedencia; «de parte de» comunica bien ese valor en español sin sonar mecánico. Se conserva «Dios el Padre» sin añadir posesivos inexistentes como «nuestro».
- source_word: παρὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: from Jesus Messiah
  chosen_spanish: de parte de Jesús Mesías
  alternatives_spanish:
  - de parte de Jesús Cristo
  - de Jesús Mesías
  lexicon: BDAG
  rationale: Se mantiene la decisión del POB de traducir Χριστός por «Mesías» para conservar el valor titular. «De parte de» refleja el origen indicado por παρά con genitivo.
- source_word: τοῦ υἱοῦ τοῦ πατρός
  english_pob_choice: the Father's Son
  chosen_spanish: el Hijo del Padre
  alternatives_spanish:
  - el Hijo del Padre
  - el Hijo del que es Padre
  lexicon: BDAG
  rationale: La relación posesiva se expresa de modo natural y fiel como «el Hijo del Padre». La construcción preserva la identificación cristológica sin sobreexplicarla.
- source_word: ἐν ἀληθείᾳ καὶ ἀγάπῃ
  english_pob_choice: in truth and love
  chosen_spanish: en verdad y amor
  alternatives_spanish:
  - en la verdad y el amor
  - con verdad y amor
  lexicon: BDAG
  rationale: «En verdad y amor» sigue de cerca el griego y mantiene la cualidad anartrosa de los sustantivos. «Verdad» evita una lectura excesivamente abstracta o doctrinalizada; «amor» corresponde al valor de ἀγάπῃ en este contexto.
theological_decisions:
- issue: Traducción de Χριστός como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se sigue la política del POB de traducir el título Χριστός cuando funciona como título cristológico, en vez de simplemente transliterarlo. «Mesías» conserva el sentido de unción/título y mantiene la tensión documental entre uso confesional y sentido lexical.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve christological force without erasing lexical meaning.'
- issue: Relación appositiva entre «Jesús Mesías» y «el Hijo del Padre»
  english_pob_reading: the Father's Son as an appositional identification
  chosen_spanish_reading: «el Hijo del Padre» como identificación apposicional de Jesús Mesías
  alternative_spanish_readings:
  - una frase descriptiva separada
  - una aposición más libre
  rationale: La frase no se trata como un mero añadido devocional, sino como identificación directa de Jesús con el Hijo del Padre. Esto preserva la fuerza cristológica alta del versículo sin introducir formulaciones doctrinales ajenas al texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; maintain high christological claims within the text.'
translation_notes:
  revision_awareness: La solución española toma como base la última lectura restaurada del POB inglés, que volvió a «Jesus Messiah» por coherencia con la política de traducir Χριστός como título. En español se reflejó esa decisión con «Jesús Mesías», manteniendo también la opción tradicional «Cristo» en nota para no ocultar la alternativa reconocida por el audit trail. Se conservó la estructura benedictiva y la relación de origen marcada por παρά, además de la aposición cristológica final.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός de manera consistente con la política POB, no «Cristo» en el texto principal.
  - «Dios el Padre» evita añadir «nuestro», que no está en el griego.
  - «De parte de» se emplea para παρά con genitivo como marcador de procedencia, manteniendo naturalidad en español.
  - La secuencia «la gracia, la misericordia y la paz» conserva el paralelismo nominal del griego y del inglés POB.
  - Se mantiene «en verdad y amor» sin artículos para respetar el carácter cualitativo de los sustantivos.
