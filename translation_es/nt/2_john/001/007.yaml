- from: Porque muchos engañadores han salido al mundo[a], los que no confiesan a Jesús Mesías, que viene en carne[b]. Este es el engañador y el anticristo.
  to: Porque muchos engañadores han salido al mundo, los que no confiesan a Jesús Mesías venido en carne[a]. Este es el engañador y el anticristo.
  rationale: Se elimina la nota innecesaria sobre 'mundo' y se ajusta ἐρχόμενον ἐν σαρκί a 'venido en carne' para lograr un español más natural y menos ambiguo, mientras la nota conserva la alternativa más literal y explica la razón teológica y aspectual. Se quita también la coma antes de la expresión cristológica para que toda la frase funcione claramente como el contenido de la confesión negada.
