source:
  edition: SBLGNT
  text: ὅτι πολλοὶ πλάνοι ⸀ἐξῆλθον εἰς τὸν κόσμον, οἱ μὴ ὁμολογοῦντες Ἰησοῦν Χριστὸν ἐρχόμενον ἐν σαρκί· οὗτός ἐστιν ὁ πλάνος καὶ ὁ ἀντίχριστος.
base_translation:
  language: en
  yaml_path: translation/nt/2_john/001/007.yaml
  text: For many deceivers have gone out into the world[a], those who do not confess Jesus Messiah coming in the flesh[b]. This is the deceiver and the antichrist.
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here because the verse emphasizes the content of the confession about Jesus' messianic identity.
    reason: alternative_reading
  - marker: b
    text: Or 'having come in the flesh.' The Greek reads 'coming in the flesh,' a wording that emphasizes the confession of Jesus Messiah's real embodied humanity.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: 6640630278e97b0f59435d40c350ad15bfd9b220b8dd98b0846eb0d7ea37a585
    timestamp: '2026-04-19T00:31:11Z'
    output_hash: 64efbdb44b5dc97c78839a1ff59e6c192590ccb42b4ad42f3951c713f88db2cd
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:38:20Z'
    unchanged: false
    changes_summary: 'Replaced the dash with a comma for smoother formal English; changed ''those not confessing'' to ''those who do not confess'' for naturalness; rendered ''Messiah'' as ''Christ'' to reflect the Greek form and standard register; changed ''This one is'' to ''This is'' for more natural English. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque muchos engañadores han salido al mundo, los que no confiesan a Jesús Mesías venido en carne[a]. Este es el engañador y el anticristo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que ha venido en carne'. El griego dice literalmente 'viniendo/que viene en carne', una forma que subraya la confesión de la verdadera humanidad encarnada de Jesús Mesías.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón de la advertencia anterior; en español, 'Porque' expresa con claridad la relación explicativa sin forzar causalidad más fuerte de la que requiere el contexto.
- source_word: πολλοὶ πλάνοι
  english_pob_choice: many deceivers
  chosen_spanish: muchos engañadores
  alternatives_spanish:
  - muchos decepcionadores
  - muchos falsos maestros
  lexicon: BDAG
  rationale: πλάνοι nombra a quienes extravían a otros; 'engañadores' conserva la fuerza polémica y mantiene la correspondencia con el singular posterior 'el engañador'.
- source_word: ἐξῆλθον εἰς τὸν κόσμον
  english_pob_choice: have gone out into the world
  chosen_spanish: han salido al mundo
  alternatives_spanish:
  - han salido al mundo entero
  - han salido al mundo
  lexicon: BDAG
  rationale: El perfecto inglés refleja resultado presente de un aoristo griego; en español 'han salido' conserva ese valor. 'Al mundo' mantiene la idea de difusión pública sin sobrecargar κόσμος con una interpretación técnica.
- source_word: οἱ μὴ ὁμολογοῦντες
  english_pob_choice: those who do not confess
  chosen_spanish: los que no confiesan
  alternatives_spanish:
  - los que no reconocen
  - los que no profesan
  lexicon: BDAG
  rationale: El participio articular funciona sustantivamente; 'los que' lo expresa de modo natural. 'Confiesan' preserva el sentido público y verbal de ὁμολογέω mejor que 'reconocen'.
- source_word: Ἰησοῦν Χριστόν
  english_pob_choice: Jesus Messiah
  chosen_spanish: a Jesús Mesías
  alternatives_spanish:
  - a Jesús Cristo
  lexicon: BDAG
  rationale: Se mantiene 'Mesías' como traducción titular de Χριστός conforme al criterio del POB. El orden español exige la preposición 'a' por el objeto directo personal.
- source_word: ἐρχόμενον
  english_pob_choice: coming
  chosen_spanish: que viene
  alternatives_spanish:
  - viniendo
  - que está viniendo
  lexicon: BDAG
  rationale: El participio presente se vierte con una relativa en presente para conservar el valor aspectual sin sonar artificial en español. 'Que viene' mantiene la expresión confesional sin añadir una interpretación de tiempo pasado.
- source_word: ἐν σαρκί
  english_pob_choice: in the flesh
  chosen_spanish: en carne
  alternatives_spanish:
  - en la carne
  - en forma corporal
  lexicon: BDAG
  rationale: Se conserva 'carne' para no diluir el término bíblico. La forma sin artículo reproduce con mayor fidelidad la expresión griega y deja claro que se trata de verdadera encarnación, no de 'naturaleza pecaminosa'.
- source_word: οὗτός ἐστιν
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Éste es
  - Tal es
  lexicon: BDAG
  rationale: La demostración singular identifica al tipo/persona descrita; 'Este es' es natural y mantiene el señalamiento identificador.
- source_word: ὁ πλάνος
  english_pob_choice: the deceiver
  chosen_spanish: el engañador
  alternatives_spanish:
  - el seductor
  - el falsario
  lexicon: BDAG
  rationale: Se conserva la coherencia léxica con πλάνοι. 'Engañador' reproduce el valor identificador del artículo sin suavizar el juicio del texto.
- source_word: ὁ ἀντίχριστος
  english_pob_choice: the antichrist
  chosen_spanish: el anticristo
  alternatives_spanish:
  - el anti-Mesías
  lexicon: BDAG
  rationale: '''Anticristo'' es el equivalente asentado en español y conserva la intertextualidad joánica. No se reemplaza por una paráfrasis etimológica.'
theological_decisions:
- issue: Traducción de Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El audit trail inglés documenta que Χριστός se toma como título en la confesión acerca de Jesús. En español, 'Mesías' preserva ese valor titular y evita convertirlo en un nombre fijo sin necesidad textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Valor de ἐρχόμενον ἐν σαρκί
  english_pob_reading: coming in the flesh
  chosen_spanish_reading: que viene en carne
  alternative_spanish_readings:
  - que ha venido en carne
  - habiendo venido en carne
  rationale: Se conserva el participio presente con una cláusula relativa para no desplazar el aspecto a un pasado cerrado. La frase afirma la encarnación real de Jesús sin imponer una formulación doctrinal más técnica que la del griego.
  doctrine_reference: 'DOCTRINE.md Affirmations: Chalcedon; Translation philosophy §3 preserve theological tension'
- issue: Sentido de σάρξ
  english_pob_reading: flesh (literal embodied humanity)
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - naturaleza humana
  - cuerpo
  rationale: En este contexto, σάρξ afirma humanidad encarnada real. 'Carne' conserva el término bíblico y evita la lectura de 'naturaleza pecaminosa', que no corresponde aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ → flesh (literal) / sinful nature (metaphorical), context-dependent'
translation_notes:
  revision_awareness: El antecedente inglés pasó por una corrección doctrinal para restaurar 'Messiah' en lugar de 'Christ' y por una revisión estilística que prefirió la formulación natural 'This is'. La presente versión española sigue la lectura restaurada de Χριστός como 'Mesías' y conserva el valor presente del participio ἐρχόμενον con una relativa española fluida.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός conforme al criterio POB de título cristológico.
  - Se mantiene 'carne' para σάρξ y no 'naturaleza humana' para preservar el léxico joánico.
  - '''Engañador'' se usa tanto para πλάνοι como para ὁ πλάνος, asegurando consistencia lexical.'
  - '''Anticristo'' se conserva como forma establecida en español.'
  - La puntuación busca una cadencia natural en español, sin introducir un matiz de cita ajeno al griego.
