translation:
  language: es
  text: 'Porque el que le dice: «Te saludo[a]», participa en sus obras malas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salve». La fórmula griega χαίρειν es un saludo convencional; en este contexto expresa más que mera amabilidad, porque implica acogida o aprobación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λέγων
  english_pob_choice: the one who says
  chosen_spanish: el que le dice
  alternatives_spanish:
  - quien le dice
  - la persona que le dice
  lexicon: BDAG
  rationale: El participio con artículo funciona de manera sustantiva y genérica. «El que le dice» conserva esa estructura, su fuerza general y la referencia al destinatario sin sobreexplicar.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí γάρ introduce la razón del mandato previo. «Porque» expresa con naturalidad en español esa relación explicativa-causal.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a esa persona
  lexicon: BDAG
  rationale: El pronombre dativo se refiere al mismo individuo descrito en el contexto inmediato. En español, el clítico «le» suena natural y mantiene la referencia sin expandirla innecesariamente.
- source_word: χαίρειν
  english_pob_choice: “Greetings”
  chosen_spanish: «Saludos»
  alternatives_spanish:
  - «Salve»
  - «Bienvenido»
  - «Alégrate»
  lexicon: BDAG
  rationale: Después de λέγων, χαίρειν funciona como fórmula convencional de saludo. «Saludos» comunica el valor salutatorio de manera clara y moderna. No se traduce como «alégrate» porque aquí no expresa simplemente el verbo literal, sino una fórmula de saludo.
- source_word: κοινωνεῖ
  english_pob_choice: shares in
  chosen_spanish: participa en
  alternatives_spanish:
  - comparte
  - tiene parte en
  - entra en comunión con
  lexicon: BDAG
  rationale: κοινωνέω con dativo señala participación o complicidad en algo. «Participa en» conserva ese valor y evita restringirlo a una noción eclesial más estrecha de «comunión».
- source_word: τοῖς ἔργοις αὐτοῦ τοῖς πονηροῖς
  english_pob_choice: his evil works
  chosen_spanish: sus obras malas
  alternatives_spanish:
  - sus obras perversas
  - sus malas obras
  - sus hechos malos
  lexicon: BDAG
  rationale: «Obras» mantiene la continuidad léxica con ἔργα. «Malas» expresa el sentido moral de πονηροῖς en español natural. «Evil» sería posible, pero «malas» suena más idiomático y sigue siendo fiel al juicio moral del texto.
theological_decisions:
- issue: Si el saludo implica simple cortesía o aprobación/complicidad
  english_pob_reading: The verse teaches that offering this greeting in the context of receiving and supporting false teachers entails sharing in their evil works.
  chosen_spanish_reading: El versículo enseña que ofrecer este saludo, en el contexto de recibir y apoyar a falsos maestros, implica participar en sus obras malas.
  alternative_spanish_readings:
  - El versículo prohíbe toda forma de saludo cortés en cualquier contexto.
  - Solo condena la hospitalidad, no el saludo verbal.
  rationale: La elección de «participa en» y el contexto inmediato preservan la fuerza moral del texto sin convertirlo en una prohibición absoluta de toda cortesía. La traducción mantiene la tensión interpretativa documentada por el POB en lugar de resolverla en exceso.
  doctrine_reference: Preservar la tensión teológica y contextual; primacía del texto original sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'Coincide con el último pasaje revisado: no se registran cambios respecto del estado más reciente del texto fuente auditado.'
  spanish_consistency_notes:
  - Se mantiene la estrategia del POB de traducir χαίρειν como fórmula de saludo y no como «alégrate».
  - Se evita «comunión» para κοινωνεῖ, porque en español podría sonar excesivamente eclesial y diluir la idea de complicidad.
  - «Obras malas» conserva el sustantivo ἔργα y el juicio moral de πονηροῖς sin introducir un término más fuerte que el texto no exige.
