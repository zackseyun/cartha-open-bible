translation:
  language: es
  text: 'Y este es el amor: que andemos conforme a sus mandamientos. Este es el mandamiento[a], tal como oyeron desde el principio: que anden en esto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «que anden en amor»; «esto» puede referirse al «mandamiento» recién mencionado o al «amor» de la primera cláusula.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: «Amor» es el equivalente natural y fiel en español para ἀγάπη, y conserva el vínculo léxico joánico con el resto del pasaje. Se evita «caridad» por su posible estrechamiento semántico en español moderno.
- source_word: ἵνα περιπατῶμεν
  english_pob_choice: that we walk
  chosen_spanish: que caminemos
  alternatives_spanish:
  - para que caminemos
  - que andemos
  lexicon: BDAG
  rationale: «Que caminemos» reproduce con claridad la idea exhortativa/resultativa de ἵνα y mantiene la metáfora ética de περιπατέω sin volverla demasiado interpretativa. «Andemos» sería posible, pero «caminemos» suena más natural y conserva la imagen.
- source_word: περιπατέω
  english_pob_choice: walk
  chosen_spanish: caminar
  alternatives_spanish:
  - andar
  - vivir
  lexicon: BDAG
  rationale: Se preserva la metáfora de «caminar» para mantener la repetición retórica del versículo. «Vivir» sería más explicativo pero debilitaría la imagen verbal compartida en ambas cláusulas.
- source_word: κατὰ τὰς ἐντολὰς αὐτοῦ
  english_pob_choice: according to his commandments
  chosen_spanish: conforme a sus mandamientos
  alternatives_spanish:
  - de acuerdo con sus mandamientos
  - según sus mandamientos
  lexicon: BDAG
  rationale: «Conforme a» expresa bien la conformidad de κατά con acusativo y suena natural en registro bíblico contemporáneo. «Mandamientos» preserva el plural y la conexión con la singular ἐντολή del versículo.
- source_word: ἐντολάς
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - preceptos
  lexicon: BDAG
  rationale: «Mandamientos» conserva la correspondencia terminológica con la singular «mandamiento» más adelante y refleja la formulación joánica clásica sin perder claridad.
- source_word: αὕτη ἡ ἐντολή ἐστιν
  english_pob_choice: This is the commandment
  chosen_spanish: Este es el mandamiento
  alternatives_spanish:
  - Este es el mandato
  - Esta es la orden
  lexicon: BDAG
  rationale: Se conserva el sustantivo singular sin añadir un posesivo inexistente en el griego. Aunque ἐντολή es femenino, el español puede usar «este» cuando se toma «mandamiento» de manera general; sin embargo, la forma más idiomática y fiel en español es mantener «Este es el mandamiento» siguiendo el referente conceptual del enunciado.
- source_word: καθὼς ἠκούσατε ἀπ’ ἀρχῆς
  english_pob_choice: just as you heard from the beginning
  chosen_spanish: como oísteis desde el principio
  alternatives_spanish:
  - tal como oísteis desde el principio
  - así como oísteis desde el comienzo
  lexicon: BDAG
  rationale: «Como oísteis desde el principio» reproduce con sencillez el aoristo ἠκούσατε y la idiomática joánica ἀπ’ ἀρχῆς. Se mantiene el lenguaje de recepción oral sin expandirlo.
- source_word: ἵνα ἐν αὐτῇ περιπατῆτε
  english_pob_choice: that you should walk in it
  chosen_spanish: que caminéis en él
  alternatives_spanish:
  - para que caminéis en él
  - que andéis en él
  lexicon: BDAG
  rationale: Se mantiene la metáfora de «caminar» y la preposición «en» para reflejar ἐν αὐτῇ. El pronombre se traduce como masculino por referencia más cercana a «mandamiento», preservando el enlace gramatical principal.
theological_decisions:
- issue: Referente de αὐτῇ en la cláusula final
  english_pob_reading: Refers to the singular 'commandment' immediately preceding; alternative footnote preserves the possibility that it may refer to 'love'.
  chosen_spanish_reading: Se entiende principalmente que se refiere al «mandamiento» singular inmediatamente anterior.
  alternative_spanish_readings:
  - Puede referirse más ampliamente al «amor» de la primera cláusula.
  rationale: La antecedente más cercano es ἡ ἐντολή, por lo que el flujo gramatical favorece esa lectura. Sin embargo, como ἀγάπη también es femenina singular y la idea de amor enmarca toda la frase, se preserva la tensión interpretativa mediante nota en lugar de resolverla dogmáticamente.
  doctrine_reference: Preservar la tensión textual y teológica sin cerrarla indebidamente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; el borrador español sigue de cerca la lectura griega y el criterio auditado de la POB en inglés, manteniendo la tensión sobre el referente de αὐτῇ con nota alternativa.
  spanish_consistency_notes:
  - Se mantiene la metáfora ética de «caminar» en ambas cláusulas para conservar la repetición del griego.
  - «Mandamientos» y «mandamiento» se distinguen para reflejar el paso del plural al singular.
  - Se usa «amor» en lugar de «caridad» por consistencia léxica joánica y claridad moderna.
  - El pronombre final se deja masculino en el texto principal por concordar con «mandamiento», mientras la nota preserva la alternativa interpretativa.
  - La puntuación reproduce la estructura retórica del original con dos afirmaciones paralelas.
