translation:
  language: es
  text: Y cuando los que habían sido enviados regresaron a la casa, encontraron al esclavo[a] sano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "sirviente". La palabra griega es doúlos, que puede significar "esclavo" o "sirviente" según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑποστρέψαντες
  english_pob_choice: when ... returned
  chosen_spanish: cuando ... regresaron
  alternatives_spanish:
  - habiendo regresado
  - regresaron
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente antes del verbo principal. En español, 'cuando ... regresaron' expresa con naturalidad esa relación temporal sin perder la secuencia narrativa.
- source_word: εἰς τὸν οἶκον
  english_pob_choice: to the house
  chosen_spanish: a la casa
  alternatives_spanish:
  - a la casa de regreso
  - en la casa
  lexicon: BDAG
  rationale: εἰς con acusativo indica movimiento hacia un lugar. 'A la casa' conserva la dirección y es natural en español.
- source_word: οἱ πεμφθέντες
  english_pob_choice: those who had been sent
  chosen_spanish: los que habían sido enviados
  alternatives_spanish:
  - los enviados
  - los mandados
  lexicon: BDAG
  rationale: El participio pasivo aoristo de πέμπω se conserva mejor con una construcción pasiva. 'Los que habían sido enviados' mantiene el matiz pasivo sin añadir una interpretación como 'mensajeros'.
- source_word: εὗρον
  english_pob_choice: they found
  chosen_spanish: encontraron
  alternatives_spanish:
  - hallaron
  - descubrieron
  lexicon: BDAG
  rationale: Verbo narrativo directo y común en español, adecuado para εὑρίσκω en este contexto.
- source_word: τὸν δοῦλον
  english_pob_choice: the slave
  chosen_spanish: al esclavo
  alternatives_spanish:
  - al siervo
  - al servidor
  lexicon: BDAG
  rationale: δοῦλος designa una condición de sujeción/propiedad; 'esclavo' preserva mejor esa fuerza lexical que 'siervo', que en español puede suavizar el término.
- source_word: ὑγιαίνοντα
  english_pob_choice: healthy
  chosen_spanish: sano
  alternatives_spanish:
  - bien
  - en buen estado
  lexicon: BDAG
  rationale: El participio presente de ὑγιαίνω significa estar sano/ser saludable. 'Sano' es breve, natural y no introduce explícitamente 'sanado' como si fuera otro verbo.
theological_decisions:
- issue: Rendering of δοῦλος in a healing narrative
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: El contexto no atenúa la dependencia social del personaje. 'Esclavo' conserva la tensión lexical y social del término griego y coincide con la decisión auditada de la POB en inglés.
  doctrine_reference: 'DOCTRINE.md: contested terms for δοῦλος; translation philosophy on retaining lexical force'
translation_notes:
  revision_awareness: Corregido para que no haya notas al pie sin anclaje textual. Se mantiene la lectura auditable del griego y la decisión léxica de δοῦλος como 'esclavo'.
  spanish_consistency_notes:
  - '''casa'' se mantiene concreto y sin domesticación interpretativa.'
  - '''sano'' evita sobretraducir a ''sanado'', ya que el griego usa un participio de estado.'
  - No se usó 'SEÑOR' ni vocabulario litúrgico ajeno al versículo.
