translation:
  language: es
  text: Ahora bien, el esclavo[a] de cierto centurión, que estaba enfermo y a punto de morir, era muy estimado por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo». El griego usa δοῦλος, que puede significar «esclavo» o «siervo» según el contexto; aquí se eligió «esclavo» para conservar la relación de dependencia implícita en el término.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἑκατοντάρχου δέ τινος
  english_pob_choice: Now a certain centurion’s
  chosen_spanish: Ahora bien, de cierto centurión
  alternatives_spanish:
  - De cierto centurión
  - Ahora, de un centurión
  lexicon: BDAG
  rationale: El genitivo expresa pertenencia; en español conviene resolverlo con una construcción natural. 'Cierto' preserva la indefinición de τινος, y 'Ahora bien' traduce el matiz narrativo suave de δέ.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: BDAG
  rationale: El contexto de posesión y subordinación social en un hogar romano favorece 'esclavo', que preserva la fuerza léxica de δοῦλος sin suavizarla. 'Siervo' y 'sirviente' pueden atenuar indebidamente esa relación.
- source_word: κακῶς ἔχων
  english_pob_choice: was sick
  chosen_spanish: estaba enfermo
  alternatives_spanish:
  - estaba mal
  - estaba muy grave
  - sufría mucho
  lexicon: BDAG
  rationale: La expresión idiomática comunica un estado de mala salud. 'Estaba enfermo' es una equivalencia clara y natural en español, sin perder el sentido médico del contexto.
- source_word: ἤμελλεν τελευτᾶν
  english_pob_choice: was about to die
  chosen_spanish: a punto de morir
  alternatives_spanish:
  - iba a morir
  - estaba por morir
  - estaba al borde de morir
  lexicon: BDAG
  rationale: μέλλω con infinitivo señala inminencia. 'A punto de morir' conserva esa cercanía temporal de forma natural en español.
- source_word: ὃς ἦν αὐτῷ ἔντιμος
  english_pob_choice: who was highly valued by him
  chosen_spanish: que era muy estimado por él
  alternatives_spanish:
  - que le era muy querido
  - que era precioso para él
  - que era honrado por él
  lexicon: BDAG
  rationale: ἔντιμος puede significar valioso, estimado u honrado. 'Muy estimado por él' comunica aprecio sin añadir sentimentalismo excesivo; 'honrado' sería posible, pero menos natural para el afecto del centurión hacia el esclavo.
theological_decisions:
- issue: Renderizar δοῦλος en un contexto de esclavitud doméstica romana
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente
  rationale: La auditaría inglesa prioriza 'slave' para mantener la relación vinculada y jerárquica implícita en δοῦλος. En español, 'esclavo' conserva mejor esa carga histórica y social que 'siervo' o 'sirviente'.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios sustantivos; esta propuesta mantiene la lectura y el énfasis léxico del audit trail inglés, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evitó 'Mesías'/'Cristo' porque no aparecen en el texto.
  - '''Ahora bien'' preserva el matiz narrativo leve de δέ sin sobrerinterpretarlo.'
  - La nota textual sobre δοῦλος se ancla en el término español 'esclavo' para reflejar la alternativa documentada.
