  text: οὗ χάριν, λέγω σοι, ἀφέωνται αἱ ἁμαρτίαι αὐτῆς αἱ πολλαί, ὅτι ἠγάπησεν πολύ· ᾧ δὲ ὀλίγον ἀφίεται, ὀλίγον ἀγαπᾷ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/007/047.yaml
  text: For this reason I tell you[a], her many sins have been forgiven, because she loved much. But the one who is forgiven little loves little.
  footnotes:
