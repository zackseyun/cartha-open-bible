translation:
  language: es
  text: 'Por esta razón te digo[a]: sus muchos pecados le han sido perdonados, porque amó mucho. Pero al que se le perdona poco, poco ama.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por tanto ella amó mucho». La conjunción griega también puede entenderse de un modo que presenta su amor como evidencia de su estado perdonado, más que como su causa.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὗ χάριν
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - por tanto
  - por ello
  - así que
  lexicon: BDAG
  rationale: Expresa de manera natural en español la relación causal/inferencial del giro idiomático griego, sin perder su fuerza argumentativa.
- source_word: ἀφέωνται
  english_pob_choice: have been forgiven
  chosen_spanish: le han sido perdonados
  alternatives_spanish:
  - han sido perdonados
  - le son perdonados
  - le han sido remitidos
  lexicon: BDAG
  rationale: El perfecto pasivo pide un estado resultante; en español, 'le han sido perdonados' conserva el valor de acción cumplida con efecto presente y permite marcar el complemento indirecto implícito.
- source_word: ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - ofensas
  lexicon: BDAG
  rationale: '''Pecados'' es el equivalente más directo y eclesialmente claro para ἁμαρτίαι en este contexto.'
- source_word: αἱ πολλαί
  english_pob_choice: many
  chosen_spanish: sus muchos
  alternatives_spanish:
  - muchos
  - numerosos
  lexicon: BDAG
  rationale: 'En español suena más natural anteponer el posesivo: ''sus muchos pecados''. Mantiene el valor atributivo de ''many'' sin fragmentar la frase.'
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: '''Porque'' reproduce la causalidad explícita del texto griego y deja intacta la tensión teológica señalada en el audito: la frase describe la relación discursiva entre perdón y amor sin convertir el amor en mérito.'
- source_word: ἠγάπησεν πολύ
  english_pob_choice: she loved much
  chosen_spanish: amó mucho
  alternatives_spanish:
  - la amó mucho
  - amó grandemente
  lexicon: BDAG
  rationale: El verbo ἀγαπάω se traduce con 'amar' según el uso del proyecto. El adverbio πολύ queda bien en español como 'mucho'.
- source_word: ᾧ δὲ
  english_pob_choice: But the one who
  chosen_spanish: Pero al que
  alternatives_spanish:
  - Pero el que
  - Y al que
  lexicon: BDAG
  rationale: La construcción relativa genérica se vuelve más fluida en español con 'al que'; evita forzar género específico y mantiene el contraste adversativo de δέ.
- source_word: ὀλίγον ἀφίεται
  english_pob_choice: is forgiven little
  chosen_spanish: se le perdona poco
  alternatives_spanish:
  - le es perdonado poco
  - es perdonado poco
  lexicon: BDAG
  rationale: 'En español resulta más natural la pasiva refleja con dativo implícito: ''se le perdona poco''. Conserva el valor cuantitativo de ὀλίγον.'
- source_word: ὀλίγον ἀγαπᾷ
  english_pob_choice: loves little
  chosen_spanish: poco ama
  alternatives_spanish:
  - ama poco
  - ama escasamente
  lexicon: BDAG
  rationale: Se mantiene el paralelismo sintético del griego; 'poco ama' suena más enfático y proverbial que la forma más común 'ama poco'.
theological_decisions:
- issue: Relación entre el amor de la mujer y el perdón recibido
  english_pob_reading: Translate ὅτι as 'because' while understanding her love as evidential/confirmatory within the discourse, not as earning forgiveness.
  chosen_spanish_reading: Traducir 'porque' y leer el amor como evidencia/confirmación dentro del discurso, no como mérito que compra el perdón.
  alternative_spanish_readings:
  - traducir 'por lo cual'
  - traducir 'por tanto' para evitar una causalidad meritoria
  rationale: El griego conserva una causalidad verbal compacta, pero el contexto inmediato y la parábola previa muestran que el perdón precede y produce el amor. La traducción mantiene la tensión sin resolverla por paráfrasis explicativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente griego y el audito inglés: conserva el giro causal/inferencial de οὗ χάριν, el perfecto pasivo de ἀφέωνται, y la tensión teológica en ὅτι sin suavizarla. No se aplicaron revisiones posteriores.'
  spanish_consistency_notes:
  - Se mantiene 'pecados' para ἁμαρτίαι y 'perdonar' para ἀφίημι en coherencia con el pasaje.
  - Se usa 'amar' para ἀγαπάω conforme al criterio del proyecto.
  - La puntuación reproduce la oposición fuerte entre ambas mitades del versículo con dos oraciones separadas por punto y coma y punto final.
