translation:
  language: es
  text: Sin embargo, la sabiduría fue vindicada por todos sus hijos[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue justificada» o «se demostró correcta».
    reason: lexical_alternative
  - marker: b
    text: «Hijos» es una metáfora de quienes muestran la verdad de la sabiduría mediante su respuesta o su manera de vivir.
    reason: lexical_alternative
  - marker: c
    text: 'Compárese Mateo 11:19: «la sabiduría es vindicada por sus obras».'
    reason: cross_reference
lexical_decisions:
- source_word: ἐδικαιώθη
  english_pob_choice: was vindicated
  chosen_spanish: fue vindicada
  alternatives_spanish:
  - fue justificada
  - fue probada correcta
  lexicon: BDAG
  rationale: El aoristo pasivo de δικαιόω aquí no apunta a la justificación forense paulina, sino a quedar demostrada como correcta ante la evidencia. «Fue vindicada» conserva el pasivo y el sentido público de validación.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  lexicon: BDAG
  rationale: «Sabiduría» es la equivalencia normal de σοφία y mantiene la personificación del dicho. «Prudencia» sería demasiado restrictivo y cambiaría el alcance del término.
- source_word: ἀπὸ πάντων
  english_pob_choice: by all
  chosen_spanish: por todos
  alternatives_spanish:
  - de todos
  - a causa de todos
  lexicon: BDAG
  rationale: Con verbo pasivo, ἀπό puede marcar agencia o fuente. En español, «por todos» expresa de forma natural que la sabiduría queda vindicada mediante el testimonio o la respuesta de todos los vinculados con ella.
- source_word: τέκνων
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendencia
  - criados
  lexicon: BDAG
  rationale: τέκνον significa literalmente «hijo»/«hijo o hija». En un sintagma posesivo con «sabiduría» personificada, «hijos» conserva la imagen metafórica sin explicarla en exceso. «Niños» sonaría más estrecho y menos idiomático en español bíblico.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: sus
  alternatives_spanish:
  - de ella
  lexicon: BDAG
  rationale: Aunque el griego usa pronombre femenino por la personificación de σοφία, el español suena más natural con «sus hijos». La referencia a sabiduría queda clara por el antecedente inmediato.
- source_word: καὶ
  english_pob_choice: Yet
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Sin embargo
  lexicon: BDAG
  rationale: Aquí καί puede funcionar de manera continuativa y, en el flujo de la unidad, no exige un adversativo fuerte en español. Se mantiene con «Y» para no sobreinterpretar el matiz.
theological_decisions:
- issue: Sentido de «los hijos de la sabiduría»
  english_pob_reading: A metaphor for those who align with or embody God's wisdom, rendered literally as 'children' in the main text.
  chosen_spanish_reading: Una metáfora de quienes muestran, encarnan o confirman la sabiduría por su respuesta, mantenida literalmente como «hijos» en el texto principal.
  alternative_spanish_readings:
  - Los frutos de la sabiduría
  - Las obras de la sabiduría
  - Los seguidores de la sabiduría
  rationale: El griego de Lucas dice τέκνων, no «obras», y conviene conservar la imagen filial. La nota permite aclarar el valor metafórico sin borrar la tensión textual ni armonizar prematuramente con Mateo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se requirieron cambios en la revisión más reciente; el borrador anterior fue mantenido por alto grado de acuerdo y sin observaciones sustantivas.
  spanish_consistency_notes:
  - Se conserva «sabiduría» para σοφία y «vindicada» para δικαιόω, evitando importar sin motivo el lenguaje paulino de justificación.
  - Se mantiene la metáfora de «hijos» en el texto principal y se explica en nota, para no resolver la tensión entre Lucas 7:35 y Mateo 11:19.
  - Se usa «Y» inicial por continuidad discursiva, sin añadir contraste explícito que el griego no exige con certeza.
