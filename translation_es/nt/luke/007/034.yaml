revisions:
- from: 'El Hijo del Hombre ha venido comiendo y bebiendo[a], y ustedes dicen: «Miren, un hombre glotón y bebedor de vino, amigo de recaudadores de impuestos y de pecadores».'
  to: 'El Hijo del Hombre ha venido comiendo y bebiendo, y ustedes dicen: «Miren, un glotón y un borracho,[a] amigo de recaudadores de impuestos y de pecadores».'
  rationale: Se revisa el texto principal para que el insulto tenga en español la misma fuerza contextual que en el griego y en la decisión auditada del POB inglés. «Borracho» expresa mejor el carácter peyorativo de οἰνοπότης, mientras que la nota conserva la alternativa más literal con «un hombre ... bebedor de vino».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:59:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro del POB inglés: conserva «ha venido», el título «el Hijo del Hombre», los participios «comiendo y bebiendo», y la serie acusatoria final. También preserva correctamente la nota alternativa sobre la presencia explícita de ἄνθρωπος. Sin embargo, «bebedor de vino» para οἰνοπότης, aunque defendible como literal en nota, suena menos idiomático y menos claramente peyorativo en español que el valor del insulto en contexto; el POB inglés eligió «drunkard» en el texto principal precisamente para conservar esa fuerza.'
  spanish_quality_summary: El español es claro y legible, con buen registro general. «Miren» y «recaudadores de impuestos» funcionan bien. La principal debilidad estilística/semántica es «un hombre glotón y bebedor de vino», que en español resulta algo rígido y atenúa la acusación. «un glotón y un borracho» o similar comunica mejor el tono hostil. También conviene mantener la alternativa más literal en nota para reflejar la documentación léxica.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «El Hijo del Hombre», «pecadores» y «recaudadores de impuestos» están alineados. El ajuste propuesto no afecta glosario troncal; solo mejora la representación contextual de οἰνοπότης conforme a la rationale auditada en inglés.
  issues:
  - severity: medium
    issue: οἰνοπότης está traducido en el texto principal como «bebedor de vino».
    rationale: Aunque es más literal, en español moderno no transmite tan claramente el insulto como sí lo hace el griego en este contexto y como lo documenta el POB inglés con «drunkard». Conviene usar «borracho» en el texto principal y dejar «bebedor de vino» en nota como alternativa literal.
  - severity: low
    issue: La frase «un hombre glotón y bebedor de vino» suena algo pesada en español.
    rationale: La construcción con «un hombre» más dos calificativos reduce la naturalidad. El español idiomático puede omitir «hombre» en el texto principal sin perder sentido, especialmente porque la nota ya preserva la alternativa más literal con ἄνθρωπος explícito.
  revised_spanish_text: 'El Hijo del Hombre ha venido comiendo y bebiendo, y ustedes dicen: «Miren, un glotón y un borracho,[a] amigo de recaudadores de impuestos y de pecadores».'
  revised_footnotes:
  - marker: a
    text: 'O más literalmente: «Miren, un hombre, glotón y bebedor de vino».'
    reason: lexical_alternative
  revision_rationale: Se revisa el texto principal para que el insulto tenga en español la misma fuerza contextual que en el griego y en la decisión auditada del POB inglés. «Borracho» expresa mejor el carácter peyorativo de οἰνοπότης, mientras que la nota conserva la alternativa más literal con «un hombre ... bebedor de vino».
