translation:
  language: es
  text: 'El Hijo del Hombre ha venido comiendo y bebiendo, y ustedes dicen: «Miren, un glotón y un borracho,[a] amigo de recaudadores de impuestos y de pecadores».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «Miren, un hombre, glotón y bebedor de vino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλήλυθεν
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - vino
  - ha llegado
  lexicon: BDAG
  rationale: El perfecto griego expresa llegada con resultado presente; «ha venido» conserva ese valor de presencia/arribo y suena natural en español bíblico contemporáneo.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hombre
  lexicon: BDAG
  rationale: Se mantiene el título cristológico tradicional y reconocible, sin diluir su fuerza idiomática ni su posible resonancia daniélica.
- source_word: ἐσθίων καὶ πίνων
  english_pob_choice: eating and drinking
  chosen_spanish: comiendo y bebiendo
  alternatives_spanish:
  - mientras come y bebe
  - en medio de comer y beber
  lexicon: BDAG
  rationale: Los participios presentes describen el modo concomitante de su venida; el gerundio español comunica bien esa simultaneidad sin sobreexplicar.
- source_word: λέγετε
  english_pob_choice: you say
  chosen_spanish: ustedes dicen
  alternatives_spanish:
  - dicen
  - están diciendo
  lexicon: BDAG
  rationale: El presente en segunda persona plural se expresa de forma directa con «ustedes dicen»; el pronombre explícito ayuda a conservar el tono acusatorio del discurso directo.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren ahí
  - Vean
  lexicon: BDAG
  rationale: «Miren» reproduce la fuerza deíctica/exclamativa de Ἰδοὺ en un registro natural y no arcaizante.
- source_word: ἄνθρωπος
  english_pob_choice: a
  chosen_spanish: un hombre
  alternatives_spanish:
  - un ser humano
  - un individuo
  lexicon: BDAG
  rationale: En la acusación insultante, el sustantivo se conserva explícito para reflejar la construcción griega y la dureza del reproche.
- source_word: φάγος
  english_pob_choice: glutton
  chosen_spanish: glotón
  alternatives_spanish:
  - comilón
  - tragón
  lexicon: BDAG
  rationale: «Glotón» transmite bien el insulto lexical y mantiene el tono acusatorio sin suavizarlo.
- source_word: οἰνοπότης
  english_pob_choice: drunkard
  chosen_spanish: bebedor de vino
  alternatives_spanish:
  - borracho
  - amigo del vino
  lexicon: BDAG
  rationale: La forma griega es literalmente «bebedor de vino»; se conserva esa imagen para no perder la tensión lexical documentada por el POB inglés, aunque en español el insulto no quede automáticamente resumido como «borracho».
- source_word: φίλος
  english_pob_choice: a friend
  chosen_spanish: amigo
  alternatives_spanish:
  - amigo de
  - compañero
  lexicon: BDAG
  rationale: Se mantiene la relación nominal simple del griego. El contexto hace claro que se trata de asociación, no necesariamente de aprobación.
- source_word: τελωνῶν
  english_pob_choice: tax collectors
  chosen_spanish: recaudadores de impuestos
  alternatives_spanish:
  - publicanos
  - cobradores de impuestos
  lexicon: BDAG
  rationale: «Recaudadores de impuestos» es el equivalente moderno y transparente; se evita «publicanos» por ser más eclesiástico y menos inmediato para lectores hispanos actuales.
- source_word: ἁμαρτωλῶν
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - personas pecadoras
  - malvados
  lexicon: BDAG
  rationale: «Pecadores» conserva la etiqueta social-religiosa utilizada por los opositores de Jesús, sin diluirla en una perífrasis.
theological_decisions:
- issue: Título cristológico ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Hombre
  rationale: Se conserva el título tradicional para mantener su peso cristológico e intertextual; una traducción más dinámica podría ocultar esa carga.
  doctrine_reference: 'Affirmations; Translation philosophy #2 y #3'
- issue: Alcance de la acusación en ἄνθρωπος φάγος καὶ οἰνοπότης
  english_pob_reading: glutton and a drunkard
  chosen_spanish_reading: un hombre glotón y bebedor de vino
  alternative_spanish_readings:
  - glotón y borracho
  - un glotón y un borracho
  rationale: El texto reporta una calumnia hostil, no una evaluación moral del narrador. Se conserva el filo del insulto sin domesticarlo, y se preserva la literalidad de οἰνοπότης donde el griego así lo permite.
  doctrine_reference: 'Translation philosophy: primacía del texto fuente y preservación de tensiones léxicas'
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantiene estable: el pass más reciente no introdujo cambios y el cruce de revisión mostró alta concordancia. La redacción española sigue esa solución, conservando la tensión entre el insulto idiomático y la alternativa más literal para οἰνοπότης.'
  spanish_consistency_notes:
  - Se usa «Hijo del Hombre» de forma consistente como título cristológico.
  - Se prefiere «recaudadores de impuestos» para τελώνης en este registro.
  - Se traduce Ἰδοὺ con «Miren» para conservar el tono deíctico sin arcaísmo.
  - Se mantiene «pecadores» como término relacional-social del texto, no como generalización moral del narrador.
  - El insulto final conserva la estructura acusatoria y no se suaviza con perífrasis explicativas en el texto principal.
