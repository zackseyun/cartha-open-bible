translation:
  language: es
  text: y, de pie detrás de él, a sus pies, llorando, comenzó a humedecer sus pies con sus lágrimas, y los limpiaba con el cabello de su cabeza, y besaba[a] sus pies y los ungía con el perfume[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seguía besando sus pies»; el verbo griego es intensivo y el imperfecto sugiere acción repetida.
    reason: lexical_alternative
  - marker: b
    text: O «con ungüento» o «con aceite perfumado»; la palabra griega se refiere a aceite o ungüento perfumado.
    reason: lexical_alternative
lexical_decisions:
- source_word: στᾶσα
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - estando de pie
  - puesta de pie
  lexicon: BDAG
  rationale: El participio aoristo describe una acción de encuadre. «De pie» suena natural en español y conserva la postura sin volver la frase rígida.
- source_word: ὀπίσω παρὰ τοὺς πόδας αὐτοῦ
  english_pob_choice: behind him at his feet
  chosen_spanish: detrás de él, a sus pies
  alternatives_spanish:
  - detrás de él, junto a sus pies
  - tras él, a sus pies
  lexicon: BDAG
  rationale: La combinación expresa ubicación posterior y cercana. «A sus pies» es idiomático en español y conserva la imagen del acercamiento corporal en el contexto de una comida reclinada.
- source_word: κλαίουσα
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - sollozando
  lexicon: BDAG
  rationale: El participio indica llanto continuo o sostenido. «Llorando» reproduce bien ese valor aspectual en español.
- source_word: τοῖς δάκρυσιν ἤρξατο βρέχειν
  english_pob_choice: she began to wet
  chosen_spanish: comenzó a humedecer
  alternatives_spanish:
  - empezó a mojar
  - comenzó a empapar
  lexicon: BDAG
  rationale: ἤρξατο + infinitivo marca inicio de la acción; βρέχω es «mojar/humedecer». «Humedecer» evita exagerar el efecto y mantiene el matiz de comienzo.
- source_word: ἐξέμασσεν
  english_pob_choice: she was wiping
  chosen_spanish: los secaba
  alternatives_spanish:
  - los estaba secando
  - los limpiaba
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continua. «Los secaba» comunica la acción repetida y el resultado práctico del verbo sin sonar forzado en español.
- source_word: ταῖς θριξὶν τῆς κεφαλῆς αὐτῆς
  english_pob_choice: with the hair of her head
  chosen_spanish: con el cabello de su cabeza
  alternatives_spanish:
  - con su cabello
  - con los cabellos de su cabeza
  lexicon: BDAG
  rationale: La expresión griega es explícita; «el cabello de su cabeza» preserva esa concreción, aunque «su cabello» sería más breve. Se prefiere la forma más transparente al original.
- source_word: κατεφίλει
  english_pob_choice: was kissing his feet
  chosen_spanish: besaba sus pies
  alternatives_spanish:
  - seguía besando sus pies
  - los besaba repetidamente
  lexicon: BDAG
  rationale: El compuesto intensivo y el imperfecto sugieren acción reiterada, pero el texto principal evita añadir adverbios interpretativos. «Besaba» conserva la repetición implícita sin expandirla.
- source_word: ἤλειφεν
  english_pob_choice: anointing
  chosen_spanish: los ungía
  alternatives_spanish:
  - los estaba unguiendo
  - los perfumaba
  lexicon: BDAG
  rationale: ἀλείφω en este contexto es ungir/aplicar aceite o perfume. «Ungía» mantiene el verbo tradicional y el sentido de aplicación ritual o corporal.
- source_word: τῷ μύρῳ
  english_pob_choice: with the perfume
  chosen_spanish: con el perfume
  alternatives_spanish:
  - con el ungüento
  - con el aceite perfumado
  lexicon: BDAG
  rationale: μύρον denota aceite perfumado o ungüento aromático. «Perfume» sigue la decisión del POB inglés por ser claro y natural en español, sin perder la referencia a una sustancia aromática.
theological_decisions:
- issue: Intensidad corporal y emocional de la escena
  english_pob_reading: Retained the concrete bodily actions without softening their emotional intensity or importing devotional interpretation.
  chosen_spanish_reading: Se conservan los gestos concretos del cuerpo y la emoción sin suavizarlos ni añadir interpretación devocional.
  alternative_spanish_readings:
  - Se minimizan los gestos repetidos para un estilo más sobrio
  - Se parafrasea como gesto de devoción
  rationale: El griego presenta una escena vívida y humillante de arrepentimiento/afecto. La traducción debe mantener la fuerza narrativa sin convertirla en comentario teológico.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés, que retiró «fervently» del texto principal para no expandir interpretativamente κατεφίλει. En español se hizo lo mismo: se conservó el valor intensivo por el imperfecto y el verbo compuesto en la nota, no en el cuerpo principal.'
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según el sistema POB; aquí no aparece ninguna de esas formas.
  - Se evita «Cristo» porque este versículo no contiene Χριστός.
  - «Ungía» conserva el campo semántico de ἀλείφω sin sustituirlo por una expresión más débil.
  - Las notas a y b están ancladas en el texto exactamente donde surge la alternativa lexical.
