review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: los discípulos informan a Juan sobre «todas estas cosas», y la cláusula siguiente queda abierta con coma final, en continuidad con el versículo siguiente. También respeta adecuadamente el valor de ἀπήγγειλαν como «informaron» y la sintaxis partitiva de «dos de sus discípulos». Sin embargo, la nota al pie mezcla dos funciones distintas y atribuye de forma imprecisa al griego una literalidad extraña («dos ciertos/algunos»). Además, el rastro inglés auditado distingue dos notas: una para la alternativa léxica de προσκαλεσάμενος y otra para la continuación sintáctica; conviene reflejar esa documentación de manera más limpia en español.'
  spanish_quality_summary: El español es natural, claro y eclesialmente legible. «Le informaron a Juan acerca de todas estas cosas» suena bien, aunque «a Juan» sin clítico también sería suficiente. «Y Juan, llamando a dos de sus discípulos» es comprensible, pero la documentación de la nota puede mejorar para evitar una formulación torpe en español. La puntuación final con coma está bien preservada.
  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. «Discípulos» concuerda con la política del proyecto para μαθηταί. No aparecen Yahvé, Mesías/Cristo, Espíritu, esclavo, etc. La decisión sobre τινὰς debe explicarse con más precisión, pero no requiere cambio fuerte en el texto principal.
  issues:
  - severity: medium
    issue: La nota [a] combina la alternativa léxica de προσκαλεσάμενος con la observación sintáctica sobre la cláusula inconclusa.
    rationale: El audit trail inglés separa estas ideas en notas distintas. En español, combinarlas en una sola nota hace menos clara la evidencia y dificulta rastrear qué elemento comenta cada observación.
  - severity: medium
    issue: La frase de la nota «el griego dice literalmente “a dos ciertos/algunos de sus discípulos”» es poco natural y algo imprecisa.
    rationale: τινὰς aporta indefinición o selección no especificada, pero «ciertos/algunos» no debe presentarse como una literalidad rígida ni como la mejor expresión española en esta nota. Conviene explicarlo como matiz de selección no especificada.
  - severity: low
    issue: La ancla [a] está puesta al final de «discípulos», aunque la nota comenta principalmente el participio «llamando/convocando».
    rationale: No es incorrecto, pero una colocación tras «llamando» o tras la frase verbal completa sería más exacta. Aun así, puede mantenerse si la nota se formula de manera amplia sobre la frase.
