translation:
  language: es
  text: Y sus discípulos le informaron a Juan acerca de todas estas cosas. Y Juan, llamando[a] a dos de sus discípulos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «convocando».'
    reason: lexical_alternative
  - marker: b
    text: El griego incluye un matiz de selección no especificada en «a dos de sus discípulos», y la oración continúa en el versículo siguiente; por eso esta traducción conserva la coma final.
    reason: cross_reference_and_lexical_nuance
lexical_decisions:
- source_word: ἀπήγγειλαν
  english_pob_choice: reported
  chosen_spanish: informaron
  alternatives_spanish:
  - reportaron
  - dieron cuenta
  lexicon: BDAG
  rationale: El verbo comunica la transmisión de noticias o informes. «Informaron» conserva el sentido narrativo de relatar lo ocurrido sin cargarlo con un matiz demasiado formal o técnico; «reportaron» es posible, pero menos natural en español bíblico general.
- source_word: Ἰωάννῃ
  english_pob_choice: to John
  chosen_spanish: a Juan
  alternatives_spanish:
  - para Juan
  - a Juan el Bautista
  lexicon: Sintaxis dativa / español idiomático
  rationale: El dativo indirecto se expresa naturalmente con «a Juan». Se mantiene el nombre propio sin añadir un identificador que no está en el griego inmediato.
- source_word: μαθηταὶ
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  - alumnos
  lexicon: BDAG
  rationale: «Discípulos» es la equivalencia estable y precisa en contexto evangélico, mejor que «seguidores» y mucho más fiel que «alumnos».
- source_word: περὶ πάντων τούτων
  english_pob_choice: all these things
  chosen_spanish: acerca de todas estas cosas
  alternatives_spanish:
  - sobre todas estas cosas
  - de todas estas cosas
  lexicon: BDAG
  rationale: «Περὶ» conserva el matiz de referencia temática; en español, «acerca de» expresa bien el contenido del informe. «Todas estas cosas» preserva la comprehensividad de πάντων y τούτων.
- source_word: προσκαλεσάμενος
  english_pob_choice: calling ... to him
  chosen_spanish: llamando
  alternatives_spanish:
  - llamando hacia sí
  - convocando
  lexicon: BDAG
  rationale: El participio medio indica iniciativa de Juan al llamar. En español, «llamando» comunica el inicio de la acción sin introducir un complemento direccional que el texto griego no explicita aquí.
- source_word: δύο τινὰς
  english_pob_choice: two certain ones
  chosen_spanish: a dos
  alternatives_spanish:
  - a dos ciertos
  - a dos algunos
  lexicon: BDAG
  rationale: El griego enfatiza que no eran simplemente «dos» de manera neutra, sino «dos ciertos / algunos». En español, la forma más natural y precisa en esta cláusula es «a dos de sus discípulos», mientras que la nota aclara la indefinición de τινὰς.
- source_word: τῶν μαθητῶν αὐτοῦ
  english_pob_choice: of his disciples
  chosen_spanish: de sus discípulos
  alternatives_spanish:
  - de entre sus discípulos
  - de los discípulos de él
  lexicon: Sintaxis partitiva
  rationale: 'La construcción genitiva es partitiva: Juan selecciona dos del grupo de sus discípulos. «De sus discípulos» es idiomático y suficientemente claro en español.'
- source_word: ὁ Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - el Juan
  lexicon: Repetición del sujeto
  rationale: Se conserva la repetición enfática del sujeto que el griego reintroduce tras el participio, algo natural en español al iniciar una nueva proposición con «Y Juan».
theological_decisions:
- issue: Valor de τινὰς en «dos ciertos/algunos de sus discípulos»
  english_pob_reading: The revised English audit trail retains 'two certain ones of his disciples' to reflect the indefiniteness of τινὰς.
  chosen_spanish_reading: '«llamando a dos de sus discípulos» con nota que explicita «o: convocando a dos de sus discípulos» / «dos ciertos de sus discípulos»'
  alternative_spanish_readings:
  - llamando a dos ciertos de sus discípulos
  - convocando a dos de sus discípulos
  rationale: 'No se debe borrar la tensión semántica de τινὰς: indica selección indefinida o no especificada. En el texto principal, la construcción española más fluida es «a dos de sus discípulos», y la nota preserva la alternativa más literal/explicativa.'
  doctrine_reference: Precisión semántica del texto fuente; no doctrinal.
- issue: Cláusula participial en suspenso
  english_pob_reading: The English POB preserves the unfinished sense with a trailing comma.
  chosen_spanish_reading: 'Mantener la cláusula abierta con coma final: «Y Juan, llamando a dos de sus discípulos[a],»'
  alternative_spanish_readings:
  - Y Juan llamó a dos de sus discípulos.
  - Y Juan, al llamar a dos de sus discípulos, ...
  rationale: El griego continúa en el versículo siguiente; una puntuación cerrada falsearía la sintaxis. La coma final reproduce el carácter incompleto de la frase y deja visible la continuidad.
  doctrine_reference: Coherencia sintáctica y textual; no doctrinal.
translation_notes:
  revision_awareness: El inglés auditado revisó la segunda cláusula para reflejar τινὰς como «two certain ones» y retiró «to him» por no estar explícito. La versión española sigue esa revisión al conservar una referencia indefinida («a dos de sus discípulos») y al dejar la frase abierta con coma final, sin añadir un complemento direccional no expresado por el griego.
  spanish_consistency_notes:
  - Se usa «discípulos» de manera consistente para μαθηταί.
  - Se mantiene «Juan» sin glosa adicional, siguiendo la reintroducción explícita del sujeto en el griego.
  - Se conserva la continuidad sintáctica con coma final para respetar que el versículo no termina la oración.
  - No se emplea «SEÑOR» ni terminología cultual añadida, pues no hay aquí referencia a κύριος o al nombre divino.
