translation:
  language: es
  text: Y el muerto se sentó[a] y comenzó a hablar, y se lo dio a su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se lo devolvió a su madre' / 'se lo dio de vuelta a su madre'. El griego simplemente dice 'se lo dio a su madre', y el sentido de restauración se infiere por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεκάθισεν
  english_pob_choice: sat up
  chosen_spanish: se sentó
  alternatives_spanish:
  - se incorporó
  - se sentó erguido
  lexicon: BDAG
  rationale: El verbo indica pasar de la postura acostada a la sentada. En español, 'se sentó' comunica ese cambio de postura de manera natural y fiel; 'se incorporó' también sería posible, pero 'se sentó' conserva mejor la imagen concreta del texto.
- source_word: ὁ νεκρός
  english_pob_choice: the dead man
  chosen_spanish: el muerto
  alternatives_spanish:
  - el hombre muerto
  - el difunto
  lexicon: BDAG
  rationale: 'El griego usa un sustantivo sustantivado: ''el muerto''. En español, esa forma mantiene la fuerza simple y personal del referente sin suavizarla con ''difunto'', que sería más eufemístico, ni explicitar ''hombre'' cuando el griego no lo hace.'
- source_word: ἤρξατο λαλεῖν
  english_pob_choice: began to speak
  chosen_spanish: comenzó a hablar
  alternatives_spanish:
  - empezó a hablar
  - comenzó a decir
  lexicon: BDAG
  rationale: La construcción ingresiva ἄρχομαι + infinitivo se refleja bien con 'comenzó a'. 'Hablar' corresponde mejor a λαλέω aquí que 'decir', porque el énfasis está en que recupera la capacidad de hablar, no en un contenido verbal específico.
- source_word: ἔδωκεν αὐτὸν τῇ μητρὶ αὐτοῦ
  english_pob_choice: he gave him to his mother
  chosen_spanish: lo entregó a su madre
  alternatives_spanish:
  - se lo dio a su madre
  - lo dio a su madre
  lexicon: BDAG
  rationale: El verbo δίδωμι significa simplemente 'dar'. En español, 'lo entregó a su madre' suena natural y puede sugerir la acción de ponerlo nuevamente en manos de ella, pero sin añadir explícitamente 'de vuelta' como parte obligatoria del texto. 'Se lo dio' sería idiomático, aunque introduce una reestructuración más marcada.
theological_decisions:
- issue: Si explicitar la idea de restauración con 'de vuelta' o 'otra vez' al final de la cláusula
  english_pob_reading: Retain the simple wording 'he gave him to his mother'
  chosen_spanish_reading: Mantener una formulación simple sin añadir explícitamente 'de vuelta'
  alternative_spanish_readings:
  - lo devolvió a su madre
  - se lo dio de vuelta a su madre
  rationale: El contexto narrativo implica restauración, pero el griego solo dice que 'lo dio a su madre'. La traducción evita intensificar la escena más allá del verbo utilizado, preservando la tensión entre el dato literal y la implicación contextual.
  doctrine_reference: 'Translation philosophy: optimal equivalence; no paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y no requiere cambios adicionales; se mantiene la equivalencia óptima con fidelidad al texto griego y al audit trail inglés.
  spanish_consistency_notes:
  - 'Se conserva el orden narrativo del griego con tres acciones coordinadas: sentarse, comenzar a hablar y darlo a su madre.'
  - Se evita 'SEÑOR' u otra máscara porque este versículo no contiene el nombre divino.
  - '''El muerto'' preserva el sustantivo sustantivado del griego y la referencia al joven previamente fallecido.'
  - La nota al pie recoge la alternativa restaurativa que el inglés POB preservó, para no perder la tensión lexical del verbo δίδωμι.
