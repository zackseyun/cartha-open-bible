translation:
  language: es
  text: Por eso ni siquiera me consideré digno de venir a ti. Pero di la palabra[a], y que mi siervo sea sanado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi muchacho» o «mi hijo»; la palabra griega puede referirse a un niño, un joven o un siervo, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: La partícula introduce una consecuencia lógica del relato anterior. «Por eso» comunica la inferencia de forma natural en español sin volverla más solemne de lo que exige el griego.
- source_word: οὐδὲ
  english_pob_choice: did not even
  chosen_spanish: no me consideré
  alternatives_spanish:
  - ni siquiera me consideré
  - no me juzgué
  lexicon: BDAG
  rationale: 'La negación intensiva está integrada en el verbo: el hablante expresa que ni siquiera se atribuyó la dignidad necesaria. En español, la idea queda bien expresada con «no me consideré» en el contexto de la inferencia previa.'
- source_word: ἐμαυτὸν ἠξίωσα
  english_pob_choice: I considered myself worthy
  chosen_spanish: me consideré digno
  alternatives_spanish:
  - me juzgué digno
  - me tuve por digno
  - me estimé digno
  lexicon: BDAG
  rationale: ἀξιόω aquí significa considerar digno o merecedor. «Me consideré digno» reproduce el valor reflexivo y la evaluación personal sin forzar una construcción poco natural en español.
- source_word: πρὸς σὲ ἐλθεῖν
  english_pob_choice: to come to you
  chosen_spanish: de ir a ti
  alternatives_spanish:
  - de venir a ti
  - de acercarme a ti
  lexicon: BDAG
  rationale: El infinitivo de movimiento expresa la acción de presentarse ante Jesús. «Ir a ti» suena natural en español y conserva la dirección personal del acercamiento.
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sino
  - Más bien
  lexicon: BDAG
  rationale: Introduce el contraste entre la no-presencia personal y la petición confiada. «Pero» es la forma más directa y clara en español.
- source_word: εἰπὲ λόγῳ
  english_pob_choice: say the word
  chosen_spanish: di la palabra
  alternatives_spanish:
  - habla con una palabra
  - pronuncia una palabra
  lexicon: BDAG
  rationale: La construcción dativa es idiomática y apunta a una orden eficaz pronunciada por Jesús. «Di la palabra» conserva el carácter autoritativo de la expresión y mantiene la fuerza del lenguaje bíblico en español.
- source_word: ἰαθήτω
  english_pob_choice: let my servant be healed
  chosen_spanish: que mi siervo sea sanado
  alternatives_spanish:
  - y que mi siervo sea curado
  - y que mi siervo quede sano
  lexicon: BDAG
  rationale: El aoristo pasivo imperativo pide que el resultado ocurra. «Que ... sea sanado» conserva la fuerza imperativa dirigida al efecto deseado; «sanado» mantiene un registro bíblico claro y preciso.
- source_word: ὁ παῖς μου
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi muchacho
  - mi niño
  - mi hijo
  lexicon: BDAG
  rationale: Aunque παῖς puede significar niño, muchacho o siervo, el contexto narrativo favorece la relación de dependencia propia de un sirviente bajo autoridad. «Siervo» comunica esa relación con claridad en español, mientras la nota preserva el rango semántico.
theological_decisions:
- issue: Valor de παῖς en la petición del centurión
  english_pob_reading: my servant
  chosen_spanish_reading: mi siervo
  alternative_spanish_readings:
  - mi muchacho
  - mi niño
  - mi hijo
  rationale: El contexto inmediato presenta a un centurión hablando de alguien bajo su autoridad. Traducirlo como «siervo» evita introducir una relación familiar que el pasaje no exige, pero la nota conserva la amplitud semántica del término griego.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave o excepción documentada)
- issue: Forma del ruego respecto de la sanidad
  english_pob_reading: let my servant be healed
  chosen_spanish_reading: que mi siervo sea sanado
  alternative_spanish_readings:
  - y que mi siervo sea curado
  - que mi siervo sea curado
  rationale: El griego usa una forma imperativa pasiva de resultado deseado. «Que ... sea sanado» preserva esa fuerza sin convertirla en una simple predicción futura; así se mantiene la tensión gramatical del texto original.
  doctrine_reference: Gramática del imperativo pasivo en el griego koiné
translation_notes:
  revision_awareness: 'El texto coincide con la última revisión del audit trail: no hay revisiones aplicadas y el estado de acuerdo fue alto, por lo que la redacción española mantiene la lectura principal de la POB inglesa sin cambios sustantivos.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «siervo» para παῖς conforme al contexto narrativo del centurión y a la decisión auditada de la POB inglesa.
  - Se conserva un español sobrio y eclesialmente legible, evitando calcos rígidos como «decir una palabra».
  - La nota al pie preserva la ambigüedad léxica documentada sin debilitar la opción principal del texto.
