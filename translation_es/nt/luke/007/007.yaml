  rationale: Se añadió «ni siquiera» para reflejar οὐδὲ, se cambió «ir a ti» por «venir a ti» por naturalidad y precisión contextual, y se afinó la nota para que las alternativas en español sean más naturales y plausibles en este pasaje, manteniendo la justificación léxica documentada para παῖς.
