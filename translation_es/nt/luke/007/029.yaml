translation:
  language: es
  text: Y todo el pueblo, al oír esto, incluidos los recaudadores de impuestos, reconoció que Dios era justo[a], habiendo sido bautizado con el bautismo de Juan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más formalmente, «justificó a Dios». Aquí el sentido es que reconoció que Dios estaba en lo correcto.
    reason: lexical_alternative
  - marker: b
    text: 'El participio también puede entenderse causalmente: «porque había sido bautizado con el bautismo de Juan».'
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς ὁ λαὸς
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - el pueblo entero
  lexicon: BDAG
  rationale: La expresión griega es colectiva y abarca al conjunto del pueblo. «Todo el pueblo» conserva esa amplitud en español sin sonar rígido.
- source_word: ἀκούσας
  english_pob_choice: when they heard this
  chosen_spanish: al oír esto
  alternatives_spanish:
  - cuando oyeron esto
  - habiendo oído esto
  lexicon: BDAG
  rationale: El participio aoristo funciona adverbialmente y aquí es temporal. «Al oír esto» es natural en español y mantiene la relación implícita con el contexto inmediato.
- source_word: τελῶναι
  english_pob_choice: tax collectors
  chosen_spanish: recaudadores de impuestos
  alternatives_spanish:
  - cobradores de impuestos
  - publicanos
  lexicon: BDAG
  rationale: Se prefiere una forma clara y moderna. «Recaudadores de impuestos» comunica el oficio sin depender de un término eclesiástico tradicional menos transparente.
- source_word: ἐδικαίωσαν τὸν θεόν
  english_pob_choice: declared God to be righteous
  chosen_spanish: reconocieron que Dios era justo
  alternatives_spanish:
  - declararon que Dios era justo
  - justificaron a Dios
  lexicon: BDAG
  rationale: Con objeto «Dios», δικαιόω expresa reconocer que Dios está en lo correcto, no causarle justicia. «Reconocieron que Dios era justo» conserva el sentido forense sin sugerir que los humanos hacen justo a Dios. «Justificaron a Dios» es más literal, pero en español puede sonar ambiguo o teológicamente confuso.
- source_word: βαπτισθέντες
  english_pob_choice: having been baptized
  chosen_spanish: habiendo sido bautizados
  alternatives_spanish:
  - porque habían sido bautizados
  - después de haber sido bautizados
  lexicon: BDAG
  rationale: Se mantiene la estructura participial sin resolverla como causal. El griego permite una relación circunstancial o posiblemente causal; la forma elegida preserva esa tensión.
- source_word: τὸ βάπτισμα Ἰωάννου
  english_pob_choice: with John's baptism
  chosen_spanish: con el bautismo de Juan
  alternatives_spanish:
  - con el bautismo de Juan el Bautista
  - en el bautismo de Juan
  lexicon: BDAG
  rationale: La construcción cognada se expresa de forma natural con «con». «El bautismo de Juan» conserva la referencia al rito asociado con Juan sin añadir matices ajenos al texto.
theological_decisions:
- issue: Sentido de ἐδικαίωσαν τὸν θεόν
  english_pob_reading: The people acknowledged or affirmed that God was righteous / in the right.
  chosen_spanish_reading: El pueblo y los recaudadores de impuestos reconocieron que Dios era justo.
  alternative_spanish_readings:
  - justificaron a Dios
  - declararon a Dios justo
  rationale: El pasaje no describe un cambio en Dios, sino la respuesta humana que confirma su rectitud. La redacción escogida evita una lectura teológicamente errónea y conserva el matiz judicial de δικαιόω.
  doctrine_reference: 'Translation philosophy: preserve source meaning in readable modern Spanish; avoid importing doctrinal claims the text does not make.'
- issue: Relación de βαπτισθέντες con la acción principal
  english_pob_reading: The participle is rendered as circumstantial/background rather than explicitly causal.
  chosen_spanish_reading: 'Se traduce como un participio circunstancial: «habiendo sido bautizados con el bautismo de Juan».'
  alternative_spanish_readings:
  - porque habían sido bautizados con el bautismo de Juan
  - después de haber sido bautizados con el bautismo de Juan
  rationale: La forma griega permite leer la frase como trasfondo de la reacción, pero no obliga a una causalidad explícita. La traducción conserva esa ambigüedad productiva en lugar de fijarla de más.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la coordinación de οἱ τελῶναι a «including the tax collectors» en lugar de «even the tax collectors». Por eso el español usa «incluidos los recaudadores de impuestos», sin introducir énfasis no sustentado por el griego. También se respetó la decisión revisada de mantener el participio de βαπτισθέντες de modo circunstan­cial y no causal en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - Se mantiene «bautismo» para βάπτισμα, sin sustituirlo por una perífrasis doctrinal.
  - Se evita «SEÑOR» para θεός/κύριος porque el texto griego aquí usa θεός y no el Tetragrámaton.
  - Se usa «recaudadores de impuestos» para τελῶναι por claridad moderna y coherencia terminológica.
  - La puntuación reproduce una sola oración con dos participios adverbiales, como en el griego.
