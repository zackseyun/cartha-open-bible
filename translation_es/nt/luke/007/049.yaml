translation:
  language: es
  text: 'Y los que estaban recostados a la mesa con él comenzaron a decir entre sí[a]: «¿Quién es este que aun perdona pecados?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «decir dentro de sí mismos». La expresión griega puede sugerir reflexión privada o conversación entre los invitados.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντο
  english_pob_choice: began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  lexicon: BDAG
  rationale: El aoristo ingresivo de ἄρχω con infinitivo indica el inicio de la acción; «comenzaron» conserva ese valor aspectual de forma natural en español.
- source_word: συνανακείμενοι
  english_pob_choice: those reclining at the table with him
  chosen_spanish: los que estaban recostados a la mesa con él
  alternatives_spanish:
  - los que estaban sentados a la mesa con él
  - los comensales con él
  - los que estaban recostados junto a él en la mesa
  lexicon: BDAG
  rationale: El participio describe a los comensales en la postura cultural de recostarse a la mesa. «Recostados a la mesa» preserva el rasgo cultural, y «con él» expresa el valor de συνά- y el contexto narrativo.
- source_word: λέγειν ἐν ἑαυτοῖς
  english_pob_choice: to say among themselves
  chosen_spanish: decir entre sí
  alternatives_spanish:
  - decir dentro de sí
  - decirse a sí mismos
  lexicon: BDAG
  rationale: La expresión puede aludir a habla privada o mutua. «Entre sí» mantiene esa ambigüedad y encaja bien con el plural de los invitados, sin forzar una lectura exclusivamente interior.
- source_word: Τίς οὗτός ἐστιν
  english_pob_choice: Who is this
  chosen_spanish: ¿Quién es este?
  alternatives_spanish:
  - ¿Quién es este hombre?
  lexicon: BDAG
  rationale: El griego no añade ἄνθρωπος, por lo que conviene conservar la pregunta breve y abrupta con «este» sin ampliar a «hombre».
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  lexicon: BDAG
  rationale: Aquí καί es ascensivo y expresa sorpresa por la amplitud de la acción de Jesús. «Aun» reproduce mejor ese matiz que «también».
- source_word: ἁμαρτίας ἀφίησιν
  english_pob_choice: forgives sins
  chosen_spanish: perdona pecados
  alternatives_spanish:
  - remite pecados
  - absuelve pecados
  lexicon: BDAG
  rationale: En este contexto ἀφίημι es el giro habitual para el perdón de pecados. «Perdona» es claro y fiel, y evita una formulación más técnica o menos idiomática.
theological_decisions:
- issue: Autoridad de Jesús para perdonar pecados
  english_pob_reading: 'Retain the guests'' question without interpretive expansion: ''Who is this, who even forgives sins?'''
  chosen_spanish_reading: 'Conservar la pregunta de los comensales sin ampliarla interpretativamente: «¿Quién es este, que aun perdona pecados?»'
  alternative_spanish_readings:
  - ¿Quién es este hombre, que aun perdona pecados?
  - ¿Quién es este, que además perdona pecados?
  rationale: El versículo presenta la reacción asombrada de los comensales y deja abierta la implicación cristológica. La traducción mantiene esa tensión y no introduce una explicación doctrinal que el texto no formula explícitamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios adicionales respecto del texto de referencia; se mantiene la equivalencia óptima y la misma resolución de ambigüedad para λέγειν ἐν ἑαυτοῖς.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Perdona pecados» conserva el registro bíblico y el sentido forense/relacional de ἀφίημι sin sobrerreformular.
  - La nota al pie usa un anclaje único en «decir» para reflejar la alternativa de habla privada o mutua.
