    issue: El marcador de nota [a] está colocado en «decir[a]» en lugar de anclar la expresión idiomática completa «entre sí[a]».
    rationale: La alternativa documentada afecta a λέγειν ἐν ἑαυτοῖς como unidad semántica, no al verbo «decir» aisladamente. En español, la ambigüedad entre reflexión interna y conversación mutua recae especialmente en «entre sí».
  - severity: low
    issue: La nota al pie dice «decir dentro de sí» con sujeto plural.
    rationale: Con un sujeto plural, en español es más natural «decir dentro de sí mismos» o «decirse a sí mismos». Así se evita una discordancia de número percibida por el lector.
  - severity: low
    issue: La coma en «¿Quién es este, que aun perdona pecados?» puede sonar menos natural en español.
    rationale: La relativa aquí identifica y caracteriza al referente en una misma exclamación interrogativa; sin coma, la lectura en español resulta más fluida y sigue siendo fiel al griego.
