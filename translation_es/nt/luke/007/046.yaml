translation:
  language: es
  text: No ungiste mi cabeza con aceite, pero ella ha ungido mis pies con perfume[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con aceite aromático' o 'con ungüento' para 'con perfume'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλαίῳ
  english_pob_choice: with oil
  chosen_spanish: con aceite
  alternatives_spanish:
  - con aceite de oliva
  - con óleo
  lexicon: BDAG / ἔλαιον
  rationale: El dativo indica medio o instrumento. En español, 'aceite' es la equivalencia natural y transparente para el contraste con 'perfume'; 'aceite de oliva' especifica más de lo necesario, y 'óleo' suena más eclesiástico que el contexto requiere.
- source_word: ἤλειψας / ἤλειψεν
  english_pob_choice: anoint / has anointed
  chosen_spanish: ungiste / ha ungido
  alternatives_spanish:
  - untaste / ha untado
  - ungiste / ha ungido
  lexicon: BDAG / ἀλείφω
  rationale: '''Ungir'' conserva el campo semántico de aplicar aceite o perfume y funciona bien para el acto de hospitalidad/honor descrito en el contexto. ''Untar'' sería más material, pero pierde la elevación del gesto; ''ungir'' mantiene la fuerza verbal sin convertir la escena en un rito sacramental.'
- source_word: κεφαλήν μου
  english_pob_choice: my head
  chosen_spanish: mi cabeza
  alternatives_spanish:
  - mi cabeza
  lexicon: BDAG / κεφαλή
  rationale: Se traduce de manera literal y directa. En español, 'cabeza' expresa bien el objeto del gesto de honor.
- source_word: αὕτη δὲ
  english_pob_choice: but she
  chosen_spanish: pero ella
  alternatives_spanish:
  - pero esta mujer
  - pero esta
  lexicon: BDAG / οὗτος
  rationale: '''Pero ella'' preserva el contraste inmediato con ''tú'' y suena natural en español. ''Esta mujer'' explicita la referencia, pero añade más marca discursiva de la que exige el griego aquí.'
- source_word: μύρῳ
  english_pob_choice: with perfume
  chosen_spanish: con perfume
  alternatives_spanish:
  - con ungüento aromático
  - con óleo perfumado
  lexicon: BDAG / μύρον
  rationale: '''Perfume'' refleja bien μύρον como sustancia aromática y mantiene el contraste con ''aceite''. ''Ungüento aromático'' o ''óleo perfumado'' son posibles, pero menos concisos y más técnicos para este versículo.'
- source_word: τοὺς πόδας μου
  english_pob_choice: my feet
  chosen_spanish: mis pies
  alternatives_spanish:
  - mis pies
  lexicon: BDAG / πούς
  rationale: Traducción literal y normal en español. El plural se conserva porque el griego usa plural.
theological_decisions:
- issue: Contraste de honor social frente a gesto religioso
  english_pob_reading: Render the contrast plainly without importing symbolic sacramental or christological overtones into the wording.
  chosen_spanish_reading: Expresar el contraste de hospitalidad y honra de forma sobria, sin cargar el verso con una lectura sacramental o ritual que el contexto inmediato no exige.
  alternative_spanish_readings:
  - Usar vocabulario más ceremonial que sugiera consagración formal
  - Reforzar el lenguaje de unción para insinuar un rito religioso
  rationale: El pasaje reprende la falta de hospitalidad de Simón y contrapone la honra generosa de la mujer. 'Ungir' es léxicamente correcto, pero en español conviene evitar que el término haga pensar en una ceremonia eclesial no presente en el contexto.
  doctrine_reference: Principio de primacía del sentido del texto original; preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: no se registran cambios posteriores y el cotejo indicó acuerdo alto; se mantiene la decisión de no intensificar el lenguaje más allá del contraste social del pasaje.'
  spanish_consistency_notes:
  - Se mantiene 'aceite' para ἐλαίῳ y 'perfume' para μύρῳ, preservando el contraste material del griego.
  - Se usa 'ungir' en ambos verbos para conservar la relación léxica de ἀλείφω en las dos cláusulas.
  - No se introduce 'SEÑOR' ni terminología litúrgica adicional; el versículo no contiene el nombre divino ni una referencia cristológica explícita.
