  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Perdonó» para ἐχαρίσατο sigue la decisión auditada y preserva la conexión temática. «Juzgado» mantiene el vínculo con κρίνω. No aparecen términos del glosario mayor como Yahvé/Mesías/etc.
