translation:
  language: es
  text: 'Simón respondió: «Supongo[a] que aquel a quien le perdonó más[b]». Y él le dijo: «Has juzgado correctamente».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Asumo» o «Me parece»; el griego expresa una inferencia tentativa.
    reason: lexical_alternative
  - marker: b
    text: O «el que recibió más perdón» o «a quien más le perdonó»; el verbo puede llevar el sentido de remitir graciosamente una deuda.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς Σίμων εἶπεν
  english_pob_choice: Simon answered
  chosen_spanish: Simón respondió
  alternatives_spanish:
  - Simón contestó
  - Simón dijo
  lexicon: BDAG
  rationale: El participio aoristo de ἀποκρίνομαι con εἶπεν funciona idiomáticamente como introducción de respuesta. «Respondió» mantiene la fuerza narrativa natural en español sin perder el valor de réplica.
- source_word: Ὑπολαμβάνω
  english_pob_choice: I suppose
  chosen_spanish: Supongo
  alternatives_spanish:
  - Assumo
  - Me parece
  lexicon: BDAG
  rationale: Aquí expresa una inferencia tentativa, no una afirmación fuerte. «Supongo» conserva bien la cautela del griego y la suavidad del tono de Simón.
- source_word: ᾧ τὸ πλεῖον
  english_pob_choice: the one to whom he forgave more
  chosen_spanish: aquel a quien le perdonó más
  alternatives_spanish:
  - el que recibió más perdón
  - a quien más le perdonó
  lexicon: BDAG
  rationale: Se mantiene la relación dativa de ᾧ con «aquel a quien» y se expresa τὸ πλεῖον de manera idiomática como «más». El complemento «le» ayuda a reflejar la estructura relacional del griego.
- source_word: ἐχαρίσατο
  english_pob_choice: he forgave
  chosen_spanish: le perdonó
  alternatives_spanish:
  - canceló la deuda
  - le concedió el perdón
  lexicon: BDAG
  rationale: En este contexto de la parábola, χαρίζομαι puede referirse al perdón/remisión graciosa de una deuda. «Perdonó» sigue la decisión auditada de la POB inglesa y mantiene la conexión temática con el perdón en el pasaje.
- source_word: Ὀρθῶς
  english_pob_choice: rightly
  chosen_spanish: correctamente
  alternatives_spanish:
  - bien
  - rectamente
  lexicon: BDAG
  rationale: «Correctamente» expresa con claridad la evaluación de Jesús y suena natural en español moderno. Conserva el sentido de acierto del adverbio griego.
- source_word: ἔκρινας
  english_pob_choice: you have judged
  chosen_spanish: has juzgado
  alternatives_spanish:
  - juzgaste
  - has decidido
  lexicon: BDAG
  rationale: Se conserva el vínculo léxico con κρίνω mediante «juzgado». El presente perfecto español comunica bien una decisión ya pronunciada con relevancia inmediata.
theological_decisions:
- issue: Naturaleza del perdón en la parábola
  english_pob_reading: Render ἐχαρίσατο as 'forgave' in line with debt-remission imagery and the broader forgiveness theme of the passage.
  chosen_spanish_reading: Traducir ἐχαρίσατο como «perdonó», manteniendo la imagen de remisión graciosa de deuda sin explicitarla en el cuerpo del texto.
  alternative_spanish_readings:
  - canceló la deuda
  - lo perdonó gratuitamente
  rationale: El contexto inmediato es una parábola sobre deudores, pero la escena también apunta al perdón de pecados en el pasaje circundante. «Perdonó» preserva esa tensión y evita resolverla demasiado pronto con una paráfrasis explicativa.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: No se requirieron revisiones aplicadas según el control más reciente; la traducción propuesta mantiene la concordancia alta con el análisis griego y la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa «perdonó» para ἐχαρίσατο, coherente con el contexto de la parábola y con la terminología POB.
  - Se evita «Señor»/«SEÑOR» porque el versículo no contiene el nombre divino.
  - Se conserva un tono bíblico sobrio pero en español moderno, sin calcos innecesarios.
  - Los corchetes de notas aparecen solo donde hay alternativa lexical real en el texto.
