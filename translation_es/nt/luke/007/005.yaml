translation:
  language: es
  text: Porque ama a nuestra nación[a], y él mismo construyó la sinagoga para nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había hecho construir la sinagoga para nosotros». El griego dice simplemente «construyó», lo cual puede referirse a su participación personal o a su patrocinio o financiamiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπᾷ
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - tiene afecto por
  - quiere
  lexicon: BDAG
  rationale: «Ama» comunica el valor pleno de ἀγαπάω sin rebajarlo a simple benevolencia. En español suena natural y conserva la fuerza de la recomendación.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón de la petición anterior. «Porque» mantiene la relación explicativa de forma clara y idiomática en español.
- source_word: ἔθνος
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - comunidad
  lexicon: BDAG
  rationale: Aquí el grupo habla de su propio colectivo como entidad étnica/cívica; «nación» preserva mejor ese matiz que un término más general como «pueblo».
- source_word: συναγωγήν
  english_pob_choice: the synagogue
  chosen_spanish: la sinagoga
  alternatives_spanish:
  - nuestra sinagoga
  - el lugar de reunión
  lexicon: BDAG
  rationale: El griego tiene artículo, no posesivo explícito. «La sinagoga» respeta esa forma y conserva el sentido institucional judío sin añadir un posesivo que el texto no expresa.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  lexicon: BDAG
  rationale: El pronombre es enfático; «él mismo» conserva ese énfasis y resalta su participación personal o su patrocinio directo.
- source_word: ᾠκοδόμησεν
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - hizo construir
  lexicon: BDAG
  rationale: «Edificó» es un pasado simple natural y digno en español para ᾠκοδόμησεν. Evita la paráfrasis de «hizo construir», que interpretaría más de lo que el griego dice de manera explícita.
- source_word: ἡμῖν
  english_pob_choice: for us
  chosen_spanish: nos
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: BDAG
  rationale: 'En español, el dativo de beneficio se integra con el verbo: «nos edificó la sinagoga» suena natural y conserva la idea de beneficio/comunidad. Añadir «para nosotros» sería correcto pero menos fluido.'
translation_notes:
  revision_awareness: 'Se siguió el sentido del original griego y el audit trail en inglés: ἀγαπᾷ se mantiene con un verbo fuerte («ama»), ἔθνος se conserva como «nación», y el verbo aoristo ᾠκοδόμησεν se traduce con un pasado simple sin expandirlo en el texto principal. La ambigüedad sobre si el centurión construyó personalmente o mandó construir se preserva en nota.'
  spanish_consistency_notes:
  - Se mantiene una sintaxis sobria y publicable, con vocabulario bíblico transparente pero no arcaizante.
  - «Sinagoga» se usa con artículo definido, conforme al griego, sin añadir posesivo en el texto principal.
  - El énfasis de αὐτὸς se conserva con «él mismo».
  - La nota a pie de página recoge la alternativa interpretativa sin introducir una lectura doctrinal no requerida por el pasaje.
