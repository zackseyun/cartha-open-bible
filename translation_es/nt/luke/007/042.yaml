translation:
  language: es
  text: Como no tenían con qué pagar[a], perdonó generosamente a ambos. Entonces, ¿cuál de ellos lo amará más?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «canceló la deuda de ambos». El verbo griego puede denotar conceder libremente o remitir lo que se debe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ἐχόντων αὐτῶν
  english_pob_choice: Since they did not have the means
  chosen_spanish: Como no tenían con qué pagar
  alternatives_spanish:
  - Puesto que no tenían medios para pagar
  - Como no tenían los medios
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa la circunstancia de carecer de capacidad o recursos para saldar la deuda. En español, 'como' conserva la relación causal/circunstancial; 'con qué pagar' explicita de manera natural la falta de medios implícita en el griego sin añadir contenido ajeno.
- source_word: ἀποδοῦναι
  english_pob_choice: to repay
  chosen_spanish: pagar
  alternatives_spanish:
  - pagar de vuelta
  - reembolsar
  - repagar
  lexicon: BDAG
  rationale: En un contexto de deuda, ἀποδίδωμι significa devolver lo debido o saldar una deuda. 'Pagar' es el verbo más natural en español aquí; el prefijo 'de' no es necesario porque el contexto ya es claramente financiero.
- source_word: ἀμφοτέροις
  english_pob_choice: both
  chosen_spanish: a ambos
  alternatives_spanish:
  - a los dos
  - a los dos por igual
  lexicon: BDAG
  rationale: El referente son dos deudores. 'A ambos' preserva la referencia dual de forma breve y clara en español.
- source_word: ἐχαρίσατο
  english_pob_choice: he graciously forgave
  chosen_spanish: perdonó con gracia
  alternatives_spanish:
  - perdonó
  - los perdonó gratuitamente
  - canceló la deuda de ambos
  lexicon: BDAG
  rationale: χαρίζομαι puede significar conceder libremente, hacer un favor o perdonar/remitir. Dado el trasfondo de deuda, 'perdonó' comunica la remisión; 'con gracia' intenta conservar el matiz de favor/gracia del verbo que la simple 'perdonó' no explicita. Se evita 'canceló la deuda' en el texto principal porque formula la idea de manera más interpretativa que el griego.
- source_word: τίς οὖν αὐτῶν
  english_pob_choice: So which of them
  chosen_spanish: Entonces, ¿cuál de ellos
  alternatives_spanish:
  - Así que, ¿cuál de ellos
  - Por tanto, ¿cuál de ellos
  lexicon: BDAG
  rationale: οὖν marca inferencia. 'Entonces' transmite esa continuación lógica de forma natural y mantiene el enlace argumentativo.
- source_word: πλεῖον
  english_pob_choice: more
  chosen_spanish: más
  alternatives_spanish:
  - con mayor medida
  - en mayor grado
  lexicon: BDAG
  rationale: El comparativo funciona aquí como adverbio de grado relacionado con el amor. 'Más' es la forma normal y precisa en español.
- source_word: ἀγαπήσει αὐτόν
  english_pob_choice: will love him
  chosen_spanish: lo amará
  alternatives_spanish:
  - lo querrá más
  - sentirá más amor por él
  lexicon: BDAG
  rationale: El futuro de ἀγαπάω se traduce de manera directa como 'amar'. El objeto pronominal masculino singular se expresa naturalmente como 'lo' en español.
theological_decisions:
- issue: Matiz de χαρίζομαι entre perdón y gracia en una parábola de deuda
  english_pob_reading: Use 'graciously forgave both' rather than a purely financial 'canceled both debts.'
  chosen_spanish_reading: '''perdonó con gracia a ambos'' conserva la remisión de la deuda y el matiz de favor/gracia.'
  alternative_spanish_readings:
  - canceló la deuda de ambos
  - los perdonó
  - los perdonó gratuitamente
  rationale: 'El contexto inmediato es una deuda real, pero la elección del verbo participa del campo de la gracia. La formulación elegida intenta mantener ambas capas: el acto de perdón/remisión y la cualidad gratuita o graciosa del acto, sin convertir la frase en una paráfrasis financiera más fuerte que el original.'
  doctrine_reference: Translation philosophy §§1, 5, 6; campo semántico de χάρις/χαρίζομαι
- issue: Relación entre deuda material y enseñanza sobre el amor
  english_pob_reading: The debt setting illuminates forgiveness and love.
  chosen_spanish_reading: La escena de deuda sigue siendo literal, pero funciona como base para la pregunta sobre quién amará más.
  alternative_spanish_readings:
  - la deuda es solo una metáfora
  - el perdón se reduce a una cancelación financiera
  rationale: No se debe diluir el escenario económico del texto ni reducirlo a mera metáfora. Al mismo tiempo, la pregunta final muestra que la deuda sirve al argumento sobre la respuesta de amor; la traducción mantiene esa tensión sin explicarla en exceso dentro del versículo.
  doctrine_reference: Lucas 7:41–43; relación narrativo-teológica deuda/perdón/amor
translation_notes:
  revision_awareness: 'Se revisó el texto a la luz del audit trail inglés y no se detectaron cambios necesarios respecto de la lectura base: se mantiene el equilibrio entre la imagen financiera de la deuda y el matiz de gracia de χαρίζομαι.'
  spanish_consistency_notes:
  - Se prefirió 'perdonó' antes que 'canceló' en el texto principal para conservar el lenguaje de perdón que el contexto lucano activa, sin perder la nota financiera del versículo.
  - '''A ambos'' preserva la referencia dual explícita; no se expandió a ''a los dos'' porque ''ambos'' es más conciso y plenamente natural.'
  - '''Lo amará'' mantiene el futuro simple y la relación directa con ἀγαπάω, evitando una paráfrasis emocional más débil.'
