translation:
  language: es
  text: En aquella hora sanó a muchos de enfermedades, de aflicciones y de espíritus malignos[a][b], y a muchos ciegos les concedió ver[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En aquella misma hora». La expresión griega puede subrayar la inmediatez del momento.
    reason: lexical_alternative
  - marker: b
    text: O «azotes» o «plagas» para «aflicciones»; el término griego puede referirse literalmente a golpes de látigo o, por extensión, a sufrimientos corporales graves.
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «les concedió ver».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ὥρᾳ
  english_pob_choice: In that hour
  chosen_spanish: En aquella hora
  alternatives_spanish:
  - En esa hora
  - En aquella misma hora
  lexicon: BDAG
  rationale: Conserva la especificidad temporal del griego y su tono narrativo. «Aquella» corresponde bien al demostrativo y mantiene la cercanía inmediata del contexto sin endurecer el estilo.
- source_word: ἐθεράπευσεν
  english_pob_choice: he healed
  chosen_spanish: sanó
  alternatives_spanish:
  - curó
  - sanó
  lexicon: BDAG
  rationale: En contexto de milagros, «sanó» comunica con naturalidad la acción terapéutica de θεραπεύω sin perder el sentido de restauración física.
- source_word: πολλοὺς
  english_pob_choice: many
  chosen_spanish: a muchos
  alternatives_spanish:
  - muchos
  - a muchos
  lexicon: BDAG
  rationale: El acusativo de objeto directo se expresa con la preposición personal en español cuando corresponde; «a muchos» suena natural y no añade más de lo que dice el griego.
- source_word: ἀπὸ νόσων
  english_pob_choice: from diseases
  chosen_spanish: de enfermedades
  alternatives_spanish:
  - de enfermedades
  - de males
  lexicon: BDAG
  rationale: Tras «sanar», el español normalmente expresa la fuente o condición con «de». «Enfermedades» es la equivalencia directa de νόσων.
- source_word: μαστίγων
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - azotes
  - plagas
  - aflicciones
  lexicon: BDAG
  rationale: El término griego puede aludir literalmente a azotes, pero en este contexto de sanidad el sentido extendido de sufrimientos graves es el más claro. «Aflicciones» preserva esa amplitud sin fijar indebidamente una imagen literal.
- source_word: πνευμάτων πονηρῶν
  english_pob_choice: evil spirits
  chosen_spanish: espíritus malignos
  alternatives_spanish:
  - espíritus malos
  - espíritus malignos
  lexicon: BDAG
  rationale: Se mantiene el sentido personal-espiritual de πνευμάτων πονηρῶν, y «malignos» ofrece un registro bíblico claro en español. No se reduce a enfermedad ni se sustituye por un eufemismo.
- source_word: τυφλοῖς πολλοῖς
  english_pob_choice: to many blind people
  chosen_spanish: a muchos ciegos
  alternatives_spanish:
  - a muchos ciegos
  - a muchos que eran ciegos
  lexicon: BDAG
  rationale: La dativa de destinatario se expresa de manera natural con «a muchos ciegos». Evita restringir el grupo por género y conserva la concisión del griego.
- source_word: ἐχαρίσατο
  english_pob_choice: he granted
  chosen_spanish: les concedió
  alternatives_spanish:
  - les concedió
  - les dio
  lexicon: BDAG
  rationale: χαρίζομαι destaca un dar gratuito y benéfico. «Concedió» preserva ese matiz de favor sin sonar forzado en español.
- source_word: βλέπειν
  english_pob_choice: sight / to see
  chosen_spanish: ver
  alternatives_spanish:
  - ver
  - la vista
  lexicon: BDAG
  rationale: El infinitivo verbal se mantiene como «ver» para seguir de cerca el griego. En español, después de «concedió», esta construcción suena natural y fiel.
theological_decisions:
- issue: Los espíritus malignos como realidades personales
  english_pob_reading: The verse presents Jesus as exercising authority over evil spirits as part of his healing ministry, without reducing the phrase to mere illness metaphor.
  chosen_spanish_reading: El versículo presenta a Jesús ejerciendo autoridad sobre espíritus malignos como parte de su ministerio de sanidad, sin reducir la expresión a una simple metáfora de enfermedad.
  alternative_spanish_readings:
  - Reducir «espíritus malignos» a males físicos o mentales
  - Traducir de modo que la frase pierda su referencia espiritual personal
  rationale: La sintaxis griega distingue entre enfermedades, aflicciones y espíritus malignos; la traducción conserva esa distinción. Así se evita desmitologizar el texto o fusionar categorías que el verso mantiene separadas.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que precisó ἀπό con «from diseases» para mayor naturalidad. En español se reflejó ese ajuste con «de enfermedades», manteniendo la estructura tripartita de la frase y el valor benefactivo de χαρίζομαι.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «espíritus malignos» para πνευμάτων πονηρῶν, en coherencia con la preferencia del proyecto por no diluir la referencia espiritual.
  - «Sanó» y «les concedió ver» respetan la concisión del griego sin introducir interpretaciones añadidas.
