  glossary_alignment: No hay conflicto con la terminología del proyecto. «espíritus malignos» comunica bien πνευμάτων πονηρῶν y preserva el sentido personal-espiritual. No aparece terminología sensible adicional del glosario. «Concedió ver» sigue adecuadamente la nota literal sobre βλέπειν.
