  text: ἐν ⸀ἐκείνῃ τῇ ὥρᾳ ἐθεράπευσεν πολλοὺς ἀπὸ νόσων καὶ μαστίγων καὶ πνευμάτων πονηρῶν, καὶ τυφλοῖς πολλοῖς ⸀ἐχαρίσατο βλέπειν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/007/021.yaml
  text: In that hour he healed many from diseases and afflictions and evil spirits[c][b][a], and to many blind people he granted sight.
  footnotes:
  - marker: a
    text: Or 'In that very hour.' The Greek expression can emphasize the immediacy of the moment.
    reason: lexical_alternative
  - marker: b
    text: Or 'scourges' or 'plagues' for 'afflictions'; the Greek term can refer literally to lashes or, by extension, severe bodily suffering.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'he granted to see.'
    reason: lexical_alternative
