translation:
  language: es
  text: 'Les digo[a]: entre los nacidos de mujer[b], no hay nadie mayor que Juan; pero el menor[c] en el reino de Dios es mayor que él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Les digo a ustedes».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «nacidos de mujer» es un modismo para referirse a los seres humanos en general.
    reason: cultural_note
  - marker: c
    text: 'O: «el que es el menor en el reino de Dios». El griego puede expresarse también con una frase relativa más explícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: Les digo
  alternatives_spanish:
  - Les digo a ustedes
  - Les aseguro
  lexicon: BDAG
  rationale: La fórmula es una expresión directa de discurso. «Les digo» transmite el presente y la inmediatez del griego de manera natural en español, sin añadir solemnidad innecesaria.
- source_word: μείζων
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más grande
  - más importante
  lexicon: BDAG
  rationale: «Mayor» conserva el comparativo de μέγας y funciona bien en una comparación de valor o rango sin precisar indebidamente el criterio de superioridad.
- source_word: ἐν γεννητοῖς γυναικῶν
  english_pob_choice: among those born of women
  chosen_spanish: entre los nacidos de mujer
  alternatives_spanish:
  - entre los nacidos de las mujeres
  - entre los hombres
  lexicon: BDAG
  rationale: Se mantiene el giro idiomático con una forma española natural y bastante literal. «Nacidos de mujer» preserva la imagen semítica y la ambigüedad humana general documentada en el inglés.
- source_word: Ἰωάννου
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan el Bautista
  lexicon: BDAG
  rationale: El nombre propio se vierte con la forma española estándar. No se añade «el Bautista» porque el texto griego solo dice «Juan» y el contexto ya lo identifica.
- source_word: οὐδείς ἐστιν
  english_pob_choice: no one is
  chosen_spanish: no hay nadie
  alternatives_spanish:
  - nadie es
  - no existe nadie
  lexicon: BDAG
  rationale: En español, la construcción existencial «no hay nadie» es más natural que un calco como «nadie es», y conserva el sentido absoluto de la negación.
- source_word: ὁ δὲ μικρότερος
  english_pob_choice: yet the least
  chosen_spanish: pero el menor
  alternatives_spanish:
  - pero el más pequeño
  - pero el que es menor
  - y el menor
  lexicon: BDAG
  rationale: «El menor» reproduce el uso sustantivado del artículo + comparativo. Se prefiere «pero» para reflejar el matiz adversativo de δέ en este contraste.
- source_word: ἐν τῇ βασιλείᾳ τοῦ θεοῦ
  english_pob_choice: in the kingdom of God
  chosen_spanish: en el reino de Dios
  alternatives_spanish:
  - en el reino de Dios Padre
  - en el reinado de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la equivalencia directa y transparente de βασιλεία τοῦ θεοῦ, manteniendo la expresión bíblica familiar sin cambiar su alcance.
- source_word: μείζων αὐτοῦ ἐστιν
  english_pob_choice: is greater than he is
  chosen_spanish: es mayor que él
  alternatives_spanish:
  - es mayor que él mismo
  - es más grande que él
  lexicon: BDAG
  rationale: Se conserva la comparación sin explicarla. «Que él» mantiene la referencia a Juan y permite que la frase quede abierta respecto de la base de esa superioridad, como en el audit trail inglés.
theological_decisions:
- issue: Comparación paradójica entre Juan y «el menor» en el reino de Dios
  english_pob_reading: The translation preserves the text's paradoxical comparison without explaining whether 'greater' refers to status, privilege, redemptive-historical position, or another dimension.
  chosen_spanish_reading: La traducción conserva la comparación paradójica sin decidir si «mayor» se refiere a estatus, privilegio, posición redentivo-histórica u otro aspecto.
  alternative_spanish_readings:
  - El menor en el reino de Dios tiene mayor privilegio pactal que Juan
  - El menor en el reino de Dios es moral o espiritualmente mayor que Juan
  - La frase es una hipérbole retórica de honor y vergüenza
  rationale: El griego afirma la comparación pero no especifica su base. En español conviene no resolverla con una paráfrasis doctrinal que cierre la tensión textual.
  doctrine_reference: Preservar la tensión teológica sin imponer una interpretación
- issue: Sentido idiomático de «nacidos de mujer»
  english_pob_reading: The phrase 'born of women' is an idiom for human beings generally.
  chosen_spanish_reading: Se mantiene como modismo humano general, no como referencia a mujeres biológicas en contraste especial.
  alternative_spanish_readings:
  - entre los seres humanos
  - entre los hombres
  rationale: La expresión española «nacidos de mujer» conserva la coloración idiomática del griego y permite que el lector perciba el giro semítico sin perder inteligibilidad.
  doctrine_reference: Mantener el valor idiomático del lenguaje bíblico
translation_notes:
  revision_awareness: Sin cambios previos aplicados; esta versión sigue de cerca el paquete griego y el audit trail inglés, preservando la ambigüedad interpretativa documentada.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando corresponde; aquí el texto dice «Dios», por lo que se conserva «Dios».
  - «Reino de Dios» se mantiene como terminología bíblica estable y transparente.
  - Se eligió «mayor»/«menor» para reflejar los comparativos del griego sin añadir explicaciones interpretativas.
