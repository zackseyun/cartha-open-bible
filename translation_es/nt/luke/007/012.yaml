review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: la aproximación a la puerta, la irrupción de la escena fúnebre, el difunto como hijo único de su madre, la condición de viuda y la presencia de mucha gente con ella. Sin embargo, «sacaban a un muerto» debilita el matiz pasivo/procesional de ἐξεκομίζετο y suena algo brusco en español; «llevaban fuera» o similar preserva mejor la escena. Además, la nota alternativa actual no corresponde bien al giro principal elegido.'
  spanish_quality_summary: El español es claro y legible, con registro bíblico digno. «He aquí» funciona bien para ἰδού. No obstante, «una considerable multitud» suena algo calcado; «una multitud considerable» es más natural. También conviene evitar el punto y coma en una secuencia coordinada simple y mantener una puntuación más fluida.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto en este versículo. «El único hijo» para μονογενής es correcto en contexto no cristológico. La alternativa de nota debería alinearse con la formulación documentada, preferiblemente «su único hijo» o «su hijo único», no «su hijo único» si la nota se presenta como mera inversión sin valor claro frente al texto principal.
  issues:
  - severity: medium
    issue: «sacaban a un muerto» no representa idealmente ἐξεκομίζετο
    rationale: El griego describe a un difunto que estaba siendo llevado fuera en una procesión. «Sacaban a un muerto» puede entenderse, pero suena más abrupto y menos idiomático que «llevaban fuera a un muerto» o «llevaban fuera al difunto».
  - severity: low
    issue: «una considerable multitud» suena menos natural en español
    rationale: Aunque es comprensible, en español fluye mejor «una multitud considerable» o «una multitud numerosa». Esto mantiene el matiz de ἱκανός sin calco innecesario.
  - severity: low
    issue: La nota al pie puede ajustarse mejor al inglés auditado y al texto principal
    rationale: La alternativa «su hijo único» es válida, pero conviene anclarla al giro elegido «el único hijo de su madre» con una nota más directa y natural como «O «su único hijo»».
  revised_spanish_text: Cuando se acercó a la puerta de la ciudad[a], he aquí que llevaban fuera a un muerto, el único hijo de su madre; y ella era viuda, y una multitud considerable de la ciudad iba con ella.
  revised_footnotes:
  - marker: a
    text: O «su único hijo».
    reason: lexical_alternative
  revision_rationale: Se ajusta la expresión del verbo procesional para reflejar mejor ἐξεκομίζετο en español natural, se mejora el orden adjetival en «multitud considerable», y se afina la nota alternativa para que corresponda mejor al sentido de μονογενὴς υἱός y al texto principal.
