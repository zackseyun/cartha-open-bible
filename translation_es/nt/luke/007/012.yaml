revisions:
- from: Cuando se acercó a la puerta de la ciudad[a], he aquí, sacaban a un muerto, el único hijo de su madre; y ella era viuda, y una considerable multitud de la ciudad iba con ella.
  to: Cuando se acercó a la puerta de la ciudad[a], he aquí que llevaban fuera a un muerto, el único hijo de su madre; y ella era viuda, y una multitud considerable de la ciudad iba con ella.
  rationale: Se ajusta la expresión del verbo procesional para reflejar mejor ἐξεκομίζετο en español natural, se mejora el orden adjetival en «multitud considerable», y se afina la nota alternativa para que corresponda mejor al sentido de μονογενὴς υἱός y al texto principal.
