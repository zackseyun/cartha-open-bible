translation:
  language: es
  text: Cuando se acercó a la puerta de la ciudad[a], he aquí que llevaban fuera a un muerto, el único hijo de su madre; y ella era viuda, y una multitud considerable de la ciudad iba con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su único hijo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισεν
  english_pob_choice: he came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - llegó cerca
  - se aproximó
  lexicon: BDAG
  rationale: El aoristo de ἐγγίζω expresa aproximación al lugar; en español, «se acercó» comunica con naturalidad el movimiento hacia la puerta sin sonar forzado.
- source_word: τῇ πύλῃ τῆς πόλεως
  english_pob_choice: to the gate of the city
  chosen_spanish: a la puerta de la ciudad
  alternatives_spanish:
  - a la puerta de la ciudadela
  - a la puerta de la ciudad
  lexicon: BDAG
  rationale: «Puerta» reproduce bien πύλη y «de la ciudad» mantiene la relación genitiva. Es una forma natural y transparente en español.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - y he aquí
  lexicon: BDAG
  rationale: Ἰδού introduce una escena repentina y llamativa. «He aquí» conserva esa fuerza de atención en un registro bíblico sobrio.
- source_word: ἐξεκομίζετο
  english_pob_choice: was being carried out
  chosen_spanish: sacaban
  alternatives_spanish:
  - era sacado
  - lo llevaban fuera
  lexicon: BDAG
  rationale: El imperfecto pasivo indica acción en curso. En español, «sacaban» transmite el hecho de que el cuerpo era llevado fuera con fluidez natural.
- source_word: τεθνηκὼς
  english_pob_choice: a dead man
  chosen_spanish: un muerto
  alternatives_spanish:
  - un hombre muerto
  - el fallecido
  lexicon: BDAG
  rationale: El participio perfecto presenta a la persona en estado de muerte. «Un muerto» es conciso y adecuado al contexto narrativo.
- source_word: μονογενὴς υἱὸς
  english_pob_choice: the only son
  chosen_spanish: el único hijo
  alternatives_spanish:
  - su hijo único
  - su único hijo
  lexicon: BDAG
  rationale: En este contexto familiar, μονογενής se refiere al hijo único de la viuda. «El único hijo» conserva la sencillez del pasaje.
- source_word: τῇ μητρὶ αὐτοῦ
  english_pob_choice: of his mother
  chosen_spanish: de su madre
  alternatives_spanish:
  - para su madre
  - a su madre
  lexicon: BDAG
  rationale: El dativo expresa relación posesiva; en español, «de su madre» refleja con naturalidad que era el único hijo de ella.
- source_word: καὶ αὐτὴ ἦν χήρα
  english_pob_choice: and she was a widow
  chosen_spanish: y ella era viuda
  alternatives_spanish:
  - y era viuda
  - y su madre era viuda
  lexicon: BDAG
  rationale: Se conserva el énfasis del pronombre explícito αὐτή. «Ella era viuda» mantiene esa focalización sin perder claridad.
- source_word: ὄχλος τῆς πόλεως ἱκανός
  english_pob_choice: a considerable crowd from the city
  chosen_spanish: una considerable multitud de la ciudad
  alternatives_spanish:
  - una gran multitud de la ciudad
  - una multitud considerable de la ciudad
  lexicon: BDAG
  rationale: Ἱκανός aquí significa suficiente/considerable en cantidad. «Considerable multitud» respeta el matiz sin exagerar ni suavizarlo demasiado.
- source_word: ἦν σὺν αὐτῇ
  english_pob_choice: was with her
  chosen_spanish: iba con ella
  alternatives_spanish:
  - estaba con ella
  - la acompañaba
  lexicon: BDAG
  rationale: Σύν con dativo indica acompañamiento. «Iba con ella» encaja bien en la escena procesional y mantiene el sentido de compañía.
theological_decisions:
- issue: μονογενής en contexto no cristológico
  english_pob_reading: the only son
  chosen_spanish_reading: el único hijo
  alternative_spanish_readings:
  - su hijo único
  - su hijo, el único
  rationale: Aquí μονογενής describe al hijo de la viuda en sentido familiar, no en uso cristológico. Por eso se traduce de forma simple y contextual como «el único hijo».
  doctrine_reference: Primacía del sentido contextual del griego; no proyectar usos teológicos de otros pasajes sobre este versículo.
translation_notes:
  revision_awareness: El texto en inglés ya fue evaluado con alta coincidencia y sin cambios sustanciales en la revisión más reciente; la presente propuesta sigue ese mismo sentido, ajustándolo a un español natural y transparente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparezca el nombre divino; aquí no aplica.
  - Se conserva un registro bíblico moderno con «he aquí» para ἰδοὺ, en armonía con la intención discursiva del original.
  - «Un muerto» y «el único hijo» reflejan el valor narrativo del griego sin sobrecargar el verso con explicaciones interpretativas.
