translation:
  language: es
  text: 'Porque Juan el Bautista ha venido sin comer pan ni beber vino, y ustedes dicen: «Tiene un demonio[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «Está endemoniado» o «Está poseído por un demonio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλήλυθεν
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - vino
  lexicon: BDAG
  rationale: El perfecto de ἔρχομαι expresa llegada con relevancia presente. En español, «ha venido» conserva mejor ese valor que un pasado simple como «vino».
- source_word: Ἰωάννης ὁ βαπτιστὴς
  english_pob_choice: John the Baptist
  chosen_spanish: Juan el Bautista
  alternatives_spanish:
  - Juan el Bautizador
  lexicon: BDAG
  rationale: «Bautista» es el título asentado y natural en español para esta figura histórica, equivalente al inglés POB y claro para lectura eclesial.
- source_word: μὴ ἐσθίων ἄρτον μήτε πίνων οἶνον
  english_pob_choice: eating no bread and drinking no wine
  chosen_spanish: comiendo pan ni bebiendo vino
  alternatives_spanish:
  - sin comer pan ni beber vino
  - no comiendo pan ni bebiendo vino
  - comiendo nada de pan ni bebiendo vino
  lexicon: BDAG
  rationale: La construcción participial describe el estilo ascético de Juan. En español, la forma negativa más natural aquí es coordinar con «ni» bajo el alcance de la negación implícita del contexto, manteniendo el paralelismo con el griego sin volverlo pesado. Se preserva «pan» para ἄρτον, como hizo el POB inglés, en vez de generalizar a «alimento».
- source_word: λέγετε
  english_pob_choice: you say
  chosen_spanish: ustedes dicen
  alternatives_spanish:
  - dicen
  - vosotros decís
  lexicon: BDAG
  rationale: Se usa «ustedes» por neutralidad latinoamericana y porque el plural de segunda persona mantiene el valor discursivo del griego.
- source_word: Δαιμόνιον ἔχει
  english_pob_choice: He has a demon
  chosen_spanish: Tiene un demonio
  alternatives_spanish:
  - Está endemoniado
  - Está poseído por un demonio
  lexicon: BDAG
  rationale: Se conserva la expresión directa del griego. «Tiene un demonio» preserva mejor la dureza retórica de la acusación que una paráfrasis idiomática como «está endemoniado».
theological_decisions:
- issue: δαιμόνιον como acusación contra Juan
  english_pob_reading: demon
  chosen_spanish_reading: demonio
  alternative_spanish_readings:
  - espíritu inmundo
  - poseído por un demonio
  rationale: En este contexto lucano, δαιμόνιον se traduce con «demonio» para no armonizar con άλλες expresiones de «espíritu inmundo» y para conservar la formulación acusatoria directa del texto.
  doctrine_reference: Lexical/theological distinction between δαιμόνιον and πνεῦμα ἀκάθαρτον in Gospel diction
translation_notes:
  revision_awareness: El texto griego presenta un participio negativo con ἄρτον y οἶνον; la versión inglesa auditada opta por una forma literal-idiomática («eating no bread and drinking no wine») y mantiene la tensión entre literalidad y naturalidad. La redacción española sigue esa misma línea, preservando el paralelismo y la acusación final sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Se mantiene «demonio» y no «espíritu inmundo», conforme al valor léxico específico del término griego en esta frase.
  - «Juan el Bautista» sigue la convención establecida para el título personal.
  - La puntuación con comillas angulares no se usa aquí; se emplean comillas dobles españolas para una cita breve dentro del versículo.
