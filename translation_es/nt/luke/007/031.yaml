translation:
  language: es
  text: ¿Con qué, pues, compararé a la gente[a] de esta generación, y a qué se parecen?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las personas de esta generación». El griego dice literalmente «los hombres de esta generación», con un plural masculino de fuerza genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίνι
  english_pob_choice: To what / what
  chosen_spanish: ¿A quién, pues, compararé[a]...?, y ¿a qué...?
  alternatives_spanish:
  - ¿Con qué...?
  - ¿A qué...?
  lexicon: τίς
  rationale: El dativo interrogativo con ὁμοιόω pide el estándar de comparación. En español, «comparar a alguien con algo/alguien» suele expresarse con «a quién» o «a qué» según el segundo miembro del paralelo; por eso se reparte la interrogación en dos miembros para conservar la fuerza retórica y la naturalidad del idioma.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - por tanto
  lexicon: οὖν
  rationale: Marca transición inferencial/discursiva. «Pues» funciona bien en preguntas retóricas en español y evita un calco demasiado pesado.
- source_word: ὁμοιώσω
  english_pob_choice: shall I compare
  chosen_spanish: compararé
  alternatives_spanish:
  - compararé con
  - pondré por semejante
  lexicon: ὁμοιόω
  rationale: El futuro indicativo en griego sostiene la pregunta deliberativa. En español, «compararé» transmite mejor la pregunta retórica que una perífrasis con subjuntivo; el sentido de comparación queda claro por el contexto.
- source_word: τοὺς ἀνθρώπους
  english_pob_choice: the people
  chosen_spanish: la gente
  alternatives_spanish:
  - las personas
  - los hombres
  lexicon: ἄνθρωπος
  rationale: El griego usa plural masculino con fuerza genérica. Como el inglés auditado ya decidió «the people», el español «la gente» refleja bien el valor colectivo y evita una masculinización innecesaria sin perder el referente humano general.
- source_word: τῆς γενεᾶς ταύτης
  english_pob_choice: of this generation
  chosen_spanish: de esta generación
  alternatives_spanish:
  - de este tiempo
  - de esta edad
  lexicon: γενεά
  rationale: «Generación» es la equivalencia directa y contextualmente precisa en este dicho de Jesús.
- source_word: καὶ τίνι εἰσὶν ὅμοιοι
  english_pob_choice: and what are they like?
  chosen_spanish: y a qué son semejantes
  alternatives_spanish:
  - y con qué se parecen
  - y cómo son
  lexicon: ὅμοιος
  rationale: La construcción predicativa pide una formulación de semejanza. «Son semejantes» preserva el paralelismo y suena más digno en español bíblico que «¿qué son parecidos?». La preposición «a» mantiene el régimen natural con preguntas de comparación.
theological_decisions:
- issue: Alcance genérico de ἀνθρώπους
  english_pob_reading: the people of this generation
  chosen_spanish_reading: la gente de esta generación
  alternative_spanish_readings:
  - los hombres de esta generación
  - las personas de esta generación
  rationale: El griego masculino plural es genérico. Siguiendo la revisión inglesa que corrigió «men» a «people», el español adopta un colectivo neutral y natural («la gente») para no introducir una marca masculina que el contexto no exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El contexto auditado muestra una revisión inglesa importante: se cambió «men» por «people» para reflejar el valor inclusivo de ἀνθρώπους. La versión española sigue esa decisión y evita un calco masculino no necesario. También se conservó el carácter retórico y paralelo de las dos preguntas sin expandir el sentido.'
  spanish_consistency_notes:
  - Mantengo «generación» para γενεά y «semejantes» para ὅμοιοι, en línea con el paralelismo del griego.
  - Usé un único colectivo («la gente») en lugar de una expresión sexada para ἀνθρώπους, coherente con el audit trail inglés.
  - La preposición interrogativa varía entre «a quién» y «a qué» para reflejar el cambio de estándar de comparación sin forzar una sola construcción española.
