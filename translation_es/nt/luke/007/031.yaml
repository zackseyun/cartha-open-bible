  rationale: Se corrige el primer interrogativo para reflejar el estándar de comparación exigido por Τίνι con ὁμοιώσω, se mejora la naturalidad del segundo miembro con 'se parecen', y se mueve la nota al sustantivo al que realmente comenta.
