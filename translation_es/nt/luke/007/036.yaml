revisions:
- from: Ahora, uno de los fariseos le estaba pidiendo que comiera con él[a]; y, después de entrar en la casa del fariseo[b], se recostó a la mesa.
  to: Y uno de los fariseos le estaba pidiendo que comiera con él[a]; y, después de entrar en la casa del fariseo[b], se reclinó a la mesa.
  rationale: Se reemplaza «Ahora» por «Y» para evitar un calco poco natural del inglés y conservar un conector narrativo simple para δέ. Se ajusta «se recostó» a «se reclinó» para reflejar mejor κατεκλίθη en contexto de comida formal antigua. Se pule la nota [a] para que suene natural en español y mantenga la alternativa formal documentada, y la nota [b] se armoniza léxicamente con «reclinó».
