review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: un fariseo le hace una invitación/petición para comer con él; Jesús entra en la casa del fariseo y luego adopta la postura de comida formal. También conserva adecuadamente el imperfecto de Ἠρώτα y el valor secuencial de εἰσελθών. Sin embargo, «Ahora» como apertura suena poco natural en español bíblico narrativo aquí, y la nota [a] está formulada de manera menos precisa que el inglés auditado, pues la alternativa inglesa es más formal por conservar la finalidad explícita, no por cambiar simplemente el aspecto verbal.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, «Ahora, uno de los fariseos...» resulta algo calcado del inglés «Now» y menos natural que «Y». Además, «se recostó a la mesa» es entendible, pero «se reclinó a la mesa» conecta mejor con el matiz cultural ya explicitado en la nota y con el verbo inglés auditado «reclined». La nota [a] necesita ajuste estilístico y semántico para corresponder mejor a «that he might eat with him».
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Fariseo», «casa» y la descripción de la postura de la comida son adecuadas. La decisión para κατεκλίθη conviene afinarse a «se reclinó a la mesa» por mayor precisión léxica en este contexto cultural.
  issues:
  - severity: medium
    issue: Conector inicial «Ahora» poco natural en esta narración
    rationale: δέ como conector suave no exige «Ahora» en español; aquí «Y» o la omisión suenan más naturales y fieles al flujo narrativo sin calco innecesario del inglés.
  - severity: medium
    issue: Nota [a] no reproduce con precisión la alternativa formal inglesa
    rationale: La nota actual dice «le pidió que comiera con él», pero la alternativa auditada es «asked him that he might eat with him», que conserva más explícitamente la finalidad. En español conviene algo como «le pidió que comiera con él» solo si se explica como formulación más formal; mejor aún, «le pidió que comiera con él» sin comillas inglesadas y con redacción natural.
  - severity: low
    issue: «Se recostó a la mesa» puede afinarse a «se reclinó a la mesa»
    rationale: Ambas expresiones son comprensibles, pero «reclinarse» corresponde mejor al marco de comidas formales antiguas y armoniza mejor con la nota cultural.
  revised_spanish_text: Y uno de los fariseos le estaba pidiendo que comiera con él[a]; y, después de entrar en la casa del fariseo[b], se reclinó a la mesa.
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «le pidió que comiera con él».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, tomó la postura acostumbrada para una comida formal, reclinándose en vez de sentarse erguido.
    reason: cultural_note
  revision_rationale: Se reemplaza «Ahora» por «Y» para evitar un calco poco natural del inglés y conservar un conector narrativo simple para δέ. Se ajusta «se recostó» a «se reclinó» para reflejar mejor κατεκλίθη en contexto de comida formal antigua. Se pule la nota [a] para que suene natural en español y mantenga la alternativa formal documentada, y la nota [b] se armoniza léxicamente con «reclinó».
