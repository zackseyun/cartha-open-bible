translation:
  language: es
  text: Y uno de los fariseos le estaba pidiendo que comiera con él[a]; y, después de entrar en la casa del fariseo[b], se reclinó a la mesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «le pidió que comiera con él».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, tomó la postura acostumbrada para una comida formal, reclinándose en vez de sentarse erguido.
    reason: cultural_note
lexical_decisions:
- source_word: Ἠρώτα
  english_pob_choice: was asking
  chosen_spanish: le estaba pidiendo
  alternatives_spanish:
  - le pidió
  - le invitaba
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso o insistente; en español, «le estaba pidiendo» conserva mejor ese aspecto que un pasado simple. «Le pidió» suena más puntual y menos fiel al matiz durativo. Aunque el sentido funciona como invitación, se mantiene la formulación de petición para no suavizar el verbo.
- source_word: δέ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: Es un conector narrativo suave. «Ahora» funciona de manera natural en español para avanzar la escena sin cargarlo de contraste.
- source_word: τις
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - alguien
  - un cierto
  lexicon: BDAG
  rationale: Con el genitivo partitivo «de los fariseos», «uno de los fariseos» es la equivalencia más clara y directa en español.
- source_word: τῶν Φαρισαίων / τοῦ Φαρισαίου
  english_pob_choice: of the Pharisees / the Pharisee’s
  chosen_spanish: de los fariseos / del fariseo
  alternatives_spanish:
  - de los fariseos / de la casa del fariseo
  - de entre los fariseos / la casa del fariseo
  lexicon: BDAG
  rationale: En la primera mención el griego es partitivo; en la segunda, posesivo. «Fariseo» es el término usual en español para Φαρισαῖος, y se conserva la relación genitiva sin sustituirla por una paráfrasis más libre.
- source_word: ἵνα φάγῃ μετ’ αὐτοῦ
  english_pob_choice: to eat with him
  chosen_spanish: que comiera con él
  alternatives_spanish:
  - para comer con él
  - que pudiera comer con él
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa finalidad. En español, «que comiera con él» reproduce bien esa intención sin mecanicismo. «Para comer con él» también es posible, pero la subordinada conserva mejor la estructura del original.
- source_word: εἰσελθὼν
  english_pob_choice: after entering
  chosen_spanish: después de entrar
  alternatives_spanish:
  - habiendo entrado
  - cuando entró
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. «Después de entrar» preserva la secuencia temporal de manera natural y fiel.
- source_word: οἶκον
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - casa
  lexicon: BDAG
  rationale: Aquí οἶκος designa la vivienda del fariseo. «Casa» es la opción más directa y transparente en español; «hogar» sería más interpretativo.
- source_word: κατεκλίθη
  english_pob_choice: reclined at the table
  chosen_spanish: se recostó a la mesa
  alternatives_spanish:
  - se reclinó para la comida
  - se recostó para comer
  lexicon: BDAG
  rationale: El verbo remite a la postura habitual de una comida formal en el mundo antiguo. «Se recostó a la mesa» comunica esa costumbre en español sin sobreexplicar en el cuerpo del texto.
translation_notes:
  revision_awareness: El borrador se ajusta al texto griego SBLGNT y al hilo de decisiones auditadas en la POB inglesa, manteniendo el imperfecto durativo de Ἠρώτα, la finalidad de ἵνα + subjuntivo, el participio anterior εἰσελθών y la costumbre cultural expresada por κατεκλίθη. No se detectaron revisiones aplicadas en el expediente fuente; se conserva la lectura alta de acuerdo del control cruzado.
  spanish_consistency_notes:
  - Se usa «fariseo» de forma uniforme para Φαρισαῖος.
  - Se evita «SEÑOR» o traducciones eclesiales no pertinentes, porque no hay términos divinos en este versículo.
  - «Se recostó a la mesa» mantiene la imagen cultural sin alterar el sentido básico del verbo.
  - La puntuación sigue el flujo narrativo del griego, con pausa menor antes de la segunda cláusula.
