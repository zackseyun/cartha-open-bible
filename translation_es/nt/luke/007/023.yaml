translation:
  language: es
  text: Y dichoso es el que no se aparta por causa de mí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "no es hecho tropezar por mí", "no se ofende por mí" o "no cae en tropiezo por causa de mí".'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριος
  english_pob_choice: blessed
  chosen_spanish: dichoso
  alternatives_spanish:
  - bendito
  - feliz
  lexicon: BDAG
  rationale: μακάριος en dichos de Jesús expresa un estado de favor/ventura ante Dios. En español, 'dichoso' comunica esa cualidad sin convertirlo en simple emoción ('feliz') ni en una fórmula eclesiástica menos natural ('bendito').
- source_word: ὃς
  english_pob_choice: the one who
  chosen_spanish: el que
  alternatives_spanish:
  - quien
  - todo el que
  lexicon: BDAG
  rationale: El relativo sustantivado singular se vierte con naturalidad como 'el que', conservando el referente representativo singular sin recurrir a un giro arcaico.
- source_word: ἐὰν μὴ
  english_pob_choice: is not
  chosen_spanish: 'no'
  alternatives_spanish:
  - si no
  - que no
  lexicon: BDAG
  rationale: La construcción condicional general se expresa en español con 'el que no' para mantener fluidez y el sentido general de la bienaventuranza, sin desdibujar la condición implícita.
- source_word: σκανδαλισθῇ
  english_pob_choice: is not caused to stumble
  chosen_spanish: tropieza
  alternatives_spanish:
  - se escandaliza
  - cae
  - se aparta
  lexicon: BDAG
  rationale: El verbo pasivo incluye la idea de ser hecho caer o tropezar. 'Tropieza' conserva la imagen sin imponer una paráfrasis amplia; 'se escandaliza' sería posible, pero en español moderno puede sonar más a irritación que al tropiezo espiritual del contexto.
- source_word: ἐν ἐμοί
  english_pob_choice: by me
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - a causa de mí
  - por mí
  - en mí
  lexicon: BDAG
  rationale: La preposición con pronombre personal aquí comunica ocasión o motivo. 'Por causa de mí' refleja mejor esa fuerza causal que 'en mí', que sería literal pero opaco en español. 'Por mí' podría sonar demasiado general o benefactivo.
theological_decisions:
- issue: Tensión entre tropiezo, ofensa y abandono
  english_pob_reading: Retain stumbling/offense imagery rather than paraphrasing to mere disagreement
  chosen_spanish_reading: Conservar la imagen de tropezar por Jesús sin reducirla a simple desacuerdo emocional.
  alternative_spanish_readings:
  - Y dichoso es el que no se ofende de mí.
  - Y dichoso es el que no cae por mi causa.
  rationale: 'El dicho de Jesús advierte contra reaccionar a él de una manera que resulte en tropiezo. ''Tropieza'' mantiene la tensión del texto: puede implicar escándalo u obstáculo real, sin resolverlo en una sola dimensión psicológica ni en una explicación doctrinal más explícita de lo que el verso dice.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requieren cambios textuales respecto del acuerdo auditado; la única adaptación es la selección de un español natural que preserve la pasiva y la causalidad implícita del griego.'
  spanish_consistency_notes:
  - Usa 'dichoso' para μακάριος, coherente con una bienaventuranza y con el registro reverente del dicho.
  - Mantiene 'por causa de mí' para ἐν ἐμοί en sentido causal/ocasional, evitando el literalismo opaco.
  - Conserva la metáfora de tropiezo para σκανδαλισθῇ, sin sustituirla por una interpretación más fuerte o más débil que la del original.
