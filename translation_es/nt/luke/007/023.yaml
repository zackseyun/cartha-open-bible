review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien el sentido general de la bienaventuranza y la fuerza causal de ἐν ἐμοί como 'por causa de mí'. Sin embargo, pierde un matiz importante del griego al convertir el pasivo σκανδαλισθῇ en el activo/intransitivo 'tropieza'. El original y la auditoría inglesa preservan la idea de ser ocasionado al tropiezo por Jesús. También la nota alternativa 'cae por mi causa' no refleja bien el matiz pasivo ni la opción inglesa 'does not fall away because of me'.
  spanish_quality_summary: El español es claro y natural, pero 'dichoso es[a] el que' coloca la nota en un punto menos pertinente que el término debatido o la expresión causal. La frase revisada mejora la fidelidad sin perder legibilidad. 'No es hecho tropezar' sería demasiado rígido; 'no tropieza por causa de mí' suena natural pero debilita la voz pasiva. Una solución más fiel y todavía idiomática es 'no se aparta por causa de mí', anclada con nota que preserve 'no es hecho tropezar' y 'no se ofende por mí' como alternativas.
  glossary_alignment: 'No hay términos del glosario mayor en disputa. La decisión sobre μακάριος como ''dichoso'' es aceptable en español eclesial moderno. El punto principal es léxico-sintáctico: σκανδαλισθῇ debe reflejar mejor la tensión entre tropiezo, ofensa y apartarse, conforme a la auditoría inglesa.'
  issues:
  - severity: medium
    issue: σκανδαλισθῇ se tradujo como 'tropieza', perdiendo la voz pasiva
    rationale: El griego usa aoristo pasivo subjuntivo. Aunque el español puede a veces naturalizar la voz, aquí el inglés auditado justificó explícitamente 'is not caused to stumble'. 'Tropieza' reduce la idea de ser ocasionado al tropiezo.
  - severity: low
    issue: La nota alternativa 'cae por mi causa' es demasiado fuerte y no corresponde bien al audit trail
    rationale: El inglés ofrece 'does not fall away because of me', no simplemente 'falls'. En español conviene 'no se aparta por causa de mí' o equivalente, para reflejar mejor el sentido de apartarse.
  - severity: low
    issue: Ubicación del marcador de nota poco útil
    rationale: La nota trata sobre el verbo/expresión completa, no específicamente sobre 'es'. Conviene anclarla en la cláusula relevante.
  revised_spanish_text: Y dichoso es el que no se aparta por causa de mí[a].
  revised_footnotes:
