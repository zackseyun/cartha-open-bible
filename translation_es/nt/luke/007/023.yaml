revisions:
- from: Y dichoso es[a] el que no tropieza por causa de mí.
  to: Y dichoso es el que no se aparta por causa de mí[a].
  rationale: La revisión busca preservar mejor la tensión semántica de σκανδαλισθῇ sin forzar un calco pasivo torpe en español. 'No se aparta por causa de mí' comunica el resultado de tropezar/ofenderse respecto de Jesús, mientras la nota conserva las alternativas más literales y cercanas al campo semántico del griego. Se mantiene 'dichoso' y 'por causa de mí' como decisiones españolas válidas y naturales.
