base_translation:
  language: en
  yaml_path: translation/nt/luke/007/044.yaml
  text: And turning toward the woman[a], he said to Simon, “Do you see this woman? I entered your house; you gave me no water for my feet, but she wet my feet with her tears and wiped them with her hair.”
  footnotes:
