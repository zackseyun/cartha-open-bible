review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y del POB en casi todo: «volviéndose hacia», «¿Ves a esta mujer?», «Entré en tu casa», «no me diste agua para mis pies» y «los enjugó con su cabello» reflejan adecuadamente el sentido. Sin embargo, «me lavó los pies con sus lágrimas» no preserva con precisión βρέχω, que significa «mojar/humedecer», no «lavar». Además, la nota [a] no aporta una alternativa real, porque repite esencialmente la misma formulación del texto principal en vez de reflejar la nota inglesa sobre «agua sobre mis pies».'
  spanish_quality_summary: El español es generalmente natural, claro y digno. «Enjugó» y «cabello» son apropiados para un registro bíblico moderno. La principal mejora necesaria es evitar «lavó», que introduce una acción más fuerte y específica que el original. También conviene reemplazar la nota actual por una nota útil y fiel al expediente auditado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, gracia, etc. La revisión propuesta mantiene un español eclesial legible y una correspondencia léxica más exacta con βρέχω.
  issues:
  - severity: high
    issue: «me lavó los pies con sus lágrimas» sobretraduce βρέχω
    rationale: El griego dice que ella «mojó/humedeció» los pies con lágrimas. «Lavar» añade una acción no explicitada y borra el contraste léxico con la provisión de agua para los pies.
  - severity: medium
    issue: La nota [a] no refleja la alternativa documentada en el POB inglés
    rationale: La nota inglesa explica la formulación más formal «you gave me no water upon my feet» y el trasfondo de la provisión para lavar los pies. La nota española actual simplemente repite «volviéndose hacia la mujer», por lo que no justifica ni aclara una decisión relevante.
  revised_spanish_text: 'Y volviéndose hacia la mujer, dijo a Simón: «¿Ves a esta mujer? Entré en tu casa; no me diste agua para mis pies[a], pero ella mojó mis pies con sus lágrimas y los enjugó con su cabello».'
  revised_footnotes:
  - marker: a
    text: O, más formalmente, «no me diste agua sobre mis pies». El sentido es la provisión acostumbrada de agua para lavarse los pies.
    reason: lexical_alternative
  revision_rationale: Se cambia «lavó» por «mojó» para conservar con mayor fidelidad el valor de βρέχω y evitar una sobreinterpretación. Se elimina la nota innecesaria sobre «volviéndose» y se sustituye por una nota alineada con el expediente inglés sobre «agua para/sobre mis pies». No se requieren más cambios.
