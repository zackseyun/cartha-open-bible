revisions:
- from: 'Y volviéndose hacia la mujer[a], dijo a Simón: «¿Ves a esta mujer? Entré en tu casa; no me diste agua para mis pies, pero ella me lavó los pies con sus lágrimas y los enjugó con su cabello».'
  to: 'Y volviéndose hacia la mujer, dijo a Simón: «¿Ves a esta mujer? Entré en tu casa; no me diste agua para mis pies[a], pero ella mojó mis pies con sus lágrimas y los enjugó con su cabello».'
  rationale: Se cambia «lavó» por «mojó» para conservar con mayor fidelidad el valor de βρέχω y evitar una sobreinterpretación. Se elimina la nota innecesaria sobre «volviéndose» y se sustituye por una nota alineada con el expediente inglés sobre «agua para/sobre mis pies». No se requieren más cambios.
