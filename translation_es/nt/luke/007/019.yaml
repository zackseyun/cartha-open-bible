review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: envío a Jesús como «Señor», pregunta directa con alternativa, y ὁ ἐρχόμενος como designación mesiánica potencial. Sin embargo, «Lo envió al Señor» introduce un objeto («lo») inexistente en el griego y confunde quién envía a quién. Además, «esperaremos» debilita el matiz deliberativo de προσδοκῶμεν, mejor expresado como «debemos esperar» o similar.'
  spanish_quality_summary: El español es legible y digno, pero «Lo envió al Señor» es sintácticamente equívoco y semánticamente incorrecto en contexto. También la nota al pie no ofrece una verdadera alternativa, porque repite exactamente la misma frase del texto. Con una reparación menor, el versículo queda natural y fiel.
  glossary_alignment: «Señor» para κύριος está bien alineado con el proyecto. «El que ha de venir» es una buena solución española para ὁ ἐρχόμενος y preserva su posible fuerza mesiánica. No hay conflicto con otros términos del glosario.
  issues:
  - severity: high
    issue: «Lo envió al Señor» añade un objeto no presente y altera la relación verbal.
    rationale: ἔπεμψεν πρὸς τὸν κύριον significa «envió a/al Señor» o «envió [mensajeros] al Señor», no «lo envió al Señor». El clítico «lo» hace que el sujeto envíe a otra persona hacia el Señor, lo cual no corresponde al griego ni al contexto.
  - severity: medium
    issue: «esperaremos a otro» no expresa tan bien la pregunta deliberativa.
    rationale: προσδοκῶμεν es presente en una pregunta deliberativa. En español, «¿debemos esperar a otro?» o «¿hemos de esperar a otro?» transmite mejor la idea que un futuro simple «esperaremos», que puede sonar predictivo.
  - severity: low
    issue: La nota al pie repite la misma formulación que el texto principal.
    rationale: 'Si el texto principal ya dice «el que ha de venir», la nota «O: “el que ha de venir”» no preserva una alternativa real. Conviene dar la opción descriptiva «el que viene» para reflejar la observación del inglés.'
  revised_spanish_text: 'Envió al Señor[a], diciendo: «¿Eres tú el que ha de venir, o debemos esperar a otro?»'
  revised_footnotes:
  - marker: a
    text: 'O: «el que viene». La expresión griega puede leerse de modo más descriptivo, pero aquí probablemente funciona como título mesiánico.'
    reason: lexical_alternative
