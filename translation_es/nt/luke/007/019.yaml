- from: 'Lo envió al Señor[a], diciendo: «¿Eres tú el que ha de venir, o esperaremos a otro?»'
  to: 'Envió al Señor[a], diciendo: «¿Eres tú el que ha de venir, o debemos esperar a otro?»'
  rationale: Se elimina el clítico «lo» porque no está en el griego y produce un sentido erróneo. Se ajusta «esperaremos» a «debemos esperar» para reflejar mejor la fuerza deliberativa de προσδοκῶμεν en español natural. Se corrige la nota para que ofrezca una alternativa real al texto principal.
