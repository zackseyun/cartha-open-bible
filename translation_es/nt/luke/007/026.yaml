translation:
  language: es
  text: Pero ¿qué salieron a ver? ¿A un profeta? Sí[a], yo les digo, y más que un profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «algo mayor que un profeta». La expresión comparativa griega puede verterse más literalmente así, pero «más que un profeta» es la equivalencia española más natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sino
  - Más bien
  lexicon: BDAG
  rationale: La partícula adversativa introduce contraste con la pregunta anterior; en español, «pero» es la transición más natural y fiel en este contexto.
- source_word: τί
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - por qué
  lexicon: BDAG
  rationale: Aquí λειτουργa como objeto de «salieron a ver», no como motivo; por eso «qué» reproduce mejor la función interrogativa.
- source_word: ἐξήλθατε
  english_pob_choice: did you go out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - fueron ustedes
  lexicon: BDAG
  rationale: El aoristo segundo plural expresa una acción pasada completa. En español, en una pregunta retórica, «salieron» conserva el hecho de salir sin sobrecargar con un auxiliar innecesario.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: ver
  alternatives_spanish:
  - mirar
  - contemplar
  lexicon: BDAG
  rationale: El infinitivo de propósito μετά de ἐξήλθατε se expresa de manera natural con «ver», que es la equivalencia más directa e idiomática.
- source_word: προφήτην
  english_pob_choice: A prophet
  chosen_spanish: ¿A un profeta?
  alternatives_spanish:
  - ¿Un profeta?
  - ¿Profeta?
  lexicon: BDAG
  rationale: El acusativo singular en una pregunta elíptica se traduce naturalmente con artículo indefinido en español. Mantener «profeta» en minúscula preserva que aquí es un sustantivo común, no un título institucionalizado.
- source_word: ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Ciertamente
  - Desde luego
  lexicon: BDAG
  rationale: La afirmación breve y enfática se expresa de modo directo con «sí», que conserva la fuerza discursiva del griego.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les aseguro
  - yo les digo
  lexicon: BDAG
  rationale: La fórmula de discurso es muy frecuente en los Evangelios. «Les digo» mantiene la dirección al auditorio plural y suena natural en español contemporáneo.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - también
  lexicon: BDAG
  rationale: La conjunción simplemente enlaza la afirmación con la comparación culminante; «y» conserva la estructura griega sin añadir énfasis no explicitado.
- source_word: περισσότερον προφήτου
  english_pob_choice: more than a prophet
  chosen_spanish: más que un profeta
  alternatives_spanish:
  - algo mayor que un profeta
  - uno mayor que un profeta
  lexicon: BDAG
  rationale: La comparación griega se expresa de forma natural en español con «más que un profeta». Esto preserva la tensión interpretativa del texto sin expandirla ni resolverla dentro del versículo.
theological_decisions:
- issue: La afirmación de Jesús sobre la identidad y la superioridad de Juan el Bautista
  english_pob_reading: Jesus declares John to be a prophet and indeed more than a prophet, without specifying in this verse alone the exact nature of that superiority.
  chosen_spanish_reading: Jesús declara que Juan fue un profeta y, además, más que un profeta, sin precisar en este versículo en qué consiste exactamente esa superioridad.
  alternative_spanish_readings:
  - Juan es el mayor de los profetas
  - Juan es específicamente el mensajero escatológico
  rationale: La frase debe mantenerse breve y abierta, como en el griego y en la POB inglesa. No conviene ampliar la explicación teológica dentro del versículo mismo; el contexto inmediato desarrolla la idea, pero aquí se preserva la formulación concisa.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla anticipadamente.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios aplicados y la concordancia de revisión indica acuerdo alto, por lo que el draft español sigue la formulación estable del texto fuente y del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el fuente lo exija; aquí no aparece el nombre divino.
  - Se conserva «profeta» en minúscula, porque el griego usa un sustantivo común sin marcación de título formal.
  - La pregunta retórica se mantiene en dos miembros breves, con puntuación española natural.
  - «Más que un profeta» preserva la comparación sin interpretarla como «mayor» o «el máximo» para no cerrar la tensión del original.
