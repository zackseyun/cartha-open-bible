  text: καὶ ἰδοὺ γυνὴ ⸂ἥτις ἦν ἐν τῇ πόλει⸃ ἁμαρτωλός, ⸀καὶ ἐπιγνοῦσα ὅτι ⸀κατάκειται ἐν τῇ οἰκίᾳ τοῦ Φαρισαίου, κομίσασα ἀλάβαστρον μύρου
base_translation:
  language: en
  yaml_path: translation/nt/luke/007/037.yaml
  text: And behold[a], a woman in the city, who was a sinner, having learned that he was reclining at table in the Pharisee’s house[c][b], brought an alabaster jar of perfume.
  footnotes:
  - marker: a
    text: Or 'a sinful woman.' The Greek says simply 'a sinner' and does not specify her particular sin.
    reason: lexical_alternative
  - marker: b
    text: That is, reclining in the customary posture for a formal meal.
    reason: cultural_note
  - marker: c
    text: Or 'an alabaster flask of ointment.'
    reason: lexical_alternative
