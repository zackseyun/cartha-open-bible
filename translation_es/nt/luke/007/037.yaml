review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: introduce vívidamente a la mujer, preserva su caracterización como pecadora sin especificar el pecado, mantiene la idea de que ella se enteró de que Jesús estaba recostado a la mesa en casa del fariseo, y conserva que llevó un recipiente de alabastro con perfume. Sin embargo, hay un desajuste menor pero importante de anclaje de nota: la nota [c] explica una alternativa para ἀλάβαστρον μύρου, pero en el texto está anclada al final de «perfume» en lugar de al sintagma completo del recipiente/contenido. Además, «al saber» es comprensible, pero «al enterarse» refleja mejor ἐπιγνοῦσα como llegar a saber una información concreta.'
  spanish_quality_summary: El español es claro, natural y digno. «Y he aquí» funciona, aunque es algo elevado; sigue siendo apropiado para el proyecto. «Recostado a la mesa» suena bien y la nota cultural lo aclara. La frase fluye correctamente. La revisión propuesta solo ajusta levemente «al enterarse» para mayor precisión idiomática y mueve el anclaje de [c] al sintagma pertinente.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. La decisión «pecadora» respeta la documentación teológica al no importar «prostituta» ni «mujer de mala vida». La nota sobre la postura reclinada preserva adecuadamente el trasfondo cultural documentado por la auditoría inglesa.
  issues:
  - severity: medium
    issue: El anclaje de la nota [c] no corresponde exactamente al alcance léxico que comenta.
    rationale: La nota [c] trata de «ἀλάβαστρον μύρου» como unidad («un frasco de alabastro con ungüento»), pero en el texto está colocada tras «perfume», lo que sugiere que solo comenta μύρον. Debe anclarse al sintagma completo pertinente.
  - severity: low
    issue: «Al saber» es aceptable pero menos preciso que una formulación de descubrimiento de información.
    rationale: ἐπιγνοῦσα expresa que ella llegó a enterarse de un hecho. «Al enterarse» reproduce más naturalmente en español la idea de haber obtenido esa información concreta.
  revised_spanish_text: Y he aquí[a] una mujer en la ciudad, que era pecadora, y al enterarse de que él estaba recostado a la mesa en casa del fariseo[b], trajo un frasco de alabastro de perfume[c].
  revised_footnotes:
  - marker: a
    text: O «mira». Ἰδοὺ introduce la escena con énfasis y sorpresa narrativa.
    reason: lexical_alternative
  - marker: b
    text: Es decir, recostado según la costumbre de una comida formal en el mundo antiguo.
    reason: cultural_note
  - marker: c
    text: O «un frasco de alabastro con ungüento». μύρον puede referirse a perfume o ungüento perfumado.
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor: «al enterarse» refleja mejor ἐπιγνοῦσα, y se conserva la nota [c] con anclaje correcto al sintagma traducido en el texto revisado. No hay cambio doctrinal ni de sentido principal.'
