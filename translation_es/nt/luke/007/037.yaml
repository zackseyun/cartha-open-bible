translation:
  language: es
  text: Y he aquí[a] una mujer en la ciudad, que era pecadora, y al enterarse de que él estaba recostado a la mesa en casa del fariseo[b], trajo un frasco de alabastro de perfume[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira». Ἰδοὺ introduce la escena con énfasis y sorpresa narrativa.
    reason: lexical_alternative
  - marker: b
    text: Es decir, recostado según la costumbre de una comida formal en el mundo antiguo.
    reason: cultural_note
  - marker: c
    text: O «un frasco de alabastro con ungüento». μύρον puede referirse a perfume o ungüento perfumado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - mira
  lexicon: BDAG
  rationale: «He aquí» conserva la fuerza discursiva de sorpresa o presentación vívida de ἰδοὺ y es natural en español bíblico sin sonar arcaizante en exceso.
- source_word: γυνὴ
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  - mujer
  lexicon: BDAG
  rationale: El contexto introduce simplemente a una persona femenina; «mujer» evita cualquier matiz de «esposa» que no está en el griego.
- source_word: ἥτις ἦν ἐν τῇ πόλει
  english_pob_choice: in the city, who was a sinner
  chosen_spanish: en la ciudad, que era pecadora
  alternatives_spanish:
  - que vivía en la ciudad
  - que era de la ciudad
  lexicon: BDAG
  rationale: 'Se mantiene el orden appositivo reflejado por la revisión inglesa: primero la ubicación, luego la caracterización. «En la ciudad» no se especifica como origen o residencia porque el griego no lo dice.'
- source_word: ἁμαρτωλός
  english_pob_choice: a sinner
  chosen_spanish: pecadora
  alternatives_spanish:
  - una pecadora
  - una mujer pecadora
  lexicon: BDAG
  rationale: 'En español la frase nominal completa funciona mejor como predicación adjetival: «que era pecadora». Esto preserva la identificación moral sin añadir una clase social o un pecado concreto no expresado por el texto.'
- source_word: ἐπιγνοῦσα
  english_pob_choice: having learned
  chosen_spanish: al saber
  alternatives_spanish:
  - habiendo sabido
  - cuando supo
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; «al saber» comunica una acción previa y fluida en español, manteniendo la relación temporal del original.
- source_word: κατάκειται
  english_pob_choice: was reclining at table
  chosen_spanish: estaba recostado a la mesa
  alternatives_spanish:
  - estaba reclinado a la mesa
  - estaba recostado
  lexicon: BDAG
  rationale: «Recostado a la mesa» transmite la postura cultural de comer reclinado. Se evita «sentado» para no borrar el trasfondo histórico; «a la mesa» hace explícito el contexto de comida.
- source_word: οἰκίᾳ τοῦ Φαρισαίου
  english_pob_choice: the Pharisee’s house
  chosen_spanish: en casa del fariseo
  alternatives_spanish:
  - en la casa del fariseo
  - en la casa del fariseo aquel
  lexicon: BDAG
  rationale: «Casa del fariseo» es natural en español y preserva la referencia a un fariseo concreto sin repetir innecesariamente el artículo definido.
- source_word: κομίσασα
  english_pob_choice: brought
  chosen_spanish: trajo
  alternatives_spanish:
  - llevó
  - vino trayendo
  lexicon: BDAG
  rationale: El participio expresa que ella llevaba consigo el objeto y lo presentó allí; «trajo» es idiomático y conciso en español.
- source_word: ἀλάβαστρον μύρου
  english_pob_choice: an alabaster jar of perfume
  chosen_spanish: un frasco de alabastro de perfume
  alternatives_spanish:
  - una vasija de alabastro con perfume
  - un frasco de alabastro de ungüento
  lexicon: BDAG
  rationale: «Frasco de alabastro» conserva el material del recipiente; «perfume» traduce μύρον de manera accesible. «Ungüento» queda como alternativa posible pero menos transparente para el lector moderno.
theological_decisions:
- issue: Caracterización moral de la mujer
  english_pob_reading: a sinner
  chosen_spanish_reading: pecadora
  alternative_spanish_readings:
  - una mujer pecadora
  - una mujer de vida inmoral
  - prostituta
  rationale: El griego la designa con ἁμαρτωλός, pero no especifica la clase de pecado. Se conserva la tensión interpretativa sin importar una identificación tradicional no expresada por el texto.
  doctrine_reference: Primacía del texto original; evitar ampliaciones interpretativas no justificadas por el griego.
- issue: Postura de comer reclinado
  english_pob_reading: reclining at table
  chosen_spanish_reading: estaba recostado a la mesa
  alternative_spanish_readings:
  - estaba reclinado a la mesa
  - estaba a la mesa
  rationale: La referencia cultural al banquete antiguo debe permanecer visible. «Recostado a la mesa» comunica mejor que una simple traducción genérica de comer o cenar.
  doctrine_reference: 'Nota cultural/lexical: conservar el trasfondo histórico del relato sin sobreexplicarlo en el texto principal.'
translation_notes:
  revision_awareness: 'La base inglesa revisada reordenó la cláusula para reflejar mejor el griego: «a woman in the city, who was a sinner». El español sigue esa misma relación appositiva: «una mujer en la ciudad, que era pecadora». También conserva la elección inglesa de no especificar el pecado de la mujer.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no aparece ningún título mesiánico en el verso.
  - «Fariseo» se conserva como término transliterado usual en español bíblico.
  - «Perfume» se usa para μύρον según la pauta del proyecto, con nota alternativa a «ungüento».
