translation:
  language: es
  text: 'Dos deudores tenían deudas con cierto prestamista: uno debía quinientos denarios[a], y el otro cincuenta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un denario era una moneda romana de plata estándar, comúnmente asociada con aproximadamente un día de salario para un trabajador.
    reason: cultural_note
lexical_decisions:
- source_word: χρεοφειλέται
  english_pob_choice: debtors
  chosen_spanish: deudores
  alternatives_spanish:
  - personas endeudadas
  - los que debían
  lexicon: BDAG
  rationale: El sustantivo describe a personas que tienen una deuda. «Deudores» es el equivalente directo y natural en español, y conserva la relación jurídica de deber dinero sin explicar de más.
- source_word: δανιστῇ τινι
  english_pob_choice: a certain moneylender
  chosen_spanish: ante un cierto prestamista
  alternatives_spanish:
  - ante un cierto prestamista de dinero
  - ante un cierto acreedor
  lexicon: BDAG
  rationale: δανιστής designa específicamente a quien presta dinero; «prestamista» comunica bien esa función en español. Se añadió «cierto» para reflejar τινι como indefinición particular en la parábola. «Ante» mantiene el marco narrativo de la escena sin forzar una construcción menos natural.
- source_word: ὤφειλεν
  english_pob_choice: owed
  chosen_spanish: debía
  alternatives_spanish:
  - adeudaba
  - debía dinero
  lexicon: BDAG
  rationale: El imperfecto presenta la relación de deuda en curso. «Debía» es natural en español y conserva el valor narrativo de una obligación existente.
- source_word: δηνάρια
  english_pob_choice: denarii
  chosen_spanish: denarios
  alternatives_spanish:
  - monedas de denario
  - denarios romanos
  lexicon: BDAG
  rationale: Se translitera al término castellano «denarios» para preservar la unidad monetaria histórica, como hace el texto inglés con «denarii». No se reemplaza por una explicación en el cuerpo del versículo.
- source_word: πεντακόσια
  english_pob_choice: five hundred
  chosen_spanish: quinientos
  alternatives_spanish:
  - quinientas
  lexicon: BDAG
  rationale: Número cardinal directo. Se usa la forma masculina plural por concordancia con «denarios».
- source_word: ἕτερος
  english_pob_choice: the other
  chosen_spanish: el otro
  alternatives_spanish:
  - el segundo
  lexicon: BDAG
  rationale: En contraste con «uno», «el otro» es la equivalencia más idiomática en español y conserva la pareja contrastiva del griego.
- source_word: πεντήκοντα
  english_pob_choice: fifty
  chosen_spanish: cincuenta
  alternatives_spanish:
  - cincuenta denarios
  lexicon: BDAG
  rationale: Número cardinal directo; el sustantivo ya se entiende por el contexto inmediato y no necesita repetirse en español.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hubo cambios necesarios y el cotejo final quedó con alta concordancia. No se identificaron variantes textuales relevantes para este versículo; la labor consistió en mantener la equivalencia semántica y el tono narrativo del original griego con terminología española clara.
  spanish_consistency_notes:
  - Se mantuvo «denarios» en el texto principal para preservar el referente histórico, con nota explicativa cultural.
  - Se prefirió «prestamista» sobre «acreedor» por la especificidad de δανιστής.
  - Se evitó repetir «denarios» en la segunda cifra porque el griego también elide el sustantivo en la segunda cláusula.
