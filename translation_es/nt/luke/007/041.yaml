review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: dos deudores, un prestamista, y las dos cantidades en denarios. «Deudores», «prestamista», «debía», «denarios» y «el otro» son decisiones léxicas fieles al sentido fuente y al rastro de auditoría inglés.'
  spanish_quality_summary: 'La frase «estaban ante un cierto prestamista» no está respaldada por el griego. δανιστῇ τινι es dativo de relación posesiva/beneficiaria en la construcción con ὀφείλω: los deudores le debían a un prestamista, no estaban «ante» él. En español suena más natural y exacto «tenían deudas con cierto prestamista» o «debían a cierto prestamista». Además, la nota cultural está anclada incorrectamente en «deudores» en vez de «denarios».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Denarios» preserva correctamente la unidad histórica y debe mantener la nota cultural, pero anclada en la palabra correspondiente.
  issues:
  - severity: high
    issue: «estaban ante un cierto prestamista» añade una relación espacial/escénica no presente en el griego
    rationale: δύο χρεοφειλέται ἦσαν δανιστῇ τινι expresa que dos personas eran deudores de cierto prestamista; no dice que estuvieran delante de él. «Ante» altera el cuadro semántico y debilita la relación de deuda.
  - severity: medium
    issue: La nota [a] está colocada sobre «deudores» aunque explica «denario»
    rationale: Según la disciplina de notas, el marcador debe aparecer en la palabra o frase relevante. Aquí debe ir con «denarios[a]», no con «deudores[a]».
  revised_spanish_text: 'Dos deudores tenían deudas con cierto prestamista: uno debía quinientos denarios[a], y el otro cincuenta.'
  revised_footnotes:
  - marker: a
    text: Un denario era una moneda romana de plata estándar, comúnmente asociada con aproximadamente un día de salario para un trabajador.
    reason: cultural_note
  revision_rationale: Se corrige la relación sintáctica y semántica de δανιστῇ τινι para expresar deuda hacia un prestamista, sin añadir la idea de estar «ante» él. También se mueve la nota cultural para anclarla correctamente en «denarios».
