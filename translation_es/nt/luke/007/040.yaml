translation:
  language: es
  text: 'Y Jesús respondió y le dijo: «Simón, tengo algo que decirte». Y él dijo: «Maestro[a], di».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Maestro, habla». Διδάσκαλε significa literalmente «Teacher» («Maestro»), y εἰπέ puede traducirse más directamente «di» o «habla».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: El participio aoristo funciona de modo idiomático en la narración introductoria del habla. En español, «respondió» comunica la función discursiva sin añadir más peso que el griego. Para conservar el patrón narrativo del original, el complemento se expresa con «y le dijo».
- source_word: εἶπεν πρὸς αὐτόν
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo a él
  - le habló
  lexicon: BDAG
  rationale: 'La construcción con πρὸς + acusativo se expresa naturalmente en español con dativo de destinatario: «le dijo». Es fiel, idiomático y mantiene la referencia directa al interlocutor.'
- source_word: Σίμων
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simón
  lexicon: nombre propio
  rationale: 'Nombre propio transliterado al español estándar: «Simón».'
- source_word: ἔχω σοί τι εἰπεῖν
  english_pob_choice: I have something to say to you
  chosen_spanish: tengo algo que decirte
  alternatives_spanish:
  - tengo algo que decirte a ti
  - tengo algo que decir
  lexicon: BDAG
  rationale: 'La locución se vierte con un giro natural en español que conserva el contenido semántico completo: poseer algo para comunicarlo al interlocutor. El dativo σοί queda reflejado en el pronombre enclítico «-te».'
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro
  - Maestro mío
  lexicon: BDAG
  rationale: Aunque el valor léxico básico es «maestro/teacher», en español bíblico «Maestro» es la forma más natural y reverente para dirigirse a Jesús en vocativo. No se usa «Señor» porque el griego no contiene κύριε aquí.
- source_word: εἰπέ
  english_pob_choice: say it
  chosen_spanish: di
  alternatives_spanish:
  - habla
  - dilo
  lexicon: BDAG
  rationale: El imperativo aoristo pide que Jesús continúe con lo que quiere decir. En español, «di» reproduce de forma breve y directa el mandato; el objeto implícito puede mantenerse implícito sin forzar «dilo», que añade un objeto no explicitado en el griego.
- source_word: φησίν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El presente histórico φησίν se normaliza al pretérito en español narrativo para mayor fluidez, manteniendo el valor de reportar el habla sin marcar un presente artificial.
translation_notes:
  revision_awareness: El texto griego y el registro auditado en inglés están en alta concordancia. La principal decisión en español fue resolver el vocativo Διδάσκαλε con «Maestro» por naturalidad y reverencia en contexto, sin introducir «Señor». También se preservó la secuencia narrativa idiomática «respondió y le dijo» para reflejar ἀποκριθεὶς ... εἶπεν.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Simón» para Σίμων, conforme al uso estándar en español.
  - Se traduce πρὸς αὐτόν con «le dijo» por claridad y naturalidad sintáctica.
  - No se ha explicitado un objeto en «di» porque el griego εἰπέ no lo expresa de manera obligatoria; la alternativa literal se documenta en la nota.
  - No se usa «Cristo» ni terminología doctrinal ajena al versículo.
