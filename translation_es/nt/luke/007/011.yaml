translation:
  language: es
  text: Y sucedió que al día siguiente fue a un pueblo llamado Naín[a], y sus discípulos y una gran multitud iban con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «poco después» en lugar de «al día siguiente».
    reason: textual_variant
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: sucedió
  alternatives_spanish:
  - aconteció
  - pasó
  lexicon: BDAG
  rationale: La fórmula narrativa de Lucas introduce un nuevo episodio; «sucedió» comunica ese valor introductorio de manera natural y digna en español, sin el arcaísmo de «aconteció que» como obligación fija.
- source_word: ἐν τῷ ἑξῆς
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - enseguida
  lexicon: BDAG
  rationale: La frase griega apunta literalmente al tiempo inmediatamente posterior; en este contexto la lectura más natural es temporalmente específica, por eso «al día siguiente» reproduce mejor el sentido que una paráfrasis más vaga.
- source_word: ἐπορεύθη
  english_pob_choice: he went
  chosen_spanish: fue
  alternatives_spanish:
  - iba
  - viajó
  lexicon: BDAG
  rationale: El aoristo de πορεύομαι expresa desplazamiento; en español, «fue» es la forma narrativa más simple y natural, sin añadir matiz de viaje que el texto no exige.
- source_word: εἰς πόλιν
  english_pob_choice: into a town
  chosen_spanish: a una ciudad
  alternatives_spanish:
  - a un pueblo
  - hacia una ciudad
  lexicon: BDAG
  rationale: πόλις puede ser «ciudad» o «pueblo/aldea» según contexto. Mantengo «ciudad» porque evita reducir indebidamente el término y deja el caso de Naín sin sobreespecificar, dado que el texto griego solo dice πόλιν.
- source_word: καλουμένην Ναΐν
  english_pob_choice: called Nain
  chosen_spanish: llamada Naín
  alternatives_spanish:
  - de nombre Naín
  - conocida como Naín
  lexicon: BDAG
  rationale: El participio pasivo de καλέω se rinde de forma idiomática con «llamada». Conservo el topónimo transliterado como «Naín» para seguir la práctica de nombres propios geográficos.
- source_word: συνεπορεύοντο
  english_pob_choice: were going with him
  chosen_spanish: lo acompañaban
  alternatives_spanish:
  - iban con él
  - marchaban con él
  lexicon: BDAG
  rationale: El imperfecto indica acción acompañante en curso. «Lo acompañaban» transmite de manera natural la idea de ir con él sin perder el aspecto durativo en español.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: La construcción posesiva se expresa de modo idiomático en español con «sus discípulos», que conserva el referente sin dureza sintáctica.
- source_word: ὄχλος πολύς
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran muchedumbre
  - un gran gentío
  lexicon: BDAG
  rationale: ὄχλος designa una multitud o muchedumbre; «gran multitud» mantiene el énfasis en el tamaño con un registro bíblico claro y natural. Evito «multitud grande», que suena menos idiomático.
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y mantiene la lectura base del audit trail inglés («on the next day»), conservando la nota textual sobre la variante manuscrita documentada. No se introdujeron cambios doctrinales ni se normalizó el nombre propio con una forma ajena al topónimo griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - «Discípulos» se usa para μαθηταί conforme al uso estable del NT en español.
  - Se conserva la distinción aspectual básica de los verbos narrativos mediante tiempos simples y una perífrasis natural en español.
  - El topónimo se translitera como «Naín», con tilde por la acentuación española.
