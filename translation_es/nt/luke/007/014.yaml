translation:
  language: es
  text: 'Y acercándose, tocó las andas funerarias[a], y los que las llevaban se detuvieron, y dijo: «Joven, te digo, ¡levántate!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «féretro» o «camilla funeraria». El término griego designa el soporte o armazón usado para llevar al muerto en una procesión fúnebre, no necesariamente un ataúd cerrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθὼν
  english_pob_choice: coming up
  chosen_spanish: acercándose
  alternatives_spanish:
  - aproximándose
  - yendo hacia él
  lexicon: BDAG
  rationale: El participio aoristo de προσέρχομαι expresa movimiento previo a la acción principal. «Acercándose» reproduce bien esa secuencia en español natural, sin volverlo rígido ni añadir contenido no presente en el griego.
- source_word: ἥψατο
  english_pob_choice: touched
  chosen_spanish: tocó
  alternatives_spanish:
  - tomó de
  - se agarró de
  lexicon: BDAG
  rationale: En esta construcción, ἅπτω en voz media indica contacto físico. «Tocó» es la opción más directa y fiel; «tomó de» o «se agarró de» sugerirían un agarre más fuerte del que el texto exige.
- source_word: σοροῦ
  english_pob_choice: bier
  chosen_spanish: camilla funeraria
  alternatives_spanish:
  - féretro
  - biér
  - andas funerarias
  lexicon: BDAG
  rationale: σορός aquí nombra el soporte o armazón usado para llevar al muerto en la procesión. En español, «camilla funeraria» comunica la función sin sugerir un ataúd cerrado, que no corresponde con precisión al contexto.
- source_word: οἱ δὲ βαστάζοντες
  english_pob_choice: the men carrying it
  chosen_spanish: los que la llevaban
  alternatives_spanish:
  - los portadores
  - los que la cargaban
  lexicon: BDAG
  rationale: βαστάζοντες significa los que transportaban o cargaban la camilla. «Los que la llevaban» es claro y mantiene el referente implícito del objeto; evita un término más técnico pero menos transparente para el lector moderno.
- source_word: ἔστησαν
  english_pob_choice: stood still
  chosen_spanish: se detuvieron
  alternatives_spanish:
  - se pararon
  - quedaron inmóviles
  lexicon: BDAG
  rationale: El aoristo de ἵστημι aquí expresa que cesaron de avanzar y quedaron en pausa. «Se detuvieron» preserva ese sentido de interrupción del movimiento de modo natural en español.
- source_word: Νεανίσκε
  english_pob_choice: Young man
  chosen_spanish: Joven
  alternatives_spanish:
  - Muchacho
  - Joven hombre
  lexicon: BDAG
  rationale: El vocativo de νεανίσκος es un llamado directo a un varón joven. «Joven» es breve, idiomático y suficientemente preciso; «muchacho» suena más coloquial y «joven hombre» resulta pesado.
- source_word: σοὶ λέγω
  english_pob_choice: I say to you
  chosen_spanish: te digo
  alternatives_spanish:
  - te lo digo
  - yo te digo
  lexicon: BDAG
  rationale: La combinación de pronombre dativo y λέγω intensifica la solemnidad del mandato. En español, «te digo» conserva la fuerza directa; añadir «yo» sería redundante, y «te lo digo» introduciría un objeto no presente.
- source_word: ἐγέρθητι
  english_pob_choice: arise
  chosen_spanish: ¡levántate!
  alternatives_spanish:
  - ¡resucita!
  - ¡ponte en pie!
  lexicon: BDAG
  rationale: ἐγείρω en este contexto milagroso es una orden para salir de la muerte. «¡Levántate!» suena natural en español y comunica la acción ordenada; «¡resucita!» interpreta más explícitamente el resultado, y «¡ponte en pie!» atenúa la fuerza del llamado.
theological_decisions:
- issue: La orden de Jesús al muerto joven
  english_pob_reading: Rendered ἐγέρθητι as 'arise' rather than a more colloquial 'get up.'
  chosen_spanish_reading: «¡Levántate!» mantiene la solemnidad del mandato sin explicarlo doctrinalmente.
  alternative_spanish_readings:
  - ¡arise!
  - ¡resucita!
  - ¡ponte en pie!
  rationale: El texto presenta la autoridad de Jesús de manera sobria. «¡Levántate!» comunica el imperativo con naturalidad y deja que la narrativa misma manifieste el milagro, sin forzar una glosa interpretativa.
  doctrine_reference: 'Principio de traducción: preservar el peso teológico y narrativo del mandato milagroso sin añadir explicación doctrinal fuera del texto.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y la auditable decisión inglesa de distinguir el objeto funerario como bier/frame de transporte, evitando la idea de un ataúd cerrado. La puntuación y el orden mantienen la secuencia narrativa: acercamiento, contacto, detención de los portadores y el mandato directo de Jesús.'
  spanish_consistency_notes:
  - Se mantiene un estilo reverente pero moderno, compatible con otros registros del POB en español.
  - Se evita ‘SEÑOR’ o vocabulario eclesiástico no requerido por el verso.
  - La exclamación final conserva el imperativo fuerte del griego ἐγέρθητι sin sobrerinterpretarlo como comentario doctrinal.
