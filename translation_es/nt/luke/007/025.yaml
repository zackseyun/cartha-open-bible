translation:
  language: es
  text: Pero ¿qué salieron a ver? ¿A un hombre vestido con ropa fina[a]? Miren, los que visten ropas espléndidas y viven en lujo están en palacios reales[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ropa suave» o «vestiduras suaves». La expresión alude a prendas finas y delicadas asociadas con el lujo, no a debilidad moral.
    reason: lexical_alternative
  - marker: b
    text: O «cortes reales». El griego se refiere a residencias reales o al entorno de la corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: BDAG
  rationale: La partícula adversativa introduce la continuación de la pregunta retórica. «Pero» es natural en español y conserva el contraste sin elevar el tono de forma innecesaria.
- source_word: τί
  english_pob_choice: what
  chosen_spanish: ¿qué?
  alternatives_spanish:
  - ¿qué cosa?
  - ¿cuál?
  lexicon: BDAG
  rationale: Interrogativo directo que pregunta por el contenido de lo que fueron a ver; «¿qué?» es la forma más idiomática y fiel.
- source_word: ἐξήλθατε
  english_pob_choice: did you go out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - salisteis
  lexicon: BDAG
  rationale: El aoristo en la pregunta retórica se refiere a una acción pasada de ir hacia afuera. En español, «salieron» mantiene la referencia verbal sin forzar el auxiliar interrogativo del inglés.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: a ver
  alternatives_spanish:
  - para ver
  - ver
  lexicon: BDAG
  rationale: Infinitivo de finalidad después de «salir». «A ver» es una solución española natural y breve que conserva la intención de ir con el propósito de observar.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: BDAG
  rationale: El referente es un individuo masculino concreto en el contraste retórico, por lo que «hombre» preserva la precisión del sustantivo griego.
- source_word: ἐν μαλακοῖς ἱματίοις
  english_pob_choice: in soft clothing
  chosen_spanish: vestido con ropa suave
  alternatives_spanish:
  - con ropa suave
  - con vestiduras suaves
  - con prendas finas
  lexicon: BDAG
  rationale: «μαλακοῖς» alude aquí a ropa fina/delicada, no a debilidad moral. «Vestido con ropa suave» conserva el valor material y suena natural en español; se evita una paráfrasis que mueva el sentido hacia lujo explícito antes de tiempo.
- source_word: ἠμφιεσμένον
  english_pob_choice: dressed
  chosen_spanish: vestido
  alternatives_spanish:
  - ataviado
  - cubierto
  lexicon: BDAG
  rationale: Participio perfecto pasivo que describe el estado de la persona. «Vestido» es la correspondencia más directa y idiomática en español.
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren ustedes
  - Vean
  lexicon: BDAG
  rationale: La partícula deíctica llama la atención sobre la explicación siguiente. En español, «Miren» reproduce bien ese llamado sin sonar arcaico.
- source_word: οἱ ... ὑπάρχοντες
  english_pob_choice: those who are
  chosen_spanish: los que están
  alternatives_spanish:
  - los que son
  - los que viven
  lexicon: BDAG
  rationale: La construcción participial sustantivada se expresa de forma natural con «los que están», manteniendo la referencia a quienes se hallan en esa condición.
- source_word: ἐν ἱματισμῷ ἐνδόξῳ
  english_pob_choice: in splendid clothing
  chosen_spanish: con vestiduras espléndidas
  alternatives_spanish:
  - con ropa espléndida
  - con atuendo espléndido
  lexicon: BDAG
  rationale: «ἱματισμῷ» apunta a vestimenta en general, y «ἐνδόξῳ» a algo espléndido o magnífico. «Vestiduras espléndidas» conserva el registro y el contraste social.
- source_word: τρυφῇ
  english_pob_choice: luxury
  chosen_spanish: en lujo
  alternatives_spanish:
  - en vida lujosa
  - en deleites
  lexicon: BDAG
  rationale: El sustantivo describe una condición de lujo o vida indulgente. «En lujo» es breve y directo; en nota se puede mantener la idea de refinamiento/indulgencia implícita.
- source_word: βασιλείοις
  english_pob_choice: royal palaces
  chosen_spanish: palacios reales
  alternatives_spanish:
  - cortes reales
  - residencias reales
  lexicon: BDAG
  rationale: βασίλειον se refiere a residencias reales o palacios. «Palacios reales» comunica claramente el marco social y conserva la pluralidad del griego.
theological_decisions:
- issue: Sentido de μαλακοῖς en el contraste de Jesús
  english_pob_reading: Literal reference to soft/fine clothing, not a moral characterization.
  chosen_spanish_reading: Referencia literal a ropa fina o suave, no a una caracterización moral.
  alternative_spanish_readings:
  - ropa afeminada
  - ropa delicada con sentido moral
  rationale: El contexto inmediato contrapone austeridad del desierto con lujo cortesano, y la mención de vestiduras espléndidas y palacios reales confirma que el énfasis es socioeconómico, no moral ni sexual. La traducción evita cargar el término con una connotación ajena al contexto.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Valor de βασιλείοις como escenario social
  english_pob_reading: royal palaces
  chosen_spanish_reading: palacios reales
  alternative_spanish_readings:
  - cortes reales
  - residencias de reyes
  rationale: La palabra indica residencias o espacios reales. «Palacios reales» comunica bien el contexto de corte sin introducir un giro interpretativo excesivo.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y mantiene el contraste retórico entre el desierto y la corte. Se adoptó una equivalencia óptima para que el español suene natural sin borrar las decisiones léxicas documentadas en el audit trail inglés. No se detectaron revisiones aplicadas en el pasaje fuente.
  spanish_consistency_notes:
  - Se usó «vestido» y «vestiduras» para conservar el campo semántico de la vestimenta sin mezclarlo con interpretaciones morales.
  - Se prefirió «palacios reales» por claridad, manteniendo la opción de «cortes reales» en nota para reflejar la amplitud de βασίλειον.
  - «En lujo» se mantuvo breve y sobrio, acorde con el contraste social del versículo.
  - La puntuación reproduce la serie de preguntas retóricas y la transición con «Miren» como equivalente del deíctico griego.
