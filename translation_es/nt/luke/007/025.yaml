revisions:
- from: Pero ¿qué salieron a ver? ¿A un hombre vestido con ropa suave? Miren[a], los que están con vestiduras espléndidas y en lujo[b] están en palacios reales.
  to: Pero ¿qué salieron a ver? ¿A un hombre vestido con ropa fina[a]? Miren, los que visten ropas espléndidas y viven en lujo están en palacios reales[b].
  rationale: Se mejora la naturalidad y precisión del español sin apartarse del griego ni del audit trail inglés. «Ropa fina» comunica mejor el sentido contextual de μαλακοῖς ἱματίοις, mientras la nota preserva la alternativa más literal. «Visten ropas espléndidas y viven en lujo» representa de manera más idiomática la construcción participial sustantivada con sus dos complementos. El marcador [b] se mueve correctamente a «palacios reales», que es donde corresponde la alternativa «cortes reales».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:58:56Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura retórica del griego y mantiene correctamente el contraste entre la austeridad del desierto y el lujo cortesano. Preserva bien ἐν μαλακοῖς ἱματίοις como referencia literal a ropa fina/suave, no moral. Sin embargo, «los que están con vestiduras espléndidas y en lujo» no representa de la forma más natural ni precisa la construcción griega οἱ ... ἐν ἱματισμῷ ἐνδόξῳ καὶ τρυφῇ ὑπάρχοντες, que describe a quienes viven o se hallan en vestimenta suntuosa y lujo. También conviene alinear mejor la nota y el anclaje de βασιλείοις.
  spanish_quality_summary: El texto es generalmente claro, pero «ropa suave» suena algo extraño en español bíblico natural, y «están con vestiduras espléndidas y en lujo» resulta poco idiomático. «Ropa fina» / «prendas suaves» y «viven entre vestiduras espléndidas y lujo» o «andan con vestiduras espléndidas y viven en lujo» son más naturales. Además, la nota [b] está anclada en «lujo», aunque la alternativa «cortes reales» corresponde a «palacios reales».
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. Las decisiones léxicas sobre μαλακοῖς, τρυφῇ y βασιλείοις son en general correctas, pero la ejecución española debe ajustarse para mayor fidelidad y naturalidad. Se mantiene adecuadamente «palacios reales» para βασιλείοις y se evita una lectura moralizante de μαλακοῖς.
  issues:
  - severity: medium
    issue: «los que están con vestiduras espléndidas y en lujo» es poco idiomático y refleja débilmente οἱ ... ὑπάρχοντες
    rationale: La frase griega describe a personas caracterizadas por vestimenta suntuosa y lujo; en español, «están con» suena torpe y no comunica bien esa condición o modo de vida.
  - severity: medium
    issue: La nota [b] está colocada en «lujo», pero su contenido explica «palacios reales / cortes reales»
    rationale: El marcador debe anclarse en la palabra o frase pertinente según las reglas del proyecto. Aquí la alternativa corresponde a βασιλείοις, no a τρυφῇ.
  - severity: low
    issue: «ropa suave» es comprensible pero menos natural que una formulación que conserve mejor la idea de prendas delicadas/finas
    rationale: En español moderno, «ropa suave» puede sugerir textura táctil más que ropa lujosa o delicada; una nota puede conservar la alternativa literal mientras el texto principal fluye mejor.
