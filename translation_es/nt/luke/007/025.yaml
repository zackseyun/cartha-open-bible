  text: ἀλλὰ τί ⸀ἐξήλθατε ἰδεῖν; ἄνθρωπον ἐν μαλακοῖς ἱματίοις ἠμφιεσμένον; ἰδοὺ οἱ ἐν ἱματισμῷ ἐνδόξῳ καὶ τρυφῇ ὑπάρχοντες ἐν τοῖς βασιλείοις εἰσίν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/007/025.yaml
  text: But what did you go out to see? A man dressed in soft clothing? Look[b][a], those who are in splendid clothing and luxury are in royal palaces.
  footnotes:
  - marker: a
    text: Or 'soft garments.' The phrase refers to fine, delicate clothing associated with luxury, not to moral weakness.
    reason: lexical_alternative
  - marker: b
    text: Or 'kings' courts.' The Greek refers to royal residences or court settings.
    reason: lexical_alternative
