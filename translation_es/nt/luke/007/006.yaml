    issue: La nota [a] está colocada en un lugar incorrecto del texto.
    rationale: En el texto español, [a] aparece tras «ellos», pero la nota explica una alternativa para κύριε/«Señor». Esto rompe la correspondencia obligatoria entre ancla y contenido.
