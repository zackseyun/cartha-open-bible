  text: ὁ δὲ Ἰησοῦς ἐπορεύετο σὺν αὐτοῖς. ἤδη δὲ αὐτοῦ οὐ μακρὰν ἀπέχοντος ἀπὸ τῆς οἰκίας ἔπεμψεν ⸂φίλους ὁ ἑκατοντάρχης⸃ λέγων αὐτῷ· Κύριε, μὴ σκύλλου, οὐ γὰρ ⸂ἱκανός εἰμι⸃ ἵνα ὑπὸ τὴν στέγην μου εἰσέλθῃς·
base_translation:
  language: en
  yaml_path: translation/nt/luke/007/006.yaml
  text: So Jesus went with them[a]. But when he was already not far from the house, the centurion sent friends, saying to him, “Lord, do not trouble yourself[b], for I am not worthy that you should come under my roof.”
  footnotes:
  - marker: a
    text: 'Or “sir.” Greek: “Lord” (κύριε), which can function as a respectful address and may also imply recognition of Jesus’ authority.'
    reason: alternative_reading
  - marker: b
    text: Or “fit” / “qualified.” The Greek expression can denote adequacy or worthiness; here it conveys the centurion’s humility before Jesus.
    reason: lexical_alternative
