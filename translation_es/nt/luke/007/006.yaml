revisions:
- from: 'Así que Jesús fue con ellos[a]. Pero cuando ya estaba no lejos de la casa, el centurión envió amigos, diciéndole: «Señor, no te molestes[b], porque no soy digno de que entres bajo mi techo».'
  to: 'Así que Jesús fue con ellos. Pero cuando ya estaba no lejos de la casa, el centurión envió amigos, diciéndole: «Señor[a], no te molestes[b], porque no soy digno de que entres bajo mi techo».'
  rationale: Se conserva el texto principal casi intacto porque es fiel y natural, pero se corrige un problema crítico de anclaje de nota moviendo [a] a «Señor». También se ajusta la nota [b] para alinearla mejor con el sentido documentado de μὴ σκύλλου y evitar alternativas menos precisas como «no te canses» o «no te inquietes».
