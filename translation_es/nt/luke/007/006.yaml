translation:
  language: es
  text: 'Así que Jesús fue con ellos. Pero cuando ya estaba no lejos de la casa, el centurión envió amigos, diciéndole: «Señor[a], no te molestes[b], porque no soy digno de que entres bajo mi techo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor». El griego κύριε funciona como una forma respetuosa de dirigirse a Jesús y también puede implicar reconocimiento de su autoridad.
    reason: alternative_reading
  - marker: b
    text: O «no te tomes la molestia». El verbo griego expresa la idea de causar molestia o incomodidad; aquí se entiende como una cortesía para que Jesús no se moleste en venir más lejos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ Ἰησοῦς ἐπορεύετο σὺν αὐτοῖς
  english_pob_choice: So Jesus went with them
  chosen_spanish: Así que Jesús fue con ellos
  alternatives_spanish:
  - Jesús iba con ellos
  - Jesús caminaba con ellos
  lexicon: BDAG
  rationale: Ἐπορεύετο es imperfecto narrativo; en español, el pretérito perfecto simple «fue» comunica de forma natural el avance de la acción en una secuencia narrativa. «Con ellos» preserva σὺν αὐτοῖς sin añadir matices no presentes.
- source_word: ἤδη ... οὐ μακρὰν ἀπέχοντος ἀπὸ τῆς οἰκίας
  english_pob_choice: when he was already not far from the house
  chosen_spanish: cuando ya estaba no lejos de la casa
  alternatives_spanish:
  - cuando ya estaba cerca de la casa
  - cuando ya estaba a poca distancia de la casa
  lexicon: BDAG
  rationale: La estructura temporal del genitivo absoluto se expresa con una subordinada natural en español. «No lejos de la casa» conserva de forma bastante literal οὐ μακράν y mantiene la imagen espacial del griego.
- source_word: ἔπεμψεν φίλους
  english_pob_choice: sent friends
  chosen_spanish: envió amigos
  alternatives_spanish:
  - envió a unos amigos
  - mandó amigos
  lexicon: BDAG
  rationale: φίλους es un acusativo plural anartro; «amigos» basta para reflejar el texto sin introducir indefinición añadida. «Envió» sigue el valor básico de πέμπω y evita un coloquialismo excesivo.
- source_word: ὁ ἑκατοντάρχης
  english_pob_choice: the centurion
  chosen_spanish: el centurión
  alternatives_spanish:
  - el capitán
  lexicon: BDAG
  rationale: «Centurión» es el equivalente histórico preciso y el que mejor conserva el rango militar del personaje.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  lexicon: BDAG
  rationale: En español bíblico, «Señor» es la forma natural para κύριε en discurso dirigido a Jesús. Preserva el posible valor honorífico y también la posible carga de reconocimiento de autoridad, sin resolverla de manera excesiva.
- source_word: μὴ σκύλλου
  english_pob_choice: do not trouble yourself
  chosen_spanish: no te molestes
  alternatives_spanish:
  - no te inquietes
  - no te fatigues
  lexicon: BDAG
  rationale: σκύλλω aquí expresa la idea de causar molestia o incomodidad. «No te molestes» transmite esa cortesía idiomática en español, aunque es menos explícito que el inglés sobre la idea de ‘trouble yourself’.
- source_word: ἱκανός εἰμι
  english_pob_choice: I am not worthy
  chosen_spanish: no soy digno
  alternatives_spanish:
  - no soy suficiente
  - no soy apto
  lexicon: BDAG
  rationale: Aunque ἱκανός puede tener el matiz de suficiencia o adecuación, en este contexto de humildad ante Jesús el sentido natural en español es «digno». Esto conserva la tensión entre suficiencia y valía personal sin perder inteligibilidad.
- source_word: ἵνα ... εἰσέλθῃς
  english_pob_choice: that you should come
  chosen_spanish: de que entres
  alternatives_spanish:
  - para que entres
  - que entres
  lexicon: BDAG
  rationale: La construcción con ἵνα se vierte de modo subordinado y fluido en español. «De que entres» mantiene la relación gramatical con «no soy digno» y evita sobrecargar la frase.
- source_word: ὑπὸ τὴν στέγην μου
  english_pob_choice: under my roof
  chosen_spanish: bajo mi techo
  alternatives_spanish:
  - bajo mi techo de casa
  - en mi casa
  lexicon: BDAG
  rationale: «Bajo mi techo» conserva la imagen idiomática de la casa como morada, cercana al griego στέγη. «En mi casa» sería más interpretativo y perdería esa metáfora concreta.
theological_decisions:
- issue: Valor de κύριε al dirigirse al Jesús
  english_pob_reading: Lord; possibly respectful address, possibly more than politeness
  chosen_spanish_reading: Señor; un trato respetuoso que puede implicar reconocimiento de autoridad
  alternative_spanish_readings:
  - señor
  - Maestro
  rationale: Se mantiene «Señor» para reflejar la decisión doctrinal del POB en torno a κύριος. En este contexto no se fuerza una confesión cristológica plena, pero tampoco se reduce el vocativo a mera cortesía.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: ἱκανός εἰμι como expresión de humildad
  english_pob_reading: I am not worthy / fit / qualified
  chosen_spanish_reading: no soy digno
  alternative_spanish_readings:
  - no soy apto
  - no soy suficiente
  rationale: 'La lectura española mantiene la tensión semántica documentada: ἱκανός puede apuntar a suficiencia o idoneidad, pero en esta escena el centurión expresa su indignidad frente a Jesús. «No soy digno» es la fórmula más natural y reverente en español.'
  doctrine_reference: Lexical decision on ἱκανός in Luke 7:6
- issue: Imagen de la casa en ὑπὸ τὴν στέγην μου
  english_pob_reading: under my roof
  chosen_spanish_reading: bajo mi techo
  alternative_spanish_readings:
  - en mi casa
  - bajo mi techo de casa
  rationale: Se conserva la metáfora espacial para no borrar la imagen del original. En clave teológica y narrativa, la modestia del centurión se expresa en la idea de no ser digno de recibir a Jesús en su propia morada.
  doctrine_reference: Lexical image preservation in Luke 7:6
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente sin cambios sustanciales respecto del análisis auditado: se mantiene la equivalencia óptima ya aprobada, con la misma comprensión de κύριε, σκύλλου e ἱκανός εἰμι. No se detectaron revisiones aplicadas en el último pase.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριε, en coherencia con la terminología POB y la decisión doctrinal auditada.
  - Se mantiene «techo» para στέγη para preservar la imagen concreta del original.
  - Se conserva «no soy digno» como solución española estándar para ἱκανός εἰμι en este contexto de humildad.
  - La puntuación y el discurso directo siguen el estilo bíblico moderno en español, sin arcaísmos innecesarios.
