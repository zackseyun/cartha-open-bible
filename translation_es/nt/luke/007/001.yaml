translation:
  language: es
  text: Cuando hubo terminado todas sus palabras a oídos del pueblo[a], entró en Capernaúm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «en los oídos del pueblo». La expresión griega es idiomática y significa que habló de modo que el pueblo lo oyó, es decir, públicamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπειδὴ
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Después que
  - Puesto que
  lexicon: BDAG
  rationale: Aquí ἐπειδή introduce una relación temporal; en español, «Cuando» comunica con naturalidad la secuencia narrativa sin convertirla en causal.
- source_word: ἐπλήρωσεν
  english_pob_choice: had finished all his words
  chosen_spanish: hubo terminado
  alternatives_spanish:
  - había terminado
  - terminó
  - cumplió
  lexicon: BDAG
  rationale: El verbo con «palabras» expresa la idea de completar/terminar el hablar. «Hubo terminado» refleja bien una acción anterior a la principal y mantiene un tono literario adecuado.
- source_word: πάντα τὰ ῥήματα αὐτοῦ
  english_pob_choice: all his words
  chosen_spanish: todas sus palabras
  alternatives_spanish:
  - todas sus palabras dichas
  - todo lo que había dicho
  lexicon: BDAG
  rationale: La frase es literalmente «todas sus palabras». Se conserva esa referencia verbal directa, sin diluirla en una paraphrase más amplia.
- source_word: εἰς τὰς ἀκοὰς τοῦ λαοῦ
  english_pob_choice: in the hearing of the people
  chosen_spanish: en oídos del pueblo
  alternatives_spanish:
  - a oídos del pueblo
  - ante el pueblo
  - en presencia del pueblo
  lexicon: BDAG
  rationale: La expresión es idiomática y alude al ámbito auditivo de la audiencia. «En oídos del pueblo» preserva la imagen literal y permite una nota para la lectura más natural.
- source_word: λαοῦ
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  lexicon: BDAG
  rationale: «Pueblo» conserva el sustantivo colectivo del griego y encaja bien con el registro bíblico sin necesidad de especificar «multitud».
- source_word: εἰσῆλθεν
  english_pob_choice: he entered
  chosen_spanish: entró
  alternatives_spanish:
  - entró en
  - ingresó
  lexicon: BDAG
  rationale: El verbo indica entrada simple al lugar. «Entró» es natural en español y suficiente con el complemento de destino.
- source_word: Καφαρναούμ
  english_pob_choice: Capernaum
  chosen_spanish: Capernaúm
  alternatives_spanish:
  - Cafarnaúm
  lexicon: standard transliteration
  rationale: Se usa la forma española ampliamente reconocible «Capernaúm», cercana a la transliteración tradicional y de lectura clara para el público en español.
theological_decisions:
- issue: Valor de εἰς τὰς ἀκοὰς τοῦ λαοῦ
  english_pob_reading: in the hearing of the people
  chosen_spanish_reading: en oídos del pueblo
  alternative_spanish_readings:
  - ante el pueblo
  - para que el pueblo oyera
  rationale: No se suaviza la imagen auditiva del griego. La redacción conserva la fuerza expresiva del original, y la nota aclara que se trata de un modismo para decir que habló públicamente y fue oído por la gente.
  doctrine_reference: No aplica; cuestión de estilo e idiomatismo
- issue: Relación temporal de Ἐπειδὴ + aoristo
  english_pob_reading: When he had finished
  chosen_spanish_reading: Cuando hubo terminado
  alternative_spanish_readings:
  - Después que terminó
  - Cuando terminó
  rationale: La construcción temporal se entiende como antecedente inmediato de la acción siguiente. «Hubo terminado» mantiene la anterioridad verbal sin introducir una interpretación causal.
  doctrine_reference: No aplica; cuestión verbal/narrativa
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la frase a «all his words» para reflejar con mayor precisión πάντα τὰ ῥήματα αὐτοῦ; por eso el español conserva «todas sus palabras» en lugar de una paráfrasis como «todo lo que había dicho». También se respetó el valor temporal de ἐπειδή como introducción narrativa, no causal.
  spanish_consistency_notes:
  - Se mantiene «Capernaúm» con acento, forma española estándar y fácilmente reconocible.
  - Se conserva «pueblo» para λαός, evitando «multitud» por no estar exigido por el contexto.
  - La nota al pie se reserva para la imagen idiomática de «oídos»; el cuerpo principal permanece publicable y fluido.
