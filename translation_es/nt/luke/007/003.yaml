translation:
  language: es
  text: Cuando oyó acerca de Jesús[a], le envió ancianos de los judíos, pidiéndole que viniera y salvara a su esclavo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo». El griego usa doulos, que puede significar «siervo» o «esclavo» según el contexto; aquí se eligió «esclavo» para conservar la condición de dependencia implicada por el término.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: When he heard
  chosen_spanish: Cuando oyó
  alternatives_spanish:
  - Al oír
  - Habiendo oído
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia previa a la acción principal. «Cuando oyó» comunica con naturalidad la relación temporal sin volverla áspera en español.
- source_word: περὶ τοῦ Ἰησοῦ
  english_pob_choice: about Jesus
  chosen_spanish: acerca de Jesús
  alternatives_spanish:
  - sobre Jesús
  - con respecto a Jesús
  lexicon: BDAG
  rationale: περί con genitivo expresa el asunto sobre el que recibió noticia. «Acerca de Jesús» es claro, natural y conserva el matiz informativo.
- source_word: ἀπέστειλεν πρὸς αὐτὸν
  english_pob_choice: he sent to him
  chosen_spanish: envió a él
  alternatives_spanish:
  - le envió
  - envió mensajeros a él
  lexicon: BDAG
  rationale: El griego dice literalmente que envió hacia él a los ancianos; en español, «envió a él» mantiene la estructura sin añadir mensajeros que el texto no menciona.
- source_word: πρεσβυτέρους τῶν Ἰουδαίων
  english_pob_choice: elders of the Jews
  chosen_spanish: ancianos de los judíos
  alternatives_spanish:
  - los ancianos de los judíos
  - judíos ancianos
  lexicon: BDAG
  rationale: πρεσβύτεροι aquí designa dirigentes reconocidos de la comunidad. «Ancianos de los judíos» sigue de cerca la construcción griega y evita especificar más de lo que el texto dice.
- source_word: ἐρωτῶν αὐτὸν
  english_pob_choice: asking him
  chosen_spanish: pidiéndole
  alternatives_spanish:
  - preguntándole
  - rogándole
  lexicon: BDAG
  rationale: El participio expresa el contenido de la comisión. En este contexto de solicitud respetuosa, «pidiéndole» transmite mejor la intención que un simple «preguntándole».
- source_word: ὅπως ἐλθὼν
  english_pob_choice: to come
  chosen_spanish: que viniera
  alternatives_spanish:
  - que fuera
  - para que viniera
  lexicon: BDAG
  rationale: ὅπως con subjuntivo expresa finalidad o petición. En español, una subordinada con subjuntivo («que viniera») resulta natural y fiel al sentido.
- source_word: διασώσῃ
  english_pob_choice: save
  chosen_spanish: salvara
  alternatives_spanish:
  - rescatara
  - salvara y preservara
  lexicon: BDAG
  rationale: διασῴζω puede significar salvar, rescatar o preservar. «Salvara» conserva el alcance amplio del verbo sin reducirlo solo a «curar».
- source_word: τὸν δοῦλον αὐτοῦ
  english_pob_choice: his slave
  chosen_spanish: su esclavo
  alternatives_spanish:
  - su siervo
  - su criado
  lexicon: BDAG
  rationale: Siguiendo la guía del proyecto para δοῦλος, «esclavo» preserva la condición de dependencia vinculada al término. Se evita suavizarlo con «siervo», que en español suele borrar esa fuerza léxica.
theological_decisions:
- issue: Rendering δοῦλος in a household authority context
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: El contexto del centurión y su autoridad doméstica favorece conservar la realidad social de dependencia. «Esclavo» mantiene la tensión lexical y evita una domesticación tradicional del término.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy items 1 and 5'
translation_notes:
  revision_awareness: Coincide con el pasaje base y con el audit trail inglés; no se registran revisiones aplicadas en el paquete. La decisión principal a vigilar en español es la preservación de δοῦλος como «esclavo», manteniendo la nota alternativa tradicional «siervo».
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio estándar.
  - Se conserva «ancianos de los judíos» para seguir la sintaxis del griego sin añadir explicaciones interpretativas.
  - «Esclavo» se usa de forma consistente con la política del proyecto para δοῦλος en contextos donde la subordinación legal/social es relevante.
  - El verbo «salvara» preserva el alcance amplio de διασῴζω sin restringirlo a curación física.
