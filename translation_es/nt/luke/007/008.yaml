base_translation:
  language: en
  yaml_path: translation/nt/luke/007/008.yaml
  text: For I too am a man placed under authority[a], with soldiers under me; and I say to this one, ‘Go,’ and he goes; and to another, ‘Come,’ and he comes; and to my slave, ‘Do this,’ and he does it.
  footnotes:
