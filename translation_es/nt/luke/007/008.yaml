translation:
  language: es
  text: 'Porque también yo soy un hombre puesto bajo autoridad[a], con soldados bajo mi mando; y digo a este: “Ve”, y va; y a otro: “Ven”, y viene; y a mi esclavo: “Haz esto”, y lo hace.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “siervo” para “esclavo” (griego doulos). El término denota a un subordinado en condición de dependencia o posesión, aunque en algunos contextos puede verterse de manera más general como “siervo”.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  lexicon: BDAG
  rationale: La combinación introduce la explicación del centurión; “Porque” conserva con naturalidad el valor causal/explanatorio de γάρ y la conexión de καί sin sobrecargar el castellano.
- source_word: ἐγὼ ἄνθρωπός εἰμι
  english_pob_choice: I am a man
  chosen_spanish: yo soy un hombre
  alternatives_spanish:
  - soy un hombre
  - yo soy una persona
  lexicon: BDAG
  rationale: Se mantiene la autodeclaración personal con el énfasis del pronombre explícito; “hombre” refleja bien ἄνθρωπος aquí como ser humano varón en contraste con la autoridad de Jesús.
- source_word: ὑπὸ ἐξουσίαν τασσόμενος
  english_pob_choice: placed under authority
  chosen_spanish: puesto bajo autoridad
  alternatives_spanish:
  - colocado bajo autoridad
  - designado bajo autoridad
  - sujeto a autoridad
  lexicon: BDAG
  rationale: τάσσω sugiere quedar asignado o situado dentro de una estructura de mando. “Puesto bajo autoridad” conserva la pasiva y la idea jerárquica sin volverlo innecesariamente técnico.
- source_word: ἔχων ὑπ’ ἐμαυτὸν στρατιώτας
  english_pob_choice: with soldiers under me
  chosen_spanish: con soldados bajo mí
  alternatives_spanish:
  - con soldados bajo mi mando
  - teniendo soldados bajo mí
  lexicon: BDAG
  rationale: La frase explica la autoridad delegada del centurión. “Bajo mí” reproduce de modo directo la relación jerárquica del griego; “bajo mi mando” es más interpretativo.
- source_word: λέγω τούτῳ
  english_pob_choice: I say to this one
  chosen_spanish: digo a este
  alternatives_spanish:
  - le digo a este
  - digo a uno
  lexicon: BDAG
  rationale: τούτῳ es demostrativo y concreto; “a este” conserva esa deixis y funciona con naturalidad en español sin añadir palabras innecesarias.
- source_word: Πορεύθητι
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Anda
  lexicon: BDAG
  rationale: El imperativo de πορεύομαι se expresa con un mandato simple de partir o irse. “Ve” es breve, natural y suficientemente fiel.
- source_word: πορεύεται
  english_pob_choice: he goes
  chosen_spanish: va
  alternatives_spanish:
  - se va
  - va yendo
  lexicon: BDAG
  rationale: Se preserva el paralelo mandato-respuesta con una forma simple y natural en español.
- source_word: ἄλλῳ
  english_pob_choice: another
  chosen_spanish: a otro
  alternatives_spanish:
  - a otra persona
  - a otro más
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de manera directa; el paralelismo con “a este” se mantiene claramente.
- source_word: Ἔρχου
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Vente
  - Acércate
  lexicon: BDAG
  rationale: La orden reproduce el mismo tono directo del griego. “Ven” conserva la sencillez del imperativo.
- source_word: ἔρχεται
  english_pob_choice: he comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - se acerca
  lexicon: BDAG
  rationale: “Viene” mantiene el paralelismo con el mandato y evita introducir una matiz de llegada que el griego no exige.
- source_word: τῷ δούλῳ μου
  english_pob_choice: to my slave
  chosen_spanish: a mi esclavo
  alternatives_spanish:
  - a mi siervo
  - a mi criado
  lexicon: BDAG
  rationale: Se conserva la fuerza léxica de δοῦλος con “esclavo”, según la preferencia del proyecto cuando el estatus subordinado es central. “Siervo” se deja como alternativa porque en español puede sonar más eclesial o suavizar demasiado la relación de dependencia.
- source_word: Ποίησον τοῦτο
  english_pob_choice: Do this
  chosen_spanish: Haz esto
  alternatives_spanish:
  - Hazlo
  - Realiza esto
  lexicon: BDAG
  rationale: ποιέω con τοῦτο se traduce con un imperativo natural y directo; “Haz esto” preserva la contundencia del mandato.
- source_word: ποιεῖ
  english_pob_choice: he does it
  chosen_spanish: y lo hace
  alternatives_spanish:
  - y lo cumple
  - y lo ejecuta
  lexicon: BDAG
  rationale: La respuesta final retoma el objeto implícito de modo claro en español y conserva el patrón de obediencia inmediato.
theological_decisions:
- issue: Renderización de δοῦλος en la analogía de autoridad
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  - siervo sujeto
  rationale: La escena subraya una relación de subordinación real dentro de una cadena de mando. “Esclavo” conserva la fuerza social del término griego y evita domesticar la imagen. Dado que en español “siervo” puede sonar más religioso o suavizar el vínculo de pertenencia, se mantiene solo como alternativa.
  doctrine_reference: 'DOCTRINE.md: contested terms para δοῦλος; guía de términos de fuerza social y subordinación'
- issue: Valor de ὑπὸ ἐξουσίαν τασσόμενος
  english_pob_reading: placed under authority
  chosen_spanish_reading: puesto bajo autoridad
  alternative_spanish_readings:
  - sujeto a autoridad
  - colocado bajo autoridad
  - designado bajo autoridad
  rationale: No se trata de una afirmación doctrinal abstracta sobre autoridad, sino de una descripción concreta del puesto del centurión. “Puesto bajo autoridad” retiene el matiz pasivo y la estructura jerárquica sin convertirla en paráfrasis.
  doctrine_reference: Principios POB de equivalencia óptima y preservación de la estructura semántica del original
translation_notes:
  revision_awareness: El texto español sigue de cerca el packet griego y el audit trail inglés sin depender mecánicamente de la redacción inglesa. Se conservó la cadena de autoridad, el paralelismo imperativo-respuesta y la fuerza de δοῦλος, con una nota alternativa para no ocultar la ambigüedad contextual documentada.
  spanish_consistency_notes:
  - Se usa “Yahvé” como forma predeterminada cuando corresponda; este versículo no contiene el nombre divino.
  - Se mantiene “esclavo” para δοῦλος por la centralidad de la subordinación en la analogía.
  - Se preserva “autoridad” para ἐξουσία y no se sustituye por “poder”, porque el contexto es jerárquico y de mando.
  - Los imperativos breves (“Ve”, “Ven”, “Haz esto”) reproducen el tono directo del griego y el paralelismo retórico del pasaje.
