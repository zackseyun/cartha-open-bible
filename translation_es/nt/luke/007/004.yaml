translation:
  language: es
  text: 'Cuando llegaron a Jesús, le rogaron insistentemente, diciendo: «Es digno de que le concedas esto[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Es digno de que hagas esto por él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενόμενοι
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - se presentaron
  lexicon: BDAG
  rationale: El participio expresa que se hicieron presentes ante Jesús. «Llegaron» comunica de manera natural la idea de arribo sin perder el valor temporal del participio.
- source_word: παρεκάλουν
  english_pob_choice: appealed
  chosen_spanish: le rogaron
  alternatives_spanish:
  - le suplicaron
  - le instaron
  - le pidieron
  lexicon: BDAG
  rationale: El verbo lleva el sentido de apelar con respeto pero con urgencia. En español, «rogar» transmite bien la petición insistente y reverente de los ancianos.
- source_word: σπουδαίως
  english_pob_choice: earnestly
  chosen_spanish: insistentemente
  alternatives_spanish:
  - ardientemente
  - con diligencia
  - con urgencia
  lexicon: BDAG
  rationale: La adverbial enfatiza la seriedad e intensidad de la petición. «Insistentemente» conserva esa fuerza en un español natural; no conviene volverlo meramente «seriamente».
- source_word: Ἄξιός
  english_pob_choice: worthy
  chosen_spanish: Es digno
  alternatives_spanish:
  - Es merecedor
  - Es digno de ello
  - Es apto
  lexicon: BDAG
  rationale: «Digno» reproduce la valoración de mérito o idoneidad. Mantiene la fuerza evaluativa del juicio que los portavoces hacen sobre el centurión.
- source_word: ᾧ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  - a él
  lexicon: BDAG
  rationale: El relativo dativo se refiere al centurión. En español, el clítico «le» integra de forma natural el destinatario implícito del beneficio pedido.
- source_word: παρέξῃ
  english_pob_choice: you should grant
  chosen_spanish: concedas
  alternatives_spanish:
  - hagas
  - otorgues
  - des
  lexicon: BDAG
  rationale: El verbo aquí expresa conceder o otorgar un favor solicitado. «Concedas» es idiomático y fiel al tono deferente del ruego.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este favor
  - esta solicitud
  lexicon: BDAG
  rationale: El demostrativo remite a la acción pedida en el contexto inmediato. «Esto» conserva la brevedad y evita añadir contenido no explicitado en el griego.
translation_notes:
  revision_awareness: Esta redacción sigue de cerca el griego de SBLGNT y el audit trail inglés, manteniendo la petición indirecta y el matiz de urgencia sin ampliar el contenido. La nota del inglés sobre la alternativa «for you to do this for him» se refleja en español como una posibilidad equivalente de sentido.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como nombre propio sin artículo, conforme al uso bíblico español estándar y al texto griego.
  - Se evitó «Señor» porque aquí el sujeto explícito es Jesús y no aparece κύριος en el versículo.
  - «Le rogaron insistentemente» conserva el respeto y la urgencia de παρεκάλουν σπουδαίως sin exagerar el matiz emocional.
