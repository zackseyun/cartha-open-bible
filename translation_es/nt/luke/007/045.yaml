translation:
  language: es
  text: No me diste beso[a], pero ella, desde que entré[b], no ha dejado de besar mis pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «beso de saludo»; el beso era un acto acostumbrado de hospitalidad.
    reason: cultural_note
  - marker: b
    text: 'El verbo puede implicar un beso afectuoso o repetido: «no ha dejado de cubrir mis pies de besos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: φίλημά
  english_pob_choice: kiss
  chosen_spanish: beso
  alternatives_spanish:
  - un beso
  - beso de saludo
  lexicon: BDAG
  rationale: El sustantivo con ἔδωκας expresa el acto de dar un beso; en español, «beso» es natural y conserva la brevedad del griego. «Beso de saludo» explicita la función social, pero la deja fuera del texto principal como en el registro inglés.
- source_word: μοι
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: El dativo marca el objeto indirecto de ἔδωκας. «Me» es la forma más natural en español y conserva la relación gramatical sin recargar la frase.
- source_word: ἔδωκας
  english_pob_choice: gave
  chosen_spanish: diste
  alternatives_spanish:
  - ofreciste
  lexicon: BDAG
  rationale: δίδωμι aquí se traduce de manera directa por «dar». «Diste» mantiene el valor básico del verbo y la estructura del reproche de hospitalidad.
- source_word: αὕτη δὲ
  english_pob_choice: but she
  chosen_spanish: pero ella
  alternatives_spanish:
  - pero esta mujer
  - y ella
  lexicon: BDAG
  rationale: El demostrativo introduce contraste con Simón y remite a la mujer ya presente en la escena. «Pero ella» suena natural en español y conserva el contraste sin añadir más demostración de la necesaria.
- source_word: ἀφ’ ἧς
  english_pob_choice: from the time
  chosen_spanish: desde que
  alternatives_spanish:
  - desde el momento en que
  - desde cuando
  lexicon: BDAG
  rationale: La construcción relativa tiene sentido temporal. «Desde que» expresa bien el inicio de la acción continua y resulta idiomático en español.
- source_word: εἰσῆλθον
  english_pob_choice: I came in
  chosen_spanish: entré
  alternatives_spanish:
  - vine
  - ingresé
  lexicon: BDAG
  rationale: El verbo significa entrar. «Entré» es la opción más directa y sobria en español; evita una paráfrasis innecesaria.
- source_word: οὐ διέλιπεν
  english_pob_choice: has not stopped
  chosen_spanish: no ha dejado de
  alternatives_spanish:
  - no ha cesado de
  - no se ha detenido
  lexicon: BDAG
  rationale: El valor aspectual apunta a una acción continuada hasta el momento del habla. «No ha dejado de» reproduce bien esa continuidad en español, con un ritmo natural.
- source_word: καταφιλοῦσά
  english_pob_choice: kissing
  chosen_spanish: besar
  alternatives_spanish:
  - besar repetidamente
  - cubrir de besos
  lexicon: BDAG
  rationale: καταφιλέω intensifica el acto de besar y puede sugerir repetición o afecto insistente. El texto principal usa el verbo simple «besar», y la intensidad se conserva en la nota de alternativa.
- source_word: μου τοὺς πόδας
  english_pob_choice: my feet
  chosen_spanish: mis pies
  alternatives_spanish:
  - los pies de mí
  lexicon: BDAG
  rationale: El plural griego se conserva claramente en español. «Mis pies» es la forma natural y exacta.
theological_decisions:
- issue: Beso de hospitalidad implícito
  english_pob_reading: Render the action plainly without expanding it into a cultural explanation in the main text.
  chosen_spanish_reading: Traducir la acción de manera simple en el texto principal y dejar la explicación cultural en nota.
  alternative_spanish_readings:
  - No me diste un beso de saludo
  - No me diste el beso acostumbrado de hospitalidad
  rationale: La escena presupone una costumbre social de acogida, pero el griego dice literalmente que no se dio un beso. Mantenerlo simple en el texto principal preserva la economía del original y la nota puede explicar la carga cultural.
  doctrine_reference: 'Translation philosophy: optimal equivalence; primacía del texto original sobre la tradición de traducción.'
translation_notes:
  revision_awareness: El registro inglés no requirió cambios en la última revisión; la versión española conserva esa estabilidad y sigue de cerca las decisiones auditadas del texto fuente y del POB en inglés.
  spanish_consistency_notes:
  - Se mantiene «beso» y no «ósculo», por claridad moderna y fidelidad al valor léxico.
  - Se conserva la continuidad verbal con «no ha dejado de», equivalente natural de οὐ διέλιπεν en este contexto narrativo presente.
  - «Entré» evita sobreinterpretar εἰσῆλθον y coincide con el contexto de llegada a la casa.
  - La nota b preserva la intensidad de καταφιλέω sin sobrecargar el texto principal.
  - Se usa «pies» en plural, conforme al griego, sin singularizar ni generalizar.
