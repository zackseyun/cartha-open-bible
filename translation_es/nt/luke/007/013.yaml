translation:
  language: es
  text: 'Y al verla, el Señor se compadeció de ella y le dijo: «No llores[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No estés llorando» o «Deja de llorar». El griego puede entenderse como una prohibición general o como una orden de poner fin al llanto presente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: when ... saw
  chosen_spanish: al verla
  alternatives_spanish:
  - cuando la vio
  - habiéndola visto
  lexicon: BDAG
  rationale: El participio aoristo de ὁράω marca anterioridad respecto del verbo principal. En español, «al verla» comunica esa relación temporal de forma natural y concisa, sin volverlo una construcción demasiado literal o pesada.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el maestro
  lexicon: BDAG
  rationale: Se conserva el valor titular de κύριος como en el audit trail inglés. «Señor» es la forma española natural y reverente para el título cristológico aquí, mientras que «maestro» debilitaría ese alcance.
- source_word: ἐσπλαγχνίσθη
  english_pob_choice: was moved with compassion
  chosen_spanish: se compadeció
  alternatives_spanish:
  - fue movido a compasión
  - tuvo compasión
  lexicon: BDAG
  rationale: σπλαγχνίζομαι expresa una compasión profunda y afectiva. «Se compadeció» preserva bien el sentido verbal en español sin perder naturalidad; «tuvo compasión» es posible, pero suena más plana y menos dinámica.
- source_word: ἐπ’ αὐτῇ
  english_pob_choice: for her
  chosen_spanish: de ella
  alternatives_spanish:
  - por ella
  - hacia ella
  - a favor de ella
  lexicon: BDAG
  rationale: Con σπλαγχνίζομαι, la preposición expresa la persona objeto de la compasión. En español, «de ella» dentro de «se compadeció de ella» comunica ese vínculo de manera idiomática.
- source_word: εἶπεν αὐτῇ
  english_pob_choice: said to her
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le respondió
  lexicon: BDAG
  rationale: «Decir a alguien» se expresa naturalmente con el dativo clítico «le dijo». Mantiene la relación directa del original sin añadir matices que el texto no exige.
- source_word: Μὴ κλαῖε
  english_pob_choice: Do not weep
  chosen_spanish: No llores
  alternatives_spanish:
  - No llorés
  - No estés llorando
  - Deja de llorar
  lexicon: BDAG
  rationale: κλαίω significa llorar/llorar en lamento. «No llores» conserva el valor léxico y deja abierta la ambigüedad aspectual del griego entre prohibición general y cese de un llanto en curso, tal como el audit trail inglés la documenta.
theological_decisions:
- issue: κύριος como título aplicado a Jesús
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el maestro
  rationale: Se sigue la decisión auditada de tratar κύριος como título cristológico, no como simple «maestro». En español, «el Señor» preserva esa elevación narrativa sin introducir una paráfrasis interpretativa.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Ambigüedad de Μὴ κλαῖε
  english_pob_reading: Do not weep / Do not cry / Stop weeping
  chosen_spanish_reading: No llores
  alternative_spanish_readings:
  - No estés llorando
  - Deja de llorar
  rationale: El griego con μή + presente imperativo puede leerse como prohibición o como orden de cesar una acción en progreso. «No llores» mantiene esa tensión sin resolverla indebidamente en favor de una sola lectura.
  doctrine_reference: Luke 7:13 lexical note on μή + present imperative
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés aprobado y no introduce revisiones adicionales; conserva la tensión aspectual de μή + presente imperativo y la decisión cristológica para κύριος.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en coherencia con el glosario proyectual y con la lectura cristológica del pasaje.
  - «Se compadeció de ella» reproduce de forma idiomática el valor afectivo de σπλαγχνίζομαι + ἐπί con dativo.
  - La negación breve «No llores» es publicable y mantiene abierta la alternativa de cese de llanto sin sobreexplicarla en el texto principal.
