  text: ὅμοιοί εἰσιν παιδίοις τοῖς ἐν ἀγορᾷ καθημένοις καὶ προσφωνοῦσιν ἀλλήλοις, ⸂ἃ λέγει⸃· Ηὐλήσαμεν ὑμῖν καὶ οὐκ ὠρχήσασθε· ⸀ἐθρηνήσαμεν καὶ οὐκ ἐκλαύσατε·
base_translation:
  language: en
  yaml_path: translation/nt/luke/007/032.yaml
  text: 'They are like children sitting in the marketplace and calling to one another[a], who say: ‘We played the flute for you, and you did not dance; we sang a lament[b], and you did not weep.’'
  footnotes:
  - marker: a
    text: Or, more traditionally, 'We piped for you.' The Greek verb specifically refers to playing a flute or pipe.
    reason: lexical_alternative
  - marker: b
    text: Or 'we sang a dirge' / 'we mourned.' The Greek can denote lamenting, including a funeral lament.
    reason: lexical_alternative
