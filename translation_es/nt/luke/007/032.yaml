translation:
  language: es
  text: 'Son semejantes a niños sentados en la plaza, llamándose unos a otros, y diciendo: «Les tocamos la flauta[a], y no bailaron; entonamos un lamento[b], y no lloraron.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «Les tocamos para ustedes la flauta» o «Les tocamos la flauta de caña». El verbo griego se refiere específicamente a tocar una flauta o un instrumento de viento semejante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «entonamos un canto fúnebre» / «hicimos duelo». El griego puede referirse al lamento, incluso como canto funerario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅμοιοί εἰσιν
  english_pob_choice: They are like
  chosen_spanish: Son semejantes a
  alternatives_spanish:
  - Son como
  - Se parecen a
  lexicon: BDAG
  rationale: La comparación introductoria se expresa con naturalidad en español con 'son semejantes a'; mantiene el valor comparativo sin forzar un calco.
- source_word: παιδίοις
  english_pob_choice: children
  chosen_spanish: niños
  alternatives_spanish:
  - niños pequeños
  - criaturas
  lexicon: BDAG
  rationale: El diminutivo griego puede incluir el tono de pequeños; en este contexto de escena infantil, 'niños' es natural y suficiente sin sobredeterminar la edad.
- source_word: ἐν ἀγορᾷ
  english_pob_choice: in the marketplace
  chosen_spanish: en la plaza
  alternatives_spanish:
  - en el mercado
  - en la plaza del mercado
  lexicon: BDAG
  rationale: ἀγορά puede ser mercado o plaza pública. 'Plaza' comunica bien el espacio abierto y social de la escena en español, sin perder el sentido de lugar público.
- source_word: καθημένοις
  english_pob_choice: sitting
  chosen_spanish: sentados
  alternatives_spanish:
  - sentados allí
  - estando sentados
  lexicon: BDAG
  rationale: El participio describe la postura estable de los niños; 'sentados' es la forma natural y fiel en español.
- source_word: προσφωνοῦσιν ἀλλήλοις
  english_pob_choice: calling to one another
  chosen_spanish: que se llaman unos a otros
  alternatives_spanish:
  - que se gritan unos a otros
  - que se hablan entre sí
  lexicon: BDAG
  rationale: προσφωνέω implica llamar o dirigirse a alguien; con ἀλλήλοις, 'se llaman unos a otros' conserva la reciprocidad y la escena.
- source_word: ἃ λέγει
  english_pob_choice: who say
  chosen_spanish: y dicen
  alternatives_spanish:
  - que dicen
  - las cuales dicen
  lexicon: BDAG
  rationale: El relativo neutro plural funciona de forma colectiva; en español, 'y dicen' resulta más idiomático y mantiene el enlace con la cita.
- source_word: Ηὐλήσαμεν
  english_pob_choice: We played the flute for you
  chosen_spanish: Les tocamos la flauta
  alternatives_spanish:
  - Les tocamos una flauta
  - Les pipamos
  lexicon: BDAG
  rationale: αὐλέω se refiere específicamente a tocar flauta o instrumento semejante. 'Tocamos la flauta' hace explícito el instrumento con claridad y dignidad en español.
- source_word: ὠρχήσασθε
  english_pob_choice: you did not dance
  chosen_spanish: no bailaron
  alternatives_spanish:
  - no danzaron
  - no se pusieron a bailar
  lexicon: BDAG
  rationale: El aoristo se vierte de manera simple y natural; 'bailaron' comunica bien la respuesta esperada en la escena.
- source_word: ἐθρηνήσαμεν
  english_pob_choice: we sang a lament
  chosen_spanish: entonamos un lamento
  alternatives_spanish:
  - cantamos un lamento
  - hicimos un lamento
  - entonamos una endecha
  lexicon: BDAG
  rationale: θρηνέω puede significar lamentar o cantar un canto fúnebre. 'Entonamos un lamento' conserva el carácter performativo y la relación con la flauta, sin resolver la ambigüedad por completo.
- source_word: ἐκλαύσατε
  english_pob_choice: you did not weep
  chosen_spanish: y no lloraron
  alternatives_spanish:
  - y no lloraron de pena
  - y no se lamentaron
  lexicon: BDAG
  rationale: κλαίω significa llorar o llorar de pena. 'Lloraron' es la correspondencia más directa y natural en español, manteniendo el paralelismo con la línea anterior.
theological_decisions:
- issue: Preservar la fuerza parabólica de la imagen sin interpretarla en exceso
  english_pob_reading: Use concrete activity language ('played the flute,' 'sang a lament,' 'did not dance,' 'did not weep')
  chosen_spanish_reading: Usar lenguaje concreto de acciones ('tocamos la flauta', 'entonamos un lamento', 'no bailaron', 'no lloraron')
  alternative_spanish_readings:
  - Interpretar como 'celebramos' y 'guardamos luto'
  - Suavizar la escena con expresiones más abstractas
  rationale: El dicho presenta una comparación viva, no su explicación. Mantener acciones concretas preserva la tensión y la imagen original sin añadir interpretación.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: No se requirieron cambios frente al último pase de revisión; la redacción se mantiene en acuerdo alto con el auditor y conserva las dos alternativas léxicas documentadas en el antecedente inglés.
  spanish_consistency_notes:
  - Se mantiene 'flauta' para explicitar el instrumento, siguiendo la decisión inglesa de hacer transparente αὐλέω.
  - '''Lamento'' conserva la ambigüedad entre lamentar y cantar un canto fúnebre, sin borrar la tensión documentada.'
  - Se prefiere 'plaza' como equivalente contextual de ἀγορά por legibilidad en español, aunque 'mercado' sigue siendo una alternativa válida.
  - El plural de la cita se adapta a 'dicen' en español por idiomaticidad, aunque el griego use λέγει en singular colectivo.
