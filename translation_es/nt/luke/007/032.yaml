  to: 'Son semejantes a niños sentados en la plaza, llamándose unos a otros, y diciendo: «Les tocamos la flauta[a], y no bailaron; entonamos un lamento[b], y no lloraron.»'
  rationale: Se corrigió el error principal reubicando la nota [a] al verbo «tocamos la flauta», que es la expresión que la nota realmente explica según el griego αὐλέω y la auditoría inglesa. También se mejoró la naturalidad de προσφωνοῦσιν ἀλλήλοις con «llamándose unos a otros» y se ajustó «y dicen» a «y diciendo» para enlazar con mayor fluidez la cita directa. No se requieren cambios doctrinales ni de terminología mayor.
