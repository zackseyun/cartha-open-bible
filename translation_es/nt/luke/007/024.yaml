    rationale: La nota [a] explica alternativas para «a ver»/θεάσασθαι, pero en el borrador está anclada a «se fueron». Esto rompe la trazabilidad entre texto y nota exigida por el proyecto.
  - severity: low
    issue: Ligera torpeza idiomática en «¿Qué salieron a ver al desierto?»
    rationale: Aunque es comprensible, en español suena más natural «¿Qué salieron a ver en el desierto?» o «¿Qué fueron a ver al desierto?». El griego pregunta por el objeto visto en ese lugar, y la revisión mejora la fluidez sin alterar el sentido.
  revised_spanish_text: 'Después de que los mensajeros de Juan se fueron, comenzó a hablar a las multitudes acerca de Juan: «¿Qué salieron a ver[a] en el desierto? ¿Una caña sacudida por el viento?»'
