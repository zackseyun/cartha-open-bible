  to: 'Después de que los mensajeros de Juan se fueron, comenzó a hablar a las multitudes acerca de Juan: «¿Qué salieron a ver[a] en el desierto? ¿Una caña sacudida por el viento?»'
  rationale: Se corrige la ubicación de la nota al pie para que ancle correctamente θεάσασθαι y se mejora levemente la naturalidad de la pregunta retórica en español con «en el desierto». No se alteran las decisiones léxicas principales ni la fuerza metafórica del original.
