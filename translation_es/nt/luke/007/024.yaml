translation:
  language: es
  text: 'Después de que los mensajeros de Juan se fueron, comenzó a hablar a las multitudes acerca de Juan: «¿Qué salieron a ver[a] en el desierto? ¿Una caña sacudida por el viento?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para ver» o «para contemplar» en lugar de «a ver».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπελθόντων
  english_pob_choice: After ... had gone away
  chosen_spanish: Después de que ... se fueron
  alternatives_spanish:
  - Cuando ... se fueron
  - Después de que ... partieron
  lexicon: BDAG
  rationale: El participio aoristo en genitivo absoluto expresa anterioridad temporal respecto al inicio del discurso. «Después de que» comunica bien esa secuencia en español sin forzar una estructura demasiado literal.
- source_word: ἀγγέλων
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - ángeles
  lexicon: BDAG
  rationale: El contexto inmediato muestra que se trata de enviados humanos de Juan, no de seres celestiales. «Mensajeros» conserva ese sentido contextual y evita una lectura incorrecta.
- source_word: ἤρξατο λέγειν
  english_pob_choice: he began to speak
  chosen_spanish: comenzó a hablar
  alternatives_spanish:
  - empezó a decir
  - comenzó a decir
  lexicon: BDAG
  rationale: La construcción inceptiva marca el inicio del discurso. «Comenzó a hablar» suena natural en español dirigido a una multitud, sin perder el valor inceptivo.
- source_word: πρὸς τοὺς ὄχλους
  english_pob_choice: to the crowds
  chosen_spanish: a las multitudes
  alternatives_spanish:
  - a las multitudes reunidas
  - al gentío
  lexicon: BDAG
  rationale: El plural ὄχλους se rinde mejor como plural en español. «A las multitudes» mantiene la referencia a grupos numerosos y el valor direccional de πρός en este contexto de discurso.
- source_word: περὶ Ἰωάννου
  english_pob_choice: about John
  chosen_spanish: acerca de Juan
  alternatives_spanish:
  - sobre Juan
  - con respecto a Juan
  lexicon: BDAG
  rationale: «Acerca de» reproduce de forma natural el sentido discursivo de περί con genitivo, manteniendo un registro claro y sobrio.
- source_word: Τί ἐξήλθατε
  english_pob_choice: What did you go out
  chosen_spanish: ¿Qué salieron a ver
  alternatives_spanish:
  - ¿A qué salieron
  - ¿Qué fueron a ver
  lexicon: BDAG
  rationale: 'Aquí τί introduce el objeto de la salida, no principalmente la motivación. En español conviene integrar el infinitivo siguiente para que la pregunta resulte natural y fiel al sentido: «¿Qué salieron a ver?»'
- source_word: εἰς τὴν ἔρημον
  english_pob_choice: into the wilderness
  chosen_spanish: al desierto
  alternatives_spanish:
  - al desierto solitario
  - a la región desierta
  lexicon: BDAG
  rationale: Aunque «wilderness» suele traducirse como «desierto» o «desierto/soledad» según contexto, aquí el español más transparente y bíblico es «al desierto». Mantiene la referencia al lugar asociado con el ministerio de Juan.
- source_word: θεάσασθαι
  english_pob_choice: to look at
  chosen_spanish: a ver
  alternatives_spanish:
  - para mirar
  - para contemplar
  lexicon: BDAG
  rationale: El verbo puede expresar observación atenta; en español, dentro de una pregunta retórica, «a ver» es natural y breve. El texto griego no exige una glosa interpretativa más amplia.
- source_word: κάλαμον
  english_pob_choice: a reed
  chosen_spanish: una caña
  alternatives_spanish:
  - un junco
  - una caña de carrizo
  lexicon: BDAG
  rationale: La imagen literal es de una planta flexible junto al agua. «Caña» comunica bien el referente botánico y funciona naturalmente en español sin perder la metáfora.
- source_word: ὑπὸ ἀνέμου σαλευόμενον
  english_pob_choice: shaken by the wind
  chosen_spanish: sacudida por el viento
  alternatives_spanish:
  - movida por el viento
  - zarandeada por el viento
  lexicon: BDAG
  rationale: «Sacudida» reproduce la idea de inestabilidad producida por el viento y conserva la fuerza imagética. Mantiene la metáfora abierta sin explicarla.
theological_decisions:
- issue: Fuerza metafórica de la pregunta retórica sobre Juan
  english_pob_reading: Retain the literal image 'A reed shaken by the wind?' without explicating the metaphor in the main text.
  chosen_spanish_reading: 'Conservar la imagen literal: «¿Una caña sacudida por el viento?»'
  alternative_spanish_readings:
  - ¿Un hombre voluble?
  - ¿Una caña débil zarandeada por el viento?
  rationale: El texto presenta la imagen y deja que el auditorio infiera el rechazo de una caracterización inestable o vacilante. Traducir con una paráfrasis interpretativa resolvería una tensión que el original mantiene abierta.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla por paráfrasis.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran plena concordancia en la secuencia temporal, el sentido contextual de ἀγγέλων como «mensajeros» y la conservación de la imagen retórica final. No se registran revisiones aplicadas en el ciclo fuente-inglés; por ello, la propuesta española sigue de cerca esas decisiones auditadas sin introducir explicaciones ajenas al texto.
  spanish_consistency_notes:
  - Se conserva «Juan» para el nombre propio y «mensajeros» para ἀγγέλων según el contexto inmediato.
  - Se usa «al desierto» para ἔρημον, en coherencia con el uso bíblico de este escenario en Lucas.
  - La pregunta retórica final mantiene la metáfora sin interpretarla, siguiendo la filosofía de equivalencia óptima del registro base.
  - El marcador de nota [a] está anclado en «a ver» para preservar la alternativa lexical documentada.
