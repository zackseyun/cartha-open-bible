translation:
  language: es
  text: 'Cuando Jesús oyó estas cosas[a], se maravilló de él, y, volviéndose a la multitud que lo seguía, dijo: «Les digo[b]: ni siquiera en Israel he hallado tanta fe».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tan grande fe».
    reason: lexical_alternative
  - marker: b
    text: O «confianza»; el término griego es el mismo que suele traducirse «fe».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: When Jesus heard
  chosen_spanish: Cuando Jesús oyó
  alternatives_spanish:
  - Al oír Jesús
  - Después de oír Jesús
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia previa a la acción principal. «Cuando Jesús oyó» preserva el valor temporal y suena natural en español.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - lo que había oído
  lexicon: BDAG
  rationale: El demostrativo plural se conserva como «estas cosas», referido a las palabras informadas del centurión. Mantiene la referencia plural del griego.
- source_word: ἐθαύμασεν
  english_pob_choice: marveled
  chosen_spanish: se maravilló
  alternatives_spanish:
  - se asombró
  - quedó maravillado
  lexicon: BDAG
  rationale: θαυμάζω expresa admiración/extrañeza. «Se maravilló» conserva el tono elevado y no sugiere ignorancia en Jesús.
- source_word: αὐτόν
  english_pob_choice: at him
  chosen_spanish: de él
  alternatives_spanish:
  - ante él
  - del centurión
  lexicon: BDAG
  rationale: El pronombre remite al centurión. Con «maravilló de él» se expresa la relación del verbo en español sin añadir una glosa innecesaria.
- source_word: στραφεὶς
  english_pob_choice: turning
  chosen_spanish: volviéndose
  alternatives_spanish:
  - y volviéndose
  - habiéndose vuelto
  lexicon: BDAG
  rationale: El participio narrativo se vierte con una forma natural y concisa en español, preservando la secuencia de acciones.
- source_word: τῷ ἀκολουθοῦντι αὐτῷ ὄχλῳ
  english_pob_choice: to the crowd following him
  chosen_spanish: al pueblo que lo seguía
  alternatives_spanish:
  - a la multitud que lo seguía
  - a la gente que lo seguía
  lexicon: BDAG
  rationale: «ὄχλος» puede ser «multitud» o «pueblo» según contexto; aquí el seguimiento de Jesús en escena permite «pueblo» como opción readable. «Que lo seguía» conserva el participio presente de acción en curso.
- source_word: Λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: Les digo
  alternatives_spanish:
  - Les aseguro
  - Yo les digo
  lexicon: BDAG
  rationale: La fórmula de discurso directo se naturaliza como «Les digo», manteniendo la segunda persona plural y la fuerza declarativa.
- source_word: οὐδὲ ἐν τῷ Ἰσραὴλ
  english_pob_choice: not even in Israel
  chosen_spanish: ni aun en Israel
  alternatives_spanish:
  - ni siquiera en Israel
  - ni aun entre Israel
  lexicon: BDAG
  rationale: La locución concesiva se traduce de manera idiomática y enfática. «Ni aun» refleja el alcance de οὐδὲ con intensificación.
- source_word: τοσαύτην πίστιν
  english_pob_choice: such faith
  chosen_spanish: tanta fe
  alternatives_spanish:
  - tal fe
  - tan gran fe
  lexicon: BDAG
  rationale: τοσαύτην intensifica la cualidad o grado. «Tanta fe» comunica bien esa magnitud en español; «fe» mantiene la elección doctrinal estándar para πίστις.
- source_word: εὗρον
  english_pob_choice: have I found
  chosen_spanish: he hallado
  alternatives_spanish:
  - he encontrado
  - hallé
  lexicon: BDAG
  rationale: Aunque el aoristo es formalmente pasado, en esta declaración el perfecto español transmite mejor el resultado presente de la experiencia de Jesús.
theological_decisions:
- issue: Renderización de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: Se mantiene la traducción doctrinal por defecto «fe», que aquí designa la confianza creyente del centurión en la autoridad de Jesús, no primariamente su fidelidad como rasgo moral.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Alcance de οὐδὲ ἐν τῷ Ἰσραήλ
  english_pob_reading: not even in Israel
  chosen_spanish_reading: ni aun en Israel
  alternative_spanish_readings:
  - ni siquiera en Israel
  - ni aun entre Israel
  rationale: 'La frase conserva el contraste retórico: ni dentro del ámbito de Israel se encontró una fe comparable. No se atenúa el alcance inclusivo/excluyente del dicho.'
  doctrine_reference: Luke 7:9 discourse context
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene el mismo sentido en revisiones recientes; no se reportaron cambios aplicados. La redacción española sigue esa línea estable y conserva las alternativas léxicas relevantes en notas.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς.
  - Se conserva «fe» para πίστις conforme a la terminología doctrinal del proyecto.
  - «Ni aun» reproduce el valor enfático de οὐδὲ sin perder naturalidad en español.
  - «He hallado» refleja bien el perfecto español frente al aoristo griego en una declaración de resultado presente.
  - El sustantivo colectivo «pueblo» se usa aquí como equivalente natural de ὄχλος en contexto narrativo, sin borrar la idea de una multitud que acompaña a Jesús.
