translation:
  language: es
  text: 'Este es de quien está escrito: «He aquí, yo envío a mi mensajero[a] delante de tu rostro[b], quien preparará tu camino delante de ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mensajero» también podría traducirse «ángel», pero aquí se refiere a un enviado humano, concretamente Juan.
    reason: lexical_alternative
  - marker: b
    text: 'O más fluidamente: «delante de ti». El griego dice literalmente «delante de tu rostro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτός
  english_pob_choice: This
  chosen_spanish: Este
  alternatives_spanish:
  - Este mismo
  - Aquel
  lexicon: BDAG
  rationale: El demostrativo apunta con énfasis a Juan; «Este» conserva la referencia directa y suena natural en español sin añadir interpretación.
- source_word: περὶ οὗ γέγραπται
  english_pob_choice: about whom it is written
  chosen_spanish: de quien está escrito
  alternatives_spanish:
  - acerca de quien está escrito
  - sobre quien está escrito
  lexicon: BDAG
  rationale: La construcción relativa con verbo en perfecto pasivo se expresa de forma idiomática en español con «de quien está escrito», manteniendo la fórmula citacional sin dureza innecesaria.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: BDAG
  rationale: Para un español bíblico moderno, «Mira» conserva el tono exhortativo y citacional. «He aquí» sería más tradicional, pero menos natural para lectura pública contemporánea.
- source_word: ἀποστέλλω
  english_pob_choice: I am sending
  chosen_spanish: yo envío
  alternatives_spanish:
  - yo estoy enviando
  - yo mando
  lexicon: BDAG
  rationale: 'El presente profético se vierte de manera directa con el presente simple: «yo envío», que expresa adecuadamente la vividez del anuncio sin forzar perífrasis.'
- source_word: ἄγγελόν
  english_pob_choice: messenger
  chosen_spanish: mensajero
  alternatives_spanish:
  - ángel
  - enviado
  lexicon: BDAG
  rationale: Aunque el término puede significar «ángel», aquí el referente es humano; «mensajero» evita una lectura equivocada y sigue la decisión auditada del inglés POB.
- source_word: πρὸ προσώπου σου
  english_pob_choice: before your face
  chosen_spanish: delante de tu rostro
  alternatives_spanish:
  - delante de tu presencia
  - antes de tu rostro
  - delante de ti
  lexicon: BDAG
  rationale: Se conserva la imagen concreta de «rostro» para no borrar la textura literal del griego y del trasfondo profético. Se mantiene la tensión entre literalidad e inteligibilidad mediante una formulación natural en español.
- source_word: κατασκευάσει
  english_pob_choice: will prepare
  chosen_spanish: preparará
  alternatives_spanish:
  - hará listo
  - dejará listo
  lexicon: BDAG
  rationale: «Preparará» comunica con claridad la acción futura de dejar dispuesto el camino, sin añadir matices ajenos al texto.
- source_word: τὴν ὁδόν σου
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - tu vía
  lexicon: BDAG
  rationale: En lenguaje profético, «camino» es la equivalencia más estable y fiel para ὁδός, conservando el valor metafórico del texto.
- source_word: ἔμπροσθέν σου
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - frente a ti
  lexicon: BDAG
  rationale: La segunda expresión espacial se vierte con una locución natural y distinta de la anterior para mantener el paralelismo del original y la claridad en español.
theological_decisions:
- issue: Cita profética aplicada a Juan sin expandir interpretivamente el referente último
  english_pob_reading: Retain the second-person pronouns ('your face,' 'your way,' 'before you') without interpretive expansion
  chosen_spanish_reading: Conservar los pronombres de segunda persona («tu rostro», «tu camino», «delante de ti») sin añadir explicaciones sobre el destinatario final
  alternative_spanish_readings:
  - explicar explícitamente que el mensajero prepara el camino del Señor
  - sustituir «tu» por un referente identificado como «de Yahvé»
  rationale: La frase reproduce una cita bíblica aplicada por Jesús y su fuerza teológica está en la referencia directa de segunda persona. Expandir el referente resolvería prematuramente una tensión que el texto deja abierta; por eso se preserva la formulación citacional.
  doctrine_reference: Preservar la tensión teológica en la cita sin resolverla por paráfrasis
- issue: Término ἄγγελος en una cita aplicada a un mensajero humano
  english_pob_reading: '''Messenger'' could also be rendered ''angel,'' but here it refers to a human envoy, namely John.'
  chosen_spanish_reading: Traducir como «mensajero» y no como «ángel»
  alternative_spanish_readings:
  - ángel
  - enviado celestial
  rationale: El contexto identifica al referente como Juan; usar «ángel» introduciría una lectura ontológica ajena al pasaje. «Mensajero» preserva la ambigüedad lexical necesaria y la resuelve solo en favor del sentido contextual humano.
  doctrine_reference: Distinción contextual entre ángel celestial y enviado humano
translation_notes:
  revision_awareness: 'Se revisó el pasaje a la luz del griego SBLGNT y del audit trail inglés: no se requieren cambios adicionales respecto de las decisiones léxicas y teológicas ya establecidas en el contexto auditado.'
  spanish_consistency_notes:
  - Se mantuvo «mensajero» para ἄγγελος conforme al contexto humano de Juan.
  - Se conservó la imagen de «rostro/rostro» para πρὸ προσώπου σου mediante «delante de tu rostro», con una nota de alternativa más fluida.
  - Se evitó sustituir el segundo singular por un referente explícito, para respetar la cita profética sin comentario añadido.
  - Se prefirió «camino» para ὁδός por su valor metafórico estable en español bíblico.
  - Se usó puntuación de cita en español y comillas angulares para legibilidad editorial.
