  text: οὗτός ἐστιν περὶ οὗ γέγραπται· ⸀Ἰδοὺ ἀποστέλλω τὸν ἄγγελόν μου πρὸ προσώπου σου, ὃς κατασκευάσει τὴν ὁδόν σου ἔμπροσθέν σου.
base_translation:
  language: en
  yaml_path: translation/nt/luke/007/027.yaml
  text: 'This is he about whom it is written: ‘Behold[a], I am sending my messenger before your face[b], who will prepare your way before you.’'
  footnotes:
  - marker: a
    text: Or more smoothly, 'before you.' The Greek literally says 'before your face.'
    reason: lexical_alternative
  - marker: b
    text: '''Messenger'' could also be rendered ''angel,'' but here it refers to a human envoy, namely John.'
    reason: lexical_alternative
