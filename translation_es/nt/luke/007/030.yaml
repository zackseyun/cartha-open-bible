translation:
  language: es
  text: Pero los fariseos y los intérpretes de la ley rechazaron el propósito de Dios para sí mismos[a], no habiendo sido bautizados por él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el consejo de Dios contra sí mismos» o «el plan de Dios respecto de sí mismos».'
    reason: alternative_reading
  - marker: b
    text: Es decir, por Juan el Bautista.
    reason: cross_reference
lexical_decisions:
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - los fariseos
  lexicon: BDAG
  rationale: Es el gentilicio religioso estándar en español y conserva la referencia al grupo identificado en el texto sin añadir matices ajenos.
- source_word: νομικοὶ
  english_pob_choice: lawyers
  chosen_spanish: intérpretes de la ley
  alternatives_spanish:
  - expertos en la ley
  - maestros de la ley
  lexicon: BDAG
  rationale: En este contexto, νομικοὶ designa a quienes están versados en la ley de Moisés. 'Intérpretes de la ley' comunica la función de manera natural en español y evita confundirlos con abogados modernos, preservando a la vez el sentido jurídico/exegético del término.
- source_word: βουλὴν
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - plan
  - consejo
  lexicon: BDAG
  rationale: βουλή puede expresar propósito, plan o consejo. 'Propósito' transmite bien la intención de Dios respecto de ellos en español claro; 'plan' también es posible, pero 'propósito' refleja mejor la orientación intencional del contexto.
- source_word: ἠθέτησαν
  english_pob_choice: rejected
  chosen_spanish: rechazaron
  alternatives_spanish:
  - desecharon
  - pusieron a un lado
  lexicon: BDAG
  rationale: ἀθετέω significa rechazar o invalidar. 'Rechazaron' es la forma más directa y natural en español, y conserva la fuerza de negativa frente a la intención divina.
- source_word: εἰς ἑαυτούς
  english_pob_choice: for themselves
  chosen_spanish: para sí mismos
  alternatives_spanish:
  - contra sí mismos
  - respecto de sí mismos
  lexicon: BDAG
  rationale: La frase es idiomática y apunta a que el propósito de Dios tenía referencia personal a ellos. 'Para sí mismos' mantiene esa referencia sin resolver la tensión interpretativa de manera indebida; 'contra sí mismos' sería más interpretativo.
- source_word: μὴ βαπτισθέντες ὑπ’ αὐτοῦ
  english_pob_choice: not having been baptized by him
  chosen_spanish: no habiendo sido bautizados por él
  alternatives_spanish:
  - puesto que no habían sido bautizados por él
  - al no haber sido bautizados por él
  lexicon: BDAG
  rationale: El participio aoristo pasivo con μή se vierte de forma participial para conservar la estructura del griego. 'No habiendo sido bautizados por él' mantiene la relación temporal/circunstancial sin imponer explícitamente una causalidad que el texto no formula de manera directa.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δὲ introduce contraste con el versículo previo; 'Pero' lo expresa con claridad y naturalidad en español.
- source_word: ὑπ’ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - por Juan
  - por Juan el Bautista
  lexicon: BDAG
  rationale: El pronombre se refiere contextualmente a Juan el Bautista, pero el griego no lo nombra aquí. 'Por él' sigue de cerca el texto y deja la identificación implícita como en el original.
theological_decisions:
- issue: Sentido de la βουλή de Dios frente al rechazo de los fariseos y los intérpretes de la ley
  english_pob_reading: God's purpose for themselves
  chosen_spanish_reading: el propósito de Dios para sí mismos
  alternative_spanish_readings:
  - el consejo de Dios contra sí mismos
  - el plan de Dios respecto de sí mismos
  rationale: 'La traducción conserva la tensión del pasaje: ellos rechazaron lo que Dios disponía para ellos personalmente. ''Para sí mismos'' respeta εἰς ἑαυτούς sin convertirlo en una fórmula teológica más fuerte que el texto. No se resuelve la relación entre la intención divina y su rechazo humano, sino que se deja en la forma sobria del versículo.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Identidad implícita de 'él' en el bautismo
  english_pob_reading: by him (John the Baptist in context)
  chosen_spanish_reading: por él (Juan el Bautista en contexto)
  alternative_spanish_readings:
  - por Juan
  - por Juan el Bautista
  rationale: Se mantiene el pronombre como en el griego, porque la identificación con Juan proviene del contexto inmediato y no del enunciado mismo. Así se conserva la economía del original y la referencia contextual sin sobredeterminar el texto.
  doctrine_reference: Maintain contextual reference without over-specification.
translation_notes:
  revision_awareness: El griego y el contexto inmediato sostienen una lectura de contraste con el versículo anterior, y el audit trail inglés confirma que no se requiere resolver la ambigüedad de εἰς ἑαυτούς más allá de una referencia personal. La versión española mantiene esa tensión y conserva la referencia implícita a Juan sin añadirlo al texto principal.
  spanish_consistency_notes:
  - Se prefirió 'intérpretes de la ley' para νομικοὶ por claridad natural en español, sin confundirlos con una categoría moderna de abogados.
  - Se usó 'propósito' para βουλή por concordar con el valor escogido en el audit trail y porque suena más natural que 'consejo' en este contexto.
  - Se mantuvo la construcción participial 'no habiendo sido bautizados por él' para reflejar la forma del griego y evitar una causalidad explícita no formulada.
  - La nota a explica la alternativa semántica principal de βουλή; la nota b aclara la referencia contextual de 'él' sin reemplazarla en el texto principal.
