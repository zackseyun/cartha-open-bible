translation:
  language: es
  text: Y así como quieren que las personas hagan por ustedes[a], hagan ustedes lo mismo para ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y como desean que otros hagan por ustedes, hagan ustedes igualmente para ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: y así como
  alternatives_spanish:
  - así como
  - de la misma manera que
  lexicon: BDAG
  rationale: καθώς introduce comparación de norma o correspondencia. «Y así como» preserva la relación comparativa con un español natural y fluido.
- source_word: θέλετε
  english_pob_choice: you want
  chosen_spanish: quieren
  alternatives_spanish:
  - desean
  - quisieran
  lexicon: BDAG
  rationale: Aquí θέλω expresa deseo o preferencia ordinaria. «Quieren» comunica bien ese valor en español actual sin volverlo excesivamente formal.
- source_word: ἵνα
  english_pob_choice: to
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a que
  lexicon: BDAG
  rationale: Con θέλετε, ἵνα introduce el contenido de lo deseado. En español, una subordinada con «que» reproduce mejor la estructura natural de «quieren que hagan».
- source_word: ποιῶσιν
  english_pob_choice: do
  chosen_spanish: hagan
  alternatives_spanish:
  - hagan por
  - obren
  lexicon: BDAG
  rationale: ποιέω es amplio y aquí alude a lo que otros hagan hacia uno. «Hagan» conserva esa amplitud sin estrechar el sentido a «tratar».
- source_word: οἱ ἄνθρωποι
  english_pob_choice: people
  chosen_spanish: los demás
  alternatives_spanish:
  - las personas
  - la gente
  lexicon: BDAG
  rationale: El sustantivo es genérico, no masculino exclusivo. «Los demás» expresa con naturalidad el contraste recíproco implícito en el dicho y evita una lectura sexista.
- source_word: ποιεῖτε
  english_pob_choice: do
  chosen_spanish: háganles ustedes
  alternatives_spanish:
  - hagan ustedes
  - hagan también
  lexicon: BDAG
  rationale: El imperativo presente llama a una práctica continua. «Háganles ustedes» mantiene el mandato directo y el paralelismo recíproco del versículo.
- source_word: αὐτοῖς
  english_pob_choice: for them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: El dativo recíproco se expresa de manera natural con clítico en español. «Les» evita la ambigüedad de «a ellos» y se integra mejor al imperativo.
- source_word: ὁμοίως
  english_pob_choice: the same
  chosen_spanish: de la misma manera
  alternatives_spanish:
  - igualmente
  - del mismo modo
  lexicon: BDAG
  rationale: ὁμοίως marca correspondencia exacta de acción. «De la misma manera» preserva esa equivalencia con buena inteligibilidad en español.
theological_decisions:
- issue: Referencia genérica de ἄνθρωποι
  english_pob_reading: people
  chosen_spanish_reading: los demás
  alternative_spanish_readings:
  - las personas
  - la gente
  - los hombres
  rationale: El griego es genérico y no masculino exclusivo. «Los demás» comunica mejor en español la reciprocidad ética del dicho sin introducir varón como referente dominante.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador de nota [a] ahora aparece explícitamente en el texto base en el punto correspondiente.'
