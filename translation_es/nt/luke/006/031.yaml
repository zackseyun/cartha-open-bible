revisions:
- from: Y así como quieren que los[a] demás les hagan a ustedes, háganles ustedes de la misma manera.
  to: Y así como quieren que las personas hagan por ustedes[a], hagan ustedes lo mismo para ellas.
  rationale: Se ajusta οἱ ἄνθρωποι a «las personas» para conservar la referencia genérica humana del griego sin introducir el matiz de «los demás». Se simplifica el segundo miembro a «hagan ustedes lo mismo para ellas», que mantiene el paralelismo con ποιέω… ποιέω y ὁμοίως, a la vez que suena más natural en español. Se reemplaza la nota por una alternativa real, alineada con la nota inglesa auditada, y se ancla en la frase relevante.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:00:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura comparativa y recíproca del griego: καθώς… ποιεῖτε… ὁμοίως. Sin embargo, «los demás» no corresponde con suficiente precisión a οἱ ἄνθρωποι («la gente / las personas / la gente en general»), sino que introduce un matiz de ‘otros’ no explicitado. Además, la nota al pie actual está mal formada y no preserva la alternativa inglesa real.'
  spanish_quality_summary: El español es comprensible, pero «háganles ustedes de la misma manera» suena algo redundante y pesado. Una formulación más natural y digna es «hagan ustedes lo mismo para ellos». También conviene evitar el artículo en «los demás» para no estrechar el referente genérico.
  glossary_alignment: No hay términos del glosario principal en juego salvo la referencia genérica de ἄνθρωποι. Conforme a la política de referencia genérica, conviene usar «las personas» o «la gente», no «los demás», para reflejar mejor el sentido humano general del original.
  issues:
  - severity: medium
    issue: «los demás» para οἱ ἄνθρωποι
    rationale: El griego dice «la gente / las personas», no específicamente «los demás». «Los demás» cambia levemente el referente de humanidad general a alteridad relativa.
  - severity: medium
    issue: Redacción algo torpe en «háganles ustedes de la misma manera»
    rationale: Aunque entendible, la combinación de clítico + pronombre explícito + complemento final resulta poco natural en español e introduce pesadez innecesaria.
  - severity: high
    issue: Nota al pie incorrecta e inservible
    rationale: 'La nota «O: “los demás”» repite el propio texto en vez de conservar la alternativa del inglés auditado. Además, el anclaje [a] en «los» no está bien motivado semánticamente.'
  revised_spanish_text: Y así como quieren que las personas hagan por ustedes[a], hagan ustedes lo mismo para ellas.
  revised_footnotes:
