translation:
  language: es
  text: Sean misericordiosos[a], así como su Padre es misericordioso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «compasivos». El adjetivo griego puede denotar a quien es movido por piedad y muestra misericordia.
    reason: lexical_alternative
lexical_decisions:
- source_word: γίνεσθε
  english_pob_choice: Be
  chosen_spanish: Sean
  alternatives_spanish:
  - Háganse
  - Lleguen a ser
  lexicon: BDAG
  rationale: El imperativo presente de γίνομαι pide una cualidad asumida de manera continua. En español, «Sean» comunica de forma natural la exhortación sin volverla demasiado mecánica; «Háganse» o «Lleguen a ser» son posibles, pero suenan más pesados o más interpretativos.
- source_word: οἰκτίρμονες
  english_pob_choice: merciful
  chosen_spanish: misericordiosos
  alternatives_spanish:
  - compasivos
  - llenos de misericordia
  lexicon: BDAG
  rationale: El adjetivo puede abarcar misericordia y compasión. Opto por «misericordiosos» porque en español es directo, claro y mantiene bien la correspondencia con el predicado repetido al final del versículo. «Compasivos» también es válido, pero desplaza ligeramente el matiz hacia sentir compasión.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - de la misma manera que
  lexicon: BDAG
  rationale: «Así como» expresa con naturalidad el patrón comparativo del griego y preserva la idea de modelo, no de mera causalidad.
- source_word: πατὴρ ὑμῶν
  english_pob_choice: your Father
  chosen_spanish: su Padre
  alternatives_spanish:
  - su Padre celestial
  - vuestro Padre
  lexicon: BDAG
  rationale: El griego dice simplemente «su Padre»; en español, «su» mantiene la relación sin añadir «celestial», que no está en el texto. Se prefiere el tratamiento formal «su» por neutralidad y lectura eclesial amplia.
- source_word: οἰκτίρμων
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - compasivo
  - lleno de misericordia
  lexicon: BDAG
  rationale: Se traduce de manera consistente con el adjetivo inicial para conservar el paralelismo del versículo. Mantener la misma raíz semántica ayuda a que el lector perciba el vínculo directo entre el mandato y la descripción del Padre.
theological_decisions:
- issue: Relación entre el mandato y el carácter del Padre
  english_pob_reading: 'The verse presents the Father''s mercy as the pattern for the disciples'' conduct: ''Be merciful, just as your Father is merciful.'''
  chosen_spanish_reading: 'El versículo presenta la misericordia del Padre como el modelo del obrar de los discípulos: «Sean misericordiosos, así como su Padre es misericordioso».'
  alternative_spanish_readings:
  - Sean misericordiosos, porque su Padre es misericordioso
  - Sean compasivos, así como su Padre es compasivo
  rationale: «Así como» conserva el valor comparativo de καθώς. No se convierte en causalidad («porque»), ya que el texto llama a imitar el carácter del Padre, no solo a responder a una razón discursiva. Se mantiene la tensión ética del mandato sin resolverla más allá de la evidencia textual.
  doctrine_reference: Preservar la primacía del texto original y la relación de imitación ética sin sobreexplicar la teología.
translation_notes:
  revision_awareness: El texto base inglés y la revisión más reciente están en alto acuerdo; no se registraron cambios sustantivos. La redacción española sigue de cerca el paralelo interno del versículo y conserva la repetición del adjetivo para reflejar el énfasis del griego.
  spanish_consistency_notes:
  - 'Se conserva la misma raíz léxica en ambos miembros del versículo: «misericordiosos» / «misericordioso».'
  - Se evitó introducir «celestial» porque el griego no lo dice.
  - La puntuación con coma antes de «así como» sigue el valor comparativo de la cláusula.
