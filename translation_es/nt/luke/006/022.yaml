  text: Μακάριοί ἐστε ὅταν μισήσωσιν ὑμᾶς οἱ ἄνθρωποι, καὶ ὅταν ἀφορίσωσιν ὑμᾶς καὶ ὀνειδίσωσιν καὶ ἐκβάλωσιν τὸ ὄνομα ὑμῶν ὡς πονηρὸν ἕνεκα τοῦ υἱοῦ τοῦ ἀνθρώπου·
base_translation:
  language: en
  yaml_path: translation/nt/luke/006/022.yaml
  text: Blessed are you when people hate you[a], and when they exclude you and insult you and reject your name as evil because of the Son of Man.
  footnotes:
