review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura de la bienaventuranza y la secuencia verbal del griego: odio, exclusión, insulto y repudio público por causa del Hijo del Hombre. También mantiene correctamente «Bienaventurados» y «el Hijo del Hombre». Sin embargo, se aparta del principio documentado para οἱ ἄνθρωποι, que en el expediente inglés se resolvió como genérico inclusivo («people»), mientras que «los hombres» en español contemporáneo puede sonar masculino-específico. Además, la nota al pie está mal anclada: el texto principal marca [a] sobre «odien», pero la nota explica la frase posterior sobre «rechacen su nombre como malo».'
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere ajustes menores para mayor naturalidad e inteligibilidad. «Bienaventurados son ustedes» suena más natural en español neutral que «Bienaventurados sois» si el resto del versículo usa «los». Asimismo, conviene reemplazar «los hombres» por «la gente» para legibilidad amplia. La frase «rechacen su nombre como malo» es aceptable y fiel al expediente, aunque algo idiomática; puede mantenerse con la nota correctamente anclada.
  glossary_alignment: Se alinea bien con los términos del proyecto en «Bienaventurados», «Jesús» no aplica, y «el Hijo del Hombre» está correctamente preservado. No hay conflicto con Yahvé/Mesías/etc. El principal desajuste terminológico es el uso de «los hombres» en lugar de una opción genérica más natural en español actual para οἱ ἄνθρωποι.
  issues:
  - severity: medium
    issue: «los hombres» para οἱ ἄνθρωποι
    rationale: Aunque puede funcionar como genérico tradicional, en español contemporáneo puede leerse como masculino-específico. El expediente inglés resolvió explícitamente el término como genérico inclusivo («people»), por lo que «la gente» o «las personas» preserva mejor el sentido fuente y la legibilidad.
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: 'La nota explica la frase «rechacen su nombre como malo», pero el marcador [a] aparece tras «odien». Esto incumple la disciplina requerida: el marcador debe aparecer en la palabra o frase relevante.'
  - severity: low
    issue: Mezcla de registro pronominal («sois» con «los»)
    rationale: «Bienaventurados sois» pertenece a un registro de segunda persona plural peninsular/tradicional, pero el resto del verso usa «los»/«su», no «os»/«vuestro». «Bienaventurados son ustedes» mantiene dignidad y mejora la coherencia en español neutral latinoamericano.
  revised_spanish_text: Bienaventurados son ustedes cuando la gente los odie, y cuando los excluya, los insulte y rechace su nombre como malo[a], por causa del Hijo del Hombre.
  revised_footnotes:
  - marker: a
    text: O «los repudien como malos», es decir, que los desacrediten públicamente o los declaren moralmente corruptos.
