translation:
  language: es
  text: Bienaventurados son ustedes cuando la gente los odie, y cuando los excluya, los insulte y rechace su nombre como malo[a], por causa del Hijo del Hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los repudien como malos», es decir, que los desacrediten públicamente o los declaren moralmente corruptos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μακάριοί
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: BDAG
  rationale: «Bienaventurados» conserva el registro de bienaventuranza y el peso teológico de μακάριος mejor que «felices», que suena subjetivo, o «dichosos», que en español puede sonar menos solemne.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  - siempre que
  lexicon: BDAG
  rationale: Con los subjuntivos que siguen, expresa una circunstancia futura indefinida; «cuando» es natural en español y mantiene el tono de bienaventuranza.
- source_word: μισήσωσιν
  english_pob_choice: hate
  chosen_spanish: odien
  alternatives_spanish:
  - aborrezcan
  - detesten
  lexicon: BDAG
  rationale: El verbo expresa hostilidad intensa; «odien» comunica con fuerza esa oposición sin añadir matices ajenos.
- source_word: οἱ ἄνθρωποι
  english_pob_choice: people
  chosen_spanish: los hombres
  alternatives_spanish:
  - la gente
  - las personas
  - los seres humanos
  lexicon: BDAG
  rationale: Aquí ἄνθρωποι es genérico. «Los hombres» mantiene de forma breve y natural el sujeto plural genérico en español; se evita leerlo como exclusivo de varones cuando el contexto es representativo de la sociedad en general.
- source_word: ἀφορίσωσιν
  english_pob_choice: exclude
  chosen_spanish: excluyan
  alternatives_spanish:
  - separen
  - aislen
  - expulsen
  lexicon: BDAG
  rationale: En este contexto de persecución social, el sentido es apartar de la comunión o aceptación social. «Excluyan» es claro y idiomático en español.
- source_word: ὀνειδίσωσιν
  english_pob_choice: insult
  chosen_spanish: insulten
  alternatives_spanish:
  - ultrajen
  - afrenten
  - injurien
  lexicon: BDAG
  rationale: La forma verbal apunta a reproche o abuso verbal. «Insulten» comunica bien el acto en español contemporáneo.
- source_word: ἐκβάλωσιν τὸ ὄνομα ὑμῶν
  english_pob_choice: reject your name
  chosen_spanish: rechacen su nombre
  alternatives_spanish:
  - expulsen su nombre
  - arrojen su nombre
  - repudien su nombre
  lexicon: BDAG
  rationale: La frase conserva la imagen de repudiación pública sin suavizarla. «Rechacen su nombre» sigue la revisión inglesa más natural, y en español expresa públicamente la descalificación del nombre/reputación.
- source_word: ὡς πονηρὸν
  english_pob_choice: as evil
  chosen_spanish: como malo
  alternatives_spanish:
  - como malo y perverso
  - como perverso
  - como malvado
  lexicon: BDAG
  rationale: «Malo» traduce de modo conciso πονηρός en esta construcción predicativa. Aunque «malvado» puede sonar más fuerte, «malo» preserva la ambigüedad moral general del original y permite entender la denuncia pública.
- source_word: ἕνεκα
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - debido a
  - por
  lexicon: BDAG
  rationale: «Por causa de» es una equivalencia clara y formal que refleja la relación causal del original y funciona bien en un registro bíblico moderno.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional traducido, que refleja el uso evangélico y su resonancia intertextual, sin paraphrasear hacia una forma explicativa menos estable.
theological_decisions:
- issue: Frase ἐκβάλωσιν τὸ ὄνομα ὑμῶν ὡς πονηρόν
  english_pob_reading: Retain the concrete expression 'reject your name as evil' in the main text.
  chosen_spanish_reading: Conservar «rechacen su nombre como malo» en el texto principal.
  alternative_spanish_readings:
  - los difamen como malos
  - repudien su reputación como mala
  - rechacen su nombre como perverso
  rationale: La construcción griega es idiomática y puede aludir a repudio público o descalificación moral. El texto principal mantiene la imagen concreta sin explicarla en exceso; la nota permite aclarar la posible referencia a la reputación o a la denigración pública.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Uso de οἱ ἄνθρωποι como genérico
  english_pob_reading: Use 'people' rather than 'men.'
  chosen_spanish_reading: Usar «los hombres» como genérico contextual, no como restricción masculina.
  alternative_spanish_readings:
  - la gente
  - las personas
  - los seres humanos
  rationale: Aunque el griego es genérico, en español «los hombres» sigue funcionando como colectivo humano en un registro bíblico sobrio. La elección se hace solo por equivalencia estilística y concisión, no por excluir mujeres.
  doctrine_reference: Translation philosophy §4
- issue: Título τοῦ υἱοῦ τοῦ ἀνθρώπου
  english_pob_reading: Translate as the title 'the Son of Man.'
  chosen_spanish_reading: Traducir como el título «el Hijo del Hombre».
  alternative_spanish_readings:
  - el Hombre
  - el Ser Humano
  - el Hijo humano
  rationale: Se conserva el título establecido para preservar el eco bíblico y cristológico del dicho de Jesús, sin reinterpretarlo de forma moderna o explicativa.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: La redacción sigue la lectura inglesa revisada, que prefirió «reject your name as evil» frente a una formulación más literal de «cast out your name». En español se ha mantenido la fuerza del rechazo público con una forma natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Bienaventurados» para μακάριος, coherente con el registro de bienaventuranza.
  - Se usa «el Hijo del Hombre» como título fijo y reconocible en el corpus evangélico.
  - Se evita «SEÑOR» o una sustitución litúrgica donde no corresponde; no hay tetragrama en este versículo.
  - «Por causa de» conserva la relación causal de ἕνεκα sin sobrecargar el español.
  - La nota de pie de página preserva la alternativa semántica sobre la expresión idiomática de desprecio público.
