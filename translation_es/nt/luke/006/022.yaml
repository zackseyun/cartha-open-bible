revisions:
- from: Bienaventurados sois cuando los hombres los odien[a], y cuando los excluyan y los insulten y rechacen su nombre como malo, por causa del Hijo del Hombre.
  to: Bienaventurados son ustedes cuando la gente los odie, y cuando los excluya, los insulte y rechace su nombre como malo[a], por causa del Hijo del Hombre.
  rationale: Se corrige «los hombres» a «la gente» para reflejar mejor el sentido genérico de οἱ ἄνθρωποι en español contemporáneo; se reubica la nota al pie para que ancle correctamente la frase que explica; y se ajusta «Bienaventurados sois» a «Bienaventurados son ustedes» para coherencia con el español neutral del proyecto, sin alterar el sentido fuente. Se mantiene «rechace su nombre como malo» porque sigue la decisión auditada de conservar la imagen concreta con apoyo de nota aclaratoria.
