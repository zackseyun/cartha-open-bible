translation:
  language: es
  text: 'Pero les digo a ustedes que están escuchando: amen a sus enemigos[a]; hagan bien a los que los odian,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que oyen'. El participio griego puede traducirse de manera más formal así; 'que están escuchando' destaca mejor el sentido progresivo en contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Introduce un contraste directo y natural en español sin perder la fuerza de oposición del griego. 'Pero' es más idiomático y claro que un calco más rígido.
- source_word: ὑμῖν λέγω
  english_pob_choice: I say to you
  chosen_spanish: yo les digo a ustedes
  alternatives_spanish:
  - les digo
  - les hablo
  lexicon: BDAG
  rationale: Conserva la fórmula de discurso directo y el énfasis personal del hablante. 'A ustedes' explicita el dativo de destinatario sin ambigüedad.
- source_word: τοῖς ἀκούουσιν
  english_pob_choice: who are listening
  chosen_spanish: que están escuchando
  alternatives_spanish:
  - que escuchan
  - que oyen
  lexicon: BDAG
  rationale: El participio presente expresa una acción en curso; 'que están escuchando' reproduce mejor ese aspecto que un simple presente gnómico. 'Oyen' sería más formal pero menos dinámico en contexto.
- source_word: ἀγαπᾶτε
  english_pob_choice: love
  chosen_spanish: amen
  alternatives_spanish:
  - amen ustedes
  - quieran
  lexicon: BDAG
  rationale: Mantiene el imperativo de amor como mandato directo. En español, el subjuntivo exhortativo 'amen' es natural y fiel al tono imperativo.
- source_word: τοὺς ἐχθροὺς ὑμῶν
  english_pob_choice: your enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - sus adversarios
  - a quienes los odian
  lexicon: BDAG
  rationale: '''Enemigos'' es la correspondencia léxica directa de ἐχθρούς. Se usa ''sus'' por concordancia con el destinatario plural de la frase en español, sin cambiar el referente.'
- source_word: καλῶς ποιεῖτε
  english_pob_choice: do good
  chosen_spanish: hagan bien
  alternatives_spanish:
  - hagan el bien
  - obren bien
  lexicon: BDAG
  rationale: La locución griega expresa una acción benéfica concreta; 'hagan bien' es una equivalencia natural y breve en español. Conserva el carácter ético del mandamiento sin expandirlo innecesariamente.
- source_word: τοῖς μισοῦσιν ὑμᾶς
  english_pob_choice: to those who hate you
  chosen_spanish: a los que los odian
  alternatives_spanish:
  - a quienes los odian
  - a los que los aborrecen
  lexicon: BDAG
  rationale: '''Odiar'' es el sentido léxico básico de μισέω y debe conservarse sin suavizarlo. ''A los que'' encaja con el objeto indirecto introducido por ''hacer bien'' en español.'
theological_decisions:
- issue: Alcance universal de los mandatos éticos
  english_pob_reading: Render the commands plainly as universal imperatives without narrowing their scope or importing qualifications not present in the Greek.
  chosen_spanish_reading: Presentar los mandatos de forma directa y abierta, sin limitar su alcance ni añadir matices interpretativos ajenos al texto.
  alternative_spanish_readings:
  - Interpretarlo solo para enemigos personales
  - Leerlo como hipérbole retórica
  rationale: El griego usa imperativos en segunda persona plural sin restricciones explícitas; la traducción debe conservar esa fuerza ética radical sin resolver debates interpretativos en la redacción.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y el griego: mantiene el contraste inicial, el dativo de destinatario, el participio presente con valor progresivo, el imperativo de amor y el mandato de hacer el bien sin atenuar μισέω. No se registran revisiones aplicadas en el contexto fuente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene 'amen' como imperativo exhortativo natural para ἀγαπᾶτε.
  - Se conserva la fuerza de 'odiar' sin suavizarla a 'rechazar' o 'desagradar'.
  - La puntuación con dos puntos tras 'escuchando' refleja la separación retórica del original y mejora la legibilidad.
  - El pronombre plural 'los' se usa consistentemente para el destinatario plural en segunda persona en español latino neutral.
