  to: 'Pero él conocía sus pensamientos[a], y dijo al hombre que tenía la mano seca[b]: «Levántate y ponte en el centro[c]». Y él se levantó y se quedó de pie.'
  rationale: La revisión conserva el contenido y las decisiones léxicas principales del borrador, pero mejora la fidelidad funcional al griego y la naturalidad del español. «Ponte en el centro» expresa mejor στῆθι εἰς τὸ μέσον que «ponte en medio», y «se quedó de pie» da una respuesta narrativa más idiomática que «estuvo de pie». También se ajusta la nota de ubicación para reflejar mejor la alternativa documentada en el audit trail.
