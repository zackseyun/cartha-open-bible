translation:
  language: es
  text: 'Pero él conocía sus pensamientos[a], y dijo al hombre que tenía la mano seca[b]: «Levántate y ponte en el centro[c]». Y él se levantó y se quedó de pie.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus razonamientos».
    reason: lexical_alternative
  - marker: b
    text: O «la mano encogida».
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «en medio» o «al centro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾔδει
  english_pob_choice: knew
  chosen_spanish: conocía
  alternatives_spanish:
  - sabía
  - entendía
  lexicon: BDAG
  rationale: οἶδα en este valor narrativo expresa conocimiento real y continuo; «conocía» suena natural en español y preserva el matiz sin añadir explicación sobre el modo de ese conocimiento.
- source_word: διαλογισμοὺς
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - razonamientos
  - cavilaciones
  - deliberaciones interiores
  lexicon: BDAG
  rationale: El término puede abarcar pensamientos o razonamientos. «Pensamientos» es claro y mantiene abierta la tensión contextual sin forzar una glosa interpretativa.
- source_word: ἀνδρὶ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - persona
  lexicon: BDAG
  rationale: ἀνήρ designa a un adulto varón; «hombre» conserva la referencia de género con naturalidad en español.
- source_word: ξηρὰν ... τὴν χεῖρα
  english_pob_choice: the withered hand
  chosen_spanish: la mano seca
  alternatives_spanish:
  - la mano seca y atrofiada
  - la mano encogida
  - la mano marchita
  lexicon: BDAG
  rationale: ξηρός con una parte del cuerpo significa seca, marchita o atrofiada. «La mano seca» sigue de cerca la forma griega y evita introducir un adjetivo más interpretativo que el texto no exige.
- source_word: Ἔγειρε
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  lexicon: BDAG
  rationale: El imperativo pide incorporarse. «Levántate» es la opción natural y distingue esta acción de la siguiente orden, στῆθι.
- source_word: στῆθι
  english_pob_choice: stand
  chosen_spanish: ponte
  alternatives_spanish:
  - ponte de pie
  - permanece
  - quédate
  lexicon: BDAG
  rationale: El mandato se completa con la ubicación «en medio»; «ponte» permite una construcción idiomática con «en medio» y conserva la segunda orden sin fusionarla con Ἔγειρε.
- source_word: εἰς τὸ μέσον
  english_pob_choice: in the middle
  chosen_spanish: en medio
  alternatives_spanish:
  - en el centro
  - en medio de todos
  - al centro
  lexicon: BDAG
  rationale: La frase indica colocarse dentro del grupo reunido. «En medio» es el equivalente más natural y mantiene el sentido público de la escena.
- source_word: ἀναστὰς ἔστη
  english_pob_choice: he got up and stood there
  chosen_spanish: se levantó y estuvo de pie
  alternatives_spanish:
  - se levantó y quedó de pie
  - se puso de pie y permaneció así
  - se alzó y se quedó de pie
  lexicon: BDAG
  rationale: La secuencia participio + verbo narra dos acciones sucesivas. «Se levantó y estuvo de pie» conserva ambas sin comprimirlas en un solo verbo, y reproduce el resultado visible de la obediencia.
theological_decisions:
- issue: Jesús conoce los pensamientos internos de sus oyentes
  english_pob_reading: Render straightforwardly as narrative knowledge without adding interpretive qualifiers.
  chosen_spanish_reading: Traducir de forma directa que él conocía sus pensamientos, sin explicar el mecanismo de ese conocimiento.
  alternative_spanish_readings:
  - percibió sus intenciones
  - sabía por conocimiento sobrenatural sus razonamientos
  - discernió lo que pensaban
  rationale: El versículo afirma el conocimiento de Jesús, pero no explica cómo lo obtuvo. Conviene preservar esa afirmación sin añadir un matiz teológico que el texto no desarrolla.
  doctrine_reference: Mantener la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego y el trazado auditado en inglés. No hubo revisiones pendientes en el pase más reciente; la redacción española mantiene la misma estructura discursiva y las mismas decisiones léxicas fundamentales, con ajustes naturales para la sintaxis española.
  spanish_consistency_notes:
  - Se preserva «Yahvé» como norma del proyecto, aunque no aparece en este versículo.
  - Se usa «pensamientos» como término amplio, manteniendo abierta la alternativa «razonamientos» en nota.
  - «La mano seca» conserva la imagen griega sin sobreinterpretación médica.
  - 'Se distinguen las dos órdenes: «Levántate» y «ponte en medio».'
  - La última cláusula reproduce la secuencia de acciones sin fusionarlas en una sola expresión.
