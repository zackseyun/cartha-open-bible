translation:
  language: es
  text: Simón, a quien también llamó Pedro, y Andrés su hermano, y Santiago y Juan, y Felipe y Bartolomé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Σίμωνα
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simeón
  lexicon: BDAG
  rationale: En el contexto de Lucas, Σίμων corresponde al apóstol conocido en español como Simón. 'Simeón' es posible como transliteración más cercana, pero no es la forma habitual ni la más transparente para este personaje.
- source_word: ὃν καὶ ὠνόμασεν Πέτρον
  english_pob_choice: whom he also named Peter
  chosen_spanish: a quien también nombró Pedro
  alternatives_spanish:
  - a quien también llamó Pedro
  - a quien también puso por nombre Pedro
  lexicon: BDAG
  rationale: ὀνομάζω expresa la acción de dar o asignar un nombre. 'Nombró' conserva bien ese acto de nombramiento; 'llamó' es posible, pero en español puede sonar menos preciso para la imposición del nombre.
- source_word: Πέτρον
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Pétros
  lexicon: BDAG
  rationale: Pedro es la forma establecida en español para Πέτρος, y mantiene la identificación tradicional del apóstol sin necesidad de transliteración cruda.
- source_word: Ἀνδρέαν
  english_pob_choice: Andrew
  chosen_spanish: Andrés
  lexicon: BDAG
  rationale: Andrés es la forma española estándar del nombre propio Ἀνδρέας.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - el hermano de él
  lexicon: BDAG
  rationale: ἀδελφός aquí señala un hermano literal. 'Su hermano' es natural en español y conserva la relación de parentesco sin añadir énfasis interpretativo.
- source_word: Ἰάκωβον
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  - Jacob
  lexicon: BDAG
  rationale: Aunque la tradición española común suele decir 'Santiago' en algunos contextos, aquí 'Jacobo' mantiene de forma más cercana la relación histórica con Ἰάκωβος y evita sustituir el nombre por una forma eclesiástica menos transparente. 'Jacob' es posible, pero menos usual en este pasaje.
- source_word: Ἰωάννην
  english_pob_choice: John
  chosen_spanish: Juan
  lexicon: BDAG
  rationale: Juan es la forma española estándar de Ἰωάννης.
- source_word: Φίλιππον
  english_pob_choice: Philip
  chosen_spanish: Felipe
  alternatives_spanish:
  - Filipe
  lexicon: BDAG
  rationale: Felipe es la forma tradicional y clara en español para Φίλιππος.
- source_word: Βαρθολομαῖον
  english_pob_choice: Bartholomew
  chosen_spanish: Bartolomé
  lexicon: BDAG
  rationale: Bartolomé es la forma española establecida de Βαρθολομαῖος.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: En la enumeración, καί funciona como coordinación simple, por lo que 'y' es la traducción natural en español. La variante 'e' no es necesaria aquí.
translation_notes:
  revision_awareness: El texto griego y el auditor inglés están plenamente alineados; no se registran revisiones aplicadas ni divergencias textuales relevantes. La versión española sigue de cerca la sintaxis de la lista apostólica y conserva el matiz de nombramiento en ὠνόμασεν.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, con nombres propios en sus formas españolas habituales.
  - Se preserva 'nombró' para reflejar la acción de asignar un nombre, evitando diluir ὠνόμασεν en un mero 'llamó'.
  - La coordinación de la lista se resuelve con 'y' de manera uniforme, sin necesidad de notas ni variantes textuales.
