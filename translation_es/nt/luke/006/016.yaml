translation:
  language: es
  text: y Judas hijo de Jacobo[a], y Judas Iscariote, que llegó a ser traidor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Judas hermano de Jacobo»; el griego dice simplemente «Judas de Jacobo».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰούδαν Ἰακώβου
  english_pob_choice: Judas son of James
  chosen_spanish: Judas hijo de Jacobo
  alternatives_spanish:
  - Judas de Jacobo
  - Judas hermano de Jacobo
  lexicon: BDAG
  rationale: El genitivo griego Ἰακώβου es elíptico y deja implícita la relación exacta. En español, para una lista de discípulos, conviene suplir una relación natural y prudente. «Hijo de Jacobo» sigue la solución cauta del POB inglés; «de Jacobo» mantiene más de cerca la forma griega, pero es menos explícita en español; «hermano de Jacobo» añade una especificidad que el texto no dice.
- source_word: Ἰσκαριὼθ
  english_pob_choice: Iscariot
  chosen_spanish: Iscariote
  alternatives_spanish:
  - Iscariote
  lexicon: BDAG
  rationale: Es un designador propio y se translitera al español como nombre tradicional reconocido. «Iscariote» conserva el valor de nombre/apodo sin intentar interpretarlo.
- source_word: ὃς ἐγένετο
  english_pob_choice: who became
  chosen_spanish: que llegó a ser
  alternatives_spanish:
  - que se hizo
  - que vino a ser
  lexicon: BDAG
  rationale: γίνομαι expresa llegar a ser o convertirse. «Llegó a ser» mantiene el matiz verbal y evita reducirlo a un simple estado descriptivo como «era».
- source_word: προδότης
  english_pob_choice: traitor
  chosen_spanish: traidor
  alternatives_spanish:
  - perpetrador de traición
  - el que traicionó
  lexicon: BDAG
  rationale: προδότης nombra a quien traiciona. «Traidor» es el sustantivo natural y más conciso en español, equivalente al peso caracterizador del inglés POB.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y
  lexicon: BDAG
  rationale: La conjunción coordina de manera directa los elementos de la lista; «y» reproduce la función simple del griego.
theological_decisions:
- issue: Relación implícita en Ἰακώβου
  english_pob_reading: Judas son of James; footnote preserves possible 'brother of James'
  chosen_spanish_reading: Judas hijo de Jacobo, con nota que preserva la alternativa 'Judas hermano de Jacobo'
  alternative_spanish_readings:
  - Judas de Jacobo
  - Judas hermano de Jacobo
  rationale: El griego no especifica la relación. La lectura principal en español sigue la decisión cauta del POB inglés y la nota mantiene la tensión documental sin resolverla dogmáticamente. «Hermano de Jacobo» queda como posibilidad textual, no como certeza.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustanciales: la lista de nombres, la relación implícita de Ἰακώβου, la transliteración de Ἰσκαριώθ y el valor verbal de γίνομαι permanecen alineados con la revisión más reciente, que no introdujo modificaciones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Jacobo» por consistencia con la forma española tradicional del nombre presente en este contexto, manteniendo el genitivo implícito del original.
  - «Traidor» conserva el tono nominal del predicado griego sin suavizarlo a un verbo explicativo.
  - La nota al pie marca únicamente la ambigüedad real del genitivo, sin sobreinterpretarla.
