translation:
  language: es
  text: Pues cada árbol se conoce por su propio fruto. No recogen higos de espinos[a], ni vendimian uvas de una zarza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «zarzas»; el griego alude a plantas espinosas, como un arbusto espinoso o bramble.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστον ... δένδρον
  english_pob_choice: each tree
  chosen_spanish: cada árbol
  alternatives_spanish:
  - todo árbol
  - cada uno de los árboles
  lexicon: BDAG
  rationale: ἕκαστον con δένδρον tiene sentido distributivo. «Cada árbol» expresa de forma natural en español la idea de individualidad y corresponde al valor de «each tree» en el POB inglés.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: γάρ introduce explicación y conexión proverbial. «Porque» mantiene ese enlace causal/explanatorio con un registro natural en español.
- source_word: ἐκ τοῦ ἰδίου καρποῦ
  english_pob_choice: by its own fruit
  chosen_spanish: por su propio fruto
  alternatives_spanish:
  - por su fruto
  - a partir de su propio fruto
  lexicon: BDAG
  rationale: Aunque ἐκ es literalmente «de / desde / fuera de», en español la relación proverbial con γινώσκεται se expresa con naturalidad mediante «por». «Propio» conserva el énfasis en correspondencia entre árbol y fruto, como en el inglés auditado.
- source_word: γινώσκεται
  english_pob_choice: is known
  chosen_spanish: se conoce
  alternatives_spanish:
  - es conocido
  - se reconoce
  lexicon: BDAG
  rationale: El pasivo presente expresa una afirmación proverbial general. «Se conoce» es idiomático en español y preserva el valor gnómico sin añadir interpretación.
- source_word: ἀκανθῶν
  english_pob_choice: thorns
  chosen_spanish: espinos
  alternatives_spanish:
  - espinas
  - zarzas
  lexicon: BDAG
  rationale: El griego plural designa plantas espinosas en general. En español, «espinos» funciona como equivalente natural y mantiene la referencia vegetal amplia que el POB inglés dejó abierta con su nota alternativa.
- source_word: συλλέγουσιν
  english_pob_choice: gather
  chosen_spanish: recogen
  alternatives_spanish:
  - juntan
  - recolectan
  lexicon: BDAG
  rationale: En el contexto de frutos, «recogen» transmite bien el acto de tomar/cosechar sin perder la sencillez proverbial.
- source_word: σῦκα
  english_pob_choice: figs
  chosen_spanish: higos
  alternatives_spanish:
  - brevas
  lexicon: BDAG
  rationale: Es la equivalencia estándar de σῦκα. «Higos» es claro, bíblico y preciso.
- source_word: βάτου
  english_pob_choice: bramble bush
  chosen_spanish: una zarza
  alternatives_spanish:
  - un espino
  - un arbusto espinoso
  - una mata de zarzas
  lexicon: BDAG
  rationale: βάτος denota un arbusto espinoso/bramble. «Zarza» comunica bien la imagen en español bíblico y evita forzar una especie concreta; además conserva el contraste con el fruto cosechado.
- source_word: σταφυλὴν
  english_pob_choice: grapes
  chosen_spanish: uvas
  alternatives_spanish:
  - un racimo de uvas
  lexicon: BDAG
  rationale: Aunque el griego está en singular, el español natural requiere plural para el fruto aquí. «Uvas» mantiene la fuerza proverbial, como en el POB inglés.
- source_word: τρυγῶσιν
  english_pob_choice: harvest
  chosen_spanish: vendimian
  alternatives_spanish:
  - cosechan
  - recogen
  lexicon: BDAG
  rationale: τρυγάω se usa especialmente para cosechar uvas. «Vendimian» conserva esa precisión agrícola y distingue este verbo de συλλέγουσιν, siguiendo la distinción lexical del inglés POB.
theological_decisions:
- issue: Metáfora del fruto y su aplicación moral
  english_pob_reading: Retain the agricultural proverb without explicating its moral application in the translation.
  chosen_spanish_reading: Mantener el proverbio agrícola sin explicitar en la traducción su aplicación moral.
  alternative_spanish_readings:
  - Parafrasear como una enseñanza sobre el carácter y las obras
  - Explicar el significado de «fruto» como conducta
  rationale: El griego presenta una metáfora transparente dentro del discurso, pero no desarrolla esa aplicación en esta cláusula. La traducción debe conservar la imagen y su apertura interpretativa, sin resolver la tensión ni ampliar el sentido más allá del texto.
  doctrine_reference: Principio de fidelidad semántica y preservación de la tensión teológica/textual sin paráfrasis explicativa.
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT y coincide con el audit trail inglés en su lectura proverbial y en la distinción entre συλλέγω y τρυγάω. Se adopta una solución española natural para ἐκ + dativo/posesivo conceptual («por su propio fruto») y se conserva la imagen vegetal sin interpretarla. No hay revisiones aplicadas en el registro inglés de referencia.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera del versículo porque no aparecen en el texto fuente.
  - 'Se usa un registro bíblico contemporáneo, no arcaizante, con verbos distintos para los dos actos de obtención: «recogen» y «vendimian».'
  - Las notas al pie preservan la alternativa léxica donde el español también admite una oscilación de imagen vegetal.
