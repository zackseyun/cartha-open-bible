  rationale: 'La revisión hace dos ajustes menores: cambia ''es semejante a'' por ''es como'' para una comparación más natural y directa, y cambia ''sobre la tierra'' por ''sobre el suelo'' para reflejar con más precisión la imagen concreta de ἐπὶ τὴν γῆν en contexto. Se conservan las demás decisiones del borrador, que son fieles y legibles.'
