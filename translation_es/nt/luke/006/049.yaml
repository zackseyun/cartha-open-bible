    text: O “sin cimiento”. El griego se refiere al fundamento estructural de la casa; “sin fundamento” conserva la imagen y también su alcance metafórico.
    reason: lexical_alternative
  - marker: b
    text: O “se vino abajo” o “se vino al suelo”. El verbo griego expresa un colapso repentino; “se derrumbó” es la opción más natural en este contexto.
    reason: lexical_alternative
  revision_rationale: 'La revisión hace dos ajustes menores: cambia ''es semejante a'' por ''es como'' para una comparación más natural y directa, y cambia ''sobre la tierra'' por ''sobre el suelo'' para reflejar con más precisión la imagen concreta de ἐπὶ τὴν γῆν en contexto. Se conservan las demás decisiones del borrador, que son fieles y legibles.'
