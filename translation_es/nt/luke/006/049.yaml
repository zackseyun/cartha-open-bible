source:
  edition: SBLGNT
  text: ὁ δὲ ἀκούσας καὶ μὴ ποιήσας ὅμοιός ἐστιν ἀνθρώπῳ οἰκοδομήσαντι οἰκίαν ἐπὶ τὴν γῆν χωρὶς θεμελίου, ᾗ προσέρηξεν ὁ ποταμός, καὶ ⸂εὐθὺς συνέπεσεν⸃, καὶ ἐγένετο τὸ ῥῆγμα τῆς οἰκίας ἐκείνης μέγα.
base_translation:
  language: en
  yaml_path: translation/nt/luke/006/049.yaml
  text: But the one who heard and did not act is like a man who built a house on the ground without a foundation[a]. When the river burst against it, it immediately collapsed[b], and the ruin of that house was great.
  footnotes:
  - marker: a
    text: Or 'did not do' or 'did not put them into practice.' The Greek verb is simply 'do/make,' here referring to acting on Jesus' words.
    reason: lexical_alternative
  - marker: b
    text: Or 'the breach of that house was great.' The Greek term can refer to a break or ruin; 'ruin' is chosen for natural English in this context of collapse.
    reason: lexical_alternative
  ai_draft:
