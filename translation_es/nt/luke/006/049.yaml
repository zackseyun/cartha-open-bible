revisions:
- from: Pero el que oyó y no hizo es semejante a un hombre que edificó una casa sobre la tierra, sin fundamento[a]. Cuando el río arremetió contra ella, enseguida se derrumbó[b], y la ruina de aquella casa fue grande.
