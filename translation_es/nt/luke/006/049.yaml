translation:
  language: es
  text: Pero el que oyó y no hizo es como un hombre que edificó una casa sobre el suelo, sin fundamento[a]. Cuando el río arremetió contra ella, enseguida se derrumbó[b], y la ruina de aquella casa fue grande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sin cimiento”. El griego se refiere al fundamento estructural de la casa; “sin fundamento” conserva la imagen y también su alcance metafórico.
    reason: lexical_alternative
  - marker: b
    text: O “se vino abajo” o “se vino al suelo”. El verbo griego expresa un colapso repentino; “se derrumbó” es la opción más natural en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ ἀκούσας
  english_pob_choice: But the one who heard
  chosen_spanish: Pero el que oyó
  alternatives_spanish:
  - Pero el hombre que oyó
  - Pero quien oyó
  lexicon: BDAG
  rationale: El participio con artículo funciona de manera sustantiva. En español, “el que oyó” conserva bien la forma representativa singular y suena natural en una comparación proverbial.
- source_word: καὶ μὴ ποιήσας
  english_pob_choice: and did not act
  chosen_spanish: y no hizo
  alternatives_spanish:
  - y no actuó
  - y no lo puso en práctica
  lexicon: BDAG
  rationale: ποιέω aquí se refiere a hacer en respuesta a las palabras de Jesús. “No hizo” mantiene la fuerza más literal y deja abierta la referencia implícita a la obediencia sin añadir explicación interpretativa excesiva.
- source_word: ὅμοιός ἐστιν
  english_pob_choice: is like
  chosen_spanish: es semejante
  alternatives_spanish:
  - es como
  - se parece a
  lexicon: BDAG
  rationale: La comparación directa se expresa con naturalidad en español mediante “es semejante”, que conserva el matiz formal de similitud del griego.
- source_word: ἀνθρώπῳ
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  lexicon: BDAG
  rationale: El singular masculino del ejemplo se mantiene como en el griego y en la traducción inglesa auditada, sin neutralizar la imagen representativa.
- source_word: οἰκοδομήσαντι οἰκίαν
  english_pob_choice: who built a house
  chosen_spanish: que edificó una casa
  alternatives_spanish:
  - que construyó una casa
  - que levantó una casa
  lexicon: BDAG
  rationale: “Edificó” conserva el carácter de construcción del verbo y funciona bien en el registro bíblico; “casa” corresponde de forma directa a οἰκία.
- source_word: ἐπὶ τὴν γῆν
  english_pob_choice: on the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el suelo
  - sobre el terreno
  lexicon: BDAG
  rationale: γῆ puede significar tierra/suelo/terreno. Aquí la imagen es la de una casa asentada en la tierra sin cimiento; “sobre la tierra” preserva el contraste con el fundamento y evita restringir demasiado el sentido.
- source_word: χωρὶς θεμελίου
  english_pob_choice: without a foundation
  chosen_spanish: sin fundamento
  alternatives_spanish:
  - sin cimiento
  - sin base
  lexicon: BDAG
  rationale: “Sin fundamento” comunica de manera natural la idea central del griego y conserva la fuerza metafórica. “Cimiento” sería posible, pero “fundamento” resulta más amplio y solemne en español bíblico.
- source_word: ᾗ προσέρηξεν ὁ ποταμός
  english_pob_choice: When the river burst against it
  chosen_spanish: Cuando el río arremetió contra ella
  alternatives_spanish:
  - Cuando el río golpeó contra ella
  - Cuando el río se lanzó contra ella
  lexicon: BDAG
  rationale: προσρήγνυμι expresa un choque violento. “Arremetió contra ella” transmite la idea de embestida con naturalidad en español. “Río” conserva ποταμός y el pronombre femenino concuerda con “casa”.
- source_word: καὶ ⸂εὐθὺς συνέπεσεν⸃
  english_pob_choice: it immediately collapsed
  chosen_spanish: enseguida se derrumbó
  alternatives_spanish:
  - inmediatamente se derrumbó
  - al instante se vino abajo
  lexicon: BDAG
  rationale: συμπίπτω aquí describe el colapso de una casa. “Se derrumbó” expresa bien la caída estructural; “enseguida” conserva εὐθύς con un ritmo natural en español.
- source_word: καὶ ἐγένετο τὸ ῥῆγμα τῆς οἰκίας ἐκείνης μέγα
  english_pob_choice: and the ruin of that house was great
  chosen_spanish: y la ruina de aquella casa fue grande
  alternatives_spanish:
  - y la brecha de aquella casa fue grande
  - y el quebranto de aquella casa fue grande
  - y la destrucción de aquella casa fue grande
  lexicon: BDAG
  rationale: ῥῆγμα puede denotar ruptura, brecha o ruina. Dado el contexto de derrumbe, “ruina” comunica de forma natural el resultado devastador. “Aquella” preserva ἐκείνης con distancia discursiva.
theological_decisions:
- issue: Imagen de juicio implícito en la comparación
  english_pob_reading: The house without a foundation collapses and is ruined when the river strikes it.
  chosen_spanish_reading: La casa sin fundamento se derrumba y queda en ruina cuando el río la embiste.
  alternative_spanish_readings:
  - La casa sin fundamento cae cuando el río la golpea.
  - La casa sin fundamento se destruye cuando el río la alcanza.
  rationale: La comparación funciona como advertencia moral y espiritual. La traducción conserva el contraste entre oír y hacer, y el resultado de ruina, sin suavizar la advertencia.
  doctrine_reference: Luke 6:46-49; wisdom/obedience contrast in the sermon
translation_notes:
  revision_awareness: 'Se siguió el consenso alto del audit trail inglés: ἀκούσας/ποιήσας se tradujeron con un par sustantivado y contrastivo; ὁ ποταμός se mantuvo como “el río”; συμπίπτω se entendió como colapso estructural; y ῥῆγμα se resolvió como “ruina” por naturalidad contextual. No hubo revisiones posteriores en el registro inglés, y la versión española conserva esas decisiones sin ampliar el sentido.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre oír y hacer con una formulación breve y bíblicamente sobria.
  - Se evitó “SEÑOR” y otros sustitutos porque el versículo no contiene el nombre divino.
  - Se conservó el singular masculino representativo de la comparación, conforme al texto fuente y al audit trail inglés.
  - “Aquella casa” traduce el demostrativo enfático del griego y ayuda a mantener la distancia narrativa del ejemplo.
