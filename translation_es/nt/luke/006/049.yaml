review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: contraste entre oír y no hacer, comparación con un hombre que construyó sin fundamento, impacto violento del río, colapso inmediato y gran ruina. Sin embargo, dos elecciones debilitan la precisión contextual: ἐπὶ τὴν γῆν se entiende mejor como ''sobre el suelo/terreno'' que ''sobre la tierra'', y ὅμοιός ἐστιν pide una forma más natural y completa en español (''es como'') que ''es semejante'' a secas.'
  spanish_quality_summary: El español es claro y digno, pero hay leves mejoras de naturalidad. 'Es semejante a un hombre' suena más rígido de lo necesario; 'es como un hombre' es más idiomático y fiel al uso comparativo. 'Sobre la tierra' puede sugerir 'earth' en vez de la superficie del terreno. El resto del verso fluye bien y mantiene el tono narrativo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se preserva correctamente 'hombre' para ἀνθρώπῳ. No aparecen términos sensibles del glosario principal. La revisión propuesta ajusta solo decisiones contextuales de léxico y naturalidad.
  issues:
  - severity: medium
    issue: '''sobre la tierra'' para ἐπὶ τὴν γῆν'
    rationale: El contexto contrasta construir sobre la superficie del suelo con construir con fundamento. 'Tierra' en español puede sonar demasiado amplio o cosmológico; 'suelo' comunica mejor la imagen concreta del griego y del English POB ('on the ground').
  - severity: low
    issue: '''es semejante a un hombre'' suena menos natural que la comparación simple'
    rationale: ὅμοιός ἐστιν se expresa con total naturalidad como 'es como'. La forma actual no es incorrecta, pero resulta algo más pesada y menos idiomática para lectura continua en español bíblico moderno.
  revised_spanish_text: Pero el que oyó y no hizo es como un hombre que edificó una casa sobre el suelo, sin fundamento[a]. Cuando el río arremetió contra ella, enseguida se derrumbó[b], y la ruina de aquella casa fue grande.
  revised_footnotes:
