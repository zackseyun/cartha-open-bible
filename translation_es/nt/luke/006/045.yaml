translation:
  language: es
  text: El hombre bueno saca lo bueno del buen tesoro de su corazón; y el hombre malo, de su mal tesoro, saca lo malo; porque de lo que rebosa[a] del corazón habla su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "la abundancia": "porque de la abundancia del corazón habla su boca".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαθὸς ἄνθρωπος
  english_pob_choice: the good man
  chosen_spanish: el hombre bueno
  alternatives_spanish:
  - la persona buena
  - el hombre bueno
  lexicon: BDAG
  rationale: ἄνθρωπος es masculino singular y el contraste del versículo es antitético con ὁ πονηρός; por eso conservo 'hombre' y no neutralizo a 'persona'. 'Bueno' mantiene el valor moral de ἀγαθός.
- source_word: θησαυροῦ
  english_pob_choice: treasure
  chosen_spanish: tesoro
  alternatives_spanish:
  - depósito
  - almacén
  lexicon: BDAG
  rationale: '''Tesoro'' reproduce la metáfora de un reservorio interior del cual salen las acciones y las palabras. ''Depósito'' o ''almacén'' suenan más explicativos y menos imagenales.'
- source_word: καρδίας
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - ser interior
  lexicon: BDAG
  rationale: '''Corazón'' es la equivalencia natural y teológicamente estable para la sede de la voluntad, los afectos y la intención. ''Interior'' aclararía el sentido, pero debilita la imagen bíblica.'
- source_word: προφέρει
  english_pob_choice: brings forth
  chosen_spanish: saca
  alternatives_spanish:
  - produce
  - hace salir
  lexicon: BDAG
  rationale: '''Saca'' comunica en español la idea de hacer salir desde una reserva interior con mayor naturalidad que ''brings forth''. Mantiene la imagen sin añadir contenido ajeno al griego.'
- source_word: πονηρὸς / πονηροῦ / πονηρόν
  english_pob_choice: evil / his evil treasure / what is evil
  chosen_spanish: malo / su mal tesoro / lo malo
  alternatives_spanish:
  - malvado / su malvado tesoro / lo malvado
  - malo / su tesoro malo / lo malo
  lexicon: BDAG
  rationale: El POB inglés opta por 'evil' para mantener el contraste moral. En español, 'malo' conserva esa fuerza en un registro más natural y evita que 'evil' se vuelva excesivamente duro o abstracto; además preserva la repetición adjetival/substantiva del griego.
- source_word: περισσεύματος
  english_pob_choice: overflow
  chosen_spanish: abundancia
  alternatives_spanish:
  - desbordamiento
  - exceso
  lexicon: BDAG
  rationale: Sigo la alternativa léxica preservada por el audit trail inglés. 'Abundancia' es el equivalente más asentado y claro en español para el valor metafórico de περισσεύματος; 'desbordamiento' subrayaría la imagen, pero sería más interpretativo.
- source_word: λαλεῖ
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - pronuncia
  lexicon: BDAG
  rationale: '''Habla'' es el verbo natural y solemne para este proverbio. ''Dice'' resulta más directo pero menos idiomático con ''la boca'' como sujeto de la acción.'
- source_word: τὸ στόμα αὐτοῦ
  english_pob_choice: his mouth
  chosen_spanish: la boca
  alternatives_spanish:
  - su boca
  - su boca habla
  lexicon: BDAG
  rationale: La construcción española más fluida es 'la boca' como sujeto explícito del verbo 'habla'. Aunque el posesivo se omite por estilo, el referente queda claro por el contexto y se conserva la imagen corporal del original.
theological_decisions:
- issue: Contraste moral entre ἀγαθός y πονηρός
  english_pob_reading: Retain the moral categories 'good' and 'evil' without softening them to merely functional categories such as 'healthy' and 'bad.'
  chosen_spanish_reading: 'Mantener categorías morales claras: ''bueno'' y ''malo'', sin convertirlas en descriptores meramente funcionales.'
  alternative_spanish_readings:
  - el hombre sano ... el hombre malo
  - el hombre bueno ... el hombre perverso
  rationale: El dicho de Jesús trata del carácter moral y de su expresión verbal. 'Bueno' y 'malo' preservan la antítesis ética sin introducir una dureza innecesaria como 'perverso' ni debilitarla con términos no morales como 'sano'.
  doctrine_reference: Philosophy of translation §5 (consistency of key terms) y §6 (Spanish moderno legible sin aplanar el peso teológico).
- issue: Sentido de περισσεύματος καρδίας
  english_pob_reading: '''overflow'' with a footnote preserving ''abundance'' as a lexical alternative.'
  chosen_spanish_reading: '''abundancia'' en el texto principal, con la imagen de desbordamiento implícita.'
  alternative_spanish_readings:
  - desbordamiento del corazón
  - plétora del corazón
  rationale: El griego puede entenderse como 'abundancia' o 'overflow'. En español, 'abundancia del corazón' es la forma más natural y bíblicamente inteligible, y preserva la alternativa léxica documentada por el POB inglés. La nota mantiene visible que la imagen también puede leerse como desborde.
  doctrine_reference: Philosophy of translation §4 (preservar alternativas significativas) y §6.
translation_notes:
  revision_awareness: 'El texto inglés auditado permaneció sin cambios en la última revisión (latest_revision_pass: unchanged = true); la presente propuesta sigue esa solución base y solo la traslada al español con ajustes idiomáticos mínimos y consistentes con el griego.'
  spanish_consistency_notes:
  - Conservo la antítesis paralela bueno/malo para ἀγαθός/πονηρός en toda la cláusula.
  - Mantengo la metáfora interna tesoro/corazón sin explicarla en exceso.
  - Uso 'habla la boca' para reflejar explícitamente τὸ στόμα αὐτοῦ, tal como el POB inglés mantiene 'his mouth speaks'.
  - La nota [a] se ancla en 'abundancia' para preservar la alternativa léxica 'overflow' / 'abundance' documentada en el audit trail inglés.
