translation:
  language: es
  text: Todo el que viene a mí y oye mis palabras y las pone por obra, les mostraré cómo es.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «a quien es semejante»; español idiomático: «cómo es».'
    reason: lexical_alternative
  - marker: b
    text: El griego usa una forma masculina singular de manera genérica para referirse a cualquier persona que viene, oye y hace.
    reason: cultural_note
lexical_decisions:
- source_word: πᾶς ὁ ἐρχόμενος
  english_pob_choice: Everyone who comes
  chosen_spanish: Todo el que viene
  alternatives_spanish:
  - Quien viene
  - Toda persona que viene
  lexicon: BDAG
  rationale: El participio articular con πᾶς funciona de manera genérica y universal. En español, «todo el que» preserva bien ese alcance sin sonar forzado.
- source_word: ἐρχόμενος πρός με
  english_pob_choice: comes to me
  chosen_spanish: viene a mí
  alternatives_spanish:
  - se acerca a mí
  - viene hacia mí
  lexicon: BDAG
  rationale: πρός con acusativo expresa movimiento hacia Jesús. «Viene a mí» es la forma natural y fiel en español.
- source_word: ἀκούων μου τῶν λόγων
  english_pob_choice: hears my words
  chosen_spanish: oye mis palabras
  alternatives_spanish:
  - escucha mis palabras
  - oye las palabras de mí
  lexicon: BDAG
  rationale: λόγοι aquí se refiere a las enseñanzas dichas por Jesús. «Palabras» conserva el paralelismo verbal con «pone por obra» y «oye» mantiene la fuerza auditiva del verbo sin reducirlo a mera atención.
- source_word: λόγων
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - enseñanzas
  lexicon: BDAG
  rationale: «Palabras» es la correspondencia más directa y clara para λόγοι en este contexto de enseñanza de Jesús.
- source_word: ποιῶν αὐτούς
  english_pob_choice: does them
  chosen_spanish: las pone por obra
  alternatives_spanish:
  - las hace
  - las cumple
  - las practica
  lexicon: BDAG
  rationale: ποιέω con referencia a palabras o mandatos significa hacerlas/obedecerlas. «Poner por obra» comunica ese sentido en español con naturalidad y conserva la idea de acción concreta.
- source_word: ὑποδείξω ὑμῖν
  english_pob_choice: I will show you
  chosen_spanish: yo les mostraré
  alternatives_spanish:
  - yo les enseñaré
  - yo les indicaré
  lexicon: BDAG
  rationale: El futuro introduce la comparación que sigue. «Mostraré» es claro y corresponde bien a ὑποδείξω. Se mantiene el plural de cortesía/dirigido al auditorio en español.
- source_word: τίνι ἐστὶν ὅμοιος
  english_pob_choice: what he is like
  chosen_spanish: a qué se parece
  alternatives_spanish:
  - con quién es semejante
  - qué clase de persona es
  lexicon: BDAG
  rationale: Aunque τίνι es formalmente dativo («a quién»/«a qué»), en español la comparación idiomática se expresa mejor como «a qué se parece». Esto conserva el sentido sin literalismo incómodo.
theological_decisions:
- issue: Pronombre genérico y singular representativo
  english_pob_reading: Use representative singular 'he' in the comparison clause
  chosen_spanish_reading: Evitar un masculino genérico explícito en la cláusula comparativa, sin perder el referente singular genérico de la construcción
  alternative_spanish_readings:
  - yo les mostraré a qué se parece él
  - yo les mostraré a qué se parece esa persona
  rationale: En español, el sujeto implícito del relativo genérico se puede expresar de forma natural sin forzar un «él» que no aporta claridad y puede sonar artificial en esta estructura. La construcción «todo el que…» ya establece el valor representativo singular y universal.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: 'El texto coincide con la línea de la POB inglesa revisada: construcción genérica universal, verbos concretos para oír/hacer, y comparación final idiomática. No se detectaron revisiones aplicadas en el expediente inglés, y la propuesta mantiene esa lectura estable.'
  spanish_consistency_notes:
  - Se conserva «palabras» para λόγοι, en paralelo con el audit trail inglés.
  - Se usa «poner por obra» como equivalente natural de ποιεῖν cuando el objeto son palabras/mandatos.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni una cita directa del tetragrama.
  - La comparación final se formula de modo idiomático en español, manteniendo la relación semántica con τίνι ἐστὶν ὅμοιος.
