  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: «Οὐαί» como denuncia solemne, «hablen bien de ustedes» para καλῶς ὑμᾶς εἴπωσιν, y la comparación histórica con el trato dado a los falsos profetas. Sin embargo, omite una nota presente en la auditoría inglesa sobre «sus padres» como referencia a generaciones anteriores, y la puntuación española deja la oración sin cierre final.'
  spanish_quality_summary: El español es natural y ampliamente legible. «¡Ay cuando…» funciona, aunque conviene cerrar la exclamación y la frase completa con puntuación completa. La redacción principal suena idiomática. «Con los falsos profetas» es aceptable en español con «hacer lo mismo con», aunque «a los falsos profetas» sería más pegado al dativo; no exige cambio obligatorio.
  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. «Falsos profetas» alinea bien con ψευδοπροφήταις. «Sus padres» preserva la literalidad de οἱ πατέρες αὐτῶν, pero debe conservarse también la aclaración cultural documentada en la auditoría inglesa mediante nota al pie.
  issues:
