translation:
  language: es
  text: ¡Ay cuando todos hablen bien de ustedes[a][b], porque lo mismo hacían sus padres[b] con los falsos profetas!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hablen favorablemente de ustedes».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sus padres»; es decir, las generaciones anteriores de su pueblo.
    reason: cultural_note
lexical_decisions:
- source_word: Οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay
  alternatives_spanish:
  - ¡Ay de ustedes
  - ¡Ay!
  lexicon: BDAG
  rationale: Conserva el valor profético de lamentación/denuncia de οὐαί. En español, «¡Ay!» reproduce esa exclamación breve y solemne; se evita suavizarlo con una formulación explicativa.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cuandoquiera que
  - al cuando
  lexicon: BDAG
  rationale: Expresa la condición general de manera natural en español y mantiene el sentido de contingencia futura del giro.
- source_word: καλῶς ὑμᾶς εἴπωσιν
  english_pob_choice: speak well of you
  chosen_spanish: hablen bien de ustedes
  alternatives_spanish:
  - hablen favorablemente de ustedes
  - digan cosas buenas de ustedes
  lexicon: BDAG
  rationale: La expresión griega es idiomática y evaluativa; «hablen bien de ustedes» conserva el sentido de aprobación verbal sin volverlo demasiado interpretativo.
- source_word: πάντες οἱ ἄνθρωποι
  english_pob_choice: all people
  chosen_spanish: todos
  alternatives_spanish:
  - todas las personas
  - todo el mundo
  lexicon: BDAG
  rationale: En español, el sujeto se entiende claramente con «todos» en este contexto. Se evita una repetición pesada de «las personas» y se mantiene el alcance universal sin sesgo de género.
- source_word: κατὰ τὰ αὐτά
  english_pob_choice: the same
  chosen_spanish: lo mismo
  alternatives_spanish:
  - de la misma manera
  - igual
  lexicon: BDAG
  rationale: La construcción con ποιέω pide un equivalente natural en español. «Lo mismo» conserva el valor comparativo y habitual de la frase sin endurecerla innecesariamente.
- source_word: ἐποίουν
  english_pob_choice: used to do
  chosen_spanish: hacían
  alternatives_spanish:
  - solían hacer
  - hacían costumbre
  lexicon: BDAG
  rationale: El imperfecto indica acción habitual pasada; «hacían» transmite ese trasfondo de manera sobria y idiomática. «Solían hacer» sería una opción válida, pero aquí suena más marcada.
- source_word: τοῖς ψευδοπροφήταις
  english_pob_choice: to the false prophets
  chosen_spanish: con los falsos profetas
  alternatives_spanish:
  - a los falsos profetas
  - para los falsos profetas
  lexicon: BDAG
  rationale: En español, con el verbo «hacer lo mismo con» se expresa bien la relación de trato/acción hacia esas personas. Se conserva el calificativo «falsos profetas» sin suavizarlo.
- source_word: οἱ πατέρες αὐτῶν
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus padres, es decir, las generaciones anteriores de su pueblo
  lexicon: BDAG
  rationale: «Padres» refleja literalmente el griego y mantiene la fuerza intergeneracional del reproche. En español, el referente puede abarcar antepasados, pero el texto base no exige explicitarlo en el versículo.
theological_decisions:
- issue: Alcance de la bienaventuranza/denuncia sobre el elogio universal
  english_pob_reading: The verse warns that universal human praise is a mark associated with how previous generations treated false prophets.
  chosen_spanish_reading: El versículo advierte que recibir el elogio de todos puede corresponder al patrón con que las generaciones anteriores trataron a los falsos profetas.
  alternative_spanish_readings:
  - El versículo condena todo elogio positivo sin matiz
  - El versículo critica sobre todo la popularidad
  rationale: Se preserva la relación causal introducida por γάρ y la comparación de κατὰ τὰ αὐτά, sin convertirla en una prohibición absoluta de toda aprobación ajena. Así se conserva la tensión interpretativa del original.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando un único marcador de nota [a] directamente en el texto español. No se añadieron notas sin ancla y se evitó el uso simultáneo de marcadores no presentes.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, sin calcos innecesarios.
  - Se evitó «SEÑOR» y otras sustituciones no pertinentes para este versículo.
  - Se preservó el tono profético de advertencia con «¡Ay!».
  - Se respetó la fuerza intergeneracional de «sus padres» sin expandirla en el texto principal.
