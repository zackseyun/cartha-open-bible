translation:
  language: es
  text: Es como un hombre que construye una casa[a], el cual cavó hondo y puso un cimiento sobre la roca. Y cuando vino una inundación, el río se estrelló contra aquella casa, y no pudo hacerla tambalear, porque había sido bien construida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una persona». El griego usa el singular masculino «hombre» como figura representativa en la comparación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅμοιός ἐστιν
  english_pob_choice: He is like
  chosen_spanish: Se parece a
  alternatives_spanish:
  - Es similar a
  - Es comparable a
  lexicon: BDAG
  rationale: La fórmula de comparación en una parábola se expresa de manera natural en español con «se parece a». Conserva la comparación directa sin sonar mecánica.
- source_word: ἀνθρώπῳ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: BDAG
  rationale: El griego usa un singular masculino como figura representativa. Se mantiene «un hombre» para reflejar esa forma gramatical y la decisión del POB inglés de no neutralizarla.
- source_word: οἰκοδομοῦντι οἰκίαν
  english_pob_choice: building a house
  chosen_spanish: que construye una casa
  alternatives_spanish:
  - edificando una casa
  - que levanta una casa
  lexicon: BDAG
  rationale: «Construye una casa» es claro y natural en español moderno. «Levanta» o «edifica» son posibles, pero «construye» comunica bien la acción sin forzar el registro.
- source_word: ἔσκαψεν καὶ ἐβάθυνεν
  english_pob_choice: dug deep
  chosen_spanish: cavó hondo
  alternatives_spanish:
  - cavó profundo
  - cavó y ahondó
  lexicon: BDAG
  rationale: La dupla verbal intensifica la excavación. «Cavó hondo» condensa bien el énfasis de «cavó y profundizó» sin perder la fuerza idiomática.
- source_word: ἔθηκεν θεμέλιον
  english_pob_choice: laid a foundation
  chosen_spanish: puso el cimiento
  alternatives_spanish:
  - echó el cimiento
  - puso un fundamento
  lexicon: BDAG
  rationale: «Cimiento» reproduce bien la imagen constructiva y suena natural en español. «Fundamento» sería posible, pero aquí la metáfora arquitectónica concreta pide «cimiento».
- source_word: ἐπὶ τὴν πέτραν
  english_pob_choice: on the rock
  chosen_spanish: sobre la roca
  alternatives_spanish:
  - sobre la peña
  - sobre la piedra
  lexicon: BDAG
  rationale: «Roca» conserva el valor general de πέτρα y el artículo definido del texto. «Peña» sería más regional; «piedra» atenúa la imagen.
- source_word: πλημμύρης δὲ γενομένης
  english_pob_choice: when a flood came
  chosen_spanish: cuando vino una inundación
  alternatives_spanish:
  - cuando ocurrió una inundación
  - cuando se produjo una crecida
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa circunstancia temporal. «Vino una inundación» mantiene la naturalidad narrativa y sigue de cerca la función temporal del griego.
- source_word: προσέρηξεν ὁ ποταμὸς
  english_pob_choice: the river burst against
  chosen_spanish: el río se lanzó contra
  alternatives_spanish:
  - el río golpeó contra
  - el río rompió contra
  lexicon: BDAG
  rationale: El verbo indica impacto violento. «Se lanzó contra» comunica esa embestida con viveza en español, sin suavizar el sentido.
- source_word: οὐκ ἴσχυσεν σαλεῦσαι αὐτὴν
  english_pob_choice: was not able to shake it
  chosen_spanish: no pudo sacudirla
  alternatives_spanish:
  - no pudo moverla
  - no fue capaz de hacerla tambalear
  lexicon: BDAG
  rationale: «Sacudir» traduce bien σαλεύω en el sentido de desestabilizar. «No pudo sacudirla» mantiene la incapacidad expresada por ἰσχύω + infinitivo.
- source_word: διὰ τὸ καλῶς οἰκοδομῆσθαι αὐτήν
  english_pob_choice: because it had been well built
  chosen_spanish: porque había sido bien construida
  alternatives_spanish:
  - porque estaba bien construida
  - porque había sido bien edificada
  lexicon: BDAG
  rationale: La pasiva del infinitivo señala el estado resultante de la casa. «Había sido bien construida» preserva esa pasividad y su relación causal con la resistencia de la casa.
theological_decisions:
- issue: Forma masculina representativa en la comparación
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  rationale: Se conserva el masculino singular como figura representativa, siguiendo la lectura del POB inglés y el valor gramatical del griego. La referencia sigue siendo genérica dentro de la parábola.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones aplicadas y el control cruzado reporta alta concordancia; por eso la propuesta española sigue de cerca la decisión inglesa, manteniendo la imagen de la casa, la embestida del río y la causalidad final sin añadir matices ajenos al original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - 'Se conserva el registro narrativo y concreto de la imagen arquitectónica: «casa», «cimiento», «roca».'
  - «Sacudir» se eligió para mantener la idea de desestabilizar, no solo mover físicamente.
  - La nota al pie marca la alternativa «persona» sin neutralizar el texto principal.
