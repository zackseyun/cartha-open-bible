revisions:
- from: Se parece a un hombre que construye una casa[a], el cual cavó hondo y puso el cimiento sobre la roca. Y cuando vino una inundación, el río se lanzó contra aquella casa, y no pudo sacudirla, porque había sido bien construida.
  to: Es como un hombre que construye una casa[a], el cual cavó hondo y puso un cimiento sobre la roca. Y cuando vino una inundación, el río se estrelló contra aquella casa, y no pudo hacerla tambalear, porque había sido bien construida.
  rationale: 'La revisión hace ajustes menores de naturalidad y precisión semántica: «Es como» para la fórmula comparativa; «puso un cimiento» para una colocación más natural conservando el singular de θεμέλιον; «se estrelló contra» para reflejar mejor el impacto violento de προσέρηξεν; y «hacerla tambalear» para expresar de forma más contextual la desestabilización implicada por σαλεῦσαι. Se mantiene la nota sobre «hombre/persona» y la voz pasiva final.'
  reviewer_model: gpt-5.4
