    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:49:40Z'
    unchanged: false
    changes_summary: Changed 'senseless rage' to 'rage' because the Greek ἀνοίας means 'folly' or 'madness,' and adding 'senseless' overinterprets the expression. The revision keeps the sense natural and formally appropriate.
translation:
  language: es
  text: Pero ellos se llenaron de ira[a], y discutían entre sí qué podrían hacerle a Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘se llenaron de locura’ o ‘se llenaron de necedad’. El término griego puede denotar irracionalidad, necedad o una reacción frenética e insensata.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: BDAG
  rationale: El pronombre es enfático en griego, pero en español el énfasis queda suficientemente sugerido por el contraste del contexto; 'ellos mismos' sonaría forzado.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: '''Pero'' conserva bien el matiz adversativo frente a la escena anterior y es natural en español.'
- source_word: ἐπλήσθησαν ἀνοίας
  english_pob_choice: were filled with rage
  chosen_spanish: se llenaron de ira
  alternatives_spanish:
  - se llenaron de furia
  - se llenaron de locura
  - se llenaron de necedad
  lexicon: BDAG
  rationale: El griego ἀνοίας puede expresar falta de juicio, necedad o irracionalidad; en este contexto hostil, 'ira' comunica la reacción emocional que el texto presenta sin sobrecargar con un matiz clínico o demasiado interpretativo.
- source_word: διελάλουν
  english_pob_choice: discussed
  chosen_spanish: discutían
  alternatives_spanish:
  - conversaban
  - deliberaban
  - hablaban entre sí
  lexicon: BDAG
  rationale: El imperfecto indica acción continuada; 'discutían' expresa bien la deliberación en curso entre ellos.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: with one another
  chosen_spanish: entre sí
  alternatives_spanish:
  - unos con otros
  - mutuamente
  lexicon: BDAG
  rationale: '''Entre sí'' es una forma natural y precisa de reflejar la reciprocidad del griego.'
- source_word: τί ἂν ποιήσαιεν
  english_pob_choice: what they might do
  chosen_spanish: qué podrían hacer
  alternatives_spanish:
  - qué harían
  - qué debían hacer
  lexicon: BDAG
  rationale: La construcción deliberativa con ἄν y optativo expresa posibilidad tentativa; 'qué podrían hacer' conserva esa incertidumbre sin imponer obligación.
- source_word: τῷ Ἰησοῦ
  english_pob_choice: to Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - contra Jesús
  - con Jesús
  lexicon: BDAG
  rationale: El dativo con ποιέω se puede rendir de manera directa como 'a Jesús'; el contexto ya deja clara la hostilidad sin añadir una preposición interpretativa.
theological_decisions:
- issue: Cómo reflejar ἀνοίας sin psicologizar excesivamente la oposición de los adversarios
  english_pob_reading: rage
  chosen_spanish_reading: ira
  alternative_spanish_readings:
  - locura
  - necedad
  - furia
  rationale: La revisión inglesa dejó 'rage' para evitar sobreinterpretar el término. En español, 'ira' ofrece una solución sobria y legible que conserva la carga hostil del contexto sin afirmar más de lo que el griego exige por sí solo.
  doctrine_reference: Ninguna; decisión léxica-contextual.
translation_notes:
  revision_awareness: La tradición de auditoría en inglés muestra una revisión desde 'senseless rage' a 'rage' por considerarse que 'senseless' sobreinterpretaba ἀνοίας. Esta versión española sigue esa revisión y evita añadir un adjetivo equivalente; opta por 'ira' como forma breve, natural y compatible con el rango semántico del término en este contexto.
  spanish_consistency_notes:
  - Se mantiene 'Jesús' para τῷ Ἰησοῦ, según el estándar del proyecto.
  - No se usa 'Cristo' ni 'Señor' porque el verso nombra directamente a Jesús.
  - La nota textual se ancla solo en 'ira' porque allí se concentra la alternativa léxica principal.
