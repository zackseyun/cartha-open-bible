  text: αὐτοὶ δὲ ἐπλήσθησαν ἀνοίας, καὶ διελάλουν πρὸς ἀλλήλους τί ἂν ποιήσαιεν τῷ Ἰησοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/006/011.yaml
  text: But they were filled with rage[a], and they discussed with one another what they might do to Jesus.
  footnotes:
  - marker: a
    text: Or 'were filled with madness' or 'were filled with folly.' The Greek term can denote irrationality, foolishness, or a frenzied lack of sense.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
