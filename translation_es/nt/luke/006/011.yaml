review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura griega y el sentido general: contraste adversativo, idiomático ''se llenaron de'', deliberación mutua y la idea potencial de ''qué podrían hacer''. Sin embargo, la frase final ''hacer a Jesús'' no es español natural en este contexto y suena incompleta; el griego τῷ Ἰησοῦ con ποιέω aquí pide una formulación idiomática como ''hacerle a Jesús''.'
  spanish_quality_summary: El español es en general claro y legible, pero 'qué podrían hacer a Jesús' resulta poco natural y ligeramente defectuoso gramaticalmente en registro bíblico moderno. 'Discutían entre sí' es aceptable, aunque 'discutían' puede sugerir riña más que deliberación; aun así, no exige cambio porque el complemento aclara el sentido. La nota es útil y está bien formulada.
  glossary_alignment: No hay términos del glosario principal en disputa salvo Ἰησοῦς -> 'Jesús', correctamente aplicado. La decisión sobre ἀνοίας como 'ira' sigue la revisión inglesa auditada y mantiene las alternativas en nota. No hay conflicto terminológico mayor.
  issues:
  - severity: medium
    issue: '''hacer a Jesús'' no es formulación idiomática en español'
    rationale: 'Aunque reproduce de forma bastante literal el dativo griego, en español natural se requiere pronombre indirecto: ''hacerle a Jesús''. Sin ese ajuste, la frase suena impropia y puede entorpecer la lectura.'
  - severity: low
    issue: '''discutían'' puede sonar a pelear más que a deliberar'
    rationale: El griego διελάλουν indica conversación deliberativa. 'Discutían' puede funcionar en español, pero en algunos contextos se oye más confrontativo. No obstante, el contexto y 'entre sí' lo mantienen dentro de lo aceptable.
  revised_spanish_text: Pero ellos se llenaron de ira[a], y discutían entre sí qué podrían hacerle a Jesús.
  revised_footnotes:
  - marker: a
    text: O ‘se llenaron de locura’ o ‘se llenaron de necedad’. El término griego puede denotar irracionalidad, necedad o una reacción frenética e insensata.
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor para que el español sea idiomático y fiel a la vez: ''hacerle a Jesús'' expresa naturalmente la acción dirigida hacia Jesús que está implícita en el dativo griego. Se conserva ''ira'' con la nota de alternativas, en línea con la auditoría inglesa revisada.'
