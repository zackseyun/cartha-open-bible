- from: Al que te golpea en la mejilla[a], preséntale también la otra; y al que te quita tu capa[c][b], no le niegues también la túnica.
  to: Al que te golpea en la mejilla[a], preséntale también la otra; y al que te quita la capa[c][b], no le niegues tampoco tu túnica.
  rationale: 'Se corrigen dos puntos de español y fidelidad: se elimina la duplicación posesiva poco natural en ''te quita tu capa'', y se rehace la segunda orden como ''no le niegues tampoco tu túnica'' para reflejar mejor el sentido de μὴ κωλύσῃς y el paralelismo con las prendas. Se mantiene la decisión importante de conservar el verbo propio de Lucas (''preséntale'') en vez de armonizar con Mateo.'
