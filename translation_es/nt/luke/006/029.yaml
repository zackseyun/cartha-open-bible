    text: O “en la mandíbula”.
    reason: lexical_alternative
  - marker: b
    text: El griego dice más literalmente “preséntale también la otra”, no “vuélvele la otra mejilla”.
    reason: alternative_reading
  - marker: c
    text: La “capa” corresponde al ἱμάτιον, la prenda exterior; la “túnica” al χιτών, la prenda interior.
    reason: cultural_note
  revision_rationale: 'Se corrigen dos puntos de español y fidelidad: se elimina la duplicación posesiva poco natural en ''te quita tu capa'', y se rehace la segunda orden como ''no le niegues tampoco tu túnica'' para reflejar mejor el sentido de μὴ κωλύσῃς y el paralelismo con las prendas. Se mantiene la decisión importante de conservar el verbo propio de Lucas (''preséntale'') en vez de armonizar con Mateo.'
