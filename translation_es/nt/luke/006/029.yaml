review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y respeta la decisión clave de no armonizar con Mateo: πάρεχε se refleja con un verbo de ofrecimiento/presentación, y se mantiene la distinción entre ἱμάτιον y χιτών. También conserva adecuadamente la alternativa léxica de σιαγών. Sin embargo, en la segunda cláusula, ''y al que te quita tu capa'' no refleja bien ἀπὸ τοῦ αἴροντός σου, que pide más naturalmente ''al que te quita la capa'' o ''al que te arrebata la capa''; el posesivo duplicado suena impropio en español. Además, ''no le niegues también la túnica'' es menos fiel y menos natural que una formulación con ''no le niegues tu túnica también'' o mejor ''no le niegues tampoco la túnica'', aunque el posesivo de χιτών está implícito por σου que rige la secuencia de prendas.'
  spanish_quality_summary: 'El español es claro y comprensible, pero tiene dos tropiezos de naturalidad: la duplicación posesiva ''te quita tu capa'' y la colocación/adverbio en ''no le niegues también la túnica'', que resulta algo forzada. ''Preséntale también la otra'' es defendible, pero en español puede quedar elíptico; aun así, la nota aclara correctamente la diferencia con la formulación tradicional. Una leve reparación mejora fidelidad y fluidez sin alterar la filosofía de traducción.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La distinción capa/túnica concuerda con la nota cultural y con las decisiones léxicas auditadas. No intervienen términos doctrinales sensibles del glosario principal.
  issues:
  - severity: medium
    issue: Duplicación posesiva poco natural en 'te quita tu capa'
    rationale: El griego expresa 'tu' una sola vez con σου antes de ἱμάτιον, y en español 'te quita tu capa' suena torpe; 'te quita la capa' o 'te arrebata la capa' comunica mejor el sentido con posesión implícita.
  - severity: medium
    issue: '''No le niegues también la túnica'' suena rígido y no refleja con la mayor naturalidad μὴ κωλύσῃς'
    rationale: κωλύω aquí se entendió bien como no impedir/rehusar, pero en español la colocación del adverbio mejora con 'tampoco', y conviene explicitar la referencia posesiva de la segunda prenda para mantener el paralelo del original.
  - severity: low
    issue: La nota b usa 'vuélvele la otra' sin 'mejilla'
    rationale: No es incorrecto, pero en español la comparación con la lectura tradicional suele sonar más clara como 'vuélvele la otra mejilla'. Puede afinarse la nota sin cambiar su función.
  revised_spanish_text: Al que te golpea en la mejilla[a], preséntale también la otra; y al que te quita la capa[c][b], no le niegues tampoco tu túnica.
  revised_footnotes:
