translation:
  language: es
  text: Al que te golpea en la mejilla[a], preséntale también la otra; y al que te quita la capa[c][b], no le niegues tampoco tu túnica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en la mandíbula”.
    reason: lexical_alternative
  - marker: b
    text: El griego dice más literalmente “preséntale también la otra”, no “vuélvele la otra mejilla”.
    reason: alternative_reading
  - marker: c
    text: La “capa” corresponde al ἱμάτιον, la prenda exterior; la “túnica” al χιτών, la prenda interior.
    reason: cultural_note
lexical_decisions:
- source_word: τῷ τύπτοντί
  english_pob_choice: to the one who strikes
  chosen_spanish: al que te golpea
  alternatives_spanish:
  - al que te hiere
  - al que te pega
  lexicon: BDAG
  rationale: El participio presente articular funciona sustantivamente; en español, "al que te golpea" expresa bien la referencia genérica y la acción en curso sin volverse rígido. "Golpear" mantiene la fuerza física del verbo mejor que una formulación más suave.
- source_word: ἐπὶ τὴν σιαγόνα
  english_pob_choice: on the cheek
  chosen_spanish: en la mejilla
  alternatives_spanish:
  - en la quijada
  - en la mandíbula
  lexicon: BDAG
  rationale: σιαγών puede significar mejilla o mandíbula/quijada. En este contexto de un golpe, "mejilla" es la equivalencia natural y comunicativa en español, y evita una precisión anatómica que el contexto no exige.
- source_word: πάρεχε
  english_pob_choice: offer
  chosen_spanish: preséntale
  alternatives_spanish:
  - ofrécele
  - dásela
  lexicon: BDAG
  rationale: παρέχω aquí pide una acción de disponibilidad o entrega; "preséntale" conserva mejor la idea de poner la otra mejilla a disposición que "volver" o "girar", que introducirían la lectura de Mateo y no la de Lucas.
- source_word: καὶ τὴν ἄλλην
  english_pob_choice: the other also
  chosen_spanish: también la otra
  alternatives_spanish:
  - la otra también
  - la otra
  lexicon: BDAG
  rationale: El orden español más natural es "también la otra"; conserva el énfasis de καί sin perder la correspondencia con el griego.
- source_word: ἀπὸ τοῦ αἴροντός σου
  english_pob_choice: from the one who takes away your
  chosen_spanish: al que te quita tu
  alternatives_spanish:
  - del que te toma tu
  - del que te arrebata tu
  lexicon: BDAG
  rationale: ἀπό con el participio señala procedencia o relación con quien está quitando. "Quita" comunica bien el acto de retirar o tomar para sí; en contexto de prendas, suena natural y cercano al sentido de αἴρω.
- source_word: ἱμάτιον
  english_pob_choice: cloak
  chosen_spanish: capa
  alternatives_spanish:
  - manto
  - abrigo
  lexicon: BDAG
  rationale: ἱμάτιον es la prenda exterior. "Capa" funciona bien en español bíblico actual para distinguirla de la túnica interior, sin requerir una glosa larga en el texto principal.
- source_word: τὸν χιτῶνα
  english_pob_choice: your tunic
  chosen_spanish: la túnica
  alternatives_spanish:
  - la ropa interior
  - la camisa
  lexicon: BDAG
  rationale: χιτών es la prenda interior o básica. "Túnica" preserva la distinción cultural con ἱμάτιον y sigue siendo inteligible en español contemporáneo.
- source_word: μὴ κωλύσῃς
  english_pob_choice: do not withhold
  chosen_spanish: no le niegues
  alternatives_spanish:
  - no se la impidas
  - no le rehúses
  lexicon: BDAG
  rationale: κωλύω puede significar impedir o detener; en este contexto de despojo de prendas, "no le niegues" transmite bien la idea de no resistirse ni rehusar la entrega de la prenda adicional, con un español claro y natural.
theological_decisions:
- issue: Mantener el verbo propio de Lucas en lugar de armonizar con la forma más conocida de Mateo
  english_pob_reading: 'Retain Luke''s distinct wording: ''offer the other also'''
  chosen_spanish_reading: 'Preservar el verbo de Lucas: "preséntale también la otra"'
  alternative_spanish_readings:
  - vuélvele la otra mejilla
  - pon la otra mejilla
  rationale: El griego de Lucas usa πάρεχε, no un verbo que signifique "volver". La redacción española debe conservar esa diferencia textual y no importar la formulación tradicional de Mateo.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition
- issue: Conservar el imperativo radical sin suavizarlo con explicaciones interpretativas dentro del versículo
  english_pob_reading: Translate the imperatives directly without interpretive softening or doctrinal qualification
  chosen_spanish_reading: Traducir los imperativos directamente, sin añadir calificativos explicativos en el texto principal
  alternative_spanish_readings:
  - Aclarar en el texto principal que se trata de no retaliación
  - Añadir una nota de hiperbole o principio general en el versículo
  rationale: El versículo presenta mandatos directos. La traducción debe mantener la tensión retórica y ética del dicho de Jesús sin resolverla en la redacción.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El último control de revisión indicó que no hacía falta ningún cambio; este borrador mantiene esa lectura estable y sigue el consenso alto entre los cotejos, conservando la distinción léxica de Lucas y la diferenciación cultural de las prendas.
  spanish_consistency_notes:
  - Se mantiene 'capa' para ἱμάτιον y 'túnica' para χιτών para sostener la distinción de prendas.
  - Se usa 'mejilla' como equivalente idiomático de σιαγών, con nota alternativa para 'mandíbula'.
  - Se evita 'volver la otra mejilla' en el cuerpo del texto para no armonizar con Mateo.
  - Se conserva un español neutro y eclesialmente legible, sin arcaísmos innecesarios.
