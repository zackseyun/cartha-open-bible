  revised_footnotes:
  - marker: a
    text: O «¿qué agradecimiento es eso para ustedes?». La palabra griega también puede significar «gracia» o «agradecimiento», pero aquí probablemente se refiere a mérito, crédito o reconocimiento favorable.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la pregunta retórica para expresar con más fidelidad y naturalidad el sentido de χάρις en este contexto: no el crédito que ellos poseen, sino el mérito o reconocimiento que esa conducta les aporta. El resto del versículo está bien alineado con el griego y con las decisiones del POB inglés.'
