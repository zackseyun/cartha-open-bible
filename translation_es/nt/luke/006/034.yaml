translation:
  language: es
  text: Y si prestan a aquellos de quienes esperan recibir[a], ¿qué mérito tiene eso para ustedes? También los pecadores prestan a los pecadores, para recibir de vuelta la misma cantidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿qué agradecimiento es eso para ustedes?». La palabra griega también puede significar «gracia» o «agradecimiento», pero aquí probablemente se refiere a mérito, crédito o reconocimiento favorable.
    reason: lexical_alternative
lexical_decisions:
- source_word: δανίσητε / δανίζουσιν
  english_pob_choice: lend
  chosen_spanish: prestar
  alternatives_spanish:
  - dar en préstamo
  - prestar dinero
  lexicon: BDAG
  rationale: El verbo griego se refiere al acto de prestar, especialmente en un contexto económico. En español, «prestar» comunica con naturalidad esa acción sin introducir tecnicismos ni cambiar el sentido básico.
- source_word: παρ’ ὧν
  english_pob_choice: to those from whom
  chosen_spanish: a aquellos de quienes
  alternatives_spanish:
  - de aquellos de quienes
  - a quienes
  lexicon: BDAG
  rationale: La construcción griega combina la persona a quien se presta con la de quien se espera devolución. «A aquellos de quienes» conserva ambas relaciones de manera idiomática en español.
- source_word: ἐλπίζετε λαβεῖν
  english_pob_choice: you expect to receive
  chosen_spanish: esperan recibir
  alternatives_spanish:
  - esperan recibir de vuelta
  - esperan obtener
  - esperan que les devuelvan
  lexicon: BDAG
  rationale: En este contexto ἐλπίζω expresa expectativa de retorno, no simple deseo. «Esperan recibir» mantiene esa fuerza anticipatoria de modo claro y natural.
- source_word: ποία ... χάρις ἐστίν
  english_pob_choice: what credit is that to you?
  chosen_spanish: ¿qué crédito tienen ustedes?
  alternatives_spanish:
  - ¿qué gracia tienen ustedes?
  - ¿qué mérito tienen ustedes?
  - ¿qué favor es ese para ustedes?
  lexicon: BDAG
  rationale: Aquí χάρις no apunta a la gracia salvífica, sino al reconocimiento o valor favorable de la acción. «Crédito» reproduce bien la idea de mérito o favor reconocible en este marco retórico.
- source_word: ἁμαρτωλοὶ
  english_pob_choice: sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - pecadores
  - personas pecadoras
  lexicon: BDAG
  rationale: El sustantivo usado como nombre se traduce de forma directa por «pecadores», preservando la categoría moral explícita del texto.
- source_word: ἵνα ἀπολάβωσιν
  english_pob_choice: so that they may receive back
  chosen_spanish: para recibir de vuelta
  alternatives_spanish:
  - para que reciban de vuelta
  - a fin de recibir de vuelta
  - para que les devuelvan
  lexicon: BDAG
  rationale: ἀπολαμβάνω expresa recibir algo en retorno. «Recibir de vuelta» comunica esa reciprocidad sin forzar un matiz de pago o interés que el texto no dice.
- source_word: τὰ ἴσα
  english_pob_choice: the same amount
  chosen_spanish: la misma cantidad
  alternatives_spanish:
  - la misma suma
  - un equivalente
  - lo mismo
  lexicon: BDAG
  rationale: La expresión indica equivalencia en la devolución. «La misma cantidad» es idiomática en español y evita especificar más de lo que el griego afirma.
theological_decisions:
- issue: Sentido de χάρις en la pregunta retórica
  english_pob_reading: Rendered as 'credit' in the sense of commendable favor or moral credit, not salvific grace.
  chosen_spanish_reading: «Crédito» en el sentido de reconocimiento o valor favorable de la acción, no de gracia salvífica.
  alternative_spanish_readings:
  - gracia
  - agradecimiento
  - beneficio
  rationale: El contexto contrasta a los discípulos con los pecadores y pregunta qué distingue su conducta. Por eso se evita leer χάρις como gracia teológica; el sentido es el de favor reconocido o mérito moral.
  doctrine_reference: Translation philosophy §1, §6
- issue: Naturaleza del retorno esperado en el préstamo
  english_pob_reading: Rendered neutrally as reciprocal repayment ('receive back the same amount') without implying interest or profit.
  chosen_spanish_reading: Retorno equivalente expresado como «recibir de vuelta la misma cantidad», sin sugerir ganancia ni interés.
  alternative_spanish_readings:
  - recibir usura
  - recibir una ganancia
  - recibir el pago completo con interés
  rationale: τὰ ἴσα apunta a equivalencia, no a lucro. La formulación española conserva esa neutralidad económica y no añade elementos ausentes del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; se mantiene el acuerdo alto del contexto inglés y no se introducen revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «pecadores» para ἁμαρτωλοί, en continuidad con el tono moral del pasaje.
  - Se evita «SEÑOR» y otras fórmulas de sustitución, porque el versículo no contiene el nombre divino.
  - «Crédito» se usa de manera funcional para χάρις, siguiendo la decisión auditada del inglés POB.
  - La equivalencia de retorno se expresa como «la misma cantidad», sin implicar interés o ganancia.
