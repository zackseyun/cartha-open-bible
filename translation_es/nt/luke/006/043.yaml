translation:
  language: es
  text: Porque no hay árbol bueno que produzca fruto malo[a], ni tampoco árbol malo que produzca fruto bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «malo» traduce aquí σαπρός; también puede significar «podrido», «dañado» o «deteriorado». El español usa «malo» para preservar la oposición natural con «bueno» en el paralelismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ γάρ
  english_pob_choice: For there is no
  chosen_spanish: Porque no hay
  alternatives_spanish:
  - Pues no hay
  - Porque no existe
  lexicon: BDAG
  rationale: γάρ introduce una explicación/conexión con el contexto previo; en español, «porque» conserva esa relación causal o inferencial. «No hay» reproduce de forma natural la negación existencial de οὐ ἐστιν.
- source_word: δένδρον
  english_pob_choice: tree
  chosen_spanish: árbol
  alternatives_spanish:
  - árbol frutal
  - madero
  lexicon: BDAG
  rationale: El sentido ordinario aquí es un árbol en la imagen proverbial de fruto. «Árbol» es la equivalencia natural y clara en español.
- source_word: καλὸν
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - sano
  - bello
  - fino
  lexicon: BDAG
  rationale: En este contexto moral e ilustrativo, «bueno» conserva el contraste ético y agrícola sin cargar una interpretación más específica que la del griego.
- source_word: ποιοῦν
  english_pob_choice: producing
  chosen_spanish: que produzca
  alternatives_spanish:
  - que dé
  - que haga
  - que vaya produciendo
  lexicon: BDAG
  rationale: El participio presente con καρπός expresa la relación de producir fruto. En español, una subordinada relativa con «que produzca» comunica bien la acción continua y suena natural.
- source_word: καρπὸν
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  - cosecha
  lexicon: BDAG
  rationale: «Fruto» es el término más fiel y estable tanto para la imagen agrícola como para su aplicación metafórica.
- source_word: σαπρόν
  english_pob_choice: bad
  chosen_spanish: malo
  alternatives_spanish:
  - podrido
  - dañado
  - malo
  lexicon: BDAG
  rationale: Aunque σαπρός puede significar «podrido» o «roto», el POB inglés revisado prefirió «bad» para un contraste más natural con «good». En español, «malo» preserva ese equilibrio y la antítesis sin volver la frase forzada; la imagen de deterioro queda suficientemente implícita por el contexto agrario.
- source_word: οὐδὲ πάλιν
  english_pob_choice: nor again
  chosen_spanish: ni tampoco
  alternatives_spanish:
  - ni de nuevo
  - ni por otra parte
  - ni tampoco otra vez
  lexicon: BDAG
  rationale: οὐδὲ coordina la segunda negación y πάλιν añade la idea de reiteración o inversión. «Ni tampoco» transmite la coordinación negativa de forma idiomática en español; el valor de contraste de πάλιν queda incluido por la estructura paralela del dicho.
- source_word: δένδρον σαπρὸν
  english_pob_choice: a bad tree
  chosen_spanish: árbol malo
  alternatives_spanish:
  - árbol podrido
  - árbol dañado
  - árbol malo
  lexicon: BDAG
  rationale: Se mantiene la misma opción léxica para σαπρός en ambas cláusulas, como hace la revisión inglesa, para conservar la simetría del paralelismo.
- source_word: καρπὸν καλόν
  english_pob_choice: good fruit
  chosen_spanish: fruto bueno
  alternatives_spanish:
  - buen fruto
  - fruto sano
  - fruto excelente
  lexicon: BDAG
  rationale: Se conserva la correspondencia con «fruto malo» y el paralelismo del griego. «Fruto bueno» es claro y directo; «buen fruto» sería igualmente posible, pero aquí la forma con adjetivo pospuesto mantiene mejor la estructura contrastiva.
theological_decisions:
- issue: Valor de σαπρός y la intensidad de la imagen
  english_pob_reading: The Greek σαπρός can mean spoiled, rotten, or bad; the revised English main text chose 'bad' for naturalness while keeping the metaphor concrete.
  chosen_spanish_reading: «malo» en ambas cláusulas, con la imagen agrícola implícita
  alternative_spanish_readings:
  - podrido
  - roto
  - deteriorado
  rationale: La revisión inglesa muestra una preferencia por una oposición natural y balanceada entre good/bad. En español, «malo» es la opción más idiomática en el dicho proverbial y mantiene la fuerza moral del contraste. «Podrido» sería más concreto, pero puede sonar excesivamente literal y desplazar el equilibrio proverbial.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable modern Spanish; consistency of key terms'
- issue: Relación entre la imagen agrícola y la enseñanza moral
  english_pob_reading: The verse uses an agricultural image to support a moral point in context.
  chosen_spanish_reading: Imagen agrícola que sostiene una afirmación moral implícita
  alternative_spanish_readings:
  - sentencia moral explícita
  - alegoría completa
  rationale: No conviene convertir la imagen en una explicación moral más amplia que la del texto. La construcción proverbial deja que la inferencia ética surja de la comparación entre árbol y fruto.
  doctrine_reference: Hermenéutica de la metáfora y del proverbio en los Evangelios
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente, que prefirió 'bad' sobre 'rotten' para σαπρός por naturalidad y contraste. En español, por razones equivalentes de idiomaticidad y simetría proverbial, se eligió «malo» en ambas cláusulas, manteniendo la antítesis con «bueno» y la repetición paralela del griego.
  spanish_consistency_notes:
  - Se mantuvo «fruto» de forma uniforme para καρπός.
  - Se preservó el paralelismo de dos cláusulas negativas coordinadas.
  - Se evitó «SEÑOR» o terminología no pertinente; el verso no contiene léxico divino específico.
  - La nota al pie marca únicamente la alternativa léxica relevante de σαπρός y no introduce una interpretación doctrinal ajena al contexto.
