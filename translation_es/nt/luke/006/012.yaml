translation:
  language: es
  text: En aquellos días sucedió que él salió al monte para orar, y pasó la noche entera[a] en oración a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «continuó toda la noche en oración a Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now it happened
  chosen_spanish: Entonces aconteció
  alternatives_spanish:
  - Y aconteció
  - Ahora aconteció
  lexicon: BDAG
  rationale: La fórmula introduce un nuevo episodio narrativo en estilo lucano. «Aconteció» conserva el valor eventivo de γίνομαι sin sonar forzado; «Entonces» representa suavemente el matiz de transición de δέ en español narrativo.
- source_word: ἐν ταῖς ἡμέραις ταύταις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en estos días
  - durante aquellos días
  lexicon: BDAG
  rationale: Aunque ταύταις es formalmente «estas», en español narrativo la referencia retrospectiva suele expresarse naturalmente como «aquellos días». Mantiene la función temporal idiomática sin perder el anclaje de período narrativo.
- source_word: ἐξελθεῖν αὐτὸν
  english_pob_choice: that he went out
  chosen_spanish: que salió
  alternatives_spanish:
  - que se fue
  - que salió afuera
  lexicon: BDAG
  rationale: El infinitivo con acusativo tras ἐγένετο se vuelve con naturalidad una subordinada finita en español. «Salió» conserva el movimiento de ἐξέρχομαι sin añadir destino no explícito.
- source_word: εἰς τὸ ὄρος
  english_pob_choice: to the mountain
  chosen_spanish: al monte
  alternatives_spanish:
  - a la montaña
  - al monte de
  lexicon: BDAG
  rationale: «Ὄρος» puede traducirse como «monte» o «montaña». «Monte» suena más natural en español bíblico para un lugar elevado concreto y mantiene la sobriedad del texto. Se conserva el artículo implícito en «al».
- source_word: προσεύξασθαι
  english_pob_choice: to pray
  chosen_spanish: para orar
  alternatives_spanish:
  - para orar a Dios
  - a orar
  lexicon: BDAG
  rationale: El infinitivo expresa finalidad después de movimiento. «Para orar» es idiomático en español y conserva la finalidad sin sobrecargar la frase; «orar» evita un calco rígido y es plenamente comprensible en registro eclesial.
- source_word: ἦν διανυκτερεύων
  english_pob_choice: he spent the whole night
  chosen_spanish: pasó la noche entera
  alternatives_spanish:
  - estuvo pasando la noche
  - se mantuvo despierto toda la noche
  lexicon: BDAG
  rationale: La perífrasis imperfecta con participio expresa acción prolongada durante la noche. «Pasó la noche entera» comunica la duratividad de διανυκτερεύω de manera natural y fiel; evita una traducción demasiado técnica o pesada.
- source_word: ἐν τῇ προσευχῇ τοῦ θεοῦ
  english_pob_choice: in prayer to God
  chosen_spanish: en oración a Dios
  alternatives_spanish:
  - en la oración de Dios
  - en la oración dirigida a Dios
  lexicon: BDAG
  rationale: 'El genitivo τοῦ θεοῦ se entiende como objetivo/direccional: la oración va dirigida a Dios. «En oración a Dios» preserva esa relación sin sugerir que Dios sea el autor de la oración ni introducir una construcción poco natural en español.'
theological_decisions:
- issue: Relación entre Jesús y Dios en la frase final
  english_pob_reading: prayer to God
  chosen_spanish_reading: oración a Dios
  alternative_spanish_readings:
  - oración de Dios
  - oración dirigida a Dios
  rationale: La traducción debe mantener que Jesús ora a Dios, no que la oración pertenezca a Dios. «Oración a Dios» conserva la tensión cristológica del pasaje con claridad y sin explicitar más de lo que el griego dice.
  doctrine_reference: Principio de primacía del original; conservar la tensión cristológica sin resolverla artificialmente
- issue: Valor aspectual de διανυκτερεύω
  english_pob_reading: he spent the whole night / he continued through the night
  chosen_spanish_reading: pasó la noche entera
  alternative_spanish_readings:
  - permaneció toda la noche
  - veló toda la noche
  rationale: El español debe reflejar la duración total de la acción sin imponer una interpretación de vigilia explícita que el verbo no exige de por sí. «Pasó la noche entera» conserva el dato temporal y la continuidad de la acción.
  doctrine_reference: Respeto al alcance semántico del verbo; evitar sobrerinterpretación
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de SBLGNT y el expediente inglés de POB, manteniendo la transición narrativa lucana, la finalidad del movimiento hacia el monte y el valor durativo de διανυκτερεύων. Se preserva la relación objetiva de la oración con Dios sin introducir explicaciones doctrinales ajenas al texto.
  spanish_consistency_notes:
  - Se usa «Dios» consistentemente para θεός, conforme al estándar del proyecto.
  - Se prefiere «orar/oración» en este contexto por ser el equivalente natural de προσεύχομαι en español eclesial.
  - Se emplea «monte» para ὄρος por ser más idiomático en español bíblico que «montaña» en esta construcción.
  - La nota alternativa de la traducción de toda la noche se mantiene como opción lexical, no como cambio de sentido.
