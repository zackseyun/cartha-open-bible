translation:
  language: es
  text: Y descendiendo con ellos[a], se detuvo en un lugar llano, y había una gran multitud de sus discípulos y una gran muchedumbre del pueblo, de toda Judea y Jerusalén y de la región costera de Tiro y Sidón,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una llanura». La frase griega dice literalmente «en un lugar llano».
    reason: lexical_alternative
lexical_decisions:
- source_word: καταβὰς
  english_pob_choice: coming down
  chosen_spanish: descendiendo
  alternatives_spanish:
  - habiendo descendido
  - bajando
  lexicon: BDAG
  rationale: El participio aoristo de καταβαίνω expresa movimiento previo o concurrente respecto del verbo principal. «Descendiendo» conserva ese valor direccional con español natural y no fuerza una secuencia más rígida de la necesaria.
- source_word: ἔστη
  english_pob_choice: he stood
  chosen_spanish: se puso
  alternatives_spanish:
  - se quedó de pie
  - estuvo de pie
  lexicon: BDAG
  rationale: Aquí ἵστημι describe tomar posición de pie. En español, «se puso» comunica bien el acto de colocarse en un lugar, y evita la repetición algo pesada de «estuvo de pie» en una cláusula de transición narrativa.
- source_word: ἐπὶ τόπου πεδινοῦ
  english_pob_choice: on a level place
  chosen_spanish: en un lugar llano
  alternatives_spanish:
  - en un sitio llano
  - sobre una llanura
  lexicon: BDAG
  rationale: «Lugar llano» mantiene el sentido literal de τόπος πεδινός sin imponer demasiado «llanura» como si fuera un término geográfico técnico. Se preserva la tensión lexical entre «level place» y «plain» registrada en el audit trail inglés.
- source_word: ὄχλος πολὺς μαθητῶν αὐτοῦ
  english_pob_choice: a large crowd of his disciples
  chosen_spanish: una gran multitud de sus discípulos
  alternatives_spanish:
  - una gran muchedumbre de sus discípulos
  - una multitud grande de sus discípulos
  lexicon: BDAG
  rationale: 'ὄχλος y πολὺς apuntan a una agrupación numerosa. «Multitud»/«muchedumbre» reflejan el valor colectivo; aquí «multitud» suena más sobrio y bíblico. El genitivo μαθητῶν αὐτοῦ se conserva como pertenencia/relación: «de sus discípulos».'
- source_word: πλῆθος πολὺ τοῦ λαοῦ
  english_pob_choice: a great multitude of the people
  chosen_spanish: una gran muchedumbre del pueblo
  alternatives_spanish:
  - una gran multitud del pueblo
  - una gran multitud de la gente
  lexicon: BDAG
  rationale: πλῆθος intensifica la idea de gran número. «Del pueblo» conserva τοῦ λαοῦ como colectivo definido y distinto de los discípulos. Se prefirió «muchedumbre» para evitar repetir «multitud» dos veces en la misma frase.
- source_word: λαοῦ
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: BDAG
  rationale: En Lucas, λαός suele designar al pueblo como cuerpo colectivo. «El pueblo» es la equivalencia más directa y menos interpretativa en español.
- source_word: ἀπὸ πάσης τῆς Ἰουδαίας
  english_pob_choice: from all Judea
  chosen_spanish: de toda Judea
  alternatives_spanish:
  - de toda la Judea
  - de Judea entera
  lexicon: BDAG
  rationale: «Toda» expresa la totalidad de πάσης con naturalidad en español. «De toda Judea» es idiomático y fiel al matiz de extensión completa.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: BDAG
  rationale: Topónimo estándar en español.
- source_word: τῆς παραλίου Τύρου καὶ Σιδῶνος
  english_pob_choice: the coastal region of Tyre and Sidon
  chosen_spanish: la región costera de Tiro y de Sidón
  alternatives_spanish:
  - la región litoral de Tiro y Sidón
  - la zona costera de Tiro y Sidón
  lexicon: BDAG
  rationale: 'παράλιος significa «costero/litoral». «Región costera» comunica bien el ámbito geográfico ligado a ambas ciudades. Se conserva la coordinación con dos genitivos propios: «de Tiro y de Sidón».'
theological_decisions:
- issue: Tensión topográfica con otras tradiciones del mismo discurso
  english_pob_reading: on a level place
  chosen_spanish_reading: en un lugar llano
  alternative_spanish_readings:
  - en una llanura
  - en un sitio plano
  rationale: Se mantiene el sentido topográfico explícito de Lucas sin armonizarlo con otros relatos. «Lugar llano» conserva la evidencia griega y no convierte la frase en una reconciliación implícita.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El texto inglés auditado permanece en acuerdo alto y no muestra revisiones aplicadas; la redacción española sigue de cerca la decisión léxica principal («level place») y preserva la alternativa lexical en nota, sin introducir armonización con otros evangelios.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto en otros contextos; aquí no aparece el nombre divino.
  - «Multitud» y «muchedumbre» se alternan para evitar cacofonía sin alterar el sentido colectivo.
  - Se evitó «SEÑOR» o paráfrasis teológica no requeridas por el versículo.
  - 'Los nombres propios se adaptan a formas españolas estándar: Judea, Jerusalén, Tiro, Sidón.'
