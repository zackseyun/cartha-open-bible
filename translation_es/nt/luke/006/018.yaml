    issue: La nota al pie [a] está anclada a «enfermedades» pero su contenido explica ἐνοχλούμενοι.
    rationale: En el POB inglés, la nota alternativa pertenece a «those troubled by unclean spirits», no a «their diseases». Tal como está, la nota española documenta el término equivocado y desordena la evidencia léxica.
  - severity: medium
    issue: «Atormentados» como texto principal intensifica ἐνοχλούμενοι más de lo que exige la decisión auditada.
    rationale: El inglés POB eligió «troubled» como lectura principal por ser más amplia, dejando «afflicted/tormented» como alternativas. En español, «afligidos» o «perturbados» preservan mejor esa amplitud; «atormentados» puede quedar en nota.
  - severity: low
    issue: La nota actual omite la opción principal equivalente a «troubled».
    rationale: Si se mantiene una nota léxica, conviene reflejar el abanico documentado de matices del participio, no solo dos opciones más intensas.
