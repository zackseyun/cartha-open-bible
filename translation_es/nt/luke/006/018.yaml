translation:
  language: es
  text: los que vinieron para oírlo y ser sanados de sus enfermedades; y los que eran afligidos[a] por espíritus inmundos eran sanados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perturbados» o «atormentados». El participio griego también puede entenderse como «afligidos», «perturbados» o «atormentados», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἳ
  english_pob_choice: who
  chosen_spanish: los que
  alternatives_spanish:
  - quienes
  - los cuales
  lexicon: BDAG
  rationale: El relativo griego enlaza con el grupo ya mencionado en el contexto. «Los que» suena natural en español y conserva la referencia relacional sin forzar una calca.
- source_word: ἦλθον
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι expresa la llegada de la multitud. «Vinieron» es claro, narrativo y fiel al movimiento hacia Jesús.
- source_word: ἀκοῦσαι αὐτοῦ
  english_pob_choice: to hear him
  chosen_spanish: para oírlo
  alternatives_spanish:
  - para escucharlo
  - para oír a Jesús
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa de forma natural con «para». «Oírlo» preserva la brevedad del griego y evita añadir énfasis interpretativo que «escucharlo» podría sugerir.
- source_word: ἰαθῆναι
  english_pob_choice: to be healed
  chosen_spanish: ser sanados
  alternatives_spanish:
  - ser curados
  - ser sanados
  lexicon: BDAG
  rationale: En contexto de evangelio, «sanar» es el equivalente español más natural para θεραπεύω/ἰάομαι. «Ser sanados» conserva el pasivo y el sentido de curación/restauración sin estrecharlo a un término meramente médico.
- source_word: ἀπὸ τῶν νόσων αὐτῶν
  english_pob_choice: of their diseases
  chosen_spanish: de sus enfermedades
  alternatives_spanish:
  - de sus enfermedades
  - de sus males
  lexicon: BDAG
  rationale: ἀπό marca separación/origen; en español, «de» transmite bien esa relación en este giro. «Enfermedades» conserva el valor concreto de νόσος mejor que opciones más generales.
- source_word: ἐνοχλούμενοι
  english_pob_choice: troubled
  chosen_spanish: atormentados
  alternatives_spanish:
  - atormentados
  - afligidos
  - molestados
  lexicon: BDAG
  rationale: En este contexto de espíritus inmundos, el participio describe una aflicción intensa. «Atormentados» mantiene la fuerza de la situación y corresponde bien al posible rango de ἐνοχλέω; «afligidos» sería más débil.
- source_word: ἀπὸ πνευμάτων ἀκαθάρτων
  english_pob_choice: by unclean spirits
  chosen_spanish: por espíritus inmundos
  alternatives_spanish:
  - por espíritus inmundos
  - por espíritus impuros
  lexicon: BDAG
  rationale: «Espíritus inmundos» reproduce la fórmula evangélica estable y conserva la carga ritual-moral de ἀκάθαρτος. «Por» expresa naturalmente la causa o agente del tormento.
- source_word: ἐθεραπεύοντο
  english_pob_choice: were being healed
  chosen_spanish: eran sanados
  alternatives_spanish:
  - eran sanados
  - eran curados
  - seguían siendo sanados
  lexicon: BDAG
  rationale: El imperfecto pasivo sugiere acción en curso o repetida. «Eran sanados» preserva esa imperfectividad en español sin sonar forzado; «seguían siendo sanados» sería más explicativo de lo que el texto exige.
theological_decisions:
- issue: Naturaleza de πνευμάτων ἀκαθάρτων
  english_pob_reading: unclean spirits
  chosen_spanish_reading: espíritus inmundos
  alternative_spanish_readings:
  - espíritus impuros
  rationale: Se mantiene la expresión tradicional del Evangelio, que en este contexto apunta a seres espirituales malignos. No se sustituye por «demonios» porque eso interpretaría más allá del lexema, aunque la referencia sea demoníaca en sentido teológico.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Aspecto de ἐθεραπεύοντο
  english_pob_reading: were being healed
  chosen_spanish_reading: eran sanados
  alternative_spanish_readings:
  - eran curados
  rationale: El imperfecto griego presenta la acción como desarrollándose en la escena. «Eran sanados» conserva esa idea de proceso mejor que un perfecto puntual («fueron sanados»).
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El texto español sigue de cerca el paquete de fuente griego y la lectura inglesa auditada, especialmente en el paralelismo entre sanidades corporales y liberación/aflicción espiritual. Se mantuvo el valor aspectual del imperfecto en la segunda cláusula y se evitó suavizar ἐνοχλούμενοι a un término demasiado débil.
  spanish_consistency_notes:
  - Se usa «espíritus inmundos» de forma consistente para πνεύματα ἀκάθαρτα, en línea con el idioma evangélico estándar y el audit trail inglés.
  - Se usa «sanados» para ambos verbos de curación para mantener coherencia estilística y no introducir una distinción no presente en el griego.
  - «Oírlo» se reserva para ἀκοῦσαι αὐτοῦ en sentido de propósito directo hacia Jesús, sin añadir contenido interpretativo.
