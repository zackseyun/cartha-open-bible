  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: propósito doble («vinieron para oírlo y ser sanados»), referencia a «sus enfermedades» y la cláusula final sobre los afectados por espíritus inmundos. Sin embargo, desplaza un detalle importante del rastro POB: la nota léxica en inglés pertenece a ἐνοχλούμενοι («troubled/afflicted/tormented»), no a «enfermedades». Además, «atormentados» en el texto principal es más fuerte que la elección auditada «troubled» y conviene dejarlo como alternativa en nota, no como lectura principal.'
  spanish_quality_summary: El español es claro y legible, pero la ubicación de la nota [a] es incorrecta y puede confundir al lector. También mejora la fidelidad y la naturalidad usar una opción principal más amplia como «afligidos» para ἐνοχλούμενοι, dejando «atormentados» como variante posible. El resto del verso suena natural y digno en español eclesial general.
  glossary_alignment: «Espíritus inmundos» se alinea bien con la decisión teológica documentada para πνεύματα ἀκάθαρτα. «Sanados» es adecuado para ἰαθῆναι/ἐθεραπεύοντο. No hay conflicto con la terminología base del proyecto. La corrección necesaria es de matiz léxico y de anclaje de nota, no de glosario principal.
  issues:
