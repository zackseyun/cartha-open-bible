revisions:
- from: Ahora bien, sucedió en un sábado que él iba pasando[a] por los sembrados, y sus discípulos iban arrancando y comiendo las espigas[b], restregándolas con las manos.
  to: Ahora bien, sucedió en un día de sábado que él iba pasando[a] por los sembrados, y sus discípulos iban arrancando y comiendo las espigas[b], frotándolas con las manos.
  rationale: La revisión corrige una expresión poco idiomática («en un sábado»), mejora la naturalidad del verbo de acción manual («frotándolas»), alinea mejor la nota [a] con el verbo griego, y recupera la nota cultural presente en el English POB sobre cómo preparaban el grano para comerlo. El sentido fuente y las decisiones léxicas principales se conservan.
