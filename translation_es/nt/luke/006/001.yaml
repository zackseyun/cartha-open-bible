translation:
  language: es
  text: Ahora bien, sucedió en un día de sábado que él iba pasando[a] por los sembrados, y sus discípulos iban arrancando y comiendo las espigas[b], frotándolas con las manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atravesando». El verbo griego indica desplazamiento a través de un lugar.
    reason: lexical_alternative
  - marker: b
    text: Es decir, las frotaban en las manos para separar el grano comestible. El griego στάχυας se refiere a las espigas o cabezas de cereal.
    reason: cultural_note
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now it happened
  chosen_spanish: Ahora bien, sucedió
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  - Ahora sucedió
  lexicon: BDAG
  rationale: La fórmula introduce un nuevo episodio narrativo en Lucas. «Sucedió» comunica el arranque eventivo sin sonar arcaico; «ahora bien» refleja la transición narrativa de δέ sin cargarlo de sentido adversativo fuerte.
- source_word: ἐν σαββάτῳ
  english_pob_choice: on a Sabbath
  chosen_spanish: en un sábado
  alternatives_spanish:
  - en el sábado
  - en día de sábado
  lexicon: BDAG
  rationale: 'El dativo anartro permite un sentido indefinido: una ocasión sabática. «En un sábado» conserva esa apertura mejor que una forma más identificada o litúrgica.'
- source_word: διαπορεύεσθαι αὐτὸν
  english_pob_choice: that he was passing through
  chosen_spanish: que él iba pasando
  alternatives_spanish:
  - que él pasaba
  - que él estaba atravesando
  - que él iba transitando
  lexicon: BDAG
  rationale: El infinitivo con ἐγένετο se vierte naturalmente con una cláusula finita en español. «Iba pasando» mantiene el valor progresivo e imperfectivo del original.
- source_word: διὰ σπορίμων
  english_pob_choice: through grainfields
  chosen_spanish: por los sembrados
  alternatives_spanish:
  - por los campos de grano
  - por los trigales
  - por los campos sembrados
  lexicon: BDAG
  rationale: σπόριμος alude a campos sembrados o de cultivo de grano. «Sembrados» es natural en español y suficientemente amplio; evita forzar un cultivo específico cuando el griego es general.
- source_word: ἔτιλλον
  english_pob_choice: were plucking
  chosen_spanish: iban arrancando
  alternatives_spanish:
  - estaban arrancando
  - arrancaban
  - iban espigando
  lexicon: BDAG
  rationale: El imperfecto describe acción en curso. «Iban arrancando» conserva continuidad y la fuerza concreta del verbo sin introducir una tecnicidad innecesaria.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: Es la correspondencia natural y clara del posesivo griego.
- source_word: καὶ ἤσθιον
  english_pob_choice: and eating
  chosen_spanish: y comiendo
  alternatives_spanish:
  - y estaban comiendo
  - y comían
  lexicon: BDAG
  rationale: Junto con el imperfecto anterior, el participio y el verbo coordinado presentan acciones simultáneas. «Y comiendo» permite que el español mantenga esa coordinación progresiva.
- source_word: τοὺς στάχυας
  english_pob_choice: the heads of grain
  chosen_spanish: las espigas
  alternatives_spanish:
  - las cabezas de grano
  - las espigas de grano
  lexicon: BDAG
  rationale: στάχυς designa la espiga o la cabeza/espiga del cereal. En español, «espigas» es la opción más natural y exacta; en esta frase no era necesario explicitar «de grano» porque el contexto ya lo hace claro.
- source_word: ψώχοντες ταῖς χερσίν
  english_pob_choice: rubbing them in their hands
  chosen_spanish: restregándolas con las manos
  alternatives_spanish:
  - frotándolas con las manos
  - desgranándolas con las manos
  - restregándolas en las manos
  lexicon: BDAG
  rationale: El participio explica el modo en que preparaban el grano para comerlo. «Restregándolas con las manos» expresa la acción concreta y su función de desprender el grano, sin añadir más de lo que el griego dice.
theological_decisions:
- issue: Tratamiento del sábado como día sagrado en el relato
  english_pob_reading: on a Sabbath
  chosen_spanish_reading: en un sábado
  alternative_spanish_readings:
  - en el sábado
  - en día de sábado
  rationale: No se añade una glosa interpretativa sobre ley o controversia en este versículo; el texto simplemente sitúa la acción en una ocasión sabática. La redacción mantiene esa neutralidad narrativa.
  doctrine_reference: Sabbath observance / relato narrativo (sin desarrollo doctrinal explícito en el versículo)
- issue: Relación entre las acciones de los discípulos y la preparación del alimento
  english_pob_reading: plucking and eating the heads of grain, rubbing them in their hands
  chosen_spanish_reading: iban arrancando y comiendo las espigas, restregándolas con las manos
  alternative_spanish_readings:
  - arrancaban y comían las espigas, frotándolas con las manos
  - iban arrancando y comiendo las espigas de grano, desgranándolas con las manos
  rationale: Se conserva la secuencia concreta del gesto agrícola y alimentario sin moralizar ni anticipar la controversia que vendrá en el contexto inmediato. La versión española mantiene la imagen física del original.
  doctrine_reference: Contexto narrativo previo a la controversia sobre el sábado (cf. Lucas 6:2 en adelante)
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura aprobada del inglés POB y su auditoría: conserva el valor progresivo de los imperfectos, mantiene la referencia general a campos sembrados para διὰ σπορίμων, y traslada στάχυας con una palabra española natural sin perder la alternativa lexical documentada. No se aplicaron revisiones posteriores que alteren la base del versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se mantiene «sábado» como traducción de σάββατον, en estilo bíblico natural y no litúrgico.
  - Se preserva la progresividad verbal con «iba pasando» e «iban arrancando», coherente con el imperfecto griego.
  - «Espigas» es aquí preferible a un calco más técnico porque es idiomático y sigue siendo fiel al campo semántico de στάχυς.
