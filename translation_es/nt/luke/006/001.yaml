review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: transición narrativa, ocasión sabática indefinida, paso por campos sembrados, acción continua de los discípulos al arrancar y comer, y el detalle de frotar con las manos. Sin embargo, hay dos desajustes menores: «en un sábado» suena poco natural en español bíblico actual frente a «en un día de sábado», y la nota [a] introduce una matización sobre «área cultivada» que pertenece más a σπορίμων que a διαπορεύεσθαι.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para mayor naturalidad y precisión. «Ahora bien, sucedió» funciona; «iba pasando por los sembrados» también. No obstante, «en un sábado» es torpe en español, y «restregándolas» puede sonar algo áspero; «frotándolas» es más natural y suficientemente concreto. Además, conviene conservar la nota cultural del inglés sobre separar el grano comestible, no solo una alternativa léxica.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías, Espíritu, etc. Las decisiones léxicas principales son compatibles con la línea POB. «Espigas» para στάχυας es adecuado en español. «Sembrados» es aceptable para σπορίμων, aunque «campos de grano» también sería posible. La revisión propuesta mantiene la terminología fiel y mejora legibilidad.
  issues:
  - severity: medium
    issue: «en un sábado» es poco idiomático en español
    rationale: Aunque busca preservar el valor indefinido de ἐν σαββάτῳ, en español suena forzado. «En un día de sábado» mantiene la indefinición y resulta más natural y legible.
  - severity: low
    issue: La nota [a] comenta el área cultivada en lugar del verbo
    rationale: La alternativa «atravesando» sí corresponde al verbo διαπορεύεσθαι, pero la explicación «a través de un área cultivada» mezcla el sentido del verbo con διὰ σπορίμων.
  - severity: medium
    issue: Falta la nota cultural equivalente a la del English POB sobre ψώχοντες ταῖς χερσίν
    rationale: El inglés preserva explícitamente que frotaban el grano en las manos para separar la parte comestible. Esa aclaración ayuda al lector en español y está bien sustentada por el participio.
  - severity: low
    issue: «restregándolas» es menos natural que «frotándolas»
    rationale: Ambas son posibles, pero «frotándolas con las manos» suena más neutro y ampliamente comprensible en español general.
  revised_spanish_text: Ahora bien, sucedió en un día de sábado que él iba pasando[a] por los sembrados, y sus discípulos iban arrancando y comiendo las espigas[b], frotándolas con las manos.
