translation:
  language: es
  text: Bienaventurados ustedes que tienen hambre ahora[a], porque serán saciados. Bienaventurados ustedes que lloran ahora[b], porque reirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Bienaventurados los hambrientos ahora ... Bienaventurados los que tienen hambre ahora ...». El griego usa participios con artículo, pero el contexto inmediato favorece el tratamiento como dirección directa.'
    reason: alternative_reading
  - marker: b
    text: 'O: «serán satisfechos». El verbo puede significar ser llenados con comida y, por extensión, quedar plenamente satisfechos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: BDAG
  rationale: «Bienaventurados» preserva mejor el tono de bienaventuranza y el peso teológico de μακάριος en dichos de Jesús. «Felices» puede sonar meramente emotivo; «dichosos» es posible, pero en español bíblico actual suele sentirse menos natural y algo más ambiguo.
- source_word: οἱ πεινῶντες
  english_pob_choice: you who are hungry
  chosen_spanish: ustedes que tienen hambre
  alternatives_spanish:
  - los hambrientos
  - los que tienen hambre
  lexicon: BDAG
  rationale: Sigo la decisión auditada de reflejar el discurso directo implícito por el contexto inmediato y el verbo futuro en segunda persona plural. «Ustedes que tienen hambre» conserva esa dirección sin perder el valor del participio articular.
- source_word: πεινῶντες
  english_pob_choice: are hungry
  chosen_spanish: tienen hambre
  alternatives_spanish:
  - están hambrientos
  - tienen hambre ahora
  lexicon: BDAG
  rationale: El participio presente expresa un estado continuo. En español, «tienen hambre» es natural y claro; evita intensificar indebidamente con «hambrientos» o «hambrando». La inclusión de «ahora» en el verso sostiene la contraposición temporal.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - actualmente
  lexicon: BDAG
  rationale: «Ahora» es el marcador temporal más directo y natural para contrastar la carencia presente con la futura reversión prometida.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la razón o base de la bienaventuranza. «Porque» comunica con claridad esa relación causal en español moderno.
- source_word: χορτασθήσεσθε
  english_pob_choice: you will be filled
  chosen_spanish: serán saciados
  alternatives_spanish:
  - serán llenados
  - quedarán satisfechos
  - serán alimentados
  lexicon: BDAG
  rationale: «Saciados» mantiene la imagen concreta de ser llenados hasta la plenitud, especialmente en contexto de hambre, y también deja abierta la extensión escatológica del verbo sin resolverla. «Serán llenados» suena más literal, pero menos idiomático; «serán alimentados» estrecha demasiado el sentido.
- source_word: οἱ κλαίοντες
  english_pob_choice: you who weep
  chosen_spanish: ustedes que lloran
  alternatives_spanish:
  - los que lloran
  - los que están llorando
  lexicon: BDAG
  rationale: Como con la primera mitad del versículo, conservo el matiz de segunda persona plural por el contexto de Jesús dirigiéndose a sus discípulos. «Lloran» es un equivalente natural de κλαίω y no restringe el llanto a duelo funerario.
- source_word: κλαίοντες
  english_pob_choice: weep
  chosen_spanish: lloran
  alternatives_spanish:
  - están llorando
  - se lamentan
  lexicon: BDAG
  rationale: «Lloran» corresponde bien a κλαίω y mantiene la fuerza sencilla y digna del verbo. «Se lamentan» desplaza el sentido hacia duelo o queja, lo cual sería más interpretativo.
- source_word: γελάσετε
  english_pob_choice: you will laugh
  chosen_spanish: reirán
  alternatives_spanish:
  - se reirán
  - volverán a reír
  lexicon: BDAG
  rationale: «Reirán» reproduce de forma directa el futuro de γελάω y conserva la reversión vívida del dicho. «Se reirán» introduce una matización reflexiva no requerida por el griego.
theological_decisions:
- issue: 'Dirección del discurso: segunda persona implícita vs. participio en tercera persona'
  english_pob_reading: Render the subjects as 'you who are hungry/weep' rather than 'the hungry/those who weep.'
  chosen_spanish_reading: ustedes que tienen hambre / ustedes que lloran
  alternative_spanish_readings:
  - los hambrientos
  - los que lloran
  rationale: La forma griega usa participios con artículo, pero el contexto inmediato en Lucas 6 está en discurso directo hacia los oyentes, y los verbos futuros son de segunda persona plural. La traducción española mantiene esa dirección discursiva sin añadir información ajena al texto.
  doctrine_reference: Philosophy §1, §6
- issue: Naturaleza de la promesa futura
  english_pob_reading: Keep the promises concrete ('filled,' 'laugh') without specifying whether the fulfillment is temporal, spiritual, or eschatological.
  chosen_spanish_reading: serán saciados / reirán
  alternative_spanish_readings:
  - serán satisfechos
  - se alegrarán
  rationale: La promesa se expresa con imágenes concretas, pero el texto no determina aquí si su cumplimiento es temporal, espiritual o escatológico. «Saciados» y «reirán» conservan esa tensión sin resolverla prematuramente.
  doctrine_reference: Philosophy §3
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del audit trail en inglés: mantiene el valor de bienaventuranza, la dirección directa implícita en el contexto, y las promesas concretas sin especificar indebidamente su modo o momento. No se aplicaron revisiones adicionales en la última pasada.'
  spanish_consistency_notes:
  - Se usa «ustedes» para sostener la segunda persona plural en todo el versículo.
  - Se mantiene la distinción hambre/llanto con verbos simples y actuales («tienen hambre», «lloran»).
  - «Saciados» conserva la imagen concreta del texto fuente sin convertirla en mera abstracción.
  - La puntuación separa las dos bienaventuranzas con la misma cadencia que el original griego.
