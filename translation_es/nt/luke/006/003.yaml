translation:
  language: es
  text: 'Y Jesús les respondió: «¿Ni siquiera han leído esto, lo que hizo David cuando tuvo hambre, él y los que estaban con él?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ ἀποκριθεὶς πρὸς αὐτοὺς εἶπεν ὁ Ἰησοῦς
  english_pob_choice: And Jesus answered them
  chosen_spanish: Y Jesús les respondió
  alternatives_spanish:
  - Y Jesús respondió a ellos
  - Y Jesús, respondiendo, les dijo
  lexicon: BDAG
  rationale: La secuencia participio + verbo se expresa de manera natural en español con un solo verbo principal, 'respondió', sin perder el valor de respuesta dirigida a ellos. 'Les' preserva πρὸς αὐτούς de forma idiomática.
- source_word: Οὐδὲ τοῦτο
  english_pob_choice: Have you not even read this
  chosen_spanish: ¿Ni siquiera han leído esto
  alternatives_spanish:
  - ¿No han leído ni esto?
  - ¿Acaso no han leído esto ni siquiera?
  lexicon: BDAG
  rationale: '''Οὐδὲ'' aporta énfasis de ''ni siquiera''. En español, ''ni siquiera'' comunica mejor esa fuerza que una negación simple. Se mantiene el reto retórico en segunda persona plural.'
- source_word: ἀνέγνωτε
  english_pob_choice: Have you ... read
  chosen_spanish: han leído
  alternatives_spanish:
  - leyeron
  - han estado leyendo
  lexicon: BDAG
  rationale: El perfecto compuesto es el más natural en español para la pregunta retórica de conocimiento bíblico. 'Han leído' conserva la apelación a la familiaridad con la Escritura.
- source_word: ὃ ἐποίησεν Δαυὶδ
  english_pob_choice: what David did
  chosen_spanish: lo que hizo David
  alternatives_spanish:
  - lo que David hizo
  - aquello que hizo David
  lexicon: BDAG
  rationale: La relativa neutra se vierte con 'lo que' para una construcción clara y fiel. 'Hizo' mantiene el sentido de acción concreta sin añadir matices interpretativos.
- source_word: ὁπότε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - en el momento en que
  - al tiempo que
  lexicon: BDAG
  rationale: '''Cuando'' expresa adecuadamente la relación temporal simple del texto griego sin sobrecargar la frase.'
- source_word: ἐπείνασεν
  english_pob_choice: was hungry
  chosen_spanish: tuvo hambre
  alternatives_spanish:
  - estaba hambriento
  - se sintió hambriento
  lexicon: BDAG
  rationale: Aunque el inglés usa 'was hungry', en español 'tuvo hambre' resulta más natural y conserva el valor de experimentar hambre. Evita un calco menos idiomático.
- source_word: αὐτὸς καὶ οἱ μετ’ αὐτοῦ ὄντες
  english_pob_choice: he and those who were with him
  chosen_spanish: él y los que estaban con él
  alternatives_spanish:
  - él y sus acompañantes
  - él y quienes estaban con él
  lexicon: BDAG
  rationale: Se preserva el pronombre explícito y la frase participial con una construcción española directa. 'Los que estaban con él' refleja mejor la relación del participio que un sustantivo más interpretativo como 'acompañantes'.
theological_decisions:
- issue: Modo de nombrar la referencia divina en esta unidad
  english_pob_reading: No explicit divine-name issue in the verse; Jesus is the subject
  chosen_spanish_reading: No se introduce ninguna glosa teológica adicional
  alternative_spanish_readings:
  - usar alguna aclaración sobre citas escriturarias
  rationale: El verso no contiene un término que exija decisión sobre Yahvé, Cristo o Espíritu. Se evita añadir material explicativo no sustentado por el texto.
  doctrine_reference: Principio de no adición; fidelidad al alcance del versículo
translation_notes:
  revision_awareness: 'La redacción inglesa revisada solo ajustó la puntuación (coma en lugar de raya) sin cambios léxicos. La versión española sigue esa estructura formal con pausa interna equivalente: «esto: lo que hizo David...».'
  spanish_consistency_notes:
  - Se mantiene 'Jesús' como nombre propio estándar.
  - Se usa 'les respondió' para reflejar el destinatario plural del discurso.
  - Se prefiere 'han leído' por naturalidad retórica en español.
  - Se conserva la frase relativa 'los que estaban con él' en vez de una paráfrasis más interpretativa.
