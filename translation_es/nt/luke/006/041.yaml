translation:
  language: es
  text: ¿Pero por qué ves la mota[a] en el ojo de tu hermano[b], y no notas la viga[c] que está en tu propio ojo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «astilla» o «paja» para «mota»; el griego κάρφος designa una partícula muy pequeña, en contraste con la mucho mayor «viga».
    reason: lexical_alternative
  - marker: b
    text: «Hermano» traduce el término griego masculino singular; la enseñanza se aplica con más amplitud que a un hermano varón solamente.
    reason: cultural_note
  - marker: c
    text: O «tronco» o «madero» para «viga»; el griego δοκός es una pieza grande de madera.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - qué
  lexicon: BDAG
  rationale: En esta pregunta retórica, τί con βλέπεις expresa reproche o desafío causal; «por qué» transmite mejor ese forcejeo retórico que un simple «qué».
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce una leve oposición respecto del contexto previo; «Pero» conserva ese giro adversativo de forma natural en español.
- source_word: βλέπεις
  english_pob_choice: do you see
  chosen_spanish: ves
  alternatives_spanish:
  - miras
  - observas
  - te fijas
  lexicon: BDAG
  rationale: El verbo básico βλέπω mantiene la imagen visual concreta; en español, «ves» suena directo y preserva la metáfora de la vista.
- source_word: κάρφος
  english_pob_choice: speck
  chosen_spanish: mota
  alternatives_spanish:
  - astilla
  - paja
  - brizna
  lexicon: BDAG
  rationale: κάρφος denota una partícula diminuta, como un fragmento seco o una pajita; «mota» funciona bien en español para un elemento muy pequeño y contrasta con naturalidad con la «viga».
- source_word: ὀφθαλμῷ
  english_pob_choice: eye
  chosen_spanish: ojo
  lexicon: BDAG
  rationale: ὀφθαλμός se traduce normalmente por «ojo»; se conserva el singular del griego.
- source_word: ἀδελφοῦ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano o hermana
  - prójimo
  lexicon: BDAG
  rationale: El griego usa un sustantivo masculino singular, y la traducción conserva esa forma como imagen representativa, sin neutralizarla en el texto principal.
- source_word: δοκὸν
  english_pob_choice: beam
  chosen_spanish: viga
  alternatives_spanish:
  - tronco
  - tabla
  - madero
  lexicon: BDAG
  rationale: δοκός es una gran pieza de madera; «viga» expresa con claridad la desproporción hiperbólica frente a la «mota».
- source_word: ἰδίῳ
  english_pob_choice: your own
  chosen_spanish: propio
  alternatives_spanish:
  - tu propio
  - el tuyo
  lexicon: BDAG
  rationale: ἴδιος intensifica la posesión; «propio» mantiene ese énfasis en español sin repetir innecesariamente el posesivo.
- source_word: κατανοεῖς
  english_pob_choice: do not notice
  chosen_spanish: no notas
  alternatives_spanish:
  - no percibes
  - no consideras
  - no observas
  lexicon: BDAG
  rationale: κατανοέω puede significar notar atentamente, percibir o considerar; aquí el contraste con βλέπεις favorece «no notas» como opción natural y clara.
theological_decisions:
- issue: Término relacional masculino ἀδελφοῦ
  english_pob_reading: brother
  chosen_spanish_reading: hermano
  alternative_spanish_readings:
  - hermano o hermana
  - prójimo
  rationale: Se mantiene el singular masculino del original como recurso retórico representativo. La aplicabilidad más amplia se deja implícita por el contexto, sin borrar la forma gramatical del griego.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el estado de concordancia es alto; se mantiene la solución del audit trail inglés con ajuste idiomático natural al español.
  spanish_consistency_notes:
  - Se conserva el contraste retórico entre una partícula diminuta y una pieza grande de madera.
  - Se mantiene el singular masculino «hermano» por fidelidad formal al griego, con nota de alcance más amplio.
  - Se usa español moderno y digno, evitando calcos innecesarios pero sin diluir la imagen de Jesús.
