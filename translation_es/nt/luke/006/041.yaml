  text: τί δὲ βλέπεις τὸ κάρφος τὸ ἐν τῷ ὀφθαλμῷ τοῦ ἀδελφοῦ σου, τὴν δὲ δοκὸν τὴν ἐν τῷ ἰδίῳ ὀφθαλμῷ οὐ κατανοεῖς;
base_translation:
  language: en
  yaml_path: translation/nt/luke/006/041.yaml
  text: But why do you see the speck in your brother’s eye[c][b][a], yet do not notice the beam in your own eye?
  footnotes:
  - marker: a
    text: Or 'splinter' or 'straw' for 'speck' (Greek κάρφος), a tiny particle contrasted with the much larger 'beam.'
    reason: lexical_alternative
  - marker: b
    text: '''Brother'' translates the masculine singular Greek term; the teaching applies more broadly than to a male sibling alone.'
    reason: cultural_note
  - marker: c
    text: Or 'log' or 'plank' for 'beam' (Greek δοκός), a large piece of timber.
    reason: lexical_alternative
