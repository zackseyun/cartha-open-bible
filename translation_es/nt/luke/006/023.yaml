translation:
  language: es
  text: Alégrense en aquel día y salten de gozo[a], porque su recompensa es grande en el cielo[b]; pues de la misma manera sus padres trataban a los profetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Alégrense en aquel día y salten».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «porque, según las mismas cosas, sus padres estaban haciendo a los profetas»; el sentido es que sus antepasados trataban a los profetas de la misma manera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρητε
  english_pob_choice: Rejoice
  chosen_spanish: Alégrense
  alternatives_spanish:
  - Regocíjense
  - Alegraos
  - Estén alegres
  lexicon: BDAG
  rationale: El aoristo imperativo plural pide una exhortación directa a la alegría. En español, "alégrense" comunica bien el mandato y mantiene un registro digno y natural; "regocíjense" sería más elevado, pero menos corriente.
- source_word: σκιρτήσατε
  english_pob_choice: leap for joy
  chosen_spanish: salten de gozo
  alternatives_spanish:
  - brinquen de gozo
  - salten de alegría
  - den brincos de gozo
  lexicon: BDAG
  rationale: El verbo expresa una manifestación corporal exuberante. "Salten de gozo" conserva tanto el movimiento físico como el matiz de júbilo, sin sonar forzado en español.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - he aquí
  - vean
  lexicon: BDAG
  rationale: La partícula introduce la razón que sigue y llama la atención. "Miren" mantiene esa función discursiva en un español bíblico claro; "he aquí" sería más tradicional, pero menos natural para este registro.
- source_word: μισθὸς
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - pago
  - galardón
  - retribución
  lexicon: BDAG
  rationale: Aquí se trata de una retribución positiva de parte de Dios, no de salarios en sentido estricto. "Recompensa" expresa bien el valor recibido sin cargar el término con connotaciones meramente económicas.
- source_word: πολὺς
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - abundante
  - mucha
  - enorme
  lexicon: BDAG
  rationale: Como adjetivo predicativo de "recompensa", "grande" es la opción más natural en español y conserva el énfasis del griego sin sobreinterpretarlo.
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo de Dios
  - en los cielos
  lexicon: BDAG
  rationale: El singular οὐρανός aquí designa la esfera celestial. "En el cielo" es una forma natural y fiel para el lector español; conserva la ubicación/sfera sin ampliar el sentido a una paráfrasis teológica.
- source_word: κατὰ τὰ αὐτά
  english_pob_choice: in the same way
  chosen_spanish: de la misma manera
  alternatives_spanish:
  - igualmente
  - del mismo modo
  - según esas mismas cosas
  lexicon: BDAG
  rationale: Es un modismo de manera. "De la misma manera" reproduce bien la relación adverbial y evita la literalidad opaca de "según las mismas cosas".
- source_word: ἐποίουν
  english_pob_choice: used to treat
  chosen_spanish: hacían
  alternatives_spanish:
  - trataban
  - solían hacer
  - hacían con ellos
  lexicon: BDAG
  rationale: El imperfecto indica acción habitual o reiterada. "Hacían" preserva esa imperfectividad y, con el complemento siguiente, permite entender el trato a los profetas sin añadir una explicación excesiva.
- source_word: τοῖς προφήταις
  english_pob_choice: to the prophets
  chosen_spanish: con los profetas
  alternatives_spanish:
  - a los profetas
  - contra los profetas
  lexicon: BDAG
  rationale: El griego es compacto; en español, con ἐποίουν resulta más natural decir "hacían con los profetas" o "con los profetas" que forzar una estructura calcada. "Con" deja implícito el trato ejercido sobre ellos, como en el contexto de persecución.
- source_word: οἱ πατέρες αὐτῶν
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus padres de ellos
  lexicon: BDAG
  rationale: πατέρες apunta literalmente a "padres" y por extensión a antepasados. "Sus padres" conserva la forma más cercana al texto y mantiene la acusación intergeneracional sin suavizarla.
theological_decisions:
- issue: La ubicación de la recompensa prometida
  english_pob_reading: your reward is great in heaven
  chosen_spanish_reading: su recompensa es grande en el cielo
  alternative_spanish_readings:
  - su recompensa es grande con Dios en el cielo
  - su gran recompensa está en el cielo
  rationale: El texto sitúa la recompensa en la esfera celestial sin explicitar más. Se conserva esa tensión escatológica con "en el cielo", evitando expandir el sentido hacia una formulación interpretativa más amplia.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Referencia de 'sus padres'
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  - sus mayores
  rationale: La expresión apunta a los antepasados de quienes rechazan a los profetas. Se mantiene el término familiar literal para conservar el peso profético del reproche y la continuidad histórica del rechazo.
  doctrine_reference: Translation philosophy items 1 and 5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y refleja el ajuste observado en el tramo inglés: la segunda cláusula se entiende como trato habitual hacia los profetas, no solo como un hacer vago. Se optó por un español natural que conserve la imperfectividad de ἐποίουν y el ímpetu exhortativo de χάρητε / σκιρτήσατε.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma predeterminada cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se emplea 'cielo' para οὐρανός según el contexto escatológico de recompensa, coherente con el español bíblico contemporáneo.
  - Se evitó 'galardón' por ser más tradicional, aunque posible; 'recompensa' resulta más transparente para este pasaje.
  - La nota b preserva la tensión literal del griego sin convertirla en paráfrasis doctrinal.
