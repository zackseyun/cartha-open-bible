    text: Or 'Be glad in that day and leap.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'for according to the same things their fathers were doing to the prophets'; the sense is that their forefathers treated the prophets in the same way.
    reason: lexical_alternative
