review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: mandato de gozo, motivo de la recompensa celestial y comparación con el trato dado a los profetas. Sin embargo, ''porque, miren'' suena menos integrado que una opción más bíblica y natural, y sobre todo ''hacían sus padres con los profetas'' no preserva bien el sentido idiomático de κατὰ τὰ αὐτὰ ... ἐποίουν τοῖς προφήταις; en español resulta torpe y ambiguo. El sentido habitual del imperfecto y el valor de trato hostil implícito deben expresarse mejor.'
  spanish_quality_summary: La mayor parte del verso es clara y legible. 'Alégrense en aquel día y salten de gozo' funciona bien. Pero 'porque, miren' introduce una puntuación poco natural, y 'hacían sus padres con los profetas' no suena idiomático en español general eclesial. 'Trataban a los profetas' o 'solían tratar a los profetas' es mucho más natural y fiel al sentido. Además, la nota b debe ajustarse para corresponder exactamente al texto revisado y evitar comillas/puntuación innecesariamente pesadas.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Recompensa', 'cielo' y 'profetas' son adecuados. La decisión clave es preferir un verbo natural para ἐποίουν en este contexto; 'trataban' concuerda mejor con la revisión inglesa auditada y con la inteligibilidad en español.
  issues:
  - severity: medium
    issue: '''hacían sus padres con los profetas'' es poco natural y semánticamente débil'
    rationale: Aunque intenta conservar la compresión del griego, en español esta construcción suena incorrecta o incompleta. El contexto exige 'trataban a los profetas' o equivalente para comunicar el sentido hostil implícito.
  - severity: low
    issue: '''porque, miren,'' tiene puntuación y registro algo forzados'
    rationale: 'ἰδού pide un marcador de atención. En español bíblico legible, ''pues su recompensa...'' o ''miren: su recompensa...'' funcionan mejor. ''Porque, miren,'' interrumpe la fluidez.'
  - severity: low
    issue: La nota b necesita armonizarse con la redacción revisada
    rationale: La nota actual explica bien el literal, pero el texto principal revisado debe corresponder con una glosa más limpia y exacta en español.
  revised_spanish_text: Alégrense en aquel día y salten de gozo[a], porque su recompensa es grande en el cielo[b]; pues de la misma manera sus padres trataban a los profetas.
  revised_footnotes:
  - marker: a
    text: 'O: «Alégrense en aquel día y salten».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «porque, según las mismas cosas, sus padres estaban haciendo a los profetas»; el sentido es que sus antepasados trataban a los profetas de la misma manera.'
    reason: lexical_alternative
  revision_rationale: Se reemplazó la construcción poco idiomática 'hacían ... con los profetas' por 'trataban a los profetas', en línea con el sentido contextual y la auditoría inglesa. También se suavizó 'porque, miren,' a una conexión más natural en español bíblico. Se mantuvieron las alternativas léxicas relevantes en notas.
