revisions:
- from: Y los escribas y los fariseos lo estaban vigilando atentamente[a], para ver si sanaba en sábado, a fin de hallar[b] motivo para acusarlo.
  to: Y los escribas y los fariseos lo estaban vigilando atentamente[a], para ver si sanaría en sábado, a fin de hallar[b] motivo para acusarlo.
  rationale: Se conserva la estructura y las decisiones léxicas principales del borrador, pero se corrige «sanaba» a «sanaría» para expresar mejor en español la expectativa observada por los opositores. También se corrige la nota b para eliminar el calco impropio «carga» y usar el lenguaje judicial natural «acusación».
