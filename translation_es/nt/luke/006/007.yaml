translation:
  language: es
  text: Y los escribas y los fariseos lo estaban vigilando atentamente[a], para ver si sanaría en sábado, a fin de hallar[b] motivo para acusarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo observaban cuidadosamente». El verbo griego puede implicar una vigilancia cercana, incluso hostil.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hallar una acusación contra él» o simplemente «acusarlo». La expresión griega sugiere buscar una base para presentar una acusación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρετηροῦντο
  english_pob_choice: were watching him closely
  chosen_spanish: lo estaban vigilando atentamente
  alternatives_spanish:
  - lo observaban cuidadosamente
  - lo estaban observando de cerca
  - lo vigilaban
  lexicon: BDAG
  rationale: El imperfecto medio indica vigilancia continua; en este contexto la carga es sospechosa u hostil. «Vigilar atentamente» conserva la intensidad de la observación y sugiere la intención adversa sin añadir más de lo que el griego permite. El objeto («lo») se entiende de Jesús, como en el inglés auditado.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - expertos de la ley
  - maestros de la ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente más directo y reconocido en el relato evangélico. Las alternativas explicitan su función, pero se alejan más del término fuente.
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Nombre propio del grupo; se translitera de forma estable al español como «fariseos».
- source_word: εἰ
  english_pob_choice: to see whether
  chosen_spanish: para ver si
  alternatives_spanish:
  - para ver si acaso
  - a ver si
  lexicon: BDAG
  rationale: Tras un verbo de vigilancia, la idea es de verificación de lo que ocurriría. «Para ver si» es la forma natural en español y mantiene el valor de indagación sin sobretraducir.
- source_word: ἐν τῷ σαββάτῳ
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - durante el sábado
  - en el sábado
  lexicon: BDAG
  rationale: El griego usa literalmente «en el sábado», pero en español bíblico contemporáneo «en sábado» es idiomático y conserva la referencia al día sagrado sin cambiar el sentido.
- source_word: θεραπεύει
  english_pob_choice: he would heal
  chosen_spanish: sanaba
  alternatives_spanish:
  - sanara
  - iba a sanar
  - curaba
  lexicon: BDAG
  rationale: En la pregunta indirecta de finalidad, el presente griego puede verterse en español de modo natural como acción esperada o en desarrollo. «Sanaba» mantiene la referencia a la acción de sanar sin forzar un futuro perifrástico menos ajustado al contexto narrativo.
- source_word: ἵνα εὕρωσιν
  english_pob_choice: so that they might find
  chosen_spanish: a fin de hallar
  alternatives_spanish:
  - para hallar
  - a fin de encontrar
  - para que hallaran
  lexicon: BDAG
  rationale: La cláusula expresa propósito. «A fin de hallar» preserva la finalidad con un registro sobrio y cercano al texto.
- source_word: κατηγορεῖν αὐτοῦ
  english_pob_choice: grounds to accuse him
  chosen_spanish: motivo para acusarlo
  alternatives_spanish:
  - base para acusarlo
  - acusación contra él
  - motivos para acusarlo
  lexicon: BDAG
  rationale: El griego implica buscar un fundamento para la acusación, no solo acusar de manera genérica. «Motivo para acusarlo» comunica bien esa base o pretexto en español sin debilitar la intención hostil.
theological_decisions:
- issue: Intención hostil de los opositores
  english_pob_reading: The verse is rendered to show deliberate hostile scrutiny without overstating beyond the text.
  chosen_spanish_reading: La frase deja ver una vigilancia intencional y hostil, orientada a buscar motivo de acusación, sin convertirlos en algo más de lo que el texto dice.
  alternative_spanish_readings:
  - Una lectura más neutra podría decir simplemente que observaban si sanaba.
  - También podría suavizarse a «para ver si lo sanaba en sábado» sin explicitar la hostilidad.
  rationale: La combinación del verbo de vigilancia continua y el propósito de hallar acusación exige conservar la tensión entre observación y hostilidad. La traducción mantiene esa carga sin ampliar la condena más allá del pasaje.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se siguió el consenso del control cruzado, sin cambios pendientes en la revisión más reciente; la redacción española adapta el valor aspectual y la finalidad de los verbos griegos de forma idiomática pero auditables.
  spanish_consistency_notes:
  - Se mantiene «escribas» y «fariseos» como términos convencionales transparentes.
  - Se usa «sábado» sin mayúscula para el día, conforme al uso español general; el referente bíblico queda claro por el contexto.
  - Se conserva la relación de acusación hostil sin suavizarla a una mera observación neutral.
  - Las notas alternativas se limitan a las ambigüedades léxicas preservadas por el audit trail inglés.
