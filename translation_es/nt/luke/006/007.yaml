    reason: lexical_alternative
  - marker: b
    text: 'O: «hallar una acusación contra él» o simplemente «acusarlo». La expresión griega sugiere buscar una base para presentar una acusación.'
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y las decisiones léxicas principales del borrador, pero se corrige «sanaba» a «sanaría» para expresar mejor en español la expectativa observada por los opositores. También se corrige la nota b para eliminar el calco impropio «carga» y usar el lenguaje judicial natural «acusación».
