review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y del POB inglés: vigilancia hostil de los escribas y fariseos, observación para ver si Jesús sanaría en sábado, y propósito de hallar base para acusarlo. Sin embargo, hay un ajuste importante de naturalidad y de fuerza aspectual/modo en «si sanaba», que en español suena menos preciso que una forma prospectiva/subjuntiva en esta pregunta indirecta dependiente de «para ver».'
  spanish_quality_summary: 'El texto es claro y legible, con buen registro bíblico moderno. «Lo estaban vigilando atentamente» y «motivo para acusarlo» funcionan bien. La principal debilidad es «si sanaba en sábado», que suena algo áspero e imperfectivo en español donde se espera mejor «si sanaría» o, más naturalmente tras «para ver si», «si sanaba» podría entenderse como habitualidad. También conviene mejorar la nota b: «presentar una carga» es un calco impropio; debe ser «presentar una acusación» o «formular un cargo».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Escribas», «fariseos» y el manejo general del pasaje son adecuados. «En sábado» es aceptable y natural en registro bíblico contemporáneo.
  issues:
  - severity: medium
    issue: «si sanaba en sábado» no refleja con suficiente naturalidad el valor prospectivo de θεραπεύει en esta construcción indirecta.
    rationale: Aunque el griego usa presente indicativo, el POB inglés justificó una lectura de futuro en pasado («would heal»). En español, tras «para ver si», la opción más natural y precisa aquí es «si sanaría en sábado», que evita una lectura de acción habitual o simultánea.
  - severity: low
    issue: La nota b usa «presentar una carga», expresión poco natural en español.
    rationale: El inglés 'charge' en contexto judicial debe verterse como «acusación» o «cargo», no «carga».
  revised_spanish_text: Y los escribas y los fariseos lo estaban vigilando atentamente[a], para ver si sanaría en sábado, a fin de hallar[b] motivo para acusarlo.
