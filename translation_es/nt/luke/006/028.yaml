revisions:
- from: Bendigan a los que los maldicen[a]; oren por los que los maltratan.
  to: Bendigan a los que maldicen a ustedes[a]; oren por los que los maltratan.
  rationale: Se conserva la traducción principal con un ajuste menor para mayor naturalidad y consistencia en español latinoamericano general («maldicen a ustedes»), y se corrige la nota al pie para eliminar la construcción no idiomática «los que los abusan». No hay problema doctrinal ni de alineación de fuente; es una reparación editorial pequeña.
