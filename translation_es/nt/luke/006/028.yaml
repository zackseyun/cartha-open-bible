translation:
  language: es
  text: Bendigan a los que maldicen a ustedes[a]; oren por los que los maltratan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que abusan de ustedes» o «los que los insultan». El verbo griego puede abarcar una gama de trato hostil y abusivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Bendiguan
  - Pronuncien bendición sobre
  lexicon: BDAG
  rationale: El imperativo plural de εὐλογέω pide una orden directa. «Bendigan» conserva el mandato ético y suena natural en español actual, sin diluir la fuerza verbal.
- source_word: τοὺς καταρωμένους ὑμᾶς
  english_pob_choice: those who curse you
  chosen_spanish: los que los maldicen
  alternatives_spanish:
  - los que los están maldiciendo
  - los que invocan maldición sobre ustedes
  lexicon: BDAG
  rationale: 'El participio con artículo funciona sustantivamente: «los que maldicen». En español, «maldicen» reproduce bien el acto hostil de palabra y mantiene la oposición con «bendigan».'
- source_word: προσεύχεσθε
  english_pob_choice: pray
  chosen_spanish: oren
  alternatives_spanish:
  - recen
  - estén orando
  lexicon: BDAG
  rationale: El imperativo plural presente se expresa de forma natural con «oren». Conserva el mandato sin sobrecargar el aspecto verbal en español.
- source_word: περὶ τῶν ἐπηρεαζόντων ὑμᾶς
  english_pob_choice: for those who mistreat you
  chosen_spanish: por los que los maltratan
  alternatives_spanish:
  - por los que los abusan
  - por los que los insultan
  - por los que los agravian
  lexicon: BDAG
  rationale: περί con προσεύχομαι se traduce de manera idiomática como «por». ἐπηρεάζω abarca abuso, insulto y trato hostil; «maltratan» es lo bastante amplio para no estrechar indebidamente el rango semántico.
theological_decisions:
- issue: Alcance de los mandatos de amar al enemigo
  english_pob_reading: Render the commands straightforwardly as ethical imperatives without importing additional doctrinal explanation.
  chosen_spanish_reading: Presentar los dos mandatos como imperativos éticos directos, sin añadir explicación doctrinal que atenúe la tensión del texto.
  alternative_spanish_readings:
  - Introducir una paráfrasis explicativa sobre amor al enemigo
  - Suavizar los imperativos con un tono exhortativo menos directo
  rationale: El versículo formula una respuesta concreta a la hostilidad. La traducción debe preservar esa tensión moral y el carácter inmediato del mandato, en lugar de explicarlo o reinterpretarlo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Coincide con la evaluación de alta concordancia del control cruzado; no se requirieron revisiones posteriores al borrador base en inglés. La formulación española conserva el paralelo imperativo y el rango semántico amplio de ἐπηρεάζω.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera de este versículo, sin incidencia directa aquí.
  - Se usa el plural de trato reverencial «los»/«los que» en correspondencia con el destinatario plural de ὑμᾶς.
  - «Maldicen» y «maltratan» preservan la distinción entre ofensa verbal y hostilidad general, sin colapsarlas en un solo término.
