review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del griego: dos imperativos paralelos, «bendecir» frente a quienes maldicen y «orar por» quienes tratan hostilmente. «Bendigan» para εὐλογεῖτε, «maldicen» para καταρωμένους ὑμᾶς, y «oren por» para προσεύχεσθε περὶ son adecuados y fieles. El principal problema está en la nota léxica: «los que los abusan» no es español natural ni fiel como alternativa para ἐπηρεαζόντων; debe decir «los que abusan de ustedes» o una formulación semejante.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial moderno. «Bendigan a los que los maldicen; oren por los que los maltratan» lee bien. La única deficiencia importante de calidad está en la nota al pie, donde hay una construcción no idiomática («los que los abusan»). Además, para neutralidad latinoamericana más natural, conviene uniformar el tratamiento con «ustedes» en todo el versículo, evitando la secuencia repetida «los».
  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. Las decisiones «bendigan», «maldicen», «oren» y «maltratan» concuerdan con el rastro léxico inglés y con el alcance semántico del griego. La alternativa de nota debe ajustarse a español idiomático sin estrechar indebidamente ἐπηρεάζω.
  issues:
  - severity: medium
    issue: La nota al pie usa «los que los abusan», construcción no idiomática en español.
    rationale: '«Abusar» en este sentido exige normalmente «de»: «los que abusan de ustedes». La forma actual suena gramaticalmente defectuosa y reduce la calidad de la nota.'
  - severity: low
    issue: 'El texto principal mezcla una formulación posible pero menos natural para español latinoamericano general: «los que los maldicen / los que los maltratan».'
    rationale: 'Aunque es comprensible, «ustedes» suena más claro y menos repetitivo en registro neutral latinoamericano: «los que los maldicen» puede mantenerse, pero «a ustedes» / «de ustedes» da mejor fluidez si se revisa en conjunto con la nota.'
  - severity: low
    issue: En decisiones léxicas aparece la alternativa errónea «Bendiguan».
    rationale: Es un error ortográfico en metadatos, no en el texto bíblico principal; no requiere adjudicación compleja, pero conviene corregirlo en revisión editorial.
  revised_spanish_text: Bendigan a los que maldicen a ustedes[a]; oren por los que los maltratan.
  revised_footnotes:
  - marker: a
    text: O «los que abusan de ustedes» o «los que los insultan». El verbo griego puede abarcar una gama de trato hostil y abusivo.
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción principal con un ajuste menor para mayor naturalidad y consistencia en español latinoamericano general («maldicen a ustedes»), y se corrige la nota al pie para eliminar la construcción no idiomática «los que los abusan». No hay problema doctrinal ni de alineación de fuente; es una reparación editorial pequeña.
