translation:
  language: es
  text: Y toda la multitud trataba de tocarlo, porque de él salía[a] poder y sanaba a todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «iba saliendo de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὁ ὄχλος
  english_pob_choice: the whole crowd
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - toda la gente
  - la multitud entera
  lexicon: BDAG
  rationale: ὄχλος es un colectivo; con πᾶς, la idea es que el conjunto completo de la multitud estaba implicado. 'Toda la multitud' conserva ese valor colectivo de manera natural en español.
- source_word: ἐζήτουν
  english_pob_choice: was trying
  chosen_spanish: trataba
  alternatives_spanish:
  - intentaba
  - seguía tratando
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o reiterada. 'Trataba' comunica ese esfuerzo en curso con un español natural y sobrio, sin sobreinterpretar el matiz.
- source_word: ἅπτεσθαι
  english_pob_choice: to touch
  chosen_spanish: tocar
  alternatives_spanish:
  - tomar de él
  - poner la mano sobre él
  lexicon: BDAG
  rationale: En este contexto de sanidad, ἅπτομαι significa contacto físico; 'tocar' es la opción más directa y transparente en español.
- source_word: δύναμις
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - poder sanador
  lexicon: BDAG
  rationale: '''Poder'' reproduce bien la fuerza eficaz que procede de Jesús. Se evita añadir ''sanador'' porque el griego dice simplemente δύναμις y la sanidad se expresa en el verbo siguiente.'
- source_word: παρ’ αὐτοῦ ἐξήρχετο
  english_pob_choice: was coming out from him
  chosen_spanish: de él salía
  alternatives_spanish:
  - salía de él
  - procedía de él
  lexicon: BDAG
  rationale: La construcción expresa emanación continua desde Jesús. 'De él salía' es idiomático en español y preserva la imagen verbal sin forzar una paráfrasis.
- source_word: ἰᾶτο πάντας
  english_pob_choice: healing them all
  chosen_spanish: sanaba a todos
  alternatives_spanish:
  - los sanaba a todos
  - curaba a todos
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continua, y 'sanaba' lo refleja bien. 'A todos' explicita el objeto implícito en español sin añadir contenido ajeno al texto.
theological_decisions:
- issue: La δύναμις que procede de Jesús
  english_pob_reading: power was coming out from him without doctrinal expansion.
  chosen_spanish_reading: de él salía poder
  alternative_spanish_readings:
  - de él salía poder sanador
  - de él salía fuerza milagrosa
  rationale: 'Se conserva la afirmación del texto: Jesús es la fuente de un poder eficaz que sale de él. No se añade explicación doctrinal ni se intensifica con adjetivos no presentes en el griego.'
  doctrine_reference: Affirmations; traducción transparente del texto evangélico
translation_notes:
  revision_awareness: 'El español sigue de cerca la estructura griega y el audit trail inglés: colectivo total + imperfectos continuativos + imagen de emanación + sanidad en curso. No se registran revisiones previas en este versículo.'
  spanish_consistency_notes:
  - Se mantiene 'poder' para δύναμις, coherente con el valor léxico documentado.
  - Se usa 'sanaba' para ἰᾶτο, preservando el imperfecto aspectual.
  - '''Toda la multitud'' evita singularizar indebidamente el sujeto colectivo.'
  - La nota de pie de página se ancla en 'salía' para conservar la alternativa verbal documentada.
