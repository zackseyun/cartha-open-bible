translation:
  language: es
  text: '¿Cómo puedes decirle a tu hermano[c]: «Hermano, déjame sacar la motita[a] que está en tu ojo», mientras tú mismo no ves la viga[b] que está en tu propio ojo? ¡Hipócrita! Saca primero la viga[b] de tu ojo, y entonces verás claramente para sacar la motita[a] que está en el ojo de tu hermano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «astilla»; el griego κάρφος denota un fragmento muy pequeño de material seco.
    reason: lexical_alternative
  - marker: b
    text: O «madero» o «tronco»; el griego δοκός se refiere a una gran pieza de madera.
    reason: lexical_alternative
  - marker: c
    text: «Hermano» traduce el griego ἀδελφός, un término masculino singular de parentesco; la instrucción puede aplicarse más ampliamente, pero el griego usa forma masculina singular.
    reason: cultural_note
lexical_decisions:
- source_word: πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera
  - ¿Cómo es que
  lexicon: BDAG
  rationale: Interrogativo retórico natural en español; conserva la pregunta de posibilidad/procedencia sin añadir explicación.
- source_word: δύνασαι
  english_pob_choice: can
  chosen_spanish: puedes
  alternatives_spanish:
  - eres capaz de
  - tienes autoridad para
  lexicon: BDAG
  rationale: En la pregunta retórica, «puedes» reproduce la capacidad/propriedad implícita de δύναμαι con fluidez idiomática.
- source_word: λέγειν
  english_pob_choice: say
  chosen_spanish: decirle
  alternatives_spanish:
  - hablarle
  - decir
  lexicon: BDAG
  rationale: El verbo de habla directo se conserva; el dativo con complemento de persona se expresa naturalmente como «decirle».
- source_word: ἀδελφῷ / Ἀδελφέ / ἀδελφοῦ
  english_pob_choice: brother / Brother / brother’s
  chosen_spanish: hermano / Hermano / hermano
  alternatives_spanish:
  - hermano o hermana
  - familiar
  - creyente
  lexicon: BDAG
  rationale: Se mantiene el término masculino singular del griego en el texto principal y en el vocativo, sin suavizarlo con lenguaje inclusivo que el original no usa.
- source_word: ἄφες
  english_pob_choice: let me
  chosen_spanish: déjame
  alternatives_spanish:
  - permíteme
  - deja que
  lexicon: BDAG
  rationale: La forma idiomática de petición de permiso en español es «déjame»; conserva el valor pragmático del imperativo aoristo.
- source_word: ἐκβάλω / ἔκβαλε / ἐκβαλεῖν
  english_pob_choice: take out / take out / to take out
  chosen_spanish: sacar / saca / sacar
  alternatives_spanish:
  - quitar / quita / quitar
  - sacar fuera / saca fuera / sacar fuera
  lexicon: BDAG
  rationale: «Sacar» comunica con naturalidad la acción física en la metáfora ocular y mantiene la consistencia verbal en toda la versículo.
- source_word: κάρφος
  english_pob_choice: speck
  chosen_spanish: paja
  alternatives_spanish:
  - astilla
  - motita
  - brizna
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «speck», en español «paja» puede expresar un fragmento mínimo y conserva el contraste hiperbólico con δοκός; se anota la alternativa por la posible lectura «astilla/motita».
- source_word: ὀφθαλμός
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - vista
  lexicon: BDAG
  rationale: Traducción literal y transparente del órgano de la metáfora.
- source_word: αὐτὸς
  english_pob_choice: you yourself
  chosen_spanish: tú mismo
  alternatives_spanish:
  - tú mismo, por tu parte
  - tú
  lexicon: BDAG
  rationale: Se preserva el énfasis contrastivo del pronombre con una formulación natural en español.
- source_word: δοκός
  english_pob_choice: beam
  chosen_spanish: viga
  alternatives_spanish:
  - madero
  - tronco
  - pluma
  lexicon: BDAG
  rationale: «Viga» expresa un elemento grande de madera y conserva el contraste hiperbólico con el término diminuto para κάρφος.
- source_word: οὐ βλέπων
  english_pob_choice: do not see
  chosen_spanish: no ves
  alternatives_spanish:
  - no estás viendo
  - sin ver
  lexicon: BDAG
  rationale: La participial negada se integra en una cláusula natural en español, preservando la ironía de la falta de percepción.
- source_word: ὑποκριτά
  english_pob_choice: Hypocrite
  chosen_spanish: ¡Hipócrita!
  alternatives_spanish:
  - Hipócrita
  - ¡Farsante!
  lexicon: BDAG
  rationale: Vocativo de reprensión fuerte y directo; «hipócrita» es el equivalente estable y fiel en español.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes que nada
  lexicon: BDAG
  rationale: Marca secuencia lógica y moral de manera clara y breve.
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - después
  - luego
  lexicon: BDAG
  rationale: Conserva la relación temporal consecutiva con πρῶτον.
- source_word: διαβλέψεις
  english_pob_choice: you will see clearly
  chosen_spanish: verás claramente
  alternatives_spanish:
  - verás con claridad
  - verás bien
  lexicon: BDAG
  rationale: El compuesto intensifica la visión; «verás claramente» preserva el matiz de claridad recuperada tras retirar el obstáculo.
theological_decisions:
- issue: Término de parentesco masculino singular en una instrucción ética
  english_pob_reading: brother
  chosen_spanish_reading: hermano
  alternative_spanish_readings:
  - hermano o hermana
  - prójimo
  - creyente
  rationale: Se mantiene la forma masculina singular del griego, siguiendo el dato morfológico y la decisión auditada del POB en inglés, sin convertirla en una generalización interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Contraste metafórico hiperbólico entre lo diminuto y lo enorme
  english_pob_reading: speck ... beam
  chosen_spanish_reading: paja ... viga
  alternative_spanish_readings:
  - astilla ... viga
  - motita ... viga
  - paja ... viga
  rationale: La imagen se conserva como contraste exagerado. En español «viga» comunica bien el tamaño de δοκός, y «paja» permite una unidad mínima y perceptible para κάρφος sin perder el efecto retórico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: Se revisó el texto para asegurar que cada marca de nota al pie aparezca exactamente en el cuerpo español. Se corrigió la anclación de [a], [b] y [c] dentro de la misma oración para que coincidan con sus notas respectivas.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento de ἀδελφός como singular masculino en todo el versículo.
  - Se conservó el contraste hiperbólico diminuto/grande con un término pequeño para κάρφος y uno grande para δοκός.
  - Se usó puntuación española y comillas angulares para el discurso directo.
  - Se prefirió un español natural sin desplazar el sentido literal del original griego.
