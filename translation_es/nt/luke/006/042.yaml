    issue: κάρφος se traduce como «paja» en el texto principal
    rationale: Aunque «paja y viga» es una formulación tradicional en español, el expediente inglés auditado eligió ‘speck’ precisamente para subrayar una partícula mínima. «Paja» puede evocar material fibroso o una brizna, no necesariamente una motita ocular diminuta. «Motita» comunica mejor el contraste con «viga» en español contemporáneo.
  - severity: low
    issue: La nota léxica de «paja» no refleja del todo la prioridad semántica del POB
    rationale: La nota actual justifica «paja» y ofrece varias alternativas, pero el razonamiento auditado prioriza la pequeñez de κάρφος. Conviene que la nota explique que también puede traducirse «astilla», mientras el texto principal use una opción más clara para lectores modernos.
