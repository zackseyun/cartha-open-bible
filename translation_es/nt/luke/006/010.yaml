translation:
  language: es
  text: 'Y después de mirar alrededor a todos ellos, le dijo: «Extiende tu mano». Y él lo hizo, y su mano fue restaurada[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue sanada». El griego dice más literalmente «fue restaurada», destacando el retorno a la condición adecuada.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβλεψάμενος
  english_pob_choice: after looking around
  chosen_spanish: después de mirar alrededor
  alternatives_spanish:
  - después de haber mirado alrededor
  - mirando alrededor
  lexicon: BDAG
  rationale: El participio aoristo con valor previo se expresa naturalmente en español con una construcción temporal que conserva la secuencia narrativa sin volverla pesada. «Mirar alrededor» mantiene el sentido de observar a los presentes en conjunto.
- source_word: πάντας αὐτούς
  english_pob_choice: at them all
  chosen_spanish: a todos ellos
  alternatives_spanish:
  - a todos
  - a todos los presentes
  lexicon: BDAG
  rationale: La frase subraya la totalidad de los presentes. «A todos ellos» conserva esa amplitud y refleja el objeto de la mirada de forma clara y natural.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: he said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le dijo a él
  lexicon: BDAG
  rationale: En español, el dativo indirecto se expresa de manera natural con «le dijo». Evita redundancia y mantiene el acto de habla sin añadir matices no presentes.
- source_word: Ἔκτεινον
  english_pob_choice: Stretch out
  chosen_spanish: Extiende
  alternatives_spanish:
  - Estira
  - Extiende hacia afuera
  lexicon: BDAG
  rationale: El imperativo aoristo ordena una acción física directa. «Extiende» reproduce bien el mandato en español y es más natural que un calco rígido.
- source_word: τὴν χεῖρά σου
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu brazo
  lexicon: BDAG
  rationale: χείρ significa normalmente «mano»; no conviene ampliarlo a «brazo». Se conserva el posesivo explícito para reflejar la relación directa del mandato con la parte del cuerpo.
- source_word: ὁ δὲ ἐποίησεν
  english_pob_choice: And he did so
  chosen_spanish: Y él lo hizo
  alternatives_spanish:
  - Y él obedeció
  - Y así lo hizo
  lexicon: BDAG
  rationale: El verbo se refiere al cumplimiento de la orden dada. «Lo hizo» retiene la referencia al acto mandado sin sobreinterpretar la respuesta con vocabulario de obediencia que el griego no explicita.
- source_word: ἀπεκατεστάθη
  english_pob_choice: was restored
  chosen_spanish: fue restaurada
  alternatives_spanish:
  - fue sanada
  - fue devuelta a su estado normal
  - fue restituida
  lexicon: BDAG
  rationale: La pasiva de ἀποκαθίστημι expresa retorno a la condición adecuada. «Fue restaurada» preserva ese matiz mejor que «fue sanada», que introduce un lenguaje más interpretativo. Se mantiene el femenino para concordar con «mano».
- source_word: ἡ χεὶρ αὐτοῦ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  lexicon: BDAG
  rationale: La referencia posesiva queda clara en español con «su mano». Repetir el sustantivo conserva la explicitud del griego y destaca el resultado milagroso.
theological_decisions:
- issue: Expresión del milagro en ἀπεκατεστάθη
  english_pob_reading: rendered as restoration language rather than explicit healing language
  chosen_spanish_reading: fue restaurada
  alternative_spanish_readings:
  - fue sanada
  - fue hecha completa
  rationale: El verbo griego enfatiza la restauración a la condición apropiada. En español, «restaurada» conserva mejor ese valor lexical y evita reducir el milagro a una explicación médica implícita.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego SBLGNT y es coherente con el control de la POB en inglés: mantiene el orden narrativo, conserva el mandato directo y reproduce «restaurada» para ἀπεκατεστάθη. No se introdujeron cambios respecto del último pase de revisión del contexto inglés.'
  spanish_consistency_notes:
  - Se usa «mano» para χείρ y no «brazo», conforme al uso léxico normal.
  - Se conserva el valor de restauración con «restaurada», alineado con la decisión inglesa de evitar «sanada» como lectura principal.
  - «Le dijo» mantiene el dativo indirecto sin añadir explicación innecesaria.
  - La puntuación con comillas angulares se ajusta al uso editorial en español.
