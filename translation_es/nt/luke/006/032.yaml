review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: mantiene la repetición de ἀγαπάω con ''aman'', conserva ''pecadores'' para ἁμαρτωλοὶ y expresa correctamente la pregunta retórica. Sin embargo, ''¿qué crédito tienen ustedes?'' desplaza ligeramente la sintaxis y el referente de χάρις ὑμῖν ἐστίν; el sentido es ''¿qué crédito hay para ustedes / se les reconoce?'', no tanto una posesión directa de crédito. Una formulación más idiomática y precisa en español es ''¿qué mérito tiene eso?'' o ''¿qué crédito es eso para ustedes?''.'
  spanish_quality_summary: El español es claro y natural, pero la frase '¿qué crédito tienen ustedes?' suena algo dura y menos idiomática en registro bíblico actual que '¿qué mérito tiene eso?'. Además, 'también' funciona, pero 'hasta' o 'incluso' refleja con más fuerza el énfasis de καὶ γὰρ en esta construcción. El texto requiere un ajuste menor para mejorar naturalidad y precisión.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: ''aman'', ''pecadores'' y el tratamiento no soteriológico de χάρις están bien resueltos. La excepción es que ''crédito'' puede mantenerse en nota, pero en el cuerpo español ''mérito'' comunica mejor la fuerza contextual de commendación sin rigidez idiomática. No hay conflictos con términos doctrinales mayores.'
  issues:
  - severity: medium
    issue: La frase '¿qué crédito tienen ustedes?' no expresa de la manera más fiel e idiomática el valor de χάρις ὑμῖν ἐστίν.
    rationale: El griego pregunta qué clase de commendación o mérito les corresponde; en español, 'tener crédito' puede sonar financiero o poco natural. '¿Qué mérito tiene eso?' transmite mejor el sentido contextual documentado por el POB.
  - severity: low
    issue: '''Porque también'' atenúa ligeramente el énfasis de καὶ γὰρ.'
    rationale: La combinación tiene fuerza explicativa y enfática ('porque hasta/incluso'). No es un error grave, pero 'hasta' mejora la correspondencia retórica en español.
