translation:
  language: es
  text: Y si aman a los que los aman[a], ¿qué mérito tiene eso? Porque hasta los pecadores aman a los que los aman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O '¿qué crédito es eso para ustedes?' El griego puede significar 'gracia', 'crédito' o 'favor'; aquí se refiere a lo que es encomiable o meritorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπᾶτε / ἀγαπῶντας / ἀγαπῶσιν
  english_pob_choice: love
  chosen_spanish: aman / aman
  alternatives_spanish:
  - quieren
  - aman con amor
  lexicon: BDAG
  rationale: Se conserva el mismo verbo en las tres ocurrencias para mantener la repetición retórica del griego. 'Aman' es la opción natural en español y transmite el alcance relacional de ἀγαπάω mejor que un calco como 'quieren'.
- source_word: ποία
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - qué clase de
  - qué tipo de
  lexicon: BDAG
  rationale: En español, 'qué' reproduce la pregunta retórica de manera idiomática y breve. Las ampliaciones ('qué clase de') aclararían de más lo que el contexto ya comunica.
- source_word: χάρις
  english_pob_choice: credit
  chosen_spanish: crédito
  alternatives_spanish:
  - gracia
  - favor
  - reconocimiento
  lexicon: BDAG
  rationale: Aquí χάρις no expresa la gracia salvífica sino algo meritorio o encomiable. 'Crédito' comunica bien la idea de mérito o reconocimiento debido, y evita importar un sentido teológico ajeno al contexto inmediato.
- source_word: ἁμαρτωλοὶ
  english_pob_choice: sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - personas pecadoras
  - los que pecan
  lexicon: BDAG
  rationale: '''Pecadores'' conserva la categoría moral del sustantivo griego y suena natural en español bíblico actual. ''Personas pecadoras'' o ''los que pecan'' sería más explicativo, pero menos fiel a la forma sustantivada.'
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: Con 'crédito' en una pregunta retórica, el español natural es '¿qué crédito tienen ustedes?'. Se evita una estructura forzada como '¿qué crédito es para ustedes?' que no suena idiomática.
- source_word: καὶ γὰρ
  english_pob_choice: For even
  chosen_spanish: Porque también
  alternatives_spanish:
  - Pues también
  - Porque incluso
  lexicon: BDAG
  rationale: '''Porque también'' captura la función explicativa de γάρ y la inclusión enfática de καί. ''También'' mantiene el paralelismo argumentativo con el ejemplo de los pecadores, sin sobreactuar el énfasis.'
theological_decisions:
- issue: Sentido de χάρις en la pregunta de Jesús
  english_pob_reading: non-soteriological 'credit/commendation' rather than theological 'grace'
  chosen_spanish_reading: crédito o reconocimiento merecido, no gracia salvífica
  alternative_spanish_readings:
  - gracia
  - favor
  - agradecimiento
  rationale: 'El contexto contrasta un amor recíproco, común aun entre pecadores, con una conducta distintiva. Por eso ''crédito'' comunica mejor la pregunta: qué mérito o reconocimiento hay en tal conducta. Traducir ''gracia'' podría desplazar el sentido hacia la teología paulina y oscurecer la pregunta ética inmediata.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no hay cambios necesarios respecto del consenso alto del control cruzado. Se mantuvo la decisión de traducir χάρις como ''crédito'' por el sentido ético-retórico del contexto.'
  spanish_consistency_notes:
  - Se conserva el paralelismo verbal con 'aman' en ambos miembros de la oración para reflejar la repetición del griego.
  - Se usa 'pecadores' como sustantivo bíblico estándar, sin suavizar el contraste moral.
  - Se evita 'SEÑOR' o formulaciones tradicionales no pertinentes, ya que el versículo no contiene el tetragrámaton ni κύριος en este punto.
  - La puntuación reproduce la pregunta directa y la conclusión explicativa con naturalidad en español.
