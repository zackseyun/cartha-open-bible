  rationale: Se ajusta una frase para expresar con más naturalidad y precisión el sentido contextual de χάρις como mérito o commendación, manteniendo en nota la alternativa más literal con 'crédito'. También se fortalece levemente el énfasis de καὶ γὰρ con 'hasta'.
