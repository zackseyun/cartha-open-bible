translation:
  language: es
  text: ¿Por qué me llaman[a], «Señor, Señor», y no hacen lo que digo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Maestro, Maestro». Griego: «Kyrios, kyrios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  lexicon: BDAG
  rationale: En esta construcción interrogativa, τί funciona de modo idiomático para pedir la razón de la acción; en español, «¿Por qué?» transmite mejor la fuerza exhortativa y correctiva que un literal «¿Qué?».
- source_word: δέ
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - pero
  - y
  lexicon: BDAG
  rationale: Como en el POB inglés, δέ funciona aquí como partícula de enlace suave y no requiere un equivalente explícito en español para que la pregunta suene natural.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  lexicon: BDAG
  rationale: Objeto directo simple de «llamas»; se mantiene sin variación.
- source_word: καλεῖτε
  english_pob_choice: call
  chosen_spanish: llamas
  alternatives_spanish:
  - me llamas
  - me llamáis
  - me invocas
  lexicon: BDAG
  rationale: Aunque el griego está en segunda persona plural, el español publicado suele dirigirse de manera general al oyente singular o colectivo; «llamas» conserva el valor directo de καλεῖτε en vocativo. «Llamar» es la correspondencia más natural para el acto de dirigirse a alguien con un título.
- source_word: Κύριε κύριε
  english_pob_choice: Lord, Lord
  chosen_spanish: Señor, Señor
  alternatives_spanish:
  - Maestro, Maestro
  lexicon: BDAG
  rationale: En español, «Señor» es el equivalente más establecido de κύριος en un discurso dirigido a Jesús y preserva el peso cristológico reconocido por el POB inglés. Se conserva la repetición vocativa para reflejar énfasis y contraste retórico.
- source_word: καὶ οὐ
  english_pob_choice: and not
  chosen_spanish: y no
  alternatives_spanish:
  - pero no
  lexicon: BDAG
  rationale: Se mantiene la coordinación simple del griego con «y no», que en español resulta natural y conserva el contraste entre la confesión verbal y la desobediencia.
- source_word: ποιεῖτε
  english_pob_choice: do
  chosen_spanish: haces
  alternatives_spanish:
  - hacen
  - obedeces
  - practicas
  lexicon: BDAG
  rationale: ποιέω aquí se refiere a ejecutar u obedecer lo que Jesús dice. «Haces» reproduce la acción básica sin añadir matices ajenos; el contraste con las palabras de Jesús queda claro por el contexto.
- source_word: ἃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - aquello que
  lexicon: BDAG
  rationale: El relativo neutro plural se expresa de forma idiomática en español con «lo que», que resume el contenido de las palabras de Jesús sin volverlo mecánico o pesado.
- source_word: λέγω
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - les digo
  - les hablo
  lexicon: BDAG
  rationale: Se conserva el simple «digo» para mantener la cercanía con λέγω y con la elección inglesa «I say», evitando añadir explícitamente un destinatario no presente en el griego.
theological_decisions:
- issue: Renderización de κύριος como título aplicado a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Siguiendo la decisión auditada del POB inglés, κύριος se traduce por «Señor» como título de respeto y con peso cristológico. «Maestro» es posible en sentido contextual, pero debilitaría la carga teológica reconocida por el proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord; Spanish default for κύριος as Señor'
- issue: Tensión entre profesión verbal y obediencia real
  english_pob_reading: Why do you call me ... and not do what I say?
  chosen_spanish_reading: ¿Por qué me llamas ... y no haces lo que digo?
  alternative_spanish_readings:
  - ¿Por qué me decís ... y no hacéis lo que digo?
  - ¿Por qué me llaman ... y no hacen lo que digo?
  rationale: 'La pregunta mantiene la reprensión: el uso de un título correcto no basta sin obediencia. El español conserva la antítesis entre llamar a Jesús «Señor» y no hacer lo que él dice, sin suavizarla.'
  doctrine_reference: Lucas 6:46; obediencia como evidencia de discipulado
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión auditado: no hubo cambios necesarios y el consenso de revisión fue alto. La redacción española sigue la misma lectura de competencia semántica que el texto inglés, preservando la fuerza interrogativa, el vocativo repetido y el contraste entre confesión y obediencia.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος de manera coherente con el estándar POB para títulos dirigidos a Jesús.
  - Se evita un calco rígido de la segunda persona plural del griego para lograr un español publicable y natural; la crítica del verso se mantiene intacta.
  - La nota de pie preserva la alternativa lexical documentada en el inglés («Maestro»), sin introducir nuevas opciones no auditadas.
