review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien el sentido básico del griego y la decisión auditada de traducir κύριε κύριε como «Señor, Señor», con nota alternativa «Maestro, Maestro». Sin embargo, falla en un punto importante de alineación gramatical: καλεῖτε y ποιεῖτε son segunda persona plural, pero el español usa singular («llamas», «haces»). Esa singularización no está justificada por la evidencia fuente ni por el POB inglés, que mantiene «you» sin forzar singular. En español, conviene conservar el plural para reflejar con fidelidad el destinatario colectivo.'
  spanish_quality_summary: La frase es clara y natural, pero el cambio indebido a singular debilita la exactitud y además crea una incoherencia con el vocativo repetido dirigido a un grupo de oyentes. Una forma plural moderna y ampliamente legible en español general es «llaman» / «hacen», evitando regionalismos como «llamáis» y la ambigüedad de «ustedes» implícita sigue siendo aceptable en español bíblico neutral.
  glossary_alignment: La renderización de κύριος como «Señor» está alineada con la decisión teológica y terminológica del proyecto. La nota léxica con «Maestro, Maestro» como alternativa también está bien preservada. No hay conflicto con otros términos de glosario.
  issues:
  - severity: high
    issue: Cambio de segunda persona plural griega a singular en el texto español
    rationale: El griego tiene καλεῖτε y ποιεῖτε, ambos 2ª persona plural. El borrador usa «llamas» y «haces», singular. Esto altera el número del destinatario y no está respaldado por la evidencia fuente ni por la auditoría inglesa.
  - severity: medium
    issue: La justificación lexical defiende una singularización no sustentada
    rationale: La nota de decisión léxica afirma que el español publicado suele dirigirse al oyente singular o colectivo, pero aquí no hay base textual para esa adaptación. Debe revisarse para no normalizar una desviación de la fuente.
