translation:
  language: es
  text: 'Y les decía[a]: «El Hijo del Hombre es señor del sábado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El Hijo del Hombre es señor sobre el sábado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: estaba diciendo
  alternatives_spanish:
  - decía
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o repetida; en español, «estaba diciendo» conserva mejor ese matiz aspectual que el pretérito simple «decía», aunque ambas son posibles.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - maestro
  - amo
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título cristológico de autoridad. «Señor» es la equivalencia española estable y más fiel al valor titular que «maestro» o «amo».
- source_word: τοῦ σαββάτου
  english_pob_choice: of the Sabbath
  chosen_spanish: del sábado
  alternatives_spanish:
  - sobre el sábado
  - del día de reposo
  lexicon: BDAG
  rationale: El genitivo se vierte de manera directa con «del», preservando la relación compacta del griego. «Sábado» mantiene la referencia institucional al día sagrado; «sobre el sábado» explicita la autoridad, pero añade una glosa no presente de forma explícita.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva la expresión tradicional y transparente del título jesuánico. «El Hijo del Hombre» mantiene la continuidad intertextual y el peso idiomático del sintagma semítico.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simple reproduce el flujo narrativo sin imponer una relación temporal o inferencial más fuerte que la del griego.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo plural se expresa naturalmente en español con el clítico indirecto «les», sin necesidad de explicitar «a ellos».
theological_decisions:
- issue: Afirmación cristológica sobre autoridad respecto del sábado
  english_pob_reading: 'The clause is rendered as a direct assertion of the Son of Man''s lordship with respect to the Sabbath: ''The Son of Man is Lord of the Sabbath.'''
  chosen_spanish_reading: 'La cláusula se vierte como una afirmación directa de la autoridad del Hijo del Hombre sobre el sábado: «El Hijo del Hombre es Señor del sábado».'
  alternative_spanish_readings:
  - El Hijo del Hombre es Señor incluso del sábado.
  - El Hijo del Hombre es señor sobre el sábado.
  rationale: El griego presenta la afirmación de manera compacta, y la traducción debe conservar esa fuerza sin añadir intensificadores como «incluso» si no están expresos. «Señor del sábado» reproduce bien el genitivo y la reivindicación de autoridad.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se siguió el pasaje griego de SBLGNT y el expediente auditado en inglés. No se aplicaron revisiones posteriores; el estado final del inglés indica que no hubo cambios necesarios y el punto de revisión quedó estable.
  spanish_consistency_notes:
  - Se mantuvo «sábado» en minúscula por tratarse del nombre común del día en español, aunque funciona como institución bíblica; no se optó por mayúscula por criterio ortográfico del español.
  - Se preservó «Hijo del Hombre» como título fijo, en consonancia con el audit trail inglés y con el uso cristológico reconocido.
  - Se eligió «estaba diciendo» para reflejar el imperfecto, manteniendo la naturalidad del español sin perder el aspecto durativo.
