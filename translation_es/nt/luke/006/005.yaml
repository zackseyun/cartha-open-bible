revisions:
- from: 'Y les estaba diciendo[a]: «El Hijo del Hombre es Señor del sábado».'
  to: 'Y les decía[a]: «El Hijo del Hombre es señor del sábado».'
  rationale: Se ajusta el imperfecto a una forma más idiomática en español («les decía») y se normaliza «señor» en minúscula para reflejar mejor el uso predicativo de κύριος como título de autoridad, sin alterar el sentido cristológico fuerte del pasaje. La nota alternativa se conserva y se armoniza con la minúscula del término.
