review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del griego: Jesús sigue hablando a sus interlocutores y afirma la autoridad del Hijo del Hombre respecto del sábado. Conserva bien «el Hijo del Hombre» y «Señor del sábado», y la nota alternativa sobre «sobre el sábado» corresponde al rastro auditado en inglés.'
  spanish_quality_summary: La redacción es mayormente natural y clara, pero «Y les estaba diciendo» suena algo forzada en español narrativo bíblico. Para el imperfecto ἔλεγεν, «les decía» preserva el aspecto de manera más idiomática y digna en español. También conviene evitar mayúscula en «señor» aquí, ya que funciona como título/predicado de autoridad cristológica, no como nombre divino ni vocativo reverencial fijo.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Hijo del Hombre» es correcto; no aparece el nombre divino. La principal corrección terminológica es preferir «señor» en minúscula para κύριος en este contexto predicativo, ya que no se trata de Yahvé ni de un nombre propio fijo en español.'
  issues:
  - severity: medium
    issue: «les estaba diciendo» es poco idiomático para ἔλεγεν
    rationale: Aunque intenta reflejar el imperfecto, en español bíblico y narrativo «les decía» suele comunicar mejor la acción continua/repetida sin sonar perifrástico o pesado.
  - severity: medium
    issue: Mayúscula en «Señor» dentro de «es Señor del sábado»
    rationale: En este contexto, κύριος expresa señorío/autoridad del Hijo del Hombre sobre el sábado. En español, la minúscula es más natural para este uso predicativo y evita sugerir que se está usando como sustituto del nombre divino.
  revised_spanish_text: 'Y les decía[a]: «El Hijo del Hombre es señor del sábado».'
