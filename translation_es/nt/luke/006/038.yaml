revisions:
- from: 'Den[a], y se les dará a ustedes: una buena medida, apretada, sacudida y rebosante, se la darán en su regazo[b]. Porque con la medida con que ustedes miden, se les volverá a medir.'
  to: 'Den, y se les dará a ustedes: una buena medida, apretada, sacudida y rebosante[a], darán en su regazo[b]. Porque con la medida con que ustedes miden, se les volverá a medir.'
  rationale: La revisión corrige el anclaje de la nota léxica para que corresponda a «rebosante», donde realmente está la alternativa «rebosando». Además, cambia «se la darán» por «darán» para reflejar mejor el activo indefinido δώσουσιν sin añadir un clítico no expresado en el griego. Se conservan las demás decisiones porque son fieles, naturales en español y coherentes con la auditoría inglesa.
  reviewer_model: gpt-5.4
