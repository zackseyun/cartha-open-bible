translation:
  language: es
  text: 'Den, y se les dará a ustedes: una buena medida, apretada, sacudida y rebosante[a], darán en su regazo[b]. Porque con la medida con que ustedes miden, se les volverá a medir.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rebosando». La imagen es la de un recipiente llenado tan completamente que su contenido se derrama.
    reason: lexical_alternative
  - marker: b
    text: O «en el pliegue de su vestido». «Regazo» alude al pliegue frontal de la ropa usado para recibir mercancías medidas.
    reason: cultural_note
lexical_decisions:
- source_word: δίδοτε
  english_pob_choice: Give
  chosen_spanish: Den
  alternatives_spanish:
  - Sigan dando
  - Estén dando
  lexicon: BDAG
  rationale: El imperativo plural en español natural y digno es «Den». Conserva la exhortación general sin forzar un matiz iterativo que el griego no expresa de forma explícita en este contexto.
- source_word: δοθήσεται ὑμῖν
  english_pob_choice: it will be given to you
  chosen_spanish: se les dará a ustedes
  alternatives_spanish:
  - les será dado
  - ustedes recibirán
  lexicon: BDAG
  rationale: El pasivo futuro se vierte de manera impersonal con «se les dará», que suena natural en español y mantiene la voz pasiva sin introducir un sujeto explícito.
- source_word: μέτρον καλὸν
  english_pob_choice: a good measure
  chosen_spanish: una buena medida
  alternatives_spanish:
  - una medida buena
  - una medida generosa
  lexicon: BDAG
  rationale: «Medida» conserva la imagen comercial del texto. «Buena» reproduce el valor general de καλός sin importar la interpretación de «generosa», que iría más allá del léxico.
- source_word: πεπιεσμένον
  english_pob_choice: pressed down
  chosen_spanish: apretada
  alternatives_spanish:
  - prensada
  - compactada
  lexicon: BDAG
  rationale: Aunque el participio significa literalmente algo compactado o prensado, en español «apretada» comunica bien la imagen de una medida llenada al máximo y evita un giro demasiado técnico.
- source_word: σεσαλευμένον
  english_pob_choice: shaken together
  chosen_spanish: sacudida
  alternatives_spanish:
  - agitada
  - removida
  lexicon: BDAG
  rationale: El participio sugiere que el contenido fue sacudido para asentarse. En la serie de participios coordinados, «sacudida» mantiene brevedad y la imaginería del recipiente; la relación contextual con la medida compensa la omisión de «juntamente».
- source_word: ὑπερεκχυννόμενον
  english_pob_choice: overflowing
  chosen_spanish: rebosante
  alternatives_spanish:
  - desbordante
  - que rebosa
  lexicon: BDAG
  rationale: «Rebosante» transmite abundancia que se sale del recipiente y funciona bien en la secuencia adjetival del verso. También preserva la fuerza visual del verbo sin sonar coloquial.
- source_word: δώσουσιν
  english_pob_choice: they will give
  chosen_spanish: se la darán
  alternatives_spanish:
  - la darán
  - ellos darán
  lexicon: BDAG
  rationale: El sujeto indefinido se conserva mejor con una construcción impersonal. «Se la darán» conecta con la medida implícita y evita sobreespecificar quiénes son los que dan.
- source_word: εἰς τὸν κόλπον ὑμῶν
  english_pob_choice: into your lap
  chosen_spanish: en su regazo
  alternatives_spanish:
  - en el pliegue de su ropa
  - en su pecho
  lexicon: BDAG
  rationale: «Regazo» es la equivalencia española más natural para κόλπος en este dicho. Mantiene el sentido de un lugar donde se recibe algo, sin cerrar la posibilidad del trasfondo cultural del pliegue de la vestidura.
- source_word: ᾧ γὰρ μέτρῳ
  english_pob_choice: For with the measure by which
  chosen_spanish: Porque con la medida con que
  alternatives_spanish:
  - Pues con la medida con que
  - Porque con la medida por la que
  lexicon: BDAG
  rationale: «Con la medida con que» sigue de cerca la estructura relativa del griego y conserva la formulación proverbial de reciprocidad.
- source_word: μετρεῖτε
  english_pob_choice: you measure
  chosen_spanish: ustedes miden
  alternatives_spanish:
  - miden
  - ustedes usan para medir
  lexicon: BDAG
  rationale: El presente simple «miden» es suficiente y natural; el pronombre explícito refuerza la segunda persona plural sin alterar el sentido.
- source_word: ἀντιμετρηθήσεται ὑμῖν
  english_pob_choice: it will be measured back to you
  chosen_spanish: se les volverá a medir
  alternatives_spanish:
  - se les medirá de vuelta
  - les será medido en retorno
  lexicon: BDAG
  rationale: «Volverá a medir» conserva la idea de reciprocidad de ἀντί y suena natural en español. El impersonal mantiene la pasividad del griego y la formulación proverbial.
theological_decisions:
- issue: 'Alcance de la exhortación: ¿limitarla a dinero/limosna o mantenerla general?'
  english_pob_reading: Retain the broader language of giving and reciprocal measure without restricting it to financial generosity.
  chosen_spanish_reading: Mantener el lenguaje amplio de dar y de la medida recíproca, sin restringirlo a dinero o limosna.
  alternative_spanish_readings:
  - Entenderlo específicamente como limosna o generosidad material
  - Leerlo como una regla general de misericordia, juicio y generosidad
  rationale: El contexto inmediato en Lucas 6 abarca misericordia, no juzgar, perdonar y dar. La imagen de la medida apunta a abundancia y reciprocidad, pero el griego no obliga a reducir el dicho a una esfera económica ni a convertirlo en una promesa de prosperidad.
  doctrine_reference: Conservar la tensión teológica del texto; no importar una interpretación doctrinal que el pasaje no expone explícitamente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador mantiene el sentido general del audit trail inglés y adapta sus decisiones léxicas al español con equivalencias naturales y transparentes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no contiene esa referencia.
  - Se conserva «medida» como traducción de μέτρον para preservar la metáfora comercial y la reciprocidad proverbial.
  - Se evita «Cristo»/«Mesías» porque el versículo no contiene lenguaje cristológico.
  - Se usa construcción impersonal con «se» para reflejar el pasivo griego y mantener un registro bíblico claro en español.
  - «Regazo» se eligió por naturalidad; la nota preserva el trasfondo cultural del faldón o pliegue de la vestidura.
