review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: imperativo amplio de dar, futura reciprocidad, imagen de medida abundante, y proverbio final de retribución según la medida usada. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y con la pista de auditoría inglesa: (1) el marcador [a] está anclado en «Den», pero la nota trata de ὑπερεκχυννόμενον (‘rebosando/running over’), por lo que el anclaje es incorrecto; (2) «se la darán» convierte el plural indefinido activo δώσουσιν en una construcción más reflexiva/impersonal y añade un objeto clítico innecesario; «darán» preserva mejor el activo indefinido del griego. También conviene mejorar «sacudida» a «remecida» o «sacudida hasta asentarse» para reflejar mejor la idea de sacudir la medida para que el contenido se acomode, aunque esto es estilístico y no grave.'
  spanish_quality_summary: El español es claro, natural y de registro digno. «Una buena medida, apretada, sacudida y rebosante» fluye bien, y «regazo» con nota cultural es una buena solución. No obstante, el texto gana en precisión y naturalidad si se quita el clítico en «se la darán» y se ancla la nota donde corresponde. «Se les volverá a medir» es entendible, pero «se les medirá de vuelta» sonaría menos idiomático; por eso puede conservarse. El conjunto requiere solo reparación menor.
  glossary_alignment: 'No hay términos del glosario de alto impacto en este versículo (Yahvé, Mesías, etc.). Las decisiones clave están alineadas con la filosofía POB: «Den» para δίδοτε, «buena medida» para μέτρον καλόν, «regazo» para κόλπος con nota cultural, y lenguaje amplio de generosidad sin restringirlo a dinero. La principal corrección es de correspondencia nota-texto y de fidelidad sintáctica en δώσουσιν.'
  issues:
  - severity: high
    issue: El marcador de nota [a] está colocado en «Den», pero la nota explica «rebosando/rebosante».
    rationale: Las instrucciones exigen que cada nota esté anclada exactamente en la palabra o frase pertinente. Aquí la nota lexical_alternative corresponde a ὑπερεκχυννόμενον, no al imperativo δίδοτε.
  - severity: medium
    issue: «Se la darán» no preserva con suficiente transparencia el plural indefinido activo δώσουσιν.
    rationale: El griego usa un activo de tercera plural indefinida (‘darán’/‘ellos darán’). La forma «se la darán» introduce un matiz más impersonal/reflexivo y un objeto clítico no expresado en el griego. «Darán» mantiene mejor la sintaxis y la indefinición del agente.
  - severity: low
    issue: «Sacudida» capta el sentido general, pero puede sonar menos preciso que una opción que exprese asentamiento del contenido.
    rationale: σεσαλευμένον, en contexto de medida de grano, sugiere sacudir para que se acomode. Aun así, «sacudida» sigue siendo aceptable y no exige adjudicación compleja.
  revised_spanish_text: 'Den, y se les dará a ustedes: una buena medida, apretada, sacudida y rebosante[a], darán en su regazo[b]. Porque con la medida con que ustedes miden, se les volverá a medir.'
  revised_footnotes:
