translation:
  language: es
  text: Pero amen a sus enemigos, y hagan el bien, y presten, sin esperar nada a cambio[a]; y su recompensa será grande, y serán hijos del Altísimo[b], porque él es benigno con los ingratos y malos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos probable: «sin desesperar de nadie» o «sin perder nunca la esperanza». La frase griega μηδὲν ἀπελπίζοντες es difícil; en este contexto se entiende como no esperar devolución ni nada a cambio.'
    reason: lexical_alternative
  - marker: b
    text: «Hijos» traduce el plural masculino griego y puede llevar aquí un sentido representativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: Marca un contraste fuerte con la pauta anterior; «Pero» suena natural en español y conserva el valor adversativo.
- source_word: ἀγαπᾶτε
  english_pob_choice: love
  chosen_spanish: amen
  alternatives_spanish:
  - quieran
  - amen de corazón
  lexicon: BDAG
  rationale: El imperativo de ἀγαπάω se vierte de forma directa con «amen», que mantiene el mandato de amor sin atenuarlo.
- source_word: τοὺς ἐχθροὺς ὑμῶν
  english_pob_choice: your enemies
  chosen_spanish: a sus enemigos
  alternatives_spanish:
  - a sus adversarios
  - a quienes los odian
  lexicon: BDAG
  rationale: «Enemigos» reproduce el sustantivo con la misma fuerza; en español se añade la preposición exigida por el verbo.
- source_word: ἀγαθοποιεῖτε
  english_pob_choice: do good
  chosen_spanish: hagan el bien
  alternatives_spanish:
  - hagan lo bueno
  - obren el bien
  lexicon: BDAG
  rationale: La expresión es idiomática y conserva la acción de hacer el bien sin sobreexplicar el verbo.
- source_word: δανίζετε
  english_pob_choice: lend
  chosen_spanish: presten
  alternatives_spanish:
  - presten dinero
  - den prestado
  lexicon: BDAG
  rationale: El verbo significa prestar; se evita añadir «dinero» porque el griego no lo especifica.
- source_word: μηδὲν ἀπελπίζοντες
  english_pob_choice: expecting nothing in return
  chosen_spanish: no esperando nada en retorno
  alternatives_spanish:
  - sin esperar nada de vuelta
  - sin desesperar de nadie
  lexicon: BDAG
  rationale: En el contexto de prestar, la lectura principal es no exigir ni esperar devolución; «en retorno» conserva la relación semántica con el préstamo y deja abierta la dificultad interpretativa.
- source_word: μισθὸς
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - galardón
  - paga
  lexicon: BDAG
  rationale: «Recompensa» comunica bien el sentido ético-escatológico del sustantivo sin volverlo mercantil.
- source_word: πολύς
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - abundante
  - mucha
  lexicon: BDAG
  rationale: Adjetivo predicativo natural en español; conserva la idea de una recompensa de gran magnitud.
- source_word: υἱοὶ Ὑψίστου
  english_pob_choice: sons of the Most High
  chosen_spanish: hijos del Altísimo
  alternatives_spanish:
  - hijos del Más Alto
  - hijos del Dios Altísimo
  lexicon: BDAG
  rationale: Se opta por «hijos» porque en español suena natural y puede abarcar el sentido representativo del plural masculino; el título divino se traduce como «Altísimo» siguiendo el uso bíblico.
- source_word: Ὑψίστου
  english_pob_choice: the Most High
  chosen_spanish: del Altísimo
  alternatives_spanish:
  - del Dios Altísimo
  - del Más Alto
  lexicon: BDAG
  rationale: Es la forma tradicional y clara del título divino en español, sin necesidad de perífrasis.
- source_word: χρηστός
  english_pob_choice: kind
  chosen_spanish: bondadoso
  alternatives_spanish:
  - amable
  - benigno
  lexicon: BDAG
  rationale: En el contexto de la conducta de Dios hacia personas indignas, «bondadoso» expresa bien la benevolencia activa del adjetivo.
- source_word: ἀχαρίστους
  english_pob_choice: the ungrateful
  chosen_spanish: los ingratos
  alternatives_spanish:
  - los desagradecidos
  lexicon: BDAG
  rationale: «Ingratos» es claro, natural y mantiene el matiz de falta de gratitud del término griego.
- source_word: πονηρούς
  english_pob_choice: evil
  chosen_spanish: malos
  alternatives_spanish:
  - malvados
  - perversos
  lexicon: BDAG
  rationale: «Malos» es un equivalente amplio y fluido en español; en este contexto suena menos pesado que «malvados» y refleja el contraste del texto.
theological_decisions:
- issue: Rendering of υἱοὶ Ὑψίστου in Spanish
  english_pob_reading: sons of the Most High
  chosen_spanish_reading: hijos del Altísimo
  alternative_spanish_readings:
  - hijos del Más Alto
  - hijos del Dios Altísimo
  rationale: El griego usa plural masculino υἱοὶ. En español, «hijos» conserva la referencia masculina del texto y también puede funcionar con sentido representativo; no se neutraliza a «hijos e hijas» o «personas» porque eso iría más allá del documento base.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Interpretation of μηδὲν ἀπελπίζοντες in the lending command
  english_pob_reading: expecting nothing in return
  chosen_spanish_reading: no esperando nada en retorno
  alternative_spanish_readings:
  - sin esperar nada de vuelta
  - sin desesperar de nadie
  rationale: El contexto inmediato trata del préstamo y la reciprocidad, así que la lectura principal es renunciar a la expectativa de devolución. La alternativa más literal y difícil no se borra, sino que queda preservada en nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se siguió el pasaje fuente griego SBLGNT y el audit trail inglés sin cambios de revisión pendientes; la redacción española conserva la ambigüedad documentada de μηδὲν ἀπελπίζοντες y la referencia masculina de υἱοὶ Ὑψίστου.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; aquí aparece Ὕψιστος, por lo que se traduce «Altísimo».
  - Se evitó «Cristo» porque el versículo no contiene Χριστός.
  - Se prefirió «ingratos» y «malos» para reflejar el paralelismo del griego con un español natural y sobrio.
