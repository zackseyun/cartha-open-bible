revisions:
- from: Pero amen a sus enemigos, y hagan el bien, y presten, no esperando nada en retorno[a]; y su recompensa será grande, y serán hijos del Altísimo[b], porque él es bondadoso con los ingratos y malos.
  to: Pero amen a sus enemigos, y hagan el bien, y presten, sin esperar nada a cambio[a]; y su recompensa será grande, y serán hijos del Altísimo[b], porque él es benigno con los ingratos y malos.
  rationale: La revisión mantiene todas las decisiones exegéticas del POB inglés, pero mejora la naturalidad del español y ajusta mejor algunos matices léxicos. «Sin esperar nada a cambio» expresa de forma idiomática la interpretación contextual de μηδὲν ἀπελπίζοντες, y «benigno» encaja mejor con χρηστός en esta construcción. Se conserva la nota sobre la dificultad interpretativa y la nota sobre «hijos».
  reviewer_model: gpt-5.4
