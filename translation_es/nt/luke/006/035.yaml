source:
  edition: SBLGNT
  text: πλὴν ἀγαπᾶτε τοὺς ἐχθροὺς ὑμῶν καὶ ἀγαθοποιεῖτε καὶ δανίζετε μηδὲν ἀπελπίζοντες· καὶ ἔσται ὁ μισθὸς ὑμῶν πολύς, καὶ ἔσεσθε υἱοὶ Ὑψίστου, ὅτι αὐτὸς χρηστός ἐστιν ἐπὶ τοὺς ἀχαρίστους καὶ πονηρούς.
base_translation:
  language: en
  yaml_path: translation/nt/luke/006/035.yaml
  text: But love your enemies[a], and do good, and lend, expecting nothing in return; and your reward will be great, and you will be sons of the Most High[b], because he is kind to the ungrateful and evil.
  footnotes:
  - marker: a
    text: Or, less likely, 'despairing of no one' or 'never losing hope.' The Greek phrase μηδὲν ἀπελπίζοντες is difficult; in this context it is taken to mean not expecting repayment or return.
    reason: lexical_alternative
  - marker: b
    text: '''Sons'' translates the masculine plural Greek term and can carry a representative sense here.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
