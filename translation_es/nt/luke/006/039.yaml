translation:
  language: es
  text: 'Y les dijo también una parábola: «¿Puede un ciego guiar a otro ciego? ¿No caerán ambos en un foso?»[a][b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una persona ciega ... una persona ciega». El griego usa formas masculinas singulares con valor representativo.
    reason: lexical_alternative
  - marker: b
    text: O «pozo» o «zanja» para «foso».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: BDAG
  rationale: Conserva el valor aditivo de καὶ después de δὲ en un español natural; «también» expresa que, además de hablar, Jesús les contó una parábola.
- source_word: παραβολὴν
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - comparación
  - ilustración
  lexicon: BDAG
  rationale: Es el término estándar y más fiel al género narrativo-figurativo del texto.
- source_word: Μήτι
  english_pob_choice: Can
  chosen_spanish: ¿Puede...?
  alternatives_spanish:
  - ¿Acaso puede...?
  - ¿Es posible que...?
  lexicon: BDAG
  rationale: La pregunta retórica espera respuesta negativa; en español, «¿Puede...?» reproduce bien ese matiz sin sobrecargar la frase.
- source_word: δύναται
  english_pob_choice: can
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  lexicon: BDAG
  rationale: «Puede» es la forma más natural para expresar capacidad en esta pregunta retórica.
- source_word: τυφλὸς ... τυφλὸν
  english_pob_choice: a blind man ... a blind man
  chosen_spanish: un ciego ... otro ciego
  alternatives_spanish:
  - un ciego ... un ciego
  - una persona ciega ... una persona ciega
  - el ciego ... el ciego
  lexicon: BDAG
  rationale: El griego usa formas masculinas singulares con valor representativo; en español, «un ciego ... otro ciego» conserva la fuerza proverbial y evita una repetición innecesariamente literal.
- source_word: ὁδηγεῖν
  english_pob_choice: guide
  chosen_spanish: guiar
  alternatives_spanish:
  - conducir
  - llevar
  lexicon: BDAG
  rationale: «Guiar» encaja de manera natural con la imagen de una persona ciega que orienta a otra.
- source_word: οὐχὶ
  english_pob_choice: Will not
  chosen_spanish: ¿No...?
  alternatives_spanish:
  - ¿Acaso no...?
  - ¿No es cierto que...?
  lexicon: BDAG
  rationale: Introduce una segunda pregunta retórica que espera respuesta afirmativa; «¿No...?» conserva ese impulso en español.
- source_word: ἀμφότεροι
  english_pob_choice: both
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  lexicon: BDAG
  rationale: «Ambos» reproduce con claridad la referencia dual de ἀμφότεροι.
- source_word: βόθυνον
  english_pob_choice: pit
  chosen_spanish: pozo
  alternatives_spanish:
  - foso
  - hoyo
  - zanja
  lexicon: BDAG
  rationale: Aunque «pit» admite varias opciones, «pozo» comunica bien la caída peligrosa y es idiomático en español; se mantiene la amplitud semántica sin forzar un tecnicismo.
- source_word: ἐμπεσοῦνται
  english_pob_choice: fall into
  chosen_spanish: caerán en
  alternatives_spanish:
  - caerán dentro de
  - van a caer en
  lexicon: BDAG
  rationale: La futura idea de ἐμπεσοῦνται se expresa de forma natural con futuro simple en español.
theological_decisions:
- issue: Uso representativo del masculino singular τυφλός
  english_pob_reading: a blind man ... a blind man
  chosen_spanish_reading: un ciego ... otro ciego
  alternative_spanish_readings:
  - una persona ciega ... una persona ciega
  - el ciego ... el ciego
  rationale: Se conserva el carácter proverbial y la forma masculina singular del griego, sin perder naturalidad en español. «Otro ciego» ayuda a evitar una repetición rígida y sigue siendo fiel al paralelismo del dicho.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca explícitamente en el texto español. No se añadieron notas sin anclaje en el versículo.
  spanish_consistency_notes:
  - Se mantiene un español bíblico claro y contemporáneo.
  - «También» reproduce el valor aditivo de καὶ sin sonar forzado.
  - «Pozo» conserva una imagen concreta y comprensible; se anota la alternativa léxica «foso».
  - La pregunta retórica final se conserva como interrogación directa para reflejar el tono del griego.
