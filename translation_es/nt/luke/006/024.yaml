    rationale: Aunque comprensible, esta formulación suena menos idiomática en español que una relativa explícita («ustedes que son ricos») o una aposición mejor puntuada. El griego адресa directamente a una clase; en español actual la relativa lo expresa con más naturalidad.
  - severity: low
    issue: El adverbio «ya» añade énfasis no explícito
    rationale: «Han recibido» ya comunica anterioridad/resultatividad. «Ya» puede ser inferido, pero no está en el griego y carga un poco más la frase de lo necesario.
  - severity: low
    issue: Falta el signo de cierre de exclamación
    rationale: En español normativo debe cerrarse la exclamación de «¡ay...!» con «!» antes de continuar la oración.
  revised_spanish_text: Pero ¡ay de ustedes que son ricos![b][a] porque han recibido su consuelo.
