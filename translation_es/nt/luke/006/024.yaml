translation:
  language: es
  text: Pero ¡ay de ustedes que son ricos![b][a] porque han recibido su consuelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han recibido su consuelo en plenitud». El verbo ἀπέχετε puede sugerir recepción completa o plena.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «consolación». παράκλησις puede significar también consolación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - No obstante
  - Sin embargo
  lexicon: BDAG
  rationale: Introduce el contraste adversativo con lo anterior. «Pero» es natural en español y conserva la fuerza de transición de πλήν sin volverlo más pesado de lo necesario.
- source_word: οὐαὶ
  english_pob_choice: woe
  chosen_spanish: ¡ay!
  alternatives_spanish:
  - ¡ay de!
  - ¡ay para!
  lexicon: BDAG
  rationale: En español, la fórmula profética de juicio se expresa de forma más idiomática con «¡ay de…!». Mantiene el tono de denuncia y lamentación judicial del griego.
- source_word: ὑμῖν τοῖς πλουσίοις
  english_pob_choice: to you who are rich
  chosen_spanish: de ustedes, los ricos
  alternatives_spanish:
  - a ustedes, los ricos
  - para ustedes, los ricos
  lexicon: BDAG
  rationale: El dativo de apelación se naturaliza en español con una construcción vocativa. «Los ricos» conserva el grupo sustantivado del adjetivo sin añadir interpretación.
- source_word: πλουσίοις
  english_pob_choice: rich
  chosen_spanish: ricos
  alternatives_spanish:
  - adinerados
  - acaudalados
  lexicon: BDAG
  rationale: «Ricos» es el equivalente más directo y transparente. «Adinerados» o «acaudalados» son posibles, pero menos naturales en este dicho de advertencia.
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón del ay. «Porque» expresa con claridad la causalidad que el texto griego señala.
- source_word: ἀπέχετε
  english_pob_choice: you have received
  chosen_spanish: han recibido
  alternatives_spanish:
  - están recibiendo
  - han recibido en plenitud
  lexicon: BDAG
  rationale: 'ἀπέχω puede significar recibir algo plenamente o tenerlo en posesión. El español principal sigue la lectura ya fijada en la revisión inglesa: un perfecto resultativo («han recibido»), que comunica que su consuelo ya quedó obtenido. La opción de presente se evita para no suavizar la fuerza del verbo.'
- source_word: παράκλησιν
  english_pob_choice: comfort
  chosen_spanish: consuelo
  alternatives_spanish:
  - consolación
  - aliento
  lexicon: BDAG
  rationale: «Consuelo» corresponde bien a παράκλησις en este contexto de alivio presente contrapuesto al juicio venidero. «Consolación» se preserva como alternativa válida, pero suena algo más abstracta en español actual.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: de ustedes
  alternatives_spanish:
  - suyo
  - de vosotros
  lexicon: BDAG
  rationale: El posesivo se expresa de forma natural con «de ustedes» para mantener el registro latinoamericano neutral y evitar ambigüedad de concordancia.
theological_decisions:
- issue: Tono del dicho de juicio
  english_pob_reading: The verse is rendered as a direct woe against those who are rich, without softening it into a mere lament or importing a broader doctrinal explanation not stated in the text.
  chosen_spanish_reading: El versículo se traduce como una denuncia directa contra los ricos, sin suavizarlo como mera exclamación lamentosa ni ampliar su alcance más allá de lo que el texto dice.
  alternative_spanish_readings:
  - ¡Ay, ricos!
  - Desdichados los ricos
  rationale: El griego οὐαί en este contexto profético conserva una carga de juicio. La formulación española debe mantener esa severidad sin añadir explicaciones sobre causas morales no explicitadas en el versículo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor temporal/aspectual de ἀπέχετε
  english_pob_reading: 'The main text keeps a present-oriented sense: ''you are receiving your comfort.'''
  chosen_spanish_reading: 'El texto principal usa un perfecto resultativo: «han recibido su consuelo», preservando la idea de que ya lo obtuvieron como pago o por completo.'
  alternative_spanish_readings:
  - están recibiendo su consuelo
  - han recibido su consuelo en plenitud
  rationale: Aunque el presente griego puede leerse como estado actual, el verbo también admite el matiz de recibir en pleno. En español, el perfecto comunica mejor esa tensión sin borrar la posibilidad de un sentido consumado o completo.
  doctrine_reference: Translation philosophy §§3, 5, 6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió entender ἀπέχετε con un sentido consumado ('you have received') en lugar de un presente progresivo. Por eso el español principal adopta un perfecto resultativo ('han recibido'), evitando una lectura progresiva que debilitaría el matiz lexical; al mismo tiempo, se conserva en nota la alternativa de plenitud/completitud y el valor léxico de παράκλησις.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton ni κύριος en alusión directa.
  - Se mantiene «consuelo» en el texto principal por su naturalidad; «consolación» queda como alternativa documentada.
  - «ricos» reproduce el sustantivo adjetival sin expandir a 'personas ricas', para conservar brevedad y fuerza.
  - El registro es neutral latinoamericano, con puntuación exclamativa para reflejar la fórmula profética de juicio.
