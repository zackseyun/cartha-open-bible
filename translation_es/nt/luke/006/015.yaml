translation:
  language: es
  text: y Mateo y Tomás, y Santiago hijo de Alfeo, y Simón llamado el Zelote[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Simón llamado el celoso». El título griego puede funcionar como epíteto y no exige por sí solo decidir si se trata de una pertenencia formal a un movimiento político posterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conjunción coordinante simple en una lista de nombres. Se repite en español para conservar el ritmo catalogal del griego y del POB inglés.
- source_word: Μαθθαῖον
  english_pob_choice: Matthew
  chosen_spanish: Mateo
  alternatives_spanish:
  - Matías
  lexicon: BDAG
  rationale: Nombre propio transliterado al uso español común y reconocido en la tradición bíblica hispana.
- source_word: Θωμᾶν
  english_pob_choice: Thomas
  chosen_spanish: Tomás
  alternatives_spanish:
  - Thomas
  lexicon: BDAG
  rationale: Nombre propio transliterado al uso español común.
- source_word: Ἰάκωβον Ἁλφαίου
  english_pob_choice: James son of Alphaeus
  chosen_spanish: Santiago, hijo de Alfeo
  alternatives_spanish:
  - Jacobo, hijo de Alfeo
  - Santiago de Alfeo
  lexicon: BDAG
  rationale: En español bíblico, Ἰάκωβος puede equivaler a 'Santiago' o 'Jacobo'. Aquí se elige 'Santiago' por ser la forma más ampliamente inteligible y eclesialmente reconocible en español moderno. El genitivo Ἁλφαίου expresa relación filial; 'hijo de' comunica esa relación de forma natural y precisa.
- source_word: Σίμωνα
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simon
  lexicon: BDAG
  rationale: Nombre propio transliterado al uso español común.
- source_word: τὸν καλούμενον
  english_pob_choice: who was called
  chosen_spanish: al que llamaban
  alternatives_spanish:
  - que era llamado
  - llamado
  lexicon: BDAG
  rationale: El participio pasivo con artículo funciona como rasgo identificador. 'Al que llamaban' conserva el valor de apelativo identificador en un español natural y evita una construcción demasiado rígida.
- source_word: Ζηλωτὴν
  english_pob_choice: the Zealot
  chosen_spanish: el Zelote
  alternatives_spanish:
  - el Celoso
  - el celoso
  lexicon: BDAG
  rationale: '''Zelote'' preserva el epíteto tradicional sin decidir de más si se trata de una etiqueta descriptiva o de una asociación histórica precisa. ''Celoso'' en español podría sonar a rasgo moral general y perder la posible carga identitaria del título.'
theological_decisions:
- issue: Cómo renderizar Ζηλωτής sin resolver en exceso su trasfondo histórico
  english_pob_reading: The Zealot as an identifying title without further interpretive expansion; the Greek does not require deciding formal party membership.
  chosen_spanish_reading: el Zelote como título identificador, sin añadir una explicación histórica más específica
  alternative_spanish_readings:
  - el celoso como epíteto descriptivo
  - miembro del partido de los zelotes
  rationale: La traducción mantiene la ambigüedad productiva del griego y del POB inglés. 'El Zelote' permite leerlo como sobrenombre/título sin imponer una reconstrucción histórica que el texto no explicita.
  doctrine_reference: Preservar la ambigüedad textual donde el original no la resuelve.
translation_notes:
  revision_awareness: El texto inglés revisado ajustó la formulación de James son of Alphaeus para reflejar con mayor cercanía el genitivo griego, manteniendo naturalidad. En español se refleja esa misma precisión con 'hijo de Alfeo'. También se preserva la decisión de no forzar una lectura histórica cerrada de Ζηλωτής.
  spanish_consistency_notes:
  - Se mantiene el patrón de nombres propios con transliteración española estándar.
  - '''Santiago'' se usa para Ἰάκωβος conforme al uso bíblico español más extendido en contextos eclesiales.'
  - El epíteto final conserva mayúscula inicial por tratarse de designación identificadora dentro de la lista de nombres.
