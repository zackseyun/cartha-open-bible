  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Mateo», «Tomás», «Santiago», «Alfeo», «Simón» y «el Zelote» son adecuados. «El Zelote» preserva bien la ambigüedad documentada. La excepción principal es formal: la nota léxica sobre «Zelote» debe anclarse en esa expresión, no en «Tomás».'
