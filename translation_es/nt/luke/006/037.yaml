review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien κρίνετε/καταδικάζετε como «juzguen/condenen» y conserva el paralelismo básico. Sin embargo, falla en ἀπολύετε / ἀπολυθήσεσθε: el expediente inglés finalmente fijó la lectura principal contextual como «Forgive, and you will be forgiven», dejando la amplitud léxica para nota. El español principal «Suelten, y se les soltará» no refleja con fidelidad esa decisión auditada y además suena semántica y sintácticamente extraño en este contexto.'
  spanish_quality_summary: '«Y no juzguen … y no serán juzgados» es legible y dignificado, aunque algo repetitivo por la coordinación griega, lo cual es aceptable. El principal problema de calidad es «Suelten, y se les soltará»: en español eclesial general no comunica naturalmente perdón/absolución recíproca, y «se les soltará» resulta torpe e idiomáticamente débil. Conviene usar «Perdonen, y serán perdonados» en el texto principal y trasladar la amplitud de ἀπολύω a nota.'
  glossary_alignment: No hay conflicto con los términos por defecto del proyecto en este versículo. La revisión propuesta mantiene «juzgar», «condenar» y adopta «perdonar» para ἀπολύω según la resolución contextual del POB inglés, preservando la alternativa léxica amplia en nota.
  issues:
  - severity: high
    issue: El texto principal usa «Suelten, y se les soltará» para ἀπολύετε / ἀπολυθήσεσθε.
    rationale: La pista de auditoría inglesa terminó adoptando «Forgive, and you will be forgiven» como lectura principal. «Suelten» no transmite de manera natural esa relación ética en español y «se les soltará» no es una forma idiomática adecuada aquí.
  - severity: medium
    issue: La nota [a] está anclada en «juzguen», mientras la mayor ambigüedad léxica relevante del versículo está en ἀπολύετε.
    rationale: El inglés conserva nota sobre la alternativa léxica de ἀπολύω. En español es más útil anclar la nota en «Perdonen» para explicar que el verbo también puede significar «soltar», «liberar» o «dejar en libertad».
  - severity: low
    issue: No se refleja en nota la amplitud semántica documentada de ἀπολύω.
    rationale: Si se usa «Perdonen» en el texto principal por naturalidad contextual, debe conservarse en nota la opción más amplia, para respetar la evidencia léxica y la filosofía del proyecto.
  revised_spanish_text: Y no juzguen, y no serán juzgados; y no condenen, y no serán condenados. Perdonen[a], y serán perdonados.
