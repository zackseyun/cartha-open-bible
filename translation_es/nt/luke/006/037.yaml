translation:
  language: es
  text: Y no juzguen, y no serán juzgados; y no condenen, y no serán condenados. Perdonen[a], y serán perdonados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Suelten», «liberen» o «dejen en libertad». El griego ἀπολύω puede significar «soltar», «liberar», «dejar ir» o, en este contexto, entenderse como «perdonar».
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίνετε
  english_pob_choice: judge
  chosen_spanish: juzguen
  alternatives_spanish:
  - emitan juicio
  - juzguen en contra
  lexicon: BDAG
  rationale: κρίνω aquí conserva el sentido básico de ejercer juicio o pronunciar una evaluación. «Juzguen» es el equivalente natural y breve en español, y mantiene el paralelismo con el pasivo siguiente.
- source_word: οὐ μὴ κριθῆτε
  english_pob_choice: you will certainly not be judged
  chosen_spanish: no serán juzgados
  alternatives_spanish:
  - no serán ciertamente juzgados
  - de ningún modo serán juzgados
  lexicon: BDAG
  rationale: La construcción enfática οὐ μή se expresa en español con la negación simple más el futuro pasivo, que comunica bien la promesa/advertencia sin sonar forzado. Se evita sobrecargar con adverbios que en español pueden sonar artificiales aquí.
- source_word: καταδικάζετε
  english_pob_choice: condemn
  chosen_spanish: condenen
  alternatives_spanish:
  - declaren culpables
  - sentencien
  lexicon: BDAG
  rationale: καταδικάζω intensifica κρίνω y tiene fuerza forense de condenar o declarar culpable. «Condenen» preserva esa escalada semántica mejor que un término más débil.
- source_word: οὐ μὴ καταδικασθῆτε
  english_pob_choice: you will certainly not be condemned
  chosen_spanish: no serán condenados
  alternatives_spanish:
  - no serán ciertamente condenados
  - de ningún modo serán condenados
  lexicon: BDAG
  rationale: Se mantiene la misma estrategia que en el primer pasivo para conservar el paralelismo y la fuerza de la negación enfática, sin añadir elementos innecesarios al español.
- source_word: ἀπολύετε
  english_pob_choice: Forgive
  chosen_spanish: Suelten
  alternatives_spanish:
  - Perdonen
  - Liberen
  - Dejen ir
  lexicon: BDAG
  rationale: 'El POB inglés preservó la amplitud léxica de ἀπολύω en la primera redacción («Release») y luego reconoció que, en este contexto, «Forgive» es la lectura más natural. En español, «suelten» conserva también esa amplitud: puede abarcar liberar, dejar ir o soltar una reclamación, sin estrechar prematuramente el verbo a «perdonen».'
- source_word: ἀπολυθήσεσθε
  english_pob_choice: you will be forgiven
  chosen_spanish: se les soltará
  alternatives_spanish:
  - serán perdonados
  - serán liberados
  lexicon: BDAG
  rationale: Se mantiene la correspondencia verbal con ἀπολύετε y el mismo campo semántico que en el imperativo anterior. «Se les soltará» es deliberadamente amplio; evita fijar de antemano una equivalencia exclusiva con perdón, aunque esa sea una interpretación posible en el contexto.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - entonces
  lexicon: BDAG
  rationale: Se conserva la coordinación repetida del griego con «y», manteniendo el ritmo paratáctico y el paralelismo de las cláusulas.
theological_decisions:
- issue: Cómo traducir ἀπολύω en un dicho que relaciona no juzgar, no condenar y la reciprocidad del trato recibido
  english_pob_reading: The main English reading settled on 'Forgive, and you will be forgiven,' while earlier audit notes preserved 'Release' to retain lexical breadth.
  chosen_spanish_reading: Suelten, y se les soltará.
  alternative_spanish_readings:
  - Perdonen, y se les perdonará
  - Liberen, y se les liberará
  - Dejen ir, y se les dejará ir
  rationale: La frase española conserva la apertura semántica del verbo griego sin borrar la tensión interpretativa documentada por el POB inglés. «Suelten» puede leerse como soltar una reclamación, dejar ir a alguien o liberar; por eso funciona como equivalente amplio en el texto principal, mientras que las opciones más estrechas quedan disponibles como lecturas alternativas.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Cómo reflejar la negación enfática οὐ μή en los dos pasivos
  english_pob_reading: you will certainly not be judged / condemned
  chosen_spanish_reading: no serán juzgados / no serán condenados
  alternative_spanish_readings:
  - no serán ciertamente juzgados / condenados
  - de ningún modo serán juzgados / condenados
  rationale: El español permite comunicar adecuadamente la fuerza de οὐ μή mediante el futuro pasivo y la negación simple. Añadir «ciertamente» sería posible, pero no es indispensable y puede volver el texto menos fluido. La gravedad del aviso queda clara por el paralelismo y el contexto.
  doctrine_reference: Translation philosophy §§2, 4
- issue: Si el tercer miembro debe fijar de antemano la lectura 'perdonar'
  english_pob_reading: The English revision ultimately preferred 'Forgive' in context, though the audit trail explicitly noted the broader range of ἀπολύω.
  chosen_spanish_reading: Suelten
  alternative_spanish_readings:
  - Perdonen
  - Liberen
  rationale: No se borra la tensión léxica documentada. En español, «suelten» evita convertir una polisemia real en una sola interpretación doctrinal o pastoral, pero sigue siendo naturalmente compatible con la lectura de perdón cuando se entiende en el flujo del dicho.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisión inglés: la primera redacción favorecía «Release / will be released», y la revisión posterior optó por «Forgive / will be forgiven» por naturalidad contextual. La versión española no copia mecánicamente ninguna de las dos, sino que conserva la amplitud léxica en el texto principal con «suelten» y documenta la alternativa más estrecha en las decisiones léxicas y teológicas.'
  spanish_consistency_notes:
  - 'Se mantiene el mismo verbo raíz en los dos miembros pasivos: «juzgados / condenados» y la misma construcción perifrástica en el cierre para conservar la simetría.'
  - «Suelten» evita introducir «perdonen» como única solución, respetando la polisemia de ἀπολύω documentada por el POB.
  - Se usa español neutral y público, con imperativos de ustedes en forma de tercera persona plural para lectura litúrgica o eclesial amplia.
  - No se añade ningún marcador de énfasis inexistente en el griego; la fuerza recae en la negación y el paralelismo.
