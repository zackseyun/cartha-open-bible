    reason: lexical_alternative
  revision_rationale: Se corrige el tercer miembro para alinearlo con la decisión final auditada del POB inglés y con el uso natural del español en este contexto de no juzgar/no condenar. La amplitud léxica real de ἀπολύω se preserva en una nota, donde pertenece, en lugar de imponer en el texto principal una formulación poco idiomática.
