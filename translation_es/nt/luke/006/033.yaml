translation:
  language: es
  text: Y si hacen bien a los que les hacen bien a ustedes[a], ¿qué mérito se les reconoce? También los pecadores hacen lo mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿qué gracia tienen?». El término griego puede significar «gracia», «favor», «agradecimiento» o «crédito»; aquí se refiere al reconocimiento que recibe una bondad recíproca.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαθοποιῆτε
  english_pob_choice: do good
  chosen_spanish: hacen bien
  alternatives_spanish:
  - hacen el bien
  - obran bien
  - hacen lo bueno
  lexicon: BDAG
  rationale: El verbo expresa hacer el bien o beneficiar a otros. 'Hacen bien' suena natural en español y preserva la conexión verbal con el participio posterior, sin volver la frase más pesada de lo necesario.
- source_word: τοὺς ἀγαθοποιοῦντας ὑμᾶς
  english_pob_choice: those who do good to you
  chosen_spanish: a los que les hacen bien a ustedes
  alternatives_spanish:
  - a los que hacen bien para ustedes
  - a quienes les hacen el bien
  - a los que obran bien con ustedes
  lexicon: BDAG
  rationale: Mantiene la misma raíz semántica de ἀγαθοποιέω en la cláusula principal y en el participio, y expresa de forma natural la relación beneficiaria del griego con 'les... a ustedes'.
- source_word: ποία ... χάρις
  english_pob_choice: what credit
  chosen_spanish: ¿qué crédito tienen?
  alternatives_spanish:
  - ¿qué gracia tienen?
  - ¿qué favor reciben?
  - ¿qué agradecimiento tienen?
  lexicon: BDAG
  rationale: En este contexto, χάρις no apunta a la gracia salvadora sino a reconocimiento o mérito por un bien recíproco. 'Crédito' comunica bien la idea de commendación/valor reconocido en español y conserva la fuerza retórica de la pregunta.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: tienen
  alternatives_spanish:
  - les corresponde
  - para ustedes hay
  - a ustedes les toca
  lexicon: BDAG
  rationale: La dativa se integra en español con la pregunta '¿qué crédito tienen?' para expresar el beneficio o reconocimiento que recae sobre los oyentes, sin introducir una perífrasis innecesaria.
- source_word: ἁμαρτωλοὶ
  english_pob_choice: sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los que pecan
  - las personas pecadoras
  lexicon: BDAG
  rationale: '''Pecadores'' es la equivalencia directa y estándar para el grupo social-religioso al que se refiere Lucas, sin suavizar el término.'
- source_word: τὸ αὐτὸ ποιοῦσιν
  english_pob_choice: do the same
  chosen_spanish: hacen lo mismo
  alternatives_spanish:
  - hacen lo mismo también
  - hacen la misma cosa
  lexicon: BDAG
  rationale: Es una traducción idiomática y precisa de la expresión griega. 'Lo mismo' conserva el paralelismo con la afirmación anterior y resulta natural en español.
theological_decisions:
- issue: Sentido de χάρις en un contexto ético-retributivo
  english_pob_reading: commendation or credit rather than theological grace
  chosen_spanish_reading: crédito o reconocimiento, no gracia soteriológica
  alternative_spanish_readings:
  - gracia
  - favor
  - agradecimiento
  rationale: El contexto retórico pregunta qué reconocimiento especial reciben por devolver bien por bien. Traducirlo como 'gracia' introduciría un sentido teológico que no está en la argumentación inmediata; 'crédito' preserva la tensión del texto.
  doctrine_reference: 'Translation philosophy: primacía del sentido original sobre la tradición de traducción; no importar categorías doctrinales ajenas al contexto inmediato.'
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo estable en la revisión más reciente; el español sigue esa lectura sin cambios sustantivos, conservando el contraste retórico entre hacer bien a los que hacen bien y la conducta ordinaria de los pecadores.
  spanish_consistency_notes:
  - Se mantiene 'crédito' para χάρις en este contexto, en línea con la decisión inglesa, evitando una traducción devocional que borre la pregunta retórica.
  - Se conserva 'pecadores' para ἁμαρτωλοὶ como término social-religioso directo.
  - La repetición de 'hacen bien' / 'hacen lo mismo' preserva el paralelismo léxico del griego.
  - Se usa 'ustedes' para una segunda persona plural neutral y ampliamente readable en español latinoamericano.
