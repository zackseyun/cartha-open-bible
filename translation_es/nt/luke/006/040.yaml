translation:
  language: es
  text: Un discípulo no está por encima de su maestro[a], pero todo discípulo, cuando esté plenamente formado[b], será como su maestro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Un estudiante no está por encima de su maestro.”'
    reason: lexical_alternative
  - marker: b
    text: 'O: “cuando haya sido equipado / preparado”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαθητής
  english_pob_choice: disciple
  chosen_spanish: discípulo
  alternatives_spanish:
  - estudiante
  lexicon: BDAG
  rationale: “Discípulo” conserva la relación formativa y de seguimiento personal del término griego, más fuerte que “estudiante”, que en español sugiere ante todo un ámbito académico.
- source_word: ὑπὲρ
  english_pob_choice: above
  chosen_spanish: por encima de
  alternatives_spanish:
  - más que
  - sobre
  lexicon: BDAG
  rationale: En este contexto comparativo, “por encima de” comunica bien la idea de rango o superioridad relativa sin sonar forzado en español.
- source_word: διδάσκαλος
  english_pob_choice: teacher
  chosen_spanish: maestro
  alternatives_spanish:
  - maestro
  - docente
  - instructor
  lexicon: BDAG
  rationale: “Maestro” es el equivalente natural y reverente en español para διδάσκαλος en un dicho sobre discípulo y enseñanza, y evita la posible frialdad de “docente”.
- source_word: κατηρτισμένος
  english_pob_choice: when fully trained
  chosen_spanish: plenamente formado
  alternatives_spanish:
  - plenamente entrenado
  - plenamente preparado
  - equipado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de καταρτίζω expresa estar hecho apto o completado en formación. “Plenamente formado” refleja esa idea de preparación concluida sin introducir un matiz técnico ajeno.
- source_word: πᾶς
  english_pob_choice: everyone
  chosen_spanish: todo el que
  alternatives_spanish:
  - cada uno
  - todos
  lexicon: BDAG
  rationale: Aunque el griego usa un singular masculino genérico, “todo el que” expresa con naturalidad en español el valor distributivo y proverbial sin perder la referencia general.
- source_word: ὡς
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  lexicon: BDAG
  rationale: Aquí ὡς introduce comparación; “como” es la forma más directa y natural en español.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El posesivo español “su” reproduce de manera natural la referencia genérica y mantiene la correspondencia con el singular masculino del griego sin sobrecargar el texto.
theological_decisions:
- issue: Referencia genérica masculina en el proverbio
  english_pob_reading: Retain masculine singular reference with "his teacher" while rendering πᾶς as "everyone."
  chosen_spanish_reading: Conservar la referencia genérica mediante “todo el que” y “su maestro”.
  alternative_spanish_readings:
  - todos ... su maestro
  - toda persona ... su maestro
  - su maestro / su maestra
  rationale: El griego presenta una formulación masculina singular de alcance genérico. En español, “todo el que” conserva ese valor proverbial y evita neutralizaciones que puedan oscurecer la correspondencia formal del original. “Su maestro” mantiene el posesivo genérico natural del español.
  doctrine_reference: DOCTRINE.md § Translation philosophy, punto 4
- issue: Valor del participio perfecto pasivo κατηρτισμένος
  english_pob_reading: everyone when fully trained
  chosen_spanish_reading: todo el que esté plenamente formado
  alternative_spanish_readings:
  - todo el que, una vez plenamente formado
  - todo el que haya sido plenamente formado
  - todo el que esté equipado
  rationale: El participio no obliga a una paráfrasis extensa; en español, una relativa con subjuntivo (“todo el que esté...”) comunica adecuadamente la condición general o resultante del estado de formación, sin añadir una cronología más explícita que la del griego. “Plenamente formado” mantiene la idea de preparación consumada.
  doctrine_reference: BDAG, καταρτίζω; revisión POB 2026-04-23
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió “when fully trained” en lugar de “who has been fully trained” para reflejar con mayor cercanía la construcción participial griega y evitar implicar una condición completada previa en exceso. La redacción española sigue ese ajuste con una relativa condicional/prospectiva (“todo el que esté plenamente formado”), manteniendo la comparativa proverbial y la fuerza del participio perfecto pasivo.
  spanish_consistency_notes:
  - Se usa “discípulo” en lugar de “estudiante” por la carga relacional del término.
  - Se mantiene “maestro” para διδάσκαλος, coherente con el dicho y con el español eclesial leído de manera amplia.
  - La comparación final con “como su maestro” conserva la estructura breve y proverbial del griego.
  - No se introduce “Cristo”, “Señor” ni otra terminología no presente en el verso.
