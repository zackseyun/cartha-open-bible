translation:
  language: es
  text: ¡Ay de ustedes, los que ahora están saciados, porque tendrán hambre.[a] ¡Ay de ustedes,[b] los que ahora ríen, porque se lamentarán y llorarán!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sentirán hambre».
    reason: lexical_alternative
  - marker: b
    text: O «¡Ay por ustedes!»
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes
  lexicon: BDAG
  rationale: Conserva el tono profético de advertencia y juicio. En español, «¡Ay de» transmite de manera natural la interjección de denuncia sin suavizarla en mera compasión. Se mantiene la dirección a la segunda persona plural indicada por ὑμῖν.
- source_word: ἐμπεπλησμένοι
  english_pob_choice: are full
  chosen_spanish: están saciados
  alternatives_spanish:
  - están llenos
  - han sido llenados
  - están satisfechos
  lexicon: BDAG
  rationale: 'El participio perfecto expresa un estado presente resultante: están en condición de plenitud/saciedad. «Saciados» comunica ese estado con naturalidad en español y conserva el contraste con el hambre futura.'
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - hoy
  lexicon: BDAG
  rationale: Marca el contraste temporal central entre la condición presente y la inversión futura del dicho.
- source_word: πεινάσετε
  english_pob_choice: you will be hungry
  chosen_spanish: tendrán hambre
  alternatives_spanish:
  - pasarán hambre
  - hambrearán
  lexicon: BDAG
  rationale: El futuro indica una carencia venidera. «Tendrán hambre» es claro y natural; mantiene la fuerza de la reversión sin forzar un calco poco idiomático.
- source_word: γελῶντες
  english_pob_choice: are laughing
  chosen_spanish: ríen
  alternatives_spanish:
  - están riendo
  - se ríen
  lexicon: BDAG
  rationale: El participio presente describe a quienes están en una acción actual. En español, «ríen» funciona de forma sobria y fluida; el contexto ya aporta el sentido de estado presente.
- source_word: πενθήσετε
  english_pob_choice: you will mourn
  chosen_spanish: se lamentarán
  alternatives_spanish:
  - harán duelo
  - estarán de luto
  lexicon: BDAG
  rationale: El verbo denota lamento/duelo. «Se lamentarán» preserva la gravedad del futuro de pérdida y evita encerrar el sentido solo en un rito funerario específico.
- source_word: κλαύσετε
  english_pob_choice: weep
  chosen_spanish: llorarán
  alternatives_spanish:
  - sollozarán
  - verterán lágrimas
  lexicon: BDAG
  rationale: 'Mantiene la distinción con πενθήσετε: primero el lamento, luego el llanto. «Llorarán» es la forma más natural y fiel para expresar el llanto audible.'
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: σύ
  rationale: El dativo de destinatario se expresa con naturalidad en español con «de ustedes» dentro de la interjección «¡Ay de ustedes!». Evita una duplicación pesada y conserva el destinatario directo del reproche.
theological_decisions:
- issue: Naturaleza profética del «¡ay!»
  english_pob_reading: A prophetic warning of coming reversal and judgment on those presently satisfied and carefree
  chosen_spanish_reading: Una advertencia profética de inversión venidera y juicio sobre quienes ahora viven satisfechos y despreocupados
  alternative_spanish_readings:
  - Una observación neutral sobre cambios de fortuna
  - Una simple expresión de tristeza
  rationale: El doble «¡ay!», junto con los futuros, comunica más que una constatación sociológica. La traducción conserva la fuerza de advertencia y la tensión escatológica sin especificar un mecanismo no indicado por el texto.
  doctrine_reference: Mantener la tensión teológica sin resolverla
- issue: Alcance de πενθήσετε καὶ κλαύσετε
  english_pob_reading: you will mourn and weep
  chosen_spanish_reading: se lamentarán y llorarán
  alternative_spanish_readings:
  - harán duelo y llorarán
  - se entristecerán y llorarán
  rationale: Se preserva la progresión entre duelo/lamento y llanto, evitando fusionar ambos verbos. Así se conserva el énfasis retórico del texto griego y la gravedad del anuncio.
  doctrine_reference: Distinción léxica y retórica entre duelo y llanto
translation_notes:
  revision_awareness: El texto inglés revisado añadió «to you» en la segunda exclamación para hacer explícito el dativo griego y mantener la simetría con la primera cláusula. En español se reflejó esa simetría con «¡Ay de ustedes!» en ambas mitades, y se preservó el paralelismo de los dos anuncios de reversión.
  spanish_consistency_notes:
  - Se mantuvo «¡Ay de» como equivalente recurrente de οὐαί, conforme al valor profético del término.
  - Se evitó «Cristo» o terminología no pertinente; el verso no contiene referencias cristológicas.
  - Se distinguió entre «saciados» y «tendrán hambre», y entre «se lamentarán» y «llorarán», para conservar el contraste verbal del griego.
  - El plural de segunda persona se expresó de forma natural para público bíblico latinoamericano.
  - Se eligió un español sobrio y publicable, sin calco excesivo del inglés ni del griego.
