    issue: La nota [a] es incorrecta
    rationale: La nota dice «O «tendrán hambre»», que repite exactamente la traducción principal del futuro πεινάσετε en vez de ofrecer la alternativa documentada por la auditoría inglesa.
  - severity: medium
