review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: la cláusula temporal, la convocatoria de los discípulos, la selección de doce de entre ellos y la designación como apóstoles. También preserva correctamente la distinción entre προσεφώνησεν y ὠνόμασεν mediante ''llamó'' y ''nombró''. Sin embargo, ''habiendo elegido'' suena algo pesado y menos natural en español bíblico contemporáneo; una formulación finita coordina mejor la secuencia sin perder el valor participial contextual.'
  spanish_quality_summary: 'El español es claro y fiel, pero la puntuación y la frase participial resultan algo rígidas: ''y, habiendo elegido a doce de entre ellos'' suena traducido. ''Y escogió de entre ellos a doce'' o ''y eligió de entre ellos a doce'' es más natural y plenamente comprensible. Además, conviene mantener el anclaje [b] exactamente sobre la frase relevante en el texto revisado.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'discípulos' y 'apóstoles' están bien elegidos. La distinción verbal 'llamó' / 'nombró' sigue correctamente la auditoría inglesa. No intervienen términos sensibles del glosario mayor como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: Construcción participial poco natural en español
    rationale: El griego usa un participio aoristo (ἐκλεξάμενος), pero en español 'habiendo elegido' suena más forzado que una cláusula verbal coordinada. La fidelidad no requiere calcar la forma participial si el sentido secuencial se preserva mejor con 'y escogió/eligió'.
  - severity: low
    issue: Puntuación algo sobrecargada
    rationale: La coma tras 'y' antes de 'habiendo elegido' entorpece la lectura. Una estructura más directa mejora la fluidez sin alterar el contenido.
  revised_spanish_text: Y cuando llegó el día[a], llamó a sus discípulos y escogió de entre ellos a doce, a quienes también nombró apóstoles[b],
  revised_footnotes:
  - marker: a
    text: O 'cuando se hizo día'. El griego expresa la llegada del día; se eligió una formulación natural en español.
    reason: lexical_alternative
  - marker: b
    text: O 'a quienes también llamó apóstoles'. El verbo puede significar 'nombró' o 'llamó'; aquí 'nombró' distingue mejor este verbo del anterior 'llamó'.
    reason: lexical_alternative
  revision_rationale: Se suaviza una construcción participial rígida y se mejora la fluidez del español manteniendo intacto el sentido del griego y la distinción léxica documentada entre 'llamó' y 'nombró'. 'Escogió de entre ellos a doce' conserva con claridad la fuerza de selección desde un grupo mayor.
