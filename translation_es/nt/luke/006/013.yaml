base_translation:
  language: en
  yaml_path: translation/nt/luke/006/013.yaml
  text: And when day came[a], he called his disciples, and chose twelve from among them[b], whom he also named apostles.
  footnotes:
  - marker: a
    text: Or 'summoned his disciples.' The Greek verb can mean 'called to' or 'addressed,' but here the context favors gathering them for selection.
    reason: lexical_alternative
  - marker: b
    text: Or 'whom he also called apostles.' The verb means 'named' or 'called'; 'named' is used in the main text to distinguish it from the earlier 'called' for summoning the disciples.
    reason: lexical_alternative
