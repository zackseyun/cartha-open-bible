translation:
  language: es
  text: Y cuando llegó el día[a], llamó a sus discípulos y escogió de entre ellos a doce, a quienes también nombró apóstoles[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuando se hizo día'. El griego expresa la llegada del día; se eligió una formulación natural en español.
    reason: lexical_alternative
  - marker: b
    text: O 'a quienes también llamó apóstoles'. El verbo puede significar 'nombró' o 'llamó'; aquí 'nombró' distingue mejor este verbo del anterior 'llamó'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε ἐγένετο ἡμέρα
  english_pob_choice: when day came
  chosen_spanish: cuando llegó el día
  alternatives_spanish:
  - cuando amaneció
  - cuando vino el día
  lexicon: BDAG
  rationale: Expresa de manera natural en español la llegada del día sin perder la idea temporal del griego; evita una construcción mecánica como 'cuando se hizo día'.
- source_word: προσεφώνησεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó a
  lexicon: BDAG
  rationale: '''Llamó'' conserva el valor de reunir o llamar hacia sí en este contexto, coherente con la selección posterior; ''convocó'' sería más explicativo y menos directo.'
- source_word: μαθητὰς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - aprendices
  lexicon: BDAG
  rationale: '''Discípulos'' es el término establecido y claro en contexto evangélico, preservando la relación de seguimiento y aprendizaje.'
- source_word: ἐκλεξάμενος
  english_pob_choice: chose
  chosen_spanish: habiendo elegido
  alternatives_spanish:
  - habiendo escogido
  - después de elegir
  lexicon: BDAG
  rationale: El participio aoristo se vierte de forma participial en español para mantener la relación temporal y lógica con la llamada previa.
- source_word: ἀπ’ αὐτῶν δώδεκα
  english_pob_choice: twelve from among them
  chosen_spanish: a doce de entre ellos
  alternatives_spanish:
  - doce entre ellos
  - doce de entre ellos
  lexicon: BDAG
  rationale: '''De entre ellos'' explicita correctamente que los doce fueron seleccionados de un grupo mayor, como hace el inglés auditado.'
- source_word: ἀποστόλους
  english_pob_choice: apostles
  chosen_spanish: apóstoles
  alternatives_spanish:
  - enviados
  - mensajeros
  lexicon: BDAG
  rationale: Se conserva el término técnico y narrativo tradicional 'apóstoles', que en español transmite mejor la designación establecida por Jesús que una paráfrasis como 'enviados'.
- source_word: ὠνόμασεν
  english_pob_choice: named
  chosen_spanish: nombró
  alternatives_spanish:
  - llamó
  - designó
  lexicon: BDAG
  rationale: '''Nombró'' evita la ambigüedad de repetir ''llamó'' para dos verbos distintos y comunica con claridad que Jesús les dio esa designación.'
theological_decisions:
- issue: 'Cómo verter ἀποστόλους: título técnico o descripción literal'
  english_pob_reading: apostles
  chosen_spanish_reading: apóstoles
  alternative_spanish_readings:
  - enviados
  - mensajeros
  rationale: La palabra funciona aquí como designación dada por Jesús a los doce; mantener 'apóstoles' preserva su fuerza narrativa y eclesial sin añadir explicaciones doctrinales ajenas al versículo.
  doctrine_reference: Translation philosophy §2 (translate titles; transliterate names) and §6 (readable modern Spanish)
- issue: Diferenciar προσεφώνησεν de ὠνόμασεν
  english_pob_reading: called / named
  chosen_spanish_reading: llamó / nombró
  alternative_spanish_readings:
  - convocó / llamó
  - llamó / designó
  rationale: Usar dos verbos distintos en español evita perder la distinción del griego y sigue la decisión auditada de no traducir ambos con 'llamó'.
  doctrine_reference: Principio de diferenciación lexical y fidelidad al contraste verbal del texto
translation_notes:
  revision_awareness: Se corrigió el problema anterior anclando explícitamente cada nota en el texto español con [a] y [b]. La redacción mantiene la distinción entre el llamado inicial de los discípulos y la designación de los doce como apóstoles, conforme al audit trail inglés y al griego.
  spanish_consistency_notes:
  - Se mantiene 'apóstoles' como término técnico estable en lugar de 'enviados' o 'mensajeros'.
  - Se usa 'llamó' para προσεφώνησεν y 'nombró' para ὠνόμασεν para conservar la distinción verbal.
  - La frase 'de entre ellos' refleja con claridad ἀπ’ αὐτῶν y evita ambigüedad sobre el grupo del que fueron escogidos.
