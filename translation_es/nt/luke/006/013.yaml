revisions:
- from: Y cuando llegó el día[a], llamó a sus discípulos, y, habiendo elegido a doce de entre ellos, a quienes también nombró apóstoles[b],
  to: Y cuando llegó el día[a], llamó a sus discípulos y escogió de entre ellos a doce, a quienes también nombró apóstoles[b],
