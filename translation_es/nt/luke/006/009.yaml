translation:
  language: es
  text: 'Pero Jesús les dijo: «Les pregunto: ¿es lícito en sábado hacer el bien o hacer daño[a], salvar una vida[b] o destruirla?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacer el mal». El griego contrapone «hacer el bien» con una acción mala o dañina; en este contexto, «hacer daño» se prefiere porque encaja mejor con el contraste siguiente entre salvar y destruir.
    reason: lexical_alternative
  - marker: b
    text: O «un alma». Aquí se prefiere «vida» porque el contexto trata de preservar o destruir la vida de una persona, no de hacer una afirmación explícita sobre el alma.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: «Pero» reproduce el leve contraste y la transición narrativa cuando Jesús responde a la situación y al escrutinio de sus interlocutores.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar y directo; no requiere ajuste.
- source_word: Ἐπερωτῶ
  english_pob_choice: I ask
  chosen_spanish: Les pregunto
  alternatives_spanish:
  - Pregunto
  - Les hago una pregunta
  lexicon: BDAG
  rationale: En español, «les pregunto» conserva el valor de reto/interpelación del verbo sin sonar artificial. El pronombre explícito mantiene la dirección a los oyentes.
- source_word: εἰ ἔξεστιν
  english_pob_choice: is it lawful
  chosen_spanish: ¿es lícito?
  alternatives_spanish:
  - ¿está permitido?
  - ¿es legal?
  lexicon: BDAG
  rationale: «Lícito» preserva la fuerza jurídico-ética del debate sobre la observancia del sábado mejor que una paráfrasis más general como «permitido».
- source_word: τῷ σαββάτῳ
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - el día de reposo
  - en el sábado
  lexicon: BDAG
  rationale: «En sábado» es natural en español y conserva la referencia específica al día sagrado en cuestión. Se evita «día de reposo» por ser más interpretativo y más cargado de tradición.
- source_word: ἀγαθοποιῆσαι
  english_pob_choice: to do good
  chosen_spanish: hacer el bien
  alternatives_spanish:
  - hacer lo bueno
  - beneficiar
  lexicon: BDAG
  rationale: «Hacer el bien» expresa con claridad la acción moral positiva y mantiene el contraste ético con el verbo siguiente.
- source_word: κακοποιῆσαι
  english_pob_choice: to do harm
  chosen_spanish: hacer el mal
  alternatives_spanish:
  - hacer daño
  - hacer lo malo
  lexicon: BDAG
  rationale: El griego establece un contraste ético amplio; «hacer el mal» conserva esa polaridad sin reducirla solo a daño físico, aunque en contexto implique daño concreto. Se refleja así la tensión documentada entre «evil» y «harm».
- source_word: ψυχὴν
  english_pob_choice: a life
  chosen_spanish: una vida
  alternatives_spanish:
  - un alma
  - una persona
  - la vida
  lexicon: BDAG
  rationale: En la combinación con «salvar/destruir», ψυχή se entiende concretamente como vida. «Una vida» preserva esa referencia práctica sin introducir una antropología ajena al contexto.
- source_word: σῶσαι
  english_pob_choice: to save
  chosen_spanish: salvar
  alternatives_spanish:
  - preservar
  - rescatar
  lexicon: BDAG
  rationale: «Salvar» mantiene la relación léxica con el verbo común en el resto del NT y encaja con la oposición inmediata a «destruirla».
- source_word: ἀπολέσαι
  english_pob_choice: to destroy it
  chosen_spanish: destruirla
  alternatives_spanish:
  - destruirla
  - hacerla perecer
  - matarla
  lexicon: BDAG
  rationale: «Destruirla» sigue de cerca el antónimo de «salvar» y conserva la fuerza del verbo sin estrecharlo indebidamente a «matarla».
theological_decisions:
- issue: Sentido de ψυχή en la pregunta de Jesús
  english_pob_reading: Rendered concretely as “a life ... destroy it” rather than “a soul ... lose it.”
  chosen_spanish_reading: «una vida ... destruirla» en vez de «un alma ... perderla».
  alternative_spanish_readings:
  - «un alma ... destruirla»
  - «una persona ... destruirla»
  rationale: El contexto inmediato es la sanidad en sábado y la preservación o daño de una vida humana, no una afirmación doctrinal explícita sobre el alma. Por eso se conserva la referencia concreta a la vida y la tensión lexical sin forzar categorías posteriores.
  doctrine_reference: Mantener la primacía del lenguaje original y preservar la tensión teológica donde el texto la deja abierta.
translation_notes:
  revision_awareness: La presente redacción sigue el texto griego SBLGNT y el rastro auditado en inglés de la POB. No se detectaron revisiones aplicadas en el paquete de referencia, y la redacción española conserva la misma decisión central sobre ψυχή como «vida» y sobre ἔξεστιν como pregunta de licitud.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se evita «día de reposo» para no importar una tradición terminológica no exigida por el griego.
  - Se mantiene el contraste ético explícito entre «hacer el bien» y «hacer el mal»/«hacer daño», y entre «salvar una vida» y «destruirla».
