base_translation:
  language: en
  yaml_path: translation/nt/luke/006/009.yaml
  text: But Jesus said to them[a], “I ask you, is it lawful on the Sabbath to do good or to do harm[b], to save a life or to destroy it?”
  footnotes:
  - marker: a
    text: Or “to do evil” for “to do harm.” The Greek sets up an ethical contrast between doing good and doing bad/harmful action.
    reason: lexical_alternative
  - marker: b
    text: Or “to save a soul or destroy it.” Here “life” is preferred because the context is the preservation or destruction of a person’s life.
    reason: lexical_alternative
