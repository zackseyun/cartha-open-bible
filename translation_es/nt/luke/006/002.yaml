translation:
  language: es
  text: 'Pero algunos de los fariseos dijeron[a]: «¿Por qué hacen lo que no es lícito en el sábado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «en los sábados» (plural), una forma idiomática común para referirse al sábado.
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὲς
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - unos
  - ciertos
  lexicon: BDAG
  rationale: El griego introduce un subconjunto indefinido de los fariseos. «Algunos» comunica bien esa indefinición en español sin sugerir totalidad ni especificidad excesiva.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un giro narrativo y de contraste respecto del contexto inmediato. «Pero» conserva ese matiz confrontativo de manera natural en español.
- source_word: Φαρισαίων
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - Fariseos
  lexicon: BDAG
  rationale: Nombre de grupo transliterado de forma estándar. En español, el sustantivo común se escribe en minúscula dentro de la frase.
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - decían
  lexicon: BDAG
  rationale: 'Aoristo narrativo de habla directa: «dijeron» expresa el evento sin añadir duración o habitualidad.'
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  lexicon: BDAG
  rationale: Aunque literalmente corresponde a «qué», en esta pregunta con ποιεῖτε la fuerza idiomática es de reproche o cuestionamiento causal. «¿Por qué» reproduce mejor el sentido.
- source_word: ποιεῖτε
  english_pob_choice: are you doing
  chosen_spanish: hacen
  alternatives_spanish:
  - están haciendo
  - hacen ustedes
  lexicon: BDAG
  rationale: La segunda persona plural del griego funciona como interrogación directa; en español «hacen» resulta natural y mantiene la acusación implícita sin forzar una perífrasis progresiva.
- source_word: ὃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - qué
  - aquello que
  lexicon: BDAG
  rationale: El relativo neutro introduce la acción cuestionada. «Lo que» conserva la referencia a un acto concreto sin sonar artificioso.
- source_word: ἔξεστιν
  english_pob_choice: is lawful
  chosen_spanish: es lícito
  alternatives_spanish:
  - está permitido
  - es legal
  lexicon: BDAG
  rationale: En controversias sobre observancia del sábado, la cuestión es de licitud religiosa y normativa. «Es lícito» preserva mejor el tono jurídico-religioso que opciones más generales.
- source_word: τοῖς σάββασιν
  english_pob_choice: on the Sabbaths
  chosen_spanish: en los sábados
  alternatives_spanish:
  - en el sábado
  - durante el sábado
  lexicon: BDAG
  rationale: El plural griego se mantiene de forma transparente en la traducción principal. «En los sábados» suena poco idiomático pero deja visible la forma del original, útil para un texto POB auditable.
theological_decisions:
- issue: Plural griego de «Sabbaths» frente al uso idiomático español singular
  english_pob_reading: on the Sabbaths
  chosen_spanish_reading: en los sábados
  alternative_spanish_readings:
  - en el sábado
  - durante el sábado
  rationale: El griego usa τοῖς σάββασιν en plural. Se conserva el plural en el texto principal por transparencia formal, aun cuando el español común suele decir «en el sábado»; la rareza de la forma refleja el dato del original y evita ocultarlo.
  doctrine_reference: 'Translation philosophy #1 y #5'
- issue: Fuerza del reproche sobre observancia sabática
  english_pob_reading: what is not lawful on the Sabbaths
  chosen_spanish_reading: lo que no es lícito en los sábados
  alternative_spanish_readings:
  - lo que no está permitido en el sábado
  - lo que no es legal en el sábado
  rationale: La formulación mantiene el marco de licitud/ilicitud presente en el debate sabático, sin reducirlo a mera conveniencia o permiso social. Esto preserva la tensión legal-religiosa del texto.
  doctrine_reference: Contexto legal de la observancia del sábado en los Evangelios
translation_notes:
  revision_awareness: El texto fuente y el audit trail en inglés no requieren revisiones textuales adicionales. Se conserva la tensión del plural griego en la expresión sabática y la fuerza idiomática de la pregunta reprochadora.
  spanish_consistency_notes:
  - Se mantiene «fariseos» y no «Fariseos» dentro de la oración, por norma ortográfica española para nombres de grupos étnico-religiosos comunes.
  - Se evita «SEÑOR» o formulaciones tradicionales no presentes en el versículo; el foco léxico está en la licitud sabática.
  - 'La pregunta se traduce en segunda persona plural de cortesía implícita/no marcada: «hacen», coherente con el griego plural y con el registro narrativo bíblico.'
  - «Lo que» preserva el neutro relativo sin sobrecargar la frase con una perífrasis más pesada.
