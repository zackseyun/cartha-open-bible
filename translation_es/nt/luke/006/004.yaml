  to: ¿cómo entró en la casa de Dios[a], y tomó y comió los panes de la Presencia, y dio de ellos a los que estaban con él, los cuales no es lícito comer excepto solo los sacerdotes?
  rationale: Se corrige la cláusula relativa final para que exprese con claridad que solo los sacerdotes pueden comer esos panes, se hace más natural la referencia al pan dado a los acompañantes con «dio de ellos», y se añade la puntuación interrogativa española. Se conserva la nota léxica sobre «los panes de la Presencia».
