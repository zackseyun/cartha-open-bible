translation:
  language: es
  text: ¿cómo entró en la casa de Dios[a], y tomó y comió los panes de la Presencia, y dio de ellos a los que estaban con él, los cuales no es lícito comer excepto solo los sacerdotes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pan consagrado»; tradicionalmente, «el pan de la proposición».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - que
  lexicon: BDAG
  rationale: En este contexto de referencia al acto de David, ὡς introduce la manera o el contenido de la acción citada. «Cómo» reproduce bien esa función interrogativa/explicativa en español sin endurecer el sintagma como una simple conjunción.
- source_word: εἰσῆλθεν εἰς τὸν οἶκον τοῦ θεοῦ
  english_pob_choice: entered into the house of God
  chosen_spanish: entró en la casa de Dios
  alternatives_spanish:
  - entró en la casa de Dios
  - entró a la casa de Dios
  - entró en el templo de Dios
  lexicon: BDAG
  rationale: Se conserva el movimiento de εἰσῆλθεν + εἰς con «entró en». «Casa de Dios» sigue de cerca οἶκος τοῦ θεοῦ y evita sustituir el término por «templo», que sería más interpretativo que el texto griego.
- source_word: ἄρτους τῆς προθέσεως
  english_pob_choice: the bread of the Presence
  chosen_spanish: los panes de la Presencia
  alternatives_spanish:
  - el pan de la Presencia
  - los panes de la proposición
  - los panes de la presencia
  lexicon: BDAG
  rationale: El plural griego ἄρτους se refleja naturalmente con «los panes». «De la Presencia» preserva la referencia cultual del sustantivo χωρίς imponer la traducción tradicional «de la proposición» o la más arcaica «showbread».
- source_word: λαβὼν ἔφαγεν
  english_pob_choice: took and ate
  chosen_spanish: tomó y comió
  alternatives_spanish:
  - habiendo tomado, comió
  - tomó, y comió
  lexicon: BDAG
  rationale: La coordinación verbal en español comunica con claridad la secuencia de acciones del participio aoristo seguido del verbo principal, sin añadir información no presente en el griego.
- source_word: ἔδωκεν τοῖς μετ’ αὐτοῦ
  english_pob_choice: gave some to those with him
  chosen_spanish: dio a los que estaban con él
  alternatives_spanish:
  - dio a los que iban con él
  - dio a sus compañeros
  - dio a los que estaban con él
  lexicon: BDAG
  rationale: 'Se mantiene la expresión relacional más cercana al griego: «los que estaban con él». No se añadió «algo» o «algunos» porque el griego no lo expresa explícitamente, y el contexto ya deja claro que lo dado son los panes.'
- source_word: οὐκ ἔξεστιν
  english_pob_choice: it is not lawful
  chosen_spanish: no es lícito
  alternatives_spanish:
  - no está permitido
  - no es permitido
  - no es legal
  lexicon: BDAG
  rationale: «No es lícito» conserva la fuerza jurídico-sacral de ἔξεστιν mejor que una mera prohibición social. En español eclesial suena natural y mantiene el matiz de ley/permiso que sostiene el argumento del pasaje.
- source_word: φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: comer
  alternatives_spanish:
  - para comer
  - a comer
  lexicon: BDAG
  rationale: El infinitivo queda bien en español como verbo en forma simple dentro de la cláusula impersonal («no es lícito comer»), sin necesidad de una perífrasis más pesada.
- source_word: εἰ μὴ μόνους τοὺς ἱερεῖς
  english_pob_choice: except for the priests alone
  chosen_spanish: sino solo los sacerdotes
  alternatives_spanish:
  - excepto solo los sacerdotes
  - salvo solo los sacerdotes
  - sino únicamente los sacerdotes
  lexicon: BDAG
  rationale: «Sino solo los sacerdotes» expresa la exclusividad de εἰ μή + μόνους. Se elige «sacerdotes» por ser el equivalente natural de ἱερεῖς en español bíblico; «solo» refleja μόνους sin recargar la frase con una construcción poco idiomática.
theological_decisions:
- issue: Restricción legal/cultual del pan sagrado
  english_pob_reading: Rendered ἔξεστιν as 'it is not lawful' to preserve the verse's appeal to priestly law rather than mere social custom.
  chosen_spanish_reading: «No es lícito» conserva la referencia a una norma reconocida de ley cultual, no solo a una costumbre o conveniencia.
  alternative_spanish_readings:
  - no está permitido
  - no es permitido
  - no se puede
  rationale: La escena depende de una restricción vinculada a la legislación sacerdotal de Israel. «Lícito» comunica mejor esa dimensión jurídica y religiosa que una expresión más genérica.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que eliminó el añadido «some»/«also» por no estar explícito en el griego. Por eso el español no introduce cuantificador alguno en «dio a los que estaban con él». También se mantuvo la opción revisada «bread of the Presence» como base para «panes de la Presencia», en vez de recurrir a la forma tradicional «showbread».
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se mantiene «casa de Dios» en vez de «templo» para respetar οἶκος.
  - Se traduce el plural ἄρτους como «panes» para no borrar la forma plural del griego.
  - No se añade «algo» o «algunos» en la segunda cláusula, siguiendo la revisión auditada del texto inglés.
  - «Sacerdotes» se usa para ἱερεῖς por ser el término bíblico natural en español, conservando la exclusividad marcada por μόνους.
