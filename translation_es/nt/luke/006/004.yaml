  revision_rationale: Se corrige la cláusula relativa final para que exprese con claridad que solo los sacerdotes pueden comer esos panes, se hace más natural la referencia al pan dado a los acompañantes con «dio de ellos», y se añade la puntuación interrogativa española. Se conserva la nota léxica sobre «los panes de la Presencia».
