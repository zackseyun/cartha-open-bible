translation:
  language: es
  text: Sucedió en otro sábado que él entró en la sinagoga y estaba enseñando[a]. Y había allí un hombre que tenía la mano derecha atrofiada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enseñaba». El presente del infinitivo griego expresa acción en curso; la traducción conserva ese matiz con una forma progresiva.
    reason: lexical_alternative
  - marker: b
    text: O «marchita». Literalmente, «seca». El adjetivo griego ξηρός puede describir algo seco o marchito; aquí se refiere a la mano derecha incapacitada del hombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now it happened
  chosen_spanish: Ahora bien, ocurrió
  alternatives_spanish:
  - Y aconteció
  - Ahora sucedió
  lexicon: γίνομαι / δέ
  rationale: En Lucas, la fórmula introduce un nuevo episodio narrativo. «Ahora bien» recoge el valor discursivo suave de δέ, y «ocurrió» conserva el carácter eventivo sin sonar arcaico.
- source_word: ἐν ἑτέρῳ σαββάτῳ
  english_pob_choice: on another Sabbath
  chosen_spanish: en otro sábado
  alternatives_spanish:
  - en otro día de sábado
  - en un sábado diferente
  lexicon: ἕτερος / σάββατον
  rationale: «Otro sábado» reproduce el mismo referente de día de reposo/sábado sin añadir explicaciones. «En» preserva la circunstancia temporal de la frase griega.
- source_word: εἰσελθεῖν αὐτὸν εἰς τὴν συναγωγὴν
  english_pob_choice: that he entered the synagogue
  chosen_spanish: que él entró en la sinagoga
  alternatives_spanish:
  - al entrar él en la sinagoga
  - que él ingresó en la sinagoga
  lexicon: εἰσέρχομαι / συναγωγή
  rationale: La estructura infinitiva del griego queda mejor como subordinada narrativa en español. «Sinagoga» es el equivalente directo de συναγωγή.
- source_word: καὶ διδάσκειν
  english_pob_choice: and was teaching
  chosen_spanish: y estaba enseñando
  alternatives_spanish:
  - y enseñaba
  - y enseñaba allí
  lexicon: διδάσκω
  rationale: El infinitivo presente expresa acción en curso; por eso «estaba enseñando» comunica bien el aspecto imperfectivo sin convertirlo en un simple pasado puntual.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un varón
  lexicon: ἄνθρωπος
  rationale: El contexto identifica a un individuo masculino concreto. «Hombre» es natural y preciso en español.
- source_word: ἐκεῖ
  english_pob_choice: was there
  chosen_spanish: allí
  alternatives_spanish:
  - estaba allí
  - se hallaba allí
  lexicon: ἐκεῖ
  rationale: «Allí» reproduce la localización de manera concisa. En combinación con «había» evita redundancia excesiva en español.
- source_word: ἡ χεὶρ αὐτοῦ ἡ δεξιὰ
  english_pob_choice: whose right hand
  chosen_spanish: su mano derecha
  alternatives_spanish:
  - la mano derecha de él
  - su diestra
  lexicon: χείρ / δεξιός
  rationale: El griego destaca la mano como sujeto de la cláusula. «Su mano derecha» mantiene el sentido sin forzar una construcción relativa innecesaria. Se evita «diestra» por su tono más literario y menos transparente.
- source_word: ξηρά
  english_pob_choice: withered
  chosen_spanish: estaba seca
  alternatives_spanish:
  - estaba seca o atrofiada
  - estaba seca, es decir, paralizada
  lexicon: ξηρός
  rationale: La raíz básica de ξηρός es «seco», y aquí el griego describe una mano incapacitada por una condición seca/atrofiada. Se conserva la imagen literal con una redacción clara en español, sin borrar la tensión entre literalidad y sentido clínico. La nota permite la alternativa interpretativa.
theological_decisions:
- issue: Valor de σάββατον como sábado/reposo
  english_pob_reading: on another Sabbath
  chosen_spanish_reading: en otro sábado
  alternative_spanish_readings:
  - en otro día de reposo
  - en otro día de sábado
  rationale: El relato sitúa el episodio en el día sabático concreto. «Sábado» es el equivalente natural y más directo; «día de reposo» explicita el trasfondo pero añade interpretación que el contexto no exige.
  doctrine_reference: Ninguno; decisión temporal y cultural
- issue: Descripción de la mano enferma
  english_pob_reading: withered
  chosen_spanish_reading: estaba seca
  alternative_spanish_readings:
  - estaba con la mano seca
  - estaba atrofiada
  rationale: 'No se suaviza la condición: la mano aparece incapacitante y el texto griego usa ξηρός. «Seca» conserva la metáfora corporal; la nota aclara la lectura contextual de una extremidad dañada.'
  doctrine_reference: Ninguno; decisión léxico-descriptiva
translation_notes:
  revision_awareness: El borrador sigue de cerca el acuerdo alto del texto fuente y del audit trail inglés, sin cambios de revisión necesarios. Se preserva el valor narrativo introductorio, la simultaneidad de la enseñanza y la descripción física de la mano con una solución española transparente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantiene «sinagoga» como término estable para συναγωγή.
  - Se conserva «sábado» para σάββατον, en coherencia con el registro bíblico estándar y con la referencia al día sabático.
  - Se evita «SEÑOR» o «Cristo», pues no aparecen en el versículo.
  - La puntuación y el orden buscan sonar naturales en español sin perder la secuencia del griego.
