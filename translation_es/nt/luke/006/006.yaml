    text: O «marchita». Literalmente, «seca». El adjetivo griego ξηρός puede describir algo seco o marchito; aquí se refiere a la mano derecha incapacitada del hombre.
    reason: lexical_alternative
  revision_rationale: La revisión mantiene toda la información del texto griego y del audit trail inglés, pero mejora la naturalidad y precisión en español. «Sucedió» conserva la transición narrativa lucana sin el calco más duro de «ocurrió ... que». La relativa «que tenía la mano derecha atrofiada» expresa de forma clara y natural la condición del hombre. Se reemplaza «seca» en el texto principal por «atrofiada» para reflejar mejor ξηρά en contexto de curación, mientras que la nota preserva la alternativa literal «seca» y la cercana «marchita». Se elimina «manca» por ser incorrecto.
