    rationale: El griego usa singular en σε, δίδου y ἀπαίτει. Aunque el plural puede sonar inclusivo, aquí no hay justificación documentada para apartarse de la forma fuente, y el cambio afecta la fidelidad formal del dicho.
  - severity: low
    issue: «Quite» puede sobreinterpretar αἴροντος
    rationale: La revisión inglesa final cambió de 'takes away' a 'takes' para acercarse más al griego. «Quite» introduce más explícitamente la idea de despojo/remoción; no es erróneo, pero «tome» preserva mejor la amplitud del original.
  - severity: low
