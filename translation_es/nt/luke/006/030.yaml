translation:
  language: es
  text: Dale a todo el que te pida[a], y al que tome lo que es tuyo, no se lo reclames[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «A cualquiera que te pida, dale».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no se lo pidas de vuelta»; o «no lo exijas de vuelta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: παντὶ
  english_pob_choice: to everyone
  chosen_spanish: a todo el que
  alternatives_spanish:
  - a cada uno
  - a cualquiera
  lexicon: BDAG
  rationale: El dativo distributivo con el participio pide una expresión amplia y natural. «A todo el que» conserva la universalidad sin sonar rígido ni más restringido que el griego.
- source_word: αἰτοῦντί
  english_pob_choice: who asks
  chosen_spanish: que les pida
  alternatives_spanish:
  - que les solicite
  - que les ruegue
  lexicon: BDAG
  rationale: «Pedir» en español refleja bien αἰτέω como hacer una petición. «Ruegue» introduciría un matiz más intenso; «solicite» sonaría demasiado formal.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - te
  - a ustedes
  lexicon: BDAG
  rationale: El singular griego se adapta en español de forma inclusiva y natural con el plural de cortesía/contexto comunitario «les», manteniendo el destinatario directo sin forzar un singular artificial.
- source_word: δίδου
  english_pob_choice: Give
  chosen_spanish: Den
  alternatives_spanish:
  - Vayan dando
  - Sigan dando
  lexicon: BDAG
  rationale: El imperativo presente expresa una orden general o habitual. «Den» comunica con claridad el mandato sin sobrecargarlo con perífrasis que podrían hacer más explícita la continuidad de lo que el griego exige.
- source_word: ἀπὸ τοῦ αἴροντος
  english_pob_choice: from the one who takes
  chosen_spanish: al que les quite
  alternatives_spanish:
  - al que les toma
  - al que les arrebate
  lexicon: BDAG
  rationale: «Αἴρω» aquí puede abarcar quitar o llevarse lo ajeno. «Quite» reproduce bien esa idea de remoción/secuestro de lo que pertenece a otros, sin limitarlo a robo legal ni suavizarlo a un simple «tomar».
- source_word: τὰ σὰ
  english_pob_choice: what is yours
  chosen_spanish: lo que es de ustedes
  alternatives_spanish:
  - sus cosas
  - sus bienes
  - lo suyo
  lexicon: BDAG
  rationale: El neutro plural con posesivo apunta literalmente a «las cosas que son tuyas». «Lo que es de ustedes» mantiene esa amplitud y evita reducir el referente solo a bienes materiales.
- source_word: μὴ ἀπαίτει
  english_pob_choice: do not demand it back
  chosen_spanish: no se lo reclamen
  alternatives_spanish:
  - no lo exijan de vuelta
  - no pidan que se los devuelva
  lexicon: BDAG
  rationale: ἀπαιτέω puede significar reclamar, exigir o demandar de vuelta. «No se lo reclamen» conserva la fuerza de una prohibición contra insistir en recuperar lo quitado, y el pronombre lo(s) relaciona naturalmente con «lo que es de ustedes».
theological_decisions:
- issue: Alcance ético de los mandatos
  english_pob_reading: Render the commands straightforwardly as broad imperatives without softening or narrowing them by interpretation.
  chosen_spanish_reading: Traducir los mandatos de manera directa y amplia, sin limitar el sentido a limosna o a un contexto legal específico.
  alternative_spanish_readings:
  - Interpretarlo como hipérbole y suavizar la formulación
  - Restringirlo solo a dar limosna
  - Limitar la segunda cláusula a restitución por robo
  rationale: El griego presenta imperativos directos con lenguaje universal. La traducción debe preservar esa tensión ética sin resolver en el texto las discusiones interpretativas sobre su aplicación.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa reciente que afinó la segunda cláusula de «takes away» a «takes» por mayor cercanía a αἴροντος; en español se optó por «quite» para conservar el matiz de quitar/remover sin introducir una categoría legal más fuerte que la del griego. También se preservó la fuerza del imperativo negativo de ἀπαίτει con una formulación natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé/Mesías» según las reglas del proyecto; este versículo no requiere esos términos.
  - Se prefirió «den» como imperativo plural natural en español, acorde con el tono sentencioso del dicho.
  - Se evitó «pedir de vuelta» como principal porque en español puede sonar menos enérgico que ἀπαιτέω en este contexto.
