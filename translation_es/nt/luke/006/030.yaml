revisions:
- from: Den a todo el que les pida[a], y al que les quite lo que es de ustedes, no se lo reclamen[b].
  to: Dale a todo el que te pida[a], y al que tome lo que es tuyo, no se lo reclames[b].
  rationale: Se ajusta el verso al singular del griego para reflejar con más fidelidad la forma del mandato. Se cambia «quite» por «tome» para seguir mejor la revisión auditada del inglés POB y evitar sobreespecificar αἴροντος. Se mantiene «no se lo reclames» como equivalente natural de μὴ ἀπαίτει, con nota que conserva las alternativas documentadas de pedir/exigir de vuelta.
