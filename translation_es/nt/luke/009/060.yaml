translation:
  language: es
  text: 'Pero él le dijo: «Deja que los muertos[a] entierren a sus propios muertos; pero tú, ve y proclama el reino de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El primer «muertos» probablemente es metafórico (personas espiritualmente insensibles), mientras que el segundo se refiere a los físicamente muertos. El griego usa la misma palabra en ambos lugares, y la traducción conserva ese efecto.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄφες
  english_pob_choice: Leave
  chosen_spanish: Deja
  alternatives_spanish:
  - Dé
  - Permite
  lexicon: BDAG
  rationale: El imperativo aoristo de ἀφίημι aquí suena como una orden directa de desistir del pedido. En español, «Deja» conserva esa fuerza mejor que una formulación más suave como «Permite».
- source_word: τοὺς νεκροὺς ... τοὺς ἑαυτῶν νεκρούς
  english_pob_choice: the dead ... their own dead
  chosen_spanish: los muertos ... sus propios muertos
  alternatives_spanish:
  - los muertos ... sus muertos
  - los espiritualmente muertos ... sus propios muertos
  lexicon: BDAG
  rationale: Se conserva la repetición de «muertos» para mantener el efecto paradójico del griego. «Sus propios» refleja ἑαυτῶν con la misma intensidad que el inglés POB, sin resolver en el texto principal la tensión interpretativa entre el primer y el segundo uso.
- source_word: θάψαι
  english_pob_choice: to bury
  chosen_spanish: entierren
  alternatives_spanish:
  - sepulten
  - enterrar
  lexicon: BDAG
  rationale: Aunque el infinitivo griego expresa propósito, en español fluye mejor con subordinada final/mandato. «Entierren» comunica el acto de sepultar de forma clara y natural.
- source_word: ἑαυτῶν
  english_pob_choice: their own
  chosen_spanish: sus propios
  alternatives_spanish:
  - sus
  - de ellos mismos
  lexicon: BDAG
  rationale: El reflexivo añade énfasis. «Sus propios» preserva ese matiz mejor que un simple posesivo.
- source_word: ἀπελθὼν
  english_pob_choice: go and
  chosen_spanish: ve y
  alternatives_spanish:
  - después de ir
  - yendo
  lexicon: BDAG
  rationale: El participio aoristo se vierte con una secuencia natural en español, como hizo la revisión inglesa, evitando una solución rígida que sonaría forzada en este mandato paralelo.
- source_word: διάγγελλε
  english_pob_choice: proclaim
  chosen_spanish: proclama
  alternatives_spanish:
  - anuncia
  - declara
  lexicon: BDAG
  rationale: «Proclama» conserva el tono de anuncio público y solemne propio del contexto del reino; encaja con el matiz de heraldía que la POB preserva.
- source_word: βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios y su gobierno
  - la realeza de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la forma estable y contextualmente adecuada en español para βασιλεία τοῦ θεοῦ, manteniendo la expresión bíblica reconocible sin perder su sentido de soberanía divina.
theological_decisions:
- issue: Sentido de «los muertos» en la primera mitad de la sentencia
  english_pob_reading: Retain 'the dead' in both places without explicating metaphorical versus literal senses in the main text.
  chosen_spanish_reading: Mantener «los muertos» en ambos lugares sin explicitar en el texto principal si el primero es metafórico y el segundo literal.
  alternative_spanish_readings:
  - Deja que los espiritualmente muertos entierren a sus propios muertos
  rationale: La frase de Jesús es deliberadamente tajante y paradójica. Traducir «los espiritualmente muertos» resolvería una tensión interpretativa que el griego no marca de forma explícita; por eso se preserva la ambigüedad en el texto principal y se señala en nota.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó una secuencia más literal como «after going» por «go and proclaim» para reflejar ἀπελθὼν con mayor naturalidad; la versión española sigue esa misma lógica y evita un calco como «después de ir» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se conserva «reino» para βασιλεία, no «reinado», para alineación terminológica con la POB inglesa y con el uso bíblico estable en español.
  - Se evita introducir «Cristo», «SEÑOR» o una glosa explicativa en el texto principal, porque no están sustentados por este versículo.
  - La puntuación y el diálogo siguen normas tipográficas del español moderno, con comillas angulares y dos puntos antes de la cita.
