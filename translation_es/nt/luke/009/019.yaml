- from: 'Y ellos respondieron: «Juan el Bautista; pero otros, Elías; y otros, que uno de los profetas antiguos ha resucitado[a]».'
  to: 'Y ellos respondieron: «Juan el Bautista; pero otros, Elías; y otros, que uno de los profetas antiguos ha vuelto a levantarse[a]».'
