translation:
  language: es
  text: 'Y ellos respondieron: «Juan el Bautista; pero otros, Elías; y otros, que uno de los profetas antiguos ha vuelto a levantarse[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un profeta de hace mucho tiempo ha surgido». El griego también puede entenderse de manera más idiomática así.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθέντες εἶπαν
  english_pob_choice: they answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - les respondieron
  lexicon: BDAG
  rationale: El participio aoristo con verbo finito expresa una respuesta. En español, «respondieron» comunica el sentido de forma natural y conserva el valor de contestación sin añadir explicaciones.
- source_word: Ἰωάννην τὸν βαπτιστήν
  english_pob_choice: John the Baptist
  chosen_spanish: Juan el Bautista
  alternatives_spanish:
  - Juan el Bautizador
  lexicon: BDAG
  rationale: «Bautista» es el designativo usual y fiel en español para βαπτιστής en este contexto. Mantiene el nombre-título reconocido en la tradición bíblica sin perder precisión léxica.
- source_word: ἄλλοι δὲ ... ἄλλοι δὲ
  english_pob_choice: but others ... and others
  chosen_spanish: pero otros ... y otros
  alternatives_spanish:
  - unos ... otros
  - otros ... otros
  lexicon: BDAG
  rationale: Se conserva la repetición contrastiva de ἄλλοι δὲ. «Pero» expresa el primer contraste y «y» mantiene la lista fluida en español.
- source_word: Ἠλίαν
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elía
  lexicon: BDAG
  rationale: Es la forma española estándar del nombre del profeta.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - diciendo que
  - de que
  lexicon: BDAG
  rationale: Introduce el contenido de la opinión atribuida. «Que» es la forma más directa y natural en español.
- source_word: προφήτης τις
  english_pob_choice: one of the ancient prophets
  chosen_spanish: uno de los profetas antiguos
  alternatives_spanish:
  - algún profeta antiguo
  - un cierto profeta antiguo
  lexicon: BDAG
  rationale: τις aporta indefinición. «Uno de los profetas antiguos» reproduce esa indeterminación y sigue de cerca la comprensión avalada por la auditoría inglesa, sin cerrar la frase a una sola lectura.
- source_word: τῶν ἀρχαίων
  english_pob_choice: of the ancients
  chosen_spanish: de los profetas antiguos
  alternatives_spanish:
  - de los antiguos
  - de tiempos antiguos
  lexicon: BDAG
  rationale: El genitivo apunta a personas de tiempos antiguos. En español, «profetas antiguos» comunica con claridad esa pertenencia temporal y evita una construcción menos natural como «de los antiguos».
- source_word: ἀνέστη
  english_pob_choice: has risen
  chosen_spanish: ha resucitado
  alternatives_spanish:
  - ha surgido
  - ha resucitado
  lexicon: BDAG
  rationale: El verbo ἀνίστημι puede significar «levantarse/levantarse de nuevo» y, en ciertos contextos, resonar con resurrección. Aquí se mantiene esa tensión con «ha resucitado», que en español es viable como eco verbal, sin explicitar más de lo que el texto afirma.
theological_decisions:
- issue: Alcance de ἀνέστη y posible resonancia de resurrección
  english_pob_reading: has risen
  chosen_spanish_reading: ha resucitado
  alternative_spanish_readings:
  - ha surgido
  - ha aparecido de nuevo
  rationale: El contexto describe la especulación popular sobre la identidad de Jesús. «Ha resucitado» preserva la posibilidad semántica fuerte del verbo griego y deja abierta la tensión entre mera aparición y lenguaje de resurrección, sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica y semántica del verbo en contexto.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del auditorio inglés al entender τῶν ἀρχαίων como «one of the ancient prophets», pero lo expresa en español con una construcción natural («uno de los profetas antiguos»). Se evita la traducción mecánica desde el inglés cuando el griego permite una formulación más directa.
  spanish_consistency_notes:
  - Se mantiene «Juan el Bautista» como título estable en español.
  - Se conserva la alternancia contrastiva de ἄλλοι δὲ con «pero otros ... y otros».
  - Se usa «Elías» como forma española habitual del profeta.
  - 'Se traduce προφήτης τις con indefinición explícita: «uno de los profetas antiguos».'
  - Se deja la posible resonancia de ἀνέστη sin imponer una doctrina más definida que la del contexto.
