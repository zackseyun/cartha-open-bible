review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: respuesta plural, identificación de Juan el Bautista, contraste repetido con «otros», y la cláusula final sobre un profeta antiguo. Sin embargo, «ha resucitado» va más allá del matiz de ἀνέστη tal como lo preserva la auditoría inglesa con «has risen», porque en español «resucitar» afirma la resurrección de manera más explícita. Aquí conviene una forma más abierta como «ha resucitado/ha surgido» no basta; el texto principal debe evitar resolver la tensión.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse con una formulación más natural y fiel en la cláusula final. «Uno de los profetas antiguos» funciona bien. El resto del verso es idiomático y digno. La nota también debe alinearse con la alternativa inglesa y con la nueva redacción principal.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto en nombres propios ni títulos. «Juan el Bautista» y «Elías» están bien. El único desajuste relevante es lexical-teológico: ἀνέστη no debería fijarse como «resucitó/ha resucitado» en el texto principal cuando el inglés auditado preserva una ambigüedad más amplia.'
  issues:
  - severity: high
    issue: «ha resucitado» es demasiado específico para ἀνέστη en este contexto
    rationale: El griego puede evocar resurrección, pero no la afirma con la precisión doctrinal que «resucitado» tiene en español moderno. La decisión inglesa auditada eligió «has risen» precisamente para conservar la tensión semántica sin resolverla.
  - severity: low
    issue: La nota al pie no refleja de la mejor manera la alternativa auditada
    rationale: La alternativa inglesa es «a prophet from long ago has arisen». En español conviene ofrecer «ha surgido» o «ha aparecido» como alternativa idiomática, pero el texto principal debería quedar como «ha vuelto a levantarse» para conservar el eco verbal sin sobreinterpretar.
  revised_spanish_text: 'Y ellos respondieron: «Juan el Bautista; pero otros, Elías; y otros, que uno de los profetas antiguos ha vuelto a levantarse[a]».'
