translation:
  language: es
  text: Ahora bien, Herodes el tetrarca oyó hablar de todo lo que estaba sucediendo[a], y estaba perplejo, porque algunos decían que Juan fue levantado[b] de entre los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se enteró de».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Juan había resucitado de entre los muertos». El verbo griego es pasivo, literalmente «fue levantado» o «había sido levantado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤκουσεν
  english_pob_choice: heard about
  chosen_spanish: oyó acerca de
  alternatives_spanish:
  - oyó
  - se enteró de
  lexicon: BDAG
  rationale: ἀκούω puede significar simplemente 'oír', pero aquí el objeto es un conjunto de acontecimientos; 'oyó acerca de' expresa en español la recepción de informes sobre esos hechos sin perder naturalidad narrativa.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ introduce el avance del relato con una conexión suave. 'Ahora bien' cumple esa función discursiva en español sin añadir contraste fuerte.
- source_word: ὁ τετραάρχης
  english_pob_choice: the tetrarch
  chosen_spanish: el tetrarca
  alternatives_spanish:
  - el gobernante de la cuarta parte
  lexicon: BDAG
  rationale: τετραάρχης es un título político-histórico específico. 'Tetrarca' conserva el cargo de forma directa y evita diluirlo en una paráfrasis.
- source_word: τὰ γινόμενα πάντα
  english_pob_choice: all that was happening
  chosen_spanish: todo lo que estaba sucediendo
  alternatives_spanish:
  - todas las cosas que estaban sucediendo
  - todo lo que estaba pasando
  lexicon: BDAG
  rationale: La frase participial imperfectiva describe hechos en curso. 'Todo lo que estaba sucediendo' mantiene ese aspecto progresivo y suena natural en español.
- source_word: διηπόρει
  english_pob_choice: was perplexed
  chosen_spanish: estaba perplejo
  alternatives_spanish:
  - estaba muy confundido
  - estaba desconcertado
  lexicon: BDAG
  rationale: διαπορέω expresa estar en incertidumbre o perplejidad. 'Estaba perplejo' es fiel y estilísticamente sobrio.
- source_word: διὰ τὸ λέγεσθαι ὑπό τινων
  english_pob_choice: because it was being said by some
  chosen_spanish: porque algunos decían
  alternatives_spanish:
  - porque era dicho por algunos
  - porque se decía por algunos
  lexicon: BDAG
  rationale: El infinitivo articular con διά expresa causa. En español, 'porque algunos decían' comunica la causa de manera natural; la pasiva griega se conserva mejor en la nota, para no forzar una construcción poco idiomática.
- source_word: ἠγέρθη
  english_pob_choice: had been raised
  chosen_spanish: había sido levantado
  alternatives_spanish:
  - había sido resucitado
  - había resucitado
  lexicon: BDAG
  rationale: El pasivo de ἐγείρω debe conservarse. 'Había sido levantado' refleja la forma pasiva de manera más cercana, mientras que 'resucitado' o 'había resucitado' desplazarían la voz o harían más explícita la interpretación teológica.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: La expresión griega es un giro idiomático de resurrección; 'de entre los muertos' es la correspondencia más estable y natural en español bíblico.
theological_decisions:
- issue: Voz pasiva en la afirmación sobre Juan
  english_pob_reading: had been raised from the dead
  chosen_spanish_reading: había sido levantado de entre los muertos
  alternative_spanish_readings:
  - había resucitado de entre los muertos
  - había sido resucitado de entre los muertos
  rationale: La forma griega ἠγέρθη es pasiva. Mantener una pasiva en español preserva la tensión textual sin resolverla en una formulación activa. 'Levantado' sigue la literalidad del verbo, aunque la nota explica que el sentido de resurrección es el de 'resucitado'.
  doctrine_reference: Preservar la forma verbal y la tensión textual.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: δέ como conector suave, ἀκούω como recepción de informes, τετραάρχης como título histórico, διαπορέω como perplejidad, y ἐγείρω en pasivo preservado en español con nota explicativa. No se aplicaron revisiones posteriores; el estado final del paquete inglés permanece sin cambios.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto no aplicable en este versículo.
  - Se evitó 'Cristo' porque no aparece en el texto fuente.
  - Se usó 'de entre los muertos' para conservar el giro idiomático de resurrección.
  - La pasiva de ἠγέρθη se reflejó con 'había sido levantado' y se aclaró en nota la alternativa más idiomática 'resucitado'.
