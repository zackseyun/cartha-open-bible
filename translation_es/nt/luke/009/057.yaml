  - severity: medium
    issue: Duplicación innecesaria de notas léxicas
    rationale: El inglés auditado conserva una sola nota para ὅπου ἐὰν ἀπέρχῃ. En español se crearon dos notas que explican casi lo mismo, lo que recarga el texto sin aportar una distinción nueva necesaria.
  - severity: low
    issue: Formulación alternativa menos precisa en la nota
    rationale: «Adondequiera que salgas» no es imposible, pero «dondequiera que vayas» o «adondequiera que te dirijas» refleja mejor el valor contextual de ἀπέρχῃ sin sugerir una salida desde interior/exterior.
  revised_spanish_text: 'Y mientras iban por el camino, alguien le dijo: «Te seguiré adondequiera que vayas[a]».'
