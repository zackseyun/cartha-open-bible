translation:
  language: es
  text: 'Y mientras iban por el camino, alguien le dijo: «Te seguiré adondequiera que vayas[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «dondequiera que vayas» o «adondequiera que te marches».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πορευομένων αὐτῶν
  english_pob_choice: as they were going along
  chosen_spanish: mientras iban
  alternatives_spanish:
  - mientras viajaban
  - cuando iban caminando
  lexicon: BDAG
  rationale: El participio genitivo indica una acción simultánea en curso. «Mientras iban» preserva esa simultaneidad de manera natural en español y evita una construcción demasiado pesada.
- source_word: ἐν τῇ ὁδῷ
  english_pob_choice: along the road
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - a lo largo del camino
  lexicon: BDAG
  rationale: ὁδός puede ser «camino» o «vía». En este contexto narrativo concreto, «por el camino» suena natural en español y conserva la escena de desplazamiento sin perder la referencia física.
- source_word: εἶπέν τις
  english_pob_choice: someone said
  chosen_spanish: alguien le dijo
  alternatives_spanish:
  - una persona le dijo
  - cierto hombre le dijo
  lexicon: BDAG
  rationale: τις es indefinido. «Alguien» refleja mejor la falta de identificación del hablante que «un hombre», que añadiría un matiz no explícito en el griego.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - hacia él
  lexicon: BDAG
  rationale: Con un verbo de decir, el dativo de destinatario en español normalmente se expresa con el clítico «le». Mantiene la relación interpersonal sin calcar la preposición.
- source_word: Ἀκολουθήσω σοι
  english_pob_choice: I will follow you
  chosen_spanish: Te seguiré
  alternatives_spanish:
  - Seguiré a ti
  - Te voy a seguir
  lexicon: BDAG
  rationale: El futuro expresa intención o compromiso. «Seguiré» conserva el valor verbal sin expandirlo a una interpretación más explicativa como «seré tu discípulo».
- source_word: ὅπου ἐὰν ἀπέρχῃ
  english_pob_choice: wherever you go
  chosen_spanish: adondequiera que vayas
  alternatives_spanish:
  - dondequiera que vayas
  - adonde vayas
  lexicon: BDAG
  rationale: La combinación ὅπου ἐάν con subjuntivo tiene sentido indefinido de «dondequiera que». «Adondequiera que vayas» es idiomático en español y conserva el matiz de movimiento hacia un lugar.
theological_decisions:
- issue: Alcance discipular de ἀκολουθέω
  english_pob_reading: Rendered as 'follow' with no added theological expansion
  chosen_spanish_reading: «seguir» sin ampliarlo a «ser discípulo»
  alternative_spanish_readings:
  - «ser tu discípulo»
  - «acompañarte como discípulo»
  rationale: Aunque ἀκολουθέω en Lucas puede tener fuerte carga discipular, el texto aquí solo contiene la promesa de seguir. Mantener «seguir» preserva esa tensión sin resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con la línea de la POB inglesa: mantener el sentido temporal de la marcha, la indefinición de τις, y la promesa de seguimiento sin expandirla doctrinalmente. No se registran revisiones aplicadas en el audit trail más reciente.'
  spanish_consistency_notes:
  - Se usa «camino» para ὁδός, coherente con el marco narrativo de viaje en Lucas.
  - Se mantiene «seguir» para ἀκολουθέω, en lugar de «ser discípulo», para no sobretraducir.
  - Se evita «SEÑOR» o «Cristo» porque no aparecen en este versículo.
  - La puntuación con comillas angulares y el tratamiento de mayúsculas siguen el uso editorial español estándar.
