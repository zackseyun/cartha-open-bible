translation:
  language: es
  text: Pero él los reprendió y les mandó que no dijeran esto a nadie.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los reprendió severamente y les ordenó que no dijeran esto a nadie».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιτιμήσας
  english_pob_choice: rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - reprendió duramente
  - regañó
  - amonestó
  lexicon: BDAG
  rationale: En español, «reprender» comunica la corrección verbal firme que exige ἐπιτιμάω sin sonar tan coloquial como «regañó» ni tan interpretativo como «reprendió duramente». Mantiene la fuerza del verbo en coordinación con el mandato que sigue.
- source_word: παρήγγειλεν
  english_pob_choice: commanded
  chosen_spanish: les mandó
  alternatives_spanish:
  - les ordenó
  - les comandó
  - les instruyó
  lexicon: BDAG
  rationale: παραγγέλλω expresa una instrucción autoritativa. «Mandó» es natural en español bíblico contemporáneo y preserva bien el matiz de autoridad sin volver la frase demasiado técnica.
- source_word: μηδενὶ
  english_pob_choice: to no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - a ninguna persona
  - a nadie en absoluto
  lexicon: BDAG
  rationale: El dativo con λέγειν funciona como complemento indirecto de comunicación. «A nadie» expresa de forma directa e idiomática la restricción universal del mandato.
- source_word: λέγειν
  english_pob_choice: to tell
  chosen_spanish: se lo dijeran
  alternatives_spanish:
  - lo contaran
  - lo dijeran
  - se lo hablaran
  lexicon: BDAG
  rationale: En español, con un contenido ya referido por τοῦτο, «decirlo» o «contarlo» suena más natural que una traducción literal de «decir». «Se lo dijeran» conserva el valor de comunicar el contenido a otras personas y refleja bien la construcción del mandato indirecto.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: se lo
  alternatives_spanish:
  - esto
  - esa cosa
  - lo
  lexicon: BDAG
  rationale: El demostrativo remite a la confesión inmediata del contexto. En español, el pronombre enclítico «lo» evita repetir el referente de manera pesada y mantiene la referencia cercana sin explicitarla en el texto principal.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: «Pero» reproduce bien la leve transición contrastiva de δέ respecto del contexto anterior y suena natural al inicio de la cláusula.
theological_decisions:
- issue: Fuerza de la prohibición de Jesús tras la confesión de Pedro
  english_pob_reading: A strong prohibition against public disclosure at this point in the narrative
  chosen_spanish_reading: Una prohibición firme de divulgarlo públicamente en este momento
  alternative_spanish_readings:
  - Una simple advertencia de no mencionarlo
  - Una sugerencia de discreción
  rationale: La combinación de ἐπιτιμήσας y παρήγγειλεν pide una traducción que conserve la firmeza del mandato. «Mandó que no se lo dijeran a nadie» mantiene la tensión narrativa sin suavizarla ni resolverla interpretativamente.
  doctrine_reference: Conservar la tensión literaria y teológica del motivo de secreto mesiánico sin ampliarla indebidamente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios sustanciales; esta versión mantiene la lectura fuerte del mandato y ajusta el español para que suene natural y fiel al griego.
  spanish_consistency_notes:
  - Se conserva «Pero» para δὲ y la doble fuerza verbal «reprendió ... mandó» para reflejar ἐπιτιμήσας + παρήγγειλεν.
  - Se evita introducir «Cristo» o «Mesías» porque τοῦτο remite al contenido inmediato y no nombra directamente el título en este versículo.
  - El enclítico «se lo» mantiene la referencia a «esto» sin sobrecargar la frase con una repetición explícita del demostrativo.
