revisions:
- from: Pero él los reprendió y les mandó que no se lo dijeran a nadie.[a]
  to: Pero él los reprendió y les mandó que no dijeran esto a nadie.[a]
  rationale: Se ajusta la frase para mejorar la naturalidad del español y reflejar más directamente τοῦτο como «esto», sin cambiar el sentido ni la fuerza del mandato. La nota alternativa se actualiza para coincidir exactamente con el texto revisado.
