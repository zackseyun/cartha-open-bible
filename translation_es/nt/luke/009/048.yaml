translation:
  language: es
  text: 'Y les dijo[a]: «El que reciba a este niño en mi nombre[b] me recibe; y el que me reciba, recibe al que me envió. Porque el que es el menor entre todos ustedes, este es grande».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «da la bienvenida» para «reciba» en todo el versículo; el verbo griego puede abarcar tanto aceptación como hospitalidad.
    reason: lexical_alternative
  - marker: b
    text: «En mi nombre» también puede significar «sobre la base de mi nombre» o «por causa de mi nombre», implicando recepción en relación con la autoridad de Jesús y la lealtad a él.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἶπεν αὐτοῖς
  english_pob_choice: And he said to them
  chosen_spanish: Y les dijo
  alternatives_spanish:
  - Entonces les dijo
  - Y dijo a ellos
  lexicon: BDAG
  rationale: La narración griega usa una introducción simple con καί + verbo de decir. «Y les dijo» conserva la conexión narrativa sin añadir una secuencia temporal más fuerte de la que el texto exige.
- source_word: Ὃς ἂν ... καὶ ὃς ἂν
  english_pob_choice: Whoever ... and whoever
  chosen_spanish: El que ...; y el que ...
  alternatives_spanish:
  - Quien ...; y quien ...
  - Quienquiera que ...; y quienquiera que ...
  lexicon: BDAG
  rationale: La construcción relativa con ἄν expresa una condición general e indefinida. «El que» suena natural en español y mantiene el valor distributivo del original.
- source_word: δέξηται / δέχεται
  english_pob_choice: receives
  chosen_spanish: reciba / recibe
  alternatives_spanish:
  - recibe / recibe
  - acepte / acepta
  - dé la bienvenida / da la bienvenida
  lexicon: BDAG
  rationale: Se preserva la repetición verbal del griego. «Recibir» mantiene a la vez el sentido de acogida y de aceptación/recepción representativa que el contexto sugiere.
- source_word: παιδίον
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - niño pequeño
  - niñito
  - infante
  lexicon: BDAG
  rationale: παιδίον designa un niño; en este contexto, «niño» es claro y natural en español. El diminutivo implícito del griego no requiere una expansión obligatoria.
- source_word: ἐπὶ τῷ ὀνόματί μου
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - por mi nombre
  - sobre la base de mi nombre
  - a causa de mi nombre
  lexicon: BDAG
  rationale: La expresión conserva la relación de autoridad, representación y lealtad al nombre de Jesús. «En mi nombre» es la equivalencia más idiomática y fiel en español.
- source_word: τὸν ἀποστείλαντά με
  english_pob_choice: the one who sent me
  chosen_spanish: al que me envió
  alternatives_spanish:
  - al que me mandó
  - al que me ha enviado
  - a mi Enviador
  lexicon: BDAG
  rationale: El participio articular se vuelve naturalmente una cláusula relativa en español. Se evita ampliar el referente más allá de lo que el griego dice, aunque la referencia implícita es teísta.
- source_word: μικρότερος
  english_pob_choice: least
  chosen_spanish: el menor
  alternatives_spanish:
  - el más pequeño
  - el más humilde
  - el menos importante
  lexicon: BDAG
  rationale: En este contexto de estatus relacional, «el menor» comunica mejor la idea de rango humilde que una referencia a tamaño físico o edad. En español es una forma natural de expresar la inversión de honor.
- source_word: ἐν πᾶσιν ὑμῖν
  english_pob_choice: among all of you
  chosen_spanish: entre todos ustedes
  alternatives_spanish:
  - entre ustedes todos
  - en medio de todos ustedes
  - dentro de todos ustedes
  lexicon: BDAG
  rationale: La frase es distributiva y social, no espacial. «Entre todos ustedes» expresa con claridad la posición dentro del grupo.
- source_word: ὑπάρχων
  english_pob_choice: who is
  chosen_spanish: es
  alternatives_spanish:
  - está siendo
  - que existe como
  - que se halla
  lexicon: BDAG
  rationale: El participio funciona predicativamente con μικρότερος; en español se resuelve con un verbo copulativo simple para evitar un giro artificial.
- source_word: οὗτός ἐστιν μέγας
  english_pob_choice: this one is great
  chosen_spanish: este es grande
  alternatives_spanish:
  - este mismo es grande
  - éste es grande
  - él es grande
  lexicon: BDAG
  rationale: Se conserva el énfasis demostrativo de οὗτος con «este». «Grande» mantiene el contraste retórico con «el menor» sin suavizar la paradoja.
theological_decisions:
- issue: Referente implícito de «al que me envió»
  english_pob_reading: An implicit reference to the Father/God is preserved without making it more explicit in the translation.
  chosen_spanish_reading: Se conserva la referencia implícita al Padre/Dios sin explicitarla en el cuerpo del texto.
  alternative_spanish_readings:
  - al Padre que me envió
  - a Dios que me envió
  rationale: El griego usa un participio sustantivado sin nombrar al Padre. La traducción debe preservar esa formulación relacional sin expandir el referente más allá del texto.
  doctrine_reference: Afirmaciones; filosofía de traducción 1 y 3
- issue: Sentido de recibir al niño «en mi nombre»
  english_pob_reading: Reception is framed in relation to Jesus' name/authority/representation, not merely personal kindness.
  chosen_spanish_reading: La recepción se presenta en relación con el nombre, la autoridad y la representación de Jesús, no solo como amabilidad general.
  alternative_spanish_readings:
  - por causa de mi nombre
  - por mí
  - porque me pertenece
  rationale: «En mi nombre» conserva la amplitud semántica de la expresión sin reducirla a mera hospitalidad. El español permite mantener la tensión entre acogida personal y lealtad a la autoridad de Jesús.
  doctrine_reference: Filosofía de traducción 1 y 3
- issue: Paradoja de la grandeza
  english_pob_reading: Greatness is defined by lowliness within the community, rendered without softening the reversal.
  chosen_spanish_reading: La grandeza se define por la condición de menor dentro de la comunidad, sin suavizar la inversión de valores.
  alternative_spanish_readings:
  - el más joven es grande
  - el más pequeño es grande
  rationale: «El menor» funciona mejor para rango social/humilde que para edad solamente, y preserva la inversión ética-teológica del dicho de Jesús.
  doctrine_reference: Filosofía de traducción 1 y 6
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en la última pasada; el borrador sigue el consenso alto del cotejo y corrige la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene יהוה.
  - Se usa «Jesús» implícitamente a través de «mi» en el dicho, siguiendo el original griego.
  - Se conserva la repetición de «reciba/recibe» para reflejar δέξηται / δέχεται.
  - Se evita sustituir «nombre» por una paráfrasis teológica que estreche la amplitud del griego.
  - «El menor» se eligió por estatus humilde, no por edad biológica solamente.
