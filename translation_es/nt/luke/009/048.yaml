  yaml_path: translation/nt/luke/009/048.yaml
  text: And he said to them[a], “Whoever receives this child in my name receives me, and whoever receives me receives the one who sent me[b]. For the one who is least among all of you—this one is great.”
  footnotes:
  - marker: a
    text: Or “welcomes” for “receives” throughout the verse; the Greek verb can carry both acceptance and hospitality.
    reason: lexical_alternative
  - marker: b
    text: “In my name” can also mean “on the basis of my name” or “because of my name,” implying reception in relation to Jesus’ authority and allegiance.
    reason: lexical_alternative
