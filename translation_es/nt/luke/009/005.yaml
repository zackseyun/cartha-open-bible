review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: rechazo de los mensajeros, salida de ese lugar, gesto simbólico de sacudir el polvo, y su función como testimonio contra ellos. También preserva correctamente el matiz adversativo de ἐπ’ αὐτούς con ''contra ellos'' y el valor testimonial de εἰς μαρτύριον con ''como testimonio''. Sin embargo, hay un problema de naturalidad y precisión pronominal en ''sacúdanse el polvo de sus pies'', que en español sugiere ''sacúdanselo de encima'' más que ''sacudan el polvo de sus pies''.'
  spanish_quality_summary: El texto es claro y mayormente natural, pero el imperativo pronominal 'sacúdanse' resulta menos idiomático aquí y puede sonar reflexivo en un sentido no pretendido. 'Sacudan el polvo de sus pies' o 'sáqudanse de sus pies' no son equivalentes exactos; la mejor reparación es 'sacudan el polvo de sus pies'. El resto del versículo es legible y digno. Las notas al pie están bien ancladas y formuladas.
  glossary_alignment: No hay términos del glosario de proyecto especialmente controvertidos en este versículo. 'Reciban' para δέχωνται concuerda con la decisión POB, con nota alternativa 'acojan'. 'Ciudad' es aceptable por πόλις, aunque el inglés prefirió 'town'; la nota preserva la alternativa contextual. 'Testimonio contra ellos' mantiene bien la racionalidad lexical y teológica documentada.
  issues:
  - severity: medium
    issue: Imperativo 'sacúdanse' para ἀποτινάσσετε
    rationale: En español, 'sacúdanse el polvo de sus pies' suena reflexivo y menos natural que 'sacudan el polvo de sus pies'. El griego manda sacudir el polvo, no necesariamente 'sacudirse' en formulación pronominal.
  revised_spanish_text: Y a todos los que no los reciban[a], al salir de aquella ciudad[b], sacudan el polvo de sus pies como testimonio contra ellos.
