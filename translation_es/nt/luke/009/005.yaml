translation:
  language: es
  text: Y a todos los que no los reciban[a], al salir de aquella ciudad[b], sacudan el polvo de sus pies como testimonio contra ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a quienes no los acojan'. El verbo puede incluir tanto recibir como dar acogida a los mensajeros.
    reason: lexical_alternative
  - marker: b
    text: O 'de aquella ciudad'. Griego πόλις puede referirse a una ciudad o a un pueblo según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσοι ἂν μὴ δέχωνται
  english_pob_choice: all who do not receive
  chosen_spanish: todos los que no los reciban
  alternatives_spanish:
  - quienes no los acojan
  - todos los que no los acojan
  lexicon: BDAG
  rationale: ὅσοι con ἄν tiene valor generalizador e indefinido; en español, 'todos los que' conserva ese alcance. δέχομαι aquí incluye recibir con acogida, pero 'reciban' mantiene la amplitud semántica sin reducirlo solo a hospitalidad.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El objeto directo plural se expresa de forma natural con 'los' referido a los mensajeros, manteniendo claridad y fluidez en español sin perder el referente.
- source_word: ἐξερχόμενοι
  english_pob_choice: as you leave
  chosen_spanish: al salir
  alternatives_spanish:
  - cuando salgan
  - mientras salen
  lexicon: BDAG
  rationale: El participio contemporáneo funciona adverbialmente; 'al salir' reproduce bien la simultaneidad y suena natural en español.
- source_word: ἀπὸ τῆς πόλεως ἐκείνης
  english_pob_choice: that town
  chosen_spanish: de aquella ciudad
  alternatives_spanish:
  - de aquel pueblo
  - de aquel lugar
  lexicon: BDAG
  rationale: πόλις puede ser 'ciudad' o 'pueblo'; aquí se eligió 'ciudad' como término amplio y digno, conservando el demostrativo ἐκείνης con 'aquella'.
- source_word: τὸν κονιορτὸν
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - el polvo fino
  - el polvo del camino
  lexicon: BDAG
  rationale: κονιορτός designa polvo levantado del suelo; 'polvo' es la equivalencia natural y estable en español para este gesto simbólico.
- source_word: ἀπὸ τῶν ποδῶν ὑμῶν
  english_pob_choice: from your feet
  chosen_spanish: de sus pies
  alternatives_spanish:
  - de los pies de ustedes
  - de vuestros pies
  lexicon: BDAG
  rationale: La frase indica el origen/lugar del polvo. En español, 'de sus pies' mantiene sencillez y concordancia con el referente plural de la misión.
- source_word: ἀποτινάσσετε
  english_pob_choice: shake off
  chosen_spanish: sacúdanse
  alternatives_spanish:
  - sáquense
  - sacudan
  lexicon: BDAG
  rationale: El imperativo exige una acción enérgica y simbólica. 'Sacúdanse' conserva la fuerza del gesto y evita una expresión demasiado débil como 'quiten'.
- source_word: εἰς μαρτύριον
  english_pob_choice: as a testimony
  chosen_spanish: como testimonio
  alternatives_spanish:
  - para testimonio
  - como testimonio formal
  lexicon: BDAG
  rationale: μαρτύριον conserva el valor evidencial; 'como testimonio' mantiene el sentido de señal pública y verificable, sin exagerar hacia una formulación jurídica más fuerte de la que el texto explicita.
- source_word: ἐπ’ αὐτούς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - para ellos
  lexicon: BDAG
  rationale: Con μαρτύριον, ἐπί con acusativo toma aquí un matiz adversativo. 'Contra ellos' expresa adecuadamente esa orientación hostil/judicial preservando la tensión del pasaje.
theological_decisions:
- issue: Fuerza del acto simbólico de sacudir el polvo
  english_pob_reading: The act is rendered as a testimony against those who reject the messengers, preserving its warning/judicial force without expanding it into an explicit pronouncement of final condemnation.
  chosen_spanish_reading: El acto se traduce como testimonio contra quienes rechazan a los mensajeros, conservando su fuerza de advertencia sin convertirlo en una condena final explícita.
  alternative_spanish_readings:
  - una señal neutral para ellos
  - una declaración explícita del juicio divino
  rationale: La combinación εἰς μαρτύριον ἐπ’ αὐτούς indica más que un gesto neutro, pero el versículo no desarrolla todo el alcance del juicio. La versión española preserva esa función testimonial y su peso admonitorio sin resolver la tensión que el griego deja abierta.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; la redacción española mantiene esa estabilidad y conserva las decisiones léxicas y teológicas ya auditadas.
  spanish_consistency_notes:
  - Se preservó 'Yahvé' como norma general del proyecto, aunque este versículo no la requiere.
  - Se evitó 'SEÑOR' y 'Cristo' porque no aparecen en el versículo.
  - Se mantuvo un registro solemne y readable para lectura eclesial, sin calcos duros.
  - Las notas a y b reflejan las mismas alternativas léxicas documentadas en el audit trail inglés, adaptadas al español.
