translation:
  language: es
  text: 'Pero yo les digo en verdad: hay algunos [a]de los que están aquí que ciertamente no probarán la muerte[b] hasta que vean el reino de Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «de los que están aquí de pie».
    reason: lexical_alternative
  - marker: b
    text: «Probar la muerte» es un modismo que significa «experimentar la muerte» o «morir».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν ἀληθῶς
  english_pob_choice: But I tell you truly
  chosen_spanish: Pero yo les digo verdaderamente
  alternatives_spanish:
  - Pero yo les digo en verdad
  - Verdaderamente les digo
  - Pero les digo verdaderamente
  lexicon: BDAG
  rationale: Conserva el marcador discursivo δὲ con «Pero» y expresa ἀληθῶς adverbialmente como «verdaderamente». El sujeto explícito «yo» mantiene el énfasis personal del griego sin volverlo mecánico.
- source_word: εἰσίν τινες
  english_pob_choice: there are some
  chosen_spanish: hay algunos
  alternatives_spanish:
  - hay ciertos
  - algunos hay
  - existen algunos
  lexicon: BDAG
  rationale: La construcción existencial «hay» comunica naturalmente el valor indefinido de τινες en español y evita un calco rígido.
- source_word: τῶν αὐτοῦ ἑστηκότων
  english_pob_choice: standing here
  chosen_spanish: de los que están aquí
  alternatives_spanish:
  - de los que están de pie aquí
  - de aquellos que están aquí
  - de los presentes
  lexicon: BDAG
  rationale: El participio perfecto de ἵστημι indica personas que están de pie/presentes. El español «de los que están aquí» integra la fuerza deíctica y conserva la construcción partitiva sin volverla torpe.
- source_word: οἳ οὐ μὴ γεύσωνται θανάτου
  english_pob_choice: who will certainly not taste death
  chosen_spanish: que ciertamente no probarán la muerte
  alternatives_spanish:
  - que de ninguna manera probarán la muerte
  - que ciertamente no morirán
  - que no probarán muerte
  lexicon: BDAG
  rationale: «Probar la muerte» preserva el modismo de γεύομαι y evita aplanarlo en «morirán» en el texto principal. «Ciertamente» refleja la negación enfática οὐ μή.
- source_word: ἕως ἂν ἴδωσιν
  english_pob_choice: until they see
  chosen_spanish: hasta que vean
  alternatives_spanish:
  - hasta que hayan visto
  - hasta ver
  - antes de que vean
  lexicon: BDAG
  rationale: «Hasta que vean» es la forma natural para ἕως ἄν con subjuntivo aoristo en un marco futuro.
- source_word: τὴν βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios
  - la realeza de Dios
  - el gobierno de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la equivalencia más transparente y estable para βασιλεία en este contexto.
theological_decisions:
- issue: Meaning of 'see the kingdom of God' in context
  english_pob_reading: Retained the phrase without interpretive expansion.
  chosen_spanish_reading: Se conserva la expresión sin especificar un cumplimiento interpretativo particular.
  alternative_spanish_readings:
  - ver el reino manifestado en la transfiguración
  - ver el reino en la resurrección/ascensión
  - ver el reino en la destrucción de Jerusalén
  - ver el reino en la expansión de la iglesia
  rationale: La cláusula admite varias lecturas históricas. Mantenerla abierta preserva la tensión teológica y evita imponer una sola explicación esjatológica o narrativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Concordante con la última pasada de revisión: no se requieren cambios sustantivos; se corrigió la anclaje explícito de las notas al texto español para cumplir la validación.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» y no se introdujo «Señor» para θεός.
  - Se preservó el modismo «probar la muerte» en el texto principal, con nota aclaratoria.
  - Se usó «reino de Dios» por estabilidad terminológica y por fidelidad semántica.
  - El tono es moderno y digno, apto para lectura eclesial general.
