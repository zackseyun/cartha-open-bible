translation:
  language: es
  text: 'Pero Jesús respondió: «¡Oh generación incrédula y perversa,[a] hasta cuándo estaré con ustedes y tendré paciencia con ustedes? Trae aquí a tu hijo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin fe».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς δὲ
  english_pob_choice: But ... answered
  chosen_spanish: Pero ... respondió
  alternatives_spanish:
  - Y ... respondió
  - Entonces ... respondió
  lexicon: BDAG
  rationale: δέ introduce una transición leve con matiz adversativo en el contexto de la reprensión; «Pero» conserva ese valor. ἀποκριθεὶς es la fórmula narrativa normal para introducir una respuesta; «respondió» suena natural y fiel al giro griego.
- source_word: Ὦ
  english_pob_choice: O
  chosen_spanish: ¡Oh!
  alternatives_spanish:
  - O
  lexicon: BDAG
  rationale: Se conserva el vocativo de reprensión con una interjección solemne y natural en español. «¡Oh!» comunica el tono elevado sin volverlo coloquial.
- source_word: γενεὰ
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - gente de esta generación
  - edad
  lexicon: BDAG
  rationale: «Generación» mantiene la referencia colectiva abierta sin reducirla a un grupo más específico que el texto no determina.
- source_word: ἄπιστος
  english_pob_choice: unbelieving
  chosen_spanish: incrédula
  alternatives_spanish:
  - sin fe
  - descreída
  - infiel
  lexicon: BDAG
  rationale: El sentido principal aquí es falta de fe/confianza; «incrédula» es un equivalente natural en español bíblico contemporáneo. Se preserva la alternativa de «infiel» solo como posibilidad semántica más amplia, pero no como forma principal porque puede sugerir un matiz más covenantal que el contexto inmediato no exige.
- source_word: διεστραμμένη
  english_pob_choice: perverse
  chosen_spanish: perversa
  alternatives_spanish:
  - torcida
  - corrompida
  - desviada
  lexicon: BDAG
  rationale: La revisión inglesa prefirió «perverse» por formalidad; en español, «perversa» conserva la fuerza moral de διεστραμμένη con un registro sobrio y reconocible. «Torcida» o «desviada» sonarían más idiomáticas, pero debilitarían el tono de reprensión; «corrompida» desplaza el énfasis hacia corrupción interna más que hacia deformación moral.
- source_word: ἕως πότε
  english_pob_choice: how long
  chosen_spanish: ¿hasta cuándo?
  alternatives_spanish:
  - ¿por cuánto tiempo?
  - ¿hasta cuándo será esto?
  lexicon: BDAG
  rationale: Equivale de manera idiomática a la exclamación temporal de impaciencia/reprensión del griego.
- source_word: ἔσομαι πρὸς ὑμᾶς
  english_pob_choice: will I be with you
  chosen_spanish: estaré con ustedes
  alternatives_spanish:
  - estaré entre ustedes
  - permaneceré con ustedes
  lexicon: BDAG
  rationale: La relación idiomática de πρός aquí se expresa naturalmente en español con «con ustedes». Se mantiene la primera persona futura y el matiz relacional sin sobreexplicar.
- source_word: ἀνέξομαι ὑμῶν
  english_pob_choice: bear with you
  chosen_spanish: los soportaré
  alternatives_spanish:
  - los aguantaré
  - tendré paciencia con ustedes
  - los toleraré
  lexicon: BDAG
  rationale: «Soportaré» conserva la carga de paciencia resignada o de aguante frente a una situación difícil. Se evita «aguantaré» por su registro demasiado coloquial y «toleraré» por sonar más abstracto que el verbo griego en esta reprensión directa.
- source_word: προσάγαγε
  english_pob_choice: Bring
  chosen_spanish: Trae
  alternatives_spanish:
  - Lleva aquí
  - Traigan
  lexicon: BDAG
  rationale: Imperativo singular directo, breve y enfático; «Trae» reproduce bien la urgencia de la orden.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - acá
  - en este lugar
  lexicon: BDAG
  rationale: Adverbio deíctico simple; «aquí» es la forma más directa y natural en español.
- source_word: τὸν υἱόν σου
  english_pob_choice: your son
  chosen_spanish: a tu hijo
  alternatives_spanish:
  - tu hijo
  lexicon: BDAG
  rationale: Se conserva el objeto directo explícito. En español, el artículo con un imperativo puede sonar más natural y resalta el movimiento del acto («Trae aquí a tu hijo»).
theological_decisions:
- issue: Alcance de la reprensión de Jesús al llamar «generación»
  english_pob_reading: Render the address collectively as 'generation' without specifying whether Jesus rebukes the crowd, the disciples, or Israel as a whole.
  chosen_spanish_reading: Mantener «generación» sin precisar si Jesús se dirige al padre, a la multitud, a los discípulos o a Israel en general.
  alternative_spanish_readings:
  - dirigirse principalmente a los discípulos
  - dirigirse principalmente al padre o a la multitud
  - dirigirse a Israel en general
  rationale: El vocativo γενεά deja abierto el referente. La traducción conserva esa amplitud interpretativa y evita resolver una tensión que el texto no resuelve explícitamente.
  doctrine_reference: Preservar la tensión interpretativa del texto sin imponer una identificación referencial.
translation_notes:
  revision_awareness: 'La redacción sigue el punto de revisión del audit trail inglés: διεστραμμένη fue afinado de una solución más coloquial a una más formal. Por eso se eligió «perversa» en lugar de alternativas más suaves o más idiomáticas, manteniendo la severidad de la reprensión y la naturalidad del español.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio sin artículo.
  - Se usa «ustedes» para el plural de segunda persona en español neutro latinoamericano.
  - «Con ustedes» conserva el valor relacional de πρὸς ὑμᾶς sin literalismo forzado.
  - «Soportaré» preserva el peso de ἀνέξομαι sin caer en coloquialismo excesivo.
  - La nota [a] ofrece la alternativa lexical documentada para ἄπιστος; no se añade nota para διεστραμμένη porque la forma elegida ya refleja la revisión formal del audit trail inglés.
