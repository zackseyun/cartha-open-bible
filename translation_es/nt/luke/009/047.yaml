translation:
  language: es
  text: Pero Jesús, sabiendo el razonamiento de sus corazones[a], tomó un niño y lo puso junto a sí[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su corazón» o «de su corazón». El griego usa literalmente un singular, «corazón», con posesivo plural; el texto principal emplea el plural para mayor claridad en español.
    reason: lexical_alternative
  - marker: b
    text: O «a su lado» / «junto a él». La frase griega indica proximidad a Jesús; «junto a sí» conserva esa cercanía de manera directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - conociendo
  - percibiendo
  lexicon: BDAG
  rationale: El participio expresa percepción/conciencia de Jesús respecto de la situación interna; en español, «sabiendo» comunica de forma natural esa conciencia sin añadir un mecanismo explicativo que el texto no da.
- source_word: διαλογισμὸν
  english_pob_choice: reasoning
  chosen_spanish: razonamiento
  alternatives_spanish:
  - pensamiento
  - discusión interna
  - argumentación
  lexicon: BDAG
  rationale: La palabra puede referirse al proceso de pensar, deliberar o razonar. «Razonamiento» conserva el matiz cognitivo e interior mejor que un simple «pensamiento».
- source_word: τῆς καρδίας αὐτῶν
  english_pob_choice: of their heart
  chosen_spanish: de su corazón
  alternatives_spanish:
  - de sus corazones
  - en su corazón
  - en sus corazones
  lexicon: BDAG
  rationale: Sigo la estructura singular del griego («corazón») con el posesivo plural implícito en «su». En español, el singular suena más cercano al dato textual y puede funcionar de manera colectiva; la nota aclara la alternativa idiomática.
- source_word: ἐπιλαβόμενος
  english_pob_choice: took hold of
  chosen_spanish: tomó
  alternatives_spanish:
  - tomó de la mano
  - tomó en brazos
  - agarró
  lexicon: BDAG
  rationale: El participio medio sugiere una acción concreta de tomar. En español, «tomó» es fiel y natural; otras opciones introducen detalles no explícitos en el texto.
- source_word: παιδίον
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - niño pequeño
  - infante
  - criatura
  lexicon: BDAG
  rationale: παιδίον designa a un niño, normalmente pequeño. «Niño» es el término básico y claro en español; no conviene intensificar con «pequeño» sin que el sustantivo lo exija.
- source_word: ἔστησεν
  english_pob_choice: set
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - lo puso de pie
  - lo situó
  lexicon: BDAG
  rationale: El aoristo causativo de ἵστημι puede significar poner/colocar. «Puso» reproduce bien la acción en español sin forzar la imagen literal de «hacer estar de pie».
- source_word: παρ’ ἑαυτῷ
  english_pob_choice: beside himself
  chosen_spanish: junto a sí
  alternatives_spanish:
  - a su lado
  - junto a él
  - al lado de sí
  lexicon: BDAG
  rationale: La expresión señala proximidad respecto de Jesús. «Junto a sí» es fiel y evita la posible ambigüedad de «junto a él» en español, que podría referirse a otra persona; también conserva la cercanía textual de la frase griega.
theological_decisions:
- issue: Conocimiento de Jesús sobre los razonamientos internos
  english_pob_reading: The verse states that Jesus knew their inward reasoning without specifying the mechanism.
  chosen_spanish_reading: El versículo afirma que Jesús sabía el razonamiento interior de ellos sin explicar el modo de ese conocimiento.
  alternative_spanish_readings:
  - Jesús conocía sobrenaturalmente sus pensamientos
  - Jesús los percibió por observación humana
  rationale: 'Mantengo la tensión teológica del texto: afirma el conocimiento de Jesús, pero no define si procede de omnisciencia, percepción humana aguda u otro medio. La traducción no debe resolver lo que Lucas no explica.'
  doctrine_reference: Preservar la tensión teológica en lugar de cerrarla
- issue: Singular 'corazón' con posesivo plural
  english_pob_reading: the reasoning of their heart
  chosen_spanish_reading: el razonamiento de su corazón
  alternative_spanish_readings:
  - el razonamiento de sus corazones
  - el razonamiento interior de ellos
  rationale: El griego presenta καρδίας en singular con posesivo plural. En español, el singular «corazón» permite conservar esa forma singular colectiva, mientras la nota informa la alternativa idiomática en plural.
  doctrine_reference: Atender a la forma del original sin perder claridad en español
translation_notes:
  revision_awareness: 'El audit trail inglés revisó la frase desde «their heart» a «their hearts», y de «took hold of» / «stood him» a «took» / «set him» por naturalidad y precisión. En español, se mantuvo la tensión entre fidelidad estructural y fluidez: se preservó el singular «corazón» del griego con nota, se eligió «tomó» como verbo natural y se optó por «puso junto a sí» para reflejar la colocación sin añadir elementos no presentes.'
  spanish_consistency_notes:
  - Se usó «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se mantuvo «corazón» en singular para reflejar la forma griega, con aclaración en nota.
  - «Razonamiento» expresa la dimensión cognitiva de διαλογισμός sin reducirlo a mera «opinión».
  - «Junto a sí» conserva la referencia a Jesús y evita ambigüedad relacional en español.
  - La puntuación y el orden buscan una lectura pública natural sin desplazar el contenido del original.
