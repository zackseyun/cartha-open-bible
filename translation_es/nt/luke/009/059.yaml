translation:
  language: es
  text: 'Entonces dijo a otro[a]: «Sígueme». Pero él dijo: «Señor, permíteme ir primero y enterrar a mi padre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «permíteme primero ir y enterrar a mi padre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτερον
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - uno más
  - otra persona
  lexicon: BDAG
  rationale: ἕτερον indica a una persona distinta en la escena. «Otro» es la forma natural y breve en español, y conserva la distinción narrativa sin añadir especificaciones.
- source_word: Ἀκολούθει
  english_pob_choice: Follow
  chosen_spanish: Sígueme
  alternatives_spanish:
  - Sigue tras mí
  - Ven detrás de mí
  lexicon: BDAG
  rationale: El imperativo de ἀκολουθέω se expresa de manera directa con «Sígueme». En español transmite con naturalidad la invitación al discipulado sin forzar una paráfrasis.
- source_word: μοι
  english_pob_choice: me
  chosen_spanish: me
  lexicon: BDAG
  rationale: 'El dativo con ἀκολουθέω funciona naturalmente como complemento del verbo en español: «sígueme».'
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Señor mío
  lexicon: BDAG
  rationale: Se conserva «Señor» para reflejar el valor de respeto y la posible carga cristológica del vocativo dirigido a Jesús, sin reducirlo a un simple tratamiento social.
- source_word: ἐπίτρεψόν
  english_pob_choice: permit
  chosen_spanish: permíteme
  alternatives_spanish:
  - permite que
  - déjame
  lexicon: BDAG
  rationale: El aoristo imperativo de ἐπιτρέπω pide una autorización puntual. «Permíteme» reproduce bien la petición respetuosa y mantiene la relación de dependencia expresada en el griego.
- source_word: ἀπελθόντι πρῶτον
  english_pob_choice: first to go
  chosen_spanish: primero ir
  alternatives_spanish:
  - ir primero
  - irme primero
  lexicon: BDAG
  rationale: 'La construcción participial con πρῶτον expresa prioridad temporal: ir antes de enterrar al padre. «Primero ir» conserva esa secuencia de modo claro y natural en español.'
- source_word: θάψαι
  english_pob_choice: bury
  chosen_spanish: enterrar
  alternatives_spanish:
  - sepultar
  - dar sepultura a
  lexicon: BDAG
  rationale: θάπτω significa «enterrar/sepultar». «Enterrar» es transparente y plenamente adecuado en español contemporáneo, sin perder el sentido funerario.
- source_word: τὸν πατέρα μου
  english_pob_choice: my father
  chosen_spanish: a mi padre
  alternatives_spanish:
  - mi padre
  lexicon: BDAG
  rationale: 'En español, con «enterrar» resulta más natural introducir el objeto directo con «a»: «a mi padre». El sentido se mantiene literal.'
theological_decisions:
- issue: Cómo rendir el vocativo Κύριε dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Sir
  rationale: Se mantiene «Señor» para preservar la tensión entre un tratamiento respetuoso y el posible reconocimiento de autoridad divina/mesiánica en la narración lucana. «Maestro» o «Señor» como mero tratamiento social reducirían esa fuerza.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto fuente y con el audit trail inglés; no se documentaron revisiones textuales relevantes que requirieran una solución alternativa en el cuerpo del verso.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, en coherencia con el criterio del POB para el discurso dirigido a Jesús.
  - Se usa «Sígueme» como imperativo directo y natural, sin explicitar una perífrasis innecesaria.
  - «Enterrar» conserva el sentido básico de θάψαι y es más idiomático que una formulación más técnica en este contexto.
  - La nota a pie de página preserva la alternativa inglesa documentada sobre el orden de «ir primero» y «enterrar».
