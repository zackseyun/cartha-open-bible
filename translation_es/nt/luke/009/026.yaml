review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido general del griego: advertencia general (''quienquiera/cualquiera que''), reciprocidad entre ''avergonzarse'' y la respuesta futura del Hijo del Hombre, y la venida en gloria asociada con él, el Padre y los santos ángeles. Sin embargo, ''del tal'' no representa bien un español moderno y deja forzada la relación con el segundo verbo; además, el texto español pierde la preposición explícita con el segundo ''se avergonzará'', que en español conviene expresar para claridad y naturalidad.'
  spanish_quality_summary: El borrador es comprensible pero suena rígido y algo arcaizante. 'Porque a cualquiera que...' funciona, pero 'Porque todo el que...' o 'Porque cualquiera que...' es más natural. 'Del tal' resulta poco idiomático en español latinoamericano moderno y reduce la legibilidad. También conviene hacer explícito 'de él' para que la reciprocidad verbal quede clara. El resto del verso es claro y digno.
  glossary_alignment: 'Se mantiene bien la terminología clave: ''Hijo del Hombre'', ''gloria'', ''Padre'', ''santos ángeles''. No hay conflictos con los lineamientos del glosario del proyecto. ''Palabras'' preserva adecuadamente λόγους.'
  issues:
  - severity: medium
    issue: Uso de 'del tal' para τοῦτον
    rationale: Aunque intenta reflejar el demostrativo resumptivo, en español actual suena arcaico y poco natural, especialmente en registro bíblico moderno neutral. 'De él' o 'de esa persona' comunica mejor el referente sin pérdida de sentido.
  - severity: medium
    issue: Falta de preposición explícita con el segundo verbo
    rationale: El griego repite el verbo con objeto resumptivo; en español 'se avergonzará' pide normalmente 'de él' para evitar una construcción truncada. La omisión dificulta la lectura y debilita la reciprocidad deliberada del original.
  - severity: low
    issue: '''Porque a cualquiera que'' es menos natural que alternativas disponibles'
    rationale: No es incorrecto, pero 'Porque todo el que' fluye mejor en español general y conserva el valor generalizador de ὃς γὰρ ἂν.
  - severity: low
    issue: No se preservan las alternativas documentadas en notas
    rationale: 'El inglés auditado conserva dos notas léxicas útiles: una sobre ''this one/him'' y otra sobre la posible representación de la construcción de gloria. En español al menos la primera sigue siendo pertinente; la segunda también puede preservarse para reflejar la ambigüedad estructural del griego.'
