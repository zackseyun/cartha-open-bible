revisions:
- from: Porque a cualquiera que se avergüence de mí y de mis palabras, del tal el Hijo del Hombre se avergonzará cuando venga en su gloria y en la gloria del Padre y de los santos ángeles.
  to: Porque todo el que se avergüence de mí y de mis palabras, el Hijo del Hombre se avergonzará de él[a] cuando venga en su gloria y la gloria del Padre y de los santos ángeles.[b]
  rationale: La revisión conserva fielmente el sentido del griego y las decisiones auditadas en inglés, pero mejora la naturalidad y claridad del español. 'Todo el que' expresa bien la construcción generalizadora; 'se avergonzará de él' restituye una sintaxis española natural y la reciprocidad del verbo; y se añaden notas para preservar las alternativas significativas ya documentadas en el expediente inglés.
  reviewer_model: gpt-5.4
