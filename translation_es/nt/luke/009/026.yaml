translation:
  language: es
  text: Porque todo el que se avergüence de mí y de mis palabras, el Hijo del Hombre se avergonzará de él[a] cuando venga en su gloria y la gloria del Padre y de los santos ángeles.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'el Hijo del Hombre se avergonzará de este'.
    reason: lexical_alternative
  - marker: b
    text: 'La construcción griega también puede representarse como: ''cuando venga en su gloria, y en la gloria del Padre y de los santos ángeles''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς γὰρ ἂν
  english_pob_choice: For whoever
  chosen_spanish: Porque a cualquiera que
  alternatives_spanish:
  - Porque quienquiera que
  - Porque todo el que
  lexicon: BDAG
  rationale: 'La construcción relativa indefinida con ἄν tiene valor general: ''quienquiera que / cualquiera que''. En español, ''a cualquiera que'' expresa bien ese sentido universal y mantiene el enlace explicativo de γάρ con ''Porque''.'
- source_word: ἐπαισχυνθῇ
  english_pob_choice: is ashamed of
  chosen_spanish: se avergüence de
  alternatives_spanish:
  - se avergüece de
  - se sonroje por
  - sienta vergüenza respecto de
  lexicon: BDAG
  rationale: El verbo griego indica vergüenza/shame con respecto a una persona o sus palabras. 'Se avergüence de' preserva la fuerza relacional del verbo y funciona bien con el subjuntivo de la cláusula general.
- source_word: με καὶ τοὺς ἐμοὺς λόγους
  english_pob_choice: me and of my words
  chosen_spanish: mí y de mis palabras
  alternatives_spanish:
  - mí y de lo que digo
  - mí y de mis dichos
  lexicon: BDAG
  rationale: '''λόγους'' se conserva de manera directa como ''palabras''. La preposición repetida en español (''de mí y de mis palabras'') refleja el objeto doble del verbo sin suavizar la referencia a lo que Jesús dice.'
- source_word: τοῦτον
  english_pob_choice: him
  chosen_spanish: del tal
  alternatives_spanish:
  - de ese
  - de esa persona
  - de él
  lexicon: BDAG
  rationale: El griego retoma al sujeto general con un demostrativo resumptivo. 'Del tal' es un equivalente español tradicional y sobrio que puede representar 'de este / de esa persona' sin perder el matiz resumptivo. Conserva, además, la orientación hacia el referente genérico sin requerir una explicación añadida en el texto principal.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre
  - el Hijo del ser humano
  lexicon: BDAG
  rationale: Se mantiene la designación cristológica establecida. 'Hijo del Hombre' preserva la forma bíblica y la resonancia intertextual del título, sin paráfrasis.
- source_word: ἐπαισχυνθήσεται
  english_pob_choice: will be ashamed of
  chosen_spanish: se avergonzará
  alternatives_spanish:
  - se avergonzará de
  - lo rechazará
  - lo desautorizará
  lexicon: BDAG
  rationale: La forma futura mantiene la reciprocidad deliberada con el verbo anterior. En español, la construcción intransitiva 'se avergonzará' reproduce la misma raíz verbal y deja implícita la relación con el referente resumptivo 'del tal'.
- source_word: ὅταν ἔλθῃ
  english_pob_choice: when he comes
  chosen_spanish: cuando venga
  alternatives_spanish:
  - cuando llegue
  - cuando venga a
  lexicon: BDAG
  rationale: ὅταν con subjuntivo aoristo expresa un hecho futuro. 'Cuando venga' es natural en español y conserva el valor temporal sin añadir matices interpretativos.
- source_word: ἐν τῇ δόξῃ αὐτοῦ
  english_pob_choice: in his glory
  chosen_spanish: en su gloria
  alternatives_spanish:
  - con su gloria
  - en la gloria que le es propia
  lexicon: BDAG
  rationale: '''δόξα'' se traduce de forma directa como ''gloria''. La preposición ''en'' conserva la esfera o manifestación de esa gloria en la venida del Hijo del Hombre.'
- source_word: καὶ τοῦ πατρὸς καὶ τῶν ἁγίων ἀγγέλων
  english_pob_choice: and the glory of the Father and of the holy angels
  chosen_spanish: y en la gloria del Padre y de los santos ángeles
  alternatives_spanish:
  - y en la gloria del Padre y de los santos ángeles
  - y la gloria del Padre y de los santos ángeles
  lexicon: BDAG
  rationale: El griego deja el segundo y tercer genitivo coordinados con δόξῃ, lo que puede expresarse en español con una repetición elíptica de 'en la gloria'. Así se evita la impresión de que se trata de tres preposiciones independientes y se conserva la construcción compartida de la gloria en la que viene el Hijo del Hombre.
- source_word: ἅγιοι ἄγγελοι
  english_pob_choice: holy angels
  chosen_spanish: santos ángeles
  alternatives_spanish:
  - ángeles santos
  - ángeles sagrados
  lexicon: BDAG
  rationale: '''ἅγιοι'' puede rendirse como ''santos'' o ''sagrados''. ''Santos ángeles'' es natural en español bíblico y conserva la cualidad consagrada/celestial del grupo.'
theological_decisions:
- issue: Refuerzo del carácter general de la advertencia
  english_pob_reading: For whoever is ashamed of me and of my words, the Son of Man will be ashamed of him
  chosen_spanish_reading: Porque a cualquiera que se avergüence de mí y de mis palabras, del tal el Hijo del Hombre se avergonzará
  alternative_spanish_readings:
  - Porque quienquiera que se avergüence de mí y de mis palabras, el Hijo del Hombre se avergonzará de él
  - Porque cualquiera que se avergüence de mí y de mis palabras, el Hijo del Hombre se avergonzará de esa persona
  rationale: La formulación mantiene la advertencia general y la reciprocidad verbal entre la vergüenza humana y la respuesta del Hijo del Hombre. 'Del tal' conserva el valor resumptivo del griego sin convertirlo en una paráfrasis más explicativa que el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3; §Translation philosophy 4
- issue: Venida del Hijo del Hombre en gloria compartida
  english_pob_reading: when he comes in his glory and the glory of the Father and of the holy angels
  chosen_spanish_reading: cuando venga en su gloria y en la gloria del Padre y de los santos ángeles
  alternative_spanish_readings:
  - cuando venga en su gloria, y en la gloria del Padre y de los santos ángeles
  - cuando venga en su gloria y la gloria del Padre y de los santos ángeles
  rationale: 'La traducción conserva la tensión del original: una sola venida descrita mediante una gloria relacionada con el Hijo del Hombre, el Padre y los santos ángeles. Se evita diluir la construcción con explicaciones que desplacen el peso escatológico del verso.'
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy 3
translation_notes:
  revision_awareness: 'La versión inglesa auditada no introdujo cambios en la última pasada revisora (''unchanged: true''); la presente redacción española sigue de cerca esa decisión estable y conserva tanto la reciprocidad del verbo ἐπαισχύνομαι como la construcción compartida de δόξα en la clausula final.'
  spanish_consistency_notes:
  - Se mantiene 'Hijo del Hombre' como designación cristológica fija.
  - Se traduce δόξα como 'gloria' de manera consistente.
  - Se preserva la repetición de 'en la gloria' en la cláusula final para reflejar la estructura griega.
  - No se introduce puntuación interpretativa que atenúe la fuerza de la advertencia.
