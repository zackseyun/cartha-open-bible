translation:
  language: es
  text: 'Al ver esto[a], los discípulos Santiago y Juan dijeron: «Señor, ¿quieres que hagamos bajar fuego del cielo y los consuma[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando vieron esto». El griego dice literalmente: «al ver»; el objeto se sobreentiende por el contexto inmediato.'
    reason: alternative_reading
  - marker: b
    text: 'O: «hacer descender fuego del cielo y destruirlos». El griego dice literalmente: «decir fuego que baje del cielo y los consuma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: saw this
  chosen_spanish: al ver esto
  alternatives_spanish:
  - cuando vieron esto
  - viéndolo
  lexicon: BDAG
  rationale: El participio aoristo se vierte temporalmente en español. «Al ver esto» conserva la relación con el contexto inmediato y evita una construcción pesada.
- source_word: δὲ
  english_pob_choice: when
  chosen_spanish: se absorbe en la cláusula temporal
  alternatives_spanish:
  - y
  - pero
  - ahora
  lexicon: BDAG
  rationale: Como en el audit trail inglés, δέ funciona aquí como transición y se integra naturalmente en la frase temporal sin necesidad de una conjunción separada.
- source_word: οἱ μαθηταὶ Ἰάκωβος καὶ Ἰωάννης
  english_pob_choice: the disciples James and John
  chosen_spanish: los discípulos Jacobo y Juan
  alternatives_spanish:
  - Jacobo y Juan, los discípulos
  - los discípulos, Jacobo y Juan
  lexicon: BDAG
  rationale: La estructura aposicional identifica a cuáles discípulos se refiere el texto. «Los discípulos Jacobo y Juan» conserva tanto su condición de discípulos como la nominación directa.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En el saludo directo a Jesús, «Señor» es el equivalente reverente y de uso eclesial amplio, fiel al valor del título κύριος.
- source_word: θέλεις
  english_pob_choice: do you want
  chosen_spanish: quieres
  alternatives_spanish:
  - deseas
  - estás dispuesto a
  lexicon: BDAG
  rationale: Expresa deseo o intención. En español, «quieres» es natural y reproduce la autorización implícita que solicitan los discípulos.
- source_word: εἴπωμεν
  english_pob_choice: us to command / say
  chosen_spanish: mandemos que
  alternatives_spanish:
  - digamos que
  - ordenemos que
  lexicon: BDAG
  rationale: El verbo básico es λέγω, pero el sentido de la petición es que Jesús autorice una acción. «Mandemos que» comunica esa fuerza en español sin perder la base verbal de «decir / decir que» y sin añadir un mandato explícito distinto del contexto.
- source_word: πῦρ καταβῆναι ἀπὸ τοῦ οὐρανοῦ
  english_pob_choice: fire to come down from heaven
  chosen_spanish: descienda fuego del cielo
  alternatives_spanish:
  - baje fuego del cielo
  - descienda fuego desde el cielo
  lexicon: BDAG
  rationale: Se conserva la imagen vívida de juicio desde lo alto. En español, el orden «descienda fuego del cielo» suena más natural que una trasposición literal palabra por palabra.
- source_word: ἀναλῶσαι
  english_pob_choice: consume
  chosen_spanish: los consuma
  alternatives_spanish:
  - los destruya
  - los queme
  lexicon: BDAG
  rationale: «Consumir» preserva la imagen del fuego mejor que un «destruir» más genérico y sigue de cerca el valor del verbo griego.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: Objeto plural masculino en español, con referencia clara a los samaritanos del contexto inmediato.
theological_decisions:
- issue: Título κύριος aplicado a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Se mantiene el título reverente aplicado a Jesús sin sustituirlo por un tratamiento menos cargado teológicamente. Esto sigue la convención POB de conservar el valor cristológico de κύριος.
  doctrine_reference: Transparencia léxica y reverencia cristológica del título
- issue: Fuerza de εἴπωμεν con infinitivo de propósito
  english_pob_reading: do you want us to command fire to come down
  chosen_spanish_reading: ¿quieres que mandemos que descienda fuego del cielo?
  alternative_spanish_readings:
  - ¿quieres que digamos que descienda fuego del cielo?
  - ¿quieres que ordenemos que descienda fuego del cielo?
  rationale: El griego usa λέγω con infinitivo, pero el resultado práctico es una petición de autorización para ejecutar un juicio. En español, «mandemos que» comunica mejor esa fuerza que una versión demasiado literal con «digamos».
  doctrine_reference: Primacía del original y equivalencia óptima
- issue: Imagen de juicio por fuego
  english_pob_reading: fire to come down from heaven and consume them
  chosen_spanish_reading: fuego del cielo y los consuma
  alternative_spanish_readings:
  - fuego del cielo y los destruya
  - fuego del cielo y los queme
  rationale: Se conserva la imaginería de juicio desde el cielo y el matiz de consumición del verbo ἀναλίσκω, sin suavizarlo ni transformarlo en una mera destrucción genérica.
  doctrine_reference: Respeto al tono y a la imagen del texto fuente
translation_notes:
  revision_awareness: El borrador inglés pasó por una revisión que prefirió «command fire» sobre «tell fire» para reflejar con más naturalidad la intención de εἴπωμεν. En español se siguió esa línea con «mandemos que», manteniendo la fuerza de autorización/jurisdicción implícita en la petición de los discípulos.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος, en continuidad con el tratamiento cristológico estándar de la serie POB.
  - Se evita calcar la sintaxis inglesa; la cláusula inicial se integra como participio temporal natural en español.
  - «Consuma» conserva el campo semántico de fuego y destrucción sin sustituirlo por una paráfrasis más débil.
  - El objeto directo se expresa con «los», claro y acorde con el referente plural masculino del contexto.
