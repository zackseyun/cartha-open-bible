revisions:
- from: 'Al ver esto[a], los discípulos Jacobo y Juan dijeron: «Señor, ¿quieres que mandemos que descienda fuego del cielo y los consuma?»'
  to: 'Al ver esto[a], los discípulos Santiago y Juan dijeron: «Señor, ¿quieres que hagamos bajar fuego del cielo y los consuma[b]?»'
  rationale: Se hizo una reparación menor para mejorar la naturalidad del español y alinearlo mejor con la alternativa léxica documentada en la auditoría inglesa. «Santiago» es la forma más ampliamente reconocible para el discípulo Ἰάκωβος en español bíblico; «hagamos bajar fuego del cielo» evita la rigidez de «mandemos que descienda fuego» sin perder el sentido de invocar juicio; y se añadió una nota que preserva la alternativa más literal/documentada del griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:00:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura global del griego: participio temporal («Al ver esto»), identificación aposicional de Jacobo y Juan, vocativo «Señor», petición de autorización, descenso de fuego del cielo y resultado de consumirlos. Sin embargo, «mandemos que descienda fuego» introduce una construcción algo pesada y menos idiomática en español, y se aleja innecesariamente del matiz documentado en la nota inglesa, que preserva la alternativa «call down fire».'
  spanish_quality_summary: El español es claro y digno, pero «los discípulos Jacobo y Juan» suena menos natural que «los discípulos Santiago y Juan» o «Jacobo y Juan, sus discípulos». Además, «mandemos que descienda fuego del cielo» resulta gramatical pero tieso; «hagamos bajar fuego del cielo» sería más natural, aunque más interpretativo. Conviene un ajuste menor para lograr mejor legibilidad manteniendo fidelidad.
  glossary_alignment: «Señor» para κύριος está bien alineado. No hay términos del glosario principal en conflicto. El nombre «Jacobo» no es incorrecto, pero en español bíblico y eclesial ampliamente legible «Santiago» es la forma más natural para Ἰάκωβος en este contexto del NT; mejora la recepción sin alterar el referente.
  issues:
  - severity: medium
    issue: «Jacobo» suena menos natural que «Santiago» para Ἰάκωβος en Lucas 9:54.
    rationale: Aunque «Jacobo» es formalmente posible, en el uso bíblico cristiano en español el discípulo/apóstol es normalmente «Santiago». La meta de español eclesial ampliamente legible favorece «Santiago» aquí.
  - severity: medium
    issue: «mandemos que descienda fuego del cielo» es algo forzado en español.
    rationale: El griego usa λέγω con infinitivo, y el audit trail inglés ya reconoce una gama entre literalidad y naturalidad. En español, una formulación como «hagamos bajar fuego del cielo» comunica mejor la acción propuesta sin sonar mecánica ni cambiar el sentido.
  - severity: low
    issue: La nota al pie solo preserva una alternativa para el participio inicial y omite la alternativa relevante de la cláusula de fuego.
    rationale: La auditoría inglesa conserva explícitamente la opción «call down fire ... and destroy them». En español conviene preservar esa alternativa principal, sobre todo si se revisa la redacción a una forma más idiomática.
  revised_spanish_text: 'Al ver esto[a], los discípulos Santiago y Juan dijeron: «Señor, ¿quieres que hagamos bajar fuego del cielo y los consuma[b]?»'
  revised_footnotes:
  - marker: a
    text: 'O: «cuando vieron esto». El griego dice literalmente: «al ver»; el objeto se sobreentiende por el contexto inmediato.'
    reason: alternative_reading
  - marker: b
    text: 'O: «hacer descender fuego del cielo y destruirlos». El griego dice literalmente: «decir fuego que baje del cielo y los consuma».'
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad del español y alinearlo mejor con la alternativa léxica documentada en la auditoría inglesa. «Santiago» es la forma más ampliamente reconocible para el discípulo Ἰάκωβος en español bíblico; «hagamos bajar fuego del cielo» evita la rigidez de «mandemos que descienda fuego» sin perder el sentido de invocar juicio; y se añadió una nota que preserva la alternativa más literal/documentada del griego.
