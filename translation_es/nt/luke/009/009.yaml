translation:
  language: es
  text: 'Pero Herodes dijo[a]: «A Juan, yo lo decapité; pero ¿quién es este, de quien oigo tales cosas?». Y seguía procurando verlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seguía buscando verlo». El imperfecto griego puede indicar una acción continua o repetida.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: En este giro discursivo, δὲ introduce continuidad con leve contraste respecto del contexto inmediato. «Pero» comunica bien ese matiz en español sin volver la frase artificial.
- source_word: Ἡρῴδης
  english_pob_choice: Herod
  chosen_spanish: Herodes
  alternatives_spanish:
  - Herodes el tetrarca
  lexicon: BDAG
  rationale: Nombre propio transliterado según uso hispano común. No se añade el título porque el griego aquí solo dice ὁ Ἡρῴδης.
- source_word: Ἰωάννην
  english_pob_choice: John
  chosen_spanish: a Juan
  alternatives_spanish:
  - Juan
  lexicon: BDAG
  rationale: Nombre propio en forma española usual; el acusativo se expresa naturalmente con la preposición «a» en español por tratarse de una persona.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: BDAG
  rationale: 'El pronombre explícito conserva el énfasis de Herodes: «yo» aparece en primera posición y refuerza la autorreferencia.'
- source_word: ἀπεκεφάλισα
  english_pob_choice: beheaded
  chosen_spanish: hice decapitar
  alternatives_spanish:
  - decapité
  - lo decapité
  lexicon: BDAG
  rationale: El verbo griego denota de manera específica la acción de decapitar. En español, «hice decapitar» conserva ese valor causal/agentivo del verbo sin sonar demasiado técnico ni perder la fuerza directa del acto.
- source_word: τίς ... ἐστιν οὗτος
  english_pob_choice: who is this
  chosen_spanish: ¿quién es este?
  alternatives_spanish:
  - ¿quién es este hombre?
  - ¿quién será este?
  lexicon: BDAG
  rationale: La pregunta reproduce la construcción interrogativa sin añadir «hombre», que no está explícito. «Este» conserva el matiz de distancia y perplejidad.
- source_word: περὶ οὗ
  english_pob_choice: about whom
  chosen_spanish: de quien
  alternatives_spanish:
  - acerca de quien
  - sobre quien
  lexicon: BDAG
  rationale: En español, la relación de περί con genitivo en contexto de reporte se expresa con naturalidad como «de quien». Es más fluido que un calco como «acerca de quien».
- source_word: ἀκούω
  english_pob_choice: I hear
  chosen_spanish: oigo
  alternatives_spanish:
  - escucho
  - oyendo
  lexicon: BDAG
  rationale: «Oigo» conserva el presente simple y el sentido de recepción de noticias o rumores en una forma breve y natural. «Escucho» puede sonar más activo y atenuar el valor de rumor implícito.
- source_word: τοιαῦτα
  english_pob_choice: such things
  chosen_spanish: tales cosas
  alternatives_spanish:
  - cosas así
  - tales informes
  lexicon: BDAG
  rationale: «Tales cosas» reproduce bien el demostrativo amplio del griego sin especificar más de lo que el texto dice.
- source_word: ἐζήτει
  english_pob_choice: he kept seeking
  chosen_spanish: seguía procurando
  alternatives_spanish:
  - seguía buscando
  - intentaba
  lexicon: BDAG
  rationale: El imperfecto indica acción continua o reiterada. «Seguía procurando» captura la persistencia de la búsqueda y mantiene un registro digno en español.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: verlo
  alternatives_spanish:
  - para verlo
  - a verlo
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa naturalmente en español con «verlo». Es breve y fiel al sentido directo de ὁράω aquí.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre se refiere a Jesús en el contexto. «Lo» es la forma más natural en español para el objeto directo masculino singular.
theological_decisions:
- issue: El alcance de la curiosidad de Herodes y el posible trasfondo narrativo
  english_pob_reading: Render as a straightforward historical statement and question without importing speculation about resurrection or identity beyond the immediate wording.
  chosen_spanish_reading: Traducir la frase de modo directo, sin explicitar que Herodes piensa en una resurrección ni añadir identificación narrativa que el versículo no formula.
  alternative_spanish_readings:
  - «...¿quién es este?; pues oigo tales cosas sobre él»
  - «...¿quién es este, acaso Juan resucitado?»
  rationale: El contexto previo puede sugerir más, pero este versículo solo registra la declaración de Herodes y su deseo de ver a Jesús. La traducción preserva esa contención y no resuelve la tensión narrativa.
  doctrine_reference: Preservar la tensión textual sin ampliar la inferencia más allá del versículo.
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en mantener el tono adversativo de δὲ, el énfasis del pronombre explícito, el valor específico de ἀπεκεφάλισα, la pregunta de identidad sin añadir «hombre», y el imperfecto durativo de ἐζήτει. No se detectaron revisiones posteriores que alteren la decisión de traducción.
  spanish_consistency_notes:
  - Se mantiene «Herodes» como nombre propio estándar y «Juan» para Ἰωάννης.
  - Se evita «Cristo/Mesías» porque el versículo no contiene ese término.
  - Se usa «oigo»/«tales cosas» para conservar el registro de reporte indirecto sin sobrerrepresentar el contenido.
  - La nota al pie queda anclada en «verlo» para reflejar la alternativa verbal del imperfecto y la posibilidad de lectura continua.
