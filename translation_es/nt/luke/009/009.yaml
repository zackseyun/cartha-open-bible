    issue: «hice decapitar» añade un matiz causativo no explícito
    rationale: 'ἀπεκεφάλισα es primera persona singular activa: «decapité / corté la cabeza». Aunque históricamente Herodes ordenó la ejecución, este versículo lo presenta como agente directo en discurso, y la traducción no debe suavizarlo ni reinterpretarlo.'
  - severity: medium
