- from: 'Pero Herodes dijo[a]: «A Juan lo hice decapitar; ¿y quién es este, de quien oigo tales cosas? Y seguía procurando verlo».'
  to: 'Pero Herodes dijo[a]: «A Juan, yo lo decapité; pero ¿quién es este, de quien oigo tales cosas?». Y seguía procurando verlo.'
  rationale: Se reemplaza «lo hice decapitar» por «yo lo decapité» para reflejar con mayor precisión el verbo griego activo ἀπεκεφάλισα y se hace explícito el énfasis de ἐγὼ. También se ajusta la puntuación para que la nota siga anclada a «dijo» y la oración final quede natural en español sin alterar el sentido.
