revisions:
- from: 'Pero él les dijo[a]: «Dense ustedes mismos de comer a ellos». Entonces ellos dijeron[b]: «No tenemos más que cinco panes y dos peces, a no ser que vayamos y compremos comida para toda esta gente».'
  to: 'Pero él les dijo[a]: «Denles ustedes algo de comer». Pero ellos dijeron[b]: «No tenemos más que cinco panes y dos peces, a no ser que vayamos y compremos comida para todo este pueblo».'
  rationale: Se corrigió el error semántico principal en Δότε αὐτοῖς ὑμεῖς φαγεῖν usando la expresión idiomática española correcta «Denles … de comer», con «algo» para reflejar con naturalidad el sentido implicado de φαγεῖν tras δίδωμι. La nota [a] ahora explicita fielmente el énfasis de ὑμεῖς. Se ajustó «Entonces» a «Pero» para seguir mejor δέ. Se prefirió «todo este pueblo» por la fuerza colectiva de λαός y para armonizar con la decisión inglesa principal, conservando «multitud» en nota como alternativa.
