translation:
  language: es
  text: 'Pero él les dijo[a]: «Denles ustedes algo de comer». Pero ellos dijeron[b]: «No tenemos más que cinco panes y dos peces, a no ser que vayamos y compremos comida para todo este pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «Ustedes mismos denles de comer».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «toda esta multitud».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δότε
  english_pob_choice: give
  chosen_spanish: Dense
  alternatives_spanish:
  - Den
  - Entreguen
  lexicon: BDAG
  rationale: El imperativo aoristo de δίδωμι pide un mandato directo. En español, «dense» conserva el valor imperativo y permite integrar la expresión idiomática con φαγεῖν sin sonar forzado.
- source_word: ὑμεῖς
  english_pob_choice: You
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes
  - ustedes mismos
  - ustedes mismos mismos
  lexicon: BDAG
  rationale: El pronombre explícito es enfático. Como en el inglés POB, conviene reflejar esa fuerza en la frase principal. «Ustedes mismos» comunica el énfasis sin volverlo excesivo.
- source_word: φαγεῖν
  english_pob_choice: something to eat
  chosen_spanish: de comer
  alternatives_spanish:
  - algo para comer
  - para comer
  - comida
  lexicon: BDAG
  rationale: 'Con Δότε, el infinitivo forma una expresión idiomática: «dar de comer». En español, «dense ustedes mismos de comer» o, más naturalmente, «dense ustedes mismos de comer a ellos» conserva el sentido de alimentar sin calcar la estructura griega.'
- source_word: πλεῖον ἢ
  english_pob_choice: no more than
  chosen_spanish: más que
  alternatives_spanish:
  - nada más que
  - no más que
  lexicon: BDAG
  rationale: 'La negación con πλεῖον ἢ expresa límite: «No tenemos más que...». Esta fórmula española reproduce la restricción cuantitativa de manera natural.'
- source_word: ἄρτοι
  english_pob_choice: loaves
  chosen_spanish: panes
  alternatives_spanish:
  - barras de pan
  - hogazas
  - loaves
  lexicon: BDAG
  rationale: ἄρτοι aquí son panes individuales, no «pan» como masa. «Panes» es claro, bíblicamente reconocible y fiel al valor plural.
- source_word: ἰχθύες
  english_pob_choice: fish
  chosen_spanish: peces
  alternatives_spanish:
  - pescados
  - pescados pequeños
  lexicon: BDAG
  rationale: El sustantivo plural se refiere de forma simple a pescado/pez como alimento. «Peces» conserva la literalidad y funciona bien en español.
- source_word: εἰ μήτι
  english_pob_choice: unless
  chosen_spanish: a no ser que
  alternatives_spanish:
  - a menos que
  - salvo que
  - a no ser acaso que
  lexicon: BDAG
  rationale: La expresión introduce una excepción con un matiz de duda o protesta. «A no ser que» refleja esa cautela mejor que una formulación más seca.
- source_word: ἀγοράσωμεν
  english_pob_choice: buy
  chosen_spanish: compremos
  alternatives_spanish:
  - compremos nosotros
  - adquiramos
  - comprar
  lexicon: BDAG
  rationale: El subjuntivo aoristo en este contexto expresa la acción hipotética. «Compremos» es la opción natural en español y mantiene el sentido de comprar.
- source_word: λαὸν
  english_pob_choice: people
  chosen_spanish: gente
  alternatives_spanish:
  - pueblo
  - multitud
  - personas
  lexicon: BDAG
  rationale: Aunque λαός puede ser «pueblo», aquí el contexto narrativo de una multitud reunida favorece «gente» como equivalente amplio y claro. Mantiene el valor colectivo sin sonar demasiado técnico.
- source_word: βρώματα
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimentos
  - provisiones
  - cosas para comer
  lexicon: BDAG
  rationale: El plural de βρῶμα designa alimentos/comida. «Comida» es la solución natural en español y conserva el sentido general sin sobreespecificar.
theological_decisions:
- issue: Énfasis del mandato de Jesús
  english_pob_reading: Render the exchange straightforwardly without adding irony or rebuke beyond the Greek.
  chosen_spanish_reading: Traducir el mandato de forma directa, con el énfasis de ὑμεῖς reflejado, pero sin añadir tono de reproche o ironía no explicitados por el texto.
  alternative_spanish_readings:
  - «Ustedes denles algo de comer»
  - «Ustedes mismos denles de comer»
  rationale: El griego presenta una orden directa y un pronombre enfático. La versión española debe conservar esa fuerza, pero evitar cargar el tono con una recriminación más fuerte de la que el texto marca expresamente.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Alcance de λαός en el cierre
  english_pob_reading: all this people
  chosen_spanish_reading: toda esta gente
  alternative_spanish_readings:
  - todo este pueblo
  - toda esta multitud
  rationale: El referente inmediato es la multitud presente. «Gente» mantiene la referencia colectiva de manera abierta, sin imponer una lectura más étnica o institucional que el contexto no exige.
  doctrine_reference: BDAG λαός; Translation philosophy §2
translation_notes:
  revision_awareness: El texto coincide en sustancia con el último pase auditado del inglés POB (sin revisiones aplicadas), conservando la estructura del mandato y la respuesta de los discípulos. Se ajustó el español para que suene natural y mantenga el énfasis de ὑμεῖς, la limitación de πλεῖον ἢ y el matiz concesivo de εἰ μήτι.
  spanish_consistency_notes:
  - Se mantuvo «Dios»/«Yahvé» fuera de este versículo porque no aparecen en el texto.
  - Se prefirió «panes» para ἄρτοι y «peces» para ἰχθύες, coherente con el léxico narrativo del milagro.
  - «Toda esta gente» sigue la decisión del inglés POB de evitar una carga interpretativa mayor con «multitud» en el texto principal.
  - No se usó «Cristo», «Señor» ni terminología eclesial añadida; el versículo es una escena narrativa directa.
