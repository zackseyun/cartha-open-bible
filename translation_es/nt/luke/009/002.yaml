lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent ... out
  chosen_spanish: los envió
  alternatives_spanish:
  - los mandó
  - los envió fuera
  lexicon: BDAG
  rationale: ἀποστέλλω expresa el acto de enviar en comisión. En español, «envió» comunica bien el envío misional sin añadir una partícula redundante como «fuera», que no es necesaria para la naturalidad del verso.
- source_word: κηρύσσειν
  english_pob_choice: to proclaim
  chosen_spanish: proclamar
  alternatives_spanish:
  - predicar
  - anunciar
  lexicon: BDAG
  rationale: κηρύσσω denota proclamación pública, con tono de heraldo. «Proclamar» conserva ese matiz mejor que «predicar», que en español puede sonar más eclesiástico y menos directamente ligado al anuncio público.
- source_word: βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el gobierno de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la forma bíblica transparente y ampliamente reconocible en español. Aunque «reinado» expresa bien la dimensión de gobierno, aquí «reino» preserva mejor la amplitud conceptual y la continuidad terminológica.
- source_word: ἰᾶσθαι
  english_pob_choice: to heal
  chosen_spanish: sanar
  alternatives_spanish:
  - curar
  lexicon: BDAG
  rationale: ἰάομαι significa sanar/restaurar la salud. «Sanar» es natural en español y mantiene el sentido de restauración, mientras que «curar» puede sonar más técnico o limitarse al resultado médico.
- source_word: τοὺς ἀσθενεῖς
  english_pob_choice: the sick
  chosen_spanish: a los enfermos
  alternatives_spanish:
  - a los débiles
  - a los débiles y enfermos
  lexicon: BDAG
  rationale: Aunque ἀσθενής puede significar «débil» en sentido amplio, aquí el contexto de sanidad indica personas enfermas. «Enfermos» reproduce mejor el sentido contextual que «débiles» y evita confundir la referencia.
theological_decisions:
- issue: Matiz de βασιλεία τοῦ θεοῦ
  english_pob_reading: the kingdom of God
  chosen_spanish_reading: el reino de Dios
  alternative_spanish_readings:
  - el reinado de Dios
  rationale: El griego puede enfatizar tanto el ámbito como el ejercicio del gobierno divino. En español, «reino de Dios» mantiene esa amplitud sin restringir indebidamente el concepto, y preserva la fórmula bíblica más reconocible.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: El texto griego y el control auditado en inglés coinciden de forma alta; no se registran revisiones aplicadas en la pasada más reciente. Se preserva la alternativa léxica principal para βασιλεία mediante nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se usa «reino de Dios» como término bíblico estable, con nota alternativa para el matiz de «reinado».
  - Se traduce el participio final con objeto directo explícito en español («a los enfermos») para reflejar adecuadamente el contexto de sanidad.
