translation:
  language: es
  text: Pero las multitudes, al saberlo, lo siguieron. Y, acogiéndolos, les hablaba acerca del reino de Dios y sanaba a los que necesitaban sanación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "a los que tenían necesidad de sanación". La frase griega es literalmente "a los que tenían necesidad de θεραπεία", y θεραπεία puede significar "sanación" o "tratamiento/cuidado".'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ὄχλοι
  english_pob_choice: But the crowds
  chosen_spanish: Pero las multitudes
  alternatives_spanish:
  - Y las multitudes
  - Entonces las multitudes
  lexicon: BDAG
  rationale: δέ marca transición suave; en español, 'Pero' conserva ese giro narrativo. ὄχλοι es plural, por lo que 'multitudes' refleja mejor la forma que un singular colectivo.
- source_word: γνόντες
  english_pob_choice: learning of it
  chosen_spanish: al saberlo
  alternatives_spanish:
  - cuando lo supieron
  - habiéndolo sabido
  - al enterarse
  lexicon: BDAG
  rationale: El participio aoristo funciona de manera temporal-circunstancial. 'Al saberlo' es natural en español y conserva la relación de antecedencia sin sobrecargar la frase.
- source_word: ἠκολούθησαν αὐτῷ
  english_pob_choice: followed him
  chosen_spanish: lo siguieron
  alternatives_spanish:
  - fueron tras él
  - lo acompañaron
  lexicon: BDAG
  rationale: '''Seguir'' reproduce con fidelidad ἀκολουθέω y mantiene la posibilidad de resonancia discipular sin añadir interpretaciones.'
- source_word: ἀποδεξάμενος αὐτούς
  english_pob_choice: welcoming them
  chosen_spanish: recibiéndolos
  alternatives_spanish:
  - acogiéndolos
  - dándoles la bienvenida
  lexicon: BDAG
  rationale: ἀποδέχομαι expresa recibir favorablemente. 'Recibiéndolos' es sobrio y fiel; 'acoger' o 'dar la bienvenida' son posibles, pero esta forma evita añadir calidez no explicitada por el verbo.
- source_word: ἐλάλει αὐτοῖς
  english_pob_choice: he was speaking to them
  chosen_spanish: les hablaba
  alternatives_spanish:
  - les estaba hablando
  - les seguía hablando
  lexicon: BDAG
  rationale: El imperfecto indica acción continua. En español, 'les hablaba' transmite duración de manera natural y menos pesada que una perífrasis progresiva.
- source_word: περὶ τῆς βασιλείας τοῦ θεοῦ
  english_pob_choice: about the kingdom of God
  chosen_spanish: acerca del reino de Dios
  alternatives_spanish:
  - sobre el reino de Dios
  - en cuanto al reino de Dios
  lexicon: BDAG
  rationale: '''Reino de Dios'' conserva la frase bíblica establecida y no desplaza la imagen a ''reinado'', que aunque posible, no fue la elección del POB inglés.'
- source_word: τοὺς χρείαν ἔχοντας θεραπείας
  english_pob_choice: those who had need of healing
  chosen_spanish: a los que tenían necesidad de sanidad
  alternatives_spanish:
  - a los que necesitaban sanidad
  - a los que tenían necesidad de sanación
  lexicon: BDAG
  rationale: La construcción nominal 'tener necesidad de' refleja χρείαν ἔχοντας con bastante fidelidad. 'Sanidad' conserva el campo semántico de θεραπεία en el contexto inmediato de curación, y evita la redundancia de repetir exactamente el verbo 'sanar'.
- source_word: ἰᾶτο
  english_pob_choice: healing
  chosen_spanish: sanaba
  alternatives_spanish:
  - estaba sanando
  - curaba
  lexicon: BDAG
  rationale: El imperfecto medio indica acción en curso. 'Sanaba' es idiomático en español y conserva el aspecto durativo mejor que un perfecto simple.
theological_decisions:
- issue: βασιλεία τοῦ θεοῦ
  english_pob_reading: the kingdom of God
  chosen_spanish_reading: el reino de Dios
  alternative_spanish_readings:
  - el reinado de Dios
  rationale: Se mantiene la forma tradicional y transparente 'reino de Dios' para conservar la continuidad terminológica del evangelio de Lucas, tal como hace el texto inglés POB.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave)
- issue: Relación entre θεραπεία y ἰάομαι
  english_pob_reading: healing those who had need of healing
  chosen_spanish_reading: sanaba a los que tenían necesidad de sanidad
  alternative_spanish_readings:
  - sanaba a los que necesitaban sanidad
  - sanaba a los que tenían necesidad de sanación
  rationale: El griego presenta tanto la necesidad de θεραπεία como la acción de ἰάομαι. En español conviene conservar la repetición conceptual sin eliminarla, por eso se mantiene 'sanidad' en el objeto y 'sanaba' en el verbo, aunque exista una leve redundancia intencional.
  doctrine_reference: Translation philosophy §3 (no borrar tensiones léxicas documentadas)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió una formulación más cercana a γνόντες y a θεραπείας. En español se reflejó esa cercanía con 'al saberlo' y con una construcción que preserve el valor nominal de 'tener necesidad de sanidad'.
  spanish_consistency_notes:
  - Se mantuvo 'reino de Dios' por consistencia con la terminología bíblica estándar y con el audit trail inglés.
  - Se evitó 'Cristo' o cualquier sustitución innecesaria, ya que no aparece en el versículo.
  - Se usó 'multitudes' en plural para reflejar el plural griego ὄχλοι.
  - Se conservó el imperfecto narrativo con 'les hablaba' y 'sanaba' para respetar el aspecto durativo del griego.
