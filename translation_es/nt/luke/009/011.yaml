review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego: δέ como transición suave (''Pero''), γνόντες como circunstancial temporal (''al enterarse/saberlo''), ἠκολούθησαν como ''lo siguieron'', ἐλάλει/ἰᾶτο en imperfecto con valor durativo, y ''el reino de Dios'' correctamente preservado. Sin embargo, ἀποδεξάμενος tiene matiz favorable de recibir/acoger, mejor expresado en español por ''acogiéndolos'' que por ''recibiéndolos''. Además, ''necesidad de sanidad'' suena poco natural en español general e introduce una formulación eclesial marcada; conviene una opción más idiomática que siga preservando la construcción nominal.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'recibiéndolos' es algo plano frente al matiz de bienvenida, y 'tenían necesidad de sanidad' resulta forzado y menos natural para un español neutral. 'Acogiéndolos' y 'necesitaban sanación' mejoran fluidez sin perder fidelidad. La nota al pie también debe ajustarse para reflejar una alternativa idiomática en español y evitar el tecnicismo poco natural 'sanidad' en este contexto.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεοῦ -> ''Dios'', βασιλεία -> ''reino''. No aparecen términos sensibles como Yahvé, Mesías, Espíritu o δοῦλος. La revisión propuesta conserva la decisión POB de mantener el campo léxico de θεραπεία/ἰάομαι, pero en un español más natural.'
  issues:
  - severity: medium
    issue: ἀποδεξάμενος está subrepresentado por 'recibiéndolos'
    rationale: El griego expresa recibir favorablemente, acoger o dar la bienvenida. 'Recibiéndolos' puede sonar meramente físico o administrativo; 'acogiéndolos' preserva mejor la hospitalidad implícita sin exagerar.
  - severity: medium
    issue: '''a los que tenían necesidad de sanidad'' suena poco natural en español neutral'
    rationale: Aunque intenta reflejar la construcción nominal del griego, la expresión es rígida y eclesialmente marcada. 'A los que necesitaban sanación' conserva el sentido de θεραπεία y mejora la legibilidad.
  - severity: low
    issue: La nota al pie reproduce una alternativa menos natural en español
    rationale: Debe ajustarse para reflejar el texto revisado y ofrecer una alternativa clara, manteniendo la explicación léxica sobre θεραπεία como 'sanación' o 'tratamiento/cuidado'.
  revised_spanish_text: Pero las multitudes, al saberlo, lo siguieron. Y, acogiéndolos, les hablaba acerca del reino de Dios y sanaba a los que necesitaban sanación[a].
