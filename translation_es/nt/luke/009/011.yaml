  text: οἱ δὲ ὄχλοι γνόντες ἠκολούθησαν αὐτῷ. καὶ ⸀ἀποδεξάμενος αὐτοὺς ἐλάλει αὐτοῖς περὶ τῆς βασιλείας τοῦ θεοῦ, καὶ τοὺς χρείαν ἔχοντας θεραπείας ἰᾶτο.
base_translation:
  language: en
  yaml_path: translation/nt/luke/009/011.yaml
  text: But the crowds[a], learning of it, followed him. And welcoming them, he was speaking to them about the kingdom of God and healing those who had need of healing.
  footnotes:
  - marker: a
    text: Or 'those who needed healing.' The Greek phrase is literally 'those having need of θεραπεία,' and θεραπεία can mean 'healing' or 'treatment/care.'
