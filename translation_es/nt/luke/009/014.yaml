translation:
  language: es
  text: 'Porque había unos cinco mil hombres[a]. Y dijo a sus discípulos: «Háganlos recostarse[b] en grupos de unos cincuenta cada uno».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «hombres», especificando varones adultos; este conteo no incluye a mujeres ni niños.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Háganlos sentarse». El verbo griego sugiere específicamente recostarse para una comida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡσεὶ
  english_pob_choice: about
  chosen_spanish: como / unos
  alternatives_spanish:
  - aproximadamente
  - alrededor de
  lexicon: BDAG
  rationale: El griego expresa aproximación en ambos lugares. En español, “como” y “unos” comunican esa falta de exactitud de manera natural y sobria sin endurecer el ritmo del versículo.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - males
  lexicon: BDAG
  rationale: El término griego especifica varones adultos. “Hombres” conserva esa referencia masculina explícita con lectura natural en español y mantiene el alcance restringido del conteo.
- source_word: πεντακισχίλιοι
  english_pob_choice: five thousand
  chosen_spanish: cinco mil
  alternatives_spanish:
  - cinco millares
  lexicon: BDAG
  rationale: Es el valor cardinal directo del numeral griego, sin matiz adicional.
- source_word: Κατακλίνατε
  english_pob_choice: Have them recline
  chosen_spanish: Háganlos recostarse
  alternatives_spanish:
  - Háganlos sentarse
  - Sienten a ellos
  lexicon: BDAG
  rationale: El verbo sugiere recostarse para una comida, no solo sentarse. “Recostarse” preserva mejor ese matiz que una forma más genérica, y el imperativo dirigido a los discípulos queda claro en español.
- source_word: κλισίας
  english_pob_choice: in groups
  chosen_spanish: en grupos
  alternatives_spanish:
  - por grupos
  - en grupos de comedor
  lexicon: BDAG
  rationale: El sustantivo alude a distribuciones o agrupamientos ordenados. “En grupos” transmite el sentido de manera idiomática y concisa; el contexto del recostarse ya sugiere la organización para comer.
- source_word: ἀνὰ πεντήκοντα
  english_pob_choice: of about fifty each
  chosen_spanish: de unos cincuenta cada uno
  alternatives_spanish:
  - por cincuenta
  - cada grupo de unos cincuenta
  lexicon: BDAG
  rationale: La preposición distributiva con numeral indica reparto por unidades. “De unos cincuenta cada uno” expresa claramente esa distribución y mantiene la aproximación marcada por ὡσεὶ.
- source_word: γὰρ ... δὲ
  english_pob_choice: For ... And
  chosen_spanish: Porque ... Y
  alternatives_spanish:
  - Pues ... Y
  - Porque ... Entonces
  lexicon: BDAG
  rationale: γάρ introduce la explicación de la instrucción; “Porque” lo refleja de modo natural. δέ enlaza la acción narrativa; “Y” mantiene el avance del relato en español.
- source_word: πρὸς τοὺς μαθητὰς αὐτοῦ
  english_pob_choice: to his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a los discípulos de él
  lexicon: BDAG
  rationale: El posesivo está explícito en griego y se conserva con naturalidad en español. “Discípulos” reproduce el referente técnico del relato sin añadir matiz doctrinal.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente griego y coincide con la decisión inglesa revisada sin cambios: aproximación explícita, conteo masculino restringido, y el matiz de recostarse para comer en el imperativo.'
  spanish_consistency_notes:
  - Se mantuvo la correspondencia de partículas narrativas con “Porque ... Y” para reflejar γάρ y δέ sin volver la frase pesada.
  - Se preservó la ambigüedad funcional entre orden para comer y simple colocación mediante una nota alternativa en el verbo principal.
  - El conteo masculino se conservó en el texto y se aclaró en nota, siguiendo la política de exactitud lexical.
  - El estilo es formal y publicable, con imperativo plural de cortesía bíblica natural en español latinoamericano.
