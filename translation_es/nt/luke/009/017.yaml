translation:
  language: es
  text: 'Y todos comieron y quedaron satisfechos, y se recogió[a] para ellos lo que sobró de los pedazos[b]: doce cestas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fue recogido' o 'fue levantado' en vez de 'se recogió' para ἤρθη.
    reason: lexical_alternative
  - marker: b
    text: O 'fragmentos' para κλασμάτων.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφαγον
  english_pob_choice: ate
  chosen_spanish: comieron
  alternatives_spanish:
  - comieron
  - habían comido
  lexicon: ἐσθίω
  rationale: El aoristo narra la acción de manera simple; en español, el pretérito perfecto simple 'comieron' comunica de forma natural el evento consumado sin añadir matices no presentes en el griego.
- source_word: ἐχορτάσθησαν
  english_pob_choice: were satisfied
  chosen_spanish: quedaron satisfechos
  alternatives_spanish:
  - fueron saciados
  - quedaron llenos
  lexicon: χορτάζω
  rationale: '''Quedaron satisfechos'' expresa bien la idea de haber comido hasta quedar plenamente saciados, con un español digno y natural. ''Fueron saciados'' es más literal, pero menos idiomático en lectura pública.'
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno
  lexicon: πᾶς
  rationale: El griego enfatiza la totalidad de los presentes; en español, 'todos' mantiene esa fuerza de manera concisa. El sujeto ya está claro por el contexto, por lo que no es necesario repetir 'ellos'.
- source_word: ἤρθη
  english_pob_choice: was picked up
  chosen_spanish: se recogió
  alternatives_spanish:
  - fue recogido
  - se levantó
  lexicon: αἴρω
  rationale: Aquí el pasivo se refiere a recoger sobrantes. 'Se recogió' refleja bien la acción de juntar los restos en español natural, sin forzar una voz pasiva rígida.
- source_word: τὸ περισσεῦσαν
  english_pob_choice: what was left over
  chosen_spanish: lo que les sobró
  alternatives_spanish:
  - lo que quedó
  - lo sobrante
  lexicon: περισσεύω
  rationale: La forma sustantivada del participio expresa lo que quedó en exceso después de comer. 'Lo que les sobró' hace explícita la relación con los que comieron y conserva el sentido de excedente.
- source_word: κλασμάτων
  english_pob_choice: of the broken pieces
  chosen_spanish: de los pedazos
  alternatives_spanish:
  - de los fragmentos
  - de los trozos partidos
  lexicon: κλάσμα
  rationale: '''Pedazos'' comunica de manera clara y natural la idea de piezas rotas o partidas; mantiene la concreción del término sin sonar técnico. ''Fragmentos'' también es posible, pero menos inmediato en español común.'
- source_word: κόφινοι δώδεκα
  english_pob_choice: twelve baskets
  chosen_spanish: doce cestas
  alternatives_spanish:
  - doce canastos
  - doce canastas
  lexicon: κόφινος
  rationale: '''Cestas'' traduce bien κόφινοι con un término amplio y entendible para lectores hispanohablantes. ''Canastos'' es una alternativa válida, pero ''cestas'' resulta más neutro y formal.'
translation_notes:
  revision_awareness: El texto griego coloca primero la acción de comer y quedar saciados, y luego la recolección de lo sobrante. La redacción española sigue ese orden y conserva la relación entre 'lo que les sobró' y la recogida final, como en el ajuste observado en el audit trail inglés.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no aparece aquí el nombre divino ni κύριος.
  - '''Satisfechos'' se usó como equivalente idiomático de χορτάζω, sin perder el sentido de saciedad plena.'
  - La puntuación con dos puntos antes de 'doce cestas' reproduce el cierre enumerativo del griego y del audit trail inglés.
