  timestamp: '2026-05-07T20:55:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia básica del griego: todos comieron, quedaron saciados, y se recogieron doce cestas de lo sobrante. Sin embargo, ''lo que les sobró'' hace más fuerte de lo necesario el dativo αὐτοῖς, como si el sobrante fuera explícitamente ''a ellos'' o ''de ellos'', cuando el rastro inglés auditado lo entiende mejor como una relación más suelta (''for them/after they had eaten''). También conviene expresar con más precisión que lo recogido era ''de los pedazos'' o ''fragmentos'' sobrantes.'
  spanish_quality_summary: El español es claro y legible, pero la combinación 'lo que les sobró de los pedazos' suena algo menos natural y puede sugerir que 'les sobró' modifica de manera demasiado directa a las personas. Una formulación como 'se recogió para ellos lo que sobró de los pedazos' conserva mejor el orden lógico del griego y suena más limpia en español eclesial moderno. Las notas también deben anclarse al lugar correcto en el texto revisado.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego aquí. Las decisiones léxicas principales son en general adecuadas: ''comieron'', ''quedaron satisfechos'', y ''cestas'' encajan bien. Para κλασμάτων, ''pedazos'' es aceptable, aunque ''fragmentos'' sigue siendo alternativa útil en nota. Para ἤρθη, ''se recogió'' es una buena opción española para el pasivo contextual.'
  issues:
  - severity: medium
    issue: αὐτοῖς se refleja de forma algo sobreinterpretada en 'lo que les sobró'
    rationale: El dativo no exige que el sobrante sea presentado idiomáticamente como algo que 'les sobró' a ellos; el rastro inglés revisado lo ubica mejor con la acción de recoger ('was picked up for them'). En español, mover el complemento evita una lectura demasiado posesiva o experiencial.
  - severity: low
    issue: La estructura 'lo que les sobró de los pedazos' resulta algo áspera
    rationale: Aunque comprensible, en español fluye mejor 'lo que sobró de los pedazos' o 'de los fragmentos', con el dativo expresado aparte si se desea preservarlo.
  - severity: low
    issue: Las notas deben corresponder exactamente al texto revisado
    rationale: Si se reubica el matiz de ἤρθη/αὐτοῖς, los marcadores deben quedar anclados a las palabras o frases pertinentes del texto final.
  revised_spanish_text: 'Y todos comieron y quedaron satisfechos, y se recogió[a] para ellos lo que sobró de los pedazos[b]: doce cestas.'
  revised_footnotes:
  - marker: a
    text: O 'fue recogido' o 'fue levantado' en vez de 'se recogió' para ἤρθη.
    reason: lexical_alternative
  - marker: b
    text: O 'fragmentos' para κλασμάτων.
    reason: lexical_alternative
  revision_rationale: La revisión preserva mejor la relación del dativo αὐτοῖς según el rastro auditado, evitando la sobrelectura de 'les sobró' y mejorando la fluidez del español. También simplifica y alinea las notas léxicas con el texto final.
