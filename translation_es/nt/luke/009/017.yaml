revisions:
- from: 'Y todos comieron y quedaron satisfechos[a][b], y se recogió lo que les sobró de los pedazos: doce cestas.'
  to: 'Y todos comieron y quedaron satisfechos, y se recogió[a] para ellos lo que sobró de los pedazos[b]: doce cestas.'
  rationale: La revisión preserva mejor la relación del dativo αὐτοῖς según el rastro auditado, evitando la sobrelectura de 'les sobró' y mejorando la fluidez del español. También simplifica y alinea las notas léxicas con el texto final.
