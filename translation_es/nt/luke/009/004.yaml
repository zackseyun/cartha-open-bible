translation:
  language: es
  text: Y en cualquier casa[a] que entren, quédense allí[b] y salgan de allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en cualquier hogar». La construcción relativa indefinida comunica un sentido general.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, permanezcan en el mismo alojamiento hasta que partan de ese lugar, en vez de ir de casa en casa.
    reason: cultural_note
lexical_decisions:
- source_word: εἰς ἣν ἂν οἰκίαν
  english_pob_choice: whatever house
  chosen_spanish: en cualquier casa
  alternatives_spanish:
  - en la casa que
  - en cualquier hogar
  lexicon: BDAG
  rationale: La construcción relativa indefinida con ἄν expresa generalidad. En español, «en cualquier casa» transmite de forma natural esa apertura sin volver la frase pesada ni demasiado interpretativa.
- source_word: εἰσέλθητε
  english_pob_choice: you enter
  chosen_spanish: entren
  alternatives_spanish:
  - entren ustedes
  - entren en
  lexicon: BDAG
  rationale: El aoristo subjuntivo en la cláusula indefinida señala la acción eventual de entrar en la casa que les toque. «Entren» mantiene la brevedad y el tono directo del mandato.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en esa casa
  lexicon: BDAG
  rationale: «Allí» reproduce el deíctico espacial de modo natural en español y evita una repetición explicativa innecesaria.
- source_word: μένετε
  english_pob_choice: stay
  chosen_spanish: quédense allí
  alternatives_spanish:
  - permanezcan allí
  - sigan allí
  lexicon: BDAG
  rationale: El imperativo presente pide permanencia continua. «Quédense allí» comunica bien la idea de permanecer en la misma hospedaje, con un español fluido y fiel al valor durativo.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de esa casa
  lexicon: BDAG
  rationale: El adverbio señala el mismo lugar de hospedaje como punto de partida. «De allí» conserva la referencia espacial simple y directa.
- source_word: ἐξέρχεσθε
  english_pob_choice: depart from there
  chosen_spanish: salgan de allí
  alternatives_spanish:
  - partan de allí
  - váyanse de allí
  lexicon: BDAG
  rationale: El imperativo presente de salida se rinde de forma natural con «salgan de allí». En español mantiene el sentido de salir/departir desde el mismo lugar, sin sobrecargar el mandato.
theological_decisions:
- issue: Sentido práctico de la instrucción sobre la hospitalidad
  english_pob_reading: A practical command to remain in the same house until departure from that locality
  chosen_spanish_reading: Una instrucción práctica para permanecer en la misma casa hasta salir de ese lugar
  alternative_spanish_readings:
  - Solo una orden de salir físicamente de la casa
  - Una referencia a mudarse de localidad
  rationale: 'El contexto favorece una instrucción sobre conducta y hospitalidad, no una afirmación doctrinal. La redacción española conserva esa fuerza práctica: quedarse en la misma casa y salir desde allí al partir, sin introducir una interpretación más amplia que el texto no exige.'
  doctrine_reference: 'Principio de traducción: preservar el sentido llano del texto sin añadir contenido doctrinal ajeno.'
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión más reciente del POB en inglés, que conservó la estructura general y afinó el último verbo por una formulación más formal. La versión española mantiene ese nivel de literalidad funcional, adaptando únicamente la sintaxis a un español natural.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverencial o plural de segunda persona con imperativos en plural («entren», «quédense», «salgan»), coherente con el registro bíblico público.
  - Se usa «allí/de allí» para conservar la relación espacial interna del griego sin añadir explicaciones al cuerpo principal.
  - No se introduce «Cristo», «Señor» ni vocabulario teológico ajeno, porque el versículo es una instrucción narrativa sobre hospitalidad.
