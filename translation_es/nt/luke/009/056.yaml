lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción coordinante simple se vierte mejor con «Y» para conservar la unión narrativa sin añadir un matiz temporal que el griego no exige.
- source_word: ἐπορεύθησαν
  english_pob_choice: they went on
  chosen_spanish: fueron
  alternatives_spanish:
  - iban
  - se fueron
  - marcharon
  lexicon: BDAG
  rationale: El verbo denota movimiento/proseguir hacia un destino. En español, «fueron» mantiene la idea básica de desplazamiento con naturalidad; «iban» podría sugerir más duración y «marcharon» añade un matiz más enfático que el contexto no demanda.
- source_word: εἰς
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: BDAG
  rationale: Con verbo de movimiento y destino, el español natural es «a». Conserva la dirección sin sobretraducir la preposición griega.
- source_word: ἑτέραν
  english_pob_choice: another
  chosen_spanish: otra
  alternatives_spanish:
  - una diferente
  - una distinta
  lexicon: BDAG
  rationale: ἕτερος puede implicar «otro/diferente». «Otra» es la forma más natural y mantiene abierta la posibilidad de diferencia sin forzarla en el texto principal.
- source_word: κώμην
  english_pob_choice: village
  chosen_spanish: aldea
  alternatives_spanish:
  - pueblo
  - villa
  lexicon: BDAG
  rationale: κώμη designa un asentamiento rural más pequeño que una ciudad; «aldea» comunica con precisión ese rango y evita el posible ensanchamiento semántico de «pueblo».
translation_notes:
  revision_awareness: El contexto auditado en inglés no presenta revisiones ni notas textuales que alteren el sentido; la versión española sigue directamente el breve enunciado griego y conserva la misma ambigüedad léxica documentada para ἑτέραν.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología teológica innecesaria porque el versículo no contiene vocabulario divino.
  - «Otra aldea» mantiene la misma apertura semántica que el inglés POB con «another village» y su nota alternativa.
  - Se prefirió una estructura muy breve y narrativa para reflejar el carácter de transición del versículo.
