translation:
  language: es
  text: Pero mientras todavía se acercaba, el demonio lo derribó y le provocó convulsiones. Pero Jesús reprendió al espíritu inmundo, sanó al muchacho y se lo devolvió[a] a su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se lo entregó de nuevo a su padre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι δὲ προσερχομένου αὐτοῦ
  english_pob_choice: But while he was still coming near
  chosen_spanish: Pero mientras todavía se acercaba
  alternatives_spanish:
  - Y mientras todavía se acercaba
  - Ahora bien, mientras todavía se acercaba
  lexicon: BDAG
  rationale: Mantiene el valor de ἔτι como continuidad temporal ('todavía') y el matiz discursivo de δέ con una transición suave ('Pero'). 'Se acercaba' expresa la acción en curso sin forzar una perífrasis demasiado pesada.
- source_word: ἔρρηξεν αὐτὸν τὸ δαιμόνιον
  english_pob_choice: the demon threw him down
  chosen_spanish: el demonio lo derribó
  alternatives_spanish:
  - el demonio lo arrojó al suelo
  - el demonio lo tiró abajo
  lexicon: BDAG
  rationale: Ῥήγνυμι aquí describe una acción violenta de abatir/arrojar. 'Derribó' es natural en español y conserva la violencia narrativa. 'Demonio' sigue la distinción del POB entre δαιμόνιον y el posterior πνεῦμα ἀκάθαρτον.
- source_word: συνεσπάραξεν
  english_pob_choice: convulsed him
  chosen_spanish: le provocó convulsiones
  alternatives_spanish:
  - lo convulsionó
  - lo sacudió violentamente
  lexicon: BDAG
  rationale: El verbo expresa espasmos intensos. En español, 'le provocó convulsiones' comunica con claridad el efecto físico sin sonar mecánico. Se preserva el sentido médico-narrativo del pasaje.
- source_word: ἐπετίμησεν
  english_pob_choice: rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - mandó con severidad
  - reprendió con autoridad
  lexicon: BDAG
  rationale: '''Reprendió'' es el equivalente bíblico natural para el verbo de reprensión autoritativa en contextos de exorcismo. Mantiene la confrontación verbal sin agregar contenido no explícito.'
- source_word: τῷ πνεύματι τῷ ἀκαθάρτῳ
  english_pob_choice: the unclean spirit
  chosen_spanish: al espíritu inmundo
  alternatives_spanish:
  - al espíritu impuro
  - al espíritu no limpio
  lexicon: BDAG
  rationale: '''Espíritu inmundo'' conserva el lenguaje bíblico y el valor ritual-moral de ἀκάθαρτος. ''Inmundo'' es más tradicional que ''impuro'' y sigue siendo inteligible en español contemporáneo.'
- source_word: ἰάσατο
  english_pob_choice: healed
  chosen_spanish: sanó
  alternatives_spanish:
  - curó
  - restauró
  lexicon: BDAG
  rationale: Ἰάομαι en contextos de milagro suele traducirse con un verbo de sanidad. 'Sanó' es breve, claro y bíblico en español, sin perder la idea de restauración física.
- source_word: τὸν παῖδα
  english_pob_choice: the boy
  chosen_spanish: al muchacho
  alternatives_spanish:
  - al niño
  - al hijo
  lexicon: BDAG
  rationale: Παῖς puede ser 'niño', 'muchacho', 'siervo' o 'hijo'. Aquí, por la relación con el padre y el contexto narrativo, 'muchacho' es una opción precisa y natural, evitando añadir explícitamente 'hijo' donde el griego no lo dice.
- source_word: ἀπέδωκεν αὐτὸν τῷ πατρὶ αὐτοῦ
  english_pob_choice: gave him back to his father
  chosen_spanish: se lo devolvió a su padre
  alternatives_spanish:
  - lo devolvió a su padre
  - se lo entregó a su padre
  lexicon: BDAG
  rationale: ἀποδίδωμι tiene aquí el sentido de devolver/restaurar. 'Se lo devolvió' expresa bien el movimiento de restitución y conserva la relación personal entre Jesús, el muchacho y el padre. El clítico 'se' ayuda a reflejar el dativo de destinatario.
theological_decisions:
- issue: Naturaleza de la aflicción demoníaca
  english_pob_reading: Translate both δαιμόνιον and πνεῦμα ἀκάθαρτον straightforwardly as personal evil-spirit terminology ('demon,' 'unclean spirit').
  chosen_spanish_reading: 'Traducir con terminología personal de espíritu maligno: ''demonio'' y ''espíritu inmundo''.'
  alternative_spanish_readings:
  - fuerza maligna
  - aflicción espiritual
  rationale: El texto griego presenta un agente personal distinto del malestar físico del niño. La traducción no debe naturalizarlo como mera enfermedad o fuerza impersonal. Al mismo tiempo, se conserva la nota de sanidad física junto con la reprensión exorcística, como en el POB inglés.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto sigue de cerca el estado revisado más reciente del POB inglés, que mantiene la lectura estable sin cambios sustantivos. La decisión española conserva la alternancia exorcismo/sanidad y la nota de restitución de ἀπέδωκεν, sin introducir reinterpretaciones no atestiguadas.
  spanish_consistency_notes:
  - Se mantuvo 'demonio' para δαιμόνιον y 'espíritu inmundo' para πνεῦμα τὸ ἀκάθαρτον, preservando la distinción terminológica del griego y del audit trail inglés.
  - Se usó 'sanó' para ἰάσατο, coherente con el registro bíblico en español y con la dimensión de curación presente en el versículo.
  - Se evitó 'Cristo' o 'Señor' porque no aparecen en el versículo; 'Jesús' corresponde directamente a Ἰησοῦς.
  - Se eligió 'muchacho' para παῖς por su neutralidad contextual; 'hijo' queda reservado para la relación expresada por τῷ πατρὶ αὐτοῦ en la segunda mitad del versículo.
