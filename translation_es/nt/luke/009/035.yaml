translation:
  language: es
  text: 'Y se oyó una voz de la nube[a], que decía: «Este es mi Hijo, el Elegido; escúchenlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «mi Hijo, el amado» en vez de «mi Hijo, el Elegido».
    reason: textual_variant
lexical_decisions:
- source_word: φωνὴ ἐγένετο
  english_pob_choice: a voice came
  chosen_spanish: se oyó una voz
  alternatives_spanish:
  - vino una voz
  - una voz vino
  - hubo una voz
  lexicon: BDAG
  rationale: 'En español, la construcción más natural para este giro eventivo es impersonal: ‘se oyó una voz’. Conserva el hecho de la aparición/manifestación de la voz sin calcar de manera rígida ‘came to be’.'
- source_word: ἐκ τῆς νεφέλης
  english_pob_choice: from the cloud
  chosen_spanish: desde la nube
  alternatives_spanish:
  - de la nube
  - desde la nube de nube
  lexicon: BDAG
  rationale: ἐκ señala origen o procedencia; ‘desde la nube’ expresa bien ese punto de origen en español y mantiene el matiz de procedencia sin sonar forzado.
- source_word: λέγουσα
  english_pob_choice: saying
  chosen_spanish: que decía
  alternatives_spanish:
  - diciendo
  - la cual decía
  lexicon: BDAG
  rationale: El participio presente introduce el contenido de la voz. En español, ‘que decía’ resulta más natural y claro que un gerundio pesado en este contexto narrativo.
- source_word: Οὗτός ἐστιν
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Este mismo es
  - Éste es
  lexicon: BDAG
  rationale: La construcción demostrativa-copulativa se traduce de forma directa y idiomática con ‘Este es’, preservando la identificación enfática.
- source_word: ὁ υἱός μου
  english_pob_choice: my Son
  chosen_spanish: mi Hijo
  alternatives_spanish:
  - mi Hijo
  - el Hijo mío
  lexicon: BDAG
  rationale: ‘Hijo’ conserva el valor filial directo del griego y es la forma natural en español. Se mantiene la mayúscula por tratarse de una designación cristológica en el contexto.
- source_word: ὁ ἐκλελεγμένος
  english_pob_choice: the Chosen One
  chosen_spanish: el Elegido
  alternatives_spanish:
  - el Escogido
  - el que he escogido
  - el Elegido
  lexicon: BDAG
  rationale: El participio perfecto pasivo de ἐκλέγομαι expresa la condición de haber sido escogido. ‘El Elegido’ comunica esa elección de manera breve y digna en español, sin añadir un segundo posesivo que el griego no exige. ‘Escogido’ sería posible, pero ‘Elegido’ funciona mejor como título apposicional.
- source_word: αὐτοῦ ἀκούετε
  english_pob_choice: listen to him
  chosen_spanish: escúchenlo
  alternatives_spanish:
  - óiganlo
  - escuchen a él
  - préstense a él
  lexicon: BDAG
  rationale: El imperativo ἀκούετε aquí implica atender, obedecer o prestar oído. ‘Escúchenlo’ es una orden clara y natural en español que conserva la fuerza exhortativa del griego.
theological_decisions:
- issue: Descriptor cristológico de la voz celestial
  english_pob_reading: ‘This is my Son, the Chosen One’ reflects ὁ υἱός μου ὁ ἐκλελεγμένος rather than harmonizing to ‘beloved Son.’
  chosen_spanish_reading: ‘Este es mi Hijo, el Elegido’ sigue ὁ ἐκλελεγμένος y no armoniza con ‘amado’ o ‘amado Hijo’.
  alternative_spanish_readings:
  - ‘mi Hijo amado’
  - ‘mi Hijo, el amado’
  - ‘mi Hijo, el Escogido’
  rationale: La base griega dada lee ἐκλελεγμένος, así que la traducción debe preservar ‘elegido/escogido’ y no reemplazarlo por una lectura más familiar tomada de pasajes paralelos. Se mantiene la tensión textual en lugar de resolverla por armonización.
  doctrine_reference: Primacía del texto fuente; preservación de variantes y tensiones textuales en la traducción.
translation_notes:
  revision_awareness: El inglés POB refleja la revisión que prefirió ‘the Chosen One’ en lugar de ‘my Chosen One’ para corresponder mejor al artículo griego con ἐκλελεγμένος. La redacción española sigue esa misma decisión y evita añadir un posesivo que no está en el griego.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa de él.
  - Se usa ‘Hijo’ con mayúscula por coherencia cristológica en contexto narrativo-divino.
  - ‘Elegido’ conserva el valor de participio sustantivado y evita resolver la lectura variante en el texto principal.
