translation:
  language: es
  text: Entonces sucedió, cuando se cumplían los días de ser llevado arriba[a], que fijó su rostro[b] para ir a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de su ascensión». El griego dice literalmente «de ser llevado arriba».'
    reason: alternative_reading
  - marker: b
    text: «Fijó su rostro» es un modismo que expresa resolución firme.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now it happened
  chosen_spanish: Entonces sucedió
  alternatives_spanish:
  - Y sucedió
  - Ahora sucedió
  - Entonces aconteció
  lexicon: BDAG
  rationale: La fórmula narrativa marca transición de escena. «Entonces sucedió» conserva el valor de evento introducido por ἐγένετο sin forzar un calco demasiado inglés ni recurrir a una forma arcaica.
- source_word: ἐν τῷ συμπληροῦσθαι
  english_pob_choice: when ... were being fulfilled
  chosen_spanish: cuando se cumplían
  alternatives_spanish:
  - mientras se cumplían
  - cuando estaban por cumplirse
  - al cumplirse
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa tiempo; «se cumplían» mantiene el sentido de proceso de cumplimiento. En español, la pasiva refleja es natural y conserva la progresión verbal.
- source_word: τὰς ἡμέρας
  english_pob_choice: the days
  chosen_spanish: los días
  alternatives_spanish:
  - el tiempo
  - el período
  lexicon: BDAG
  rationale: Se conserva el plural concreto del griego. «Los días» es más transparente que una abstracción como «el tiempo».
- source_word: τῆς ἀναλήμψεως αὐτοῦ
  english_pob_choice: of his being taken up
  chosen_spanish: de su ser llevado
  alternatives_spanish:
  - de su ascensión
  - de su ser elevado
  - de su partida
  lexicon: BDAG
  rationale: «Ser llevado» reproduce de manera bastante literal la idea de ἀνάλημψις como 'ser tomado/llevado arriba' y evita cerrar demasiado pronto el sentido en «ascensión». «Ascensión» queda como alternativa interpretativa tradicional, pero el texto principal mantiene la amplitud del original.
- source_word: τὸ πρόσωπον ἐστήρισεν
  english_pob_choice: set his face
  chosen_spanish: afirmó su rostro
  alternatives_spanish:
  - fijó su rostro
  - puso su rostro firmemente
  - se determinó
  lexicon: BDAG
  rationale: Se conserva la imagen semítica de resolver el rumbo con el rostro dirigido hacia un destino. «Afirmó su rostro» mantiene la metáfora y su resonancia bíblica; en español es menos idiomático que «se determinó», pero más fiel a la textura del griego.
- source_word: τοῦ πορεύεσθαι
  english_pob_choice: to go
  chosen_spanish: para ir
  alternatives_spanish:
  - para caminar
  - para viajar
  - para dirigirse
  lexicon: BDAG
  rationale: El infinitivo de propósito se vierte naturalmente con «para ir». Es amplio y no añade matices de viaje que el texto no exige.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  lexicon: BDAG
  rationale: La preposición de dirección se expresa de forma directa con «a». Es la opción más natural y fiel para el destino geográfico.
theological_decisions:
- issue: Alcance de τῆς ἀναλήμψεως αὐτοῦ
  english_pob_reading: Rendered broadly as 'his being taken up' rather than narrowly as 'his ascension.'
  chosen_spanish_reading: Traducido de forma amplia como «su ser llevado», no restringido a «su ascensión».
  alternative_spanish_readings:
  - su ascensión
  - su partida
  rationale: El sustantivo griego apunta literalmente a un ser tomado/llevado arriba. En Lucas, el pasaje puede abarcar el movimiento culminante hacia exaltación; traducirlo con amplitud preserva esa tensión interpretativa en vez de resolverla de antemano.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Fuerza idiomática de τὸ πρόσωπον ἐστήρισεν
  english_pob_reading: Preserved the idiom in the main text.
  chosen_spanish_reading: Se conservó la metáfora con «afirmó su rostro».
  alternative_spanish_readings:
  - se determinó
  - resolvió firmemente
  - fijó su rumbo
  rationale: La frase no solo comunica decisión; también evoca un patrón bíblico de determinación profética. Mantener la imagen ayuda a preservar la resonancia literaria y teológica del texto.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text meaning and texture where understandable.'
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el pasaje muestra alto acuerdo entre el texto griego, la traducción inglesa auditada y la revisión más reciente, por lo que la propuesta española sigue de cerca la decisión óptima ya establecida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; aquí no aplica.
  - Se conserva el valor literal de ἀνάλημψις con una opción amplia, para no suprimir la tensión narrativa-teológica documentada.
  - Se preserva la metáfora de resolución en «afirmó su rostro», coherente con el tratamiento auditado de la expresión idiomática.
