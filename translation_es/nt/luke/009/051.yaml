    text: «Fijó su rostro» es un modismo que expresa resolución firme.
    reason: lexical_alternative
  revision_rationale: La revisión es pequeña pero necesaria para alcanzar mejor fidelidad y legibilidad en español. «De ser llevado arriba» representa con mayor claridad ἀναλήμψεως sin resolver prematuramente el alcance teológico en «ascensión». «Fijó su rostro» conserva el modismo y su resonancia bíblica, pero comunica mejor que «afirmó su rostro». Se añade la nota sobre el modismo porque el POB inglés la preserva y en español también ayuda a evitar ambigüedad.
