    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las aves del cielo»; la expresión tradicional «las aves del aire» también es posible.
    reason: lexical_alternative
  - marker: c
    text: «Hijo del Hombre» es la autodesignación de Jesús y puede evocar Daniel 7:13–14.
    reason: cross_reference
  revision_rationale: 'Se conserva casi todo el texto por ser fiel y natural, pero se corrige el aparato para alinearlo con la auditoría inglesa y con las reglas editoriales del proyecto: notas en orden a/b/c, ancladas en los términos correctos, y eliminación de la nota impropia sobre «nidos». También se ajusta «zorras» a «zorros» por mayor naturalidad genérica en español.'
