review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: Jesús responde, las zorras tienen refugios, las aves del cielo tienen nidos, y el Hijo del Hombre no tiene dónde recostar la cabeza. La estructura adversativa de δὲ como «pero» está bien preservada, y «el Hijo del Hombre» mantiene correctamente el título cristológico. Sin embargo, las notas al pie no siguen fielmente la pista de auditoría inglesa: la nota sobre «madrigueras»/«agujeros» falta en el lugar correspondiente y, en cambio, se añadió una nota sobre «nidos» que no corresponde al aparato inglés. Además, los marcadores no siguen el orden requerido a, b, c.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Madrigueras», «aves del cielo» y «recostar la cabeza» son opciones idiomáticas y fieles. Hay un detalle menor de estilo: «zorras» es posible, pero «zorros» suele funcionar mejor como genérico no marcado en español bíblico y evita una lectura innecesariamente femenina. La principal corrección necesaria es de aparato y consistencia editorial, no de legibilidad.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Jesús» y «el Hijo del Hombre» están bien. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión de conservar «el Hijo del Hombre» coincide con la justificación teológica documentada.
  issues:
  - severity: medium
    issue: Las notas al pie no corresponden al aparato inglés auditado.
    rationale: El inglés pone una nota lexical alternativa en «dens» ('holes'), otra en «birds of the sky/heaven/air», y una nota teológica en «Son of Man». El borrador español desplazó la nota de «madrigueras» a «nidos», alterando el vínculo con el término fuente φωλεοὺς.
  - severity: medium
    issue: Los marcadores de notas no siguen el formato y orden requeridos.
    rationale: La instrucción exige marcadores únicos en orden (a, b, c...) y anclados en el texto como [a], [b], [c]. El borrador usa n, o, p.
  - severity: low
    issue: «Zorras» es menos idiomático que «zorros» como genérico en español.
    rationale: Aunque ἀλώπεκες es gramaticalmente femenino plural en griego, el referente es genérico. En español bíblico general, «los zorros» suena más natural y evita llamar la atención sobre el género sin razón contextual.
  revised_spanish_text: 'Y Jesús le dijo: «Los zorros tienen madrigueras[a], y las aves del cielo[b] tienen nidos, pero el Hijo del Hombre[c] no tiene dónde recostar la cabeza».'
