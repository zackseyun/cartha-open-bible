translation:
  language: es
  text: 'Y Jesús le dijo: «Los zorros tienen madrigueras[a], y las aves del cielo[b] tienen nidos, pero el Hijo del Hombre[c] no tiene dónde recostar la cabeza».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agujeros» para «madrigueras».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las aves del cielo»; la expresión tradicional «las aves del aire» también es posible.
    reason: lexical_alternative
  - marker: c
    text: «Hijo del Hombre» es la autodesignación de Jesús y puede evocar Daniel 7:13–14.
    reason: cross_reference
lexical_decisions:
- source_word: ἀλώπεκες
  english_pob_choice: foxes
  chosen_spanish: zorras
  alternatives_spanish:
  - zorros
  lexicon: BDAG
  rationale: «Zorras» conserva el animal concreto del griego y suena natural en español. Mantiene también el matiz proverbial de la imagen sin generalizarla.
- source_word: φωλεοὺς
  english_pob_choice: dens
  chosen_spanish: madrigueras
  alternatives_spanish:
  - guaridas
  - agujeros
  lexicon: BDAG
  rationale: El término griego señala la cavidad o refugio del animal. «Madrigueras» comunica bien la idea de una guarida habitual y es idiomático en español; «agujeros» sería más literal pero menos natural.
- source_word: πετεινὰ τοῦ οὐρανοῦ
  english_pob_choice: the birds of the sky
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves del cielo
  - las aves del aire
  lexicon: BDAG
  rationale: Se conserva el genitivo «del cielo», que refleja con más precisión οὐρανοῦ que la fórmula tradicional «del aire». «Aves» es un equivalente digno y natural para πετεινὰ en este contexto.
- source_word: κατασκηνώσεις
  english_pob_choice: nests
  chosen_spanish: nidos
  alternatives_spanish:
  - posaderos
  - lugares de descanso
  lexicon: BDAG
  rationale: En el contexto de aves, «nidos» es la equivalencia más natural y directa. Mantiene la concreción de la imagen sin sobreinterpretarla.
- source_word: υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo humano
  lexicon: BDAG
  rationale: Se preserva la designación fija y cargada teológicamente, en vez de sustituirla por una paráfrasis explicativa. «Hijo del Hombre» es la forma establecida en español y permite la posible resonancia daniélica.
- source_word: ποῦ
  english_pob_choice: nowhere
  chosen_spanish: dónde
  alternatives_spanish:
  - ningún lugar
  - en qué lugar
  lexicon: BDAG
  rationale: El griego tiene la construcción negativa «no tiene dónde». En español se expresa de forma idiomática con «no tiene dónde», sin perder la fuerza de carencia de lugar.
- source_word: κλίνῃ τὴν κεφαλήν
  english_pob_choice: to lay his head
  chosen_spanish: recostar la cabeza
  alternatives_spanish:
  - apoyar la cabeza
  - descansar la cabeza
  lexicon: BDAG
  rationale: La expresión es idiomática y alude a tener un lugar para descansar o dormir. «Recostar la cabeza» conserva la imagen concreta en un español natural; no se reemplaza por una paráfrasis más abstracta.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - mas
  - y
  lexicon: BDAG
  rationale: La conjunción adversativa marca el contraste entre los animales con refugio y el Hijo del Hombre sin lugar propio. «Pero» comunica con claridad esa oposición.
- source_word: εἶπεν αὐτῷ ὁ Ἰησοῦς
  english_pob_choice: And Jesus said to him
  chosen_spanish: Y Jesús le dijo
  alternatives_spanish:
  - Y Jesús le habló
  - Jesús le dijo
  lexicon: BDAG
  rationale: Se mantiene la introducción narrativa simple y directa. «Le dijo» corresponde de manera precisa a εἶπεν αὐτῷ y evita una paraphrasis innecesaria.
theological_decisions:
- issue: Rendición de υἱὸς τοῦ ἀνθρώπου como título cristológico
  english_pob_reading: the Son of Man is preserved as Jesus' self-designation and may echo Daniel 7:13–14
  chosen_spanish_reading: el Hijo del Hombre se conserva como autodesignación de Jesús y posible eco de Daniel 7:13–14
  alternative_spanish_readings:
  - el ser humano
  - el Hijo humano
  rationale: Se conserva la forma titulada tradicional porque el texto no pide desambiguarla. La traducción no debe resolver la tensión entre la expresión idiomática y su posible carga mesiánica/apocalíptica.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Revisión sin cambios sustanciales: el versículo presenta un paralelismo sencillo y una imagen idiomática estable. Se ajustó el español para que fuera publicable, manteniendo la correspondencia semántica con el griego y la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantuvo «Y Jesús le dijo» como fórmula narrativa simple y transparente.
  - Se prefirió «las aves del cielo» por fidelidad directa a οὐρανοῦ, en lugar de la forma tradicional «del aire».
  - Se conservó «el Hijo del Hombre» como título establecido en español y no como paráfrasis.
  - No se usó «Señor» ni otras sustituciones no justificadas por la fuente.
  - La negación idiomática se expresó con «no tiene dónde», equivalente natural de οὐκ ἔχει ποῦ.
