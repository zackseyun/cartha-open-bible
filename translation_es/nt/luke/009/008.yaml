translation:
  language: es
  text: y por algunos, que Elías había aparecido, y por otros, que un profeta de antaño[a] había resucitado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «un profeta de tiempos antiguos había resucitado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπό τινων ... ἄλλων
  english_pob_choice: by some ... by others
  chosen_spanish: por algunos ... por otros
  alternatives_spanish:
  - algunos decían ... otros decían
  - de parte de algunos ... de parte de otros
  lexicon: BDAG
  rationale: La preposición ὑπό con genitivo marca el origen de la opinión; en español, «por algunos ... por otros» conserva ese valor de procedencia del dicho y mantiene la estructura elíptica del informe.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  - —
  lexicon: BDAG
  rationale: Aquí δέ funciona como enlace suave entre opiniones reportadas. «Y» preserva el carácter aditivo sin forzar contraste.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Introduce el contenido del reporte. «Que» mantiene clara la construcción de discurso indirecto en español.
- source_word: Ἠλίας
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elías el profeta
  lexicon: BDAG
  rationale: Nombre propio bíblico estándar en español; la transliteración habitual «Elías» es clara y fiel.
- source_word: ἐφάνη
  english_pob_choice: had appeared
  chosen_spanish: había aparecido
  alternatives_spanish:
  - apareció
  - había sido visto
  - se había manifestado
  lexicon: BDAG
  rationale: El aoristo pasivo de φαίνω en este contexto comunica que Elías «apareció» o se hizo visible. «Había aparecido» conserva el valor de reportaje y encaja con el tiempo narrativo español.
- source_word: προφήτης τις τῶν ἀρχαίων
  english_pob_choice: a prophet of the ancients
  chosen_spanish: un profeta de los antiguos
  alternatives_spanish:
  - un profeta antiguo
  - un profeta de antaño
  - un profeta de los tiempos antiguos
  lexicon: BDAG
  rationale: La combinación προφήτης τις con el genitivo τῶν ἀρχαίων no exige «uno de» en español; «un profeta de los antiguos» refleja más de cerca la relación genitiva y la indefinición de τις sin convertirla en una expresión menos natural.
- source_word: ἀνέστη
  english_pob_choice: had risen
  chosen_spanish: había resucitado
  alternatives_spanish:
  - había resurgido
  - había vuelto a levantarse
  - había vuelto a la vida
  lexicon: BDAG
  rationale: En este contexto, ἀνίστημι remite a la idea de levantarse de entre los muertos. «Había resucitado» comunica con claridad la afirmación popular sin resolverla teológicamente; preserva la tensión documental del pasaje.
theological_decisions:
- issue: La afirmación popular sobre un profeta antiguo que volvió a la vida
  english_pob_reading: rendered as 'a prophet of the ancients had risen' rather than a vaguer 'appeared again'
  chosen_spanish_reading: «un profeta de los antiguos había resucitado»
  alternative_spanish_readings:
  - «un profeta antiguo había aparecido de nuevo»
  - «un profeta de antaño había resurgido»
  - «uno de los profetas antiguos había resucitado»
  rationale: La fuente presenta una opinión reportada del pueblo, no una afirmación doctrinal del narrador. «Había resucitado» conserva el peso de ἀνέστη y la posible implicación de retorno a la vida, sin precisar cuál profeta era ni armonizar indebidamente la frase.
  doctrine_reference: Preservar la tensión teológica y el carácter de rumor reportado, no resolverlo en la traducción.
translation_notes:
  revision_awareness: La versión inglesa revisó una formulación anterior más interpretativa ('one of the ancient prophets') hacia una que refleja con mayor cercanía el griego ('a prophet of the ancients'). La redacción española sigue esa revisión al evitar «uno de» y al mantener la indefinición de τις con una relación genitiva más literal, pero en español natural.
  spanish_consistency_notes:
  - Se mantiene «Elías» como nombre propio estándar, en concordancia con el uso bíblico en español.
  - Se evita introducir «Cristo» u otra terminología ajena al versículo.
  - «Resucitado» se usa por la fuerza contextual de ἀνέστη; no se traduce como simple «apareció» para no diluir la tensión del pasaje.
  - La nota al pie ofrece una alternativa lexical legítima sin cambiar el texto principal.
