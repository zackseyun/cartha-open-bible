revisions:
- from: y por algunos, que Elías había aparecido, y por otros, que un profeta de los antiguos[a] había resucitado.
  to: y por algunos, que Elías había aparecido, y por otros, que un profeta de antaño[a] había resucitado.
  rationale: Se sustituye «de los antiguos» por «de antaño» para expresar con naturalidad el valor temporal de τῶν ἀρχαίων en español, sin introducir «uno de» ni perder la indefinición de τις. Se ajusta la nota para conservar una alternativa léxica genuina y no redundante.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:00:47Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura elíptica del griego («por algunos ... por otros»), conserva «Elías había aparecido» para ἐφάνη y mantiene el matiz de resurrección en ἀνέστη. Sin embargo, «un profeta de los antiguos» suena poco natural y puede sugerir erróneamente pertenencia a un grupo de personas antiguas, mientras que τῶν ἀρχαίων aquí se entiende mejor temporalmente, como «de antaño/de tiempos antiguos». La nota alternativa inglesa también apunta a ese valor temporal.
  spanish_quality_summary: El español es mayormente claro y digno, pero «de los antiguos» resulta torpe en lectura e introduce una ambigüedad innecesaria. «De antaño» es más natural en español bíblico contemporáneo y preserva el sentido temporal sin expandir indebidamente. El resto del verso fluye bien.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Elías» y «había resucitado»/«había aparecido» son adecuados. La revisión propuesta mejora la inteligibilidad sin apartarse de la decisión auditada de no convertir la frase en «uno de los profetas antiguos».
  issues:
  - severity: medium
    issue: «un profeta de los antiguos» es poco idiomático en español
    rationale: Aunque busca reflejar de cerca el genitivo griego, en español suena forzado y puede entenderse como «un profeta perteneciente a los antiguos», no como un profeta de tiempos pasados.
  - severity: low
    issue: La nota al pie queda demasiado cercana al texto revisado
    rationale: Si el texto principal pasa a «de antaño», la nota debe ofrecer una alternativa distinta y útil, no repetir casi exactamente la misma formulación.
  revised_spanish_text: y por algunos, que Elías había aparecido, y por otros, que un profeta de antaño[a] había resucitado.
  revised_footnotes:
  - marker: a
    text: O, «un profeta de tiempos antiguos había resucitado».
    reason: lexical_alternative
  revision_rationale: Se sustituye «de los antiguos» por «de antaño» para expresar con naturalidad el valor temporal de τῶν ἀρχαίων en español, sin introducir «uno de» ni perder la indefinición de τις. Se ajusta la nota para conservar una alternativa léxica genuina y no redundante.
