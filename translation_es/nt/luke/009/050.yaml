translation:
  language: es
  text: 'Pero Jesús le dijo[a]: «No lo impidan, porque quien no está contra ustedes está de parte de ustedes.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No lo detengan» o «No lo prohíban».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: BDAG
  rationale: δέ aquí enlaza la respuesta de Jesús con una leve oposición o contraste respecto de lo anterior; «pero» conserva esa relación con naturalidad en español.
- source_word: πρὸς αὐτὸν
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Juan
  lexicon: BDAG
  rationale: El griego usa pronombre, no el nombre propio. En español, «le» mantiene la referencia al interlocutor inmediato sin sobrecargar la frase.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar y transparente en español.
- source_word: Μὴ κωλύετε
  english_pob_choice: Do not stop him
  chosen_spanish: No se lo impidan
  alternatives_spanish:
  - No lo detengan
  - No se lo prohíban
  - No lo estorben
  lexicon: BDAG
  rationale: κωλύω puede significar impedir, detener o prohibir. «Impedir» expresa bien la acción de frustrar o bloquear al exorcista, y el plural del mandato se conserva con «lo»/«se lo» implícitamente dirigido a más de uno.
- source_word: ὃς γὰρ
  english_pob_choice: for whoever
  chosen_spanish: porque el que
  alternatives_spanish:
  - porque quien
  - pues quien
  lexicon: BDAG
  rationale: ὃς introduce una generalización. «El que» comunica la fuerza proverbial sin forzar una construcción demasiado abstracta.
- source_word: οὐκ ἔστιν καθ’ ὑμῶν
  english_pob_choice: is not against you
  chosen_spanish: no está contra ustedes
  alternatives_spanish:
  - no es contrario a ustedes
  - no se opone a ustedes
  lexicon: BDAG
  rationale: κατά con genitivo expresa oposición; «contra ustedes» preserva esa oposición de manera clara y natural en español, manteniendo el plural.
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: is for you
  chosen_spanish: por ustedes está
  alternatives_spanish:
  - está a favor de ustedes
  - está de parte de ustedes
  lexicon: BDAG
  rationale: ὑπέρ aquí indica apoyo o alineación. «Por ustedes está» conserva el paralelismo con «contra ustedes» y el giro enfático final del griego.
theological_decisions:
- issue: Alcance general de la sentencia
  english_pob_reading: Render the statement as a general principle ('whoever') rather than narrowing it only to the unnamed exorcist.
  chosen_spanish_reading: «el que»
  alternative_spanish_readings:
  - «quien»
  - «el que no está contra ustedes, por ustedes está»
  rationale: La forma relativa en griego puede funcionar como principio general además de referirse al caso inmediato. «El que» mantiene esa amplitud sin restringir innecesariamente el alcance.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió la anclaje de la nota al incluir [a] en el texto principal y se mantuvo la ambigüedad lexical de κωλύω con una alternativa breve y auditable.
  spanish_consistency_notes:
  - Se usó «ustedes» para preservar el plural griego de segunda persona.
  - Se evitó «Cristo» porque el texto nombra a Jesús directamente.
  - Se prefirió una estructura natural en español que conserva el contraste «contra/por».
  - La nota [a] está anclada exactamente en el verbo principal para que el lector vea la alternativa lexical documentada.
