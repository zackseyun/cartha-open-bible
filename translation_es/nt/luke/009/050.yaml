revisions:
- from: 'Pero Jesús le dijo[a]: «No se lo impidan, porque el que no está contra ustedes, por ustedes está.»'
  to: 'Pero Jesús le dijo[a]: «No lo impidan, porque quien no está contra ustedes está de parte de ustedes.»'
  rationale: Se ajusta κωλύετε a un español más directo y fiel («No lo impidan»), se corrige la nota para ofrecer alternativas reales documentadas por el inglés POB, y se reemplaza la inversión poco idiomática «por ustedes está» por «está de parte de ustedes», que expresa con claridad el sentido de apoyo de ὑπὲρ ὑμῶν. «Quien» preserva bien la fuerza generalizadora de ὃς γὰρ.
