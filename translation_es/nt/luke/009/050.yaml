    issue: «No se lo impidan» añade una referencia dativa no explícita en el griego.
    rationale: Μὴ κωλύετε toma como objeto al hombre/exorcista implícito en el contexto; «lo» basta en español. «Se lo» puede entenderse como ‘no le impidan eso’, desplazando levemente el foco del texto.
  - severity: medium
    issue: La nota al pie repite la traducción principal en lugar de ofrecer alternativas distintivas.
    rationale: Si el texto dice «No se lo impidan», la nota «O “No se lo prohíban” o “No se lo impidan”» no aporta una verdadera alternativa para esa segunda opción. Debe reflejar alternativas léxicas útiles, como «No lo detengan» o «No lo prohíban».
  - severity: low
    issue: «por ustedes está» es comprensible pero poco natural en español actual.
    rationale: Aunque busca conservar el paralelismo del griego, suena forzado. «Está de parte de ustedes» o «está a favor de ustedes» comunica mejor el valor de ὑπέρ sin pérdida significativa.
  revised_spanish_text: 'Pero Jesús le dijo[a]: «No lo impidan, porque quien no está contra ustedes está de parte de ustedes.»'
