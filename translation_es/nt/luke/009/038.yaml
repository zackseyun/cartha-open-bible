translation:
  language: es
  text: 'Y he aquí[a], un hombre de la multitud gritó, diciendo: «Maestro, te ruego que mires a mi hijo, porque es mi único hijo.[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira» o «ve». El griego usa una partícula de atención equivalente a «he aquí» o «mira».
    reason: lexical_alternative
  - marker: b
    text: O «mi único hijo». El griego dice literalmente que él es para mí «el único» o «el único engendrado»; en contexto, como ya ha sido identificado como hijo, también puede entenderse como «mi único hijo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ve
  lexicon: BDAG
  rationale: Conserva la función discursiva de atención de ἰδού con una fórmula natural y reverente en español. ‘He aquí’ mantiene el matiz formal del POB en inglés sin volverse arcaico en exceso.
- source_word: ἀνὴρ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: ἀνήρ designa específicamente a un hombre; ‘un hombre’ preserva ese rasgo de género y no lo diluye en un término genérico.
- source_word: ἀπὸ τοῦ ὄχλου
  english_pob_choice: from the crowd
  chosen_spanish: de la multitud
  alternatives_spanish:
  - entre la multitud
  - saliendo de la multitud
  lexicon: BDAG
  rationale: La frase expresa procedencia respecto del grupo reunido. ‘De la multitud’ es la manera más natural en español y refleja bien el origen inmediato del hablante.
- source_word: ἐβόησεν
  english_pob_choice: cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exclamó
  lexicon: BDAG
  rationale: El verbo comunica un llamado fuerte y urgente. ‘Gritó’ transmite la intensidad del momento; en español suena más directo que ‘clamó’ sin perder el sentido.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: Mantiene la vinculación narrativa del participio griego de manera fluida en español.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro mío
  - Profesor
  lexicon: BDAG
  rationale: Διδάσκαλος significa primariamente ‘maestro/teacher’. ‘Maestro’ comunica respeto y enseñanza sin introducir el matiz eclesiástico de otros términos.
- source_word: δέομαί σου
  english_pob_choice: I beg you
  chosen_spanish: te ruego
  alternatives_spanish:
  - te imploro
  - te suplico
  lexicon: BDAG
  rationale: δέομαι expresa una súplica intensa. ‘Te ruego’ es natural, digno y suficientemente fuerte para la urgencia del ruego.
- source_word: ἐπιβλέψαι ἐπὶ
  english_pob_choice: to look upon
  chosen_spanish: mires a
  alternatives_spanish:
  - mires sobre
  - pongas atención a
  - mires con favor a
  lexicon: BDAG
  rationale: El griego puede implicar mirar con atención o consideración. ‘Mires a’ conserva la sencillez del verbo, dejando el matiz de atención implícito sin sobrecargar la frase.
- source_word: τὸν υἱόν μου
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo varón
  lexicon: BDAG
  rationale: υἱός es ‘hijo’; en español ‘mi hijo’ es la traducción directa y natural. La relación filial ya queda clara por el contexto.
- source_word: μονογενής
  english_pob_choice: only child
  chosen_spanish: mi único hijo
  alternatives_spanish:
  - mi único hijo varón
  - mi hijo único
  lexicon: BDAG
  rationale: El POB en inglés nota la tensión entre ‘only child’ y ‘only son’. En español, ‘mi único hijo’ preserva la fuerza semántica de exclusividad/único descendiente sin necesidad de repetir ‘hijo’ dos veces en la misma cláusula.
- source_word: μοί ἐστιν
  english_pob_choice: he is my
  chosen_spanish: es mi
  alternatives_spanish:
  - es para mí
  - me pertenece como
  lexicon: BDAG
  rationale: La construcción con dativo es posesiva/relacional en el contexto. ‘Es mi’ expresa naturalmente la pertenencia familiar en español.
translation_notes:
  revision_awareness: 'Se revisó el texto inglés de referencia y sus notas: no hubo cambios posteriores relevantes ni revisiones aplicadas, y el acuerdo interno fue alto. La redacción española sigue la misma tensión lexical documentada para μονογενής entre ‘único hijo’ y ‘único hijo varón’/‘mi único hijo’.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva un registro reverente y narrativo, con puntuación española estándar y una cita directa con comillas angulares.
  - La decisión sobre μονογενής evita sobretraducir con una glosa doctrinal y refleja la nota de ambigüedad del POB en inglés.
