translation:
  language: es
  text: 'Y todos quedaron asombrados de la majestad[a] de Dios. Pero mientras todos se maravillaban de todo lo que él hacía, dijo a sus discípulos:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grandeza de Dios». El griego μεγαλειότης denota grandeza, esplendor o majestad; «majestad» se eligió por su naturalidad en español y su idoneidad para expresar el esplendor divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεπλήσσοντο
  english_pob_choice: were astonished
  chosen_spanish: quedaron asombrados
  alternatives_spanish:
  - estaban asombrados
  - quedaron maravillados
  lexicon: BDAG
  rationale: El imperfecto griego expresa una reacción en curso; en español, ‘quedaron asombrados’ comunica una reacción intensa y natural sin volverla excesivamente literaria. ‘Maravillados’ se reserva para θαυμαζόντων en la siguiente cláusula, para conservar la distinción léxica del griego y del POB inglés.
- source_word: πάντες
  english_pob_choice: they were all
  chosen_spanish: Y todos
  alternatives_spanish:
  - Todos
  - Y toda la gente
  lexicon: BDAG
  rationale: El sujeto universal se mantiene de forma directa. ‘Y todos’ preserva la continuidad narrativa y el valor de totalidad sin añadir un sujeto más explicativo que el griego.
- source_word: ἐπὶ τῇ μεγαλειότητι τοῦ θεοῦ
  english_pob_choice: at the majesty of God
  chosen_spanish: de la majestad de Dios
  alternatives_spanish:
  - ante la majestad de Dios
  - por la majestad de Dios
  - a causa de la majestad de Dios
  lexicon: BDAG
  rationale: El griego usa ἐπί con dativo para marcar el objeto o causa del asombro. En español, una construcción como ‘de la majestad de Dios’ expresa de manera natural el motivo del asombro; se evita ‘majestad’ traducido por ‘grandeza’ porque la elección inglesa documentada favorece el matiz de esplendor divino.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: Genitivo posesivo sencillo; no requiere ampliación ni cambio de sentido. Se conserva el referente divino de forma directa.
- source_word: Πάντων δὲ θαυμαζόντων
  english_pob_choice: But while everyone was marveling
  chosen_spanish: Pero mientras todos se maravillaban
  alternatives_spanish:
  - Y mientras todos se maravillaban
  - Pero mientras todos admiraban
  lexicon: BDAG
  rationale: El genitivo absoluto se vierte con una cláusula temporal circunstancial. ‘Se maravillaban’ reproduce bien θαυμάζω y conserva una intensidad distinta de ἐκπλήσσομαι; ‘admiraban’ sería más débil y perdería parte del impacto.
- source_word: ἐπὶ πᾶσιν
  english_pob_choice: at all
  chosen_spanish: de todo
  alternatives_spanish:
  - por todo
  - ante todo
  lexicon: BDAG
  rationale: La preposición con dativo marca el objeto de la admiración. En español, ‘maravillarse de todo’ es idiomático y conserva la amplitud del griego sin volverla pesada. Se evita ‘atónitos por’ porque duplicaría el campo semántico de ἐξεπλήσσοντο.
- source_word: οἷς ἐποίει
  english_pob_choice: that he was doing
  chosen_spanish: lo que hacía
  alternatives_spanish:
  - todo lo que hacía
  - las cosas que hacía
  - lo que estaba haciendo
  lexicon: BDAG
  rationale: El relativo más el imperfecto señalan acciones en progreso. ‘Lo que hacía’ es la forma más natural en español y mantiene la imperfectividad sin añadir una perífrasis innecesaria. La frase puede leerse en relación con Jesús por el contexto inmediato, como en el POB inglés.
- source_word: εἶπεν πρὸς
  english_pob_choice: he said to
  chosen_spanish: dijo a
  alternatives_spanish:
  - habló a
  - les dijo
  lexicon: BDAG
  rationale: Fórmula narrativa estándar. ‘Dijo a’ es la equivalencia más natural y directa en español bíblico moderno.
- source_word: τοὺς μαθητὰς αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: Se conserva la relación posesiva idiomática. ‘Sus discípulos’ es claro, natural y fiel al referente narrativo.
theological_decisions:
- issue: Referente de ‘él’ en la cláusula relativa y del sujeto implícito de ‘dijo’
  english_pob_reading: '''he'' refers to Jesus, while the preceding clause attributes the displayed majesty to God'
  chosen_spanish_reading: ‘él’ se refiere a Jesús, mientras que la majestad se atribuye a Dios
  alternative_spanish_readings:
  - implícita agencia divina total
  - resolver el sujeto como ‘Dios’ en ambas cláusulas
  rationale: 'La escena mantiene la tensión narrativa: se habla de la majestad de Dios, pero quien actúa y habla es Jesús. En español conviene conservar esa distinción sin explicitar de más, para no borrar el matiz teológico del texto y del POB inglés.'
  doctrine_reference: Preservar la tensión teológica sin resolverla en una sola identificación.
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el aparato auditado en inglés POB. No hubo revisiones aplicadas en el último pase; la concordancia reportada es alta y sin objeciones. La traducción española adopta el valor de ‘majestad’ para μεγαλειότης y mantiene la progresión entre el asombro de todos y la admiración ante las acciones de Jesús.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para θεός.
  - Se conserva la distinción entre ‘asombrados’ y ‘se maravillaban’ para reflejar ἐξεπλήσσοντο / θαυμαζόντων.
  - Se evita ‘Cristo’ porque no aparece en el verso ni es requerido por el contexto inmediato.
  - La puntuación con dos oraciones reproduce la separación del griego y el giro narrativo hacia el dicho de Jesús.
