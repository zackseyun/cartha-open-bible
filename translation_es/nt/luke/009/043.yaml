- from: 'Y todos quedaron asombrados de la majestad de Dios. Pero mientras todos se maravillaban de todo lo que él[ a] hacía, dijo a sus discípulos:'
  to: 'Y todos quedaron asombrados de la majestad[a] de Dios. Pero mientras todos se maravillaban de todo lo que él hacía, dijo a sus discípulos:'
  rationale: 'Se corrige el único problema sustancial del borrador: se elimina la marca de nota errónea en «él», se añade la nota léxica requerida para «majestad» conforme al rastro del POB inglés, y se ancla correctamente en la palabra relevante. El resto del texto puede mantenerse por ser fiel, natural y teológicamente adecuado.'
