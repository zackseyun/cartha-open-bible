translation:
  language: es
  text: quienes, apareciendo en gloria, hablaban de su partida[a], que estaba por llevar a cabo en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “su éxodo”. El término griego puede significar “partida” y quizá alude al patrón del Éxodo mientras se refiere a lo que Jesús iba a llevar a cabo en Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀφθέντες
  english_pob_choice: appearing
  chosen_spanish: apareciendo
  alternatives_spanish:
  - habiendo aparecido
  - siendo vistos
  lexicon: BDAG
  rationale: 'El participio aoristo pasivo de ὁράω se usa aquí con sentido intransitivo: “aparecer” / “ser visto”. En español, “apareciendo” conserva la relación participial con el verbo principal y suena natural en la cláusula.'
- source_word: ἐν δόξῃ
  english_pob_choice: in glory
  chosen_spanish: en gloria
  alternatives_spanish:
  - en esplendor
  - gloriosamente
  lexicon: BDAG
  rationale: Se conserva el sustantivo δόξα como “gloria”, manteniendo el peso teológico de la majestad visible en el contexto de la transfiguración.
- source_word: ἔλεγον
  english_pob_choice: were speaking
  chosen_spanish: hablaban
  alternatives_spanish:
  - decían
  - seguían hablando
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso. “Hablaban” comunica conversación continua de modo natural en español sin perder el valor aspectual.
- source_word: ἔξοδον
  english_pob_choice: departure
  chosen_spanish: partida
  alternatives_spanish:
  - éxodo
  - salida
  - muerte
  - partida de este mundo
  lexicon: BDAG
  rationale: “Partida” conserva el sentido básico de salida o marcha sin cerrar el alcance del término. Se evita reducirlo a “muerte” y también se evita imponer “éxodo” en el texto principal; esa posibilidad se preserva como alternativa léxica.
- source_word: ἤμελλεν
  english_pob_choice: was about to
  chosen_spanish: estaba por
  alternatives_spanish:
  - iba a
  - estaba destinado a
  lexicon: BDAG
  rationale: La perífrasis indica inminencia o futuro próximo. “Estaba por” mantiene esa cercanía temporal en un español natural.
- source_word: πληροῦν
  english_pob_choice: accomplish
  chosen_spanish: cumplir
  alternatives_spanish:
  - acometer y llevar a cabo
  - completar
  - realizar
  lexicon: BDAG
  rationale: Aquí πληρόω tiene el sentido de llevar a término o realizar plenamente. “Cumplir” conserva la idea de consumar/realizar una acción o propósito sin restringirla indebidamente.
- source_word: ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: BDAG
  rationale: Es la equivalencia locativa normal de ἐν con nombre de lugar y resulta idiomática en español contemporáneo.
theological_decisions:
- issue: Alcance de τὴν ἔξοδον αὐτοῦ
  english_pob_reading: Rendered broadly as 'his departure' rather than narrowly as 'his death.'
  chosen_spanish_reading: “su partida” como lectura amplia, sin reducirla a “su muerte”.
  alternative_spanish_readings:
  - su éxodo
  - su muerte
  - su salida de este mundo
  rationale: El término probablemente alude a la muerte de Jesús y quizá también evoca el patrón del Éxodo. “Partida” preserva esa amplitud y deja abierta la tensión interpretativa en lugar de resolverla de forma prematura.
  doctrine_reference: Preservar la tensión teológica y lexical sin colapsarla en una sola equivalencia.
translation_notes:
  revision_awareness: 'Se siguió el rastro de revisión del inglés POB: el cambio de ''fulfill'' a ''accomplish'' se refleja en español con ''cumplir'', que comunica mejor la idea de llevar a término. Se conservó la amplitud de ἔξοδος con ''partida'' y se dejó una nota alternativa para ''éxodo''.'
  spanish_consistency_notes:
  - Se mantiene 'Jerusalén' con grafía española estándar.
  - Se usa 'gloria' para δόξα por coherencia con el registro teológico del pasaje.
  - Se evita 'SEÑOR' u otra sustitución innecesaria, ya que no aparece un criterio de máscara divina en este versículo.
  - Se prefiere un español sobrio y publicable, sin calcos rígidos ni paráfrasis expansivas.
