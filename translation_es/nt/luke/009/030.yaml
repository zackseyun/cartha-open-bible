translation:
  language: es
  text: Y he aquí, dos hombres hablaban con él, los cuales eran Moisés y Elías,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: Conserva el marcador discursivo de sorpresa y atención repentina sin sonar forzado en español. 'He aquí' comunica bien el énfasis narrativo de Lucas y es más natural que un calco como 'behold'.
- source_word: ἄνδρες δύο
  english_pob_choice: two men
  chosen_spanish: dos hombres
  alternatives_spanish:
  - dos varones
  - dos personas
  lexicon: BDAG
  rationale: ἀνήρ aquí designa a dos figuras masculinas identificables; 'hombres' es la equivalencia más natural y fiel. 'Varones' es más literal pero menos idiomático en español actual; 'personas' debilita el rasgo semántico de sexo/varón presente en el griego.
- source_word: συνελάλουν
  english_pob_choice: were talking
  chosen_spanish: hablaban
  alternatives_spanish:
  - estaban hablando
  - conversaban
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso. 'Hablaban' conserva esa duratividad de forma sobria y natural; 'conversaban' añade un matiz más elaborado, y 'estaban hablando' es más explicativo pero menos fluido.
- source_word: αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Con συλλαλέω, el dativo indica interlocución recíproca; 'con él' reproduce mejor esa relación que 'a él', que en español suena más direccional y menos conversacional.
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: quienes
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: '''Quienes'' mantiene la referencia identificativa de la relativa y suena natural en español cuando el antecedente es personal. ''Que'' también sería posible, pero ''quienes'' preserva mejor la precisión referencial.'
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Standard transliteration
  rationale: Forma castellana estándar del nombre propio bíblico, plenamente reconocible y coherente con el uso bíblico en español.
- source_word: Ἠλίας
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: Standard transliteration
  rationale: Forma castellana estándar del profeta, más clara y usual que 'Elias'. Mantiene la identificación directa del personaje sin añadir explicación interpretativa.
theological_decisions:
- issue: Identificación directa de las figuras de la transfiguración
  english_pob_reading: The text straightforwardly identifies the two men as Moses and Elijah.
  chosen_spanish_reading: El texto identifica de manera directa a los dos hombres como Moisés y Elías.
  alternative_spanish_readings:
  - El texto sugiere que eran Moisés y Elías.
  - Los dos hombres simbolizan a Moisés y Elías.
  rationale: No hay motivo textual para suavizar o alegorizar la identificación. La traducción conserva la afirmación directa y deja intacta la tensión narrativa sobre su aparición, sin ampliarla ni resolverla.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no hay revisiones aplicadas y la redacción española sigue de cerca la identificación directa y el aspecto imperfectivo del verbo.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, evitando tecnicismos innecesarios.
  - Se preserva la relación conversacional implícita en el dativo con 'con él'.
  - No se introducen notas porque el verso no presenta variantes textuales ni ambigüedades doctrinales adicionales en el paquete fuente.
