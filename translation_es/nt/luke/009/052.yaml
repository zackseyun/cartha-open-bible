  text: καὶ ἀπέστειλεν ἀγγέλους πρὸ προσώπου αὐτοῦ. καὶ πορευθέντες εἰσῆλθον εἰς κώμην Σαμαριτῶν, ⸀ὡς ἑτοιμάσαι αὐτῷ·
base_translation:
  language: en
  yaml_path: translation/nt/luke/009/052.yaml
  text: And he sent messengers ahead of him[b][a]. And they went and entered a village of the Samaritans to prepare for him.
  footnotes:
