translation:
  language: es
  text: Y envió mensajeros delante de él[a]. Y ellos fueron y entraron en una aldea de los samaritanos[b], para prepararle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «delante de su rostro»; es decir, «antes de él» para el giro idiomático griego.
    reason: lexical_alternative
  - marker: b
    text: O «una aldea samaritana». El griego dice más literalmente «una aldea de los samaritanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: El aoristo de ἀποστέλλω se expresa de forma natural y directa en español con «envió». Mantiene el valor básico de envío sin sobrerretórica.
- source_word: ἀγγέλους
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - ángeles
  lexicon: BDAG
  rationale: En este contexto narrativo se trata de enviados humanos, no de seres celestiales. «Mensajeros» conserva el sentido contextual y evita la lectura errónea de «ángeles».
- source_word: πρὸ προσώπου αὐτοῦ
  english_pob_choice: ahead of him
  chosen_spanish: delante de él
  alternatives_spanish:
  - antes de él
  - en frente de él
  lexicon: BDAG
  rationale: La expresión idiomática griega literalmente alude a ir «ante su rostro/presencia», pero en español «delante de él» comunica bien la idea de ir precediéndolo sin forzar un calco.
- source_word: πορευθέντες
  english_pob_choice: they went
  chosen_spanish: fueron
  alternatives_spanish:
  - habiendo ido
  - después de ir
  lexicon: BDAG
  rationale: 'El participio aoristo queda bien reflejado en español narrativo con una forma simple coordinada: «fueron». Evita una construcción pesada y preserva la secuencia de acciones.'
- source_word: εἰσῆλθον
  english_pob_choice: entered
  chosen_spanish: entraron
  alternatives_spanish:
  - se metieron
  - fueron a
  lexicon: BDAG
  rationale: El aoristo de εἰσέρχομαι se traduce de manera natural con «entraron», claro y conciso en español.
- source_word: κώμην
  english_pob_choice: village
  chosen_spanish: aldea
  alternatives_spanish:
  - pueblo
  - villa
  lexicon: BDAG
  rationale: κώμη designa una población pequeña; «aldea» mantiene esa precisión. «Pueblo» puede sonar más amplio o menos específico.
- source_word: Σαμαριτῶν
  english_pob_choice: of the Samaritans
  chosen_spanish: de samaritanos
  alternatives_spanish:
  - samaritana
  - de los samaritanos
  lexicon: BDAG
  rationale: El genitivo plural indica pertenencia o asociación. En español, «aldea de samaritanos» reproduce de cerca la forma griega y conserva la posibilidad de entenderla como una aldea habitada por samaritanos.
- source_word: ὡς ἑτοιμάσαι αὐτῷ
  english_pob_choice: to prepare for him
  chosen_spanish: para prepararle todo
  alternatives_spanish:
  - para prepararle
  - para hacerle los preparativos
  lexicon: BDAG
  rationale: La construcción expresa propósito. En español, «para prepararle todo» comunica naturalmente la finalidad implícita de hacer los preparativos para Jesús; «todo» suplanta el objeto implícito de manera idiomática sin añadir contenido doctrinal.
theological_decisions:
- issue: Identidad de los ἀγγέλους
  english_pob_reading: messengers, not angels
  chosen_spanish_reading: mensajeros, no ángeles
  alternative_spanish_readings:
  - ángeles
  - enviados
  rationale: El contexto inmediato muestra que son enviados humanos previos a Jesús. Traducir «ángeles» introduciría un error semántico; «mensajeros» mantiene la lectura contextual del texto griego.
  doctrine_reference: BDAG; contexto narrativo de Lucas 9:52
- issue: Naturaleza de la expresión locativa πρὸ προσώπου αὐτοῦ
  english_pob_reading: ahead of him
  chosen_spanish_reading: delante de él
  alternative_spanish_readings:
  - antes de él
  - en su presencia
  rationale: No se debe ocultar la imagen semítica de ir delante de su presencia, pero en español bíblico actual «delante de él» es claro y fiel. Evita la rigidez de «antes de su faz» sin perder la relación espacial.
  doctrine_reference: BDAG; idiomática semítica
- issue: Construcción de propósito con ὡς ἑτοιμάσαι αὐτῷ
  english_pob_reading: to prepare for him
  chosen_spanish_reading: para prepararle todo
  alternative_spanish_readings:
  - para prepararle
  - para que le prepararan
  rationale: La frase no especifica el objeto de la preparación. En español, añadir «todo» expresa de manera natural la actividad preparatoria sin alterar el sentido; se evita una paráfrasis más amplia que podría sobreexplicar.
  doctrine_reference: BDAG; sintaxis de infinitivo final
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del audit trail en inglés, que prefirió una coordenada narrativa simple («And they went and entered…») en lugar de una calca temporal pesada. La versión española adopta la misma solución idiomática con «Y ellos fueron y entraron…», manteniendo la secuencia de acciones y el propósito final.
  spanish_consistency_notes:
  - Se conserva «Y» al inicio de las dos cláusulas para reflejar la coordinación narrativa del griego.
  - «mensajeros» se usa de manera consistente para ἀγγέλους en este contexto narrativo, reservando «ángeles» para seres celestiales cuando el contexto lo exija.
  - «aldea» mantiene la precisión de κώμη frente a opciones más generales como «pueblo».
  - La nota [a] se ancla en «delante de él» porque la expresión idiomática admite una glosa más literal.
  - La nota [b] se ancla en «aldea» / «de samaritanos» para preservar la alternativa formal del genitivo plural.
