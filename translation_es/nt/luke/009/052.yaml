revisions:
- from: Y envió mensajeros[a] delante de él[b]. Y ellos fueron y entraron en una aldea de samaritanos, para prepararle todo.
  to: Y envió mensajeros delante de él[a]. Y ellos fueron y entraron en una aldea de los samaritanos[b], para prepararle.
  rationale: Se quitó «todo» porque no está en el griego y sobretraduce el propósito expresado por ὡς ἑτοιμάσαι αὐτῷ. Se corrigieron los anclajes de las notas para que correspondan a las frases que explican. Se ajustó «aldea de samaritanos» a «aldea de los samaritanos» por mayor fidelidad al genitivo plural y mejor naturalidad en español, conservando la alternativa idiomática en nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:01:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: Jesús envía mensajeros delante de él, ellos van, entran en una aldea samaritana y lo hacen con propósito de preparar su llegada. Sin embargo, «para prepararle todo» añade un objeto implícito no presente en ὡς ἑτοιμάσαι αὐτῷ, donde el griego solo dice «preparar para él / prepararle». Además, las notas están ancladas al revés: [a] está en «mensajeros» pero explica πρὸ προσώπου αὐτοῦ, y [b] está en «delante de él» pero explica «aldea de los samaritanos».'
  spanish_quality_summary: El español es generalmente claro y natural. «Aldea» es válido y digno, aunque «aldea de samaritanos» suena levemente menos natural que «aldea de los samaritanos» o «aldea samaritana»; como el proyecto quiere preservar la cercanía formal al genitivo plural, conviene mantener la formulación más explícita con nota alternativa. La coordinación «fueron y entraron» funciona bien. La principal mejora necesaria es quitar «todo» para evitar sobretraducción.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Mensajeros» para ἀγγέλους es correcto; no aplica ninguna decisión sobre Yahvé/Mesías/etc. La decisión de no usar «ángeles» está bien sustentada. Conviene alinear mejor la representación de Σαμαριτῶν con el inglés auditado: «de los samaritanos» en el texto principal, con nota para «aldea samaritana» como compresión idiomática posible, o viceversa; aquí prefiero la forma explícita por cercanía al genitivo griego.'
  issues:
  - severity: high
    issue: Se añade «todo» en «para prepararle todo».
    rationale: El griego ὡς ἑτοιμάσαι αὐτῷ no expresa objeto directo. Añadir «todo» introduce información no dicha en la fuente ni preservada en el inglés POB.
  - severity: medium
    issue: Las notas al pie están ancladas a palabras/frases incorrectas.
    rationale: La nota [a] explica «delante de él / antes de él» pero está puesta en «mensajeros»; la [b] explica «aldea de los samaritanos» pero está puesta en «delante de él». Esto rompe la trazabilidad del audit trail.
  - severity: low
    issue: «Aldea de samaritanos» es entendible, pero «aldea de los samaritanos» refleja mejor el genitivo plural específico.
    rationale: Σαμαριτῶν es genitivo plural con artículo implícito por la estructura nominal; en español, la expresión con artículo suena más natural y se acerca mejor a la forma explicitada en la nota inglesa.
  revised_spanish_text: Y envió mensajeros delante de él[a]. Y ellos fueron y entraron en una aldea de los samaritanos[b], para prepararle.
  revised_footnotes:
  - marker: a
    text: O, más formalmente, «delante de su rostro»; es decir, «antes de él» para el giro idiomático griego.
    reason: lexical_alternative
  - marker: b
    text: O «una aldea samaritana». El griego dice más literalmente «una aldea de los samaritanos».
    reason: lexical_alternative
  revision_rationale: Se quitó «todo» porque no está en el griego y sobretraduce el propósito expresado por ὡς ἑτοιμάσαι αὐτῷ. Se corrigieron los anclajes de las notas para que correspondan a las frases que explican. Se ajustó «aldea de samaritanos» a «aldea de los samaritanos» por mayor fidelidad al genitivo plural y mejor naturalidad en español, conservando la alternativa idiomática en nota.
