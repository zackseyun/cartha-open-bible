translation:
  language: es
  text: 'Y les dijo: «Pero ustedes, ¿quién dicen que soy yo?» Pedro respondió: «El Mesías de Dios».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: BDAG
  rationale: El griego explicita el pronombre de segunda persona plural. En español, 'ustedes' conserva la oposición enfática con el contexto sin sonar forzado ni regionalmente marcado.
- source_word: τίνα με λέγετε εἶναι
  english_pob_choice: who do you say that I am
  chosen_spanish: ¿quién dicen que soy yo?
  alternatives_spanish:
  - ¿quién dicen que soy?
  - ¿quién dicen que yo soy?
  lexicon: BDAG
  rationale: La pregunta indirecta se vierte de manera natural en español. Se conserva el sentido directo de identidad personal y la fuerza interrogativa del griego sin calco excesivo.
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - dijo
  lexicon: BDAG
  rationale: El participio aoristo seguido de verbo finito se expresa idiomáticamente con un verbo simple de respuesta. 'Respondió' mantiene el valor discursivo sin añadir matiz innecesario.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí χριστός funciona como título confesional, no como nombre propio. En español, 'Mesías' preserva mejor ese valor titular y la referencia mesiánica judía.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - de Dios mismo
  lexicon: BDAG
  rationale: Se conserva la relación genitiva de forma directa, manteniendo la densidad confesional de la frase sin interpretarla más allá del griego.
theological_decisions:
- issue: Título cristológico χριστός en la confesión de Pedro
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La confesión identifica a Jesús en el marco mesiánico de Israel. Traducir el título como 'Mesías' evita convertirlo prematuramente en un nombre eclesiástico fijo y sigue la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: la lectura inglesa volvió de ''Christ'' a ''Messiah'' por corrección doctrinal, por lo que la versión española sigue la decisión final y la expresa con ''Mesías''.'
  spanish_consistency_notes:
  - Se mantiene la puntuación interrogativa española con comillas angulares.
  - Se evita 'Cristo' en el texto principal para respetar el valor titular de χριστός documentado en el expediente.
  - '''Respondió'' se usa como equivalente natural de ἀποκριθεὶς en estilo bíblico moderno y legible.'
