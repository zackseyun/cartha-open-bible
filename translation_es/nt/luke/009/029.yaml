  to: Y mientras oraba, el aspecto de su rostro se hizo diferente[a], y su vestimenta se volvió blanca[b], destellando como relámpago.
  rationale: Se reubica y corrige la nota [a] para que preserve la alternativa léxica documentada en el POB inglés sobre el cambio del rostro, no sobre la acción de orar. También se mejora la precisión semántica de ἐξαστράπτων con «destellando como relámpago» y se eleva ligeramente el registro con «vestimenta».
