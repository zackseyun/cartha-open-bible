translation:
  language: es
  text: Y mientras oraba, el aspecto de su rostro se hizo diferente[a], y su vestimenta se volvió blanca[b], destellando como relámpago.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el aspecto de su rostro fue alterado».
    reason: lexical_alternative
  - marker: b
    text: O «su vestimenta era blanca y deslumbrante»; el participio griego evoca un fulgor semejante al relámpago.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ἐν τῷ προσεύχεσθαι αὐτὸν
  english_pob_choice: as he was praying
  chosen_spanish: Y mientras oraba
  alternatives_spanish:
  - Y aconteció, mientras oraba
  - Y cuando estaba orando
  lexicon: BDAG
  rationale: La construcción lucana introduce un acontecimiento ocurrido durante la oración. «Mientras oraba» conserva la simultaneidad de manera natural en español y evita un calco pesado como «sucedió que». Incluyo la conjunción inicial para reflejar el arranque narrativo de καὶ ἐγένετο.
- source_word: τὸ εἶδος
  english_pob_choice: the appearance
  chosen_spanish: el aspecto
  alternatives_spanish:
  - la apariencia
  - la forma visible
  lexicon: BDAG
  rationale: Aquí εἶδος se refiere a la apariencia visible. «Aspecto» funciona con naturalidad en español y mantiene el foco en lo perceptible sin sugerir una noción ontológica más fuerte.
- source_word: τοῦ προσώπου αὐτοῦ
  english_pob_choice: of his face
  chosen_spanish: de su rostro
  alternatives_spanish:
  - de su cara
  - de su semblante
  lexicon: BDAG
  rationale: πρόσωπον significa literalmente «rostro/cara». «Rostro» ofrece un registro digno y claro en español, equivalente al inglés auditable «face».
- source_word: ἕτερον
  english_pob_choice: became different
  chosen_spanish: se hizo diferente
  alternatives_spanish:
  - fue alterado
  - cambió
  lexicon: BDAG
  rationale: ἕτερον expresa alteridad o diferencia. «Se hizo diferente» conserva el cambio visible indicado por el griego sin armonizar con formulaciones de otros evangelios ni intensificar el verbo más de lo que el texto exige.
- source_word: ὁ ἱματισμὸς αὐτοῦ
  english_pob_choice: his clothing
  chosen_spanish: su ropa
  alternatives_spanish:
  - sus vestiduras
  - su indumentaria
  lexicon: BDAG
  rationale: ἱματισμός denota ropa/vestimenta. «Ropa» es claro y natural en español contemporáneo; «vestiduras» sería más elevado pero algo más marcado litúrgicamente.
- source_word: λευκὸς
  english_pob_choice: white
  chosen_spanish: blanca
  alternatives_spanish:
  - blanco
  - de un blanco resplandeciente
  lexicon: BDAG
  rationale: λευκός significa simplemente «blanco». En español, «ropa» es femenina, por lo que «blanca» concuerda gramaticalmente sin añadir contenido ajeno.
- source_word: ἐξαστράπτων
  english_pob_choice: flashing like lightning
  chosen_spanish: resplandeciendo como relámpago
  alternatives_spanish:
  - brillando como relámpago
  - destellando como relámpago
  - como relámpago
  lexicon: BDAG
  rationale: El participio evoca un brillo fulgurante, con imaginería de relámpago. «Resplandeciendo como relámpago» conserva esa fuerza visual en español y evita suavizarla a un simple «brillante».
theological_decisions:
- issue: Descripción de la transfiguración sin armonización excesiva con los paralelos
  english_pob_reading: Render Luke's wording as a visible change in appearance without importing fuller phrasing from the Synoptic parallels.
  chosen_spanish_reading: Traducir el cambio visible de la apariencia del rostro y la ropa sin añadir lenguaje ajeno de Mateo o Marcos.
  alternative_spanish_readings:
  - «su rostro fue alterado»
  - «su rostro brilló»
  rationale: 'Lucas usa una formulación sobria: el aspecto del rostro se vuelve diferente y la ropa se vuelve blanca y resplandeciente. La traducción española preserva esa sobriedad y no introduce una lectura más desarrollada de la escena que la ofrecida por el griego de Lucas.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el análisis auditado en inglés: conserva el valor temporal de ἐγένετο ἐν τῷ προσεύχεσθαι αὐτόν, mantiene εἶδος como apariencia/aspecto visible, toma πρόσωπον como rostro, refleja ἕτερον como cambio perceptible y reproduce el matiz luminoso de ἐξαστράπτων sin armonizar con otros relatos sinópticos. No se registraron revisiones textuales en el paquete de auditoría.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usó una sintaxis natural en español sin perder las marcas de simultaneidad y cambio visibles en el griego.
  - Se prefirió un registro digno y publicable, evitando tanto calco rígido como paráfrasis expansiva.
  - Los marcadores de nota [a] y [b] aparecen en el texto y corresponden exactamente a las notas registradas.
