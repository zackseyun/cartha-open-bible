translation:
  language: es
  text: Así salieron y fueron por las aldeas[a], anunciando la buena noticia[b] y sanando por todas partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de aldea en aldea». La expresión griega puede destacar el desplazamiento distributivo entre las aldeas.
    reason: lexical_alternative
  - marker: b
    text: O «predicando el evangelio».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξερχόμενοι
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - partieron
  lexicon: BDAG
  rationale: El participio introduce la acción de partir desde el lugar anterior; «salieron» es natural en español y conserva el valor secuencial.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: La partícula enlaza narrativamente con progreso. «Así» expresa continuidad/consecuencia de forma fluida en español.
- source_word: διήρχοντο
  english_pob_choice: traveled through
  chosen_spanish: recorrieron
  alternatives_spanish:
  - iban por
  - atravesaban
  lexicon: BDAG
  rationale: El imperfecto medio indica desplazamiento continuo o iterativo entre lugares. «Recorrieron» comunica el avance por varias aldeas con buena naturalidad.
- source_word: κατὰ τὰς κώμας
  english_pob_choice: through the villages
  chosen_spanish: las aldeas
  alternatives_spanish:
  - de aldea en aldea
  - por las aldeas
  lexicon: BDAG
  rationale: El griego tiene un matiz distributivo/spatial. El texto principal puede decir «las aldeas» de manera concisa, mientras la nota conserva la alternativa distributiva explícita.
- source_word: εὐαγγελιζόμενοι
  english_pob_choice: proclaiming the good news
  chosen_spanish: anunciando la buena noticia
  alternatives_spanish:
  - predicando el evangelio
  - proclamando la buena noticia
  lexicon: BDAG
  rationale: «Buena noticia» evita un tecnicismo eclesiástico innecesario y refleja bien el contenido evangelístico del verbo; también preserva la posibilidad de la fórmula más tradicional en la nota.
- source_word: θεραπεύοντες
  english_pob_choice: healing
  chosen_spanish: sanando
  alternatives_spanish:
  - curando
  lexicon: BDAG
  rationale: En este contexto se trata de curación física acompañando la misión. «Sanando» es claro y ampliamente inteligible en español contemporáneo.
- source_word: πανταχοῦ
  english_pob_choice: everywhere
  chosen_spanish: por todas partes
  alternatives_spanish:
  - en todas partes
  - en todo lugar
  lexicon: BDAG
  rationale: La adverbialidad enfatiza extensión amplia de la actividad. «Por todas partes» es idiomático y conserva ese alcance.
theological_decisions:
- issue: Sentido de εὐαγγελιζόμενοι en la misión apostólica
  english_pob_reading: proclaiming the good news
  chosen_spanish_reading: anunciando la buena noticia
  alternative_spanish_readings:
  - predicando el evangelio
  rationale: La frase describe la proclamación misionera sin imponer una fórmula técnica posterior. «Anunciando la buena noticia» mantiene el contenido evangelizador con claridad y sin sobrecargar el texto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El contexto auditado en inglés no muestra revisiones aplicadas; el veredicto de revisión más reciente indica que no hubo cambios necesarios y la concordancia general fue alta.
  spanish_consistency_notes:
  - Se mantuvo un estilo moderno y digno, sin calcos mecánicos.
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se eligió «buena noticia» como equivalente natural de εὐαγγελιζόμενοι, con nota para la alternativa más eclesiástica.
  - La nota distributiva sobre las aldeas conserva el matiz espacial señalado en el audit trail inglés.
