translation:
  language: es
  text: Porque el que quiera salvar su vida[a], la perderá; pero el que pierda su vida por mi causa, la salvará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su alma» o «su ser»; la palabra griega puede significar vida, alma o ser, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς γὰρ ⸀ἂν θέλῃ
  english_pob_choice: For whoever wants
  chosen_spanish: Porque el que quiera
  alternatives_spanish:
  - Porque quien quiera
  - Porque cualquiera que quiera
  lexicon: BDAG
  rationale: ὃς ... ἂν con subjuntivo expresa una condición general e indefinida; en español, «el que quiera» comunica bien esa generalidad. Se conserva «Porque» para reflejar γάρ como conexión explicativa con el dicho anterior.
- source_word: τὴν ψυχὴν αὐτοῦ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su ser
  lexicon: BDAG
  rationale: ψυχή puede significar vida, alma o yo mismo según el contexto. Aquí, en el paralelismo de salvar/perder y en el contexto de discipulado, «vida» expresa mejor el sentido inmediato y evita imponer una lectura antropológica más estrecha. Se mantiene la posibilidad de otras acepciones en nota.
- source_word: σῶσαι
  english_pob_choice: to save
  chosen_spanish: salvar
  alternatives_spanish:
  - preservar
  lexicon: BDAG
  rationale: Se traduce con «salvar» para conservar la correspondencia verbal con σώσει al final del versículo y mantener la fuerza paradójica del dicho. «Preservar» explicaría el matiz, pero debilitaría la repetición retórica.
- source_word: ἀπολέσει
  english_pob_choice: will lose
  chosen_spanish: la perderá
  alternatives_spanish:
  - la destruirá
  - la dejará perder
  lexicon: BDAG
  rationale: En este contexto futuro, ἀπόλλυμι se entiende naturalmente como «perder». «La perderá» reproduce la antítesis con «salvar» y evita sonar excesivamente activo o interpretativo.
- source_word: ὃς δ’ ἂν ἀπολέσῃ
  english_pob_choice: but whoever loses
  chosen_spanish: pero el que pierda
  alternatives_spanish:
  - pero quien pierda
  - pero cualquiera que pierda
  lexicon: BDAG
  rationale: δέ se vierte como «pero» para marcar el contraste. El aoristo subjuntivo con ἄν expresa condición general; «el que pierda» es natural y conserva la simetría con la primera cláusula.
- source_word: ἕνεκεν ἐμοῦ
  english_pob_choice: for my sake
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - por mi causa
  - a causa de mí
  lexicon: BDAG
  rationale: ἕνεκεν con genitivo indica motivo o causa. «Por causa de mí» preserva ese valor causal y, en español, evita un giro demasiado devocional si se usara «por mi amor» o demasiado libre si se usara una paráfrasis.
- source_word: σώσει αὐτήν
  english_pob_choice: will save it
  chosen_spanish: la salvará
  alternatives_spanish:
  - la preservará
  lexicon: BDAG
  rationale: σώσει se traduce con «salvará» para conservar la relación con σῶσαι. El pronombre femenino singular «la» refleja αὐτήν y remite a ψυχήν/vida.
theological_decisions:
- issue: Sentido de ψυχή en la paradoja de Jesús
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - yo mismo
  - ser
  rationale: El contexto inmediato trata del discipulado y del riesgo de perder la propia vida por seguir a Jesús. «Vida» expresa el punto de la sentencia sin restringir ψυχή al alma inmortal ni vaciar su amplitud semítica/helénica. La nota mantiene las alternativas semánticas relevantes.
  doctrine_reference: Translation philosophy §3, §5
- issue: Relación entre salvar y perder
  english_pob_reading: save/lose
  chosen_spanish_reading: salvar/perder
  alternative_spanish_readings:
  - preservar/forjar la pérdida
  rationale: Se conserva la repetición verbal para mantener el contraste y el giro paradójico del dicho. Cambiar a «preservar» o a otra formulación debilitaría la correspondencia estilística y teológica del versículo.
  doctrine_reference: Translation philosophy §2
- issue: Valor de ἕνεκεν ἐμοῦ
  english_pob_reading: for my sake
  chosen_spanish_reading: por causa de mí
  alternative_spanish_readings:
  - por mi causa
  - por mi bien
  rationale: La frase apunta a una orientación personal hacia Jesús como motivo del sacrificio. «Por causa de mí» mantiene el énfasis relacional sin suavizarlo ni convertirlo en una explicación impersonal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión que eliminó la frase enfática «this one» al final para hacer el inglés más natural, sin alterar el sentido del griego. En español no se requiere un equivalente enfático adicional, porque la estructura «el que... el que...» ya mantiene la generalidad y la antítesis del original.
  spanish_consistency_notes:
  - Se mantiene «salvar» / «perder» de forma consistente para reflejar σῴζω / ἀπόλλυμι y su paralelismo.
  - Se usa «vida» como traducción principal de ψυχή, con nota de amplitud semántica.
  - «Por causa de mí» conserva la fuerza causal y discipular de ἕνεκεν ἐμοῦ.
  - El español evita un calco innecesario de la estructura inglesa y sigue la sintaxis natural del castellano sin perder la generalidad del griego.
