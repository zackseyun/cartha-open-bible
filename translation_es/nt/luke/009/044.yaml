translation:
  language: es
  text: Pongan estas palabras en sus oídos[a], porque el Hijo del Hombre está a punto de ser entregado[b] en manos de hombres[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. ‘en sus oídos’. La expresión conserva el giro vívido del griego para escuchar con atención.
    reason: lexical_alternative
  - marker: b
    text: O ‘ser traicionado’ o ‘ser puesto en manos de’. El verbo griego puede abarcar ‘entregar’, ‘poner en manos de’ o, en algunos contextos, ‘traicionar’; aquí se deja amplio.
    reason: lexical_alternative
  - marker: c
    text: O ‘seres humanos’. El plural masculino griego puede referirse de manera general a la humanidad, aunque se mantiene ‘hombres’ para reflejar la forma y el contraste del texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θέσθε
  english_pob_choice: Put
  chosen_spanish: Pongan
  alternatives_spanish:
  - Poned
  - Pongan ustedes
  - Metan
  lexicon: BDAG
  rationale: El imperativo aoristo plural pide una acción directa y deliberada. ‘Pongan’ conserva el mandato sin volverlo demasiado coloquial ni añadir modalidad innecesaria.
- source_word: ὑμεῖς
  english_pob_choice: You
  chosen_spanish: implícito en el verbo; reforzado por la forma verbal plural
  alternatives_spanish:
  - ustedes
  - ustedes mismos
  lexicon: BDAG
  rationale: El pronombre explícito en griego da énfasis, pero en español el imperativo plural ya lo expresa con naturalidad. No hace falta duplicarlo en el cuerpo del texto.
- source_word: εἰς τὰ ὦτα ὑμῶν
  english_pob_choice: into your ears
  chosen_spanish: en sus oídos
  alternatives_spanish:
  - dentro de sus oídos
  - a sus oídos
  lexicon: BDAG
  rationale: La imagen idiomática se conserva con claridad en español, pero ‘dentro de sus oídos’ suena forzado. ‘En sus oídos’ mantiene el tropo sin perder legibilidad.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas palabras dichas
  - estos dichos
  lexicon: BDAG
  rationale: λόγοι aquí se refiere a la afirmación específica que sigue. ‘Palabras’ es el equivalente más directo y natural; ‘dichos’ sería posible pero más marcado.
- source_word: ὁ γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La cláusula introduce la razón del mandato. ‘Porque’ comunica bien la relación explicativa en español contemporáneo.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre
  - el Hijo del ser humano
  lexicon: BDAG
  rationale: Se conserva el título cristológico tradicional y literal, que en español mantiene mejor la resonancia intertextual que una traducción interpretativa.
- source_word: μέλλει
  english_pob_choice: is about to
  chosen_spanish: está a punto de
  alternatives_spanish:
  - va a
  - está por
  lexicon: BDAG
  rationale: La forma expresa inminencia. ‘Está a punto de’ reproduce de modo natural esa cercanía temporal sin cargarla con fatalismo.
- source_word: παραδίδοσθαι
  english_pob_choice: be handed over
  chosen_spanish: ser entregado
  alternatives_spanish:
  - ser entregado
  - ser traicionado
  - ser puesto en manos de
  lexicon: BDAG
  rationale: En este contexto la pasiva señala la entrega de Jesús al poder ajeno. ‘Ser entregado’ conserva la amplitud semántica de παραδίδωμι mejor que ‘ser traicionado’, que estrecha el sentido demasiado pronto.
- source_word: εἰς χεῖρας ἀνθρώπων
  english_pob_choice: into the hands of men
  chosen_spanish: en manos de hombres
  alternatives_spanish:
  - en manos de seres humanos
  - en manos de personas
  lexicon: BDAG
  rationale: La expresión idiomática en español es ‘en manos de’. ‘Hombres’ mantiene el valor morfológico masculino plural y el contraste retórico con ‘el Hijo del Hombre’; ‘seres humanos’ suavizaría esa tensión.
theological_decisions:
- issue: Título cristológico ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Hijo del ser humano
  - el Hombre
  rationale: Se mantiene la formulación establecida para preservar la identidad titul ar de Jesús y su eco en Daniel. Una versión interpretativa reduciría la densidad bíblica del título.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Alcance de παραδίδοσθαι
  english_pob_reading: be handed over
  chosen_spanish_reading: ser entregado
  alternative_spanish_readings:
  - ser traicionado
  - ser entregado y traicionado
  rationale: La predicción abarca la puesta de Jesús en manos ajenas, no solo el acto de Judas. ‘Ser entregado’ deja abierta la tensión narrativa y no estrecha el verbo a un solo agente.
  doctrine_reference: Translation philosophy §3
- issue: Sentido de ἀνθρώπων
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - seres humanos
  - personas
  rationale: La forma masculina plural puede conservarse en español y mantiene el contraste literario con ‘el Hijo del Hombre’. Puede sentirse genérica, pero esa ambigüedad forma parte del efecto del griego.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último pasaje revisado del audit trail inglés: se conservó el imperativo directo sin añadir ‘ustedes’ explícito, se mantuvo la imagen ‘en/oídos’ en vez de una paráfrasis interpretativa, y se preservó la fuerza de la pasiva ‘ser entregado’ con el matiz de inminencia de μέλλει.'
  spanish_consistency_notes:
  - Se usa ‘Hijo del Hombre’ de forma uniforme para el título cristológico.
  - Se evita ‘SEÑOR’ u otras sustituciones que oculten el término fuente, aunque aquí no aparece el nombre divino.
  - ‘Ser entregado’ se mantiene como término técnico consistente para παραδίδωμι en este contexto.
  - La preposición idiomática ‘en manos de’ reproduce el valor de εἰς χεῖρας sin calco torpe.
