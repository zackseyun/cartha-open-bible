translation:
  language: es
  text: Y reuniendo a los doce, les dio poder y autoridad sobre todos los demonios y para sanar enfermedades.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Συγκαλεσάμενος
  english_pob_choice: calling the twelve together
  chosen_spanish: reuniendo a los doce
  alternatives_spanish:
  - después de convocar a los doce
  - convocando a los doce juntos
  lexicon: BDAG
  rationale: El participio aoristo medio expresa una acción previa o concomitante al verbo principal sin exigir 'después'. 'Reuniendo' comunica la acción de juntar a los doce y refleja el valor de σύν- en un español natural.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ es un conector suave. 'Y' mantiene la continuidad narrativa sin forzar contraste.
- source_word: τοὺς δώδεκα
  english_pob_choice: the twelve
  chosen_spanish: los doce
  alternatives_spanish:
  - los doce discípulos
  - los Doce
  lexicon: BDAG
  rationale: El griego dice simplemente 'los doce'. Se conserva así, sin añadir 'discípulos' ni convertirlo en título.
- source_word: ἔδωκεν
  english_pob_choice: he gave
  chosen_spanish: les dio
  alternatives_spanish:
  - les concedió
  lexicon: BDAG
  rationale: El aoristo de δίδωμι se vierte de manera directa con 'dio'. En español, el dativo 'les' aclara a quién se les dio.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - capacidad
  lexicon: BDAG
  rationale: '''Poder'' es el equivalente más natural y directo de δύναμις en este contexto de ministerio milagroso.'
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - derecho
  - jurisdicción
  lexicon: BDAG
  rationale: 'Se mantiene la distinción con δύναμις: no solo capacidad, sino autorización delegada. ''Autoridad'' conserva esa fuerza.'
- source_word: ἐπὶ πάντα τὰ δαιμόνια
  english_pob_choice: over all the demons
  chosen_spanish: sobre todos los demonios
  alternatives_spanish:
  - sobre cada demonio
  - sobre todos los demonios
  lexicon: BDAG
  rationale: ἐπί con acusativo expresa dominio u իշխանություն sobre algo. 'Sobre todos los demonios' preserva la relación de autoridad y el plural del texto.
- source_word: δαιμόνια
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus inmundos
  lexicon: BDAG
  rationale: El término griego es δαιμόνια; 'demonios' es la equivalencia directa y evita introducir una glosa no presente en el versículo.
- source_word: νόσους
  english_pob_choice: diseases
  chosen_spanish: enfermedades
  alternatives_spanish:
  - dolencias
  - males
  lexicon: BDAG
  rationale: Aunque el inglés POB usa 'diseases', en español 'enfermedades' es más natural y abarca bien el campo semántico de νόσος.
- source_word: θεραπεύειν
  english_pob_choice: to heal
  chosen_spanish: sanar
  alternatives_spanish:
  - curar
  - sanar enfermedades
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa con 'sanar', opción natural y bíblicamente sobria en español. Se mantiene la construcción final 'y para sanar enfermedades' para respetar el valor de propósito.
theological_decisions:
- issue: Distinción entre δύναμις y ἐξουσία
  english_pob_reading: power and authority
  chosen_spanish_reading: poder y autoridad
  alternative_spanish_readings:
  - autoridad y poder
  - poder y derecho
  rationale: La traducción conserva ambos términos porque el texto distingue capacidad efectiva y autorización delegada. No se fusionan ni se invierte su relación sin necesidad.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Referencia de 'los doce'
  english_pob_reading: the twelve without adding 'disciples' or 'apostles'
  chosen_spanish_reading: los doce sin añadir 'discípulos' ni 'apóstoles'
  alternative_spanish_readings:
  - los doce discípulos
  - los Doce apóstoles
  rationale: El griego no explicita ninguno de esos sustantivos. Mantener solo 'los doce' respeta la primacía del original y evita información interpretativa añadida.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: 'La revisión más reciente del POB inglés eliminó ''after'' para no introducir una relación temporal no explícita en el participio. En español, ''reuniendo'' sigue esa misma dirección: expresa la acción participial sin añadir ''después de''.'
  spanish_consistency_notes:
  - Se conserva 'poder y autoridad' como par léxico estable para δύναμις/ἐξουσία.
  - Se usa 'demonios' para δαιμόνια, sin sustituirlo por 'espíritus inmundos'.
  - '''Sanar enfermedades'' reproduce el propósito del infinitivo griego con una construcción natural en español.'
  - No se introduce 'discípulos' ni 'apóstoles' porque el texto solo dice 'los doce'.
