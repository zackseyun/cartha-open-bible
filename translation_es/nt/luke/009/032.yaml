revisions:
- from: Pedro y los que estaban con él estaban oprimidos por el sueño; pero, al despertarse por completo[a], vieron su gloria y a los dos hombres que estaban con él.
  to: Pedro y los que estaban con él estaban cargados de sueño; pero, al despertarse por completo[a], vieron su gloria y a los dos hombres que estaban de pie con él.
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español y acercar la escena visual al griego y a la auditoría inglesa: «cargados de sueño» conserva mejor la metáfora de peso, y «que estaban de pie con él» refleja mejor el valor escénico de συνεστῶτας αὐτῷ. La nota al pie se mantiene sin cambios sustanciales.'
