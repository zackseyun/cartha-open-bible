    issue: «oprimidos por el sueño» suena algo forzado en español
    rationale: Aunque transmite la idea de carga, no es la formulación más natural ni idiomática para βεβαρημένοι ὕπνῳ en español eclesial general. «Cargados de sueño» conserva mejor la metáfora de peso con lectura más fluida.
  - severity: low
    issue: «que estaban con él» atenúa el matiz escénico de συνεστῶτας αὐτῷ
    rationale: El participio en contexto visual sugiere presencia de pie/junto a él. La versión actual no es falsa, pero es un poco más débil que el inglés auditado «standing with him» y que la escena de la transfiguración.
  revised_spanish_text: Pedro y los que estaban con él estaban cargados de sueño; pero, al despertarse por completo[a], vieron su gloria y a los dos hombres que estaban de pie con él.
