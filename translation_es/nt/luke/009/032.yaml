translation:
  language: es
  text: Pedro y los que estaban con él estaban cargados de sueño; pero, al despertarse por completo[a], vieron su gloria y a los dos hombres que estaban de pie con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de despertar» o «una vez plenamente despiertos». El verbo griego es raro y puede enfatizar llegar a un estado de plena vigilia más que haber permanecido despiertos todo el tiempo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βεβαρημένοι ὕπνῳ
  english_pob_choice: were weighed down with sleep
  chosen_spanish: estaban oprimidos por el sueño
  alternatives_spanish:
  - estaban pesados de sueño
  - estaban cargados de sueño
  - estaban dominados por el sueño
  lexicon: BDAG
  rationale: El griego expresa un estado de peso o carga causado por el sueño. En español, «oprimidos por el sueño» conserva la imagen de presión/burden sin sonar rígido, y mantiene mejor la fuerza del participio perfecto que un simple «tenían sueño».
- source_word: διαγρηγορήσαντες
  english_pob_choice: when they became fully awake
  chosen_spanish: al despertarse por completo
  alternatives_spanish:
  - cuando quedaron completamente despiertos
  - después de despertar
  - una vez que estuvieron plenamente despiertos
  lexicon: BDAG
  rationale: La forma rara sugiere entrar en un estado de plena vigilia. «Al despertarse por completo» preserva ese matiz y evita insinuar que permanecieron despiertos todo el tiempo, en armonía con la cláusula anterior.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - majestad
  lexicon: BDAG
  rationale: «Gloria» es el equivalente español normal y conserva la carga bíblico-teológica de δόξα en el contexto de la transfiguración.
- source_word: τοὺς δύο ἄνδρας
  english_pob_choice: the two men
  chosen_spanish: a los dos hombres
  alternatives_spanish:
  - a los dos varones
  - a las dos personas masculinas
  lexicon: BDAG
  rationale: ἀνήρ aquí designa a dos personas adultas varones, identificables en contexto como Moisés y Elías. «Hombres» es idiomático en español y fiel al referente humano masculino sin necesidad de una paráfrasis.
- source_word: συνεστῶτας αὐτῷ
  english_pob_choice: standing with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que estaban de pie con él
  - que estaban presentes con él
  lexicon: BDAG
  rationale: El participio puede expresar presencia/estar junto a él, y en la escena visual esa presencia es suficientemente representada por «que estaban con él». En español, esta opción suena natural y evita forzar una imagen física más específica de lo que el contexto exige.
- source_word: δὲ
  english_pob_choice: Now / but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - entonces
  lexicon: BDAG
  rationale: El segundo δέ marca contraste narrativo entre la somnolencia y la visión. «Pero» reproduce bien ese giro en español.
theological_decisions:
- issue: Visión de la gloria de Jesús en la transfiguración
  english_pob_reading: his glory
  chosen_spanish_reading: su gloria
  alternative_spanish_readings:
  - su esplendor
  - su majestad
  rationale: La frase debe mantener la resonancia canónica de la transfiguración sin explicar de más. «Su gloria» conserva la conexión bíblica con la manifestación visible de Jesús.
  doctrine_reference: Transfiguración; afirmaciones cristológicas; filosofía de traducción óptima
- issue: Sentido de διαγρηγορήσαντες
  english_pob_reading: when they became fully awake
  chosen_spanish_reading: al despertarse por completo
  alternative_spanish_readings:
  - después de despertar
  - cuando quedaron plenamente despiertos
  rationale: 'La lectura evita armonizar el texto hacia una vigilancia continua. Se conserva la tensión narrativa: primero están vencidos por el sueño, luego despiertan y ven.'
  doctrine_reference: 'Fidelidad narrativa; filosofía de traducción #3'
translation_notes:
  revision_awareness: El pasaje se mantiene en línea con el texto griego y con la decisión inglesa de distinguir claramente μεταξύ el estado de somnolencia y el momento de plena vigilia. No se adoptaron cambios posteriores porque el control de revisión indicó acuerdo alto y sin ajustes necesarios.
  spanish_consistency_notes:
  - Se mantuvo «gloria» para δόξα, en coherencia con el léxico bíblico estándar y con el audit trail inglés.
  - Se evitó «Cristo» porque el versículo no lo requiere; el foco es Jesús y la visión de su gloria.
  - «Hombres» conserva el valor de ἄνδρας sin introducir una expresión menos natural en español.
  - La nota a pie de página se ancla solo en la expresión verbal correspondiente y ofrece las alternativas realmente relevantes del griego raro.
