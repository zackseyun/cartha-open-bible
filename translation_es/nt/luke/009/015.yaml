translation:
  language: es
  text: Y así lo hicieron, e hicieron que todos se sentaran[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «los sentaron a todos» o «los hicieron reclinar». El verbo griego se refiere a acomodar a las personas para una comida, a menudo en postura reclinada.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y luego
  lexicon: BDAG
  rationale: Conserva la simple coordinación narrativa sin añadir un valor interpretativo fuerte. En español, ‘Y’ mantiene la continuidad de la acción con la instrucción previa.
- source_word: ἐποίησαν οὕτως
  english_pob_choice: they did so
  chosen_spanish: lo hicieron así
  alternatives_spanish:
  - así lo hicieron
  - hicieron así
  lexicon: BDAG
  rationale: La frase griega resume la obediencia a la instrucción anterior. ‘Lo hicieron así’ reproduce el sentido resumptivo de manera natural en español, sin volverla más literal de lo que exige el texto.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - entonces
  - además
  lexicon: BDAG
  rationale: Coordina el segundo verbo con el primero y preserva la secuencia narrativa simple.
- source_word: κατέκλιναν
  english_pob_choice: had them all sit down
  chosen_spanish: los hicieron recostarse
  alternatives_spanish:
  - los sentaron
  - los hicieron sentarse
  - los acomodaron para la comida
  lexicon: BDAG
  rationale: El verbo κατακλίνω expresa hacer que personas se reclinen para una comida. ‘Recostarse’ conserva mejor esa imagen que ‘sentarse’, y el causativo ‘los hicieron’ refleja la fuerza verbal del griego. Se evita ‘sentarlos’ porque atenúa la postura de comida reclinada.
- source_word: ἅπαντας
  english_pob_choice: them all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a todos por igual
  lexicon: BDAG
  rationale: Transmite la totalidad del objeto directo. En español, la construcción ‘a todos’ es natural y mantiene el alcance completo del término griego.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se registran revisiones sustantivas. La única decisión relevante para el español es cómo reflejar el valor de κατακλίνω sin perder inteligibilidad.
  spanish_consistency_notes:
  - Se mantuvo una sintaxis breve y narrativa, acorde con el estilo del versículo.
  - Se evitó traducir mecánicamente ‘sit down’ porque el griego describe reclinación para comer, no solo sentarse.
  - No se introdujeron términos eclesiásticos o doctrinales ajenos al contenido del versículo.
