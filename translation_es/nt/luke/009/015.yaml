    issue: ‘los hicieron recostarse’ es poco idiomático en español bíblico general
    rationale: Aunque intenta preservar el matiz de reclinarse para una comida, en español neutral suena torpe y puede evocar acostarse más plenamente que acomodarse para comer.
  - severity: low
    issue: Repetición de ‘hicieron’ vuelve la línea pesada
    rationale: La repetición no es infiel, pero afecta la legibilidad. Reordenar a ‘Y así lo hicieron’ mejora el flujo natural del español.
  - severity: medium
    issue: Falta una nota para preservar la alternativa formal ligada a κατακλίνω
    rationale: El English POB documenta explícitamente la alternativa ‘seated them all’ / ‘made them all recline’. Dado que la solución española más natural usa ‘se sentaran’, conviene conservar en nota el matiz de reclinar para la comida.
