  text: Καὶ ὑποστρέψαντες οἱ ἀπόστολοι διηγήσαντο αὐτῷ ὅσα ἐποίησαν. καὶ παραλαβὼν αὐτοὺς ὑπεχώρησεν κατ’ ἰδίαν εἰς ⸂πόλιν καλουμένην Βηθσαϊδά⸃.
base_translation:
  language: en
  yaml_path: translation/nt/luke/009/010.yaml
  text: And when the apostles returned[a], they reported to him what they had done. And taking them with him, he withdrew privately to a town called Bethsaida.
  footnotes:
