  to: Y cuando los apóstoles regresaron, le contaron todo lo que habían hecho. Y tomándolos consigo, se retiró en privado a un pueblo llamado Betsaida.
  rationale: Se cambia 'ciudad' por 'pueblo' para reflejar mejor la decisión léxica auditada sobre πόλις/Bethsaida y evitar sobrestatar el tamaño del lugar en español. El resto del texto es fiel, natural y no requiere notas adicionales.
