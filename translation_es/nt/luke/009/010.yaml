translation:
  language: es
  text: Y cuando los apóstoles regresaron, le contaron todo lo que habían hecho. Y tomándolos consigo, se retiró en privado a un pueblo llamado Betsaida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑποστρέψαντες
  english_pob_choice: when the apostles returned
  chosen_spanish: cuando los apóstoles regresaron
  alternatives_spanish:
  - al regresar los apóstoles
  - después de regresar los apóstoles
  lexicon: BDAG
  rationale: El participio aoristo se vierte temporalmente con una subordinada natural en español, conservando la secuencia de acciones sin forzar una estructura demasiado literal.
- source_word: ἀπόστολοι
  english_pob_choice: apostles
  chosen_spanish: apóstoles
  alternatives_spanish:
  - enviados
  - mensajeros
  lexicon: BDAG
  rationale: En el contexto lucano, el término funciona como designación reconocible del grupo de los Doce en misión; 'apóstoles' preserva ese valor técnico.
- source_word: διηγήσαντο
  english_pob_choice: reported
  chosen_spanish: le contaron
  alternatives_spanish:
  - le informaron
  - le relataron
  - le refirieron
  lexicon: BDAG
  rationale: El verbo implica narrar o relatar lo ocurrido; en español, 'le contaron' comunica con naturalidad que dieron a Jesús un informe de su actividad sin añadir formalidad excesiva.
- source_word: ὅσα ἐποίησαν
  english_pob_choice: what they had done
  chosen_spanish: todo lo que habían hecho
  alternatives_spanish:
  - lo que habían hecho
  - las cosas que habían hecho
  lexicon: BDAG
  rationale: ὅσα cubre el conjunto de acciones realizadas. 'Todo lo que' refleja bien el sentido colectivo e integral del relativo, y el pluscuamperfecto marca anterioridad respecto del relato.
- source_word: παραλαβὼν αὐτούς
  english_pob_choice: taking them with him
  chosen_spanish: tomándolos consigo
  alternatives_spanish:
  - tomándolos con él
  - llevándolos consigo
  lexicon: BDAG
  rationale: παραλαμβάνω aquí comunica que Jesús los tomó consigo como acompañantes. 'Consigo' expresa de manera idiomática la relación de acompañamiento.
- source_word: ὑπεχώρησεν
  english_pob_choice: withdrew
  chosen_spanish: se retiró
  alternatives_spanish:
  - se apartó
  - se retiró de allí
  - se retiró
  lexicon: BDAG
  rationale: El verbo describe retirarse o apartarse, normalmente de la actividad pública o de la multitud. 'Se retiró' conserva esa fuerza de alejamiento sin sugerir simplemente un traslado neutro.
- source_word: κατ’ ἰδίαν
  english_pob_choice: privately
  chosen_spanish: en privado
  alternatives_spanish:
  - aparte
  - privadamente
  - en particular
  lexicon: BDAG
  rationale: La frase indica apartarse de la gente o de la vista pública. 'En privado' comunica bien la retirada de las multitudes sin implicar soledad absoluta, en línea con la revisión inglesa que corrigió 'by himself'.
- source_word: πόλιν καλουμένην Βηθσαϊδά
  english_pob_choice: a town called Bethsaida
  chosen_spanish: a una ciudad llamada Betsaida
  alternatives_spanish:
  - a un pueblo llamado Betsaida
  - a una localidad llamada Betsaida
  lexicon: BDAG
  rationale: πόλις puede traducirse como 'ciudad' o 'pueblo'. Se mantiene 'ciudad' por fidelidad al sustantivo y por la forma del relato, sin necesidad de minimizar el término. 'Betsaida' sigue la transliteración española usual.
theological_decisions:
- issue: Valor de κατ’ ἰδίαν junto con Jesús llevando a los apóstoles
  english_pob_reading: '''privately'' means withdrawal from the crowds, not necessarily complete solitude.'
  chosen_spanish_reading: '''en privado'' expresa retiro de la vista pública, no soledad absoluta.'
  alternative_spanish_readings:
  - aparte
  - a solas
  - en secreto
  rationale: 'Como el texto dice explícitamente que Jesús tomó a los apóstoles consigo, la traducción no debe sugerir que estaba solo. ''En privado'' preserva la tensión: separación de la multitud, pero en compañía de sus discípulos.'
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que sustituyó 'by himself' por 'privately' para reflejar mejor κατ’ ἰδίαν en este contexto, dado que Jesús llevó consigo a los apóstoles. La versión española adopta ese mismo criterio interpretativo.
  spanish_consistency_notes:
  - Se mantiene 'apóstoles' como término técnico y no 'enviados', en coherencia con el uso lucano y con la decisión inglesa.
  - '''Betsaida'' se translitera de forma estable como nombre propio geográfico.'
  - No se introduce nota al pie porque la ambigüedad de κατ’ ἰδίαν queda suficientemente resuelta en español con 'en privado' dentro del texto principal.
