review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido general del griego: los apóstoles regresan, informan a Jesús, y él se retira con ellos aparte. También conserva adecuadamente el matiz de κατ’ ἰδίαν como retiro de la multitud y no soledad absoluta mediante ''en privado''. Sin embargo, se aparta del rastro auditado del POB en un punto importante: πόλιν fue vertido en inglés como ''town'' por una razón lexical explícita, y el español ''ciudad'' tiende a sobredimensionar el referente. En este contexto, ''pueblo'' o ''localidad'' preserva mejor la decisión documentada.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. 'Le contaron', 'tomándolos consigo' y 'se retiró en privado' funcionan bien. El único ajuste necesario es reemplazar 'ciudad' por una opción más natural y más alineada con la decisión del POB; 'pueblo' suena bien en español bíblico moderno y evita sobretraducir πόλις aquí.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. No aparece Yahvé, Mesías/Cristo, Espíritu, etc. ''Apóstoles'' está bien. La principal desalineación es con la decisión léxica auditada para πόλιν καλουμένην Βηθσαϊδά: el inglés estableció ''town'', y el español debería evitar ''ciudad'' salvo razón contextual fuerte, que aquí no se ha demostrado.'
  issues:
