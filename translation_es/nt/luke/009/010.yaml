    issue: '''ciudad'' para πόλιν καλουμένην Βηθσαϊδά no sigue la decisión léxica auditada del POB'
    rationale: El expediente inglés justificó 'town' para no exagerar el tamaño o estatus del lugar. En español, 'ciudad' igualmente puede sobredimensionar Betsaida. 'pueblo' preserva mejor el sentido y la rationale documentada.
  revised_spanish_text: Y cuando los apóstoles regresaron, le contaron todo lo que habían hecho. Y tomándolos consigo, se retiró en privado a un pueblo llamado Betsaida.
