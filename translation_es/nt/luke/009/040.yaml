translation:
  language: es
  text: Y rogué a tus discípulos que lo echaran fuera[a], pero no pudieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al muchacho», si el pronombre se entiende como referencia al niño y no al espíritu.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐδεήθην
  english_pob_choice: I begged
  chosen_spanish: le rogué
  alternatives_spanish:
  - le supliqué
  - le pedí con insistencia
  lexicon: BDAG
  rationale: δέομαι expresa una petición intensa y urgente. En español, «rogué» conserva esa fuerza con dignidad natural; «pedí» sería más débil, y «supliqué» es posible, pero suena un poco más enfático que el griego en este contexto.
- source_word: τῶν μαθητῶν σου
  english_pob_choice: your disciples
  chosen_spanish: tus discípulos
  alternatives_spanish:
  - tus seguidores
  lexicon: BDAG
  rationale: μαθητής en los Evangelios designa normalmente a «discípulos», manteniendo la relación maestro-discípulo y el uso estable del término en el NT.
- source_word: ἵνα ἐκβάλωσιν
  english_pob_choice: to cast it out
  chosen_spanish: que lo echaran fuera
  alternatives_spanish:
  - para echarlo fuera
  - que lo expulsaran
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa finalidad. «Echar fuera» reproduce bien el idioma de exorcismo de ἐκβάλλω en español bíblico contemporáneo. Se usa «lo» para reflejar el pronombre neutro griego y la decisión contextual de la POB inglesa de referirlo al espíritu.
- source_word: αὐτό
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - le
  - lo mismo
  lexicon: BDAG
  rationale: El pronombre neutro sugiere más naturalmente al espíritu inmundo que al muchacho. «Lo» conserva esa referencia sin explicitar más de lo que permite el contexto inmediato. También deja abierta la alternativa documentada de que pudiera referirse al muchacho.
- source_word: οὐκ ἠδυνήθησαν
  english_pob_choice: they were not able
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no fueron capaces
  - no les fue posible
  lexicon: BDAG
  rationale: δύναμαι denota capacidad. «No pudieron» es la forma más natural y fiel en español, manteniendo la idea de incapacidad sin añadir matiz interpretativo.
theological_decisions:
- issue: Referente de αὐτό en el contexto de exorcismo
  english_pob_reading: The pronoun refers to the demon/spirit, rendered 'it.'
  chosen_spanish_reading: El pronombre se entiende como referencia al espíritu/demonio y se vierte con «lo».
  alternative_spanish_readings:
  - El pronombre podría referirse al muchacho, con «lo» o «le» según el estilo.
  - Mantener una formulación neutra como «lo» sin precisar el referente.
  rationale: En contextos de expulsión, ἐκβάλλω suele tomar como objeto al espíritu inmundo; además, el neutro αὐτό encaja con esa lectura. La traducción conserva esa opción principal sin cerrar por completo la alternativa documentada de que el referente sea el muchacho.
  doctrine_reference: Preservar la ambigüedad documentada y no resolverla de manera dogmática cuando el texto lo permita.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego SBLGNT y toma como contexto auditado la decisión inglesa de traducir δέομαι como una petición intensa, μαθητής como «discípulo», ἐκβάλλω como lenguaje de exorcismo y αὐτό como referencia probable al espíritu. No se hicieron cambios de sentido respecto del paso revisado más reciente.
  spanish_consistency_notes:
  - Se mantiene «discípulos» para μαθηταί en armonía con el uso habitual de los Evangelios.
  - Se usa «echar fuera» como equivalente idiomático de ἐκβάλλω en contexto de expulsión demoníaca.
  - Se conserva la ambigüedad del pronombre con una nota breve, sin sobreexplicar el referente en el texto principal.
  - La puntuación y el orden sintáctico buscan un registro bíblico moderno y natural en español.
