- from: Y le rogué a tus discípulos que lo echaran fuera[a], pero no pudieron.
  to: Y rogué a tus discípulos que lo echaran fuera[a], pero no pudieron.
  rationale: Se corrige la gramática española eliminando el pronombre singular incorrecto antes de «a tus discípulos» y se normaliza la nota al pie al español, manteniendo la alternativa exegética documentada sobre el referente de αὐτό.
