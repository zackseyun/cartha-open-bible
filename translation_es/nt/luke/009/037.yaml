review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura temporal general del griego: transición narrativa, referencia al día siguiente, descenso del monte y encuentro con una multitud. Sin embargo, «se le acercó» no preserva con suficiente precisión συνήντησεν αὐτῷ («lo encontró / salió a su encuentro / le salió al encuentro»), y «cuando ellos habían descendido» suena poco natural en español para el genitivo absoluto.'
  spanish_quality_summary: 'El texto es mayormente claro, pero presenta dos problemas de estilo/idiomaticidad: el pluscuamperfecto «habían descendido» resulta forzado aquí, y «se le acercó» debilita la idea de encuentro. Además, la nota «O «el día siguiente»» no suena idiomática; la alternativa documentada debe corresponder a «al día siguiente» con «al día siguiente» / «el día siguiente» o mejor «al siguiente día» si se quiere verdadera alternativa, aunque la inglesa apunta a «the following day», mejor como «al día siguiente» / «el día siguiente» no cambia mucho. Puede conservarse una nota más natural: «O "el siguiente día"».'
  glossary_alignment: No hay términos teológicos sensibles del glosario principal en este versículo. «Monte» para ὄρος es aceptable. «Multitud» para ὄχλος y «gran» para πολύς son adecuados.
  issues:
  - severity: high
    issue: «se le acercó» no traduce con precisión συνήντησεν αὐτῷ
    rationale: El verbo griego expresa que la multitud encontró a Jesús o salió a su encuentro. «Se le acercó» solo indica proximidad, no necesariamente encuentro, y reduce la fuerza narrativa del original.
  - severity: medium
    issue: «cuando ellos habían descendido» suena poco natural en español
    rationale: Aunque intenta reflejar anterioridad relativa, el pluscuamperfecto aquí es torpe. Un giro como «cuando bajaban» cambiaría el aspecto, pero «cuando descendían» también; mejor «cuando descendieron» o «cuando habían bajado» según equilibrio. En español bíblico natural, «cuando bajaron del monte» comunica bien el trasfondo temporal sin rigidez excesiva.
  - severity: low
    issue: La nota alternativa para «al día siguiente» es poco idiomática
    rationale: «O “el día siguiente”» no es una alternativa española muy natural. Si se mantiene una nota por correspondencia con el inglés, conviene formular una alternativa realmente usada en español, como «O “al siguiente día”».
  revised_spanish_text: Ahora bien, al día siguiente[a], cuando bajaron del monte, una gran multitud lo encontró.
  revised_footnotes:
  - marker: a
    text: O «al siguiente día».
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal para reflejar con precisión el sentido de encuentro de συνήντησεν αὐτῷ, y se simplifica la cláusula circunstancial a un español más natural y fiel al marco temporal del genitivo absoluto. También se mejora la formulación de la nota alternativa para que sea idiomática en español.
