translation:
  language: es
  text: Ahora bien, al día siguiente[a], cuando bajaron del monte, una gran multitud lo encontró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al siguiente día».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y aconteció
  - Entonces
  lexicon: BDAG
  rationale: La fórmula narrativa griega funciona como transición discursiva. En español, «Ahora bien» conserva ese cambio de escena con naturalidad y dignidad, sin volver mecánico el giro. «Y aconteció» sería más literal pero suena más arcaizante en español actual.
- source_word: τῇ ἑξῆς ἡμέρᾳ
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - en el día siguiente
  - el día siguiente
  lexicon: BDAG
  rationale: La expresión temporal indica el momento en que ocurre la acción. «Al día siguiente» es la equivalencia española más natural y fiel al valor temporal del dativo.
- source_word: κατελθόντων αὐτῶν
  english_pob_choice: when they had come down
  chosen_spanish: cuando ellos habían descendido
  alternatives_spanish:
  - después de que descendieron
  - al bajar ellos
  lexicon: BDAG
  rationale: El genitivo absoluto aporta trasfondo circunstancial con acción previa completada. «Cuando ellos habían descendido» conserva bien esa anterioridad relativa sin añadir matices no presentes en el griego.
- source_word: ἀπὸ τοῦ ὄρους
  english_pob_choice: from the mountain
  chosen_spanish: del monte
  alternatives_spanish:
  - de la montaña
  - del monte/montaña
  lexicon: BDAG
  rationale: «Ὄρος» puede traducirse por «monte» o «montaña». Aquí «del monte» mantiene una forma bíblica clara y natural en español, sin perder el sentido topográfico.
- source_word: συνήντησεν αὐτῷ
  english_pob_choice: met him
  chosen_spanish: se le acercó
  alternatives_spanish:
  - lo encontró
  - lo saludó
  lexicon: BDAG
  rationale: Aunque el verbo puede significar «encontrarse con» o «salir al encuentro», en este contexto la escena muestra a la multitud que se aproxima a Jesús. «Se le acercó» comunica el encuentro de manera natural en español y evita sugerir un cruce casual si el contexto narrativo favorece la llegada de la multitud.
- source_word: ὄχλος πολύς
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una multitud numerosa
  - una gran gente
  lexicon: BDAG
  rationale: «Ὄχλος» es «multitud» o «muchedumbre»; «πολύς» intensifica el tamaño. «Una gran multitud» reproduce bien la fuerza del original y mantiene registro bíblico contemporáneo.
translation_notes:
  revision_awareness: 'El inglés POB eligió una equivalencia óptima con ‘Now on the next day’, ‘when they had come down from the mountain’, y ‘a large crowd met him’. La versión española sigue esa misma estrategia: conserva la transición narrativa, la temporalidad del dativo y el encuentro de la multitud sin sobretraducción. No se registraron cambios en la revisión más reciente; el pasaje mantiene alto acuerdo con la auditoría inglesa.'
  spanish_consistency_notes:
  - Se usa «monte» para ὄρος, coherente con un registro bíblico claro en español.
  - Se evita «SEÑOR» porque no hay aquí referencia al nombre divino.
  - «Multitud» se prefiere a «gente» para conservar el peso colectivo del griego ὄχλος.
  - El marcador de nota [a] acompaña solo la alternativa temporal documentada.
