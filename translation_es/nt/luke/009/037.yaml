revisions:
- from: Ahora bien, al día siguiente[a], cuando ellos habían descendido del monte, una gran multitud se le acercó.
  to: Ahora bien, al día siguiente[a], cuando bajaron del monte, una gran multitud lo encontró.
  rationale: Se ajusta el verbo principal para reflejar con precisión el sentido de encuentro de συνήντησεν αὐτῷ, y se simplifica la cláusula circunstancial a un español más natural y fiel al marco temporal del genitivo absoluto. También se mejora la formulación de la nota alternativa para que sea idiomática en español.
  reviewer_model: gpt-5.4
