base_translation:
  language: en
  yaml_path: translation/nt/luke/009/034.yaml
  text: While he was saying these things[a], a cloud appeared and overshadowed them[b]; and they were afraid as they entered into the cloud.
  footnotes:
  - marker: a
    text: Or 'a cloud came and overshadowed them.' The verb can be rendered more simply without the inceptive nuance.
    reason: lexical_alternative
  - marker: b
    text: The cloud likely echoes Old Testament scenes of God's manifest presence, though the verse itself does not state this explicitly.
    reason: cross_reference
