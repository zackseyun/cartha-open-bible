translation:
  language: es
  text: Mientras él decía estas cosas, apareció una nube[a] y los cubrió con su sombra[b], y tuvieron miedo mientras entraban en la nube.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vino una nube». El verbo puede traducirse de manera más simple sin destacar tanto el matiz de aparición.
    reason: lexical_alternative
  - marker: b
    text: La nube probablemente evoca escenas del Antiguo Testamento de la presencia manifiesta de Dios, aunque este versículo no lo afirma explícitamente.
    reason: cross_reference
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  lexicon: BDAG
  rationale: El demostrativo plural apunta a varias palabras o dicho previo; «estas cosas» conserva mejor el plural que «esto» y sigue de cerca el valor referencial del griego.
- source_word: αὐτοῦ λέγοντος
  english_pob_choice: while he was saying
  chosen_spanish: Mientras él decía
  alternatives_spanish:
  - mientras estaba diciendo
  - así que, mientras decía
  lexicon: BDAG
  rationale: El genitivo absoluto con participio presente indica simultaneidad. «Mientras él decía» es natural en español y mantiene la acción en curso sin forzar un aspecto más marcado.
- source_word: ἐγένετο νεφέλη
  english_pob_choice: a cloud appeared
  chosen_spanish: apareció una nube
  alternatives_spanish:
  - vino una nube
  - surgió una nube
  lexicon: BDAG
  rationale: Ἐγένετο con sujeto nominativo introduce la irrupción o llegada de algo. «Apareció» comunica bien ese inicio sin añadir más de lo que el texto afirma.
- source_word: ἐπεσκίαζεν
  english_pob_choice: overshadowed
  chosen_spanish: los envolvía
  alternatives_spanish:
  - los cubría con sombra
  - los cubría
  lexicon: BDAG
  rationale: El imperfecto describe acción en desarrollo. «Los envolvía» conserva la idea de cubrir/sombrear de manera progresiva y suena natural en español; evita una lectura excesivamente técnica de «sombrear».
- source_word: ἐφοβήθησαν
  english_pob_choice: they were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - se llenaron de miedo
  - temieron
  lexicon: BDAG
  rationale: El aoristo comunica el surgimiento del temor. «Tuvieron miedo» es idiomático y directo, sin perder el sentido narrativo del verbo.
- source_word: ἐν τῷ εἰσελθεῖν αὐτοὺς
  english_pob_choice: as they entered
  chosen_spanish: mientras entraban
  alternatives_spanish:
  - cuando entraban
  - al entrar
  lexicon: BDAG
  rationale: La construcción articular con infinitivo expresa tiempo concurrente. «Mientras entraban» reproduce la simultaneidad y mantiene la naturalidad del español.
- source_word: εἰς τὴν νεφέλην
  english_pob_choice: into the cloud
  chosen_spanish: en la nube
  alternatives_spanish:
  - dentro de la nube
  - hacia la nube
  lexicon: BDAG
  rationale: Aunque εἰς marca movimiento hacia el interior, en español «entraban en la nube» resulta plenamente claro; la preposición «en» con el verbo de movimiento conserva la imagen espacial sin forzar una construcción pesada.
theological_decisions:
- issue: Sentido de la nube y su posible trasfondo teofánico
  english_pob_reading: Translate descriptively as 'a cloud appeared and overshadowed them' without explicitly identifying the cloud as the divine presence in the main text.
  chosen_spanish_reading: 'Traducir de manera descriptiva: «apareció una nube y los envolvía», sin identificar explícitamente la nube como la presencia divina en el texto principal.'
  alternative_spanish_readings:
  - apareció la nube de la gloria de Dios y los cubrió
  - apareció una nube de la presencia de Yahvé y los envolvió
  rationale: El contexto evoca con fuerza escenas del Antiguo Testamento, pero este versículo no lo explicita. La redacción conserva la imagen y deja la resonancia teológica sin resolverla de forma interpretativa en el cuerpo principal.
  doctrine_reference: Preservar la tensión teológica; no añadir una glosa doctrinal al texto principal.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB en inglés, que prefirió un rendering más directo de ἐπεσκίαζεν sin expansión aspectual innecesaria. En español se reflejó esa decisión con «los envolvía», manteniendo el imperfecto y la imagen progresiva sin añadir «empezó a».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma por defecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino explícito.
  - Se evitó «Cristo» o glosas litúrgicas porque el pasaje no las exige.
  - La construcción «entraban en la nube» conserva el movimiento hacia el interior sin sobrecargar el español con un calco rígido.
  - Se optó por un verbo de imagen amplia («envolvía») para ἐπεσκίαζεν, respetando la ambigüedad entre cubrir, sombrear y envolver.
