translation:
  language: es
  text: Entonces surgió entre ellos una disputa acerca de cuál de ellos podría ser el mayor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘un razonamiento’ o ‘surgió una discusión entre ellos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰσῆλθεν
  english_pob_choice: arose
  chosen_spanish: surgió
  alternatives_spanish:
  - apareció
  - entró
  - se levantó
  lexicon: BDAG
  rationale: El griego dice literalmente ‘entró’, pero con διαλογισμός el sentido natural es el surgimiento de una controversia o discusión. ‘Surgió’ conserva el carácter eventivo sin forzar un calco extraño en español.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Marca la progresión narrativa. ‘Entonces’ fluye con naturalidad en español y corresponde al valor conectivo suave de δέ.
- source_word: διαλογισμὸς
  english_pob_choice: dispute
  chosen_spanish: disputa
  alternatives_spanish:
  - razonamiento
  - discusión
  - argumento
  lexicon: BDAG
  rationale: El término puede denotar razonamiento interno o discusión/debate. Por el contenido del versículo, la competencia por la grandeza entre los discípulos hace más adecuado ‘disputa’.
- source_word: ἐν αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en ellos
  - dentro de ellos
  lexicon: BDAG
  rationale: Aunque literalmente es ‘en ellos’, en español el sentido grupal se expresa mejor con ‘entre ellos’, indicando que la disputa se daba dentro del grupo.
- source_word: τὸ τίς ἂν εἴη
  english_pob_choice: as to which ... might be
  chosen_spanish: acerca de cuál ... podría ser
  alternatives_spanish:
  - sobre quién ... sería
  - respecto de quién ... pudiera ser
  lexicon: BDAG
  rationale: La construcción introduce el contenido de la disputa. ‘Acerca de cuál ... podría ser’ conserva la idea de pregunta indirecta y la potencialidad de ἄν con el optativo.
- source_word: τίς
  english_pob_choice: which
  chosen_spanish: cuál
  alternatives_spanish:
  - quién
  lexicon: BDAG
  rationale: Dentro de un grupo definido, el español idiomático prefiere ‘cuál de ellos’ antes que ‘quién de ellos’, manteniendo la referencia personal.
- source_word: ἂν εἴη
  english_pob_choice: might be
  chosen_spanish: podría ser
  alternatives_spanish:
  - sería
  - fuera
  lexicon: BDAG
  rationale: La combinación con optativo expresa posibilidad o potencialidad. ‘Podría ser’ transmite mejor ese matiz que una forma más categórica.
- source_word: μείζων
  english_pob_choice: the greatest
  chosen_spanish: el mayor
  alternatives_spanish:
  - el más grande
  - el superior
  lexicon: BDAG
  rationale: El comparativo griego funciona aquí como el grado máximo dentro del grupo. En español, ‘el mayor’ comunica con naturalidad la idea de rango o preeminencia.
- source_word: αὐτῶν
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - entre ellos
  lexicon: BDAG
  rationale: El genitivo delimita el grupo entre el cual se hace la comparación. ‘De ellos’ es la manera más directa y clara de expresarlo en español.
theological_decisions:
- issue: Tono de la interacción entre los discípulos
  english_pob_reading: dispute
  chosen_spanish_reading: disputa
  alternative_spanish_readings:
  - discusión
  - razonamiento
  rationale: El versículo no presenta una cuestión doctrinal, pero sí una tensión relacional. ‘Disputa’ refleja mejor la competencia por la grandeza que una simple conversación o razonamiento interno.
  doctrine_reference: No aplica; decisión de tono y pragmática narrativa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el pasaje griego y concuerda con el juicio del auditable en inglés: εἰσῆλθεν + διαλογισμός se vierte de manera idiomática como surgimiento de una disputa/discusión, manteniendo la pregunta indirecta y el matiz potencial de ἄν con el optativo.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ no porque aparezca aquí, sino por convención del proyecto; este versículo no contiene el nombre divino.
  - ‘Mayor’ se eligió como equivalente natural de μείζων en un contexto de rango entre discípulos; ‘más grande’ sería posible, pero menos idiomático para una comparación de preeminencia.
  - La nota al pie conserva alternativas semánticas del sustantivo griego, como en el audit trail inglés.
