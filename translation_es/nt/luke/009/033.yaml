translation:
  language: es
  text: 'Y mientras se apartaban de él, Pedro dijo a Jesús: «Maestro, es bueno que estemos aquí. Hagamos tres refugios[a]: uno para ti, uno para Moisés y uno para Elías», no sabiendo lo que decía.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tiendas», «cobertizos» o, tradicionalmente, «tabernáculos». El griego σκηναί se refiere a refugios temporales y puede evocar la imaginería bíblica de la fiesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ἐν τῷ διαχωρίζεσθαι
  english_pob_choice: as they were departing
  chosen_spanish: mientras se apartaban
  alternatives_spanish:
  - mientras se alejaban
  - cuando se iban separando
  lexicon: SBLGNT; BDAG
  rationale: La construcción narrativa se expresa en español con una subordinada temporal natural. «Mientras» conserva la simultaneidad, y «se apartaban» recoge el sentido de separación/departida sin volver la frase pesada.
- source_word: διαχωρίζεσθαι αὐτοὺς ἀπ’ αὐτοῦ
  english_pob_choice: they were departing from him
  chosen_spanish: se apartaban de él
  alternatives_spanish:
  - se alejaban de él
  - se iban de él
  lexicon: SBLGNT; BDAG
  rationale: «Apartarse de él» conserva la idea de separación desde Jesús y suena más directo en español que una traducción demasiado literal del participio medio/pasivo.
- source_word: Ἐπιστάτα
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Señor
  - Maestro principal
  lexicon: BDAG
  rationale: En contexto lucano es un tratamiento respetuoso dirigido a Jesús. «Maestro» comunica autoridad y cercanía de forma natural en español; «Señor» sería más interpretativo aquí.
- source_word: καλόν ἐστιν ἡμᾶς ὧδε εἶναι
  english_pob_choice: it is good for us to be here
  chosen_spanish: bueno es que estemos aquí
  alternatives_spanish:
  - es bueno que estemos aquí
  - nos conviene estar aquí
  lexicon: SBLGNT; BDAG
  rationale: Se preserva el juicio evaluativo de καλόν y la construcción con infinitivo mediante una subordinada natural en español. El orden «bueno es» mantiene cierta solemnidad sin sonar arcaico.
- source_word: ποιήσωμεν σκηνὰς τρεῖς
  english_pob_choice: Let us make three shelters
  chosen_spanish: Hagamos tres enramadas
  alternatives_spanish:
  - Hagamos tres refugios
  - Levantemos tres tiendas
  lexicon: BDAG
  rationale: σκηνή designa una estructura temporal tipo tienda/refugio. «Enramadas» conserva la posible resonancia bíblica de Fiesta de los Tabernáculos/Enramadas sin imponer la interpretación como si fuera segura; en español bíblico es comprensible y mantiene la tensión léxica.
- source_word: μίαν σοὶ καὶ μίαν Μωϋσεῖ καὶ μίαν Ἠλίᾳ
  english_pob_choice: one for you, one for Moses, and one for Elijah
  chosen_spanish: una para ti, una para Moisés y una para Elías
  alternatives_spanish:
  - una para ti, otra para Moisés y otra para Elías
  - una a ti, una a Moisés y una a Elías
  lexicon: SBLGNT
  rationale: La distribución repetitiva del griego se conserva con la triple enumeración. «Para» expresa la destinación de cada enramada sin introducir más que eso.
- source_word: μὴ εἰδὼς ὃ λέγει
  english_pob_choice: not knowing what he was saying
  chosen_spanish: no sabiendo lo que decía
  alternatives_spanish:
  - sin saber lo que decía
  - no entendiendo lo que decía
  lexicon: BDAG
  rationale: La forma participial se expresa de modo natural con «no sabiendo». El imperfecto «decía» refleja el valor progresivo del presente griego y mantiene la idea de habla en curso.
theological_decisions:
- issue: Posible resonancia de σκηνάς con la Fiesta de las Enramadas/Tabernáculos
  english_pob_reading: shelters; footnote preserves booths/tents/tabernacles and festival imagery
  chosen_spanish_reading: enramadas; nota preserva tiendas/refugios/tabernáculos y la posible resonancia festiva
  alternative_spanish_readings:
  - tiendas
  - refugios
  - tabernáculos
  rationale: El texto no afirma explícitamente la fiesta, pero la palabra griega admite esa resonancia. «Enramadas» permite al lector percibir la posible alusión bíblica sin convertirla en una interpretación obligatoria del versículo.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Tratamiento de Jesús como Ἐπιστάτα
  english_pob_reading: Master
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Señor
  - Jefe
  rationale: Mantener un vocativo respetuoso y lucano evita fusionarlo con otros títulos cristológicos más cargados teológicamente. «Maestro» es la equivalencia más estable y entendible en español.
  doctrine_reference: Luke usage of ἐπιστάτης in narrative context
translation_notes:
  revision_awareness: 'El inglés POB mantiene una nota léxica sobre σκηνάς/σκηναί y una lectura neutral en el texto principal. Esta versión española conserva la misma cautela interpretativa: opta por una palabra bíblicamente resonante pero no explicita la Fiesta de las Enramadas como si fuera segura, y refleja el matiz temporal de los refugios. No se introdujeron cambios textuales respecto del sentido auditado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Jesús» se conserva por nombre propio sin variación.
  - «Maestro» se usa como vocativo lucano para Ἐπιστάτα, evitando sobrecargarlo con títulos doctrinales.
  - «Enramadas» se eligió por el equilibrio entre naturalidad española y posible resonancia bíblica; la nota ofrece alternativas equivalentes.
  - La cláusula final conserva el aspecto progresivo con «decía», equivalente funcional del inglés POB «was saying».
