  rationale: Se revisa para mantener en el texto principal una traducción neutral de σκηνὰς («refugios»), en línea con la decisión documentada del POB, dejando las alternativas más específicas o tradicionales en la nota. También se recoloca correctamente la nota al término relevante y se mejora la naturalidad del español en la apertura y en «es bueno que estemos aquí».
