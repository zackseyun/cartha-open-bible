translation:
  language: es
  text: Pues, ¿qué aprovecha un hombre si gana el mundo entero[a], pero se pierde a sí mismo o sufre pérdida?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su vida» o «su alma»; el griego dice «a sí mismo». El texto usa el pronombre reflexivo en lugar de la palabra habitual para «alma» o «vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - cómo
  lexicon: BDAG
  rationale: Interrogativa retórica de beneficio o ventaja; «qué» es natural en español para «¿qué aprovecha...?».
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Conserva la fuerza explicativa/conectiva de la partícula al enlazar con el dicho anterior; «porque» es fluido al inicio de la cláusula.
- source_word: ὠφελεῖται
  english_pob_choice: does ... profit
  chosen_spanish: aprovecha
  alternatives_spanish:
  - se beneficia
  - gana
  lexicon: BDAG
  rationale: El verbo expresa beneficio o ventaja; «aprovecha» comunica ese sentido de utilidad en español bíblico contemporáneo sin sonar forzado.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  - un ser humano
  lexicon: BDAG
  rationale: El singular masculino griego es genérico/representativo; se conserva con «un hombre» para reflejar la forma del original y su valor proverbial.
- source_word: κερδήσας
  english_pob_choice: if he gains
  chosen_spanish: si gana
  alternatives_spanish:
  - habiendo ganado
  - después de ganar
  - si llegara a ganar
  lexicon: BDAG
  rationale: El participio aoristo en contexto hipotético se rinde de modo idiomático con una condicional simple en español.
- source_word: τὸν κόσμον ὅλον
  english_pob_choice: the whole world
  chosen_spanish: el mundo entero
  alternatives_spanish:
  - todo el mundo
  - el mundo completo
  lexicon: BDAG
  rationale: Equivale naturalmente a la totalidad del mundo/ámbito mundano; «el mundo entero» preserva la totalidad sin sobreexplicar.
- source_word: ἑαυτόν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - su propia vida
  - su alma
  - él mismo
  lexicon: BDAG
  rationale: Se conserva el pronombre reflexivo, evitando introducir «alma» o «vida», ya que el griego usa ἑαυτόν y no ψυχή.
- source_word: ἀπολέσας
  english_pob_choice: loses
  chosen_spanish: se pierde
  alternatives_spanish:
  - pierde
  - se arruina
  - destruye
  lexicon: BDAG
  rationale: ἀπόλλυμι aquí puede expresar perder/arruinar; «se pierde» mantiene el contraste y deja abierta la amplitud semántica sin estrecharlo.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - y
  lexicon: BDAG
  rationale: Mantiene la relación disyuntiva entre las dos consecuencias posibles.
- source_word: ζημιωθείς
  english_pob_choice: forfeits
  chosen_spanish: se perjudica
  alternatives_spanish:
  - sufre pérdida
  - sale perdiendo
  - queda dañado
  lexicon: BDAG
  rationale: El pasivo de ζημιόω comunica sufrir daño o pérdida; «se perjudica» conserva una nota distinta de la primera cláusula y resulta idiomático en español.
theological_decisions:
- issue: ἑαυτόν y el alcance antropológico de la pérdida
  english_pob_reading: himself
  chosen_spanish_reading: a sí mismo
  alternative_spanish_readings:
  - su alma
  - su vida
  rationale: Se preserva la forma reflexiva del griego para no reducir el dicho a «alma» o «vida»; el texto habla de la persona misma en su totalidad. La redacción española mantiene esa tensión interpretativa.
  doctrine_reference: Primacía del texto original; no forzar una antropología particulada donde el griego no la explicita.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que afinó ὠφελεῖται como «profit»; en español se optó por «aprovecha», que expresa mejor la idea de beneficio sin perder naturalidad. También se conservó la distinción entre perderse y perjudicarse para reflejar los dos participios griegos.
  spanish_consistency_notes:
  - Se mantiene «un hombre» para seguir la forma masculina singular genérica del original.
  - Se evita «Cristo/Señor» u otras sustituciones no pertinentes; no hay términos teológicos variables en este versículo.
  - El reflexivo «a sí mismo» refleja ἑαυτόν con fidelidad y evita una reducción doctrinal indebida.
