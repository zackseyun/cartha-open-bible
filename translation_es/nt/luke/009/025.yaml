    issue: «se perjudica» debilita ζημιωθείς
    rationale: ζημιωθείς expresa sufrir pérdida, ser perjudicado en sentido de pérdida/forfeitura. «Se perjudica» en español suena autorreferencial y más leve; no comunica bien la pérdida decisiva del propio ser implícita en el contraste.
  - severity: low
    issue: «Porque» al inicio puede sonar más causal que conectivo
    rationale: γὰρ aquí enlaza y fundamenta el dicho anterior. «Pues» suele sonar más natural en español bíblico y conserva mejor esa función discursiva sin implicar una explicación causal demasiado directa.
