translation:
  language: es
  text: Ahora, unos ocho días[a] después de estas palabras[b], tomó consigo a Pedro, a Juan y a Jacobo, y subió al monte para orar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «como ocho días», con ὡσεὶ marcando una cifra aproximada.'
    reason: lexical_alternative
  - marker: b
    text: O «dichos». El griego λόγους puede traducirse aquí como «palabras» o «dichos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y sucedió que
  - Entonces
  lexicon: BDAG
  rationale: La fórmula narrativa introduce un nuevo episodio; «Ahora» funciona como transición natural en español sin cargar el texto con una construcción más literal y pesada.
- source_word: μετὰ τοὺς λόγους τούτους
  english_pob_choice: after these sayings
  chosen_spanish: después de estos dichos
  alternatives_spanish:
  - después de estas palabras
  - después de lo que dijo
  lexicon: BDAG
  rationale: λόγοι puede ser «palabras» o «dichos». Aquí el contexto inmediato es discurso previo, así que «dichos» conserva el sentido verbal sin volverlo demasiado interpretativo.
- source_word: ὡσεὶ ἡμέραι ὀκτὼ
  english_pob_choice: about eight days
  chosen_spanish: como de ocho días
  alternatives_spanish:
  - unas ocho días
  - aproximadamente ocho días
  lexicon: BDAG
  rationale: ὡσεὶ marca aproximación. «Como de» es una forma natural en español para expresar esa indeterminación sin hacer el número exacto.
- source_word: παραλαβὼν
  english_pob_choice: he took
  chosen_spanish: tomó consigo
  alternatives_spanish:
  - lo llevó consigo
  - tomó
  lexicon: BDAG
  rationale: El participio expresa que Jesús los acompaña al subir. «Tomó consigo» comunica mejor la idea de llevarlos con él que un simple «tomó».
- source_word: Πέτρον καὶ Ἰωάννην καὶ Ἰάκωβον
  english_pob_choice: Peter and John and James
  chosen_spanish: a Pedro, a Juan y a Jacobo
  alternatives_spanish:
  - a Pedro, Juan y Jacobo
  - a Pedro, a Juan, y a Jacobo
  lexicon: propio
  rationale: Se conserva la forma española establecida «Jacobo» y se mantienen las preposiciones personales para la naturalidad del español bíblico.
- source_word: ἀνέβη εἰς τὸ ὄρος
  english_pob_choice: went up on the mountain
  chosen_spanish: subió al monte
  alternatives_spanish:
  - subió a la montaña
  - subió al monte de
  lexicon: BDAG
  rationale: El griego enfatiza el ascenso. «Monte» es una opción bíblica natural en español y evita una repetición torpe de «subió en el monte».
- source_word: προσεύξασθαι
  english_pob_choice: to pray
  chosen_spanish: para orar
  alternatives_spanish:
  - para orar a Dios
  - a fin de orar
  lexicon: BDAG
  rationale: El infinitivo expresa propósito. «Para orar» es el equivalente más directo y fluido en español; «orar» es el registro más natural en el uso bíblico en español.
theological_decisions:
- issue: Aproximación temporal
  english_pob_reading: about eight days
  chosen_spanish_reading: como de ocho días
  alternative_spanish_readings:
  - ocho días
  - unas ocho días
  rationale: Se conserva la aproximación explícita de ὡσεὶ, evitando una precisión artificial o la armonización con los pasajes paralelos.
  doctrine_reference: Preservar la tensión sinóptica y la precisión del matiz griego.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente griego y el rastro auditado en inglés, conservando el valor aproximativo de ὡσεὶ, la ambigüedad lexical de λόγοι y la estructura narrativa de transición, sin introducir armonizaciones con pasajes paralelos.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; este versículo no lo contiene.
  - Se emplea «Jacobo» para Ἰάκωβος, conforme al uso bíblico español del proyecto.
  - «Monte» se mantiene como término bíblico natural para ὄρος en este contexto.
  - «Orar» se prefiere sobre «rezar» por consistencia con el registro del proyecto.
