revisions:
- from: Ahora, como de ocho días después de estos dichos[a][b], tomó consigo a Pedro, a Juan y a Jacobo, y subió al monte para orar.
  to: Ahora, unos ocho días[a] después de estas palabras[b], tomó consigo a Pedro, a Juan y a Jacobo, y subió al monte para orar.
  rationale: Se reordenó la frase temporal para un español idiomático que preserve la aproximación explícita de ὡσεὶ («unos ocho días»). También se cambió «dichos» a «palabras» en el texto principal por claridad y naturalidad, manteniendo la alternativa en nota. El resto del versículo se conserva por ser fiel al griego y legible en español.
