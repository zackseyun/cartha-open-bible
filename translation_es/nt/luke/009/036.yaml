translation:
  language: es
  text: Y cuando se oyó la voz[a], Jesús fue hallado solo. Y ellos guardaron silencio y no dijeron a nadie en aquellos días nada de lo que habían visto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesús solo permaneció» / «solo se vio a Jesús». El griego dice literalmente: «Jesús fue hallado solo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ γενέσθαι
  english_pob_choice: when ... had come
  chosen_spanish: y cuando la voz se hubo oído
  alternatives_spanish:
  - y cuando la voz llegó
  - y al producirse la voz
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa temporalidad. En español, «se hubo oído» conserva el valor de evento completado antes del siguiente hecho narrativo, y evita una paráfrasis excesiva.
- source_word: φωνή
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - voz audible
  lexicon: BDAG
  rationale: Aquí φωνή se refiere al habla celestial en la escena de la transfiguración. «Voz» es la equivalencia directa y más natural en español.
- source_word: εὑρέθη
  english_pob_choice: was found
  chosen_spanish: fue hallado
  alternatives_spanish:
  - fue visto
  - apareció
  lexicon: BDAG
  rationale: El aoristo pasivo de εὑρίσκω se rinde mejor con «fue hallado», que preserva la forma narrativa y la restricción del griego sin interpretar de más.
- source_word: μόνος
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - por sí mismo
  lexicon: BDAG
  rationale: «Solo» comunica la presencia exclusiva de Jesús tras desaparecer Moisés y Elías, con un español natural y fiel al predicado griego.
- source_word: ἐσίγησαν
  english_pob_choice: kept silent
  chosen_spanish: callaron
  alternatives_spanish:
  - guardaron silencio
  - se quedaron en silencio
  lexicon: BDAG
  rationale: El verbo σιγάω puede traducirse de modo directo como «callaron». En este contexto funciona bien como resultado narrativo y evita una redundancia innecesaria.
- source_word: οὐδενὶ ἀπήγγειλαν
  english_pob_choice: told no one
  chosen_spanish: no dijeron a nadie
  alternatives_spanish:
  - no le contaron a nadie
  - no informaron a nadie
  lexicon: BDAG
  rationale: ἀπαγγέλλω puede significar informar o contar. «No dijeron a nadie» es fluido en español y conserva el alcance general del verbo sin tecnicismo.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - durante aquellos días
  lexicon: BDAG
  rationale: La expresión temporal se traduce de manera directa y bíblicamente reconocible, sin perder naturalidad en español.
- source_word: οὐδὲν ὧν ἑώρακαν
  english_pob_choice: anything of what they had seen
  chosen_spanish: nada de lo que habían visto
  alternatives_spanish:
  - nada de lo que vieron
  - nada de cuanto habían visto
  lexicon: BDAG
  rationale: La construcción partitiva con relativo se vierte mejor en español como «nada de lo que habían visto», que mantiene la fuerza negativa y el enlace con lo contemplado.
theological_decisions:
- issue: Presencia solitaria de Jesús tras la voz celestial
  english_pob_reading: Render descriptively as 'Jesus was found alone' without adding interpretive explanation.
  chosen_spanish_reading: Jesús fue hallado solo
  alternative_spanish_readings:
  - Jesús quedó solo
  - solo se vio a Jesús
  rationale: La frase presenta el resultado narrativo de la escena, no una explicación doctrinal. «Fue hallado solo» preserva la sobriedad del griego y evita resolver la tensión interpretativa.
  doctrine_reference: Preservar la tensión narrativa sin explicación añadida.
translation_notes:
  revision_awareness: Se siguió de cerca el griego SBLGNT y se mantuvo la restricción narrativa del texto. La redacción española refleja la equivalencia óptima del POB inglés, especialmente en el valor temporal de ἐν τῷ γενέσθαι, el pasivo de εὑρέθη y la estructura partitiva de οὐδὲν ὧν ἑώρακαν.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y «voz» para φωνή.
  - Se conserva «Yahvé» como norma general del proyecto, aunque este versículo no lo contiene.
  - 'Se prefieren formas directas y sobrias: «fue hallado», «callaron», «no dijeron a nadie».'
  - La nota al pie marca una alternativa legítima sin forzar una interpretación teológica.
