  - severity: medium
    issue: «se hubo oído» suena artificioso en español actual
    rationale: Aunque intenta conservar anterioridad, resulta poco natural para una Biblia moderna y ampliamente legible. Una formulación como «cuando se oyó la voz» mantiene claridad y dignidad.
  - severity: low
    issue: «callaron» es algo más débil que la opción preferible «guardaron silencio»
    rationale: El verbo griego ἐσίγησαν puede verterse con «callaron», pero «guardaron silencio» representa mejor el matiz narrativo de mantenerse en silencio y encaja bien con el registro.
