review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego: conserva la necesidad impersonal de Δεῖ, el título «el Hijo del Hombre», la amplitud de «muchas cosas», la agencia de los grupos dirigentes con «por», y la serie sufrir/rechazo/muerte/resurrección. Sin embargo, dos elecciones españolas no preservan bien el valor idiomático y semántico del original/POB: «sea muerto» es poco natural en español bíblico actual para ἀποκτανθῆναι, y sobre todo «sea levantado» para ἐγερθῆναι introduce una ambigüedad física que en español no comunica claramente resurrección, aunque el griego sí lo hace en contexto. La nota b además está anclada en la palabra equivocada.'
  spanish_quality_summary: El texto es mayormente legible y digno, pero «sea muerto» suena forzado y «sea levantado» resulta poco idiomático y potencialmente confuso para lectores hispanohablantes. «Sea resucitado» preserva la pasiva y comunica con claridad el sentido contextual de ἐγερθῆναι. También conviene mover la nota [b] a la expresión de resurrección, no a «muerto».
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Hijo del Hombre», «escribas» y «principales sacerdotes» están bien. La decisión sobre ἐγερθῆναι debe priorizar fidelidad semántica en español: «resucitado» aquí es mejor que «levantado», mientras mantiene la voz pasiva documentada en el POB inglés.'
  issues:
  - severity: high
    issue: «sea levantado» para ἐγερθῆναι es demasiado ambiguo en español
    rationale: Aunque formalmente refleja la pasiva de ἐγείρω, en español «ser levantado» no comunica de manera natural la resurrección en este contexto y puede sugerir solo elevación física. «Sea resucitado» preserva la pasiva y el sentido contextual del verbo.
  - severity: medium
    issue: La nota [b] está anclada en «sea muerto» en vez de en el verbo de resurrección
    rationale: La nota explica la forma pasiva de ἐγερθῆναι y la alternativa «resucite», por lo que debe marcar la palabra o frase correspondiente a la resurrección.
  - severity: medium
    issue: «sea muerto» es poco natural en español actual
    rationale: Aunque intenta conservar la pasiva de ἀποκτανθῆναι, esta formulación suena rígida. «sea matado» tampoco mejora mucho; en español bíblico y general, «lo maten» sería más natural, pero cambiaría la sintaxis. Puede mantenerse la serie con subjuntivos finitos si se reestructura mínimamente a «y lo maten».
  revised_spanish_text: 'diciendo[a]: «Es necesario que el Hijo del Hombre padezca muchas cosas y sea rechazado por los ancianos, los principales sacerdotes y los escribas, y lo maten, y al tercer día sea resucitado[b]».'
