revisions:
- from: 'diciendo[a]: «Es necesario que el Hijo del Hombre padezca muchas cosas y sea rechazado por los ancianos, los principales sacerdotes y los escribas, y sea muerto[b], y al tercer día sea levantado».'
  to: 'diciendo[a]: «Es necesario que el Hijo del Hombre padezca muchas cosas y sea rechazado por los ancianos, los principales sacerdotes y los escribas, y lo maten, y al tercer día sea resucitado[b]».'
  rationale: Se revisa el español para mejorar fidelidad semántica y naturalidad. «Y lo maten» expresa ἀποκτανθῆναι de forma idiomática en español sin afectar el sentido. «Sea resucitado» comunica claramente el valor contextual de ἐγερθῆναι y conserva la voz pasiva destacada por el POB inglés. La nota [b] se reubica correctamente sobre el verbo de resurrección.
