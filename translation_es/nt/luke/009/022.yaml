translation:
  language: es
  text: 'diciendo[a]: «Es necesario que el Hijo del Hombre padezca muchas cosas y sea rechazado por los ancianos, los principales sacerdotes y los escribas, y lo maten, y al tercer día sea resucitado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Debe ser que el Hijo del Hombre padezca muchas cosas …»'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «sea levantado», conservando la pasiva; compárese la alternativa «resucite».'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰπὼν
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - habiendo dicho
  - y dijo
  lexicon: BDAG
  rationale: El participio aoristo introduce el contenido de lo que Jesús acaba de decir. «Diciendo» conserva la relación participial con la narración previa y suena natural en español.
- source_word: Δεῖ
  english_pob_choice: It is necessary
  chosen_spanish: Es necesario
  alternatives_spanish:
  - Debe ser
  - Tiene que ser
  lexicon: BDAG
  rationale: Aquí expresa necesidad divina o redentiva, no simple conveniencia. «Es necesario» preserva esa fuerza impersonal sin volverla demasiado interpretativa.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el ser humano
  - el hombre
  lexicon: BDAG
  rationale: Es el título establecido de autoidentificación de Jesús y conserva sus resonancias daniélicas y evangélicas. No conviene verterlo como una frase descriptiva común.
- source_word: πολλὰ παθεῖν
  english_pob_choice: to suffer many things
  chosen_spanish: padezca muchas cosas
  alternatives_spanish:
  - sufra mucho
  - sufra muchas cosas
  lexicon: BDAG
  rationale: El griego expresa amplitud de padecimiento con πολλά. «Padezca muchas cosas» mantiene esa amplitud de forma transparente, aun cuando en español suene menos idiomático que «sufra mucho».
- source_word: ἀποδοκιμασθῆναι
  english_pob_choice: to be rejected
  chosen_spanish: sea rechazado
  alternatives_spanish:
  - sea repudiado
  - sea desaprobado
  lexicon: BDAG
  rationale: Es la pasiva de rechazo oficial tras evaluación. «Sea rechazado» es la equivalencia más clara y natural en español.
- source_word: ἀπὸ τῶν πρεσβυτέρων καὶ ἀρχιερέων καὶ γραμματέων
  english_pob_choice: by the elders, chief priests, and scribes
  chosen_spanish: por los ancianos, los principales sacerdotes y los escribas
  alternatives_spanish:
  - por los líderes, los principales sacerdotes y los escribas
  - por los ancianos, los sumos sacerdotes y los escribas
  lexicon: BDAG
  rationale: Con una pasiva, ἀπό marca el agente. «Por» comunica bien esa agencia en español. «Ancianos» conserva el grupo institucional; «principales sacerdotes» refleja el valor colectivo de ἀρχιερεῖς sin forzar una lectura singular de «sumos sacerdotes».
- source_word: πρεσβυτέρων
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - líderes
  lexicon: BDAG
  rationale: En el contexto judío del siglo I, la referencia es al grupo de ancianos reconocidos como autoridad. «Ancianos» es claro y evita introducir un término eclesial posterior como «presbíteros».
- source_word: ἀρχιερέων
  english_pob_choice: chief priests
  chosen_spanish: principales sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  - jefes sacerdotales
  lexicon: BDAG
  rationale: El plural se refiere a la clase sacerdotal dirigente, no necesariamente a varios sumos sacerdotes en sentido estricto. «Principales sacerdotes» conserva ese matiz colectivo y suena natural en español.
- source_word: γραμματέων
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la ley
  - doctores de la ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente directo y preserva la designación reconocible del grupo en los Evangelios. Las otras opciones son más interpretativas.
- source_word: ἀποκτανθῆναι
  english_pob_choice: to be killed
  chosen_spanish: sea muerto
  alternatives_spanish:
  - sea asesinado
  - sea puesto a muerte
  lexicon: BDAG
  rationale: La pasiva indica que será muerto. «Sea muerto» mantiene la forma pasiva del griego; «sea asesinado» especificaría más de lo que el término exige.
- source_word: τῇ τρίτῃ ἡμέρᾳ
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - a los tres días
  lexicon: BDAG
  rationale: Es la equivalencia temporal natural en español para la dativa de tiempo. Conserva la fórmula de resurrección sin añadir precisión no explicitada.
- source_word: ἐγερθῆναι
  english_pob_choice: to be raised
  chosen_spanish: sea levantado
  alternatives_spanish:
  - sea resucitado
  - resucite
  lexicon: BDAG
  rationale: La pasiva de ἐγείρω se conserva mejor con una pasiva española. «Sea levantado» mantiene la voz pasiva y no introduce explícitamente al agente; además, evita resolver de antemano la relación entre «levantar» y «resucitar» que el griego deja abierta.
theological_decisions:
- issue: La voz pasiva en «ἐγερθῆναι»
  english_pob_reading: to be raised
  chosen_spanish_reading: sea levantado
  alternative_spanish_readings:
  - sea resucitado
  - resucite
  rationale: La construcción griega es pasiva. «Sea levantado» preserva esa pasividad y deja implícita la acción de Dios, en lugar de explicitarla con una forma activa o con un verbo interpretativamente más cerrado.
  doctrine_reference: Preservar la tensión teológica del pasivo divino sin resolverla en la traducción.
- issue: La necesidad expresada por Δεῖ
  english_pob_reading: It is necessary
  chosen_spanish_reading: Es necesario
  alternative_spanish_readings:
  - Debe ser
  - Tiene que ser
  rationale: La frase presenta los padecimientos, la muerte y la elevación del Hijo del Hombre como necesarios dentro del propósito redentor de Dios. «Es necesario» mantiene el carácter impersonal del griego.
  doctrine_reference: Primacía del texto original y equivalencia óptima; mantener la necesidad redentiva sin sobreexplicar el mecanismo.
translation_notes:
  revision_awareness: El texto sigue de cerca el estado de revisión más reciente del expediente en inglés, que se mantuvo sin cambios tras la última pasada. No se aplicaron revisiones adicionales al sentido, y se conservaron las decisiones confirmadas sobre Δεῖ y el pasivo de ἐγερθῆναι.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se usa «Hijo del Hombre» como título fijo, en continuidad con la auditoría inglesa.
  - Se prefieren «ancianos», «principales sacerdotes» y «escribas» para reflejar los grupos del pasaje sin eclesializar el vocabulario.
  - 'Se conserva la pasiva en los dos infinitivos relevantes: «sea muerto» y «sea levantado».'
  - La puntuación y el uso de comillas siguen la convención española, con nota al pie vinculada al participio inicial y al verbo final.
