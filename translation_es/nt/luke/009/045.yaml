translation:
  language: es
  text: Pero ellos no entendían este dicho[a], y les estaba oculto[b] para que no lo percibieran, y tenían miedo de preguntarle acerca de este dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palabra», «declaración» o «asunto» para ῥῆμα.
    reason: lexical_alternative
  - marker: b
    text: El griego dice que «les estaba oculto» sin nombrar quién lo ocultó.
    reason: alternative_reading
lexical_decisions:
- source_word: ἠγνόουν
  english_pob_choice: did not understand
  chosen_spanish: no entendían
  alternatives_spanish:
  - no sabían
  - ignoraban
  lexicon: BDAG
  rationale: El verbo expresa aquí falta de comprensión del dicho de Jesús, no solo ausencia de datos. «No entendían» comunica esa incapacidad de captar el sentido y suena natural en español.
- source_word: τὸ ῥῆμα τοῦτο
  english_pob_choice: this saying
  chosen_spanish: esta declaración
  alternatives_spanish:
  - esta palabra
  - este dicho
  - este asunto
  lexicon: BDAG
  rationale: ῥῆμα se refiere a la afirmación concreta que Jesús acaba de pronunciar. «Declaración» conserva el carácter de enunciado dicho, sin reducirlo a una sola «palabra» ni volverlo demasiado vago como «asunto».
- source_word: παρακεκαλυμμένον
  english_pob_choice: was concealed
  chosen_spanish: les estaba oculta
  alternatives_spanish:
  - estaba escondida
  - estaba velada
  lexicon: BDAG
  rationale: El perfecto pasivo expresa un estado de ocultamiento. En español, «les estaba oculta» transmite ese estado de manera natural y mantiene la voz pasiva sin añadir un agente explícito.
- source_word: ἀπ’ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: les
  alternatives_spanish:
  - de ellos
  - para ellos
  lexicon: BDAG
  rationale: La preposición indica alejamiento respecto de ellos. En español, el dativo «les» funciona bien con la construcción «les estaba oculta» y evita forzar una repetición pesada de «de ellos».
- source_word: ἵνα μὴ αἴσθωνται αὐτό
  english_pob_choice: so that they might not perceive it
  chosen_spanish: para que no la percibieran
  alternatives_spanish:
  - para que no la comprendieran
  - para que no se dieran cuenta de ella
  lexicon: BDAG
  rationale: αἰσθάνομαι apunta a percibir o advertir. «Percibieran» preserva esa diferencia respecto de ἠγνόουν, que ya se traduce como «no entendían».
- source_word: ἐφοβοῦντο
  english_pob_choice: they were afraid
  chosen_spanish: tenían miedo
  alternatives_spanish:
  - temían
  - les daba temor
  lexicon: BDAG
  rationale: El imperfecto describe una disposición continua. «Tenían miedo» es idiomático y claro en español, manteniendo la idea de un temor sostenido.
- source_word: ἐρωτῆσαι
  english_pob_choice: to ask
  chosen_spanish: preguntarle
  alternatives_spanish:
  - hacerle una pregunta
  - interrogarlo
  lexicon: BDAG
  rationale: El infinitivo denota pedir aclaración a Jesús. «Preguntarle» es el equivalente más natural y directo en este contexto.
theological_decisions:
- issue: Agencia del ocultamiento
  english_pob_reading: The text states that the saying was concealed from them without specifying the agent.
  chosen_spanish_reading: El texto dice que les estaba oculta sin nombrar quién la ocultó.
  alternative_spanish_readings:
  - Dios se la ocultó
  - simplemente no podían entenderla
  rationale: La construcción pasiva no identifica al agente. La versión española conserva esa ambigüedad para no introducir una agencia que el versículo no explicita y así preservar la tensión textual.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego SBLGNT y coincide en sustancia con el audit trail en inglés: dos verbos distintos de comprensión/percepción, pasiva sin agente en el ocultamiento y temor sostenido antes de preguntar. No se detectaron revisiones aplicadas en la versión inglesa más reciente.'
  spanish_consistency_notes:
  - Se evita «SEÑOR»; no hay nombre divino en este versículo.
  - «No entendían» y «no la percibieran» distinguen ἠγνόουν de αἴσθωνται.
  - «Les estaba oculta» mantiene la pasiva y la falta de agente explícito.
  - «Preguntarle» conserva el sentido de solicitar aclaración a Jesús.
