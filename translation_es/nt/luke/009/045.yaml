revisions:
- from: Pero ellos no entendían esta declaración[a], y les estaba oculta[b] para que no la percibieran, y tenían miedo de preguntarle acerca de esta declaración.
  to: Pero ellos no entendían este dicho[a], y les estaba oculto[b] para que no lo percibieran, y tenían miedo de preguntarle acerca de este dicho.
  rationale: Se reemplaza «declaración» por «dicho» para reflejar mejor ῥῆμα como una expresión hablada concreta y sonar más natural en español bíblico actual. También se ajusta la referencia pronominal y la nota para que correspondan al nuevo antecedente masculino y preserven la pasiva sin agente explícito.
