translation:
  language: es
  text: 'Y él les decía a todos[a]: «Si alguien quiere venir en pos de mí, que se niegue a sí mismo, que tome su cruz cada día, y que me siga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si alguien quiere venir tras de mí, que se niegue a sí mismo, que tome su cruz cada día, y que me siga». El griego usa un singular genérico («si alguien... que... se niegue...») que se conserva en el texto principal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: les decía
  alternatives_spanish:
  - decía
  - les estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción discursiva en curso o repetida; en español, «les decía» conserva ese valor aspectual de manera natural. Se añade el dativo implícito «les» para reflejar el destinatario plural de πρὸς πάντας.
- source_word: πρὸς πάντας
  english_pob_choice: to all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a toda la gente
  lexicon: BDAG
  rationale: La preposición con acusativo marca dirección del discurso; «a todos» reproduce el alcance colectivo de manera concisa y idiomática.
- source_word: Εἴ τις θέλει
  english_pob_choice: If anyone wants
  chosen_spanish: Si alguien quiere
  alternatives_spanish:
  - Si alguno quiere
  - Si cualquier persona quiere
  lexicon: BDAG
  rationale: τις es indefinido y genérico; «alguien» mantiene la apertura sin introducir un plural que el griego no usa. θέλει expresa voluntad/deseo; «quiere» es el equivalente natural en español.
- source_word: ὀπίσω μου ἔρχεσθαι
  english_pob_choice: to come after me
  chosen_spanish: venir en pos de mí
  alternatives_spanish:
  - venir después de mí
  - venir tras de mí
  lexicon: BDAG
  rationale: La expresión griega es idiomática para seguimiento discipular. «En pos de mí» conserva el matiz relacional y traduce bien el movimiento figurado sin reducirlo prematuramente al verbo «seguir».
- source_word: ἀρνησάσθω ἑαυτὸν
  english_pob_choice: let him deny himself
  chosen_spanish: que se niegue a sí mismo
  alternatives_spanish:
  - que se niegue a sí
  - que renuncie a sí mismo
  lexicon: BDAG
  rationale: El imperativo de tercera persona se expresa con naturalidad en español mediante «que...». «Negarse a sí mismo» conserva la fuerza de ἀρνέομαι; se evita «renuncie» porque desplaza el matiz hacia abandono o cesión más que a la negación/repudio de uno mismo.
- source_word: ἀράτω
  english_pob_choice: take up
  chosen_spanish: tome
  alternatives_spanish:
  - levante
  - cargue
  lexicon: BDAG
  rationale: En español, con «su cruz» el verbo «tomar» reproduce el valor idiomático de asumir/aceptar la cruz; «levante» o «cargue» enfatizarían un aspecto físico que no necesariamente es el centro del giro idiomático.
- source_word: τὸν σταυρὸν αὐτοῦ
  english_pob_choice: his cross
  chosen_spanish: su cruz
  alternatives_spanish:
  - su propia cruz
  - la cruz que le corresponde
  lexicon: BDAG
  rationale: σταυρός debe mantenerse como «cruz» por su concreción histórica y simbólica. El posesivo αὐτοῦ queda bien expresado con «su»; añadir «propia» sería intensificación interpretativa no obligada por el griego.
- source_word: καθ’ ἡμέραν
  english_pob_choice: daily
  chosen_spanish: cada día
  alternatives_spanish:
  - diariamente
  - día tras día
  lexicon: BDAG
  rationale: La frase adverbial significa «cada día» / «diariamente». «Cada día» suena natural en español y preserva la insistencia lucana en la constancia cotidiana.
- source_word: ἀκολουθείτω μοι
  english_pob_choice: and follow me
  chosen_spanish: y me siga
  alternatives_spanish:
  - y sígame
  - y continúe siguiéndome
  lexicon: BDAG
  rationale: El imperativo de tercera persona se conserva con «que... me siga» implícito dentro de la cita. «Seguirme» mantiene el contenido discipular y evita redundancia tras «venir en pos de mí».
theological_decisions:
- issue: Lenguaje de la cruz en el discipulado
  english_pob_reading: Retain the literal 'cross' rather than paraphrasing as suffering, burden, or sacrifice.
  chosen_spanish_reading: Conservar «cruz» de forma literal, no reemplazarla por sufrimiento, carga o sacrificio.
  alternative_spanish_readings:
  - su sufrimiento
  - su carga
  - su sacrificio
  rationale: σταυρός es un término concreto y central en la enseñanza de Jesús. Mantener «cruz» preserva el peso histórico y teológico del enunciado y evita diluir la imagen en una explicación.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor genérico singular de τις y los imperativos subsiguientes
  english_pob_reading: Use 'anyone' for τις and retain singular masculine in the dependent imperatives as 'let him... himself.'
  chosen_spanish_reading: 'Usar un singular genérico en español: «si alguien... que se niegue... tome... me siga».'
  alternative_spanish_readings:
  - si ellos quieren... que se nieguen... tomen... me sigan
  - si una persona quiere... que se niegue... tome... me siga
  rationale: El griego inicia con un indefinido singular genérico y continúa con imperativos en tercera persona singular. El español puede reflejar esa fuerza representativa con «alguien» y formas singulares, sin convertirlo en un plural que atenúe la estructura del texto.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y la POB inglesa auditada. Se conserva el imperfecto discursivo («les decía»), el indefinido singular genérico («si alguien»), la construcción idiomática de seguimiento («venir en pos de mí») y la tríada imperativa con la cruz literal y la repetición cotidiana («cada día»). No se detectaron revisiones previas que obligaran a ajustar el sentido.
  spanish_consistency_notes:
  - Se mantiene «cruz» de forma uniforme como traducción de σταυρός.
  - Se mantiene el singular genérico con verbos en tercera persona singular para reflejar la estructura del griego.
  - «En pos de mí» y «me siga» distinguen el matiz de acercamiento/seguimiento sin colapsar las dos expresiones en una sola.
  - La puntuación de la cita respeta el flujo imperativo del original y usa comillas latinas adecuadas para español.
