    rationale: Aunque comprensible, no es la opción más idiomática en español bíblico general. «Lo sacude con convulsiones» o «lo hace convulsionar» fluye mejor y expresa bien σπαράσσει en contexto.
  - severity: medium
    issue: «aplastándolo» puede sobredeterminar συντρῖβον
    rationale: El participio describe daño severo al retirarse el espíritu; «maltratándolo» o «dejándolo destrozado» puede reflejar mejor el efecto sin evocar solo presión física.
