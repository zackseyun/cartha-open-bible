revisions:
- from: y mira[a], un espíritu lo se apodera, y de repente grita, y lo convulsiona con espuma, y apenas se aparta de él, aplastándolo.
  to: y mira[a], un espíritu se apodera de él, y de repente grita, y lo sacude con convulsiones y espuma, y apenas se aparta de él, maltratándolo.
  rationale: Se corrige el error gramatical principal con «se apodera de él». También se mejora la naturalidad de σπαράσσει μετὰ ἀφροῦ con «lo sacude con convulsiones y espuma», que comunica claramente el cuadro sin calco rígido. Finalmente, «maltratándolo» representa mejor el daño continuo de συντρῖβον en un español más idiomático y menos mecánico que «aplastándolo».
