translation:
  language: es
  text: y mira[a], un espíritu se apodera de él, y de repente grita, y lo sacude con convulsiones y espuma, y apenas se aparta de él, maltratándolo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu maligno» o «un demonio»; el griego aquí dice simplemente «un espíritu».
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira
  lexicon: BDAG
  rationale: Se traduce como un marcador discursivo vivo y natural en español. «He aquí» es más tradicional, pero resulta más solemne y menos natural para este contexto narrativo.
- source_word: πνεῦμα
  english_pob_choice: a spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - un espíritu maligno
  - un demonio
  lexicon: BDAG
  rationale: El griego dice simplemente «espíritu», sin añadir un calificativo explícito ni el sustantivo «demonio». En español se conserva ese nivel léxico para no resolver la tensión interpretativa del pasaje.
- source_word: λαμβάνει
  english_pob_choice: seizes
  chosen_spanish: se apodera de
  alternatives_spanish:
  - toma
  - agarra
  - se apodera de
  lexicon: BDAG
  rationale: En el contexto de una aflicción espiritual, «se apodera de» comunica mejor la irrupción súbita y el dominio violento que un simple «toma».
- source_word: ἐξαίφνης
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - de pronto
  lexicon: BDAG
  rationale: Equivale de modo natural al valor adverbial de inicio abrupto.
- source_word: κράζει
  english_pob_choice: he cries out
  chosen_spanish: grita
  alternatives_spanish:
  - clama
  - da un grito
  lexicon: BDAG
  rationale: El sujeto entendido es el muchacho, y «grita» expresa de manera clara y idiomática el estallido vocal del episodio.
- source_word: σπαράσσει
  english_pob_choice: it convulses him
  chosen_spanish: lo convulsiona
  alternatives_spanish:
  - lo retuerce
  - lo sacude con convulsiones
  - lo convulsiona
  lexicon: BDAG
  rationale: En este contexto médico/demoníaco, «convulsiona» comunica de forma precisa el efecto corporal. Se evita «desgarrar» por ser más literal pero menos claro en español.
- source_word: μετὰ ἀφροῦ
  english_pob_choice: with foaming
  chosen_spanish: con espuma
  alternatives_spanish:
  - espumando
  - con espuma
  - hecho espuma
  lexicon: BDAG
  rationale: La frase compacta indica que la espuma acompaña la convulsión; «con espuma» es conciso y natural en español.
- source_word: μόγις
  english_pob_choice: scarcely
  chosen_spanish: apenas
  alternatives_spanish:
  - difícilmente
  - escasamente
  lexicon: BDAG
  rationale: «Apenas» conserva la idea de dificultad extrema o salida muy laboriosa, con una cadencia natural en español bíblico moderno.
- source_word: ἀποχωρεῖ ἀπ’ αὐτοῦ
  english_pob_choice: departs from him
  chosen_spanish: se aparta de él
  alternatives_spanish:
  - se va de él
  - lo deja
  - se aleja de él
  lexicon: BDAG
  rationale: «Se aparta de él» mantiene el verbo de separación sin introducir un tono demasiado técnico o eclesiástico.
- source_word: συντρῖβον αὐτόν
  english_pob_choice: crushing him
  chosen_spanish: aplastándolo
  alternatives_spanish:
  - destruyéndolo
  - triturándolo
  - aplastándolo
  lexicon: BDAG
  rationale: El participio expresa acción dañina y violenta asociada a la retirada; «aplastándolo» conserva esa fuerza sin sobrerresolverla.
theological_decisions:
- issue: Identificación de πνεῦμα como entidad hostil sin nombrarla explícitamente como demonio
  english_pob_reading: a spirit
  chosen_spanish_reading: un espíritu
  alternative_spanish_readings:
  - un espíritu maligno
  - un demonio
  rationale: Se mantiene el nivel semántico del griego. Aunque el contexto narrativo apunta a una entidad hostil, el versículo no añade el término más específico; la traducción conserva esa precisión y la tensión interpretativa.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original) y §3 (preservar la tensión teológica)
- issue: Cómo reflejar el matiz de μόγις y ἀποχωρεῖ sin suavizar la violencia del cuadro
  english_pob_reading: it scarcely departs from him, crushing him
  chosen_spanish_reading: apenas se aparta de él, aplastándolo
  alternative_spanish_readings:
  - difícilmente se aparta de él, aplastándolo
  - apenas lo deja, hiriéndolo
  rationale: La traducción conserva la dificultad de la retirada y la acción lesiva simultánea, sin convertir el texto en una paráfrasis médica ni atenuar la violencia del participio.
  doctrine_reference: Translation philosophy §2 (equivalencia óptima con control lexical)
translation_notes:
  revision_awareness: El audit trail inglés no muestra revisiones aplicadas; el estado más reciente indica que no se necesitaban cambios. La redacción española sigue esa lectura estable, preservando el nivel léxico del original y la fuerza narrativa del pasaje.
  spanish_consistency_notes:
  - Se mantiene «espíritu» para πνεῦμα, evitando sustituirlo por «demonio» en el texto principal.
  - Se usa un verbo dinámico para λαμβάνει y un participio final que conserve la violencia del cierre.
  - La puntuación reproduce el encadenamiento rápido de acciones del griego con coordinación simple.
  - Se evita «SEÑOR» o terminología litúrgica no pertinente, porque el versículo no contiene el nombre divino.
