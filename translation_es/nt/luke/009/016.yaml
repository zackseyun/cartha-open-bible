translation:
  language: es
  text: Entonces,[a] tomando los cinco panes y los dos peces, y levantando la vista al cielo, los bendijo, los partió y seguía dándoselos a los discípulos para que los pusieran delante de la multitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dando gracias por ellos». El verbo griego aquí es «bendijo», aunque algunos relatos paralelos usan «dio gracias».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβὼν
  english_pob_choice: taking
  chosen_spanish: tomando
  alternatives_spanish:
  - habiendo tomado
  - después de tomar
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción previa y concomitante a los verbos principales. «Tomando» es natural en español y conserva el avance narrativo sin forzar una estructura demasiado pesada.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - y
  - ahora
  lexicon: BDAG
  rationale: La partícula marca progresión narrativa suave. «Entonces» reproduce bien esa transición en español sin añadir contenido interpretativo.
- source_word: ἄρτους
  english_pob_choice: loaves
  chosen_spanish: panes
  alternatives_spanish:
  - hogazas
  - pan
  lexicon: BDAG
  rationale: En español, en este contexto, «panes» comunica de forma natural el alimento concreto distribuible; «hogazas» suena más marcado y «pan» puede sonar más abstracto.
- source_word: ἰχθύας
  english_pob_choice: fish
  chosen_spanish: peces
  alternatives_spanish:
  - pescados
  lexicon: BDAG
  rationale: El plural narrativo normal en español es «peces». Mantiene la referencia simple y directa del original.
- source_word: ἀναβλέψας εἰς τὸν οὐρανὸν
  english_pob_choice: looking up to heaven
  chosen_spanish: levantando la vista al cielo
  alternatives_spanish:
  - mirando al cielo
  - alzando los ojos al cielo
  lexicon: BDAG
  rationale: La imagen es de mirar hacia arriba en actitud reverente. «Levantando la vista al cielo» es idiomático en español y conserva la dirección física sin perder el tono de oración.
- source_word: οὐρανὸν
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - cielo celestial
  - el cielo
  lexicon: BDAG
  rationale: Aquí el griego puede traducirse como «cielo» en español, manteniendo la dimensión reverente del gesto. En español bíblico «cielo» no suele requerir artículo para ser entendible; además evita una formulación demasiado interpretativa.
- source_word: εὐλόγησεν αὐτοὺς
  english_pob_choice: he blessed them
  chosen_spanish: los bendijo
  alternatives_spanish:
  - los bendijo a ellos
  - dio bendición sobre ellos
  lexicon: BDAG
  rationale: Se conserva el verbo de bendecir y el objeto plural masculino, que en contexto refiere al conjunto de panes y peces. No se sustituye por «dio gracias», porque el texto griego usa εὐλόγησεν.
- source_word: κατέκλασεν
  english_pob_choice: broke them
  chosen_spanish: los partió
  alternatives_spanish:
  - los quebró
  - los rompió
  lexicon: BDAG
  rationale: En español, para el pan, «partir» es la manera más natural y digna de expresar la acción de dividir para distribuir. Mantiene el sentido material del verbo sin sonar brusco.
- source_word: ἐδίδου
  english_pob_choice: kept giving
  chosen_spanish: seguía dándolos
  alternatives_spanish:
  - iba dándolos
  - les daba
  lexicon: BDAG
  rationale: El imperfecto indica acción continua o repetida. «Seguía dándolos» conserva esa iteración. El pronombre se ajusta al referente plural de los panes y peces en conjunto.
- source_word: μαθηταῖς
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  lexicon: BDAG
  rationale: El artículo griego basta para identificar a los discípulos en el contexto. Se evita añadir posesivo no explícito en el original.
- source_word: παραθεῖναι
  english_pob_choice: to set before
  chosen_spanish: para que los pusieran delante
  alternatives_spanish:
  - para colocarlos delante
  - para presentarlos
  lexicon: BDAG
  rationale: 'El infinitivo expresa propósito: poner la comida delante de la multitud. «Pusieran delante» comunica el sentido concreto y natural del verbo sin volverlo más interpretativo que el griego.'
- source_word: ὄχλῳ
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: «Multitud» es una traducción natural y solemne de ὄχλος en este contexto narrativo. Funciona bien en español bíblico y evita la posible informalidad de «gente».
theological_decisions:
- issue: Valor de οὐρανὸν en un gesto de bendición
  english_pob_reading: heaven
  chosen_spanish_reading: cielo
  alternative_spanish_readings:
  - cielo abierto
  - el cielo
  rationale: El gesto es de elevación reverente hacia Dios; en español, «cielo» conserva esa dimensión teológica sin imponer una glosa doctrinal adicional. No se usa «cielo abierto» porque el texto no dice eso.
  doctrine_reference: Principio de primacía del idioma original y fidelidad contextual.
- issue: εὐλόγησεν frente a la tendencia armonizadora con paralelos
  english_pob_reading: he blessed them
  chosen_spanish_reading: los bendijo
  alternative_spanish_readings:
  - dio gracias por ellos
  - los agradeció
  rationale: Se mantiene «bendijo» porque el verbo griego es εὐλογέω. Aunque paralelos usan vocabulario de agradecimiento, aquí el texto específico debe reflejarse sin armonización indebida.
  doctrine_reference: Fidelidad léxica al texto fuente; no borrar tensiones sin justificación textual.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa están en alto acuerdo y no muestran revisiones aplicadas; por tanto, la propuesta española sigue de cerca la lectura estable del pasaje, preservando especialmente la diferencia entre εὐλόγησεν («bendijo») y los paralelos que emplean lenguaje de acción de gracias.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología POB general, pero este versículo no contiene el nombre divino explícito.
  - Se usa «los» para el objeto plural masculino de panes y peces, coherente con el plural griego αὐτούς.
  - «Multitud» se alinea con el uso narrativo de ὄχλος en Lucas y conserva tono bíblico claro en español.
  - Se evita traducir mecánicamente como «dio gracias» para no borrar la elección verbal específica de Lucas 9:16.
