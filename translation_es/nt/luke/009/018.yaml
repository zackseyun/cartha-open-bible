translation:
  language: es
  text: 'Y aconteció que, mientras él estaba orando a solas[a], los discípulos estaban con él, y les preguntó, diciendo: «¿Quién dicen las multitudes que soy yo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en privado» o «solo» para κατὰ μόνας. La expresión puede indicar retiro o seclusión, no necesariamente soledad física absoluta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: y aconteció
  alternatives_spanish:
  - y ocurrió
  - y sucedió
  lexicon: BDAG
  rationale: La fórmula narrativa lucana se reproduce con un equivalente natural en español que conserva el valor de enlace discursivo y el matiz de acontecimiento narrativo.
- source_word: ἐν τῷ εἶναι αὐτὸν προσευχόμενον
  english_pob_choice: while he was praying
  chosen_spanish: mientras él estaba orando
  alternatives_spanish:
  - mientras oraba
  - cuando él estaba orando
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa contemporaneidad; en español, «mientras» comunica bien la acción simultánea sin forzar la estructura griega.
- source_word: κατὰ μόνας
  english_pob_choice: alone
  chosen_spanish: en privado
  alternatives_spanish:
  - solo
  - a solas
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por «alone» y nota la posibilidad de «in private», en español «en privado» preserva mejor la ambigüedad documentada entre soledad física y retiro/seclusión, sin resolver artificialmente la tensión del contexto.
- source_word: συνῆσαν αὐτῷ οἱ μαθηταί
  english_pob_choice: the disciples were with him
  chosen_spanish: los discípulos estaban con él
  alternatives_spanish:
  - sus discípulos estaban con él
  - los discípulos lo acompañaban
  lexicon: BDAG
  rationale: 'Se mantiene la relación simple y directa del griego: los discípulos estaban presentes con él. «Estaban con él» evita sobreinterpretar el grado de cercanía o participación.'
- source_word: ἐπηρώτησεν
  english_pob_choice: he asked
  chosen_spanish: les preguntó
  alternatives_spanish:
  - les preguntó a ellos
  - los interrogó
  lexicon: BDAG
  rationale: El verbo se rinde con el equivalente normal «preguntó», que expresa con naturalidad la acción de dirigir una cuestión a los discípulos.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: Se conserva el participio introductorio de habla con «diciendo», una solución fluida en español que mantiene la secuencia del original.
- source_word: Τίνα με ... λέγουσιν εἶναι
  english_pob_choice: Who ... say that I am
  chosen_spanish: ¿Quién dicen ... que soy yo?
  alternatives_spanish:
  - ¿Quién dicen las multitudes que soy?
  - ¿Quién dicen ... que yo soy?
  lexicon: BDAG
  rationale: El griego requiere una construcción idiomática en español. «Que soy yo» reproduce el contenido de la pregunta sin calco torpe y conserva la identidad implícita de Jesús.
- source_word: οἱ ὄχλοι
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las gentes
  - la gente
  lexicon: BDAG
  rationale: Se opta por «multitudes» para reflejar ὄχλοι como grupos numerosos reunidos, más preciso y menos genérico que «gente».
theological_decisions:
- issue: Tensión entre orar 'en privado/solo' y la presencia de los discípulos
  english_pob_reading: 'Render both clauses straightforwardly without harmonizing: Jesus was praying alone, and the disciples were with him.'
  chosen_spanish_reading: 'Se conservan ambas cláusulas sin armonizarlas: Jesús estaba orando en privado, y los discípulos estaban con él.'
  alternative_spanish_readings:
  - Jesús estaba orando solo, y los discípulos estaban con él
  - Jesús estaba orando aparte, mientras los discípulos estaban cerca
  rationale: El griego preserva una tensión narrativa real. La traducción no la resuelve; solo elige una formulación española que mantenga tanto el retiro de Jesús como la presencia de los discípulos.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios; el borrador sigue de cerca la lectura aprobada en inglés y mantiene la misma tensión narrativa documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando corresponde; aquí no aparece el tetragrámaton.
  - Se conserva «multitudes» para οἱ ὄχλοι, en línea con la decisión inglesa.
  - La pregunta indirecta se formula en español idiomático sin perder el contenido literal del griego.
  - «En privado» fue elegido para mantener la ambigüedad de κατὰ μόνας registrada por el audit trail.
