translation:
  language: es
  text: Y a cualquier ciudad[a] que entren, si los reciben, coman lo que les pongan delante[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los acojan» para «los reciban».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «las cosas que están siendo puestas delante de ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἣν ἂν πόλιν
  english_pob_choice: into whatever city
  chosen_spanish: en cualquier ciudad
  alternatives_spanish:
  - en toda ciudad
  - en la ciudad que sea
  lexicon: BDAG
  rationale: La construcción con relativo indefinido expresa generalidad; en español, «en cualquier ciudad» comunica bien ese valor sin sonar forzado. Mantiene la idea de entrada a una ciudad sin añadir matices no presentes en el griego.
- source_word: εἰσέρχησθε
  english_pob_choice: you enter
  chosen_spanish: entren
  alternatives_spanish:
  - entran
  - ustedes entren
  - ustedes entran
  lexicon: BDAG
  rationale: 'El imperativo-conjuntivo de la instrucción general se vierte naturalmente con subjuntivo en español dentro de la cláusula relativa: «en que entren». Conserva el sentido de movimiento hacia adentro sin sobreexplicar.'
- source_word: δέχωνται ὑμᾶς
  english_pob_choice: if they receive you
  chosen_spanish: los reciban
  alternatives_spanish:
  - los acojan
  - los acepten
  lexicon: BDAG
  rationale: «Reciban» mantiene la correspondencia lexical con δέχομαι y funciona bien en español. «Los reciban» deja abierta la posible nota de acogida sin sustituir el verbo por uno más interpretativo.
- source_word: ἐσθίετε
  english_pob_choice: eat
  chosen_spanish: coman
  alternatives_spanish:
  - coman ustedes
  - coman de ello
  lexicon: BDAG
  rationale: El imperativo plural en español es claro y directo. «Coman» reproduce la orden sin añadir perífrasis.
- source_word: τὰ παρατιθέμενα ὑμῖν
  english_pob_choice: what is set before you
  chosen_spanish: lo que les pongan delante
  alternatives_spanish:
  - lo que les sirvan
  - lo que se les ponga delante
  lexicon: BDAG
  rationale: La expresión griega describe lo puesto delante en contexto de comida. «Lo que les pongan delante» conserva la imagen concreta y la pasiva implícita mejor que una simplificación como «lo que les sirvan».
translation_notes:
  revision_awareness: El texto español sigue el pasaje griego con alta correspondencia y refleja el mismo valor general-indefinido de la cláusula inicial, la recepción positiva de los enviados y la instrucción concreta sobre comer lo presentado. Se preserva la nota de alternativa lexical de δέχομαι y la literalidad subyacente de τὰ παρατιθέμενα ὑμῖν mediante nota al pie.
  spanish_consistency_notes:
  - Se eligió «Y en cualquier ciudad» para reflejar el valor indefinido de εἰς ἣν ἂν πόλιν.
  - Se evitó «SEÑOR» u otras sustituciones teológicas porque el versículo no las contiene.
  - «Los reciban» mantiene el registro bíblico natural en español sin perder la fuerza lexical de δέχομαι.
  - La nota de pie sobre τὰ παρατιθέμενα ὑμῖν conserva la literalidad del participio pasivo y su imagen de alimentos colocados delante.
