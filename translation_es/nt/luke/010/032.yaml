translation:
  language: es
  text: De la misma manera, también un levita llegó al lugar[a], y al verlo[b], pasó de largo por el lado opuesto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘junto a ese lugar’ o ‘a ese sitio’.
    reason: lexical_alternative
  - marker: b
    text: El verbo puede traducirse simplemente ‘pasó de largo’, pero el compuesto sugiere una evitación deliberada; por eso se añade ‘por el lado opuesto’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοίως
  english_pob_choice: Likewise
  chosen_spanish: De la misma manera
  alternatives_spanish:
  - Asimismo
  - Igualmente
  lexicon: BDAG
  rationale: Conserva la relación comparativa con el ejemplo anterior y suena natural en español sin perder la fuerza de enlace discursivo.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - además
  lexicon: BDAG
  rationale: Mantiene el valor aditivo al introducir otro personaje paralelo al sacerdote.
- source_word: Λευίτης
  english_pob_choice: a Levite
  chosen_spanish: un levita
  alternatives_spanish:
  - un miembro de la tribu de Leví
  - un servidor del templo
  lexicon: BDAG
  rationale: Se conserva la designación histórica y religiosa reconocible; en español, ‘levita’ funciona como título de grupo sin añadir explicación interpretativa al texto principal.
- source_word: κατὰ τὸν τόπον
  english_pob_choice: to the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - a ese lugar
  - junto al lugar
  - hasta el lugar
  lexicon: BDAG
  rationale: La frase indica llegada a la ubicación del relato. ‘Al lugar’ refleja bien el movimiento hacia ese punto sin sobreespecificar la relación espacial.
- source_word: ἐλθὼν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - había llegado
  lexicon: BDAG
  rationale: El participio aoristo se integra de forma natural con el verbo principal del español. ‘Llegó’ expresa la llegada puntual al sitio narrado.
- source_word: ἰδὼν
  english_pob_choice: when he saw him
  chosen_spanish: al verlo
  alternatives_spanish:
  - cuando lo vio
  - y al verlo
  lexicon: BDAG
  rationale: El participio queda bien resuelto con una subordinación temporal breve y natural en español, manteniendo la secuencia narrativa.
- source_word: ἀντιπαρῆλθεν
  english_pob_choice: he passed by on the opposite side
  chosen_spanish: pasó de largo por el lado opuesto
  alternatives_spanish:
  - pasó de largo
  - pasó por el lado contrario
  lexicon: BDAG
  rationale: El compuesto sugiere no solo pasar, sino hacerlo evitando el contacto o aproximación. ‘Por el lado opuesto’ preserva esa evitación deliberada mejor que un simple ‘pasó de largo’.
theological_decisions:
- issue: Identidad social-religiosa del levita
  english_pob_reading: Levite is retained as a transliterated group designation rather than generalized.
  chosen_spanish_reading: Se mantiene ‘levita’ como designación reconocible del grupo religioso judío.
  alternative_spanish_readings:
  - servidor del templo
  - miembro de la tribu de Leví
  rationale: El texto presenta un personaje histórico concreto en paralelo con el sacerdote. Traducirlo como una función genérica reduciría la especificidad narrativa que el original conserva.
  doctrine_reference: 'Principio POB: traducir títulos y nombres con precisión histórica, sin explicar de más en el texto principal.'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la evidencia griega y con el audit trail inglés; no se detectan revisiones previas aplicables en este versículo. Se conserva la tensión lexical del verbo compuesto ἀντιπαρῆλθεν mediante una formulación que no lo reduce a un simple tránsito.
  spanish_consistency_notes:
  - Se usa ‘levita’ con minúscula por tratarse de designación de clase/rol, no de nombre propio.
  - Se evita ‘SEÑOR’ u otra sustitución no pertinente; no aparece aquí el Tetragrámaton.
  - ‘De la misma manera’ mantiene el enlace comparativo con el contexto anterior sin sobreadaptar el flujo narrativo.
  - La puntuación separa con claridad las acciones sucesivas del participio aoristo y del verbo principal.
