    rationale: 'Dice ''Literalmente: «en medio de lobos»'', pero esa formulación ya está en el texto. Si se conserva una nota lexical_alternative, debe dar una alternativa significativa, por ejemplo ''También: «entre lobos»'' o ''Literalmente, «en medio de lobos»'' solo si el texto principal dijera otra cosa.'
  - severity: low
