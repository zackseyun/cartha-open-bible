translation:
  language: es
  text: Vayan; vean, estoy enviándolos como corderos en medio de lobos.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «entre lobos».'
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones familiares dicen «ovejas entre lobos», pero aquí el griego dice específicamente «corderos».
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπάγετε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan por su camino
  - Salgan
  lexicon: BDAG
  rationale: Es un imperativo plural de envío; en español, 'Vayan' comunica con naturalidad la comisión y conserva el tono directo del mandato.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - vean
  - he aquí
  lexicon: BDAG
  rationale: La partícula llama la atención sobre lo que sigue. 'Miren' mantiene esa fuerza deíctica en español actual sin sonar arcaico como 'he aquí'.
- source_word: ἀποστέλλω
  english_pob_choice: I am sending you out
  chosen_spanish: estoy enviándolos
  alternatives_spanish:
  - los envío
  - los estoy enviando
  lexicon: BDAG
  rationale: El presente indica acción actual de envío en contexto misional. 'Estoy enviándolos' preserva la inmediatez; el pronombre enclítico evita redundancia y mantiene fluidez.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - los estoy enviando a ustedes
  lexicon: BDAG
  rationale: El plural está claro en el contexto; en español, 'los' funciona naturalmente como objeto directo plural masculino mixto o general.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - cual
  - igual que
  lexicon: BDAG
  rationale: Introduce una comparación, no una identidad. 'Como' es la equivalencia más clara y sobria en español.
- source_word: ἄρνας
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - ovejas jóvenes
  - lambes
  lexicon: BDAG
  rationale: '''Corderos'' transmite el valor de ἄρνας con naturalidad en español y conserva la imagen de vulnerabilidad; evita la generalización a ''ovejas''.'
- source_word: ἐν μέσῳ λύκων
  english_pob_choice: in the midst of wolves
  chosen_spanish: en medio de lobos
  alternatives_spanish:
  - en medio de los lobos
  - entre lobos
  lexicon: BDAG
  rationale: La frase describe un entorno hostil. 'En medio de lobos' reproduce el sentido literal y es idiomático en español; no requiere expansión.
theological_decisions:
- issue: Imagen de los discípulos como presas vulnerables
  english_pob_reading: 'Retain the simile straightforwardly: like lambs in the midst of wolves'
  chosen_spanish_reading: 'Mantener la comparación sin suavizarla: como corderos en medio de lobos'
  alternative_spanish_readings:
  - como ovejas entre lobos
  - como corderos entre lobos
  rationale: El griego usa ἄρνας ('corderos'), no el término más general para ovejas; conservar 'corderos' evita diluir la intensidad de la advertencia y respeta la forma concreta del texto.
  doctrine_reference: 'Principio de primacía del texto original: preservar la metáfora y su fuerza sin armonizarla con formulaciones familiares de otros pasajes.'
translation_notes:
  revision_awareness: 'La revisión en inglés movió la redacción desde una forma más dinámica (''Look'') hacia una más formal (''behold'') y precisó ''in the midst of''. En español se optó por un equilibrio: ''miren'' conserva la función discursiva con naturalidad, mientras ''en medio de'' reproduce con claridad la imagen espacial sin sobrecarga arcaizante.'
  spanish_consistency_notes:
  - 'Se mantuvo el plural implícito del mandato con verbos en segunda persona plural: ''Vayan'' y ''estoy enviándolos''.'
  - Se preservó la metáfora de vulnerabilidad con 'corderos' y no 'ovejas', conforme al griego.
  - Se evitó 'SEÑOR' u otras sustituciones no presentes, porque este versículo no contiene el nombre divino ni κύριος en la forma fuente dada.
