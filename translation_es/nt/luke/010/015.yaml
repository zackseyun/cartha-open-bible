translation:
  language: es
  text: Y tú, Capernaúm, ¿serás exaltada hasta el cielo? Serás bajada hasta el Hades[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al reino de los muertos». Griego «Hades», no Gehenna («infierno»).
    reason: lexical_alternative
lexical_decisions:
- source_word: Καφαρναούμ
  english_pob_choice: Capernaum
  chosen_spanish: Capernaúm
  alternatives_spanish:
  - Cafarnaúm
  lexicon: nombre propio transliterado
  rationale: Se translitera el nombre propio para mantener la referencia geográfica; «Capernaúm» conserva la forma tradicional y clara en español, mientras «Cafarnaúm» es una variante posible.
- source_word: μὴ ... ὑψωθήσῃ
  english_pob_choice: will you be exalted
  chosen_spanish: ¿serás exaltada?
  alternatives_spanish:
  - ¿serás levantada?
  - ¿vas a ser exaltada?
  lexicon: BDAG
  rationale: La pregunta retórica en griego espera una respuesta negativa; en español, la interrogación mantiene esa fuerza sin convertirla en una negación plana. «Exaltada» preserva el sentido figurado de elevación a alto rango o honor.
- source_word: ἕως οὐρανοῦ
  english_pob_choice: to heaven
  chosen_spanish: hasta el cielo
  alternatives_spanish:
  - hasta el cielo mismo
  - al cielo
  lexicon: BDAG
  rationale: «Hasta el cielo» expresa con naturalidad la extensión vertical del contraste y evita un calco innecesario, manteniendo el valor idiomático de οὐρανός en este contexto.
- source_word: ἕως τοῦ ᾅδου
  english_pob_choice: to Hades
  chosen_spanish: hasta el Hades
  alternatives_spanish:
  - hasta el reino de los muertos
  - hasta el sepulcro
  lexicon: BDAG
  rationale: Se conserva «Hades» para distinguir ᾅδης de Gehenna y no introducir la noción de castigo final donde el griego nombra el ámbito de los muertos.
- source_word: καταβιβασθήσῃ
  english_pob_choice: you will be brought down
  chosen_spanish: serás abatida
  alternatives_spanish:
  - serás derribada
  - serás llevada abajo
  lexicon: BDAG
  rationale: El pasivo futuro indica que Capernaúm será rebajada por una acción recibida; «abatida» comunica bien la idea de humillación y descenso, con un registro bíblico natural en español.
theological_decisions:
- issue: Distinción entre ᾅδης y Gehenna
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el reino de los muertos
  - el infierno
  rationale: Se mantiene el nombre propio «Hades» para preservar la distinción léxica del texto griego y evitar equiparar automáticamente ᾅδης con Gehenna o con una noción más amplia de «infierno».
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión anterior falló porque la nota [a] no estaba anclada en el texto. Aquí se coloca [a] junto a la expresión «hasta el Hades», que es el punto léxico-teológico que la nota aclara.
  spanish_consistency_notes:
  - Se mantiene el trato singular de segunda persona en la pregunta y la segunda cláusula («serás»).
  - Se conserva la secuencia de contraste ascenso/descenso con vocabulario natural en español.
  - «Hades» queda sin traducir para respetar la distinción técnica del término griego.
