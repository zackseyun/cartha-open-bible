review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: mantiene la pregunta retórica negativa implícita en μὴ ... ὑψωθήσῃ, conserva el contraste vertical entre cielo y Hades, y preserva correctamente la distinción léxica de ᾅδης frente a Gehenna mediante «Hades» con nota aclaratoria. Sin embargo, «serás abatida» comunica humillación pero atenúa el sentido espacial-pasivo de καταβιβασθήσῃ («serás bajada / hecha descender»), que en contexto contrasta explícitamente con «hasta el cielo».'
  spanish_quality_summary: 'El español es legible y digno, pero hay dos detalles mejorables: la nota [a] está colocada tras «Capernaúm» aunque su contenido explica «Hades», por lo que el anclaje es incorrecto; y «serás abatida» suena algo menos preciso que «serás hecha bajar» o «serás bajada» para el contraste cielo/Hades. Una formulación más natural y fiel en español es «serás bajada hasta el Hades».'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Hades» se mantiene correctamente en el texto principal, con alternativa «el reino de los muertos» en nota. No hay términos del glosario mayor en conflicto. El nombre del lugar puede mantenerse como «Capernaúm», aunque «Cafarnaúm» también es tradicional; no requiere cambio. La principal corrección es de anclaje de nota y de matiz verbal.'
  issues:
  - severity: medium
    issue: Marcador de nota mal anclado
    rationale: La nota [a] explica «Hades», pero el marcador aparece junto a «Capernaúm». Según las instrucciones, el marcador exacto debe aparecer en la palabra o frase relevante.
  - severity: medium
    issue: «serás abatida» debilita el contraste espacial de καταβιβασθήσῃ
    rationale: Aunque «abatida» puede expresar humillación, el verbo griego pasivo en paralelo con «hasta el cielo» enfatiza descenso forzado. «Serás bajada» o equivalente preserva mejor tanto el pasivo como la imaginería vertical.
  revised_spanish_text: Y tú, Capernaúm, ¿serás exaltada hasta el cielo? Serás bajada hasta el Hades[a].
  revised_footnotes:
  - marker: a
    text: O «al reino de los muertos». Griego «Hades», no Gehenna («infierno»).
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota al término que realmente explica («Hades») y se ajustó «serás abatida» a «serás bajada» para reflejar con más fidelidad el pasivo de καταβιβασθήσῃ y el contraste vertical con «hasta el cielo», manteniendo un español claro y natural.
