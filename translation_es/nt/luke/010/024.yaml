translation:
  language: es
  text: Porque les digo que muchos profetas y reyes desearon[a] ver lo que ustedes ven y no lo vieron, y oír lo que ustedes oyen y no lo oyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quisieron» o «anhelaron» ver lo que ustedes ven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  english_pob_choice: For I tell you
  chosen_spanish: Porque les digo
  alternatives_spanish:
  - Porque les hablo
  - Pues les digo
  lexicon: BDAG
  rationale: λέγω con dativo personal se expresa con naturalidad como «les digo». γάρ mantiene la conexión explicativa/causal con el contexto previo mediante «Porque», que es la forma más idiomática en español para ese enlace.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - gran número de
  - numerosos
  lexicon: BDAG
  rationale: El adjetivo cuantitativo se traduce de manera directa y natural con «muchos», sin intensificar innecesariamente la cifra.
- source_word: προφῆται
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - mensajeros proféticos
  lexicon: BDAG
  rationale: «Profetas» conserva el sentido bíblico establecido y no requiere ampliación.
- source_word: βασιλεῖς
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - gobernantes
  lexicon: BDAG
  rationale: Se mantiene el sentido literal de «reyes», como en la decisión inglesa, sin generalizar a «gobernantes».
- source_word: ἠθέλησαν
  english_pob_choice: desired
  chosen_spanish: desearon
  alternatives_spanish:
  - quisieron
  - anhelaron
  lexicon: BDAG
  rationale: El aoristo de θέλω admite «desearon», que preserva el tono elevado de la frase sin sobrecargarla emocionalmente.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: ver
  alternatives_spanish:
  - contemplar
  lexicon: BDAG
  rationale: El infinitivo simple se vierte con «ver», que es claro y directo en español.
- source_word: ἃ ὑμεῖς βλέπετε
  english_pob_choice: what you see
  chosen_spanish: lo que ustedes ven
  alternatives_spanish:
  - lo que ven
  - las cosas que ustedes ven
  lexicon: BDAG
  rationale: La cláusula relativa neutra se traduce idiomáticamente como «lo que ustedes ven». Se conserva el sujeto explícito «ustedes» para reflejar el contraste enfático con «muchos profetas y reyes» y evitar ambigüedad del singular impersonal español.
- source_word: οὐκ εἶδαν
  english_pob_choice: did not see it
  chosen_spanish: no lo vieron
  alternatives_spanish:
  - no vieron
  - nunca lo vieron
  lexicon: BDAG
  rationale: El aoristo negativo se traduce como hecho pasado consumado. Se añade «lo» para completar en español el objeto implícito correspondiente a la cláusula anterior, como hace la audit trail inglesa con «it».
- source_word: ἀκοῦσαι
  english_pob_choice: to hear
  chosen_spanish: oír
  alternatives_spanish:
  - escuchar
  lexicon: BDAG
  rationale: «Oír» corresponde mejor al paralelismo con «ver» y al valor básico del infinitivo aquí; «escuchar» introduciría una matización más volitiva que el griego no exige.
- source_word: ἃ ἀκούετε
  english_pob_choice: what you hear
  chosen_spanish: lo que ustedes oyen
  alternatives_spanish:
  - lo que oyen
  - las cosas que ustedes oyen
  lexicon: BDAG
  rationale: 'Se mantiene la misma estructura que en la primera cláusula: «lo que ustedes oyen». La repetición preserva el paralelismo retórico del griego.'
- source_word: οὐκ ἤκουσαν
  english_pob_choice: did not hear it
  chosen_spanish: no lo oyeron
  alternatives_spanish:
  - no oyeron
  - nunca lo oyeron
  lexicon: BDAG
  rationale: Se conserva el paralelismo con «no lo vieron». «Oyeron» refleja el verbo de percepción auditiva con el mismo nivel de literalidad que en la primera mitad del versículo.
theological_decisions:
- issue: Identidad y alcance de «profetas y reyes»
  english_pob_reading: Retain the historical categories 'prophets and kings' without interpretive expansion.
  chosen_spanish_reading: Mantener «profetas y reyes» sin ampliarlo ni reinterpretarlo.
  alternative_spanish_readings:
  - profetas y gobernantes
  - profetas y reyes del pasado
  rationale: 'El griego nombra dos categorías históricas sin glosa. La versión española conserva esa tensión: la comparación apunta a figuras reconocibles de la historia de la salvación, pero el texto no especifica más, así que no se añade explicación interpretativa.'
  doctrine_reference: Preservar la tensión histórica y teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el acuerdo de auditoría fue alto y estable, por lo que la redacción española sigue de cerca las decisiones léxicas ya aprobadas, adaptándolas a una sintaxis natural en español.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona plural con «ustedes» para reflejar ὑμεῖς/ἀκούετε y evitar la ambigüedad de «vosotros» fuera de ciertos registros.
  - Se conserva el paralelismo verbal ver/oír y la repetición de «lo que ustedes...», porque el griego estructura el versículo en dos miembros equilibrados.
  - No se introduce nota de pie porque no hay variante textual ni alternativa léxica que requiera anclaje explícito en el texto español.
