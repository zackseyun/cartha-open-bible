revisions:
- from: ¡Ay de ti[a], Corazín! ¡Ay de ti, Betsaida! Porque si en Tiro y en Sidón se hubieran hecho las obras de poder que se hicieron en ustedes, hace mucho tiempo se habrían arrepentido[b], sentados en cilicio y ceniza.
  to: ¡Ay de ti, Corazín! ¡Ay de ti, Betsaida! Porque si en Tiro y en Sidón hubieran sucedido las obras de poder[a] que sucedieron entre ustedes, hace mucho tiempo se habrían arrepentido[b], sentados en cilicio y ceniza.
  rationale: Se corrigió γίνομαι a «hubieran sucedido ... sucedieron» para reflejar mejor el valor de ocurrencia documentado en la auditoría inglesa. Se movió la nota [a] a «obras de poder», que es el término que explica. Se ajustó «en ustedes» a «entre ustedes» por naturalidad idiomática. También se mejoró la redacción de la nota [b] para que la alternativa cognitiva de μετανοέω suene natural en español, manteniendo la imagen participial.
