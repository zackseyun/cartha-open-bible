translation:
  language: es
  text: ¡Ay de ti, Corazín! ¡Ay de ti, Betsaida! Porque si en Tiro y en Sidón hubieran sucedido las obras de poder[a] que sucedieron entre ustedes, hace mucho tiempo se habrían arrepentido[b], sentados en cilicio y ceniza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «milagros»; el griego δύναμεις también puede entenderse como «obras de poder».
    reason: lexical_alternative
  - marker: b
    text: O «hace mucho tiempo habrían cambiado su manera de pensar, sentados en cilicio y ceniza».
    reason: previous_rendering
lexical_decisions:
- source_word: Οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ti!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes!
  lexicon: BDAG
  rationale: «Ay» conserva el tono profético de lamento y denuncia de οὐαί; en español bíblico es más natural que un calco como «¡Ay!» aislado, y la adición de «de ti» refleja el dativo de dirección/afectación.
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: de ti
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: BDAG
  rationale: Con una exclamación de juicio, «de ti» expresa bien la dirigencia personal del reproche en español y mantiene la fuerza directa del vocativo.
- source_word: Χοραζίν / Βηθσαϊδά
  english_pob_choice: Chorazin / Bethsaida
  chosen_spanish: Corazín / Betsaida
  alternatives_spanish:
  - Jorazín / Betsaida
  lexicon: Nombres propios transliterados
  rationale: Se usan las formas españolas habituales de los topónimos, con ortografía castellana/latina reconocible en el ámbito eclesial hispano.
- source_word: δυνάμεις
  english_pob_choice: mighty works
  chosen_spanish: obras de poder
  alternatives_spanish:
  - milagros
  - obras poderosas
  lexicon: BDAG
  rationale: «Obras de poder» conserva el valor de actos efectivos de poder divino sin reducir el término a la categoría más interpretativa de «milagros». También mantiene visible la relación con δύναμις.
- source_word: ἐγενήθησαν ... αἱ γενόμεναι
  english_pob_choice: had happened ... that happened
  chosen_spanish: se hubieran hecho ... se hicieron
  alternatives_spanish:
  - hubieran acontecido ... acontecidas
  - hubieran sucedido ... sucedidas
  lexicon: BDAG
  rationale: La repetición de γίνομαι se refleja con verbos de ocurrencia en español. «Hacerse» resulta natural en este contexto y permite conservar la idea de hechos reales sin introducir un agente explícito que el griego no enfatiza aquí.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: en ustedes
  alternatives_spanish:
  - entre ustedes
  - en medio de ustedes
  lexicon: BDAG
  rationale: En español, «en ustedes» reproduce de manera directa la esfera plural del pronombre y evita una paráfrasis más expansiva. Aquí no se fuerza «entre», aunque sería posible por el sentido.
- source_word: πάλαι
  english_pob_choice: long ago
  chosen_spanish: hace mucho tiempo
  alternatives_spanish:
  - desde hace mucho
  - mucho antes
  lexicon: BDAG
  rationale: «Hace mucho tiempo» expresa con claridad el valor temporal de πάλαι en una construcción contrafactual, con fluidez natural en español.
- source_word: ἐν σάκκῳ καὶ σποδῷ
  english_pob_choice: in sackcloth and ashes
  chosen_spanish: sentados en cilicio y ceniza
  alternatives_spanish:
  - en cilicio y ceniza
  - sentándose en cilicio y ceniza
  lexicon: BDAG
  rationale: «Cilicio y ceniza» preserva la imagen bíblica convencional de duelo y arrepentimiento. Se eligió «sentados» para reflejar el participio καθήμενοι, evitando perder el gesto corporal explícito.
- source_word: καθήμενοι
  english_pob_choice: sitting
  chosen_spanish: sentados
  alternatives_spanish:
  - sentándose
  - estando sentados
  lexicon: BDAG
  rationale: El participio expresa una postura concreta asociada con luto/penitencia; «sentados» la reproduce de forma idiomática y concisa.
- source_word: μετενόησαν
  english_pob_choice: would have repented
  chosen_spanish: se habrían arrepentido
  alternatives_spanish:
  - habrían cambiado de pensamiento
  - se habrían vuelto
  lexicon: BDAG
  rationale: «Arrepentirse» es el equivalente español más estable para μετανοέω en este contexto de respuesta moral y espiritual. Se conserva el valor contrafactual con el pluscuamperfecto de subjuntivo.
theological_decisions:
- issue: Valor de δυνάμεις en un contexto de reproche profético
  english_pob_reading: Rendered as 'mighty works' rather than the more interpretive 'miracles.'
  chosen_spanish_reading: «Obras de poder» en el texto principal, evitando «milagros» como simplificación interpretativa.
  alternative_spanish_readings:
  - milagros
  - obras poderosas
  rationale: El griego destaca hechos de poder; mantener «obras de poder» deja visible la fuerza del término sin cerrarlo a una categoría técnica posterior. Esto conserva la tensión entre acto y poder que la nota inglesa ya documenta.
  doctrine_reference: Translation philosophy §1, §5
- issue: Imagen concreta de duelo y arrepentimiento
  english_pob_reading: Kept the concrete imagery 'sitting in sackcloth and ashes' in the main text.
  chosen_spanish_reading: Se conserva la imagen con «sentados en cilicio y ceniza».
  alternative_spanish_readings:
  - se habrían arrepentido en cilicio y ceniza
  - habrían mostrado arrepentimiento con cilicio y ceniza
  rationale: La construcción participial no se abstrae a una mera idea de tristeza interior; la escena corporal y pública forma parte del peso profético del verso. Mantenerla ayuda a preservar el tono de juicio y humillación ritual.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el auditor inglés de alta concordancia. Se adopta «obras de poder» para δυνάμεις, conforme a la nota léxica del inglés, y se conserva la imagen corporal de duelo. No se introducen cambios doctrinales ni se suaviza el juicio profético.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Arrepentirse» se usa para μετανοέω en sentido moral-espiritual, coherente con el estilo POB.
  - Los topónimos se adaptan a formas españolas estándar y legibles para audiencia eclesial.
  - Se conserva el paralelismo y la duplicación de la denuncia («¡Ay de ti…! ¡Ay de ti…!») para reflejar la cadencia griega.
