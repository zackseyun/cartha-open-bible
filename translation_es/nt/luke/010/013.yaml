base_translation:
  language: en
  yaml_path: translation/nt/luke/010/013.yaml
  text: Woe to you[a], Chorazin! Woe to you, Bethsaida! For if the mighty works that happened among you had happened in Tyre and Sidon, long ago they would have repented[b], sitting in sackcloth and ashes.
