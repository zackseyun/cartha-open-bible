translation:
  language: es
  text: Todas las cosas me han sido entregadas por mi Padre[a], y nadie conoce quién es el Hijo sino el Padre, y quién es el Padre sino el Hijo y aquel a quien el Hijo quiera revelarlo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo ha sido entregado a mí por mi Padre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y aquel a quien el Hijo quiera revelarlo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  english_pob_choice: All things
  chosen_spanish: Todas las cosas
  alternatives_spanish:
  - Todo
  - Todo lo
  lexicon: BDAG
  rationale: El plural neutro abarca de manera total; "Todas las cosas" conserva la amplitud y el tono solemne mejor que una forma más resumida.
- source_word: παρεδόθη
  english_pob_choice: have been handed over
  chosen_spanish: han sido entregadas
  alternatives_spanish:
  - fueron entregadas
  - me fueron confiadas
  lexicon: BDAG
  rationale: '"Entregadas" reproduce el sentido básico de παραδίδωμι sin suavizarlo hacia "confiadas". El perfecto compuesto español expresa un acto ya realizado con efecto vigente.'
- source_word: ὑπὸ τοῦ πατρός μου
  english_pob_choice: by my Father
  chosen_spanish: por mi Padre
  alternatives_spanish:
  - de mi Padre
  lexicon: BDAG
  rationale: ὑπό con genitivo marca agente en pasiva; en español, "por" expresa esa agencia de manera natural y precisa.
- source_word: γινώσκει
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - reconoce
  lexicon: BDAG
  rationale: '"Conoce" mantiene el matiz relacional de γινώσκω mejor que "sabe" en este paralelismo entre Padre e Hijo.'
- source_word: τίς ἐστιν ὁ υἱὸς
  english_pob_choice: who the Son is
  chosen_spanish: quién es el Hijo
  alternatives_spanish:
  - cuál es la identidad del Hijo
  lexicon: BDAG
  rationale: La construcción interrogativa se vuelve más natural en español como "quién es el Hijo" y preserva el valor personal del título.
- source_word: ὁ υἱός
  english_pob_choice: the Son
  chosen_spanish: el Hijo
  alternatives_spanish:
  - el hijo
  lexicon: BDAG
  rationale: En este contexto cristológico es un título, no un hijo cualquiera; por eso se capitaliza como "Hijo".
- source_word: ὁ πατήρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el padre
  lexicon: BDAG
  rationale: También es un título relacional definido por el contexto; "Padre" conserva el paralelismo y la referencia.
- source_word: ᾧ ἐὰν βούληται ὁ υἱὸς ἀποκαλύψαι
  english_pob_choice: anyone to whom the Son chooses to reveal him
  chosen_spanish: aquel a quien el Hijo quiera revelarlo
  alternatives_spanish:
  - a quien el Hijo desee revelarlo
  - a quien el Hijo quiera darlo a conocer
  lexicon: BDAG
  rationale: La cláusula expresa un destinatario indefinido condicionado por la voluntad del Hijo. "Quiera" traduce βούληται sin debilitar su fuerza decisiva; "revelarlo" conserva el objeto implícito, el Padre, a partir del contexto inmediato.
theological_decisions:
- issue: Conocimiento recíproco exclusivo entre Padre e Hijo
  english_pob_reading: Retained the straightforward wording of unique reciprocal knowledge without expansion.
  chosen_spanish_reading: Se mantiene la formulación simple de conocimiento exclusivo y recíproco, sin añadir intensificadores.
  alternative_spanish_readings:
  - nadie conoce plenamente quién es el Hijo
  - solo el Padre conoce de verdad al Hijo y viceversa
  rationale: El griego afirma una exclusividad real en el conocimiento entre Padre e Hijo, pero no usa un adverbio equivalente a "plenamente". La traducción conserva la tensión teológica en el propio texto sin sobreexplicarla.
  doctrine_reference: Cristología nicena; preservar la tensión teológica sin resolverla por paráfrasis
- issue: Voluntad del Hijo al revelar al Padre
  english_pob_reading: Rendered βούληται as 'chooses' without softening or systematizing the statement.
  chosen_spanish_reading: Se traduce βούληται con "quiera" para expresar voluntad decisiva sin rebajar la agencia del Hijo.
  alternative_spanish_readings:
  - quiera
  - decida
  - quiera dar a conocer
  rationale: El texto presenta al Hijo como quien determina la revelación del Padre. "Quiera" mantiene esa soberanía volitiva en español con naturalidad, sin convertirla en una explicación doctrinal posterior.
  doctrine_reference: Cristología nicena; primacía del texto original sobre la tradición de traducción
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios; este borrador sigue ese acuerdo alto y no introduce expansiones interpretativas nuevas.
  spanish_consistency_notes:
  - Se usa "Hijo" y "Padre" con mayúscula como títulos relacionales en el contexto cristológico.
  - Se prefirió "conoce" para γινώσκει y no "sabe", para conservar el matiz relacional del pasaje.
  - Se mantuvo "revelarlo" con objeto implícito referido al Padre, siguiendo la sintaxis inmediata del griego y del inglés POB.
  - Se evitó la sustitución por "SEÑOR" u otra convención de ocultamiento del nombre divino, porque aquí el texto habla de Padre/Hijo y no de κύριος como sustituto del nombre.
