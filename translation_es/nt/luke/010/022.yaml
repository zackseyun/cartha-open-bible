  glossary_alignment: No hay conflictos con la terminología del proyecto. Los títulos cristológicos “Padre” e “Hijo” están bien mantenidos. No aparecen términos sensibles del glosario general como Yahvé/Mesías/esclavo. La decisión sobre βούληται como “quiera” concuerda con la racionalidad documentada.
