review_pass:
  verdict: revise
  source_alignment_summary: El borrador español transmite bien la estructura prohibitiva del griego y mantiene con fidelidad los tres objetos prohibidos más la orden de no saludar a nadie durante el trayecto. Sin embargo, «bolsa» para βαλλάντιον queda demasiado genérico en español y pierde el matiz de bolsa para dinero que el texto fuente y la auditoría inglesa preservan explícitamente.
  spanish_quality_summary: 'La redacción es natural y clara: «No lleven… y no saluden a nadie por el camino» suena idiomático y digno. «Alforja» y «sandalias» funcionan bien. La mejora necesaria es precisar el primer sustantivo para evitar ambigüedad innecesaria en español; «bolsa de dinero» es más fiel y sigue siendo legible.'
  glossary_alignment: No hay términos del glosario mayor en juego aquí. Las decisiones «alforja» para πήρα, «sandalias» para ὑποδήματα y «saluden» para ἀσπάσησθε son consistentes con la evidencia y con la filosofía POB. La nota actual sobre «monedero» ya reconoce correctamente que βαλλάντιον es una bolsa para dinero, lo que confirma que el texto principal debería reflejarlo mejor.
  issues:
  - severity: medium
    issue: «Bolsa» para βαλλάντιον es demasiado amplia en el texto principal.
    rationale: El griego se refiere específicamente a una bolsa para dinero. La traducción inglesa auditada escogió «money bag» precisamente para no dejarlo genérico. En español, «bolsa» por sí sola puede referirse a cualquier bolsa y no preserva suficientemente el referente léxico.
  - severity: low
    issue: La nota léxica queda parcialmente redundante si el texto principal se corrige.
    rationale: Si se usa «bolsa de dinero» en el texto principal, la alternativa «monedero» puede mantenerse como nota, pero conviene reformularla como alternativa estilística y no como aclaración necesaria del significado básico.
  revised_spanish_text: No lleven bolsa de dinero[a], ni alforja, ni sandalias, y no saluden a nadie por el camino.
