translation:
  language: es
  text: No lleven bolsa de dinero[a], ni alforja, ni sandalias, y no saluden a nadie por el camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «monedero».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: βαστάζετε
  english_pob_choice: carry
  chosen_spanish: lleven
  alternatives_spanish:
  - carguen
  - traigan
  lexicon: BDAG
  rationale: βαστάζω aquí se refiere a llevar consigo algo durante el viaje. En español, «lleven» expresa de manera natural la prohibición de portar provisiones sin volverlo pesado o arcaico.
- source_word: βαλλάντιον
  english_pob_choice: money bag
  chosen_spanish: bolsa
  alternatives_spanish:
  - bolsa de dinero
  - monedero
  lexicon: BDAG
  rationale: El término designa una bolsa para dinero. Como en español «bolsa de dinero» suena explicativa y más larga, se eligió «bolsa» en el texto principal, con nota para aclarar que se trata de una bolsa para dinero.
- source_word: πήραν
  english_pob_choice: travel bag
  chosen_spanish: alforja
  alternatives_spanish:
  - bolsa de viaje
  - morral
  lexicon: BDAG
  rationale: πήρα es una bolsa para llevar provisiones en el camino. «Alforja» comunica bien esa idea en español bíblico contemporáneo y es suficientemente comprensible; conserva el matiz funcional de un saco de viaje.
- source_word: ὑποδήματα
  english_pob_choice: sandals
  chosen_spanish: sandalias
  alternatives_spanish:
  - calzado
  - zapatos
  lexicon: BDAG
  rationale: ὑπόδημα se refiere al calzado, a menudo sandalias en el contexto mediterráneo antiguo. «Sandalias» es la correspondencia más fiel y concreta para el contexto histórico.
- source_word: μηδένα
  english_pob_choice: no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - a nadie en absoluto
  - a ninguna persona
  lexicon: BDAG
  rationale: μηδένα funciona como objeto del saludo prohibido. En español, «a nadie» es la forma más natural y directa para transmitir la universalidad de la prohibición.
- source_word: κατὰ τὴν ὁδόν
  english_pob_choice: along the road
  chosen_spanish: por el camino
  alternatives_spanish:
  - a lo largo del camino
  - en el camino
  lexicon: BDAG
  rationale: La expresión idiomática señala el trayecto, no una vía específica. «Por el camino» suena natural en español y preserva la imagen concreta del desplazamiento.
- source_word: ἀσπάσησθε
  english_pob_choice: greet
  chosen_spanish: saluden
  alternatives_spanish:
  - den saludo
  - saluden cordialmente
  lexicon: BDAG
  rationale: ἀσπάζομαι significa saludar o dar el saludo. «Saluden» conserva la acción sin introducir una paráfrasis explicativa en el texto principal.
theological_decisions:
- issue: Fuerza de la prohibición de saludar durante el viaje
  english_pob_reading: greet no one along the road, with the likely cultural nuance that ordinary greetings could take time and delay the mission.
  chosen_spanish_reading: no saluden a nadie por el camino
  alternative_spanish_readings:
  - no se detengan a saludar a nadie por el camino
  - no den saludos a nadie en el camino
  rationale: La frase principal mantiene el imperativo directo del griego sin suavizarlo. La posible implicación cultural —que los saludos podían extenderse y retrasar la misión— se preserva implícitamente en el tono, sin convertirla en paráfrasis del texto principal.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the direct force of the source while allowing note-level clarification.'
translation_notes:
  revision_awareness: 'El pasaje coincide estrechamente con el audit trail inglés: se mantuvo la secuencia prohibitiva, el matiz funcional de los objetos de viaje y la directividad del saludo. No hubo revisiones aplicadas en el registro de referencia, y el veredicto de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se prefirió «alforja» para πήρα por su claridad y resonancia bíblica sin caer en arcaísmo excesivo.
  - «Por el camino» conserva el valor idiomático de κατὰ τὴν ὁδόν con español natural.
  - Se evitó «SEÑOR» o terminología eclesiástica no pertinente; el versículo no contiene nombres divinos ni títulos cristológicos.
  - La nota sobre la bolsa aclara la referencia monetaria sin sobrecargar el texto principal.
