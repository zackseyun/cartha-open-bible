translation:
  language: es
  text: 'En cualquier casa[a] en que entren, digan primero: «Paz a esta casa»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión griega introduce una relativa indefinida: también puede traducirse «en la casa que sea en la que entren» o «a cualquier casa que entren».'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «Paz sea a esta casa» o «Paz sobre esta casa». El griego es una fórmula breve de bendición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἣν δ’ ἂν
  english_pob_choice: Into whatever
  chosen_spanish: En la casa que sea a la que entren
  alternatives_spanish:
  - En cualquier casa en la que entren
  - Adondequiera que entren
  lexicon: BDAG
  rationale: La construcción griega introduce una relativa indefinida con valor de “cualquiera que”. En español, “en la casa que sea a la que entren” conserva la indefinición y el sentido direccional del movimiento hacia una casa concreta, sin volver la frase artificialmente calcada.
- source_word: εἰσέλθητε
  english_pob_choice: you enter
  chosen_spanish: entren
  alternatives_spanish:
  - entren a
  - entren dentro de
  lexicon: BDAG
  rationale: El verbo expresa la acción de entrar en la casa; en español, el subjuntivo presente encaja con la relativa indefinida y mantiene el valor general/futuro de la cláusula.
- source_word: οἰκίαν
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - vivienda
  lexicon: BDAG
  rationale: “Casa” conserva el referente concreto del lugar que se entra y sigue de cerca la imagen del texto. “Hogar” o “vivienda” desplazarían el matiz hacia lo familiar o técnico.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - ante todo
  - en primer lugar
  lexicon: BDAG
  rationale: 'Marca prioridad secuencial: lo primero que deben hacer al entrar es pronunciar la bendición. “Primero” es claro, natural y preciso.'
- source_word: λέγετε
  english_pob_choice: say
  chosen_spanish: digan
  alternatives_spanish:
  - digan ustedes
  - pronuncien
  lexicon: BDAG
  rationale: El imperativo plural pide una orden de pronunciación. “Digan” es la opción más natural en español y conserva el carácter de fórmula verbal prescrita.
- source_word: Εἰρήνη
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - Paz haya
  - Que haya paz
  lexicon: BDAG
  rationale: La fórmula nominativa funciona como bendición/greeting. “Paz” preserva la concisión y el sabor semítico de la expresión, sin añadir una estructura verbal que el griego no explicita.
- source_word: τῷ οἴκῳ τούτῳ
  english_pob_choice: to this house
  chosen_spanish: a esta casa
  alternatives_spanish:
  - sobre esta casa
  - para esta casa
  lexicon: BDAG
  rationale: El dativo señala el destinatario de la bendición. “A esta casa” es la equivalencia más directa y natural en español; “sobre” reflejaría una interpretación posible, pero menos transparente como traducción básica.
theological_decisions:
- issue: Naturaleza de la fórmula de paz
  english_pob_reading: 'Render as a spoken blessing/greeting: ''Peace to this house.'''
  chosen_spanish_reading: 'Renderizarla como una bendición pronunciada: «Paz a esta casa».'
  alternative_spanish_readings:
  - «Que haya paz en esta casa»
  - «Paz sobre esta casa»
  rationale: El mandato no describe un simple saludo cordial, sino una fórmula verbal de bendición. La traducción elegida conserva la brevedad performativa del griego y evita convertirla en una paráfrasis devocional más larga de lo que el texto exige.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren cambios de sentido. La principal decisión en español es hacer natural la relativa indefinida sin perder el valor direccional de εἰς y mantener la fórmula de paz como bendición concisa.
  spanish_consistency_notes:
  - Se mantuvo «casa» de forma consistente para οἰκία / οἶκος, porque aquí ambos términos apuntan al mismo referente concreto dentro de la bendición.
  - Se evitó «SEÑOR» y otros equivalentes no pertinentes, ya que el versículo no contiene referencia al nombre divino.
  - Se conservó el tono imperativo plural en «digan», acorde con el mandato dirigido a los discípulos.
