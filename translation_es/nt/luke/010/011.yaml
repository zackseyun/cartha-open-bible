translation:
  language: es
  text: 'Aun el polvo de su ciudad que se nos había pegado a los pies[a], nos lo limpiamos de los pies contra ustedes[b]. Sin embargo, sepan esto: el reino de Dios se ha acercado[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de nuestros pies». El giro griego es idiomático y describe el polvo de su ciudad como adherido a los pies de los mensajeros.
    reason: lexical_alternative
  - marker: b
    text: Muchas traducciones ponen «lo sacudimos», pero el verbo griego aquí significa más específicamente «limpiar» o «quitar» el polvo, no simplemente «sacudirlo».
    reason: lexical_alternative
  - marker: c
    text: O «se ha aproximado». El perfecto griego indica una cercanía que ya ha llegado y permanece vigente.
    reason: lexical_alternative
lexical_decisions:
- source_word: κονιορτὸν
  english_pob_choice: dust
  chosen_spanish: polvo
  alternatives_spanish:
  - tierra
  - suciedad
  lexicon: BDAG
  rationale: κονιορτός designa polvo; «polvo» es la equivalencia natural en español y conserva el valor simbólico del gesto.
- source_word: κολληθέντα
  english_pob_choice: clung
  chosen_spanish: se nos había pegado
  alternatives_spanish:
  - se había adherido
  - se nos había adherido
  - había quedado pegado
  lexicon: BDAG
  rationale: El participio expresa adhesión cercana. «Se nos había pegado» comunica bien esa idea en español y mantiene el matiz de algo adherido a los pies.
- source_word: ἐκ τῆς πόλεως ὑμῶν
  english_pob_choice: from your city
  chosen_spanish: de su ciudad
  alternatives_spanish:
  - de vuestra ciudad
  - de la ciudad de ustedes
  lexicon: BDAG
  rationale: «De su ciudad» expresa el origen de forma idiomática en español latinoamericano neutro y preserva el referente plural de ὑμῶν.
- source_word: εἰς τοὺς πόδας
  english_pob_choice: on our feet
  chosen_spanish: a los pies
  alternatives_spanish:
  - sobre los pies
  - en los pies
  lexicon: BDAG
  rationale: La frase griega es idiomática y describe el polvo adherido a los pies. «A los pies» conserva la imagen sin forzar un giro poco natural en español.
- source_word: ἀπομασσόμεθα
  english_pob_choice: we wipe off
  chosen_spanish: lo sacudimos
  alternatives_spanish:
  - lo limpiamos
  - lo frotamos
  - lo quitamos
  lexicon: BDAG
  rationale: Aunque el audit trail inglés favorece «wipe off», en español «sacudir el polvo» es la expresión más natural y comunica el gesto de quitar el polvo con suficiente fidelidad contextual; se evita un calco rígido que sonaría artificial.
- source_word: ὑμῖν
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: BDAG
  rationale: El dativo tiene fuerza adversativa/testimonial en el contexto. «Contra ustedes» preserva esa orientación hostil o judicial en español.
- source_word: πλήν
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  lexicon: BDAG
  rationale: La conjunción introduce una fuerte transición que matiza el acto de juicio con una exhortación adicional. «Sin embargo» funciona de manera clara y digna en español.
- source_word: γινώσκετε
  english_pob_choice: know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - tengan esto por seguro
  lexicon: BDAG
  rationale: El imperativo plural pide reconocimiento. «Sepan» es natural, directo y fiel al valor exhortativo del griego.
- source_word: ἤγγικεν
  english_pob_choice: has come near
  chosen_spanish: se ha acercado
  alternatives_spanish:
  - ha llegado cerca
  - está cerca
  - se ha aproximado
  lexicon: BDAG
  rationale: El perfecto expresa una cercanía ya establecida con vigencia actual. «Se ha acercado» comunica la proximidad consumada sin resolver la tensión escatológica.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el reino de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la formulación estándar y clara en español; mantiene la terminología bíblica tradicional sin perder transparencia.
theological_decisions:
- issue: Gesto de sacudir el polvo como testimonio de juicio
  english_pob_reading: A symbolic act of testimony and judgment against the rejecting city
  chosen_spanish_reading: Un gesto simbólico de rechazo y testimonio contra la ciudad que no recibe el mensaje
  alternative_spanish_readings:
  - Un acto meramente higiénico o de viaje
  - Una simple despedida sin valor judicial
  rationale: «Contra ustedes» conserva la fuerza adversativa/testimonial indicada por el contexto missional. La formulación española no diluye el gesto en una acción práctica sin significado teológico.
  doctrine_reference: Translation philosophy §1, §3
- issue: Neareza del reino de Dios
  english_pob_reading: The kingdom of God has drawn near in the mission and message of Jesus' envoys, even where it is rejected
  chosen_spanish_reading: El reino de Dios se ha acercado en el anuncio de los enviados, con vigencia presente aunque sea rechazado
  alternative_spanish_readings:
  - El reino de Dios está por llegar
  - El reino de Dios ya está consumado
  rationale: El perfecto griego mantiene una nearness con efecto continuo. «Se ha acercado» preserva esa tensión entre llegada y cercanía vigente sin cerrar prematuramente el sentido escatológico.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Tomé en cuenta la revisión del texto inglés que integró mejor la relación entre el polvo y los pies, evitando una sintaxis española que separara artificialmente esa imagen. También atendí el estado final sin cambios del último pase y mantuve la tensión lexical entre el gesto físico y su fuerza testimonial.
  spanish_consistency_notes:
  - Usé «reino de Dios» de forma consistente con la terminología POB estándar para βασιλεία τοῦ θεοῦ.
  - Elegí «se ha acercado» para ἤγγικεν, manteniendo la cercanía perfecta sin traducirlo como consumación plena.
  - Opté por «contra ustedes» para ὑμῖν para conservar la fuerza adversativa señalada en el audit trail.
  - Mantengo un español neutro y eclesialmente readable, evitando calcos como «wipe off» traducido de manera demasiado literal.
