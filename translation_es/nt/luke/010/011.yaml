  glossary_alignment: '«Dios» y «reino de Dios» están bien alineados con la terminología del proyecto. No hay términos de glosario mayores en conflicto. La principal desalineación es léxica: el proyecto y el audit trail para ἀπομασσόμεθα favorecen el campo semántico de «limpiar/quitar» en lugar de «sacudir».'
