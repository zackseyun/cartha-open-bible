translation:
  language: es
  text: Después de estas cosas, el Señor designó también a otros setenta y dos[a], y los envió de dos en dos delante de él, a toda ciudad y lugar adonde él mismo estaba por ir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «setenta» en lugar de «setenta y dos».
    reason: textual_variant
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Luego de estas cosas
  lexicon: BDAG
  rationale: Mantiene la transición temporal plural del griego y suena natural en español bíblico contemporáneo.
- source_word: ἀνέδειξεν
  english_pob_choice: appointed
  chosen_spanish: designó
  alternatives_spanish:
  - nombró
  - escogió
  lexicon: BDAG
  rationale: Ἀνέδειξεν expresa una designación para una tarea o función; «designó» conserva esa fuerza sin sobrecargar con matices eclesiásticos.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: Sigue el uso establecido para κύριος en este contexto, referido a Jesús, sin ocultar el título.
- source_word: ἑτέρους ἑβδομήκοντα δύο
  english_pob_choice: seventy-two others also
  chosen_spanish: otros setenta y dos
  alternatives_spanish:
  - otros setenta
  - setenta y dos otros
  lexicon: BDAG
  rationale: «Otros» refleja ἑτέρους y «setenta y dos» sigue la lectura del texto base griego. Se conserva el orden natural del español.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: los envió
  alternatives_spanish:
  - los mandó
  - los despachó
  lexicon: BDAG
  rationale: «Envió» reproduce bien ἀπέστειλεν en una comisión de misión y mantiene el tono sobrio del pasaje.
- source_word: ἀνὰ δύο δύο
  english_pob_choice: two by two
  chosen_spanish: de dos en dos
  alternatives_spanish:
  - en parejas
  - dos por dos
  lexicon: BDAG
  rationale: La expresión distributiva se vierte de forma idiomática en español con «de dos en dos», preservando la repetición enfática.
- source_word: πρὸ προσώπου αὐτοῦ
  english_pob_choice: ahead of him
  chosen_spanish: delante de él
  alternatives_spanish:
  - por delante de él
  - ante su presencia
  lexicon: BDAG
  rationale: «Delante de él» comunica de manera natural la idea de ir en avance de su llegada, sin perder el matiz espacial.
- source_word: εἰς πᾶσαν πόλιν καὶ τόπον
  english_pob_choice: into every town and place
  chosen_spanish: a toda ciudad y lugar
  alternatives_spanish:
  - a cada ciudad y lugar
  - a toda villa y sitio
  lexicon: BDAG
  rationale: Se conserva la pareja léxica πόλιν / τόπον. «Ciudad» y «lugar» son literales; «toda» en español captura bien πᾶσαν.
- source_word: οὗ ἤμελλεν αὐτὸς ἔρχεσθαι
  english_pob_choice: where he himself was about to go
  chosen_spanish: adonde él mismo estaba por ir
  alternatives_spanish:
  - donde él mismo iba a ir
  - adonde él mismo pensaba ir
  lexicon: BDAG
  rationale: «Estaba por ir» refleja μέλλω + infinitivo con sentido de inminencia. «Él mismo» conserva el énfasis de αὐτός. «Adonde» expresa bien destino/traslado.
theological_decisions:
- issue: 'Número de los enviados: setenta y dos vs. setenta'
  english_pob_reading: seventy-two, with a footnote noting the variant seventy
  chosen_spanish_reading: setenta y dos, con nota sobre la variante «setenta»
  alternative_spanish_readings:
  - setenta
  - setenta y dos
  rationale: La lectura del texto base es ἑβδομήκοντα δύο. Como «setenta» es una variante textual significativa y conocida, la nota preserva la tensión textual sin sustituir indebidamente la lectura principal.
  doctrine_reference: Preservar variantes textuales reales en nota cuando no afectan una doctrina, pero sí el texto.
translation_notes:
  revision_awareness: Se siguió de cerca la lectura griega SBLGNT y el audit trail en inglés. No hubo revisiones aplicadas en el registro fuente; la redacción española se ajusta a la misma decisión textual y a la misma filosofía de equivalencia óptima.
  spanish_consistency_notes:
  - Se conservó «el Señor» como título para κύριος en coherencia con el proyecto y con el contexto lucano.
  - Se evitó «Cristo» porque el verso no usa Χριστός.
  - Se prefirió «de dos en dos» por ser la equivalencia idiomática más transparente de ἀνὰ δύο δύο.
  - La nota textual se ancló al número para mantener visible la variante sin cargar el cuerpo principal del versículo.
