translation:
  language: es
  text: 'Jesús respondió: «Cierto hombre iba descendiendo de Jerusalén a Jericó, y cayó entre ladrones, quienes lo despojaron, lo golpearon y se fueron, dejándolo medio muerto».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑπολαβὼν δὲ ... εἶπεν
  english_pob_choice: replied
  chosen_spanish: respondió
  alternatives_spanish:
  - repuso
  - contestó
  lexicon: BDAG
  rationale: La secuencia introduce una respuesta de Jesús dentro del relato. «Respondió» comunica de forma natural en español la fuerza reactiva de ὑπολαβών δὲ εἶπεν, sin caer en un calco como «tomando la palabra, dijo».
- source_word: Ἄνθρωπός τις
  english_pob_choice: A certain man
  chosen_spanish: Un hombre cierto
  alternatives_spanish:
  - Un hombre
  - Una persona cierta
  lexicon: BDAG
  rationale: Ἄνθρωπος es masculino singular, y τις añade indefinición narrativa. «Un hombre cierto» conserva esa indefinición con un matiz narrativo parecido al inglés «a certain man», aunque suena más marcado que «un hombre».
- source_word: κατέβαινεν
  english_pob_choice: was going down
  chosen_spanish: iba descendiendo
  alternatives_spanish:
  - descendía
  - iba bajando
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso. «Iba descendiendo» preserva el aspecto progresivo y la dirección topográfica desde Jerusalén hacia Jericó.
- source_word: ἀπὸ Ἰερουσαλὴμ εἰς Ἰεριχὼ
  english_pob_choice: from Jerusalem to Jericho
  chosen_spanish: de Jerusalén a Jericó
  alternatives_spanish:
  - desde Jerusalén hasta Jericó
  - de Jerusalén hacia Jericó
  lexicon: BDAG
  rationale: La preposición de origen y la de destino se expresan de manera directa en español sin añadir más que lo requerido por el griego.
- source_word: λῃσταῖς
  english_pob_choice: robbers
  chosen_spanish: ladrones
  alternatives_spanish:
  - salteadores
  - bandidos
  lexicon: BDAG
  rationale: λῃστής apunta a asaltantes violentos. «Ladrones» es el equivalente más claro y natural en español para un contexto de asalto; «salteadores» sería más preciso pero menos inmediato para lectores generales.
- source_word: περιέπεσεν
  english_pob_choice: fell among
  chosen_spanish: cayó en manos de
  alternatives_spanish:
  - se encontró con
  - cayó entre
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «cayó entre/encima de», en español la locución «cayó en manos de» transmite bien la idea de caer bajo el poder de asaltantes sin forzar una imagen extraña.
- source_word: ἐκδύσαντες αὐτόν
  english_pob_choice: stripped him
  chosen_spanish: lo despojaron
  alternatives_spanish:
  - lo desnudaron
  - le quitaron la ropa
  lexicon: BDAG
  rationale: El verbo significa quitarle las vestiduras y, por implicación, despojarlo de lo que llevaba. «Lo despojaron» conserva la violencia y permite abarcar más que solo la ropa, algo coherente con el ataque narrado.
- source_word: πληγὰς ἐπιθέντες
  english_pob_choice: beat him
  chosen_spanish: lo golpearon
  alternatives_spanish:
  - le dieron golpes
  - lo apalearon
  lexicon: BDAG
  rationale: La expresión idiomática describe infligir golpes. «Lo golpearon» es el equivalente directo y sobrio en español; «apalearon» sería más coloquial y más fuerte de lo necesario.
- source_word: ἀπῆλθον
  english_pob_choice: went away
  chosen_spanish: se fueron
  alternatives_spanish:
  - partieron
  - se marcharon
  lexicon: BDAG
  rationale: Verbo narrativo simple de salida. «Se fueron» es natural y no sobretraduce el movimiento.
- source_word: ἀφέντες ἡμιθανῆ
  english_pob_choice: leaving him half dead
  chosen_spanish: dejándolo medio muerto
  alternatives_spanish:
  - dejándolo medio muerto de vida
  - dejándolo casi muerto
  lexicon: BDAG
  rationale: Ἡμιθανής se traduce literalmente como «medio muerto». En español, «medio muerto» comunica bien el estado extremo de gravedad sin perder la fuerza expresiva del original. Se evita suavizarlo con «casi muerto» porque sería menos vívido.
theological_decisions:
- issue: El estatus del narrador y la fórmula introductoria de Jesús
  english_pob_reading: Jesus replied
  chosen_spanish_reading: Jesús respondió
  alternative_spanish_readings:
  - Jesús replicó
  - Jesús contestó
  rationale: 'No hay carga doctrinal especial, pero sí una decisión de tono: la respuesta de Jesús queda presentada como parte del intercambio narrativo, sin añadir solemnidad ni arcaísmo.'
  doctrine_reference: Narrative discourse
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó el «also» antes de «stripped him» por innecesario. En español no se añadió ningún equivalente; la secuencia verbal se mantiene directa y sin adición enfática superflua. La decisión para λῃσταῖς sigue la línea del audit trail inglés: un término claro y natural que conserva la violencia del contexto.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se conserva la progresión narrativa del imperfecto con «iba descendiendo».
  - No se introduce «Mesías», «SEÑOR» ni terminología doctrinal no presente en el verso.
  - «Medio muerto» preserva la fuerza de ἡμιθανῆ sin suavización interpretativa.
