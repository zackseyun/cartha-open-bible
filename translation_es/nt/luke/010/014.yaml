translation:
  language: es
  text: Pero para Tiro y Sidón será más soportable en el juicio que para ustedes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más tolerable».
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: Introduce un contraste fuerte con lo dicho antes. «Pero» conserva bien esa fuerza en español actual sin sonar excesivamente formal.
- source_word: Τύρῳ καὶ Σιδῶνι
  english_pob_choice: for Tyre and Sidon
  chosen_spanish: para Tiro y Sidón
  alternatives_spanish:
  - a Tiro y Sidón
  - en cuanto a Tiro y Sidón
  lexicon: BDAG
  rationale: El dativo con el comparativo expresa a favor de quién sería la condición más llevadera; en español, «para Tiro y Sidón» comunica de forma natural esa relación comparativa.
- source_word: ἀνεκτότερον
  english_pob_choice: more bearable
  chosen_spanish: más soportable
  alternatives_spanish:
  - más tolerable
  - más llevadero
  - más endurable
  lexicon: BDAG
  rationale: El término compara lo que puede soportarse. «Más soportable» es claro, natural y mantiene la idea de capacidad de resistencia sin suavizar la fuerza del comparativo.
- source_word: ἔσται
  english_pob_choice: it will be
  chosen_spanish: será
  alternatives_spanish:
  - va a ser
  - estará
  lexicon: BDAG
  rationale: La forma futura copulativa se expresa de manera directa con «será», que suena natural y fiel al valor verbal del griego.
- source_word: ἐν τῇ κρίσει
  english_pob_choice: in the judgment
  chosen_spanish: en el juicio
  alternatives_spanish:
  - en el juicio final
  - en el juicio venidero
  lexicon: BDAG
  rationale: «Juicio» conserva el sentido de κρίσις sin añadir más de lo que el texto dice. La referencia escatológica queda abierta por el contexto, como en el inglés auditado.
- source_word: ἢ ὑμῖν
  english_pob_choice: than for you
  chosen_spanish: que para ustedes
  alternatives_spanish:
  - que para vosotros
  - que para ti
  lexicon: BDAG
  rationale: El español requiere explicitar el segundo término de la comparación. «Que para ustedes» mantiene el contraste y es adecuado para un registro neutral latinoamericano.
theological_decisions:
- issue: Alcance de κρίσις
  english_pob_reading: the judgment refers to the final or eschatological judgment
  chosen_spanish_reading: «el juicio» deja abierta, sin resolverla, la referencia al juicio escatológico que el contexto sugiere
  alternative_spanish_readings:
  - «el juicio final»
  - «el juicio venidero»
  rationale: El contexto apunta a una evaluación divina futura de las ciudades impenitentes. No obstante, el griego solo dice «el juicio»; por eso la traducción conserva esa expresión y no explicita más allá de lo que el texto obliga.
  doctrine_reference: Preservar la tensión teológica del texto y no ampliar indebidamente el alcance del original
- issue: Relación comparativa con las ciudades gentiles
  english_pob_reading: more bearable for Tyre and Sidon than for you
  chosen_spanish_reading: más soportable para Tiro y Sidón que para ustedes
  alternative_spanish_readings:
  - más tolerable para Tiro y Sidón que para ustedes
  rationale: La comparación no absuelve a Tiro y Sidón; solo afirma que su situación sería menos severa que la de los oyentes. «Más soportable» mantiene esa tensión comparativa sin interpretarla de más.
  doctrine_reference: Mantener la comparación moral/judicial sin atenuar la advertencia de Jesús
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en la estructura adversativa, el comparativo de ἀνεκτότερον y la lectura de κρίσις como juicio escatológico sin explicitarla en exceso. No se aplicaron revisiones posteriores en el material fuente.
  spanish_consistency_notes:
  - Se usó «Tiro y Sidón» de forma consistente con la toponimia bíblica habitual en español.
  - Se prefirió «juicio» antes que «condenación» para no desplazar el sentido de κρίσις.
  - El tono es formal y bíblicamente legible, pero evita arcaísmos innecesarios.
