revisions:
- from: ¡Mira![a] Te he dado la autoridad de pisar serpientes y escorpiones, y sobre todo el poder del enemigo[b]; y nada os hará daño en absoluto.
  to: ¡Miren![a] Les he dado la autoridad de pisar serpientes y escorpiones, y sobre todo el poder del enemigo, y nada les hará daño en absoluto[b].
  rationale: 'Se corrige la concordancia plural del destinatario, se adapta el registro a un español neutro más amplio, y se reubica la nota b en la cláusula que realmente comenta. La revisión mantiene las decisiones léxicas clave del POB: «autoridad» frente a «poder», imagen literal de «serpientes y escorpiones», y «el enemigo» sin sobreidentificarlo.'
