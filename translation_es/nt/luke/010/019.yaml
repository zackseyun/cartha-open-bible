translation:
  language: es
  text: ¡Miren![a] Les he dado la autoridad de pisar serpientes y escorpiones, y sobre todo el poder del enemigo, y nada les hará daño en absoluto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí». También puede traducirse «Miren» o «Vean»; se conserva aquí la fuerza de llamado de atención del marcador discursivo.
    reason: lexical_alternative
  - marker: b
    text: O «nada los dañará jamás» o «de ningún modo nada les hará daño». El griego usa una negación doble enfática.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδού
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Miren!
  - He aquí
  lexicon: BDAG
  rationale: Mantiene la fuerza de llamado de atención del marcador discursivo. En español, «¡Mira!» comunica mejor la interpelación inmediata que una fórmula más arcaica, sin perder el énfasis.
- source_word: δέδωκα
  english_pob_choice: I have given
  chosen_spanish: Te he dado
  alternatives_spanish:
  - Les he dado
  - He dado
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción cumplida con efecto presente. «Te/les he dado» conserva ese valor mejor que un pretérito simple o un presente.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: la autoridad
  alternatives_spanish:
  - el derecho
  - el poder
  lexicon: BDAG
  rationale: «Autoridad» preserva la distinción léxica respecto de δύναμις más adelante, evitando confundir la autoridad delegada con la capacidad o fuerza.
- source_word: τοῦ πατεῖν
  english_pob_choice: to tread
  chosen_spanish: de pisar
  alternatives_spanish:
  - de andar sobre
  - de hollar
  lexicon: BDAG
  rationale: El infinitivo articular expresa finalidad o contenido de la autoridad concedida. «De pisar» es natural en español y conserva la imagen sin intensificarla innecesariamente.
- source_word: ἐπάνω ὄφεων καὶ σκορπίων
  english_pob_choice: on snakes and scorpions
  chosen_spanish: serpientes y escorpiones
  alternatives_spanish:
  - víboras y escorpiones
  - serpientes y alacranes
  lexicon: BDAG
  rationale: Se mantiene la imaginería literal del griego. «Serpientes» es más transparente en español bíblico general; «escorpiones» conserva el paralelismo. La opción de «alacranes» es idiomática en algunas regiones, pero «escorpiones» es más amplia y consistente.
- source_word: ἐπὶ πᾶσαν τὴν δύναμιν
  english_pob_choice: over all the power
  chosen_spanish: sobre todo el poder
  alternatives_spanish:
  - contra todo el poder
  - sobre toda la fuerza
  lexicon: BDAG
  rationale: «Sobre» reproduce la noción de superioridad o dominio en contexto. «Todo el poder» refleja πᾶσαν τὴν δύναμιν y conserva la fuerza semántica de δύναμις.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - potencia
  lexicon: BDAG
  rationale: «Poder» es el equivalente más natural en español para δύναμις y mantiene el contraste con ἐξουσίαν («autoridad»).
- source_word: τοῦ ἐχθροῦ
  english_pob_choice: the enemy
  chosen_spanish: del enemigo
  alternatives_spanish:
  - del adversario
  lexicon: BDAG
  rationale: Se conserva el singular personalizador del texto sin identificarlo explícitamente en la traducción. «Enemigo» es claro y no sobreespecifica más allá del griego.
- source_word: οὐδὲν ... οὐ μὴ ἀδικήσῃ
  english_pob_choice: nothing will ever harm you
  chosen_spanish: nada os hará daño en absoluto
  alternatives_spanish:
  - nada os dañará
  - nada os lesionará en absoluto
  lexicon: BDAG
  rationale: La doble negación enfática se vierte con «en absoluto» para conservar la intensidad de οὐ μή. «Hará daño» es más idiomático y natural que «injuriará», aunque la raíz de ἀδικέω puede abarcar daño, injuria o agravio.
theological_decisions:
- issue: Referente de «el enemigo»
  english_pob_reading: Rendered generically as 'the enemy' without identifying Satan in the main text.
  chosen_spanish_reading: Se mantiene «el enemigo» sin nombrar a Satanás en el cuerpo principal.
  alternative_spanish_readings:
  - Satanás
  - el diablo
  rationale: El contexto inmediato sugiere oposición satánica, pero el griego dice solo «el enemigo». La traducción conserva esa amplitud y evita introducir una identificación no explícita en el versículo.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
- issue: Imagen literal de «serpientes y escorpiones»
  english_pob_reading: Retained the literal imagery in the main text.
  chosen_spanish_reading: Se conserva la imagen literal de serpientes y escorpiones.
  alternative_spanish_readings:
  - Una metáfora de fuerzas demoníacas
  - Una imagen mixta literal-simbólica
  rationale: El nivel léxico del griego es literal; aunque el contexto puede permitir una lectura simbólica o representativa, la traducción no debe cerrarla de antemano.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: El inglés POB y la revisión más reciente coinciden en lectura y filosofía general; no se detectan cambios sustantivos pendientes. Se mantiene la distinción entre «autoridad» y «poder», la referencia genérica a «el enemigo» y la fuerza enfática de la negación final.
  spanish_consistency_notes:
  - Se conserva la distinción léxica entre ἐξουσία («autoridad») y δύναμις («poder»).
  - «Mira» funciona como equivalente natural de ἰδού sin diluir el énfasis.
  - La nota sobre la negación final preserva la intensificación de οὐ μή en español.
  - «Serpientes» y «escorpiones» retienen la imagen del texto sin reinterpretarla en la línea principal.
