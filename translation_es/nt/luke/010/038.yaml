translation:
  language: es
  text: Ahora, mientras ellos iban de camino, él entró en una aldea, y una mujer llamada Marta lo recibió[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «lo acogió» o «lo recibió con hospitalidad». El verbo griego puede implicar una recepción cortesana u hospitalaria, no solo un saludo breve.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ τῷ πορεύεσθαι αὐτοὺς
  english_pob_choice: Now as they were traveling along
  chosen_spanish: Ahora, mientras ellos iban de camino
  alternatives_spanish:
  - Mientras iban de camino
  - Y mientras ellos viajaban
  lexicon: BDAG
  rationale: La construcción con ἐν + infinitivo articular expresa acción simultánea; en español, «mientras» comunica bien esa concomitancia. «Ahora» conserva el matiz discursivo ligero de δέ para enlazar la narración sin recargarla.
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - Jesús
  - mismo
  lexicon: BDAG
  rationale: El pronombre es enfático en griego, distinguiendo a Jesús del grupo plural. En español, «él» basta en contexto para mantener la referencia sin introducir una explicitación interpretativa innecesaria.
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - entró en
  - se metió en
  lexicon: BDAG
  rationale: El aoristo de εἰσέρχομαι se rinde naturalmente con «entró». La preposición siguiente ya expresa el destino, por lo que no hace falta sobredeterminar el movimiento.
- source_word: εἰς κώμην τινά
  english_pob_choice: a certain village
  chosen_spanish: en una aldea
  alternatives_spanish:
  - en cierta aldea
  - en un pueblo
  lexicon: BDAG
  rationale: κώμη se refiere a una aldea o poblado pequeño; «aldea» mantiene mejor la diferencia frente a términos más amplios como «pueblo» o «villa». τινά aporta indefinición; en español, el artículo indefinido ya la comunica con suficiente naturalidad, sin forzar «cierta».
- source_word: γυνὴ δέ τις
  english_pob_choice: and a woman
  chosen_spanish: y una mujer
  alternatives_spanish:
  - pero una mujer
  - ahora una mujer
  - y cierta mujer
  lexicon: BDAG
  rationale: δέ introduce un nuevo personaje con avance narrativo suave. «Y una mujer» es idiomático y preserva la introducción indefinida sin endurecerla con «cierta», que en español sonaría menos natural aquí.
- source_word: ὀνόματι Μάρθα
  english_pob_choice: named Martha
  chosen_spanish: llamada Marta
  alternatives_spanish:
  - de nombre Marta
  - que se llamaba Marta
  lexicon: BDAG
  rationale: El dativo idiomático se expresa de forma natural con «llamada Marta». La transliteración sigue el nombre propio corriente en español bíblico.
- source_word: ὑπεδέξατο
  english_pob_choice: welcomed him
  chosen_spanish: lo recibió
  alternatives_spanish:
  - lo acogió
  - lo recibió con hospitalidad
  - lo hospedó
  lexicon: BDAG
  rationale: ὑποδέχομαι puede implicar recibir hospitalariamente como huésped. En este versículo, la hospitalidad es clara por contexto, pero el griego no obliga a explicitar «en su casa». «Lo recibió» conserva la amplitud semántica y evita añadir información no presente en el texto base.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a Jesús; «lo» es la forma natural y concisa en español.
translation_notes:
  revision_awareness: 'El texto fuente griego y la auditoría inglesa concuerdan en una lectura narrativa sencilla: un marco temporal concomitante, la entrada de Jesús en una aldea indeterminada y la recepción hospitalaria de Marta. Se evitó la expansión inglesa «into her home», ya que fue retirada en la revisión y no está en el griego.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» solo en la nota, no en el texto principal, porque el griego usa el pronombre enfático y el contexto ya identifica al referente.
  - «Aldea» conserva el valor de κώμη mejor que «pueblo» en este contexto narrativo.
  - El verbo principal queda en un registro claro y sobrio («lo recibió»), coherente con el matiz hospitable señalado por la auditoría sin sobreinterpretar el lugar.
