translation:
  language: es
  text: 'Y curen a los enfermos que hay en ella, y díganles: «El reino de Dios se ha acercado[a] a ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha llegado cerca de ustedes» o «se ha aproximado a ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: θεραπεύετε
  english_pob_choice: heal
  chosen_spanish: sanen
  alternatives_spanish:
  - curen
  - atiendan
  lexicon: BDAG
  rationale: El imperativo presente pide una acción continua. En español, «sanen» conserva el sentido de curar con naturalidad bíblica y directa; «curen» también es posible, pero aquí puede sonar algo más técnico, y «atiendan» amplía demasiado el campo semántico.
- source_word: τοὺς ἐν αὐτῇ ἀσθενεῖς
  english_pob_choice: the sick in it
  chosen_spanish: a los enfermos que hay en ella
  alternatives_spanish:
  - a los que están enfermos en ella
  - a los débiles que hay en ella
  lexicon: BDAG
  rationale: En este contexto misional, ἀσθενεῖς apunta primariamente a enfermedad física, en paralelo con θεραπεύετε. «Enfermos» preserva esa lectura; «que hay en ella» expresa con claridad que ἐν αὐτῇ remite a la ciudad/pueblo mencionado antes. «Debiles» sería más amplio y menos preciso aquí.
- source_word: λέγετε αὐτοῖς
  english_pob_choice: say to them
  chosen_spanish: díganles
  alternatives_spanish:
  - háblenles
  - díganlo a ellos
  lexicon: BDAG
  rationale: La forma imperativa directa se expresa con naturalidad en español como «díganles». Mantiene la sencillez del verbo λέγω sin agregar matices interpretativos.
- source_word: Ἤγγικεν
  english_pob_choice: has come near
  chosen_spanish: se ha acercado
  alternatives_spanish:
  - ha llegado cerca
  - está cerca
  lexicon: BDAG
  rationale: El perfecto indica una cercanía lograda con relevancia presente. «Se ha acercado» comunica bien ese aspecto en español y evita reducir el sentido a una mera ubicación estática como «está cerca».
- source_word: ἐφ’ ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - sobre ustedes
  - contra ustedes
  lexicon: BDAG
  rationale: En esta fórmula de anuncio positivo, la preposición expresa relación de llegada respecto de los oyentes. «A ustedes» es idiomático y evita la dureza de «sobre ustedes», sin introducir la idea errónea de hostilidad de «contra ustedes».
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el dominio de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» conserva la expresión bíblica establecida en español y sigue de cerca la forma del original. «Reinado de Dios» explicita el aspecto dinámico, pero es menos idiomático y puede estrechar el campo semántico.
theological_decisions:
- issue: Alcance de la proclamación del reino
  english_pob_reading: The proclamation announces God's saving reign as having drawn near in the mission of Jesus' messengers, without specifying a fully realized or exclusively future eschatology.
  chosen_spanish_reading: La proclamación anuncia que el reino de Dios ha llegado en cercanía a los oyentes, sin resolver aquí si su cumplimiento es plenamente presente o todavía futuro.
  alternative_spanish_readings:
  - El reino ya está plenamente presente
  - El reino solo está por venir
  rationale: El perfecto Ἤγγικεν expresa una cercanía real y efectiva, pero el versículo no obliga a cerrar la tensión escatológica. La traducción mantiene esa apertura al conservar una formulación de cercanía lograda, no una identificación total ni una espera meramente futura.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el audit trail inglés: se mantiene el imperativo de sanidad, la referencia local de ἐν αὐτῇ, la sencillez de λέγετε αὐτοῖς y la tensión aspectual de Ἤγγικεν. No se requirieron revisiones respecto del análisis base.'
  spanish_consistency_notes:
  - Se usó «reino de Dios» de forma consistente con la terminología bíblica estándar y con el audit trail.
  - Se evitó «SEÑOR» o sustituciones no motivadas, porque el texto no contiene el nombre divino explícito.
  - La nota al pie en español conserva la alternativa léxica relevante para Ἤγγικεν sin sobrecargar el texto principal.
  - «A ustedes» se eligió por claridad y naturalidad, manteniendo la dirección relacional del original.
