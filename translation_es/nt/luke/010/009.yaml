    issue: La nota al pie está anclada en «enfermos» pero corresponde a Ἤγγικεν / «se ha acercado».
    rationale: El English POB marca la alternativa léxica en la expresión verbal de cercanía, no en «the sick». En español, dejarla en «enfermos» induce a pensar que la variante afecta a ἀσθενεῖς.
  - severity: medium
    issue: El contenido de la nota repite la lectura principal en vez de ofrecer una alternativa real.
    rationale: La nota actual dice «O “se ha acercado a ustedes”», idéntica al texto principal. Debe reflejar una alternativa española genuina para el perfecto Ἤγγικεν, paralela al inglés «has drawn near to you».
  - severity: low
    issue: «Sanen» es aceptable, pero «curen» representa con más precisión el acto de θεραπεύετε en este contexto.
    rationale: En español bíblico general, «curar a los enfermos» suena más idiomático y más directamente transitivo para la acción mandada; «sanar» también funciona, pero puede sonar menos natural aquí.
  revised_spanish_text: 'Y curen a los enfermos que hay en ella, y díganles: «El reino de Dios se ha acercado[a] a ustedes».'
