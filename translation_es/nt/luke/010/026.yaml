translation:
  language: es
  text: 'Y le dijo a él: «¿Qué está escrito en la Ley? ¿Cómo lo lees[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿Cómo lo interpretas?». El griego dice más literalmente, «¿Cómo lo lees?», y puede incluir el sentido de entendimiento o interpretación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: And he
  chosen_spanish: Y él
  alternatives_spanish:
  - Pero él
  - Entonces él
  lexicon: BDAG
  rationale: δέ es una partícula conectiva suave; en español, «Y» mantiene el flujo narrativo sin forzar contraste. El sujeto se sobreentiende por el verbo, pero puede expresarse con naturalidad como «él» en la introducción de la cita.
- source_word: εἶπεν πρὸς αὐτόν
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo a él
  - le respondió
  lexicon: BDAG
  rationale: La construcción con πρός + acusativo marca el destinatario directo. En español, el dativo «le» es la forma más natural y precisa para este diálogo.
- source_word: Ἐν τῷ νόμῳ
  english_pob_choice: in the Law
  chosen_spanish: en la Ley
  alternatives_spanish:
  - en la ley
  - en la Torá
  lexicon: BDAG
  rationale: Aquí νόμος se refiere al cuerpo escritural y normativo de Israel. «Ley» con mayúscula preserva esa referencia reconocible sin introducir «Torá» en el texto principal.
- source_word: τί γέγραπται
  english_pob_choice: What is written
  chosen_spanish: ¿Qué está escrito?
  alternatives_spanish:
  - ¿Qué ha sido escrito?
  - ¿Qué queda escrito?
  lexicon: BDAG
  rationale: El perfecto pasivo subraya el estado escrito del texto. «Está escrito» es la fórmula natural en español bíblico y conserva ese valor de permanencia textual.
- source_word: πῶς ἀναγινώσκεις
  english_pob_choice: How do you read it
  chosen_spanish: ¿Cómo lo lees?
  alternatives_spanish:
  - ¿Cómo lo interpretas?
  - ¿Cómo lo entiendes?
  lexicon: BDAG
  rationale: ἀναγινώσκω significa primariamente «leer». Mantener «lo lees» conserva el sentido léxico directo y deja abierta, sin resolverla, la posible resonancia de comprensión o interpretación.
theological_decisions:
- issue: Sentido de νόμος en la pregunta de Jesús
  english_pob_reading: Law as the recognized scriptural law given to Israel, rendered 'the Law'
  chosen_spanish_reading: La Ley como el cuerpo normativo y escritural reconocido por Israel
  alternative_spanish_readings:
  - la Torá
  - ley en sentido genérico
  rationale: En este contexto, Jesús apela a la autoridad escritural compartida por un experto de la Ley. «La Ley» transmite esa referencia de forma clara y auditable, sin estrecharla innecesariamente ni volverla genérica.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Alcance de πῶς ἀναγινώσκεις
  english_pob_reading: Retain the literal 'How do you read it?'
  chosen_spanish_reading: Conservar la pregunta literal «¿Cómo lo lees?»
  alternative_spanish_readings:
  - ¿Cómo lo interpretas?
  - ¿Cómo lo entiendes?
  rationale: El verbo griego habla de leer, aunque el contexto permita una implicación de entendimiento. La traducción literal preserva la apertura retórica del pasaje y evita resolver la pregunta a favor de una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios y el pasaje recibió verificación de alta concordancia; no se requieren ajustes por revisiones posteriores.
  spanish_consistency_notes:
  - Se mantiene «Ley» con mayúscula como equivalente de νόμος en este contexto jurídico-escritural.
  - Se preserva el valor literal de ἀναγινώσκω con «lees», evitando introducir una interpretación en el texto principal.
  - La sintaxis española usa el dativo natural «le» para πρός αὐτόν, sin perder la dirección del habla.
