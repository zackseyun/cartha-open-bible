translation:
  language: es
  text: Y si allí hay un hijo de paz[a], su paz reposará sobre él; pero si no, volverá a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'persona de paz', es decir, alguien receptivo al mensaje portador de paz.
    reason: lexical_alternative
lexical_decisions:
- source_word: υἱὸς εἰρήνης
  english_pob_choice: a son of peace
  chosen_spanish: un hijo de paz
  alternatives_spanish:
  - una persona de paz
  - un hombre de paz
  - alguien receptivo al mensaje de paz
  lexicon: BDAG
  rationale: Conserva el idiomatismo semítico y la forma masculina singular del griego. 'Hijo de paz' es transparente en español y mantiene la textura del original; por eso se deja en el texto principal, con una alternativa más inclusiva en nota.
- source_word: ἐπαναπαήσεται
  english_pob_choice: will rest upon
  chosen_spanish: reposará sobre
  alternatives_spanish:
  - descansará sobre
  - se asentará sobre
  - quedará sobre
  lexicon: BDAG
  rationale: El verbo expresa la idea de posarse, descansar o quedarse sobre alguien. 'Reposará sobre' suena natural en español y conserva la imagen de una paz que permanece sobre la persona.
- source_word: ἡ εἰρήνη ὑμῶν
  english_pob_choice: your peace
  chosen_spanish: vuestra paz
  alternatives_spanish:
  - la paz que ustedes anuncian
  - su paz
  - la bendición de paz que ustedes pronuncian
  lexicon: BDAG
  rationale: La construcción posesiva del griego se mantiene de modo directo. 'Vuestra paz' preserva la referencia a la paz expresada por los discípulos, sin explicitar de más que se trata de una fórmula de saludo o bendición.
- source_word: μήγε
  english_pob_choice: if not
  chosen_spanish: si no
  alternatives_spanish:
  - si en verdad no
  - de lo contrario
  - si no es así
  lexicon: BDAG
  rationale: La combinación intensifica la condición negativa. 'Si no' es la equivalencia natural y clara en español, sin perder la función condicional reforzada.
- source_word: ἀνακάμψει
  english_pob_choice: it will return
  chosen_spanish: volverá
  alternatives_spanish:
  - retornará
  - volverá hacia atrás
  - regresará
  lexicon: BDAG
  rationale: El verbo significa volver o retroceder. 'Volverá' comunica el retorno de la paz de manera natural en español y conserva la imagen del movimiento de regreso.
- source_word: ἐφ’ ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a vosotros
  alternatives_spanish:
  - sobre vosotros
  - hacia vosotros
  - de nuevo sobre vosotros
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente 'sobre vosotros', con 'volverá' el español pide un complemento de dirección más natural. 'A vosotros' mantiene el sentido de regreso sin forzar la sintaxis.
- source_word: καὶ ἐὰν ⸂ᾖ ἐκεῖ⸃
  english_pob_choice: And if ... is there
  chosen_spanish: Y si allí hay
  alternatives_spanish:
  - Y si está allí
  - Y si allí se encuentra
  - Y si allí hubiera
  lexicon: BDAG
  rationale: Mantiene la apertura condicional y el énfasis locativo de ἐκεῖ. 'Allí hay' resulta claro y sobrio en español, sin añadir matices irreales.
theological_decisions:
- issue: Tratamiento del idiomático masculino υἱὸς εἰρήνης
  english_pob_reading: Retain 'son of peace' in the main text
  chosen_spanish_reading: Mantener 'hijo de paz' en el texto principal
  alternative_spanish_readings:
  - persona de paz
  - persona pacífica
  rationale: Se conserva el singular masculino del griego y la transparencia del modismo semítico. La nota ofrece una alternativa inclusiva para lectores que deseen una formulación más idiomática en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal junto al término al que corresponde. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo la segunda persona plural 'vuestra/vosotros' para corresponder al griego ὑμῶν/ὑμᾶς.
  - '''Paz'' se usa de forma consistente para εἰρήνη en ambos ocurrencias.'
  - No se suavizó el idiomatismo 'hijo de paz' fuera del texto principal; la alternativa inclusiva quedó solo en nota.
