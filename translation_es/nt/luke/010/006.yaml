    issue: 'Registro pronominal no neutral: ''vuestra ... vosotros'''
    rationale: El encargo pide español neutral latinoamericano / ampliamente legible en iglesia. El uso de 'vuestra/vosotros' introduce un sabor peninsular y rompe la naturalidad para el público meta, sin respaldo en el griego ni en el POB inglés.
  - severity: low
    issue: Alternativa posible 'está allí' frente a 'allí hay'
    rationale: El griego ᾖ ἐκεῖ admite tanto una formulación existencial como locativa. 'Hay' no es infiel, pero 'si allí hay un hijo de paz' puede sonar un poco más rígido. No es un error y no requiere cambio obligatorio.
  revised_spanish_text: Y si allí hay un hijo de paz[a], su paz reposará sobre él; pero si no, volverá a ustedes.
