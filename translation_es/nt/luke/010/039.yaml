translation:
  language: es
  text: Y tenía una hermana llamada María[a], que también se sentó a los pies de Jesús y escuchaba su palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «el Señor» en lugar de «Jesús».
    reason: textual_variant
lexical_decisions:
- source_word: τῇδε
  english_pob_choice: she
  chosen_spanish: tenía
  alternatives_spanish:
  - ella tenía
  - y ella tenía
  lexicon: BDAG
  rationale: El demostrativo femenino deíctico retoma a la mujer mencionada en el contexto inmediato; en español, una construcción con verbo en tercera persona como «tenía» resulta natural y evita un pronombre explícito innecesario. La relación anafórica se entiende por el contexto.
- source_word: ἀδελφὴ
  english_pob_choice: sister
  chosen_spanish: hermana
  alternatives_spanish:
  - hermana carnal
  lexicon: BDAG
  rationale: Término de parentesco directo y claro. «Hermana» es la equivalencia natural y exacta en español.
- source_word: καλουμένη Μαριάμ
  english_pob_choice: called Mary
  chosen_spanish: llamada María
  alternatives_spanish:
  - nombrada María
  - de nombre María
  lexicon: BDAG
  rationale: El participio introduce el nombre propio de la persona. «Llamada María» conserva bien el valor del griego y suena natural en español.
- source_word: παρακαθεσθεῖσα πρὸς τοὺς πόδας
  english_pob_choice: sat at ... feet
  chosen_spanish: se sentó a los pies
  alternatives_spanish:
  - se sentó junto a los pies
  - se acomodó a los pies
  lexicon: BDAG
  rationale: La expresión idiomática española «a los pies de» comunica correctamente la postura de discípula y evita una paráfrasis excesiva. Mantiene la imagen del texto griego.
- source_word: τοῦ Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: de Jesús
  alternatives_spanish:
  - del Señor
  lexicon: BDAG
  rationale: El texto griego aquí lee Ἰησοῦς, por lo que la forma directa es «Jesús». Se evita introducir «el Señor» en el texto principal porque esa lectura no corresponde a este testimonio base, aunque existe como variante textual en la tradición manuscrita.
- source_word: ἤκουεν
  english_pob_choice: was listening
  chosen_spanish: escuchaba
  alternatives_spanish:
  - estaba escuchando
  - oía
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua. «Escuchaba» transmite naturalmente esa continuidad en español sin sonar forzado.
- source_word: τὸν λόγον αὐτοῦ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su enseñanza
  - su mensaje
  lexicon: BDAG
  rationale: «Palabra» conserva el alcance de λόγος sin reducirlo prematuramente a «enseñanza» o «mensaje». En español bíblico es claro y fiel.
theological_decisions:
- issue: 'Lectura textual en la frase final: nombre de Jesús o título "el Señor"'
  english_pob_reading: Jesus
  chosen_spanish_reading: Jesús
  alternative_spanish_readings:
  - el Señor
  rationale: La base griega proporcionada dice τοῦ Ἰησοῦ, por lo que el texto principal debe reflejar «Jesús». Se conserva la posibilidad de la variante con «el Señor» únicamente como nota textual, sin desplazar la lectura principal del testimonio base.
  doctrine_reference: 'DOCTRINE.md: preservar variantes textuales significativas; no sustituir el nombre propio atestiguado por un título no sustentado por el texto base'
- issue: Imperfecto verbal en ἤκουεν y su valor aspectual
  english_pob_reading: was listening
  chosen_spanish_reading: escuchaba
  alternative_spanish_readings:
  - estaba escuchando
  - oyó
  rationale: El imperfecto presenta una acción en curso. «Escuchaba» comunica continuidad de modo natural en español y evita la idea de acción puntual que tendría «oyó».
  doctrine_reference: 'DOCTRINE.md: reflejar valores aspectuales cuando afectan el sentido narrativo'
translation_notes:
  revision_awareness: El borrador inglés de trabajo pasó de «the Lord’s» a «Jesus’» al revisarse el testimonio griego; la forma española sigue esa revisión y no adopta el título en el texto principal. También se mantuvo el imperfecto narrativo con un verbo español continuo («escuchaba») para preservar el aspecto verbal.
  spanish_consistency_notes:
  - Se conserva «Jesús» para Ἰησοῦς y no se introduce «Cristo» ni «Señor» en el texto principal.
  - «A los pies de» mantiene la imagen discipular del griego sin explicitarla más de lo debido.
  - «Palabra» se usa de forma consistente para λόγος cuando el contexto es la enseñanza hablada de Jesús.
