review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: Marta está distraída por mucho servicio, se acerca, se dirige a Jesús como «Señor», formula una queja y pide que María la ayude. Sin embargo, «con mucho servicio» suena poco idiomático en español en este contexto doméstico, y la nota alternativa con «hacer el servicio» introduce una expresión ambigua o regional que puede sugerir otra cosa distinta del simple servir doméstico.'
  spanish_quality_summary: 'El texto es claro y mayormente natural, pero puede mejorarse en fluidez y registro bíblico moderno. «ocupada con mucho servir» refleja mejor el valor de περὶ πολλὴν διακονίαν en español natural que «con mucho servicio». El resto del verso funciona bien: «se acercó», «Señor», «¿no te importa...?», «Dile, pues», y «que me ayude» son claros y fieles.'
  glossary_alignment: No hay conflictos con la terminología doctrinal principal. Κύριε → «Señor» está bien aplicado a Jesús. διακονία no debe sonar a «ministerio» aquí; conviene una formulación española más idiomática para servicio doméstico. No hay términos del glosario mayor que requieran cambio.
  issues:
  - severity: medium
    issue: «con mucho servicio» es poco idiomático en español
    rationale: Aunque semánticamente cercano, en español suena rígido y menos natural para una escena doméstica. El griego apunta a mucha actividad de servir; «ocupada con mucho servir» o similar comunica mejor el sentido.
  - severity: medium
    issue: La nota «hacer el servicio» puede ser ambigua o regional
    rationale: En varios contextos hispanos, «hacer el servicio» no suena natural aquí o puede sugerir otros sentidos. Una alternativa más segura es «hacer todo el servicio» o «servir yo sola».
