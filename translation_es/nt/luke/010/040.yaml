revisions:
- from: 'Pero Marta estaba distraída con mucho servicio. Y ella se acercó y dijo[a]: «Señor, ¿no te importa que mi hermana me haya dejado sola para servir? Dile, pues, que me ayude».'
  to: 'Pero Marta estaba distraída, ocupada con mucho servir. Y se acercó y dijo[a]: «Señor, ¿no te importa que mi hermana me haya dejado sola para servir? Dile, pues, que me ayude».'
  rationale: Se ajusta la expresión de διακονία para un español más natural y fiel al contexto doméstico, evitando «con mucho servicio», que suena forzado. También se mejora la nota alternativa para evitar la ambigüedad de «hacer el servicio». No hace falta una revisión doctrinal ni una adjudicación compleja.
