translation:
  language: es
  text: 'Y al día siguiente[a], sacando dos denarios, se los dio al posadero y le dijo: «Cuida de él, y todo lo que gastes de más, yo te lo pagaré cuando regrese».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un denario era una moneda romana de plata estándar, aproximadamente el salario de un día para un trabajador.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπὶ τὴν αὔριον
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - a la mañana siguiente
  lexicon: BDAG
  rationale: La expresión griega es temporal e idiomática para el día posterior. «Al día siguiente» conserva el valor temporal sin sonar forzado en español.
- source_word: ἐκβαλών
  english_pob_choice: taking out
  chosen_spanish: sacando
  alternatives_spanish:
  - sacando fuera
  - sacando de su bolsa
  lexicon: BDAG
  rationale: El participio describe que extrae dinero de lo que lleva consigo. «Sacando» comunica bien la acción concreta sin dar al verbo un matiz excesivamente violento como el valor literal de «echar fuera».
- source_word: δύο δηνάρια
  english_pob_choice: two denarii
  chosen_spanish: dos denarios
  alternatives_spanish:
  - dos monedas de denario
  - dos días de salario
  lexicon: BDAG
  rationale: El griego nombra la moneda directamente; «denarios» preserva el término histórico y monetario con fidelidad, sin convertirlo en paráfrasis interpretativa.
- source_word: τῷ πανδοχεῖ
  english_pob_choice: to the innkeeper
  chosen_spanish: al mesonero
  alternatives_spanish:
  - al posadero
  - al encargado de la posada
  lexicon: BDAG
  rationale: El término designa a la persona que atiende el alojamiento. «Mesonero» es natural en español y mantiene la idea de quien está a cargo del lugar; no se traduce como el edificio mismo.
- source_word: Ἐπιμελήθητι αὐτοῦ
  english_pob_choice: Take care of him
  chosen_spanish: Cuida de él
  alternatives_spanish:
  - Atiéndelo
  - Encárgate de él
  lexicon: BDAG
  rationale: El imperativo expresa atención y cuidado diligente. «Cuida de él» refleja el mandato con claridad, cercanía y fuerza exhortativa.
- source_word: ὅ τι ἂν προσδαπανήσῃς
  english_pob_choice: whatever more you spend
  chosen_spanish: todo lo que gastes de más
  alternatives_spanish:
  - cualquier gasto adicional que hagas
  - lo que gastes además de esto
  lexicon: BDAG
  rationale: La construcción expresa cualquier gasto adicional e indefinido. «Todo lo que gastes de más» conserva la idea de exceso o añadido, con un español natural.
- source_word: ἐν τῷ ἐπανέρχεσθαί με
  english_pob_choice: when I return
  chosen_spanish: cuando regrese
  alternatives_spanish:
  - al volver
  - cuando vuelva
  lexicon: BDAG
  rationale: La construcción temporal con infinitivo articular se expresa de forma natural en español con «cuando regrese». Mantiene el sentido temporal sin sobrecargar la sintaxis.
- source_word: ἀποδώσω σοι
  english_pob_choice: I will repay you
  chosen_spanish: yo te lo reembolsaré
  alternatives_spanish:
  - yo te lo pagaré
  - yo te lo devolveré
  lexicon: BDAG
  rationale: En el contexto financiero, ἀποδίδωμι significa devolver/repagar lo debido. «Reembolsaré» comunica con precisión la obligación de cubrir el gasto adicional; el objeto «lo» retoma la suma implícita.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no registran revisiones aplicadas; la versión española sigue de cerca esa lectura sin introducir variantes textuales ni decisiones doctrinales adicionales.
  spanish_consistency_notes:
  - Se conserva «denarios» para la moneda histórica, en línea con el nombre de la unidad en el original.
  - Se evita «SEÑOR» o títulos no presentes en el verso.
  - «Mesonero» se eligió para la persona encargada del alojamiento, manteniendo el referente personal del πανδοχεύς.
  - La puntuación y el orden son naturales en español, pero siguen de cerca la secuencia narrativa del griego.
