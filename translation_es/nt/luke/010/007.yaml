translation:
  language: es
  text: Quédense en esa misma casa, comiendo y bebiendo lo que les den, porque el trabajador es digno de su salario[a]. No vayan de casa en casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: "del salario que le corresponde".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αὐτῇ δὲ τῇ οἰκίᾳ
  english_pob_choice: in that same house
  chosen_spanish: en esa misma casa
  alternatives_spanish:
  - en esa casa
  - en la misma casa
  lexicon: BDAG
  rationale: La expresión con αὐτῇ tiene valor anafórico y remite a la casa que los recibe; 'esa misma casa' conserva tanto la referencia como el énfasis en permanecer allí.
- source_word: μένετε
  english_pob_choice: Stay
  chosen_spanish: Quédense
  alternatives_spanish:
  - Permanezcan
  - Sigan allí
  lexicon: BDAG
  rationale: El imperativo presente pide continuidad. 'Quédense' es natural en español y conserva la fuerza exhortativa sin sonar rígido.
- source_word: ἐσθίοντες καὶ πίνοντες
  english_pob_choice: eating and drinking
  chosen_spanish: comiendo y bebiendo
  alternatives_spanish:
  - mientras comen y beben
  - coman y beban
  lexicon: BDAG
  rationale: Los participios describen una acción concomitante con el mandato principal; el gerundio en español expresa bien esa continuidad.
- source_word: τὰ παρ’ αὐτῶν
  english_pob_choice: what they provide
  chosen_spanish: lo que les den
  alternatives_spanish:
  - lo que provean
  - lo que viene de ellos
  - lo que les ofrezcan
  lexicon: BDAG
  rationale: La frase apunta a lo que los anfitriones suministran. 'Lo que les den' es idiomático en español y no añade elementos ajenos al texto.
- source_word: ἄξιος γὰρ ὁ ἐργάτης
  english_pob_choice: for the worker is worthy
  chosen_spanish: porque el trabajador es digno
  alternatives_spanish:
  - porque el obrero es digno
  - pues el trabajador es digno
  lexicon: BDAG
  rationale: ἐργάτης se vierte bien como 'trabajador' u 'obrero'. 'Trabajador' es claro y el adjetivo 'digno' reproduce ἄξιος con naturalidad.
- source_word: τοῦ μισθοῦ αὐτοῦ
  english_pob_choice: of his wages
  chosen_spanish: de su salario
  alternatives_spanish:
  - de sus salarios
  - de su paga
  - del salario que le corresponde
  lexicon: BDAG
  rationale: μισθός designa compensación laboral; en español, 'salario' comunica bien el sentido económico. Se mantiene el posesivo singular masculino implícito en el griego.
- source_word: μὴ μεταβαίνετε ἐξ οἰκίας εἰς οἰκίαν
  english_pob_choice: Do not move from house to house
  chosen_spanish: No vayan de casa en casa.
  alternatives_spanish:
  - No se muden de casa en casa.
  - No cambien de una casa a otra.
  lexicon: BDAG
  rationale: La prohibición impide ir pasando de una vivienda a otra en busca de mejor alojamiento. 'Ir de casa en casa' es una expresión natural y fiel en español.
theological_decisions:
- issue: Pronombre masculino singular en τοῦ μισθοῦ αὐτοῦ
  english_pob_reading: his wages
  chosen_spanish_reading: su salario
  alternative_spanish_readings:
  - el salario de él
  - su paga
  rationale: El griego usa un posesivo masculino singular concordando con ὁ ἐργάτης. En español, 'su' preserva el valor genérico sin forzar una neutralización impropia; el contexto sigue siendo singular gramaticalmente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando el marcador sin ancla. La nota léxica sobre μισθός se integra sin pie de nota para mantener el texto limpio y cumplir la regla de anclaje exacto.
  spanish_consistency_notes:
  - Se usó 'casa' de forma consistente para οἰκία.
  - Se mantuvo el paralelismo de acciones con 'comiendo y bebiendo'.
  - '''Salario'' comunica el sentido económico de μισθός sin introducir una connotación técnica ajena.'
