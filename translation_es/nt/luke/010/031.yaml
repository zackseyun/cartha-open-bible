translation:
  language: es
  text: Y por casualidad cierto sacerdote bajaba por aquel camino[a], y al verlo, pasó por el lado opuesto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pasó de largo», aunque el verbo griego sugiere pasar manteniéndose por el lado opuesto, lo que implica evitación deliberada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ συγκυρίαν
  english_pob_choice: by chance
  chosen_spanish: por casualidad
  alternatives_spanish:
  - por suerte
  - por coincidencia
  lexicon: BDAG
  rationale: La locución expresa que el hecho ocurrió de manera fortuita o coincidente. «Por casualidad» conserva ese valor sin introducir una lectura filosófica más fuerte sobre el azar.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector narrativo suave. En español, «Y» avanza la escena con naturalidad; «Ahora» suena menos idiomático en este contexto, y «Pero» sugeriría contraste que el griego no exige.
- source_word: ἱερεύς τις
  english_pob_choice: a certain priest
  chosen_spanish: un sacerdote
  alternatives_spanish:
  - un cierto sacerdote
  - un sacerdote determinado
  lexicon: BDAG
  rationale: τις introduce un individuo indefinido. En español, «un sacerdote» comunica bien la indefinición y resulta más natural que «un cierto sacerdote», que puede sonar artificial.
- source_word: κατέβαινεν
  english_pob_choice: was going down
  chosen_spanish: bajaba
  alternatives_spanish:
  - iba bajando
  - estaba bajando
  lexicon: BDAG
  rationale: El imperfecto señala una acción en curso en el trasfondo narrativo. «Bajaba» conserva ese aspecto progresivo de forma breve y natural.
- source_word: ἐν τῇ ὁδῷ ἐκείνῃ
  english_pob_choice: on that road
  chosen_spanish: por aquel camino
  alternatives_spanish:
  - sobre aquel camino
  - en aquel camino
  lexicon: BDAG
  rationale: Con ὁδός, ἐν se entiende idiomáticamente como desplazamiento por un camino. «Por aquel camino» es natural en español y mantiene la referencia deíctica de ἐκείνῃ.
- source_word: ἰδὼν αὐτὸν
  english_pob_choice: when he saw him
  chosen_spanish: al verlo
  alternatives_spanish:
  - cuando lo vio
  - después de verlo
  lexicon: BDAG
  rationale: 'El participio aoristo tiene aquí valor temporal. «Al verlo» es una equivalencia idiomática concisa que mantiene la secuencia: ver primero, actuar después.'
- source_word: ἀντιπαρῆλθεν
  english_pob_choice: he passed by on the opposite side
  chosen_spanish: pasó por el lado opuesto
  alternatives_spanish:
  - pasó de largo
  - pasó por el otro lado
  lexicon: BDAG
  rationale: El verbo no significa solo «pasar», sino pasar evitando, manteniéndose al lado contrario. «Por el lado opuesto» preserva esa tensión semántica sin sonar forzado.
theological_decisions:
- issue: El matiz de evitación deliberada en ἀντιπαρέρχομαι
  english_pob_reading: passed by on the opposite side, implying deliberate avoidance
  chosen_spanish_reading: pasó por el lado opuesto
  alternative_spanish_readings:
  - pasó de largo
  - pasó por el otro lado
  rationale: El español debe dejar visible que no fue un simple cruce casual, sino un pasar manteniéndose al lado contrario. La formulación elegida conserva la implicación de evitación sin exagerarla.
  doctrine_reference: Narrative ethics / lexical nuance; no doctrinal claim
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el audit trail inglés; no se detectaron revisiones posteriores que alteren el sentido. Se conserva el matiz aspectual del imperfecto y la evitación implícita en ἀντιπαρῆλθεν.
  spanish_consistency_notes:
  - Se mantiene «Yahvé»/«Mesías» sin aplicación en este versículo, por no aparecer vocabulario divino o cristológico.
  - Se traduce ὁδός como «camino» siguiendo el contexto narrativo; «camino» resulta más natural que «ruta» o «vía» en español bíblico contemporáneo.
  - Se conserva la indefinición de τις con un artículo indefinido simple, evitando sobreinterpretar el personaje.
  - La nota al pie se ancla en «lado opuesto» para reflejar la alternativa lexical documentada en el audit trail inglés.
