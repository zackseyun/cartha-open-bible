    issue: La nota [a] está anclada al segmento equivocado.
    rationale: La nota explica alternativas para ἀθετέω («rechaza»), pero el marcador aparece tras «me oye a mí», que corresponde a ἀκούω. Esto crea una discordancia entre texto y nota.
  - severity: low
    issue: «los oye a ustedes» es redundante y menos fluido.
    rationale: En español natural, «los oye» ya expresa adecuadamente el objeto personal plural. Añadir «a ustedes» aquí suena recargado sin aportar significado necesario.
  - severity: low
    issue: La segunda cláusula puede reflejar mejor el énfasis personal con «a mí».
    rationale: El griego repite enfáticamente los pronombres personales. «Me rechaza a mí» reproduce mejor ese peso retórico y mantiene mejor el paralelismo con «me oye a mí».
  revised_spanish_text: El que los oye, me oye a mí; y el que los rechaza[a], me rechaza a mí; pero el que me rechaza, rechaza al que me envió.
