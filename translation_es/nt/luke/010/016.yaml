translation:
  language: es
  text: El que los oye, me oye a mí; y el que los rechaza[a], me rechaza a mí; pero el que me rechaza, rechaza al que me envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘desatiende’ o ‘pone a un lado’ para el verbo traducido como ‘rechaza’ (griego ἀθετέω).
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ ἀκούων
  english_pob_choice: The one who hears
  chosen_spanish: El que oye
  alternatives_spanish:
  - El que escucha
  - Quien oye
  lexicon: BDAG
  rationale: El participio con artículo funciona de modo sustantivado y describe a cualquier persona caracterizada por esa acción. «El que oye» conserva ese valor representativo y suena natural en español, sin diluir la estructura del griego.
- source_word: ὑμῶν
  english_pob_choice: you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - de ustedes
  - los
  lexicon: BDAG
  rationale: En este contexto ἀκούω rige a la persona oída; en español, «oír a ustedes» expresa mejor esa relación que un genitivo literal. «A ustedes» mantiene el sentido personal directo de los discípulos como interlocutores.
- source_word: ἐμοῦ
  english_pob_choice: me
  chosen_spanish: a mí
  alternatives_spanish:
  - mi voz
  - a mí mismo
  lexicon: BDAG
  rationale: Se conserva el paralelismo personal con ὑμῶν/ἐμοῦ. «A mí» reproduce la identificación directa de Jesús con la recepción de sus enviados, sin añadir contenido no explícito en el texto.
- source_word: ἀκούει
  english_pob_choice: hears
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - atiende
  lexicon: BDAG
  rationale: «Oye» mantiene la repetición léxica con ἀκούων y resulta claro y sobrio en español. «Escucha» podría sugerir mayor atención, pero no refleja tan directamente la repetición del griego.
- source_word: ὁ ἀθετῶν
  english_pob_choice: the one who rejects
  chosen_spanish: el que rechaza
  alternatives_spanish:
  - el que desprecia
  - el que desatiende
  - el que pone a un lado
  lexicon: BDAG
  rationale: ἀθετέω admite varios matices; en este contexto relacional de rechazo de enviados autorizados, «rechaza» comunica con más precisión la negativa personal y la fuerza del verbo sin volverlo técnico.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - los
  - su mensaje
  lexicon: BDAG
  rationale: El objeto directo son los discípulos mismos como representantes de Jesús. «A ustedes» conserva esa referencia personal; «su mensaje» estrecharía indebidamente el alcance del griego.
- source_word: ἐμὲ ἀθετεῖ
  english_pob_choice: rejects me
  chosen_spanish: me rechaza
  alternatives_spanish:
  - me desatiende
  - me pone a un lado
  lexicon: BDAG
  rationale: 'Se preserva la repetición del mismo verbo para mantener el énfasis retórico: rechazar a los discípulos equivale a rechazar a Jesús. «Me rechaza» es natural y fiel al paralelo del texto.'
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ introduce un giro progresivo hacia la cláusula culminante. «Pero» marca bien la transición y el contraste discursivo en español.
- source_word: τὸν ἀποστείλαντά με
  english_pob_choice: the one who sent me
  chosen_spanish: al que me envió
  alternatives_spanish:
  - al que me ha enviado
  - a mi enviado
  lexicon: BDAG
  rationale: El participio aoristo con artículo se traduce de forma sustantivada. «Al que me envió» es claro e idiomático; conserva el referente implícito sin añadir «Padre», que el griego no expresa aquí.
theological_decisions:
- issue: Cadena representativa entre los discípulos, Jesús y el Enviador
  english_pob_reading: 'Retain the direct personal chain: hearing/rejecting the disciples is hearing/rejecting Jesus, and rejecting Jesus is rejecting the one who sent him.'
  chosen_spanish_reading: 'Mantener la cadena personal directa: oír o rechazar a los discípulos es oír o rechazar a Jesús, y rechazar a Jesús es rechazar al que lo envió.'
  alternative_spanish_readings:
  - Parafrasear como oír o rechazar solo el mensaje de los discípulos
  - Hacer explícito que se trata del Padre que lo envió
  rationale: El griego usa pronombres personales y no sustantivos abstractos como «mensaje» o «enseñanza». La traducción conserva la autoridad representativa sin reducirla a una mera aceptación de contenido, y sin añadir identificación interpretativa no presente en la frase.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Referencia de «al que me envió»
  english_pob_reading: Leave the referent implicit as 'the one who sent me.'
  chosen_spanish_reading: Dejar implícito el referente como «al que me envió».
  alternative_spanish_readings:
  - Explicitar «al Padre que me envió»
  - Explicitar «a Dios que me envió»
  rationale: Aunque el contexto apunta a Dios el Padre, el griego no lo dice aquí. Mantenerlo implícito respeta el alcance del enunciado y evita introducir una glosa interpretativa en el texto principal.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'El texto sigue de cerca el estado final del audit trail en inglés: no hubo revisiones aplicadas y el consenso de revisión fue de alta concordancia. Por eso la decisión española conserva la estructura retórica triple, el paralelismo verbal con ἀκούω/ἀθετέω y el referente implícito del que envía, sin expandir el sentido más allá del griego.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en la serie editorial cuando el texto lo requiere; aquí no aparece el tetragrámaton ni una cita directa equivalente.
  - Se mantiene «el que» para reflejar los participios sustantivados del griego con claridad natural en español.
  - «A ustedes / a mí» conserva la relación personal exigida por ἀκούω con genitivo de persona, evitando introducir «mensaje» o «voz».
  - El verbo central se uniforma como «rechaza» para preservar la repetición retórica de ἀθετέω en todo el versículo.
