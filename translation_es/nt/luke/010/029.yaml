  glossary_alignment: 'El borrador sigue bien la terminología del proyecto: Ἰησοῦς -> «Jesús»; πλησίον -> «prójimo»; δικαιόω mantiene el vínculo léxico con «justificar». No hay conflictos con los defaults teológicos o léxicos del proyecto.'
