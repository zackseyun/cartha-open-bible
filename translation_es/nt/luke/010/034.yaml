- from: Y acercándose[a], vendó sus heridas, echando aceite y vino. Luego lo subió sobre su propia bestia[b], lo llevó a un mesón y cuidó de él.
  to: Y acercándose[a], vendó sus heridas, echando aceite y vino. Luego lo subió sobre su propio animal[b], lo llevó a una posada y cuidó de él.
  rationale: Se ajusta κτῆνος a «animal» para seguir la decisión auditada y evitar un tono arcaizante o áspero en español. Se cambia «mesón» por «posada» para una legibilidad más neutral y ampliamente comprensible. Se corrige la nota [a] a una alternativa idiomática en español que preserve el matiz documentado del participio griego.
