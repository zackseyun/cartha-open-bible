  text: καὶ προσελθὼν κατέδησεν τὰ τραύματα αὐτοῦ ἐπιχέων ἔλαιον καὶ οἶνον, ἐπιβιβάσας δὲ αὐτὸν ἐπὶ τὸ ἴδιον κτῆνος ἤγαγεν αὐτὸν εἰς πανδοχεῖον καὶ ἐπεμελήθη αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/010/034.yaml
  text: And coming near[a], he bound up his wounds, pouring on oil and wine. Then he put him on his own animal, brought him to an inn[b], and took care of him.
  footnotes:
