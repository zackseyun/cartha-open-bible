  - severity: medium
    issue: «mesón» para πανδοχεῖον
    rationale: «Mesón» es entendible, pero menos neutral y más tradicional/regional que «posada». «Posada» comunica mejor un lugar de hospedaje para viajeros a un público latinoamericano amplio.
  - severity: low
    issue: Nota [a] poco idiomática
    rationale: La alternativa «viniendo cerca» no suena natural en español y no representa bien la alternativa inglesa documentada. Conviene una nota idiomática como «O “se acercó”».
