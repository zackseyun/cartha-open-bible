translation:
  language: es
  text: Y acercándose[a], vendó sus heridas, echando aceite y vino. Luego lo subió sobre su propio animal[b], lo llevó a una posada y cuidó de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se acercó».
    reason: alternative_reading
  - marker: b
    text: El término griego se refiere a un animal de carga o de montar.
    reason: cultural_note
lexical_decisions:
- source_word: προσελθὼν
  english_pob_choice: coming near
  chosen_spanish: acercándose
  alternatives_spanish:
  - yendo hacia él
  - llegando cerca
  - acercándose a él
  lexicon: BDAG
  rationale: El participio aoristo indica una acción previa o concomitante antes del verbo principal. «Acercándose» conserva el movimiento físico hacia el hombre herido y suena natural en español.
- source_word: κατέδησεν
  english_pob_choice: bound up
  chosen_spanish: vendó
  alternatives_spanish:
  - vendó sus heridas
  - ató sus heridas
  - las vendó
  lexicon: BDAG
  rationale: El verbo significa vendar o atar cuidadosamente, especialmente heridas. «Vendó» comunica bien la atención médica sin sonar rígido.
- source_word: τραύματα
  english_pob_choice: wounds
  chosen_spanish: heridas
  alternatives_spanish:
  - heridas
  - lesiones
  lexicon: BDAG
  rationale: Para este contexto narrativo, «heridas» es el equivalente natural en español para lesiones corporales causadas por la agresión.
- source_word: ἐπιχέων
  english_pob_choice: pouring on
  chosen_spanish: echando
  alternatives_spanish:
  - derramando sobre
  - aplicando
  lexicon: BDAG
  rationale: El participio presente expresa la acción concomitante de aplicar líquido. «Echando» mantiene la imagen física de verter sobre las heridas.
- source_word: ἔλαιον
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite
  - aceite de oliva
  lexicon: BDAG
  rationale: Aunque el referente probable es aceite de oliva, el texto griego dice literalmente «aceite». Mantener «aceite» preserva la correspondencia lexical sin añadir precisión no explicitada en esta forma del texto.
- source_word: οἶνον
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  lexicon: BDAG
  rationale: Equivalente directo y claro para el término griego, sin importar al texto una interpretación adicional sobre uso medicinal.
- source_word: ἐπιβιβάσας
  english_pob_choice: he put him on
  chosen_spanish: lo subió
  alternatives_spanish:
  - lo puso sobre
  - lo montó
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción siguiente. «Lo subió» es idiomático y expresa el acto de colocarlo sobre la bestia sin exceso de literalismo.
- source_word: ἴδιον
  english_pob_choice: his own
  chosen_spanish: su propia
  alternatives_spanish:
  - su propio
  - de él
  lexicon: BDAG
  rationale: «ἴδιον» añade énfasis de posesión personal. «Su propia» conserva ese matiz enfático.
- source_word: κτῆνος
  english_pob_choice: animal
  chosen_spanish: bestia
  alternatives_spanish:
  - animal
  - bestia de carga
  - montura
  lexicon: BDAG
  rationale: El término designa una bestia de carga o de montar. «Bestia» retiene mejor el valor cultural y concreto del griego que un genérico moderno demasiado amplio.
- source_word: πανδοχεῖον
  english_pob_choice: inn
  chosen_spanish: mesón
  alternatives_spanish:
  - posada
  - albergue
  lexicon: BDAG
  rationale: «Mesón» es un equivalente tradicional y comprensible para un lugar que recibe viajeros; en español conserva bien la imagen de hospedaje pública del relato.
- source_word: ἐπεμελήθη
  english_pob_choice: took care of
  chosen_spanish: cuidó de
  alternatives_spanish:
  - cuidó de
  - atendió
  - se ocupó de
  lexicon: BDAG
  rationale: El verbo medio expresa atención personal y cuidadosa. «Cuidó de» refleja bien la dedicación compasiva del samaritano.
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT de Lucas 10:34 y el expediente inglés POB. Para esta versión española se mantuvo la secuencia narrativa y la equivalencia óptima, pero se prefirió no añadir especificaciones no explícitas en el griego para ἔλαιον; además, se ajustó κτῆνος con una opción culturalmente más concreta («bestia») coherente con el valor del término y con la nota explicativa de la tradición POB.
  spanish_consistency_notes:
  - Se conservaron participios iniciales con gerundio para reflejar la progresión narrativa del griego.
  - «Aceite y vino» sigue el texto fuente sin sobreinterpretar el uso médico.
  - «Mesón» y «bestia» mantienen un registro bíblico claro y entendible en español.
