    issue: Ligera rigidez en «hacia los discípulos»
    rationale: πρὸς τοὺς μαθητὰς puede expresarse en español más idiomáticamente como «a los discípulos», pero «hacia los discípulos» sigue siendo fiel y comprensible, por lo que no requiere cambio obligatorio.
