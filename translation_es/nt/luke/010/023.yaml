translation:
  language: es
  text: 'Y volviéndose hacia los discípulos, en privado[a], dijo: «Bienaventurados los ojos que ven lo que ustedes ven».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a solas».
    reason: lexical_alternative
lexical_decisions:
- source_word: στραφεὶς
  english_pob_choice: turning
  chosen_spanish: volviéndose
  alternatives_spanish:
  - habiéndose vuelto
  - dándose vuelta
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción previa al decir. «Volviéndose» conserva esa relación participial con español natural y digno.
- source_word: πρὸς τοὺς μαθητὰς
  english_pob_choice: to the disciples
  chosen_spanish: hacia los discípulos
  alternatives_spanish:
  - a los discípulos
  - para con los discípulos
  lexicon: BDAG
  rationale: πρός con acusativo expresa dirección hacia ellos; «hacia» conserva el matiz direccional del griego.
- source_word: κατ’ ἰδίαν
  english_pob_choice: privately
  chosen_spanish: en privado
  alternatives_spanish:
  - privadamente
  - a solas
  lexicon: BDAG
  rationale: La expresión idiomática indica que Jesús se dirigió aparte de la multitud. «En privado» es claro y fiel; la nota preserva la alternativa idiomática.
- source_word: μαθητάς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - aprendices
  - seguidores
  lexicon: BDAG
  rationale: Es el equivalente natural y eclesialmente transparente para μαθητής en el NT.
- source_word: Μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Dichosos
  - Felices
  lexicon: BDAG
  rationale: En una bienaventuranza, «Bienaventurados» mantiene el peso declarativo y teológico mejor que «felices».
- source_word: οἱ ὀφθαλμοὶ οἱ βλέποντες
  english_pob_choice: the eyes that see
  chosen_spanish: los ojos que ven
  alternatives_spanish:
  - los ojos que están viendo
  - los ojos videntes
  lexicon: BDAG
  rationale: Se conserva la metáfora explícita del griego, sin convertirla en una paráfrasis sobre las personas. «Que ven» reproduce el valor atributivo del participio.
- source_word: ἃ βλέπετε
  english_pob_choice: what you see
  chosen_spanish: lo que ustedes ven
  alternatives_spanish:
  - lo que están viendo
  - las cosas que ven
  lexicon: BDAG
  rationale: El relativo neutro más el presente se rinde de forma directa y natural en español. El pronombre de trato plural evita una lectura singular regional.
theological_decisions:
- issue: Fuerza de la bienaventuranza
  english_pob_reading: A pronouncement of blessedness on the disciples' privileged perception of Jesus' works and revelation.
  chosen_spanish_reading: Una declaración de bienaventuranza sobre la percepción privilegiada de los discípulos de lo que Jesús muestra y revela.
  alternative_spanish_readings:
  - Una simple afirmación de felicidad subjetiva
  - Una felicitación emocional
  rationale: «Bienaventurados» preserva el peso de declaración divina/favorable propio de μακάριοι; no reduce el enunciado a un estado emocional.
  doctrine_reference: DOCTRINE.md Translation philosophy §§3, 6
translation_notes:
  revision_awareness: 'Se respetó el estado de alta concordancia del último repaso: no se introdujeron cambios doctrinales ni textuales respecto del sentido del original; solo se ajustó la nota para anclarla explícitamente en el texto español.'
  spanish_consistency_notes:
  - Se mantuvo el tratamiento plural de cortesía/neutralidad con «ustedes», acorde con un registro amplio para América Latina.
  - Se conservó la imagen de los «ojos» como metonimia explícita, sin sustituirla por una paráfrasis de «personas».
  - La nota [a] está anclada en «en privado» y ofrece la alternativa «a solas» para reflejar la ambigüedad idiomática del griego.
