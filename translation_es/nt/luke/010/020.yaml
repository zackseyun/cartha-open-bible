  - severity: low
    issue: La puntuación con dos puntos después de «de esto» puede mejorarse
    rationale: 'El griego introduce el contenido con ὅτι; en español, una coma antes de «que» fluye mejor que «de esto: que…» en este contexto exhortativo.'
