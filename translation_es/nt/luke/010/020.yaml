translation:
  language: es
  text: Sin embargo, no se alegren de esto, que los espíritus se les sujetan; alégrense más bien de que sus nombres están escritos en los cielos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente, «en el cielo». El griego está en plural: «en los cielos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  lexicon: BDAG
  rationale: Expresa el giro adversativo fuerte con un español natural y digno; mantiene la corrección de Jesús sin suavizarla.
- source_word: ἐν τούτῳ
  english_pob_choice: in this
  chosen_spanish: de esto
  alternatives_spanish:
  - en esto
  - sobre esto
  lexicon: BDAG
  rationale: En español, la construcción más natural con «alegrarse» es «alegrarse de algo»; conserva el foco demostrativo de la exhortación.
- source_word: μὴ χαίρετε ... χαίρετε δὲ
  english_pob_choice: do not rejoice ... but rejoice
  chosen_spanish: no se alegren ... alégrense más bien
  alternatives_spanish:
  - no se regocijen ... sino regocíjense
  - no se alegren ... pero alégrense
  lexicon: BDAG
  rationale: «Alegrarse» comunica bien la repetición retórica de χαίρω y su contraste imperativo; «más bien» refleja el matiz correctivo de δέ.
- source_word: τὰ πνεύματα
  english_pob_choice: the spirits
  chosen_spanish: los espíritus
  alternatives_spanish:
  - los espíritus malignos
  - los demonios
  lexicon: BDAG
  rationale: Se mantiene la amplitud léxica de πνεύματα. El contexto sugiere seres hostiles, pero el griego no usa un término más específico, así que la versión principal no lo estrecha.
- source_word: ὑμῖν ὑποτάσσεται
  english_pob_choice: submit to you
  chosen_spanish: se les someten
  alternatives_spanish:
  - están sujetos a ustedes
  - se sujetan a ustedes
  lexicon: BDAG
  rationale: «Se les someten» preserva la idea de subordinación con buena fluidez en español y permite mantener la relación indirecta del dativo.
- source_word: τὰ ὀνόματα ὑμῶν
  english_pob_choice: your names
  chosen_spanish: sus nombres
  alternatives_spanish:
  - los nombres de ustedes
  - vuestros nombres
  lexicon: BDAG
  rationale: En registro bíblico neutro, «sus nombres» evita una marca regional innecesaria y mantiene el sentido posesivo del genitivo.
- source_word: ἐγγέγραπται
  english_pob_choice: are written
  chosen_spanish: están escritos
  alternatives_spanish:
  - han sido escritos
  - quedan escritos
  lexicon: BDAG
  rationale: El perfecto griego expresa un estado resultante; «están escritos» comunica ese estado con naturalidad, sin forzar una perífrasis más pesada.
- source_word: ἐν τοῖς οὐρανοῖς
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en el cielo de Dios
  lexicon: BDAG
  rationale: Se conserva el plural del griego («los cielos») en vez de normalizarlo al singular; esto mantiene la primacía del texto original y la tensión terminológica documentada.
theological_decisions:
- issue: Pluralidad de οὐρανοῖς y registro celestial
  english_pob_reading: in the heavens
  chosen_spanish_reading: en los cielos
  alternative_spanish_readings:
  - en el cielo
  rationale: El griego usa plural, y la versión española lo conserva. No se reduce a una fórmula tradicional singular para no borrar un rasgo visible del texto fuente.
  doctrine_reference: Translation philosophy §1, §5
- issue: Identidad de τὰ πνεύματα
  english_pob_reading: the spirits
  chosen_spanish_reading: los espíritus
  alternative_spanish_readings:
  - los demonios
  - los espíritus malignos
  rationale: El contexto apunta a poderes espirituales hostiles, pero el verso mismo no especifica «demonios». La traducción retiene esa amplitud lexical y evita una concreción no presente en el término griego.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El contexto inglés fue revisado desde una formulación más literal («have been written in the heavens») a una más natural («are written in heaven»). La versión española sigue la revisión semántica de estado resultante con «están escritos», pero conserva deliberadamente el plural del griego en «los cielos», por fidelidad al texto fuente y a la política del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos del proyecto, pero aquí no aparece el nombre divino.
  - Se usa «espíritus» sin especificar «demonios», conforme a la amplitud del griego.
  - Se conserva el plural «los cielos» en el texto principal, con nota para la alternativa tradicional singular.
  - El registro es reverente y publicable, evitando calcos innecesarios como «regrócense» o «estén sujetos» si resultaran más rígidos.
