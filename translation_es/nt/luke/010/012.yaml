translation:
  language: es
  text: Les digo que para Sodoma, en aquel día, será más tolerable[a] que para aquella ciudad.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más soportable». El comparativo griego ἀνεκτότερον puede verterse de ambas maneras.
    reason: lexical_alternative
  - marker: b
    text: «En aquel día» alude al día del juicio divino; algunos pasajes paralelos lo expresan de forma explícita.
    reason: cross_reference
lexical_decisions:
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: Les digo
  alternatives_spanish:
  - Les digo a ustedes
  - Les aseguro
  lexicon: BDAG
  rationale: λέγω aquí introduce una afirmación solemne dirigida a los oyentes. «Les digo» conserva la fuerza de la declaración directa en español natural; «Les aseguro» sería más interpretativo y añade un matiz no explícito en el griego.
- source_word: Σοδόμοις
  english_pob_choice: for Sodom
  chosen_spanish: para Sodoma
  alternatives_spanish:
  - para los habitantes de Sodoma
  - para la gente de Sodoma
  lexicon: BDAG
  rationale: El dativo plural se usa metonímicamente para la ciudad/pueblo de Sodoma. «Para Sodoma» conserva esa referencia corporativa de forma concisa, sin sobreespecificar habitantes que el texto no nombra.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - en ese día
  lexicon: BDAG
  rationale: La expresión temporal se rinde con el equivalente natural «en aquel día», que preserva el valor demostrativo y el tono escatológico/judicial sin explicitar «juicio» en el texto principal.
- source_word: ἀνεκτότερον
  english_pob_choice: more bearable
  chosen_spanish: será más tolerable
  alternatives_spanish:
  - será más soportable
  - será más llevadero
  lexicon: BDAG
  rationale: El comparativo σημαίνει algo endurable/tolerable. «Más tolerable» mantiene la relación semántica con la nota alternativa inglesa; «más llevadero» sería más idiomático pero menos cercano al campo léxico de tolerancia/soportabilidad.
- source_word: ἔσται
  english_pob_choice: it will be
  chosen_spanish: será
  alternatives_spanish:
  - va a ser
  - será así
  lexicon: BDAG
  rationale: El futuro copulativo en español se expresa de manera directa con «será», que reproduce la predicción comparativa sin añadir elementos aspectuales innecesarios.
- source_word: ἢ τῇ πόλει ἐκείνῃ
  english_pob_choice: than for that city
  chosen_spanish: que para aquella ciudad
  alternatives_spanish:
  - que para esa ciudad
  - que para aquella urbe
  lexicon: BDAG
  rationale: La construcción comparativa exige en español «que». «Aquella ciudad» preserva el demonstrativo y el referente local ya mencionado; «urbe» sería más literario, pero menos natural y no requerido por el texto.
theological_decisions:
- issue: Alcance de «aquel día»
  english_pob_reading: Retain the phrase 'on that day' without expanding it to 'on the day of judgment' in the main text.
  chosen_spanish_reading: Conservar «en aquel día» sin ampliarlo a «en el día del juicio» en el texto principal.
  alternative_spanish_readings:
  - en el día del juicio
  - en aquel día de juicio
  rationale: El contexto cercano sugiere juicio divino, pero este versículo no lo explicita. Mantener la forma breve respeta la tensión documental y evita importar contenido de paralelos inmediatos al cuerpo del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla mediante expansión interpretativa.
translation_notes:
  revision_awareness: El borrador sigue el consenso alto del audit trail inglés y no introduce revisiones adicionales; mantiene la comparación abierta sobre ἀνεκτότερον y conserva la referencia temporal sin expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «Sodoma» como nombre metonímico de la ciudad/pueblo, en paralelo con el inglés POB.
  - Se conserva la comparación con «que para aquella ciudad», evitando una glosa interpretativa.
  - Se mantiene la terminología temporal «en aquel día» coherente con el enfoque escatológico del pasaje.
  - Las notas al pie distinguen entre alternativa léxica y nota de cruce temático, como en el registro inglés.
