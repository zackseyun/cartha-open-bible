base_translation:
  language: en
  yaml_path: translation/nt/luke/010/042.yaml
  text: But few things are needed—or one[a]. For Mary has chosen the good portion[b], which will not be taken away from her.
  footnotes:
  - marker: a
    text: Or, 'only one thing is necessary.' The Greek can also be understood more specifically in the meal setting as 'few dishes are needed—or only one.'
    reason: alternative_reading
  - marker: b
    text: Or, 'the good part.' 'Portion' may intentionally echo both a meal portion and a figurative share in what is truly valuable.
    reason: lexical_alternative
