translation:
  language: es
  text: Pero pocas cosas son necesarias, o una sola[a]. Pues María ha escogido la buena porción[b], que no le será quitada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «solo una cosa es necesaria». El griego también puede entenderse, más específicamente en el marco de la comida, como «se necesitan pocos platos, o solo uno».'
    reason: alternative_reading
  - marker: b
    text: 'O: «la buena parte». «Porción» puede evocar a la vez una porción de comida y una participación figurada en lo que de veras vale.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀλίγων
  english_pob_choice: few things
  chosen_spanish: pocas cosas
  alternatives_spanish:
  - pocas
  - unas pocas cosas
  lexicon: BDAG
  rationale: El genitivo plural con χρεία expresa necesidad de una cantidad reducida. En español, «pocas cosas» comunica con naturalidad esa idea y mantiene el posible marco inmediato de la comida sin forzarlo.
- source_word: χρεία
  english_pob_choice: are needed
  chosen_spanish: son necesarias
  alternatives_spanish:
  - se necesitan
  - hay necesidad de
  lexicon: BDAG
  rationale: La construcción ἐστιν χρεία expresa necesidad. «Son necesarias» conserva el valor de necesidad y suena idiomático en español bíblico moderno.
- source_word: ἢ ἑνός
  english_pob_choice: or one
  chosen_spanish: o una sola
  alternatives_spanish:
  - o una
  - o solo una cosa
  lexicon: BDAG
  rationale: La expresión es sintácticamente densa y permite tanto una referencia práctica a una sola ración/plato como una afirmación más general. «Una sola» preserva la brevedad y la tensión interpretativa sin decidir más de lo que el griego obliga.
- source_word: Μαριὰμ
  english_pob_choice: Mary
  chosen_spanish: María
  lexicon: Nombre propio
  rationale: María es la forma española estándar y transparente de Μαριάμ en este contexto.
- source_word: τὴν ἀγαθὴν μερίδα
  english_pob_choice: the good portion
  chosen_spanish: la buena porción
  alternatives_spanish:
  - la buena parte
  - la mejor porción
  lexicon: BDAG
  rationale: μερίς puede significar porción, parte o participación. «Porción» conserva mejor el posible doble sentido en el contexto de la comida y de una parte valiosa; «buena» traduce directamente ἀγαθή. Se evita «mejor» porque el griego no es comparativo.
- source_word: ἐξελέξατο
  english_pob_choice: has chosen
  chosen_spanish: ha escogido
  alternatives_spanish:
  - eligió
  - escogió
  lexicon: BDAG
  rationale: El aoristo medio subraya una decisión personal y deliberada. El perfecto español mantiene el resultado vigente de esa elección, acorde con la cláusula siguiente.
- source_word: ἥτις
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - que
  - la que
  lexicon: BDAG
  rationale: El relativo cualitativo apunta a la porción elegida y destaca su característica. «La cual» resulta más solemne y precisa que un simple «que».
- source_word: οὐκ ἀφαιρεθήσεται αὐτῆς
  english_pob_choice: will not be taken away from her
  chosen_spanish: no le será quitada
  alternatives_spanish:
  - no le será retirada
  - no le será arrebatada
  lexicon: BDAG
  rationale: El futuro pasivo de ἀφαιρέω significa quitar o remover. «No le será quitada» es natural, breve y preserva la promesa de permanencia.
theological_decisions:
- issue: Interpretación de «pocas cosas ... o una sola»
  english_pob_reading: Retain the wording as a statement about what is necessary without specifying whether Jesus means few dishes, one dish, or one essential thing.
  chosen_spanish_reading: Conservar la formulación como una afirmación de necesidad sin precisar si se trata de pocos platos, de un solo plato o de una sola cosa esencial.
  alternative_spanish_readings:
  - Solo hace falta una cosa.
  - Solo unos pocos platos son necesarios, o incluso uno.
  rationale: El griego admite tanto un sentido práctico ligado a la comida como un contraste más amplio. La traducción mantiene esa tensión para no resolverla más allá del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en mantener la ambigüedad de ὀλίγων δέ ἐστιν χρεία ἢ ἑνός y en traducir τὴν ἀγαθὴν μερίδα con una expresión que preserve el posible doble sentido de porción/parte. No se registran revisiones posteriores que alteren la decisión de fondo.
  spanish_consistency_notes:
  - Se mantiene «María» para el nombre propio, coherente con el uso bíblico en español.
  - Se evita «Cristo/SEÑOR» porque no aparecen en este versículo.
  - «Porción» se usa de manera deliberada para conservar la posible resonancia concreta y figurada de μερίς.
  - La puntuación con coma y «o» refleja la tensión del griego sin sobreexplicarla.
