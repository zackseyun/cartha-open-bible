translation:
  language: es
  text: Pero un samaritano, mientras viajaba, llegó a donde estaba él y, al verlo, se compadeció[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tuvo compasión» o «sintió compasión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σαμαρίτης
  english_pob_choice: a Samaritan
  chosen_spanish: un samaritano
  alternatives_spanish:
  - un hombre de Samaria
  lexicon: BDAG
  rationale: El término griego designa una identidad étnico-religiosa, no solo geográfica. 'Samaritano' es el equivalente español preciso y natural, y conserva el contraste narrativo y social del relato.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: Aquí introduce contraste con los personajes anteriores de la parábola. 'Pero' comunica mejor el valor adversativo en español.
- source_word: τις
  english_pob_choice: a
  chosen_spanish: un
  alternatives_spanish:
  - uno
  - cierto
  lexicon: BDAG
  rationale: Con un sustantivo indefinido, el español expresa naturalmente la indefinición con el artículo 'un', sin necesidad de sobrecargar con 'cierto'.
- source_word: ὁδεύων
  english_pob_choice: as he traveled
  chosen_spanish: mientras viajaba
  alternatives_spanish:
  - viajando
  - en camino
  lexicon: BDAG
  rationale: El participio presente expresa acción concomitante o de fondo. 'Mientras viajaba' preserva esa simultaneidad con español fluido.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: BDAG
  rationale: En este contexto de movimiento hacia una persona herida, 'llegó' comunica bien la llegada al lugar del hombre, como en el audit trail inglés 'came to where he was'.
- source_word: κατ’ αὐτὸν
  english_pob_choice: to where he was
  chosen_spanish: junto a él
  alternatives_spanish:
  - a donde estaba
  - hasta donde él estaba
  lexicon: BDAG
  rationale: La construcción con κατά + acusativo aquí indica acercamiento al lugar de la víctima. 'Junto a él' suena natural en español y conserva la proximidad espacial sin introducir una ambigüedad innecesaria.
- source_word: ἰδὼν
  english_pob_choice: when he saw him
  chosen_spanish: al verlo
  alternatives_spanish:
  - cuando lo vio
  - viéndolo
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. 'Al verlo' reproduce de forma idiomática la secuencia temporal en español.
- source_word: ἐσπλαγχνίσθη
  english_pob_choice: he was moved with compassion
  chosen_spanish: fue movido de compasión
  alternatives_spanish:
  - tuvo compasión
  - sintió compasión
  lexicon: BDAG
  rationale: 'Se conserva la fuerza afectiva del verbo con una pasiva que refleja la lectura de la POB inglesa, evitando aplanarlo a una fórmula más débil como ''tuvo compasión''. La preposición ''de'' expresa mejor el giro español que ''con''. '
theological_decisions:
- issue: Mantener la intensidad afectiva de ἐσπλαγχνίσθη sin convertirla en una interpretación moralizante adicional
  english_pob_reading: he was moved with compassion
  chosen_spanish_reading: fue movido de compasión
  alternative_spanish_readings:
  - tuvo compasión
  - sintió compasión
  rationale: La escena subraya una respuesta visceral de misericordia. La redacción elegida conserva la fuerza emocional sin añadir explicaciones doctrinales sobre amor al prójimo, gracia o virtud ética que el versículo no explicita.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con el repaso más reciente del inglés POB: no se requieren cambios de sentido respecto del audit trail. Se mantiene la equivalencia óptima y la decisión de preservar la fuerza afectiva de ἐσπλαγχνίσθη sin suavizarla.'
  spanish_consistency_notes:
  - Se usa 'samaritano' como gentilicio/identidad, no como mero origen geográfico.
  - '''Pero'' conserva el matiz adversativo de δέ en contraste con el sacerdote y el levita del contexto inmediato.'
  - '''Al verlo'' y ''mientras viajaba'' mantienen la secuencia narrativa del griego sin calcar la sintaxis.'
  - La nota de pie de página solo recoge la alternativa léxica ya presente en el audit trail inglés.
