revisions:
- from: Pero un[a] samaritano, mientras viajaba, llegó junto a él y, al verlo, fue movido[a] de compasión.
  to: Pero un samaritano, mientras viajaba, llegó a donde estaba él y, al verlo, se compadeció[a].
  rationale: Se corrige el anclaje de la nota para que corresponda al verbo relevante, se sustituye una expresión poco natural ("fue movido de compasión") por la forma idiomática y digna "se compadeció", y se ajusta la frase de movimiento para reflejar mejor la llegada al lugar donde estaba el herido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:01:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: contraste adversativo (δέ), identidad étnico-religiosa (Σαμαρίτης), acción de viaje de fondo (ὁδεύων), llegada al lugar del herido (ἦλθεν κατ’ αὐτόν), percepción previa (ἰδών) y respuesta compasiva (ἐσπλαγχνίσθη). Sin embargo, dos decisiones necesitan ajuste: "junto a él" debilita ligeramente el matiz de movimiento hasta el lugar donde estaba la víctima, y "fue movido de compasión" suena poco idiomático en español y no es la mejor forma de preservar la fuerza del verbo.'
  spanish_quality_summary: El texto es mayormente claro, pero "fue movido de compasión" resulta forzado y poco natural en español eclesial general. Una formulación como "se compadeció" preserva mejor la dignidad, la fluidez y la intensidad afectiva. También conviene anclar la nota al verbo, no al sustantivo "samaritano", ya que la alternativa léxica corresponde a ἐσπλαγχνίσθη.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. "samaritano" es correcto. La revisión propuesta mantiene fidelidad al audit trail inglés y mejora la naturalidad española sin introducir paráfrasis teológica.
  issues:
  - severity: medium
    issue: La nota [a] está anclada a "samaritano" pero corresponde al verbo ἐσπλαγχνίσθη.
    rationale: Las alternativas "tuvo compasión" / "sintió compasión" no explican Σαμαρίτης sino la expresión verbal final; el marcador debe aparecer donde ocurre la variación léxica.
  - severity: medium
    issue: '"fue movido de compasión" es poco idiomático en español.'
    rationale: Aunque intenta reflejar "was moved with compassion", en español suena acartonado. "Se compadeció" comunica de forma natural la respuesta visceral del griego sin aplanarla innecesariamente.
  - severity: low
    issue: '"llegó junto a él" capta proximidad, pero "llegó a donde estaba" expresa mejor κατ’ αὐτόν.'
    rationale: 'La construcción griega indica movimiento al lugar de la víctima; la propuesta revisada preserva con mayor precisión el matiz locativo del audit trail inglés: "came to where he was".'
  revised_spanish_text: Pero un samaritano, mientras viajaba, llegó a donde estaba él y, al verlo, se compadeció[a].
  revised_footnotes:
  - marker: a
    text: 'O: «tuvo compasión» o «sintió compasión».'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al verbo relevante, se sustituye una expresión poco natural ("fue movido de compasión") por la forma idiomática y digna "se compadeció", y se ajusta la frase de movimiento para reflejar mejor la llegada al lugar donde estaba el herido.
