translation:
  language: es
  text: ¿Cuál de estos tres te parece que llegó a ser[a] prójimo[b] del que cayó entre los ladrones?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''ha llegado a ser''. El griego más literalmente dice ''te parece haber llegado a ser prójimo'', subrayando el acto de volverse prójimo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''vecino''. Aquí πλησίον funciona con ''llegó a ser'' en el sentido de relación de prójimo, no de simple cercanía espacial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς
  english_pob_choice: Which
  chosen_spanish: ¿Cuál de estos tres...
  alternatives_spanish:
  - ¿Quién de estos tres...
  lexicon: BDAG
  rationale: En español, como en inglés, el conjunto ya está delimitado por 'de estos tres'; por eso 'cuál' es la opción natural y precisa para una selección dentro de un grupo definido.
- source_word: τούτων τῶν τριῶν
  english_pob_choice: of these three
  chosen_spanish: de estos tres
  alternatives_spanish:
  - de estos tres hombres
  lexicon: BDAG
  rationale: El griego presenta un genitivo partitivo simple. 'Hombres' no está explícito en el texto, así que se omite para no añadir contenido no dicho.
- source_word: πλησίον
  english_pob_choice: a neighbor
  chosen_spanish: prójimo[b]
  alternatives_spanish:
  - vecino
  - cercano
  lexicon: BDAG
  rationale: Aquí πλησίον funciona como predicativo con γεγονέναι, no como adverbio espacial. 'Prójimo' comunica mejor en español la idea relacional de 'neighbor' y evita reducirlo a cercanía física.
- source_word: δοκεῖ σοι
  english_pob_choice: seems to you
  chosen_spanish: te parece
  alternatives_spanish:
  - te parece a ti
  - piensas
  lexicon: BDAG
  rationale: '''Te parece'' conserva la valoración explícita de δοκεῖ y el dativo σοι sin convertir la pregunta en una reformulación más interpretativa como ''piensas''.'
- source_word: γεγονέναι
  english_pob_choice: to have become
  chosen_spanish: llegó a ser[a]
  alternatives_spanish:
  - ha llegado a ser
  - se volvió
  lexicon: BDAG
  rationale: 'El infinitivo perfecto de γίνομαι expresa llegar a ser, no mera identidad estática. ''Llegó a ser'' mantiene el desplazamiento ético de la pregunta: no quién es prójimo, sino quién se hizo prójimo.'
- source_word: τοῦ ἐμπεσόντος
  english_pob_choice: the man who fell
  chosen_spanish: del que cayó
  alternatives_spanish:
  - del hombre que cayó
  - del que había caído
  lexicon: BDAG
  rationale: El participio con artículo identifica a la víctima mencionada en la narración previa. 'Del que cayó' es fiel y natural en español; el contexto ya determina que se trata de un hombre.
- source_word: εἰς τοὺς λῃστάς
  english_pob_choice: among the robbers
  chosen_spanish: en manos de los ladrones
  alternatives_spanish:
  - entre los ladrones
  - entre bandidos
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente 'cayó en los ladrones', en español 'en manos de los ladrones' reproduce con precisión el sentido idiomático de caer bajo su poder, que también está implícito en el contexto narrativo.
theological_decisions:
- issue: Reframing ethical question from identity to action
  english_pob_reading: Preserve 'have become' to keep the question focused on becoming a neighbor rather than merely identifying one.
  chosen_spanish_reading: '''llegó a ser'' mantiene el giro desde la identidad hacia la acción relacional.'
  alternative_spanish_readings:
  - '''era prójimo'''
  - '''fue prójimo'''
  rationale: La formulación griega usa γίνομαι en perfecto infinitivo, lo que enfatiza un proceso/resultante de llegar a ser. En la parábola, Jesús pregunta quién actuó como prójimo; el español debe conservar ese desplazamiento sin volver la pregunta estática.
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: 'Alineado con el audio de revisión inglesa: se conserva la fuerza de δοκεῖ σοι y el valor aspectual de γεγονέναι, evitando una paráfrasis estática.'
  spanish_consistency_notes:
  - Se mantiene 'prójimo' para πλησίον en sentido relacional, coherente con el uso bíblico y con el giro ético del pasaje.
  - Se evita introducir 'hombre' en el segmento de la víctima porque el antecedente narrativo ya la identifica.
  - La preposición idiomática 'en manos de' comunica en español el sentido de caer bajo el poder de los ladrones sin añadir interpretación desmedida.
