  glossary_alignment: No hay conflicto con terminología principal del proyecto. 'Prójimo' es una buena decisión contextual frente a 'vecino'. Se conserva correctamente el matiz de γίνομαι como devenir. La única desviación relevante es la expansión idiomática de εἰς τοὺς λῃστάς a 'en manos de los ladrones', más interpretativa que el audit trail inglés.
