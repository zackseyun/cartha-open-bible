translation:
  language: es
  text: Cuando los que cuidaban los cerdos vieron lo que había sucedido[a], huyeron y dieron la noticia en la ciudad y en la zona rural[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “lo que había acontecido”.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “en los campos”; aquí se refiere a la zona rural circundante, en contraste con “la ciudad”.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδόντες
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vieron
  alternatives_spanish:
  - Viendo
  - Después de ver
  lexicon: BDAG
  rationale: El participio aoristo se expresa de manera temporal en español con 'Cuando...', preservando la relación previa a los verbos principales sin forzar un gerundio poco natural.
- source_word: οἱ βόσκοντες
  english_pob_choice: the herdsmen
  chosen_spanish: los pastores
  alternatives_spanish:
  - los ganaderos
  - los cuidadores del ganado
  - los porquerizos
  lexicon: BDAG
  rationale: En el contexto de una piara, el participio sustantivado refiere a quienes cuidaban los animales. 'Pastores' es idiomático en español bíblico, aunque aquí no debe leerse como ovejeros; se mantiene por concisión y porque el contexto aclara que se trata de ganado porcino.
- source_word: τὸ γεγονός
  english_pob_choice: what had happened
  chosen_spanish: lo que había sucedido
  alternatives_spanish:
  - lo que había acontecido
  - lo que había ocurrido
  - el acontecimiento
  lexicon: BDAG
  rationale: El participio perfecto sustantivado de γίνομαι indica un hecho ya consumado. 'Lo que había sucedido' conserva ese valor de evento completo y es natural en español.
- source_word: ἔφυγον
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - salieron corriendo
  - escaparon
  lexicon: BDAG
  rationale: El aoristo de φεύγω se traduce con el verbo directo 'huir' para mantener la fuerza narrativa y evitar una paráfrasis más débil o coloquial.
- source_word: ἀπήγγειλαν
  english_pob_choice: reported it
  chosen_spanish: lo contaron
  alternatives_spanish:
  - lo informaron
  - lo reportaron
  - lo anunciaron
  lexicon: BDAG
  rationale: En este contexto narrativo, ἀπαγγέλλω es relatar o dar noticia. 'Lo contaron' comunica bien el acto de transmitir la noticia en español corriente; 'informaron' sería más técnico y 'reportaron' más anglicado.
- source_word: εἰς τὴν πόλιν
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - a la ciudad
  - hacia la ciudad
  - dentro de la ciudad
  lexicon: BDAG
  rationale: Aunque εἰς suele indicar movimiento hacia, aquí el sentido es el ámbito donde se difundió el aviso. 'En la ciudad' expresa ese alcance locativo de forma natural.
- source_word: καὶ εἰς τοὺς ἀγρούς
  english_pob_choice: and in the countryside
  chosen_spanish: y en el campo
  alternatives_spanish:
  - y en el campo abierto
  - y en la zona rural
  - y en el campo y sus alrededores
  lexicon: BDAG
  rationale: ἀγροί significa literalmente 'campos', pero en contraste con 'la ciudad' designa la zona rural circundante. 'En el campo' conserva esa oposición urbana-rural sin sonar rígido.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español; los marcadores [a] y [b] están anclados en la frase correspondiente.
  spanish_consistency_notes:
  - Se evita el masking de nombres divinos porque el versículo no contiene referencias a θεός o κύριος.
  - Se conserva un registro narrativo sobrio y directo, acorde con el griego y con la traducción POB en inglés.
  - Se eligió 'pastores' como equivalente funcional de οἱ βόσκοντες por claridad bíblica en español, con nota explicativa para evitar una lectura equivocada de oficio pastoral eclesiástico.
