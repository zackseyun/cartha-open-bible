translation:
  language: es
  text: Y los que están junto al camino son los que han oído; luego viene el diablo y quita la palabra de sus corazones[b], para que no crean y sean salvos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que no lleguen a creer y ser salvos».'
    reason: lexical_alternative
  - marker: b
    text: «La palabra» aquí significa el mensaje proclamado de Dios en la parábola.
    reason: cross_reference
lexical_decisions:
- source_word: παρὰ τὴν ὁδόν
  english_pob_choice: beside the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al lado del camino
  - junto a la vereda
  lexicon: BDAG
  rationale: παρά con acusativo indica proximidad espacial. «Junto al camino» conserva la imagen de ubicación sin sonar forzado en español y es natural en registro bíblico contemporáneo.
- source_word: ἀκούσαντες
  english_pob_choice: have heard
  chosen_spanish: han oído
  alternatives_spanish:
  - oyeron
  - han escuchado
  lexicon: BDAG
  rationale: El participio aoristo describe a los que ya recibieron la escucha del mensaje. «Han oído» refleja bien ese estado resultante en español y mantiene el tono explicativo de la parábola.
- source_word: εἶτα
  english_pob_choice: then
  chosen_spanish: luego
  alternatives_spanish:
  - entonces
  - después
  lexicon: BDAG
  rationale: Marca sucesión narrativa. «Luego» es una equivalencia natural y clara en español.
- source_word: διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el calumniador
  lexicon: BDAG
  rationale: Aquí διάβολος nombra al ser personal maligno. «El diablo» es la forma idiomática y transparente en español, sin perder la referencia personal.
- source_word: αἴρει
  english_pob_choice: takes away
  chosen_spanish: quita
  alternatives_spanish:
  - toma
  - retira
  - se lleva
  lexicon: BDAG
  rationale: αἴρω aquí significa remover o arrebatar lo sembrado. «Quita» es natural y suficientemente fuerte en español; evita una exageración no exigida por el griego.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra proclamada
  lexicon: BDAG
  rationale: En la explicación de la parábola, λόγος se refiere al mensaje proclamado de Dios. «La palabra» preserva el idiomatismo bíblico y es fiel al contexto.
- source_word: καρδίας
  english_pob_choice: heart
  chosen_spanish: corazones
  alternatives_spanish:
  - mente
  - interior
  lexicon: BDAG
  rationale: El griego usa el plural αὐτῶν y καρδίας, por lo que «sus corazones» reproduce con precisión el número y conserva la antropología bíblica del centro de la respuesta humana.
- source_word: ἵνα μὴ πιστεύσαντες σωθῶσιν
  english_pob_choice: so that they may not believe and be saved
  chosen_spanish: para que no crean y sean salvos
  alternatives_spanish:
  - de modo que no crean y se salven
  - para que no lleguen a creer y ser salvos
  lexicon: BDAG
  rationale: ἵνα con μή expresa finalidad o resultado negativo. El español natural es «para que no crean y sean salvos», que mantiene la relación entre creer y salvación sin resolverla de forma interpretativa.
- source_word: πιστεύσαντες
  english_pob_choice: believe
  chosen_spanish: crean
  alternatives_spanish:
  - tengan fe
  - crean de verdad
  lexicon: BDAG; Louw-Nida
  rationale: «Creer» es la equivalencia más directa de πιστεύω y preserva el paralelismo con el inglés POB. En español, «crean» fluye con la negación final de propósito.
- source_word: σωθῶσιν
  english_pob_choice: be saved
  chosen_spanish: sean salvos
  alternatives_spanish:
  - sean salvados
  - sean librados
  lexicon: BDAG
  rationale: En el contexto lucano, σῴζω tiene sentido soteriológico pleno. «Sean salvos» es la forma más clara y habitual en español bíblico actual, sin reducirlo a mera liberación temporal.
theological_decisions:
- issue: Relación entre creer y ser salvado
  english_pob_reading: so that they may not believe and be saved
  chosen_spanish_reading: para que no crean y sean salvos
  alternative_spanish_readings:
  - para que no crean, y así no sean salvos
  - de modo que no crean y no reciban salvación
  rationale: 'El griego presenta el propósito del diablo al quitar la palabra: impedir la fe que conduce a la salvación. La traducción conserva esa afirmación sin añadir una explicación doctrinal sobre el mecanismo de la salvación.'
  doctrine_reference: Mantener la tensión bíblica sin resolver debates soteriológicos.
- issue: Naturaleza de «la palabra»
  english_pob_reading: ‘The word’ here means the proclaimed message of God in the parable.
  chosen_spanish_reading: «La palabra» aquí significa el mensaje proclamado de Dios en la parábola.
  alternative_spanish_readings:
  - la enseñanza
  - el anuncio de Dios
  rationale: Se preserva el término bíblico «la palabra» y, en nota, se aclara su sentido contextual como mensaje proclamado. Así se evita banalizar el término o hacerlo demasiado abstracto.
  doctrine_reference: Lectura contextual de λόγος en la parábola del sembrador.
translation_notes:
  revision_awareness: El texto inglés auditado fue ajustado de «their heart» a «their hearts» para reflejar el plural griego; la versión española ya sigue ese plural con «sus corazones». También se mantuvo la equivalencia de ἵνα μή con una finalidad negativa en lugar de introducir una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantuvo «el diablo» para διάβολος, en línea con el POB inglés y el uso bíblico común en español.
  - Se usó «la palabra» para λόγος, con nota explicativa para conservar el idiomatismo bíblico.
  - Se respetó el plural de καρδίας / αὐτῶν con «sus corazones».
  - Se prefirió «salvos» frente a «salvados» por claridad y uso bíblico más estable en español.
  - No se introdujo «Mesías», «Yahvé» ni otros términos no presentes en este versículo.
