translation:
  language: es
  text: Pero la semilla en la buena tierra[a]—estos son los que, habiendo oído la palabra con un corazón bueno y noble, la retienen y dan fruto con perseverancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un corazón honesto y bueno».
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ... ἐν τῇ καλῇ γῇ
  english_pob_choice: the seed in the good soil
  chosen_spanish: la semilla en la buena tierra
  alternatives_spanish:
  - lo sembrado en la buena tierra
  - aquello en la buena tierra
  lexicon: SBLGNT / BDAG
  rationale: El griego usa un neutro elíptico que remite al elemento sembrado en la explicación de la parábola. En español, «la semilla» hace explícito el referente de manera natural y mantiene la imagen agrícola. «Tierra» es más idiomático aquí que «suelo», y preserva el paralelo con la escena de siembra.
- source_word: καλῇ γῇ
  english_pob_choice: good soil
  chosen_spanish: buena tierra
  alternatives_spanish:
  - buen suelo
  - tierra buena
  lexicon: BDAG
  rationale: γῆ en este contexto apunta a la tierra cultivable, no a «tierra» en sentido geográfico. «Buena tierra» conserva el valor agrícola y la evaluación positiva del terreno. Se evita «suelo» porque suena más técnico y menos natural en español bíblico para esta imagen.
- source_word: οὗτοί εἰσιν οἵτινες
  english_pob_choice: these are the ones who
  chosen_spanish: estos son los que
  alternatives_spanish:
  - éstos son quienes
  - son éstos los que
  lexicon: BDAG
  rationale: La construcción identifica al grupo receptor. «Estos son los que» es claro, natural y conserva el tono explicativo sin rigidez.
- source_word: ἐν καρδίᾳ καλῇ καὶ ἀγαθῇ
  english_pob_choice: with a good and noble heart
  chosen_spanish: con un corazón bueno y noble
  alternatives_spanish:
  - con un corazón honesto y bueno
  - con un corazón bueno y recto
  - en un corazón bueno y noble
  lexicon: BDAG
  rationale: «Corazón» mantiene el sentido bíblico del centro interior de la persona. Se distinguen los dos adjetivos del griego con «bueno y noble» para no aplanar la doble caracterización. «Con» refleja mejor en español la disposición interior en que se recibe la palabra que un simple «en».
- source_word: ἀκούσαντες τὸν λόγον
  english_pob_choice: having heard the word
  chosen_spanish: habiendo oído la palabra
  alternatives_spanish:
  - después de oír la palabra
  - cuando oyeron la palabra
  lexicon: BDAG
  rationale: El participio aoristo expresa anterioridad respecto de «retienen» y «dan fruto». «Habiendo oído» conserva esa relación temporal y suena natural en español. «La palabra» mantiene la expresión ya establecida en la explicación de la parábola.
- source_word: κατέχουσιν
  english_pob_choice: hold fast to it
  chosen_spanish: la retienen
  alternatives_spanish:
  - la aferran
  - se aferran a ella
  - la conservan firmemente
  lexicon: BDAG
  rationale: El verbo implica mantener firmemente lo recibido. «Retener» comunica esa idea de conservar y sostener sin introducir una imagen demasiado idiomática. Se omite un objeto explícito porque en español el referente «la palabra» ya quedó claro en el contexto inmediato.
- source_word: καρποφοροῦσιν
  english_pob_choice: bear fruit
  chosen_spanish: dan fruto
  alternatives_spanish:
  - producen fruto
  - son fructíferos
  lexicon: BDAG
  rationale: «Dar fruto» es la equivalencia española natural y tradicional para la metáfora agrícola y moral del texto, preservando el paralelo de la imagen.
- source_word: ἐν ὑπομονῇ
  english_pob_choice: with perseverance
  chosen_spanish: con perseverancia
  alternatives_spanish:
  - con paciencia
  - con constancia
  - en perseverancia
  lexicon: BDAG
  rationale: ὑπομονή denota constancia perseverante ante la prueba o la demora. «Con perseverancia» expresa con precisión ese modo de fructificar en un español claro y sobrio.
theological_decisions:
- issue: Descripción moral del corazón receptivo
  english_pob_reading: with a good and noble heart
  chosen_spanish_reading: con un corazón bueno y noble
  alternative_spanish_readings:
  - con un corazón honesto y bueno
  - con un corazón bueno y recto
  rationale: La frase describe la disposición interior de los oyentes sin definir el origen de esa disposición ni resolver cuestiones doctrinales sobre mérito o regeneración. Se conserva la valoración positiva y la doble caracterización del griego sin cargar el texto con inferencias teológicas no explícitas.
  doctrine_reference: Preservar la tensión teológica sin resolverla; no introducir una doctrina que el versículo no afirma.
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios aplicados en el pase más reciente, y el acuerdo de revisión cruzada fue alto. La redacción española sigue de cerca las decisiones léxicas del POB inglés, ajustándolas a un español natural y publicable.'
  spanish_consistency_notes:
  - Se mantuvo «palabra» para τὸν λόγον, en continuidad con la terminología de la parábola.
  - Se eligió «buena tierra» en vez de «buen suelo» por naturalidad bíblica en español y por conservar la imagen agrícola.
  - Se usó «con» en la frase del corazón para expresar mejor la cualidad interior en español.
  - Se conservó el par adjetival «bueno y noble» para reflejar el griego καλῇ καὶ ἀγαθῇ sin neutralizar la distinción.
  - Se mantuvo «con perseverancia» para ὑπομονῇ, siguiendo la equivalencia auditada del inglés POB.
