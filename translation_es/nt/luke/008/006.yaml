translation:
  language: es
  text: Y otro cayó sobre la roca[a], y, después de que brotó, se marchitó porque no tenía humedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la roca». El griego tiene el singular «roca», preservando la imagen de la semilla que cae sobre una superficie rocosa, no la expresión más amplia «terreno pedregoso».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτερον
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - uno más
  - otro más
  lexicon: BDAG
  rationale: El neutro sustantivado funciona aquí como un elemento más de la secuencia de la parábola. En español, 'otro' reproduce de forma natural la idea de 'another' sin forzar el género ni añadir explicaciones.
- source_word: κατέπεσεν
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se desplomó
  - cayó hacia abajo
  lexicon: BDAG
  rationale: El aoristo describe de manera simple la caída de la semilla. 'Cayó' es el equivalente español más directo y natural, sin intensificar indebidamente el verbo.
- source_word: ἐπὶ τὴν πέτραν
  english_pob_choice: on the rock
  chosen_spanish: sobre la roca
  alternatives_spanish:
  - en la roca
  - encima de la roca
  lexicon: BDAG
  rationale: Se preserva 'πέτρα' como 'roca' singular, no 'terreno pedregoso', para mantener la imagen concreta del texto griego. 'Sobre' comunica bien la ubicación del caer sin perder la precisión espacial.
- source_word: φυὲν
  english_pob_choice: after it sprang up
  chosen_spanish: después de brotar
  alternatives_spanish:
  - habiendo brotado
  - cuando brotó
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente antes del verbo principal. 'Después de brotar' conserva esa secuencia y mantiene la imagen de crecimiento vegetal de modo idiomático en español.
- source_word: ἐξηράνθη
  english_pob_choice: it withered
  chosen_spanish: se secó
  alternatives_spanish:
  - se marchitó
  - se agostó
  lexicon: BDAG
  rationale: En este contexto la planta pierde la humedad necesaria y se seca. 'Se secó' expresa con claridad el resultado causal y evita sobrecargar el matiz vegetal de 'marchitó', aunque esa sigue siendo una alternativa válida.
- source_word: διὰ τὸ μὴ ἔχειν
  english_pob_choice: because it had no
  chosen_spanish: porque no tenía
  alternatives_spanish:
  - porque no tenía nada de
  - por no tener
  lexicon: BDAG
  rationale: La construcción causal se vierte con una causal directa y natural en español. 'Porque no tenía' preserva el sentido sin añadir palabras ajenas al griego.
- source_word: ἰκμάδα
  english_pob_choice: moisture
  chosen_spanish: humedad
  alternatives_spanish:
  - moistura
  - mojo
  lexicon: BDAG
  rationale: ἰκμάς denota la humedad necesaria para el crecimiento. 'Humedad' es preciso y claro en español, y encaja bien con la imagen agrícola; 'moistura' no es idiomático en el registro bíblico.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido y la imagen del griego SBLGNT, y armoniza con la solución auditada en inglés: una lectura simple, concreta y agrícola, sin ampliar ''roca'' a ''terreno pedregoso''. No se detectaron revisiones aplicadas en el pasaje fuente, y el resultado mantiene la secuencia aspectual de caída, brote y secamiento.'
  spanish_consistency_notes:
  - Se mantiene el singular 'roca' para reflejar πέτρα y la nota de alternativa en el inglés POB.
  - '''Otro'' conserva la serie de elementos de la parábola sin introducir ''uno más'' ni un sustantivo explícito inexistente en el griego.'
  - '''Humedad'' refleja el valor de ἰκμάς con un término claro y de uso amplio en español bíblico.'
  - La puntuación sigue el flujo narrativo del original con una pausa causal clara antes de 'porque no tenía humedad'.
