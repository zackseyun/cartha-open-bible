translation:
  language: es
  text: Y su espíritu volvió[b], y se levantó al instante, y él mandó que le dieran de comer[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que le dieran algo de comer».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su aliento volvió».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: BDAG
  rationale: ἐπιστρέφω aquí expresa el retorno de la vida/espíritu a la niña. En español, «volvió» comunica ese regreso de manera natural y fiel, sin añadir interpretación.
- source_word: τὸ πνεῦμα αὐτῆς
  english_pob_choice: her spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - su aliento
  - el espíritu de ella
  lexicon: BDAG
  rationale: En este contexto de restauración de la vida, «espíritu» preserva el alcance léxico y la carga teológica de πνεῦμα mejor que reducirlo a «aliento».
- source_word: ἀνέστη
  english_pob_choice: she rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: BDAG
  rationale: ἀνίστημι puede significar levantarse o ponerse en pie. «Se levantó» es claro en español y funciona bien tras la idea de la restauración inmediata a la vida.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: El adverbio subraya la inmediatez del milagro. «Al instante» es natural en español y conserva ese énfasis.
- source_word: διέταξεν
  english_pob_choice: he directed
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dispuso
  lexicon: BDAG
  rationale: διατάσσω puede expresar dar una instrucción con autoridad. «Mandó» conserva ese matiz sin sonar excesivamente duro.
- source_word: αὐτῇ δοθῆναι φαγεῖν
  english_pob_choice: that food be given to her
  chosen_spanish: que le dieran de comer
  alternatives_spanish:
  - que se le diera algo de comer
  - que le dieran comida
  lexicon: BDAG
  rationale: La construcción expresa la instrucción de que la niña reciba alimento. «Que le dieran de comer» refleja de forma idiomática la idea de δοθῆναι + φαγεῖν, manteniendo el sentido práctico del texto.
theological_decisions:
- issue: Sentido de πνεῦμα en un contexto de resurrección/revivificación
  english_pob_reading: her spirit returned
  chosen_spanish_reading: su espíritu volvió
  alternative_spanish_readings:
  - su aliento volvió
  rationale: Se mantiene «espíritu» para no reducir πνεῦμα a mera respiración. La ambigüedad entre «espíritu» y «aliento» se preserva como tensión léxica del original, pero el contexto favorece la lectura de restauración vital.
  doctrine_reference: Mantener la tensión léxica original sin resolverla artificialmente; prioridad del griego sobre la tradición de traducción.
translation_notes:
  revision_awareness: El inglés POB revisó «got up» a «rose» por registro y cercanía a ἀνέστη; en español se optó por «se levantó», que conserva naturalidad y el movimiento físico inmediato, sin forzar un calco menos idiomático. También se respetó la nota alternativa sobre πνεῦμα y la construcción de comida dada.
  spanish_consistency_notes:
  - Se mantuvo «espíritu» para πνεῦμα conforme al criterio POB cuando el contexto es de retorno de vida.
  - Se usó «mandó» como equivalente funcional de διατάσσω en una instrucción autoritativa.
  - 'La secuencia verbal conserva la rapidez narrativa: volvió / se levantó / mandó.'
  - No se empleó «SEÑOR» ni terminología eclesiástica no presente en el verso.
