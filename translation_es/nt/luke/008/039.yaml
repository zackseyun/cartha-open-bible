translation:
  language: es
  text: Regresa a tu casa[a], y cuenta lo que Dios ha hecho por ti. Y él se fue, proclamando por toda la ciudad lo que Jesús había hecho por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «todo lo que Dios ha hecho por ti». El griego dice literalmente «cuantas cosas» o «lo que Dios hizo por ti»; aquí no hay un adjetivo explícito como «grandes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑπόστρεφε
  english_pob_choice: Return
  chosen_spanish: Regresa
  alternatives_spanish:
  - Vuelve
  - Retorna
  lexicon: BDAG
  rationale: El imperativo presente expresa la acción de volver al lugar de origen; «regresa» es natural en español y conserva el sentido directivo sin volverse arcaico.
- source_word: εἰς τὸν οἶκόν σου
  english_pob_choice: to your house
  chosen_spanish: a tu casa
  alternatives_spanish:
  - a tu hogar
  - a tu casa y familia
  lexicon: BDAG
  rationale: οἶκος aquí tiene sentido espacial de casa; «casa» reproduce bien ese valor y suena más directo que una paráfrasis como «hogar».
- source_word: διηγοῦ
  english_pob_choice: tell
  chosen_spanish: cuenta
  alternatives_spanish:
  - relata
  - narra
  lexicon: BDAG
  rationale: διηγέομαι implica relatar o contar en detalle; «cuenta» comunica bien la instrucción en español sin elevar innecesariamente el registro.
- source_word: ὅσα σοι ἐποίησεν ὁ θεός
  english_pob_choice: what God has done for you
  chosen_spanish: lo que Dios ha hecho por ti
  alternatives_spanish:
  - todo lo que Dios ha hecho por ti
  - cuánto ha hecho Dios por ti
  lexicon: BDAG
  rationale: La construcción griega expresa «lo que / cuanto» ha hecho Dios; en español «lo que Dios ha hecho por ti» conserva la apertura semántica sin añadir «grandes cosas», que no está explícito en el texto.
- source_word: ἀπῆλθεν
  english_pob_choice: he went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: BDAG
  rationale: El aoristo de ἀπέρχομαι señala salida o alejamiento; «se fue» es la equivalencia más natural y mantiene la narración fluida.
- source_word: καθ’ ὅλην τὴν πόλιν
  english_pob_choice: throughout the whole city
  chosen_spanish: por toda la ciudad
  alternatives_spanish:
  - a lo largo de toda la ciudad
  - por toda la población
  lexicon: BDAG
  rationale: La expresión distributiva indica difusión en el ámbito urbano; «por toda la ciudad» comunica bien el alcance sin forzar una construcción pesada.
- source_word: κηρύσσων
  english_pob_choice: proclaiming
  chosen_spanish: proclamando
  alternatives_spanish:
  - anunciando
  - predicando
  lexicon: BDAG
  rationale: κηρύσσω mantiene el sentido de proclamación pública; «proclamando» preserva ese tono más fuerte que «anunciando» y evita el matiz eclesiástico de «predicando».
- source_word: ὅσα ἐποίησεν αὐτῷ ὁ Ἰησοῦς
  english_pob_choice: what Jesus had done for him
  chosen_spanish: lo que Jesús había hecho por él
  alternatives_spanish:
  - todo lo que Jesús había hecho por él
  - cuánto había hecho Jesús por él
  lexicon: BDAG
  rationale: La frase paralela reproduce el mismo valor de ὅσα y mantiene la referencia explícita a Jesús; el pluscuamperfecto encaja bien en la secuencia narrativa del relato.
theological_decisions:
- issue: Paralelismo entre «Dios» en la orden y «Jesús» en la proclamación
  english_pob_reading: 'Preserve the wording exactly as a narrative parallel: God has done for you / Jesus had done for him'
  chosen_spanish_reading: 'Mantener el paralelismo narrativo: Dios ha hecho por ti / Jesús había hecho por él'
  alternative_spanish_readings:
  - Armonizar ambas cláusulas como «Dios»
  - Armonizar ambas cláusulas como «Jesús»
  - Añadir una glosa explicativa como «es decir, Jesús»
  rationale: 'Lucas conserva la tensión teológica sin explicarla: en la primera cláusula se menciona a Dios, y en la segunda a Jesús. El español debe preservar ese paralelismo sin resolverlo ni añadir aclaraciones que el texto no da.'
  doctrine_reference: Principio de fidelidad narrativa y preservación de la tensión teológica del texto; cf. afirmaciones doctrinales del POB sobre no resolver ambigüedades redaccionales sin base textual.
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del audit trail al no introducir «grandes cosas», porque el griego no incluye un adjetivo explícito. También conserva el paralelismo Dios/Jesús tal como aparece en el texto griego y en el POB inglés revisado.
  spanish_consistency_notes:
  - Se usa «Dios» y «Jesús» de manera consistente con el texto griego, sin armonizar ambas menciones.
  - Se eligió «proclamando» para κηρύσσων por su fuerza pública y su neutralidad frente a «predicando».
  - Se mantiene «casa» para οἶκος por el contexto espacial de regreso al hogar.
  - No se añadió ninguna intensificación como «grandes» para ὅσα, en coherencia con la revisión más reciente del POB inglés.
