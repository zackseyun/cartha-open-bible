translation:
  language: es
  text: Y navegaron a la región de los Gerasenos[a], que está al otro lado de Galilea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos y pasajes paralelos del Evangelio leen «Gadarenos» o «Gergesenos».
    reason: textual_variant
lexical_decisions:
- source_word: κατέπλευσαν
  english_pob_choice: sailed
  chosen_spanish: navegaron
  alternatives_spanish:
  - sailaron
  - llegaron por barco
  - arribaron
  lexicon: BDAG
  rationale: El verbo griego indica llegada por agua. En español, «navegaron» conserva el medio de transporte sin introducir una dirección no explicitada en la revisión inglesa. «Llegaron por barco» es más explicativo, pero menos directo.
- source_word: χώραν
  english_pob_choice: region
  chosen_spanish: región
  alternatives_spanish:
  - tierra
  - territorio
  - país
  lexicon: BDAG
  rationale: χώρα designa un distrito o zona, no un país en sentido moderno. «Región» refleja bien ese valor y mantiene el estilo natural del texto.
- source_word: Γερασηνῶν
  english_pob_choice: Gerasenes
  chosen_spanish: gerasenos
  alternatives_spanish:
  - habitantes de Gerasa
  lexicon: BDAG
  rationale: Se conserva el etnónimo por transliteración, como en la decisión inglesa. En español, el gentilicio en minúscula funciona como nombre colectivo de lugar/pueblo.
- source_word: ἥτις
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  - la cual es
  - que es
  lexicon: BDAG
  rationale: La relativa descriptiva puede expresarse naturalmente con «que» en español. No hace falta expandir su matiz cualitativo más allá de lo que el griego exige.
- source_word: ἀντιπέρα
  english_pob_choice: opposite
  chosen_spanish: al otro lado de
  alternatives_spanish:
  - frente a
  - enfrente de
  - opuesto a
  lexicon: BDAG
  rationale: «ἀντιπέρα» señala estar en la orilla o lado opuesto. «Al otro lado de» es idiomático en español y mantiene la relación espacial sin sonar técnico.
- source_word: Γαλιλαίας
  english_pob_choice: Galilee
  chosen_spanish: Galilea
  alternatives_spanish:
  - la Galilea
  lexicon: BDAG
  rationale: Se mantiene el topónimo tradicional transliterado al español, con la forma usual «Galilea».
theological_decisions:
- issue: Variante textual/geográfica en el nombre del lugar
  english_pob_reading: Gerasenes
  chosen_spanish_reading: gerasenos
  alternative_spanish_readings:
  - gadarenos
  - gergesenos
  rationale: El texto base griego lee Γερασηνῶν, por lo que el texto principal sigue esa lectura. Las otras formas se preservan como variante textual conocida en pasajes paralelos y manuscritos, sin armonizar el versículo.
  doctrine_reference: crítica textual de los Evangelios sinópticos
translation_notes:
  revision_awareness: La versión inglesa más reciente eliminó «down» de «sailed down», dejando solo «sailed». Por eso el español evita añadir una noción direccional extra y opta por una formulación sencilla de llegada por agua. También se mantuvo la nota textual sobre las variantes del nombre del lugar, conforme al aparato inglés.
  spanish_consistency_notes:
  - Se usa «Galilea» como topónimo fijo en español.
  - Se mantuvo el etnónimo en minúscula dentro de la frase, en concordancia con el uso español habitual para nombres de pueblos/regiones en contexto descriptivo.
  - No se introdujo «SEÑOR» ni otra sustitución teológica porque no aparece el nombre divino en este versículo.
