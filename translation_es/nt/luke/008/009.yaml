lexical_decisions:
- source_word: Ἐπηρώτων
  english_pob_choice: asked
  chosen_spanish: le preguntaban
  alternatives_spanish:
  - le preguntaron
  - le preguntaban insistentemente
  lexicon: BDAG
  rationale: El imperfecto griego sugiere acción en curso o repetida; en español, el imperfecto 'preguntaban' conserva ese matiz mejor que un pretérito simple. Se añade el complemento 'le' para reflejar αὐτόν de manera natural en español.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora bien
  - Pero
  lexicon: BDAG
  rationale: δέ funciona como conector leve. 'Entonces' mantiene el flujo narrativo sin introducir contraste más fuerte del que exige el griego.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  - sus aprendices
  lexicon: BDAG
  rationale: '''Discípulos'' es el equivalente idiomático y teológicamente estable para μαθηταί. El posesivo ''sus'' refleja αὐτοῦ de forma natural en español.'
- source_word: τίς ... ἡ παραβολή
  english_pob_choice: what this parable meant
  chosen_spanish: qué significaba esta parábola
  alternatives_spanish:
  - qué era esta parábola
  - qué podría ser esta parábola
  lexicon: BDAG
  rationale: La pregunta indirecta no pide identidad de la parábola sino su sentido. 'Significaba' comunica en español la interpretación solicitada, como hace la POB en inglés con 'meant'.
- source_word: εἴη
  english_pob_choice: meant
  chosen_spanish: significaba
  alternatives_spanish:
  - era
  - podría ser
  lexicon: BDAG
  rationale: El optativo en discurso indirecto tras un verbo en pasado expresa una consulta sobre el sentido de la parábola. En español, 'significaba' transmite esa intención con claridad y naturalidad.
- source_word: παραβολή
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - comparación
  - ilustración
  lexicon: BDAG
  rationale: '''Parábola'' es el término más preciso y reconocido para παραβολή en el contexto de los Evangelios.'
theological_decisions:
- issue: Valor interpretativo de la pregunta de los discípulos
  english_pob_reading: what this parable meant
  chosen_spanish_reading: qué significaba esta parábola
  alternative_spanish_readings:
  - qué era esta parábola
  - qué podría ser esta parábola
  rationale: La formulación sigue la lectura de la POB de que la pregunta es sobre el significado y no sobre la identidad del relato. En español, 'significaba' preserva el carácter interpretativo del pedido.
  doctrine_reference: Hermenéutica de las parábolas en los Evangelios
translation_notes:
  revision_awareness: Coincide con la revisión más reciente indicada como sin cambios; no se detectan ajustes adicionales necesarios respecto del testimonio griego y la decisión auditada en inglés.
  spanish_consistency_notes:
  - Se mantuvo el sujeto explícito 'sus discípulos' para claridad narrativa.
  - Se conservó el imperfecto español 'preguntaban' para reflejar el aspecto iterativo del griego.
  - Se evitó una traducción demasiado literal de la estructura interrogativa que sonara antinatural en español.
  - Se usó 'parábola' de manera consistente con el vocabulario estándar de los Evangelios.
