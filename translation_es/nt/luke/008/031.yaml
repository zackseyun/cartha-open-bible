translation:
  language: es
  text: Y le rogaban que no les ordenara ir al abismo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la profundidad». El término griego puede denotar una gran profundidad; aquí probablemente alude al abismo como lugar de confinamiento para espíritus malignos.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκάλουν
  english_pob_choice: were begging
  chosen_spanish: le rogaban
  alternatives_spanish:
  - le suplicaban
  - le imploraban
  - le insistían
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción continua o repetida; en español, el imperfecto «rogaban» conserva bien esa insistencia sostenida. «Rogar» comunica súplica urgente sin la posible sobrecarga moderna de «mendigar» y sin perder dignidad narrativa.
- source_word: ἐπιτάξῃ
  english_pob_choice: command
  chosen_spanish: ordenara
  alternatives_spanish:
  - mandara
  - diera la orden de
  - comandara
  lexicon: BDAG
  rationale: El verbo denota mandato con autoridad. «Ordenara» mantiene ese valor imperativo y suena natural en español bíblico contemporáneo. «Mandara» es posible, pero puede ser algo más coloquial y menos preciso en contextos de autoridad formal.
- source_word: ἄβυσσον
  english_pob_choice: the abyss
  chosen_spanish: abismo
  alternatives_spanish:
  - el abismo
  - la profundidad
  - el fondo sin fondo
  lexicon: BDAG
  rationale: En español, «abismo» es la equivalencia más directa de ἄβυσσος y preserva la dimensión cósmico-espiritual que el contexto sugiere. Se evita «la profundidad» porque diluye la referencia sobrenatural; también se evita «foso sin fondo» por ser más interpretativo.
- source_word: ἀπελθεῖν
  english_pob_choice: to go
  chosen_spanish: ir
  alternatives_spanish:
  - marcharse
  - salir
  - alejarse
  lexicon: BDAG
  rationale: El infinitivo de movimiento se expresa de manera natural con «ir». El complemento «al abismo» ya aporta la dirección, así que no hace falta añadir matices como «alejarse».
- source_word: ἵνα μὴ
  english_pob_choice: not to
  chosen_spanish: que no
  alternatives_spanish:
  - para que no
  - a fin de que no
  - 'no'
  lexicon: BDAG
  rationale: Tras un verbo de súplica, ἵνα con subjuntivo introduce el contenido de lo pedido. En español, «le rogaban que no...» es idiomático y conserva la relación subordinada sin forzar una construcción demasiado literal.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: El dativo se refleja naturalmente en español con el pronombre átono «les». En combinación con «ordenara», la frase resulta fluida y mantiene la relación indirecta del griego.
theological_decisions:
- issue: Sentido de ἄβυσσος en contexto demoníaco
  english_pob_reading: the abyss as the place of supernatural confinement/judgment for evil spirits
  chosen_spanish_reading: el abismo como lugar de confinamiento sobrenatural para los espíritus malignos
  alternative_spanish_readings:
  - el abismo en sentido meramente profundo o espacial
  - la profundidad
  rationale: El contexto inmediato trata de demonios pidiendo a Jesús que no los envíe allí; por eso conviene conservar «abismo» sin suavizarlo. Así se mantiene la tensión teológica del texto y la posibilidad de una referencia a confinamiento espiritual, sin especificar más de lo que Lucas dice.
  doctrine_reference: Preservar la tensión teológica del pasaje; primacía del original sobre una explicación traductora cerrada.
translation_notes:
  revision_awareness: El texto fuente y el audit trail en inglés presentan alta concordancia y no registran revisiones aplicadas; la redacción española sigue esa lectura estable, manteniendo la fuerza aspectual del imperfecto, el valor autoritativo de ἐπιτάξῃ y la ambigüedad teológica de ἄβυσσος sin ampliarla indebidamente.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente e impersonal con «le»/«les», acorde con la escena y con el plural implícito del sujeto.
  - «Rogaban» conserva el aspecto progresivo del imperfecto griego, en paralelo con el inglés auditado «were begging».
  - «Abismo» se usa de manera consistente como término técnico-teológico, evitando sustituciones por «profundidad» en el cuerpo principal.
