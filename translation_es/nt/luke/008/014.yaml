revisions:
- from: Y el que cayó entre los espinos[a]—estos son los que han oído, pero mientras van por su camino son ahogados por los afanes, las riquezas y los placeres de la vida[b], y no llevan fruto hasta la madurez.
  to: Y el que cayó entre los espinos—estos son los que han oído, pero mientras van por su camino son sofocados por las preocupaciones[a], las riquezas y los placeres de la vida, y no llevan fruto hasta la madurez[b].
  rationale: Se reubica la nota [a] al término correcto y se adopta «preocupaciones» por mayor claridad en español neutro. También se cambia «son ahogados» por «son sofocados» para una metáfora agrícola más natural, manteniendo el sentido pasivo de συμπνίγονται. La nota [b] se ancla a la frase final, donde pertenece semánticamente.
