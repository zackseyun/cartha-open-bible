translation:
  language: es
  text: Y el que cayó entre los espinos—estos son los que han oído, pero mientras van por su camino son sofocados por las preocupaciones[a], las riquezas y los placeres de la vida, y no llevan fruto hasta la madurez[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «afanes» o «ansiedades».
    reason: lexical_alternative
  - marker: b
    text: O «no producen fruto maduro» o «no llevan fruto a término».
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ... πεσόν
  english_pob_choice: the one that fell
  chosen_spanish: el que cayó
  alternatives_spanish:
  - lo que cayó
  - la semilla que cayó
  lexicon: BDAG
  rationale: El participio neutro singular se refiere al caso del terreno/semilla en la parábola. En español, «el que cayó» reproduce el giro explicativo de la POB inglesa sin añadir «semilla» que no aparece en el enunciado griego.
- source_word: ἀκάνθας
  english_pob_choice: thorns
  chosen_spanish: espinos
  alternatives_spanish:
  - zarzas
  - matorrales espinosos
  lexicon: BDAG
  rationale: «Espinos» es la forma natural y directa en español para el contexto parabólico, y preserva la imagen agrícola sin sobreespecificarla.
- source_word: οὗτοί εἰσιν οἱ ἀκούσαντες
  english_pob_choice: these are those who have heard
  chosen_spanish: estos son los que han oído
  alternatives_spanish:
  - estos son los que oyeron
  - estos son los que escucharon
  lexicon: BDAG
  rationale: El aoristo participial marca una acción ya realizada; «han oído» funciona bien en español explicativo y mantiene el sentido de recepción del mensaje. «Oído» conserva mejor la neutralidad que «escuchado» en este contexto.
- source_word: ὑπὸ μεριμνῶν
  english_pob_choice: by the cares
  chosen_spanish: por los afanes
  alternatives_spanish:
  - por las preocupaciones
  - por las ansiedades
  lexicon: BDAG
  rationale: μέριμνα puede ser «preocupaciones» o «ansiedades», pero «afanes» recoge bien el peso absorbente de la idea y suena más amplio en español bíblico sin volverse arcaizante.
- source_word: πλούτου
  english_pob_choice: riches
  chosen_spanish: las riquezas
  alternatives_spanish:
  - la riqueza
  - el dinero
  lexicon: BDAG
  rationale: El plural griego se vierte naturalmente con «las riquezas», que conserva la fuerza material y la lista triádica junto con afanes y placeres.
- source_word: ἡδονῶν τοῦ βίου
  english_pob_choice: pleasures of life
  chosen_spanish: los placeres de la vida
  alternatives_spanish:
  - los placeres de esta vida
  - las delicias de la vida
  lexicon: BDAG
  rationale: «Placeres de la vida» es la equivalencia más directa y transparente; «de la vida» preserva el genitivo sin interpretar en exceso βίος.
- source_word: πορευόμενοι
  english_pob_choice: as they go on their way
  chosen_spanish: mientras van por su camino
  alternatives_spanish:
  - mientras avanzan
  - al ir por el camino
  lexicon: BDAG
  rationale: La participio presente expresa proceso continuo. «Mientras van por su camino» comunica el transcurso sin forzar una alegoría ampliada; además suena natural en español.
- source_word: συμπνίγονται
  english_pob_choice: they are choked
  chosen_spanish: son ahogados
  alternatives_spanish:
  - son asfixiados
  - se ahogan
  lexicon: BDAG
  rationale: El verbo mantiene la metáfora de estrangulamiento/sofocación. «Son ahogados» reproduce la pasividad y el impacto de la imagen, aun cuando en español moderno suene más fuerte que «son sofocados».
- source_word: οὐ τελεσφοροῦσιν
  english_pob_choice: they do not bear fruit to maturity
  chosen_spanish: no llevan fruto hasta la madurez
  alternatives_spanish:
  - no dan fruto maduro
  - no producen fruto hasta su madurez
  - no llevan fruto a término
  lexicon: BDAG
  rationale: τελεσφορέω expresa llevar a término o completar el fruto. «No llevan fruto hasta la madurez» conserva la metáfora agrícola y la idea de fruto incompleto, sin resolverla en una formulación más interpretativa.
theological_decisions:
- issue: Destino espiritual de los oyentes representados por la tierra espinosa
  english_pob_reading: The translation preserves the agricultural metaphor of being choked and failing to bear fruit to maturity without specifying a doctrinal conclusion about apostasy, false conversion, or loss of reward.
  chosen_spanish_reading: La traducción conserva la metáfora agrícola de ser ahogados y de no llegar a la madurez del fruto, sin precisar si el texto enseña apostasía, falsa conversión o pérdida de recompensa.
  alternative_spanish_readings:
  - Los oyentes muestran que nunca fueron regenerados
  - Los oyentes son creyentes verdaderos que luego dejan de dar fruto
  - Los oyentes comienzan bien pero luego se apartan
  rationale: El versículo describe el efecto de los afanes, las riquezas y los placeres sobre los oyentes, pero no cierra por sí mismo los debates posteriores sobre perseverancia o regeneración. La redacción española debe preservar esa tensión en lugar de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto griego y coincide con la revisión inglesa más reciente, que no requirió cambios. Se mantiene la misma decisión interpretativa: preservar el cuadro agrícola y la ambigüedad teológica del pasaje.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «afanes» para μέριμναι por coherencia con el registro bíblico español y con la alternativa inglesa «cares/worries».
  - Se conserva la tríada «afanes, riquezas y placeres de la vida» para reflejar el encadenamiento griego de sustantivos genitivos.
  - «No llevan fruto hasta la madurez» conserva la imagen de fruto y evita reemplazarla por una explicación doctrinal.
