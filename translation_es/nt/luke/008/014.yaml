    text: O «afanes» o «ansiedades».
    reason: lexical_alternative
  - marker: b
    text: O «no producen fruto maduro» o «no llevan fruto a término».
    reason: lexical_alternative
  revision_rationale: Se reubica la nota [a] al término correcto y se adopta «preocupaciones» por mayor claridad en español neutro. También se cambia «son ahogados» por «son sofocados» para una metáfora agrícola más natural, manteniendo el sentido pasivo de συμπνίγονται. La nota [b] se ancla a la frase final, donde pertenece semánticamente.
