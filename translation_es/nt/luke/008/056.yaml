translation:
  language: es
  text: Y sus padres quedaron asombrados[a]; pero él les ordenó[b] que no dijeran a nadie lo que había sucedido[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «quedaron maravillados» o «quedaron fuera de sí».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «les mandó» o «les instruyó».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «lo sucedido» o «el acontecimiento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέστησαν
  english_pob_choice: were astonished
  chosen_spanish: quedaron asombrados
  alternatives_spanish:
  - quedaron maravillados
  - quedaron fuera de sí
  lexicon: BDAG
  rationale: El aoristo de ἐξίστημι expresa quedar sobrecogidos por una fuerte sorpresa. «Quedaron asombrados» comunica bien esa reacción en español actual sin volverla exageradamente coloquial. Mantiene la intensidad sin cerrar del todo la posibilidad de matices como estupor o desconcierto.
- source_word: γονεῖς
  english_pob_choice: parents
  chosen_spanish: los padres de ella
  alternatives_spanish:
  - sus padres
  - el padre y la madre de ella
  lexicon: BDAG
  rationale: γονεῖς es el plural normal para «padres». En español, «los padres de ella» evita la ambigüedad posible de «sus padres» y refleja con claridad la referencia anafórica del pronombre.
- source_word: παρήγγειλεν
  english_pob_choice: instructed
  chosen_spanish: les instruyó
  alternatives_spanish:
  - les ordenó
  - les mandó
  - les encargó
  lexicon: BDAG
  rationale: παραγγέλλω puede significar ordenar, mandar o instruir. «Les instruyó» conserva el valor directivo sin cargar innecesariamente el tono con una dureza que el contexto no exige. El complemento infinitivo desarrolla el contenido de la instrucción.
- source_word: μηδενὶ
  english_pob_choice: no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - a nadie en absoluto
  - a ninguno
  lexicon: BDAG
  rationale: El dativo con εἰπεῖν se expresa naturalmente en español con «a nadie». Es idiomático y mantiene la prohibición universal del enunciado.
- source_word: εἰπεῖν
  english_pob_choice: to tell
  chosen_spanish: dijeran
  alternatives_spanish:
  - contaran
  - hablaran
  lexicon: BDAG
  rationale: 'Aunque el inglés POB usa «to tell», en español el infinitivo dependiente de «instruyó» se expresa con «dijeran» en esta construcción negativa: «que no dijeran a nadie». Esto mantiene la fuerza comunicativa de λέγω sin sonar forzado.'
- source_word: τὸ γεγονός
  english_pob_choice: what had happened
  chosen_spanish: lo que había sucedido
  alternatives_spanish:
  - lo ocurrido
  - lo que había pasado
  - el acontecimiento
  lexicon: BDAG
  rationale: El participio perfecto sustantivado señala la cosa que llegó a ocurrir. «Lo que había sucedido» es claro, natural y conserva el valor de evento ya completado con relevancia en el contexto inmediato.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora bien
  lexicon: BDAG
  rationale: δέ marca contraste leve entre el asombro de los padres y la instrucción de Jesús. «Pero» reproduce ese contraste de manera directa y fluida en español.
theological_decisions:
- issue: Secreto mesiánico / alcance de la prohibición
  english_pob_reading: Render the statement straightforwardly as a directive not to tell anyone what had happened, without importing a broader theological explanation into the translation.
  chosen_spanish_reading: 'La traducción presenta la orden de manera directa: no decir a nadie lo sucedido, sin añadir una explicación sobre motivo o duración.'
  alternative_spanish_readings:
  - Interpretar la frase como una orden de silencio vinculada al tema del secreto mesiánico
  - Interpretarla como una instrucción temporal limitada al círculo inmediato
  rationale: El versículo sólo afirma la instrucción y su contenido. La versión española debe preservar esa sobriedad y dejar abierta la tensión teológica, sin resolverla ni amplificarla.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y coincide con el sentido ya auditado en la versión inglesa POB. No se introdujeron revisiones textuales ni cambios doctrinales; se ajustó la sintaxis al español natural manteniendo la fuerza de la orden y la reacción emocional.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» sin incidencia en este versículo.
  - Se preserva el registro sobrio y narrativo, sin ampliar el motivo de la orden de silencio.
  - La elección «lo que había sucedido» conserva el matiz perfecto del participio γεγονός con fluidez en español.
