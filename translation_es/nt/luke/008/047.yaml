translation:
  language: es
  text: Y cuando la mujer vio que no había pasado inadvertida[a], vino temblando y, postrándose delante de él[b], declaró ante todo el pueblo por qué le había tocado y cómo había sido sanada al instante[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no había quedado oculta» o «no había pasado desapercibida».
    reason: lexical_alternative
  - marker: b
    text: O «cayendo delante de él». El griego dice «cayendo delante de él» sin mencionar explícitamente los pies.
    reason: lexical_alternative
  - marker: c
    text: O «cómo había sido curada al instante».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοῦσα
  english_pob_choice: when ... saw
  chosen_spanish: cuando vio
  alternatives_spanish:
  - al ver
  - habiendo visto
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia temporal de la acción principal. «Cuando vio» expresa de forma natural esa relación temporal en español sin perder el valor de antecedente.
- source_word: οὐκ ἔλαθεν
  english_pob_choice: had not escaped notice
  chosen_spanish: no había pasado inadvertida
  alternatives_spanish:
  - no había quedado oculta
  - no había quedado sin ser notada
  lexicon: BDAG
  rationale: λανθάνω aquí significa no permanecer oculto ni escapar a la percepción. «No había pasado inadvertida» conserva la idea de haber sido descubierta, con un español idiomático y sobrio.
- source_word: τρέμουσα
  english_pob_choice: trembling
  chosen_spanish: temblando
  alternatives_spanish:
  - estremecida
  - con temor
  lexicon: BDAG
  rationale: El participio presente describe su estado físico y emocional. «Temblando» mantiene la concreción del griego sin interpretar en exceso si el temblor era solo emocional o también corporal.
- source_word: προσπεσοῦσα αὐτῷ
  english_pob_choice: falling down before him
  chosen_spanish: postrándose delante de él
  alternatives_spanish:
  - cayendo delante de él
  - arrojándose delante de él
  lexicon: BDAG
  rationale: προσπίπτω expresa caer delante de alguien en actitud de súplica o reverencia. «Postrándose delante de él» comunica bien esa postura en español, sin añadir explícitamente «pies», que el griego no menciona.
- source_word: δι’ ἣν αἰτίαν
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - por qué razón
  - por la cual
  lexicon: BDAG
  rationale: La expresión significa «por qué motivo/causa». «Por qué» es la forma natural y precisa en español para introducir la razón de su acción.
- source_word: ἥψατο αὐτοῦ
  english_pob_choice: had touched him
  chosen_spanish: le había tocado
  alternatives_spanish:
  - lo había tocado
  - había tocado a él
  lexicon: BDAG
  rationale: ἅπτομαι con genitivo significa tocar. El pluscuamperfecto español refleja adecuadamente la relación anterior respecto de su declaración, como indica la revisión del texto inglés POB.
- source_word: ἀπήγγειλεν
  english_pob_choice: declared
  chosen_spanish: declaró
  alternatives_spanish:
  - contó
  - informó
  - anunció
  lexicon: BDAG
  rationale: El verbo tiene el sentido de comunicar o referir públicamente. «Declaró» encaja con el marco solemne y público del versículo, sin exagerar hacia una formulación doctrinal.
- source_word: ἐνώπιον παντὸς τοῦ λαοῦ
  english_pob_choice: before all the people
  chosen_spanish: ante todo el pueblo
  alternatives_spanish:
  - en presencia de todo el pueblo
  - delante de todo el pueblo
  lexicon: BDAG
  rationale: ἐνώπιον indica estar en presencia de. «Ante todo el pueblo» reproduce bien esa exposición pública con un giro natural en español.
- source_word: ὡς ἰάθη
  english_pob_choice: how she had been healed
  chosen_spanish: cómo había sido sanada
  alternatives_spanish:
  - cómo había sido curada
  - cómo fue sanada
  lexicon: BDAG
  rationale: ὡς introduce el contenido de lo que declara, es decir, el hecho y la manera de su curación. «Sanada» conserva el registro bíblico de sanidad; se prefiere la pasiva perifrástica para reflejar el resultado previo a su relato.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: El adverbio señala inmediatez. «Al instante» es claro, natural y conserva el énfasis lucano en la rapidez del hecho.
theological_decisions:
- issue: Carácter de la confesión pública de la mujer
  english_pob_reading: The verse is translated descriptively, without importing repentance or worship language beyond what the Greek states.
  chosen_spanish_reading: El versículo se traduce de manera descriptiva, sin introducir lenguaje de arrepentimiento o adoración que el griego no expresa explícitamente.
  alternative_spanish_readings:
  - Ella se arrepintió y lo confesó públicamente.
  - Ella lo adoró explícitamente al postrarse.
  rationale: El texto habla de su acercamiento tembloroso, su postura al caer delante de Jesús y su declaración pública; no añade términos explícitos de arrepentimiento o adoración. La traducción preserva esa tensión narrativa sin expandirla doctrinalmente.
  doctrine_reference: Principio de no ampliar el sentido más allá de la evidencia textual; traducción descriptiva de la narrativa
- issue: Relación temporal del hecho de sanar con la declaración
  english_pob_reading: how she had been healed immediately
  chosen_spanish_reading: cómo había sido sanada, al instante
  alternative_spanish_readings:
  - cómo fue sanada, al instante
  - cómo la habían sanado al instante
  rationale: La revisión del inglés POB subraya que la sanidad precede al acto de declarar. El pluscuamperfecto español («había sido sanada») mantiene esa anterioridad, y «al instante» conserva el énfasis del adverbio final.
  doctrine_reference: Coherencia temporal del relato y respeto al valor aspectual del griego
translation_notes:
  revision_awareness: El inglés POB fue revisado para preferir «had been healed» en lugar de «was healed», de modo que la secuencia temporal quede más clara. La versión española sigue esa revisión con «había sido sanada» y mantiene el resto del versículo estrechamente alineado con la decisión auditada, sin añadir contenido doctrinal nuevo.
  spanish_consistency_notes:
  - Se mantiene «Jesús» implícito mediante el pronombre «él», como en el contexto inmediato del versículo.
  - Se traduce λανθάνω con un giro idiomático de visibilidad/descubrimiento, sin perder la idea de «no quedar oculta».
  - «Sanada» se prefiere por el registro bíblico y por coherencia con el campo semántico de ἰάομαι en narrativas de curación.
  - La puntuación reproduce el encadenamiento narrativo del griego y la versión inglesa auditada, con coma tras la cláusula inicial y antes de la declaración pública.
