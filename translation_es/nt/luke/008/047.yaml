  text: ἰδοῦσα δὲ ἡ γυνὴ ὅτι οὐκ ἔλαθεν τρέμουσα ἦλθεν καὶ προσπεσοῦσα αὐτῷ δι’ ἣν αἰτίαν ἥψατο αὐτοῦ ⸀ἀπήγγειλεν ἐνώπιον παντὸς τοῦ λαοῦ καὶ ὡς ἰάθη παραχρῆμα.
base_translation:
  language: en
  yaml_path: translation/nt/luke/008/047.yaml
  text: And when the woman saw that she had not escaped notice[a], she came trembling, and falling down before him[b], declared before all the people why she had touched him and how she had been healed immediately.
  footnotes:
  - marker: a
    text: Or 'had not gone unnoticed' or 'was not hidden.'
    reason: lexical_alternative
  - marker: b
    text: Or 'falling at his feet before him.' The Greek says 'falling before him' without explicitly mentioning feet.
    reason: lexical_alternative
