review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido general del griego: la mujer ve que no pasó inadvertida, viene temblando, cae delante de Jesús, declara públicamente por qué lo tocó y cómo fue sanada de inmediato. Sin embargo, la colocación de «al instante» separada por coma al final suena menos natural en español y deja ambigüedad sobre si modifica «declaró» o «había sido sanada». Conviene integrarlo directamente con la sanidad: «cómo había sido sanada al instante».'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «No había pasado inadvertida», «temblando», «delante de él» y «ante todo el pueblo» funcionan bien. «Postrándose» es defendible, aunque algo más interpretativo que «cayendo»; queda mitigado por la nota. El principal problema de legibilidad es la puntuación de «cómo había sido sanada[c], al instante», que resulta torpe y menos idiomática.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El versículo no contiene términos sensibles del glosario general como Yahvé, Mesías, esclavo, etc. «Sanada» concuerda bien con ἰάθη en contexto narrativo de curación.
  issues:
  - severity: medium
    issue: Ubicación y puntuación de «al instante»
    rationale: παραχρῆμα modifica la sanidad inmediata; en español, «cómo había sido sanada[c], al instante» suena forzado y puede leerse como si «al instante» modificara la declaración. Integrarlo sin coma preserva mejor el sentido fuente y mejora la naturalidad.
  - severity: low
    issue: Nota b no refleja exactamente la elección principal
    rationale: El texto principal usa «postrándose delante de él», pero la nota alternativa explica «cayendo delante de él» como si fuera el sentido literal del griego. Es mejor explicitar que el griego dice «cayendo delante de él» y que «postrándose» es una formulación interpretativa-natural en español.
  - severity: low
    issue: Nota c es innecesaria pero aceptable
    rationale: La alternativa «curada» no añade una diferencia exegética importante. Puede mantenerse, pero no es estrictamente necesaria. Si se conserva, debe anclarse al lugar correcto tras la frase revisada.
  revised_spanish_text: Y cuando la mujer vio que no había pasado inadvertida[a], vino temblando y, postrándose delante de él[b], declaró ante todo el pueblo por qué le había tocado y cómo había sido sanada al instante[c].
  revised_footnotes:
  - marker: a
    text: O «no había quedado oculta» o «no había pasado desapercibida».
    reason: lexical_alternative
  - marker: b
    text: O «cayendo delante de él». El griego dice «cayendo delante de él» sin mencionar explícitamente los pies.
    reason: lexical_alternative
  - marker: c
    text: O «cómo había sido curada al instante».
    reason: lexical_alternative
  revision_rationale: Se ajustó la colocación de «al instante» para que modifique de manera clara y natural la sanidad, como en el griego, y se suavizó la puntuación para mejorar la fluidez del español sin alterar el contenido. También se alineó la nota final con la frase revisada.
