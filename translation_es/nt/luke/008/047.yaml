revisions:
- from: Y cuando la mujer vio que no había pasado inadvertida[a], vino temblando, y, postrándose delante de él[b], declaró ante todo el pueblo por qué le había tocado y cómo había sido sanada[c], al instante.
  to: Y cuando la mujer vio que no había pasado inadvertida[a], vino temblando y, postrándose delante de él[b], declaró ante todo el pueblo por qué le había tocado y cómo había sido sanada al instante[c].
  rationale: Se ajustó la colocación de «al instante» para que modifique de manera clara y natural la sanidad, como en el griego, y se suavizó la puntuación para mejorar la fluidez del español sin alterar el contenido. También se alineó la nota final con la frase revisada.
