translation:
  language: es
  text: Y otra semilla cayó entre las espinas[a], y las espinas crecieron junto con ella[b] y la ahogaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en medio de las espinas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las espinas, creciendo junto con ella, la ahogaron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτερον
  english_pob_choice: other seed
  chosen_spanish: otro
  alternatives_spanish:
  - otro grano
  - otra semilla
  lexicon: BDAG
  rationale: El griego usa un neutro singular sustantivado, y el contexto inmediato ya habla de la semilla; en español, 'otro' basta de manera natural sin añadir un sustantivo que el texto no expresa explícitamente.
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - cayó
  - se cayó
  lexicon: BDAG
  rationale: El aoristo de πίπτω se expresa con un verbo simple de movimiento descendente. 'Cayó' es claro, natural y fiel al acto narrativo.
- source_word: ἐν μέσῳ τῶν ἀκανθῶν
  english_pob_choice: among the thorns
  chosen_spanish: en medio de las espinas
  alternatives_spanish:
  - entre las espinas
  - en medio de las espinas
  lexicon: BDAG
  rationale: '''En medio de'' conserva de forma directa la imagen espacial del griego. ''Espinas'' mantiene la referencia a vegetación espinosa; ''entre las espinas'' sería idiomático, pero aquí se conserva la formulación más cercana al original.'
- source_word: ἀκανθῶν / αἱ ἄκανθαι
  english_pob_choice: the thorns
  chosen_spanish: las espinas
  alternatives_spanish:
  - las espinas
  - los espinos
  - las zarzas
  lexicon: BDAG
  rationale: Ἄκανθα puede referirse a plantas espinosas o a espinas. 'Espinas' es suficientemente preciso en español bíblico contemporáneo y evita restringir innecesariamente la imagen a un tipo específico de planta.
- source_word: συμφυεῖσαι
  english_pob_choice: grew up with it
  chosen_spanish: al crecer junto con él
  alternatives_spanish:
  - creciendo junto con él
  - al crecer con él
  lexicon: BDAG
  rationale: El participio comunica crecimiento simultáneo o en compañía de la semilla. 'Al crecer junto con él' conserva esa idea relacional y competitiva sin sobretraducir.
- source_word: ἀπέπνιξαν
  english_pob_choice: choked
  chosen_spanish: lo ahogaron
  alternatives_spanish:
  - lo ahogaron
  - lo sofocaron
  - lo asfixiaron
  lexicon: BDAG
  rationale: ἀποπνίγω significa ahogar, sofocar o asfixiar. En una imagen agrícola, 'lo ahogaron' comunica bien la acción de impedir su crecimiento vital y mantiene la fuerza metafórica del griego.
- source_word: αὐτό
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - lo
  - la
  lexicon: BDAG
  rationale: El pronombre retoma la semilla implícita; en español, el objeto directo masculino singular 'lo' es el equivalente pronominal estándar para el referente implícito en esta construcción.
theological_decisions:
- issue: 'Intensidad de la imagen final: ''choke'' / ''ahogaron'''
  english_pob_reading: The thorns grew up with it and choked it.
  chosen_spanish_reading: las espinas, al crecer junto con él, lo ahogaron
  alternative_spanish_readings:
  - las espinas crecieron junto con él y lo ahogaron
  - las espinas, creciendo junto con él, lo sofocaron
  rationale: No hay una decisión doctrinal explícita, pero sí una tensión de imagen entre 'choke' y un verbo que sugiera muerte física. 'Ahogaron' conserva la fuerza del griego ἀποπνίγω sin exagerar más allá de la metáfora agrícola; el contexto de la parábola habla de impedir la fructificación, no de describir una muerte literal.
  doctrine_reference: Parábola del sembrador; lectura contextual de las metáforas agrícolas en los Evangelios.
translation_notes:
  revision_awareness: El pasaje griego y el audit trail inglés presentan alta concordancia y no requieren cambios sustantivos; se mantuvo la metáfora agrícola y la progresión narrativa, ajustando solo la naturalidad del español y la transparencia del sujeto implícito.
  spanish_consistency_notes:
  - Se preserva 'espinas' como término estable para ἄκανθαι dentro de la parábola.
  - Se mantiene un registro bíblico moderno, sin sustituir la imagen por una paráfrasis explicativa.
  - Los pronombres españoles siguen el referente implícito de 'semilla' sin añadir sustantivos innecesarios.
