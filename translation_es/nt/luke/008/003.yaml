translation:
  language: es
  text: y Juana, la esposa de Cusa, mayordomo de Herodes, y Susana, y muchas otras[b], que les[a] servían de sus bienes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «a él» en vez de «les».
    reason: textual_variant
  - marker: b
    text: O «de sus posesiones» o «de sus medios».
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνὴ
  english_pob_choice: the wife of
  chosen_spanish: la esposa de
  alternatives_spanish:
  - la mujer de
  lexicon: BDAG
  rationale: En esta construcción, γυνή seguido de un nombre en genitivo identifica normalmente la relación conyugal. «Esposa de» comunica con naturalidad esa relación en español y evita la ambigüedad de «mujer de», que puede sonar menos preciso o más coloquial.
- source_word: ἐπιτρόπου
  english_pob_choice: steward
  chosen_spanish: mayordomo
  alternatives_spanish:
  - administrador
  - encargado
  - administrador de la casa
  lexicon: BDAG
  rationale: ἐπίτροπος denota a alguien puesto a cargo de asuntos o bienes. «Mayordomo» conserva la idea de un funcionario doméstico o administrativo al servicio de una autoridad, y resulta natural en español bíblico sin trasladar el término a un ámbito moderno empresarial.
- source_word: Ἡρῴδου
  english_pob_choice: Herod’s
  chosen_spanish: de Herodes
  alternatives_spanish:
  - de Herodes
  lexicon: BDAG
  rationale: 'El genitivo se expresa de forma posesiva en español: Cusa está identificado como el mayordomo al servicio de Herodes.'
- source_word: ἕτεραι πολλαί
  english_pob_choice: many others
  chosen_spanish: muchas otras
  alternatives_spanish:
  - muchas otras mujeres
  - muchas más
  lexicon: BDAG
  rationale: El plural femenino remite a las mujeres mencionadas. «Muchas otras» conserva el referente ya entendido en el contexto y evita recargar el texto con una repetición innecesaria de «mujeres».
- source_word: αἵτινες
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - las cuales
  - quienes
  lexicon: BDAG
  rationale: El relativo introduce la oración descriptiva de estas mujeres. «Que» es la forma más natural y sobria en español para este tipo de cláusula.
- source_word: διηκόνουν
  english_pob_choice: were serving
  chosen_spanish: les servían
  alternatives_spanish:
  - les atendían
  - les prestaban servicio
  - les ministraban
  lexicon: BDAG
  rationale: διακονέω expresa servicio o atención. «Servían» preserva la amplitud semántica sin imponer el matiz eclesial de «ministraban». El dativo de objeto se expresa naturalmente con «les».
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - los
  - lo
  lexicon: NA28/SBLGNT textual tradition
  rationale: El texto griego dado tiene el plural αὐτοῖς, por lo que la traducción refleja el plural con «les», referido de manera más natural a Jesús y a los que iban con él.
- source_word: ἐκ τῶν ὑπαρχόντων αὐταῖς
  english_pob_choice: out of their possessions
  chosen_spanish: con sus bienes
  alternatives_spanish:
  - de sus posesiones
  - de lo que poseían
  - con lo que tenían
  lexicon: BDAG
  rationale: La expresión señala que el apoyo provenía de sus propios recursos. «Con sus bienes» comunica la idea de sostenimiento material de forma clara y digna en español. Como alternativa más literal, «de sus posesiones» queda reflejada en la nota.
theological_decisions:
- issue: Referente de αὐτοῖς
  english_pob_reading: 'plural: the women were serving Jesus and those with him'
  chosen_spanish_reading: 'plural: las mujeres les servían a Jesús y a los que iban con él'
  alternative_spanish_readings:
  - 'singular: las mujeres le servían a él (Jesús)'
  rationale: Se sigue el texto griego suministrado, que usa el plural αὐτοῖς. La traducción conserva ese plural y no lo armoniza con la lectura singular de algunos manuscritos, manteniendo la tensión textual documentada.
  doctrine_reference: Principio de primacía del texto original y preservación de variantes textuales documentadas
- issue: Sentido de διακονέω en un contexto de apoyo material
  english_pob_reading: were serving
  chosen_spanish_reading: les servían con sus bienes
  alternative_spanish_readings:
  - les ministraban
  - les prestaban servicio
  - les atendían
  rationale: El contexto inmediato aclara que el servicio consistía en sostén material. Por eso el texto español deja ver el acto de servir y, a la vez, su concreción económica mediante «con sus bienes», sin convertir el verbo en un término eclesiástico más cargado.
  doctrine_reference: Principio de no sobreinterpretar términos de servicio más allá del contexto inmediato
translation_notes:
  revision_awareness: El registro español sigue de cerca la revisión más reciente del POB en inglés, que prefirió una formulación más formal para la frase final («out of their possessions»). También conserva la decisión auditada de mantener el plural del texto griego en el referente del verbo de servicio, en vez de armonizarlo con la variante singular.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino en otros contextos del proyecto, pero aquí no aparece el Tetragrámaton ni un equivalente contextual.
  - «Mayordomo» fue preferido sobre «administrador» por su cercanía al matiz de funcionario al cargo de bienes o asuntos de otro.
  - «Con sus bienes» comunica de modo natural el apoyo material; la nota preserva la alternativa más literal «de sus posesiones».
  - Se evitó «Cristo» porque no aparece en el versículo.
  - Se mantuvo el plural «les» para respetar el texto griego dado, sin resolver la variante manuscrita en el cuerpo principal.
