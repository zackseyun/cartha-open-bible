translation:
  language: es
  text: Ahora bien, cuando Jesús volvió, la multitud lo recibió[a], porque todos estaban esperándolo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “lo acogió”; ἀποδέχομαι puede indicar una recepción favorable. Aquí el contexto sugiere una bienvenida positiva de la multitud.
    reason: lexical_alternative
  - marker: b
    text: O “porque todos lo estaban esperando”; προσδοκάω puede expresar espera o expectativa. Aquí describe a la multitud aguardando su llegada.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ τῷ ὑποστρέφειν
  english_pob_choice: Now when ... returned
  chosen_spanish: Ahora bien, cuando ... volvió
  alternatives_spanish:
  - Y cuando ... volvió
  - Mientras ... volvía
  lexicon: BDAG
  rationale: La construcción temporal con ἐν + infinitivo articular se expresa de manera natural en español con 'cuando'. 'Ahora bien' conserva el matiz narrativo de δέ como avance de la escena sin sobrecargar el texto.
- source_word: ὑποστρέφειν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - estaba volviendo
  lexicon: BDAG
  rationale: ὑποστρέφω significa 'volver/regresar'. 'Volvió' es breve, natural y transmite una acción completada, en línea con el valor narrativo del pasaje.
- source_word: ἀπεδέξατο
  english_pob_choice: welcomed
  chosen_spanish: lo recibió
  alternatives_spanish:
  - lo acogió
  - lo dio la bienvenida
  lexicon: BDAG
  rationale: ἀποδέχομαι aquí expresa una recepción favorable. 'Lo recibió' conserva el valor básico del verbo y permite mantener la ambigüedad útil entre 'recibir' y 'dar la bienvenida', que el inglés POB también documenta en nota.
- source_word: ὁ ὄχλος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: ὄχλος designa un grupo numeroso reunido. 'La multitud' preserva el sentido colectivo y es idiomático en español bíblico sin perder claridad.
- source_word: ἦσαν γὰρ πάντες προσδοκῶντες αὐτόν
  english_pob_choice: for they were all waiting for him
  chosen_spanish: porque todos estaban esperándolo
  alternatives_spanish:
  - pues todos lo estaban esperando
  - porque todos lo aguardaban
  lexicon: BDAG
  rationale: προσδοκάω puede significar 'esperar' o 'esperar con expectativa'. 'Estaban esperándolo' conserva el aspecto durativo del participio y la idea de expectativa; 'porque' reproduce bien γάρ como explicación causal.
- source_word: πάντες
  english_pob_choice: they were all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - la totalidad
  lexicon: BDAG
  rationale: '''Todos'' mantiene el énfasis distributivo de πάντες sin recargar la sintaxis española.'
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: convención onomástica estándar
  rationale: Nombre propio estándar en español, sin alteración semántica.
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés muestran un valor temporal claro para ἐν τῷ ὑποστρέφειν y un matiz de recepción favorable para ἀπεδέξατο. La versión española conserva ambos ejes con léxico natural y sin añadir contenido no sustentado. No se reportan revisiones aplicadas en el expediente inglés; el presente borrador sigue ese estado estable.
  spanish_consistency_notes:
  - Se mantiene 'Jesús' como nombre propio estándar.
  - Se conserva la referencia causal con 'porque' para γάρ.
  - Se evita 'SEÑOR' porque no aparece κύριος en este versículo.
  - '''Multitud'' y ''recibió'' mantienen un registro bíblico claro sin calco rígido.'
