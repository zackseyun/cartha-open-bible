review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura temporal de ἐν + infinitivo articular (''cuando Jesús volvió''), el valor narrativo de δέ y la causalidad de γάρ. También conserva correctamente el sentido de ὄχλος como colectivo y el aspecto durativo de προσδοκῶντες con ''estaban esperándolo''. Sin embargo, las notas al pie no corresponden a los puntos donde el inglés POB documenta las alternativas léxicas: la nota [a] se colocó en ''volvió'' aunque la nota inglesa marcada a trata sobre ''welcomed/received'', y la nota [b] se colocó en ''recibió'' aunque la nota inglesa marcada b trata sobre ''waiting for him/expecting him''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Ahora bien' funciona, aunque 'la multitud lo recibió' suena un poco menos positivo que el énfasis contextual de bienvenida; no obstante sigue siendo aceptable y está respaldado por la nota léxica. La frase final es fluida. El problema principal es de disciplina editorial de notas y correspondencia con el rastro de auditoría, no de legibilidad.
  glossary_alignment: 'No hay términos del glosario teológicamente sensibles en este versículo aparte de ''Jesús'', que está bien. Las decisiones léxicas principales son adecuadas: ὑποστρέφειν -> ''volvió'', ἀπεδέξατο -> ''recibió'' con alternativa positiva documentada, ὄχλος -> ''multitud'', προσδοκῶντες -> ''esperándolo''.'
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas a palabras equivocadas respecto del audit trail inglés.
    rationale: El POB inglés marca la alternativa de ἀπεδέξατο en la primera nota y la de προσδοκῶντες en la segunda. En español, [a] fue puesta en 'volvió' y [b] en 'recibió', lo que rompe la trazabilidad y deja sin nota la alternativa 'esperándolo/expectorándolo'.
  - severity: low
    issue: Falta una nota española para la alternativa léxica de 'esperándolo'.
    rationale: El inglés POB preserva explícitamente la alternativa 'expecting him'. En español conviene conservarla como 'lo estaban esperando con expectativa' o 'lo esperaban', pero al menos debe reflejar 'esperándolo/esperándolo con expectativa' o 'lo esperaban' en la nota correspondiente.
  revised_spanish_text: Ahora bien, cuando Jesús volvió, la multitud lo recibió[a], porque todos estaban esperándolo[b].
