translation:
  language: es
  text: Y los que están sobre la roca son los que[a], cuando oyen, reciben la palabra con gozo. Pero estos no tienen raíz; creen por un tiempo, y en un tiempo de prueba se apartan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en un tiempo de tentación' o 'cuando llega la prueba'. El término griego puede referirse a prueba, tentación o tribulación según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ τῆς πέτρας
  english_pob_choice: on the rock
  chosen_spanish: sobre la roca
  alternatives_spanish:
  - en la roca
  - sobre la piedra
  lexicon: BDAG
  rationale: Mantiene la imagen concreta de πέτρα sin suavizarla a 'terreno pedregoso'. 'Sobre la roca' sigue de cerca la relación espacial del griego y funciona naturalmente en español.
- source_word: ἀκούσωσιν
  english_pob_choice: they hear
  chosen_spanish: oyen
  alternatives_spanish:
  - escuchan
  - han oído
  lexicon: BDAG
  rationale: En una cláusula general con ὅταν, el presente español expresa bien la condición repetida o característica. 'Oír' conserva el valor inmediato de percibir el mensaje.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con gozo
  alternatives_spanish:
  - con alegría
  - gozosamente
  lexicon: BDAG
  rationale: '''Con gozo'' refleja de manera directa la frase preposicional y mantiene un registro bíblico claro sin perder naturalidad en español.'
- source_word: δέχονται τὸν λόγον
  english_pob_choice: receive the word
  chosen_spanish: reciben la palabra
  alternatives_spanish:
  - acogen la palabra
  - aceptan el mensaje
  lexicon: BDAG
  rationale: '''Reciben'' reproduce bien δέχονται y evita cargar el verbo con matices no explícitos. ''La palabra'' conserva el idioma bíblico para λόγος en este contexto.'
- source_word: ῥίζαν οὐκ ἔχουσιν
  english_pob_choice: have no root
  chosen_spanish: no tienen raíz
  alternatives_spanish:
  - no tienen raíz alguna
  - carecen de raíz
  lexicon: BDAG
  rationale: La singular 'raíz' sigue el griego y conserva la metáfora breve y contundente. 'No tienen raíz' es la forma más natural en español.
- source_word: πρὸς καιρὸν
  english_pob_choice: for a time
  chosen_spanish: por algún tiempo
  alternatives_spanish:
  - por un tiempo
  - durante un tiempo
  lexicon: BDAG
  rationale: Expresa claramente la duración limitada del griego sin volver la frase pesada. 'Por algún tiempo' comunica temporalidad y cierta indefinición.
- source_word: πιστεύουσιν
  english_pob_choice: they believe
  chosen_spanish: creen
  alternatives_spanish:
  - tienen fe
  - confían
  lexicon: BDAG
  rationale: '''Creen'' es el equivalente directo y más transparente de πιστεύουσιν. No se añade un matiz doctrinal que el versículo no explicita.'
- source_word: ἐν καιρῷ πειρασμοῦ
  english_pob_choice: in a time of testing
  chosen_spanish: en un tiempo de prueba
  alternatives_spanish:
  - en un tiempo de tentación
  - cuando llega la prueba
  lexicon: BDAG
  rationale: '''Prueba'' mantiene el rango semántico de πειρασμός y evita restringirlo solo a tentación interna. En español, ''tiempo de prueba'' suena natural y abarca el sentido de examen o aflicción.'
- source_word: ἀφίστανται
  english_pob_choice: they fall away
  chosen_spanish: se apartan
  alternatives_spanish:
  - caen away
  - se desvían
  - apartan
  lexicon: BDAG
  rationale: '''Se apartan'' comunica abandono o retirada sin introducir un tecnicismo doctrinal. Preserva la tensión teológica del texto sobre la perseverancia sin resolverla de antemano.'
theological_decisions:
- issue: Sentido de πιστεύουσιν y la posterior ἀφίστανται
  english_pob_reading: Rendered neutrally as 'they believe' without specifying whether the faith is saving or temporary-only in a doctrinal sense.
  chosen_spanish_reading: Traducido neutramente como 'creen', sin precisar si esa fe es salvadora o solo temporal.
  alternative_spanish_readings:
  - parecen creer
  - creen de verdad pero luego se apartan
  - creen superficialmente
  rationale: El versículo afirma que creen por algún tiempo y después se apartan, pero no define por sí mismo la discusión doctrinal sobre perseverancia, apostasía o naturaleza de la fe. La traducción conserva esa tensión.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Alcance de πειρασμός en este contexto
  english_pob_reading: Rendered as 'testing' in the main text.
  chosen_spanish_reading: Renderizado como 'prueba' en el texto principal.
  alternative_spanish_readings:
  - tentación
  - prueba o tentación
  - tribulación
  rationale: πειρασμός puede abarcar prueba, tentación o examen según el contexto. 'Prueba' preserva ese campo semántico amplio y funciona bien en español.
  doctrine_reference: Mantener la amplitud semántica del término griego
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español, unido a la palabra 'los' en la cláusula relativa.
  spanish_consistency_notes:
  - Se mantiene 'Dios' y demás terminología estándar del proyecto solo cuando aplica; aquí no aparecen nombres divinos.
  - '''Palabra'' se usa para λόγος en sentido proclamado, coherente con el registro del pasaje.'
  - '''Se apartan'' preserva una salida real del grupo descrito sin introducir ''apostasía'' como término técnico en el texto principal.'
