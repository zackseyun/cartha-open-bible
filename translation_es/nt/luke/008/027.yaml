translation:
  language: es
  text: Y al salir él a tierra, cierto hombre de la ciudad le salió al encuentro, que tenía demonios[a]. Y desde hacía mucho tiempo no se había puesto ropa, y no se quedaba en una casa, sino entre los sepulcros.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «poseído por demonios». El griego dice literalmente «tenía demonios».
    reason: lexical_alternative
  - marker: b
    text: O, de manera más idiomática, «cuando desembarcó» o «cuando pisó la orilla». El griego dice literalmente «al salir a tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντι ... αὐτῷ ἐπὶ τὴν γῆν
  english_pob_choice: when he came out onto the land
  chosen_spanish: al salir él a tierra
  alternatives_spanish:
  - cuando salió a tierra
  - cuando desembarcó
  lexicon: BDAG
  rationale: La construcción participial se entiende temporalmente respecto de Jesús. «A tierra» mantiene la imagen de desplazamiento desde la barca sin imponer «orilla» ni «playa», que serían más específicos de lo que exige γῆ.
- source_word: ὑπήντησεν
  english_pob_choice: met him
  chosen_spanish: le salió al encuentro
  alternatives_spanish:
  - lo encontró
  - se encontró con él
  lexicon: BDAG
  rationale: En español, «salió al encuentro» expresa de forma natural la acción recíproca de ὑπαντάω y conserva el sentido narrativo de encuentro directo.
- source_word: ἀνήρ τις
  english_pob_choice: a certain man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un cierto hombre
  - un varón
  lexicon: BDAG
  rationale: El valor indefinido de τις puede expresarse con naturalidad como «un hombre». «Un cierto hombre» suena forzado en español, aunque la idea de indefinición permanece.
- source_word: ἐκ τῆς πόλεως
  english_pob_choice: from the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - procedente de la ciudad
  - salido de la ciudad
  lexicon: BDAG
  rationale: La frase identifica su procedencia o asociación. «De la ciudad» es la formulación más simple y fiel al genitivo con ἐκ.
- source_word: ἔχων δαιμόνια
  english_pob_choice: who had demons
  chosen_spanish: que tenía demonios
  alternatives_spanish:
  - poseído por demonios
  - que estaba endemoniado
  lexicon: BDAG
  rationale: Se conserva la lectura literal «tener demonios», siguiendo la preferencia del POB inglés por no sustituirla en el texto principal por el giro interpretativo «poseído». En español, «tenía demonios» es claro y auditable.
- source_word: χρόνῳ ἱκανῷ
  english_pob_choice: for a considerable time
  chosen_spanish: desde hacía mucho tiempo
  alternatives_spanish:
  - por un tiempo considerable
  - desde hacía bastante tiempo
  lexicon: BDAG
  rationale: La idea es duración prolongada. «Desde hacía mucho tiempo» comunica bien el imperfecto de trasfondo y el valor de ἱκανός como extensión considerable, sin sonar demasiado literal.
- source_word: οὐκ ἐνεδύσατο ἱμάτιον
  english_pob_choice: he had not put on clothing
  chosen_spanish: no se había puesto ropa
  alternatives_spanish:
  - no había vestido ropa
  - no se había vestido
  lexicon: BDAG
  rationale: El medio de ἐνδύω es «ponerse/vestirse». En español, «se había puesto ropa» expresa la acción con naturalidad. «Ropa» es un equivalente más general que «un vestido» o «prenda», ya que ἱμάτιον aquí funciona como vestimenta en general.
- source_word: ἐν οἰκίᾳ οὐκ ἔμενεν
  english_pob_choice: he did not stay in a house
  chosen_spanish: no habitaba en una casa
  alternatives_spanish:
  - no se quedaba en una casa
  - no vivía en una casa
  lexicon: BDAG
  rationale: μένω puede ser «quedarse, permanecer, habitar». «No habitaba en una casa» conserva la continuidad habitual del imperfecto y sugiere residencia/estancia sin fijarla excesivamente.
- source_word: ἀλλ’ ἐν τοῖς μνήμασιν
  english_pob_choice: but among the tombs
  chosen_spanish: sino entre los sepulcros
  alternatives_spanish:
  - pero entre las tumbas
  - sino entre los túmulos
  lexicon: BDAG
  rationale: «Sepulcros» es un equivalente claro y elevado de μνῆμα, adecuado al registro bíblico en español y suficientemente preciso para el contexto funerario.
theological_decisions:
- issue: ἔχων δαιμόνια en una descripción de aflicción demoníaca
  english_pob_reading: who had demons
  chosen_spanish_reading: que tenía demonios
  alternative_spanish_readings:
  - poseído por demonios
  - endemoniado
  rationale: 'Se mantiene el dato lexical literal del griego y la opción del POB inglés: el texto dice «tener demonios», no usa aquí la expresión distinta para «espíritus impuros». Así se preserva la tensión entre literalidad y el idiomatismo doctrinal más familiar.'
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Distinción entre literalidad y la idiomatización de posesión demoníaca
  english_pob_reading: who had demons
  chosen_spanish_reading: que tenía demonios
  alternative_spanish_readings:
  - poseído por demonios
  rationale: En la nota se deja abierta la lectura idiomática común sin introducirla en el cuerpo principal. Esto refleja la decisión auditada del POB de priorizar el enunciado griego y no sobreinterpretar el estado del hombre más allá de lo explícito.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #5'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que sustituyó «For» por «And» para reflejar con más precisión καί. Por eso el texto español coordina con «Y» en lugar de introducir una relación causal no presente en el griego. También conserva la opción literal «tener demonios» frente a la paraprástica «poseído por demonios», que quedó reservada como alternativa.
  spanish_consistency_notes:
  - Se usa «Y» para coordinar las dos unidades narrativas principales, en paralelo con el último estado revisado del inglés.
  - «Demonios» se mantiene en plural, conforme a δαιμόνια, y no se reemplaza por «espíritus impuros» porque aquí no es la expresión griega del texto.
  - «Sepulcros» se eligió por registro y precisión contextual; en el mismo registro, «casa» y «ropa» se mantienen simples y naturales.
  - 'Se conserva la asimetría aspectual del relato: «salir / salió al encuentro / no se había puesto / no habitaba», útil para el trasfondo narrativo del imperfecto griego.'
