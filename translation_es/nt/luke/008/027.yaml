revisions:
- from: Y al salir él a tierra,[a] le salió al encuentro un hombre de la ciudad, que tenía demonios. Y desde hacía mucho tiempo no se había puesto ropa,[b] y no habitaba en una casa, sino entre los sepulcros.
  to: Y al salir él a tierra, cierto hombre de la ciudad le salió al encuentro, que tenía demonios[a]. Y desde hacía mucho tiempo no se había puesto ropa, y no se quedaba en una casa, sino entre los sepulcros.[b]
  rationale: 'Se corrigen las notas para que correspondan al contenido preservado en la auditoría inglesa: una nota léxica en ''tenía demonios'' y una nota alternativa en la cláusula de salida a tierra. También se ajusta ''un hombre'' a ''cierto hombre'' para reflejar τις, y ''no habitaba'' a ''no se quedaba'' para preservar mejor el aspecto habitual de ἔμενεν en español natural.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:54:30Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: salida de Jesús a tierra, encuentro con un hombre de la ciudad, descripción literal de que ''tenía demonios'', duración prolongada sin vestirse y permanencia entre sepulcros. Sin embargo, las notas al pie están intercambiadas respecto a los marcadores y el texto principal suaviza ἀνήρ τις al omitir del todo el matiz de τις (''cierto''). Además, ''no habitaba en una casa'' es aceptable, pero ''no se quedaba en una casa'' o ''no permanecía en una casa'' conserva mejor el valor imperfectivo/costumbrista de ἔμενεν.'
  spanish_quality_summary: 'El español es claro, natural y de registro bíblico sobrio. ''Le salió al encuentro'' y ''entre los sepulcros'' funcionan muy bien. Los principales problemas son de consistencia editorial: las notas [a] y [b] no corresponden a los lugares correctos según su contenido, y conviene afinar ''un hombre'' a ''cierto hombre'' para reflejar mejor el estilo narrativo lucano sin sonar forzado. También se puede mejorar ligeramente ''habitaba'' para evitar un matiz demasiado permanente.'
  glossary_alignment: 'La terminología clave está bien alineada con el proyecto: δαιμόνια = ''demonios'' y ἔχων δαιμόνια = ''que tenía demonios'', evitando introducir ''poseído'' en el texto principal. No hay términos del glosario mayor en conflicto. La revisión propuesta mantiene esa fidelidad léxica y corrige solo precisión narrativa y consistencia de notas.'
  issues:
  - severity: high
    issue: Las notas al pie [a] y [b] están invertidas respecto a sus anclajes.
    rationale: En el texto, [a] aparece tras 'a tierra', pero su contenido comenta una alternativa idiomática para toda la cláusula ('cuando desembarcó'); [b] aparece tras 'ropa', pero su contenido habla de 'cuando pisó la orilla', que corresponde a la primera cláusula, no a 'ropa'. Además, el POB inglés preserva una nota sobre 'having demons' / 'possessed by demons', que aquí falta por completo.
  - severity: medium
    issue: Se pierde el matiz de τις en ἀνήρ τις al traducir solo 'un hombre'.
    rationale: Aunque 'un hombre' no es erróneo, Luke usa una indefinición con cierta especificidad. 'Cierto hombre' es natural en español bíblico moderno y refleja mejor la decisión auditada del POB inglés ('a certain man').
  - severity: low
    issue: '''No habitaba en una casa'' puede sonar más estático/permanente que ἔμενεν.'
    rationale: El imperfecto de μένω aquí describe su modo habitual de permanecer/estar. 'No se quedaba en una casa' o 'no permanecía en una casa' conserva mejor ese matiz sin sobretraducir a residencia fija.
  revised_spanish_text: Y al salir él a tierra, cierto hombre de la ciudad le salió al encuentro, que tenía demonios[a]. Y desde hacía mucho tiempo no se había puesto ropa, y no se quedaba en una casa, sino entre los sepulcros.[b]
  revised_footnotes:
  - marker: a
    text: O, de manera más idiomática, «poseído por demonios». El griego dice literalmente «tenía demonios».
    reason: lexical_alternative
  - marker: b
    text: O, de manera más idiomática, «cuando desembarcó» o «cuando pisó la orilla». El griego dice literalmente «al salir a tierra».
    reason: lexical_alternative
  revision_rationale: 'Se corrigen las notas para que correspondan al contenido preservado en la auditoría inglesa: una nota léxica en ''tenía demonios'' y una nota alternativa en la cláusula de salida a tierra. También se ajusta ''un hombre'' a ''cierto hombre'' para reflejar τις, y ''no habitaba'' a ''no se quedaba'' para preservar mejor el aspecto habitual de ἔμενεν en español natural.'
