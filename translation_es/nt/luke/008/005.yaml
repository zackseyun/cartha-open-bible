translation:
  language: es
  text: El sembrador salió para sembrar su semilla. Y mientras sembraba, una parte cayó junto al camino, y fue pisoteada, y las aves del cielo[a] la devoraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las aves del aire». Lit. «las aves del cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - partió
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι se expresa de forma natural en español con 'salió'. 'Partió' sería más general y menos directo; 'salió afuera' resulta redundante.
- source_word: ὁ σπείρων
  english_pob_choice: the sower
  chosen_spanish: el sembrador
  alternatives_spanish:
  - el que siembra
  - el hombre que siembra
  lexicon: BDAG
  rationale: El participio con artículo funciona como sustantivo. 'El sembrador' conserva la fuerza nominal y es idiomático en español.
- source_word: τοῦ σπεῖραι
  english_pob_choice: to sow
  chosen_spanish: para sembrar
  alternatives_spanish:
  - a sembrar
  - con el fin de sembrar
  lexicon: BDAG
  rationale: El infinitivo articular con genitivo expresa propósito. 'Para sembrar' comunica con claridad esa finalidad en español.
- source_word: τὸν σπόρον αὐτοῦ
  english_pob_choice: his seed
  chosen_spanish: su semilla
  alternatives_spanish:
  - su grano
  - la semilla que tenía
  lexicon: BDAG
  rationale: σπόρος puede ser 'semilla' o 'grano sembrado'. En este contexto agrícola, 'su semilla' conserva la imagen de manera natural y fiel.
- source_word: ἐν τῷ σπείρειν αὐτὸν
  english_pob_choice: as he was sowing
  chosen_spanish: mientras sembraba
  alternatives_spanish:
  - al sembrar
  - en su sembrar
  lexicon: BDAG
  rationale: La construcción con ἐν y el infinitivo articular indica acción simultánea. 'Mientras sembraba' expresa bien esa contemporaneidad sin sonar artificial.
- source_word: ὃ μὲν
  english_pob_choice: some
  chosen_spanish: una parte
  alternatives_spanish:
  - algo
  - cierta parte
  lexicon: BDAG
  rationale: El relativo neutro singular con μέν señala una porción distributiva de la semilla. 'Una parte' refleja mejor esa división que un simple 'algo'.
- source_word: ἔπεσεν παρὰ τὴν ὁδόν
  english_pob_choice: fell beside the path
  chosen_spanish: cayó junto al camino
  alternatives_spanish:
  - cayó al lado del camino
  - cayó por la orilla del camino
  lexicon: BDAG
  rationale: παρά con acusativo indica posición al lado de. 'Junto al camino' es claro y conserva la imagen; 'camino' es más natural que 'sendero' en español general.
- source_word: κατεπατήθη
  english_pob_choice: was trampled
  chosen_spanish: fue pisoteada
  alternatives_spanish:
  - fue aplastada bajo los pies
  - fue hollada
  lexicon: BDAG
  rationale: El pasivo de καταπατέω significa ser pisado o aplastado. 'Fue pisoteada' transmite con fidelidad la acción y mantiene la imagen corporal.
- source_word: τὰ πετεινὰ τοῦ οὐρανοῦ
  english_pob_choice: the birds of the sky
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves del aire
  - las aves del cielo
  lexicon: BDAG
  rationale: πετεινά son aves; τοῦ οὐρανοῦ puede ser literalmente 'del cielo' o 'del aire'. Se mantiene 'del cielo' para conservar el paralelismo y la imagen bíblica sin perder literalidad.
- source_word: κατέφαγεν αὐτό
  english_pob_choice: devoured it
  chosen_spanish: se la comieron
  alternatives_spanish:
  - la devoraron
  - la comieron
  - la consumieron
  lexicon: BDAG
  rationale: κατεσθίω intensifica el acto de comer. En español, 'se la comieron' es natural y conserva la imagen de consumición total; el antecedente femenino remite a 'semilla'.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de SBLGNT y el audit trail inglés: se preserva la secuencia narrativa, el matiz de propósito en el infinitivo articular, la simultaneidad de la acción y la imagen intensiva de las aves que comen la semilla. No se detectaron revisiones previas que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantiene 'sembrador' para el participio sustantivado, coherente con el uso POB de sustantivar cuando la forma griega lo permite.
  - Se usa 'cielo' para οὐρανός en esta imagen idiomática, con nota alternativa para 'aire' por la ambigüedad léxica del modismo.
  - Se conserva el tono narrativo simple y directo del dicho parabólico, sin introducir explicaciones interpretativas.
