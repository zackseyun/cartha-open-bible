translation:
  language: es
  text: Y se reían de él, sabiendo que ella había muerto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατεγέλων
  english_pob_choice: were laughing at
  chosen_spanish: se reían de
  alternatives_spanish:
  - se burlaban de
  - se mofaban de
  - se reían de él
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida; en español, 'se reían de' comunica bien la burla sostenida y suena natural en el contexto inmediato de desprecio por las palabras de Jesús.
- source_word: αὐτοῦ
  english_pob_choice: him
  chosen_spanish: de él
  alternatives_spanish:
  - de Jesús
  - a él
  lexicon: BDAG
  rationale: El pronombre depende de καταγελάω, que en español se expresa de manera idiomática con 'reírse de alguien'. 'De él' mantiene la referencia sin añadir un nombre que el griego no repite.
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque sabían
  - puesto que sabían
  lexicon: BDAG
  rationale: El participio presente perfecto de οἶδα funciona aquí como circunstancia concomitante y aporta la base de su reacción. 'Sabiendo' preserva la forma participial mejor que una subordinada causal explícita.
- source_word: ἀπέθανεν
  english_pob_choice: had died
  chosen_spanish: había muerto
  alternatives_spanish:
  - murió
  - estaba muerta
  lexicon: BDAG
  rationale: El aoristo señala el hecho consumado de la muerte. 'Había muerto' reproduce bien la anterioridad narrativa y evita convertir el verbo en un mero estado con 'estaba muerta'.
theological_decisions:
- issue: Referencia implícita femenina en 'she had died' sin sustantivo explícito
  english_pob_reading: Retain 'she had died' in the main clause, with the feminine referent understood from context.
  chosen_spanish_reading: 'Mantener el referente implícito: ''ella había muerto''.'
  alternative_spanish_readings:
  - la niña había muerto
  - la muchacha había muerto
  - estaba muerta
  rationale: El griego usa un verbo de tercera persona singular sin volver a nombrar al sujeto; el contexto narrativo ya identifica a la persona. 'Ella había muerto' conserva esa economía sin importar un sustantivo ajeno al texto.
  doctrine_reference: Primacía del texto original y restricción contra ampliar el contenido más allá de lo que el versículo dice.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que cambió una causal explícita por el participio 'knowing'; por eso el español usa 'sabiendo' en lugar de una subordinada con 'porque'.
  spanish_consistency_notes:
  - Se mantiene 'se reían de' como equivalente idiomático y no se sustituye por 'se burlaban de' para no perder el matiz de burla expresado por καταγελάω.
  - Se conserva el pretérito pluscuamperfecto 'había muerto' para reflejar la anterioridad del aoristo en el relato.
  - No se introduce nombre propio ni sustantivo ('la niña', 'la muchacha') porque el griego solo ofrece el referente pronominal implícito.
