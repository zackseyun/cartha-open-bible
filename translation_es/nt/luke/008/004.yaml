translation:
  language: es
  text: 'Y cuando se reunía una gran multitud, y la gente de pueblo tras pueblo acudía a él, habló por medio de una parábola[a]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una parábola». La expresión griega διὰ παραβολῆς puede entenderse como medio o manera.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνιόντος
  english_pob_choice: was gathering
  chosen_spanish: se reunía
  alternatives_spanish:
  - se estaba reuniendo
  - se congregaba
  lexicon: BDAG
  rationale: El genitivo absoluto con ὄχλου πολλοῦ expresa acción en desarrollo antes del verbo principal. «Se reunía» conserva el aspecto progresivo sin sonar forzado en español.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona como continuación narrativa. «Y» mantiene el flujo simple y natural del relato.
- source_word: ὄχλου πολλοῦ
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran muchedumbre
  - una multitud grande
  lexicon: BDAG
  rationale: ὄχλος puede ser «multitud» o «muchedumbre». «Multitud» es claro y digno; «gran» refleja πολλοῦ como intensificador.
- source_word: τῶν κατὰ πόλιν ἐπιπορευομένων
  english_pob_choice: people from town after town were coming
  chosen_spanish: gente de pueblo en pueblo venía
  alternatives_spanish:
  - personas de ciudad en ciudad venían
  - los que iban de pueblo en pueblo
  lexicon: BDAG
  rationale: 'La frase es distributiva: «κατὰ πόλιν» comunica movimiento localidad por localidad. «De pueblo en pueblo» conserva ese valor distributivo de manera natural en español.'
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - a su encuentro
  lexicon: BDAG
  rationale: πρός con acusativo indica movimiento hacia Jesús. «A él» es la forma más directa y fiel en español.
- source_word: εἶπεν
  english_pob_choice: he spoke
  chosen_spanish: les habló
  alternatives_spanish:
  - dijo
  - les dijo
  lexicon: BDAG
  rationale: Con διὰ παραβολῆς, el énfasis recae en el acto de hablar en forma de parábola. «Les habló» permite que el complemento modal posterior funcione con naturalidad en español.
- source_word: διὰ παραβολῆς
  english_pob_choice: by a parable
  chosen_spanish: por medio de una parábola
  alternatives_spanish:
  - en una parábola
  - con una parábola
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o manera. «Por medio de» conserva ese valor instrumental/modal y evita la ambigüedad de una lectura puramente locativa.
translation_notes:
  revision_awareness: La versión sigue de cerca el paquete griego y el audit trail inglés. Se conservó la progresividad del genitivo absoluto, el valor distributivo de κατὰ πόλιν y la ambigüedad medio/manera de διὰ παραβολῆς, expresada de modo natural en español.
  spanish_consistency_notes:
  - Se prefirió «multitud» para ὄχλος, en armonía con un registro bíblico claro pero no arcaizante.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, porque este versículo no contiene el nombre divino.
  - «Por medio de una parábola» conserva la lectura de medio/manera sin imponer solo una opción.
