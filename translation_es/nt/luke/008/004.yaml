revisions:
- from: 'Y cuando se reunía una gran multitud, y gente de pueblo en pueblo venía a él, les habló por medio de una parábola[a]:'
  to: 'Y cuando se reunía una gran multitud, y la gente de pueblo tras pueblo acudía a él, habló por medio de una parábola[a]:'
  rationale: Se revisa la frase distributiva para reflejar mejor κατὰ πόλιν en español natural («de pueblo tras pueblo»), se sustituye «venía» por «acudía» para expresar mejor el movimiento hacia Jesús desde varias localidades, y se elimina «les» por no estar expreso en el griego. Se conserva la nota sobre «por medio de / en una parábola» porque refleja correctamente la alternativa léxica documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:01:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura principal del griego: genitivo absoluto temporal, multitud numerosa, llegada continua de personas hacia Jesús y el uso de parábola como medio/manera. Sin embargo, «gente de pueblo en pueblo venía a él» no preserva con claridad el valor distributivo de κατὰ πόλιν ni suena natural en español; puede sugerir movimiento itinerante de la misma gente en vez de personas procedentes de múltiples localidades. Además, «les habló» introduce un objeto indirecto no explícito en el griego, aunque inferible por contexto.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «gente de pueblo en pueblo venía a él» resulta poco idiomático. Una formulación como «la gente de pueblo tras pueblo acudía a él» o «personas de pueblo tras pueblo acudían a él» comunica mejor el distributivo. También conviene evitar añadir «les» si no hace falta. La nota al pie está bien formulada.
  glossary_alignment: No hay términos del glosario teológico mayor en disputa en este versículo. «parábola» está bien; no aparecen Yahvé/Mesías/etc. La elección «multitud» es adecuada. La revisión propuesta mantiene fidelidad léxica y mejora la naturalidad española.
  issues:
  - severity: high
    issue: «gente de pueblo en pueblo venía a él» es poco natural y semánticamente impreciso
    rationale: κατὰ πόλιν es distributivo ('de ciudad en ciudad', 'de pueblo tras pueblo'), refiriéndose a personas provenientes de múltiples localidades. La redacción actual puede entenderse como que la misma gente iba de pueblo en pueblo.
  - severity: medium
    issue: «les habló» añade un complemento indirecto no expreso
    rationale: El griego solo dice «habló / dijo» con complemento modal «διὰ παραβολῆς». Aunque «les» no altera gravemente el sentido, es una adición innecesaria frente a una formulación más ceñida.
  - severity: low
    issue: La puntuación con coma tras «multitud» es aceptable pero puede fluir mejor sin sobrecargar
    rationale: Una redacción más compacta mejora la lectura en español moderno sin perder la estructura narrativa.
  revised_spanish_text: 'Y cuando se reunía una gran multitud, y la gente de pueblo tras pueblo acudía a él, habló por medio de una parábola[a]:'
  revised_footnotes:
  - marker: a
    text: O «en una parábola». La expresión griega διὰ παραβολῆς puede entenderse como medio o manera.
    reason: lexical_alternative
  revision_rationale: Se revisa la frase distributiva para reflejar mejor κατὰ πόλιν en español natural («de pueblo tras pueblo»), se sustituye «venía» por «acudía» para expresar mejor el movimiento hacia Jesús desde varias localidades, y se elimina «les» por no estar expreso en el griego. Se conserva la nota sobre «por medio de / en una parábola» porque refleja correctamente la alternativa léxica documentada.
