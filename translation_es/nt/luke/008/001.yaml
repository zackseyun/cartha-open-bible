translation:
  language: es
  text: Y sucedió poco después[c] que él recorría ciudad tras ciudad y aldea tras aldea[a], proclamando y anunciando las buenas nuevas del reino de Dios[b], y los Doce estaban con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de ciudad en ciudad y de aldea en aldea».
    reason: lexical_alternative
  - marker: b
    text: O «el reinado de Dios».
    reason: lexical_alternative
  - marker: c
    text: O «Y sucedió que, poco después, él recorría».
    reason: previous_rendering
lexical_decisions:
- source_word: Καὶ ἐγένετο ἐν τῷ καθεξῆς
  english_pob_choice: it happened soon afterward
  chosen_spanish: Y sucedió, poco después
  alternatives_spanish:
  - Y aconteció poco después
  - Y ocurrió poco después
  - Y sucedió después
  lexicon: BDAG
  rationale: La fórmula narrativa de Lucas introduce un nuevo episodio en secuencia. «Sucedió» conserva el marcador de relato sin sonar arcaico, y «poco después» expresa el valor temporal de ἐν τῷ καθεξῆς de modo natural en español.
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: El pronombre está explícito en griego, pero en español basta «él» porque el sujeto ya queda claro por el contexto; no hace falta intensificarlo con «él mismo».
- source_word: διώδευεν
  english_pob_choice: was traveling through
  chosen_spanish: recorría
  alternatives_spanish:
  - iba recorriendo
  - viajaba por
  - andaba por
  lexicon: BDAG
  rationale: El imperfecto indica acción continua o repetida. «Recorría» transmite bien la idea de desplazarse por distintas localidades de manera sostenida, sin forzar una expresión más pesada.
- source_word: κατὰ πόλιν καὶ κώμην
  english_pob_choice: through city after city and village after village
  chosen_spanish: ciudad tras ciudad y aldea tras aldea
  alternatives_spanish:
  - de ciudad en ciudad y de aldea en aldea
  - por ciudad tras ciudad y aldea tras aldea
  - de ciudad a ciudad y de aldea a aldea
  lexicon: BDAG
  rationale: El κατά distributivo con sustantivos singulares expresa repetición o recorrido de un lugar a otro. «Ciudad tras ciudad y aldea tras aldea» conserva esa fuerza iterativa mejor que una fórmula plana.
- source_word: κηρύσσων
  english_pob_choice: proclaiming
  chosen_spanish: proclamando
  alternatives_spanish:
  - predicando
  - heraldando
  lexicon: BDAG
  rationale: «Proclamando» mantiene el sentido público y autorizado de κηρύσσω sin reducirlo a predicación eclesial exclusivamente.
- source_word: εὐαγγελιζόμενος
  english_pob_choice: bringing the good news
  chosen_spanish: anunciando las buenas nuevas
  alternatives_spanish:
  - anunciando el evangelio
  - llevando las buenas nuevas
  - evangelizando
  lexicon: BDAG
  rationale: Se distingue de κηρύσσων, por lo que conviene no usar la misma palabra. «Anunciando las buenas nuevas» conserva el sentido del evangelio y permite una diferencia estilística con «proclamando».
- source_word: τὴν βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el reino de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la equivalencia más estable y abarca tanto el dominio como la realidad del gobierno divino. En español, no conviene resolverla solo como «reinado» porque estrecharía el campo semántico.
- source_word: οἱ δώδεκα
  english_pob_choice: the Twelve
  chosen_spanish: los Doce
  alternatives_spanish:
  - los doce discípulos
  - los doce apóstoles
  lexicon: BDAG
  rationale: Lucas usa una designación de grupo ya reconocible. «Los Doce» es breve, exacto y no añade «apóstoles» donde el texto no lo dice.
- source_word: σὺν αὐτῷ
  english_pob_choice: were with him
  chosen_spanish: estaban con él
  alternatives_spanish:
  - iban con él
  - lo acompañaban
  lexicon: BDAG
  rationale: En español se necesita una forma verbal explícita para completar la cláusula. «Estaban con él» expresa compañía de manera natural y fiel.
theological_decisions:
- issue: βασιλεία τοῦ θεοῦ
  english_pob_reading: the kingdom of God
  chosen_spanish_reading: el reino de Dios
  alternative_spanish_readings:
  - el reinado de Dios
  rationale: La expresión puede enfatizar tanto la esfera como el ejercicio del gobierno divino. «El reino de Dios» preserva esa amplitud sin decidir prematuramente la tensión teológica hacia una sola matiz.
  doctrine_reference: Translation philosophy §3, preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: La redacción española sigue el estado revisado más reciente del POB inglés, que restablece «And it happened» para representar Καὶ ἐγένετο y mantiene la distinción entre κηρύσσων y εὐαγγελιζόμενος. También toma en cuenta la preferencia final por una formulación directa y narrativa, evitando tanto la omisión del marcador inicial como una paraphrasis excesiva.
  spanish_consistency_notes:
  - Se mantuvo «Y sucedió» para el marcador narrativo inicial, en línea con el valor aspectual de la fórmula lucana.
  - Se preservó la distinción entre «proclamando» y «anunciando las buenas nuevas», para no fundir dos participios diferentes.
  - «Los Doce» se usó como designación grupal estable, sin añadir información no presente en el griego.
  - Se empleó «reino de Dios» como término principal, con nota alternativa para «reinado» por la tensión semántica reconocida en la fuente.
