    issue: 'Construcción no idiomática: «que poder había salido de mí»'
    rationale: En español natural, «poder» como sustantivo contable/abstracción en esta cláusula requiere artículo o reordenamiento. La formulación actual suena incorrecta o forzada y afecta la legibilidad.
  - severity: medium
    issue: La nota al pie no ofrece una alternativa útil
    rationale: '«O: “percibí que poder había salido de mí”» repite de forma parcial el mismo contenido y deja fuera la introducción «Pero Jesús dijo». Si se conserva nota, debe marcar una alternativa real, p. ej. sobre «percibí»/«supe».'
  revised_spanish_text: 'Pero Jesús dijo[a]: «Alguien me tocó, porque percibí que de mí había salido poder».

