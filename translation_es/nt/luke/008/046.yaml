revisions:
- from: 'Pero Jesús dijo[a]: «Alguien me tocó, porque percibí que poder había salido de mí».'
  to: 'Pero Jesús dijo[a]: «Alguien me tocó, porque percibí que de mí había salido poder».'
  rationale: Se corrige una construcción no idiomática del español reordenando la cláusula a «que de mí había salido poder», que preserva exactamente el sentido de δύναμιν ἐξεληλυθυῖαν ἀπ’ ἐμοῦ sin añadir interpretación. Se mantiene «percibí» conforme a la revisión auditada del POB inglés, y la nota se rehace para reflejar la alternativa léxica real sobre ἔγνων («supe»).
