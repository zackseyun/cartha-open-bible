revisions:
- from: 'Pero cuando vio a Jesús[a], gritó, se postró ante él y dijo con voz muy fuerte: «¿Qué tienes tú conmigo, Jesús, Hijo del Dios Altísimo? Te ruego que no me atormentes».'
