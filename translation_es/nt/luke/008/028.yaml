  rationale: Se corrige la nota literal para reflejar con precisión el orden y la perspectiva del griego, y se mejora «con voz muy fuerte» a «con voz fuerte» para un español más natural y más cercano al valor de φωνῇ μεγάλῃ sin intensificación añadida. El resto del borrador puede mantenerse.
