review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del versículo está bien encaminada: «Mientras ellos navegaban» capta el genitivo absoluto progresivo; «él se quedó dormido» expresa adecuadamente el aoristo ingresivo; «descendió ... sobre el lago» conserva la imagen de κατέβη εἰς τὴν λίμνην de forma idiomática. Sin embargo, «un viento huracanado» no representa con suficiente precisión λαῖλαψ ἀνέμου, que describe una tormenta/tempestad de viento, no meramente viento fuerte. Además, «eran cubiertos por las olas» introduce «olas», elemento no presente en el griego, y desvía συνεπληροῦντο de la idea de irse llenando de agua / ser anegados.'
  spanish_quality_summary: 'El borrador es legible y digno, pero dos giros suenan menos naturales o menos exactos que alternativas mejores: «un viento huracanado» es algo impreciso para una tempestad súbita, y «eran cubiertos por las olas» suena interpretativo. «Se estaban llenando de agua» o «estaban siendo anegados» comunica mejor el peligro continuo. También conviene pulir la nota al pie para español natural y para reflejar la alternativa documentada.'
  glossary_alignment: 'No hay términos teológicos de glosario mayor en este versículo. El problema principal es léxico: λαῖλαψ ἀνέμου se alinea mejor con «una tempestad de viento», y συνεπληροῦντο debe mantener la noción de llenarse de agua / ser anegados sin añadir «olas».'
  issues:
  - severity: medium
    issue: «un viento huracanado» para λαῖλαψ ἀνέμου
    rationale: El griego describe una tormenta/tempestad de viento; «viento huracanado» reduce el evento a viento fuerte y pierde el matiz de tormenta súbita.
  - severity: high
    issue: «eran cubiertos por las olas» añade un elemento no presente en el griego
    rationale: συνεπληροῦντο no menciona olas; la idea es que iban llenándose de agua / eran anegados. Añadir «olas» va más allá de la evidencia fuente.
  - severity: low
    issue: La nota al pie actual hereda la expansión con «eran cubiertos por el agua»
    rationale: 'La nota debería reflejar mejor la alternativa documentada por el POB inglés: «se estaban llenando» / «la barca se estaba llenando de agua».'
  revised_spanish_text: Mientras ellos navegaban, él se quedó dormido. Y descendió una tempestad de viento sobre el lago, y estaban siendo anegados[a] y estaban en peligro.
  revised_footnotes:
  - marker: a
    text: 'O: «se estaban llenando», es decir, la barca se estaba llenando de agua.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «un viento huracanado» por «una tempestad de viento» para reflejar mejor λαῖλαψ ἀνέμου. Se cambia «eran cubiertos por las olas» por «estaban siendo anegados» para preservar συνεπληροῦντο sin introducir «olas», y se ajusta la nota al pie para representar con mayor fidelidad la alternativa léxica documentada.
