translation:
  language: es
  text: Mientras ellos navegaban, él se quedó dormido. Y descendió una tempestad de viento sobre el lago, y estaban siendo anegados[a] y estaban en peligro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se estaban llenando», es decir, la barca se estaba llenando de agua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλεόντων δὲ αὐτῶν
  english_pob_choice: as they were sailing
  chosen_spanish: Mientras ellos navegaban
  alternatives_spanish:
  - Mientras estaban navegando
  - Cuando iban navegando
  lexicon: BDAG
  rationale: El genitivo absoluto expresa acción simultánea y en curso; en español, ‘Mientras ellos navegaban’ comunica bien la acción de fondo sin sonar literal o forzado.
- source_word: ἀφύπνωσεν
  english_pob_choice: he fell asleep
  chosen_spanish: se quedó dormido
  alternatives_spanish:
  - se durmió
  - quedó dormido
  lexicon: BDAG
  rationale: 'El aoristo tiene valor ingresivo: no solo estaba dormido, sino que entró en ese estado. ‘Se quedó dormido’ reproduce esa entrada al sueño con naturalidad en español.'
- source_word: κατέβη
  english_pob_choice: came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - cayó
  lexicon: BDAG
  rationale: ‘Descendió’ conserva la imagen espacial del verbo griego y funciona bien con el movimiento del viento hacia el lago.
- source_word: λαῖλαψ ἀνέμου
  english_pob_choice: a windstorm
  chosen_spanish: un viento huracanado
  alternatives_spanish:
  - una tormenta de viento
  - una violenta tempestad
  lexicon: BDAG
  rationale: La expresión describe una tempestad violenta de viento. ‘Viento huracanado’ mantiene el énfasis en la fuerza del viento y es idiomático en español.
- source_word: εἰς τὴν λίμνην
  english_pob_choice: on the lake
  chosen_spanish: sobre el lago
  alternatives_spanish:
  - en el lago
  - contra el lago
  lexicon: BDAG
  rationale: Aunque εἰς es literalmente ‘hacia/into’, con un fenómeno meteorológico el sentido natural en español es que el viento desciende ‘sobre’ el lago.
- source_word: συνεπληροῦντο
  english_pob_choice: they were being swamped
  chosen_spanish: eran cubiertos por las olas
  alternatives_spanish:
  - se estaban llenando de agua
  - eran anegados
  lexicon: BDAG
  rationale: El imperfecto pasivo indica proceso continuo de amenaza. En español, ‘eran cubiertos por las olas’ refleja la idea del barco llenándose/siendo embestido sin imponer demasiado un objeto implícito.
- source_word: ἐκινδύνευον
  english_pob_choice: were in danger
  chosen_spanish: estaban en peligro
  alternatives_spanish:
  - corrían peligro
  - estaban en riesgo
  lexicon: BDAG
  rationale: El imperfecto expresa peligro sostenido; ‘estaban en peligro’ es claro, sobrio y fiel al valor aspectual.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece en el texto español exactamente donde corresponde al matiz alternativo de συνεπληροῦντο.'
  spanish_consistency_notes:
  - Se mantuvo un registro moderno y digno, apto para lectura eclesial.
  - Se preservó el matiz aspectual de los imperfectos con formas progresivas o durativas en español.
  - Se evitó ‘SEÑOR’ o terminología que no corresponde a este versículo.
  - ‘Lago’ se usa de manera consistente para λίμνην según el contexto de Lucas 8.
