revisions:
- from: Mientras ellos navegaban, él se quedó dormido. Y descendió un viento huracanado sobre el lago, y eran cubiertos por las olas[a] y estaban en peligro.
  to: Mientras ellos navegaban, él se quedó dormido. Y descendió una tempestad de viento sobre el lago, y estaban siendo anegados[a] y estaban en peligro.
  rationale: Se reemplaza «un viento huracanado» por «una tempestad de viento» para reflejar mejor λαῖλαψ ἀνέμου. Se cambia «eran cubiertos por las olas» por «estaban siendo anegados» para preservar συνεπληροῦντο sin introducir «olas», y se ajusta la nota al pie para representar con mayor fidelidad la alternativa léxica documentada.
