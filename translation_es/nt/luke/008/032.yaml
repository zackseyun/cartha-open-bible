- from: Ahora había allí una gran[a] piara de cerdos[b] que pastaba[c] en el monte[d]; y le rogaron[e] que les permitiera entrar en aquellos[f]; y se lo permitió.
  to: Ahora había allí una gran[a] piara de cerdos que se alimentaba[b] en el monte[c]; y le rogaron[d] que les permitiera entrar en aquellos cerdos, y se lo permitió.
  rationale: Se corrigen los anclajes de notas para que coincidan exactamente con su contenido, se elimina la duplicación sobre 'monte/ladera', se mejora la naturalidad de βοσκομένη con 'se alimentaba', y se explicita 'aquellos cerdos' para preservar la claridad referencial que el POB inglés consideró importante, sin añadir interpretación más allá del contexto.
