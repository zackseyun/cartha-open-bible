translation:
  language: es
  text: Ahora había allí una gran[a] piara de cerdos que se alimentaba[b] en el monte[c]; y le rogaron[d] que les permitiera entrar en aquellos cerdos, y se lo permitió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘muchos’ o ‘una piara considerable de cerdos’.
    reason: lexical_alternative
  - marker: b
    text: O ‘que pastaba’.
    reason: lexical_alternative
  - marker: c
    text: O ‘en la ladera’.
    reason: lexical_alternative
  - marker: d
    text: El sujeto plural no se nombra aquí; el contexto anterior identifica a los demonios o espíritus inmundos. Algunas traducciones lo hacen explícito.
    reason: theological_note
lexical_decisions:
- source_word: Ἦν δὲ ἐκεῖ
  english_pob_choice: Now there was there
  chosen_spanish: Ahora había allí
  alternatives_spanish:
  - Y había allí
  - Entonces había allí
  lexicon: SBLGNT / BDAG
  rationale: Ahora funciona como marcador discursivo natural para δὲ; había allí conserva la impersonalidad narrativa y el orden español fluido sin perder el valor introductorio del griego.
- source_word: ἀγέλη
  english_pob_choice: herd
  chosen_spanish: piara
  alternatives_spanish:
  - manada
  - rebaño
  lexicon: BDAG
  rationale: Para χοίρων, piara es el colectivo natural en español para cerdos y mantiene la referencia específica del grupo animal mejor que un término más genérico como manada o rebaño.
- source_word: χοίρων
  english_pob_choice: pigs
  chosen_spanish: cerdos
  alternatives_spanish:
  - puercos
  - cochinos
  lexicon: BDAG
  rationale: Cerdos es la forma clara y neutral en español contemporáneo; conserva el referente zoológico sin arcaísmo ni matiz demasiado coloquial.
- source_word: ἱκανῶν
  english_pob_choice: large
  chosen_spanish: gran
  alternatives_spanish:
  - muchos
  - considerable
  lexicon: BDAG
  rationale: Gran comunica de manera natural la idea de tamaño o abundancia de la piara sin decidir rígidamente entre cantidad y magnitud; preserva la amplitud semántica de ἱκανῶν.
- source_word: βοσκομένη
  english_pob_choice: feeding
  chosen_spanish: que pastaba
  alternatives_spanish:
  - que estaba comiendo
  - que se alimentaba
  lexicon: BDAG
  rationale: El participio describe la actividad del grupo. Pastaba es la opción más cercana al campo de βόσκω y mantiene una imagen verbal sencilla; aunque los cerdos no 'pastorean' en sentido estricto, en español la forma funciona como equivalente dinámico de la acción de alimentarse en el terreno.
- source_word: ἐν τῷ ὄρει
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - en la montaña
  - en la loma
  lexicon: BDAG
  rationale: Monte conserva la referencia geográfica de ὄρος con un registro bíblico natural en español. Es más flexible que montaña para escenarios de relieve no técnico y evita interpretar demasiado el lugar.
- source_word: παρεκάλεσαν
  english_pob_choice: begged
  chosen_spanish: le rogaron
  alternatives_spanish:
  - le suplicaron
  - le imploraron
  lexicon: BDAG
  rationale: Rogar expresa una petición insistente y respetuosa, equivalente al fuerte ruego de παρεκάλεσαν sin volverlo excesivamente moderno o informal.
- source_word: ἐπιτρέψῃ / ἐπέτρεψεν
  english_pob_choice: permit / permitted
  chosen_spanish: les permitiera / se lo permitió
  alternatives_spanish:
  - les concediera / se lo concedió
  - les dejara / se lo dejó
  lexicon: BDAG
  rationale: Permitir preserva la correspondencia verbal entre la súplica y la respuesta. El subjuntivo en permitiera refleja la subordinación de ἵνα ἐπιτρέψῃ, y se lo permitió conserva la referencia implícita al pedido sin sobreexplicarla.
- source_word: εἰς ἐκείνους εἰσελθεῖν
  english_pob_choice: to enter those pigs
  chosen_spanish: entrar en aquellos
  alternatives_spanish:
  - entrar en esos
  - entrar en los cerdos
  lexicon: BDAG
  rationale: Aquellos retiene el deíctico de ἐκείνους. En español, el objeto ya está claro por el contexto inmediato, así que se evita repetir 'cerdos' para no cargar innecesariamente la frase, aunque el referente permanece entendido.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: Ahora reproduce bien el avance narrativo de δὲ en una apertura de escena, con un tono natural en español.
theological_decisions:
- issue: Sujeto implícito de 'le rogaron'
  english_pob_reading: The plural refers to the demons/unclean spirits speaking through the possessed man, left implicit as in the Greek context.
  chosen_spanish_reading: Se conserva el plural implícito en 'le rogaron', sin explicitar 'los demonios' en el cuerpo del versículo.
  alternative_spanish_readings:
  - los demonios le rogaron
  - los espíritus inmundos le rogaron
  rationale: El griego usa un verbo plural sin nombrar explícitamente a los sujetos; mantener la referencia implícita respeta la forma del texto y deja que el contexto inmediato identifique a los hablantes, sin resolver una tensión que el pasaje mismo no verbaliza aquí.
  doctrine_reference: Preservar la implicación contextual sin añadir precisión interpretativa no dicha en el verso.
translation_notes:
  revision_awareness: Se ha seguido de cerca el audit trail en inglés y el griego SBLGNT, conservando el sujeto plural implícito, la correspondencia formal entre pedir permiso y concederlo, y la ambigüedad razonable de ἱκανῶν y ἐν τῷ ὄρει sin sobreinterpretarlas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplicable aquí; no hay términos divinos en este versículo.
  - Se usó 'permitiera / permitió' para conservar el paralelismo verbal de ἐπιτρέπω.
  - Se prefirió 'piara' para cerdos por naturalidad en español y correspondencia colectiva.
  - Se evitó explicitar 'los demonios' en el texto principal para respetar el plural implícito del griego.
  - Se conservó un registro bíblico pero moderno, apto para lectura pública.
