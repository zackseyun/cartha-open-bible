review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: hay una gran piara de cerdos en el monte, los demonios/espíritus le ruegan permiso para entrar en los cerdos, y Jesús se lo concede. Sin embargo, la distribución de notas está desalineada con sus anclajes y una decisión clave del sintagma εἰς ἐκείνους εἰσελθεῖν queda demasiado implícita en español con ''aquellos'', donde conviene explicitar ''aquellos cerdos'' como hace el POB inglés para conservar claridad referencial.'
  spanish_quality_summary: 'El español es generalmente natural y digno. ''Piara de cerdos'' y ''en el monte'' funcionan bien. No obstante, ''que pastaba'' suena menos natural para cerdos que ''que se alimentaba'', y las notas actuales crean confusión: [b] está sobre ''cerdos'' pero su nota habla de ''en la ladera''; [c] está sobre ''pastaba'' pero su nota sí corresponde; [d] duplica la cuestión del monte. Además, la nota sobre el sujeto implícito debe anclarse en ''le rogaron'', no en ''aquellos''.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Cerdos' corresponde bien a χοίρων; 'permitiera' / 'permitió' conserva bien ἐπιτρέψῃ / ἐπέτρεψεν. La revisión propuesta mantiene la fuerza léxica y mejora la claridad del referente implícito conforme al razonamiento del POB inglés.
  issues:
  - severity: high
    issue: Marcadores de notas mal asignados en el texto
    rationale: El marcador [b] aparece en 'cerdos' pero la nota [b] explica 'en la ladera'; esto rompe la correspondencia exigida entre anclaje y contenido de la nota.
  - severity: medium
    issue: El referente de 'aquellos' queda demasiado elíptico en español
    rationale: Aunque el griego puede dejar el objeto con demostrativo, el POB inglés explicitó 'those pigs' por claridad. En español, 'entrar en aquellos' suena más oscuro y menos natural que 'entrar en aquellos cerdos'.
  - severity: medium
    issue: La nota sobre el sujeto implícito está anclada en el lugar incorrecto
    rationale: La observación teológica trata del sujeto plural de 'le rogaron', no del complemento 'aquellos'; debe ir donde aparece la ambigüedad relevante.
  - severity: low
    issue: '''Pastaba'' es menos idiomático con cerdos'
    rationale: Aunque defendible, 'se alimentaba' refleja mejor βοσκομένη en español natural para cerdos sin pérdida de sentido.
  - severity: low
    issue: Duplicación innecesaria de notas sobre ἐν τῷ ὄρει
    rationale: Basta una nota léxica en 'monte' para la alternativa 'ladera'; mantener dos notas separadas sobre el mismo punto recarga el versículo.
