translation:
  language: es
  text: 'Entonces el hombre de quien habían salido los demonios le rogaba estar con él; pero Jesús lo envió, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐδεῖτο
  english_pob_choice: was begging
  chosen_spanish: le rogaba
  alternatives_spanish:
  - le suplicaba
  - insistía en pedirle
  - le imploraba
  lexicon: BDAG
  rationale: El imperfecto de δέομαι expresa una súplica insistente o reiterada. En español, «le rogaba» comunica bien esa petición continua sin sonar demasiado coloquial ni exagerar el matiz de manera innecesaria.
- source_word: αὐτοῦ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: 'El genitivo con δέομαι señala a la persona a la que se dirige la petición; en español se expresa naturalmente con dativo: «le rogaba».'
- source_word: ὁ ἀνὴρ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - la persona
  lexicon: BDAG
  rationale: ἀνήρ designa aquí al individuo masculino ya identificado en el relato; «el hombre» es natural, exacto y transparente en español.
- source_word: ἀφ’ οὗ ἐξεληλύθει τὰ δαιμόνια
  english_pob_choice: from whom the demons had gone out
  chosen_spanish: de quien habían salido los demonios
  alternatives_spanish:
  - de quien los demonios habían salido
  - de quien habían salido los demonios
  lexicon: BDAG
  rationale: El pluperfecto griego indica una salida anterior a la súplica. «Habían salido» preserva el valor temporal y mantiene el lenguaje exorcístico de modo claro en español.
- source_word: τὰ δαιμόνια
  english_pob_choice: the demons
  chosen_spanish: los demonios
  alternatives_spanish:
  - los espíritus malignos
  lexicon: BDAG
  rationale: «Demonios» es la correspondencia más directa para δαιμόνια y conserva la afirmación sobrenatural del pasaje sin suavizarla.
- source_word: εἶναι σὺν αὐτῷ
  english_pob_choice: to be with him
  chosen_spanish: estar con él
  alternatives_spanish:
  - acompañarlo
  - quedarse con él
  lexicon: BDAG
  rationale: La construcción infinitiva se rinde de manera directa con «estar con él», que es fiel y natural en español.
- source_word: ἀπέλυσεν
  english_pob_choice: sent him away
  chosen_spanish: lo despidió
  alternatives_spanish:
  - lo envió lejos
  - lo dejó ir
  lexicon: BDAG
  rationale: En este contexto narrativo, ἀπολύω indica dejar ir o despedir. «Lo despidió» conserva el valor de despedida/mandato de salir sin añadir dureza indebida; en español suena más natural que una calca como «lo envió lejos».
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio presente introduce la cita directa; «diciendo» sigue de cerca el griego y funciona con fluidez en español.
theological_decisions:
- issue: Preservación de la realidad personal de los espíritus inmundos/demonios
  english_pob_reading: the demons
  chosen_spanish_reading: los demonios
  alternative_spanish_readings:
  - los espíritus malignos
  rationale: 'La traducción conserva la ontología explícita del texto: entidades demoníacas que salen de la persona. «Demonios» evita diluir el sentido en una expresión más vaga.'
  doctrine_reference: 'Affirmations; Translation philosophy #1'
translation_notes:
  revision_awareness: 'El texto inglés POB y la auditoría léxica muestran una decisión estable: ἐδεῖτο como súplica insistente, τὰ δαιμόνια como ‘the demons’, ἀπέλυσεν como ‘sent him away’. No se registran notas ni revisiones pendientes en el paquete de referencia, y la versión española mantiene esas elecciones con equivalentes idiomáticos naturales.'
  spanish_consistency_notes:
  - Se mantiene «demonios» para δαιμόνια en coherencia con el criterio POB y con la transparencia sobrenatural del pasaje.
  - Se evita «SEÑOR» u otras sustituciones no presentes, pues aquí no aparece el nombre divino.
  - «Le rogaba» refleja un imperfecto de petición insistente sin sobrecargar el tono.
  - «Lo despidió» reproduce el sentido de ἀπέλυσεν en contexto narrativo de despedida/permiso para irse.
