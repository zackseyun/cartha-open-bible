review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: la mujer se acerca por detrás, toca el κρασπέδου de su prenda, y el flujo cesa de inmediato. Sin embargo, «la hemorragia de su sangre» no refleja con naturalidad ni precisión ἡ ῥύσις τοῦ αἵματος αὐτῆς; suena redundante y poco idiomático en español. «Flujo de sangre» o «sangrado» preservan mejor el valor léxico de ῥύσις.'
  spanish_quality_summary: El español es en general claro y digno, pero presenta un problema importante de naturalidad en «la hemorragia de su sangre». Además, «en seguida» hoy suele preferirse «enseguida» como una sola palabra. «Manto» es aceptable, aunque «vestido» o «prenda» serían más amplios; no exige cambio. El resto fluye bien.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión de traducir κράσπεδον como «borde» con nota alternativa es defendible, aunque el inglés POB privilegia «fringe»; la nota preserva bien «fleco/orla».
  issues:
  - severity: medium
    issue: «la hemorragia de su sangre» es una formulación poco natural y redundante
    rationale: ῥύσις τοῦ αἵματος αὐτῆς significa el flujo/sangrado de ella. En español, «hemorragia de su sangre» resulta extraña, porque toda hemorragia es de sangre; además añade una rigidez no requerida por el texto.
  - severity: low
    issue: «en seguida» puede modernizarse a «enseguida»
    rationale: Ambas grafías se entienden, pero «enseguida» como una sola palabra es la forma más corriente y limpia en español contemporáneo.
  revised_spanish_text: Acercándose por detrás, tocó el borde[a] de su manto, y enseguida se detuvo su flujo de sangre.
  revised_footnotes:
  - marker: a
    text: O «ribete», «fleco» u «orla» de su manto.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la frase final para reflejar mejor ἡ ῥύσις τοῦ αἵματος αὐτῆς con un español natural y fiel: «su flujo de sangre». También se moderniza «en seguida» a «enseguida». Se conserva «borde» con nota léxica, ya que mantiene la amplitud semántica de κράσπεδον y respeta la justificación del POB.'
