translation:
  language: es
  text: Acercándose por detrás, tocó el borde[a] de su manto, y enseguida se detuvo su flujo de sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ribete», «fleco» u «orla» de su manto.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθοῦσα
  english_pob_choice: Coming up
  chosen_spanish: Acercándose
  alternatives_spanish:
  - Habiéndose acercado
  - Viniendo
  lexicon: BDAG
  rationale: El participio aoristo de προσέρχομαι expresa acción previa o concomitante anterior al verbo principal. En español, «Acercándose» comunica ese movimiento sin sonar forzado y mantiene el valor narrativo de aproximación.
- source_word: ὄπισθεν
  english_pob_choice: behind him
  chosen_spanish: por detrás
  alternatives_spanish:
  - detrás de él
  - por la espalda
  lexicon: BDAG
  rationale: El adverbio señala posición trasera. «Por detrás» es natural en español y conserva la orientación espacial sin añadir más precisión de la que ofrece el griego.
- source_word: ἥψατο
  english_pob_choice: touched
  chosen_spanish: tocó
  alternatives_spanish:
  - tomó
  - tocó levemente
  lexicon: BDAG
  rationale: El aoristo medio de ἅπτω en esta construcción significa simplemente «tocar». «Tocó» evita introducir una fuerza de agarre que el texto no exige.
- source_word: τοῦ κρασπέδου
  english_pob_choice: the fringe
  chosen_spanish: el borde[a]
  alternatives_spanish:
  - el ribete
  - el fleco
  - la orla
  lexicon: BDAG
  rationale: κράσπεδον puede referirse al borde, la orla, el fleco o el adorno colgante del vestido. En español, «borde» es amplio y fiel; la nota preserva las alternativas léxicas que el inglés POB mantuvo para la posible referencia al fleco o borla del vestido.
- source_word: τοῦ ἱματίου αὐτοῦ
  english_pob_choice: of his garment
  chosen_spanish: de su manto
  alternatives_spanish:
  - de su vestidura
  - de su ropa
  - de su túnica
  lexicon: BDAG
  rationale: ἱμάτιον designa una prenda exterior, una capa o manto. «Manto» es una opción española digna y comprensible; evita la vaguedad de «ropa» y no fuerza una especificidad mayor que la del original.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: en seguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: El adverbio marca efecto temporal inmediato. «En seguida» es natural en español y conserva la rapidez del cambio.
- source_word: ἔστη
  english_pob_choice: stopped
  chosen_spanish: se detuvo
  alternatives_spanish:
  - cesó
  - paró
  lexicon: BDAG
  rationale: El aoristo de ἵστημι, aplicado al flujo, significa que cesó o se detuvo. «Se detuvo» mantiene la idea de cese del sangrado sin reificar el proceso.
- source_word: ἡ ῥύσις τοῦ αἵματος αὐτῆς
  english_pob_choice: her flow of blood
  chosen_spanish: la hemorragia de su sangre
  alternatives_spanish:
  - el flujo de sangre
  - su hemorragia
  - la pérdida de sangre
  lexicon: BDAG
  rationale: ῥύσις describe un flujo o derrame continuo; aquí se trata del padecimiento narrado previamente. «Hemorragia de su sangre» preserva el valor médico del sustantivo y la intensidad del cuadro, sin suavizarlo a una paráfrasis más general.
theological_decisions:
- issue: Posible referencia ritual en κράσπεδον
  english_pob_reading: Render as 'fringe' in the main text, with alternatives hem/tassel preserved
  chosen_spanish_reading: «borde» en el texto principal, con nota de alternativas léxicas
  alternative_spanish_readings:
  - fleco
  - borla
  - orla
  rationale: El pasaje permite una alusión al adorno del borde del manto, quizá relacionado con los flecos judíos, pero no lo explicita. El texto principal conserva una formulación amplia y la nota resguarda la tensión semántica sin imponer una lectura ritual no demostrada por el versículo.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El texto base y el control cruzado muestran alta concordancia y ningún cambio requerido en la última pasada de revisión; la redacción española se alinea con esa estabilidad, preservando la secuencia narrativa, el matiz inmediato de παραχρῆμα y la ambigüedad léxica de κράσπεδον sin sobreexplicarla.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, pero con español natural.
  - «Manto» se usó para ἱμάτιον como equivalente amplio y digno de una prenda exterior.
  - La nota [a] aparece anclada en «borde» para conservar la alternativa semántica de κράσπεδον.
  - No se introdujo vocabulario doctrinal ajeno al texto ni se amplificó la escena más allá del griego.
