translation:
  language: es
  text: porque tenía una única hija[a], de unos doce años[b], y ella se estaba muriendo. Y, mientras él iba, las multitudes lo apretaban[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una y única hija».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «como de doce años».'
    reason: lexical_alternative
  - marker: c
    text: El verbo griego puede sugerir que la multitud lo apretaba con tal fuerza que casi lo aplastaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: μονογενὴς
  english_pob_choice: only
  chosen_spanish: única
  alternatives_spanish:
  - sola
  - hija única
  - única hija
  lexicon: BDAG
  rationale: Con θυγάτηρ, el sentido es de hija única o singular dentro de la familia, no una idea metafísica. «Única» conserva esa fuerza de relación familiar de modo natural en español.
- source_word: ὡς ἐτῶν δώδεκα
  english_pob_choice: about twelve years old
  chosen_spanish: de unos doce años
  alternatives_spanish:
  - como de doce años
  - aproximadamente de doce años
  - de cerca de doce años
  lexicon: BDAG
  rationale: ὡς con un número marca aproximación. «De unos doce años» expresa esa atenuación de forma idiomática y clara en español.
- source_word: ἀπέθνῃσκεν
  english_pob_choice: was dying
  chosen_spanish: se estaba muriendo
  alternatives_spanish:
  - estaba muriendo
  - agonizaba
  - estaba al borde de la muerte
  lexicon: BDAG
  rationale: El imperfecto señala proceso en curso. «Se estaba muriendo» mantiene esa continuidad y suena natural en español contemporáneo.
- source_word: Ἐν δὲ τῷ ὑπάγειν αὐτὸν
  english_pob_choice: as he went
  chosen_spanish: mientras él iba
  alternatives_spanish:
  - mientras iba
  - cuando él iba
  - mientras se encaminaba
  lexicon: BDAG
  rationale: La construcción con infinitivo articular expresa acción simultánea. «Mientras él iba» es breve, fiel y claro; «iba» puede implicar aquí el desplazamiento narrativo hacia la casa de Jairo.
- source_word: οἱ ὄχλοι
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - la multitud
  - la gente
  - las turbas
  lexicon: BDAG
  rationale: El plural se conserva mejor con «las multitudes», reflejando grupos apretándose alrededor de Jesús y evitando reducirlo a un singular colectivo.
- source_word: συνέπνιγον
  english_pob_choice: were pressing in on
  chosen_spanish: lo apretaban
  alternatives_spanish:
  - lo apretaban hasta casi ahogarlo
  - lo rodeaban apretadamente
  - lo comprimían
  lexicon: BDAG
  rationale: El verbo puede sugerir presión tan fuerte que casi asfixia o aplasta. «Lo apretaban» comunica la presión física sin exagerar más allá del contexto inmediato; el matiz intenso queda reforzado por el flujo narrativo y la nota.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  - puesto que
  lexicon: BDAG
  rationale: Introduce la explicación causal de la petición previa. «Porque» es la equivalencia más natural y directa en español.
- source_word: αὐτῷ
  english_pob_choice: he had
  chosen_spanish: tenía
  alternatives_spanish:
  - le pertenecía
  - poseía
  - había para él
  lexicon: BDAG
  rationale: El dativo con ἦν es posesivo. En español se expresa con «tenía»; el sujeto implícito se mantiene por el contexto narrativo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de SBLGNT y el estado de alta concordancia del audit trail inglés, manteniendo las tres decisiones clave ya estabilizadas: el valor de μονογενής como hija única/singular, la aproximación de ὡς con número, y la intensidad física de συνέπνιγον sin sobrerreproducirla en el cuerpo principal. No se registran revisiones aplicadas en el paquete inglés, así que la redacción española conserva esa lectura estable.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - Se evita «Cristo» porque no corresponde a este versículo.
  - Se preserva el imperfecto progresivo («se estaba muriendo») para ἀπέθνῃσκεν.
  - Se conserva el plural «multitudes» para οἱ ὄχλοι, en coherencia con el griego.
  - La puntuación refleja la subordinación causal y la simultaneidad narrativa del original.
