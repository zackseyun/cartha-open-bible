    issue: 'La nota [b] está anclada a «iba» pero su contenido dice «Literalmente: “mientras él iba”», que no corresponde a la nota inglesa [b].'
    rationale: En el POB inglés, [b] comenta ὡς ἐτῶν δώδεκα («Literalmente ‘about twelve years’»). En español, la nota literal pertinente debe ir con la edad, no con «iba».
  - severity: low
    issue: 'La nota [a] está redactada de forma poco natural: «''O: “hija única”, o “una y única hija”.''»'
    rationale: La alternativa española debe ser idiomática y limpia. «O “única hija”» o «O “una y única hija”» bastan; «hija única» ya está prácticamente reflejado en el texto.
  - severity: low
    issue: «una hija única» es comprensible, pero menos natural en español bíblico contemporáneo que «su única hija» o «una única hija».
    rationale: El griego expresa posesión por contexto («he had an only daughter»). En español, «tenía una hija única» funciona, pero «tenía una única hija» suena más fluido y preciso.
  revised_spanish_text: porque tenía una única hija[a], de unos doce años[b], y ella se estaba muriendo. Y, mientras él iba, las multitudes lo apretaban[c].
