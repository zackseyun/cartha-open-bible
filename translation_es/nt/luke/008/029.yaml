    rationale: El inglés POB eligió 'for many times' y dejó 'for a long time' en nota. En español, 'muchas veces' refleja mejor esa preferencia, mientras la alternativa de duración puede conservarse en nota.
  - severity: low
    issue: '''hacia los lugares desolados'' atenúa el movimiento de εἰς'
    rationale: El griego indica dirección efectiva/entrada; 'a los lugares desolados' lo comunica con más precisión y naturalidad.
