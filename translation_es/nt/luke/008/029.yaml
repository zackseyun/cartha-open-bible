  text: ⸀παρήγγελλεν γὰρ τῷ πνεύματι τῷ ἀκαθάρτῳ ἐξελθεῖν ἀπὸ τοῦ ἀνθρώπου. πολλοῖς γὰρ χρόνοις συνηρπάκει αὐτόν, καὶ ⸀ἐδεσμεύετο ἁλύσεσιν καὶ πέδαις φυλασσόμενος, καὶ διαρρήσσων τὰ δεσμὰ ἠλαύνετο ⸀ὑπὸ τοῦ ⸀δαιμονίου εἰς τὰς ἐρήμους.
base_translation:
  language: en
  yaml_path: translation/nt/luke/008/029.yaml
  text: For he had commanded the unclean spirit to come out of the man[a]. For many times it had seized him, and he was kept bound with chains and shackles, being guarded, and breaking the bonds[c][b], he was driven by the demon into the desolate places.
  footnotes:
  - marker: a
    text: Or 'for a long time'; the Greek can denote extended duration, though the context also supports repeated episodes, hence 'many times.'
    reason: lexical_alternative
  - marker: b
    text: Or 'into the wilderness.' The Greek is plural, literally 'into the deserted places.'
    reason: lexical_alternative
  - marker: c
    text: Or 'yet breaking the bonds he was driven'.
    reason: previous_rendering
