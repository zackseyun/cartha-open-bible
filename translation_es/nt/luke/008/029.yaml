translation:
  language: es
  text: Porque había ordenado al espíritu inmundo que saliera del hombre. Pues muchas veces[a] se había apoderado de él, y era mantenido atado con cadenas y grillos, bajo custodia, y rompiendo las ataduras, era impulsado por el demonio a los lugares desolados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''durante mucho tiempo''; el griego puede denotar una duración prolongada, aunque el contexto también apoya episodios repetidos, de ahí ''muchas veces''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''al desierto''. El griego está en plural, literalmente ''a los lugares desolados''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρήγγελλεν
  english_pob_choice: had commanded
  chosen_spanish: había ordenado
  alternatives_spanish:
  - ordenaba
  - ordenó
  lexicon: BDAG
  rationale: El pluscuamperfecto español refleja bien la acción previa al resto del relato, tal como el audit trail inglés la trató con pasado perfecto. 'Ordenado' conserva el valor de mandato fuerte sin endurecer innecesariamente el español.
- source_word: πνεύματι τῷ ἀκαθάρτῳ
  english_pob_choice: the unclean spirit
  chosen_spanish: el espíritu inmundo
  alternatives_spanish:
  - el espíritu impuro
  lexicon: BDAG
  rationale: '''Inmundo'' mantiene la conexión bíblica de impureza ritual y demoníaca que el inglés preserva con ''unclean''. ''Impuro'' es posible, pero atenúa la resonancia lexical de la fórmula fija.'
- source_word: ἐξελθεῖν ἀπὸ τοῦ ἀνθρώπου
  english_pob_choice: to come out of the man
  chosen_spanish: que saliera del hombre
  alternatives_spanish:
  - que saliera fuera del hombre
  - que saliera de aquel hombre
  lexicon: BDAG
  rationale: '''Salir'' comunica de forma natural el movimiento exorcístico. El complemento ''del hombre'' conserva la relación espacial de ἀπό sin volver la frase pesada.'
- source_word: πολλοῖς γὰρ χρόνοις
  english_pob_choice: for many times
  chosen_spanish: desde hacía muchos tiempos
  alternatives_spanish:
  - por muchos tiempos
  - durante mucho tiempo
  lexicon: BDAG
  rationale: 'El griego admite tanto duración prolongada como repetición. Elegí una forma española que deja abierta esa tensión: ''desde hacía muchos tiempos'' sugiere una prolongación extensa y además puede implicar reiteración de episodios, como el audit trail inglés preserva con su nota.'
- source_word: συνηρπάκει
  english_pob_choice: had seized
  chosen_spanish: se había apoderado de
  alternatives_spanish:
  - lo había arrebatado
  - lo había asaltado
  lexicon: BDAG
  rationale: '''Apoderarse de'' expresa la toma violenta y dominante del sujeto mejor que un simple ''agarrar''. En español fluye con naturalidad y conserva el matiz de sobrecogimiento/violencia del verbo griego.'
- source_word: ἐδεσμεύετο
  english_pob_choice: was kept bound
  chosen_spanish: era mantenido atado
  alternatives_spanish:
  - era mantenido sujeto
  - estaba atado
  lexicon: BDAG
  rationale: El imperfecto apunta a una situación continuada. 'Era mantenido atado' reproduce el sentido de estar bajo sujeción continua y el esfuerzo externo por restringirlo.
- source_word: ἁλύσεσιν καὶ πέδαις
  english_pob_choice: with chains and shackles
  chosen_spanish: con cadenas y grillos
  alternatives_spanish:
  - con cadenas y fetos
  - con cadenas y esposas
  lexicon: BDAG
  rationale: '''Cadenas y grillos'' distingue de modo natural los dos tipos de sujeción. ''Grillos'' sirve para πέδαις como ataduras de pies o restraints, sin sonar arcaico de manera excesiva.'
- source_word: φυλασσόμενος
  english_pob_choice: being guarded
  chosen_spanish: custodiado
  alternatives_spanish:
  - siendo custodiado
  - vigilado
  lexicon: BDAG
  rationale: '''Custodiado'' resume de forma compacta la vigilancia ejercida sobre él. En español funciona mejor que una perífrasis y conserva el sentido de protección/restricción externa.'
- source_word: διαρρήσσων τὰ δεσμὰ
  english_pob_choice: breaking the bonds
  chosen_spanish: rompiendo las ataduras
  alternatives_spanish:
  - rasgando las ataduras
  - rompiendo los vínculos
  lexicon: BDAG
  rationale: '''Ataduras'' traduce δεσμά sin repetir ''cadenas''. El gerundio conserva la acción simultánea y el aspecto participial del griego.'
- source_word: ἠλαύνετο
  english_pob_choice: he was driven
  chosen_spanish: era impulsado
  alternatives_spanish:
  - era arrastrado
  - era conducido
  lexicon: BDAG
  rationale: '''Impulsado'' expresa la fuerza compulsiva del verbo en pasivo imperfecto y su carácter repetitivo. ''Arrastrado'' sería más físico; ''impulsado'' permite el empuje demoníaco sin añadir demasiado.'
- source_word: ὑπὸ τοῦ δαιμονίου
  english_pob_choice: by the demon
  chosen_spanish: por el demonio
  alternatives_spanish:
  - por el demonio inmundo
  - por el espíritu demoníaco
  lexicon: BDAG
  rationale: El término aquí personaliza la agencia demoniaca; 'demonio' es la equivalencia más directa y mantiene la lectura narrativa del texto.
- source_word: εἰς τὰς ἐρήμους
  english_pob_choice: into the desolate places
  chosen_spanish: hacia los lugares desolados
  alternatives_spanish:
  - a los lugares desiertos
  - hacia el desierto
  lexicon: BDAG
  rationale: El plural se conserva mejor con 'lugares desolados'. 'Hacia' respeta el movimiento de εἰς y evita reducir el plural a un solo 'desierto'.
theological_decisions:
- issue: Terminología demoniaca sin atenuación
  english_pob_reading: Translate both ἀκάθαρτον πνεῦμα and δαιμόνιον straightforwardly as 'unclean spirit' and 'demon' without softening or psychologizing.
  chosen_spanish_reading: Traducir ἀκάθαρτον πνεῦμα como 'espíritu inmundo' y δαιμόνιον como 'demonio', sin convertirlo en mera enfermedad o metáfora.
  alternative_spanish_readings:
  - espíritu impuro
  - fuerza demoníaca
  - trastorno espiritual
  rationale: La narración presenta agencia personal demoníaca. El español debe conservar esa realidad textual sin rebajarla a psicología o símbolo. 'Inmundo' además mantiene la huella lexical bíblica de impureza.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Valor de εἰς τὰς ἐρήμους
  english_pob_reading: Or 'into the wilderness.' The Greek is plural, literally 'into the deserted places.'
  chosen_spanish_reading: '''Hacia los lugares desolados'' conserva el plural y el matiz de áreas deshabitadas.'
  alternative_spanish_readings:
  - al desierto
  - a los lugares desiertos
  rationale: Evitar el singular 'desierto' protege el plural griego y la imagen de zonas vacías o inhabitadas. 'Lugares desolados' es claro y no excesivamente interpretativo.
  doctrine_reference: Translation philosophy §1
- issue: Tensión temporal en πολλοῖς χρόνοις
  english_pob_reading: Or 'for a long time'; the Greek can denote extended duration, though the context also supports repeated episodes, hence 'many times.'
  chosen_spanish_reading: '''Desde hacía muchos tiempos'' deja abierta tanto la duración como la reiteración de episodios.'
  alternative_spanish_readings:
  - durante mucho tiempo
  - muchas veces
  rationale: El griego admite una tensión semántica que el audit trail inglés no resuelve de forma total. El español propuesto evita borrar esa ambigüedad y la hace legible.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El inglés más reciente mantiene 'desolate places' y conserva la coordinación simple en el tramo final; la redacción española sigue ese ajuste y evita añadir contrastes no presentes. También respeta la tensión léxica de πολλοῖς χρόνοις sin resolverla de manera demasiado unívoca.
  spanish_consistency_notes:
  - Usé 'Yahvé' como convención general del proyecto solo cuando corresponda al nombre divino; en este versículo no aparece.
  - Mantuve 'espíritu inmundo' y 'demonio' para conservar la terminología demonológica directa del texto.
  - Elegí un español publicable y natural, pero suficientemente cercano a la sintaxis del griego para no borrar las relaciones causales y participiales del verso.
