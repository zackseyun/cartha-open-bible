translation:
  language: es
  text: 'Y todos lloraban y hacían duelo por ella. Pero él dijo[a]: «No lloren, porque no ha muerto, sino que duerme».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «está durmiendo». El lenguaje de Jesús usa el sueño como descripción metafórica en el contexto de su restauración inminente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκλαιον
  english_pob_choice: were weeping
  chosen_spanish: lloraban
  alternatives_spanish:
  - estaban llorando
  - estaban llorando en voz alta
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua; en español, «lloraban» conserva esa duración con naturalidad y sin forzar un perífrasis innecesaria.
- source_word: πάντες
  english_pob_choice: they were all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos los presentes
  lexicon: BDAG
  rationale: «Todos» preserva el alcance universal del sujeto de manera concisa y clara en español.
- source_word: ἐκόπτοντο αὐτήν
  english_pob_choice: mourning for her
  chosen_spanish: hacían duelo por ella
  alternatives_spanish:
  - se lamentaban por ella
  - se golpeaban el pecho por ella
  lexicon: BDAG
  rationale: κόπτομαι en contexto funerario implica lamento/duelo, a menudo con gestos de aflicción. «Hacían duelo por ella» comunica el sentido sin sobreespecificar el gesto físico implícito.
- source_word: Μὴ κλαίετε
  english_pob_choice: Do not weep
  chosen_spanish: No lloren
  alternatives_spanish:
  - No estén llorando
  - Dejen de llorar
  lexicon: BDAG
  rationale: El imperativo con μή prohíbe la acción en curso; «No lloren» es una prohibición natural y fiel en español.
- source_word: ἀπέθανεν
  english_pob_choice: has not died
  chosen_spanish: no ha muerto
  alternatives_spanish:
  - no murió
  - no está muerta
  lexicon: BDAG
  rationale: El aoristo se vierte idiomáticamente con presente perfecto para expresar el estado resultante de la muerte, en contraste con «duerme».
- source_word: καθεύδει
  english_pob_choice: is sleeping
  chosen_spanish: duerme
  alternatives_spanish:
  - está durmiendo
  - está dormida
  lexicon: BDAG
  rationale: El presente griego se expresa con el verbo simple «duerme» para mantener la metáfora de sueño sin convertirla en una glosa interpretativa.
theological_decisions:
- issue: Jesús describe a la niña como dormida en lugar de muerta
  english_pob_reading: Retain the literal wording as spoken by Jesus, preserving the metaphor of sleep for death/reversal without interpretively resolving it in the main text.
  chosen_spanish_reading: 'Conservar el lenguaje metafórico de Jesús: «no ha muerto, sino que duerme».'
  alternative_spanish_readings:
  - no está realmente muerta, sino dormida
  - parece muerta, pero en realidad duerme
  rationale: La traducción debe preservar la tensión teológica del texto y la metáfora de sueño sin explicarla en exceso dentro del versículo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en «dijo[a]» y manteniendo una única nota correspondiente a la alternativa léxica documentada en el audit trail.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al nombre divino; este versículo no lo contiene.
  - Se prefirió «duerme» en vez de una paráfrasis explicativa para conservar la metáfora y la tensión teológica documentadas.
  - «Hacían duelo» conserva mejor el matiz funerario de ἐκόπτοντο que un simple «lamentaban» sin caer en sobretraducción.
