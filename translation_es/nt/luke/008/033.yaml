translation:
  language: es
  text: Entonces los demonios salieron del hombre y entraron en los cerdos, y la piara se precipitó por la pendiente escarpada[a] hacia el lago y se ahogó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el precipicio» o «por el risco»; el griego indica una bajada pronunciada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντα
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - habiendo salido
  - salieron de allí
  lexicon: SBLGNT; BDAG
  rationale: El participio aoristo antecede la acción principal; en español natural, "salieron" comunica bien la secuencia sin sobrecargar la frase con una construcción participial más rígida.
- source_word: δαιμόνια
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus inmundos
  lexicon: BDAG
  rationale: Se conserva el término específico del griego, sin sustituirlo por una categoría más amplia. "Demonios" corresponde de forma directa a δαιμόνια.
- source_word: ἀπὸ τοῦ ἀνθρώπου
  english_pob_choice: out of the man
  chosen_spanish: del hombre
  alternatives_spanish:
  - de parte del hombre
  - desde el hombre
  lexicon: BDAG
  rationale: Con un verbo de salida, el español idiomático expresa la relación con "salieron del hombre". El singular refiere al hombre poseído previamente mencionado.
- source_word: εἰσῆλθον εἰς τοὺς χοίρους
  english_pob_choice: entered the pigs
  chosen_spanish: entraron en los cerdos
  alternatives_spanish:
  - entraron en los puercos
  - entraron en la piara
  lexicon: BDAG
  rationale: '"Cerdos" es claro, neutral y fiel al referente animal. Mantiene la entrada literal en los animales, como en el griego.'
- source_word: χοίρους
  english_pob_choice: pigs
  chosen_spanish: cerdos
  alternatives_spanish:
  - puercos
  - marranos
  lexicon: BDAG
  rationale: '"Cerdos" es la opción más estándar y comprensible en español neutro; evita un registro demasiado coloquial o regional.'
- source_word: ὥρμησεν
  english_pob_choice: rushed
  chosen_spanish: se precipitó
  alternatives_spanish:
  - se lanzó
  - corrió con ímpetu
  lexicon: BDAG
  rationale: El verbo indica movimiento súbito e intenso. "Se precipitó" conserva esa fuerza sin añadir intención no explícita.
- source_word: ἡ ἀγέλη
  english_pob_choice: the herd
  chosen_spanish: la piara
  alternatives_spanish:
  - la manada
  - el rebaño
  lexicon: BDAG
  rationale: Para cerdos, "piara" es el sustantivo más preciso en español. "Horda" o "manada" serían menos exactos; "rebaño" no corresponde bien a este contexto.
- source_word: κατὰ τοῦ κρημνοῦ
  english_pob_choice: down the steep bank
  chosen_spanish: por la pendiente escarpada
  alternatives_spanish:
  - por el precipicio
  - por el risco
  lexicon: BDAG
  rationale: El griego permite una caída por un descenso abrupto sin exigir una pared vertical. "Pendiente escarpada" preserva la idea de descenso pronunciado y evita intensificar más allá del texto.
- source_word: λίμνην
  english_pob_choice: lake
  chosen_spanish: lago
  alternatives_spanish:
  - laguna
  - mar
  lexicon: BDAG
  rationale: Se conserva el sentido normal de λίμνη como "lago". No se sigue una tradición que lo convierta en "mar" cuando el término griego es específico.
- source_word: ἀπεπνίγη
  english_pob_choice: drowned
  chosen_spanish: se ahogó
  alternatives_spanish:
  - murió ahogada
  - fue ahogada
  lexicon: BDAG
  rationale: En el contexto de animales lanzándose al agua, el verbo expresa que murieron por ahogamiento. "Se ahogó" es una forma natural en español y refleja el valor intransitivo del griego.
theological_decisions:
- issue: Diferencia entre δαιμόνια y otras expresiones demonológicas
  english_pob_reading: demons
  chosen_spanish_reading: demonios
  alternative_spanish_readings:
  - espíritus inmundos
  rationale: Se mantiene la categoría léxica exacta del texto griego, sin reemplazarla por una formulación interpretativa usada en otros pasajes. Esto preserva la distinción documental del versículo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de κρημνός
  english_pob_reading: steep bank
  chosen_spanish_reading: pendiente escarpada
  alternative_spanish_readings:
  - precipicio
  - acantilado
  rationale: El término describe un descenso brusco, pero el verso no obliga a imaginar una pared vertical. "Pendiente escarpada" conserva la tensión topográfica sin exagerar el relieve.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado auditado en inglés, que prefiere una forma natural y directa ('drowned' en lugar de 'was drowned'). En español se reflejó esa misma decisión con "se ahogó". También se conservó la distinción léxica de δαιμόνια = "demonios" y de κρημνός como un descenso escarpado, no necesariamente un acantilado vertical.
  spanish_consistency_notes:
  - Se mantiene "demonios" para δαιμόνια, en coherencia con la decisión inglesa y con la distinción frente a "espíritus inmundos".
  - '"Cerdos" y "piara" forman una combinación natural en español para τοὺς χοίρους / ἡ ἀγέλη.'
  - '"Lago" se conserva para λίμνη, evitando sustituirlo por "mar".'
  - La nota al pie marca la amplitud semántica de κρημνός sin debilitar el texto principal.
