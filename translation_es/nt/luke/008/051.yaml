translation:
  language: es
  text: Al llegar a la casa, no permitió que nadie entrara con él, excepto Pedro, Juan y Jacobo, y el padre y la madre de la niña[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del niño». La palabra griega puede significar «niño» o «niña» más generalmente, pero el contexto identifica a la menor como una niña.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  english_pob_choice: When he came
  chosen_spanish: Cuando entró
  alternatives_spanish:
  - Y cuando entró
  - Después de entrar
  lexicon: BDAG
  rationale: El participio aoristo marca antecedencia/tiempo narrativo. «Cuando entró» comunica la secuencia de manera natural en español sin perder la relación temporal.
- source_word: οἰκίαν
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  - la vivienda
  lexicon: BDAG
  rationale: «Casa» es el equivalente narrativo más directo y natural para οἰκία en este contexto.
- source_word: οὐκ ἀφῆκεν
  english_pob_choice: he did not allow
  chosen_spanish: no permitió
  alternatives_spanish:
  - no dejó
  - no consintió
  lexicon: BDAG
  rationale: Aquí ἀφίημι tiene el sentido de permitir. «No permitió» conserva bien la fuerza de restricción del texto.
- source_word: εἰσελθεῖν
  english_pob_choice: to enter
  chosen_spanish: entrara
  alternatives_spanish:
  - entrar
  - que entrase
  lexicon: BDAG
  rationale: 'En español, el infinitivo dependiente se expresa mejor con una subordinada finita: «no permitió que ... entrara».'
- source_word: τινα σὺν αὐτῷ
  english_pob_choice: anyone to enter with him
  chosen_spanish: que nadie entrara con él
  alternatives_spanish:
  - que alguien entrara con él
  - que ninguno entrara con él
  lexicon: BDAG
  rationale: 'El indefinido en negación tiene fuerza genérica: «nadie» refleja adecuadamente el alcance negativo. «Con él» mantiene σὺν αὐτῷ unido al acto de entrar.'
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - a no ser
  lexicon: BDAG
  rationale: En esta construcción de exclusión tras una negación, «excepto» es la equivalencia más natural y precisa.
- source_word: Πέτρον καὶ Ἰωάννην καὶ Ἰάκωβον
  english_pob_choice: Peter and John and James
  chosen_spanish: Pedro, Juan y Jacobo
  alternatives_spanish:
  - Pedro y Juan y Jacobo
  - Pedro, Juan, e Jacobo
  lexicon: BDAG
  rationale: Los nombres propios se transliteran conforme al uso español. La puntuación estándar con coma y «y» conserva claridad sin borrar el ritmo enumerativo.
- source_word: τῆς παιδὸς
  english_pob_choice: the girl's
  chosen_spanish: de la niña
  alternatives_spanish:
  - del niño
  - del niño o niña
  - del hijo
  lexicon: BDAG
  rationale: El contexto inmediato identifica a la hija de Jairo, por lo que «niña» expresa con más precisión el referente que el genérico «niño/niña» o «hijo».
- source_word: πατέρα ... καὶ τὴν μητέρα
  english_pob_choice: father and mother
  chosen_spanish: el padre y la madre
  alternatives_spanish:
  - los padres
  lexicon: BDAG
  rationale: Los sustantivos singulares con artículo señalan a cada progenitor por separado; «el padre y la madre» conserva esa especificidad mejor que «los padres».
theological_decisions:
- issue: Especificidad de τῆς παιδὸς en el contexto narrativo
  english_pob_reading: the girl's father and mother
  chosen_spanish_reading: el padre y la madre de la niña
  alternative_spanish_readings:
  - el padre y la madre del niño
  - los padres de la niña
  rationale: No es una cuestión doctrinal, pero sí de precisión narrativa. El pasaje anterior identifica a la enferma como la hija de Jairo, así que «niña» comunica mejor el contexto que un término más genérico.
  doctrine_reference: Contexto narrativo de Lucas 8:40–56
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota al pie no anclada. La redacción mantiene el sentido del griego y la lectura auditada del inglés POB sin añadir marcas de nota.
  spanish_consistency_notes:
  - Se usó «Jesús» implícito según el contexto mayor del relato, sin añadirlo porque no aparece en este versículo.
  - Se evitó «SEÑOR» y otros términos no pertinentes; no hay léxico divino directo en este versículo.
  - «Jacobo» se mantuvo como forma española tradicional para Ἰάκωβος.
  - La construcción negativa española exige una subordinada con subjuntivo («que nadie entrara»), equivalente natural del infinitivo griego dependiente.
