revisions:
- from: Cuando entró en la casa, no permitió que nadie entrara con él, excepto Pedro, Juan, Jacobo y el padre de la niña y la madre.
  to: Al llegar a la casa, no permitió que nadie entrara con él, excepto Pedro, Juan y Jacobo, y el padre y la madre de la niña[a].
  rationale: Se ajusta la primera cláusula para reflejar mejor el participio temporal griego y evitar la duplicación de «entró/entrara»; se mejora la naturalidad de la coordinación final; y se añade la nota léxica requerida para la alternativa de παιδός conservada en el rastro inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:55:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el griego en la secuencia narrativa, la exclusión de acompañantes y la identificación de Pedro, Juan, Jacobo y los padres de la niña. Sin embargo, «Cuando entró en la casa» comprime ἐλθὼν ... εἰς τὴν οἰκίαν en una sola idea de entrada, mientras que el griego expresa llegada a la casa; en español ambas opciones pueden solaparse, pero «al llegar a la casa» refleja mejor la relación temporal del participio con el complemento. Además, falta la nota alternativa que el rastro inglés conserva para παῖς/παιδός ('niña' / 'hija' / 'niño o niña' según contexto).
  spanish_quality_summary: 'El español es claro y natural, pero la última coordinación suena algo forzada en «y el padre de la niña y la madre». Reordenar a «y el padre y la madre de la niña» mejora la fluidez sin perder la especificidad individual. También conviene ajustar la primera cláusula a un español más natural y más cercano al matiz del griego: «Al llegar a la casa».'
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. Los nombres propios están bien. «Niña» concuerda con la decisión contextual del POB, pero debe preservarse la alternativa léxica en nota, como en el inglés auditado.
  issues:
  - severity: medium
    issue: La apertura «Cuando entró en la casa» no refleja tan bien ἐλθὼν εἰς τὴν οἰκίαν como una formulación de llegada.
    rationale: El participio aoristo más el complemento puede representarse con «al llegar a la casa» o «cuando llegó a la casa». «Entró en la casa» desplaza el foco a la acción de entrar y puede sonar redundante con «entrara» después.
  - severity: medium
    issue: Falta la nota léxica alternativa para τῆς παιδὸς.
    rationale: El English POB conserva explícitamente la alternativa 'child' frente a 'girl'. La revisión española debe reflejar esa alternativa en nota, ya que «niña» es interpretación contextual legítima pero no la única posibilidad léxica.
  - severity: low
    issue: La frase final del borrador es menos natural en español.
    rationale: «el padre de la niña y la madre» es entendible, pero «el padre y la madre de la niña» suena más idiomático y preserva igualmente la mención separada de ambos progenitores.
  revised_spanish_text: Al llegar a la casa, no permitió que nadie entrara con él, excepto Pedro, Juan y Jacobo, y el padre y la madre de la niña[a].
  revised_footnotes:
  - marker: a
    text: O «del niño». La palabra griega puede significar «niño» o «niña» más generalmente, pero el contexto identifica a la menor como una niña.
    reason: lexical_alternative
  revision_rationale: Se ajusta la primera cláusula para reflejar mejor el participio temporal griego y evitar la duplicación de «entró/entrara»; se mejora la naturalidad de la coordinación final; y se añade la nota léxica requerida para la alternativa de παιδός conservada en el rastro inglés.
