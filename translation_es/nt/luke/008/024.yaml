review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia griega: acercarse, despertarlo, doble vocativo a Jesús, peligro inminente, reprensión al viento y al oleaje del agua, cese plural de ambas fuerzas y resultado de calma. Sin embargo, dos elecciones españolas no preservan bien la naturalidad ni el matiz auditado: «se hizo una calma» suena poco idiomático para ἐγένετο γαλήνη, y la nota al pie no refleja correctamente la alternativa inglesa documentada para κλύδωνι τοῦ ὕδατος.'
  spanish_quality_summary: El español es en general claro y digno. «Se acercaron», «lo despertaron», «Maestro, Maestro» y «reprendió» son legibles y fieles. «Habiendo despertado» es aceptable aunque algo rígido; no exige cambio. La frase final mejora claramente con «hubo calma», que es natural, precisa y mantiene el resultado narrativo. La nota actual es defectuosa porque ofrece una alternativa idéntica al texto principal y menciona «la agitación del agua», que no aparece en el texto revisado.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Ἐπιστάτα como «Maestro» sigue la decisión auditada para un título traducido de autoridad. No aparecen términos sensibles como Yahvé/Mesías/esclavo. «Reprendió» preserva bien ἐπετίμησεν.
  issues:
  - severity: medium
    issue: «se hizo una calma» es poco idiomático en español bíblico natural
    rationale: Aunque intenta reflejar γίνομαι + sustantivo, en español suena forzado. «Hubo calma» preserva mejor ἐγένετο γαλήνη y coincide con la intención del POB de evitar calcos innecesarios.
  - severity: medium
    issue: La nota al pie [a] no corresponde al texto ni a la alternativa auditada
    rationale: La nota dice «O “el oleaje del agua” para “la agitación del agua”», pero «oleaje del agua» ya está en el texto principal y «la agitación del agua» no aparece allí. Debe ofrecer una alternativa real, p. ej. «las olas agitadas» o similar, anclada a «oleaje».
  - severity: low
    issue: La decisión léxica alternativa «lo rousaron» contiene un error de español
    rationale: Debe ser «lo arrullaron» no corresponde; en realidad la alternativa válida sería «lo despertaron»/«lo sacudieron»/«lo hicieron despertar». Como esto está en metadatos y no en el texto bíblico, no requiere adjudicación mayor, pero confirma necesidad de revisión menor.
  revised_spanish_text: 'Entonces se acercaron y lo despertaron, diciendo: «Maestro, Maestro, ¡perecemos!». Y él, habiendo despertado, reprendió al viento y al oleaje[a] del agua, y cesaron, y hubo calma.'
  revised_footnotes:
