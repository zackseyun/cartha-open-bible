base_translation:
  language: en
  yaml_path: translation/nt/luke/008/024.yaml
  text: Then they came and woke him[a], saying, “Master, Master, we are perishing!” And he, having awakened, rebuked the wind and the surging of the water, and they ceased, and there was a calm.
