translation:
  language: es
  text: 'Entonces se acercaron y lo despertaron, diciendo: «Maestro, Maestro, ¡perecemos!». Y él, habiendo despertado, reprendió al viento y al oleaje[a] del agua, y cesaron, y hubo calma.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las olas agitadas».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  english_pob_choice: they came
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron
  - se aproximaron
  lexicon: BDAG
  rationale: El participio aoristo de προσέρχομαι introduce la acción previa de acercarse a Jesús. «Se acercaron» conserva el movimiento hacia él con naturalidad en español, sin forzar una literalidad poco idiomática.
- source_word: διήγειραν
  english_pob_choice: woke
  chosen_spanish: lo despertaron
  alternatives_spanish:
  - lo despertaron del sueño
  - lo rousaron
  lexicon: BDAG
  rationale: El aoristo activo de διεγείρω aquí significa despertar a alguien. «Lo despertaron» es la equivalencia más clara y natural en español.
- source_word: Ἐπιστάτα
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Señor
  - Comandante
  lexicon: BDAG
  rationale: En Lucas, Ἐπιστάτα es un vocativo de respeto y autoridad dirigido a Jesús. «Maestro» comunica ese reconocimiento respetuoso en español sin trasladarlo a terminología eclesiástica posterior.
- source_word: ἀπολλύμεθα
  english_pob_choice: we are perishing
  chosen_spanish: perecemos
  alternatives_spanish:
  - estamos pereciendo
  - vamos a morir
  lexicon: BDAG
  rationale: El presente medio/pasivo expresa peligro inminente y no solo una muerte futura. «Perecemos» conserva la gravedad del momento; en este contexto exclamativo funciona con fuerza y brevedad en español.
- source_word: διεγερθεὶς
  english_pob_choice: having awakened
  chosen_spanish: habiendo despertado
  alternatives_spanish:
  - después de despertar
  - al despertarse
  lexicon: BDAG
  rationale: El participio aoristo pasivo preserva la secuencia de acciones sin añadir información sobre agencia. «Habiendo despertado» mantiene la relación temporal del griego.
- source_word: ἐπετίμησεν
  english_pob_choice: rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - mandó severamente
  - increpó
  lexicon: BDAG
  rationale: En los evangelios, ἐπιτιμάω expresa una reprensión autoritativa frente a fuerzas desordenadas. «Reprendió» conserva ese tono de autoridad fuerte y es idiomático en español bíblico moderno.
- source_word: ἀνέμῳ
  english_pob_choice: the wind
  chosen_spanish: al viento
  alternatives_spanish:
  - al aire
  - a la tempestad
  lexicon: BDAG
  rationale: El dativo señala el objeto de la reprensión de Jesús. «Al viento» es la correspondencia directa y no amplía el sentido más allá del texto.
- source_word: κλύδωνι τοῦ ὕδατος
  english_pob_choice: the surging of the water
  chosen_spanish: al oleaje del agua
  alternatives_spanish:
  - al agitado mar
  - al furor del agua
  - a las olas
  lexicon: BDAG
  rationale: κλύδων denota oleaje, agitación o hinchazón de las aguas. «Oleaje del agua» preserva la imagen física del movimiento del agua sin reducirla simplemente a «olas»; el genitivo explicita que el oleaje pertenece al agua.
- source_word: ἐπαύσαντο
  english_pob_choice: they ceased
  chosen_spanish: cesaron
  alternatives_spanish:
  - se detuvieron
  - se calmaron
  lexicon: BDAG
  rationale: El verbo plural refiere conjuntamente al viento y al oleaje. «Cesaron» mantiene la pluralidad y la idea de que ambas fuerzas dejaron de actuar.
- source_word: ἐγένετο γαλήνη
  english_pob_choice: there was a calm
  chosen_spanish: se hizo una calma
  alternatives_spanish:
  - hubo calma
  - se produjo calma
  lexicon: BDAG
  rationale: La construcción γίνομαι + sustantivo expresa un estado resultante. «Se hizo una calma» reproduce ese cambio de estado de manera clara y fiel en español.
theological_decisions:
- issue: Título Ἐπιστάτα aplicado a Jesús
  english_pob_reading: Master
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Señor
  - Comandante
  rationale: El término comunica autoridad reconocida sin convertirlo en un título litúrgico posterior. «Maestro» preserva la relación respetuosa y la singularidad lucana del vocativo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Autoridad de Jesús sobre el viento y el agua
  english_pob_reading: rebuked the wind and the surging of the water
  chosen_spanish_reading: reprendió al viento y al oleaje del agua
  alternative_spanish_readings:
  - mandó al viento y al oleaje del agua
  - habló al viento y al oleaje del agua
  rationale: El texto presenta una acción directa y autoritativa sobre fuerzas de la creación. «Reprendió» conserva la fuerza verbal de ἐπιτιμάω sin añadir explicación doctrinal externa ni suavizar el gesto narrativo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que ajustó la frase de κλύδων de «the raging of the water» a «the surging of the water» para mayor precisión. En español, se optó por «oleaje del agua» como equivalente natural que conserva la imagen dinámica del griego y evita perder la fuerza física del sustantivo κλύδων.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio, y «Maestro» como vocativo de Ἐπιστάτα, en línea con la terminología POB.
  - Se traduce ἐπιτιμάω con un verbo de reprensión autoritativa («reprendió») para mantener la consistencia con el uso evangélico.
  - Se evita suavizar ἀπολλύμεθα; «perecemos» conserva el tono de peligro inminente.
  - «Calma» reproduce γαλήνη con un sustantivo natural y sobrio en español, sin añadir elementos no presentes en el griego.
