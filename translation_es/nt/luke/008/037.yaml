translation:
  language: es
  text: Y toda la multitud de la región circundante de los gerasenos le pidió que se alejara de ellos[a], porque estaban dominados por un gran temor. Entonces él subió a una barca y regresó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron presa de un gran temor».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρώτησεν
  english_pob_choice: asked
  chosen_spanish: rogó
  alternatives_spanish:
  - pidió
  - solicitó
  lexicon: BDAG
  rationale: En este contexto, el verbo expresa una súplica insistente para que Jesús se marche; en español, «rogó» comunica mejor esa fuerza que un simple «pidió».
- source_word: ἅπαν τὸ πλῆθος
  english_pob_choice: the whole crowd
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - la multitud entera
  - todo el gentío
  lexicon: BDAG
  rationale: «Toda la multitud» conserva el valor totalizador de ἅπαν y suena natural en español bíblico contemporáneo.
- source_word: τῆς περιχώρου
  english_pob_choice: from the surrounding region
  chosen_spanish: de la región alrededor
  alternatives_spanish:
  - del distrito circundante
  - de los alrededores
  lexicon: BDAG
  rationale: La expresión griega señala el área circundante; «de la región alrededor» preserva la relación espacial sin volver la frase pesada.
- source_word: τῶν Γερασηνῶν
  english_pob_choice: of the Gerasenes
  chosen_spanish: de los gerasenos
  alternatives_spanish:
  - de los geresenos
  lexicon: BDAG
  rationale: Se conserva el etnónimo transliterado. «Gerasenos» corresponde de forma directa al texto griego dado y es transparente para una edición bíblica.
- source_word: ἀπελθεῖν ἀπ’ αὐτῶν
  english_pob_choice: to depart from them
  chosen_spanish: que se fuera de ellos
  alternatives_spanish:
  - que se apartara de ellos
  - que los dejara
  lexicon: BDAG
  rationale: La construcción infinitiva pide expresar el contenido de la súplica. «Que se fuera de ellos» reproduce con naturalidad la idea de alejarse de su presencia.
- source_word: φόβῳ μεγάλῳ
  english_pob_choice: by great fear
  chosen_spanish: por un gran temor
  alternatives_spanish:
  - con gran temor
  - por mucho temor
  lexicon: BDAG
  rationale: El dativo indica causa o circunstancia. «Por un gran temor» mantiene esa fuerza causal y conserva el matiz emotivo del texto.
- source_word: συνείχοντο
  english_pob_choice: were gripped
  chosen_spanish: estaban dominados
  alternatives_spanish:
  - estaban sobrecogidos
  - estaban presos
  lexicon: BDAG
  rationale: El verbo sugiere estar constreñidos o sujetos por algo. «Estaban dominados» expresa bien la sensación de quedar bajo el poder del temor sin perder naturalidad en español.
- source_word: ἐμβὰς εἰς πλοῖον
  english_pob_choice: got into a boat
  chosen_spanish: subió a una barca
  alternatives_spanish:
  - se embarcó en una barca
  - entró en una barca
  lexicon: BDAG
  rationale: «Barca» es una opción idiomática y bíblicamente clara en español; el participio narra una acción sencilla de embarcarse.
- source_word: ὑπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: regresó
  alternatives_spanish:
  - volvió
  lexicon: BDAG
  rationale: «Regresó» comunica de forma directa el sentido de volver o retornar, con un registro adecuado para narración bíblica.
theological_decisions:
- issue: Naturaleza del temor de la multitud
  english_pob_reading: The verse is rendered as a straightforward report that fear motivated the crowd to ask Jesus to leave, without adding interpretive explanation for the fear.
  chosen_spanish_reading: La traducción presenta el motivo como temor grande, sin decidir si fue reverencia, hostilidad o una mezcla de ambas.
  alternative_spanish_readings:
  - un temor reverente
  - un temor hostil por el impacto de Jesús
  rationale: El griego solo afirma que estaban constreñidos por un gran temor. Para no resolver una tensión que el texto no explicita, la versión española conserva la ambigüedad.
  doctrine_reference: Preservar la tensión teológica del texto sin interpretarla de más.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en la frase correspondiente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el texto no contiene el nombre divino.
  - «Barca» se prefirió a «barco» por el registro narrativo bíblico y la naturalidad en español.
  - «Gerasenos» se mantuvo como transliteración consistente del etnónimo griego.
  - No se introdujo terminología eclesiástica tradicional que altere la fuerza léxica del original.
