revisions:
- from: Y toda la multitud de la región alrededor de los gerasenos le rogó que se fuera de ellos[a], porque estaban dominados por un gran temor. Entonces él subió a una barca y regresó.
  to: Y toda la multitud de la región circundante de los gerasenos le pidió que se alejara de ellos[a], porque estaban dominados por un gran temor. Entonces él subió a una barca y regresó.
  rationale: Se ajusta ἐρωτάω a «pidió» para no sobreintensificar el verbo; se mejora la naturalidad de τῆς περιχώρου τῶν Γερασηνῶν con «la región circundante de los gerasenos»; se suaviza «se fuera de ellos» a «se alejara de ellos»; y se corrige la nota al pie para reflejar fielmente la alternativa léxica de συνείχοντο.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:00:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: toda la población de la región de los gerasenos le pide a Jesús que se vaya, motivados por gran temor, y él retorna en una barca. Sin embargo, hay algunos desajustes léxicos y de naturalidad: «rogó» intensifica ἠρώτησεν más allá de «asked»/«pidió»; «de la región alrededor de los gerasenos» suena sintácticamente torpe y confunde la relación genitiva; y la nota al pie actual está mal formulada y no corresponde al sentido de συνείχοντο.'
  spanish_quality_summary: 'La redacción es comprensible, pero contiene giros poco naturales para español general de lectura eclesial: «la región alrededor de los gerasenos» y «se fuera de ellos» suenan rígidos. «Subió a una barca» es aceptable, pero «entró en una barca» o «subió a una barca» ambas sirven; el problema principal está en la precisión y naturalidad del primer hemistiquio. La nota al pie española actual tiene error gramatical y semántico.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Sí hay una cuestión de fuerza léxica: ἐρωτάω aquí debe representarse mejor con «pidió» que con «rogó», en línea con la decisión inglesa documentada de no sobreintensificar. «Gerasenos» está bien conservado.'
  issues:
  - severity: medium
    issue: «le rogó» sobreintensifica ἠρώτησεν
    rationale: La auditoría inglesa eligió «asked» precisamente para no cargar el verbo con intensidad excesiva como «begged». En español, «rogó» se acerca demasiado a «suplicó»/«begged». «Le pidió» preserva mejor el valor del verbo.
  - severity: medium
    issue: «de la región alrededor de los gerasenos» es poco natural y relacionalmente confuso
    rationale: τῆς περιχώρου τῶν Γερασηνῶν se refiere a la región circundante de los gerasenos / la región de alrededor de los gerasenos. En español natural, «de toda la región de los alrededores de los gerasenos» o «de la región circundante de los gerasenos» evita la torpeza sintáctica.
  - severity: low
    issue: «que se fuera de ellos» suena algo rígido
    rationale: Aunque es comprensible, «que se alejara de ellos» o «que se fuera de su región» sería más idiomático. «Que se alejara de ellos» mantiene la dirección del griego sin sonar forzado.
  - severity: high
    issue: 'La nota al pie actual está mal formulada: «se fueron presas de un gran temor»'
    rationale: No corresponde al sentido verbal ni a la concordancia del texto. La alternativa documentada en inglés es «were seized by great fear», que en español debe expresarse como «O “fueron presa de un gran temor”» o «O “fueron sobrecogidos por un gran temor”».
  revised_spanish_text: Y toda la multitud de la región circundante de los gerasenos le pidió que se alejara de ellos[a], porque estaban dominados por un gran temor. Entonces él subió a una barca y regresó.
  revised_footnotes:
  - marker: a
    text: O «fueron presa de un gran temor».
    reason: lexical_alternative
  revision_rationale: Se ajusta ἐρωτάω a «pidió» para no sobreintensificar el verbo; se mejora la naturalidad de τῆς περιχώρου τῶν Γερασηνῶν con «la región circundante de los gerasenos»; se suaviza «se fuera de ellos» a «se alejara de ellos»; y se corrige la nota al pie para reflejar fielmente la alternativa léxica de συνείχοντο.
