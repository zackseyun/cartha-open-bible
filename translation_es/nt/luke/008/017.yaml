translation:
  language: es
  text: Porque nada hay oculto que no llegue a ser evidente[a], ni secreto que no sea conocido[b] y venga a la luz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manifiesto».
    reason: lexical_alternative
  - marker: b
    text: O «ciertamente será conocido»; la construcción griega niega con fuerza que algo secreto permanezca desconocido.
    reason: lexical_alternative
  - marker: c
    text: O «salga a la luz».
    reason: lexical_alternative
lexical_decisions:
- source_word: κρυπτὸν
  english_pob_choice: hidden
  chosen_spanish: oculto
  alternatives_spanish:
  - escondido
  - oculto
  lexicon: BDAG
  rationale: κρυπτός denota algo oculto o encubierto. «Oculto» es natural en español y conserva el contraste con la revelación posterior.
- source_word: φανερὸν
  english_pob_choice: evident
  chosen_spanish: evidente
  alternatives_spanish:
  - manifiesto
  - patente
  - visible
  lexicon: BDAG
  rationale: En la primera cláusula, φανερός contrasta con κρυπτός. «Evidente» comunica bien que algo pasa a estar abiertamente reconocido o patente.
- source_word: γενήσεται
  english_pob_choice: will become
  chosen_spanish: llegue a ser
  alternatives_spanish:
  - se hará
  - se volverá
  - será
  lexicon: BDAG
  rationale: γίνομαι aquí expresa un cambio de estado; «llegue a ser» preserva ese matiz mejor que un simple «será».
- source_word: ἀπόκρυφον
  english_pob_choice: secret
  chosen_spanish: secreto
  alternatives_spanish:
  - oculto
  - escondido
  - encubierto
  lexicon: BDAG
  rationale: «Secreto» mantiene una leve distinción léxica frente a «oculto», como en la paralela del griego, sin romper el paralelismo.
- source_word: οὐ μὴ γνωσθῇ
  english_pob_choice: will not be known
  chosen_spanish: no sea conocido
  alternatives_spanish:
  - no llegue a ser conocido
  - no quede sin ser conocido
  - ciertamente será conocido
  lexicon: BDAG
  rationale: La construcción griega es una negación enfática dentro de una cláusula relativa. En español, «no sea conocido» transmite con naturalidad que nada permanecerá desconocido.
- source_word: εἰς φανερὸν ἔλθῃ
  english_pob_choice: come to light
  chosen_spanish: venga a la luz
  alternatives_spanish:
  - salga a la luz
  - venga a lo abierto
  - aparezca públicamente
  lexicon: BDAG
  rationale: La expresión idiomática señala divulgación pública. «Venga a la luz» es una equivalencia natural y literaria en español.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: BDAG
  rationale: γάρ introduce una explicación o fundamento; «Porque» conserva de forma clara ese valor explicativo en español.
theological_decisions:
- issue: Alcance de la afirmación sobre la revelación de lo oculto
  english_pob_reading: A general principle that what is hidden or secret will eventually be disclosed.
  chosen_spanish_reading: 'Un principio general: lo oculto y lo secreto finalmente quedarán expuestos.'
  alternative_spanish_readings:
  - Una referencia específica al juicio final
  - Una alusión concreta a la revelación del mensaje de Jesús y de la respuesta humana
  rationale: El versículo no precisa por sí mismo el horizonte temporal o escatológico; la redacción española debe conservar esa amplitud y no estrechar el sentido.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no hubo cambios necesarios en el texto fuente inglés ni en la evaluación cruzada, por lo que el borrador español sigue de cerca el análisis léxico y la equivalencia óptima ya aprobados.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Oculto/secreto» preserva el paralelismo de κρυπτός/ἀπόκρυφος sin uniformarlos.
  - «Evidente» y «venga a la luz» reproducen el doble movimiento de revelación pública del griego.
  - La negación reforzada del griego se refleja con una formulación natural en español sin añadir especificaciones doctrinales.
