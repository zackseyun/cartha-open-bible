translation:
  language: es
  text: Entonces salieron para ver qué había ocurrido, y vinieron a Jesús y hallaron al hombre de quien habían salido los demonios[a], sentado, vestido y en su sano juicio, a los pies de Jesús, y tuvieron miedo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos ponen el verbo en plural ('los demonios habían salido'); el texto impreso tiene un verbo en singular con sujeto plural, pero el sentido no cambia.
    reason: textual_variant
lexical_decisions:
- source_word: ἐξῆλθον
  english_pob_choice: they went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron afuera
  - salieron afuera
  lexicon: BDAG
  rationale: El aoristo narrativo de ἐξέρχομαι indica movimiento de salida; 'salieron' es natural en español y conserva la dirección del acto sin añadir matices.
- source_word: ἰδεῖν τὸ γεγονός
  english_pob_choice: to see what had happened
  chosen_spanish: para ver qué había ocurrido
  alternatives_spanish:
  - para ver lo que había sucedido
  - para ver qué había pasado
  lexicon: BDAG
  rationale: La construcción de propósito se expresa con 'para ver'. El participio sustantivado τὸ γεγονός se entiende bien como 'qué había ocurrido', manteniendo el valor perfectivo del acontecimiento ya realizado.
- source_word: πρὸς τὸν Ἰησοῦν
  english_pob_choice: to Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - hacia Jesús
  - para ver a Jesús
  lexicon: BDAG
  rationale: Con un verbo de movimiento, πρός marca dirección hacia una persona. 'A Jesús' es idiomático en español y conserva esa orientación.
- source_word: εὗρον
  english_pob_choice: found
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  - descubrieron
  lexicon: BDAG
  rationale: '''Hallaron'' es una opción plenamente válida y sobria en español bíblico; mantiene el sentido de encontrar sin sobrecargar el registro.'
- source_word: τὸν ἄνθρωπον
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a ese hombre
  - al varón
  lexicon: BDAG
  rationale: El contexto identifica a un individuo masculino concreto; el acusativo con preposición se vierte naturalmente como 'al hombre'.
- source_word: ἀφ’ οὗ τὰ δαιμόνια ἐξῆλθεν
  english_pob_choice: from whom the demons had gone out
  chosen_spanish: de quien habían salido los demonios
  alternatives_spanish:
  - de quien habían salido los demonios
  - de quien los demonios habían salido
  lexicon: BDAG
  rationale: Se conserva la relación de procedencia con 'de quien'. En español, 'habían salido los demonios' refleja con claridad la salida previa y mantiene la pluralidad de δαιμόνια.
- source_word: δαιμόνια
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus malignos
  lexicon: BDAG
  rationale: '''Demonios'' es el equivalente léxico directo y preserva la dimensión personal/sobrenatural del texto, conforme al sentido narrativo del exorcismo.'
- source_word: ἱματισμένον
  english_pob_choice: clothed
  chosen_spanish: vestido
  alternatives_spanish:
  - vestido con ropa
  - ataviado
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa su condición restaurada. 'Vestido' comunica de forma breve y clara que ya no estaba desnudo, en consonancia con el contexto inmediato.
- source_word: σωφρονοῦντα
  english_pob_choice: in his right mind
  chosen_spanish: en su sano juicio
  alternatives_spanish:
  - de buen juicio
  - con la mente serena
  - pensando con claridad
  lexicon: BDAG
  rationale: El verbo implica cordura, dominio propio y juicio sano. 'En su sano juicio' es una expresión idiomática española que mantiene el valor de restauración mental sin tecnicismos clínicos.
- source_word: παρὰ τοὺς πόδας τοῦ Ἰησοῦ
  english_pob_choice: at Jesus's feet
  chosen_spanish: a los pies de Jesús
  alternatives_spanish:
  - junto a los pies de Jesús
  - a la altura de los pies de Jesús
  lexicon: BDAG
  rationale: παρά con acusativo señala ubicación junto a/at. 'A los pies de Jesús' es la formulación más natural en español y también puede sugerir reverencia o discipulado sin explicitarlo en exceso.
- source_word: ἐφοβήθησαν
  english_pob_choice: they were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - les dio miedo
  - quedaron atemorizados
  lexicon: BDAG
  rationale: El aoristo de φοβέομαι expresa la reacción de temor. 'Tuvieron miedo' es claro, directo y fiel al valor narrativo.
theological_decisions:
- issue: Expulsión de δαιμόνια en contexto de sanidad/exorcismo
  english_pob_reading: demons
  chosen_spanish_reading: demonios
  alternative_spanish_readings:
  - espíritus malignos
  rationale: El texto presenta una liberación demoníaca real, no una mera metáfora de enfermedad. 'Demonios' conserva mejor la fuerza narrativa y teológica del pasaje.
  doctrine_reference: Lectura narrativa del exorcismo; primacía del texto original sobre eufemismos
- issue: σωφρονοῦντα y la restauración de la mente
  english_pob_reading: in his right mind
  chosen_spanish_reading: en su sano juicio
  alternative_spanish_readings:
  - de buen juicio
  - pensando con claridad
  rationale: La frase comunica restauración de la cordura y de la autodirección tras la opresión demoníaca. 'En su sano juicio' preserva ese sentido sin imponer categorías médicas modernas.
  doctrine_reference: Restauración integral de la persona; claridad conceptual sin medicalizar el texto
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y coincide con la lectura auditada del POB inglés en el sentido general. Se ajustó la sintaxis al español natural, se mantuvo 'demonios' para δαιμόνια, y se optó por 'en su sano juicio' como equivalente idiomático de σωφρονοῦντα. La nota textual inglesa sobre una variante verbal en algunos manuscritos no se reproduce en el cuerpo porque no cambia la traducción española base y el punto crítico del sentido permanece intacto.
  spanish_consistency_notes:
  - Se usa 'Jesús' con posesivo implícito evitado, siguiendo el español natural.
  - Se mantiene 'demonios' en lugar de suavizaciones como 'espíritus malignos' para conservar el peso del relato.
  - '''A los pies de Jesús'' se deja sin glosa adicional porque ya funciona como expresión idiomática comprensible en español.'
  - Se prefiere 'salieron'/'vinieron'/'hallaron' por fluidez narrativa y correspondencia con el griego.
  - El marcador de nota [a] queda anclado en la frase sobre lo ocurrido para reflejar la alternativa léxica de manera auditable.
