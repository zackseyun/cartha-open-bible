  language: en
  yaml_path: translation/nt/luke/008/035.yaml
  text: Then they went out to see what had happened[a], and they came to Jesus and found the man from whom the demons had gone out sitting, clothed, and in his right mind at Jesus's feet[b], and they were afraid.
  footnotes:
