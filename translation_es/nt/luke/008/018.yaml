translation:
  language: es
  text: Por tanto[a], presten atención a cómo oyen. Porque al que tiene, se le dará más; y al que no tiene, aun lo que piensa que tiene le será quitado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «incluso lo que parece tener le será quitado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπετε
  english_pob_choice: pay attention
  chosen_spanish: presten atención
  alternatives_spanish:
  - miren
  - cuiden
  - estén atentos
  lexicon: BDAG
  rationale: El imperativo aquí expresa advertencia y cuidado, no simple visión física. «Presten atención» comunica bien la fuerza exhortativa en español actual.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca inferencia respecto de la enseñanza anterior; «Por tanto» conserva la conexión lógica con dignidad y claridad.
- source_word: πῶς ἀκούετε
  english_pob_choice: how you listen
  chosen_spanish: cómo oyen
  alternatives_spanish:
  - cómo escuchan
  - de qué manera oyen
  lexicon: BDAG
  rationale: «ἀκούω» puede ser «oír» o «escuchar». Aquí el foco está en la manera de recibir la palabra, y «oyen» es natural en español bíblico sin forzar un matiz técnico. Se mantiene el valor modal de πῶς.
- source_word: ὃς ἂν ... ἔχῃ
  english_pob_choice: whoever has
  chosen_spanish: al que tiene
  alternatives_spanish:
  - quien tiene
  - el que tenga
  lexicon: BDAG
  rationale: La construcción indefinida general en español se expresa con naturalidad como «al que tiene», preservando el tono proverbial sin introducir una condición demasiado hipotética.
- source_word: δοθήσεται αὐτῷ
  english_pob_choice: more will be given to him
  chosen_spanish: se le dará
  alternatives_spanish:
  - se le dará más
  - le será dado
  lexicon: BDAG
  rationale: El griego no expresa explícitamente el objeto, y la POB inglesa suplió «more» por el paralelismo del dicho. En español, «se le dará» mantiene la misma sobriedad; el contexto implica aumento sin añadir una palabra que el griego no nombra de forma directa.
- source_word: ὃς ἂν μὴ ἔχῃ
  english_pob_choice: whoever does not have
  chosen_spanish: al que no tiene
  alternatives_spanish:
  - quien no tiene
  - el que no tenga
  lexicon: BDAG
  rationale: Conserva el paralelismo con la primera cláusula y la generalidad proverbial del original.
- source_word: ὃ δοκεῖ ἔχειν
  english_pob_choice: what he thinks he has
  chosen_spanish: lo que piensa que tiene
  alternatives_spanish:
  - lo que cree tener
  - lo que parece tener
  lexicon: BDAG
  rationale: δοκέω puede significar «pensar» o «parecer». Aquí la POB inglesa eligió el sentido de posesión percibida y no segura; «piensa que tiene» conserva esa tensión. «Lo que parece tener» queda como alternativa válida si se desea enfatizar la apariencia externa.
- source_word: ἀρθήσεται ἀπ’ αὐτοῦ
  english_pob_choice: will be taken away from him
  chosen_spanish: le será quitado
  alternatives_spanish:
  - será quitado de él
  - le será retirado
  lexicon: BDAG
  rationale: El futuro pasivo de αἴρω expresa remoción o privación. «Le será quitado» es una equivalencia natural y clara en español, manteniendo la idea de pérdida.
theological_decisions:
- issue: Sentido proverbial de tener y no tener
  english_pob_reading: Rendered without importing a doctrine of predestination, merit, or material prosperity; the saying is left in its immediate context of receptivity to Jesus' word.
  chosen_spanish_reading: Se traduce el dicho sin introducir una doctrina de predestinación, mérito o prosperidad material; queda en su contexto inmediato de receptividad a la palabra de Jesús.
  alternative_spanish_readings:
  - Una regla general de receptividad espiritual
  - Un proverbio general sobre la administración de lo recibido
  rationale: El versículo formula un principio paradójico ligado al oír. La traducción preserva esa tensión y no la resuelve dentro de un sistema doctrinal que el contexto no exige.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión sigue de cerca el texto griego y el trayecto auditado en inglés POB; no se detectaron revisiones aplicadas en el paquete fuente y el último pase indicó estabilidad textual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se conserva el masculino singular genérico («al que», «le») conforme al griego singular masculino y al criterio auditado en inglés POB.
  - No se añadió «más» en el cuerpo principal porque el griego no lo expresa de forma explícita; la idea de aumento queda implicada por el paralelismo del dicho y se refleja en la nota alternativa.
  - Se prefirió «oír»/«oyen» en el cuerpo por naturalidad y por el foco en la manera de recepción; la alternativa «escuchar» se deja implícita como posibilidad semántica.
