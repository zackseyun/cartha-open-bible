base_translation:
  language: en
  yaml_path: translation/nt/luke/008/016.yaml
  text: No one[a], after lighting a lamp, covers it with a container or puts it under a bed, but puts it on a lampstand[b], so that those who come in may see the light.
  footnotes:
  - marker: a
    text: Or 'with a vessel.' The Greek term is broad and can refer to various kinds of household containers.
    reason: lexical_alternative
  - marker: b
    text: Or 'under a couch.' The Greek word can denote a bed or a couch used for reclining.
    reason: lexical_alternative
