  glossary_alignment: 'No hay términos del glosario de proyecto especialmente disputados en este versículo. Las decisiones principales concuerdan con el rastro inglés: λύχνος -> «lámpara», σκεῦος -> «recipiente», κλίνη -> «cama», ἵνα -> «para que». La decisión «candelero» para λυχνία es aceptable como equivalente de «lampstand», aunque algo más tradicional que el inglés; no contradice la evidencia ni introduce sentido teológico impropio.'
