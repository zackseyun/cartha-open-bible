translation:
  language: es
  text: Nadie, después de encender una lámpara, la cubre con un recipiente[a] o la pone debajo de una cama[b], sino que la pone sobre un candelero, para que los que entran vean la luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una vasija». El término griego es amplio y puede referirse a distintos tipos de recipientes domésticos.
    reason: lexical_alternative
  - marker: b
    text: O «debajo de un lecho». La palabra griega puede designar una cama o un lecho/camastro para recostarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐδεὶς
  english_pob_choice: No one
  chosen_spanish: Nadie
  alternatives_spanish:
  - Ninguna persona
  - No hay nadie
  lexicon: BDAG
  rationale: Es un indefinido negativo genérico. «Nadie» preserva la fuerza universal y suena natural en español actual.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: —
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como transición discursiva suave; en español no requiere equivalente explícito. Añadir «y» o «pero» cargaría indebidamente el matiz.
- source_word: λύχνον
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - lámpara de aceite
  - lámpara doméstica
  lexicon: BDAG
  rationale: λύχνος designa una lámpara de uso doméstico; «lámpara» conserva la imagen concreta sin sobreespecificar el tipo.
- source_word: ἅψας
  english_pob_choice: after lighting
  chosen_spanish: después de encender
  alternatives_spanish:
  - habiendo encendido
  - tras encender
  lexicon: BDAG
  rationale: El participio aoristo antecede a los verbos principales. «Después de encender» expresa bien la secuencia temporal en español.
- source_word: καλύπτει
  english_pob_choice: covers
  chosen_spanish: la cubre
  alternatives_spanish:
  - la tapa
  - la oculta
  lexicon: BDAG
  rationale: El verbo significa cubrir físicamente; «la cubre» mantiene la imagen sin interpretar como ocultar en sentido figurado.
- source_word: σκεύει
  english_pob_choice: with a container
  chosen_spanish: con un recipiente
  alternatives_spanish:
  - con un vaso
  - con un vaso/vasija
  lexicon: BDAG
  rationale: σκεῦος es un término amplio para utensilio/vasija/recipiente. «Recipiente» comunica la amplitud semántica mejor que un término más específico.
- source_word: ὑποκάτω κλίνης
  english_pob_choice: under a bed
  chosen_spanish: debajo de una cama
  alternatives_spanish:
  - bajo una cama
  - debajo de un lecho
  lexicon: BDAG
  rationale: κλίνη puede ser cama o lecho/camastro. «Cama» es la equivalencia más natural en español moderno; el sentido doméstico se mantiene.
- source_word: τίθησιν
  english_pob_choice: puts
  chosen_spanish: pone
  alternatives_spanish:
  - coloca
  - sitúa
  lexicon: BDAG
  rationale: Verbo común de colocar algo. «Pone» es simple y paralelo en ambas apariciones del versículo.
- source_word: ἐπὶ λυχνίας
  english_pob_choice: on a lampstand
  chosen_spanish: sobre un candelero
  alternatives_spanish:
  - sobre un soporte
  - sobre un candelabro
  lexicon: BDAG
  rationale: λυχνία es un soporte para lámpara; «candelero» es la opción tradicional y clara en español para ese objeto, sin implicar velas.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad. «Para que» es la forma más natural y precisa en español.
- source_word: οἱ εἰσπορευόμενοι
  english_pob_choice: those who come in
  chosen_spanish: los que entran
  alternatives_spanish:
  - los que ingresan
  - los que van entrando
  lexicon: BDAG
  rationale: El participio presente sustantivado expresa a los que entran de manera general. «Los que entran» es fiel y idiomático.
- source_word: βλέπωσιν τὸ φῶς
  english_pob_choice: may see the light
  chosen_spanish: vean la luz
  alternatives_spanish:
  - puedan ver la luz
  - vean la luz
  lexicon: BDAG
  rationale: El subjuntivo con ἵνα expresa propósito. «Vean la luz» conserva la sencillez de la imagen; en español el subjuntivo ya comunica la finalidad.
theological_decisions:
- issue: Mantener la imagen proverbial sin interpretarla explícitamente
  english_pob_reading: Render the imagery literally in the main text without importing an interpretive explanation.
  chosen_spanish_reading: Conservar la imagen doméstica literal sin añadir una explicación alegórica en el texto principal.
  alternative_spanish_readings:
  - Hacer explícita la idea de revelación o discipulado en la traducción
  - Parafrasear la frase hacia su sentido teológico
  rationale: El griego presenta una escena concreta de casa; la implicación teológica surge del contexto narrativo y no necesita ser insertada en la traducción.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés, que eliminó «Now» por una redacción más natural y formal. La versión española también evita un conector discursivo innecesario y mantiene intacta la imagen concreta del verso.
  spanish_consistency_notes:
  - Se prefirió «Nadie» para οὐδείς, manteniendo el valor genérico sin masculinizar.
  - «Lámpara», «recipiente» y «candelero» conservan el campo doméstico concreto del texto griego.
  - Se usó «vean» con valor final tras «para que», reflejando el subjuntivo de ἵνα.
  - Se respetó la ambigüedad lexical de σκεῦος y κλίνη mediante notas al pie, ancladas en el texto.
  - No se introdujo lenguaje interpretativo adicional sobre la metáfora de la lámpara.
