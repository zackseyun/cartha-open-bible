review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: una mujer con flujo de sangre por doce años, que había gastado sus recursos en médicos y no pudo ser sanada por nadie. Sin embargo, hay dos desajustes de matiz verbal. Primero, γυνὴ οὖσα ἐν ῥύσει αἵματος se ha vertido como «que padecía un flujo de sangre», que es aceptable pero se aleja del valor más descriptivo/concreto de «tenía / había tenido un flujo de sangre». Segundo, οὐκ ἴσχυσεν se expresa mejor como pretérito simple («no pudo») que como pluscuamperfecto («no había podido»), ya que el aoristo principal no requiere anterioridad respecto al marco narrativo. El resto se alinea bien con el SBLGNT y con la nota textual sobre la tradición del TR.'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero puede mejorarse para mayor naturalidad y precisión narrativa. «Padecía un flujo de sangre» suena entendible, aunque «había tenido un flujo de sangre» o «tenía un flujo de sangre» preserva mejor la construcción base sin añadir tanto la idea de sufrimiento desde el verbo. «No había podido ser sanada» suena algo pesado y temporalmente menos adecuado que «no pudo ser sanada». Las notas son útiles, pero la nota [a] puede sonar más natural con «sangrado» en vez de «descarga de sangre» como alternativa principal.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Médicos», «sanada» y «sustento» son compatibles con las decisiones léxicas auditadas. La decisión sobre βίος como recursos/medios de vida está bien preservada. No hay términos teológicos sensibles aquí que exijan apartarse del borrador.
  issues:
  - severity: medium
    issue: Tiempo verbal de οὐκ ἴσχυσεν
    rationale: El griego usa aoristo principal de incapacidad; «no había podido» introduce un matiz pluscuamperfecto no exigido por el texto. «No pudo ser sanada» refleja mejor el evento narrativo.
  - severity: low
    issue: Matiz de γυνὴ οὖσα ἐν ῥύσει αἵματος
    rationale: «Padecía un flujo de sangre» es comprensible, pero añade un color interpretativo desde el verbo «padecer». Una formulación más cercana y natural es «que había tenido un flujo de sangre».
  - severity: low
    issue: Redacción de la nota [a]
    rationale: «Descarga de sangre» suena algo poco idiomático en español bíblico general. Conviene mantenerla como alternativa secundaria, pero con una formulación más natural en el conjunto de la nota.
  revised_spanish_text: Y una mujer que había tenido un flujo de sangre[a] durante doce años, y que había gastado todo su sustento en médicos[b], no pudo ser sanada por nadie[c].
  revised_footnotes:
