translation:
  language: es
  text: Y una mujer que había tenido un flujo de sangre[a] durante doce años, y que había gastado todo su sustento en médicos[b], no pudo ser sanada por nadie[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con un flujo de sangre» o, de manera más dinámica, «sufriendo de sangrado».'
    reason: lexical_alternative
  - marker: b
    text: Aquí βίος significa sus medios de vida o recursos, no su vida biológica.
    reason: lexical_alternative
  - marker: c
    text: Algunos manuscritos, reflejados en la tradición del Textus Receptus y por tanto en la línea del KJV, añaden que «no pudo ser sanada por ninguno» después de decir que había gastado todo su sustento en médicos; el texto SBLGNT incluye la cláusula de incapacidad, pero no la implicación más fuerte de que los médicos le fallaron mediante una adición explícita más allá de esta redacción.
    reason: textual_variant
lexical_decisions:
- source_word: γυνὴ οὖσα
  english_pob_choice: a woman who had been
  chosen_spanish: una mujer que padecía
  alternatives_spanish:
  - una mujer que había estado
  - una mujer que tenía
  lexicon: BDAG
  rationale: El participio presenta a la mujer como trasfondo narrativo; en español, una relativa con un verbo de estado/enfermedad suena más natural y conserva la descripción continua.
- source_word: ἐν ῥύσει αἵματος
  english_pob_choice: in a flow of blood
  chosen_spanish: un flujo de sangre
  alternatives_spanish:
  - una descarga de sangre
  - sufriendo de sangrado
  lexicon: BDAG
  rationale: Mantiene la imagen concreta del griego sin volverla demasiado médica o vaga. "Padecía" comunica el estado resultante sin borrar la expresión corporal.
- source_word: ἀπὸ ἐτῶν δώδεκα
  english_pob_choice: for twelve years
  chosen_spanish: desde hacía doce años
  alternatives_spanish:
  - por doce años
  - durante doce años
  lexicon: BDAG
  rationale: En español, "desde hacía" expresa con naturalidad la duración ya cumplida de una condición que venía desde el pasado.
- source_word: ἥτις
  english_pob_choice: and who
  chosen_spanish: y que
  alternatives_spanish:
  - que
  - la cual
  lexicon: BDAG
  rationale: La fuerza aditiva del relativo se refleja con "y que", que preserva el flujo narrativo y evita una repetición pesada.
- source_word: ἰατροῖς
  english_pob_choice: on physicians
  chosen_spanish: en médicos
  alternatives_spanish:
  - con médicos
  - a médicos
  lexicon: BDAG
  rationale: El griego presenta el dativo con la idea de gasto dirigido a personas. En español, "en médicos" es natural con "gastar" y conserva la noción de inversión de recursos; "médicos" mantiene el término formal del registro.
- source_word: προσαναλώσασα
  english_pob_choice: had spent
  chosen_spanish: había gastado
  alternatives_spanish:
  - había consumido
  - había agotado
  lexicon: BDAG
  rationale: El aoristo participial indica una acción anterior al verbo principal. "Había gastado" es idiomático y refleja el uso completo de recursos.
- source_word: ὅλον τὸν βίον
  english_pob_choice: her whole livelihood
  chosen_spanish: todo su sustento
  alternatives_spanish:
  - todos sus medios de vida
  - todo lo que tenía para vivir
  lexicon: BDAG
  rationale: Se sigue la decisión léxica del POB de evitar "vida" biológica. "Sustento" comunica los recursos de los que vivía y evita un literalismo engañoso.
- source_word: οὐκ ἴσχυσεν
  english_pob_choice: was not able
  chosen_spanish: no había podido
  alternatives_spanish:
  - no pudo
  - no fue capaz
  lexicon: BDAG
  rationale: 'La incapacidad se expresa mejor en español con una forma resultativa pasada: "no había podido". Conserva la idea de imposibilidad previa respecto al desenlace.'
- source_word: ἀπ’ οὐδενὸς
  english_pob_choice: by anyone
  chosen_spanish: por nadie
  alternatives_spanish:
  - de nadie
  - por nadie en absoluto
  lexicon: BDAG
  rationale: El sentido idiomático bajo negación es "por nadie". Se mantiene la voz pasiva y la referencia indefinida sin sobrecargar el estilo.
- source_word: θεραπευθῆναι
  english_pob_choice: to be healed
  chosen_spanish: ser sanada
  alternatives_spanish:
  - ser curada
  - recibir sanidad
  lexicon: BDAG
  rationale: '"Sanada" es la opción más natural en español bíblico contemporáneo y preserva el pasivo. "Curada" es posible, pero "sanada" encaja mejor con el registro narrativo.'
theological_decisions:
- issue: La frase βίος podría entenderse como "vida" en sentido biológico o como medios de subsistencia.
  english_pob_reading: her whole livelihood, not her biological 'life'
  chosen_spanish_reading: todo su sustento
  alternative_spanish_readings:
  - toda su vida
  - todos sus medios de vida
  rationale: Se evita la lectura biológica incorrecta y se conserva el campo semántico de recursos materiales, siguiendo la advertencia del POB en inglés.
  doctrine_reference: N/A — decisión léxica semántica, no doctrinal
- issue: El pasivo final plantea si el texto afirma simplemente incapacidad de sanidad o añade implícitamente fracaso médico.
  english_pob_reading: was not able to be healed by anyone
  chosen_spanish_reading: no había podido ser sanada por nadie
  alternative_spanish_readings:
  - no pudo ser sanada por nadie
  - nadie había podido sanarla
  rationale: La redacción sigue el SBLGNT sin añadir culpa explícita a los médicos más allá de lo que el verso dice. Se conserva la incapacidad general, sin convertirla en una acusación más fuerte.
  doctrine_reference: N/A — decisión textual/narrativa
- issue: El sintagma ἐν ῥύσει αἵματος admite varias maneras de expresar la afección.
  english_pob_reading: in a flow of blood / with a discharge of blood / suffering from bleeding
  chosen_spanish_reading: padecía un flujo de sangre
  alternative_spanish_readings:
  - tenía una descarga de sangre
  - sufría de sangrado
  rationale: '"Padecía" comunica claramente la condición sufriente sin introducir diagnóstico moderno ni perder la corporalidad del griego.'
  doctrine_reference: N/A — decisión léxica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que corrigió una paráfrasis menos natural de la condición de la mujer a «had had a flow of blood». En español se reflejó esa naturalidad con «padecía un flujo de sangre desde hacía doce años», manteniendo la progresión narrativa y evitando una construcción demasiado literal.
  spanish_consistency_notes:
  - Se mantiene Yahvé/Jesús/Mesías según las pautas del proyecto; este versículo no contiene esos términos.
  - Se prefirió "sanada" para el pasivo θεραπευθῆναι por naturalidad bíblica contemporánea en español.
  - '"Sustento" traduce βίος conforme a la nota inglesa y evita el falso cognado "vida".'
  - La colocación de los corchetes de nota sigue el orden de los puntos léxicos relevantes en el verso.
