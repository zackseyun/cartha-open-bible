translation:
  language: es
  text: 'Pero él les respondió y dijo: «Mi madre y mis hermanos[a] son los que oyen la palabra de Dios y la hacen»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa un plural masculino («hermanos»); en español puede entenderse de manera amplia dentro del grupo familiar, pero el texto no cambia la forma masculina.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Estos son los que oyen la palabra de Dios y la hacen». El griego expresa de forma más explícita la identificación con un demostrativo.'
    reason: previous_rendering
lexical_decisions:
- source_word: ὁ δὲ ἀποκριθεὶς εἶπεν
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - contestó y dijo
  - les respondió
  lexicon: BDAG
  rationale: Conserva la pareja narrativa semítica de «responder + decir» sin volverla redundante en español. «Les respondió» expresa bien el dativo πρὸς αὐτούς y mantiene un registro natural y digno.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a esas personas
  lexicon: BDAG
  rationale: El pronombre dativo indirecto en español transmite de forma natural la idea de dirigirse a ellos. «Les respondió» evita una construcción más pesada sin perder el sentido.
- source_word: Μήτηρ μου
  english_pob_choice: My mother
  chosen_spanish: Mi madre
  alternatives_spanish:
  - Mi mamá
  lexicon: BDAG
  rationale: Traducción directa y reverente del sustantivo singular con posesivo. «Madre» es más acorde con el tono del texto que una opción coloquial.
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis hermanos varones
  - mis hermanos y hermanas
  lexicon: BDAG
  rationale: Se conserva el plural masculino gramatical del griego con «hermanos». En español, este plural puede abarcar varones del grupo familiar inmediato; no se fuerza una inclusividad no explicitada en el texto base.
- source_word: οὗτοί εἰσιν
  english_pob_choice: are those who
  chosen_spanish: son los que
  alternatives_spanish:
  - son estos que
  - son aquellos que
  lexicon: BDAG
  rationale: 'La estructura española más natural para el demostrativo + artículo del participio substantivado es «son los que». Mantiene la identificación enfática sin la rigidez de un calco como «son éstos: los que».'
- source_word: οἱ ... ἀκούοντες
  english_pob_choice: those who hear
  chosen_spanish: los que oyen
  alternatives_spanish:
  - los que escuchan
  - los oyentes de
  lexicon: BDAG
  rationale: «Oyen» refleja con fidelidad ἀκούοντες y preserva el paralelismo con «hacen». «Escuchan» puede sugerir atención voluntaria, pero aquí el griego básico es oír/escuchar como recepción del mensaje.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - la palabra de Dios
  lexicon: BDAG
  rationale: «Palabra de Dios» es la equivalencia más directa y natural para λόγον τοῦ θεοῦ en este contexto. Conserva la resonancia teológica del enunciado sin explicar de más.
- source_word: καὶ ποιοῦντες
  english_pob_choice: and do it
  chosen_spanish: y la hacen
  alternatives_spanish:
  - y la ponen por obra
  - y la obedecen
  lexicon: BDAG
  rationale: ποιέω aquí expresa realizar o llevar a cabo lo oído. «La hacen» es breve, fiel y paralela a «oyen»; «ponen por obra» sería válido pero más idiomático-devocional, y «obedecen» añade interpretación.
theological_decisions:
- issue: Alcance de la familia verdadera de Jesús
  english_pob_reading: Jesus identifies his true family as those characterized by hearing God's word and doing it, without denying his biological family.
  chosen_spanish_reading: Jesús identifica a su verdadera familia por la escucha y obediencia a la palabra de Dios, sin negar a su madre ni a sus parientes biológicos.
  alternative_spanish_readings:
  - Jesús rechaza a su familia biológica
  - Jesús habla solo de un grupo masculino de discípulos
  rationale: 'La formulación española debe conservar la tensión del dicho: redefine la pertenencia familiar alrededor de la respuesta a la palabra de Dios, pero no afirma un rechazo de su familia natural que el versículo no enuncia.'
  doctrine_reference: Preservar la tensión textual; evitar una lectura que anule la familia biológica sin base explícita.
translation_notes:
  revision_awareness: 'El texto español corrige el problema anterior de anclaje: ambos marcadores de nota aparecen explícitamente en la traducción, y la redacción se ajusta al patrón griego οὗτοί εἰσιν οἱ... con una solución natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y no se introduce terminología eclesiástica ajena al pasaje.
  - Se conserva «hermanos» para ἀδελφοί por fidelidad al plural masculino griego, con nota sobre el posible alcance del término.
  - Se usa un verbo simple para ποιέω («hacer») en lugar de una paráfrasis devocional.
  - La puntuación con comillas y dos puntos busca legibilidad publicable sin desplazar el sentido del original.
