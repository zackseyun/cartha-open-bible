revisions:
- from: 'Entonces les dijo[a]: «¿Dónde está su fe?» Y, llenos de temor, se maravillaron, y se decían unos a otros: «¿Quién es entonces este, que da órdenes aun a los vientos y al agua, y le obedecen?»'
  to: 'Entonces les dijo: «¿Dónde está su fe[a]?». Y tenían miedo y se maravillaban, diciéndose unos a otros: «¿Quién es entonces este, que aun a los vientos y al agua ordena, y le obedecen?»'
  rationale: Se reubicó la nota al pie para anclarla a «fe», que es el término al que corresponde la alternativa «confianza». Se sustituyó «llenos de temor» por «tenían miedo» para reflejar con mayor sobriedad el participio φοβηθέντες. También se simplificó «da órdenes» a «ordena» para una expresión más natural y directa en español, manteniendo el sentido del griego. Se conservó «vientos y agua» y la fuerza de la pregunta «¿Dónde está su fe?» conforme a la auditoría inglesa y la evidencia fuente.
