translation:
  language: es
  text: Y los que lo habían visto les contaron cómo había sido salvado[a] el hombre endemoniado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «había sido sanado» o «había sido liberado». El verbo griego puede significar salvar, sanar o librar, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγγειλαν
  english_pob_choice: reported
  chosen_spanish: contaron
  alternatives_spanish:
  - informaron
  - relataron
  lexicon: BDAG
  rationale: ἀπαγγέλλω expresa dar aviso o relatar una noticia. En español, «contaron» comunica bien el acto de narrar el hecho a otros en un contexto de testimonio ocular, con un tono natural y fiel. «Informaron» sería más formal, y «relataron» algo más literario.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: δέ aquí funciona como conector suave de avance narrativo. «Y» preserva la continuidad del relato sin imponer contraste fuerte.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: El dativo indica a los destinatarios del informe. En español, el pronombre átono «les» transmite esa relación de manera natural.
- source_word: οἱ ἰδόντες
  english_pob_choice: those who had seen it
  chosen_spanish: los que lo habían visto
  alternatives_spanish:
  - los testigos
  - los que vieron
  lexicon: BDAG
  rationale: El participio articular se refiere a quienes presenciaron el hecho. «Los que lo habían visto» mantiene la referencia al evento previo y su valor testimonial sin forzar un sustantivo técnico como «testigos».
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  lexicon: BDAG
  rationale: Introduce el contenido del relato sobre la manera en que ocurrió el hecho. «Cómo» es la opción más directa y natural en español.
- source_word: ἐσώθη
  english_pob_choice: had been saved
  chosen_spanish: había sido salvado
  alternatives_spanish:
  - había sido sanado
  - había sido liberado
  - había quedado a salvo
  lexicon: BDAG
  rationale: σῴζω puede significar salvar, sanar o librar, según el contexto. En esta escena de liberación, «había sido salvado» conserva el verbo amplio del griego y la tensión semántica documentada por la POB inglesa, sin reducirlo solo a curación física o a liberación.
- source_word: ὁ δαιμονισθείς
  english_pob_choice: the demon-possessed man
  chosen_spanish: el hombre endemoniado
  alternatives_spanish:
  - el endemoniado
  - el hombre poseído por demonios
  - el hombre demonizado
  lexicon: BDAG
  rationale: El participio sustantivado señala al hombre afectado por influencia demoníaca. «Endemoniado» es claro, natural y fiel al sentido del término en español bíblico contemporáneo; «el endemoniado» sería más breve pero menos explícito en esta cláusula.
theological_decisions:
- issue: Alcance de σῴζω en un contexto de exorcismo
  english_pob_reading: had been saved
  chosen_spanish_reading: había sido salvado
  alternative_spanish_readings:
  - había sido sanado
  - había sido liberado
  rationale: La forma griega permite un campo semántico que incluye salvación, sanidad y liberación. Mantener «salvado» preserva esa amplitud y evita cerrar prematuramente el sentido en una sola categoría. La nota deja constancia de las alternativas contextualmente plausibles.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés de la POB: conserva el conector narrativo leve de δέ, la referencia testimonial de οἱ ἰδόντες y la amplitud semántica de σῴζω en la clausula final, sin introducir una paráfrasis más interpretativa que la que autoriza el griego.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «salvado» para σῴζω, en coherencia con la decisión lexical documentada, y se preserva la tensión con «sanado» y «liberado» en la nota.
  - «Endemoniado» se elige por claridad y naturalidad en español, evitando tecnicismos innecesarios.
