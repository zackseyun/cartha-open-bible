translation:
  language: es
  text: Porque el Hijo del Hombre ciertamente va según lo que ha sido determinado[a], pero ¡ay de aquel hombre por quien es traicionado!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “por quien es entregado”. El verbo griego puede significar tanto “traicionar” como “entregar” según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: En español, ‘Porque’ comunica con naturalidad la relación causal o explicativa que abre el dicho respecto de la frase anterior, sin introducir una paráfrasis innecesaria.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo de hombre
  lexicon: BDAG
  rationale: ‘Hijo del Hombre’ es la forma estable y reconocible del título cristológico; conserva la resonancia bíblica e intertextual del griego y del uso de Jesús.
- source_word: μέν
  english_pob_choice: indeed
  chosen_spanish: en verdad
  alternatives_spanish:
  - ciertamente
  - por una parte
  lexicon: BDAG
  rationale: La partícula marca contraste y énfasis; ‘en verdad’ mantiene el valor enfático sin sonar forzado en español.
- source_word: κατὰ τὸ ὡρισμένον
  english_pob_choice: as it has been determined
  chosen_spanish: según lo que ha sido determinado
  alternatives_spanish:
  - conforme a lo que ha sido determinado
  - como ha sido fijado
  - según el designio
  lexicon: BDAG
  rationale: La frase griega expresa conformidad con una determinación previa. ‘Según lo que ha sido determinado’ preserva la pasiva y evita añadir explícitamente un sujeto que el texto no formula.
- source_word: πορεύεται
  english_pob_choice: goes
  chosen_spanish: va
  alternatives_spanish:
  - camina
  - prosigue
  - sigue su camino
  lexicon: BDAG
  rationale: ‘Va’ reproduce el movimiento simple del verbo griego y funciona bien en español para el curso de Jesús hacia su pasión.
- source_word: πλὴν
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - no obstante
  lexicon: BDAG
  rationale: Introduce un contraste fuerte y directo entre la determinación divina y la responsabilidad humana; ‘pero’ es natural y claro.
- source_word: οὐαὶ
  english_pob_choice: woe
  chosen_spanish: ¡ay!
  alternatives_spanish:
  - ¡ay de!
  - ¡desdicha!
  lexicon: BDAG
  rationale: ‘¡Ay!’ conserva el tono profético de lamento y juicio. En combinación con el dativo siguiente, se integra naturalmente en la expresión española.
- source_word: τῷ ἀνθρώπῳ ἐκείνῳ
  english_pob_choice: to that man
  chosen_spanish: de aquel hombre
  alternatives_spanish:
  - aquel hombre
  - ese hombre
  - a ese hombre
  lexicon: BDAG
  rationale: La construcción española con ‘¡ay de…!’ se expresa de manera idiomática con ‘de aquel hombre’, manteniendo el referente específico y el tono de reproche/jucio del original.
- source_word: δι’ οὗ
  english_pob_choice: through whom
  chosen_spanish: por medio de quien
  alternatives_spanish:
  - por quien
  - a través de quien
  lexicon: BDAG
  rationale: La preposición διά con genitivo puede expresar agencia mediada. ‘Por medio de quien’ conserva esa mediación y resulta más fluida que un calco rígido.
- source_word: παραδίδοται
  english_pob_choice: he is betrayed
  chosen_spanish: es entregado
  alternatives_spanish:
  - es traicionado
  - es vendido
  - es entregado/traicionado
  lexicon: BDAG
  rationale: El verbo puede significar tanto ‘entregar’ como ‘traicionar’. En español, ‘es entregado’ preserva el alcance lexical amplio sin resolver de antemano la tensión narrativa; la traición queda implicada por el contexto de Judas.
theological_decisions:
- issue: Tensión entre el plan determinado por Dios y la culpa humana del traidor
  english_pob_reading: 'The verse preserves both truths: the Son of Man goes according to what has been determined, yet woe remains on the man who betrays him.'
  chosen_spanish_reading: La traducción mantiene que el Hijo del Hombre va conforme a una determinación previa, pero también conserva el ¡ay! pronunciado sobre el hombre por cuya acción ocurre la entrega.
  alternative_spanish_readings:
  - Una formulación que suavice la determinación divina
  - Una formulación que atenúe la culpabilidad del traidor
  rationale: El griego yuxtapone de forma explícita la conformidad con lo determinado y el juicio sobre el agente humano. La versión española no debe resolver esa tensión teológica ni inclinarla en una sola dirección.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con la auditoría inglesa: se conservó el contraste entre la determinación previa y la culpabilidad humana, y se mantuvo la ambigüedad lexical de παραδίδοται mediante una nota alternativa en español. No se aplicaron revisiones posteriores al texto base auditado.'
  spanish_consistency_notes:
  - Se mantiene ‘Hijo del Hombre’ como título cristológico estándar y no se sustituye por una explicación interpretativa.
  - ‘Espíritu’ no aplica en este versículo; no se introduce terminología doctrinal ajena al texto.
  - ‘Es entregado’ conserva la amplitud de παραδίδωμι sin eliminar la posibilidad contextual de traición.
  - 'La puntuación sigue el tono solemne del oráculo: coma tras la primera cláusula y exclamación en el juicio final.'
