revisions:
- from: 'Pero Jesús respondió[a]: «No más de esto». Y, tocándole la oreja, lo sanó.'
  to: 'Pero Jesús respondió[a]: «No más de esto». Y tocó su oreja y lo sanó.'
  rationale: Se ajusta la redacción a un español más natural y directo al convertir «tocándole la oreja» en «tocó su oreja y lo sanó», lo que refleja bien la secuencia ἁψάμενος... ἰάσατο. También se corrige la acentuación de «aún» en la nota. Se mantiene «No más de esto» y la nota de ambigüedad porque corresponden al expediente inglés y al sentido debatido del griego.
