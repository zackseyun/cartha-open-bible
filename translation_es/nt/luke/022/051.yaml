translation:
  language: es
  text: 'Pero Jesús respondió[a]: «No más de esto». Y tocó su oreja y lo sanó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Permitid aún esto», o «Dejadlo llegar hasta aquí». La expresión griega es breve y puede entenderse de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: El participio narrativo introduce la réplica de Jesús. En español, «respondió» conserva la función discursiva de la frase sin sonar mecánico.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Marca un giro breve en la narración; «Pero» refleja bien el contraste inmediato con la violencia previa.
- source_word: Ἐᾶτε ἕως τούτου
  english_pob_choice: No more of this!
  chosen_spanish: No más de esto
  alternatives_spanish:
  - Permitid aun esto
  - Dejadlo llegar hasta aquí
  - Basta de esto
  lexicon: BDAG
  rationale: La expresión griega es breve e idiomática, con tensión interpretativa real. «No más de esto» transmite el valor imperativo de detener la acción sin resolver indebidamente la ambigüedad del texto.
- source_word: ἁψάμενος
  english_pob_choice: touched
  chosen_spanish: tocándole
  alternatives_spanish:
  - habiendo tocado
  - tocó
  lexicon: BDAG
  rationale: El participio aoristo se naturaliza en español con una construcción verbal coordinada. «Tocándole» preserva la secuencia de acciones y la referencia al hombre herido.
- source_word: τοῦ ὠτίου
  english_pob_choice: his ear
  chosen_spanish: la oreja
  alternatives_spanish:
  - su oreja
  - el oído
  lexicon: BDAG
  rationale: ὠτίον significa «oreja/oído»; en este contexto corporal concreto, «oreja» es más natural y preciso que «oído». El posesivo puede omitirse en español porque el referente ya está claro por el contexto inmediato.
- source_word: ἰάσατο
  english_pob_choice: healed
  chosen_spanish: lo sanó
  alternatives_spanish:
  - lo curó
  - lo sanó
  lexicon: BDAG
  rationale: ἰάομαι se refiere a sanar/curar. «Lo sanó» es una forma clara y reverente en español bíblico contemporáneo.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - lo
  - a él
  lexicon: BDAG
  rationale: El pronombre objeto retoma al hombre herido; «lo» es la opción más natural y concisa en español.
theological_decisions:
- issue: Sentido de Ἐᾶτε ἕως τούτου
  english_pob_reading: A rebuke meaning 'No more of this!' directed at stopping the violent action
  chosen_spanish_reading: Una reprensión equivalente a «No más de esto», dirigida a detener la acción violenta
  alternative_spanish_readings:
  - «Permitid aun esto»
  - «Dejadlo llegar hasta aquí»
  rationale: La frase griega admite más de una lectura y el contexto inmediato no elimina del todo la ambigüedad. La redacción principal conserva el valor de interrupción/represión que mejor encaja con la escena, sin borrar las alternativas documentadas.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que pasó de «Enough of this!» a «No more of this!» para reflejar con más precisión el valor imperativo de Ἐᾶτε ἕως τούτου. La versión española adopta esa misma decisión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque aquí no aparece κύριος en el texto fuente.
  - «Sanó» conserva el campo semántico de ἰάομαι sin introducir matices adicionales como «restauró» que no son necesarios aquí.
  - La nota al pie preserva la ambigüedad documentada del mandato griego en lugar de eliminarla.
