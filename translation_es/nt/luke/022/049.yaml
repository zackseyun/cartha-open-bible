translation:
  language: es
  text: 'Y cuando los que estaban alrededor de él vieron lo que estaba por suceder[a], dijeron: «Señor, ¿atacaremos con la espada?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una espada». El griego μάχαιρα puede referirse a una espada o a una hoja más corta o daga.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: when ... saw
  chosen_spanish: cuando ... vieron
  alternatives_spanish:
  - al ver
  - después de ver
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente respecto del verbo principal. «Cuando ... vieron» conserva esa relación en un español natural y directo, sin forzar una construcción más pesada.
- source_word: οἱ περὶ αὐτὸν
  english_pob_choice: those around him
  chosen_spanish: los que estaban alrededor de él
  alternatives_spanish:
  - los que lo rodeaban
  - sus compañeros
  - los de alrededor
  lexicon: BDAG
  rationale: La expresión describe al grupo que lo rodeaba sin identificarlo con más precisión de la que da el griego. «Los que estaban alrededor de él» es fiel y evita sobreinterpretar que fueran solo discípulos.
- source_word: τὸ ἐσόμενον
  english_pob_choice: what was about to happen
  chosen_spanish: lo que estaba por suceder
  alternatives_spanish:
  - lo que iba a pasar
  - lo que estaba por acontecer
  lexicon: BDAG
  rationale: El participio futuro articulado expresa cercanía e inminencia. «Lo que estaba por suceder» comunica bien esa idea en español y mantiene la referencia a un evento inminente.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: BDAG
  rationale: En el discurso directo a Jesús, κύριος se vierte como «Señor» para conservar el valor titular y reverencial que el audit trail inglés preserva con «Lord».
- source_word: εἰ
  english_pob_choice: shall
  chosen_spanish: ¿golpearemos... ?
  alternatives_spanish:
  - ¿si golpeamos... ?
  - ¿deberíamos golpear... ?
  lexicon: BDAG
  rationale: 'En una pregunta deliberativa, el español expresa mejor la fuerza del griego con una interrogación directa en futuro: «¿golpearemos... ?».'
- source_word: πατάξομεν
  english_pob_choice: shall we strike
  chosen_spanish: golpearemos
  alternatives_spanish:
  - atacaremos
  - heriremos
  - daremos un golpe
  lexicon: BDAG
  rationale: El verbo πατάσσω puede implicar golpear con fuerza o asestar un golpe. En este contexto de violencia armada, «golpearemos» conserva la idea básica sin añadir más especificidad de la que ofrece el griego.
- source_word: ἐν μαχαίρῃ
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - con una espada
  - con el cuchillo
  - con un arma blanca
  lexicon: BDAG
  rationale: μάχαιρα puede referirse a espada o a una hoja más corta. En español, «espada» mantiene la imagen bélica sin introducir una connotación demasiado moderna de «arma blanca» y queda alineado con la lectura tradicional posible del contexto.
theological_decisions:
- issue: Rendering of κύριος in address to Jesus
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Se conserva el título reverencial y teológicamente cargado que el audit trail inglés preserva con «Lord». En este contexto no se reduce a un simple trato respetuoso.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Weapon nuance of μάχαιρα
  english_pob_reading: sword / shorter blade-dagger
  chosen_spanish_reading: espada
  alternative_spanish_readings:
  - cuchillo
  - daga
  - hoja
  rationale: La nota inglesa preserva la ambigüedad léxica de μάχαιρα. En el texto principal se elige «espada» por su idiomaticidad y por el contexto narrativo de violencia, manteniendo abierta la alternativa en nota.
  doctrine_reference: Lexical ambiguity in μάχαιρα
translation_notes:
  revision_awareness: La última pasada de revisión indicó que no eran necesarios cambios; esta versión mantiene ese acuerdo alto y conserva la ambigüedad lexical relevante de μάχαιρα en una nota breve.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en discurso directo a Jesús, conforme al criterio doctrinal del proyecto.
  - Se usa «espada» en el texto principal y se explicita la alternativa léxica de μάχαιρα en nota para no perder la tensión semántica.
  - La estructura temporal con participio aoristo se vierte de manera natural con «cuando ... vieron».
