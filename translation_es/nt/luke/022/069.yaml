translation:
  language: es
  text: Pero desde ahora el Hijo del Hombre estará sentado a la derecha del poder de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «a la derecha del Poder», una manera reverente de referirse a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ τοῦ νῦν
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - a partir de ahora
  - de aquí en adelante
  lexicon: BDAG
  rationale: Expresa de manera natural el punto de inicio temporal y conserva el valor prospectivo del griego sin añadir matices no presentes.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: En este contexto introduce un giro contrastivo en la respuesta de Jesús; 'Pero' refleja bien el matiz adversativo en español.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: estará
  alternatives_spanish:
  - será
  - va a estar
  lexicon: BDAG
  rationale: El futuro de εἰμί aquí anuncia el estado venidero de exaltación; 'estará' comunica ese estado de forma natural.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  lexicon: BDAG
  rationale: Se conserva el título cristológico establecido y su eco daniélico/apocalíptico, sin paraphrasearlo.
- source_word: καθήμενος
  english_pob_choice: seated
  chosen_spanish: sentado
  alternatives_spanish:
  - sentándose
  - entronizado
  lexicon: BDAG
  rationale: El participio describe una postura de entronización; 'sentado' es fiel y natural en español. 'Entronizado' explicita la idea, pero va más allá del término verbal.
- source_word: ἐκ δεξιῶν
  english_pob_choice: at the right hand
  chosen_spanish: a la derecha
  alternatives_spanish:
  - a la diestra
  - al lado derecho
  lexicon: BDAG
  rationale: La expresión idiomática se traduce de forma clara en español. 'A la diestra' es tradicional, pero 'a la derecha' resulta más transparente sin perder la referencia de honor y autoridad.
- source_word: τῆς δυνάμεως
  english_pob_choice: the power
  chosen_spanish: del poder
  alternatives_spanish:
  - de la fuerza
  - de la potencia
  lexicon: BDAG
  rationale: δύναμις se rinde aquí como 'poder' para conservar el sustantivo común y su posible función reverencial sin convertirlo en título propio en el texto principal.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  lexicon: BDAG
  rationale: Mantiene explícito el genitivo que identifica de quién es ese poder y evita oscurecer la referencia divina.
theological_decisions:
- issue: La fórmula de exaltación y la posible circunlocución reverencial
  english_pob_reading: the Son of Man will be seated at the right hand of the power of God
  chosen_spanish_reading: el Hijo del Hombre estará sentado a la derecha del poder de Dios
  alternative_spanish_readings:
  - el Hijo del Hombre estará sentado a la derecha del Poder
  - el Hijo del Hombre estará sentado a la diestra de Dios
  rationale: La redacción principal conserva la afirmación de exaltación y autoridad, a la vez que mantiene visible la estructura del griego. Se evita sustituir 'el poder de Dios' por una denominación más interpretativa en el texto principal; la nota preserva la lectura reverencial alternativa.
  doctrine_reference: Salmo 110; Daniel 7; Affirmations; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se cotejó el griego SBLGNT y el registro auditado en inglés. No hubo revisiones aplicadas en el texto base; la propuesta española mantiene la equivalencia óptima, conservando la tensión entre la expresión común 'poder' y la posible circunlocución reverencial.
  spanish_consistency_notes:
  - Se usa 'Hijo del Hombre' de forma consistente con el título cristológico establecido.
  - '''a la derecha'' conserva la imagen idiomática de honor/autoridad y resulta natural en español.'
  - '''poder'' se mantiene en minúscula en el texto principal porque el griego usa un sustantivo común; la mayúscula queda reservada para la alternativa reverencial de la nota.'
  - La puntuación reproduce el contraste inicial con 'Pero' y el cierre de cita con la nota al pie, en estilo publicable.
