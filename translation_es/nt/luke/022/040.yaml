  source_alignment_summary: 'El borrador español refleja fielmente el griego y el rastro auditado en inglés: «Cuando llegó al lugar» comunica bien γενόμενος δὲ ἐπὶ τοῦ τόπου; «les dijo» corresponde a εἶπεν αὐτοῖς; y «Oren para que no entren en tentación» preserva adecuadamente Προσεύχεσθε μὴ εἰσελθεῖν εἰς πειρασμόν sin sobreinterpretar εἰσελθεῖν como «caer».'
  spanish_quality_summary: El español es natural, claro y digno, con registro eclesial ampliamente legible. La sintaxis fluye bien y evita calcos innecesarios. «Oren» es preferible a «recen» en un registro neutral amplio. La puntuación y las comillas son correctas.
