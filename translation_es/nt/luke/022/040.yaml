translation:
  language: es
  text: 'Cuando llegó al lugar[a], les dijo: «Oren para que no entren en tentación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prueba» o «tiempo de prueba». El término griego puede referirse tanto a la tentación en sentido moral como a una prueba más amplia.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενόμενος
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - había llegado
  - habiendo llegado
  lexicon: BDAG
  rationale: El participio aoristo con ἐπὶ τοῦ τόπου es idiomático de llegada al lugar. En español, «llegó» expresa de manera natural ese arribo sin perder la relación temporal con la acción principal.
- source_word: δὲ
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - y
  - ahora
  - entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona como enlace narrativo suave. «Cuando» reproduce bien en español la transición temporal implícita en el participio, con fluidez natural.
- source_word: ἐπὶ τοῦ τόπου
  english_pob_choice: to the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - en el lugar
  - a ese lugar
  lexicon: BDAG
  rationale: La expresión apunta al lugar ya mencionado en el contexto. «Al lugar» conserva el movimiento de llegada y suena más natural que una traducción más rígida.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - se los dijo
  lexicon: BDAG
  rationale: λέγω se rinde con el verbo simple «decir». En español, «les dijo» es claro y fiel, sin añadir una intensidad directiva que no está en el verbo.
- source_word: Προσεύχεσθε
  english_pob_choice: Pray
  chosen_spanish: Oren
  alternatives_spanish:
  - Recen
  - Sigan orando
  lexicon: BDAG
  rationale: El imperativo presente pide oración continua o habitual. «Oren» es una forma natural y digna en español; «Sigan orando» explicita la duratividad, pero no es necesaria en el texto principal.
- source_word: μὴ εἰσελθεῖν
  english_pob_choice: that you may not enter
  chosen_spanish: para que no entren
  alternatives_spanish:
  - para no entrar
  - a fin de que no entren
  - para que no caigan en
  lexicon: BDAG
  rationale: La construcción con προσεύχομαι expresa el contenido o propósito de la oración. «Para que no entren» conserva bien el sentido y evita interpretar más de lo que exige εἰσέρχομαι.
- source_word: πειρασμόν
  english_pob_choice: temptation
  chosen_spanish: tentación
  alternatives_spanish:
  - prueba
  - tiempo de prueba
  - ensayo
  lexicon: BDAG
  rationale: En este contexto inmediato, la advertencia apunta a un riesgo de fracaso espiritual, por lo que «tentación» es la traducción más natural. Se mantiene, sin embargo, la amplitud semántica de πειρασμός en una nota.
theological_decisions:
- issue: Alcance de πειρασμός
  english_pob_reading: temptation, with footnoted alternatives testing/trial
  chosen_spanish_reading: tentación, con nota que admite prueba o tiempo de prueba
  alternative_spanish_readings:
  - prueba
  - tiempo de prueba
  - tentación/prueba
  rationale: La escena exige una advertencia moral y espiritual directa, así que «tentación» comunica bien el sentido principal. A la vez, πειρασμός también puede significar prueba o tiempo de prueba; la nota preserva esa tensión sin resolverla de manera reductiva.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios; este borrador sigue el acuerdo alto del control cruzado y conserva la misma decisión principal sobre πειρασμόν, trasladándola al español con la misma amplitud semántica.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este versículo solo si aparece el nombre divino; aquí no aparece, así que no se requiere ajuste.
  - Se mantiene el registro bíblico sobrio y contemporáneo, evitando calcos innecesarios.
  - «Tentación» se conserva como término principal para πειρασμόν, con nota de amplitud semántica para no borrar la tensión del original.
