translation:
  language: es
  text: 'Y tomando pan[a], después de dar gracias, lo partió y se lo dio a ellos, diciendo: «Esto es mi cuerpo, que se da por ustedes[c][b]. Hagan esto en memoria de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos omiten: «que se da por ustedes. Hagan esto en memoria de mí».'
    reason: textual_variant
  - marker: b
    text: 'O: «que está siendo dado por ustedes».'
    reason: lexical_alternative
  - marker: c
    text: «Esto es mi cuerpo» se traduce literalmente; algunos lo interpretan como «Esto significa mi cuerpo», pero el texto griego usa «es».
    reason: alternative_reading
lexical_decisions:
- source_word: λαβὼν
  english_pob_choice: taking
  chosen_spanish: Y tomando
  alternatives_spanish:
  - Y habiendo tomado
  - Tomó
  lexicon: BDAG
  rationale: El participio se vierte con gerundio para conservar la secuencia narrativa sin volver la frase rígida. ‘Tomando’ sigue de cerca la acción previa y funciona bien en español bíblico moderno.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - pan de mesa
  - pan
  lexicon: BDAG
  rationale: ‘Ἄρτος’ en este contexto de comida se traduce naturalmente como ‘pan’. En español, ‘pan’ es claro y fiel al referente material.
- source_word: εὐχαριστήσας
  english_pob_choice: after giving thanks
  chosen_spanish: después de dar gracias
  alternatives_spanish:
  - habiendo dado gracias
  - después de agradecer
  lexicon: BDAG
  rationale: La forma temporal del participio se preserva con una frase idiomática. ‘Dar gracias’ comunica el acto de agradecimiento sin imponer un tecnicismo litúrgico.
- source_word: ἔκλασεν
  english_pob_choice: he broke
  chosen_spanish: lo partió
  alternatives_spanish:
  - lo quebró
  - partió el pan
  lexicon: BDAG
  rationale: En español, ‘partir’ expresa con naturalidad el gesto de quebrar el pan. El objeto ‘lo’ retoma el pan mencionado y evita repetición pesada.
- source_word: ἔδωκεν αὐτοῖς
  english_pob_choice: gave it to them
  chosen_spanish: se lo dio a ellos
  alternatives_spanish:
  - les dio
  - lo dio a ellos
  lexicon: BDAG
  rationale: La combinación pronominal refleja con claridad la referencia al pan ya mencionado y mantiene el movimiento verbal de la escena. ‘A ellos’ conserva el dativo explícito del griego.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: BDAG
  rationale: ‘Diciendo’ conserva el enlace participial con las acciones anteriores, como en el griego, y mantiene la fluidez narrativa.
- source_word: Τοῦτό ἐστιν τὸ σῶμά μου
  english_pob_choice: This is my body
  chosen_spanish: Esto es mi cuerpo
  alternatives_spanish:
  - Este es mi cuerpo
  - Esto representa mi cuerpo
  lexicon: BDAG
  rationale: Se preserva la formulación copulativa directa del texto griego. ‘Esto’ sigue el demostrativo neutro, y ‘cuerpo’ traduce σῶμα sin resolver la tensión sacramental por paráfrasis.
- source_word: τὸ ὑπὲρ ὑμῶν διδόμενον
  english_pob_choice: which is given for you
  chosen_spanish: que es dado por ustedes
  alternatives_spanish:
  - que está siendo dado por ustedes
  - que se da por ustedes
  - entregado por ustedes
  lexicon: BDAG
  rationale: La cláusula participial se vierte como relativa para sonar natural en español. ‘Es dado’ mantiene el valor pasivo del participio y ‘por ustedes’ refleja ὑπέρ en sentido benefactivo/substitutivo.
- source_word: τοῦτο ποιεῖτε
  english_pob_choice: Do this
  chosen_spanish: Hagan esto
  alternatives_spanish:
  - Haced esto
  - Sigan haciendo esto
  lexicon: BDAG
  rationale: El imperativo plural presente se expresa con ‘Hagan esto’, que suena natural y conserva la fuerza exhortativa comunitaria.
- source_word: εἰς τὴν ἐμὴν ἀνάμνησιν
  english_pob_choice: in remembrance of me
  chosen_spanish: en memoria de mí
  alternatives_spanish:
  - para recordar de mí
  - como mi memorial
  - en recuerdo de mí
  lexicon: BDAG
  rationale: ‘Memoria’ comunica adecuadamente el sentido memorial de ἀνάμνησις en español contemporáneo. Se evita una expansión interpretativa y se mantiene el enfoque en el acto conmemorativo.
theological_decisions:
- issue: Sentido de «Esto es mi cuerpo»
  english_pob_reading: Preserved the literal wording 'This is my body' without interpretive expansion.
  chosen_spanish_reading: Se conserva «Esto es mi cuerpo» sin añadir interpretaciones como «significa» o «representa».
  alternative_spanish_readings:
  - Esto significa mi cuerpo
  - Esto representa mi cuerpo
  rationale: El griego presenta una afirmación directa; la traducción no debe resolver de antemano el debate sacramental. Mantener la forma literal preserva la tensión teológica documentada en el audit trail.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Lectura textual larga de Lucas 22:19
  english_pob_reading: Included the bracketed clause in the main text.
  chosen_spanish_reading: Se incluye la cláusula larga en el texto principal y se marca una variante textual en nota.
  alternative_spanish_readings:
  - Texto más corto que termina después de «mi cuerpo»
  rationale: El paquete fuente presenta la lectura larga como texto de trabajo, pero con discusión textual. La nota permite auditar la variante sin ocultarla.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; preserve alternatives in footnotes where significant.'
translation_notes:
  revision_awareness: Se siguió la lectura griega SBLGNT provista, incluyendo la cláusula larga entre corchetes del texto base y reflejándola en nota textual. No hubo revisiones aplicadas respecto del borrador auditado en inglés; la traducción mantiene la tensión entre una formulación copulativa literal y la cláusula participial pasiva.
  spanish_consistency_notes:
  - Se usó «pan» para ἄρτος y no un término eclesiástico más técnico, porque el contexto es el acto del pan compartido.
  - Se prefirió «dar gracias» sobre «bendecir» porque el griego dice εὐχαριστήσας.
  - Se conservó el pasivo con «es dado» para no borrar la fuerza del participio διδόμενον.
  - Se tradujo ἀνάμνησις como «memoria» para mantener un español claro y compatible con el sentido memorial del texto.
  - Se empleó «Yahvé» según el estándar POB solo cuando corresponda al tetragrámaton; aquí no aparece ningún nombre divino explícito.
