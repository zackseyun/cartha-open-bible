translation:
  language: es
  text: 'Y les dijo: «¿Por qué están durmiendo? Levántense y oren, para que no entren en tentación[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prueba» o «tiempo de prueba». El término griego puede referirse a la tentación en el sentido de incitación al pecado, o más ampliamente a un tiempo de prueba.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  lexicon: BDAG
  rationale: En este interrogativo de reprensión, el español natural y fiel al valor pragmático es «¿Por qué?». «¿Qué?» sonaría poco idiomático y perdería la fuerza exhortativa de la pregunta.
- source_word: καθεύδετε
  english_pob_choice: are you sleeping
  chosen_spanish: están durmiendo
  alternatives_spanish:
  - duermen
  - están dormidos
  lexicon: BDAG
  rationale: El presente indicativo se expresa con una forma progresiva natural en español para comunicar la acción en curso. «Duermen» es posible, pero «están durmiendo» reproduce mejor la confrontación inmediata del contexto.
- source_word: ἀναστάντες
  english_pob_choice: Rise
  chosen_spanish: Levántense
  alternatives_spanish:
  - Levantaos
  - Pónganse de pie
  - Alzándose
  lexicon: BDAG
  rationale: El participio aoristo con valor imperatival funciona como una exhortación a ponerse de pie. «Levántense» conserva el tono formal y directo del mandato; «alzándose» sería demasiado literal y poco natural.
- source_word: προσεύχεσθε
  english_pob_choice: pray
  chosen_spanish: oren
  alternatives_spanish:
  - recen
  - estén orando
  lexicon: BDAG
  rationale: El imperativo plural se traduce con el verbo común y claro «orar» en registro eclesial amplio. «Recen» puede sonar más específicamente devocional/católico; «estén orando» enfatiza duración, pero no es necesario aquí.
- source_word: εἰσέλθητε εἰς
  english_pob_choice: enter into
  chosen_spanish: entren en
  alternatives_spanish:
  - entren dentro de
  - caigan en
  lexicon: BDAG
  rationale: La construcción con εἰς pide una dirección de entrada; en español «entrar en» mantiene esa imagen sin cargarla con redundancia. «Caigan en» interpretaría más que traducir.
- source_word: πειρασμόν
  english_pob_choice: temptation
  chosen_spanish: tentación
  alternatives_spanish:
  - prueba
  - tentación o prueba
  - ensayo
  lexicon: BDAG
  rationale: En el contexto inmediato de vigilancia y oración ante el peligro espiritual, «tentación» es la mejor opción principal. Se mantiene la amplitud semántica en nota para no cerrar indebidamente el término.
theological_decisions:
- issue: Sentido de πειρασμόν en la advertencia de Jesús
  english_pob_reading: temptation, with broader possibilities of testing or trial noted in a footnote
  chosen_spanish_reading: tentación, con posibilidad de prueba o examen
  alternative_spanish_readings:
  - prueba
  - examen
  - tentación o prueba
  rationale: La instrucción de Jesús apunta a evitar la caída espiritual en una situación de peligro; por eso «tentación» comunica mejor la advertencia pastoral. A la vez, se preserva en nota que el término griego también puede abarcar una prueba o un tiempo de examen, manteniendo la tensión lexical sin resolverla artificialmente.
  doctrine_reference: Preservar la amplitud semántica de πειρασμός; optimal equivalence
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del POB en inglés, que prefirió «Rise» frente a «Get up» por un registro ligeramente más formal y una correspondencia más cercana con ἀναστάντες. En español se refleja con «Levántense», que conserva ese matiz exhortativo y formal sin sonar forzado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma cuando aparezca el tetragrámaton; no aplica en este versículo.
  - Se usa «orar» en lugar de «rezar» para mantener coherencia con el registro eclesial amplio del proyecto.
  - Se conserva la distinción entre el mandato de levantarse y el de orar, sin añadir matices no presentes en el griego.
  - La nota sobre πειρασμόν preserva la tensión lexical documentada en el audit trail en vez de fijar un único sentido exclusivo.
