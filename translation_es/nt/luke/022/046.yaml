review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: la pregunta de reprensión «¿Por qué están durmiendo?» corresponde adecuadamente a Τί καθεύδετε; «Levántense y oren» transmite bien el participio imperatival ἀναστάντες seguido del imperativo προσεύχεσθε; y «para que no entren en tentación» conserva el sentido final de ἵνα μὴ εἰσέλθητε εἰς πειρασμόν. La nota sobre πειρασμόν también preserva la amplitud semántica documentada en el POB inglés.'
  spanish_quality_summary: 'El español principal es claro, natural y de registro digno. Sin embargo, la nota [a] en «les dijo[a]» no está justificada por el griego ni por el inglés auditado: αὐτοῖς ya queda plenamente expresado en «les», y la glosa «O “ustedes”» no aporta una alternativa textual ni resuelve una ambigüedad real en español. Además, en la nota léxica [b], «examen» suena menos natural que «prueba» o «prueba difícil» para πειρασμός en contexto bíblico.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «oren» para προσεύχεσθε y «tentación» para πειρασμόν son apropiados. La revisión propuesta solo elimina una nota innecesaria y ajusta la nota léxica para mejor legibilidad bíblica en español.
  issues:
  - severity: medium
    issue: La nota [a] «O “ustedes”» es innecesaria e infundada.
    rationale: El griego αὐτοῖς significa «a ellos / a ellos les», y el español «les dijo» ya lo expresa naturalmente. No hay una variante ni una alternativa de traducción significativa que justifique una nota al lector.
  - severity: low
    issue: La alternativa «examen» en la nota [b] suena poco idiomática en este contexto bíblico.
    rationale: Aunque puede captar la idea de prueba, en español eclesial general «prueba» o «tiempo de prueba» comunican mejor el rango semántico de πειρασμός que «examen».
  revised_spanish_text: 'Y les dijo: «¿Por qué están durmiendo? Levántense y oren, para que no entren en tentación[a]».'
  revised_footnotes:
  - marker: a
    text: O «prueba» o «tiempo de prueba». El término griego puede referirse a la tentación en el sentido de incitación al pecado, o más ampliamente a un tiempo de prueba.
    reason: lexical_alternative
  revision_rationale: Se elimina una nota sin base textual ni utilidad para el lector y se conserva la nota léxica importante sobre πειρασμός, ajustando su redacción a un español bíblico más natural.
