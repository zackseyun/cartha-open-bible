translation:
  language: es
  text: Y los hombres que lo retenían se burlaban de él mientras lo golpeaban[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los hombres que lo tenían bajo custodia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέχοντες
  english_pob_choice: were holding
  chosen_spanish: lo tenían bajo custodia
  alternatives_spanish:
  - lo retenían
  - lo mantenían detenido
  - lo sujetaban
  lexicon: BDAG
  rationale: El participio expresa aquí una custodia física concreta. En español, 'tener bajo custodia' comunica esa idea con naturalidad y evita tanto la vaguedad de 'tenerlo' como una especificación más técnica de prisión que el griego no exige.
- source_word: ἐνέπαιζον
  english_pob_choice: mocked
  chosen_spanish: se burlaban de él
  alternatives_spanish:
  - lo ridiculizaban
  - se mofaban de él
  - lo escarnecían
  lexicon: BDAG
  rationale: El verbo denota burla hostil. 'Se burlaban de él' es claro, idiomático y conserva el sentido despectivo sin endurecerlo más allá de lo que indica el griego.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: de él
  alternatives_spanish:
  - a él
  - contra él
  lexicon: BDAG
  rationale: Aunque el dativo permite un matiz de dirección o destinatario del escarnio, en español la burla se expresa naturalmente con 'burlarse de él'. Esto conserva el valor idiomático sin añadir una preposición impropia como 'a él'.
- source_word: δέροντες
  english_pob_choice: while beating him
  chosen_spanish: mientras lo golpeaban
  alternatives_spanish:
  - mientras lo azotaban
  - mientras lo apaleaban
  - golpeándolo
  lexicon: BDAG
  rationale: El participio describe una acción física acompañante. 'Golpeaban' conserva la amplitud del verbo griego sin especificar 'azotar', que sería demasiado preciso, ni elevar el registro con una expresión más literaria.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los guardias
  - los soldados
  lexicon: BDAG
  rationale: El griego dice simplemente 'hombres'. Se mantiene esa forma sin introducir un cargo u oficio que el texto no nombra.
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: La conjunción narrativa se reproduce con una 'Y' simple para mantener el flujo del relato sin añadir matiz temporal ajeno al original.
theological_decisions:
- issue: Identificación de los agresores
  english_pob_reading: the men who were holding him
  chosen_spanish_reading: los hombres que lo tenían bajo custodia
  alternative_spanish_readings:
  - los guardias que lo tenían bajo custodia
  - los hombres que lo retenían
  rationale: El texto griego emplea ἄνδρες, un término genérico. Aunque el contexto amplio sugiere custodios, la traducción no debe estrechar el referente a 'guardias' sin apoyo explícito del griego. 'Bajo custodia' comunica la situación sin exceder el dato textual.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: 'Se siguió el mismo juicio textual del audit trail inglés: mantener el referente genérico de ἄνδρες, traducir συνέχοντες con una idea de custodia física sin sobredeterminarla, y conservar el valor durativo de δέροντες con una perífrasis progresiva en español.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene 'los hombres' para ἄνδρες, evitando introducir 'guardias' o 'soldados'.
  - '''Se burlaban de él mientras lo golpeaban'' conserva la simultaneidad de los participios griegos y su tono narrativo sobrio.'
