translation:
  language: es
  text: 'Y ellos dijeron: «Señor, mira, aquí hay dos espadas». Y él les dijo: «Es suficiente[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Eso es suficiente»; posiblemente significa que la conversación debía terminar, no que dos espadas bastaran realmente.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ εἶπαν
  english_pob_choice: And they said
  chosen_spanish: Y ellos dijeron
  alternatives_spanish:
  - Entonces dijeron
  - Pero dijeron
  lexicon: BDAG
  rationale: δέ es un conector leve; en español, «Y» mantiene la continuidad narrativa sin cargar una oposición que el griego no exige.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Como vocativo dirigido a Jesús, «Señor» conserva el valor titular y la lectura eclesial habitual, sin perder la relación de respeto implícita en κύριος.
- source_word: ἰδοὺ
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - mira aquí
  - he aquí
  lexicon: BDAG
  rationale: El deíctico funciona aquí de modo coloquial y directo; «mira» reproduce esa fuerza con español natural. «He aquí» sería más arcaizante.
- source_word: μάχαιραι
  english_pob_choice: swords
  chosen_spanish: espadas
  alternatives_spanish:
  - cuchillos
  - dagas
  - espadas cortas
  lexicon: BDAG
  rationale: μάχαιρα puede referirse a un arma blanca; «espadas» sigue la convención española general sin sobreespecificar el tipo exacto de arma más allá de lo que el contexto exige.
- source_word: ὧδε δύο
  english_pob_choice: here are two
  chosen_spanish: aquí hay dos
  alternatives_spanish:
  - aquí, dos
  - dos aquí
  lexicon: BDAG
  rationale: La construcción comunica presencia localizada. En español, «aquí hay dos» integra de manera natural el adverbio y el numeral.
- source_word: Ἱκανόν ἐστιν
  english_pob_choice: It is enough
  chosen_spanish: Es suficiente
  alternatives_spanish:
  - Basta
  - Es bastante
  - Eso es suficiente
  lexicon: BDAG
  rationale: ἱκανός puede significar «suficiente» o «bastante». «Es suficiente» conserva la ambigüedad básica de la respuesta y evita resolver si Jesús evalúa la cantidad de espadas o pone fin a la conversación.
theological_decisions:
- issue: Ambigüedad interpretativa de la respuesta de Jesús, Ἱκανόν ἐστιν
  english_pob_reading: It is enough
  chosen_spanish_reading: Es suficiente
  alternative_spanish_readings:
  - Eso es suficiente
  - Basta
  - Es bastante
  rationale: El griego permite tanto una valoración literal de suficiencia como un cierre abrupto del diálogo. La redacción principal deja abierta esa tensión, en consonancia con la filosofía de la POB de preservar ambigüedades relevantes en vez de resolverlas por adelantado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto griego y el control inglés concuerdan de forma alta; no hubo revisiones textuales en el pasaje. La decisión principal es mantener la ambigüedad de Ἱκανόν ἐστιν en español con una nota alternativa equivalente a la del inglés.
  spanish_consistency_notes:
  - Se usa «Señor» para Κύριε según la terminología habitual del proyecto para κύριος aplicado a Jesús.
  - Se evita «he aquí» en el cuerpo principal para conservar un registro moderno y claro.
  - «Espadas» mantiene la generalidad de μάχαιραι sin introducir «dagas» o «cuchillos», que serían más restrictivos.
  - La nota al pie conserva la tensión entre suficiencia literal y cierre de la conversación, alineada con la nota inglesa.
