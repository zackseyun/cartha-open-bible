- from: Así que fueron y hallaron todo tal como les había dicho[a], y prepararon la Pascua.
  to: Así que fueron y hallaron tal como les había dicho, y prepararon la Pascua[a].
  rationale: Se elimina «todo» para evitar una ampliación no presente en el griego. También se reubica la marca de nota sobre «la Pascua», que es donde realmente aplica la alternativa léxica documentada para πάσχα; anclarla en «dicho» desorienta al lector sobre el alcance de la nota.
