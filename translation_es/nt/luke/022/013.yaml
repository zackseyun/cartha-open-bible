translation:
  language: es
  text: Así que fueron y hallaron tal como les había dicho, y prepararon la Pascua[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cena de Pascua» o «el cordero de Pascua». El término griego puede referirse en sentido amplio a la celebración de la Pascua o, más específicamente, a su comida o a sus elementos sacrificiales.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπελθόντες
  english_pob_choice: they went
  chosen_spanish: fueron
  alternatives_spanish:
  - habiendo ido
  - después de ir
  lexicon: BDAG
  rationale: El participio aoristo funciona de manera adverbial antes del verbo principal. En español, un verbo finito en secuencia narrativa suena más natural que una construcción participial pesada, y conserva el avance temporal.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - y
  - ahora
  - pero
  lexicon: BDAG
  rationale: δέ aquí enlaza la narración y marca continuación lógica. «Así que» expresa bien la respuesta a las instrucciones previas sin cargar contraste.
- source_word: εὗρον
  english_pob_choice: found it
  chosen_spanish: hallaron todo
  alternatives_spanish:
  - hallaron
  lexicon: BDAG
  rationale: El verbo significa «hallaron». En contexto, el resultado encontrado no es un objeto aislado sino todo el arreglo esperado; «todo» ayuda a mantener el sentido contextual sin sobreespecificar el referente.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - exactamente como
  lexicon: BDAG
  rationale: καθώς introduce correspondencia exacta entre lo dicho antes y lo encontrado. «Tal como» comunica esa correspondencia con naturalidad en español.
- source_word: εἰρήκει αὐτοῖς
  english_pob_choice: he had told them
  chosen_spanish: les había dicho
  alternatives_spanish:
  - les había hablado
  - les había dicho a ellos
  lexicon: BDAG
  rationale: El pluscuamperfecto de λέγω señala una palabra previa con vigencia en la escena. «Les había dicho» es idiomático y fiel al tono de instrucción previa.
- source_word: ἡτοίμασαν
  english_pob_choice: they prepared
  chosen_spanish: prepararon
  alternatives_spanish:
  - dejaron listo
  - hicieron los preparativos
  lexicon: BDAG
  rationale: El verbo denota la acción de preparar. «Prepararon» es conciso y exacto.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la cena de Pascua
  - el cordero de Pascua
  lexicon: BDAG
  rationale: πάσχα puede referirse a la Pascua en sentido amplio, a la comida o a los elementos sacrificiales. En el texto principal se conserva la amplitud con «la Pascua», sin estrechar el término más de lo que permite el griego.
theological_decisions:
- issue: Alcance de πάσχα
  english_pob_reading: the Passover
  chosen_spanish_reading: la Pascua
  alternative_spanish_readings:
  - la cena de Pascua
  - el cordero de Pascua
  rationale: El contexto sugiere preparación para la celebración y la comida, pero el término griego es más amplio. Mantener «la Pascua» preserva esa tensión y evita cerrar indebidamente el sentido.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El texto español sigue el sentido y la estructura del registro inglés auditado, sin cambios de revisión relevantes: el paralelo con el griego es alto y la traducción base ya fue confirmada como estable.'
  spanish_consistency_notes:
  - Se usa «Pascua» para πάσχα, manteniendo la amplitud semántica del término.
  - Se evita «SEÑOR» porque aquí no aparece el nombre divino ni κύριος.
  - La secuencia verbal en español conserva la progresión narrativa sin forzar un participio literal.
  - El marcador de nota al pie [a] está anclado en «Pascua» para señalar la amplitud semántica.
