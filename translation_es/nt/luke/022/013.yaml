review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: ἀπελθόντες... εὗρον... καὶ ἡτοίμασαν se refleja naturalmente como «fueron... hallaron... y prepararon». «Tal como les había dicho» representa fielmente καθὼς εἰρήκει αὐτοῖς. Sin embargo, «hallaron todo» añade un alcance no expresado en εὗρον; el inglés auditado solo suple un objeto implícito mínimo («it»), y en español puede mantenerse sin añadir «todo».'
  spanish_quality_summary: El español es claro y natural. No obstante, «hallaron todo tal como...» suena algo cargado y la adición de «todo» no mejora la legibilidad de manera suficiente para justificar el matiz extra. «Encontraron todo tal como...» sería más coloquial, pero «hallaron tal como...» preserva mejor la concisión del original. El resto del verso y la nota son adecuados y de tono eclesial legible.
  glossary_alignment: «La Pascua» alinea bien con la decisión del POB para πάσχα y conserva la amplitud semántica, con nota alternativa bien formulada. No hay conflictos con la terminología base del proyecto.
  issues:
  - severity: medium
    issue: Adición de «todo» en «hallaron todo tal como les había dicho»
    rationale: El griego εὗρον no incluye un objeto equivalente a «todo». Aunque el contexto permite suplir algo implícito, «todo» amplía innecesariamente el referente y puede sugerir exhaustividad no explicitada. Conviene omitirlo para conservar mejor la economía del original.
  revised_spanish_text: Así que fueron y hallaron tal como les había dicho, y prepararon la Pascua[a].
  revised_footnotes:
  - marker: a
    text: O «la cena de Pascua» o «el cordero de Pascua». El término griego puede referirse en sentido amplio a la celebración de la Pascua o, más específicamente, a su comida o a sus elementos sacrificiales.
    reason: alternative_reading
  revision_rationale: Se elimina «todo» para evitar una ampliación no presente en el griego. También se reubica la marca de nota sobre «la Pascua», que es donde realmente aplica la alternativa léxica documentada para πάσχα; anclarla en «dicho» desorienta al lector sobre el alcance de la nota.
