translation:
  language: es
  text: Ahora también surgió entre ellos una disputa acerca de cuál de ellos se consideraba[a] mayor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parecía ser mayor». El verbo griego puede significar «parecer» o «ser considerado».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο
  english_pob_choice: arose
  chosen_spanish: surgió
  alternatives_spanish:
  - se produjo
  - apareció
  - ocurrió
  lexicon: BDAG
  rationale: γίνομαι introduce el surgimiento de una situación; «surgió» expresa bien el comienzo del conflicto en español sin sonar mecánico.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  - Entonces
  lexicon: BDAG
  rationale: δέ marca transición narrativa; «Ahora» funciona como enlace natural en español sin cargar contraste excesivo.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - inclusive
  - y
  lexicon: BDAG
  rationale: καί añade este episodio al relato previo; «también» conserva el valor aditivo.
- source_word: φιλονεικία
  english_pob_choice: dispute
  chosen_spanish: disputa
  alternatives_spanish:
  - contienda
  - riña
  - rivalidad
  lexicon: BDAG
  rationale: φιλονεικία denota una controversia competitiva o contenciosa; «disputa» es claro y fiel al contexto inmediato de rivalidad por posición.
- source_word: ἐν αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - dentro de ellos
  lexicon: BDAG
  rationale: La relación es social/comunitaria dentro del grupo; «entre ellos» es la equivalencia natural en español.
- source_word: τὸ τίς αὐτῶν
  english_pob_choice: as to which of them
  chosen_spanish: acerca de cuál de ellos
  alternatives_spanish:
  - en cuanto a cuál de ellos
  - sobre cuál de ellos
  - respecto de cuál de ellos
  lexicon: BDAG
  rationale: El artículo τὸ introduce el contenido del desacuerdo; «acerca de cuál de ellos» conserva esa función nominalizadora y suena idiomático.
- source_word: δοκεῖ
  english_pob_choice: was considered
  chosen_spanish: se consideraba
  alternatives_spanish:
  - parecía
  - era tenido por
  - se pensaba
  lexicon: BDAG
  rationale: δόκέω aquí apunta a una evaluación de estatus dentro del grupo; el reflexivo impersonal «se consideraba» refleja bien la idea de estimación social sin añadir juicio externo.
- source_word: εἶναι
  english_pob_choice: to be
  chosen_spanish: ser
  alternatives_spanish:
  - estar
  lexicon: BDAG
  rationale: El infinitivo complementa a δοκεῖ; en español, «ser» expresa naturalmente la cualidad de rango o grandeza comparativa.
- source_word: μείζων
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más grande
  - superior
  - el mayor
  lexicon: BDAG
  rationale: μείζων es comparativo, no superlativo; «mayor» conserva la forma comparativa y evita intensificar el sentido a «el mayor».
theological_decisions:
- issue: Comparativo de estatus entre los discípulos
  english_pob_reading: greater
  chosen_spanish_reading: mayor
  alternative_spanish_readings:
  - el mayor
  - más importante
  rationale: El griego usa el comparativo μείζων. Mantener «mayor» preserva la tensión del texto y no convierte el comparativo en superlativo.
  doctrine_reference: 'Principio POB: primacía del original y preservación de matices gramaticales; no resolver ni intensificar la comparación más allá de la evidencia textual.'
translation_notes:
  revision_awareness: Tomé como base la revisión más reciente del audit trail inglés, que prefirió una formulación más formal para τὸ τίς («as to which»). En español, «acerca de cuál de ellos» busca conservar esa formalidad sin perder naturalidad. También se preservó el comparativo μείζων como «mayor», evitando la tendencia a suavizarlo en un superlativo.
  spanish_consistency_notes:
  - Se mantuvo «disputa» para φιλονεικία, coherente con el valor de contienda competitiva del término.
  - Se tradujo δοκεῖ con «se consideraba» para reflejar estimación social, no mera apariencia.
  - Se evitó «el mayor» para no sobretraducir el comparativo griego.
  - La nota al pie se ancla en «disputa» y aclara la alternativa semántica de δοκεῖ en el contexto.
