lexical_decisions:
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: se le apareció
  alternatives_spanish:
  - fue visto
  - se manifestó
  lexicon: BDAG
  rationale: En este giro de aparición, el pasivo aoristo funciona como fórmula de manifestación. «Se le apareció» comunica la escena de manera natural en español y mantiene la idea de aparición dirigida a él mejor que un calco como «fue visto».
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ marca avance narrativo. «Entonces» conserva ese movimiento temporal en español sin añadir contraste que el griego no exige.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: se le
  alternatives_spanish:
  - a él
  - para él
  lexicon: BDAG
  rationale: Con ὤφθη, el dativo señala la persona a quien se aparece. En español, la construcción pronominal «se le apareció» es la forma más natural para expresar esa dirección.
- source_word: ἄγγελος
  english_pob_choice: an angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un mensajero
  lexicon: BDAG
  rationale: El contexto celestial descarta la lectura general «mensajero». «Un ángel» preserva el sentido claro del término en esta escena.
- source_word: ἀπ’ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  lexicon: BDAG
  rationale: La frase indica procedencia celestial. «Del cielo» es idiomático en español bíblico y conserva la referencia teológica sin volverla arcaica.
- source_word: ἐνισχύων
  english_pob_choice: strengthening
  chosen_spanish: fortaleciéndolo
  alternatives_spanish:
  - dándole fuerzas
  - animándolo
  lexicon: BDAG
  rationale: El participio expresa acción concomitante y señala refuerzo real, no solo consuelo emocional. «Fortaleciéndolo» conserva la fuerza verbal y el matiz de apoyo activo.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El objeto directo refiere a Jesús; en español se expresa con el clítico masculino singular «lo» dentro de la perífrasis participial.
theological_decisions:
- issue: Estado textual de Lucas 22:43
  english_pob_reading: Include the verse in the main text as represented in the provided SBLGNT source, with a note that some manuscripts omit verses 43–44.
  chosen_spanish_reading: Incluir el versículo en el texto principal según el SBLGNT provisto, con una nota que indique que algunos manuscritos omiten los versículos 43–44.
  alternative_spanish_readings:
  - Omitir el versículo en el cuerpo principal por su duda textual.
  - Incluirlo sin nota textual.
  rationale: El encargo entrega explícitamente el texto griego del versículo, así que debe traducirse. Al mismo tiempo, la evidencia textual requiere transparencia; la nota evita ocultar la variante importante sin decidirla dogmáticamente.
  doctrine_reference: Preservar la tensión textual y documentar variantes manuscritas relevantes.
translation_notes:
  revision_awareness: Se mantuvo la lectura del SBLGNT provisto y la decisión inglesa de incluir el versículo en el texto principal, conservando la advertencia textual sobre la omisión en algunos manuscritos.
  spanish_consistency_notes:
  - Se usó «cielo» para ἀπ’ οὐρανοῦ según la costumbre bíblica en español y la decisión inglesa «from heaven».
  - Se evitó «mensajero» porque el contexto es claramente celestial y exige «ángel».
  - Se prefirió la construcción pronominal natural «se le apareció» para reflejar la fórmula de aparición sin perder el dativo direccional.
  - «Fortaleciéndolo» mantiene el participio concurrente y la idea de impartir fuerza, en línea con «strengthening him».
