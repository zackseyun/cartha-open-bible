    changes_summary: Replaced 'council chamber' with 'Sanhedrin' to reflect συνέδριον more accurately here as the governing council rather than a physical room; retained the rest as accurate and natural.
translation:
  language: es
  text: Y cuando llegó el día[a], se reunió el consejo de los ancianos del pueblo, tanto los principales sacerdotes como los escribas, y lo llevaron al Sanedrín[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando se hizo de día» o «al amanecer».
    reason: lexical_alternative
  - marker: b
    text: O «ante su consejo» o «a su consejo». El griego usa συνέδριον, que puede referirse al consejo mismo o a su sesión formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ἐγένετο ἡμέρα
  english_pob_choice: when day came
  chosen_spanish: cuando llegó el día
  alternatives_spanish:
  - al amanecer
  - cuando se hizo de día
  lexicon: BDAG
  rationale: La construcción griega expresa el inicio del día con un giro narrativo natural; en español, «cuando llegó el día» conserva ese valor temporal sin sonar rígido ni añadir interpretación innecesaria.
- source_word: συνήχθη
  english_pob_choice: gathered together
  chosen_spanish: se reunió
  alternatives_spanish:
  - se congregó
  - se juntó
  lexicon: BDAG
  rationale: El pasivo indica que el grupo fue convocado o se juntó como cuerpo. «Se reunió» comunica bien la acción colectiva en español bíblico moderno y evita un calco pesado.
- source_word: τὸ πρεσβυτέριον τοῦ λαοῦ
  english_pob_choice: the council of the elders of the people
  chosen_spanish: el consejo de los ancianos del pueblo
  alternatives_spanish:
  - la asamblea de los ancianos del pueblo
  - el cuerpo de ancianos del pueblo
  lexicon: BDAG
  rationale: πρεσβυτέριον designa un cuerpo institucional de ancianos; «consejo» conserva la idea de un órgano deliberativo y «ancianos» traduce con transparencia el contenido del grupo.
- source_word: ἀρχιερεῖς τε καὶ γραμματεῖς
  english_pob_choice: both chief priests and scribes
  chosen_spanish: tanto los principales sacerdotes como los escribas
  alternatives_spanish:
  - los principales sacerdotes y los escribas
  - tanto los sumos sacerdotes como los escribas
  lexicon: BDAG
  rationale: La correlación τε καί se refleja bien con «tanto... como...». «Principales sacerdotes» mantiene la referencia institucional sin imponer una equivalencia más técnica que el contexto no exige.
- source_word: ἀπήγαγον
  english_pob_choice: they led him away
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo llevaron aparte
  lexicon: BDAG
  rationale: En español, el verbo «llevar» puede conservar el movimiento forzado o judicial del original sin exagerar la violencia. El complemento «al Sanedrín» aporta la dirección del traslado.
- source_word: εἰς τὸ συνέδριον αὐτῶν
  english_pob_choice: into their Sanhedrin
  chosen_spanish: al Sanedrín
  alternatives_spanish:
  - ante su consejo
  - a su consejo
  lexicon: BDAG
  rationale: Siguiendo la revisión inglesa, συνέδριον se vierte aquí como el nombre institucional «Sanedrín», ya asentado en español bíblico; en este contexto evita repetir «consejo» y refleja el cuerpo gobernante al que es conducido Jesús.
theological_decisions:
- issue: Distinción entre πρεσβυτέριον y συνέδριον
  english_pob_reading: Differentiate them as 'the council of the elders' and 'their Sanhedrin'
  chosen_spanish_reading: Distinguir entre «el consejo de los ancianos del pueblo» y «el Sanedrín»
  alternative_spanish_readings:
  - traducir ambos como «consejo»
  - verter συνέδριον como «consejo»
  rationale: El verso usa dos términos relacionados pero no idénticos. Mantener la distinción en español preserva la variación léxica del griego y evita aplanar el texto en una sola palabra.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó una lectura espacial por «Sanhedrin» para reflejar con mayor precisión συνέδριον como el órgano gobernante. La versión española sigue esa decisión, manteniendo además la distinción con πρεσβυτέριον.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece ningún sustituto del nombre divino en el verso.
  - «Sanedrín» se usa como nombre institucional, coherente con el ajuste de la revisión inglesa y con el uso español bíblico.
  - «Principales sacerdotes» conserva el referente del grupo sacerdotal sin forzar una terminología más técnica que el contexto inmediato no requiere.
