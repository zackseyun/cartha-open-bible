  text: Καὶ ὡς ἐγένετο ἡμέρα, συνήχθη τὸ πρεσβυτέριον τοῦ λαοῦ, ἀρχιερεῖς ⸀τε καὶ γραμματεῖς, καὶ ⸀ἀπήγαγον αὐτὸν εἰς τὸ συνέδριον αὐτῶν,
base_translation:
  language: en
  yaml_path: translation/nt/luke/022/066.yaml
  text: And when day came[a], the council of the elders of the people gathered together, both chief priests and scribes, and they led him away into their Sanhedrin[b],
  footnotes:
  - marker: a
    text: Or 'when it became day' or 'at daybreak.'
    reason: lexical_alternative
  - marker: b
    text: Or 'into their council' or 'before their council.' The Greek uses συνέδριον, which can refer to the council itself or its formal meeting/place.
    reason: lexical_alternative
  ai_draft:
