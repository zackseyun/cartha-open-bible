review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del griego: finalidad con «para que», comida de mesa en el reino, y entronización con función judicial sobre las doce tribus de Israel. También preserva correctamente la tensión semántica de κρίνοντες con «juzgando» y una nota con alternativas. Sin embargo, hay dos detalles de forma que conviene corregir para mayor fidelidad y naturalidad: «se sentarán» es menos directo que el simple «se sentarán/ustedes se sentarán» pero sigue siendo aceptable; el problema principal es la nota [a], que está anclada a «reino» aunque su contenido corresponde a «juzgando».'
  spanish_quality_summary: El español es claro y legible, pero la colocación de la nota al pie crea confusión semántica. Además, «se sentarán en tronos» suena bien; el resto del verso es natural y digno. Conviene mover la nota al término «juzgando» para que el lector entienda que las alternativas pertenecen a κρίνοντες, no a «reino».
  glossary_alignment: No hay conflicto con la terminología del proyecto. «reino» para βασιλεία y «juzgando» para κρίνοντες están bien elegidos. La alternativa en nota también es adecuada, aunque «rigiendo» es algo menos común que «gobernando»; puede mantenerse por cercanía semántica.
  issues:
  - severity: high
    issue: La nota [a] está colocada en «mi reino[a]», pero su contenido explica «juzgando».
    rationale: Esto desaline­a la evidencia léxica y teológica documentada. El lector puede pensar erróneamente que «gobernando/rigiendo» son alternativas para «reino» en vez de para κρίνοντες.
  - severity: low
    issue: El texto usa «se sentarán», que es correcto, pero en este contexto «se sentarán en tronos» puede mantenerse sin problema; no requiere cambio adicional.
    rationale: No es un error de fidelidad, solo una observación de estilo. La forma futura pronominal es normal en español bíblico y moderno.
  revised_spanish_text: para que coman y beban en mi mesa en mi reino, y se sentarán en tronos juzgando[a] a las doce tribus de Israel.
