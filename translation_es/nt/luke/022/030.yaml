translation:
  language: es
  text: para que coman y beban en mi mesa en mi reino, y se sentarán en tronos juzgando[a] a las doce tribus de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gobernando» o «rigiendo» a las doce tribus de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: ἵνα introduce aquí una finalidad o resultado esperado; en español, «para que» expresa con naturalidad ese valor telico sin perder la relación con la promesa anterior.
- source_word: ἔσθητε
  english_pob_choice: you may eat
  chosen_spanish: coman
  alternatives_spanish:
  - puedan comer
  - que coman
  lexicon: BDAG
  rationale: El subjuntivo en una cláusula con finalidad se vierte naturalmente con «coman»; mantiene el sentido de posibilidad/propósito sin sonar forzado.
- source_word: πίνητε
  english_pob_choice: drink
  chosen_spanish: beban
  alternatives_spanish:
  - puedan beber
  - que beban
  lexicon: BDAG
  rationale: Se coordina con el verbo anterior y conserva el paralelismo verbal; el subjuntivo español mantiene la fuerza de la finalidad.
- source_word: ἐπὶ τῆς τραπέζης μου
  english_pob_choice: at my table
  chosen_spanish: en mi mesa
  alternatives_spanish:
  - a mi mesa
  - junto a mi mesa
  lexicon: BDAG
  rationale: Aunque ἐπί con genitivo puede sugerir «sobre/en la mesa», en español «en mi mesa» comunica mejor la comida compartida y la imagen de comunión de mesa.
- source_word: ἐν τῇ βασιλείᾳ μου
  english_pob_choice: in my kingdom
  chosen_spanish: en mi reino
  alternatives_spanish:
  - en mi realeza
  - en mi gobierno
  lexicon: BDAG
  rationale: βασιλεία aquí señala el ámbito o esfera real; «reino» es la forma más clara y natural en español, preservando la referencia al dominio real de Jesús.
- source_word: καθήσεσθε
  english_pob_choice: you will sit
  chosen_spanish: se sentarán
  alternatives_spanish:
  - se sentarán ustedes
  - ustedes se sentarán
  lexicon: BDAG
  rationale: El futuro de κάθημαι se expresa de modo directo con «se sentarán», manteniendo la imagen de entronización sin añadir matices innecesarios.
- source_word: ἐπὶ θρόνων
  english_pob_choice: on thrones
  chosen_spanish: en tronos
  alternatives_spanish:
  - sobre tronos
  lexicon: BDAG
  rationale: «En tronos» es una colocación natural en español para indicar posición entronizada; conserva la imaginería real y judicial de θρόνος.
- source_word: κρίνοντες
  english_pob_choice: judging
  chosen_spanish: juzgando
  alternatives_spanish:
  - gobernando
  - rigiendo
  lexicon: BDAG
  rationale: κρίνω significa primariamente «juzgar». Se mantiene ese sentido en español para no diluir la fuerza judicial del pasaje, aunque el verbo pueda implicar gobierno o administración.
- source_word: τὰς δώδεκα φυλὰς τοῦ Ἰσραήλ
  english_pob_choice: the twelve tribes of Israel
  chosen_spanish: a las doce tribus de Israel
  alternatives_spanish:
  - las doce tribus de Israel
  lexicon: BDAG
  rationale: El acusativo con el participio de juicio se refleja naturalmente con el objeto directo en español «a las doce tribus de Israel», conservando la referencia pactual a Israel.
theological_decisions:
- issue: Alcance de κρίνοντες aplicado a las doce tribus de Israel
  english_pob_reading: Retain the judicial language 'judging' without narrowing it to either condemnation only or administrative rule only.
  chosen_spanish_reading: Mantener «juzgando» sin reducirlo ni a condena solamente ni a gobierno solamente.
  alternative_spanish_readings:
  - gobernando a las doce tribus de Israel
  - rigiendo a las doce tribus de Israel
  rationale: El griego κρίνω puede abarcar juicio y también matices de autoridad gobernante. La traducción principal conserva el valor judicial explícito, y las alternativas quedan como posibles extensiones semánticas sin resolver la tensión del original.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta propuesta mantiene la misma decisión básica del audit trail inglés y la adapta a un español natural y público.
  spanish_consistency_notes:
  - Se mantiene «reino» para βασιλεία, en línea con el valor de esfera real del pasaje.
  - Se conserva «juzgando» como equivalente principal de κρίνοντες para no desplazar el matiz judicial.
  - La construcción «en mi mesa» comunica la comensalidad de forma idiomática en español sin perder la imagen de la mesa del rey.
  - El objeto directo «a las doce tribus de Israel» refleja con naturalidad el participio de juicio y la referencia pactual.
