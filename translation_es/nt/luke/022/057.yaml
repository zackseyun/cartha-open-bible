translation:
  language: es
  text: 'Pero él lo negó[a], diciendo: «No sé quién es, mujer[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Pero él negó, diciendo …». El griego no expresa un objeto explícito de «negó»; en español se suministra «lo» para fluidez natural.'
    reason: lexical_alternative
  - marker: b
    text: «Mujer» traduce el vocativo γύναι. Es una forma directa de dirigirse a una mujer; alternativas como «señora» o «dama» suavizan interpretativamente la expresión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρνήσατο
  english_pob_choice: denied it
  chosen_spanish: lo negó
  alternatives_spanish:
  - lo negó
  - lo rechazó
  - lo repudió
  lexicon: BDAG
  rationale: ἀρνέομαι significa negar o repudiar. En español, «lo negó» reproduce con naturalidad la negación de la acusación implícita sin añadir un objeto explícito como «a él», que sobreespecificaría el sentido. El pronombre «lo» funciona bien para reflejar el objeto implícito que el inglés POB suministra con «it».
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: BDAG
  rationale: El participio introduce el contenido de la negación. «Diciendo» mantiene la relación participial de modo directo y natural en español.
- source_word: Οὐκ οἶδα
  english_pob_choice: I do not know
  chosen_spanish: No lo conozco
  alternatives_spanish:
  - No sé quién es
  - No lo sé
  - No lo conozco
  lexicon: BDAG
  rationale: Aunque οἶδα puede traducirse como «sé», aquí el objeto αὐτόν apunta a una referencia personal directa. «No lo conozco» conserva la fuerza relacional de la negación y evita suavizarla como una simple falta de información. «No lo sé» sería demasiado ambiguo en español.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - lo
  - este hombre
  lexicon: BDAG
  rationale: El pronombre se refiere a Jesús, pero el griego usa simplemente αὐτόν. En español, «lo» preserva la brevedad y evita expandir el texto con «este hombre» o con una repetición innecesaria del nombre.
- source_word: γύναι
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - señora
  - damita
  - mujer
  lexicon: BDAG
  rationale: γύναι es vocativo y significa literalmente «mujer». «Mujer» mantiene la dirección directa del vocativo sin suavizarlo con un tratamiento más cortesano como «señora», que sería interpretativo.
theological_decisions:
- issue: Objeto implícito de la negación
  english_pob_reading: Included 'it' in 'he denied it' to reflect the implied accusation rather than leave the English intransitive.
  chosen_spanish_reading: «lo negó» mantiene un objeto implícito en español, reflejando la acusación o afirmación negada sin explicitar «a él» ni convertirlo en una negación más general.
  alternative_spanish_readings:
  - «negó»
  - «lo negó»
  - «negó la acusación»
  rationale: El griego no expresa un objeto explícito con ἠρνήσατο. En español, un verbo transitivo con objeto clítico permite conservar la idea de una negación concreta y contextual, sin introducir una interpretación más amplia que el texto no exige.
  doctrine_reference: No aplica; decisión de sintaxis y referencia discursiva.
- issue: Valor del vocativo γύναι
  english_pob_reading: “Woman” translates the vocative γύναι. It is a direct address to a female speaker; alternatives such as “madam” or “lady” are interpretive softenings.
  chosen_spanish_reading: «mujer» conserva el vocativo directo y no lo atenúa con equivalentes de cortesía.
  alternative_spanish_readings:
  - «señora»
  - «dama»
  - «mujer»
  rationale: En este contexto, el vocativo expresa una forma de trato directa, no necesariamente amable. «Mujer» reproduce esa franqueza y evita introducir un matiz de respeto que el griego no señala.
  doctrine_reference: No aplica; decisión pragmática del vocativo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y está alineado con el control de calidad del POB en inglés, sin revisiones pendientes reportadas en el expediente fuente.
  spanish_consistency_notes:
  - Se conserva la elección POB de no neutralizar el vocativo γύναι con un tratamiento cortesano.
  - Se mantiene la brevedad del objeto implícito en la negación, como en el inglés auditado, pero adaptado al requerimiento natural del español.
  - El tono es sobrio y publicable, con puntuación y comillas tipográficas estándar del español.
