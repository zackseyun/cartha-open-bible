review_pass:
  verdict: revise
  source_alignment_summary: 'La base del borrador sigue bien la estructura del griego: «Pero él dijo», «Te digo, Pedro», «hoy», «el gallo», «hasta que», «tres veces». Sin embargo, falla en el punto más importante del complemento εἰδέναι. El griego dice que Pedro negará conocer a Jesús; «diciendo que me conoces» invierte el sentido y afirma conocimiento en vez de negarlo. La nota alternativa repite el mismo error semántico.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la cláusula final resulta incorrecta y poco natural. En español bíblico natural, «hasta que niegues tres veces que me conoces» o «hasta que niegues tres veces conocerme» expresa mejor el contenido de la negación. El resto del versículo fluye bien.
  glossary_alignment: No hay términos del glosario mayor en juego. «Pedro» y «gallo» son adecuados. La revisión necesaria es semántica, no de terminología del proyecto.
  issues:
  - severity: high
    issue: La frase «diciendo que me conoces» contradice εἰδέναι dentro del acto de negación.
    rationale: El original no dice que Pedro dirá que sí conoce a Jesús, sino que negará conocerlo. La redacción actual invierte el significado central del versículo.
  - severity: medium
    issue: La nota al pie alternativa conserva el mismo error semántico.
    rationale: La alternativa «antes de que me niegues tres veces, diciendo que me conoces» sigue afirmando conocimiento en lugar de negarlo.
  - severity: low
    issue: La formulación española puede simplificarse para mayor naturalidad.
    rationale: «Niegues tres veces que me conoces» reproduce bien el sentido y suena más idiomático que una construcción con «diciendo».
  revised_spanish_text: 'Pero él dijo[a]: «Te digo, Pedro, que no cantará hoy el gallo hasta que niegues tres veces que me conoces».

    '
