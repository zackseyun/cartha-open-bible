revisions:
- from: 'Pero él dijo[a]: «Te digo, Pedro, que no cantará hoy el gallo hasta que me niegues tres veces, diciendo que me conoces».'
  to: 'Pero él dijo[a]: «Te digo, Pedro, que no cantará hoy el gallo hasta que niegues tres veces que me conoces».'
  rationale: 'Se corrige la cláusula final para reflejar fielmente el griego με ἀπαρνήσῃ εἰδέναι: Pedro negará conocer a Jesús. «Hasta que niegues tres veces que me conoces» conserva el contenido explícito del infinitivo εἰδέναι, evita invertir el sentido y mantiene un español claro y natural. La nota alternativa se ajusta del mismo modo.'
