translation:
  language: es
  text: 'Pero él dijo[a]: «Te digo, Pedro, que no cantará hoy el gallo hasta que niegues tres veces que me conoces».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el gallo no cantará hoy antes de que niegues tres veces que me conoces».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ εἶπεν
  english_pob_choice: But he said
  chosen_spanish: Pero él dijo
  alternatives_spanish:
  - Y él dijo
  - Entonces él dijo
  lexicon: δέ / λέγω
  rationale: δέ es levemente contrastivo o continuativo; «Pero» preserva el giro del diálogo. Se explicita «él» para una referencia natural en español sin añadir contenido nuevo.
- source_word: Λέγω σοι
  english_pob_choice: I tell you
  chosen_spanish: Te digo
  alternatives_spanish:
  - Te digo esto
  - Yo te digo
  lexicon: BDAG / λέγω
  rationale: La fórmula directa es natural en español y conserva el valor discursivo del presente de λέγω. «Te digo» comunica la inmediatez y solemnidad sin calco innecesario.
- source_word: Πέτρε
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Simón Pedro
  lexicon: nombre propio
  rationale: El nombre personal se vierte al español habitual del texto bíblico. «Pedro» corresponde directamente a Πέτρος en este contexto.
- source_word: φωνήσει
  english_pob_choice: will crow
  chosen_spanish: cantará
  alternatives_spanish:
  - correrá su canto
  - hará oír su canto
  lexicon: BDAG / φωνέω
  rationale: Con ἀλέκτωρ como sujeto, el sentido idiomático es el canto del gallo. En español, «cantará» es más natural y preciso que «hará sonido» o «sonará».
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: BDAG / σήμερον
  rationale: «Hoy» es el equivalente temporal directo, claro y natural en español contemporáneo.
- source_word: ἀλέκτωρ
  english_pob_choice: a rooster
  chosen_spanish: el gallo
  alternatives_spanish:
  - un gallo
  lexicon: BDAG / ἀλέκτωρ
  rationale: Aunque el griego es anartro, en español el referente es específico y conocido; «el gallo» fluye mejor en la frase proverbial y mantiene el sentido ordinario del animal.
- source_word: ἕως τρίς
  english_pob_choice: until you deny three times
  chosen_spanish: hasta que me niegues tres veces
  alternatives_spanish:
  - antes de que me niegues tres veces
  - hasta que me hayas negado tres veces
  lexicon: BDAG / ἕως / τρίς
  rationale: «Hasta que» conserva la estructura temporal del griego. Se mantiene «tres veces» como equivalente natural de τρίς, sin arcaísmo.
- source_word: με ἀπαρνήσῃ εἰδέναι
  english_pob_choice: you deny ... that you know me
  chosen_spanish: me niegues... diciendo que me conoces
  alternatives_spanish:
  - niegues saber de mí
  - niegues conocerme
  lexicon: BDAG / ἀπαρνέομαι / οἶδα
  rationale: 'El infinitivo εἰδέναι especifica el contenido de la negación: no solo repudiar, sino negar relación/conocimiento. «Diciendo que me conoces» preserva esa idea en un español natural; «conocerme» y «saber de mí» son alternativas posibles, pero menos explícitas respecto al acto verbal de negación.'
theological_decisions:
- issue: Forma exacta de la negación prevista
  english_pob_reading: 'Render the denial specifically as denying knowledge of Jesus: ''until you deny three times that you know me.'''
  chosen_spanish_reading: «hasta que me niegues tres veces, diciendo que me conoces»
  alternative_spanish_readings:
  - «hasta que me niegues tres veces que me conoces»
  - «hasta que niegues tres veces conocerme»
  rationale: La gramática griega incluye εἰδέναι, que no debe desaparecer. La versión española explicita el contenido del acto de negar sin volverlo más teológico de lo que el texto exige. Así se preserva la tensión entre la negación de la relación personal y la formulación verbal del acto.
  doctrine_reference: Primacía del texto original; no resolver la tensión semántica más allá de lo que permite el griego.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego SBLGNT y el auditorio inglés POB: conserva la fuerza directa de λέγω, el valor temporal de ἕως, el referente concreto de ἀλέκτωρ y el contenido explícito de εἰδέναι. Se ajusta la sintaxis al español natural sin perder el matiz de la negación.'
  spanish_consistency_notes:
  - Se usa «Pedro» para Πέτρος en concordancia con el nombre propio usual en español bíblico.
  - Se prefiere «el gallo» como referente específico natural en español, aun cuando el griego no lleva artículo.
  - Se mantiene «me conoces» para hacer explícito el complemento de εἰδέναι; no se reduce a una simple negación genérica.
  - La puntuación con comillas angulares es apta para publicación en español bíblico moderno.
