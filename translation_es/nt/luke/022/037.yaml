translation:
  language: es
  text: 'Porque les digo que es necesario que esto que está escrito se cumpla en mí: «Y fue contado entre los inicuos[a]». Porque lo que me concierne tiene su cumplimiento[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «Y fue contado entre los transgresores» (Is 53:12).'
    reason: alternative_reading
  - marker: b
    text: 'O: «lo que me concierne tiene cumplimiento / está llegando a su cumplimiento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  english_pob_choice: For I tell you
  chosen_spanish: Porque les digo
  alternatives_spanish:
  - Porque les hablo
  - Porque les digo a ustedes
  lexicon: BDAG
  rationale: «λέγω» con dativo de destinatario se expresa de forma natural en español como «les digo». «Porque» conserva la relación explicativa de γάρ. Se evita un calco rígido como «yo os digo» para mantener registro moderno y claro.
- source_word: τοῦτο τὸ γεγραμμένον
  english_pob_choice: this which is written
  chosen_spanish: esto que está escrito
  alternatives_spanish:
  - esta Escritura
  - esto escrito
  lexicon: BDAG
  rationale: La construcción demostrativa más participio perfecto se rinde con una forma directa y transparente. «Esto que está escrito» preserva el referente sin introducir «Escritura», que no está explícito en el griego.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: es necesario que
  alternatives_spanish:
  - debe
  - tiene que
  lexicon: BDAG
  rationale: En español, «es necesario que» comunica bien la fuerza impersonal de necesidad de δεῖ sin sonar excesivamente mecánico. Mantiene el tono solemne y evita hacer más fuerte de lo que el contexto exige.
- source_word: τελεσθῆναι
  english_pob_choice: be fulfilled
  chosen_spanish: se cumpla
  alternatives_spanish:
  - sea cumplido
  - sea realizado
  - se complete
  lexicon: BDAG
  rationale: En contexto de cita bíblica y cumplimiento, «cumplir(se)» es la opción más natural y fiel para τελεσθῆναι. «Se cumpla» conserva la pasiva divina/impersonal y la idea de consumación profética.
- source_word: ἐν ἐμοί
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - en mi caso
  - con respecto a mí
  lexicon: BDAG
  rationale: Se conserva la preposición literal «en» porque la frase tiene un sentido fuerte de realización en la persona y experiencia de Jesús. Se evita explicitar demasiado con una paráfrasis.
- source_word: μετὰ ἀνόμων ἐλογίσθη
  english_pob_choice: And he was counted with the lawless
  chosen_spanish: Y fue contado entre los sin ley
  alternatives_spanish:
  - Y fue contado entre los transgresores
  - Y fue contado con los inicuos
  lexicon: BDAG
  rationale: «ἀνόμων» se rinde como «sin ley» para mantener cercanía léxica con «lawless» y evitar sustituirlo por la forma tradicional como opción principal. «Entre» expresa bien la idea de ser incluido en un grupo.
- source_word: τὸ περὶ ἐμοῦ
  english_pob_choice: what concerns me
  chosen_spanish: lo que me concierne
  alternatives_spanish:
  - lo referente a mí
  - lo que habla de mí
  lexicon: BDAG
  rationale: La frase articular idiomática se vuelve natural en español con «lo que me concierne». Conserva el referente global de la misión/pasión de Jesús sin recargar la sintaxis.
- source_word: τέλος ἔχει
  english_pob_choice: has its fulfillment
  chosen_spanish: tiene su cumplimiento
  alternatives_spanish:
  - está llegando a su cumplimiento
  - está llegando a su fin
  - tiene su consumación
  lexicon: BDAG
  rationale: «τέλος ἔχει» admite un campo semántico de culminación, cumplimiento y fin. En este contexto, «tiene su cumplimiento» sigue la revisión más reciente del POB en inglés y preserva la tensión entre culminación y término sin resolverla en exceso.
theological_decisions:
- issue: Cómo reflejar la cita de Isaías 53:12 sin imponer la formulación tradicional
  english_pob_reading: And he was counted with the lawless
  chosen_spanish_reading: Y fue contado entre los sin ley
  alternative_spanish_readings:
  - Y fue contado entre los transgresores
  rationale: El griego ἀνόμων es más directamente «sin ley» que «transgresores». Se conserva esa elección en el texto principal y se documenta la resonancia tradicional en nota, para no borrar el vínculo con Isaías 53:12.
  doctrine_reference: Principio de primacía del texto fuente y preservación de alternativas tradicionales en nota.
- issue: Cómo traducir τέλος ἔχει sin cerrar demasiado el sentido
  english_pob_reading: has its fulfillment
  chosen_spanish_reading: tiene su cumplimiento
  alternative_spanish_readings:
  - está llegando a su cumplimiento
  - tiene su fin
  - está cumpliéndose
  rationale: En el contexto de la pasión, τέλος ἔχει apunta a culminación/cumplimiento más que a mero cese. «Tiene su cumplimiento» mantiene esa dirección y conserva una tensión saludable entre terminación y realización.
  doctrine_reference: Preservar la tensión lexical donde el griego permite varias lecturas legítimas.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que ajustó la cláusula final de «is reaching its end» a «has its fulfillment». La redacción española sigue esa actualización con «tiene su cumplimiento», mientras mantiene el resto de la oración de forma sustancialmente equivalente al estado final auditado.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto cuando corresponde, pero este versículo no contiene el nombre divino explícito.
  - Se prefirió «se cumpla / cumplimiento» para τελεσθῆναι y τέλος ἔχει por coherencia interna con el campo semántico de consumación.
  - Se mantuvo «sin ley» para ἀνόμων, con nota para la lectura tradicional «transgresores», evitando sustituir la terminología del texto fuente por la tradicional sin justificación textual.
