- from: 'Porque les digo que es necesario que esto que está escrito se cumpla en mí: «Y fue contado entre los sin ley». Porque lo que me concierne[a] tiene su cumplimiento[b].'
  to: 'Porque les digo que es necesario que esto que está escrito se cumpla en mí: «Y fue contado entre los inicuos[a]». Porque lo que me concierne tiene su cumplimiento[b].'
  rationale: Se corrige la expresión poco idiomática «los sin ley» por «los inicuos», que suena natural en español bíblico y sigue representando ἀνόμων sin depender de la formulación tradicional. También se mueve la nota [a] para que quede anclada en la cita de Isaías, que es a lo que realmente se refiere. Se conserva «tiene su cumplimiento» y la nota [b], en línea con el rastro de auditoría inglés.
