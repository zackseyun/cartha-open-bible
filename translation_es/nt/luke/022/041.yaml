translation:
  language: es
  text: Y él se apartó de ellos como a la distancia de un tiro de piedra[a], y arrodillándose[b], estaba orando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como a un tiro de piedra».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «habiendo puesto las rodillas», es decir, «arrodillándose».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Se mantiene una conexión narrativa sencilla y natural en español, sin añadir inferencia temporal o causal que no está en el griego.
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: El pronombre aporta énfasis leve, pero en español la repetición enfática no es necesaria; el sujeto ya queda claro por el contexto.
- source_word: ἀπεσπάσθη
  english_pob_choice: withdrew
  chosen_spanish: se apartó
  alternatives_spanish:
  - se retiró
  - se separó
  - fue apartado
  lexicon: BDAG
  rationale: La forma pasiva puede verse literalmente como 'fue apartado', pero aquí describe de manera idiomática la acción deliberada de distanciarse de los discípulos. 'Se apartó' conserva ese sentido sin sonar forzado.
- source_word: ὡσεὶ λίθου βολήν
  english_pob_choice: about a stone’s throw
  chosen_spanish: como a un tiro de piedra[a]
  alternatives_spanish:
  - aproximadamente a la distancia de un tiro de piedra
  - más o menos a un tiro de piedra
  lexicon: BDAG
  rationale: Es una expresión convencional de distancia aproximada. 'Tiro de piedra' comunica bien el valor idiomático en español y conserva la idea de cercanía relativa.
- source_word: θεὶς τὰ γόνατα
  english_pob_choice: kneeling down
  chosen_spanish: puesto de rodillas[b]
  alternatives_spanish:
  - habiendo puesto las rodillas
  - arrodillándose
  - hincado
  lexicon: BDAG
  rationale: La expresión literal 'puesto las rodillas' es un giro idiomático para arrodillarse. 'Puesto de rodillas' mantiene la imagen corporal del griego y evita una paráfrasis excesiva.
- source_word: προσηύχετο
  english_pob_choice: he was praying
  chosen_spanish: estaba orando
  alternatives_spanish:
  - oraba
  - seguía orando
  - estaba haciendo oración
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso; 'estaba orando' preserva mejor ese aspecto durativo que un pasado simple.
theological_decisions:
- issue: Postura de Jesús en oración
  english_pob_reading: Render the verse straightforwardly as Jesus physically withdrawing and kneeling to pray, without importing additional devotional or doctrinal interpretation.
  chosen_spanish_reading: 'Presentar la escena de forma directa: Jesús se aparta, se pone de rodillas y ora, sin añadir explicaciones devocionales ni doctrinales.'
  alternative_spanish_readings:
  - Jesús se retiró para orar
  - Jesús se arrodilló y comenzó a orar
  rationale: El versículo narra acción y postura. La traducción debe preservar la sobriedad del relato sin intensificar ni suavizar el cuadro narrativo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se conserva el valor idiomático de ἀπεσπάσθη, la distancia aproximada de ὡσεὶ λίθου βολήν, la postura corporal implícita en θεὶς τὰ γόνατα y el aspecto durativo de προσηύχετο. No se detectan revisiones aplicadas en el historial fuente.'
  spanish_consistency_notes:
  - Se usó 'Y' para el enlace narrativo, coherente con un registro bíblico sobrio y natural.
  - Se prefirió 'se apartó' frente a una pasiva literal para respetar el uso idiomático del griego.
  - '''Tiro de piedra'' mantiene una expresión comprensible y equivalente al modismo de distancia.'
  - '''Puesto de rodillas'' conserva el paralelismo corporal del original y no fuerza una simplificación interpretativa.'
  - '''Estaba orando'' refleja el imperfecto progresivo del griego, manteniendo la acción en desarrollo.'
