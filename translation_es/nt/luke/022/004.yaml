translation:
  language: es
  text: Y se fue y conversó con los principales sacerdotes y oficiales[a] cómo entregárselo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Probablemente autoridades del templo o miembros de la guardia del templo, no soldados romanos.
    reason: cultural_note
  - marker: b
    text: 'O: «traicionarlo». El verbo griego puede significar «entregar», «poner en manos de» o, en este contexto, «traicionar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπελθὼν
  english_pob_choice: he went away
  chosen_spanish: se fue
  alternatives_spanish:
  - habiéndose ido
  - después de irse
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, «se fue» comunica de manera natural la acción previa sin añadir una paráfrasis demasiado explícita. La relación temporal queda clara por la coordinación con la oración principal.
- source_word: συνελάλησεν
  english_pob_choice: discussed
  chosen_spanish: habló
  alternatives_spanish:
  - conversó
  - deliberó
  lexicon: BDAG
  rationale: El verbo indica hablar juntos o conferenciar. «Habló con» es más natural que «discutió» en español y conserva el sentido de conversación o arreglo conjunto sin imponer un matiz polémico que el griego no exige.
- source_word: τοῖς ἀρχιερεῦσιν
  english_pob_choice: chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: «Principales sacerdotes» refleja bien el plural del griego y evita la impresión de varios titulares del mismo cargo singular. Además, mantiene el registro bíblico sin perder claridad para el lector moderno.
- source_word: στρατηγοῖς
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - capitanes
  - comandantes
  - oficiales del templo
  lexicon: BDAG
  rationale: En este contexto del templo, el término apunta a autoridades o guardias del templo más que a militares romanos. «Oficiales» es la forma breve y natural; el matiz institucional se explica en nota.
- source_word: τὸ πῶς
  english_pob_choice: how
  chosen_spanish: acerca de cómo
  alternatives_spanish:
  - sobre cómo
  - cómo
  lexicon: BDAG
  rationale: La construcción griega introduce el contenido de la conversación. En español, «acerca de cómo» conserva la idea de la deliberación sin sonar forzado.
- source_word: παραδῷ
  english_pob_choice: might hand him over
  chosen_spanish: entregárselo
  alternatives_spanish:
  - traicionarlo
  - entregarlo
  lexicon: BDAG
  rationale: «Entregar» preserva el sentido básico de παραδίδωμι sin anticipar en el verbo una interpretación moral que el griego permite pero no obliga. El sentido de traición queda inferido por el contexto narrativo de Judas.
- source_word: αὐτοῖς ... αὐτόν
  english_pob_choice: to them ... him
  chosen_spanish: a ellos ... se lo
  alternatives_spanish:
  - a ellos ... a él
  - para ellos ... él
  lexicon: NA28/SBLGNT context
  rationale: Mantener el pronombre de objeto directo y el complemento de destinatario ayuda a distinguir con claridad a quién se le entrega y quién es entregado. En español, «entregárselo a ellos» conserva esa relación sintáctica de manera legible.
theological_decisions:
- issue: ¿Traducir παραδῷ como 'traicionar' o como 'entregar'?
  english_pob_reading: The Greek verb can mean 'hand over,' 'deliver over,' or, in this context, 'betray.' The main text keeps the more transparent lexical sense.
  chosen_spanish_reading: entregar
  alternative_spanish_readings:
  - traicionar
  - entregarlo
  rationale: La escena implica traición, pero el verbo griego en sí es más amplio. Siguiendo la pauta de la POB, el texto principal conserva el sentido léxico transparente y deja la interpretación moral al contexto narrativo, sin borrar la tensión entre entrega y traición.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Identificación de los 'oficiales'
  english_pob_reading: The 'officers' were likely temple authorities or members of the temple guard, not Roman soldiers.
  chosen_spanish_reading: oficiales del templo (implícito en la nota)
  alternative_spanish_readings:
  - guardias del templo
  - autoridades del templo
  - soldados romanos
  rationale: El griego no especifica soldados romanos. Para no introducir una identificación errónea, la nota aclara el probable trasfondo del templo, preservando la ambigüedad controlada del texto base.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió una estructura directa ('he went away and discussed...') en lugar de una paráfrasis temporal más explícita. En español, eso se reflejó con una coordinación simple ('se fue y habló') para mantener la misma inmediatez.
  spanish_consistency_notes:
  - Se emplea «principales sacerdotes» para conservar el valor plural del griego y evitar el singular institucional de «sumos sacerdotes» como único referente.
  - Se usa «entregar» como base léxica de παραδίδωμι y se deja «traicionar» como alternativa anotada, siguiendo el principio de no imponer una glosa interpretativa en el cuerpo principal.
  - «Oficiales» se mantiene en el texto principal por fluidez; la nota aclara el probable entorno del templo para sostener la precisión histórica.
  - 'Se conserva la distinción sintáctica entre el destinatario y la persona entregada: «a ellos» / «se lo».'
