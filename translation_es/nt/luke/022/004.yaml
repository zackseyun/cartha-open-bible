revisions:
- from: Y él se fue y habló con los principales sacerdotes y oficiales[a] acerca de cómo entregárselo a ellos[b].
  to: Y se fue y conversó con los principales sacerdotes y oficiales[a] cómo entregárselo[b].
  rationale: Se reemplaza «habló con» por «conversó con» para reflejar mejor el valor de συνελάλησεν como intercambio deliberativo. Se simplifica «acerca de cómo» a «cómo» para un español más directo. Se elimina «a ellos» después de «entregárselo» porque el pronombre ya expresa el destinatario y su repetición resulta poco natural en español; la distinción semántica del griego queda suficientemente preservada en la construcción pronominal.
