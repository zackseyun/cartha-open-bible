translation:
  language: es
  text: Después de arrestarlo, lo llevaron y lo introdujeron en la casa del sumo sacerdote; pero Pedro lo seguía de lejos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde lejos»; más tradicionalmente, «de lejos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Συλλαβόντες
  english_pob_choice: After arresting
  chosen_spanish: Después de arrestarlo
  alternatives_spanish:
  - Después de prenderlo
  - Habiéndolo apresado
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa a los verbos principales. En español, "después de" conserva bien esa relación temporal. "Arrestarlo" comunica el sentido custodial/jurídico que el contexto requiere, evitando un término demasiado genérico como "prenderlo" o demasiado literal como "apresarlo".
- source_word: ἤγαγον
  english_pob_choice: they led him away
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo llevaron lejos
  lexicon: BDAG
  rationale: ἄγω puede significar llevar o conducir. En español, "lo llevaron" reproduce de manera natural la acción de trasladarlo bajo custodia. No añado "lejos" porque ese matiz ya queda suficientemente sugerido por el movimiento al interior del recinto en la segunda cláusula.
- source_word: εἰσήγαγον
  english_pob_choice: brought him into
  chosen_spanish: lo introdujeron
  alternatives_spanish:
  - lo llevaron dentro de
  - lo metieron en
  lexicon: BDAG
  rationale: εἰσάγω añade la idea de introducir en un espacio interior. "Lo introdujeron" mantiene esa fuerza direccional sin repetir "llevaron". "Lo metieron" sería demasiado coloquial y "lo llevaron dentro de" resulta más pesado.
- source_word: οἰκίαν
  english_pob_choice: house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  - la residencia
  lexicon: BDAG
  rationale: οἰκία designa aquí la edificación concreta. "La casa" es la correspondencia más directa y natural en español; "hogar" suena demasiado doméstico y "residencia" demasiado formal.
- source_word: ἀρχιερέως
  english_pob_choice: the high priest’s
  chosen_spanish: del sumo sacerdote
  alternatives_spanish:
  - del gran sacerdote
  lexicon: BDAG
  rationale: ἀρχιερεύς se traduce con el término establecido y transparente "sumo sacerdote". En español eclesiástico y bíblico es más claro que "gran sacerdote" y preserva la referencia institucional del texto.
- source_word: ἠκολούθει
  english_pob_choice: was following
  chosen_spanish: lo seguía
  alternatives_spanish:
  - seguía siguiéndolo
  - iba siguiéndolo
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua en pasado. "Lo seguía" comunica esa continuidad de forma natural en español sin sobrecargar la frase con perífrasis innecesarias.
- source_word: μακρόθεν
  english_pob_choice: at a distance
  chosen_spanish: de lejos
  alternatives_spanish:
  - a distancia
  - desde lejos
  lexicon: BDAG
  rationale: La idea espacial es la de distancia. "De lejos" es idiomático y claro en español. Mantiene la tensión narrativa sin volver más interpretativo el texto con adverbios psicológicos.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora bien
  lexicon: BDAG
  rationale: El δέ introduce un contraste suave entre lo que hicieron con Jesús y la acción aparte de Pedro. "Pero" expresa bien ese giro narrativo en español.
theological_decisions:
- issue: Si el seguimiento de Pedro debe interpretarse como secreto o cobarde
  english_pob_reading: Rendered the imperfect ἠκολούθει as 'was following' without importing evaluative language such as 'secretly' or 'timidly.'
  chosen_spanish_reading: Se traduce simplemente "lo seguía de lejos", sin añadir calificativos sobre su intención o valentía.
  alternative_spanish_readings:
  - Pedro lo seguía en secreto y de lejos
  - Pedro lo seguía tímidamente de lejos
  - Pedro lo seguía a escondidas
  rationale: El versículo describe la acción observable, no la motivación interna de Pedro. Mantener solo la distancia preserva la tensión narrativa y evita resolverla con una interpretación no explícita en el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el tramo auditado en inglés y conserva la misma lectura verbal del imperfecto, sin introducir interpretación psicológica ni variantes textuales no atestiguadas. No hay revisiones aplicadas en el antecedente inglés, y el estado de acuerdo es alto.
  spanish_consistency_notes:
  - Se mantiene "sumo sacerdote" como término bíblico estándar para ἀρχιερεύς.
  - Se usa "arrestarlo" para el valor custodial de Συλλαβόντες, en consonancia con la lectura inglesa.
  - '"Lo seguía" preserva el imperfecto sin forzar un aspecto durativo explícito más allá de lo que el español común ya comunica.'
  - La nota al pie de "de lejos" conserva la alternativa literal y la más tradicional, siguiendo la práctica auditada en inglés.
