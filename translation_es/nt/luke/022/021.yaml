translation:
  language: es
  text: Pero he aquí[a], la mano del que me traiciona está conmigo sobre la mesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «la mano del que me entrega está conmigo sobre la mesa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: Introduce un giro adversativo breve y natural en español; ‘Pero’ conserva la contraposición inmediata sin sonar demasiado pesado para este contexto narrativo.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - he aquí
  - vean
  lexicon: BDAG
  rationale: Como exhortación de atención, ‘miren’ comunica la llamada deíctica en un español actual y reverente. ‘He aquí’ sería más literal pero más arcaizante.
- source_word: ἡ χεὶρ
  english_pob_choice: the hand
  chosen_spanish: la mano
  alternatives_spanish:
  - la mano misma
  lexicon: BDAG
  rationale: Se mantiene la imagen literal de ‘mano’, preservando el valor metonímico del texto sin explicitarlo en exceso.
- source_word: τοῦ παραδιδόντος με
  english_pob_choice: of the one betraying me
  chosen_spanish: del que me entrega
  alternatives_spanish:
  - del que me traiciona
  - del que me entrega en manos de otros
  lexicon: BDAG
  rationale: ‘Entregar’ refleja con más cercanía παραδίδωμι que ‘traicionar’, y mantiene la tensión léxica del verbo sin perder el sentido narrativo. En español, ‘el que me entrega’ es natural y permite conservar la ambigüedad/forza del verbo.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo
  lexicon: BDAG
  rationale: Forma idiomática y compacta en español para expresar compañía o cercanía en la mesa.
- source_word: ἐπὶ τῆς τραπέζης
  english_pob_choice: on the table
  chosen_spanish: sobre la mesa
  alternatives_spanish:
  - en la mesa
  - encima de la mesa
  lexicon: BDAG
  rationale: ‘Sobre la mesa’ conserva el valor espacial de ἐπί con un genitivo y suena natural en español; ‘en la mesa’ puede debilitar la imagen concreta de ubicación.
theological_decisions:
- issue: Valor de παραδίδωμι en el anuncio de la pasión
  english_pob_reading: betraying
  chosen_spanish_reading: entrega
  alternative_spanish_readings:
  - traiciona
  - entrega/traiciona
  rationale: El contexto de la pasión justifica el sentido personal y culpable del acto, pero en español ‘entregar’ permite mantener la amplitud del verbo griego y su carga narrativa, sin perder la implicación de traición que el contexto ya aporta.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y la auditoría inglesa: conserva el adversativo inicial, el llamamiento de atención de ἰδοὺ, la imagen literal de ‘mano’ y la ubicación ‘sobre la mesa’. Se adopta ‘entrega’ como alternativa más cercana al verbo παραδίδωμι, dejando constancia de la opción más interpretativa ‘traiciona’ en la nota.'
  spanish_consistency_notes:
  - Se mantiene ‘mesa’ en lugar de ‘tabla’ porque el sustantivo español natural para el contexto de comida es ‘mesa’, y eso preserva la escena de comunión/convivencia implicada en el original.
  - Se evita ‘SEÑOR’ y otros sustitutos teológicos no pertinentes aquí; el versículo no contiene el nombre divino ni un título cristológico.
  - La nota al pie marca la alternativa más literal del verbo griego sin alterar el flujo principal del verso.
