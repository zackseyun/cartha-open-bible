translation:
  language: es
  text: Pero no sea así entre ustedes[a]. Más bien, el mayor entre ustedes llegue a ser como el menor[b], y el que dirige como el que sirve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero ustedes no han de ser así». El griego es elíptico y contrasta con fuerza a los discípulos de Jesús con el patrón de búsqueda de prestigio descrito en el versículo anterior.'
    reason: alternative_reading
  - marker: b
    text: «El menor» se refiere al de condición social más baja o más junior, no solo a alguien de menor edad.
    reason: cultural_note
lexical_decisions:
- source_word: ὑμεῖς δὲ οὐχ οὕτως
  english_pob_choice: But you are not to be like that
  chosen_spanish: Pero ustedes no deben ser así
  alternatives_spanish:
  - Pero no así con ustedes
  - Pero ustedes no son así
  lexicon: BDAG
  rationale: La segunda persona plural enfática se conserva con «ustedes». «No deben ser así» expresa la negativa implícita y la contraposición fuerte del contexto sin volverla más dura de lo que el griego exige.
- source_word: ἀλλ’
  english_pob_choice: Instead
  chosen_spanish: Más bien
  alternatives_spanish:
  - Sino
  - Por el contrario
  lexicon: BDAG
  rationale: «Más bien» marca con naturalidad el giro adversativo hacia la instrucción positiva y suena fluido en español bíblico contemporáneo.
- source_word: ὁ μείζων
  english_pob_choice: the greater
  chosen_spanish: el mayor
  alternatives_spanish:
  - el más grande
  - el de mayor rango
  - el mayor entre ustedes
  lexicon: BDAG
  rationale: El comparativo μείζων apunta a mayor estatura social o de rango dentro del grupo. «El mayor» conserva esa comparación sin convertirla en superlativo ni en una categoría institucional ajena al pasaje.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - en su grupo
  lexicon: BDAG
  rationale: «Entre ustedes» expresa la relación comunitaria y evita un giro demasiado literal como «en ustedes», que en español sonaría ajeno al sentido.
- source_word: γινέσθω
  english_pob_choice: let ... become
  chosen_spanish: llegue a ser
  alternatives_spanish:
  - sea
  - se haga
  lexicon: BDAG
  rationale: El imperativo presente de γίνομαι sugiere volverse o pasar a un estado. «Llegue a ser» conserva la idea de proceso o adopción de actitud mejor que un simple «sea».
- source_word: ὡς ὁ νεώτερος
  english_pob_choice: like the younger
  chosen_spanish: como el más joven
  alternatives_spanish:
  - como el joven
  - como el menor
  lexicon: BDAG
  rationale: νεώτερος es comparativo («más joven»), no necesariamente superlativo. En español, «el más joven» mantiene el valor comparativo y puede aludir al menor estatus social que el contexto presupone.
- source_word: ὁ ἡγούμενος
  english_pob_choice: the one who leads
  chosen_spanish: el que dirige
  alternatives_spanish:
  - el que lidera
  - el que gobierna
  - el líder
  lexicon: BDAG
  rationale: Se traduce el participio de manera verbal y sustantiva, como en el inglés auditado. «Dirige» es natural y amplio; evita cargar el texto con matices políticos o eclesiásticos no explícitos en el griego.
- source_word: ὡς ὁ διακονῶν
  english_pob_choice: like the one who serves
  chosen_spanish: como el que sirve
  alternatives_spanish:
  - como el servidor
  - como el que ministra
  lexicon: BDAG
  rationale: διακονῶν conserva su sentido activo de servicio. «El que sirve» mantiene el aspecto verbal y evita convertirlo prematuramente en un título o cargo fijo.
theological_decisions:
- issue: Inversión de estatus y liderazgo en la comunidad de discípulos
  english_pob_reading: Render the verse as an ethical reversal of social rank within the disciple community, emphasizing humble service rather than hierarchical privilege.
  chosen_spanish_reading: Presentar el versículo como una inversión ética del rango social dentro de la comunidad de discípulos, subrayando el servicio humilde y no el privilegio jerárquico.
  alternative_spanish_readings:
  - Dar un tono más institucional sobre oficio o autoridad
  - Hacer de la frase una regla general de modestia sin contraste social
  rationale: El griego contrapone al «mayor» y al «que dirige» con el «más joven» y el «que sirve». La traducción conserva esa inversión de estatus sin introducir estructuras eclesiásticas posteriores ni suavizar el contraste social que Jesús plantea.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no hubo cambios requeridos y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no aparece en el texto fuente.
  - Se preserva el contraste social-comunitario del griego sin convertirlo en terminología institucional posterior.
  - Se usa un español moderno y digno, evitando calcos como «no así con ustedes» en el texto principal, aunque se documenta como alternativa en nota.
