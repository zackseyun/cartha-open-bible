  text: ὑμεῖς δὲ οὐχ οὕτως, ἀλλ’ ὁ μείζων ἐν ὑμῖν ⸀γινέσθω ὡς ὁ νεώτερος, καὶ ὁ ἡγούμενος ὡς ὁ διακονῶν·
base_translation:
  language: en
  yaml_path: translation/nt/luke/022/026.yaml
  text: But you are not to be like that[a]. Instead, let the greater among you become like the younger[b], and the one who leads like the one who serves.
  footnotes:
  - marker: a
    text: Or, 'But not so with you.' The Greek is elliptical and sharply contrasts Jesus's disciples with the status-seeking pattern just described.
    reason: alternative_reading
  - marker: b
    text: '''The younger'' refers to the socially junior person, not merely someone younger in age.'
    reason: cultural_note
