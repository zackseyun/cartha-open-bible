  rationale: Se mantiene la traducción base porque es sustancialmente fiel al griego y al audit trail inglés. Se hace una reparación menor para mejorar la naturalidad y precisión posesiva en español («su oreja derecha») y se pule levemente la redacción de la nota sin alterar la decisión léxica ni teológica sobre δοῦλος.
