translation:
  language: es
  text: Y uno de ellos golpeó al esclavo[a] del sumo sacerdote y le cortó su oreja derecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo» del sumo sacerdote. El griego usa δοῦλος, que puede referirse a un esclavo o a un siervo, según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπάταξεν
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - pegó
  lexicon: BDAG
  rationale: πατάσσω expresa un golpe real y concreto. En español, «golpeó» comunica la acción sin forzar un tecnicismo ni volverla demasiado coloquial; mantiene la violencia del acto.
- source_word: εἷς τις ἐξ αὐτῶν
  english_pob_choice: one of them
  chosen_spanish: uno de ellos
  alternatives_spanish:
  - uno entre ellos
  - uno de los suyos
  lexicon: BDAG
  rationale: La combinación indefinida εἷς τις se naturaliza bien como «uno de ellos», preservando el anonimato del agresor y la fluidez en español.
- source_word: τοῦ ἀρχιερέως τὸν δοῦλον
  english_pob_choice: the high priest’s slave
  chosen_spanish: el esclavo del sumo sacerdote
  alternatives_spanish:
  - el siervo del sumo sacerdote
  lexicon: BDAG
  rationale: δοῦλος denota aquí una relación de subordinación servil/bondada; siguiendo la preferencia POB por «esclavo» cuando el sentido social concreto es relevante, se conserva esa fuerza. «Siervo» queda como alternativa tradicional, pero suaviza indebidamente el término.
- source_word: ἀφεῖλεν
  english_pob_choice: cut off
  chosen_spanish: le cortó
  alternatives_spanish:
  - le quitó
  - le arrancó
  lexicon: BDAG
  rationale: Aunque ἀφαιρέω puede significar «quitar», con «oreja» y en un contexto de lesión el resultado en español se expresa con naturalidad como «le cortó», que transmite la lesión producida sin añadir más de lo que el contexto sostiene.
- source_word: τὸ οὖς αὐτοῦ τὸ δεξιόν
  english_pob_choice: his right ear
  chosen_spanish: la oreja derecha
  alternatives_spanish:
  - su oreja derecha
  lexicon: BDAG
  rationale: El griego especifica el órgano y el lado afectado. En español, «oreja» es la forma más natural y clara en este contexto corporal; se mantiene «derecha» para conservar el detalle.
theological_decisions:
- issue: Rendering of δοῦλος
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  rationale: El audit trail inglés interpreta δοῦλος en sentido literal de dependencia servil y prefiere «slave». En español, «esclavo» preserva esa carga social e histórica; «siervo» se reserva como alternativa suavizada, menos fiel a la fuerza del término aquí.
  doctrine_reference: 'DOCTRINE.md: Contested terms — δοῦλος; Translation philosophy §1'
translation_notes:
  revision_awareness: La traducción sigue el pasaje griego SBLGNT y coincide con la revisión inglesa más reciente, que no introdujo cambios. Se conserva la decisión lexical clave de δοῦλος como «esclavo» y se mantiene la secuencia verbal concreta del acto violento y la lesión resultante.
  spanish_consistency_notes:
  - Se conserva la terminología POB «esclavo» para δοῦλος, con nota alternativa para auditabilidad.
  - Se evita la calca «del sumo sacerdote el esclavo» en favor del orden natural español «el esclavo del sumo sacerdote».
  - «Oreja» se usa por naturalidad en español; no altera el referente anatómico del griego.
  - 'El sujeto indefinido se mantiene impersonal en número singular: «uno de ellos».'
