translation:
  language: es
  text: Y se alegraron y acordaron darle dinero[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «plata». El término griego puede referirse literalmente a plata o, de manera más general, a dinero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐχάρησαν
  english_pob_choice: they rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - se regocijaron
  - estuvieron contentos
  lexicon: BDAG
  rationale: El aoristo de χαίρω expresa una reacción de gozo o satisfacción. En español, «se alegraron» comunica bien esa respuesta emocional con naturalidad y sin perder dignidad.
- source_word: συνέθεντο
  english_pob_choice: agreed
  chosen_spanish: acordaron
  alternatives_spanish:
  - llegaron a un acuerdo
  - convinieron
  lexicon: BDAG
  rationale: El medio de συντίθεμαι aquí indica llegar a un acuerdo o concertarse. «Acordaron» es breve, idiomático y conserva la idea de convenio entre ambas partes.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo funciona como complemento indirecto de δοῦναι. En español, el clítico «le» expresa con naturalidad que el dinero se daría a él.
- source_word: ἀργύριον
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  - monedas de plata
  lexicon: BDAG
  rationale: Aunque literalmente puede significar «plata», en este contexto transaccional el sentido general es «dinero». «Dinero» comunica la intención de forma clara en español moderno; la alternativa literal se conserva en la nota.
- source_word: δοῦναι
  english_pob_choice: to give
  chosen_spanish: darle
  alternatives_spanish:
  - pagarle
  - entregarle
  lexicon: BDAG
  rationale: El infinitivo depende de συνέθεντο y especifica el contenido del acuerdo. «Darle» mantiene el valor básico de dar; «pagarle» sería más interpretativo aunque posible por el contexto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y el audit trail inglés, conservando el sentido de gozo, acuerdo y la ambigüedad léxica de ἀργύριον mediante una nota.
  spanish_consistency_notes:
  - Se mantiene un estilo bíblico moderno y sobrio.
  - Se evita forzar una paráfrasis como «prometieron» porque el griego destaca primero el acuerdo.
  - La nota preserva la alternativa literal «plata», como en el registro inglés, sin trasladar innecesariamente esa opción al texto principal.
