translation:
  language: es
  text: 'Y les dijo[a]: «Cuando los envié sin bolsa de dinero, bolsa de viaje ni sandalias, ¿les faltó algo?» Y ellos dijeron: «Nada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «morral» para «bolsa de viaje».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ εἶπεν αὐτοῖς
  english_pob_choice: And he said to them
  chosen_spanish: Y les dijo
  alternatives_spanish:
  - Y les habló
  - Y les dijo a ellos
  lexicon: BDAG
  rationale: El griego usa el verbo ordinario de decir; en español «les dijo» es natural y fiel. Se omite «a ellos» por economía estilística, ya que el pronombre dativo ya comunica el destinatario.
- source_word: ἀπέστειλα
  english_pob_choice: I sent you out
  chosen_spanish: los envié
  alternatives_spanish:
  - los envié fuera
  - los mandé
  lexicon: BDAG
  rationale: ἀποστέλλω conserva fuerza de envío/comisión. «Los envié» es fiel y natural; se evita «mandé» por posible pérdida del matiz de comisión apostólica, aunque en español no siempre requiere el adverbio «fuera».
- source_word: ἄτερ
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - sin contar con
  - privados de
  lexicon: BDAG
  rationale: La preposición indica ausencia; «sin» es la equivalencia española más directa y transparente.
- source_word: βαλλαντίου
  english_pob_choice: money bag
  chosen_spanish: bolsa de dinero
  alternatives_spanish:
  - monedero
  - bolsa para el dinero
  lexicon: BDAG
  rationale: El término designa un receptáculo para dinero. «Bolsa de dinero» conserva la concreción y evita el posible anacronismo de «billetera».
- source_word: πήρας
  english_pob_choice: travel bag
  chosen_spanish: bolsa de viaje
  alternatives_spanish:
  - morral
  - mochila
  lexicon: BDAG
  rationale: 'Sigue la decisión funcional del inglés POB: un bolso o morral para provisiones de camino. «Bolsa de viaje» es claro, amplio y no fuerza un objeto moderno específico.'
- source_word: ὑποδημάτων
  english_pob_choice: sandals
  chosen_spanish: sandalias
  alternatives_spanish:
  - calzado
  - zapatos
  lexicon: BDAG
  rationale: En contexto de viaje del mundo bíblico, «sandalias» es el equivalente culturalmente adecuado y más preciso que el genérico «calzado».
- source_word: μή τινος ὑστερήσατε
  english_pob_choice: did you lack anything?
  chosen_spanish: ¿les faltó algo?
  alternatives_spanish:
  - ¿carecieron de algo?
  - ¿les hizo falta algo?
  lexicon: BDAG
  rationale: ὑστερέω aquí expresa falta o carencia. «Les faltó algo» reproduce el sentido de carencia en un español natural, sin recargar la pregunta.
- source_word: Οὐθενός
  english_pob_choice: Nothing
  chosen_spanish: Nada
  alternatives_spanish:
  - Nada en absoluto
  - De nada
  lexicon: BDAG
  rationale: La respuesta griega es brevísima y absoluta. «Nada» conserva esa concisión y el énfasis de negación total.
theological_decisions:
- issue: Matiz de envío/comisión en ἀποστέλλω
  english_pob_reading: I sent you out
  chosen_spanish_reading: los envié
  alternative_spanish_readings:
  - los mandé
  - los envié fuera
  rationale: No hay una disputa doctrinal explícita en el versículo, pero el verbo puede sugerir comisión para misión. «Los envié» conserva ese hecho sin introducir una formulación más eclesiástica de la necesaria.
  doctrine_reference: Lexical nuance; no doctrinal claim beyond the text.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide sustancialmente con el trazado auditado en inglés; no se registran revisiones aplicadas en el paquete fuente, y la traducción española conserva esa estabilidad textual.
  spanish_consistency_notes:
  - Se mantiene «sandalias» para ὑποδημάτων, coherente con el uso bíblico de viaje.
  - Se usa «bolsa de dinero» y «bolsa de viaje» para distinguir claramente βαλλάντιον y πήρα.
  - La respuesta final «Nada» preserva la brevedad del griego Οὐθενός.
  - Se evita «SEÑOR» u otra terminología de disfraz divino, porque el versículo no contiene el nombre divino ni κύριος con referencia teológica relevante.
