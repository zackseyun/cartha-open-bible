translation:
  language: es
  text: Y comenzaron a preguntarse entre sí quién de ellos podría ser el que iba a hacer esto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quién de ellos sería el que iba a hacer esto». El contexto deja claro que «esto» se refiere al acto de traición anunciado en el versículo anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντο
  english_pob_choice: began
  chosen_spanish: empezaron
  alternatives_spanish:
  - comenzaron
  - iniciaron
  lexicon: BDAG
  rationale: El aoristo incoativo de ἄρχω con infinitivo marca el comienzo de la acción. «Empezaron» conserva ese valor aspectual y suena natural en español moderno.
- source_word: συζητεῖν
  english_pob_choice: to discuss
  chosen_spanish: discutir
  alternatives_spanish:
  - dialogar
  - debatir
  - hablar
  lexicon: BDAG
  rationale: συζητέω puede significar discutir, debatir o razonar juntos. En este contexto los discípulos intentan identificar al responsable; «discutir» expresa bien la interacción recíproca sin endurecer indebidamente el tono.
- source_word: πρὸς ἑαυτούς
  english_pob_choice: among themselves
  chosen_spanish: entre ellos
  alternatives_spanish:
  - unos con otros
  - entre sí
  lexicon: BDAG
  rationale: El giro idiomático indica interacción mutua dentro del grupo. «Entre ellos» es una equivalencia natural en español y conserva el sentido recíproco.
- source_word: τίς ἄρα εἴη
  english_pob_choice: which one of them might be
  chosen_spanish: quién de ellos podría ser
  alternatives_spanish:
  - quién de ellos sería
  - quién podría ser entre ellos
  lexicon: BDAG
  rationale: La combinación interrogativa indirecta con optativo expresa duda deliberativa. «Podría ser» comunica bien la incertidumbre sin forzar un futuro o una certeza que el griego no da.
- source_word: ὁ τοῦτο μέλλων πράσσειν
  english_pob_choice: the one about to do this
  chosen_spanish: el que iba a hacer esto
  alternatives_spanish:
  - el que estaba por hacer esto
  - el que estaba a punto de hacer esto
  lexicon: BDAG
  rationale: μέλλω con infinitivo suele indicar inminencia. «Iba a hacer» mantiene esa proximidad de la acción en un español claro. Se evita explicitar «traicionar» en el texto principal porque el griego dice literalmente «hacer esto» y deja que el contexto anterior identifique el acto.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  lexicon: BDAG
  rationale: El demostrativo remite al acto mencionado en el versículo precedente. «Esto» es breve y fiel; «esta cosa» sería innecesariamente pesado.
- source_word: ἐξ αὐτῶν
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - entre ellos
  - de entre ellos
  lexicon: BDAG
  rationale: La expresión señala a uno dentro del grupo. «De ellos» preserva la referencia grupal de forma directa; la estructura interrogativa ya hace el resto.
theological_decisions:
- issue: Si explicitar en el texto principal que «esto» es la traición
  english_pob_reading: Keep the text's more general 'do this' rather than expanding to 'betray him' in the main text.
  chosen_spanish_reading: Mantener «hacer esto» sin añadir «traicionar» en el cuerpo principal.
  alternative_spanish_readings:
  - el que iba a traicionarlo
  - el que estaba por traicionarlo
  rationale: El contexto inmediato deja claro el referente, pero el griego de este versículo usa una formulación indirecta. Mantenerla evita sobreinterpretar la cláusula y respeta la economía del original.
  doctrine_reference: 'Translation philosophy: original-language primacy and restraint; no paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB inglés: se evita una equivalencia demasiado fuerte de ἄρα y se expresa εἴη con duda deliberativa («podría ser»), no como certeza futura. También se conserva la referencia indirecta de τοῦτο sin explicitarla en el texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «esto» para τοῦτο, en línea con la restricción del original y la práctica del POB inglés de no expandir el objeto explícito.
  - «Discutir» se eligió como equivalente neutral de συζητεῖν, sin cargarlo de polémica más fuerte que la del contexto.
  - La construcción «el que iba a hacer esto» conserva la referencia relativa sin introducir una glosa interpretativa en el cuerpo principal.
