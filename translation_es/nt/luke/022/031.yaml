translation:
  language: es
  text: Simón[a], Simón, he aquí, Satanás los ha reclamado a todos ustedes, para zarandearlos como trigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El pronombre griego aquí es plural: Satanás ha reclamado a todo el grupo de discípulos, no solo a Pedro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σίμων Σίμων
  english_pob_choice: Simon, Simon
  chosen_spanish: Simón, Simón
  alternatives_spanish:
  - ¡Simón, Simón!
  lexicon: BDAG
  rationale: Se conserva el vocativo repetido para reproducir la solemnidad y la insistencia del griego sin añadir un matiz exclamativo que el texto no obliga a expresar.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - mira, pues
  - he aquí
  lexicon: BDAG
  rationale: La partícula deíctica introduce una advertencia o llamada de atención. En español, 'mira' comunica de forma natural esa fuerza apelativa; se evita 'he aquí' por ser más arcaico y menos transparente para el lector moderno.
- source_word: ὁ Σατανᾶς
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - el Adversario
  lexicon: BDAG
  rationale: Se conserva el nombre/título personal usual en el NT. No se traduce como 'el Adversario' porque el uso contextual aquí funciona como designación propia más que como glosa explicativa.
- source_word: ἐξῃτήσατο
  english_pob_choice: has demanded to have
  chosen_spanish: ha pedido tener
  alternatives_spanish:
  - ha demandado tener
  - ha pedido para sí
  lexicon: BDAG
  rationale: El verbo expresa una petición intensa o apremiante. En español, 'ha pedido tener' mantiene la idea de solicitud dirigida a obtener control, sin sobrecargar el verbo con un matiz jurídico que el griego no exige de manera inequívoca.
- source_word: ὑμᾶς
  english_pob_choice: all of you
  chosen_spanish: a todos ustedes
  alternatives_spanish:
  - los ha pedido a ustedes
  - a ustedes
  lexicon: BDAG
  rationale: El pronombre es plural y contrasta con el vocativo singular 'Simón'. 'A todos ustedes' hace explícito que Jesús se refiere al grupo entero, no solo a Pedro.
- source_word: τοῦ σινιάσαι
  english_pob_choice: to sift you
  chosen_spanish: para zarandearlos
  alternatives_spanish:
  - para aventarlos
  - para sacudirlos
  lexicon: BDAG
  rationale: El infinitivo expresa propósito. 'Zarandear' conserva la imagen agrícola y es natural en español. Se evita una paráfrasis explicativa para no diluir la metáfora.
- source_word: ὡς τὸν σῖτον
  english_pob_choice: like wheat
  chosen_spanish: como al trigo
  alternatives_spanish:
  - como trigo
  - como al grano
  lexicon: BDAG
  rationale: σῖτος designa el trigo/grano dentro de la imagen agrícola. 'Como al trigo' refleja bien el comparativo con artículo implícito y suena fluido en español.
theological_decisions:
- issue: Alcance plural de ὑμᾶς frente al vocativo singular
  english_pob_reading: Jesús habla a Simón en singular, pero Satanás ha pedido a todos los discípulos.
  chosen_spanish_reading: Jesús se dirige a Simón personalmente, pero dice que Satanás ha pedido a todo el grupo.
  alternative_spanish_readings:
  - Jesús se refiere solo a Simón/Pedro.
  - Satanás ha pedido a Simón solamente.
  rationale: El cambio del singular vocativo al plural objeto se mantiene visible en español con 'a todos ustedes'. Así se preserva la tensión textual sin reducirla a una amenaza individual contra Pedro בלבד.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'look' a 'behold' para registrar el tono formal de ἰδοὺ. En español, se optó por 'mira' por su naturalidad y su valor imperativo de atención inmediata, manteniendo el registro sobrio del verso. También se preservó explícitamente el plural de ὑμᾶς con 'a todos ustedes'.
  spanish_consistency_notes:
  - Se mantiene 'Satanás' como transliteración estable en vez de 'el Adversario'.
  - Se conserva la metáfora agrícola con 'zarandear' y 'trigo' sin explicitarla en el texto principal.
  - El voseo se evita; se usa 'ustedes' para la forma plural neutral latinoamericana.
  - Se evita 'SEÑOR' para el nombre divino porque este versículo no contiene el tetragrámaton ni κύριος en referencia directa a Yahvé.
