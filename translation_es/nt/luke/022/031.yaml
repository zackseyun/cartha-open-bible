revisions:
- from: Simón[a], Simón, mira[b], Satanás ha pedido tener a todos ustedes, para zarandearlos como al trigo.
  to: Simón[a], Simón, he aquí, Satanás los ha reclamado a todos ustedes, para zarandearlos como trigo.
  rationale: Se fortalece ἐξῃτήσατο con 'los ha reclamado', que comunica mejor la idea de exigir para sí. Se reemplaza 'mira' por 'he aquí' para conservar la fuerza de ἰδοὺ con un registro más digno y bíblico en español. Se elimina la nota estilística innecesaria y se mantiene solo la nota importante sobre el plural ὑμᾶς. También se mejora la naturalidad de la imagen agrícola con 'como trigo'.
