review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: vocativo repetido, mención de Satanás, propósito de zarandear y contraste entre Simón singular y ὑμᾶς plural. Sin embargo, ἐξῃτήσατο tiene más fuerza que ''ha pedido tener''; el rastro inglés auditado fijó ''has demanded to have''. Además, ''mira'' para ἰδοὺ es posible, pero en este contexto solemne suena demasiado coloquial frente al registro meta; ''miren'' tampoco encaja porque el vocativo es singular. Conviene usar ''he aquí'' o reestructurar con un aviso más digno. También debe evitarse la nota de estilo innecesaria sobre ἰδοὺ.'
  spanish_quality_summary: El español es claro, pero 'mira' rebaja el tono y la combinación 'ha pedido tener a todos ustedes' suena algo forzada. 'Como al trigo' es entendible, aunque 'como trigo' es más idiomático con el verbo 'zarandear'. La nota [b] sobre la elección estilística no aporta una alternativa textual necesaria y añade ruido editorial.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto: ''Satanás'' y ''Simón'' están bien. La distinción plural de ὑμᾶς debe mantenerse explícita; puede hacerse mejor con ''los ha reclamado a todos ustedes'' o similar. No hay términos teológicos del glosario mayor en disputa.'
  issues:
  - severity: medium
    issue: ἐξῃτήσατο está debilitado en 'ha pedido tener'
    rationale: El verbo griego expresa una petición fuerte, cercana a reclamar o exigir para sí. El audit trail inglés decidió 'has demanded to have'; la versión española debería reflejar mejor esa intensidad.
  - severity: medium
    issue: '''mira'' para ἰδοὺ no encaja bien con el registro solemne'
    rationale: Aunque semánticamente posible, 'mira' suena demasiado conversacional en una Biblia de tono digno. 'He aquí' preserva mejor la fuerza de llamada de atención en este contexto.
  - severity: low
    issue: La nota [b] es editorialmente innecesaria
    rationale: El inglés no conserva una nota sobre ἰδοὺ; aquí no hay una ambigüedad nueva en español que exija nota. Deben conservarse notas significativas, no justificar decisiones estilísticas ordinarias.
  - severity: low
    issue: '''como al trigo'' es menos natural que ''como trigo'''
    rationale: Con 'zarandear', la comparación genérica suena más idiomática sin artículo personalizado, y sigue siendo fiel al uso genérico de τὸν σῖτον.
  revised_spanish_text: Simón[a], Simón, he aquí, Satanás los ha reclamado a todos ustedes, para zarandearlos como trigo.
  revised_footnotes:
