translation:
  language: es
  text: 'Y asimismo la copa después de cenar, diciendo: «Esta copa es el nuevo pacto[a] en mi sangre[b], que se derrama por ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el nuevo testamento en mi sangre».
    reason: alternative_reading
  - marker: b
    text: La redacción griega coloca «que se derrama por ustedes» después de toda la cláusula; el sentido más natural es que la sangre de Jesús es derramada por ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποτήριον
  english_pob_choice: cup
  chosen_spanish: copa
  alternatives_spanish:
  - cáliz
  lexicon: BDAG
  rationale: «Copa» es el equivalente natural y directo para ποτήριον en español. «Cáliz» suena más litúrgico y puede introducir una tradición eclesiástica que el griego no exige.
- source_word: ὡσαύτως
  english_pob_choice: likewise
  chosen_spanish: asimismo
  alternatives_spanish:
  - igualmente
  - de la misma manera
  lexicon: BDAG
  rationale: «Asimismo» preserva la conexión con la acción anterior y suena natural en español bíblico contemporáneo.
- source_word: μετὰ τὸ δειπνῆσαι
  english_pob_choice: after supper
  chosen_spanish: después de cenar
  alternatives_spanish:
  - después de la cena
  - después de haber cenado
  lexicon: BDAG
  rationale: La expresión articular infinitiva se vierte de manera idiomática como una secuencia temporal clara. «Cenar» comunica bien la idea de la comida final del contexto.
- source_word: καινὴ
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - nueva
  lexicon: BDAG
  rationale: En un contexto de pacto, «nuevo» es la traducción usual y más clara para καινὴ.
- source_word: διαθήκη
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  lexicon: BDAG
  rationale: «Pacto» conserva mejor el trasfondo bíblico-jurídico de διαθήκη. «Testamento» queda como alternativa histórica, pero en español puede sonar menos natural y más interpretativa.
- source_word: ἐν τῷ αἵματί μου
  english_pob_choice: in my blood
  chosen_spanish: en mi sangre
  alternatives_spanish:
  - con mi sangre
  - por mi sangre
  lexicon: BDAG
  rationale: «En mi sangre» sigue de cerca la forma griega y mantiene el lenguaje sacrificial/covenantal sin explicitar más de lo que el texto dice.
- source_word: τὸ ὑπὲρ ὑμῶν ἐκχυννόμενον
  english_pob_choice: which is poured out for you
  chosen_spanish: que se derrama por ustedes
  alternatives_spanish:
  - que es derramada por ustedes
  - que se derrama en favor de ustedes
  lexicon: BDAG
  rationale: El participio neutro se entiende en contexto como referido a la sangre; en español, el relativo más natural se expresa con la misma continuidad semántica. «Por ustedes» mantiene la fuerza representativa/sacrificial de ὑπὲρ sin precisar más la teoría de expiación.
theological_decisions:
- issue: διαθήκη en contexto de la cena del Señor
  english_pob_reading: new covenant
  chosen_spanish_reading: nuevo pacto
  alternative_spanish_readings:
  - nuevo testamento
  rationale: El contexto inmediato evoca el lenguaje de establecimiento de pacto mediante sangre. «Pacto» preserva el peso veterotestamentario y evita reducir el término a «testamento», que en español suena más a documento legal post mortem.
  doctrine_reference: Pacto / alianza en la teología bíblica; continuidad con el trasfondo del Éxodo y Jeremías 31.
- issue: Relación sintáctica y referencial de ἐκχυννόμενον
  english_pob_reading: attached in sense to 'my blood' within the clause
  chosen_spanish_reading: se derrama por ustedes, entendido como la sangre de Jesús
  alternative_spanish_readings:
  - que se derrama sobre la copa
  - que se derrama por ustedes, con referencia implícita a la sangre
  rationale: La gramática griega coloca el participio al final de la cláusula, pero el sentido natural en contexto es la sangre derramada, no la copa. La redacción española conserva la forma breve y deja implícita la referencia sangínea sin forzarla.
  doctrine_reference: Cristología y cena del Señor; mantener la tensión textual sin resolver más allá del contexto.
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente griego y el audit trail inglés. Se mantuvo la preferencia por «pacto» frente a «testamento», y se preservó la ambigüedad gramatical del participio final mediante una redacción española natural que lo entiende en referencia a la sangre.
  spanish_consistency_notes:
  - Se usó «copa» y no «cáliz» para evitar un sesgo litúrgico no exigido por el griego.
  - Se mantuvo «en mi sangre» para respetar la preposición ἐν sin reemplazarla por una explicación teológica.
  - Se eligió «ustedes» como forma de segunda persona plural neutral latinoamericana.
  - La puntuación conserva la cita directa y el orden narrativo del texto griego.
