translation:
  language: es
  text: Y después que encendieron un fuego en medio del patio[a] y se sentaron juntos, Pedro estaba sentado entre ellos.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el patio»; en este contexto, αὐλή se refiere al espacio abierto de la residencia del sumo sacerdote, por lo que «patio» comunica con naturalidad el lugar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Pedro se sentó en medio de ellos». El imperfecto griego puede traducirse de manera más simple como «se sentó», pero «estaba sentado» refleja mejor la escena en desarrollo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιαψάντων
  english_pob_choice: after they had kindled
  chosen_spanish: después de haber encendido
  alternatives_spanish:
  - cuando habían encendido
  - después de que encendieron
  lexicon: BDAG
  rationale: El participio aoristo genitivo expresa una acción anterior a la principal; en español conviene reflejar esa anterioridad con una construcción de anterioridad. 'Encender' comunica bien la acción de prender el fuego sin calcar el matiz etimológico del compuesto griego.
- source_word: πῦρ
  english_pob_choice: a fire
  chosen_spanish: un fuego
  alternatives_spanish:
  - fuego
  - una fogata
  lexicon: BDAG
  rationale: El sustantivo anartro en contexto introduce un fuego concreto ya prendido. En español, 'un fuego' conserva la referencia específica sin añadir connotaciones innecesarias de 'fogata'.
- source_word: ἐν μέσῳ
  english_pob_choice: in the middle of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - en medio
  lexicon: BDAG
  rationale: La frase es espacial y concreta. 'En medio de' es natural en español y mantiene el valor locativo.
- source_word: αὐλή
  english_pob_choice: courtyard
  chosen_spanish: patio
  alternatives_spanish:
  - patio interior
  - atrio
  lexicon: BDAG
  rationale: En este contexto narrativo, αὐλή designa el espacio abierto de la residencia del sumo sacerdote. 'Patio' es más natural en español que 'courtyard' traducido de modo rígido, y sigue siendo preciso.
- source_word: συγκαθισάντων
  english_pob_choice: sat down together
  chosen_spanish: haberse sentado juntos
  alternatives_spanish:
  - sentarse juntos
  - haber tomado asiento juntos
  lexicon: BDAG
  rationale: El prefijo σύν aporta la idea de sentarse con otros. La forma de infinitivo compuesto en español permite mantener la anterioridad respecto del verbo principal y la noción de acción conjunta.
- source_word: ἐκάθητο
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se sentaba
  - estaba sentado allí
  lexicon: BDAG
  rationale: El imperfecto griego señala acción continua en el pasado. 'Estaba sentado' refleja mejor ese aspecto que un simple pretérito 'se sentó'.
- source_word: μέσος αὐτῶν
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su medio
  lexicon: BDAG
  rationale: El predicativo con genitivo indica la posición de Pedro dentro del grupo. 'Entre ellos' es idiomático y conserva el sentido relacional y espacial sin sonar forzado.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector narrativo suave. 'Y' mantiene el avance de la narración en un español fluido.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas; esta versión española sigue esa lectura estable, preservando la anterioridad de los participios aoristos y el aspecto imperfectivo de ἐκάθητο.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, pero no aparece en este versículo.
  - Se usa 'patio' para αὐλή por claridad natural en español y por el contexto narrativo de la residencia del sumo sacerdote.
  - Se conserva la distinción aspectual entre la acción previa ('después de haber encendido') y la acción continua ('estaba sentado').
