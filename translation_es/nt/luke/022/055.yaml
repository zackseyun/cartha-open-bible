  spanish_quality_summary: El español es claro y legible, pero la secuencia 'después de haber encendido... y haberse sentado juntos' suena algo trabada por la asimetría verbal. También sobra anclar nota [a] en 'fuego', ya que la nota trata del participio temporal, no del sustantivo. Una revisión mínima mejora fluidez y colocación de nota sin cambiar el sentido.
  glossary_alignment: 'No hay términos teológicos especiales en este versículo. Las decisiones léxicas concuerdan con las pautas del proyecto: lenguaje natural, digno y fiel al griego. ''Patio'' para αὐλή es una excepción contextual válida frente a una traducción más rígida de ''courtyard''.'
  issues:
  - severity: medium
    issue: 'Construcción verbal poco natural: ''y haberse sentado juntos'''
    rationale: El griego tiene dos participios aoristos paralelos (περιαψάντων ... καὶ συγκαθισάντων). En español, coordinar 'después de haber encendido' con 'y haberse sentado' rompe el paralelismo y suena forzado. 'Y luego sentarse juntos' tampoco sería ideal. Una subordinada temporal coordinada con 'después que/una vez que' o dos acciones finitas mejora la naturalidad.
  - severity: low
