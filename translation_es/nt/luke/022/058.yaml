translation:
  language: es
  text: 'Y al cabo de un rato, otro hombre, al verlo, dijo: «Tú también eres uno de ellos». Pero Pedro dijo: «Hombre, no soy[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «No soy uno de ellos». El griego dice simplemente: «no soy», dejando el objeto implícito por la acusación anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ βραχὺ
  english_pob_choice: after a little while
  chosen_spanish: después de un poco de tiempo
  alternatives_spanish:
  - poco después
  - al cabo de un rato
  lexicon: BDAG
  rationale: La expresión griega es temporal e idiomática; en español, «después de un poco de tiempo» mantiene el valor de breve intervalo sin sonar rígido. Se evita una calca demasiado literal que resulte poco natural.
- source_word: ἕτερος
  english_pob_choice: another man
  chosen_spanish: otro hombre
  alternatives_spanish:
  - otro
  - otra persona
  lexicon: BDAG
  rationale: ἕτερος aquí introduce a un segundo acusador individual. «Otro hombre» hace explícito el referente masculino singular, como en el contexto narrativo, sin añadir interpretación extra.
- source_word: ἰδὼν αὐτὸν
  english_pob_choice: seeing him
  chosen_spanish: al verlo
  alternatives_spanish:
  - viéndolo
  - cuando lo vio
  lexicon: BDAG
  rationale: El participio aoristo funciona como acción circunstancial previa o concomitante. «Al verlo» reproduce bien esa relación en español y conserva la concisión del griego.
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  - respondió
  lexicon: BDAG
  rationale: Como introducción narrativa del habla, «dijo» es el equivalente más natural y directo en español.
- source_word: Καὶ σὺ ἐξ αὐτῶν εἶ
  english_pob_choice: You also are one of them
  chosen_spanish: Tú también eres uno de ellos
  alternatives_spanish:
  - Tú también perteneces a ellos
  - Tú también eres de ellos
  lexicon: BDAG
  rationale: ἐξ αὐτῶν expresa pertenencia o asociación con el grupo. «Uno de ellos» conserva la acusación de membresía grupal que el inglés POB ya había identificado como sentido idiomático.
- source_word: Ἄνθρωπε
  english_pob_choice: Man
  chosen_spanish: Hombre
  alternatives_spanish:
  - Señor
  - Oye, hombre
  lexicon: BDAG
  rationale: El vocativo ἄνθρωπε es un trato directo, abrupto y despersonalizado. «Hombre» preserva ese tono y evita suavizarlo con «señor».
- source_word: οὐκ εἰμί
  english_pob_choice: I am not
  chosen_spanish: no lo soy
  alternatives_spanish:
  - no soy uno de ellos
  - no soy
  lexicon: BDAG
  rationale: 'El griego es elíptico: literalmente «no soy/no estoy». En español, «no lo soy» retiene la brevedad y deja implícito el objeto desde la acusación anterior, como hace el texto griego.'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto base griego y con la lectura auditada en inglés; no hay revisiones aplicadas ni variantes textuales relevantes en el paquete provisto. La decisión principal es estilística y lexical: mantener la elipsis final en el texto principal, con una nota que explicita el sentido implícito.'
  spanish_consistency_notes:
  - Se conserva «uno de ellos» para ἐξ αὐτῶν, alineado con la lectura idiomática del POB inglés.
  - Se evita «SEÑOR» o fórmulas eclesiásticas ajenas al griego; el vocativo queda como «Hombre».
  - La secuencia temporal se expresa con una construcción natural en español, sin perder la brevedad del original.
