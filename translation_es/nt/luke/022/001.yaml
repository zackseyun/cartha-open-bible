translation:
  language: es
  text: Se acercaba la fiesta de los panes sin levadura[a], llamada Pascua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pascua y la fiesta de los panes sin levadura estaban estrechamente relacionadas y en el uso judío podían mencionarse juntas o con nombres que se superponían.
    reason: cultural_note
lexical_decisions:
- source_word: Ἤγγιζεν
  english_pob_choice: was drawing near
  chosen_spanish: se acercaba
  alternatives_spanish:
  - estaba por llegar
  - se aproximaba
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción en curso o una llegada inminente; «se acercaba» conserva bien ese matiz aspectual en un español natural.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: —
  alternatives_spanish:
  - Ahora
  - Y
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona como transición narrativa suave. En español, puede dejarse implícita sin sobrecargar la frase con un adverbio que no aporta contenido semántico fuerte.
- source_word: ἑορτὴ
  english_pob_choice: Feast
  chosen_spanish: fiesta
  alternatives_spanish:
  - fiesta religiosa
  - celebración
  - festividad
  lexicon: BDAG
  rationale: ἑορτή designa una celebración religiosa; «fiesta» comunica bien ese sentido en español moderno. «Festividad» sería posible, pero menos directo.
- source_word: τῶν ἀζύμων
  english_pob_choice: of Unleavened Bread
  chosen_spanish: de los panes sin levadura
  alternatives_spanish:
  - de los ázimos
  - de los panes ázimos
  lexicon: BDAG
  rationale: En español bíblico, la expresión más clara y reconocible es «panes sin levadura». Mantiene el referente festivo sin tecnicismo innecesario.
- source_word: ἡ λεγομένη
  english_pob_choice: which is called
  chosen_spanish: llamada
  alternatives_spanish:
  - que se llama
  - conocida como
  - denominada
  lexicon: BDAG
  rationale: El participio pasivo introduce una identificación explicativa. «Llamada» reproduce esa función de manera breve y fiel.
- source_word: Πάσχα
  english_pob_choice: Passover
  chosen_spanish: Pascua
  alternatives_spanish:
  - Pascua de los judíos
  - Pascua
  lexicon: BDAG
  rationale: «Pascua» es el equivalente español natural para πάσχα como nombre de la festividad. Conserva la identificación tradicional sin perder claridad.
theological_decisions:
- issue: Relación entre la fiesta de los panes sin levadura y la Pascua
  english_pob_reading: 'Luke presents the terms as overlapping or closely related festival names: ''the Feast of Unleavened Bread, which is called Passover.'''
  chosen_spanish_reading: 'Lucas presenta los términos como designaciones relacionadas y superpuestas: «la fiesta de los panes sin levadura, llamada Pascua».'
  alternative_spanish_readings:
  - tratar «Pascua» como una fiesta totalmente distinta y cronológicamente separada
  - forzar una armonización técnica entre ambas designaciones
  rationale: El griego ofrece una identificación explicativa, no una distinción rígida. La traducción conserva la superposición de usos sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión textual y el uso judío del período festivo.
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés, especialmente la decisión de mantener la identificación explicativa entre la fiesta y Pascua sin imponer una distinción artificial.
  spanish_consistency_notes:
  - Se mantuvo «Pascua» como equivalente de πάσχα, coherente con el término festivo estándar en español.
  - «Panes sin levadura» preserva el sentido del plural griego ἀζύμων y su referencia a la fiesta judía.
  - La nota al pie explica la superposición cultural de los nombres sin alterar el texto principal.
