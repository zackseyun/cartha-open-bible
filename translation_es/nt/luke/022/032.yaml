base_translation:
  language: en
  yaml_path: translation/nt/luke/022/032.yaml
  text: But I have prayed for you[a], that your faith may not fail; and you, when you have turned back[b], strengthen your brothers.
  footnotes:
  - marker: a
    text: Or 'your faithfulness' or 'your trust may not fail.' The Greek word can carry overlapping senses.
    reason: alternative_reading
  - marker: b
    text: Or 'when you have returned' or 'when you have turned again.' The wording suggests restoration after Peter's coming failure.
    reason: lexical_alternative
