translation:
  language: es
  text: Pero yo he orado por ti[a], para que tu fe no desfallezca; y tú, cuando hayas vuelto[b], fortalece a tus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu fidelidad» o «tu confianza no desfallezca». La palabra griega puede abarcar sentidos superpuestos.
    reason: alternative_reading
  - marker: b
    text: O «cuando hayas regresado» o «cuando hayas vuelto otra vez». La redacción sugiere restauración después de la futura caída de Pedro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδεήθην
  english_pob_choice: have prayed
  chosen_spanish: he orado
  alternatives_spanish:
  - he pedido
  - he suplicado
  lexicon: BDAG
  rationale: En este contexto de intercesión de Jesús, «orar» comunica con naturalidad la petición dirigida a Dios y conserva el valor de súplica intensa sin volverlo coloquial o excesivo.
- source_word: περὶ σοῦ
  english_pob_choice: for you
  chosen_spanish: por ti
  alternatives_spanish:
  - acerca de ti
  - en favor de ti
  lexicon: BDAG
  rationale: Con verbos de oración, περί + genitivo expresa intercesión; «por ti» es la equivalencia española más natural y mantiene el sentido de favor e intercesión.
- source_word: ἵνα μὴ ἐκλίπῃ
  english_pob_choice: that ... may not fail
  chosen_spanish: para que ... no desfallezca
  alternatives_spanish:
  - para que ... no falle
  - para que ... no se apague
  - para que ... no llegue a faltar
  lexicon: BDAG
  rationale: «Desfallezca» conserva la idea de decaer o fallar sin fijarla demasiado en un solo matiz. En español suena natural aplicado a la fe y deja abierta la tensión entre debilidad y fracaso.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Se conserva el valor principal de πίστις como «fe», siguiendo el criterio doctrinal de no estrecharlo de entrada a «fidelidad» o «confianza», aunque esas resonancias sigan presentes.
- source_word: ποτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - una vez que
  - entonces que
  - alguna vez
  lexicon: BDAG
  rationale: Aquí ποτέ introduce un punto futuro indefinido; «cuando» fluye bien en español antes del participio y mantiene la referencia a un momento posterior de restauración.
- source_word: ἐπιστρέψας
  english_pob_choice: when you have turned back
  chosen_spanish: cuando hayas vuelto
  alternatives_spanish:
  - cuando hayas regresado
  - cuando hayas vuelto de nuevo
  - cuando te hayas vuelto
  lexicon: BDAG
  rationale: «Haber vuelto» conserva la imagen de retorno/restauración sin imponer de manera explícita el lenguaje técnico de arrepentimiento, preservando la tensión teológica del pasaje.
- source_word: στήρισον
  english_pob_choice: strengthen
  chosen_spanish: fortalece
  alternatives_spanish:
  - afirma
  - establece
  - haz firme
  lexicon: BDAG
  rationale: El imperativo pide hacer firmes a los demás después de la restauración de Pedro. «Fortalece» es claro, sobrio y comunica bien la idea de robustecer espiritualmente.
- source_word: ἀδελφούς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - creyentes
  lexicon: BDAG
  rationale: Se mantiene el plural masculino «hermanos» por fidelidad al referente inmediato y por la decisión de no neutralizar el género cuando el texto se dirige al grupo masculino de discípulos.
theological_decisions:
- issue: Alcance de πίστις en un contexto de prueba y posible caída
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: La traducción principal mantiene «fe» para reflejar la amplitud semántica de πίστις sin resolverla hacia una sola faceta. En el contexto, esa fe incluye confianza perseverante y lealtad, pero el español no debe estrechar el término más de lo que el griego exige.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; preserve overlapping senses'
- issue: Sentido de ἐπιστρέψας respecto a la futura restauración de Pedro
  english_pob_reading: when you have turned back
  chosen_spanish_reading: cuando hayas vuelto
  alternative_spanish_readings:
  - cuando hayas regresado
  - cuando te hayas vuelto
  - cuando hayas vuelto otra vez
  rationale: Se preserva el movimiento de retorno y la implicación de restauración después de la caída, sin convertir el participio en una declaración explícita de arrepentimiento que el griego no exige en la forma principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Identidad de ἀδελφούς en el círculo inmediato de Jesús
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - seguidores
  rationale: La forma masculina plural se conserva porque el referente inmediato son los discípulos varones presentes en la escena. Evita una neutralización que ampliaría indebidamente el destinatario del mandato.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El texto griego, la traducción inglesa auditada y la revisión más reciente muestran alto acuerdo. No se detectaron cambios necesarios respecto del enfoque previo; se mantuvo la lectura principal con preservación de las alternativas semánticas relevantes en notas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Fe» se mantiene como término principal para πίστις, con nota sobre matices de fidelidad/confianza.
  - «Hermanos» conserva el referente masculino plural del contexto inmediato.
  - La sintaxis española respeta la secuencia intercesión → propósito → restauración → mandato.
  - La frase «cuando hayas vuelto» evita cerrar indebidamente la tensión entre retorno, restauración y arrepentimiento.
