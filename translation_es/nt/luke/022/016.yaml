base_translation:
  language: en
  yaml_path: translation/nt/luke/022/016.yaml
  text: For I tell you that I will certainly not eat it until it is fulfilled in the kingdom of God[a][b].
  footnotes:
  - marker: a
    text: Or, 'I will never eat it again until it is fulfilled in the kingdom of God.' The Greek emphatically denies a future eating; some translations make the implied 'again' explicit from the context, but it is not stated in the Greek text.
    reason: lexical_alternative
  - marker: b
    text: '''It'' refers to the Passover just mentioned in the previous verse.'
    reason: cross_reference
