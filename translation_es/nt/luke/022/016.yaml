translation:
  language: es
  text: Porque les digo que ciertamente no lo comeré[a] hasta que se cumpla en el reino de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nunca más lo comeré». La negación griega es enfática y niega una acción futura; algunas traducciones hacen explícito el «más», pero ese elemento no está expresado de forma literal en el texto griego.'
    reason: lexical_alternative
  - marker: b
    text: «Lo» se refiere a la Pascua o comida pascual mencionada en el versículo anterior.
    reason: cross_reference
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  english_pob_choice: For I tell you
  chosen_spanish: Porque les digo
  alternatives_spanish:
  - Pues les digo
  - Porque les estoy diciendo
  lexicon: BDAG
  rationale: λέγω con dativo ὑμῖν es una fórmula de habla directa. «Les digo» expresa de manera natural la comunicación de Jesús; «Porque» conserva la conexión explicativa de γάρ con el versículo anterior.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: —
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: En español puede omitirse sin pérdida de claridad. Se conserva implícitamente la estructura de la cita directa sin forzar una subordinación innecesaria.
- source_word: οὐ μὴ φάγω
  english_pob_choice: I will certainly not eat
  chosen_spanish: ciertamente no lo comeré
  alternatives_spanish:
  - nunca más lo comeré
  - de ningún modo lo comeré
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con subjuntivo aoristo señala una negativa futura muy fuerte. «Ciertamente no» comunica esa fuerza en español actual. Se evita «nunca más» en el cuerpo principal porque añadiría explícitamente «más», que no aparece en el griego.
- source_word: αὐτό
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - esto
  - ese pan
  lexicon: BDAG
  rationale: El pronombre retoma el referente inmediato del contexto previo. «Lo» preserva la brevedad del griego; no se explicita «la Pascua» en el texto principal para no sobreespecificar más allá de este versículo.
- source_word: ἕως ὅτου
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta
  lexicon: BDAG
  rationale: «Hasta que» es la equivalencia natural en español para una cláusula temporal de límite.
- source_word: πληρωθῇ
  english_pob_choice: it is fulfilled
  chosen_spanish: se cumpla
  alternatives_spanish:
  - se complete
  - llegue a su cumplimiento
  lexicon: BDAG
  rationale: πληρόω en pasiva aquí transmite cumplimiento/consumación. «Se cumpla» conserva la resonancia bíblica de cumplimiento sin cargar una interpretación más específica.
- source_word: ἐν τῇ βασιλείᾳ τοῦ θεοῦ
  english_pob_choice: in the kingdom of God
  chosen_spanish: en el reino de Dios
  alternatives_spanish:
  - en el reino de Dios Padre
  - en el reino de Dios
  lexicon: BDAG
  rationale: «Reino» es la forma estable y clara en español para βασιλεία en este contexto. Se mantiene «de Dios» para conservar la construcción genitiva y el lenguaje bíblico habitual.
theological_decisions:
- issue: Referente de αὐτό
  english_pob_reading: The pronoun refers to the Passover meal just mentioned in the previous verse.
  chosen_spanish_reading: El pronombre se refiere a la Pascua/comida pascual mencionada en el versículo anterior.
  alternative_spanish_readings:
  - Se refiere de manera más amplia a la celebración pascual
  - Se refiere al pan/cena mencionados antes
  rationale: El griego usa un pronombre breve que depende del contexto inmediato. El español conserva esa brevedad con «lo» en el texto principal y deja el referente implícito, evitando una glosa excesiva.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de 'fulfilled in the kingdom of God'
  english_pob_reading: The wording preserves the text's eschatological fulfillment language without specifying exactly how the Passover is fulfilled.
  chosen_spanish_reading: La redacción conserva el lenguaje de cumplimiento escatológico sin precisar de qué modo se cumple la Pascua.
  alternative_spanish_readings:
  - cumplido por la venida del reino de Dios
  - cumplido en el banquete mesiánico
  rationale: El griego no explica el mecanismo ni el evento exacto de cumplimiento. «Se cumpla» mantiene la tensión teológica y evita resolverla en una interpretación más estrecha que la del texto.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del estado aprobado; se mantiene la fuerza de la negación griega, el referente contextual del pronombre y la ambigüedad teológica de ''se cumpla'' sin especificación adicional.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al criterio base del proyecto.
  - Se mantiene «reino» para βασιλεία y no se reescribe como «reinado» para no alterar el registro bíblico habitual del pasaje.
  - Se conserva «lo» para αὐτό para respetar la brevedad del original.
  - La negación enfática se expresa con «ciertamente no» en lugar de una fórmula más arcaica o más interpretativa.
