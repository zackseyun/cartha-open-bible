  source_alignment_summary: 'El borrador refleja bien la estructura y la mayoría de las decisiones léxicas del griego: κἀκεῖνος = «Y él», δείξει = «les mostrará», ἀνάγαιον μέγα ἐστρωμένον = «un gran aposento alto[a] amueblado», ἐκεῖ = «allí». Sin embargo, ἑτοιμάσατε no lleva objeto expreso en griego; «prepárenlo allí» añade un objeto directo («lo») no presente y puede sugerir preparar el aposento, cuando el sentido contextual es hacer allí los preparativos de la Pascua.'
  spanish_quality_summary: El español es claro y digno. «Aposento alto» es tradicional pero todavía inteligible en registro bíblico. La frase mejora en naturalidad y fidelidad si el imperativo final se traduce «preparen allí» o «hagan allí los preparativos», evitando el objeto añadido. También conviene mantener la nota léxica ya que «ἐστρωμένον» admite el matiz de «ya preparado/dispuesto».
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Aposento alto» representa bien ἀνάγαιον; «amueblado» sigue la decisión POB para ἐστρωμένον, con alternativas preservadas en nota. No hay términos teológicos sensibles en este versículo.
