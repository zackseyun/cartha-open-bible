translation:
  language: es
  text: Y él les mostrará un gran aposento alto[a] amueblado; preparen allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un gran aposento alto ya preparado» o «un gran aposento alto con los muebles dispuestos».
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖνος
  english_pob_choice: And he
  chosen_spanish: Y él
  alternatives_spanish:
  - Y aquel
  - Y ese hombre
  lexicon: BDAG
  rationale: El griego retoma al hombre mencionado antes de manera pronominal y continuativa. En español, «Y él» conserva la referencia y suena natural; «aquel» o «ese hombre» introducirían una distancia o explicitud que el contexto no exige.
- source_word: δείξει
  english_pob_choice: will show
  chosen_spanish: les mostrará
  alternatives_spanish:
  - les enseñará
  - les indicará
  lexicon: BDAG
  rationale: El futuro de δείκνυμι se rinde bien por «mostrará» o «hará ver». «Les mostrará» preserva la acción de señalar/indicar sin sobrecargar el verbo.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - les mostrará a ustedes
  lexicon: BDAG
  rationale: El dativo plural se integra naturalmente en español con el pronombre de objeto indirecto «les», manteniendo la relación verbal sin añadir una preposición innecesaria.
- source_word: ἀνάγαιον
  english_pob_choice: upper room
  chosen_spanish: aposento alto
  alternatives_spanish:
  - cuarto alto
  - habitación alta
  lexicon: BDAG
  rationale: Aunque «upper room» podría sonar como «habitación de arriba», «aposento alto» es una equivalencia española tradicional y precisa para un cuarto en el piso superior. Conserva el valor espacial del término sin perder claridad.
- source_word: μέγα
  english_pob_choice: large
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - espacioso
  lexicon: BDAG
  rationale: «Gran» funciona como adjetivo antepuesto natural en español y transmite el tamaño del aposento. «Grande» también es posible, pero «gran» fluye mejor en esta construcción.
- source_word: ἐστρωμένον
  english_pob_choice: furnished
  chosen_spanish: amueblado
  alternatives_spanish:
  - preparado
  - dispuesto
  lexicon: BDAG
  rationale: El participio perfecto pasivo de στρώννυμι sugiere algo tendido, arreglado o dispuesto para usar. La POB inglesa eligió «furnished» para captar el estado resultante; en español, «amueblado» comunica de forma natural que el aposento ya estaba listo con el mobiliario dispuesto. Se preserva la alternativa semántica de «preparado» en nota.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: El adverbio locativo se traduce de manera directa por «allí», manteniendo la referencia espacial clara y sobria.
- source_word: ἑτοιμάσατε
  english_pob_choice: prepare
  chosen_spanish: prepárenlo
  alternatives_spanish:
  - prepárenlo allí
  - háganlo listo
  - preparen allí
  lexicon: BDAG
  rationale: El imperativo plural pide que los discípulos hagan los arreglos necesarios. En español, el objeto implícito puede recuperarse con «lo», referido al lugar/aposento indicado por el contexto. Esto hace explícita la acción preparatoria sin perder la brevedad del mandato.
theological_decisions:
- issue: 'Alcance de ἐστρωμένον: si implica «amueblado» o «ya preparado»'
  english_pob_reading: large furnished upper room; footnote allows 'a large upper room already prepared' or 'with furnishings set out.'
  chosen_spanish_reading: un gran aposento alto amueblado
  alternative_spanish_readings:
  - un gran aposento alto ya preparado
  - un gran aposento alto con los muebles dispuestos
  rationale: 'No hay una tensión doctrinal, pero sí una decisión lexical importante: el participio perfecto pasivo describe un estado resultante. «Amueblado» recoge la idea de disposición para uso, mientras que la nota preserva las alternativas que la traducción inglesa documentó: preparado o con muebles dispuestos.'
  doctrine_reference: Ninguna específica; decisión lexical sobre el estado del aposento.
translation_notes:
  revision_awareness: La redacción sigue de cerca el análisis griego y el criterio óptimo-equivalente del POB en inglés. Se mantuvo la secuencia narrativa, el matiz locativo de ἐκεῖ y la ambigüedad productiva de ἐστρωμένον mediante una nota de alternativa, sin forzar una paráfrasis más amplia que la que el texto sustenta.
  spanish_consistency_notes:
  - Se usa «Y él» para κἀκεῖνος, evitando duplicar la referencia con un demostrativo innecesario.
  - Se prefirió «aposento alto» como equivalente español estable de ἀνάγαιον, en vez de un calco como «cuarto de arriba».
  - Se conserva el plural indirecto «les» para ὑμῖν, en coherencia con el mandato dirigido a los discípulos.
  - La nota a mantiene las alternativas léxicas documentadas por la traducción inglesa, adaptadas a un español natural.
