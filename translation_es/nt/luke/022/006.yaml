translation:
  language: es
  text: Y aceptó, y comenzó a buscar una oportunidad para entregarlo[a] a ellos sin que estuviera presente la multitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «traicionarlo». El verbo griego significa literalmente «entregar» o «poner en manos de»; en el papel de Judas, «traicionarlo» es una traducción interpretativa válida por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξωμολόγησεν
  english_pob_choice: agreed
  chosen_spanish: estuvo de acuerdo
  alternatives_spanish:
  - consintió
  - aceptó
  lexicon: BDAG
  rationale: En este contexto Judas responde positivamente a la propuesta de los principales sacerdotes; por eso el valor de consentimiento es el más claro. «Estuvo de acuerdo» conserva ese matiz sin forzar un sentido de «confesar» que aquí no encaja narrativamente.
- source_word: ἐζήτει
  english_pob_choice: began seeking
  chosen_spanish: buscaba
  alternatives_spanish:
  - comenzó a buscar
  - andaba buscando
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso. «Buscaba» comunica bien esa continuidad en español y suena natural; mantiene el movimiento narrativo de la escena sin añadir más de lo que el griego exige.
- source_word: εὐκαιρίαν
  english_pob_choice: an opportunity
  chosen_spanish: una oportunidad
  alternatives_spanish:
  - una ocasión favorable
  - un momento propicio
  lexicon: BDAG
  rationale: «Oportunidad» es la equivalencia más directa y comprensible en español, y recoge la idea de una ocasión favorable para actuar.
- source_word: παραδοῦναι
  english_pob_choice: to hand him over
  chosen_spanish: entregarlo
  alternatives_spanish:
  - ponerlo en manos de ellos
  - traicionarlo
  lexicon: BDAG
  rationale: El verbo παραδίδωμι significa literalmente «entregar / poner en manos de». En este pasaje, «entregarlo» conserva la fuerza léxica básica sin reemplazarla por «traicionarlo», que es interpretativo aunque contextualmente posible.
- source_word: ἄτερ ὄχλου
  english_pob_choice: apart from the crowd
  chosen_spanish: aparte de la multitud
  alternatives_spanish:
  - sin la multitud
  - lejos de la multitud
  lexicon: BDAG
  rationale: «Ἄτερ» indica ausencia o separación respecto de la multitud. «Aparte de la multitud» mantiene esa idea de exclusión del público presente con un español claro y sobrio.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - para ellos
  lexicon: BDAG
  rationale: El dativo señala a los destinatarios de la entrega, es decir, a los principales sacerdotes y los oficiales del contexto inmediato. «A ellos» es transparente y natural en español.
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego y conserva la progresión aspectual del imperfecto con una formulación natural en español. La decisión clave fue mantener el valor básico de παραδίδωμι como «entregar» y no sustituirlo por una traducción meramente interpretativa.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el versículo.
  - Se mantuvo un registro sobrio y publicable, apto para lectura litúrgica o de estudio.
  - La referencia a la multitud conserva la ambigüedad espacial del griego sin explicitar más de lo necesario.
