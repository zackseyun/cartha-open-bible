translation:
  language: es
  text: Y después de levantarse de la oración[a], vino a los discípulos y los halló durmiendo a causa de la tristeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «los halló dormidos a causa de la tristeza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: after rising
  chosen_spanish: después de levantarse
  alternatives_spanish:
  - habiéndose levantado
  - después de haberse levantado
  lexicon: BDAG
  rationale: El participio aoristo antecede temporalmente al verbo principal. «Después de levantarse» conserva el orden de acciones sin sonar forzado en español.
- source_word: ἀπὸ τῆς προσευχῆς
  english_pob_choice: from prayer
  chosen_spanish: de la oración
  alternatives_spanish:
  - desde la oración
  - después de la oración
  lexicon: BDAG
  rationale: La preposición ἀπό con genitivo se puede expresar de forma cercana con «de». «Después de la oración» aclara la secuencia, pero interpreta más de lo que exige el griego.
- source_word: ἐλθὼν πρὸς τοὺς μαθητὰς
  english_pob_choice: he came to the disciples
  chosen_spanish: vino a los discípulos
  alternatives_spanish:
  - fue a los discípulos
  - acudió a los discípulos
  lexicon: BDAG
  rationale: πρός con acusativo indica movimiento hacia ellos. «Vino a» mantiene naturalidad y fidelidad al movimiento descrito.
- source_word: μαθητὰς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  - alumnos
  lexicon: BDAG
  rationale: En los evangelios, μαθητής se traduce con precisión y de manera estable como «discípulo».
- source_word: εὗρεν
  english_pob_choice: found
  chosen_spanish: los halló
  alternatives_spanish:
  - los encontró
  - los halló allí
  lexicon: BDAG
  rationale: «Hallar» es un equivalente directo y digno de εὑρίσκω; además conserva el tono narrativo bíblico sin caer en una paraphrase.
- source_word: κοιμωμένους αὐτούς
  english_pob_choice: them sleeping
  chosen_spanish: durmiendo
  alternatives_spanish:
  - dormidos
  - en sueño
  lexicon: BDAG
  rationale: El participio presente describe su estado al ser hallados. «Durmiendo» preserva la fuerza verbal mejor que el adjetivo «dormidos».
- source_word: ἀπὸ τῆς λύπης
  english_pob_choice: from sorrow
  chosen_spanish: a causa de la tristeza
  alternatives_spanish:
  - por la tristeza
  - debido a la tristeza
  - de tristeza
  lexicon: BDAG
  rationale: Aquí ἀπό expresa causa. «A causa de» explicita la relación causal que el inglés POB también documenta, y «tristeza» es un equivalente natural de λύπη en este contexto emocional.
theological_decisions:
- issue: Causa del sueño de los discípulos
  english_pob_reading: Their sleeping is presented as resulting from sorrow.
  chosen_spanish_reading: Su sueño se presenta como resultado de la tristeza.
  alternative_spanish_readings:
  - Estaban dormidos mientras estaban tristes, sin énfasis causal fuerte.
  - Dormían por la tristeza, con causalidad explícita pero más breve.
  rationale: La frase griega ἀπὸ τῆς λύπης normalmente expresa causa. La traducción española mantiene esa relación sin añadir detalles psicológicos no presentes en el texto.
  doctrine_reference: Preservar la tensión contextual sin resolverla; no hay controversia doctrinal mayor.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto fuente y con la auditoría inglesa. No se detectaron revisiones aplicadas en la fuente inglesa reciente; se conserva la lectura causal de ἀπὸ τῆς λύπης y el orden narrativo de los participios.
  spanish_consistency_notes:
  - Se mantiene «discípulos» como término técnico estable para μαθηταί.
  - Se evita «SEÑOR» o sustituciones teológicas no presentes en este versículo.
  - «Halló» y «vino a» conservan un registro bíblico claro sin arcaísmo excesivo.
  - «A causa de la tristeza» comunica la causalidad del griego sin forzar una explicación adicional.
