    rationale: 'En español más natural y en línea con la puntuación del original, una coma fluye mejor: «Porque les digo, no beberé...».'
  revised_spanish_text: Porque les digo, no beberé de ahora en adelante del fruto de la vid[a], hasta que venga el reino de Dios.
