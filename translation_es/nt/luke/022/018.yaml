translation:
  language: es
  text: Porque les digo, no beberé de ahora en adelante del fruto de la vid[a], hasta que venga el reino de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vino». La expresión griega dice literalmente «fruto de la vid», una formulación más amplia que probablemente se refiere al contenido de la copa sin usar la palabra común para vino.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  english_pob_choice: For I tell you
  chosen_spanish: Porque les digo
  alternatives_spanish:
  - Porque les digo a ustedes
  - Pues les digo
  lexicon: BDAG
  rationale: γάρ conserva la conexión explicativa con «Porque». λέγω con ὑμῖν funciona como fórmula directa de dirección; «les digo» es natural en español y preserva el sentido de comunicación directa sin cargar de formalidad innecesaria.
- source_word: οὐ μὴ πίω
  english_pob_choice: I will certainly not drink
  chosen_spanish: no beberé
  alternatives_spanish:
  - no beberé en absoluto
  - nunca beberé
  lexicon: BDAG
  rationale: La construcción οὐ μή con subjuntivo aoristo expresa una negación enfática de fuerte certeza futura. En español, el futuro simple negativo comunica bien esa firmeza; añadir «en absoluto» sería posible, pero puede sobrecargar el texto.
- source_word: ἀπὸ τοῦ νῦν
  english_pob_choice: from now on
  chosen_spanish: de ahora en adelante
  alternatives_spanish:
  - desde ahora
  - a partir de ahora
  lexicon: BDAG
  rationale: La locución marca el punto de inicio desde el momento presente y una continuidad posterior. «De ahora en adelante» es idiomático en español y conserva ese valor durativo.
- source_word: ἀπὸ τοῦ γενήματος τῆς ἀμπέλου
  english_pob_choice: from the fruit of the vine
  chosen_spanish: del fruto de la vid
  alternatives_spanish:
  - del producto de la vid
  - de la vid
  lexicon: BDAG
  rationale: γένημα indica lo producido, fruto o producto. «Fruto de la vid» mantiene la expresión amplia del griego y evita sustituirla por «vino», que sería más interpretativo que el original.
- source_word: ἕως οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta cuando
  lexicon: BDAG
  rationale: Introduce el límite temporal de la negación. «Hasta que» es la equivalencia natural y clara en español para una cláusula temporal futura.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el reino de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la traducción estable y fiel de βασιλεία en los Sinópticos. Aunque βασιλεία puede sugerir también «reinado», el contexto escatológico y la idiomaticidad bíblica favorecen «reino».
- source_word: ἔλθῃ
  english_pob_choice: comes
  chosen_spanish: venga
  alternatives_spanish:
  - llegue
  - llegue a venir
  lexicon: BDAG
  rationale: En cláusula temporal con ἕως οὗ, el subjuntivo aoristo se expresa naturalmente en español con subjuntivo presente. «Venga» preserva la orientación futura sin especificar más de lo que el texto dice.
theological_decisions:
- issue: Whether to render γενήματος τῆς ἀμπέλου as 'vino' or a broader phrase
  english_pob_reading: fruit of the vine
  chosen_spanish_reading: fruto de la vid
  alternative_spanish_readings:
  - vino
  - producto de la vid
  rationale: El griego no usa la palabra ordinaria para vino. Mantener «fruto de la vid» conserva la amplitud semántica y la resonancia litúrgica sin reducir el sentido a una equivalencia más estrecha que la del texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of the eschatological boundary phrase
  english_pob_reading: until the kingdom of God comes
  chosen_spanish_reading: hasta que venga el reino de Dios
  alternative_spanish_readings:
  - hasta que haya venido el reino de Dios
  - hasta que el reino de Dios llegue plenamente
  rationale: La frase fija un límite temporal futuro sin explicar el modo o la fase de esa venida. «Venga» preserva la tensión escatológica sin resolverla ni armonizarla con una interpretación sistemática específica.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el pasaje base; la versión española se alinea con el último pase del texto inglés, que fue revisado y confirmado como estable por el auditor. Se mantuvo la tensión semántica de γενήματος τῆς ἀμπέλου y la clausula escatológica final sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usa «Dios» y no una sustitución reverencial en mayúsculas, conforme a la norma del proyecto.
  - Se mantiene «reino de Dios» como equivalente estable de βασιλεία τοῦ θεοῦ.
  - La negación enfática se resuelve con futuro simple negativo, evitando una construcción arcaica.
  - La puntuación y la colocación de comas siguen un estilo bíblico claro y publicable en español.
