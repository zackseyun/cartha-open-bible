lexical_decisions:
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  - si alguna vez
  lexicon: BDAG
  rationale: Introduce una condición simple. En español, "si" comunica la relación condicional sin añadir énfasis que el griego no exige.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora bien
  lexicon: BDAG
  rationale: El valor adversativo encaja mejor con "pero" en este contexto de contraste con lo anterior.
- source_word: ἐρωτήσω
  english_pob_choice: I ask
  chosen_spanish: pregunto
  alternatives_spanish:
  - interrogo
  - consulto
  lexicon: BDAG
  rationale: El verbo puede abarcar pedir o formular una pregunta. "Pregunto" es el equivalente más natural y suficientemente amplio en español, sin intensificarlo a "interrogar".
- source_word: οὐ μὴ
  english_pob_choice: will certainly not
  chosen_spanish: de ningún modo
  alternatives_spanish:
  - ciertamente no
  - de ninguna manera
  - de modo alguno
  lexicon: BDAG
  rationale: La negación enfática doble requiere una forma intensiva en español. "De ningún modo" preserva bien la fuerza absoluta de la negativa.
- source_word: ἀποκριθῆτε
  english_pob_choice: answer
  chosen_spanish: responderán
  alternatives_spanish:
  - contestarán
  - replicarán
  lexicon: BDAG
  rationale: En este diálogo judicial, "responder" es un equivalente natural de ἀποκρίνομαι. Se prefiere la forma futura para reflejar la construcción condicional prospectiva del griego y el sentido seguro de la negación.
translation_notes:
  revision_awareness: El texto griego presenta una condición futura más viva con negación enfática (ἐὰν ... ἐρωτήσω, οὐ μὴ ἀποκριθῆτε). La versión española mantiene el contraste adversativo, la condición y la fuerza absoluta de la negativa sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se usa "pregunto" para ἐρωτήσω siguiendo el valor natural del contexto interrogativo.
  - Se conserva una negación fuerte con "de ningún modo" para reflejar οὐ μὴ.
  - No se introduce léxico eclesiástico ajeno al pasaje; el tono es sobrio y judicial.
