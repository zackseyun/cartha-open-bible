translation:
  language: es
  text: Mientras él todavía hablaba, he aquí que llegó una multitud, y el llamado Judas, uno de los doce, iba delante de ellos[a], y se acercó a Jesús para besarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «iba guiándolos» / «iba al frente de ellos» para «iba delante de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι αὐτοῦ λαλοῦντος
  english_pob_choice: While he was still speaking
  chosen_spanish: Mientras él todavía hablaba
  alternatives_spanish:
  - Mientras aún hablaba
  - Cuando él todavía hablaba
  lexicon: BDAG
  rationale: El genitivo absoluto con ἔτι expresa acción en curso y simultánea. «Mientras él todavía hablaba» conserva esa simultaneidad con un español natural y digno.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - de repente
  lexicon: BDAG
  rationale: «He aquí» preserva el valor discursivo de atención súbita y la vividez narrativa sin diluirlo en una paráfrasis explicativa.
- source_word: ὄχλος
  english_pob_choice: a crowd came
  chosen_spanish: una multitud
  alternatives_spanish:
  - una multitud llegó
  - un gentío
  lexicon: BDAG
  rationale: ὄχλος designa una multitud o muchedumbre. En español, el contexto ya sugiere la irrupción del grupo; por eso puede mantenerse «una multitud» sin añadir innecesariamente un verbo en el texto principal.
- source_word: ὁ λεγόμενος Ἰούδας
  english_pob_choice: the one called Judas
  chosen_spanish: el llamado Judas
  alternatives_spanish:
  - el hombre llamado Judas
  - el así llamado Judas
  lexicon: BDAG
  rationale: «El llamado Judas» reproduce de cerca el participio pasivo nominalizado y evita matices interpretativos ajenos al griego.
- source_word: εἷς τῶν δώδεκα
  english_pob_choice: one of the twelve
  chosen_spanish: uno de los doce
  alternatives_spanish:
  - uno de los Doce
  lexicon: BDAG
  rationale: Es la equivalencia idiomática directa y conserva la ironía identificadora de que Judas pertenece al grupo de los doce.
- source_word: προήρχετο αὐτούς
  english_pob_choice: was going before them
  chosen_spanish: iba delante de ellos
  alternatives_spanish:
  - los iba guiando
  - iba al frente de ellos
  lexicon: BDAG
  rationale: El imperfecto pide un valor progresivo/continuativo. «Iba delante de ellos» mantiene el sentido de preceder sin exagerar la idea de liderazgo formal, aunque esa posibilidad exista.
- source_word: ἤγγισεν τῷ Ἰησοῦ
  english_pob_choice: he came near to Jesus
  chosen_spanish: se acercó a Jesús
  alternatives_spanish:
  - se aproximó a Jesús
  - llegó cerca de Jesús
  lexicon: BDAG
  rationale: El aoristo de ἐγγίζω expresa acercamiento puntual. «Se acercó a Jesús» es claro y natural en español.
- source_word: φιλῆσαι αὐτόν
  english_pob_choice: to kiss him
  chosen_spanish: para besarlo
  alternatives_spanish:
  - para darle un beso
  - para saludarlo con un beso
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa la intención de besar. «Para besarlo» conserva la sencillez del griego y evita introducir una explicación que el texto no formula.
theological_decisions:
- issue: No explicitar en el versículo la traición de Judas
  english_pob_reading: Render the approach and kiss straightforwardly without adding interpretive language such as 'betray' in the verse itself.
  chosen_spanish_reading: Traducir el acercamiento y el beso de manera directa, sin añadir «traicionar» o una glosa interpretativa en el texto principal.
  alternative_spanish_readings:
  - para traicionarlo con un beso
  - para besarlo en señal de traición
  rationale: La escena posterior y el contexto narrativo muestran la traición, pero el enunciado griego de este versículo describe el acercamiento y la intención de besar. Mantener la formulación directa preserva la tensión narrativa y respeta el alcance del original.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que no introdujo cambios adicionales y mostró alta concordancia con el control cruzado; por ello no se aplicaron modificaciones respecto del sentido base auditado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando corresponda, aunque este versículo no contiene el tetragrámaton.
  - Se conservó el paralelismo de la audit trail inglesa entre la aparición de la multitud, la identificación de Judas y su acercamiento a Jesús.
  - «He aquí» se usó como marcador narrativo breve y solemne, coherente con el registro del texto.
  - El uso de «besarlo» evita sobretraducción; la posible lectura de beso de saludo queda como alternativa en la nota.
