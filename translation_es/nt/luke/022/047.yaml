- from: Mientras él todavía hablaba[a], he aquí una multitud; y el llamado Judas, uno de los doce, iba delante de ellos, y se acercó a Jesús para besarlo.
  to: Mientras él todavía hablaba, he aquí que llegó una multitud, y el llamado Judas, uno de los doce, iba delante de ellos[a], y se acercó a Jesús para besarlo.
  rationale: Se revisa únicamente la expresión de ἰδοὺ ὄχλος para que el español preserve mejor la irrupción de la multitud y forme una cláusula natural, en línea con la justificación auditada del inglés. Se mantiene el resto del versículo porque refleja fielmente el griego y las decisiones léxicas y teológicas documentadas.
