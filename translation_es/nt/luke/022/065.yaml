    changes_summary: Replaced 'kept saying' with 'were saying' for a more direct rendering of the imperfect ἔλεγον, while retaining the sense of repeated speech. Kept 'blasphemous things against him' to reflect βλασφημοῦντες ... εἰς αὐτόν naturally and completely.
translation:
  language: es
  text: Y decían muchas otras cosas blasfemas contra él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - También
  - Entonces
  lexicon: BDAG
  rationale: Conecta la oración con la acción previa de manera simple y natural en español.
- source_word: ἕτερα πολλὰ
  english_pob_choice: many other
  chosen_spanish: muchas otras
  alternatives_spanish:
  - muchas más
  - otras muchas
  lexicon: BDAG
  rationale: La combinación expresa cantidad adicional respecto de lo anterior; en español, «muchas otras» conserva ese valor idiomático sin sobrecarga.
- source_word: βλασφημοῦντες
  english_pob_choice: blasphemous things
  chosen_spanish: cosas blasfemas
  alternatives_spanish:
  - cosas de blasfemia
  - cosas injuriosas
  - cosas insultantes
  lexicon: BDAG
  rationale: Se mantiene el peso fuerte de βλασφημέω. «Blasfemas» preserva el carácter de habla irreverente y hostil contra Jesús, sin reducirlo a mera injuria.
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida; en español, el imperfecto simple «decían» transmite bien ese valor sin redundancia.
- source_word: εἰς αὐτόν
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - a él
  - hacia él
  lexicon: BDAG
  rationale: El contexto es de habla hostil; «contra él» reproduce el matiz adversativo que el inglés POB documenta para εἰς en este pasaje.
theological_decisions:
- issue: Conservar el peso de βλασφημοῦντες sin suavizarlo a simple insulto
  english_pob_reading: Retain the stronger sense with 'blasphemous things'
  chosen_spanish_reading: Conservar «cosas blasfemas»
  alternative_spanish_readings:
  - cosas insultantes
  - cosas injuriosas
  rationale: El contexto presenta un trato irreverente y hostil hacia Jesús. Mantener «blasfemas» preserva la gravedad del término y evita diluir el juicio del texto.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue la última revisión del inglés POB, que prefirió una forma más directa del imperfecto («were saying») sin perder el matiz iterativo. En español, el imperfecto simple «decían» cumple esa función de modo natural. También se conservó el valor hostil de εἰς αὐτόν mediante «contra él».
  spanish_consistency_notes:
  - Se usa «él» para Jesús de forma consistente con el pronombre de tercera persona en contexto narrativo.
  - Se mantiene «blasfemas» como equivalente fuerte y transparente de βλασφημοῦντες.
  - No se introdujeron notas al pie porque la decisión léxica principal puede expresarse claramente en el texto principal.
