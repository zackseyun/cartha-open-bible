translation:
  language: es
  text: 'Pero él les dijo: «Los reyes de los gentiles[a] se enseñorean de ellos, y los que ejercen autoridad sobre ellos son llamados benefactores».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  lexicon: BDAG
  rationale: δέ marca contraste suave con el contexto inmediato; en español, «Pero» comunica bien esa oposición sin sonar arcaico.
- source_word: βασιλεῖς
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - gobernantes
  lexicon: BDAG
  rationale: El griego especifica reyes, no solo gobernantes generales; «reyes» conserva esa precisión política.
- source_word: τῶν ἐθνῶν
  english_pob_choice: of the Gentiles
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  - de los pueblos
  lexicon: BDAG
  rationale: En español, «naciones» mantiene la amplitud semántica de ἔθνη y evita una lectura eclesiástica demasiado técnica; la nota documenta que también puede entenderse como «gentiles» en el uso del NT.
- source_word: κυριεύουσιν
  english_pob_choice: lord it over
  chosen_spanish: se enseñorean de
  alternatives_spanish:
  - dominan sobre
  - se imponen sobre
  lexicon: BDAG
  rationale: «Se enseñorean de» preserva la fuerza de dominio abusivo del verbo mejor que un simple «gobiernan» o «mandan».
- source_word: ἐξουσιάζοντες
  english_pob_choice: those exercising authority
  chosen_spanish: los que ejercen autoridad
  alternatives_spanish:
  - los que tienen autoridad
  - los que usan su autoridad
  lexicon: BDAG
  rationale: El participio se vierte verbalmente para conservar la acción de ejercer autoridad, no solo el estado de poseerla.
- source_word: εὐεργέται
  english_pob_choice: benefactors
  chosen_spanish: benefactores
  alternatives_spanish:
  - patronos
  - hacedores de bien
  lexicon: BDAG
  rationale: «Benefactores» reproduce el título honorífico grecorromano señalado en la auditoría inglesa y funciona como equivalente conciso en español.
- source_word: καλοῦνται
  english_pob_choice: are called
  chosen_spanish: son llamados
  alternatives_spanish:
  - son nombrados
  - son conocidos como
  lexicon: BDAG
  rationale: El pasivo simple expresa de manera directa el nombre o título por el que son conocidos.
theological_decisions:
- issue: Valor de τῶν ἐθνῶν en el contraste de Jesús
  english_pob_reading: Gentiles
  chosen_spanish_reading: naciones
  alternative_spanish_readings:
  - gentiles
  rationale: La frase contrasta el estilo de poder de los pueblos no pertenecientes a Israel con el modelo de liderazgo que Jesús enseñará a sus discípulos. «Naciones» conserva el sentido léxico amplio; la nota deja abierta la lectura común del NT como «gentiles».
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El pasaje coincide con la versión auditada más reciente: no se registran revisiones posteriores ni cambios de lectura en la fuente inglesa; se mantiene la equivalencia óptima sin añadir material interpretativo.'
  spanish_consistency_notes:
  - Se mantuvo el tono sobrio y público adecuado para una traducción bíblica.
  - «Benefactores» se conserva como título, no como simple descripción moral.
  - La nota sobre «naciones/gentiles» preserva la alternativa léxica documentada sin cargar el texto principal con una glosa.
  - Se evitó «SEÑOR» para no introducir una convención de sustitución que no corresponde al griego de este versículo.
