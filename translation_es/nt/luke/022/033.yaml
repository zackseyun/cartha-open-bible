translation:
  language: es
  text: 'Pero él le dijo: «Señor, estoy listo para ir contigo tanto a la cárcel como a la muerte».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: But he
  chosen_spanish: Pero él
  alternatives_spanish:
  - Y él
  - Entonces él
  lexicon: BDAG
  rationale: El artículo con valor pronominal remite a Pedro, y δέ introduce una leve oposición o continuación. «Pero él» conserva el contraste inmediato con la afirmación previa de Jesús y suena natural en español.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - se lo dijo
  lexicon: BDAG
  rationale: La forma verbal y el dativo se expresan con naturalidad en español como «le dijo». Mantiene la relación directa sin sobreespecificar en el cuerpo del texto.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En el habla dirigida a Jesús, «Señor» es el equivalente reverente y estándar en español para κύριος. Preserva el valor de título sin reducirlo a un simple tratamiento social.
- source_word: μετὰ σοῦ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - con ti
  lexicon: BDAG
  rationale: La preposición con pronombre de segunda persona se vuelve de forma natural «contigo», que mantiene la idea de acompañamiento expresada por μετά con genitivo.
- source_word: ἕτοιμός εἰμι
  english_pob_choice: I am ready
  chosen_spanish: estoy listo
  alternatives_spanish:
  - estoy preparado
  - estoy dispuesto
  lexicon: BDAG
  rationale: La expresión idiomática comunica disposición y preparación. «Estoy listo» es la forma más natural y directa en español, conservando la autoafirmación de Pedro.
- source_word: καὶ ... καὶ
  english_pob_choice: both ... and
  chosen_spanish: tanto ... como
  alternatives_spanish:
  - así ... como
  - ya ... ya
  lexicon: BDAG
  rationale: La construcción correlativa en español reproduce bien el paralelismo enfático de los dos destinos. «Tanto ... como» conserva el equilibrio retórico del griego.
- source_word: εἰς φυλακὴν
  english_pob_choice: to prison
  chosen_spanish: a la cárcel
  alternatives_spanish:
  - a prisión
  - hasta la cárcel
  lexicon: BDAG
  rationale: φυλακή aquí denota reclusión o encarcelamiento. «A la cárcel» es natural y claro en español, con la misma dirección hacia el lugar de confinamiento.
- source_word: εἰς θάνατον
  english_pob_choice: to death
  chosen_spanish: a la muerte
  alternatives_spanish:
  - hasta la muerte
  - incluso a la muerte
  lexicon: BDAG
  rationale: La expresión señala disposición a llegar hasta la muerte. «A la muerte» conserva la paralela sintaxis con «a la cárcel» y el sentido de avance hasta ese extremo.
- source_word: πορεύεσθαι
  english_pob_choice: to go
  chosen_spanish: ir
  alternatives_spanish:
  - caminar
  - marchar
  lexicon: BDAG
  rationale: El infinitivo complementa la idea de estar dispuesto a acompañar. «Ir» es el equivalente más natural en español y no introduce matices ajenos de viaje solemne o militar.
theological_decisions:
- issue: Tratamiento de κύριος aplicado a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: La guía doctrinal del POB favorece «Lord» para κύριος. En español, «Señor» conserva el título cristológico y la reverencia en la dirección a Jesús, sin diluir el peso teológico del vocativo.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El texto sigue de cerca el griego y coincide con la lectura inglesa auditada; no se documentan revisiones textuales o variantes que requieran nota.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en vocativo dirigido a Jesús.
  - Se emplea «cárcel» para φυλακή por naturalidad en español, sin perder el sentido de encarcelamiento.
  - Se conserva el paralelismo con «tanto ... como» para reflejar el griego καὶ ... καὶ.
