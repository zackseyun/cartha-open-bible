translation:
  language: es
  text: Y al salir, fue al Monte de los Olivos, como era su costumbre[a]; y los discípulos también lo siguieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según su costumbre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  english_pob_choice: going out
  chosen_spanish: al salir
  alternatives_spanish:
  - saliendo
  - después de salir
  lexicon: BDAG
  rationale: El participio aoristo se vierte como acción previa al verbo principal. «Al salir» preserva la secuencia narrativa de manera natural en español sin sobrecargar el texto.
- source_word: ἐπορεύθη
  english_pob_choice: he went
  chosen_spanish: fue
  alternatives_spanish:
  - iba
  - se fue
  - anduvo
  lexicon: BDAG
  rationale: El verbo de movimiento narrativo se expresa con un español simple y fluido. «Fue» comunica bien el avance de la acción en contexto.
- source_word: κατὰ τὸ ἔθος
  english_pob_choice: as was his custom
  chosen_spanish: según su costumbre
  alternatives_spanish:
  - como era su costumbre
  - conforme a su costumbre
  lexicon: BDAG
  rationale: La frase indica práctica habitual. En español, «según su costumbre» conserva el valor de costumbre sin añadir demasiado, y mantiene explícita la referencia implícita a Jesús.
- source_word: εἰς τὸ Ὄρος τῶν Ἐλαιῶν
  english_pob_choice: to the Mount of Olives
  chosen_spanish: al monte de los Olivos
  alternatives_spanish:
  - al Monte de los Olivos
  - al monte de las aceitunas
  lexicon: BDAG
  rationale: Es un nombre geográfico reconocido. En español puede ir en minúscula o mayúscula según estilo editorial; aquí se prefiere la forma natural y ampliamente comprensible «monte de los Olivos».
- source_word: ἠκολούθησαν
  english_pob_choice: followed
  chosen_spanish: siguieron
  alternatives_spanish:
  - acompañaron
  - fueron tras él
  lexicon: BDAG
  rationale: ἀκολουθέω aquí expresa seguir en sentido literal de movimiento. «Siguieron» conserva la relación de desplazamiento sin introducir matices adicionales.
- source_word: οἱ μαθηταί
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  - los aprendices
  lexicon: BDAG
  rationale: «Los discípulos» es la equivalencia natural y suficiente. El posesivo no aparece en el griego, por eso no se añade en el texto principal.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: BDAG
  rationale: La segunda conjunción tiene fuerza aditiva. «También» reproduce bien ese énfasis en español.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: δέ funciona aquí como continuidad narrativa suave; «y» es la mejor equivalencia natural en español.
theological_decisions:
- issue: Si explicitar la relación posesiva en la costumbre
  english_pob_reading: Retain the more literal 'according to custom' without expanding to 'as was his custom.'
  chosen_spanish_reading: según su costumbre
  alternative_spanish_readings:
  - como era su costumbre
  - según la costumbre
  rationale: El griego no dice explícitamente «su», pero el contexto lo hace evidente. En español, explicitarlo mejora claridad sin forzar el sentido ni alterar el marco narrativo.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; optimal equivalence.'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece en el texto base exactamente donde corresponde, anclado a la expresión de costumbre. La redacción sigue de cerca el griego y armoniza con la revisión inglesa que prefirió una formulación idiomática equivalente.'
  spanish_consistency_notes:
  - Se mantuvo el nombre propio geográfico «monte de los Olivos» como designación reconocible y natural en español.
  - Se evitó añadir posesivos innecesarios en «los discípulos», aunque la referencia contextual sea a Jesús.
  - La partícula narrativa δέ se reflejó con «y» para continuidad suave, no con contraste.
  - La nota al pie ofrece una alternativa idiomática real sin duplicar indebidamente el contenido principal.
