revisions:
- from: Y al salir[a], fue, según su costumbre, al monte de los Olivos; y también los discípulos lo siguieron.
  to: Y al salir, fue al Monte de los Olivos, como era su costumbre[a]; y los discípulos también lo siguieron.
  rationale: Se ajusta el orden y la dicción para un español más natural y digno, alineado con la auditoría inglesa revisada. «Como era su costumbre» se usa como texto principal por su fluidez; «según su costumbre» queda como alternativa literal válida. También se capitaliza el topónimo establecido y se recoloca «también» para reflejar mejor la fuerza aditiva del griego en español.
