translation:
  language: es
  text: Entonces Satanás entró en Judas, llamado Iscariote[a], que era del número de los doce[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el llamado Iscariote» o «que era llamado Iscariote».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «uno de los doce». Algunas traducciones escriben «los Doce» para señalar al grupo apostólico reconocido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰσῆλθεν
  english_pob_choice: entered into
  chosen_spanish: entró
  alternatives_spanish:
  - entró en
  - entró dentro de
  lexicon: BDAG
  rationale: El griego ya expresa dirección con εἰς; en español, «entró en» es la forma natural para conservar esa fuerza sin sonar forzado. «Entró» solo también comunica la acción, pero puede perder algo de la preposición explícita; por eso se anota en el texto con nota de alternativa.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca avance narrativo. «Entonces» da una transición natural en español y refleja el valor secuencial de δέ sin añadir contraste fuerte.
- source_word: Σατανᾶς
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - el Adversario
  lexicon: BDAG
  rationale: La transliteración usual es clara y conserva el nombre/título personal del texto.
- source_word: εἰς Ἰούδαν
  english_pob_choice: into Judas
  chosen_spanish: en Judas
  alternatives_spanish:
  - en el interior de Judas
  - sobre Judas
  lexicon: BDAG
  rationale: El griego describe entrada personal, no solo influencia externa. En español, «en Judas» mantiene la idea de ingreso con naturalidad sintáctica; la nota conserva la opción más explícita «entró en» como alternativa textual.
- source_word: τὸν καλούμενον Ἰσκαριώτην
  english_pob_choice: the one called Iscariot
  chosen_spanish: llamado Iscariote
  alternatives_spanish:
  - al que llamaban Iscariote
  - que era llamado Iscariote
  lexicon: BDAG
  rationale: El participio funciona identificando a Judas. «Llamado Iscariote» preserva bien la estructura y evita una perífrasis innecesaria.
- source_word: ὄντα
  english_pob_choice: who was
  chosen_spanish: que era
  alternatives_spanish:
  - siendo
  - quien era
  lexicon: BDAG
  rationale: El participio se vuelve una relativa natural en español para mantener la identificación descriptiva del sujeto.
- source_word: ἐκ τοῦ ἀριθμοῦ
  english_pob_choice: of the number of
  chosen_spanish: de los
  alternatives_spanish:
  - del número de
  - entre
  lexicon: BDAG
  rationale: La expresión literal «del número de» es correcta pero menos idiomática en español. «De los doce» comunica pertenencia al grupo contado; la nota preserva la alternativa literal y la referencia al grupo apostólico.
- source_word: τῶν δώδεκα
  english_pob_choice: the twelve
  chosen_spanish: doce
  alternatives_spanish:
  - los Doce
  - el grupo de los doce
  lexicon: BDAG
  rationale: En español, «los doce» puede sonar más natural como grupo apostólico reconocido; sin embargo, aquí «de los doce» mantiene fidelidad directa a la construcción griega sin forzar una capitalización interpretativa.
theological_decisions:
- issue: Naturaleza de la acción de Satanás en Judas
  english_pob_reading: Render the text straightforwardly as 'Satan entered into Judas' without softening it to mere influence.
  chosen_spanish_reading: Traducir de manera directa que Satanás «entró en Judas», sin rebajarlo a mera influencia o sugestión.
  alternative_spanish_readings:
  - Satanás influyó en Judas
  - Satanás se apoderó de Judas
  rationale: El griego usa un verbo de entrada con preposición explícita; la versión española debe conservar esa fuerza. Al mismo tiempo, la redacción no añade explicación doctrinal adicional sobre el mecanismo exacto de esa entrada, preservando la tensión del pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con el control auditado y no requiere revisión sustantiva; se mantiene la fuerza verbal de εἰσῆλθεν y la identificación descriptiva de Judas sin suavizar el contenido.
  spanish_consistency_notes:
  - Se usa «Satanás» para Σατανᾶς, en coherencia con el nombre propio del NT.
  - Se evita «Cristo» porque el versículo no contiene Χριστός.
  - «Iscariote» se mantiene como gentilicio/identificador tradicional reconocido en español.
  - La frase «de los doce» conserva la pertenencia al grupo apostólico sin introducir mayúsculas interpretativas.
