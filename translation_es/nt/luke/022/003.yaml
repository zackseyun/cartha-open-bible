    text: 'O: «el llamado Iscariote» o «que era llamado Iscariote».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «uno de los doce». Algunas traducciones escriben «los Doce» para señalar al grupo apostólico reconocido.'
    reason: lexical_alternative
  revision_rationale: La revisión incorpora en el texto principal «entró en Judas» para reflejar con naturalidad y claridad εἰσῆλθεν ... εἰς, sin suavizar la acción de Satanás. También cambia «de los doce» por «del número de los doce» para preservar el matiz formal del griego y del audit trail inglés, mientras deja «uno de los doce» como alternativa idiomática en nota. Se mantienen la fluidez y la legibilidad del español eclesial contemporáneo.
