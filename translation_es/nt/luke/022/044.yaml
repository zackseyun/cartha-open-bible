translation:
  language: es
  text: Y, estando en agonía, oraba más intensamente[a][c]; y su sudor llegó a ser como gotas de sangre[b] que caían a tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más fervientemente» o «más ardientemente».
    reason: lexical_alternative
  - marker: b
    text: El griego dice «como gotas/coágulos de sangre», preservando una comparación, no afirmando que el sudor mismo fuera sangre.
    reason: lexical_alternative
  - marker: c
    text: Algunos manuscritos omiten Lucas 22:43–44; otros los incluyen. El SBLGNT imprime estos versículos entre corchetes para reflejar esta incertidumbre textual.
    reason: textual_variant
lexical_decisions:
- source_word: γενόμενος
  english_pob_choice: being
  chosen_spanish: estando
  alternatives_spanish:
  - siendo
  - habiendo quedado
  lexicon: BDAG
  rationale: El participio introduce una circunstancia concomitante del estado de Jesús. «Estando» reproduce bien ese valor circunstancial en español natural sin forzar una idea de proceso o cambio más fuerte de la que el griego exige.
- source_word: ἀγωνίᾳ
  english_pob_choice: agony
  chosen_spanish: agonía
  alternatives_spanish:
  - angustia
  - angustioso combate
  lexicon: BDAG
  rationale: «Agonía» conserva la intensidad extrema del término y suena natural en español bíblico contemporáneo. «Angustia» suaviza algo la fuerza del sustantivo griego.
- source_word: ἐκτενέστερον
  english_pob_choice: more intensely
  chosen_spanish: más intensamente
  alternatives_spanish:
  - más fervientemente
  - más ardientemente
  - más insistentemente
  lexicon: BDAG
  rationale: El adverbio comparativo expresa aumento de intensidad. «Más intensamente» refleja de forma directa el comparativo sin añadir una interpretación devocional que no está explícita en el griego.
- source_word: προσηύχετο
  english_pob_choice: he was praying
  chosen_spanish: oraba
  alternatives_spanish:
  - estaba orando
  - estaba orando continuamente
  lexicon: BDAG
  rationale: El imperfecto señala acción en curso; en español, el imperfecto simple «oraba» preserva bien esa continuidad y resulta más fluido que una perífrasis más pesada.
- source_word: ἐγένετο
  english_pob_choice: became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - se convirtió en
  - se hizo
  lexicon: BDAG
  rationale: 'Aquí el verbo marca un resultado: el sudor pasó a ser comparable a gotas de sangre. «Llegó a ser» conserva ese matiz resultativo sin sugerir identidad absoluta.'
- source_word: ἱδρὼς
  english_pob_choice: sweat
  chosen_spanish: sudor
  alternatives_spanish:
  - transpiración
  lexicon: BDAG
  rationale: Equivalente directo y claro en español.
- source_word: ὡσεὶ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - cual
  - casi como
  lexicon: BDAG
  rationale: La partícula comparativa indica semejanza, no identidad. «Como» preserva la comparación explícita y evita convertir la imagen en afirmación literal.
- source_word: θρόμβοι
  english_pob_choice: drops
  chosen_spanish: gotas
  alternatives_spanish:
  - coágulos
  - grumos
  - gotas espesas
  lexicon: BDAG
  rationale: Aunque el término puede sugerir coágulos, en el contexto de algo que cae a tierra el valor imagístico más natural en español es «gotas». Esto conserva la comparación viva sin imponer una precisión médica que el contexto no obliga a adoptar.
- source_word: αἵματος
  english_pob_choice: of blood
  chosen_spanish: de sangre
  alternatives_spanish:
  - sanguíneas
  lexicon: BDAG
  rationale: Genitivo de sustancia/comparación; «de sangre» es la forma natural y fiel en español.
- source_word: καταβαίνοντες ἐπὶ τὴν γῆν
  english_pob_choice: falling to the ground
  chosen_spanish: que caían a tierra
  alternatives_spanish:
  - que descendían a tierra
  - que bajaban al suelo
  lexicon: BDAG
  rationale: El participio describe movimiento descendente. «Caían a tierra» reproduce la imagen con naturalidad y mantiene la dirección del movimiento hacia el suelo/tierra.
theological_decisions:
- issue: Naturaleza de la comparación en «como gotas de sangre»
  english_pob_reading: 'A simile is preserved: the sweat was like drops of blood.'
  chosen_spanish_reading: 'La comparación se preserva: el sudor era semejante a gotas de sangre, no necesariamente sangre literal.'
  alternative_spanish_readings:
  - El sudor se convirtió en sangre literal.
  - El sudor era sangre.
  rationale: El ὡσεὶ marca comparación explícita. La traducción principal debe mantener esa tensión y no convertirla en una afirmación literal que el griego no exige. La nota aclara la alternativa léxica para «gotas/coágulos».
  doctrine_reference: Translation philosophy §1, §3
- issue: Variante textual en Lucas 22:43–44
  english_pob_reading: Some manuscripts omit Luke 22:43–44; others include them. The SBLGNT prints the verses in brackets to reflect this textual uncertainty.
  chosen_spanish_reading: Se reconoce la incertidumbre textual del pasaje, dado que algunos manuscritos omiten Lucas 22:43–44 y otros lo incluyen.
  alternative_spanish_readings:
  - No se menciona la variante textual.
  - Se afirma sin nota que el versículo pertenece al texto original.
  rationale: Aunque este pedido es para un solo versículo, el aparato inglés marca explícitamente la variante textual. Conviene reflejarla con una nota breve para no ocultar la incertidumbre documentada por la edición base.
  doctrine_reference: Textual criticism; SBLGNT brackets
translation_notes:
  revision_awareness: 'La edición inglesa auditada mantiene la traducción con una ligera reordenación para fluidez. También documenta dos tensiones importantes: el adverbio comparativo ἐκτενέστερον y la comparación explícita ὡσεὶ θρόμβοι αἵματος. La presente propuesta conserva ambas tensiones en español y refleja, mediante nota, la alternativa léxica de ἱδρὼς θρόμβοι como «gotas/coágulos».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece.
  - Se mantiene «agonía» para ἀγωνία en línea con el valor intenso del término.
  - Se evita «Cristo» porque no aparece en el versículo.
  - Se conserva el imperfecto narrativo con «oraba» para reflejar acción continua.
  - «A tierra» mantiene un registro bíblico claro y natural en español sin perder la dirección del movimiento.
