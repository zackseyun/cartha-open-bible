translation:
  language: es
  text: 'Entonces cierta sirvienta[a], al verlo sentado junto a la luz y mirándolo fijamente, dijo: «Este hombre también estaba con él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la luz». La expresión griega puede indicar tanto estar al lado de la fuente de luz como hallarse dentro del área iluminada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοῦσα
  english_pob_choice: seeing
  chosen_spanish: al verlo
  alternatives_spanish:
  - cuando lo vio
  - viéndolo
  lexicon: BDAG
  rationale: El participio aoristo introduce la percepción de la sirvienta dentro del avance narrativo. «Al verlo» conserva esa relación participial en un español natural sin añadir tiempo verbal más fuerte que el del original.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ marca progresión narrativa, no contraste fuerte. «Entonces» mantiene ese avance de escena de manera clara en español.
- source_word: παιδίσκη τις
  english_pob_choice: a certain servant girl
  chosen_spanish: una cierta sirvienta
  alternatives_spanish:
  - una sirvienta
  - una esclava joven
  - una muchacha sirvienta
  lexicon: BDAG
  rationale: παιδίσκη designa a una muchacha sirvienta/esclava. En esta escena el foco no está en su estatus jurídico sino en su papel como empleada doméstica; por eso «sirvienta» comunica bien el sentido sin cargar innecesariamente la lectura. τις se refleja con «cierta».
- source_word: καθήμενον
  english_pob_choice: seated
  chosen_spanish: sentado
  alternatives_spanish:
  - sentado en
  - estando sentado
  lexicon: BDAG
  rationale: El participio describe la postura de Pedro. «Sentado» es la forma más natural en español y conserva el valor descriptivo sin sobrecargar el estilo.
- source_word: πρὸς τὸ φῶς
  english_pob_choice: by the light
  chosen_spanish: junto a la luz
  alternatives_spanish:
  - junto al fuego
  - en la luz
  - cerca de la luz
  lexicon: BDAG
  rationale: La frase puede indicar posición al lado de la fuente de luz o dentro del área iluminada. «Junto a la luz» mantiene esa ambigüedad posible y evita concretar más de lo que el texto griego exige. Se prefiere esta formulación sobre «junto al fuego» porque el sustantivo explícito del verso es «luz».
- source_word: ἀτενίσασα
  english_pob_choice: looking intently at him
  chosen_spanish: mirándolo fijamente
  alternatives_spanish:
  - fijando la vista en él
  - observándolo atentamente
  lexicon: BDAG
  rationale: El participio expresa una mirada sostenida e intensa. «Mirándolo fijamente» reproduce esa fuerza de forma idiomática en español.
- source_word: Καὶ οὗτος
  english_pob_choice: This man also
  chosen_spanish: Este hombre también
  alternatives_spanish:
  - Este también
  - Este hombre además
  lexicon: BDAG
  rationale: οὗτος es demostrativo y tiene un matiz señalador. «Este hombre» conserva el tono identificador y algo acusatorio del gesto. «También» refleja καί.
- source_word: σὺν αὐτῷ ἦν
  english_pob_choice: was with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - andaba con él
  - era de los suyos
  lexicon: BDAG
  rationale: σύν con dativo y ἦν expresa simple compañía o asociación. «Estaba con él» es la equivalencia más directa y clara en español.
translation_notes:
  revision_awareness: El borrador inglés revisó «in the light» a «by the light» para reflejar mejor πρὸς τὸ φῶς. La versión española sigue esa misma prudencia, evitando precisar más allá de la relación espacial que el griego permite.
  spanish_consistency_notes:
  - Se mantiene «sirvienta» como equivalente funcional de παιδίσκη, sin forzar «esclava» en un contexto donde el énfasis narrativo no recae en la condición jurídica.
  - «Junto a la luz» conserva la ambigüedad espacial señalada en el aparato inglés y no la resuelve con una interpretación más concreta.
  - Se usa «él» para αὐτῷ / αὐτόν de forma coherente con la referencia a Jesús en el contexto inmediato.
