    reason: lexical_alternative
  revision_rationale: Se revisa «entregas» a «traicionas» para seguir la decisión contextual del POB inglés sobre παραδίδωμι en este pasaje, preservando la opción más literal «entregas» en la nota. También se ajusta el orden de la frase para mayor naturalidad y fuerza retórica en español, sin perder fidelidad al griego.
