translation:
  language: es
  text: 'Pero Jesús le dijo[a]: «Judas, ¿traicionas al Hijo del Hombre con un beso?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿entregas al Hijo del Hombre con un beso?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce contraste suave; en español, «Pero» comunica mejor el giro de la respuesta de Jesús frente a la acción de Judas.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - le habló
  lexicon: BDAG
  rationale: El dativo αὐτῷ requiere un destinatario explícito; «le dijo» conserva la dirección a Judas con naturalidad en español.
- source_word: Ἰούδα
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Juda
  lexicon: BDAG
  rationale: Vocativo propio; se mantiene la forma común en español bíblico y lectoría actual.
- source_word: φιλήματι
  english_pob_choice: with a kiss
  chosen_spanish: con un beso
  alternatives_spanish:
  - por un beso
  - mediante un beso
  lexicon: BDAG
  rationale: El dativo expresa medio/instrumento; «con un beso» es la equivalencia natural y conserva el acto concreto sin interpretarlo excesivamente.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hombre
  lexicon: BDAG
  rationale: Se preserva el título cristológico tradicional y su resonancia intertextual, en lugar de una paráfrasis que atenúe su peso bíblico.
- source_word: παραδίδως
  english_pob_choice: are you betraying
  chosen_spanish: entregas
  alternatives_spanish:
  - estás entregando
  - traicionas
  lexicon: BDAG
  rationale: El verbo básico es «entregar»; en este contexto lleva una carga hostil. El español del texto principal mantiene la forma más cercana al valor léxico, dejando la implicación de traición en el contexto inmediato.
theological_decisions:
- issue: Valor de παραδίδωμι en el reproche de Jesús
  english_pob_reading: are you betraying the Son of Man
  chosen_spanish_reading: ¿con un beso entregas al Hijo del Hombre?
  alternative_spanish_readings:
  - ¿con un beso traicionas al Hijo del Hombre?
  - ¿con un beso estás entregando al Hijo del Hombre?
  rationale: El POB inglés opta por el sentido hostil de 'betraying', pero el español puede conservar la base léxica «entregar» y dejar que el contexto manifieste la ironía y la culpa. Esto evita perder la tensión entre el valor básico del verbo y su carga aquí.
  doctrine_reference: Translation philosophy §§2, 3; Affirmations
translation_notes:
  revision_awareness: La revisión más reciente indicó concordancia alta y no introdujo cambios sustantivos; la presente propuesta conserva ese sentido y ajusta solo la distribución española para incluir el marcador de nota dentro del texto.
  spanish_consistency_notes:
  - Se mantiene «Hijo del Hombre» de manera consistente con la decisión cristológica del POB.
  - Se usa «le dijo» para reflejar el dativo explícito αὐτῷ sin redundancia innecesaria.
  - La puntuación española coloca la nota al final de la cláusula afectada y la cita abre con comillas angulares por norma editorial.
