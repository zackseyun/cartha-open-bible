review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la progresión narrativa (δὲ = «Entonces»), la llegada temporal de «el día», la referencia singular a «la Pascua», y mantiene el sentido sacrificial de θύεσθαι. También preserva adecuadamente la nota sobre las alternativas de τὸ πάσχα. Sin embargo, «era necesario sacrificar la Pascua» suena menos fiel al valor pasivo/intransitivo de θύεσθαι que una formulación como «debía sacrificarse la Pascua» o «había que sacrificar la Pascua».
  spanish_quality_summary: El español es claro y eclesialmente legible. No obstante, «el día de los Panes sin levadura» resulta algo pesado; «el día de los panes sin levadura» es más natural, y la mayúscula en toda la frase festiva no es necesaria en español. La construcción relativa «en que» es aceptable, pero «en el cual» da una conexión algo más nítida con «día» en un registro digno. El principal ajuste recomendado es suavizar la impersonal activa «era necesario sacrificar» hacia una forma más natural y más cercana al griego.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «la Pascua» para πάσχα es correcto según la auditoría, con alternativas preservadas en nota. No aparecen términos sensibles del glosario mayor como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: La expresión «era necesario sacrificar la Pascua» no refleja del todo bien θύεσθαι.
    rationale: El griego usa infinitivo presente pasivo de θύω («ser sacrificado» / «sacrificarse»). En español, una forma como «debía sacrificarse la Pascua» preserva mejor el enfoque sobre la víctima sacrificial sin sonar forzada.
  - severity: low
    issue: Capitalización excesiva en «Panes sin levadura».
    rationale: 'En español general y bíblico moderno, la expresión descriptiva del festival puede ir en minúsculas: «los panes sin levadura». Esto mejora naturalidad sin perder referencia festiva.'
  - severity: low
    issue: «en que» es correcto, pero puede afinarse estilísticamente.
    rationale: «En el cual» conecta más explícitamente con «día» y mantiene un tono formal-natural; no es un error grave, solo una mejora de fluidez y precisión.
  revised_spanish_text: Entonces llegó el día de los panes sin levadura[a], en el cual debía sacrificarse la Pascua.
  revised_footnotes:
