translation:
  language: es
  text: Entonces llegó el día de los panes sin levadura[a], en el cual debía sacrificarse la Pascua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cordero de la Pascua» o «el sacrificio de la Pascua». El término griego puede referirse a la observancia de la Pascua o, en este contexto, más específicamente, a la víctima sacrificial.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἦλθεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - se acercó
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι se usa idiomáticamente para la llegada de un tiempo o día. En español, «llegó» conserva bien la idea de que el día ha arribado sin sonar forzado.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce progreso narrativo. «Entonces» comunica mejor la secuencia en español que una simple coordinación con «y».
- source_word: ἡ ἡμέρα τῶν ἀζύμων
  english_pob_choice: the day of Unleavened Bread
  chosen_spanish: el día de los Panes sin levadura
  alternatives_spanish:
  - el día de la Fiesta de los Panes sin levadura
  - el día de los Ázimos
  lexicon: BDAG
  rationale: La construcción griega refiere al día festivo asociado con los panes sin levadura. En español, «Panes sin levadura» conserva el sentido del plural del genitivo y es claro para lectores contemporáneos; se evita una calca menos natural como «Ázimos».
- source_word: ᾗ
  english_pob_choice: on which
  chosen_spanish: en que
  alternatives_spanish:
  - en el cual
  - cuando
  lexicon: BDAG
  rationale: El relativo dativo remite a «día». «En que» reproduce la relación temporal de manera natural en español, sin perder la estructura relativa.
- source_word: ἔδει
  english_pob_choice: had to
  chosen_spanish: era necesario
  alternatives_spanish:
  - tenía que
  - debía
  lexicon: BDAG
  rationale: El imperfecto impersonal de necesidad expresa obligación o necesidad. «Era necesario» conserva mejor el matiz formal y objetivo que una formulación más coloquial.
- source_word: θύεσθαι
  english_pob_choice: be sacrificed
  chosen_spanish: sacrificar
  alternatives_spanish:
  - ser sacrificado
  - ser ofrecido en sacrificio
  lexicon: BDAG
  rationale: En este contexto cultual, θύω se refiere al acto sacrificial. El español pasivo impersonal «era necesario sacrificar» expresa con naturalidad la acción ritual; «ser sacrificado» también sería posible, pero aquí el verbo activo impersonal suena más fluido y no pierde el sentido sacrificial.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el cordero de la Pascua
  - el sacrificio de la Pascua
  lexicon: BDAG
  rationale: πάσχα puede nombrar la Pascua, la celebración o, por metonimia, la víctima sacrificial. En español, «la Pascua» mantiene la amplitud del término, mientras el contexto y el verbo «sacrificar» preservan la lectura sacrificial. Las alternativas más explícitas quedan registradas en nota.
theological_decisions:
- issue: Referencia de τὸ πάσχα en contexto sacrificial
  english_pob_reading: Render as 'the Passover' in the main text while allowing the sacrificial sense to be carried by 'be sacrificed.'
  chosen_spanish_reading: Traducir «la Pascua» en el texto principal y dejar que «sacrificar» exprese el sentido sacrificial.
  alternative_spanish_readings:
  - el cordero de la Pascua
  - el sacrificio de la Pascua
  rationale: El sustantivo griego es más amplio que «cordero» y puede referirse metonímicamente a la fiesta o a la víctima. Mantener «la Pascua» respeta la forma del original y evita cerrar indebidamente el sentido; el verbo ya señala la dimensión ritual.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso del texto base y del audit trail inglés, sin cambios sustanciales respecto del sentido lexical o teológico documentado. Se mantiene la ambigüedad productiva de πάσχα en el texto principal y se explicita la alternativa sacrificial en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se prefirió «Pascua» por ser el equivalente español habitual y suficientemente amplio para πάσχα en este contexto.
  - Se evitó «Ázimos» por ser menos transparente para lectores generales; «Panes sin levadura» conserva mejor la claridad.
  - La estructura verbal impersonal «era necesario sacrificar» mantiene el registro reverente y la obligación implícita del griego.
