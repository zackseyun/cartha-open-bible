- from: Entonces llegó el día de los Panes sin levadura[a], en que era necesario sacrificar la Pascua.
  to: Entonces llegó el día de los panes sin levadura[a], en el cual debía sacrificarse la Pascua.
  rationale: Se ajusta la cláusula verbal para reflejar mejor el pasivo de θύεσθαι y sonar natural en español («debía sacrificarse la Pascua»). También se normaliza la capitalización de «panes sin levadura» y se afina la relativa a «en el cual» para mayor claridad y dignidad estilística. La nota se conserva con una leve mejora de redacción.
