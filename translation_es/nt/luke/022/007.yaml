    reason: alternative_reading
  revision_rationale: Se ajusta la cláusula verbal para reflejar mejor el pasivo de θύεσθαι y sonar natural en español («debía sacrificarse la Pascua»). También se normaliza la capitalización de «panes sin levadura» y se afina la relativa a «en el cual» para mayor claridad y dignidad estilística. La nota se conserva con una leve mejora de redacción.
