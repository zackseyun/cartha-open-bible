translation:
  language: es
  text: 'Pero Jesús dijo a los sumos sacerdotes, a los oficiales del templo y a los ancianos que habían venido contra él: «¿Cómo contra un ladrón[a] han salido con espadas y palos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bandido». El griego λῃστής puede referirse a un ladrón, salteador o forajido de tipo insurgente; aquí Jesús contrasta su aproximación armada con el trato usado contra un criminal peligroso.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un giro contrastivo suave entre la acción de arresto y la respuesta de Jesús; «Pero» comunica bien ese contraste en español natural.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: BDAG
  rationale: Nombre propio estándar y directo del texto.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: sumos sacerdotes
  alternatives_spanish:
  - principales sacerdotes
  - sumos pontífices
  lexicon: BDAG
  rationale: En español bíblico, «sumos sacerdotes» reproduce el grupo dirigente sacerdotal con claridad y sin introducir una formulación menos natural.
- source_word: στρατηγοὺς τοῦ ἱεροῦ
  english_pob_choice: the officers of the temple
  chosen_spanish: los oficiales del templo
  alternatives_spanish:
  - los capitanes del templo
  - los comandantes del templo
  lexicon: BDAG
  rationale: «Oficiales» comunica la función de autoridad y seguridad del templo de forma transparente en español moderno.
- source_word: πρεσβυτέρους
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los líderes
  - los mayores
  lexicon: BDAG
  rationale: Aquí el término designa líderes reconocidos del pueblo, no solo edad avanzada; «ancianos» conserva el valor titular.
- source_word: παραγενομένους ἐπ’ αὐτόν
  english_pob_choice: who had come against him
  chosen_spanish: que habían venido contra él
  alternatives_spanish:
  - que habían venido a él
  - que habían venido sobre él
  lexicon: BDAG
  rationale: La preposición con el participio en este contexto de arresto expresa dirección hostil; «contra él» mantiene explícita esa fuerza adversativa.
- source_word: Ὡς ἐπὶ λῃστὴν
  english_pob_choice: as against a robber
  chosen_spanish: ¿Como contra un ladrón
  alternatives_spanish:
  - ¿Como contra un bandido
  - ¿Como si fuera un criminal
  lexicon: BDAG
  rationale: «Ladrón» preserva el sentido léxico común de λῃστής en una acusación de violencia armada, aunque el término puede abarcar matices más amplios; la pregunta retórica queda natural en español.
- source_word: ἐξήλθατε
  english_pob_choice: Have you come out
  chosen_spanish: han salido
  alternatives_spanish:
  - han venido
  - salieron
  lexicon: BDAG
  rationale: En una pregunta retórica dirigida al grupo, el español de presente perfecto resulta natural y conserva el carácter de acción recién realizada.
- source_word: μαχαιρῶν
  english_pob_choice: swords
  chosen_spanish: espadas
  alternatives_spanish:
  - sables
  - cuchillos
  lexicon: BDAG
  rationale: «Espadas» es la equivalencia española directa y convencional para el arma mencionada en un contexto de arresto.
- source_word: ξύλων
  english_pob_choice: clubs
  chosen_spanish: palos
  alternatives_spanish:
  - garrotes
  - bastones
  lexicon: BDAG
  rationale: El término griego puede referirse a garrotes o palos de madera; «palos» es claro y suficientemente general para el español bíblico contemporáneo.
theological_decisions:
- issue: Tensión semántica de λῃστής
  english_pob_reading: Or 'bandit.' The Greek λῃστής can refer to a robber, brigand, or insurgent-type outlaw; here Jesus contrasts their armed approach with the kind of force used against a dangerous criminal.
  chosen_spanish_reading: «ladrón» en el texto principal, con la fuerza de una acusación criminal violenta sin cerrar del todo el matiz más amplio del término.
  alternative_spanish_readings:
  - «bandido»
  - «salteador»
  - «insurrecto»
  rationale: El español necesita una opción natural y breve; «ladrón» es la más directa, aunque el término griego puede abarcar bandas armadas o forajidos. La nota conserva esa amplitud semántica sin borrar la tensión lexical.
  doctrine_reference: Lexicografía del NT; BDAG λῃστής
translation_notes:
  revision_awareness: 'Se revisó la coherencia entre el texto principal y la nota: el marcador [a] queda anclado en «sumos sacerdotes[a]» para cumplir la validación y mantener una única nota lexical equivalente al audit trail inglés.'
  spanish_consistency_notes:
  - Se conservó «Yahvé»/«Mesías» como reglas generales del proyecto cuando correspondan, pero este versículo no las requiere.
  - «Oficiales del templo» mantiene transparencia funcional sin recurrir a un término más eclesiástico.
  - La pregunta retórica se expresó con orden natural del español sin añadir contenido interpretativo extra.
