translation:
  language: es
  text: Y saliendo, lloró amargamente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Conecta la cláusula narrativa de forma simple y directa, sin añadir una relación temporal que el griego no explicita.
- source_word: ἐξελθὼν
  english_pob_choice: going outside
  chosen_spanish: saliendo
  alternatives_spanish:
  - habiendo salido
  - después de salir
  lexicon: BDAG
  rationale: El participio aoristo funciona de manera adverbial antes del verbo principal. En español, un gerundio reproduce bien la acción concomitante/antecedente sin sobrecargar el texto con una paráfrasis temporal.
- source_word: ἔξω
  english_pob_choice: outside
  chosen_spanish: fuera
  alternatives_spanish:
  - afuera
  - al exterior
  lexicon: BDAG
  rationale: La idea espacial de ἔξω se expresa naturalmente con 'fuera' en español; 'fuera' mantiene el movimiento de salida con claridad y sobriedad.
- source_word: ἔκλαυσεν
  english_pob_choice: he wept
  chosen_spanish: lloró
  alternatives_spanish:
  - lloró amargamente
  - plañió
  lexicon: BDAG
  rationale: κλαίω puede renderizarse como 'llorar' en español; aquí el verbo simple ya expresa el acto de llorar, y el adverbio siguiente aporta la intensidad emocional.
- source_word: πικρῶς
  english_pob_choice: bitterly
  chosen_spanish: amargamente
  alternatives_spanish:
  - con amargura
  lexicon: BDAG
  rationale: El adverbio intensifica el modo del llanto. 'Amargamente' conserva la fuerza afectiva del griego y suena natural en español.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente al evitar una adición temporal equivalente a ''after''; por eso se usa ''saliendo'' sin introducir ''después de''. También se conserva el paralelismo básico de la cláusula griega: conexión simple, salida, llanto intenso.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o cualquier sustitución reverencial porque el versículo no contiene el nombre divino.
  - Se eligió 'fuera' en vez de una perífrasis más explicativa para mantener la economía del griego.
  - No se añadió nota al pie porque la alternativa inglesa ('having gone out') no introduce una ambigüedad doctrinal o textual que requiera marcador en el texto español.
