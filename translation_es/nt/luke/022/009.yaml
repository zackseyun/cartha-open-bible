  to: 'Le dijeron: «¿Dónde quieres que la preparemos[a]?».'
  rationale: Se revisa para reflejar mejor la decisión auditada del POB inglés de explicitar el objeto implícito de ἑτοιμάσωμεν, manteniendo a la vez un español natural y conciso. También se elimina el pronombre sujeto explícito para mejorar la fluidez sin alterar el sentido.
