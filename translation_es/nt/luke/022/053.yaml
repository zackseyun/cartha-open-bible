translation:
  language: es
  text: Día tras día, mientras yo estaba con ustedes en el templo, no me echaron mano[a]. Pero esta es su hora[b], y la autoridad de las tinieblas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no extendieron las manos contra mí»; el modismo griego se refiere a tomar acción hostil contra alguien, aquí en contexto de arresto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el poder de las tinieblas».'
    reason: alternative_reading
lexical_decisions:
- source_word: καθ’ ἡμέραν
  english_pob_choice: Day after day
  chosen_spanish: Día tras día
  alternatives_spanish:
  - Cada día
  - Diariamente
  lexicon: BDAG
  rationale: La expresión griega es distributiva e idiomática, con sentido repetido y continuo. «Día tras día» conserva bien esa repetición natural en español sin volverlo mecánico.
- source_word: ὄντος μου μεθ’ ὑμῶν
  english_pob_choice: while I was with you
  chosen_spanish: mientras yo estaba con ustedes
  alternatives_spanish:
  - cuando yo estaba con ustedes
  - al estar yo con ustedes
  lexicon: BDAG
  rationale: El genitivo absoluto se vierte con una subordinada temporal natural en español. «Mientras yo estaba con ustedes» preserva el valor circunstancial y temporal.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en los atrios del templo
  - en el recinto del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo del templo, no al santuario interior. «En el templo» es claro y suficiente en español, sin ampliar innecesariamente el alcance.
- source_word: οὐκ ἐξετείνατε τὰς χεῖρας ἐπ’ ἐμέ
  english_pob_choice: you did not lay hands on me
  chosen_spanish: no levantaron las manos contra mí
  alternatives_spanish:
  - no extendieron las manos contra mí
  - no me prendieron
  lexicon: BDAG
  rationale: La expresión griega es un modismo de acción hostil, aquí en contexto de arresto. «No levantaron las manos contra mí» mantiene el sentido idiomático y la carga hostil sin volverlo demasiado interpretativo.
- source_word: ἀλλ’ αὕτη ἐστὶν ὑμῶν ἡ ὥρα
  english_pob_choice: But this is your hour
  chosen_spanish: Pero esta es su hora
  alternatives_spanish:
  - Pero este es su momento
  - Pero esta es la hora que les corresponde
  lexicon: BDAG
  rationale: ὥρα alude a un momento señalado, no solo a una hora cronológica. «Su hora» conserva la sobriedad y la fuerza solemne del original.
- source_word: ἐξουσία
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - dominio
  lexicon: BDAG
  rationale: ἐξουσία suele expresar autoridad, derecho o poder delegado. «Autoridad» refleja mejor ese matiz que un mero «poder» físico.
- source_word: τοῦ σκότους
  english_pob_choice: of darkness
  chosen_spanish: de las tinieblas
  alternatives_spanish:
  - de la oscuridad
  - de las tinieblas oscuras
  lexicon: BDAG
  rationale: El genitivo es metafórico y cualitativo; en español bíblico «tinieblas» comunica mejor el peso teológico del contraste con la luz que «oscuridad». Se mantiene la metáfora sin explicitar una identificación doctrinal no presente en el texto.
theological_decisions:
- issue: Si explicitar la frase como la autoridad de Satanás o del mal
  english_pob_reading: Retain the metaphorical phrase 'the authority of darkness' without explicit interpretive expansion.
  chosen_spanish_reading: Mantener «la autoridad de las tinieblas» sin expansión interpretativa.
  alternative_spanish_readings:
  - el poder de las tinieblas
  - la autoridad de Satanás
  - el dominio del mal
  rationale: El texto no nombra a Satanás; conservar «tinieblas» preserva la metáfora y la tensión teológica del pasaje, dejando que el contexto determine el alcance sin introducir una especificación ajena al enunciado.
  doctrine_reference: Preservar la tensión teológica sin resolverla explícitamente.
translation_notes:
  revision_awareness: Se sigue el pasaje con alta concordancia respecto del audit trail inglés y sin revisiones posteriores aplicadas; la redacción española mantiene el valor idiomático de los modismos griegos y conserva la metáfora de las tinieblas sin interpretarla de forma explícita.
  spanish_consistency_notes:
  - Se usó «ustedes» para el plural de segunda persona, en registro neutral latinoamericano.
  - Se prefirió «Yahvé» para el nombre divino solo cuando aparezca; este versículo no lo contiene.
  - Se mantuvo «tinieblas» por su peso bíblico-teológico y su correspondencia con el genitivo metafórico del griego.
  - No se introdujo puntuación o segmentación ajena al sentido del original; la división en dos oraciones sigue la antítesis del texto griego.
