    text: 'O: «no extendieron las manos contra mí»; el modismo griego se refiere a tomar acción hostil contra alguien, aquí en contexto de arresto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el poder de las tinieblas».'
    reason: alternative_reading
  revision_rationale: Se reemplaza ‘no levantaron las manos contra mí’ por ‘no me echaron mano’ porque en español expresa con más naturalidad la idea de poner las manos sobre alguien en contexto hostil o de arresto, acercándose mejor al modismo griego y a la decisión auditada del POB inglés. Se conservan ‘su hora’ y ‘la autoridad de las tinieblas’ por su fidelidad semántica y teológica.
