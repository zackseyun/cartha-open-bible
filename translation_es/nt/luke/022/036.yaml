translation:
  language: es
  text: Pero ahora, el que tiene bolsa, tómela, y asimismo una bolsa de viaje[a]; y el que no tenga una, venda su manto y compre una espada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'bolsa' o 'mochila' para πήρα.
    reason: lexical_alternative
  - marker: b
    text: La palabra griega traducida como 'espada' (μάχαιρα) también puede referirse a una hoja más corta, como una daga o una espada corta.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλλὰ νῦν
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Mas ahora
  - Pero en este momento
  lexicon: BDAG
  rationale: Conserva el contraste adversativo de ἀλλά y el valor temporal de νῦν con un español natural y sobrio. 'Pero ahora' reproduce bien el giro del original sin sobreinterpretarlo.
- source_word: ὁ ἔχων
  english_pob_choice: the one who has
  chosen_spanish: el que tiene
  alternatives_spanish:
  - el que posee
  - quien tiene
  lexicon: BDAG
  rationale: El participio articular se vierte con valor genérico e impersonal. 'El que tiene' es idiomático en español y preserva la referencia singular representativa.
- source_word: βαλλάντιον
  english_pob_choice: money bag
  chosen_spanish: bolsa
  alternatives_spanish:
  - bolsa de dinero
  - bolsa para dinero
  - monedero
  lexicon: BDAG
  rationale: En español, 'bolsa de dinero' puede sonar explicativa en exceso. 'Bolsa' conserva la función de contenedor y deja abierto el matiz léxico, que en el contexto es el de una bolsa para llevar dinero.
- source_word: ἀράτω
  english_pob_choice: take it
  chosen_spanish: tómela
  alternatives_spanish:
  - llévela
  - tómela consigo
  lexicon: BDAG
  rationale: El imperativo de αἴρω aquí implica tomar o llevar consigo. Dado que el objeto implícito en español es femenino ('la bolsa'), 'tómela' resulta natural y fiel al mandato.
- source_word: ὁμοίως καὶ πήραν
  english_pob_choice: and likewise a travel bag
  chosen_spanish: y asimismo una bolsa de viaje
  alternatives_spanish:
  - y asimismo una bolsa
  - y también una mochila
  lexicon: BDAG
  rationale: πήρα designa una bolsa de viajero o de provisiones. 'Bolsa de viaje' comunica su función sin imponer una forma moderna demasiado concreta. 'Asimismo' conserva ὁμοίως.
- source_word: ὁ μὴ ἔχων
  english_pob_choice: the one who does not have one
  chosen_spanish: el que no tiene
  alternatives_spanish:
  - el que no tiene una
  - quien no tiene
  lexicon: BDAG
  rationale: El griego omite el objeto ya entendido por el contexto. En español, también puede omitirse sin pérdida, porque la frase siguiente aclara que se trata de algo que debe venderse para comprar una espada.
- source_word: τὸ ἱμάτιον αὐτοῦ
  english_pob_choice: his cloak
  chosen_spanish: su manto
  alternatives_spanish:
  - su capa
  - su vestido exterior
  lexicon: BDAG
  rationale: ἱμάτιον se refiere al vestido exterior o prenda de abrigo principal. 'Manto' es amplio, digno y comprensible en español bíblico; evita el posible sesgo moderno de 'capa'.
- source_word: ἀγορασάτω μάχαιραν
  english_pob_choice: buy a sword
  chosen_spanish: compre una espada
  alternatives_spanish:
  - adquiera una espada
  - compre un arma
  lexicon: BDAG
  rationale: μάχαιρα puede abarcar una espada corta o cuchillo grande, pero 'espada' mantiene el término tradicional y suficientemente amplio en español, sin forzar una precisión no requerida por el griego.
theological_decisions:
- issue: Si el mandato de Jesús debe suavizarse o interpretarse figurativamente en la traducción
  english_pob_reading: Render the command literally as 'buy a sword' without interpretive softening.
  chosen_spanish_reading: 'Traducir de manera directa: ''compre una espada''.'
  alternative_spanish_readings:
  - compre un arma
  - prepárense para el peligro
  rationale: El texto griego usa imperativos directos y nombra explícitamente μάχαιρα. La traducción debe conservar esa fuerza literal y dejar la tensión interpretativa para notas o exégesis, no resolverla dentro del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que indicó que no se requerían cambios. No hubo revisiones aplicadas en la fuente inglesa, por lo que el borrador español se construyó directamente desde el griego con el audit trail en inglés como apoyo lexical y teológico.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el Tetragrámaton; en este versículo no aplica.
  - Se usa 'espada' como equivalente principal de μάχαιρα, conforme al audit trail, sin introducir 'arma' en el texto principal.
  - Se evitó 'bolsa de dinero' para βαλλάντιον en el texto principal por fluidez natural, pero se dejó la alternativa funcional en nota para conservar la ambigüedad léxica.
  - La omisión del objeto en 'el que no tiene' sigue el griego y evita una repetición pesada en español.
