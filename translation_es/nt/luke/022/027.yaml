  yaml_path: translation/nt/luke/022/027.yaml
  text: For who is greater[a], the one reclining at the table or the one serving? Is it not the one reclining at the table? But I am among you as one who serves.
  footnotes:
  - marker: a
    text: Or, more formally, 'the one reclining' / 'in your midst.' The Greek reflects banquet custom, where diners reclined while attendants served.
    reason: cultural_note
