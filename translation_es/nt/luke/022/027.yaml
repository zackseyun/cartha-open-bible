revisions:
- from: 'Porque, ¿quién es mayor: el que se reclina a la mesa o el que sirve? ¿No es el que se reclina a la mesa? Pero yo estoy entre ustedes como el que sirve.'
  to: 'Porque, ¿quién es mayor[a]: el que está reclinado a la mesa[a] o el que sirve? ¿No es el que está reclinado a la mesa[a]? Pero yo estoy entre ustedes como el que sirve.'
  rationale: Se ajusta la expresión de ὁ ἀνακείμενος a una forma más natural en español ('está reclinado a la mesa') y se añade una nota cultural equivalente a la del POB inglés para preservar el trasfondo de banquete y las alternativas más literales sin cargar el texto principal.
