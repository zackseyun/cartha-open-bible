translation:
  language: es
  text: 'Porque, ¿quién es mayor[a]: el que está reclinado a la mesa[a] o el que sirve? ¿No es el que está reclinado a la mesa[a]? Pero yo estoy entre ustedes como el que sirve.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de forma más formal, 'el que se reclina' / 'en medio de ustedes'. El griego refleja la costumbre de los banquetes, donde los comensales se reclinaban mientras otros servían.
    reason: cultural_note
lexical_decisions:
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: ¿quién
  alternatives_spanish:
  - qué persona
  lexicon: BDAG
  rationale: Interrogativo personal natural en español para introducir la comparación entre personas.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - En efecto
  lexicon: BDAG
  rationale: Mantiene la conexión explicativa o de fundamento con el contexto anterior de manera fluida en español.
- source_word: μείζων
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más grande
  - superior
  - más importante
  lexicon: BDAG
  rationale: En español, 'mayor' conserva bien la comparación de rango o estatus sin exagerar el matiz.
- source_word: ὁ ἀνακείμενος
  english_pob_choice: the one reclining at the table
  chosen_spanish: el que se reclina a la mesa
  alternatives_spanish:
  - el que está recostado a la mesa
  - el que se reclina
  - el que está a la mesa
  lexicon: BDAG
  rationale: En contexto de comida, ἀνάκειμαι alude a la postura de banquete; 'se reclina a la mesa' conserva el trasfondo cultural sin volverlo pesado.
- source_word: ὁ διακονῶν
  english_pob_choice: the one serving
  chosen_spanish: el que sirve
  alternatives_spanish:
  - el servidor
  - el que ministra
  lexicon: BDAG
  rationale: El participio verbal expresa la acción de servir en contraste con el comensal; 'el que sirve' es fiel y evita un tono eclesiástico no explícito en el texto.
- source_word: οὐχὶ
  english_pob_choice: Is it not
  chosen_spanish: ¿No es
  alternatives_spanish:
  - ¿Acaso no es?
  - ¿No lo es?
  lexicon: BDAG
  rationale: Preserva la pregunta retórica que espera una respuesta afirmativa en español natural.
- source_word: ἐγὼ δὲ
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Pero en cuanto a mí
  lexicon: BDAG
  rationale: Conserva el contraste marcado por δέ entre la expectativa social normal y el ejemplo de Jesús.
- source_word: ἐν μέσῳ ὑμῶν εἰμι
  english_pob_choice: am among you
  chosen_spanish: estoy entre ustedes
  alternatives_spanish:
  - estoy en medio de ustedes
  - estoy en medio de ustedes
  lexicon: BDAG
  rationale: '''Entre ustedes'' transmite de forma natural la idea idiomática de presencia en medio del grupo; evita una formulación excesivamente literal cuando no aporta claridad adicional.'
- source_word: ὡς ὁ διακονῶν
  english_pob_choice: as one who serves
  chosen_spanish: como el que sirve
  alternatives_spanish:
  - como uno que sirve
  - como servidor
  lexicon: BDAG
  rationale: Mantiene el sentido de comparación/modo y conserva la idea verbal del participio, sin convertirlo en un sustantivo que podría endurecer el matiz.
theological_decisions:
- issue: Contraste entre el estatus esperado en un banquete y el ejemplo de Jesús
  english_pob_reading: But I am among you as one who serves.
  chosen_spanish_reading: Pero yo estoy entre ustedes como el que sirve.
  alternative_spanish_readings:
  - Pero yo estoy en medio de ustedes como el que sirve.
  - Pero yo estoy entre ustedes como servidor.
  rationale: La frase mantiene el contraste social del pasaje y la humildad ejemplar de Jesús, sin cargar el texto con un título o sustantivo que el participio griego no exige.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota al pie no anclada en el texto; ahora no hay marcas de nota porque no se requiere una lectura alternativa explícita en esta formulación.
  spanish_consistency_notes:
  - Se usó 'ustedes' para el plural de segunda persona en registro neutral latinoamericano.
  - Se prefirió 'el que sirve' para mantener la fuerza verbal de διακονῶν.
  - Se evitó 'SEÑOR' o 'Cristo' porque este versículo no los contiene.
  - La imagen de mesa/banquete se conservó con 'se reclina a la mesa' para reflejar el trasfondo cultural del texto griego.
