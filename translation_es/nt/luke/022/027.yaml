review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: mantiene la pregunta comparativa, la expectativa retórica de οὐχί, el contraste de ἐγὼ δὲ y la idea verbal de ὁ διακονῶν. Sin embargo, ''se reclina a la mesa'' suena poco natural en español actual y debilita la legibilidad del trasfondo de banquete que el POB inglés explicitó con nota. Conviene una formulación más idiomática con nota cultural.'
  spanish_quality_summary: 'El español es claro y digno, pero ''el que se reclina a la mesa'' resulta algo calcado y poco usual en lectura eclesial general. ''Está reclinado a la mesa'' o ''está a la mesa'' mejora, pero para conservar el matiz cultural de ἀνάκειμαι sin sonar forzado, lo más natural es ''está reclinado a la mesa'' acompañado de una nota breve. El resto del verso fluye bien: ''Porque'', ''¿quién es mayor?'', ''¿No es...?'', y ''estoy entre ustedes como el que sirve'' son naturales y fieles.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión sobre διακονῶν como 'el que sirve' está bien alineada con la justificación inglesa y evita introducir 'siervo/esclavo'. No aparecen términos sensibles como Yahvé, Mesías o δοῦλος.
  issues:
  - severity: medium
    issue: '''se reclina a la mesa'' suena poco idiomático en español contemporáneo'
    rationale: Aunque es comprensible, la construcción reflexiva puede sentirse artificial. El griego describe la postura de un comensal en banquete; en español conviene una formulación más natural que preserve ese rasgo cultural.
  - severity: medium
    issue: Falta una nota cultural equivalente a la del POB inglés
    rationale: El inglés preservó explícitamente la alternativa más formal y explicó la costumbre de banquete. Dado que el español también enfrenta posible extrañeza con 'reclinado a la mesa', una nota ayuda a conservar el trasfondo sin sobrecargar el texto principal.
  revised_spanish_text: 'Porque, ¿quién es mayor[a]: el que está reclinado a la mesa[a] o el que sirve? ¿No es el que está reclinado a la mesa[a]? Pero yo estoy entre ustedes como el que sirve.'
  revised_footnotes:
  - marker: a
    text: O, de forma más formal, 'el que se reclina' / 'en medio de ustedes'. El griego refleja la costumbre de los banquetes, donde los comensales se reclinaban mientras otros servían.
    reason: cultural_note
  revision_rationale: Se ajusta la expresión de ὁ ἀνακείμενος a una forma más natural en español ('está reclinado a la mesa') y se añade una nota cultural equivalente a la del POB inglés para preservar el trasfondo de banquete y las alternativas más literales sin cargar el texto principal.
