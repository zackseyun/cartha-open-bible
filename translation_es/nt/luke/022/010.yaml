  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: dicho introductorio, señal al entrar en la ciudad, hombre con recipiente de agua, mandato de seguirlo a la casa donde entra. Sin embargo, la nota [b] no preserva fielmente la decisión auditada en inglés: presenta como alternativa algo que ya está en el texto principal (''los encontrará'') y desplaza el matiz léxico relevante hacia ''les saldrá al encuentro''. Además, ''hasta la casa'' debilita levemente el valor direccional de εἰς mejor expresado como ''a la casa''.'
  spanish_quality_summary: El español es claro y natural. 'Mira' funciona bien para Ἰδοὺ, 'cántaro de agua' es idiomático, y 'Síganlo' es correcto. No obstante, 'hasta la casa' suena menos preciso que 'a la casa', y conviene ajustar las notas para que sean más limpias y consistentes con el texto y la auditoría inglesa.
  glossary_alignment: 'No hay términos del glosario de proyecto especialmente implicados aquí. Las decisiones léxicas principales están bien alineadas: ἄνθρωπος -> ''un hombre''; κεράμιον ὕδατος -> ''un cántaro de agua'' con nota sobre vasija de barro; οἰκία -> ''casa''.'
  issues:
  - severity: medium
    issue: La nota [b] no corresponde bien a la evidencia ni a la auditoría inglesa.
    rationale: 'El inglés conserva en nota el matiz de κεράμιον como vasija de barro, no una supuesta alternativa para συναντήσει ὑμῖν. Además, la nota española dice ''También puede entenderse más literalmente: ‘los encontrará’'', pero eso ya es exactamente el texto principal, por lo que la nota resulta incoherente.'
  - severity: low
    issue: '''Hasta la casa'' atenúa el movimiento direccional de εἰς τὴν οἰκίαν.'
    rationale: El griego manda seguirlo 'a la casa', no meramente 'hasta' ella. Aunque en contexto probablemente se entienda bien, 'a la casa' es más fiel y natural.
  - severity: low
    issue: La cláusula final puede sonar más natural con 'a la que entra' que con 'adonde entra'.
    rationale: '''Adonde entra'' es admisible, pero con antecedente expreso ''la casa'', ''a la que entra'' mantiene con más claridad la relación con εἰς ἣν y evita ligera aspereza estilística.'
  revised_spanish_text: 'Y les dijo: «Mira[a], cuando entren en la ciudad, un hombre que lleva un cántaro de agua[b] los encontrará. Síganlo a la casa a la que entra».'
