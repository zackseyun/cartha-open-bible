    reason: lexical_alternative
  revision_rationale: Se corrige la nota para reflejar la alternativa léxica documentada en la auditoría inglesa, se elimina una nota incoherente sobre 'los encontrará', y se afina la sintaxis para expresar mejor el valor direccional del griego con 'a la casa a la que entra'.
