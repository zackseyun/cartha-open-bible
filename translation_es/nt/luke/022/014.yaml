translation:
  language: es
  text: Y cuando llegó la hora[a], se recostó a la mesa, y los apóstoles con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «se recostó»; el verbo alude a la postura habitual para comer en la antigüedad.
    reason: cultural_note
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simple mantiene el flujo narrativo sin añadir matiz temporal innecesario.
- source_word: ὅτε ἐγένετο ἡ ὥρα
  english_pob_choice: when the hour came
  chosen_spanish: cuando llegó la hora
  alternatives_spanish:
  - cuando vino la hora
  - cuando llegó el momento
  - cuando había llegado la hora
  lexicon: BDAG
  rationale: «Hora» conserva la especificidad narrativa y potencial resonancia teológica del griego; «llegó» comunica el giro idiomático natural en español sin diluir el artículo definido.
- source_word: ἀνέπεσεν
  english_pob_choice: reclined at the table
  chosen_spanish: se recostó a la mesa
  alternatives_spanish:
  - se reclinó
  - se sentó a la mesa
  lexicon: BDAG
  rationale: El verbo refiere la postura de comer propia del mundo antiguo. «Se recostó a la mesa» conserva la imagen cultural sin convertirla en una paráfrasis más extensa; «sentó» sería menos preciso.
- source_word: οἱ ἀπόστολοι
  english_pob_choice: the apostles
  chosen_spanish: los apóstoles
  alternatives_spanish:
  - sus apóstoles
  - los enviados
  lexicon: BDAG
  rationale: El artículo griego identifica al grupo conocido; no hace falta añadir posesivo. «Apóstoles» es el equivalente directo y reconocido.
- source_word: σὺν αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - con él mismo
  lexicon: BDAG
  rationale: Es la forma idiomática y directa en español para expresar compañía o asociación.
theological_decisions:
- issue: Postura de comer en el contexto pascual
  english_pob_reading: he reclined at the table
  chosen_spanish_reading: se recostó a la mesa
  alternative_spanish_readings:
  - se sentó a la mesa
  rationale: Se preserva la concreción histórica de la postura para comer en el mundo mediterráneo antiguo, sin convertirla en una imagen moderna genérica.
  doctrine_reference: 'Translation philosophy: optimal equivalence; cultural-historical specificity'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español y que la nota correspondiente esté anclada al mismo punto.
  spanish_consistency_notes:
  - Se mantiene «hora» en vez de generalizar a «momento» para conservar la especificidad narrativa del griego.
  - «Se recostó a la mesa» refleja la costumbre de comer reclinado; la nota aclara la lectura más literal sin duplicar el sentido en el cuerpo principal.
  - «Apóstoles» se mantiene sin posesivo añadido, conforme al artículo definido del griego.
