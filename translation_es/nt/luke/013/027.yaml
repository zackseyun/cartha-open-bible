revisions:
- from: 'Y él les dirá[a]: “No sé de dónde son ustedes. Apártense de mí, todos ustedes, trabajadores[b] de injusticia.”'
  to: 'Y él les dirá[a]: «No sé de dónde son ustedes. Apártense de mí, todos ustedes, obradores[b] de injusticia.»'
  rationale: Se mantiene la estructura general del borrador, pero se cambia «trabajadores» por «obradores» para una expresión más idiomática y moralmente marcada en español, más adecuada para ἐργάται ἀδικίας. También se corrige la nota [b] para que preserve mejor las alternativas documentadas en el POB inglés para la frase condenatoria completa, no solo para el sustantivo «workers». No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:02:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: introducción de discurso, rechazo relacional («No sé»), origen/procedencia («de dónde son ustedes»), mandato de separación («Apártense de mí») y vocativo condenatorio. Sin embargo, no preserva plenamente el rastro de auditoría inglés en las notas: la nota [b] del inglés está anclada a toda la expresión «workers of unrighteousness» por la alternativa «workers of lawlessness / wrongdoing», mientras que en español se desplazó a ἐργάται solamente y se perdieron las alternativas para ἀδικίας. Además, «trabajadores de injusticia» es comprensible pero algo poco idiomático en español bíblico actual frente a «obradores de injusticia», que conserva mejor la fuerza de quienes practican activamente la injusticia.'
  spanish_quality_summary: 'El español es claro y legible, con registro digno y natural. «Les dirá» y «No sé de dónde son ustedes» funcionan bien. La principal mejora es estilística y semántica: «obradores de injusticia» suena más idiomático y preciso que «trabajadores de injusticia» en este contexto de práctica moral, y permite que la nota abarque mejor las alternativas heredadas del inglés.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto (no aparecen Yahvé, Mesías, etc.). La decisión para ἀδικία como «injusticia» está bien alineada con la justificación teológica del POB. La revisión propuesta solo ajusta la realización española de ἐργάται ἀδικίας y reordena las notas para preservar mejor las alternativas documentadas.
  issues:
  - severity: medium
    issue: La nota [b] está mal enfocada respecto al audit trail inglés
    rationale: En el POB inglés, la nota [b] documenta alternativas para toda la frase «workers of unrighteousness», especialmente el sustantivo ἀδικίας («lawlessness», «wrongdoing»). El borrador español la limita a «trabajadores» con «obreros/hacedores», omitiendo las alternativas clave del complemento.
  - severity: medium
    issue: «trabajadores de injusticia» suena algo forzado en español
    rationale: Aunque es fiel palabra por palabra, en español la combinación resulta menos idiomática para una caracterización moral. «Obradores de injusticia» o «los que practican la injusticia» expresan mejor el valor de ἐργάται ἀδικίας sin perder formalidad.
  revised_spanish_text: 'Y él les dirá[a]: «No sé de dónde son ustedes. Apártense de mí, todos ustedes, obradores[b] de injusticia.»'
  revised_footnotes:
  - marker: a
    text: O «de dónde vienen ustedes».
    reason: lexical_alternative
  - marker: b
    text: O «trabajadores de iniquidad»; o «hacedores de maldad».
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura general del borrador, pero se cambia «trabajadores» por «obradores» para una expresión más idiomática y moralmente marcada en español, más adecuada para ἐργάται ἀδικίας. También se corrige la nota [b] para que preserve mejor las alternativas documentadas en el POB inglés para la frase condenatoria completa, no solo para el sustantivo «workers». No se requiere adjudicación adicional.
