translation:
  language: es
  text: 'Y él les dirá[a]: «No sé de dónde son ustedes. Apártense de mí, todos ustedes, obradores[b] de injusticia.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de dónde vienen ustedes».
    reason: lexical_alternative
  - marker: b
    text: O «trabajadores de iniquidad»; o «hacedores de maldad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρεῖ
  english_pob_choice: he will say
  chosen_spanish: les dirá
  alternatives_spanish:
  - les dirá
  - les hablará
  - les declarará
  lexicon: BDAG
  rationale: El futuro de λέγω funciona aquí como introducción de discurso directo. En español, «les dirá» conserva el valor de habla directa con naturalidad y sin añadir matices inexistentes.
- source_word: λέγων
  english_pob_choice: telling
  chosen_spanish: '[omitido en la superficie; incorporado en la forma verbal principal]'
  alternatives_spanish:
  - diciendo
  - al decirles
  lexicon: BDAG
  rationale: El participio es redundante con ἐρεῖ y en español una doble marcación como «dirá, diciendo» suena forzada. Se integra su función discursiva en el verbo principal, manteniendo el flujo natural sin perder el encabezamiento de la cita.
- source_word: οἶδα
  english_pob_choice: I do not know
  chosen_spanish: No sé
  alternatives_spanish:
  - No conozco
  - No reconozco
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento/reconocimiento. «No sé» es la forma más transparente y directa en español para esta fórmula de rechazo relacional.
- source_word: πόθεν ἐστέ
  english_pob_choice: where you are from
  chosen_spanish: de dónde son ustedes
  alternatives_spanish:
  - de dónde vienen ustedes
  - de qué lugar son ustedes
  lexicon: BDAG
  rationale: πόθεν apunta al origen. «De dónde son ustedes» conserva el sentido de procedencia de manera idiomática en español; el plural explícito evita ambigüedad del sujeto gramatical.
- source_word: ἀπόστητε ἀπ’ ἐμοῦ
  english_pob_choice: Depart from me
  chosen_spanish: Apártense de mí
  alternatives_spanish:
  - Aléjense de mí
  - Retírense de mí
  lexicon: BDAG
  rationale: El imperativo aoristo de ἀφίσταμαι pide una separación decisiva. «Apártense de mí» expresa con claridad y peso esa ruptura, en un registro bíblico natural en español.
- source_word: πάντες
  english_pob_choice: all you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - todos vosotros
  lexicon: BDAG
  rationale: El vocativo se hace explícito en español con «todos ustedes», evitando la ambigüedad de un simple «todos» y manteniendo el tono de acusación directa.
- source_word: ἐργάται
  english_pob_choice: workers
  chosen_spanish: trabajadores
  alternatives_spanish:
  - obreros
  - hacedores
  lexicon: BDAG
  rationale: «Trabajadores» mantiene la imagen de personas ocupadas en una práctica. Aunque «obreros» sería posible, «trabajadores» suena más claro para lectores contemporáneos sin perder el matiz verbal del sustantivo.
- source_word: ἀδικίας
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - iniquidad
  - mal obrar
  lexicon: BDAG
  rationale: ἀδικία denota injusticia/iniquidad/wrongdoing. «Injusticia» preserva la fuerza moral y la conexión con el campo de δικαιοσύνη sin restringir indebidamente a «ilegalidad» o «desobediencia a la ley».
theological_decisions:
- issue: Alcance moral de ἐργάται ἀδικίας
  english_pob_reading: workers of unrighteousness
  chosen_spanish_reading: trabajadores de injusticia
  alternative_spanish_readings:
  - trabajadores de iniquidad
  - trabajadores de maldad
  - obradores de injusticia
  rationale: La frase condena una práctica caracterizada por injusticia, no necesariamente una sola infracción legal puntual. «Injusticia» conserva el peso ético amplio del original y evita introducir el matiz más específico de «desobediencia a la ley» que tendría «lawlessness».
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue la revisión de no reproducir una doble formulación como «decir, diciéndoles» en español. Se integró el participio griego en una sola introducción de discurso («les dirá») por naturalidad, manteniendo el contenido semántico del original y el tenor del juicio.
  spanish_consistency_notes:
  - Se mantiene «ustedes» para el plural de segunda persona, coherente con un registro neutral latinoamericano.
  - Se evita «SEÑOR» o sustitución por mayúsculas para el nombre divino, porque este versículo no contiene el Tetragrámaton ni una cita directa de κύριος con ese valor.
  - «Injusticia» se usa de forma consistente con la familia δικαιοσύνη/ἀδικία en términos morales generales, sin convertirla en una categoría meramente legal.
