translation:
  language: es
  text: Y si da fruto[a] en el futuro, está bien; pero si no, la cortarás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "para el futuro"; el griego dice más literalmente "en el tiempo venidero". Algunas traducciones concretan "el año que viene" por influencia del versículo anterior, pero aquí el texto es más general.'
    reason: alternative_reading
lexical_decisions:
- source_word: κἂν μὲν
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Y si en verdad
  - Y aun si
  lexicon: BDAG
  rationale: La construcción introduce una condición simple con contraste posterior. En español, "Y si" conserva la apertura condicional y el enlace con la cláusula siguiente sin sobrecargar el tono.
- source_word: ποιήσῃ καρπὸν
  english_pob_choice: it bears fruit
  chosen_spanish: da fruto
  alternatives_spanish:
  - produce fruto
  - lleva fruto
  lexicon: BDAG
  rationale: Con καρπός, ποιέω funciona idiomáticamente como "dar fruto". Esta opción es natural en español y mantiene la imagen agrícola con fidelidad.
- source_word: εἰς τὸ μέλλον
  english_pob_choice: in the future
  chosen_spanish: en el futuro
  alternatives_spanish:
  - para el futuro
  - en lo venidero
  - para el tiempo venidero
  lexicon: BDAG
  rationale: La frase griega es más general que "next year"; "en el futuro" refleja el sentido literal de tiempo venidero sin añadir precisión no expresada aquí.
- source_word: ἐκκόψεις αὐτήν
  english_pob_choice: you will cut it down
  chosen_spanish: la cortarás
  alternatives_spanish:
  - la cortarás de raíz
  - la derribarás
  lexicon: BDAG
  rationale: ἐκκόπτω en este contexto agrícola indica cortar un árbol. En español, el objeto directo femenino ya identifica la higuera; "la cortarás" mantiene la imagen y puede entenderse como cortar el árbol, sin introducir una expansión innecesaria.
theological_decisions:
- issue: Precisión temporal de la amenaza final
  english_pob_reading: The verse is left as a conditional outcome within the parable, without importing an explicit timeframe such as 'next year' into the main text.
  chosen_spanish_reading: La traducción deja la advertencia abierta como desenlace condicional, sin introducir en el texto principal un marco temporal específico como "el año que viene".
  alternative_spanish_readings:
  - si no, la cortarás el año que viene
  - si no, la cortarás entonces
  rationale: El griego de este versículo dice literalmente "para el futuro / en el tiempo venidero" y no repite un plazo concreto. Mantener esa generalidad evita precisar más de lo que el texto base afirma.
  doctrine_reference: Interpretación contextual del discurso parabólico; coherencia con el griego de LC 13:9 y su relación con el versículo anterior.
translation_notes:
  revision_awareness: Se revisó el punto temporal de εἰς τὸ μέλλον y se optó por una formulación general en el texto principal, siguiendo el griego y el criterio auditado de la POB inglesa. No se requirieron otras revisiones sustantivas.
  spanish_consistency_notes:
  - Se usó "fruto" en singular, conforme al valor idiomático de καρπός.
  - Se evitó "SEÑOR" u otras sustituciones no pertinentes; no hay términos divinos en este versículo.
  - La pronombre femenino implícita en "la" conserva la referencia a la higuera sin necesidad de explicitar "árbol".
