translation:
  language: es
  text: Y mientras él decía estas cosas, todos los que se le oponían quedaban avergonzados, y toda la multitud se alegraba por todas las cosas gloriosas[a] hechas por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas las cosas maravillosas» o «todas las cosas espléndidas». El griego dice «las cosas gloriosas», una expresión amplia que puede incluir sus obras poderosas.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ταῦτα λέγοντος αὐτοῦ
  english_pob_choice: as he was saying these things
  chosen_spanish: Y mientras él decía estas cosas
  alternatives_spanish:
  - Y cuando él decía estas cosas
  - Y mientras decía estas cosas
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto con participio presente pide una relación simultánea de acción; en español, «mientras» comunica bien la simultaneidad sin forzar un calco. Mantengo «estas cosas» para conservar la deíxis del original.
- source_word: κατῃσχύνοντο
  english_pob_choice: were put to shame
  chosen_spanish: se avergonzaban
  alternatives_spanish:
  - eran avergonzados
  - quedaban en vergüenza
  lexicon: BDAG
  rationale: El griego imperfecto pasivo/medio describe un estado continuo mientras Jesús hablaba. «Se avergonzaban» es natural en español y puede reflejar la vergüenza pública implícita, aunque es algo menos explícitamente pasivo que la opción inglesa.
- source_word: οἱ ἀντικείμενοι αὐτῷ
  english_pob_choice: those who were opposing him
  chosen_spanish: los que se le oponían
  alternatives_spanish:
  - sus opositores
  - los que estaban contra él
  lexicon: BDAG
  rationale: El participio de ἀντίκειμαι conserva fuerza verbal de oposición activa. «Se le oponían» mantiene esa dinámica mejor que un sustantivo estático como «opositores».
- source_word: πᾶς ὁ ὄχλος
  english_pob_choice: the whole crowd
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - toda la gente
  - la multitud entera
  lexicon: BDAG
  rationale: La expresión colectiva singular en español se expresa de forma idiomática como «toda la multitud», preservando que el grupo en conjunto responde con alegría.
- source_word: ἔχαιρεν
  english_pob_choice: was rejoicing
  chosen_spanish: se alegraba
  alternatives_spanish:
  - se regocijaba
  - estaba alegrándose
  lexicon: BDAG
  rationale: El imperfecto sugiere gozo continuo; «se alegraba» comunica la acción durativa con naturalidad en español. «Se regocijaba» es posible, pero más marcado y menos corriente.
- source_word: ἐπὶ πᾶσιν τοῖς ἐνδόξοις
  english_pob_choice: over all the glorious things
  chosen_spanish: por todas las cosas gloriosas
  alternatives_spanish:
  - por todas las cosas gloriosas y admirables
  - por todas las cosas espléndidas
  lexicon: BDAG
  rationale: Con ἐπί + dativo, el gozo se apoya en lo que sucede; «por» expresa bien la base del regocijo en español. «Gloriosas» preserva ἔνδοξος sin reducirlo a «milagrosas», que sería más específico que el texto.
- source_word: τοῖς γινομένοις ὑπ’ αὐτοῦ
  english_pob_choice: being done by him
  chosen_spanish: que se hacían por medio de él
  alternatives_spanish:
  - que eran hechos por él
  - que ocurrían por él
  lexicon: BDAG
  rationale: El participio presente de γίνομαι pide un sentido progresivo; «se hacían» lo conserva. «Por medio de él» refleja la agencia de ὑπό con el genitivo de modo natural en español y evita endurecer la frase en una pasiva más pesada.
theological_decisions:
- issue: Alcance de «las cosas gloriosas»
  english_pob_reading: Render ἐνδόξοις broadly as 'glorious things' rather than specifying miracles.
  chosen_spanish_reading: «las cosas gloriosas» se mantiene amplio, sin concretar «milagros».
  alternative_spanish_readings:
  - las cosas maravillosas
  - los milagros gloriosos
  rationale: El contexto inmediato sugiere acciones poderosas de Jesús, pero el adjetivo griego es más amplio que «milagros». Mantener la amplitud evita restringir el texto más de lo que el léxico exige y conserva la tensión entre gloria, honor y poder visible.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Agencia en ὑπ’ αὐτοῦ
  english_pob_reading: Translate as 'by him.'
  chosen_spanish_reading: «por medio de él» expresa la agencia sin debilitarla.
  alternative_spanish_readings:
  - hechas por él
  - hechas por medio de él
  rationale: La preposición ὑπό con genitivo atribuye agencia; en español, «por medio de él» comunica esa causalidad/autoría con fluidez. No introduce una mediación impersonal ni atenúa la acción de Jesús.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; el pasaje muestra alto acuerdo entre revisores y se mantiene la lectura acordada sin cambios.
  spanish_consistency_notes:
  - Se usa «Jesús» implícitamente en «él» conforme al contexto inmediato, igual que en el inglés auditado.
  - Se evita «SEÑOR» como sustituto del nombre divino porque el versículo no contiene un caso de κύριος con valor de nombre divino.
  - 'Se preserva el aspecto imperfectivo con formas continuas o durativas: «se oponían», «se avergonzaban», «se alegraba».'
