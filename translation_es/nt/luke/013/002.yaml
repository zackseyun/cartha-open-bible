- from: 'Y respondiendo, les dijo: «¿Piensan que estos galileos eran pecadores[a] más que todos los galileos, porque padecieron estas cosas?»'
  to: 'Y respondiendo, les dijo: «¿Piensan que estos galileos eran pecadores[a] más que todos los demás galileos, porque han padecido estas cosas?»'
  rationale: Se ajusta el comparativo para que suene más natural en español sin perder la fuerza comparativa de παρά + acusativo, y se cambia «padecieron» por «han padecido» para reflejar mejor el perfecto πεπόνθασιν y alinearse con la auditoría inglesa.
