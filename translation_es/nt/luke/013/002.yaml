translation:
  language: es
  text: 'Y respondiendo, les dijo: «¿Piensan que estos galileos eran pecadores[a] más que todos los demás galileos, porque han padecido estas cosas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más pecadores que todos los demás galileos» o «peores pecadores que todos los galileos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answering
  chosen_spanish: Y respondiendo
  alternatives_spanish:
  - Y al responder
  - Y en respuesta
  lexicon: BDAG
  rationale: Conserva el participio aoristo circunstancial de forma natural en español y refleja la transición narrativa antes de «les dijo».
- source_word: Δοκεῖτε
  english_pob_choice: Do you think
  chosen_spanish: ¿Piensan
  alternatives_spanish:
  - ¿Creen
  - ¿Suponen
  lexicon: BDAG
  rationale: En plural de cortesía/narrativo, «¿Piensan?» reproduce la pregunta retórica con claridad y mantiene el matiz de evaluación mental de δοκέω.
- source_word: οἱ Γαλιλαῖοι οὗτοι
  english_pob_choice: these Galileans
  chosen_spanish: estos galileos
  alternatives_spanish:
  - estos hombres de Galilea
  lexicon: BDAG
  rationale: «Galileos» es el gentilicio directo y mantiene el demostrativo «estos» como en el griego y el inglés auditado.
- source_word: ἁμαρτωλοὶ
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - personas pecadoras
  - gente pecadora
  lexicon: BDAG
  rationale: El sustantivo/adjetivo sustantivado se vierte con el término bíblico directo «pecadores», sin suavizar su fuerza lexical.
- source_word: παρὰ πάντας τοὺς Γαλιλαίους
  english_pob_choice: beyond all the Galileans
  chosen_spanish: más que todos los galileos
  alternatives_spanish:
  - por encima de todos los galileos
  - peores que todos los galileos
  lexicon: BDAG
  rationale: παρά con acusativo expresa comparación; en español, «más que» comunica la relación comparativa de manera natural. Se evita introducir «peores» en el texto principal para no resolver interpretivamente la valoración implícita.
- source_word: ἐγένοντο
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - fueron
  - llegaron a ser
  lexicon: BDAG
  rationale: Aunque γίνομαι puede significar «llegar a ser», en este contexto la construcción comparativa funciona idiomáticamente como un juicio de estado; «eran» sigue la revisión inglesa y suena natural en español.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Marca la causa aparente expuesta en la pregunta, sin añadir explicaciones ajenas al texto.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas calamidades
  - esto
  lexicon: BDAG
  rationale: La referencia plural se conserva con «estas cosas», que es transparente y no interpreta de antemano el tipo exacto de sufrimiento.
- source_word: πεπόνθασιν
  english_pob_choice: they have suffered
  chosen_spanish: padecieron
  alternatives_spanish:
  - han padecido
  - han sufrido
  lexicon: BDAG
  rationale: El perfecto de πάσχω puede expresar el hecho de haber experimentado sufrimiento; en español, el pretérito perfecto simple «padecieron» suena natural y comunica el evento sin forzar un aspecto perfecto poco idiomático.
theological_decisions:
- issue: ¿Jesús está afirmando que el sufrimiento extraordinario prueba mayor pecado?
  english_pob_reading: The verse is translated as a rhetorical question challenging that assumption, without endorsing it.
  chosen_spanish_reading: La frase se traduce como una pregunta retórica que pone en duda esa suposición, sin afirmarla.
  alternative_spanish_readings:
  - Una traducción más lisa podría sonar como afirmación de que sí eran más pecadores.
  - Convertirla en afirmación directa borraría la tensión del pasaje.
  rationale: La estructura interrogativa y el contexto inmediato indican que Jesús cuestiona la inferencia entre tragedia y culpa mayor. La traducción conserva esa tensión y no la resuelve con una paráfrasis doctrinal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «became sinners» por «were sinners» para reflejar mejor ἁμαρτωλοὶ ... ἐγένοντο en contexto. La propuesta española sigue esa revisión con «eran pecadores» y mantiene la pregunta retórica sin intensificarla a una afirmación.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aplica.
  - Se mantiene el registro bíblico contemporáneo y lectorable, evitando arcaísmos innecesarios.
  - «Pecadores» se conserva como término lexical directo; no se sustituye por «malvados» o «culpables» porque el griego usa ἁμαρτωλοὶ.
  - La comparación «más que» preserva la relación de παρά con acusativo sin introducir interpretación extra en el cuerpo principal.
  - El perfecto griego se vierte con pretérito simple por fluidez y naturalidad del español, sin perder el valor de evento sufrido.
