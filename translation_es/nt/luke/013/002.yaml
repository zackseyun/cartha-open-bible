review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura interrogativa y el sentido básico del griego: Jesús cuestiona la suposición de que la tragedia indica mayor pecado. Conserva adecuadamente «estos galileos», «pecadores» y la relación causal con «porque». Sin embargo, «padecieron» reduce innecesariamente el matiz perfecto de πεπόνθασιν frente al inglés auditado «have suffered»; en español es más fiel y natural «han padecido» o «han sufrido».'
  spanish_quality_summary: 'El texto es legible y digno, pero «Y respondiendo» suena algo calcado en español bíblico moderno; «Y respondiendo» sigue siendo aceptable, aunque «Y respondiendo, les dijo» no es incorrecto. El ajuste principal necesario es aspectual: «han padecido» fluye bien y representa mejor el valor verbal. También conviene alinear el texto principal con la nota léxica usando «todos los demás galileos», porque «más que todos los galileos» puede sonar ligeramente incompleto en español al comparar pecaminosidad.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «pecadores» corresponde bien a ἁμαρτωλοὶ. No aparecen términos sensibles del glosario mayor. La nota alternativa es apropiada, pero el texto principal mejora con una comparación más idiomática: «más pecadores que todos los demás galileos».'
  issues:
  - severity: medium
    issue: «padecieron» no refleja bien el perfecto πεπόνθασιν
    rationale: El griego y el inglés auditado conservan un valor resultativo/experiencial («han padecido»). El pretérito simple español no es imposible, pero aquí pierde una correspondencia significativa sin necesidad estilística.
  - severity: low
    issue: «más que todos los galileos» suena menos idiomático en español en esta construcción
    rationale: Aunque comprensible, en español comparativo con «pecadores» se expresa con mayor naturalidad «más pecadores que todos los demás galileos», además coherente con la nota alternativa ya documentada.
  revised_spanish_text: 'Y respondiendo, les dijo: «¿Piensan que estos galileos eran pecadores[a] más que todos los demás galileos, porque han padecido estas cosas?»'
  revised_footnotes:
  - marker: a
    text: O «más pecadores que todos los demás galileos» o «peores pecadores que todos los galileos».
    reason: lexical_alternative
  revision_rationale: Se ajusta el comparativo para que suene más natural en español sin perder la fuerza comparativa de παρά + acusativo, y se cambia «padecieron» por «han padecido» para reflejar mejor el perfecto πεπόνθασιν y alinearse con la auditoría inglesa.
