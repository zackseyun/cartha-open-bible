translation:
  language: es
  text: 'Pero el Señor le respondió y dijo: «¡Hipócritas! ¿No desata cada uno de ustedes en sábado su buey o su asno del comedero[a] y lo lleva para darle de beber?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pesebre». El griego φάτνη puede referirse a un lugar o recipiente para dar de comer al animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el maestro
  lexicon: BDAG
  rationale: Se conserva el título narrativo/cristológico aplicado a Jesús en Lucas. En español, «el Señor» es el equivalente natural de «the Lord» y mantiene el peso teológico sin rebajarlo a «el maestro».
- source_word: Ὑποκριταί
  english_pob_choice: Hypocrites
  chosen_spanish: ¡Hipócritas!
  alternatives_spanish:
  - ¡Ustedes, hipócritas!
  - ¡Hipócrita(s)!
  lexicon: BDAG
  rationale: El vocativo plural exige una reprensión directa. «¡Hipócritas!» reproduce la fuerza del griego y concuerda con el tono retórico del pasaje sin añadir palabras que no están en el texto.
- source_word: ἕκαστος ὑμῶν
  english_pob_choice: each of you
  chosen_spanish: cada uno de ustedes
  alternatives_spanish:
  - cada uno de vosotros
  - todos ustedes
  lexicon: BDAG
  rationale: La fuerza distributiva se expresa de manera natural en español con «cada uno de ustedes», preservando la apelación individual a cada oyente.
- source_word: τῷ σαββάτῳ
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - el día de reposo
  - en el sábado
  lexicon: BDAG
  rationale: Como dativo temporal, el sentido es «en sábado». Se evita una perífrasis más larga; «el día de reposo» sería una interpretación más explicativa que el texto no exige.
- source_word: λύει
  english_pob_choice: untie
  chosen_spanish: desata
  alternatives_spanish:
  - desamarra
  - suelta
  lexicon: BDAG
  rationale: En el contexto de un animal atado, «desata» comunica bien la acción física de soltar la cuerda o atadura. Es el equivalente español más natural y directo de «untie».
- source_word: βοῦν
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - toro
  - vaca
  lexicon: BDAG
  rationale: «Buey» es el equivalente bíblico y agrícola más preciso para el animal de trabajo en este contexto. Además, evita la posible ambigüedad de «toro» o «vaca».
- source_word: ὄνον
  english_pob_choice: donkey
  chosen_spanish: asno
  alternatives_spanish:
  - burro
  - mula
  lexicon: BDAG
  rationale: «Asno» conserva el registro bíblico y corresponde al animal mencionado junto al buey. «Burro» es más coloquial; se prefiere el término más estable y preciso para el texto.
- source_word: φάτνης
  english_pob_choice: feeding trough
  chosen_spanish: pesebrera
  alternatives_spanish:
  - pesebre
  - comedero
  - mangeda
  lexicon: BDAG
  rationale: El inglés POB opta por «feeding trough» y añade una nota con «manger» como alternativa. En español, «pesebrera» cubre bien el sentido de lugar/recipiente de comida para animales y evita reducir el término a una sola tradición navideña asociada a «pesebre».
- source_word: ἀπαγαγὼν
  english_pob_choice: lead it away
  chosen_spanish: lo lleva
  alternatives_spanish:
  - lo conduce
  - lo aparta y lo lleva
  lexicon: BDAG
  rationale: El participio aoristo coordinado con el verbo principal se vierte con una acción natural y fluida en español. «Lo lleva a beber» recoge la secuencia de llevar al animal desde el comedero hasta el agua sin sobrecargar la frase.
- source_word: ποτίζει
  english_pob_choice: water it
  chosen_spanish: lo lleva a beber
  alternatives_spanish:
  - le da de beber
  - lo hace beber
  lexicon: BDAG
  rationale: Aunque el verbo literalmente expresa dar de beber, en español la construcción idiomática más natural es «lo lleva a beber», que reproduce la acción completa en el contexto narrativo. También mantiene la relación con la pregunta retórica de la frase.
theological_decisions:
- issue: Aplicación de κύριος a Jesús
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el maestro
  rationale: El contexto narrativo identifica a Jesús como κύριος. Traducirlo por «el Señor» preserva el valor cristológico y la terminología consistente del proyecto, en vez de rebajarlo a un simple «maestro».
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Tono de reprensión profética en Ὑποκριταί
  english_pob_reading: Hypocrites
  chosen_spanish_reading: ¡Hipócritas!
  alternative_spanish_readings:
  - ¡Ustedes, hipócritas!
  - ¡Hipócrita(s)!
  rationale: La reprensión directa forma parte del argumento de Jesús. Se mantiene el insulto profético sin suavizarlo, porque el griego usa un vocativo plural enfático.
  doctrine_reference: Narrative rhetoric in the Gospels — direct rebuke
- issue: φάτνη y su alcance semántico
  english_pob_reading: feeding trough
  chosen_spanish_reading: pesebrera
  alternative_spanish_readings:
  - pesebre
  - comedero
  rationale: El término griego puede abarcar el lugar o recipiente donde se alimenta al animal. «Pesebrera» conserva esa amplitud y evita una reducción innecesaria a la imaginería navideña de «pesebre»; por eso se añade una nota alternativa.
  doctrine_reference: Lexical ambiguity without doctrinal issue
translation_notes:
  revision_awareness: El texto inglés POB fue revisado desde «lead it away to give it water» a «water it» para reflejar mejor la fluidez del griego. La propuesta española sigue esa revisión con una formulación igualmente directa y natural, manteniendo el orden retórico de la pregunta y la imagen agrícola sin añadir explicaciones.
  spanish_consistency_notes:
  - Se mantiene «el Señor» para κύριος, en línea con el tratamiento cristológico del proyecto.
  - Se evita «SEÑOR» en versalitas o máscara tipográfica; la norma del proyecto pide «Yahvé» solo para יהוה, no para κύριος.
  - «Buey» y «asno» conservan el registro bíblico y la pareja de animales del original.
  - La nota sobre φάτνη preserva la alternativa semántica documentada por el POB inglés.
