revisions:
- from: 'Pero el Señor le respondió y dijo: «¡Hipócritas! ¿No desata cada uno de ustedes en sábado su buey o su asno de la [a]pesebrera y lo lleva a beber?»'
  to: 'Pero el Señor le respondió y dijo: «¡Hipócritas! ¿No desata cada uno de ustedes en sábado su buey o su asno del comedero[a] y lo lleva para darle de beber?»'
  rationale: Se ajusta el final para reflejar mejor la secuencia y el sentido de ποτίζει (‘dar de beber’), y se reemplaza «pesebrera» por «comedero» por mayor naturalidad y claridad panhispánica, conservando «pesebre» en nota como alternativa léxica documentada. Se mantiene «el Señor», «Hipócritas», «cada uno de ustedes», «en sábado», «buey» y «asno» por fidelidad y buen registro.
  reviewer_model: gpt-5.4
