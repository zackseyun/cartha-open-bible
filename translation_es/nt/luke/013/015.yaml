    text: O «pesebre». El griego φάτνη puede referirse a un lugar o recipiente para dar de comer al animal.
    reason: lexical_alternative
  revision_rationale: Se ajusta el final para reflejar mejor la secuencia y el sentido de ποτίζει (‘dar de beber’), y se reemplaza «pesebrera» por «comedero» por mayor naturalidad y claridad panhispánica, conservando «pesebre» en nota como alternativa léxica documentada. Se mantiene «el Señor», «Hipócritas», «cada uno de ustedes», «en sábado», «buey» y «asno» por fidelidad y buen registro.
