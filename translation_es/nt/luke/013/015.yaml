review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del griego y mantiene correctamente «el Señor», «Hipócritas», «cada uno de ustedes», «buey» y «asno». Sin embargo, no refleja con suficiente precisión la secuencia verbal final: ἀπαγαγὼν ποτίζει significa ‘lo lleva/lo conduce y le da agua’ o ‘lo lleva a darle de beber’, no simplemente «lo lleva a beber», que desplaza la acción de dar agua hacia una acción más centrada en el animal. También «pesebrera» suena menos natural y menos ampliamente legible que «comedero», mientras que la nota puede preservar «pesebre» como alternativa documentada por el inglés POB.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero «de la [a]pesebrera» resulta algo poco natural en registro bíblico general y la colocación del marcador dentro de la palabra es tipográficamente torpe. «En sábado» es posible, pero «en el sábado» o «en sábado»; dado el objetivo de fluidez eclesial amplia, «en el sábado» sigue menos natural que «en sábado», así que no requiere cambio. La mejora principal es hacer más idiomático y exacto el cierre: «y lo lleva para darle de beber».'
  glossary_alignment: 'La terminología principal del proyecto está bien alineada: κύριος → «el Señor» y el resto no entra en conflicto con glosario doctrinal. No obstante, para φάτνη conviene una opción española más clara y común («comedero») con nota «O “pesebre”». Eso preserva la razón léxica del POB inglés sin depender de «pesebrera», que no es la mejor opción panhispánica.'
  issues:
  - severity: medium
    issue: La frase final «lo lleva a beber» no traduce con precisión ποτίζει.
    rationale: ποτίζει significa ‘dar de beber / dar agua / abrevar’, no solo ‘beber’. El español actual necesita expresar que la persona proporciona el agua al animal.
  - severity: medium
    issue: «pesebrera» es menos natural y menos ampliamente comprensible que otras opciones.
    rationale: Aunque puede entenderse, no es la opción más clara para lectura eclesial general. «Comedero» reproduce bien el sentido de φάτνη como lugar/recipiente de alimentación, y la nota puede conservar «pesebre».
  - severity: low
    issue: La colocación del marcador de nota en «[a]pesebrera» es poco limpia.
    rationale: El marcador debe anclarse a la palabra o frase relevante sin romper la lectura; «comedero[a]» o «pesebre[a]» es más natural.
