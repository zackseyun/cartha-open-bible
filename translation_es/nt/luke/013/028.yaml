translation:
  language: es
  text: Allí habrá llanto y crujir de dientes, cuando vean a Abraham, a Isaac, a Jacob y a todos los profetas en el reino de Dios, pero ustedes mismos arrojados fuera[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «echados fuera». El participio griego ἐκβαλλομένους, junto con ἔξω, subraya una exclusión forzosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: BDAG
  rationale: El adverbio de lugar señala el sitio de la exclusión y del juicio; «allí» conserva esa referencia espacial de forma natural en español.
- source_word: κλαυθμὸς
  english_pob_choice: weeping
  chosen_spanish: llanto
  alternatives_spanish:
  - lamento
  - lloró
  lexicon: BDAG
  rationale: «Llanto» comunica bien el dolor expresado por el sustantivo griego sin volverlo más interpretativo que el original.
- source_word: βρυγμὸς τῶν ὀδόντων
  english_pob_choice: gnashing of teeth
  chosen_spanish: crujir de dientes
  alternatives_spanish:
  - rechinar de dientes
  - apretar los dientes
  lexicon: BDAG
  rationale: La expresión es una locución estable de angustia y rabia en contextos de juicio; «crujir de dientes» preserva el giro bíblico con buena inteligibilidad. «Rechinar» sería posible, pero aquí «crujir» sigue la tradición castellana sin perder fuerza.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  - siempre que
  lexicon: BDAG
  rationale: Introduce la circunstancia futura concreta en la que ocurre la escena; «cuando» es la correspondencia natural.
- source_word: ὄψησθε
  english_pob_choice: you see
  chosen_spanish: vean
  alternatives_spanish:
  - vean ustedes
  - veáis
  lexicon: BDAG
  rationale: El español requiere la forma verbal adecuada al sujeto implícito plural de segunda persona; «vean» mantiene la referencia directa sin sobrecargar el texto.
- source_word: πάντας τοὺς προφήτας
  english_pob_choice: all the prophets
  chosen_spanish: a todos los profetas
  alternatives_spanish:
  - todos los profetas
  - a todos los profetas de Dios
  lexicon: BDAG
  rationale: Se conserva el artículo y el valor de totalidad; el objeto directo con «a» es necesario en español por tratarse de personas.
- source_word: ἐν τῇ βασιλείᾳ τοῦ θεοῦ
  english_pob_choice: in the kingdom of God
  chosen_spanish: en el reino de Dios
  alternatives_spanish:
  - en el reino de Yahvé
  - en el reino divino
  lexicon: BDAG
  rationale: «Reino de Dios» es la manera clara y fiel de expresar βασιλεία τοῦ θεοῦ en español, sin necesidad de una paráfrasis.
- source_word: ὑμᾶς δὲ
  english_pob_choice: but you yourselves
  chosen_spanish: y a ustedes mismos
  alternatives_spanish:
  - pero ustedes mismos
  - sino a ustedes mismos
  lexicon: BDAG
  rationale: El griego enfatiza explícitamente a los oyentes como contraste; «a ustedes mismos» conserva esa fuerza enfática. Se coordinó con la frase anterior mediante «y» para fluidez en español, sin eliminar el contraste que introduce δέ.
- source_word: ἐκβαλλομένους ἔξω
  english_pob_choice: thrown out
  chosen_spanish: arrojados fuera
  alternatives_spanish:
  - echados fuera
  - expulsados
  lexicon: BDAG
  rationale: El participio pasivo presenta la condición de ser expulsados con fuerza. «Arrojados fuera» conserva la violencia de ἐκβάλλω y la redundancia enfática de ἔξω. «Echados fuera» sería posible, pero aquí «arrojados» es más enérgico.
theological_decisions:
- issue: Imagen concreta de juicio y exclusión
  english_pob_reading: Retain the concrete language of exclusion and anguish without softening or specifying beyond the text.
  chosen_spanish_reading: Conservar el lenguaje concreto de exclusión y angustia sin suavizarlo ni convertirlo en una explicación doctrinal más amplia.
  alternative_spanish_readings:
  - reinterpretar como simple tristeza profunda
  - explicitar condenación final
  rationale: El versículo presenta llanto, crujir de dientes y expulsión fuera del reino; no desarrolla por sí mismo toda la doctrina del juicio final. La traducción mantiene la imagen y su tensión, sin añadir contenido que el griego no expresa de manera explícita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB que simplifica la clausula final a una forma más natural («thrown out») y se preservó en español el sentido participial de expulsión forzosa mediante «arrojados fuera». También se mantuvo el adverbio locativo de apertura con una posición natural en español.
  spanish_consistency_notes:
  - Se usó «Dios» para θεοῦ y «reino de Dios» por consistencia con la terminología base del proyecto.
  - Se prefirió «arrojados fuera» para conservar la fuerza de ἐκβάλλω y la partícula ἔξω sin atenuación.
  - Se eligió «llanto» y «crujir de dientes» como equivalentes idiomáticos que siguen el registro bíblico sin mecanicismo.
  - Se mantuvo el énfasis del pronombre griego con «a ustedes mismos».
