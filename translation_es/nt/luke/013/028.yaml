    issue: «y a ustedes mismos» no refleja adecuadamente el contraste de ὑμᾶς δὲ
    rationale: 'δέ marca contraste, y el pronombre explícito ὑμᾶς es enfático. La conjunción «y» convierte la cláusula en simple adición y atenúa el sentido: los patriarcas están dentro, pero ustedes fuera.'
  - severity: medium
    issue: Incoherencia de tratamiento en «cuando vean ... a ustedes mismos»
    rationale: 'El verbo «vean» usa cortesía de ustedes, pero la construcción final con objeto introducido por «a» queda torpe. En español resulta más natural: «cuando vean ... pero ustedes mismos sean/arrojados fuera» o elípticamente «pero ustedes mismos, arrojados fuera».'
  - severity: low
    issue: La nota al pie no corresponde del todo al mejor punto de anclaje
    rationale: La nota explica ἐκβαλλομένους junto con ἔξω, así que conviene anclarla en la expresión completa de expulsión, no en «crujir de dientes».
