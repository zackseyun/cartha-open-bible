translation:
  language: es
  text: Es como la levadura[a][b][c], que una mujer tomó y escondió en tres medidas de harina hasta que todo quedó leudado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fermento». El término griego se refiere al agente de fermentación usado en la masa.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «tres sata» (aproximadamente tres seahs), una gran cantidad de harina.'
    reason: cultural_note
  - marker: c
    text: O «mezcló en» para «escondió»; el verbo griego significa literalmente «escondió» u «ocultó».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοία
  english_pob_choice: like
  chosen_spanish: es semejante a
  alternatives_spanish:
  - es como
  - se parece a
  lexicon: BDAG
  rationale: La forma griega introduce una comparación; en español, «es semejante a» conserva ese valor comparativo con dignidad y claridad, sin volver la frase demasiado coloquial.
- source_word: ζύμῃ
  english_pob_choice: leaven
  chosen_spanish: la levadura
  alternatives_spanish:
  - la levadura fermentante
  - la masa leudante
  lexicon: BDAG
  rationale: «Levadura» es el equivalente español natural para el agente leudante antiguo y preserva la imagen bíblica. No se opta por una glosa técnica en el texto principal.
- source_word: λαβοῦσα
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - habiendo tomado
  - al tomar
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y en español se expresa con naturalidad mediante la secuencia verbal simple «tomó y escondió», como en el audit trail inglés.
- source_word: γυνή
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - la mujer
  lexicon: BDAG
  rationale: El contexto parabólico presenta una figura indefinida; «una mujer» refleja mejor esa indefinición que un artículo definido.
- source_word: ἔκρυψεν
  english_pob_choice: hid
  chosen_spanish: escondió
  alternatives_spanish:
  - ocultó
  - mezcló
  lexicon: BDAG
  rationale: El verbo básico significa «esconder/ocultar». «Escondió» sigue de cerca el griego y evita introducir una explicación interpretativa como «mezcló» en el texto principal.
- source_word: εἰς ἀλεύρου σάτα τρία
  english_pob_choice: in three measures of flour
  chosen_spanish: en tres medidas de harina
  alternatives_spanish:
  - en tres sata de harina
  - en unos tres sata de harina
  - en tres seahs de harina
  lexicon: BDAG
  rationale: «Medidas de harina» comunica el sentido sin tecnicismos. Se mantiene la unidad de medida implícita en nota para no perder la referencia cultural del original.
- source_word: ἕως οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta que llegó a
  lexicon: BDAG
  rationale: «Hasta que» es la equivalencia temporal natural en español y conserva el valor de límite del griego.
- source_word: ἐζυμώθη ὅλον
  english_pob_choice: it was all leavened
  chosen_spanish: todo quedó leudado
  alternatives_spanish:
  - todo fue leudado
  - quedó todo leudado
  - toda la masa quedó leudada
  lexicon: BDAG
  rationale: El pasivo griego expresa el resultado total de la acción. «Todo quedó leudado» transmite ese resultado de manera natural en español y evita una construcción demasiado literal.
theological_decisions:
- issue: Valor simbólico de la levadura
  english_pob_reading: Render neutrally as 'leaven' without importing a negative or positive theological interpretation into the translation.
  chosen_spanish_reading: Mantener el símbolo de la levadura sin decidir en la traducción si es negativo o positivo.
  alternative_spanish_readings:
  - usar una glosa interpretativa que la presente como corrupción
  - usar una glosa interpretativa que la presente como crecimiento del reino
  rationale: La comparación de la parábola presenta un efecto permeante sin resolver el debate más amplio sobre la valoración de la levadura en otros pasajes. La traducción debe preservar esa tensión teológica.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios respecto al estado anterior; el consenso de revisión es de alta concordancia (0.98), por lo que se mantiene el sentido y la puntuación de la frase con una adaptación española idiomática.
  spanish_consistency_notes:
  - Se mantiene «levadura» como término base, no «levadura»/«levaduro» ni «fermento», para conservar la imagen bíblica habitual y el valor del léxico griego.
  - «Harina» traduce el sustantivo genérico del contexto alimentario; la unidad cultural se preserva en nota, evitando introducir un tecnicismo en el cuerpo del texto.
  - Se usa «leudado» para reflejar el resultado del pasivo griego ἐζυμώθη con naturalidad en español.
  - La puntuación sigue la estructura comparativa simple del verso y no añade elementos explicativos al texto principal.
