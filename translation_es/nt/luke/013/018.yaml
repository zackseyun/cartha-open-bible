translation:
  language: es
  text: 'Entonces decía[a]: «¿A qué se parece el reino de Dios, y con qué compararé el reino de Dios?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el reinado de Dios», destacando el gobierno de Dios más que un ámbito o territorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: él decía
  alternatives_spanish:
  - decía
  - estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto indica una acción discursiva en curso o repetida; «decía» conserva ese valor y suena natural en español. Añadir «estaba diciendo» sería más pesado sin aportar más claridad en este contexto.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - pues
  - entonces
  lexicon: BDAG
  rationale: Marca continuidad/inferencia del contexto previo. «Así que» transmite bien la conexión discursiva en español contemporáneo sin sonar demasiado formal.
- source_word: Τίνι ... ὁμοία ἐστὶν
  english_pob_choice: What is ... like
  chosen_spanish: ¿A qué se parece...
  alternatives_spanish:
  - ¿Con qué es comparable...?
  - ¿Qué es... parecido?
  lexicon: BDAG
  rationale: La pregunta pide comparación; en español, «se parece a» es la construcción más idiomática y clara. Mantiene el valor interrogativo sin calcar la sintaxis griega.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el reino de Dios
  lexicon: BDAG
  rationale: Se conserva la expresión bíblica establecida en español. «Reino de Dios» mantiene el campo metafórico de la parábola y la equivalencia auditada del inglés POB; «reinado» explicita la acción de gobernar, pero no es necesario en el texto base.
- source_word: τίνι ὁμοιώσω αὐτήν
  english_pob_choice: to what shall I compare it
  chosen_spanish: ¿con qué lo compararé?
  alternatives_spanish:
  - ¿a qué lo compararé?
  - ¿con qué la compararé?
  lexicon: BDAG
  rationale: El futuro deliberativo se expresa naturalmente en español con «compararé» en una pregunta retórica. «Con qué» corresponde al verbo «comparar» en uso común; se eligió «lo» para concordar con «el reino» en español.
theological_decisions:
- issue: βασιλεία τοῦ θεοῦ y el matiz de dominio/reinado
  english_pob_reading: the kingdom of God
  chosen_spanish_reading: el reino de Dios
  alternative_spanish_readings:
  - el reinado de Dios
  rationale: El griego puede referirse tanto al ámbito como al ejercicio del gobierno divino. Se mantiene «reino de Dios» por ser la formulación canónica y transparente en español, sin borrar el trasfondo dinámico de la soberanía divina.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete actual; la redacción sigue el estado más reciente, con alta concordancia y sin cambios pendientes indicados por el auditor inglés.
  spanish_consistency_notes:
  - 'Se mantuvo el nombre divino en la forma estándar del proyecto: «Dios».'
  - Se conservó un registro bíblico claro y natural para una lectura pública.
  - La referencia del pronombre en «lo» sigue el sustantivo «reino» en español, que es gramaticalmente masculino.
  - La nota alternativa se ancla solo en la expresión clave para evitar duplicar ambigüedades no documentadas.
