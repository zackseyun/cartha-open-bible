    issue: «Así que» para οὖν
    rationale: Aunque posible, «Así que» en español tiende a marcar consecuencia más fuerte; aquí οὖν funciona mejor como continuación discursiva narrativa. «Entonces» preserva mejor el flujo del pasaje.
  - severity: low
    issue: Pronombre «lo» en la segunda pregunta
    rationale: Es gramatical por concordar con «reino», pero la repetición explícita de «el reino de Dios» suena más natural y evita una formulación algo rígida en una frase breve y solemne.
  - severity: low
    issue: Pronombre sujeto «él» innecesario
    rationale: El español no requiere el sujeto expreso aquí; omitirlo mejora la naturalidad sin pérdida de información.
