translation:
  language: es
  text: 'Pero él respondió y le dijo: «Señor, déjala también este año, hasta que yo cave alrededor de ella y le ponga estiércol[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fertilice»; más generalmente, «le ponga abono».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς λέγει
  english_pob_choice: answered and said
  chosen_spanish: respondió y le dijo
  alternatives_spanish:
  - respondió
  - replicó y le dijo
  lexicon: BDAG
  rationale: La secuencia participio + verbo presente reproduce una fórmula narrativa semítica. En español, «respondió y le dijo» conserva ambos elementos con naturalidad; «replicó» sería más breve, pero diluye la doble marca del original.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - señor
  lexicon: BDAG
  rationale: Se mantiene el tratamiento reverente del diálogo. Aunque en la parábola no implica de por sí una afirmación cristológica directa, «Señor» es el equivalente estable y más amplio para κύριε en el proyecto.
- source_word: ἄφες αὐτὴν
  english_pob_choice: leave it alone
  chosen_spanish: déjala
  alternatives_spanish:
  - déjala sola
  - déjala en paz
  - jálala
  lexicon: BDAG
  rationale: El verbo expresa dejarla permanecer, sin intervenir. En español, el imperativo simple «déjala» comunica esa idea de forma natural; «déjala sola» o «en paz» añade matiz que no exige el griego.
- source_word: καὶ τοῦτο τὸ ἔτος
  english_pob_choice: this year also
  chosen_spanish: también este año
  alternatives_spanish:
  - este año también
  - por un año más
  - para este año también
  lexicon: BDAG
  rationale: «También este año» refleja con claridad la petición de una prórroga adicional. Se conserva el valor de «también» sin convertirlo en una paráfrasis temporal más libre como «por un año más».
- source_word: σκάψω περὶ αὐτὴν
  english_pob_choice: I dig around it
  chosen_spanish: yo cave alrededor de ella
  alternatives_spanish:
  - yo excave alrededor de ella
  - trabaje la tierra alrededor de ella
  - afloje la tierra alrededor de ella
  lexicon: BDAG
  rationale: σκάπτω significa literalmente «cavar». «Cave alrededor de ella» preserva la imagen concreta del trabajo agrícola; «afloje la tierra» es más explicativo pero menos directo.
- source_word: βάλω κόπρια
  english_pob_choice: put manure on it
  chosen_spanish: ponga estiércol sobre ella
  alternatives_spanish:
  - ponga abono sobre ella
  - aplique estiércol
  - fertilice ella
  lexicon: BDAG
  rationale: κόπρια se refiere a estiércol usado como fertilizante. «Estiércol» conserva la concreción del término; «abono» o «fertilice» son más suaves, pero menos fieles al vocabulario rudo del griego.
theological_decisions:
- issue: Tratamiento de κύριος en un diálogo parabólico
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - señor
  rationale: Se sigue el valor reverente que el POB inglés mantiene para κύριος. En el contexto parabólico, el término no obliga a una lectura doctrinal adicional, pero sí conviene conservar la forma respetuosa y consistente.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → ''Lord'''
translation_notes:
  revision_awareness: 'La redacción inglesa más reciente ajustó la última frase a una formulación más natural en inglés («put manure on it») sin cambiar el sentido. La versión española sigue esa misma fidelidad natural: mantiene la concreción agrícola de κόπρια y evita una generalización como «fertilizarla» en el texto principal.'
  spanish_consistency_notes:
  - 'Se conservó el pronombre femenino de la planta/vid: «déjala», «cave alrededor de ella», «sobre ella».'
  - Se evitó «SEÑOR» en mayúsculas para no introducir una convención de máscara que el proyecto no usa en español.
  - El estilo busca ser público y litúrgicamente legible, pero sin suavizar la crudeza agrícola del término κόπρια.
