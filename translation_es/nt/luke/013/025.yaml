revisions:
- from: 'Después que el dueño de casa se haya levantado y haya cerrado la puerta[a], y ustedes comiencen a estar afuera y a golpear la puerta, diciendo: «Señor, ábrenos»[b], él les responderá: «No los conozco; no sé de dónde son»[c].'
  to: 'Una vez que el amo de la casa se haya levantado y haya cerrado la puerta[a], y ustedes comiencen a quedarse afuera y a llamar a la puerta, diciendo: «Señor, ábrenos»[b], él les responderá: «No los conozco[c], de dónde son»[d].'
  rationale: Se ajustó la cláusula temporal a un español más natural («Una vez que»), se fortaleció el sentido de οἰκοδεσπότης con «amo de la casa», se evitó la posible sobreintensificación de κρούειν con «llamar a la puerta», y sobre todo se corrigió la respuesta final para no introducir un segundo verbo finito ausente del griego. Las notas se reorganizaron para reflejar mejor la literalidad y las alternativas documentadas.
