  text: ἀφ’ οὗ ἂν ἐγερθῇ ὁ οἰκοδεσπότης καὶ ἀποκλείσῃ τὴν θύραν, καὶ ἄρξησθε ἔξω ἑστάναι καὶ κρούειν τὴν θύραν λέγοντες· ⸀Κύριε, ἄνοιξον ἡμῖν· καὶ ἀποκριθεὶς ἐρεῖ ὑμῖν· Οὐκ οἶδα ὑμᾶς πόθεν ἐστέ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/013/025.yaml
  text: Once the master of the house has risen and shut the door[a], and you begin to stand outside and knock on the door, saying, ‘Lord, open to us,’ then he will answer you, ‘I do not know you[c][b], where you are from.’
