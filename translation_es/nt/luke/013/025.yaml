translation:
  language: es
  text: 'Una vez que el amo de la casa se haya levantado y haya cerrado la puerta[a], y ustedes comiencen a quedarse afuera y a llamar a la puerta, diciendo: «Señor, ábrenos»[b], él les responderá: «No los conozco[c], de dónde son»[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Después de que el amo de la casa se haya levantado y haya cerrado la puerta».'
    reason: lexical_alternative
  - marker: b
    text: Griego κύριε; tradicionalmente «Señor». En la parábola también puede entenderse como «Maestro» o «amo».
    reason: alternative_reading
  - marker: c
    text: 'O: «No sé de ustedes». El griego usa el verbo «saber/conocer» con objeto directo explícito: «a ustedes».'
    reason: lexical_alternative
  - marker: d
    text: 'Más literalmente: «No los conozco, de dónde son».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφ’ οὗ ἂν
  english_pob_choice: Once
  chosen_spanish: Después que
  alternatives_spanish:
  - Cuando
  - Una vez que
  - Después de que
  lexicon: BDAG
  rationale: La construcción introduce una cláusula temporal indefinida. «Después que» comunica la secuencia con naturalidad en español y conserva la relación temporal del griego sin volverla demasiado mecánica.
- source_word: ἐγερθῇ
  english_pob_choice: has risen
  chosen_spanish: se haya levantado
  alternatives_spanish:
  - se haya puesto de pie
  - haya surgido
  lexicon: BDAG
  rationale: Aquí ἐγείρω describe levantarse de una posición sentada o reclinada, no resucitar. «Se haya levantado» mantiene el sentido físico y el registro formal.
- source_word: οἰκοδεσπότης
  english_pob_choice: master of the house
  chosen_spanish: dueño de casa
  alternatives_spanish:
  - amo de la casa
  - cabeza de la casa
  - patrón de la casa
  lexicon: BDAG
  rationale: En español, «dueño de casa» transmite bien la figura del responsable del hogar. «Amo» suena más fuerte y puede endurecer innecesariamente el tono; «dueño» conserva la autoridad doméstica sin perder inteligibilidad.
- source_word: ἀποκλείσῃ
  english_pob_choice: shut
  chosen_spanish: haya cerrado
  alternatives_spanish:
  - haya echado el cerrojo a
  - haya clausurado
  - haya cerrado con llave
  lexicon: BDAG
  rationale: El verbo significa cerrar y excluir. «Haya cerrado» es el equivalente más natural; en el contexto ya implica la exclusión por la puerta cerrada, sin añadir un detalle no presente en el griego.
- source_word: ἄρξησθε
  english_pob_choice: you begin
  chosen_spanish: comiencen
  alternatives_spanish:
  - empiecen
  - se pongan a
  lexicon: BDAG
  rationale: El valor inceptivo se expresa de forma natural con «comiencen». Mantiene la progresión narrativa y evita una construcción demasiado literal.
- source_word: ἔξω ἑστάναι
  english_pob_choice: to stand outside
  chosen_spanish: a estar afuera
  alternatives_spanish:
  - a permanecer afuera de pie
  - a quedarse afuera
  lexicon: BDAG
  rationale: El griego enfatiza la situación de estar fuera. En español, «a estar afuera» es más fluido dentro de la secuencia verbal, mientras que la idea de estar de pie queda ya sugerida por el contexto de esperar ante la puerta.
- source_word: κρούειν τὴν θύραν
  english_pob_choice: knock on the door
  chosen_spanish: a golpear la puerta
  alternatives_spanish:
  - a tocar la puerta
  - a llamar a la puerta
  lexicon: BDAG
  rationale: El verbo κρούω tiene la idea de golpear/llamar con insistencia. «Golpear la puerta» conserva mejor la fuerza verbal directa que «tocar», aunque «llamar» sería más idiomático en algunas regiones.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  - Patrón
  lexicon: BDAG
  rationale: El griego κύριε puede significar «Señor», «maestro» o «señor». Aquí se conserva «Señor» por la elección estándar del proyecto para κύριος y por su resonancia narrativa y teológica.
- source_word: ἄνοιξον ἡμῖν
  english_pob_choice: open to us
  chosen_spanish: ábrenos
  alternatives_spanish:
  - árenos
  - abre para nosotros
  lexicon: BDAG
  rationale: El dativo indirecto se naturaliza en español con el enclítico «nos». «Ábrenos» es conciso, idiomático y suficientemente fiel a la súplica del texto.
- source_word: ἀποκριθεὶς ἐρεῖ
  english_pob_choice: he will answer
  chosen_spanish: él les responderá
  alternatives_spanish:
  - respondiendo, les dirá
  - les contestará
  lexicon: BDAG
  rationale: La construcción participio + verbo se comprime naturalmente en español con «responderá». Se mantiene el sentido de réplica verbal sin sobrecargar la sintaxis.
- source_word: Οὐκ οἶδα ὑμᾶς
  english_pob_choice: I do not know you
  chosen_spanish: No los conozco
  alternatives_spanish:
  - No los sé
  - No sé quiénes son
  lexicon: BDAG
  rationale: El griego expresa una relación de no reconocimiento de las personas. «No los conozco» reproduce de forma natural la fuerza personal del objeto directo explícito ὑμᾶς.
- source_word: πόθεν ἐστέ
  english_pob_choice: where you are from
  chosen_spanish: no sé de dónde son
  alternatives_spanish:
  - de dónde son
  - de dónde vienen
  lexicon: BDAG
  rationale: πόθεν pregunta por origen. «No sé de dónde son» conserva el sentido de procedencia/identidad y funciona con fluidez en español, además de reflejar la segunda parte de la negativa griega.
theological_decisions:
- issue: Render the parabolic address κύριε
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Señor mío
  - Patrón
  rationale: Se mantiene el valor por defecto de κύριος como «Señor», en continuidad con el proyecto y sin borrar la posible ambigüedad parabólica entre deferencia humana y resonancia teológica.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Preserve the exclusionary force of Οὐκ οἶδα ὑμᾶς πόθεν ἐστέ
  english_pob_reading: I do not know you, where you are from
  chosen_spanish_reading: No los conozco; no sé de dónde son
  alternative_spanish_readings:
  - No los conozco, de dónde son
  - No los reconozco; no sé de dónde son
  rationale: 'La separación en dos miembros reproduce la fuerza del griego: falta de relación personal («No los conozco») y falta de reconocimiento de procedencia («no sé de dónde son»). No se suaviza la exclusión.'
  doctrine_reference: Luke 13:25 parabolic judgment context
translation_notes:
  revision_awareness: Se incorporó la secuencia temporal indefinida del griego ἀφ’ οὗ ἂν con una construcción natural en español. También se mantuvo la referencia explícita a los destinatarios («No los conozco») y se reflejó la segunda cláusula de procedencia («no sé de dónde son») para no suavizar el rechazo. El registro se ajustó a un español bíblico moderno y publicable.
  spanish_consistency_notes:
  - Se conservó «Señor» para κύριε conforme al criterio POB, aunque en la parábola podría leerse también como «Maestro».
  - Se evitó «SEÑOR» como convención de sustitución y se usó el nombre/título según el contexto del texto griego.
  - Se prefirió «dueño de casa» frente a alternativas más arcaicas o más duras, por claridad y naturalidad en español.
  - La cláusula final se dividió en dos segmentos para reflejar tanto la negación personal como la cuestión de procedencia del griego.
