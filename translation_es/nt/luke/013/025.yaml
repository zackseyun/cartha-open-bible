review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia temporal general, la imagen de la puerta cerrada, la súplica al dueño y la respuesta excluyente. Sin embargo, dos decisiones debilitan la fidelidad puntual al griego y al rastro auditado en inglés: (1) «a estar afuera» omite el matiz de ἑστάναι, que es ‘estar/pararse de pie afuera’; (2) «No los conozco; no sé de dónde son» introduce un segundo verbo finito no presente en el griego, cuando el texto fuente dice una sola afirmación: «No sé/conozco ... de dónde son». Además, «después que» es menos natural y menos estándar que «una vez que» o «después de que» para ἀφ’ οὗ ἂν.'
  spanish_quality_summary: 'El español es claro y legible, pero hay varios puntos mejorables para estilo bíblico natural y precisión: «Después que» suena menos idiomático en registro cuidado; «dueño de casa» es comprensible, aunque «amo de la casa» o «señor de la casa» preservan mejor la autoridad de οἰκοδεσπότης en este contexto; «golpear la puerta» puede sonar demasiado físico donde «llamar a la puerta» conserva mejor el acto convencional de κρούειν. La respuesta final también fluye mejor en español como una sola cláusula con nota de literalidad.'
  glossary_alignment: «Señor» para Κύριε concuerda con la política del proyecto y la nota alternativa está bien orientada, aunque repite «Señor» entre las alternativas y debería distinguir mejor «Maestro»/«amo»/«señor». No hay términos de glosario mayor en conflicto. La principal desviación no es glosarial sino sintáctico-semántica en Οὐκ οἶδα ὑμᾶς πόθεν ἐστέ.
  issues:
  - severity: medium
    issue: «Después que» para ἀφ’ οὗ ἂν
    rationale: Es comprensible, pero en español bíblico actual y neutral suena menos natural que «una vez que» o «después de que». El inglés auditado escogió «Once»; «una vez que» reproduce mejor ese valor temporal.
  - severity: medium
    issue: «a estar afuera» debilita ἔξω ἑστάναι
    rationale: El griego no solo indica ubicación fuera, sino la postura/estado de estar de pie afuera. «Quedarse/pararse afuera» o «estar afuera» con nota podría valer, pero aquí conviene una formulación más cercana.
  - severity: medium
    issue: «golpear la puerta» puede sobreforzar κρούειν
    rationale: κρούειν en este contexto parabólico corresponde bien a «llamar a la puerta» o «tocar a la puerta». «Golpear» puede sugerir violencia innecesaria.
  - severity: high
    issue: 'La respuesta final añade un segundo predicado no presente en el original: «no sé de dónde son»'
    rationale: Οὐκ οἶδα ὑμᾶς πόθεν ἐστέ contiene una sola negación verbal con objeto y cláusula de origen. El borrador la divide en dos afirmaciones separadas, alterando la forma y ligeramente el sentido. Debe mantenerse como una sola oración, p. ej. «No sé quiénes son ni de dónde vienen» sería paráfrasis, pero más fielmente «No los conozco, de dónde son» con nota o mejor «No sé quiénes son, de dónde son»; sin embargo, para seguir el audit trail conviene conservar el objeto explícito con una nota de literalidad.
  - severity: low
    issue: La nota [b] repite «Señor» como término principal y alternativo
    rationale: La nota debería ofrecer alternativas distintas, como «Maestro» o «amo», no repetir «Señor».
