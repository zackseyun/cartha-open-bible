revisions:
- from: 'Y les decía esta parábola: «Un hombre tenía una higuera plantada en su viña[a], y fue a buscar fruto en ella, y no lo halló».'
  to: 'Y decía esta parábola: «Un hombre[a] tenía una higuera plantada en su viña, y vino buscando fruto en ella, y no encontró nada».'
  rationale: Se elimina «les» porque no está expresado en el griego de este versículo; se cambia a «vino buscando» para reflejar mejor ἦλθεν ζητῶν; se usa «no encontró nada» como español más natural y claro; y se reemplaza la nota al pie para ajustarla al audit trail inglés documentado sobre τις.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:01:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Jesús introduce una parábola, un hombre tiene una higuera plantada en su viña, va a buscar fruto y no encuentra. Sin embargo, «les decía» añade un objeto indirecto no expresado en este versículo, y «fue a buscar» pierde un poco el matiz de «vino/llegó buscando» de ἦλθεν ζητῶν. Además, la nota sobre ἀμπελών no corresponde a la nota inglesa auditada, que trata de τις (‘un hombre’ / ‘alguien’), no de «viña/viñedo».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para mayor fidelidad y naturalidad contextual. «Les decía» depende del contexto previo y no debe introducirse aquí sin apoyo explícito en el texto fuente. «Vino buscando» suena natural y conserva mejor la construcción griega. «No encontró nada» o «no encontró fruto» serían más modernos que «no lo halló»; aun así, «no encontró nada» enlaza bien con la búsqueda de fruto sin repetir innecesariamente.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto en este versículo. «Parábola», «higuera» y «fruto» están bien. «Viña» es aceptable para ἀμπελών, pero la única nota documentada en el rastro inglés debe ir sobre τις, no sobre «viña».
  issues:
  - severity: medium
    issue: «les decía» añade un destinatario no presente en el griego de este versículo
    rationale: Ἔλεγεν significa ‘decía/estaba diciendo’; el complemento indirecto ‘les’ puede inferirse del contexto narrativo, pero no forma parte del texto aquí y conviene no introducirlo en una revisión fuente-céntrica.
  - severity: medium
    issue: La nota al pie actual no sigue la nota inglesa auditada
    rationale: 'La nota inglesa preserva la alternativa léxica de τις: ‘A man’ / ‘someone’. La nota española sobre «viña/viñedo» introduce una nota nueva no requerida y omite la alternativa documentada por el audit trail.'
  - severity: low
    issue: «fue a buscar» es menos cercano a ἦλθεν ζητῶν que «vino buscando»
    rationale: El griego expresa venir/llegar con búsqueda en curso o propósito inmediato. «Vino buscando» preserva mejor el movimiento narrativo y suena natural en español.
  - severity: low
    issue: «no lo halló» es comprensible pero algo más literario de lo necesario
    rationale: Aunque válido, «no encontró nada» o «no encontró fruto» son más naturales en español contemporáneo y siguen comunicando con claridad que no halló fruto.
  revised_spanish_text: 'Y decía esta parábola: «Un hombre[a] tenía una higuera plantada en su viña, y vino buscando fruto en ella, y no encontró nada».'
  revised_footnotes:
  - marker: a
    text: O «Alguien tenía una higuera plantada en su viña». El pronombre indefinido griego puede expresarse de forma más genérica, pero «un hombre» encaja mejor con el estilo narrativo de la parábola.
    reason: lexical_alternative
  revision_rationale: Se elimina «les» porque no está expresado en el griego de este versículo; se cambia a «vino buscando» para reflejar mejor ἦλθεν ζητῶν; se usa «no encontró nada» como español más natural y claro; y se reemplaza la nota al pie para ajustarla al audit trail inglés documentado sobre τις.
