translation:
  language: es
  text: 'Y decía esta parábola: «Un hombre[a] tenía una higuera plantada en su viña, y vino buscando fruto en ella, y no encontró nada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Alguien tenía una higuera plantada en su viña». El pronombre indefinido griego puede expresarse de forma más genérica, pero «un hombre» encaja mejor con el estilo narrativo de la parábola.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  english_pob_choice: he was telling
  chosen_spanish: les decía
  alternatives_spanish:
  - les estaba diciendo
  - decía
  lexicon: BDAG
  rationale: El imperfecto griego presenta una acción introductoria y continua; en español, «les decía» conserva ese valor discursivo de introducción sin sonar forzado. Se mantiene el destinatario implícito por el contexto de la enseñanza de Jesús.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Entonces
  lexicon: BDAG
  rationale: δέ funciona como conector suave. «Y» preserva la continuidad narrativa de manera natural en español sin cargar el paso con matiz explicativo adicional.
- source_word: παραβολήν
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - ilustración
  lexicon: BDAG
  rationale: «Parábola» es el equivalente preciso y el término estándar para esta forma de enseñanza de Jesús.
- source_word: Συκῆν
  english_pob_choice: fig tree
  chosen_spanish: higuera
  alternatives_spanish:
  - árbol de higos
  lexicon: BDAG
  rationale: El sustantivo designa específicamente una higuera, no solo higos en general. «Higuera» es el equivalente natural y exacto en español.
- source_word: εἶχέν τις
  english_pob_choice: A man had
  chosen_spanish: Un hombre tenía
  alternatives_spanish:
  - Alguien tenía
  - Un cierto hombre tenía
  lexicon: BDAG
  rationale: τίς introduce un sujeto indefinido. «Un hombre» conserva el estilo narrativo de la parábola y coincide con la decisión documental inglesa de usar una figura humana concreta sin imponer especificación adicional.
- source_word: πεφυτευμένην
  english_pob_choice: planted
  chosen_spanish: plantada
  alternatives_spanish:
  - había sido plantada
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica un árbol en estado ya establecido como plantado. «Plantada» transmite ese estado de forma idiomática y clara en español.
- source_word: ἐν τῷ ἀμπελῶνι αὐτοῦ
  english_pob_choice: in his vineyard
  chosen_spanish: en su viña
  alternatives_spanish:
  - en su viñedo
  - en su viña de uvas
  lexicon: BDAG
  rationale: ἀμπελών se traduce con mayor naturalidad como «viña» en español bíblico contemporáneo. «Viña» conserva el campo semántico de vid/viticultura y es más fluida que una versión más técnica o explicativa.
- source_word: ἦλθεν ζητῶν
  english_pob_choice: he came looking for
  chosen_spanish: fue a buscar
  alternatives_spanish:
  - vino buscando
  - vino a buscar
  lexicon: BDAG
  rationale: La combinación del aoristo con el participio expresa acción de ir para buscar. «Fue a buscar» es una solución natural en español y conserva la intención de búsqueda activa.
- source_word: καρπὸν
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  - producto
  lexicon: BDAG
  rationale: «Fruto» es el equivalente más fiel y mantiene la resonancia metafórica de la parábola. En este contexto español, «fruto» es más adecuado que «fruta».
- source_word: ἐν αὐτῇ
  english_pob_choice: on it
  chosen_spanish: en ella
  alternatives_spanish:
  - sobre ella
  - de ella
  lexicon: BDAG
  rationale: Aunque la equivalencia inglesa opta por una adaptación idiomática, el griego dice literalmente «en ella». En español, «en ella» mantiene más de cerca la forma del original y es comprensible para una higuera como referente femenino.
- source_word: οὐχ εὗρεν
  english_pob_choice: found none
  chosen_spanish: no lo halló
  alternatives_spanish:
  - no encontró ninguno
  - no encontró fruto
  lexicon: BDAG
  rationale: La referencia inmediata es al «fruto»; por eso «lo» evita repetir el sustantivo y reproduce la concisión del griego. «Halló» es un verbo plenamente válido y solemne en español bíblico.
theological_decisions:
- issue: Indefinite subject τις in a parable
  english_pob_reading: A man
  chosen_spanish_reading: Un hombre
  alternative_spanish_readings:
  - Alguien
  - Un cierto hombre
  rationale: La parábola introduce un personaje indefinido sin contenido doctrinal propio. «Un hombre» mantiene el tono narrativo y la concreción estilística que el inglés POB también juzga preferible frente a una formulación más genérica.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Rendering of ἀμπελών as vineyard/viña
  english_pob_reading: in his vineyard
  chosen_spanish_reading: en su viña
  alternative_spanish_readings:
  - en su viñedo
  rationale: No se trata de una decisión doctrinal, sino léxica y estilística. «Viña» es la voz española más natural en la tradición bíblica y conserva la imagen agrícola concreta sin introducir tecnicismos innecesarios.
  doctrine_reference: Terminology consistency for agricultural imagery
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la versión de referencia más reciente; no hubo revisiones aplicadas. La propuesta española sigue la lectura acordada por el control cruzado de alta concordancia y conserva la estructura narrativa del original griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Mesías/Cristo» no aplicable aquí; no hay terminología cristológica en el versículo.
  - «Fruto» se conserva de forma consistente para καρπός, evitando variantes que debiliten la imagen parabólica.
  - Se traduce ἐν αὐτῇ de manera comprensible para una referencia arbórea femenina, sin perder la relación semántica con el original.
