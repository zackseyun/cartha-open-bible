translation:
  language: es
  text: 'Y alguien le dijo[a]: «Señor, ¿son solo unos pocos los que están siendo salvados?» Y él les dijo[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿son pocos los que están siendo salvados?»'
    reason: lexical_alternative
  - marker: b
    text: «Señor» también puede entenderse como un tratamiento respetuoso, equivalente a «señor» o «usted»; el griego deja abierta aquí toda la fuerza del título.
    reason: alternative_reading
lexical_decisions:
- source_word: δέ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: Conecta la escena de manera natural en español y conserva el avance narrativo sin forzar contraste.
- source_word: τις
  english_pob_choice: someone
  chosen_spanish: alguien
  alternatives_spanish:
  - una persona
  - cierto hombre
  lexicon: BDAG
  rationale: El indefinido griego requiere un referente no identificado; 'alguien' es idiomático y suficientemente impreciso.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a Jesús
  lexicon: BDAG
  rationale: Se mantiene el pronombre explícito del griego sin introducir el nombre del referent en el texto principal.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  - Sir
  lexicon: BDAG
  rationale: En español bíblico moderno, 'Señor' conserva la ambigüedad entre trato respetuoso y posible peso cristológico que el griego deja abierta.
- source_word: εἰ ὀλίγοι οἱ σῳζόμενοι
  english_pob_choice: are only a few being saved
  chosen_spanish: ¿son solo unos pocos los que están siendo salvados?
  alternatives_spanish:
  - ¿son pocos los que se están salvando?
  - ¿hay solo unos pocos que están siendo salvados?
  lexicon: BDAG
  rationale: La pregunta griega expresa literalmente 'si pocos son los que están siendo salvados'; la formulación española conserva el número reducido y el participio presente pasivo con valor continuo.
- source_word: οἱ σῳζόμενοι
  english_pob_choice: being saved
  chosen_spanish: los que están siendo salvados
  alternatives_spanish:
  - los que se salvan
  - los salvados
  lexicon: BDAG
  rationale: Se preserva el matiz aspectual de proceso/estado en curso del participio presente pasivo, evitando reducirlo a un estado ya concluido.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a esas personas
  lexicon: BDAG
  rationale: Después de un verbo de decir, el dativo/prós se expresa naturalmente en español con objeto indirecto.
theological_decisions:
- issue: Fuerza de Κύριε como tratamiento a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Señor mío
  - Sir
  rationale: Se conserva la decisión del POB de no rebajar automáticamente el título a un simple 'tratamiento cortés'; 'Señor' mantiene abierta la tensión entre cortesía y reconocimiento de autoridad.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; Preserve theological tension rather than resolve it.'
- issue: Aspecto de σῳζόμενοι
  english_pob_reading: being saved
  chosen_spanish_reading: están siendo salvados
  alternative_spanish_readings:
  - se salvan
  - son salvados
  rationale: El participio presente pasivo sugiere una acción/estado en curso; 'están siendo salvados' preserva esa apertura sin imponer una sistematización soteriológica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente los marcadores de nota [a] y [b] en el texto español. Además, se ajustó la sintaxis para que el pasaje suene natural en español sin perder el participio presente pasivo ni la ambigüedad de Κύριε.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριος conforme al criterio POB por defecto.
  - Se evitó 'Cristo' o 'SEÑOR' como sustitución no pedida por el texto griego.
  - La pasiva progresiva 'están siendo salvados' conserva el aspecto verbal del griego.
  - El pronombre 'a él' se dejó explícito para reflejar αὐτῷ.
