review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: un interlocutor no identificado habla a Jesús, lo llama «Señor», pregunta si son pocos los que están siendo salvados, y Jesús responde a ellos. También preserva adecuadamente la ambigüedad de κύριε y el aspecto progresivo/pasivo de οἱ σῳζόμενοι.'
  spanish_quality_summary: 'La redacción es mayormente clara, pero tiene dos problemas de naturalidad y precisión editorial: «le dijo a él» suena redundante y poco idiomático en español, aunque puede mantenerse si se desea explicitar el pronombre; mejor «le dijo» conservando el sentido sin torpeza. Además, la nota b está defectuosa porque ofrece «Señor» como alternativa a «Señor» y no explica bien la opción de tratamiento cortés equivalente a «señor/usted».'
  glossary_alignment: «Señor» para κύριε está alineado con la política del proyecto y conserva la tensión teológica adecuada. No hay conflicto con otros términos clave del glosario. La elección «están siendo salvados» es fiel al valor presente pasivo, aunque algo pesada; aquí puede mantenerse por fidelidad al expediente inglés.
  issues:
  - severity: medium
    issue: «le dijo a él» es innecesariamente redundante en español
    rationale: Aunque αὐτῷ está explícito en griego, el español normal ya expresa el complemento con «le». Mantener «a él» aquí produce una frase más torpe sin aportar claridad suficiente.
  - severity: high
    issue: La nota b está mal formulada y repite «Señor» como si fuera alternativa distinta
    rationale: El expediente inglés dice que «Lord» también podría entenderse como «Sir». En español debe explicarse como tratamiento respetuoso, por ejemplo «señor», no repetir la misma forma con mayúscula y sin distinción semántica.
