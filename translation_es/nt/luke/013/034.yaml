revisions:
- from: ¡Jerusalén, Jerusalén, la que mata a los profetas y apedrea a los enviados a ella[a]—cuántas veces quise juntar a tus hijos, como la gallina junta su nidada bajo sus alas[b], y no quisiste!
  to: ¡Jerusalén, Jerusalén!, la que mata a los profetas y apedrea a los enviados a ella[a]—cuántas veces quise reunir a tus hijos e hijas como la gallina junta a sus polluelos bajo sus alas[b], y no quisiste.
  rationale: Se revisa «juntar» a «reunir» por naturalidad y dignidad estilística; «a tus hijos» a «a tus hijos e hijas» para preservar mejor el valor inclusivo de τέκνα; y «su nidada» a «sus polluelos» por mayor idiomaticidad en español amplio. Además, se corrige la nota a para que ofrezca una alternativa real al giro principal.
