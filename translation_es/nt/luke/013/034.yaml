    text: O «ave ... sus crías». ὄρνις puede ser más general que «gallina», pero la imagen maternal de reunir a los pequeños bajo las alas hace que «gallina» sea aquí la traducción más natural.
    reason: lexical_alternative
  revision_rationale: Se revisa «juntar» a «reunir» por naturalidad y dignidad estilística; «a tus hijos» a «a tus hijos e hijas» para preservar mejor el valor inclusivo de τέκνα; y «su nidada» a «sus polluelos» por mayor idiomaticidad en español amplio. Además, se corrige la nota a para que ofrezca una alternativa real al giro principal.
