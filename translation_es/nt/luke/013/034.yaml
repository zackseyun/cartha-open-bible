translation:
  language: es
  text: ¡Jerusalén, Jerusalén!, la que mata a los profetas y apedrea a los enviados a ella[a]—cuántas veces quise reunir a tus hijos e hijas como la gallina junta a sus polluelos bajo sus alas[b], y no quisiste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que mata ... y apedrea». Los participios griegos presentes presentan a Jerusalén por su trato característico con los mensajeros de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «ave ... sus crías». ὄρνις puede ser más general que «gallina», pero la imagen maternal de reunir a los pequeños bajo las alas hace que «gallina» sea aquí la traducción más natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰερουσαλὴμ Ἰερουσαλήμ
  english_pob_choice: Jerusalem, Jerusalem
  chosen_spanish: ¡Jerusalén, Jerusalén!
  alternatives_spanish:
  - Jerusalén, Jerusalén
  lexicon: nombre propio
  rationale: Se conserva la repetición enfática para mantener el tono de lamento y el recurso retórico del texto griego.
- source_word: ἡ ἀποκτείνουσα
  english_pob_choice: the one killing
  chosen_spanish: la que mata
  alternatives_spanish:
  - la que está matando
  - la que mata continuamente
  lexicon: BDAG / valor participial presente
  rationale: El participio presente caracteriza a Jerusalén por su conducta habitual. En español, "la que mata" transmite bien esa acción característica sin sonar forzado.
- source_word: τοὺς προφήτας
  english_pob_choice: the prophets
  chosen_spanish: a los profetas
  alternatives_spanish:
  - los profetas
  lexicon: BDAG
  rationale: El objeto directo personal en español requiere la preposición "a".
- source_word: λιθοβολοῦσα
  english_pob_choice: stoning
  chosen_spanish: apedrea
  alternatives_spanish:
  - lanza piedras contra
  - está apedreando
  lexicon: BDAG
  rationale: '"Apedrear" conserva la fuerza verbal y la correspondencia con el acto violento del griego. El presente participial sigue presentando una acción característica.'
- source_word: τοὺς ἀπεσταλμένους πρὸς αὐτήν
  english_pob_choice: those sent to her
  chosen_spanish: a los enviados a ella
  alternatives_spanish:
  - a los que le fueron enviados
  - a los enviados hacia ella
  lexicon: BDAG
  rationale: '"Enviados" preserva el pasivo del participio perfecto y el sentido de comisión. "A ella" refleja πρὸς αὐτήν de manera natural en español.'
- source_word: ποσάκις
  english_pob_choice: how often
  chosen_spanish: cuántas veces
  alternatives_spanish:
  - cuán a menudo
  - cuántas veces y cuántas
  lexicon: BDAG
  rationale: Es la equivalencia idiomática natural en un lamento y mantiene la intensidad de la pregunta exclamativa.
- source_word: ἠθέλησα
  english_pob_choice: I wanted
  chosen_spanish: quise
  alternatives_spanish:
  - quise de corazón
  - quise reunir
  lexicon: BDAG
  rationale: '"Quise" expresa voluntad/deseo con concisión y mantiene el contraste volitivo con la negativa posterior.'
- source_word: ἐπισυνάξαι
  english_pob_choice: to gather
  chosen_spanish: juntar
  alternatives_spanish:
  - reunir
  - juntar y reunir
  lexicon: BDAG
  rationale: '"Juntar" es natural en español y comunica el movimiento de reunión. Aunque "reunir" es posible, "juntar" encaja bien con la imagen doméstica que sigue.'
- source_word: τὰ τέκνα σου
  english_pob_choice: your children
  chosen_spanish: a tus hijos
  alternatives_spanish:
  - a tus hijos e hijas
  - a tus hijos
  lexicon: BDAG
  rationale: '"Hijos" conserva el valor inclusivo de τέκνα en un español bíblico claro. No se estrecha innecesariamente el alcance metafórico del texto.'
- source_word: ὄρνις
  english_pob_choice: a hen
  chosen_spanish: la gallina
  alternatives_spanish:
  - el ave
  - la ave
  lexicon: BDAG
  rationale: Aunque el término griego puede ser más general, el contexto de protección materna bajo las alas favorece la imagen concreta y natural de "la gallina".
- source_word: τὴν ἑαυτῆς νοσσιὰν
  english_pob_choice: her brood
  chosen_spanish: su nidada
  alternatives_spanish:
  - sus polluelos
  - su camada
  lexicon: BDAG
  rationale: '"Nidada" preserva el sentido colectivo de los jóvenes de un ave y mantiene la imagen aviar sin añadir una concreción excesiva.'
- source_word: ὑπὸ τὰς πτέρυγας
  english_pob_choice: under her wings
  chosen_spanish: bajo sus alas
  alternatives_spanish:
  - debajo de sus alas
  - bajo las alas
  lexicon: BDAG
  rationale: '"Bajo sus alas" es la fórmula natural y reverente en español para la imagen protectora. Mantiene el símbolo bíblico sin explicarlo de más.'
- source_word: καὶ οὐκ ἠθελήσατε
  english_pob_choice: and you were not willing
  chosen_spanish: y no quisiste
  alternatives_spanish:
  - y no quisieron
  - y no estuvieron dispuestos
  lexicon: BDAG
  rationale: Se conserva la oposición volitiva del griego. En español, el singular de segunda persona se dirige a Jerusalén personificada, como en el original.
theological_decisions:
- issue: Jerusalén personificada como sujeto moral
  english_pob_reading: Rendered as a personified Jerusalem that kills prophets and stones those sent to her.
  chosen_spanish_reading: 'Se mantiene a Jerusalén como sujeto personificado: «la que mata a los profetas y apedrea a los enviados a ella».'
  alternative_spanish_readings:
  - Jerusalén, la ciudad que mata a los profetas...
  - Jerusalén, el pueblo que mata a los profetas...
  rationale: El griego trata a Jerusalén como interlocutor personificado. La traducción conserva esa personificación sin resolverla en una glosa interpretativa, siguiendo la tensión del texto.
  doctrine_reference: Translation philosophy §3
- issue: Imagen de recogimiento bajo las alas
  english_pob_reading: “a hen gathers her brood under her wings” with note that Greek ὄρνις can be more general than 'hen'.
  chosen_spanish_reading: Se traduce «la gallina ... su nidada bajo sus alas» y se anota la alternativa más general de «ave».
  alternative_spanish_readings:
  - el ave ... sus polluelos
  - la gallina ... sus polluelos
  rationale: La imagen maternal es la que domina el contexto; por eso se privilegia «gallina». La nota preserva la amplitud léxica del griego sin perder la viveza de la escena.
  doctrine_reference: Translation philosophy §3
- issue: Voluntad de Jesús y rechazo de Jerusalén
  english_pob_reading: “I wanted ... and you were not willing” preserving volitional contrast without doctrinal expansion.
  chosen_spanish_reading: Se traduce «quise ... y no quisiste» para preservar el contraste de voluntad entre Jesús y Jerusalén.
  alternative_spanish_readings:
  - quise ... y no quisiste estar dispuesta
  - quise ... y no quisieron
  rationale: El texto expresa deseo/voluntad, no una conclusión doctrinal ampliada. La traducción mantiene esa tensión y el contraste personal del pasaje.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: La versión inglesa final eliminó una coma tras “children” para unir con mayor fluidez la comparación con la gallina. En español se siguió esa misma fluidez sin insertar una pausa innecesaria después de «tus hijos». No hubo cambios léxicos de fondo respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponde; este versículo no contiene el tetragrámaton.
  - Se evita «Cristo» porque el versículo no contiene Χριστός.
  - Se conserva la personificación de Jerusalén sin convertirla en una explicación alegórica.
  - «Enviados» refleja el pasivo del participio perfecto sin perder naturalidad española.
  - La puntuación con raya y exclamación busca reproducir el tono de lamento y el quiebre retórico del original.
