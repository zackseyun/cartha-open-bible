review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del griego: la personificación de Jerusalén, los participios caracterizadores, el lamento repetido, la imagen maternal de reunir bajo las alas y el contraste volitivo final. También preserva adecuadamente las dos notas léxicas del rastro inglés. Sin embargo, hay dos ajustes importantes para mayor fidelidad y naturalidad: (1) «a tus hijos» estrecha innecesariamente el inclusivo τέκνα; «a tus hijos e hijas» o «a tus hijos[a opción no ideal]» sería mejor, y en texto principal conviene una forma inclusiva. (2) «juntar» suena menos natural y menos digno en este contexto bíblico que «reunir».'
  spanish_quality_summary: El español es en general claro y legible, pero presenta algunos roces de estilo y precisión. El signo de apertura de exclamación solo al inicio de toda la oración deja menos claro el alcance de «¡Jerusalén, Jerusalén!»; además, «su nidada» es correcto pero algo menos idiomático para lectura eclesial amplia que «sus polluelos» o «su cría». La línea mejora mucho con «reunir» y con una formulación inclusiva para τέκνα. También conviene ajustar la nota a para reflejar mejor la alternativa real frente al texto principal.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. No aparecen Yahvé/Mesías/etc. Sí hay una cuestión léxica interna: τέκνα se justificó erróneamente con «hijos» como si fuera inclusivo en español; en español actual neutral eclesial, «hijos» ya no preserva de forma suficientemente transparente ese valor inclusivo. «Hijos e hijas» mantiene mejor la decisión inglesa de no estrechar el referente.'
  issues:
  - severity: medium
    issue: «a tus hijos» para τὰ τέκνα σου
    rationale: τέκνα es inclusivo. En español actual, «hijos» puede entenderse genéricamente, pero también puede percibirse como masculino específico. Dado que la decisión inglesa evitó estrechar el referente, conviene «a tus hijos e hijas».
  - severity: medium
    issue: «juntar» para ἐπισυνάξαι
    rationale: Aunque semánticamente posible, «juntar» suena más coloquial y menos natural en este lamento solemne. «Reunir» transmite mejor la acción de congregar y encaja mejor con registro bíblico moderno y digno.
  - severity: low
    issue: Nota a no corresponde bien a la alternativa indicada
    rationale: El texto principal ya usa «la que mata ... y apedrea», pero la nota ofrece exactamente la misma formulación como alternativa. Debe reflejar la alternativa relativa, p. ej. «que mata ... y apedrea».
  - severity: low
    issue: «su nidada» es correcto pero menos idiomático
    rationale: «Nidada» preserva el colectivo, pero «sus polluelos» es más natural para lectura amplia. No obstante, no es un error de fidelidad; puede mantenerse si se prioriza el colectivo.
  revised_spanish_text: ¡Jerusalén, Jerusalén!, la que mata a los profetas y apedrea a los enviados a ella[a]—cuántas veces quise reunir a tus hijos e hijas como la gallina junta a sus polluelos bajo sus alas[b], y no quisiste.
  revised_footnotes:
