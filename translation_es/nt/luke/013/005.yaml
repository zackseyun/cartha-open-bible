translation:
  language: es
  text: No[a], les digo; pero a menos que se arrepientan, todos ustedes igualmente perecerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perecerán de la misma manera». El griego puede señalar una clase de juicio comparable a la de los ejemplos precedentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχί
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - Ciertamente no
  - No, en absoluto
  lexicon: BDAG
  rationale: En este contexto funciona como una negación enfática de la respuesta implícita. «No» conserva la fuerza directa y resulta natural en español sin añadir explicaciones.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - yo les digo
  lexicon: BDAG
  rationale: La fórmula lucana se vierte de manera idiomática con «les digo», manteniendo la dirección explícita al auditorio sin volverla pesada.
- source_word: ἀλλ’ ἐὰν μὴ
  english_pob_choice: but unless
  chosen_spanish: pero si no
  alternatives_spanish:
  - sino que, si no
  - pero a menos que
  lexicon: BDAG
  rationale: La combinación introduce una excepción condicional fuerte. En español, «pero si no» transmite de forma clara y natural la fuerza adversativa y condicional del griego.
- source_word: μετανοῆτε
  english_pob_choice: repent
  chosen_spanish: se arrepienten
  alternatives_spanish:
  - cambian de mente
  - se vuelven atrás
  lexicon: BDAG
  rationale: «Arrepentirse» es el equivalente bíblico-teológico adecuado en español para μετανοέω en este aviso solemne. Conserva la carga de respuesta moral ante Dios sin reducir el término a una mera revisión intelectual.
- source_word: πάντες
  english_pob_choice: you will all
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - ustedes todos
  lexicon: BDAG
  rationale: El adjetivo modifica al sujeto de la cláusula futura. «Todos ustedes» expresa de manera clara la amplitud colectiva del aviso y evita desplazar «todos» al modo de perecer.
- source_word: ὡσαύτως
  english_pob_choice: likewise
  chosen_spanish: igualmente
  alternatives_spanish:
  - de la misma manera
  - del mismo modo
  lexicon: BDAG
  rationale: «Igualmente» reproduce bien la comparación compacta de ὡσαύτως. Mantiene abierta la relación con los ejemplos previos sin especificar indebidamente si el énfasis es en la forma, la certeza o la clase de juicio.
- source_word: ἀπολεῖσθε
  english_pob_choice: perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - se perderán
  lexicon: BDAG
  rationale: El futuro de ἀπόλλυμι aquí comunica ruina o destrucción. «Perecerán» preserva la gravedad del anuncio y es lo bastante amplio para no reducirlo a muerte física בלבד.
theological_decisions:
- issue: Naturaleza del llamado al arrepentimiento
  english_pob_reading: Render μετανοῆτε as 'repent' without narrowing it to either mere inward remorse or a full doctrinal account of conversion.
  chosen_spanish_reading: Traducir μετανοῆτε como «se arrepienten» sin limitarlo a simple remordimiento ni convertirlo en una formulación sistemática posterior.
  alternative_spanish_readings:
  - cambian de mente
  - se convierten
  rationale: La advertencia de Jesús exige arrepentimiento real; el español «se arrepienten» conserva el peso moral y bíblico del término sin cerrarlo a un matiz demasiado estrecho.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de ὡσαύτως ἀπολεῖσθε
  english_pob_reading: Translate as 'likewise perish' and preserve that this refers to a comparable kind of judgment without over-specifying whether the comparison is manner, certainty, or suddenness.
  chosen_spanish_reading: Traducir como «perecerán igualmente» y dejar abierta la comparación con el juicio de los ejemplos anteriores.
  alternative_spanish_readings:
  - perecerán de la misma manera
  - también perecerán
  rationale: El contexto apunta a una analogía con los casos previos, pero no define con precisión el aspecto exacto de la semejanza. La traducción mantiene esa tensión interpretativa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Esta redacción corrige el problema de validación anterior asegurando que el marcador de nota [a] aparezca en el texto base. También respeta la revisión auditada que favorece «arrepientan/arrepentirse» frente a una paráfrasis cognitiva, y conserva «igualmente» como renderización abierta de ὡσαύτως.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece en el texto fuente.
  - Se usa «arrepentirse» como término teológico establecido en español, coherente con el tratamiento POB de μετανοέω.
  - «Igualmente» deja sin resolver indebidamente la naturaleza exacta de la comparación, en línea con la cautela del POB inglés.
  - El sujeto plural explícito «todos ustedes» refleja πάντες como alcance universal del aviso.
