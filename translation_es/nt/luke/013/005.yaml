revisions:
- from: No[a], les digo; pero si no se arrepienten, todos ustedes perecerán igualmente.
  to: No[a], les digo; pero a menos que se arrepientan, todos ustedes igualmente perecerán.
  rationale: Se ajusta «pero si no» a «pero a menos que» para reflejar con mayor fidelidad ἀλλ’ ἐὰν μὴ. Se mantiene «se arrepientan» por la fuerza de μετανοῆτε en contexto de advertencia. Se conserva «igualmente» para preservar la amplitud semántica de ὡσαύτως, con una nota que ofrece la alternativa más explícita «de la misma manera». No se requiere cambio doctrinal ni adjudicación adicional.
