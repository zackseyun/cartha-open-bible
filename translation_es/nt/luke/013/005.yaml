  timestamp: '2026-05-07T21:01:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: negación enfática, fórmula «les digo», llamado al arrepentimiento, alcance universal de πάντες, y advertencia de perecer. También conserva la ambigüedad útil de ὡσαύτως mediante nota. Sin embargo, «pero si no» es menos fiel que «pero a menos que», porque ἀλλ’ ἐὰν μὴ expresa una excepción condicional fuerte equivalente a «unless», no solo una condición negativa simple.'
  spanish_quality_summary: 'El español es claro y legible, pero «todos ustedes perecerán igualmente» suena algo pesado y puede sugerir que «igualmente» modifica solo el verbo de manera adverbial difusa. «Todos ustedes también perecerán» perdería el matiz; mejor mantener «de igual manera» o «igualmente» con una estructura más natural. Además, conviene ajustar la nota al español idiomático: «O “perecerán de la misma manera”».'
  glossary_alignment: Está bien alineado con la terminología del proyecto en μετανοῆτε -> «se arrepienten» y ἀπολεῖσθε -> «perecerán». No hay términos de glosario mayor en conflicto. El único ajuste léxico importante es representar mejor ἀλλ’ ἐὰν μὴ como «pero a menos que».
  issues:
  - severity: medium
    issue: «pero si no» debilita la fuerza de ἀλλ’ ἐὰν μὴ
    rationale: El griego expresa una excepción condicional fuerte (‘unless’). «Pero si no» es comprensible, pero no refleja tan precisamente el giro adversativo-exceptivo como «pero a menos que».
  - severity: low
    issue: La colocación de «igualmente» puede sonar menos natural en español bíblico claro
    rationale: «Todos ustedes perecerán igualmente» es entendible, pero «todos ustedes igualmente perecerán» o «todos ustedes perecerán de igual manera» suena más natural y mantiene mejor el vínculo con ὡσαύτως y con la nota alternativa.
  - severity: low
    issue: La nota puede formularse con español más natural
    rationale: «O «de la misma manera perecerán»» es aceptable, pero «O «perecerán de la misma manera»» fluye mejor y corresponde de modo más directo a la redacción principal.
  revised_spanish_text: No[a], les digo; pero a menos que se arrepientan, todos ustedes igualmente perecerán.
  revised_footnotes:
  - marker: a
    text: O «perecerán de la misma manera». El griego puede señalar una clase de juicio comparable a la de los ejemplos precedentes.
    reason: lexical_alternative
  revision_rationale: Se ajusta «pero si no» a «pero a menos que» para reflejar con mayor fidelidad ἀλλ’ ἐὰν μὴ. Se mantiene «se arrepientan» por la fuerza de μετανοῆτε en contexto de advertencia. Se conserva «igualmente» para preservar la amplitud semántica de ὡσαύτως, con una nota que ofrece la alternativa más explícita «de la misma manera». No se requiere cambio doctrinal ni adjudicación adicional.
