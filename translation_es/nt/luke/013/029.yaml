translation:
  language: es
  text: Y vendrán de oriente y occidente, y de norte y sur, y se reclinarán[a] a la mesa en el reino de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se sentarán»; el griego se refiere más específicamente a reclinarse para una comida de banquete.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥξουσιν
  english_pob_choice: they will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - llegarán
  - vendrán a
  lexicon: BDAG
  rationale: El futuro de ἥκω expresa llegada o venida; en español, «vendrán» conserva el movimiento hacia el punto de referencia y resulta natural junto con los complementos direccionales.
- source_word: ἀπὸ ἀνατολῶν καὶ δυσμῶν
  english_pob_choice: from east and west
  chosen_spanish: de oriente y occidente
  alternatives_spanish:
  - del este y del oeste
  - de los puntos cardinales de oriente y occidente
  lexicon: BDAG
  rationale: El griego usa un plural idiomático para direcciones cardenales. «Oriente y occidente» es una equivalencia española natural y digna, y mantiene el alcance geográfico amplio sin precisar más de lo que el texto dice.
- source_word: ἀπὸ βορρᾶ καὶ νότου
  english_pob_choice: from north and south
  chosen_spanish: de norte y sur
  alternatives_spanish:
  - del norte y del sur
  lexicon: BDAG
  rationale: La construcción continúa el barrido geográfico anterior; «de norte y sur» es la forma más directa y natural en español.
- source_word: ἀνακλιθήσονται
  english_pob_choice: will recline at table
  chosen_spanish: se reclinarán a la mesa
  alternatives_spanish:
  - tomarán asiento a la mesa
  - se sentarán
  lexicon: BDAG
  rationale: El verbo alude al gesto cultural de reclinarse en un banquete. «Se reclinarán a la mesa» preserva esa imagen concreta mejor que «sentarse», sin perder inteligibilidad en español.
- source_word: ἐν τῇ βασιλείᾳ τοῦ θεοῦ
  english_pob_choice: in the kingdom of God
  chosen_spanish: en el reino de Dios
  alternatives_spanish:
  - en el reino de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la correspondencia transparente de βασιλεία τοῦ θεοῦ y conserva su peso escatológico y teológico sin parafrasearlo.
theological_decisions:
- issue: Imagen del banquete escatológico
  english_pob_reading: Retain the meal image with 'will recline at table' rather than flattening it to merely 'enter' or 'sit down.'
  chosen_spanish_reading: Conservar la imagen del banquete con «se reclinarán a la mesa» en vez de reducirla a «se sentarán» o «entrarán».
  alternative_spanish_readings:
  - se sentarán en el reino de Dios
  - entrarán en el reino de Dios
  rationale: La escena no solo describe presencia en el reino, sino participación en una comida festiva. La traducción debe preservar ese cuadro concreto sin añadir detalles no expresados por el griego.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance universal de la reunión
  english_pob_reading: Render the four directions straightforwardly as a worldwide ingathering without specifying ethnicity in the main text.
  chosen_spanish_reading: Mantener las cuatro direcciones como indicio de una reunión universal sin identificar en el texto principal a ningún grupo étnico específico.
  alternative_spanish_readings:
  - explicitar que se trata de gentiles de todas las naciones
  - interpretarlo abiertamente como la inclusión de los gentiles
  rationale: El texto griego comunica amplitud geográfica; no nombra de forma explícita a los gentiles. La traducción debe dejar esa tensión abierta en vez de resolverla de antemano.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y no registran revisiones aplicadas; por eso la redacción española sigue de cerca la solución ya validada, preservando el matiz de banquete y el alcance geográfico universal.
  spanish_consistency_notes:
  - Usé «Yahvé» como convención general del proyecto, pero aquí el versículo contiene θεοῦ y la pauta establecida exige «Dios».
  - Mantuve «reino de Dios» como equivalente estable de βασιλεία τοῦ θεοῦ, sin añadir artículos o giros explicativos innecesarios.
  - Elegí «oriente/occidente» por ser una equivalencia idiomática natural del par ἀνατολῶν/δυσμῶν en español bíblico moderno.
  - La nota a pie de página queda anclada en «reclinarán» para preservar la alternativa léxica documentada.
