revisions:
- from: Ahora algunos estaban presentes en aquel mismo tiempo informándole acerca de los galileos, cuya sangre Pilato había mezclado con sus sacrificios[a].
  to: En ese mismo momento, algunos estaban presentes informándole acerca de los galileos, cuya sangre Pilato había mezclado con sus sacrificios[a].
  rationale: Se reemplaza «Ahora algunos estaban presentes en aquel mismo tiempo» por «En ese mismo momento, algunos estaban presentes» para reflejar con español natural tanto la transición como la especificidad temporal de ἐν αὐτῷ τῷ καιρῷ sin calco rígido. Se conserva el resto de la estructura por su fidelidad al griego y al POB inglés. La nota al pie se ajusta para ofrecer una alternativa léxica real a «mezclado».
  reviewer_model: gpt-5.4
