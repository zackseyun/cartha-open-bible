translation:
  language: es
  text: En ese mismo momento, algunos estaban presentes informándole acerca de los galileos, cuya sangre Pilato había mezclado con sus sacrificios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había minglado con sus sacrificios».
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρῆσαν
  english_pob_choice: were present
  chosen_spanish: estaban presentes
  alternatives_spanish:
  - habían llegado
  - se hallaban presentes
  lexicon: BDAG
  rationale: El imperfecto de πάρειμι expresa presencia en curso más que llegada. «Estaban presentes» conserva ese matiz sin sonar forzado en español.
- source_word: δέ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: δέ introduce una transición suave. «Ahora» funciona naturalmente en español para marcar el cambio discursivo sin exagerar la secuencia temporal.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - unos
  - ciertas personas
  lexicon: BDAG
  rationale: El indefinido plural se expresa de forma concisa con «algunos».
- source_word: ἐν αὐτῷ τῷ καιρῷ
  english_pob_choice: at that very time
  chosen_spanish: en aquel mismo tiempo
  alternatives_spanish:
  - en ese mismo tiempo
  - en aquel tiempo
  lexicon: BDAG
  rationale: La expresión subraya una referencia temporal específica y cercana al contexto anterior. «Aquel mismo tiempo» preserva la fuerza demostrativa de αὐτῷ τῷ καιρῷ.
- source_word: ἀπαγγέλλοντες αὐτῷ
  english_pob_choice: reporting to him
  chosen_spanish: informándole
  alternatives_spanish:
  - contándole
  - dándole un informe
  lexicon: BDAG
  rationale: El participio comunica que estaban dando noticia o reporte. «Informándole» conserva ese valor informativo en español con naturalidad.
- source_word: περὶ τῶν Γαλιλαίων
  english_pob_choice: about the Galileans
  chosen_spanish: acerca de los galileos
  alternatives_spanish:
  - sobre los galileos
  - en cuanto a los galileos
  lexicon: BDAG
  rationale: περί con genitivo introduce el tema del informe. «Acerca de» es claro y fiel al uso tópico del griego.
- source_word: ὧν τὸ αἷμα
  english_pob_choice: whose blood
  chosen_spanish: cuya sangre
  alternatives_spanish:
  - la sangre de los cuales
  - de quienes la sangre
  lexicon: BDAG
  rationale: El relativo posesivo natural en español reproduce bien la relación de pertenencia entre los galileos y su sangre.
- source_word: Πιλᾶτος
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  alternatives_spanish:
  - Poncio Pilato
  lexicon: BDAG
  rationale: Nombre propio transliterado según la convención bíblica en español.
- source_word: ἔμιξεν
  english_pob_choice: had mixed
  chosen_spanish: había mezclado
  alternatives_spanish:
  - mezcló
  - había minglado
  lexicon: BDAG
  rationale: μίγνυμι significa mezclar o mezclar/minglar. «Había mezclado» conserva la relación de anterioridad respecto del reporte y evita una opción demasiado arcaica.
- source_word: μετὰ τῶν θυσιῶν αὐτῶν
  english_pob_choice: with their sacrifices
  chosen_spanish: con sus sacrificios
  alternatives_spanish:
  - con los sacrificios que ofrecían
  - junto con sus sacrificios
  lexicon: BDAG
  rationale: μετά con genitivo significa «con». «Sus sacrificios» refleja αὐτῶν y deja abierta la ambigüedad del griego sobre si los estaban ofreciendo en ese momento o simplemente pertenecían a ellos.
theological_decisions:
- issue: Violencia de Pilato y ambigüedad sobre el acto descrito
  english_pob_reading: Render the clause straightforwardly as a report of Pilate mixing the Galileans' blood with their sacrifices, without adding interpretive explanation.
  chosen_spanish_reading: Traducir de manera directa que Pilato había mezclado su sangre con sus sacrificios, sin explicar mecánicamente si fueron asesinados mientras sacrificaban o de qué modo exacto ocurrió.
  alternative_spanish_readings:
  - interpretar que fueron asesinados mientras ofrecían sacrificios
  - explicar que su sangre fue derramada sobre los sacrificios
  rationale: El griego presenta el hecho con fuerza y brevedad, pero no detalla el mecanismo. La traducción debe preservar esa tensión histórica y retórica sin resolverla con una paráfrasis interpretativa.
  doctrine_reference: Primacía del texto original; preservar la tensión histórica y moral en lugar de suavizarla.
translation_notes:
  revision_awareness: 'Se mantiene la línea de la POB inglesa: ritmo natural en español, participación del participio como acción informativa en curso, y preservación de la crudeza histórica sin amplificación interpretativa. No hubo revisiones textuales posteriores relevantes en el paquete auditado.'
  spanish_consistency_notes:
  - Se usa «Pilato» de forma consistente como nombre propio bíblico.
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita «Cristo» porque no aparece en el texto fuente.
  - «Sangre» y «sacrificios» conservan la relación semántica directa del griego sin añadir explicaciones.
  - 'La nota al pie conserva una alternativa lexical real del griego: «con» frente a «mezclado con».'
