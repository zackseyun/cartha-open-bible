base_translation:
  language: en
  yaml_path: translation/nt/luke/013/004.yaml
  text: Or those eighteen on whom the tower in Siloam fell and killed them—do you think that they became worse offenders than all the people living in Jerusalem?[a][b]
  footnotes:
  - marker: a
    text: Or 'sinners' or 'worse offenders' for 'debtors'; the Greek uses ὀφειλέται, literally 'debtors,' likely in a moral sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the people living in Jerusalem.' The Greek ἀνθρώπους can refer to human beings generally.
    reason: lexical_alternative
