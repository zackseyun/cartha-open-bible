translation:
  language: es
  text: ¿O aquellos dieciocho sobre quienes cayó la torre en Siloé y los mató? ¿Piensan ustedes que ellos se hicieron[a] más culpables que todos los habitantes de Jerusalén?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «deudores», o «pecadores», o «más culpables»; el griego usa ὀφειλέται, literalmente «deudores», probablemente en sentido moral.
    reason: lexical_alternative
  - marker: b
    text: O «todas las personas que vivían en Jerusalén»; ἀνθρώπους puede referirse a seres humanos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿O acaso
  - ¿O bien
  lexicon: BDAG
  rationale: Conserva la continuidad argumentativa de Jesús con una conjunción disyuntiva simple y natural en español.
- source_word: ἐκεῖνοι οἱ δεκαοκτὼ
  english_pob_choice: those eighteen
  chosen_spanish: aquellos dieciocho
  alternatives_spanish:
  - esos dieciocho
  - los dieciocho
  lexicon: BDAG
  rationale: La deixis de ἐκεῖνοι se conserva mejor con «aquellos»; el numeral se traduce de forma directa y sobria.
- source_word: ἐφ’ οὓς
  english_pob_choice: on whom
  chosen_spanish: sobre los cuales
  alternatives_spanish:
  - sobre quienes
  - en quienes
  lexicon: BDAG
  rationale: La relación preposicional con ἐπί se mantiene de manera clara; «sobre los cuales» es formal y precisa para una construcción relativa.
- source_word: ἔπεσεν ὁ πύργος
  english_pob_choice: the tower ... fell
  chosen_spanish: cayó la torre
  alternatives_spanish:
  - se desplomó la torre
  - la torre cayó
  lexicon: BDAG
  rationale: El griego dice literalmente que la torre «cayó»; en español, «cayó la torre» reproduce esa imagen sin añadir más explicación que la fuente no exige.
- source_word: ἐν τῷ Σιλωὰμ
  english_pob_choice: in Siloam
  chosen_spanish: en Siloé
  alternatives_spanish:
  - en Siloam
  lexicon: BDAG
  rationale: Se usa la forma española corriente del topónimo bíblico, inteligible para lectores en español, sin perder la referencia al lugar de la fuente griega.
- source_word: ἀπέκτεινεν αὐτούς
  english_pob_choice: killed them
  chosen_spanish: los mató
  alternatives_spanish:
  - los dio muerte
  - los asesinó
  lexicon: BDAG
  rationale: «Los mató» sigue el sentido narrativo directo del aoristo sin introducir una valoración agentiva o jurídica que el contexto no requiere.
- source_word: δοκεῖτε ὅτι
  english_pob_choice: do you think that
  chosen_spanish: piensan que
  alternatives_spanish:
  - ¿creen que
  - ¿les parece que
  lexicon: BDAG
  rationale: La pregunta de Jesús se vuelve natural en español manteniendo el desafío retórico; el sujeto implícito plural se entiende por el contexto inmediato de la audiencia.
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: BDAG
  rationale: El pronombre enfatiza a los mismos afectados; en español el énfasis puede quedar implícito sin añadir una redundancia innecesaria en la línea principal.
- source_word: ὀφειλέται
  english_pob_choice: worse offenders
  chosen_spanish: más culpables
  alternatives_spanish:
  - deudores
  - pecadores
  - más pecadores
  - peores infractores
  lexicon: BDAG
  rationale: Aunque el sustantivo es literalmente «deudores», en este contexto moral la idea es de culpabilidad ante Dios. «Más culpables» preserva esa tensión sin reducir el término a una equivalencia financiera ni obligar a escoger un equivalente eclesiástico tradicional.
- source_word: ἐγένοντο
  english_pob_choice: became
  chosen_spanish: se hicieron
  alternatives_spanish:
  - llegaron a ser
  - se volvieron
  lexicon: BDAG
  rationale: El aoristo de γίνομαι conserva el movimiento de cambio; «se hicieron» refleja ese proceso mejor que un simple «eran».
- source_word: παρὰ πάντας τοὺς ἀνθρώπους
  english_pob_choice: than all the people
  chosen_spanish: que todos los habitantes
  alternatives_spanish:
  - que todas las personas
  - que todos los hombres
  - que todos los demás
  lexicon: BDAG
  rationale: La preposición παρά con acusativo expresa comparación; «que todos los habitantes» comunica la comparación de excedencia y encaja con el contexto de Jerusalén. Se evita «hombres» en el texto principal porque el griego puede ser genérico y el español lo expresa mejor con un sustantivo de residentes.
- source_word: τοὺς κατοικοῦντας Ἰερουσαλήμ
  english_pob_choice: living in Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los que viven en Jerusalén
  - los que moran en Jerusalén
  lexicon: BDAG
  rationale: El participio presente se vierte como un sustantivo natural en español. «Habitantes de Jerusalén» conserva la referencia residencial continua y fluye mejor que una perífrasis participial.
theological_decisions:
- issue: Sentido de ὀφειλέται en este pasaje
  english_pob_reading: worse offenders
  chosen_spanish_reading: más culpables
  alternative_spanish_readings:
  - deudores
  - pecadores
  - más pecadores
  - peores infractores
  rationale: La expresión griega puede apuntar a responsabilidad moral, no a deuda financiera. «Más culpables» preserva la carga ética sin neutralizar la metáfora ni convertirla sin más en una fórmula doctrinal fija.
  doctrine_reference: 'Translation philosophy #3, #5'
- issue: Alcance de ἀνθρώπους
  english_pob_reading: all the people
  chosen_spanish_reading: todos los habitantes
  alternative_spanish_readings:
  - todas las personas
  - todos los hombres
  rationale: El griego puede referirse a seres humanos en general o a los residentes de Jerusalén como colectivo. Dado el contexto local, «habitantes» expresa mejor el grupo sin imponer marcación de género innecesaria.
  doctrine_reference: 'Translation philosophy #4'
translation_notes:
  revision_awareness: 'La fuente inglesa pasó por una revisión importante: se movió desde una traducción más literal («debtors beyond all the men») hacia una formulación idiomática («worse offenders than all the people»). La versión española sigue esa revisión, pero mantiene explícita la tensión de ὀφειλέται mediante la nota léxica y conserva el valor comparativo de παρά. También se ajusta el topónimo al uso español bíblico («Siloé»).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no lo contiene.
  - «Mesías/Cristo», «esclavo/siervo» y otros términos de plantilla no aparecen aquí.
  - La comparación se expresa con «más culpables que», equivalente natural de παρά + acusativo en este contexto.
  - No se usa una calca de «people living in Jerusalem»; se optó por «habitantes de Jerusalén» para fluidez y precisión.
