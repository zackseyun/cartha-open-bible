    text: O «deudores», o «pecadores», o «más culpables»; el griego usa ὀφειλέται, literalmente «deudores», probablemente en sentido moral.
    reason: lexical_alternative
  - marker: b
    text: O «todas las personas que vivían en Jerusalén»; ἀνθρώπους puede referirse a seres humanos en general.
    reason: lexical_alternative
  revision_rationale: Se hicieron ajustes menores para mejorar la naturalidad del español y alinear mejor la nota [b] con el alcance del griego y del texto principal. Se mantuvo «más culpables» como decisión contextual válida para ὀφειλέται, preservando en nota la alternativa literal «deudores».
