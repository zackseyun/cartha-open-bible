review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura retórica del griego y la escena del accidente en Siloé. Sin embargo, no preserva del todo la relación entre ἀνθρώπους y κατοικοῦντας Ἰερουσαλήμ: «habitantes de Jerusalén» ya incorpora la idea de residencia, por lo que la nota b («todas las personas») queda desanclada del contraste real de la frase griega. Además, «sobre los cuales» suena algo pesado en español bíblico corriente, y la secuencia interrogativa mejora con «¿piensan ustedes que…?» o similar. La decisión principal sobre ὀφειλέται como «más culpables» es defendible y está respaldada por la auditoría inglesa revisada, siempre que la nota conserve el literal «deudores».'
  spanish_quality_summary: 'El texto es legible y digno, pero puede sonar más natural en español con ajustes menores: «sobre quienes» en vez de «sobre los cuales», y un verbo interrogativo más idiomático. «Se hicieron más culpables» es comprensible, aunque «llegaron a ser más culpables» suena algo más natural; no obstante, «se hicieron» todavía es aceptable. La principal reparación necesaria es alinear mejor la nota b con el texto principal y evitar una nota que ya no corresponde exactamente a la formulación escogida.'
  glossary_alignment: No hay términos del glosario de proyecto especialmente comprometidos aquí. La elección de «más culpables» para ὀφειλέται sigue la revisión inglesa contextual, y la nota preserva correctamente la alternativa literal «deudores». «Siloé» es una forma española bíblica natural. No hay conflicto con Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: La nota [b] no corresponde con precisión al texto principal «habitantes de Jerusalén».
    rationale: El griego dice «todos los seres humanos/personas que habitan Jerusalén». Si el texto principal usa «habitantes de Jerusalén», la alternativa en nota no debe presentarse simplemente como «todas las personas» sin la referencia a Jerusalén, porque eso altera el alcance.
  - severity: low
    issue: «Sobre los cuales» suena rígido en español actual.
    rationale: Aunque es formalmente correcto, «sobre quienes» es más natural y suficientemente fiel para ἐφ’ οὓς en este contexto.
  - severity: low
    issue: La formulación interrogativa puede sonar algo abrupta con «piensan que».
    rationale: En español de lectura pública, «¿piensan ustedes que…?» o «¿creen que…?» suena más completo y natural como equivalente de δοκεῖτε ὅτι.
  revised_spanish_text: ¿O aquellos dieciocho sobre quienes cayó la torre en Siloé y los mató? ¿Piensan ustedes que ellos se hicieron[a] más culpables que todos los habitantes de Jerusalén?[b]
  revised_footnotes:
