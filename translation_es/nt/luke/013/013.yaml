translation:
  language: es
  text: Y le puso las manos sobre ella[a], e inmediatamente quedó derecha, y glorificaba a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "quedó erguida" o "fue enderezada".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέθηκεν
  english_pob_choice: laid
  chosen_spanish: le puso
  alternatives_spanish:
  - le impuso
  - puso sobre ella
  lexicon: BDAG
  rationale: En la expresión idiomática con las manos, el verbo español más natural y fiel al gesto concreto es 'poner'. 'Le puso las manos' conserva la acción física sin volverla más interpretativa de lo que exige el texto.
- source_word: αὐτῇ
  english_pob_choice: on her
  chosen_spanish: sobre ella
  alternatives_spanish:
  - en ella
  - a ella
  lexicon: BDAG
  rationale: El dativo con ἐπιτίθημι pide expresar el destinatario del gesto. 'Sobre ella' comunica el contacto corporal de forma clara y natural en español.
- source_word: τὰς χεῖρας
  english_pob_choice: his hands
  chosen_spanish: las manos
  alternatives_spanish:
  - sus manos
  - las manos de él
  lexicon: BDAG
  rationale: El griego usa artículo donde el español puede simplemente decir 'las manos'. Evito agregar 'sus' porque el sujeto ya está claro por el contexto narrativo y no hay necesidad de forzar posesión explícita.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: '''Enseguida'' transmite bien la rapidez súbita del adverbio y suena natural en español bíblico contemporáneo. Mantiene la inmediatez sin solemnizar en exceso.'
- source_word: ἀνωρθώθη
  english_pob_choice: was made straight
  chosen_spanish: fue enderezada
  alternatives_spanish:
  - fue puesta derecha
  - fue erguida
  - fue enderezada de nuevo
  lexicon: BDAG
  rationale: El pasivo de ἀνορθόω en este contexto describe la restauración corporal de una mujer encorvada. 'Fue enderezada' conserva la pasividad y la imagen física; 'de nuevo' se evita porque no está explícito en el griego.
- source_word: ἐδόξαζεν
  english_pob_choice: glorified
  chosen_spanish: glorificaba
  alternatives_spanish:
  - daba gloria a
  - alababa
  lexicon: BDAG
  rationale: El imperfecto expresa una acción continua o durativa tras la sanidad. 'Glorificaba' preserva tanto el valor teológico de δοξάζω como el matiz aspectual, mejor que un simple aoristo español puntual.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - al Dios
  lexicon: BDAG
  rationale: 'Como objeto directo de δοξάζω en español conviene marcar la preposición personal: ''a Dios''. Mantiene la referencia teológica directa y natural.'
theological_decisions:
- issue: Resultado físico de ἀνωρθώθη
  english_pob_reading: 'A physical restoration: ''she was made straight'''
  chosen_spanish_reading: 'Una restauración corporal: ''fue enderezada'''
  alternative_spanish_readings:
  - fue puesta derecha
  - fue erguida
  rationale: El contexto inmediato habla de una mujer encorvada y del acto sanador de Jesús. La traducción elegida conserva el sentido corporal sin agregar explicaciones sobre el mecanismo de la curación.
  doctrine_reference: Priorizar la evidencia del texto original y conservar la tensión descriptiva del pasaje sin doctrinalizarla.
translation_notes:
  revision_awareness: La versión inglesa auditada eliminó 'again' porque no aparece en el griego; la redacción española también omite cualquier equivalente de 'otra vez'. Se mantiene el imperfecto 'glorificaba' para reflejar ἐδόξαζεν sin convertirlo en acción puntual.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός, según la terminología base del proyecto.
  - Se evita 'SEÑOR' o sustituciones litúrgicas no requeridas por el texto griego.
  - '''Fue enderezada'' conserva el pasivo y la imagen corporal; no se interpreta como simple postura voluntaria.'
  - 'El orden narrativo sigue el griego: gesto de imposición de manos, resultado inmediato, respuesta de glorificar a Dios.'
