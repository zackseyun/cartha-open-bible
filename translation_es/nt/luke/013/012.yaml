  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: «Pero cuando Jesús la vio» refleja adecuadamente ἰδὼν δὲ αὐτήν; «le dijo» representa εἶπεν αὐτῇ; «Mujer» preserva correctamente Γύναι; y «de tu debilidad» mantiene el valor amplio de ἀσθένεια conforme al expediente inglés. La principal desviación está en προσεφώνησεν y ἀπολέλυσαι: «la llamó» omite el matiz de convocarla/acercarla presente en la revisión inglesa «called her over», y «queda libre» suena más performativo-imperatival en español que declarativo-resultativo, mientras el perfecto pasivo ἀπολέλυσαι expresa mejor un estado actual resultante.'
  spanish_quality_summary: El español es claro y natural, pero «la llamó» queda algo incompleto en contexto y puede entenderse solo como hablarle, no como hacerla venir. Además, «queda libre» en boca de Jesús suena menos idiomático y menos fiel al valor aspectual que «has quedado libre» o «estás libre». Una pequeña revisión mejora precisión y fluidez sin perder dignidad.
  glossary_alignment: 'Sin conflictos con la terminología del proyecto: «Jesús», «Mujer» y «debilidad» están alineados. No hay términos de glosario mayor afectados. La nota alternativa inglesa sobre «released/infirmity» conviene preservarla en español porque sigue siendo una alternativa léxica relevante.'
  issues:
  - severity: medium
    issue: «la llamó» debilita el matiz de προσεφώνησεν
    rationale: El verbo griego aquí no solo indica que Jesús habló, sino que la llamó/convocó para dirigirse a ella. En español, «la llamó» puede solaparse con «le dijo» y perder el matiz de hacerla acercarse.
  - severity: medium
    issue: «queda libre» no refleja bien el perfecto pasivo ἀπολέλυσαι
    rationale: La forma griega expresa un estado presente resultante de una liberación ya efectuada. «Queda libre» en español suele oírse como declaración performativa o mandato elíptico; «has quedado libre» preserva mejor el resultado actual.
  - severity: low
    issue: Falta la nota léxica alternativa preservada en el expediente inglés
    rationale: El POB inglés conserva una alternativa importante («you have been released from your infirmity»). Puede trasladarse naturalmente al español como nota para conservar transparencia léxica.
  revised_spanish_text: 'Pero cuando Jesús la vio[a], la llamó y le dijo: «Mujer, has quedado libre de tu debilidad».[b]'
