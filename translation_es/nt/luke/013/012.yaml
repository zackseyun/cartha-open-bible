translation:
  language: es
  text: 'Pero cuando Jesús la vio[a], la llamó y le dijo: «Mujer, has quedado libre de tu debilidad».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al verla»
    reason: alternative_rendering_of_temporal_participle
  - marker: b
    text: O «has sido liberada de tu dolencia»
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: when ... saw
  chosen_spanish: cuando ... la vio
  alternatives_spanish:
  - al verla
  - habiéndola visto
  lexicon: BDAG
  rationale: El participio aoristo se entiende naturalmente como una acción previa o coincidente. En español, «cuando la vio» conserva la secuencia narrativa sin sonar forzado.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca avance discursivo con leve cambio de escena; «Pero» reproduce bien ese movimiento narrativo en español sin exagerar el contraste.
- source_word: προσεφώνησεν
  english_pob_choice: he called her over
  chosen_spanish: la llamó
  alternatives_spanish:
  - la llamó aparte
  - se dirigió a ella
  - la llamó para sí
  lexicon: BDAG
  rationale: προσφωνέω implica dirigirse o llamar a alguien. En este contexto, «la llamó» es breve, natural y suficientemente directo; el complemento siguiente «le dijo» mantiene el carácter de atención verbal personal.
- source_word: εἶπεν αὐτῇ
  english_pob_choice: and said to her
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le habló
  - y le expresó
  lexicon: BDAG
  rationale: La dativo personal se expresa con claridad en español mediante «le dijo». Es idiomático y preserva la relación directa con ella.
- source_word: Γύναι
  english_pob_choice: Woman
  chosen_spanish: Mujer
  alternatives_spanish:
  - Mujer mía
  - Señora
  - Mujer,
  lexicon: BDAG
  rationale: El vocativo γύναι es una forma de trato respetuosa. «Mujer» es la equivalencia más directa y constante, sin añadir matices afectivos o sociales no presentes en el griego.
- source_word: ἀπολέλυσαι
  english_pob_choice: you are freed
  chosen_spanish: queda libre
  alternatives_spanish:
  - has sido liberada
  - estás liberada
  - se te ha librado
  lexicon: BDAG
  rationale: El perfecto pasivo expresa un estado resultante de una acción completada. «Queda libre» comunica bien ese estado actual en español. Se evita «liberada» como participio adjetival por sonar menos natural en esta declaración directa.
- source_word: τῆς ἀσθενείας σου
  english_pob_choice: from your weakness
  chosen_spanish: de tu debilidad
  alternatives_spanish:
  - de tu enfermedad
  - de tu dolencia
  - de tu fragilidad
  lexicon: BDAG
  rationale: ἀσθένεια puede significar debilidad, enfermedad o dolencia. Se conserva «debilidad» para reflejar el rango semántico más amplio que el inglés POB también preserva con «weakness», sin imponer una categoría médica más específica de la que exige el texto.
theological_decisions:
- issue: Alcance semántico de ἀσθένεια
  english_pob_reading: Render broadly as 'weakness' rather than narrowly as 'sickness' or 'disability.'
  chosen_spanish_reading: «debilidad» mantiene el sentido amplio, no restringido a una sola categoría clínica.
  alternative_spanish_readings:
  - enfermedad
  - dolencia
  - invalidez
  rationale: El contexto es una aflicción física real, pero el término griego permite un campo semántico más amplio. «Debilidad» evita sobreespecificar el diagnóstico y conserva la tensión lexical del original.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB al traducir el perfecto pasivo con un resultado presente («queda libre») y al reflejar el valor de προσφωνέω como una llamada directa. También conserva el enfoque amplio de ἀσθένεια, alineado con la decisión revisada de mantener «weakness» en inglés.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς según el estándar del proyecto.
  - Se mantiene un registro sobrio y apto para lectura eclesial, sin arcaísmos innecesarios.
  - No se introduce nota textual porque el texto griego y la decisión del POB inglés no requieren una variante adicional en español.
