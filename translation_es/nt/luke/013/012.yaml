revisions:
- from: 'Pero cuando Jesús la vio, la llamó y le dijo: «Mujer, queda libre de tu debilidad».'
  to: 'Pero cuando Jesús la vio[a], la llamó y le dijo: «Mujer, has quedado libre de tu debilidad».[b]'
  rationale: Se mantiene la estructura del borrador, pero se corrige ἀπολέλυσαι a «has quedado libre» para reflejar mejor el perfecto pasivo con resultado presente en español. Se conservó «debilidad» por fidelidad al campo semántico amplio de ἀσθένεια. Aunque «la llamó» no es ideal, sigue siendo aceptable y natural; la revisión necesaria es pequeña. Se añadieron notas para preservar alternativas léxicas relevantes del expediente inglés y una alternativa natural para el participio temporal.
