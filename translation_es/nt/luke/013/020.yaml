translation:
  language: es
  text: 'Y otra vez dijo: «¿A qué compararé el reino de Dios?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - También
  lexicon: BDAG
  rationale: La conjunción simple mantiene la unión narrativa sin añadir una relación temporal o explicativa que el griego no exige aquí.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: BDAG
  rationale: Expresa con naturalidad la repetición de la acción en español contemporáneo, conservando la función adverbial de repetición.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: El aoristo narrativo de λέγω introduce discurso directo; en español, «dijo» es la forma más natural y precisa.
- source_word: Τίνι
  english_pob_choice: To what
  chosen_spanish: ¿A qué?
  alternatives_spanish:
  - ¿Con qué?
  - ¿A cuál cosa?
  lexicon: BDAG
  rationale: El dativo interrogativo neutro pide el término de comparación, no una persona; «¿A qué?» reproduce esa función comparativa de manera idiomática.
- source_word: ὁμοιώσω
  english_pob_choice: shall I compare
  chosen_spanish: compararé
  alternatives_spanish:
  - ¿con qué compararé?
  - ¿podré comparar?
  lexicon: BDAG
  rationale: El futuro de ὁμοιόω en una pregunta retórica deliberativa puede expresarse naturalmente en español con futuro simple; se conserva el tono de formulación de comparación.
- source_word: τὴν βασιλείαν
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reino real
  - el dominio
  lexicon: BDAG
  rationale: «Reino» preserva la correspondencia bíblica tradicional de βασιλεία sin reducirla solo a territorio o institución.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios Padre
  lexicon: BDAG
  rationale: El genitivo designa pertenencia/relación con Dios; «de Dios» es la forma directa y transparente en español.
theological_decisions:
- issue: Naturaleza de βασιλεία en la expresión «βασιλεία τοῦ θεοῦ»
  english_pob_reading: the kingdom of God
  chosen_spanish_reading: el reino de Dios
  alternative_spanish_readings:
  - el reinado de Dios
  - el dominio de Dios
  rationale: Se mantiene la frase canónica y ampliamente reconocible «reino de Dios», que conserva el alcance semántico de βασιλεία sin imponer solo la idea de actividad o gobierno. No se atenúa la referencia a la realeza divina; simplemente se expresa con el término bíblico más estable en español.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y sin cambios necesarios; por ello se conserva la estructura semántica del original y la decisión inglesa de lectura deliberativa en forma natural en español.
  spanish_consistency_notes:
  - Se mantiene «reino de Dios» como equivalente estable de βασιλεία τοῦ θεοῦ.
  - Se preserva el tono interrogativo-retórico de la pregunta de Jesús sin añadir explicaciones interpretativas.
  - El español usa una sintaxis fluida y pública, adecuada para lectura eclesial, sin depender del calco inglés.
