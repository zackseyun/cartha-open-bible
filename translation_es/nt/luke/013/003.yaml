translation:
  language: es
  text: No[a], les digo; pero, a menos que se arrepientan, todos ustedes perecerán de la misma manera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'igualmente'. El adverbio 'de la misma manera' puede referirse a un tipo semejante de juicio repentino, no necesariamente a un modo idéntico de muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχί
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - Ciertamente no
  - No, en absoluto
  lexicon: BDAG
  rationale: Expresa la negación enfática de manera natural en español sin añadir una intensificación mayor que la del griego.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - yo les digo
  lexicon: BDAG
  rationale: Como fórmula discursiva en Lucas, en español suena más natural 'les digo' y conserva la dirección directa a los oyentes.
- source_word: ἐὰν μὴ
  english_pob_choice: unless
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que
  - si ustedes no
  lexicon: BDAG
  rationale: En español, 'si no' comunica con claridad la condición negativa y mantiene la fuerza de 'unless'.
- source_word: μετανοῆτε
  english_pob_choice: you repent
  chosen_spanish: se arrepienten
  alternatives_spanish:
  - cambian de mente
  - se vuelven atrás
  lexicon: BDAG
  rationale: Aquí μετανοέω tiene fuerza moral y espiritual; 'arrepentirse' conserva ese peso mejor que una mera referencia cognitiva.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - cada uno de ustedes
  lexicon: BDAG
  rationale: La forma explícita 'todos ustedes' hace visible el alcance colectivo del aviso y encaja bien con el habla directa.
- source_word: ὁμοίως
  english_pob_choice: likewise
  chosen_spanish: igualmente
  alternatives_spanish:
  - de la misma manera
  - así también
  lexicon: BDAG
  rationale: '''Igualmente'' reproduce el adverbio de comparación con naturalidad en español y deja abierta la amplitud de la relación con el contexto previo.'
- source_word: ἀπολεῖσθε
  english_pob_choice: you will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - morirán
  lexicon: BDAG
  rationale: '''Perecerán'' conserva la gravedad de ἀπόλλυμι sin precisar más de lo que el griego exige sobre la modalidad exacta del juicio.'
theological_decisions:
- issue: Alcance de 'perecer' como advertencia de juicio
  english_pob_reading: Render ἀπολεῖσθε as 'perish' without narrowing it to merely physical death or explicitly eternal condemnation.
  chosen_spanish_reading: '''perecerán'' mantiene la advertencia de juicio sin especificar si se trata solo de muerte física o de condenación eterna.'
  alternative_spanish_readings:
  - morirán
  - serán condenados eternamente
  - serán destruidos
  rationale: El término griego permite una gravedad real sin fijar el modo exacto del juicio. La traducción conserva esa tensión teológica en lugar de resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica sin sobreprecisar el resultado.
translation_notes:
  revision_awareness: Este borrador sigue la revisión más reciente del inglés POB al preferir 'arrepentirse' frente a una paráfrasis cognitiva, y mantiene el alcance colectivo de πάντες con 'todos ustedes'. También conserva la apertura semántica de ὁμοίως mediante una nota alternativa en español.
  spanish_consistency_notes:
  - Se usa 'arrepentirse' como equivalente principal de μετανοέω por coherencia con el tratamiento POB del pasaje.
  - Se evita 'SEÑOR' o 'Cristo' porque no aparecen en este versículo.
  - '''Perecerán'' se mantiene sin especificar el tipo de muerte o destrucción para respetar la ambigüedad teológica del griego.'
  - La nota [a] está anclada en 'igualmente' para reflejar la alternativa de lectura de ὁμοίως.
