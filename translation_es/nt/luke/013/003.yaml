  glossary_alignment: 'Cumple bien con la terminología del proyecto en este versículo: μετανοῆτε → ''se arrepientan'' respeta la decisión establecida; ἀπολεῖσθε → ''perecerán'' preserva la tensión teológica sin sobreinterpretación. No hay conflictos con términos globales del glosario como Yahvé/Mesías/Espíritu.'
