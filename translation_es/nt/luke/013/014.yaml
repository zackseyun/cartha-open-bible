review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: contraste inicial, indignación del dirigente, causalidad por la sanidad hecha por Jesús en sábado, y la reprensión dirigida a la multitud. También conserva adecuadamente la obligación de δεῖ y el mandato resultante. Sin embargo, «en el día de sábado» suena poco natural en español y no es necesario para preservar la formalidad del griego; «en el día de descanso semanal» tampoco sería fiel al término. Además, «jefe de la sinagoga» es comprensible, pero «dirigente de la sinagoga» o «principal de la sinagoga» suena más natural y preciso en español bíblico moderno.'
  spanish_quality_summary: 'El texto es claro y mayormente natural, con buen registro moderno y digno. Los principales problemas son de idiomaticidad: «en el día de sábado» resulta torpe, y la nota alternativa repite la misma rigidez. «Sean sanados» es aceptable, aunque «sean curados» también sería natural; no requiere cambio. La puntuación y el flujo son buenos.'
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. «Jesús» y «sábado» están bien. No hay términos sensibles como Yahvé, Mesías, Espíritu, etc. La elección de «sanado/sanados» concuerda con la decisión documentada para θεραπεύω.
  issues:
  - severity: medium
    issue: 'Frase poco idiomática: «y no en el día de sábado»'
    rationale: Aunque intenta reflejar «on the day of the Sabbath», en español suena antinatural. «Y no en el día del sábado» conserva mejor la referencia específica y la dignidad del registro sin perder fidelidad.
  - severity: low
    issue: «Jefe de la sinagoga» es algo tosco
    rationale: Es entendible y no infiel, pero «dirigente de la sinagoga» suena más natural en español general y mantiene la función de ἀρχισυνάγωγος sin sugerir autoridad civil o eclesiástica anacrónica.
  - severity: low
    issue: La nota al pie alternativa también conserva la formulación poco natural «día de sábado»
    rationale: 'Si se mantiene una nota idiomática, conviene que su español también sea plenamente natural: «sábado» o «día del sábado».'
