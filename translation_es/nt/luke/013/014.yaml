revisions:
- from: 'Pero el jefe de la sinagoga respondió[a], indignado porque Jesús había sanado en sábado, y dijo a la multitud: «Hay seis días en los que es necesario trabajar; así que vengan en esos días y sean sanados, y no en el día de sábado».'
  to: 'Pero el dirigente de la sinagoga respondió[a], indignado porque Jesús había sanado en sábado, y dijo a la multitud: «Hay seis días en los que es necesario trabajar; así que vengan en esos días y sean sanados, y no en el día del sábado».'
  rationale: Se ajustó «jefe» a «dirigente» para una expresión más natural y precisa en español bíblico moderno. Se cambió «en el día de sábado» por «en el día del sábado» para corregir una construcción poco idiomática sin perder la referencia formal del griego. La nota al pie se armonizó con un español más natural.
