translation:
  language: es
  text: 'Pero el dirigente de la sinagoga respondió[a], indignado porque Jesús había sanado en sábado, y dijo a la multitud: «Hay seis días en los que es necesario trabajar; así que vengan en esos días y sean sanados, y no en el día del sábado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «Hay seis días en que debe trabajarse; vengan en esos días y sean sanados, no en sábado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» preserva la función discursiva de introducir la réplica y suena natural en un registro bíblico moderno; «contestó» es posible pero algo más coloquial.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: «Pero» reproduce bien el giro contrastivo respecto de la escena de sanidad previa.
- source_word: ἀρχισυνάγωγος
  english_pob_choice: synagogue ruler
  chosen_spanish: jefe de la sinagoga
  alternatives_spanish:
  - líder de la sinagoga
  - oficial de la sinagoga
  lexicon: BDAG
  rationale: «Jefe de la sinagoga» comunica la función de autoridad local sin introducir una connotación eclesiástica ajena; conserva la fuerza del término compuesto mejor que una glosa más abstracta.
- source_word: ἀγανακτῶν
  english_pob_choice: indignant
  chosen_spanish: indignado
  alternatives_spanish:
  - airado
  - resentido
  lexicon: BDAG
  rationale: «Indignado» refleja una molestia moralizada, más precisa que un simple «enojado».
- source_word: ὅτι τῷ σαββάτῳ ἐθεράπευσεν ὁ Ἰησοῦς
  english_pob_choice: because Jesus had healed on the Sabbath
  chosen_spanish: porque Jesús había sanado en sábado
  alternatives_spanish:
  - porque Jesús sanó en sábado
  - porque Jesús había curado en sábado
  lexicon: BDAG
  rationale: «Había sanado» mantiene el anterioridad relativa frente a su discurso; «sanado» sigue la elección léxica de θεραπεύω como sanidad, y «en sábado» evita una repetición menos natural de «el sábado».
- source_word: ἔλεγεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - estaba diciendo
  - decía
  lexicon: BDAG
  rationale: Aunque el griego es imperfecto, en español «dijo» funciona de forma natural en discurso narrativo sin forzar una lectura iterativa; «decía» o «estaba diciendo» sonarían más marcados.
- source_word: τῷ ὄχλῳ
  english_pob_choice: to the crowd
  chosen_spanish: a la multitud
  alternatives_spanish:
  - a la gente
  - al gentío
  lexicon: BDAG
  rationale: «Multitud» corresponde bien a ὄχλος en Lucas y conserva un registro bíblico claro y natural.
- source_word: Ἓξ ἡμέραι εἰσὶν ἐν αἷς δεῖ ἐργάζεσθαι
  english_pob_choice: There are six days in which it is necessary to work
  chosen_spanish: Hay seis días en los que es necesario trabajar
  alternatives_spanish:
  - Hay seis días en que se debe trabajar
  - Hay seis días cuando debe hacerse trabajo
  lexicon: BDAG
  rationale: La frase mantiene la estructura de obligación de δεῖ con un español fluido y fiel; «es necesario trabajar» conserva el valor normativo sin convertirlo en una mera sugerencia.
- source_word: δεῖ
  english_pob_choice: it is necessary
  chosen_spanish: es necesario
  alternatives_spanish:
  - se debe
  - hay que
  lexicon: BDAG
  rationale: «Es necesario» reproduce directamente la noción de necesidad/obligación del griego y evita suavizar el reclamo del hablante.
- source_word: ἐργάζεσθαι
  english_pob_choice: to work
  chosen_spanish: trabajar
  alternatives_spanish:
  - hacer trabajo
  - laborar
  lexicon: BDAG
  rationale: El infinitivo simple «trabajar» es la opción más natural y precisa para ἐργάζεσθαι en este contexto.
- source_word: ἐν αὐταῖς οὖν ἐρχόμενοι θεραπεύεσθε
  english_pob_choice: so come on those days and be healed
  chosen_spanish: así que vengan en esos días y sean sanados
  alternatives_spanish:
  - por tanto vengan en esos días y sean sanados
  - vengan en esos días, pues, y sean sanados
  lexicon: BDAG
  rationale: Se conserva el impulso inferencial de οὖν con «así que», y el participio de movimiento se vuelve un imperativo natural en español. «Sean sanados» refleja el pasivo imperativo de θεραπεύεσθε.
- source_word: θεραπεύεσθε
  english_pob_choice: be healed
  chosen_spanish: sean sanados
  alternatives_spanish:
  - sean curados
  - reciban sanidad
  lexicon: BDAG
  rationale: «Sanados» mantiene el campo semántico de θεραπεύω y suena más bíblico y preciso que «curados» en este contexto.
- source_word: καὶ μὴ τῇ ἡμέρᾳ τοῦ σαββάτου
  english_pob_choice: and not on the day of the Sabbath
  chosen_spanish: y no en el día de sábado
  alternatives_spanish:
  - y no en el día de reposo
  - y no en sábado
  lexicon: BDAG
  rationale: «En el día de sábado» conserva la forma enfática del griego y mantiene la referencia sin sustituirla por una expresión interpretativa distinta.
- source_word: σαββάτῳ / σαββάτου
  english_pob_choice: Sabbath
  chosen_spanish: sábado
  alternatives_spanish:
  - Sabbat
  - día de reposo
  lexicon: BDAG
  rationale: En español, «sábado» es la forma habitual y clara para σάββατον en este contexto narrativo. Aquí no se usa «día de reposo» para no desplazar el término concreto del texto.
theological_decisions:
- issue: La cita del jefe de la sinagoga como norma humana, no como enseñanza divina
  english_pob_reading: Translate his words as a human rule-bound objection without endorsing it.
  chosen_spanish_reading: Traducir sus palabras como una objeción regida por una norma humana, sin presentarlas como aprobación divina.
  alternative_spanish_readings:
  - Traducirlo de forma más libre para enfatizar la hipocresía
  - Hacer la frase más literal aunque suene menos natural
  rationale: El verso reporta la perspectiva del jefe de la sinagoga. La traducción conserva su tono prescriptivo sin añadir una evaluación teológica que el propio versículo no formula.
  doctrine_reference: Principios de transparencia y de no añadir conclusiones doctrinales ajenas al texto
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió «said» sobre «was saying» por naturalidad. En español, esa decisión se refleja con «dijo», manteniendo el valor narrativo fluido y el trasfondo imperfectivo del griego sin sobrecargarlo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Mesías» no aplica aquí; se conserva el nombre propio «Jesús».
  - Se usa «sábado» para σάββατον de forma consistente con el contexto narrativo y la práctica habitual del español.
  - «sanado/sanados» sigue el léxico de θεραπεύω, sin pasar a «curado» salvo cuando el contexto lo requiriera.
