  text: ταύτην δὲ θυγατέρα Ἀβραὰμ οὖσαν, ἣν ἔδησεν ὁ Σατανᾶς ἰδοὺ δέκα καὶ ὀκτὼ ἔτη, οὐκ ἔδει λυθῆναι ἀπὸ τοῦ δεσμοῦ τούτου τῇ ἡμέρᾳ τοῦ σαββάτου;
base_translation:
  language: en
  yaml_path: translation/nt/luke/013/016.yaml
  text: And ought not this woman[a], being a daughter of Abraham[b], whom Satan bound for eighteen years—be released from this bond on the Sabbath day?
  footnotes:
  - marker: a
    text: 'Or ''be loosed from this bond.'' The Greek uses binding-and-loosing language: ''whom Satan bound ... be released/loosed from this bond.'''
    reason: lexical_alternative
  - marker: b
    text: '''Daughter of Abraham'' highlights her standing within Abraham''s covenant family and strengthens Jesus'' argument about what is fitting on the Sabbath.'
    reason: cross_reference
