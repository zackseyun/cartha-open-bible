translation:
  language: es
  text: ¿Y no era necesario que esta mujer, hija de Abraham[a], a quien Satanás ató durante dieciocho años, fuera desatada[b] de esta atadura en el día de sábado?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Hija de Abraham" destaca su pertenencia a la familia del pacto y refuerza el argumento de Jesús sobre lo que es apropiado en sábado.'
    reason: cross_reference
  - marker: b
    text: 'O: «fuera liberada». El griego conserva el juego de "atar" y "desatar": «a quien Satanás ató ... fuera desatada de esta atadura».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταύτην δὲ
  english_pob_choice: And ... this
  chosen_spanish: ¿Y no era necesario... que esta mujer...
  alternatives_spanish:
  - ¿Y no debía... que esta mujer...
  - ¿Acaso no convenía... que esta mujer...
  lexicon: BDAG
  rationale: δέ es un enlace suave; en español, la inversión interrogativa con '¿Y no era necesario...?' conserva el tono argumentativo y la fuerza retórica sin sobrecargar el contraste. El demostrativo ταύτην queda implícito en 'esta mujer'.
- source_word: θυγατέρα Ἀβραὰμ
  english_pob_choice: woman, being a daughter of Abraham
  chosen_spanish: hija de Abraham
  alternatives_spanish:
  - mujer, siendo hija de Abraham
  - esta hija de Abraham
  lexicon: BDAG
  rationale: θυγατέρα significa literalmente 'hija'; en español, 'hija de Abraham' es natural y conserva el valor covenantal y retórico del título. El género femenino ya está expresado por 'esta mujer'.
- source_word: οὖσαν
  english_pob_choice: being
  chosen_spanish: —
  alternatives_spanish:
  - siendo
  - que es
  lexicon: BDAG
  rationale: El participio presente se integra de manera natural en la apposición española 'esta mujer, hija de Abraham', sin perder su función identificadora.
- source_word: ἣν ἔδησεν ὁ Σατανᾶς
  english_pob_choice: whom Satan bound
  chosen_spanish: a quien Satanás ató
  alternatives_spanish:
  - a quien Satanás había atado
  - a quien el Adversario ató
  lexicon: BDAG
  rationale: El aoristo ἔδησεν se vierte con pasado simple 'ató'. Se conserva 'Satanás' como nombre propio/título transliterado, siguiendo el uso estándar y el relieve personal del agente.
- source_word: ἰδοὺ
  english_pob_choice: look
  chosen_spanish: —
  alternatives_spanish:
  - mira
  - fíjate
  lexicon: BDAG
  rationale: El griego marca énfasis discursivo, pero en español no es necesario insertarlo explícitamente; la pregunta ya comunica el énfasis retórico. Se evita un calco intrusivo.
- source_word: δέκα καὶ ὀκτὼ ἔτη
  english_pob_choice: for eighteen years
  chosen_spanish: durante dieciocho años
  alternatives_spanish:
  - por dieciocho años
  - dieciocho años
  lexicon: BDAG
  rationale: La duración se expresa de forma natural con 'durante dieciocho años', preservando la idea temporal sin añadir mecánicamente una preposición impropia.
- source_word: οὐκ ἔδει
  english_pob_choice: ought not
  chosen_spanish: no era necesario
  alternatives_spanish:
  - no debía
  - no convenía
  lexicon: BDAG
  rationale: La forma imperfecta de δεῖ expresa necesidad/propriedad moral en pregunta retórica. 'No era necesario' comunica esa fuerza en español y evita un tono demasiado normativo de 'debía'.
- source_word: λυθῆναι
  english_pob_choice: be released
  chosen_spanish: fuera soltada
  alternatives_spanish:
  - fuera liberada
  - fuera desatada
  lexicon: BDAG
  rationale: λύω conserva aquí la imagen de desatar/soltar en contraste con atar. 'Fuera soltada' mantiene el juego semántico con 'ató' y suena natural en la pasiva perifrástica española.
- source_word: ἀπὸ τοῦ δεσμοῦ τούτου
  english_pob_choice: from this bond
  chosen_spanish: de este lazo
  alternatives_spanish:
  - de esta atadura
  - de este vínculo
  lexicon: BDAG
  rationale: δεσμός puede ser 'lazo', 'atadura' o 'vínculo'. Se elige 'lazo' para mantener la conexión con el campo de 'atar/soltar' y una expresión idiomática clara en español.
- source_word: τῇ ἡμέρᾳ τοῦ σαββάτου
  english_pob_choice: on the Sabbath day
  chosen_spanish: en día de sábado
  alternatives_spanish:
  - en el día de reposo
  - en sábado
  lexicon: BDAG
  rationale: Se prefiere 'día de sábado' para reflejar el sintagma explícito del griego ('el día del sábado') sin sustituirlo por una formulación más tradicional que podría ocultar la estructura del texto. 'En sábado' es más breve, pero pierde la referencia al día.
theological_decisions:
- issue: Sentido de 'hija de Abraham'
  english_pob_reading: A covenantal designation affirming her place among Abraham's people, used rhetorically to underscore the appropriateness of her healing.
  chosen_spanish_reading: Una designación de pertenencia al pueblo del pacto de Abraham, que refuerza el argumento de Jesús sobre la conveniencia de liberarla en sábado.
  alternative_spanish_readings:
  - Una simple referencia biológica o étnica
  - Una alabanza general de su fe
  rationale: La expresión no solo identifica sexo; en el contexto, subraya su lugar dentro de la familia pactal de Abraham y fortalece la conclusión moral de la pregunta de Jesús.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Referencia a Satanás como agente de la atadura
  english_pob_reading: A real personal-agent reference to Satan as the one who had bound her, without specifying a full causal mechanism beyond the text.
  chosen_spanish_reading: Una referencia real y personal a Satanás como quien la ató, sin añadir mecanismos causales que el versículo no afirma.
  alternative_spanish_readings:
  - Una personificación puramente metafórica del mal
  - Una explicación demonológica detallada de su condición
  rationale: El texto nombra a Satanás como agente; la traducción preserva esa referencia sin expandirla a una causalidad médica o demonológica que no está en el versículo.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Fuerza de la pregunta retórica 'οὐκ ἔδει'
  english_pob_reading: And ought not ... ?
  chosen_spanish_reading: ¿Y no era necesario... ?
  alternative_spanish_readings:
  - ¿Y no debía... ?
  - ¿Acaso no convenía... ?
  rationale: La pregunta expresa necesidad/propriedad moral, no solo obligación externa. 'No era necesario' conserva la lógica retórica y el tono argumentativo de Jesús.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La redacción sigue el audit trail inglés, pero evita el intrusivo 'mira/look' que fue descartado en la revisión inglesa reciente. También preserva la tensión léxica atar/soltar de λύω y δεσμός, sin diluirla en un lenguaje demasiado abstracto.
  spanish_consistency_notes:
  - Se mantiene 'Satanás' de forma consistente como nombre propio/título transliterado.
  - '''Hija de Abraham'' se conserva como fórmula cargada teológicamente, no como simple descripción biológica.'
  - '''Día de sábado'' refleja el sintagma griego sin sustituirlo por una equivalencia eclesiástica más tradicional.'
  - '''Ató/soltada/lazo'' preserva el campo semántico de binding-and-loosing presente en el texto griego.'
