    reason: lexical_alternative
  revision_rationale: Se ajustó la redacción para mejorar la naturalidad del español y reflejar mejor el campo léxico del griego. 'Desatada ... atadura' preserva con más claridad la relación entre δέω, λύω y δεσμός que 'soltada ... lazo'. 'En el día de sábado' mantiene el elemento explícito 'día' presente en griego sin caer en un giro demasiado extraño. Se eliminaron notas redundantes para que las notas restantes correspondan mejor a los anclajes del texto.
