translation:
  language: es
  text: Estaba enseñando en una de las sinagogas un sábado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en los sábados'; el griego usa una forma plural que con frecuencia funciona idiomáticamente para referirse al sábado en singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦν δὲ
  english_pob_choice: Now he was
  chosen_spanish: Y estaba
  alternatives_spanish:
  - Ahora estaba
  - Y estaba
  lexicon: BDAG
  rationale: El imperfecto perifrático expresa acción continua en pasado; en español, 'estaba' comunica bien ese aspecto. 'δὲ' funciona aquí como transición narrativa suave, mejor reflejada por 'Y' que por un adversativo fuerte.
- source_word: διδάσκων
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - instruyendo
  - dando enseñanza
  lexicon: BDAG
  rationale: El participio presente conserva la idea de acción en curso. 'Enseñando' es natural y fiel para διδάσκω en relato evangélico.
- source_word: ἐν μιᾷ τῶν συναγωγῶν
  english_pob_choice: in one of the synagogues
  chosen_spanish: en una de las sinagogas
  alternatives_spanish:
  - en uno de los lugares de reunión
  - en una de las congregaciones
  lexicon: BDAG
  rationale: Se mantiene 'sinagogas' por tratarse de una institución y un contexto judío específicos. La expresión partitva 'μίαν τῶν' se refleja con 'una de'.
- source_word: ἐν τοῖς σάββασιν
  english_pob_choice: on the Sabbath
  chosen_spanish: en el día de reposo
  alternatives_spanish:
  - en el sábado
  - en los sábados
  lexicon: BDAG
  rationale: Aunque el griego es plural, en koiné suele funcionar idiomáticamente para una referencia singular al Sabbath. En español, 'día de reposo' evita ambigüedad y conserva el sentido institucional del término; 'en los sábados' queda como alternativa literal menos natural.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal junto al término correspondiente.
  spanish_consistency_notes:
