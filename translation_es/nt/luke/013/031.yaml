translation:
  language: es
  text: 'En esa misma hora, algunos fariseos se acercaron y le dijeron[a]: «Sal y vete de aquí[b], porque Herodes quiere matarte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En esa misma hora».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Sal y aléjate de aquí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν αὐτῇ τῇ ὥρᾳ
  english_pob_choice: At that very hour
  chosen_spanish: En esa misma hora
  alternatives_spanish:
  - En aquella misma hora
  - En ese mismo momento
  - A esa misma hora
  lexicon: BDAG
  rationale: La expresión griega es idiomática y enfatiza la inmediatez/singularidad del momento. «En esa misma hora» conserva bien el valor enfático de αὐτῇ con un español natural y digno; «esa misma» mantiene cercanía narrativa sin sonar arcaico.
- source_word: προσῆλθάν
  english_pob_choice: came up
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron
  - llegaron
  - se aproximaron
  lexicon: BDAG
  rationale: προσέρχομαι significa acercarse o ir hacia alguien. «Se acercaron» preserva el matiz espacial de aproximación a Jesús mejor que un simple «vinieron».
- source_word: τινες Φαρισαῖοι
  english_pob_choice: some Pharisees
  chosen_spanish: algunos fariseos
  alternatives_spanish:
  - ciertos fariseos
  - unos fariseos
  lexicon: BDAG
  rationale: τινες es indefinido. «Algunos fariseos» es la equivalencia más natural y clara en español, sin añadir una especificación que el texto no da.
- source_word: λέγοντες αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - diciéndole
  - hablaron con él
  - le hablaron
  lexicon: BDAG
  rationale: El participio se integra naturalmente como verbo finito en español. «Le dijeron» reproduce la función discursiva sin sobrecargar la frase.
- source_word: Ἔξελθε
  english_pob_choice: Leave
  chosen_spanish: Sal
  alternatives_spanish:
  - Vete
  - Sal de aquí
  - Anda fuera
  lexicon: BDAG
  rationale: El imperativo aoristo de ἐξέρχομαι pide una orden de salida. «Sal» es breve y directo; en combinación con la siguiente cláusula permite conservar la fuerza imperativa sin añadir rusticidad.
- source_word: καὶ πορεύου
  english_pob_choice: and go away
  chosen_spanish: y vete
  alternatives_spanish:
  - y anda
  - y parte
  - y sigue tu camino
  lexicon: BDAG
  rationale: πορεύομαι aquí expresa irse/proseguir. «Vete» transmite con naturalidad la idea de apartarse de ese lugar; evita una redundancia pesada con «Sal» y mantiene el tono de advertencia.
- source_word: ἐντεῦθεν
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - de este lugar
  - de acá
  lexicon: BDAG
  rationale: El adverbio indica salida desde el lugar presente. «De aquí» es la formulación más idiomática en español y se ajusta bien al ritmo de la orden.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque es que
  lexicon: BDAG
  rationale: Introduce la razón de la advertencia. «Porque» es la equivalencia directa y más transparente en español.
- source_word: Ἡρῴδης
  english_pob_choice: Herod
  chosen_spanish: Herodes
  alternatives_spanish:
  - Herodes el tetrarca
  lexicon: BDAG
  rationale: Nombre propio estándar en español. No se agrega título porque el texto griego no lo da aquí.
- source_word: θέλει
  english_pob_choice: wants
  chosen_spanish: quiere
  alternatives_spanish:
  - desea
  - pretende
  - tiene la intención de
  lexicon: BDAG
  rationale: θέλω expresa voluntad/deseo. «Quiere» es la opción más simple y fiel al núcleo semántico, sin intensificar a una intención explícita.
- source_word: ἀποκτεῖναι
  english_pob_choice: to kill
  chosen_spanish: matarte
  alternatives_spanish:
  - quitarte la vida
  - hacerte morir
  - darte muerte
  lexicon: BDAG
  rationale: El infinitivo significa matar. En segunda persona directa, «matarte» es natural, claro y suficientemente fuerte para conservar el aviso.
theological_decisions:
- issue: La intención de los fariseos al advertir a Jesús
  english_pob_reading: Render the statement straightforwardly as a warning without implying whether the Pharisees were sincere, deceptive, or allied with Herod.
  chosen_spanish_reading: Presentar la frase como una advertencia directa sin insinuar si los fariseos actuaban con sinceridad, con mala intención o en alianza con Herodes.
  alternative_spanish_readings:
  - Los fariseos lo advertían sinceramente
  - Los fariseos intentaban intimidarlo
  rationale: El griego reporta el contenido del habla, pero no explicita el motivo. La traducción española conserva esa apertura narrativa y no resuelve una tensión que el texto no resuelve.
  doctrine_reference: Preservar la tensión interpretativa sin añadir juicio narrativo.
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente con acuerdo alto y sin cambios requeridos; la presente redacción mantiene ese consenso y traslada al español la misma lectura sobria del griego, con atención a la inmediatez temporal, el matiz de acercamiento y la advertencia sin interpretación añadida.
  spanish_consistency_notes:
  - Se mantiene «Herodes» como transliteración estándar del nombre propio.
  - Se usa «fariseos» en minúscula conforme al uso común en español bíblico.
  - Se evita «SEÑOR» u otra sustitución teológica no presente en el versículo.
  - La orden se expresa con dos imperativos breves («Sal y vete») para reflejar la acumulación griega Ἔξελθε καὶ πορεύου.
