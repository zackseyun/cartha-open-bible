translation:
  language: es
  text: Y recorría ciudades y aldeas, enseñando y siguiendo su camino hacia[a] Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Jerusalén».
    reason: lexical_alternative
lexical_decisions:
- source_word: διεπορεύετο
  english_pob_choice: was traveling through
  chosen_spanish: recorría
  alternatives_spanish:
  - iba recorriendo
  - viajaba por
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua; «recorría» conserva el curso prolongado sin volver la frase pesada en español.
- source_word: κατὰ πόλεις καὶ κώμας
  english_pob_choice: through towns and villages
  chosen_spanish: ciudades y aldeas
  alternatives_spanish:
  - pueblos y aldeas
  - ciudades y pueblos
  lexicon: BDAG
  rationale: «κατὰ» con acusativo marca desplazamiento por diversas localidades; «ciudades y aldeas» mantiene la distinción entre asentamientos mayores y menores en un español natural.
- source_word: διδάσκων
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - mientras enseñaba
  lexicon: BDAG
  rationale: El participio presente acompaña la acción del viaje; «enseñando» conserva el valor simultáneo sin añadir explicaciones.
- source_word: πορείαν ποιούμενος
  english_pob_choice: making his way
  chosen_spanish: haciendo camino
  alternatives_spanish:
  - yendo de camino
  - viajando
  lexicon: BDAG
  rationale: La expresión idiomática griega señala avance intencional. «Haciendo camino» reproduce esa idea de desplazamiento deliberado mejor que una traducción demasiado literal.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: toward Jerusalem
  chosen_spanish: hacia Jerusalén
  alternatives_spanish:
  - a Jerusalén
  lexicon: BDAG
  rationale: En este contexto narrativo de viaje, εἰς puede indicar dirección hacia el destino. «Hacia Jerusalén» preserva el matiz de movimiento en curso que destaca la POB inglesa.
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - la ciudad de Jerusalén
  lexicon: BDAG
  rationale: Nombre propio bíblico estándar en español; se mantiene la forma tradicional y clara.
theological_decisions:
- issue: Dirección narrativa del viaje de Jesús a Jerusalén
  english_pob_reading: toward Jerusalem
  chosen_spanish_reading: hacia Jerusalén
  alternative_spanish_readings:
  - a Jerusalén
  rationale: La frase subraya que Jesús aún avanza dentro del relato de viaje lucano, no necesariamente que ya haya llegado. Es una decisión de traducción narrativa, no doctrinal.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada; la traducción ahora no incluye marcadores de nota.
  spanish_consistency_notes:
  - Se prefirió un español contemporáneo y digno, evitando calcos innecesarios.
  - Se mantuvo la distinción entre el movimiento continuo del imperfecto y la acción simultánea del participio.
  - No se usó «SEÑOR» ni terminología eclesiástica añadida, porque el versículo no contiene el nombre divino ni vocabulario doctrinal debatido.
