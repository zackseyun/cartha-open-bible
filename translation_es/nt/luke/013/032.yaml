translation:
  language: es
  text: 'Y les dijo: «Vayan y díganle a ese zorro[a]: “Miren, expulso demonios y hago curaciones hoy y mañana, y al tercer día soy perfeccionado[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esa zorra». El griego dice literalmente «fox»; aquí se traduce «zorro» para conservar la metáfora sin añadir connotaciones impropias del español contemporáneo.
    reason: lexical_alternative
  - marker: b
    text: O «llego a mi meta», «soy llevado a cumplimiento» o «termino mi carrera». El griego puede denotar ser llevado a completitud, probablemente refiriéndose a la culminación de la misión asignada de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλώπεκι
  english_pob_choice: fox
  chosen_spanish: zorra
  alternatives_spanish:
  - zorro
  lexicon: BDAG
  rationale: El griego usa el sustantivo literal ‘fox’ con tono despectivo. En español, ‘zorra’ conserva mejor el matiz insultante que ‘zorro’, aunque el femenino no coincida con Herodes por el género gramatical del español. Se evita suavizar la metáfora.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: BDAG
  rationale: Como marcador discursivo, introduce lo que sigue. ‘Mira’ preserva la fuerza deíctica en un español natural y solemne sin caer en arcaísmo.
- source_word: ἐκβάλλω δαιμόνια
  english_pob_choice: I cast out demons
  chosen_spanish: expulso demonios
  alternatives_spanish:
  - echo fuera demonios
  - arrojo demonios
  lexicon: BDAG
  rationale: ‘Expulsar’ reproduce bien el valor de ἐκβάλλω en contextos de exorcismo y suena natural en español bíblico contemporáneo. ‘Demonios’ mantiene el referente espiritual del término griego.
- source_word: ἰάσεις ἀποτελῶ
  english_pob_choice: perform healings
  chosen_spanish: realizo sanidades
  alternatives_spanish:
  - hago sanidades
  - efectúo sanidades
  lexicon: BDAG
  rationale: El griego distingue ‘sanidades’ como objeto y ἀποτελῶ como verbo de llevar a cabo. ‘Realizo sanidades’ conserva esa distinción y resulta más fluido que una traducción excesivamente literal como ‘cumplo sanidades’.
- source_word: σήμερον καὶ αὔριον
  english_pob_choice: today and tomorrow
  chosen_spanish: hoy y mañana
  alternatives_spanish:
  - para hoy y mañana
  - hoy y al día siguiente
  lexicon: BDAG
  rationale: La pareja temporal se traduce de modo directo, preservando tanto la literalidad como la posible idea idiomática de un período breve y determinado.
- source_word: τῇ τρίτῃ
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - para el tercer día
  lexicon: BDAG
  rationale: El dativo temporal con ordinal en español se expresa naturalmente como ‘al tercer día’. Mantiene el valor temporal sin sobreinterpretar el alcance cronológico.
- source_word: τελειοῦμαι
  english_pob_choice: I am perfected
  chosen_spanish: soy perfeccionado
  alternatives_spanish:
  - llego a mi plenitud
  - soy llevado a cumplimiento
  - soy completado
  lexicon: BDAG
  rationale: La forma pasiva presente de τελειόω admite ‘ser perfeccionado’ o ‘ser llevado a cumplimiento’. Se conserva la pasividad y la ambigüedad teológica del texto, evitando explicar de más si se trata de culminación de misión, consumación o glorificación.
theological_decisions:
- issue: Sentido de τελειοῦμαι y la culminación de la misión de Jesús
  english_pob_reading: I am perfected, with the note that the Greek can denote being brought to completion and likely refers to the completion of Jesus's appointed mission.
  chosen_spanish_reading: «soy perfeccionado» para mantener la pasividad y la tensión entre perfección, cumplimiento y culminación de la misión.
  alternative_spanish_readings:
  - llego a mi meta
  - soy llevado a cumplimiento
  - mi obra queda cumplida
  rationale: El griego no obliga a especificar resurrección, glorificación ni una sola categoría doctrinal. La redacción española conserva la tensión documentada por la POB inglesa, en vez de resolverla hacia una paráfrasis más explícita.
  doctrine_reference: Preservar la tensión teológica en lugar de cerrarla interpretativamente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió ‘perform healings’ y ‘I am perfected’, por lo que el español opta por una formulación natural pero mantiene la distinción entre ‘expulso demonios’ y ‘realizo sanidades’, además de conservar la pasiva de τελειοῦμαι.
  spanish_consistency_notes:
  - Se mantiene ‘demonios’ para δαιμόνια, conforme al uso estándar en el evangelio.
  - Se evita ‘Cristo’ o terminología eclesiástica no presente en el versículo.
  - ‘Y les dijo’ conserva el sujeto explícito del griego y funciona bien en español narrativo.
  - La nota al pie se limita a la alternativa léxica ya documentada; no introduce lecturas nuevas.
