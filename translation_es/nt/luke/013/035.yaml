source:
  edition: SBLGNT
  text: ἰδοὺ ἀφίεται ὑμῖν ὁ οἶκος ⸀ὑμῶν. λέγω ⸀δὲ ⸀ὑμῖν, οὐ μὴ ⸂ἴδητέ με⸃ ἕως ⸂ἥξει ὅτε⸃ εἴπητε· Εὐλογημένος ὁ ἐρχόμενος ἐν ὀνόματι κυρίου.
base_translation:
  language: en
  yaml_path: translation/nt/luke/013/035.yaml
  text: Look[a], your house is left to you. And I tell you, you will certainly not see me until the time comes when you say[d][c][b], ‘Blessed is the one who comes in the name of the Lord.’
  footnotes:
  - marker: a
    text: Or 'is abandoned' or 'is forsaken.' The Greek passive can carry a judicial sense of being given over.
    reason: lexical_alternative
  - marker: b
    text: '''Your house'' likely refers to Jerusalem, especially its temple, but the Greek says simply ''your house.'''
    reason: alternative_reading
  - marker: c
    text: The saying 'Blessed is the one who comes in the name of the Lord' echoes Psalm 118:26.
    reason: cross_reference
  - marker: d
    text: Some interpreters understand this as pointing to Jesus' triumphal entry; others to a future acknowledgment of him. The Greek itself does not require one specific timing.
    reason: alternative_reading
