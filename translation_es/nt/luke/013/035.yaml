  glossary_alignment: No hay conflicto serio con la terminología del proyecto. «Señor» para κύριος en la cita de Salmo 118:26 es aceptable por tratarse de fórmula citacional reconocible. Se mantiene correctamente «vuestra casa» en vez de interpretar «templo» o «Jerusalén».
