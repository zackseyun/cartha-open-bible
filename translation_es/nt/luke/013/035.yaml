translation:
  language: es
  text: 'He aquí[a], vuestra casa os es dejada. Y os digo que no me veréis de ningún modo hasta que llegue el tiempo en que digáis[d][c][b]: «Bendito el que viene en el nombre del Señor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es abandonada» o «es dejada de lado». El pasivo griego puede tener un sentido judicial de quedar entregada.
    reason: lexical_alternative
  - marker: b
    text: «Vuestra casa» probablemente se refiere a Jerusalén, especialmente a su templo, pero el griego dice simplemente «vuestra casa».
    reason: alternative_reading
  - marker: c
    text: La frase «Bendito el que viene en el nombre del Señor» evoca el Salmo 118:26.
    reason: cross_reference
  - marker: d
    text: Algunos intérpretes entienden esto como una referencia a la entrada triunfal de Jesús; otros, a un reconocimiento futuro de él. El griego mismo no exige un solo momento preciso.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - He aquí
  lexicon: BDAG
  rationale: La partícula introduce una declaración solemne y llama la atención del oyente. «Mira» conserva la fuerza deíctica de manera natural en español moderno; «He aquí» sería más tradicional pero menos natural. «Miren» podría sonar más plural o exhortativo de lo que exige el contexto.
- source_word: ἀφίεται
  english_pob_choice: is left
  chosen_spanish: se os deja
  alternatives_spanish:
  - se os abandona
  - se os desampara
  lexicon: BDAG
  rationale: El pasivo presente comunica una entrega o abandono judicial del lugar/casa. «Se os deja» mantiene el pasivo y deja abierta la tensión entre “dejar” y “abandonar” sin forzar una interpretación más intensa en el texto principal.
- source_word: ὁ οἶκος ὑμῶν
  english_pob_choice: your house
  chosen_spanish: vuestra casa
  alternatives_spanish:
  - vuestro hogar
  - vuestro templo
  - vuestra casa desolada
  lexicon: BDAG
  rationale: La fuente griega dice literalmente «vuestra casa». En el contexto puede aludir corporativamente a Jerusalén y su templo, pero el texto no especifica eso; por fidelidad se conserva la expresión amplia. «Casa» reproduce el término sin importar una identificación interpretativa.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: os
  alternatives_spanish:
  - para vosotros
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa con clítico natural en español. «Os» mantiene la relación directa sin añadir palabras innecesarias.
- source_word: λέγω δὲ ὑμῖν
  english_pob_choice: And I tell you
  chosen_spanish: Y os digo
  alternatives_spanish:
  - Pero os digo
  - Y yo os digo
  lexicon: BDAG
  rationale: Se sigue la revisión inglesa que tomó δέ de modo más neutral. «Y os digo» conserva la transición discursiva sin cargar el contraste como haría «pero».
- source_word: οὐ μὴ ἴδητέ με
  english_pob_choice: you will certainly not see me
  chosen_spanish: no me veréis de ningún modo
  alternatives_spanish:
  - ciertamente no me veréis
  - de ninguna manera me veréis
  lexicon: BDAG
  rationale: La construcción οὐ μή con subjuntivo aoristo expresa negación enfática de futuro. «De ningún modo» comunica esa fuerza con naturalidad en español y evita la sequedad de una traducción demasiado literal.
- source_word: ἕως ἥξει ὅτε
  english_pob_choice: until the time comes when
  chosen_spanish: hasta que llegue el tiempo en que
  alternatives_spanish:
  - hasta que venga el momento en que
  - hasta el tiempo en que
  lexicon: BDAG
  rationale: La combinación temporal es idiomáticamente difícil. «Hasta que llegue el tiempo en que» preserva la secuencia temporal y la naturaliza en español, sin resolver el sentido hacia una ocasión concreta.
- source_word: εἴπητε
  english_pob_choice: you say
  chosen_spanish: digáis
  alternatives_spanish:
  - diréis
  - ustedes digan
  lexicon: BDAG
  rationale: 'Tras la construcción temporal, el subjuntivo español es lo más natural: «en que digáis». Mantiene el matiz de evento futuro sin cambiar el contenido.'
- source_word: Εὐλογημένος
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Bienaventurado
  - Alabado
  lexicon: BDAG
  rationale: En una fórmula de alabanza bíblica citacional, «Bendito» reproduce bien el valor litúrgico y scriptural. «Bienaventurado» es posible, pero en este contexto suena más a rasgo de estado personal que a aclamación.
- source_word: ὁ ἐρχόμενος
  english_pob_choice: the one who comes
  chosen_spanish: el que viene
  alternatives_spanish:
  - el que llega
  - el venidero
  lexicon: BDAG
  rationale: El participio sustantivado se expresa de forma natural con «el que viene». Es breve, bíblico y no añade una titulación más fuerte que la del texto.
- source_word: ἐν ὀνόματι κυρίου
  english_pob_choice: in the name of the Lord
  chosen_spanish: en el nombre del Señor
  alternatives_spanish:
  - en nombre del Señor
  - en el nombre del Señor Yahvé
  lexicon: BDAG
  rationale: Se conserva la fórmula bíblica reconocible. Aunque κύριος normalmente se traduce «Señor» en esta frase citacional, no se fuerza aquí una equivalencia explícita con el nombre divino porque el eco de Salmo 118:26 funciona como fórmula estable en el español eclesial.
theological_decisions:
- issue: Referente de «vuestra casa»
  english_pob_reading: Kept as 'your house' in the main text without specifying the temple or Jerusalem
  chosen_spanish_reading: Se mantiene «vuestra casa» sin especificar templo ni Jerusalén en el texto principal
  alternative_spanish_readings:
  - vuestro templo
  - Jerusalén
  - la nación de Israel
  rationale: La formulación griega es amplia y, aunque el contexto apunta fuertemente a Jerusalén y su templo, la traducción no debe cerrar una identificación que el original no explicita. Por eso se deja la ambigüedad en el texto principal y se puede aclarar en nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Alcance del dicho final sobre «el que viene»
  english_pob_reading: Rendered as a future condition without specifying whether this is repentance by Jerusalem, the triumphal entry, or eschatological recognition
  chosen_spanish_reading: Se traduce como condición futura sin decidir si apunta a la entrada triunfal, a un reconocimiento futuro o a una confesión escatológica
  alternative_spanish_readings:
  - referencia a la entrada triunfal
  - referencia a un arrepentimiento futuro de Jerusalén/Israel
  - referencia a un reconocimiento escatológico al regreso de Jesús
  rationale: La redacción griega permite más de un horizonte interpretativo. Para no resolver artificialmente la tensión teológica, la traducción mantiene la frase abierta y no codifica una cronología específica en el texto principal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se adoptó la transición neutral de δέ con «Y os digo» en lugar de una oposición fuerte; se preservó la negación enfática de οὐ μή con una fórmula idiomática en español; y se mantuvo la apertura interpretativa sobre el referente de «vuestra casa» y el momento de la confesión final.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en la fórmula citacional, conforme al uso bíblico estable del eco de Salmo 118:26.
  - Se mantiene el tratamiento de segunda persona plural en todo el versículo para coherencia con ὑμῖν/ὑμῶν/μe.
  - «Mira» funciona como equivalente breve y solemne de ἰδοὺ sin arcaísmo excesivo.
  - La puntuación con comillas angulares en la cita final sigue la convención española y distingue claramente la fórmula citada.
