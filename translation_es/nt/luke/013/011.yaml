translation:
  language: es
  text: Y he aquí[a] una mujer que tenía un espíritu de infirmidad[b] desde hacía dieciocho años; y estaba encorvada y no podía enderezarse por completo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'he ahí'. La expresión griega es una llamada de atención narrativa; 'he aquí' conserva un registro bíblico claro en español.
    reason: lexical_alternative
  - marker: b
    text: O 'un espíritu de debilidad'. El griego menciona explícitamente 'espíritu' y luego un término amplio para debilidad o infirmidad; la traducción conserva esa referencia sin precisar más de lo que dice el texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold / look
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - mira
  lexicon: BDAG
  rationale: Preserva el valor de llamada de atención narrativa del griego sin volver la frase demasiado coloquial ni arcaica; 'he aquí' es claro y natural en español bíblico contemporáneo.
- source_word: γυνὴ
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - la mujer
  - una señora
  lexicon: BDAG
  rationale: El contexto introduce a una persona femenina no identificada previamente; 'una mujer' reproduce bien la indefinición del original.
- source_word: πνεῦμα ἔχουσα ἀσθενείας
  english_pob_choice: who had a spirit of infirmity
  chosen_spanish: que tenía un espíritu de enfermedad
  alternatives_spanish:
  - que tenía un espíritu de debilidad
  - que tenía un espíritu de infirmidad
  - que tenía un espíritu de aflicción
  lexicon: BDAG
  rationale: Se mantiene explícitamente πνεῦμα como 'espíritu', siguiendo el texto griego y la elección auditada de la POB inglesa de no reducir la expresión a una mera descripción médica. 'Enfermedad' comunica el matiz de ἀσθενείας sin imponer una identificación más específica que la del texto.
- source_word: ἀσθενείας
  english_pob_choice: weakness / infirmity
  chosen_spanish: enfermedad
  alternatives_spanish:
  - debilidad
  - infirmidad
  - aflicción
  lexicon: BDAG
  rationale: En español, 'enfermedad' resulta más natural que 'debilidad' para una condición persistente de incapacidad física, pero sigue siendo suficientemente amplia para no cerrar el sentido del término griego.
- source_word: ἔτη δεκαοκτώ
  english_pob_choice: for eighteen years
  chosen_spanish: desde hacía dieciocho años
  alternatives_spanish:
  - por dieciocho años
  - durante dieciocho años
  lexicon: BDAG
  rationale: '''Desde hacía'' expresa duración pasada con naturalidad en español y conserva el valor aspectual de una condición prolongada.'
- source_word: συγκύπτουσα
  english_pob_choice: bent over
  chosen_spanish: encorvada
  alternatives_spanish:
  - doblada
  - jiba/jorobada
  - inclinada
  lexicon: BDAG
  rationale: '''Encorvada'' comunica bien la postura física descrita por el participio y evita la rigidez de un calco literal.'
- source_word: μὴ δυναμένη ἀνακύψαι
  english_pob_choice: unable to straighten up
  chosen_spanish: no podía enderezarse
  alternatives_spanish:
  - no podía incorporarse
  - no podía levantarse recta
  - no podía alzarse
  lexicon: BDAG
  rationale: '''Enderezarse'' reproduce el sentido corporal del infinitivo sin forzar una imagen demasiado técnica; el negativo mantiene la imposibilidad expresa en el griego.'
- source_word: εἰς τὸ παντελές
  english_pob_choice: completely
  chosen_spanish: por completo
  alternatives_spanish:
  - completamente
  - del todo
  - del todo y por entero
  lexicon: BDAG
  rationale: '''Por completo'' conserva la intensificación total del griego con un cierre idiomático natural en español.'
theological_decisions:
- issue: Si πνεῦμα ἀσθενείας debe expresarse de manera que preserve la referencia a un espíritu sin resolver la naturaleza exacta de la aflicción
  english_pob_reading: Retain explicit reference to 'a spirit of weakness/infirmity' and avoid narrowing the condition to a merely medical description
  chosen_spanish_reading: Mantener 'un espíritu de enfermedad' para conservar la mención explícita de 'espíritu' y no reducir la afección a un diagnóstico puramente médico
  alternative_spanish_readings:
  - '''un espíritu de debilidad'''
  - '''una enfermedad'''
  - '''un espíritu que la enfermaba'''
  rationale: El griego nombra explícitamente un πνεῦμα; por eso la traducción debe preservar esa tensión y no resolverla anticipadamente. 'Espíritu de enfermedad' deja abierta la cuestión de agencia espiritual sin afirmar más de lo que el versículo dice.
  doctrine_reference: Preservar la tensión teológica sin diluir el lenguaje del texto fuente.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'look' a 'behold' y de 'weakness' a 'infirmity' para mayor precisión y registro. La presente versión española sigue esa intención de mantener un tono bíblico formal sin perder naturalidad, pero adapta 'infirmity' a 'enfermedad' por ser la opción más idiomática y comprensible en español, a la vez que conserva la referencia explícita a 'espíritu'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como término base del proyecto cuando corresponda; aquí no aparece.
  - Se mantuvo 'espíritu' explícito para reflejar πνεῦμα y la decisión auditada de no medicalizar el texto.
  - La puntuación y el orden de las cláusulas siguen de cerca la sintaxis griega, con ajustes naturales para el español.
  - '''He aquí'' se eligió por su equilibrio entre solemnidad y claridad en registro bíblico.'
