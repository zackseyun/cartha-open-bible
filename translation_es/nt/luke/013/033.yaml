translation:
  language: es
  text: Sin embargo[a], debo seguir mi camino hoy, mañana y al día siguiente[b], porque no es posible que un profeta perezca fuera de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No obstante». πλὴν puede marcar contraste fuerte o limitación.
    reason: lexical_alternative
  - marker: b
    text: La expresión «hoy, mañana y al día siguiente» puede funcionar como un giro idiomático para un tramo breve y fijo, más que como una enumeración literal de tres días calendario.
    reason: cultural_note
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  - Con todo
  lexicon: BDAG
  rationale: Expresa bien la fuerza adversativa/limitativa de πλὴν en un español natural y digno, conservando la transición fuerte respecto del contexto previo.
- source_word: δεῖ με
  english_pob_choice: I must
  chosen_spanish: debo
  alternatives_spanish:
  - tengo que
  - es necesario que yo
  lexicon: BDAG
  rationale: En español, «debo» comunica necesidad obligatoria de forma concisa y natural; mantiene la fuerza impersonal de δεῖ sin sobreexplicar.
- source_word: σήμερον καὶ αὔριον καὶ τῇ ἐχομένῃ
  english_pob_choice: today and tomorrow and the next day
  chosen_spanish: hoy, mañana y al día siguiente
  alternatives_spanish:
  - hoy, mañana y pasado mañana
  - hoy y mañana y el día siguiente
  lexicon: BDAG
  rationale: La secuencia temporal se vierte de modo claro y fluido en español. «Al día siguiente» conserva la progresión de tres momentos inmediatos sin fijar indebidamente un calendario literal si el giro es idiomático.
- source_word: πορεύεσθαι
  english_pob_choice: go on my way
  chosen_spanish: seguir mi camino
  alternatives_spanish:
  - ir
  - continuar
  - viajar
  lexicon: BDAG
  rationale: «Seguir mi camino» expresa el desplazamiento continuo implícito en πορεύεσθαι y suena más natural que un simple «ir» en este contexto.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Introduce de manera directa la razón de la obligación, con un conector causal claro en español.
- source_word: οὐκ ἐνδέχεται
  english_pob_choice: it is not possible
  chosen_spanish: no es posible
  alternatives_spanish:
  - no puede ser
  - es impensable
  - no cabe
  lexicon: BDAG
  rationale: «No es posible» preserva la fuerza de imposibilidad/incongruencia de ἐνδέχεται sin convertirla por adelantado en ironía o en una formulación más interpretativa.
- source_word: προφήτην
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - el profeta
  lexicon: BDAG
  rationale: El sustantivo sin artículo se entiende de manera genérica; «un profeta» mantiene el carácter proverbial de la afirmación.
- source_word: ἀπολέσθαι
  english_pob_choice: to perish
  chosen_spanish: perezca
  alternatives_spanish:
  - muera
  - sea destruido
  - perezca
  lexicon: BDAG
  rationale: «Perezca» conserva el campo semántico amplio de ἀπόλλυμι y la solemnidad del verbo, dejando abierta la tensión entre morir y ser destruido que el contexto evoca.
- source_word: ἔξω Ἰερουσαλήμ
  english_pob_choice: outside Jerusalem
  chosen_spanish: fuera de Jerusalén
  alternatives_spanish:
  - afuera de Jerusalén
  - más allá de Jerusalén
  lexicon: BDAG
  rationale: Es la equivalencia espacial más directa y natural en español.
theological_decisions:
- issue: Fuerza de la afirmación sobre la muerte de un profeta fuera de Jerusalén
  english_pob_reading: Rendered as a statement of impossibility/incongruity without making it an absolute metaphysical claim.
  chosen_spanish_reading: La frase se traduce como afirmación de imposibilidad o incongruencia, sin resolverla como una ley absoluta ni convertirla de antemano en ironía plena.
  alternative_spanish_readings:
  - «porque un profeta no puede perecer fuera de Jerusalén»
  - «porque es impensable que un profeta perezca fuera de Jerusalén»
  rationale: El griego οὐκ ἐνδέχεται admite el matiz de imposibilidad, impropiedad o incongruencia. La traducción conserva esa tensión para que el lector perciba la fuerza retórica del dicho sin cerrarlo artificialmente.
  doctrine_reference: Preservar la tensión teológica y retórica del texto; no resolverla en exceso.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés de POB y no se introdujeron revisiones locales adicionales; la versión española conserva la tensión léxica de πλὴν y οὐκ ἐνδέχεται, y mantiene la posible idiomaticidad de la secuencia temporal.
  spanish_consistency_notes:
  - Se usó «Jerusalén» sin artículo, conforme al uso normal en español bíblico.
  - Se evitó «SEÑOR» y otros términos no pertinentes porque el versículo no contiene el nombre divino ni κύριος en esta forma.
  - «Profeta» se dejó en singular genérico para respetar el valor proverbial del griego.
