translation:
  language: es
  text: Y he aquí,[a] hay últimos que serán primeros, y hay primeros que serán últimos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «Y he aquí, hay últimos que serán primeros, y hay primeros que serán últimos»; también puede expresarse «Y mira, hay últimos que serán primeros, y hay primeros que serán últimos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἰδοὺ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y he aquí, pues
  lexicon: BDAG
  rationale: ἰδοὺ introduce atención solemne al dicho. En español, «he aquí» conserva ese valor marcativo con dignidad y sin sonar tan coloquial como «mira».
- source_word: εἰσὶν
  english_pob_choice: there are
  chosen_spanish: hay
  alternatives_spanish:
  - hay algunos
  - existen
  lexicon: BDAG
  rationale: El griego expresa una afirmación existencial. «Hay» reproduce de manera natural el sentido y evita añadir un sujeto implícito que el griego no explicita.
- source_word: ἔσχατοι
  english_pob_choice: last
  chosen_spanish: últimos
  alternatives_spanish:
  - postreros
  - los de atrás
  lexicon: BDAG
  rationale: «Últimos» preserva la antítesis concisa con «primeros» y puede abarcar rango, posición o estatus, como en el dicho griego.
- source_word: πρῶτοι
  english_pob_choice: first
  chosen_spanish: primeros
  alternatives_spanish:
  - los primeros
  - principales
  lexicon: BDAG
  rationale: «Primeros» es el correlato natural de «últimos» y mantiene el paralelismo proverbial del texto.
- source_word: οἳ ἔσονται
  english_pob_choice: who will be
  chosen_spanish: que serán
  alternatives_spanish:
  - que llegarán a ser
  - los que serán
  lexicon: BDAG
  rationale: La cláusula relativa con futuro se vierte directamente con «que serán», una forma clara y fiel que conserva la predicación futura sin sobreinterpretar el proceso.
theological_decisions:
- issue: Sentido general del reverso de estatus
  english_pob_reading: Render as a general statement about reversal of status without specifying ethnic, social, or eschatological categories in the translation itself.
  chosen_spanish_reading: Presentar el dicho como una afirmación general de inversión de lugar o rango, sin precisar dentro del texto una aplicación étnica, social o escatológica.
  alternative_spanish_readings:
  - Una referencia explícita a judíos y gentiles
  - Una referencia explícita a humildad y orgullo
  - Una referencia explícita al juicio final
  rationale: El griego formula el principio de manera breve y general; el español debe conservar esa amplitud y no cerrar la tensión interpretativa que el contexto puede desarrollar en varios niveles.
  doctrine_reference: Preservar la amplitud teológica del dicho sin resolverla en una sola lectura contextual.
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del POB en inglés, que eliminó cualquier añadido como «some who are» y prefirió una formulación más cercana al griego. En español se conserva esa cercanía con una estructura existencial simple («hay...») y se evita introducir sujetos no expresados.
  spanish_consistency_notes:
  - Se mantiene «he aquí» como equivalente solemne de ἰδοὺ, coherente con el registro bíblico del proyecto.
  - Se usa «últimos»/«primeros» para conservar la simetría proverbial y evitar sustituciones interpretativas como «los menos importantes».
  - No se emplea «Cristo», «SEÑOR» ni terminología teológica ajena al versículo; el texto queda estrictamente ceñido al dicho de reversión.
  - La puntuación reproduce el paralelismo del griego con dos miembros coordinados simétricos.
