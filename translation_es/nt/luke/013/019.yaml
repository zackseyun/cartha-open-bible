translation:
  language: es
  text: Es como un grano de mostaza, que un hombre tomó y echó en su huerto, y creció y llegó a ser un árbol[b], y las aves del cielo[a] anidaron en sus ramas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las aves de los cielos»; tradicionalmente, «las aves del aire».
    reason: lexical_alternative
  - marker: b
    text: El griego dice «llegó a ser un árbol», conservando la imagen ampliada del crecimiento de la parábola.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοία ἐστὶν
  english_pob_choice: It is like
  chosen_spanish: Es semejante a
  alternatives_spanish:
  - Es como
  - Se parece a
  lexicon: BDAG
  rationale: La fórmula de comparación se expresa de manera natural en español con «es semejante a», manteniendo el valor de símil sin volverla rígida ni demasiado coloquial.
- source_word: κόκκῳ σινάπεως
  english_pob_choice: a mustard seed
  chosen_spanish: un grano de mostaza
  alternatives_spanish:
  - una semilla de mostaza
  - un grano de mostaza
  lexicon: BDAG
  rationale: «κόκκος» puede ser «grano» o «semilla». Dado que el español dice con naturalidad «grano de mostaza», esta opción conserva la imagen idiomática y el tamaño diminuto del objeto.
- source_word: ὃν λαβὼν ἄνθρωπος
  english_pob_choice: which a man took
  chosen_spanish: que un hombre tomó
  alternatives_spanish:
  - que alguien tomó
  - que una persona tomó
  lexicon: BDAG
  rationale: «ἄνθρωπος» es masculino singular en el relato. Se conserva «un hombre» para respetar la figura masculina concreta del símil, sin neutralizarla.
- source_word: ἔβαλεν εἰς κῆπον ἑαυτοῦ
  english_pob_choice: threw into his garden
  chosen_spanish: arrojó en su propio huerto
  alternatives_spanish:
  - echó en su huerto
  - lo puso en su huerto
  - lo sembró en su huerto
  lexicon: BDAG
  rationale: «βάλλω» admite la idea de arrojar/echar. «Arrojó» preserva la vivacidad del verbo. Se eligió «huerto» para κῆπος porque en español bíblico y contemporáneo puede referirse con naturalidad a un jardín cultivado; «propio» explicita ἑαυτοῦ.
- source_word: ηὔξησεν
  english_pob_choice: it grew
  chosen_spanish: creció
  alternatives_spanish:
  - se desarrolló
  - aumentó
  lexicon: BDAG
  rationale: El verbo intransitivo expresa crecimiento simple; «creció» es la forma más directa y natural en español.
- source_word: ἐγένετο εἰς ⸀δένδρον
  english_pob_choice: became a tree
  chosen_spanish: llegó a ser un árbol
  alternatives_spanish:
  - se hizo un árbol
  - se convirtió en un árbol
  lexicon: BDAG
  rationale: Se conserva «árbol» para δένδρον, siguiendo el texto griego y la ampliación sorprendente de la imagen. «Llegó a ser» suena natural en español y mantiene el proceso de transformación.
- source_word: τὰ πετεινὰ τοῦ οὐρανοῦ
  english_pob_choice: the birds of the sky
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves del aire
  - las aves del cielo
  lexicon: BDAG
  rationale: «πετεινά» es un término amplio para aves/pájaros. «Aves del cielo» refleja bien τοῦ οὐρανοῦ y es claro en español, sin cargar la frase con una redacción demasiado técnica.
- source_word: κατεσκήνωσεν
  english_pob_choice: nested
  chosen_spanish: anidaron
  alternatives_spanish:
  - se posaron
  - hicieron nido
  - se instalaron
  lexicon: BDAG
  rationale: Con aves y ramas, «anidaron» comunica de forma idiomática la imagen de asentarse en el árbol. Aunque el griego usa singular con sujeto neutro plural, el español requiere plural verbal.
- source_word: ἐν τοῖς κλάδοις αὐτοῦ
  english_pob_choice: in its branches
  chosen_spanish: en sus ramas
  alternatives_spanish:
  - entre sus ramas
  - en sus ramas y boughs
  lexicon: BDAG
  rationale: «κλάδοις» significa ramas o boughs. «En sus ramas» es natural en español y mantiene la referencia al árbol surgido del grano.
theological_decisions:
- issue: Renderizado de ἄνθρωπος como figura masculina
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - alguien
  - una persona
  rationale: El texto griego usa ἄνθρωπος en masculino singular para el personaje del símil. Se preserva esa concreción para no suavizarla innecesariamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Mantenimiento de δένδρον como «árbol»
  english_pob_reading: became a tree
  chosen_spanish_reading: llegó a ser un árbol
  alternative_spanish_readings:
  - se volvió un gran arbusto
  - llegó a ser una planta grande
  rationale: Aunque la imagen sea hiperbólica o botánicamente llamativa, el griego dice «árbol». Traducirlo como «árbol» mantiene la forma de la parábola y su exageración intencional.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y la decisión auditada de la POB en inglés. Se mantuvieron las dos tensiones principales documentadas: (1) la comparación abierta de ὁμοία ἐστὶν, y (2) la imagen deliberadamente amplificada de δένδρον como ‘árbol’. No se aplicaron revisiones posteriores en el paquete; el estado más reciente indica que no hubo cambios necesarios.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según la norma del proyecto solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se prefirió «un hombre» para ἄνθρωπος por fidelidad al personaje masculino singular.
  - «Huerto» se eligió como equivalente natural de κῆπος en este contexto de cultivo doméstico.
  - «Aves del cielo» mantiene la espacialidad de τοῦ οὐρανοῦ y evita una parálisis literal innecesaria.
  - La puntuación reproduce la cadena de acciones del griego con coordinación simple y clara.
