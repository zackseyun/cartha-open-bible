revisions:
- from: Es semejante a un grano de mostaza[a], que un hombre tomó y arrojó en su propio huerto, y creció y llegó a ser un árbol[b], y las aves del cielo anidaron en sus ramas.
  to: Es como un grano de mostaza, que un hombre tomó y echó en su huerto, y creció y llegó a ser un árbol[b], y las aves del cielo[a] anidaron en sus ramas.
  rationale: Se reubica la nota [a] al sintagma correcto («las aves del cielo») para alinearla con la evidencia fuente y con la nota inglesa. Además, se suaviza la apertura a «Es como» y el verbo a «echó» para una lectura más natural en español, sin alterar el sentido ni las decisiones léxicas principales. Se mantiene «árbol» y la nota [b] para preservar la imagen enfática del griego.
  reviewer_model: gpt-5.4
