    rationale: 'Viola la disciplina requerida de notas: el marcador exacto debe aparecer en el lugar pertinente del texto. Además, la nota inglesa preserva una alternativa léxica para τὰ πετεινὰ τοῦ οὐρανοῦ, no para κόκκῳ σινάπεως.'
  - severity: low
