review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: comparación con la mostaza, un hombre concreto, acción de echar en su huerto/jardín, crecimiento, llegar a ser árbol y aves que anidan en las ramas. También preserva correctamente la fuerza de δένδρον como «árbol». Sin embargo, hay un problema de anclaje de notas: la nota [a] está colocada sobre «mostaza», pero su contenido comenta «las aves del cielo / del aire», que corresponde al sintagma posterior τὰ πετεινὰ τοῦ οὐρανοῦ, no a κόκκῳ σινάπεως. Eso requiere corrección.'
  spanish_quality_summary: El español es claro y digno. No obstante, «Es semejante a» suena algo más rígido que «Es como» en una parábola, y «arrojó en su propio huerto» es comprensible pero menos natural que «echó en su huerto» o «arrojó en su huerto». La frase es plenamente legible, pero conviene reparar la nota mal ubicada y suavizar ligeramente la formulación para mayor naturalidad sin perder precisión.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Un hombre» respeta la decisión sobre ἄνθρωπος; «árbol» mantiene δένδρον; «aves del cielo» refleja bien τοῦ οὐρανοῦ. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc.
  issues:
