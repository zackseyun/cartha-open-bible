base_translation:
  language: en
  yaml_path: translation/nt/luke/013/007.yaml
  text: Then he said to the vine-dresser[a], ‘Look, for three years now I have come seeking fruit on this fig tree and find none. Cut it down. Why should it even use up the ground?’
  footnotes:
  - marker: a
    text: Or “Why should it also make the soil useless?” The Greek verb can carry the sense of rendering the ground unproductive, not merely occupying space.
    reason: lexical_alternative
