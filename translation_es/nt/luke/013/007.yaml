translation:
  language: es
  text: 'Entonces le dijo al viñador: «Mira, desde hace tres años[a] vengo buscando fruto en esta higuera y no lo encuentro. Córtala. ¿Por qué ha de seguir desperdiciando la tierra?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haciendo inútil la tierra». El verbo griego puede expresar que el terreno queda improductivo, no solo que la higuera ocupa espacio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμπελουργόν
  english_pob_choice: vine-dresser
  chosen_spanish: viñador
  alternatives_spanish:
  - hortelano
  - encargado de la viña
  lexicon: BDAG
  rationale: El término designa a quien trabaja o cultiva la viña. En español, «viñador» conserva el ámbito vitivinícola de manera más precisa y natural que «hortelano», y evita ampliar innecesariamente la figura.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  lexicon: BDAG
  rationale: La función es llamar la atención con énfasis. «Mira» comunica esa fuerza en español moderno sin el tono arcaico de «He aquí».
- source_word: τρία ἔτη ἀφ’ οὗ
  english_pob_choice: for three years now
  chosen_spanish: desde hace tres años
  alternatives_spanish:
  - estos tres años
  - desde hace ya tres años
  lexicon: BDAG
  rationale: La construcción expresa duración que se extiende desde un punto pasado hasta el presente. «Desde hace tres años» es la forma natural en español; el matiz de continuidad queda implícito por el contexto.
- source_word: ἔρχομαι ζητῶν
  english_pob_choice: I have come seeking
  chosen_spanish: vengo buscando
  alternatives_spanish:
  - he venido buscando
  - vengo a buscar
  lexicon: BDAG
  rationale: El presente con participio comunica acción repetida o continuada. «Vengo buscando» mantiene ese valor de hábito/reiteración sin sonar forzado en español.
- source_word: καρπὸν
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  lexicon: BDAG
  rationale: En la imagen agrícola de la parábola, «fruto» es el equivalente preciso y conserva mejor el registro bíblico que «fruta».
- source_word: συκῇ
  english_pob_choice: fig tree
  chosen_spanish: higuera
  alternatives_spanish:
  - árbol de higos
  lexicon: BDAG
  rationale: Es el sentido léxico estándar. «Higuera» es la forma natural y directa en español para el árbol aludido.
- source_word: οὐχ εὑρίσκω
  english_pob_choice: find none
  chosen_spanish: no lo encuentro
  alternatives_spanish:
  - no encuentro ninguno
  - no hallo fruto
  lexicon: BDAG
  rationale: El presente simple del griego queda bien reflejado con el presente español. Añadir «lo» retiene la referencia al fruto mencionado sin sobrecargar la frase.
- source_word: ἔκκοψον
  english_pob_choice: Cut it down
  chosen_spanish: Córtala
  alternatives_spanish:
  - Tírala abajo
  - Derríbala
  lexicon: BDAG
  rationale: En español, el imperativo breve reproduce la fuerza directa del mandato. Al referirse a un árbol, «córtala» es claro y sobrio.
- source_word: ἱνατί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué?
  - ¿A qué viene que?
  lexicon: BDAG
  rationale: Es una pregunta directa por la causa o razón. «¿Por qué» es la equivalencia más natural y fiel.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: seguir
  alternatives_spanish:
  - también
  - incluso
  lexicon: BDAG
  rationale: 'El griego añade un matiz intensivo: no solo no da fruto, sino que además perjudica la tierra. En español, ese valor se expresa mejor en la construcción verbal «ha de seguir usando», que deja el énfasis retórico de la pregunta.'
- source_word: γῆν
  english_pob_choice: the ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el terreno
  lexicon: BDAG
  rationale: En este contexto agrícola, «la tierra» es idiomática y abarca el suelo/terreno ocupado por la higuera. Mantiene la imagen sin introducir tecnicismos.
- source_word: καταργεῖ
  english_pob_choice: use up
  chosen_spanish: usando
  alternatives_spanish:
  - volviendo inútil
  - haciendo improductiva
  lexicon: BDAG
  rationale: El verbo puede implicar hacer improductiva o inutilizar la tierra. Siguiendo el audit trail inglés, «usando la tierra» conserva la idea práctica de ocuparla y agotarla; el sentido de improductividad queda disponible en la pregunta retórica.
theological_decisions:
- issue: Imagen parabólica sin interpretación explícita
  english_pob_reading: Retain the agricultural language literally without importing a theological explanation into the verse.
  chosen_spanish_reading: Conservar el lenguaje agrícola sin añadir una explicación espiritual explícita en el versículo.
  alternative_spanish_readings:
  - Traducir de forma interpretativa para subrayar la esterilidad espiritual
  - Parafrasear la higuera como imagen de una persona o nación
  rationale: El pasaje funciona como parábola. La traducción debe preservar la imagen y dejar que la interpretación se desarrolle por el contexto, sin resolverla dentro del propio enunciado.
  doctrine_reference: 'Principio POB: no parafrasear más allá de lo que el texto fuente justifica; preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final inglesa: el presente «no lo encuentro» refleja el valor presente de εὑρίσκω, y «usando la tierra» mantiene la fuerza directa y breve de καταργεῖ sin volver a una paráfrasis más interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «fruto» para καρπός y «higuera» para συκῇ, en línea con el registro agrícola del pasaje.
  - Se usa «viñador» para ἀμπελουργός, coherente con la terminología POB que distingue oficios del campo/vinya.
  - El imperativo singular «Córtala» conserva la urgencia del aoristo griego.
  - La puntuación y las comillas siguen el uso español moderno y mantienen separada la cita directa.
