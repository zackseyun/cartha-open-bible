review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego: el dueño habla al ἀμπελουργός, señala una búsqueda repetida de fruto durante tres años, ordena cortar la higuera y formula una pregunta retórica sobre el perjuicio al suelo. Sin embargo, «¿Por qué ha de seguir usando la tierra?» debilita el valor de καταργεῖ, que no es solo ‘usar’ sino ‘volver inútil / improductiva / desperdiciar’ el terreno. El inglés auditado preservó ese matiz mediante nota; en español conviene expresarlo mejor en el texto o al menos no reducirlo a mero uso espacial.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico moderno. «Viñador», «Mira», «desde hace tres años» y «vengo buscando» funcionan bien. La principal debilidad estilística-semántica es «ha de seguir usando la tierra», que suena algo indirecto y menos idiomático que una formulación como «seguir desperdiciando la tierra» o «dejar improductiva la tierra». Además, la nota está bien concebida, pero el ancla [v] no sigue la convención requerida de marcadores a, b, c.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto en este versículo. «Viñador» corresponde bien a ἀμπελουργός. La decisión problemática no es glosarial sino léxica: καταργεῖ debe reflejar mejor el sentido de inutilizar o volver improductiva la tierra, no solo ocuparla o usarla.'
  issues:
  - severity: medium
    issue: καταργεῖ está subtraducido como «usando».
    rationale: El verbo griego puede significar dejar sin efecto, inutilizar o volver improductivo. En este contexto agrícola, no se trata meramente de que el árbol ‘use’ la tierra, sino de que la malgaste o la vuelva infructuosa. El audit trail inglés preserva este matiz con una nota léxica alternativa.
  - severity: low
    issue: El marcador de nota «[v]» no sigue la convención requerida.
    rationale: Las instrucciones exigen marcadores únicos en orden a, b, c, etc. Debe cambiarse a [a] y mantenerse exactamente igual en texto y notas.
  - severity: low
    issue: «ha de seguir usando la tierra» es menos natural y menos enfático que la pregunta retórica griega.
    rationale: La combinación de ἱνατί καὶ con καταργεῖ expresa que, además de no dar fruto, la higuera perjudica el terreno. «seguir desperdiciando la tierra» transmite mejor el tono retórico y el valor práctico del verbo.
  revised_spanish_text: 'Entonces le dijo al viñador: «Mira, desde hace tres años[a] vengo buscando fruto en esta higuera y no lo encuentro. Córtala. ¿Por qué ha de seguir desperdiciando la tierra?»'
  revised_footnotes:
  - marker: a
    text: O «haciendo inútil la tierra». El verbo griego puede expresar que el terreno queda improductivo, no solo que la higuera ocupa espacio.
    reason: lexical_alternative
  revision_rationale: 'Se conservó la estructura y el buen español del borrador, pero se corrigió la parte final para reflejar mejor καταργεῖ en contexto agrícola: no solo ‘usar’ la tierra, sino desperdiciarla o volverla improductiva. También se ajustó el marcador de nota al formato requerido.'
