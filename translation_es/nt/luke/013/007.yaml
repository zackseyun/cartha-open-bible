revisions:
- from: 'Entonces le dijo al viñador: «Mira, desde hace tres años[v] vengo buscando fruto en esta higuera y no lo encuentro. Córtala. ¿Por qué ha de seguir usando la tierra?»'
  to: 'Entonces le dijo al viñador: «Mira, desde hace tres años[a] vengo buscando fruto en esta higuera y no lo encuentro. Córtala. ¿Por qué ha de seguir desperdiciando la tierra?»'
  rationale: 'Se conservó la estructura y el buen español del borrador, pero se corrigió la parte final para reflejar mejor καταργεῖ en contexto agrícola: no solo ‘usar’ la tierra, sino desperdiciarla o volverla improductiva. También se ajustó el marcador de nota al formato requerido.'
