translation:
  language: es
  text: Esfuércense por entrar por la puerta estrecha[a], porque muchos, les digo, buscarán entrar y no podrán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la puerta angosta». El griego de Lucas dice «puerta» (θύρα), mientras que el pasaje paralelo en Mateo usa «portón» o «puerta de acceso».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγωνίζεσθε
  english_pob_choice: Strive
  chosen_spanish: Esfuércense
  alternatives_spanish:
  - Luchen
  - Esfuérzense con empeño
  lexicon: BDAG
  rationale: El imperativo presente de ἀγωνίζομαι expresa esfuerzo intenso, lucha o empeño decidido. "Esfuércense" comunica esa idea con naturalidad en español y conserva la fuerza exhortativa sin suavizarla.
- source_word: εἰσελθεῖν
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ingresar
  - pasar
  lexicon: BDAG
  rationale: El infinitivo aoristo de εἰσέρχομαι se vierte de manera directa como "entrar", que es claro, idiomático y coherente en ambos usos del versículo.
- source_word: διὰ τῆς στενῆς θύρας
  english_pob_choice: through the narrow door
  chosen_spanish: por la puerta estrecha
  alternatives_spanish:
  - por la puerta angosta
  - por la puerta apretada
  lexicon: BDAG
  rationale: θύρα significa normalmente "puerta" y no "gate"; por eso se mantiene ese término. στενῆς se rinde como "estrecha" en sentido espacial y metafórico, una opción natural en español que conserva la imagen.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la exhortación, así que "porque" expresa con claridad la relación causal.
- source_word: πολλοί
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - una multitud
  - bastantes
  lexicon: BDAG
  rationale: El sustantivo/adjetivo plural se traduce directamente como "muchos", sin añadir matiz que el griego no exige.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les aseguro
  - yo les digo
  lexicon: BDAG
  rationale: La fórmula discursiva se adapta de forma natural a "les digo". Se evita una redacción más pesada que no aporta precisión adicional.
- source_word: ζητήσουσιν
  english_pob_choice: will seek
  chosen_spanish: querrán entrar
  alternatives_spanish:
  - buscarán entrar
  - intentarán entrar
  lexicon: BDAG
  rationale: Aunque ζητέω puede traducirse como "buscar", en este contexto el objeto inmediato es entrar; por eso "querrán entrar" comunica la orientación del deseo sin confundirlo con ἀγωνίζεσθε. Se evita "intentarán" para no desdibujar el matiz de búsqueda/aspiración del verbo griego.
- source_word: οὐκ ἰσχύσουσιν
  english_pob_choice: will not be able
  chosen_spanish: no podrán
  alternatives_spanish:
  - no serán capaces
  - no tendrán fuerzas
  lexicon: BDAG
  rationale: ἰσχύω aquí expresa capacidad o poder para lograr algo. "No podrán" es la equivalencia más natural y directa en español.
theological_decisions:
- issue: Tensión entre esfuerzo humano y advertencia salvadora
  english_pob_reading: Retain the imperative 'Strive' without softening it, while not importing any doctrinal explanation about merit or works.
  chosen_spanish_reading: Conservar un imperativo fuerte ('Esfuércense') y una advertencia real ('no podrán') sin añadir explicación doctrinal sobre mérito o salvación por obras.
  alternative_spanish_readings:
  - Hagan todo lo posible por entrar
  - Traten de entrar
  rationale: El versículo mantiene una exhortación intensa y un aviso de fracaso real. La traducción debe preservar esa tensión sin resolverla con una paráfrasis que atenúe la demanda o inserte una explicación teológica externa al texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente griego y el audit trail inglés: conserva el imperativo fuerte de ἀγωνίζεσθε, distingue εἰσελθεῖν/ζητήσουσιν sin fusionarlos, y mantiene θύρα como "puerta". No se incorporaron revisiones posteriores porque el registro indica que no hubo cambios necesarios.'
  spanish_consistency_notes:
  - Se mantiene "puerta" en lugar de "entrada" o "portón" por fidelidad a θύρα.
  - '"Esfuércense" conserva el tono exhortativo sin convertirlo en mero consejo.'
  - '"No podrán" refleja capacidad/posibilidad, no simple fracaso voluntario.'
  - Se evita "Cristo"/"Mesías" porque el versículo no contiene esa terminología.
