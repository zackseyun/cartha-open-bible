    text: O «por la puerta angosta». El griego de Lucas dice «puerta» (θύρα), mientras que el pasaje paralelo en Mateo usa «portón» o «puerta de acceso».
    reason: lexical_alternative
  revision_rationale: Se revisa principalmente «querrán entrar» a «buscarán entrar» para reflejar fielmente ζητήσουσιν y mantener la distinción léxica con Ἀγωνίζεσθε. También se corrige y simplifica la nota al pie para que sea gramatical, clara y alineada con la justificación auditada sobre θύρα frente al término usado en Mateo. No se requiere adjudicación adicional porque la evidencia griega y el rastro de auditoría son claros.
