translation:
  language: es
  text: 'Él añadió también esto a todo lo demás: encerró a Juan en la cárcel[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Añadió también esto a todo lo demás». El sentido es que Herodes añadió este acto a todos sus otros hechos malvados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέθηκεν
  english_pob_choice: added
  chosen_spanish: añadió
  alternatives_spanish:
  - agregó
  - sumó
  - añadió además
  lexicon: BDAG
  rationale: El aoristo de προστίθημι aquí expresa la idea de añadir un acto más a una serie previa. «Añadió» comunica bien el valor cumulativo en español sin perder naturalidad.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - esto también
  lexicon: BDAG
  rationale: El demostrativo señala el acto concreto que sigue. «Esto» conserva esa referencia directa y funciona con fluidez en español.
- source_word: ἐπὶ πᾶσιν
  english_pob_choice: to them all
  chosen_spanish: a todo lo demás
  alternatives_spanish:
  - además de todo lo anterior
  - sobre todo
  - a todas estas cosas
  lexicon: BDAG
  rationale: La expresión es idiomática y tiene fuerza acumulativa. En el contexto inmediato, se refiere a que Herodes añadió este acto a sus acciones previas; por eso se explicita en español como «a todo lo demás» para preservar el sentido sin calcar la sintaxis griega.
- source_word: κατέκλεισεν
  english_pob_choice: locked ... up
  chosen_spanish: encerró
  alternatives_spanish:
  - metió preso
  - confinó
  - encarceló
  lexicon: BDAG
  rationale: κατακλείω significa literalmente cerrar o encerrar dentro. «Encerró» conserva la imagen concreta y evita duplicar demasiado la idea que ya expresa «en la cárcel».
- source_word: Ἰωάννην
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan el Bautista
  lexicon: N/A
  rationale: Se usa el nombre propio estándar en español. El contexto narrativo identifica a Juan el Bautista, pero el texto griego solo nombra a Juan.
- source_word: ἐν φυλακῇ
  english_pob_choice: in prison
  chosen_spanish: en la cárcel
  alternatives_spanish:
  - en prisión
  - bajo custodia
  lexicon: BDAG
  rationale: φυλακή aquí denota un lugar de reclusión. «En la cárcel» es la formulación natural y clara en español para el contexto narrativo.
theological_decisions:
- issue: Sentido de ἐπὶ πᾶσιν en contexto narrativo
  english_pob_reading: The phrase refers to Herod adding this act to all his previous evil deeds.
  chosen_spanish_reading: La frase se entiende como que Herodes añadió este acto a todo lo anterior que ya había hecho.
  alternative_spanish_readings:
  - lo añadió sobre todo
  - lo añadió a todos
  - además de todo
  rationale: El contexto de los vv. 19–20 enumera la maldad de Herodes y culmina con el encierro de Juan. La traducción española hace explícita esa acumulación para conservar el valor discursivo del griego sin introducir contenido ajeno.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando la nota al texto con [a] y ajustando la redacción para que la referencia al acumulativo tenga soporte visible en el verso.
  spanish_consistency_notes:
  - Se mantiene «Juan» para el nombre propio, siguiendo la convención española estándar.
  - Se evita «SEÑOR» u otras sustituciones porque no hay aquí el tetragrámaton ni κύριος con valor divino.
  - «En la cárcel» conserva el sentido narrativo natural de φυλακή sin sobrecargar el texto.
