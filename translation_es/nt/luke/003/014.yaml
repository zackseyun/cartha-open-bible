  to: 'También unos soldados le preguntaban, diciendo: «¿Qué debemos hacer también?[a]» Y les dijo: «No extorsionen dinero a nadie[b], ni acusen falsamente a nadie, y conténtense con su paga[c]».'
  rationale: Se mejoró la naturalidad del inicio en español, se explicitó «dinero» para ajustarse a la decisión léxica documentada para διασείσητε, y se deja constancia de que la nota teológica debe corregir al hablante de Jesús a Juan. No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo textual.
