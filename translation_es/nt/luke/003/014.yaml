translation:
  language: es
  text: 'También unos soldados le preguntaban, diciendo: «¿Qué debemos hacer también?[a]» Y les dijo: «No extorsionen dinero a nadie[b], ni acusen falsamente a nadie, y conténtense con su paga[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «¿Qué debemos hacer nosotros también?». El griego enfatiza explícitamente «nosotros también».'
    reason: lexical_alternative
  - marker: b
    text: El verbo traducido «extorsionen dinero» puede sugerir literalmente sacudir o intimidar; aquí se refiere al abuso coercitivo para obtener ganancia.
    reason: lexical_alternative
  - marker: c
    text: «Paga» también puede traducirse «salario» o «sueldo»; el término griego se usaba con frecuencia para la paga o provisiones de soldados.
    reason: lexical_alternative
lexical_decisions:
- source_word: στρατευόμενοι
  english_pob_choice: soldiers
  chosen_spanish: soldados
  alternatives_spanish:
  - militares
  - hombres de guerra
  lexicon: BDAG
  rationale: El participio indica personas en servicio militar; «soldados» es natural, preciso y fiel al contexto.
- source_word: Τί ποιήσωμεν καὶ ἡμεῖς
  english_pob_choice: What should we also do?
  chosen_spanish: ¿Qué debemos hacer también?
  alternatives_spanish:
  - ¿Qué debemos hacer nosotros también?
  - ¿Y qué debemos hacer también?
  lexicon: BDAG
  rationale: La pregunta deliberativa en español se expresa con naturalidad mediante «¿Qué debemos hacer…?». «También» conserva el énfasis de καὶ ἡμεῖς, es decir, que ellos igualmente preguntan junto con los otros.
- source_word: διασείσητε
  english_pob_choice: extort money from
  chosen_spanish: extorsionen
  alternatives_spanish:
  - amenacen para obtener dinero
  - saqueen
  - intimiden para obtener dinero
  lexicon: BDAG
  rationale: El verbo griego literalmente sugiere sacudir o intimidar, pero en este contexto señala abuso coercitivo para ganancia. «Extorsionen» conserva ese sentido sin volverlo demasiado coloquial.
- source_word: συκοφαντήσητε
  english_pob_choice: accuse anyone falsely
  chosen_spanish: acusen falsamente
  alternatives_spanish:
  - hagan acusaciones falsas
  - difamen
  - denuncien falsamente
  lexicon: BDAG
  rationale: El verbo refiere a acusación injusta o fraudulenta. «Acusen falsamente» reproduce bien el valor judicial-social del término.
- source_word: ἀρκεῖσθε τοῖς ὀψωνίοις ὑμῶν
  english_pob_choice: be content with your wages
  chosen_spanish: conténtense con su paga
  alternatives_spanish:
  - satisfáganse con su sueldo
  - bástense con su paga
  lexicon: BDAG
  rationale: «Conténtense» expresa la actitud continua de suficiencia exigida por el imperativo. «Paga» es una opción válida y amplia en español para el término de remuneración militar.
theological_decisions:
- issue: La instrucción a los soldados no ordena abandonar el servicio militar
  english_pob_reading: John does not command soldiers to leave military service, but instructs them to practice justice within it.
  chosen_spanish_reading: Jesús no les ordena dejar el servicio militar, sino practicar la justicia dentro de él.
  alternative_spanish_readings:
  - La frase implica condena del servicio militar mismo.
  - Se les manda abandonar la vida militar.
  rationale: El texto se dirige a soldados como soldados y prohíbe abusos concretos; la traducción mantiene esa instrucción ética sin añadir una conclusión doctrinal no explicitada por el pasaje.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del audit trail: la pregunta se formula de manera natural como «¿Qué debemos hacer también?», manteniendo el énfasis de καὶ ἡμεῖς. Se preserva además la fuerza coercitiva de διασείσητε y el matiz de remuneración militar de ὀψώνια.'
  spanish_consistency_notes:
  - Se mantiene «soldados» para στρατευόμενοι por precisión contextual.
  - Se usa «paga» en lugar de «salario» para conservar la posible referencia militar del término griego.
  - Se conserva el paralelo de dos prohibiciones coordinadas con «ni… ni…» y una exhortación final a la suficiencia.
  - No se introduce lenguaje eclesiástico tradicional que atenúe la fuerza ética del texto.
