  text: ἐπηρώτων δὲ αὐτὸν καὶ στρατευόμενοι λέγοντες· ⸂Τί ποιήσωμεν καὶ ἡμεῖς⸃; καὶ εἶπεν ⸀αὐτοῖς· Μηδένα διασείσητε μηδὲ συκοφαντήσητε, καὶ ἀρκεῖσθε τοῖς ὀψωνίοις ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/003/014.yaml
  text: And soldiers also were asking him[a], saying, “What should we also do?” And he said to them, “Do not extort money from anyone, nor accuse anyone falsely[c][b], and be content with your wages.”
  footnotes:
  - marker: a
    text: Or, more idiomatically, “What should we do too?” The Greek explicitly emphasizes “we also.”
    reason: lexical_alternative
  - marker: b
    text: The verb translated “extort money” can literally suggest shaking or intimidating someone; here it refers to coercive abuse for gain.
    reason: lexical_alternative
  - marker: c
    text: “Wages” may also be rendered “pay”; the Greek term was often used for soldiers’ pay or provisions.
    reason: lexical_alternative
