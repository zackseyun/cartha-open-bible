  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: imperfecto iterativo/progresivo («les decía»), movimiento de las multitudes hacia Juan, finalidad pasiva de «ser bautizadas», insulto metafórico fuerte, advertencia de huir de la ira venidera. Sin embargo, la colocación de las notas al pie está invertida respecto de sus contenidos: [a] está anclada a «por él» pero su nota corresponde a «para ser bautizadas», y [b] está anclada a «Engendros de víboras» pero su nota corresponde correctamente a esa expresión, mientras falta nota para la alternativa de «ira venidera / la ira que viene».'
  spanish_quality_summary: El español es claro, natural y de tono digno. «Así que», «les decía», «multitudes que salían», «por él» y «la ira venidera» son legibles y fieles. «Engendros de víboras» es fuerte pero comprensible; aun así, «camada de víboras» funciona mejor como alternativa idiomática en nota. El principal problema es técnico-editorial de anclaje y correspondencia de notas, no de redacción base.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. «Ira» preserva bien ὀργή, y «ser bautizadas» mantiene la voz pasiva del griego.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «por él» pero su contenido («para recibir bautismo») corresponde a «para ser bautizadas».
    rationale: Las notas deben aparecer en la palabra o frase pertinente. El anclaje actual induce a entender erróneamente que la alternativa afecta a ὑπ’ αὐτοῦ en vez de βαπτισθῆναι.
  - severity: medium
    issue: Falta una nota para la alternativa de ἀπὸ τῆς μελλούσης ὀργῆς, que el rastro inglés sí conserva.
    rationale: El inglés POB preserva la alternativa «from the wrath to come». En español conviene reflejarla como nota léxica, por ejemplo «O «de la ira que viene»», anclada en «ira venidera».
  - severity: low
    issue: 'La puntuación con dos signos fuertes seguidos («: «¡Engendros de víboras[b]! ¿Quién...?»») es aceptable, pero el verso fluye mejor sin que la nota interrumpa la exclamación inicial de forma confusa.'
    rationale: No es un error de fidelidad, pero reubicar correctamente las notas mejora la legibilidad editorial.
