translation:
  language: es
  text: 'Así que les decía a las multitudes que salían para ser bautizadas[a] por él: «¡Engendros de víboras[b]! ¿Quién les advirtió que huyeran de la ira venidera[c]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para recibir bautismo».
    reason: lexical_alternative
  - marker: b
    text: O «Camada de víboras».
    reason: lexical_alternative
  - marker: c
    text: O «de la ira que viene».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: les decía
  alternatives_spanish:
  - les estaba diciendo
  - les seguía diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa habla en desarrollo o reiterada. En español, «les decía» conserva ese valor aspectual con naturalidad, sin sobrecargar el texto con perífrasis innecesaria.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Marca continuidad narrativa. «Así que» suena natural en español moderno y mantiene el vínculo lógico con el contexto previo.
- source_word: τοῖς ἐκπορευομένοις ὄχλοις
  english_pob_choice: to the crowds coming out
  chosen_spanish: a las multitudes que salían
  alternatives_spanish:
  - a las multitudes que iban saliendo
  - a la gente que salía
  lexicon: BDAG
  rationale: El participio describe a las multitudes en movimiento hacia Juan. «Que salían» conserva la imagen espacial del griego sin forzar un calco de la perspectiva inglesa.
- source_word: βαπτισθῆναι
  english_pob_choice: to be baptized
  chosen_spanish: para ser bautizadas
  alternatives_spanish:
  - para bautizarse
  - para recibir bautismo
  lexicon: BDAG
  rationale: El infinitivo pasivo aoristo expresa finalidad con pasividad. «Para ser bautizadas» reproduce esa voz pasiva; el plural femenino concuerda con «multitudes» como colectivo.
- source_word: ὑπ’ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - por Juan
  - de su parte
  lexicon: BDAG
  rationale: El pronombre remite a Juan. «Por él» sigue de cerca el griego y evita introducir el nombre, como hace el texto fuente.
- source_word: Γεννήματα ἐχιδνῶν
  english_pob_choice: Offspring of vipers
  chosen_spanish: ¡Engendros de víboras!
  alternatives_spanish:
  - ¡Camada de víboras!
  - ¡Raza de víboras!
  lexicon: BDAG
  rationale: «Γεννήματα» se refiere a aquello que ha sido engendrado o producido. «Engendros» preserva la fuerza insultante y la relación metafórica con «víboras»; es más directo que «brood» en inglés, y más fiel al sentido lexical que una paráfrasis suavizada.
- source_word: τίς ὑπέδειξεν ὑμῖν
  english_pob_choice: who warned you
  chosen_spanish: ¿Quién les advirtió?
  alternatives_spanish:
  - ¿Quién les mostró?
  - ¿Quién les indicó?
  lexicon: BDAG
  rationale: En este contexto de juicio inminente, ὑποδείκνυμι lleva el matiz de advertencia o instrucción preventiva. «Advirtió» comunica mejor la fuerza del pasaje que «mostró» o «indicó».
- source_word: φυγεῖν
  english_pob_choice: to flee
  chosen_spanish: que huyeran
  alternatives_spanish:
  - que escaparan
  - para huir
  lexicon: BDAG
  rationale: El infinitivo expresa la acción de escapar ante el peligro. En español, «huyeran» integra con naturalidad la cláusula interrogativa dependiente y conserva la imagen de huida.
- source_word: ἀπὸ τῆς μελλούσης ὀργῆς
  english_pob_choice: from the coming wrath
  chosen_spanish: de la ira venidera
  alternatives_spanish:
  - de la ira que viene
  - de la ira próxima
  lexicon: BDAG
  rationale: μέλλω señala algo que está por venir. «Venidera» preserva esa cualidad de inminencia y mantiene el tono solemne del texto, sin restringir el alcance de ὀργή a una doctrina más específica de lo que el pasaje exige.
theological_decisions:
- issue: Naturaleza de la ὀργή anunciada por Juan
  english_pob_reading: wrath refers to impending divine judgment without specifying a narrower doctrinal scheme
  chosen_spanish_reading: «ira venidera» como juicio divino inminente, sin concretar más su esquema escatológico
  alternative_spanish_readings:
  - «ira que viene» como formulación más literal
  - «ira del juicio final» si se quisiera explicitar una lectura más concreta
  rationale: El contexto inmediato habla de arrepentimiento ante el juicio de Dios, pero no obliga a fijar un sistema escatológico más estrecho. La traducción conserva la tensión doctrinal con una frase abierta y fiel al alcance del griego.
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera sistemática.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que no introdujo cambios. El acuerdo de revisión y la convergencia entre evaluadores confirman que no era necesario modificar la lectura base del versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» por norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «ira» para ὀργή, conservando el peso judicial del término sin suavizarlo.
  - «Multitudes» traduce ὄχλοι con un tono más solemne que «gente», acorde con el registro del pasaje.
  - Se eligió una puntuación de cita directa con exclamación para reflejar la vehemencia de la reprensión.
