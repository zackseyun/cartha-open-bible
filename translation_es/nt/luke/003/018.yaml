translation:
  language: es
  text: Así, con muchas otras exhortaciones[a], proclamaba la buena noticia al pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con muchas otras cosas los exhortaba». El griego deja implícito el objeto de «muchas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Πολλὰ
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - muchas cosas
  - muchas palabras
  lexicon: BDAG
  rationale: El plural neutro funciona aquí de manera sustantivada e implica contenido abundante del discurso. En español, «muchas» con un sustantivo implícito comunica esa abundancia sin forzar una paráfrasis más pesada.
- source_word: μὲν οὖν
  english_pob_choice: So then
  chosen_spanish: Así
  alternatives_spanish:
  - Por tanto
  - Entonces
  - Así pues
  lexicon: BDAG
  rationale: La combinación de partículas marca transición y continuación del relato. «Así» mantiene el enlace discursivo de modo natural en español sin sobrerrepresentar cada partícula.
- source_word: ἕτερα
  english_pob_choice: as well / other
  chosen_spanish: otras
  alternatives_spanish:
  - adicionales
  - distintas
  lexicon: BDAG
  rationale: «ἕτερα» expresa algo adicional u otro tipo de contenido. «Otras» conserva la apertura del griego y enlaza bien con «muchas».
- source_word: παρακαλῶν
  english_pob_choice: exhortations
  chosen_spanish: exhortaciones
  alternatives_spanish:
  - exhortando
  - animando
  - rogando
  lexicon: BDAG
  rationale: El participio de παρακαλέω en este contexto profético se entiende mejor como la acción y el contenido exhortativo del mensaje. «Exhortaciones» preserva la fuerza admonitiva que el POB inglés resaltó.
- source_word: εὐηγγελίζετο
  english_pob_choice: was proclaiming the good news
  chosen_spanish: proclamaba la buena nueva
  alternatives_spanish:
  - anunciaba la buena nueva
  - predicaba la buena nueva
  - evangelizaba
  lexicon: BDAG
  rationale: El imperfecto pide una forma durativa en español. «Proclamaba la buena nueva» conserva el anuncio gozoso del verbo εὐαγγελίζω sin reducirlo a un simple «predicaba».
- source_word: τὸν λαόν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - al pueblo de Israel
  lexicon: BDAG
  rationale: λαός es «pueblo» y puede tener matiz covenantal, pero aquí el referente inmediato es el auditorio de Juan. «Al pueblo» es fiel y natural.
theological_decisions:
- issue: εὐαγγελίζετο aplicado a la predicación de Juan el Bautista
  english_pob_reading: Rendered as 'was proclaiming the good news' even though the speaker is John the Baptist, because the Greek explicitly presents his message as good news.
  chosen_spanish_reading: «proclamaba la buena nueva» mantiene que el mensaje de Juan es presentado como buena noticia, no solo como exhortación moral.
  alternative_spanish_readings:
  - predicaba
  - anunciaba
  rationale: 'Conviene conservar la tensión del griego: la exhortación de Juan está incrustada dentro de la proclamación de la buena nueva. No debe rebajarse a una predicación genérica.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se siguió el ajuste más reciente del audit trail: se evitó añadir una expansión interpretativa del tipo «mientras exhortaba… con muchas otras palabras», y se preservó el valor durativo del imperfecto con un verbo en imperfecto español. También se mantuvo «el pueblo» como equivalente de τὸν λαόν, sin especificar más de lo que el griego dice.'
  spanish_consistency_notes:
  - Se emplea «buena nueva» para εὐαγγέλιον/εὐαγγελίζομαι cuando el contexto destaca el anuncio del evangelio como noticia gozosa, manteniendo la terminología del proyecto.
  - Se conserva «exhortaciones» para παρακαλέω en contexto profético, en lugar de suavizarlo con «ánimos» o «aliento».
  - El sujeto tácito de la segunda cláusula queda bien en español con el verbo en imperfecto, sin necesidad de añadir pronombre explícito.
