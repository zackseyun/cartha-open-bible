lexical_decisions:
- source_word: τοῦ
  english_pob_choice: the son of
  chosen_spanish: el hijo de
  alternatives_spanish:
  - de
  lexicon: BDAG
  rationale: En una genealogía, el genitivo repetido funciona de modo elíptico para indicar descendencia. En español, 'el hijo de' comunica con claridad esa relación genealógica y evita una cadena áspera de simples 'de'.
- source_word: Καϊνὰμ
  english_pob_choice: Cainan
  chosen_spanish: Cainán
  alternatives_spanish:
  - Kainán
  - Cainan
  lexicon: BDAG
  rationale: Se conserva el nombre propio con transliteración natural al español. 'Cainán' sigue la forma bíblica habitual en español y mantiene la referencia al nombre griego del texto de Lucas.
- source_word: Ἀρφαξὰδ
  english_pob_choice: Arphaxad
  chosen_spanish: Arfaxad
  alternatives_spanish:
  - Arfacsad
  - Arpachshad
  lexicon: BDAG
  rationale: El texto griego de Lucas presenta la forma Ἀρφαξάδ, y el español la reproduce como nombre propio transliterado. 'Arfaxad' refleja mejor la forma griega en este pasaje que la forma hebrea más conocida, 'Arpachshad'.
- source_word: Σὴμ
  english_pob_choice: Shem
  chosen_spanish: Sem
  alternatives_spanish:
  - Shem
  lexicon: BDAG
  rationale: Nombre propio bíblico transliterado al español con la forma habitual 'Sem'.
- source_word: Νῶε
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noe
  lexicon: BDAG
  rationale: Se usa la forma española establecida 'Noé', más natural y reconocible que una transliteración más cercana al griego.
- source_word: Λάμεχ
  english_pob_choice: Lamech
  chosen_spanish: Lamec
  alternatives_spanish:
  - Lamech
  lexicon: BDAG
  rationale: Nombre propio bíblico transliterado al español con la forma 'Lamec', común y legible en español.
theological_decisions:
- issue: Inclusión de Cainán entre Arfaxad y Sem en la genealogía
  english_pob_reading: Retain Cainan in the main text as part of the translated Greek text.
  chosen_spanish_reading: Mantener a Cainán en el texto principal, sin armonizarlo con la genealogía del Antiguo Testamento.
  alternative_spanish_readings:
  - Omitir a Cainán para concordar con ciertas formas del Antiguo Testamento.
  rationale: El texto griego de Lucas 3:36 incluye Καϊνάμ, por lo que la traducción debe reflejar lo que Lucas dice y no armonizarlo con otras listas genealógicas. Es una cuestión textual, no doctrinal, y la transparencia exige conservar la lectura del pasaje.
  doctrine_reference: Translation philosophy §1 (primacía del texto original sobre la tradición de traducción)
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marca de nota al pie aparezca exactamente en el texto español. También se retiró cualquier nota no anclada y se mantuvo la lectura genealógica del griego de Lucas sin armonización.
  spanish_consistency_notes:
  - Se emplean nombres propios bíblicos en formas españolas reconocibles y consistentes.
  - '''el hijo de'' se usa para explicitar la relación genealógica implícita en la cadena de genitivos griega.'
  - Se conserva la forma griega de Lucas en Arfaxad, sin sustituirla por la forma hebrea del Antiguo Testamento.
