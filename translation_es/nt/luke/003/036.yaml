translation:
  language: es
  text: el hijo de Cainán[a], el hijo de Arfaxad[c], el hijo de Sem, el hijo de Noé, el hijo de Lamec[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas versiones españolas escriben este nombre "Kainán".
    reason: lexical_alternative
