translation:
  language: es
  text: Y ya el hacha[a] está puesta a la raíz de los árboles. Por tanto, todo árbol que no produce[b] buen fruto es cortado y echado al fuego[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el hacha yace a la raíz de los árboles».
    reason: lexical_alternative
  - marker: b
    text: O «que no da buen fruto».
    reason: lexical_alternative
  - marker: c
    text: O «arrojado al fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - ya desde ahora
  lexicon: BDAG
  rationale: «Ya» comunica la inmediatez temporal y la sensación de juicio inminente con naturalidad en español, sin añadir matices no presentes en el griego.
- source_word: δὲ καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Y además
  lexicon: BDAG
  rationale: La conjunción simple mantiene la continuidad discursiva; el valor aditivo ya queda insinuado por el avance de la advertencia y la estructura de la frase.
- source_word: ἡ ἀξίνη
  english_pob_choice: the ax
  chosen_spanish: el hacha
  alternatives_spanish:
  - el hacha de cortar
  - el hachón
  lexicon: BDAG
  rationale: «Hacha» es el equivalente natural y directo en español para el instrumento de corte; conserva la imagen de juicio agrícola sin forzar tecnicismos.
- source_word: πρὸς τὴν ῥίζαν
  english_pob_choice: at the root
  chosen_spanish: a la raíz
  alternatives_spanish:
  - contra la raíz
  - junto a la raíz
  lexicon: BDAG
  rationale: La preposición con este giro expresa proximidad/listitud para el corte; «a la raíz» mantiene la imagen de la herramienta ya colocada para actuar.
- source_word: τῶν δένδρων
  english_pob_choice: of the trees
  chosen_spanish: de los árboles
  alternatives_spanish:
  - de los árboles frutales
  - de los troncos
  lexicon: BDAG
  rationale: «Árboles» reproduce el referente literal del plural griego y funciona bien en el símil sin introducir especificaciones ajenas al texto.
- source_word: κεῖται
  english_pob_choice: is laid
  chosen_spanish: está puesta
  alternatives_spanish:
  - yace
  - ha sido puesta
  lexicon: BDAG
  rationale: En español, «está puesta» transmite el estado resultante y la preparación para el corte con una naturalidad similar a «is laid» en inglés.
- source_word: πᾶν οὖν δένδρον
  english_pob_choice: Therefore every tree
  chosen_spanish: Por tanto, todo árbol
  alternatives_spanish:
  - Así que todo árbol
  - Entonces todo árbol
  lexicon: BDAG
  rationale: «Por tanto» expresa claramente la conclusión inferida por οὖν; «todo árbol» mantiene el alcance universal del griego sin perder fluidez.
- source_word: μὴ ποιοῦν
  english_pob_choice: not producing
  chosen_spanish: que no produce
  alternatives_spanish:
  - que no da
  - que no lleva
  lexicon: BDAG
  rationale: El participio de ποιέω con καρπός admite en español una construcción relativa natural. «Produce» conserva la fuerza verbal sin convertir la metáfora en una paráfrasis más libre.
- source_word: καρπὸν καλὸν
  english_pob_choice: good fruit
  chosen_spanish: buen fruto
  alternatives_spanish:
  - fruto bueno
  - fruto excelente
  lexicon: BDAG
  rationale: «Buen fruto» es una expresión española natural y fiel al valor evaluativo de καλός, manteniendo la metáfora ética sin sobreexplicarla.
- source_word: ἐκκόπτεται
  english_pob_choice: is cut down
  chosen_spanish: es cortado
  alternatives_spanish:
  - es derribado
  - es talado
  lexicon: BDAG
  rationale: «Es cortado» conserva la pasiva y la severidad del juicio. Aunque «talado» es posible, «cortado» se ajusta mejor al paralelo inmediato con el árbol y al texto base inglés.
- source_word: εἰς πῦρ βάλλεται
  english_pob_choice: thrown into the fire
  chosen_spanish: echado al fuego
  alternatives_spanish:
  - arrojado al fuego
  - echado en el fuego
  lexicon: BDAG
  rationale: «Echado al fuego» mantiene el impacto de la imagen y suena natural en español. Se evita aclarar el fuego como lugar específico, respetando la amplitud del símbolo.
theological_decisions:
- issue: Imagen de juicio con el hacha y el fuego
  english_pob_reading: Retain the agricultural metaphor of an ax at the root and trees thrown into the fire as a warning of imminent divine judgment without specifying beyond the text whether the fire refers to temporal judgment, eschatological judgment, or both.
  chosen_spanish_reading: Mantener la metáfora agrícola del hacha junto a la raíz y de los árboles echados al fuego como advertencia de juicio divino inminente, sin precisar más allá del texto si el fuego se refiere a juicio temporal, escatológico o a ambos.
  alternative_spanish_readings:
  - Identificar el fuego específicamente con el infierno
  - Reducir la imagen solo a un juicio histórico sobre Israel
  rationale: El griego presenta una advertencia intensa y abierta; especificar el referente del fuego iría más allá de lo que el verso afirma. La redacción española conserva esa tensión interpretativa.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; la redacción española sigue de cerca el texto griego y el criterio auditado en inglés, manteniendo la imagen de juicio sin especificaciones añadidas.
  spanish_consistency_notes:
  - 'Se preserva la progresión lógica del griego: inmediatez temporal, advertencia, conclusión, resultado.'
  - Se mantiene el singular colectivo «todo árbol» para reproducir πᾶν δένδρον sin diluir el alcance universal.
  - «Hacha» y «fuego» conservan el tono metáforico y judicial del pasaje, sin armonizarlo con lenguaje eclesiástico tradicional.
  - Las notas alternativas ofrecen variantes léxicas reales en español sin reescribir el contenido principal.
