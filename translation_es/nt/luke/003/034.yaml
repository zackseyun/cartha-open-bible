lexical_decisions:
- source_word: τοῦ
  english_pob_choice: the son of
  chosen_spanish: de
  alternatives_spanish:
  - hijo de
  lexicon: BDAG
  rationale: El griego repite el artículo genitivo con cada nombre en una genealogía elíptica. En español, la secuencia más natural y fiel a la estructura es simplemente 'de' con cada enlace nominal. 'Hijo de' añadiría una relación explícita que el griego no expresa palabra por palabra en esta línea aislada.
- source_word: Ἰακὼβ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: BDAG
  rationale: Nombre propio patriarcal estándar. 'Jacob' mantiene la forma bíblica más reconocible y se ajusta al nombre de la fuente original.
- source_word: Ἰσαὰκ
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: BDAG
  rationale: Nombre propio bíblico establecido en español; no requiere adaptación adicional.
- source_word: Ἀβραὰμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  lexicon: BDAG
  rationale: Nombre propio bíblico establecido en español; la transliteración tradicional coincide con el uso bíblico común.
- source_word: Θάρα
  english_pob_choice: Terah
  chosen_spanish: Terah
  alternatives_spanish:
  - Thara
  lexicon: BDAG
  rationale: Aunque la forma griega es Θάρα/Thara, en español bíblico la forma familiar del Antiguo Testamento es 'Terah'. La elección sigue la identidad bíblica del personaje y la convención reconocible para el lector.
- source_word: Ναχὼρ
  english_pob_choice: Nahor
  chosen_spanish: Nahor
  alternatives_spanish:
  - Nachor
  lexicon: BDAG
  rationale: Se prefiere 'Nahor' por ser la forma bíblica más familiar en español y corresponder al patriarca conocido en el Antiguo Testamento. 'Nachor' refleja más de cerca la grafía griega, pero es menos reconocible.
theological_decisions:
- issue: Cadena genealógica elíptica con genitivos repetidos
  english_pob_reading: Explicitly render each genitive link as 'the son of'
  chosen_spanish_reading: Conservar la serie genealógica con 'de' en cada enlace
  alternative_spanish_readings:
  - hijo de Jacob, hijo de Isaac, hijo de Abraham, hijo de Terah, hijo de Nahor
  - de Jacob, de Isaac, de Abraham, de Terah, de Nahor
  rationale: El griego de esta línea depende de la elipsis genealógica y del contexto inmediato. En español, una simple serie de 'de' comunica la dependencia genealógica sin introducir explícitamente 'hijo de', que aquí sería una expansión interpretativa no requerida por el texto aislado. Esta decisión mantiene la fuerza genealógica con mínima adición.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: No se registraron revisiones posteriores relevantes; el pasaje muestra alto acuerdo entre el texto fuente, la traducción inglesa auditada y la revisión automática, sin cambios necesarios en el último pase.
  spanish_consistency_notes:
  - Se conserva una sintaxis breve y genealógica, acorde con una lista de nombres propios.
  - Se emplean formas bíblicas reconocibles en español para los nombres patriarcales.
  - La puntuación con comas refleja la enumeración implícita del original sin añadir contenido narrativo.
