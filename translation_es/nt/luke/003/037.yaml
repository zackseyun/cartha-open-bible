translation:
  language: es
  text: de Matusalén, de Enoc, de Jared, de Mahalaleel, de Cainán[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Καϊνάμ; también puede aparecer como «Kainan» o, al armonizar con genealogías del Antiguo Testamento, «Kenán». El texto griego de Lucas incluye este nombre.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ
  english_pob_choice: the son of
  chosen_spanish: de
  alternatives_spanish:
  - hijo de
  lexicon: BDAG
  rationale: En esta genealogía, el artículo genitivo repetido continúa la cadena genealógica. En español, la serie de 'de' reproduce de manera natural la relación posesiva/genealógica sin añadir una palabra que el griego no expresa explícitamente en cada enlace.
- source_word: Μαθουσαλά
  english_pob_choice: Methuselah
  chosen_spanish: Matusalén
  alternatives_spanish:
  - Mathusala
  lexicon: transliteración bíblica estándar
  rationale: Se usa la forma bíblica usual en español, reconocible para el lector y correspondiente al personaje genealógico conocido en Génesis.
- source_word: Ἑνώχ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  alternatives_spanish:
  - Henoc
  lexicon: transliteración bíblica estándar
  rationale: Se adopta la forma común en español bíblico, clara y ampliamente reconocible.
- source_word: Ἰάρετ
  english_pob_choice: Jared
  chosen_spanish: Jared
  alternatives_spanish:
  - Yared
  - Jaret
  lexicon: transliteración bíblica estándar
  rationale: La forma 'Jared' es la habitual en español para este nombre genealógico, y mantiene la correspondencia con la tradición bíblica conocida.
- source_word: Μαλελεήλ
  english_pob_choice: Mahalaleel
  chosen_spanish: Mahalaleel
  alternatives_spanish:
  - Mahalalel
  - Maleleel
  lexicon: transliteración bíblica estándar
  rationale: Se conserva la forma bíblica tradicional usada en español para este nombre, que resulta más reconocible en una genealogía.
- source_word: Καϊνάμ
  english_pob_choice: Cainan
  chosen_spanish: Cainán
  alternatives_spanish:
  - Kenán
  - Quenán
  lexicon: transliteración bíblica estándar
  rationale: Se mantiene el nombre presente en el texto griego de Lucas con una forma española natural y bíblicamente inteligible. No se armoniza con otras genealogías del AT, para respetar el testimonio textual de Lucas.
theological_decisions:
- issue: Cadena genealógica con genitivos repetidos
  english_pob_reading: Supply 'the son of' for each name
  chosen_spanish_reading: Reproducir la relación genealógica con 'de' en serie
  alternative_spanish_readings:
  - hijo de ... hijo de ...
  - de ... de ... de ... con mayor literalidad
  rationale: No es una cuestión doctrinal, pero sí de representación del sentido. En español, la secuencia repetida de 'de' comunica adecuadamente la filiación genealógica sin recargar el texto.
  doctrine_reference: Translation philosophy §2, §6
- issue: Presencia de Καϊνάμ en la genealogía de Lucas
  english_pob_reading: Include the name in the main text as 'Cainan'
  chosen_spanish_reading: Incluir el nombre en el texto principal como 'Cainán'
  alternative_spanish_readings:
  - Kenán
  - Quenán
  rationale: El griego de Lucas incluye este nombre; por eso se representa en el texto principal sin armonizarlo con genealogías del AT. Se preserva la trazabilidad textual del pasaje.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto griego y el registro auditado en inglés están en alto acuerdo y no muestran revisiones aplicadas; esta propuesta mantiene ese estado, con una solución española natural para la cadena genealógica y con el nombre Καϊνάμ preservado en el texto principal.
  spanish_consistency_notes:
  - Se usó 'Matusalén', 'Enoc', 'Jared', 'Mahalaleel' y 'Cainán' por consistencia con transliteraciones bíblicas usuales en español.
  - La serie de 'de' evita introducir 'hijo de' donde el español puede expresar la filiación de modo más idiomático sin perder el sentido.
  - Se mantuvo la nota sobre Cainán para reflejar la tensión textual/documental indicada por el auditor en inglés.
