lexical_decisions:
- source_word: τοῦ
  english_pob_choice: the son of
  chosen_spanish: del de
  alternatives_spanish:
  - de
  lexicon: BDAG
  rationale: El griego repite el genitivo artículo + nombre como fórmula genealógica continua. En español, para conservar esa cadena sin inventar un sustantivo no presente en el texto, se usa una estructura genitiva breve y repetida. Aunque 'del de' es marcada, aquí mantiene la relación genealógica explícita sin desplazar el peso al traductor; 'de' solo sería más elíptico y menos claro en una lista genealógica aislada.
- source_word: Συμεὼν
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Symeón
  lexicon: BDAG
  rationale: Nombre propio bíblico con forma española establecida. Se preserva la transliteración tradicional inteligible en español.
- source_word: Ἰούδα
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judas
  lexicon: BDAG
  rationale: En este contexto genealógico, el nombre corresponde mejor a la forma semítica 'Judá' que a 'Judas', evitando una asociación engañosa con Judas Iscariote y reflejando la decisión auditada del POB en inglés.
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: BDAG
  rationale: Forma española corriente y bíblicamente reconocible del nombre propio.
- source_word: Ἰωνὰμ
  english_pob_choice: Jonam
  chosen_spanish: Jonam
  alternatives_spanish:
  - Jonán
  lexicon: BDAG
  rationale: Se conserva la forma consonante con el texto griego SBLGNT 'Ἰωνάμ'. 'Jonán' representa otra tradición textual/formal, pero aquí la forma base es 'Jonam'.
- source_word: Ἐλιακὶμ
  english_pob_choice: Eliakim
  chosen_spanish: Eliaquim
  alternatives_spanish:
  - Eliakim
  lexicon: BDAG
  rationale: Nombre semítico propio transliterado al español con adaptación ortográfica habitual. 'Eliaquim' comunica mejor la pronunciación en español que la forma inglesa 'Eliakim'.
translation_notes:
  revision_awareness: La revisión anterior falló porque los marcadores de nota no aparecían en el texto. Esta versión ancla [a] en 'Simeón' y [b] en 'Jonam', manteniendo las notas solo donde están señaladas.
  spanish_consistency_notes:
  - Se mantiene la cadena genealógica con repeticiones de 'de' para reflejar el genitivo griego sin añadir palabras ajenas al contenido.
  - Se usa 'Judá' conforme a la decisión auditada en inglés para el mismo nombre griego en contexto genealógico.
  - No se introducen títulos eclesiásticos ni equivalentes interpretativos ajenos al mero linaje.
  - Los nombres propios siguen formas españolas bíblicas comunes cuando existen y son inteligibles.
