translation:
  language: es
  text: el hijo de Jesé, el hijo de Obed[a], el hijo de Booz, el hijo de Sala[b], el hijo de Naasón,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma griega aquí corresponde tradicionalmente a «Obed».
    reason: alternative_reading
  - marker: b
    text: Sala corresponde a la forma griega del nombre; la tradición a veces lo identifica con Salmón.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ
  english_pob_choice: the son of
  chosen_spanish: el hijo de
  alternatives_spanish:
  - de
  lexicon: BDAG
  rationale: En la genealogía, el genitivo repetido funciona de manera elíptica para continuar la relación genealógica. En español, «el hijo de» expresa de forma clara y natural esa relación, sin dejar una cadena genitiva opaca.
- source_word: Ἰεσσαὶ
  english_pob_choice: Jesse
  chosen_spanish: Jesé
  alternatives_spanish:
  - Jesse
  lexicon: BDAG
  rationale: Para el nombre bíblico Ἰεσσαί, «Jesé» es la forma española establecida y corresponde al personaje veterotestamentario conocido en español.
- source_word: Ἰωβὴλ
  english_pob_choice: Obed
  chosen_spanish: Obed
  alternatives_spanish:
  - Jobed
  - Iobed
  lexicon: BDAG
  rationale: El contexto genealógico identifica esta forma griega con Obed. Aunque el griego de Lucas refleja Ἰωβήλ, en español la forma tradicional y más reconocible es «Obed», que preserva la identificación bíblica usual.
- source_word: Βόος
  english_pob_choice: Boaz
  chosen_spanish: Booz
  alternatives_spanish:
  - Boaz
  lexicon: BDAG
  rationale: La forma griega Βόος se puede representar en español con «Booz», una transliteración tradicional y plenamente inteligible en contexto bíblico. También existe «Boaz», pero «Booz» refleja mejor la forma gráfica recibida en la tradición castellana.
- source_word: Σαλὰ
  english_pob_choice: Sala
  chosen_spanish: Sala
  alternatives_spanish:
  - Salmón
  - Salah
  lexicon: BDAG
  rationale: La forma griega es Σαλά; «Sala» mantiene la proximidad al texto fuente. La identificación tradicional con Salmon puede anotarse aparte, pero no debe sustituir la lectura griega en el texto principal sin base textual directa.
- source_word: Ναασσὼν
  english_pob_choice: Nahshon
  chosen_spanish: Naasón
  alternatives_spanish:
  - Naassón
  - Nahshon
  lexicon: BDAG
  rationale: Para Ναασσών, «Naasón» es una forma española clara y cercana a la pronunciación del nombre bíblico. «Nahshon» es una transliteración más próxima al inglés, pero menos natural para el español.
translation_notes:
  revision_awareness: El audit trail inglés conserva notas para formas tradicionales equivalentes (Obed, Salmon/Salmón). Aquí se prioriza la cercanía al griego cuando la forma española resultante sigue siendo natural, y se adopta la forma castellana establecida para nombres bíblicos donde corresponde. No hay decisiones teológicas en este versículo.
  spanish_consistency_notes:
  - Se mantuvo la estructura genealógica repetida con «el hijo de» para toda la cadena.
  - 'Se usó puntuación simple y fluida en español: coma entre miembros de la genealogía y punto final.'
  - Se reservaron las notas para aclarar equivalencias tradicionales sin reemplazarlas en el texto principal.
