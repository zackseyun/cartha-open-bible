translation:
  language: es
  text: 'Y les dijo: «No cobren más de lo que se les ha ordenado[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «No hagan nada más de lo que se les ha ordenado». El verbo se refiere específicamente a su actividad de cobro de impuestos en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: And he
  chosen_spanish: Y les dijo
  alternatives_spanish:
  - Pero les dijo
  - Entonces les dijo
  lexicon: BDAG
  rationale: δέ funciona como un conector narrativo leve. En español, «Y» mantiene la continuidad del relato sin cargar contraste que el contexto no exige.
- source_word: εἶπεν πρὸς αὐτούς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - dijo a ellos
  lexicon: BDAG
  rationale: La combinación de λέγω con πρός + dativo se expresa naturalmente en español con «les dijo». Conserva la sencillez y la relación directa del discurso.
- source_word: Μηδὲν πλέον
  english_pob_choice: Collect no more
  chosen_spanish: No hagan nada más
  alternatives_spanish:
  - No hagan más
  - No recojan nada más
  lexicon: BDAG
  rationale: El griego prohíbe exceso en la acción implícita; en español conviene conservar el valor general de prohibición. Como el verbo está implícito en el contexto de los recaudadores, «No hagan nada más» preserva la amplitud gramatical sin forzar un objeto no explicitado en el texto base.
- source_word: παρὰ τὸ διατεταγμένον ὑμῖν
  english_pob_choice: than what has been ordered for you
  chosen_spanish: que lo que se les ha ordenado
  alternatives_spanish:
  - que lo que se les ha prescrito
  - que lo autorizado para ustedes
  lexicon: BDAG
  rationale: διατεταγμένον, participio pasivo perfecto de διατάσσω, expresa lo que ha sido ordenado o dispuesto oficialmente. «Se les ha ordenado» conserva la voz pasiva y el matiz reglamentario.
- source_word: πράσσετε
  english_pob_choice: Collect
  chosen_spanish: hagan
  alternatives_spanish:
  - recauden
  - cobren
  lexicon: BDAG
  rationale: Aunque el contexto inmediato habla de recaudadores de impuestos, el verbo πράσσω es amplio y no nombra explícitamente el objeto en la forma griega. Para no añadir un objeto que el griego no verbaliza aquí, se opta por una formulación general; el contexto de Lucas 3:12 sigue siendo suficiente para entender la actividad.
theological_decisions:
- issue: Expresión del objeto implícito de la acción en un contexto de recaudación
  english_pob_reading: 'Make the action explicit as tax collection: ''Collect no more than what has been ordered for you.'''
  chosen_spanish_reading: 'Mantener la prohibición en forma general sin explicitar «impuestos»: «No hagan nada más que lo que se les ha ordenado».'
  alternative_spanish_readings:
  - No recauden más de lo que se les ha ordenado.
  - No cobren más de lo que se les ha ordenado.
  rationale: La audiencia de 3:12 hace claro que se trata de recaudadores, pero en este versículo el griego no expresa el objeto de manera directa. En español, explicitar «impuestos» o «recauden» haría más interpretativa la frase. La opción elegida preserva la tensión entre el verbo general y el contexto específico.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El audit trail inglés favorece explicitar la actividad de cobro en razón del contexto inmediato. En esta versión española se decidió conservar la generalidad del mandato para no sobreespecificar un objeto que el griego no nombra, manteniendo al mismo tiempo la referencia contextual a los recaudadores implícita en la escena.
  spanish_consistency_notes:
  - Se mantiene el tono directo y sobrio, adecuado para lectura litúrgica o devocional.
  - Se evita «SEÑOR» o terminología eclesiástica no presente en el versículo.
  - La puntuación con comillas españolas y la ubicación del vocativo indirecto siguen normas estándar del español.
