review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura básica y el sentido de prohibición de exceso, pero no sigue la decisión documentada del POB inglés sobre πράσσετε en este contexto. El griego usa un verbo general ('hacer/practicar'), pero en Lucas 3:12–13 el referente inmediato es la actividad de los recaudadores; por eso el POB inglés explicitó 'Collect'. En español, 'No hagan nada más que...' amplía demasiado el mandato y puede sonar como una prohibición general de toda conducta adicional, no específicamente de cobrar de más.
  spanish_quality_summary: La frase actual es gramatical, pero menos natural y menos precisa para el contexto que una formulación con 'cobren' o 'recauden'. 'No hagan nada más que lo que se les ha ordenado' suena algo torpe y abstracta en español. Una redacción como 'No cobren más de lo que se les ha ordenado' es clara, idiomática y mantiene el sentido regulatorio del participio pasivo.
  glossary_alignment: 'No hay términos teológicos mayores en disputa aquí. El punto clave es la alineación con la decisión contextual del POB sobre πράσσετε: en este contexto debe expresarse la actividad de cobro/recaudación. ''Cobren'' funciona bien en español neutral; ''recauden'' también sería posible, pero ''cobren'' encaja mejor con el objeto implícito y la escena de abuso fiscal.'
  issues:
  - severity: high
    issue: 'El verbo principal se tradujo de forma demasiado general: ''No hagan nada más'' por πράσσετε.'
    rationale: Aunque πράσσω es general léxicamente, el contexto inmediato identifica a los interlocutores como cobradores de impuestos. El POB inglés ya documentó que la actividad debe hacerse explícita por claridad. La versión española actual pierde esa precisión contextual.
  - severity: medium
    issue: La construcción 'nada más que lo que se les ha ordenado' no refleja con suficiente naturalidad el comparativo de exceso Μηδὲν πλέον παρὰ...
    rationale: La idea central es 'no más de lo ordenado/autorizado', no simplemente 'no hagan otra cosa que...'. En español, 'más de lo que se les ha ordenado' comunica mejor la noción de exceso cuantitativo.
  - severity: low
    issue: La nota al pie actual explica solo el conector narrativo y omite la alternativa relevante documentada en el POB inglés.
    rationale: Si se mantiene una nota, la alternativa significativa es la formulación más formal 'No hagan nada más de lo que se les ha ordenado', junto con la aclaración de que el verbo se refiere al cobro de impuestos en contexto. La nota sobre 'Y' no aporta mucho para el lector final.
