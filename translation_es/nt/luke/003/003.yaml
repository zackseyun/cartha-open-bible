translation:
  language: es
  text: Y llegó a toda la región circundante del Jordán[a], proclamando un bautismo de arrepentimiento para el perdón de los pecados[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por toda la región alrededor del Jordán».'
    reason: alternative_reading
  - marker: b
    text: 'O: «predicando» en lugar de «proclamando».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - fue
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι se expresa naturalmente en español con «llegó» en este contexto narrativo. Conserva el movimiento hacia el lugar sin forzar un giro más interpretativo.
- source_word: εἰς πᾶσαν περίχωρον τοῦ Ἰορδάνου
  english_pob_choice: into all the surrounding region of the Jordan
  chosen_spanish: a toda la región circundante del Jordán
  alternatives_spanish:
  - por toda la región alrededor del Jordán
  - en toda la comarca circundante del Jordán
  lexicon: BDAG
  rationale: περίχωρος designa la región o comarca circundante; «región circundante» preserva esa idea. «Toda» refleja πᾶσαν. Se evita una calca rígida de «into» porque en español el verbo de movimiento con destino ya comunica la entrada y el recorrido en el área.
- source_word: κηρύσσων
  english_pob_choice: proclaiming
  chosen_spanish: proclamando
  alternatives_spanish:
  - predicando
  - anunciando
  lexicon: BDAG
  rationale: κηρύσσω expresa proclamación pública de un heraldo. «Proclamando» conserva mejor ese matiz que «predicando», que en español suena más eclesiástico y puede estrechar el sentido.
- source_word: βάπτισμα
  english_pob_choice: baptism
  chosen_spanish: bautismo
  alternatives_spanish:
  - bautizo
  lexicon: BDAG
  rationale: «Bautismo» es la forma estándar y más clara en español bíblico para βάπτισμα. «Bautizo» puede sonar más coloquial o referirse al rito en sentido popular, menos preciso para este registro.
- source_word: μετανοίας
  english_pob_choice: of repentance
  chosen_spanish: de arrepentimiento
  alternatives_spanish:
  - para arrepentimiento
  - de cambio de mente
  lexicon: BDAG
  rationale: El genitivo se vierte de manera directa como «de arrepentimiento», manteniendo la relación estrecha entre bautismo y arrepentimiento. «Cambio de mente» sería demasiado explicativo para este pasaje.
- source_word: εἰς ἄφεσιν ἁμαρτιῶν
  english_pob_choice: for the forgiveness of sins
  chosen_spanish: para el perdón de los pecados
  alternatives_spanish:
  - para la remisión de los pecados
  - hacia el perdón de los pecados
  lexicon: BDAG
  rationale: ἄφεσις puede ser «perdón» o «remisión/soltura». «Perdón de los pecados» es natural en español y conserva el sentido sin imponer una lectura sacramental o meramente simbólica. «Perdón» también mantiene el vínculo directo con ἁμαρτιῶν.
theological_decisions:
- issue: Relación entre bautismo, arrepentimiento y perdón
  english_pob_reading: a baptism of repentance for the forgiveness of sins
  chosen_spanish_reading: un bautismo de arrepentimiento para el perdón de los pecados
  alternative_spanish_readings:
  - un bautismo que expresa arrepentimiento para el perdón de los pecados
  - un bautismo de arrepentimiento que conduce al perdón de los pecados
  rationale: La construcción griega βάπτισμα μετανοίας εἰς ἄφεσιν ἁμαρτιῶν se conserva sin resolver en la traducción si el bautismo es instrumento, signo o declaración respecto del perdón. Así se preserva la tensión teológica documentada por la POB inglesa.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolver debates posteriores en la redacción.'
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al pasaje; la lectura de trabajo coincide con el texto griego SBLGNT y con la auditoría inglesa, sin cambios pendientes indicados en el historial más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Jordán» con mayúscula como nombre propio geográfico.
  - Se eligió «bautismo» y no «bautizo» para sostener el registro bíblico y la consistencia terminológica del proyecto.
  - Se prefirió «proclamando» para κηρύσσων por su valor de anuncio público, en línea con la decisión inglesa.
  - Se usó «perdón» para ἄφεσις porque es el equivalente más natural y claro en español aquí, sin borrar la posibilidad de «remisión» como alternativa semántica.
