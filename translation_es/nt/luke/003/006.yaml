translation:
  language: es
  text: y toda carne verá la salvación de Dios[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la humanidad». El griego dice literalmente «toda carne», eco de Isaías 40:5 y referencia a todas las personas.
    reason: lexical_alternative
  - marker: b
    text: O «la salvación de parte de Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: ὄψεται
  english_pob_choice: will see
  chosen_spanish: verá
  alternatives_spanish:
  - contemplará
  - mirará
  lexicon: BDAG
  rationale: El futuro medio de ὁράω expresa aquí una acción de percepción directa; en español, «verá» conserva la imagen concreta y suena natural y sobrio.
- source_word: πᾶσα σὰρξ
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda humanidad
  - todos
  lexicon: BDAG
  rationale: Se conserva el giro profético literal «toda carne» para mantener la fuerza intertextual con Isaías 40:5 y no aplanar la expresión en una paráfrasis más abstracta.
- source_word: σωτήριον
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - acto salvador
  - liberación
  lexicon: BDAG
  rationale: El sustantivo con artículo se rinde de forma directa como «salvación», que en español comunica bien la amplitud del acto salvador de Dios y preserva el eco isaiano.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - procedente de Dios
  lexicon: BDAG
  rationale: El genitivo se mantiene formalmente como «de Dios», dejando que el contexto exprese tanto posesión como origen sin imponer una paráfrasis interpretativa.
theological_decisions:
- issue: Sentido universal de πᾶσα σὰρξ
  english_pob_reading: 'A universal human scope: all humanity will see God''s salvation.'
  chosen_spanish_reading: 'Un alcance universal humano: toda la humanidad verá la salvación de Dios.'
  alternative_spanish_readings:
  - 'Una lectura más literal y corpórea: toda carne verá la salvación de Dios.'
  rationale: La frase es un modismo bíblico que, en contexto de cita de Isaías, se refiere a todos los seres humanos. La traducción principal conserva el modismo en el texto y aclara su sentido universal en la nota.
  doctrine_reference: 'DOCTRINE.md: mantener tensión semántica de σάρξ y priorizar el primado del texto original'
- issue: Genitivo en τὸ σωτήριον τοῦ θεοῦ
  english_pob_reading: the salvation of God
  chosen_spanish_reading: la salvación de Dios
  alternative_spanish_readings:
  - la salvación que viene de Dios
  - la salvación procedente de Dios
  rationale: La forma española «de Dios» reproduce la construcción griega sin decidir de antemano si el matiz principal es posesión, origen o ambas cosas.
  doctrine_reference: BDAG; nota POB sobre genitivo formal con posible valor de fuente
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios. La decisión clave mantenida es conservar el giro literal «toda carne» en el texto principal, con aclaración del alcance humano en la nota.'
  spanish_consistency_notes:
  - Se mantiene el término «Dios» para θεός, conforme al criterio del proyecto.
  - Se conserva el sustantivo «salvación» para σωτήριον, en armonía con el audit trail inglés.
  - El registro es sobrio y publicable, sin calco innecesario ni paráfrasis excesiva.
  - Los marcadores de nota [a][b] aparecen exactamente donde corresponden en el texto principal.
