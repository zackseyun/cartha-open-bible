lexical_decisions:
- source_word: τοῦ
  english_pob_choice: the son of
  chosen_spanish: de
  alternatives_spanish:
  - hijo de
  lexicon: BDAG
  rationale: En la cadena genealógica de Lucas, el genitivo repetido funciona de modo elíptico. En español, una simple secuencia de ‘de’ refleja con naturalidad la relación genealógica sin añadir palabras que el griego aquí no expresa de forma explícita.
- source_word: Μελεὰ
  english_pob_choice: Melea
  chosen_spanish: Meleá
  alternatives_spanish:
  - Melea
  lexicon: BDAG
  rationale: Se conserva la transliteración del nombre propio con acentuación española para facilitar la lectura. La forma base corresponde directamente al griego Μελεά.
- source_word: Μεννὰ
  english_pob_choice: Menna
  chosen_spanish: Menna
  alternatives_spanish:
  - Menán
  lexicon: BDAG
  rationale: La forma griega Μεννά se translitera de manera directa como ‘Menna’. Se evita la variante ‘Menán’ porque el texto fuente dado respalda ‘Menna’.
- source_word: Ματταθὰ
  english_pob_choice: Mattatha
  chosen_spanish: Matata
  alternatives_spanish:
  - Mattata
  lexicon: BDAG
  rationale: El nombre propio se adapta por transliteración directa. En español, ‘Matata’ reproduce de forma clara la secuencia consonántica y vocálica del griego Ματταθά sin forzar una forma inglesa intermedia.
- source_word: Ναθὰμ
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Nathan
  lexicon: BDAG
  rationale: Aunque el griego presenta Ναθάμ, en español bíblico la forma reconocible y establecida es ‘Natán’. Esta elección mantiene la identificación del nombre propio sin introducir una paráfrasis.
- source_word: Δαυὶδ
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - Dauid
  lexicon: BDAG
  rationale: El nombre propio se conserva en su forma bíblica normalizada en español, ‘David’, que es la transliteración tradicional y plenamente inteligible.
theological_decisions:
- issue: Cadena genealógica elíptica
  english_pob_reading: Supply 'the son of' for each genitive name in English.
  chosen_spanish_reading: Mantener la cadena breve con ‘de’ para cada nombre.
  alternative_spanish_readings:
  - ‘hijo de’ repetido en cada eslabón
  - ‘de Meleá, de Menna, de Matata…’ sin marcar la relación implícita
  rationale: El griego ofrece una sucesión de genitivos dentro de una genealogía ya establecida. En español, repetir ‘hijo de’ haría la línea más pesada sin aportar contenido adicional; ‘de’ conserva la relación genealógica implícita y respeta la economía del original.
  doctrine_reference: Translación funcional de genealogías bíblicas; equivalencia óptima sin expandir innecesariamente el texto.
translation_notes:
  revision_awareness: El texto griego y el contexto de la genealogía lucana coinciden plenamente con la lectura del audit trail en inglés; no se requiere corrección textual ni ajuste doctrinal adicional. La principal decisión fue cómo transparentar en español la relación elíptica de la cadena genealógica sin sobreexplicar.
  spanish_consistency_notes:
  - Se mantuvo ‘David’ para concordar con el uso bíblico estándar en español.
  - Se optó por ‘de’ en lugar de ‘hijo de’ para conservar la concisión genealógica del griego.
  - Los nombres propios se transliteraron en formas breves y legibles, evitando soluciones anglicadas innecesarias.
