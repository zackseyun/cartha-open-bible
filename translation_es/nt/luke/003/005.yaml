translation:
  language: es
  text: Todo valle será llenado[a], y todo monte y collado será rebajado, y lo torcido se hará recto[b], y lo áspero, en caminos llanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo barranco será llenado ... lo torcido se hará recto, y lo áspero, en caminos llanos».'
    reason: lexical_alternative
  - marker: b
    text: Esta línea hace eco de Isaías 40:4 y usa la imagen de preparar el camino del Señor.
    reason: cross_reference
lexical_decisions:
- source_word: πᾶσα φάραγξ
  english_pob_choice: Every valley
  chosen_spanish: Todo valle
  alternatives_spanish:
  - Toda hondonada
  - Todo barranco
  - Toda quebrada
  lexicon: BDAG
  rationale: φάραγξ puede referirse a valle, barranco o desfiladero. En español, «valle» conserva la imagen topográfica natural y sigue siendo claro en el contexto profético de nivelación.
- source_word: πληρωθήσεται
  english_pob_choice: will be filled
  chosen_spanish: será llenado
  alternatives_spanish:
  - será colmado
  - será rellenado
  lexicon: BDAG
  rationale: El futuro pasivo de πληρόω comunica llenado de un relieve o hueco. «Será llenado» reproduce con naturalidad la imagen física del terreno sin introducir matices ajenos.
- source_word: πᾶν ὄρος καὶ βουνός
  english_pob_choice: every mountain and hill
  chosen_spanish: todo monte y collado
  alternatives_spanish:
  - todo monte y colina
  - toda montaña y cerro
  lexicon: BDAG
  rationale: Se preserva la doble referencia a dos elevaciones distintas. «Monte y collado» es natural en español bíblico y mantiene la distinción entre altura mayor y menor.
- source_word: ταπεινωθήσεται
  english_pob_choice: will be made low
  chosen_spanish: será rebajado
  alternatives_spanish:
  - será humillado
  - será abatido
  lexicon: BDAG
  rationale: En este contexto topográfico, ταπεινόω expresa descenso o rebajamiento físico. «Será rebajado» conserva la imagen concreta y también permite el eco profético.
- source_word: τὰ σκολιὰ
  english_pob_choice: the crooked places
  chosen_spanish: lo torcido
  alternatives_spanish:
  - las cosas torcidas
  - los lugares torcidos
  - los caminos torcidos
  lexicon: BDAG
  rationale: El neutro plural funciona de modo sustantivado. «Lo torcido» es una solución breve y fiel que evita forzar un sustantivo no explicitado por el griego.
- source_word: εἰς εὐθείαν
  english_pob_choice: will become straight
  chosen_spanish: se hará recto
  alternatives_spanish:
  - se volverá recto
  - se enderezará
  - quedará recto
  lexicon: BDAG
  rationale: La construcción expresa resultado o transformación hacia rectitud. «Se hará recto» mantiene la idea de hacerse recto sin añadir la noción de un camino específico que el griego todavía no nombra.
- source_word: αἱ τραχεῖαι
  english_pob_choice: the rough ways
  chosen_spanish: los caminos ásperos
  alternatives_spanish:
  - los lugares ásperos
  - las sendas ásperas
  - las vías ásperas
  lexicon: BDAG
  rationale: La forma femenina plural se usa sustantivamente y apunta a tramos difíciles de transitar. «Caminos ásperos» transmite la dificultad del terreno y prepara la expresión siguiente con ὁδοὺς.
- source_word: εἰς ὁδοὺς λείας
  english_pob_choice: smooth roads
  chosen_spanish: caminos lisos
  alternatives_spanish:
  - caminos suaves
  - sendas lisas
  - caminos planos
  lexicon: BDAG
  rationale: ὁδοὺς está explícito y λείας significa llanos/suaves/lisos. «Caminos lisos» conserva el paralelo con «caminos ásperos» y la imaginería de preparación de vías.
theological_decisions:
- issue: Imaginería profética y cita de Isaías 40:4 en Lucas 3:5
  english_pob_reading: Retain the concrete terrain-and-road imagery rather than paraphrasing it into purely moral or spiritual language.
  chosen_spanish_reading: Se conserva la imagen concreta de terreno y caminos, sin convertirla en una paráfrasis moralizante.
  alternative_spanish_readings:
  - Interpretar el pasaje como «los humildes serán exaltados y los soberbios humillados»
  - Reformularlo como una exhortación espiritual general
  rationale: El griego de Lucas presenta una cita profética con lenguaje material de nivelación de terreno. Traducirla de forma concreta mantiene la fuerza poética y no adelanta una interpretación que el texto no formula aquí.
  doctrine_reference: Principios de traducción 1, 3 y 6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; esta versión sigue de cerca la imagen topográfica y el paralelismo poético del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preservó el paralelismo de dos miembros con «caminos ásperos» / «caminos lisos» para reflejar αἱ τραχεῖαι ... εἰς ὁδοὺς λείας.
  - Se evitó sustituir la imagen física por una lectura alegórica, conforme al audit trail inglés.
