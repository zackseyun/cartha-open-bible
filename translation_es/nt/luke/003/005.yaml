- from: Todo valle será llenado[a], y todo monte y collado será rebajado, y lo torcido se hará recto[b], y los caminos ásperos, caminos lisos.
  to: Todo valle será llenado[a], y todo monte y collado será rebajado, y lo torcido se hará recto[b], y lo áspero, en caminos llanos.
  rationale: Se ajusta la última cláusula para reflejar mejor la estructura del griego, que primero usa un adjetivo sustantivado («las cosas ásperas») y luego introduce «caminos». También se cambia «lisos» por «llanos» por mayor naturalidad y mejor ajuste a la imaginería de nivelación vial. La nota b corrige una forma no estándar del español.
