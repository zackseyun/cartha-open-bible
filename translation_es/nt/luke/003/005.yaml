    rationale: Aunque «liso» es posible, para preparación de caminos «llanos» o «allanados» comunica mejor el sentido vial/topográfico de λείας y evita una lectura de textura superficial.
  - severity: low
    issue: 'La nota b contiene una forma no estándar: «ecoa»'
    rationale: En español neutro y ampliamente legible conviene «hace eco de Isaías 40:4» o «evoca Isaías 40:4».
