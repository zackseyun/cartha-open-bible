revisions:
- from: En el año quince[a] del reinado de Tiberio César, cuando Poncio Pilato gobernaba Judea, y Herodes era tetrarca de Galilea, y su hermano Felipe era tetrarca de la región de Iturea y Traconítide, y Lisanias era tetrarca de Abilene[b],
  to: En el año decimoquinto[a] del reinado de Tiberio César, mientras Poncio Pilato gobernaba Judea, y Herodes era tetrarca de Galilea, y Felipe, su hermano, era tetrarca de la región de Iturea y Traconítide, y Lisanias era tetrarca de Abilene[b],
  rationale: Se corrige el ordinal temporal para alinearlo con πεντεκαιδεκάτῳ y con el POB inglés, se ajusta 'cuando' a 'mientras' para reflejar mejor el genitivo absoluto, y se reordena la apposición de Felipe para mayor claridad y cercanía al original. No se requieren cambios teológicos ni adjudicación especial.
