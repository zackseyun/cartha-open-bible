translation:
  language: es
  text: En el año decimoquinto[a] del reinado de Tiberio César, mientras Poncio Pilato gobernaba Judea, y Herodes era tetrarca de Galilea, y Felipe, su hermano, era tetrarca de la región de Iturea y Traconítide, y Lisanias era tetrarca de Abilene[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «durante el año decimoquinto».'
    reason: lexical_alternative
  - marker: b
    text: «Tetrarca» era un gobernante regional bajo autoridad romana.
    reason: cultural_note
lexical_decisions:
- source_word: Ἐν ἔτει δὲ πεντεκαιδεκάτῳ
  english_pob_choice: in the fifteenth year
  chosen_spanish: En el año quince
  alternatives_spanish:
  - Durante el año quince
  - En el decimoquinto año
  lexicon: BDAG
  rationale: La construcción temporal se expresa de forma natural en español con 'En el año quince'. Mantiene el marco cronológico sin forzar una literalidad pesada. 'Decimoquinto año' también es posible, pero 'año quince' suena más idiomático en este contexto.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: —
  alternatives_spanish:
  - Ahora
  - Entonces
  - Y
  lexicon: BDAG
  rationale: Aquí δέ funciona como transición narrativa ligera. En español, introducir 'Ahora' o 'Entonces' sonaría innecesario; por eso se omite explícitamente y se conserva el flujo histórico del versículo.
- source_word: τῆς ἡγεμονίας Τιβερίου Καίσαρος
  english_pob_choice: of the reign of Tiberius Caesar
  chosen_spanish: del reinado de Tiberio César
  alternatives_spanish:
  - del gobierno de Tiberio César
  - del mandato de Tiberio César
  lexicon: BDAG
  rationale: '''Reinado'' reproduce bien ἡγεμονία cuando se refiere al ejercicio de poder imperial. ''Gobierno'' o ''mandato'' son posibles, pero ''reinado'' es más preciso y natural con ''César''.'
- source_word: ἡγεμονεύοντος Ποντίου Πιλάτου τῆς Ἰουδαίας
  english_pob_choice: while Pontius Pilate was governing Judea
  chosen_spanish: cuando Poncio Pilato gobernaba Judea
  alternatives_spanish:
  - mientras Poncio Pilato gobernaba Judea
  - cuando Poncio Pilato era gobernador de Judea
  lexicon: BDAG
  rationale: El participio de genitivo absoluto se vierte con una subordinada temporal natural en español. 'Gobernaba' conserva el valor verbal; 'era gobernador de' convertiría la forma verbal en un título estático.
- source_word: τετρααρχοῦντος
  english_pob_choice: was tetrarch of
  chosen_spanish: era tetrarca de
  alternatives_spanish:
  - gobernaba como tetrarca de
  - era gobernante de
  lexicon: BDAG
  rationale: Se mantiene el título técnico 'tetrarca' para no diluir la especificidad histórica. 'Era tetrarca de' refleja el participio sin explicar de más ni sustituir el cargo por un genérico.
- source_word: Φιλίππου δὲ τοῦ ἀδελφοῦ αὐτοῦ
  english_pob_choice: Philip his brother
  chosen_spanish: su hermano Felipe
  alternatives_spanish:
  - Felipe, su hermano
  - Felipe, hermano de Herodes
  lexicon: BDAG
  rationale: En español, 'su hermano Felipe' expresa con naturalidad la relación de parentesco y evita una repetición pesada. La referencia pronominal sigue apuntando a Herodes, como en el contexto griego.
- source_word: τῆς Ἰτουραίας καὶ Τραχωνίτιδος χώρας
  english_pob_choice: the region of Iturea and Trachonitis
  chosen_spanish: de la región de Iturea y Traconítide
  alternatives_spanish:
  - de Iturea y Traconítide
  - del territorio de Iturea y Traconítide
  lexicon: BDAG
  rationale: χώρας aporta la idea de región/territorio, por lo que se traduce explícitamente como 'región'. 'Traconítide' conserva el nombre geográfico con la adaptación habitual al español.
- source_word: Λυσανίου τῆς Ἀβιληνῆς τετρααρχοῦντος
  english_pob_choice: Lysanias was tetrarch of Abilene
  chosen_spanish: Lisanias era tetrarca de Abilene
  alternatives_spanish:
  - Lisanias gobernaba Abilene como tetrarca
  - Lisanias era gobernante de Abilene
  lexicon: BDAG
  rationale: Se conserva el título 'tetrarca' y el topónimo 'Abilene' para mantener la especificidad histórica y geográfica. 'Lisanias' sigue la transliteración habitual en español.
theological_decisions:
- issue: Tratamiento del título político τετρααρχοῦντος
  english_pob_reading: Translate as 'was tetrarch of' rather than generalizing to 'ruled' or 'was ruler of.'
  chosen_spanish_reading: Traducir como 'era tetrarca de' en lugar de generalizar a 'gobernaba' o 'era gobernante de'.
  alternative_spanish_readings:
  - gobernaba como tetrarca de
  - era gobernante de
  rationale: No es una cuestión doctrinal sino histórica, pero conservar el título evita aplanar el texto y respeta la precisión del original y del POB inglés. Además, 'tetrarca' es inteligible en un registro bíblico contemporáneo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador sigue la última pasada revisada del inglés POB, sin cambios significativos reportados en el audit trail. Se mantiene la alta concordancia con la revisión y no hay variantes textuales adicionales que afecten el español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca, aunque este versículo no lo contiene.
  - Se conserva 'tetrarca' como título técnico para alinearse con la precisión histórica del POB.
  - Se usa 'región' para χώρας, evitando reducir el término a un simple genitivo omitido.
  - La puntuación reproduce una sola oración larga, como en el griego y el inglés auditado.
