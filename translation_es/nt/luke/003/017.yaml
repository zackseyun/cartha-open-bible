base_translation:
  language: en
  yaml_path: translation/nt/luke/003/017.yaml
  text: His winnowing fork is in his hand to thoroughly clear his threshing floor and to gather the wheat into his storehouse[c][b][a], but the chaff he will burn up with unquenchable fire.
  footnotes:
