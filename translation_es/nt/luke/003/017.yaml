review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la sintaxis y la imagen agrícola del griego: el instrumento en la mano, la limpieza de la era, la recolección del trigo y la quema del residuo con fuego no apagable. Sin embargo, hay dos desajustes léxicos importantes frente al griego y al rastro de auditoría POB: ἄχυρον en contexto de aventado se alinea mejor con «tamo»/«paja menuda»/«cáscara» que con «paja», y κατακαύσει expresa mejor una quema total que el simple «quemará».'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para mayor precisión agrícola y naturalidad. «Aventador» es entendible pero algo menos preciso como nombre del implemento; «horca de aventar» en nota está bien como alternativa. «Era» funciona. «Granero» es legible, aunque el audit trail favorece una opción más amplia como «almacén». La revisión propuesta mejora precisión sin volver el texto técnico ni rígido.
  glossary_alignment: No hay términos teológicos del glosario global en juego salvo mantener la fuerza de juicio en «fuego inextinguible/inapagable». La revisión conserva esa fuerza. También se alinea mejor con las decisiones léxicas POB para πτύον, ἀποθήκην, ἄχυρον y κατακαύσει.
  issues:
  - severity: medium
    issue: «la paja» para ἄχυρον
    rationale: En el contexto de aventado, ἄχυρον corresponde al residuo liviano separado del grano, más cercano a «tamo» que a «paja». «Paja» sugiere tallos, y el propio audit trail inglés contrasta correctamente «wheat/chaff», no «straw».
  - severity: medium
    issue: «quemará» debilita κατακαύσει
    rationale: El compuesto verbal expresa quemar por completo/consumir. El español puede reflejar mejor esa fuerza con «quemará por completo» o «consumirá».
  - severity: low
    issue: «granero» sobreespecifica ἀποθήκην
    rationale: El griego denota un lugar de almacenamiento en general. «Granero» es posible, pero «almacén» o «depósito» preserva mejor la amplitud del término, en línea con «storehouse».
  - severity: low
    issue: Nota c anclada al lugar menos natural
    rationale: La alternativa «con fuego inapagable» corresponde a la frase completa del sintagma final, por lo que conviene anclarla en esa expresión revisada.
  revised_spanish_text: Su aventador[a] está en su mano para limpiar completamente su era y para recoger el trigo en su almacén[b]; pero el tamo lo quemará por completo con fuego inextinguible[c].
