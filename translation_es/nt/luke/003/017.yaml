translation:
  language: es
  text: Su aventador[a] está en su mano para limpiar completamente su era y para recoger el trigo en su almacén[b]; pero el tamo lo quemará por completo con fuego inextinguible[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «horca de aventar», o, tradicionalmente, «bieldo». El término griego se refiere al instrumento usado para lanzar el grano al aire y separarlo.
    reason: lexical_alternative
  - marker: b
    text: O «granero» o «depósito» para «almacén».
    reason: lexical_alternative
  - marker: c
    text: O «con fuego inapagable».
    reason: lexical_alternative
lexical_decisions:
- source_word: πτύον
  english_pob_choice: winnowing fork
  chosen_spanish: aventador
  alternatives_spanish:
  - horca de aventar
  - bieldo
  - horquilla para aventar
  lexicon: BDAG
  rationale: El implemento agrícola es el usado para aventar el grano y separarlo de la paja. En español, «aventador» comunica esa función sin sugerir de forma engañosa un utensilio doméstico; se preserva así el sentido del término griego y la imagen de separación.
- source_word: διακαθᾶραι
  english_pob_choice: to thoroughly clear
  chosen_spanish: limpiar completamente
  alternatives_spanish:
  - limpiar a fondo
  - purgar por completo
  - aclarar completamente
  lexicon: BDAG
  rationale: El prefijo intensifica la acción de limpiar/depurar. «Limpiar completamente» conserva esa fuerza y suena natural en español dentro de la metáfora de la era.
- source_word: ἅλωνα
  english_pob_choice: threshing floor
  chosen_spanish: era
  alternatives_spanish:
  - era de trillar
  - era de trilla
  - eira
  lexicon: BDAG
  rationale: «Era» es el equivalente agrícola tradicional en español para el lugar donde se trilla y avienta el grano. Mantiene la metáfora sin agregar explicaciones ajenas al texto.
- source_word: συναγαγεῖν
  english_pob_choice: to gather
  chosen_spanish: recoger
  alternatives_spanish:
  - juntar
  - reunir
  - acopiar
  lexicon: BDAG
  rationale: En el contexto del aventado, «recoger» transmite con claridad la acción de reunir el grano aprovechable. Es una forma natural de expresar el movimiento de recolección posterior a la separación.
- source_word: σῖτον
  english_pob_choice: the wheat
  chosen_spanish: el trigo
  alternatives_spanish:
  - el grano
  - el cereal
  lexicon: BDAG
  rationale: Aunque el término puede referirse al grano en general, el contraste con la paja en español se expresa con mucha naturalidad mediante «trigo». Conserva la oposición agrícola que la POB inglesa también explicitó como wheat.
- source_word: ἀποθήκην
  english_pob_choice: storehouse
  chosen_spanish: granero
  alternatives_spanish:
  - depósito
  - almacén
  - bodega
  lexicon: BDAG
  rationale: La palabra griega designa un lugar de almacenamiento. «Granero» comunica bien la imagen agrícola del pasaje y es una alternativa válida a «storehouse» sin forzar una estructura más amplia o más técnica de lo necesario.
- source_word: ἄχυρον
  english_pob_choice: chaff
  chosen_spanish: la paja
  alternatives_spanish:
  - la hojarasca
  - el tamo
  - la cascarilla
  lexicon: BDAG
  rationale: Aunque el término griego en un contexto de aventado puede apuntar al material liviano desechable de la trilla, en español «paja» es la expresión más inmediata y comprensible para el residuo que se quema. Se mantiene la imagen de lo inútil separado del trigo, sin introducir un término demasiado técnico para el lector general.
- source_word: κατακαύσει
  english_pob_choice: he will burn up
  chosen_spanish: quemará
  alternatives_spanish:
  - quemará por completo
  - consumirá por fuego
  - abrasará
  lexicon: BDAG
  rationale: El verbo compuesto expresa quema total. En español, «quemará» funciona de manera idiomática; el adverbio/atributo siguiente («con fuego inextinguible») conserva la idea de consumación irreversible.
- source_word: πυρὶ ἀσβέστῳ
  english_pob_choice: with unquenchable fire
  chosen_spanish: con fuego inextinguible
  alternatives_spanish:
  - con fuego inapagable
  - con fuego que no se puede apagar
  lexicon: BDAG
  rationale: «Inextinguible» reproduce con precisión la noción de un fuego que no puede apagarse. Es un equivalente digno y claro en español, en continuidad con la decisión inglesa de mantener la fuerza del juicio sin suavizarla.
- source_word: οὗ
  english_pob_choice: His
  chosen_spanish: Su
  alternatives_spanish:
  - De él
  - Suya
  lexicon: BDAG
  rationale: El relativo genitivo introduce una descripción del que viene. En español, la posesión se expresa con naturalidad mediante «Su», manteniendo la referencia al personaje sin añadir una construcción pesada como «cuyo».
theological_decisions:
- issue: Imagen de juicio y separación en la metáfora agrícola
  english_pob_reading: The verse depicts the coming one decisively separating the righteous from the wicked, preserving both salvation and judgment imagery without specifying beyond the text how that judgment is finally worked out.
  chosen_spanish_reading: 'El versículo presenta al que viene separando de modo decisivo lo aprovechable de lo inútil: reúne el trigo y quema la paja. La traducción conserva tanto la imagen de salvación/recolección como la de juicio, sin resolver más allá del texto cómo se consumará ese juicio.'
  alternative_spanish_readings:
  - Una lectura puramente temporal del juicio sobre Israel
  - Una formulación más desarrollada de la doctrina del infierno final
  rationale: La metáfora agrícola exige mantener la tensión entre resguardo del trigo y destrucción de la paja. «Fuego inextinguible» conserva el peso del juicio sin convertir el versículo en una sistematización doctrinal que el texto no explicita.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El pasaje coincide con la última pasada auditada como sin cambios; la redacción española se apoya en ese estado estable y adapta las decisiones léxicas inglesas al español sin introducir revisiones no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este versículo porque no aparece ningún referente divino nominal explícito en el texto.
  - Se conserva la imagen agrícola completa con era, trigo y paja para no diluir la metáfora de separación.
  - «Inextinguible» se usa como equivalente estable de un fuego que no puede apagarse, en armonía con la terminología POB.
  - Se prefiere un español natural y público, evitando calcos como «horca de aventar» en el texto principal, pero se preserva la alternativa en nota.
  - La posesión implícita del griego se expresa con pronombres posesivos en español para mantener fluidez sin perder la referencia al sujeto.
