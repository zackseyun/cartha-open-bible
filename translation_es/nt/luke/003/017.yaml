    text: Or 'winnowing shovel' or, traditionally, 'winnowing fan.' The Greek term refers to the implement used to toss grain into the air for separation.
    reason: lexical_alternative
  - marker: b
    text: Or 'barn' or 'granary' for 'storehouse.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with inextinguishable fire.'
    reason: lexical_alternative
