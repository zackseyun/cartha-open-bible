revisions:
- from: Su aventador[a] está en su mano para limpiar completamente su era y para recoger el trigo en su granero[b]; pero la paja la quemará con fuego inextinguible[c].
  to: Su aventador[a] está en su mano para limpiar completamente su era y para recoger el trigo en su almacén[b]; pero el tamo lo quemará por completo con fuego inextinguible[c].
  rationale: Se ajusta ἄχυρον a «tamo» para reflejar mejor el residuo del aventado, se fortalece κατακαύσει con «quemará por completo», y se prefiere «almacén» para ἀποθήκην por su amplitud semántica. Se conservan la claridad, la metáfora agrícola y las alternativas léxicas documentadas por la POB inglesa.
