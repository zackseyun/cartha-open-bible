translation:
  language: es
  text: en el sumo sacerdocio de Anás y Caifás[a], vino la palabra de Dios a Juan, hijo de Zacarías, en la región desierta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «en el sumo sacerdocio de Anás y Caifás». Lucas nombra a ambos hombres aunque el oficio mismo es singular.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπὶ ἀρχιερέως Ἅννα καὶ Καϊάφα
  english_pob_choice: during the high priesthood of Annas and Caiaphas
  chosen_spanish: en el sumo sacerdocio de Anás y Caifás
  alternatives_spanish:
  - durante el sumo sacerdocio de Anás y Caifás
  - en tiempos de Anás y Caifás
  lexicon: BDAG
  rationale: ἐπί con genitivo en marco temporal se expresa de forma natural en español con 'en' + sustantivo de estado/cargo o con 'durante'. 'Sumo sacerdocio' preserva el sustantivo singular de ἀρχιερέως y evita resolver la tensión histórica entre el cargo singular y la mención de dos personas.
- source_word: ἐγένετο ῥῆμα θεοῦ
  english_pob_choice: the word of God came
  chosen_spanish: vino la palabra de Dios
  alternatives_spanish:
  - llegó la palabra de Dios
  - vino a Juan la palabra de Dios
  lexicon: BDAG
  rationale: El idiomático bíblico ἐγένετο ῥῆμα θεοῦ se vierte mejor con un verbo de llegada o irrupción. 'Vino' conserva el carácter eventivo y profético sin volverlo mecánico ni abstracto.
- source_word: ἐπὶ Ἰωάννην
  english_pob_choice: to John
  chosen_spanish: a Juan
  alternatives_spanish:
  - sobre Juan
  - para Juan
  lexicon: BDAG
  rationale: Con verbos de comunicación o revelación, ἐπί + acusativo puede indicar dirección o alcance hacia una persona. 'A Juan' es la forma natural en español y mantiene el movimiento de la palabra hacia él.
- source_word: τὸν Ζαχαρίου υἱὸν
  english_pob_choice: the son of Zechariah
  chosen_spanish: hijo de Zacarías
  alternatives_spanish:
  - el hijo de Zacarías
  - Zacarías' hijo
  lexicon: BDAG
  rationale: La construcción apposicional identifica a cuál Juan se refiere el texto. En español, la forma sin artículo es fluida y fiel; el genitivo de parentesco se expresa claramente con 'hijo de'.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto/la región desértica
  - en la soledad
  lexicon: BDAG
  rationale: Aunque ἔρημος puede abarcar la idea de 'wilderness', en español 'desierto' comunica bien el lugar despoblado y mantiene la resonancia bíblica. No se fuerza una imaginería de arena; el contexto geográfico bíblico hace clara la referencia.
theological_decisions:
- issue: Cómo preservar la tensión entre el singular ἀρχιερέως y la mención de dos nombres
  english_pob_reading: 'Retain the singular institutionally: ''during the high priesthood of Annas and Caiaphas'''
  chosen_spanish_reading: 'Conservar el singular institucional: ''en el sumo sacerdocio de Anás y Caifás'''
  alternative_spanish_readings:
  - cuando Anás y Caifás eran sumos sacerdotes
  - durante el sumo sacerdocio de Anás y Caifás
  rationale: El griego nombra a dos personas mientras usa un singular para el oficio. La traducción mantiene esa tensión en vez de armonizarla, preservando el dato literario e histórico sin explicarlo dentro del texto principal.
  doctrine_reference: Preservar la tensión histórica/textual sin armonización implícita.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el expediente auditado en inglés, sin cambios de sentido respecto al último pase revisado; conserva la tensión sobre el cargo singular y mantiene el giro profético estándar de 'vino la palabra de Dios'.
  spanish_consistency_notes:
  - Se usa 'Anás' y 'Caifás' con acentuación castellana habitual para nombres propios bíblicos.
  - '''Palabra de Dios'' conserva el término profético tradicional sin sustituirlo por una paráfrasis.'
  - '''Desierto'' se eligió como equivalente bíblico común para ἔρημος; no implica necesariamente arena, sino lugar despoblado o apartado.'
  - Se prefirió 'sumo sacerdocio' para respetar el singular del griego y la cronología narrativa.
