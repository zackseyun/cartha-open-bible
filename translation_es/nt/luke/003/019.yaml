translation:
  language: es
  text: Pero Herodes el tetrarca, siendo reprendido[a] por él[b] acerca de Herodías, la mujer de su hermano, y acerca de todas las maldades que Herodes había hecho,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siendo reprobado» o «siendo expuesto». El participio griego puede llevar el sentido de censura moral o de exposición de la conducta incorrecta.
    reason: lexical_alternative
  - marker: b
    text: El pronombre griego dice literalmente «por él»; el referente es Juan en el contexto inmediato, pero se mantiene la forma pronominal en el texto principal.
    reason: source_note
lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Y
  lexicon: BDAG
  rationale: «Pero» expresa bien el contraste narrativo inicial y es natural en español contemporáneo sin perder el valor discursivo de δέ.
- source_word: Ἡρῴδης ὁ τετραάρχης
  english_pob_choice: Herod the tetrarch
  chosen_spanish: Herodes el tetrarca
  alternatives_spanish:
  - Herodes el gobernador de la cuarta parte
  - Herodes, gobernante de distrito
  lexicon: BDAG
  rationale: Se conserva el título histórico-político específico. «Tetrarca» es más fiel y reconocido en contexto bíblico que una paráfrasis explicativa.
- source_word: ἐλεγχόμενος
  english_pob_choice: being rebuked
  chosen_spanish: siendo reprendido
  alternatives_spanish:
  - siendo reprobado
  - siendo expuesto
  lexicon: BDAG
  rationale: «Reprendido» transmite la censura moral del participio mejor que un equivalente más forense como «expuesto» y suena natural en español.
- source_word: ὑπ’ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - por Juan
  lexicon: BDAG
  rationale: Se mantiene el pronombre, como en el griego y en el POB inglés, sin explicitar el referente en el texto principal.
- source_word: περὶ Ἡρῳδιάδος
  english_pob_choice: concerning Herodias
  chosen_spanish: acerca de Herodías
  alternatives_spanish:
  - en cuanto a Herodías
  - sobre Herodías
  lexicon: BDAG
  rationale: «Acerca de» preserva la estructura repetida con περί y es claro en español formal.
- source_word: τῆς γυναικὸς τοῦ ἀδελφοῦ αὐτοῦ
  english_pob_choice: his brother’s wife
  chosen_spanish: la mujer de su hermano
  alternatives_spanish:
  - la esposa de su hermano
  - la mujer del hermano de él
  lexicon: BDAG
  rationale: Se mantiene la cadena genitiva de forma transparente. «Mujer» sigue de cerca el griego y evita una leve modernización interpretativa de «esposa».
- source_word: καὶ περὶ πάντων ὧν ἐποίησεν πονηρῶν
  english_pob_choice: and concerning all the evil things Herod had done
  chosen_spanish: y acerca de todas las maldades que Herodes había hecho
  alternatives_spanish:
  - y acerca de todas las cosas malas que Herodes había hecho
  - y acerca de todos los males que Herodes había cometido
  lexicon: BDAG
  rationale: «Maldades» recoge el plural sustantivado de πονηρῶν y preserva el valor moral fuerte del texto mejor que una formulación genérica como «cosas malas».
- source_word: πᾶν/πάντων ... πονηρῶν
  english_pob_choice: all the evil things
  chosen_spanish: todas las maldades
  alternatives_spanish:
  - todos los males
  - todas las cosas perversas
  lexicon: BDAG
  rationale: El plural de πονηρῶν se refleja mejor con un sustantivo plural español; «maldades» conserva la fuerza ética y la colectividad de las acciones.
theological_decisions:
- issue: Alcance moral de la reprensión de Juan
  english_pob_reading: being rebuked preserves the moral censure without adding legal commentary.
  chosen_spanish_reading: siendo reprendido conserva la censura moral sin convertirla en una acusación jurídica o doctrinal más amplia.
  alternative_spanish_readings:
  - siendo reprobado
  - siendo expuesto
  rationale: El versículo presenta una crítica profética a la conducta de Herodes. «Reprendido» comunica esa censura sin ampliar indebidamente el sentido del participio.
  doctrine_reference: 'Translation philosophy: preserve the plain source sense without importing doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje griego SBLGNT y concuerda con el audit trail inglés: mantiene el título técnico «tetrarca», conserva el pronombre de agente en ὑπ’ αὐτοῦ, reproduce la repetición de περί con «acerca de», y refleja el plural moral de πονηρῶν mediante «maldades». No hay revisiones aplicadas en el expediente inglés, y el estado de concordancia final es de alta coincidencia.'
  spanish_consistency_notes:
  - Se usa «Herodes» con inicial mayúscula y «tetrarca» en minúscula por tratarse de un título común.
  - Se evitó «SEÑOR» o cualquier terminología no pertinente; el pasaje no contiene vocabulario divino.
  - «Reprendido» y «maldades» mantienen un registro bíblico claro sin recurrir a un calco torpe.
  - La puntuación conserva el flujo de una sola oración, como en el griego y en el inglés auditado.
