translation:
  language: es
  text: 'Juan les respondió a todos[a], diciendo: «Yo, por mi parte, bautizo con agua; pero viene uno más fuerte que yo[b], y no soy digno de desatar la correa de sus sandalias. Él los bautizará en el Espíritu Santo y fuego[c][d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con agua». El dativo griego puede expresar medio o elemento aquí.
    reason: lexical_alternative
  - marker: b
    text: O «el que es más poderoso que yo».
    reason: lexical_alternative
  - marker: c
    text: O «con el Espíritu Santo y fuego». El griego dice «en el Espíritu Santo y fuego», y el matiz exacto de la preposición puede entenderse de más de una manera.
    reason: lexical_alternative
  - marker: d
    text: «Fuego» puede entenderse como purificador, como juicio, o como parte de una sola imagen de bautismo en Espíritu-y-fuego; la traducción deja la expresión tal como está.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίνατο ⸂λέγων πᾶσιν
  english_pob_choice: answered them all, saying
  chosen_spanish: les respondió a todos, diciendo
  alternatives_spanish:
  - respondió a todos
  - contestó a todos, diciendo
  lexicon: BDAG
  rationale: ἀποκρίνομαι con λέγων funciona como fórmula narrativa; en español, «les respondió a todos, diciendo» conserva la respuesta y la introducción de cita de manera natural. «Les» explicita el dativo plural de πᾶσιν en el contexto.
- source_word: Ἐγὼ μὲν
  english_pob_choice: I indeed
  chosen_spanish: Yo, por mi parte
  alternatives_spanish:
  - Yo en verdad
  - Yo ciertamente
  lexicon: BDAG
  rationale: μέν marca contraste con el que viene. «Por mi parte» transmite bien el matiz contrastivo y evita un calco duro; conserva la contraposición con el siguiente miembro.
- source_word: ὕδατι
  english_pob_choice: with water
  chosen_spanish: con agua
  alternatives_spanish:
  - en agua
  lexicon: BDAG
  rationale: El dativo aquí puede expresar medio o elemento. «Con agua» es la opción idiomática en español y mantiene la relación instrumental que el texto permite.
- source_word: βαπτίζω / βαπτίσει
  english_pob_choice: baptize / will baptize
  chosen_spanish: bautizo / bautizará
  alternatives_spanish:
  - inmerjo / sumergirá
  - bautizo / sumergirá
  lexicon: BDAG
  rationale: «Bautizar» es el equivalente estándar en este contexto narrativo y evita introducir una especificación sectaria que el verso no impone. Mantiene la continuidad terminológica con el campo semántico del pasaje.
- source_word: ὁ ἰσχυρότερός μου
  english_pob_choice: one stronger than I
  chosen_spanish: uno más fuerte que yo
  alternatives_spanish:
  - uno más poderoso que yo
  - el más fuerte que yo
  lexicon: BDAG
  rationale: El comparativo ἰσχυρότερος se rinde de forma directa con «más fuerte». «Uno» preserva el sustantivo implícito y mantiene el contraste personal con Juan.
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - está por venir
  lexicon: BDAG
  rationale: El presente griego tiene fuerza inminente o vividness; «viene» suena natural en español y conserva esa inmediatez sin sobreexplicar el tiempo.
- source_word: οὗ οὐκ εἰμὶ ἱκανὸς
  english_pob_choice: whose ... I am not worthy
  chosen_spanish: de quien no soy digno
  alternatives_spanish:
  - a quien no soy digno
  - de quien no soy suficiente
  lexicon: BDAG
  rationale: ἱκανός en esta fórmula de humildad expresa indignidad/inadecuación. «Digno» es la forma más natural y fiel en español bíblico para este dicho.
- source_word: λῦσαι τὸν ἱμάντα τῶν ὑποδημάτων αὐτοῦ
  english_pob_choice: to untie his sandal strap
  chosen_spanish: de desatar la correa de su sandalia
  alternatives_spanish:
  - de desatar la tira de su sandalia
  - de aflojar la correa de sus sandalias
  lexicon: BDAG
  rationale: ἱμάντα es una correa o tira; «correa de su sandalia» comunica bien el gesto de servicio humillante sin arcaísmos. «Desatar» expresa λῦσαι con precisión.
- source_word: αὐτὸς
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Él mismo
  - Ese mismo
  lexicon: BDAG
  rationale: El αὐτός es enfático y contrasta al venidero con Juan. «Él» funciona en español porque el contraste ya quedó claro; no es necesario añadir peso con «él mismo».
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_spanish: en el Espíritu Santo
  alternatives_spanish:
  - con el Espíritu Santo
  lexicon: BDAG
  rationale: Se conserva «en» para no resolver de antemano si el matiz es medio, esfera o elemento. «Espíritu Santo» identifica correctamente al Espíritu divino y mantiene la expresión bíblica.
- source_word: καὶ πυρί
  english_pob_choice: and fire
  chosen_spanish: y fuego
  alternatives_spanish:
  - y con fuego
  - y en fuego
  lexicon: BDAG
  rationale: Se mantiene el término literal «fuego» sin especificar si es purificador, judicial o una imagen unificada con el Espíritu. La traducción conserva la tensión interpretativa del texto.
theological_decisions:
- issue: Sentido de 'en el Espíritu Santo y fuego'
  english_pob_reading: Retain the literal phrasing without specifying whether 'fire' is purifying, judicial, or a second aspect of the same baptism.
  chosen_spanish_reading: Mantener la fórmula literal «en el Espíritu Santo y fuego» sin decidir si «fuego» es purificador, de juicio o parte de una sola imagen bautismal.
  alternative_spanish_readings:
  - en el Espíritu Santo, es decir, con fuego purificador
  - en el Espíritu Santo y en fuego como juicio
  rationale: El griego es conciso y permite más de una lectura. La versión española conserva la tensión teológica en vez de resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor de πᾶσιν en la escena
  english_pob_reading: answered them all
  chosen_spanish_reading: les respondió a todos
  alternative_spanish_readings:
  - respondió a todos
  - contestó a todos
  rationale: El plural abreviado se entiende naturalmente como destinatarios múltiples; «a todos» mantiene la amplitud de la respuesta sin añadir elementos ajenos al texto.
  doctrine_reference: Narrative fidelity to the immediate discourse setting.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el texto español sigue el último pase sin cambios sustanciales y conserva las decisiones léxicas y teológicas auditadas.
  spanish_consistency_notes:
  - Se mantiene «Espíritu Santo» con mayúsculas por referirse al Espíritu divino.
  - Se usa «bautizar» en toda la línea para conservar la coherencia terminológica del pasaje.
  - «Correa de su sandalia» evita arcaísmos y refleja el humillante gesto de desatar el calzado.
  - Se conserva «fuego» sin explicación en el cuerpo para no resolver la ambigüedad del original.
