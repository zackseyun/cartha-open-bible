translation:
  language: es
  text: hijo de Enós[a], hijo de Set, hijo de Adán, hijo de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego simplemente repite el patrón en genitivo: «de Enós, de Set, de Adán, de Dios»; «hijo de» se suple en español por la sintaxis establecida de la genealogía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ Ἐνὼς
  english_pob_choice: the son of Enosh
  chosen_spanish: de Enós[a]
  alternatives_spanish:
  - hijo de Enós
  - de Enosh
  lexicon: BDAG
  rationale: En la cadena genealógica de Lucas, el griego conserva un genitivo repetido y el inglés POB suplió 'the son of' por claridad. En español, en una lista genealógica, el genitivo simple 'de' comunica de forma natural esa relación implícita sin añadir más de lo que el griego dice explícitamente. 'Enós' es la transliteración habitual en español para Ἐνώς.
- source_word: τοῦ Σὴθ
  english_pob_choice: the son of Seth
  chosen_spanish: de Set
  alternatives_spanish:
  - hijo de Set
  - de Seth
  lexicon: BDAG
  rationale: Se mantiene el mismo patrón genealógico con 'de'. 'Set' es la forma castellana usual del nombre Σήθ; 'Seth' se conserva como alternativa posible, pero no es la forma más natural en español bíblico general.
- source_word: τοῦ Ἀδὰμ
  english_pob_choice: the son of Adam
  chosen_spanish: de Adán
  alternatives_spanish:
  - hijo de Adán
  - de Adam
  lexicon: BDAG
  rationale: Adán es un nombre propio en la genealogía, por lo que debe conservarse como tal, no como 'hombre'. El genitivo simple respeta la estructura acumulativa del griego y evita sobrecargar el texto con una repetición innecesaria de 'hijo de'.
- source_word: τοῦ θεοῦ
  english_pob_choice: the son of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - hijo de Dios
  - de Dios
  lexicon: BDAG
  rationale: La POB inglesa explicó que el griego mantiene el mismo genitivo genealógico y que la filiación se suple en inglés por sintaxis. En español, 'de Dios' preserva de manera igualmente fiel la forma gramatical del original y deja abierta la fuerza relacional dentro de la serie genealógica, sin introducir una formulación más interpretativa que el griego no exige.
theological_decisions:
- issue: Cómo renderizar la clausura genealógica final 'τοῦ θεοῦ'
  english_pob_reading: the son of God
  chosen_spanish_reading: de Dios
  alternative_spanish_readings:
  - hijo de Dios
  - de Dios
  - procedente de Dios
  rationale: El griego presenta un genitivo final dentro de una cadena repetida; la POB inglesa suplió 'the son of' por equivalencia óptima. En español, mantener 'de Dios' conserva la tensión textual entre la gramática desnuda y la filiación implícita de la genealogía, sin ampliar innecesariamente la formulación a una afirmación más explícita de la que el sintagma griego, por sí solo, obliga. Esto preserva la relación genealógica y el cierre teológico de Lucas sin resolverlo más allá del texto.
  doctrine_reference: Preservar la tensión textual; equivalencia óptima; filología y sintaxis genealógica antes que explicitación interpretativa.
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre las revisiones disponibles y no requiere cambios textuales adicionales; la decisión principal es de estilo genealógico en español frente a la elipsis del griego y la explicitación que hizo la traducción inglesa.
  spanish_consistency_notes:
  - Se preserva la secuencia genealógica con genitivos breves ('de ...') para reflejar la sintaxis del original.
  - 'Se usan formas españolas habituales de nombres propios bíblicos: Enós, Set, Adán, Dios.'
  - No se introduce 'hijo de' en el texto principal para no añadir una explicitación que el griego deja implícita y que en español puede mantenerse por el patrón acumulativo de la lista.
