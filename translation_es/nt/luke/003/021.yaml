revisions:
- from: Aconteció, pues, que mientras todo el pueblo era bautizado[a], y Jesús también había sido bautizado y estaba orando, el cielo fue abierto,
  to: Aconteció, pues, que cuando todo el pueblo era bautizado, y Jesús también había sido bautizado y estaba orando, el cielo[a] se abrió,
