translation:
  language: es
  text: Aconteció, pues, que cuando todo el pueblo era bautizado, y Jesús también había sido bautizado y estaba orando, el cielo[a] se abrió,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el ámbito celestial». El griego puede referirse al cielo visible o al ámbito celestial; en esta escena, el sentido revelatorio favorece «el cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο
  english_pob_choice: Now it happened
  chosen_spanish: Aconteció, pues
  alternatives_spanish:
  - Y aconteció
  - Sucedió
  lexicon: BDAG
  rationale: La fórmula narrativa de Lucas introduce una nueva escena. «Aconteció» conserva el giro eventivo y «pues» refleja bien el avance discursivo de δέ sin forzar una oposición fuerte.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: pues
  alternatives_spanish:
  - y
  - entonces
  - ahora
  lexicon: BDAG
  rationale: δέ funciona aquí como marca de progresión narrativa. En español, «pues» enlaza con naturalidad y mantiene el tono de transición sin recargar el énfasis.
- source_word: ἐν τῷ βαπτισθῆναι
  english_pob_choice: when ... were baptized
  chosen_spanish: mientras ... era bautizado
  alternatives_spanish:
  - cuando ... fue bautizado
  - en el bautizar
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa marco temporal. «Mientras» comunica la simultaneidad de forma fluida; el singular impersonal del español concuerda con «todo el pueblo» como colectivo.
- source_word: ἅπαντα τὸν λαὸν
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo en conjunto
  - toda la gente
  lexicon: BDAG
  rationale: ἅπαντα τὸν λαόν denota al pueblo en su totalidad. «Todo el pueblo» preserva la amplitud colectiva y mantiene el registro bíblico sin volverlo técnico.
- source_word: Ἰησοῦ βαπτισθέντος
  english_pob_choice: and Jesus also had been baptized
  chosen_spanish: y Jesús también había sido bautizado
  alternatives_spanish:
  - y Jesús habiendo sido bautizado
  - y Jesús también fue bautizado
  lexicon: BDAG
  rationale: El genitivo absoluto añade a Jesús al marco temporal. El pluscuamperfecto español refleja bien la anterioridad relativa que el inglés POB expresó con «had been baptized».
- source_word: προσευχομένου
  english_pob_choice: and was praying
  chosen_spanish: y estaba orando
  alternatives_spanish:
  - y oraba
  - y se encontraba orando
  lexicon: BDAG
  rationale: El participio presente indica acción en curso contemporánea. «Estaba orando» expresa continuidad de manera natural en español moderno.
- source_word: ἀνεῳχθῆναι
  english_pob_choice: was opened
  chosen_spanish: fue abierto
  alternatives_spanish:
  - se abrió
  - quedó abierto
  lexicon: BDAG
  rationale: El aoristo pasivo debe conservar la pasividad del verbo. «Fue abierto» retiene esa forma con fidelidad, evitando pasar al reflexivo.
- source_word: τὸν οὐρανὸν
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo/los cielos
  - el cielo celestial
  lexicon: BDAG
  rationale: En español, «el cielo» es la forma más natural y puede abarcar el sentido revelatorio de οὐρανός. Dado que este versículo funciona como preludio de una manifestación divina, no hace falta una perífrasis más interpretativa.
theological_decisions:
- issue: Sentido de οὐρανός en la escena del bautismo
  english_pob_reading: heaven
  chosen_spanish_reading: el cielo
  alternative_spanish_readings:
  - el cielo abierto
  - los cielos
  rationale: Aunque el inglés POB prefiere «heaven» por el contexto revelatorio, en español «el cielo» transmite el mismo ámbito trascendente con idiomaticidad natural. No se reduce a meteorología porque el contexto inmediato es teofánico.
  doctrine_reference: 'Translation philosophy: preserve source-text sense and theological weight without flattening.'
translation_notes:
  revision_awareness: 'Coincido con el estado de revisión: no se requieren cambios respecto del criterio textual base; la versión española conserva la progresión narrativa, la simultaneidad temporal y la pasividad del verbo final, con una elección idiomática para οὐρανός.'
  spanish_consistency_notes:
  - Se mantuvo «bautizado» para βαπτίζω conforme al contexto de rito de inmersión/bautismo, sin añadir glosas.
  - Se evitó «SEÑOR» u otros términos litúrgicos no presentes en el versículo.
  - La puntuación sigue el castellano moderno y el estilo narrativo de Lucas.
  - El marcador de nota [a] está anclado en la frase final para señalar la alternativa léxica de οὐρανός.
