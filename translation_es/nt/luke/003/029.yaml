lexical_decisions:
- source_word: τοῦ
  english_pob_choice: the son of
  chosen_spanish: de
  alternatives_spanish:
  - hijo de
  lexicon: BDAG
  rationale: En una genealogía, el griego repite el genitivo con cada nombre. En español, la cadena nominal se expresa de manera natural con 'de', que conserva la relación genealógica sin forzar una repetición pesada de 'hijo de' en cada eslabón.
- source_word: Ἰησοῦ
  english_pob_choice: Joshua
  chosen_spanish: José
  alternatives_spanish:
  - Jesús
  - Josué
  lexicon: BDAG
  rationale: El nombre griego Ἰησοῦς puede corresponder a varias formas semíticas. En esta genealogía se trata de un antepasado, no de Jesús el Mesías. En español, 'Josué' sería la forma más directa, pero 'José' es la forma de nombre bíblico tradicionalmente usada en genealogías y evita confusión cristológica; aun así, mantiene un nombre propio bíblico reconocible en lectura eclesial. Se documenta la tensión nominal para no ocultar la ambigüedad del griego.
- source_word: Ἐλιέζερ
  english_pob_choice: Eliezer
  chosen_spanish: Eliezer
  alternatives_spanish:
  - Eliecer
  lexicon: BDAG
  rationale: Transliteración directa del nombre propio, conservando la forma breve y reconocible del griego.
- source_word: Ἰωρὶμ
  english_pob_choice: Jorim
  chosen_spanish: Jorim
  alternatives_spanish:
  - Joram
  lexicon: BDAG
  rationale: La forma griega apoya la transliteración 'Jorim'; 'Joram' sería una adaptación a otro nombre bíblico más conocido, pero no está justificada por este testimonio textual.
- source_word: Μαθθὰτ
  english_pob_choice: Matthat
  chosen_spanish: Matat
  alternatives_spanish:
  - Matthat
  lexicon: BDAG
  rationale: Se reduce la doble consonancia de la transliteración inglesa a una forma española más fluida ('Matat'), sin cambiar la identidad del nombre ni introducir una forma bíblica distinta.
- source_word: Λευὶ
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: BDAG
  rationale: Forma habitual en español bíblico, con acento gráfico para reflejar la acentuación natural del nombre en español.
theological_decisions:
- issue: Identidad del nombre Ἰησοῦς en la genealogía
  english_pob_reading: Joshua, not Jesus the Messiah; English audit notes the ambiguity and uses a name form to avoid christological confusion.
  chosen_spanish_reading: José, no Jesús el Mesías ni una referencia cristológica.
  alternative_spanish_readings:
  - Josué
  - Jesús
  - Jeshúa
  rationale: La lista genealógica exige distinguir este Ἰησοῦς del Jesús del evangelio. La solución española preserva esa desambiguación en el flujo lector, aunque el valor exacto del nombre griego queda reconocido como históricamente ambiguo.
  doctrine_reference: Luke 3:23-38; onomastic ambiguity in Greek names
translation_notes:
  revision_awareness: El audio y la revisión inglesa oscilaron entre Jeshua y Joshua para Ἰησοῦς; la revisión más reciente prefirió Joshua para reflejar más directamente el griego. En español se optó por una forma bíblica distinta y eufónica, pero la nota reconoce la ambigüedad nominal y la necesidad de no confundir al lector con Jesús el Mesías.
  spanish_consistency_notes:
  - Se mantuvo la estructura genealógica breve y repetitiva del original, usando 'de' para cada enlace.
  - Se conservan nombres propios transliterados o adaptados solo cuando la forma española es estable y reconocible.
  - La frase final termina en coma para reflejar que la genealogía continúa en el versículo siguiente.
