translation:
  language: es
  text: de Aminadab[a], de Admín, de Arní, de Hezrón, de Pérez, de Judá,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «de Aminadab, de Admín, de Aram», mientras que otros omiten «Admín» y leen «de Aminadab, de Aram».
    reason: textual_variant
lexical_decisions:
- source_word: τοῦ
  english_pob_choice: the son of
  chosen_spanish: de
  alternatives_spanish:
  - hijo de
  lexicon: BDAG
  rationale: En una genealogía, el genitivo repetido funciona como una relación de filiación/ascendencia. En español, repetir «hijo de» en cada eslabón sería comprensible, pero menos natural cuando la cadena ya depende de una secuencia genealógica continua; «de» conserva la relación sin sobrecargar la frase y sigue de cerca la forma breve del griego.
- source_word: Ἀμιναδάβ
  english_pob_choice: Amminadab
  chosen_spanish: Aminadab
  alternatives_spanish:
  - Amminadab
  lexicon: BDAG
  rationale: Se conserva el nombre propio bíblico reconocido en español, con una forma que mantiene la correspondencia con el nombre del AT y resulta legible en una cadena genealógica.
- source_word: Ἀδμίν
  english_pob_choice: Admin
  chosen_spanish: Admín
  alternatives_spanish:
  - Admin
  lexicon: BDAG
  rationale: Se translitera el nombre tal como aparece en el texto griego base, ajustando la acentuación al español para lectura pública. La forma refleja la lectura principal del SBLGNT.
- source_word: Ἀρνί
  english_pob_choice: Arni
  chosen_spanish: Arní
  alternatives_spanish:
  - Arni
  - Aram
  lexicon: BDAG
  rationale: Se mantiene el nombre del texto griego principal. La alternativa textual conocida «Aram» no se adopta en el cuerpo porque el testimonio base sigue «Arní».
- source_word: Ἑσρώμ
  english_pob_choice: Hezron
  chosen_spanish: Hezrón
  alternatives_spanish:
  - Esrom
  lexicon: BDAG
  rationale: Se usa la forma bíblica castellana reconocible del nombre, cercana al alineamiento veterotestamentario y más natural para lectores en español que una transliteración más griega.
- source_word: Φαρές
  english_pob_choice: Perez
  chosen_spanish: Pérez
  alternatives_spanish:
  - Phares
  - Pharez
  lexicon: BDAG
  rationale: Se adopta la forma tradicional y reconocible del nombre en español bíblico, adecuada en un contexto genealógico y coherente con la línea del AT.
- source_word: Ἰούδα
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judas
  lexicon: BDAG
  rationale: En una genealogía del AT, «Judá» es la forma establecida en español y evita la ambigüedad con el nombre NT «Judas».
translation_notes:
  revision_awareness: El texto griego base de SBLGNT y el audit trail en inglés coinciden en la lectura con Admín y Arní; por eso la nota conserva la variante textual sin incorporarla al cuerpo. No se detectaron revisiones previas que afecten esta línea.
  spanish_consistency_notes:
  - Se mantiene una cadena genealógica breve y paratáctica, acorde con el griego.
  - Los nombres propios siguen formas bíblicas españolas cuando son ya establecidas (Aminadab, Hezrón, Pérez, Judá) y transliteración ajustada cuando la lectura griega específica lo requiere (Admín, Arní).
  - La nota textual usa una formulación sobria para preservar la variante sin alterar el texto principal.
