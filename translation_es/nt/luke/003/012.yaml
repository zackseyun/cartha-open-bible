revisions:
- from: 'Entonces también vinieron los recaudadores de impuestos[a] para ser bautizados, y le dijeron: «Maestro, ¿qué debemos hacer?»'
  to: 'Hasta los recaudadores de impuestos[a] vinieron para ser bautizados, y le dijeron: «Maestro, ¿qué debemos hacer?»'
  rationale: Se reemplaza «Entonces también» por «Hasta» para conservar mejor la inclusión enfática de δὲ + καὶ, en línea con la auditoría inglesa («Even tax collectors»), sin perder naturalidad en español. Se mantiene el resto porque es fiel al griego y claro en español.
