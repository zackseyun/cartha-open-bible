translation:
  language: es
  text: 'Hasta los recaudadores de impuestos[a] vinieron para ser bautizados, y le dijeron: «Maestro, ¿qué debemos hacer?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los recaudadores de impuestos también vinieron para ser bautizados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι se expresa naturalmente como una acción puntual en pasado. «Vinieron» conserva la sencillez narrativa y funciona bien en español.
- source_word: δὲ + καὶ τελῶναι
  english_pob_choice: Even tax collectors
  chosen_spanish: Entonces también los recaudadores de impuestos
  alternatives_spanish:
  - Entonces incluso los recaudadores de impuestos
  - Y también los recaudadores de impuestos
  lexicon: BDAG
  rationale: En español, el matiz aditivo/emphático de δέ + καί se comunica con «también»; «entonces» enlaza la secuencia del relato. «Incluso» sería posible, pero «también» evita sobrerrepresentar una sorpresa que en español ya queda insinuada por el contexto.
- source_word: τελῶναι
  english_pob_choice: tax collectors
  chosen_spanish: recaudadores de impuestos
  alternatives_spanish:
  - cobradores de impuestos
  - publicanos
  lexicon: BDAG
  rationale: «Recaudadores de impuestos» es claro, neutral y fiel al oficio designado por τελῶναι. Se evita «publicanos» por ser más tradicional y menos transparente para lectores modernos.
- source_word: βαπτισθῆναι
  english_pob_choice: to be baptized
  chosen_spanish: para ser bautizados
  alternatives_spanish:
  - para bautizarse
  - para recibir el bautismo
  lexicon: BDAG
  rationale: El infinitivo aoristo pasivo expresa propósito. «Para ser bautizados» conserva la voz pasiva y la finalidad sin añadir interpretaciones.
- source_word: εἶπαν πρὸς αὐτόν
  english_pob_choice: they said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le dijeron
  - le preguntaron
  lexicon: BDAG
  rationale: Aunque el contenido es una pregunta, el verbo griego es «decir», no «preguntar». «Le dijeron» mantiene la precisión verbal del original y suena natural en español.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro
  - Profesor
  - Rabí
  lexicon: BDAG
  rationale: Como vocativo, «Maestro» transmite adecuadamente el trato respetuoso y la función de enseñanza. «Profesor» suena demasiado moderno; «Rabí» no traduce el título.
- source_word: τί ποιήσωμεν
  english_pob_choice: what should we do?
  chosen_spanish: ¿qué debemos hacer?
  alternatives_spanish:
  - ¿qué debemos hacer?
  - ¿qué hemos de hacer?
  - ¿qué haremos?
  lexicon: BDAG
  rationale: El subjuntivo deliberativo pide orientación práctica sobre la acción correcta. «Debemos» comunica bien esa fuerza normativa en español contemporáneo.
theological_decisions:
- issue: Inclusión retórica de un grupo socialmente despreciado
  english_pob_reading: Preserve the emphatic inclusion with 'Even.'
  chosen_spanish_reading: Mantener la inclusión con «también», sin cargar el texto con un comentario explicativo.
  alternative_spanish_readings:
  - incluso
  - hasta
  rationale: El griego marca adición y el contexto narrativo ya aporta la sorpresa. En español, «también» preserva la referencia al grupo sin introducir un énfasis que pueda sonar interpretativo o editorial.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El audit trail inglés no requiere cambios: la decisión central fue mantener la precisión verbal de «decir» frente a «preguntar», la finalidad de βαπτισθῆναι y el matiz inclusivo de δέ + καί en un español natural.'
  spanish_consistency_notes:
  - Se mantiene el vocativo en forma directa («Maestro»).
  - Se evita «publicanos» para no introducir una terminología eclesiástica más cargada que el término de oficio del griego.
  - La nota al pie conserva la alternativa de reordenación al estilo del inglés POB, adaptada a una estructura natural en español.
