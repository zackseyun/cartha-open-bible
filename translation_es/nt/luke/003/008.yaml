source:
  edition: SBLGNT
  text: ποιήσατε οὖν καρποὺς ἀξίους τῆς μετανοίας· καὶ μὴ ἄρξησθε λέγειν ἐν ἑαυτοῖς· Πατέρα ἔχομεν τὸν Ἀβραάμ, λέγω γὰρ ὑμῖν ὅτι δύναται ὁ θεὸς ἐκ τῶν λίθων τούτων ἐγεῖραι τέκνα τῷ Ἀβραάμ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/003/008.yaml
  text: Therefore produce fruits worthy of repentance[a], and do not begin to say among yourselves[b], ‘We have Abraham as our father,’ for I tell you that God is able to raise up children for Abraham from these stones.
  footnotes:
  - marker: a
    text: Or 'fruit worthy of repentance' or 'fruit in keeping with repentance.' The Greek has the plural 'fruits' and emphasizes conduct that matches genuine repentance.
    reason: lexical_alternative
  - marker: b
    text: Or 'within yourselves' or 'to yourselves.' The phrase may refer either to inward self-talk or to what they say among their own group.
    reason: lexical_alternative
