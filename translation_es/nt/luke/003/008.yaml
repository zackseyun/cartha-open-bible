translation:
  language: es
  text: 'Por tanto, produzcan frutos dignos de arrepentimiento[a], y no comiencen a decir entre ustedes[b]: “Tenemos a Abraham por padre”, porque les digo que Dios puede levantar hijos para Abraham de estas piedras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fruto digno de arrepentimiento» o «fruto en consonancia con el arrepentimiento». El griego tiene el plural «frutos» y enfatiza una conducta que corresponde al arrepentimiento genuino.
    reason: lexical_alternative
  - marker: b
    text: O «dentro de ustedes mismos» o «para ustedes mismos». La frase puede referirse al habla interior o a lo que dicen dentro de su propio grupo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσατε
  english_pob_choice: produce
  chosen_spanish: produzcan
  alternatives_spanish:
  - hagan
  - den fruto
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción decidida; en español, «produzcan» mantiene la fuerza exhortativa y combina naturalmente con «frutos». «Hagan» suena más general y «den fruto» pierde el matiz plural.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Conserva con claridad la inferencia lógica del contexto previo sin sonar demasiado coloquial.
- source_word: καρποὺς
  english_pob_choice: fruits
  chosen_spanish: frutos
  alternatives_spanish:
  - fruto
  lexicon: BDAG
  rationale: Se conserva el plural griego para reflejar evidencias múltiples de una vida transformada. «Fruto» singular sería más idiomático en algunos contextos, pero aquí atenúa el plural.
- source_word: ἀξίους
  english_pob_choice: worthy of
  chosen_spanish: dignos de
  alternatives_spanish:
  - en consonancia con
  - aptos para
  lexicon: BDAG
  rationale: «Dignos de» comunica adecuación o correspondencia. Mantiene la relación ética entre conducta y arrepentimiento sin sugerir mérito causal.
- source_word: τῆς μετανοίας
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - conversión
  lexicon: BDAG
  rationale: En este contexto moral y profético, «arrepentimiento» es la equivalencia natural y fiel para μετάνοια. «Cambio de mente» es posible pero suena demasiado técnico y debilita la dimensión de vuelta concreta a Dios.
- source_word: μὴ ἄρξησθε λέγειν
  english_pob_choice: do not begin to say
  chosen_spanish: no comiencen a decir
  alternatives_spanish:
  - no empiecen a decir
  - no se pongan a decir
  lexicon: BDAG
  rationale: Reproduce bien la advertencia contra iniciar ese tipo de discurso autojustificador. «No comiencen a decir» es claro y sobrio.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: among yourselves
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - dentro de ustedes mismos
  - para ustedes mismos
  lexicon: BDAG
  rationale: La frase puede referirse al habla dentro del grupo o al discurso interior; «entre ustedes» preserva la ambigüedad sin psicologizarla ni reducirla solo al interior de la mente.
- source_word: Πατέρα ἔχομεν τὸν Ἀβραάμ
  english_pob_choice: We have Abraham as our father
  chosen_spanish: Tenemos a Abraham por padre
  alternatives_spanish:
  - Abraham es nuestro padre
  - Tenemos a Abraham como padre
  lexicon: BDAG
  rationale: Es una formulación natural en español que conserva la reclamación de ascendencia y pertenencia al linaje de Abraham. Evita una paráfrasis excesiva.
- source_word: λέγω γὰρ ὑμῖν
  english_pob_choice: for I tell you
  chosen_spanish: porque les digo
  alternatives_spanish:
  - pues les digo
  - les digo
  lexicon: BDAG
  rationale: Mantiene la fórmula solemne y la conexión causal/explicativa del «γάρ» sin volverla demasiado literal.
- source_word: δύναται
  english_pob_choice: is able
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  lexicon: BDAG
  rationale: «Puede» es idiomático en español y comunica capacidad real. «Es capaz de» sería más enfático pero algo más pesado.
- source_word: ἐκ τῶν λίθων τούτων
  english_pob_choice: from these stones
  chosen_spanish: de estas piedras
  alternatives_spanish:
  - a partir de estas piedras
  - de entre estas piedras
  lexicon: BDAG
  rationale: «De estas piedras» reproduce con naturalidad el origen indicado por ἐκ. «A partir de» explicita desarrollo, pero añade un matiz no necesario.
- source_word: ἐγεῖραι
  english_pob_choice: to raise up
  chosen_spanish: levantar
  alternatives_spanish:
  - hacer surgir
  - criar
  lexicon: BDAG
  rationale: En este contexto de producir descendencia inesperada, «levantar» conserva la imagen de acción divina eficaz. «Hacer surgir» es posible pero menos directo; «criar» no corresponde bien.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - descendientes
  lexicon: BDAG
  rationale: En este dicho alusivo a la descendencia de Abraham, «hijos» refleja el lenguaje relacional y genealógico del pasaje. «Descendientes» sería más explicativo, pero perdería la cercanía de la imagen familiar.
- source_word: τῷ Ἀβραάμ
  english_pob_choice: for Abraham
  chosen_spanish: para Abraham
  alternatives_spanish:
  - a Abraham
  - de Abraham
  lexicon: BDAG
  rationale: «Para Abraham» conserva la idea de pertenencia/relación beneficiaria que la POB inglesa destacó. En español suena natural y mantiene la tensión del dativo.
theological_decisions:
- issue: Sentido de «frutos dignos de arrepentimiento»
  english_pob_reading: The phrase refers to outward actions that correspond to and demonstrate genuine repentance, without implying that such actions earn forgiveness.
  chosen_spanish_reading: La frase se entiende como conductas visibles que corresponden al arrepentimiento genuino y lo evidencian, sin sugerir que esas obras compren el perdón.
  alternative_spanish_readings:
  - fruto en consonancia con el arrepentimiento
  - frutos que acompañan al arrepentimiento
  rationale: «Dignos de arrepentimiento» conserva la correspondencia ética y evita convertir la frase en lenguaje meritório. El plural «frutos» mantiene la fuerza concreta del griego.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Descentencia abrahámica como base de seguridad
  english_pob_reading: John rejects reliance on physical descent from Abraham as sufficient grounds for security before God.
  chosen_spanish_reading: Juan rechaza la confianza en la descendencia física de Abraham como base suficiente de seguridad delante de Dios.
  alternative_spanish_readings:
  - la descendencia de Abraham no garantiza nada
  - no basta con tener a Abraham por padre
  rationale: 'La traducción conserva el golpe polémico del pasaje: el parentesco con Abraham no sustituye una respuesta verdadera a Dios. No introduce formulaciones doctrinales posteriores.'
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el rastro auditado en inglés. Se mantuvo el plural «frutos», se evitó suavizar la advertencia de no iniciar ese discurso, y se prefirió «arrepentimiento» frente a un calco como «cambio de mente», de acuerdo con la revisión más reciente del inglés POB.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, sin añadir mayúsculas teológicas innecesarias.
  - Se conserva «Abraham» como forma castellana estándar del nombre propio.
  - Se mantiene la ambigüedad de ἐν ἑαυτοῖς con «entre ustedes», sin decidir de manera cerrada entre interioridad o habla grupal.
  - «Levantar» para ἐγεῖραι conserva la fuerza de acción divina eficaz y evita una paráfrasis más expansiva.
