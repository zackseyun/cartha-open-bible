lexical_decisions:
- source_word: τοῦ
  english_pob_choice: the son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - de
  lexicon: BDAG
  rationale: En esta genealogía, el griego repite el genitivo artículo+nombres de manera elíptica dentro de una cadena ya establecida por el contexto. En español, repetir «hijo de» conserva la relación filial implícita y produce una genealogía legible sin introducir contenido nuevo.
- source_word: Μαθθὰτ
  english_pob_choice: Matthat
  chosen_spanish: Matat
  alternatives_spanish:
  - Matat
  - Matthat
  lexicon: BDAG
  rationale: Es un nombre propio transliterado. «Matat» reproduce la forma breve y natural en español, manteniendo la referencia al nombre griego sin calco innecesario.
- source_word: Λευὶ
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: BDAG
  rationale: Nombre propio bíblico bien asentado en español. La tilde en la última sílaba preserva la pronunciación natural del nombre griego y su uso eclesial en español.
- source_word: Μελχὶ
  english_pob_choice: Melchi
  chosen_spanish: Melqui
  alternatives_spanish:
  - Melchi
  lexicon: BDAG
  rationale: Transliteración del nombre propio que adapta la terminación a la ortografía española sin perder la relación con la forma griega.
- source_word: Ἰανναὶ
  english_pob_choice: Jannai
  chosen_spanish: Janai
  alternatives_spanish:
  - Jannai
  - Jana
  lexicon: BDAG
  rationale: Se conserva el valor nominal del griego con una transliteración breve y comprensible en español. «Janai» evita una forma más anglicada y sigue de cerca la vocalización del nombre.
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: BDAG
  rationale: Nombre propio bíblico estándar en español. «José» es la forma natural y reconocible para el lector hispanohablante.
theological_decisions:
- issue: Cadena genealógica con genitivos elípticos
  english_pob_reading: Explicitly supply 'the son of' before each name
  chosen_spanish_reading: Repetir «hijo de» antes de cada nombre
  alternative_spanish_readings:
  - 'Conservar una cadena formal: «de Matat, de Leví, de Melqui, de Janai, de José»'
  rationale: El griego continúa la genealogía con genitivos repetidos que dependen de la fórmula filial del contexto inmediato. En español, explicitar «hijo de» comunica esa dependencia sintáctica y conserva la función genealógica sin ampliar el sentido.
  doctrine_reference: Lucas 3:23–24; filosofía de equivalencia óptima aplicada a genealogías
- issue: Forma de nombres propios en una lista genealógica
  english_pob_reading: Standard English transliterations
  chosen_spanish_reading: Transliteraciones españolas normales y reconocibles
  alternative_spanish_readings:
  - Mantener formas más anglicadas o más cercanas al griego
  rationale: En listas genealógicas, los nombres propios deben ser legibles y consistentes para el público hispanohablante. Se prefieren formas que suenan naturales en español sin cambiar la identidad textual del nombre.
  doctrine_reference: Principio editorial de transparencia y lectura pública
