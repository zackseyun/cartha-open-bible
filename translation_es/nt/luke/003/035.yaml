lexical_decisions:
- source_word: τοῦ
  english_pob_choice: the son of
  chosen_spanish: de
  alternatives_spanish:
  - del hijo de
  - hijo de
  lexicon: BDAG
  rationale: El griego presenta una cadena de genitivos elíptica propia de una genealogía. En español, repetir "el hijo de" en cada eslabón sería pesado y menos fiel a la concisión del original; "de" conserva la relación genealógica implícita y sigue de cerca la sintaxis griega.
- source_word: Σεροὺχ
  english_pob_choice: Serug
  chosen_spanish: Seruc
  alternatives_spanish:
  - Serug
  - Seruch
  lexicon: BDAG
  rationale: Se trata de un nombre propio transliterado. En español, "Seruc" refleja la forma griega con una adaptación gráfica naturalizada y mantiene la identificación bíblica del patriarca. "Serug" sería la forma hebrea/inglés estándar, pero aquí la base auditada inmediata es la forma griega Σερούχ.
- source_word: Ῥαγαὺ
  english_pob_choice: Reu
  chosen_spanish: Ragau
  alternatives_spanish:
  - Reu
  lexicon: BDAG
  rationale: El nombre griego es Ῥαγαὺ; por fidelidad al texto fuente se conserva la huella fonética griega en español como "Ragau". Aunque la tradición bíblica hebrea lo conoce como Reu, la POB inglesa documenta esa equivalencia como decisión intertextual; en español se deja visible la forma griega para no ocultar la fuente inmediata.
- source_word: Φάλεκ
  english_pob_choice: Peleg
  chosen_spanish: Falec
  alternatives_spanish:
  - Peleg
  - Phalek
  lexicon: BDAG
  rationale: El griego Φάλεκ se translitera naturalmente como "Falec" en español. Esta forma preserva la proximidad al original griego, mientras que "Peleg" sería la forma hebrea tradicional y más reconocible en español bíblico, pero no es la forma inmediata del texto fuente.
- source_word: Ἔβερ
  english_pob_choice: Eber
  chosen_spanish: Éber
  alternatives_spanish:
  - Eber
  - Heber
  lexicon: BDAG
  rationale: El nombre propio Ἔβερ se adapta a la ortografía española como "Éber". La tilde ayuda a marcar la pronunciación aguda y mantiene la forma bíblica reconocible sin desplazarla a otra tradición nominal.
- source_word: Σαλὰ
  english_pob_choice: Shelah
  chosen_spanish: Sala
  alternatives_spanish:
  - Shelah
  lexicon: BDAG
  rationale: La forma griega Σαλὰ se conserva de manera transparente como "Sala". Aunque el linaje veterotestamentario suele conocerse como Shelah, aquí se privilegia la forma inmediata del griego para no sustituirla por la equivalencia hebrea sin necesidad textual.
translation_notes:
  revision_awareness: Se revisó el pasaje como una cadena genealógica breve sin contenido verbal adicional. La traducción prioriza la transparencia hacia el griego SBLGNT y evita normalizar los nombres a sus formas hebreas/inglesas estándar cuando eso ocultaría la forma fuente inmediata. Se conservó la elipsis sintáctica propia del original, con apoyo de nota.
  spanish_consistency_notes:
  - 'Se mantuvo un estilo genealógico sobrio y consistente con el griego: solo nombres precedidos por la preposición "de".'
  - Se evitó insertar "hijo" porque el original no lo expresa explícitamente en esta secuencia.
  - Se usaron tildes en "Éber" por adaptación ortográfica española y para facilitar la lectura pública.
  - La forma "Falec" sigue la transliteración del griego Φάλεκ, no la tradición hebrea Peleg.
