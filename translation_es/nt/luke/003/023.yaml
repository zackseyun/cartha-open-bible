translation:
  language: es
  text: Y Jesús mismo[a], al comenzar, tenía unos treinta años, siendo hijo —como se creía— de José[c][b], de Elí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuando comenzaba'; el griego no dice explícitamente 'su ministerio', aunque ese es el sentido contextual.
    reason: lexical_alternative
  - marker: b
    text: Es decir, comúnmente se consideraba que Jesús era hijo de José.
    reason: alternative_reading
  - marker: c
    text: O 'tenía unos treinta años cuando comenzó'.
    reason: previous_rendering
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Entonces
  lexicon: BDAG
  rationale: Conserva la continuidad narrativa con el contexto previo sin sobrecargar el verso; en español, 'Y' es la equivalencia más natural para el enlace simple.
- source_word: αὐτὸς
  english_pob_choice: himself
  chosen_spanish: mismo
  alternatives_spanish:
  - él mismo
  - Jesús mismo
  lexicon: BDAG
  rationale: El griego es enfático; 'Jesús mismo' o 'mismo' conservan esa fuerza. Se eligió una colocación natural en español para reflejar el énfasis sin sonar forzado.
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: tenía
  alternatives_spanish:
  - era
  - estaba
  lexicon: BDAG
  rationale: En español, la expresión de edad se da de forma idiomática con 'tener'. Aunque el griego usa imperfecto de 'ser/estar', el valor comunicativo aquí es la edad aproximada de Jesús.
- source_word: ἀρχόμενος
  english_pob_choice: when he began
  chosen_spanish: cuando comenzaba
  alternatives_spanish:
  - al comenzar
  - cuando empezó
  lexicon: BDAG
  rationale: La forma participial sugiere el inicio de una actividad. 'Cuando comenzaba' mantiene la apertura aspectual del griego y evita añadir 'ministerio', que no aparece explícitamente.
- source_word: ὡσεὶ ἐτῶν τριάκοντα
  english_pob_choice: about thirty years old
  chosen_spanish: unos treinta años
  alternatives_spanish:
  - aproximadamente treinta años
  - de unos treinta años
  lexicon: BDAG
  rationale: '''ὡσεὶ'' marca aproximación; en español, ''unos treinta años'' es natural y fiel. Se omite ''de edad'' por economía idiomática, sin perder el sentido.'
- source_word: ὢν
  english_pob_choice: being
  chosen_spanish: siendo
  alternatives_spanish:
  - y siendo
  - mientras era
  lexicon: BDAG
  rationale: El participio introduce la identificación genealógica; 'siendo' conserva la relación participial sin introducir una subordinación más interpretativa.
- source_word: υἱός
  english_pob_choice: the son
  chosen_spanish: hijo
  alternatives_spanish:
  - el hijo
  - un hijo
  lexicon: BDAG
  rationale: En español la frase funciona naturalmente sin artículo en esta construcción parentética. El contexto genealógico permite mantener la relación filial implícita.
- source_word: ὡς ἐνομίζετο
  english_pob_choice: as was supposed
  chosen_spanish: como se creía
  alternatives_spanish:
  - como se suponía
  - según se pensaba
  lexicon: BDAG
  rationale: La cláusula indica la percepción pública o común, no una afirmación biológica de Lucas. 'Como se creía' expresa bien la distancia del narrador y es comprensible en español actual.
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: BDAG
  rationale: Transliteración estándar del nombre en español bíblico.
- source_word: τοῦ Ἠλὶ
  english_pob_choice: of Heli
  chosen_spanish: de Elí
  alternatives_spanish:
  - de Heli
  lexicon: BDAG
  rationale: Se mantiene el nombre propio en su forma habitual en español bíblico. La construcción genitiva se conserva con 'de' para no añadir una explicación genealógica ausente en el verso.
theological_decisions:
- issue: La relación entre el hijo de José y la concepción virginal implícita por el contexto
  english_pob_reading: Render the phrase parenthetically to indicate that Joseph's paternity was publicly assumed, not asserted by Luke as biological fact.
  chosen_spanish_reading: 'Presentar la cláusula como una aclaración parentética: Jesús es llamado hijo de José ''como se creía'', es decir, según la percepción común, no como afirmación biológica del narrador.'
  alternative_spanish_readings:
  - Eliminar la aclaración parentética
  - Traducir de modo que parezca una afirmación directa de paternidad biológica
  rationale: El contexto lucano inmediato ya ha narrado la concepción extraordinaria de Jesús. La traducción debe preservar esa tensión teológica sin resolverla ni borrarla. 'Como se creía' mantiene la distancia narrativa y evita contradecir el conjunto del relato.
  doctrine_reference: Preservar la tensión teológica; coherencia con la narración de la concepción virginal en Lucas 1.
- issue: Si añadir 'ministerio' al comienzo de Jesús
  english_pob_reading: Do not add 'ministry' to the main text; render only 'when he began.'
  chosen_spanish_reading: No añadir 'ministerio' en el texto principal; conservar solo la idea de que Jesús 'comenzaba'.
  alternative_spanish_readings:
  - cuando comenzaba su ministerio
  - al inicio de su ministerio
  rationale: El sustantivo 'ministerio' es interpretativo y no está en el griego. Aunque el contexto lo sugiere, el texto principal debe limitarse a lo explicitado por la fuente.
  doctrine_reference: Primacía del idioma original; no paraphrase beyond what the source text warrants.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión reciente que mejoró la fluidez del orden de la cláusula temporal y la puntuación. En español se reflejó esa misma preferencia estructural: primero el énfasis en el comienzo de Jesús y luego la edad aproximada, manteniendo además la aclaración parentética sobre José.'
  spanish_consistency_notes:
  - Se emplea 'Yahvé' para el nombre divino cuando corresponda; aquí no aparece.
  - Se mantiene 'Jesús' y 'José' como formas estándar españolas.
  - Se usa 'hijo' en la construcción genealógica para respetar la relación sintáctica del griego.
  - '''Como se creía'' preserva la cautela narrativa sin convertirla en explicación doctrinal añadida.'
  - La puntuación con comas refleja la estructura parentética del griego y la revisión inglesa más reciente.
