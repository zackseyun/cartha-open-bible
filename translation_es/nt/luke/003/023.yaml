revisions:
- from: Y Jesús mismo[a], cuando comenzaba, tenía unos treinta años, siendo hijo, como se creía[b], de José[c], de Elí.
  to: Y Jesús mismo[a], al comenzar, tenía unos treinta años, siendo hijo —como se creía— de José[c][b], de Elí.
  rationale: Se ajusta 'cuando comenzaba' a 'al comenzar' para un español más natural y más cercano a la decisión principal auditada; se conserva la reserva de no añadir 'ministerio'. Se corrige la nota c para que coincida con la alternativa documentada en el POB inglés. Se mejora la puntuación del inciso 'como se creía' con rayas para mayor claridad sin alterar el sentido.
