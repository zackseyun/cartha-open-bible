translation:
  language: es
  text: 'y el Espíritu Santo descendió sobre él en forma corporal, como una paloma, y vino una voz desde el cielo: «Tú eres mi Hijo amado; en ti me complazco[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «en ti me complací».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταβῆναι
  english_pob_choice: descended
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino hacia abajo
  lexicon: BDAG
  rationale: El verbo aoristo de movimiento descendente se vierte de manera natural como «descendió», conservando el sentido de bajada sin calco innecesario.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo
  - el Espíritu Sagrado
  lexicon: BDAG
  rationale: La expresión definida se traduce con el término eclesial y bíblicamente claro «Espíritu Santo», que en español es idiomático y preciso.
- source_word: σωματικῷ εἴδει
  english_pob_choice: in bodily form
  chosen_spanish: en forma corporal
  alternatives_spanish:
  - en forma corporal
  - en forma visible
  - con apariencia corporal
  lexicon: BDAG
  rationale: «En forma corporal» conserva la idea de manifestación visible y encarnada, sin reducirla a una mera impresión interior ni afirmar más de lo que el griego dice.
- source_word: ὡς περιστερὰν
  english_pob_choice: like a dove
  chosen_spanish: como de paloma
  alternatives_spanish:
  - como paloma
  - como una paloma
  lexicon: BDAG
  rationale: El comparativo ὡς pide una comparación, no una identificación ontológica; «como de paloma» mantiene la similitud y suena natural en español, aunque «como una paloma» sigue siendo posible.
- source_word: ἐπ’ αὐτόν
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - sobre él
  - encima de él
  lexicon: BDAG
  rationale: «Sobre él» transmite bien el reposo o descenso del Espíritu sobre Jesús en un español claro y reverente.
- source_word: φωνὴν ἐξ οὐρανοῦ γενέσθαι
  english_pob_choice: a voice came from heaven
  chosen_spanish: vino una voz desde el cielo
  alternatives_spanish:
  - se oyó una voz desde el cielo
  - vino una voz del cielo
  lexicon: BDAG
  rationale: La construcción idiomática con γίνομαι y φωνή se expresa naturalmente como «vino una voz», preservando el acontecimiento audible y manteniendo el matiz narrativo.
- source_word: Σὺ εἶ
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Tú eres
  - Tú sí eres
  lexicon: BDAG
  rationale: La segunda persona enfática se puede comunicar con la forma directa «Tú eres»; el español no requiere marcación adicional para conservar la dirección explícita.
- source_word: ὁ υἱός μου
  english_pob_choice: my Son
  chosen_spanish: mi Hijo
  alternatives_spanish:
  - mi Hijo
  - el Hijo mío
  lexicon: BDAG
  rationale: La posesión con pronombre se vierte de modo natural como «mi Hijo».
- source_word: ὁ ἀγαπητός
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - amado
  - querido
  - muy amado
  lexicon: BDAG
  rationale: Aunque «amado» es la equivalencia más directa, en español bíblico «Hijo amado» mantiene dignidad y peso filial; evita la posible ambigüedad de «querido».
- source_word: ἐν σοὶ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - en ti
  - contigo
  lexicon: BDAG
  rationale: La preposición ἐν se conserva como «en ti»; «contigo» suavizaría indebidamente la relación y perdería la localización relacional que el texto expresa.
- source_word: εὐδόκησα
  english_pob_choice: I am well pleased
  chosen_spanish: me complazco
  alternatives_spanish:
  - me complazco
  - me he complacido
  - me complací
  lexicon: BDAG
  rationale: Se opta por «me complazco» para reflejar la satisfacción divina de manera natural en español, preservando la tensión temporal del aoristo que el audit trail inglés mantiene entre presente idiomático y pasado formal.
theological_decisions:
- issue: Naturaleza de la manifestación del Espíritu
  english_pob_reading: The text describes the Holy Spirit descending in visible bodily form, compared to a dove, without asserting that the Spirit literally became a dove.
  chosen_spanish_reading: El texto describe al Espíritu Santo descendiendo en forma corporal, comparado con una paloma, sin afirmar que el Espíritu se convirtiera literalmente en una paloma.
  alternative_spanish_readings:
  - El Espíritu Santo se convirtió en una paloma
  - el Espíritu apareció simplemente como una paloma
  rationale: La combinación de «forma corporal» con «como de paloma» preserva la manifestación visible y la comparación del texto, sin resolver la tensión en una afirmación más fuerte que el griego no exige.
  doctrine_reference: Translation philosophy §3 (Preservar la tensión teológica en vez de resolverla)
- issue: Fuerza temporal de εὐδόκησα
  english_pob_reading: Rendered as 'I am well pleased' in the main text for idiomatic English, while preserving the more formally past-oriented alternative in a footnote.
  chosen_spanish_reading: Se vierte en el texto principal con una fórmula presente/estativa idiomática en español («me complazco»), manteniendo en nota la alternativa más formal en pasado («me complací»).
  alternative_spanish_readings:
  - me complací
  - he quedado complacido
  - me he complacido
  rationale: El aoristo admite una lectura formal en pasado, pero en una proclamación divina el español bíblico fluido suele preferir una expresión de aprobación estable. La nota conserva la posibilidad más literal para auditoría.
  doctrine_reference: Translation philosophy (equivalencia óptima); §3 Preservar la tensión teológica en vez de resolverla
translation_notes:
  revision_awareness: 'El contexto inglés y griego coinciden en el sentido general: descenso visible del Espíritu, comparación con paloma, voz celestial y declaración filial. No hubo revisiones aplicadas en el pasaje inglés; la versión española sigue esa lectura estable, con una nota para la alternativa temporal de εὐδόκησα.'
  spanish_consistency_notes:
  - Se mantiene «Espíritu Santo» como forma estable para τὸ πνεῦμα τὸ ἅγιον.
  - «Hijo amado» conserva el tono filial solemne del contexto.
  - «En forma corporal» y «como de paloma» preservan simultáneamente visibilidad y comparación.
  - Se usa «me complazco» para un español idiomático, mientras la nota registra la opción formal en pasado.
