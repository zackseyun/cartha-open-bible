lexical_decisions:
- source_word: τοῦ
  english_pob_choice: the son of
  chosen_spanish: el hijo de
  alternatives_spanish:
  - de
  lexicon: BDAG
  rationale: En esta genealogía, el artículo genitivo repetido funciona de modo elíptico para continuar la relación genealógica del contexto. En español, repetir «el hijo de» hace explícita la relación y evita un encadenamiento demasiado seco o ambiguo con solo «de».
- source_word: Μάαθ
  english_pob_choice: Maath
  chosen_spanish: Maat
  alternatives_spanish:
  - Maath
  lexicon: BDAG
  rationale: Nombre propio transliterado. Se ajusta la grafía a una forma natural en español, manteniendo la cercanía fonética al griego y la transparencia del nombre.
- source_word: Ματταθίου
  english_pob_choice: Mattathias
  chosen_spanish: Matatías
  alternatives_spanish:
  - Mattatías
  - Matatías
  lexicon: BDAG
  rationale: Nombre propio transliterado al uso español bíblico. «Matatías» conserva la relación con la forma griega y es legible de inmediato en español.
- source_word: Σεμεῒν
  english_pob_choice: Semein
  chosen_spanish: Semeín
  alternatives_spanish:
  - Semein
  lexicon: BDAG
  rationale: Transliteración directa del nombre propio con acento gráfico español para marcar la pronunciación y mantener la forma griega de base.
- source_word: Ἰωσὴχ
  english_pob_choice: Josech
  chosen_spanish: Josec
  alternatives_spanish:
  - Josech
  lexicon: BDAG
  rationale: El griego termina en chi; en español, «Josec» representa de manera más natural esa consonante final que «Josech», sin perder la transparencia del nombre.
- source_word: Ἰωδὰ
  english_pob_choice: Joda
  chosen_spanish: Joda
  alternatives_spanish:
  - Joada
  lexicon: BDAG
  rationale: Transliteración directa del nombre griego, conservando la forma más cercana al texto fuente.
