review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: el imperfecto ἐπηρώτων está bien captado por «preguntaban», el plural οἱ ὄχλοι se mantiene, y la pregunta deliberativa ποιήσωμεν se entiende correctamente. Sin embargo, hay un problema de naturalidad y de precisión idiomática en español en «¿Qué, entonces, debemos hacer?», y la nota alternativa «haremos» no corresponde bien al valor deliberativo del griego.'
  spanish_quality_summary: 'El texto es mayormente claro, pero «las multitudes» suena menos natural que «las multitudes»/«las muchedumbres» en abstracto y, en contexto bíblico actual, «las multitudes» es aceptable aunque algo rígido. El punto principal a corregir es la formulación de la pregunta: en español natural y digno, «¿Qué debemos hacer, entonces?» o «¿Qué, entonces, hemos de hacer?» funciona mejor que «¿Qué, entonces, debemos hacer?». Además, la nota con «haremos» introduce un matiz futuro más que deliberativo.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión «preguntaban» para ἐπηρώτων y «debemos hacer»/«hemos de hacer» para ποιήσωμεν es compatible con el enfoque del POB, pero la alternativa en nota debe ajustarse a «hemos de hacer» o «haremos de hacer» no; específicamente «haremos» no es recomendable.
  issues:
  - severity: medium
    issue: La pregunta «¿Qué, entonces, debemos hacer?» es poco idiomática en español en esa colocación.
    rationale: Aunque comprensible, en español suena más natural colocar «entonces» al final o usar una estructura más fluida. La revisión mejora legibilidad sin alterar el sentido lógico de οὖν.
  - severity: medium
    issue: La nota alternativa «¿Qué, entonces, haremos?» no reproduce adecuadamente el valor deliberativo de ποιήσωμεν.
    rationale: «Haremos» tiende a leerse como futuro simple, no como pregunta deliberativa de obligación o dirección práctica. Una alternativa mejor es «¿Qué, entonces, hemos de hacer?».
  - severity: low
    issue: «Las multitudes» es aceptable pero algo menos natural que otras opciones en español bíblico contemporáneo.
    rationale: No exige cambio obligatorio, porque preserva el plural y es inteligible. Se puede conservar por fidelidad al plural del griego y cercanía al audit trail inglés.
  revised_spanish_text: 'Y las multitudes le preguntaban[a], diciendo: «¿Qué debemos hacer, entonces?»'
