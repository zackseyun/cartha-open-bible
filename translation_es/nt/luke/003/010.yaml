translation:
  language: es
  text: 'Y las multitudes le preguntaban[a], diciendo: «¿Qué debemos hacer, entonces?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿Qué, entonces, hemos de hacer?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτων
  english_pob_choice: were asking
  chosen_spanish: le preguntaban
  alternatives_spanish:
  - seguían preguntándole
  - le iban preguntando
  - le hacían preguntas
  lexicon: BDAG
  rationale: El imperfecto expresa acción continuada o repetida; en español, «le preguntaban» conserva ese valor aspectual de manera natural y digna. «Seguían preguntándole» sería más explícito, pero añade énfasis no exigido por el griego.
- source_word: οἱ ὄχλοι
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las muchedumbres
  - la multitud
  - la gente reunida
  lexicon: BDAG
  rationale: El plural ὄχλοι señala grupos numerosos. «Las multitudes» mantiene el plural y el sentido de gente congregada. Se evita «la multitud» porque singulariza indebidamente el término griego.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - mientras decían
  lexicon: BDAG
  rationale: El participio introduce el contenido de la pregunta. «Diciendo» reproduce esa función de enlace de forma directa en español.
- source_word: Τί οὖν
  english_pob_choice: What then
  chosen_spanish: ¿Qué, entonces,
  alternatives_spanish:
  - ¿Qué, pues,
  - ¿Qué, por tanto,
  lexicon: BDAG
  rationale: Ὄν marca inferencia desde la exhortación previa. «Entonces» conserva bien la relación lógica sin introducir un tono más coloquial como «pues» en ciertos registros. La coma tras «Qué» refleja la entonación interrogativa en español y el valor discursivo de οὖν.
- source_word: ποιήσωμεν
  english_pob_choice: should we do
  chosen_spanish: debemos hacer
  alternatives_spanish:
  - hemos de hacer
  - debemos hacer nosotros
  - tendremos que hacer
  lexicon: BDAG
  rationale: La pregunta deliberativa aorista se vierte de modo idiomático como una consulta por la acción requerida. «Debemos hacer» comunica la fuerza práctica de la pregunta sin forzar un auxiliar de obligación ajeno al contexto. La omisión de «nosotros» sigue el uso normal del español y ya queda claro por la desinencia verbal.
translation_notes:
  revision_awareness: El texto base en inglés ya había resuelto ἐπηρώτων como aspecto imperfectivo («were asking») y ὄχλοι como plural («the crowds»). La presente versión mantiene esas decisiones en español sin añadir interpretaciones devocionales ni suavizar el carácter deliberativo de la pregunta.
  spanish_consistency_notes:
  - Se preserva el plural de ὄχλοι con «las multitudes», en línea con el auditorial inglés «the crowds».
  - Se mantiene la inferencia de οὖν con «entonces» y no con una paráfrasis explicativa.
  - La pregunta se formula en registro natural de español bíblico moderno, evitando el calco rígido de «¿Qué, entonces, haremos nosotros?»
