- from: 'Y las multitudes le preguntaban[a], diciendo: «¿Qué, entonces, debemos hacer?»'
  to: 'Y las multitudes le preguntaban[a], diciendo: «¿Qué debemos hacer, entonces?»'
  rationale: Se conserva la fidelidad al imperfecto y al plural del griego, pero se corrige la formulación de la pregunta para un español más natural y se reemplaza la nota alternativa por una que sí refleja el valor deliberativo del original sin convertirlo en simple futuro.
