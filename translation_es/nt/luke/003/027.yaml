lexical_decisions:
- source_word: τοῦ
  english_pob_choice: the son of
  chosen_spanish: de
  alternatives_spanish:
  - hijo de
  lexicon: BDAG
  rationale: El griego repite el genitivo con cada nombre dentro de una cadena genealógica. En español, una secuencia de nombres enlazados con «de» reproduce con naturalidad esa relación posesiva/parental sin añadir palabras que el griego aquí no expresa de forma explícita en este versículo aislado.
- source_word: Ἰωανὰν
  english_pob_choice: Joanan
  chosen_spanish: Joanan
  alternatives_spanish:
  - Juan
  lexicon: BDAG
  rationale: Se trata de un nombre propio transliterado. Mantener «Joanan» preserva la forma griega de la genealogía y evita normalizarlo artificialmente como «Juan», lo cual borraría la particularidad del texto fuente.
- source_word: Ῥησὰ
  english_pob_choice: Rhesa
  chosen_spanish: Rhesa
  alternatives_spanish:
  - Resa
  lexicon: BDAG
  rationale: Nombre propio transliterado. «Rhesa» conserva la forma reconocible usada en la tradición académica y refleja la aspiración inicial sugerida por la grafía griega.
- source_word: Ζοροβαβὲλ
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubbabel
  lexicon: BDAG
  rationale: El referente bíblico conocido en español suele aparecer como «Zorobabel». Aunque la forma hebrea estándar en otras traducciones puede ser «Zorobabel» o «Zerubbabel», aquí se elige «Zorobabel» como transliteración natural del griego y forma reconocible en español.
- source_word: Σαλαθιὴλ
  english_pob_choice: Shealtiel
  chosen_spanish: Salatiel
  alternatives_spanish:
  - Shealtiel
  lexicon: BDAG
  rationale: El griego puede transliterarse más de cerca como «Salatiel». En español, «Salatiel» es la forma más directa y transparente desde la forma griega, sin depender de una normalización hebrea previa.
- source_word: Νηρὶ
  english_pob_choice: Neri
  chosen_spanish: Neri
  alternatives_spanish:
  - Nerí
  lexicon: BDAG
  rationale: Nombre propio transliterado de manera directa al español. «Neri» mantiene la brevedad y la forma del griego sin introducir acentos o ajustes no requeridos por la fuente.
theological_decisions:
- issue: Cadena genealógica elíptica
  english_pob_reading: Supply 'the son of' for each genitive name in English.
  chosen_spanish_reading: Mantener la relación genealógica implícita con una cadena de «de» sin insertar una formulación expandida.
  alternative_spanish_readings:
  - «hijo de» repetido
  - una paráfrasis más explícita
  rationale: En este versículo aislado, el griego presenta una serie de genitivos ligados por repetición de artículo. En español, una cadena nominal con «de» comunica la misma dependencia genealógica de manera sobria y fiel; añadir «hijo de» sería interpretativo y excedería lo necesario en esta línea de nombres.
  doctrine_reference: Principio de equivalencia óptima; traducir el patrón sintáctico de la genealogía sin sobrerrepresentarlo.
translation_notes:
  revision_awareness: El paquete fuente y el control cruzado indican alta concordancia y ausencia de cambios necesarios; este borrador sigue la lectura estable del versículo sin introducir variantes textuales ni revisiones adicionales.
  spanish_consistency_notes:
  - Se conserva la transliteración de nombres propios como estrategia consistente para genealogías.
  - Se evita «SEÑOR» u otra terminología teológica no pertinente, porque aquí el texto es puramente genealógico.
  - La cadena con «de» es intencionalmente compacta y refleja la elipsis del griego en este contexto.
