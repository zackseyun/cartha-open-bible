revisions:
- from: 'Y respondiendo[a], les dijo: «El que tiene dos túnicas, comparta con el que no tiene, y el que tiene comida, haga lo mismo».'
  to: 'Y respondiendo, les dijo: «El que tiene dos túnicas[a], comparta con el que no tiene ninguna, y el que tiene comida, haga lo mismo».'
  rationale: Se mantiene la estructura y el tono del borrador, pero se restaura la nota cultural documentada para χιτών y se aclara en español la referencia implícita en «el que no tiene ninguna». No se requiere adjudicación adicional.
