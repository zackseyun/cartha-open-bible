translation:
  language: es
  text: 'Y respondiendo, les dijo: «El que tiene dos túnicas[a], comparta con el que no tiene ninguna, y el que tiene comida, haga lo mismo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «camisas» o «vestiduras»; el griego se refiere a una túnica, una prenda básica que se llevaba junto al cuerpo.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answering
  chosen_spanish: respondiendo
  alternatives_spanish:
  - en respuesta
  - contestando
  lexicon: BDAG
  rationale: El participio introductorio se expresa naturalmente en español con un gerundio que conserva la relación con el verbo principal sin forzar una subordinación pesada.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector suave; «Y» preserva el flujo narrativo sin introducir contraste que el contexto no exige.
- source_word: ἔλεγεν
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les estaba diciendo
  - les hablaba
  lexicon: BDAG
  rationale: El imperfecto griego puede sugerir continuidad, pero en español narrativo «les dijo» resulta más natural y mantiene el sentido de la respuesta.
- source_word: Ὁ ἔχων
  english_pob_choice: The one who has
  chosen_spanish: El que tiene
  alternatives_spanish:
  - Quien tiene
  - El que posee
  lexicon: BDAG
  rationale: El participio sustantivado masculino singular se vierte con un singular representativo claro y no arcaico, conservando la fuerza genérica sin masculinizar innecesariamente con un giro antiguo.
- source_word: δύο χιτῶνας
  english_pob_choice: two tunics
  chosen_spanish: dos túnicas
  alternatives_spanish:
  - dos camisas
  - dos vestiduras
  lexicon: BDAG
  rationale: χιτών designa una prenda básica junto al cuerpo; «túnicas» es el equivalente más preciso y evita modernizar en exceso con «camisas».
- source_word: μεταδότω
  english_pob_choice: must share
  chosen_spanish: comparta
  alternatives_spanish:
  - debe compartir
  - que comparta
  lexicon: BDAG
  rationale: El imperativo exhortativo de tercera persona se expresa con el subjuntivo exhortativo español, que suena natural y conserva el tono imperativo sin añadir modalización ajena al griego.
- source_word: τῷ μὴ ἔχοντι
  english_pob_choice: with the one who has none
  chosen_spanish: con el que no tiene
  alternatives_spanish:
  - al que no tiene
  - con el que carece
  lexicon: BDAG
  rationale: La frase dativa con participio negativo se vierte de forma idiomática en español como destinatario carente del objeto implícito; el contexto hace claro de qué carece.
- source_word: βρώματα
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimentos
  - viandas
  lexicon: BDAG
  rationale: βρώματα es un plural amplio de cosas para comer; «comida» es la opción más natural y transparente en español contemporáneo.
- source_word: ὁμοίως ποιείτω
  english_pob_choice: must do likewise
  chosen_spanish: haga lo mismo
  alternatives_spanish:
  - actúe igualmente
  - proceda de igual manera
  lexicon: BDAG
  rationale: La segunda exhortación paralela se expresa con una equivalencia idiomática directa que mantiene el paralelismo y la fuerza imperativa.
theological_decisions:
- issue: Singular representativo y lenguaje genérico
  english_pob_reading: The one who has ... the one who has ...
  chosen_spanish_reading: El que tiene ... el que tiene ...
  alternative_spanish_readings:
  - Quien tiene ... quien tiene ...
  - El que posee ... el que posee ...
  rationale: El griego usa participios masculinos singulares con valor genérico. En español, «el que» conserva ese singular representativo de manera clara y fiel, sin recurrir a un masculino arcaico que hoy podría oscurecer el sentido.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con la fuente es alto; esta versión mantiene esa lectura estable, corrigiendo únicamente el anclaje de la nota para que aparezca explícitamente en el texto español.
  spanish_consistency_notes:
  - Se preserva la estructura responsiva del participio inicial con un gerundio español natural.
  - «Túnicas» mantiene el valor cultural del χιτών sin sustituirlo por «camisas» o «ropas» más genéricas.
  - Se conserva el paralelo exhortativo entre dar la segunda túnica y actuar igualmente con la comida.
  - La nota al pie queda anclada correctamente en «respondiendo[a]» para cumplir la disciplina de marcadores únicos.
