review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: respuesta introductoria, instrucción genérica en singular, reparto de ropa y comida, y paralelismo exhortativo. Sin embargo, omite la nota cultural importante sobre χιτῶνας que sí fue preservada en el rastro POB en inglés, y la frase «con el que no tiene» queda algo elíptica en español frente al referente implícito de la prenda.'
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. No obstante, «con el que no tiene» suena incompleto en español; «con el que no tiene ninguna» o «con quien no tiene» mejora la claridad. También conviene conservar la nota sobre «túnicas» para legibilidad cultural.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Túnicas», «comida» y el singular representativo están bien manejados. La decisión de usar «respondiendo» es aceptable, aunque la nota asociada no debe desplazar la nota cultural más relevante sobre χιτών.
  issues:
  - severity: medium
    issue: Falta la nota cultural sobre «túnicas».
    rationale: El English POB conservó una nota sobre χιτών como prenda básica junto al cuerpo, con alternativas como «camisas» o «vestiduras». Esa información sigue siendo útil y fiel en español, y no debería perderse sin razón documentada.
  - severity: low
    issue: «Con el que no tiene» queda elíptico en español.
    rationale: Aunque el objeto implícito se recupera del contexto griego, en español esta formulación puede sonar truncada. Añadir «ninguna» hace explícita la carencia sin sobretraducir.
  revised_spanish_text: 'Y respondiendo, les dijo: «El que tiene dos túnicas[a], comparta con el que no tiene ninguna, y el que tiene comida, haga lo mismo».'
  revised_footnotes:
  - marker: a
    text: O «camisas» o «vestiduras»; el griego se refiere a una túnica, una prenda básica que se llevaba junto al cuerpo.
    reason: cultural_note
