base_translation:
  language: en
  yaml_path: translation/nt/luke/016/006.yaml
  text: He said[a], ‘A hundred baths of olive oil.’ Then he said to him, ‘Take your bill, sit down quickly[b], and write fifty.’
  footnotes:
