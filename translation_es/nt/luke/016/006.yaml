    rationale: Literalmente posible, pero en este contexto económico queda demasiado vago. El inglés auditado explica que se refiere al registro escrito de la deuda; en español «tu cuenta» o «tu documento de deuda» comunica mejor el sentido sin sobreinterpretar excesivamente.
