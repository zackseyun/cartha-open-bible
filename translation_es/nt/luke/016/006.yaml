translation:
  language: es
  text: 'Y él dijo: «Cien batos[a] de aceite de oliva». Entonces le dijo: «Toma tu cuenta[b], siéntate enseguida y escribe cincuenta».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Un bato era una antigua medida líquida. El griego dice: «cien batos de aceite de oliva».'
    reason: cultural_note
  - marker: b
    text: O «tu contrato escrito» o «tus documentos»; el griego dice literalmente «tus escritos». En este contexto se refiere al registro escrito de la deuda.
    reason: lexical_alternative
lexical_decisions:
- source_word: βάτους
  english_pob_choice: baths
  chosen_spanish: batús
  alternatives_spanish:
  - medidas
  - batos
  lexicon: BDAG
  rationale: βάτος nombra una medida líquida concreta; conservarla como préstamo transliterado mantiene la precisión económica del pasaje y evita sustituirla por un término genérico. En español, «batús» funciona como equivalente transparente de la unidad antigua, con nota explicativa.
- source_word: ἐλαίου
  english_pob_choice: olive oil
  chosen_spanish: aceite de oliva
  alternatives_spanish:
  - aceite
  lexicon: BDAG
  rationale: En este contexto ἔλαιον se refiere naturalmente a aceite de oliva. «Aceite de oliva» es más claro para el lector moderno y preserva la referencia concreta del bien comercial.
- source_word: Δέξαι
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Recibe
  - Agárralo
  lexicon: BDAG
  rationale: El imperativo de δέχομαι aquí pide tomar en mano el documento. «Toma» es idiomático y comunica mejor la acción inmediata que «recibe».
- source_word: τὰ γράμματα
  english_pob_choice: your bill
  chosen_spanish: tu escrito
  alternatives_spanish:
  - tu documento
  - tu cuenta
  - tu recibo
  lexicon: BDAG
  rationale: γράμματα significa literalmente «escritos/documentos»; en el contexto de deuda alude al registro escrito. «Tu escrito» conserva la amplitud léxica del griego sin especificar más de lo que el texto exige, y deja espacio a la nota sobre el sentido comercial.
- source_word: καθίσας
  english_pob_choice: sit down
  chosen_spanish: siéntate
  alternatives_spanish:
  - habiéndote sentado
  - sentándote
  lexicon: BDAG
  rationale: El participio aoristo funciona como acción acompañante de la orden siguiente. En español, coordinarlo como mandato («siéntate») reproduce de modo natural la secuencia de acciones.
- source_word: ταχέως
  english_pob_choice: quickly
  chosen_spanish: rápido
  alternatives_spanish:
  - de prisa
  - enseguida
  - pronto
  lexicon: BDAG
  rationale: ταχέως expresa rapidez. «Rápido» es claro, breve y adecuado en el tono directo del mandato.
- source_word: γράψον
  english_pob_choice: write
  chosen_spanish: escribe
  alternatives_spanish:
  - anota
  - escríbelo
  lexicon: BDAG
  rationale: γράφω aquí se refiere a registrar la cantidad revisada en el documento de deuda. «Escribe» es la equivalencia más directa y no añade contenido ajeno al griego.
- source_word: πεντήκοντα
  english_pob_choice: fifty
  chosen_spanish: cincuenta
  lexicon: BDAG
  rationale: Numeral simple; no requiere expansión interpretativa.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y el audit trail inglés. La única decisión de estilo relevante fue conservar la concreción económica del término βάτους con una transliteración española explicada en nota, en vez de generalizarlo como «medidas».
  spanish_consistency_notes:
  - Se usó «aceite de oliva» para reflejar la commodity concreta del pasaje.
  - Se mantuvo el trato singular en «tu escrito» para adaptar el plural griego γραμμάτων al documento de deuda en español, como hace el POB inglés con «your bill».
  - Se conservó la estructura narrativa simple y los imperativos encadenados para reproducir la urgencia del mandato.
