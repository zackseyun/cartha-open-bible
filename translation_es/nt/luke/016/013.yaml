translation:
  language: es
  text: Ningún siervo doméstico puede servir a dos amos; porque o aborrecerá al uno y amará al otro, o se aferrará a uno y despreciará al otro. Ustedes no pueden servir a Dios y a Mamón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mamón» conserva el término del griego mammonâs. También puede entenderse como «riquezas» o «dinero»; aquí funciona como una realidad personificada que rivaliza con Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκέτης
  english_pob_choice: household servant
  chosen_spanish: siervo doméstico
  alternatives_spanish:
  - sirviente de la casa
  - servidor doméstico
  - esclavo doméstico
  lexicon: BDAG
  rationale: οἰκέτης nombra a un miembro del ámbito doméstico en condición servil. 'Siervo doméstico' conserva el entorno de casa y la relación de subordinación sin forzar 'esclavo' donde el término específico no es δοῦλος.
- source_word: κυρίοις
  english_pob_choice: masters
  chosen_spanish: amos
  alternatives_spanish:
  - señores
  - dueños
  lexicon: BDAG
  rationale: En este dicho social, κύριοι se refiere a propietarios/amos humanos. 'Amos' comunica bien la relación de dominio y evita confusión con el uso de θεῷ en la segunda mitad.
- source_word: δουλεύειν
  english_pob_choice: serve
  chosen_spanish: servir
  alternatives_spanish:
  - ser esclavo de
  - estar al servicio de
  lexicon: BDAG
  rationale: El verbo expresa servir con la lógica de esclavitud o servidumbre. 'Servir' es natural en español y mantiene la fuerza proverbial; el matiz de dominio queda sostenido por 'amos' y por la imposibilidad expresada.
- source_word: μισήσει
  english_pob_choice: hate
  chosen_spanish: aborrecerá
  alternatives_spanish:
  - odiará
  - detestará
  lexicon: BDAG
  rationale: El sentido normal es un rechazo fuerte. 'Aborrecerá' suena más idiomático y solemne en español bíblico actual que 'odiará', sin suavizar la oposición.
- source_word: ἀγαπήσει
  english_pob_choice: love
  chosen_spanish: amará
  alternatives_spanish:
  - querrá
  - apreciará
  lexicon: BDAG
  rationale: '''Amará'' es la correspondencia directa de ἀγαπάω y preserva el contraste deliberado con ''aborrecerá''.'
- source_word: ἀνθέξεται
  english_pob_choice: be devoted to
  chosen_spanish: se aferrará a
  alternatives_spanish:
  - se mantendrá firme con
  - será leal a
  - se apegará a
  lexicon: BDAG
  rationale: ἀντέχομαι aquí comunica adherirse firmemente o aferrarse a una de las partes. 'Se aferrará a' expresa la idea de sujeción/alineamiento personal mejor que una formulación más abstracta.
- source_word: καταφρονήσει
  english_pob_choice: despise
  chosen_spanish: despreciará
  alternatives_spanish:
  - menospreciará
  - desestimará
  lexicon: BDAG
  rationale: El verbo implica mirar con desdén o desprecio. 'Despreciará' es directo, fuerte y corresponde bien al paralelo con 'se aferrará a'.
- source_word: θεῷ
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Dativo claro de δουλεύειν. 'Dios' es la traducción natural y mantiene la oposición con 'Mamón'.
- source_word: μαμωνᾷ
  english_pob_choice: Mammon
  chosen_spanish: Mamón
  alternatives_spanish:
  - riquezas
  - dinero
  lexicon: BDAG
  rationale: μαμωνᾶς es un préstamo semítico que personifica las riquezas. Se conserva 'Mamón' para preservar esa fuerza retórica y la tensión con Dios, con lectura alternativa explicada en nota.
theological_decisions:
- issue: Rivalidad entre Dios y μαμωνᾶς
  english_pob_reading: Mammon as a rival master, not merely money/wealth
  chosen_spanish_reading: Mamón como poder rival, no solo como dinero o riquezas
  alternative_spanish_readings:
  - dinero
  - riquezas
  rationale: El dicho contrapone dos señores incompatibles. Mantener 'Mamón' conserva la personificación del poder de la riqueza y evita aplanar la tensión teológica del texto.
  doctrine_reference: 'Translation philosophy: preservar la fuerza retórica y la tensión teológica del original.'
- issue: Sujeto genérico singular en los ejemplos
  english_pob_reading: he will hate ... love ... be devoted to ... despise
  chosen_spanish_reading: singular genérico implícito en las formas verbales
  alternative_spanish_readings:
  - señalar explícitamente 'él'
  - usar plural impersonal
  rationale: El griego usa formas singulares como sentencia proverbial. El español puede omitir el pronombre sin perder el carácter genérico ni alterar el sentido.
  doctrine_reference: Equivalencia óptima con concordancia natural en español.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego y el audit trail en inglés. Se conservó la estructura antitética, el singular genérico y el nombre 'Mamón' para mantener la personificación de las riquezas. Se ajustó el orden para español natural sin perder la correspondencia frase a frase.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεῷ, conforme al estándar del proyecto.
  - Se conserva 'Mamón' en el texto principal y se explica su valor semítico/personificado en nota.
  - Se eligió 'amos' para κυρίοις por correspondencia natural en el contexto doméstico y servil.
  - '''Siervo doméstico'' evita sobrerretraducir οἰκέτης como ''esclavo'' mientras conserva subordinación real.'
