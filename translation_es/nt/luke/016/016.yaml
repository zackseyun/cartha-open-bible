translation:
  language: es
  text: La Ley y los Profetas fueron hasta Juan; desde entonces el reino de Dios se proclama como buena noticia, y todos se abren paso para entrar en él.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos entran por la fuerza en él». El verbo griego puede comunicar movimiento enérgico o fuerza; la redacción principal refleja el sentido de entrada urgente al reino.'
    reason: lexical_alternative
  - marker: b
    text: Algunos entienden esta cláusula de modo más negativo a la luz de una frase semejante en Mateo 11:12, pero aquí el sujeto griego es «todos», no «el reino».
    reason: alternative_reading
lexical_decisions:
- source_word: Ὁ νόμος
  english_pob_choice: The Law
  chosen_spanish: La Ley
  alternatives_spanish:
  - la ley
  lexicon: BDAG
  rationale: Se trata de la categoría salvífica y escritural de la Ley mosaica, no de la ley en sentido general. La mayúscula ayuda a señalar ese corpus reconocido junto con los Profetas.
- source_word: οἱ προφῆται
  english_pob_choice: the Prophets
  chosen_spanish: los Profetas
  alternatives_spanish:
  - los profetas
  lexicon: BDAG
  rationale: Mantiene la pareja tradicional 'la Ley y los Profetas' como designación bíblica/judía del conjunto escritural, con mayúscula por tratarse de un título de corpus.
- source_word: μέχρι Ἰωάννου
  english_pob_choice: until John
  chosen_spanish: hasta Juan
  alternatives_spanish:
  - hasta el tiempo de Juan
  - hasta Juan el Bautista
  lexicon: BDAG
  rationale: '''Hasta Juan'' reproduce el límite temporal de manera natural en español. El referente es Juan el Bautista por el contexto, sin necesidad de añadirlo al texto principal.'
- source_word: ἀπὸ τότε
  english_pob_choice: from then on
  chosen_spanish: desde entonces
  alternatives_spanish:
  - a partir de entonces
  - desde ese momento
  lexicon: BDAG
  rationale: Expresa el cambio temporal con continuidad hacia el presente de forma idiomática y sobria en español.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios es
  - la realeza de Dios
  lexicon: BDAG
  rationale: '''Reino de Dios'' conserva la formulación habitual y la amplitud semántica de βασιλεία sin reducirla solo a un dominio territorial ni solo a una idea abstracta de reinado.'
- source_word: εὐαγγελίζεται
  english_pob_choice: is proclaimed as good news
  chosen_spanish: es proclamado como buenas nuevas
  alternatives_spanish:
  - es anunciado como buenas nuevas
  - se proclama como buenas nuevas
  - es evangelizado
  lexicon: BDAG
  rationale: La pasiva presente expresa una proclamación en curso. 'Buenas nuevas' preserva el sentido de εὐαγγελίζω sin recurrir a una paráfrasis más libre; 'es proclamado' evita el progresivo innecesario.
- source_word: πᾶς
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno
  - todo el mundo
  - todos y cada uno
  lexicon: BDAG
  rationale: En español, el distributivo singular griego se comunica con naturalidad mediante 'todos' en este contexto colectivo y de alcance amplio.
- source_word: εἰς αὐτὴν
  english_pob_choice: into it
  chosen_spanish: hacia él
  alternatives_spanish:
  - a ella
  - dentro de él
  lexicon: BDAG
  rationale: El antecedente es 'reino' (masculino en español), por eso se usa 'él'. 'Hacia' permite mantener la idea de movimiento de entrada sin forzar una equivalencia demasiado literal con 'en él'.
- source_word: βιάζεται
  english_pob_choice: is forcing his way
  chosen_spanish: se abren paso
  alternatives_spanish:
  - se esfuerzan por entrar
  - empatan a empujones
  - se meten por la fuerza
  lexicon: BDAG
  rationale: El verbo es difícil en esta construcción. 'Se abren paso' conserva la idea de movimiento enérgico, presión e incluso esfuerzo intenso, sin decidir de forma tajante por una imagen más violenta de la que el contexto inmediato no exige.
theological_decisions:
- issue: Sentido de βιάζεται en relación con el reino de Dios
  english_pob_reading: The clause describes people urgently and forcefully pressing into the kingdom, not the kingdom itself suffering violence.
  chosen_spanish_reading: La cláusula describe a la gente que se abre paso con urgencia hacia el reino, no al reino sufriendo violencia.
  alternative_spanish_readings:
  - el reino de Dios sufre violencia, y los violentos lo toman por la fuerza
  - todos se esfuerzan intensamente por entrar en él
  rationale: En Lucas 16:16 el sujeto de βιάζεται es πᾶς ('todos'), y εἰς αὐτὴν favorece el sentido de entrada hacia el reino. La traducción conserva la fuerza del verbo sin convertirlo en una afirmación doctrinal sobre violencia ejercida sobre el reino ni en una lectura meritoria de autosalvación.
  doctrine_reference: Preservar la tensión textual; no resolverla de antemano con una lectura simplificadora, en línea con la nota auditada de POB.
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que prefirió una pasiva presente natural en español ('es proclamado') en lugar de un progresivo innecesario, y mantiene la lectura de la cláusula final como entrada urgente al reino, no como sufrimiento del reino.
  spanish_consistency_notes:
  - Se conserva 'la Ley y los Profetas' como fórmula establecida para la categoría escritural.
  - '''Buenas nuevas'' mantiene la decisión léxica vinculada a εὐαγγελίζω y evita sustituirla por un término eclesiástico más interpretativo.'
  - Se usa 'reino de Dios' de forma consistente con la terminología base del proyecto.
  - La referencia pronominal final se ajusta al género natural del español ('él') mientras el antecedente sigue siendo 'reino'.
