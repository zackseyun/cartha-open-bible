revisions:
- from: La Ley y los Profetas fueron hasta Juan[a]; desde entonces el reino de Dios es proclamado como buenas nuevas[b], y todos se abren paso hacia él.
  to: La Ley y los Profetas fueron hasta Juan; desde entonces el reino de Dios se proclama como buena noticia, y todos se abren paso para entrar en él.[a][b]
  rationale: Se corrigieron las anclas de las notas para que correspondan a la cláusula final, donde realmente está la dificultad léxica y exegética. También se reemplazó «hacia él» por «para entrar en él» para reflejar mejor εἰς αὐτήν, y se hizo más natural «εὐαγγελίζεται» con «se proclama como buena noticia». Se mantuvo la lectura auditada de βιάζεται como entrada urgente/forzosa al reino, sin convertirla en una afirmación de que el reino sufre violencia.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:01:43Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura de salvación-historia de «La Ley y los Profetas … hasta Juan» y también entiende correctamente que el sujeto de βιάζεται es πᾶς, no «el reino». Sin embargo, presenta dos desajustes importantes con el griego y con la auditoría inglesa: (1) las notas están invertidas/mal ancladas; [a] aparece en «Juan» pero el contenido de la nota trata βιάζεται, mientras que [b] aparece tras «buenas nuevas» pero el contenido de la nota trata la cláusula final, no εὐαγγελίζεται; y (2) «hacia él» debilita εἰς αὐτήν, que indica movimiento de entrada «en/into» el reino, no solo dirección hacia él.'
  spanish_quality_summary: El español es generalmente claro y digno. «La Ley y los Profetas» y «desde entonces» funcionan bien. No obstante, «es proclamado como buenas nuevas» suena algo rígido en español eclesial moderno; «se proclama como buena noticia» o «se anuncia como buena noticia» resulta más natural. Además, «todos se abren paso hacia él» comunica esfuerzo, pero «hacia él» queda corto frente al matiz de entrada. Conviene ajustar a «entran por la fuerza en él» o «se abren paso para entrar en él».
  glossary_alignment: 'Alineación en general buena con terminología del proyecto: «Dios» y «reino» están bien. No hay cuestiones de Yahvé/Mesías aquí. La decisión sobre βιάζεται sigue la línea auditada de entrada forzosa/urgente al reino, pero el español debe conservar mejor el matiz de εἰς («en él») y la correspondencia de notas con el texto.'
  issues:
  - severity: high
    issue: Las notas al pie están mal ubicadas y no corresponden a sus anclas en el texto.
    rationale: La marca [a] está colocada en «Juan», pero la nota [a] explica una alternativa para βιάζεται («todos se abren paso…»). La marca [b] está colocada en «buenas nuevas», pero la nota [b] explica la cláusula final sobre βιάζεται y Mateo 11:12. Esto incumple la disciplina de anclar cada nota exactamente a la palabra o frase pertinente.
  - severity: medium
    issue: «hacia él» no refleja adecuadamente εἰς αὐτήν.
    rationale: El griego expresa movimiento de entrada al reino («into it»), no mera orientación hacia él. En español, «hacia él» puede sugerir solo dirección. Debe decirse «en él» o una construcción equivalente que mantenga la idea de entrar.
  - severity: medium
    issue: «es proclamado como buenas nuevas» es comprensible pero algo poco natural en español contemporáneo.
    rationale: Aunque formalmente posible, suena más calcado del inglés. Una forma impersonal/refleja como «se proclama como buena noticia» preserva el valor de εὐαγγελίζεται con mayor naturalidad y dignidad en español amplio.
  - severity: low
    issue: «todos» podría afinarse a «todo el mundo» o «todos», pero no es problemático.
    rationale: «Todos» comunica bien el distributivo amplio de πᾶς en este contexto. No requiere cambio por fidelidad, solo observación estilística.
  revised_spanish_text: La Ley y los Profetas fueron hasta Juan; desde entonces el reino de Dios se proclama como buena noticia, y todos se abren paso para entrar en él.[a][b]
  revised_footnotes:
  - marker: a
    text: 'O: «todos entran por la fuerza en él». El verbo griego puede comunicar movimiento enérgico o fuerza; la redacción principal refleja el sentido de entrada urgente al reino.'
    reason: lexical_alternative
  - marker: b
    text: Algunos entienden esta cláusula de modo más negativo a la luz de una frase semejante en Mateo 11:12, pero aquí el sujeto griego es «todos», no «el reino».
    reason: alternative_reading
  revision_rationale: Se corrigieron las anclas de las notas para que correspondan a la cláusula final, donde realmente está la dificultad léxica y exegética. También se reemplazó «hacia él» por «para entrar en él» para reflejar mejor εἰς αὐτήν, y se hizo más natural «εὐαγγελίζεται» con «se proclama como buena noticia». Se mantuvo la lectura auditada de βιάζεται como entrada urgente/forzosa al reino, sin convertirla en una afirmación de que el reino sufre violencia.
