  text: Ὁ νόμος καὶ οἱ προφῆται ⸀μέχρι Ἰωάννου· ἀπὸ τότε ἡ βασιλεία τοῦ θεοῦ εὐαγγελίζεται καὶ πᾶς εἰς αὐτὴν βιάζεται.
base_translation:
  language: en
  yaml_path: translation/nt/luke/016/016.yaml
  text: The Law and the Prophets were until John[a]; from then on the kingdom of God is proclaimed as good news[b], and everyone is forcing his way into it.
  footnotes:
  - marker: a
    text: Or 'everyone is pressing into it.' The Greek verb can convey forceful movement; the wording here reflects the sense of urgent entry into the kingdom.
    reason: lexical_alternative
  - marker: b
    text: Some understand the final clause more negatively in light of a similar saying in Matthew 11:12, but here the Greek subject is 'everyone,' not 'the kingdom.'
    reason: alternative_reading
