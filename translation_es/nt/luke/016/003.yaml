translation:
  language: es
  text: 'Entonces el administrador[a] se dijo a sí mismo: «¿Qué voy a hacer, puesto que mi señor me quita la administración? No tengo fuerzas para cavar; me da vergüenza mendigar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Administrador» traduce la función del οἰκονόμος; el término griego también admite «mayordomo», y el verso usa además un cognado para la oficina o responsabilidad que se le está quitando.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκονόμος
  english_pob_choice: manager
  chosen_spanish: administrador
  alternatives_spanish:
  - mayordomo
  - gerente
  - encargado
  lexicon: BDAG
  rationale: En este contexto parabólico designa a la persona encargada de gestionar bienes o asuntos ajenos. «Administrador» comunica bien la función de gestión en español moderno sin cargar de forma innecesaria el matiz eclesiástico de «mayordomo», aunque esa alternativa queda disponible por la cognación con οἰκονομία.
- source_word: ἐν ἑαυτῷ
  english_pob_choice: to himself
  chosen_spanish: se dijo a sí mismo
  alternatives_spanish:
  - pensó para sí
  - dijo dentro de sí
  lexicon: BDAG
  rationale: La frase expresa discurso interior o reflexión interna. «Se dijo a sí mismo» es idiomático en español y conserva la idea de auto-coloquio sin volverlo más interpretativo de lo que pide el griego.
- source_word: Τί ποιήσω
  english_pob_choice: What will I do
  chosen_spanish: ¿Qué voy a hacer?
  alternatives_spanish:
  - ¿Qué haré?
  - ¿Qué debo hacer?
  lexicon: BDAG
  rationale: El aoristo deliberativo expresa una decisión buscada ante una situación apremiante. «¿Qué voy a hacer?» suena natural en español y mantiene el valor deliberativo; «¿Qué haré?» también es posible, pero aquí resulta menos conversacional.
- source_word: κύριός
  english_pob_choice: master
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - dueño
  - señor
  lexicon: BDAG
  rationale: Aquí κύριος refiere al superior humano en la parábola, no al título divino. «Señor» reproduce la relación de autoridad de manera natural y es suficientemente neutral; «amo» podría sonar demasiado duro, y «dueño» estrecha el sentido a propiedad.
- source_word: ἀφαιρεῖται
  english_pob_choice: is taking ... away
  chosen_spanish: me quita
  alternatives_spanish:
  - me está quitando
  - me retira
  - me está removiendo
  lexicon: BDAG
  rationale: El verbo indica quitar o retirar algo de la esfera de alguien. «Me quita» es breve y fiel en español; el complemento «la administración» deja claro qué se quita.
- source_word: οἰκονομίαν
  english_pob_choice: the management
  chosen_spanish: la administración
  alternatives_spanish:
  - la mayordomía
  - la gestión
  - el cargo
  lexicon: BDAG
  rationale: La palabra nombra el oficio o responsabilidad encomendada, no solo una administración abstracta. «La administración» comunica bien la función y mantiene cierta proximidad con οἰκονόμος; «la mayordomía» preserva la familia léxica, pero en español puede sonar más eclesiástica o menos inmediata.
- source_word: σκάπτειν
  english_pob_choice: to dig
  chosen_spanish: cavar
  alternatives_spanish:
  - excavar
  - trabajar cavando
  lexicon: BDAG
  rationale: El infinitivo es literal y alude a trabajo manual. «Cavar» es el verbo más natural y directo en español; «excavar» puede sonar más técnico.
- source_word: οὐκ ἰσχύω
  english_pob_choice: I am not strong enough
  chosen_spanish: No puedo
  alternatives_spanish:
  - No tengo fuerzas
  - No soy capaz
  lexicon: BDAG
  rationale: El griego combina incapacidad con la idea de falta de fuerza, en contraste con cavar. «No puedo» es la forma española más natural en la línea del relato; la nota lexical preserva que el trasfondo es capacidad/fuerza física.
- source_word: ἐπαιτεῖν
  english_pob_choice: to beg
  chosen_spanish: pedir limosna
  alternatives_spanish:
  - mendigar
  - pedir
  - solicitar limosna
  lexicon: BDAG
  rationale: El verbo significa pedir como mendigo, pedir limosna. «Pedir limosna» es claro y evita una rusticidad excesiva de «mendigar»; además explicita el tipo de petición que el contexto requiere.
- source_word: αἰσχύνομαι
  english_pob_choice: I am ashamed
  chosen_spanish: me da vergüenza
  alternatives_spanish:
  - me avergüenzo
  - me siento avergonzado
  lexicon: BDAG
  rationale: El verbo expresa vergüenza ante la posibilidad de pedir limosna. «Me da vergüenza» es natural en español y conserva el matiz afectivo sin sobrecargarlo con una formulación más abstracta.
theological_decisions:
- issue: Traducción de κύριος en un contexto parabólico no divino
  english_pob_reading: master
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - amo
  - dueño
  rationale: El referente es el superior humano del administrador dentro de la parábola, no una designación de Cristo o de Dios. Por eso se evita una capitalización devocional y también se evita «amo» si resultara demasiado servil o «dueño» si redujera el matiz relacional de autoridad.
  doctrine_reference: 'DOCTRINE.md: Contested terms (κύριος), Translation philosophy items 1 and 5'
- issue: Relación léxica entre οἰκονόμος y οἰκονομία
  english_pob_reading: manager / management
  chosen_spanish_reading: administrador / administración
  alternative_spanish_readings:
  - mayordomo / mayordomía
  - encargado / encargo
  rationale: El griego usa términos cognados para la persona y su oficio. En español se conserva la relación funcional con «administrador / administración», que es clara y auditable; se evita forzar una terminología eclesial donde el contexto narra una función económica y doméstica.
  doctrine_reference: 'DOCTRINE.md: lexical transparency and contested terms'
- issue: Valor de ἰσχύω con σκάπτειν
  english_pob_reading: I am not strong enough to dig
  chosen_spanish_reading: No puedo cavar
  alternative_spanish_readings:
  - No tengo fuerzas para cavar
  - No soy capaz de cavar
  rationale: El texto contrapone el trabajo físico de cavar con la incapacidad del personaje. En español, «No puedo» mantiene la fuerza narrativa y permite que el lector perciba la limitación física por el contexto, sin añadir una paráfrasis más explicativa de lo necesario.
  doctrine_reference: Translation philosophy items 2 and 5
translation_notes:
  revision_awareness: 'El texto sigue de cerca el estado revisado final del audit trail en inglés: no se documentan cambios posteriores relevantes y la concordancia general del control cruzado fue alta (0.95), por lo que la draft española mantiene las decisiones léxicas principales sin introducir nuevas variantes interpretativas.'
  spanish_consistency_notes:
  - Se mantiene «administrador / administración» como pareja léxica para reflejar la cognación οἰκονόμος / οἰκονομία.
  - Se evita «SEÑOR» como máscara editorial; «señor» se usa como tratamiento humano dentro de la parábola.
  - «Pedir limosna» conserva el contenido social de ἐπαιτεῖν sin elevarlo a un registro eclesiástico.
  - 'El paralelismo breve del original se conserva con dos cláusulas simples: incapacidad para cavar y vergüenza de pedir limosna.'
