translation:
  language: es
  text: Ya sé lo que haré[a], para que cuando sea apartado de la administración, me reciban en sus casas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando sea despedido de la administración».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνων
  english_pob_choice: I know
  chosen_spanish: Ya sé
  alternatives_spanish:
  - ya he decidido
  - ya he comprendido
  lexicon: BDAG
  rationale: El aoristo aquí expresa una toma de conciencia o resolución repentina. En español, «Ya sé» comunica bien esa decisión ya formada sin forzar un pretérito literal que sonaría menos natural en el contexto.
- source_word: τί ποιήσω
  english_pob_choice: what I will do
  chosen_spanish: lo que haré
  alternatives_spanish:
  - qué haré
  - qué debo hacer
  lexicon: BDAG
  rationale: La construcción deliberativa expresa una acción pensada de antemano. «Lo que haré» mantiene el valor prospectivo y fluye de manera natural en español.
- source_word: ἵνα ὅταν
  english_pob_choice: so that when
  chosen_spanish: para que cuando
  alternatives_spanish:
  - a fin de que cuando
  - para cuando
  lexicon: BDAG
  rationale: La secuencia introduce propósito con una eventualidad futura. «Para que cuando» conserva ambos matices y evita una paráfrasis más libre.
- source_word: μετασταθῶ
  english_pob_choice: I am removed
  chosen_spanish: sea removido
  alternatives_spanish:
  - sea despedido
  - sea quitado de aquí
  lexicon: BDAG
  rationale: El pasivo de μεθίστημι indica ser apartado o retirado de un cargo. «Sea removido» es suficientemente literal y mantiene la amplitud del término; «despedido» interpreta más estrechamente la pérdida de empleo.
- source_word: ἐκ τῆς οἰκονομίας
  english_pob_choice: from the management
  chosen_spanish: de la administración
  alternatives_spanish:
  - de la mayordomía
  - de mi cargo
  lexicon: BDAG
  rationale: οἰκονομία aquí designa la función o encargo de administrar la casa. «Administración» es claro en español y evita una carga teológica innecesaria que podría sugerir «mayordomía».
- source_word: δέξωνταί με
  english_pob_choice: they may receive me
  chosen_spanish: me reciban
  alternatives_spanish:
  - me acojan
  - me reciban con gusto
  lexicon: BDAG
  rationale: δέχομαι suele significar recibir o acoger. «Me reciban» conserva el sentido básico sin añadir afecto explícito que el griego no exige.
- source_word: εἰς τοὺς οἴκους ἑαυτῶν
  english_pob_choice: into their homes
  chosen_spanish: en sus casas
  alternatives_spanish:
  - a sus hogares
  - en sus propios hogares
  lexicon: BDAG
  rationale: οἶκος puede significar casa o hogar. «Casas» refleja bien el espacio físico de acogida; «sus» representa el reflexivo ἑαυτῶν, y «en» es idiomático en español con verbos de recepción.
translation_notes:
  revision_awareness: El texto base y la revisión más reciente muestran alta coincidencia y ningún cambio sustantivo requerido; se conserva la decisión óptima de la tradición POB en español, ajustando solo la naturalidad sintáctica.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» según las normas generales del proyecto, aunque este versículo no las activa.
  - Se evita «mayordomía» en el cuerpo principal porque en español puede sonar más eclesial o abstracto que el contexto parabólico inmediato.
  - El pronombre reflexivo de ἑαυτῶν queda absorbido naturalmente en «sus»; no hace falta explicitar «propias».
