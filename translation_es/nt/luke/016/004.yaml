    issue: Uso de 'removido' para μετασταθῶ
    rationale: Aunque semánticamente posible, en español eclesial general y neutral suena más a calco administrativo o anglicismo. 'Apartado' o 'quitado del cargo' comunican mejor la pérdida de puesto. Dado que la nota ya cubre la opción más estrecha 'despedido', 'apartado' funciona bien como texto principal amplio y natural.
  revised_spanish_text: Ya sé lo que haré[a], para que cuando sea apartado de la administración, me reciban en sus casas.
