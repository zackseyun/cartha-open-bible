review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del POB inglés: ἔγνων como realización presente, τί ποιήσω como plan futuro, ἵνα ὅταν como propósito con contingencia futura, y δέξωνταί με εἰς τοὺς οἴκους ἑαυτῶν como ser recibido en casas/hogares. La nota alternativa para μετασταθῶ también preserva adecuadamente la opción ''despedido''.'
  spanish_quality_summary: El español es claro y natural, pero 'removido' suena algo calcado y menos idiomático en español general para pérdida de cargo. 'Apartado' conserva mejor la amplitud del griego sin sonar anglicado. También 'Ya sé lo que haré' es correcto, aunque sin 'ya' también sería natural; no requiere cambio. El resto fluye bien en registro bíblico moderno y digno.
  glossary_alignment: No hay términos del glosario mayor en juego. 'Administración' para οἰκονομία encaja bien con la decisión auditada y evita una lectura teologizada de 'mayordomía'. 'Casas' es aceptable para οἶκοι; no es necesario forzar 'hogares'.
