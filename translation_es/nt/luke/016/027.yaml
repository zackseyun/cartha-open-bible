translation:
  language: es
  text: 'Entonces dijo[a]: «Te pido, entonces, padre, que lo envíes a la casa de mi padre»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te ruego». El verbo griego puede expresar una petición apremiante, aunque «te pido» es el sentido más básico.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δέ
  english_pob_choice: Then he said
  chosen_spanish: Entonces él dijo
  alternatives_spanish:
  - Y él dijo
  - Pero él dijo
  lexicon: BDAG
  rationale: δέ aquí marca una continuación narrativa leve; «Entonces» reproduce bien el avance del relato sin añadir contraste fuerte ni una calca dura.
- source_word: Ἐρωτῶ
  english_pob_choice: I ask
  chosen_spanish: Te pido
  alternatives_spanish:
  - Te solicito
  - Te ruego
  lexicon: BDAG
  rationale: ἐρωτάω puede expresar una petición insistente. En español, «te pido» conserva el sentido básico de solicitar, con una tonalidad suficientemente seria sin forzar un matiz más intenso que el del griego base.
- source_word: σε οὖν
  english_pob_choice: you then
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - pues
  lexicon: BDAG
  rationale: οὖν funciona como inferencia o continuación; en español, integrarlo como «entonces» mantiene la conexión discursiva de manera natural y fiel.
- source_word: πάτερ
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - Padre
  lexicon: BDAG
  rationale: El vocativo se dirige a Abraham dentro de la parábola. «padre» en minúscula conserva el apelativo sin introducir una lectura divina que el contexto no exige.
- source_word: ἵνα πέμψῃς
  english_pob_choice: that you send
  chosen_spanish: que lo envíes
  alternatives_spanish:
  - para que lo envíes
  - a fin de que lo envíes
  lexicon: BDAG
  rationale: Después de un verbo de petición, ἵνα con subjuntivo expresa el contenido de lo pedido. «Que lo envíes» es la manera más natural y fiel de expresar esa subordinación en español.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El referente es Lázaro del contexto previo. En español, el objeto directo clítico «lo» es más fluido que repetir el pronombre tónico.
- source_word: εἰς τὸν οἶκον τοῦ πατρός μου
  english_pob_choice: to my father’s house
  chosen_spanish: a la casa de mi padre
  alternatives_spanish:
  - a la casa de mi padre
  - hacia la casa de mi padre
  lexicon: BDAG
  rationale: οἶκος puede significar casa/hogar o casa como hogar familiar. «Casa de mi padre» reproduce la relación familiar y la meta del movimiento con naturalidad en español.
theological_decisions:
- issue: Vocativo πάτερ en el marco de la parábola
  english_pob_reading: father
  chosen_spanish_reading: padre
  alternative_spanish_readings:
  - Padre
  rationale: Se evita capitalizar el vocativo para no sugerir una invocación a Dios. El hablante se dirige a Abraham en el relato parabólico, así que «padre» mantiene el valor relacional/ancestral.
  doctrine_reference: Principio de primacía del texto original; no importar una formulación devocional ajena al contexto narrativo.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada. El texto español queda sin marcas de nota, porque no se requiere una alternativa textual obligatoria en esta cláusula y la petición puede expresarse de forma natural sin ambigüedad adicional.
  spanish_consistency_notes:
  - Se mantuvo «padre» en minúscula para el vocativo de Abraham.
  - Se evitó «Señor» o equivalentes litúrgicos porque el contexto no habla de Yahvé sino de una petición dirigida a Abraham.
  - «Entonces» refleja la continuidad de δέ/οὖν sin sobreinterpretar la relación lógica.
  - «Casa de mi padre» conserva el sentido familiar de οἶκος mejor que un literalismo como «hogar» o «casa del padre».
