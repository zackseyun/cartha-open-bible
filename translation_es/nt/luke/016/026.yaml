  text: καὶ ⸀ἐν πᾶσι τούτοις μεταξὺ ἡμῶν καὶ ὑμῶν χάσμα μέγα ἐστήρικται, ὅπως οἱ θέλοντες διαβῆναι ἔνθεν πρὸς ὑμᾶς μὴ δύνωνται, ⸀μηδὲ ἐκεῖθεν πρὸς ἡμᾶς διαπερῶσιν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/016/026.yaml
  text: And besides all these things[a], between us and you a great chasm has been fixed, so that those wanting to cross over from here to you cannot, nor can they cross over from there to us.
  footnotes:
