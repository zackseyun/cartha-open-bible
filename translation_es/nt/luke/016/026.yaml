translation:
  language: es
  text: Y además de todas estas cosas[a], entre nosotros y ustedes se ha fijado un gran abismo, de modo que los que quieren cruzar de aquí a ustedes no pueden, ni ellos pueden cruzar de allá hacia nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «además de todo esto». La frase griega puede introducir una consideración adicional de manera más idiomática.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πᾶσι τούτοις
  english_pob_choice: besides all these things
  chosen_spanish: y además de todas estas cosas
  alternatives_spanish:
  - y en todas estas cosas
  - y además de todo esto
  lexicon: BDAG
  rationale: La frase introduce una consideración adicional en el contexto, más que un sentido locativo literal. «Y además de» conserva ese valor discursivo y evita una traducción demasiado rígida como «en todas estas cosas».
- source_word: μεταξὺ ἡμῶν καὶ ὑμῶν
  english_pob_choice: between us and you
  chosen_spanish: entre nosotros y ustedes
  alternatives_spanish:
  - entre nosotros y vosotros
  - entre nosotros y ti
  lexicon: BDAG
  rationale: Mantiene la relación espacial/relacional del griego. «Ustedes» es natural en español neutro y refleja el plural implícito del contexto.
- source_word: χάσμα μέγα
  english_pob_choice: a great chasm
  chosen_spanish: un gran abismo
  alternatives_spanish:
  - un gran chasm
  - un gran precipicio
  lexicon: BDAG
  rationale: «Abismo» comunica bien la separación profunda y es idiomático en español. «Chasm» sería demasiado técnico o ajeno; «precipicio» desplaza la imagen hacia un borde físico distinto.
- source_word: ἐστήρικται
  english_pob_choice: has been fixed
  chosen_spanish: se ha fijado
  alternatives_spanish:
  - ha sido establecido
  - se ha establecido
  lexicon: BDAG
  rationale: El perfecto pasivo presenta una condición ya establecida y permanente. «Se ha fijado» comunica bien esa estabilidad sin cargar el texto con una formulación más abstracta que «ha sido establecido».
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: Introduce el resultado o propósito de la separación. «De modo que» conserva la relación de cláusulas con naturalidad en español.
- source_word: οἱ θέλοντες
  english_pob_choice: those wanting
  chosen_spanish: los que quieren
  alternatives_spanish:
  - los que desean
  - los que quieren hacerlo
  lexicon: BDAG
  rationale: El participio substantivado se expresa de manera natural como un grupo definido. «Los que quieren» conserva la fuerza volitiva sin volverlo más interpretativo de lo necesario.
- source_word: διαβῆναι
  english_pob_choice: to cross over
  chosen_spanish: cruzar
  alternatives_spanish:
  - pasar al otro lado
  - cruzar al otro lado
  lexicon: BDAG
  rationale: El verbo denota atravesar de un lado a otro. En español, «cruzar» ya implica suficientemente ese movimiento y evita redundancia excesiva con la expresión de destino.
- source_word: ἔνθεν
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - desde aquí
  - de este lado
  lexicon: BDAG
  rationale: Mantiene la perspectiva deíctica del hablante o del lado referido. «De aquí» es claro y breve en español.
- source_word: μὴ δύνωνται
  english_pob_choice: cannot
  chosen_spanish: no pueden
  alternatives_spanish:
  - no son capaces
  - no les es posible
  lexicon: BDAG
  rationale: Expresa incapacidad real, no mera prohibición. «No pueden» es directo y natural.
- source_word: μηδὲ
  english_pob_choice: nor can
  chosen_spanish: ni tampoco pueden
  alternatives_spanish:
  - ni pueden
  - ni les es posible
  lexicon: BDAG
  rationale: Conserva el paralelismo de la segunda imposibilidad y la coordinación negativa del griego. «Ni tampoco pueden» reproduce bien el énfasis acumulativo.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allá
  alternatives_spanish:
  - desde allá
  - de aquel lado
  lexicon: BDAG
  rationale: Mantiene la oposición deíctica con «de aquí». «De allá» es natural en español y conserva la distancia entre los dos ámbitos.
- source_word: διαπερῶσιν
  english_pob_choice: cross over
  chosen_spanish: cruzar
  alternatives_spanish:
  - pasar al otro lado
  - atravesar
  lexicon: BDAG
  rationale: La repetición de «cruzar» preserva el paralelismo con διαβῆναι y evita introducir matices distintos que el griego no exige.
theological_decisions:
- issue: Naturaleza de la separación entre los dos ámbitos del relato
  english_pob_reading: Render the language as a fixed, impassable separation without expanding it into a systematic doctrinal statement beyond the verse.
  chosen_spanish_reading: Traducirlo como una separación fijada e infranqueable, sin convertirlo en una afirmación doctrinal más amplia que el verso mismo.
  alternative_spanish_readings:
  - Interpretarlo como una descripción literal del paisaje del más allá.
  - Leerlo como una imagen puramente figurada sin implicación de separación permanente.
  rationale: El texto subraya la permanencia de la barrera y la imposibilidad de cruzarla. La traducción debe preservar esa fuerza sin resolver la tensión interpretativa ni añadir explicaciones doctrinales que el verso no explicita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se siguió el ajuste de la revisión inglesa más reciente al preferir una expresión más natural para ἐν πᾶσι τούτοις equivalente a «además de todas estas cosas», y se mantuvo el sujeto implícito de la segunda imposibilidad con una forma española directa y paralela. También se preservó la doble negación y el paralelismo entre las dos cláusulas de imposibilidad.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - Se conserva un registro neutral latinoamericano con «ustedes».
  - «Abismo» se elige por claridad y fuerza semántica; no se sustituye por un tecnicismo innecesario.
  - La repetición de «cruzar» mantiene el paralelismo verbal del griego.
