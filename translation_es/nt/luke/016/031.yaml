review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: la condición con Εἰ, la referencia metonímica a «Moisés y los Profetas», el valor de ἀναστῇ en contexto de resurrección y el matiz de πεισθήσονται como persuasión/convicción, no fe salvífica específica. Sin embargo, hay un problema menor de alineación formal y naturalidad en la construcción «tampoco se persuadirán aunque alguien resucite...», que suaviza la relación explícita de οὐδ’ ἐάν («ni/aun si») y suena menos directa que una condicional con «si».'
  spanish_quality_summary: 'El español es claro y digno, pero «se persuadirán» resulta menos idiomático que «serán persuadidos» o «se dejarán persuadir». Además, la secuencia de notas [c][b] está anclada de forma poco intuitiva: [b] debería ir con «de entre los muertos», no con «Profetas». La frase mejora en legibilidad y fidelidad con una leve reparación sintáctica y reubicación de notas.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Moisés y los Profetas» y «de entre los muertos» están bien. No aparecen términos sensibles como Yahvé, Mesías, δοῦλος, etc. La decisión de no traducir πεισθήσονται como «creerán» está correctamente alineada con la justificación teológica del POB.
  issues:
  - severity: medium
    issue: La construcción «tampoco se persuadirán aunque...» no refleja de la manera más fiel y natural el griego οὐδ’ ἐάν.
    rationale: οὐδ’ ἐάν intensifica la negación con una condición del tipo «ni aun si / ni siquiera si». En español, «aunque» puede sonar concesivo más que condicional y debilita el paralelismo con el original y con el POB inglés.
  - severity: medium
    issue: «Se persuadirán» es comprensible pero poco idiomático en este contexto.
    rationale: Para πεισθήσονται, el español natural prefiere «serán persuadidos» o «se convencerán». Dado que la nota preserva «se convencerán» como alternativa, «serán persuadidos» mantiene mejor la cercanía léxica al griego y al inglés sin sonar forzado.
  - severity: low
    issue: La nota [b] está colocada en un lugar incorrecto dentro del texto.
    rationale: La nota [b] explica «de entre los muertos», pero actualmente aparece tras «Profetas[c][b]». Debe anclarse en la frase correspondiente para que el lector la relacione correctamente.
  revised_spanish_text: 'Pero él le dijo[a]: «Si no escuchan a Moisés y a los Profetas, tampoco serán persuadidos[c] si alguien resucita de entre los muertos[b]».'
