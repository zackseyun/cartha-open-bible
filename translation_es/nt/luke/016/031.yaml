translation:
  language: es
  text: 'Pero él le dijo[a]: «Si no escuchan a Moisés y a los Profetas, tampoco serán persuadidos[c] si alguien resucita de entre los muertos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oír» o «hacer caso» para «escuchar». El verbo griego puede incluir tanto la audición como la atención receptiva.
    reason: lexical_alternative
  - marker: b
    text: O «de los muertos».
    reason: lexical_alternative
  - marker: c
    text: O «se convencerán». El griego significa «ser persuadidos» o «convencidos», no necesariamente «creerán» en un sentido teológico más estrecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ αὐτῷ
  english_pob_choice: But he said to him
  chosen_spanish: Pero él le dijo
  alternatives_spanish:
  - Y él le dijo
  - Entonces le dijo
  lexicon: BDAG
  rationale: Conservo el giro contrastivo de δέ con «Pero», y el dativo αὐτῷ se expresa naturalmente como «le». El sujeto explícito «él» evita ambigüedad en español y mantiene la referencia discursiva.
- source_word: Μωϋσέως καὶ τῶν προφητῶν
  english_pob_choice: Moses and the Prophets
  chosen_spanish: Moisés y a los Profetas
  alternatives_spanish:
  - Moisés y los profetas
  - Moisés y los Profetas
  lexicon: BDAG
  rationale: Sigo la fórmula bíblica reconocible como designación del testimonio escriturario. Mantengo «Profetas» con mayúscula porque, como en el POB inglés, funciona como corpus reconocido y no solo como oficio general.
- source_word: οὐκ ἀκούουσιν
  english_pob_choice: do not listen
  chosen_spanish: no escuchan
  alternatives_spanish:
  - no oyen
  - no hacen caso
  lexicon: BDAG
  rationale: «Escuchan» conserva la amplitud de ἀκούω entre oír y prestar atención. «No hacen caso» sería más interpretativo; «no oyen» estrecha demasiado el sentido a audición física.
- source_word: τις
  english_pob_choice: someone
  chosen_spanish: alguien
  alternatives_spanish:
  - una persona
  - cualquiera
  lexicon: BDAG
  rationale: «Alguien» reproduce bien el indefinido singular y mantiene la fluidez del español contemporáneo.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - de entre los muertos
  lexicon: BDAG
  rationale: 'Adopto la equivalencia ya señalada por el POB: «de entre los muertos» hace explícita la lectura idiomática de resurrección, sin forzarla a una paráfrasis doctrinal.'
- source_word: ἀναστῇ
  english_pob_choice: rises
  chosen_spanish: resucite
  alternatives_spanish:
  - se levante
  - resucite
  lexicon: BDAG
  rationale: En contexto de ἐκ νεκρῶν, «resucite» comunica mejor el hecho de volver de la muerte que un simple «se levante». Aunque el inglés POB usa «rises», el español «resucite» evita ambigüedad y permanece fiel al sentido de resurrección implícito.
- source_word: πεισθήσονται
  english_pob_choice: will be persuaded
  chosen_spanish: se persuadirán
  alternatives_spanish:
  - serán persuadidos
  - se convencerán
  lexicon: BDAG
  rationale: Mantengo la voz pasiva/medio-passiva del griego con una forma reflexiva natural en español. «Se convencerán» sería posible, pero «se persuadirán» preserva más de cerca la imagen verbal de πείθω sin convertirlo en fe salvífica explícita.
theological_decisions:
- issue: Sentido de «Moisés y los Profetas» como testimonio autoritativo
  english_pob_reading: A reference to the authoritative scriptural witness already given to Israel
  chosen_spanish_reading: Referencia al testimonio autoritativo de las Escrituras ya dado a Israel
  alternative_spanish_readings:
  - Referencia solo a dos figuras representativas
  - Las Escrituras
  rationale: Conservo la expresión tradicional sin reemplazarla por «Las Escrituras», porque el POB inglés preserva la forma idiomática y su valor metonímico. La mayúscula en «Profetas» ayuda a señalar el corpus bíblico reconocido.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Alcance de πεισθήσονται
  english_pob_reading: general persuasion/conviction rather than explicit conversion or saving faith
  chosen_spanish_reading: persuasión o convicción general, no conversión explícita ni fe salvífica
  alternative_spanish_readings:
  - creerán
  - se arrepentirán
  rationale: El verbo griego expresa ser persuadidos o convencidos. Traducirlo como «creerán» o «se arrepentirán» introduciría una respuesta teológica más específica de la que el texto afirma.
  doctrine_reference: 'Affirmations; Translation philosophy: Never import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el audit trail inglés, con un ajuste deliberado en ἀναστῇ: «resucite» se usa en español para evitar ambigüedad, dado que ἐκ νεκρῶν fija el marco de resurrección. También se preserva la tensión lexical de πεισθήσονται con «se persuadirán», sin convertirlo en fe o arrepentimiento explícitos.'
  spanish_consistency_notes:
  - Usar «Moisés y los Profetas» como fórmula escrituraria reconocible.
  - Conservar «de entre los muertos» en notas para reflejar la variante idiomática.
  - Mantener «escuchar» como verbo amplio para ἀκούω, con nota sobre oír/hacer caso.
  - Evitar sustituir «persuadir/convencer» por «creer» o «arrepentirse».
  - Mantener mayúscula en «Profetas» por consistencia con el corpus bíblico.
  - Preferir «resucite» en el texto principal para claridad en contexto de ἐκ νεκρῶν.
