    reason: lexical_alternative
  - marker: b
    text: O «de los muertos».
    reason: lexical_alternative
  - marker: c
    text: O «se convencerán». El griego significa «ser persuadidos» o «convencidos», no necesariamente «creerán» en un sentido teológico más estrecho.
    reason: lexical_alternative
  revision_rationale: 'La revisión hace tres ajustes menores: (1) cambia «aunque» por «si» para reflejar mejor la construcción condicional intensificada del griego; (2) reemplaza «se persuadirán» por «serán persuadidos», que es más natural en español y más cercano a πεισθήσονται; y (3) reubica la nota [b] en «de entre los muertos», donde realmente corresponde. También se simplifica la nota [b] para ofrecer una alternativa real al texto principal en vez de repetirlo.'
