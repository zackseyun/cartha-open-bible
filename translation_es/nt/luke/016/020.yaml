translation:
  language: es
  text: Y un hombre pobre llamado Lázaro, a quien habían dejado[a] junto a su portal, estaba cubierto de llagas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: «habían arrojado». El verbo griego puede sugerir que fue echado o lanzado allí, subrayando su desamparo y el descuido de otros.'
    reason: lexical_alternative
  - marker: b
    text: 'Alternativa posible: «lleno de llagas». El participio griego indica una afección de llagas o úlceras, no solo una herida aislada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πτωχὸς
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - mendigo
  - indigente
  lexicon: BDAG
  rationale: πτωχός señala pobreza o indigencia. «Pobre» es la opción más natural en español y mantiene el énfasis en su condición social sin añadir de entrada el rol más específico de «mendigo».
- source_word: τις
  english_pob_choice: a ... man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un cierto hombre
  - alguien
  lexicon: BDAG
  rationale: El indefinido introduce un nuevo personaje. En español, «un hombre» fluye con naturalidad y conserva la indefinición narrativa.
- source_word: ὀνόματι Λάζαρος
  english_pob_choice: named Lazarus
  chosen_spanish: llamado Lázaro
  alternatives_spanish:
  - de nombre Lázaro
  - nombrado Lázaro
  lexicon: BDAG
  rationale: La construcción dativa con ὀνόματι significa idiomáticamente «llamado / de nombre». «Llamado Lázaro» es claro y fiel al giro griego.
- source_word: ἐβέβλητο
  english_pob_choice: had been laid
  chosen_spanish: echado
  alternatives_spanish:
  - puesto
  - arrojado
  lexicon: BDAG
  rationale: El pluscuamperfecto pasivo de βάλλω expresa que alguien lo colocó allí o lo dejó allí. «Echado» conserva el estado resultante y deja abierta la posibilidad de una acción desatenta o dura, como en la nota inglesa sobre «thrown».
- source_word: πρὸς τὸν πυλῶνα αὐτοῦ
  english_pob_choice: at his gate
  chosen_spanish: junto a su portal
  alternatives_spanish:
  - a la entrada de su casa
  - junto a su puerta
  lexicon: BDAG
  rationale: πρὸς con acusativo aquí indica ubicación en relación con el acceso de la casa. «Portal» transmite mejor πυλών como entrada o portal amplio que el más doméstico «puerta».
- source_word: εἱλκωμένος
  english_pob_choice: covered with sores
  chosen_spanish: cubierto de llagas
  alternatives_spanish:
  - lleno de llagas
  - afligido de llagas
  lexicon: BDAG
  rationale: El participio de ἑλκόομαι describe una condición de llagas o úlceras. «Cubierto de llagas» es natural en español y mantiene el aspecto visible y lastimoso del cuadro.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y el audit trail inglés: conserva la indefinición de τις, la identificación nominal de Lázaro, el matiz pasivo/resultante de ἐβέβλητο y la descripción física de εἱλκωμένος. No se registraron revisiones previas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma cuando el texto lo requiera, aunque no aparece en este versículo.
  - Se mantiene «llamado» para ὀνόματι por ser una fórmula natural y precisa en español.
  - «Portal» se eligió para πυλών por su amplitud semántica frente a «puerta».
