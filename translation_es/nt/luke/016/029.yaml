translation:
  language: es
  text: 'Pero Abraham dijo[a]: «Ellos tienen a Moisés y los profetas; que los escuchen[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Moisés y los profetas» es una forma judía convencional de referirse al testimonio escritural asociado con Moisés y los libros proféticos.
    reason: cross_reference
  - marker: b
    text: O, más literalmente, «que los oigan».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει δὲ
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Ahora ... dijo
  lexicon: BDAG
  rationale: El presente histórico griego se vierte naturalmente en pasado narrativo en español. δέ marca continuidad con contraste suave; «Pero» conserva mejor el giro de respuesta que «Y» y suena natural en este contexto.
- source_word: Ἀβραάμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrán
  lexicon: Convención onomástica bíblica
  rationale: El nombre propio se conserva con la forma española estándar y ampliamente reconocible.
- source_word: Ἔχουσι
  english_pob_choice: They have
  chosen_spanish: Ellos tienen
  alternatives_spanish:
  - Ellos poseen
  lexicon: BDAG
  rationale: El presente indica posesión o acceso actual. «Tienen» es la equivalencia más directa y natural en español.
- source_word: Μωϋσέα καὶ τοὺς προφήτας
  english_pob_choice: Moses and the Prophets
  chosen_spanish: a Moisés y a los Profetas
  alternatives_spanish:
  - a Moisés y a los profetas
  - la Ley de Moisés y los Profetas
  lexicon: BDAG
  rationale: Se mantiene la expresión judía convencional sin expandirla en el texto principal. En español, capitalizar «Profetas» ayuda a reflejar el corpus escritural reconocido, en línea con la decisión inglesa; «a» expresa de forma natural el complemento directo de «tienen».
- source_word: ἀκουσάτωσαν
  english_pob_choice: let them listen
  chosen_spanish: que los escuchen
  alternatives_spanish:
  - que los oigan
  - que escuchen
  lexicon: BDAG
  rationale: El imperativo de tercera persona plural se expresa idiomáticamente con «que ... escuchen». «Escuchen» capta mejor la idea de atender con obediencia que el simple «oigan».
- source_word: αὐτῶν
  english_pob_choice: to them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - de ellos
  lexicon: BDAG
  rationale: El pronombre retoma a «Moisés y los Profetas» como fuente/testimonio escuchado. En español, «los» funciona naturalmente como objeto directo de «escuchar», sin perder el referente.
theological_decisions:
- issue: Referente de «Moisés y los Profetas»
  english_pob_reading: A metonym for the authoritative scriptural witness already given to the brothers.
  chosen_spanish_reading: Una metonimia del testimonio escritural autorizado ya dado a los hermanos.
  alternative_spanish_readings:
  - Una referencia solo a las figuras históricas de Moisés y los profetas
  - La Ley de Moisés y los Profetas como título ampliado
  rationale: El texto conserva la fórmula breve porque, en el uso judío y lucano, nombra las Escrituras por metonimia. La nota aclara el referente sin borrar la tensión entre la formulación literal y su alcance canónico.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión teológica en vez de resolverla por paráfrasis.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; esta versión sigue el texto griego y coincide sustancialmente con el juicio auditado en inglés, manteniendo la misma lectura semántica y discursiva.
  spanish_consistency_notes:
  - Se mantiene el nombre «Abraham» como forma bíblica española estándar.
  - Se conserva «Profetas» con mayúscula inicial para reflejar el corpus escritural, siguiendo la decisión inglesa.
  - «Escuchen» traduce el imperativo con valor de atención obediente, sin convertirlo en una paráfrasis explicativa.
