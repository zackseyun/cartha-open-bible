translation:
  language: es
  text: El que es fiel en lo muy poco también es fiel en lo mucho[a], y el que es injusto[b] en lo muy poco también es injusto en lo mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en lo mínimo». La expresión griega se refiere a lo muy pequeño o insignificante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «deshonesto» o «inicuo» para «injusto». El término griego es más amplio que la deshonestidad financiera, aunque ese matiz encaja con el contexto inmediato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστός
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - leal
  lexicon: BDAG
  rationale: En este contexto describe confiabilidad probada en lo encomendado, no solo creencia. 'Fiel' es la opción natural en español y conserva el paralelismo con la segunda mitad del dicho.
- source_word: ἐν ἐλαχίστῳ
  english_pob_choice: in very little
  chosen_spanish: en lo muy poco
  alternatives_spanish:
  - en lo mínimo
  - en lo poco
  - en lo menos
  lexicon: BDAG
  rationale: La expresión griega marca la esfera o circunstancia de algo extremadamente pequeño. 'En lo muy poco' comunica cantidad mínima de forma clara y mantiene el contraste con 'en lo mucho'.
- source_word: πολλῷ
  english_pob_choice: much
  chosen_spanish: lo mucho
  alternatives_spanish:
  - mucho
  - lo grande
  - en mucho
  lexicon: BDAG
  rationale: El neutro singular contrasta extensión o cantidad con ἐλαχίστῳ. 'Lo mucho' preserva el paralelismo con 'lo muy poco' y suena natural en español.
- source_word: ἄδικος
  english_pob_choice: unrighteous
  chosen_spanish: injusto
  alternatives_spanish:
  - inicuo
  - deshonesto
  - no recto
  lexicon: BDAG
  rationale: El término es más amplio que la mera deshonestidad financiera. 'Injusto' mantiene el alcance moral general y conserva la conexión con el campo semántico de δικ-.
- source_word: ὁ ... πιστός / ὁ ... ἄδικος
  english_pob_choice: the one who is faithful ... the one who is unrighteous
  chosen_spanish: el que es fiel ... el que es injusto
  alternatives_spanish:
  - quien es fiel ... quien es injusto
  - el que tiene fidelidad ... el que obra con injusticia
  lexicon: Gramática griega
  rationale: El artículo con adjetivo funciona sustantivamente. 'El que' expresa bien la fuerza genérica singular sin introducir una paráfrasis innecesaria.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - asimismo
  lexicon: BDAG
  rationale: En ambos miembros del paralelismo, καί tiene valor aditivo dentro de la predicación. 'También' en español reproduce esa relación de manera idiomática.
theological_decisions:
- issue: ἄδικος en un contexto de mayordomía
  english_pob_reading: unrighteous
  chosen_spanish_reading: injusto
  alternative_spanish_readings:
  - deshonesto
  - inicuo
  rationale: La declaración formula un principio moral general, no solo una observación sobre dinero. 'Injusto' evita restringir el sentido a la deshonestidad financiera y preserva el alcance ético amplio del griego.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registran revisiones aplicadas y el estado de concordancia fue alto.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita 'Cristo' porque no aparece el título Χριστός en el texto fuente.
  - Se conserva el paralelismo léxico entre 'en lo muy poco' / 'en lo mucho' y 'fiel' / 'injusto' para reflejar la estructura griega.
  - La nota sobre ἄδικος distingue el sentido moral amplio del posible matiz contextual de deshonestidad, sin estrechar indebidamente el alcance del dicho.
