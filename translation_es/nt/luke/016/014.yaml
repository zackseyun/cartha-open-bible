translation:
  language: es
  text: Ahora los fariseos, que eran amantes del dinero, oían todas estas cosas y se burlaban[a] de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se burlaban de él con desprecio'. El verbo puede transmitir burla abierta o mofa despectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤκουον
  english_pob_choice: were hearing
  chosen_spanish: oían
  alternatives_spanish:
  - estaban oyendo
  - escuchaban
  lexicon: BDAG
  rationale: El imperfecto griego indica acción continua o simultánea en la narración. En español, 'oían' comunica bien ese aspecto sin sonar forzado; 'estaban oyendo' sería más pesado y 'escuchaban' puede sugerir atención más que simple recepción auditiva.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  - Entonces
  lexicon: BDAG
  rationale: δέ introduce aquí un giro narrativo suave. 'Ahora' funciona de modo natural en español y marca la transición sin añadir contraste fuerte.
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - estas cosas, todas
  lexicon: BDAG
  rationale: La combinación de demostrativo y πᾶς se refleja de manera directa como 'todas estas cosas', manteniendo el alcance total del referente inmediato.
- source_word: Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los fariseos
  lexicon: BDAG
  rationale: Se conserva el nombre de grupo judío conocido en el texto, con transliteración estándar al español.
- source_word: φιλάργυροι ὑπάρχοντες
  english_pob_choice: who were lovers of money
  chosen_spanish: que eran amantes del dinero
  alternatives_spanish:
  - que amaban el dinero
  - siendo amantes del dinero
  - que eran codiciosos
  lexicon: BDAG
  rationale: φιλάργυροι expresa literalmente 'amantes del dinero'. 'Amantes del dinero' preserva la formulación nominal y evita reducirla a una etiqueta moral más amplia como 'codiciosos'.
- source_word: ἐξεμυκτήριζον
  english_pob_choice: were ridiculing
  chosen_spanish: se burlaban
  alternatives_spanish:
  - se burlaban de él
  - se mofaban
  - se reían con desprecio
  lexicon: BDAG
  rationale: El verbo denota burla despectiva o mofa. 'Se burlaban' comunica bien la idea en español y preserva el sentido de desprecio; el complemento 'de él' se integra con el objeto pronominal del contexto.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: de él
  alternatives_spanish:
  - a él
  - lo
  lexicon: BDAG
  rationale: El referente es Jesús en contexto. En español, con 'se burlaban', la construcción natural es 'se burlaban de él', que expresa adecuadamente el objeto de la burla.
theological_decisions:
- issue: Caracterización moral de los fariseos en φιλάργυροι
  english_pob_reading: Rendered as 'lovers of money' rather than the more interpretive 'greedy.'
  chosen_spanish_reading: '''amantes del dinero'' en vez de una etiqueta interpretativa como ''codiciosos'''
  alternative_spanish_readings:
  - codiciosos
  - avariciosos
  rationale: La frase griega dice literalmente 'amantes del dinero'. Mantener esa concreción respeta la evidencia del texto y deja visible el vínculo con la crítica de Jesús sobre el dinero en el contexto inmediato.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; readable modern Spanish.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al texto mediante [a] en 'fariseos[a]'. Se mantuvo el sentido imperfectivo de los verbos y la caracterización literal de φιλάργυροι para conservar la trazabilidad al griego.
  spanish_consistency_notes:
  - Se usó 'fariseos' con artículo implícito en posición narrativa, acorde con el español natural y el griego articular.
  - '''Amantes del dinero'' preserva el paralelismo descriptivo del participio predicativo sin moralizarlo más allá del texto.'
  - '''Se burlaban'' recoge el desprecio del verbo griego sin introducir un giro más fuerte que ''mofaban'' o ''escarnio''.'
