translation:
  language: es
  text: 'Entonces dijo a otro: «¿Y tú, cuánto debes?». Él dijo: «Cien coros de trigo[a]». Le dice: «Toma tu cuenta[b] y escribe ochenta».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un coro era una gran medida seca usada para grano.
    reason: cultural_note
  - marker: b
    text: O «tu documento escrito» o «tus documentos»; griego «tus escritos» (τὰ γράμματα), referido aquí al pagaré o cuenta escrita del deudor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπειτα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Después
  - Luego
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata con una forma natural en español, manteniendo el avance del relato.
- source_word: ἑτέρῳ
  english_pob_choice: to another
  chosen_spanish: a otro
  alternatives_spanish:
  - a otra persona
  - a un hombre
  lexicon: BDAG
  rationale: El dativo indica un destinatario distinto del anterior; «a otro» es suficiente y no añade información no explícita.
- source_word: Σὺ δὲ
  english_pob_choice: And you
  chosen_spanish: ¿Y tú?
  alternatives_spanish:
  - Pero tú
  - Tú también
  lexicon: BDAG
  rationale: Conserva el énfasis pronominal y el matiz de transición/contraste de δέ en una pregunta directa y natural en español.
- source_word: πόσον ὀφείλεις
  english_pob_choice: how much do you owe
  chosen_spanish: cuánto debes
  alternatives_spanish:
  - cuánto estás en deuda
  - qué debes
  lexicon: BDAG
  rationale: ὀφείλω aquí expresa deuda financiera; «debes» comunica con claridad la obligación monetaria sin perder precisión.
- source_word: Ἑκατὸν κόρους σίτου
  english_pob_choice: A hundred cors of wheat
  chosen_spanish: Cien coros de trigo
  alternatives_spanish:
  - Cien medidas de trigo
  - Cien kors de trigo
  lexicon: BDAG
  rationale: Se conserva la unidad antigua «coro» para reflejar el término específico κόρος; «trigo» traduce σίτου de manera directa y natural.
- source_word: λέγει αὐτῷ
  english_pob_choice: He says to him
  chosen_spanish: Le dice
  alternatives_spanish:
  - Le dijo
  - Le responde
  lexicon: BDAG
  rationale: El presente histórico λέγει se refleja con el presente «dice», manteniendo la vividez narrativa; el objeto indirecto se expresa de forma natural en español.
- source_word: Δέξαι
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Recibe
  - Acepta
  lexicon: BDAG
  rationale: El imperativo de δέχομαι en este contexto documental pide tomar posesión del documento; «toma» es el equivalente más natural en español.
- source_word: σου τὰ γράμματα
  english_pob_choice: your bill
  chosen_spanish: tus documentos
  alternatives_spanish:
  - tu recibo
  - tu cuenta
  - tu documento escrito
  lexicon: BDAG
  rationale: γράμματα significa literalmente «escritos/documentos»; se preserva esa amplitud para no reducir prematuramente el sentido a «factura» o «recibo». La relación con el pagaré o cuenta queda sugerida por el contexto.
- source_word: γράψον ὀγδοήκοντα
  english_pob_choice: write eighty
  chosen_spanish: escribe ochenta
  alternatives_spanish:
  - anota ochenta
  - hazlo ochenta
  lexicon: BDAG
  rationale: La orden es alterar el monto escrito; «escribe ochenta» reproduce de cerca el imperativo y la acción de modificar el registro.
translation_notes:
  revision_awareness: 'Texto alineado con el pasaje griego y con el audit trail inglés: se preserva el presente histórico λέγει, la medida antigua κόρος/coro y la referencia documental de τὰ γράμματα sin reducirla a una sola equivalencia estrecha.'
  spanish_consistency_notes:
  - Se usa «coro» para κόρος en coherencia con la política terminológica del proyecto y con la nota cultural.
  - Se mantiene el presente histórico «dice» para λέγει, como en el POB inglés.
  - «Documentos» en el texto principal deja abierta la función contable/legal del término griego, desarrollada en la nota.
  - La puntuación en comillas angulares y la interrogación directa siguen el uso editorial del español.
