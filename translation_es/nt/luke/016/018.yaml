translation:
  language: es
  text: Todo el que se divorcia de su esposa y se casa con otra comete adulterio[a], y el que se casa con una mujer divorciada de su esposo[b] comete adulterio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quien se divorcia de su esposa y se casa con otra mujer».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «la que ha sido divorciada de un esposo»; es decir, una mujer que ha sido divorciada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶς ὁ
  english_pob_choice: Everyone who
  chosen_spanish: Todo el que
  alternatives_spanish:
  - Cualquiera que
  - Quienquiera que
  lexicon: BDAG
  rationale: La construcción articular con πᾶς introduce una generalización. «Todo el que» conserva el alcance universal y suena natural en español bíblico contemporáneo sin endurecer el texto.
- source_word: ἀπολύων
  english_pob_choice: divorces
  chosen_spanish: se divorcia de
  alternatives_spanish:
  - despide a
  - repudia a
  lexicon: BDAG
  rationale: En este contexto matrimonial, ἀπολύω significa divorciarse, no simplemente «despedir» o «soltar». «Se divorcia de» comunica el sentido jurídico-relacional del verbo.
- source_word: τὴν γυναῖκα αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - su esposa legítima
  lexicon: BDAG
  rationale: Aquí γυνή significa «esposa» por el marco de matrimonio y divorcio. «Esposa» es más preciso y claro en español que «mujer».
- source_word: γαμῶν
  english_pob_choice: marries
  chosen_spanish: se casa con
  alternatives_spanish:
  - contrae matrimonio con
  - toma por esposa
  lexicon: BDAG
  rationale: El participio presente expresa la acción de volver a casarse en una relación matrimonial. «Se casa con» es idiomático y conserva la referencia matrimonial sin sobreexplicar.
- source_word: ἑτέραν
  english_pob_choice: another
  chosen_spanish: otra
  alternatives_spanish:
  - otra mujer
  - una diferente
  lexicon: BDAG
  rationale: ἑτέραν significa «otra/diferente». En español, después de «se casa con», «otra» es suficiente y mantiene la concisión del griego y del inglés POB.
- source_word: μοιχεύει
  english_pob_choice: commits adultery
  chosen_spanish: comete adulterio
  alternatives_spanish:
  - adultera
  - está cometiendo adulterio
  lexicon: BDAG
  rationale: El verbo denota adulterio como hecho culpable. «Comete adulterio» es la equivalencia estándar, clara y fiel, sin cargar el texto con una perífrasis progresiva.
- source_word: ἀπολελυμένην
  english_pob_choice: a woman divorced
  chosen_spanish: una mujer divorciada
  alternatives_spanish:
  - una mujer que ha sido divorciada
  - una divorciada
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe a una mujer en estado de haber sido divorciada. «Divorciada» preserva ese estado resultante y es natural en español.
- source_word: ἀπὸ ἀνδρὸς
  english_pob_choice: from her husband
  chosen_spanish: de su esposo
  alternatives_spanish:
  - de un esposo
  - por su esposo
  lexicon: BDAG
  rationale: Aunque ἀνήρ puede significar «hombre» o «esposo», el contexto exige «esposo». «De su esposo» refleja bien ἀπό con sentido de procedencia y mantiene la relación marital.
theological_decisions:
- issue: Alcance universal de la sentencia sobre divorcio y nuevo matrimonio
  english_pob_reading: Render the statement as a universal moral pronouncement without importing exception clauses from other passages.
  chosen_spanish_reading: Presentar la declaración como una sentencia universal sin añadir cláusulas de excepción ajenas al versículo.
  alternative_spanish_readings:
  - Añadir una excepción implícita armonizando con Mateo
  - Limitarla a casos jurídicos específicos del judaísmo
  rationale: Lucas presenta una formulación breve y general. La traducción debe reflejar lo que el griego dice aquí, sin resolver en la línea principal una tensión interpretativa que el texto no desarrolla.
  doctrine_reference: Preservar la tensión teológica en vez de armonizarla en la traducción principal.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del expediente inglés, que ajustó la segunda cláusula para expresar con mayor naturalidad la relación posesiva («su esposo» / «de su esposo») sin perder el valor del participio pasivo griego.
  spanish_consistency_notes:
  - Se mantiene «adulterio» para μοιχεύει, en continuidad con el valor léxico del verbo.
  - Se usa «esposa»/«esposo» para γυνή/ἀνήρ en este contexto matrimonial, evitando un calco de «mujer/hombre» que oscurecería el sentido.
  - La traducción conserva la estructura paralela de dos cláusulas unidas por «y» para reflejar la forma del griego.
  - No se introduce una cláusula de excepción, en coherencia con el expediente teológico del texto fuente.
