translation:
  language: es
  text: 'Y yo les digo: háganse amigos[a] por medio de las riquezas injustas, para que cuando se acaben[b], ellos los reciban en las moradas eternas[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «del mamón de la injusticia»; «mamón» es una forma tradicional para el término griego de riqueza o dinero.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando ustedes fallen» o «cuando se agoten». El verbo griego puede entenderse de distintas maneras aquí; muchos lo relacionan con el agotamiento de las riquezas, mientras que otros lo aplican a la muerte de la persona.'
    reason: alternative_reading
  - marker: c
    text: 'O: «en las tiendas eternas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑαυτοῖς ποιήσατε φίλους
  english_pob_choice: make friends for yourselves
  chosen_spanish: háganse amigos para ustedes mismos
  alternatives_spanish:
  - háganse para ustedes mismos amigos
  - háganse amigos
  lexicon: BDAG
  rationale: La forma reflexiva y el imperativo aoristo se conservan con una construcción natural en español. «Hacerse amigos» comunica la idea sin el orden rígido de un calco, y «para ustedes mismos» preserva el valor de ἑαυτοῖς.
- source_word: ἐκ τοῦ μαμωνᾶ τῆς ἀδικίας
  english_pob_choice: by means of unrighteous wealth
  chosen_spanish: con las riquezas injustas
  alternatives_spanish:
  - por medio de las riquezas injustas
  - del mamón de la injusticia
  - con el mamón de la injusticia
  lexicon: BDAG
  rationale: En español, «con» funciona de modo natural para el medio o instrumento en este dicho. «Riquezas» expresa el campo semántico de μαμωνᾶς con claridad. «Injustas» mantiene el calificativo de ἀδικίας sin estrecharlo a «deshonestas» o «robadas».
- source_word: μαμωνᾶ
  english_pob_choice: wealth
  chosen_spanish: riquezas
  alternatives_spanish:
  - mamón
  - dinero
  lexicon: BDAG
  rationale: La POB inglesa opta por «wealth» por claridad; en español, «riquezas» es la opción más transparente y natural. Se evita imponer el término tradicional «mamón» en el texto principal, aunque puede conservarse como alternativa léxica.
- source_word: τῆς ἀδικίας
  english_pob_choice: unrighteous
  chosen_spanish: injustas
  alternatives_spanish:
  - inicuas
  - deshonestas
  - injustas
  lexicon: BDAG
  rationale: «Injustas» preserva el valor amplio de ἀδικία como injusticia/iniquidad sin reducirlo a fraude o mala conducta económica específica. Mantiene la tensión teológica del sintagma.
- source_word: ἵνα ὅταν ἐκλίπῃ
  english_pob_choice: so that when it fails
  chosen_spanish: para que cuando se acaben
  alternatives_spanish:
  - para que cuando falle
  - para que cuando se acabe
  - para que cuando ustedes falten
  lexicon: BDAG
  rationale: El referente más cercano es el dinero/riquezas, por lo que el español pluralizado «se acaben» comunica de modo idiomático que esos bienes llegan a su fin. Se conserva la ambigüedad de sujeto sin forzar una interpretación sobre la muerte del oyente.
- source_word: δέξωνται ὑμᾶς
  english_pob_choice: they may welcome you
  chosen_spanish: ellos los reciban
  alternatives_spanish:
  - los reciban
  - los acojan
  - les den la bienvenida
  lexicon: BDAG
  rationale: «Reciban» mantiene el sentido de δέχομαι como recibir/acoger. Se evita precisar quiénes son «ellos», preservando la ambigüedad del griego.
- source_word: εἰς τὰς αἰωνίους σκηνάς
  english_pob_choice: into the eternal dwellings
  chosen_spanish: en las moradas eternas
  alternatives_spanish:
  - en los tabernáculos eternos
  - en las tiendas eternas
  - en las moradas eternas
  lexicon: BDAG
  rationale: «Moradas» transmite el sentido de σκηναί como lugares de habitación, sin perder del todo la imagen. «Eternas» conserva αἰωνίους. Se evita «tiendas» en el texto principal por sonar menos natural en español contemporáneo.
theological_decisions:
- issue: Sentido de «riquezas injustas»
  english_pob_reading: wealth belonging to the present unrighteous age / wealth that is morally compromised in a fallen world, not necessarily only wealth gained by fraud
  chosen_spanish_reading: riquezas injustas como bienes del orden presente marcado por la injusticia, no necesariamente dinero obtenido solo mediante fraude
  alternative_spanish_readings:
  - riquezas obtenidas deshonestamente
  - mamón personificado como un rival
  rationale: «Injustas» conserva la amplitud del griego y evita limitar el dicho a dinero robado. También evita convertir el término en una personificación obligatoria en el texto principal, manteniendo la tensión interpretativa del contexto lucano.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sujeto de ἐκλίπῃ
  english_pob_reading: the wealth fails / runs out
  chosen_spanish_reading: las riquezas se acaban
  alternative_spanish_readings:
  - ustedes mueren
  - los bienes fallan
  rationale: La referencia más cercana es μαμωνᾶς; por eso se expresa que las riquezas llegan a su fin. La formulación no excluye otras lecturas, pero tampoco impone la interpretación de la muerte del discípulo.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Identidad de «ellos»
  english_pob_reading: left implicit
  chosen_spanish_reading: se deja implícita
  alternative_spanish_readings:
  - los amigos hechos con el uso generoso de las riquezas
  - los pobres
  - los seres celestiales
  rationale: El griego no identifica explícitamente a los que reciben. La traducción conserva esa indeterminación para no sobreinterpretar el pasaje.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el pasaje griego y el expediente auditado en inglés: mantiene la ambigüedad de ἐκλίπῃ y del sujeto de δέξωνται, y conserva el valor léxico de μαμωνᾶς/ἀδικίας sin estrecharlo a una sola lectura. No se registraron revisiones previas aplicadas en esta pasada.'
  spanish_consistency_notes:
  - Se usó «Y yo les digo» para reflejar el hablante explícito del griego y la naturalidad del español.
  - Se prefirió «moradas eternas» en vez de «tiendas eternas» en el texto principal por claridad, dejando la alternativa en nota.
  - El artículo y el plural de «riquezas» ayudan a hacer natural el instrumental en español sin borrar el trasfondo lexical de μαμωνᾶς.
  - Se mantuvo la ambigüedad del beneficiario final («ellos») tal como la deja el griego, sin identificarlo en el cuerpo del texto.
