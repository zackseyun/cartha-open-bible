source:
  edition: SBLGNT
  text: καὶ ἐγὼ ὑμῖν λέγω, ⸂ἑαυτοῖς ποιήσατε⸃ φίλους ἐκ τοῦ μαμωνᾶ τῆς ἀδικίας, ἵνα ὅταν ⸀ἐκλίπῃ δέξωνται ὑμᾶς εἰς τὰς αἰωνίους σκηνάς.
base_translation:
  language: en
  yaml_path: translation/nt/luke/016/009.yaml
  text: And I tell you[a], make friends for yourselves by means of unrighteous wealth, so that when it fails[c][b], they may welcome you into the eternal dwellings.
  footnotes:
  - marker: a
    text: Or 'from the mammon of unrighteousness'; 'mammon' is a traditional rendering of the Greek term for wealth or money.
    reason: lexical_alternative
  - marker: b
    text: Or 'when you fail' or 'when it runs out.' The Greek verb can be understood in different ways here; many take it to refer to wealth failing, while some understand it of a person's death.
    reason: alternative_reading
  - marker: c
    text: Or 'receive you into the eternal tents.'
    reason: lexical_alternative
