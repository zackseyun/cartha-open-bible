translation:
  language: es
  text: Y sucedió que el pobre murió y fue llevado por los ángeles al seno de Abraham[a]. Y el rico también murió y fue sepultado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al lado de Abraham». La expresión griega dice literalmente «al seno de Abraham», imagen de cercanía, honor y comunión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο δὲ
  english_pob_choice: Now it happened that
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y ocurrió que
  lexicon: BDAG
  rationale: La fórmula narrativa impersonal de Lucas pide en español una transición de relato natural. «Y sucedió que» conserva el valor de inicio de episodio sin forzar un calco demasiado literal. La partícula δέ queda bien representada por la simple continuación con «Y».
- source_word: ἀποθανεῖν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - llegó a morir
  lexicon: BDAG
  rationale: 'Aunque el griego usa un infinitivo dependiente de ἐγένετο, en español la forma natural es verbal finita: «murió». Mantiene el hecho simple y directo, como en el audit trail inglés.'
- source_word: τὸν πτωχὸν
  english_pob_choice: the poor man
  chosen_spanish: el pobre
  alternatives_spanish:
  - el hombre pobre
  - el mendigo
  lexicon: BDAG
  rationale: πτωχός designa al pobre, al desposeído. Dado que el contexto ya identifica al personaje, «el pobre» conserva la brevedad del griego y evita añadir «hombre» sin necesidad. «Mendigo» sería más específico de lo que esta cláusula sola exige.
- source_word: ἀπενεχθῆναι αὐτὸν
  english_pob_choice: was carried
  chosen_spanish: fue llevado
  alternatives_spanish:
  - fue transportado
  - fue cargado
  lexicon: BDAG
  rationale: El pasivo de ἀποφέρω expresa ser llevado/transportado. «Fue llevado» es natural en español y conserva la pasividad y la acción de traslado sin añadir matices innecesarios.
- source_word: ὑπὸ τῶν ἀγγέλων
  english_pob_choice: by the angels
  chosen_spanish: por los ángeles
  alternatives_spanish:
  - por ángeles
  lexicon: BDAG
  rationale: Se conserva el artículo griego de manera natural en español con «los ángeles». Mantiene el agente explícito de la pasiva.
- source_word: εἰς τὸν κόλπον Ἀβραάμ
  english_pob_choice: to Abraham’s bosom
  chosen_spanish: al seno de Abraham
  alternatives_spanish:
  - al lado de Abraham
  - al regazo de Abraham
  lexicon: BDAG
  rationale: κόλπος literalmente puede significar seno, pecho o regazo, y de manera idiomática indica cercanía e intimidad. «Seno de Abraham» preserva la imagen más literal y tradicionalmente entendible en español. «Lado» queda como alternativa semántica posible, pero sería más interpretativa que el texto base.
- source_word: ἀπέθανεν δὲ καὶ ὁ πλούσιος
  english_pob_choice: And the rich man also died
  chosen_spanish: Y el rico también murió
  alternatives_spanish:
  - Pero el rico también murió
  - Y el hombre rico también murió
  lexicon: BDAG
  rationale: La cláusula repite el patrón de muerte para ambos personajes. «El rico» reproduce la economía del griego y el paralelo con «el pobre»; «también» expresa bien καί en esta construcción.
- source_word: ἐτάφη
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - fue enterrado en una tumba
  lexicon: BDAG
  rationale: El pasivo de θάπτω significa «ser sepultado» o «ser enterrado». «Fue sepultado» mantiene un registro más sobrio y literario, y refleja con precisión el acto funerario sin expandir el texto.
theological_decisions:
- issue: Rendering of εἰς τὸν κόλπον Ἀβραάμ without resolving the image
  english_pob_reading: Abraham’s bosom
  chosen_spanish_reading: al seno de Abraham
  alternative_spanish_readings:
  - al lado de Abraham
  - al regazo de Abraham
  rationale: Se conserva la metáfora sin explicar demasiado su referente escatológico. Esto mantiene la tensión del pasaje, como en el audit trail inglés, y evita convertir la expresión en una paráfrasis doctrinalmente cerrada.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El draft sigue el pass final sin cambios del contexto inglés: la redacción base se alinea con la decisión establecida de mantener la imagen de κόλπος Ἀβραάμ y la estructura narrativa breve de las dos cláusulas de muerte. No se introdujeron revisiones adicionales.'
  spanish_consistency_notes:
  - Se mantiene la distinción de sujeto entre «el pobre» y «el rico» para reproducir el paralelismo del griego.
  - Se usa el pasado simple narrativo («murió», «fue llevado», «fue sepultado») para reflejar la secuencia de hechos.
  - «Al seno de Abraham» conserva la imagen idiomática sin sustituirla por una explicación más interpretativa dentro del texto principal.
  - El estilo general busca ser bíblico y claro para lectura pública, sin depender de formulaciones tradicionales que oculten el sentido literal.
