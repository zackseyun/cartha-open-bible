revisions:
- from: y deseando saciarse de lo que caía de la mesa del rico[a]. Pero aun los perros venían y le lamían las llagas.
  to: y deseando ser alimentado de lo que caía de la mesa del rico[a]. Pero hasta los perros venían y lamían sus llagas.
  rationale: Se ajusta χορτασθῆναι a «ser alimentado» para reflejar mejor la voz pasiva del griego; se cambia «Pero aun» por «Pero hasta» por mayor naturalidad en español neutral manteniendo el énfasis; y se simplifica «le lamían las llagas» a «lamían sus llagas» para lograr una expresión más fluida y precisa.
