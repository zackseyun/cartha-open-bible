translation:
  language: es
  text: y deseando ser alimentado de lo que caía de la mesa del rico[a]. Pero hasta los perros venían y lamían sus llagas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las migajas que caían de la mesa del rico». El griego dice literalmente «de lo que caía», y «migajas» se infiere del contexto de la comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμῶν
  english_pob_choice: longing
  chosen_spanish: deseando
  alternatives_spanish:
  - anhelando
  - teniendo deseo de
  lexicon: BDAG
  rationale: El participio presenta un deseo continuo e intenso. «Deseando» mantiene el valor aspectual y suena natural en español; «anhelando» también sería posible, pero aquí «deseando» conserva mejor la sobriedad del relato.
- source_word: χορτασθῆναι
  english_pob_choice: to be fed
  chosen_spanish: saciarse
  alternatives_spanish:
  - ser alimentado
  - llenarse
  lexicon: BDAG
  rationale: En este contexto de comida, el verbo apunta a recibir suficiente alimento. «Saciarse» comunica esa idea de quedar satisfecho con comida sin introducir una formulación más explicativa que el griego.
- source_word: ἀπὸ τῶν πιπτόντων
  english_pob_choice: from what fell
  chosen_spanish: de lo que caía
  alternatives_spanish:
  - de las migajas que caían
  - de lo que caía y caía
  lexicon: BDAG
  rationale: El participio sustantivado es literalmente «de lo que caía». Se conserva esa forma, dejando implícito el contexto de la mesa sin convertirlo en «migajas» dentro del texto principal.
- source_word: τράπεζης
  english_pob_choice: table
  chosen_spanish: mesa
  alternatives_spanish:
  - tabla
  lexicon: BDAG
  rationale: En el contexto de comida y banquete, «mesa» es el equivalente natural y preciso en español.
- source_word: τοῦ πλουσίου
  english_pob_choice: the rich man's
  chosen_spanish: del rico
  alternatives_spanish:
  - del hombre rico
  - del rico hombre
  lexicon: BDAG
  rationale: El adjetivo funciona de manera sustantiva y remite al hombre rico de la parábola. «Del rico» preserva esa concisión y evita añadir palabras innecesarias.
- source_word: ἀλλὰ καὶ
  english_pob_choice: But even
  chosen_spanish: Pero aun
  alternatives_spanish:
  - Pero incluso
  - Mas aun
  lexicon: BDAG
  rationale: La combinación expresa contraste con énfasis adicional. «Pero aun» refleja ambas fuerzas de manera natural en español.
- source_word: οἱ κύνες
  english_pob_choice: the dogs
  chosen_spanish: los perros
  alternatives_spanish:
  - los canes
  lexicon: BDAG
  rationale: Se mantiene el sustantivo literal. «Perros» es claro y directo; «canes» sería más literario, pero menos natural para la mayoría de lectores.
- source_word: ἐρχόμενοι
  english_pob_choice: came
  chosen_spanish: venían
  alternatives_spanish:
  - al venir
  - se acercaban
  lexicon: BDAG
  rationale: El participio circunstancial puede expresarse de forma idiomática con un imperfecto de movimiento. «Venían» comunica la acción concomitante sin forzar una traducción demasiado literal.
- source_word: ἐπέλειχον
  english_pob_choice: licked
  chosen_spanish: le lamían
  alternatives_spanish:
  - lamían
  - estaban lamiendo
  lexicon: BDAG
  rationale: El imperfecto sugiere acción repetida o continua. «Le lamían» preserva el aspecto imperfectivo y encaja bien con el objeto directo humano implícito.
- source_word: τὰ ἕλκη αὐτοῦ
  english_pob_choice: his sores
  chosen_spanish: las llagas
  alternatives_spanish:
  - las heridas
  - sus llagas
  lexicon: BDAG
  rationale: ἕλκη designa llagas o úlceras abiertas. «Llagas» es un equivalente preciso y comprensible en español; «heridas» sería más general y menos específico.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego SBLGNT y el trazado auditado en inglés. Se mantuvo el valor progresivo del participio y del imperfecto con formas españolas naturales; se evitó introducir «migajas» en el texto principal porque en el griego no aparece explícitamente, aunque se ofrece como alternativa en nota, según el antecedente en inglés. Se eligió un registro sobrio y publicable para una traducción de estilo formal con equivalencia óptima.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se traduce el lenguaje de comida con términos corrientes y fieles («saciarse», «mesa», «llagas») sin suavizar el cuadro narrativo.
  - Se mantiene la distinción aspectual de los verbos griegos con imperfectos españoles cuando suena natural («venían», «lamían»).
