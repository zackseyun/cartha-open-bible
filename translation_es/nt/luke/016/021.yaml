review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: Lázaro deseaba recibir alimento de lo que caía de la mesa del rico, y los perros acudían y lamían sus llagas. También preserva correctamente la nota alternativa sobre «migajas». Sin embargo, «saciarse» puede sonar algo menos pasivo que χορτασθῆναι y el giro «venían y le lamían» resulta algo menos natural y ligeramente más interpretativo que una coordinación simple.'
  spanish_quality_summary: 'El texto es claro y legible, pero una ligera revisión mejora la naturalidad y la precisión: «ser alimentado» preserva mejor el matiz pasivo, y «venían y lamían sus llagas» evita el dativo innecesario «le» y suena más fluido en español bíblico moderno. «Pero aun» es aceptable, aunque «Pero hasta» suena más natural en registro neutral contemporáneo.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas clave están mayormente bien encaminadas: «mesa», «rico», «perros», «llagas». Se recomienda ajustar χορτασθῆναι a una formulación pasiva más explícita y suavizar la construcción verbal final para mejor español.'
  issues:
  - severity: medium
    issue: «saciarse» debilita el matiz pasivo de χορτασθῆναι
    rationale: El infinitivo pasivo apunta a «ser alimentado / ser saciado» más que a una acción reflexiva propia. «Saciarse» comunica bien el resultado, pero no tan claramente la recepción pasiva del alimento.
  - severity: low
    issue: «venían y le lamían las llagas» suena menos natural que una coordinación simple con posesivo
    rationale: En español, «lamían sus llagas» es más directo y natural; el dativo «le» no es incorrecto, pero añade una capa innecesaria y algo más pesada.
  - severity: low
    issue: «Pero aun» es correcto pero algo menos idiomático en español contemporáneo general
    rationale: «Pero hasta los perros…» o «Pero incluso los perros…» suele leerse con mayor naturalidad y conserva el valor enfático de ἀλλὰ καὶ.
  revised_spanish_text: y deseando ser alimentado de lo que caía de la mesa del rico[a]. Pero hasta los perros venían y lamían sus llagas.
  revised_footnotes:
  - marker: a
    text: O «de las migajas que caían de la mesa del rico». El griego dice literalmente «de lo que caía», y «migajas» se infiere del contexto de la comida.
    reason: lexical_alternative
