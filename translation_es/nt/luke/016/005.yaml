  rationale: 'Se corrige el calco antinatural «llamar a sí» a «llamar», que conserva el sentido narrativo de προσκαλεσάμενος en español idiomático. También se cambia «señor» por «amo» en ambas instancias de κύριος para ajustarse a la decisión léxica y teológica auditada: aquí se trata del superior humano del administrador, no de un título divino. El resto del versículo está bien encaminado y no requiere cambios.'
