translation:
  language: es
  text: 'Y, después de llamar a cada uno de los deudores de su amo, decía al primero: «¿Cuánto debes a mi amo?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσκαλεσάμενος
  english_pob_choice: after summoning
  chosen_spanish: después de llamar a sí
  alternatives_spanish:
  - habiendo llamado
  - después de convocar
  lexicon: BDAG
  rationale: El participio aoristo medio introduce una acción previa a la del verbo principal. En español, «después de llamar a sí» conserva la secuencia temporal y el matiz de atraer a las personas hacia él sin volverlo mecánico.
- source_word: ἕνα ἕκαστον
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - uno por uno
  - cada uno de ellos
  lexicon: BDAG
  rationale: La fuerza distributiva se expresa de forma natural con «cada uno». Evita redundancia y mantiene el énfasis en que los llamó individualmente.
- source_word: χρεοφειλετῶν
  english_pob_choice: debtors
  chosen_spanish: deudores
  alternatives_spanish:
  - personas endeudadas
  - los que debían
  lexicon: BDAG
  rationale: El sustantivo designa a quienes tienen una deuda. «Deudores» es el equivalente español más directo y transparente en este contexto comercial.
- source_word: τοῦ κυρίου ἑαυτοῦ
  english_pob_choice: of his master's
  chosen_spanish: de su señor
  alternatives_spanish:
  - de su amo
  - de su dueño
  lexicon: BDAG
  rationale: Aquí κύριος no funciona como título divino, sino como superior humano en un contexto de administración de bienes. «Señor» conserva la forma del término griego sin forzar una lectura cristológica; el contexto aclara la relación social.
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: decía
  alternatives_spanish:
  - iba diciendo
  - estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto indica acción en desarrollo o escena en progreso. En español, «decía» transmite ese valor sin sonar artificial.
- source_word: τῷ πρώτῳ
  english_pob_choice: to the first
  chosen_spanish: al primero
  alternatives_spanish:
  - al primero de ellos
  - al primero en llegar
  lexicon: BDAG
  rationale: La expresión dativa ordinal se vierte naturalmente como «al primero».
- source_word: Πόσον
  english_pob_choice: How much
  chosen_spanish: ¿Cuánto
  alternatives_spanish:
  - ¿Qué cantidad?
  - ¿Cuánto es?
  lexicon: BDAG
  rationale: En un contexto de deuda, la idea es la cantidad adeudada. «¿Cuánto?» es la forma española más idiomática y precisa.
- source_word: ὀφείλεις
  english_pob_choice: do you owe
  chosen_spanish: debes
  alternatives_spanish:
  - estás debiendo
  - tienes que pagar
  lexicon: BDAG
  rationale: El presente de ὀφείλω en este contexto financiero se expresa de manera natural con «debes», que comunica la obligación/deuda sin añadir paráfrasis.
- source_word: τῷ κυρίῳ μου
  english_pob_choice: my master
  chosen_spanish: a mi señor
  alternatives_spanish:
  - a mi amo
  - a mi dueño
  lexicon: BDAG
  rationale: Se mantiene el mismo referente humano de κύριος. En español, «mi señor» conserva la referencia de respeto/superioridad y evita introducir un matiz más servil que el contexto no exige.
theological_decisions:
- issue: Uso de κύριος para el superior humano en la parábola
  english_pob_reading: master
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - amo
  - dueño
  rationale: La nota inglesa aclara que aquí κύριος no se refiere al Señor divino sino al superior humano del administrador. En español, «señor» mantiene la equivalencia léxica con el griego, mientras que el contexto narrativo evita la lectura teológica indebida. No se optó por «amo» como texto principal porque en español suena más duro y menos acorde con el matiz de relación administrativa del relato.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; translation philosophy on documented exceptions'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: el inglés POB fue confirmado sin cambios y la única tensión interpretativa relevante es la del término κύριος en contexto doméstico-económico. La presente redacción conserva esa distinción en español sin añadir notas no ancladas.'
  spanish_consistency_notes:
  - Se usa «señor» como equivalente de κύριος en el texto principal, en continuidad con el griego y con la decisión contextual documentada.
  - Se evita «SEÑOR» en versículos donde κύριος no designa a Dios; el contexto narrativo aclara que se trata del superior humano.
  - La puntuación y el orden del discurso siguen de cerca la estructura griega sin calcado innecesario.
  - El estilo es publicable y natural en español bíblico contemporáneo, sin depender de formulaciones tradicionales cuando no son necesarias.
