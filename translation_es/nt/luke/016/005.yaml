review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: el participio temporal previo, la fuerza distributiva de ἕνα ἕκαστον, el referente comercial de χρεοφειλέται, el imperfecto ἔλεγεν y la pregunta sobre la cantidad adeudada. Sin embargo, no sigue bien la decisión auditada de traducir κύριος en este contexto humano como «master», y «llamar a sí» resulta una reproducción demasiado literal y poco natural del medio προσκαλεσάμενος.'
  spanish_quality_summary: El texto es comprensible, pero «después de llamar a sí» suena antinatural en español. Además, «señor» en ambas ocurrencias de κύριος introduce una resonancia innecesariamente ambigua en un contexto parabólico doméstico-económico, cuando el inglés auditado documentó la excepción contextual «master». «Amo» funciona mejor aquí que «señor», aunque no debe entenderse con dureza excesiva; es el equivalente más claro para un superior humano en este tipo de relación.
  glossary_alignment: 'No hay conflicto con el glosario principal sobre Yahvé/Mesías/etc. Sí hay una excepción contextual relevante para κύριος: aquí no debe mantenerse como término con posible eco teológico, sino como superior humano. La revisión adopta «amo» para ambas instancias de κύριος, en línea con la rationale auditada de evitar sobretonos divinos. No se requieren notas léxicas adicionales en español porque la elección principal ya desambigüa el referente.'
  issues:
  - severity: medium
    issue: «después de llamar a sí» es un calco poco natural de προσκαλεσάμενος
    rationale: Aunque intenta reflejar el valor medio de «llamar hacia sí», en español estándar suena forzado. «Después de llamar» o «después de convocar» preserva bien el sentido sin torpeza sintáctica.
  - severity: high
    issue: «señor» para κύριος no sigue la excepción contextual auditada
    rationale: El English POB documenta explícitamente que aquí κύριος refiere al superior humano del administrador y por eso usa «master», no «Lord». En español, «señor» deja abierta una resonancia impropia y no aprovecha la desambiguación contextual ya establecida.
  revised_spanish_text: 'Y, después de llamar a cada uno de los deudores de su amo, decía al primero: «¿Cuánto debes a mi amo?»'
  revision_rationale: 'Se corrige el calco antinatural «llamar a sí» a «llamar», que conserva el sentido narrativo de προσκαλεσάμενος en español idiomático. También se cambia «señor» por «amo» en ambas instancias de κύριος para ajustarse a la decisión léxica y teológica auditada: aquí se trata del superior humano del administrador, no de un título divino. El resto del versículo está bien encaminado y no requiere cambios.'
