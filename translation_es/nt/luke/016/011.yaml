translation:
  language: es
  text: Si, entonces, no han sido fieles en las riquezas injustas[a], ¿quién les confiará las riquezas verdaderas[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «riquezas deshonestas»; el griego dice literalmente «el mamón injusto».
    reason: lexical_alternative
  - marker: b
    text: Lit. «lo verdadero»; el sentido es «las riquezas verdaderas» en contraste con las riquezas mundanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδίκῳ
  english_pob_choice: unrighteous
  chosen_spanish: injustas
  alternatives_spanish:
  - injustas
  - inicuas
  - deshonestas
  lexicon: BDAG
  rationale: ἄδικος expresa falta de justicia o rectitud moral. En español, «injustas» conserva mejor ese color moral que «deshonestas», que puede reducirse a fraude, o «inicuas», que resulta más solemne pero menos transparente.
- source_word: μαμωνᾷ
  english_pob_choice: wealth
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - dinero
  - mamón
  lexicon: BDAG
  rationale: μαμωνᾶς se refiere a bienes/riquezas como esfera de posesión y confianza. «Riquezas» mantiene amplitud semántica mejor que «dinero» y evita transliterar «mamón», que en español puede sonar más tradicional que explicativo.
- source_word: ἐν τῷ ἀδίκῳ μαμωνᾷ
  english_pob_choice: with unrighteous wealth
  chosen_spanish: en las riquezas injustas
  alternatives_spanish:
  - con las riquezas injustas
  - en el mamón injusto
  - con el dinero injusto
  lexicon: BDAG
  rationale: Se conserva el valor locativo/esférico de ἐν con «en», que en español expresa bien el ámbito en el que se demuestra fidelidad. El plural «riquezas» fluye mejor en español y sigue la amplitud del término griego.
- source_word: πιστοὶ
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - fieles
  - confiables
  - leales
  lexicon: BDAG
  rationale: πιστός aquí describe confiabilidad en la administración. «Fieles» es el equivalente natural y bíblico en español, y mantiene la conexión con el tema de mayordomía del contexto.
- source_word: οὐκ ἐγένεσθε
  english_pob_choice: have not been
  chosen_spanish: no fueron
  alternatives_spanish:
  - no se hicieron
  - no llegaron a ser
  - no resultaron ser
  lexicon: BDAG
  rationale: γίνομαι con predicado adjetival puede funcionar como ‘llegar a ser’ o ‘probarse’. En español, «no fueron fieles» comunica con naturalidad el sentido resultativo de la condición sin forzar una construcción demasiado literal.
- source_word: τὸ ἀληθινὸν
  english_pob_choice: the true riches
  chosen_spanish: las riquezas verdaderas
  alternatives_spanish:
  - lo verdadero
  - la verdadera riqueza
  - las verdaderas riquezas
  lexicon: BDAG
  rationale: El adjetivo sustantivado τὸ ἀληθινόν queda implícito en el griego. Dado el contraste con μαμωνᾷ, «las riquezas verdaderas» explicita de manera sobria la oposición entre riqueza temporal e irreemplazable valor real, como en el auditoría inglesa.
- source_word: πιστεύσει
  english_pob_choice: will entrust
  chosen_spanish: confiará
  alternatives_spanish:
  - confiará
  - encargará
  - pondrá bajo su cuidado
  lexicon: BDAG
  rationale: πιστεύω con objeto directo y dativo aquí significa ‘confiar/encargar a alguien’. «Confiará» en español refleja ese valor de encomendar, sin introducir la carga más técnica de «encargará».
theological_decisions:
- issue: El sustantivo implícito en τὸ ἀληθινόν
  english_pob_reading: Rendered as 'the true riches' to make explicit the implied contrast between temporal wealth and genuinely valuable heavenly stewardship.
  chosen_spanish_reading: «las riquezas verdaderas» explicita el contraste implícito entre las riquezas temporales y aquello que tiene valor real.
  alternative_spanish_readings:
  - «lo verdadero»
  - «la verdadera riqueza»
  - «lo verdadero que les pertenezca»
  rationale: El griego deja el sustantivo implícito, pero el contexto inmediato contrasta claramente con μαμωνᾷ. En español, una concreción moderada evita ambigüedad y preserva la fuerza retórica del contraste sin añadir una doctrina ajena al texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor semántico de μαμωνᾶς
  english_pob_reading: '''wealth'' rather than transliterated ''mammon''.'
  chosen_spanish_reading: «riquezas» en lugar de «mamón» como término principal del texto.
  alternative_spanish_readings:
  - «mamón»
  - «bienes»
  - «dinero»
  rationale: En español, transliterar «mamón» puede funcionar como nota explicativa, pero como texto principal reduce claridad. «Riquezas» conserva el sentido de posesiones/materialidad y permite que la tensión moral de ἀδίκῳ quede visible.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión inglesa revisada que entiende μαμωνᾷ como «wealth» y τὸ ἀληθινόν como un sustantivo implícito contrastado con esa riqueza. No se aplicaron revisiones nuevas al contenido fuente; solo se ajustó la formulación al español natural manteniendo la misma distinción léxica y retórica.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «fieles» para πιστοὶ por coherencia con el lenguaje de mayordomía bíblica en español.
  - «Riquezas» se usa en plural para reflejar la amplitud del sustantivo implícito y la naturalidad del español.
  - Se evita «mamón» en el texto principal porque la nota ya preserva la alternativa más literal.
