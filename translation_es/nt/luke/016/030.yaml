translation:
  language: es
  text: 'Pero él dijo[a]: «No, padre Abraham, pero si alguien va a ellos de entre los muertos, se arrepentirán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, «de los muertos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐχί
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - No, en verdad
  - Ciertamente no
  lexicon: BDAG
  rationale: Es una negación fuerte en diálogo directo. «No» suena natural en español y conserva la contradicción del hablante sin sobrerretórica.
- source_word: πάτερ Ἀβραάμ
  english_pob_choice: father Abraham
  chosen_spanish: padre Abraham
  alternatives_spanish:
  - Padre Abraham
  lexicon: BDAG
  rationale: El vocativo expresa apelación relacional. En español, minúscula en «padre» mantiene el matiz de tratamiento, no de título eclesiástico.
- source_word: ἀλλ’ ἐάν
  english_pob_choice: but if
  chosen_spanish: pero si
  alternatives_spanish:
  - sino que, si
  - más bien, si
  lexicon: BDAG
  rationale: La construcción introduce contraste/corrección frente a la afirmación previa. «Pero si» comunica bien el giro argumentativo en español contemporáneo.
- source_word: τις
  english_pob_choice: someone
  chosen_spanish: alguien
  alternatives_spanish:
  - una persona
  - cualquiera
  lexicon: BDAG
  rationale: Indefinido singular natural en español; mantiene la referencia abierta a una persona cualquiera sin añadir especificación.
- source_word: ἀπὸ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - desde los muertos
  lexicon: BDAG
  rationale: La preposición con genitivo puede expresar procedencia desde la esfera de los muertos. «De entre los muertos» refleja mejor esa salida desde ese grupo o ámbito que un simple «de los muertos».
- source_word: πορευθῇ
  english_pob_choice: goes
  chosen_spanish: va
  alternatives_spanish:
  - fuera
  - llega
  lexicon: BDAG
  rationale: En una prótasis con ἐάν, el sentido futuro es natural en español con presente de indicativo. «Va» conserva el movimiento del verbo sin forzar perífrasis.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - hacia ellos
  - para ellos
  lexicon: BDAG
  rationale: πρός con acusativo marca movimiento hacia personas. «A ellos» es la forma directa y idiomática en español.
- source_word: μετανοήσουσιν
  english_pob_choice: they will repent
  chosen_spanish: se arrepentirán
  alternatives_spanish:
  - cambiarán de mente
  - se volverán
  lexicon: BDAG
  rationale: En Lucas, μετανοέω suele tener fuerza moral y espiritual, no solo cognitiva. «Se arrepentirán» preserva ese peso teológico mejor que una versión meramente mental.
theological_decisions:
- issue: Alcance de μετανοήσουσιν
  english_pob_reading: Render as 'they will repent' rather than 'they will change their thinking.'
  chosen_spanish_reading: se arrepentirán
  alternative_spanish_readings:
  - cambiarán de mente
  - cambiarán de parecer
  rationale: El contexto habla de respuesta a testimonio y juicio, no solo de reconsideración intelectual. «Se arrepentirán» mantiene la dimensión ética y espiritual propia de Lucas.
  doctrine_reference: Translation philosophy §1, §6
- issue: Origen de ἀπὸ νεκρῶν
  english_pob_reading: Prefer the plain 'from the dead' over the earlier, more explicit 'from among the dead'.
  chosen_spanish_reading: de entre los muertos
  alternative_spanish_readings:
  - de los muertos
  - desde entre los muertos
  rationale: En español, «de entre los muertos» conserva la idea de procedencia desde el ámbito de los muertos sin sonar más pesada de lo necesario. Evita reducir la expresión a una mera fórmula idiomática sin matiz espacial/relacional.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «from among the dead» a «from the dead», y de una paráfrasis cognitiva de μετανοέω a «repent». La versión española sigue esa revisión en la dirección de una formulación más natural y teológicamente precisa, sin perder el matiz de procedencia del griego.
  spanish_consistency_notes:
  - Se mantiene «padre Abraham» con minúscula en «padre» como vocativo relacional, en línea con el tratamiento del inglés POB.
  - Se conserva la forma verbal futura en español («se arrepentirán») para reflejar el valor prospectivo de ἐάν + subjuntivo aoristo.
  - La nota al pie ofrece una alternativa lexical para ἀπὸ νεκρῶν sin imponer una lectura exclusiva.
