    text: O simplemente, «de los muertos».
    reason: lexical_alternative
  revision_rationale: Se corrige la nota para reflejar fielmente la alternativa documentada por el inglés POB para ἀπὸ νεκρῶν, sin añadir el concepto no atestiguado de «lugar». También se suaviza la puntuación para un español más natural sin cambiar el sentido.
