review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: respuesta negativa enfática («No»), vocativo relacional («padre Abraham»), contraste condicional («pero si»), movimiento hacia ellos («va a ellos») y sentido moral-espiritual de μετανοήσουσιν («se arrepentirán»). El punto principal a corregir es la nota: el griego ἀπὸ νεκρῶν significa «de los muertos / de entre los muertos», no «del lugar de los muertos».'
  spanish_quality_summary: El español es claro y natural. Sin embargo, la puntuación mejora más con coma tras «Abraham» en vez de punto y coma, y conviene ajustar la nota para que no introduzca un sentido no presente en la fuente («lugar»).
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Se arrepentirán» sigue correctamente la decisión teológica para μετανοέω. «Padre Abraham» es adecuado. La frase «de entre los muertos» es aceptable en español, aunque la auditoría inglesa prefirió la forma más llana «from the dead»; en español ambas caben, pero la nota actual no preserva correctamente esa alternativa.
  issues:
  - severity: high
    issue: La nota al pie traduce ἀπὸ νεκρῶν como «del lugar de los muertos».
    rationale: La fuente griega no menciona ningún «lugar»; esa formulación interpreta y añade contenido no presente. La alternativa correcta, si se mantiene nota, debe ser algo como «de los muertos».
  - severity: low
    issue: Puntuación con punto y coma tras «padre Abraham».
    rationale: 'No es infiel, pero una coma reproduce mejor el flujo directo de la réplica en español: «No, padre Abraham, pero si…».'
  revised_spanish_text: 'Pero él dijo[a]: «No, padre Abraham, pero si alguien va a ellos de entre los muertos, se arrepentirán».'
