translation:
  language: es
  text: Y en el Hades[a], alzando sus ojos, estando en tormentos, ve a Abraham de lejos y a Lázaro en su seno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «infierno»; más precisamente, «Hades», el reino de los muertos, no el lugar final de juicio implicado por «Gehenna».
    reason: lexical_alternative
  - marker: b
    text: Lit., «en su seno»; tradicionalmente, «en el seno de Abraham».
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾅδῃ
  english_pob_choice: Hades
  chosen_spanish: Hades
  alternatives_spanish:
  - el reino de los muertos
  - infierno
  lexicon: BDAG
  rationale: Se conserva el término propio del griego para no confundir este lugar intermedio con el juicio final. En español, «Hades» mantiene la distinción lexical y teológica que el contexto exige.
- source_word: ἐπάρας τοὺς ὀφθαλμοὺς αὐτοῦ
  english_pob_choice: lifting up his eyes
  chosen_spanish: alzando sus ojos
  alternatives_spanish:
  - levantando sus ojos
  - mirando hacia arriba
  lexicon: BDAG
  rationale: La imagen corporal se conserva de manera natural en español sin convertirla en una paráfrasis demasiado libre. «Alzando sus ojos» refleja bien el gesto narrativo y la vividez del original.
- source_word: ὑπάρχων
  english_pob_choice: being
  chosen_spanish: estando
  alternatives_spanish:
  - mientras estaba
  - hallándose
  lexicon: BDAG
  rationale: Se mantiene el participio circunstancial con una forma española breve y directa. «Estando» preserva la relación de estado sin añadir matices temporales no explícitos.
- source_word: βασάνοις
  english_pob_choice: torment
  chosen_spanish: tormentos
  alternatives_spanish:
  - agonía
  - sufrimiento
  lexicon: BDAG
  rationale: El plural griego se refleja con un plural español para no borrar la intensidad y concreción del término. «En tormentos» comunica el estado de padecimiento con fidelidad y claridad.
- source_word: ὁρᾷ
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - ve a
  - alcanza a ver
  lexicon: BDAG
  rationale: El presente narrativo se expresa de forma simple y natural. «Ve» conserva la inmediatez del griego sin forzar una construcción más pesada.
- source_word: ἀπὸ μακρόθεν
  english_pob_choice: far away
  chosen_spanish: de lejos
  alternatives_spanish:
  - a lo lejos
  - desde lejos
  lexicon: BDAG
  rationale: «De lejos» es idiomático en español y mantiene la distancia espacial destacada en el texto. Es una opción clara y sobria para el registro bíblico.
- source_word: ἐν τοῖς κόλποις αὐτοῦ
  english_pob_choice: in his bosom
  chosen_spanish: en su seno
  alternatives_spanish:
  - en su regazo
  - en su abrazo
  - en el seno de Abraham
  lexicon: BDAG
  rationale: «Seno» reproduce el valor relacional e idiomático de κόλπος de manera comprensible en español. Se evita «regazo» por sonar demasiado doméstico, y se mantiene la imagen de cercanía y acogida sin imponer una frase tradicional no requerida por el griego.
theological_decisions:
- issue: ᾅδης como lugar intermedio y no como juicio final
  english_pob_reading: Hades, preserving the distinction from Gehenna and the final place of judgment
  chosen_spanish_reading: Hades, preservando la distinción respecto de Gehenna y del juicio final
  alternative_spanish_readings:
  - infierno
  - el reino de los muertos
  rationale: La elección evita mezclar el término del texto con nociones posteriores de condenación final. El español conserva la tensión teológica del pasaje sin resolverla de manera doctrinalmente reductiva.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
- issue: κόλπος / 'Abraham's bosom' y la imagen de cercanía con Abraham
  english_pob_reading: in his bosom, with the traditional 'in Abraham's bosom' preserved in a footnote
  chosen_spanish_reading: en su seno, con la nota que preserva la lectura tradicional
  alternative_spanish_readings:
  - en el seno de Abraham
  - en su regazo
  - en su abrazo
  rationale: La forma principal busca ser natural y exacta; la nota permite conservar la lectura histórica tradicional sin imponerla en el cuerpo del texto. Así se mantiene auditabilidad y se respeta la imagen de comunión cercana.
  doctrine_reference: Readable modern Spanish, not archaic or academic; original-language primacy over translation tradition.
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió la imagen de 'in his arms' a 'in his bosom' para reflejar mejor κόλποις; por eso la traducción española usa «en su seno» y deja constancia en la nota de la lectura tradicional «en el seno de Abraham». También se preserva la distinción de Hades frente a cualquier equivalencia simplificadora con 'infierno'.
  spanish_consistency_notes:
  - Se mantiene «Hades» en el texto principal, conforme al criterio POB de no enmascarar ᾅδης con un término doctrinalmente cargado.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - «En su seno» reproduce de forma digna y comprensible la cercanía expresada por κόλποις sin caer en arcaísmo excesivo.
  - Se conserva el presente narrativo («ve») para reflejar la vivacidad del griego.
