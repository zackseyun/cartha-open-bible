translation:
  language: es
  text: 'Y él, al gritar, dijo: «Padre Abraham, ten misericordia de mí y envía a Lázaro, para que moje en agua la punta de su dedo y refresque mi lengua, porque estoy en agonía[a] en esta llama».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque estoy atormentado en esta llama». El verbo griego puede denotar sufrimiento intenso o tormento.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνήσας
  english_pob_choice: cried out
  chosen_spanish: al gritar
  alternatives_spanish:
  - gritó
  - al clamar
  lexicon: BDAG
  rationale: φωνήσας introduce una exclamación fuerte y urgente. «Al gritar» comunica la intensidad sin volver el estilo rígido o demasiado literal para el español.
- source_word: ἐλέησόν
  english_pob_choice: have mercy on
  chosen_spanish: ten misericordia de
  alternatives_spanish:
  - ten compasión de
  - ten piedad de
  lexicon: BDAG
  rationale: La petición directa alinea bien con la fórmula española «ten misericordia de mí», que conserva el sentido de compasión activa y súplica personal.
- source_word: πέμψον
  english_pob_choice: send
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - despacha
  lexicon: BDAG
  rationale: Imperativo simple y directo. «Envía» es natural en español y mantiene la claridad del encargo a Abraham respecto de Lázaro.
- source_word: βάψῃ
  english_pob_choice: dip
  chosen_spanish: moje
  alternatives_spanish:
  - sumerja
  - unte
  lexicon: BDAG
  rationale: βάπτω aquí describe una acción breve sobre la punta del dedo. En español, «moje» comunica con precisión la inmersión mínima y evita sugerir un baño completo.
- source_word: τὸ ἄκρον τοῦ δακτύλου αὐτοῦ
  english_pob_choice: the tip of his finger
  chosen_spanish: la punta de su dedo
  alternatives_spanish:
  - el extremo de su dedo
  - su yema
  lexicon: BDAG
  rationale: «La punta de su dedo» reproduce con naturalidad la idea de ἄκρον como extremidad o punta. Es más transparente que «yema» y más cercano a la estructura griega.
- source_word: ὕδατος
  english_pob_choice: in water
  chosen_spanish: en agua
  alternatives_spanish:
  - con agua
  lexicon: BDAG
  rationale: Después de un verbo de mojado, el genitivo se expresa naturalmente en español con «en agua». Conserva la imagen concreta de la acción solicitada.
- source_word: καταψύξῃ
  english_pob_choice: cool
  chosen_spanish: refresque
  alternatives_spanish:
  - enfríe
  - alivie
  lexicon: BDAG
  rationale: καταψύχω significa enfriar o refrescar por enfriamiento. «Refresque» funciona bien en español y comunica el alivio físico buscado sin perder concreción.
- source_word: γλῶσσάν μου
  english_pob_choice: my tongue
  chosen_spanish: mi lengua
  alternatives_spanish:
  - mi lengua
  lexicon: BDAG
  rationale: Referencia corporal literal. En español, «lengua» conserva el sentido directo y la imagen física del texto.
- source_word: ὀδυνῶμαι
  english_pob_choice: I am in agony
  chosen_spanish: estoy en agonía
  alternatives_spanish:
  - estoy sufriendo
  - estoy atormentado
  lexicon: BDAG
  rationale: ὀδυνῶμαι expresa dolor o angustia intensos. «Estoy en agonía» mantiene la fuerza del original y evita imponer de antemano una lectura doctrinal más específica.
- source_word: ἐν τῇ φλογὶ ταύτῃ
  english_pob_choice: in this flame
  chosen_spanish: en esta llama
  alternatives_spanish:
  - en este fuego
  lexicon: BDAG
  rationale: φλόξ apunta específicamente a una llama, no al término más general «fuego». «En esta llama» preserva la imagen vívida del griego y la elección inglesa.
- source_word: Πάτερ Ἀβραάμ
  english_pob_choice: Father Abraham
  chosen_spanish: Padre Abraham
  alternatives_spanish:
  - Abraham, padre
  - padre Abraham
  lexicon: BDAG
  rationale: El vocativo se traduce de manera directa y reverente. «Padre Abraham» refleja la apelación familiar y mantiene el orden natural en español.
theological_decisions:
- issue: Cómo expresar la intensidad del sufrimiento sin cerrar la tensión lexical
  english_pob_reading: because I am in agony in this flame
  chosen_spanish_reading: porque estoy en agonía en esta llama
  alternative_spanish_readings:
  - porque sufro en esta llama
  - porque estoy atormentado en esta llama
  rationale: El griego puede denotar dolor intenso o tormento; la versión española conserva esa tensión con «agonía», que es fuerte pero no más interpretativa que el original. Así no se atenúa ni se exagera la afirmación.
  doctrine_reference: Preservar la tensión teológica/lexical sin resolverla de antemano.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; esta versión corrige la validación anterior asegurando que el marcador de nota [a] aparezca en el texto español.
  spanish_consistency_notes:
  - Se mantuvo «Padre Abraham» para conservar la forma vocativa y la naturalidad en español.
  - Se prefirió «en esta llama» frente a «en este fuego» para respetar la precisión de φλόξ.
  - Se usó «ten misericordia de mí» como equivalente idiomático y teológicamente transparente de ἐλέησόν με.
  - Se evitó traducir mecánicamente con calcos duros cuando el español requería una formulación más natural, sin añadir contenido no sustentado por el griego.
