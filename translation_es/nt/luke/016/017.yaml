    rationale: Si el texto principal usa «trazo de una letra», la nota puede conservar la alternativa tradicional «tilde» o aclarar «raya»/«trazo» sin crear tensión con el cuerpo del versículo.
  revised_spanish_text: Pero es más fácil que pasen el cielo y la tierra, que caiga un solo trazo de una letra de la Ley[a].
