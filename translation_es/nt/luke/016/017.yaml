    issue: Sintaxis marcada en «Pero más fácil es que…»
    rationale: Aunque no es incorrecta, la inversión suena menos natural en español contemporáneo de registro bíblico claro. «Pero es más fácil que…» conserva mejor la fluidez sin perder el contraste de δέ.
  - severity: medium
    issue: «una sola raya» no expresa con suficiente precisión κεραία
    rationale: κεραία es un pequeño trazo distintivo de una letra, no simplemente una raya cualquiera. La auditoría inglesa explicitó «one stroke of a letter», y en español conviene mantener ese anclaje para preservar el sentido gráfico mínimo.
  - severity: low
