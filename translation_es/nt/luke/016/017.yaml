translation:
  language: es
  text: Pero es más fácil que pasen el cielo y la tierra, que caiga un solo trazo de una letra de la Ley[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una sola tilde»; es decir, un trazo diminuto que distingue una letra de otra.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐκοπώτερον
  english_pob_choice: easier
  chosen_spanish: más fácil
  alternatives_spanish:
  - más posible
  - menos difícil
  lexicon: BDAG
  rationale: El comparativo pide una equivalencia natural en español. «Más fácil» conserva la idea de mayor facilidad o posibilidad relativa sin forzar una construcción extraña.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula introduce contraste suave con el contexto inmediato. «Pero» mantiene ese matiz de oposición o transición discursiva en español.
- source_word: τὸν οὐρανὸν καὶ τὴν γῆν
  english_pob_choice: heaven and earth
  chosen_spanish: el cielo y la tierra
  alternatives_spanish:
  - los cielos y la tierra
  - el cielo y la tierra creada
  lexicon: BDAG
  rationale: En español, la merismo bíblica se entiende de forma natural como «el cielo y la tierra». Aunque «heaven and earth» puede ser idiomático en inglés, «cielo» comunica mejor el binomio creado sin perder el sentido totalizador.
- source_word: παρελθεῖν
  english_pob_choice: to pass away
  chosen_spanish: pasen
  alternatives_spanish:
  - desaparezcan
  - pasen de existir
  lexicon: BDAG
  rationale: El verbo griego expresa pasar, desaparecer o cesar. Aquí el sentido idiomático de «pasar» con sujeto plural en español conserva la imagen de la transitoriedad del orden creado.
- source_word: νόμου
  english_pob_choice: the Law
  chosen_spanish: la Ley
  alternatives_spanish:
  - la ley
  - la Torá
  lexicon: BDAG
  rationale: En el marco judío-escriturario de Lucas, νόμος apunta a la Ley revelada. «Ley» con mayúscula interna no es necesaria en español; el contexto la identifica como referencia bíblica. Se evita «torá» por no ser la forma del registro POB español salvo necesidad contextual.
- source_word: μίαν κεραίαν
  english_pob_choice: one stroke of a letter
  chosen_spanish: una sola raya
  alternatives_spanish:
  - un solo trazo
  - una pequeña raya de una letra
  - una tilde
  lexicon: BDAG
  rationale: κεραία designa una pequeña marca o trazo en una letra. «Raya» en español es una opción clara y no arcaica para una marca mínima; se conserva la idea de un detalle gráfico diminuto sin cargar el verso con tecnicismo.
- source_word: πεσεῖν
  english_pob_choice: to fall
  chosen_spanish: caiga
  alternatives_spanish:
  - caer
  - desaparezca
  - se pierda
  lexicon: BDAG
  rationale: En el contexto, el infinitivo comunica que ni el mínimo trazo de la Ley llegue a perder validez. «Caiga» reproduce la imagen verbal del descenso/pérdida sin apartarse del registro castellano natural.
theological_decisions:
- issue: Alcance de la expresión «el cielo y la tierra»
  english_pob_reading: a standard merism for the created order/cosmos
  chosen_spanish_reading: un merismo bíblico para la creación entera
  alternative_spanish_readings:
  - una referencia literal al cielo físico y la tierra
  - una hipérbole cosmológica
  rationale: La frase funciona como merismo, no como inventario literal de dos elementos. Traducirla literalmente en español conserva la fórmula bíblica y evita reducir su alcance.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de «la Ley»
  english_pob_reading: the Law as the scriptural Law, not law in a generic sense
  chosen_spanish_reading: la Ley como la Ley escritural dada por Dios
  alternative_spanish_readings:
  - la ley en general
  - la ley moral
  rationale: El contexto lucano remite a la Ley revelada en la Escritura. La traducción mantiene «Ley» para señalar ese referente, sin expandirlo a una doctrina más amplia de la que el versículo por sí solo afirma.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor de una «κεραία»
  english_pob_reading: one stroke of a letter
  chosen_spanish_reading: una marca mínima de una letra
  alternative_spanish_readings:
  - una letra completa
  - un ornamento caligráfico
  rationale: El punto teológico del versículo es la permanencia incluso del detalle más pequeño de la Ley. «Una sola raya» transmite la pequeñez del elemento gráfico y preserva la fuerza de la afirmación.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el sentido del griego SBLGNT y coincide con el audit trail inglés en los elementos clave: comparativo de facilidad, merismo «cielo y tierra», permanencia de la Ley y diminutez de κεραία. Se ajustó la imaginería al español natural («raya») sin perder la nota explicativa preservada por la POB inglesa.'
  spanish_consistency_notes:
  - Se eligió «Ley» con mayúscula inicial léxica implícita por contexto bíblico, aunque el artículo no la capitaliza tipográficamente en la frase para evitar una grafía pesada.
  - Se evitó «pasar away» calco literal; el español usa «pasar» con un sujeto plural natural.
  - Se conservó un registro bíblico sobrio y moderno, sin caer en arcaísmos como «ni una jota ni un ápice».
