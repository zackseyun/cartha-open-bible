translation:
  language: es
  text: Y si no han sido fieles[a] en lo ajeno, ¿quién les dará lo que les pertenece[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en lo que pertenece a otro' para 'en lo ajeno'.
    reason: lexical_alternative
  - marker: b
    text: O 'lo que es de ustedes' para 'lo que les pertenece'.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἰ
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Y si acaso
  - Y en caso de que
  lexicon: BDAG
  rationale: Conserva la continuidad discursiva de καὶ y la cláusula condicional de εἰ con una forma natural en español.
- source_word: ἐν τῷ ἀλλοτρίῳ
  english_pob_choice: what belongs to another
  chosen_spanish: en lo ajeno
  alternatives_spanish:
  - en lo de otro
  - con lo ajeno
  - en la propiedad ajena
  lexicon: BDAG
  rationale: El neutro sustantivado con artículo tiene sentido de 'lo que pertenece a otro'. 'Lo ajeno' es breve, idiomático y mantiene la idea de algo perteneciente a otro sin especificarlo indebidamente.
- source_word: πιστοὶ
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - leales
  - confiables
  - fidedignos
  lexicon: BDAG
  rationale: En contexto de mayordomía y administración, 'fieles' expresa adecuadamente la confiabilidad moral y la constancia requeridas.
- source_word: ἐγένεσθε
  english_pob_choice: have not been
  chosen_spanish: han sido
  alternatives_spanish:
  - llegaron a ser
  - se mostraron
  lexicon: BDAG
  rationale: Aunque el griego usa un aoristo de γίνομαι con valor idiomático, en español la negación 'no han sido' comunica con naturalidad la falta de fidelidad en el estado requerido.
- source_word: τὸ ὑμέτερον
  english_pob_choice: what is your own
  chosen_spanish: lo que es de ustedes
  alternatives_spanish:
  - lo propio de ustedes
  - lo que les pertenece
  - lo de ustedes
  lexicon: BDAG
  rationale: El neutro sustantivado apunta a 'lo que es suyo'. 'Lo que es de ustedes' preserva el contraste con 'lo ajeno' y evita una elipsis demasiado dura en español.
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: ¿quién
  alternatives_spanish:
  - ¿qué persona
  lexicon: BDAG
  rationale: El interrogativo personal reproduce la pregunta retórica del griego de manera directa e idiomática.
- source_word: δώσει ὑμῖν
  english_pob_choice: will give you
  chosen_spanish: les dará
  alternatives_spanish:
  - se los dará
  - les entregará
  lexicon: BDAG
  rationale: δίδωμι se traduce con 'dar' de forma directa. 'Les dará' mantiene el sentido y el registro sobrio; el dativo plural se adapta al español con 'les'.
theological_decisions:
- issue: Identificación de 'lo ajeno' y 'lo que es de ustedes'
  english_pob_reading: Render the contrast without specifying the referents in the main text.
  chosen_spanish_reading: Mantener el contraste sin precisar en el texto principal qué bienes son 'lo ajeno' ni cuáles son 'lo que es de ustedes'.
  alternative_spanish_readings:
  - '''riquezas mundanas'' frente a ''verdaderas riquezas'''
  - '''mayordomía terrenal'' frente a ''herencia escatológica'''
  - '''bienes de otro amo'' frente a ''su propia mayordomía'''
  rationale: El griego deja abierto el referente exacto en este versículo; la versión española debe conservar esa tensión sin resolverla por anticipado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Revisado contra el texto griego SBLGNT y el audit trail inglés: no hubo cambios requeridos respecto de la lectura base; se mantuvo la ambigüedad referencial y el contraste sustantivado del original.'
  spanish_consistency_notes:
  - Se prefirió 'fieles' por el valor moral y de administración del contexto.
  - '''Lo ajeno'' y ''lo que es de ustedes'' conservan la oposición semántica del griego sin interpretar los referentes.'
  - Se evitó 'entregar' o 'confiar' para δώσει porque el audit trail inglés retiene 'give' como opción principal.
