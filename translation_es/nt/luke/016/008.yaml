source:
  edition: SBLGNT
  text: καὶ ἐπῄνεσεν ὁ κύριος τὸν οἰκονόμον τῆς ἀδικίας ὅτι φρονίμως ἐποίησεν· ὅτι οἱ υἱοὶ τοῦ αἰῶνος τούτου φρονιμώτεροι ὑπὲρ τοὺς υἱοὺς τοῦ φωτὸς εἰς τὴν γενεὰν τὴν ἑαυτῶν εἰσιν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/016/008.yaml
  text: And the master praised the unrighteous manager because he had acted shrewdly[c][b][a]. For the sons of this age are more shrewd in dealing with their own generation than the sons of light are.
  footnotes:
  - marker: a
    text: Or 'the Lord praised the unrighteous manager.' Here 'master' is preferred because κύριος most naturally refers to the parable's master, not directly to Jesus or God.
    reason: alternative_reading
  - marker: b
    text: Greek 'the sons of this age' and 'the sons of light.' These expressions contrast people shaped by the present age with those identified with God's light.
    reason: lexical_alternative
  - marker: c
    text: Or more literally, 'are more shrewd than the sons of light for their own generation.' The Greek phrase is difficult; the translation brings out the sense of acting shrewdly within their own circle.
    reason: lexical_alternative
