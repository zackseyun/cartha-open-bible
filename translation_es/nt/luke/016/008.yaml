revisions:
- from: Y el[a] jefe alabó al administrador injusto porque había actuado con astucia[b][c]. Porque los hijos de esta era son más astutos en su trato con su propia generación que los hijos de la luz.
  to: Y el amo[a] alabó al administrador injusto porque había actuado con astucia. Porque los hijos de esta era[b] son más astutos en su trato con su propia generación[c] que los hijos de la luz[b].
  rationale: 'La revisión es menor pero necesaria: mejora la precisión estilística de κύριος dentro de la parábola (''el amo'' en lugar de ''el jefe'') y corrige el anclaje de las notas para que correspondan exactamente a las expresiones que explican, conforme a los requisitos del proyecto.'
