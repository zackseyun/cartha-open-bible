translation:
  language: es
  text: Y el amo[a] alabó al administrador injusto porque había actuado con astucia. Porque los hijos de esta era[b] son más astutos en su trato con su propia generación[c] que los hijos de la luz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el Señor'. Aquí se prefiere 'el amo' porque κύριος, en el contexto inmediato de la parábola, se refiere más naturalmente al personaje que manda sobre el administrador, no directamente a Jesús ni a Dios.
    reason: alternative_reading
  - marker: b
    text: '''Hijos de esta era'' y ''hijos de la luz'' conservan el contraste semítico entre quienes pertenecen al orden presente y quienes están asociados con la luz de Dios.'
    reason: lexical_alternative
  - marker: c
    text: 'También puede entenderse más literalmente: ''más astutos para su propia generación''. El griego es difícil; la traducción intenta hacer claro que la sagacidad se ejerce dentro de su propio ámbito humano y temporal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ κύριος
  english_pob_choice: the master
  chosen_spanish: el jefe
  alternatives_spanish:
  - el señor
  - el dueño
  lexicon: BDAG
  rationale: En el contexto inmediato de la parábola, κύριος se refiere más naturalmente al personaje que posee la casa o autoridad sobre el administrador. 'Jefe' comunica esa función relacional en español sin convertirlo automáticamente en un título divino. 'Señor' se reserva aquí como lectura alternativa porque puede sugerir una referencia directa a Dios o a Jesús, algo que la nota inglesa descarta para este versículo.
- source_word: οἰκονόμον
  english_pob_choice: manager
  chosen_spanish: administrador
  alternatives_spanish:
  - mayordomo
  - gerente
  lexicon: BDAG
  rationale: '''Administrador'' transmite bien la idea de una persona encargada de la gestión de una casa o bienes. ''Mayordomo'' es posible, pero suena más tradicional y menos transparente para lectores actuales; ''gerente'' puede sonar demasiado moderno o empresarial para este contexto.'
- source_word: τῆς ἀδικίας
  english_pob_choice: unrighteous
  chosen_spanish: injusto
  alternatives_spanish:
  - malvado
  - deshonesto
  - de la injusticia
  lexicon: BDAG
  rationale: La frase califica moralmente al administrador. 'Injusto' preserva la fuerza ética de ἀδικία sin especificar más de lo que el griego dice. 'Deshonesto' estrecha demasiado el sentido hacia fraude o mentira; 'de la injusticia' resulta demasiado literal y poco natural en español.
- source_word: φρονίμως
  english_pob_choice: shrewdly
  chosen_spanish: con astucia
  alternatives_spanish:
  - con prudencia
  - con sagacidad
  - astutamente
  lexicon: BDAG
  rationale: El adverbio expresa habilidad práctica o sagacidad estratégica. 'Con astucia' mantiene la idea de habilidad calculadora sin convertirla en aprobación moral. 'Con prudencia' podría sonar demasiado positiva; 'astutamente' es válida, pero 'con astucia' fluye mejor en el registro bíblico actual.
- source_word: οἱ υἱοὶ τοῦ αἰῶνος τούτου
  english_pob_choice: the sons of this age
  chosen_spanish: los hijos de esta era
  alternatives_spanish:
  - los hijos de este siglo
  - la gente de esta era
  - los hijos de este mundo
  lexicon: BDAG
  rationale: Se conserva la metáfora semítica de 'hijos' y el contraste temporal de αἰών con 'esta era'. 'Era' es más natural para lectores modernos que 'siglo', y mantiene el matiz de una época presente determinada. 'La gente de esta era' explicita el sentido, pero suaviza la imagen original.
- source_word: φρονιμώτεροι
  english_pob_choice: more shrewd
  chosen_spanish: más astutos
  alternatives_spanish:
  - más prudentes
  - más sagaces
  - más sabios
  lexicon: BDAG
  rationale: El comparativo continúa el mismo campo semántico de φρονίμως. 'Más astutos' conserva la inteligencia práctica y evita la connotación moral demasiado positiva de 'más sabios'. 'Más prudentes' podría sonar más benévolo de lo que el texto sugiere.
- source_word: ὑπὲρ
  english_pob_choice: than
  chosen_spanish: que
  alternatives_spanish:
  - más que
  - sobre
  lexicon: BDAG
  rationale: Con el comparativo, ὑπέρ funciona de modo idiomático como marcador de comparación. En español, la construcción natural es 'más ... que'.
- source_word: οἱ υἱοὶ τοῦ φωτός
  english_pob_choice: the sons of light
  chosen_spanish: los hijos de la luz
  alternatives_spanish:
  - los hijos de la luz divina
  - los hijos iluminados
  - los hijos de la claridad
  lexicon: BDAG
  rationale: Se preserva la expresión bíblica estable 'hijos de la luz' para mantener el paralelo con 'hijos de esta era'. 'Hijos' reproduce la imagen del griego mejor que 'personas' o 'gente'.
- source_word: εἰς τὴν γενεὰν τὴν ἑαυτῶν
  english_pob_choice: in dealing with their own generation
  chosen_spanish: en su trato con su propia generación
  alternatives_spanish:
  - para su propia generación
  - con respecto a su propia generación
  - entre su propia generación
  lexicon: BDAG
  rationale: La expresión griega es difícil y puede sonar torpe si se vierte demasiado literalmente. 'En su trato con su propia generación' comunica la esfera relacional o práctica en que actúan con mayor sagacidad, siguiendo la decisión inglesa de hacer inteligible el sentido sin perder el vínculo con el original. Se mantiene la tensión interpretativa al no resolverla en una lectura más específica de la que el texto garantiza.
theological_decisions:
- issue: Identidad de ὁ κύριος en la primera cláusula
  english_pob_reading: the master within the parable, not a direct title for Jesus/God in the narrative voice
  chosen_spanish_reading: el jefe dentro de la parábola, no un título directo para Dios o Jesús en la voz narrativa
  alternative_spanish_readings:
  - el Señor alabó al administrador injusto
  - el dueño alabó al administrador injusto
  rationale: La escena está situada dentro de una parábola y el término κύριος se entiende de forma más natural como el superior o dueño del administrador. Por eso se evita 'Señor' como forma principal, ya que podría sugerir indebidamente una referencia directa a Jesús o a Dios. La opción 'jefe' / 'dueño' preserva el referente narrativo interno.
  doctrine_reference: Translation philosophy §1, §3; uso contextual de κύριος documentado por el POB
- issue: Evaluación moral del administrador
  english_pob_reading: commendation of prudence/shrewdness without approval of unrighteousness
  chosen_spanish_reading: alabanza de la astucia sin aprobación de la injusticia
  alternative_spanish_readings:
  - alabanza de la sabiduría del administrador
  - aprobación de la conducta deshonesta
  rationale: 'El texto une ἀδικία con una acción calificada de φρονίμως. La traducción conserva esa tensión: se alaba la astucia estratégica, pero no se blanquea el calificativo moral negativo. ''Con astucia'' y ''administrador injusto'' reproducen la tensión del griego y del audit trail inglés.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue el pasaje inglés revisado con estatus de alta concordancia y sin cambios finales en la última pasada. Se ha mantenido la decisión contextual sobre κύριος como referente parabólico y la tensión moral entre ἀδικία y φρονίμως, sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene 'hijos de' para conservar el paralelismo con el griego y con la traducción inglesa auditada.
  - Se evita 'Señor' en el cuerpo principal para no introducir una lectura teológica que el contexto no exige.
  - '''Astucia'' se usa de forma consistente para φρονίμως / φρονιμώτεροι, preservando la valoración práctica sin convertirla en aprobación moral.'
  - '''Injusto'' conserva la nota ética de ἀδικία sin especificar una forma de fraude que el texto no explicita.'
