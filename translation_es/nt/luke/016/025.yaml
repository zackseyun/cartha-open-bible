translation:
  language: es
  text: 'Pero Abraham dijo[a]: «Hijo, recuerda que recibiste tus cosas buenas durante tu vida, y Lázaro igualmente cosas malas; pero ahora él es consolado aquí, y tú sufres angustia[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recibiste plenamente tus cosas buenas». El verbo griego puede implicar recibir lo que correspondía o recibirlo por completo.
    reason: lexical_alternative
  - marker: b
    text: O «estás atormentado». El griego puede denotar dolor o angustia intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τέκνον
  english_pob_choice: Child
  chosen_spanish: Hijo
  alternatives_spanish:
  - Hijo
  - Hijo mío
  - Niño
  lexicon: BDAG
  rationale: El vocativo expresa cercanía afectiva y una relación de superioridad o autoridad, pero en español natural «Hijo» comunica mejor ese trato personal que «Niño», y evita un matiz demasiado genérico para este contexto narrativo.
- source_word: μνήσθητι
  english_pob_choice: remember
  chosen_spanish: acuérdate
  alternatives_spanish:
  - recuerda
  - ten presente
  lexicon: BDAG
  rationale: Es un imperativo de recordar. «Acuérdate» suena natural en español y conserva el llamado directo a traer algo a la memoria.
- source_word: ἀπέλαβες
  english_pob_choice: received
  chosen_spanish: recibiste
  alternatives_spanish:
  - recibiste plenamente
  - recibiste en full
  - obtuv iste
  lexicon: BDAG
  rationale: La forma puede implicar recibir lo asignado o recibirlo plenamente. Se mantiene «recibiste» en el texto principal para no forzar una explicitación interpretativa; la posible intensificación queda preservada en la nota.
- source_word: τὰ ἀγαθά σου
  english_pob_choice: your good things
  chosen_spanish: tus cosas buenas
  alternatives_spanish:
  - tus bienes
  - tus buenas cosas
  - tus bendiciones
  lexicon: BDAG
  rationale: El griego es amplio y no nombra «bendiciones» de modo explícito. «Tus cosas buenas» conserva la generalidad y el contraste con «cosas malas», sin añadir un vocabulario más teológico que el texto no exige.
- source_word: ἐν τῇ ζωῇ σου
  english_pob_choice: during your life
  chosen_spanish: durante tu vida
  alternatives_spanish:
  - en tu vida
  - en tu tiempo de vida
  - en tu existencia
  lexicon: BDAG
  rationale: Expresa con claridad el marco temporal terrenal. «Durante tu vida» es idiomático y mantiene el contraste con la situación postmortem del verso.
- source_word: ὁμοίως
  english_pob_choice: likewise
  chosen_spanish: igualmente
  alternatives_spanish:
  - de la misma manera
  - asimismo
  lexicon: BDAG
  rationale: Marca el paralelo entre ambos casos. «Igualmente» conserva la simetría sin sonar pesado.
- source_word: τὰ κακά
  english_pob_choice: bad things
  chosen_spanish: cosas malas
  alternatives_spanish:
  - males
  - penas
  - tribulaciones
  lexicon: BDAG
  rationale: Aquí el adjetivo no describe maldad moral cometida por Lázaro, sino experiencias adversas sufridas. «Cosas malas» mantiene la amplitud del griego y el contraste con «cosas buenas».
- source_word: παρακαλεῖται
  english_pob_choice: is comforted
  chosen_spanish: es consolado
  alternatives_spanish:
  - es confortado
  - recibe consuelo
  lexicon: BDAG
  rationale: En este contexto de reversión postmortem, el pasivo indica recibir consuelo. «Es consolado» es claro, fiel y natural en español.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - acá
  lexicon: BDAG
  rationale: Deíctico espacial simple; «aquí» es la equivalencia más directa y transparente.
- source_word: ὀδυνᾶσαι
  english_pob_choice: are in anguish
  chosen_spanish: estás en angustia
  alternatives_spanish:
  - estás atormentado
  - sufres dolor
  - estás en tormento
  lexicon: BDAG
  rationale: El verbo puede expresar dolor intenso, aflicción o tormento. «Estás en angustia» preserva el sufrimiento real sin fijar más de lo que exige el término; se mantiene así la tensión semántica documentada por la POB inglesa.
theological_decisions:
- issue: Lenguaje de sufrimiento postmortem
  english_pob_reading: you are in anguish
  chosen_spanish_reading: estás en angustia
  alternative_spanish_readings:
  - estás atormentado
  - sufres tormento
  - estás en dolor
  rationale: El verso afirma sufrimiento consciente después de la muerte, pero el español debe reflejar la amplitud léxica de ὀδυνᾶσαι sin convertir automáticamente la frase en una formulación doctrinal más fuerte. «Estás en angustia» conserva la realidad del dolor y deja abierta la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: El inglés POB muestra una revisión estable sin cambios sustantivos en esta unidad; la versión española sigue esa lectura y conserva las dos alternativas léxicas documentadas en las notas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no aparece ningún título mesiánico en el texto.
  - «Hijo» se usa como vocativo relacional, no como indicación de filiación biológica literal.
  - «Cosas buenas / cosas malas» preserva la simetría del griego y la elección del inglés POB, sin sustituirla por «bendiciones» o «males» doctrinalizados.
