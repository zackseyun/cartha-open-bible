revisions:
- from: 'Y después de llamarlo, le dijo: «¿Qué es esto que oigo acerca de ti? Da cuenta de tu administración, porque ya no puedes administrar».[a][b]'
  to: 'Y después de llamarlo, le dijo: «¿Qué es esto que oigo sobre ti? Da cuenta de tu administración[a], porque ya no puedes administrar».[b]'
