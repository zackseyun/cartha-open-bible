revisions:
- from: Ahora había un hombre rico[a], y se vestía de púrpura y de lino fino, banqueteando espléndidamente todos los días.
  to: Ahora bien, había un hombre rico[a], que se vestía de púrpura y de lino fino, celebrando banquetes espléndidamente todos los días.
  rationale: Se ajustó el inicio a 'Ahora bien' para reflejar con naturalidad la transición narrativa de δέ. Se cambió 'y se vestía' por 'que se vestía' para mejorar el flujo sintáctico en español. Se reemplazó 'banqueteando espléndidamente' por 'celebrando banquetes espléndidamente', que preserva la decisión contextual de 'feasting' pero suena más idiomático y claro. Se corrigió la nota al pie para que ofrezca una alternativa real y coherente con la evidencia léxica inglesa y griega.
