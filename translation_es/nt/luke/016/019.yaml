translation:
  language: es
  text: Ahora bien, había un hombre rico[a], que se vestía de púrpura y de lino fino, celebrando banquetes espléndidamente todos los días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'festejando suntuosamente todos los días'. El participio εὐφραινόμενος puede sugerir disfrute festivo o banquete, y λαμπρῶς puede enfatizar esplendor lujoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνθρωπος δέ τις
  english_pob_choice: Now there was a certain ... man
  chosen_spanish: Ahora había un hombre cierto
  alternatives_spanish:
  - Había un hombre cierto
  - Y había un hombre cierto
  lexicon: BDAG
  rationale: ἄνθρωπος con τις introduce a un individuo indefinido, y δέ marca transición narrativa. En español, 'Había un hombre...' preserva la presentación idiomática; 'Ahora' refleja el valor discursivo de δέ sin sobrecargar. Se evitó 'cierto' como adjetivo pospuesto al sustantivo en la forma final por fluidez, pero se mantiene la indefinición con 'un hombre rico'.
- source_word: πλούσιος
  english_pob_choice: rich
  chosen_spanish: rico
  alternatives_spanish:
  - adinerado
  - pudiente
  lexicon: BDAG
  rationale: El adjetivo señala riqueza material. 'Rico' es la equivalencia más directa y natural en español narrativo.
- source_word: ἐνεδιδύσκετο
  english_pob_choice: used to dress
  chosen_spanish: se vestía
  alternatives_spanish:
  - se revestía
  - andaba vestido
  lexicon: BDAG
  rationale: El imperfecto medio indica acción habitual en el pasado. 'Se vestía' comunica bien ese uso habitual sin sonar forzado en español; la idea de hábito está reforzada por el contexto de lujo continuo.
- source_word: πορφύραν
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - telas de púrpura
  - vestiduras púrpuras
  lexicon: BDAG
  rationale: El sustantivo puede funcionar metonímicamente por ropa teñida de púrpura. 'Púrpura' conserva la referencia cultural y el color/luxo asociado, y en español funciona de forma más sobria que una expansión explicativa.
- source_word: βύσσον
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - lino costoso
  lexicon: BDAG
  rationale: βύσσος designa lino de alta calidad. 'Lino fino' transmite tanto la materia como su valor prestigioso.
- source_word: εὐφραινόμενος
  english_pob_choice: feasting
  chosen_spanish: banqueteando
  alternatives_spanish:
  - regocijándose
  - haciendo fiesta
  lexicon: BDAG
  rationale: La revisión inglesa prefirió 'feasting' para reflejar mejor el matiz contextual de vida lujosa. En español, 'banqueteando' conserva ese sentido de celebración con comida y lujo sin añadir más de lo necesario. Se deja abierta la amplitud semántica de 'alegrarse/disfrutar' inherente al verbo.
- source_word: καθ’ ἡμέραν
  english_pob_choice: every day
  chosen_spanish: todos los días
  alternatives_spanish:
  - cada día
  - diariamente
  lexicon: BDAG
  rationale: Es un modismo de recurrencia diaria. 'Todos los días' es claro, natural y plenamente idiomático en español.
- source_word: λαμπρῶς
  english_pob_choice: splendidly
  chosen_spanish: espléndidamente
  alternatives_spanish:
  - magníficamente
  - con lujo
  lexicon: BDAG
  rationale: El adverbio comunica esplendor y, en contexto, lujo ostentoso. 'Espléndidamente' conserva el vínculo semántico con el brillo/splendor y suena digno en español.
theological_decisions:
- issue: Cómo representar εὐφραινόμενος sin borrar el matiz de vida festiva lujosa ni forzar una lectura exclusivamente emocional
  english_pob_reading: The participle can suggest festive enjoyment or feasting; the revised English chose 'feasting splendidly every day.'
  chosen_spanish_reading: banqueteando espléndidamente todos los días
  alternative_spanish_readings:
  - regocijándose espléndidamente todos los días
  - haciendo fiesta espléndidamente todos los días
  rationale: El contexto de lujo continuo favorece un matiz de banquete/banqueteo más que solo alegría interior. 'Banqueteando' mantiene esa tensión semántica sin convertir el verbo en una paráfrasis excesiva. No se elimina la posibilidad de disfrute festivo; simplemente se expresa con la concreción que el contexto exige.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que cambió 'rejoicing splendidly' por 'feasting splendidly' para reflejar mejor εὐφραινόμενος en contexto de vida lujosa. La redacción española sigue esa decisión y evita una traducción que reduzca el matiz a mera alegría interior.
  spanish_consistency_notes:
  - Se mantiene 'púrpura' para el tinte/lujo cultural, no 'morado', por fidelidad al marcador social del texto.
  - '''Lino fino'' conserva el valor de material de alta calidad sin sobreexplicar.'
  - '''Banqueteando espléndidamente'' responde al ajuste revisionado del POB inglés y evita debilitar el contexto de opulencia.'
  - La puntuación y el orden verbal se adaptan a un español natural, pero sin suavizar la carga de ostentación del pasaje.
