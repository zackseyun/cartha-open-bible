revisions:
- from: 'Él también estaba hablando a los discípulos[a]: «Había un hombre rico que tenía un administrador[b], y este hombre fue acusado ante él de derrochar sus bienes».'
  to: 'También les decía a los discípulos: «Había un hombre rico que tenía un administrador[a], y este hombre fue acusado ante él[b] de derrochar sus bienes».'
  rationale: Se reemplaza «Él también estaba hablando» por «También les decía» para reflejar mejor el imperfecto narrativo de Ἔλεγεν en español natural. Se elimina la nota mal anclada sobre el imperfecto y se conserva la nota léxica necesaria para οἰκονόμος. Se añade una nota para διεβλήθη αὐτῷ, preservando el matiz documentado en la auditoría inglesa de acusación/informe adverso. El resto del verso se mantiene porque es fiel y claro.
