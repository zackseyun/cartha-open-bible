revisions:
- from: porque tengo cinco hermanos[a], para que él les dé testimonio solemne, a fin de que ellos tampoco vengan a este lugar de tormento.
  to: porque tengo cinco hermanos, para que él les advierta solemnemente[a], a fin de que ellos tampoco vengan a este lugar de tormento.
  rationale: Se revisa la cláusula con διαμαρτύρηται para que el texto principal refleje el valor contextual de advertencia solemne, en armonía con la cláusula siguiente sobre evitar venir a ese lugar. La alternativa de «dar testimonio» se conserva en nota para mantener la amplitud semántica documentada por la auditoría inglesa. No se requiere adjudicación adicional porque la corrección es clara, contextual y de bajo riesgo doctrinal.
