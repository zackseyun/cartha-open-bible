review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del griego: causal «porque tengo», parentesco masculino «cinco hermanos», propósito de advertencia y destino «a este lugar de tormento». Sin embargo, la elección principal «les dé testimonio solemne» no refleja adecuadamente el sentido contextual de διαμαρτύρηται en este versículo, donde la cláusula final («para que no vengan») exige claramente el matiz de advertencia urgente más que el de simple testimonio. Además, la nota alternativa no está bien calibrada porque repite prácticamente la misma formulación del texto principal en vez de preservar como alternativa el matiz de «testificar».'
  spanish_quality_summary: El español es claro y legible, pero «dar testimonio solemne» suena algo rígido y menos natural en este contexto narrativo. «Advertirles solemnemente» o «darles una advertencia solemne» comunica mejor la fuerza del verbo y la intención del hablante. También conviene simplificar la doble finalidad consecutiva para que suene más idiomática en español sin perder el valor de ὅπως / ἵνα μή.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto en este versículo. «Hermanos» y «tormento» están bien alineados. El problema principal es léxico-contextual con διαμαρτύρομαι: aquí debe priorizarse «advertir solemnemente» sobre «dar testimonio solemne», manteniendo «dar testimonio» como alternativa en nota, tal como documenta la auditoría inglesa.'
  issues:
  - severity: high
    issue: La traducción principal de διαμαρτύρηται como «les dé testimonio solemne» no capta el sentido contextual dominante.
    rationale: 'El contexto inmediato es preventivo: Lázaro debe hablarles para que no terminen en ese lugar. En este marco, διαμαρτύρομαι funciona como advertir solemnemente, no meramente testificar.'
  - severity: medium
    issue: La nota léxica no preserva bien la alternativa secundaria.
    rationale: 'La nota ofrece «les dé testimonio», muy cercana al texto principal, y deja «les advierta solemnemente» como alternativa, cuando por el contexto debería ser al revés: advertencia en el texto, testimonio en la nota.'
  - severity: low
    issue: «A fin de que ellos tampoco vengan» es correcto pero algo pesado tras «para que».
    rationale: 'Una redacción más directa como «para que ellos también no vengan» sería peor; una mejor solución es mantener una sola secuencia fluida: «para que él les advierta solemnemente, para que no vengan ellos también...» o mejor «a fin de que no vengan ellos también...» tras ajustar la primera cláusula. El texto actual no es erróneo, solo menos natural.'
  revised_spanish_text: porque tengo cinco hermanos, para que él les advierta solemnemente[a], a fin de que ellos tampoco vengan a este lugar de tormento.
  revised_footnotes:
