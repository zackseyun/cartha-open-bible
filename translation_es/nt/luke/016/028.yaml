translation:
  language: es
  text: porque tengo cinco hermanos, para que él les advierta solemnemente[a], a fin de que ellos tampoco vengan a este lugar de tormento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les dé testimonio» o «les advierta con firmeza». El verbo griego puede expresar tanto dar testimonio solemnemente como dar una advertencia seria.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχω γὰρ
  english_pob_choice: for I have
  chosen_spanish: porque tengo
  alternatives_spanish:
  - pues tengo
  - porque poseo
  lexicon: BDAG
  rationale: γάρ introduce una explicación o motivación; en español, «porque» expresa de modo natural ese enlace causal-explicativo. ἔχω se conserva con el verbo común «tener», sin añadir matices de posesión más fuertes que el griego no exige aquí.
- source_word: πέντε ἀδελφούς
  english_pob_choice: five brothers
  chosen_spanish: cinco hermanos
  alternatives_spanish:
  - cinco hermanos míos
  - cinco varones hermanos
  lexicon: BDAG
  rationale: ἀδελφούς está en masculino plural y el contexto apunta a hermanos varones. «Hermanos» comunica de forma natural el parentesco masculino; añadir «míos» sería explicativo pero no necesario para el sentido.
- source_word: ὅπως διαμαρτύρηται αὐτοῖς
  english_pob_choice: so that he may solemnly warn them
  chosen_spanish: para que él les dé testimonio solemne
  alternatives_spanish:
  - para que él les advierta solemnemente
  - para que él les haga una advertencia solemne
  - para que él les testimonie solemnemente
  lexicon: BDAG
  rationale: διαμαρτύρομαι abarca dar testimonio con seriedad y también advertir con solemnidad. Opto por «les dé testimonio solemne» para mantener el componente de testimonio formal sin reducirlo solo a «advertir», ya que el POB inglés preserva esa tensión lexical.
- source_word: ἵνα μὴ καὶ αὐτοὶ ἔλθωσιν
  english_pob_choice: lest they too come
  chosen_spanish: a fin de que ellos tampoco vengan
  alternatives_spanish:
  - para que ellos tampoco vengan
  - no sea que ellos también vengan
  - a fin de que no vengan ellos también
  lexicon: BDAG
  rationale: ἵνα μή expresa propósito negativo. «A fin de que... tampoco» mantiene ese valor final y negativo con un registro sobrio; «no sea que» también sería posible, pero aquí «a fin de que» conserva mejor la estructura del griego.
- source_word: εἰς τὸν τόπον τοῦτον
  english_pob_choice: to this place
  chosen_spanish: a este lugar
  alternatives_spanish:
  - a este lugar mismo
  - a este sitio
  lexicon: BDAG
  rationale: εἰς señala dirección hacia un destino. «A este lugar» es natural en español y mantiene la referencia demostrativa de τοῦτον sin sobrecargarla.
- source_word: τῆς βασάνου
  english_pob_choice: of torment
  chosen_spanish: de tormento
  alternatives_spanish:
  - de angustia
  - de sufrimiento
  - de aflicción
  lexicon: BDAG
  rationale: βάσανος denota tormento intenso o aflicción dolorosa. «Tormento» conserva la fuerza del término y coincide con la elección auditada del POB inglés, sin introducir una categoría doctrinal más amplia que la del texto.
theological_decisions:
- issue: Descripción del lugar al que el hombre rico teme que vayan sus hermanos
  english_pob_reading: this place of torment
  chosen_spanish_reading: este lugar de tormento
  alternative_spanish_readings:
  - este lugar de angustia
  - este lugar de sufrimiento
  rationale: 'La traducción mantiene la descripción fenomenológica del texto: un lugar caracterizado por tormento. No se amplía ni se suaviza la expresión griega βάσανος, preservando la tensión teológica del relato sin sistematizar más allá de lo que el versículo afirma.'
  doctrine_reference: Preservar la tensión textual y no importar formulaciones doctrinales externas al versículo.
translation_notes:
  revision_awareness: La redacción sigue el último ajuste auditado del POB inglés, que prefirió una expresión final negativa natural para ἵνα μή. En español, esa relación se conserva con «a fin de que... tampoco», manteniendo el vínculo entre la advertencia y el resultado que se desea evitar.
  spanish_consistency_notes:
  - Se usa «tormento» para βάσανος, en consonancia con el POB inglés y con el valor intenso del término griego.
  - Se preserva el masculino plural «hermanos» para ἀδελφούς, evitando una neutralización innecesaria.
  - «Para que él les dé testimonio solemne» mantiene la ambivalencia de διαμαρτύρομαι entre testificar y advertir, que el aparato inglés dejó explícita en nota.
  - Se evita «SEÑOR» u otra sustitución no pertinente, ya que no hay aquí léxico del nombre divino.
  - 'La puntuación refleja las dos cláusulas de propósito del griego: una con ὅπως y otra con ἵνα μή.'
