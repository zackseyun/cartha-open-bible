    text: O «les dé testimonio» o «les advierta con firmeza». El verbo griego puede expresar tanto dar testimonio solemnemente como dar una advertencia seria.
    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula con διαμαρτύρηται para que el texto principal refleje el valor contextual de advertencia solemne, en armonía con la cláusula siguiente sobre evitar venir a ese lugar. La alternativa de «dar testimonio» se conserva en nota para mantener la amplitud semántica documentada por la auditoría inglesa. No se requiere adjudicación adicional porque la corrección es clara, contextual y de bajo riesgo doctrinal.
