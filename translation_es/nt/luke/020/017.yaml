revisions:
- from: 'Pero él los miró y dijo[a]: «¿Qué, pues, es esto que está escrito: “La piedra que rechazaron los constructores, esta ha llegado a ser la cabeza del ángulo”?»'
  to: 'Pero él los miró y dijo[a]: «¿Qué, pues, es esto que está escrito: “La piedra que rechazaron los constructores, esta piedra ha llegado a ser la cabeza del ángulo”?»'
  rationale: 'Se ajusta el demostrativo para reflejar con mayor claridad y naturalidad el énfasis de οὗτος en español: «esta piedra ha llegado a ser…». Se conserva la formulación formal «la cabeza del ángulo» y su nota alternativa. No se requiere adjudicación adicional, porque la corrección es estilística y gramatical, no doctrinal.'
