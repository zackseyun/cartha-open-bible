review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: ἐμβλέψας αὐτοῖς = «los miró»; Τί οὖν ἐστιν τὸ γεγραμμένον τοῦτο = «¿Qué, pues, es esto que está escrito…?»; la cita del Salmo conserva «la piedra», «rechazaron» y la imagen formal de κεφαλὴ γωνίας. Sin embargo, hay dos puntos a corregir: (1) el demostrativo οὗτος es masculino y retoma «λίθον / piedra», por lo que en español debe ser «esta piedra» o «esta», no «esta ha llegado…» sin sustantivo claro; (2) la nota teológica mezcla español e inglés con «la capstone», lo que muestra una inconsistencia terminológica. Además, en español bíblico natural «los que construían» o «los edificadores» se acerca mejor al matiz de «builders» que «constructores», aunque este último no es incorrecto.'
  spanish_quality_summary: El texto es legible y digno, pero «esta ha llegado a ser» suena algo forzado por el demostrativo femenino sin sustantivo explícito tras una pausa larga. «Esta piedra ha llegado a ser…» fluye mejor y preserva el énfasis. La expresión «la cabeza del ángulo» es aceptable como calco formal y coincide con la decisión POB, apoyada por la nota. La puntuación general y el registro son buenos.
  glossary_alignment: 'No hay términos del glosario mayor en conflicto. La principal cuestión léxica es mantener la transparencia de κεφαλὴ γωνίας como «la cabeza del ángulo» con nota alternativa, lo cual debe conservarse. La nota debe usar español consistente: «la piedra angular» y «la piedra de remate».'
  issues:
  - severity: medium
    issue: Demostrativo enfático mal realizado en español
    rationale: οὗτος retoma enfáticamente «la piedra». En español, «esta ha llegado a ser…» sin repetir el sustantivo queda menos natural y puede sentirse abrupto. «Esta piedra ha llegado a ser…» preserva mejor la referencia y el énfasis.
  - severity: low
    issue: Inconsistencia de idioma en decisión teológica
    rationale: La alternativa «la capstone» quedó en inglés dentro del material español. Debe normalizarse como «la piedra de remate», en línea con la nota al pie.
  - severity: low
    issue: Elección de «constructores» algo menos idiomática para la cita
    rationale: «Los constructores» comunica bien el sentido, pero en una cita escrituraria «los que construían» o «los edificadores» puede sonar más natural. No es un error grave; puede mantenerse o ajustarse por estilo.
  revised_spanish_text: 'Pero él los miró y dijo[a]: «¿Qué, pues, es esto que está escrito: “La piedra que rechazaron los constructores, esta piedra ha llegado a ser la cabeza del ángulo”?»'
  revised_footnotes:
  - marker: a
    text: 'O «la piedra angular»; también, «la piedra de remate». El griego dice literalmente: «la cabeza del ángulo».'
    reason: alternative_reading
  revision_rationale: 'Se ajusta el demostrativo para reflejar con mayor claridad y naturalidad el énfasis de οὗτος en español: «esta piedra ha llegado a ser…». Se conserva la formulación formal «la cabeza del ángulo» y su nota alternativa. No se requiere adjudicación adicional, porque la corrección es estilística y gramatical, no doctrinal.'
