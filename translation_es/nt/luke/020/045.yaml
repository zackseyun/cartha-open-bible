translation:
  language: es
  text: 'Y mientras todo el pueblo[a] estaba escuchando, dijo a los discípulos:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando todo el pueblo escuchaba, dijo a los discípulos». El griego usa un genitivo absoluto para indicar la circunstancia en que habló.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούοντος
  english_pob_choice: while ... were listening
  chosen_spanish: Y mientras ... escuchaba
  alternatives_spanish:
  - As all ... listened
  - con ... escuchando
  - mientras ... oía
  lexicon: BDAG
  rationale: El participio presente en genitivo absoluto expresa acción contemporánea con valor circunstancial. «Mientras ... escuchaba» reproduce bien ese trasfondo progresivo en español sin volverlo mecánico ni perder la escena pública.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  - ', y'
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector narrativo leve. «Y» mantiene la continuidad del relato sin imponer contraste fuerte.
- source_word: παντὸς τοῦ λαοῦ
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - toda la gente
  - el pueblo entero
  lexicon: BDAG
  rationale: πᾶς + λαός denota al pueblo en su conjunto. «Todo el pueblo» conserva el sentido colectivo y es más natural en español bíblico que una calca más pesada.
- source_word: λαοῦ
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - muchedumbre
  - pueblo (comunidad)
  lexicon: BDAG
  rationale: En Lucas, λαός suele referirse al pueblo como comunidad y no solo a una multitud. «Pueblo» conserva mejor ese alcance comunitario que «gente» o «muchedumbre».
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - les dijo
  - habló
  lexicon: BDAG
  rationale: El aoristo de λέγω se vierte naturalmente con «dijo». En español, el sujeto ya queda claro por el contexto narrativo.
- source_word: τοῖς μαθηταῖς
  english_pob_choice: to the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - a sus discípulos
  - a los aprendices
  lexicon: BDAG
  rationale: μαθηταῖς se traduce con el término estable «discípulos». No se añade «sus» porque no está explícito en el griego y la audiencia ya está delimitada por el dativo.
theological_decisions:
- issue: 'Doble encuadre de la escena: público y destinatarios directos'
  english_pob_reading: Jesus addresses the disciples in the hearing of all the people.
  chosen_spanish_reading: Jesús habla a los discípulos mientras todo el pueblo escucha.
  alternative_spanish_readings:
  - Jesús se dirige directamente a todo el pueblo
  - Jesús habla en privado a los discípulos, aparte del pueblo
  rationale: El genitivo absoluto marca la circunstancia pública del habla, mientras el dativo identifica a los destinatarios directos. La traducción conserva ambos elementos sin fusionarlos ni resolver la tensión narrativa.
  doctrine_reference: Preservar la tensión textual y la distinción de audiencias del relato.
translation_notes:
  revision_awareness: El texto y las decisiones coinciden con el último pase de revisión, que no introdujo cambios y mantuvo alto acuerdo entre revisores. No se requieren ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «pueblo» para λαός en coherencia con el uso comunitario de Lucas.
  - Se mantiene «discípulos» para μαθηταί como término técnico estable del evangelio.
  - La puntuación con dos puntos reproduce la apertura de discurso del original y de la base inglesa.
