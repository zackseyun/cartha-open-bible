translation:
  language: es
  text: 'Entonces el dueño[a] de la viña dijo: «¿Qué haré? Enviaré a mi hijo amado[b]; quizá le mostrarán respeto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el señor de la viña».
    reason: lexical_alternative
  - marker: b
    text: «Mostrarán respeto» traduce un verbo que también puede significar «avergonzarse ante» o «mostrar deferencia a».
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: owner
  chosen_spanish: dueño
  alternatives_spanish:
  - señor
  - amo
  lexicon: BDAG
  rationale: En la parábola, el sintagma τοῦ ἀμπελῶνος especifica posesión sobre la viña, así que «dueño» comunica mejor el referente narrativo que «señor», que en español podría sonar como título reverencial. Se preserva así el sentido contextual sin forzar una lectura cristológica en el nivel de la historia.
- source_word: ἀμπελῶνος
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  lexicon: BDAG
  rationale: «Viña» es la forma natural y bíblicamente clara en español para ἀμπελών en este contexto agrícola. «Viñedo» es posible, pero aquí suena menos directo y más técnico.
- source_word: Τί ποιήσω;
  english_pob_choice: What shall I do?
  chosen_spanish: ¿Qué haré?
  alternatives_spanish:
  - ¿Qué he de hacer?
  - ¿Qué debo hacer?
  lexicon: BDAG
  rationale: El aoristo deliberativo expresa una decisión planteada como auto-pregunta. En español, «¿Qué haré?» conserva bien esa deliberación y mantiene un registro natural y digno.
- source_word: πέμψω
  english_pob_choice: I will send
  chosen_spanish: Enviaré
  alternatives_spanish:
  - Mandaré
  - Voy a enviar
  lexicon: BDAG
  rationale: El futuro indicativo expresa una acción resuelta. «Enviaré» es la equivalencia más directa y sobria; «mandaré» podría sugerir una orden más que el acto de enviar.
- source_word: υἱόν
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - muchacho
  - descendiente
  lexicon: BDAG
  rationale: υἱός designa específicamente a un hijo varón. «Hijo» es la traducción correcta y transparente.
- source_word: ἀγαπητόν
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - querido
  - amado entrañable
  lexicon: BDAG
  rationale: «Amado» reproduce la fuerza afectiva de ἀγαπητός y mantiene mejor que «querido» la resonancia bíblica de la expresión. En español, «mi hijo amado» suena natural y conserva el posible eco de lenguaje divino-hijo.
- source_word: ἴσως
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - acaso
  lexicon: BDAG
  rationale: «Quizá» expresa la misma expectativa no segura que ἴσως, con un tono sobrio y contemporáneo.
- source_word: τοῦτον
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a este
  lexicon: BDAG
  rationale: Aunque τοῦτον es un demostrativo enfático, el español idiomático prefiere el objeto indirecto «le» tras «mostrar respeto». La deixis se conserva por el contexto inmediato y por la mención explícita del hijo.
- source_word: ἐντραπήσονται
  english_pob_choice: they will respect
  chosen_spanish: mostrarán respeto
  alternatives_spanish:
  - se avergonzarán ante él
  - le tendrán reverencia
  lexicon: BDAG
  rationale: El verbo puede significar mostrar deferencia, avergonzarse ante alguien o respetarlo. En este contexto, la lectura de respeto/deferencia es la que mejor encaja con la intención del propietario y con la elección inglesa auditada. «Mostrarán respeto» conserva esa ambigüedad secundaria sin volverla pesada.
theological_decisions:
- issue: Valor de κύριος en una parábola con posible referencia tipológica a Dios
  english_pob_reading: owner
  chosen_spanish_reading: dueño
  alternative_spanish_readings:
  - señor de la viña
  - amo de la viña
  rationale: 'La escena funciona primero como relato parabólico: un propietario de viña. Traducir κύριος como «dueño» respeta el nivel narrativo y evita introducir de entrada un título teológico donde el texto inmediato describe posesión. La posible tipología queda disponible para el lector sin ser impuesta por la traducción.'
  doctrine_reference: Translation philosophy §5; Contested terms table for κύριος
- issue: Resonancia del «hijo amado» con el lenguaje de filiación divina en Lucas
  english_pob_reading: my beloved son
  chosen_spanish_reading: mi hijo amado
  alternative_spanish_readings:
  - mi amado hijo
  - mi hijo, el amado
  rationale: La frase conserva tanto la relación filial como el matiz afectivo y la posible alusión a escenas previas de Lucas. No se expande interpretativamente, pero sí se mantiene el eco cristológico que el griego puede sugerir.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios respecto del texto auditado en inglés; se ha preservado el sentido narrativo y la ambigüedad léxica relevante en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se usa «hijo amado» para conservar la resonancia bíblica de ἀγαπητός.
  - Se evita «Señor» en el cuerpo principal porque el contexto parabólico pide un referente posesivo, no un título devocional.
  - Se usa «mostrarán respeto» como equivalente natural de ἐντραπήσονται en este contexto, sin eliminar la alternativa semántica de vergüenza/deferencia.
