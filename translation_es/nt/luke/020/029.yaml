revisions:
- from: Ahora había siete hermanos; y el primero[a], habiendo tomado esposa, murió sin hijos.
  to: Pues había siete hermanos; y el primero, después de casarse[a], murió sin hijos.
  rationale: Se ajusta οὖν a un conector narrativo más natural en español («Pues»), y se reemplaza el calco «habiendo tomado esposa» por una expresión idiomática fluida en el texto principal, preservando la literalidad griega en la nota al pie. También se mejora ligeramente la puntuación para la lectura.
