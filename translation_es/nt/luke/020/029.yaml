translation:
  language: es
  text: Pues había siete hermanos; y el primero, después de casarse[a], murió sin hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiéndose casado». El griego dice literalmente «habiendo tomado esposa», un modismo para expresar el matrimonio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑπτὰ
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - siete en número
  lexicon: BDAG
  rationale: Es el cardinal directo y natural en español para modificar a «hermanos».
- source_word: οὖν
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Entonces
  - Pues
  lexicon: BDAG
  rationale: Marca continuidad narrativa; «Ahora» da un flujo natural en español sin cargar demasiado la inferencia lógica.
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos varones
  - hermanos varones de sangre
  lexicon: BDAG
  rationale: El plural masculino en este contexto señala a hermanos varones; «hermanos» es idiomático y preciso en español.
- source_word: ὁ πρῶτος
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el primer hermano
  - el primero de ellos
  lexicon: BDAG
  rationale: Conserva la referencia ordinal al primero en la secuencia, sin añadir la idea de ser el mayor de edad.
- source_word: λαβὼν γυναῖκα
  english_pob_choice: having taken a wife
  chosen_spanish: habiendo tomado esposa
  alternatives_spanish:
  - habiéndose casado
  - después de tomar esposa
  lexicon: BDAG
  rationale: La construcción participial y la expresión idiomática se conservan con un giro español natural y suficientemente formal; «esposa» refleja el valor marital de γυναῖκα en este contexto.
- source_word: γυναῖκα
  english_pob_choice: a wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - una esposa
  lexicon: BDAG
  rationale: En contexto matrimonial, el sentido es «wife»; «esposa» evita la ambigüedad de «mujer» y suena claro en español.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: BDAG
  rationale: Verbo directo y sin suavización, acorde con el aoristo narrativo.
- source_word: ἄτεκνος
  english_pob_choice: childless
  chosen_spanish: sin hijos
  alternatives_spanish:
  - estéril
  - sin descendencia
  lexicon: BDAG
  rationale: «Sin hijos» comunica con claridad el dato narrativo. Se evita «estéril» porque puede sugerir una condición médica no afirmada por el texto.
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa de auditoría coinciden ampliamente; se mantuvo la estructura narrativa simple y la expresión idiomática «tomó esposa»/«habiendo tomado esposa», con una opción española clara y fiel. No se observan revisiones sustantivas en el registro auditado.
  spanish_consistency_notes:
  - Se usa «siete» y «hermanos» de forma directa, en paralelo con la lectura auditada en inglés.
  - Se preserva el participio con «habiendo tomado esposa» para reflejar la forma griega sin reescritura explicativa en el cuerpo del texto.
  - «Sin hijos» conserva el valor narrativo de ἄτεκνος con naturalidad en español.
  - La nota al pie marca la alternativa idiomática de matrimonio, como en el registro inglés.
