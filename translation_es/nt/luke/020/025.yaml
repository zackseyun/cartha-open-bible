review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: «Pero él les dijo … Entonces … al César … y a Dios …». Preserva el paralelismo entre César y Dios, y no reduce el dicho solo a impuestos. Sin embargo, la elección principal «den» debilita el matiz léxico de ἀπόδοτε, que según el expediente inglés debe conservar la idea de devolver/entregar lo debido. En español, puede expresarse de forma más fiel sin perder naturalidad.'
  spanish_quality_summary: El español es claro, natural y digno. No obstante, «den al César las cosas que son del César» suena algo plano frente al peso semántico del verbo griego. Además, la nota con «rindan» no es la mejor alternativa en español bíblico actual; «paguen» o «entreguen» sería más clara, pero la mejor solución es ajustar el texto principal a «devuelvan».
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: θεός se traduce correctamente como «Dios», y «César» mantiene bien Καῖσαρ. El problema principal no es glosarial sino léxico: ἀπόδοτε debe reflejar mejor la noción de dar de vuelta o pagar lo debido.'
  issues:
  - severity: medium
    issue: El verbo principal «den» subrepresenta el matiz de ἀπόδοτε.
    rationale: El expediente inglés eligió «give back» precisamente para preservar la noción de devolver o dar lo debido. «Den» es comprensible, pero pierde esa fuerza distintiva que sí puede conservarse naturalmente en español con «devuelvan».
  - severity: low
    issue: La nota léxica incluye «rindan», que en este contexto suena menos natural en español actual.
    rationale: Aunque «render» funciona en inglés como opción tradicional, «rendir» no es aquí la correspondencia española más clara para lectores generales. Conviene simplificar la nota y alinearla mejor con usos naturales como «entregar» o «pagar».
  revised_spanish_text: 'Pero él les dijo: «Entonces devuelvan[a] al César las cosas que son del César, y a Dios las cosas que son de Dios».'
  revised_footnotes:
  - marker: a
    text: O «den» o «paguen». El verbo puede significar dar, pagar o devolver lo debido.
    reason: lexical_alternative
  revision_rationale: Se revisa solo el verbo principal para reflejar mejor el valor de ἀπόδοτε según la evidencia griega y el expediente inglés. «Devuelvan» conserva la idea de dar lo que corresponde o se debe, sin limitar la frase a impuestos ni volverla arcaica. La nota se ajusta para mantener alternativas léxicas más naturales en español.
