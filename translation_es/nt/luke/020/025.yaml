revisions:
- from: 'Pero él les dijo: «Entonces den[a] al César las cosas que son del César, y a Dios las cosas que son de Dios».'
  to: 'Pero él les dijo: «Entonces devuelvan[a] al César las cosas que son del César, y a Dios las cosas que son de Dios».'
  rationale: Se revisa solo el verbo principal para reflejar mejor el valor de ἀπόδοτε según la evidencia griega y el expediente inglés. «Devuelvan» conserva la idea de dar lo que corresponde o se debe, sin limitar la frase a impuestos ni volverla arcaica. La nota se ajusta para mantener alternativas léxicas más naturales en español.
