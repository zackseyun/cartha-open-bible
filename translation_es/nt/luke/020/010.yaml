translation:
  language: es
  text: Y a su debido tiempo envió a un esclavo[a] a los viñadores, para que le dieran algo del fruto de la viña. Pero los viñadores, después de golpearlo, lo enviaron de vuelta con las manos vacías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esclavo» preserva la fuerza de δοῦλον. «Siervo» es una alternativa posible, pero suaviza el estado de dependencia que el término puede expresar en este contexto.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «lo enviaron vacío»; es decir, sin darle nada del fruto de la viña.
    reason: lexical_alternative
lexical_decisions:
- source_word: καιρῷ
  english_pob_choice: at the proper time
  chosen_spanish: en su debido tiempo
  alternatives_spanish:
  - a su debido tiempo
  - en el tiempo oportuno
  - en el momento apropiado
  lexicon: BDAG
  rationale: El dativo de tiempo con καιρός señala un tiempo adecuado o fijado. «En su debido tiempo» conserva la idea de oportunidad/tiempo designado sin añadir explícitamente «cosecha», que no está en el griego.
- source_word: ἀπέστειλεν
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió afuera
  lexicon: BDAG
  rationale: El aoristo simple de ἀποστέλλω se expresa con el verbo normal «enviar». «Mandó» sería posible, pero «envió» es más directo y mantiene la neutralidad del envío.
- source_word: γεωργούς
  english_pob_choice: vine-growers
  chosen_spanish: viñadores
  alternatives_spanish:
  - labradores de la viña
  - agricultores
  - arrendatarios
  lexicon: BDAG
  rationale: En el contexto de una viña, «viñadores» comunica la ocupación con naturalidad en español y conserva la especificidad agrícola. «Arrendatarios» introduce una relación legal no explícita en la palabra misma.
- source_word: δοῦλον
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  - sirviente
  lexicon: BDAG
  rationale: Se conserva la fuerza social de δοῦλος. La POB inglesa eligió «slave» para no suavizar el término; «esclavo» traslada esa misma dureza en español y evita una lectura domesticada.
- source_word: ἵνα ... δώσουσιν αὐτῷ
  english_pob_choice: so that they would give him
  chosen_spanish: para que le dieran
  alternatives_spanish:
  - a fin de que le dieran
  - para que le diesen
  - con el fin de que le dieran
  lexicon: BDAG
  rationale: ἵνα con futuro indicativo aquí expresa propósito. «Para que le dieran» es natural en español y conserva la finalidad sin sobretraducir el matiz modal.
- source_word: ἀπὸ τοῦ καρποῦ τοῦ ἀμπελῶνος
  english_pob_choice: some of the fruit of the vineyard
  chosen_spanish: de del fruto de la viña
  alternatives_spanish:
  - del fruto de la viña
  - una parte del fruto de la viña
  - algo del fruto de la viña
  lexicon: BDAG
  rationale: El griego expresa una porción tomada del fruto mediante ἀπό. Se intenta preservar ese valor partitivo con una construcción que refleje «some of the fruit», aunque en español el encadenamiento exige ajuste estilístico. Se mantiene «fruto» y «viña» para no especificar más allá del texto.
- source_word: ἐξαπέστειλαν
  english_pob_choice: sent him away
  chosen_spanish: lo despidieron
  alternatives_spanish:
  - lo echaron
  - lo mandaron fuera
  - lo hicieron salir
  lexicon: BDAG
  rationale: El compuesto ἐξαποστέλλω añade la idea de enviar fuera/alejar. «Lo despidieron» funciona en español como «lo mandaron fuera» o «lo echaron», pero con un registro más fluido; la idea de alejamiento se mantiene en el contexto inmediato.
- source_word: δείραντες
  english_pob_choice: after beating him
  chosen_spanish: después de golpearlo
  alternatives_spanish:
  - tras azotarlo
  - habiéndolo golpeado
  - después de pegarle
  lexicon: BDAG
  rationale: El participio aoristo de δέρω indica golpear/azotar. «Después de golpearlo» conserva el acto físico sin forzar el sentido a «azotar», que sería más específico de lo que exige el término.
- source_word: κενόν
  english_pob_choice: empty
  chosen_spanish: vacío
  alternatives_spanish:
  - sin nada
  - empty-handed (en nota)
  - vacío de manos
  lexicon: BDAG
  rationale: En contexto significa que volvió sin obtener nada. «Vacío» reproduce el núcleo léxico de κενός y deja visible la ironía del envío sin fruto recibido. Aunque «vacío» suena algo abstracto, la frase completa aclara el sentido.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con la traducción inglesa POB y no registra revisiones aplicadas. Esta versión sigue la misma lectura principal, manteniendo el valor social de δοῦλος, el matiz partitivo de ἀπό y el cierre narrativo de κενόν sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; en este versículo no aparece.
  - Se conserva «esclavo» para δοῦλος, coherente con la decisión POB de no suavizar el término.
  - «Viñadores» se usa como equivalente natural de γεωργοί en el contexto de una viña, sin añadir la noción legal de arrendamiento.
  - «Vacío» traduce κενόν de forma directa; la explicación del sentido se reserva para la nota.
  - La construcción partitiva en español requiere adaptación; por eso se explicita en nota la relación con «del fruto de la viña» sin alterar el contenido.
