  text: ⸀καὶ καιρῷ ἀπέστειλεν πρὸς τοὺς γεωργοὺς δοῦλον, ἵνα ἀπὸ τοῦ καρποῦ τοῦ ἀμπελῶνος ⸀δώσουσιν αὐτῷ· οἱ δὲ γεωργοὶ ⸂ἐξαπέστειλαν αὐτὸν δείραντες⸃ κενόν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/020/010.yaml
  text: And at the proper time he sent a slave to the vine-growers[a], so that they would give him some of the fruit of the vineyard[b]. But the vine-growers sent him away empty after beating him.
  footnotes:
  - marker: a
    text: Or 'servant' for 'slave' (δοῦλον); the Greek term can denote either, but 'slave' better preserves the bonded status in this context.
    reason: alternative_reading
  - marker: b
    text: Literally 'sent him away empty'; that is, without giving him any of the vineyard's fruit.
    reason: lexical_alternative
