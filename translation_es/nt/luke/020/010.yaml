review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del griego: tiempo apropiado, envío de un δοῦλος a los γεωργοί, propósito de recibir parte del fruto, y rechazo violento del mensajero. Sin embargo, falla en dos puntos clave de fidelidad formal y semántica: «de[b] del fruto» es una construcción defectuosa e infiel al español natural para el partitivo de ἀπὸ τοῦ καρποῦ, y «lo despidieron ... vacío» no comunica bien el sentido conjunto de ἐξαπέστειλαν ... κενόν, que en contexto es «lo enviaron de vuelta/sent away empty», no un simple despido laboral ni un adjetivo suelto aplicado de manera torpe.'
  spanish_quality_summary: 'La redacción actual tiene tropiezos importantes de naturalidad y corrección: «de del fruto» es incorrecto, y «vacío» al final suena forzado e impropio en español. El resto es claro y de registro adecuado. Una revisión menor resuelve los problemas y mantiene un español moderno, digno y legible.'
  glossary_alignment: Buena alineación con la terminología del proyecto en «esclavo» para δοῦλον y en general con el enfoque léxico. «Viñadores» es aceptable para γεωργοί en este contexto. No hay conflictos teológicos. Conviene ajustar ἐξαπέστειλαν a una expresión más transparente como «lo enviaron de vuelta» o «lo mandaron lejos», y expresar κενόν idiomáticamente como «con las manos vacías» o mediante nota.
  issues:
  - severity: high
    issue: La frase «de[b] del fruto de la viña» es gramaticalmente defectuosa.
    rationale: No es español natural ni correcto. El partitivo de ἀπό debe verterse como «algo del fruto», «parte del fruto» o similar.
  - severity: medium
    issue: «Lo despidieron» debilita y desvía el sentido de ἐξαπέστειλαν.
    rationale: El griego expresa enviar fuera/alejar; «despedir» en español puede sonar a terminación de empleo o a salida cortés, menos adecuado al contexto violento.
  - severity: medium
    issue: «Vacío» como remate final no comunica bien κενόν en español.
    rationale: Aunque literalmente cercano, en español queda torpe. En contexto significa que lo enviaron sin darle nada; «con las manos vacías» o una formulación equivalente comunica fielmente el sentido.
  revised_spanish_text: Y a su debido tiempo envió a un esclavo[a] a los viñadores, para que le dieran algo del fruto de la viña. Pero los viñadores, después de golpearlo, lo enviaron de vuelta con las manos vacías[b].
  revised_footnotes:
  - marker: a
    text: «Esclavo» preserva la fuerza de δοῦλον. «Siervo» es una alternativa posible, pero suaviza el estado de dependencia que el término puede expresar en este contexto.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «lo enviaron vacío»; es decir, sin darle nada del fruto de la viña.
    reason: lexical_alternative
  revision_rationale: La revisión corrige un error gramatical, restituye el sentido partitivo de ἀπὸ τοῦ καρποῦ con español natural («algo del fruto»), y expresa de manera idiomática y fiel el conjunto ἐξαπέστειλαν ... κενόν («lo enviaron de vuelta con las manos vacías»), preservando además la alternativa literal en nota. Se mantiene «esclavo» conforme a la política léxica de POB.
