revisions:
- from: Y en su debido tiempo envió a un esclavo[a] a los viñadores, para que le dieran de[b] del fruto de la viña. Pero los viñadores lo despidieron, después de golpearlo, vacío.
  to: Y a su debido tiempo envió a un esclavo[a] a los viñadores, para que le dieran algo del fruto de la viña. Pero los viñadores, después de golpearlo, lo enviaron de vuelta con las manos vacías[b].
  rationale: La revisión corrige un error gramatical, restituye el sentido partitivo de ἀπὸ τοῦ καρποῦ con español natural («algo del fruto»), y expresa de manera idiomática y fiel el conjunto ἐξαπέστειλαν ... κενόν («lo enviaron de vuelta con las manos vacías»), preservando además la alternativa literal en nota. Se mantiene «esclavo» conforme a la política léxica de POB.
