lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - también
  lexicon: BDAG
  rationale: Conserva la simple conjunción coordinante del griego. En una enumeración narrativa, «y» es la opción natural en español y refleja el enlace continuativo sin añadir matiz.
- source_word: ὁ δεύτερος
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el segundo hermano
  - el segundo uno
  lexicon: BDAG
  rationale: El artículo con el ordinal funciona sustantivamente, de modo que el griego dice literalmente «el segundo». En español, «el segundo» conserva la elipsis; «el segundo hermano» explicita lo implícito pero introduce un sustantivo que no está en el texto griego.
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no requiere revisión: la lectura aprobada mantiene la elipsis del griego y solo aclara en nota que la referencia contextual es al segundo hermano.'
  spanish_consistency_notes:
  - Se mantiene el pronombre/ordinal sustantivado «el segundo» para respetar la elipsis del texto fuente.
  - La conjunción «y» reproduce el valor coordinante básico de καὶ sin sobreinterpretación.
  - 'La nota explicativa conserva la misma tensión documentada en el inglés: el griego no menciona explícitamente «hermano», aunque el contexto lo sugiere.'
