  rationale: 'Se ajusta el texto para reflejar mejor el griego y el audit trail: «Y sucedió» mantiene la transición narrativa lucana con español más natural; «junto con los ancianos» preserva el valor de σύν; y la nota cultural se reancla correctamente a «templo», que es el término que explica.'
