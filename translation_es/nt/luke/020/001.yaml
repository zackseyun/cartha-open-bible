translation:
  language: es
  text: Y sucedió[a], en uno de aquellos días, mientras él enseñaba al pueblo en el templo[b] y anunciaba la buena noticia, que se acercaron los principales sacerdotes, los escribas, junto con los ancianos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «predicaba el evangelio».
    reason: lexical_alternative
  - marker: b
    text: ἱερόν se refiere al complejo del templo, no específicamente al santuario interior.
    reason: cultural_note
lexical_decisions:
- source_word: Καὶ ἐγένετο
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: BDAG
  rationale: La fórmula narrativa lucana se conserva con un giro natural en español. «Aconteció» mantiene el valor idiomático sin volver el texto arcaico; además corresponde bien al inicio de una nueva escena narrativa.
- source_word: ἐν μιᾷ τῶν ἡμερῶν
  english_pob_choice: on one of those days
  chosen_spanish: en uno de aquellos días
  alternatives_spanish:
  - un día
  - en uno de los días
  lexicon: BDAG
  rationale: La expresión partitiva se traduce de forma directa y natural. «Aquellos» preserva la referencia deíctica al tramo narrativo ya en curso, y evita simplificarla a un indefinido más débil.
- source_word: διδάσκοντος αὐτοῦ
  english_pob_choice: while he was teaching
  chosen_spanish: mientras él enseñaba
  alternatives_spanish:
  - mientras enseñaba
  - cuando él enseñaba
  lexicon: BDAG
  rationale: El genitivo absoluto se vierte como circunstancia simultánea. «Enseñaba» es la equivalencia normal de διδάσκω y conserva el aspecto progresivo del contexto.
- source_word: τὸν λαὸν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a las personas
  lexicon: BDAG
  rationale: Aquí λαός designa al pueblo en sentido colectivo, no solo a una multitud casual. «Al pueblo» conserva ese valor histórico y bíblico sin forzar una paraphrasis.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el recinto del templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo del templo, no al santuario interior. En el texto principal se mantiene la forma breve y natural «en el templo»; la nota aclara el alcance del término.
- source_word: εὐαγγελιζομένου
  english_pob_choice: proclaiming the good news
  chosen_spanish: anunciaba la buena noticia
  alternatives_spanish:
  - predicaba el evangelio
  - proclamaba la buena noticia
  lexicon: BDAG
  rationale: Se conserva el sentido verbal de εὐαγγελίζω sin imponer lenguaje eclesiástico. «Buena noticia» expresa el contenido del anuncio con claridad en español; «evangelio» sería posible, pero aquí la formulación comunicativa resulta más transparente.
- source_word: ἐπέστησαν
  english_pob_choice: came up to him
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se presentaron
  - se le acercaron
  lexicon: BDAG
  rationale: El verbo indica que llegaron y se hicieron presentes ante él; en español, «se acercaron» expresa bien el movimiento previo al intercambio que sigue, sin añadir una nota de hostilidad que el verbo por sí solo no exige.
- source_word: ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes sacerdotales
  lexicon: BDAG
  rationale: Aunque la tradición española usa con frecuencia «sumos sacerdotes», el plural griego en este contexto denota el grupo dirigente sacerdotal. «Principales sacerdotes» evita la impresión de varios sumos sacerdotes en sentido estricto y refleja mejor la función colectiva.
- source_word: γραμματεῖς
  english_pob_choice: the scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los doctores de la ley
  - los expertos en la ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente histórico más directo y transparente. Las paráfrasis funcionales son posibles, pero disminuyen la identificación del grupo en el relato.
- source_word: σὺν τοῖς πρεσβυτέροις
  english_pob_choice: together with the elders
  chosen_spanish: y los ancianos
  alternatives_spanish:
  - junto con los ancianos
  - con los ancianos
  lexicon: BDAG
  rationale: σύν marca acompañamiento; en español, la coordinación simple con «y» comunica de manera natural la coalición de los grupos líderes. «Ancianos» conserva la designación institucional sin necesidad de mayor explicación en el texto principal.
theological_decisions:
- issue: Rendering of εὐαγγελιζομένου in a narrative context
  english_pob_reading: proclaiming the good news
  chosen_spanish_reading: anunciaba la buena noticia
  alternative_spanish_readings:
  - predicaba el evangelio
  - proclamaba la buena noticia
  rationale: La escena describe la actividad pública de Jesús, no una terminología eclesiástica posterior. «Anunciaba la buena noticia» conserva el contenido de εὐαγγελίζω de modo claro y sobrio, sin introducir un registro más técnico del que exige el contexto.
  doctrine_reference: Translation philosophy §6 (lenguaje moderno, legible y fiel al sentido)
translation_notes:
  revision_awareness: El inglés POB mantiene un enfoque de equivalencia óptima con notas para εὐαγγελιζομένου e ἱερόν; el borrador español conserva esas dos decisiones y las adapta al español con equivalentes naturales. No se detectaron revisiones posteriores que alteren el sentido base, y el versículo permanece en alta concordancia con el audit trail inglés.
  spanish_consistency_notes:
  - Se usó «Y aconteció» para reproducir la transición narrativa lucana sin arcaísmo excesivo.
  - Se prefirió «principales sacerdotes» en lugar de «sumos sacerdotes» para respetar el plural y el valor colectivo del griego.
  - Se mantuvo «buena noticia» en lugar de «evangelio» en el cuerpo principal para conservar claridad semántica.
  - La puntuación final con coma responde a que el versículo continúa en la oración del siguiente versículo en la segmentación de la fuente.
