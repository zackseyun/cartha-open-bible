revisions:
- from: 'Pero ellos razonaron entre sí[a], diciendo: «Si decimos: “Del cielo”, él dirá: “¿Por qué no le creísteis?”»'
  to: 'Pero ellos razonaron entre sí, diciendo: «Si decimos: “Del cielo”, él dirá: “¿Por qué no le creyeron[a]?”»'
  rationale: Se cambia «creísteis» por «creyeron» para ajustarlo al español neutral latinoamericano sin alterar el sentido. Se traslada la nota al verbo «le creyeron» para preservar la alternativa léxica documentada para πιστεύω («confiar en él»), que es más relevante que la nota original sobre «razonaron entre sí». No se modifica «razonaron entre sí» porque, aunque algo rígido, sigue siendo fiel al matiz deliberativo de συνελογίσαντο y suficientemente natural.
