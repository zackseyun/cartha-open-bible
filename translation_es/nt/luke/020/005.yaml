translation:
  language: es
  text: 'Pero ellos razonaron entre sí, diciendo: «Si decimos: “Del cielo”, él dirá: “¿Por qué no le creyeron[a]?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Por qué no confiaron en él?». El verbo griego puede significar «creerle» o «confiar en» alguien, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνελογίσαντο
  english_pob_choice: reasoned
  chosen_spanish: razonaron
  alternatives_spanish:
  - consideraron
  - deliberaron
  - discutieron
  lexicon: BDAG
  rationale: El verbo expresa un proceso mental de cálculo o deliberación; «razonaron» conserva ese matiz cognitivo mejor que una simple conversación, y suena natural en español.
- source_word: πρὸς ἑαυτοὺς
  english_pob_choice: among themselves
  chosen_spanish: entre sí
  alternatives_spanish:
  - consigo mismos
  - unos con otros
  - para sí
  lexicon: BDAG
  rationale: La expresión indica deliberación interna dentro del grupo. «Entre sí» reproduce bien la idea de consulta mutua sin volverlo artificial en español.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio acompañante se vierte de forma directa con «diciendo», que mantiene la secuencia narrativa del griego.
- source_word: Ἐὰν εἴπωμεν
  english_pob_choice: If we say
  chosen_spanish: Si decimos
  alternatives_spanish:
  - Si dijéramos
  - Si llegamos a decir
  lexicon: BDAG
  rationale: La construcción condicional se expresa de manera idiomática con «Si decimos», sin añadir un matiz hipotético excesivo.
- source_word: Ἐξ οὐρανοῦ
  english_pob_choice: From heaven
  chosen_spanish: Del cielo
  alternatives_spanish:
  - Del cielo arriba
  - De los cielos
  lexicon: BDAG
  rationale: «Del cielo» conserva la referencia literal del griego y en español comunica la procedencia divina implícita sin interpretar de más como «de Dios».
- source_word: ἐρεῖ
  english_pob_choice: he will say
  chosen_spanish: él dirá
  alternatives_spanish:
  - dirá
  - responderá
  lexicon: BDAG
  rationale: El verbo griego es simplemente «decir»; «él dirá» preserva ese valor verbal y deja que la pregunta citada lleve el peso interrogativo.
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  lexicon: BDAG
  rationale: Es la equivalencia idiomática normal en español para la pregunta causal del griego.
- source_word: ἐπιστεύσατε αὐτῷ
  english_pob_choice: did you not believe him
  chosen_spanish: no le creísteis
  alternatives_spanish:
  - no confiaron en él
  - no le dieron crédito
  lexicon: BDAG
  rationale: Con dativo de persona, πιστεύω puede significar creer a alguien. «Creísteis» es más preciso aquí que «creísteis en él», porque la acusación se refiere a aceptar su testimonio.
theological_decisions:
- issue: Sentido de «del cielo» como circunlocución de origen/divina autoridad
  english_pob_reading: Retain the idiom 'From heaven' without expanding it to 'from God.'
  chosen_spanish_reading: Conservar «del cielo» sin explicitar «de Dios».
  alternative_spanish_readings:
  - de Dios
  - del cielo, es decir, de Dios
  rationale: El griego usa la circunlocución reverente «del cielo». Mantenerla respeta el texto y evita adelantar una interpretación que el contexto deja implícita.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió el problema anterior asegurando que el único marcador de nota [a] aparezca explícitamente en el texto español. La formulación sigue la revisión reciente que favorece «reasoned» sobre «discussed» y mantiene «From heaven» de manera literal.
  spanish_consistency_notes:
  - Se preservó el valor de πιστεύω con dativo como «creerle», no «creer en él».
  - Se evitó traducir «del cielo» como «de Dios» para no sobreinterpretar la circunlocución.
  - «Razonaron entre sí» mantiene la deliberación grupal sin caer en una paráfrasis más amplia.
