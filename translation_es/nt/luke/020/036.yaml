translation:
  language: es
  text: Porque ya no pueden morir, pues son semejantes a los ángeles[a] y son hijos de Dios[b], siendo hijos de la resurrección.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «iguales a los ángeles».
    reason: lexical_alternative
  - marker: b
    text: El griego usa el masculino plural «hijos» (υἱοί) tanto en «hijos de Dios» como en «hijos de la resurrección»; aquí expresa condición e identidad, no inclusión exclusiva de varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποθανεῖν ἔτι δύνανται
  english_pob_choice: cannot die anymore
  chosen_spanish: ya no pueden morir
  alternatives_spanish:
  - no pueden morir ya más
  - no pueden morir nunca más
  lexicon: BDAG
  rationale: El griego expresa incapacidad de morir con ἔτι, que marca el fin de esa posibilidad. En español, «ya no pueden morir» comunica con naturalidad el valor de «anymore»/«any longer» sin añadir repetición ni énfasis ajenos al texto.
- source_word: ἰσάγγελοι
  english_pob_choice: like the angels
  chosen_spanish: semejantes a los ángeles
  alternatives_spanish:
  - como los ángeles
  - iguales a los ángeles
  lexicon: BDAG
  rationale: ἰσάγγελοι puede significar «igual a» o «como». «Semejantes a los ángeles» conserva la comparación y evita sugerir identidad absoluta, manteniendo la tensión semántica del término.
- source_word: υἱοί ... θεοῦ
  english_pob_choice: sons of God
  chosen_spanish: hijos de Dios
  alternatives_spanish:
  - hijos varones de Dios
  - hijos de Dios
  lexicon: BDAG
  rationale: Aunque el griego usa el masculino plural υἱοί, en español «hijos de Dios» es la forma heredada y comprensible para expresar estatus e identidad. Aquí «hijos» no pretende borrar el valor masculino del término, sino trasladar de manera idiomática la filiación indicada por el original.
- source_word: τῆς ἀναστάσεως υἱοὶ ὄντες
  english_pob_choice: being sons of the resurrection
  chosen_spanish: siendo hijos de la resurrección
  alternatives_spanish:
  - porque son hijos de la resurrección
  - al ser hijos de la resurrección
  lexicon: BDAG
  rationale: El participio ὄντες conserva una relación explicativa con lo anterior. «Siendo» preserva esa forma participial sin convertirla en una paráfrasis causal más fuerte de lo que el griego exige.
- source_word: γάρ ... γάρ
  english_pob_choice: For ... because
  chosen_spanish: Porque ... pues
  alternatives_spanish:
  - Porque ... porque
  - Pues ... pues
  lexicon: BDAG
  rationale: El doble γάρ enlaza y explica. «Porque ... pues» mantiene la conexión lógica del primer γάρ con el contexto y traduce el segundo con una partícula natural en español que introduce la razón sin sonar repetitiva.
theological_decisions:
- issue: Lenguaje filial masculino en un contexto escatológico
  english_pob_reading: Retain 'sons of God' and 'sons of the resurrection' in the main text
  chosen_spanish_reading: Mantener «hijos de Dios» y «hijos de la resurrección» en el texto principal
  alternative_spanish_readings:
  - hijos de Dios / hijos de la resurrección
  - hijas e hijos de Dios / de la resurrección
  rationale: El griego usa υἱοί dos veces y el POB inglés preserva esa forma por fidelidad léxica. En español, «hijos» transmite el mismo estatus sin neutralizar el dato del original; la nota aclara que la forma masculina expresa identidad y condición, no exclusión sexual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El registro inglés indica 'No changes needed' y muestra alta concordancia en la revisión más reciente. La presente redacción sigue ese estado estable, ajustando solo la expresión española para que sea natural y fiel al griego sin perder las decisiones léxicas auditadas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se traduce ἰσάγγελοι con una comparación, no con identidad plena, para conservar la ambigüedad documentada.
  - Se evita 'Cristo', 'Señor' u otras sustituciones no presentes en el texto fuente.
  - El texto principal conserva un orden fluido en español, pero sin desplazar el contenido semántico de las dos cláusulas explicativas de γάρ.
