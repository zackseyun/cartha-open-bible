review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja con fidelidad la estructura y el sentido del griego: Δαυὶδ ... καλεῖ = «David ... llama»; αὐτὸν κύριον = «lo llama Señor»; πῶς ... ἐστιν = «¿cómo ... es?». También preserva correctamente la tensión explícita de αὐτοῦ υἱός como «su hijo», con nota para la alternativa dinástica «descendiente». La única reparación necesaria es estilística y de puntuación: en español es más natural y fiel al flujo argumentativo usar «Entonces» o «Así que» en vez de «por tanto» tras un nombre propio sin coma inglesa, y evitar la duplicación innecesaria de conectores («por tanto» + «pues»).'
  spanish_quality_summary: 'El texto es claro y comprensible, pero la puntuación y la combinación de conectores suenan algo calcadas del inglés: «David, por tanto ...; ¿cómo, pues ...?» resulta pesada en español bíblico actual. Una formulación más natural y digna es «Entonces David lo llama Señor[a]; ¿cómo puede ser su hijo?» o, si se quiere mantener más literalmente πῶς ἐστιν, «Entonces David lo llama Señor[a]; ¿cómo es su hijo?». Se recomienda la segunda para no añadir «puede».'
  glossary_alignment: 'La terminología clave está bien alineada con el proyecto: κύριος → «Señor»; υἱός → «hijo» en el texto principal con nota sobre «descendiente». No hay conflicto con Yahvé/Mesías/Cristo ni otros términos del glosario.'
  issues:
  - severity: medium
    issue: 'Combinación poco natural de conectores: «por tanto» y «pues»'
    rationale: El griego contiene οὖν y πῶς, pero el español no necesita reproducir ambos con dos conectores discursivos pesados en una frase tan breve. «David, por tanto...; ¿cómo, pues...?» suena rígido y anglicado. Conviene simplificar para legibilidad sin pérdida de sentido.
  - severity: low
    issue: Puntuación inicial calcada del inglés
    rationale: «David, por tanto,» con comas parentéticas no es la opción más natural en español bíblico moderno. «Entonces David...» o «David entonces...» fluye mejor.
  revised_spanish_text: Entonces David lo llama Señor[a]; ¿cómo es su hijo?
  revised_footnotes:
  - marker: a
    text: O «su descendiente». El griego dice «su hijo», expresión que puede tener fuerza dinástica, pero el texto principal conserva el término explícito del argumento.
    reason: lexical_alternative
