translation:
  language: es
  text: Entonces David lo llama Señor[a]; ¿cómo es su hijo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su descendiente». El griego dice «su hijo», expresión que puede tener fuerza dinástica, pero el texto principal conserva el término explícito del argumento.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δαυὶδ
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - Davíd
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio de forma estándar y reconocible en español, manteniendo la referencia al rey David sin añadir matices ajenos al texto.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: οὖν introduce una conclusión lógica a partir del argumento previo. «Por tanto» conserva mejor esa inferencia que un simple «entonces» y suena natural en español culto.
- source_word: αὐτὸν κύριον
  english_pob_choice: him Lord
  chosen_spanish: lo llama Señor
  alternatives_spanish:
  - lo llama amo
  - lo llama maestro
  lexicon: BDAG
  rationale: En este contexto κύριος se mantiene como «Señor», siguiendo la opción teológica y léxica del proyecto para el término. El objeto directo se expresa naturalmente con «lo llama» en español; «amo» o «maestro» no conservan la carga argumentativa del pasaje.
- source_word: καλεῖ
  english_pob_choice: calls
  chosen_spanish: lo llama
  alternatives_spanish:
  - lo nombra
  - se refiere a él como
  lexicon: BDAG
  rationale: «Llama» reproduce de manera directa el verbo καλεῖ y mantiene la simplicidad del argumento retórico.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué modo
  - en qué sentido
  lexicon: BDAG
  rationale: «Cómo» es la forma más directa e idiomática para la pregunta retórica, sin diluir su fuerza.
- source_word: αὐτοῦ υἱός
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  - hijo suyo
  lexicon: BDAG
  rationale: Se conserva el término filial explícito «hijo», como en el griego, para no resolver la tensión dinástica con una expansión interpretativa. «Su descendiente» explicita la línea real pero atenúa el vocablo original.
- source_word: ἐστιν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - resulta ser
  - queda como
  lexicon: BDAG
  rationale: Se mantiene el presente simple «es», que corresponde al valor directo de εἰμί y preserva la forma interrogativa del texto.
theological_decisions:
- issue: Rendir κύριος en una argumentación mesiánica
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señorío
  - amo
  rationale: La lectura inglesa del POB conserva «Lord» y el español debe reflejar ese título con «Señor». Esto mantiene la fuerza honorífica y mesiánica del argumento sin rebajarlo a un término meramente doméstico o servil.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Conservar la tensión entre «hijo» y posible sentido dinástico de «descendiente»
  english_pob_reading: his son
  chosen_spanish_reading: su hijo
  alternative_spanish_readings:
  - su descendiente
  rationale: El POB inglés preserva «his son» en el texto principal y solo sugiere «descendant» en nota. En español se conserva «su hijo» para respetar el formulado explícito del griego y dejar abierta la tensión interpretativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'No se registran revisiones aplicadas en el paquete inglés; el pasaje fue confirmado sin cambios en la última pasada. La redacción española sigue el mismo equilibrio auditado: conservar el título cristológico «Señor» y mantener «hijo» en el texto principal, dejando la alternativa dinástica en nota.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, en continuidad con la terminología POB y sin sustituirla por equivalentes más débiles.
  - «Su hijo» conserva la literalidad del griego y la tensión hermenéutica; la posible lectura dinástica se documenta solo en nota.
  - La puntuación refleja el ritmo de la pregunta retórica y hace explícita la conclusión lógica de οὖν con «por tanto».
