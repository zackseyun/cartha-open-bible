revisions:
- from: David, por tanto, lo llama Señor[a]; ¿cómo, pues, es su hijo?
  to: Entonces David lo llama Señor[a]; ¿cómo es su hijo?
  rationale: Se ajusta la frase para un español más natural y digno, eliminando la duplicación poco idiomática de conectores sin alterar el sentido del griego ni las decisiones léxicas del POB. Se conserva «Señor» para κύριος y «su hijo» para υἱός, así como la nota alternativa sobre «descendiente».
  reviewer_model: gpt-5.4
