translation:
  language: es
  text: Ahora bien, Dios no es Dios de los muertos[a], sino de los vivos, porque para él todos viven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque todos están vivos ante él».'
    reason: alternative_reading
lexical_decisions:
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un dios
  lexicon: BDAG
  rationale: En el contexto monoteísta de Lucas, el sustantivo anártroso tiene sentido definido; en español, «Dios» comunica naturalmente esa referencia sin volverlo indefinido.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Ahora
  - Pero
  - Y
  lexicon: BDAG
  rationale: La partícula marca transición discursiva más que oposición fuerte; «Ahora bien» conserva el giro y encaja con el contraste ya expresado por «no... sino...».
- source_word: νεκρῶν
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los difuntos
  - los muertos humanos
  lexicon: BDAG
  rationale: El genitivo sustantivado se vierte de modo natural como «los muertos», manteniendo la forma breve del contraste con «los vivos».
- source_word: ζώντων
  english_pob_choice: the living
  chosen_spanish: los vivos
  alternatives_spanish:
  - los que viven
  - los seres vivos
  lexicon: BDAG
  rationale: El participio sustantivado funciona como un contraste paralelo a «los muertos»; «los vivos» preserva la concisión y el paralelismo.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos los que
  lexicon: BDAG
  rationale: «Todos» mantiene la amplitud del griego sin precisar indebidamente el alcance, que en el contexto inmediato apunta a los patriarcas pero también formula un principio general.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: para él
  alternatives_spanish:
  - a él
  - ante él
  - para Dios
  lexicon: BDAG
  rationale: El dativo es semánticamente comprimido. «Para él» conserva la relación personal con Dios y permite la lectura bíblica de vida vivida en referencia a él, sin cerrarla a una sola paráfrasis.
- source_word: ζῶσιν
  english_pob_choice: live
  chosen_spanish: viven
  alternatives_spanish:
  - están vivos
  lexicon: BDAG
  rationale: El presente indicativo se traduce directamente como «viven»; «están vivos» introduce una glosa más interpretativa.
theological_decisions:
- issue: Valor del dativo en πάντες γὰρ αὐτῷ ζῶσιν
  english_pob_reading: for all live to him
  chosen_spanish_reading: porque todos viven para él
  alternative_spanish_readings:
  - porque todos viven ante él
  - porque todos viven a él
  rationale: La frase griega admite varias relaciones del dativo. «Para él» sigue de cerca la relación personal indicada en la traducción inglesa, conserva la tensión semántica y evita resolver el sentido de manera excesiva. «Ante él» es posible, pero cambia el matiz relacional; «a él» resulta menos natural en español.
  doctrine_reference: Preservar la tensión textual sin sobreinterpretar; la frase apoya el argumento de Jesús sobre la resurrección sin desarrollar más de lo que el texto afirma.
translation_notes:
  revision_awareness: Se revisó la transposición del dativo αὐτῷ para evitar una calca rígida de «to him» y conservar en español el matiz relacional que el auditor inglés dejó abierto entre «to him», «for him» y «before him».
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός, conforme al estándar del proyecto.
  - Se preservó el contraste nominal «los muertos / los vivos» para νεκρῶν / ζώντων.
  - No se usó «SEÑOR» para el nombre divino porque el versículo no contiene יהוה ni una cita directa del tetragrama.
  - La nota al pie marca una alternativa real de sentido para el dativo, sin resolverla como si el griego fuera unívoco.
