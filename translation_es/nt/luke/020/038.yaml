review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: Dios no es Dios de muertos sino de vivos, y la cláusula final mantiene el presente «viven». También conserva la nota alternativa del POB inglés. Sin embargo, «para él» en la cláusula πάντες γὰρ αὐτῷ ζῶσιν suena menos natural en español en este contexto y puede sugerir finalidad más que relación. Dado que el POB inglés eligió «to him» precisamente para dejar el dativo algo abierto, «para él» no preserva ese equilibrio tan bien en español como «para él viven» o, mejor, «viven para él»; aun así, la formulación completa actual necesita un ajuste por naturalidad y redundancia inicial.'
  spanish_quality_summary: '«Ahora bien» es aceptable para δέ, pero «Dios no es Dios de los muertos» repite «Dios» de forma algo pesada. En español bíblico y natural, «él no es Dios de muertos, sino de vivos» o «no es Dios de los muertos, sino de los vivos» sería más fluido, pero el sujeto explícito ayuda por contexto. La mejora más necesaria es estilística y semántica en la cláusula final: «porque todos viven para él» es comprensible, pero no es la forma más idiomática ni la más transparente para un lector amplio. «Porque para él todos viven» suena más bíblico y conserva mejor la relación dativa sin forzar finalidad.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεός -> «Dios» está bien; no hay nombres divinos especiales ni términos mesiánicos en juego. La decisión sobre αὐτῷ debe ajustarse no por glosario, sino por fidelidad semántica y legibilidad española.'
  issues:
  - severity: medium
    issue: La frase «porque todos viven para él» maneja el dativo αὐτῷ de una manera demasiado finalista en español.
    rationale: Aunque «para él» es posible, en español suele oírse como propósito o dedicación. Aquí el griego expresa más bien relación respecto de Dios. «Porque para él todos viven» conserva la compresión semántica y mejora la naturalidad bíblica.
  - severity: low
    issue: La secuencia «Dios no es Dios de los muertos» suena algo redundante.
    rationale: No es incorrecta y refleja el griego, pero en español fluye mejor con una leve reordenación. Aun así, esto es secundario frente al ajuste del dativo.
  revised_spanish_text: Ahora bien, Dios no es Dios de los muertos[a], sino de los vivos, porque para él todos viven.
