review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: mantiene el pasivo de καταξιωθέντες, la coordinación de ''aquel siglo'' con ''la resurrección de entre los muertos'', y la distinción entre γαμοῦσιν y γαμίζονται. Sin embargo, omite en notas la alternativa documentada para τοῦ αἰῶνος ἐκείνου (''la era venidera'' / ''el siglo venidero''), que el rastro inglés preservó como nota, y la expresión ''son dados en matrimonio'' suena poco natural en español eclesial general.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero requiere dos mejoras: 1) ''aquel siglo'' es posible, aunque en español bíblico contemporáneo suena algo rígido; puede mantenerse si se conserva la nota aclaratoria. 2) ''son dados en matrimonio'' es gramatical pero poco idiomático; ''son dadas en matrimonio'' sería históricamente más específico pero introduciría género no expreso. ''son entregados en matrimonio'' preserva mejor la pasiva y suena más natural.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'siglo' para αἰών es defendible aquí por la rationale documentada, aunque conviene añadir nota con 'la era venidera' para preservar la alternativa inglesa. 'resurrección de entre los muertos' está bien. La decisión 'considerados dignos' preserva correctamente la tensión teológica contra una lectura meritocrática.
  issues:
  - severity: medium
    issue: Falta la nota correspondiente a 'that age' / 'the age to come'.
    rationale: El English POB conserva una nota léxica para τοῦ αἰῶνος ἐκείνου ('Or the age to come'). El español debería preservar esa alternativa, especialmente porque 'aquel siglo' puede sonar menos transparente para lectores modernos.
  - severity: medium
    issue: '''son dados en matrimonio'' suena poco natural en español actual.'
    rationale: Aunque calca la pasiva griega, la formulación no es la más legible ni idiomática en español neutral. 'son entregados en matrimonio' conserva la pasiva y la distinción semántica frente a 'se casan' con mejor fluidez.
  revised_spanish_text: Pero los que sean considerados dignos[a] de alcanzar aquel siglo[b] y la resurrección de entre los muertos, ni se casan ni son entregados en matrimonio.
  revised_footnotes:
  - marker: a
    text: O «sean contados dignos» o «sean tenidos por dignos». El participio griego es pasivo y señala una valoración recibida.
    reason: lexical_alternative
  - marker: b
    text: O «la era venidera». Literalmente, «aquel siglo».
    reason: lexical_alternative
  revision_rationale: La revisión conserva todas las decisiones exegéticas principales, añade la nota léxica que falta para αἰών y sustituye una pasiva española poco natural por una formulación más idiomática sin perder la distinción entre γαμοῦσιν y γαμίζονται.
