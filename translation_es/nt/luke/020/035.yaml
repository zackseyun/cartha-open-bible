translation:
  language: es
  text: Pero los que sean considerados dignos[a] de alcanzar aquel siglo[b] y la resurrección de entre los muertos, ni se casan ni son entregados en matrimonio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sean contados dignos» o «sean tenidos por dignos». El participio griego es pasivo y señala una valoración recibida.
    reason: lexical_alternative
  - marker: b
    text: O «la era venidera». Literalmente, «aquel siglo».
    reason: lexical_alternative
lexical_decisions:
- source_word: καταξιωθέντες
  english_pob_choice: are considered worthy
  chosen_spanish: sean considerados dignos
  alternatives_spanish:
  - sean contados dignos
  - sean tenidos por dignos
  lexicon: BDAG
  rationale: El participio pasivo indica que la dignidad es adjudicada, no ganada por mérito propio. «Ser considerados dignos» conserva ese valor pasivo y suena natural en español.
- source_word: τοῦ αἰῶνος ἐκείνου
  english_pob_choice: that age
  chosen_spanish: aquel siglo
  alternatives_spanish:
  - aquel tiempo
  - la era venidera
  lexicon: BDAG
  rationale: «Αἰών» aquí designa una era o edad escatológica. «Aquel siglo» mantiene el deíctico del griego y preserva la distinción sin imponer demasiado la glosa interpretativa de «venidero» en el texto principal.
- source_word: τυχεῖν
  english_pob_choice: to attain
  chosen_spanish: alcanzar
  alternatives_spanish:
  - obtener
  - participar de
  lexicon: BDAG
  rationale: El infinitivo expresa llegar a compartir o recibir esa realidad. «Alcanzar» comunica bien la idea de llegar a esa edad/resurrección sin sonar forzado.
- source_word: ἀναστάσεως τῆς ἐκ νεκρῶν
  english_pob_choice: the resurrection from the dead
  chosen_spanish: la resurrección de entre los muertos
  alternatives_spanish:
  - la resurrección de los muertos
  - la resurrección de entre los muertos
  lexicon: BDAG
  rationale: La frase conserva el matiz de salida «ἐκ» con «de entre». Esto mantiene la fuerza literal sin hacer el español innecesariamente rígido.
- source_word: γαμοῦσιν
  english_pob_choice: marry
  chosen_spanish: se casan
  alternatives_spanish:
  - se casan
  - se unen en matrimonio
  lexicon: BDAG
  rationale: El verbo puede traducirse de manera general como contraer matrimonio. «Se casan» es claro, idiomático y conserva el paralelismo con la segunda cláusula.
- source_word: γαμίζονται
  english_pob_choice: are given in marriage
  chosen_spanish: son dados en matrimonio
  alternatives_spanish:
  - son entregados en matrimonio
  - se casan
  lexicon: BDAG
  rationale: La forma pasiva es distinta de γαμοῦσιν y enmarca la costumbre social de ser entregadas en matrimonio. «Son dados en matrimonio» preserva esa distinción verbal y la pasividad del griego.
theological_decisions:
- issue: Si καταξιωθέντες sugiere mérito humano o evaluación divina
  english_pob_reading: The phrase preserves divine evaluation ('are considered worthy') without implying that people earn the age to come by their own merit.
  chosen_spanish_reading: La frase conserva una evaluación externa («sean considerados dignos») sin implicar que esas personas ganen por sí mismas ese siglo o la resurrección.
  alternative_spanish_readings:
  - los que son dignos
  - los que merecen
  rationale: El pasivo evita convertir la recompensa escatológica en mérito humano. La redacción española mantiene esa tensión doctrinal sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica en lugar de cerrarla.
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión inglesa de preservar el pasivo de καταξιωθέντες y la referencia escatológica de αἰών, sin añadir glosas doctrinales en el texto principal. Se optó por una equivalencia óptima para mantener fluidez en español y, a la vez, conservar la distinción entre las dos formas verbales del final del versículo.
  spanish_consistency_notes:
  - Se usó «dignos» para reflejar la evaluación pasiva, en armonía con el patrón POB de no convertir el texto en una afirmación de mérito humano.
  - «Aquel siglo» se empleó como equivalente escatológico de αἰών ἐκεῖνος; en notas se deja abierta la alternativa «edad venidera».
  - Se distinguió «se casan» / «son dados en matrimonio» para reflejar los dos verbos griegos diferentes.
  - La traducción evita «Cristo»/«SEÑOR» porque no aparecen en este versículo.
  - Se mantuvo «resurrección de entre los muertos» para conservar el valor de ἐκ con naturalidad en español.
