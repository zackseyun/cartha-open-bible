revisions:
- from: Pero los que sean considerados dignos de alcanzar[a] aquel siglo y la resurrección de entre los muertos, ni se casan ni son dados en matrimonio.
  to: Pero los que sean considerados dignos[a] de alcanzar aquel siglo[b] y la resurrección de entre los muertos, ni se casan ni son entregados en matrimonio.
  rationale: La revisión conserva todas las decisiones exegéticas principales, añade la nota léxica que falta para αἰών y sustituye una pasiva española poco natural por una formulación más idiomática sin perder la distinción entre γαμοῦσιν y γαμίζονται.
  reviewer_model: gpt-5.4
