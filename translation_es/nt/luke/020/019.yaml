translation:
  language: es
  text: Y los escribas y los principales sacerdotes trataron de echarle mano en aquella misma hora[a], pero temieron al pueblo, porque sabían que había dicho esta parábola contra ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arrestarlo» o «apoderarse de él»; literalmente, «echarle mano».
    reason: lexical_alternative
  - marker: b
    text: O «a ellos»; la frase probablemente lleva el sentido de que la parábola iba dirigida contra ellos.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐζήτησαν
  english_pob_choice: sought
  chosen_spanish: procuraron
  alternatives_spanish:
  - buscaron
  - intentaron
  lexicon: BDAG
  rationale: El aoristo presenta la intención/acción resumida. "Procuraron" conserva el matiz de esfuerzo orientado a una acción sin afirmar más de lo que el griego dice; evita la rigidez de un calco y se mantiene cercano al valor de "sought".
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - expertos en la Ley
  - maestros de la Ley
  lexicon: BDAG
  rationale: '"Escribas" es el equivalente directo y reconocido para γραμματεῖς en los Evangelios. Las alternativas explican la función, pero añaden interpretación y pueden diluir el grupo social nombrado.'
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: principales sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  - jefes sacerdotales
  lexicon: BDAG
  rationale: Para el plural ἀρχιερεῖς, "principales sacerdotes" comunica bien el liderazgo sacerdotal colectivo. Se evita "sumos sacerdotes" porque en español puede sonar como si se tratara de varios titulares del sumo sacerdocio, lo cual no refleja bien el uso del plural en los Evangelios.
- source_word: ἐπιβαλεῖν ἐπ’ αὐτὸν τὰς χεῖρας
  english_pob_choice: to lay hands on him
  chosen_spanish: echarle mano
  alternatives_spanish:
  - ponerle las manos encima
  - apoderarse de él
  - arrestarlo
  lexicon: BDAG
  rationale: La expresión griega es idiomática y hostil. "Echarle mano" conserva la imagen corporal y el matiz de tentativa violenta o de captura. "Arrestarlo" concreta demasiado el sentido legal; "ponerle las manos encima" es posible, pero menos natural en este contexto narrativo.
- source_word: ἐν αὐτῇ τῇ ὥρᾳ
  english_pob_choice: in that very hour
  chosen_spanish: en aquella misma hora
  alternatives_spanish:
  - en ese mismo momento
  - inmediatamente
  lexicon: BDAG
  rationale: La fórmula destaca inmediatez dentro de la escena. "Aquella misma hora" es una solución natural en español que conserva la fuerza temporal de la construcción griega.
- source_word: τὸν λαόν
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  lexicon: BDAG
  rationale: Aunque λαός puede traducirse como "pueblo" o "gente", aquí el contexto público y narrativo favorece "el pueblo" como término más solemne y amplio. "La multitud" estrecha demasiado el referente a un grupo meramente reunido.
- source_word: ἔγνωσαν
  english_pob_choice: they knew
  chosen_spanish: sabían
  alternatives_spanish:
  - se dieron cuenta
  - entendieron
  lexicon: BDAG
  rationale: El aoristo de γινώσκω aquí expresa reconocimiento seguro de la referencia de la parábola. "Sabían" es simple y directo en español, y mantiene el valor de conocimiento reconocido por el contexto.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - a ellos
  - dirigida a ellos
  lexicon: BDAG
  rationale: Aunque πρός puede significar "a/para", el contexto narrativo es adversativo. "Contra ellos" preserva la fuerza confrontativa que el inglés POB también documenta, sin borrar la tensión interpretativa presente en el texto.
- source_word: παραβολὴν
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - comparación
  - relato figurado
  lexicon: BDAG
  rationale: '"Parábola" es el equivalente establecido y preciso para παραβολή en los Evangelios. Las alternativas explican el género, pero no son necesarias y pueden sonar más interpretativas.'
theological_decisions:
- issue: Sentido de πρὸς αὐτοὺς en la reacción de los líderes
  english_pob_reading: The parable was spoken against the religious leaders, not merely addressed to them.
  chosen_spanish_reading: La parábola fue dicha contra ellos, no solo dirigida a ellos.
  alternative_spanish_readings:
  - La parábola fue dicha a ellos
  - La parábola trataba de ellos
  rationale: El contexto inmediato muestra que los líderes se reconocen como blanco de la parábola anterior. Traducir "contra ellos" preserva el tono confrontativo que la escena exige, sin sobreexplicar ni suavizar la tensión.
  doctrine_reference: Mantener la tensión narrativa y retórica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: El texto coincide sustancialmente con el último control de revisión, que marcó el pasaje como sin cambios necesarios. Se mantuvo la misma decisión interpretativa central sobre πρὸς αὐτοὺς y se ajustó el español a una forma publicable y natural.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo la distinción narrativa entre «escribas» y «principales sacerdotes» como grupos distintos.
  - «El pueblo» conserva el valor colectivo de λαός sin reducirlo a una mera multitud.
  - La nota[a] preserva la alternativa léxica principal documentada en el audit trail inglés.
