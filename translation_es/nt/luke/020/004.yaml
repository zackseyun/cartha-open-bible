translation:
  language: es
  text: ¿Era el bautismo de Juan del cielo[a] o de la gente?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Dios»; el griego dice literalmente «del cielo», una manera reverente de hablar del origen o la autoridad divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: βάπτισμα
  english_pob_choice: baptism
  chosen_spanish: bautismo
  alternatives_spanish:
  - bautizar
  - lavamiento
  lexicon: BDAG
  rationale: El sustantivo se refiere al rito/práctica asociado con Juan, no al acto en abstracto. «Bautismo» es el equivalente natural y preciso en español en este contexto.
- source_word: Ἰωάννου
  english_pob_choice: John's
  chosen_spanish: de Juan
  alternatives_spanish:
  - de Juan el Bautista
  lexicon: BDAG
  rationale: El genitivo se expresa de forma natural en español como complemento con «de». Mantiene la asociación del bautismo con Juan sin añadir el apelativo «el Bautista», que no está en el texto griego.
- source_word: ἐξ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: Se conserva el giro reverencial literal «del cielo», que en contexto judío comunica origen o autoridad divina. «De Dios» aclara la implicación, pero interpreta más explícitamente de lo que dice el griego.
- source_word: ἐξ ἀνθρώπων
  english_pob_choice: from men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de las personas
  - de los seres humanos
  lexicon: BDAG
  rationale: La oposición es entre origen celestial/divino y origen meramente humano. «De los hombres» reproduce la forma breve del contraste y el valor genérico de ἀνθρώπων sin volverlo específico de varones.
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - venía
  lexicon: BDAG
  rationale: 'Con frases de origen, el copulativo en español puede sonar más natural como «era»: «¿era del cielo o de los hombres?». Mantiene la estructura de la pregunta sin forzar una paráfrasis.'
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  lexicon: BDAG
  rationale: Conjunción disyuntiva estándar que presenta las dos alternativas de la pregunta.
theological_decisions:
- issue: Sentido de «del cielo» como circunlocución reverencial
  english_pob_reading: Retain the idiomatic expression 'from heaven' in the main text; footnote that it can mean 'from God'.
  chosen_spanish_reading: Conservar «del cielo» en el texto principal y explicar en nota que puede equivaler a «de Dios».
  alternative_spanish_readings:
  - de Dios
  rationale: El griego dice literalmente «del cielo», y en este contexto la expresión funciona como circunlocución reverencial para origen o autoridad divina. Mantenerla preserva la tensión del texto y evita resolverla demasiado pronto con una interpretación explicativa.
  doctrine_reference: 'Translation philosophy: original-language primacy and preservation of theological tension.'
translation_notes:
  revision_awareness: Coincide con el sentido y la evaluación del audit trail en inglés; no se registraron revisiones posteriores que requirieran ajuste.
  spanish_consistency_notes:
  - Se usó «bautismo» para βάπτισμα, siguiendo el valor técnico del rito de Juan.
  - Se conservó la imagen reverencial «del cielo» en vez de explicitar «de Dios» en el texto principal.
  - «De los hombres» mantiene el contraste con el origen divino sin perder el sentido genérico de ἀνθρώπων.
  - La pregunta se formuló con orden natural del español y sin añadir elementos no presentes en el griego.
