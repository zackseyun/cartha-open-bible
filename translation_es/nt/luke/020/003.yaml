revisions:
- from: 'Pero en respuesta les dijo: «Yo también les haré una pregunta, y ustedes respóndanme:»'
  to: 'Pero en respuesta les dijo: «Yo también les preguntaré una cosa[a], y ustedes díganme:»'
  rationale: 'La revisión hace tres ajustes menores pero importantes: usa «preguntaré» para reflejar directamente Ἐρωτήσω; cambia a «díganme» para alinearse con «tell me» en la auditoría inglesa; y añade una nota sobre λόγον para conservar la alternativa léxica documentada sin forzar un calco poco natural en el texto principal.'
