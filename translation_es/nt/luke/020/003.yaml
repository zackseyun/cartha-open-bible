translation:
  language: es
  text: 'Pero en respuesta les dijo: «Yo también les preguntaré una cosa[a], y ustedes díganme:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «una palabra» o «un asunto». El griego usa λόγον, literalmente «palabra» o «asunto», pero aquí funciona idiomáticamente como algo que se pregunta, es decir, una pregunta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: in reply
  chosen_spanish: en respuesta
  alternatives_spanish:
  - respondiendo
  - después de responder
  lexicon: BDAG
  rationale: El participio introduce la réplica de Jesús. «En respuesta» conserva la fuerza responsiva sin sonar forzado en español.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca transición con contraste en el intercambio; «Pero» funciona de manera natural en este contexto polémico.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les respondió
  - les habló
  lexicon: BDAG
  rationale: El verbo principal introduce el habla directa. En español, «les dijo» mantiene claridad y el complemento dativo de αὐτούς.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: La preposición con pronombre de personas en discurso directo suele expresarse naturalmente con dativo indirecto en español.
- source_word: Ἐρωτήσω
  english_pob_choice: I will ask
  chosen_spanish: haré una pregunta
  alternatives_spanish:
  - les preguntaré
  - los interrogaré
  lexicon: BDAG
  rationale: Aunque el verbo es literalmente «preguntar/consultar», el contexto idiomático con λόγον favorece una expresión natural que conserva el sentido de iniciar un contra-cuestionamiento.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - los
  lexicon: BDAG
  rationale: Se trata de plural directo; en esta construcción española, el valor se integra en el pronombre clítico y el contexto.
- source_word: κἀγὼ
  english_pob_choice: I also
  chosen_spanish: Yo también
  alternatives_spanish:
  - Y yo también
  - También yo
  lexicon: BDAG
  rationale: 'La contracción de καὶ ἐγώ conserva el paralelismo recíproco: así como ellos preguntan, Jesús también pregunta.'
- source_word: λόγον
  english_pob_choice: a question
  chosen_spanish: una pregunta
  alternatives_spanish:
  - una palabra
  - un asunto
  lexicon: BDAG
  rationale: Aunque λόγος significa literalmente «palabra» o «asunto», aquí funciona idiomáticamente como pregunta. «Una pregunta» transmite el uso natural sin perder la observación lexical.
- source_word: καὶ εἴπατέ μοι
  english_pob_choice: and you tell me
  chosen_spanish: y ustedes respóndanme
  alternatives_spanish:
  - y díganme
  - y contésteme
  lexicon: BDAG
  rationale: El imperativo plural con pronombre dativo expresa una petición desafiante. «Respóndanme» preserva la reciprocidad y el tono de intercambio directo.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada. El texto ahora evita referencias de nota sin marcador correspondiente y mantiene el sentido idiomático de λόγον dentro del flujo principal.
  spanish_consistency_notes:
  - Se mantuvo un español neutral y contemporáneo, adecuado para lectura eclesial amplia.
  - Se prefirió una solución idiomática para λόγον («una pregunta») conforme al uso contextual documentado en el audit trail.
  - No se introdujeron términos doctrinales adicionales ni se alteró el tono de confrontación del pasaje.
