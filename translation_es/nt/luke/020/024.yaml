translation:
  language: es
  text: '«Muéstrenme un denario[a]. ¿De quién son la imagen y la inscripción que tiene?». Y ellos respondieron: «De César»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se conserva «denario» en vez de generalizarlo como «moneda romana» para mantener la concreción histórica del texto.
    reason: cultural_note
lexical_decisions:
- source_word: Δείξατέ μοι
  english_pob_choice: Show me
  chosen_spanish: Muéstrenme
  alternatives_spanish:
  - Enséñenme
  - Muéstrenme esto
  lexicon: BDAG
  rationale: El imperativo aoristo plural de δείκνυμι pide una acción directa; «Muéstrenme» conserva la fuerza imperativa y suena natural en español sin perder la inmediación del gesto.
- source_word: δηνάριον
  english_pob_choice: a denarius
  chosen_spanish: un denario
  alternatives_spanish:
  - una moneda romana
  - una moneda de plata
  lexicon: BDAG
  rationale: Se conserva el nombre de la moneda para mantener la especificidad histórica y cultural del pasaje, en línea con la decisión auditada del inglés POB.
- source_word: τίνος
  english_pob_choice: Whose
  chosen_spanish: ¿De quién
  alternatives_spanish:
  - ¿De quién es
  - ¿A quién pertenece
  lexicon: BDAG
  rationale: El genitivo interrogativo expresa posesión o asociación; «¿De quién» es la forma idiomática española más natural para esa pregunta.
- source_word: εἰκόνα
  english_pob_choice: image
  chosen_spanish: la imagen
  alternatives_spanish:
  - la semejanza
  - el retrato
  lexicon: BDAG
  rationale: «Imagen» reproduce el término amplio de εἰκών y funciona bien para la imagen acuñada en una moneda.
- source_word: ἐπιγραφήν
  english_pob_choice: inscription
  chosen_spanish: la inscripción
  alternatives_spanish:
  - la leyenda
  - la escritura
  lexicon: BDAG
  rationale: En el contexto de una moneda, ἐπιγραφή es la leyenda escrita; «inscripción» es preciso y comprensible en español.
- source_word: ἀποκριθέντες δὲ εἶπαν
  english_pob_choice: And they answered
  chosen_spanish: Y ellos respondieron
  alternatives_spanish:
  - Y contestaron
  - Y dijeron
  lexicon: BDAG
  rationale: La construcción participio + verbo se expresa con un verbo finito natural en español, preservando el flujo narrativo sin literalismo forzado.
- source_word: Καίσαρος
  english_pob_choice: Caesar's
  chosen_spanish: De César
  alternatives_spanish:
  - De César es
  - César
  lexicon: BDAG
  rationale: El griego ofrece una respuesta genitiva breve; en español se expresa de modo idiomático como «De César», manteniendo la referencia posesiva implícita.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota al pie [a] ahora está anclada explícitamente en el texto español en «César»[a]. No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantuvo el tono sobrio y directo propio de un dicho breve en diálogo.
  - Se conservaron los nombres propios y el vocabulario monetario con precisión histórica.
  - 'La puntuación reproduce la división retórica del original: mandato, pregunta y respuesta breve.'
