  - severity: medium
    issue: Anclaje incorrecto de la nota al pie
    rationale: La nota [a] explica la conservación de «denario», pero en el borrador está colocada después de «De César». Eso rompe la correspondencia exigida entre anclaje textual y contenido de la nota.
