translation:
  language: es
  text: 'Pero cuando los viñadores lo vieron[a], deliberaban entre sí, diciendo: «Este es el heredero. Matémoslo, para que la herencia llegue a ser nuestra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arrendatarios» o «labradores». El término griego designa trabajadores agrícolas; en esta parábola son específicamente los que trabajan en una viña.
    reason: lexical_alternative
lexical_decisions:
- source_word: γεωργοὶ
  english_pob_choice: vine-growers
  chosen_spanish: viñadores
  alternatives_spanish:
  - labradores
  - agricultores
  - campesinos
  lexicon: BDAG
  rationale: En el contexto inmediato de la parábola se trata de quienes trabajan en una viña, así que «viñadores» conserva la especificidad del escenario mejor que un equivalente genérico como «labradores» o «agricultores». Evita además introducir la idea legal de arrendamiento que no está en la palabra misma de este versículo.
- source_word: διελογίζοντο
  english_pob_choice: they reasoned
  chosen_spanish: discutían entre sí
  alternatives_spanish:
  - razonaban entre sí
  - deliberaban entre sí
  - se ponían a considerar
  lexicon: BDAG
  rationale: El imperfecto medio expresa una acción continua de deliberación recíproca. En español, «discutían entre sí» comunica esa negociación interna entre ellos sin forzar un matiz demasiado formal como «deliberaban» ni uno demasiado técnico como «razonaban».
- source_word: πρὸς ἀλλήλους
  english_pob_choice: with one another
  chosen_spanish: entre sí
  alternatives_spanish:
  - unos con otros
  - entre unos y otros
  - el uno con el otro
  lexicon: BDAG
  rationale: La expresión idiomática indica interacción recíproca. «Entre sí» es natural en español y conserva bien la reciprocidad del diálogo.
- source_word: κληρονόμος
  english_pob_choice: heir
  chosen_spanish: heredero
  alternatives_spanish:
  - sucesor
  - inheredero
  lexicon: BDAG
  rationale: «Heredero» es el equivalente español directo y claro para la figura legal y narrativa del término griego. Mantiene el peso de la reivindicación del hijo en la parábola.
- source_word: ἀποκτείνωμεν
  english_pob_choice: Let us kill
  chosen_spanish: Matémoslo
  alternatives_spanish:
  - Matémosle
  - Quitémoslo de en medio
  - Démosle muerte
  lexicon: BDAG
  rationale: La forma exhortativa del aoristo subjuntivo se expresa de manera natural con «Matémoslo». Es directa, fiel y no añade una valoración moral que el verbo por sí solo no explicita.
- source_word: ἵνα ἡμῶν γένηται ἡ κληρονομία
  english_pob_choice: so that the inheritance may become ours
  chosen_spanish: para que la herencia llegue a ser nuestra
  alternatives_spanish:
  - para que la herencia sea nuestra
  - de modo que la herencia pase a ser nuestra
  - para que nos pertenezca la herencia
  lexicon: BDAG
  rationale: Se conserva la finalidad de ἵνα y el matiz de proceso o llegada a un nuevo estado que sugiere γένηται. «Llegue a ser nuestra» mantiene ese movimiento mejor que una simple identificación estática como «sea nuestra».
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: «Pero» refleja el avance narrativo con leve contraste tras la llegada del hijo al relato. En español fluye con naturalidad al abrir la escena.
- source_word: ἰδόντες
  english_pob_choice: when ... saw
  chosen_spanish: cuando ... lo vieron
  alternatives_spanish:
  - al verlo
  - después de verlo
  lexicon: BDAG
  rationale: El participio aoristo se vierte de forma temporal para que la secuencia narrativa suene natural en español. «Cuando ... lo vieron» sigue de cerca la relación temporal del griego.
theological_decisions:
- issue: Terminología para los trabajadores de la viña en la parábola
  english_pob_reading: Rendered as 'vine-growers' rather than the more traditional 'tenants.'
  chosen_spanish_reading: «viñadores» en lugar de «arrendatarios» o «inquilinos»
  alternative_spanish_readings:
  - arrendatarios
  - campesinos
  - labradores
  rationale: La decisión sigue la prioridad del sentido léxico de γεωργοί en este versículo. Aunque el trasfondo de la parábola presupone una relación de arriendo, aquí la palabra misma nombra a trabajadores de la viña. «Viñadores» conserva tanto el campo semántico agrícola como la especificidad del contexto narrativo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se siguió la revisión más reciente sin cambios sustantivos; el acuerdo del control cruzado fue alto y no se registraron objeciones, por lo que el borrador español conserva la decisión léxica principal de traducir γεωργοί con especificidad vitícola y sin introducir el matiz legal de arrendamiento en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma editorial general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usó «heredero/herencia» para κληρονόμος/κληρονομία de manera consistente y legalmente transparente.
  - Se evitó «Cristo» y otras fórmulas no presentes en el versículo.
  - La puntuación reproduce el contraste narrativo con «Pero» y conserva la cita directa con comillas españolas.
  - El marcador de nota [a] se colocó en el término que concentra la alternativa léxica principal.
