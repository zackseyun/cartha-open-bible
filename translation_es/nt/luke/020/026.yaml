translation:
  language: es
  text: Y no pudieron sorprenderlo en sus palabras[a] ante el pueblo, y, maravillados por su respuesta, callaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sorprenderlo en lo que dijo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴσχυσαν
  english_pob_choice: were not able
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no tuvieron fuerza para
  - no fueron capaces de
  lexicon: BDAG
  rationale: ἴσχυω expresa capacidad o poder para hacer algo. En español, «no pudieron» comunica la incapacidad sin añadir matiz físico innecesario.
- source_word: ἐπιλαβέσθαι
  english_pob_choice: to catch
  chosen_spanish: atraparle
  alternatives_spanish:
  - cogerle
  - prenderle
  - asirle
  lexicon: BDAG
  rationale: Aquí el verbo tiene sentido idiomático de intentar sorprenderlo o atraparlo por lo que dijo. «Atraparle» mantiene la imagen de capturarlo mediante sus palabras y suena natural en español.
- source_word: τοῦ ῥήματος
  english_pob_choice: his statement
  chosen_spanish: en sus palabras
  alternatives_spanish:
  - de su dicho
  - de su declaración
  - de lo que dijo
  lexicon: BDAG
  rationale: ῥῆμα se refiere a una expresión hablada concreta. «En sus palabras» conserva el valor verbal del término y refleja bien la trampa buscada por sus interlocutores; el posesivo se entiende por el contexto de Jesús.
- source_word: ἐναντίον τοῦ λαοῦ
  english_pob_choice: before the people
  chosen_spanish: delante del pueblo
  alternatives_spanish:
  - en presencia del pueblo
  - ante el pueblo
  - delante de la gente
  lexicon: BDAG
  rationale: ἐναντίον indica ubicación/comparecencia «delante de» o «en presencia de». «Pueblo» reproduce λαός y mantiene el tono público del pasaje.
- source_word: θαυμάσαντες
  english_pob_choice: marveling
  chosen_spanish: maravillados
  alternatives_spanish:
  - asombrados
  - admirados
  - sorprendidos
  lexicon: BDAG
  rationale: El participio describe su reacción de asombro ante la respuesta de Jesús. «Maravillados» conserva el registro elevado de θαυμάζω sin volverlo anticuado.
- source_word: ἀποκρίσει
  english_pob_choice: answer
  chosen_spanish: respuesta
  alternatives_spanish:
  - réplica
  - contestación
  - respuesta dada
  lexicon: BDAG
  rationale: El sustantivo nombra la respuesta o réplica de Jesús en el diálogo. «Respuesta» es la opción más directa y clara en español.
- source_word: ἐσίγησαν
  english_pob_choice: they became silent
  chosen_spanish: callaron
  alternatives_spanish:
  - se quedaron callados
  - guardaron silencio
  - enmudecieron
  lexicon: BDAG
  rationale: 'El aoristo marca el resultado: pasaron al silencio. «Callaron» es breve, natural y conserva ese cambio de estado sin sobreexplicar.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego SBLGNT y tiene en cuenta el ajuste del POB inglés desde «seize on his statement» a «catch him in a statement», preservando la idea idiomática de tenderle una trampa por sus palabras.
  spanish_consistency_notes:
  - Se conservó «pueblo» para λαός, en línea con el valor público y colectivo del pasaje.
  - Se evitó «SEÑOR» u այլ terminología litúrgica porque aquí no aparecen términos divinos.
  - «Maravillados» y «callaron» mantienen la secuencia narrativa del participio y el verbo final sin recargar la frase.
