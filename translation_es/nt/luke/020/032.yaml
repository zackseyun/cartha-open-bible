translation:
  language: es
  text: Más tarde[a], la mujer también murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Después, la mujer también murió» o «Después, la mujer también murió».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕστερον
  english_pob_choice: Later
  chosen_spanish: Más tarde
  alternatives_spanish:
  - Después
  - Luego
  - Posteriormente
  lexicon: BDAG
  rationale: El adverbio indica una secuencia temporal posterior en la narración. «Más tarde» comunica bien esa progresión en español moderno sin añadir precisión que el griego no exige.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - además
  lexicon: BDAG
  rationale: Aquí καί señala que la mujer, igual que los hermanos anteriores, murió después. «También» reproduce mejor ese valor aditivo que un simple «y» en español.
- source_word: ἡ γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa». En este contexto inmediato, «la mujer» es la opción más clara y no fuerza una relación marital específica en una escena con varios hermanos.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  lexicon: BDAG
  rationale: El aoristo de ἀποθνῄσκω reporta la muerte como un hecho pasado. «Murió» es directo y fiel al sentido simple del verbo; «falleció» sería más suave de lo que expresa el griego.
translation_notes:
  revision_awareness: Se incorporó la revisión necesaria para eliminar el marcador de nota que no estaba anclado en el texto; el versículo se presenta ahora sin notas, en conformidad con el griego breve y el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo un registro breve y literal, apropiado para una cláusula narrativa corta.
  - Se evitó introducir «esposa» para no sobreespecificar el alcance de γυνή en este contexto.
  - Se prefirió un adverbio temporal natural en español para ὕστερον sin perder la secuencia narrativa.
