lexical_decisions:
- source_word: ἕως ἂν
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta cuando
  lexicon: BDAG
  rationale: La combinación introduce una expectativa futura de término; en español, «hasta que» expresa de forma natural esa clausula temporal sin añadir contenido ajeno.
- source_word: θῶ
  english_pob_choice: I make
  chosen_spanish: ponga
  alternatives_spanish:
  - haga
  - coloque
  - ponga/coloque
  lexicon: BDAG
  rationale: τίθημι tiene el valor básico de «poner/colocar», pero en el giro del Salmo 110:1 la acción se expresa en español con un verbo que mantenga la imagen de disposición. «Ponga» conserva mejor ese matiz que una paráfrasis como «haga».
- source_word: τοὺς ἐχθρούς σου
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - los que te son enemigos
  - tus adversarios
  lexicon: BDAG
  rationale: El acusativo con posesivo es directo y hostil; «tus enemigos» comunica con claridad esa relación sin atenuarla.
- source_word: ὑποπόδιον
  english_pob_choice: a footstool
  chosen_spanish: como estrado
  alternatives_spanish:
  - como banquillo para los pies
  - como escabel
  lexicon: BDAG
  rationale: El sustantivo designa un apoyo para los pies. «Estrado» es una solución natural en español bíblico para conservar la imagen, evitando un calco pesado. Se mantiene la comparación implícita del griego con «como».
- source_word: τῶν ποδῶν σου
  english_pob_choice: for your feet
  chosen_spanish: de tus pies
  alternatives_spanish:
  - para tus pies
  - bajo tus pies
  lexicon: BDAG
  rationale: La construcción griega es literalmente «de tus pies». En español, «de tus pies» preserva mejor la forma de la imagen que explicitar «bajo tus pies», que interpretaría más de lo que el texto dice.
theological_decisions:
- issue: Imagen de subyugación del Salmo 110:1 citada por Jesús
  english_pob_reading: Retain the metaphor 'make your enemies a footstool for your feet' without paraphrasing it as total defeat or domination.
  chosen_spanish_reading: Conservar la metáfora «poner a tus enemigos como estrado de tus pies» sin explicarla como derrota total ni suavizarla.
  alternative_spanish_readings:
  - poner a tus enemigos bajo tus pies
  - hacer de tus enemigos tu estrado
  rationale: La frase es una cita directa del Salmo 110:1 y debe mantener su fuerza real y mesiánica. La redacción elegida preserva la tensión teológica del texto sin resolverla mediante paráfrasis interpretativa.
  doctrine_reference: Preservar la tensión teológica y la imagen real-mesiánica del texto.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el auditor inglés: no se requieren revisiones adicionales; la versión mantiene la metáfora del Salmo 110:1 y la relación temporal introducida por ἕως ἂν.'
  spanish_consistency_notes:
  - Se usa «tus» en lugar de «sus» por la segunda persona directa del texto.
  - «Estrado» conserva el valor imagético de ὑποπόδιον sin recurrir a terminología eclesiástica no motivada por el griego.
  - La nota alternativa mantiene la literalidad documentada del audit trail inglés.
