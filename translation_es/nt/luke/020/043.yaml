translation:
  language: es
  text: hasta que haga de tus enemigos un escabel para tus pies[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «hasta que ponga a tus enemigos como escabel de tus pies».'
