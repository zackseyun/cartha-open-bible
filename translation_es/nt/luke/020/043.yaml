review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura temporal («hasta que») y la imagen de subyugación del Salmo 110:1, pero se aparta innecesariamente de la decisión auditada de expresar θῶ con sentido resultativo («make») y de ὑποπόδιον como «footstool». «Ponga ... como estrado» es posible, pero suena menos natural y menos preciso que una formulación española más idiomática equivalente a «hacer ... un estrado/escabel para tus pies».
  spanish_quality_summary: El español es comprensible, pero «como estrado de tus pies» suena algo rígido y poco idiomático en español bíblico actual. Además, la nota al pie repite exactamente el texto principal, por lo que no preserva una alternativa real como sí lo hace la auditoría inglesa. Conviene ajustar a una redacción más natural y a una nota verdaderamente alternativa.
  glossary_alignment: 'No hay conflicto con términos doctrinales del glosario principal. La cuestión aquí es léxica/idiomática: conviene reflejar mejor el valor resultativo de θῶ y mantener ὑποπόδιον con un equivalente español natural y digno. «Escabel» encaja bien en registro bíblico; «estrado» puede entenderse, pero aquí es menos claro para lectores modernos.'
  issues:
  - severity: medium
    issue: «ponga ... como estrado» no refleja tan bien el sentido resultativo auditado de θῶ
    rationale: La auditoría inglesa justificó «I make» por el valor idiomático de la cita de Salmo 110:1. En español, «haga de tus enemigos un escabel...» o similar transmite mejor ese resultado que «ponga ... como...».
  - severity: medium
    issue: «estrado de tus pies» suena poco idiomático
    rationale: Aunque léxicamente defendible, la combinación no es la más natural en español contemporáneo de registro eclesial amplio. «Escabel para tus pies» preserva mejor la imagen y la legibilidad.
  - severity: medium
    issue: La nota al pie no ofrece una alternativa real
    rationale: La nota repite sustancialmente el mismo texto del cuerpo, mientras que la nota inglesa conserva la formulación más literal («put ... as a footstool of your feet»). La nota española debe reflejar una alternativa distinta y útil.
  revised_spanish_text: hasta que haga de tus enemigos un escabel para tus pies[a].
