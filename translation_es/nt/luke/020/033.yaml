translation:
  language: es
  text: Entonces[b], en la resurrección[a], ¿de quién llega a ser esposa la mujer? Porque los siete la tuvieron como esposa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al tiempo de la resurrección».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por tanto» o «así que».'
    reason: lexical_alternative
  - marker: c
    text: 'Lit., «la tuvieron como esposa»; también: «se casaron con ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: BDAG
  rationale: En la primera mención, γυνή nombra a la mujer del caso hipotético. En español, «la mujer» preserva esa referencia sin decidir todavía el vínculo conyugal; el sentido marital se explicita después con «esposa».
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: οὖν marca una continuación inferencial o resumida del argumento. «Entonces» transmite bien ese avance discursivo en un español natural y sobrio.
- source_word: ἐν τῇ ἀναστάσει
  english_pob_choice: in the resurrection
  chosen_spanish: en la resurrección
  alternatives_spanish:
  - en la resurrección de entre los muertos
  - en la resurrección, en aquel tiempo
  lexicon: BDAG
  rationale: La frase se rinde de forma directa para no introducir aclaraciones que el verso no contiene. «En la resurrección» mantiene el marco interrogativo de los saduceos.
- source_word: τίνος αὐτῶν
  english_pob_choice: whose ... of them / whose ... among them
  chosen_spanish: ¿de quién será ...?
  alternatives_spanish:
  - ¿de cuál de ellos será ...?
  - ¿de quién de ellos será ...?
  lexicon: BDAG
  rationale: τίνος pregunta por posesión o relación. En español, «¿de quién será esposa?» conserva la fuerza interrogativa y evita una construcción pesada, aunque la alternativa «de cuál de ellos» también sería posible.
- source_word: γίνεται
  english_pob_choice: does ... become
  chosen_spanish: será
  alternatives_spanish:
  - se convertirá en
  - llegará a ser
  lexicon: BDAG
  rationale: Aunque γίνομαι suele expresar «llegar a ser», en esta pregunta sobre estado conyugal el futuro español «será» comunica con naturalidad el resultado hipotético. Se conserva así la relación de pertenencia matrimonial sin forzar una perífrasis innecesaria.
- source_word: γυνή
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - mujer como esposa
  lexicon: BDAG
  rationale: En la segunda ocurrencia, el contexto marital ya es explícito. «Esposa» evita ambigüedad y mantiene el valor relacional del sustantivo griego en posición predicativa.
- source_word: οἱ γὰρ ἑπτὰ
  english_pob_choice: for the seven
  chosen_spanish: Porque los siete
  alternatives_spanish:
  - Pues los siete
  - Porque los siete hombres
  lexicon: BDAG
  rationale: El artículo con el numeral remite a los siete hermanos ya conocidos por el contexto. «Los siete» reproduce esa referencia sin añadir palabras que el griego no usa.
- source_word: ἔσχον αὐτὴν γυναῖκα
  english_pob_choice: had her as wife
  chosen_spanish: la tuvieron por esposa
  alternatives_spanish:
  - la tuvieron como esposa
  - se casaron con ella
  lexicon: BDAG
  rationale: La construcción ἔχω + acusativo + γυναῖκα expresa tener a alguien como esposa. «La tuvieron por esposa» es una forma española natural y bastante cercana al giro griego; «se casaron con ella» enfatizaría más la acción que la relación mantenida.
theological_decisions:
- issue: Tratamiento de ἀνάστασις sin aclaración doctrinal añadida
  english_pob_reading: Render ἀνάστασις plainly as 'resurrection' without interpretive qualification.
  chosen_spanish_reading: Traducir «ἀνάστασις» simplemente como «resurrección».
  alternative_spanish_readings:
  - resurrección de los muertos
  - levantamiento
  rationale: El verso presenta la pregunta de los saduceos sin desarrollar la doctrina. Por eso conviene no añadir una glosa explicativa que exceda el texto. La traducción mantiene la tensión del planteamiento original.
  doctrine_reference: Preservar la tensión teológica del pasaje sin resolverla artificialmente.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail al mantener la referencia breve a «los siete» y no expandirla a «todos los siete», ya que el griego dice simplemente οἱ ἑπτὰ. También conserva la pregunta en forma directa y no introduce una paráfrasis doctrinal sobre la resurrección.
  spanish_consistency_notes:
  - Se mantiene «resurrección» para ἀνάστασις, conforme al criterio del proyecto.
  - Se usa «esposa» en la segunda mención de γυνή, pero «mujer» en la primera, siguiendo la distinción contextual documentada en el audit trail.
  - «Los siete» reproduce la referencia anafórica al grupo ya establecido en el contexto.
  - No se traduce κύριος ni aparecen otros términos con nomenclatura especial del proyecto en este versículo.
