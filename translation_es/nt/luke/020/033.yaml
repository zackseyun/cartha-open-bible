revisions:
- from: En la resurrección[a], entonces[b], ¿de quién será esposa la mujer? Porque los siete la tuvieron por esposa[c].
  to: Entonces[b], en la resurrección[a], ¿de quién llega a ser esposa la mujer? Porque los siete la tuvieron como esposa[c].
  rationale: Se corrige la nota [a] para reflejar una alternativa real del griego y del expediente inglés; se ajusta el orden de «entonces» para mayor naturalidad en español; se cambia «será» por «llega a ser» para representar mejor γίνεται; y se sustituye «por esposa» por «como esposa» para mejorar la legibilidad sin apartarse del sentido fuente.
