review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: mantiene «la mujer» para ἡ γυνή, «esposa» para el valor marital de γυνή en predicado, y «los siete» sin añadir «todos». También conserva la referencia simple a «la resurrección» sin expansión doctrinal. Sin embargo, la nota [a] no preserva la alternativa del inglés POB, porque repite la lectura principal en vez de ofrecer «al momento de la resurrección / en la resurrección» como contraste preposicional real. Además, «será esposa» suaviza el matiz de γίνεται (‘llega a ser / viene a ser’) y puede mejorarse con «llega a ser» sin perder naturalidad.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos detalles mejorables: 1) el orden «En la resurrección, entonces» suena algo calcado; «Entonces, en la resurrección» fluye mejor en español argumentativo. 2) «la tuvieron por esposa» es comprensible, pero «la tuvieron como esposa» suele sonar más natural en español contemporáneo neutral. La nota [a] también necesita reparación para no ser redundante.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, esclavo, etc. «Resurrección», «mujer» y «esposa» están bien alineadas con las decisiones del expediente inglés y con el griego.
