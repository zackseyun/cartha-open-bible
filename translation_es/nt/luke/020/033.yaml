    rationale: γίνεται expresa ‘llega a ser / viene a ser’. Aunque «será» no es falso, «llega a ser» conserva mejor la fuerza del verbo sin volver la frase antinatural.
  - severity: low
    issue: «la tuvieron por esposa» es menos natural que «la tuvieron como esposa» en español neutral actual.
    rationale: Ambas opciones son válidas, pero «como esposa» suena más transparente y ampliamente legible en español latinoamericano contemporáneo.
  revised_spanish_text: Entonces[b], en la resurrección[a], ¿de quién llega a ser esposa la mujer? Porque los siete la tuvieron como esposa[c].
