review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del griego: expulsión previa y luego muerte, seguida de la pregunta inferencial sobre la respuesta del propietario. También respeta adecuadamente la decisión contextual de κύριος como referente humano, no divino.'
  spanish_quality_summary: El texto es claro y legible, pero «después de echarlo fuera de la viña» resulta algo redundante en español porque combina «echar fuera» con «de la viña». Una formulación más natural y precisa es «después de echarlo fuera de la viña» simplificada a «después de echarlo fuera de la viña» o mejor «después de expulsarlo de la viña». Para mínima intervención y fidelidad al matiz de ἐκβαλόντες + ἔξω, conviene «después de echarlo fuera de la viña»? No; la mejor reparación es «después de echarlo fuera de la viña» sigue redundante. Se recomienda «después de sacarlo fuera de la viña» o «después de expulsarlo de la viña».
  glossary_alignment: La decisión «dueño de la viña» para ὁ κύριος τοῦ ἀμπελῶνος está bien alineada con la auditoría inglesa y evita una lectura indebida de «Señor». No hay conflicto con los términos doctrinales del proyecto.
  issues:
  - severity: medium
    issue: Redundancia/torpeza en «echarlo fuera de la viña»
    rationale: El griego expresa expulsión hacia afuera del viñedo; en español, «echar fuera de» suena pesado y algo pleonástico. «Expulsarlo de la viña» comunica con naturalidad la misma idea de sacar del interior al exterior.
  - severity: low
    issue: Anclaje de nota al pie en «viña» en lugar de en «dueño»
    rationale: La nota explica κύριος y sus alternativas léxicas, por lo que el marcador debería colocarse en «dueño», no en «viña», para mayor precisión editorial.
  revised_spanish_text: Y después de expulsarlo de la viña, lo mataron. ¿Qué, pues, les hará el dueño[a] de la viña?
