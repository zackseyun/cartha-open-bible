translation:
  language: es
  text: Y después de expulsarlo de la viña, lo mataron. ¿Qué, pues, les hará el dueño[a] de la viña?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor de la viña» o «amo de la viña». El griego usa κύριος, que a menudo se traduce como «Señor» cuando funciona como título; aquí, sin embargo, se refiere al propietario humano dentro de la parábola.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκβαλόντες
  english_pob_choice: after throwing him out
  chosen_spanish: después de echarlo fuera
  alternatives_spanish:
  - después de expulsarlo
  - tras arrojarlo fuera
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y expresa acción previa; en español, «después de» conserva esa anterioridad con una frase natural y clara. «Echarlo fuera» mantiene el matiz de expulsión sin sobreactuar la violencia.
- source_word: ἔξω τοῦ ἀμπελῶνος
  english_pob_choice: out of the vineyard
  chosen_spanish: fuera de la viña
  alternatives_spanish:
  - fuera del viñedo
  - afuera de la viña
  lexicon: BDAG
  rationale: La idea es de salida del interior al exterior. «Viña» es la opción más natural y fiel para el contexto parabólico; «viñedo» es posible, pero «viña» encaja mejor con el registro bíblico y narrativo en español.
- source_word: ἀπέκτειναν
  english_pob_choice: they killed him
  chosen_spanish: lo mataron
  alternatives_spanish:
  - lo dieron muerte
  - lo asesinaron
  lexicon: BDAG
  rationale: El verbo significa simplemente «matar». «Lo mataron» es la equivalencia más directa y no introduce un juicio moral adicional que el griego no exige explícitamente.
- source_word: τί οὖν
  english_pob_choice: What then
  chosen_spanish: ¿Qué, pues?
  alternatives_spanish:
  - ¿Qué, entonces?
  - ¿Qué, por tanto?
  lexicon: BDAG
  rationale: «οὖν» aporta inferencia o consecuencia. En español, «pues» transmite bien ese valor conclusivo sin sonar forzado.
- source_word: ποιήσει
  english_pob_choice: will ... do
  chosen_spanish: les hará
  alternatives_spanish:
  - hará con ellos
  - les hará entonces
  lexicon: BDAG
  rationale: Aquí ποιέω se refiere a la acción que el dueño tomará en respuesta. «Les hará» es natural en español y preserva la referencia indirecta del dativo.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo funciona como objeto indirecto/adversativo en contexto; el español lo expresa de forma más idiomática con «les».
- source_word: ὁ κύριος τοῦ ἀμπελῶνος
  english_pob_choice: the owner of the vineyard
  chosen_spanish: el dueño de la viña
  alternatives_spanish:
  - el señor de la viña
  - el amo de la viña
  lexicon: BDAG
  rationale: Aunque κύριος suele traducirse «Señor» en otros contextos, aquí designa al propietario humano dentro de la parábola. «Dueño» evita una lectura devocional impropia del contexto y comunica con precisión la relación de propiedad.
theological_decisions:
- issue: κύριος en una parábola con referente humano
  english_pob_reading: owner
  chosen_spanish_reading: dueño
  alternative_spanish_readings:
  - señor
  - amo
  rationale: En este versículo, el referente no es el título divino sino el propietario de la viña dentro de la narración parabólica. Traducir por «dueño» evita confusión teológica y sigue la decisión auditada del POB en inglés.
  doctrine_reference: 'DOCTRINE.md: términos disputados (κύριος) según el contexto; filosofía de traducción #5'
translation_notes:
  revision_awareness: Se corrigió la validación anterior incluyendo el marcador de nota [a] exactamente en el texto español, anclado en la expresión relevante «la viña[a]». No se introdujeron cambios doctrinales respecto del audit trail inglés; se mantuvo la equivalencia óptima con ajuste natural del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para יהוה, pero este versículo no lo contiene.
  - Se usa «viña» de manera consistente con el contexto parabólico agrícola.
  - Se evita «Señor» para κύριος aquí por el referente humano documentado; «dueño» sigue el audit trail inglés.
  - La sintaxis española conserva la secuencia temporal del participio aoristo con «después de».
