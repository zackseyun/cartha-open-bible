revisions:
- from: Y después de echarlo fuera de la viña[a], lo mataron. ¿Qué, pues, les hará el dueño de la viña?
  to: Y después de expulsarlo de la viña, lo mataron. ¿Qué, pues, les hará el dueño[a] de la viña?
  rationale: 'Se ajusta la primera cláusula para evitar una expresión poco natural en español sin perder la fuerza de expulsión previa al asesinato. También se reubica la nota al pie para anclarla al término que realmente comenta: «dueño», correspondiente a κύριος.'
