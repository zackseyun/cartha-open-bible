    text: O «señor de la viña» o «amo de la viña». El griego usa κύριος, que a menudo se traduce como «Señor» cuando funciona como título; aquí, sin embargo, se refiere al propietario humano dentro de la parábola.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la primera cláusula para evitar una expresión poco natural en español sin perder la fuerza de expulsión previa al asesinato. También se reubica la nota al pie para anclarla al término que realmente comenta: «dueño», correspondiente a κύριος.'
