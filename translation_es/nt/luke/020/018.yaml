translation:
  language: es
  text: Todo el que caiga sobre esa piedra será hecho pedazos[a]; pero aquel sobre quien ella caiga, lo aplastará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será quebrado en pedazos».
    reason: lexical_alternative
  - marker: b
    text: O «lo reducirá a polvo» o «lo dispersará como paja»; el verbo griego puede implicar una fuerza mayor que un simple impacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὁ πεσὼν
  english_pob_choice: Everyone who falls
  chosen_spanish: Todo el que caiga
  alternatives_spanish:
  - Cualquiera que caiga
  - Todo aquel que caiga
  lexicon: BDAG
  rationale: La construcción participial articular tiene valor genérico e indefinido. «Todo el que» transmite bien el alcance universal y suena natural en español bíblico contemporáneo sin perder la forma representativa del griego.
- source_word: ἐπ’ ἐκεῖνον τὸν λίθον
  english_pob_choice: on that stone
  chosen_spanish: sobre esa piedra
  alternatives_spanish:
  - sobre aquella piedra
  - contra esa piedra
  lexicon: BDAG
  rationale: ἐπί con acusativo después de πίπτω expresa caer sobre/upon. «Piedra» mantiene la imagen concreta del texto y «esa» conserva el demostrativo; «sobre» es la preposición española más idiomática aquí.
- source_word: συνθλασθήσεται
  english_pob_choice: will be broken to pieces
  chosen_spanish: será hecho pedazos
  alternatives_spanish:
  - será quebrado en pedazos
  - será destrozado
  lexicon: BDAG
  rationale: El futuro pasivo comunica un resultado violento de fractura o desmenuzamiento. «Hecho pedazos» conserva la fuerza y la pasividad sin introducir un mecanismo más específico de lo que el verbo exige.
- source_word: ἐφ’ ὃν δ’ ἂν πέσῃ
  english_pob_choice: but the one on whom it falls
  chosen_spanish: pero aquel sobre quien ella caiga
  alternatives_spanish:
  - pero quienquiera que quede debajo
  - pero si cae sobre alguien
  lexicon: BDAG
  rationale: La cláusula relativa con ἄν y subjuntivo expresa un referente indefinido. «Aquel sobre quien ella caiga» mantiene el paralelismo con la primera mitad y evita reescrituras explicativas.
- source_word: λικμήσει
  english_pob_choice: will crush
  chosen_spanish: lo aplastará
  alternatives_spanish:
  - lo reducirá a polvo
  - lo hará polvo
  lexicon: BDAG
  rationale: λικμάω puede implicar triturar o desmenuzar hasta dispersar. «Aplastar» es un equivalente fuerte y claro en español; las opciones de pulverización quedan como alternativas porque intensifican más allá de lo que la frase necesita en el texto principal.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a ese
  - a esa persona
  lexicon: BDAG
  rationale: El pronombre es masculino singular en griego y retoma al antecedente genérico. En español, «lo» preserva la referencia directa al objeto del verbo sin perder naturalidad.
theological_decisions:
- issue: Intensidad del juicio de la piedra
  english_pob_reading: Retain the stone as an agent of destructive judgment without softening the metaphor.
  chosen_spanish_reading: Mantener la piedra como agente de destrucción judicial sin suavizar la metáfora.
  alternative_spanish_readings:
  - Interpretar la imagen como un simple tropiezo o daño leve
  - Convertir la frase en una advertencia meramente moral
  rationale: El contexto y los verbos griegos indican una imagen de juicio severo. La traducción conserva la dureza del cuadro sin ampliarlo con explicaciones doctrinales ajenas al verso.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Pronombre masculino genérico
  english_pob_reading: Use 'him' in the second clause.
  chosen_spanish_reading: Usar 'lo' para conservar el referente masculino singular genérico.
  alternative_spanish_readings:
  - Usar 'los' o 'las' para neutralizar el referente
  - Reformular como 'a esa persona'
  rationale: El griego emplea un pronombre masculino singular. La decisión preserva la gramática fuente y el valor representativo del sujeto indefinido.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto sigue de cerca el packet griego y coincide con la lectura auditada en inglés. No se adoptaron revisiones textuales ni cambios de sentido; solo se ajustó la idiomaticidad española y se preservó la fuerza judicial de ambos verbos.
  spanish_consistency_notes:
  - Se usó «piedra» para λίθος, consistente con el contexto inmediato y con el valor literal del sustantivo.
  - Se mantuvo la diferencia entre «será hecho pedazos» y «lo aplastará» para reflejar los dos verbos distintos del griego.
  - Se conservó el pronombre masculino singular implícito en el segundo hemistiquio mediante «lo», sin neutralizar la referencia.
  - La puntuación separa las dos cláusulas con punto y coma, reproduciendo el paralelismo y la transición adversativa del original.
