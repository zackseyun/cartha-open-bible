translation:
  language: es
  text: ¿Nos es lícito pagar impuestos[a] a César, o no?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tributos’; φόρος puede referirse a un impuesto o a un tributo pagado al poder gobernante.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔξεστιν
  english_pob_choice: Is it lawful
  chosen_spanish: nos es lícito
  alternatives_spanish:
  - nos está permitido
  - nos es permitido
  lexicon: BDAG
  rationale: ἔξεστιν expresa permisibilidad en un marco legal o moral. En español, «nos es lícito» conserva esa fuerza y suena más natural y digno que una formulación demasiado literal.
- source_word: ἡμᾶς
  english_pob_choice: for us
  chosen_spanish: nos
  alternatives_spanish:
  - para nosotros
  lexicon: BDAG
  rationale: El dativo/infinitivo se expresa con naturalidad en español con construcción impersonal o pronominal. «Nos» preserva la brevedad del griego sin añadir un matiz étnico inexistente en el texto.
- source_word: Καίσαρι
  english_pob_choice: to Caesar
  chosen_spanish: a César
  alternatives_spanish:
  - a César
  - al César
  lexicon: BDAG
  rationale: «César» conserva el título histórico y político. La preposición española adecuada aquí es «a» con verbo de pago, manteniendo claridad sin generalizar a «el emperador».
- source_word: φόρον
  english_pob_choice: taxes
  chosen_spanish: impuestos
  alternatives_spanish:
  - tributo
  - tributos
  - impuesto
  lexicon: BDAG
  rationale: φόρος designa un tributo fiscal debido al poder gobernante. «Impuestos» es la opción más natural en español contemporáneo; «tributo» conserva mejor la carga política, pero suena más marcado y menos idiomático en este contexto interrogativo.
- source_word: δοῦναι
  english_pob_choice: to pay
  chosen_spanish: pagar
  alternatives_spanish:
  - dar
  - entregar
  lexicon: BDAG
  rationale: Aunque el verbo griego es literalmente «dar», el auditrail inglés ya reconoció que en este contexto el sentido natural es «pagar». En español, «pagar» comunica con precisión la acción fiscal sin perder la relación con el sustantivo fiscal.
- source_word: ἢ οὔ
  english_pob_choice: or not
  chosen_spanish: o no
  alternatives_spanish:
  - o no
  lexicon: BDAG
  rationale: La clausula disyuntiva final se vierte con la fórmula idiomática española «o no», preservando el tono de pregunta cerrada.
theological_decisions:
- issue: Permisibilidad legal o moral sin precisar el marco
  english_pob_reading: Is it lawful... without specifying whether the law in view is Roman civil law or Jewish religious law.
  chosen_spanish_reading: ¿Nos es lícito...?, sin explicitar si la norma aludida es civil romana o religiosa judía.
  alternative_spanish_readings:
  - ¿Es legal...?
  - ¿Está permitido...?
  rationale: El griego deja abierto el marco de referencia. La traducción mantiene esa ambigüedad para no resolver de antemano la tensión del pasaje ni estrechar indebidamente el alcance de la pregunta.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del POB en inglés, que prefirió una formulación natural («pay taxes») sobre una más literal pero menos idiomática («give tribute tax»). En español se adoptó una solución equivalente con «pagar impuestos», manteniendo el matiz fiscal y político de φόρος sin sobretraducirlo.
  spanish_consistency_notes:
  - Se conservó «César» como título propio histórico, no como «emperador», en armonía con el criterio inglés.
  - Se evitó «SEÑOR» u otras sustituciones teológicas porque el texto no contiene κύριος ni una cita del nombre divino.
  - «Lícito» refleja mejor la cuestión de permiso/licitud que una mera posibilidad física.
