review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del griego: futuro de venida, juicio sobre los γεωργοί, transferencia de la viña a otros, y reacción de rechazo al oírlo. Sin embargo, el texto principal debilita un matiz importante documentado en la auditoría inglesa: γεωργοὺς en esta parábola no son meros «labradores» sino trabajadores-arrendatarios de tierra ajena. Además, «al oírlo» reduce ligeramente el contenido de ἀκούσαντες en relación con el inglés auditado «when they heard this».'
  spanish_quality_summary: 'El español es claro y natural, pero hay dos mejoras de fidelidad y legibilidad: 1) quitar el espacio antes de la nota [a]; 2) preferir una formulación que explicite mejor el rol de tenencia en el cuerpo del texto, ya que «labradores» en español puede sonar demasiado genérico o incluso tradicionalista sin ese matiz social. «¡De ninguna manera!» es idiomático, pero para conservar mejor el valor optativo y emocional de Μὴ γένοιτο conviene «¡Que nunca suceda!» en el texto principal, dejando las otras opciones en nota.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La decisión clave es léxica: γεωργοὺς debería alinearse mejor con el POB inglés («tenant farmers»), por lo que «arrendatarios» o «labradores arrendatarios» es preferible a «labradores» solo. La viña, dará, y a otros están bien.'
  issues:
  - severity: medium
    issue: «labradores» no preserva suficientemente el matiz de tenencia de γεωργοὺς en esta parábola.
    rationale: La auditoría inglesa documenta que el término se refiere a quienes trabajan tierra de otro. En español, «labradores» puede entenderse solo como agricultores, sin el componente de arrendamiento o administración.
  - severity: low
    issue: «al oírlo» hace menos explícito el referente de ἀκούσαντες que «al oír esto».
    rationale: El inglés auditado preserva «this». Aunque «lo» puede referirse a la declaración previa, «esto» mantiene con más transparencia la reacción a lo recién dicho.
  - severity: medium
    issue: «¡De ninguna manera!» no conserva tan bien la fuerza optativa de Μὴ γένοιτο como una formulación desiderativa.
    rationale: 'El análisis teológico inglés favorece una repudiación con matiz de deseo/rechazo: «May it never be!». En español, «¡Que nunca suceda!» reproduce mejor ese valor en contexto narrativo.'
  - severity: low
    issue: Espaciado no estándar antes de la nota [a].
    rationale: 'La marca de nota debe ir anclada a la palabra o frase relevante sin espacio: «arrendatarios[a]».'
  revised_spanish_text: 'Él vendrá y destruirá a estos arrendatarios[a], y dará la viña a otros. Pero, al oír esto, dijeron[b]: «¡Que nunca suceda!»'
  revised_footnotes:
