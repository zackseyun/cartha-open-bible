revisions:
- from: 'Él vendrá y destruirá a estos labradores [a], y dará la viña a otros. Pero, al oírlo, dijeron [b]: «¡De ninguna manera!».'
  to: 'Él vendrá y destruirá a estos arrendatarios[a], y dará la viña a otros. Pero, al oír esto, dijeron[b]: «¡Que nunca suceda!»'
  rationale: Se revisa «labradores» a «arrendatarios» para preservar mejor el matiz contextual de γεωργοὺς como quienes trabajan tierra ajena; se ajusta «al oírlo» a «al oír esto» para reflejar con mayor claridad ἀκούσαντες; y se cambia «¡De ninguna manera!» por «¡Que nunca suceda!» para reproducir mejor la fuerza optativa y emocional de Μὴ γένοιτο. También se corrige el anclaje tipográfico de la nota.
