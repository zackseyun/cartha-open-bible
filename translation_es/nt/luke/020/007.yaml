lexical_decisions:
- source_word: καὶ
  english_pob_choice: So
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: El griego simplemente enlaza la respuesta con la pregunta anterior. En español, «Y» conserva esa continuidad narrativa sin añadir más inferencia de la que el texto exige; «Entonces» o «Así que» sonarían un poco más interpretativos.
- source_word: ἀπεκρίθησαν
  english_pob_choice: they answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - dijeron
  lexicon: BDAG
  rationale: ἀποκρίνομαι aquí introduce una respuesta oral en contexto narrativo. «Respondieron» es natural y fiel; «contestaron» es posible, pero menos neutral en registro bíblico.
- source_word: μὴ εἰδέναι
  english_pob_choice: that they did not know
  chosen_spanish: que no sabían
  alternatives_spanish:
  - que no conocían
  - que no entendían
  lexicon: BDAG
  rationale: Después de un verbo de responder, el infinitivo con μή funciona como discurso indirecto. «Que no sabían» reproduce bien la fuerza idiomática sin volverlo mecánico. No se debe intensificar a «no entendían», porque el verbo expresa conocimiento, no comprensión.
- source_word: πόθεν
  english_pob_choice: where it was from
  chosen_spanish: de dónde era
  alternatives_spanish:
  - de dónde venía
  - cuál era su origen
  lexicon: BDAG
  rationale: πόθεν pregunta por origen o procedencia. «De dónde era» suena natural en español y preserva la referencia al origen; «de dónde venía» también es posible, pero puede sugerir movimiento más que procedencia.
theological_decisions:
- issue: Origen o procedencia implícita en πόθεν
  english_pob_reading: The Greek asks about origin or source.
  chosen_spanish_reading: La pregunta apunta al origen o procedencia.
  alternative_spanish_readings:
  - La pregunta apunta al origen.
  - La pregunta apunta a la fuente.
  rationale: 'No hay una tensión doctrinal, pero sí una decisión semántica importante: el texto no pregunta solo «de dónde» en sentido espacial, sino por el origen de la autoridad o del bautismo discutido en el contexto inmediato. «Procedencia» mantiene esa amplitud.'
  doctrine_reference: Contexto inmediato de Lucas 20:1-8; no se afirma una doctrina explícita en este versículo.
translation_notes:
  revision_awareness: La revisión más reciente indica alta conformidad y sin cambios; esta propuesta sigue ese estado, conservando el sentido del griego y la nota auditada sobre πόθεν.
  spanish_consistency_notes:
  - Se mantiene un español moderno y sobrio, sin recurrir a formulaciones eclesiásticas fijas que oculten la pregunta por origen.
  - «Respondieron» y «sabían» conservan el tono narrativo directo del texto griego.
  - La nota al pie usa una alternativa breve y auditable, alineada con la observación de que πόθεν puede significar «de dónde» o «desde dónde».
