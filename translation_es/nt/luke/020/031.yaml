translation:
  language: es
  text: Y el tercero la tomó[a], y asimismo los siete no dejaron hijos y murieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se casó con ella». El griego literalmente dice «la tomó», un modismo para tomar a una mujer como esposa en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τρίτος
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - el tercer hermano
  lexicon: BDAG
  rationale: El griego dice literalmente «el tercero» y no repite «hermano». En español, «el tercero» conserva bien esa elipsis; «el tercer hermano» añade información contextual que el texto no formula de manera explícita.
- source_word: ἔλαβεν αὐτήν
  english_pob_choice: took her
  chosen_spanish: la tomó
  alternatives_spanish:
  - se casó con ella
  - la tomó como esposa
  lexicon: BDAG
  rationale: En este contexto de levirato, la expresión es un modismo que indica tomar a la mujer como esposa. «La tomó» mantiene la proximidad al griego y sigue siendo comprensible; «se casó con ella» aclara el sentido pero interpreta más.
- source_word: ὡσαύτως δὲ καὶ
  english_pob_choice: and likewise
  chosen_spanish: y de la misma manera también
  alternatives_spanish:
  - y asimismo
  - del mismo modo
  lexicon: BDAG
  rationale: La combinación marca continuación con similitud. «Y de la misma manera también» conserva el valor conectivo de las partículas griegas sin perder naturalidad en español.
- source_word: οἱ ἑπτὰ
  english_pob_choice: all seven
  chosen_spanish: los siete
  alternatives_spanish:
  - todos los siete
  - los siete hermanos
  lexicon: BDAG
  rationale: El griego simplemente dice «los siete». En español, «los siete» mantiene el referente total sin añadir «hermanos», que aquí sería implícito por el contexto inmediato.
- source_word: οὐ κατέλιπον τέκνα
  english_pob_choice: left no children
  chosen_spanish: no dejaron hijos
  alternatives_spanish:
  - no dejaron descendencia
  - no tuvieron hijos
  lexicon: BDAG
  rationale: καταλείπω con τέκνα expresa no dejar descendencia al morir. «No dejaron hijos» reproduce bien esa idea en español y conserva la relación entre muerte y falta de posteridad.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - descendencia
  - hijos/descendencia
  lexicon: BDAG
  rationale: Aquí τέκνα se refiere a la posteridad. «Hijos» es la opción más natural y clara en español; «descendencia» es válida pero algo más interpretativa y menos inmediata.
- source_word: ἀπέθανον
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - fallecieron
  lexicon: BDAG
  rationale: El verbo significa simplemente «murieron». «Murieron» es la equivalencia directa y mantiene la fuerza sobria del griego; «fallecieron» suaviza el enunciado.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones sustantivas aplicadas; la formulación española sigue esa lectura estable sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «hijos» para τέκνα en coherencia con el valor familiar concreto del pasaje.
  - Se conserva la elipsis de «hermano» en «el tercero» para no sobreexplicitar el contexto narrativo.
  - La nota al pie marca la alternativa contextual más importante sin desplazar la lectura principal del texto.
