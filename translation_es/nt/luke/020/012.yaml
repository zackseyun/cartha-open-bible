translation:
  language: es
  text: Y envió a un tercero[a]; pero a este también lo hirieron y lo echaron fuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «añadió enviar un tercero», un giro idiomático que significa «envió a un tercero» o «procedió a enviar a un tercero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέθετο
  english_pob_choice: he sent
  chosen_spanish: añadió enviar
  alternatives_spanish:
  - envió
  - procedió a enviar
  - siguió enviando
  lexicon: BDAG
  rationale: El griego προστίθημι + infinitivo expresa la continuación o la prosecución de la acción. En español, 'añadió enviar' conserva ese valor idiomático sin convertirlo en una paráfrasis libre. Se evita 'envió' a secas porque borra la huella del giro verbal que el POB inglés decidió documentar.
- source_word: τρίτον πέμψαι
  english_pob_choice: a third
  chosen_spanish: un tercero
  alternatives_spanish:
  - a un tercero
  - un tercer siervo
  - un tercero de ellos
  lexicon: BDAG
  rationale: El objeto está omitido en griego y se entiende por el contexto narrativo de los siervos enviados. 'Un tercero' mantiene la elipsis y suena natural en español; 'un tercer siervo' explicita demasiado y va más allá de la información del versículo.
- source_word: οἱ δὲ
  english_pob_choice: but they
  chosen_spanish: pero ellos
  alternatives_spanish:
  - y ellos
  - pero los labradores
  - y los labradores
  lexicon: BDAG
  rationale: δέ introduce contraste narrativo. 'Pero ellos' conserva el giro adversativo sin añadir un sustantivo que el versículo no repite explícitamente. El referente sigue siendo claro por el contexto inmediato.
- source_word: καὶ τοῦτον
  english_pob_choice: this one also
  chosen_spanish: a este lo
  alternatives_spanish:
  - también a este
  - este también
  - a este también
  lexicon: BDAG
  rationale: La partícula καί añade repetición o suma. En español, 'a este lo' dentro de la cláusula verbal permite reflejar la focalización del objeto directo y, junto con 'también', transmite la idea de que sufrió la misma conducta que los anteriores.
- source_word: τραυματίσαντες
  english_pob_choice: wounded
  chosen_spanish: hirieron
  alternatives_spanish:
  - lastimaron
  - lesionaron
  - le causaron heridas
  lexicon: BDAG
  rationale: τραυματίζω significa causar una herida o lesión. 'Hirieron' es el equivalente natural y fuerte en español bíblico contemporáneo; 'lastimaron' sería más débil y 'le causaron heridas' más perifrástico de lo necesario.
- source_word: ἐξέβαλον
  english_pob_choice: threw him out
  chosen_spanish: lo echaron fuera
  alternatives_spanish:
  - lo expulsaron
  - lo arrojaron fuera
  - lo sacaron a la fuerza
  lexicon: BDAG
  rationale: ἐκβάλλω puede significar echar, expulsar o arrojar fuera. 'Lo echaron fuera' reproduce bien la violencia de la escena y mantiene un registro bíblico claro sin usar automáticamente 'expulsar', que puede sonar más técnico o institucional.
translation_notes:
  revision_awareness: El inglés POB pasó de 'too' a 'also' para un registro ligeramente más formal; la versión española mantiene ese mismo tono con 'también' y conserva la literalidad auditada del giro idiomático de προσέθετο en forma naturalmente publicable.
  spanish_consistency_notes:
  - Se mantiene 'hirieron' para τραυματίσαντες, en línea con la fuerza de 'wounded' del POB inglés.
  - Se usa 'lo echaron fuera' para ἐξέβαλον, coherente con el valor violento de 'threw him out'.
  - '''Un tercero'' preserva la elipsis del objeto, como el inglés ''a third''.'
  - No se introdujo 'siervo' explícitamente porque el versículo depende del contexto anterior y la elipsis es parte del efecto narrativo.
