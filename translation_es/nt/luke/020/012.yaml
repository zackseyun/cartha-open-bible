    rationale: Aunque el literal es defendible y está bien documentado en la nota, en español suena forzado. El POB inglés eligió una forma natural en el texto principal y reservó el literal para nota; el español debería hacer lo mismo.
  - severity: low
    issue: Orden de palabras poco natural en 'pero ellos también a este lo hirieron'.
    rationale: La secuencia es comprensible, pero en español fluye mejor 'pero a este también lo hirieron' o 'pero ellos hirieron también a este'. La revisión mejora legibilidad sin alterar énfasis.
  - severity: low
    issue: '''un tercero'' sin preposición después de ''envió'' suena menos natural en español.'
    rationale: Con 'envió', el español normalmente pide 'a un tercero'. Esto explicita la función del objeto sin añadir contenido no presente en el griego.
  revised_spanish_text: Y envió a un tercero[a]; pero a este también lo hirieron y lo echaron fuera.
