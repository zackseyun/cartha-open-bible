  rationale: Se reemplaza el calco 'añadió enviar' por el español natural 'envió', en línea con la decisión auditada del POB de dejar el literal en nota. También se ajusta el orden de palabras y se añade la preposición 'a' para una sintaxis española más natural, sin perder el énfasis de 'también' ni la fuerza de las acciones narradas.
