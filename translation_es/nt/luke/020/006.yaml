revisions:
- from: 'Pero si decimos: «De entre los hombres», todo el pueblo nos apedreará, porque está convencido de que Juan es profeta.'
  to: 'Pero si decimos: «De parte de los hombres», todo el pueblo nos apedreará, porque todos están convencidos de que Juan es profeta.'
  rationale: Se reemplaza «De entre los hombres» por «De parte de los hombres» para expresar mejor el origen humano implícito en Ἐξ ἀνθρώπων sin introducir una imagen espacial extraña. También se ajusta «está convencido» a «todos están convencidos» para una lectura española más natural del colectivo ὁ λαὸς ἅπας y en línea con la decisión auditada del inglés de explicitar el valor semántico plural. No se requieren notas.
