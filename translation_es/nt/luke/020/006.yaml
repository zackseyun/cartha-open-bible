review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional, el sentido colectivo de ὁ λαὸς ἅπας, el futuro de καταλιθάσει y la cláusula final sobre la convicción del pueblo acerca de Juan. Sin embargo, «De entre los hombres» no reproduce bien la elipsis griega Ἐξ ἀνθρώπων; suena como procedencia desde dentro de un grupo, no como origen humano en contraste con origen divino. Además, aunque el singular en «está convencido» es defendible por concordancia con «pueblo», en español aquí resulta menos natural que el plural semántico y desajusta el audit trail inglés, que explicitó el valor colectivo con pronombre plural.
  spanish_quality_summary: El texto es mayormente claro y digno, pero «De entre los hombres» suena poco idiomático en este contexto y puede confundir. «Todo el pueblo nos apedreará» funciona bien. La parte final mejora en naturalidad con «porque todos están convencidos de que Juan es profeta» o «porque el pueblo está convencido...». La revisión propuesta mantiene fidelidad y mejora legibilidad.
  glossary_alignment: No hay términos del glosario principal en disputa. «Juan», «profeta» y el resto están bien. La principal cuestión léxica es Ἐξ ἀνθρώπων, que debe evitar un giro espacial como «de entre».
  issues:
  - severity: medium
    issue: «De entre los hombres» para Ἐξ ἀνθρώπων
    rationale: La frase griega es elíptica y contrasta origen humano frente a divino. En español, «de entre los hombres» sugiere selección desde un grupo humano, no procedencia/origen humano. «De parte de los hombres» o «de hombres» preserva mejor el sentido sin sobreinterpretar.
  - severity: low
    issue: «está convencido» con sujeto colectivo
    rationale: No es incorrecto, pero en español contemporáneo aquí suena más natural expresar el valor semántico colectivo. Dado que el inglés auditado eligió «they are convinced», conviene reflejarlo en español con «todos están convencidos» manteniendo a la vez el referente de «todo el pueblo».
  revised_spanish_text: 'Pero si decimos: «De parte de los hombres», todo el pueblo nos apedreará, porque todos están convencidos de que Juan es profeta.'
  revision_rationale: Se reemplaza «De entre los hombres» por «De parte de los hombres» para expresar mejor el origen humano implícito en Ἐξ ἀνθρώπων sin introducir una imagen espacial extraña. También se ajusta «está convencido» a «todos están convencidos» para una lectura española más natural del colectivo ὁ λαὸς ἅπας y en línea con la decisión auditada del inglés de explicitar el valor semántico plural. No se requieren notas.
