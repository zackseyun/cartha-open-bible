translation:
  language: es
  text: 'Pero si decimos: «De parte de los hombres», todo el pueblo nos apedreará, porque todos están convencidos de que Juan es profeta.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐὰν δὲ εἴπωμεν
  english_pob_choice: But if we say
  chosen_spanish: Pero si decimos
  alternatives_spanish:
  - Y si decimos
  - Pero si dijéramos
  lexicon: BDAG
  rationale: La construcción condicional con ἐὰν + subjuntivo introduce una posibilidad real en el contexto del razonamiento de los dirigentes. «Pero si decimos» conserva el valor adversativo de δέ y suena natural en español; «dijéramos» sería más explícitamente hipotético, pero menos directo al fluir del diálogo.
- source_word: Ἐξ ἀνθρώπων
  english_pob_choice: From men
  chosen_spanish: De entre los hombres
  alternatives_spanish:
  - De hombres
  - De origen humano
  - De parte de los hombres
  lexicon: BDAG
  rationale: La frase es elíptica y apunta al origen humano de la obra o autoridad cuestionada. «De entre los hombres» mantiene la concisión y la relación con el grupo humano sin volver demasiado abstracta la expresión. «De origen humano» explicita más de lo que el griego dice.
- source_word: ὁ λαὸς ἅπας
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - la gente toda
  - todo el pueblo reunido
  lexicon: BDAG
  rationale: λαός designa al pueblo en sentido colectivo; ἅπας intensifica la totalidad. «Todo el pueblo» preserva ese alcance colectivo de modo natural en español y evita una lectura demasiado genérica de «gente».
- source_word: καταλιθάσει
  english_pob_choice: will stone us
  chosen_spanish: nos apedreará
  alternatives_spanish:
  - nos lapidará
  - nos matará a pedradas
  lexicon: BDAG
  rationale: El verbo expresa apedrear/lapidar. «Nos apedreará» es claro y relativamente directo; «lapidará» es válido, pero algo más técnico o solemne. La forma española mantiene la severidad implícita del futuro griego sin añadir «hasta morir».
- source_word: πεπεισμένος γάρ ἐστιν
  english_pob_choice: for they are convinced
  chosen_spanish: porque está convencido
  alternatives_spanish:
  - porque están convencidos
  - porque se ha convencido
  lexicon: BDAG
  rationale: Aunque el participio está en singular, el referente colectivo es «el pueblo». En español, una traducción estrictamente colectiva puede sonar mejor en singular impersonal («está convencido») o en plural («están convencidos»). Se optó por el singular colectivo para respetar el acuerdo formal del griego y la personificación del conjunto.
- source_word: Ἰωάννην προφήτην εἶναι
  english_pob_choice: that John is a prophet
  chosen_spanish: de que Juan es profeta
  alternatives_spanish:
  - de que Juan era profeta
  - que Juan es un profeta
  lexicon: BDAG
  rationale: El infinitivo εἶναι no marca tiempo; el auditable cambio del inglés POB a «is a prophet» se refleja en español con presente. Se omite el artículo para reproducir la predicación nominal del griego («Juan profeta») con fluidez natural; añadir «un» sería gramaticalmente posible, pero menos cercano al esquema del original.
theological_decisions:
- issue: Valor temporal de la confesión sobre Juan
  english_pob_reading: that John is a prophet
  chosen_spanish_reading: de que Juan es profeta
  alternative_spanish_readings:
  - de que Juan era profeta
  rationale: El audit trail inglés corrigió el pasado al presente para seguir el infinitivo presente εἶναι. En español se conserva ese presente («es profeta»), que comunica la convicción actual atribuida al pueblo sin forzar una lectura doctrinal distinta.
  doctrine_reference: Preservar la tensión temporal del texto sin resolverla artificialmente
translation_notes:
  revision_awareness: El paquete de revisión inglés muestra una corrección explícita desde «was a prophet» a «is a prophet» para reflejar mejor εἶναι. La versión española sigue esa última decisión y evita retroceder al pasado. También mantiene la elipsis de «From men» de forma suficientemente directa sin expandirla a una explicación interpretativa.
  spanish_consistency_notes:
  - Se usa «pueblo» para λαός con valor colectivo.
  - Se evita «SEÑOR» u otras sustituciones innecesarias; no hay vocabulario divino aquí.
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - «Apedreará» conserva el sentido verbal sin añadir material no explicitado por el griego.
