translation:
  language: es
  text: Cuídense[a] de los escribas, que quieren pasearse con vestiduras largas, y aman los saludos en las plazas de mercado, y los primeros asientos en las sinagogas, y los lugares de honor en los banquetes[d][c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tengan cuidado con los escribas».
    reason: lexical_alternative
  - marker: b
    text: «Vestiduras largas» alude a prendas llamativas que marcaban estatus.
    reason: cultural_note
  - marker: c
    text: O «asientos principales» en las sinagogas.
    reason: lexical_alternative
  - marker: d
    text: O «mejores lugares» o «lugares principales» en los banquetes.
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσέχετε ἀπὸ
  english_pob_choice: Beware of
  chosen_spanish: Cuidado con
  alternatives_spanish:
  - Estén prevenidos contra
  - Estén alerta ante
  lexicon: BDAG
  rationale: El griego expresa una advertencia directa y plural. «Cuidado con» es idiomático en español y conserva el tono de alerta sin sonar forzado; «con» refleja bien la construcción advertencial que en inglés se resolvió con «beware of».
- source_word: γραμματέων
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la ley
  - doctores de la ley
  lexicon: BDAG
  rationale: «Escribas» es la equivalencia directa y suficientemente transparente en el contexto de los evangelios. «Maestros de la ley» interpreta más de lo que exige el término griego.
- source_word: τῶν θελόντων περιπατεῖν
  english_pob_choice: who want to walk around
  chosen_spanish: que quieren andar
  alternatives_spanish:
  - que desean pasearse
  - que gustan de andar
  lexicon: BDAG
  rationale: El participio caracteriza a los escribas por una preferencia visible y pública. «Quieren andar» mantiene esa voluntad y evita añadir matices no explícitos en el griego.
- source_word: ἐν στολαῖς
  english_pob_choice: in long robes
  chosen_spanish: con ropas largas
  alternatives_spanish:
  - con túnicas largas
  - con vestiduras largas
  lexicon: BDAG
  rationale: «στολή» alude a una prenda larga y distinguida, con connotación de prestigio. En español, «con ropas largas» comunica el rasgo visible sin volverlo demasiado técnico; se conserva así la carga social que el inglés POB señaló con su nota cultural.
- source_word: φιλούντων ἀσπασμοὺς
  english_pob_choice: who love greetings
  chosen_spanish: que aman los saludos
  alternatives_spanish:
  - que disfrutan los saludos
  - que aman las salutaciones
  lexicon: BDAG
  rationale: El griego no habla de saludos privados sino de saludos públicos de reconocimiento. «Saludos» es la base más natural en español; el contexto mantiene la carga honorífica.
- source_word: ἐν ταῖς ἀγοραῖς
  english_pob_choice: in the marketplaces
  chosen_spanish: en las plazas
  alternatives_spanish:
  - en los mercados
  - en las plazas de mercado
  lexicon: BDAG
  rationale: «ἀγορά» puede referirse al mercado/plaza pública. En español, «plazas» comunica el espacio público donde se recibe reconocimiento, y evita una reducción excesiva a lo comercial.
- source_word: πρωτοκαθεδρίας ἐν ταῖς συναγωγαῖς
  english_pob_choice: the best seats in the synagogues
  chosen_spanish: los primeros asientos en las sinagogas
  alternatives_spanish:
  - los asientos de honor en las sinagogas
  - los mejores asientos en las sinagogas
  lexicon: BDAG
  rationale: El término designa lugares de máxima honra. «Primeros asientos» conserva la idea de precedencia y mantiene una formulación natural; la nota del inglés POB permite ver la alternativa de «asientos de honor».
- source_word: πρωτοκλισίας ἐν τοῖς δείπνοις
  english_pob_choice: places of honor at banquets
  chosen_spanish: los lugares de honor en los banquetes
  alternatives_spanish:
  - los mejores lugares en los banquetes
  - los principales lugares en los banquetes
  lexicon: BDAG
  rationale: «πρωτοκλισία» se refiere a los lugares de reclinación más honrosos en comidas formales. «Lugares de honor» comunica bien la función social del término en español y preserva la observación cultural del inglés POB.
theological_decisions:
- issue: Alcance de la crítica a los escribas
  english_pob_reading: The verse is rendered as a warning against scribes characterized by ostentatious dress and pursuit of public honor, without expanding the critique beyond the stated behaviors.
  chosen_spanish_reading: El versículo funciona como una advertencia contra escribas caracterizados por su ostentación y su búsqueda de honor público, sin ampliar la acusación más allá de esos rasgos.
  alternative_spanish_readings:
  - Una condena total de todos los escribas como clase
  - Una crítica limitada solo a su forma de vestir
  rationale: El griego describe a los escribas mediante participios que los caracterizan, no mediante una generalización absoluta sobre cada individuo. La traducción conserva la advertencia moral y la tensión del texto sin resolverla de manera excesiva.
  doctrine_reference: Primacía del texto original sobre la tradición interpretativa; mantener la tensión teológica documentada
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; el texto inglés auditado fue aprobado sin cambios en la última pasada, y la presente versión española sigue esas decisiones léxicas y culturales sin expandir el sentido.
  spanish_consistency_notes:
  - Se mantiene «escribas» para γραμματεῖς en coherencia con la terminología POB.
  - Se conserva el tono de advertencia con una formulación natural en español, equivalente a «Beware of».
  - Se preserva la distinción social de las prendas y de los asientos/lugares de honor sin convertir el texto en una paráfrasis interpretativa.
