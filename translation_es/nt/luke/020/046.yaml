review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: una advertencia contra los escribas caracterizados por ostentación y búsqueda de honor público. Sin embargo, hay varios ajustes menores para alinear mejor con el matiz fuente y con el rastro POB: «andar con ropas largas» suena menos natural y menos preciso que una formulación que conserve la idea de pasearse en vestiduras largas; «plazas» debilita un poco ἀγοραῖς, que en este contexto se entiende mejor como plazas de mercado/mercados públicos; y la nota alternativa para Προσέχετε debería sonar idiomática en español.'
  spanish_quality_summary: El texto es claro y legible, pero puede ganar naturalidad y dignidad con pequeñas mejoras. «Cuidado con» funciona, pero «Cuídense de» suena más propiamente exhortativo en registro bíblico moderno. «Vestiduras largas» encaja mejor que «ropas largas» en este contexto de prenda distintiva. La secuencia de la frase fluye mejor sin repetir innecesariamente «y que».
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. «Escribas» está bien. Las decisiones relevantes son de estilo y precisión léxica, no de glosario teológico. Las notas b, c y d preservan adecuadamente la justificación léxica/cultural; la nota a debe ajustarse para una alternativa idiomática en español.
  issues:
  - severity: medium
    issue: «Cuidado con» para Προσέχετε ἀπὸ
    rationale: Es comprensible, pero en este contexto imperativo plural una forma verbal como «Cuídense de» o «Tengan cuidado con» representa mejor la exhortación directa y se acerca más al valor de «Beware of / Watch out for». Además, la nota alternativa actual «Vigilen contra» no suena natural en español.
  - severity: medium
    issue: «andar con ropas largas» para περιπατεῖν ἐν στολαῖς
    rationale: La idea no es solo llevar cierta ropa, sino exhibirse públicamente en vestiduras largas y distinguidas. «Pasearse con vestiduras largas» o «andar con vestiduras largas» comunica mejor el matiz social y evita la coloquialidad de «ropas».
  - severity: low
    issue: «en las plazas» para ἐν ταῖς ἀγοραῖς
    rationale: No es incorrecto, pero «plazas de mercado» o «mercados» conserva mejor la referencia a espacios públicos de reconocimiento social y se alinea más de cerca con «marketplaces» del POB.
  - severity: low
    issue: Repetición de «y que»
    rationale: No es infiel, pero estilísticamente «que quieren... y aman...» es más fluido y natural en español sin perder la estructura participial caracterizante.
