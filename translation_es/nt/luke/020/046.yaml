  rationale: 'La revisión mantiene el sentido del borrador pero mejora tres puntos: (1) hace más idiomática y exhortativa la advertencia inicial; (2) representa mejor el matiz de exhibición social de περιπατεῖν ἐν στολαῖς con «pasearse con vestiduras largas»; y (3) afina ἀγοραῖς como «plazas de mercado». También se corrige la nota alternativa para que suene natural en español.'
