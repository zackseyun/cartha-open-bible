translation:
  language: es
  text: los que devoran las casas de las viudas y, con pretexto[a], oran largamente; estos recibirán mayor condenación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como pretexto» o «con apariencia fingida».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mayor juicio» o «condenación más severa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεσθίουσιν
  english_pob_choice: devour
  chosen_spanish: devoran
  alternatives_spanish:
  - consumen
  - se comen
  lexicon: BDAG
  rationale: El verbo es metafórico y expresa explotación rapaz, no ingestión literal. «Devoran» conserva la fuerza condenatoria y la imagen vívida del griego y del inglés POB.
- source_word: οἰκίας
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  - propiedades
  lexicon: BDAG
  rationale: «Casas» reproduce de forma directa el sustantivo griego y deja la metonimia implícita de hogares o bienes, como en el inglés POB.
- source_word: χηρῶν
  english_pob_choice: widows’
  chosen_spanish: de las viudas
  alternatives_spanish:
  - de las viudas pobres
  - de las viudas necesitadas
  lexicon: BDAG
  rationale: La genitiva plural se expresa naturalmente en español como relación posesiva con «de las viudas».
- source_word: προφάσει
  english_pob_choice: for a pretense
  chosen_spanish: con pretexto
  alternatives_spanish:
  - como pretexto
  - por apariencia
  lexicon: BDAG
  rationale: La dative de medio o base indica un motivo falso o aparente. «Con pretexto» mantiene el valor de falsedad hipócrita sin sobreexplicar.
- source_word: μακρὰ
  english_pob_choice: at length
  chosen_spanish: largas
  alternatives_spanish:
  - prolongadas
  - muy extensas
  lexicon: BDAG
  rationale: En español, «largas oraciones» comunica de modo natural la duración extensa de la oración, correspondiente al adverbial griego.
- source_word: προσεύχονται
  english_pob_choice: pray
  chosen_spanish: hacen oraciones
  alternatives_spanish:
  - oran
  - rezan
  lexicon: BDAG
  rationale: «Hacen oraciones» conserva el registro formal y evita una posible resonancia confesional demasiado estrecha; sigue siendo una expresión clara para el acto de orar.
- source_word: λήμψονται
  english_pob_choice: will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - obtendrán
  - les vendrá
  lexicon: BDAG
  rationale: El futuro medio de λαμβάνω se traduce de forma directa y solemne como «recibirán».
- source_word: περισσότερον κρίμα
  english_pob_choice: greater condemnation
  chosen_spanish: mayor condenación
  alternatives_spanish:
  - mayor juicio
  - condenación más severa
  lexicon: BDAG
  rationale: El contexto de denuncia judicial divina favorece «condenación» como resultado adverso de κρίμα. «Mayor condenación» conserva la lectura del inglés POB y la gravedad del pasaje.
theological_decisions:
- issue: Sentido de κρίμα en el contexto de denuncia de Jesús
  english_pob_reading: greater condemnation
  chosen_spanish_reading: mayor condenación
  alternative_spanish_readings:
  - mayor juicio
  - juicio más severo
  rationale: Aunque κρίμα puede significar «juicio» de manera amplia, aquí el contexto exige un resultado adverso. «Mayor condenación» mantiene la tensión entre el término judicial y su sentido punitivo sin diluirlo.
  doctrine_reference: Preservar la tensión léxica y contextual sin suavizar el juicio divino.
- issue: Función de προφάσει como motivo fingido
  english_pob_reading: for a pretense
  chosen_spanish_reading: con pretexto
  alternative_spanish_readings:
  - por apariencia
  - como pretexto
  rationale: El griego no describe solo una apariencia externa sino una base falsa para la acción. «Con pretexto» comunica mejor la hipocresía denunciada.
  doctrine_reference: Mantener la denuncia de la hipocresía religiosa conforme al texto.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés POB al preferir una traducción más cercana de προφάσει («con pretexto») y una formulación natural de περισσότερον κρίμα («mayor condenación»), manteniendo el tono judicial y la fuerza acusatoria del pasaje.
  spanish_consistency_notes:
  - 'Se evita «Señor» o sustituciones eufemísticas: el pasaje no contiene el nombre divino.'
  - «Casas de las viudas» conserva la imagen metonímica del griego y del inglés POB.
  - «Hacen largas oraciones» refleja la duración sin añadir contenido interpretativo.
  - El registro es formal, sobrio y apto para lectura pública.
