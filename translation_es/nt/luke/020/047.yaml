  source_alignment_summary: 'El borrador refleja bien el sentido del griego: mantiene la metáfora fuerte de κατεσθίουσιν con «devoran», conserva «casas de las viudas», expresa προφάσει como motivo fingido mediante «con pretexto», y transmite el sentido punitivo de περισσότερον κρίμα con «mayor condenación». Sin embargo, «hacen largas oraciones» no es la mejor correspondencia para προσεύχονται μακρὰ; el verbo griego es simplemente «oran»/«rezan», y «hacen oraciones» suena menos natural y algo perifrástico en español.'
  spanish_quality_summary: El texto es claro y digno, pero requiere un ajuste de naturalidad y fidelidad verbal. «Los que devoran...» funciona bien en contexto. «Con pretexto» es aceptable, aunque más idiomático sería «como pretexto» o «con el pretexto de». El problema principal es «hacen largas oraciones», que en español moderno suena más rígido y menos directo que «oran largamente» o «hacen largas plegarias». Una reparación mínima mejora la legibilidad sin perder solemnidad.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Condenación» para κρίμα sigue la revisión inglesa documentada. «Devoran» para κατεσθίουσιν y «casas» para οἰκίας están alineados con el razonamiento léxico. La única desalineación leve es que προσεύχονται se documentó como «pray», y la opción española «hacen oraciones» se aleja innecesariamente del verbo simple; «oran» es más alineado y natural.
  issues:
  - severity: medium
    issue: «Hacen largas oraciones» traduce de forma perifrástica προσεύχονται μακρὰ.
    rationale: El griego usa el verbo simple «orar» con un adverbial de duración. En español, «oran largamente» o «oran por largo tiempo» refleja mejor la estructura y suena más natural que «hacen largas oraciones».
  - severity: low
    issue: La nota [a] no refleja la alternativa inglesa completa.
    rationale: El inglés conserva «for a pretense» / «as a pretext». La nota española da solo «como pretexto». No es grave, pero conviene mantener la alternativa de forma más completa y clara en español.
