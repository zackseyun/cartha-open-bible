translation:
  language: es
  text: Pero que los muertos resucitan, también Moisés lo dio a conocer en el pasaje de la zarza[a], donde lo llama "el Señor"[b], el Dios de Abraham y el Dios de Isaac y el Dios de Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "junto a la zarza". La expresión griega puede referirse al episodio de la zarza ardiente o, idiomáticamente, al pasaje de Éxodo 3.'
    reason: alternative_reading
  - marker: b
    text: 'Griego: "el Señor"; esto refleja la traducción acostumbrada de la Septuaginta para el nombre divino en Éxodo 3.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐγείρονται
  english_pob_choice: are raised
  chosen_spanish: resucitan
  alternatives_spanish:
  - son resucitados
  - se levantan
  lexicon: BDAG
  rationale: El verbo griego está en pasivo, pero en español la forma más natural y clara para la resurrección es la intransitiva 'resucitan'. Mantiene la afirmación de la resurrección sin forzar una pasiva artificial, y conserva el sentido teológico de la acción divina indicado por el contexto.
- source_word: οἱ νεκροὶ
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los difuntos
  - los que han muerto
  lexicon: BDAG
  rationale: '''Los muertos'' es el equivalente más directo y colectivo para el sustantivo plural sustantivado. Evita expansión interpretativa y preserva el contraste argumental del pasaje.'
- source_word: ἐμήνυσεν
  english_pob_choice: made known
  chosen_spanish: lo dio a conocer
  alternatives_spanish:
  - lo hizo saber
  - lo manifestó
  lexicon: BDAG
  rationale: El verbo μηνύω tiene el matiz de dar a conocer o revelar una información. 'Lo dio a conocer' expresa bien esa fuerza evidencial en español moderno, sin convertirlo indebidamente en una proclamación formal.
- source_word: ἐπὶ τῆς βάτου
  english_pob_choice: in the passage about the bush
  chosen_spanish: en el pasaje de la zarza
  alternatives_spanish:
  - en la sección de la zarza
  - junto a la zarza
  lexicon: BDAG
  rationale: La expresión funciona idiomáticamente como referencia al pasaje bíblico de la zarza ardiente (Éxodo 3), no solo al lugar físico. 'En el pasaje de la zarza' mantiene la referencia literaria que la POB inglesa ya documentó.
- source_word: ὡς λέγει
  english_pob_choice: where he calls
  chosen_spanish: cuando llama
  alternatives_spanish:
  - al decir
  - como dice
  lexicon: BDAG
  rationale: En español, 'cuando llama' comunica de manera natural que la cita introduce la formulación de la Escritura atribuida a Moisés. Conserva el enlace con la cita sin añadir un comentario explicativo excesivo.
- source_word: κύριον
  english_pob_choice: the Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: Se traduce con 'Señor' para mantener el título divino reflejado en la cita de Éxodo. En este contexto, el griego cita la fórmula de la LXX que usualmente representa el nombre divino; sin embargo, el texto griego aquí efectivamente dice κύριον, por lo que se conserva el título sin reemplazarlo por una máscara tipográfica.
- source_word: θεὸν Ἀβραὰμ καὶ θεὸν Ἰσαὰκ καὶ θεὸν Ἰακώβ
  english_pob_choice: the God of Abraham and the God of Isaac and the God of Jacob
  chosen_spanish: el Dios de Abraham, y Dios de Isaac, y Dios de Jacob
  alternatives_spanish:
  - el Dios de Abraham, el Dios de Isaac y el Dios de Jacob
  - el Dios de Abraham, de Isaac y de Jacob
  lexicon: BDAG
  rationale: Se preserva la repetición de 'Dios' ante cada patriarca porque el griego repite θεόν y esa reiteración forma parte del énfasis y del ritmo de la cita. En español, la coma ayuda a reflejar esa cadencia sin volver la frase pesada.
theological_decisions:
- issue: Lenguaje de resurrección en la argumentación de Jesús
  english_pob_reading: the dead are raised
  chosen_spanish_reading: los muertos resucitan
  alternative_spanish_readings:
  - los muertos son resucitados
  rationale: '''Resucitan'' comunica con naturalidad el hecho de la resurrección y evita una pasiva poco idiomática en español. La decisión mantiene la afirmación doctrinal sin resolver de antemano el matiz de la acción divina que el pasivo griego sugiere.'
  doctrine_reference: Argumento de la resurrección en Lucas 20; mantener la tensión teológica sin sobreexplicarla
- issue: Referencia a κύριος en la cita de Éxodo
  english_pob_reading: the Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - el Señor
  - Yahvé
  rationale: Aunque la cita refleja la tradición de la Septuaginta que suele representar el nombre divino, el texto griego disponible dice κύριον. Por eso se conserva 'Señor' en el texto principal, dejando la identidad del nombre divino como nota contextual, sin sustituirlo por 'Yahvé' en la cita misma.
  doctrine_reference: Convención de κύριος en cita veterotestamentaria; nombre divino y LXX
translation_notes:
  revision_awareness: 'Coincido con el control de revisión más reciente: no se requieren cambios adicionales respecto al sentido original ni a la lectura auditada en inglés. La redacción española adopta equivalencia óptima, manteniendo el valor del pasivo griego, la referencia idiomática a la zarza y la repetición enfática de ''Dios''.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος, coherente con la decisión auditada en inglés, sin introducir máscara tipográfica ni sustituirla por 'Yahvé' en esta cita.
  - Se preserva la repetición de 'Dios' para reflejar el griego y el argumento de Jesús.
  - El español principal usa 'resucitan' por naturalidad, pero la nota conserva la alternativa pasiva para no borrar el matiz del original.
