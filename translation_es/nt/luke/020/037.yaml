review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego y del POB inglés: afirma la resurrección de los muertos, entiende ἐπὶ τῆς βάτου como referencia al pasaje de la zarza, y conserva la repetición enfática de ''Dios''. Sin embargo, hay dos desajustes relevantes: la nota [a] está mal asignada, porque en el POB inglés la alternativa pertenece a ''la zarza'', no a ''son resucitados''; y la frase ''cuando llama Señor al Dios de Abraham'' suena menos natural y menos precisa que una formulación con ''lo llama''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero necesita pulido menor para naturalidad y correspondencia con las notas. 'Resucitan' es defendible en español, aunque el pasivo griego se puede conservar en nota. 'Cuando lo llama el Señor, el Dios de Abraham...' sería incorrecto; la mejor reparación es 'donde lo llama "el Señor", el Dios de Abraham...' para reflejar la doble acusación sin ambigüedad. También conviene quitar comas innecesarias en la serie repetida.
  glossary_alignment: La decisión de usar 'Señor' para κύριον en esta cita es aceptable por la evidencia griega inmediata y la rationale documentada, aunque el proyecto normalmente prefiere 'Yahvé' para el nombre divino. Aquí la excepción está bien motivada por tratarse de κύριος en una cita de la LXX. 'Dios', 'los muertos' y 'zarza' están alineados. No hay conflicto de terminología mayor.
  issues:
  - severity: high
    issue: La nota [a] del español está anclada a 'resucitan', pero en el POB inglés la alternativa 'at the bush' corresponde a ἐπὶ τῆς βάτου, no a ἐγείρονται.
    rationale: Esto altera el aparato de apoyo y documenta erróneamente la evidencia lexical. Si se conserva una nota sobre el pasivo de ἐγείρονται, tendría que añadirse como nota nueva y distinta, pero aquí no está justificada por el audit trail inglés.
  - severity: medium
    issue: '''Cuando llama Señor al Dios de Abraham'' es poco natural en español y deja ambiguo el objeto pronominal implícito.'
    rationale: El griego con doble acusativo se expresa mejor en español con 'donde lo llama "el Señor", el Dios de Abraham...' o similar. Así se preserva el sentido de ὡς λέγει κύριον τὸν θεὸν Ἀβραὰμ...
  - severity: low
    issue: La puntuación de 'y Dios de Isaac, y Dios de Jacob' suena algo trabada.
    rationale: 'La repetición enfática de θεόν debe preservarse, pero puede hacerse con mejor fluidez: ''el Dios de Abraham y el Dios de Isaac y el Dios de Jacob''.'
