base_translation:
  language: en
  yaml_path: translation/nt/luke/020/037.yaml
  text: But that the dead are raised[a], even Moses made known in the passage about the bush[b], where he calls the Lord the God of Abraham and the God of Isaac and the God of Jacob.
  footnotes:
  - marker: a
    text: Or, 'at the bush'—the Greek expression can refer either to the scene itself or, idiomatically, to the Scripture passage about the burning bush (Exod 3).
    reason: lexical_alternative
  - marker: b
    text: Greek 'the Lord'; this reflects the Septuagint's customary rendering of the divine name in Exodus 3.
    reason: cross_reference
