translation:
  language: es
  text: Y procedió a enviar otro esclavo; pero también a ese[a] lo golpearon y lo deshonraron, y lo enviaron de vuelta con las manos vacías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo» (griego δοῦλος); se usa «esclavo» para preservar aquí la condición de dependencia y pertenencia del personaje en la parábola.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέθετο
  english_pob_choice: he proceeded
  chosen_spanish: procedió
  alternatives_spanish:
  - siguió
  - pasó a
  lexicon: BDAG
  rationale: El griego expresa continuación de la acción con un infinitivo; en español, «procedió a» conserva bien esa idea narrativa sin sonar mecánico.
- source_word: ἕτερον
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - uno más
  - distinto
  lexicon: BDAG
  rationale: Aquí indica un enviado adicional y distinto del primero; «otro» es la forma más natural y precisa en español.
- source_word: πέμψαι
  english_pob_choice: to send
  chosen_spanish: enviar
  alternatives_spanish:
  - mandar
  - despachar
  lexicon: BDAG
  rationale: El infinitivo complementa a προσέθετο; «enviar» reproduce el sentido básico sin sobrecargar el estilo.
- source_word: δοῦλον
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: Se conserva el valor de pertenencia y dependencia que el inglés POB documenta como lexicalmente relevante en la parábola; «esclavo» evita suavizar el término.
- source_word: κἀκεῖνον
  english_pob_choice: that one also
  chosen_spanish: a ese también
  alternatives_spanish:
  - a él también
  - ese también
  lexicon: BDAG
  rationale: El compuesto refuerza el paralelismo con el primer enviado. «A ese también» preserva esa referencia y fluye bien en español.
- source_word: δείραντες
  english_pob_choice: beat
  chosen_spanish: lo golpearon
  alternatives_spanish:
  - lo azotaron
  - lo apalearon
  lexicon: BDAG
  rationale: El verbo denota golpear físicamente. «Golpearon» es fiel y general; no especifica un tipo de castigo que el griego no exige.
- source_word: ἀτιμάσαντες
  english_pob_choice: dishonored
  chosen_spanish: lo deshonraron
  alternatives_spanish:
  - lo avergonzaron
  - lo trataron con deshonra
  lexicon: BDAG
  rationale: El término implica trato vergonzoso y deshonroso; «deshonraron» conserva esa dimensión social con concisión.
- source_word: ἐξαπέστειλαν
  english_pob_choice: sent away
  chosen_spanish: lo enviaron
  alternatives_spanish:
  - lo mandaron fuera
  - lo despidieron
  lexicon: BDAG
  rationale: El compuesto puede expresarse naturalmente con «enviar» en español; el contexto ya comunica el despido violento del enviado.
- source_word: κενόν
  english_pob_choice: empty-handed
  chosen_spanish: vacío
  alternatives_spanish:
  - sin nada
  - con las manos vacías
  lexicon: BDAG
  rationale: «Vacío» reproduce la idea de regreso sin fruto/recompensa; en español puede leerse de forma adverbial en contexto, aunque «con las manos vacías» sería una aclaración idiomática más explícita.
theological_decisions:
- issue: Traducción de δοῦλος en la parábola
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: La parábola presupone una relación de propiedad y envío. «Esclavo» preserva esa fuerza social y evita suavizar el término con «siervo» en un contexto donde la servidumbre voluntaria no es la idea principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden estrechamente; no se registran revisiones sustantivas en el pasaje. La única tensión relevante es δοῦλος, donde se mantiene la decisión léxica marcada del POB por razones contextuales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aplica; este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» como sustituto no pertinente, y se preservó la distinción entre narración y paralelismo del griego.
  - «Lo enviaron vacío» conserva el valor predicativo de κενόν sin añadir contenido ajeno al texto; si se prefiere mayor idiomaticidad, la nota ofrece la alternativa literal equivalente.
