- from: Y procedió a enviar otro esclavo; pero también a ese[a] lo golpearon y lo deshonraron, y lo enviaron vacío.
  to: Y procedió a enviar otro esclavo; pero también a ese[a] lo golpearon y lo deshonraron, y lo enviaron de vuelta con las manos vacías.
  rationale: 'Se conserva la traducción acertada de δοῦλος como «esclavo» y la estructura general del versículo. Se ajusta la cláusula final para reflejar mejor ἐξαπέστειλαν κενόν en español natural y fiel: «lo enviaron de vuelta con las manos vacías» expresa tanto el envío fuera como el hecho de que regresó sin nada. No se requiere adjudicación adicional.'
