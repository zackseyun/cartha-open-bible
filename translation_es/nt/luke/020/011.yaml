review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: continuidad narrativa con προσέθετο + infinitivo, envío de un segundo δοῦλος, maltrato físico y deshonra, y despedida sin recibir fruto. Sin embargo, κενόν se expresa mejor idiomáticamente en español como «con las manos vacías» que como «vacío», y ἐξαπέστειλαν conviene explicitarlo como «enviaron de vuelta» o «despidieron» para conservar mejor la idea de enviarlo fuera/alejado.'
  spanish_quality_summary: El español es claro y natural en general. «Procedió a enviar» funciona, aunque es algo formal; es aceptable. La principal debilidad de legibilidad y precisión es «lo enviaron vacío», que en español suena poco natural y puede sugerir un estado físico o emocional, no el sentido de irse sin nada. «A ese[a]» está bien anclado al matiz de κἀκεῖνον.
  glossary_alignment: Alinea bien con la terminología del proyecto al usar «esclavo» para δοῦλος y preservar la nota alternativa «siervo». No hay conflictos con otros términos clave del glosario. La revisión propuesta mantiene esa decisión y mejora la naturalidad de κενόν sin perder el sentido documentado por el POB inglés.
  issues:
  - severity: medium
    issue: «lo enviaron vacío» no es una representación idiomática adecuada de κενόν en este contexto.
    rationale: 'Aunque literalmente cercano, en español suena extraño y ambiguo. El inglés auditado explica correctamente el sentido adverbial/predicativo: se fue sin recibir nada. «Con las manos vacías» comunica eso con claridad y fidelidad.'
  - severity: low
    issue: «lo enviaron» atenúa ligeramente el valor de ἐξαπέστειλαν.
    rationale: El compuesto verbal implica enviarlo fuera/alejado. En español, «lo enviaron de vuelta» conserva mejor la escena sin añadir contenido ajeno.
  revised_spanish_text: Y procedió a enviar otro esclavo; pero también a ese[a] lo golpearon y lo deshonraron, y lo enviaron de vuelta con las manos vacías.
  revised_footnotes:
  - marker: a
    text: O «siervo» (griego δοῦλος); se usa «esclavo» para preservar aquí la condición de dependencia y pertenencia del personaje en la parábola.
    reason: lexical_alternative
  revision_rationale: 'Se conserva la traducción acertada de δοῦλος como «esclavo» y la estructura general del versículo. Se ajusta la cláusula final para reflejar mejor ἐξαπέστειλαν κενόν en español natural y fiel: «lo enviaron de vuelta con las manos vacías» expresa tanto el envío fuera como el hecho de que regresó sin nada. No se requiere adjudicación adicional.'
