translation:
  language: es
  text: Y tras observarlo[a] atentamente, enviaron espías que fingían ser justos, para poder atraparlo en algo que dijera, y así entregarlo a la jurisdicción y a la autoridad del gobernador[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «vigilarlo de cerca».
    reason: lexical_alternative
  - marker: b
    text: 'O: «entregarlo al gobierno y a la autoridad del gobernador». La pareja de términos probablemente destaca la jurisdicción oficial y la autoridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρατηρήσαντες
  english_pob_choice: after watching him closely
  chosen_spanish: tras observarlo atentamente
  alternatives_spanish:
  - después de vigilarlo de cerca
  - habiéndolo observado cuidadosamente
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal y expresa vigilancia hostil. «Observarlo atentamente» conserva la idea de seguimiento cuidadoso sin sonar demasiado mecánico; «vigilarlo de cerca» también sería válido, pero puede sonar más moderno/policial que el contexto literario.
- source_word: ἐγκαθέτους
  english_pob_choice: spies
  chosen_spanish: espías
  alternatives_spanish:
  - agentes secretos
  - infiltrados
  - hombres apostados
  lexicon: BDAG
  rationale: La palabra designa personas colocadas en secreto para tender una trampa. «Espías» es breve, natural y comunica mejor la intención hostil y encubierta que un calco como «agentes».
- source_word: ὑποκρινομένους ἑαυτοὺς δικαίους εἶναι
  english_pob_choice: who pretended to be righteous
  chosen_spanish: que fingían ser justos
  alternatives_spanish:
  - que se hacían pasar por justos
  - que simulaban ser rectos
  - que fingían ser rectos
  lexicon: BDAG
  rationale: El verbo y el infinitivo describen una autoproyección engañosa. «Justos» mantiene el peso moral-religioso de δίκαιος y suena más natural que «righteous» traducido mecánicamente; «rectos» sería posible, pero en este contexto puede debilitar el matiz religioso.
- source_word: ἵνα ἐπιλάβωνται αὐτοῦ λόγου
  english_pob_choice: so that they might catch him in something he said
  chosen_spanish: para poder atraparlo en algo que dijera
  alternatives_spanish:
  - para sorprenderlo en una palabra
  - para tomarlo de alguna palabra
  - para atraparlo en su propia palabra
  lexicon: BDAG
  rationale: 'La expresión griega es idiomática y forense: se trata de tender una trampa a partir de su discurso. «En algo que dijera» preserva el sentido sin forzar un calco como «en su palabra», que en español resulta opaco.'
- source_word: ὥστε
  english_pob_choice: and thus
  chosen_spanish: y así
  alternatives_spanish:
  - de modo que
  - con el resultado de que
  - para
  lexicon: BDAG
  rationale: Aquí introduce el resultado buscado. «Y así» mantiene la relación consecutiva con fluidez en español.
- source_word: παραδοῦναι
  english_pob_choice: hand him over
  chosen_spanish: entregarlo
  alternatives_spanish:
  - ponerlo en manos de
  - entregarlo a
  - dejarlo en manos de
  lexicon: BDAG
  rationale: En contexto judicial/hostil, παραδίδωμι pide una acción de entrega a una autoridad. «Entregarlo» es claro y conserva el matiz de remisión a poder ajeno; el complemento posterior especifica el destino.
- source_word: τῇ ἀρχῇ
  english_pob_choice: the rule
  chosen_spanish: a la autoridad
  alternatives_spanish:
  - al poder
  - al gobierno
  - a la jurisdicción
  lexicon: BDAG
  rationale: En coordinación con ἐξουσία, ἀρχή puede referir al órgano o instancia gobernante. «Autoridad» en el primer miembro evita una construcción demasiado abstracta como «el poder», y deja espacio al segundo término para intensificar la idea.
- source_word: τῇ ἐξουσίᾳ
  english_pob_choice: authority
  chosen_spanish: y al poder
  alternatives_spanish:
  - y a la autoridad
  - y a la jurisdicción
  - y al dominio
  lexicon: BDAG
  rationale: ἐξουσία enfatiza facultad efectiva para actuar. «Poder» complementa «autoridad» y reproduce la fuerza del par griego sin repetir exactamente el mismo término en español.
- source_word: τοῦ ἡγεμόνος
  english_pob_choice: of the governor
  chosen_spanish: del gobernador
  alternatives_spanish:
  - del gobernante
  - del prefecto
  - del magistrado
  lexicon: BDAG
  rationale: ἡγεμών alude a un funcionario gobernante romano. «Gobernador» es la equivalencia más accesible y conserva el contexto administrativo romano.
theological_decisions:
- issue: δίκαιος en una autodescripción fingida dentro de un plan de trampa
  english_pob_reading: righteous
  chosen_spanish_reading: justos
  alternative_spanish_readings:
  - rectos
  - íntegros
  - piadosos
  rationale: Se mantiene la carga moral del término sin convertirlo en un mero calificativo civil. «Justos» conserva la resonancia religiosa que el contexto lucano sugiere, y evita introducir una explicitación doctrinal que el griego no requiere.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: La pareja ἀρχή / ἐξουσία y su posible énfasis en jurisdicción oficial y poder
  english_pob_reading: the rule and authority of the governor
  chosen_spanish_reading: la autoridad y el poder del gobernador
  alternative_spanish_readings:
  - la jurisdicción y la autoridad del gobernador
  - el gobierno y la autoridad del gobernador
  - la autoridad gobernante del gobernador
  rationale: Se preserva la distinción semántica entre el término que remite a instancia gobernante y el que subraya capacidad efectiva. La redacción elegida mantiene el énfasis en la jurisdicción oficial y en el poder delegado sin neutralizar la duplicación del original.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: el contexto auditable no muestra cambios pendientes y la solución española mantiene el mismo sentido que el texto base inglés, con decisiones léxicas explicadas y sin necesidad de enmiendas adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto solo cuando aparezca el nombre divino; en este versículo no aplica.
  - Se usó «justos» para δίκαιοι en vez de «righteous» calcado, porque el español exige un adjetivo natural y el contexto religioso queda preservado.
  - Se evitó «siervos» o vocabulario eclesiástico que no corresponde al sentido del pasaje.
  - La pareja «autoridad y poder» intenta reflejar la coordinación del griego sin borrar la diferencia semántica entre ἀρχή y ἐξουσία.
