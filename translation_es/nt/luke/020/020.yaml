review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: vigilancia previa, envío de espías, fingimiento de justicia, intención de atraparlo por sus palabras y entrega al gobernador. Sin embargo, las notas al pie están desancladas y cruzadas respecto del English POB: la nota [a] en inglés corresponde a παρατηρήσαντες (''watching him closely''), mientras que el borrador español pone en [a] una alternativa que mezcla además la idea de ''atraparlo en una palabra'', que pertenece a ἵνα ἐπιλάβωνται αὐτοῦ λόγου. La nota [b] también está anclada en ''dijera'', pero su contenido trata de ''autoridad/poder del gobernador''. Además, ''a la autoridad y al poder del gobernador'' es aceptable, pero ''a la jurisdicción y a la autoridad del gobernador'' representa mejor la pareja ἀρχή / ἐξουσία y el razonamiento léxico auditado.'
  spanish_quality_summary: El español es claro y natural, con tono bíblico moderno y legible. 'Tras observarlo atentamente' y 'espías' funcionan bien; 'que fingían ser justos' conserva el matiz moral-religioso. La única reparación necesaria es ordenar correctamente las notas y mejorar ligeramente el final para distinguir mejor los dos sustantivos griegos sin sonar forzado.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Justos' para δικαίους está bien documentado. No aparecen términos del glosario mayor como Yahvé/Mesías/esclavo. La distinción entre ἀρχή y ἐξουσία debe mantenerse más nítida; 'jurisdicción y autoridad' encaja mejor que 'autoridad y poder' en este contexto judicial-administrativo.
  issues:
  - severity: high
    issue: Las notas al pie [a] y [b] están mal asignadas respecto de los segmentos del texto.
    rationale: La nota [a] debería aclarar παρατηρήσαντες ('vigilarlo de cerca'), no mezclar la alternativa de 'atraparlo en una palabra'. La nota [b] en el English POB corresponde al segmento final sobre la autoridad del gobernador, pero en el borrador está anclada en 'dijera', creando desalineación con la evidencia y el rastro de auditoría.
  - severity: medium
    issue: La nota [a] combina dos alternativas de dos expresiones griegas distintas.
    rationale: 'Unir ''vigilarlo de cerca'' con ''atraparlo en una palabra'' en una sola nota confunde dos decisiones léxicas independientes: παρατηρήσαντες y ἐπιλάβωνται... λόγου.'
  - severity: medium
    issue: La pareja 'autoridad y poder' puede expresar el sentido general, pero atenúa la distinción administrativa subrayada en la auditoría inglesa.
    rationale: Dado el contexto judicial y la nota inglesa sobre official jurisdiction and power, 'jurisdicción y autoridad del gobernador' preserva mejor la diferenciación entre ἀρχή y ἐξουσία en español eclesial claro.
  revised_spanish_text: Y tras observarlo[a] atentamente, enviaron espías que fingían ser justos, para poder atraparlo en algo que dijera, y así entregarlo a la jurisdicción y a la autoridad del gobernador[b].
  revised_footnotes:
