translation:
  language: es
  text: 'Pero, al percibir su[a] astucia, les dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «astucia», «artimaña», «ardid» o «engaño». El término griego conlleva la idea de una planificación hábil pero sin escrúpulos.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατανοήσας
  english_pob_choice: perceiving
  chosen_spanish: al percibir
  alternatives_spanish:
  - al notar
  - al darse cuenta de
  - al comprender
  lexicon: BDAG
  rationale: El aoristo participial expresa que Jesús discernió la situación antes de responder. «Al percibir» conserva la idea de advertir con discernimiento, sin volverla más fuerte de lo que permite el griego.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ introduce un giro contrastivo hacia la respuesta de Jesús; «Pero» funciona de manera natural en español y preserva ese matiz.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su[a]
  alternatives_spanish:
  - de ellos
  - su
  lexicon: BDAG
  rationale: El genitivo modifica a πανουργίαν. En español, el posesivo singular «su» es idiomático porque depende del sustantivo singular «astucia»; la referencia plural queda clara por el contexto.
- source_word: πανουργίαν
  english_pob_choice: cunning
  chosen_spanish: astucia
  alternatives_spanish:
  - artimaña
  - ardid
  - engaño
  lexicon: BDAG
  rationale: πανουργία designa una habilidad astuta con sentido moral negativo, de maniobra calculada y sin escrúpulos. «Astucia» es natural en español y puede llevar ese matiz negativo en contexto; las alternativas serían más estrechas o más interpretativas.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - dijo
  lexicon: BDAG
  rationale: El verbo narrativo normal es «dijo». Se incluye el complemento pronominal «les» porque el griego explicita el destinatario con πρός + acusativo.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: πρός con acusativo tras un verbo de habla indica destinatario. En español, el dativo «les» expresa esa dirección de manera más natural que una construcción más literal.
translation_notes:
  revision_awareness: Se mantiene el valor narrativo de la transición con δέ y el matiz negativo de πανουργία sin suavizarlo. La frase queda en estilo publicable y ajustada al griego, con el destinatario de la խոսa verbal marcado por el dativo español.
  spanish_consistency_notes:
  - Se usa «astucia» para πανουργία, coherente con el criterio de preservar un término breve que pueda cargar el matiz moral negativo del contexto.
  - Se usa «Dios»/«Yahvé» no aplica en este versículo.
  - El posesivo «su» se deja en singular por concordancia con «astucia», no como pérdida de pluralidad del referente.
