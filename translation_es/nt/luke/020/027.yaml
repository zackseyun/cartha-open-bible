review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: avance narrativo (δέ -> «Entonces»), grupo partitivo («algunos de los saduceos»), negación doctrinal de la resurrección («que niegan que haya resurrección») y acción principal de dirigirse a Jesús para preguntarle. Sin embargo, «interrogaron» puede sonar más fuerte y judicial que ἐπηρώτησαν en este contexto; el inglés auditado usa «questioned» para anticipar el tono de desafío, pero en español «le preguntaron» mantiene mejor fidelidad y naturalidad sin perder el contexto polémico.'
  spanish_quality_summary: 'El español es claro y legible. La frase fluye bien. Hay dos ajustes menores recomendables: capitalizar «Saduceos» como etnónimo/grupo, y mejorar la nota al pie, quitando comillas sobrantes y haciéndola idiomática. «Le preguntaron» suena más natural que «lo interrogaron» en registro bíblico general.'
  glossary_alignment: No hay términos del glosario mayor en disputa. «resurrección» y «Jesús/lo/le» están bien. La opción «que niegan» concuerda con la decisión léxica y teológica documentada. No hay conflicto con terminología de Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: «lo interrogaron» sobretraduce ἐπηρώτησαν
    rationale: Aunque el contexto es de reto, «interrogar» en español suele implicar examen formal o casi judicial. El griego aquí permite «preguntaron»; el matiz conflictivo vendrá del contexto siguiente sin necesidad de cargar este verbo.
  - severity: low
    issue: Capitalización de «saduceos»
    rationale: En español bíblico y editorial es preferible «Saduceos» como nombre de grupo religioso.
  - severity: low
    issue: Formato y redacción de la nota al pie
    rationale: 'La nota actual incluye comillas innecesarias alrededor de toda la frase y puede simplificarse a un formato más limpio y consistente: «O: “que dicen que no hay resurrección”».'
  revised_spanish_text: Entonces algunos de los Saduceos[a], que niegan que haya resurrección, se acercaron y le preguntaron.
  revised_footnotes:
