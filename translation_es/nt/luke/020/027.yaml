- from: Entonces algunos de los saduceos[a], que niegan que haya resurrección, se acercaron y lo interrogaron.
  to: Entonces algunos de los Saduceos[a], que niegan que haya resurrección, se acercaron y le preguntaron.
  rationale: Se ajusta «interrogaron» a «le preguntaron» por mayor naturalidad y mejor equivalencia semántica en español, se capitaliza «Saduceos», y se normaliza la nota al pie sin cambiar el sentido ni la decisión teológica principal.
