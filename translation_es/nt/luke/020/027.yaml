translation:
  language: es
  text: Entonces algunos de los Saduceos[a], que niegan que haya resurrección, se acercaron y le preguntaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que dicen que no hay resurrección».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσελθόντες
  english_pob_choice: came up
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron
  - se aproximaron
  - se acercaron hasta él
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción previa al verbo principal; en español, 'se acercaron' comunica el movimiento hacia Jesús con naturalidad y sin perder la relación temporal.
- source_word: δέ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Aquí δέ marca avance narrativo, no contraste fuerte; 'Entonces' conserva la progresión del relato de modo claro en español.
- source_word: τινες τῶν Σαδδουκαίων
  english_pob_choice: some of the Sadducees
  chosen_spanish: algunos de los saduceos
  alternatives_spanish:
  - algunos saduceos
  - ciertos saduceos
  lexicon: BDAG
  rationale: La construcción partitiva se refleja mejor con 'algunos de los saduceos', manteniendo visible la estructura griega sin sonar forzado en español.
- source_word: οἱ ἀντιλέγοντες
  english_pob_choice: who deny
  chosen_spanish: que niegan
  alternatives_spanish:
  - que se oponen
  - que contradicen
  - que hablan contra
  lexicon: BDAG
  rationale: En este contexto el participio no expresa solo oposición verbal, sino una negación doctrinal respecto de la resurrección; 'niegan' preserva esa fuerza.
- source_word: ἀνάστασιν
  english_pob_choice: a resurrection
  chosen_spanish: resurrección
  alternatives_spanish:
  - una resurrección
  lexicon: BDAG
  rationale: En español, el sustantivo sin artículo funciona de manera natural en la cláusula dependiente y evita una indefinición innecesaria. El sentido sigue siendo la resurrección como realidad afirmada o negada.
- source_word: μὴ εἶναι
  english_pob_choice: that there is
  chosen_spanish: que haya
  alternatives_spanish:
  - que existe
  - que hay
  lexicon: BDAG
  rationale: Tras 'niegan', el infinitivo con μή se expresa bien con una subordinada de contenido; 'que haya' comunica la existencia negada de manera idiomática y fiel.
- source_word: ἐπηρώτησαν
  english_pob_choice: questioned
  chosen_spanish: interrogaron
  alternatives_spanish:
  - preguntaron
  - consultaron
  - cuestionaron
  lexicon: BDAG
  rationale: En este episodio el verbo apunta a una pregunta de confrontación o examen; 'interrogaron' transmite mejor el matiz que un simple 'preguntaron'.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a Jesús; 'lo' es la forma natural y breve en español.
theological_decisions:
- issue: La posición doctrinal de los saduceos sobre la resurrección
  english_pob_reading: who deny that there is a resurrection
  chosen_spanish_reading: que niegan que haya resurrección
  alternative_spanish_readings:
  - que dicen que no hay resurrección
  - que se oponen a la resurrección
  rationale: La frase griega presenta la postura doctrinal de los saduceos como una negación de la resurrección. La redacción elegida conserva esa tensión sin suavizarla ni convertirla en una formulación más amplia o interpretativa.
  doctrine_reference: Mantener la tensión histórica y doctrinal del texto sin resolverla ni expandirla.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la progresión narrativa con 'Then', usa un partitivo explícito ('some of the Sadducees') y da una nota alternativa para el contenido negado ('who say there is no resurrection'). La versión española conserva esas decisiones con equivalentes naturales y deja la alternativa en nota para no perder la ambigüedad léxica de ἀντιλέγοντες / μὴ εἶναι.
  spanish_consistency_notes:
  - Se conserva 'saduceos' como nombre propio transliterado estándar.
  - '''Resurrección'' se mantiene sin artículo para una fluidez idiomática que no altera el sentido.'
  - '''Interrogaron'' refleja el matiz de pregunta desafiante mejor que ''preguntaron'' en este contexto.'
