lexical_decisions:
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no longer
  - ya no más
  lexicon: BDAG
  rationale: El adverbio expresa cese desde ese punto; en español, 'ya no' comunica con naturalidad ese cambio temporal y conserva la idea de que la acción dejó de ocurrir.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Pues,
  - Ya que
  lexicon: BDAG
  rationale: '''γάρ'' introduce explicación o razón; ''Pues'' mantiene ese enlace explicativo en español sin forzar una causalidad demasiado fuerte.'
- source_word: ἐτόλμων
  english_pob_choice: dared
  chosen_spanish: se atrevían
  alternatives_spanish:
  - osaban
  - tenían el valor de
  lexicon: BDAG
  rationale: El imperfecto sugiere una disposición o acción habitual en pasado; 'se atrevían' reproduce bien el matiz de osadía/coraje y su continuidad previa al cese indicado por 'ya no'.
- source_word: ἐπερωτᾶν
  english_pob_choice: to ask
  chosen_spanish: preguntarle
  alternatives_spanish:
  - interrogarle
  - hacerle preguntas
  lexicon: BDAG
  rationale: En este contexto de discusión con Jesús, 'preguntarle' es la forma más natural en español para el infinitivo complementario y conserva el sentido de dirigirse a él con una pregunta.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - lo
  lexicon: BDAG
  rationale: El pronombre objeto se refiere a Jesús; en español, el dativo clítico 'le' en 'preguntarle' expresa de forma idiomática el complemento indirecto personal.
- source_word: οὐδέν
  english_pob_choice: anything
  chosen_spanish: nada
  alternatives_spanish:
  - nada en absoluto
  - ninguna cosa
  lexicon: BDAG
  rationale: Tras un verbo de preguntar en una cláusula negada, 'nada' expresa con naturalidad la amplitud total del objeto omitido por la negación; mantiene el alcance enfático de οὐδέν.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y concuerda con el audit trail inglés, que entiende οὐκέτι como cesación temporal ('no longer') y οὐδέν como objeto totalizado ('anything'). No se detectan revisiones textuales ni tensiones lexicoteológicas especiales en este versículo.
  spanish_consistency_notes:
  - Se mantiene 'ya no' para οὐκέτι en coherencia con el valor aspectual de cese.
  - Se usa 'preguntarle' con clítico dativo para una sintaxis española natural y reverente.
  - No se introduce 'Cristo', 'Señor' ni otras sustituciones no presentes en el versículo.
