    text: O «a casa». El griego literalmente dice «a sí mismo», lo cual puede indicar que Pedro se fue solo o en reflexión interior.
    reason: alternative_reading
  - marker: b
    text: Algunos manuscritos omiten todo este versículo.
    reason: textual_variant
  revision_rationale: 'Se corrigió la frase no idiomática «se fue a sí mismo» por «se fue por su cuenta», que suena natural en español y conserva razonablemente la idea de salir solo o en reflexión, mientras la nota preserva el literal griego y la alternativa «a casa». También se reubicaron las notas para que correspondan al lugar textual correcto: la alternativa de πρὸς αὑτὸν en la frase final, y la variante textual en el versículo mismo.'
