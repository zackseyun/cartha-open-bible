review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia básica del griego: Pedro se levanta, corre al sepulcro, se inclina para mirar, ve los lienzos solos y se va maravillado por lo ocurrido. También preserva la nota de variante textual. Sin embargo, hay un problema de anclaje y correspondencia de notas: la nota sobre «a casa / a sí mismo» está colocada en «sepulcro[a]», cuando debe anclarse en la frase que traduce πρὸς αὑτὸν. Además, «se fue a sí mismo» es demasiado literal y suena antinatural en español, sin comunicar bien la ambigüedad reflexiva del griego.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «se fue a sí mismo» resulta poco idiomático y distrae al lector. Una formulación como «se fue por su cuenta» preserva mejor la idea de irse solo o en recogimiento, mientras la nota puede conservar la alternativa «a casa» y explicar el literal griego «a sí mismo». También conviene mover la nota textual al lugar pertinente del versículo y no asociarla con una palabra equivocada.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Sepulcro», «Pedro», y «lienzos de lino» son adecuados. La principal cuestión léxica es πρὸς αὑτὸν: el borrador afirma correctamente en sus decisiones que no debe fijarse «a casa» en el texto principal, pero la redacción escogida («a sí mismo») no es buena español en este contexto. «Por su cuenta» refleja mejor el sentido probable sin cerrar indebidamente la ambigüedad, y la nota puede conservar el literal griego y la alternativa tradicional.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en «sepulcro», pero su contenido corresponde a πρὸς αὑτὸν.
    rationale: La nota explica la lectura alternativa «a casa» frente al literal «a sí mismo»; por tanto debe aparecer junto a la frase final de movimiento, no junto a «sepulcro».
  - severity: high
    issue: «Se fue a sí mismo» es antinatural en español.
    rationale: Aunque intenta preservar el literal griego, en español no comunica bien el sentido y suena incorrecto. Debe usarse una formulación natural en texto principal y reservar el literal para nota.
  - severity: medium
    issue: La nota textual [b] debe anclarse de manera coherente al versículo revisado.
    rationale: La nota de variante sobre la omisión del versículo entero no debe quedar asociada a una palabra que porta otra nota semántica; conviene ubicarla al inicio o al final del versículo para evitar confusión.
  revised_spanish_text: Pero Pedro se levantó y corrió al sepulcro[b]; y, asomándose para mirar dentro, vio los lienzos de lino solos; y se fue por su cuenta[a], maravillándose de lo que había sucedido.
  revised_footnotes:
