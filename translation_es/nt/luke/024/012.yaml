revisions:
- from: Pero Pedro se levantó y corrió al sepulcro[a]; y, asomándose para mirar dentro, vio los lienzos de lino solos, y se fue a sí mismo[b], maravillándose de lo que había sucedido.
  to: Pero Pedro se levantó y corrió al sepulcro[b]; y, asomándose para mirar dentro, vio los lienzos de lino solos; y se fue por su cuenta[a], maravillándose de lo que había sucedido.
  rationale: 'Se corrigió la frase no idiomática «se fue a sí mismo» por «se fue por su cuenta», que suena natural en español y conserva razonablemente la idea de salir solo o en reflexión, mientras la nota preserva el literal griego y la alternativa «a casa». También se reubicaron las notas para que correspondan al lugar textual correcto: la alternativa de πρὸς αὑτὸν en la frase final, y la variante textual en el versículo mismo.'
  reviewer_model: gpt-5.4
