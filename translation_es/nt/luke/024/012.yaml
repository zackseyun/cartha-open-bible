translation:
  language: es
  text: Pero Pedro se levantó y corrió al sepulcro[b]; y, asomándose para mirar dentro, vio los lienzos de lino solos; y se fue por su cuenta[a], maravillándose de lo que había sucedido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a casa». El griego literalmente dice «a sí mismo», lo cual puede indicar que Pedro se fue solo o en reflexión interior.
    reason: alternative_reading
  - marker: b
    text: Algunos manuscritos omiten todo este versículo.
    reason: textual_variant
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: El participio aoristo marca la acción inmediata de ponerse en movimiento. «Se levantó» conserva esa secuencia natural en español sin volverlo rígido ni agregar matices no presentes.
- source_word: ἔδραμεν
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - se apresuró
  - salió corriendo
  lexicon: BDAG
  rationale: El verbo indica correr de manera directa. «Corrió» es la opción más fiel y transparente para el lector español.
- source_word: ἐπὶ τὸ μνημεῖον
  english_pob_choice: to the tomb
  chosen_spanish: al sepulcro
  alternatives_spanish:
  - a la tumba
  - al memorial sepulcro
  lexicon: BDAG
  rationale: En este contexto funerario, «sepulcro» comunica bien el lugar de entierro. Es equivalente funcional de «tomb» y más idiomático en español bíblico que una calca más dura.
- source_word: παρακύψας
  english_pob_choice: stooping to look in
  chosen_spanish: asomándose para mirar dentro
  alternatives_spanish:
  - agachándose para mirar dentro
  - inclinándose para mirar dentro
  lexicon: BDAG
  rationale: El verbo expresa una postura de inclinarse o asomarse para ver el interior. «Asomándose para mirar dentro» conserva tanto la postura como la acción visual en un español natural.
- source_word: ὀθόνια
  english_pob_choice: the linen cloths
  chosen_spanish: los lienzos de lino
  alternatives_spanish:
  - las vendas de lino
  - los paños de lino
  lexicon: BDAG
  rationale: ὀθόνια se refiere a telas de lino asociadas con el entierro. «Lienzos de lino» mantiene la referencia material sin sobreinterpretar si eran vendas específicas.
- source_word: μόνα
  english_pob_choice: alone
  chosen_spanish: solos
  alternatives_spanish:
  - solamente
  - solamente allí
  lexicon: BDAG
  rationale: El adjetivo enfatiza que los lienzos estaban allí sin el cuerpo. «Solos» preserva esa exclusividad de forma concisa y natural.
- source_word: πρὸς αὑτὸν
  english_pob_choice: to himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - para sí
  - hacia sí
  lexicon: BDAG
  rationale: La construcción reflexiva se conserva literalmente para mantener la tensión interpretativa del griego. En español puede sugerir retiro interior o una ida en soledad; no se fija «a casa» en el texto principal porque eso sería más interpretativo que el griego mismo.
- source_word: θαυμάζων
  english_pob_choice: marveling
  chosen_spanish: maravillándose
  alternatives_spanish:
  - asombrándose
  - admirándose
  lexicon: BDAG
  rationale: El participio describe un estado continuo de asombro. «Maravillándose» reproduce bien ese matiz de admiración sorprendente sin intensificarlo demasiado.
- source_word: τὸ γεγονός
  english_pob_choice: what had happened
  chosen_spanish: lo que había sucedido
  alternatives_spanish:
  - lo acontecido
  - el hecho ocurrido
  lexicon: BDAG
  rationale: El participio perfecto sustantivado apunta al evento ya cumplido. «Lo que había sucedido» es claro, fiel e idiomático en español.
theological_decisions:
- issue: Interpretación de πρὸς αὑτὸν
  english_pob_reading: to himself
  chosen_spanish_reading: a sí mismo
  alternative_spanish_readings:
  - a casa
  - para sí
  rationale: Se conserva la ambigüedad del griego sin convertirla en una afirmación más precisa de lo que el texto dice. «A casa» es posible en algunas tradiciones de traducción, pero aquí se deja como alternativa porque el griego no lo expresa de manera directa.
  doctrine_reference: Lucas 24:12; principio POB de no cerrar ambigüedades interpretativas sin base textual suficiente
- issue: Variante textual de todo el versículo
  english_pob_reading: Some manuscripts omit this entire verse.
  chosen_spanish_reading: Algunos manuscritos omiten todo este versículo.
  alternative_spanish_readings:
  - Este versículo falta en algunos manuscritos.
  - Hay manuscritos que omiten todo el versículo.
  rationale: La nota textual debe preservarse porque la tradición manuscrita ofrece una omisión completa del versículo en algunos testigos. Esto es relevante para la transparencia del texto y para la auditable history of the passage.
  doctrine_reference: Crítica textual del NT; nota de variante manuscrita
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail en inglés, que ajustó la narración de presente histórico a pasado simple para naturalidad. En español se mantuvo el pretérito narrativo coherente con el flujo del versículo, y se conservó la literalidad de πρὸς αὑτὸν mediante una formulación reflexiva ambigua.
  spanish_consistency_notes:
  - Se usó «sepulcro» para μνημεῖον siguiendo el registro funerario bíblico y la claridad para lectores hispanohablantes.
  - Se evitó «Cristo» o terminología confesional ajena al verso; el texto nombra solo a Pedro.
  - «Lienzos de lino» conserva el dato material sin sobreespecificar vendajes.
  - La nota textual se ancla al final del versículo porque afecta la existencia misma del pasaje en algunos manuscritos.
