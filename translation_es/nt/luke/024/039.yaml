translation:
  language: es
  text: Miren mis manos y mis pies[a], que soy yo mismo. Tóquenme y vean[d][c][b], porque un espíritu no tiene carne y huesos, como ven que yo tengo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que yo soy él». La expresión griega es enfática: «yo mismo soy [el mismo]».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «siéntanme» o «manéjenme / pálpenme».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «un fantasma». La palabra griega es «espíritu».'
    reason: alternative_reading
  - marker: d
    text: 'O: «Miren mis manos y mis pies, porque soy yo mismo».'
    reason: previous_rendering
lexical_decisions:
- source_word: ἴδετε
  english_pob_choice: Look at / see
  chosen_spanish: Miren / vean
  alternatives_spanish:
  - Vean
  - Miren
  lexicon: BDAG
  rationale: El imperativo aoristo plural pide una inspección inmediata. En español, alternar «miren» y «vean» conserva la naturalidad sin perder el valor de observación atenta.
- source_word: τὰς χεῖράς μου καὶ τοὺς πόδας μου
  english_pob_choice: my hands and my feet
  chosen_spanish: mis manos y mis pies
  alternatives_spanish:
  - mis manos y mis pies
  - mis manos y mis plantas de los pies
  lexicon: BDAG
  rationale: Los términos concretos del cuerpo se traducen de forma directa. «Mis pies» es la equivalencia natural y fiel en español; no hace falta una paráfrasis más explícita.
- source_word: ὅτι ἐγώ εἰμι αὐτός
  english_pob_choice: that it is I myself
  chosen_spanish: porque yo mismo soy
  alternatives_spanish:
  - que soy yo mismo
  - que yo mismo soy
  lexicon: BDAG
  rationale: La expresión griega es enfática. En español, «yo mismo soy» transmite la identificación personal con fuerza y naturalidad. El causal «porque» refleja bien el valor explicativo permitido por el contexto y la revisión auditada en inglés.
- source_word: ψηλαφήσατέ με
  english_pob_choice: Touch me
  chosen_spanish: Tóquenme
  alternatives_spanish:
  - Tóquenme
  - Háganme el favor de tocarme
  - Palpenme
  lexicon: BDAG
  rationale: El verbo puede implicar tocar para verificar por medio del contacto. «Tóquenme» es más natural que «palpenme» en español moderno, pero conserva la invitación a la verificación física.
- source_word: πνεῦμα
  english_pob_choice: a spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - un espíritu
  - un fantasma
  lexicon: BDAG
  rationale: Se mantiene el equivalente directo «espíritu». «Fantasma» es posible culturalmente, pero no es el término más directo al léxico griego y puede introducir connotaciones ajenas.
- source_word: σάρκα καὶ ὀστέα
  english_pob_choice: flesh and bones
  chosen_spanish: carne y huesos
  alternatives_spanish:
  - carne y huesos
  - carne y hueso
  lexicon: BDAG
  rationale: La expresión es corporal y literal. «Carne y huesos» es la equivalencia establecida y natural en español, preservando la afirmación tangible del cuerpo resucitado.
- source_word: θεωρεῖτε
  english_pob_choice: you see
  chosen_spanish: ven
  alternatives_spanish:
  - ven
  - observan
  lexicon: BDAG
  rationale: Aquí el verbo expresa observación atenta dentro de una apelación a la evidencia visible. «Ven» en «como ven» es fluido y conserva el sentido perceptivo sin volverse técnico.
- source_word: ἔχοντα
  english_pob_choice: that I have
  chosen_spanish: que yo tengo
  alternatives_spanish:
  - que yo tengo
  - como a mí me ven teniendo
  lexicon: BDAG
  rationale: El participio se integra mejor en español como cláusula finita. «Que yo tengo» reproduce de forma natural la relación entre la observación de los discípulos y la posesión corporal de Jesús.
theological_decisions:
- issue: Afirmación del cuerpo resucitado de Jesús
  english_pob_reading: 'Explicitly bodily language retained: ''a spirit does not have flesh and bones as you see that I have.'''
  chosen_spanish_reading: 'Lenguaje corporal explícito conservado: «un espíritu no tiene carne y huesos, como ven que yo tengo».'
  alternative_spanish_readings:
  - «un espíritu no tiene cuerpo»
  - «un espíritu no tiene carne ni huesos»
  rationale: El griego insiste en la corporeidad tangible por medio de los imperativos de ver y tocar, y por la expresión concreta «carne y huesos». La traducción preserva esa tensión sin suavizarla teológicamente.
  doctrine_reference: Definición de Calcedonia (451 d. C.); principio de conservar la tensión teológica del texto
translation_notes:
  revision_awareness: El texto en inglés pasó por una revisión que ajustó la primera cláusula de ὅτι entre «for» y «that» para reflejar mejor el valor explicativo o de contenido. En español, se resolvió con «porque» + «yo mismo soy», lo que conserva la fuerza enfática y la fluidez sintáctica sin perder la relación lógica del versículo.
  spanish_consistency_notes:
  - Se usa «espíritu» para πνεῦμα, no «fantasma», aunque se ofrece como alternativa en nota por su posibilidad contextual.
  - Se mantiene «carne y huesos» para σάρκα καὶ ὀστέα, evitando la paráfrasis «cuerpo» que diluiría el contraste.
  - «Yo mismo soy» conserva la identidad enfática de ἐγώ εἰμι αὐτός sin recurrir a fórmulas eclesiales más cargadas.
  - Se prefiere el voseo no; se usa el tuteo plural estándar «miren», «vean», «tóquenme» para registro neutral latinoamericano.
