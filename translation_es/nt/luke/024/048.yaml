translation:
  language: es
  text: Ustedes son testigos de estas cosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «Ustedes son testigos de estas». El demostrativo griego remite a los hechos que Jesús acaba de mencionar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: You
  chosen_spanish: Ustedes
  alternatives_spanish:
  - Tú
  - Vosotros
  lexicon: BDAG
  rationale: El pronombre plural explícito conserva el énfasis del griego y suena natural en español neutral. 'Ustedes' comunica bien la dirección directa a los discípulos sin regionalismos peninsulares ni pérdida de fuerza.
- source_word: ἐστε
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - están
  lexicon: BDAG
  rationale: '''Son'' reproduce de manera simple la cópula presente del griego. ''Están'' sugeriría estado o ubicación, menos adecuado aquí.'
- source_word: μάρτυρες
  english_pob_choice: witnesses
  chosen_spanish: testigos
  alternatives_spanish:
  - testigos oculares
  - mártires
  lexicon: BDAG
  rationale: '''Testigos'' es el equivalente natural en español para la función testimonial del término en este contexto. ''Mártires'' introduciría una asociación posterior no exigida aquí; ''testigos oculares'' explicita más de lo que el texto dice.'
- source_word: τούτων
  english_pob_choice: of these things
  chosen_spanish: de estas cosas
  alternatives_spanish:
  - de éstas
  - de estos acontecimientos
  lexicon: BDAG
  rationale: El demostrativo plural genitivo se refiere a los hechos que Jesús acaba de mencionar. 'De estas cosas' mantiene la referencia amplia y directa, equivalente a la decisión inglesa sin forzar una precisión interpretativa adicional.
theological_decisions:
- issue: 'Alcance de μάρτυρες: testimonio vs. martirio'
  english_pob_reading: The verse identifies the disciples as those who bear testimony to the events just recounted, without importing later technical martyrdom connotations.
  chosen_spanish_reading: El versículo identifica a los discípulos como quienes dan testimonio de los hechos recién mencionados, sin introducir la connotación técnica posterior de 'mártir'.
  alternative_spanish_readings:
  - Los discípulos son mártires de estas cosas.
  - Ustedes son testigos y mártires de estas cosas.
  rationale: En este contexto inmediato, el sentido es testimonial. Traducir con 'mártires' oscurecería el mandato de dar testimonio y añadiría una carga histórica-teológica no presente en la frase griega.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto y la decisión léxica se mantienen en acuerdo alto con el cotejo previo.
  spanish_consistency_notes:
  - Se mantiene 'Ustedes' como sujeto plural explícito para conservar el énfasis del griego.
  - '''Testigos'' se usa consistentemente para μάρτυρες en su sentido inmediato de testimonio, no de martirio.'
  - '''De estas cosas'' preserva la ambigüedad referencial del demostrativo sin sobreespecificar los hechos aludidos.'
