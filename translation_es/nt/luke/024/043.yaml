translation:
  language: es
  text: Y tomándolo[a], lo comió delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice simplemente «tomando» y «comió», con el objeto implícito tomado del versículo anterior: el pedazo de pescado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y luego
  lexicon: BDAG
  rationale: Conecta la acción con el versículo anterior sin añadir una relación temporal más fuerte que la del griego; en español narrativo, «Y» mantiene la continuidad con naturalidad.
- source_word: λαβὼν
  english_pob_choice: taking it
  chosen_spanish: tomando aquello
  alternatives_spanish:
  - habiendo tomado aquello
  - tomándolo
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa al verbo principal. En español, «tomando» conserva la secuencia narrativa; «aquello» refleja el objeto implícito recuperable del contexto inmediato sin forzar el texto.
- source_word: ἐνώπιον αὐτῶν
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - en su presencia
  - ante ellos
  lexicon: BDAG
  rationale: La frase indica que la acción ocurrió a la vista de los discípulos. «Delante de ellos» es natural en español y conserva el valor evidencial de la escena.
- source_word: ἔφαγεν
  english_pob_choice: he ate it
  chosen_spanish: lo comió
  alternatives_spanish:
  - comió
  - lo estaba comiendo
  lexicon: BDAG
  rationale: El aoristo narrativo comunica una acción completa. «Lo comió» hace explícito el objeto implícito del contexto previo, como en la versión inglesa auditada, sin añadir información ajena al griego.
theological_decisions:
- issue: Objeto implícito de los verbos y evidencia corporal de la resurrección
  english_pob_reading: Supplied 'it' in English for both verbs
  chosen_spanish_reading: Se explicita el objeto como «aquello» / «lo» para claridad narrativa
  alternative_spanish_readings:
  - Y tomando, lo comió delante de ellos.
  - Y tomando aquello, comió delante de ellos.
  rationale: 'El griego omite el objeto porque ya viene del versículo anterior; el español necesita referirlo con claridad. Mantenerlo implícito en ambos verbos oscurecería la escena. La redacción conserva la fuerza testimonial del acto: Jesús resucitado come ante ellos, subrayando su realidad corporal sin sobreexplicar la implicación doctrinal.'
  doctrine_reference: Cristología ortodoxa; resurrección corporal real
- issue: Valor de ἐνώπιον como acto público y verificable
  english_pob_reading: before them
  chosen_spanish_reading: delante de ellos
  alternative_spanish_readings:
  - en su presencia
  - ante ellos
  rationale: La preposición no solo marca ubicación, sino que aporta un matiz de testimonio público. «Delante de ellos» mantiene esa visibilidad directa y la escena de comprobación.
  doctrine_reference: Testimonio apostólico; resurrección corporal
translation_notes:
  revision_awareness: El contexto auditado en inglés mantiene la omisión griega del objeto pero lo explicita por claridad. No se detectaron revisiones sustantivas en el pasaje; la traducción española sigue esa misma decisión, con ajuste idiomático mínimo para conservar naturalidad.
  spanish_consistency_notes:
  - Se prefirió «delante de ellos» por coherencia con el valor visible/testimonial de ἐνώπιον.
  - «Aquello» evita introducir un sustantivo no presente en el versículo; el referente se recupera del contexto inmediato.
  - Se mantuvo un registro sobrio y narrativo, acorde con el estilo POB en español.
