translation:
  language: es
  text: Y sucedió que, mientras ellos hablaban y discutían[a], Jesús mismo se acercó[b] e iba con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debatían» o «argüían»; el griego puede sugerir una discusión más intensa.
    reason: lexical_alternative
  - marker: b
    text: O «se aproximó» e «iba con ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y ocurrió que
  lexicon: BDAG
  rationale: La fórmula narrativa de γίνομαι en Lucas introduce un cambio de escena; «sucedió que» conserva ese valor idiomático sin sonar arcaico.
- source_word: ἐν τῷ ὁμιλεῖν αὐτοὺς
  english_pob_choice: while they were talking
  chosen_spanish: mientras ellos hablaban
  alternatives_spanish:
  - mientras conversaban
  - cuando estaban hablando
  lexicon: BDAG
  rationale: La construcción articular con infinitivo es temporal; «mientras» expresa bien la simultaneidad. «Hablaban» comunica ὁμιλέω como conversación ordinaria.
- source_word: συζητεῖν
  english_pob_choice: discussing
  chosen_spanish: discutían
  alternatives_spanish:
  - debatían
  - razonaban juntos
  - argüían
  lexicon: BDAG
  rationale: συζητέω puede abarcar discusión intensa o debate. «Discutían» mantiene esa amplitud sin fijar innecesariamente una hostilidad explícita.
- source_word: αὐτὸς Ἰησοῦς
  english_pob_choice: Jesus himself
  chosen_spanish: Jesús mismo
  alternatives_spanish:
  - el mismo Jesús
  - Jesús en persona
  lexicon: BDAG
  rationale: El pronombre es enfático en aposición al nombre; «mismo» preserva esa énfasis narrativa.
- source_word: ἐγγίσας
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - se puso cerca
  lexicon: BDAG
  rationale: El participio aoristo indica la acción de aproximarse antes de la acción principal; «se acercó» es natural y fiel.
- source_word: συνεπορεύετο
  english_pob_choice: was going with them
  chosen_spanish: siguió caminando con ellos
  alternatives_spanish:
  - iba con ellos
  - seguía con ellos
  - caminaba con ellos
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua de acompañamiento; «siguió caminando con ellos» conserva ese movimiento progresivo en un español claro.
theological_decisions:
- issue: Énfasis narrativo en la identidad del que se acerca
  english_pob_reading: Jesus himself came near
  chosen_spanish_reading: Jesús mismo se acercó
  alternative_spanish_readings:
  - Jesús se acercó
  - el mismo Jesús se acercó
  rationale: La gramática subraya que es Jesús quien se aproxima personalmente; conviene mantener ese énfasis sin añadir inferencias doctrinales.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente ambos marcadores en el texto español, manteniendo las alternativas lexicográficas documentadas por el POB en inglés y preservando el énfasis de αὐτὸς Ἰησοῦς.
  spanish_consistency_notes:
  - Se usó «Jesús» y no «Cristo» porque el nombre propio griego es Ἰησοῦς.
  - Se evitó «Señor» porque el versículo no contiene κύριος ni un sustituto del nombre divino.
  - «Discutían» conserva la posibilidad de debate intenso sin forzar «pelear» o «argumentaban».
  - El progresivo de συνεπορεύετο se reflejó con una perífrasis continua para no perder el imperfecto.
