translation:
  language: es
  text: Y ellos hablaban entre sí acerca de todas estas cosas que habían sucedido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'conversaban entre sí acerca de todos estos acontecimientos que habían ocurrido.'
