lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y entonces
  lexicon: BDAG
  rationale: Conserva la conexión narrativa simple del griego sin añadir una marca temporal que el conjuntivo no exige.
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: BDAG
  rationale: El pronombre explícito se expresa de forma natural en español con el sujeto 'ellos'; la fuerza enfática es leve y no requiere 'ellos mismos'.
- source_word: ὡμίλουν
  english_pob_choice: were talking
  chosen_spanish: hablaban
  alternatives_spanish:
  - conversaban
  - estaban hablando
  lexicon: BDAG
  rationale: El imperfecto indica acción continua en el pasado; 'hablaban' lo comunica con naturalidad sin sobrecargar la frase.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: with one another
  chosen_spanish: entre sí
  alternatives_spanish:
  - con unos con otros
  - los unos con los otros
  lexicon: BDAG
  rationale: La relación recíproca de la conversación queda bien expresada en español con 'entre sí', que es idiomático y claro.
- source_word: περὶ
  english_pob_choice: about
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - con respecto a
  lexicon: BDAG
  rationale: Introduce el tema de la conversación; 'acerca de' mantiene precisión y es plenamente natural en español.
- source_word: πάντων τῶν συμβεβηκότων τούτων
  english_pob_choice: all these things that had happened
  chosen_spanish: todas estas cosas que habían sucedido
  alternatives_spanish:
  - todos estos acontecimientos que habían ocurrido
  - todos estos hechos que habían tenido lugar
  lexicon: BDAG
  rationale: El participio perfecto de συμβαίνω se refiere a eventos ya ocurridos; 'habían sucedido' conserva ese sentido completivo en español, y 'cosas' refleja el referente amplio del texto.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota a pie de página no anclada; la traducción queda sin notas porque no hay una alternativa lexical imprescindible que deba destacarse en este verso.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y narrativo, acorde con el griego.
  - No se introduce terminología eclesiástica o doctrinal ajena al versículo.
  - '''entre sí'' preserva la reciprocidad de πρὸς ἀλλήλους sin sonar mecánico.'
