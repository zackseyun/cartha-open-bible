translation:
  language: es
  text: ¿No era necesario que el Mesías[a] padeciera estas cosas y entrara en su gloria?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo». El título griego Χριστός se traduce aquí como «Mesías» para conservar su sentido en el contexto de cumplimiento escritural.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐχὶ
  english_pob_choice: Was it not
  chosen_spanish: ¿No era necesario...?
  alternatives_spanish:
  - ¿No fue necesario... ?
  - ¿No debía...?
  lexicon: BDAG
  rationale: La pregunta espera una respuesta afirmativa. En español, una formulación interrogativa con «¿No era necesario...?» conserva esa fuerza sin sonar forzada.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  - estas circunstancias
  lexicon: BDAG
  rationale: El neutro plural apunta a los padecimientos y hechos ya mencionados; «estas cosas» mantiene la referencia demostrativa de manera natural.
- source_word: ἔδει
  english_pob_choice: was ... necessary
  chosen_spanish: era necesario
  alternatives_spanish:
  - debía
  - tenía que
  lexicon: BDAG
  rationale: «Era necesario» reproduce la idea de necesidad del plan divino sin volverla mera obligación externa ni añadir explicación interpretativa.
- source_word: παθεῖν
  english_pob_choice: to suffer
  chosen_spanish: padeciera
  alternatives_spanish:
  - sufriera
  - pasara por sufrimientos
  lexicon: BDAG
  rationale: En este contexto verbal, «padeciera» expresa con naturalidad el sufrir de Cristo y conserva la dignidad del registro bíblico en español.
- source_word: τὸν χριστὸν
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Siguiendo la decisión POB de traducir el título Χριστός como «Mesías» en contexto de cumplimiento escritural, se preserva su valor titular y mesiánico.
- source_word: εἰσελθεῖν εἰς τὴν δόξαν αὐτοῦ
  english_pob_choice: to enter into his glory
  chosen_spanish: entrara en su gloria
  alternatives_spanish:
  - entrara en la gloria de él
  - entrara en su gloria
  lexicon: BDAG
  rationale: «Entrara en su gloria» conserva el movimiento de entrada y la posesión implícita del pronombre sin sobreexplicar la esfera de glorificación.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: BDAG
  rationale: «Gloria» es la equivalencia teológicamente adecuada y más estable en español para δόξα en un contexto de exaltación/resurrección.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El posesivo directo en español transmite de forma clara y no interpretativa la relación de pertenencia expresada por el genitivo.
theological_decisions:
- issue: Renderización de Χριστός como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La escena de Lucas 24 enfatiza el cumplimiento de las Escrituras; traducir el título como «Mesías» preserva su sentido histórico-redentor y evita que funcione solo como nombre propio.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve scriptural-fulfillment context'
- issue: Fuerza de ἔδει como necesidad divina
  english_pob_reading: was ... necessary
  chosen_spanish_reading: era necesario
  alternative_spanish_readings:
  - debía
  - tenía que
  rationale: La necesidad no se reduce a obligación humana; «era necesario» mantiene la tensión teológica de un designio divino sin explicitar más de lo que el texto dice.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y coincide con el criterio auditado del POB inglés: Χριστός se vierte como «Mesías», ἔδει se expresa con necesidad divina en forma natural, y δόξα se mantiene como «gloria». No se detectaron revisiones previas adicionales que requirieran ajuste.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente y bíblico del título «Mesías» coherente con otros pasajes del POB en los que Χριστός funciona como título.
  - «Era necesario» evita el calco rígido y suena idiomático en español sin perder la nota de necesidad salvífica.
  - La puntuación interrogativa española se ajusta al orden natural del idioma, conservando la pregunta retórica del original.
