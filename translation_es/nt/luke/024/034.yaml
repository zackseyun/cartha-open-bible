translation:
  language: es
  text: 'diciendo[a]: «El Señor verdaderamente ha sido resucitado y ha aparecido a Simón»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El Señor realmente ha resucitado» o «El Señor en verdad fue resucitado». El adverbio griego y el verbo admiten varias traducciones cercanas; el texto principal conserva la voz pasiva del griego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντας
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - decían
  - al decir
  lexicon: BDAG
  rationale: El participio presente de λέγω se refleja mejor con un gerundio español que mantenga la relación sintáctica con el contexto mayor sin introducir un sujeto explícito no requerido por el versículo.
- source_word: ὅτι
  english_pob_choice: “
  chosen_spanish: ': «'
  alternatives_spanish:
  - que
  - —
  lexicon: BDAG
  rationale: En español, los dos puntos introducen naturalmente el contenido del discurso; las comillas conservan el valor citativo sin forzar una subordinación con 'que' cuando el texto presenta contenido directo.
- source_word: ὄντως
  english_pob_choice: truly
  chosen_spanish: en verdad
  alternatives_spanish:
  - realmente
  - de veras
  - ciertamente
  lexicon: BDAG
  rationale: '''En verdad'' comunica con solemnidad y claridad la fuerza afirmativa de ὄντως. Evita una coloquialidad excesiva y preserva el matiz de afirmación factual.'
- source_word: ἠγέρθη
  english_pob_choice: has been raised
  chosen_spanish: ha sido levantado
  alternatives_spanish:
  - ha resucitado
  - fue levantado
  - ha sido resucitado
  lexicon: BDAG
  rationale: Se conserva la pasiva del griego. 'Ha sido levantado' mantiene la forma pasiva y la idea de acción recibida, aunque en español suena menos natural que 'ha resucitado'; se prefiere aquí para no perder la voz pasiva que el POB inglés también preservó.
- source_word: ὁ κύριος
  english_pob_choice: The Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: En este contexto cristológico, κύριος funciona como título de Jesús. 'El Señor' es el equivalente español natural y respeta la carga titular del término sin debilitarla.
- source_word: ὤφθη
  english_pob_choice: has appeared
  chosen_spanish: se ha aparecido
  alternatives_spanish:
  - ha aparecido
  - fue visto
  lexicon: BDAG
  rationale: La pasiva aorística idiomática de ὁράω en apariciones de resurrección se expresa en español con 'se ha aparecido', que conserva la dimensión de manifestación personal más que un simple 'apareció'.
- source_word: Σίμωνι
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simón Pedro
  lexicon: BDAG
  rationale: El dativo del nombre propio se traslada como 'a Simón'. No hay en el griego una explicitación de 'Pedro', por lo que se mantiene la forma breve.
theological_decisions:
- issue: Voz pasiva en la resurrección
  english_pob_reading: has been raised
  chosen_spanish_reading: ha sido levantado
  alternative_spanish_readings:
  - ha resucitado
  - fue levantado
  rationale: La forma pasiva del griego es relevante y el audit trail inglés la preserva. En español, 'ha sido levantado' mantiene esa pasividad, aun cuando 'ha resucitado' sería más idiomático; se prioriza la fidelidad a la forma fuente.
  doctrine_reference: 'Translation philosophy: preserve source-text sense; do not paraphrase beyond what the source warrants.'
- issue: Título cristológico κύριος
  english_pob_reading: The Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  rationale: La guía del proyecto fija 'Lord' como traducción base de κύριος. En este anuncio de resurrección se trata de un título cristológico para Jesús, por lo que 'el Señor' conserva su peso doctrinal y literario.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El texto inglés revisado eliminó una coma antes de 'and' para un estilo más fluido, sin cambiar el sentido. El español no requiere esa decisión puntual, pero sí conserva la misma secuencia de dos afirmaciones unidas por 'y' con una sola cita directa. La elección de la pasiva en ambos verbos principales sigue el audit trail inglés y la forma verbal del griego.
  spanish_consistency_notes:
  - Se mantiene 'el Señor' para κύριος conforme al estándar del proyecto.
  - Se preserva la pasiva en ambos verbos principales para reflejar ἠγέρθη y ὤφθη.
  - '''Simón'' se deja sin expansión a ''Simón Pedro'' porque el griego no la explicita.'
