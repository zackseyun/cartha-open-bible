    rationale: En español estándar, la forma correcta aquí es 'se proclamará'. Sin tilde, la forma se interpreta como imperfecto de subjuntivo y no comunica adecuadamente el valor de mandato/predicción dependiente del contexto.
  - severity: low
    issue: Nota b repite el texto principal como alternativa
    rationale: La nota dice 'O “a todas las naciones”', que es idéntico al texto base. Debe reflejar la alternativa real documentada en el audit trail inglés, por ejemplo 'a todas las naciones' / 'a todas las naciones' no añade información; mejor 'O “a todas las naciones”' solo tendría sentido si el texto dijera otra cosa. Aquí conviene cambiarla a 'O “a todas las naciones”' no procede; la alternativa útil es 'a todas las naciones' vs. 'a todos los gentiles' o 'a todas las naciones' vs. 'a las naciones'. En español, lo más fiel al audit trail es anclar la nota en 'naciones' y explicar 'gentiles'.
  revised_spanish_text: y que se proclamará en su nombre el arrepentimiento para el perdón de los pecados a todas las naciones[b][a], comenzando desde Jerusalén.
