translation:
  language: es
  text: y que se proclamará en su nombre el arrepentimiento para el perdón de los pecados a todas las naciones[b][a], comenzando desde Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'y el perdón de los pecados'; el griego puede entenderse como dos elementos coordinados del mensaje proclamado.
    reason: alternative_reading
  - marker: b
    text: O 'gentiles'. El término griego también puede significar 'naciones' o 'gentiles' según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: κηρυχθῆναι
  english_pob_choice: should be proclaimed
  chosen_spanish: se proclamara
  alternatives_spanish:
  - se predicara
  - se anunciara
  lexicon: BDAG
  rationale: El infinitivo aoristo pasivo expresa que el mensaje debía ser anunciado públicamente. "Proclamar" conserva mejor el matiz de anuncio solemne y público sin restringirlo a un ámbito eclesiástico técnico.
- source_word: ἐπὶ τῷ ὀνόματι αὐτοῦ
  english_pob_choice: in his name
  chosen_spanish: en su nombre
  alternatives_spanish:
  - sobre la base de su nombre
  - por su nombre
  lexicon: BDAG
  rationale: La expresión idiomática comunica autoridad y representación vinculadas a Jesús. En español, "en su nombre" es la equivalencia más natural y fiel al valor de autorización.
- source_word: μετάνοιαν
  english_pob_choice: repentance
  chosen_spanish: el arrepentimiento
  alternatives_spanish:
  - un cambio de mente
  - cambio de pensamiento
  lexicon: BDAG
  rationale: Aunque el audit trail inglés pasó por una etapa de "change of mind", la revisión final fijó "repentance". En español, "arrepentimiento" es el equivalente más estable y abarca la dimensión de giro interior y cambio de rumbo sin reducir el término a mera cognición.
- source_word: ἄφεσιν ἁμαρτιῶν
  english_pob_choice: for the forgiveness of sins
  chosen_spanish: para el perdón de los pecados
  alternatives_spanish:
  - para la remisión de los pecados
  - y perdón de pecados
  lexicon: BDAG
  rationale: '"Perdón de los pecados" es la forma natural en español y preserva el sentido de ἄφεσις como perdón/liberación. Mantiene la coordinación estrecha con "arrepentimiento" sin forzar una paráfrasis doctrinal.'
- source_word: εἰς πάντα τὰ ἔθνη
  english_pob_choice: to all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - a todos los pueblos
  - a todos los gentiles
  lexicon: BDAG
  rationale: '"Naciones" preserva la forma léxica de ἔθνη y el alcance universal de la comisión. En este contexto no conviene reducirlo a un contraste étnico exclusivo; por eso se mantiene el valor amplio de pueblos/naciones.'
- source_word: ἀρξάμενοι ἀπὸ Ἰερουσαλήμ
  english_pob_choice: beginning from Jerusalem
  chosen_spanish: comenzando desde Jerusalén
  alternatives_spanish:
  - empezando desde Jerusalén
  - comenzando en Jerusalén
  lexicon: BDAG
  rationale: El participio indica el punto de partida de la proclamación. "Comenzando desde Jerusalén" conserva la dirección de ἀπό y sugiere origen/arranque con claridad en español.
theological_decisions:
- issue: Relación entre arrepentimiento y perdón
  english_pob_reading: The message proclaimed is 'repentance for the forgiveness of sins,' without making the verse specify a full ordo salutis beyond the text.
  chosen_spanish_reading: El versículo presenta el contenido proclamado como 'arrepentimiento para el perdón de los pecados', sin convertirlo en un esquema doctrinal más detallado.
  alternative_spanish_readings:
  - '''arrepentimiento y perdón de los pecados'' como dos elementos coordinados'
  - '''arrepentimiento que conduce al perdón de los pecados'''
  rationale: El griego permite leer los dos sustantivos como contenido de la proclamación, pero la relación entre ambos queda deliberadamente compacta. La redacción española conserva esa tensión y evita precisar más de lo que el texto afirma.
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera explicativa.
- issue: Alcance de ἔθνη
  english_pob_reading: '''all the nations'''
  chosen_spanish_reading: '''todas las naciones'''
  alternative_spanish_readings:
  - '''todas las naciones'' con sentido de pueblos'
  - '''todos los gentiles'''
  rationale: La escena de Lucas 24:47 describe la amplitud universal de la misión resucitada. "Naciones" mantiene la forma del texto y evita reducir el alcance a una categoría étnica más estrecha.
  doctrine_reference: Misión universal del evangelio.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB, que corrigió 'change of mind' a 'repentance' y mantuvo la estructura del versículo. La versión española sigue esa decisión y conserva la relación compacta entre arrepentimiento, perdón, universalidad y comienzo en Jerusalén.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino explícito; aquí no aplica.
  - Se mantiene 'arrepentimiento' para μετάνοια, acorde con la revisión final inglesa.
  - Se mantiene 'perdón de los pecados' como frase natural y teológicamente precisa en español.
  - Se usa 'naciones' para ἔθνη, con nota alternativa por la posible lectura 'gentiles'.
