translation:
  language: es
  text: Y algunos de los que estaban con nosotros fueron al sepulcro y encontraron que era tal como las mujeres habían dicho, pero no lo vieron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπῆλθόν
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - iban
  lexicon: BDAG
  rationale: El aoristo narra un movimiento puntual hacia el sepulcro. 'Fueron' suena natural en español y conserva la acción simple sin enfatizar indebidamente la salida.
- source_word: τινες τῶν σὺν ἡμῖν
  english_pob_choice: some of those with us
  chosen_spanish: algunos de los que estaban con nosotros
  alternatives_spanish:
  - algunos de los nuestros
  - algunos compañeros nuestros
  lexicon: BDAG
  rationale: La expresión identifica un subconjunto del grupo acompañante. 'Los que estaban con nosotros' mantiene la estructura relacional del griego y evita introducir una relación no explicitada como 'compañeros'.
- source_word: ἐπὶ τὸ μνημεῖον
  english_pob_choice: to the tomb
  chosen_spanish: al sepulcro
  alternatives_spanish:
  - a la tumba
  - al monumento funerario
  lexicon: BDAG
  rationale: En este contexto de resurrección, μνημεῖον se refiere al lugar de sepultura de Jesús. 'Sepulcro' es claro y natural en español bíblico contemporáneo, y conserva la referencia funeraria específica.
- source_word: εὗρον
  english_pob_choice: found
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  lexicon: BDAG
  rationale: '''Hallaron'' y ''encontraron'' son equivalentes; se eligió ''hallaron'' porque combina bien con la cadencia bíblica de la frase y sigue siendo plenamente comprensible en español actual.'
- source_word: οὕτως καθὼς καὶ αἱ γυναῖκες εἶπον
  english_pob_choice: just as the women had said
  chosen_spanish: así como también habían dicho las mujeres
  alternatives_spanish:
  - exactamente como habían dicho las mujeres
  - tal como también dijeron las mujeres
  lexicon: BDAG
  rationale: La secuencia griega expresa correspondencia con lo dicho por las mujeres. 'Así como también habían dicho' conserva la comparación y refleja el matiz aditivo de καί sin forzar una explicación adicional.
- source_word: αὐτὸν δὲ οὐκ εἶδον
  english_pob_choice: but they did not see him
  chosen_spanish: pero a él no lo vieron
  alternatives_spanish:
  - pero no lo vieron
  - pero a Jesús no lo vieron
  lexicon: BDAG
  rationale: El pronombre sigue refiriéndose a Jesús. Se mantiene 'a él' para respetar la cohesión pronominal del griego; 'no lo vieron' es la forma natural de esta construcción en español.
theological_decisions:
- issue: Distinción entre verificar el sepulcro y ver a Jesús
  english_pob_reading: The verse reports that the visitors confirmed the women's report about the tomb's condition, yet did not see Jesus himself.
  chosen_spanish_reading: El versículo dice que algunos confirmaron lo dicho por las mujeres sobre el sepulcro, pero no vieron a Jesús mismo.
  alternative_spanish_readings:
  - vieron que era así como habían dicho las mujeres, pero no vieron a Jesús
  - hallaron el sepulcro como habían dicho las mujeres, pero a Jesús no lo vieron
  rationale: 'La redacción preserva la tensión narrativa del texto: el hallazgo confirma el testimonio previo, pero la ausencia de visión de Jesús permanece sin armonizarse ni explicarse de más.'
  doctrine_reference: Preservar la tensión narrativa y no resolverla por armonización implícita.
translation_notes:
  revision_awareness: This draft follows the latest audit state, which indicates no revision changes were needed and cross-check review showed high agreement. The Spanish reflects the source directly while adapting to idiomatic, publication-ready Spanish.
  spanish_consistency_notes:
  - Se mantiene 'sepulcro' para μνημεῖον en este contexto narrativo de resurrección.
  - Se conserva la referencia pronominal a Jesús con 'a él' / 'lo' sin explicitar el nombre, para respetar la cohesión del griego.
  - Se evita 'SEÑOR' u otra sustitución teológica porque el versículo no contiene κύριος ni un equivalente directo.
