revisions:
- from: Y algunos de los que estaban con nosotros fueron al sepulcro y hallaron así como también habían dicho las mujeres; pero a él no lo vieron.
  to: Y algunos de los que estaban con nosotros fueron al sepulcro y encontraron que era tal como las mujeres habían dicho, pero no lo vieron.
  rationale: Se ajusta la cláusula central para expresar de manera natural y fiel la correspondencia de οὕτως καθὼς, se omite un 'también' innecesario, y se suaviza la puntuación para reflejar mejor la narración griega. La referencia pronominal a Jesús se mantiene sin explicitar de más.
