review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: algunos del grupo fueron al sepulcro, comprobaron que las cosas eran como dijeron las mujeres, pero no vieron a Jesús. Sin embargo, la secuencia española ''hallaron así como también habían dicho las mujeres'' suena forzada y no expresa con naturalidad la correspondencia οὕτως καθὼς. Además, el punto y coma no es necesario y rompe el flujo sencillo del original.'
  spanish_quality_summary: El texto es mayormente claro y fiel, pero presenta una construcción poco idiomática en español moderno eclesial. 'Hallaron' es aceptable, aunque 'encontraron' suena más natural hoy; no obstante, el problema principal es la frase comparativa. 'Pero a él no lo vieron' es gramatical, aunque 'pero no lo vieron' es más fluido y mantiene la referencia pronominal sin pérdida.
  glossary_alignment: No hay términos del glosario de proyecto en juego salvo el manejo pronominal referido a Jesús, que se conserva adecuadamente. 'Sepulcro' es una buena equivalencia para μνημεῖον en este contexto. No hay conflictos terminológicos mayores.
  issues:
  - severity: medium
    issue: 'Construcción comparativa poco natural: ''hallaron así como también habían dicho las mujeres'''
    rationale: οὕτως καθὼς expresa que encontraron las cosas tal como las mujeres habían dicho. En español, la formulación dada resulta rígida y algo ambigua. 'Encontraron que era tal como las mujeres habían dicho' o 'lo encontraron tal como...' comunica mejor el sentido.
  - severity: low
    issue: Uso innecesario de 'también'
    rationale: El καί aditivo/emfático no necesita representarse explícitamente aquí en español; incluir 'también' en esta posición vuelve la frase más pesada sin añadir claridad.
  - severity: low
    issue: Puntuación algo artificial antes de la cláusula contrastiva
    rationale: El griego tiene una coordinación simple con contraste leve por δέ. Una coma antes de 'pero' refleja mejor el flujo narrativo que un punto y coma.
  revised_spanish_text: Y algunos de los que estaban con nosotros fueron al sepulcro y encontraron que era tal como las mujeres habían dicho, pero no lo vieron.
  revision_rationale: Se ajusta la cláusula central para expresar de manera natural y fiel la correspondencia de οὕτως καθὼς, se omite un 'también' innecesario, y se suaviza la puntuación para reflejar mejor la narración griega. La referencia pronominal a Jesús se mantiene sin explicitar de más.
