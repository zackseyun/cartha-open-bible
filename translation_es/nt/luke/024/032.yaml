translation:
  language: es
  text: 'Y se decían unos a otros: «¿No ardía nuestro corazón[b] dentro de nosotros mientras nos hablaba por el camino[a], mientras nos abría[c] las Escrituras?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el camino'.
    reason: lexical_alternative
  - marker: b
    text: O 'nuestros corazones'; el griego tiene el singular 'nuestro corazón'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente 'abriendo las Escrituras', es decir, haciendo claro su sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς ἀλλήλους
  english_pob_choice: to one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - el uno al otro
  lexicon: BDAG
  rationale: Expresa de forma natural el intercambio recíproco en español y conserva el sentido mutuo del diálogo.
- source_word: Οὐχὶ
  english_pob_choice: Was not
  chosen_spanish: ¿No ardía...?
  alternatives_spanish:
  - ¿No estaba ardiendo...?
  - ¿No se encendía...?
  lexicon: BDAG
  rationale: La pregunta espera una respuesta afirmativa; en español la inversión natural es una pregunta retórica con '¿No...?' que mantiene la fuerza del griego.
- source_word: ἡ καρδία ἡμῶν
  english_pob_choice: our heart
  chosen_spanish: nuestro corazón
  alternatives_spanish:
  - nuestros corazones
  - nuestro interior
  lexicon: BDAG
  rationale: Se conserva el singular del griego con 'corazón', que es natural en español y refleja mejor la forma 'the heart of us'.
- source_word: καιομένη
  english_pob_choice: burning
  chosen_spanish: ardía
  alternatives_spanish:
  - estaba ardiendo
  - estaba en llamas
  lexicon: BDAG
  rationale: '''Ardía'' mantiene la metáfora del fuego interior sin explicarla ni suavizarla; en español suena más natural que un calco participial.'
- source_word: ἐν ἡμῖν
  english_pob_choice: within us
  chosen_spanish: dentro de nosotros
  alternatives_spanish:
  - en nosotros
  - dentro de sí
  lexicon: BDAG
  rationale: '''Dentro de nosotros'' expresa el sentido interno de manera idiomática y clara en español.'
- source_word: ἐλάλει
  english_pob_choice: he was speaking
  chosen_spanish: nos hablaba
  alternatives_spanish:
  - nos estaba hablando
  - nos hablaba continuamente
  lexicon: BDAG
  rationale: El imperfecto se refleja con una forma durativa natural en español; 'nos hablaba' conserva el aspecto progresivo sin pesadez.
- source_word: ἐν τῇ ὁδῷ
  english_pob_choice: on the road
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - sobre el camino
  lexicon: BDAG
  rationale: '''Por el camino'' es una equivalencia natural que conserva el marco narrativo del viaje y evita un literalismo poco idiomático.'
- source_word: διήνοιγεν
  english_pob_choice: he was opening
  chosen_spanish: nos abría
  alternatives_spanish:
  - nos estaba abriendo
  - nos explicaba
  lexicon: BDAG
  rationale: '''Abría'' preserva la metáfora de διανοίγω y evita interpretar de antemano el acto como mera explicación.'
- source_word: τὰς γραφάς
  english_pob_choice: the Scriptures
  chosen_spanish: las Escrituras
  alternatives_spanish:
  - los Escritos
  - las Sagradas Escrituras
  lexicon: BDAG
  rationale: '''Las Escrituras'' es la equivalencia estable y precisa para γραφαί en este contexto bíblico.'
theological_decisions:
- issue: Metaphorical force of 'heart burning'
  english_pob_reading: Retain the metaphor 'our heart burning within us' rather than interpret it as mere emotional excitement or spiritual enlightenment.
  chosen_spanish_reading: Conservar la metáfora '¿No ardía nuestro corazón dentro de nosotros?' sin convertirla en una paráfrasis explicativa.
  alternative_spanish_readings:
  - ¿No nos conmovía profundamente el corazón?
  - ¿No sentíamos un fuego interior?
  rationale: El texto no aclara si el ardor es emocional, espiritual o cognitivo; mantener la metáfora preserva esa tensión y la experiencia descrita por los discípulos.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La traducción sigue el pasaje sin cambios relevantes respecto al estado auditado más reciente; se mantiene la metáfora central y el imperfecto narrativo, con ajuste natural al español para el valor recíproco, la localización del viaje y la imagen de 'abrir' las Escrituras.
  spanish_consistency_notes:
  - Se mantiene Yahvé/Jesús/Mesías por norma general del proyecto, aunque este versículo no los contiene.
  - Se preserva el singular del griego en 'nuestro corazón' y se señala la alternativa plural en nota.
  - '''Las Escrituras'' conserva el valor técnico de γραφαί sin añadir ''Sagradas'' en el texto principal.'
  - '''Por el camino'' es una opción española natural frente a ''en el camino''; se documenta como alternativa.'
