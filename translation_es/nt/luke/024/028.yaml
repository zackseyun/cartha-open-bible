translation:
  language: es
  text: Y se acercaron a la aldea donde iban[a], y él actuó como si fuera a ir más lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fingió ir más lejos» o «hizo como si fuera a ir más lejos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισαν
  english_pob_choice: came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - llegaron cerca
  - vinieron cerca
  lexicon: BDAG
  rationale: El aoristo de ἐγγίζω expresa aproximación a un lugar. «Se acercaron» comunica el movimiento de manera natural en español y conserva la idea de proximidad sin un calco rígido.
- source_word: κώμην
  english_pob_choice: village
  chosen_spanish: aldea
  alternatives_spanish:
  - pueblo
  - villa
  lexicon: BDAG
  rationale: κώμη suele designar un asentamiento pequeño, más cercano a «aldea» que a «ciudad». «Aldea» mantiene el tamaño implícito del término y suena claro en español bíblico contemporáneo.
- source_word: οὗ ἐπορεύοντο
  english_pob_choice: where they were going
  chosen_spanish: donde iban
  alternatives_spanish:
  - a donde iban
  - donde estaban yendo
  lexicon: BDAG
  rationale: La frase relativa marca el destino del viaje en curso. «Donde iban» es idiomático, breve y conserva el sentido de desplazamiento continuo mejor que una formulación más pesada.
- source_word: προσεποιήσατο
  english_pob_choice: acted as though
  chosen_spanish: actuó como si
  alternatives_spanish:
  - fingió
  - hizo como si
  lexicon: BDAG
  rationale: προσποιέομαι puede significar fingir o dar la impresión de algo. «Actuó como si» preserva la tensión narrativa sin intensificar innecesariamente la idea de engaño, siguiendo el criterio del POB inglés.
- source_word: πορρώτερον
  english_pob_choice: farther
  chosen_spanish: más lejos
  alternatives_spanish:
  - más allá
  - más distante
  lexicon: BDAG
  rationale: El comparativo indica mayor distancia física. «Más lejos» es la opción más natural en español y refleja con precisión el valor comparativo.
- source_word: πορεύεσθαι
  english_pob_choice: he were going
  chosen_spanish: fuera a seguir
  alternatives_spanish:
  - fuera a ir
  - continuara
  lexicon: BDAG
  rationale: El infinitivo complementario con προσεποιήσατο expresa la acción aparente. «Fuera a seguir» capta la idea de continuar el camino y evita una traducción demasiado literal que sonaría menos natural en español.
theological_decisions:
- issue: Cómo reflejar la acción aparente de Jesús sin resolver la tensión narrativa
  english_pob_reading: acted as though he were going farther
  chosen_spanish_reading: actuó como si fuera a seguir más lejos
  alternative_spanish_readings:
  - fingió ir más lejos
  - hizo como si fuera a ir más lejos
  rationale: La construcción del griego presenta a Jesús dando la impresión de continuar. La redacción española mantiene esa tensión sin afirmar más de lo que el texto exige ni cargar el verbo con una acusación más fuerte que la del original.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto griego y el contexto auditado del POB inglés están en alto acuerdo; no se registran revisiones aplicadas en la fuente inglesa más reciente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque el versículo no presenta el título Χριστός.
  - «Aldea» traduce κώμη con mayor precisión de escala que «pueblo» en este contexto.
  - La nota al pie conserva alternativas semánticas relevantes para προσεποιήσατο y la frase resultante en español.
