review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del griego: aproximación a la aldea, destino en curso, y la acción aparente de Jesús de continuar más lejos. Sin embargo, «fuera a seguir más lejos» añade un matiz de ‘seguir/continuar’ que no está explícito en πορεύεσθαι y suena algo menos natural que una formulación más directa. También conviene pulir la nota para un español más natural.'
  spanish_quality_summary: 'El texto es claro y legible, con buen registro bíblico contemporáneo. «Se acercaron a la aldea donde iban» funciona bien. La principal mejora es estilística y de precisión: «actuó como si fuera a ir más lejos» refleja mejor el griego y suena más limpio que «fuera a seguir más lejos».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión sobre προσεποιήσατο respeta el criterio del POB de no intensificar innecesariamente la idea de engaño. «Aldea» para κώμην y «se acercaron» para ἤγγισαν están bien alineados.
  issues:
  - severity: medium
    issue: «fuera a seguir más lejos» añade un matiz no explícito
    rationale: πορεύεσθαι aquí simplemente expresa ‘ir’ o ‘seguir su camino’ como acción aparente. «Seguir» puede sugerir continuación enfática que no hace falta y complica una frase que en español fluye mejor como «fuera a ir más lejos».
  - severity: low
    issue: La nota al pie usa una formulación algo poco natural
    rationale: «O:» con comillas internas y «fuera a ir» puede simplificarse y naturalizarse. Conviene mantener las alternativas del inglés en un español más idiomático.
  revised_spanish_text: Y se acercaron a la aldea donde iban[a], y él actuó como si fuera a ir más lejos.
  revised_footnotes:
  - marker: a
    text: 'O: «fingió ir más lejos» o «hizo como si fuera a ir más lejos».'
    reason: lexical_alternative
