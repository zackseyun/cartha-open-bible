translation:
  language: es
  text: Y aconteció que, mientras los bendecía, se apartó de ellos y fue llevado arriba al cielo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos omiten «y fue llevado arriba al cielo».
    reason: textual_variant
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y sucedió que
  - Y pasó que
  lexicon: BDAG
  rationale: Es una fórmula narrativa lucana; «aconteció que» conserva el valor de marcación de evento con un tono sobrio y natural en español bíblico actual.
- source_word: ἐν τῷ εὐλογεῖν
  english_pob_choice: while he was blessing
  chosen_spanish: mientras los bendecía
  alternatives_spanish:
  - mientras estaba bendiciéndolos
  - al bendecirlos
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa simultaneidad. «Mientras los bendecía» comunica con claridad la acción en curso sin sobrecargar la frase.
- source_word: εὐλογεῖν
  english_pob_choice: blessing
  chosen_spanish: bendecía
  alternatives_spanish:
  - les daba la bendición
  - pronunciaba una bendición sobre ellos
  lexicon: BDAG
  rationale: El verbo significa «bendecir». El imperfecto español mantiene la acción continua durante el momento de la partida.
- source_word: διέστη ἀπ’ αὐτῶν
  english_pob_choice: he parted from them
  chosen_spanish: se apartó de ellos
  alternatives_spanish:
  - se separó de ellos
  - se retiró de ellos
  lexicon: BDAG
  rationale: Aquí διΐστημι expresa separación física/departida. «Se apartó de ellos» es natural y conserva el sentido relacional y espacial.
- source_word: ἀνεφέρετο
  english_pob_choice: was carried up
  chosen_spanish: fue llevado
  alternatives_spanish:
  - fue llevado hacia arriba
  - ascendió
  lexicon: BDAG
  rationale: La forma pasiva imperfecta sugiere ser llevado hacia arriba. En español, «fue llevado» conserva el pasivo sin añadir agente no explícito; el movimiento ascendente queda especificado por «al cielo».
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: into heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - al cielo de Dios
  - a los cielos
  lexicon: BDAG
  rationale: En este contexto οὐρανός se refiere al cielo en sentido teológico; «al cielo» es la forma más directa y natural en español.
theological_decisions:
- issue: 'Cláusula entre corchetes: καὶ ἀνεφέρετο εἰς τὸν οὐρανόν'
  english_pob_reading: Included in the main text with a textual-variant footnote
  chosen_spanish_reading: Incluida en el texto principal con nota de variante textual
  alternative_spanish_readings:
  - Omitir la cláusula en el texto principal
  - Trasladarla a nota al pie
  rationale: El texto fuente la presenta con brackets, señalando incertidumbre textual. Se traduce en el cuerpo principal porque está en el paquete fuente y armoniza con Lucas-Hechos, pero se mantiene explícita la variante para no ocultar la tensión textual.
  doctrine_reference: Preservar la tensión textual y documentar variantes significativas en nota.
translation_notes:
  revision_awareness: Se mantuvo la lectura textual del paquete fuente y la decisión de la POB en inglés de traducir la cláusula bracketed en el texto principal, con nota explícita de variante textual.
  spanish_consistency_notes:
  - Se usó «cielo» para εἰς τὸν οὐρανόν, consistente con el sentido teológico del pasaje.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el versículo.
  - Se conservó el tono narrativo lucano con una fórmula de evento inicial en español natural.
