translation:
  language: es
  text: Entonces les abrió el entendimiento[a] para entender las Escrituras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la mente».
    reason: lexical_alternative
  - marker: b
    text: O «para que entendieran las Escrituras»; el griego expresa finalidad con el infinitivo articular.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Entonces, en ese momento
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata; «Entonces» es la equivalencia natural y concisa en español para introducir la acción siguiente.
- source_word: διήνοιξεν
  english_pob_choice: opened
  chosen_spanish: les abrió
  alternatives_spanish:
  - abrió completamente
  - les abrió del todo
  lexicon: BDAG
  rationale: El griego conserva una metáfora concreta de abrir; «les abrió» preserva esa imagen sin sobreexplicar ni debilitarla en una mera explicación abstracta.
- source_word: αὐτῶν τὸν νοῦν
  english_pob_choice: their minds
  chosen_spanish: la mente[a]
  alternatives_spanish:
  - el entendimiento
  - la comprensión
  lexicon: BDAG
  rationale: νοῦς designa la facultad de entender/percibir. En español, «la mente» comunica bien el órgano/facultad interior, aunque el singular colectivo puede sonar menos natural; por eso se deja la alternativa de sentido en nota.
- source_word: τοῦ συνιέναι
  english_pob_choice: to understand
  chosen_spanish: para entender[b]
  alternatives_spanish:
  - para que entendieran
  - a fin de entender
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito. «Para entender» es natural en español y conserva la finalidad sin convertirla en una paráfrasis más expansiva.
- source_word: τὰς γραφάς
  english_pob_choice: the Scriptures
  chosen_spanish: las Escrituras
  alternatives_spanish:
  - las Escrituras Sagradas
  - los escritos
  lexicon: BDAG
  rationale: En Lucas-Hechos, γραφαί remite a las Escrituras reconocidas; en español «las Escrituras» transmite ese referente bíblico establecido con claridad y dignidad.
theological_decisions:
- issue: Naturaleza de la acción de Jesús al abrir la comprensión
  english_pob_reading: Retain the direct wording 'he opened their minds' without importing a doctrinal explanation of illumination.
  chosen_spanish_reading: Mantener «les abrió la mente» sin añadir una explicación doctrinal de iluminación.
  alternative_spanish_readings:
  - les dio entendimiento
  - les explicó las Escrituras
  - les iluminó la mente
  rationale: El griego dice explícitamente que Jesús abrió la facultad de comprender para las Escrituras. La traducción conserva esa afirmación directa y evita reemplazarla por una explicación doctrinal posterior o por una paráfrasis que cambie el foco del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del enunciado del texto.
translation_notes:
  revision_awareness: 'Concordante con la revisión más reciente del POB en inglés: no hubo cambios sustantivos; se preservó la formulación directa y la equivalencia óptima del verbo y la finalidad.'
  spanish_consistency_notes:
  - Se usa «las Escrituras» con mayúscula por tratarse del referente bíblico establecido.
  - Se evita «entendimiento» como texto principal porque en español el giro «les abrió la mente» refleja mejor la metáfora del original y mantiene el objeto directo singular colectivo.
  - «Entender» conserva la finalidad sin introducir una expansión interpretativa.
