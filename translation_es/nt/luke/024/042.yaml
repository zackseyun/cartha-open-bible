lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: And they
  chosen_spanish: Y les
  alternatives_spanish:
  - Entonces les
  - Pero ellos
  lexicon: BDAG
  rationale: El artículo sustantivado con δέ funciona aquí como un sujeto ya identificado en el contexto; en español, la continuidad narrativa se expresa naturalmente con «Y» y el complemento indirecto anticipa el destinatario de la acción sin sobrecargar la frase.
- source_word: ἐπέδωκαν
  english_pob_choice: gave
  chosen_spanish: dieron
  alternatives_spanish:
  - entregaron
  - ofrecieron
  lexicon: BDAG
  rationale: El aoristo de ἐπιδίδωμι aquí significa dar o pasar algo a alguien. «Dieron» es directo, natural y suficientemente preciso en este contexto narrativo.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: les
  alternatives_spanish:
  - a él
  - le
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de manera natural en español con pronombre átono de complemento indirecto. Sin embargo, la secuencia «Y les dieron» sigue la referencia contextual de los discípulos que entregan a Jesús lo que pidió; por claridad referencial, el sentido del dativo se conserva en el flujo de la oración con el destinatario implícito por el contexto inmediato. Alternativamente, podría leerse explícitamente como «Y le dieron», pero el sujeto plural y el contexto narrativo hacen que la forma de objeto indirecto de tercera persona sea lo más fluido.
- source_word: ἰχθύος ὀπτοῦ μέρος
  english_pob_choice: a piece of broiled fish
  chosen_spanish: un trozo de pescado asado
  alternatives_spanish:
  - una porción de pescado asado
  - un pedazo de pescado asado
  lexicon: BDAG
  rationale: μέρος es el sustantivo principal («trozo/parte/porción») y ἰχθύος ὀπτοῦ lo especifica como pescado preparado por calor. «Trozo» conserva bien la idea concreta de una porción tangible; «pescado asado» comunica con naturalidad el valor de ὀπτός en español sin añadir una técnica culinaria más precisa de la que el término exige.
- source_word: ὀπτοῦ
  english_pob_choice: broiled
  chosen_spanish: asado
  alternatives_spanish:
  - tostado
  - a la parrilla
  lexicon: BDAG
  rationale: ὀπτός designa alimento preparado por asado/broil. En español, «asado» es la equivalencia más amplia y natural; «a la parrilla» sería demasiado específico y «tostado» no suena idiomático para pescado en este contexto.
theological_decisions:
- issue: Variación textual al final del versículo
  english_pob_reading: 'Translate only the SBLGNT text: ''a piece of broiled fish.'''
  chosen_spanish_reading: 'Traducir solo el texto crítico dado: «un trozo de pescado asado».'
  alternative_spanish_readings:
  - «... y un panal de miel»
  - «... y de un panal de miel»
  rationale: El texto fuente proporcionado termina con μέρος y no incluye la adición tardía. Por transparencia textual, la traducción sigue únicamente el testimonio crítico dado y deja constancia de la variante ampliada en una nota.
  doctrine_reference: Primacía del texto original crítico sobre la tradición de traducción; preservación de variantes en nota cuando están atestiguadas en la audit trail.
translation_notes:
  revision_awareness: 'Coincide con el pasaje crítico proporcionado (SBLGNT) y con el criterio de la POB en inglés: traducir solo «a piece of broiled fish» y documentar la variante tardía en nota. No se registran revisiones aplicadas en el expediente fuente.'
  spanish_consistency_notes:
  - Se evitó «Cristo»/«Señor» porque este versículo no contiene esos títulos.
  - Se prefirió «asado» para ὀπτοῦ por naturalidad española y fidelidad semántica.
  - La nota textual conserva la variante conocida sin incorporarla al texto principal.
