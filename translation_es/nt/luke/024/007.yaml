review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura participial («diciendo»), el título «el Hijo del Hombre», la secuencia de infinitivos pasivos y el sentido general de necesidad, entrega, crucifixión y resurrección. Sin embargo, hay dos desajustes con la evidencia fuente y la pista de auditoría inglesa: (1) la nota [a] está anclada en «debía», pero su contenido corresponde a una alternativa de παραδοθῆναι / la frase completa «ser entregado...», no a δεῖ; y (2) la construcción «debía ser entregado en manos de» suena menos natural en español que «debía ser entregado en manos de» con apoyo de «las», o mejor «debía ser entregado en manos de» manteniendo el idiomatismo, pero la nota debe ir sobre «ser entregado...». Además, la nota [b] con «levantarse» no es la mejor alternativa española para ἀναστῆναι en contexto pascual; «resucitar» / «levantarse» no reflejan bien la observación inglesa, y «levantarse» en español puede sonar físicamente ambiguo.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero necesita una reparación menor de legibilidad y de anclaje de notas. «Al tercer día» es natural; «hombres pecadores» es fiel a la decisión de género del proyecto; «resucitar» es buen texto principal. La principal mejora es mover la nota [a] al segmento correcto y ajustar la nota [b] para una alternativa española más idiomática y precisa.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Hijo del Hombre», «hombres pecadores» y «resucitar» están alineados con la auditoría. El punto problemático es metodológico: la nota [a] no preserva correctamente la alternativa léxica documentada para παραδοθῆναι, y la nota [b] debería reflejar mejor la distinción entre activo «resucitar/levantarse de entre los muertos» y pasivo «ser resucitado».'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «debía» pero explica una alternativa de «ser entregado ... en manos de hombres pecadores».
    rationale: La evidencia inglesa marca la alternativa léxica en «be delivered...», no en «must». El anclaje actual induce a error sobre qué término está siendo glosado.
  - severity: medium
    issue: La nota [b] usa «levantarse» como alternativa de ἀναστῆναι.
    rationale: Aunque literalmente posible, en español bíblico actual «levantarse» puede sonar ambiguo o demasiado físico. Una nota como «O “resucitar”; el griego es activo, no pasivo...» o «O “levantarse de entre los muertos”» comunica mejor la observación filológica.
  - severity: low
    issue: La nota [a] omite el artículo en la alternativa idiomática.
    rationale: «En las manos de» suena más completo en la nota explicativa literal, aunque el texto principal puede conservar el idiomatismo más fluido «en manos de».
  revised_spanish_text: diciendo que el Hijo del Hombre debía ser entregado[a] en manos de hombres pecadores y ser crucificado, y al tercer día resucitar[b].
  revised_footnotes:
  - marker: a
    text: O «ser entregado en las manos de hombres pecadores».
    reason: lexical_alternative
  - marker: b
    text: O «levantarse de entre los muertos»; el griego es activo, no pasivo (en contraste con «ser resucitado»).
    reason: lexical_alternative
  revision_rationale: Se mantiene casi todo el texto por su fidelidad general, pero se corrige el anclaje de la nota [a] para que corresponda a παραδοθῆναι / «ser entregado», y se mejora la nota [b] para reflejar de manera más idiomática en español la observación de que ἀναστῆναι es activo, no pasivo. No se requiere adjudicación adicional porque son ajustes menores de precisión y estilo.
