translation:
  language: es
  text: diciendo que el Hijo del Hombre debía ser entregado[a] en manos de hombres pecadores y ser crucificado, y al tercer día resucitar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser entregado en las manos de hombres pecadores».
    reason: lexical_alternative
  - marker: b
    text: O «levantarse de entre los muertos»; el griego es activo, no pasivo (en contraste con «ser resucitado»).
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El participio presente conserva la conexión sintáctica con la frase anterior; por eso se traduce con un gerundio en español, no como verbo finito.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el ser humano
  - el humano
  lexicon: BDAG
  rationale: Se mantiene el título tradicional y reconocible, que conserva su resonancia bíblica y su carácter titular en el contexto evangélico.
- source_word: ὅτι δεῖ
  english_pob_choice: that ... must
  chosen_spanish: debía
  alternatives_spanish:
  - tenía que
  - era necesario que
  lexicon: BDAG
  rationale: En español, el imperfecto de obligación comunica bien la necesidad establecida en el plan divino y su valor narrativo de dicho recordado; evita una formulación demasiado rígida sin perder la fuerza de necesidad.
- source_word: παραδοθῆναι
  english_pob_choice: be delivered
  chosen_spanish: ser entregado
  alternatives_spanish:
  - ser traicionado
  - ser entregado / ser puesto en manos de
  lexicon: BDAG
  rationale: «Ser entregado» reproduce el pasivo de manera natural en español y mantiene abierta la amplitud del verbo griego, sin reducirlo solo a la traición de Judas.
- source_word: εἰς χεῖρας
  english_pob_choice: into the hands of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en las manos de
  - al poder de
  lexicon: BDAG
  rationale: La expresión idiomática española «en manos de» conserva la imagen de dominio o poder implícita en el giro griego.
- source_word: ἀνθρώπων ἁμαρτωλῶν
  english_pob_choice: sinful men
  chosen_spanish: hombres pecadores
  alternatives_spanish:
  - personas pecadoras
  - pecadores
  lexicon: BDAG
  rationale: Se conserva la marca masculina plural del griego y la referencia a los agentes humanos del arresto y la ejecución, sin neutralizar el género del sustantivo.
- source_word: σταυρωθῆναι
  english_pob_choice: be crucified
  chosen_spanish: ser crucificado
  alternatives_spanish:
  - ser puesto en una cruz
  - ser clavado en una cruz
  lexicon: BDAG
  rationale: La traducción directa y estable en español para el infinitivo pasivo es «ser crucificado», que mantiene precisión histórica y terminológica.
- source_word: τῇ τρίτῃ ἡμέρᾳ
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - a los tres días
  lexicon: BDAG
  rationale: «Al tercer día» es la forma natural y bíblicamente inteligible en español para expresar el dativo temporal.
- source_word: ἀναστῆναι
  english_pob_choice: rise again
  chosen_spanish: resucitar
  alternatives_spanish:
  - levantarse
  - volver a la vida
  lexicon: BDAG
  rationale: En contexto pascual, «resucitar» comunica de manera clara y reverente el regreso a la vida. Aunque el griego es activo, el español requiere una forma idiomática que preserve el sentido sin forzar una construcción menos natural.
theological_decisions:
- issue: Fuerza de δεῖ en la predicción de la pasión
  english_pob_reading: must, expressing divine necessity
  chosen_spanish_reading: debía, expresando necesidad establecida
  alternative_spanish_readings:
  - tenía que
  - era necesario que
  rationale: «Debía» conserva la idea de necesidad y permite oír en español la inevitabilidad teológica del cumplimiento, sin convertir la frase en mera predicción neutral.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Cómo traducir ἀνθρώπων ἁμαρτωλῶν con fidelidad de género
  english_pob_reading: sinful men
  chosen_spanish_reading: hombres pecadores
  alternative_spanish_readings:
  - personas pecadoras
  - pecadores
  rationale: El griego usa un plural masculino y el contexto apunta a los varones implicados en el arresto y la crucifixión. Se mantiene esa marca sin sustituirla por una neutralización no documentada.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Valor de ἀναστῆναι en clave pascual
  english_pob_reading: rise again; the Greek is active, not passive
  chosen_spanish_reading: resucitar
  alternative_spanish_readings:
  - levantarse
  - volver a la vida
  rationale: Aunque el griego es activo, en español «resucitar» es la forma más natural y teológicamente transparente para expresar la acción de volver a la vida en este anuncio pascual.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el estado quedó sin modificaciones y el informe de concordancia es de alto acuerdo. Por ello, este borrador sigue de cerca la lectura auditada del inglés POB y la evidencia griega, ajustando solo la idiomaticidad necesaria en español.'
  spanish_consistency_notes:
  - Se mantiene «Hijo del Hombre» como título estable y reconocible en la tradición evangélica.
  - Se traduce παραδοθῆναι con «ser entregado» para conservar la amplitud semántica del pasivo.
  - La expresión temporal «al tercer día» se conserva por su naturalidad bíblica en español.
  - Se usa «resucitar» en lugar de una pasiva artificial para expresar ἀναστῆναι en español.
  - Se preserva el masculino plural de «hombres pecadores» por fidelidad al griego y al criterio de género-accurate.
