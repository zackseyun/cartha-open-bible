translation:
  language: es
  text: Y ellos mismos estaban contando las cosas que habían sucedido en el camino[a], y cómo él se les dio a conocer[b] en el partimiento del pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las cosas en el camino». El griego es una expresión más concisa; aquí se explicita el sentido implícito de los sucesos narrados.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fue reconocido por ellos». El griego usa una forma pasiva, que puede enfatizar tanto que ellos lo reconocieron como que él se dio a conocer a ellos.'
    reason: theological_note
lexical_decisions:
- source_word: αὐτοὶ
  english_pob_choice: they themselves
  chosen_spanish: ellos mismos
  alternatives_spanish:
  - ellos
  lexicon: BDAG
  rationale: El pronombre explícito es enfático; "ellos mismos" conserva mejor esa fuerza que un simple "ellos".
- source_word: ἐξηγοῦντο
  english_pob_choice: were recounting
  chosen_spanish: estaban contando
  alternatives_spanish:
  - estaban narrando
  - estaban relatando
  - estaban explicando
  lexicon: BDAG
  rationale: El imperfecto medio indica una acción en curso. "Estaban contando" comunica bien el acto de relatar sucesos sin forzar el matiz técnico de "explicar".
- source_word: τὰ ἐν τῇ ὁδῷ
  english_pob_choice: the things that had happened on the road
  chosen_spanish: las cosas que habían sucedido en el camino
  alternatives_spanish:
  - lo que había sucedido en el camino
  - las cosas del camino
  - las cosas que ocurrieron en el camino
  lexicon: BDAG
  rationale: La expresión griega es elíptica. En español conviene explicitar el sentido implícito de los hechos ocurridos en el viaje, sin salir del valor del texto.
- source_word: ὁδῷ
  english_pob_choice: road
  chosen_spanish: camino
  alternatives_spanish:
  - ruta
  - vía
  - carretera
  lexicon: BDAG
  rationale: '"Camino" es la equivalencia natural y bíblica en español para ὁδός en este contexto, y evita el matiz demasiado moderno de "carretera".'
- source_word: ὡς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - que
  lexicon: BDAG
  rationale: Introduciendo el contenido del informe, "cómo" es la forma natural en español.
- source_word: ἐγνώσθη
  english_pob_choice: he was made known
  chosen_spanish: fue hecho conocido
  alternatives_spanish:
  - fue reconocido
  - se dio a conocer
  lexicon: BDAG
  rationale: Se conserva la pasiva del verbo para mantener el énfasis del griego y su posible trasfondo teológico, sin resolver prematuramente la tensión entre reconocimiento humano y revelación recibida.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: Aunque el dativo puede traducirse literalmente con "a ellos", aquí "entre ellos" expresa de modo natural el reconocimiento ocurrido en su interacción y evita una formulación algo dura en español.
- source_word: ἐν τῇ κλάσει τοῦ ἄρτου
  english_pob_choice: in the breaking of the bread
  chosen_spanish: en el partimiento del pan
  alternatives_spanish:
  - en la fracción del pan
  - al partir el pan
  - en la partida del pan
  lexicon: BDAG
  rationale: '"Partimiento del pan" es una fórmula clara y reverente en español, cercana al evento narrativo y más natural que un calco demasiado rígido. Mantiene la referencia al acto específico descrito por Lucas.'
- source_word: ἄρτου
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - el pan
  - un pan
  - lo pan
  lexicon: BDAG
  rationale: '"Pan" es la traducción estándar y natural de ἄρτος.'
theological_decisions:
- issue: Cómo traducir ἐγνώσθη sin perder la tensión entre reconocimiento humano y acción pasiva del texto
  english_pob_reading: Retain the passive sense with 'he was made known to them.'
  chosen_spanish_reading: Mantener la pasiva con "fue hecho conocido".
  alternative_spanish_readings:
  - fue reconocido por ellos
  - se les dio a conocer
  rationale: 'La pasiva preserva la forma del griego y no reduce el pasaje a una mera percepción humana. Al mismo tiempo, el español no debe borrar la ambigüedad: el reconocimiento sucede en el marco providencial del relato lucano.'
  doctrine_reference: Preservar la tensión teológica sin explicarla en exceso.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del expediente, que aclaró implícitamente τὰ ἐν τῇ ὁδῷ como hechos sucedidos en el camino; la versión española lo expresa de manera natural sin abandonar la estructura del original.
  spanish_consistency_notes:
  - Se mantiene "camino" para ὁδός en coherencia con el uso bíblico habitual en español.
  - Se conserva la pasiva en ἐγνώσθη para no perder la tensión entre reconocimiento y revelación.
  - '"Pan" se usa de forma uniforme para ἄρτος; "partimiento del pan" mantiene el carácter narrativo específico del acto.'
