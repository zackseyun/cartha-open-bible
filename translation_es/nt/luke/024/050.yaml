review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: Ἐξήγαγεν = movimiento de salida, δέ = avance narrativo, ἐπάρας… εὐλόγησεν = gesto acompañado de bendición. Sin embargo, «los sacó» suena en español más brusco o expulsivo que el matiz narrativo de «los llevó/condujo fuera», especialmente en este contexto de despedida. La expresión ἕως πρὸς Βηθανίαν está bien representada con nota, pero conviene una formulación española más natural en la nota.'
  spanish_quality_summary: El texto es claro y legible, pero «los sacó» resulta menos digno y menos natural en registro bíblico narrativo que «los llevó». También la puntuación con comas alrededor de «alzando sus manos» puede aligerarse. «Betania» y «los bendijo» están bien.
  glossary_alignment: No hay términos de glosario mayor en juego. El nombre propio «Betania» está bien. La decisión teológica de mantener «los bendijo» sin expansión litúrgica está alineada con el expediente inglés.
  issues:
  - severity: medium
    issue: «los sacó» para Ἐξήγαγεν
    rationale: Aunque es semánticamente posible, en español moderno puede sonar brusco, como expulsión o extracción, y no comunica tan bien el movimiento guiado de Jesús con sus discípulos en este contexto. «Los llevó» o «los condujo» preserva mejor el sentido narrativo y la dignidad del pasaje.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: 'La nota repite «hasta Betania» como opción principal idéntica al texto, y «algo más plena» suena poco natural. Puede expresarse con más claridad: «O “a Betania” o “cerca de Betania”; literalmente, “hasta hacia Betania”».'
  revised_spanish_text: Entonces los llevó hasta Betania[a], y alzando sus manos, los bendijo.
  revised_footnotes:
