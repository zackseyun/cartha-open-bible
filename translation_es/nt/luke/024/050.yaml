translation:
  language: es
  text: Entonces los llevó hasta Betania[a], y alzando sus manos, los bendijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Betania» o «cerca de Betania»; literalmente, «hasta hacia Betania».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐξήγαγεν
  english_pob_choice: led them out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los llevó fuera
  - los condujo fuera
  lexicon: BDAG
  rationale: El aoristo de ἐξάγω expresa sacar o conducir hacia afuera. En español, «los sacó» es natural, conserva el movimiento direccional y evita una construcción pesada.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como avance narrativo. «Entonces» transmite bien la transición temporal sin añadir contraste fuerte.
- source_word: ἕως πρὸς Βηθανίαν
  english_pob_choice: as far as Bethany
  chosen_spanish: hasta Betania
  alternatives_spanish:
  - hasta cerca de Betania
  - hasta hacia Betania
  lexicon: BDAG
  rationale: La combinación ἕως πρός sugiere extensión de movimiento hasta la cercanía o dirección de Betania. «Hasta Betania» comunica el alcance de forma idiomática en español; la ambigüedad espacial se conserva en la nota textual.
- source_word: Βηθανίαν
  english_pob_choice: Bethany
  chosen_spanish: Betania
  alternatives_spanish:
  - Betania
  lexicon: BDAG
  rationale: Nombre propio transliterado al uso normal en español bíblico.
- source_word: ἐπάρας
  english_pob_choice: lifting up
  chosen_spanish: alzando
  alternatives_spanish:
  - levantando
  - alzando en alto
  lexicon: BDAG
  rationale: El participio aoristo de ἐπαίρω indica una acción previa y concomitante. «Alzando» es natural en español y preserva el gesto.
- source_word: τὰς χεῖρας αὐτοῦ
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de él
  lexicon: BDAG
  rationale: El plural es significativo porque describe la postura de bendición. «Sus manos» es la forma idiomática clara en español.
- source_word: εὐλόγησεν
  english_pob_choice: blessed
  chosen_spanish: los bendijo
  alternatives_spanish:
  - pronunció una bendición sobre ellos
  - los colmó de bendición
  lexicon: BDAG
  rationale: Aquí εὐλογέω expresa la acción de bendecir a los discípulos. «Los bendijo» mantiene el acto simple sin convertirlo en fórmula litúrgica.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a los discípulos; en español es natural anteponerlo como clítico.
theological_decisions:
- issue: Naturaleza de la bendición de Jesús sobre los discípulos
  english_pob_reading: Retain the simple verbal expression 'he blessed them' without expanding it into a liturgical or sacerdotal formula.
  chosen_spanish_reading: Mantener la expresión simple «los bendijo», sin convertirla en una fórmula litúrgica o sacerdotal.
  alternative_spanish_readings:
  - pronunció una bendición sobre ellos
  - dio una bendición sacerdotal
  rationale: El versículo presenta a Jesús bendiciendo con las manos alzadas; la traducción debe conservar ese acto narrativo sin introducir categorías eclesiales posteriores ni diluir el sentido verbal directo.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: El texto inglés auditado mantiene acuerdo alto y no presenta revisiones aplicadas; la propuesta española sigue esa lectura estable, conservando la ambigüedad espacial de ἕως πρὸς Βηθανίαν en una nota y manteniendo el gesto de bendecir con verbos simples y no litúrgicos.
  spanish_consistency_notes:
  - Se mantiene «Betania» como transliteración estándar y «bendijo» para εὐλόγησεν, coherente con el uso POB de verbos simples cuando el contexto es narrativo.
  - «Entonces» se usa como marcador narrativo de continuidad, no como adición interpretativa.
  - La nota [a] preserva la tensión lexical del griego sin cargar el cuerpo principal con una perífrasis excesiva.
