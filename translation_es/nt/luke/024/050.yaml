revisions:
- from: Entonces los sacó hasta Betania[a], y, alzando sus manos, los bendijo.
  to: Entonces los llevó hasta Betania[a], y alzando sus manos, los bendijo.
  rationale: Se ajusta Ἐξήγαγεν a «los llevó» para un español más natural y digno en este contexto, manteniendo el movimiento guiado por Jesús. Se conserva «hasta Betania» con nota para reflejar la plenitud de ἕως πρὸς. Se simplifica levemente la puntuación y la redacción de la nota para mayor claridad.
