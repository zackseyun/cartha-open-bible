    rationale: Las comas alrededor de 'por la alegría' y antes de 'y se maravillaban' rompen innecesariamente la unidad de ἀπιστούντων ... ἀπὸ τῆς χαρᾶς καὶ θαυμαζόντων y producen un español trabado.
  - severity: low
