translation:
  language: es
  text: 'Y como ellos todavía no lo creían de alegría y se maravillaban[a], les dijo: «¿Tienen aquí algo de comer?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras todavía no creían de alegría y estaban asombrados».

      '
    reason: alternative_reading
lexical_decisions:
- source_word: ἔτι δὲ
  english_pob_choice: And while they still
  chosen_spanish: Y mientras ellos todavía
  alternatives_spanish:
  - Y todavía
  - Pero todavía
  lexicon: BDAG
  rationale: ἔτι expresa continuidad ('todavía') y δέ funciona como conector suave; en español, 'Y mientras ellos todavía' conserva el valor progresivo de la escena sin forzar una estructura poco natural.
- source_word: ἀπιστούντων
  english_pob_choice: were disbelieving
  chosen_spanish: no creían
  alternatives_spanish:
  - estaban disbelieving
  - seguían sin creer
  lexicon: BDAG
  rationale: El participio presente expresa una acción o estado en curso. 'No creían' comunica el estado continuo de incredulidad sin sonar forzado en español, y mantiene la tensión temporal del pasaje.
- source_word: ἀπὸ τῆς χαρᾶς
  english_pob_choice: for joy
  chosen_spanish: por la alegría
  alternatives_spanish:
  - a causa de la alegría
  - debido a la alegría
  lexicon: BDAG
  rationale: ἀπό aquí indica causa o fuente. 'Por la alegría' es una manera natural y concisa de expresar que la alegría misma contribuía a su dificultad para creer.
- source_word: θαυμαζόντων
  english_pob_choice: were marveling
  chosen_spanish: se maravillaban
  alternatives_spanish:
  - se asombraban
  - estaban maravillados
  lexicon: BDAG
  rationale: El participio coordinado conserva el matiz de asombro admirado. 'Se maravillaban' reproduce mejor esa admiración asombrada que un simple 'se asombraban'.
- source_word: Ἔχετέ
  english_pob_choice: Do you have
  chosen_spanish: ¿Tienen
  alternatives_spanish:
  - ¿Tienen ustedes
  - ¿Hay
  lexicon: BDAG
  rationale: La pregunta pide una respuesta sobre posesión o disponibilidad. En español, '¿Tienen aquí...?' es idiomático y claro, y evita un calco innecesario del inglés.
- source_word: τι
  english_pob_choice: anything
  chosen_spanish: algo
  alternatives_spanish:
  - algo que
  - alguna cosa
  lexicon: BDAG
  rationale: En una pregunta abierta, τι puede equivaler naturalmente a 'algo'. 'Algo de comer' refleja bien la apertura de la petición sin añadir precisión que el griego no exige.
- source_word: βρώσιμον
  english_pob_choice: to eat
  chosen_spanish: de comer
  alternatives_spanish:
  - comestible
  - para comer
  lexicon: BDAG
  rationale: βρώσιμος significa 'apto para comer'. 'De comer' es la equivalencia española más natural en este giro interrogativo y preserva el sentido de algo comestible.
- source_word: ἐνθάδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - aquí mismo
  lexicon: BDAG
  rationale: El adverbio indica ubicación inmediata. 'Aquí' es la forma breve y exacta en español.
theological_decisions:
- issue: La mezcla de incredulidad y gozo ante Jesús resucitado
  english_pob_reading: Their disbelief is temporary astonishment caused by overwhelming joy, not hardened unbelief.
  chosen_spanish_reading: Su incredulidad es momentánea y está mezclada con gozo y asombro; no se presenta como rechazo endurecido.
  alternative_spanish_readings:
  - Todavía no creían, enfatizando solo la duda.
  - Estaban maravillados, minimizando la incredulidad.
  rationale: 'La construcción griega une ἀπιστούντων con ἀπὸ τῆς χαρᾶς καὶ θαυμαζόντων. La traducción conserva la tensión emocional: no son incrédulos obstinados, sino discípulos desbordados por una alegría tan grande que les cuesta aceptar lo que ven.'
  doctrine_reference: Resurrección de Jesús; preservación de tensiones textuales sin resolverlas prematuramente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó 'because of joy' a 'for joy' y suprimir la repetición de 'were' para mantener fluidez. En español se reflejó esa economía con 'por la alegría' y una sola forma verbal coordinada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera; aquí no aplica.
  - Se usó un registro digno y claro, sin arcaísmos innecesarios.
  - '''Se maravillaban'' conserva el asombro sin borrar la incredulidad contextual.'
