- from: Y sucedió[a], mientras estaban perplejas acerca de esto, que, de pronto, dos hombres se pusieron junto a ellas, con vestiduras resplandecientes.
  to: Y sucedió[a] que, mientras estaban perplejas acerca de esto, he aquí, dos hombres se presentaron junto a ellas con vestiduras resplandecientes.
  rationale: Se ajusta ἰδού a «he aquí» para conservar mejor el marcador narrativo señalado en el audit trail; se sustituye «se pusieron junto a ellas» por «se presentaron junto a ellas» para un español más natural que aún preserve la cercanía y la irrupción; y se pule la nota al pie para español idiomático, manteniendo la alternativa más literal de la imaginería luminosa. Se conserva «Y sucedió» por fidelidad a la fórmula lucana y «dos hombres» por la decisión teológica auditada.
