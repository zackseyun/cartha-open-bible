translation:
  language: es
  text: Y sucedió[a] que, mientras estaban perplejas acerca de esto, he aquí, dos hombres se presentaron junto a ellas con vestiduras resplandecientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «con vestiduras que brillaban como relámpagos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: BDAG
  rationale: La fórmula narrativa lucana introduce un nuevo episodio. «Y sucedió» conserva el valor de evento narrativo sin el tono arcaico de equivalentes más tradicionales.
- source_word: ἐν τῷ ἀπορεῖσθαι
  english_pob_choice: while they were perplexed
  chosen_spanish: mientras estaban perplejas
  alternatives_spanish:
  - mientras estaban atónitas
  - mientras no acertaban qué pensar
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν marca simultaneidad. «Perplejas» comunica bien ἀπορέω como estar sin salida o sin saber qué hacer, y mantiene el referente femenino del contexto inmediato.
- source_word: περὶ τούτου
  english_pob_choice: about this
  chosen_spanish: acerca de esto
  alternatives_spanish:
  - sobre esto
  - con respecto a esto
  lexicon: BDAG
  rationale: Es una referencia simple a lo que acaba de narrarse; «acerca de esto» es natural en español y conserva la proximidad referencial.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: de pronto
  alternatives_spanish:
  - he aquí
  - mira
  lexicon: BDAG
  rationale: En español, «de pronto» transmite bien la irrupción narrativa que ἰδού marca aquí. Se evita un «he aquí» más arcaizante, aunque sigue siendo una alternativa posible.
- source_word: ἄνδρες δύο
  english_pob_choice: two men
  chosen_spanish: dos hombres
  alternatives_spanish:
  - dos varones
  lexicon: BDAG
  rationale: ἀνήρ designa «hombre/varón» y en la escena aparecen como figuras masculinas. «Dos hombres» mantiene la presentación narrativa inmediata sin interpretar todavía su identidad angelical.
- source_word: ἐπέστησαν αὐταῖς
  english_pob_choice: stood by them
  chosen_spanish: se pusieron junto a ellas
  alternatives_spanish:
  - se acercaron a ellas
  - se quedaron junto a ellas
  lexicon: BDAG
  rationale: ἐφίστημι aquí indica presencia repentina y cercana. «Se pusieron junto a ellas» preserva la cercanía espacial y la irrupción súbita sin añadir la idea específica de «aparecer».
- source_word: ἐν ἐσθῆτι ἀστραπτούσῃ
  english_pob_choice: in dazzling clothing
  chosen_spanish: con vestiduras resplandecientes
  alternatives_spanish:
  - con ropa que brillaba como relámpago
  - con vestiduras que centelleaban
  lexicon: BDAG
  rationale: ἐσθής es «vestidura/ropa» y ἀστραπτούσῃ evoca brillo semejante al relámpago. «Resplandecientes» da una solución natural y digna en español, mientras que la imagen más literal se conserva como alternativa.
theological_decisions:
- issue: Identidad de los dos seres
  english_pob_reading: Render them as 'two men' in the main text, matching the Greek narrative presentation.
  chosen_spanish_reading: «dos hombres» en el texto principal, sin identificarlos todavía como ángeles.
  alternative_spanish_readings:
  - dos ángeles
  - dos mensajeros celestiales
  rationale: El versículo presenta la apariencia narrativa inmediata; la identificación angelical pertenece al contexto más amplio y no debe adelantarse en la línea principal.
  doctrine_reference: Principio de no importar información contextual posterior al nivel de versículo; coherente con la auditable exactitud del POB.
- issue: Valor de ἰδού en la escena
  english_pob_reading: '''behold'' as a discourse marker drawing attention to a sudden development.'
  chosen_spanish_reading: «de pronto» como marcador de irrupción narrativa.
  alternative_spanish_readings:
  - he aquí
  - mira
  rationale: En español contemporáneo, «de pronto» comunica mejor la súbita transición escénica que un calco solemne. No cambia el contenido, solo su función discursiva.
  doctrine_reference: Principios de claridad y marcación narrativa sin sobretraducción.
translation_notes:
  revision_awareness: 'El inglés POB mantuvo «two men» y dejó la imagen literal de ἐσθῆτι ἀστραπτούσῃ en una nota. La versión española sigue esa misma línea: conserva la presentación inmediata de «dos hombres» y traduce el brillo con una expresión natural, dejando la alternativa más literal para nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrama.
  - «Mesías/Cristo» no aplica aquí; no se introduce terminología doctrinal ajena al verso.
  - Se preserva el referente femenino del contexto inmediato con «perplejas» y «ellas», evitando una neutralización innecesaria.
