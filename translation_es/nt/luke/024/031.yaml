translation:
  language: es
  text: Entonces se les abrieron los ojos, y lo reconocieron; y él se volvió invisible para ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desapareció de su vista» o «se desvaneció de su vista».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διηνοίχθησαν
  english_pob_choice: were opened
  chosen_spanish: se les abrieron
  alternatives_spanish:
  - fueron abiertos
  - se abrieron
  lexicon: BDAG
  rationale: El aoristo pasivo de διανοίγω comunica que la apertura de la percepción les fue concedida. En español, la construcción pronominal impersonal refleja bien esa pasividad sin forzar un sujeto explícito.
- source_word: οἱ ὀφθαλμοὶ
  english_pob_choice: their eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - sus ojos
  - los ojos de ellos
  lexicon: BDAG
  rationale: El griego usa el sujeto 'los ojos' con el genitivo αὐτῶν; en español, 'se les abrieron los ojos' conserva el sentido idiomático y la relación con ellos.
- source_word: ἐπέγνωσαν
  english_pob_choice: recognized
  chosen_spanish: lo reconocieron
  alternatives_spanish:
  - lo conocieron
  - lo identificaron
  lexicon: BDAG
  rationale: ἐπιγινώσκω aquí indica llegar a reconocer a alguien ya presente en la escena. 'Lo reconocieron' es la opción natural y fiel al contexto de Emaús.
- source_word: ἄφαντος
  english_pob_choice: unseen
  chosen_spanish: invisible
  alternatives_spanish:
  - fuera de vista
  - no visible
  lexicon: BDAG
  rationale: ἄφαντος significa 'no visible' o 'invisible'. 'Invisible' mantiene la tensión del griego sin imponer un mecanismo narrativo más específico.
- source_word: ἐγένετο ἀπ’ αὐτῶν
  english_pob_choice: became unseen by them
  chosen_spanish: se hizo invisible para ellos
  alternatives_spanish:
  - desapareció de ellos
  - desapareció de su vista
  lexicon: BDAG
  rationale: La expresión combina γίνομαι con ἄφαντος y la preposición ἀπό; en español, 'se hizo invisible para ellos' conserva el valor relacional de la frase sin añadir más de lo que el texto afirma.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca avance narrativo; 'Entonces' funciona de manera natural en español y preserva la secuencia del relato.
theological_decisions:
- issue: Cómo traducir la desaparición de Jesús sin resolver el mecanismo
  english_pob_reading: he became unseen by them
  chosen_spanish_reading: se hizo invisible para ellos
  alternative_spanish_readings:
  - desapareció de su vista
  - se volvió invisible para ellos
  rationale: El griego ἄφαντος ἐγένετο señala que dejó de ser visible, pero no explica el mecanismo. 'Se hizo invisible para ellos' mantiene esa tensión narrativa y evita cerrar indebidamente el sentido.
  doctrine_reference: Preservar la tensión teológica y narrativa sin sobreinterpretar el modo del acontecimiento.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que afinó la idea desde 'became invisible to them' hacia 'became unseen by them' para reflejar mejor ἄφαντος ἐγένετο ἀπ’ αὐτῶν sin especificar el mecanismo. En español, 'se hizo invisible para ellos' conserva esa intención y sigue siendo natural en registro bíblico actual.
  spanish_consistency_notes:
  - Se prefirió 'Entonces' para δέ como enlace narrativo.
  - Se usó la construcción reflexiva 'se les abrieron' para reflejar el pasivo griego.
  - '''Invisible'' se mantiene como equivalente principal de ἄφαντος, en continuidad con la nota inglesa y sin reducirlo simplemente a una desaparición física.'
  - El pronombre 'lo' identifica a Jesús sin repetir el nombre, como permite el contexto inmediato.
