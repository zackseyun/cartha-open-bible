  yaml_path: translation/nt/luke/024/030.yaml
  text: And it happened that[a], when he reclined at the table with them, he took the bread, blessed it, and after breaking it[b], began giving it to them.
  footnotes:
  - marker: a
    text: Or 'sat down with them.' The Greek more specifically refers to reclining at table, reflecting ancient dining practice.
    reason: cultural_note
  - marker: b
    text: Or 'was giving it to them.' The Greek imperfect can emphasize ongoing action; 'began giving' reflects the action's onset in context.
    reason: lexical_alternative
