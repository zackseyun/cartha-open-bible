translation:
  language: es
  text: Y ocurrió que[a], cuando se recostó a la mesa con ellos, tomó el pan, lo bendijo, y después de partirlo[b], empezó a dárselo a ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sucedió que». La expresión griega funciona como transición narrativa en Lucas.
    reason: lexical_alternative
  - marker: b
    text: O «lo partió». El participio aoristo marca una acción anterior al verbo principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y ocurrió que[a]
  alternatives_spanish:
  - Y sucedió que
  - Y aconteció que
  lexicon: BDAG
  rationale: La fórmula narrativa de Lucas se conserva como transición discursiva. «Ocurrió que» mantiene el valor idiomático de ἐγένετο sin volver al registro arcaico de «aconteció». Se antepone la conjunción para reflejar el enlace narrativo del griego.
- source_word: ἐν τῷ κατακλιθῆναι αὐτὸν μετ’ αὐτῶν
  english_pob_choice: when he reclined at the table with them
  chosen_spanish: cuando se recostó a la mesa con ellos
  alternatives_spanish:
  - cuando se sentó con ellos
  - cuando se reclinó con ellos a la mesa
  lexicon: BDAG
  rationale: El infinitivo articular expresa tiempo («cuando/as»). En contexto de comida, κατακλίνω apunta a recostarse/reclinarse a la mesa, no simplemente a sentarse. «Se recostó a la mesa» conserva la escena de mesa antigua sin sonar excesivamente técnico.
- source_word: λαβὼν τὸν ἄρτον
  english_pob_choice: he took the bread
  chosen_spanish: tomó el pan
  alternatives_spanish:
  - tomando el pan
  - tomó el pan que estaba allí
  lexicon: BDAG
  rationale: El participio aoristo se vierte naturalmente con verbo finito en español, manteniendo la secuencia. Se omite aquí la repetición del artículo español como parte del sustantivo genérico de la escena; «el pan» es suficiente y fiel al referente de mesa.
- source_word: εὐλόγησεν
  english_pob_choice: blessed it
  chosen_spanish: dio gracias por él
  alternatives_spanish:
  - lo bendijo
  - pronunció una bendición sobre él
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «bendijo», en una escena de comida el español «dio gracias» transmite de manera natural la acción de bendecir la comida sin cargarla de una fórmula litúrgica fija. Se mantiene la relación con el pan mediante «por él».
- source_word: κλάσας
  english_pob_choice: after breaking it
  chosen_spanish: lo partió[b]
  alternatives_spanish:
  - después de partirlo
  - y habiéndolo partido
  lexicon: BDAG
  rationale: El aoristo participial marca acción previa al verbo principal siguiente; en español puede integrarse de forma fluida como parte de la serie narrativa. «Lo partió» es conciso y fiel, y el orden de acciones queda claro por la secuencia verbal.
- source_word: ἐπεδίδου
  english_pob_choice: began giving it to them
  chosen_spanish: empezó a dárselo a ellos
  alternatives_spanish:
  - se lo iba dando
  - les empezó a dar
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en curso o de inicio. «Empezó a dárselo» conserva el matiz incoativo destacado en el audit trail inglés. Se explicita el referente con «se lo» para evitar ambigüedad en español.
theological_decisions:
- issue: Posible eco eucarístico en la secuencia de acciones de mesa
  english_pob_reading: Use ordinary meal language without sacramental interpretation in the main text
  chosen_spanish_reading: Usar lenguaje ordinario de comida, sin interpretar sacramentalmente el pasaje en el texto principal
  alternative_spanish_readings:
  - Vincular más fuertemente la escena con la Cena del Señor
  - Emplear una formulación más litúrgica
  rationale: La secuencia «tomó... dio gracias... partió... dio» puede evocar otras escenas de mesa, pero aquí el relato no identifica explícitamente un rito sacramental. La traducción conserva la acción de mesa sin sobrecargarla doctrinalmente.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3
translation_notes:
  revision_awareness: El examen cruzado reporta alta concordancia y sin cambios necesarios; esta propuesta sigue ese estado de revisión, manteniendo las decisiones principales sobre la secuencia narrativa y el matiz aspectual del imperfecto.
  spanish_consistency_notes:
  - Se mantiene «Y ocurrió que» para conservar el marcador narrativo lucano.
  - Se evita «SEÑOR» o lenguaje de sustitución divina porque el versículo no contiene el nombre divino.
  - Se usa «pan» y un registro de comida común, sin añadir terminología eucarística explícita.
  - Se conserva el tono bíblico moderno y readable, evitando arcaísmos innecesarios.
