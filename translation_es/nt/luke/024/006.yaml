translation:
  language: es
  text: No está aquí[a], sino que ha sido resucitado. Acuérdense de cómo les habló cuando todavía estaba en Galilea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha resucitado». El verbo griego está en voz pasiva («ha sido resucitado» / «fue resucitado»), pero muchas traducciones lo vierten de manera intransitiva para expresar el acontecimiento de la resurrección.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ ἔστιν ὧδε
  english_pob_choice: He is not here
  chosen_spanish: No está aquí
  alternatives_spanish:
  - No se encuentra aquí
  - No está en este lugar
  lexicon: BDAG
  rationale: El griego omite el sujeto explícito, pero el contexto se refiere claramente a Jesús. En español, también es natural omitirlo en esta frase breve y mantener el adverbio locativo "aquí".
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: Tras una negación previa, "sino que" expresa mejor el contraste correctivo que un simple "pero" y suena natural en español.
- source_word: ἠγέρθη
  english_pob_choice: has been raised
  chosen_spanish: ha sido levantado
  alternatives_spanish:
  - ha sido resucitado
  - ha resucitado
  - fue levantado
  lexicon: BDAG
  rationale: Se conserva la voz pasiva del verbo aoristo para reflejar la forma griega y la agencia divina implícita. "Levantado" sigue de cerca el valor léxico de ἐγείρω en este contexto de resurrección, aunque en español existe la posibilidad idiomática de "ha resucitado".
- source_word: μνήσθητε
  english_pob_choice: Remember
  chosen_spanish: Acuérdense
  alternatives_spanish:
  - Recuerden
  - Traigan a la memoria
  lexicon: BDAG
  rationale: El imperativo exhortativo pide una orden directa y natural en español. "Acuérdense" conserva el sentido de recordar activamente sin sonar excesivamente técnico.
- source_word: ὡς
  english_pob_choice: how
  chosen_spanish: de cómo
  alternatives_spanish:
  - cómo
  - que
  lexicon: BDAG
  rationale: Aquí introduce el contenido de lo que Jesús les dijo; "de cómo" en español comunica bien la idea de recordar la manera y el contenido de su խոսa, sin forzar una estructura extraña.
- source_word: ἐλάλησεν ὑμῖν
  english_pob_choice: he spoke to you
  chosen_spanish: les habló
  alternatives_spanish:
  - les dijo
  - les habló a ustedes
  lexicon: BDAG
  rationale: '"Hablar a" es una buena equivalencia de λαλέω en este contexto. El clítico dativo plural se expresa naturalmente con "les".'
- source_word: ἔτι ὢν
  english_pob_choice: while he was still
  chosen_spanish: cuando todavía estaba
  alternatives_spanish:
  - mientras todavía estaba
  - siendo todavía
  lexicon: BDAG
  rationale: La combinación temporal se vuelve más fluida en español con una subordinada temporal. "Todavía" conserva el matiz de ἔτι.
- source_word: ἐν τῇ Γαλιλαίᾳ
  english_pob_choice: in Galilee
  chosen_spanish: en Galilea
  alternatives_spanish:
  - mientras estaba en Galilea
  lexicon: BDAG
  rationale: Se mantiene el nombre geográfico estándar en español. La opción básica locativa es la más fiel y clara.
theological_decisions:
- issue: Conservar la pasividad de ἠγέρθη en la declaración de resurrección
  english_pob_reading: has been raised
  chosen_spanish_reading: ha sido levantado
  alternative_spanish_readings:
  - ha resucitado
  - fue levantado
  - ha sido resucitado
  rationale: La forma pasiva del griego se preserva para no ocultar la agencia implícita de Dios en la resurrección. En español, "ha sido levantado" mantiene esa pasividad; aunque "ha resucitado" es muy idiomático, atenúa la forma verbal original.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto base fue confirmado como de alta concordancia y se mantiene la decisión de preservar la pasiva de ἠγέρθη en el cuerpo principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene la puntuación española con coma final al citar la continuación del versículo, conforme al fragmento fuente.
  - Se privilegia un español bíblico moderno y sobrio, evitando calcos innecesarios pero conservando la tensión pasiva de la resurrección.
