  source_alignment_summary: 'El borrador refleja bien la estructura del griego: negación locativa, contraste adversativo, anuncio de resurrección, exhortación a recordar, y referencia temporal a Galilea. Sin embargo, la traducción de ἠγέρθη como «ha sido levantado» no suena natural en español en contexto de resurrección y puede sugerir levantar físicamente un cuerpo o ponerse de pie, debilitando tanto la claridad como la intención teológica preservada por la pasiva griega.'
  spanish_quality_summary: El español es generalmente claro y legible. «No está aquí», «Acuérdense» y «en Galilea» funcionan bien. La principal dificultad es «ha sido levantado», que resulta poco idiomático y menos transparente para lectores eclesiales. «ha sido resucitado» preserva mejor la voz pasiva y comunica con claridad el evento de resurrección. También conviene quitar la comilla sobrante inicial en la nota al pie.
  glossary_alignment: 'No hay conflictos con los términos por defecto del proyecto. La decisión clave es ἠγέρθη: el POB inglés documenta la importancia de conservar la pasiva; en español, «ha sido resucitado» cumple mejor esa meta que «ha sido levantado».'
  issues:
  - severity: high
    issue: «ha sido levantado» para ἠγέρθη
    rationale: Aunque léxicamente ἐγείρω puede relacionarse con «levantar», en español bíblico contemporáneo «ha sido levantado» no es la forma más clara ni natural para una declaración de resurrección. Puede sonar ambiguo o físico, mientras que «ha sido resucitado» conserva la pasiva griega y expresa inequívocamente el sentido contextual.
