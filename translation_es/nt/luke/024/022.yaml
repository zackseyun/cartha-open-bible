translation:
  language: es
  text: Pero también[a], algunas mujeres de entre nosotros nos asombraron, pues habían ido de madrugada al sepulcro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos dejaron atónitos» o «nos confundieron». El verbo griego puede expresar fuerte sorpresa o desorientación.
    reason: lexical_alternative
  - marker: b
    text: O «al amanecer».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ
  english_pob_choice: But also
  chosen_spanish: Pero también
  alternatives_spanish:
  - Pero incluso
  - Sin embargo, también
  lexicon: BDAG
  rationale: Conserva la fuerza adversativa y aditiva del griego. «Pero también» suena natural en español y mantiene el enlace con el discurso anterior sin suavizar la transición.
- source_word: γυναῖκές τινες
  english_pob_choice: some women
  chosen_spanish: algunas mujeres
  alternatives_spanish:
  - ciertas mujeres
  - algunas de las mujeres
  lexicon: BDAG
  rationale: Expresa bien el valor indefinido plural en un español moderno y natural. «Algunas mujeres» evita una formalidad innecesaria sin perder precisión.
- source_word: ἐξ ἡμῶν
  english_pob_choice: from among us
  chosen_spanish: de entre nosotros
  alternatives_spanish:
  - de nuestro grupo
  - de entre los nuestros
  lexicon: BDAG
  rationale: Indica pertenencia al círculo de los hablantes, no solo procedencia geográfica. «De entre nosotros» refleja mejor la relación comunitaria implícita.
- source_word: ἐξέστησαν ἡμᾶς
  english_pob_choice: astonished us
  chosen_spanish: nos asombraron
  alternatives_spanish:
  - nos asombraron mucho
  - nos dejaron atónitos
  - nos maravillaron
  lexicon: BDAG
  rationale: «Asombraron» conserva el impacto fuerte del verbo sin decidir de antemano entre sorpresa, desorientación o perplejidad. Mantiene la tensión narrativa que el inglés POB también preserva.
- source_word: γενόμεναι
  english_pob_choice: having gone
  chosen_spanish: habiendo ido
  alternatives_spanish:
  - después de ir
  - tras ir
  lexicon: BDAG
  rationale: Aunque el participio admite un sentido idiomático más amplio, en español «habiendo ido» comunica de forma clara el movimiento hacia el sepulcro que el contexto requiere.
- source_word: ὀρθριναὶ
  english_pob_choice: early in the morning
  chosen_spanish: de madrugada
  alternatives_spanish:
  - al amanecer
  - muy temprano
  lexicon: BDAG
  rationale: La forma adjetival griega expresa temprana hora del día o la aurora. «De madrugada» es una equivalencia natural y digna que mantiene el matiz temporal sin volverlo rígidamente literal.
- source_word: ἐπὶ τὸ μνημεῖον
  english_pob_choice: to the tomb
  chosen_spanish: al sepulcro
  alternatives_spanish:
  - a la tumba
  - al túmulo
  lexicon: BDAG
  rationale: «Sepulcro» es un término bíblico claro y respetado en español, y transmite el lugar funerario de Jesús con mayor naturalidad eclesial. Se evita «grave», que en español puede sonar más ambiguo o moderno.
theological_decisions:
- issue: Fuerza de ἐξέστησαν en un relato de resurrección
  english_pob_reading: astonished us
  chosen_spanish_reading: nos asombraron
  alternative_spanish_readings:
  - nos dejaron atónitos
  - nos maravillaron
  - nos confundieron
  rationale: El verbo griego puede expresar asombro intenso o desorientación. «Nos asombraron» preserva la reacción fuerte sin forzar el texto hacia incredulidad, fe plena o confusión absoluta, manteniendo la tensión del relato.
  doctrine_reference: Preservar la tensión narrativa sin resolverla prematuramente
translation_notes:
  revision_awareness: Se siguió el sentido ya auditado en el inglés POB sin depender mecánicamente de su redacción. Se mantuvo la tensión del verbo ἐξίστημι y la temporalidad de ὀρθριναὶ, con ajustes naturales para un español bíblico contemporáneo.
  spanish_consistency_notes:
  - Se conservó «sepulcro» para el contexto funerario de Jesús.
  - Se evitó «Señor» o sustituciones devocionales no presentes en el texto.
  - La referencia comunitaria de ἐξ ἡμῶν se expresó como pertenencia al grupo, no como mera procedencia.
  - La puntuación mantiene la clausula participial final unida al movimiento hacia el sepulcro.
