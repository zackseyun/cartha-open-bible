revisions:
- from: Pero también[a], algunas mujeres de entre nosotros nos asombraron, habiendo ido de madrugada al sepulcro[b].
  to: Pero también[a], algunas mujeres de entre nosotros nos asombraron, pues habían ido de madrugada al sepulcro[b].
  rationale: 'Se revisa únicamente la construcción «habiendo ido» por una formulación más natural en español narrativo: «pues habían ido». Esto conserva el sentido del participio griego tal como lo entiende el POB inglés, evita un calco rígido y mejora la legibilidad sin alterar el contenido ni las notas.'
  reviewer_model: gpt-5.4
