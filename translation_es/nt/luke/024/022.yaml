review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el griego y el rastro de auditoría inglés en casi todos los puntos: «Pero también», «algunas mujeres de entre nosotros», «nos asombraron» y «al sepulcro» preservan adecuadamente la fuerza adversativa/aditiva, el referente grupal, la reacción de asombro y el destino hacia la tumba. La nota sobre ἐξέστησαν también conserva correctamente la gama semántica. El único ajuste necesario es estilístico-sintáctico: «habiendo ido de madrugada» suena algo calcado y menos natural en español narrativo bíblico; una formulación como «que habían ido de madrugada» o «después de haber ido...» preserva mejor el participio circunstancial sin perder el sentido de movimiento temprano hacia el sepulcro.'
  spanish_quality_summary: El español es claro, digno y ampliamente comprensible, con buena terminología eclesial. Sin embargo, «habiendo ido» resulta algo pesado y poco idiomático en este contexto. Reemplazarlo por «que habían ido» mejora la fluidez sin sacrificar precisión. El resto del versículo y las notas son naturales y bien formulados.
  glossary_alignment: No hay términos de glosario de alto impacto en este versículo que entren en conflicto con las pautas del proyecto. «Sepulcro» es una elección adecuada para μνημεῖον en este contexto. «Nos asombraron» concuerda con la decisión POB de mantener la tensión narrativa sin sobredeterminarla.
  issues:
  - severity: medium
    issue: 'Construcción participial poco natural en español: «habiendo ido»'
    rationale: Aunque transmite el sentido básico de γενόμεναι + ὀρθριναὶ ἐπὶ τὸ μνημεῖον según la decisión inglesa «having gone», en español bíblico actual suena más a calco que a prosa natural. «Que habían ido de madrugada al sepulcro» expresa mejor la relación circunstancial y mantiene el sentido temporal/mocional.
  revised_spanish_text: Pero también[a], algunas mujeres de entre nosotros nos asombraron, pues habían ido de madrugada al sepulcro[b].
  revised_footnotes:
  - marker: a
    text: O «nos dejaron atónitos» o «nos confundieron». El verbo griego puede expresar fuerte sorpresa o desorientación.
    reason: lexical_alternative
  - marker: b
    text: O «al amanecer».
    reason: lexical_alternative
