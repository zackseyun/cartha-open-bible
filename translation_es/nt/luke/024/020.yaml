translation:
  language: es
  text: y cómo nuestros principales sacerdotes y gobernantes lo entregaron[a] a sentencia de muerte y lo crucificaron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para sentencia de muerte» o «para condena de muerte».
    reason: lexical_alternative
  - marker: b
    text: O «hicieron que lo crucificaran», dejando explícito que los líderes fueron responsables de la ejecución, aunque la llevaran a cabo autoridades romanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως τε
  english_pob_choice: and how
  chosen_spanish: y cómo
  alternatives_spanish:
  - cómo
  - y de qué manera
  lexicon: BDAG
  rationale: En este contexto narrativo, la expresión introduce el contenido de lo que se está relatando; «y cómo» conserva la continuidad discursiva sin sonar forzado en español.
- source_word: παρέδωκαν
  english_pob_choice: handed ... over
  chosen_spanish: lo entregaron
  alternatives_spanish:
  - lo entregaron a
  - lo remitieron
  - lo pusieron en manos de
  lexicon: BDAG
  rationale: «Entregaron» refleja καλά el sentido de παραδίδωμι en un marco judicial. Se mantiene la acción de poner a Jesús bajo otra autoridad sin recurrir a una paráfrasis más amplia.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: nuestros principales sacerdotes
  alternatives_spanish:
  - nuestros sumos sacerdotes
  - nuestros jefes de los sacerdotes
  lexicon: BDAG
  rationale: El plural griego se refiere al grupo dirigente sacerdotal. «Principales sacerdotes» conserva la referencia institucional sin imponer una forma eclesiástica posterior; se retiene «nuestros» por ἡμῶν.
- source_word: οἱ ἄρχοντες ἡμῶν
  english_pob_choice: our rulers
  chosen_spanish: nuestros gobernantes
  alternatives_spanish:
  - nuestros dirigentes
  - nuestras autoridades
  lexicon: BDAG
  rationale: ἄρχοντες apunta a autoridades gobernantes o líderes con poder. «Gobernantes» es natural en español y preserva el tono político-jurídico.
- source_word: εἰς κρίμα θανάτου
  english_pob_choice: to a sentence of death
  chosen_spanish: para sentencia de muerte
  alternatives_spanish:
  - para condena de muerte
  - para un juicio de muerte
  - a una sentencia de muerte
  lexicon: BDAG
  rationale: «Κρίμα» puede ser juicio, veredicto o sentencia; con θανάτου, el sentido es el resultado judicial que lleva a la ejecución. «Sentencia de muerte» expresa bien la fuerza legal en español, y «para» conserva el valor direccional de εἰς.
- source_word: ἐσταύρωσαν
  english_pob_choice: crucified
  chosen_spanish: lo crucificaron
  alternatives_spanish:
  - hicieron que lo crucificaran
  - mandaron crucificarlo
  lexicon: BDAG
  rationale: «Crucificaron» reproduce directamente el verbo activo plural. Se conserva la atribución de responsabilidad a los líderes, como en el griego, sin añadir una explicación que no está en la frase.
theological_decisions:
- issue: Responsabilidad de los líderes en la muerte de Jesús
  english_pob_reading: The verse is translated with direct agency ('crucified him') as stated in the Greek, while understood as responsibility rather than necessarily manual execution.
  chosen_spanish_reading: 'Se conserva la agencia directa: «lo crucificaron», entendida como atribución de responsabilidad y culpa, no necesariamente como ejecución material por sus propias manos.'
  alternative_spanish_readings:
  - lo mandaron crucificar
  - hicieron que lo crucificaran
  rationale: El griego presenta a los sumos sacerdotes y gobernantes como sujetos activos de los verbos. La traducción directa preserva esa fuerza retórica y judicial; la nota aclara que la mediación romana no se niega, pero no se introduce en el texto principal.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El texto español sigue la forma final del audit trail inglés, incluyendo la preferencia por una fórmula natural para εἰς κρίμα θανάτου («para sentencia de muerte») y la agencia directa de ἐσταύρωσαν. Se evitó una glosa explicativa que debilitara la atribución de responsabilidad a los líderes.
  spanish_consistency_notes:
  - Se mantiene «nuestros» para ἡμῶν, en paralelo con el inglés auditado.
  - Se usó «principales sacerdotes» como equivalente funcional de chief priests, no «sumos sacerdotes», para no perder el sentido colectivo del plural griego.
  - «Sentencia de muerte» conserva el registro judicial y evita suavizar κρίμα θανάτου.
  - La puntuación y el uso de notas siguen un estilo publicable y consistente con un registro bíblico contemporáneo.
