revisions:
- from: y cómo nuestros principales sacerdotes y nuestros gobernantes lo entregaron[a] para sentencia de muerte y lo crucificaron[b].
  to: y cómo nuestros principales sacerdotes y gobernantes lo entregaron[a] a sentencia de muerte y lo crucificaron[b].
  rationale: 'Se hicieron dos ajustes menores: se eliminó la repetición innecesaria de «nuestros» para mejorar la fluidez del español sin perder el alcance de ἡμῶν, y se cambió «para sentencia de muerte» por «a sentencia de muerte» por ser una formulación más natural en español y más alineada con la decisión auditada del inglés POB. Se conservaron las notas léxicas y la agencia directa de «lo crucificaron».'
