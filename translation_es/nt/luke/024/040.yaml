lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Conserva la conexión narrativa simple del griego sin añadir una relación temporal más fuerte de la que exige el texto.
- source_word: τοῦτο εἰπὼν
  english_pob_choice: after saying this
  chosen_spanish: después de decir esto
  alternatives_spanish:
  - habiendo dicho esto
  - cuando hubo dicho esto
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la acción anterior indicada por el participio aoristo con demostrativo, manteniendo la secuencia narrativa.
- source_word: ἔδειξεν
  english_pob_choice: he showed
  chosen_spanish: les mostró
  alternatives_spanish:
  - les enseñó
  - les manifestó
  lexicon: BDAG
  rationale: Mostrar es el equivalente más directo de δείκνυμι en este contexto visible y concreto.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo se expresa de forma natural con el pronombre átono indirecto en español.
- source_word: τὰς χεῖρας
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos
  lexicon: BDAG
  rationale: En español, el posesivo es idiomático y conserva la referencia implícita a las manos de Jesús, como en la decisión inglesa.
- source_word: τοὺς πόδας
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - los pies
  lexicon: BDAG
  rationale: Mantiene la correspondencia corporal directa con πόδας y la posesión implícita del contexto.
