translation:
  language: es
  text: 'Y les dijo: «Así está escrito: el Mesías[a] sufriría y resucitaría de entre los muertos al tercer día»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Cristo». El griego Χριστός se traduce aquí como título, no como designación de nombre.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: And he said to them
  chosen_spanish: Y les dijo
  alternatives_spanish:
  - Y les habló
  - Y les dijo a ellos
  lexicon: SBLGNT / uso narrativo estándar
  rationale: El dativo αὐτοῖς se expresa de forma natural con 'les'. 'Dijo' conserva el relato directo y sobrio del griego sin añadir matices.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  - queda escrito
  lexicon: BDAG
  rationale: El perfecto pasivo funciona como fórmula escrituraria vigente; en español 'está escrito' comunica bien la fuerza durativa/resultativa sin sonar forzado.
- source_word: παθεῖν
  english_pob_choice: would suffer
  chosen_spanish: padeciera
  alternatives_spanish:
  - sufriera
  - tuviera que padecer
  lexicon: BDAG
  rationale: El infinitivo depende de la fórmula de la Escritura y expresa el contenido de lo escrito. En español, en discurso indirecto, el subjuntivo 'padeciera' conserva la idea sin introducir necesidad modal explícita.
- source_word: τὸν χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG / DOCTRINE.md contested terms
  rationale: Aquí Χριστός funciona como título, no como nombre propio. 'Mesías' preserva el trasfondo bíblico-judío que el inglés POB documenta.
- source_word: ἀναστῆναι
  english_pob_choice: rise
  chosen_spanish: resucitara
  alternatives_spanish:
  - se levantara
  - fuera resucitado
  lexicon: BDAG
  rationale: La forma activa del infinitivo pide una solución activa/intransitiva. En español, 'resucitara' comunica naturalmente la acción de salir de la muerte sin convertirla en pasiva.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: '''De entre los muertos'' refleja mejor la expresión idiomática de resurrección y conserva la posibilidad léxica que el inglés POB anotó como alternativa más literal.'
- source_word: τῇ τρίτῃ ἡμέρᾳ
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - el tercer día
  lexicon: BDAG
  rationale: El dativo temporal se expresa naturalmente con 'al tercer día' en español bíblico contemporáneo y mantiene claridad narrativa.
theological_decisions:
- issue: Título mesiánico Χριστός en una síntesis de pasión y resurrección
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: La lectura titular es la más fiel al griego con artículo. 'Mesías' evita la confusión de nombre propio y preserva el sentido de cumplimiento escritural.
  doctrine_reference: 'DOCTRINE.md contested terms: Χριστός → Messiah where title'
- issue: Verbo de resurrección ἀναστῆναι con voz activa
  english_pob_reading: rise from the dead
  chosen_spanish_reading: resucitara de entre los muertos
  alternative_spanish_readings:
  - fuera resucitado de entre los muertos
  rationale: La forma griega es activa, por lo que el texto español debe evitar una pasiva que desplace la voz del original. 'Resucitara' mantiene la acción verbal y funciona bien en contexto profético/citado.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió la puntuación tras ''written'' y añadió ''that'' para reflejar ὅτι como cláusula de contenido. En español se reflejó con dos puntos no serían necesarios aquí; se prefirió una coma implícita mediante la estructura «Así está escrito: que...», que mantiene el valor citativo sin añadir un conector innecesario. Se preservó la orientación revisada del inglés: contenido de la cita, no mera yuxtaposición.'
  spanish_consistency_notes:
  - Se usó 'Mesías' conforme al tratamiento titulado de Χριστός en el POB.
  - Se evitó 'Cristo' como forma predeterminada para respetar la distinción entre título y nombre.
  - '''De entre los muertos'' mantiene la idiomaticidad de la expresión de resurrección.'
  - La puntuación española conserva la cita directa y el tono formular sin depender mecánicamente del inglés.
