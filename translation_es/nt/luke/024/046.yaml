revisions:
- from: 'Y les dijo[a]: «Así está escrito: que el Mesías padeciera y resucitara de entre los muertos al tercer día»'
  to: 'Y les dijo: «Así está escrito: el Mesías[a] sufriría y resucitaría de entre los muertos al tercer día»'
  rationale: 'Se revisa la sintaxis introductoria para evitar el giro poco natural «Así está escrito: que...», manteniendo la fórmula escritural con español claro y digno. Se sustituye «padeciera» por «sufriría» por mejor naturalidad y correspondencia con el valor del infinitivo en el contexto. Se elimina la nota menor sobre «les dijo a ellos» y se conserva como nota la alternativa significativa «el Cristo», en línea con el audit trail inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:03:09Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: mantiene la fórmula escritural γέγραπται como «está escrito», conserva el valor titular de τὸν χριστόν como «el Mesías» y respeta la voz activa de ἀναστῆναι con una forma activa en español. Sin embargo, la construcción «Así está escrito: que...» suena innecesariamente trabada en español y no refleja con buena naturalidad la relación entre οὕτως, γέγραπται y ὅτι. Además, «al tercer día» es menos natural aquí que «en el tercer día»? No; la forma más idiomática y estándar bíblica es «al tercer día», pero para el griego temporal y el inglés auditado la mejor opción es «en el tercer día»? Tampoco. La mejor reparación necesaria es la sintaxis introductoria, no el complemento temporal. También conviene alinear la nota al lugar donde realmente hay alternativa significativa, que es «Mesías».'
  spanish_quality_summary: 'El texto es legible y digno, pero «Así está escrito: que...» resulta poco natural en español moderno. Una solución más fluida y fiel es «Así está escrito: el Mesías sufriría y resucitaría...», o bien «Así está escrito, que...». Entre ambas, la primera lee mejor en español sin pérdida de sentido. «Padeciera» es correcto pero algo más literario/menos natural que «sufriría» en este contexto de contenido escrito. «De entre los muertos» y «al tercer día» son naturales y adecuados.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: Χριστός → «Mesías» está bien aplicado; no hay términos divinos conflictivos; la decisión activa para ἀναστῆναι se preserva correctamente. La única mejora léxica recomendada es preferir «sufriría» sobre «padeciera» por naturalidad y mejor correspondencia con el inglés auditado «would suffer», sin introducir necesidad modal.'
  issues:
  - severity: medium
    issue: 'La secuencia «Así está escrito: que...» es poco natural en español.'
    rationale: Aunque el griego incluye ὅτι, en español la combinación de dos puntos más «que» suena forzada. Conviene reformular para conservar el sentido sin calco sintáctico innecesario.
  - severity: low
    issue: La nota al pie actual sobre «les dijo a ellos» aporta poco valor textual.
    rationale: No responde a una ambigüedad significativa ni a una decisión léxica central del pasaje. La alternativa importante documentada en el audit trail es «el Cristo» frente a «el Mesías».
  - severity: low
    issue: «Padeciera» es correcto pero menos natural que «sufriría».
    rationale: Ambas opciones son fieles, pero «sufriría» comunica con mayor claridad contemporánea el contenido de lo escrito y evita un tono más arcaizante o elevado de lo necesario.
  revised_spanish_text: 'Y les dijo: «Así está escrito: el Mesías[a] sufriría y resucitaría de entre los muertos al tercer día»'
  revised_footnotes:
  - marker: a
    text: O «el Cristo». El griego Χριστός se traduce aquí como título, no como designación de nombre.
    reason: alternative_reading
  revision_rationale: 'Se revisa la sintaxis introductoria para evitar el giro poco natural «Así está escrito: que...», manteniendo la fórmula escritural con español claro y digno. Se sustituye «padeciera» por «sufriría» por mejor naturalidad y correspondencia con el valor del infinitivo en el contexto. Se elimina la nota menor sobre «les dijo a ellos» y se conserva como nota la alternativa significativa «el Cristo», en línea con el audit trail inglés.'
