translation:
  language: es
  text: y, al no hallar su cuerpo, vinieron diciendo que también habían visto una visión de ángeles[b], que dicen que él está vivo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos probablemente: «y vinieron diciendo que habían visto una visión de ángeles y que dicen que él está vivo», tomando «que dicen» como referencia a las mujeres y no a los ángeles.'
    reason: alternative_reading
  - marker: b
    text: O «diciendo que incluso habían visto».
    reason: previous_rendering
lexical_decisions:
- source_word: μὴ εὑροῦσαι
  english_pob_choice: not finding
  chosen_spanish: al no hallar
  alternatives_spanish:
  - no encontrando
  - cuando no hallaron
  lexicon: BDAG
  rationale: El participio aoristo femenino plural se entiende temporalmente respecto de las mujeres. En español, «al no hallar» conserva esa relación sin sonar artificial. «Hallar» es un equivalente natural y fiel de εὑρίσκω en este contexto narrativo.
- source_word: τὸ σῶμα αὐτοῦ
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - el cuerpo de él
  - su cadáver
  lexicon: BDAG
  rationale: «Cuerpo» es el sentido directo de σῶμα en el contexto de sepultura y resurrección. «Cadáver» sería más interpretativo y más fuerte de lo que el griego exige.
- source_word: ἦλθον λέγουσαι
  english_pob_choice: they came saying
  chosen_spanish: vinieron diciendo
  alternatives_spanish:
  - fueron diciendo
  - vinieron y dijeron
  lexicon: BDAG
  rationale: «Vinieron diciendo» expresa de forma natural la unión de ἦλθον con λέγουσαι. Mantiene el movimiento narrativo y la acción concomitante sin introducir un verbo que el griego no dice explícitamente.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - y
  lexicon: BDAG
  rationale: El segundo καὶ tiene valor aditivo/intensivo. «También» reproduce ese matiz con naturalidad en español; «incluso» sería posible pero algo más marcado.
- source_word: ὀπτασίαν ἀγγέλων
  english_pob_choice: a vision of angels
  chosen_spanish: una visión de ángeles
  alternatives_spanish:
  - una aparición de ángeles
  - una visión angélica
  lexicon: BDAG
  rationale: «Visión de ángeles» sigue de cerca la construcción griega y preserva el carácter extraordinario del reporte. Se evita «aparición», que desplaza ligeramente el foco del acto de ver al hecho de aparecer.
- source_word: ἑωρακέναι
  english_pob_choice: they had seen
  chosen_spanish: habían visto
  alternatives_spanish:
  - han visto
  - vieron
  lexicon: BDAG
  rationale: El infinitivo perfecto en discurso indirecto se expresa naturalmente con pluscuamperfecto en español. «Habían visto» conserva el sentido de acción completada anterior al reporte.
- source_word: οἳ λέγουσιν
  english_pob_choice: who say
  chosen_spanish: los cuales dicen
  alternatives_spanish:
  - que dicen
  - quienes dicen
  lexicon: BDAG
  rationale: Se entiende que el relativo plural masculino se refiere a los ángeles, no a las mujeres, siguiendo el antecedente inmediato más natural. «Los cuales dicen» mantiene esa referencia sin perder claridad.
- source_word: αὐτὸν ζῆν
  english_pob_choice: that he is alive
  chosen_spanish: que él vive
  alternatives_spanish:
  - que él está vivo
  - que vive
  lexicon: BDAG
  rationale: El infinitivo ζῆν se vierte con una cláusula finita en español. «Él vive» comunica de forma directa la afirmación de vida continuada y es suficientemente natural sin suavizar la fuerza de la noticia de resurrección.
theological_decisions:
- issue: Referente de οἳ λέγουσιν
  english_pob_reading: 'The relative pronoun refers to the angels: ''a vision of angels, who say that he is alive.'''
  chosen_spanish_reading: 'El relativo se refiere a los ángeles: «una visión de ángeles, los cuales dicen que él vive».'
  alternative_spanish_readings:
  - «... que habían visto una visión de ángeles y que ellos dicen que él vive»
  - «... los cuales dicen las mujeres que él vive»
  rationale: La lectura más cercana y natural toma οἳ como referente de ἀγγέλων. En español, «los cuales» ayuda a fijar esa relación. Se conserva la posible tensión sintáctica documentada por el POB inglés en nota, sin borrar la alternativa.
  doctrine_reference: Luca 24:23; mantener la ambigüedad sintáctica documentada por el texto base sin resolverla dogmáticamente.
translation_notes:
  revision_awareness: Se siguió el último estado revisado del inglés POB, especialmente la preferencia por «not finding» sobre giros más interpretativos, la conservación del tiempo presente en «who say», y el valor aditivo de καὶ. La versión española intenta ser igualmente directa, manteniendo la ambigüedad sintáctica documentada en nota sin añadir explicaciones ajenas al pasaje.
  spanish_consistency_notes:
  - Se usó «ángeles» en minúscula como sustantivo común, de acuerdo con el español bíblico normal.
  - Se eligió «vive» para ζῆν, evitando una paráfrasis más interpretativa como «está vivo» salvo en la nota alternativa.
  - «Al no hallar» conserva la relación temporal del participio sin volverla un simple «cuando» si no es necesario.
  - Se evitó «Cristo» o términos doctrinales ajenos al versículo; el texto se mantiene en el plano narrativo del reporte.
