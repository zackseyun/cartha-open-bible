revisions:
- from: y, al no hallar su cuerpo, vinieron diciendo que también habían visto una visión de ángeles[a], los cuales dicen que él vive.
  to: y, al no hallar su cuerpo, vinieron diciendo que también habían visto una visión de ángeles[b], que dicen que él está vivo[a].
  rationale: 'Se mantiene la fidelidad al griego y a las decisiones del POB, pero se ajusta el español para mayor naturalidad y alineación con el expediente inglés: «que dicen» en lugar de «los cuales dicen», «está vivo» en lugar de «vive», y se añade la nota faltante que preserva la alternativa documentada para el segundo καί.'
