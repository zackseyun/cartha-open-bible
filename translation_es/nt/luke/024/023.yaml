review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y sentido del griego: μὴ εὑροῦσαι = «al no hallar», τὸ σῶμα αὐτοῦ = «su cuerpo», ἦλθον λέγουσαι = «vinieron diciendo», ὀπτασίαν ἀγγέλων = «una visión de ángeles», y la cláusula relativa se entiende correctamente de los ángeles. Sin embargo, «habían visto una visión» suena algo pesado en español y «los cuales» resulta innecesariamente rígido. Además, falta en español la segunda nota del POB inglés sobre la posibilidad de entender καὶ + ἑωρακέναι como «hasta/incluso habían visto», una alternativa que conviene preservar porque el inglés la documentó expresamente.'
  spanish_quality_summary: El texto es legible y fiel, pero puede mejorarse para sonar más natural y digno en español contemporáneo eclesial. «Vieron una visión» / «habían visto una visión» es comprensible, aunque algo redundante; una nota puede ayudar a preservar la alternativa sin forzar el texto. «Que dicen» fluye mejor que «los cuales dicen» y sigue señalando naturalmente a «ángeles» como antecedente. «Que él está vivo» suena más idiomático en contexto de resurrección que «que él vive», sin pérdida de sentido.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos sensibles del glosario. «Ángeles», «cuerpo» y «está vivo»/«vive» son adecuados. La revisión propuesta busca naturalidad española sin apartarse de las decisiones léxicas documentadas.
  issues:
  - severity: medium
    issue: Falta una nota equivalente a la nota b del POB inglés sobre la alternativa de καὶ + ἑωρακέναι.
    rationale: El rastro de auditoría inglés preserva explícitamente una alternativa de traducción previa («had even seen»). La revisión española debe conservar esa información, ya sea en nota o explicación equivalente, especialmente porque afecta el matiz de «también / incluso».
  - severity: low
    issue: «los cuales dicen» suena rígido y algo acartonado.
    rationale: Aunque es gramatical y aclara el antecedente, en español bíblico moderno neutral «que dicen» es más natural y sigue refiriéndose de forma suficiente a «ángeles».
  - severity: low
    issue: «que él vive» es menos idiomático aquí que «que él está vivo».
    rationale: En un anuncio de resurrección, «está vivo» comunica de forma más natural el resultado actual de ζῆν en español contemporáneo, alineado además con el inglés POB «he is alive».
  revised_spanish_text: y, al no hallar su cuerpo, vinieron diciendo que también habían visto una visión de ángeles[b], que dicen que él está vivo[a].
  revised_footnotes:
  - marker: a
    text: 'O, menos probablemente: «y vinieron diciendo que habían visto una visión de ángeles y que dicen que él está vivo», tomando «que dicen» como referencia a las mujeres y no a los ángeles.'
    reason: alternative_reading
  - marker: b
    text: O «diciendo que incluso habían visto».
    reason: previous_rendering
  revision_rationale: 'Se mantiene la fidelidad al griego y a las decisiones del POB, pero se ajusta el español para mayor naturalidad y alineación con el expediente inglés: «que dicen» en lugar de «los cuales dicen», «está vivo» en lugar de «vive», y se añade la nota faltante que preserva la alternativa documentada para el segundo καί.'
