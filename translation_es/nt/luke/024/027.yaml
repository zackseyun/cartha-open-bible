    text: «Moisés y todos los Profetas» se refiere a los escritos de las Escrituras asociados con Moisés y a los libros proféticos.
    reason: cultural_note
  - marker: b
    text: O «les explicó» o «les expuso». El verbo griego puede denotar una interpretación detallada.
    reason: lexical_alternative
