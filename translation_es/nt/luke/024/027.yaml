translation:
  language: es
  text: Y comenzando desde Moisés y desde todos los Profetas[a], les interpretó[b] en todas las Escrituras lo referente a sí mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Moisés y todos los Profetas» se refiere a los escritos de las Escrituras asociados con Moisés y a los libros proféticos.
    reason: cultural_note
  - marker: b
    text: O «les explicó» o «les expuso». El verbo griego puede denotar una interpretación detallada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρξάμενος
  english_pob_choice: beginning
  chosen_spanish: comenzando
  alternatives_spanish:
  - habiendo comenzado
  - empezando
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción principal; en español, «comenzando» mantiene la relación participial con naturalidad y sin rigidez excesiva.
- source_word: ἀπὸ Μωϋσέως
  english_pob_choice: with Moses
  chosen_spanish: con Moisés
  alternatives_spanish:
  - desde Moisés
  lexicon: BDAG
  rationale: Aunque ἀπό puede significar «desde» o «de», aquí marca el punto de partida de la exposición bíblica. «Con Moisés» refleja el valor idiomático de comenzar la exposición en las Escrituras asociadas con Moisés.
- source_word: πάντων τῶν προφητῶν
  english_pob_choice: all the Prophets
  chosen_spanish: todos los Profetas
  alternatives_spanish:
  - todos los profetas
  lexicon: BDAG
  rationale: Se conserva la mayúscula por tratarse de la división canónica reconocida junto con Moisés, no simplemente de profetas individuales en general.
- source_word: διερμήνευσεν
  english_pob_choice: interpreted
  chosen_spanish: les interpretó
  alternatives_spanish:
  - les explicó
  - les expuso
  lexicon: BDAG
  rationale: El verbo puede denotar explicar o exponer con detalle. «Interpretó» conserva el matiz exegético del texto griego y la precisión del sentido.
- source_word: ἐν πάσαις ταῖς γραφαῖς
  english_pob_choice: in all the Scriptures
  chosen_spanish: en todas las Escrituras
  alternatives_spanish:
  - a lo largo de todas las Escrituras
  - en todos los escritos
  lexicon: BDAG
  rationale: «Escrituras» preserva el sentido canónico de γραφαῖς en Lucas, y «en todas» mantiene el alcance amplio de πάσαις.
- source_word: τὰ περὶ ἑαυτοῦ
  english_pob_choice: the things concerning himself
  chosen_spanish: las cosas acerca de sí mismo
  alternatives_spanish:
  - lo referente a él
  - las cosas que le conciernen
  lexicon: BDAG
  rationale: El neutro plural abarca asuntos, pasajes o temas relacionados con Jesús. «Las cosas acerca de sí mismo» conserva esa amplitud sin precisar indebidamente si se trata solo de profecías directas.
theological_decisions:
- issue: Alcance de la exposición de Jesús en las Escrituras
  english_pob_reading: the verse states that Jesus interpreted across the Scriptures the matters concerning himself, without specifying a single hermeneutical category
  chosen_spanish_reading: el versículo dice que Jesús interpretó en todas las Escrituras las cosas acerca de sí mismo, sin especificar una sola categoría hermenéutica
  alternative_spanish_readings:
  - solo profecías mesiánicas directas
  - todas y cada una de las secciones del Antiguo Testamento de manera exhaustiva
  rationale: La redacción conserva el alcance amplio de la afirmación cristológica sin reducirla a profecías directas ni exigir que cada pasaje funcione de la misma manera. Se preserva así la tensión interpretativa documentada.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: 'El texto español se ajusta al control de validación corrigiendo el problema anterior: no se incluyen notas al pie sin anclaje en el texto. Se mantiene la lectura base de la auditoría inglesa con equivalencia óptima y sin cambios sustantivos respecto del pasaje auditado.'
  spanish_consistency_notes:
  - Se usa «Moisés» y «los Profetas» con valor canónico, coherente con la división bíblica señalada en la auditoría.
  - Se evita «SEÑOR» u այլ substitución de nombres divinos porque el versículo no contiene el Tetragrámaton ni κύριος.
  - Se conserva «interpretó» en lugar de «explicó» para mantener el matiz exegético del verbo griego.
  - Se mantiene «Escrituras» en plural por la referencia a τὰς γραφάς y su sentido bíblico canónico.
