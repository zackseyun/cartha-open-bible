review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: conector narrativo, hallazgo de la piedra y su estado resultante respecto del sepulcro. Sin embargo, «removida» debilita el matiz específico de ἀποκεκυλισμένον, que alude a una piedra rodada/apartada, no solo quitada en términos generales.'
  spanish_quality_summary: El español es claro y legible, y la omisión del sujeto es natural. No obstante, «hallaron» + «sepulcro» da un tono más tradicional; eso es aceptable, pero la combinación con «removida» suena menos precisa que «corrida» o «rodada». «Corrida del sepulcro» suena natural y conserva mejor la idea de desplazamiento de la piedra de entrada.
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos en este versículo. «Sepulcro» para μνημεῖον es aceptable. La principal cuestión léxica es ἀποκεκυλισμένον, para la que conviene una opción española que preserve el movimiento implícito y el estado resultante.
  issues:
  - severity: medium
    issue: «removida» para ἀποκεκυλισμένον es demasiado general
    rationale: El participio perfecto pasivo de ἀποκυλίω sugiere que la piedra fue rodada/apartada de su posición. «Removida» comunica resultado, pero pierde la imagen concreta del movimiento que el inglés auditado preserva con «rolled away».
  - severity: low
    issue: Ligera tensión de registro entre «hallaron» y una meta de español moderno
    rationale: «Hallaron» no es incorrecto y sigue siendo comprensible, pero «encontraron» sería más contemporáneo. Aun así, no exige cambio si se conserva un tono bíblico digno.
  revised_spanish_text: Y hallaron la piedra corrida del sepulcro,
  revision_rationale: 'Se reemplaza «removida» por «corrida» para reflejar mejor ἀποκεκυλισμένον: la piedra no solo estaba quitada, sino desplazada de su lugar de cierre. «Corrida del sepulcro» suena natural en español y mantiene el estado resultante del participio perfecto pasivo.'
