lexical_decisions:
- source_word: εὗρον
  english_pob_choice: they found
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  - hallaron
  lexicon: BDAG
  rationale: El aoristo activo indica una acción puntual narrada en secuencia. «Hallaron» mantiene el valor de descubrimiento narrativo y funciona bien en español bíblico sin volverse arcaizante.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ es un conector leve que avanza la narración. «Y» conserva la continuidad sin introducir contraste fuerte.
- source_word: λίθον
  english_pob_choice: the stone
  chosen_spanish: la piedra
  alternatives_spanish:
  - la roca
  - la piedra
  lexicon: BDAG
  rationale: En el contexto funerario se trata de la piedra que cerraba la tumba; «piedra» es el equivalente natural y preciso en español.
- source_word: ἀποκεκυλισμένον
  english_pob_choice: rolled away
  chosen_spanish: removida
  alternatives_spanish:
  - rodada
  - quitada
  - removida
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo expresa un estado resultante: la piedra ya se encuentra fuera de su lugar. «Removida» comunica ese resultado de forma natural en español. «Rodada» conservaría más literalmente la imagen del movimiento, pero puede sonar menos idiomática en esta construcción.'
- source_word: ἀπὸ τοῦ μνημείου
  english_pob_choice: from the tomb
  chosen_spanish: del sepulcro
  alternatives_spanish:
  - de la tumba
  - del sepulcro
  lexicon: BDAG
  rationale: μνημεῖον en narraciones de sepultura puede traducirse «sepulcro» o «tumba». Aquí «sepulcro» mantiene el registro bíblico clásico y es plenamente comprensible en español contemporáneo.
theological_decisions:
- issue: Implied subject not repeated in the Greek clause
  english_pob_reading: And they found the stone rolled away from the tomb
  chosen_spanish_reading: Y hallaron la piedra removida del sepulcro
  alternative_spanish_readings:
  - Y ellas hallaron la piedra removida del sepulcro
  - Y hallaron la piedra removida del sepulcro
  rationale: El griego no repite el sujeto, pero la forma verbal plural lo hace recuperable del contexto inmediato. En español también puede omitirse el sujeto sin pérdida de referencia, por lo que no es necesario añadir «ellas».
  doctrine_reference: Principio de claridad narrativa sin sobreespecificación del sujeto implícito
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés muestran alta concordancia; no se requieren notas textuales ni alternativas obligatorias. La decisión principal afecta el matiz de ἀποκεκυλισμένον, donde se priorizó el estado resultante en español.
  spanish_consistency_notes:
  - Se mantiene «sepulcro» para μνημεῖον en concordancia con un registro bíblico sobrio y ampliamente inteligible.
  - Se evita «SEÑOR» u այլ masking convention porque no hay tetragrámaton ni κύριος en este versículo.
  - La omisión del sujeto explícito es natural en español y no altera la referencia a las mujeres del contexto anterior.
