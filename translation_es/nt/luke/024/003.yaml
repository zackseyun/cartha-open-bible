translation:
  language: es
  text: Pero cuando entraron[a], no hallaron el cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «el cuerpo del Señor Jesús».'
    reason: textual_variant
lexical_decisions:
- source_word: εἰσελθοῦσαι
  english_pob_choice: when they entered
  chosen_spanish: cuando entraron
  alternatives_spanish:
  - habiendo entrado
  - después de entrar
  lexicon: BDAG
  rationale: El participio aoristo femenino plural se refiere a las mujeres y expresa antecedencia temporal. En español, 'cuando entraron' comunica con naturalidad la relación temporal sin volver la frase rígida.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce avance narrativo con leve contraste. 'Pero' conserva bien el giro inesperado entre su entrada y el hallazgo negativo.
- source_word: οὐχ εὗρον
  english_pob_choice: they did not find
  chosen_spanish: no hallaron
  alternatives_spanish:
  - no encontraron
  - no descubrieron
  lexicon: BDAG
  rationale: εὑρίσκω en aoristo negativo se expresa de manera directa como 'hallar'. 'No hallaron' es natural en español y mantiene la fuerza simple del relato.
- source_word: τὸ σῶμα
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cadáver
  lexicon: BDAG
  rationale: σῶμα significa 'cuerpo'. 'Cadáver' sería posible por el contexto funerario, pero 'cuerpo' sigue más de cerca la elección inglesa y no añade una tonalidad interpretativa más fuerte de la que exige el griego.
theological_decisions:
- issue: Si especificar de quién es el cuerpo
  english_pob_reading: the body
  chosen_spanish_reading: el cuerpo
  alternative_spanish_readings:
  - el cuerpo del Señor Jesús
  rationale: El texto griego suministrado es más breve y no incluye la expansión manuscrita más larga. Por fidelidad al testimonio base, la traducción no incorpora esa especificación en el cuerpo principal.
  doctrine_reference: Translation philosophy §1 (primacía del texto original sobre expansiones de la tradición textual)
translation_notes:
  revision_awareness: 'El texto inglés auditado y la revisión más reciente coinciden en la lectura breve de Lucas 24:3: solo ''the body'', sin incorporar la variante expandida. La redacción española sigue esa decisión y conserva el contraste narrativo con una formulación natural.'
  spanish_consistency_notes:
  - Se mantiene 'cuerpo' para σῶμα, evitando 'cadáver' por su mayor carga interpretativa.
  - Se usa 'Pero' para δέ, en línea con el avance narrativo marcado en inglés.
  - La nota textual se ancla en 'cuerpo' con [a], porque la variante afecta precisamente la especificación del objeto encontrado no hallado.
