revisions:
- from: Pero, al quedar sobrecogidos y llenos de miedo, pensaban que veían un espíritu[a].
  to: Pero, sobresaltados y asustados, pensaban que veían un espíritu[a].
  rationale: Se ajusta «πτοηθέντες» a «sobresaltados» para reflejar mejor el sobresalto repentino documentado en el POB, y «ἔμφοβοι γενόμενοι» a «asustados» para expresar con más naturalidad en español la entrada en un estado de miedo. Se conserva «pensaban que veían» por su buen ajuste al imperfecto con infinitivo presente, y se mantiene «un espíritu» con nota alternativa «un fantasma» según la justificación léxica y teológica existente.
