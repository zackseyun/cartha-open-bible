  timestamp: '2026-05-07T21:03:00Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: contraste discursivo con «Pero», reacción de sobresalto seguida de miedo, y la suposición de que estaban viendo «un espíritu». Sin embargo, «llenos de miedo» debilita el matiz ingresivo de ἔμφοβοι γενόμενοι («volviéndose/asustándose»), y «al quedar» reconfigura la secuencia participial de modo algo menos cercano al original que una formulación verbal más directa.'
  spanish_quality_summary: El español es claro y natural, pero «sobrecogidos y llenos de miedo» suena algo pesado y menos preciso que una combinación como «sobresaltados y asustados». Además, la revisión puede conservar la dignidad del registro sin perder naturalidad. La nota con «fantasma» como alternativa está bien planteada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Espíritu» para πνεῦμα sigue correctamente la decisión léxica y teológica del POB, con «fantasma» relegado a nota como alternativa contextual. No intervienen otros términos del glosario principal.
  issues:
  - severity: medium
    issue: «llenos de miedo» no refleja bien el valor ingresivo de ἔμφοβοι γενόμενοι
    rationale: El griego expresa entrar en un estado de temor («volviéndose/asustándose»), no solo el estado resultante. «Asustados» o «se llenaron de miedo» preservaría mejor esa dinámica.
  - severity: low
    issue: «al quedar sobrecogidos» es menos directo que el participial griego
    rationale: No es incorrecto, pero una formulación como «sobresaltados y asustados» o «al sobresaltarse y asustarse» sigue más de cerca la secuencia πτοηθέντες ... γενόμενοι sin sonar forzada en español.
  - severity: low
    issue: «sobrecogidos» es posible, pero menos transparente que «sobresaltados» para πτοηθέντες
    rationale: La decisión inglesa documentada prioriza la idea de sobresalto repentino. «Sobresaltados» comunica ese matiz de forma más inmediata para lectores contemporáneos.
  revised_spanish_text: Pero, sobresaltados y asustados, pensaban que veían un espíritu[a].
  revised_footnotes:
  - marker: a
    text: O «un fantasma». El griego usa πνεῦμα, más literalmente «espíritu».
    reason: lexical_alternative
  revision_rationale: Se ajusta «πτοηθέντες» a «sobresaltados» para reflejar mejor el sobresalto repentino documentado en el POB, y «ἔμφοβοι γενόμενοι» a «asustados» para expresar con más naturalidad en español la entrada en un estado de miedo. Se conserva «pensaban que veían» por su buen ajuste al imperfecto con infinitivo presente, y se mantiene «un espíritu» con nota alternativa «un fantasma» según la justificación léxica y teológica existente.
