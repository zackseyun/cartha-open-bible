translation:
  language: es
  text: Pero, sobresaltados y asustados, pensaban que veían un espíritu[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un fantasma». El griego usa πνεῦμα, más literalmente «espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: πτοηθέντες
  english_pob_choice: startled
  chosen_spanish: sobrecogidos
  alternatives_spanish:
  - sobresaltados
  - asustados
  lexicon: BDAG
  rationale: El participio aoristo pasivo expresa una reacción súbita de turbación. «Sobrecogidos» comunica bien el impacto repentino sin endurecer el matiz hacia «terrorizados», y encaja con el contexto inmediato.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ marca una transición suave con contraste discursivo. «Pero» preserva esa inflexión natural en español.
- source_word: ἔμφοβοι γενόμενοι
  english_pob_choice: becoming afraid
  chosen_spanish: llenos de miedo
  alternatives_spanish:
  - aterrorizados
  - temerosos
  lexicon: BDAG
  rationale: La construcción con γενόμενοι expresa volverse a un estado de temor. «Llenos de miedo» reproduce el resultado de la entrada en ese estado sin perder naturalidad en español; también mantiene la progresión con el participio anterior.
- source_word: ἐδόκουν
  english_pob_choice: thought
  chosen_spanish: pensaban
  alternatives_spanish:
  - creían
  - suponían
  lexicon: BDAG
  rationale: El imperfecto señala una impresión en curso. «Pensaban» conserva ese valor imperfectivo y suena natural en español.
- source_word: πνεῦμα
  english_pob_choice: a spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - un fantasma
  - un alma
  lexicon: BDAG
  rationale: En este contexto de aparición post-resurrección, πνεῦμα designa lo que los discípulos toman por una entidad no corpórea. «Un espíritu» es la equivalencia léxica más directa; «fantasma» sería más interpretativa y culturalmente cargada.
- source_word: θεωρεῖν
  english_pob_choice: were seeing
  chosen_spanish: veían
  alternatives_spanish:
  - estaban viendo
  - miraban
  lexicon: BDAG
  rationale: El infinitivo presente tras ἐδόκουν expresa percepción continua o en desarrollo. «Veían» transmite de forma idiomática esa impresión sostenida sin forzar una perífrasis excesiva.
theological_decisions:
- issue: πνεῦμα en un contexto de resurrección
  english_pob_reading: a spirit
  chosen_spanish_reading: un espíritu
  alternative_spanish_readings:
  - un fantasma
  rationale: 'Se mantiene la tensión narrativa: los discípulos interpretan erróneamente la aparición como una presencia no corporal. «Un espíritu» sigue de cerca el griego πνεῦμα y evita resolver la escena con un término más folclórico o más cargado que el original.'
  doctrine_reference: La traducción conserva el malentendido de los discípulos sin suavizarlo ni armonizarlo con una lectura doctrinal posterior.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el orden y la progresión aspectual del griego: primero la reacción súbita, luego el estado de temor y finalmente la percepción equivocada. Se mantiene la alternativa «fantasma» como nota, tal como el audit trail inglés preserva la opción culturalmente posible, pero se privilegia «espíritu» por fidelidad léxica.'
  spanish_consistency_notes:
  - Se usa «espíritu» para πνεῦμα conforme al criterio general del proyecto.
  - «Pero» traduce adecuadamente δέ como transición adversativa suave.
  - «Pensaban» conserva el imperfecto de ἐδόκουν y su valor de impresión sostenida.
  - La secuencia de participios se resuelve en español con una construcción fluida, sin perder la progresión del original.
