review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: el modismo temporal τῇ δὲ μιᾷ τῶν σαββάτων se entiende correctamente como el primer día de la semana; ὄρθρου βαθέως se expresa como una hora muy temprana; ἐπὶ τὸ μνῆμα se dirige correctamente al sepulcro; y el participio φέρουσαι se conserva como acción concurrente. Sin embargo, hay dos ajustes importantes para una preservación más fiel y natural: en español no se dice naturalmente ''en el primer día de la semana'' sino ''el primer día de la semana'', y ἀρώματα en contexto funerario se vierte mejor como ''especias aromáticas'' o ''perfumes'' antes que ''aromas'', que suena abstracto.'
  spanish_quality_summary: La redacción es en general clara y digna, pero presenta leve interferencia estructural del inglés/griego en 'en el primer día de la semana'. 'Muy de mañana' es aceptable, aunque 'muy temprano al amanecer' o 'muy de madrugada' podría ser más vívido; no es necesario cambiarlo. 'Fueron al sepulcro' es natural, aunque 'vinieron' reflejaría más de cerca ἦλθον desde la perspectiva narrativa; no es un error. El principal problema de legibilidad es 'los aromas', que en español bíblico actual suena poco idiomático para sustancias funerarias concretas.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. La nota sobre 'el primero de los sábados' preserva adecuadamente la alternativa literal. La decisión léxica sobre ἀρώματα debería alinearse mejor con el contexto semántico documentado por el POB inglés ('spices'), usando 'especias aromáticas' en vez de 'aromas'.
  issues:
  - severity: medium
    issue: Calco poco natural en 'en el primer día de la semana'
    rationale: 'Aunque comprensible, en español natural la expresión temporal se formula sin ''en'': ''el primer día de la semana''. Esto preserva el sentido idiomático del griego con mejor fluidez.'
  - severity: medium
    issue: '''Los aromas'' no representa bien ἀρώματα en contexto funerario'
    rationale: En español, 'aromas' suele referirse al olor o fragancia, no a las sustancias materiales que llevaban. El griego aquí apunta a especias/sustancias aromáticas preparadas para la sepultura.
  - severity: low
    issue: La nota al pie puede pulirse estilísticamente
    rationale: La formulación actual entrecomillada y con comillas internas es entendible, pero puede simplificarse para mayor naturalidad editorial en español.
