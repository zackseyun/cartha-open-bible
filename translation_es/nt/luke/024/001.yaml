translation:
  language: es
  text: Pero el primer día de la semana[a], muy de mañana, fueron al sepulcro, llevando las especias aromáticas que habían preparado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, "el primero de los sábados", un modismo que significa "el primer día de la semana".
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ δὲ μιᾷ τῶν σαββάτων
  english_pob_choice: on the first day of the week
  chosen_spanish: en el primer día de la semana
  alternatives_spanish:
  - el primer día de la semana
  - el primer día después del sábado
  - el primer día de los sábados
  lexicon: BDAG
  rationale: La expresión griega es un modismo semítico/koine para indicar el primer día de la semana; en español, 'en el primer día de la semana' comunica con claridad el sentido temporal sin forzar una calca opaca.
- source_word: ὄρθρου βαθέως
  english_pob_choice: at early dawn
  chosen_spanish: muy de mañana
  alternatives_spanish:
  - al amanecer
  - al alba
  - muy temprano
  lexicon: BDAG
  rationale: La frase intensifica la referencia temporal y señala una hora muy temprana. 'Muy de mañana' es natural en español y conserva esa intensidad sin volverla excesivamente interpretativa.
- source_word: ἐπὶ τὸ μνῆμα
  english_pob_choice: to the tomb
  chosen_spanish: al sepulcro
  alternatives_spanish:
  - a la tumba
  - al sepulcro funerario
  lexicon: BDAG
  rationale: Con verbo de movimiento, ἐπί indica dirección hacia el lugar. 'Sepulcro' es idiomático y preciso en el contexto funerario, y mantiene el registro reverente del relato.
- source_word: ἦλθον
  english_pob_choice: they came
  chosen_spanish: fueron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: BDAG
  rationale: '''Ἦλθον'' reporta el desplazamiento hacia el lugar. En español, ''fueron'' funciona de manera natural con la dirección marcada por ''al sepulcro''.'
- source_word: φέρουσαι
  english_pob_choice: bringing
  chosen_spanish: llevando
  alternatives_spanish:
  - trayendo
  - portando
  lexicon: BDAG
  rationale: El participio describe una acción concurrente con 'fueron'. 'Llevando' es la opción más fluida y precisa para el movimiento de transportar objetos.
- source_word: ἃ ἡτοίμασαν ἀρώματα
  english_pob_choice: the spices they had prepared
  chosen_spanish: los aromas que habían preparado
  alternatives_spanish:
  - las especias que habían preparado
  - los ungüentos que habían preparado
  - las fragancias que habían preparado
  lexicon: BDAG
  rationale: Ἀρώματα designa sustancias aromáticas usadas en la sepultura; 'aromas' conserva la amplitud léxica sin restringirlo artificialmente a 'especias'. La cláusula relativa reproduce el hecho de que ya estaban preparados para el rito funerario.
theological_decisions:
- issue: Modismo temporal de resurrección τῇ μιᾷ τῶν σαββάτων
  english_pob_reading: on the first day of the week
  chosen_spanish_reading: en el primer día de la semana
  alternative_spanish_readings:
  - en el primer de los sábados
  - en el primer día después del sábado
  rationale: Se privilegia el sentido idiomático normal del griego para no introducir una tensión calendárica ajena al texto. La redacción española evita una literalidad que podría oscurecer el relato de la resurrección.
  doctrine_reference: Principio de primacía del idioma original; mantener la tensión textual sin imponer cronologías sectarias
translation_notes:
  revision_awareness: El inglés auditable pasó de 'at deep dawn' a 'at early dawn' por naturalidad; en español se optó por 'muy de mañana' para conservar el sentido intensivo del griego ὄρθρου βαθέως sin sonar artificioso. La elección de 'sepulcro' y 'llevando' sigue el contexto narrativo y funerario del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' cuando aparezca el nombre divino; aquí no ocurre.
  - No se usa 'Cristo' ni 'Mesías' en este versículo.
  - '''Aromas'' se escogió como equivalente amplio de ἀρώματα; en contextos futuros, si el auditorio requiere más especificidad, puede considerarse ''especias'' o ''ungüentos'' con nota.'
  - La puntuación y el ritmo buscan ser publicables en español moderno sin perder el tono reverente del relato.
