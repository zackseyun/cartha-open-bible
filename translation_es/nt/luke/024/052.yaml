translation:
  language: es
  text: Y ellos[a], después de adorarle, volvieron a Jerusalén con gran gozo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos omiten «después de adorarle».
    reason: textual_variant
  - marker: b
    text: O «después de postrarse ante él» / «después de rendirle homenaje».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simple mantiene la relación narrativa sin añadir una secuencia temporal más marcada de lo que exige el griego.
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: BDAG
  rationale: El pronombre explícito puede reflejarse con «ellos»; «ellos mismos» sería más enfático de lo necesario en español y sonaría recargado.
- source_word: προσκυνήσαντες αὐτόν
  english_pob_choice: after worshiping him
  chosen_spanish: después de adorarle
  alternatives_spanish:
  - habiéndole adorado
  - después de postrarse ante él
  - después de rendirle homenaje
  lexicon: BDAG
  rationale: En este contexto posresurrección, «adorar» comunica con naturalidad el sentido culto de προσκυνέω sin rebajar el acto a mera reverencia física. «Le» conserva el objeto personal directo referido a Jesús.
- source_word: ὑπέστρεψαν
  english_pob_choice: returned
  chosen_spanish: volvieron
  alternatives_spanish:
  - regresaron
  lexicon: BDAG
  rationale: «Volvieron» expresa bien el retorno narrativo en español moderno y evita una formalidad innecesaria.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  lexicon: BDAG
  rationale: Con nombre de ciudad, el español natural usa «a Jerusalén»; mantiene el valor direccional sin sobreespecificar movimiento hacia el interior.
- source_word: μετὰ χαρᾶς μεγάλης
  english_pob_choice: with great joy
  chosen_spanish: con gran gozo
  alternatives_spanish:
  - con mucha alegría
  - con gran alegría
  lexicon: BDAG
  rationale: «Gozo» preserva un registro bíblico claro para χαρά y «gran» refleja el intensificador de μέγας. «Alegría» sería válida, pero «gozo» encaja mejor con el tono litúrgico-narrativo del pasaje.
theological_decisions:
- issue: Sentido de προσκυνέω aplicado a Jesús resucitado
  english_pob_reading: worshiping him
  chosen_spanish_reading: adorarle
  alternative_spanish_readings:
  - postrarse ante él
  - rendirle homenaje
  rationale: En este contexto, el acto va más allá de una simple inclinación corporal; «adorarle» conserva la fuerza religiosa del verbo sin agregar contenido ajeno al pasaje.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3
- issue: Variante textual del participio bracketed
  english_pob_reading: included in the main text with a textual-variant footnote
  chosen_spanish_reading: incluido en el texto principal con nota de variante textual
  alternative_spanish_readings:
  - omitir la frase por incertidumbre textual
  rationale: Como el griego proporcionado conserva la frase aunque marcada críticamente, se traduce en el cuerpo principal y se documenta la incertidumbre textual en una nota.
  doctrine_reference: Critical text / textual apparatus practice
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT proporcionado y la auditoría inglesa; conserva la frase marcada críticamente y registra la alternativa léxica principal para προσκυνέω.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se mantiene un español bíblico moderno y digno, evitando calcos innecesarios.
  - «Gozo» se prefirió sobre «alegría» para conservar el registro y la resonancia bíblica del pasaje.
