    issue: Uso de enclítico en «adorarle»
    rationale: En español latinoamericano moderno también sería natural «adorarlo», pero «adorarle» sigue siendo inteligible y digno; no afecta fidelidad ni claridad de manera suficiente para requerir cambio.
