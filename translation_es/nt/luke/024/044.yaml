  text: Εἶπεν δὲ ⸂πρὸς αὐτούς⸃· Οὗτοι οἱ λόγοι ⸀μου οὓς ἐλάλησα πρὸς ὑμᾶς ἔτι ὢν σὺν ὑμῖν, ὅτι δεῖ πληρωθῆναι πάντα τὰ γεγραμμένα ἐν τῷ νόμῳ Μωϋσέως ⸀καὶ προφήταις καὶ ψαλμοῖς περὶ ἐμοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/024/044.yaml
  text: 'Then he said to them[c][b][a], “These are my words that I spoke to you while I was still with you: that everything written about me in the Law of Moses and the Prophets and the Psalms must be fulfilled.”'
  footnotes:
  - marker: a
    text: Or 'all the things written.'
    reason: lexical_alternative
  - marker: b
    text: '''The Law of Moses and the Prophets and the Psalms'' likely refers to the major divisions of Israel''s Scriptures; ''Psalms'' may stand specifically for the Psalter or more broadly for the Writings.'
    reason: cultural_note
  - marker: c
    text: Or 'concerning me.'
    reason: lexical_alternative
