translation:
  language: es
  text: 'Entonces les dijo: «Estas son mis palabras que les hablé mientras todavía estaba con ustedes: que todo[b] lo escrito en la Ley de Moisés, los Profetas y los Salmos[c] debe cumplirse, acerca de mí[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con respecto a mí».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «todas las cosas escritas».'
    reason: lexical_alternative
  - marker: c
    text: Probablemente alude a las grandes divisiones de las Escrituras de Israel; «Salmos» puede referirse al Salterio o, más ampliamente, a los Escritos.
    reason: cultural_note
lexical_decisions:
- source_word: Οὗτοι οἱ λόγοι μου
  english_pob_choice: These are my words
  chosen_spanish: Estas son mis palabras
  alternatives_spanish:
  - Estas son las palabras mías
  - Estas son mis dichos
  lexicon: BDAG
  rationale: La construcción demostrativa con artículo en griego se vierte de forma natural en español con ‘Estas son...’. ‘Palabras’ conserva λόγοι sin volverlo excesivamente solemne o técnico. ‘Mis palabras’ mantiene el sentido posesivo directo de μου.
- source_word: ἐλάλησα
  english_pob_choice: that I spoke to you
  chosen_spanish: que les hablé
  alternatives_spanish:
  - que les hablé a ustedes
  - que les dije
  lexicon: BDAG
  rationale: λαλέω aquí expresa el acto de hablar; en español ‘hablé’ es natural y fiel. ‘Les’ conserva el destinatario del discurso sin recargar la frase.
- source_word: ἔτι ὢν σὺν ὑμῖν
  english_pob_choice: while I was still with you
  chosen_spanish: mientras todavía estaba con ustedes
  alternatives_spanish:
  - cuando todavía estaba con ustedes
  - mientras aún estaba con ustedes
  lexicon: BDAG
  rationale: La construcción participial temporal se expresa mejor con una subordinada temporal. ‘Todavía’ traduce ἔτι y ‘con ustedes’ reproduce σύν + dativo con registro natural en español.
- source_word: πάντα τὰ γεγραμμένα
  english_pob_choice: everything written
  chosen_spanish: todo lo escrito
  alternatives_spanish:
  - todo lo que está escrito
  - todas las cosas escritas
  lexicon: BDAG
  rationale: El griego neutro plural tiene fuerza colectiva; ‘todo lo escrito’ preserva el alcance total sin sonar forzado. Mantiene abierta la alternativa documentada entre ‘everything written’ y ‘all the things written’.
- source_word: ἐν τῷ νόμῳ Μωϋσέως καὶ προφήταις καὶ ψαλμοῖς
  english_pob_choice: in the Law of Moses and the Prophets and the Psalms
  chosen_spanish: en la Ley de Moisés y en los Profetas y en los Salmos
  alternatives_spanish:
  - en la Ley de Moisés, y en los Profetas, y en los Salmos
  - en la Ley de Moisés y los Profetas y los Salmos
  lexicon: BDAG
  rationale: Se conservan los tres nombres de escrituras con mayúscula por tratarse de designaciones corporares reconocibles. ‘Ley de Moisés’ sigue de cerca el genitivo y evita imponer una glosa más técnica.
- source_word: περὶ ἐμοῦ
  english_pob_choice: about me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - sobre mí
  - con respecto a mí
  lexicon: BDAG
  rationale: περί con genitivo indica referencia temática. ‘Acerca de mí’ es claro en español y mantiene la amplitud semántica sin volverla demasiado abstracta.
- source_word: δεῖ πληρωθῆναι
  english_pob_choice: must be fulfilled
  chosen_spanish: debe cumplirse
  alternatives_spanish:
  - tiene que cumplirse
  - debe ser cumplido
  lexicon: BDAG
  rationale: ‘Debe’ conserva la necesidad divina implícita en δεῖ. ‘Cumplirse’ comunica naturalmente πληρωθῆναι en contexto escritural; en español evita una pasiva rígida y mantiene la fuerza de cumplimiento profético.
theological_decisions:
- issue: Necesidad divina en δεῖ πληρωθῆναι
  english_pob_reading: must be fulfilled
  chosen_spanish_reading: debe cumplirse
  alternative_spanish_readings:
  - tenía que cumplirse
  - era necesario que se cumpliera
  rationale: La frase expresa necesidad, pero el versículo no desarrolla una teoría explícita de cómo ocurre el cumplimiento. ‘Debe cumplirse’ conserva la fuerza teológica sin suavizarla ni explicar de más.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Identificación de ‘la Ley de Moisés y los Profetas y los Salmos’
  english_pob_reading: named scriptural corpora, likely the threefold division of the Hebrew Scriptures
  chosen_spanish_reading: nombres de corpus escriturarios, probablemente la división tripartita de las Escrituras de Israel
  alternative_spanish_readings:
  - secciones principales de las Escrituras
  - la Ley, los Profetas y los Salmos como conjunto canónico
  rationale: La frase puede leerse como una referencia al conjunto de las Escrituras de Israel; en la traducción principal no se añade explicación interpretativa, pero se preserva la posibilidad canónica en la nota.
  doctrine_reference: Primacía del texto original y cautela canónica
translation_notes:
  revision_awareness: El texto español sigue de cerca la lectura óptima-equivalente ya aprobada en inglés, sin cambios de sentido ni expansión interpretativa. Se mantuvieron la necesidad de δεῖ, el alcance total de πάντα τὰ γεγραμμένα y la ambigüedad canónica de ‘la Ley de Moisés y los Profetas y los Salmos’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantiene ‘Ley de Moisés’ como equivalente transparente de ἐν τῷ νόμῳ Μωϋσέως.
  - ‘Profetas’ y ‘Salmos’ se capitalizan por tratarse de designaciones escriturarias.
  - Se evita ‘Cristo’ porque el versículo no contiene Χριστός/mesías.
  - ‘Debe cumplirse’ conserva la fuerza de obligación/necessidad sin convertir el verbo en una explicación doctrinal.
