translation:
  language: es
  text: Y estas palabras les parecieron disparates[a], y no les creían a ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Disparates» busca un equivalente idiomático de λῆρος. Otras posibilidades válidas, según matiz, serían «tonterías», «cuento sin sentido» o «habla delirante».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφάνησαν
  english_pob_choice: seemed
  chosen_spanish: les parecieron
  alternatives_spanish:
  - les parecieron ser
  - les parecieron como
  lexicon: BDAG
  rationale: El contexto evaluativo con ὡσεὶ λῆρος pide en español una percepción/jucio, no una simple visibilidad. «Parecerles» transmite bien la valoración subjetiva de los oyentes.
- source_word: ἐνώπιον αὐτῶν
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - delante de ellos
  - ante ellos
  lexicon: BDAG
  rationale: 'Como en el inglés auditado, el sentido idiomático aquí es dativo de referencia: la impresión que causaron las palabras en quienes las oían. «Les» evita la rigidez de un calco literal.'
- source_word: ὡσεὶ λῆρος
  english_pob_choice: like nonsense
  chosen_spanish: como disparates
  alternatives_spanish:
  - como tonterías
  - como un cuento sin sentido
  - como locuras
  lexicon: BDAG
  rationale: λῆρος denota habla considerada sin sentido, absurda o delirante. «Disparates» comunica esa descalificación con naturalidad en español y conserva el valor comparativo de ὡσεὶ mediante «como».
- source_word: τὰ ῥήματα ταῦτα
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estos dichos
  - este mensaje
  - este reporte
  lexicon: BDAG
  rationale: La frase es directa y debe mantenerse cercana al griego. «Palabras» es el equivalente más transparente y no introduce una interpretación adicional como «reporte».
- source_word: ἠπίστουν
  english_pob_choice: did not believe
  chosen_spanish: no les creían
  alternatives_spanish:
  - no creían
  - no las creían
  - las rechazaban
  lexicon: BDAG
  rationale: El imperfecto sugiere una incredulidad continua. En español, «no les creían» comunica esa acción sostenida sin añadir una intención más fuerte que la del verbo.
- source_word: αὐταῖς
  english_pob_choice: them
  chosen_spanish: a ellas
  alternatives_spanish:
  - les
  - a las mujeres
  lexicon: BDAG
  rationale: El pronombre femenino plural debe mantenerse de manera explícita para reflejar el referente inmediato del contexto. «A ellas» sigue el griego con precisión y evita expandir el texto más allá de lo necesario.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el pasaje griego y el ajuste final del texto inglés auditado: αὐταῖς se conserva con un pronombre femenino plural explícito («a ellas») en vez de expandirlo a «las mujeres». También se preserva el valor evaluativo de ἐφάνησαν con una forma natural de percepción en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto para el nombre divino en el proyecto, pero este versículo no contiene el Tetragrámaton ni una alusión directa que requiera aclaración.
  - Se prefirió «disparates» por su fuerza semántica moderada y su registro bíblico-publicable, evitando un calco demasiado literal o una expresión excesivamente coloquial.
  - La estructura mantiene el paralelismo de dos cláusulas coordinadas como en el griego.
