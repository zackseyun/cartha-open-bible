translation:
  language: es
  text: Y he aquí que dos de ellos iban aquel mismo día a una aldea que distaba sesenta estadios[a] de Jerusalén, cuyo nombre era Emaús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un estadio era una antigua unidad de distancia; sesenta estadios equivalen aproximadamente a 11 kilómetros.
    reason: cultural_note
lexical_decisions:
- source_word: Καὶ ἰδοὺ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí[a]
  alternatives_spanish:
  - Y he aquí
  - Y mirad
  - Y verás
  lexicon: BDAG
  rationale: He conservado la partícula narrativa de atención de Lucas con una fórmula española natural y sobria. «He aquí» reproduce mejor la fuerza de presentación que un simple «y» o una paráfrasis más libre, y evita perder el énfasis discursivo del griego.
- source_word: δύο ἐξ αὐτῶν
  english_pob_choice: two of them
  chosen_spanish: dos de ellos
  alternatives_spanish:
  - dos entre ellos
  - dos de entre ellos
  lexicon: BDAG
  rationale: La construcción partitiva se expresa con naturalidad en español como «dos de ellos». Mantiene la referencia a un grupo mayor sin añadir precisión no requerida por el texto.
- source_word: ἐν αὐτῇ τῇ ἡμέρᾳ
  english_pob_choice: that very day
  chosen_spanish: aquel mismo día
  alternatives_spanish:
  - ese mismo día
  - ese día
  - aquel día
  lexicon: BDAG
  rationale: «Aquel mismo día» conserva el énfasis del demostrativo con artículo y la idea de inmediatez resaltada por el inglés POB. Evita aplanar la expresión a un simple «ese día».
- source_word: ἦσαν πορευόμενοι
  english_pob_choice: were going
  chosen_spanish: iban
  alternatives_spanish:
  - estaban yendo
  - estaban viajando
  - se dirigían
  lexicon: BDAG
  rationale: El imperfecto perifrástico marca una acción en curso en pasado. «Iban» es una solución breve y natural en español que conserva el movimiento sin sobrecargar el verso con una perífrasis menos idiomática.
- source_word: εἰς κώμην
  english_pob_choice: to a village
  chosen_spanish: a una aldea
  alternatives_spanish:
  - a un pueblo
  - hacia una aldea
  lexicon: BDAG
  rationale: «κώμη» designa una aldea o poblado menor; «aldea» refleja mejor el valor léxico que «pueblo» en este contexto. «A» expresa adecuadamente la dirección del movimiento.
- source_word: ἀπέχουσαν σταδίους ἑξήκοντα ἀπὸ Ἰερουσαλήμ
  english_pob_choice: sixty stadia from Jerusalem
  chosen_spanish: que distaba sesenta estadios de Jerusalén
  alternatives_spanish:
  - a sesenta estadios de Jerusalén
  - situada a sesenta estadios de Jerusalén
  - que estaba a sesenta estadios de Jerusalén
  lexicon: BDAG
  rationale: He mantenido el término de medida antiguo en el texto principal, siguiendo la transparencia del inglés POB. «Distaba» reproduce bien la idea de distancia y suena más natural y precisa que una paráfrasis como «estaba a».
- source_word: ᾗ ὄνομα Ἐμμαοῦς
  english_pob_choice: whose name was Emmaus
  chosen_spanish: llamada Emaús
  alternatives_spanish:
  - cuyo nombre era Emaús
  - de nombre Emaús
  - que se llamaba Emaús
  lexicon: BDAG
  rationale: La relativa nominal griega se vierte con una fórmula española fluida. «Llamada Emaús» conserva el sentido identificador sin forzar una construcción pesada como «cuyo nombre era».
translation_notes:
  revision_awareness: Concordancia alta con la revisión final del POB en inglés; no se identificaron cambios sustanciales aplicables al español. Se conservó la transparencia de la medida antigua y el énfasis narrativo de Lucas sin añadir interpretaciones.
  spanish_consistency_notes:
  - Se mantuvo «Emaús» como forma española estándar del topónimo.
  - Se evitó «SEÑOR» u otras equivalencias irrelevantes, ya que el versículo no contiene el nombre divino.
  - La medida «estadios» se preservó en el texto principal por fidelidad al dato cultural y la nota aclara su equivalencia aproximada.
  - El tono es sobrio y bíblico, pero con sintaxis española natural.
