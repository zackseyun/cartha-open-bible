translation:
  language: es
  text: Y he aquí[a], yo estoy enviando la promesa de mi Padre sobre ustedes. Pero quédense en la ciudad[b] hasta que sean revestidos de poder desde lo alto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Es decir, la promesa vinculada al Espíritu Santo en el contexto inmediato; el griego dice más literalmente: ''la promesa de mi Padre''.'
    reason: cross_reference
  - marker: b
    text: '''La ciudad'' se refiere a Jerusalén, aunque el griego no la nombra explícitamente aquí.'
    reason: cross_reference
  - marker: c
    text: O 'desde arriba'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  - fíjense
  lexicon: BDAG
  rationale: He aquí conserva el valor de llamada de atención del griego ἰδοὺ con registro digno y natural en español bíblico, sin caer en un calco demasiado moderno ni en una formulación demasiado doméstica.
- source_word: ἐξαποστέλλω
  english_pob_choice: am sending
  chosen_spanish: estoy enviando
  alternatives_spanish:
  - envío
  - estoy mandando
  lexicon: BDAG
  rationale: El presente progresivo comunica mejor la inminencia y el acto en curso que el simple presente, y mantiene la fuerza de la acción de envío sin sobreinterpretar el matiz del compuesto.
- source_word: ἐπαγγελίαν
  english_pob_choice: the promise
  chosen_spanish: la promesa
  alternatives_spanish:
  - lo prometido
  - el don prometido
  lexicon: BDAG
  rationale: Promesa preserva el sustantivo y su resonancia teológica. Aunque el contexto lucano apunta al Espíritu Santo, el versículo dice literalmente 'la promesa de mi Padre', por lo que no se explicita más en el texto principal.
- source_word: ἐφ’ ὑμᾶς
  english_pob_choice: upon you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - sobre ustedes
  - a ustedes
  - encima de ustedes
  lexicon: BDAG
  rationale: Sobre ustedes reproduce bien la imagen de algo que viene a recaer sobre los discípulos. Es claro en español y evita una lectura menos idiomática de 'upon'.
- source_word: καθίσατε
  english_pob_choice: stay
  chosen_spanish: quédense
  alternatives_spanish:
  - permanezcan
  - queden
  - siéntense
  lexicon: BDAG
  rationale: En este mandato, el verbo tiene sentido idiomático de permanecer en un lugar. Quédense expresa de forma natural la permanencia ordenada, sin perder la idea básica de quedarse donde están.
- source_word: πόλει
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: BDAG
  rationale: Se conserva la referencia genérica del texto griego, que no nombra Jerusalén explícitamente en este versículo. La ciudad mantiene la transparencia textual y se ajusta al uso idiomático del español.
- source_word: ἕως οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta
  lexicon: BDAG
  rationale: Hasta que expresa con naturalidad el límite temporal esperado en español y conserva la estructura de espera hasta un evento definido.
- source_word: ἐνδύσησθε
  english_pob_choice: you are clothed
  chosen_spanish: sean vestidos
  alternatives_spanish:
  - se vistan
  - sean revestidos
  - sean cubiertos
  lexicon: BDAG
  rationale: 'La pasiva es importante: el don viene sobre ellos y ellos lo reciben. Sean vestidos conserva la metáfora de vestirse con una investidura de poder, y se entiende sin forzar un giro más litúrgico.'
- source_word: ἐξ ὕψους
  english_pob_choice: from on high
  chosen_spanish: desde lo alto
  alternatives_spanish:
  - desde arriba
  - desde las alturas
  lexicon: BDAG
  rationale: Desde lo alto reproduce el sentido de origen celestial de manera clara y solemne. También mantiene la ambigüedad relativa de la expresión, sin precisar más de lo que el griego dice.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - capacidad
  lexicon: BDAG
  rationale: Poder es la correspondencia más directa y robusta para el contexto lucano de investidura divina y testimonio, conservando el peso teológico del término.
theological_decisions:
- issue: Identificación de 'la promesa de mi Padre'
  english_pob_reading: The verse is translated literally as 'the promise of my Father,' with contextual linkage to the Holy Spirit left in a note rather than the main text.
  chosen_spanish_reading: Se traduce literalmente 'la promesa de mi Padre' y se aclara en nota su relación contextual con el Espíritu Santo.
  alternative_spanish_readings:
  - el Espíritu Santo prometido por mi Padre
  - el don prometido de mi Padre
  rationale: El contexto lucano efectivamente apunta al Espíritu Santo, pero el griego de este versículo usa una formulación más general. Para no introducir una expansión interpretativa en el cuerpo del texto, se mantiene la literalidad y se explica la referencia en nota.
  doctrine_reference: Primacía del texto original; no importar al cuerpo de la traducción una identificación que el versículo no formula explícitamente.
- issue: Referencia a 'la ciudad'
  english_pob_reading: The city refers to Jerusalem, though the Greek text does not name it explicitly in this verse.
  chosen_spanish_reading: Se mantiene 'la ciudad' sin nombrar Jerusalén en el texto principal.
  alternative_spanish_readings:
  - Jerusalén
  - la ciudad, es decir, Jerusalén
  rationale: El referente es claro por el contexto narrativo, pero el versículo no lo dice explícitamente. Mantener 'la ciudad' preserva la transparencia textual y evita añadir información no expresada en la línea griega.
  doctrine_reference: Transparencia de traducción y prioridad del texto fuente sobre la ampliación explicativa en el cuerpo principal.
- issue: Metáfora de investidura con poder
  english_pob_reading: you are clothed with power from on high
  chosen_spanish_reading: sean vestidos con poder desde lo alto
  alternative_spanish_readings:
  - sean revestidos de poder desde lo alto
  - se vistan de poder desde lo alto
  rationale: La metáfora de vestirse debe conservarse porque el griego emplea ἐνδύω en pasiva. 'Vestidos' comunica la recepción de una investidura divina sin convertir la imagen en una formulación puramente abstracta.
  doctrine_reference: Respeto de la metáfora bíblica y de la pasiva receptiva del texto.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del contexto inglés al preferir un registro más formal para ἰδοὺ; por eso se eligió 'he aquí' en lugar de opciones más coloquiales. También se mantuvieron las decisiones revisadas de conservar la literalidad de 'la promesa de mi Padre' y de 'la ciudad', sin introducir expansiones interpretativas en el cuerpo principal.
  spanish_consistency_notes:
  - Se conserva la segunda persona plural de trato reverente/neutral como 'ustedes', coherente con un español bíblico de alcance amplio.
  - '''He aquí'' mantiene un registro elevado y estable en español bíblico, coherente con la evolución editorial del audit trail inglés.'
  - La metáfora de vestir con poder se conserva sin sustituirla por una abstracción como 'ser fortalecidos', para respetar el griego.
  - No se nombra 'Jerusalén' en el cuerpo principal porque el versículo griego no la nombra; se aclara solo en nota.
