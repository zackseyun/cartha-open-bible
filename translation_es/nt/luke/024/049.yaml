  text: καὶ ἰδοὺ ἐγὼ ⸀ἐξαποστέλλω τὴν ἐπαγγελίαν τοῦ πατρός μου ἐφ’ ὑμᾶς· ὑμεῖς δὲ καθίσατε ἐν τῇ ⸀πόλει ἕως οὗ ἐνδύσησθε ⸂ἐξ ὕψους δύναμιν⸃.
base_translation:
  language: en
  yaml_path: translation/nt/luke/024/049.yaml
  text: And behold[a], I am sending the promise of my Father upon you[c][b]. But stay in the city until you are clothed with power from on high.
  footnotes:
