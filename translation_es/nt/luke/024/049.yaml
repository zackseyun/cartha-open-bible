    text: That is, the promise associated with the Holy Spirit in the surrounding context; the Greek here reads more literally, 'the promise of my Father.'
    reason: cross_reference
  - marker: b
    text: '''The city'' refers to Jerusalem, though the Greek text does not name it explicitly in this verse.'
    reason: cross_reference
  - marker: c
    text: Or 'from above.'
    reason: lexical_alternative
