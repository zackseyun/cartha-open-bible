revisions:
- from: 'Y le dijo: «¿Por qué están turbados, y por qué surgen dudas[a] en su corazón?»'
  to: 'Y les dijo: «¿Por qué están turbados, y por qué surgen dudas[a] en sus corazones?»'
  rationale: Se corrige «le» a «les» para reflejar αὐτοῖς y se cambia «en su corazón» por «en sus corazones» para un español más natural y para representar con mayor claridad el posesivo plural ὑμῶν, manteniendo «corazón» como término teológicamente importante.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:03:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: τί = «¿por qué?», τεταραγμένοι = «turbados», διαλογισμοὶ = «dudas», ἀναβαίνουσιν = «surgen», y καρδία se mantiene como «corazón». También preserva correctamente la nota léxica sobre «dudas». Sin embargo, omite explícitamente el complemento plural αὐτοῖς («a ellos») en el texto principal y, más importante, «en su corazón» suena ambiguo y menos natural en español para un grupo; el plural «en sus corazones» comunica mejor el plural ὑμῶν sin perder la antropología de «corazón».'
  spanish_quality_summary: El español es claro y digno, pero «Y le dijo» resulta menos preciso que «Y les dijo», ya que el original es plural. Además, con tratamiento plural, «su corazón» puede leerse como singular colectivo o incluso referirse a otra persona; «sus corazones» es más natural y plenamente comprensible en español eclesial general. El resto del verso suena bien y no es acartonado.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Corazón» respeta la decisión antropológica documentada para καρδία. «Dudas» concuerda con la elección contextual de διαλογισμοὶ, y la nota con «pensamientos»/«razonamientos» preserva las alternativas auditadas.
  issues:
  - severity: medium
    issue: «Y le dijo» no refleja el dativo plural αὐτοῖς.
    rationale: El griego dice claramente «y les dijo a ellos». En español, «les dijo» es la forma fiel y natural.
  - severity: medium
    issue: «en su corazón» es menos natural y más ambiguo que «en sus corazones» para ἐν τῇ καρδίᾳ ὑμῶν.
    rationale: Aunque el singular griego con posesivo plural puede ser distributivo, la propia auditoría inglesa revisó a plural por naturalidad. En español, el plural evita ambigüedad y representa mejor que las dudas surgen en cada uno de ellos.
  revised_spanish_text: 'Y les dijo: «¿Por qué están turbados, y por qué surgen dudas[a] en sus corazones?»'
  revised_footnotes:
  - marker: a
    text: O «pensamientos» o «razonamientos» para «dudas».
    reason: lexical_alternative
  revision_rationale: Se corrige «le» a «les» para reflejar αὐτοῖς y se cambia «en su corazón» por «en sus corazones» para un español más natural y para representar con mayor claridad el posesivo plural ὑμῶν, manteniendo «corazón» como término teológicamente importante.
