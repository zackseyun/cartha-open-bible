translation:
  language: es
  text: 'Y les dijo: «¿Por qué están turbados, y por qué surgen dudas[a] en sus corazones?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pensamientos» o «razonamientos» para «dudas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  - ¿Por qué razón
  lexicon: BDAG
  rationale: En esta construcción interrogativa, τί funciona de manera adverbial como pregunta por la causa o motivo. En español, «¿Por qué?» comunica mejor ese sentido que «¿Qué?».
- source_word: τεταραγμένοι
  english_pob_choice: troubled
  chosen_spanish: turbados
  alternatives_spanish:
  - preocupados
  - perturbados
  - atribulados
  lexicon: BDAG
  rationale: El participio perfecto pasivo de ταράσσω expresa un estado presente de agitación o perturbación interior. «Turbados» conserva ese matiz sin sonar excesivamente interpretativo.
- source_word: διαλογισμοὶ
  english_pob_choice: doubts
  chosen_spanish: dudas
  alternatives_spanish:
  - pensamientos
  - razonamientos
  - cavilaciones
  lexicon: BDAG
  rationale: En este contexto, el término no es neutral; apunta a la incertidumbre y vacilación de los discípulos. «Dudas» recoge mejor ese tono que «pensamientos» o «razonamientos».
- source_word: ἀναβαίνουσιν
  english_pob_choice: arise
  chosen_spanish: surgen
  alternatives_spanish:
  - suben
  - aparecen
  - brotan
  lexicon: BDAG
  rationale: Aunque literalmente significa «suben», aquí se usa idiomáticamente para actividad mental interna. «Surgen» es el equivalente natural en español y preserva la imagen de aparición espontánea.
- source_word: ἐν τῇ καρδίᾳ ὑμῶν
  english_pob_choice: in your hearts
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en sus corazones
  - en vuestro corazón
  lexicon: BDAG
  rationale: El griego usa καρδίᾳ en singular con ὑμῶν en plural, una construcción distributiva. En español, el singular «su corazón» puede funcionar colectivamente y mantiene la cercanía al singular griego; «sus corazones» es una alternativa idiomática válida, pero menos literal.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: BDAG
  rationale: «Corazón» es el equivalente bíblico estándar en español y preserva la antropología bíblica del asiento del pensamiento y la disposición interior. «Mente» estrecharía indebidamente el campo semántico.
theological_decisions:
- issue: Antropología bíblica de καρδία
  english_pob_reading: heart / hearts
  chosen_spanish_reading: corazón
  alternative_spanish_readings:
  - mente
  - interior
  - ser interior
  rationale: La frase sitúa los razonamientos y dudas en el corazón, no solo en el intelecto. Mantener «corazón» conserva la amplitud bíblica del término y evita una reducción psicológica moderna.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Construcción distributiva singular-plural
  english_pob_reading: your hearts
  chosen_spanish_reading: su corazón
  alternative_spanish_readings:
  - sus corazones
  - vuestro corazón
  rationale: El plural griego ὑμῶν se dirige al grupo, mientras que καρδίᾳ está en singular. En español, el singular colectivo «su corazón» permite reflejar ese patrón sin perder naturalidad; la alternativa plural explícita sigue siendo viable si se prioriza la idiomaticidad.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión importante en la línea de ‘your heart’ a ‘your hearts’ para reflejar mejor el plural de ὑμῶν. En español se optó por una solución colectiva en singular («su corazón») para respetar el singular de καρδίᾳ y mantener naturalidad; se dejó nota de la alternativa plural explícita en las decisiones léxicas.
  spanish_consistency_notes:
  - Se mantuvo «corazón» y no «mente» para conservar la antropología bíblica del texto.
  - «Turbados» y «dudas» reflejan el tono interno del pasaje sin intensificarlo más allá del griego.
  - La puntuación reproduce una pregunta directa seguida de una segunda interrogación coordinada, en estilo sobrio y publicable.
