translation:
  language: es
  text: Y volviendo del sepulcro, informaron de todo esto a los once y a todos los demás.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑποστρέψασαι
  english_pob_choice: returning
  chosen_spanish: volviendo
  alternatives_spanish:
  - regresando
  - al volver
  lexicon: BDAG
  rationale: El participio aoristo femenino plural señala a las mujeres del contexto previo. «Volviendo» conserva el valor participial y suena natural en español, sin convertirlo en una paráfrasis más libre.
- source_word: μνημείου
  english_pob_choice: tomb
  chosen_spanish: sepulcro
  alternatives_spanish:
  - tumba
  - tumba funeraria
  lexicon: BDAG
  rationale: En el contexto de resurrección, el referente es el lugar de entierro de Jesús. «Sepulcro» es un término bíblico claro y digno en español; «tumba» también es posible, pero «sepulcro» mantiene mejor el registro solemne.
- source_word: ἀπήγγειλαν
  english_pob_choice: reported
  chosen_spanish: informaron
  alternatives_spanish:
  - reportaron
  - dieron aviso
  lexicon: BDAG
  rationale: El verbo expresa comunicar o dar noticia. «Informaron» transmite bien el acto de relatar los hechos en español natural, sin añadir la idea de anuncio público que tendría «anunciaron».
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: de todo esto
  alternatives_spanish:
  - todas estas cosas
  - todo esto
  lexicon: BDAG
  rationale: La combinación conserva la referencia demostrativa y la fuerza global de πάντα. «De todo esto» es idiomático en español y refleja el conjunto de los hechos mencionados.
- source_word: τοῖς ἕνδεκα
  english_pob_choice: the eleven
  chosen_spanish: a los once
  alternatives_spanish:
  - a los once discípulos
  - a los once apóstoles
  lexicon: BDAG
  rationale: El griego dice simplemente «los once». Se conserva esa designación convencional sin expandirla con sustantivos no presentes en el texto.
- source_word: πᾶσιν τοῖς λοιποῖς
  english_pob_choice: all the rest
  chosen_spanish: a todos los demás
  alternatives_spanish:
  - a todos los otros
  - a todos los restantes
  lexicon: BDAG
  rationale: «λοιποί» significa los restantes o demás. «A todos los demás» es la opción más natural en español y preserva la distinción entre los once y el grupo más amplio.
theological_decisions:
- issue: Sujeto femenino plural implícito en el participio
  english_pob_reading: The subject is the women who had come to the tomb, implied from the preceding context.
  chosen_spanish_reading: Se mantiene el sujeto femenino plural implícito en «volviendo», sin introducir un sujeto masculino ni neutralizarlo.
  alternative_spanish_readings:
  - Y, habiendo regresado del sepulcro, ...
  - Y regresaron del sepulcro, ...
  rationale: La morfología griega marca claramente un sujeto femenino plural. El español puede conservar esa referencia sin explicitar «ellas», dejando la oración fluida y fiel al contexto inmediato.
  doctrine_reference: Principio de primacía del original y precisión gramatical de género
- issue: Designación del grupo apostólico
  english_pob_reading: Render τοῖς ἕνδεκα as 'the eleven' without expansion.
  chosen_spanish_reading: «los once» se traduce sin ampliar a «apóstoles» o «discípulos».
  alternative_spanish_readings:
  - los once apóstoles
  - los once discípulos
  rationale: El texto griego usa la expresión convencional «los once». Ampliarla introduciría información interpretativa que no está en el versículo.
  doctrine_reference: Primacía del texto fuente sobre la tradición de traducción
translation_notes:
  revision_awareness: El texto inglés auditado no presenta notas ni revisiones aplicadas; la concordancia general es alta y no se registran cambios pendientes. La redacción española sigue directamente la evidencia griega y conserva la estructura narrativa simple del versículo.
  spanish_consistency_notes:
  - Se mantiene «sepulcro» para μνημεῖον en contexto de resurrección, coherente con el registro bíblico y con la distinción frente a «tumba» cuando se busca un tono más litúrgico.
  - Se conserva «los once» como designación técnica del grupo, sin añadir aclaraciones que el griego no explicita.
  - El verbo principal en pasado simple («informaron») respeta la sucesión narrativa del aoristo griego.
  - No se usa «Cristo» ni terminología doctrinal añadida; el versículo no lo requiere.
