  source_alignment_summary: 'El borrador español refleja fielmente el sentido del griego y coincide con la auditoría inglesa: el participio ὑποστρέψασαι se vierte naturalmente como «volviendo», μνημείου como «sepulcro», ἀπήγγειλαν como «informaron», ταῦτα πάντα como «de todo esto», τοῖς ἕνδεκα como «a los once», y πᾶσιν τοῖς λοιποῖς como «a todos los demás». También preserva la secuencia narrativa de regreso desde el sepulcro seguido del informe a los once y al resto.'
  spanish_quality_summary: El español suena natural, claro y digno para un registro bíblico contemporáneo. «Y volviendo del sepulcro, informaron de todo esto...» es fluido y comprensible. Aunque «al volver» o «regresando» también serían posibles, la forma actual no es forzada ni oscura.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles del glosario principal como Yahvé, Mesías, esclavo, etc. «Sepulcro» encaja bien con el registro deseado y «los once» preserva correctamente la designación no expandida del grupo apostólico.
