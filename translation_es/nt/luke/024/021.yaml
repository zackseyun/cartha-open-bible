    unchanged: false
    changes_summary: 'Adjusted tense for accuracy and natural English: ''he is'' to ''he was'' and ''is about to redeem'' to ''was going to redeem.'' Kept the rest essentially unchanged, with a slight smoothing of the conjunction.'
translation:
  language: es
  text: Pero nosotros esperábamos que él era[a] quien iba a redimir a Israel. Pero, además de todo esto[b], ya es el tercer día desde que sucedieron estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que él es quien iba a redimir a Israel». El griego conserva un verbo en presente («es») dentro del contenido de la esperanza pasada.'
    reason: alternative_reading
  - marker: b
    text: «Redimir a Israel» puede referirse en sentido amplio a la liberación mesiánica esperada; el texto no especifica si los hablantes piensan en liberación política, salvación espiritual o ambas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς δὲ
  english_pob_choice: But we
  chosen_spanish: Pero nosotros
  alternatives_spanish:
  - Ahora nosotros
  - Pero en cuanto a nosotros
  lexicon: BDAG
  rationale: δέ marca contraste con el relato anterior, y ἡμεῖς añade énfasis al sujeto. «Pero nosotros» conserva el giro adversativo y el énfasis sin sonar artificial.
- source_word: ἠλπίζομεν
  english_pob_choice: were hoping
  chosen_spanish: esperábamos
  alternatives_spanish:
  - estábamos esperando
  - teníamos esperanza
  lexicon: BDAG
  rationale: El imperfecto expresa una expectativa sostenida en el pasado. En español, «esperábamos» comunica esa continuidad con naturalidad y sin perder el matiz de expectativa frustrada.
- source_word: ὅτι αὐτός ἐστιν
  english_pob_choice: that he is
  chosen_spanish: que él era
  alternatives_spanish:
  - que él es
  - que él fuese
  - que este era
  lexicon: BDAG
  rationale: Aunque el griego conserva ἐστιν en presente dentro del contenido de la esperanza pasada, el español más natural en este contexto suele ajustar el tiempo al marco narrativo. La nota a[a] preserva la tensión documental entre el presente griego y la formulación española más idiomática.
- source_word: ὁ μέλλων λυτροῦσθαι
  english_pob_choice: the one who was going to redeem
  chosen_spanish: el que iba a redimir
  alternatives_spanish:
  - el que estaba por redimir
  - el que había de redimir
  - el destinado a redimir
  lexicon: BDAG
  rationale: μέλλων con infinitivo expresa expectativa o destino futuro. «Iba a redimir» reproduce bien el valor prospectivo en español, manteniendo la referencia mesiánica sin sobreexplicar.
- source_word: λυτροῦσθαι
  english_pob_choice: redeem
  chosen_spanish: redimir
  alternatives_spanish:
  - liberar
  - rescatar
  lexicon: BDAG
  rationale: «Redimir» conserva el peso salvífico y covenantal del verbo mejor que «liberar» o «rescatar», y coincide con la opción POB inglesa.
- source_word: τὸν Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a la gente de Israel
  - al pueblo de Israel
  lexicon: BDAG
  rationale: 'El objeto directo designa al pueblo del pacto. En español, la preposición «a» es necesaria con objeto personal definido: «a Israel».'
- source_word: ἀλλά γε καὶ σὺν πᾶσιν τούτοις
  english_pob_choice: But besides all this
  chosen_spanish: Pero, además de todo esto
  alternatives_spanish:
  - Pero aun con todo esto
  - Pero incluso con todo esto
  - Pero junto con todo esto
  lexicon: BDAG
  rationale: La secuencia intensifica el contraste y añade una consideración más desalentadora. «Además de todo esto» es idiomático y refleja bien la carga acumulativa.
- source_word: τρίτην ταύτην ἡμέραν ἄγει
  english_pob_choice: it is now the third day
  chosen_spanish: ya es el tercer día
  alternatives_spanish:
  - ahora es el tercer día
  - va ya el tercer día
  - se cumple ya el tercer día
  lexicon: BDAG
  rationale: ἄγει aquí funciona de manera idiomática con el transcurso del tiempo. «Ya es el tercer día» transmite que el tiempo ha llegado a ese punto sin forzar una construcción literal poco natural.
- source_word: ἀφ’ οὗ ταῦτα ἐγένετο
  english_pob_choice: since these things happened
  chosen_spanish: desde que sucedieron estas cosas
  alternatives_spanish:
  - desde que pasaron estas cosas
  - desde el momento en que sucedieron estas cosas
  lexicon: BDAG
  rationale: ἀφ’ οὗ marca el punto desde el cual se cuenta el tiempo. «Desde que sucedieron estas cosas» es claro, natural y fiel al valor temporal.
theological_decisions:
- issue: Redención de Israel
  english_pob_reading: Retain 'redeem Israel' without specifying political or purely spiritual redemption.
  chosen_spanish_reading: Mantener «redimir a Israel» sin concretar si la expectativa era política, espiritual o ambas.
  alternative_spanish_readings:
  - liberar a Israel
  - salvar a Israel espiritualmente
  - redimir al pueblo de Israel en sentido político
  rationale: El texto no precisa el modo de la redención esperada; la traducción debe conservar esa amplitud mesiánica y no resolver la tensión interpretativa. «Redimir a Israel» mantiene abierta la referencia.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Tiempo verbal en «él era» frente al presente griego
  english_pob_reading: Use 'he was the one who was going to redeem' rather than shifting entirely to past time.
  chosen_spanish_reading: Usar el imperfecto narrativo en español, con una nota que indique que el griego conserva presente dentro del contenido de la esperanza pasada.
  alternative_spanish_readings:
  - que él es el que iba a redimir
  - que él era el que iba a redimir
  - que él era el que había de redimir
  rationale: El español exige más ajuste temporal que el griego para sonar natural, pero la nota conserva la observación auditada de que el presente griego expresa la viveza de la expectativa original. Así se evita perder el dato sin sacrificar la fluidez.
  doctrine_reference: 'Translation philosophy §2: Preserve auditable grammatical tensions where they matter.'
translation_notes:
  revision_awareness: 'La redacción sigue el último estado del audit trail inglés, especialmente el ajuste de tiempos en la revisión más reciente: se mantuvo la idea de una esperanza pasada frustrada, con la preferencia española por una formulación idiomática en imperfecto y la preservación en nota del presente griego en el contenido de la esperanza. También se conservó la fuerza acumulativa de ἀλλά γε καὶ σὺν πᾶσιν τούτοις y el valor temporal idiomático de ἄγει.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no la requiere.
  - Se usa «redimir» para λυτροῦσθαι conforme al valor mesiánico/salvífico documentado.
  - Se evita «Cristo» porque el texto habla de la expectativa de redención de Israel, no del título explícito χριστός.
  - «Ya es el tercer día» intenta reproducir la idiomaticidad de ἄγει sin calco duro.
  - La puntuación separa las dos cláusulas principales como en el audit trail inglés, preservando el contraste y la acumulación del discurso.
