source:
  edition: SBLGNT
  text: ἡμεῖς δὲ ἠλπίζομεν ὅτι αὐτός ἐστιν ὁ μέλλων λυτροῦσθαι τὸν Ἰσραήλ· ἀλλά γε ⸀καὶ σὺν πᾶσιν τούτοις τρίτην ταύτην ἡμέραν ⸀ἄγει ἀφ’ οὗ ταῦτα ἐγένετο.
base_translation:
  language: en
  yaml_path: translation/nt/luke/024/021.yaml
  text: But we were hoping that he was the one who was going to redeem Israel[a]. But besides all this[b], it is now the third day since these things happened.
  footnotes:
  - marker: a
    text: Or, 'the one who was going to redeem Israel.' The Greek keeps a present verb ('is') within the content of their past hope.
    reason: alternative_reading
  - marker: b
    text: '''Redeem Israel'' can refer broadly to hoped-for messianic deliverance; the text does not specify whether the speakers mean political liberation, spiritual salvation, or both.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
