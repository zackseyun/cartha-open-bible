translation:
  language: es
  text: 'Entonces uno de ellos, llamado Cleopas, respondió y le dijo: «¿Eres tú el único forastero[a] en Jerusalén que no sabe las cosas que han ocurrido allí en estos días?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el único que se aloja en Jerusalén como extraño». El verbo griego lleva la idea de residir como forastero o residente temporal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió diciendo
  lexicon: BDAG
  rationale: El participio aoristo introduce el discurso directo. En español, «respondió» fluye de manera natural y conserva la función narrativa sin forzar un participio perifrástico.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ marca una continuación suave del relato. «Entonces» expresa bien la progresión narrativa en español sin añadir contraste fuerte.
- source_word: εἷς ὀνόματι Κλεοπᾶς
  english_pob_choice: one of them, named Cleopas
  chosen_spanish: uno de ellos, llamado Cleopas
  alternatives_spanish:
  - uno, de nombre Cleopas
  - uno llamado Cleopas
  lexicon: BDAG
  rationale: Se conserva el valor de «uno de ellos» por el contexto de los dos discípulos, y ὀνόματι se vierte naturalmente como «llamado».
- source_word: εἶπεν πρὸς αὐτόν
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - dijo a él
  lexicon: BDAG
  rationale: La construcción griega se expresa con un dativo natural en español. «Le dijo» es la forma idiomática y fiel.
- source_word: Σὺ μόνος
  english_pob_choice: Are you the only
  chosen_spanish: ¿Eres tú el único
  alternatives_spanish:
  - ¿Sólo tú
  - ¿Eres solamente tú
  lexicon: BDAG
  rationale: Μόνος enfatiza exclusividad. En español interrogativo, «el único» reproduce mejor la fuerza que una simple traducción adverbial.
- source_word: παροικεῖς
  english_pob_choice: visitor to
  chosen_spanish: visitante en
  alternatives_spanish:
  - forastero en
  - residente temporario en
  - forastero que reside en
  lexicon: BDAG
  rationale: παροικέω denota vivir como extranjero o residente temporal. «Visitante en» comunica con claridad moderna esa condición de no pertenencia plena, sin perder la nota de extrañeza.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: BDAG
  rationale: Transliteración estándar en español.
- source_word: οὐκ ἔγνως
  english_pob_choice: does not know
  chosen_spanish: no sabe
  alternatives_spanish:
  - no has sabido
  - no conoces
  lexicon: BDAG
  rationale: 'Aunque el verbo está en aoristo, la pregunta tiene valor resultativo/presente: falta de conocimiento actual sobre los hechos. «No sabe» transmite bien ese sentido en español.'
- source_word: τὰ γενόμενα
  english_pob_choice: the things that have happened
  chosen_spanish: las cosas que han ocurrido
  alternatives_spanish:
  - los hechos que han sucedido
  - lo que ha pasado
  lexicon: BDAG
  rationale: El participio sustantivado de γίνομαι se refiere a acontecimientos recientes. «Las cosas que han ocurrido» es claro, natural y mantiene el matiz de eventos concretos.
- source_word: ἐν αὐτῇ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ella
  - allí mismo
  lexicon: BDAG
  rationale: La referencia a Jerusalén puede expresarse en español con «allí», evitando un calco innecesario y manteniendo la localización del evento.
- source_word: ἐν ταῖς ἡμέραις ταύταις
  english_pob_choice: in these days
  chosen_spanish: en estos días
  alternatives_spanish:
  - durante estos días
  - en días como estos
  lexicon: BDAG
  rationale: La expresión temporal se vierte de forma directa y natural, cercana al griego y adecuada al registro narrativo.
translation_notes:
  revision_awareness: Se siguió de cerca el sentido del griego SBLGNT y el audit trail en inglés, manteniendo la tensión semántica de παροικεῖς (residir como extraño/visitante) sin forzar una paráfrasis. La redacción española busca naturalidad bíblica contemporánea, con el mismo contenido proposicional del original.
  spanish_consistency_notes:
  - Se prefirió «Jerusalén» como forma española estándar del topónimo.
  - Se mantuvo «Jesús» implícito en el contexto, sin añadir el nombre en el texto porque el griego usa μόνος αὐτόν y el audit trail inglés preserva «him».
  - Se evitó «SEÑOR» o formas de máscara porque no aparece el tetragrámaton ni κύριος en este versículo.
  - Se eligió «visitante» para conservar el matiz de προσωρινidad/extranjería indicado por el verbo παροικέω, con nota alternativa en la footnote.
