  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas. La mejoría recomendada es ajustar παροικεῖς a 'forastero en Jerusalén' en el texto principal, manteniendo la alternativa más literal en nota, y restaurar ἐν αὐτῇ como 'allí'.
