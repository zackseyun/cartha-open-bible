base_translation:
  language: en
  yaml_path: translation/nt/luke/024/018.yaml
  text: Then one of them[a], named Cleopas, answered and said to him, “Are you the only visitor to Jerusalem who does not know the things that have happened there in these days?”
  footnotes:
  - marker: a
    text: Or “the only one staying in Jerusalem as a stranger.” The Greek verb carries the sense of residing as an outsider or temporary resident.
    reason: lexical_alternative
