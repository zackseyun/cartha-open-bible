translation:
  language: es
  text: Y estaban continuamente en el templo[a], bendiciendo a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alabando a Dios». El verbo griego es εὐλογέω, «bendecir».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Conector narrativo simple al inicio del cierre de la sección; en español, 'Y' conserva la continuidad sin añadir matiz interpretativo.
- source_word: ἦσαν
  english_pob_choice: they were
  chosen_spanish: estaban
  alternatives_spanish:
  - eran
  - seguían estando
  lexicon: BDAG
  rationale: El imperfecto expresa estado continuo en pasado; 'estaban' lo comunica de forma natural en español.
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - constantemente
  - todo el tiempo
  lexicon: BDAG
  rationale: La locución idiomática indica continuidad o regularidad ininterrumpida; 'continuamente' es idiomático y preserva ese valor durativo.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el complejo del templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν designa el recinto del templo, no necesariamente el santuario interior; 'templo' es la forma concisa y fiel para el contexto.
- source_word: εὐλογοῦντες
  english_pob_choice: blessing
  chosen_spanish: bendiciendo
  alternatives_spanish:
  - alabando
  - pregonando bendiciones sobre
  lexicon: BDAG
  rationale: El verbo εὐλογέω significa 'bendecir / hablar bien de'; con Dios como objeto, 'bendiciendo' mantiene la forma léxica y evita sustituirla por un término más genérico.
- source_word: θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Objeto directo de εὐλογοῦντες; la traducción directa y estándar es 'Dios'.
theological_decisions:
- issue: εὐλογοῦντες τὸν θεόν como lenguaje de adoración
  english_pob_reading: blessing God
  chosen_spanish_reading: bendiciendo a Dios
  alternative_spanish_readings:
  - alabando a Dios
  rationale: Se conserva la fuerza del verbo griego εὐλογέω en vez de reemplazarlo por un verbo más general de alabanza. 'Bendiciendo a Dios' es natural en español y mantiene la tensión lexical observada en el texto fuente.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de su redacción: se mantuvo la diferencia entre εὐλογέω y un verbo genérico de alabanza, y se respetó el valor durativo de διὰ παντός con una forma natural de español.'
  spanish_consistency_notes:
  - Se usa 'Dios' como traducción directa de θεός.
  - Se conserva 'templo' para ἱερόν, sin expandir innecesariamente a 'atrios' o 'complejo del templo'.
  - El imperfecto 'estaban' refuerza la continuidad expresada por διὰ παντός.
  - La nota al pie preserva la alternativa semántica 'alabando' sin borrar la elección principal 'bendiciendo'.
