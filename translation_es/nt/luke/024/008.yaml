lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción coordinante simple se conserva con «Y», que mantiene la unión narrativa sin añadir una relación temporal más fuerte de la que exige el griego.
- source_word: ἐμνήσθησαν
  english_pob_choice: remembered
  chosen_spanish: recordaron
  alternatives_spanish:
  - se acordaron
  - recobraron la memoria de
  lexicon: BDAG
  rationale: El aoristo de μιμνῄσκομαι se vierte de manera activa como una acción puntual consumada. «Recordaron» comunica con naturalidad la recuperación de memoria sin sobrecargar el sentido con una matiz reflexivo innecesario.
- source_word: τῶν ῥημάτων
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - expresiones
  - cosas que él dijo
  lexicon: BDAG
  rationale: ῥῆμα puede referirse a palabras, dichos o cosas dichas. En español, «palabras» es la equivalencia más directa y transparente; mantiene el carácter de habla pronunciada sin forzar un giro más interpretativo.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: sus
  alternatives_spanish:
  - de él
  - de Jesús
  lexicon: BDAG
  rationale: El pronombre posesivo se expresa naturalmente como «sus». Aunque el referente contextual es Jesús, el griego solo dice «de él», y el español conserva esa referencia sin explicitarla en el texto principal.
translation_notes:
  revision_awareness: El texto griego y el audio de la POB en inglés muestran acuerdo alto y no requieren revisión textual; se conserva la lectura directa de la cláusula con una nota léxica que recoge las alternativas semánticas de ῥήματα.
  spanish_consistency_notes:
  - Se usa «sus» para reflejar el genitivo posesivo sin añadir el nombre de Jesús al texto principal.
  - Se evita «Cristo» o «Señor» porque el versículo no contiene esos títulos y el contexto inmediato no exige explicitar el referente.
  - La puntuación con coma final reproduce el corte sintáctico breve del original griego.
