translation:
  language: es
  text: Y eran María Magdalena, Juana, María, la madre de Jacobo[a], y las demás mujeres con ellas; estaban diciéndoles estas cosas a los apóstoles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «María de Jacobo». Esto probablemente significa «María, la madre de Jacobo», aunque también es posible «María, esposa de Jacobo».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἦσαν
  english_pob_choice: they were
  chosen_spanish: estaban
  alternatives_spanish:
  - eran
  lexicon: BDAG
  rationale: El imperfecto plural introduce a las mujeres mencionadas en el contexto; en español, 'estaban' suena natural para una presentación narrativa continua sin forzar una cópula de identidad.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: δέ marca transición narrativa leve. 'Ahora' conserva esa transición en español moderno sin exagerar secuencia temporal.
- source_word: ἡ Μαγδαληνὴ Μαρία
  english_pob_choice: Mary Magdalene
  chosen_spanish: María Magdalena
  alternatives_spanish:
  - María la Magdalena
  lexicon: BDAG
  rationale: El orden y la forma son nombres propios establecidos en español; 'María Magdalena' es la forma más transparente y natural, sin perder el epíteto geográfico.
- source_word: Ἰωάννα
  english_pob_choice: Joanna
  chosen_spanish: Juana
  alternatives_spanish:
  - Joana
  lexicon: BDAG
  rationale: Nombre propio en forma española usual. 'Juana' comunica el nombre con claridad y dignidad en español bíblico.
- source_word: Μαρία ἡ Ἰακώβου
  english_pob_choice: Mary the mother of James
  chosen_spanish: María, la de Jacobo[a]
  alternatives_spanish:
  - María, madre de Jacobo
  - María, esposa de Jacobo
  - María de Jacobo
  lexicon: BDAG
  rationale: El griego es comprimido y no explicita la relación; por eso se conserva la ambigüedad de 'la de Jacobo' como equivalente cercano de 'Mary of James'. En español, 'madre de Jacobo' sería una aclaración interpretativa posible, pero el texto fuente no la fija. Dado que la tradición del POB inglés tomó una lectura interpretativa, la nota preserva la tensión sin imponerla en el cuerpo principal.
- source_word: αἱ λοιπαὶ σὺν αὐταῖς
  english_pob_choice: the other women with them
  chosen_spanish: las demás mujeres con ellas
  alternatives_spanish:
  - las otras con ellas
  - el resto con ellas
  lexicon: BDAG
  rationale: El femenino plural y el contexto permiten suplir 'mujeres' en español para evitar ambigüedad. 'Demás' mantiene el sentido de grupo restante, y 'con ellas' reproduce el referente femenino plural.
- source_word: ἔλεγον
  english_pob_choice: were telling
  chosen_spanish: les estaban contando
  alternatives_spanish:
  - les contaban
  - les decían
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso o repetida; 'estaban contando' preserva mejor ese aspecto que un simple pretérito. 'Contar' expresa relato comunicativo de forma más precisa que un genérico 'decir'.
- source_word: πρὸς τοὺς ἀποστόλους
  english_pob_choice: to the apostles
  chosen_spanish: a los apóstoles
  alternatives_spanish:
  - para los apóstoles
  lexicon: BDAG
  rationale: πρός con objeto personal aquí indica dirección del habla; 'a los apóstoles' es la equivalencia natural en español. Se mantiene 'apóstoles' por ser el término técnico ya establecido.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El demostrativo plural remite a los sucesos y el mensaje reportado. 'Estas cosas' conserva el plural explícito del griego.
theological_decisions:
- issue: Identificación de Μαρία ἡ Ἰακώβου
  english_pob_reading: Mary the mother of James
  chosen_spanish_reading: María, la de Jacobo
  alternative_spanish_readings:
  - María, madre de Jacobo
  - María, esposa de Jacobo
  - María de Jacobo
  rationale: El genitivo griego es elíptico y no obliga a una relación específica. El inglés POB optó por una aclaración interpretativa ('mother of James'), pero en español conviene no fijar esa relación en el texto principal cuando la fuente no la explicita. La nota conserva la alternativa interpretativa y evita borrar la tensión documental del griego.
  doctrine_reference: Translation philosophy §3; preservar ambigüedad interpretativa genuina cuando el texto fuente es comprimido.
translation_notes:
  revision_awareness: 'El inglés POB revisó la última cláusula para reflejar más directamente la estructura griega con una oración independiente después de punto y coma. En español se siguió esa misma decisión estructural: se evita convertir la cláusula final en relativa y se conserva el valor imperfectivo de ἔλεγον con una perífrasis continua.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se usa 'apóstoles' como término técnico establecido, sin variar a 'emisarios'.
  - Se conserva el femenino plural implícito en 'las demás mujeres con ellas' para evitar perder el referente contextual.
  - La ambigüedad de 'María, la de Jacobo' se deja abierta en el texto y se explica en nota, evitando imponer una identificación no explicitada por el griego.
