review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español representa bien la lista de mujeres, el imperfecto de ἔλεγον y el destinatario ''a los apóstoles''. Sin embargo, no sigue fielmente el rastro auditado del POB inglés en la decisión principal sobre Μαρία ἡ Ἰακώβου: el inglés documentó y adoptó ''Mary the mother of James'' en el texto, preservando alternativas en nota. El español cambia esa decisión a ''María, la de Jacobo'', que suena poco natural y además se aparta de la resolución interpretativa ya auditada.'
  spanish_quality_summary: La frase es mayormente clara, pero 'Ahora estaban María Magdalena...' suena algo rígido para una presentación identificativa; 'Y eran...' o simplemente 'Eran...' fluye mejor en español narrativo. 'María, la de Jacobo' resulta coloquial/torpe y menos digno que 'María, la madre de Jacobo'. 'Les estaban contando estas cosas a los apóstoles' es comprensible pero redundante; 'estaban contándoles estas cosas a los apóstoles' o 'estaban diciendo estas cosas a los apóstoles' mejora la fluidez. La versión revisada mantiene dignidad y claridad.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. ''Apóstoles'', ''María Magdalena'' y ''Juana'' están bien. La corrección clave es alinear Μαρία ἡ Ἰακώβου con la resolución POB: ''María, la madre de Jacobo'', con nota que preserve ''María de Jacobo'' / ''esposa de Jacobo'' como alternativas.'
  issues:
  - severity: high
    issue: La decisión principal para Μαρία ἡ Ἰακώβου no sigue la resolución auditada del POB inglés.
    rationale: El POB inglés adoptó en el texto 'Mary the mother of James' y dejó la ambigüedad en nota. El español reemplaza eso por 'María, la de Jacobo', alterando una decisión interpretativa ya documentada sin necesidad fuerte de español.
  - severity: medium
    issue: '''María, la de Jacobo'' es poco natural y menos digno en español bíblico.'
    rationale: Aunque intenta preservar compresión griega, en español suena coloquial y opaco; no es la mejor forma de lectura eclesial amplia.
  - severity: low
    issue: '''Ahora estaban'' suena menos natural para introducir la enumeración.'
    rationale: δὲ marca transición leve, pero en español narrativo 'Y eran' o 'Eran' encaja mejor con una cláusula identificativa.
  revised_spanish_text: Y eran María Magdalena, Juana, María, la madre de Jacobo[a], y las demás mujeres con ellas; estaban diciéndoles estas cosas a los apóstoles.
  revised_footnotes:
  - marker: a
    text: 'Griego literalmente: «María de Jacobo». Esto probablemente significa «María, la madre de Jacobo», aunque también es posible «María, esposa de Jacobo».'
    reason: alternative_reading
  revision_rationale: Se revisa para seguir la decisión principal ya auditada por el POB inglés respecto a Μαρία ἡ Ἰακώβου, manteniendo las alternativas en nota. También se mejora la naturalidad del español narrativo con 'Y eran' y se conserva el imperfecto de ἔλεγον con 'estaban diciéndoles'.
