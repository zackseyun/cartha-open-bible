revisions:
- from: Pero sus ojos[a] estaban retenidos para que no lo reconocieran.
  to: Pero sus ojos estaban impedidos de reconocerlo[a].
  rationale: La revisión conserva el pasivo sin especificar agente, mantiene la imagen concreta de «ojos» y expresa de manera más natural en español la idea de impedimento para reconocer a Jesús. «Impedidos de reconocerlo» se alinea mejor con el sentido auditado de «were kept from recognizing him» que la formulación con «para que no».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:02:51Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien el contraste de δέ, conserva la imagen concreta de «sus ojos» y mantiene la agencia del pasivo sin explicitarla. Sin embargo, «estaban retenidos para que no lo reconocieran» suena menos natural en español y desplaza ligeramente el valor de τοῦ μὴ ἐπιγνῶναι hacia una finalidad más marcada («para que») en vez de un impedimento/resultante más cercano a «de reconocerlo».
  spanish_quality_summary: La redacción es comprensible, pero «sus ojos estaban retenidos» resulta algo rígida y poco idiomática en español bíblico natural. «Estaban impedidos de reconocerlo» o «eran retenidos de reconocerlo» reflejan mejor la construcción global; la primera opción es más clara y natural. También conviene ajustar la nota para que sus alternativas encajen con la formulación revisada.
  glossary_alignment: No hay términos del glosario mayor en juego aquí. La decisión clave es preservar el pasivo de ἐκρατοῦντο sin nombrar agente y traducir ἐπιγινώσκω como «reconocer». Eso debe mantenerse. La nota léxica también debe preservar que el agente queda sin expresar.
  issues:
  - severity: medium
    issue: «para que no lo reconocieran» sobredetermina la relación sintáctica
    rationale: El articular infinitivo τοῦ μὴ ἐπιγνῶναι puede expresarse naturalmente en español como impedimento/resultante («de reconocerlo») sin convertirlo en una finalidad más fuerte. «Para que» no es imposible, pero aquí suena menos ceñido al inglés auditado y al griego.
  - severity: medium
    issue: «sus ojos estaban retenidos» es poco idiomático en español
    rationale: Aunque formalmente posible, la combinación suena rígida y menos clara para lectores generales. Una formulación como «sus ojos estaban impedidos de reconocerlo» conserva la imagen corporal y el pasivo, pero mejora la legibilidad.
  - severity: low
    issue: La nota léxica no encaja del todo con la mejor redacción española
    rationale: Si se revisa el texto principal, las alternativas de la nota deben armonizar con esa formulación y seguir indicando que el agente no se expresa en griego.
  revised_spanish_text: Pero sus ojos estaban impedidos de reconocerlo[a].
  revised_footnotes:
  - marker: a
    text: O «estaban retenidos de reconocerlo» o «se les impedía reconocerlo». El griego deja sin expresar el agente.
    reason: lexical_alternative
  revision_rationale: La revisión conserva el pasivo sin especificar agente, mantiene la imagen concreta de «ojos» y expresa de manera más natural en español la idea de impedimento para reconocer a Jesús. «Impedidos de reconocerlo» se alinea mejor con el sentido auditado de «were kept from recognizing him» que la formulación con «para que no».
