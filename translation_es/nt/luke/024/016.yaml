translation:
  language: es
  text: Pero sus ojos estaban impedidos de reconocerlo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaban retenidos de reconocerlo» o «se les impedía reconocerlo». El griego deja sin expresar el agente.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una leve transición o contraste. «Pero» comunica bien el giro narrativo en español sin volverlo más fuerte de lo que el griego exige.
- source_word: οἱ ὀφθαλμοὶ αὐτῶν
  english_pob_choice: their eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - los ojos de ellos
  - su vista
  lexicon: BDAG
  rationale: Se conserva la imagen concreta del sujeto griego, en plural y corporal, evitando abstraerlo a «su vista» o a una formulación menos literal.
- source_word: ἐκρατοῦντο
  english_pob_choice: were kept
  chosen_spanish: estaban retenidos
  alternatives_spanish:
  - eran retenidos
  - estaban contenidos
  - eran impedidos
  lexicon: BDAG
  rationale: El pasivo de κρατέω expresa estar sujetado o retenido por una fuerza externa; «estaban retenidos» mantiene el sentido pasivo y la idea de impedimento sin nombrar agente.
- source_word: τοῦ μὴ ἐπιγνῶναι
  english_pob_choice: from recognizing
  chosen_spanish: para que no lo reconocieran
  alternatives_spanish:
  - a fin de que no lo reconocieran
  - para no reconocerlo
  - de modo que no lo conocieran
  lexicon: BDAG
  rationale: El infinitivo articular con μή expresa finalidad o resultado. En español, «para que no lo reconocieran» comunica de forma natural la idea de impedimento respecto de ἐπιγινώσκω, entendido aquí como reconocer/identificar.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El objeto directo se refiere a Jesús en el contexto inmediato. «Lo» es la forma natural y sobria en español; no se explicita «Jesús» porque el griego no lo nombra aquí.
theological_decisions:
- issue: Agencia no especificada en el pasivo
  english_pob_reading: 'Leave the passive unstated: ''their eyes were kept from recognizing him.'''
  chosen_spanish_reading: 'Se mantiene el pasivo sin identificar al agente: «sus ojos estaban retenidos para que no lo reconocieran».'
  alternative_spanish_readings:
  - Dios les impidió reconocerlo
  - ellos no pudieron reconocerlo
  rationale: El griego usa un pasivo sin agente explícito. La traducción conserva esa tensión teológica y narrativa, evitando resolver si la causa es divina, providencial o circunstancial.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto fuente y con el cierre de revisión: no se requirieron cambios respecto del borrador inglés auditado.'
  spanish_consistency_notes:
  - Se mantiene «reconocer» para ἐπιγινώσκω en armonía con el contexto de Emaús.
  - No se introduce lenguaje eclesiástico tradicional que atenúe el pasivo ni se nombra un agente que el griego no da.
  - «Retenidos» preserva la fuerza de κράτεω sin sobretraducir a una interpretación causal específica.
