review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa y la mayoría de las decisiones léxicas del griego: ἀναστάντες = «levantándose», αὐτῇ τῇ ὥρᾳ = «a esa misma hora», ὑπέστρεψαν = «volvieron», εὗρον = «hallaron», y τοὺς ἕνδεκα = «los once». Sin embargo, la colocación de «reunidos» en español queda más naturalmente asociada solo con «los que estaban con ellos», mientras que en el griego ἠθροισμένους describe al conjunto «los once y los que estaban con ellos».'
  spanish_quality_summary: 'El español es claro y digno, pero necesita un pequeño ajuste de orden para evitar ambigüedad sintáctica. «Hallaron a los once y a los que estaban con ellos reunidos» puede leerse como si solo los segundos estuvieran reunidos. Reordenar a «hallaron reunidos a los once y a los que estaban con ellos» preserva mejor el sentido y sigue sonando natural. También conviene ajustar la nota: actualmente ofrece como alternativa «reunidos», que ya es la traducción principal; la alternativa documentada en inglés corresponde mejor a «congregados» o «reunidos», pero si «reunidos» queda en el texto, la alternativa debe cambiar.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Los once» preserva la designación titular sin expansión. No aparecen términos sensibles del glosario principal que requieran corrección.
  issues:
  - severity: medium
    issue: Ambigüedad en el alcance de «reunidos»
    rationale: En el griego, ἠθροισμένους modifica tanto a «los once» como a «los que estaban con ellos». En el español actual, la posición final de «reunidos» favorece una lectura en que solo modifica al segundo grupo.
  - severity: low
    issue: La nota al pie no funciona como alternativa léxica
    rationale: La nota dice «O “reunidos”», pero «reunidos» ya es la opción usada en el texto. La alternativa debe ser distinta, por ejemplo «congregados», o eliminarse la nota; como el inglés conserva alternativa, conviene mantenerla con ajuste.
  revised_spanish_text: Y levantándose a esa misma hora, volvieron a Jerusalén y hallaron reunidos[a] a los once y a los que estaban con ellos.
  revised_footnotes:
  - marker: a
    text: O «congregados». El participio griego los describe como ya en estado de reunión cuando fueron hallados.
    reason: lexical_alternative
  revision_rationale: Se reordenó «reunidos» para que modifique claramente a ambos grupos, en conformidad con la estructura griega y la revisión auditada del inglés. También se corrigió la nota al pie para que ofrezca una alternativa real al término elegido en el texto.
