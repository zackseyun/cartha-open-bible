revisions:
- from: Y levantándose a esa misma hora, volvieron a Jerusalén, y hallaron a los once[a] y a los que estaban con ellos reunidos.
  to: Y levantándose a esa misma hora, volvieron a Jerusalén y hallaron reunidos[a] a los once y a los que estaban con ellos.
  rationale: Se reordenó «reunidos» para que modifique claramente a ambos grupos, en conformidad con la estructura griega y la revisión auditada del inglés. También se corrigió la nota al pie para que ofrezca una alternativa real al término elegido en el texto.
  reviewer_model: gpt-5.4
