translation:
  language: es
  text: Y levantándose a esa misma hora, volvieron a Jerusalén y hallaron reunidos[a] a los once y a los que estaban con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «congregados». El participio griego los describe como ya en estado de reunión cuando fueron hallados.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστάντες
  english_pob_choice: rising
  chosen_spanish: levantándose
  alternatives_spanish:
  - alzándose
  - poniéndose de pie
  lexicon: BDAG
  rationale: El participio aoristo funciona como acción concomitante anterior al verbo principal. «Levantándose» conserva el movimiento físico y fluye de manera natural en español sin diluir el valor narrativo.
- source_word: αὐτῇ τῇ ὥρᾳ
  english_pob_choice: that very hour
  chosen_spanish: a esa misma hora
  alternatives_spanish:
  - en esa misma hora
  - al instante
  lexicon: BDAG
  rationale: La expresión subraya inmediatez vinculada a un momento concreto. «A esa misma hora» mantiene tanto el referente temporal como el énfasis, con español natural.
- source_word: ὑπέστρεψαν
  english_pob_choice: returned
  chosen_spanish: volvieron
  alternatives_spanish:
  - regresaron
  - retornaron
  lexicon: BDAG
  rationale: En contexto de viaje, el verbo indica volver a un lugar previo. «Volvieron» es claro y directo; evita un tono más formal que no aporta mayor precisión aquí.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: transliteration standard
  rationale: Nombre propio geográfico establecido en español bíblico y en uso común.
- source_word: εὗρον
  english_pob_choice: found
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  lexicon: BDAG
  rationale: «Hallaron» conserva el sentido narrativo de εὑρίσκω y encaja bien con el registro bíblico en español, sin perder naturalidad.
- source_word: ἠθροισμένους
  english_pob_choice: gathered together
  chosen_spanish: reunidos
  alternatives_spanish:
  - juntos
  - agrupados
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe un estado ya constituido al ser hallados. «Reunidos» expresa ese estado colectivo de manera compacta y fiel; «juntos» sería menos preciso, y «agrupados» suena más mecánico.
- source_word: τοὺς ἕνδεκα
  english_pob_choice: the Eleven
  chosen_spanish: los once
  alternatives_spanish:
  - los Once
  - los once apóstoles
  lexicon: BDAG
  rationale: El griego usa la designación convencional del grupo, no una expansión. «Los once» la reproduce sin añadir información interpretativa.
- source_word: τοὺς σὺν αὐτοῖς
  english_pob_choice: those with them
  chosen_spanish: a los que estaban con ellos
  alternatives_spanish:
  - a los que con ellos estaban
  - a sus compañeros
  lexicon: BDAG
  rationale: La frase señala a otros presentes junto al grupo principal. «A los que estaban con ellos» mantiene la relación de compañía sin especificar más de lo que el texto dice.
theological_decisions:
- issue: 'Designación de grupo: «los once»'
  english_pob_reading: Retain the titular group designation 'the Eleven' without harmonizing or expanding it.
  chosen_spanish_reading: Mantener la designación titular «los once» sin armonizar ni expandirla.
  alternative_spanish_readings:
  - los once apóstoles
  - los restantes discípulos
  rationale: El texto griego presenta una designación convencional del grupo. Traducirla literalmente preserva el lenguaje narrativo de Lucas y evita introducir una aclaración no explícita en este versículo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La versión inglesa revisada movió «gathered together» para que modificara tanto a «the Eleven» como a «those with them». La redacción española refleja esa misma relación sintáctica, aplicando «reunidos» al conjunto completo.
  spanish_consistency_notes:
  - Se mantuvo «Jerusalén» como nombre propio establecido, sin calco innecesario.
  - Se eligió «los once» para reproducir la designación convencional del grupo sin añadir «apóstoles».
  - «Reunidos» funciona como participio resultativo y modifica tanto a los once como a los que estaban con ellos, conforme al análisis revisado.
  - Se evitó «SEÑOR» u otra convención de sustitución porque no hay aquí referencia al nombre divino.
