translation:
  language: es
  text: Mientras ellos decían estas cosas[a], él mismo estuvo en medio de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos añaden: «y les dice: “Paz a ustedes”».'
    reason: textual_variant
lexical_decisions:
- source_word: Ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El demostrativo neutro plural apunta a lo que acababan de tratar. "Estas cosas" conserva el plural y la referencia discursiva mejor que "esto".
- source_word: δὲ
  english_pob_choice: while
  chosen_spanish: Mientras
  alternatives_spanish:
  - y
  - ahora
  - pero
  lexicon: BDAG
  rationale: En esta construcción con genitivo absoluto, la partícula marca simultaneidad de la acción; en español, "Mientras" reproduce mejor ese valor temporal que una simple conjunción.
- source_word: αὐτῶν λαλούντων
  english_pob_choice: they were saying
  chosen_spanish: ellos decían
  alternatives_spanish:
  - ellos hablaban
  - ellos estaban hablando
  lexicon: BDAG
  rationale: El participio presente en genitivo absoluto indica acción en curso. "Decían" transmite de forma natural la conversación ya en progreso, sin forzar una perífrasis innecesaria.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  lexicon: BDAG
  rationale: El pronombre explícito es enfático. "Él mismo" conserva esa fuerza y subraya la presencia personal e inesperada de Jesús.
- source_word: ἔστη
  english_pob_choice: stood
  chosen_spanish: se puso
  alternatives_spanish:
  - estuvo de pie
  - se quedó de pie
  lexicon: BDAG
  rationale: Aunque el valor básico es "ponerse de pie / estar de pie", en español la expresión más natural para introducir la posición súbita en medio del grupo es "se puso". Se evita añadir movimiento no explícito como "vino y se puso".
- source_word: ἐν μέσῳ αὐτῶν
  english_pob_choice: among them
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - entre ellos
  - en su medio
  lexicon: BDAG
  rationale: La locución idiomática expresa presencia dentro del grupo. "En medio de ellos" mantiene la imagen espacial y es una equivalencia transparente en español.
theological_decisions:
- issue: Lectura más larga del Texto Recibido/Byzantina con el saludo 'Paz a vosotros'
  english_pob_reading: Omit from the main text, following the provided SBLGNT text; preserve the longer reading in a footnote.
  chosen_spanish_reading: 'Omitir del texto principal; añadir nota con la variante textual: ''Y les dice: «Paz a ustedes».'''
  alternative_spanish_readings:
  - 'Y les dice: «Paz a ustedes».'
  - 'Y les dijo: «Paz a ustedes»."'
  rationale: El griego provisto termina en 'entre ellos' y no incluye el saludo. La traducción debe seguir el texto fuente dado, sin armonizar con la tradición manuscrita posterior; la variante se conserva como alternativa relevante en nota.
  doctrine_reference: Primacía del texto original proporcionado y preservación de variantes textuales significativas en nota.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al texto fuente y la evaluación de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo "él mismo" para reflejar el pronombre enfático αὐτὸς.
  - Se evitó traducir ἔστη como "apareció", porque esa interpretación excede el valor léxico del verbo.
  - La nota textual conserva la variante conocida sin incorporarla al texto principal.
  - '"En medio de ellos" se eligió por claridad y fidelidad idiomática frente a posibles alternativas más literales pero menos naturales.'
