    issue: '''se puso'' para ἔστη añade un matiz de colocación/movimiento'
    rationale: El aoristo de ἵστημι aquí se traduce mejor con un verbo de estar/pararse, no con una perífrasis que en español puede sonar a 'se colocó'.
  - severity: low
    issue: La nota textual puede pulirse estilísticamente
    rationale: '''Algunos manuscritos añaden: «y les dice: “Paz a ustedes”»'' es entendible, pero conviene mantener comillas españolas consistentes y una formulación más limpia.'
  revised_spanish_text: Mientras ellos decían estas cosas[a], él mismo estuvo en medio de ellos.
