translation:
  language: es
  text: Pero él, pasando por en medio de ellos[a], siguió su camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «por el medio de ellos». El griego describe a Jesús moviéndose a través de la multitud, sin decir cómo ocurrió eso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: El griego expresa el sujeto de manera explícita y con cierto énfasis. En español, el pronombre «él» transmite naturalmente ese sujeto sin sobrecargar la frase; «él mismo» sería posible, pero añade una marcación enfática que aquí no exige el contexto.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una transición con contraste leve respecto de la hostilidad inmediata del versículo anterior. «Pero» preserva bien ese matiz adversativo en español.
- source_word: διελθὼν
  english_pob_choice: passing through
  chosen_spanish: pasando
  alternatives_spanish:
  - habiendo pasado
  - atravesando
  lexicon: BDAG
  rationale: El participio aoristo de διέρχομαι indica movimiento a través de un espacio. «Pasando» comunica de modo natural la acción en curso vinculada al verbo principal, sin volver la frase rígida.
- source_word: διὰ μέσου αὐτῶν
  english_pob_choice: through their midst
  chosen_spanish: por en medio de ellos
  alternatives_spanish:
  - por el medio de ellos
  - entre ellos
  lexicon: BDAG
  rationale: La expresión griega señala el paso por el centro o la parte media del grupo. «Por en medio de ellos» conserva esa imagen espacial con claridad y sin perder el sentido del original.
- source_word: ἐπορεύετο
  english_pob_choice: went on his way
  chosen_spanish: siguió su camino
  alternatives_spanish:
  - se fue
  - iba
  - continuó
  lexicon: BDAG
  rationale: El imperfecto de πορεύομαι presenta un desplazamiento continuo. «Siguió su camino» expresa en español una marcha continuada y natural, cercana al valor progresivo del verbo griego.
theological_decisions:
- issue: Si el versículo debe sugerir una salida milagrosa o permanecer descriptivamente neutral
  english_pob_reading: 'Descriptively neutral wording: ''passing through their midst, went on his way'''
  chosen_spanish_reading: 'Redacción descriptiva y neutral: «pasando por en medio de ellos, siguió su camino»'
  alternative_spanish_readings:
  - pasó milagrosamente por en medio de ellos
  - atravesó sin ser detenido
  rationale: El griego narra el movimiento de Jesús sin explicar el mecanismo. La redacción española conserva esa neutralidad y evita introducir una afirmación milagrosa que el texto no enuncia explícitamente, manteniendo la tensión teológica del pasaje.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el último pase; el texto base fue confirmado como estable por la auditoría inglesa y la revisión cruzada.
  spanish_consistency_notes:
  - Se mantiene «él» para αὐτός en lugar de «él mismo», siguiendo el énfasis moderado del griego sin añadir solemnidad innecesaria.
  - «Yahvé», «Mesías» y otras entradas terminológicas del proyecto no intervienen en este versículo.
  - La nota al pie conserva la alternativa espacial del griego y la neutralidad respecto del modo de la acción.
