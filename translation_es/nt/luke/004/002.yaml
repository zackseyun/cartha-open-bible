translation:
  language: es
  text: durante cuarenta días[a], siendo tentado por el diablo. Y no comió nada en aquellos días, y cuando terminaron, tuvo hambre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'siendo probado'. El verbo griego puede significar tanto 'tentar' como 'probar', aunque 'tentado' encaja mejor en este contexto porque el agente es el diablo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμέρας τεσσεράκοντα
  english_pob_choice: for forty days
  chosen_spanish: durante cuarenta días
  alternatives_spanish:
  - por cuarenta días
  - cuarenta días
  lexicon: BDAG
  rationale: El acusativo de duración expresa extensión temporal; en español, 'durante' comunica de manera natural esa duración sin añadir contenido ajeno. 'Cuarenta días' a secas es posible, pero menos explícito; 'por cuarenta días' también es válido, aunque aquí 'durante' resulta más fluido.
- source_word: πειραζόμενος
  english_pob_choice: being tempted
  chosen_spanish: siendo tentado
  alternatives_spanish:
  - siendo probado
  - siendo puesto a prueba
  lexicon: BDAG
  rationale: El verbo πειράζω puede significar 'tentar' o 'probar'. En este contexto, con el diablo como agente, 'tentado' preserva el sentido hostil y moral que mejor encaja con la escena. Se mantiene la tensión lexical porque 'probar' sigue siendo posible en otros contextos.
- source_word: ὑπὸ τοῦ διαβόλου
  english_pob_choice: by the devil
  chosen_spanish: por el diablo
  alternatives_spanish:
  - por el acusador
  - por el calumniador
  lexicon: BDAG
  rationale: διάβολος funciona aquí como designación personal conocida en el relato evangélico; 'el diablo' es la forma más clara y fiel en español. Las alternativas etimológicas oscurecerían el referente.
- source_word: οὐκ ἔφαγεν οὐδὲν
  english_pob_choice: he ate nothing
  chosen_spanish: No comió nada
  alternatives_spanish:
  - No había comido nada
  - No comió absolutamente nada
  lexicon: BDAG
  rationale: La negación enfática se expresa de forma natural y directa en español con 'No comió nada'. 'No había comido nada' desplaza innecesariamente el tiempo verbal; 'absolutamente' intensifica más de lo que el griego requiere.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  english_pob_choice: during those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - durante aquellos días
  - en esos días
  lexicon: BDAG
  rationale: La expresión marca el intervalo temporal del ayuno. 'En aquellos días' es una equivalencia natural y reconocible en español bíblico contemporáneo; 'durante aquellos días' explicita la duración, pero 'en aquellos días' conserva mejor la cadencia del giro griego sin sonar arcaico.
- source_word: συντελεσθεισῶν αὐτῶν
  english_pob_choice: when they were ended
  chosen_spanish: cuando ellos terminaron
  alternatives_spanish:
  - cuando terminaron
  - cuando fueron terminados
  - cuando se cumplieron
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto pide una cláusula temporal. 'Cuando ellos terminaron' sigue el valor temporal de cierre, pero en español 'ellos' se refiere de forma poco natural a 'los días'; aun así, se preserva la referencia al sujeto implícito plural del griego. 'Cuando se cumplieron' es una buena alternativa más idiomática, pero menos transparente respecto del pasivo verbal.
- source_word: ἐπείνασεν
  english_pob_choice: he was hungry
  chosen_spanish: tuvo hambre
  alternatives_spanish:
  - tenía hambre
  - sintió hambre
  lexicon: BDAG
  rationale: El aoristo expresa el inicio o la irrupción del hambre después del período de ayuno. 'Tuvo hambre' refleja ese cambio puntual de manera concisa y natural en español. 'Tenía hambre' sugiere estado continuo; 'sintió hambre' añade una matización perceptiva no necesaria.
theological_decisions:
- issue: El alcance de πειραζόμενος en la experiencia de Jesús en el desierto
  english_pob_reading: being tempted
  chosen_spanish_reading: siendo tentado
  alternative_spanish_readings:
  - siendo probado
  - siendo puesto a prueba
  rationale: Se conserva 'tentado' porque el agente explícito es el diablo; eso hace que la acepción moral/hostil sea la más pertinente. No se elimina la tensión teológica de πειράζω, que puede abarcar también la idea de prueba en otros contextos, pero aquí no se suaviza el conflicto.
  doctrine_reference: Preservar la tensión lexical sin resolverla de antemano; cf. Santiago 1:13 para la distinción entre tentación y prueba.
translation_notes:
  revision_awareness: La redacción sigue la decisión revisada del inglés POB de preferir una formulación temporal más natural para el cierre del período, manteniendo la equivalencia óptima. En español se adoptó 'cuando ellos terminaron' para reflejar la clausura temporal del griego, aunque también se reconoce que 'cuando se cumplieron' sería más idiomático; la elección actual prioriza la transparencia auditiva con el valor verbal del original.
  spanish_consistency_notes:
  - Se usa 'diablo' de manera consistente para διάβολος, según el uso establecido en el contexto evangélico.
  - Se mantiene 'tentado' y no 'probado' en el cuerpo principal para respetar el peso contextual del agente personal.
  - '''Tuvo hambre'' reproduce el comienzo del estado de hambre y evita una traducción más estática.'
  - Se evita 'SEÑOR' o sustituciones convencionales porque este versículo no contiene el nombre divino.
