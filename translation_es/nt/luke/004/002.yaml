    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la fidelidad idiomática del genitivo absoluto griego y la legibilidad en español: ''cuando ellos terminaron'' se cambió a ''cuando terminaron''. También se restituyó ''Y'' al inicio de la segunda oración para reflejar mejor la coordinación del original. Se mantuvo la nota léxica y el resto de las decisiones del borrador.'
