  to: Y Jesús volvió a Galilea en el poder del Espíritu[a], y se difundió un informe[b] acerca de él por toda la región circundante.
  rationale: Se ajusta φήμη a «informe» para alinearlo mejor con «a report» del audit trail inglés y conservar neutralidad semántica; se cambia «salió una noticia» por «se difundió un informe» para lograr español más natural sin perder el sentido de propagación. Se conserva «volvió», «en el poder del Espíritu» y «por toda la región circundante» por su fidelidad y claridad.
