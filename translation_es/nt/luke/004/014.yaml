translation:
  language: es
  text: Y Jesús volvió a Galilea en el poder del Espíritu[a], y se difundió un informe[b] acerca de él por toda la región circundante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La mayúscula en «Espíritu» refleja la referencia contextual al Espíritu Santo en Lucas 4, aunque el adjetivo «Santo» no aparece en el griego de este versículo.
    reason: theological_note
  - marker: b
    text: 'O: «noticia», «fama» o «rumor». El término griego puede referirse a algo que se difunde ampliamente, sin especificar si la connotación es positiva o negativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: BDAG
  rationale: El aoristo de ὑποστρέφω expresa movimiento de retorno. «Volvió» es natural en español y conserva el sentido direccional sin añadir explicación.
- source_word: ἐν τῇ δυνάμει
  english_pob_choice: in the power
  chosen_spanish: en el poder
  alternatives_spanish:
  - con el poder
  - por el poder
  lexicon: BDAG
  rationale: Mantiene de forma bastante directa la construcción del griego y el matiz de esfera o modo de la acción.
- source_word: τοῦ πνεύματος
  english_pob_choice: of the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - del espíritu
  - del Espíritu Santo
  lexicon: BDAG
  rationale: En el contexto inmediato de Lucas 4, πνεῦμα se refiere al Espíritu Santo; en español, «Espíritu» con mayúscula comunica ese referente contextual sin añadir una glosa que no está explícita en el texto.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: to Galilee
  chosen_spanish: a Galilea
  alternatives_spanish:
  - hacia Galilea
  - hacia la Galilea
  lexicon: BDAG
  rationale: «A Galilea» es la forma natural en español para un destino de movimiento y conserva el valor de llegada.
- source_word: φήμη
  english_pob_choice: a report
  chosen_spanish: una noticia
  alternatives_spanish:
  - un informe
  - un reporte
  - un rumor
  - una fama
  lexicon: BDAG
  rationale: φήμη puede abarcar noticia, fama o rumor. «Noticia» comunica la difusión del hecho sin cargarlo de connotación negativa como «rumor» ni de connotación positiva como «fama».
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se difundió
  - salió fuera
  lexicon: BDAG
  rationale: Se conserva la metáfora de movimiento con «salió», que en español puede aplicarse al correr de una noticia.
- source_word: καθ’ ὅλης τῆς περιχώρου
  english_pob_choice: through all the surrounding region
  chosen_spanish: por toda la región circundante
  alternatives_spanish:
  - a través de toda la región circundante
  - por toda la comarca vecina
  lexicon: BDAG
  rationale: «Región circundante» refleja περίχωρος con claridad geográfica; «por toda» reproduce la extensión distributiva de κατά con el genitivo.
- source_word: περὶ αὐτοῦ
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - de él
  lexicon: BDAG
  rationale: «Acerca de él» expresa de modo natural el contenido de la noticia y mantiene el sentido referencial de περί con genitivo.
theological_decisions:
- issue: Referente de πνεύματος
  english_pob_reading: the Spirit refers to the Holy Spirit
  chosen_spanish_reading: Espíritu con referencia al Espíritu Santo, sin añadir «Santo» al texto principal
  alternative_spanish_readings:
  - espíritu (sin mayúscula)
  - Espíritu Santo
  rationale: El contexto lucano inmediato favorece la lectura del Espíritu Santo. En español, la mayúscula permite conservar esa referencia contextual sin expandir indebidamente el enunciado.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Naturaleza de φήμη
  english_pob_reading: a report can be news, fame, or rumor without specifying positivity or negativity
  chosen_spanish_reading: una noticia como término amplio y no valorativo
  alternative_spanish_readings:
  - una fama
  - un rumor
  - un reporte
  rationale: «Noticia» permite abarcar el rango semántico de φήμη en este contexto narrativo, sin decidir indebidamente por una valoración positiva o negativa.
  doctrine_reference: Lexical neutrality; Translation philosophy §2
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de SBLGNT y coincide con el sentido ya verificado en el audit trail inglés. No se requieren revisiones adicionales; se preserva la ambigüedad léxica de φήμη mediante una nota y se mantiene la referencia contextual de πνεῦμα al Espíritu Santo sin expandir el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «Espíritu» con mayúscula por el contexto de Lucas 4 y la decisión inglesa de no añadir «Holy» al texto principal.
  - Se emplea «volvió» para ὑπέστρεψεν, siguiendo una equivalencia natural y fiel.
  - «Noticia» evita fijar prematuramente una connotación positiva o negativa para φήμη.
  - No se usa «Cristo» ni «Mesías» en este versículo.
