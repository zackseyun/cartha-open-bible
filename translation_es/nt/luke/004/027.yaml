translation:
  language: es
  text: Y había muchos leprosos en Israel en tiempos de Eliseo el profeta, y ninguno de ellos quedó limpio, sino Naamán el sirio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λεπροὶ
  english_pob_choice: lepers
  chosen_spanish: leprosos
  alternatives_spanish:
  - personas con lepra
  - afectados de lepra
  lexicon: BDAG
  rationale: En español, «leprosos» mantiene la concisión y el valor sustantivado del adjetivo griego, igual que la elección inglesa «lepers». Evita una expansión innecesaria del sintagma y conserva el registro bíblico.
- source_word: ἐν τῷ Ἰσραὴλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - en la tierra de Israel
  lexicon: BDAG
  rationale: La preposición expresa esfera o ubicación de manera natural. «En Israel» reproduce el alcance del griego sin añadir una especificación geográfica que el texto no requiere.
- source_word: ἐπὶ Ἐλισαίου τοῦ προφήτου
  english_pob_choice: in the time of Elisha the prophet
  chosen_spanish: en tiempo de Eliseo, el profeta
  alternatives_spanish:
  - en los días de Eliseo, el profeta
  - durante Eliseo, el profeta
  lexicon: BDAG
  rationale: Con ἐπί y genitivo, el sentido es temporal. «En tiempo de» es una forma natural en español y conserva la relación histórica sin literalismo forzado.
- source_word: ἐκαθαρίσθη
  english_pob_choice: was cleansed
  chosen_spanish: fue limpiado
  alternatives_spanish:
  - fue purificado
  - fue sanado
  lexicon: BDAG
  rationale: La idea central es la de limpieza ritual/relacional asociada a la lepra en el marco bíblico. «Fue limpiado» preserva mejor esa fuerza que «fue sanado», aunque «limpiado» exige al lector español una lectura bíblica algo menos idiomática que en inglés.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: 'En español, en una estructura negativa, «sino» expresa con naturalidad la excepción. Reproduce bien el contraste: ninguno fue limpiado, sino Naamán.'
- source_word: Ναιμὰν ὁ Σύρος
  english_pob_choice: Naaman the Syrian
  chosen_spanish: Naamán el sirio
  alternatives_spanish:
  - Naamán, el sirio
  - Naamán el siro
  lexicon: BDAG
  rationale: Se conserva el nombre propio tradicionalmente transliterado y el etnónimo como designación identificadora. «El sirio» mantiene el contraste retórico del ejemplo frente a Israel.
theological_decisions:
- issue: Lenguaje de limpieza frente a curación en la lepra
  english_pob_reading: Render ἐκαθαρίσθη as 'was cleansed' rather than reducing it to merely medical 'was healed.'
  chosen_spanish_reading: «Fue limpiado» en vez de «fue sanado».
  alternative_spanish_readings:
  - fue purificado
  - fue sanado
  rationale: La expresión conserva el trasfondo bíblico de impureza/limpieza ligado a la lepra y no reduce el acto a una noción meramente médica. Así se mantiene la resonancia ceremonial del verbo griego.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor del etnónimo de Naamán
  english_pob_reading: Retain 'the Syrian' in the main text.
  chosen_spanish_reading: Mantener «el sirio» en el texto principal.
  alternative_spanish_readings:
  - un sirio
  - el arameo
  rationale: 'El designador étnico sostiene el contraste narrativo y retórico: el beneficiado no pertenece a Israel. «El sirio» refleja con claridad esa identificación sin suavizarla.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier nota al pie no anclada en el texto. La presente redacción conserva el sentido del griego y el audit trail inglés sin introducir marcas de nota.
  spanish_consistency_notes:
  - Se prefiere «Naamán» con acento ortográfico español.
  - «Eliseo» se usa como forma castellana estándar del nombre propio.
  - 'Se mantiene un orden natural en español: sujeto + verbo + complemento temporal.'
  - No se introduce «Señor» ni otras sustituciones teológicas ajenas al texto.
  - La elección de «fue limpiado» preserva la terminología bíblica de limpieza asociada a la lepra.
