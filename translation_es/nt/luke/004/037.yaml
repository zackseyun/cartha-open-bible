translation:
  language: es
  text: Y la noticia acerca de él iba saliendo a todos los lugares de la región circundante[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un informe acerca de él iba saliendo a todos los lugares de la región circundante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Entonces
  lexicon: BDAG
  rationale: La conjunción enlaza el versículo con el relato anterior sin añadir matiz interpretativo. «Y» conserva esa continuidad narrativa de forma natural en español.
- source_word: ἐξεπορεύετο
  english_pob_choice: was going out
  chosen_spanish: se extendía
  alternatives_spanish:
  - iba saliendo
  - salía
  - iba propagándose
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua en pasado. En español, «se extendía» comunica bien la difusión progresiva del rumor/noticia y evita una literalidad extraña como «iba saliendo».
- source_word: ἦχος
  english_pob_choice: news
  chosen_spanish: la noticia
  alternatives_spanish:
  - el informe
  - el reporte
  - la fama
  - el rumor
  lexicon: BDAG
  rationale: Aunque ἦχος puede significar literalmente «sonido», aquí el contexto con περὶ αὐτοῦ y ἐξεπορεύετο apunta al contenido divulgado sobre Jesús. «La noticia» mantiene claridad y evita reducir el sentido a «sonido».
- source_word: περὶ αὐτοῦ
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - en cuanto a él
  lexicon: BDAG
  rationale: La frase preposicional indica el tema del cual circula la noticia. «Acerca de él» es fiel, claro y de registro adecuado.
- source_word: εἰς πάντα τόπον
  english_pob_choice: into every place
  chosen_spanish: a todo lugar
  alternatives_spanish:
  - a cada lugar
  - por todo lugar
  - a todos los lugares
  lexicon: BDAG
  rationale: La construcción distributiva se conserva con «a todo lugar», que refleja el alcance amplio sin volverla demasiado pesada. «A cada lugar» sería posible, pero suena menos idiomático aquí.
- source_word: τῆς περιχώρου
  english_pob_choice: of the surrounding region
  chosen_spanish: de la región vecina
  alternatives_spanish:
  - de la región circundante
  - de los alrededores
  - de la comarca vecina
  lexicon: BDAG
  rationale: περίχωρος designa la zona/región alrededor de un centro. «Región vecina» comunica bien la proximidad geográfica y preserva el sentido relacional del genitivo sin forzar una fórmula técnica.
translation_notes:
  revision_awareness: El texto griego presenta ἦχος como sujeto de ἐξεπορεύετο; el auditable POB inglés lo interpreta como «news/report» en función del contexto. La versión española sigue esa decisión semántica, usando «la noticia» para evitar la ambigüedad de «sonido» y conservar el movimiento progresivo del imperfecto con «se extendía».
  spanish_consistency_notes:
  - Se mantuvo el pronombre implícito de referencia a Jesús como «él» para seguir el griego αὐτοῦ sin añadir el nombre propio.
  - Se evitó «SEÑOR» u otra adaptación no pertinente, ya que el versículo no contiene lenguaje divino explícito.
  - «Región vecina» conserva la idea espacial de περιχώρος con español natural y plenamente comprensible.
