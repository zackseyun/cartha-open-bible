review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del griego y conserva correctamente «suegra de Simón», «entró en la casa de Simón» y «fiebre muy alta». Sin embargo, el tramo final no refleja fielmente la decisión auditada del POB: ἠρώτησαν αὐτὸν περὶ αὐτῆς se mantuvo en inglés como «they asked him about her», con la implicación de ruego solo en nota. El español principal «le pidieron acerca de ella» suena poco natural y además desplaza el sentido hacia una petición explícita más de lo que exige el texto.'
  spanish_quality_summary: 'La redacción es mayormente clara, pero presenta dos problemas de naturalidad: el marcador [a] está colocado sobre «afligida» aunque la nota corresponde al verbo final; y «le pidieron acerca de ella» no es español idiomático. También «Y después de levantarse...» puede simplificarse a «Después de levantarse...» para mejor fluidez, aunque no es un error grave.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «suegra», «fiebre» y los nombres propios están bien. La principal corrección es ajustar la elección para ἠρώτησαν a «le preguntaron por ella» en el texto principal, dejando la lectura más apelativa en nota, en línea con la auditoría inglesa.
  issues:
  - severity: high
    issue: La cláusula final traduce ἠρώτησαν αὐτὸν περὶ αὐτῆς como «le pidieron acerca de ella».
    rationale: Esto no sigue la decisión principal del POB inglés («they asked him about her») y en español resulta menos natural. Además hace más explícita una petición de ayuda que el texto griego deja implícita.
  - severity: medium
    issue: La nota [a] está anclada en «afligida» en vez de la frase final a la que realmente comenta.
    rationale: El contenido de la nota trata la alternativa para ἠρώτησαν αὐτὸν περὶ αὐτῆς, no para ἦν συνεχομένη. El anclaje actual puede confundir al lector.
  - severity: low
    issue: La apertura «Y después de levantarse...» es algo pesada en español narrativo.
    rationale: δέ no exige reproducirse con «Y» al inicio aquí. Omitirlo mejora fluidez sin pérdida semántica.
  revised_spanish_text: Después de levantarse de la sinagoga, entró en la casa de Simón. La suegra de Simón estaba afligida con una fiebre muy alta, y le preguntaron por ella[a].
  revised_footnotes:
  - marker: a
    text: O «apelaron a él por ella». El griego dice literalmente «le preguntaron acerca de ella», y en contexto probablemente implica una solicitud de ayuda.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la traducción principal de ἠρώτησαν αὐτὸν περὶ αὐτῆς para que siga la restricción del POB auditado y suene natural en español: «le preguntaron por ella». La nota conserva la posible implicación de ruego. También se mueve el marcador a la frase correcta y se aligera el inicio quitando la conjunción inicial innecesaria.'
