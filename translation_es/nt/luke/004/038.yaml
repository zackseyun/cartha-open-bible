translation:
  language: es
  text: Después de levantarse de la sinagoga, entró en la casa de Simón. La suegra de Simón estaba afligida con una fiebre muy alta, y le preguntaron por ella[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apelaron a él por ella». El griego dice literalmente «le preguntaron acerca de ella», y en contexto probablemente implica una solicitud de ayuda.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναστὰς
  english_pob_choice: after rising
  chosen_spanish: y después de levantarse
  alternatives_spanish:
  - habiéndose levantado
  - después de haberse levantado
  lexicon: BDAG
  rationale: El participio aoristo funciona como circunstancia temporal previa al verbo principal. «Después de levantarse» reproduce con naturalidad la secuencia sin perder el valor temporal.
- source_word: ἀπὸ τῆς συναγωγῆς
  english_pob_choice: from the synagogue
  chosen_spanish: de la sinagoga
  alternatives_spanish:
  - desde la sinagoga
  - alejándose de la sinagoga
  lexicon: BDAG
  rationale: La preposición ἀπό marca movimiento de separación o procedencia. «De la sinagoga» es la forma más directa y natural en español.
- source_word: εἰσῆλθεν εἰς τὴν οἰκίαν Σίμωνος
  english_pob_choice: he entered Simon’s house
  chosen_spanish: entró en la casa de Simón
  alternatives_spanish:
  - entró a la casa de Simón
  - se metió en la casa de Simón
  lexicon: BDAG
  rationale: εἰσέρχομαι con εἰς expresa entrada en un lugar. «Entró en la casa de Simón» conserva la dirección del movimiento y suena natural en español.
- source_word: πενθερὰ τοῦ Σίμωνος
  english_pob_choice: Simon’s mother-in-law
  chosen_spanish: la suegra de Simón
  alternatives_spanish:
  - la madre política de Simón
  - la madre de la esposa de Simón
  lexicon: BDAG
  rationale: πενθερά significa específicamente «suegra». La relación de parentesco debe quedar explícita sin añadir inferencias ajenas al texto.
- source_word: ἦν συνεχομένη
  english_pob_choice: was afflicted
  chosen_spanish: estaba afligida
  alternatives_spanish:
  - estaba siendo atormentada
  - estaba sujeta
  lexicon: BDAG
  rationale: La construcción perifrástica con συνεχομένη comunica que la mujer se hallaba bajo la presión de la fiebre. «Afligida» mantiene el matiz pasivo y evita una paráfrasis más fuerte de lo que exige el griego.
- source_word: πυρετῷ μεγάλῳ
  english_pob_choice: with a high fever
  chosen_spanish: con una fiebre muy alta
  alternatives_spanish:
  - con una fiebre grande
  - con una fiebre severa
  lexicon: BDAG
  rationale: πυρετός es «fiebre»; μέγας intensifica la gravedad. «Muy alta» reproduce de manera idiomática el valor intensivo de μεγάλῳ.
- source_word: ἠρώτησαν αὐτὸν περὶ αὐτῆς
  english_pob_choice: they asked him about her
  chosen_spanish: y le pidieron acerca de ella
  alternatives_spanish:
  - y le preguntaron por ella
  - y le suplicaron por ella
  - y le pidieron ayuda por ella
  lexicon: BDAG
  rationale: ἐρωτάω puede significar pedir o preguntar. En este contexto de sanidad, la expresión sugiere una solicitud en favor de la enferma; «le pidieron acerca de ella» preserva la literalidad básica y deja abierta la implicación contextual.
theological_decisions:
- issue: Implicación del parentesco de Simón
  english_pob_reading: Render the kinship term directly as 'mother-in-law' without drawing further doctrinal or historical conclusions in the translation.
  chosen_spanish_reading: Traducir πενθερά de forma directa como «suegra», sin ampliar el texto con conclusiones históricas adicionales.
  alternative_spanish_readings:
  - la madre de la esposa de Simón
  - la parienta de Simón
  rationale: El texto nombra un vínculo familiar concreto. La traducción debe conservarlo con precisión y sin añadir explicaciones que el versículo no expresa.
  doctrine_reference: Translation philosophy 1, 6
- issue: Tono de la solicitud en ἠρώτησαν αὐτὸν περὶ αὐτῆς
  english_pob_reading: Use 'asked him about her' in the main text.
  chosen_spanish_reading: Usar «le pidieron acerca de ella» como texto principal, manteniendo la posibilidad de una petición en favor suyo.
  alternative_spanish_readings:
  - le preguntaron por ella
  - le rogaron por ella
  - le pidieron que la ayudara
  rationale: El verbo griego permite una gama que va de preguntar a solicitar. La forma elegida evita exagerar la fuerza de la petición, pero deja ver la orientación práctica del contexto de sanidad.
  doctrine_reference: Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue la lectura estable del paquete fuente y del audit trail inglés. No se adoptaron revisiones posteriores porque el informe de revisión más reciente indicó que no había cambios necesarios, y el control cruzado solo señaló asuntos menores sin alterar el sentido base.
  spanish_consistency_notes:
  - Se mantiene «Simón» como nombre propio sin transliteración adicional.
  - Se conserva el orden narrativo simple del griego con una frase temporal inicial.
  - «Le pidieron acerca de ella» refleja la ambigüedad funcional del verbo sin cerrar de manera excesiva el sentido contextual.
  - La nota al pie conserva la alternativa semántica documentada por el POB inglés.
