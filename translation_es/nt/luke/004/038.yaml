revisions:
- from: Y después de levantarse de la sinagoga, entró en la casa de Simón. La suegra de Simón estaba [a] afligida con una fiebre muy alta, y le pidieron acerca de ella.
  to: Después de levantarse de la sinagoga, entró en la casa de Simón. La suegra de Simón estaba afligida con una fiebre muy alta, y le preguntaron por ella[a].
  rationale: 'Se corrige la traducción principal de ἠρώτησαν αὐτὸν περὶ αὐτῆς para que siga la restricción del POB auditado y suene natural en español: «le preguntaron por ella». La nota conserva la posible implicación de ruego. También se mueve el marcador a la frase correcta y se aligera el inicio quitando la conjunción inicial innecesaria.'
