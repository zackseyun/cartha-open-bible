translation:
  language: es
  text: Y a ninguno de ellos fue enviado Elías, sino a Sarepta[a] de Sidón, a una viuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Sarepta de Sidón»; tradicionalmente se identifica con la Zarepta del Antiguo Testamento (1 Reyes 17:9).'
    reason: cross_reference
lexical_decisions:
- source_word: ἐπέμφθη
  english_pob_choice: was sent
  chosen_spanish: fue enviado
  alternatives_spanish:
  - fue mandado
  - fue despachado
  lexicon: BDAG
  rationale: El pasivo de πέμπω se vierte de manera natural como «fue enviado». Mantiene la agencia implícita del pasivo sin añadir explícitamente a Dios como sujeto, como hace el texto griego.
- source_word: πρὸς οὐδεμίαν αὐτῶν
  english_pob_choice: to none of them
  chosen_spanish: a ninguno de ellos
  alternatives_spanish:
  - a no uno de ellos
  - hacia ninguno de ellos
  lexicon: BDAG
  rationale: La construcción con πρὸς y acusativo expresa dirección/relación hacia personas; en español, «a ninguno de ellos» comunica con naturalidad la exclusión enfatizada por οὐδεμίαν.
- source_word: Ἠλίας
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elías
  lexicon: transliteración estándar
  rationale: Nombre propio bíblico asentado en español como «Elías».
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: En una construcción exceptiva, «sino» es la equivalencia española más natural y fiel al contraste del griego. Evita un matiz condicional que tendría «a menos que».
- source_word: Σάρεπτα
  english_pob_choice: Zarephath
  chosen_spanish: Sarepta
  alternatives_spanish:
  - Zarepta
  lexicon: uso geográfico tradicional griego/latino
  rationale: Se conserva la forma próxima al griego, «Sarepta», porque el texto fuente la usa explícitamente y el objetivo es no sustituirla por una adaptación eclesial o por una armonización automática con 1 Reyes 17.
- source_word: τῆς Σιδωνίας
  english_pob_choice: of Sidon
  chosen_spanish: de Sidón
  alternatives_spanish:
  - de la región de Sidón
  - sidonia
  lexicon: BDAG
  rationale: El genitivo identifica geográficamente a Sarepta por su asociación con Sidón. «De Sidón» conserva esa relación de manera formal y transparente en español.
- source_word: γυναῖκα χήραν
  english_pob_choice: a widow
  chosen_spanish: a una viuda
  alternatives_spanish:
  - a una mujer viuda
  - a una mujer, viuda
  lexicon: BDAG
  rationale: La expresión apposicional griega se comprime de forma natural en español a «una viuda», sin perder el sentido. Se añade el artículo por fluidez y corrección idiomática.
theological_decisions:
- issue: Agencia implícita en el pasivo de ἐπέμφθη
  english_pob_reading: 'Retain the divine passive as an unstated agent: ''Elijah was sent'''
  chosen_spanish_reading: 'Mantener el pasivo sin explicitar al agente: «fue enviado»'
  alternative_spanish_readings:
  - Dios envió a Elías
  - Elías fue enviado por Dios
  rationale: El griego no nombra al que envía. Aunque el contexto sugiere la acción divina, la traducción preserva esa reserva textual y no introduce un sujeto teológico que el versículo no expresa de forma explícita.
  doctrine_reference: Primacía del texto original; no importar al enunciado principal una afirmación doctrinal o interpretativa que el versículo no formule explícitamente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado auditado en inglés, que mantuvo la forma de genitivo «of Sidon» frente a «in Sidon» para reflejar mejor la relación gramatical. En español se reflejó esa misma precisión con «de Sidón». También se preservó el valor exceptivo de εἰ μὴ con «sino», y la forma geográfica griega explícita Σάρεπτα se dejó como «Sarepta» con nota de identificación tradicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; en este versículo no aparece el tetragrámaton.
  - Se usó «Elías» como nombre propio bíblico estándar en español.
  - «Sarepta» conserva la forma del texto griego; la nota aclara la identificación tradicional con Zarepta.
  - El pasivo «fue enviado» preserva la agencia implícita sin sobreinterpretación.
  - La puntuación y el orden sintáctico buscan un registro bíblico claro y publicable en español moderno.
