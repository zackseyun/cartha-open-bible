translation:
  language: es
  text: 'Y le fue entregado el rollo del profeta Isaías[a], y, después de desenrollar el rollo, encontró el lugar donde estaba escrito:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «libro». El griego βιβλίον puede designar un documento escrito en general, pero en este contexto sinagogal probablemente se refiere a un rollo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεδόθη
  english_pob_choice: was handed
  chosen_spanish: le fue entregado
  alternatives_spanish:
  - le fue dado
  - le fue pasado
  lexicon: BDAG
  rationale: El pasivo aoristo indica que el rollo le fue dado a Jesús. En español, «le fue entregado» transmite bien la recepción del objeto en un contexto formal y natural, sin añadir una connotación de mera entrega material excesiva ni perder la pasividad del griego.
- source_word: βιβλίον
  english_pob_choice: scroll
  chosen_spanish: rollo
  alternatives_spanish:
  - libro
  - escrito
  lexicon: BDAG
  rationale: En este contexto sinagogal, βιβλίον designa un rollo y no un libro con forma codex. «Rollo» conserva la forma histórica del objeto y comunica mejor el gesto de desenrollarlo.
- source_word: τοῦ προφήτου Ἠσαΐου
  english_pob_choice: of the prophet Isaiah
  chosen_spanish: del profeta Isaías
  alternatives_spanish:
  - de Isaías el profeta
  lexicon: BDAG
  rationale: La construcción genitiva se vierte naturalmente como «del profeta Isaías», manteniendo tanto la identificación del rollo como el título profético de Isaías.
- source_word: ἀναπτύξας
  english_pob_choice: after unrolling
  chosen_spanish: después de desenrollar
  alternatives_spanish:
  - habiendo desenrollado
  - al desenrollar
  lexicon: BDAG
  rationale: El participio aoristo marca una acción anterior a encontró. «Después de desenrollar» expresa con claridad la secuencia y se ajusta bien al objeto «rollo».
- source_word: εὗρεν
  english_pob_choice: he found
  chosen_spanish: encontró
  alternatives_spanish:
  - halló
  lexicon: BDAG
  rationale: «Encontró» es una traducción directa, natural y plenamente adecuada para εὗρεν, sin sugerir dificultad especial.
- source_word: τόπον
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - la sección
  - el pasaje
  lexicon: BDAG
  rationale: Aunque aquí se refiere al lugar del texto, la forma literal «el lugar» conserva la concreción del griego y sigue siendo inteligible en español.
- source_word: οὗ ἦν γεγραμμένον
  english_pob_choice: where it was written
  chosen_spanish: donde estaba escrito
  alternatives_spanish:
  - donde se había escrito
  - donde decía
  lexicon: BDAG
  rationale: La cláusula relativa introduce el pasaje citado. «Donde estaba escrito» reproduce con sencillez el valor resultativo del pluscuamperfectivo/perfectivo perifrástico sin sonar arcaico.
translation_notes:
  revision_awareness: 'Se siguió el texto griego SBLGNT y el expediente auditado en inglés. La decisión principal se mantuvo estable respecto del inglés: βιβλίον se entiende como «rollo» por el contexto sinagogal, y ἀναπτύξας se vierte con una secuencia anterior explícita («después de desenrollar») para reflejar el participio aoristo. No hubo revisiones textuales relevantes en el pase más reciente.'
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Isaías» y el tiempo narrativo pasado simple para la fluidez en español.
  - Se evitó «libro» en el texto principal para no borrar la tensión lexical documentada entre documento genérico y rollo físico; esa alternativa queda en nota.
  - La puntuación con dos comas conserva la cadencia de introducción narrativa del versículo y prepara la cita siguiente.
