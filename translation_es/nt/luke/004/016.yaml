translation:
  language: es
  text: Y vino a Nazara[a], donde había sido criado, y, como era su costumbre, entró en la sinagoga en el día de sábado, y se puso de pie para leer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Nazaret». El griego aquí dice Ναζαρά.
    reason: alternative_reading
lexical_decisions:
- source_word: Ναζαρά
  english_pob_choice: Nazara
  chosen_spanish: Nazara
  alternatives_spanish:
  - Nazaret
  lexicon: BDAG
  rationale: El griego de este versículo trae la forma Ναζαρά, no la forma más común asociada con Nazaret. Por fidelidad al texto fuente, se mantiene «Nazara» en el texto principal; «Nazaret» queda como alternativa en nota.
- source_word: τεθραμμένος
  english_pob_choice: had been brought up
  chosen_spanish: había sido criado
  alternatives_spanish:
  - había sido educado
  - había sido criado y educado
  - había sido levantado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de τρέφω expresa la condición resultante de haber sido reared/upbringing. En español, «había sido criado» comunica de forma natural esa idea de crianza y formación inicial sin perder la fuerza del perfecto.
- source_word: κατὰ τὸ εἰωθὸς αὐτῷ
  english_pob_choice: as was his custom
  chosen_spanish: como era su costumbre
  alternatives_spanish:
  - según su costumbre
  - como acostumbraba
  lexicon: BDAG
  rationale: La expresión griega es idiomática y denota práctica habitual. «Como era su costumbre» conserva el sentido de hábito sin forzar un calco sintáctico.
- source_word: ἐν τῇ ἡμέρᾳ τῶν σαββάτων
  english_pob_choice: on the Sabbath day
  chosen_spanish: en día de sábado
  alternatives_spanish:
  - en el día de reposo
  - el día de sábado
  - en el sábado
  lexicon: BDAG
  rationale: 'Aunque el griego usa un plural idiomático, el sentido contextual es singular: el sábado. «En día de sábado» es una formulación clara y natural en español, manteniendo el valor litúrgico del día sin sustituirlo por un término eclesiástico no atestiguado en el texto.'
- source_word: συναγωγήν
  english_pob_choice: synagogue
  chosen_spanish: sinagoga
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: En el contexto judío, el sentido institucional y locativo es «sinagoga». Es el equivalente directo y más preciso en español.
- source_word: ἀνέστη ἀναγνῶναι
  english_pob_choice: stood up to read
  chosen_spanish: se puso de pie para leer
  alternatives_spanish:
  - se levantó para leer
  - se alzó para leer
  lexicon: BDAG
  rationale: La construcción aoristo + infinitivo indica que se levantó con el propósito de leer. «Se puso de pie para leer» es idiomático en español y conserva la finalidad del gesto.
theological_decisions:
- issue: Forma del topónimo Ναζαρά frente a la forma tradicional más conocida
  english_pob_reading: The chosen reading is Nazara, with Nazareth supplied as an alternative footnote.
  chosen_spanish_reading: La forma principal es Nazara, con Nazaret en nota como alternativa.
  alternative_spanish_readings:
  - Nazaret en el texto principal
  - armonizar con el nombre tradicional conocido
  rationale: No es un asunto doctrinal, pero sí una decisión de fidelidad textual. Se conserva la forma griega específica de este versículo en el cuerpo del texto y se ofrece la forma tradicional como alternativa, manteniendo la transparencia del expediente de traducción.
  doctrine_reference: Principio POB de primacía del texto fuente y transparencia auditável
translation_notes:
  revision_awareness: El expediente inglés muestra alta concordancia y ningún cambio en la revisión más reciente; por tanto, no se introducen ajustes sustantivos. La propuesta española sigue la misma línea de primacía del texto griego, manteniendo la forma toponímica específica y el sentido idiomático de las frases restantes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, aunque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se usa «sinagoga» por tratarse del espacio judío concreto; no se sustituye por «asamblea».
  - «Día de sábado» evita el calco rígido «día de los sábados» y conserva la referencia al sábado como institución temporal singular.
  - La nota del topónimo se ancla solo en el nombre propio para no sobrecargar el cuerpo del versículo.
