  to: 'Y Jesús lo reprendió[a], diciendo: «¡Calla y sal de él!». Y, después de arrojarlo en medio de la gente, el demonio salió de él sin hacerle ningún daño[b].'
  rationale: Se corrige la nota [b] para que preserve la alternativa léxica documentada del participio final μηδὲν βλάψαν αὐτόν. También se mejora levemente la naturalidad del español con «en medio de la gente», manteniendo la escena pública implícita en εἰς τὸ μέσον, y se normaliza la puntuación del discurso directo.
