    reason: lexical_alternative
  - marker: b
    text: 'O: «sin haberle hecho ningún daño».'
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [b] para que preserve la alternativa léxica documentada del participio final μηδὲν βλάψαν αὐτόν. También se mejora levemente la naturalidad del español con «en medio de la gente», manteniendo la escena pública implícita en εἰς τὸ μέσον, y se normaliza la puntuación del discurso directo.
