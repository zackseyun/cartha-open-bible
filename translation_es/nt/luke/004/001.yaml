translation:
  language: es
  text: Y Jesús[a], lleno del Espíritu Santo, volvió del Jordán y era guiado por el Espíritu en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el Espíritu». La expresión griega puede traducirse más literalmente así, aunque aquí probablemente significa que el Espíritu lo guiaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: SBLGNT / nombre propio
  rationale: El nombre propio se vierte de forma estándar en español como «Jesús», sin necesidad de explicación adicional.
- source_word: πλήρης πνεύματος ἁγίου
  english_pob_choice: full of the Holy Spirit
  chosen_spanish: lleno del Espíritu Santo
  alternatives_spanish:
  - lleno del Espíritu Santo
  - repleto del Espíritu Santo
  lexicon: BDAG
  rationale: «πλήρης» con genitivo expresa estar lleno de algo; «lleno del Espíritu Santo» reproduce con naturalidad la fuerza descriptiva y evita sugerir un mero momento puntual de llenura.
- source_word: ὑπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de nuevo
  lexicon: BDAG
  rationale: El aoristo de ὑποστρέφω significa «volver/regresar». «Volvió» es breve, natural y fiel al movimiento de retorno.
- source_word: ἀπὸ τοῦ Ἰορδάνου
  english_pob_choice: from the Jordan
  chosen_spanish: del Jordán
  alternatives_spanish:
  - del río Jordán
  - desde el Jordán
  lexicon: BDAG
  rationale: El griego nombra al Jordán sin añadir «río»; en español «del Jordán» conserva esa concisión, mientras que «del río Jordán» explicita más de lo que dice el texto.
- source_word: ἤγετο
  english_pob_choice: was being led
  chosen_spanish: era guiado
  alternatives_spanish:
  - era conducido
  - iba siendo guiado
  lexicon: BDAG
  rationale: El imperfecto pasivo indica acción continua en pasado. «Era guiado» mantiene ese valor progresivo de manera natural en español.
- source_word: ἐν τῷ πνεύματι
  english_pob_choice: by the Spirit
  chosen_spanish: por el Espíritu
  alternatives_spanish:
  - en el Espíritu
  - por el Espíritu Santo
  lexicon: BDAG
  rationale: 'Aunque ἐν es literalmente «en», con ἄγω en pasiva la frase se entiende de modo instrumental/agentivo: el Espíritu es quien guía a Jesús. «Por el Espíritu» comunica claramente esa relación sin perder el referente al Espíritu Santo ya presente en el contexto inmediato.'
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto
  - en la soledad
  lexicon: BDAG
  rationale: ἔρημος puede significar desierto, lugar desolado o soledad. «En el desierto» es el equivalente bíblico más directo en español y conserva el escenario de prueba y retiro sin añadir especificaciones ajenas al texto.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ marca una transición suave. «Y» mantiene el flujo narrativo sin sobrecargar el matiz adversativo.
theological_decisions:
- issue: Referente de «ἐν τῷ πνεύματι»
  english_pob_reading: the Holy Spirit leading Jesus
  chosen_spanish_reading: el Espíritu Santo guiando a Jesús
  alternative_spanish_readings:
  - en el Espíritu
  - guiado por su espíritu interior
  rationale: Dado el contexto inmediato («lleno del Espíritu Santo») y el énfasis de Lucas en la acción del Espíritu, la lectura más natural es que el mismo Espíritu Santo lo guiaba. «Por el Espíritu» preserva esa referencia sin introducir una interpretación psicológica ajena al pasaje.
  doctrine_reference: Afirmaciones; filosofía de traducción §3
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la decisión estable de rendir πλήρης πνεύματος ἁγίου como «full of the Holy Spirit», ὑπέστρεψεν como «returned», ἤγετο como «was being led» y ἐν τῷ πνεύματι de manera instrumental («by the Spirit»), con nota alternativa «in the Spirit». La versión española conserva esas decisiones semánticas y la misma ambigüedad documentada en la nota, adaptándolas a un español natural y fiel al griego.
  spanish_consistency_notes:
  - Se mantiene «Espíritu Santo» para πνεύματος ἁγίου por coherencia con el contexto lucano y con la decisión inglesa auditada.
  - Se evita «Señor» o perífrasis tradicionales no presentes en el texto fuente.
  - «Del Jordán» conserva la falta de especificación del griego, en paralelo con la decisión inglesa de no añadir «río».
  - La nota [a] preserva la alternativa literal «en el Espíritu» para no borrar la tensión entre traducción instrumental y traducción más literal.
