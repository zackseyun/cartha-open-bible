    issue: «en el desierto» frente a la elección inglesa «in the wilderness»
    rationale: No es infidelidad. En español bíblico «desierto» suele cubrir bien ἔρημος y es más idiomático que «wilderness» calcado. Aunque «la región desierta» o «la soledad» podrían matizar distinto, la opción actual es estándar y fiel.
