review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: la cláusula temporal de puesta del sol, la totalidad de «todos los que», la referencia a personas enfermas con diversas enfermedades, el traerlos a Jesús, y la atención individual con imposición de manos y sanidad. Sin embargo, «los llevaron a él» suena menos natural y algo menos preciso en español narrativo que «se los llevaron» o mejor «los trajeron ante él / a él», dado que el movimiento es hacia Jesús desde la perspectiva del relato. Además, «poniendo las manos sobre» es comprensible, pero «poniéndoles las manos» o «les imponía las manos» suena más natural; aun así, conviene evitar una tecnificación eclesiástica innecesaria.'
  spanish_quality_summary: El español es mayormente claro y digno, pero tiene cierta rigidez. «Tenían enfermos de diversas enfermedades» es aceptable, aunque algo áspero; «tenían enfermos con diversas enfermedades» tampoco mejora mucho. La frase más necesitada de ajuste es «los llevaron a él», poco idiomática en español bíblico actual. También puede mejorarse la fluidez de la segunda cláusula para reflejar mejor la atención individual sin sonar forzada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La decisión de evitar «imponiendo las manos» como tecnicismo es defendible, aunque en español bíblico sigue siendo una opción legítima. El vocabulario principal («enfermos», «enfermedades», «sanaba») está bien alineado con el sentido fuente.
  issues:
  - severity: medium
    issue: «los llevaron a él» es poco idiomático
    rationale: Aunque semánticamente posible para ἤγαγον αὐτοὺς πρὸς αὐτόν, en español natural suena torpe. «Los trajeron a él» o «los llevaron ante él» representa mejor el movimiento hacia Jesús en estilo narrativo.
  - severity: low
    issue: La secuencia «tenían enfermos de diversas enfermedades» resulta algo pesada
    rationale: No es infiel al griego, pero en español suena menos fluida por la repetición semántica de «enfermos» y «enfermedades». Puede conservarse con leve ajuste contextual sin perder precisión.
  - severity: low
    issue: «poniendo las manos sobre cada uno de ellos» es comprensible pero algo rígido
    rationale: Una formulación como «poniéndoles las manos a cada uno de ellos» mantiene el gesto concreto y suena más natural en español, preservando la atención individual del griego.
  revised_spanish_text: Al ponerse el sol[a], todos los que tenían enfermos con diversas enfermedades los trajeron a él; y él, poniéndoles las manos a cada uno de ellos, los sanaba.
  revised_footnotes:
  - marker: a
    text: 'O: «Cuando se estaba poniendo el sol». El griego usa un genitivo absoluto con participio presente, que expresa el momento en que ocurrieron estas acciones.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores de idiomaticidad y fluidez sin alterar el sentido fuente: «los trajeron a él» comunica mejor el movimiento hacia Jesús; «poniéndoles las manos a cada uno de ellos» suena más natural en español y conserva el gesto físico e individual. Se mantuvo la nota temporal porque refleja una alternativa legítima del genitivo absoluto.'
