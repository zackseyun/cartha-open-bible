revisions:
- from: Al ponerse el sol[a], todos los que tenían enfermos de diversas enfermedades los llevaron a él; y, poniendo las manos sobre cada uno de ellos, los sanaba.
  to: Al ponerse el sol[a], todos los que tenían enfermos con diversas enfermedades los trajeron a él; y él, poniéndoles las manos a cada uno de ellos, los sanaba.
  rationale: 'Se hicieron ajustes menores de idiomaticidad y fluidez sin alterar el sentido fuente: «los trajeron a él» comunica mejor el movimiento hacia Jesús; «poniéndoles las manos a cada uno de ellos» suena más natural en español y conserva el gesto físico e individual. Se mantuvo la nota temporal porque refleja una alternativa legítima del genitivo absoluto.'
