translation:
  language: es
  text: Al ponerse el sol[a], todos los que tenían enfermos con diversas enfermedades los trajeron a él; y él, poniéndoles las manos a cada uno de ellos, los sanaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando se estaba poniendo el sol». El griego usa un genitivo absoluto con participio presente, que expresa el momento en que ocurrieron estas acciones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δύνοντος δὲ τοῦ ἡλίου
  english_pob_choice: Now when the sun was setting
  chosen_spanish: Al ponerse el sol[a]
  alternatives_spanish:
  - Cuando se estaba poniendo el sol
  - Al atardecer
  lexicon: BDAG
  rationale: 'El participio genitivo absoluto expresa una acción temporal contemporánea: el sol estaba poniéndose. En español, «Al ponerse el sol» conserva bien el valor temporal y la imagen verbal sin volverlo pesado. Se mantiene la nota para la alternativa legítima del matiz temporal.'
- source_word: ἅπαντες ὅσοι
  english_pob_choice: all who
  chosen_spanish: todos los que
  alternatives_spanish:
  - todos cuantos
  - todos aquellos que
  lexicon: BDAG
  rationale: La combinación intensifica la totalidad de manera distributiva. «Todos los que» es natural en español y conserva la amplitud del grupo sin añadir explicación.
- source_word: εἶχον ἀσθενοῦντας
  english_pob_choice: had people sick
  chosen_spanish: tenían enfermos
  alternatives_spanish:
  - tenían personas enfermas
  - tenían a los enfermos
  lexicon: BDAG
  rationale: Aquí ἔχω con participio indica tener a alguien bajo cuidado o en la casa, no simplemente poseer. «Tenían enfermos» mantiene ese sentido relacional de forma idiomática; «personas enfermas» aclara, pero alarga el texto.
- source_word: ἀσθενοῦντας
  english_pob_choice: sick
  chosen_spanish: enfermos
  alternatives_spanish:
  - enfermos
  - malos de salud
  lexicon: BDAG
  rationale: En este contexto de sanidad, ἀσθενέω significa estar enfermo. «Enfermos» es el equivalente natural y preciso en español.
- source_word: νόσοις ποικίλαις
  english_pob_choice: with various diseases
  chosen_spanish: de diversas enfermedades
  alternatives_spanish:
  - con diversas enfermedades
  - de muchas clases de enfermedades
  lexicon: BDAG
  rationale: El dativo especifica la clase de dolencias. En español, «de diversas enfermedades» fluye con «enfermos» y conserva la diversidad expresada por ποικίλαις.
- source_word: ἤγαγον αὐτοὺς πρὸς αὐτόν
  english_pob_choice: brought them to him
  chosen_spanish: los llevaron a él
  alternatives_spanish:
  - los trajeron a él
  - los condujeron a él
  lexicon: BDAG
  rationale: ἄγω puede significar traer o llevar. Como el foco está en el movimiento hacia Jesús para recibir sanidad, «los llevaron a él» es natural en español y no pierde el sentido de acercarlos a su presencia.
- source_word: ἑνὶ ἑκάστῳ αὐτῶν
  english_pob_choice: each one of them
  chosen_spanish: a cada uno de ellos
  alternatives_spanish:
  - a cada uno de ellos
  - cada uno de ellos
  lexicon: BDAG
  rationale: La duplicación distributiva enfatiza atención individual. «A cada uno de ellos» conserva ese énfasis y encaja con la sintaxis española tras «poniendo las manos».
- source_word: τὰς χεῖρας ἐπιτιθεὶς
  english_pob_choice: he laid his hands on
  chosen_spanish: poniendo las manos sobre
  alternatives_spanish:
  - imponiendo las manos sobre
  - colocando las manos sobre
  lexicon: BDAG
  rationale: La combinación es el modismo bíblico de imponer las manos. Se elige «poniendo las manos sobre» para mantener el gesto concreto sin cargarlo de una tonalidad técnica eclesiástica que el texto no exige.
- source_word: ἐθεράπευεν
  english_pob_choice: healed
  chosen_spanish: los sanaba
  alternatives_spanish:
  - los curaba
  - los sanaba
  lexicon: BDAG
  rationale: El imperfecto presenta la acción como continua o repetida mientras atendía a cada persona. «Los sanaba» conserva esa duración mejor que un perfecto puntual y mantiene el tono narrativo del pasaje.
theological_decisions:
- issue: La imposición de manos
  english_pob_reading: he laid his hands on each one of them
  chosen_spanish_reading: poniendo las manos sobre cada uno de ellos
  alternative_spanish_readings:
  - imponiendo las manos sobre cada uno de ellos
  - poniendo las manos sobre cada uno de ellos
  rationale: El texto describe un acto físico de sanidad y atención personal. Se conserva el gesto sin añadir presupuestos sacramentales ni eclesiales posteriores; el énfasis está en la cercanía de Jesús y en el trato individual.
  doctrine_reference: Preservar la tensión teológica del texto sin importar categorías doctrinales ajenas al relato.
translation_notes:
  revision_awareness: El borrador sigue de cerca el pasaje griego y el audit trail inglés, manteniendo el valor temporal del genitivo absoluto, el sentido relacional de ἔχω con participio y el imperfecto iterativo de ἐθεράπευεν. No se detectaron revisiones previas aplicadas en el contexto inglés.
  spanish_consistency_notes:
  - Se mantiene «Jesús» implícito según el contexto inmediato del capítulo, sin introducirlo en esta sola cláusula para no añadir material no presente en el versículo.
  - «Sanaba» reproduce el imperfecto iterativo y armoniza con el reparto distributivo «a cada uno de ellos».
  - Se evita «SEÑOR» o fórmulas litúrgicas no requeridas por el texto; el versículo no contiene aquí el nombre divino explícito.
