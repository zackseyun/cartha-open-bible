translation:
  language: es
  text: Y él enseñaba en sus sinagogas[a], siendo glorificado por todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siendo alabado por todos» o «siendo honrado por todos». El participio griego δοξαζόμενος puede denotar alabanza u honor públicos; «siendo glorificado» preserva su conexión con el lenguaje de la gloria.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y luego
  lexicon: BDAG
  rationale: La conjunción simple se conserva con «Y», que coordina la escena sin añadir una relación temporal o interpretativa no explicitada por el griego.
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: El pronombre sujeto explícito se mantiene como «él»; en español no es necesario reforzarlo con «él mismo», lo cual podría sobredimensionar el énfasis.
- source_word: ἐδίδασκεν
  english_pob_choice: was teaching
  chosen_spanish: enseñaba
  alternatives_spanish:
  - estaba enseñando
  - enseñó
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o habitual en pasado. «Enseñaba» conserva ese valor aspectual mejor que un pretérito simple.
- source_word: ἐν ταῖς συναγωγαῖς αὐτῶν
  english_pob_choice: in their synagogues
  chosen_spanish: en sus sinagogas
  alternatives_spanish:
  - en las sinagogas de ellos
  - en sus asambleas de sinagoga
  lexicon: BDAG
  rationale: «Sinagogas» es el equivalente natural y preciso de συναγωγαῖς. El posesivo plural «sus» reproduce el genitivo αὐτῶν de manera idiomática en español.
- source_word: δοξαζόμενος
  english_pob_choice: being glorified
  chosen_spanish: siendo glorificado
  alternatives_spanish:
  - siendo alabado
  - siendo honrado
  lexicon: BDAG
  rationale: Se conserva la conexión léxica con la gloria mediante «glorificado», tal como hace la POB en inglés. Aunque en contexto puede implicar alabanza u honor, «glorificado» mantiene visible el campo semántico de δοξάζω.
- source_word: ὑπὸ πάντων
  english_pob_choice: by all
  chosen_spanish: por todos
  alternatives_spanish:
  - por todos ellos
  - por todo el mundo
  lexicon: BDAG
  rationale: La preposición ὑπό con genitivo marca agencia; «por todos» transmite ese sentido de manera breve y natural, sin exagerar la universalidad más allá del contexto inmediato.
theological_decisions:
- issue: Sentido de δοξαζόμενος aplicado a Jesús
  english_pob_reading: being glorified by all
  chosen_spanish_reading: siendo glorificado por todos
  alternative_spanish_readings:
  - siendo alabado por todos
  - siendo honrado por todos
  rationale: La frase describe la recepción favorable de su enseñanza. Se mantiene «glorificado» para no perder el vínculo verbal con la gloria, pero sin introducir una afirmación más amplia que el contexto no exige.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El pasaje coincide con el texto base y con la revisión más reciente, que no introdujo cambios. La redacción española sigue el testimonio griego y el rastro auditado en inglés sin añadir matices ajenos al contexto.
  spanish_consistency_notes:
  - Se mantiene «glorificado» en vez de reemplazarlo por un término más interpretativo, para conservar visible la relación con δοξάζω.
  - «Sinagogas» se conserva como término técnico estable y comprensible en español bíblico.
  - El posesivo «sus» refleja el genitivo plural del griego de forma natural en español.
