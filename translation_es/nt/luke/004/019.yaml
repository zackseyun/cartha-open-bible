- from: para proclamar el año favorable del Señor[a][b].
  to: para proclamar el año favorable de Yahvé[a][b].
  rationale: Se corrige «del Señor» a «de Yahvé» para alinearlo con la política terminológica del proyecto en un eco directo de Isaías 61:2, preservando el sentido del griego y la alusión veterotestamentaria. Se mantienen «proclamar», «año» y «favorable» porque son fieles al original y suenan naturales en español. La nota tradicional conserva «del Señor» porque describe la formulación histórica tradicional, no el texto principal revisado.
