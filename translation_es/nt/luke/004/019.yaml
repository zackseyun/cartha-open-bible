    issue: Uso de «del Señor» en una alusión directa a Isaías 61:2
    rationale: En este contexto de cita/allusión profética, κύριος representa el referente divino del pasaje de Isaías. Según la política del proyecto, el texto principal en español debe usar «Yahvé» en vez de mantener la convención enmascaradora «Señor», salvo justificación contextual fuerte, que aquí no se aporta.
  - severity: low
    issue: Las notas al pie no reflejan el ajuste terminológico necesario
    rationale: Si el texto principal pasa a «Yahvé», la nota alternativa y la nota de expresión tradicional deben mantenerse coherentes con ese cambio donde corresponda, preservando a la vez la observación sobre la formulación tradicional.
