translation:
  language: es
  text: para proclamar el año favorable de Yahvé[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para proclamar el año del favor de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'La expresión tradicional es: «el año aceptable del Señor». La frase evoca Isaías 61:2 y puede sugerir temas de Jubileo.'
