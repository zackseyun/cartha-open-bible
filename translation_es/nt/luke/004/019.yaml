lexical_decisions:
- source_word: κηρύξαι
  english_pob_choice: to proclaim
  chosen_spanish: proclamar
  alternatives_spanish:
  - predicar
  - anunciar
  lexicon: BDAG
  rationale: κηρύσσω conserva el sentido de anunciar públicamente con autoridad; «proclamar» reproduce ese matiz mejor que «predicar», que en español puede restringirse a un sermón, o «anunciar», que puede sonar más general y menos solemne.
- source_word: ἐνιαυτὸν
  english_pob_choice: year
  chosen_spanish: año
  alternatives_spanish:
  - temporada
  - tiempo
  lexicon: BDAG
  rationale: ἐνιαυτός designa normalmente un año. Mantener «año» conserva la imagen idiomática y la alusión a Isaías 61:2 sin ampliar indebidamente el alcance a «tiempo» o «temporada».
- source_word: κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Maestro
  lexicon: BDAG
  rationale: κύριος se traduce por el término doctrinal y bíblicamente estable «Señor» en esta construcción genitiva. En el eco de Isaías, la frase describe el año perteneciente a Señor sin necesidad de explicitar el nombre divino en el texto principal.
- source_word: δεκτόν
  english_pob_choice: favorable
  chosen_spanish: favorable
  alternatives_spanish:
  - aceptable
  - bien recibido
  lexicon: BDAG
  rationale: δεκτός aquí expresa algo aceptable o favorablemente recibido. «Favorable» comunica con claridad en español moderno la idea de gracia divina y evita la lectura más tenue de «aceptable».
theological_decisions:
- issue: Alusión a Isaías 61:2 y resonancia jubilar
  english_pob_reading: Retain 'year' in the main text without explicitly inserting 'Jubilee.'
  chosen_spanish_reading: Mantener «año» en el texto principal sin insertar explícitamente «Jubileo».
  alternative_spanish_readings:
  - el año del favor del Señor
  - el aceptable año del Señor
  - el Jubileo del Señor
  rationale: El griego alude a Isaías 61:2 y puede sugerir temas jubilares, pero no usa el término «Jubileo». La traducción principal conserva la formulación alusiva sin introducir una expansión interpretativa en el texto base.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Modo de expresar la relación genitiva con κυρίου
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Dueño
  rationale: La opción «del Señor» refleja de forma natural el genitivo griego y mantiene el registro bíblico esperado. «Yahvé» sería una explicitación más fuerte que el texto aquí no exige; «Dueño» desplazaria el matiz bíblico-litúrgico.
  doctrine_reference: 'DOCTRINE.md: términos en disputa, κύριος'
translation_notes:
  revision_awareness: 'La versión inglesa revisó la frase de «the Lord’s favorable year» a «the favorable year of the Lord» para reflejar con más naturalidad el genitivo griego. La redacción española sigue esa misma relación nominal: «el año favorable del Señor».'
  spanish_consistency_notes:
  - Se usa «Señor» en lugar de «SEÑOR» o «Yahvé» porque el contexto inmediato sigue la cita de Isaías y el audit trail inglés trató κύριος como Lord en sentido doctrinal estándar.
  - Se conserva «favorable» como adjetivo principal para respetar δεκτόν; la nota ofrece la alternativa tradicional «aceptable».
  - La estructura «año favorable del Señor» mantiene el orden natural del español sin perder la relación genitiva del griego.
