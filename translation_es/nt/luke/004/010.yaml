translation:
  language: es
  text: 'Porque está escrito: «Él mandará a sus ángeles acerca de ti[a], para guardarte[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre ti».
    reason: lexical_alternative
  - marker: b
    text: O «para protegerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  lexicon: BDAG
  rationale: El perfecto pasivo funciona como fórmula escrituraria vigente; en español, «está escrito» comunica de manera natural la autoridad actual de la cita sin volverla pesada.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: BDAG
  rationale: Mantiene el valor explicativo/conectivo de la partícula al introducir la razón o fundamento de la afirmación previa.
- source_word: ὅτι
  english_pob_choice: ':'
  chosen_spanish: «
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Después de «está escrito», el español publica naturalmente la cita directa con dos puntos/comillas implícitas más que con un «que» explícito. Se preserva la función de introducción del contenido citado.
- source_word: Τοῖς ἀγγέλοις αὐτοῦ
  english_pob_choice: his angels
  chosen_spanish: a sus ángeles
  alternatives_spanish:
  - a los ángeles de él
  lexicon: BDAG
  rationale: 'El dativo con αὐτοῦ se expresa de forma natural en español con posesivo: «a sus ángeles». Se conserva el destinatario del mandato sin cargar la frase.'
- source_word: ἐντελεῖται
  english_pob_choice: he will command
  chosen_spanish: mandará
  alternatives_spanish:
  - dará órdenes a
  - ordenará
  lexicon: BDAG
  rationale: El futuro medio de ἐντέλλομαι comunica dar una orden o encargo. «Mandará» es preciso, directo y idiomático en español bíblico moderno.
- source_word: περὶ σοῦ
  english_pob_choice: concerning you
  chosen_spanish: acerca de ti
  alternatives_spanish:
  - sobre ti
  - con respecto a ti
  lexicon: BDAG
  rationale: περί con genitivo aquí tiene el sentido de «acerca de/con respecto a». «Acerca de ti» refleja bien la relación de la orden con la persona de Jesús.
- source_word: τοῦ διαφυλάξαι σε
  english_pob_choice: to guard you
  chosen_spanish: para guardarte
  alternatives_spanish:
  - para protegerte
  - para cuidarte
  lexicon: BDAG
  rationale: El infinitivo articular de propósito expresa la finalidad del mandato. «Guardar» conserva la fuerza protectora de διαφυλάσσω y funciona con naturalidad en español; el pronombre enclítico refleja el objeto directo.
theological_decisions:
- issue: Cita del Salmo sin completar palabras no presentes en Lucas
  english_pob_reading: A close rendering that preserves the scriptural citation form without importing the omitted continuation from Psalm 91:11.
  chosen_spanish_reading: Una traducción cercana que conserva la forma de cita sin importar la continuación omitida de Salmo 91:11.
  alternative_spanish_readings:
  - Formulación tradicional ampliada que complete la cita del salmo.
  - Harmonización con la redacción más larga del Salmo.
  rationale: Lucas reproduce solo la porción efectivamente citada en este versículo. La traducción debe respetar el alcance del texto griego de Lucas y no añadir frases ausentes, preservando así la integridad textual.
  doctrine_reference: Principios de fidelidad textual y no armonización implícita en citas bíblicas
- issue: Relación entre «acerca de ti» y el infinitivo de propósito
  english_pob_reading: ‘concerning you, to guard you’
  chosen_spanish_reading: «acerca de ti, para guardarte»
  alternative_spanish_readings:
  - «sobre ti, para protegerte»
  - «con respecto a ti, para cuidarte»
  rationale: El griego presenta una orden «acerca de ti» con una cláusula de propósito que explica para qué. La coma conserva esa relación sin volverla rígida, y «para guardarte» reproduce la finalidad del infinitivo articular.
  doctrine_reference: Sintaxis griega de infinitivo articular de propósito
translation_notes:
  revision_awareness: 'Se siguió la última revisión inglesa que prefirió una coma natural en lugar de un guion: la relación entre «acerca de ti» y «para guardarte» se conserva en español con coma, sin importar una redacción más larga del Salmo ni añadir material ausente en Lucas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en el contexto, aunque aquí no está presente.
  - Se usó «ángeles» como equivalente directo de ἄγγελοι, sin sustitución por terminología devocional más amplia.
  - «Mandará» conserva la fuerza de mandato de ἐντελεῖται de forma idiomática.
  - «Guardar» se eligió como equivalencia principal de διαφυλάσσω por su valor protector y su naturalidad en español bíblico.
