translation:
  language: es
  text: Y todos los que estaban en la sinagoga se llenaron de ira cuando oyeron estas cosas.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de furor». El griego θυμός puede denotar ira intensa o furor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλήσθησαν
  english_pob_choice: were filled
  chosen_spanish: se llenaron
  alternatives_spanish:
  - fueron llenados
  - quedaron llenos
  lexicon: BDAG
  rationale: El aoristo pasivo de πίμπλημι expresa quedar lleno de una emoción. En español, «se llenaron» conserva bien la imagen pasiva y es natural; «fueron llenados» suena demasiado mecánico y «quedaron llenos» pierde algo de la fuerza verbal de la construcción.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos los que estaban
  alternatives_spanish:
  - todos
  - todos ellos
  lexicon: BDAG
  rationale: El plural nominativo se refiere colectivamente a los presentes en la sinagoga. Añadir «los que estaban» aclara el referente implícito sin cambiar el sentido; «todos» solo sería aceptable pero menos explícito en español.
- source_word: θυμοῦ
  english_pob_choice: with anger
  chosen_spanish: de ira
  alternatives_spanish:
  - de enojo
  - de furia
  lexicon: BDAG
  rationale: θυμός puede indicar ira intensa o furor. «Ira» comunica con dignidad la intensidad del término y preserva mejor el matiz fuerte que «enojo»; «furia» es posible, pero en español puede sonar más extrema de lo que exige el contexto.
- source_word: ἐν τῇ συναγωγῇ
  english_pob_choice: in the synagogue
  chosen_spanish: en la sinagoga
  alternatives_spanish:
  - dentro de la sinagoga
  - en el lugar de reunión
  lexicon: BDAG
  rationale: La frase localiza al grupo dentro del espacio de culto/judío. «En la sinagoga» es la equivalencia directa, clara y adecuada al contexto.
- source_word: ἀκούοντες
  english_pob_choice: when they heard
  chosen_spanish: cuando oyeron
  alternatives_spanish:
  - al oír
  - mientras oían
  lexicon: BDAG
  rationale: El participio presente marca simultaneidad y ocasión. «Cuando oyeron» reproduce naturalmente esa relación temporal en español; «al oír» también sería posible, pero la forma verbal plena fluye mejor en este versículo.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas palabras
  - esto
  lexicon: BDAG
  rationale: El demostrativo plural remite a las afirmaciones previas de Jesús. «Estas cosas» conserva la amplitud del griego; «estas palabras» sería algo más específico de lo que el texto exige.
theological_decisions:
- issue: 'Matiz de θυμός: ira vs. furor/ira intensa'
  english_pob_reading: The Greek θυμός can denote intense anger or rage.
  chosen_spanish_reading: θυμός puede denotar ira intensa o furor.
  alternative_spanish_readings:
  - ira
  - furia
  - enojo intenso
  rationale: La nota inglesa preserva la tensión léxica entre un rango moderado y uno más fuerte. En español conviene mantener esa amplitud en la nota, mientras el texto principal usa «ira», suficientemente fuerte y natural sin cerrar el rango semántico.
  doctrine_reference: Lexical semantics; no doctrinal claim
translation_notes:
  revision_awareness: El pasaje muestra acuerdo alto en el contexto auditado, sin revisiones aplicadas en el archivo inglés más reciente; por eso se mantiene la decisión semántica principal de «were filled» y la alternativa léxica para θυμός en una nota breve.
  spanish_consistency_notes:
  - Se conserva «sinagoga» como término establecido para συναγωγή.
  - Se usa «ira» en el texto principal por naturalidad y dignidad, reservando el matiz más intenso para la nota.
  - La estructura «se llenaron de ira» refleja el pasivo griego sin convertirlo en una paráfrasis causal.
  - «Oyeron» es preferido frente a «escucharon» por la correspondencia más directa con ἀκούω en este contexto.
