translation:
  language: es
  text: '¡Ah![a] ¿Qué tienes que ver con nosotros[b][d], Jesús de Nazaret[c]? ¿Has venido a destruirnos? Yo sé quién eres: el Santo de Dios[e].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «¡Ea!». La interjección Ἔα es un grito abrupto de alarma o protesta; algunas traducciones la interpretan más libremente como «¡Déjanos en paz!»'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «¿Qué a nosotros y a ti?». Es un modismo semítico que expresa distanciamiento o protesta hostil.'
    reason: cultural_note
  - marker: c
    text: 'O: «Jesús el Nazareno».'
    reason: alternative_reading
  - marker: d
    text: El plural «nosotros» queda sin especificar en griego y puede referirse solo al demonio hablando representativamente o más ampliamente al ámbito demoníaco.
    reason: alternative_reading
  - marker: e
    text: 'O: «el Santo que pertenece a Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔα
  english_pob_choice: Ah!
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ea!
  - ¡Ay!
  - ¡Déjanos en paz!
  lexicon: BDAG
  rationale: Es una interjección abrupta de alarma o protesta. «¡Ah!» reproduce bien el arranque exclamativo sin añadir una interpretación explicativa que no está en el griego.
- source_word: τί ἡμῖν καὶ σοί
  english_pob_choice: What have you to do with us
  chosen_spanish: ¿Qué tienes que ver con nosotros?
  alternatives_spanish:
  - ¿Qué tenemos nosotros contigo?
  - ¿Qué es eso para nosotros y para ti?
  lexicon: BDAG
  rationale: Es un semitismo de distanciamiento o protesta hostil. La forma española conserva el tono idiomático y la confrontación sin volverlo demasiado literal o arcaico.
- source_word: Ἰησοῦ Ναζαρηνέ
  english_pob_choice: Jesus of Nazareth
  chosen_spanish: Jesús de Nazaret
  alternatives_spanish:
  - Jesús el Nazareno
  lexicon: BDAG
  rationale: Es un vocativo identificador ligado al lugar de procedencia o apelativo. «Jesús de Nazaret» es la forma más natural y claramente reconocible en español.
- source_word: ἦλθες
  english_pob_choice: Have you come
  chosen_spanish: ¿Has venido
  alternatives_spanish:
  - ¿Viniste
  lexicon: BDAG
  rationale: El aoristo en pregunta directa puede verterse de forma idiomática en español con presente perfecto para resaltar la llegada presente y amenazante.
- source_word: ἀπολέσαι
  english_pob_choice: to destroy
  chosen_spanish: a destruir
  alternatives_spanish:
  - a arruinar
  - a aniquilar
  lexicon: BDAG
  rationale: «Destruir» expresa con claridad la fuerza de ἀπόλλυμι en este contexto de confrontación sin cargar el verbo con matices más interpretativos.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nosotros / nos
  alternatives_spanish:
  - nos
  lexicon: BDAG
  rationale: 'Se mantiene el plural indefinido en la forma verbal y pronominal española para conservar la tensión: el texto no especifica si habla solo el demonio, el ámbito demoníaco o una representación más amplia.'
- source_word: οἶδά σε τίς εἶ
  english_pob_choice: I know who you are
  chosen_spanish: Yo sé quién eres
  alternatives_spanish:
  - Sé quién eres
  lexicon: BDAG
  rationale: Es una traducción directa y natural del reconocimiento que hace el demonio, sin amplificación doctrinal ni explicación añadida.
- source_word: ὁ ἅγιος τοῦ θεοῦ
  english_pob_choice: the Holy One of God
  chosen_spanish: el Santo de Dios
  alternatives_spanish:
  - el Santo de Dios, el Santo de Dios de parte de Dios
  - el Santo perteneciente a Dios
  lexicon: BDAG
  rationale: «Santo» preserva la designación cristológica del original y evita resolver de más el título. En español, «el Santo de Dios» mantiene la relación genitiva transparente y la tensión teológica del pasaje.
theological_decisions:
- issue: Plural pronoun ἡμᾶς in demonic speech
  english_pob_reading: Retained simply as 'us' without specifying the referent.
  chosen_spanish_reading: Se mantiene simplemente como «nosotros / nos» sin precisar el referente.
  alternative_spanish_readings:
  - el demonio hablando por el reino demoníaco
  - el demonio hablando también por el hombre poseído
  rationale: El plural griego no define explícitamente su alcance. La versión española conserva esa indeterminación en vez de resolverla interpretativamente.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Christological title ὁ ἅγιος τοῦ θεοῦ
  english_pob_reading: Rendered as 'the Holy One of God' without doctrinal expansion.
  chosen_spanish_reading: Se vierte como «el Santo de Dios» sin expansión doctrinal.
  alternative_spanish_readings:
  - el Santo de Dios
  - el Consagrado de Dios
  rationale: La frase funciona como confesión cristológica importante, pero el versículo no desarrolla su alcance doctrinal. La traducción conserva el título con transparencia al griego y sin añadir lenguaje credal posterior.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del inglés POB: se adoptó «Ah!» para Ἔα y la formulación idiomática «What have you to do with us». También se preservó la indeterminación del plural y el título cristológico sin expansión doctrinal.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «Jesús» para Ἰησοῦς.
  - Se evitó «SEÑOR» porque el texto no contiene κύριος ni una cita directa del nombre divino.
  - Se eligió «Santo» para ὁ ἅγιος, en continuidad con la transparencia del griego y con la decisión inglesa de no explicitar el título más allá del texto.
  - No se usó «Cristo» porque el griego aquí no lo emplea y el título del versículo es «el Santo de Dios».
