    rationale: La nota inglesa para ὁ ἅγιος τοῦ θεοῦ da una alternativa breve ('God's Holy One'). La nota española actual introduce explicación teológica extensa en lugar de preservar de manera limpia la alternativa léxica/documentada.
  - severity: low
