translation:
  language: es
  text: Y levantándose[a], lo echaron fuera de la ciudad y lo llevaron hasta la cresta[b] del monte en que estaba edificada la ciudad de ellos, para arrojarlo abajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «poniéndose de pie». El participio griego puede traducirse con un verbo más neutro, pero aquí se mantiene el impulso narrativo de la escena.
    reason: lexical_alternative
  - marker: b
    text: O «borde» o «reborde» del monte. El término griego ὀφρύς designa la ceja, cresta o arista de una altura.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστάντες
  english_pob_choice: rising up
  chosen_spanish: levantándose
  alternatives_spanish:
  - poniéndose en pie
  - alzándose
  lexicon: BDAG
  rationale: El participio aoristo marca el inicio súbito de la acción; «levantándose» preserva ese movimiento narrativo sin suavizarlo a un mero gesto de ponerse de pie.
- source_word: ἐξέβαλον
  english_pob_choice: drove ... out
  chosen_spanish: lo echaron fuera
  alternatives_spanish:
  - lo expulsaron
  - lo arrojaron fuera
  lexicon: BDAG
  rationale: El verbo expresa expulsión con fuerza hostil. «Echaron fuera» mantiene el empuje del acto en español y evita un matiz eclesiástico excesivo de «expulsaron».
- source_word: πόλεως
  english_pob_choice: town
  chosen_spanish: ciudad
  alternatives_spanish:
  - pueblo
  - villa
  lexicon: BDAG
  rationale: Aunque el contexto puede sonar a poblado pequeño, «ciudad» respeta el sentido básico de πόλις sin forzar una equivalencia más interpretativa; además, el poseedor «su ciudad» refleja el pertenencia local del texto.
- source_word: ἤγαγον
  english_pob_choice: led
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo trajeron
  lexicon: BDAG
  rationale: «Llevaron» conserva el valor amplio de ἄγω sin añadir violencia adicional que el verbo no exige por sí solo.
- source_word: ἕως ὀφρύος τοῦ ὄρους
  english_pob_choice: to the brow of the hill
  chosen_spanish: hasta la cresta del monte
  alternatives_spanish:
  - hasta la cima del monte
  - hasta el borde del monte
  lexicon: BDAG
  rationale: ὀφρύς puede referirse al brow/edge/ridge de una altura. «Cresta» comunica bien la idea topográfica en español y conserva el matiz de arista o reborde sin volverse demasiado literal.
- source_word: ἐφ’ οὗ ἡ πόλις ᾠκοδόμητο αὐτῶν
  english_pob_choice: on which their town had been built
  chosen_spanish: en que estaba edificada su ciudad
  alternatives_spanish:
  - sobre el cual estaba construida su ciudad
  - donde se había edificado su ciudad
  lexicon: BDAG
  rationale: El pasivo pluscuamperfecto se expresa naturalmente con «estaba edificada». «Su ciudad» preserva el genitivo posesivo y la relación de pertenencia del lugar.
- source_word: ὥστε κατακρημνίσαι αὐτόν
  english_pob_choice: so as to throw him down
  chosen_spanish: para arrojarlo
  alternatives_spanish:
  - para hacerlo precipitar
  - para tirarlo al vacío
  lexicon: BDAG
  rationale: El infinitivo final indica intención; en español, el complemento implícito de caída desde un desnivel queda ya sugerido por «cresta del monte». He evitado especificar «precipicio» o «peñasco» porque el griego no lo nombra explícitamente.
theological_decisions:
- issue: Nivel de violencia y resultado pretendido
  english_pob_reading: Render the verbs in a way that shows hostile intent without adding details not explicit in the Greek.
  chosen_spanish_reading: Mostrar la violencia hostil con los verbos mismos, sin añadir que el lugar era un precipicio o que se trataba explícitamente de un intento de asesinato.
  alternative_spanish_readings:
  - «para arrojarlo al precipicio»
  - «con la intención de matarlo»
  rationale: El griego deja ver un intento mortal, pero lo hace por la secuencia verbal y el infinitivo final. La traducción conserva esa tensión sin explicitar más de lo que dice el texto.
  doctrine_reference: 'Principio POB: no paraphrase beyond what the source text warrants; preserve tension rather than resolving it.'
translation_notes:
  revision_awareness: El borrador en inglés pasó de «edge of the hill» a «brow of the hill» para ajustarse mejor a ὀφρύς y eliminar una adición no explícita («the cliff»). En español, la opción «cresta» busca conservar ese mismo ajuste léxico sin introducir un término más fuerte que el griego. También se mantuvo la finalidad del infinitivo final sin explicitar más violencia que la del original.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra convención de máscara porque no hay κύριος aquí.
  - Se prefirió «ciudad» sobre «pueblo» para seguir el valor básico de πόλις; la cercanía contextual no exige reducirlo.
  - No se tradujo con lenguaje tradicional de expulsión demoníaca; ἐξέβαλον describe la acción hostil literal contra Jesús.
  - 'La frase final queda deliberadamente abierta: el español sugiere la caída desde altura, pero no añade el sustantivo «precipicio» que el griego no usa.'
