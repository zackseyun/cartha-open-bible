  source_alignment_summary: 'El borrador sigue en gran parte el sentido del griego: movimiento súbito de la multitud, expulsión fuera de la población, conducción hasta el borde elevado del monte y propósito de arrojar a Jesús hacia abajo. Sin embargo, hay un error grave de texto con la intrusión de «вниз», y además «para arrojarlo» queda incompleto en español para representar κατακρημνίσαι αὐτόν; conviene explicitar «abajo» sin añadir «precipicio», que no aparece en griego. También puede mejorarse «su ciudad» a «la ciudad de ellos» para reflejar mejor αὐτῶν, aunque no es un error mayor.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero el préstamo accidental en cirílico rompe totalmente la legibilidad. «Cresta del monte» es posible, aunque algo menos natural que «borde» o «ceja»; con la nota puede mantenerse. «Levantándose» y «lo echaron fuera» son naturales. La frase final necesita reparación para sonar idiomática y completa en español.
  glossary_alignment: 'No hay términos teológicos de proyecto especialmente controvertidos en este versículo. Las decisiones léxicas principales son mayormente coherentes con el rastro POB: ἀναστάντες -> «levantándose»; ἐξέβαλον -> «echaron fuera»; ἤγαγον -> «llevaron». Para ὀφρύς, «cresta» es defendible con nota. Para κατακρημνίσαι, la mejor alineación con el inglés auditado y con el griego es «arrojarlo abajo», evitando añadir «precipicio» o «despeñarlo» como texto principal.'
  issues:
  - severity: high
    issue: El texto principal contiene la palabra ajena «вниз».
    rationale: Es un error evidente de copia/mezcla lingüística y hace que el borrador no sea publicable.
  - severity: high
    issue: La cláusula final «para arrojarlo» no expresa plenamente el sentido de κατακρημνίσαι.
    rationale: El verbo griego implica arrojar desde una altura hacia abajo; en español «arrojarlo» solo queda truncado o ambiguo. «Arrojarlo abajo» preserva el sentido sin añadir un precipicio no explícito.
  - severity: medium
    issue: «Su ciudad» para αὐτῶν suena menos preciso que «la ciudad de ellos».
    rationale: «Su ciudad» puede entenderse como posesión singular de Jesús o de otro referente cercano; «la ciudad de ellos» refleja mejor la pertenencia local de los habitantes.
