translation:
  language: es
  text: Y inclinándose sobre ella[a], reprendió la fiebre, y la dejó. Al instante se levantó y se puso a servirles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fiebre la dejó». El griego presenta explícitamente a la fiebre como la realidad reprendida y el sujeto implícito que se aparta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστὰς
  english_pob_choice: standing over
  chosen_spanish: estando sobre
  alternatives_spanish:
  - habiéndose puesto sobre
  - poniéndose sobre
  lexicon: BDAG
  rationale: El participio aoristo describe la postura física de Jesús junto a la mujer. «Estando sobre» conserva la escena concreta con un español natural y no sobreinterpreta la acción.
- source_word: ἐπάνω αὐτῆς
  english_pob_choice: over her
  chosen_spanish: sobre ella
  alternatives_spanish:
  - encima de ella
  - por encima de ella
  lexicon: BDAG
  rationale: La preposición refuerza la proximidad y la posición. «Sobre ella» es idiomático en español y mantiene la relación espacial sin añadir detalle interpretativo.
- source_word: ἐπετίμησεν
  english_pob_choice: rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - recriminó
  - mandó con firmeza
  lexicon: BDAG
  rationale: ἐπιτιμάω en contextos de sanidad y liberación expresa una reprensión o amonestación enérgica. «Reprendió» preserva ese tono de autoridad; «reprender» es el equivalente más natural y fiel en español.
- source_word: τῷ πυρετῷ
  english_pob_choice: the fever
  chosen_spanish: la fiebre
  alternatives_spanish:
  - la fiebre de ella
  - su fiebre
  lexicon: BDAG
  rationale: El griego presenta la fiebre como el objeto directo del reproche. «La fiebre» conserva esa formulación directa y evita suavizar la construcción hacia una expresión posesiva que no está en el texto.
- source_word: ἀφῆκεν αὐτήν
  english_pob_choice: it left her
  chosen_spanish: ésta la dejó
  alternatives_spanish:
  - la fiebre la dejó
  - se apartó de ella
  lexicon: BDAG
  rationale: El sujeto implícito es la fiebre. «Ésta la dejó» mantiene la referencia al antecedente inmediato y la brevedad del resultado sin forzar una explicitación innecesaria.
- source_word: παραχρῆμα
  english_pob_choice: Immediately
  chosen_spanish: Al instante
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: La adverbio enfatiza la rapidez del restablecimiento. «Al instante» es claro en español y conserva bien el matiz de inmediatez.
- source_word: ἀναστᾶσα
  english_pob_choice: she got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - levantándose
  lexicon: BDAG
  rationale: El participio señala la reacción inmediata tras la sanidad. «Se levantó» es natural en español y comunica el movimiento sin añadir matices innecesarios.
- source_word: διηκόνει
  english_pob_choice: began serving
  chosen_spanish: se puso a servirles
  alternatives_spanish:
  - sirvió
  - estuvo sirviéndoles
  - comenzó a servirles
  lexicon: BDAG
  rationale: El imperfecto puede comunicar acción en curso o iniciada en respuesta al milagro. «Se puso a servirles» refleja bien el inicio de la acción y evita la ambigüedad más eclesiástica de «ministrar».
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo plural se expresa naturalmente con «les» en español cuando el verbo lo permite. Mantiene la referencia al grupo presente sin recargar la sintaxis.
theological_decisions:
- issue: Si la reprensión de Jesús a la fiebre debe explicarse como personificación o como causa demoníaca
  english_pob_reading: Retain the literal wording 'rebuked the fever' without adding explanation
  chosen_spanish_reading: Mantener «reprendió la fiebre» sin explicar más
  alternative_spanish_readings:
  - reprendió la enfermedad
  - le habló con dureza a la fiebre
  rationale: El griego dice directamente que Jesús reprendió a la fiebre. La traducción conserva esa formulación literal para preservar la autoridad de Jesús y la tensión teológica del pasaje sin resolverla en una dirección que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: la nota al pie [a] ahora aparece anclada en el texto principal junto a la frase correspondiente. No hay otros cambios sustantivos respecto del último pase de revisión, y se mantiene la lectura literal de la reprensión a la fiebre.'
  spanish_consistency_notes:
  - Se mantuvo «fiebre» como sustantivo principal para reflejar τῷ πυρετῷ sin posesivizarlo.
  - «Se puso a servirles» conserva el valor aspectual del imperfecto y su inicio contextual tras la sanidad.
  - Se evitó «SEÑOR» u otra terminología de sustitución porque este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
