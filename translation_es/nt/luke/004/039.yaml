revisions:
- from: Y estando sobre ella[a], reprendió la fiebre, y ésta la dejó. Al instante se levantó y se puso a servirles.
  to: Y inclinándose sobre ella[a], reprendió la fiebre, y la dejó. Al instante se levantó y se puso a servirles.
  rationale: Se revisa la primera frase para lograr un español natural y ampliamente legible, manteniendo la escena concreta de Jesús sobre la mujer. «Inclinándose sobre ella» preserva mejor que «estando sobre ella» la proximidad física sin sugerir una postura extraña. También se simplifica «ésta la dejó» a «la dejó», ya que el sujeto implícito sigue siendo la fiebre y la nota conserva la alternativa explícita.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:48:48Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro de auditoría inglés en casi todos los puntos: mantiene la construcción literal «reprendió la fiebre», conserva la salida de la fiebre como sujeto implícito, expresa la inmediatez y refleja el valor inceptivo/continuo de διηκόνει con «se puso a servirles».'
  spanish_quality_summary: La principal debilidad es de naturalidad y precisión idiomática en «estando sobre ella», que en español suena torpe o físicamente extraña. Además, el pronombre demostrativo «ésta» resulta innecesariamente marcado. Una redacción más natural y fiel es «poniéndose de pie junto a ella» o similar; sin embargo, para no añadir demasiado, «poniéndose sobre ella» tampoco suena bien. La mejor reparación mínima es «parándose junto a ella» no refleja ἐπάνω. Por tanto conviene una reformulación breve que preserve la idea de posición sobre la mujer sin sonar antinatural.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la consistencia con ἐπιτιμάω -> «reprendió», que está bien. La decisión teológica de no explicar la personificación de la fiebre está correctamente preservada.
  issues:
  - severity: medium
    issue: «estando sobre ella» suena poco natural y puede sugerir una postura corporal extraña
    rationale: ἐπιστὰς ἐπάνω αὐτῆς describe la posición de Jesús respecto de la mujer, pero en español «estar sobre alguien» suele sonar demasiado físico o ambiguo. Se necesita una formulación idiomática que conserve la cercanía y superioridad posicional sin crear una imagen impropia.
  - severity: low
    issue: «ésta la dejó» es gramatical, pero estilísticamente marcado
    rationale: El español bíblico moderno suena más claro con «la dejó» o «la fiebre la dejó». Dado que el matiz alternativo ya se conserva en nota, no hace falta el demostrativo enfático.
  revised_spanish_text: Y inclinándose sobre ella[a], reprendió la fiebre, y la dejó. Al instante se levantó y se puso a servirles.
  revised_footnotes:
  - marker: a
    text: O «la fiebre la dejó». El griego presenta explícitamente a la fiebre como la realidad reprendida y el sujeto implícito que se aparta.
    reason: lexical_alternative
  revision_rationale: Se revisa la primera frase para lograr un español natural y ampliamente legible, manteniendo la escena concreta de Jesús sobre la mujer. «Inclinándose sobre ella» preserva mejor que «estando sobre ella» la proximidad física sin sugerir una postura extraña. También se simplifica «ésta la dejó» a «la dejó», ya que el sujeto implícito sigue siendo la fiebre y la nota conserva la alternativa explícita.
