translation:
  language: es
  text: Y, después de llevarlo arriba, le mostró todos los reinos[a] del mundo habitado en un instante de tiempo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘del mundo’. El término griego suele significar ‘el mundo habitado’ y, en algunos contextos, puede referirse más específicamente al mundo civilizado o imperial.
    reason: lexical_alternative
  - marker: b
    text: O ‘en un instante’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναγαγὼν
  english_pob_choice: after leading him up
  chosen_spanish: Y lo llevó arriba
  alternatives_spanish:
  - Y después de llevarlo arriba
  - Y lo condujo arriba
  lexicon: BDAG
  rationale: El participio aoristo expresa acción previa y movimiento ascendente. En español, ‘lo llevó arriba’ conserva la direccionalidad sin añadir el lugar específico (como ‘monte’) que no aparece en Lucas.
- source_word: ἔδειξεν
  english_pob_choice: he showed
  chosen_spanish: le mostró
  alternatives_spanish:
  - le enseñó
  - le señaló
  lexicon: BDAG
  rationale: ‘Mostrar’ reproduce el sentido narrativo ordinario de δείκνυμι y encaja naturalmente con el objeto directo y el dativo indirecto.
- source_word: πάσας τὰς βασιλείας
  english_pob_choice: all the kingdoms
  chosen_spanish: todos los reinos
  alternatives_spanish:
  - todos los dominios
  - todas las realeza
  lexicon: BDAG
  rationale: βασιλεία aquí designa reinos o dominios políticos; ‘reinos’ es la equivalencia más clara y directa en español.
- source_word: τῆς οἰκουμένης
  english_pob_choice: of the inhabited world
  chosen_spanish: de la tierra habitada
  alternatives_spanish:
  - del mundo habitado
  - del mundo
  - del imperio
  lexicon: BDAG
  rationale: οἰκουμένη suele significar ‘la tierra habitada’ y a veces puede insinuar el mundo civilizado o imperial. ‘Tierra habitada’ preserva esa especificidad sin reducirlo indebidamente a ‘imperio’.
- source_word: ἐν στιγμῇ χρόνου
  english_pob_choice: in a moment of time
  chosen_spanish: en un instante de tiempo
  alternatives_spanish:
  - en un momento de tiempo
  - en un instante
  lexicon: BDAG
  rationale: La combinación στιγμή + χρόνου intensifica la brevísima duración. ‘En un instante de tiempo’ refleja bien la forma griega y mantiene el énfasis temporal.
theological_decisions:
- issue: Naturaleza de la visión o del acto de mostrar
  english_pob_reading: Render the event descriptively without specifying whether the showing was visionary, supernatural, or from a literal geographic vantage point.
  chosen_spanish_reading: Traducir el hecho de manera descriptiva, sin precisar si fue una visión, un acto sobrenatural o una perspectiva geográfica literal.
  alternative_spanish_readings:
  - Una visión de todos los reinos
  - Una vista literal desde un lugar alto
  rationale: El griego dice únicamente que ‘le mostró’ todos los reinos en un instante; la traducción debe conservar esa afirmación sin resolver el mecanismo narrativo.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de origen; la redacción sigue de cerca el texto griego y el auditable inglés POB, manteniendo la misma decisión léxica principal para οἰκουμένη y la misma ambigüedad teológica sobre el modo del ‘mostrar’.
  spanish_consistency_notes:
  - Se mantiene ‘reinos’ para βασιλείας en lugar de términos eclesiásticos o abstractos.
  - ‘Tierra habitada’ conserva la especificidad de οἰκουμένη y evita homogeneizarla como ‘mundo’ sin nota.
  - ‘Instante’ refleja la brevedad extrema de στιγμή y permite una nota alternativa equivalente.
  - No se introduce ‘monte’ ni otro detalle procedente de paralelos sinópticos que no están en Lucas 4:5.
