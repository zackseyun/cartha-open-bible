  rationale: Se conserva el sentido exacto del griego y la decisión teológica de no expandir el cumplimiento, pero se reemplaza el literalismo poco natural del modismo por una expresión española clara y digna en el texto principal, dejando el literal en nota. También se corrige el registro hacia un español neutral con «ustedes».
