review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura de la cita y la mayoría del sentido griego: coordinación con «y», imagen de las manos, futuro de protección, y la advertencia negativa. Sin embargo, hay un desajuste importante en la colocación de las notas: la nota [a] está anclada en «y», pero su contenido alterna el verbo «te alzarán», que corresponde a ἀροῦσίν σε, no a καὶ. Además, la nota [b] está anclada en «te llevarán», pero su contenido alterna la cláusula de «golpees tu pie», que corresponde a προσκόψῃς… τὸν πόδα σου. También conviene explicitar «tu pie» en el texto principal, ya que el griego lo incluye y el inglés POB lo mantiene.'
  spanish_quality_summary: El español es generalmente claro y digno. «Sobre sus manos te llevarán» es inteligible, aunque algo literal; sigue siendo aceptable por tratarse de una cita poética. La cláusula «para que no tropieces contra una piedra» suena natural, pero omite «tu pie», presente en el griego, y la puntuación «y[a]:» es torpe por la nota mal anclada. Reordenando las notas y restaurando «tu pie», el texto queda más fiel y más limpio.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto en este versículo. Las decisiones léxicas principales son aceptables: καὶ -> «y», ἀροῦσίν -> «te llevarán», μήποτε -> «para que no», πρὸς λίθον -> «contra una piedra». La mejoría necesaria es de fidelidad detallada y aparato de notas, no de glosario teológico.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a palabras/frases incorrectas.
    rationale: La nota [a] ofrece la alternativa «te alzarán», que corresponde al verbo ἀροῦσίν, no a «y». La nota [b] ofrece la alternativa de «golpees tu pie», que corresponde a la cláusula final, no a «te llevarán». Esto rompe la trazabilidad del aparato crítico.
  - severity: medium
    issue: El texto principal omite «tu pie».
    rationale: El griego tiene τὸν πόδα σου y el inglés POB mantiene «your foot». En español también debe preservarse para reflejar plenamente la imagen corporal del original.
  - severity: low
    issue: La puntuación inicial resulta poco natural por la nota mal ubicada.
    rationale: «y[a]:» dificulta la lectura y no representa adecuadamente la función de ὅτι como simple continuación de la cita.
  revised_spanish_text: 'y: «Sobre sus manos te llevarán[a], para que no tropieces contra una piedra tu pie[b]»'
  revised_footnotes:
