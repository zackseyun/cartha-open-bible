translation:
  language: es
  text: 'y: «Sobre sus manos te llevarán[a], para que no tropieces contra una piedra tu pie[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te alzarán».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que no golpees tu pie contra una piedra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conserva la coordinación simple que enlaza esta cita con el versículo anterior; en español, 'y' es la continuación natural y fiel.
- source_word: ὅτι
  english_pob_choice: ‘
  chosen_spanish: marcación de cita con dos puntos implícita dentro de la comilla
  alternatives_spanish:
  - que
  - pues
  lexicon: BDAG
  rationale: Aquí introduce el contenido citado, no una proposición subordinada independiente. En español se refleja mejor iniciando la cita sin traducirlo de manera explícita.
- source_word: Ἐπὶ χειρῶν
  english_pob_choice: On their hands
  chosen_spanish: Sobre sus manos
  alternatives_spanish:
  - En sus manos
  - Sobre las manos de ellos
  lexicon: BDAG
  rationale: '''Sobre sus manos'' mantiene la imagen de soporte y elevación sin introducir una expresión menos natural. ''Sus'' conserva el referente plural implícito en el contexto de los ángeles.'
- source_word: ἀροῦσίν σε
  english_pob_choice: they will carry you
  chosen_spanish: te llevarán
  alternatives_spanish:
  - te sostendrán
  - te alzarán
  lexicon: BDAG
  rationale: El futuro de αἴρω aquí expresa llevar/cargar para proteger. 'Te llevarán' es claro, natural y preserva el sentido de traslado sostenido; 'sostendrán' o 'alzarán' son posibles pero menos directos.
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: BDAG
  rationale: En español, 'para que no' expresa bien la finalidad preventiva del griego en una cláusula subordinada de resultado/precaución, con estilo más natural que un calco como 'no sea que'.
- source_word: προσκόψῃς
  english_pob_choice: you strike
  chosen_spanish: tropieces
  alternatives_spanish:
  - golpees
  - choques
  lexicon: BDAG
  rationale: En este contexto con 'piedra' y 'pie', el verbo apunta a tropezar o golpearse con un obstáculo. 'Tropieces' comunica la imagen de forma idiomática en español sin perder la advertencia.
- source_word: πρὸς λίθον
  english_pob_choice: against a stone
  chosen_spanish: contra una piedra
  alternatives_spanish:
  - con una piedra
  - sobre una piedra
  lexicon: BDAG
  rationale: '''Contra una piedra'' reproduce bien la fuerza de πρός con el verbo de choque/impacto y suena natural en español.'
- source_word: τὸν πόδα σου
  english_pob_choice: your foot
  chosen_spanish: tu pie
  alternatives_spanish:
  - tu planta
  - tu pie mismo
  lexicon: BDAG
  rationale: El griego usa singular, y 'tu pie' lo conserva de manera directa y clara. 'Pie' es la forma normal en español para esta parte del cuerpo en este giro.
theological_decisions:
- issue: Cómo reflejar la cita protectora del Salmo sin suavizar la imagen corporal
  english_pob_reading: Use the Psalm citation in a straightforward modern form that preserves angelic protection and the warning against striking the foot.
  chosen_spanish_reading: Mantener la imagen concreta de ser llevado por manos y la advertencia de no tropezar contra una piedra.
  alternative_spanish_readings:
  - suavizar a 'te cuidarán'
  - usar una formulación más tradicional como 'te sostendrán'
  rationale: La cita funciona como una promesa de protección física dentro de la tentación. 'Te llevarán' y 'contra una piedra' preservan la imaginería corporal y el paralelo con el texto fuente; no se diluye en una paráfrasis más abstracta.
  doctrine_reference: Salmo 91:12 citado en el contexto de la tentación de Jesús; fidelidad a la imaginería de protección providencial
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene dos alternativas léxicas relevantes: ἀροῦσίν σε como ''carry/bear up'' y προσκόψῃς como ''strike/dash''. La versión española conserva esa tensión con ''te llevarán'' y ''tropieces'', evitando una paráfrasis excesiva pero usando un español natural y publicable.'
  spanish_consistency_notes:
  - Se mantiene 'piedra' en singular, como en el griego.
  - Se usa 'sus manos' para reflejar el plural implícito del texto citado sin añadir precisión no presente en el verso.
  - La cita está presentada con puntuación española y comillas de estilo publicable.
  - No se emplea 'SEÑOR' ni otro sustituto porque este verso no contiene el nombre divino explícito.
