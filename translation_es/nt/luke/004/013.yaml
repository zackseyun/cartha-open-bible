translation:
  language: es
  text: Y después de que el diablo hubo terminado toda tentación[a], se apartó de él hasta un tiempo oportuno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda prueba». El término griego puede significar «tentación» o «prueba»; aquí «tentación» resulta más natural por la acción del diablo en el contexto inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: συντελέσας
  english_pob_choice: after finishing
  chosen_spanish: después de haber terminado
  alternatives_spanish:
  - habiendo terminado
  - después de completar
  lexicon: BDAG
  rationale: El participio aoristo expresa anterioridad respecto del verbo principal. «Después de haber terminado» conserva esa relación temporal de forma natural en español, sin volver la frase demasiado rígida.
- source_word: πάντα πειρασμόν
  english_pob_choice: every temptation
  chosen_spanish: toda tentación
  alternatives_spanish:
  - toda prueba
  - cada tentación
  - toda prueba y tentación
  lexicon: BDAG
  rationale: En este contexto narrativo el agente es el diablo y la escena describe incitación al mal; por eso «tentación» es la opción principal. «Toda» refleja bien el valor distributivo/comprehensivo de πᾶς con un sustantivo singular en español.
- source_word: διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el calumniador
  lexicon: BDAG
  rationale: Se trata del adversario personal de la narración, no de un mero título descriptivo. «El diablo» es la equivalencia clara y precisa en español.
- source_word: ἀπέστη ἀπ’ αὐτοῦ
  english_pob_choice: departed from him
  chosen_spanish: se apartó de él
  alternatives_spanish:
  - se retiró de él
  - lo dejó
  lexicon: BDAG
  rationale: El verbo comunica alejamiento o retirada. «Se apartó de él» mantiene el matiz formal del alejamiento y suena natural en registro bíblico en español.
- source_word: ἄχρι καιροῦ
  english_pob_choice: until an opportune time
  chosen_spanish: hasta un tiempo oportuno
  alternatives_spanish:
  - hasta el momento oportuno
  - hasta una ocasión propicia
  - hasta un tiempo
  lexicon: BDAG
  rationale: καιρός apunta a un tiempo adecuado, señalado u oportuno, no solo a tiempo cronológico. «Un tiempo oportuno» conserva la idea de una retirada temporal y estratégica del diablo.
theological_decisions:
- issue: Sentido de πειρασμός en este versículo
  english_pob_reading: temptation
  chosen_spanish_reading: tentación
  alternative_spanish_readings:
  - prueba
  - testing
  - prueba o tentación
  rationale: Aunque πειρασμός puede significar «prueba» o «tentación», aquí el contexto inmediato es la acción del diablo y las propuestas para apartar a Jesús de la obediencia. Por eso el texto principal usa «tentación», mientras que la ambigüedad semántica queda preservada en la nota.
  doctrine_reference: Translation philosophy §3 (preservar tensiones léxicas reales cuando existen)
- issue: Temporalidad estratégica de ἄχρι καιροῦ
  english_pob_reading: until an opportune time
  chosen_spanish_reading: hasta un tiempo oportuno
  alternative_spanish_readings:
  - hasta el tiempo señalado
  - hasta el momento adecuado
  - por una temporada
  rationale: La frase sugiere que la retirada del diablo no fue definitiva sino táctica. «Un tiempo oportuno» mantiene esa lectura sin convertir la expresión en una paráfrasis excesiva.
  doctrine_reference: Translation philosophy §3 (mantener matices semánticos del original)
translation_notes:
  revision_awareness: Se siguió el pasaje fuente griego SBLGNT y el criterio auditado de la POB en inglés. No se introdujeron cambios de sentido respecto del texto base; solo se ajustó la formulación al español natural manteniendo la ambigüedad léxica documentada en πειρασμός.
  spanish_consistency_notes:
  - Se usó «diablo» de manera consistente para διάβολος, conforme al audit trail en inglés.
  - Se eligió «tentación» en el texto principal y se preservó la alternativa «prueba» en nota para reflejar la tensión léxica de πειρασμός.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, porque el versículo no contiene el nombre divino.
  - «Un tiempo oportuno» traduce ἄχρι καιροῦ sin neutralizar el matiz estratégico de καιρός.
