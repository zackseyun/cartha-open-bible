    text: 'También: «lo retenían» o «trataban de impedir que se fuera». El verbo griego sugiere un intento de evitar su partida, no necesariamente sujetarlo físicamente.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar fidelidad idiomática al griego y claridad en español: «llegaron hasta él» expresa mejor la llegada a su ubicación, y «para que no se alejara de ellos» evita un calco extraño mientras conserva la idea de impedir su partida. También se afinó la nota [b] para reflejar con más precisión el valor de κατεῖχον en contexto.'
