translation:
  language: es
  text: Y cuando llegó el día, salió y se fue a un lugar desierto. Y las multitudes lo buscaban[a], y llegaron hasta él, y trataban de detenerlo[b] para que no se alejara de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «lo buscaban con insistencia» o «seguían buscándolo». El imperfecto griego subraya una búsqueda continua.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «lo retenían» o «trataban de impedir que se fuera». El verbo griego sugiere un intento de evitar su partida, no necesariamente sujetarlo físicamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Γενομένης δὲ ἡμέρας
  english_pob_choice: And when day came
  chosen_spanish: Y cuando llegó el día
  alternatives_spanish:
  - Y cuando amaneció
  - Al llegar el día
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto marca un cambio temporal. «Llegó el día» expresa ese giro de forma natural en español sin perder la idea de transición temporal.
- source_word: ἐξελθὼν
  english_pob_choice: he went out
  chosen_spanish: salió
  alternatives_spanish:
  - habiendo salido
  - después de salir
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y se expresa de manera directa con «salió», que conserva la acción previa sin rigidez sintáctica.
- source_word: ἐπορεύθη
  english_pob_choice: he went
  chosen_spanish: se fue
  alternatives_spanish:
  - fue
  - partió
  lexicon: BDAG
  rationale: El verbo πορεύομαι puede significar ir o desplazarse. «Se fue» mantiene el movimiento y evita redundancia excesiva con «salió», aunque no introduce una connotación más fuerte que la del griego.
- source_word: εἰς ἔρημον τόπον
  english_pob_choice: to a deserted place
  chosen_spanish: a un lugar desierto
  alternatives_spanish:
  - a un lugar solitario
  - a un lugar apartado
  - a un lugar deshabitado
  lexicon: BDAG
  rationale: ἔρημος aquí describe un sitio aislado o sin gente. «Lugar desierto» es natural en español y preserva la idea de un sitio vacío o apartado sin forzar la imagen de «desierto» como región geográfica.
- source_word: οἱ ὄχλοι
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las muchedumbres
  - la gente
  lexicon: BDAG
  rationale: ὄχλοι designa grupos numerosos de personas. «Multitudes» refleja bien el plural y el carácter colectivo; en este contexto es más solemne que «la gente».
- source_word: ἐπεζήτουν
  english_pob_choice: were seeking
  chosen_spanish: lo buscaban
  alternatives_spanish:
  - lo seguían buscando
  - lo andaban buscando
  lexicon: BDAG
  rationale: El imperfecto indica acción շարունակada. «Lo buscaban» comunica la continuidad de manera clara y fluida en español; «buscar» es suficiente aquí y no exige un giro más perifrástico.
- source_word: ἦλθον ἕως αὐτοῦ
  english_pob_choice: they came to him
  chosen_spanish: fueron hasta él
  alternatives_spanish:
  - llegaron hasta él
  - vinieron hasta él
  lexicon: BDAG
  rationale: La frase indica que alcanzaron su ubicación. «Fueron hasta él» mantiene la idea de llegar a su presencia con naturalidad narrativa.
- source_word: κατεῖχον αὐτὸν
  english_pob_choice: were trying to keep him
  chosen_spanish: trataban de detenerlo
  alternatives_spanish:
  - lo retenían
  - querían impedirle que se fuera
  lexicon: BDAG
  rationale: κατέχω puede expresar retener, impedir o sujetar. En este contexto la acción es impedir la partida; «trataban de detenerlo» comunica la fuerza imperfectiva y la intención de frenar su salida sin exagerar una sujeción física.
- source_word: τοῦ μὴ πορεύεσθαι ἀπ’ αὐτῶν
  english_pob_choice: from going away from them
  chosen_spanish: para que no se fuera de ellos
  alternatives_spanish:
  - para que no se alejara de ellos
  - para impedir que se fuera de ellos
  lexicon: BDAG
  rationale: El infinitivo articular con μή expresa finalidad de prevención. «Para que no se fuera de ellos» reproduce la intención negativa de forma idiomática y clara; «de ellos» conserva la relación de separación implícita en ἀπό.
translation_notes:
  revision_awareness: 'Se siguió el último paso de revisión del contexto inglés: se mantuvo una traducción directa y sobria de ἐπορεύθη con un verbo simple de movimiento, se reflejó καὶ con «Y» en lugar de oposición, y se conservó el matiz imperfectivo de los verbos de búsqueda e impedimento. También se evitó mecanizar el inglés, volviendo al griego para la relación temporal de genitivo absoluto y para el valor de prevención en el infinitivo con μή.'
  spanish_consistency_notes:
  - Se usó «Y» inicial para coordinar las cláusulas como en el griego.
  - «Lugar desierto» sigue el valor de ἔρημος como sitio aislado, no como referencia obligatoria al desierto geográfico.
  - Se mantuvo un registro sobrio y bíblico, pero con español actual y legible.
  - Las notas a y b preservan las alternativas léxicas documentadas en el audit trail inglés.
