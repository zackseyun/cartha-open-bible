revisions:
- from: Y cuando llegó el día, salió y se fue a un lugar desierto. Y las multitudes lo buscaban[a], y fueron hasta él, y trataban de detenerlo[b] para que no se fuera de ellos.
  to: Y cuando llegó el día, salió y se fue a un lugar desierto. Y las multitudes lo buscaban[a], y llegaron hasta él, y trataban de detenerlo[b] para que no se alejara de ellos.
  rationale: 'Se hicieron ajustes menores para mejorar fidelidad idiomática al griego y claridad en español: «llegaron hasta él» expresa mejor la llegada a su ubicación, y «para que no se alejara de ellos» evita un calco extraño mientras conserva la idea de impedir su partida. También se afinó la nota [b] para reflejar con más precisión el valor de κατεῖχον en contexto.'
