review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido general del griego: transición temporal, salida a un lugar aislado, búsqueda de las multitudes, llegada hasta Jesús e intento de impedir su partida. Sin embargo, dos giros no reflejan de la mejor manera el texto fuente ni la auditoría inglesa: «fueron hasta él» suena menos natural que «llegaron hasta él»/«vinieron a él» para ἦλθον ἕως αὐτοῦ, y sobre todo «para que no se fuera de ellos» es poco idiomático en español y calca innecesariamente la estructura griega; el sentido es «para que no se alejara de ellos» o «para impedir que los dejara».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero hay leves asperezas. «Lugar desierto» funciona, aunque «apartado» también sería posible; «las multitudes» es aceptable en registro bíblico. La principal mejora de legibilidad está en el cierre: «detenerlo para que no se alejara de ellos» comunica con más naturalidad la prevención de su partida sin sonar extraño. También conviene ajustar la nota [b], porque en inglés la alternativa «were holding him back / were detaining him» corresponde a κατεῖχον, no a ἐπεζήτουν.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son compatibles con el POB. La excepción relevante es documental: la nota al pie [b] está bien anclada en el verbo de retención, pero el English POB audit trail asignó por error la nota b a «were seeking him»; el español debe seguir el sentido documentado del verbo κατεῖχον más que el anclaje erróneo de la nota inglesa. No se requieren cambios de glosario teológico.'
  issues:
  - severity: medium
    issue: «para que no se fuera de ellos» es poco idiomático
    rationale: Aunque reproduce ἀπ’ αὐτῶν de forma formal, en español suena forzado. El sentido contextual es impedir que Jesús se alejara o se fuera de su lado.
  - severity: low
    issue: «fueron hasta él» es menos natural para ἦλθον ἕως αὐτοῦ
    rationale: El griego expresa llegada hasta donde él estaba. «Llegaron hasta él» suena más natural en español narrativo sin pérdida semántica.
  - severity: low
    issue: La nota [b] necesita formularse con mayor precisión contextual
    rationale: Debe resaltar que la idea es impedir su partida, no solo ofrecer sinónimos de detención. Así se alinea mejor con κατεῖχον αὐτὸν τοῦ μὴ πορεύεσθαι ἀπ’ αὐτῶν.
  revised_spanish_text: Y cuando llegó el día, salió y se fue a un lugar desierto. Y las multitudes lo buscaban[a], y llegaron hasta él, y trataban de detenerlo[b] para que no se alejara de ellos.
