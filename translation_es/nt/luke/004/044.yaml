translation:
  language: es
  text: Y estaba predicando en las sinagogas de Judea[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «Galilea» en lugar de «Judea». El texto principal sigue la lectura «Judea» del griego usado aquí.
    reason: textual_variant
lexical_decisions:
- source_word: ἦν κηρύσσων
  english_pob_choice: was preaching
  chosen_spanish: estaba predicando
  alternatives_spanish:
  - seguía predicando
  - estaba proclamando
  lexicon: BDAG
  rationale: El imperfecto perifrástico expresa acción continuada en pasado. En español, «estaba predicando» preserva ese aspecto de manera natural y refleja bien el contexto público de la sinagoga.
- source_word: κηρύσσων
  english_pob_choice: preaching
  chosen_spanish: predicando
  alternatives_spanish:
  - proclamando
  - heraldo
  lexicon: BDAG
  rationale: κηρύσσω denota proclamación pública. «Predicando» es la opción más idiomática y clara en español para el contexto sinagogal, sin perder la fuerza de anuncio público.
- source_word: εἰς τὰς συναγωγάς
  english_pob_choice: in the synagogues
  chosen_spanish: en las sinagogas
  alternatives_spanish:
  - hacia las sinagogas
  - por las sinagogas
  lexicon: BDAG
  rationale: Aunque εἰς suele significar «en/para dentro de», con verbos de actividad puede funcionar idiomáticamente como ubicación o esfera. En español, «en las sinagogas» transmite mejor el lugar de su ministerio que una traducción más literal de movimiento.
- source_word: συναγωγάς
  english_pob_choice: synagogues
  chosen_spanish: sinagogas
  alternatives_spanish:
  - asambleas
  - casas de reunión
  lexicon: BDAG
  rationale: En este contexto se refiere a las sinagogas judías como lugar de reunión y enseñanza. «Sinagogas» es el equivalente estándar y transparente en español.
- source_word: Ἰουδαίας
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - Galilea
  - la tierra de Judea
  lexicon: BDAG
  rationale: Ἰουδαία normalmente designa Judea. Aunque el contexto inmediato puede sugerir tensión narrativa y algunos manuscritos leen «Galilea», el texto griego base aquí dice «Judea», y la traducción lo conserva sin armonizar.
theological_decisions:
- issue: Lectura geográfica de τῆς Ἰουδαίας frente al contexto narrativo cercano
  english_pob_reading: Judea
  chosen_spanish_reading: Judea
  alternative_spanish_readings:
  - Galilea (armonización con el contexto o tradición manuscrita)
  - Judea en sentido amplio del territorio judío
  rationale: La prioridad del texto fuente exige mantener la lectura atestiguada en el griego base. La tensión con el contexto no se resuelve en la traducción; se conserva para que el lector vea la variante textual o el problema narrativo.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Valor aspectual del imperfecto perifrástico ἦν κηρύσσων
  english_pob_reading: was preaching
  chosen_spanish_reading: estaba predicando
  alternative_spanish_readings:
  - seguía predicando
  - predicaba
  rationale: La traducción debe conservar la acción en curso en pasado. «Estaba predicando» mantiene ese matiz aspectual mejor que un simple pretérito perfecto simple, que podría sonar más puntual.
  doctrine_reference: Translation philosophy §§1, 2
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego SBLGNT y coincide con la auditoría inglesa en la lectura geográfica principal y en el valor aspectual perifrástico; no se detectaron cambios necesarios respecto del pase más reciente.
  spanish_consistency_notes:
  - Se mantiene «predicando» para κηρύσσων, en coherencia con el uso POB de un verbo de anuncio público.
  - Se conserva «sinagogas» como término técnico transparente, sin sustituirlo por una paráfrasis.
  - Se preserva «Judea» en el texto principal y la variante manuscrita se documenta en nota.
  - El español usa el imperfecto perifrástico «estaba predicando» para reflejar continuidad en pasado sin forzar un calco rígido.
