translation:
  language: es
  text: Y en la sinagoga había un hombre que tenía un espíritu[a] de demonio inmundo, y gritó con voz fuerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un espíritu inmundo de demonio». El griego incluye tanto «espíritu» como «demonio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῇ συναγωγῇ
  english_pob_choice: in the synagogue
  chosen_spanish: en la sinagoga
  alternatives_spanish:
  - en la asamblea
  lexicon: BDAG
  rationale: «Sinagoga» es el equivalente preciso y natural en este contexto judío de reunión/culto; «asamblea» diluye el referente histórico y religioso del término.
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: BDAG
  rationale: El singular masculino del relato apunta a un individuo varón; «hombre» mantiene la precisión gramatical y narrativa.
- source_word: ἔχων
  english_pob_choice: having
  chosen_spanish: que tenía
  alternatives_spanish:
  - poseído por
  - con
  lexicon: BDAG
  rationale: Se conserva el valor literal de «tener» sin introducir la glosa interpretativa «poseído por». En español, la relativa «que tenía» suena natural y refleja el participio griego.
- source_word: πνεῦμα δαιμονίου ἀκαθάρτου
  english_pob_choice: an unclean spirit of a demon
  chosen_spanish: un espíritu[a] de demonio inmundo
  alternatives_spanish:
  - un espíritu inmundo de demonio
  - un espíritu demoníaco inmundo
  - un espíritu maligno
  lexicon: BDAG
  rationale: La construcción griega conserva tanto πνεῦμα como δαιμονίου; por eso se mantiene «espíritu» y «de demonio», sin reducirlo a «espíritu maligno». «Inmundo» traduce ἀκαθάρτου y se coloca con el sustantivo final para sonar más natural en español sin perder el vínculo semántico con lo impuro.
- source_word: ἀνέκραξεν
  english_pob_choice: cried out
  chosen_spanish: exclamó
  alternatives_spanish:
  - clamó
  - gritó
  - exclamó a gran voz
  lexicon: BDAG
  rationale: El verbo expresa una exclamación fuerte y repentina. «Exclamó» comunica bien la irrupción verbal; el complemento siguiente conserva la fuerza sonora del griego.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con gran voz[b]
  alternatives_spanish:
  - en voz alta
  - con voz fuerte
  - a gran voz
  lexicon: BDAG
  rationale: La expresión idiomática griega se vierte de forma tradicional pero clara. «Con gran voz» preserva la imagen concreta de voz elevada; la alternativa «en voz alta» sería más explicativa pero menos imagística.
theological_decisions:
- issue: Terminología demonológica doble en πνεῦμα δαιμονίου ἀκαθάρτου
  english_pob_reading: an unclean spirit of a demon
  chosen_spanish_reading: un espíritu de demonio inmundo
  alternative_spanish_readings:
  - un espíritu inmundo de demonio
  - un espíritu maligno
  rationale: El griego menciona explícitamente tanto «espíritu» como «demonio», y además añade «inmundo». La traducción preserva esa doble referencia sin simplificarla a una expresión más general. No se introduce la fórmula doctrinal «poseído por», aunque el contexto narrativo sí implica aflicción demoníaca.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto inglés auditado atravesó una corrección para evitar la forma poco natural «demon-spirit» y optar por una relación genitiva más natural («spirit of a demon»). La versión española sigue la misma preocupación por la naturalidad, pero conserva ambas piezas léxicas del original («espíritu» y «demonio») y mantiene «inmundo» sin diluir el matiz semántico. No se aplicaron cambios doctrinales adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Se conserva «sinagoga» por precisión histórica y eclesial.
  - «Espíritu» se mantiene en minúscula por referirse a una entidad demoníaca, no al Espíritu Santo.
  - «Con gran voz» reproduce el tono enfático del griego sin ampliar el sentido más allá de lo necesario.
