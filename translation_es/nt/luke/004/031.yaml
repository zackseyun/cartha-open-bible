translation:
  language: es
  text: Y descendió a Capernaúm[a], una ciudad de Galilea. Y estaba enseñándoles los sábados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente en español, «el sábado». El griego está en plural: «los sábados», lo que probablemente indica ocasiones sabáticas repetidas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατῆλθεν
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue hacia abajo
  lexicon: BDAG
  rationale: El verbo griego expresa movimiento hacia abajo. En español, «descendió» conserva ese sentido direccional con un registro digno y claro, sin añadir información sobre la ruta.
- source_word: Καφαρναοὺμ
  english_pob_choice: Capernaum
  chosen_spanish: Capernaúm
  alternatives_spanish:
  - Cafarnaúm
  - Capernaum
  lexicon: Convención toponímica española
  rationale: Se mantiene la transliteración habitual en español bíblico «Capernaúm», con acento gráfico conforme a la pronunciación española y para lectura natural.
- source_word: πόλιν τῆς Γαλιλαίας
  english_pob_choice: a city of Galilee
  chosen_spanish: ciudad de Galilea
  alternatives_spanish:
  - una ciudad de Galilea
  - la ciudad de Galilea
  lexicon: BDAG
  rationale: El griego no lleva artículo con πόλιν en esta construcción; en español, «ciudad de Galilea» comunica la identificación geográfica de forma natural sin sobrecargar la indefinición. La genitiva se vierte como pertenencia o ubicación.
- source_word: ἦν διδάσκων
  english_pob_choice: was teaching
  chosen_spanish: estaba enseñándoles
  alternatives_spanish:
  - enseñaba
  - seguía enseñándoles
  lexicon: BDAG
  rationale: La perífrasis imperfectiva griega se refleja mejor con una construcción progresiva en español. «Estaba enseñándoles» preserva la acción en curso y el objeto pronominal explícito del griego.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - los
  lexicon: BDAG
  rationale: El pronombre griego funciona como objeto de enseñanza sin añadir un sustantivo explícito. En español, el dativo «les» evita una identificación no presente en el texto y conserva la referencia pronominal.
- source_word: ἐν τοῖς σάββασιν
  english_pob_choice: on the Sabbaths
  chosen_spanish: en los sábados
  alternatives_spanish:
  - en los días de sábado
  - en los sábados repetidos
  lexicon: BDAG
  rationale: Se conserva el plural griego σάββασιν sin suavizarlo al singular. «En los sábados» es una traducción literal pero comprensible en español, y deja visible la posible idea de ocasiones sabáticas repetidas que la POB inglesa también documenta.
theological_decisions:
- issue: Preservación del plural de σάββατον en la referencia temporal
  english_pob_reading: on the Sabbaths
  chosen_spanish_reading: en los sábados
  alternative_spanish_readings:
  - en el sábado
  - durante los sábados
  rationale: 'No es una cuestión doctrinal, pero sí hermenéutica: el plural puede sugerir ocasiones repetidas de enseñanza en sábado. Mantenerlo en español evita borrar ese matiz y respeta el rastro auditado de la POB inglesa.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios al contenido base; se mantiene la decisión de conservar el valor progresivo de ἦν διδάσκων y el plural de σάββασιν, mientras se adapta la formulación al español natural.
  spanish_consistency_notes:
  - Se usa «Capernaúm» como transliteración estable y reconocible en español.
  - Se preserva el aspecto durativo con «estaba enseñándoles».
  - Se conserva el plural temporal con «en los sábados», anotando la alternativa idiomática singular.
  - Se evita el uso de «Señor» o de otras equivalencias no presentes en el versículo.
