review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: κατῆλθεν = movimiento descendente; πόλιν τῆς Γαλιλαίας = identificación geográfica; ἦν διδάσκων = acción durativa; ἐν τοῖς σάββασιν = plural iterativo. Sin embargo, dos elecciones en español no preservan fielmente ni la naturalidad ni del todo la fuerza formal del texto auditado: «ciudad de Galilea» sin artículo indefinido suena elíptico en español, y «en los sábados» es excesivamente calcado y poco idiomático.'
  spanish_quality_summary: El texto es generalmente claro, pero necesita pulido para un español bíblico natural y digno. «Descendió» es aceptable, pero «bajó» suele sonar más natural; aun así no exige cambio. Sí conviene reparar «ciudad de Galilea» a «una ciudad de Galilea» y «en los sábados» a «en los sábados[a]» o mejor una formulación natural que mantenga el plural. La mejor solución es «los sábados[a]», que conserva el plural iterativo sin la preposición forzada.
  glossary_alignment: No hay términos del glosario mayor implicados. El manejo de topónimos es aceptable. La preservación del plural de σάββασιν sí sigue la decisión auditada de la POB inglesa, pero debe expresarse con mejor español. La forma «Capernaúm» es defendible, aunque «Cafarnaúm» también es común; no requiere cambio aquí.
  issues:
  - severity: medium
    issue: «ciudad de Galilea» omite el indefinido requerido por πόλιν anarthrous en español natural
    rationale: El inglés auditado preserva «a city of Galilee». En español, «ciudad de Galilea» suena incompleto o appositivo rígido; «una ciudad de Galilea» transmite mejor la indefinición natural del griego.
  - severity: high
    issue: «en los sábados» es un calco poco natural en español
    rationale: Aunque busca preservar el plural de σάββασιν, la expresión suena forzada. «Los sábados» o «en los días de sábado» comunican mejor la iteración. Dado que el inglés POB documenta una alternativa idiomática, el español también debe hacerlo sin perder el plural principal.
  - severity: low
    issue: La nota al pie propone «en sábado», pero sería más natural «en el sábado» o simplemente «el sábado» según el giro
    rationale: La nota debe ayudar al lector hispano. «En sábado» suena menos natural en español general que «el sábado» como alternativa idiomática singular.
  revised_spanish_text: Y descendió a Capernaúm[a], una ciudad de Galilea. Y estaba enseñándoles los sábados.
  revised_footnotes:
