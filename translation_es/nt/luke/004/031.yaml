revisions:
- from: Y descendió a Capernaúm[a], ciudad de Galilea. Y estaba enseñándoles en los sábados.
  to: Y descendió a Capernaúm[a], una ciudad de Galilea. Y estaba enseñándoles los sábados.
  rationale: Se añade «una» para reflejar la indefinición natural de πόλιν en español. Se reemplaza «en los sábados» por «los sábados», que conserva el plural iterativo de σάββασιν y suena natural en español. Se conserva «descendió» por su registro digno y por reflejar el movimiento descendente de κατῆλθεν. La nota se ajusta a una alternativa idiomática realmente natural para lectores hispanohablantes.
