translation:
  language: es
  text: El Espíritu de Yahvé está sobre mí, porque me ha ungido para anunciar buenas nuevas a los pobres. Me ha enviado para proclamar liberación[a] a los cautivos y recuperación de la vista a los ciegos, para enviar a los oprimidos[b] en liberación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perdón» para «liberación» (griego ἄφεσις); aquí el contexto de cautivos y oprimidos favorece el lenguaje de liberación.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los que han sido quebrantados»; «los oprimidos» expresa el sentido idiomático en este contexto.
    reason: lexical_alternative
  - marker: c
    text: O «con liberación». Literalmente, el griego dice «en liberación»; la frase repite ἄφεσις y mantiene el enlace con la liberación de cautivos y oprimidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πνεῦμα κυρίου
  english_pob_choice: The Spirit of the Lord
  chosen_spanish: El Espíritu del Señor
  alternatives_spanish:
  - El Espíritu de Yahvé
  - El Espíritu de Yahvéh
  lexicon: BDAG
  rationale: El genitivo κυρίου expresa posesión o procedencia; en español, «El Espíritu del Señor» reproduce con naturalidad esa relación y conserva el eco bíblico. Aunque el proyecto prefiere «Yahvé» para יהוה, aquí el texto griego cita la fórmula κύριος dentro de un marco escritural, y «Señor» mantiene la cita en forma idiomática y reconocible sin forzar el registro.
- source_word: ἐπ’ ἐμέ
  english_pob_choice: is upon me
  chosen_spanish: está sobre mí
  alternatives_spanish:
  - reposa sobre mí
  lexicon: BDAG
  rationale: La construcción griega no exige un verbo explícito, pero el español sí. «Está sobre mí» conserva la imagen de la presencia/unción del Espíritu sin añadir interpretación excesiva; «reposa sobre mí» sería posible, pero un poco más interpretativa.
- source_word: οὗ εἵνεκεν
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - por esto
  - a causa de esto
  lexicon: BDAG
  rationale: La expresión introduce la razón de la unción y envío. «Porque» es la forma más natural y fiel en español para expresar la relación causal.
- source_word: ἔχρισέν με
  english_pob_choice: he has anointed me
  chosen_spanish: me ha ungido
  alternatives_spanish:
  - me ungió
  lexicon: BDAG
  rationale: «Ungir» preserva la resonancia mesiánica de χρίω. El perfecto griego se refleja bien con el presente perfecto español, que mantiene el efecto vigente de la comisión.
- source_word: εὐαγγελίσασθαι πτωχοῖς
  english_pob_choice: to proclaim good news to the poor
  chosen_spanish: para anunciar buenas nuevas a los pobres
  alternatives_spanish:
  - para proclamar el evangelio a los pobres
  - para traer buenas noticias a los pobres
  lexicon: BDAG
  rationale: εὐαγγελίζω es anunciar buenas noticias; «anunciar buenas nuevas» evita el lenguaje eclesiástico más técnico y preserva el sentido de proclamación. «Pobres» mantiene el campo semántico amplio sin precisar indebidamente si la referencia es económica, social o espiritual.
- source_word: ἀπέσταλκέν με
  english_pob_choice: He has sent me
  chosen_spanish: Me ha enviado
  alternatives_spanish:
  - Me envió
  lexicon: BDAG
  rationale: El perfecto transmite una acción cumplida con efecto continuo. El español con presente perfecto comunica esa vigencia mejor que el pretérito simple.
- source_word: κηρύξαι
  english_pob_choice: to proclaim
  chosen_spanish: para proclamar
  alternatives_spanish:
  - para predicar
  - para anunciar
  lexicon: BDAG
  rationale: κηρύσσω es proclamación pública; «proclamar» conserva el tono de anuncio oficial y evita reducirlo a la esfera eclesial de «predicar».
- source_word: αἰχμαλώτοις ἄφεσιν
  english_pob_choice: release to the captives
  chosen_spanish: liberación a los cautivos
  alternatives_spanish:
  - libertad a los cautivos
  - perdón a los cautivos
  lexicon: BDAG
  rationale: En este contexto, ἄφεσις se mueve en el campo de liberación/libertad. «Liberación» expresa bien el valor contextual de ἄφεσις junto a «cautivos» y evita imponer de entrada el sentido más estrecho de perdón.
- source_word: τυφλοῖς ἀνάβλεψιν
  english_pob_choice: recovery of sight to the blind
  chosen_spanish: recuperación de vista a los ciegos
  alternatives_spanish:
  - vista a los ciegos
  - recobro de la vista a los ciegos
  lexicon: BDAG
  rationale: ἀνάβλεψις indica volver a ver o recuperar la vista; «recuperación de vista» conserva ese matiz más precisamente que un simple «vista».
- source_word: ἀποστεῖλαι
  english_pob_choice: to send out
  chosen_spanish: para enviar
  alternatives_spanish:
  - para despachar
  - para mandar
  lexicon: BDAG
  rationale: El infinitivo continúa la secuencia de propósito. En español, con el objeto siguiente, «enviar» resulta natural y suficiente; «enviar fuera» o «mandar» sonarían menos precisos o más regionales.
- source_word: τεθραυσμένους
  english_pob_choice: the oppressed
  chosen_spanish: a los oprimidos
  alternatives_spanish:
  - a los quebrantados
  - a los que han sido quebrados
  lexicon: BDAG
  rationale: El participio perfecto pasivo de θραύω significa literalmente «quebrados/rotos», pero en este pasaje la idea idiomática es la de personas oprimidas o aplastadas. «Oprimidos» comunica bien el sentido contextual sin borrar la base literal; la alternativa más literal queda documentada.
- source_word: ἐν ἀφέσει
  english_pob_choice: in release
  chosen_spanish: en liberación
  alternatives_spanish:
  - con liberación
  - en libertad
  lexicon: BDAG
  rationale: La repetición de ἄφεσις al final mantiene la conexión retórica con la cláusula anterior. «En liberación» conserva esa repetición y el valor de liberación, aunque en español suene algo marcado; se prefiere para no neutralizar la reiteración del término.
theological_decisions:
- issue: Sentido de ἄφεσις en la cita de Isaías
  english_pob_reading: release/liberation
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - perdón
  - libertad
  rationale: En el contexto inmediato aparecen cautivos, ciegos y oprimidos, por lo que la red de imágenes apunta a liberación/restauración. Se conserva ese sentido principal en el texto, y se documenta la posibilidad de «perdón» como lectura alternativa sin imponerla aquí.
  doctrine_reference: Translation philosophy §3; la tabla de términos en disputa recomienda preservar la tensión cuando la ambigüedad es genuina.
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje griego SBLGNT y el rastro auditado del POB en inglés. Se preservan las decisiones clave: κύριος como «Señor» en la cita, χρίω como «ungir», εὐαγγελίζω como anuncio de buenas nuevas, κηρύσσω como «proclamar», y ἄφεσις como «liberación» por su fuerza contextual. No se observan revisiones aplicadas en el expediente; por tanto, el borrador mantiene la lectura estable más reciente.'
  spanish_consistency_notes:
  - Se mantiene «cautivos» para αἰχμαλώτοις y «oprimidos» para τεθραυσμένους, respetando la distinción entre ambos grupos.
  - Se usa «liberación» de manera consistente para ἄφεσις en ambas apariciones, con nota para la alternativa «perdón».
  - Se evita «predicar» para κηρύσσω y «evangelio» como sustantivo técnico para εὐαγγελίζω, siguiendo el registro público de proclamación del texto.
  - «Espíritu» se escribe con mayúscula cuando designa al Espíritu divino en la cita inicial.
