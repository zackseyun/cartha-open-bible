    text: O «perdón» para «liberación» (griego ἄφεσις); aquí el contexto de cautivos y oprimidos favorece el lenguaje de liberación.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los que han sido quebrantados»; «los oprimidos» expresa el sentido idiomático en este contexto.
    reason: lexical_alternative
  - marker: c
    text: O «con liberación». Literalmente, el griego dice «en liberación»; la frase repite ἄφεσις y mantiene el enlace con la liberación de cautivos y oprimidos.
    reason: lexical_alternative
  revision_rationale: Se corrige «Señor» a «Yahvé» para ajustarse a la política del proyecto y al trasfondo de Isaías. Se reemplaza la nota irrelevante sobre el verbo implícito por la nota auditada sobre ἄφεσις = «liberación/perdón». Se mejora la naturalidad de «recuperación de la vista» y se añaden notas que preservan la alternativa literal de τεθραυσμένους y la formulación marcada «en liberación».
