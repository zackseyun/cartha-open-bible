translation:
  language: es
  text: 'Pero en verdad les digo: había muchas viudas en Israel en los días de Elías, cuando se cerró el cielo por tres años y seis meses, cuando vino una gran hambre sobre toda la región[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre toda la tierra». El griego γῆ puede significar «tierra», «país» o «región»; en el contexto de Elías, «región» expresa mejor el alcance histórico sin implicar necesariamente todo el mundo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπ’ ἀληθείας
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - verdaderamente
  - de cierto
  lexicon: BDAG
  rationale: La expresión preposicional funciona como fórmula enfática de afirmación solemne. «En verdad» conserva la solemnidad y el énfasis sin sonar arcaico; evita mecanizarla como una simple muletilla.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: En este contexto introduce desarrollo con contraste respecto de lo anterior. «Pero» reproduce mejor ese matiz adversativo en español.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - os digo
  lexicon: BDAG
  rationale: La fórmula directa de discurso se expresa naturalmente en español como «les digo». Mantiene el tono personal y solemne sin recargar la frase.
- source_word: πολλαὶ χῆραι
  english_pob_choice: many widows
  chosen_spanish: muchas viudas
  alternatives_spanish:
  - numerosas viudas
  lexicon: BDAG
  rationale: Correspondencia directa y natural; no requiere expansión ni matiz adicional.
- source_word: ἐν ταῖς ἡμέραις Ἠλίου
  english_pob_choice: in the days of Elijah
  chosen_spanish: en los días de Elías
  alternatives_spanish:
  - durante los días de Elías
  lexicon: BDAG
  rationale: Se conserva el idiomatismo temporal estándar y el nombre tradicional del profeta en español.
- source_word: ἐν τῷ Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  lexicon: BDAG
  rationale: La referencia es locativa e histórica; «en Israel» es la forma más natural y precisa.
- source_word: ἐκλείσθη ὁ οὐρανός
  english_pob_choice: the sky was shut up
  chosen_spanish: el cielo fue cerrado
  alternatives_spanish:
  - los cielos fueron cerrados
  - el cielo se cerró
  lexicon: BDAG
  rationale: Se conserva la metáfora pasiva del original sin ocultarla. «Cielo» permite en español una lectura meteorológica y mantiene la imagen idiomática ligada a la retención de lluvia. Se evita «los cielos» porque en español puede sonar más religioso y menos idiomático aquí.
- source_word: ἐπὶ ἔτη τρία καὶ μῆνας ἕξ
  english_pob_choice: for three years and six months
  chosen_spanish: por tres años y seis meses
  alternatives_spanish:
  - durante tres años y seis meses
  lexicon: BDAG
  rationale: La duración se expresa de manera directa y natural con «por», conservando la precisión temporal completa.
- source_word: ὡς ἐγένετο
  english_pob_choice: as ... came
  chosen_spanish: como sucedió
  alternatives_spanish:
  - cuando sucedió
  - al suceder
  lexicon: BDAG
  rationale: Aquí ὡς marca la circunstancia concomitante o resultante de la clausura del cielo. «Como sucedió» mantiene el enlace sin forzar una subordinación más interpretativa.
- source_word: λιμὸς μέγας
  english_pob_choice: a great famine
  chosen_spanish: una gran hambre
  alternatives_spanish:
  - un gran hambre
  - una severa hambruna
  lexicon: BDAG
  rationale: Se mantiene la construcción literal y el valor adjetival de μέγας. «Hambre» traduce el sustantivo con fidelidad; «hambruna» sería más explicativo, pero no necesario.
- source_word: ἐπὶ πᾶσαν τὴν γῆν
  english_pob_choice: over all the land
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - sobre toda la tierra/país
  - sobre toda la región
  lexicon: BDAG
  rationale: Se conserva la amplitud del término γῆ. Aunque el contexto de Elías sugiere una referencia regional, en español «tierra» retiene mejor la formulación amplia del griego; la nota explica la posibilidad contextual de «land»/«earth».
theological_decisions:
- issue: Alcance de γῆ en la afirmación sobre el hambre
  english_pob_reading: land/region rather than the entire earth
  chosen_spanish_reading: toda la tierra, con la nota de que puede entenderse como la tierra/país del contexto de Elías
  alternative_spanish_readings:
  - toda la tierra
  - todo el país
  - toda la región
  rationale: El contexto de la cita de Elías orienta la referencia histórica, pero el griego permite también un alcance más amplio. Se opta por una traducción que preserve la amplitud semántica del texto y se documenta la posibilidad contextual sin cerrar la tensión lexical.
  doctrine_reference: 'Translation philosophy: original-language primacy; no imponer un estrechamiento contextual sin marcarlo.'
translation_notes:
  revision_awareness: 'La redacción sigue el registro y las revisiones finales del texto fuente en inglés: se prefirió una fórmula más natural para ἐπ’ ἀληθείας («en verdad») y se mantuvo el resto de las decisiones auditadas, especialmente la metáfora de ἐκλείσθη ὁ οὐρανός y la ambigüedad de γῆ, que se documenta en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como estándar general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Elías» como forma española convencional del profeta Ἠλίας.
  - Se conserva el orden y el tono de una declaración solemne de Jesús, evitando paráfrasis explicativas dentro del cuerpo del texto.
  - «Cielo» se usa para el valor idiomático ligado a la lluvia; no se sustituye por «los cielos», para evitar un giro más litúrgico que el del griego.
