source:
  edition: SBLGNT
  text: ἐπ’ ἀληθείας δὲ λέγω ὑμῖν, πολλαὶ χῆραι ἦσαν ἐν ταῖς ἡμέραις Ἠλίου ἐν τῷ Ἰσραήλ, ὅτε ἐκλείσθη ὁ οὐρανὸς ⸀ἐπὶ ἔτη τρία καὶ μῆνας ἕξ, ὡς ἐγένετο λιμὸς μέγας ἐπὶ πᾶσαν τὴν γῆν,
base_translation:
  language: en
  yaml_path: translation/nt/luke/004/025.yaml
  text: But in truth I tell you[a], there were many widows in Israel in the days of Elijah, when the sky was shut up for three years and six months[b], as a great famine came over all the land.
  footnotes:
  - marker: a
    text: Or 'the heavens were shut up.' The Greek uses 'heaven/sky' in an idiom for the withholding of rain.
    reason: lexical_alternative
  - marker: b
    text: Or 'over all the earth.' The Greek word can mean 'land' or 'earth'; here 'land' fits the Elijah context best.
    reason: lexical_alternative
