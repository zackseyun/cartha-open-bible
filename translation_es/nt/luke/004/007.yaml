    issue: La expresión 'si me adoras delante de mí' es poco natural en español.
    rationale: Aunque reproduce mecánicamente ἐνώπιον ἐμοῦ, en español 'adorar delante de mí' suena redundante y torpe. La naturalidad y legibilidad mejoran si se elimina esa construcción o se reestructura idiomáticamente.
  - severity: low
    issue: La nota al pie usa 'te postras delante de mí', que repite la misma torpeza idiomática.
    rationale: '''Postrarse delante de mí'' es comprensible, pero ''postrarse ante mí'' es más natural y digno en español bíblico contemporáneo.'
  revised_spanish_text: Así que, si me adoras[a], todo será tuyo.
  revised_footnotes:
  - marker: a
    text: O 'te postras ante mí'. El verbo griego puede indicar postración o adoración; aquí se traduce 'adoras' porque el contexto trata de un homenaje religioso ofrecido al diablo.
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor de estilo para evitar una construcción poco idiomática en español ('me adoras delante de mí'). El sentido espacial de ἐνώπιον ἐμοῦ queda suficientemente absorbido en el español natural al expresar el objeto de adoración como 'me'. Se conserva la decisión principal del POB de traducir προσκυνέω como 'adoras' y se mejora la nota alternativa con 'ante mí', que suena más natural y digno.
