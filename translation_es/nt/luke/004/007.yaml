translation:
  language: es
  text: Así que, si me adoras[a], todo será tuyo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'te postras ante mí'. El verbo griego puede indicar postración o adoración; aquí se traduce 'adoras' porque el contexto trata de un homenaje religioso ofrecido al diablo.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  - tú mismo
  lexicon: σύ
  rationale: El pronombre griego está explícito para énfasis, pero en español la forma verbal y el contexto ya sostienen la segunda persona singular. Se usa 'tú' en un registro directo y natural.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: así que
  alternatives_spanish:
  - por lo tanto
  - entonces
  lexicon: οὖν
  rationale: '''Así que'' conserva la relación consecuencial sin sonar rígido. ''Por lo tanto'' sería más formal, pero menos fluido en este dicho tentador.'
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  lexicon: ἐάν
  rationale: Introduce una condición simple con subjuntivo; 'si' es la equivalencia natural en español.
- source_word: προσκυνήσῃς
  english_pob_choice: worship
  chosen_spanish: adoras
  alternatives_spanish:
  - te postras
  - rindes homenaje
  lexicon: προσκυνέω
  rationale: En este contexto la acción no es solo un gesto corporal, sino un acto de reverencia religiosa. 'Adoras' preserva esa fuerza, aunque la alternativa corporal sigue siendo posible en el trasfondo semántico.
- source_word: ἐνώπιον ἐμοῦ
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: ἐνώπιον
  rationale: '''Delante de mí'' reproduce la relación espacial y el matiz de homenaje en presencia del tentador. ''Ante mí'' también es posible, pero suena un poco más solemne.'
- source_word: ἔσται
  english_pob_choice: it will be
  chosen_spanish: será
  alternatives_spanish:
  - te pertenecerá
  - será tuyo
  lexicon: εἰμί
  rationale: El futuro copulativo se traduce de modo natural con 'será'. En combinación con el pronombre implícito, el sentido posesivo se expresa en la siguiente palabra.
- source_word: σοῦ
  english_pob_choice: yours
  chosen_spanish: tuyo
  alternatives_spanish:
  - de ti
  - para ti
  lexicon: σύ
  rationale: El genitivo posesivo tras 'será' se vuelve naturalmente 'tuyo' en español, evitando una perífrasis pesada.
- source_word: πᾶσα
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo ello
  - la totalidad
  lexicon: πᾶς
  rationale: La forma femenina singular queda elíptica en griego y apunta al dominio completo prometido en el contexto previo. 'Todo' preserva la amplitud sin añadir un sustantivo no presente en este versículo.
theological_decisions:
- issue: 'προσκυνέω: gesto físico o acto de adoración religiosa'
  english_pob_reading: worship rather than merely bow down
  chosen_spanish_reading: adoras
  alternative_spanish_readings:
  - te postras
  - rindes homenaje
  rationale: La escena es una tentación para transferir a Satanás la reverencia debida a Dios. 'Adoras' expresa mejor esa gravedad teológica que una simple postración corporal, sin borrar la posibilidad semántica del gesto físico.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés sin depender mecánicamente de él: se mantuvo la tensión semántica de προσκυνέω, se conservó la relación consecuencial de οὖν y se dejó implícito el referente total de πᾶσα conforme al contexto inmediato.'
  spanish_consistency_notes:
  - Se prefirió un español neutro y publicable, con 'Así que' como conector fluido.
  - Se evitó 'SEÑOR' u otras sustituciones teológicas no presentes en este versículo.
  - Se mantuvo la ambigüedad controlada entre postración física y adoración religiosa mediante nota.
  - La posesión final se expresó con 'tuyo' para reflejar el genitivo posesivo idiomático.
