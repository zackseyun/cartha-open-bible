review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura condicional y el sentido global del griego: una oferta consecuencial del diablo condicionada a rendirle homenaje, con resultado posesivo total. También preserva correctamente la decisión teológica principal de προσκυνέω como acto de adoración/homenaje religioso, y mantiene la nota alternativa sobre la postración.'
  spanish_quality_summary: 'La frase es mayormente clara y natural, pero ''si me adoras delante de mí'' suena poco idiomática y ligeramente redundante en español, porque ''me adoras'' ya orienta la relación y ''delante de mí'' resulta torpe. ''Si adoras ante mí'' sería peor. La formulación más fiel y natural es ''si te postras[a] ante mí'' o ''si me adoras[a]'' ; sin embargo, como el inglés POB decidió conservar ''worship'' en el texto principal, la mejor reparación es ''si me adoras[a]'' eliminando ''delante de mí'', o bien ''si adoras[a] ante mí''. Dado que el griego sí incluye ἐνώπιον ἐμοῦ, conviene conservarlo con una expresión idiomática: ''si me adoras[a], postrándote ante mí'' sería demasiado interpretativo. La opción más equilibrada y fiel es ''si te postras[a] ante mí'' solo si se cambiara la decisión léxica principal, lo cual no corresponde. Por eso propongo ''si me adoras[a], todo será tuyo'' como reparación menor por naturalidad, aunque comprime el matiz espacial ya absorbido
    por el objeto indirecto de adoración en español.'
  glossary_alignment: No hay términos de glosario mayor en juego como Yahvé/Mesías. La decisión de προσκυνέω como 'adorar' está alineada con la justificación teológica del POB. La nota alternativa conserva adecuadamente 'te postras'.
  issues:
