revisions:
- from: Así que, si me adoras[a] delante de mí, todo será tuyo.
  to: Así que, si me adoras[a], todo será tuyo.
  rationale: Se hace una reparación menor de estilo para evitar una construcción poco idiomática en español ('me adoras delante de mí'). El sentido espacial de ἐνώπιον ἐμοῦ queda suficientemente absorbido en el español natural al expresar el objeto de adoración como 'me'. Se conserva la decisión principal del POB de traducir προσκυνέω como 'adoras' y se mejora la nota alternativa con 'ante mí', que suena más natural y digno.
  reviewer_model: gpt-5.4
