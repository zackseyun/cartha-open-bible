translation:
  language: es
  text: Y al instante se levantó ante ellos[a], recogió aquello sobre lo que había estado acostado, y se fue a su casa, glorificando a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la estera sobre la que había estado acostado» (literalmente, «aquello sobre lo que había estado acostado»).
    reason: lexical_alternative
lexical_decisions:
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - enseguida
  lexicon: BDAG
  rationale: El adverbio expresa ausencia de demora; «al instante» conserva la rapidez inmediata de la acción y suena natural en español narrativo.
- source_word: ἀναστὰς
  english_pob_choice: he stood up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: Aunque el participio es literalmente «habiéndose levantado», en español la secuencia narrativa se expresa con un verbo finito. «Se levantó» mantiene el orden de acciones sin calco forzado.
- source_word: ἐνώπιον αὐτῶν
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - en su presencia
  - ante ellos
  lexicon: BDAG
  rationale: La frase marca visibilidad pública frente a la multitud. «Delante de ellos» refleja bien la ubicación espacial sin añadir énfasis interpretativo.
- source_word: ἄρας
  english_pob_choice: picked up
  chosen_spanish: tomó
  alternatives_spanish:
  - levantó
  - recogió
  lexicon: BDAG
  rationale: αἴρω aquí implica levantar y cargar el objeto sobre el que estaba tendido. «Tomó» funciona con la frase completa «tomó aquello sobre lo que había estado acostado» y evita introducir un sustantivo no explícito en el texto principal.
- source_word: ἐφ’ ὃ κατέκειτο
  english_pob_choice: what he had been lying on
  chosen_spanish: aquello sobre lo que había estado acostado
  alternatives_spanish:
  - la estera sobre la que había estado acostado
  - la cama sobre la que había estado acostado
  lexicon: BDAG
  rationale: El griego usa una expresión relativa, sin nombrar explícitamente «cama» o «estera». La elección conserva esa indeterminación en el texto principal; las opciones más específicas se reservan como alternativa léxica.
- source_word: κατέκειτο
  english_pob_choice: had been lying
  chosen_spanish: había estado acostado
  alternatives_spanish:
  - estaba acostado
  - yacía
  lexicon: BDAG
  rationale: El imperfecto describe un estado continuo previo. «Había estado acostado» reproduce bien ese trasfondo narrativo en español y mantiene la relación temporal.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: BDAG
  rationale: El verbo indica irse/departir. «Se fue» es idiomático y conserva la dirección de salida sin sobredimensionar el matiz.
- source_word: εἰς τὸν οἶκον αὐτοῦ
  english_pob_choice: to his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su vivienda
  lexicon: BDAG
  rationale: οἶκος puede ser «casa» u «hogar», pero aquí la referencia concreta es suficiente y natural con «a su casa».
- source_word: δοξάζων τὸν θεόν
  english_pob_choice: glorifying God
  chosen_spanish: glorificando a Dios
  alternatives_spanish:
  - dando gloria a Dios
  - alabando a Dios
  lexicon: BDAG
  rationale: δοξάζω expresa atribuir gloria/honor. «Glorificando a Dios» mantiene ese campo semántico mejor que «alabando», que en español puede inclinarse más a la alabanza verbal.
theological_decisions:
- issue: Si nombrar explícitamente el objeto que llevaba al sanar
  english_pob_reading: Keep the main text closer to the Greek with 'what he had been lying on' and preserve a more explicit object in a footnote.
  chosen_spanish_reading: Mantener en el texto principal la expresión indeterminada «aquello sobre lo que había estado acostado», dejando la identificación más explícita en la nota.
  alternative_spanish_readings:
  - la estera sobre la que había estado acostado
  - la cama sobre la que había estado acostado
  rationale: La cláusula griega no nombra el objeto; conservar la referencia relativa evita añadir precisión que el versículo no da. La nota permite una lectura más inmediata para el lector hispano sin desplazar la forma del original.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El pasaje muestra pleno acuerdo entre la revisión más reciente y el resumen de control cruzado: no hubo cambios en la última pasada, y el veredicto fue de alta concordancia. Por eso el borrador español sigue de cerca la decisión inglesa establecida y conserva la indeterminación del objeto en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene «Dios» como traducción de θεόν conforme al estándar del proyecto.
  - Se evita introducir «cama» o «estera» en el cuerpo del texto para no resolver sin base explícita la referencia de ἐφ’ ὃ κατέκειτο.
  - 'La secuencia verbal en español sigue el orden narrativo del griego: levantarse, tomar el objeto, irse, glorificando a Dios.'
