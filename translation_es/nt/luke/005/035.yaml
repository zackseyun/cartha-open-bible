revisions:
- from: Pero vendrán días, y cuando el novio[a] sea quitado de ellos, entonces ayunarán en aquellos días.
  to: Pero vendrán días, y cuando se les quite[a] el novio, entonces ayunarán en aquellos días.
  rationale: Se ajusta la frase verbal para un español más natural sin perder el pasivo afectivo y la fuerza de remoción de ἀπαρθῇ. También se reubica la nota al verbo, que es donde recae la decisión léxica documentada. No hace falta adjudicación adicional.
