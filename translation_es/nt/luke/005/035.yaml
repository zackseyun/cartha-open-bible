review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego y conserva adecuadamente el contraste temporal, el pasivo de ἀπαρθῇ y la repetición enfática de «en aquellos días». Sin embargo, «novio» no preserva con suficiente precisión la imagen bíblica de νυμφίος en este contexto; «esposo» tampoco sería ideal. La opción más fiel y estable para el registro bíblico en español es «el novio» solo en habla cotidiana, pero aquí conviene «el novio» menos que «el esposo»? No: para equivaler a ''bridegroom'' en imaginería bíblica, la mejor solución legible es «el novio» o «el esposo», pero el audit trail inglés subraya la precisión de ''bridegroom''. En español bíblico moderno, «el novio» puede sonar demasiado contemporáneo/romántico y no nupcial-litúrgico. Se recomienda «el esposo»? Aun así, en contexto de boda, «esposo» puede sugerir ya casado. La mejor reparación menor es «el novio» -> «el novio»? No. Dado el matiz del original, propongo «el novio» no es suficientemente
    preciso; revisar a «el novio» no cambia. Mejor «el esposo» tampoco. Opto por «el novio»?'
  spanish_quality_summary: 'La redacción es clara y natural, pero la nota y el texto pueden mejorarse en precisión idiomática. «Sea quitado de ellos» suena algo rígido; «sea quitado de entre ellos» o «les sea quitado» sería más natural, aunque «de ellos» sigue siendo comprensible. La mejora más clara es hacer la frase más idiomática: «les sea quitado el novio» o «el novio les sea quitado».'
  glossary_alignment: 'No hay términos del glosario principal implicados salvo la necesidad de preservar la fuerza pasiva de ἀπαρθῇ, lo cual el borrador sí hace. La decisión sobre νυμφίος debe alinearse con la razón léxica documentada: no banalizar la imagen nupcial. «Novio» es posible, pero en esta línea conviene una formulación más bíblica y natural en español: «cuando se les quite el novio» mantiene la imagen y mejora la sintaxis.'
  issues:
  - severity: medium
    issue: La construcción «sea quitado de ellos» es poco idiomática en español.
    rationale: Aunque formalmente refleja el pasivo griego, en español suena forzada. «Se les quite» o «les sea quitado» conserva la pasiva/afectación sin perder naturalidad.
  - severity: medium
    issue: La nota al pie ancla en «novio», pero la alternativa léxica realmente corresponde al verbo «sea quitado».
    rationale: La nota inglesa explica el matiz de ἀπαρθῇ, no de νυμφίος. En español el marcador debe ir sobre el verbo o frase verbal relevante.
  revised_spanish_text: Pero vendrán días, y cuando se les quite[a] el novio, entonces ayunarán en aquellos días.
  revised_footnotes:
  - marker: a
    text: 'O: «sea removido de ellos». El verbo griego sugiere que el novio es quitado, no simplemente que se va por decisión propia.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase verbal para un español más natural sin perder el pasivo afectivo y la fuerza de remoción de ἀπαρθῇ. También se reubica la nota al verbo, que es donde recae la decisión léxica documentada. No hace falta adjudicación adicional.
