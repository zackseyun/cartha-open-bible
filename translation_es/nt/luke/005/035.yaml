translation:
  language: es
  text: Pero vendrán días, y cuando se les quite[a] el novio, entonces ayunarán en aquellos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sea removido de ellos». El verbo griego sugiere que el novio es quitado, no simplemente que se va por decisión propia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεύσονται ... ἡμέραι
  english_pob_choice: days will come
  chosen_spanish: vendrán días
  alternatives_spanish:
  - los días vendrán
  - vendrán los días
  lexicon: BDAG
  rationale: La construcción griega es proverbial y futura; en español, «vendrán días» conserva la naturalidad y el sentido anticipatorio sin añadir un artículo innecesario. Mantiene el tono de anuncio.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δὲ introduce un contraste leve con la situación inmediata anterior. «Pero» reproduce bien ese giro en español.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cuando llegue el momento en que
  - siempre que
  lexicon: BDAG
  rationale: Con el subjuntivo aoristo ἀπαρθῇ, ὅταν apunta a un evento futuro contingente; «cuando» es la forma más idiomática y fiel.
- source_word: ἀπαρθῇ
  english_pob_choice: is taken away
  chosen_spanish: sea quitado
  alternatives_spanish:
  - sea tomado
  - sea removido
  - sea llevado
  lexicon: BDAG
  rationale: El pasivo de ἀπαίρω sugiere una acción ejercida sobre el novio, no una simple salida voluntaria. «Sea quitado» conserva la pasividad y la fuerza de remoción sin suavizar la tensión del texto.
- source_word: ὁ νυμφίος
  english_pob_choice: the bridegroom
  chosen_spanish: el novio
  alternatives_spanish:
  - el esposo
  - el desposado
  lexicon: BDAG
  rationale: Aunque «novio» es más común en español moderno, aquí se usa para evitar un giro excesivamente litúrgico y mantener la imagen matrimonial del original. En este contexto comunica adecuadamente la figura del νυμφίος sin perder inteligibilidad.
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - en ese momento
  lexicon: BDAG
  rationale: Marca la consecuencia temporal de manera clara y natural en español.
- source_word: νηστεύσουσιν
  english_pob_choice: they will fast
  chosen_spanish: ayunarán
  alternatives_spanish:
  - practicarán ayuno
  - dejarán de comer
  lexicon: BDAG
  rationale: «Ayunar» conserva el sentido religioso específico de νηστεύω, mejor que una paráfrasis general como «dejar de comer».
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - durante aquellos días
  - en esos días
  lexicon: BDAG
  rationale: La repetición temporal del griego se conserva. «Aquellos» reproduce con cierta distancia narrativa el valor de ἐκείναις y mantiene el énfasis del texto.
theological_decisions:
- issue: 'El sentido del pasivo ἀπαρθῇ: salida voluntaria o remoción forzada'
  english_pob_reading: 'Retain the passive and forceful sense: ''the bridegroom is taken away from them'''
  chosen_spanish_reading: «el novio sea quitado de ellos» mantiene la idea de remoción ejercida sobre él
  alternative_spanish_readings:
  - el novio se vaya de ellos
  - el novio se aparte de ellos
  - el novio desaparezca de ellos
  rationale: La pasiva griega no se neutraliza en una mera partida voluntaria. Traducirla con un pasivo en español preserva la tensión anticipatoria del dicho y su posible alusión a la muerte de Jesús sin explicitarla de más.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del inglés POB al conservar la estructura con coma antes de «y cuando», en lugar de fusionar la oración en una sola cláusula. También mantiene todos los elementos del griego: anuncio futuro, pasivo de remoción, sujeto matrimonial y repetición temporal final.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefiere «novio» para νυμφίος por claridad española y porque el contexto figurado matrimonial lo hace suficientemente preciso.
  - «Ayunarán» conserva el sentido religioso de νηστεύω, no un mero abstenerse de comer.
  - 'La secuencia de tiempos y conectores sigue el orden del griego: anuncio, condición temporal, consecuencia.'
