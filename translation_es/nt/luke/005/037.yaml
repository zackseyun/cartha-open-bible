translation:
  language: es
  text: Y nadie mete vino nuevo en odres viejos[a]. De otro modo, el vino nuevo romperá los odres, y el vino mismo[b] se derramará[c], y los odres se arruinarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «pieles viejas». El griego se refiere a recipientes de piel usados para vino.
    reason: lexical_alternative
  - marker: b
    text: O simplemente, «y se derramará». El griego añade un pronombre enfático que se refiere al vino nuevo.
    reason: lexical_alternative
  - marker: c
    text: O, «será derramado».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  lexicon: BDAG
  rationale: «Nadie» reproduce de forma natural el valor absoluto del indefinido griego y conserva el tono proverbial de la frase.
- source_word: βάλλει
  english_pob_choice: puts
  chosen_spanish: mete
  alternatives_spanish:
  - pone
  - coloca
  - echa
  lexicon: BDAG
  rationale: En español, «meter» expresa con naturalidad introducir vino en un recipiente. Evita el calco de «poner» y no fuerza una imagen de vertido que el verbo griego no exige por sí mismo.
- source_word: οἶνον νέον
  english_pob_choice: new wine
  chosen_spanish: vino nuevo
  alternatives_spanish:
  - vino joven
  lexicon: BDAG
  rationale: «Vino nuevo» es la correspondencia directa y idiomática. «Vino joven» podría sugerir otra matización en español, pero aquí la referencia es al vino aún en fermentación.
- source_word: ἀσκοὺς παλαιούς
  english_pob_choice: old wineskins
  chosen_spanish: odres viejos
  alternatives_spanish:
  - pieles viejas
  - odres antiguos
  lexicon: BDAG
  rationale: «Odres» comunica el recipiente de piel usado para líquidos sin necesidad de explicar «wine-skins» de forma extranjera. «Viejos» mantiene el contraste con «vino nuevo» y conserva el valor de παλαιούς.
- source_word: εἰ δὲ μήγε
  english_pob_choice: Otherwise
  chosen_spanish: De otro modo
  alternatives_spanish:
  - si no
  - de lo contrario
  lexicon: BDAG
  rationale: La locución compacta introduce la consecuencia adversa. «De otro modo» suena natural en español y conserva la relación lógica sin añadir interpretación excesiva.
- source_word: ῥήξει
  english_pob_choice: will burst
  chosen_spanish: romperá
  alternatives_spanish:
  - reventará
  - rasgará
  - hará estallar
  lexicon: BDAG
  rationale: «Romperá» es una forma clara y digna para el efecto de la presión sobre los odres. «Reventará» sería más vívida, pero ligeramente más coloquial; «romperá» mantiene el registro bíblico sin perder fuerza.
- source_word: ἐκχυθήσεται
  english_pob_choice: will be spilled
  chosen_spanish: se derramará
  alternatives_spanish:
  - será derramado
  - se vaciará
  lexicon: BDAG
  rationale: El pasivo griego se expresa naturalmente con «se derramará», que comunica la pérdida del vino por la ruptura. «Será derramado» es posible, pero menos idiomático en este contexto.
- source_word: καὶ αὐτός
  english_pob_choice: and it
  chosen_spanish: y él
  alternatives_spanish:
  - y este mismo
  - y el vino mismo
  lexicon: BDAG
  rationale: Se conserva el énfasis del pronombre con «él», referido al vino. Aunque en español podría sonar marcado, el masculino concuerda con «vino» y permite reflejar la insistencia del griego sin apagarla en una simple omisión.
- source_word: ἀπολοῦνται
  english_pob_choice: will be ruined
  chosen_spanish: se perderán
  alternatives_spanish:
  - se arruinarán
  - se destruirán
  - perecerán
  lexicon: BDAG
  rationale: Para recipientes, «se perderán» comunica que quedan inutilizables o arruinados en el resultado final. «Se arruinarán» también funciona, pero «se perderán» mantiene una amplitud semántica que refleja el daño y la pérdida del recipiente.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego SBLGNT y el archivo auditado en inglés. Se conservó la secuencia causal y el paralelismo de la oración, y se mantuvieron las tres consecuencias del verso: ruptura de los odres, derramamiento del vino y pérdida de los odres. No se detectaron revisiones previas aplicadas en el paquete fuente; el contexto de auditoría muestra alta concordancia y ningún cambio necesario.'
  spanish_consistency_notes:
  - Se usó «odres» para ἀσκούς por ser el término español estándar para recipientes de piel.
  - Se eligió «vino nuevo» y no una paráfrasis explicativa para respetar la terminología estable del dicho.
  - Se mantuvo el verbo pronominal «se derramará» para reflejar bien el pasivo griego.
  - No se introdujeron términos doctrinales ni interpretaciones ajenas al proverbio.
  - Los marcadores de nota siguen el orden requerido y aparecen anclados en el texto donde corresponde.
