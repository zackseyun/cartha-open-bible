revisions:
- from: Y nadie mete vino nuevo en odres viejos[a]. De otro modo, el vino nuevo romperá los odres, y él[b] se derramará[c], y los odres se perderán.
  to: Y nadie mete vino nuevo en odres viejos[a]. De otro modo, el vino nuevo romperá los odres, y el vino mismo[b] se derramará[c], y los odres se arruinarán.
  rationale: Se revisa el pronombre explícito «él» porque en español resulta poco natural para un referente inanimado en este contexto. «El vino mismo» conserva el énfasis de καὶ αὐτός y aclara la referencia. También se ajusta «se perderán» a «se arruinarán» para reflejar mejor la destrucción funcional de los odres. Las notas se actualizan para corresponder exactamente al texto revisado.
