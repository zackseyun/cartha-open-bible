translation:
  language: es
  text: 'Entonces ellos le dijeron: «Los discípulos de Juan ayunan con frecuencia y hacen oraciones; asimismo también los de los fariseos[a], pero los tuyos[b] comen y beben».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los discípulos de los fariseos». El griego dice literalmente «los de los fariseos», con «discípulos» implícito por la cláusula anterior.
    reason: lexical_alternative
  - marker: b
    text: O «pero tus discípulos». El griego dice simplemente «pero los tuyos», con «discípulos» entendido por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ δὲ εἶπαν πρὸς αὐτόν
  english_pob_choice: And they said to him
  chosen_spanish: Entonces ellos le dijeron
  alternatives_spanish:
  - Y le dijeron
  - Pero ellos le dijeron
  lexicon: BDAG
  rationale: δέ aquí funciona como transición narrativa suave; «Entonces» mantiene el flujo sin forzar una oposición fuerte. «Le dijeron» comunica con naturalidad el dativo de dirección προς αὐτόν.
- source_word: μαθηταὶ Ἰωάννου
  english_pob_choice: John’s disciples
  chosen_spanish: los discípulos de Juan
  alternatives_spanish:
  - los seguidores de Juan
  - los discípulos de Juan el Bautista
  lexicon: BDAG
  rationale: «Discípulos» es la equivalencia más directa y transparente para μαθηταί. Se mantiene el genitivo como relación de pertenencia/asociación con Juan.
- source_word: νηστεύουσιν πυκνά
  english_pob_choice: fast often
  chosen_spanish: ayunan con frecuencia
  alternatives_spanish:
  - ayunan a menudo
  - ayunan frecuentemente
  lexicon: BDAG
  rationale: πυκνά funciona adverbialmente con valor de frecuencia. «Con frecuencia» es idiomático en español y conserva la idea de práctica repetida.
- source_word: δεήσεις ποιοῦνται
  english_pob_choice: make prayers
  chosen_spanish: hacen oraciones
  alternatives_spanish:
  - hacen plegarias
  - realizan oraciones
  - oran
  lexicon: BDAG
  rationale: La expresión ποιεῖσθαι δεήσεις tiene fuerza idiomática y nominal; «hacen oraciones» refleja más de cerca la forma griega que «oran», que suaviza el giro. Se conserva la extrañeza relativa del original sin volverlo antinatural.
- source_word: ὁμοίως καὶ
  english_pob_choice: likewise also
  chosen_spanish: asimismo también
  alternatives_spanish:
  - de igual modo también
  - igualmente también
  - asimismo
  lexicon: BDAG
  rationale: Se retiene el doble refuerzo de ὁμοίως καὶ. «Asimismo también» reproduce la acumulación sin cargar demasiado el estilo.
- source_word: οἱ τῶν Φαρισαίων
  english_pob_choice: those of the Pharisees
  chosen_spanish: los de los fariseos
  alternatives_spanish:
  - los discípulos de los fariseos
  - los pertenecientes a los fariseos
  lexicon: BDAG
  rationale: El griego omite «discípulos» y deja la elipsis. «Los de los fariseos» preserva esa brevedad y evita suplir en el texto principal una palabra que el original no repite.
- source_word: οἱ δὲ σοὶ
  english_pob_choice: but yours
  chosen_spanish: pero los tuyos
  alternatives_spanish:
  - pero tus discípulos
  - pero los de ti
  lexicon: BDAG
  rationale: σοί queda elíptico por «tus discípulos». «Los tuyos» reproduce la concisión del griego y mantiene la oposición con la cláusula anterior.
- source_word: ἐσθίουσιν καὶ πίνουσιν
  english_pob_choice: eat and drink
  chosen_spanish: comen y beben
  alternatives_spanish:
  - están comiendo y bebiendo
  - comen y toman
  lexicon: BDAG
  rationale: Los presentes denotan conducta habitual en contraste con el ayuno. «Comen y beben» es la formulación natural y precisa en español.
theological_decisions:
- issue: Si explicitar «discípulos» en las cláusulas elípticas sobre los fariseos y sobre «los tuyos»
  english_pob_reading: Preserve the Greek ellipsis in the main text with 'those of the Pharisees' and 'yours'
  chosen_spanish_reading: Preservar la elipsis griega en el texto principal con «los de los fariseos» y «los tuyos»
  alternative_spanish_readings:
  - «los discípulos de los fariseos» y «tus discípulos»
  - suplir «discípulos» solo en una de las cláusulas
  rationale: No es una cuestión doctrinal, pero sí de transparencia textual. Mantener la elipsis respeta la estructura del griego y deja visible que el referente se deduce por contexto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El borrador sigue el último estado revisado del POB en inglés para este versículo: se mantiene la formulación más directa para ποιεῖσθαι δεήσεις («hacen oraciones») en lugar de una paráfrasis más interpretativa, y se conserva la elipsis griega en las cláusulas sobre los fariseos y sobre «los tuyos».'
  spanish_consistency_notes:
  - Se usa «discípulos» de manera consistente para μαθηταί, sin alternar con «seguidores» en el texto principal.
  - Se conserva «fariseos» en minúscula plural como nombre común de grupo en español bíblico, coherente con el estilo del POB.
  - La puntuación separa con punto y coma las cláusulas coordinadas para reflejar mejor la estructura paralela del griego.
  - No se introduce «Cristo», «SEÑOR» ni vocabulario no presente en el versículo.
