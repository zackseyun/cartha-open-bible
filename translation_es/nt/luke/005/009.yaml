translation:
  language: es
  text: Porque el asombro se había apoderado de él y de todos los que estaban con él, a causa de la captura de peces que habían sacado.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que habían capturado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: θάμβος
  english_pob_choice: astonishment
  chosen_spanish: asombro
  alternatives_spanish:
  - admiración
  - estupor
  lexicon: BDAG
  rationale: θάμβος nombra una reacción intensa de sorpresa o maravilla. «Asombro» transmite bien la impresión repentina y fuerte sin volver el español demasiado literario.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: BDAG
  rationale: Aquí γάρ introduce la razón de la reacción descrita en el versículo anterior. En español, «Porque» expresa naturalmente esa relación causal.
- source_word: περιέσχεν
  english_pob_choice: had seized
  chosen_spanish: se había apoderado
  alternatives_spanish:
  - había tomado
  - lo había envuelto
  - lo había sobrecogido
  lexicon: BDAG
  rationale: El verbo comunica que el asombro tomó posesión de él de manera repentina y envolvente. «Se había apoderado» conserva esa fuerza idiomática en español.
- source_word: πάντας τοὺς σὺν αὐτῷ
  english_pob_choice: all those with him
  chosen_spanish: de todos los que estaban con él
  alternatives_spanish:
  - de todos los que lo acompañaban
  - de toda la gente que estaba con él
  lexicon: BDAG
  rationale: La frase señala al grupo de acompañantes de Simón. «Todos los que estaban con él» es una forma natural y clara de mantener el alcance colectivo.
- source_word: ἐπὶ τῇ ἄγρᾳ τῶν ἰχθύων
  english_pob_choice: because of the catch of fish
  chosen_spanish: a causa de la pesca de peces
  alternatives_spanish:
  - a causa de la captura de peces
  - por la pesca obtenida
  - por la gran captura de peces
  lexicon: BDAG
  rationale: ἐπί aquí expresa base o motivo; por eso conviene una causal en español. «Pesca de peces» refleja la imagen del texto, aunque suena algo redundante en español; se conserva para no borrar la referencia explícita a ἄγρα / pesca.
- source_word: ὧν συνέλαβον
  english_pob_choice: that they had taken
  chosen_spanish: que habían sacado
  alternatives_spanish:
  - que habían pescado
  - que habían capturado
  - que habían cogido
  lexicon: BDAG
  rationale: El relativo retoma a los peces, y συνέλαβον describe que los tomaron/capturaron en la pesca. «Habían sacado» es idiomático en español para una captura obtenida del agua y evita repetir de inmediato «pesca» con «pescado».
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran una lectura estable sin cambios textuales relevantes. La principal decisión en español fue resolver ἐπὶ τῇ ἄγρᾳ τῶν ἰχθύων con una causal natural, manteniendo el sentido de la captura de peces y la reacción de asombro.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo pasado perfecto para reflejar el valor de «had seized».
  - Se evitó «SEÑOR» u otra terminología de ocultamiento porque no aparece ninguna referencia al nombre divino en este versículo.
  - La nota de pie de página se conserva para reflejar la alternativa lexical documentada en el audit trail inglés.
