    issue: «la pesca de peces» es poco natural en español
    rationale: ἄγρα en este contexto no describe la actividad de pescar en abstracto sino la captura obtenida. «Pesca de peces» suena redundante y menos idiomático que «captura de peces».
  - severity: low
    issue: La nota al pie puede ajustarse para sonar más natural y reflejar mejor la alternativa documentada
    rationale: 'La formulación actual con comillas internas y dos puntos es torpe. Basta una nota breve como «O: “que habían capturado”».'
