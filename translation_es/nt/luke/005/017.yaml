revisions:
- from: Y aconteció en uno de aquellos días que él estaba enseñando[a], y estaban sentados fariseos y maestros de la ley, que habían venido de toda aldea de Galilea, de Judea y de Jerusalén; y el poder del Señor estaba allí para sanarlo.
  to: Y sucedió en uno de aquellos días que él estaba enseñando[a], y estaban sentados fariseos y maestros de la ley, que habían venido de toda aldea de Galilea, de Judea y de Jerusalén; y el poder del Señor estaba allí para que él sanara.
  rationale: Se cambió la cláusula final a «para que él sanara» para expresar en español el sentido auditado del texto griego sin la falsa lectura de que Jesús fuera el objeto sanado. Se ajustó la nota textual para que corresponda exactamente al nuevo texto principal. También se suavizó «aconteció» a «sucedió» por naturalidad estilística sin alterar el significado.
