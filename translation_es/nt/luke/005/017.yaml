translation:
  language: es
  text: Y sucedió en uno de aquellos días que él estaba enseñando[a], y estaban sentados fariseos y maestros de la ley, que habían venido de toda aldea de Galilea, de Judea y de Jerusalén; y el poder del Señor estaba allí para que él sanara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «para sanarlos» en lugar de «para que él sanara».
    reason: textual_variant
lexical_decisions:
- source_word: ἐγένετο ἐν μιᾷ τῶν ἡμερῶν
  english_pob_choice: it happened on one of those days
  chosen_spanish: Y aconteció en uno de aquellos días
  alternatives_spanish:
  - Y sucedió en uno de aquellos días
  - Y ocurrió en uno de aquellos días
  lexicon: BDAG
  rationale: Conserva la fórmula narrativa lucana sin volverla mecánica. «Aconteció» mantiene el valor de introducción de evento, y «aquellos días» refleja el carácter idiomático de ἐν μιᾷ τῶν ἡμερῶν en este contexto.
- source_word: αὐτὸς ἦν διδάσκων
  english_pob_choice: he was teaching
  chosen_spanish: él estaba enseñando
  alternatives_spanish:
  - él mismo estaba enseñando
  - estaba enseñando
  lexicon: BDAG
  rationale: El griego usa una construcción imperfectiva que expresa acción en curso. En español, «estaba enseñando» comunica mejor esa duración. Se conserva «él» para reflejar αὐτός sin sobrerrecargar con énfasis no exigido por el contexto.
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - los fariseos
  lexicon: BDAG
  rationale: Es el término establecido en español bíblico y translitera el grupo judío de forma clara y reconocible.
- source_word: νομοδιδάσκαλοι
  english_pob_choice: teachers of the law
  chosen_spanish: maestros de la ley
  alternatives_spanish:
  - doctores de la ley
  - expertos en la ley
  lexicon: BDAG
  rationale: «Maestros de la ley» expresa con naturalidad el compuesto y evita el tecnicismo más interpretativo de «expertos». Mantiene el vínculo con la enseñanza de la Torá/Moisés sin añadir contenido no explícito.
- source_word: καθήμενοι
  english_pob_choice: were sitting there
  chosen_spanish: estaban sentados
  alternatives_spanish:
  - estaban sentados allí
  - se hallaban sentados
  lexicon: BDAG
  rationale: La participio describe una presencia estable en la escena. En español, «estaban sentados» da el mismo efecto de estado/presencia sin necesidad de añadir «allí», que no está en el texto griego.
- source_word: ἐληλυθότες
  english_pob_choice: had come
  chosen_spanish: habían venido
  alternatives_spanish:
  - habían llegado
  lexicon: BDAG
  rationale: El perfecto participial indica llegada previa con resultado presente. «Habían venido» reproduce bien ese valor relacional en español.
- source_word: ἐκ πάσης κώμης
  english_pob_choice: from every village
  chosen_spanish: de toda aldea
  alternatives_spanish:
  - de cada aldea
  - de toda villa
  lexicon: BDAG
  rationale: κώμη designa una aldea o poblado rural. «De toda aldea» conserva el matiz distributivo de πάσης y la referencia geográfica rural.
- source_word: Γαλιλαίας καὶ Ἰουδαίας καὶ Ἰερουσαλήμ
  english_pob_choice: of Galilee and Judea and from Jerusalem
  chosen_spanish: de Galilea, de Judea y de Jerusalén
  alternatives_spanish:
  - de Galilea, Judea y Jerusalén
  lexicon: BDAG
  rationale: El griego coordina regiones y una ciudad. En español, repetir «de» antes de cada elemento da una estructura natural y evita introducir una preposición diferente sin necesidad textual. Se conserva la mezcla geográfica del original.
- source_word: δύναμις κυρίου
  english_pob_choice: the power of the Lord
  chosen_spanish: el poder del Señor
  alternatives_spanish:
  - la fuerza del Señor
  - el poder de Yahvé
  lexicon: BDAG
  rationale: «Poder» refleja δύναμις con su fuerza efectiva. «Señor» sigue la convención del POB para κύριος en este contexto, donde la frase expresa la acción divina operante en el ministerio de Jesús.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: BDAG
  rationale: Aunque el POB inglés usa «Lord», aquí el contexto de κύριος apunta al Señor divino. En español, «Señor» es la forma natural y reverente para expresar esa referencia sin introducir una sustitución innecesaria en esta frase.
- source_word: ἦν εἰς τὸ ἰᾶσθαι αὐτόν
  english_pob_choice: was there for him to heal
  chosen_spanish: estaba allí para sanarlo
  alternatives_spanish:
  - estaba allí para que él sanara
  - estaba para sanarlo
  lexicon: BDAG
  rationale: La construcción εἰς τὸ + infinitivo expresa propósito/resultado. Dado que el texto griego con αὐτόν se entiende mejor como referencia a Jesús, «para sanarlo» conserva la finalidad sin forzar un plural ausente ni volver opaca la frase. «Allí» reproduce el valor locativo de ἦν en la revisión inglesa.
theological_decisions:
- issue: Referente de αὐτόν en la cláusula final
  english_pob_reading: The Lord's power was there for him to heal.
  chosen_spanish_reading: el poder del Señor estaba allí para sanarlo
  alternative_spanish_readings:
  - el poder del Señor estaba allí para que él sanara
  - el poder del Señor estaba allí para sanar
  rationale: Se mantiene el singular del texto griego y del POB revisado, evitando suplir «a ellos». La lectura más natural en español entiende que el poder del Señor estaba presente para que Jesús realizara sanidades; esto preserva el alcance sintáctico sin ampliar indebidamente el objeto.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: κύριος → Señor'
- issue: Uso de «Señor» para κύριος en la frase final
  english_pob_reading: the power of the Lord
  chosen_spanish_reading: el poder del Señor
  alternative_spanish_readings:
  - el poder de Yahvé
  - el poder del Amo
  rationale: En esta cláusula κύριος se refiere al Señor divino cuya potencia actúa en la escena. «Señor» es la forma española transparente y reverente que mantiene la resonancia teológica sin introducir una glosa innecesaria.
  doctrine_reference: Project default on κύριος / Yahvé; Luke narrative context
translation_notes:
  revision_awareness: El POB inglés revisó la última cláusula de «was present for him to heal» a «was there for him to heal» para hacer más directo ἦν. La presente versión española sigue esa decisión con «estaba allí» y conserva la lectura textual singular αὐτόν, reflejada en «para sanarlo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero en este versículo κύριος aparece en la frase fija «el poder del Señor», que en español resulta más natural y transparente para la referencia divina inmediata.
  - «Maestros de la ley» conserva el valor funcional del compuesto νομοδιδάσκαλοι sin introducir una equivalencia más técnica que no aporte claridad adicional.
  - La puntuación reproduce una sola oración larga, como en el griego, con dos puntos internos coordinados por punto y coma.
