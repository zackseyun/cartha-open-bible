translation:
  language: es
  text: 'También les decía una parábola: «Nadie arranca un parche de una prenda nueva y lo pone sobre una prenda vieja[a]. Si no, desgarrará la nueva[b], y el parche de la nueva no concordará con la vieja».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Nadie, habiendo arrancado un parche de una prenda nueva, lo pone sobre una prenda vieja». El griego usa un participio aoristo («habiendo arrancado») antes del verbo principal.'
    reason: lexical_alternative
  - marker: b
    text: «No concordará» también puede traducirse «no encajará» o «no se ajustará a». El verbo griego comunica falta de correspondencia o de conveniencia entre el parche y la prenda vieja.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: He was also telling
  chosen_spanish: les decía también
  alternatives_spanish:
  - les estaba diciendo también
  - también les hablaba
  lexicon: BDAG
  rationale: El imperfecto expresa acción en desarrollo; «les decía» conserva bien ese aspecto en español. «También» refleja καὶ/δὲ sin añadir énfasis indebido.
- source_word: παραβολὴν
  english_pob_choice: a parable
  chosen_spanish: una parábola
  alternatives_spanish:
  - una ilustración
  - una comparación
  lexicon: BDAG
  rationale: «Parábola» es la correspondencia normal y clara en este contexto narrativo de Lucas.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: En español, el dativo de destinatario se expresa naturalmente con «les»; evita una repetición pesada de la preposición.
- source_word: Οὐδεὶς
  english_pob_choice: No one
  chosen_spanish: Nadie
  alternatives_spanish:
  - Ninguno
  lexicon: BDAG
  rationale: «Nadie» es la forma más natural para el valor proverbial universal de la frase.
- source_word: ἐπίβλημα
  english_pob_choice: a patch
  chosen_spanish: un parche
  alternatives_spanish:
  - una pieza
  - un remiendo
  lexicon: BDAG
  rationale: En contexto de ropa, «parche» comunica directamente la función de la pieza añadida. «Remiendo» sería posible, pero aquí el griego destaca la pieza usada como parche.
- source_word: ἀπὸ ἱματίου καινοῦ
  english_pob_choice: from a new garment
  chosen_spanish: de un vestido nuevo
  alternatives_spanish:
  - de una prenda nueva
  - de un manto nuevo
  lexicon: BDAG
  rationale: ἱμάτιον puede abarcar una prenda exterior; en español «vestido» funciona como término amplio y bíblicamente comprensible, sin restringirlo a la ropa femenina moderna. «De una prenda nueva» sería más neutro, pero menos natural aquí.
- source_word: σχίσας
  english_pob_choice: tears / having torn
  chosen_spanish: desgarrará
  alternatives_spanish:
  - rasgará
  - romperá
  lexicon: BDAG
  rationale: Aunque el griego usa un participio aoristo («habiendo rasgado/tirado»), el POB inglés opta por una construcción natural con verbo finito. En español, «desgarrará» transmite bien la acción de arrancar una parte del tejido y mantiene la fuerza verbal.
- source_word: ἐπιβάλλει ἐπὶ ἱμάτιον παλαιόν
  english_pob_choice: puts it on an old garment
  chosen_spanish: lo pone sobre un vestido viejo
  alternatives_spanish:
  - lo coloca sobre un vestido viejo
  - lo aplica sobre un vestido viejo
  lexicon: BDAG
  rationale: ἐπιβάλλω significa «poner/colocar sobre»; «lo pone sobre» es natural y no introduce el procedimiento de costura que el texto no menciona.
- source_word: εἰ δὲ μήγε
  english_pob_choice: Otherwise
  chosen_spanish: Si no
  alternatives_spanish:
  - De lo contrario
  - O bien
  lexicon: BDAG
  rationale: La cláusula expresa la consecuencia negativa de la acción hipotética; «Si no» es breve y fiel al valor condicional.
- source_word: καὶ τὸ καινὸν σχίσει
  english_pob_choice: he will tear the new one
  chosen_spanish: desgarrará el nuevo
  alternatives_spanish:
  - rasgará el nuevo
  - desgarrará la prenda nueva
  lexicon: BDAG
  rationale: Se mantiene el sujeto implícito («nadie») y se evita repetir innecesariamente «vestido»; «el nuevo» remite naturalmente a la prenda nueva.
- source_word: καὶ τῷ παλαιῷ οὐ συμφωνήσει
  english_pob_choice: will not match the old
  chosen_spanish: no concordará con el viejo
  alternatives_spanish:
  - no armonizará con el viejo
  - no combinará con el viejo
  lexicon: BDAG
  rationale: συμφωνέω expresa correspondencia/ajuste. «Concordará» conserva esa idea de correspondencia mejor que un simple «combinará», y mantiene el matiz de falta de compatibilidad.
- source_word: τὸ ἐπίβλημα τὸ ἀπὸ τοῦ καινοῦ
  english_pob_choice: the patch from the new
  chosen_spanish: el parche del nuevo
  alternatives_spanish:
  - el parche de la prenda nueva
  - el remiendo de lo nuevo
  lexicon: BDAG
  rationale: Se conserva la referencia breve del griego a la prenda nueva ya mencionada. «Del nuevo» evita sobrecargar la frase y mantiene la cohesión con la primera cláusula.
theological_decisions:
- issue: Relación entre la prenda nueva y la vieja como imagen proverbial
  english_pob_reading: The saying is a practical comparison about incompatibility; the translation should not over-allegorize beyond the text.
  chosen_spanish_reading: La frase se presenta como comparación proverbial de incompatibilidad práctica, sin convertirla en una alegoría más específica de lo que el texto dice.
  alternative_spanish_readings:
  - una parábola con un simbolismo detallado
  - una metáfora doctrinal explícita
  rationale: El griego habla de una parábola concreta; la traducción debe preservar su función comparativa y no añadir interpretaciones no explicitadas por el contexto inmediato.
  doctrine_reference: Principio de sobriedad exegética y correspondencia textual
- issue: Matiz de συμφωνήσει
  english_pob_reading: '''Will not match'' can also mean ''will not fit'' or ''will not agree with.'''
  chosen_spanish_reading: «No concordará con el viejo» deja abierta la idea de ajuste, correspondencia y compatibilidad.
  alternative_spanish_readings:
  - no encajará con el viejo
  - no estará de acuerdo con el viejo
  rationale: En español, «concordará» puede abarcar tanto coincidencia como ajuste apropiado, preservando la ambigüedad productiva del verbo griego sin reducirla a una sola imagen.
  doctrine_reference: BDAG; nota lexical del POB inglés
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés, manteniendo la construcción proverbial, el valor aspectual del participio aoristo y el matiz de συμφωνέω. No se introdujeron cambios textuales respecto al paquete fuente; la traducción española adapta la sintaxis para lectura natural sin perder las tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se usó «parábola» de forma consistente con el término técnico del contexto lucano.
  - Se eligió «parche» para ἐπίβλημα y «desgarrará» para σχίσας/σχίσει para mantener la imagen textil.
  - Se evitó «SEÑOR», «Cristo» y otros términos no presentes en este versículo.
  - «Vestido» se emplea como término amplio de prenda, coherente con ἱμάτιον y con el estilo bíblico en español.
