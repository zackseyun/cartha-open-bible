base_translation:
  language: en
  yaml_path: translation/nt/luke/005/036.yaml
  text: 'He was also telling them a parable: “No one tears a patch from a new garment and puts it on an old garment[a]. Otherwise, he will tear the new one[b], and the patch from the new will not match the old.”'
  footnotes:
  - marker: a
    text: Or, more formally, 'No one, having torn a patch from a new garment, puts it on an old garment.' The Greek uses an aorist participle ('having torn') before the main verb.
    reason: lexical_alternative
  - marker: b
    text: '''Will not match'' could also be rendered ''will not fit'' or ''will not agree with.'' The Greek verb conveys lack of correspondence or suitability between the patch and the old garment.'
    reason: lexical_alternative
