review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la secuencia básica del griego: primero llevaron las barcas a tierra, luego dejaron todo y siguieron a Jesús. «Las barcas», «a tierra» y «le siguieron» reflejan fielmente τὰ πλοῖα, ἐπὶ τὴν γῆν y ἠκολούθησαν αὐτῷ. Sin embargo, la colocación de las notas al pie está invertida respecto de los términos a los que corresponden, y «dejando todo» suena menos natural aquí que una forma finita coordinada, dado que el griego presenta dos participios previos al verbo principal pero el inglés POB ya resolvió ἀφέντες como verbo finito para claridad.'
  spanish_quality_summary: 'El español es claro y legible, pero «Y después de haber llevado..., dejando todo, le siguieron» resulta algo trabado. «Y después de llevar las barcas a tierra, lo dejaron todo y lo siguieron» o mejor «le siguieron» mejora la fluidez. También conviene corregir el anclaje de notas: la nota sobre «habiendo llevado...» debe ir en la primera cláusula, y la alternativa «a la tierra» debe anclarse en «a tierra».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Las barcas» es adecuado para πλοῖα en contexto galileo. «Todo» preserva bien πάντα. «Le siguieron» mantiene correctamente el matiz de seguimiento/discípulado.
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas en el lugar equivocado.
    rationale: La nota a dice «a la tierra», que corresponde a «a tierra», pero está anclada en «dejando». La nota b dice «habiendo llevado las barcas a tierra», que corresponde a la primera cláusula, pero está anclada en «dejando». Esto rompe la trazabilidad del audit trail.
  - severity: low
    issue: La construcción «dejando todo, le siguieron» es menos natural que una coordinación finita.
    rationale: Aunque el participio es posible en español, en esta frase suena más idiomático «lo dejaron todo y le siguieron», que además comunica con más claridad la secuencia y la totalidad de la renuncia.
  revised_spanish_text: Y después de llevar[b] las barcas a tierra[a], lo dejaron todo y le siguieron.
  revised_footnotes:
  - marker: a
    text: 'O: «a la tierra».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «habiendo llevado las barcas a tierra».'
    reason: lexical_alternative
  revision_rationale: 'Se corrigen los anclajes de las notas para que coincidan exactamente con las palabras/frases pertinentes del texto. Además, se suaviza la sintaxis española usando una formulación más natural y clara: «lo dejaron todo y le siguieron», sin pérdida del sentido del griego ni del razonamiento documentado en el audit trail inglés.'
