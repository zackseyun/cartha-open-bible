translation:
  language: es
  text: Y después de llevar[b] las barcas a tierra[a], lo dejaron todo y le siguieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la tierra».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «habiendo llevado las barcas a tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταγαγόντες
  english_pob_choice: after bringing
  chosen_spanish: después de haber llevado
  alternatives_spanish:
  - habiendo llevado
  - cuando las habían llevado
  lexicon: BDAG / κατάγω
  rationale: El participio aoristo anterior al verbo principal se expresa en español de manera natural con una construcción temporal previa. «Después de haber llevado» conserva la secuencia de acciones sin forzar un calco.
- source_word: τὰ πλοῖα
  english_pob_choice: the boats
  chosen_spanish: las barcas
  alternatives_spanish:
  - los barcos
  - las naves
  lexicon: BDAG / πλοῖον
  rationale: En el contexto de pesca galilea, «barcas» es más natural y preciso en español que «barcos» o «naves», y mantiene el tamaño y tipo de embarcación implícitos en el relato.
- source_word: ἐπὶ τὴν γῆν
  english_pob_choice: to land
  chosen_spanish: a tierra
  alternatives_spanish:
  - a la tierra
  - a la orilla
  lexicon: BDAG / ἐπί + acusativo
  rationale: La frase griega indica movimiento «sobre/hacia la tierra». «A tierra» reproduce bien el sentido de llevar las barcas desde el agua hasta tierra firme sin restringirlo indebidamente a «orilla».
- source_word: ἀφέντες
  english_pob_choice: they left
  chosen_spanish: dejando
  alternatives_spanish:
  - dejaron
  - habiendo dejado
  lexicon: BDAG / ἀφίημι
  rationale: Aunque el inglés lo vuelve un verbo finito, el participio griego permite en español una coordinación participial fluida. «Dejando» conserva la acción concomitante y el sentido de abandonar/soltar todo.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo cuanto tenían
  lexicon: BDAG / πᾶς
  rationale: «Todo» expresa la totalidad con naturalidad y preserva la amplitud comprehensiva del neutro plural sin añadir detalles sobre si la renuncia fue temporal o permanente.
- source_word: ἠκολούθησαν αὐτῷ
  english_pob_choice: followed him
  chosen_spanish: le siguieron
  alternatives_spanish:
  - lo siguieron
  - fueron tras él
  lexicon: BDAG / ἀκολουθέω
  rationale: «Le siguieron» es una forma natural y reverente en español. Mantiene la acción narrativa y el trasfondo discipular del verbo ἀκολουθέω sin explicitar más de lo que el versículo dice.
theological_decisions:
- issue: Alcance de la renuncia en πάντα
  english_pob_reading: they left everything
  chosen_spanish_reading: dejando todo
  alternative_spanish_readings:
  - dejando todas las cosas
  - dejando cuanto tenían
  rationale: La frase debe conservar la fuerza totalizante del texto. «Todo» comunica la amplitud de la renuncia sin cerrar la tensión histórica y narrativa sobre su alcance exacto más allá del versículo.
  doctrine_reference: Preservar la tensión textual sobre renuncia y discipulado sin ampliarla interpretativamente.
translation_notes:
  revision_awareness: 'El contexto auditado en inglés coincide en alta medida con el griego: participio aoristo previo + complemento direccional + participio de abandono + objeto totalizante + verbo principal de seguimiento. No se reportan revisiones sustantivas recientes; se mantiene la lectura de secuencia narrativa y totalización de πάντα.'
  spanish_consistency_notes:
  - Se mantiene «barcas» para πλοῖα por coherencia con el contexto pesquero galileo.
  - Se usa «a tierra» para ἐπὶ τὴν γῆν, evitando estrechar indebidamente el sentido a «orilla».
  - «Le siguieron» conserva el dativo personal de αὐτῷ y la fórmula natural de discipulado en español.
  - Se evita «Cristo» o terminología eclesial no presente en el versículo.
  - Las notas a y b se anclan en los segmentos correspondientes para reflejar alternativas léxicas reales sin duplicarlas.
