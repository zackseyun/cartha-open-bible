translation:
  language: es
  text: Pero la noticia acerca de él se difundía aún más[a], y grandes multitudes se reunían para oír y para ser sanadas de sus enfermedades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la palabra acerca de él' o 'el informe acerca de él'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διήρχετο
  english_pob_choice: spread
  chosen_spanish: se difundía
  alternatives_spanish:
  - se propagaba
  - circulaba
  - se extendía
  lexicon: BDAG
  rationale: El imperfecto expresa una difusión en curso. 'Se difundía' conserva esa acción continua de manera natural en español y mantiene el sentido de algo que iba circulando ampliamente.
- source_word: μᾶλλον
  english_pob_choice: even more
  chosen_spanish: aún más
  alternatives_spanish:
  - cada vez más
  - más y más
  - todavía más
  lexicon: BDAG
  rationale: '''Aún más'' reproduce el valor comparativo e intensificador de μᾶλλον sin sobredeterminar el matiz.'
- source_word: ὁ λόγος περὶ αὐτοῦ
  english_pob_choice: the report about him
  chosen_spanish: el informe acerca de él
  alternatives_spanish:
  - la noticia acerca de él
  - el rumor acerca de él
  - la palabra acerca de él
  lexicon: BDAG
  rationale: En este contexto λόγος designa lo que se decía sobre Jesús, no 'la Palabra' en sentido técnico. 'Informe' es fiel al valor de noticia/reportaje circulante y evita confusión teológica.
- source_word: συνήρχοντο
  english_pob_choice: were gathering
  chosen_spanish: se reunían
  alternatives_spanish:
  - se iban reuniendo
  - estaban reuniéndose
  - acudían
  lexicon: BDAG
  rationale: El imperfecto indica acción repetida o en proceso. 'Se reunían' expresa bien el movimiento colectivo de las multitudes sin forzar un giro demasiado literal.
- source_word: ὄχλοι πολλοὶ
  english_pob_choice: large crowds
  chosen_spanish: grandes multitudes
  alternatives_spanish:
  - muchas multitudes
  - muchedumbres grandes
  - multitudes numerosas
  lexicon: BDAG
  rationale: '''Grandes multitudes'' es una equivalencia idiomática natural en español que conserva el plural y la abundancia del término griego.'
- source_word: ἀκούειν
  english_pob_choice: to hear
  chosen_spanish: oír
  alternatives_spanish:
  - escuchar
  - oírlo
  - prestar oído
  lexicon: BDAG
  rationale: La forma infinitiva expresa propósito. 'Oír' reproduce el sentido simple del verbo griego sin añadir énfasis interpretativos que 'escuchar' podría sugerir.
- source_word: θεραπεύεσθαι
  english_pob_choice: to be healed
  chosen_spanish: ser sanadas
  alternatives_spanish:
  - ser curadas
  - ser sanadas/curadas
  - recibir sanidad
  lexicon: BDAG
  rationale: El pasivo expresa recepción de sanidad. 'Ser sanadas' es claro y natural para curación corporal; mantiene el sentido sin introducir lenguaje devocional más amplio que el texto no explicita.
- source_word: ἀπὸ τῶν ἀσθενειῶν αὐτῶν
  english_pob_choice: of their sicknesses
  chosen_spanish: de sus enfermedades
  alternatives_spanish:
  - de sus dolencias
  - de sus males
  - de sus afecciones
  lexicon: BDAG
  rationale: '''Enfermedades'' traduce ἀσθένεια en un contexto de curación física. ''De sus enfermedades'' es la construcción natural en español para el complemento que indica el padecimiento del cual eran sanadas.'
theological_decisions:
- issue: Ámbito de la sanidad
  english_pob_reading: Render θεραπεύεσθαι and ἀσθενειῶν in straightforward bodily-healing terms without expanding into spiritual healing.
  chosen_spanish_reading: 'Traducir con lenguaje de sanidad corporal: ''ser sanadas de sus enfermedades''.'
  alternative_spanish_readings:
  - ser hechas completas
  - recibir restauración
  - ser sanadas espiritualmente
  rationale: El contexto inmediato habla de multitudes que acudían a oír y a recibir curación física. No hay base textual para ampliar a sanidad espiritual en esta frase, así que conviene preservar el sentido directo del pasaje.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve the source text''s plain sense.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto principal. La redacción mantiene la equivalencia óptima del registro inglés auditado y conserva la distinción entre λόγος como informe/noticia, sin importar un sentido técnico de 'Palabra'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió 'Jesús' implícito por el contexto del pronombre 'él', sin añadir el nombre en el texto para no sobreespecificar.
  - '''Sanadas de sus enfermedades'' preserva el sentido corporal de θεραπεύεσθαι y ἀσθενειῶν sin espiritualizarlo.'
  - El marcador [a] está anclado en 'difundía aún más[a]' para cumplir la validación de notas.
