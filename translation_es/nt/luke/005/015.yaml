revisions:
- from: Pero el informe acerca de él se difundía aún más[a], y grandes multitudes se reunían para oír y para ser sanadas de sus enfermedades.
  to: Pero la noticia acerca de él se difundía aún más[a], y grandes multitudes se reunían para oír y para ser sanadas de sus enfermedades.
  rationale: Se revisa la expresión principal de λόγος περὶ αὐτοῦ a 'la noticia acerca de él' por mayor naturalidad narrativa en español y mejor correspondencia con el sentido contextual de noticia circulante. También se corrige la nota al pie para que preserve verdaderas alternativas léxicas del audit trail inglés, sin repetir la lectura principal.
