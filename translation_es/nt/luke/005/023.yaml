translation:
  language: es
  text: '¿Qué es más fácil: decir: «Tus pecados te son perdonados[a]», o decir: «Levántate y camina»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tus pecados han sido perdonados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί ἐστιν εὐκοπώτερον
  english_pob_choice: Which is easier
  chosen_spanish: ¿Qué es más fácil?
  alternatives_spanish:
  - ¿Cuál es más fácil?
  - ¿Qué resulta más fácil?
  lexicon: BDAG
  rationale: La pregunta comparativa se expresa con naturalidad en español como ‘¿Qué es más fácil?’. Mantiene el contraste de facilidad sin volverla mecánica ni demasiado literaria.
- source_word: εἰπεῖν
  english_pob_choice: to say
  chosen_spanish: decir
  alternatives_spanish:
  - hablar
  - expresar
  lexicon: BDAG
  rationale: El infinitivo introduce dos enunciados alternativos; ‘decir’ es la opción más directa y fiel al valor verbal del griego en este contexto.
- source_word: Ἀφέωνταί
  english_pob_choice: are forgiven
  chosen_spanish: te son perdonados
  alternatives_spanish:
  - te han sido perdonados
  - te están perdonados
  lexicon: BDAG
  rationale: En español, la pasiva perifrástica ‘te son perdonados’ conserva el carácter declarativo del griego y evita sobrecargar el tiempo verbal. Añadir ‘te’ refleja el dativo de destinatario/paciente de manera idiomática.
- source_word: σοι
  english_pob_choice: you / to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: BDAG
  rationale: El dativo singular de segunda persona se naturaliza con el pronombre átono ‘te’, que mantiene el destinatario personal de la declaración sin una expansión pesada.
- source_word: αἱ ἁμαρτίαι σου
  english_pob_choice: your sins
  chosen_spanish: tus pecados
  alternatives_spanish:
  - tus faltas
  - tus ofensas
  lexicon: BDAG
  rationale: ‘Pecados’ corresponde al campo semántico de ἁμαρτίαι y es el equivalente más transparente en español bíblico contemporáneo. ‘Tus’ conserva la posesión directa del griego.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - u
  lexicon: BDAG
  rationale: Conjunción disyuntiva estándar en español.
- source_word: Ἔγειρε
  english_pob_choice: Rise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  lexicon: BDAG
  rationale: El imperativo a un enfermo paralizado pide un mandato de incorporarse; ‘Levántate’ es más natural en español que un ‘rise’ literal y preserva la fuerza del llamado.
- source_word: καὶ περιπάτει
  english_pob_choice: and walk
  chosen_spanish: y camina
  alternatives_spanish:
  - y anda
  - y anda caminando
  lexicon: BDAG
  rationale: περιπατέω aquí es caminar literalmente. ‘Camina’ mantiene el paralelismo con ‘Levántate’ y es claro en español moderno.
theological_decisions:
- issue: Cómo reflejar la declaración de perdón sin convertirla en una fórmula doctrinalmente más cerrada que el griego
  english_pob_reading: Your sins are forgiven you
  chosen_spanish_reading: Tus pecados te son perdonados
  alternative_spanish_readings:
  - Tus pecados han sido perdonados
  - Tus pecados están perdonados
  rationale: La pasiva en español conserva la declaración de perdón como estado resultante de una acción cumplida, sin añadir un matiz temporal o teológico que el contexto no exige. Se mantiene la tensión entre declaración y resultado, como en la revisión inglesa.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido del texto griego y el audit trail inglés: conserva la comparación de facilidad, la declaración de perdón en pasiva, y el paralelo imperativo final sin introducir explicaciones adicionales. No se detectaron revisiones aplicadas en el contexto inglés reciente.'
  spanish_consistency_notes:
  - Se usa ‘Levántate’ por naturalidad y dignidad, coherente con el registro bíblico contemporáneo.
  - Se prefiere ‘pecados’ sobre alternativas como ‘faltas’ u ‘ofensas’ porque refleja mejor ἁμαρτίαι en este contexto.
  - La pasiva ‘te son perdonados’ evita depender del español con perfecto compuesto y mantiene la declarativa del griego.
  - La puntuación reproduce el contraste retórico del original con dos infinitivos introducidos por ‘decir’.
