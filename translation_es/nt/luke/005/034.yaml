translation:
  language: es
  text: 'Y él les dijo: «¿Acaso pueden hacer que los invitados de la boda[a] ayunen mientras el novio está con ellos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «los hijos de la cámara nupcial», un modismo para los compañeros del novio o los invitados de la boda.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ δύνασθε
  english_pob_choice: You cannot ... can you?
  chosen_spanish: ¿Pueden ...?
  alternatives_spanish:
  - ¿No pueden ...?
  - ¿Acaso pueden ...?
  lexicon: BDAG
  rationale: La partícula μή con indicativo en una pregunta espera una respuesta negativa. En español, el matiz retórico se puede conservar con una pregunta que no pide información, sino que presupone el 'no'. Dado que la forma más natural aquí es interrogativa, se mantiene el valor retórico sin forzar un calco como 'no pueden... ¿verdad?'.
- source_word: υἱοὺς τοῦ νυμφῶνος
  english_pob_choice: the wedding guests
  chosen_spanish: los hijos del banquete nupcial
  alternatives_spanish:
  - los hijos de la cámara nupcial
  - los invitados de la boda
  - los acompañantes del novio
  lexicon: BDAG
  rationale: Se conserva el giro idiomático 'hijos de...' porque el griego es literalmente 'los hijos del νυμφών'. 'Banquete nupcial' comunica en español el ámbito de la celebración sin reducirlo a una mera sala física, pero deja visible la rareza idiomática que el texto porta.
- source_word: νυμφῶνος
  english_pob_choice: wedding
  chosen_spanish: banquete nupcial
  alternatives_spanish:
  - bodas
  - cámara nupcial
  - fiesta de bodas
  lexicon: BDAG
  rationale: En el conjunto idiomático, νυμφών no señala principalmente el cuarto, sino el contexto de boda/celebración. 'Banquete nupcial' ofrece una equivalencia sobria y comprensible que conserva el tono festivo del pasaje.
- source_word: νυμφίος
  english_pob_choice: bridegroom
  chosen_spanish: novio
  alternatives_spanish:
  - esposo
  - desposado
  lexicon: BDAG
  rationale: '''Novio'' es el equivalente natural y ampliamente inteligible en español moderno para νυμφίος. Evita el arcaísmo de ''desposado'' y mantiene la imagen matrimonial sin explicitar una interpretación adicional.'
- source_word: μετ’ αὐτῶν ἐστιν
  english_pob_choice: is with them
  chosen_spanish: está con ellos
  alternatives_spanish:
  - está entre ellos
  - permanece con ellos
  lexicon: BDAG
  rationale: '''Está con ellos'' reproduce de forma directa la presencia del novio entre sus acompañantes, sin añadir matices no presentes en el griego.'
- source_word: ποιῆσαι νηστεῦσαι
  english_pob_choice: make ... fast
  chosen_spanish: hacer que ... ayunen
  alternatives_spanish:
  - causar que ... ayunen
  - hacerlos ayunar
  lexicon: BDAG
  rationale: ποιέω con infinitivo expresa causación. En español, 'hacer que ... ayunen' conserva de modo claro el valor causativo y evita perder el verbo verbalizado que aparece en el griego.
- source_word: νηστεῦσαι
  english_pob_choice: fast
  chosen_spanish: ayunen
  alternatives_spanish:
  - hagan ayuno
  - practiquen ayuno
  lexicon: BDAG
  rationale: '''Ayunar'' es el equivalente directo y más natural en español bíblico contemporáneo. Mantiene el sentido religioso sin expansión interpretativa.'
theological_decisions:
- issue: Imagen del novio/bridegroom aplicada en el dicho de Jesús
  english_pob_reading: Retain 'bridegroom' imagery without explicating its theological significance in the main text.
  chosen_spanish_reading: Conservar la imagen del novio sin explicitar en el cuerpo del texto su identificación teológica con Jesús.
  alternative_spanish_readings:
  - Hacer explícito que Jesús se presenta como el novio
  - Parafrasear para aclarar la referencia mesiánica
  rationale: El verso presenta la metáfora y su fuerza retórica; la traducción no debe resolverla ni ampliarla. Mantenerla intacta permite que el lector perciba la alusión sin introducir interpretación ajena al enunciado.
  doctrine_reference: Preservar la tensión teológica y la metáfora original.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al marcador [a] dentro del texto español y conservando el mismo alcance semántico del audit trail en inglés.
  spanish_consistency_notes:
  - Se mantuvo el tono interrogativo retórico con puntuación española.
  - '''Novio'' se eligió por naturalidad y fidelidad al título nupcial sin elevarlo a paráfrasis.'
  - Se preservó el carácter idiomático de 'hijos del banquete nupcial' con nota explicativa anclada.
  - Se evitó 'SEÑOR' y otras sustituciones no pertinentes porque el pasaje no contiene el nombre divino.
