review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura general del dicho y conserva el valor causativo de ποιῆσαι νηστεῦσαι con «hacer que … ayunen». También mantiene la imagen del «novio» y la nota sobre el modismo. Sin embargo, no sigue la decisión auditada del POB para υἱοὺς τοῦ νυμφῶνος, que en el texto principal debe comunicarse idiomáticamente como los acompañantes/invitados de la boda, no con el literalismo opaco «los hijos del banquete nupcial». Además, la pregunta griega con μή espera respuesta negativa; en español conviene marcar mejor esa fuerza retórica con «¿Acaso pueden…?» o equivalente.
  spanish_quality_summary: «Los hijos del banquete nupcial» suena poco natural y puede confundir al lector hispanohablante, porque no es un modismo español transparente. «Banquete nupcial» además desplaza la imagen desde el grupo de acompañantes hacia el evento. El resto del verso es claro y digno. Una reparación menor mejora fidelidad y legibilidad sin perder la alternativa literal en nota.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. «Novio» para νυμφίος y «ayunen» para νηστεῦσαι son adecuados. La principal desalineación es lexical: el POB documentó que υἱοὺς τοῦ νυμφῶνος debe expresarse idiomáticamente en el texto principal, reservando la forma literal para nota.'
  issues:
  - severity: medium
    issue: «los hijos del banquete nupcial» en el texto principal
    rationale: 'No preserva bien la racionalidad lexical documentada por el POB: el griego es un modismo para los compañeros del novio o invitados de la boda. En español, esta literalidad no es transparente y resulta más confusa que fiel.'
  - severity: low
    issue: Fuerza retórica de μή en la pregunta
    rationale: «¿Pueden…?» puede funcionar por contexto, pero «¿Acaso pueden…?» expresa mejor la expectativa de respuesta negativa señalada en el análisis del POB.
  revised_spanish_text: 'Y él les dijo: «¿Acaso pueden hacer que los invitados de la boda[a] ayunen mientras el novio está con ellos?»'
  revised_footnotes:
