translation:
  language: es
  text: Y dejando todo atrás[a], se levantó y lo siguió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo dejado todo, se levantó y lo siguió».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταλιπὼν
  english_pob_choice: leaving everything behind
  chosen_spanish: dejando todo atrás
  alternatives_spanish:
  - habiendo dejado todo
  - abandonando todo
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa respecto del verbo principal. «Dejando todo atrás» conserva la relación temporal y comunica en español una renuncia decisiva sin cargar el verbo con una fuerza más dura que la del griego.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo lo demás
  lexicon: BDAG
  rationale: El plural neutro abarca la totalidad de lo que dejó. «Todo» es la forma más natural en español y mantiene el alcance totalizante del original.
- source_word: ἀναστὰς
  english_pob_choice: he got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - levantándose
  - se puso de pie
  lexicon: BDAG
  rationale: En el contexto narrativo, el aoristo de ἀνίστημι indica que se incorporó para actuar. «Se levantó» reproduce bien el movimiento narrativo y es natural en español actual.
- source_word: ἠκολούθει
  english_pob_choice: followed him
  chosen_spanish: lo siguió
  alternatives_spanish:
  - iba siguiéndolo
  - empezó a seguirlo
  lexicon: BDAG
  rationale: El imperfecto puede expresar acción en curso; sin embargo, en este contexto la versión inglesa revisada optó por «followed» por fidelidad narrativa y fluidez. En español, «lo siguió» mantiene esa misma decisión sin sobreexplicar el aspecto verbal.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El pronombre griego remite a Jesús por el contexto inmediato. «Lo» preserva la cohesión pronominal del texto fuente sin introducir el nombre propio innecesariamente.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: La simple conjunción coordinante enlaza con la escena anterior. «Y» conserva la parataxis del griego sin añadir matiz interpretativo.
theological_decisions:
- issue: Alcance de la renuncia de Leví
  english_pob_reading: The text states that he left 'everything' and followed Jesus, without specifying a doctrine of permanent dispossession beyond the narrative moment.
  chosen_spanish_reading: El texto afirma que dejó «todo» y siguió a Jesús, sin definir una doctrina de desposesión permanente más allá del momento narrativo.
  alternative_spanish_readings:
  - dejó todo para siempre
  - solo dejó su trabajo temporalmente
  rationale: Se conserva la fuerza totalizante de πάντα, pero sin convertirla en una conclusión doctrinal que el versículo no formula explícitamente. La traducción mantiene la tensión entre respuesta radical y alcance narrativo limitado.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «followed him» frente a «began to follow him» por mayor exactitud léxica en este contexto. En español se reflejó esa misma decisión con «lo siguió», manteniendo también la imagen de la renuncia total («todo atrás») y el movimiento narrativo de «se levantó».
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aplica.
  - Se mantuvo el pronombre objeto directo «lo» para Jesús, evitando repetir el nombre sin necesidad.
  - «Todo» conserva la amplitud de πάντα sin suavizarla a una mera referencia parcial.
