  to: Y no hallando cómo introducirlo[a] por causa de la multitud, subieron a la azotea y lo bajaron con su camilla[c] a través de las tejas[b], en medio, delante de Jesús.
  rationale: Se ajusta «techo» a «azotea» para reflejar mejor δῶμα como parte superior accesible de la casa; «al medio» a «en medio» para un español más natural y fiel a εἰς τὸ μέσον; y se afina la nota [a] para preservar mejor el matiz auditado de modo y acceso.
