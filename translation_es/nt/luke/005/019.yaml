translation:
  language: es
  text: Y no hallando cómo introducirlo[a] por causa de la multitud, subieron a la azotea y lo bajaron con su camilla[c] a través de las tejas[b], en medio, delante de Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no hallando por dónde introducirlo por causa de la multitud». El modismo griego puede destacar tanto la manera como la vía de acceso.
    reason: lexical_alternative
  - marker: b
    text: Es decir, a través de las tejas del techo. La redacción de Lucas refleja una vivienda con cubierta de tejas.
    reason: cultural_note
  - marker: c
    text: O «con la pequeña cama» o «con la camilla». El término griego puede referirse a una cama pequeña, un lecho portátil o una camilla.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποίας
  english_pob_choice: a way
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - por dónde
  lexicon: BDAG
  rationale: En la expresión idiomática μὴ εὑρόντες ποίας εἰσενέγκωσιν, el griego plantea la pregunta de modo o acceso. «Cómo» reproduce naturalmente en español la idea de no hallar la manera de introducirlo, sin convertirla en una paráfrasis demasiado amplia.
- source_word: εἰσενέγκωσιν
  english_pob_choice: to bring him in
  chosen_spanish: introducirlo
  alternatives_spanish:
  - meterlo
  - llevarlo adentro
  lexicon: BDAG
  rationale: El verbo expresa hacer que entre. «Introducirlo» conserva el sentido de entrada sin sobreespecificar el modo físico, que el contexto ya deja claro.
- source_word: διὰ τὸν ὄχλον
  english_pob_choice: because of the crowd
  chosen_spanish: por causa de la multitud
  alternatives_spanish:
  - a causa de la multitud
  - por la multitud
  lexicon: BDAG
  rationale: Con διά + acusativo, el valor es causal. «Por causa de» refleja bien esa relación y mantiene el obstáculo como causa, no como simple ubicación espacial.
- source_word: ἀναβάντες ἐπὶ τὸ δῶμα
  english_pob_choice: they went up on the roof
  chosen_spanish: subieron al techo
  alternatives_spanish:
  - subieron a la azotea
  - subieron al terrado
  lexicon: BDAG
  rationale: δῶμα designa la azotea o techo accesible de una casa. «Techo» es natural en español y comunica la subida a la parte superior de la vivienda.
- source_word: διὰ τῶν κεράμων
  english_pob_choice: through the tiles
  chosen_spanish: a través de las tejas
  alternatives_spanish:
  - por entre las tejas
  - a través del tejado
  lexicon: BDAG
  rationale: κέραμος se refiere a teja de barro o arcilla. «Tejas» conserva el detalle arquitectónico de Lucas; se evita generalizar a «tejado», que diluye el material mencionado.
- source_word: καθῆκαν
  english_pob_choice: lowered
  chosen_spanish: lo bajaron
  alternatives_spanish:
  - lo descendieron
  - lo dejaron caer
  lexicon: BDAG
  rationale: El verbo indica movimiento descendente desde arriba. «Lo bajaron» es directo y fiel, y en español resulta más natural que un calco técnico.
- source_word: σὺν τῷ κλινιδίῳ
  english_pob_choice: with his mat
  chosen_spanish: con su camilla
  alternatives_spanish:
  - con su pequeña cama
  - con su litera
  lexicon: BDAG
  rationale: κλινίδιον es un diminutivo de cama/camilla. En este contexto de transporte de un enfermo, «camilla» comunica adecuadamente el objeto sobre el que lo llevaban, sin recurrir a un término demasiado doméstico como «estera».
- source_word: εἰς τὸ μέσον
  english_pob_choice: into the middle
  chosen_spanish: al medio
  alternatives_spanish:
  - en medio
  - al centro
  lexicon: BDAG
  rationale: La frase indica colocación en el espacio central. «Al medio» es breve y natural en español bíblico moderno, manteniendo la idea de llegar al centro de la reunión.
- source_word: ἔμπροσθεν τοῦ Ἰησοῦ
  english_pob_choice: in front of Jesus
  chosen_spanish: delante de Jesús
  alternatives_spanish:
  - frente a Jesús
  - ante Jesús
  lexicon: BDAG
  rationale: La preposición señala posición espacial. «Delante de Jesús» conserva esa relación de ubicación sin introducir matices judiciales o ceremoniales no requeridos por el contexto.
translation_notes:
  revision_awareness: Se revisó el pasaje contra el griego SBLGNT y el auditable texto inglés de POB. La versión española conserva el valor causal de διά + acusativo, el matiz de acceso de ποίας, el detalle cultural de las tejas y la ambigüedad léxica de κλινίδιον sin perder fluidez.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se eligió «tejas» para κέραμοι, preservando el detalle arquitectónico señalado en el audit trail inglés.
  - «Camilla» equilibra naturalidad y precisión para κλινίδιον en un contexto de traslado de un enfermo.
  - No se usó «SEÑOR» ni sustitutos reverenciales, porque el verso no contiene el nombre divino ni κύριος en esta unidad.
