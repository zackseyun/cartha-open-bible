translation:
  language: es
  text: Y he aquí[a] unos hombres que llevaban en una cama a un hombre que estaba paralizado, y procuraban introducirlo y ponerlo delante de él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Miren»; el griego ἰδού introduce una llamada de atención narrativa.
    reason: lexical_alternative
  - marker: b
    text: Es decir, delante de Jesús.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - miren
  - he aquí
  lexicon: BDAG
  rationale: La partícula deíctica exige una señal de atención narrativa. «Y he aquí» conserva el valor de sorpresa/encuadre del original y corresponde bien al tono de «behold» en la POB inglesa.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: unos hombres
  alternatives_spanish:
  - hombres
  - algunos hombres
  - personas
  lexicon: BDAG
  rationale: ἀνήρ designa varones adultos; «unos hombres» mantiene ese valor sin volver la frase demasiado pesada en español.
- source_word: φέροντες
  english_pob_choice: were carrying
  chosen_spanish: que llevaban
  alternatives_spanish:
  - que estaban llevando
  - que cargaban
  - que traían
  lexicon: BDAG
  rationale: El participio presente expresa acción en curso. «Que llevaban» comunica el movimiento continuo de manera natural en español.
- source_word: ἐπὶ κλίνης
  english_pob_choice: on a bed
  chosen_spanish: en una cama
  alternatives_spanish:
  - en una camilla
  - en un lecho
  - sobre una cama
  lexicon: BDAG
  rationale: κλίνη puede referirse a cama, lecho o camilla. La POB inglesa opta por «bed» como término directo; «cama» reproduce esa elección con claridad. No se impone «camilla» porque el griego no obliga a ese grado de especificación.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  lexicon: BDAG
  rationale: Aquí ἄνθρωπος se refiere a un individuo masculino concreto. «A un hombre» es la correspondencia más natural y precisa.
- source_word: παραλελυμένος
  english_pob_choice: was paralyzed
  chosen_spanish: estaba paralítico
  alternatives_spanish:
  - estaba paralizado
  - era paralítico
  - estaba postrado
  lexicon: BDAG
  rationale: El participio perfecto pasivo denota un estado resultante. «Estaba paralítico» expresa el estado sin añadir más de lo que el texto dice; «estaba paralizado» también sería posible, pero «paralítico» suena más idiomático en esta construcción.
- source_word: ἐζήτουν
  english_pob_choice: were seeking
  chosen_spanish: procuraban
  alternatives_spanish:
  - estaban procurando
  - buscaban
  - intentaban
  lexicon: BDAG
  rationale: El imperfecto marca esfuerzo continuo. «Procuraban» captura bien la intención perseverante y suena natural en español bíblico contemporáneo.
- source_word: εἰσενεγκεῖν
  english_pob_choice: to bring him in
  chosen_spanish: meterlo
  alternatives_spanish:
  - introducirlo
  - llevarlo adentro
  - hacerlo entrar
  lexicon: BDAG
  rationale: El verbo compuesto indica llevar hacia adentro. En este contexto, «meterlo» es breve y fiel al movimiento direccional; la idea de «llevarlo adentro» queda implícita por el contexto.
- source_word: θεῖναι
  english_pob_choice: set him
  chosen_spanish: poner
  alternatives_spanish:
  - colocarlo
  - ponerlo
  - dejarlo
  lexicon: BDAG
  rationale: τίθημι aquí significa colocar. En español, «poner» funciona bien con el complemento siguiente y no sobreespecifica postura o acción.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - frente a él
  - ante Jesús
  lexicon: BDAG
  rationale: La frase significa literalmente estar ante/al frente de alguien. «Delante de él» mantiene el pronombre del griego; aunque el referente narrativo es Jesús, la traducción conserva la forma pronominal del texto.
theological_decisions:
- issue: Referente de αὐτοῦ al final del versículo
  english_pob_reading: before him
  chosen_spanish_reading: delante de él
  alternative_spanish_readings:
  - delante de Jesús
  - ante él
  rationale: El contexto narrativo identifica a Jesús como referente, pero el texto griego usa pronombre, no nombre propio. Se conserva «él» para seguir de cerca el original y evitar una explicitación que el versículo no formula.
  doctrine_reference: Principio de transparencia textual y correspondencia formal de referentes
- issue: Valor aspectual del imperfecto ἐζήτουν
  english_pob_reading: were seeking
  chosen_spanish_reading: procuraban
  alternative_spanish_readings:
  - estaban procurando
  - buscaban
  - intentaban
  rationale: La acción es continua o persistente, no puntual. «Procuraban» preserva la insistencia de la escena sin convertir el verbo en una explicación interpretativa.
  doctrine_reference: Equivalencia aspectual griego-español
- issue: Sentido de κλίνη
  english_pob_reading: bed
  chosen_spanish_reading: cama
  alternative_spanish_readings:
  - camilla
  - lecho
  - couch
  rationale: El término puede abarcar cama/lecho/camilla. La POB inglesa ya documenta esa amplitud; «cama» es la opción más directa y la menos interpretativa en español. No se fuerza «camilla» porque no es exigido por el griego.
  doctrine_reference: Transparencia léxica y notas de alternativas
translation_notes:
  revision_awareness: La POB inglesa fue revisada y quedó sin cambios en su última pasada; esta propuesta española sigue ese estado estable y mantiene las mismas decisiones de fondo, adaptándolas al español con transparencia léxica y sin introducir paráfrasis nuevas.
  spanish_consistency_notes:
  - Se preserva el tono narrativo vivo con «Y he aquí».
  - Se mantiene el referente pronominal final («él») en vez de sustituirlo por «Jesús».
  - «Procuraban» conserva el aspecto progresivo del imperfecto mejor que un pretérito simple.
  - No se añade información clínica o instrumental no exigida por κλίνη; «cama» sigue la amplitud del término griego y la opción inglesa documentada.
