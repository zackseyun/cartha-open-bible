revisions:
- from: Y he aquí[a] unos hombres que llevaban en una cama a un hombre que estaba paralítico[b], y procuraban meterlo y ponerlo delante de él.
  to: Y he aquí[a] unos hombres que llevaban en una cama a un hombre que estaba paralizado, y procuraban introducirlo y ponerlo delante de él[b].
  rationale: Se corrige la nota espacial incorrecta ('antes de Jesús' > 'delante de Jesús'), se eleva el registro de εἰσενεγκεῖν con 'introducirlo', y se mejora la naturalidad de παραλελυμένος con 'estaba paralizado'. El resto del versículo conserva fielmente el sentido del griego y las decisiones auditadas de la POB inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:54:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro POB en la mayoría de los elementos clave: conserva la partícula discursiva ἰδού, mantiene ''hombres'' para ἄνδρες, refleja la acción continua de φέροντες/ἐζήτουν, preserva el pronombre en ἐνώπιον αὐτοῦ y no explicita indebidamente ''Jesús'' en el texto principal. Sin embargo, hay dos problemas puntuales: la nota [b] dice ''antes de Jesús'', que no corresponde a ἐνώπιον αὐτοῦ ni al inglés ''before Jesus''; debe ser ''delante de Jesús'' o equivalente. Además, ''meterlo'' resulta algo coloquial y menos digno para este registro; ''entrarlo'' no sirve, pero ''introducirlo'' o ''hacerlo entrar'' refleja mejor εἰσενεγκεῖν en español bíblico claro.'
  spanish_quality_summary: El texto es generalmente natural y legible, con tono bíblico contemporáneo. 'Y he aquí' funciona, aunque 'he aquí' solo también sería posible. 'Estaba paralítico' es comprensible, pero en español actual eclesial 'estaba paralizado' suele sonar más natural que el adjetivo 'paralítico', que puede sentirse más etiquetador que descriptivo del estado. 'Meterlo' es el punto de menor calidad estilística por su tono más coloquial. La nota [b] contiene una formulación incorrecta en español ('antes de Jesús').
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto en este versículo. Las decisiones léxicas principales están bien encaminadas: ''hombres'', ''cama'', ''hombre'', ''delante de él''. Recomiendo ajustar εἰσενεγκεῖν a ''introducirlo'' y παραλελυμένος a ''estaba paralizado'' por claridad y dignidad estilística, sin alterar el sentido.'
  issues:
  - severity: high
    issue: La nota [b] dice 'antes de Jesús'.
    rationale: '''Antes de'' en español normalmente expresa prioridad temporal, no ubicación espacial. El griego ἐνώπιον αὐτοῦ significa ''delante de él'' / ''ante él''. La nota debe decir ''delante de Jesús'' o similar.'
  - severity: medium
    issue: '''Meterlo'' para εἰσενεγκεῖν suena demasiado coloquial.'
    rationale: Aunque capta la dirección hacia adentro, baja el registro del pasaje y no es la opción más digna ni la más clara para una Biblia de lectura eclesial amplia. 'Introducirlo' conserva el sentido y el tono.
  - severity: low
    issue: '''Estaba paralítico'' es menos natural que ''estaba paralizado''.'
    rationale: Ambas opciones pueden comunicar el estado, pero 'paralizado' expresa con más claridad el resultado del participio perfecto pasivo παραλελυμένος en español contemporáneo neutral.
  revised_spanish_text: Y he aquí[a] unos hombres que llevaban en una cama a un hombre que estaba paralizado, y procuraban introducirlo y ponerlo delante de él[b].
  revised_footnotes:
  - marker: a
    text: O «Miren»; el griego ἰδού introduce una llamada de atención narrativa.
    reason: lexical_alternative
  - marker: b
    text: Es decir, delante de Jesús.
    reason: alternative_reading
  revision_rationale: Se corrige la nota espacial incorrecta ('antes de Jesús' > 'delante de Jesús'), se eleva el registro de εἰσενεγκεῖν con 'introducirlo', y se mejora la naturalidad de παραλελυμένος con 'estaba paralizado'. El resto del versículo conserva fielmente el sentido del griego y las decisiones auditadas de la POB inglesa.
