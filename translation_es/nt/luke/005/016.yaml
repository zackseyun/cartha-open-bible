translation:
  language: es
  text: Pero él se retiraba en lugares desiertos y oraba[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «él mismo se estaba retirando en lugares desiertos y orando». El griego usa, más literalmente, una construcción imperfecta con participios, que expresa acción continua o habitual.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: El pronombre es explícito en griego y añade un matiz de énfasis ligero. En español, «él» suena natural y mantiene la referencia sin sobrecargar la frase; el énfasis queda suficientemente sugerido por el contexto y por «Pero».
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ introduce una leve transición o contraste narrativo. «Pero» reproduce bien ese matiz en español y encaja con el flujo de la oración.
- source_word: ἦν ὑποχωρῶν
  english_pob_choice: would withdraw
  chosen_spanish: se retiraba
  alternatives_spanish:
  - se estaba retirando
  - solía retirarse
  - se apartaba
  lexicon: BDAG
  rationale: La construcción imperfecta con participio presente expresa acción continua o habitual en pasado. «Se retiraba» conserva ese valor habitual sin sonar forzado en español.
- source_word: ἐν ταῖς ἐρήμοις
  english_pob_choice: in the wilderness
  chosen_spanish: en los desiertos
  alternatives_spanish:
  - en el desierto
  - en lugares desiertos
  - en lugares solitarios
  lexicon: BDAG
  rationale: ἔρημος en plural se refiere a lugares deshabitados, solitarios o desolados. «En los desiertos» mantiene el plural y la preposición «en», aunque en español puede evocar tanto zonas desérticas como parajes desolados; por eso se conserva esa amplitud semántica.
- source_word: προσευχόμενος
  english_pob_choice: pray
  chosen_spanish: oraba
  alternatives_spanish:
  - estaba orando
  - orando
  - rezaba
  lexicon: BDAG
  rationale: El participio presente coordinado con el imperfecto expresa una actividad concomitante y habitual. «Oraba» comunica de manera natural y reverente la acción de orar sin añadir matices aspectuales ajenos al español.
theological_decisions:
- issue: Carácter habitual de la acción de Jesús
  english_pob_reading: The verse describes Jesus' customary practice of withdrawing for prayer, not merely a single occasion.
  chosen_spanish_reading: 'El versículo presenta una práctica habitual de Jesús: se retiraba para orar, no solo una ocasión aislada.'
  alternative_spanish_readings:
  - Describe un retiro y una oración puntuales.
  - Menciona una escena concreta sin implicar costumbre.
  rationale: La gramática griega (ἦν + participios presentes) favorece una lectura iterativa o habitual. La traducción española debe conservar ese valor narrativo, porque tiene relevancia para el retrato de la vida de oración de Jesús, sin convertirlo en una afirmación doctrinal adicional.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Se siguió el mismo ajuste auditado que en el inglés: mantener la preposición «en» y reflejar el plural de ἐρήμοις de modo más directo que una paráfrasis como «a lugares desiertos». En español se optó por «se retiraba» y «oraba» para conservar la lectura habitual sin sonar mecánico.'
  spanish_consistency_notes:
  - Se mantiene «Pero» para δέ como contraste suave.
  - Se conserva el valor habitual del imperfecto griego con un imperfecto español natural.
  - «Desiertos» traduce ἐρήμοις con amplitud semántica, sin fijar indebidamente la imagen en un bioma específico.
  - «Oraba» se usa como equivalente digno y comprensible de προσευχόμενος en un contexto cristiano de lectura pública.
