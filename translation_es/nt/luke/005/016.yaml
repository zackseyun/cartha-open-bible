  spanish_quality_summary: La frase es clara, pero «en los desiertos» resulta algo rígida y poco idiomática para un registro bíblico natural en español general. «En lugares desiertos» mantiene la preposición «en», refleja mejor el plural griego y evita una imagen geográfica demasiado estrecha. El resto del verso es legible y digno.
