translation:
  language: es
  text: 'Y nadie, después de beber vino añejo, quiere el nuevo, porque dice: «El añejo es bueno[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «El añejo es mejor».'
    reason: textual_variant
lexical_decisions:
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  - ninguna persona
  lexicon: BDAG
  rationale: οὐδεὶς es un indefinido negativo genérico. En español, «nadie» transmite de forma natural y directa la referencia universal sin introducir género ni un giro pesado.
- source_word: πιὼν
  english_pob_choice: after drinking
  chosen_spanish: después de beber
  alternatives_spanish:
  - habiendo bebido
  - cuando ha bebido
  lexicon: BDAG
  rationale: El participio aoristo marca una acción anterior a la principal. «Después de beber» expresa esa anterioridad de modo idiomático en español sin forzar la sintaxis.
- source_word: παλαιὸν
  english_pob_choice: old wine
  chosen_spanish: vino añejo
  alternatives_spanish:
  - vino viejo
  - añejo
  lexicon: BDAG
  rationale: Aunque el sustantivo «vino» no aparece de nuevo en el griego, está implícito por el contexto inmediato. «Añejo» es el equivalente más natural para vino envejecido y evita la dureza de «vino viejo».
- source_word: θέλει
  english_pob_choice: wants
  chosen_spanish: quiere
  alternatives_spanish:
  - desea
  - prefiere
  - está dispuesto a
  lexicon: BDAG
  rationale: θέλω expresa preferencia o deseo. «Quiere» es la correspondencia más común y sobria en español, y mantiene el tono proverbial.
- source_word: νέον
  english_pob_choice: new
  chosen_spanish: el nuevo
  alternatives_spanish:
  - vino nuevo
  - nuevo
  lexicon: BDAG
  rationale: El adjetivo funciona elípticamente por «vino nuevo». En español, «el nuevo» conserva esa elipsis, que ya resulta comprensible por el contexto.
- source_word: λέγει γάρ
  english_pob_choice: for he says
  chosen_spanish: porque dice
  alternatives_spanish:
  - pues dice
  - ya que dice
  lexicon: BDAG
  rationale: γάρ introduce la razón de la afirmación previa. «Porque dice» conserva la relación explicativa en un español natural.
- source_word: Ὁ παλαιὸς
  english_pob_choice: The old
  chosen_spanish: El añejo
  alternatives_spanish:
  - El viejo
  - El vino añejo
  lexicon: BDAG
  rationale: La segunda cláusula omite el sustantivo «vino» también en griego. «El añejo» preserva la concisión proverbial y, en español, comunica mejor que «el viejo» el sentido favorable aplicado al vino.
- source_word: χρηστός
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - mejor
  - agradable
  - apropiado
  - sabroso
  lexicon: BDAG
  rationale: χρηστός aquí califica favorablemente al vino viejo. «Bueno» es la opción amplia y menos interpretativa. No se traslada la lectura comparativa «mejor» al texto principal porque el griego base leído aquí no la exige.
theological_decisions:
- issue: Traducción de χρηστός en un refrán sobre vino viejo y nuevo
  english_pob_reading: good
  chosen_spanish_reading: bueno
  alternative_spanish_readings:
  - mejor
  rationale: El texto griego impreso lee χρηστός, cuyo sentido directo es «bueno», «útil» o «agradable». Traducir «mejor» importaría al cuerpo del texto una comparación que pertenece a una variante textual/tradición alternativa, no al testimonio base aquí seguido. La alternativa se conserva solo en nota.
  doctrine_reference: §1; §3 de la filosofía de traducción
- issue: Valor temporal del participio πιὼν
  english_pob_reading: after drinking
  chosen_spanish_reading: después de beber
  alternative_spanish_readings:
  - habiendo bebido
  rationale: 'No se trata de una diferencia doctrinal, sino de precisión aspectual: el participio antecede a la acción principal. «Después de beber» mantiene la relación temporal sin sobrerreproducir la estructura griega.'
  doctrine_reference: §1; §2 de la filosofía de traducción
translation_notes:
  revision_awareness: Se revisó el paquete fuente original griego, la traducción inglesa POB y su nota textual. No hubo revisiones aplicadas en el pase más reciente; el acuerdo de control cruzado fue alto y estable, por lo que la redacción española sigue de cerca el texto base griego y reserva la variante comparativa para la nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el nombre divino ni una cita directa del tetragrama.
  - Se prefirió «bueno» en el texto principal para reflejar χρηστός, dejando «mejor» solo como variante textual.
  - «El nuevo» conserva la elipsis griega y resulta comprensible por el contexto inmediato del vino.
