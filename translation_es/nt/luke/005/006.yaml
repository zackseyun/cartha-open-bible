base_translation:
  language: en
  yaml_path: translation/nt/luke/005/006.yaml
  text: And when they had done this[a], they enclosed a great multitude of fish[b], and their nets were tearing.
  footnotes:
  - marker: a
    text: Or 'they caught a large number of fish.' The Greek verb more literally means 'they enclosed' or 'shut in,' highlighting the image of the fish being surrounded in the nets.
    reason: lexical_alternative
  - marker: b
    text: Or 'their nets were beginning to tear.' The Greek imperfect verb portrays the tearing as in progress, not necessarily completed.
    reason: lexical_alternative
