translation:
  language: es
  text: Y cuando hicieron esto, encerraron una gran multitud de peces[a], y sus redes comenzaban a romperse[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atraparon una gran cantidad de peces». El verbo griego más literalmente significa «encerraron» o «rodearon», destacando la imagen de los peces cercados por las redes.
    reason: lexical_alternative
  - marker: b
    text: O «sus redes empezaban a romperse». El verbo griego en imperfecto presenta la rotura como un proceso en curso, no necesariamente ya consumado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσαντες
  english_pob_choice: when they had done
  chosen_spanish: cuando hicieron esto
  alternatives_spanish:
  - después de hacerlo
  - cuando lo hubieron hecho
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal y expresa secuencia temporal. «Cuando hicieron esto» conserva esa relación de tiempo de manera natural en español, sin añadir más contenido del que ofrece el griego.
- source_word: συνέκλεισαν
  english_pob_choice: they enclosed
  chosen_spanish: encerraron
  alternatives_spanish:
  - enclosaron
  - cogieron
  - atraparon
  lexicon: BDAG
  rationale: El verbo comunica la idea de rodear o meter dentro de un límite. «Encerraron» preserva la imagen de los peces contenidos por las redes mejor que «atraparon», que sería más interpretativo y menos visual.
- source_word: πλῆθος ἰχθύων πολύ
  english_pob_choice: a great multitude of fish
  chosen_spanish: una gran multitud de peces
  alternatives_spanish:
  - una gran cantidad de peces
  - muchos peces
  - una gran muchedumbre de peces
  lexicon: BDAG
  rationale: La construcción intensifica la abundancia. «Gran multitud» refleja tanto πλῆθος como πολύ y mantiene el énfasis en la cantidad extraordinaria.
- source_word: διερρήσσετο
  english_pob_choice: were tearing
  chosen_spanish: se estaban rompiendo
  alternatives_spanish:
  - se estaban desgarrando
  - estaban por romperse
  - se estaban rasgando
  lexicon: BDAG
  rationale: El imperfecto marca un proceso en curso. «Se estaban rompiendo» comunica la tensión progresiva de las redes sin afirmar necesariamente que ya se hubieran roto del todo.
- source_word: τὰ δίκτυα αὐτῶν
  english_pob_choice: their nets
  chosen_spanish: sus redes
  alternatives_spanish:
  - las redes de ellos
  - sus mallas
  lexicon: BDAG
  rationale: El plural debe mantenerse porque el griego dice redes en plural. «Sus redes» es la forma idiomática y transparente en español.
translation_notes:
  revision_awareness: 'Coincide con el pasaje griego de Lucas 5:6 y con la línea de la POB inglesa: secuencia temporal del participio, imagen de las redes que encierran a los peces, abundancia intensificada y verbo imperfecto para el desgarrarse progresivo de las redes.'
  spanish_consistency_notes:
  - Se conservó el plural «redes» para reflejar τὰ δίκτυα.
  - Se evitó una traducción que sugiriera ruptura completa; el imperfecto permite un proceso en curso.
  - El tono es sobrio y publicable, sin añadir elementos narrativos ajenos al texto.
