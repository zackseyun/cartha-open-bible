    rationale: La nota inglesa en [a] explica la alternativa 'caught a large number of fish' y el sentido literal 'enclosed/shut in'. La nota española actual se centra en ποιήσαντες y desplaza el foco respecto de la documentación inglesa.
  - severity: low
    issue: '''Se estaban rompiendo'' es menos idiomático que una formulación incoativa'
    rationale: En español narrativo, 'comenzaban a romperse' o 'empezaban a desgarrarse' comunica mejor que la rotura estaba en proceso sin sonar tan perifrástico.
  revised_spanish_text: Y cuando hicieron esto, encerraron una gran multitud de peces[a], y sus redes comenzaban a romperse[b].
