translation:
  language: es
  text: Y vio dos barcas que estaban junto al lago; pero los pescadores, habiendo bajado de ellas[a], lavaban las redes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo desembarcado de ellas».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδεν
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  lexicon: BDAG
  rationale: El aoristo de ὁράω en narrativa se expresa de manera natural con «vio». «Miró» o «observó» introducen una matización de atención que el griego no exige.
- source_word: πλοῖα
  english_pob_choice: boats
  chosen_spanish: barcas
  alternatives_spanish:
  - barcos
  - naves
  lexicon: BDAG
  rationale: En el contexto de la pesca en el lago, «barcas» comunica mejor el tipo de embarcación que «barcos», que suena más grande y marítimo en español.
- source_word: ἑστῶτα
  english_pob_choice: standing
  chosen_spanish: que estaban
  alternatives_spanish:
  - que permanecían
  - amarradas
  lexicon: BDAG
  rationale: El participio perfecto de ἵστημι expresa estado estacionario. En español, «que estaban» es la forma más natural y transparente; «amarradas» sería más específico de lo que el griego dice.
- source_word: παρὰ τὴν λίμνην
  english_pob_choice: by the lake
  chosen_spanish: junto al lago
  alternatives_spanish:
  - al lado del lago
  - a orillas del lago
  lexicon: BDAG
  rationale: «Junto al lago» conserva la relación espacial de παρά con acusativo sin añadir una precisión costera que no está explícita. «A orillas del lago» suena posible, pero interpreta más el escenario.
- source_word: οἱ δὲ ἁλιεῖς
  english_pob_choice: but the fishermen
  chosen_spanish: pero los pescadores
  alternatives_spanish:
  - y los pescadores
  - ahora los pescadores
  lexicon: BDAG
  rationale: «Pero» refleja el leve contraste de δέ y el cambio de foco escénico. «Pescadores» es la equivalencia directa y adecuada del oficio.
- source_word: ἀπ’ αὐτῶν ἀποβάντες
  english_pob_choice: having gotten out of them
  chosen_spanish: habiendo bajado de ellas
  alternatives_spanish:
  - habiendo desembarcado de ellas
  - después de salir de ellas
  lexicon: BDAG
  rationale: El participio aoristo marca una acción anterior a la principal. «Habiendo bajado de ellas» preserva esa relación temporal con naturalidad en español. «Desembarcado» es válido, pero algo más técnico.
- source_word: ἔπλυνον
  english_pob_choice: were washing
  chosen_spanish: lavaban
  alternatives_spanish:
  - estaban lavando
  - lavaban continuamente
  lexicon: BDAG
  rationale: El imperfecto indica una acción en curso. En español, el imperfecto simple «lavaban» comunica bien esa duratividad sin sobrecargar la frase con perífrasis.
- source_word: τὰ δίκτυα
  english_pob_choice: the nets
  chosen_spanish: las redes
  alternatives_spanish:
  - las mallas
  - sus redes
  lexicon: BDAG
  rationale: «Redes» es el equivalente directo de δίκτυα. Se evita añadir el posesivo «sus» porque no está en el griego, aunque está implícito por contexto.
translation_notes:
  revision_awareness: 'Se siguió de cerca la estructura griega: una observación inicial, luego un contraste con δέ, y finalmente el participio aoristo anterior al verbo principal en imperfecto. La redacción española mantiene el orden natural sin perder la relación temporal ni la escena continua.'
  spanish_consistency_notes:
  - Se prefirió «barcas» por el contexto lacustre y pesquero.
  - No se introdujo posesivo en «las redes», porque el griego tampoco lo expresa explícitamente.
  - Se conservó el matiz aspectual del imperfecto con «lavaban».
  - El participio aoristo se reflejó con una construcción de anterioridad («habiendo bajado»), no con un pasado simple independiente.
