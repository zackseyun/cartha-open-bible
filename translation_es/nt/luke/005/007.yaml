translation:
  language: es
  text: Así que les hicieron señas[a] a sus socios en la otra barca para que vinieran a ayudarles[b]. Y vinieron, y llenaron ambas barcas, de tal modo que comenzaban a hundirse[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les hicieron un gesto» o «los llamaron con señas».
    reason: lexical_alternative
  - marker: b
    text: O «para que vinieran a asistirles»; literalmente, «para venir a ayudarles».
    reason: lexical_alternative
  - marker: c
    text: O «de tal modo que se hundían».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατένευσαν
  english_pob_choice: signaled
  chosen_spanish: les hicieron señas
  alternatives_spanish:
  - señalaron
  - les hicieron un gesto
  - les beckonaron
  lexicon: BDAG
  rationale: El verbo comunica una acción visible a distancia; en español, «hacer señas» expresa con naturalidad el gesto intencional en un contexto náutico, sin perder la idea de señal no verbal.
- source_word: μετόχοις
  english_pob_choice: partners
  chosen_spanish: compañeros
  alternatives_spanish:
  - socios
  - compañeros de trabajo
  - asociados
  lexicon: BDAG
  rationale: En el contexto de pesca compartida, el término puede referirse a colaboradores o asociados. «Compañeros» conserva la relación práctica sin introducir un matiz comercial demasiado fuerte en el texto principal.
- source_word: ἐν τῷ ἑτέρῳ πλοίῳ
  english_pob_choice: in the other boat
  chosen_spanish: en la otra barca
  alternatives_spanish:
  - en el otro bote
  - en la segunda barca
  lexicon: BDAG
  rationale: «Otra» refleja bien ἕτερος como distinción dentro de la escena. «Barca» es más natural en español bíblico contemporáneo para una embarcación de pesca pequeña.
- source_word: τοῦ ἐλθόντας συλλαβέσθαι αὐτοῖς
  english_pob_choice: to come and help them
  chosen_spanish: para que vinieran a ayudarles
  alternatives_spanish:
  - para venir a ayudarles
  - para que acudieran a ayudarles
  - para que vinieran a asistirles
  lexicon: BDAG
  rationale: La construcción expresa propósito. «Vinieran a ayudarles» comunica de forma fluida el valor final sin forzar una traducción demasiado literal de la sintaxis griega.
- source_word: συλλαβέσθαι
  english_pob_choice: help
  chosen_spanish: ayudarles
  alternatives_spanish:
  - asistirles
  - socorrerles
  - tomar parte con ellos
  lexicon: BDAG
  rationale: El sentido aquí es colaborar activamente en la faena de recoger la pesca. «Ayudarles» es la opción más clara y fiel para el lector en español.
- source_word: ἔπλησαν
  english_pob_choice: filled
  chosen_spanish: llenaron
  alternatives_spanish:
  - colmataron
  - cargaron
  - llenaron por completo
  lexicon: BDAG
  rationale: El verbo significa llenar; en contexto se entiende que las barcas se llenaron de la captura. «Llenaron» mantiene la imagen sin añadir elementos no explicitados.
- source_word: ἀμφότερα τὰ πλοῖα
  english_pob_choice: both boats
  chosen_spanish: ambas barcas
  alternatives_spanish:
  - las dos barcas
  - ambos botes
  lexicon: BDAG
  rationale: «Ambas» reproduce con precisión ἀμφότερα y suena natural en español formal. «Barcas» mantiene la imagen de embarcaciones pequeñas propias de la escena.
- source_word: ὥστε βυθίζεσθαι αὐτά
  english_pob_choice: so that they began to sink
  chosen_spanish: de tal modo que comenzaban a hundirse
  alternatives_spanish:
  - hasta el punto de que empezaban a hundirse
  - de manera que estaban hundiéndose
  - de tal modo que iban hundiéndose
  lexicon: BDAG
  rationale: La cláusula de resultado con infinitivo presente sugiere proceso en desarrollo. «Comenzaban a hundirse» preserva ese carácter inceptivo/resultativo sin afirmar que ya se hubieran hundido.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la última pasada de revisión: no se detectan cambios sustanciales respecto del sentido del griego ni del audit trail inglés. Se mantiene la resolución inceptiva de la última cláusula y la lectura relacional de μετόχοις como colaboradores de pesca.'
  spanish_consistency_notes:
  - Se mantuvo «barca» por coherencia con el contexto de pesca y por naturalidad en español bíblico actual.
  - Se evitó «SEÑOR» u otras convenciones de ocultamiento del nombre divino porque el versículo no las requiere.
  - Se conservó una equivalencia dinámica controlada para la finalidad y el resultado, sin exceder el contenido del griego.
