translation:
  language: es
  text: Pero vino nuevo hay que ponerlo en odres frescos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vino nuevo hay que ponerlo en odres nuevos». El griego usa dos adjetivos distintos: νέος («nuevo», sobre todo en tiempo) para el vino y καινός («nuevo/fresco», sobre todo en calidad o condición) para los odres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sino
  lexicon: BDAG
  rationale: Conjunción adversativa que contrapone la acción apropiada frente a la implicada antes. «Pero» es natural y claro en español actual.
- source_word: οἶνον νέον
  english_pob_choice: new wine
  chosen_spanish: vino nuevo
  alternatives_spanish:
  - vino recién hecho
  - vino fresco
  lexicon: BDAG
  rationale: «νέον» califica directamente al vino; «vino nuevo» conserva la expresión directa y tradicional sin perder el sentido de vino recién producido.
- source_word: εἰς
  english_pob_choice: into
  chosen_spanish: en
  alternatives_spanish:
  - dentro de
  - hacia
  lexicon: BDAG
  rationale: En español, con objetos contenedores, «poner ... en» comunica de forma natural la idea direccional de introducir algo en un recipiente.
- source_word: ἀσκοὺς
  english_pob_choice: wineskins
  chosen_spanish: odres
  alternatives_spanish:
  - odres de vino
  - pieles
  lexicon: BDAG
  rationale: «ἀσκός» designa recipientes de piel para líquidos. «Odres» es el equivalente español natural y suficientemente preciso; el contexto ya especifica el uso para vino.
- source_word: καινοὺς
  english_pob_choice: fresh
  chosen_spanish: nuevos
  alternatives_spanish:
  - frescos
  - recién hechos
  lexicon: BDAG
  rationale: La POB inglesa distingue aquí μεταξύ νέος y καινός, pero en español «nuevos» es la forma más directa para conservar la correspondencia léxica visible con «vino nuevo». «Frescos» sería interpretativo y podría ocultar la repetición deliberada del texto griego.
- source_word: βλητέον
  english_pob_choice: must be put
  chosen_spanish: hay que poner
  alternatives_spanish:
  - debe ponerse
  - se debe poner
  lexicon: BDAG
  rationale: El adjetivo verbal expresa necesidad/obligación. «Hay que poner» reproduce bien el valor impersonal y suena natural en español contemporáneo.
theological_decisions:
- issue: Distinción entre νέος y καινός en la misma frase
  english_pob_reading: Render νέος as 'new' and καινός as 'fresh'
  chosen_spanish_reading: Traducir ambos con formas de «nuevo», sin forzar una equivalencia semántica distinta en el texto principal
  alternative_spanish_readings:
  - vino nuevo ... odres frescos
  - vino nuevo ... odres nuevos
  rationale: El griego usa dos adjetivos diferentes, pero en español la distinción «nuevo/fresco» sobre los recipientes puede sonar menos natural o desplazar el paralelo. Se preserva la repetición léxica visible; la nota explica la diferencia original.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception; Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: Coincide con el texto fuente griego y con la lectura auditada en inglés; no se requirieron revisiones posteriores en el registro base.
  spanish_consistency_notes:
  - Se mantuvo «vino nuevo» para οἶνον νέον, en continuidad con la terminología bíblica común y con la correspondencia formal del griego.
  - Se eligió «odres» para ἀσκούς como término idiomático y culturalmente reconocible en español.
  - La nota conserva la distinción léxica del griego entre νέος y καινός, aunque el texto principal la resuelve con una formulación más natural en español.
