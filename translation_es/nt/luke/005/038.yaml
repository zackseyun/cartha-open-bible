  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: ἀλλὰ = «Pero», οἶνον νέον = «vino nuevo», εἰς ... = «en», ἀσκοὺς = «odres», y βλητέον = una necesidad impersonal bien expresada por «hay que ponerlo». Sin embargo, no preserva en el texto principal la distinción léxica documentada en la auditoría inglesa entre νέος («nuevo») para el vino y καινός («fresh/fresco») para los odres. Dado que la POB inglesa hizo de esa distinción una decisión explícita y teológicamente/lexicalmente motivada, el español debe procurar conservarla si puede hacerse con buena naturalidad.'
  spanish_quality_summary: «Pero vino nuevo hay que ponerlo en odres nuevos» es claro y natural, pero «odres frescos» también es comprensible y permite reflejar mejor el contraste semántico del original y de la decisión auditada en inglés. La nota actual además presenta como alternativa justamente la forma que conviene subir al texto principal. Con ese ajuste, el español queda fiel, legible y más alineado con la filosofía de equivalencia óptima.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la fidelidad a la distinción entre νέος y καινός. «Odres» es terminología adecuada. «Hay que ponerlo» respeta bien el valor impersonal de βλητέον.
