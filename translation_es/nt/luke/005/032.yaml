translation:
  language: es
  text: No he venido a llamar a los justos, sino a los pecadores al arrepentimiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para arrepentimiento». La frase griega εἰς μετάνοιαν expresa propósito o meta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλήλυθα
  english_pob_choice: I have not come
  chosen_spanish: No he venido
  alternatives_spanish:
  - No vine
  - No he llegado
  lexicon: BDAG
  rationale: El perfecto de ἔρχομαι expresa una acción llegada a su estado presente; en español, «he venido» comunica de forma natural la idea de presencia derivada de la venida y mantiene el matiz de propósito de la declaración de Jesús.
- source_word: καλέσαι
  english_pob_choice: to call
  chosen_spanish: a llamar
  alternatives_spanish:
  - a invitar
  - a convocar
  lexicon: BDAG
  rationale: «Llamar» reproduce de manera directa el verbo de propósito del griego y conserva el vínculo con el lenguaje de llamada/sucesión en los Evangelios sin restringirlo a una invitación meramente social.
- source_word: δικαίους
  english_pob_choice: the righteous
  chosen_spanish: a los justos
  alternatives_spanish:
  - a los rectos
  - a los justificados
  lexicon: BDAG
  rationale: Como adjetivo sustantivado, δικαίους designa a «los justos». En español, «justos» es la opción más natural y conserva la categoría moral/religiosa sin resolver la tensión teológica de si se trata de justos reales o considerados como tales.
- source_word: ἁμαρτωλοὺς
  english_pob_choice: sinners
  chosen_spanish: a los pecadores
  alternatives_spanish:
  - a los hombres pecadores
  lexicon: BDAG
  rationale: «Pecadores» es el equivalente sustantivado normal y más claro para ἁμαρτωλούς, y mantiene la fuerza social y moral del término en el contexto lucano.
- source_word: εἰς μετάνοιαν
  english_pob_choice: to repentance
  chosen_spanish: al arrepentimiento
  alternatives_spanish:
  - para arrepentimiento
  - para que se arrepientan
  lexicon: BDAG
  rationale: La preposición εἰς con el acusativo marca meta o propósito. En español, «al arrepentimiento» reproduce de forma concisa y natural esa finalidad, conservando el sustantivo y evitando convertirlo en verbo.
theological_decisions:
- issue: Si el contraste «los justos / los pecadores» debe atenuarse con una glosa interpretativa
  english_pob_reading: Retain the literal categories 'the righteous' and 'sinners' without interpretive qualification.
  chosen_spanish_reading: Mantener «los justos» y «los pecadores» sin aclaración interpretativa dentro del texto.
  alternative_spanish_readings:
  - los que se consideran justos
  - los que creen ser justos
  rationale: El griego presenta la oposición sin marcas explícitas de ironía o corrección. La traducción debe preservar esa tensión, dejando que el contexto amplio la ilumine sin resolverla dentro del versículo.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El audit trail inglés revisó una solución previa de «a un cambio de mente» y la sustituyó por «to repentance» por ser más exacta y natural para μετάνοιαν. La presente versión sigue esa revisión y la traslada al español con «arrepentimiento».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «justos» en vez de «rectos» para conservar la categoría sustantivada más natural en español y alineada con el griego.
  - Se evitó «invitar» porque el verbo καλέω en este contexto tiene fuerza de llamado, no solo de cortesía.
  - La nota al pie conserva la alternativa semántica de propósito reflejada en el audit trail inglés.
