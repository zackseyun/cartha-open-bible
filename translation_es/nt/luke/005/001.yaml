- from: Ahora bien, sucedió que, mientras la multitud se apretaba contra él y escuchaba la palabra de Dios[a], él estaba de pie junto al lago de Gennesaret[b],
  to: Ahora bien, sucedió que mientras la multitud se agolpaba sobre él y escuchaba la palabra de Dios[a], él estaba de pie junto al lago de Genesaret[b],
