translation:
  language: es
  text: Ahora bien, sucedió que mientras la multitud se agolpaba sobre él y escuchaba la palabra de Dios[a], él estaba de pie junto al lago de Genesaret[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando la multitud se agolpaba sobre él y oía la palabra de Dios».
    reason: lexical_alternative
  - marker: b
    text: Genesaret es el lago también conocido como el mar de Galilea.
    reason: cultural_note
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now it happened that
  chosen_spanish: Ahora bien, sucedió que
  alternatives_spanish:
  - Y sucedió que
  - Ahora sucedió que
  lexicon: BDAG
  rationale: Conserva la fórmula narrativa introductoria de Lucas sin sonar rígida. «Ahora bien» representa suavemente δέ y mantiene el tono de transición narrativa.
- source_word: ἐν τῷ ... ἐπικεῖσθαι ... καὶ ἀκούειν
  english_pob_choice: while the crowd was pressing in on him and listening
  chosen_spanish: mientras la multitud se apretaba contra él y escuchaba
  alternatives_spanish:
  - cuando la multitud se apretaba contra él y oía
  - mientras la multitud lo presionaba y escuchaba
  lexicon: BDAG
  rationale: 'La construcción temporal con infinitivo articular se vierte naturalmente con «mientras». Se conserva la doble acción: presión física y atención auditiva.'
- source_word: ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: «Multitud» es un equivalente natural y solemne en español bíblico, apto para ὄχλος en este contexto.
- source_word: ἐπικεῖσθαι αὐτῷ
  english_pob_choice: was pressing in on him
  chosen_spanish: se apretaba contra él
  alternatives_spanish:
  - lo presionaba
  - se agolpaba sobre él
  lexicon: BDAG
  rationale: El verbo comunica presión o apretamiento físico. «Se apretaba contra él» preserva la fuerza espacial sin sonar artificial en español.
- source_word: ἀκούειν
  english_pob_choice: listening
  chosen_spanish: escuchaba
  alternatives_spanish:
  - oía
  - prestaba oído
  lexicon: BDAG
  rationale: En este contexto narrativo, «escuchaba» expresa atención activa mejor que un simple «oía».
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - la palabra de Dios
  lexicon: BDAG
  rationale: Se conserva la expresión bíblica establecida. «Palabra de Dios» mantiene el peso formal y la resonancia intertextual del griego.
- source_word: καὶ αὐτὸς ἦν ἑστὼς
  english_pob_choice: he was standing
  chosen_spanish: él estaba de pie
  alternatives_spanish:
  - él estaba en pie
  - él permanecía de pie
  lexicon: BDAG
  rationale: La construcción perifrástica señala postura continua. «Estaba de pie» es claro, digno y fiel al aspecto durativo.
- source_word: παρὰ τὴν λίμνην
  english_pob_choice: by the lake
  chosen_spanish: junto al lago
  alternatives_spanish:
  - al lado del lago
  - a la orilla del lago
  lexicon: BDAG
  rationale: «Junto al lago» comunica bien la proximidad indicada por παρά con acusativo.
- source_word: Γεννησαρέτ
  english_pob_choice: Gennesaret
  chosen_spanish: Gennesaret
  alternatives_spanish:
  - Genesaret
  - el mar de Galilea
  lexicon: BDAG
  rationale: Se translitera el nombre propio del texto griego en lugar de sustituirlo por una identificación explicativa.
theological_decisions:
- issue: τὸν λόγον τοῦ θεοῦ
  english_pob_reading: the word of God
  chosen_spanish_reading: la palabra de Dios
  alternative_spanish_readings:
  - la palabra procedente de Dios
  - el mensaje de Dios
  rationale: La frase puede abarcar el anuncio divino sin restringirse a una sola modalidad. «Palabra de Dios» conserva su amplitud teológica y su eco bíblico sin añadir explicación ajena al texto.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Tratamiento de Γεννησαρέτ
  english_pob_reading: Gennesaret
  chosen_spanish_reading: Gennesaret
  alternative_spanish_readings:
  - mar de Galilea
  rationale: El griego nombra el lugar como Gennesaret; mantener el topónimo evita introducir una armonización que no está en la frase griega de este versículo.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Coincide con el expediente inglés en filosofía de equivalencia óptima, preservando la fórmula lucana, la temporalidad de la construcción con infinitivo, la expresión fija «palabra de Dios» y la transliteración de Gennesaret. No se registran revisiones textuales en el expediente reciente.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico neutro y contemporáneo, sin calcos innecesarios.
  - Se evitó sustituir el topónimo por una identificación explicativa en el texto principal.
  - La puntuación reproduce la pausa narrativa de apertura sin sobrecargar la sintaxis española.
