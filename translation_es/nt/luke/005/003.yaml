review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego: Jesús entra en una de las barcas de Simón, le pide alejarla un poco de tierra, y enseña a las multitudes desde la barca. Conserva correctamente la posesión de Simón, la pequeña distancia (ὀλίγον) y la enseñanza desde la embarcación. Sin embargo, la nota al pie está anclada en ''barcas'' cuando en realidad comenta ἀπὸ τῆς γῆς (''de la tierra'' / ''de la orilla''), por lo que no preserva fielmente la evidencia ni la práctica de notas del POB.'
  spanish_quality_summary: El español es claro, natural y digno. 'Barca' es una buena elección contextual. 'Le pidió que la apartara un poco de la tierra' es comprensible, aunque 'la alejara un poco de la tierra' suena un poco más natural y más directamente náutico en español general. 'Enseñaba a las multitudes' es aceptable, pero 'a las multitudes' mantiene un registro algo más rígido; aun así no es incorrecto. El problema principal de calidad editorial es la colocación incorrecta de la nota.
  glossary_alignment: 'No hay términos del glosario principal en juego como Yahvé, Mesías, Espíritu, etc. Las decisiones léxicas están mayormente alineadas con el rastro inglés: πλοῖον -> ''barca'', ἠρώτησεν -> ''le pidió'', καθίσας -> ''se sentó'', ἐδίδασκεν -> ''enseñaba''. La excepción práctica es que la nota léxica sobre γῆ debería ir anclada en ''tierra'', no en ''barcas''.'
  issues:
  - severity: high
    issue: La nota al pie está anclada en el lugar equivocado.
    rationale: La nota explica ἀπὸ τῆς γῆς ('de la tierra' / 'de la orilla'), pero el marcador [a] aparece en 'barcas'. Esto desorienta al lector y no sigue la disciplina requerida de anclar la nota exactamente en la palabra o frase relevante.
  - severity: medium
    issue: La redacción 'la apartara un poco de la tierra' es menos natural que alternativas cercanas.
    rationale: Aunque transmite el sentido, en español general 'apartar la barca de la tierra' suena algo duro. 'Alejara un poco de la tierra' o 'apartara un poco de la orilla' fluyen mejor. Dado que el proyecto quiere preservar 'tierra' por la nota léxica, 'la alejara un poco de la tierra' equilibra fidelidad y naturalidad.
  revised_spanish_text: Entonces subió a una de las barcas, que era de Simón, y le pidió que la alejara un poco de la tierra[a]. Luego se sentó y enseñaba a las multitudes desde la barca.
  revised_footnotes:
  - marker: a
    text: O 'de la orilla'. El griego dice literalmente 'de la tierra', en contraste con la barca y la tierra firme.
    reason: lexical_alternative
  revision_rationale: Se corrige el problema principal moviendo la nota al pie para que ancle correctamente en 'tierra', que es la expresión que la nota explica. Además, se ajusta 'la apartara' a 'la alejara' para una lectura más natural en español sin perder el matiz náutico ni la literalidad de γῆ como 'tierra'. No se requiere adjudicación adicional.
