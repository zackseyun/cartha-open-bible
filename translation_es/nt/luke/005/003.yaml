translation:
  language: es
  text: Entonces subió a una de las barcas, que era de Simón, y le pidió que la alejara un poco de la tierra[a]. Luego se sentó y enseñaba a las multitudes desde la barca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de la orilla'. El griego dice literalmente 'de la tierra', en contraste con la barca y la tierra firme.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβὰς
  english_pob_choice: got into
  chosen_spanish: subió
  alternatives_spanish:
  - se montó en
  - entró en
  - se embarcó en
  lexicon: BDAG
  rationale: El participio aoristo indica la acción de entrar en la embarcación antes del verbo principal. En español, 'subió a' comunica de manera natural el movimiento hacia la barca sin perder la concreción del gesto.
- source_word: πλοίων / πλοίου
  english_pob_choice: boats / boat
  chosen_spanish: barcas / barca
  alternatives_spanish:
  - barcos / barco
  - embarcaciones / embarcación
  lexicon: BDAG
  rationale: En el contexto del lago y la pesca, 'barca' resulta más preciso y natural que 'barco', que en español puede sonar demasiado grande. Se preserva el singular y plural del griego.
- source_word: ὃ ἦν Σίμωνος
  english_pob_choice: which belonged to Simon
  chosen_spanish: que era de Simón
  alternatives_spanish:
  - que pertenecía a Simón
  - que era propiedad de Simón
  - que era la de Simón
  lexicon: BDAG
  rationale: El genitivo expresa posesión. 'Era de Simón' mantiene la relación posesiva de forma clara y idiomática en español, sin añadir una formulación demasiado técnica o legal.
- source_word: ἠρώτησεν
  english_pob_choice: asked
  chosen_spanish: le pidió
  alternatives_spanish:
  - le preguntó
  - le rogó
  - le solicitó
  lexicon: BDAG
  rationale: En este contexto, el verbo introduce una petición concreta, no una pregunta informativa. 'Le pidió' refleja mejor ese valor de solicitud que 'le preguntó'.
- source_word: ἐπαναγαγεῖν
  english_pob_choice: to put out
  chosen_spanish: la apartara
  alternatives_spanish:
  - la sacara
  - la alejara
  - la despegara de la orilla
  lexicon: BDAG
  rationale: En contexto náutico, el verbo significa mover la embarcación alejándola de la orilla. 'La apartara' comunica ese desplazamiento breve de manera natural en español.
- source_word: ἀπὸ τῆς γῆς
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la orilla
  - de la costa
  - de la ribera
  lexicon: BDAG
  rationale: Se conserva 'tierra' para reflejar con más literalidad γῆ y mantener el contraste entre la barca y la tierra firme. Aunque 'orilla' es posible, el griego dice literalmente 'tierra'.
- source_word: ὀλίγον
  english_pob_choice: a little
  chosen_spanish: un poco
  alternatives_spanish:
  - un breve trecho
  - un poco más allá
  - un poco de distancia
  lexicon: BDAG
  rationale: El acusativo adverbial expresa una medida pequeña. 'Un poco' es la equivalencia más natural y breve en español.
- source_word: καθίσας
  english_pob_choice: he sat down
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - habiéndose sentado
  - sentado
  lexicon: BDAG
  rationale: El participio aoristo marca una acción previa a la enseñanza. 'Se sentó' reproduce esa secuencia de forma clara y mantiene el gesto docente habitual.
- source_word: ἐδίδασκεν
  english_pob_choice: was teaching
  chosen_spanish: enseñaba
  alternatives_spanish:
  - estaba enseñando
  - estaba instruyendo
  - enseñaba continuamente
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso. En español, el imperfecto simple 'enseñaba' conserva el aspecto durativo de manera más fluida que una perífrasis más pesada.
- source_word: τοὺς ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las muchedumbres
  - la gente
  - las masas
  lexicon: BDAG
  rationale: El plural ὄχλους se mantiene como plural en español. 'Multitudes' refleja bien la reunión numerosa y conserva un registro digno y bíblico.
theological_decisions:
- issue: Función de la enseñanza desde la barca
  english_pob_reading: Then he sat down and was teaching the crowds from the boat.
  chosen_spanish_reading: Luego se sentó y enseñaba a las multitudes desde la barca.
  alternative_spanish_readings:
  - Luego se sentó a enseñar a las multitudes desde la barca.
  - Luego se sentó y comenzó a enseñar a las multitudes desde la barca.
  rationale: Se conserva la idea de enseñanza continua desde la barca, sin introducir un inicio verbal no expresado explícitamente por el imperfecto griego. La frase mantiene el gesto narrativo y la escena pública.
  doctrine_reference: Narrative aspect; no doctrinal claim.
translation_notes:
  revision_awareness: 'El texto coincide con el contenido auditado de la fuente griega y con el sentido confirmado por el repaso inglés: movimiento a una barca de Simón, petición de alejarla un poco de tierra, y enseñanza continua a las multitudes desde la barca. No se registraron revisiones aplicadas en el pase más reciente.'
  spanish_consistency_notes:
  - Se usa 'barca' de manera consistente para πλοῖον en este versículo, por ser más preciso en un contexto lacustre.
  - Se mantiene el contraste 'tierra' / 'barca' para reflejar la literalidad de γῆ sin perder claridad.
  - '''Enseñaba'' preserva el imperfecto, evitando convertir la acción en un simple pasado puntual.'
  - La nota [a] se ancla en 'la tierra' porque allí aparece la alternativa interpretativa relevante.
