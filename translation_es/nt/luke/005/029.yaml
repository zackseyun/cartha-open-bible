base_translation:
  language: en
  yaml_path: translation/nt/luke/005/029.yaml
  text: And Levi made a great banquet for him in his house[b][a], and there was a large crowd of tax collectors and others who were reclining at table with them.
  footnotes:
  - marker: a
    text: Or 'with him.' The Greek reads 'with them,' but English readers may understand the reference differently depending on whether the pronoun points to the guests as a group or to the meal setting centered on Jesus.
    reason: alternative_reading
  - marker: b
    text: '''Reclining at table'' reflects the customary posture for dining at formal meals in the ancient Mediterranean world.'
    reason: cultural_note
