  glossary_alignment: 'La terminología clave está bien alineada: «Leví», «gran banquete», «recaudadores de impuestos» y «con ellos» son opciones fieles y comprensibles. No hay conflictos con los términos teológicos del proyecto. La única corrección necesaria es hacer que «recostados a la mesa» aparezca en el texto principal y anclar ahí la nota cultural.'
