translation:
  language: es
  text: Y Leví preparó un gran banquete para él en su casa; y había una gran multitud de recaudadores de impuestos y de otros que estaban recostados a la mesa[b] con ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con él». El griego dice «con ellos», pero los lectores pueden entender la referencia de manera diferente según si el pronombre apunta al grupo de invitados o al entorno de la comida centrado en Jesús.
    reason: alternative_reading
  - marker: b
    text: «Recostados a la mesa» refleja la postura habitual para comer en los banquetes del mundo mediterráneo antiguo.
    reason: cultural_note
lexical_decisions:
- source_word: δοχὴν μεγάλην
  english_pob_choice: a great banquet
  chosen_spanish: un gran banquete
  alternatives_spanish:
  - una gran fiesta
  - un gran banquete de recepción
  lexicon: BDAG
  rationale: δοχή refiere a una comida/reunión ofrecida como recepción o banquete. En español, «banquete» comunica mejor una comida formal y abundante que «fiesta», y mantiene el peso de μεγάλην con «gran».
- source_word: αὐτῷ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - para Jesús
  - para él mismo
  lexicon: BDAG
  rationale: El pronombre apunta a Jesús por el contexto inmediato. Se conserva el pronombre en español para no expandir innecesariamente el texto ni romper la cohesión del griego.
- source_word: ἐν τῇ οἰκίᾳ αὐτοῦ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su hogar
  - en la casa de él
  lexicon: BDAG
  rationale: «En su casa» es una traducción directa, natural y fiel de la frase locativa. «Casa» mantiene mejor la concreción del griego que «hogar».
- source_word: ὄχλος πολὺς
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran muchedumbre
  - un gran gentío
  lexicon: BDAG
  rationale: ὄχλος es «multitud» o «muchedumbre». «Gran multitud» refleja bien πολὺς y suena natural en español bíblico contemporáneo.
- source_word: τελωνῶν
  english_pob_choice: tax collectors
  chosen_spanish: recaudadores de impuestos
  alternatives_spanish:
  - publicanos
  - cobradores de impuestos
  lexicon: BDAG
  rationale: En español, «recaudadores de impuestos» explica con claridad la función social del término. Se evita «publicanos» porque en el español actual puede ser menos transparente para lectores generales.
- source_word: ἄλλων
  english_pob_choice: others
  chosen_spanish: de otros
  alternatives_spanish:
  - de otras personas
  - de los demás
  lexicon: BDAG
  rationale: El griego es indefinido y breve. «De otros» conserva esa concisión y deja sin precisar quiénes eran esos invitados adicionales.
- source_word: μετ’ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - con él
  - junto con ellos
  lexicon: BDAG
  rationale: La forma plural favorece «con ellos». Se conserva la lectura principal del POB inglés, aunque el contexto permite una referencia ambigua; por eso se incluye nota alternativa.
- source_word: κατακείμενοι
  english_pob_choice: reclining at table
  chosen_spanish: estaban recostados
  alternatives_spanish:
  - estaban recostados a la mesa
  - estaban reclinados a la mesa
  lexicon: BDAG
  rationale: El participio describe la postura de comer en un banquete formal. «Estaban recostados» es idiomático en español y deja implícito el contexto de comida, mientras la nota aclara la costumbre de la mesa reclinada.
theological_decisions:
- issue: Referencia del pronombre plural en «con ellos / μετ’ αὐτῶν»
  english_pob_reading: The Greek reads 'with them,' but English readers may understand the reference differently depending on whether the pronoun points to the guests as a group or to the meal setting centered on Jesus.
  chosen_spanish_reading: «con ellos» como lectura principal, con nota que reconoce la posible referencia alternativa «con él».
  alternative_spanish_readings:
  - con él
  - junto con ellos
  rationale: El griego plural favorece «ellos», pero el contexto narrativo deja abierta la posibilidad de una referencia concentrada en Jesús. La nota preserva esa tensión sin resolverla artificialmente.
  doctrine_reference: Coherencia contextual y ambigüedad pronominal del texto griego; no implica diferencia doctrinal.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el audit trail inglés con acuerdo alto; no se requirieron revisiones sustantivas. Se conservó la ambigüedad pronominal documentada en la nota y se adaptó «reclining at table» a un español natural sin perder la referencia cultural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» por norma del proyecto cuando aparezca el nombre divino; en este versículo no aplica.
  - Se usó «recaudadores de impuestos» para claridad contemporánea, alineado con la decisión inglesa de «tax collectors».
  - Se evitó «publicanos» en el texto principal por posible opacidad para lectores no especializados.
  - La puntuación y el orden del español buscan seguir de cerca la sintaxis del griego sin sonar calcado.
