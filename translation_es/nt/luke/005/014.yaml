  text: καὶ αὐτὸς παρήγγειλεν αὐτῷ μηδενὶ εἰπεῖν, ἀλλὰ ἀπελθὼν δεῖξον σεαυτὸν τῷ ἱερεῖ, καὶ προσένεγκε περὶ τοῦ καθαρισμοῦ σου καθὼς προσέταξεν Μωϋσῆς εἰς μαρτύριον αὐτοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/luke/005/014.yaml
  text: And he ordered him to tell no one[a], but go and show yourself to the priest, and offer for your cleansing as Moses commanded[b], for a testimony to them.
  footnotes:
