translation:
  language: es
  text: 'Y él le ordenó que no se lo dijera a nadie, sino: «Ve y muéstrate al sacerdote, y ofrece por tu purificación, como Moisés mandó[a], como testimonio para ellos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Véase Levítico 14 para la ofrenda que Moisés mandó para la purificación de la lepra.
    reason: cross_reference
  - marker: b
    text: O «para testimonio a ellos»; la frase puede referirse al testimonio ante los sacerdotes o ante otros, y algunos la entienden como evidencia contra ellos.
    reason: alternative_reading
lexical_decisions:
- source_word: παρήγγειλεν
  english_pob_choice: ordered
  chosen_spanish: le ordenó
  alternatives_spanish:
  - le mandó
  - le instruyó
  - le dio orden
  lexicon: BDAG
  rationale: El verbo expresa una instrucción autoritativa y directa. «Ordenó» conserva esa fuerza sin endurecerla innecesariamente. El dativo indirecto se mantiene natural en español con «le».
- source_word: μηδενὶ εἰπεῖν
  english_pob_choice: to tell no one
  chosen_spanish: que no lo dijera a nadie
  alternatives_spanish:
  - que no se lo dijera a nadie
  - que no hablara con nadie
  - que no dijera nada a nadie
  lexicon: BDAG
  rationale: El infinitivo con dativo se expresa con una subordinada final/completiva natural en español. «No lo dijera a nadie» conserva la prohibición y evita un calco torpe.
- source_word: ἀπελθὼν
  english_pob_choice: go
  chosen_spanish: Ve
  alternatives_spanish:
  - Después de ir
  - yendo
  - habiendo ido
  lexicon: BDAG
  rationale: Aunque el participio aoristo puede marcar anterioridad, la revisión del POB inglés lo integró de modo natural en la secuencia imperativa. En español, «Ve» comunica la progresión sin añadir una formulación pesada.
- source_word: δεῖξον σεαυτὸν τῷ ἱερεῖ
  english_pob_choice: show yourself to the priest
  chosen_spanish: preséntate al sacerdote
  alternatives_spanish:
  - muéstrate al sacerdote
  - preséntate delante del sacerdote
  lexicon: BDAG
  rationale: «Preséntate» es una equivalencia idiomática para el mandato de comparecer ante la autoridad sacerdotal. «Muéstrate» es más cercano al griego, pero en español suena menos natural en este contexto. Se conserva el referente singular «al sacerdote».
- source_word: προσένεγκε
  english_pob_choice: offer
  chosen_spanish: ofrece
  alternatives_spanish:
  - presenta
  - trae
  - ofrenda
  lexicon: BDAG
  rationale: En contexto cultual, el verbo pide un acto sacrificial/ofrecido. «Ofrece» es el equivalente español más claro y fiel.
- source_word: περὶ τοῦ καθαρισμοῦ σου
  english_pob_choice: for your cleansing
  chosen_spanish: por tu purificación
  alternatives_spanish:
  - por tu limpieza
  - acerca de tu purificación
  - por tu limpieza ritual
  lexicon: BDAG
  rationale: El sustantivo καθαρισμός puede referirse al proceso ritual de quedar limpio. «Purificación» mantiene el sentido cultual y evita reducirlo a una mera limpieza física. Se conserva la posibilidad ritual implícita del pasaje.
- source_word: καθὼς προσέταξεν Μωϋσῆς
  english_pob_choice: as Moses commanded
  chosen_spanish: como Moisés mandó
  alternatives_spanish:
  - como Moisés ordenó
  - tal como Moisés prescribió
  - según mandó Moisés
  lexicon: BDAG
  rationale: «Mandó» sigue de cerca la autoridad normativa del verbo y suena natural en español bíblico contemporáneo. «Ordenó» sería posible, pero «mandó» evita repetir «ordenó» del primer miembro.
- source_word: εἰς μαρτύριον αὐτοῖς
  english_pob_choice: for a testimony to them
  chosen_spanish: para testimonio a ellos
  alternatives_spanish:
  - como testimonio para ellos
  - para dar testimonio a ellos
  - para evidencia contra ellos
  lexicon: BDAG
  rationale: Se conserva la ambigüedad del dativo y del sintagma preposicional sin decidir si el testimonio es favorable o adverso. La forma breve «para testimonio a ellos» refleja la aspereza posible del griego y mantiene la tensión documental.
theological_decisions:
- issue: Alcance del mandato de silencio en μηδενὶ εἰπεῖν
  english_pob_reading: tell no one
  chosen_spanish_reading: que no lo dijera a nadie
  alternative_spanish_readings:
  - que no lo contara a nadie
  - que no dijera nada a nadie
  rationale: El texto impone silencio, pero no explicita matices adicionales. La redacción elegida preserva el carácter absoluto de la prohibición sin introducir una interpretación sobre duración o alcance más allá del griego.
  doctrine_reference: Preservar el alcance explícito del mandato sin ampliarlo
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que integró ἀπελθών de manera más natural en español equivalente a «Ve y preséntate», y mantuvo la ambigüedad de εἰς μαρτύριον αὐτοῖς. Se evita volver al giro «después de ir» y se conserva el registro formal y la economía del mandato.
  spanish_consistency_notes:
  - Se mantiene «Y él» para αὐτὸς, preservando el énfasis enfático del pronombre.
  - «Yahvé» no aparece en este versículo; no se requiere adaptación terminológica adicional.
  - «Sacerdote» se conserva en singular, conforme al texto griego.
  - «Purificación» se usa por el contexto ritual y no como simple limpieza cotidiana.
  - La nota [a] preserva la ambigüedad del testimonio sin resolver el referente.
  - La nota [b] aporta el enlace legal a Levítico 14, siguiendo el audit trail inglés.
