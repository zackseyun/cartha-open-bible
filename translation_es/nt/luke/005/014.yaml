    text: Or 'as a testimony to them'; the phrase may refer to testimony to the priests or others, and some understand it as evidence against them.
    reason: alternative_reading
  - marker: b
    text: See Leviticus 14 for the offering Moses commanded for cleansing from leprosy.
    reason: cross_reference
