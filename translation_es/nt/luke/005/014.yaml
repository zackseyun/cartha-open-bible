revisions:
- from: 'Y él le ordenó que no lo dijera a nadie[a], sino: «Ve y preséntate al sacerdote, y ofrece por tu purificación, como Moisés mandó[b], para testimonio a ellos».'
  to: 'Y él le ordenó que no se lo dijera a nadie, sino: «Ve y muéstrate al sacerdote, y ofrece por tu purificación, como Moisés mandó[a], como testimonio para ellos[b]».'
  rationale: Se ajustó «preséntate» a «muéstrate» para seguir más de cerca δεῖξον σεαυτὸν y la decisión documentada del POB inglés. Se mejoró «para testimonio a ellos» a «como testimonio para ellos» para lograr un español natural sin resolver la ambigüedad de εἰς μαρτύριον αὐτοῖς. También se reubicaron las notas al lugar correspondiente en el texto.
