revisions:
- from: Puesto que muchos han emprendido[a] redactar una narración acerca de los asuntos[b] que han sido cumplidos[c] entre nosotros,
  to: Puesto que muchos han emprendido redactar una narración[a] acerca de los hechos que han sido cumplidos[b] entre nosotros,
  rationale: 'Se corrige la ubicación de las notas para que sigan la evidencia léxica del griego y del POB en inglés: las alternativas de διήγησιν deben ir con ''narración'', no con πραγμάτων. También se sustituye ''asuntos'' por ''hechos'' para reflejar mejor πραγμάτων en este contexto narrativo y sonar más natural en español. Por último, se depura la nota de πεπληροφορημένων para eliminar ''acometidos'' y preservar las alternativas documentadas por el POB.'
