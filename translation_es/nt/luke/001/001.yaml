translation:
  language: es
  text: Puesto que muchos han emprendido redactar una narración[a] acerca de los hechos que han sido cumplidos[b] entre nosotros,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “un relato” o “un informe”.
    reason: lexical_alternative
  - marker: b
    text: O “realizados”, “llevados a cabo” o “plenamente confirmados”.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπειδήπερ
  english_pob_choice: Since
  chosen_spanish: Puesto que
  alternatives_spanish:
  - Ya que
  - Porque
  - Dado que
  lexicon: BDAG
  rationale: Introduce una relación causal o de fondo con un tono formal adecuado al prólogo de Lucas. 'Puesto que' conserva el valor introductorio sin sonar tan coloquial como 'porque' y sin forzar un matiz más explicativo que el del griego.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - muchos otros
  lexicon: BDAG
  rationale: Es la correspondencia directa y natural del adjetivo cuantificador. 'Muchos otros' añadiría una referencia no expresa en el griego.
- source_word: ἐπεχείρησαν
  english_pob_choice: have undertaken
  chosen_spanish: han emprendido
  alternatives_spanish:
  - han intentado
  - han tratado
  - se han puesto a
  lexicon: BDAG
  rationale: '''Emprendido'' conserva la idea de iniciar deliberadamente una obra literaria sin insinuar fracaso. En español suena más natural que una calca de ''undertaken'' y sigue el sentido de iniciar un proyecto.'
- source_word: ἀνατάξασθαι
  english_pob_choice: to compile
  chosen_spanish: redactar
  alternatives_spanish:
  - compilar
  - ordenar
  - redactar en orden
  lexicon: BDAG
  rationale: El verbo apunta a componer u ordenar por escrito una narración. 'Redactar' comunica bien la labor literaria en español actual; 'compilar' puede sonar más técnico y menos natural en una apertura formal.
- source_word: διήγησιν
  english_pob_choice: an account
  chosen_spanish: una narración
  alternatives_spanish:
  - un relato
  - un informe
  - una cuenta
  lexicon: BDAG
  rationale: '''Narración'' expresa el género de un relato organizado y encaja con el registro historiográfico del prólogo. ''Relato'' también sería posible, pero ''narración'' suena más formal en este contexto.'
- source_word: περὶ
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  - en cuanto a
  lexicon: BDAG
  rationale: Preposición natural en español para introducir el tema de la narración, sin perder el tono formal.
- source_word: τῶν πεπληροφορημένων
  english_pob_choice: that have been fulfilled
  chosen_spanish: que han sido cumplidos
  alternatives_spanish:
  - que han sido realizados
  - que han sido llevados a cabo
  - que han sido plenamente confirmados
  lexicon: BDAG
  rationale: Sigo la lectura principal de cumplimiento/accomplishment preservada por el POB en inglés. 'Cumplidos' mantiene la ambigüedad entre acontecimiento realizado y cumplimiento salvífico, sin cerrar la discusión lexical.
- source_word: ἐν ἡμῖν
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - en medio de nosotros
  - en nuestra comunidad
  lexicon: BDAG
  rationale: '''Entre nosotros'' es la manera más natural y amplia de expresar la idea corporativa del texto sin precisar indebidamente quiénes integran el ''nosotros''.'
- source_word: πραγμάτων
  english_pob_choice: the matters
  chosen_spanish: los asuntos
  alternatives_spanish:
  - las cosas
  - los hechos
  - los eventos
  lexicon: BDAG
  rationale: 'πρᾶγμα es amplio: cosas, hechos, asuntos. ''Asuntos'' conserva esa amplitud en español y funciona bien con la sintaxis del verso.'
theological_decisions:
- issue: Sentido de πεπληροφορημένων en Lucas 1:1
  english_pob_reading: fulfilled
  chosen_spanish_reading: cumplidos
  alternative_spanish_readings:
  - acometidos
  - acabados
  - plenamente confirmados
  rationale: La forma perfecta pasiva puede entenderse como 'cumplidos' en un marco de historia de salvación, pero sin eliminar la posibilidad lexical de 'plenamente confirmados'. La traducción principal mantiene la tensión y la deja abierta, como hace el POB inglés con su nota.
  doctrine_reference: Mantener la tensión lexical; no resolver de forma dogmática el sentido exacto del participio
- issue: Registro literario del prólogo lucano
  english_pob_reading: formal preface
  chosen_spanish_reading: prólogo formal
  alternative_spanish_readings:
  - prefacio
  - introducción
  rationale: Lucas abre con un estilo historiográfico cuidadosamente elaborado. En español, 'Puesto que... han emprendido redactar...' conserva ese tono sin caer en arcaísmo.
  doctrine_reference: Estilo literario del evangelio de Lucas
translation_notes:
  revision_awareness: El POB inglés mantiene 'fulfilled' en el texto principal y conserva en nota la alternativa 'accomplished' / 'fully confirmed'. La redacción española sigue esa misma decisión de base, pero ajusta 'have undertaken' y 'to compile' a un español más natural y literario, sin perder el carácter formal del prólogo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Se mantiene 'cumplidos' en el texto principal para no borrar la tensión lexical documentada por el POB inglés.
  - '''Entre nosotros'' preserva la amplitud del ''us'' sin añadir interpretaciones como ''creyentes''.'
