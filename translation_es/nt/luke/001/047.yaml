translation:
  language: es
  text: y mi espíritu ha exultado en Dios mi Salvador[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se ha regocijado en Dios mi Salvador».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγαλλίασεν
  english_pob_choice: has rejoiced
  chosen_spanish: se ha regocijado
  alternatives_spanish:
  - se ha alegrado
  - ha exultado
  lexicon: BDAG
  rationale: El aoristo expresa una acción completa de gran gozo. «Se ha regocijado» conserva ese matiz de júbilo pleno y suena natural y digno en español; «ha exultado» es posible, pero menos común; «se ha alegrado» es más débil.
- source_word: τὸ πνεῦμά μου
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi ser interior
  - mi interior
  lexicon: BDAG
  rationale: Aquí πνεῦμα se refiere al yo interior de María. «Mi espíritu» preserva el término léxico y la paralelismo poético con el verso anterior sin resolverlo en una paráfrasis explicativa.
- source_word: ἐπὶ τῷ θεῷ
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - por causa de Dios
  - sobre Dios
  lexicon: BDAG
  rationale: Con ἀγαλλιάω, la preposición puede señalar la base u ocasión del gozo. En español, «en Dios» es la forma más natural para conservar el foco relacional sin volver la frase rígidamente literal.
- source_word: σωτῆρί μου
  english_pob_choice: my Savior
  chosen_spanish: mi Salvador
  alternatives_spanish:
  - mi libertador
  lexicon: BDAG
  rationale: σωτήρ se usa de manera directa y teológicamente cargada como «salvador». «Mi Salvador» reproduce el título con claridad; «mi libertador» es posible, pero menos preciso y menos consistente con el uso neotestamentario.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - entonces
  lexicon: BDAG
  rationale: La conjunción enlaza este hemistiquio con el anterior dentro del paralelismo del Magníficat. «Y» es la correspondencia más simple y fiel.
theological_decisions:
- issue: Relación entre 'espíritu' y 'alma' en el paralelismo inmediato
  english_pob_reading: Retain distinct terms without collapsing them
  chosen_spanish_reading: Mantener términos distintos sin fusionarlos
  alternative_spanish_readings:
  - Tratar 'alma' y 'espíritu' como sinónimos exactos en la traducción
  - Sustituir 'espíritu' por una explicación como 'ser interior'
  rationale: El contexto poético cercano usa vocabulario distinto, y la traducción debe conservar esa tensión literaria y teológica. «Mi espíritu» mantiene la diferencia sin imponer una precisión antropológica que el griego no explicita.
  doctrine_reference: Philosophy of Translation §3
- issue: Afirmación de que Dios es el Salvador de María
  english_pob_reading: God my Savior
  chosen_spanish_reading: Dios mi Salvador
  alternative_spanish_readings:
  - Dios mi libertador
  rationale: La frase identifica directamente a Dios como Salvador. «Mi Salvador» conserva la afirmación sin suavizarla ni añadir conclusiones doctrinales ajenas al verso.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió el verbo a un perfecto compuesto («has rejoiced») para reflejar mejor el aoristo en este contexto poético. La redacción española sigue esa decisión con «se ha regocijado», manteniendo el registro formal y la acción completada.
  spanish_consistency_notes:
  - Se conserva el nombre divino «Dios» y no se introduce ningún marcador litúrgico sustituto.
  - «Salvador» se usa como título directo, no como paráfrasis devocional.
  - El orden y la sintaxis siguen el paralelismo del original sin expandir el sentido más allá de lo evidenciado por el griego.
