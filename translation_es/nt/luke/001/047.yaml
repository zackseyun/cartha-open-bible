revisions:
- from: y mi espíritu se ha regocijado en Dios mi Salvador[a].
  to: y mi espíritu ha exultado en Dios mi Salvador[a].
  rationale: Se ajusta la formulación principal para mejorar la naturalidad y dignidad del español sin perder la intensidad de ἠγαλλίασεν. «Ha exultado» encaja bien en un contexto poético-litúrgico como el Magníficat, mientras que «se ha regocijado» queda mejor como alternativa léxica válida.
