  to: 'Pero el ángel le dijo: «No temas, Zacarías, porque tu oración[a] ha sido oída, y tu esposa Elisabet dará a luz un hijo para ti, y lo llamarás Juan[b]»'
  rationale: Se ajusta la última cláusula para reflejar mejor el sentido e idiomatismo del griego y para que la nota literal corresponda de verdad al texto fuente documentado en el audit trail inglés. También se suaviza «te dará a luz un hijo» a «dará a luz un hijo para ti», que preserva mejor el valor de σοι en español natural.
