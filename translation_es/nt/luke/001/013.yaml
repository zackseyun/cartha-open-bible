translation:
  language: es
  text: 'Pero el ángel le dijo: «No temas, Zacarías, porque tu oración[a] ha sido oída, y tu esposa Elisabet dará a luz un hijo para ti, y lo llamarás Juan[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu petición ha sido oída».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «llamarás su nombre Juan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: BDAG
  rationale: δέ introduce una leve transición discursiva; «pero» conserva esa apertura sin forzar una oposición fuerte.
- source_word: ὁ ἄγγελος
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: BDAG
  rationale: En este contexto narrativo, ἄγγελος se refiere claramente a un ser celestial, por lo que «ángel» es la equivalencia natural y establecida.
- source_word: Μὴ φοβοῦ
  english_pob_choice: Do not be afraid
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  lexicon: BDAG
  rationale: La prohibición con μή y el imperativo se expresa de forma idiomática en español con «No temas»; es breve, natural y fiel al tono inmediato.
- source_word: Ζαχαρία
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacaría
  lexicon: BDAG
  rationale: La forma española estándar del nombre bíblico es «Zacarías».
- source_word: διότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de que no deba temer; «porque» comunica con claridad esa relación causal.
- source_word: εἰσηκούσθη ἡ δέησίς σου
  english_pob_choice: your prayer has been heard
  chosen_spanish: tu oración ha sido oída
  alternatives_spanish:
  - tu petición ha sido oída
  - tu súplica ha sido escuchada
  lexicon: BDAG
  rationale: δέησις puede ser «petición/súplica», pero en este contexto devocional «oración» es natural. El pasivo conserva la acción implícita sin explicitar el agente, como en el griego.
- source_word: ἡ γυνή σου Ἐλισάβετ
  english_pob_choice: your wife Elizabeth
  chosen_spanish: tu esposa Elisabet
  alternatives_spanish:
  - tu mujer Elisabet
  lexicon: BDAG
  rationale: γυνή aquí significa «esposa» por el posesivo y el contexto familiar; «esposa» es claro en español actual y mantiene el sentido relacional.
- source_word: γεννήσει υἱόν σοι
  english_pob_choice: will bear you a son
  chosen_spanish: te dará a luz un hijo
  alternatives_spanish:
  - te parirá un hijo
  - te tendrá un hijo
  lexicon: BDAG
  rationale: El sujeto femenino justifica un verbo de parto en español. «Te dará a luz» conserva el sentido de γεννάω aquí y evita una formulación demasiado literal o extraña.
- source_word: καλέσεις τὸ ὄνομα αὐτοῦ Ἰωάννην
  english_pob_choice: you shall call his name John
  chosen_spanish: le pondrás por nombre Juan
  alternatives_spanish:
  - lo llamarás Juan
  - nombrarás su nombre Juan
  lexicon: BDAG
  rationale: El giro griego es idiomático; en español, «poner por nombre» reproduce bien la fórmula de imposición del nombre sin calco innecesario. Se conserva el mandato dirigido a Zacarías.
- source_word: Ἰωάννην
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Johán
  lexicon: BDAG
  rationale: La forma española establecida del nombre es «Juan».
theological_decisions:
- issue: Pasivo divino implícito en «ha sido oída»
  english_pob_reading: 'Implicit divine passive: God has heard Zechariah''s prayer.'
  chosen_spanish_reading: Pasivo impersonal con sujeto divino implícito, sin nombrarlo explícitamente.
  alternative_spanish_readings:
  - Dios ha oído tu oración
  - tu oración fue oída
  rationale: El griego deja el sujeto implícito; el español conserva ese rasgo con un pasivo que no nombra a Dios. Así se preserva la tensión teológica y la sobriedad del original.
  doctrine_reference: Preservar el agente implícito del pasivo divino sin resolverlo más allá del texto.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide sustancialmente con la solución auditada en inglés; se ajustó la sintaxis al español natural y se mantuvo el pasivo implícito en «ha sido oída».
  spanish_consistency_notes:
  - Se usa «Zacarías» para el nombre propio y «Juan» para Ἰωάννης, conforme al uso bíblico español estándar.
  - Se prefirió «tu oración» en el cuerpo principal y se dejó «petición» como alternativa en nota, preservando la gama semántica de δέησις.
  - Se evitó convertir el pasivo en una paráfrasis activa para respetar la forma del griego.
  - «Le pondrás por nombre» conserva la fórmula de nombramiento con naturalidad en español.
  - Se mantiene el tono de anuncio solemne propio de la perícopa.
