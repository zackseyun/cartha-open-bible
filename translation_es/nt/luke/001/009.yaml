translation:
  language: es
  text: según la costumbre del sacerdocio, le tocó por sorteo quemar incienso al entrar en el templo del Señor[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santuario del Señor». El término griego aquí es ναός, que con frecuencia se refiere al edificio del templo mismo, más que a los atrios exteriores del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ τὸ ἔθος
  english_pob_choice: according to the custom
  chosen_spanish: según la costumbre
  alternatives_spanish:
  - de acuerdo con la costumbre
  - conforme a la costumbre
  lexicon: BDAG
  rationale: κατά con acusativo más ἔθος expresa conformidad con una práctica establecida. En español, 'según la costumbre' es natural y conserva esa relación normativa sin endurecer el giro.
- source_word: τῆς ἱερατείας
  english_pob_choice: of the priesthood
  chosen_spanish: del sacerdocio
  alternatives_spanish:
  - de la función sacerdotal
  - de la labor sacerdotal
  lexicon: BDAG
  rationale: ἱερατεία nombra el oficio o institución sacerdotal, no solo a los sacerdotes como individuos. 'Del sacerdocio' preserva mejor ese sentido institucional y suena idiomático en español.
- source_word: ἔλαχε
  english_pob_choice: he was chosen by lot
  chosen_spanish: le tocó por sorteo
  alternatives_spanish:
  - fue elegido por sorteo
  - la suerte le correspondió
  lexicon: BDAG
  rationale: λαγχάνω apunta a obtener algo por sorteo o por echar suertes. 'Le tocó por sorteo' comunica el resultado de manera natural en español y conserva la idea del sorteo, que es necesaria aquí.
- source_word: τοῦ θυμιᾶσαι
  english_pob_choice: to burn incense
  chosen_spanish: quemar incienso
  alternatives_spanish:
  - ofrecer incienso
  - incensar
  lexicon: BDAG
  rationale: θυμιάω refiere al acto concreto de quemar u ofrecer incienso. 'Quemar incienso' es preciso, claro y fiel al gesto ritual descrito.
- source_word: εἰσελθὼν εἰς τὸν ναὸν
  english_pob_choice: when he entered into the temple
  chosen_spanish: al entrar en el templo
  alternatives_spanish:
  - cuando entró en el templo
  - al ingresar en el templo
  lexicon: BDAG
  rationale: El participio aoristo temporal se expresa bien con 'al entrar'. 'Templo' mantiene la lectura principal del POB, pero el término griego ναός puede señalar con más precisión el santuario interior.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Dios
  lexicon: BDAG
  rationale: κύριος se traduce normalmente como 'Señor' en este contexto. Aunque el proyecto usa 'Yahvé' para el nombre divino cuando aparece explícitamente, aquí el texto griego emplea κύριος en una referencia a Dios, por lo que 'Señor' es la forma auditable y más cercana al griego.
theological_decisions:
- issue: Renderizar ναός como 'templo' o 'santuario'
  english_pob_reading: temple with a footnote preserving sanctuary
  chosen_spanish_reading: templo, con nota que preserve la posibilidad de santuario
  alternative_spanish_readings:
  - santuario
  - templo santuario
  rationale: En el contexto del incienso, ναός probablemente apunta al recinto interior y no al atrio exterior. Mantener 'templo' en el texto principal preserva claridad y continuidad narrativa; la nota conserva la precisión semántica del término griego.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave con excepciones documentadas)
translation_notes:
  revision_awareness: Coincide con la última revisión disponible, que no registró cambios. Se respetó la decisión auditada del POB en inglés de mantener 'temple' en el texto principal y reservar 'sanctuary' como alternativa lexical documentada.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριος, conforme al griego y a la convención del proyecto para este término.
  - Se eligió 'del sacerdocio' para ἱερατείας por su sentido institucional.
  - El orden español se ajustó para ser publicable y natural sin añadir información no presente en el original.
