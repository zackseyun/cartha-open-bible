review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Juan hará que muchos de entre los hijos de Israel se vuelvan al Dios de Israel. Conserva adecuadamente «hijos de Israel» y la fuerza causativa de ἐπιστρέψει. Sin embargo, «hará volver» en español puede sugerir regreso físico más que giro espiritual/religioso; «hará volver ... a Yahvé» es comprensible, pero «hará que muchos ... se vuelvan a Yahvé» preserva mejor la redirección personal implícita en ἐπιστρέφω ἐπὶ con este objeto.'
  spanish_quality_summary: El texto es legible y digno, pero la combinación «hará volver ... a Yahvé, su Dios» suena algo rígida y levemente ambigua en español. La revisión propuesta mejora la naturalidad sin perder precisión. La nota al pie actual es defectuosa porque ofrece como alternativa la misma lectura del texto principal; conviene reemplazarla por alternativas reales e idiomáticas.
  glossary_alignment: 'Alineación mayormente buena con la terminología del proyecto: «Yahvé» respeta la política del nombre divino; «Dios» y «hijos de Israel» también están bien. No hay conflicto teológico serio. La principal corrección es estilístico-semántica en la traducción de ἐπιστρέψει y el contenido de la nota léxica.'
  issues:
  - severity: medium
    issue: «hará volver» puede sonar a retorno físico
    rationale: Aunque puede funcionar en contexto religioso, en español neutral «hacer volver» suele evocar traer de regreso. El griego ἐπιστρέψει ἐπὶ κύριον aquí expresa que Juan hará que muchos se vuelvan al Señor/Dios, es decir, una reorientación espiritual.
  - severity: medium
    issue: La nota al pie repite la lectura principal como alternativa
    rationale: La nota dice «O “de los hijos de Israel”...», que no es alternativa sino la misma formulación del texto. Debe listar opciones genuinas, como «de los hijos de Israel»/«de los israelitas» según cómo quede el texto, o explicar directamente la literalidad griega.
  - severity: low
    issue: La puntuación con coma en «Yahvé, su Dios» es aceptable pero no necesaria
    rationale: 'La aposición puede mantenerse sin coma en español bíblico moderno: «a Yahvé su Dios». Esto fluye mejor y sigue expresando que Yahvé es su Dios.'
  revised_spanish_text: Y hará que muchos de los hijos de Israel[a] se vuelvan a Yahvé su Dios.
  revised_footnotes:
  - marker: a
    text: O «de los israelitas». El griego dice literalmente «de los hijos de Israel», conservando la expresión pactal tradicional.
    reason: lexical_alternative
  revision_rationale: Se ajusta ἐπιστρέψει a una formulación española más natural y semánticamente precisa para una vuelta espiritual («hará que ... se vuelvan»). Se corrige la nota para que presente una alternativa real y se simplifica la aposición final para mejor fluidez. No se requiere adjudicación adicional.
