- from: Y hará volver a muchos de los hijos de Israel[a] a Yahvé, su Dios.
  to: Y hará que muchos de los hijos de Israel[a] se vuelvan a Yahvé su Dios.
  rationale: Se ajusta ἐπιστρέψει a una formulación española más natural y semánticamente precisa para una vuelta espiritual («hará que ... se vuelvan»). Se corrige la nota para que presente una alternativa real y se simplifica la aposición final para mejor fluidez. No se requiere adjudicación adicional.
