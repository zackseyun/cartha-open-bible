translation:
  language: es
  text: Y hará que muchos de los hijos de Israel[a] se vuelvan a Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los israelitas». El griego dice literalmente «de los hijos de Israel», conservando la expresión pactal tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Y además
  lexicon: BDAG
  rationale: La conjunción inicial mantiene la continuidad narrativa con el versículo anterior; en español, «Y» reproduce con naturalidad ese enlace sin añadir matiz temporal o explicativo.
- source_word: πολλοὺς
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - gran número de
  - una multitud de
  lexicon: BDAG
  rationale: El adjetivo cuantitativo se conserva de forma directa. «Muchos» es breve, natural y fiel al valor cuantitativo del griego.
- source_word: τῶν υἱῶν Ἰσραὴλ
  english_pob_choice: of the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los hijos de Israel
  - de los israelitas
  lexicon: BDAG
  rationale: Se mantiene la expresión bíblica tradicional y el matiz masculino plural del griego. «Hijos de Israel» conserva mejor el registro y la resonancia pactal que una neutralización como «israelitas».
- source_word: ἐπιστρέψει
  english_pob_choice: will turn
  chosen_spanish: hará volver
  alternatives_spanish:
  - volverá
  - volverá a
  lexicon: BDAG
  rationale: 'El verbo es transitivo: Juan actúa sobre otros para redirigirlos. En español, «hará volver» expresa con claridad esa fuerza causativa mejor que un simple intransitivo «volverá».'
- source_word: ἐπὶ
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - de vuelta a
  lexicon: BDAG
  rationale: Con ἐπιστρέφω y acusativo, la dirección hacia una persona se expresa naturalmente con «a». «Hacia» es posible, pero menos directo en este contexto.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: BDAG
  rationale: Aquí κύριος nombra al Dios de Israel. Siguiendo el criterio del proyecto para יהוה/YHWH, se vierte como «Yahvé» en el texto principal para no ocultar el nombre divino bajo una máscara titulativa.
- source_word: τὸν θεὸν αὐτῶν
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de ellos
  - su Dios
  lexicon: BDAG
  rationale: La relación posesiva se mantiene de manera natural en español. «Su Dios» conserva la brevedad y la referencia pactal del griego, con antecedente claro en «los hijos de Israel».
theological_decisions:
- issue: Renderizado de κύριον τὸν θεὸν αὐτῶν como referencia al Dios de Israel
  english_pob_reading: the Lord their God
  chosen_spanish_reading: Yahvé, su Dios
  alternative_spanish_readings:
  - el Señor, su Dios
  - Yahvé, el Dios de ellos
  rationale: El griego identifica al Dios de Israel, no a un señor humano. Dado el principio del proyecto de no enmascarar el nombre divino, «Yahvé» comunica mejor la referencia teológica que «el Señor», mientras que «su Dios» conserva la relación de pacto expresada en el texto.
  doctrine_reference: 'DOCTRINE.md §Contested terms: κύριος; §YHWH rendering policy'
- issue: Expresión covenantal τῶν υἱῶν Ἰσραήλ
  english_pob_reading: of the sons of Israel
  chosen_spanish_reading: de los hijos de Israel
  alternative_spanish_readings:
  - de los niños de Israel
  - de los israelitas
  rationale: El griego usa una fórmula bíblica estable y masculinizada. Mantener «hijos de Israel» preserva el registro escritural y la textura pactal; «israelitas» sería más idiomático pero menos transparente para la forma del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran un alto grado de acuerdo y no requieren corrección sustantiva. La única decisión de mayor peso en español es cómo transparentar κύριος: se conserva la referencia al Dios de Israel con «Yahvé» según la política del proyecto, sin alterar el contenido del versículo.'
  spanish_consistency_notes:
  - Se mantiene el orden natural del español sin perder la relación causal entre el agente («hará volver») y el destino («a Yahvé, su Dios»).
  - Se evita «convertirá» porque introduce un matiz interpretativo no explicitado por el griego.
  - «Yahvé» se usa como nombre divino principal conforme a la política terminológica del proyecto; no se sustituye por «SEÑOR».
  - «Hijos de Israel» conserva el eco bíblico y la precisión formal del genitivo griego.
