translation:
  language: es
  text: 'Y Zacarías le dijo al ángel: «¿Cómo sabré esto? Pues yo soy un hombre anciano, y mi esposa está avanzada en sus días[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de forma más idiomática, «mi esposa está avanzada en años». El griego dice literalmente «avanzada en sus días».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: El verbo narrativo simple pide en español «dijo», que es natural, sobrio y fiel al acto de habla sin añadir matiz.
- source_word: πρὸς τὸν ἄγγελον
  english_pob_choice: to the angel
  chosen_spanish: al ángel
  alternatives_spanish:
  - hacia el ángel
  lexicon: BDAG
  rationale: Con un verbo de habla, πρός introduce al destinatario; «al ángel» reproduce con naturalidad la dirección del discurso.
- source_word: Κατὰ τί
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿Por qué medio?
  - ¿De qué manera?
  lexicon: BDAG
  rationale: La pregunta busca la manera o base por la cual conocerá la promesa; «¿Cómo?» comunica esa fuerza idiomática sin recargar el español.
- source_word: γνώσομαι
  english_pob_choice: will I know
  chosen_spanish: sabré
  alternatives_spanish:
  - conoceré
  - podré saber
  lexicon: BDAG
  rationale: El futuro medio expresa aquí la llegada al conocimiento o certeza; «sabré» conserva el futuro y suena natural en español.
- source_word: πρεσβύτης
  english_pob_choice: an old man
  chosen_spanish: un hombre anciano
  alternatives_spanish:
  - un anciano
  - un hombre viejo
  lexicon: BDAG
  rationale: El término describe edad, no oficio; «hombre anciano» mantiene el valor lexical sin sonar despectivo como «viejo».
- source_word: γυνή μου
  english_pob_choice: my wife
  chosen_spanish: mi esposa
  alternatives_spanish:
  - mi mujer
  lexicon: BDAG
  rationale: En este contexto relacional, «mi esposa» expresa con claridad el vínculo conyugal y evita la ambigüedad de «mujer».
- source_word: προβεβηκυῖα ἐν ταῖς ἡμέραις αὐτῆς
  english_pob_choice: is advanced in her days
  chosen_spanish: está avanzada en sus días
  alternatives_spanish:
  - está avanzada en años
  - está muy entrada en edad
  lexicon: BDAG
  rationale: Se conserva la imagen griega literal «avanzada en sus días», como hizo la POB inglesa, porque el texto la usa deliberadamente y tiene valor auditable; se evita aplanarla de entrada a la idiomática «en años».
theological_decisions:
- issue: 'ἄγγελος: mensajero o ángel'
  english_pob_reading: angel
  chosen_spanish_reading: ángel
  alternative_spanish_readings:
  - mensajero
  rationale: El contexto inmediato presenta a Gabriel como ser celestial; traducir «ángel» sigue la lectura contextual de la POB inglesa y no introduce una ampliación doctrinal ajena al pasaje.
  doctrine_reference: Translation philosophy §1 (primacía del contexto original sobre una glosa genérica)
- issue: La expresión temporal «proβεβηκυῖα ἐν ταῖς ἡμέραις αὐτῆς»
  english_pob_reading: advanced in her days
  chosen_spanish_reading: avanzada en sus días
  alternative_spanish_readings:
  - avanzada en años
  - ya muy mayor
  rationale: Se preserva la tensión entre literalidad e idiomatismo. El español común diría «en años», pero mantener «en sus días» hace visible la metáfora griega que la POB inglesa decidió auditar mediante nota.
  doctrine_reference: Translation philosophy §3 (preservar metáforas cuando son interpretables y relevantes)
translation_notes:
  revision_awareness: 'La POB inglesa tradujo con equivalencia óptima y añadió nota para la expresión literal «advanced in her days». Esta versión española conserva esa misma tensión: texto principal fiel y legible, con nota que explicita la alternativa idiomática y la literalidad del griego. No se registran revisiones previas en el paquete aportado.'
  spanish_consistency_notes:
  - Se mantiene «ángel» para ἄγγελος conforme al contexto narrativo de Gabriel.
  - Se usa «dijo» como verbo narrativo simple, sin elevarlo a registro arcaico.
  - «Estar avanzada en sus días» reproduce la metáfora del original; la nota ofrece la forma más natural en español.
  - «Esposa» se eligió por claridad relacional; «mujer» sería más general y menos preciso aquí.
