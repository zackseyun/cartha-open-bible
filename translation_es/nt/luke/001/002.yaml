translation:
  language: es
  text: tal como nos lo transmitieron los que desde el principio fueron testigos oculares y llegaron a ser servidores de la palabra.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensaje». El griego λόγος puede significar «palabra», «mensaje» o «relato»; aquí probablemente se refiere al mensaje proclamado acerca de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - justo como
  - así como
  - tal como
  lexicon: BDAG
  rationale: La comparación/correspondencia con lo dicho antes en el contexto se expresa de modo natural en español con «tal como», que preserva el valor comparativo sin volver rígida la sintaxis.
- source_word: παρέδοσαν
  english_pob_choice: handed ... down
  chosen_spanish: nos lo transmitieron
  alternatives_spanish:
  - nos lo entregaron
  - nos lo pasaron
  - nos lo transmitieron
  lexicon: BDAG
  rationale: Aquí παραδίδωμι tiene el sentido de transmisión de una tradición o testimonio recibido; «transmitieron» conserva mejor esa fuerza que «entregaron», y el objeto implícito se naturaliza en español con «nos lo».
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  - nos
  lexicon: BDAG
  rationale: El dativo indirecto se expresa naturalmente con el pronombre clítico «nos» en español, manteniendo la referencia receptiva del mensaje.
- source_word: οἱ ἀπ’ ἀρχῆς
  english_pob_choice: those who from the beginning
  chosen_spanish: los que desde el principio
  alternatives_spanish:
  - los que desde el comienzo
  - los que fueron desde el principio
  lexicon: BDAG
  rationale: El artículo con la frase preposicional funciona sustantivamente; «los que desde el principio» conserva ese valor y la referencia temporal.
- source_word: αὐτόπται
  english_pob_choice: eyewitnesses
  chosen_spanish: testigos oculares
  alternatives_spanish:
  - testigos presenciales
  - testigos oculares
  - los que vieron por sí mismos
  lexicon: BDAG
  rationale: «Testigos oculares» es el equivalente español más asentado y preciso para αὐτόπται, indicando observación directa.
- source_word: ὑπηρέται
  english_pob_choice: servants
  chosen_spanish: servidores
  alternatives_spanish:
  - siervos
  - servidores
  - ministros
  lexicon: BDAG
  rationale: Se eligió «servidores» para evitar la resonancia eclesiástica más cargada de «ministros» y la posible dureza de «esclavos»; comunica servicio ligado al mensaje en un registro natural.
- source_word: γενόμενοι
  english_pob_choice: were / having become
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - se hicieron
  - pasaron a ser
  - llegaron a ser
  lexicon: BDAG
  rationale: 'El participio aoristo se vierte de manera verbal y dinámica como un proceso de entrada a una condición: «llegaron a ser», que conserva el matiz de devenir mejor que un simple «eran».'
- source_word: τοῦ λόγου
  english_pob_choice: of the word
  chosen_spanish: del mensaje
  alternatives_spanish:
  - de la palabra
  - del mensaje
  - del relato
  lexicon: BDAG
  rationale: Aunque «la palabra» sería más literal, el contexto sugiere la proclamación transmitida acerca de Jesús; «mensaje» evita una ambigüedad española innecesaria y sigue la aclaración auditada del inglés POB.
theological_decisions:
- issue: Sentido de τοῦ λόγου
  english_pob_reading: the apostolic message/gospel proclamation, rendered formally as 'the word'
  chosen_spanish_reading: el mensaje proclamado acerca de Jesús, expresado como «el mensaje»
  alternative_spanish_readings:
  - la palabra
  - el relato
  - la proclamación
  rationale: Se mantiene el sentido probable de λόγος como mensaje apostólico/testimonio recibido, no como título cristológico del Logos. En español, «mensaje» comunica mejor esa referencia contextual sin perder la relación con la tradición transmitida.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue la revisión auditada que conserva el sentido de γενόμενοι como «llegaron a ser» y evita convertir indebidamente el participio en un simple «eran». También respeta la decisión del POB inglés de tratar λόγος como el mensaje proclamado, aunque en español la opción principal se formula como «mensaje» para mayor claridad contextual.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin calcos innecesarios.
  - Se evita «ministros» para ὑπηρέται porque podría introducir una lectura eclesiástica no justificada por el contexto.
  - «Testigos oculares» preserva la idea de observación directa y es idiomático en español.
  - La nota [a] conserva la alternativa léxica documentada para λόγος, que en español crea una ambigüedad equivalente a la observada en inglés.
