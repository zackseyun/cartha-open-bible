base_translation:
  language: en
  yaml_path: translation/nt/luke/001/036.yaml
  text: And behold[a], Elizabeth your relative has also conceived a son in her old age[b], and this is the sixth month for her who was called barren.
  footnotes:
  - marker: a
    text: Or 'kinswoman'; traditionally, some render συγγενίς as 'cousin,' but the Greek more generally means a female relative.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'this month is the sixth for her.' That is, Elizabeth is in the sixth month of pregnancy.
    reason: lexical_alternative
