translation:
  language: es
  text: Y he aquí[a], Elisabet, tu pariente, también ha concebido un hijo en su vejez[b], y este es el sexto mes para ella, la que era llamada estéril.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mira’. El griego ἰδοὺ introduce una atención solemne; ‘he aquí’ conserva mejor ese tono que una orden coloquial.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘este es el sexto mes para ella’. Es decir, Elisabet está en su sexto mes de embarazo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - fíjate
  lexicon: BDAG
  rationale: ‘ἰδοὺ’ introduce una llamada de atención solemne. En español, ‘he aquí’ conserva ese valor deíctico y el registro elevado sin sonar tan arcaico como otras opciones.
- source_word: συγγενίς
  english_pob_choice: relative
  chosen_spanish: parienta
  alternatives_spanish:
  - pariente
  - familia
  - prima
  lexicon: BDAG
  rationale: El griego indica una pariente femenina, sin precisar el grado. ‘Parienta’ mantiene la referencia femenina y evita especificar indebidamente ‘prima’ o ‘cousin’.
- source_word: συνείληφεν
  english_pob_choice: has conceived
  chosen_spanish: ha concebido
  alternatives_spanish:
  - está encinta
  - ha quedado embarazada
  lexicon: BDAG
  rationale: El perfecto griego expresa el estado resultante de la concepción. ‘Ha concebido’ sigue de cerca ese valor y se ajusta al contexto narrativo.
- source_word: υἱὸν
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un niño
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente ‘hijo’, en español ‘un hijo’ es natural y fiel. ‘Un varón’ o ‘un niño’ estrechan o desplazan el matiz lexical.
- source_word: ἐν γήρει αὐτῆς
  english_pob_choice: in her old age
  chosen_spanish: en su vejez
  alternatives_spanish:
  - cuando era anciana
  - a edad avanzada
  lexicon: BDAG
  rationale: La expresión idiomática se vierte naturalmente como ‘en su vejez’, preservando el sentido temporal y la nota de edad avanzada sin explicitar más de lo que dice el texto.
- source_word: οὗτος μὴν ἕκτος ἐστὶν
  english_pob_choice: this is the sixth month
  chosen_spanish: este es ya el sexto mes
  alternatives_spanish:
  - este es el sexto mes
  - este mes es el sexto
  lexicon: BDAG
  rationale: La frase griega requiere explicitar ‘mes’ en español. ‘Ya’ ayuda a reproducir el valor resultativo y contextual de la construcción, sin añadir información ajena.
- source_word: αὐτῇ τῇ καλουμένῃ στείρᾳ
  english_pob_choice: for her who was called barren
  chosen_spanish: para la que era llamada estéril
  alternatives_spanish:
  - para la llamada estéril
  - para la que se llamaba estéril
  lexicon: BDAG
  rationale: La pasiva ‘era llamada’ refleja καλουμένῃ y mantiene el matiz de designación conocida. ‘Estéril’ es el equivalente español más preciso de στείρᾳ en este contexto.
theological_decisions:
- issue: Precisión del parentesco de Elisabet con María
  english_pob_reading: relative
  chosen_spanish_reading: parienta
  alternative_spanish_readings:
  - prima
  - pariente
  rationale: El griego συγγενίς habla de una parienta femenina, pero no identifica el grado exacto. ‘Parienta’ conserva la indeterminación del original y evita importar la tradición de ‘prima’.
  doctrine_reference: Primacía del texto original; no sobreespecificar relaciones no definidas por el griego
- issue: Relación de ‘el sexto mes’ con el embarazo de Elisabet
  english_pob_reading: this is the sixth month for her
  chosen_spanish_reading: este es ya el sexto mes para la que era llamada estéril
  alternative_spanish_readings:
  - está en su sexto mes de embarazo
  - este es el sexto mes para ella
  rationale: La formulación española conserva la estructura del griego y deja implícito, como en el original, que el referente es el embarazo de Elisabet. ‘Ya’ comunica el estado alcanzado sin convertir la frase en una paráfrasis explicativa.
  doctrine_reference: Equivalencia óptima; no ampliar más allá de lo que el texto autoriza
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés POB en cuanto al tono más formal de ἰδοὺ (‘behold’). También conserva la decisión revisada de no especificar ‘cousin’, manteniendo la indeterminación de συγγενίς y el valor literal de la referencia al sexto mes, con claridad natural en español.
  spanish_consistency_notes:
  - Se usa ‘Y he aquí’ para reflejar la apertura enfática del versículo y mantener un registro bíblico digno.
  - ‘Parienta’ se usa deliberadamente para conservar el parentesco femenino sin precisar el grado.
  - ‘Era llamada estéril’ reproduce la designación pasiva de καλουμένῃ y evita una traducción demasiado interpretativa.
  - ‘Un hijo’ mantiene el sentido directo de υἱὸν sin forzar ‘varón’ ni ‘niño’.
  - La frase ‘este es ya el sexto mes’ conserva la secuencia del griego y sugiere el estado cumplido sin añadir explicación innecesaria.
