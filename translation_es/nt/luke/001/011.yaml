translation:
  language: es
  text: Entonces se le apareció un ángel de Yahvé, de pie a la derecha del altar del incienso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: se le apareció
  alternatives_spanish:
  - fue visto
  - se hizo visible
  lexicon: BDAG
  rationale: El aoristo pasivo de ὁράω funciona aquí de manera intransitiva en narrativa; en español, «se le apareció» expresa de forma natural una manifestación visible repentina, sin volverla demasiado mecánica.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca avance narrativo; «Entonces» comunica secuencia temporal con naturalidad en español y mantiene el flujo de la escena.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: se le
  alternatives_spanish:
  - a él
  - ante él
  lexicon: BDAG
  rationale: El dativo con ὤφθη indica al destinatario de la aparición. En español, el clítico dativo «se le» integra bien esa relación sin perder el referente personal.
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un mensajero
  lexicon: BDAG
  rationale: En este contexto del templo, el referente es un ser celestial; «ángel» es la equivalencia contextual correcta, no «mensajero».
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  lexicon: BDAG
  rationale: Según el criterio del proyecto para κύριος cuando alude al nombre divino, se usa «Yahvé» en el texto principal. Aquí la expresión fija «ángel de Yahvé» conserva la referencia bíblica sin ocultarla tras «Señor».
- source_word: ἑστὼς
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - estando de pie
  - en pie
  lexicon: BDAG
  rationale: El participio perfecto describe la postura del ángel en el momento de la aparición. «De pie» es natural en español y preserva la imagen estática.
- source_word: ἐκ δεξιῶν
  english_pob_choice: at the right side
  chosen_spanish: a la derecha
  alternatives_spanish:
  - al lado derecho
  - del lado derecho
  lexicon: BDAG
  rationale: La construcción indica posición en el lado derecho. «A la derecha» es idiomático en español y mantiene la dirección espacial.
- source_word: θυσιαστηρίου
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: BDAG
  rationale: θυσιαστήριον se traduce de manera estándar como «altar». No se añade especificación innecesaria.
- source_word: τοῦ θυμιάματος
  english_pob_choice: of incense
  chosen_spanish: del incienso
  alternatives_spanish:
  - de la ofrenda de incienso
  - para el incienso
  lexicon: BDAG
  rationale: El genitivo identifica el altar como el del incienso. En español, «altar del incienso» reproduce la relación nominal de forma clara y natural.
theological_decisions:
- issue: Renderizado de κύριος en ἄγγελος κυρίου
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El POB en inglés usa «the Lord» por convención editorial, pero el proyecto español pide «Yahvé» para el nombre divino cuando κύριος refleja el tetragrámaton o una alusión directa a él. En esta fórmula bíblica estable, «ángel de Yahvé» evita el ocultamiento del nombre.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Yahvé'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego y la pauta auditada en inglés: aparición repentina, destinatario explícito, ángel celestial, ubicación espacial y el altar específico del incienso. No se introducen notas porque no hay variantes textuales ni ambigüedades que requieran comentario adicional en este versículo.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» según el estándar del proyecto.
  - Se conserva «ángel» y no «mensajero» por el contexto visionario-templario.
  - La construcción «se le apareció» refleja tanto el pasivo narrativo como el destinatario dativo.
  - «A la derecha» mantiene la direccionalidad espacial del griego sin sobreexplicación.
  - «Altar del incienso» es la forma española natural para el genitivo especificativo.
