translation:
  language: es
  text: para que conozcas la certeza de las enseñanzas que recibiste[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la confiabilidad»; el sustantivo griego puede denotar certeza, seguridad o confiabilidad.
    reason: lexical_alternative
  - marker: b
    text: O «fuiste enseñado»; el verbo es la fuente del término «catequizar».
