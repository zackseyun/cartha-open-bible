  to: para que conozcas la certeza de las enseñanzas que recibiste[a][b].
  rationale: La revisión mejora la naturalidad y legibilidad en español sin alterar el sentido del griego ni el razonamiento del English POB. «Las enseñanzas que recibiste» expresa de manera más idiomática el contenido de λόγων + κατηχήθης que «las cosas acerca de las cuales has sido instruido», mientras conserva la idea de instrucción previa y formal. Se mantienen «certeza» y las notas alternativas para preservar la amplitud semántica documentada.
