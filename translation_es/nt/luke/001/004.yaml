lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα introduce una cláusula de propósito; en español, «para que» expresa de manera natural y fiel esa finalidad.
- source_word: ἐπιγνῷς
  english_pob_choice: you may know
  chosen_spanish: conozcas
  alternatives_spanish:
  - llegues a conocer
  - sepas
  lexicon: BDAG
  rationale: El subjuntivo en una cláusula final pide una forma como «conozcas». Conserva el sentido de llegar a conocer o reconocer sin sobretraducir la intensificación del verbo compuesto.
- source_word: περὶ ὧν
  english_pob_choice: about which
  chosen_spanish: acerca de las cuales
  alternatives_spanish:
  - sobre las cuales
  - en cuanto a las cuales
  lexicon: BDAG
  rationale: περὶ con genitivo indica referencia; «acerca de las cuales» mantiene la relación con la relativa y suena natural en español.
- source_word: κατηχήθης
  english_pob_choice: you were instructed
  chosen_spanish: has sido instruido
  alternatives_spanish:
  - has sido enseñado
  - fuiste catequizado
  lexicon: BDAG
  rationale: El pasivo de κατηχέω apunta a enseñanza recibida de forma formal. «Instruido» conserva ese valor sin imponer terminología eclesiástica posterior en el texto principal.
- source_word: λόγων
  english_pob_choice: the things
  chosen_spanish: las cosas
  alternatives_spanish:
  - las palabras
  - los asuntos
  - los relatos
  lexicon: BDAG
  rationale: En esta construcción, λόγων se refiere al contenido de la instrucción. «Las cosas» sigue de cerca el sentido del inglés POB y evita reducirlo a meras «palabras».
- source_word: τὴν ἀσφάλειαν
  english_pob_choice: the certainty
  chosen_spanish: la certeza
  alternatives_spanish:
  - la seguridad
  - la confiabilidad
  - la firmeza
  lexicon: BDAG
  rationale: ἀσφάλεια puede significar certeza, seguridad o confiabilidad. «La certeza» preserva la amplitud epistémica del pasaje y armoniza con el propósito de Lucas de afirmar lo recibido.
theological_decisions:
- issue: 'Alcance de ἀσφάλεια: certeza objetiva o seguridad subjetiva'
  english_pob_reading: The English POB preserves the breadth of certainty/reliability rather than narrowing the verse to either inward assurance or merely factual verification.
  chosen_spanish_reading: '«La certeza» conserva la amplitud: puede implicar confiabilidad objetiva de lo enseñado y también la seguridad del destinatario al conocerlo con fundamento.'
  alternative_spanish_readings:
  - la seguridad
  - la confiabilidad
  - la certeza plena
  rationale: La palabra griega admite más de un matiz. Traducirla como «certeza» evita decidir prematuramente entre certeza objetiva y seguridad subjetiva, manteniendo la tensión interpretativa documentada por el POB.
  doctrine_reference: Preservar la tensión teológica y epistemológica del texto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el acuerdo alto del POB inglés con el texto griego, conservando la cláusula final de propósito, el valor referencial de περὶ ὧν y la amplitud semántica de ἀσφάλεια sin resolverla unilateralmente.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se prefirió «instruido» en el cuerpo del texto para reflejar el pasivo de κατηχέω sin introducir «catequizado» como término principal.
  - «La certeza» se mantiene como opción principal y las alternativas se reservan en nota para respetar la ambigüedad documentada.
