  rationale: 'La revisión corrige la principal desviación léxica: σιωπῶν debe mantenerse como ‘en silencio’ en el texto principal, dejando ‘mudo’ como alternativa documentada, ya que el griego ya añade explícitamente la incapacidad de hablar. También recoloca y corrige las notas para que cada marcador corresponda al segmento que comenta, y aligera el relativo para un español más natural sin perder precisión.'
