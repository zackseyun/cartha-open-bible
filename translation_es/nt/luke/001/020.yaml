translation:
  language: es
  text: Y mira[a], estarás en silencio[b] y no podrás hablar hasta el día en que sucedan estas cosas, porque no creíste mis palabras, que se cumplirán en el tiempo señalado para ellas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he aquí». La partícula griega introduce el anuncio con fuerza de llamada de atención solemne.
    reason: lexical_alternative
  - marker: b
    text: O «serás mudo». El griego combina «estar en silencio» con «no poder hablar», subrayando una incapacidad impuesta para hablar.
    reason: lexical_alternative
  - marker: c
    text: O «a su tiempo oportuno». La frase apunta al momento adecuado o señalado para que estas palabras se cumplan.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira aquí
  - mira bien
  lexicon: BDAG
  rationale: La partícula funciona como llamada de atención solemne en el discurso. En español, «mira» conserva el golpe retórico sin sonar arcaico como «he aquí».
- source_word: ἔσῃ σιωπῶν
  english_pob_choice: you will be silent
  chosen_spanish: serás mudo
  alternatives_spanish:
  - estarás en silencio
  - serás silencioso
  - callarás
  lexicon: BDAG
  rationale: El griego combina un estado de silencio con la imposición de incapacidad para hablar. «Serás mudo» reproduce mejor esa condición impuesta que un simple «callarás», y mantiene abierta la tensión lexical señalada en el audit trail.
- source_word: μὴ δυνάμενος λαλῆσαι
  english_pob_choice: unable to speak
  chosen_spanish: no podrás hablar
  alternatives_spanish:
  - no podrás decir nada
  - incapaz de hablar
  - no tendrás poder para hablar
  lexicon: BDAG
  rationale: «No podrás hablar» expresa con naturalidad la incapacidad efectiva del participio, sin convertirlo en una mera recomendación de silencio.
- source_word: ἄχρι ἧς ἡμέρας
  english_pob_choice: until the day
  chosen_spanish: hasta el día en que
  alternatives_spanish:
  - hasta el día cuando
  - hasta que llegue el día en que
  - hasta el día
  lexicon: BDAG
  rationale: La construcción temporal se vierte de manera fluida en español con «hasta el día en que», conservando el marco límite del evento.
- source_word: γένηται ταῦτα
  english_pob_choice: these things happen
  chosen_spanish: sucedan estas cosas
  alternatives_spanish:
  - ocurran estas cosas
  - se cumplan estas cosas
  - acontezcan estas cosas
  lexicon: BDAG
  rationale: «Suceder» comunica bien γίνομαι en este contexto narrativo. «Estas cosas» mantiene la referencia deíctica sin añadir interpretación.
- source_word: ἀνθ’ ὧν
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - por cuanto
  - a causa de que
  - debido a que
  lexicon: BDAG
  rationale: Aquí la frase introduce la causa del castigo. «Porque» es la forma más directa y transparente en español.
- source_word: οὐκ ἐπίστευσας
  english_pob_choice: you did not believe
  chosen_spanish: no creíste
  alternatives_spanish:
  - no tuviste fe
  - no confiaste
  - no creíste en
  lexicon: BDAG
  rationale: El verbo πιστεύω con objeto dativo aquí pide «creer» en sentido de aceptar como verdadero lo dicho. «No creíste» preserva esa fuerza sin añadir matices ajenos.
- source_word: τοῖς λόγοις μου
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi palabra
  - mis dichos
  - lo que dije
  lexicon: BDAG
  rationale: «Palabras» respeta el plural griego λόγοις y el foco en la declaración pronunciada. «Mi palabra» sería posible, pero perdería el plural explícito.
- source_word: οἵτινες
  english_pob_choice: which
  chosen_spanish: las cuales
  alternatives_spanish:
  - que
  - las que
  - las cuales precisamente
  lexicon: BDAG
  rationale: El relativo explicativo en español puede conservarse con «las cuales», manteniendo la referencia directa a «mis palabras».
- source_word: πληρωθήσονται
  english_pob_choice: will be fulfilled
  chosen_spanish: se cumplirán
  alternatives_spanish:
  - serán cumplidas
  - se realizarán
  - tendrán cumplimiento
  lexicon: BDAG
  rationale: En español bíblico, «cumplirse» expresa bien la realización eficaz de palabras o promesas. También conserva la pasiva teológica sin sonar forzado.
- source_word: εἰς τὸν καιρὸν αὐτῶν
  english_pob_choice: in their appointed time
  chosen_spanish: a su tiempo señalado
  alternatives_spanish:
  - en su tiempo señalado
  - en su tiempo oportuno
  - en el tiempo designado para ellas
  lexicon: BDAG
  rationale: καιρός apunta a tiempo oportuno o señalado, no solo a cronología. «A su tiempo señalado» preserva la idea de designación y evita una lectura meramente temporal.
theological_decisions:
- issue: Naturaleza de la sanción sobre Zacarías
  english_pob_reading: The verse presents a divinely imposed inability to speak until the promise is fulfilled.
  chosen_spanish_reading: El versículo presenta una incapacidad para hablar impuesta divinamente hasta que la promesa se cumpla.
  alternative_spanish_readings:
  - solo una orden de guardar silencio
  - una mudez meramente simbólica
  rationale: La combinación de «serás mudo» y «no podrás hablar» indica una condición impuesta, no solo una exhortación a callar. La traducción mantiene ambos elementos para no suavizar la tensión del pasaje.
  doctrine_reference: Primacía del texto original y preservación de la tensión lexical-teológica.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés, sin cambios de revisión posteriores; la traducción conserva la doble expresión de silencio/incapacidad y la idea de cumplimiento en tiempo señalado.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en la acción judicial sin añadirlo explícitamente, porque el versículo depende del contexto narrativo inmediato.
  - Se traduce λόγοις como «palabras» en plural para respetar el griego y el énfasis en el contenido verbal recibido.
  - Se usa «mudo» en el texto principal con nota porque el griego permite tanto la idea de silencio como la de mudez, y el audit trail inglés conserva esa tensión.
