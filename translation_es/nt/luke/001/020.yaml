  text: καὶ ἰδοὺ ἔσῃ σιωπῶν καὶ μὴ δυνάμενος λαλῆσαι ἄχρι ἧς ἡμέρας γένηται ταῦτα, ἀνθ’ ὧν οὐκ ἐπίστευσας τοῖς λόγοις μου, οἵτινες πληρωθήσονται εἰς τὸν καιρὸν αὐτῶν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/001/020.yaml
  text: And behold[a], you will be silent and unable to speak until the day these things happen, because you did not believe my words[b], which will be fulfilled in their appointed time.
  footnotes:
  - marker: a
    text: Or 'you will be mute.' The Greek combines 'silent' with 'unable to speak,' emphasizing enforced speechlessness.
    reason: lexical_alternative
  - marker: b
    text: Or 'at their proper time.' The phrase refers to the fitting or appointed time for these words to be fulfilled.
    reason: lexical_alternative
