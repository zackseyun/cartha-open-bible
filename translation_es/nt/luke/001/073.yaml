translation:
  language: es
  text: el juramento que juró a Abraham, nuestro padre[a], para concedernos
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “nuestro antepasado”. El griego dice literalmente “nuestro padre”, conservando el lenguaje de pacto respecto de Abraham.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅρκον
  english_pob_choice: the oath
  chosen_spanish: el juramento
  alternatives_spanish:
  - un juramento
  lexicon: BDAG
  rationale: El sustantivo apunta a un juramento concreto ya mencionado en el contexto; en español, el artículo definido comunica esa referencia específica sin añadir interpretación.
- source_word: ὃν
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  lexicon: BDAG
  rationale: El relativo simple es la forma más natural en español para enlazar el antecedente con la cláusula siguiente sin sonar pesado.
- source_word: ὤμοσεν
  english_pob_choice: he swore
  chosen_spanish: juró
  alternatives_spanish:
  - lo juró
  - prestó juramento
  lexicon: BDAG
  rationale: El verbo español 'jurar' reproduce de manera directa el acto verbal del griego y mantiene la relación formal con 'juramento'.
- source_word: πρὸς Ἀβραὰμ
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - hacia Abraham
  - con respecto a Abraham
  lexicon: BDAG
  rationale: Con verbos de jurar, la preposición griega se expresa naturalmente en español con 'a' para indicar el destinatario del juramento.
- source_word: τὸν πατέρα ἡμῶν
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - nuestro antepasado
  lexicon: BDAG
  rationale: Se conserva el lenguaje familiar y de pacto del griego. 'Padre' reproduce la forma literal y su resonancia bíblica; 'antepasado' suaviza esa carga covenantal.
- source_word: τοῦ δοῦναι ἡμῖν
  english_pob_choice: to grant to us
  chosen_spanish: para concedernos
  alternatives_spanish:
  - para darnos
  - a fin de darnos
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito; 'concedernos' conserva el tono elevado del cántico y refleja bien la idea de otorgar algo prometido, no solo entregar algo.
theological_decisions:
- issue: Lenguaje de pacto asociado con Abraham
  english_pob_reading: our father
  chosen_spanish_reading: nuestro padre
  alternative_spanish_readings:
  - nuestro antepasado
  rationale: Se preserva el idioma bíblico que vincula a Abraham con la historia del pacto y con la voz comunitaria de Zacarías. 'Antepasado' es posible, pero atenúa esa resonancia.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El texto griego y el registro auditado en inglés concuerdan en una lectura estable: un juramento específico hecho a Abraham, con el valor relacional de ''nuestro padre''. No hay revisiones aplicadas en el historial reciente.'
  spanish_consistency_notes:
  - Se evitó 'Señor' o fórmulas de sustitución porque este versículo no contiene el nombre divino.
  - '''Juramento'' y ''juró'' mantienen una correspondencia léxica transparente con ὅρκον / ὤμοσεν.'
  - '''Concedernos'' preserva el matiz elevado del English POB ''to grant to us'' sin salir del alcance del infinitivo de propósito.'
