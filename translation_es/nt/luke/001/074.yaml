translation:
  language: es
  text: para que, habiendo sido rescatados de la mano de nuestros enemigos[b], le sirviéramos[c] sin temor[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «sin miedo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «habiendo sido librados del poder de nuestros enemigos».'
    reason: lexical_alternative
  - marker: c
    text: El verbo puede también traducirse «adorar», especialmente cuando el servicio se dirige a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφόβως
  english_pob_choice: without fear
  chosen_spanish: sin temor
  alternatives_spanish:
  - sin miedo
  - sin temor alguno
  - valientemente
  lexicon: BDAG
  rationale: El adverbio expresa ausencia de temor; «sin temor» conserva el valor natural en español y encaja con la construcción final de propósito. «Valientemente» sería más interpretativo y perdería el paralelo con la seguridad concedida por la liberación.
- source_word: ἐκ χειρὸς
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la autoridad de
  - de las manos de
  lexicon: BDAG
  rationale: La imagen idiomática de liberación se mantiene con «de la mano de», que es comprensible en español y preserva la metáfora bíblica sin desdibujarla en una abstracción.
- source_word: ἐχθρῶν
  english_pob_choice: our enemies
  chosen_spanish: nuestros enemigos
  alternatives_spanish:
  - enemigos
  - los enemigos
  lexicon: BDAG
  rationale: Aunque el griego no expresa posesivo explícito, el contexto inmediato de la profecía incluye a los destinatarios del rescate; por eso «nuestros» refleja bien la referencia implícita de primera persona plural.
- source_word: ῥυσθέντας
  english_pob_choice: having been rescued
  chosen_spanish: habiendo sido rescatados
  alternatives_spanish:
  - habiendo sido librados
  - después de haber sido rescatados
  - una vez rescatados
  lexicon: BDAG
  rationale: El participio aoristo pasivo indica una acción previa al infinitivo de propósito. «Habiendo sido rescatados» conserva la anterioridad y el matiz de liberación completa.
- source_word: λατρεύειν
  english_pob_choice: serve
  chosen_spanish: servir
  alternatives_spanish:
  - rendir culto
  - adorar
  - prestar servicio
  lexicon: BDAG
  rationale: «Servir» mantiene el valor amplio de λατρεύω como servicio rendido a Dios sin limitarlo a culto litúrgico. En español es la opción más natural y fiel al sentido covenantal del término.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Dios
  lexicon: BDAG
  rationale: El dativo se refiere a Dios en el contexto; en español, con «servir», el dativo de complemento indirecto «le» es idiomático y conserva la referencia sin necesidad de explicitarla.
theological_decisions:
- issue: Alcance de λατρεύειν en relación con Dios
  english_pob_reading: serve him
  chosen_spanish_reading: le sirviéramos
  alternative_spanish_readings:
  - le rindiéramos culto
  - le adoráramos
  rationale: El verbo puede incluir servicio reverente o culto, pero «servir» deja abierta esa amplitud y evita reducir el término a una sola esfera ritual. La forma de subjuntivo en la cláusula de propósito refleja bien la finalidad del rescate.
  doctrine_reference: Translation philosophy §6; preservar la tensión teológica sin sobrecerrarla.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el expediente inglés POB, sin cambios sustantivos respecto de la solución auditada más reciente; mantiene la misma estructura de propósito, la imagen de la «mano» y la amplitud semántica de λατρεύειν.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como término predeterminado solo donde corresponda; aquí el referente se expresa pronominalmente por el contexto inmediato y no requiere nombre divino explícito.
  - «Rescatados» se eligió por su fuerza de liberación completa; «librados» queda como alternativa válida en nota.
  - Se mantuvo «sin temor» en vez de «sin miedo» porque suena más natural en registro bíblico y conecta mejor con la finalidad expresada por el infinitivo.
  - La combinación «de la mano de» reproduce la metáfora semítica sin convertirla en una explicación conceptual.
