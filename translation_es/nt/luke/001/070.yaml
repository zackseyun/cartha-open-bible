translation:
  language: es
  text: tal como habló por boca de sus santos profetas desde antiguo[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desde tiempos antiguos'; la expresión puede denotar una antigüedad remota. Algunos la toman con más fuerza como 'desde la eternidad', pero aquí la referencia a los profetas favorece el sentido 'desde antiguo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: BDAG
  rationale: Expresa correspondencia o conformidad con lo anterior sin sonar forzado en español. 'Tal como' conserva el matiz comparativo del griego y encaja bien en una formulación de cumplimiento profético.
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló
  lexicon: BDAG
  rationale: '''Hablar'' reproduce el acto de comunicación verbal y funciona naturalmente con la expresión idiomática siguiente, ''por boca de''.'
- source_word: διὰ στόματος
  english_pob_choice: through the mouth
  chosen_spanish: por boca de
  alternatives_spanish:
  - por la boca de
  - a través de la boca de
  lexicon: BDAG
  rationale: La locución española 'por boca de' conserva el valor instrumental e idiomático del griego y mantiene la imagen concreta de la mediación profética.
- source_word: τῶν ἁγίων ... προφητῶν
  english_pob_choice: his holy prophets
  chosen_spanish: sus santos profetas
  alternatives_spanish:
  - sus profetas santos
  - sus profetas consagrados
  lexicon: BDAG
  rationale: '''Santos'' funciona naturalmente como adjetivo atributivo de ''profetas'' y preserva la idea de personas apartadas para Dios. Se mantiene el orden español más idiomático sin perder el vínculo con el posesivo divino.'
- source_word: ἀπ’ αἰῶνος
  english_pob_choice: from of old
  chosen_spanish: desde de antiguo
  alternatives_spanish:
  - desde tiempos antiguos
  - desde antiguo
  - desde la antigüedad
  lexicon: BDAG
  rationale: La intención es reflejar la referencia temporal remota, no 'desde la eternidad'. 'Desde de antiguo' conserva la idea de antigüedad histórica del audit trail inglés; aunque menos común, es comprensible y literal en sentido.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: sus
  alternatives_spanish:
  - de él
  - sus
  lexicon: BDAG
  rationale: 'El posesivo se entiende mejor en español como referencia a Dios: ''sus santos profetas''. El contexto de la canción de Zacarías favorece esa lectura.'
theological_decisions:
- issue: Alcance de ἀπ’ αἰῶνος
  english_pob_reading: temporal antiquity within salvation history ('from of old')
  chosen_spanish_reading: antigüedad histórica dentro de la historia de salvación ('desde de antiguo')
  alternative_spanish_readings:
  - desde la eternidad
  - desde tiempos antiguos
  rationale: El contexto de 'profetas' orienta la frase hacia testimonio profético antiguo, no hacia una afirmación metafísica sobre la eternidad. La redacción española conserva esa tensión y evita sobrerinterpretar el término.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se documentan revisiones textuales o cambios relevantes. La redacción española sigue la lectura estable del inglés POB, ajustando solo la formulación para que suene natural en español sin perder la imagen idiomática de 'por boca de' ni el valor temporal de ἀπ’ αἰῶνος.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto lo requiera explícitamente; aquí el pronombre posesivo 'sus' refleja el referente divino sin necesidad de nombrarlo.
  - Se conserva el registro bíblico-digno y moderno, evitando 'SEÑOR' como sustituto del nombre divino porque no aparece en este versículo.
  - La expresión 'por boca de' preserva la metáfora profética en lugar de simplificarla a una mera fórmula de cita.
