translation:
  language: es
  text: Ahora, en el sexto mes[a], el ángel Gabriel fue enviado de parte de Dios a una ciudad de Galilea llamada Nazaret[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el sexto mes del embarazo de Elisabet; véase Lucas 1:24, 36.
    reason: cross_reference
  - marker: b
    text: 'O: «a una ciudad en Galilea llamada Nazaret».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ τῷ μηνὶ τῷ ἕκτῳ
  english_pob_choice: Now in the sixth month
  chosen_spanish: Ahora, en el sexto mes
  alternatives_spanish:
  - Y en el sexto mes
  - En el sexto mes
  lexicon: BDAG
  rationale: ἐν + dativo expresa tiempo, por lo que «en el sexto mes» conserva la referencia temporal. δέ es un conector suave; «Ahora» mantiene el avance discursivo natural en español sin intensificar indebidamente el contraste. Se conserva «el sexto mes» de forma directa y publicable.
- source_word: ἀπεστάλη
  english_pob_choice: was sent
  chosen_spanish: fue enviado
  alternatives_spanish:
  - fue despachado
  lexicon: BDAG
  rationale: El aoristo pasivo de ἀποστέλλω se traduce con claridad por «fue enviado», preservando la voz pasiva y la idea de comisión divina sin añadir matices interpretativos.
- source_word: ὁ ἄγγελος
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: BDAG
  rationale: En este contexto narrativo, ἄγγελος se refiere a un ser celestial, no a un mensajero humano. «El ángel» es la opción natural y fiel en español.
- source_word: Γαβριὴλ
  english_pob_choice: Gabriel
  chosen_spanish: Gabriel
  lexicon: BDAG
  rationale: Los nombres propios se transliteran de manera estándar; en español, «Gabriel» es la forma establecida y transparente.
- source_word: ἀπὸ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: por Dios
  alternatives_spanish:
  - desde Dios
  lexicon: BDAG
  rationale: Aunque ἀπό con genitivo suele indicar fuente u origen, en español «fue enviado por Dios» expresa de forma natural la procedencia y mantiene implícita la comisión divina. «Desde Dios» suena menos idiomático en esta construcción.
- source_word: εἰς πόλιν τῆς Γαλιλαίας
  english_pob_choice: to a city of Galilee
  chosen_spanish: a una ciudad de Galilea
  alternatives_spanish:
  - a una ciudad en Galilea
  lexicon: BDAG
  rationale: εἰς marca dirección/destino, por eso «a» es adecuado. El genitivo τῆς Γαλιλαίας puede entenderse como pertenencia o ubicación; «de Galilea» sigue de cerca el griego y es idiomático en español.
- source_word: ᾗ ὄνομα Ναζαρὲθ
  english_pob_choice: named Nazareth
  chosen_spanish: llamada Nazaret
  alternatives_spanish:
  - de nombre Nazaret
  - cuyo nombre era Nazaret
  lexicon: BDAG
  rationale: La construcción relativa literalmente equivale a «cuyo nombre [era] Nazaret». «Llamada Nazaret» preserva el sentido de manera concisa y natural en español. Se evita «Cristo» o cualquier ampliación explicativa, ya que no aparece en el texto.
theological_decisions:
- issue: Referencia de «el sexto mes»
  english_pob_reading: Understood as the sixth month of Elizabeth's pregnancy in the immediate narrative context, but translated simply as 'the sixth month' without expansion.
  chosen_spanish_reading: Se traduce simplemente «el sexto mes», dejando la referencia inmediata al contexto narrativo.
  alternative_spanish_readings:
  - el sexto mes del embarazo de Elisabet
  rationale: El contexto de Lucas 1 sugiere el sexto mes del embarazo de Elisabet, pero el griego no lo repite aquí. La traducción conserva la formulación abierta para no introducir explicación en el cuerpo del texto, manteniendo la tensión documental del original.
  doctrine_reference: Primacía del texto fuente y preservación del contexto sin ampliación interpretativa en la línea principal.
translation_notes:
  revision_awareness: El borrador sigue el estado de la revisión más reciente, que no introdujo cambios y mantuvo alta concordancia con el control cruzado. No se observan revisiones aplicadas adicionales para este versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferida para el nombre divino en el proyecto, pero aquí el texto griego usa θεοῦ y la forma adecuada es «Dios».
  - «Nazaret» se conserva como topónimo estándar en español.
  - La puntuación reproduce la pausa narrativa inicial con una coma tras «mes» y la clausura de la frase con coma final, en línea con el patrón del inglés auditado.
