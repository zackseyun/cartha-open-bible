- from: Y el niño seguía creciendo y fortaleciéndose[a] en espíritu, y estaba en el desierto[b] hasta el día de su manifestación pública[c] a Israel.
  to: Y el niño seguía creciendo y fortaleciéndose[a] en espíritu, y estaba en el desierto[b] hasta el día de su aparición pública[c] a Israel.
  rationale: Se corrige la nota [b] para que preserve de verdad la alternativa basada en el plural griego ἐρήμοις. Además, se ajusta «manifestación pública» a «aparición pública» por mayor naturalidad en español, manteniendo el sentido de ἀνάδειξις. Se conserva «en espíritu» con su nota por fidelidad a la ambigüedad deliberada del griego.
