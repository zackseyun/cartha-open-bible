  text: Τὸ δὲ παιδίον ηὔξανε καὶ ἐκραταιοῦτο πνεύματι, καὶ ἦν ἐν ταῖς ἐρήμοις ἕως ἡμέρας ἀναδείξεως αὐτοῦ πρὸς τὸν Ἰσραήλ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/001/080.yaml
  text: And the child kept growing and becoming strong in spirit[c][b][a], and he was in the wilderness until the day of his public appearance to Israel.
  footnotes:
  - marker: a
    text: Or 'in the Spirit.' The Greek can be understood more generally as inner or spiritual strength, or more specifically as strength in relation to the Holy Spirit.
    reason: alternative_reading
  - marker: b
    text: Or 'in the wilderness.' Greek has the plural, literally 'in the wilderness regions' or 'in the desolate places.'
    reason: lexical_alternative
  - marker: c
    text: Or 'until the day of his manifestation before Israel.'
    reason: lexical_alternative
