  glossary_alignment: No hay conflictos con la terminología base del proyecto. «En espíritu» preserva correctamente la decisión de no identificar explícitamente al Espíritu Santo. «Israel» está bien. No hay términos de glosario mayor comprometidos.
  issues:
  - severity: medium
    issue: La nota [b] repite la lectura principal «en el desierto».
    rationale: Una nota de alternativa léxica debe ofrecer una verdadera alternativa o explicación del plural griego; tal como está, no añade información útil y genera inconsistencia con la política de notas.
  - severity: low
    issue: «Manifestación pública» es fiel pero algo rígido en español.
    rationale: Aunque correcto semánticamente, «aparición pública» o «presentación pública» suena más natural y comunica mejor la idea de emergencia pública sin pesadez.
