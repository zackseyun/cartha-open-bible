    rationale: Aunque πόθεν μοι τοῦτο puede verterse más literalmente como «¿de dónde me viene esto?», la auditoría inglesa eligió expresar el sentido idiomático de favor concedido. En español, «¿por qué se me concede esto?» preserva mejor esa racionalidad documentada.
  - severity: low
    issue: La nota al pie está formulada como si ofreciera una alternativa, pero repite el texto principal.
    rationale: Si el texto principal permanece literal, la nota no añade contraste útil. Conviene que la nota preserve la alternativa más literal solo si el texto principal adopta la formulación idiomática más explícita.
