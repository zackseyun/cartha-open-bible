translation:
  language: es
  text: ¿Y por qué se me concede esto[a], que la madre de mi Señor venga a mí?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Y de dónde me viene esto...?», un giro idiomático que expresa asombro ante recibir tal honor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πόθεν
  english_pob_choice: why
  chosen_spanish: ¿de dónde me viene esto
  alternatives_spanish:
  - ¿por qué se me concede esto
  - ¿cómo es esto para mí
  lexicon: BDAG
  rationale: El griego πόθεν pregunta por origen o procedencia, pero aquí funciona como exclamación idiomática de asombro. En español, «¿de dónde me viene esto?» conserva la idea de procedencia y expresa naturalmente la sorpresa ante un honor inesperado.
- source_word: μοι
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: BDAG
  rationale: El dativo señala a la persona que recibe esta situación inesperada. El giro español «me viene» comunica de forma natural esa relación de beneficio o favor recibido.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - este honor
  - este privilegio
  lexicon: BDAG
  rationale: El demostrativo en griego es breve y no nombra explícitamente el contenido como «honor» o «privilegio». «Esto» preserva esa tersura y deja que el contexto exprese el asombro.
- source_word: ἵνα ἔλθῃ
  english_pob_choice: that ... should come
  chosen_spanish: que venga
  alternatives_spanish:
  - para que venga
  - que viniera
  lexicon: BDAG
  rationale: Después de la exclamación, ἵνα introduce el contenido de la circunstancia admirada. En español, «que venga» mantiene el valor de resultado/contenido sin forzar una traducción demasiado mecánica.
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: la madre
  alternatives_spanish:
  - madre
  lexicon: BDAG
  rationale: Correspondencia léxica directa y natural en español.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: mi Señor
  alternatives_spanish:
  - mi Dueño
  - mi Maestro
  lexicon: BDAG
  rationale: Se conserva el título reverencial y cristológico de κύριος como «Señor», con el posesivo «mi» reflejando el genitivo μου. «Maestro» o «Dueño» reducirían o desplazarían el peso del título en este contexto lucano.
- source_word: πρὸς ἐμέ
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: BDAG
  rationale: πρός con acusativo marca movimiento hacia la persona. «A mí» es la equivalencia española más natural y fiel aquí.
theological_decisions:
- issue: Título κύριος en «la madre de mi Señor»
  english_pob_reading: my Lord
  chosen_spanish_reading: mi Señor
  alternative_spanish_readings:
  - mi maestro
  - mi dueño
  rationale: La traducción mantiene el valor reverencial y cristológico de κύριος como «Señor», sin suavizarlo a un término menos cargado. Esto preserva la fuerza confesional del pasaje en el relato de la visitación.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Carácter idiomático de πόθεν μοι τοῦτο
  english_pob_reading: And why is this granted to me...
  chosen_spanish_reading: ¿Y de dónde me viene esto...
  alternative_spanish_readings:
  - ¿Y por qué se me concede esto...
  - ¿Y cómo es esto para mí...
  rationale: El griego no pide una traducción puramente literal de lugar, sino que expresa asombro ante un favor inmerecido. «¿De dónde me viene esto?» conserva la fuerza idiomática y evita añadir conceptos interpretativos que el texto no formula explícitamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece en el texto principal exactamente donde corresponde. La redacción también se ajustó para mantener el valor idiomático de πόθεν μοι τοῦτο sin perder la referencia a la procedencia y al asombro.'
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος, conforme al tratamiento cristológico del término en este contexto lucano.
  - Se optó por «a mí» para πρὸς ἐμέ por naturalidad en español y fidelidad al movimiento hacia la persona.
  - Se evitó introducir «honor» o «privilegio» en el texto principal; esa inferencia queda en la nota, no en la traducción base.
