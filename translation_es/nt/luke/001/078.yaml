translation:
  language: es
  text: por la entrañable misericordia de nuestro Dios[a], con la cual nos visitará la aurora desde lo alto[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la compasión entrañable». ἐλέους y σπλάγχνα forman una expresión idiomática de afecto profundo; el español permite varias soluciones cercanas.
    reason: lexical_alternative
  - marker: b
    text: O «el amanecer». ἀνατολή puede también evocar el título mesiánico «el Renuevo» o «el Brote» en la Septuaginta.
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: BDAG
  rationale: Con acusativo, διά expresa causa o base. En español, «por» comunica esa relación causal de forma natural y fiel al sentido del original sin añadir matiz temporal o instrumental indebido.
- source_word: σπλάγχνα ἐλέους
  english_pob_choice: the tender mercy
  chosen_spanish: la entrañable misericordia
  alternatives_spanish:
  - la compasión entrañable
  - la misericordia tierna
  - las entrañas de misericordia
  lexicon: BDAG
  rationale: La expresión es idiomática y literalmente alude a las entrañas como sede de afecto profundo. «Entrañable misericordia» conserva la intensidad afectiva del hebraímo/idioma bíblico y suena digno en español, sin caer en un literalismo áspero.
- source_word: θεοῦ ἡμῶν
  english_pob_choice: of our God
  chosen_spanish: de nuestro Dios
  alternatives_spanish:
  - de Dios nuestro
  - de Dios, el nuestro
  lexicon: BDAG
  rationale: Genitivo posesivo directo; la estructura española normal es la más clara y fiel.
- source_word: ἐν οἷς
  english_pob_choice: by which
  chosen_spanish: por la cual
  alternatives_spanish:
  - en la cual
  - mediante la cual
  lexicon: BDAG
  rationale: La relativa remite a las misericordias de Dios como base o medio en relación con la venida descrita. «Por la cual» mantiene esa conexión causal/instrumental con buena naturalidad en español.
- source_word: ἐπισκέψεται
  english_pob_choice: will visit
  chosen_spanish: nos visitará
  alternatives_spanish:
  - vendrá a ayudarnos
  - nos mirará con favor
  - nos visitará para ayudarnos
  lexicon: BDAG
  rationale: El verbo griego puede implicar intervención benévola y salvadora, pero el equivalente verbal «visitar» preserva el vínculo léxico; el contexto inmediato aporta la dimensión de gracia y rescate.
- source_word: ἀνατολὴ
  english_pob_choice: the sunrise
  chosen_spanish: la aurora
  alternatives_spanish:
  - el amanecer
  - la salida del sol
  - el Renuevo
  lexicon: BDAG
  rationale: En este contexto, la imagen de luz/mañana es primaria. «Aurora» conserva el valor de “rising/dawn” con un registro bíblico y elegante en español. Se mantiene abierta la posible resonancia mesiánica sin imponerla en el texto principal.
- source_word: ἐξ ὕψους
  english_pob_choice: from on high
  chosen_spanish: desde lo alto
  alternatives_spanish:
  - desde el cielo
  - desde la altura
  lexicon: BDAG
  rationale: Expresión reverente para la esfera celestial. «Desde lo alto» sigue de cerca el griego y evita precisar interpretativamente «cielo» en el texto principal.
theological_decisions:
- issue: Sentido de ἀνατολή en un contexto mesiánico
  english_pob_reading: Rendered as 'the sunrise' in the main text, with a footnote noting the possible echo of 'the Branch'.
  chosen_spanish_reading: «la aurora» en el texto principal, con nota de posible eco de «el Renuevo»/«el Brote»
  alternative_spanish_readings:
  - el amanecer
  - el Renuevo
  - el Brote
  rationale: El contexto inmediato de los vv. 78–79 destaca la venida de la luz para quienes están en tinieblas, lo que favorece la lectura de amanecer/aurora. A la vez, ἀνατολή puede evocar el lenguaje mesiánico de la Septuaginta para «Renuevo», por lo que esa tensión se conserva en la nota en vez de resolverse unilateralmente.
  doctrine_reference: Preservar la tensión lexical y teológica sin sobreinterpretar
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios; esta propuesta mantiene ese acuerdo y conserva la principal tensión del texto: ἀνατολή como imagen de aurora/luz, sin eliminar su posible eco mesiánico.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y no una sustitución devocional que opaque el nombre común.
  - Se mantiene «desde lo alto» como equivalente reverente de ἐξ ὕψους.
  - La solución «aurora» equilibra fidelidad léxica y fluidez literaria en español.
  - La puntuación y el orden reflejan el encadenamiento causal del griego con una estructura natural en español.
