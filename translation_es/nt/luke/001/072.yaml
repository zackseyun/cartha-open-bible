translation:
  language: es
  text: para mostrar misericordia a nuestros padres[a] y para recordar[b] su santo pacto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Nuestros padres» se refiere a los antepasados o patriarcas de Israel; también puede entenderse como «nuestros antepasados».
    reason: alternative_reading
  - marker: b
    text: En el lenguaje bíblico del pacto, «recordar» suele implicar actuar fielmente conforme a una promesa previa, no solo traer algo a la memoria.
    reason: cultural_note
  - marker: c
    text: O «con nuestros padres»; la expresión griega significa misericordia en relación con los antepasados de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιῆσαι
  english_pob_choice: to show
  chosen_spanish: mostrar
  alternatives_spanish:
  - hacer
  - obrar
  lexicon: BDAG
  rationale: En la expresión ποιῆσαι ἔλεος, el sentido idiomático es actuar con misericordia; en español, «mostrar misericordia» conserva el valor relacional y evita el calco poco natural «hacer misericordia».
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia constante
  - compasión
  lexicon: BDAG
  rationale: «Misericordia» es el equivalente directo y bíblicamente reconocible en español para ἔλεος, sin añadir una formulación más expansiva que el griego no exige aquí.
- source_word: μετὰ τῶν πατέρων ἡμῶν
  english_pob_choice: to our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - con nuestros padres
  - para nuestros padres
  - a nuestros antepasados
  lexicon: BDAG
  rationale: Aunque μετά con genitivo puede ser literalmente «con», el giro en contexto expresa misericordia en relación con los antepasados de Israel; en español, «a nuestros padres» comunica naturalmente esa relación. Se conserva «padres» para mantener la resonancia patriarcal y de pacto.
- source_word: πατέρων
  english_pob_choice: fathers
  chosen_spanish: padres
  alternatives_spanish:
  - antepasados
  lexicon: BDAG
  rationale: El término se refiere a los patriarcas o antepasados de Israel. «Padres» mantiene la forma masculina del griego y su carga bíblica, mientras que «antepasados» suaviza indebidamente esa referencia.
- source_word: μνησθῆναι
  english_pob_choice: to remember
  chosen_spanish: recordar
  alternatives_spanish:
  - acordarse de
  - tener presente
  lexicon: BDAG
  rationale: «Recordar» reproduce de manera clara y sobria el verbo griego. En lenguaje de pacto, el recordar divino implica acción fiel, pero el texto español conserva esa tensión sin expandirla en la línea principal.
- source_word: διαθήκης
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  lexicon: BDAG
  rationale: Aunque «covenant» suele traducirse por «pacto» o «alianza» en español, aquí «pacto» es más natural y conserva el sentido salvífico-histórico. Se evita «testamento», que sería engañoso.
- source_word: ἁγίας
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  lexicon: BDAG
  rationale: «Santo» es la manera más habitual y bíblica de expresar ἅγιος en español cuando califica una realidad consagrada por Dios. Mantiene la fuerza religiosa sin sonar abstracto.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El pronombre remite a Dios en el contexto inmediato. «Su» preserva la economía del griego y permite una lectura natural en español.
theological_decisions:
- issue: El “recordar” divino como acción de pacto
  english_pob_reading: to remember his holy covenant
  chosen_spanish_reading: para recordar su santo pacto
  alternative_spanish_readings:
  - para hacer memoria de su santo pacto
  - para cumplir su santo pacto
  rationale: Se conserva el verbo «recordar» para no resolver en la traducción la implicación teológica de que Dios, al “recordar”, actúa fielmente. La frase española mantiene la tensión entre memoria y cumplimiento.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Referencia masculina colectiva de πατέρων
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: Se mantiene la referencia patriarcal del griego y su vínculo con Israel. «Padres» preserva la forma masculina del texto fuente; la lectura más general «antepasados» queda como alternativa posible, pero menos fiel a la forma.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de SBLGNT y coincide sustancialmente con el audit trail inglés. Se han conservado las tensiones documentadas: el giro idiomático de misericordia relacionado con los antepasados, y el valor teológico de «recordar» en contexto de pacto.'
  spanish_consistency_notes:
  - Se prefirió «pacto» por naturalidad y precisión bíblica en español, aunque el inglés POB usa «covenant».
  - Se mantuvo «padres» en consonancia con la forma masculina del griego y la política de precisión de género.
  - Se evitó «SEÑOR» porque el texto griego aquí usa pronombres y no el nombre divino explícito.
