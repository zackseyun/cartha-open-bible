translation:
  language: es
  text: Y Zacarías se turbó al verlo[a], y el temor cayó sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «viéndolo»; el participio griego ἰδών puede traducirse más literalmente así, pero aquí «al verlo» expresa mejor su valor temporal en contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐταράχθη
  english_pob_choice: was troubled
  chosen_spanish: se turbó
  alternatives_spanish:
  - se perturbó
  - se agitó
  - se alarmó
  lexicon: BDAG
  rationale: El aoristo pasivo de ταράσσω expresa perturbación interior o agitación. «Se turbó» comunica esa conmoción emocional de manera natural en español y evita intensificar indebidamente el matiz a «terror», que queda expresado aparte por φόβος.
- source_word: Ζαχαρίας
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  lexicon: Transliteración estándar en español bíblico
  rationale: Nombre propio bíblico adaptado a la forma usual en español. Mantiene identificación clara y lectura natural.
- source_word: ἰδών
  english_pob_choice: when he saw him
  chosen_spanish: al verlo
  alternatives_spanish:
  - cuando lo vio
  - viéndolo
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente; en español, «al verlo» conserva esa relación inmediata con naturalidad. El objeto implícito se expresa para hacer clara la referencia al mensajero del contexto previo.
- source_word: φόβος
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - temor reverente
  - pavor
  lexicon: BDAG
  rationale: φόβος denota miedo o temor en sentido amplio. «Temor» es un equivalente sobrio y directo en español; «miedo» puede sonar más coloquial, y «pavor» intensifica demasiado el término.
- source_word: ἐπέπεσεν ἐπ’ αὐτόν
  english_pob_choice: fell upon him
  chosen_spanish: le sobrevino
  alternatives_spanish:
  - cayó sobre él
  - se apoderó de él
  - vino sobre él
  lexicon: BDAG
  rationale: La imagen literal «cayó sobre él» es posible, pero en español «le sobrevino» reproduce bien el efecto de irrupción repentina y resulta idiomático. Se conserva el sentido de acometida súbita del temor sin forzar una imagen extraña.
translation_notes:
  revision_awareness: 'El texto griego y el auditorial inglés coinciden en el sentido básico: turbación de Zacarías al ver al visitante y la irrupción del temor. La revisión reciente no introdujo cambios, por lo que no hay divergencias textuales ni decisiones pendientes.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre la turbación interior de Zacarías y el temor que le sobrevino, para no fusionar dos matices diferentes del griego.
  - Se evita «SEÑOR» u otras sustituciones teológicas porque el versículo no contiene el tetragrámaton ni un título divino en esta cláusula.
  - 'La construcción verbal española conserva el orden lógico del original: reacción de Zacarías, circunstancia de la visión y efecto del temor.'
