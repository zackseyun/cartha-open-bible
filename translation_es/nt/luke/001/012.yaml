  rationale: 'Se conserva la buena base del borrador, pero se corrigen dos puntos: (1) se restaura mejor la imagen del griego con «el temor cayó sobre él»; (2) se arregla la nota al pie para que ofrezca una alternativa real y coherente con la decisión léxica documentada. No se requiere adjudicación adicional.'
