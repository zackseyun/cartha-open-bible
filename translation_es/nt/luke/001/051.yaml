translation:
  language: es
  text: Ha mostrado poder con su brazo[a]; ha esparcido a los soberbios en los pensamientos de sus corazones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "ha hecho obras poderosas con su brazo". El griego dice literalmente "hizo/hace poder", un giro idiomático para expresar poder manifestado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "en la intención de sus corazones" o "en la imaginación de sus corazones". La frase griega puede referirse al pensamiento, la intención o la imaginación interior.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐποίησεν
  english_pob_choice: He has shown
  chosen_spanish: Ha mostrado
  alternatives_spanish:
  - Ha hecho
  - Ha obrado
  - Ha realizado
  lexicon: BDAG
  rationale: El griego Ἐποίησεν es literalmente 'hizo/realizó', pero en esta construcción con κράτος expresa manifestar o ejercer poder. 'Ha mostrado' conserva la idea de acción completa con valor resumitivo, y en español suena natural con 'poder' o 'fuerza'.
- source_word: κράτος
  english_pob_choice: strength
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - fortaleza
  - mando
  lexicon: BDAG
  rationale: κράτος denota poder manifestado o fuerza efectiva. 'Poder' comunica bien la idea del acto visible de Dios sin perder el matiz de vigor; 'fuerza' queda como alternativa posible, pero en español aquí suena menos natural en combinación con 'mostrar'.
- source_word: ἐν βραχίονι αὐτοῦ
  english_pob_choice: with his arm
  chosen_spanish: con su brazo
  alternatives_spanish:
  - por medio de su brazo
  - con el poder de su brazo
  - en su brazo
  lexicon: BDAG
  rationale: La preposición ἐν tiene aquí valor instrumental/asociativo en un giro semítico. 'Con su brazo' es la equivalencia española más idiomática y conserva la metáfora antropomórfica del brazo poderoso de Dios.
- source_word: διεσκόρπισεν
  english_pob_choice: he has scattered
  chosen_spanish: ha esparcido
  alternatives_spanish:
  - ha dispersado
  - ha dispersado en todas direcciones
  - ha desparramado
  lexicon: BDAG
  rationale: El verbo significa dispersar o esparcir. 'Ha esparcido' mantiene el paralelismo poético con la primera cláusula y es plenamente natural en español bíblico contemporáneo.
- source_word: ὑπερηφάνους
  english_pob_choice: the proud
  chosen_spanish: a los soberbios
  alternatives_spanish:
  - a los orgullosos
  - a los arrogantes
  lexicon: BDAG
  rationale: Como adjetivo sustantivado plural, designa a personas caracterizadas por la soberbia. 'Soberbios' conserva el peso moral del término mejor que 'orgullosos', que en español puede sonar más neutro.
- source_word: διανοίᾳ καρδίας αὐτῶν
  english_pob_choice: in the thoughts of their hearts
  chosen_spanish: en los pensamientos de su corazón
  alternatives_spanish:
  - en la intención de su corazón
  - en la imaginación de su corazón
  - por la disposición de su corazón
  lexicon: BDAG
  rationale: διάνοια apunta al pensar, la disposición mental o la intención; καρδία conserva el centro interior de la persona. 'En los pensamientos de su corazón' reproduce la expresión semítica sin reducirla a una sola noción psicológica. Se usa el singular colectivo 'su corazón' en español como genérico para el grupo, manteniendo el sentido del plural griego.
theological_decisions:
- issue: Valor de los aoristos en el Magnificat
  english_pob_reading: Use English present perfects ('has shown,' 'has scattered')
  chosen_spanish_reading: 'Usar perfectos compuestos: ''ha mostrado'', ''ha esparcido'''
  alternative_spanish_readings:
  - Mostró, esparció
  - Muestra, esparce
  rationale: Los aoristos griegos condensan la acción decisiva de Dios con alcance duradero. El perfecto compuesto español preserva mejor ese valor de acción consumada con relevancia presente que el pretérito simple, y evita convertir el canto en una mera generalidad atemporal.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: El texto inglés de referencia fue revisado y quedó sin cambios en la última pasada; se mantiene la misma decisión de sentido general y las únicas tensiones relevantes siguen siendo el valor idiomático de κράτος con βραχίονι y la ambigüedad de διανοίᾳ καρδίας, que se preservan en español con nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino explícito; en este versículo no aparece.
  - '''Poder'' se eligió para κράτος por adecuación con ''mostrar'' y por su valor semántico de fuerza eficaz.'
  - La expresión 'en los pensamientos de su corazón' conserva el paralelismo interno sin introducir una terminología psicológica técnica.
  - Se evitó 'SEÑOR' y se usó una traducción directa del antropomorfismo 'brazo' conforme al registro poético del pasaje.
