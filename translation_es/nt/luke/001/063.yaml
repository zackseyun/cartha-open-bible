translation:
  language: es
  text: 'Y después de pedir una tablilla de escribir[a], escribió, diciendo: «Juan es su nombre». Y todos se maravillaron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática, «Su nombre es Juan». El griego dice más literalmente: «Juan es su nombre», preservando la afirmación enfática de Zacarías sobre el nombre dado por Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰτήσας
  english_pob_choice: after asking for
  chosen_spanish: después de pedir
  alternatives_spanish:
  - habiendo pedido
  - tras pedir
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, «después de pedir» conserva la anterioridad sin sonar forzado. «Habiendo pedido» es posible, pero más pesado; «tras pedir» también sirve, aunque es algo más compacto.
- source_word: πινακίδιον
  english_pob_choice: writing tablet
  chosen_spanish: tablilla para escribir
  alternatives_spanish:
  - tablilla de escribir
  - tableta para escribir
  lexicon: BDAG
  rationale: La referencia es a una pequeña tablilla usada para escribir. «Tablilla para escribir» comunica el objeto y evita la ambigüedad moderna de «tableta».
- source_word: ἔγραψεν
  english_pob_choice: he wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - lo escribió
  - escribió allí
  lexicon: BDAG
  rationale: El aoristo de γράφω se expresa naturalmente con pasado simple en español. No hace falta añadir un objeto explícito que el griego tampoco da.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: BDAG
  rationale: Se mantiene la estructura del griego que introduce el contenido escrito. «Diciendo» es fiel y natural en este contexto narrativo.
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Johán
  - Yohanan
  lexicon: BDAG
  rationale: El nombre propio se vierte con la forma española estándar. No se conserva transliteración cruda porque el POB en español debe ser legible para la comunidad hispanohablante.
- source_word: ἐστὶν ὄνομα αὐτοῦ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - su nombre es
  - se llamará
  lexicon: BDAG
  rationale: 'Se conserva la literalidad de la afirmación griega: «Juan es su nombre». En español, «es su nombre» mantiene la fuerza enfática del orden de palabras original mejor que la forma más lisa «su nombre es Juan».'
- source_word: ἐθαύμασαν
  english_pob_choice: they all marveled
  chosen_spanish: todos se maravillaron
  alternatives_spanish:
  - todos se asombraron
  - todos quedaron maravillados
  lexicon: BDAG
  rationale: θαυμάζω expresa asombro y admiración. «Se maravillaron» preserva el tono narrativo elevado y corresponde bien al valor semántico del verbo.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno
  lexicon: BDAG
  rationale: «Todos» reproduce el alcance colectivo del sujeto sin añadir una especificación innecesaria.
theological_decisions:
- issue: Fijación del nombre dado por Dios
  english_pob_reading: The Greek more literally reads, “John is his name,” preserving Zechariah’s emphatic affirmation of the divinely given name.
  chosen_spanish_reading: «Juan es su nombre» conserva la afirmación enfática del nombre ya dado por Dios.
  alternative_spanish_readings:
  - «Su nombre es Juan»
  - «Se llamará Juan»
  rationale: La forma literal preserva mejor la fuerza declarativa de Zacarías en el texto griego. «Se llamará Juan» suaviza el presente y sugiere más una promesa que una declaración escrita ya hecha.
  doctrine_reference: Lucas 1:13; 1:60-63
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado en que no se requieren revisiones sustantivas: la solución española mantiene la secuencia narrativa, el valor enfático de ἐστὶν ὄνομα αὐτοῦ y el cierre con asombro colectivo, sin introducir interpretaciones no sustentadas.'
  spanish_consistency_notes:
  - Se mantiene «Juan» como forma española del nombre propio.
  - Se usa «tablilla para escribir» para evitar anglicismos o términos ambiguos.
  - Se conserva el orden enfático del dicho en la nota, mientras el texto principal permanece publicable y natural.
  - No se introduce «Mesías», «SEÑOR» ni terminología teológica ajena al pasaje.
