translation:
  language: es
  text: Después de estos días, Elisabet, su esposa, concibió[a]; y se mantuvo escondida durante cinco meses, diciendo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Después de aquellos días». El demostrativo griego puede traducirse de ambas maneras en narración temporal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se escondió» o «se recluyó». El imperfecto griego sugiere una acción continuada durante el período de cinco meses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ ταύτας τὰς ἡμέρας
  english_pob_choice: After these days
  chosen_spanish: Después de estos días
  alternatives_spanish:
  - Después de aquellos días
  - Y después de estos días
  lexicon: BDAG
  rationale: μετά con acusativo expresa secuencia temporal; en español, «después de» es la forma natural. El demostrativo ταύτας se puede reflejar como «estos» o «aquellos»; aquí se mantiene «estos» para conservar la deixis del griego y la lectura del POB en inglés.
- source_word: συνέλαβεν
  english_pob_choice: conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó encinta
  - quedó embarazada
  lexicon: BDAG
  rationale: En este contexto συλλαμβάνω indica la concepción de un hijo. «Concibió» es directo, fiel y de registro digno; «quedó encinta/embarazada» expresa el estado resultante, pero desplaza el verbo hacia una formulación menos cercana al griego.
- source_word: Ἐλισάβετ
  english_pob_choice: Elizabeth
  chosen_spanish: Elisabet
  alternatives_spanish:
  - Elizabeth
  lexicon: Transliteración estándar al español
  rationale: Se usa la forma habitual en español «Elisabet», que corresponde al nombre propio y resulta natural en lectura bíblica en español.
- source_word: ἡ γυνὴ αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - la esposa de él
  lexicon: BDAG
  rationale: γυνή con posesivo aquí significa «esposa». En español, «su esposa» comunica con claridad la relación matrimonial y evita la ambigüedad de «mujer».
- source_word: περιέκρυβεν ἑαυτὴν
  english_pob_choice: she kept herself hidden
  chosen_spanish: se mantuvo escondida
  alternatives_spanish:
  - se escondió
  - se recluyó
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continuada o mantenida. «Se mantuvo escondida» conserva esa duración mejor que un simple pasado puntual; además preserva el sentido reflexivo de ἑαυτὴν. «Se recluyó» es posible, pero añade un matiz más interpretativo.
- source_word: μῆνας πέντε
  english_pob_choice: for five months
  chosen_spanish: durante cinco meses
  alternatives_spanish:
  - por cinco meses
  - cinco meses
  lexicon: BDAG
  rationale: El acusativo expresa duración de tiempo; en español, «durante cinco meses» lo hace explícito y natural.
- source_word: λέγουσα
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio presente introduce el contenido del discurso que sigue. «Diciendo» conserva la conexión participial sin convertirla en una oración finita.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y concuerda con la evaluación de alta coincidencia del registro inglés. Se preserva la deixis temporal, el valor aspectual del imperfecto en περιέκρυβεν y la relación participial de λέγουσα, sin introducir ampliaciones no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Elisabet» como forma española estándar del nombre propio.
  - «Espesa/Esposa» se resuelve como «esposa», dado el posesivo αὐτοῦ.
  - Se conserva un registro bíblico moderno y sobrio, evitando calcos innecesarios.
  - Las notas al pie reproducen las alternativas léxicas documentadas en el contexto inglés, adaptadas a una formulación natural en español.
