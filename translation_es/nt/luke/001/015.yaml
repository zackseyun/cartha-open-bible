revisions:
- from: Porque será grande delante del[a] Señor, y no beberá vino ni licor fuerte[b], y será lleno del Espíritu Santo[c] aun desde el vientre de su madre[d].
  to: Porque será grande delante de Yahvé[a], y no beberá vino ni bebida embriagante[b], y será lleno del Espíritu Santo aun desde el vientre de su madre[c].
  rationale: La revisión corrige la principal desviación terminológica del proyecto al usar «Yahvé» en el texto principal para el referente divino de κύριος. También mejora la claridad panhispánica con «bebida embriagante» para σίκερα y reorganiza las notas para que se anclen a las palabras correctas y no dupliquen información. El resto del sentido fuente se conserva.
