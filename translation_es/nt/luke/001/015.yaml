review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: grande delante del Señor, abstención de vino y σίκερα, y llenura del Espíritu Santo desde el vientre materno. Sin embargo, no preserva adecuadamente la terminología por defecto del proyecto para κύριος referido a Dios/YHWH, y la anotación de alternativas está desalineada: la nota [a] se ancla a «del» en lugar de al referente completo, y las notas [c]/[d] duplican la explicación de ἔτι ἐκ κοιλίας μητρὸς αὐτοῦ.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «será lleno» suena menos natural que «será lleno del Espíritu Santo» solo por tradición; en español bíblico moderno suena mejor «será lleno del Espíritu Santo». El problema principal de calidad es terminológico y de aparato de notas, no de gramática. «Licor fuerte» es comprensible, pero «bebida embriagante» es más claro para lectores amplios y refleja mejor σίκερα como categoría, no necesariamente un destilado.
  glossary_alignment: No está alineado con el default del proyecto que pide «Yahvé» para יהוה/YHWH en el texto principal y solicita explicar cuando κύριος en griego cita o alude al nombre divino. En Lucas 1:15, «τοῦ κυρίου» referido a Dios debe revisarse a «Yahvé» en el texto principal, con nota opcional si se desea explicar que el griego dice κύριος. «Espíritu Santo» sí está bien alineado. «Strong drink» puede verterse como «bebida embriagante» para mejor neutralidad y claridad.
  issues:
  - severity: high
    issue: Uso de «Señor» en el texto principal para τοῦ κυρίου referido a Dios
    rationale: Las pautas del proyecto requieren «Yahvé» en el texto principal para el nombre divino, no «SEÑOR» ni «Señor» como convención de enmascaramiento. La propia nota reconoce la alternativa, pero la excepción no está suficientemente justificada para anular el default del proyecto.
  - severity: medium
    issue: Anclaje y contenido de notas sobre ἔτι ἐκ κοιλίας μητρὸς αὐτοῦ
    rationale: La nota [c] está anclada a «Espíritu Santo» aunque explica «aun desde el vientre de su madre», y la [d] añade una explicación redundante. Las notas deben anclarse a la frase pertinente y evitar duplicación innecesaria.
  - severity: medium
    issue: «Licor fuerte» puede inducir un sentido demasiado estrecho o regional
    rationale: σίκερα denota bebida alcohólica distinta del vino; «bebida embriagante» comunica mejor la categoría general para un español neutral y coincide con la explicación léxica del inglés.
  - severity: low
    issue: La nota [a] está insertada en «del[a] Señor»
    rationale: El marcador queda tipográficamente torpe y parece anclado al artículo/contracción en vez de a la expresión relevante. Debe colocarse de manera más natural, por ejemplo tras «Yahvé» o tras la frase completa.
  revised_spanish_text: Porque será grande delante de Yahvé[a], y no beberá vino ni bebida embriagante[b], y será lleno del Espíritu Santo aun desde el vientre de su madre[c].
  revised_footnotes:
