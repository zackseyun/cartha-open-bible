  text: ἔσται γὰρ μέγας ἐνώπιον ⸀τοῦ κυρίου, καὶ οἶνον καὶ σίκερα οὐ μὴ πίῃ, καὶ πνεύματος ἁγίου πλησθήσεται ἔτι ἐκ κοιλίας μητρὸς αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/luke/001/015.yaml
  text: For he will be great before the Lord[a], and he will drink neither wine nor strong drink[c][b], and he will be filled with the Holy Spirit even from his mother’s womb.
  footnotes:
  - marker: a
    text: Or "he will certainly not drink wine or strong drink." The Greek emphatically denies the action; the main text renders the sense as a prohibition fitting his consecrated calling.
    reason: lexical_alternative
  - marker: b
    text: '"Strong drink" refers to intoxicating drink other than wine.'
    reason: cultural_note
  - marker: c
    text: Or "already from his mother’s womb" or "while still in his mother’s womb."
    reason: lexical_alternative
