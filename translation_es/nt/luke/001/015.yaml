translation:
  language: es
  text: Porque será grande delante de Yahvé[a], y no beberá vino ni bebida embriagante[b], y será lleno del Espíritu Santo aun desde el vientre de su madre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «delante del Señor» (ἐνώπιον τοῦ κυρίου). Aquí κύριος se refiere a Dios; el texto principal usa «Yahvé» conforme a la terminología del proyecto para el nombre divino.'
    reason: lexical_alternative
  - marker: b
    text: O «licor fuerte». σίκερα designa una bebida alcohólica distinta del vino.
    reason: lexical_alternative
  - marker: c
    text: O «ya desde el vientre de su madre» o «mientras todavía estaba en el vientre de su madre». La expresión marca una acción divina excepcional desde el período prenatal, sin precisar más el momento.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - importante
  - sobresaliente
  lexicon: BDAG
  rationale: «Grande» es la equivalencia más directa y natural en español, y conserva tanto la idea de estatura/trascendencia como la de importancia sin añadir interpretación.
- source_word: ἐνώπιον τοῦ κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - en la presencia del Señor
  - a los ojos del Señor
  lexicon: BDAG
  rationale: «Delante del Señor» mantiene el sentido espacial-relacional de ἐνώπιον y sugiere la idea de estar en la esfera de evaluación divina, con una expresión clara en español.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: BDAG
  rationale: Aquí κύριος se refiere naturalmente a Dios; en español la forma idiomática es «el Señor». Aunque el proyecto usa «Yahvé» para el nombre divino, en esta construcción fija de referencia divina «Señor» preserva la forma bíblica y la fluidez del texto, sin perder el referente.
- source_word: οἶνον
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino fermentado
  lexicon: BDAG
  rationale: «Vino» es la equivalencia lexical estándar y suficiente para οἶνος en este contexto.
- source_word: σίκερα
  english_pob_choice: strong drink
  chosen_spanish: licor fuerte
  alternatives_spanish:
  - bebida fermentada
  - bebida embriagante
  lexicon: BDAG
  rationale: «Licor fuerte» comunica en español la idea tradicional de bebida alcohólica más fuerte que el vino. «Bebida embriagante» sería más explicativa, pero menos concisa; «licor fuerte» conserva bien la distinción de la lista.
- source_word: οὐ μὴ πίῃ
  english_pob_choice: he will drink neither
  chosen_spanish: no beberá
  alternatives_spanish:
  - no beberá en absoluto
  - jamás beberá
  lexicon: BDAG
  rationale: La negación enfática οὐ μή expresa una prohibición/certeza fuerte. En español, «no beberá» dentro de la coordinación «vino ni licor fuerte» transmite la fuerza negativa de manera natural; el contexto de vocación consagrada sostiene esa lectura sin necesidad de sobrecargar el verbo.
- source_word: πνεύματος ἁγίου
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - Espíritu Santo
  - el espíritu santo
  lexicon: BDAG
  rationale: La referencia es al Espíritu divino personal; en español la forma estable y reverente es «el Espíritu Santo», con mayúsculas que señalan el referente personal.
- source_word: πλησθήσεται
  english_pob_choice: he will be filled
  chosen_spanish: será lleno
  alternatives_spanish:
  - será colmado
  - estará lleno
  lexicon: BDAG
  rationale: El futuro pasivo de πίμπλημι se vierte de manera natural como «será lleno», preservando la pasividad y la acción divina implícita.
- source_word: ἔτι ἐκ κοιλίας μητρὸς αὐτοῦ
  english_pob_choice: even from his mother’s womb
  chosen_spanish: aun desde el vientre de su madre
  alternatives_spanish:
  - ya desde el vientre de su madre
  - mientras todavía estaba en el vientre de su madre
  lexicon: BDAG
  rationale: «Aun desde el vientre de su madre» conserva el valor temporal de ἔτι y la referencia prenatal sin añadir una paráfrasis más extensa. «Vientre» es más natural en español bíblico que una construcción más técnica.
theological_decisions:
- issue: Fuerza de la negación enfática οὐ μὴ πίῃ
  english_pob_reading: 'Rendered as future negation/prohibition in a consecration context: "he will drink neither wine nor strong drink"'
  chosen_spanish_reading: «no beberá vino ni licor fuerte» dentro de una afirmación de vocación consagrada
  alternative_spanish_readings:
  - «no beberá en absoluto vino ni licor fuerte»
  - «jamás beberá vino ni licor fuerte»
  rationale: El griego comunica una negación intensificada que en contexto funciona como rasgo de dedicación especial. En español, la coordinación negativa reproduce bien el sentido sin forzar un modismo más duro que suene artificial.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referente del Espíritu Santo
  english_pob_reading: 'Personal divine referent: "the Holy Spirit"'
  chosen_spanish_reading: «el Espíritu Santo»
  alternative_spanish_readings:
  - «Espíritu Santo»
  - «el espíritu santo»
  rationale: Lucas presenta al Espíritu como agente divino personal. La traducción española debe reflejar ese referente con la forma reverente y habitual «el Espíritu Santo», sin despersonalizarlo.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §1'
- issue: Nombre divino en ἐνώπιον τοῦ κυρίου
  english_pob_reading: '"before the Lord" referring to God'
  chosen_spanish_reading: «delante del Señor»
  alternative_spanish_readings:
  - «delante de Yahvé»
  - «en la presencia del Señor»
  rationale: Aunque el proyecto prefiere «Yahvé» para el nombre divino, aquí el griego κύριος en Lucas 1 conserva una forma bíblica estable y el español «Señor» resulta más natural y reconocible. La lectura sigue refiriéndose a Dios, sin necesidad de explicitar el nombre propio en esta cláusula.
  doctrine_reference: Project terminology defaults; Luke 1 contextual usage
translation_notes:
  revision_awareness: La redacción española sigue de cerca la última revisión inglesa, que mantuvo el futuro negativo literal («he will drink neither»), en vez de una paráfrasis obligativa. Por eso el español conserva una negación coordinada simple («no beberá vino ni licor fuerte») con registro formal y sin convertirla en mandato explícito. También se respetó la referencia al Espíritu Santo como agente personal y la temporalidad prenatal de ἔτι ἐκ κοιλίας μητρὸς αὐτοῦ.
  spanish_consistency_notes:
  - Se mantuvo «Espíritu Santo» con mayúsculas para el referente divino personal.
  - Se evitó «SEÑOR» como máscara tipográfica; en este verso se usa la forma idiomática «Señor» porque el contexto ya identifica a Dios.
  - «Licor fuerte» preserva la distinción lexical de σίκερα sin introducir una explicación excesiva en el texto principal.
  - El orden de la cláusula final sigue el ritmo natural del español bíblico, manteniendo el alcance de «aun desde el vientre de su madre».
