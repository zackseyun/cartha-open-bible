  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: la irrupción de φόβος sobre todos los que vivían alrededor de ellos y la difusión continua de estos acontecimientos por toda la región montañosa de Judea. Sin embargo, hay un problema importante en la colocación de las notas y un detalle de naturalidad/sintaxis en «se hablaban todas estas cosas».'
  spanish_quality_summary: 'El registro es digno y ampliamente legible, aunque «moraban» suena algo más arcaizante de lo necesario y «se hablaban todas estas cosas» resulta menos natural que «se hablaba de todas estas cosas». Además, las notas están ancladas a la frase equivocada: [a] debería ir con «cosas» y [b] con «temor».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Temor» para φόβος es adecuado; «región montañosa de Judea» transmite bien ἡ ὀρεινή; y «cosas» mantiene la amplitud de ῥήματα con nota aclaratoria.
  issues:
  - severity: medium
    issue: Los marcadores de notas están anclados en la frase equivocada.
    rationale: La nota [a] explica ῥήματα («cosas/palabras/asuntos») y debe aparecer junto a «cosas»; la nota [b] explica «temor» y debe aparecer junto a «temor». En el borrador ambos marcadores aparecen tras «ellos». Esto incumple la disciplina de anclaje requerida y puede confundir al lector.
  - severity: medium
    issue: «Se hablaban todas estas cosas» es poco natural en español para el valor de διελαλεῖτο.
    rationale: Aunque se entiende, en español suena más idiomático y claro «se hablaba de todas estas cosas» o «se comentaban todas estas cosas». La preposición «de» ayuda a expresar que estos asuntos eran tema de conversación, que es precisamente la fuerza del imperfecto pasivo.
  - severity: low
    issue: «Moraban» es algo más rígido que el estilo meta preferido.
    rationale: No es incorrecto, pero «vivían» o «habitaban» suena más natural en español moderno neutral. Dado que el proyecto prefiere español moderno pero digno, «vivían alrededor de ellos» mejora la fluidez sin perder fidelidad.
  revised_spanish_text: Y sobrevino temor[b] a todos los que vivían alrededor de ellos, y en toda la región montañosa de Judea se hablaba de todas estas cosas[a].
  revised_footnotes:
