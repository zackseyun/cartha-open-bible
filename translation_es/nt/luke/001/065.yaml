revisions:
- from: Y sobrevino temor a todos los que moraban alrededor de ellos[a][b], y en toda la región montañosa de Judea se hablaban todas estas cosas.
  to: Y sobrevino temor[b] a todos los que vivían alrededor de ellos, y en toda la región montañosa de Judea se hablaba de todas estas cosas[a].
  rationale: Se corrigen los anclajes de las notas para que correspondan al término que explican, se mejora la naturalidad de διελαλεῖτο con «se hablaba de», y se actualiza «moraban» a «vivían» para un español más natural y ampliamente legible sin perder el tono digno ni la fidelidad al griego.
