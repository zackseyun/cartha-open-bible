translation:
  language: es
  text: Y sobrevino temor[b] a todos los que vivían alrededor de ellos, y en toda la región montañosa de Judea se hablaba de todas estas cosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cosas» puede reflejar también «palabras» o «asuntos»; el término griego ῥήματα admite esa amplitud semántica, y aquí puede referirse tanto a lo dicho como a los hechos narrados.
    reason: lexical_alternative
  - marker: b
    text: «Temor» aquí puede incluir el sentido de asombro ante la actividad evidente de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: came
  chosen_spanish: sobrevino
  alternatives_spanish:
  - vino
  - llegó
  - cayó
  lexicon: BDAG
  rationale: En la expresión con φόβος, el griego indica la irrupción o llegada del temor sobre las personas. «Sobrevino» conserva el valor eventivo y la fuerza de impacto sin volver la frase mecánica.
- source_word: ἐπὶ πάντας
  english_pob_choice: upon all
  chosen_spanish: a todos
  alternatives_spanish:
  - sobre todos
  - encima de todos
  lexicon: BDAG
  rationale: Con φόβος, ἐπί con acusativo expresa extensión o irrupción sobre las personas. «A todos» en español fluye de manera natural junto con «sobrevino» y mantiene la idea de alcance general; la construcción queda reforzada por el contexto.
- source_word: φόβος
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - awe
  - temor reverente
  lexicon: BDAG
  rationale: «Temor» conserva el campo semántico básico de φόβος y deja abierta la posible resonancia de reverencia o asombro ante la acción divina, sin expandir el texto principal.
- source_word: τοὺς περιοικοῦντας αὐτούς
  english_pob_choice: those living around them
  chosen_spanish: los que moraban alrededor de ellos
  alternatives_spanish:
  - los que vivían alrededor de ellos
  - sus vecinos
  - los que habitaban cerca de ellos
  lexicon: BDAG
  rationale: περιοικέω significa vivir alrededor o cerca. «Los que moraban alrededor de ellos» es fiel al sentido espacial del participio y mantiene un registro bíblico claro y digno en español.
- source_word: ἐν ὅλῃ τῇ ὀρεινῇ τῆς Ἰουδαίας
  english_pob_choice: throughout all the hill country of Judea
  chosen_spanish: en toda la región montañosa de Judea
  alternatives_spanish:
  - en toda la serranía de Judea
  - en toda la zona montañosa de Judea
  - en todo el monte de Judea
  lexicon: BDAG
  rationale: ἡ ὀρεινή designa la zona de colinas o tierras altas. «Región montañosa de Judea» es natural en español y conserva el valor geográfico mejor que un calco más rígido.
- source_word: διελαλεῖτο
  english_pob_choice: were being talked about
  chosen_spanish: se hablaban
  alternatives_spanish:
  - se discutían
  - se comentaban
  - se divulgaban
  lexicon: BDAG
  rationale: El imperfecto pasivo señala circulación continua en el habla pública. «Se hablaban» reproduce esa difusión verbal de forma breve y idiomática en español; el sujeto implícito son las cosas/hechos mencionados en el versículo.
- source_word: πάντα τὰ ῥήματα ταῦτα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todas estas palabras
  - todos estos hechos
  - todos estos asuntos
  lexicon: BDAG
  rationale: ῥήματα puede abarcar palabras, dichos, asuntos o sucesos. Aquí el contexto narrativo permite «cosas» como una forma amplia y natural, sin cerrar indebidamente la amplitud semántica del griego.
theological_decisions:
- issue: Nuance of φόβος in response to divine activity
  english_pob_reading: Rendered as 'fear' without expanding to 'awe' in the main text.
  chosen_spanish_reading: Traducido como «temor» en el texto principal, sin explicitar «asombro» ni «temor reverente».
  alternative_spanish_readings:
  - awe / asombro
  - temor reverente
  - miedo
  rationale: El contexto permite percibir la reacción ante la acción de Dios, pero el texto griego no obliga a resolverla en una sola dirección. «Temor» preserva la tensión teológica y lexical entre miedo, reverencia y asombro, tal como hace la POB en inglés.
  doctrine_reference: Preservar la tensión teológica sin interpretarla en exceso.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente indica que no hubo cambios en el pasaje y que el acuerdo con la revisión es alto; por eso el borrador español mantiene las mismas decisiones de fondo: temor/φόβος, difusión pública de los hechos y amplitud semántica de ῥήματα.'
  spanish_consistency_notes:
  - Se mantiene «Dios» sin mascar el nombre divino, aunque en este versículo no aparece el Tetragrámaton.
  - Se usa «temor» para φόβος, en coherencia con la opción inglesa principal y con la nota de posible asombro.
  - «Se hablaban» busca reflejar el imperfecto pasivo de διελαλεῖτο con naturalidad en español.
  - «Todas estas cosas» conserva la amplitud de ῥήματα sin forzar una reducción a «palabras» o «hechos».
