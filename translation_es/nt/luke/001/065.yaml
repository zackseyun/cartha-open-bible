    text: «Cosas» puede reflejar también «palabras» o «asuntos»; el término griego ῥήματα admite esa amplitud semántica, y aquí puede referirse tanto a lo dicho como a los hechos narrados.
    reason: lexical_alternative
  - marker: b
    text: «Temor» aquí puede incluir el sentido de asombro ante la actividad evidente de Dios.
    reason: lexical_alternative
