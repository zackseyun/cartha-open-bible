translation:
  language: es
  text: Porque ninguna palabra de Dios será imposible[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque nada será imposible con Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: ὅτι introduce la base explicativa de lo dicho antes; «Porque» comunica bien la relación causal en español sin añadir matiz ajeno.
- source_word: οὐκ ἀδυνατήσει
  english_pob_choice: will be impossible
  chosen_spanish: nada será imposible
  alternatives_spanish:
  - no será imposible
  - no podrá
  lexicon: BDAG
  rationale: El futuro de ἀδυνατέω expresa imposibilidad/incapacidad; en español, la negación con «nada» reproduce de forma natural el alcance universal del enunciado y evita una doble negación torpe.
- source_word: παρὰ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: para Dios
  alternatives_spanish:
  - de parte de Dios
  - con Dios
  lexicon: BDAG
  rationale: La combinación con παρά y el contexto inmediato permiten una lectura relacional que la tradición suele verter como «con Dios»; sin embargo, para mantener el sentido de la cláusula griega y la tensión auditada por la POB inglesa, «para Dios» deja abierta la relación del enunciado con Dios como referente sin colapsarlo en una paráfrasis.
- source_word: πᾶν
  english_pob_choice: 'no'
  chosen_spanish: nada
  alternatives_spanish:
  - todo
  - ninguna cosa
  lexicon: BDAG
  rationale: Aunque πᾶν es formalmente «todo/ cada», en español el conjunto negativo con el verbo resulta más idiomático como «nada ... imposible»; así se conserva el alcance universal del término sin mecanizar la estructura griega.
- source_word: ῥῆμα
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - palabra dicha
  - cosa
  - asunto
  - promesa
  lexicon: BDAG
  rationale: ῥῆμα designa una palabra, dicho o asunto concreto. «Palabra» preserva el vínculo léxico principal y la resonancia de una declaración divina; se evita reducirlo a «promesa», que sería más interpretativo que el griego.
theological_decisions:
- issue: Cómo reflejar la relación de παρά τοῦ θεοῦ y πᾶν ῥῆμα
  english_pob_reading: The verse speaks of no word from God being impossible.
  chosen_spanish_reading: La frase afirma que ninguna palabra asociada con Dios será imposible.
  alternative_spanish_readings:
  - Nada será imposible con Dios.
  - Ninguna palabra de Dios será imposible.
  rationale: El texto griego contiene explícitamente ῥῆμα, por lo que la versión principal conserva «palabra» en vez de resolver la frase a una generalidad como «nada». A la vez, la construcción española debe seguir siendo natural y no ocultar la lectura tradicional alternativa; por eso se mantiene abierta la posibilidad de entender la cláusula como una afirmación sobre la imposibilidad de cualquier cosa ante Dios.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla prematuramente.'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se preservó el valor de ὅτι como explicación causal, la fuerza de ἀδυνατέω como imposibilidad, la presencia explícita de ῥῆμα como «palabra», y se mantuvo en nota la lectura alternativa tradicional «con Dios» para no borrar la tensión interpretativa documentada.'
  spanish_consistency_notes:
  - Se usó «Dios» y no «SEÑOR», conforme al nombre divino implícito en el texto griego.
  - Se prefirió «palabra» para ῥῆμα, evitando «promesa» como estrechamiento interpretativo.
  - La nota conserva la alternativa tradicional sin desplazarla al texto principal.
