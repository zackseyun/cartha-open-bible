  - severity: high
    issue: '''para Dios'' no representa bien παρὰ τοῦ θεοῦ en esta decisión auditada.'
    rationale: La POB inglesa eligió 'from God' para mantener la relación con ῥῆμα. 'Para Dios' resulta semánticamente impreciso en español y no comunica origen/procedencia.
  - severity: medium
    issue: La nota está mal distribuida respecto del texto principal.
    rationale: La alternativa tradicional debe quedar en la nota, no en la línea principal, para preservar la tensión interpretativa documentada.
