base_translation:
  language: en
  yaml_path: translation/nt/luke/001/022.yaml
  text: But when he came out[a], he was not able to speak to them, and they realized that he had seen a vision in the sanctuary[b]. And he kept making signs to them and remained mute.
  footnotes:
  - marker: a
    text: Or 'in the temple'; the Greek word here more specifically denotes the sanctuary proper rather than the entire temple complex.
    reason: lexical_alternative
  - marker: b
    text: Or 'remained mute.' The Greek adjective can denote one who is unable to speak, and in some contexts may also imply deafness.
    reason: lexical_alternative
