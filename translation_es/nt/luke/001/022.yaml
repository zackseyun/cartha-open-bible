translation:
  language: es
  text: Pero cuando salió[a], no podía hablarles, y comprendieron que había visto una visión en el santuario[b]. Y seguía haciéndoles señas y permanecía mudo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al salir». El participio griego puede expresar simplemente la acción de salir antes del verbo principal.
    reason: lexical_alternative
  - marker: b
    text: O «en el templo»; el término griego aquí designa más específicamente el santuario propiamente dicho que todo el complejo del templo.
    reason: lexical_alternative
  - marker: c
    text: O «permanecía sin poder hablar». El adjetivo griego puede denotar a alguien que no puede hablar y, en algunos contextos, también puede implicar sordera.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  english_pob_choice: when he came out
  chosen_spanish: cuando salió
  alternatives_spanish:
  - después de salir
  - habiendo salido
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal se expresa naturalmente en español como una acción temporal previa o coincidente. «Cuando salió» preserva la secuencia narrativa sin rigidez.
- source_word: οὐκ ἐδύνατο λαλῆσαι
  english_pob_choice: he was not able to speak
  chosen_spanish: no podía hablarles
  alternatives_spanish:
  - no pudo hablarles
  - no era capaz de hablarles
  lexicon: BDAG
  rationale: La construcción expresa incapacidad. «No podía hablarles» comunica bien la imposibilidad en un español natural y mantiene el sentido verbal de δύναμαι + infinitivo.
- source_word: ἐπέγνωσαν
  english_pob_choice: they realized
  chosen_spanish: comprendieron
  alternatives_spanish:
  - se dieron cuenta
  - reconocieron
  lexicon: BDAG
  rationale: Aquí el verbo indica que llegaron a entender con claridad lo ocurrido. «Comprendieron» conserva esa conclusión inferida por señales visibles y suena natural en el relato.
- source_word: ὀπτασίαν
  english_pob_choice: a vision
  chosen_spanish: una visión
  alternatives_spanish:
  - una aparición
  lexicon: BDAG
  rationale: En este contexto la palabra se refiere a una experiencia revelatoria o sobrenatural. «Visión» es la equivalencia más clara y directa en español.
- source_word: ἐν τῷ ναῷ
  english_pob_choice: in the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en el templo
  lexicon: BDAG
  rationale: ναός designa más específicamente el santuario propiamente dicho, no todo el complejo del templo. Por eso se conserva «santuario» para reflejar la distinción léxica.
- source_word: διανεύων
  english_pob_choice: kept making signs
  chosen_spanish: seguía haciéndoles señas
  alternatives_spanish:
  - seguía gesticulándoles
  - les hacía señas
  lexicon: BDAG
  rationale: El imperfecto perifrástico con ἦν indica acción continua. «Seguía haciéndoles señas» reproduce bien esa duración y el matiz gestual del verbo.
- source_word: κωφός
  english_pob_choice: remained mute
  chosen_spanish: permanecía mudo
  alternatives_spanish:
  - seguía mudo
  - permanecía sin poder hablar
  lexicon: BDAG
  rationale: 'Se evita resolver de más el alcance de κωφός. «Mudo» preserva la fuerza lexical y la tensión documentada: el texto destaca la incapacidad de hablar, mientras que el término griego puede abarcar más en otros contextos.'
theological_decisions:
- issue: Alcance de κωφός respecto a la condición de Zacarías
  english_pob_reading: Render the resulting condition as inability to speak rather than explicitly 'deaf.'
  chosen_spanish_reading: Traducir el estado resultante como mudez, no como sordera explícita.
  alternative_spanish_readings:
  - sordo y mudo
  - incapaz de hablar
  rationale: El versículo enfatiza que no podía hablar y que se comunicaba con señas. Aunque κωφός puede incluir sordera en ciertos contextos, aquí no se debe cerrar la interpretación añadiendo un rasgo no explicitado por la línea misma. «Mudo» preserva la tensión y evita sobreinterpretar.
  doctrine_reference: Preservar la tensión teológica sin resolver en exceso el alcance del juicio narrativo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente optó por «remained mute» para reflejar κωφός con mayor inmediatez y evitar repetición con la cláusula anterior. La versión española sigue esa decisión al usar «mudo», y conserva «santuario» conforme al análisis léxico del griego.
  spanish_consistency_notes:
  - Se mantiene «santuario» para ναός, en continuidad con la preferencia POB por la precisión léxica frente a la tradición eclesiástica.
  - Se evita «SEÑOR» u otra convención no pertinente; no hay términos divinos en este versículo.
  - «Mudo» se emplea como equivalente de κωφός siguiendo el énfasis narrativo en la incapacidad de hablar, sin introducir sordera explícita.
  - La puntuación refleja la división de cláusulas del griego y el flujo narrativo del inglés POB, sin depender mecánicamente de la redacción inglesa.
