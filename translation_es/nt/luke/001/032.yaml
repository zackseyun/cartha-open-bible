translation:
  language: es
  text: Este[a] será grande y será llamado el Hijo del Altísimo[b], y el Señor Dios le dará el trono de David, su padre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este será grande». El griego comienza con un pronombre demostrativo: «Este».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «será nombrado el Hijo del Altísimo».'
    reason: lexical_alternative
  - marker: c
    text: «Su padre» se refiere a David como antepasado real de Jesús en la línea davídica.
    reason: cultural_note
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: He
  chosen_spanish: Éste
  alternatives_spanish:
  - Este
  - Él
  lexicon: BDAG
  rationale: El demostrativo griego señala al niño recién anunciado. En español, «Éste» conserva mejor esa referencia inmediata que el pronombre personal, sin perder naturalidad.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - va a ser
  - estará
  lexicon: BDAG
  rationale: El futuro de εἰμί se expresa de manera directa con «será».
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - mighty
  - importante
  lexicon: BDAG
  rationale: «Grande» mantiene la amplitud semántica de μέγας sin restringirlo solo a poder o relevancia.
- source_word: υἱὸς Ὑψίστου
  english_pob_choice: Son of the Most High
  chosen_spanish: el Hijo del Altísimo
  alternatives_spanish:
  - un hijo del Altísimo
  - Hijo del Altísimo
  lexicon: BDAG
  rationale: El artículo en griego y el uso titular favorecen una expresión definida en español. «Altísimo» es la forma bíblica habitual para Ὑψίστου y conserva el título divino.
- source_word: κληθήσεται
  english_pob_choice: will be called
  chosen_spanish: será llamado
  alternatives_spanish:
  - será nombrado
  lexicon: BDAG
  rationale: El pasivo futuro de καλέω aquí expresa designación o título. «Será llamado» es la forma más transparente y natural en español.
- source_word: κύριος ὁ θεός
  english_pob_choice: the Lord God
  chosen_spanish: el Señor Dios
  alternatives_spanish:
  - el Señor, Dios
  - el Dios Señor
  lexicon: BDAG
  rationale: «Señor» traduce κύριος según el criterio del proyecto, y la secuencia con θεός se vierte de manera natural como «el Señor Dios».
- source_word: δώσει αὐτῷ
  english_pob_choice: will give him
  chosen_spanish: le dará
  alternatives_spanish:
  - le concederá
  - dará a él
  lexicon: BDAG
  rationale: El dativo de persona se expresa con el clítico «le», una forma idiomática y clara en español.
- source_word: τὸν θρόνον Δαυὶδ
  english_pob_choice: the throne of David
  chosen_spanish: el trono de David
  alternatives_spanish:
  - el trono davidico
  - el trono de David, su antepasado
  lexicon: BDAG
  rationale: La construcción genitiva se conserva de forma sobria y bíblicamente reconocible como «el trono de David».
- source_word: τοῦ πατρὸς αὐτοῦ
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su antepasado
  - de su padre
  lexicon: BDAG
  rationale: Se mantiene la frase directa «su padre», que preserva la referencia dinástica a David sin sobreinterpretar el término.
theological_decisions:
- issue: Título cristológico en υἱὸς Ὑψίστου
  english_pob_reading: Rendered as 'the Son of the Most High' as a titular designation without weakening or paraphrasing the filial claim.
  chosen_spanish_reading: «el Hijo del Altísimo» como designación titular y filial, sin atenuar su alcance.
  alternative_spanish_readings:
  - «un hijo del Altísimo»
  - «Hijo del Altísimo»
  rationale: La escena es el anuncio angelical sobre Jesús, por lo que el español debe conservar el peso cristológico del título. El artículo mantiene la lectura titular reflejada en la revisión inglesa.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Rendición de κύριος
  english_pob_reading: Translated as 'Lord' in 'the Lord God.'
  chosen_spanish_reading: «el Señor Dios»
  alternative_spanish_readings:
  - «el SEÑOR Dios»
  - «el Señor, Dios»
  rationale: Como el griego usa κύριος y no el tetragrámaton, no corresponde ocultarlo con mayúsculas litúrgicas. «Señor» preserva el valor de κύριος y encaja con el uso bíblico normal en español.
  doctrine_reference: 'Contested terms: κύριος → Lord'
- issue: Relación davídica de 'su padre'
  english_pob_reading: Retained 'his father' rather than interpretive 'his ancestor.'
  chosen_spanish_reading: «su padre»
  alternative_spanish_readings:
  - «su antepasado»
  - «de su padre»
  rationale: 'La frase mantiene la forma literal del griego y conserva la tensión dinástica: David es padre en sentido de linaje real, no solo genealogía biológica.'
  doctrine_reference: 'Translation philosophy #1, #5'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que añadió el artículo definido antes de «Son/Hijo» para reflejar con mayor naturalidad el valor titular del griego. También se conserva la decisión de tratar κύριος como «Señor» y de mantener la referencia dinástica de David sin reemplazarla por una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» como equivalente estable de Ὑψίστου.
  - Se usa «Señor Dios» para κύριος ὁ θεός, coherente con el criterio del proyecto y con el griego.
  - El demostrativo inicial se conserva en una nota para no perder la alternativa lexical documentada.
  - «Su padre» se deja en el texto principal para respetar el paralelismo con el griego y la tradición davídica.
