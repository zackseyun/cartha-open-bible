translation:
  language: es
  text: Derribó de los tronos a los gobernantes[a] y exaltó a los humildes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los poderosos'. El griego puede referirse más ampliamente a personas con poder, aunque 'de los tronos' favorece el sentido de gobernantes o potentados.
    reason: lexical_alternative
  - marker: b
    text: O 'los de baja condición'. El griego puede denotar tanto humildad interior como bajo estatus social.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθεῖλεν
  english_pob_choice: has brought down
  chosen_spanish: derribó
  alternatives_spanish:
  - bajó
  - derribó de su altura
  - depuesto
  lexicon: BDAG
  rationale: El aoristo describe una acción divina decisiva en la serie del Magníficat. En español, el pretérito simple comunica mejor esa acción completa que el perfecto compuesto. 'Derribó' conserva la idea de abatir o hacer caer desde una posición elevada sin añadir una especificación política excesiva.
- source_word: δυνάστας
  english_pob_choice: rulers
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los gobernantes
  - los potentados
  - los fuertes
  lexicon: BDAG
  rationale: El término griego puede referirse a personas poderosas, gobernantes o potentados. Aunque 'tronos' inclina hacia un sentido de autoridad, en español 'los poderosos' preserva mejor esa amplitud semántica que 'gobernantes', sin perder la imagen de status elevado.
- source_word: ἀπὸ θρόνων
  english_pob_choice: from thrones
  chosen_spanish: de sus tronos
  alternatives_spanish:
  - de tronos
  - de sus asientos de poder
  lexicon: BDAG
  rationale: La imagen concreta de 'tronos' se mantiene. Añadir 'sus' es una acomodación natural en español cuando el referente está implícito; no fuerza otra lectura, solo vuelve idiomática la frase.
- source_word: ὕψωσεν
  english_pob_choice: exalted
  chosen_spanish: exaltó
  alternatives_spanish:
  - levantó
  - ensalzó
  - alzó
  lexicon: BDAG
  rationale: '''Exaltó'' reproduce bien el paralelismo con el descenso anterior y el sentido de elevación honorífica o social. ''Levantó'' sería posible, pero pierde parte del valor de honor/estatus que el contexto sugiere.'
- source_word: ταπεινούς
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los bajos
  - los de condición humilde
  - los abatidos
  lexicon: BDAG
  rationale: El adjetivo puede abarcar tanto humildad como bajo estatus social. 'Los humildes' conserva esa ambigüedad productiva en español y encaja con el contraste del versículo. 'Los bajos' sería demasiado duro o ambiguo; 'los de condición humilde' explicita más de lo que el texto exige.
theological_decisions:
- issue: Aspecto verbal del aoristo en el Magníficat
  english_pob_reading: Render the Greek aorists as English present perfects ('has brought down ... and exalted')
  chosen_spanish_reading: Usar pretérito simple ('derribó ... y exaltó') para una acción divina completa y solemne
  alternative_spanish_readings:
  - ha derribado ... y ha exaltado
  - derribó ... y ha ensalzado
  rationale: El inglés POB usa presente perfecto para conservar la fuerza de una acción consumada con relevancia continua. En español, el pretérito simple es la forma más natural para una serie aorística en un canto bíblico, sin convertirla en una paráfrasis. Se preserva así la tensión entre acto ya realizado y significado permanente.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla de modo excesivamente temporal.
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no hubo cambios aplicados y el cotejo cruzado informó alta concordancia (veredicto: agree).'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención del proyecto solo cuando corresponda al Tetragrámaton; aquí no aparece.
  - Se evita 'SEÑOR' como sustituto no motivado por el texto fuente.
  - '''Poderosos'' y ''humildes'' conservan la ambigüedad semántica útil del griego, con notas para alternativas.'
  - La puntuación sigue el paralelismo del original y la lectura pública en español.
