translation:
  language: es
  text: Entonces le hicieron señas a su padre qué quería que lo llamaran[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'le hicieron señales a su padre qué podría querer que lo llamaran'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνένευον
  english_pob_choice: motioned
  chosen_spanish: le hicieron señas
  alternatives_spanish:
  - le señalaron
  - le gesticularon
  - le hicieron gestos
  lexicon: BDAG
  rationale: El verbo describe comunicación no verbal mediante señales o gestos. En español, 'le hicieron señas' es natural, claro y conserva el carácter de comunicación por signos sin exagerar el matiz.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Pero
  - Así que
  lexicon: BDAG
  rationale: δέ aquí enlaza la narración con avance suave. 'Y' mantiene la continuidad narrativa de forma simple y fiel en español.
- source_word: τῷ πατρὶ αὐτοῦ
  english_pob_choice: to his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre
  - para su padre
  lexicon: BDAG
  rationale: El dativo señala la persona a quien iban dirigidas las señas. 'A su padre' es la forma más natural en español y conserva la dirección del gesto.
- source_word: τὸ τί ἂν θέλοι
  english_pob_choice: what he wanted
  chosen_spanish: cómo quería
  alternatives_spanish:
  - qué quería
  - qué podría querer
  - qué desearía
  lexicon: BDAG
  rationale: La construcción introduce el contenido de lo que se preguntaba por señales. En este contexto español, la idea pragmática es consultar la voluntad de Zacarías; 'cómo quería' comunica con naturalidad el asunto de la designación sin añadir 'saber' explícito en exceso. 'Qué quería' queda como alternativa más literal, pero menos idiomática aquí.
- source_word: καλεῖσθαι αὐτό
  english_pob_choice: him to be called
  chosen_spanish: que lo llamaran
  alternatives_spanish:
  - que fuera llamado
  - que lo nombraran
  - llamarlo
  lexicon: BDAG
  rationale: El infinitivo pasivo 'ser llamado' expresa la designación del niño por nombre. En español, 'que lo llamaran' mantiene el sentido pasivo en una forma natural y evita el impersonal 'lo llamaran' sin sujeto explícito en exceso.
translation_notes:
  revision_awareness: La revisión inglesa eliminó 'to find out' por no estar explícito en el griego. La redacción española evita también cualquier añadido equivalente ('para averiguar', 'para saber') como contenido semántico principal, aunque conserva una formulación natural que expresa la consulta implícita de la escena.
  spanish_consistency_notes:
  - Se conserva un registro bíblico contemporáneo y legible, sin recurrir a fórmulas tradicionales innecesarias.
  - No se introduce 'Cristo', 'SEÑOR' ni otros términos no presentes en el verso.
  - La voz pasiva del griego se refleja de forma idiomática en español con 'que lo llamaran'.
