  - marker: a
    text: O, más literalmente, 'le hicieron señales a su padre qué podría querer que lo llamaran'.
    reason: lexical_alternative
  revision_rationale: Se quitó 'para saber' porque añade una finalidad ausente del griego y ya descartada en la revisión inglesa. Se cambió 'cómo quería' por 'qué quería' para reflejar con más precisión τὸ τί ἂν θέλοι. Se mantuvo 'le hicieron señas' y 'que lo llamaran' por naturalidad española, y se añadió una nota con la alternativa más literal en paralelo al audit trail inglés.
