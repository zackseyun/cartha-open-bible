translation:
  language: es
  text: porque ha mirado la humilde condición de su esclava[a]. Porque he aquí[b], desde ahora todas las generaciones me llamarán bienaventurada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sierva' o 'criada' para 'su esclava'.
    reason: alternative_reading
  - marker: b
    text: O 'miren' para 'he aquí'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέβλεψεν ἐπὶ
  english_pob_choice: has looked upon
  chosen_spanish: ha mirado
  alternatives_spanish:
  - ha fijado su mirada en
  - ha puesto su atención en
  - ha mirado con favor
  lexicon: BDAG
  rationale: El griego expresa dirigir la mirada o la atención hacia alguien, con tono de favor. En español, 'ha mirado' comunica de forma natural esa atención divina sin volverlo demasiado interpretativo; el perfecto mantiene la relevancia actual en el canto de María.
- source_word: ταπείνωσιν
  english_pob_choice: humble state
  chosen_spanish: la humilde condición
  alternatives_spanish:
  - la humillación
  - la bajeza
  - la condición humilde
  lexicon: BDAG
  rationale: Aquí el término apunta a la situación social baja de María. 'Humilde condición' conserva la idea de estado o situación, evitando reducirla solo a una virtud interior o solo a una afrenta externa.
- source_word: δούλης
  english_pob_choice: slave
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  - criada
  - doncella
  lexicon: BDAG
  rationale: Se mantiene el valor fuerte de pertenencia y dependencia personal que el POB documenta para δοῦλος/δούλη. 'Esclava' es más transparente que 'sierva' para lectores modernos y preserva la fuerza lexical del término sin suavizarlo.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: Pues miren
  alternatives_spanish:
  - mire
  - vean
  - he aquí
  lexicon: BDAG
  rationale: La partícula introduce énfasis y atención. En español, 'Pues miren' transmite ese giro exhortativo/deíctico con naturalidad en un registro elevado, y funciona bien como transición retórica en el canto.
- source_word: ἀπὸ τοῦ νῦν
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - de aquí en adelante
  - desde este momento
  - en adelante
  lexicon: BDAG
  rationale: Es la equivalencia idiomática normal y mantiene la orientación temporal hacia el futuro que introduce la afirmación de María.
- source_word: μακαριοῦσίν με
  english_pob_choice: will call me blessed
  chosen_spanish: me dirán bienaventurada
  alternatives_spanish:
  - me llamarán bienaventurada
  - me proclamarán bienaventurada
  - me considerarán bienaventurada
  lexicon: BDAG
  rationale: El verbo significa declarar o reconocer como bendecida/feliz. 'Dirán bienaventurada' conserva el futuro plural y el reconocimiento público, con un tono bíblico claro en español.
- source_word: πᾶσαι αἱ γενεαί
  english_pob_choice: all generations
  chosen_spanish: todas las generaciones
  alternatives_spanish:
  - cada generación
  - todas las razas y generaciones
  - todas las edades
  lexicon: BDAG
  rationale: La frase es idiomática para la sucesión de generaciones humanas. 'Todas las generaciones' reproduce esa amplitud sin añadir especificaciones no presentes en el texto.
theological_decisions:
- issue: Renderizar δούλη sin suavizar el vínculo de pertenencia a Dios
  english_pob_reading: his slave
  chosen_spanish_reading: su esclava
  alternative_spanish_readings:
  - su sierva
  - su criada
  rationale: Se conserva la fuerza relacional del griego y la línea doctrinal del POB que evita diluir δοῦλος/δούλη. 'Esclava' mantiene la nota de pertenencia total a Yahvé, mientras que 'sierva' quedaría más atenuado en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy points 1 and 5'
- issue: Sentido de ταπείνωσις en el cántico de María
  english_pob_reading: humble state
  chosen_spanish_reading: humilde condición
  alternative_spanish_readings:
  - humillación
  - bajeza
  - condición humilde
  rationale: La frase recoge la tensión entre una situación social baja y la mirada favorable de Dios. 'Humilde condición' evita leer el término solo como virtud interior o solo como humillación vergonzosa.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy point 3'
- issue: Tono de ἰδού en un canto poético
  english_pob_reading: behold
  chosen_spanish_reading: Pues miren
  alternative_spanish_readings:
  - he aquí
  - miren
  rationale: No se trata de un simple 'ver', sino de una llamada retórica a fijar la atención. 'Pues miren' conserva la fuerza discursiva sin sonar anticuado en exceso.
  doctrine_reference: 'DOCTRINE.md: Register and discourse markers guidance'
translation_notes:
  revision_awareness: El contexto inglés muestra que el término clave para δούλη volvió a 'slave' tras una revisión que lo había suavizado a 'servant'. La presente propuesta española preserva esa decisión lexical fuerte con 'esclava', evitando la atenuación y manteniendo coherencia con la política POB para δοῦλος/δούλος. También sigue la lectura estable de ταπείνωσις como condición humilde/socialmente baja, no como mera virtud interior.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en lugar de una máscara litúrgica cuando corresponda al nombre divino; aquí el versículo no lo incluye explícitamente, pero el marco mariológico sigue la teología y terminología POB.
  - '''Bienaventurada'' se conserva por su valor bíblico y porque refleja bien el reconocimiento público de felicidad/bendición anunciado por μακαρίζω.'
  - '''Esclava'' mantiene la terminología fuerte del proyecto para δούλος/δούλη; no se sustituye por ''sierva'' salvo que una nota lo ofrezca como alternativa histórica o estilística.'
  - La puntuación separa la causalidad y la introducción profética con 'Pues miren', manteniendo el ritmo poético del Magnificat.
