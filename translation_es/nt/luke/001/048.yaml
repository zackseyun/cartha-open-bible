    issue: ἰδού traducido como 'Pues miren'
    rationale: Añade una exhortación explícita en segunda persona plural ('miren') que no está marcada en el griego y baja el registro. 'He aquí' conserva mejor la fuerza deíctica y el tono elevado del cántico.
  - severity: medium
    issue: μακαριοῦσίν με traducido como 'me dirán bienaventurada'
    rationale: Aunque entendible, suena menos idiomático que 'me llamarán bienaventurada', que corresponde mejor al valor de 'declarar/considerar bendita' y al inglés auditado 'will call me blessed'.
  - severity: low
    issue: Nota al pie b incoherente con la redacción actual
    rationale: La nota ofrece 'miren' como alternativa para una frase que ya usa 'miren', por lo que no documenta realmente una alternativa léxica útil.
