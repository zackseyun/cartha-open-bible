translation:
  language: es
  text: Y no tenían hijo, porque Elisabet era estéril, y ambos eran de edad avanzada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''avanzados en años''. Literalmente: ''habiendo progresado en sus días''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνον
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - hijo(a)
  - descendencia
  lexicon: BDAG
  rationale: El singular τέκνον se expresa de forma natural en español como 'hijo' en este contexto de filiación y esterilidad. 'Niño' sonaría inapropiado por edad, y 'descendencia' ampliaría más de lo que el texto dice.
- source_word: οὐκ ἦν αὐτοῖς
  english_pob_choice: they had no
  chosen_spanish: no tenían
  alternatives_spanish:
  - no les había
  - no había para ellos
  - no poseían
  lexicon: BDAG
  rationale: El griego usa una construcción posesiva idiomática; en español, 'no tenían' comunica con claridad la falta de un hijo sin forzar el orden literal.
- source_word: καθότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  - pues
  lexicon: BDAG
  rationale: Introduce la causa de la ausencia de hijo. 'Porque' es la conexión causal más natural y directa en español.
- source_word: στεῖρα
  english_pob_choice: barren
  chosen_spanish: estéril
  alternatives_spanish:
  - barren
  - infértil
  - sin poder concebir
  lexicon: BDAG
  rationale: στεῖρα describe infertilidad. 'Estéril' es el equivalente claro y digno en español; 'barren' sería menos natural, y 'sin poder concebir' explicaría más de lo que el término mismo expresa.
- source_word: ἀμφότεροι
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos dos
  lexicon: BDAG
  rationale: '''Ambos'' mantiene la referencia conjunta a Zacarías y Elisabet de forma breve y natural.'
- source_word: προβεβηκότες ἐν ταῖς ἡμέραις αὐτῶν
  english_pob_choice: advanced in years
  chosen_spanish: avanzados en edad
  alternatives_spanish:
  - bien entrados en años
  - avanzados en años
  - ya de edad avanzada
  lexicon: BDAG
  rationale: La expresión idiomática indica vejez o edad avanzada. 'Avanzados en edad' conserva el sentido respetuoso y evita una literalidad extraña en español.
translation_notes:
  revision_awareness: La revisión inglesa más reciente indicó que no se requerían cambios y el estado de concordancia es alto; por ello, el español sigue de cerca la lectura auditada sin introducir matices nuevos no sustentados por el griego.
  spanish_consistency_notes:
  - Se conserva el tono sobrio y narrativo del POB.
  - '''Elisabet'' se usa con grafía española habitual, sin modernizar el nombre más allá de lo necesario.'
  - La nota al pie mantiene la alternativa idiomática del inglés y explicita la forma literal del griego.
  - No se añadió mayúscula a 'estéril' ni se suavizó el contenido de infertilidad para no diluir el dato histórico del texto.
