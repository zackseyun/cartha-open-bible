    issue: La nota al pie [a] está anclada a 'hijo' en lugar de a la frase sobre la edad avanzada.
    rationale: La nota documenta la alternativa para προβεβηκότες ἐν ταῖς ἡμέραις αὐτῶν ('avanzados en años/edad'), no para τέκνον. Tal como está, induce a error sobre qué expresión está siendo explicada.
  - severity: medium
    issue: '''Estaban avanzados en edad'' suena algo forzado en español.'
    rationale: Aunque se entiende, 'eran de edad avanzada' o 'estaban avanzados en años' son opciones más idiomáticas y fieles al tono respetuoso del original y del POB inglés.
  revised_spanish_text: Y no tenían hijo, porque Elisabet era estéril, y ambos eran de edad avanzada[a].
  revised_footnotes:
  - marker: a
    text: 'O ''avanzados en años''. Literalmente: ''habiendo progresado en sus días''.'
