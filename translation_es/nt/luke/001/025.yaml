translation:
  language: es
  text: porque así me ha tratado el Señor en los días en que me miró[a], para quitar mi oprobio entre la gente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'me consideró' o 'volvió su mirada hacia mí'. El verbo griego expresa atención o consideración favorable; no solo una mirada física.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - que
  lexicon: BDAG
  rationale: Introduce la razón de la afirmación precedente; en español, 'porque' expresa de manera natural y directa el valor explicativo causal del contexto.
- source_word: Οὕτως
  english_pob_choice: this is how
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esa manera
  - así es como
  lexicon: BDAG
  rationale: Conserva el valor de modo y la deixis enfática del griego sin volver la frase pesada en español.
- source_word: μοι
  english_pob_choice: with me
  chosen_spanish: me
  alternatives_spanish:
  - conmigo
  - para mí
  - a mí
  lexicon: BDAG
  rationale: Con πεποίηκεν, el dativo funciona idiomáticamente como objeto personal del trato divino; 'me' permite una construcción española natural en 'me ha tratado'.
- source_word: πεποίηκεν
  english_pob_choice: has dealt
  chosen_spanish: ha tratado
  alternatives_spanish:
  - ha hecho
  - ha obrado
  - ha actuado
  lexicon: BDAG
  rationale: En este giro, 'tratar' comunica mejor la acción personal y concreta de Dios sobre Elizabeth que un literal 'ha hecho', manteniendo el matiz de acción intencional.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Dios
  - Yahvé
  lexicon: BDAG
  rationale: Sigue el equivalente corriente para κύριος en este contexto narrativo; no hay aquí una razón textual para introducir 'Yahvé' en la boca de Elizabeth, que en el griego dice simplemente κύριος.
- source_word: ἐν ἡμέραις αἷς
  english_pob_choice: in the days when
  chosen_spanish: en los días en que
  alternatives_spanish:
  - en los días cuando
  - durante los días en que
  - en el tiempo en que
  lexicon: BDAG
  rationale: Reproduce con fluidez la construcción temporal relativa sin perder su estructura de marco temporal.
- source_word: ἐπεῖδεν
  english_pob_choice: he looked on me
  chosen_spanish: se dignó mirarme
  alternatives_spanish:
  - me miró
  - me tuvo en cuenta
  - volvió su mirada hacia mí
  lexicon: BDAG
  rationale: El verbo expresa una mirada atenta/favorable; 'se dignó mirarme' preserva la atención benevolente del sujeto divino y suena natural en español culto, sin reducirlo a una mera observación visual.
- source_word: ἀφελεῖν
  english_pob_choice: to take away
  chosen_spanish: para quitar
  alternatives_spanish:
  - para remover
  - para retirar
  - para llevarse
  lexicon: BDAG
  rationale: El infinitivo de propósito se traduce de forma directa con 'para quitar', que conserva el valor de eliminación del oprobio.
- source_word: ὄνειδός μου
  english_pob_choice: my reproach
  chosen_spanish: mi oprobio
  alternatives_spanish:
  - mi reproche
  - mi vergüenza
  - mi deshonra
  lexicon: BDAG
  rationale: '''Oprobio'' mantiene el sentido de deshonra pública y social del término griego mejor que ''vergüenza'', que suena más interior; además, evita diluir el peso honor-shame del contexto.'
- source_word: ἐν ἀνθρώποις
  english_pob_choice: among people
  chosen_spanish: entre la gente
  alternatives_spanish:
  - entre los hombres
  - delante de la gente
  - en medio de la gente
  lexicon: BDAG
  rationale: Expresa bien la esfera social del deshonor en un español natural y no masculino por defecto.
theological_decisions:
- issue: Referencia de κύριος
  english_pob_reading: Elizabeth refers to God as 'the Lord.'
  chosen_spanish_reading: Elizabeth se refiere a Dios como 'el Señor'.
  alternative_spanish_readings:
  - Elizabeth se refiere a Yahvé.
  - Elizabeth se refiere al Señor Dios.
  rationale: En este contexto de acción providencial y sanación de la esterilidad, κύριος apunta a Dios. 'El Señor' conserva la referencia teológica sin forzar una expansión innecesaria del texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Sentido social de ὄνειδος
  english_pob_reading: Render as 'reproach' rather than a more internal term like 'shame.'
  chosen_spanish_reading: Traducirlo como 'oprobio' para conservar su carga social de deshonra pública.
  alternative_spanish_readings:
  - vergüenza
  - deshonra
  - reproche
  rationale: '''Oprobio'' preserva el componente externo y comunitario del término; ''vergüenza'' podría inclinarse demasiado hacia la vivencia interior.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; la formulación aquí mantiene la misma decisión semántica que el flujo auditado, con ajuste español para mayor naturalidad en 'se dignó mirarme' y 'o_probio' como equivalente de honor/deshonra.
  spanish_consistency_notes:
  - Se mantiene 'el Señor' para κύριος de acuerdo con la pauta del proyecto y el contexto narrativo.
  - Se conserva una distinción entre 'mirarme' (acto de atención) y 'quitar' (eliminar el oprobio), siguiendo la relación verbal del griego.
  - '''Entre la gente'' evita masculino genérico y preserva la dimensión social del término.'
  - El tono es digno y moderno, sin arcaismos innecesarios.
