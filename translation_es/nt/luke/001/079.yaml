translation:
  language: es
  text: para alumbrar a los que están sentados en tinieblas y en sombra de la muerte[a], para guiar nuestros pies hacia el camino de paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sombra de muerte»; algunos entienden la expresión en un sentido más amplio como «profunda oscuridad», pero el griego incluye explícitamente «muerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιφᾶναι
  english_pob_choice: to shine on
  chosen_spanish: alumbrar
  alternatives_spanish:
  - brillar sobre
  - dar luz a
  - amanecer sobre
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa el propósito/resultado de la venida del que se menciona. «Alumbrar» conserva la imagen de la luz que irrumpe en la oscuridad y suena natural en español, sin perder el valor metafórico de «shine on».
- source_word: τοῖς ἐν σκότει ... καθημένοις
  english_pob_choice: those sitting in darkness
  chosen_spanish: a los que habitan en tinieblas
  alternatives_spanish:
  - a los que están sentados en tinieblas
  - a los que viven en tinieblas
  - a los que moran en tinieblas
  lexicon: BDAG
  rationale: Aunque καθημένοις es literalmente «sentados», en español «sentados en tinieblas» resulta poco natural. «Habitan» comunica bien el estado prolongado y mantiene la fuerza poética del grupo sin borrar la imagen de permanencia.
- source_word: σκότει
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - sombras
  lexicon: BDAG
  rationale: «Tinieblas» es una forma bíblica y clara en español para σκότος en este contexto, y conserva mejor el registro poético que «oscuridad».
- source_word: σκιᾷ θανάτου
  english_pob_choice: the shadow of death
  chosen_spanish: sombra de muerte
  alternatives_spanish:
  - sombra de la muerte
  - muerte en sombra
  - profunda oscuridad
  lexicon: BDAG
  rationale: Se mantiene la fórmula tradicional y el eco intertextual del giro bíblico. «Sombra de muerte» preserva la imagen y la tensión lexical del genitivo θανάτου, en lugar de reinterpretarla como «profunda oscuridad».
- source_word: τοῦ κατευθῦναι
  english_pob_choice: to guide
  chosen_spanish: para guiar
  alternatives_spanish:
  - para dirigir
  - para enderezar
  - para conducir
  lexicon: BDAG
  rationale: El infinitivo articular expresa finalidad. «Guiar» reproduce bien la idea de orientación y conducción en relación con «nuestros pies».
- source_word: τοὺς πόδας ἡμῶν
  english_pob_choice: our feet
  chosen_spanish: nuestros pies
  alternatives_spanish:
  - nuestros pasos
  - nuestras pisadas
  lexicon: BDAG
  rationale: Se conserva la metáfora corporal literal. «Nuestros pies» mantiene la concreción del griego y el paralelismo poético.
- source_word: εἰς ὁδὸν εἰρήνης
  english_pob_choice: into the way of peace
  chosen_spanish: por el camino de paz
  alternatives_spanish:
  - en el camino de paz
  - hacia el camino de paz
  - en la senda de paz
  lexicon: BDAG
  rationale: «Ὁδός» es literalmente «camino/way». En español, «por el camino de paz» fluye con naturalidad y conserva el sentido direccional sin introducir una paráfrasis excesiva. La ausencia de artículo en griego no obliga a usar uno indefinido en español.
theological_decisions:
- issue: Conservar la imaginería de oscuridad y muerte sin explicitarla en la traducción principal
  english_pob_reading: Retain the imagery of darkness, shadow of death, feet, and way without explicating them as spiritual ignorance, mortal danger, or ethical conduct in the main text.
  chosen_spanish_reading: Mantener «tinieblas», «sombra de muerte», «pies» y «camino» sin convertirlos en «ignorancia espiritual», «peligro mortal» o «conducta ética» en el texto principal.
  alternative_spanish_readings:
  - alumbrar a los que están en oscuridad espiritual
  - para guiar nuestros pasos en la senda de la paz
  rationale: El versículo es poético y alusivo. La versión española debe preservar la tensión metafórica y el eco bíblico, en vez de resolverlo mediante una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios posteriores ni observaciones de corrección; el consenso de auditoría es alto y uniforme.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto cuando aparezca el nombre divino; aquí no aplica porque el versículo no lo contiene.
  - Se conserva el registro bíblico-poético con «tinieblas», «sombra de muerte», «pies» y «camino», evitando modernizaciones que atenúen la imaginería.
  - «Alumbrar» y «guiar» equilibran naturalidad en español con fidelidad a las imágenes del griego.
