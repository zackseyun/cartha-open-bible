translation:
  language: es
  text: Y su misericordia es para quienes le temen de generación en generación[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de generación en generación». El griego dice literalmente «a generaciones y generaciones», expresión de misericordia continua a lo largo de las generaciones sucesivas.
    reason: lexical_alternative
  - marker: b
    text: «Quienes le temen» se refiere a quienes viven en reverente temor de Dios; alternativamente, «quienes le reverencian».
    reason: lexical_alternative
  - marker: c
    text: O «para generación tras generación, para quienes le temen».
    reason: alternative_reading
lexical_decisions:
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia fiel
  - compasión
  lexicon: BDAG
  rationale: ἔλεος expresa misericordia, compasión o bondad mostrada al necesitado. En español, «misericordia» es la equivalencia directa y natural, y conserva bien el tono del cántico sin añadir matices no explicitados por el griego.
- source_word: εἰς γενεὰς καὶ γενεὰς
  english_pob_choice: for generation after generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - para generación tras generación
  - por generaciones y generaciones
  lexicon: BDAG
  rationale: La expresión comunica duración a través de generaciones sucesivas. En español, «de generación en generación» es idiomático, tradicional y suficientemente preciso; conserva la idea distributiva y la continuidad sin volver la frase pesada.
- source_word: τοῖς φοβουμένοις αὐτόν
  english_pob_choice: those who fear him
  chosen_spanish: quienes le temen
  alternatives_spanish:
  - los que le temen
  - quienes le reverencian
  lexicon: BDAG
  rationale: φοβέομαι con Dios suele implicar temor reverente, no solo miedo. «Le temen» preserva el idioma bíblico y la tensión teológica; el contexto aclara que se trata de reverencia piadosa, no de terror servil.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - Y también
  lexicon: BDAG
  rationale: La conjunción enlaza este verso con el flujo del Magnificat. «Y» mantiene la continuidad poética y la relación acumulativa del pasaje.
- source_word: αὐτοῦ / αὐτόν
  english_pob_choice: his / him
  chosen_spanish: su / le
  alternatives_spanish:
  - de él / a él
  lexicon: BDAG
  rationale: Ambos pronombres se refieren a Dios en el contexto inmediato. En español, «su» y «le» conservan la referencia de forma natural sin sobreexplicar.
theological_decisions:
- issue: Sentido de «temer» a Dios
  english_pob_reading: Rendered as 'those who fear him,' understood as reverent fear rather than servile terror.
  chosen_spanish_reading: «Quienes le temen», entendido como temor reverente y piadoso, no como miedo servil.
  alternative_spanish_readings:
  - quienes le reverencian
  rationale: El griego permite un sentido de reverencia. Se mantiene «temen» para conservar la dicción bíblica y no diluir la fuerza teológica del verbo; la nota aclara el matiz.
  doctrine_reference: Mantener la tensión bíblica entre temor y reverencia; no resolverla con una paraphrasis que suavice demasiado el texto.
translation_notes:
  revision_awareness: 'El texto griego presenta dos elementos distintos: la duración de la misericordia («εἰς γενεὰς καὶ γενεὰς») y los beneficiarios («τοῖς φοβουμένοις αὐτόν»). La redacción española los conserva en un orden natural y fluido. Se evita una calca demasiado rígida y se preserva la ambigüedad reverencial de φοβέομαι. No hay dependencia de una forma inglesa defectuosa; la versión sigue el griego y el audit trail inglés para justificar la equivalencia.'
  spanish_consistency_notes:
  - Se usa «misericordia» como término preferente para ἔλεος, coherente con el conjunto del proyecto.
  - Se mantiene «le temen» para φοβέομαι, con nota explicativa sobre el temor reverente.
  - Se prefiere la fórmula española idiomática «de generación en generación» por su claridad y fidelidad distributiva.
  - No se introduce «Cristo» ni terminología eclesiástica no presente en el verso.
