translation:
  language: es
  text: Pero ella se turbó mucho[a] por el mensaje[b], y seguía pensando en qué clase de saludo podría ser este.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se perturbó mucho» o «se inquietó mucho». El verbo griego indica una fuerte agitación interior.
    reason: lexical_alternative
  - marker: b
    text: O «ante la palabra» o «por lo dicho». λόγος puede significar «palabra», «declaración» o «mensaje».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: En español, «Pero» expresa mejor el leve contraste narrativo que introduce la reacción de María frente al saludo previo.
- source_word: ἐπὶ τῷ λόγῳ
  english_pob_choice: at the message
  chosen_spanish: por el mensaje
  alternatives_spanish:
  - ante la palabra
  - a causa de lo dicho
  lexicon: BDAG
  rationale: λόγος puede referirse al contenido dicho; «por el mensaje» conserva el sentido causal y comunica naturalmente que la turbación fue provocada por lo que se le dijo.
- source_word: διεταράχθη
  english_pob_choice: was greatly troubled
  chosen_spanish: se turbó mucho
  alternatives_spanish:
  - se perturbó mucho
  - quedó muy turbada
  lexicon: BDAG
  rationale: El verbo intensificado expresa agitación profunda. «Se turbó mucho» mantiene esa fuerza con un español claro y reverente.
- source_word: διελογίζετο
  english_pob_choice: kept considering
  chosen_spanish: seguía pensando
  alternatives_spanish:
  - seguía considerando
  - seguía reflexionando
  - seguía preguntándose
  lexicon: BDAG
  rationale: El imperfecto indica deliberación continua. «Seguía pensando» preserva la continuidad de la reflexión sin volverla más interpretativa de lo que permite el griego.
- source_word: ποταπὸς
  english_pob_choice: what kind of
  chosen_spanish: qué clase de
  alternatives_spanish:
  - qué tipo de
  - de qué clase
  lexicon: BDAG
  rationale: La pregunta apunta a la naturaleza o clase del saludo. «Qué clase de» es idiomático en español y conserva bien el matiz.
- source_word: εἴη
  english_pob_choice: might be
  chosen_spanish: podría ser
  alternatives_spanish:
  - fuera
  - sería
  lexicon: BDAG
  rationale: El optativo en discurso indirecto expresa posibilidad o conjetura. «Podría ser» refleja mejor esa cautela que un simple pasado.
- source_word: ἀσπασμὸς
  english_pob_choice: greeting
  chosen_spanish: saludo
  alternatives_spanish:
  - salutación
  lexicon: BDAG
  rationale: Se refiere al saludo pronunciado. «Saludo» es natural en español moderno y mantiene la referencia al acto verbal.
- source_word: οὗτος
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - tal
  lexicon: BDAG
  rationale: El demostrativo señala el saludo inmediato y específico que acaba de recibir.
theological_decisions:
- issue: Naturaleza de la reacción de María
  english_pob_reading: Mary is portrayed as troubled by the angel's message/greeting and reflecting on its meaning, without specifying sinful fear, disbelief, or moral fault.
  chosen_spanish_reading: María aparece turbada por el mensaje y pensando sobre su sentido, sin que el versículo la presente como culpable, incrédula o movida por temor pecaminoso.
  alternative_spanish_readings:
  - María se turbó por la apariencia del ángel
  - María reaccionó con incredulidad
  rationale: El griego vincula la turbación con el contenido dicho, no con la mera presencia del ángel, y el imperfecto muestra reflexión en curso. La traducción debe conservar esa tensión sin resolverla teológicamente.
  doctrine_reference: Preservar la tensión textual sin sobreinterpretación doctrinal.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; se mantiene alta concordancia con el control cruzado y con la lectura auditada del griego.
  spanish_consistency_notes:
  - Se usa «mensaje» para λόγος siguiendo la decisión del POB en inglés, pero se preservan las alternativas léxicas en nota.
  - Se usa «saludo» para ἀσπασμός, evitando elevarlo a un término litúrgico más técnico que el texto no exige.
  - La progresión verbal («se turbó mucho» / «seguía pensando») intenta reflejar la fuerza puntual del aoristo y la continuidad del imperfecto.
