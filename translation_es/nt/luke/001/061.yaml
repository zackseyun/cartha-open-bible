lexical_decisions:
- source_word: εἶπαν
  english_pob_choice: they said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le dijeron
  - le hablaron
  lexicon: BDAG
  rationale: El aoristo narrativo de λέγω se vierte naturalmente con «dijeron»; el complemento indirecto «le» conserva la dirección del habla hacia ella.
- source_word: πρὸς αὐτὴν
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - para ella
  lexicon: BDAG
  rationale: Con verbos de hablar, πρός + acusativo marca al destinatario del discurso; en español, el dativo átono «le» es la opción más natural y sobria.
- source_word: Οὐδείς ἐστιν
  english_pob_choice: None ... is
  chosen_spanish: Ninguno ... es
  alternatives_spanish:
  - Nadie ... es
  - No hay nadie ...
  lexicon: BDAG
  rationale: «Ninguno» mantiene bien la estructura con el sintagma partitivo siguiente y respeta el singular del verbo griego.
- source_word: ἐκ τῆς συγγενείας σου
  english_pob_choice: of your relatives
  chosen_spanish: de tus parientes
  alternatives_spanish:
  - de tu familia
  - de tu parentela
  - de tus parientes
  lexicon: BDAG
  rationale: συγγένεια indica vínculo de parentesco/los parientes mismos; «parientes» comunica el sentido con claridad contemporánea y sin arcaísmo.
- source_word: ὃς καλεῖται
  english_pob_choice: is called
  chosen_spanish: es llamado
  alternatives_spanish:
  - es nombrado
  - se llama
  lexicon: BDAG
  rationale: El pasivo de καλέω con nombre se expresa de forma directa con «es llamado»; conserva el valor del griego sin introducir una reformulación más libre.
- source_word: τῷ ὀνόματι τούτῳ
  english_pob_choice: by this name
  chosen_spanish: con este nombre
  alternatives_spanish:
  - por este nombre
  - con ese nombre
  lexicon: BDAG
  rationale: Aunque el inglés POB traduce «by this name», en español la construcción más natural para el estado nominal es «con este nombre», que mantiene el referente demostrativo de τούτῳ.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece en el texto principal exactamente donde corresponde y la nota ofrece una alternativa léxica real, alineada con el expediente inglés.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones teológicas ajenas al versículo.
  - Se mantuvo el tono narrativo simple del griego y del POB inglés.
  - «Parientes» traduce de manera natural συγγένεια sin perder el matiz de parentesco familiar.
