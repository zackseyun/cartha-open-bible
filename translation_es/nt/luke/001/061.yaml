  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del griego: interlocutores hablando a Elisabet y objetando que no hay nadie entre sus parientes con ese nombre. Sin embargo, «es llamado con este nombre» suena poco idiomático en español para καλεῖται τῷ ὀνόματι τούτῳ; en este contexto narrativo español natural y fiel es «se llama así» o «lleva ese nombre».'
  spanish_quality_summary: La redacción actual es comprensible, pero algo calcada del inglés/griego. «Ninguno de tus parientes es llamado con este nombre» resulta rígida y poco natural en español bíblico contemporáneo. También la nota repite la misma construcción poco idiomática. Conviene suavizarla a un español más fluido sin perder precisión.
  glossary_alignment: No hay conflictos con la terminología doctrinal o de glosario del proyecto. «Parientes» encaja bien para συγγένεια. La mejora necesaria es estilística-lexical en la expresión del nombre.
  issues:
  - severity: medium
    issue: «es llamado con este nombre» es un calco poco natural
    rationale: Aunque reproduce de cerca el pasivo griego, en español la forma habitual para καλεῖται con nombre es «se llama» o «lleva este nombre». La versión actual suena forzada.
  - severity: low
    issue: La nota alternativa también usa una construcción rígida
    rationale: «Ninguno de tus familiares es llamado con este nombre» no resuelve el problema de naturalidad; debe ajustarse junto con el texto principal.
  revised_spanish_text: 'Y le dijeron[a]: «Ninguno de tus parientes se llama así».

