translation:
  language: es
  text: Y a Isabel se le cumplió el tiempo[a] de dar a luz, y dio a luz un hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «le llegó el tiempo de dar a luz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  - Entonces
  lexicon: BDAG
  rationale: Aquí δὲ marca transición narrativa suave. En español, «Pero» mantiene el avance del relato sin forzar un valor adversativo fuerte; «Ahora» sonaría más marcado como adverbio temporal y menos natural al inicio de la frase.
- source_word: ἐπλήσθη ὁ χρόνος
  english_pob_choice: the time was fulfilled
  chosen_spanish: se le cumplió el tiempo
  alternatives_spanish:
  - se cumplió el tiempo
  - llegó el tiempo
  - se completó el tiempo
  lexicon: BDAG
  rationale: La expresión griega conserva un matiz semítico de tiempo «cumplido». «Se le cumplió el tiempo» reproduce esa fuerza verbal en un español natural y mantiene el vínculo con el sujeto personal implicado en el contexto.
- source_word: τοῦ τεκεῖν αὐτήν
  english_pob_choice: for Elizabeth to give birth
  chosen_spanish: de dar a luz
  alternatives_spanish:
  - para dar a luz
  - para que diera a luz
  - para su parto
  lexicon: BDAG
  rationale: El infinitivo articular expresa finalidad o referencia al parto. «De dar a luz» encaja con la construcción española después de «se le cumplió el tiempo» y evita una paráfrasis excesiva; «dar a luz» es la forma idiomática más clara para τίκτω en este contexto.
- source_word: ἐγέννησεν
  english_pob_choice: she bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  - tuvo
  lexicon: BDAG
  rationale: El verbo aoristo narra el acto completo del parto. «Dio a luz» es natural, digno y exacto; «parió» es más brusco en registro general, y «engendró» no es adecuado para el sujeto materno en español actual.
- source_word: υἱόν
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un hijo varón
  lexicon: BDAG
  rationale: Aunque υἱός significa estrictamente «hijo/varón», en español la expresión «dio a luz un hijo» preserva el sentido filial y gender-accurate sin sonar forzada. Aquí «hijo» es suficiente porque el contexto ya es el nacimiento de un varón.
- source_word: Ἐλισάβετ
  english_pob_choice: Elizabeth
  chosen_spanish: Isabel
  alternatives_spanish:
  - Elisabet
  lexicon: BDAG/uso bíblico español
  rationale: Se adopta la forma bíblica española estándar «Isabel», plenamente reconocible y fiel al nombre propio griego.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece explícitamente en el texto español y la nota correspondiente está anclada al mismo punto.'
  spanish_consistency_notes:
  - Se mantiene el tiempo verbal narrativo pasado simple para el acto del parto, conforme al aoristo griego.
  - Se evita «SEÑOR» u otras sustituciones teológicas no presentes en el versículo.
  - El nombre propio se normaliza como «Isabel» según el uso bíblico español común y claro.
