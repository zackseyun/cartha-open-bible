translation:
  language: es
  text: porque el Poderoso[a] ha hecho grandes cosas en mi favor, y santo es su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y su nombre es santo». El griego coloca «santo» antes de «su nombre» para dar énfasis.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la alabanza de María. «Porque» expresa con naturalidad la relación causal y conserva el valor explicativo del griego.
- source_word: ἐποίησέν
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - hizo
  - ha obrado
  lexicon: BDAG
  rationale: El aoristo señala una acción completa de Dios con efecto presente en el cántico. «Ha hecho» mantiene ese valor perfecto-completivo en español sin perder naturalidad.
- source_word: μοι
  english_pob_choice: for me
  chosen_spanish: por mí
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: BDAG
  rationale: El dativo es benefactivo; en español, «por mí» comunica que la acción de Dios fue en mi favor y evita una lectura meramente direccional.
- source_word: μεγάλα
  english_pob_choice: great things
  chosen_spanish: grandes cosas
  alternatives_spanish:
  - grandes obras
  - grandes hechos
  lexicon: BDAG
  rationale: El neutro plural sustantivado abarca acciones poderosas sin especificarlas. «Grandes cosas» reproduce bien la amplitud del original y la formulación tradicional del pasaje.
- source_word: ὁ δυνατός
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el que es poderoso
  lexicon: BDAG
  rationale: El artículo con el adjetivo funciona como título divino. «El Poderoso» conserva la fuerza titular y resulta natural en español; se evita «el Poderoso Uno», que sería poco idiomático.
- source_word: ἅγιον
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - es santo
  lexicon: BDAG
  rationale: Predicado adjetival aplicado al nombre de Dios. «Santo» es la equivalencia bíblica más directa en español y mantiene la idea de pureza y consagración.
- source_word: τὸ ὄνομα αὐτοῦ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  lexicon: BDAG
  rationale: Se conserva el sustantivo «nombre» como en el griego, sin explicitar más allá de lo necesario. En el contexto bíblico remite a su carácter revelado, pero la frase literal sigue siendo la más fiel.
theological_decisions:
- issue: ὁ δυνατός como título divino
  english_pob_reading: the Mighty One
  chosen_spanish_reading: el Poderoso
  alternative_spanish_readings:
  - el Fuerte
  - el que es poderoso
  rationale: El griego usa el artículo con un adjetivo sustantivado, con valor de designación reverente de Dios. «El Poderoso» preserva ese carácter titular sin introducir una paráfrasis explicativa excesiva.
  doctrine_reference: 'Sagrada Escritura: lenguaje doxológico y títulos divinos'
- issue: Orden enfático en καὶ ἅγιον τὸ ὄνομα αὐτοῦ
  english_pob_reading: and holy is his name
  chosen_spanish_reading: y santo es su nombre
  alternative_spanish_readings:
  - y su nombre es santo
  rationale: El griego antepone «santo» para dar énfasis. «Santo es su nombre» conserva ese realce inicial mejor que el orden más neutro «su nombre es santo».
  doctrine_reference: 'Sagrada Escritura: preservación de énfasis sintáctico'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y coincide sustancialmente con la solución auditada en inglés. Se mantuvo la lectura titular de ὁ δυνατός y el énfasis sintáctico de ἅγιον al inicio de la cláusula final, con un español natural y publicable. No se detectaron revisiones previas que requirieran ajuste adicional.
  spanish_consistency_notes:
  - Se usó «Poderoso» como título divino, coherente con el tratamiento reverente de ὁ δυνατός en el contexto.
  - Se prefirió «santo» y no «sagrado» por ser la equivalencia bíblica más estable para ἅγιος en esta doxología.
  - Se conservó el valor benefactivo de μοι con «por mí», evitando una lectura demasiado literal como «a mí».
  - La nota al pie marca la alternativa válida «y su nombre es santo» para preservar la tensión entre naturalidad del español y el orden enfático del griego.
