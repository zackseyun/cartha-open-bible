revisions:
- from: Y mira[a], concebirás en tu vientre y darás a luz un hijo, y llamarás su nombre Jesús.
  to: Y he aquí, concebirás en tu vientre y darás a luz un hijo, y le pondrás por nombre[a] Jesús.
  rationale: Se ajusta ἰδοὺ a «Y he aquí» para conservar mejor el tono solemne de la anunciación, y se reemplaza el calco poco natural «llamarás su nombre» por «le pondrás por nombre», que mantiene la fórmula bíblica de nombramiento en español natural. También se corrige la nota para que refleje con precisión la alternativa idiomática del segmento onomástico.
