translation:
  language: es
  text: Y he aquí, concebirás en tu vientre y darás a luz un hijo, y le pondrás por nombre[a] Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «lo llamarás Jesús».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira
  lexicon: BDAG
  rationale: ἰδού funciona como partícula de atención y de solemnidad en una anunciación. En español, «mira» comunica esa llamada al oyente sin forzar un arcaísmo; «he aquí» conserva más color bíblico, pero suena más marcado y menos natural en un anuncio directo.
- source_word: συλλήμψῃ
  english_pob_choice: you will conceive
  chosen_spanish: concebirás
  alternatives_spanish:
  - quedarás encinta
  - te embarazarás
  lexicon: BDAG
  rationale: El verbo futuro de συλλαμβάνω aquí se refiere al acto de concebir. «Concebirás» preserva con precisión el valor verbal y mantiene el tono sobrio del anuncio. «Quedarás encinta» o «te embarazarás» expresan el resultado de forma más coloquial, pero no son tan cercanos al matiz léxico.
- source_word: ἐν γαστρὶ
  english_pob_choice: in your womb
  chosen_spanish: en tu vientre
  alternatives_spanish:
  - en tu seno
  - en tu matriz
  lexicon: BDAG
  rationale: La expresión idiomática apunta al estado de embarazo y al lugar de la concepción. «En tu vientre» es una equivalencia española natural y transparente. «En tu matriz» sería más técnico o arcaizante; «en tu seno» puede sonar menos preciso en este contexto.
- source_word: τέξῃ
  english_pob_choice: bear
  chosen_spanish: darás a luz
  alternatives_spanish:
  - parirás
  - darás a luz
  lexicon: BDAG
  rationale: τίκτω significa «dar a luz» o «parir». En español, «darás a luz» es la forma más clara y digna en este contexto narrativo. «Parirás» es más literal pero más áspera para este registro.
- source_word: υἱόν
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un hijo
  - un varón
  lexicon: BDAG
  rationale: υἱός significa específicamente «hijo»; en español, «un hijo» preserva la filiación sin añadir una expresión más técnica. «Un varón» puede reflejar el sexo biológico, pero atenúa la relación filial explícita del término griego.
- source_word: καλέσεις τὸ ὄνομα αὐτοῦ
  english_pob_choice: you will call his name
  chosen_spanish: llamarás su nombre
  alternatives_spanish:
  - lo llamarás
  - le pondrás por nombre
  lexicon: BDAG
  rationale: La construcción griega conserva la fórmula bíblica de nombramiento. «Llamarás su nombre» refleja más de cerca el giro original y su textura semítica; «le pondrás por nombre» o «lo llamarás» sonarían más naturales en español, pero suavizan esa formulación.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español para Ἰησοῦς. No se requiere alternativa sustantiva; se conserva la forma tradicional y reconocible en el idioma receptor.
theological_decisions:
- issue: Valor de la partícula de anuncio ἰδοὺ en una escena de anunciación
  english_pob_reading: And behold
  chosen_spanish_reading: Y mira
  alternative_spanish_readings:
  - Y he aquí
  - Mira
  rationale: 'No hay disputa doctrinal, pero sí un matiz discursivo: la partícula introduce solemnemente una revelación. «Y mira» conserva la función de llamada de atención sin endurecer el estilo. «He aquí» mantiene más solemnidad bíblica, aunque con mayor color arcaizante.'
  doctrine_reference: Lucas 1:31; función discursiva de ἰδού en contexto de anuncio
- issue: Fórmula de nombramiento del hijo
  english_pob_reading: you will call his name Jesus
  chosen_spanish_reading: llamarás su nombre Jesús
  alternative_spanish_readings:
  - lo llamarás Jesús
  - le pondrás por nombre Jesús
  rationale: La redacción principal mantiene la estructura bíblica de nombramiento y evita borrar la forma semítica subyacente. No se introduce tensión doctrinal; la elección busca preservar el eco narrativo del texto fuente.
  doctrine_reference: Lucas 1:31; fórmula onomástica narrativa
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés coinciden plenamente en el contenido: anuncio de concepción, nacimiento de un hijo y nombramiento de Jesús. La versión española conserva esa secuencia sin añadir ni omitir elementos, y refleja la nota inglesa sobre la alternativa idiomática del nombramiento, trasladándola a una opción natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma española estable del nombre propio.
  - «Vientre» reproduce de forma clara la imagen corporal/idiomática de ἐν γαστρὶ sin volverla técnica.
  - 'Se conserva el paralelismo de tres miembros: concepción, nacimiento y nombramiento.'
  - La nota al pie marca solo la alternativa idiomática relevante, sin introducir variantes no atestiguadas.
