translation:
  language: es
  text: a una virgen[a] desposada con un hombre cuyo nombre era José, de la casa de David[b]; y el nombre de la virgen era María.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prometida en matrimonio». El griego denota un estado formal de compromiso previo al matrimonio pleno.
    reason: lexical_alternative
  - marker: b
    text: O «Mariam», una transliteración más cercana a la forma griega del nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρθένον / παρθένου
  english_pob_choice: virgin
  chosen_spanish: virgen
  alternatives_spanish:
  - joven
  - joven mujer
  lexicon: BDAG
  rationale: El griego παρθένος en este contexto y su repetición en el mismo versículo sostienen con fuerza el sentido de virginidad, no solo de juventud. «Virgen» es el equivalente español directo y conserva el valor narrativo y teológico del texto sin suavizarlo.
- source_word: ἐμνηστευμένην
  english_pob_choice: betrothed
  chosen_spanish: desposada
  alternatives_spanish:
  - novia prometida
  - prometida en matrimonio
  - comprometida
  lexicon: BDAG
  rationale: La forma participial expresa un estado formal y establecido previo al matrimonio pleno. «Desposada» comunica en español bíblico esa condición legal/social con dignidad y brevedad; «comprometida» sería demasiado moderno y débil, y «prometida en matrimonio» suena más explicativo que el griego.
- source_word: ἀνδρὶ
  english_pob_choice: to a man
  chosen_spanish: con un hombre
  alternatives_spanish:
  - a un hombre
  - con su esposo
  lexicon: BDAG
  rationale: El griego usa ἀνήρ en un marco de desposorio; no conviene traducirlo como «esposo», porque eso sugeriría matrimonio ya consumado. «Con un hombre» refleja la relación legal prevista sin sobreafirmar el estado civil.
- source_word: ᾧ ὄνομα Ἰωσὴφ
  english_pob_choice: whose name was Joseph
  chosen_spanish: llamado José
  alternatives_spanish:
  - de nombre José
  - cuyo nombre era José
  lexicon: BDAG
  rationale: La construcción nominal griega se resuelve naturalmente en español con «llamado José». Es idiomático, claro y mantiene la sencillez del formulario de identificación.
- source_word: ἐξ οἴκου Δαυίδ
  english_pob_choice: from the house of David
  chosen_spanish: de la casa de David
  alternatives_spanish:
  - de la familia de David
  - de la dinastía de David
  lexicon: BDAG
  rationale: «Casa de David» conserva el lenguaje dinástico y de pacto que el español bíblico entiende bien. «Familia» o «dinastía» explicitan, pero desplazan el valor formulístico del texto.
- source_word: Μαριάμ
  english_pob_choice: Mary
  chosen_spanish: María
  alternatives_spanish:
  - Mariam
  lexicon: BDAG
  rationale: En español bíblico, la forma establecida y natural es «María». El griego Μαριάμ admite la transliteración «Mariam», pero esta no es la forma habitual en español y no añade claridad en el cuerpo del texto.
theological_decisions:
- issue: Cómo conservar el valor de παρθένος sin rebajarlo a una mera referencia a la edad o estado social
  english_pob_reading: virgin
  chosen_spanish_reading: virgen
  alternative_spanish_readings:
  - joven
  - joven mujer
  rationale: El contexto de Lucas y la repetición del término dentro del versículo favorecen mantener el sentido de virginidad. «Virgen» preserva la significación narrativa y no introduce una reinterpretación más débil.
  doctrine_reference: Affirmations; Luke 1:27 immediate context
- issue: Si ἐμνηστευμένην debe sonar como matrimonio pleno o como una unión formal previa
  english_pob_reading: betrothed
  chosen_spanish_reading: desposada
  alternative_spanish_readings:
  - casada
  - comprometida
  rationale: La evidencia lingüística apunta a un estado de desposorio formal, no a un matrimonio ya consumado. «Desposada» mantiene esa tensión y evita falsear el estatus legal-social de María.
  doctrine_reference: 'BDAG; translation philosophy #1 and #3'
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «pledged in marriage» a «betrothed» para reflejar con mayor precisión ἐμνηστευμένην. En español, esa precisión se conserva con «desposada», evitando una paráfrasis expansiva y manteniendo la distinción entre desposorio formal y matrimonio consumado. También se siguió el audit trail al mantener «virgin» como valor central de παρθένος y «house of David» como lenguaje dinástico.
  spanish_consistency_notes:
  - Se mantuvo «casa de David» para conservar el idioma bíblico dinástico y la conexión con la línea davídica.
  - Se evitó «esposo» para ἀνδρὶ porque el contexto de desposorio no exige matrimonio pleno.
  - Se usó «María» en el texto principal por ser la forma establecida en español, dejando «Mariam» solo como alternativa anotada.
  - «Virgen» se repite en ambos miembros del versículo para reflejar la repetición enfática del griego.
