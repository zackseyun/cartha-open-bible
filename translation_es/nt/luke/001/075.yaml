review_pass:
  verdict: revise
  source_alignment_summary: 'La estructura griega está bien reflejada en general: «en santidad … delante de él todos nuestros días» corresponde fielmente a ἐν ὁσιότητι … ἐνώπιον αὐτοῦ … πάσαις ταῖς ἡμέραις ἡμῶν. El punto principal es δικαιοσύνῃ: el rastro auditado inglés eligió «righteousness» y preservó «justice» solo como alternativa. En este contexto ético y vertical, emparejado con ὁσιότης, el español debe preferir «rectitud» o una equivalente que preserve mejor ese sentido ante Dios, no «justicia» como texto principal.'
  spanish_quality_summary: El borrador es claro y natural en español. Sin embargo, «santidad y justicia» suena menos preciso para este binomio y puede inclinarse a un sentido social/judicial de «justicia». «Santidad y rectitud» suena natural, digno y más alineado con el contexto. «Delante de él» y «todos nuestros días» son plenamente legibles.
  glossary_alignment: Desalineación parcial con la pauta del proyecto para δικαιοσύνη («justicia / rectitud» por contexto) y con la decisión documentada del POB inglés de mantener aquí el valor de «righteousness». En español, la mejor correspondencia contextual es «rectitud» en el texto principal, con «justicia» como nota alternativa.
  issues:
  - severity: medium
    issue: δικαιοσύνῃ está traducido como «justicia» en el texto principal.
    rationale: En Lucas 1:75, en pareja con ὁσιότης y modificado por «delante de él», el término señala rectitud/uprightness ante Dios más que justicia en sentido judicial o social. El POB inglés eligió «righteousness» y dejó «justice» como alternativa, por lo que el español principal debe reflejar esa prioridad contextual.
  - severity: low
    issue: La nota léxica invierte la prioridad documentada.
    rationale: 'El borrador pone «rectitud» como alternativa de «justicia», pero la evidencia auditada favorece lo contrario en este versículo: texto principal «rectitud», alternativa «justicia».'
  revised_spanish_text: en santidad y rectitud delante de él todos nuestros días[a].
  revised_footnotes:
  - marker: a
    text: O «justicia».
    reason: lexical_alternative
  revision_rationale: Se cambia «justicia» por «rectitud» para reflejar mejor δικαιοσύνη en este contexto no paulino, ético y vertical, emparejado con «santidad» y calificado por «delante de él». Se conserva «justicia» como alternativa léxica, en línea con la nota del POB inglés.
