translation:
  language: es
  text: en santidad y rectitud delante de él todos nuestros días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - con
  - dentro de
  lexicon: BDAG
  rationale: La preposición introduce la esfera o el modo en que se vive/serve. «En» conserva la relación gramatical y suena natural en español.
- source_word: ὁσιότητι
  english_pob_choice: holiness
  chosen_spanish: santidad
  alternatives_spanish:
  - piedad
  - devoción
  lexicon: BDAG
  rationale: ὁσιότης expresa una cualidad de consagración y pureza ante Dios. «Santidad» comunica mejor esa idea en español que «piedad», que puede sonar más subjetiva o devocional.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: BDAG
  rationale: Conjunción coordinante simple; «y» es la equivalencia directa y natural.
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió «righteousness», en español «justicia» puede comunicar mejor el valor ético y relacional del término sin perder su fuerza. Se mantiene la alternativa «rectitud» porque la expresión también puede leerse como conducta correcta ante Dios.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: BDAG
  rationale: «Delante de él» reproduce de forma idiomática el sentido de estar bajo su mirada o en su presencia, sin sonar rígidamente literal.
- source_word: πάσαις ταῖς ἡμέραις ἡμῶν
  english_pob_choice: all our days
  chosen_spanish: todos nuestros días
  alternatives_spanish:
  - todos los días de nuestra vida
  - a lo largo de todos nuestros días
  lexicon: BDAG
  rationale: La frase es idiomática para la duración de la vida. «Todos nuestros días» es fiel, breve y natural, sin añadir la palabra «vida» que no está explícita en el griego.
theological_decisions:
- issue: δικαιοσύνη en una pareja ética con ὁσιότης
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - santidad y rectitud
  rationale: El contexto describe una vida vivida ante Dios. En español, «justicia» mantiene el peso moral y relacional del término; no se debe reducir a un sentido meramente judicial. La alternativa «rectitud» sigue siendo válida, pero «justicia» conserva mejor la fuerza conceptual del binomio con «santidad».
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη → righteousness; justicia preservada como alternativa cuando el contexto ético lo favorece'
- issue: ἐνώπιον αὐτοῦ como orientación teológica de la vida
  english_pob_reading: before him
  chosen_spanish_reading: delante de él
  alternative_spanish_readings:
  - en su presencia
  - ante él
  rationale: La formulación expresa vida vivida bajo la mirada de Dios. «Delante de él» conserva la dimensión de accountability y relación personal sin sobrecargar el texto.
  doctrine_reference: Uso bíblico de ἐνώπιον como presencia evaluativa y relacional
translation_notes:
  revision_awareness: El texto coincide con la lectura auditada en inglés y no requiere cambios de sentido. La única decisión abierta es la elección española de δικαιοσύνη, donde se optó por «justicia» por su naturalidad y por mantener la fuerza ética del contexto.
  spanish_consistency_notes:
  - Se mantiene «santidad» para ὁσιότης, diferenciándolo de «justicia» para δικαιοσύνη.
  - Se conserva «delante de él» como equivalente idiomático de ἐνώπιον αὐτοῦ.
  - La nota al pie marca la alternativa léxica principal sin introducir una reinterpretación doctrinal.
