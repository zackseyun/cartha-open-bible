translation:
  language: es
  text: Y ambos eran justos delante de Dios[a], andando sin reproche[b] en todos los mandamientos y ordenanzas del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los ojos de Dios».
    reason: lexical_alternative
  - marker: b
    text: O «y ambos eran justos delante de Dios, y sin reproche en todos los mandamientos y ordenanzas del Señor».
    reason: syntactic_alternative
lexical_decisions:
- source_word: δίκαιοι
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - justos delante de Dios
  lexicon: BDAG
  rationale: En español, «justos» conserva el valor moral y de fidelidad al pacto que tiene δίκαιοι en este contexto. «Rectos» también sería posible, pero «justos» es la forma más natural y directa para describir a personas aprobadas por Dios sin reducir la idea a mera corrección legal.
- source_word: ἀμφότεροι
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos dos
  lexicon: BDAG
  rationale: El griego subraya que la afirmación vale para los dos por igual. «Ambos» es la forma más natural en español y preserva ese énfasis inclusivo.
- source_word: ἐναντίον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en la presencia de Dios
  - a los ojos de Dios
  lexicon: BDAG
  rationale: «Delante de Dios» mantiene la idea evaluativa y relacional del griego, y en español suena natural y reverente. «En la presencia de Dios» sería más explícito, mientras que «a los ojos de Dios» enfatiza más la evaluación que la proximidad.
- source_word: πορευόμενοι
  english_pob_choice: walking
  chosen_spanish: andando
  alternatives_spanish:
  - viviendo
  - conduciéndose
  lexicon: BDAG
  rationale: La metáfora de «andar» reproduce bien el uso ético de πορεύομαι sin perder naturalidad en español. «Viviendo» explicita el sentido, pero borra la imagen bíblica del caminar/andar.
- source_word: ἐν πάσαις ταῖς ἐντολαῖς
  english_pob_choice: in all the commandments
  chosen_spanish: en todos los mandamientos
  alternatives_spanish:
  - según todos los mandamientos
  - en todos los preceptos
  lexicon: BDAG
  rationale: «En todos los mandamientos» reproduce la construcción y conserva el alcance total de πάσαις. «Preceptos» es posible, pero en español puede sonar más técnico y menos inmediato.
- source_word: δικαιώμασιν
  english_pob_choice: ordinances
  chosen_spanish: estatutos
  alternatives_spanish:
  - ordenanzas
  - decretos
  lexicon: BDAG
  rationale: Para el paralelismo con «mandamientos», «estatutos» expresa bien la idea de disposiciones prescriptivas. En español bíblico es una opción clara y reconocible, sin confundirlo con «ordenanzas» en sentido eclesiástico moderno.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Dios soberano
  lexicon: BDAG
  rationale: Aquí el contexto del griego κύριος, dentro de una frase de obediencia a mandamientos y estatutos, apunta al Dios de Israel. Siguiendo el flujo del relato y la fuerza reverente del español bíblico, «Señor» comunica naturalmente esa referencia. Se conserva la distinción contextual sin forzar el nombre divino donde el texto griego usa κύριος.
- source_word: ἄμεμπτοι
  english_pob_choice: blamelessly
  chosen_spanish: sin reproche
  alternatives_spanish:
  - irreprensiblemente
  - sin culpa
  lexicon: BDAG
  rationale: El adjetivo ἄμεμπτοι expresa conducta no censurable, no necesariamente perfección sin pecado. En español, «sin reproche» comunica bien esa irreprochabilidad y evita exagerar la afirmación. Se mantiene la tensión bíblica entre integridad real y perfección absoluta no explicitada por el texto.
- source_word: ἦσαν δὲ
  english_pob_choice: And ... were
  chosen_spanish: Y ... eran
  alternatives_spanish:
  - Ahora bien, ... eran
  - Y ... estaban
  lexicon: BDAG
  rationale: «Y ... eran» reproduce el enlace narrativo suave de δέ y la descripción continua del estado de ambos. Es una solución natural en español y fiel al valor aspectual del pasaje.
theological_decisions:
- issue: Si ἄμεμπτοι implica sin pecado absoluto
  english_pob_reading: It describes blameless covenant conduct, not sinless perfection.
  chosen_spanish_reading: Describe una conducta sin reproche y fiel al pacto, no perfección absoluta sin pecado.
  alternative_spanish_readings:
  - Podría entenderse como perfección moral absoluta.
  - Podría debilitarse a simple buena reputación.
  rationale: El contexto inmediato habla de caminar en los mandamientos y estatutos del Señor; por eso la afirmación debe conservar su fuerza ética sin convertirla en una declaración doctrinal sobre impecabilidad. «Sin reproche» mantiene la irreprochabilidad y deja intacta la tensión bíblica.
  doctrine_reference: Preservar la tensión teológica; no resolver más allá de lo que el texto afirma.
translation_notes:
  revision_awareness: 'La versión sigue el consenso alto del audit trail inglés y no requiere cambios de revisión adicionales. Se conservaron las distinciones clave: δίκαιοι como «justos», ἐναντίον τοῦ θεοῦ como «delante de Dios» y ἄμεμπτοι como «sin reproche» para no suavizar la afirmación.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al contexto bíblico y a la práctica del proyecto cuando el referente es el Dios de Israel.
  - «Mandamientos» y «estatutos» conservan el paralelismo entre ἐντολαί y δικαιώματα.
  - La puntuación y el orden de la frase buscan sonar publicables en español sin perder la estructura del griego.
  - Los marcadores de nota a y b aparecen en el texto exactamente donde corresponde, sin reutilización indebida.
