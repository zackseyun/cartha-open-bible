translation:
  language: es
  text: 'Y todos los que lo oyeron lo guardaron en su corazón, diciendo: «¿Qué será entonces de este niño[a]?». Porque la mano de Yahvé[b] estaba con él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿qué será este niño?». El verbo griego es simplemente «será», pero en contexto pregunta por la identidad o el papel futuro del niño.'
    reason: lexical_alternative
  - marker: b
    text: La «mano de Yahvé» es un modismo bíblico para la acción, el favor o la guía activos de Dios.
    reason: cultural_note
lexical_decisions:
- source_word: ἔθεντο ... ἐν τῇ καρδίᾳ αὐτῶν
  english_pob_choice: laid it up in their hearts
  chosen_spanish: lo guardaron en su corazón
  alternatives_spanish:
  - lo atesoraron en su corazón
  - lo conservaron en su corazón
  - lo tuvieron presente
  lexicon: BDAG
  rationale: La expresión griega es idiomática y literalmente significa 'pusieron en su corazón'. En español, 'lo guardaron en su corazón' conserva la imagen de retenerlo deliberadamente y suena natural y digna, sin reducirla a un simple recuerdo pasajero.
- source_word: πάντες οἱ ἀκούσαντες
  english_pob_choice: all who heard it
  chosen_spanish: todos los que lo oyeron
  alternatives_spanish:
  - todos los que oyeron
  - todos los que habían oído esto
  lexicon: BDAG
  rationale: El participio señala a las personas que escucharon los hechos narrados. 'Lo oyeron' completa naturalmente el sentido en español y mantiene la referencia contextual sin añadir contenido.
- source_word: Τί ἄρα
  english_pob_choice: What then
  chosen_spanish: ¿Qué será entonces
  alternatives_spanish:
  - ¿Qué, entonces,
  - ¿Qué, pues,
  lexicon: BDAG
  rationale: ἄρα aporta matiz inferencial o consecuencial. En español, '¿Qué será entonces?' transmite esa conclusión derivada de lo ocurrido de manera fluida y natural.
- source_word: τὸ παιδίον τοῦτο
  english_pob_choice: this child
  chosen_spanish: este niño
  alternatives_spanish:
  - este niño pequeño
  - este pequeño
  lexicon: BDAG
  rationale: παιδίον designa a un niño o pequeño; aquí 'este niño' es claro y fiel, sin sobreespecificar edad ni introducir un matiz no exigido por el griego.
- source_word: ἔσται
  english_pob_choice: will ... become
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - va a ser
  lexicon: BDAG
  rationale: El griego dice simplemente 'será'. En español, '¿Qué será entonces de este niño?' comunica de forma natural la pregunta sobre su futuro o destino, sin forzar el verbo hacia una interpretación más específica.
- source_word: καὶ γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Y en efecto
  lexicon: BDAG
  rationale: La combinación introduce la razón de la pregunta. 'Porque' expresa esa relación causal de manera idiomática en español y mantiene el flujo argumental del versículo.
- source_word: χεὶρ κυρίου
  english_pob_choice: the hand of the Lord
  chosen_spanish: la mano del Señor
  alternatives_spanish:
  - la mano de Yahvé
  - la mano del Señor Dios
  lexicon: BDAG
  rationale: Se conserva la metáfora bíblica de la 'mano' para no aplanar el giro a una explicación abstracta. 'Señor' refleja el valor reverente de κύριος en este idiomismo divino, mientras que 'mano' preserva la imagen de acción/poder/presencia de Dios.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Yahvé
  - Dueño
  lexicon: BDAG
  rationale: En este sintagma idiomático, κύριος se refiere a Dios en lenguaje bíblico reverente. 'Señor' es la forma española estable y comprensible para conservar la referencia teológica del texto.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - estaba junto a él
  - lo acompañaba
  lexicon: BDAG
  rationale: La preposición con genitivo significa 'con'. La formulación 'estaba con él' reproduce de manera natural la afirmación de presencia y asistencia divina sin añadir una interpretación más específica.
theological_decisions:
- issue: Sentido de la expresión 'la mano del Señor estaba con él'
  english_pob_reading: Retain the metaphor as a statement of divine favor/power/presence without specifying more narrowly.
  chosen_spanish_reading: Conservar la metáfora como una afirmación de presencia, favor y poder divinos sin precisarla más de lo que permite el texto.
  alternative_spanish_readings:
  - el Señor lo ayudaba
  - el poder de Dios estaba sobre él
  - Dios lo favorecía
  rationale: El texto expresa participación activa de Dios en la vida del niño, pero no define si se trata de protección, capacitación, favor o una combinación de estas ideas. Mantener la metáfora respeta esa tensión teológica y el eco bíblico de la imagen.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión inglesa revisada permanece sin cambios; el texto español sigue de cerca esa lectura estable, conservando el matiz idiomático de 'guardar en el corazón' y de 'la mano del Señor' sin resolverlos interpretativamente.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος en este pasaje, por tratarse de un idiomismo divino consolidado en español y coherente con el uso reverente del término.
  - Se conserva la metáfora de la 'mano' en lugar de paraphrasearla, para respetar la imagen bíblica y la tensión teológica del original.
  - '''Este niño'' evita una sobreespecificación y corresponde al valor contextual de παιδίον.'
