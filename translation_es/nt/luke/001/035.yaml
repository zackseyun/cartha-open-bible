    reason: lexical_alternative
  - marker: b
    text: Lit. «lo que está siendo engendrado/naciendo» o «el que está por nacer». El griego τὸ γεννώμενον es literalmente «lo/el que está siendo nacido», una forma que en contexto se refiere al niño.
    reason: lexical_alternative
