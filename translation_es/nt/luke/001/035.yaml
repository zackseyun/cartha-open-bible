translation:
  language: es
  text: 'Y el ángel le respondió: «El Espíritu Santo vendrá sobre ti, y el poder del Altísimo te cubrirá[a]; por eso también el santo ser que ha de nacer[b] será llamado Hijo de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te envolverá con su sombra». El verbo griego ἐπισκιάζω expresa la imagen de cubrir u oscurecer con sombra; se preserva la metáfora reverente sin añadir explicaciones biológicas.
    reason: lexical_alternative
  - marker: b
    text: Lit. «lo que está siendo engendrado/naciendo» o «el que está por nacer». El griego τὸ γεννώμενον es literalmente «lo/el que está siendo nacido», una forma que en contexto se refiere al niño.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: le respondió
  alternatives_spanish:
  - respondió
  - le contestó
  lexicon: BDAG
  rationale: El participio aoristo de ἀποκρίνομαι funciona idiomáticamente como acción de respuesta. En español, «le respondió» conserva la fuerza responsiva y suena natural en el relato.
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En el contexto lucano de la anunciación se trata de un ser celestial, por lo que «ángel» es la equivalencia directa y adecuada.
- source_word: Πνεῦμα ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - Espíritu Santo
  - el espíritu santo
  lexicon: BDAG
  rationale: La expresión se refiere al Espíritu divino, no a una cualidad impersonal. En español, el artículo definido y la mayúscula reflejan esa referencia personal y reverente.
- source_word: ἐπελεύσεται ἐπὶ σέ
  english_pob_choice: will come upon you
  chosen_spanish: vendrá sobre ti
  alternatives_spanish:
  - vendrá a ti
  - vendrá encima de ti
  lexicon: BDAG
  rationale: «Vendrá sobre ti» conserva la imagen de irrupción o acercamiento poderoso del griego. Evita añadir explicaciones ajenas al texto.
- source_word: δύναμις Ὑψίστου
  english_pob_choice: the power of the Most High
  chosen_spanish: el poder del Altísimo
  alternatives_spanish:
  - el poder del Dios Altísimo
  - el poder del Altísimo Dios
  lexicon: BDAG
  rationale: «Altísimo» mantiene el título divino del genitivo Ὑψίστου. «El poder del Altísimo» reproduce con claridad la relación posesiva sin forzar la estructura.
- source_word: ἐπισκιάσει
  english_pob_choice: will overshadow you
  chosen_spanish: te cubrirá con su sombra
  alternatives_spanish:
  - te eclipsará
  - te envolverá
  lexicon: BDAG
  rationale: La imagen griega de ἐπισκιάζω puede expresarse en español como cobertura sombreadora. «Te cubrirá con su sombra» conserva el sentido imagístico y evita lenguaje sexualizado o mecanicista.
- source_word: διὸ καὶ
  english_pob_choice: therefore also
  chosen_spanish: por eso también
  alternatives_spanish:
  - por tanto también
  - así que también
  lexicon: BDAG
  rationale: La combinación expresa consecuencia con matiz aditivo. «Por eso también» comunica con naturalidad el enlace inferencial del griego.
- source_word: τὸ γεννώμενον
  english_pob_choice: the one being born
  chosen_spanish: el santo que nacerá
  alternatives_spanish:
  - el que está siendo engendrado
  - lo que nace
  lexicon: BDAG
  rationale: El participio presente pasivo neutro puede referirse al niño en vista. En español, «que nacerá» resulta claro y fiel al referente futuro; unido a «el santo» preserva el sentido de la frase sin sobrecargarla con una literalidad poco natural.
- source_word: ἅγιον
  english_pob_choice: the holy one
  chosen_spanish: el santo
  alternatives_spanish:
  - el santo nacido
  - el que es santo
  lexicon: BDAG
  rationale: Aquí ἅγιον funciona sustantivamente y describe al nacido. «El santo» recoge esa función; el artículo y el sustantivo permiten leerlo como designación del niño.
- source_word: κληθήσεται
  english_pob_choice: will be called
  chosen_spanish: será llamado
  alternatives_spanish:
  - será nombrado
  - será conocido como
  lexicon: BDAG
  rationale: El futuro pasivo de καλέω se vierte con la fórmula bíblica tradicional y clara «será llamado», que conserva la pasividad y el valor nominativo/identificativo.
- source_word: υἱὸς θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: Hijo de Dios
  alternatives_spanish:
  - el Hijo de Dios
  - un hijo de Dios
  lexicon: BDAG
  rationale: Aunque el griego carece de artículo antes de υἱός, en este contexto la expresión es titular y cristológica. En español, puede aparecer con o sin artículo; se mantiene sin artículo en la frase para seguir de cerca la forma griega, con la comprensión de título en el sentido contextual.
theological_decisions:
- issue: Referencia personal y divina de Πνεῦμα ἅγιον
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - espíritu santo
  rationale: El contexto presenta al Espíritu de Dios como agente divino de la concepción de Jesús. La traducción debe conservar esa referencia personal y no reducirla a una fuerza impersonal.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD)'
- issue: Valor cristológico de υἱὸς θεοῦ sin artículo griego
  english_pob_reading: the Son of God
  chosen_spanish_reading: Hijo de Dios
  alternative_spanish_readings:
  - el Hijo de Dios
  - un hijo de Dios
  rationale: El griego anartro no obliga a indefinición. En este contexto de anuncio, la frase funciona como título cristológico; en español, «Hijo de Dios» mantiene esa lectura sin añadir indebidamente artículo donde el griego no lo tiene.
  doctrine_reference: 'Affirmations: Apostles'' Creed; Nicene Creed (381 AD); Definition of Chalcedon (451 AD)'
- issue: Lenguaje reverente de la acción divina
  english_pob_reading: will overshadow you
  chosen_spanish_reading: te cubrirá con su sombra
  alternative_spanish_readings:
  - te cubrirá
  - te envolverá
  rationale: La metáfora bíblica expresa presencia y acción divina sin describir el acto en términos biológicos o sexualizados. «Te cubrirá con su sombra» conserva esa reserva teológica.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido y las decisiones del audit trail inglés sin depender mecánicamente de su redacción. Se respeta la tensión lexical de ἐπισκιάζω mediante una imagen sombreadora en español, y se mantiene el valor titular de «Hijo de Dios» sin forzar indefinición ni añadir artículo donde el griego no lo tiene. No se registraron revisiones previas que obligaran cambios.
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» con mayúsculas por referencia divina personal, de manera consistente con el contexto.
  - Se conserva «Altísimo» como título divino para Ὑψίστου.
  - «Hijo de Dios» se deja sin artículo en el cuerpo, siguiendo de cerca la forma griega y manteniendo la lectura titulada en el contexto.
  - La metáfora de ἐπισκιάζω se vierte con una imagen de sombra para evitar una paráfrasis explicativa.
  - La puntuación y comillas siguen el uso español estándar para discurso directo bíblico.
