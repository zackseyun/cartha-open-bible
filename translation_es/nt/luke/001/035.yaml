revisions:
- from: 'Y el ángel le respondió[a]: «El Espíritu Santo vendrá sobre ti, y el poder del Altísimo te cubrirá con su sombra[b]; por eso también el santo que nacerá será llamado Hijo de Dios».'
  to: 'Y el ángel le respondió: «El Espíritu Santo vendrá sobre ti, y el poder del Altísimo te cubrirá[a]; por eso también el santo ser que ha de nacer[b] será llamado Hijo de Dios».'
  rationale: Se revisa para acercar ἐπισκιάσει a una expresión española más compacta y fiel, eliminar una nota innecesaria, y resolver τὸ γεννώμενον ἅγιον con una formulación más natural en español mientras se preserva en nota la alternativa literal documentada por el POB inglés.
