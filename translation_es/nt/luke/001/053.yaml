  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: conserva el contraste concreto entre «los hambrientos» y «los ricos», mantiene la estructura de reversión y traduce ἀγαθῶν de manera aceptable. Sin embargo, «los ha despedido» para ἐξαπέστειλεν debilita la imagen de «enviar lejos/mandar de vuelta» y en español puede sugerir despedir de un empleo o una audiencia. Además, la nota al pie está anclada en «bienes», pero la alternativa documentada corresponde a «vacíos».'
  spanish_quality_summary: El español es claro y digno, pero la sintaxis mejora si se elimina la coma antes de «y» y se usa una formulación más natural para la segunda cola. «Ha colmado de bienes a los hambrientos» suena bien; «a los ricos los ha despedido vacíos» es comprensible, pero menos idiomático y menos preciso que «ha enviado lejos a los ricos con las manos vacías» como nota alternativa, mientras que el texto principal puede decir «ha enviado vacíos a los ricos».
  glossary_alignment: No hay términos del glosario principal en juego salvo la fidelidad a las decisiones léxicas auditadas. «Los hambrientos», «de bienes» y «los ricos» se alinean bien con el expediente. La principal desalineación es que la nota de alternativa léxica debe acompañar «vacíos», no «bienes», porque la alternativa inglesa corresponde a κενούς/«empty-handed».
  issues:
  - severity: medium
    issue: «despedido» no es la mejor opción para ἐξαπέστειλεν
    rationale: El griego expresa enviar fuera/alejar. «Despedir» en español puede sonar a cesar de un trabajo o concluir una reunión; «enviar» o «mandar» preserva mejor el matiz básico sin implicaciones ajenas.
  - severity: medium
    issue: La nota al pie está anclada en el lugar equivocado
    rationale: La alternativa inglesa «empty-handed» explica κενούς, no ἀγαθῶν. Por eso el marcador debe ir junto a «vacíos», no junto a «bienes».
  - severity: low
    issue: Puntuación algo calcada
    rationale: La coma antes de «y» no es necesaria en español en esta coordinación simple y suena menos natural.
