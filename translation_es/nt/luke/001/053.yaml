  rationale: Se mantiene lo que el borrador hace bien («ha colmado», «de bienes», «los hambrientos», «los ricos»), pero se corrige ἐξαπέστειλεν con «ha enviado» por mayor precisión semántica y naturalidad. Se reubica la nota al pie para que explique correctamente «vacíos», que es donde corresponde la alternativa «con las manos vacías».
