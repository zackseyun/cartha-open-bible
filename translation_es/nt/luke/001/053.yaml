translation:
  language: es
  text: Ha colmado de bienes a los hambrientos y ha enviado vacíos[a] a los ricos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con las manos vacías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πεινῶντας
  english_pob_choice: the hungry
  chosen_spanish: los hambrientos
  alternatives_spanish:
  - los que tienen hambre
  - los hambrientos/as
  lexicon: BDAG
  rationale: El participio presente funciona sustantivamente. «Los hambrientos» conserva la descripción de clase de personas y suena natural en español, sin intensificar indebidamente a «los que tienen hambre» ni convertirlo en una frase más explicativa.
- source_word: ἐνέπλησεν
  english_pob_choice: has filled
  chosen_spanish: ha colmado
  alternatives_spanish:
  - ha llenado
  - ha saciado
  lexicon: BDAG
  rationale: El verbo expresa llenar completamente. «Ha colmado» comunica plenitud y encaja bien con el paralelo de reversión; «ha saciado» introduce explícitamente la idea de satisfacer el hambre, más interpretativa que el griego.
- source_word: ἀγαθῶν
  english_pob_choice: with good things
  chosen_spanish: de bienes
  alternatives_spanish:
  - de cosas buenas
  - con cosas buenas
  lexicon: BDAG
  rationale: El genitivo tras el verbo de llenar indica el contenido. «De bienes» es una forma idiomática y suficientemente amplia en español; preserva la positividad del término sin agregar la noción de regalos que no está explícita en el adjetivo.
- source_word: πλουτοῦντας
  english_pob_choice: the rich
  chosen_spanish: los ricos
  alternatives_spanish:
  - los que son ricos
  - los acaudalados
  lexicon: BDAG
  rationale: El participio presente se usa sustantivamente. «Los ricos» es directo, natural y mantiene el contraste social concreto con «los hambrientos».
- source_word: ἐξαπέστειλεν
  english_pob_choice: sent away
  chosen_spanish: los ha despedido
  alternatives_spanish:
  - los ha enviado lejos
  - los ha mandado fuera
  lexicon: BDAG
  rationale: El verbo compuesto comunica enviar fuera o lejos. «Despedir» en español puede significar despedir a alguien y dejarlo ir, conservando la idea de alejamiento sin añadir una escena formal de audiencia; el sujeto y objeto se aclaran por el contexto inmediato.
- source_word: κενούς
  english_pob_choice: empty
  chosen_spanish: vacíos
  alternatives_spanish:
  - sin nada
  - con las manos vacías
  lexicon: BDAG
  rationale: El adjetivo predicativo describe su condición al ser enviados. «Vacíos» es literal y breve; «con las manos vacías» es una ampliación imagética plausible, pero no explícita en el griego.
theological_decisions:
- issue: Reversión socio-teológica en el cántico de María
  english_pob_reading: Retain the concrete contrast 'the hungry' / 'the rich' without spiritualizing either term.
  chosen_spanish_reading: Mantener el contraste concreto «los hambrientos» / «los ricos» sin espiritualizar ninguno de los dos términos.
  alternative_spanish_readings:
  - interpretar «los hambrientos» como los espiritualmente necesitados
  - interpretar «los ricos» como los autosuficientes o soberbios
  rationale: Lucas presenta una inversión divina en términos concretos y sociales. Aunque la lectura canónica permita aplicaciones espirituales, el griego nombra a personas hambrientas y ricas; la traducción debe preservar esa tensión y no resolverla con una paráfrasis más estrecha.
  doctrine_reference: Primacía del idioma original; preservar la tensión teológica sin domesticarla.
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y conservado sin cambios en la última pasada; no hay revisiones aplicadas. La elección española mantiene ese mismo estado de alta concordancia y evita introducir una espiritualización o intensificación no respaldada por el griego.
  spanish_consistency_notes:
  - 'Se mantiene la reversión concreta de sujetos: hambrientos / ricos.'
  - Se evita «SEÑOR» o equivalente porque no hay aquí el Tetragrámaton; el versículo no requiere decisión sobre YHWH.
  - «Colmado de bienes» preserva el contenido de ἀγαθῶν con una formulación natural en español.
  - La nota al pie conserva la alternativa inglesa de «empty-handed» mediante una equivalencia idiomática española.
