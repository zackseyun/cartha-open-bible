translation:
  language: es
  text: Y habrá gozo y exultación para ti, y muchos se alegrarán por[a] su nacimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a causa de su nacimiento». La construcción griega con ἐπὶ + dativo puede indicar la ocasión o la base del regocijo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσται
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - será
  lexicon: BDAG
  rationale: El futuro impersonal introduce un estado o acontecimiento que vendrá a existir. En español, «habrá» suena natural y conserva la fuerza prospectiva sin forzar un calco de la estructura inglesa.
- source_word: χαρά
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - júbilo
  lexicon: BDAG
  rationale: «Gozo» comunica bien la alegría positiva y sostenida del contexto bíblico, con registro digno y común en español eclesial. Mantiene cercanía semántica con χαρά sin reducirlo a mera emoción pasajera.
- source_word: σοι
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: El dativo expresa la persona para quien se experimenta el gozo. «Para ti» es la solución más natural en español y conserva el valor beneficiario del griego.
- source_word: ἀγαλλίασις
  english_pob_choice: exultation
  chosen_spanish: exultación
  alternatives_spanish:
  - regocijo
  - júbilo
  lexicon: BDAG
  rationale: Se mantiene la distinción frente a χαρά. «Exultación» preserva la intensidad celebrativa y el tono elevado del sustantivo griego.
- source_word: ἐπὶ τῇ γενέσει αὐτοῦ
  english_pob_choice: at his birth
  chosen_spanish: por su nacimiento
  alternatives_spanish:
  - a causa de su nacimiento
  - en su nacimiento
  - a la ocasión de su nacimiento
  lexicon: BDAG
  rationale: La frase griega con ἐπί + dativo puede señalar ocasión o base del regocijo. En español, «por su nacimiento» deja abierta esa relación causal/ocasional y reproduce bien la amplitud semántica indicada por la auditoría inglesa.
- source_word: χαρήσονται
  english_pob_choice: will rejoice
  chosen_spanish: se alegrarán
  alternatives_spanish:
  - se regocijarán
  - se gozarán
  lexicon: BDAG
  rationale: El futuro de χαίρω se expresa de forma natural con «se alegrarán». Conserva el vínculo verbal con χαρά y suena idiomático en español sin perder la idea de regocijo colectivo.
translation_notes:
  revision_awareness: La redacción sigue el alto acuerdo del paquete de fuente y la auditoría inglesa. Se conservó la distinción entre χαρά y ἀγαλλίασις, y se reflejó la ambigüedad de ἐπὶ τῇ γενέσει αὐτοῦ mediante una nota alternativa, sin sobreinterpretar la relación causal/ocasional.
  spanish_consistency_notes:
  - Se prefirió «gozo» para χαρά y «exultación» para ἀγαλλίασις a fin de mantener dos matices distintos.
  - «Por su nacimiento» refleja la amplitud de ἐπὶ τῇ γενέσει αὐτοῦ sin cerrar indebidamente la frase a una sola lectura.
  - Se evitó el uso de «Cristo» u otra terminología no presente en el versículo.
  - La puntuación española mantiene la cadencia del paralelismo y el valor de anuncio profético.
