translation:
  language: es
  text: Y reinará sobre la casa de Jacob por los siglos[a], y de su reino no habrá fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para siempre» / «por las edades». El giro griego εἰς τοὺς αἰῶνας expresa duración sin fin.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεύσει
  english_pob_choice: will reign
  chosen_spanish: reinará
  alternatives_spanish:
  - gobernará como rey
  - ejercerá su reinado
  lexicon: BDAG
  rationale: βασιλεύω expresa ejercer soberanía real. «Reinará» comunica de forma natural y fiel la acción regia sin añadir explicaciones que el griego no exige.
- source_word: ἐπὶ τὸν οἶκον Ἰακὼβ
  english_pob_choice: over the house of Jacob
  chosen_spanish: sobre la casa de Jacob
  alternatives_spanish:
  - sobre la familia de Jacob
  - sobre la casa de Israel
  lexicon: BDAG
  rationale: «Sobre» conserva el valor de dominion de ἐπί con acusativo, y «casa de Jacob» mantiene la expresión pactual/corporativa del texto sin expandirla interpretativamente.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos[a]
  alternatives_spanish:
  - para siempre
  - por las edades
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: El idiomático griego puede verterse como duración sin fin. «Por los siglos» preserva la imagen plural de αἰῶνας y deja visible la alternativa léxica, mientras el contexto afirma la duración indefinida.
- source_word: τῆς βασιλείας αὐτοῦ
  english_pob_choice: of his kingdom
  chosen_spanish: de su reino
  alternatives_spanish:
  - de su reinado
  - de su soberanía
  lexicon: BDAG
  rationale: «Reino» es el equivalente más natural de βασιλεία en este contexto profético y encaja con la idea de continuidad y dominio sin fin.
- source_word: οὐκ ἔσται τέλος
  english_pob_choice: there will be no end
  chosen_spanish: no habrá fin
  alternatives_spanish:
  - no tendrá fin
  - no llegará a su término
  lexicon: BDAG
  rationale: La construcción existencial se expresa con naturalidad en español como «no habrá fin», manteniendo la negación enfática y el futuro del original.
theological_decisions:
- issue: Alcance de «la casa de Jacob»
  english_pob_reading: Retained as 'the house of Jacob' without expanding it to 'Israel' or 'God's people.'
  chosen_spanish_reading: Se conserva «la casa de Jacob» sin ampliarlo a «Israel» ni a «pueblo de Dios».
  alternative_spanish_readings:
  - la casa de Israel
  - el pueblo de Dios
  rationale: El texto angélico usa una designación pactal concreta; traducirla literalmente preserva la tensión y evita resolver en la traducción una cuestión de alcance que el original no explicita.
  doctrine_reference: Primacía del texto original y preservación de la tensión teológica.
- issue: Duración del reinado y del reino
  english_pob_reading: Rendered εἰς τοὺς αἰῶνας as 'forever' and τῆς βασιλείας αὐτοῦ οὐκ ἔσται τέλος as 'of his kingdom there will be no end,' expressing an unending reign and kingdom.
  chosen_spanish_reading: «Por los siglos» y «no habrá fin» expresan un reinado y un reino sin término.
  alternative_spanish_readings:
  - para siempre
  - por las edades
  - por los siglos de los siglos
  rationale: La doble formulación del versículo refuerza la idea de perpetuidad. En español, la combinación elegida mantiene el sentido sin volverlo arcaizante ni perder la fuerza escatológica.
  doctrine_reference: Lectura clara y moderna, sin suavizar la afirmación de eternidad.
translation_notes:
  revision_awareness: El texto sigue de cerca el contexto auditado en inglés; no hay revisiones previas aplicadas en el expediente, y la redacción española conserva la misma estructura de dos cláusulas con la misma fuerza semántica.
  spanish_consistency_notes:
  - Se mantiene «casa de Jacob» como expresión pactual estable.
  - «Reinará» conserva el matiz real de βασιλεύσει sin sobreexplicación.
  - «Reino» traduce βασιλεία con el valor más natural en este contexto.
  - La nota de pie refleja la alternativa lexical del idiomatismo griego sin interferir con la fluidez del texto principal.
