translation:
  language: es
  text: Y sucedió que, cuando se cumplieron los días de su servicio[b], se fue a su casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a su hogar». El griego puede referirse a la casa misma o, de manera más amplia, al hogar o la casa de su familia.
    reason: lexical_alternative
  - marker: b
    text: «Servicio» se refiere al deber sacerdotal asignado a Zacarías en el templo.
    reason: cultural_note
lexical_decisions:
- source_word: καὶ ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: BDAG
  rationale: La fórmula narrativa de Lucas se conserva con una expresión natural en español. «Y sucedió» reproduce el valor discursivo de la secuencia sin caer en un arcaísmo pesado.
- source_word: ὡς
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - as
  - al
  lexicon: BDAG
  rationale: Aquí introduce una cláusula temporal; «cuando» es la equivalencia más clara y natural en español.
- source_word: ἐπλήσθησαν
  english_pob_choice: were completed
  chosen_spanish: se cumplieron
  alternatives_spanish:
  - se completaron
  - se llenaron
  lexicon: BDAG
  rationale: En este contexto los días asignados llegan a su término. «Se cumplieron» comunica bien la idea de que el período quedó completo y terminado.
- source_word: λειτουργίας
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - ministerio
  - servicio sacerdotal
  - servicio litúrgico
  lexicon: BDAG
  rationale: En el contexto de Lucas 1 se trata del deber sacerdotal de Zacarías en el templo. «Servicio» mantiene la concisión del texto base; el matiz cultual queda señalado en la nota.
- source_word: ἀπῆλθεν
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: BDAG
  rationale: Verbo de movimiento simple. «Se fue» es idiomático en español y no añade un matiz más formal del que exige el griego.
- source_word: εἰς τὸν οἶκον αὐτοῦ
  english_pob_choice: to his home
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su casa/hogar
  lexicon: BDAG
  rationale: οἶκος puede referirse a la casa física o al hogar/entorno doméstico. «A su casa» preserva la ambigüedad posible del griego y suena natural en español.
theological_decisions:
- issue: Naturaleza de λειτουργία en el marco sacerdotal
  english_pob_reading: Service refers to Zechariah's appointed temple duty as a priest.
  chosen_spanish_reading: servicio designa el deber sacerdotal asignado a Zacarías en el templo.
  alternative_spanish_readings:
  - ministerio sacerdotal
  - servicio litúrgico
  rationale: No se debe diluir el sentido cultual del término. «Servicio» en el texto principal es breve y fiel, mientras la nota aclara explícitamente su referencia al deber sacerdotal.
  doctrine_reference: Lucas 1:8-9; función sacerdotal del templo
- issue: Sentido de οἶκος
  english_pob_reading: The Greek can refer to the house itself or, more broadly, his home/household.
  chosen_spanish_reading: puede referirse a la casa misma o, de manera más amplia, al hogar/la casa de su familia.
  alternative_spanish_readings:
  - a su hogar
  - a su casa
  rationale: La ambigüedad del griego debe permanecer visible. En el texto principal se eligió «casa» por naturalidad, y la nota conserva la alternativa semántica.
  doctrine_reference: Uso léxico de οἶκος en el NT
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado revisado más reciente: no se documentan cambios aplicados y la evaluación de revisión indica que no hacía falta modificar el contenido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto cuando corresponda al nombre divino; este versículo no contiene una referencia directa.
  - Se usa «servicio» para λειτουργία por fidelidad contextual, con aclaración en nota para evitar la pérdida del matiz sacerdotal.
  - Se conserva la ambigüedad de οἶκος mediante la nota, mientras el texto principal opta por la forma española más natural.
  - El registro es formal y narrativo, adecuado para una Biblia pública moderna en español.
