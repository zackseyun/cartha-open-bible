base_translation:
  language: en
  yaml_path: translation/nt/luke/001/005.yaml
  text: In the days of Herod[a], king of Judea, there was a priest named Zechariah, from the division of Abijah; and he had a wife from the daughters of Aaron[b], and her name was Elizabeth.
  footnotes:
  - marker: a
    text: Or 'from the descendants of Aaron.' The Greek reads more literally, 'from the daughters of Aaron,' an idiom for priestly lineage.
    reason: lexical_alternative
  - marker: b
    text: '''Division of Abijah'' refers to one of the priestly service groups established for temple ministry.'
    reason: cultural_note
