translation:
  language: es
  text: En los días[a] de Herodes, rey de Judea, había un sacerdote llamado Zacarías, de la división de Abías; y tenía una esposa de entre las hijas de Aarón[b], y su nombre era Elisabet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en tiempos de Herodes'. La expresión griega es una fórmula temporal narrativa; el texto principal conserva la forma más directa.
    reason: alternative_reading
  - marker: b
    text: O 'de los descendientes de Aarón'. El griego dice más literalmente 'de las hijas de Aarón', una expresión idiomática para indicar linaje sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο
  english_pob_choice: there was
  chosen_spanish: había
  alternatives_spanish:
  - hubo
  - aconteció
  lexicon: BDAG
  rationale: En este inicio narrativo, Ἐγένετο introduce a un personaje y una situación. En español, 'había' expresa de modo natural la introducción existencial sin cargar el verso con un calco poco idiomático como 'aconteció', y mantiene el valor introductorio que la POB inglesa dio con 'there was'.
- source_word: ἐν ταῖς ἡμέραις
  english_pob_choice: In the days of
  chosen_spanish: En los días de
  alternatives_spanish:
  - Durante los días de
  lexicon: BDAG
  rationale: Es un modismo temporal común y la forma española 'En los días de' conserva la estructura y el tono histórico del griego con naturalidad.
- source_word: Ἡρῴδου βασιλέως τῆς Ἰουδαίας
  english_pob_choice: Herod, king of Judea
  chosen_spanish: Herodes, rey de Judea
  alternatives_spanish:
  - Herodes, el rey de Judea
  - Herodes, rey de la Judea
  lexicon: BDAG
  rationale: '''Judea'' corresponde con precisión a Ἰουδαία en este contexto histórico. Mantengo la apposición ''rey de Judea'' como en el inglés auditado, sin transformar el lugar en una perífrasis más amplia.'
- source_word: ἱερεύς τις
  english_pob_choice: a priest
  chosen_spanish: un sacerdote
  alternatives_spanish:
  - un cierto sacerdote
  - un sacerdote cualquiera
  lexicon: BDAG
  rationale: τις introduce un personaje nuevo de manera indefinida. En español, 'un sacerdote' comunica esa indefinición de forma natural; 'un cierto sacerdote' sería más literal pero más pesado.
- source_word: ὀνόματι Ζαχαρίας
  english_pob_choice: named Zechariah
  chosen_spanish: llamado Zacarías
  alternatives_spanish:
  - de nombre Zacarías
  - nombrado Zacarías
  lexicon: BDAG
  rationale: La construcción dativa con ὀνόματι es idiomática para nombrar. 'Llamado Zacarías' es una equivalencia fluida y fiel. Se usa la forma castellana tradicional del nombre, Zacarías.
- source_word: ἐξ ἐφημερίας Ἀβιά
  english_pob_choice: from the division of Abijah
  chosen_spanish: de la división de Abías
  alternatives_spanish:
  - de la clase de Abías
  - de la orden de Abías
  lexicon: BDAG
  rationale: ἐφημερία designa una división o turno de servicio sacerdotal. 'División' refleja bien el sentido institucional y coincide con la decisión inglesa auditable. 'Abías' conserva el nombre propio bíblico en forma española.
- source_word: γυνὴ αὐτῷ
  english_pob_choice: He had a wife
  chosen_spanish: tenía una esposa
  alternatives_spanish:
  - tenía mujer
  - y una esposa le pertenecía
  lexicon: BDAG
  rationale: El dativo αὐτῷ expresa posesión relacional. 'Tenía una esposa' es la manera más directa y natural en español de reproducir ese valor sin forzar una construcción extraña.
- source_word: ἐκ τῶν θυγατέρων Ἀαρών
  english_pob_choice: from the daughters of Aaron
  chosen_spanish: de las hijas de Aarón
  alternatives_spanish:
  - de entre las hijas de Aarón
  - de los descendientes de Aarón
  lexicon: BDAG
  rationale: La POB inglesa conserva la expresión concreta 'daughters of Aaron' y nota su valor idiomático para linaje sacerdotal. En español, 'hijas de Aarón' mantiene esa concreción y la posible tensión genealógica, sin sustituirla por una paráfrasis más interpretativa.
- source_word: τὸ ὄνομα αὐτῆς Ἐλισάβετ
  english_pob_choice: her name was Elizabeth
  chosen_spanish: su nombre era Elisabet
  alternatives_spanish:
  - y su nombre era Elisabet
  - se llamaba Elisabet
  lexicon: BDAG
  rationale: La fórmula nominativa se vierte con una estructura simple y clara en español. Se usa 'Elisabet' como forma bíblica corriente en español; 'su nombre era' reproduce el valor de la construcción griega sin añadir énfasis innecesario.
- source_word: Ζαχαρίας / Ἐλισάβετ / Ἀβιά / Ἀαρών
  english_pob_choice: Zechariah / Elizabeth / Abijah / Aaron
  chosen_spanish: Zacarías / Elisabet / Abías / Aarón
  alternatives_spanish:
  - Zacarías / Isabel / Abías / Aarón
  lexicon: standard transliteration conventions
  rationale: Los nombres propios se adaptan a la forma bíblica estándar en español. 'Elisabet' evita la modernización hacia 'Isabel', que podría borrar la conexión textual con el nombre griego Ἐλισάβετ. 'Abías' y 'Aarón' preservan la tradición bíblica hispana.
theological_decisions:
- issue: Linaje sacerdotal de Elisabet expresado con 'hijas de Aarón'
  english_pob_reading: from the daughters of Aaron
  chosen_spanish_reading: de las hijas de Aarón
  alternative_spanish_readings:
  - de los descendientes de Aarón
  - de la familia de Aarón
  rationale: El griego usa una expresión concreta y algo idiomática. La POB inglesa decidió conservarla en el texto principal y explicar que remite al linaje sacerdotal. En español, 'hijas de Aarón' conserva esa literalidad y deja visible la tensión semántica, mientras que 'descendientes' explicaría el sentido pero ocultaría la forma concreta del original.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final inglesa, especialmente el encadenamiento de una sola oración con punto y coma y la explicitación de la relación posesiva en καὶ γυνὴ αὐτῷ. Se evitó una traducción mecánica desde el inglés: el español usa ''había'' para la apertura narrativa, ''tenía una esposa'' para el dativo posesivo, y mantiene la expresión concreta ''hijas de Aarón'' con nota para no borrar su valor idiomático.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como terminología general del proyecto, pero este versículo no contiene el nombre divino.
  - 'Los nombres propios se dieron en formas españolas bíblicas usuales: Zacarías, Elisabet, Abías, Aarón.'
  - '''División'' se usa para ἐφημερία por coherencia con el valor de turno/grupo sacerdotal documentado en la POB inglesa.'
  - No se introdujo 'Cristo', 'SEÑOR' ni otra terminología no presente en el versículo.
