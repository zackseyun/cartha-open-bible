    text: O 'en tiempos de Herodes'. La expresión griega es una fórmula temporal narrativa; el texto principal conserva la forma más directa.
    reason: alternative_reading
  - marker: b
    text: O 'de los descendientes de Aarón'. El griego dice más literalmente 'de las hijas de Aarón', una expresión idiomática para indicar linaje sacerdotal.
    reason: lexical_alternative
  revision_rationale: La revisión corrige la ubicación de los marcadores de nota para que correspondan exactamente a las expresiones explicadas y mejora levemente la naturalidad española con 'de entre las hijas de Aarón' sin apartarse del sentido ni de la decisión léxica auditada.
