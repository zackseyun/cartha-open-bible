  rationale: La revisión corrige la ubicación de los marcadores de nota para que correspondan exactamente a las expresiones explicadas y mejora levemente la naturalidad española con 'de entre las hijas de Aarón' sin apartarse del sentido ni de la decisión léxica auditada.
