  glossary_alignment: No hay conflicto con la terminología del proyecto. «Espíritu Santo» es correcto para πνεύματος ἁγίου en este contexto. No aparecen términos sensibles como Yahvé o Mesías. La nota léxica para ἀσπασμός se preserva adecuadamente con «salutación».
