translation:
  language: es
  text: Y aconteció que[a], cuando Elisabet oyó el saludo de María, el bebé saltó en su vientre, y Elisabet quedó llena del Espíritu Santo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salutación».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: y aconteció
  alternatives_spanish:
  - y sucedió
  - y ocurrió
  lexicon: BDAG
  rationale: La fórmula narrativa de Lucas se expresa con una construcción natural en español. «Aconteció» conserva el valor discursivo de inicio de episodio sin sonar tan moderno como «sucedió» ni tan técnico como un calco.
- source_word: ὡς
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al
  - mientras
  lexicon: BDAG
  rationale: En esta construcción temporal, «cuando» comunica con claridad la secuencia inmediata entre oír y la reacción del niño, siguiendo el valor temporal que también reflejó la traducción inglesa auditada.
- source_word: ἀσπασμός
  english_pob_choice: greeting
  chosen_spanish: saludo
  alternatives_spanish:
  - salutación
  - greeting
  lexicon: BDAG
  rationale: «Saludo» es el equivalente más natural en español para la palabra hablada de María. «Salutación» es posible pero más formal y menos usual; se evita «salutación» salvo necesidad estilística.
- source_word: Μαρίας
  english_pob_choice: Mary’s
  chosen_spanish: de María
  alternatives_spanish:
  - de María
  - mariano
  lexicon: BDAG
  rationale: 'El genitivo se reproduce de forma directa y transparente: «el saludo de María». No se añade posesión inglesa ni se altera el referente personal.'
- source_word: ἐσκίρτησεν
  english_pob_choice: leaped
  chosen_spanish: saltó
  alternatives_spanish:
  - brincó
  - se estremeció
  lexicon: BDAG
  rationale: «Saltó» transmite el movimiento súbito y vivo del verbo mejor que una opción más débil como «se estremeció». En español es natural para una reacción corporal repentina en narrativa bíblica.
- source_word: βρέφος
  english_pob_choice: baby
  chosen_spanish: bebé
  alternatives_spanish:
  - niño
  - infante
  lexicon: BDAG
  rationale: En este contexto prenatal, «bebé» es la forma más natural y precisa para el español contemporáneo. «Infante» suena más técnico; «niño» es más amplio y menos específico.
- source_word: κοιλία
  english_pob_choice: womb
  chosen_spanish: vientre
  alternatives_spanish:
  - seno materno
  - útero
  lexicon: BDAG
  rationale: Aunque «vientre» puede ser más amplio que «útero», en español bíblico es claro, digno y común para el contexto de embarazo. Se evita «útero» por ser demasiado técnico y «vientre» mantiene la naturalidad narrativa.
- source_word: ἐπλήσθη
  english_pob_choice: was filled
  chosen_spanish: fue llena
  alternatives_spanish:
  - quedó llena
  - se llenó
  lexicon: BDAG
  rationale: 'Se conserva el pasivo y la idea de acción recibida: Elisabet «fue llena». La forma femenina concuerda con el sujeto explícito y refleja la lectura narrativa de la pasiva.'
- source_word: πνεύματος ἁγίου
  english_pob_choice: the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - del Espíritu Santo
  - de un espíritu santo
  lexicon: BDAG
  rationale: En Lucas-Hechos, la expresión refiere al Espíritu divino personal. En español, la forma establecida y más natural para ese referente es «Espíritu Santo»; el artículo no se traduce de manera mecánica porque el uso nominal español lo integra.
theological_decisions:
- issue: Referente de πνεύματος ἁγίου
  english_pob_reading: the Holy Spirit as the divine Spirit
  chosen_spanish_reading: el Espíritu Santo como el Espíritu divino
  alternative_spanish_readings:
  - un espíritu santo
  - espíritu santo
  rationale: El contexto de Lucas 1 y el patrón de Lucas-Hechos indican una referencia personal y divina, no a un espíritu genérico. El español «Espíritu Santo» comunica esa referencia de manera idiomática sin introducir material doctrinal ajeno al texto.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Valor de βρέφος aplicado al niño no nacido
  english_pob_reading: baby
  chosen_spanish_reading: bebé
  alternative_spanish_readings:
  - niño
  - infante
  rationale: El texto habla del movimiento del niño en el vientre de Elisabet; «bebé» conserva la concreción del referente prenatal sin convertirlo en una formulación interpretativa más amplia.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el expediente auditado en inglés. No hubo revisiones aplicadas en el pasaje inglés; la versión española mantiene la misma estructura discursiva y las mismas decisiones léxicas principales, adaptadas al uso natural del español.
  spanish_consistency_notes:
  - Se usa «Y aconteció que» para reflejar la fórmula narrativa lucana sin arcaizar en exceso.
  - Se mantiene «Espíritu Santo» con mayúsculas por el referente personal divino.
  - «Saludo» y «bebé» conservan naturalidad en español y corresponden a las decisiones léxicas auditadas.
  - «Vientre» se emplea por claridad y dignidad en lugar de un tecnicismo innecesario.
