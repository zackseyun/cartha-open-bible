  to: Ha ayudado a Israel, su siervo[a], acordándose de su misericordia[b],
  rationale: Se revisa únicamente la frase final porque «en memoria de misericordia» no es español natural ni transmite bien la función de μνησθῆναι ἐλέους. «Acordándose de su misericordia» preserva la idea de recuerdo misericordioso/covenantal de Dios, suena idiomático en español y sigue de cerca la intención del texto fuente y la documentación léxica.
