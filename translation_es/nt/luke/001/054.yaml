translation:
  language: es
  text: Ha ayudado a Israel, su siervo[a], acordándose de su misericordia[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Israel, su hijo». El griego pais puede significar «siervo» o «hijo»; aquí se prefiere «siervo» por el patrón veterotestamentario de llamar a Israel siervo de Dios.
    reason: lexical_alternative
  - marker: b
    text: «Misericordia» también puede llevar el sentido de misericordia de pacto o fidelidad compasiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντελάβετο
  english_pob_choice: has helped
  chosen_spanish: ha ayudado
  alternatives_spanish:
  - ha tomado de la mano para ayudar
  - ha acudido en ayuda de
  - ha sostenido
  lexicon: BDAG
  rationale: El verbo griego expresa tomar de la mano para ayudar o sostener. «Ha ayudado» comunica bien la acción salvadora y resumida del aoristo sin sonar forzado en español.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: BDAG
  rationale: Se conserva el nombre propio; por el contexto, refiere colectivamente al pueblo de Israel, no al patriarca individual.
- source_word: παῖς
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - hijo
  - niño
  lexicon: BDAG
  rationale: Aunque παῖς puede significar «hijo/niño», en este contexto de resonancia veterotestamentaria e identidad pactual de Israel, «siervo» preserva mejor el eco de la Escritura y la relación de servicio al pacto.
- source_word: μνησθῆναι
  english_pob_choice: in remembrance of
  chosen_spanish: en memoria de
  alternatives_spanish:
  - para recordar
  - recordando
  lexicon: BDAG
  rationale: El infinitivo aoristo funciona de manera adverbial; «en memoria de» reproduce con naturalidad la idea de rememoración vinculada a la acción de Dios sin volverla más explícita de lo que permite el griego.
- source_word: ἐλέους
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia de pacto
  - compasión
  lexicon: BDAG
  rationale: «Misericordia» es el equivalente directo y sobrio en español. La posible connotación de misericordia pactual se deja disponible en nota, sin ampliarla innecesariamente en el texto principal.
theological_decisions:
- issue: Sentido de παῖς aplicado a Israel
  english_pob_reading: Israel his servant
  chosen_spanish_reading: Israel, su siervo
  alternative_spanish_readings:
  - Israel, su hijo
  - Israel, su niño
  rationale: La lectura de «siervo» conserva el patrón bíblico de Israel como siervo de Yahvé, especialmente en el trasfondo profético. «Hijo» es posible léxicamente, pero debilita ese eco intertextual.
  doctrine_reference: Principio de primacía del texto original y conservación de la tensión lexical cuando existe ambigüedad
- issue: Fuerza de μνησθῆναι ἐλέους
  english_pob_reading: in remembrance of mercy
  chosen_spanish_reading: en memoria de misericordia
  alternative_spanish_readings:
  - recordando misericordia
  - para recordar misericordia
  rationale: La frase alude a la memoria pactual de Dios expresada en acción misericordiosa. «En memoria de misericordia» mantiene la concisión y el vínculo con el infinitivo griego sin cargar el texto con una interpretación más extensa.
  doctrine_reference: Equivalencia óptima; no añadir explicaciones doctrinales que el versículo no explicita
translation_notes:
  revision_awareness: La redacción sigue el último estado auditado en inglés, donde «remembering mercy» fue revisado a «in remembrance of mercy» para reflejar más naturalmente el infinitivo μνησθῆναι. En español se mantuvo una formulación breve y formal equivalente («en memoria de misericordia») para conservar la relación adverbial y el tono doxológico del canto de María.
  spanish_consistency_notes:
  - Se conservó «Israel» como nombre propio sin glosa en el texto principal.
  - Se eligió «siervo» para παῖς conforme al uso pactual y profético, no «esclavo», porque el contexto y el audit trail inglés privilegian la resonancia de servicio al pacto.
  - «Misericordia» se mantuvo sin expansión en el texto principal; la posible nuance pactual queda explicitada en nota.
  - La puntuación sigue el ritmo breve del griego y de la línea poética del contexto inmediato.
