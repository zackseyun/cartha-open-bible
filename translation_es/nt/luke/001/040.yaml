    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conecta acciones narrativas sucesivas; «y» conserva la parataxis del griego de forma natural en español.
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - entró en
  - ingresó
  lexicon: BDAG
  rationale: 'Aoristo de εἰσέρχομαι: acción puntual de entrar. «Entró» es claro y natural; el complemento locativo «en la casa» ya expresa la dirección.'
- source_word: οἶκον
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - casa
  lexicon: BDAG
  rationale: Aquí οἶκος señala el lugar físico. «Casa» reproduce bien el valor espacial sin cargarlo de la noción de ‘hogar’ o ‘familia’.
- source_word: Ζαχαρίου
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  - Zacarías
  lexicon: BDAG
  rationale: Nombre propio transliterado según la forma usual en español bíblico moderno; se mantiene la identidad del personaje sin castellanizar en exceso.
- source_word: ἠσπάσατο
  english_pob_choice: greeted
  chosen_spanish: saludó
  alternatives_spanish:
  - saludó
  - greeted
  lexicon: BDAG
  rationale: ἀσπάζομαι puede significar saludar, dar la bienvenida o saludar respetuosamente. En español, «saludó» comunica el acto de manera directa y sobria.
- source_word: Ἐλισάβετ
  english_pob_choice: Elizabeth
  chosen_spanish: Elisabet
  alternatives_spanish:
  - Elisabet
  - Isabel
  lexicon: BDAG
  rationale: Se sigue la transliteración más cercana al griego y más transparente al auditorio hispano en un texto de base original; se evita sustituir por la forma tradicional «Isabel» para no perder la trazabilidad del nombre.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando notas al pie no ancladas en el texto. El versículo queda sin marcadores de nota porque no se requiere una alternativa textual que deba exponerse en esta entrega.
  spanish_consistency_notes:
  - Se mantiene el orden narrativo simple del griego con dos coordinaciones por «y».
  - Se eligió «saludó» como equivalente funcional de ἠσπάσατο, sin añadir matices ceremoniales.
  - Se usó «Elisabet» para reflejar la forma griega Ἐλισάβετ y mantener consistencia de transliteración en un registro fuente-centrado.
