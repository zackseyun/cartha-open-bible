translation:
  language: es
  text: y entró[a] en la casa de Zacarías y saludó[b] a Elisabet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entró en la casa de Zacarías» podría traducirse «fue a la casa de Zacarías».
    reason: lexical_alternative
  - marker: b
