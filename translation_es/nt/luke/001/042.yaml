translation:
  language: es
  text: 'Y exclamó con voz fuerte y dijo[a]: «Bendita eres entre las mujeres, y bendito es el fruto de tu vientre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con un fuerte grito».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεφώνησεν
  english_pob_choice: cried out
  chosen_spanish: exclamó
  alternatives_spanish:
  - clamó
  - gritó
  - proclamó
  lexicon: BDAG
  rationale: ἀναφωνέω expresa hablar en voz alta o exclamar con fuerza. En español, «exclamó» conserva el tono elevado y audible sin sugerir necesariamente angustia, que sería demasiado fuerte para este contexto.
- source_word: κραυγῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con fuerte voz
  alternatives_spanish:
  - con voz fuerte
  - con gran voz
  - con un gran clamor
  lexicon: BDAG
  rationale: La frase de dativo indica modo e intensidad. «Con fuerte voz» reproduce la fuerza del original de manera natural en español y mantiene la audibilidad pública.
- source_word: Εὐλογημένη
  english_pob_choice: Blessed are you
  chosen_spanish: Bendita eres
  alternatives_spanish:
  - Bendita seas
  - Eres bendita
  - Favorecida eres
  lexicon: BDAG
  rationale: El participio funciona predicativamente como fórmula de bendición. «Bendita eres» conserva la estructura exhortativa/bendictiva del griego y la dicción bíblica en español.
- source_word: ἐν γυναιξίν
  english_pob_choice: among women
  chosen_spanish: entre las mujeres
  alternatives_spanish:
  - entre todas las mujeres
  - entre mujeres
  - en medio de las mujeres
  lexicon: BDAG
  rationale: La preposición indica comparación o distinción en relación con otras mujeres. «Entre las mujeres» es la equivalencia natural y no añade el «todas» que no está explícito en el griego.
- source_word: εὐλογημένος
  english_pob_choice: blessed is
  chosen_spanish: bendito es
  alternatives_spanish:
  - es bendito
  - bendecido es
  lexicon: BDAG
  rationale: Mantiene el paralelismo con la primera bendición y conserva el valor de fórmula bíblica. «Bendito es» refleja con claridad la pasiva resultativa del participio.
- source_word: ὁ καρπὸς
  english_pob_choice: the fruit
  chosen_spanish: el fruto
  alternatives_spanish:
  - el hijo
  - el descendiente
  - el producto
  lexicon: BDAG
  rationale: «Fruto» reproduce literalmente la metáfora del texto y preserva su transparencia. Interpretaciones como «hijo» explican el sentido, pero suavizan la imagen original.
- source_word: τῆς κοιλίας σου
  english_pob_choice: of your womb
  chosen_spanish: de tu vientre
  alternatives_spanish:
  - de tu seno
  - de tu matriz
  - de tu útero
  lexicon: BDAG
  rationale: En el contexto del embarazo, κοιλία apunta al lugar de gestación. «Vientre» es la opción bíblica y natural en español, equivalente funcional de «womb», sin tecnicismos innecesarios.
theological_decisions:
- issue: Fórmula de bendición dirigida a María
  english_pob_reading: Blessed are you among women
  chosen_spanish_reading: Bendita eres entre las mujeres
  alternative_spanish_readings:
  - Eres bendita entre las mujeres
  - Favorecida eres entre las mujeres
  rationale: La redacción mantiene la bendición pronunciada por Elisabet sin importar formulaciones doctrinales posteriores. «Bendita» conserva el registro bíblico y la reciprocidad paralela con el hijo que lleva en el vientre.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El contexto inglés fue revisado y no requería cambios; la versión española sigue el mismo estado estable del texto auditado, conservando la paralelismo de bendición y la alternativa de intensidad vocal en la nota.
  spanish_consistency_notes:
  - Se mantuvo «Bendita/Bendito» para preservar el paralelismo del versículo.
  - Se evitó «SEÑOR» u otra sustitución irrelevante, porque aquí no aparece el nombre divino.
  - Se optó por «vientre» en vez de un tecnicismo médico para conservar la imaginería bíblica y la naturalidad en español.
  - La nota al pie solo refleja la alternativa lexical explícita sobre la intensidad de la voz, análoga a la del POB en inglés.
