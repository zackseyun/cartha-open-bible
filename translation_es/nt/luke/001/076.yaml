translation:
  language: es
  text: Y tú también[a], niño, serás llamado profeta del Altísimo, porque irás delante del Señor para preparar sus caminos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en presencia del Señor». La expresión puede significar ir delante de alguien o ministrar delante de él.
    reason: lexical_alternative
  - marker: b
    text: La formulación evoca las promesas proféticas de preparar el camino delante del Señor (compárese Isa 40:3; Mal 3:1). En la narrativa de Lucas, esto se cumple en el ministerio de Juan delante de Jesús.
    reason: cross_reference
lexical_decisions:
- source_word: καὶ σὺ δέ
  english_pob_choice: And you also
  chosen_spanish: Y tú también
  alternatives_spanish:
  - Y tú
  - Y tú, además
  lexicon: BDAG
  rationale: La combinación introduce al destinatario con énfasis aditivo. «También» conserva bien el valor de δέ con σὺ en español natural, sin volverlo redundante ni perder el matiz de transición.
- source_word: παιδίον
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - niño pequeño
  - criatura
  lexicon: BDAG
  rationale: En este contexto vocativo se trata del niño Juan; «niño» es natural en español y suficientemente preciso. «Niño pequeño» suena más pesado, y «criatura» sería menos directo.
- source_word: προφήτης
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - vidente
  lexicon: BDAG
  rationale: El sustantivo corresponde de forma directa a «profeta»; no hay motivo contextual para variar el término.
- source_word: Ὑψίστου
  english_pob_choice: of the Most High
  chosen_spanish: del Altísimo
  alternatives_spanish:
  - del Más Alto
  lexicon: BDAG
  rationale: «Altísimo» es el equivalente reverente y establecido en español para el título divino. Conserva el genitivo de relación de manera natural.
- source_word: κληθήσῃ
  english_pob_choice: will be called
  chosen_spanish: serás llamado
  alternatives_spanish:
  - te llamarán
  - serás nombrado
  lexicon: BDAG
  rationale: La pasiva futura de καλέω expresa designación/reconocimiento; «serás llamado» mantiene la cercanía formal y suena idiomático en español.
- source_word: προπορεύσῃ
  english_pob_choice: will go before
  chosen_spanish: irás delante
  alternatives_spanish:
  - irás antes
  - irás por delante
  lexicon: BDAG
  rationale: «Irás delante» reproduce con naturalidad la idea de ir en avance y conserva el tono bíblico del precursor.
- source_word: ἐνώπιον κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - en la presencia del Señor
  - ante el Señor
  lexicon: BDAG
  rationale: ἐνώπιον puede ser espacial o relacional. En este contexto de precursor, «delante del Señor» comunica mejor la idea de ir delante de alguien que la fórmula más estática «en la presencia de». Se preserva así la relación preparatoria sin cerrar prematuramente el referente de κύριος.
- source_word: ἑτοιμάσαι
  english_pob_choice: to prepare
  chosen_spanish: para preparar
  alternatives_spanish:
  - para dejar listo
  - para hacer preparativos
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa propósito tras «irás delante». «Para preparar» es directo, claro y fiel al valor verbal.
- source_word: ὁδοὺς αὐτοῦ
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - el camino para él
  lexicon: BDAG
  rationale: Aunque el griego usa plural, «caminos» lo conserva mejor que singulariza la imagen. «Sus caminos» es natural en español y mantiene la resonancia profética de preparación de caminos.
theological_decisions:
- issue: Referente de «el Señor» en la profecía del precursor
  english_pob_reading: Render κύριος as 'the Lord' without narrowing the referent in the translation line itself.
  chosen_spanish_reading: Traducir κύριος como «el Señor» sin precisar en la línea principal si se trata de Yahvé en el trasfondo profético o de Jesús en el cumplimiento narrativo.
  alternative_spanish_readings:
  - el Señor Dios en la alusión profética
  - el Señor Jesús en la narración
  rationale: El texto alude a pasajes sobre preparar el camino delante del Señor y, a la vez, Lucas presenta a Juan como precursor de Jesús. Mantener «el Señor» preserva esa tensión canónica sin resolverla por adelantado en la traducción.
  doctrine_reference: Preservar la tensión teológica/canónica; κύριος se mantiene como «Señor» por defecto en esta capa textual.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue ese estado de alta concordancia y conserva la decisión inglesa de mantener la tensión interpretativa de κύριος sin sobreespecificarla en la línea principal.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al default del proyecto, sin sustituirlo por una paráfrasis doctrinal.
  - Se conserva el plural implícito de ὁδοὺς con «caminos» para no singularizar indebidamente la imagen.
  - El tono es bíblico y moderno, evitando calcos rígidos como «delante de la faz de».
