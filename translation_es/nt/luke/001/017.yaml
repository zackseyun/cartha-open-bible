    reason: cross_reference
  revision_rationale: 'Se revisa el texto para lograr un español más natural y más fiel a los matices del griego: «hacer volver» expresa mejor el propósito restaurador de ἐπιστρέψαι, y «un pueblo preparado» preserva mejor el estado resultante indicado por κατεσκευασμένον que «dispuesto». Se conservan la estructura, la alusión a Malaquías y el manejo de «él» / «el Señor» del POB inglés.'
