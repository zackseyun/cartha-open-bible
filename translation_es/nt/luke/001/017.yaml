revisions:
- from: Y él irá delante de él en el espíritu y el poder de Elías[a], para volver los corazones de los padres hacia los hijos, y a los desobedientes a la sabiduría de los justos[c][b], para preparar para el Señor un pueblo dispuesto.
  to: Y él irá delante de él en el espíritu y el poder de Elías[c], para hacer volver los corazones de los padres hacia los hijos[a], y a los desobedientes a la sabiduría de los justos[b], para preparar para el Señor un pueblo preparado.
  rationale: 'Se revisa el texto para lograr un español más natural y más fiel a los matices del griego: «hacer volver» expresa mejor el propósito restaurador de ἐπιστρέψαι, y «un pueblo preparado» preserva mejor el estado resultante indicado por κατεσκευασμένον que «dispuesto». Se conservan la estructura, la alusión a Malaquías y el manejo de «él» / «el Señor» del POB inglés.'
  reviewer_model: gpt-5.4
