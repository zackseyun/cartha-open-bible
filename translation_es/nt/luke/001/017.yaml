translation:
  language: es
  text: Y él irá delante de él en el espíritu y el poder de Elías[c], para hacer volver los corazones de los padres hacia los hijos[a], y a los desobedientes a la sabiduría de los justos[b], para preparar para el Señor un pueblo preparado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los hijos». La frase evoca Malaquías 4:6 y puede llevar la idea de una reconciliación familiar restaurada.
    reason: lexical_alternative
  - marker: b
    text: O «al modo de pensar de los justos» o «a la prudencia de los justos».
    reason: lexical_alternative
  - marker: c
    text: «En el espíritu y el poder de Elías» se refiere a un ministerio profético semejante al de Elías y capacitado por Dios, no necesariamente al regreso literal de Elías.
    reason: cross_reference
lexical_decisions:
- source_word: προελεύσεται
  english_pob_choice: will go before
  chosen_spanish: irá delante de
  alternatives_spanish:
  - irá antes de
  - precederá a
  lexicon: BDAG
  rationale: El futuro de προέρχομαι con ἐνώπιον expresa ir delante de alguien en misión o presencia. «Irá delante de» es natural en español y conserva la idea direccional y representativa del griego.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: BDAG
  rationale: La frase puede ser espacial o funcional. Aquí «delante de él» preserva la relación de precedencia sin sobreexplicar el referente.
- source_word: ἐν πνεύματι καὶ δυνάμει Ἠλίου
  english_pob_choice: in the spirit and power of Elijah
  chosen_spanish: en el espíritu y el poder de Elías
  alternatives_spanish:
  - con el espíritu y el poder de Elías
  lexicon: BDAG
  rationale: Es la equivalencia transparente y estándar. Mantiene la idea de semejanza profética y capacidación asociada con Elías, no identidad literal con él.
- source_word: ἐπιστρέψαι
  english_pob_choice: to turn
  chosen_spanish: volver
  alternatives_spanish:
  - hacer volver
  - convertir
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa propósito. «Volver» conserva la concisión y el eco de Malaquías 4:6; «hacer volver» sería más explicativo.
- source_word: καρδίας πατέρων ἐπὶ τέκνα
  english_pob_choice: the hearts of fathers to children
  chosen_spanish: los corazones de los padres hacia los hijos
  alternatives_spanish:
  - los corazones de los padres a los hijos
  - el corazón de los padres hacia los hijos
  lexicon: BDAG
  rationale: «Hacia» expresa bien la dirección implícita de ἐπί y hace claro el sentido relacional/familiar del texto, sin perder la alusión a Malaquías.
- source_word: ἀπειθεῖς
  english_pob_choice: the disobedient
  chosen_spanish: los desobedientes
  alternatives_spanish:
  - los rebeldes
  - los incrédulos
  lexicon: BDAG
  rationale: ἀπειθής suele denotar resistencia a la persuasión y desobediencia. «Los desobedientes» es amplio y encaja con el paralelismo ético con «los justos».
- source_word: ἐν φρονήσει δικαίων
  english_pob_choice: to the wisdom of the righteous
  chosen_spanish: a la sabiduría de los justos
  alternatives_spanish:
  - al modo de pensar de los justos
  - a la prudencia de los justos
  lexicon: BDAG
  rationale: Aunque ἐν puede ser «en», el contexto tras ἐπιστρέψαι funciona de modo direccional. «Sabiduría» es una equivalencia natural en español y conserva la dimensión moral/intelectual de φρόνησις.
- source_word: ἑτοιμάσαι
  english_pob_choice: to prepare
  chosen_spanish: para preparar
  alternatives_spanish:
  - para dejar listo
  - para hacer ready
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa con claridad mediante «para preparar».
- source_word: κυρίῳ
  english_pob_choice: for the Lord
  chosen_spanish: para el Señor
  alternatives_spanish:
  - para el Señor Yahvé
  - para el Señor
  lexicon: BDAG
  rationale: 'En el griego de este versículo, κύριος se traduce como «Señor»; el dativo funciona como referencia/destino: el pueblo es preparado para él.'
- source_word: λαὸν κατεσκευασμένον
  english_pob_choice: a people made ready
  chosen_spanish: un pueblo dispuesto
  alternatives_spanish:
  - un pueblo preparado
  - un pueblo bien dispuesto
  lexicon: BDAG
  rationale: κατεσκευασμένον es participio perfecto pasivo y señala un estado resultante de preparación. «Dispuesto» suena natural en español y comunica la idea de estar listo; «preparado» sería más literal pero menos idiomático aquí.
theological_decisions:
- issue: Identidad y función de Elías
  english_pob_reading: John is described as going in the spirit and power of Elijah, not as Elijah literally returned.
  chosen_spanish_reading: Juan va en el espíritu y el poder de Elías, como un ministerio profético semejante, no como una reaparición literal de Elías.
  alternative_spanish_readings:
  - Juan es Elías literalmente retornado.
  - Juan actúa simplemente con un estilo inspirado por Elías, sin continuidad profética clara.
  rationale: La expresión griega indica continuidad/empoderamiento profético. La traducción mantiene la fórmula sin resolverla hacia una reencarnación o identidad literal.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Referente de los pronombres y del título κυρίῳ
  english_pob_reading: 'The verse leaves the pronouns/titles as in Greek: John goes before ''him'' and prepares a people ''for the Lord.'''
  chosen_spanish_reading: La versión conserva «él» y «el Señor» sin expandirlos a una identificación explícita en el texto principal.
  alternative_spanish_readings:
  - ante Jesús
  - para Yahvé
  rationale: El contexto inmediato aclara el referente, pero el versículo en sí usa pronombre y título. Se preserva esa forma para no sobreinterpretar el texto.
  doctrine_reference: Translation philosophy §1, §3; Contested terms table for κύριος
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; el borrador español mantiene el sentido y las decisiones léxicas del registro inglés sin introducir ajustes no justificados.
  spanish_consistency_notes:
  - Se conservó «Señor» para κύριος, conforme al contexto auditado.
  - Se prefirió «justos» sobre «rectos» porque el inglés POB usa 'righteous' y el campo semántico legal/moral queda claro en español.
  - Se mantuvo la alusión a Malaquías mediante «volver... hacia los hijos» y la nota sobre la posible lectura alternativa.
  - No se expandieron los pronombres del texto principal para evitar resolver el referente más allá de lo que el versículo expresa.
