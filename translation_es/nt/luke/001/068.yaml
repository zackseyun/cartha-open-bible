translation:
  language: es
  text: Bendito sea Yahvé[a], el Dios de Israel, porque ha visitado a su pueblo y le ha traído redención.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha venido a ayudar»; el griego «ha visitado» es una expresión bíblica de la intervención atenta de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐλογητὸς
  english_pob_choice: Blessed is
  chosen_spanish: ¡Bendito sea!
  alternatives_spanish:
  - Sea bendito
  - Bendito es
  lexicon: BDAG
  rationale: Es una exclamación de bendición/doxología; en español, «Bendito sea» conserva bien el valor benedictorio sin sonar mecánico. El giro exclamativo ayuda a reflejar la fuerza litúrgica del griego.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título divino dentro de una bendición dirigida al Dios de Israel. «Señor» es el equivalente natural en español y preserva el registro bíblico.
- source_word: ὁ θεὸς τοῦ Ἰσραήλ
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  lexicon: BDAG
  rationale: Es una designación bíblica fija del Dios del pacto. Se mantiene de forma directa para conservar la resonancia veterotestamentaria y la relación appositiva con «Señor».
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la bendición. «Porque» es claro y natural en español contemporáneo.
- source_word: ἐπεσκέψατο
  english_pob_choice: has visited
  chosen_spanish: ha visitado
  alternatives_spanish:
  - ha venido a ayudar
  - ha mirado con favor
  lexicon: BDAG
  rationale: Se conserva el verbo de «visitar» porque en la Biblia expresa la intervención atenta y eficaz de Dios. No se sustituye por una paráfrasis explicativa para no borrar esa imagen verbal.
- source_word: ἐποίησεν λύτρωσιν
  english_pob_choice: brought redemption
  chosen_spanish: ha realizado redención
  alternatives_spanish:
  - ha hecho redención
  - ha efectuado redención
  - ha traído redención
  lexicon: BDAG
  rationale: El griego literalmente dice «hizo redención». En español, «ha realizado redención» mantiene la estructura causativa sin sonar tan extraña como un calco duro. «Ha traído redención» sería más idiomático, pero desplaza un poco el peso del verbo ποιέω.
- source_word: λύτρωσιν
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: «Redención» preserva el valor salvífico y el trasfondo de liberación mediante rescate. Es la opción más fiel al peso teológico del término en este contexto.
- source_word: τῷ λαῷ αὐτοῦ
  english_pob_choice: to his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - para su pueblo
  lexicon: BDAG
  rationale: El dativo expresa al beneficiario de la acción. «A su pueblo» es natural en español y conserva la relación directa con el objeto de la visita y la redención.
theological_decisions:
- issue: Lenguaje de la visita divina
  english_pob_reading: has visited
  chosen_spanish_reading: ha visitado
  alternative_spanish_readings:
  - ha venido a ayudar
  - ha mirado con favor
  rationale: Se preserva la metáfora bíblica de la visita de Dios como intervención salvadora. No se la explica en exceso para mantener la tensión y la riqueza del idioma bíblico.
  doctrine_reference: Translation philosophy §3, preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente reordenó la cláusula final para reflejar con más claridad las relaciones del griego: primero «visited his people» y luego «brought redemption». La versión española sigue ese mismo orden, manteniendo dos acciones distintas unidas por «y».'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος cuando el referente es el Dios de Israel en fórmula doxológica.
  - Se mantiene «redención» para λύτρωσις por su fuerza soteriológica, evitando debilitarla con «liberación» salvo contexto específico.
  - Se usa «ha visitado» de manera consistente con el motivo bíblico de la visita divina, y se deja constancia de la alternativa explicativa en nota.
