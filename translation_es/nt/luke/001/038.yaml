translation:
  language: es
  text: 'María dijo: «He aquí la sierva[a] de Yahvé. Que se haga[b] en mí conforme a tu palabra». Y el ángel se apartó de ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “la esclava de Yahvé”. El griego δούλη puede designar a una esclava o a una sierva; aquí el texto principal usa “sierva” porque el contexto enfatiza la humilde sumisión de María a Dios.
    reason: alternative_reading
  - marker: b
    text: O “Hágase en mí conforme a tu palabra”. El griego γένοιτό μοι expresa aceptación voluntaria en forma optativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ
  english_pob_choice: And Mary said
  chosen_spanish: María dijo
  alternatives_spanish:
  - Y María dijo
  - Entonces María dijo
  lexicon: SBLGNT / BDAG
  rationale: El griego introduce la respuesta con un conector suave; en español, 'María dijo' mantiene la fluidez narrativa sin añadir una temporalidad más fuerte que la del original. Se omite 'Y' por economía estilística, sin perder el enlace con el contexto.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: BDAG
  rationale: '''Ἰδοὺ'' es una fórmula marcada de presentación solemne. ''He aquí'' conserva ese tono elevado en español mejor que ''Mira'', que resultaría demasiado coloquial.'
- source_word: ἡ δούλη
  english_pob_choice: the Lord’s servant
  chosen_spanish: la esclava
  alternatives_spanish:
  - la sierva
  - la servidora
  lexicon: BDAG
  rationale: La forma femenina δούλη puede significar 'esclava' o 'sierva'. Dado que el griego señala una condición de pertenencia/subordinación y el texto no suaviza el término, se preserva 'esclava' en el cuerpo principal. 'Sierva' queda como alternativa más eufónica, pero menos fuerte lexicalmente.
- source_word: κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  lexicon: BDAG + default project terminology
  rationale: El contexto de la anunciación implica la referencia al Dios de Israel; siguiendo la norma del proyecto para κύριος divino, se traduce 'Yahvé' y no se enmascara con 'Señor'.
- source_word: γένοιτό μοι
  english_pob_choice: May it happen to me
  chosen_spanish: Hágase en mí
  alternatives_spanish:
  - Que se haga en mí
  - Hágase conmigo
  lexicon: BDAG
  rationale: La fuerza optativa expresa aceptación voluntaria. 'Hágase en mí' comunica bien la sumisión consentida y mantiene una formulación natural en español. Se evita 'Que me ocurra' por sonar más mecánico y menos reverente.
- source_word: κατὰ τὸ ῥῆμά σου
  english_pob_choice: according to your word
  chosen_spanish: conforme a tu palabra
  alternatives_spanish:
  - según tu palabra
  - de acuerdo con tu palabra
  lexicon: BDAG
  rationale: '''Conforme a'' reproduce con precisión el sentido de conformidad de κατά + acusativo. ''Palabra'' conserva la referencia concreta al anuncio pronunciado por el ángel.'
- source_word: ἀπῆλθεν ἀπ’ αὐτῆς
  english_pob_choice: departed from her
  chosen_spanish: se apartó de ella
  alternatives_spanish:
  - se fue de ella
  - partió de ella
  lexicon: BDAG
  rationale: '''Se apartó de ella'' es idiomático en español y preserva el matiz de separación narrativa. ''Departió'' sonaría forzado; ''se fue'' es más simple pero menos preciso en el matiz de apartamiento.'
- source_word: ὁ ἄγγελος
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: BDAG
  rationale: En Lucas, ἄγγελος refiere claramente a un ser angelical; 'ángel' es la opción transparente y fiel.
theological_decisions:
- issue: 'Término de autodesignación de María: δούλη'
  english_pob_reading: 'the Lord’s servant; footnoted alternative: the Lord’s slave'
  chosen_spanish_reading: la esclava de Yahvé
  alternative_spanish_readings:
  - la sierva de Yahvé
  - la esclava del Señor
  rationale: El audit trail inglés reconoce que δούλη puede denotar una esclava femenina, aunque opta por 'servant' por razones de tono. En español, 'esclava' conserva la fuerza semántica del término griego y evita suavizar la relación de pertenencia. Se mantiene una nota para indicar la alternativa 'sierva', que es idiomática pero menos fuerte.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος/δούλη; translation philosophy on lexical force'
- issue: Nombre divino implícito en κυρίου
  english_pob_reading: the Lord’s
  chosen_spanish_reading: de Yahvé
  alternative_spanish_readings:
  - del Señor
  rationale: Aunque el inglés usa 'Lord', el proyecto establece 'Yahvé' para el nombre divino cuando el contexto lo justifica. Aquí la expresión remite al Dios de Israel y a la voz divina en la anunciación; por eso se evita la convención de enmascarar el nombre con 'Señor'.
  doctrine_reference: Project terminology default for יהוה / YHWH
- issue: Valor optativo de γένοιτό μοι
  english_pob_reading: May it happen to me according to your word
  chosen_spanish_reading: Hágase en mí conforme a tu palabra
  alternative_spanish_readings:
  - Que se haga en mí conforme a tu palabra
  - Hágase conmigo conforme a tu palabra
  rationale: El optativo expresa consentimiento deseoso, no mera pasividad. 'Hágase en mí' comunica aceptación y disponibilidad en un español natural y reverente, sin imponer una formulación litúrgica fija como si fuera la única posible.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy on mood/volition; optative force'
translation_notes:
  revision_awareness: La revisión más reciente no alteró el texto de base; el cotejo de alta concordancia confirma que no hay cambios necesarios respecto del juicio auditado en el inglés POB. La presente redacción española sigue ese mismo contenido, ajustando únicamente la estrategia terminológica propia del español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para la referencia divina, coherente con el estándar del proyecto.
  - Se preserva la fuerza de δούλη con 'esclava', en contraste con la opción más suave 'sierva'.
  - La forma verbal 'Hágase en mí' comunica el optativo griego sin introducir paráfrasis amplia.
  - '''Se apartó de ella'' respeta el cierre narrativo y evita calcos innecesarios.'
