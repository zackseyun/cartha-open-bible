    rationale: El audit trail inglés eligió ‘servant’ como lectura principal por el énfasis en la humilde sumisión, dejando ‘slave’ como alternativa. El español debe reflejar esa prioridad con ‘sierva’ en el texto principal y ‘esclava’ en nota.
  - severity: high
    issue: Los marcadores de notas [a] y [b] están colocados sobre palabras equivocadas.
    rationale: La nota a comenta δούλη pero está anclada a ‘dijo’; la nota b comenta γένοιτό μοι pero está anclada a ‘esclava’. Esto rompe la trazabilidad exigida.
  - severity: medium
