translation:
  language: es
  text: tal como habló[a] a nuestros padres, a Abraham y a su descendencia[b] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a nuestros antepasados'. El griego dice literalmente 'a nuestros padres'.
    reason: lexical_alternative
  - marker: b
    text: O 'a su simiente'. El griego usa un sustantivo singular colectivo que puede significar 'simiente', 'descendencia' o 'prole'.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - justo como
  lexicon: BDAG
  rationale: Expresa correspondencia exacta con lo anterior sin sonar forzado en español; conserva el valor comparativo de καθὼς.
- source_word: ἐλάλησεν
  english_pob_choice: he spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló
  lexicon: BDAG
  rationale: λαλέω enfatiza el acto de hablar; en español, 'habló' mantiene mejor ese matiz formal que 'dijo'.
- source_word: πρὸς τοὺς πατέρας ἡμῶν
  english_pob_choice: to our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - a nuestros antepasados
  - a nuestros padres
  lexicon: BDAG
  rationale: Se mantiene el masculino plural explícito del griego y su resonancia de pacto; 'padres' reproduce con más fidelidad la forma del original que 'antepasados'.
- source_word: τῷ Ἀβραὰμ
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - a Abraham
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estable en español bíblico.
- source_word: τῷ σπέρματι αὐτοῦ
  english_pob_choice: to his offspring
  chosen_spanish: a su descendencia
  alternatives_spanish:
  - a su simiente
  - a su descendencia
  - a su semilla
  lexicon: BDAG
  rationale: σπέρμα es un sustantivo singular colectivo; 'descendencia' comunica bien el valor colectivo en español y suena natural, mientras preserva el alcance genealógico/covenantal. 'Simiente' o 'semilla' se reservan para contextos donde el eco intertextual sea decisivo.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para siempre
  - por la eternidad
  lexicon: BDAG
  rationale: Expresión idiomática natural en español que comunica duración perpetua sin perder la fuerza del original.
theological_decisions:
- issue: Mantenimiento del lenguaje patriarcal/covenantal en πρὸς τοὺς πατέρας ἡμῶν
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: El griego es masculinum plural explícito y remite a los padres fundacionales de Israel; no se neutraliza para conservar el eco histórico y de pacto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: σπέρματι αὐτοῦ como término colectivo singular con posible resonancia abrahámica
  english_pob_reading: his offspring
  chosen_spanish_reading: su descendencia
  alternative_spanish_readings:
  - su simiente
  - su semilla
  rationale: '''Descendencia'' comunica el colectivo singular de forma clara en español. Se evita resolver la tensión entre literalidad (''simiente'') y naturalidad, preservando el sentido de promesa a la línea de Abraham.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente al preferir una puntuación fluida y unir el sintagma final con coma conceptual implícita, sin introducir un guion. Además, conserva la correspondencia semántica establecida por el audit trail inglés: comparación (καθὼς), habla divina/patrimonial (ἐλάλησεν πρὸς), y el colectivo singular de σπέρμα.'
  spanish_consistency_notes:
  - Se usa 'padres' para reflejar el masculino plural del original y mantener el tono de pacto.
  - '''Descendencia'' se eligió como equivalente natural de σπέρμα; no se traduce mecánicamente como ''semilla'' en el texto principal.'
  - '''Para siempre'' reproduce la idiomaticidad de εἰς τὸν αἰῶνα sin sobreliteralidad.'
  - Las notas [a] y [b] están ancladas en el texto principal y no aparecen sin marcador.
