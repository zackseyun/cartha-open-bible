    rationale: El audit trail establece que se trata de un saludo idiomático, no de un mandato principal ni de una fórmula arcaizante. En español neutral moderno, «¡Saludos!» o «Te saludo» refleja mejor el valor discursivo; «¡Salve!» puede mantenerse como alternativa tradicional.
