translation:
  language: es
  text: 'Y, al entrar donde ella estaba, le dijo: «¡Saludos![a] favorecida,[b] el Señor está contigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Alégrate!» o, tradicionalmente, «¡Salve!». La palabra griega es un saludo idiomático, aunque formalmente es un imperativo que significa «alégrate».
    reason: lexical_alternative
  - marker: b
    text: O «muy favorecida», «agraciada» o, tradicionalmente, «llena de gracia». El griego indica a una persona que ha recibido gracia o favor.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰσελθὼν πρὸς αὐτὴν
  english_pob_choice: coming in to her
  chosen_spanish: al entrar donde ella estaba
  alternatives_spanish:
  - entrando hacia ella
  - habiendo entrado a donde ella estaba
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción previa al dicho principal. En español, «al entrar donde ella estaba» conserva la llegada a su presencia sin sonar forzado ni demasiado literal.
- source_word: Χαῖρε
  english_pob_choice: Greetings
  chosen_spanish: ¡Salve!
  alternatives_spanish:
  - ¡Alégrate!
  - Saludos
  lexicon: BDAG
  rationale: En contexto de saludo, Χαῖρε funciona de modo idiomático como salutación. «Salve» mantiene la solemnidad y la tradición hispánica, mientras que «¡Alégrate!» sería más literal pero puede sonar como mandato.
- source_word: κεχαριτωμένη
  english_pob_choice: favored one
  chosen_spanish: Favorecida
  alternatives_spanish:
  - muy favorecida
  - agraciada
  - llena de gracia
  lexicon: BDAG
  rationale: El participio perfecto pasivo de χαριτόω señala a quien ha recibido gracia o favor. «Favorecida» conserva ese sentido pasivo sin introducir una formulación doctrinal que exceda la fuerza léxica del término.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: BDAG
  rationale: Aquí κύριος se refiere a Dios en el anuncio angélico. En español, «el Señor» preserva el título reverente y la continuidad bíblica; no se usa «Yahvé» porque el griego del versículo presenta κύριος, no el tetragrámaton explícito.
- source_word: μετὰ σοῦ
  english_pob_choice: is with you
  chosen_spanish: está contigo
  alternatives_spanish:
  - está con ustedes
  - está con ella
  lexicon: BDAG
  rationale: 'Con μετά + genitivo, el sentido es «con». En español se requiere la cópula: «está contigo» expresa con naturalidad la presencia divina anunciada.'
theological_decisions:
- issue: Valor de κεχαριτωμένη en un pasaje mariológico sensible
  english_pob_reading: favored one; or highly favored, graced one, traditionally full of grace
  chosen_spanish_reading: Favorecida
  alternative_spanish_readings:
  - llena de gracia
  - agraciada
  - muy favorecida
  rationale: 'La lectura sigue el sentido pasivo del participio: María es la que ha recibido favor/gracia. «Favorecida» evita importar una formulación teológica posterior como si fuera exigida por el griego, aunque se reconoce en nota la tradicional «llena de gracia».'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente sin cambios sustanciales respecto del audit trail inglés; se conserva la tensión entre el saludo idiomático y la literalidad del imperativo, y entre el participio pasivo y las formulaciones tradicionales marianas.
  spanish_consistency_notes:
  - Se mantiene «el Señor» para κύριος conforme al uso del proyecto cuando el referente es Dios.
  - Se evita traducir mecánicamente el saludo como mandato, aunque se preserva la alternativa literal en nota.
  - «Favorecida» conserva la pasividad del participio perfecto sin sobrecargar el texto principal con terminología doctrinal.
  - La puntuación y las comillas siguen el uso habitual del español editorial.
