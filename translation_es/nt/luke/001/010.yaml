- from: Y toda la multitud del pueblo estaba orando afuera, a la hora del ofrecimiento del incienso[a].
  to: Y toda la multitud del pueblo estaba orando afuera, a la hora de la ofrenda de incienso[a].
  rationale: Se revisa únicamente la expresión cultual final para mejorar la naturalidad y la dignidad del español sin apartarse del griego ni de la decisión léxica del POB en inglés. «La ofrenda de incienso» comunica mejor el sentido ritual de τοῦ θυμιάματος que «el ofrecimiento del incienso».
