translation:
  language: es
  text: Y toda la multitud del pueblo estaba orando afuera, a la hora de la ofrenda de incienso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el momento de quemar el incienso».
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν τὸ πλῆθος
  english_pob_choice: the whole multitude
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - la multitud entera
  - todo el gentío
  lexicon: BDAG
  rationale: πᾶν con un sustantivo colectivo singular destaca el conjunto completo del grupo reunido. «Toda la multitud» conserva esa idea de totalidad y suena natural en español sin diluir el matiz colectivo.
- source_word: τοῦ λαοῦ
  english_pob_choice: of the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - del pueblo de Israel
  - de la gente
  lexicon: BDAG
  rationale: λαός suele referirse al pueblo en sentido comunitario; en este contexto del templo puede aludir al pueblo del pacto, pero el griego no dice explícitamente «Israel», por lo que no se añade en el texto principal.
- source_word: προσευχόμενον
  english_pob_choice: was praying
  chosen_spanish: estaba orando
  alternatives_spanish:
  - estaba orando en oración
  - estaba rezando
  lexicon: BDAG
  rationale: El participio presente con ἦν expresa acción en curso. «Estaba orando» refleja bien esa duración y es idiomático en español bíblico contemporáneo; «rezando» podría sonar demasiado ligado a una tradición particular.
- source_word: ἔξω
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - outside the sanctuary
  lexicon: BDAG
  rationale: ἔξω significa simplemente «fuera/afuera». «Afuera» comunica con claridad la oposición espacial respecto de la acción sacerdotal sin especificar más de lo que dice el griego.
- source_word: τῇ ὥρᾳ
  english_pob_choice: at the hour
  chosen_spanish: a la hora
  alternatives_spanish:
  - en la hora
  - al tiempo
  lexicon: BDAG
  rationale: ὥρα puede significar «hora» o, más ampliamente, «tiempo». «A la hora» preserva el sentido de un momento fijado y litúrgico, natural en español.
- source_word: τοῦ θυμιάματος
  english_pob_choice: of the incense offering
  chosen_spanish: del ofrecimiento del incienso
  alternatives_spanish:
  - del incienso
  - de la quema del incienso
  lexicon: BDAG
  rationale: θυμίαμα designa incienso y, en este contexto del templo, el acto ritual asociado con él. «Ofrecimiento del incienso» o «ofrecimiento del incienso» expresa el sentido cultual sin perder la conexión con el término griego; se opta por una formulación española clara y digna.
theological_decisions:
- issue: Terminología cultual en θυμίαμα
  english_pob_reading: incense offering
  chosen_spanish_reading: ofrecimiento del incienso
  alternative_spanish_readings:
  - incienso
  - quema del incienso
  rationale: La escena es litúrgica y templeña; la traducción debe conservar ese carácter sin sobrecargarla con explicaciones. «Ofrecimiento del incienso» mantiene el acto ritual implícito en el griego y corresponde bien al análisis del POB en inglés.
  doctrine_reference: Trasfondo cultual del templo; equivalencia óptima con primacía del texto original.
translation_notes:
  revision_awareness: El texto griego presenta una construcción perifrástica de acción continua («ἦν ... προσευχόμενον»), y el análisis inglés del POB concluye que no debe añadirse más especificación espacial que «outside». También se mantiene la ambigüedad cultual de θυμίαμα mediante una expresión que comunica el rito sin expandir indebidamente el contenido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni una cita directa que lo requiera.
  - «Orando» se usa para reflejar la acción continuada; no se introduce «juntos» porque el sujeto colectivo ya lo implica y el griego no lo explicita.
  - La nota al pie preserva la alternativa lexical del POB inglés entre el acto ritual y la quema del incienso.
