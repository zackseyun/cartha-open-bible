translation:
  language: es
  text: 'Y el ángel le respondió[a]: «Yo soy Gabriel, que estoy en la presencia de Dios, y fui enviado para hablarte y darte esta buena noticia[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le contestó».
    reason: lexical_alternative
  - marker: b
    text: O «estas cosas». El griego dice literalmente «anunciarte estas cosas», refiriéndose al mensaje que Gabriel acaba de anunciar como buena noticia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: le respondió
  alternatives_spanish:
  - le contestó
  - respondiendo, le dijo
  lexicon: BDAG
  rationale: El participio aoristo introduce el discurso directo; en español, «le respondió» expresa de forma natural la réplica inmediata sin calco pesado.
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: Aquí el referente es un ser celestial identificado como Gabriel, por lo que «ángel» es preciso y natural.
- source_word: Ἐγώ εἰμι Γαβριὴλ
  english_pob_choice: I am Gabriel
  chosen_spanish: Yo soy Gabriel
  alternatives_spanish:
  - Soy Gabriel
  lexicon: BDAG
  rationale: El pronombre explícito se conserva con valor enfático; «Yo soy» mantiene esa fuerza sin sonar artificial en español.
- source_word: ὁ παρεστηκὼς
  english_pob_choice: who stands
  chosen_spanish: que estoy
  alternatives_spanish:
  - que permanezco
  - que me encuentro
  lexicon: BDAG
  rationale: El participio perfecto comunica una posición estable y continua delante de Dios. En español, «estoy» transmite esa presencia actual; se complementa con la frase siguiente para concretar el matiz relacional/cortesano.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: in the presence of God
  chosen_spanish: en la presencia de Dios
  alternatives_spanish:
  - delante de Dios
  lexicon: BDAG
  rationale: «En la presencia de Dios» conserva el sentido de proximidad y de escena de corte celestial que expresa el griego, sin perder claridad.
- source_word: ἀπεστάλην
  english_pob_choice: I was sent
  chosen_spanish: he sido enviado
  alternatives_spanish:
  - fui enviado
  lexicon: BDAG
  rationale: El aoristo pasivo se traduce de manera natural con pasiva compuesta para expresar comisión con resultado vigente; «he sido enviado» suena más idiomático y mantiene el énfasis en la acción recibida.
- source_word: λαλῆσαι πρὸς σὲ
  english_pob_choice: to speak to you
  chosen_spanish: para hablarte
  alternatives_spanish:
  - para decirte
  - para dirigirme a ti
  lexicon: BDAG
  rationale: El infinitivo de propósito se vuelve naturalmente «para hablarte»; evita la redundancia de un español más literal y mantiene la formalidad.
- source_word: εὐαγγελίσασθαί σοι
  english_pob_choice: to bring you this good news
  chosen_spanish: para anunciarte
  alternatives_spanish:
  - para darte esta buena noticia
  - para proclamarte
  lexicon: BDAG
  rationale: El verbo εὐαγγελίζω implica comunicar buena noticia. En español, «anunciarte» conserva la acción de proclamar sin obligar a añadir una paráfrasis que podría sobreexplicar; el contexto inmediato ya aporta el contenido de la noticia.
- source_word: ταῦτα
  english_pob_choice: this good news
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas noticias
  lexicon: BDAG
  rationale: Se conserva el demostrativo literal porque el griego dice «estas cosas». Así se evita borrar la tensión señalada por la tradición auditada entre la literalidad del pronombre y su referencia contextual al mensaje anunciado.
theological_decisions:
- issue: Cómo renderizar εὐαγγελίζω en una escena de anuncio angélico
  english_pob_reading: good news
  chosen_spanish_reading: anunciarte estas cosas
  alternative_spanish_readings:
  - darte esta buena noticia
  - proclamarte esta buena noticia
  - anunciarte este evangelio
  rationale: El término griego significa anunciar buena noticia; en este contexto, la noticia ya está contenida en el mensaje previo de Gabriel. En español, se preserva la función verbal sin cargar el versículo con el tecnicismo «evangelio», que podría sonar anacrónico en esta escena.
  doctrine_reference: La traducción privilegia el valor léxico-contextual del verbo griego y evita terminología eclesiástica posterior cuando no es requerida por el pasaje.
translation_notes:
  revision_awareness: 'Se siguió el audit trail en favor de una equivalencia óptima: se conservó el pronombre enfático, el marco celestial de «en la presencia de Dios» y la función del verbo εὐαγγελίζω, pero se mantuvo «estas cosas» para no borrar la referencia literal del demostrativo, tal como señala el contexto griego y la nota inglesa.'
  spanish_consistency_notes:
  - Se usa «ángel» para ἄγγελος en este contexto narrativo celestial.
  - Se mantiene «Dios» para θεοῦ.
  - Se evita «Cristo» u otra terminología no presente en el versículo.
  - La frase verbal «he sido enviado» conserva la pasiva de comisión divina, aunque el contexto permita una formulación más natural en español.
  - «Estas cosas» queda en el texto principal para respetar el demostrativo griego; la nota explica la alternativa de lectura contextual.
