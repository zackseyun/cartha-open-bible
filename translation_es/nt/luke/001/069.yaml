translation:
  language: es
  text: y levantó para nosotros un cuerno de salvación[a] en la casa de David, su siervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un poderoso Salvador». Literalmente, «un cuerno de salvación», imagen bíblica de liberación poderosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγειρεν
  english_pob_choice: has raised up
  chosen_spanish: levantó
  alternatives_spanish:
  - alzó
  - levantó en alto
  - hizo surgir
  lexicon: BDAG
  rationale: El verbo griego expresa la acción de hacer surgir o levantar algo. En español, «levantó» comunica bien la imagen bíblica sin sonar forzado, y permite conservar la fuerza del gesto divino. Evito una perífrasis más interpretativa que desplace la metáfora.
- source_word: κέρας σωτηρίας
  english_pob_choice: a horn of salvation
  chosen_spanish: un cuerno de salvación
  alternatives_spanish:
  - un poderoso salvador
  - un cuerno que trae salvación
  lexicon: BDAG
  rationale: Se conserva la metáfora bíblica de «cuerno», que en el trasfondo veterotestamentario simboliza fuerza, poder y liberación victoriosa. La traducción literal preserva la tensión poética y la resonancia intertextual; una paráfrasis como «poderoso salvador» aclararía, pero perdería la imagen.
- source_word: ἡμῖν
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - a nosotros
  - por nosotros
  lexicon: BDAG
  rationale: El dativo de ventaja se expresa de modo natural en español con «para nosotros», destacando el beneficio de la acción divina. «A nosotros» sería menos idiomático aquí.
- source_word: ἐν οἴκῳ Δαυὶδ
  english_pob_choice: in the house of David
  chosen_spanish: en la casa de David
  alternatives_spanish:
  - de la casa de David
  - en el linaje de David
  lexicon: BDAG
  rationale: Se mantiene la expresión literal «casa de David» porque en español también funciona como designación dinástica y conserva la carga covenantal. No se sustituye por «linaje» en el texto principal para no diluir la imagen recibida del griego.
- source_word: παιδὸς αὐτοῦ
  english_pob_choice: his servant
  chosen_spanish: su esclavo
  alternatives_spanish:
  - su siervo
  - su servidor
  lexicon: BDAG
  rationale: En esta tradición de traducción, παῖς cuando designa la relación de dependencia de un varón respecto de Dios o de un superior puede renderizarse con fuerza como «esclavo» para no suavizar el vínculo de pertenencia y servicio. Aunque en otros contextos «siervo» sería más habitual, aquí el POB en inglés opta por «servant» sin domesticar la relación; «esclavo» mantiene esa fuerza léxica en español.
theological_decisions:
- issue: Conservar o interpretar la metáfora de «cuerno de salvación»
  english_pob_reading: 'Preserve the metaphor in the main text: ''a horn of salvation'''
  chosen_spanish_reading: 'Conservar la metáfora en el texto principal: «un cuerno de salvación»'
  alternative_spanish_readings:
  - un poderoso salvador
  - un salvador poderoso
  rationale: La frase griega es una imagen bíblica estable y no un mero título abstracto. Mantenerla en español preserva la continuidad con el trasfondo del AT y evita reducir el alcance simbólico de la salvación divina a una simple descripción funcional.
  doctrine_reference: Principio de primacía del texto original; preservación de metáforas teológicas y literarias
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado más reciente del audit trail en inglés, sin cambios de revisión pendientes y con acuerdo alto en la evaluación cruzada. Se conserva la metáfora principal y se ajusta el castellano para que sea publicable, manteniendo la fuerza del griego sin introducir paráfrasis no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «casa de David» como expresión dinástica natural en español.
  - Se usa «cuerno de salvación» de forma consistente con la imagen bíblica preservada en el inglés POB.
  - Se eligió «esclavo» para reflejar la fuerza relacional de παῖς en este contexto, aun reconociendo que «siervo» sería una alternativa más tradicional.
  - La nota al pie ofrece la alternativa interpretativa sin desplazar la imagen principal del texto.
