review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien la estructura principal del griego: «levantó», «un cuerno de salvación», «para nosotros» y «en la casa de David». También mantiene correctamente la metáfora central y la nota alternativa. Sin embargo, falla en παιδὸς αὐτοῦ: aquí, referido a David en relación con Dios, el sentido es «su siervo/servidor», no «su esclavo».'
  spanish_quality_summary: El español es mayormente claro y natural, pero «David, su esclavo» suena impropio en registro bíblico y además semánticamente desacertado para este contexto. «Su siervo» es más fiel, más idiomático y mejor alineado con el uso bíblico en español. La puntuación con coma es aceptable, aunque sin coma también sería natural.
  glossary_alignment: Buena alineación general con la terminología del proyecto, excepto que la preferencia general por «esclavo» para δοῦλος no aplica automáticamente a παῖς. Dado el audit trail inglés y el uso bíblico para David, debe usarse «siervo» como excepción contextual documentada.
  issues:
  - severity: high
    issue: «su esclavo» para παιδὸς αὐτοῦ
    rationale: El griego usa παῖς, no δοῦλος, y en este contexto davídico/covenantal significa «siervo». «Esclavo» introduce una fuerza léxica distinta, choca con la decisión inglesa «his servant» y resulta poco natural al hablar de David como siervo de Dios.
  - severity: low
    issue: Anclaje de nota en «su esclavo[a]»
    rationale: La nota explica la alternativa de «cuerno de salvación», por lo que debe anclarse a esa frase, no a «su siervo».
  revised_spanish_text: y levantó para nosotros un cuerno de salvación[a] en la casa de David, su siervo.
