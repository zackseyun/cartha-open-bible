translation:
  language: es
  text: Y al instante se le abrió la boca, y también la lengua[b], y comenzó a hablar[a], bendiciendo a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hablaba, bendiciendo a Dios». El imperfecto de ἐλάλει puede enfatizar la continuación del habla más que su comienzo.'
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones dicen «se le soltó la lengua» o «su lengua fue desatada», pero el griego aquí dice literalmente «y también la lengua», mencionando explícitamente la restauración del habla sin añadir esa imagen.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεῴχθη
  english_pob_choice: was opened
  chosen_spanish: se le abrió
  alternatives_spanish:
  - fue abierta
  - se abrió
  lexicon: BDAG
  rationale: El aoristo pasivo se expresa de forma natural en español con una pasiva refleja o dativa de interés. 'Se le abrió' conserva la apertura súbita y el matiz pasivo sin forzar un agente.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  - Entonces
  lexicon: BDAG
  rationale: δέ funciona como un conector narrativo suave; 'Y' mantiene la continuidad sin introducir contraste ni énfasis innecesario.
- source_word: στόμα
  english_pob_choice: mouth
  chosen_spanish: la boca
  alternatives_spanish:
  - la boca
  - su boca
  lexicon: BDAG
  rationale: En español, 'boca' es la equivalencia anatómica natural y más idiomática para στόμα en este contexto de habla restaurada.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: Expresa bien la rapidez súbita del adverbio griego con un registro claro y natural en español.
- source_word: γλῶσσα
  english_pob_choice: his tongue also
  chosen_spanish: la lengua
  alternatives_spanish:
  - su lengua
  - la lengua también
  lexicon: BDAG
  rationale: Se mantiene el paralelo con 'la boca' y se preserva el órgano de la palabra. El 'también' queda incorporado en la coordinación con 'y', sin añadir una glosa extra que suene pesada en español.
- source_word: ἐλάλει
  english_pob_choice: he began speaking
  chosen_spanish: hablaba
  alternatives_spanish:
  - comenzó a hablar
  - se puso a hablar
  lexicon: BDAG
  rationale: El imperfecto puede indicar acción en desarrollo; 'hablaba' evita sobre-especificar el inicio de la acción. La nota de la POB inglesa sobre una posible lectura de continuidad queda reflejada en una forma que no impone 'comenzó'.
- source_word: εὐλογῶν
  english_pob_choice: blessing
  chosen_spanish: bendiciendo
  alternatives_spanish:
  - alabando
  - diciendo bendiciones a
  lexicon: BDAG
  rationale: Participio de modo/acompañamiento; 'bendiciendo' conserva el léxico directo de εὐλογέω y encaja de manera natural con el verbo principal.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: En español, el complemento directo personal con 'a' es obligatorio cuando se personifica a Dios. Se mantiene el referente simple y reverente sin necesidad de añadir artículo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando las notas [a] y [b] directamente en el texto español. La redacción sigue de cerca el griego y el audit trail inglés, especialmente en el valor aspectual de ἐλάλει y en la ausencia de una glosa explícita tipo 'was loosed'.
  spanish_consistency_notes:
  - Se usó 'Dios' con mayúscula como referente divino estándar en español.
  - Se prefirió 'la boca' sobre un calco de 'mouth' porque es el término natural y preciso en español.
  - No se añadió 'comenzó a' para ἐλάλει, dejando abierta la lectura continua o de inicio que la nota inglesa documenta.
  - '''Bendiciendo'' conserva la fuerza de εὐλογῶν sin sustituirla por ''alabando'', que es posible pero menos exacto léxicamente.'
