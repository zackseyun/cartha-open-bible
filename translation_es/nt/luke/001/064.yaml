    text: Or 'he was speaking, blessing God.' The imperfect verb may emphasize continued speaking rather than the beginning of speech.
    reason: lexical_alternative
  - marker: b
    text: Some translations render 'and his tongue was loosed,' but the Greek here literally says 'and his tongue also,' explicitly mentioning the restoration of speech without adding 'was loosed.'
