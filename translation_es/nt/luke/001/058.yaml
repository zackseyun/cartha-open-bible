translation:
  language: es
  text: Y oyeron sus vecinos y sus parientes que Yahvé había mostrado gran misericordia con ella[a], y se regocijaban con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «había engrandecido su misericordia con ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: περίοικοι
  english_pob_choice: neighbors
  chosen_spanish: vecinos
  alternatives_spanish:
  - los que vivían alrededor
  - personas cercanas
  lexicon: BDAG
  rationale: Denota a quienes vivían en el entorno inmediato. «Vecinos» es el equivalente natural en español y conserva la referencia social concreta.
- source_word: συγγενεῖς
  english_pob_choice: relatives
  chosen_spanish: parientes
  alternatives_spanish:
  - familiares
  - deudos
  lexicon: BDAG
  rationale: El término apunta a los consanguíneos o allegados de parentesco. «Parientes» es claro, natural y suficientemente preciso.
- source_word: ἐμεγάλυνεν
  english_pob_choice: had shown great mercy
  chosen_spanish: había mostrado gran misericordia
  alternatives_spanish:
  - había magnificado su misericordia
  - había hecho grande su misericordia
  lexicon: BDAG
  rationale: Aunque μεγαλύνω puede leerse literalmente como «magnificar/hacer grande», en este contexto el sentido idiomático es que Yahvé manifestó su misericordia de manera abundante. «Había mostrado gran misericordia» comunica el efecto sin perder la amplitud del verbo.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: En este proyecto, κύριος en contexto divino se traduce como «Yahvé» según el estándar del texto español. Aquí el sujeto es claramente el Dios de Israel, no un simple título honorífico.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - bondad
  lexicon: BDAG
  rationale: ἔλεος suele referirse a misericordia o compasión misericordiosa. «Misericordia» es la forma más estable y teológicamente fiel en español.
- source_word: μετ’ αὐτῆς
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - para ella
  - hacia ella
  lexicon: BDAG
  rationale: La preposición μετά con genitivo significa normalmente «con». En español, «con ella» mantiene la relación gramatical y evita sobreinterpretar la frase.
- source_word: συνέχαιρον αὐτῇ
  english_pob_choice: they rejoiced with her
  chosen_spanish: se regocijaban con ella
  alternatives_spanish:
  - se alegraban con ella
  - compartían su alegría
  lexicon: BDAG
  rationale: συγχαίρω expresa alegrarse junto con alguien. «Se regocijaban con ella» conserva el sentido de gozo compartido y el tono un poco elevado del texto narrativo.
theological_decisions:
- issue: Tratamiento del nombre divino κύριος en un contexto de acción misericordiosa
  english_pob_reading: the Lord had shown great mercy to her
  chosen_spanish_reading: Yahvé había mostrado gran misericordia con ella
  alternative_spanish_readings:
  - el Señor había mostrado gran misericordia con ella
  rationale: Dado que el sujeto es el Dios de Israel en un contexto bíblico narrativo, el texto español usa «Yahvé» conforme al principio del proyecto de no enmascarar el nombre divino. Esto preserva la referencia teológica del original y mantiene coherencia con el resto de la traducción.
  doctrine_reference: 'Proyecto POB: YHWH -> Yahvé en el texto principal'
- issue: Cómo reflejar el idiomático μεγαλύνω + ἔλεος sin volverlo demasiado mecánico
  english_pob_reading: the Lord had shown great mercy to her
  chosen_spanish_reading: había mostrado gran misericordia con ella
  alternative_spanish_readings:
  - había magnificado su misericordia con ella
  - había hecho grande su misericordia con ella
  rationale: El griego contiene una tensión entre la metáfora de «hacer grande/magnificar» y el sentido idiomático de «mostrar misericordia». En español, «había mostrado gran misericordia» transmite el resultado comunicativo reconocido por la revisión inglesa, mientras conserva el énfasis en la abundancia de la misericordia.
  doctrine_reference: Transparencia original-lingüística y equivalencia óptima auditable
translation_notes:
  revision_awareness: La revisión inglesa reciente reemplazó una formulación demasiado literal («had greatly magnified his mercy with her») por una más natural («had shown great mercy to her»). La versión española sigue ese juicio revisado, pero conserva la posibilidad interpretativa del verbo griego en la nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de acuerdo con el estándar del proyecto para κύριος en contexto divino.
  - Se prefirió «parientes» frente a «familiares» por su mayor naturalidad y precisión relacional.
  - «Se regocijaban con ella» preserva el gozo compartido del verbo συγχαίρω sin reducirlo a simple felicitación.
  - La nota a recoge la alternativa idiomática relevante, equivalente a la observación inglesa.
