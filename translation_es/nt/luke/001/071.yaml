lexical_decisions:
- source_word: σωτηρίαν
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: «σωτηρίαν» puede abarcar una liberación concreta, pero en el contexto lucano y del cántico de Zacarías conviene conservar el peso teológico de «salvación». En español, «salvación» comunica tanto la liberación histórica como la resonancia redentora sin reducir el término a un mero alivio político.
- source_word: ἐξ ἐχθρῶν ἡμῶν
  english_pob_choice: from our enemies
  chosen_spanish: de nuestros enemigos
  alternatives_spanish:
  - de en medio de nuestros enemigos
  - fuera de nuestros enemigos
  - de la mano de nuestros enemigos
  lexicon: BDAG
  rationale: «ἐξ» con genitivo expresa origen o separación. En español, «de nuestros enemigos» es natural y fiel al movimiento de salida/separación. Añadir «poder» aquí sería explicativo y no está explícito en esta primera expresión.
- source_word: ἐκ χειρὸς
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la autoridad de
  - fuera de la mano de
  lexicon: BDAG
  rationale: «χείρ» en este giro idiomático puede aludir a control o poder, pero el POB inglés conservó «hand» para mantener el color bíblico e intertextual. En español, «de la mano de» preserva ese mismo giro sin perder inteligibilidad.
- source_word: πάντων τῶν μισούντων ἡμᾶς
  english_pob_choice: all who hate us
  chosen_spanish: todos los que nos odian
  alternatives_spanish:
  - todos los que nos aborrecen
  - todos nuestros enemigos que nos odian
  - todos los que nos están odiando
  lexicon: BDAG
  rationale: El participio presente funciona sustantivado; «todos los que nos odian» transmite bien el valor actual o característico del verbo. «Odiar» es el equivalente más directo y moderno en español, y evita oscurecer el carácter relacional del odio.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - así como
  lexicon: BDAG
  rationale: La conjunción coordina dos frases preposicionales sin matiz adicional relevante; «y» es la opción más simple y exacta en español.
theological_decisions:
- issue: Alcance de la salvación prometida
  english_pob_reading: Preserve both concrete deliverance from hostile enemies and the broader theological sense of salvation without narrowing it to merely political or merely spiritual rescue.
  chosen_spanish_reading: Conservar tanto la liberación concreta de enemigos hostiles como el peso teológico más amplio de «salvación», sin limitar el versículo a una sola dimensión.
  alternative_spanish_readings:
  - liberación puramente política o nacional
  - salvación puramente espiritual del pecado
  rationale: El versículo menciona enemigos y odiadores reales, pero en Lucas 1 el lenguaje de salvación también participa del horizonte redentor más amplio. La traducción debe retener esa tensión sin resolverla de antemano.
  doctrine_reference: Preservar la tensión teológica del texto.
translation_notes:
  revision_awareness: La revisión más reciente no exigió cambios; el texto español mantiene esa estabilidad y sigue de cerca el griego, con la misma tensión semántica que el POB inglés preservó entre salvación y liberación.
  spanish_consistency_notes:
  - Se usa «salvación» para σωτηρίαν, en coherencia con el tono lucano y con el valor teológico del cántico.
  - Se conserva «de la mano de» para χείρ por su idiomática bíblica, equivalente al inglés auditado.
  - «Todos los que nos odian» reproduce el participio sustantivado sin volverlo un sustantivo más interpretativo como «aborrecedores».
  - La nota al pie recoge la alternativa semántica documentada en el POB inglés, adaptada al español sin añadir nuevos matices.
