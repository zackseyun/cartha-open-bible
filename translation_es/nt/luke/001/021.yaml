translation:
  language: es
  text: Y el pueblo esperaba a Zacarías, y se maravillaba de su demora en el templo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más precisamente, «en el santuario», refiriéndose al lugar sagrado interior del templo y no a los atrios exteriores.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λαὸς / λαός
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo allí
  lexicon: BDAG
  rationale: El griego usa un sustantivo colectivo singular para el grupo reunido afuera; en español, «el pueblo» comunica de manera natural ese colectivo sin perder el sentido corporativo.
- source_word: προσδοκῶν
  english_pob_choice: were waiting for
  chosen_spanish: esperaba
  alternatives_spanish:
  - estaba esperando a
  - aguardaba a
  lexicon: BDAG
  rationale: El participio con ἦν expresa acción continua; en español «esperaba» conserva bien la duratividad y resulta más natural que una perífrasis pesada.
- source_word: Ζαχαρίαν
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  lexicon: convención onomástica
  rationale: Se usa la forma española estándar del nombre propio.
- source_word: ἐθαύμαζον
  english_pob_choice: they were marveling
  chosen_spanish: se maravillaba
  alternatives_spanish:
  - se asombraba
  - se quedaba admirado
  lexicon: BDAG
  rationale: El imperfecto indica reacción continua; «se maravillaba» preserva la fuerza de asombro y funciona bien con el sujeto colectivo singular «el pueblo».
- source_word: ἐν τῷ χρονίζειν ... αὐτόν
  english_pob_choice: at his delay
  chosen_spanish: de su demora
  alternatives_spanish:
  - porque tardaba
  - mientras él tardaba
  - por su tardanza
  lexicon: BDAG; gramática griega
  rationale: La construcción con infinitivo articular señala la circunstancia de tardanza; «de su demora» transmite ese valor de manera compacta y natural en español, sin convertir el matiz en una explicación interpretativa excesiva.
- source_word: ναῷ
  english_pob_choice: the temple / sanctuary (footnote alternative)
  chosen_spanish: el santuario
  alternatives_spanish:
  - el templo
  lexicon: BDAG
  rationale: ναός designa aquí el espacio sagrado interior, más precisamente «el santuario» que el recinto general del templo. En español, esta opción conserva la distinción que la nota inglesa preservaba.
theological_decisions:
- issue: Distinción entre ναός y el recinto general del templo
  english_pob_reading: More precisely, “in the sanctuary,” referring to the temple proper rather than the wider temple courts.
  chosen_spanish_reading: «en el santuario», es decir, en la parte sagrada interior y no en los atrios exteriores.
  alternative_spanish_readings:
  - en el templo
  - en el recinto del templo
  rationale: La distinción espacial es lexical y narrativa, no doctrinal, pero conviene preservarla porque el texto describe el lugar exacto donde Zacarías se demoraba. «Santuario» evita borrar esa precisión.
  doctrine_reference: No aplica; nota léxica y contextual.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió una formulación más natural para la última cláusula («at his delay in the temple») sin perder el valor de la construcción griega ἐν τῷ χρονίζειν ... αὐτόν. En español, se optó por una expresión igualmente natural («de su demora en el santuario») y por una nota que conserva la precisión espacial de ναός.
  spanish_consistency_notes:
  - Se mantuvo «Zacarías» como forma española del nombre propio.
  - Se eligió «santuario» para ναός, siguiendo la precisión léxica documentada.
  - La frase verbal en imperfecto («esperaba», «se maravillaba») refleja la continuidad del contexto narrativo.
  - No se usó «SEÑOR» ni terminología teológica no pertinente; el verso es puramente narrativo.
