translation:
  language: es
  text: Ahora bien, sucedió[a] que, mientras él servía como sacerdote delante de Dios en el orden de su división,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras él realizaba servicio sacerdotal delante de Dios en la rotación de su división».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now it happened
  chosen_spanish: Ahora bien, sucedió
  alternatives_spanish:
  - Y sucedió
  - Aconteció
  - Entonces sucedió
  lexicon: BDAG
  rationale: La fórmula narrativa introduce un nuevo desarrollo. «Sucedió» conserva el valor eventivo de ἐγένετο, y «Ahora bien» refleja el matiz de transición suave de δέ sin sonar arcaico.
- source_word: ἐν τῷ ἱερατεύειν αὐτὸν
  english_pob_choice: while he was serving as priest
  chosen_spanish: mientras él ejercía el sacerdocio
  alternatives_spanish:
  - mientras él servía como sacerdote
  - cuando él ejercía el ministerio sacerdotal
  - mientras él desempeñaba funciones sacerdotales
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν tiene valor temporal («mientras/cuando»). ἱερατεύω indica servicio sacerdotal; «ejercía el sacerdocio» preserva la acción cultual sin forzar una paraphrasis eclesiástica. «Servía como sacerdote» sería natural, pero algo más interpretativo.
- source_word: τάξει τῆς ἐφημερίας
  english_pob_choice: in the order of his division
  chosen_spanish: en el orden de su división
  alternatives_spanish:
  - en el orden de su turno
  - en la rotación de su división
  - en el orden de su clase
  lexicon: BDAG
  rationale: τάξις se refiere al orden o disposición prescritos; «orden» es la equivalencia más directa. ἐφημερία designa la división sacerdotal o turno asignado; «división» mantiene la estructura institucional y evita el anacronismo de «curso».
- source_word: ἔναντι τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en la presencia de Dios
  - a la vista de Dios
  lexicon: BDAG
  rationale: La expresión señala servicio realizado en la presencia de Dios. «Delante de Dios» es idiomático en español bíblico y conserva el valor relacional sin cambiar el registro a uno demasiado técnico.
theological_decisions:
- issue: Descripción del servicio sacerdotal de Zacarías
  english_pob_reading: serving as priest before God in the order of his division
  chosen_spanish_reading: ejercía el sacerdocio delante de Dios, en el orden de su división
  alternative_spanish_readings:
  - servía como sacerdote delante de Dios, en el orden de su división
  - desempeñaba funciones sacerdotales delante de Dios, en la rotación de su división
  rationale: 'No hay controversia doctrinal, pero sí una decisión terminológica: mantener el marco histórico-cultual del templo sin introducir lenguaje eclesiástico posterior. La traducción conserva la relación entre servicio sacerdotal, orden de turno y presencia divina.'
  doctrine_reference: Principio de primacía de los idiomas originales; claridad moderna; preservación del sentido cultual sin importación denominacional.
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el tramo auditado en inglés; no se observan revisiones posteriores que modifiquen el sentido. Se mantiene la fórmula narrativa y el tecnicismo cultual de manera transparente.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se mantiene «división» para ἐφημερία, coherente con la decisión inglesa y apto para lectores modernos.
  - Se evita «SEÑOR» porque el griego aquí dice θεοῦ, no κύριος.
  - Se conserva un registro bíblico moderno, pero sin calcos innecesarios ni arcaísmos como «aconteció que» donde no aportan claridad.
