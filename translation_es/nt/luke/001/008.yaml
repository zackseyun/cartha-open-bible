  glossary_alignment: 'No hay conflicto con los términos del proyecto: θεοῦ está correctamente como «Dios»; no aparecen Yahvé, Mesías, Espíritu, etc. La elección de «división» para ἐφημερίας concuerda con la auditoría inglesa. La alternativa de nota con «rotación» es aceptable. El punto principal es estilístico-sintáctico, no terminológico.'
