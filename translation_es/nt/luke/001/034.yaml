review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: δὲ como giro discursivo, «María», «al ángel», «¿Cómo será esto?» y la cláusula causal. Sin embargo, «no conozco varón» con presente simple en español suena menos natural y no refleja tan bien la decisión auditada del POB inglés de usar una forma perfecta («I have not known a man») para preservar mejor el valor aspectual y el sentido contextual. La nota léxica está bien orientada.'
  spanish_quality_summary: El texto es claro y digno, pero «no conozco varón» resulta algo tieso y menos idiomático en español actual. «No he conocido varón» conserva la literalidad bíblica con mejor naturalidad formal. También conviene ajustar la nota a «de manera más idiomática» y mantener coherencia verbal con el texto principal.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Ángel» y «María» están bien. La elección de «varón» es defendible por resonancia bíblica y registro eufemístico, aunque «hombre» también sería posible; no requiere cambio. No hay términos teológicos del glosario principal comprometidos.
  issues:
  - severity: medium
    issue: Tiempo verbal de «οὐ γινώσκω» en español
    rationale: Aunque el griego está en presente, el POB inglés documentó y revisó a «I have not known a man» para reflejar mejor el sentido contextual/formal. En español, «no he conocido varón» preserva mejor ese mismo enfoque que «no conozco varón», que suena más como estado presente general.
  - severity: low
    issue: Naturalidad del giro español
    rationale: «No conozco varón» es comprensible, pero en español bíblico moderno «no he conocido varón» suena más natural y solemne sin perder transparencia al modismo.
