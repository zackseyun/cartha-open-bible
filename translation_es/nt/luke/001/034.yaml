translation:
  language: es
  text: 'Pero María dijo al ángel[a]: «¿Cómo será esto, puesto que no he conocido varón?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «puesto que no he tenido relaciones con un varón». El griego «conocer un varón» es una expresión modesta que se refiere a relaciones sexuales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: En español, «Pero» comunica bien el leve giro discursivo entre la explicación del ángel y la pregunta de María, sin exagerar una oposición fuerte.
- source_word: Μαριὰμ
  english_pob_choice: Mary
  chosen_spanish: María
  alternatives_spanish:
  - Mariam
  lexicon: Transliteración tradicional del nombre propio
  rationale: «María» es la forma española estable y natural del nombre, fiel al referente personal del texto.
- source_word: πρὸς τὸν ἄγγελον
  english_pob_choice: to the angel
  chosen_spanish: al ángel
  alternatives_spanish:
  - al mensajero
  lexicon: BDAG
  rationale: «Ángel» es la equivalencia más natural y precisa en este contexto lucano de un ser celestial; «mensajero» sería posible léxicamente, pero menos adecuado aquí.
- source_word: Πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera?
  lexicon: BDAG
  rationale: Interrogativo directo de modo o posibilidad; «¿Cómo?» reproduce con naturalidad la pregunta griega.
- source_word: ἔσται
  english_pob_choice: will this be
  chosen_spanish: será
  alternatives_spanish:
  - sucederá
  - ocurrirá
  lexicon: BDAG
  rationale: En español, «¿Cómo será esto?» conserva la sencillez verbal del griego y la referencia a la realidad anunciada sin añadir una paráfrasis excesiva.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - ello
  lexicon: BDAG
  rationale: Pronombre demostrativo neutro que remite a lo anunciado; «esto» es la correspondencia directa y transparente.
- source_word: ἐπεὶ
  english_pob_choice: since
  chosen_spanish: puesto que
  alternatives_spanish:
  - ya que
  - porque
  lexicon: BDAG
  rationale: «Puesto que» expresa con claridad la causa o razón de la pregunta en un registro sobrio y digno.
- source_word: ἄνδρα
  english_pob_choice: a man
  chosen_spanish: varón
  alternatives_spanish:
  - un hombre
  - un marido
  lexicon: BDAG
  rationale: Aunque ἀνήρ puede significar «hombre» o «marido», aquí el giro idiomático apunta a la relación sexual con un varón. «Varón» suena más natural en español litúrgico para preservar el matiz del dicho sin forzar «marido».
- source_word: οὐ γινώσκω
  english_pob_choice: I have not known
  chosen_spanish: no conozco
  alternatives_spanish:
  - no he conocido
  - no tengo relaciones con
  lexicon: BDAG
  rationale: El griego emplea un eufemismo para relaciones sexuales. En el texto principal, «no conozco» conserva la literalidad y la transparencia; la nota explica el sentido idiomático sin sustituirlo por una paráfrasis.
theological_decisions:
- issue: La virginidad de María y el sentido idiomático de «conocer varón»
  english_pob_reading: Retain the literal idiom in the main text, with a note explaining the sexual implication.
  chosen_spanish_reading: Mantener «no conozco varón» en el cuerpo principal, con nota que explicita que es un eufemismo para relaciones sexuales.
  alternative_spanish_readings:
  - puesto que no he tenido relaciones con un hombre
  - pues soy virgen
  rationale: El griego no dice explícitamente «soy virgen», sino un modismo sobrio. La traducción principal debe conservar esa forma para no introducir más de lo que el texto dice, mientras la nota hace accesible el sentido implícito para lectores modernos.
  doctrine_reference: Credo de los Apóstoles; Credo Niceno; filosofía de traducción POB sobre transparencia textual
translation_notes:
  revision_awareness: 'La redacción sigue el patrón revisado del POB en inglés: mantiene la estructura directa de la pregunta de María y conserva el eufemismo literal en el texto principal, añadiendo una nota explicativa para el valor idiomático.'
  spanish_consistency_notes:
  - Se usa «ángel» en coherencia con el uso lucano del ser celestial.
  - Se prefiere «varón» para reflejar el matiz idiomático de ἄνδρα sin expandir innecesariamente el texto.
  - Se mantiene la puntuación de cita directa y la nota al pie junto al sintagma correspondiente para asegurar transparencia y audibilidad del razonamiento.
