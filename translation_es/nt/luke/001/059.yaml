translation:
  language: es
  text: Y aconteció que al octavo día vinieron para circuncidar al niño, y lo estaban llamando Zacarías[a], con el nombre de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «lo estaban llamando con/el nombre de su padre, Zacarías», en referencia a la costumbre de ponerle a un hijo el nombre de un familiar. O «lo llamaban Zacarías»; el imperfecto griego puede sugerir una acción en curso o un intento de nombrarlo, en tensión con la corrección del versículo siguiente.
    reason: cultural_note
lexical_decisions:
- source_word: Καὶ ἐγένετο
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: γίνομαι
  rationale: La fórmula narrativa de Lucas introduce un hecho. «Aconteció» conserva el valor de evento sin sonoridad arcaica excesiva y sigue bien el patrón lucano.
- source_word: ἐν τῇ ἡμέρᾳ τῇ ὀγδόῃ
  english_pob_choice: on the eighth day
  chosen_spanish: al octavo día
  alternatives_spanish:
  - en el octavo día
  - el día octavo
  lexicon: ἡμέρα
  rationale: En español, la construcción temporal natural es «al octavo día», que mantiene la referencia precisa al día señalado sin perder la fuerza del dativo temporal.
- source_word: ἦλθον
  english_pob_choice: they came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - fueron
  lexicon: ἔρχομαι
  rationale: El griego plural deja implícito el sujeto; «vinieron» conserva esa pluralidad e indefinición sin añadir información no presente en el texto.
- source_word: περιτεμεῖν
  english_pob_choice: to circumcise
  chosen_spanish: circuncidar
  alternatives_spanish:
  - para hacer la circuncisión de
  - para circuncidar
  lexicon: περιτέμνω
  rationale: El infinitivo de finalidad se expresa de modo natural con «para circuncidar». Es directo y fiel al acto ritual mencionado.
- source_word: τὸ παιδίον
  english_pob_choice: the child
  chosen_spanish: al niño
  alternatives_spanish:
  - al niño pequeño
  - al bebé
  lexicon: παιδίον
  rationale: «Niño» es un equivalente claro y digno para παιδίον en este contexto. «Bebé» sería más interpretativo; «niño pequeño» alarga sin aportar más precisión.
- source_word: ἐκάλουν
  english_pob_choice: they were calling
  chosen_spanish: lo estaban llamando
  alternatives_spanish:
  - lo llamaban
  - empezaban a llamarlo
  lexicon: καλέω
  rationale: El imperfecto sugiere acción en curso o intentada. «Lo estaban llamando» preserva ese matiz mejor que un pretérito simple, y deja abierta la tensión que se resuelve en el versículo siguiente.
- source_word: ἐπὶ τῷ ὀνόματι τοῦ πατρὸς αὐτοῦ
  english_pob_choice: after the name of his father
  chosen_spanish: según el nombre de su padre
  alternatives_spanish:
  - por el nombre de su padre
  - con el nombre de su padre
  lexicon: ὄνομα
  rationale: La expresión griega apunta a la costumbre de poner al hijo el nombre de un familiar. «Según el nombre de su padre» conserva la relación con el patrón nominal sin forzar una paráfrasis más amplia.
- source_word: Ζαχαρίαν
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  - Zacharías
  lexicon: Ζαχαρίας
  rationale: Se usa la forma española establecida del nombre propio. Mantiene reconocimiento y coherencia bíblica en español.
theological_decisions:
- issue: El imperfecto en «ἐκάλουν» puede indicar intento o acción en curso, no solo un nombramiento ya cerrado.
  english_pob_reading: they were calling him Zechariah
  chosen_spanish_reading: lo estaban llamando Zacarías
  alternative_spanish_readings:
  - lo llamaban Zacarías
  - querían llamarlo Zacarías
  rationale: La traducción conserva la incompletud aspectual del imperfecto, de modo que la lectura narrativa queda abierta a la corrección inmediata del versículo siguiente. No se fija prematuramente un nombramiento consumado.
  doctrine_reference: Aspecto verbal griego; coherencia narrativa con Lucas 1:60-63
translation_notes:
  revision_awareness: El texto base y el control de revisión indican alta concordancia y sin cambios necesarios; por eso se mantiene la estructura narrativa y la tensión del imperfecto, ajustando solo la naturalidad del español.
  spanish_consistency_notes:
  - Se preserva «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «Zacarías» como forma española del nombre propio, en continuidad con el uso bíblico común en español.
  - Se conserva la distinción aspectual de ἐκάλουν con una perífrasis progresiva, evitando aplanarla a un pretérito simple.
