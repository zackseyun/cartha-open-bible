  yaml_path: translation/nt/luke/001/059.yaml
  text: And it happened that on the eighth day they came to circumcise the child[a], and they were calling him Zechariah[b], after the name of his father.
  footnotes:
  - marker: a
    text: Or 'they called him Zechariah.' The Greek imperfect ('they were calling') may suggest an attempted or ongoing naming, which fits the correction in the following verse.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they were calling him by/after the name of his father, Zechariah,' referring to the custom of naming a child after a family member.
    reason: cultural_note
