translation:
  language: es
  text: Porque, he aquí[a], cuando llegó el sonido de tu saludo a mis oídos, el bebé saltó de alegría en mi vientre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el bebé saltó en exultación en mi vientre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - mira, pues
  - he aquí
  lexicon: BDAG
  rationale: ἰδοὺ es un marcador discursivo de llamada de atención. En español, 'mira' conserva esa fuerza vívida de atención inmediata sin depender de un giro arcaico. 'He aquí' sería más tradicional, pero menos natural en este contexto narrativo.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La partícula introduce explicación o justificación respecto del enunciado previo. 'Porque' expresa bien esa relación causal-explicativa en español actual y mantiene la conexión discursiva.
- source_word: ὡς ἐγένετο
  english_pob_choice: when ... came
  chosen_spanish: tan pronto como llegó
  alternatives_spanish:
  - cuando llegó
  - en cuanto llegó
  lexicon: BDAG
  rationale: La construcción temporal señala el momento en que ocurrió la acción. 'Tan pronto como llegó' reproduce con naturalidad la inmediatez del griego y el encadenamiento de la escena.
- source_word: φωνὴ
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: BDAG
  rationale: En el contexto se enfatiza la percepción auditiva del saludo al llegar a los oídos de Elisabet. 'Sonido' refleja mejor esa dimensión sensorial que 'voz', sin borrar que se trata del saludo pronunciado.
- source_word: ἀσπασμοῦ
  english_pob_choice: greeting
  chosen_spanish: saludo
  alternatives_spanish:
  - salutación
  lexicon: BDAG
  rationale: '''Saludo'' es el equivalente natural y preciso en español; ''salutación'' es correcto pero más formal y menos corriente.'
- source_word: εἰς τὰ ὦτά μου
  english_pob_choice: into my ears
  chosen_spanish: a mis oídos
  alternatives_spanish:
  - en mis oídos
  - hasta mis oídos
  lexicon: BDAG
  rationale: El griego usa εἰς con valor direccional. En español, 'a mis oídos' conserva el movimiento hacia el órgano de audición de manera idiomática y clara.
- source_word: ἐσκίρτησεν
  english_pob_choice: leaped
  chosen_spanish: saltó
  alternatives_spanish:
  - brincó
  - dio un salto
  lexicon: BDAG
  rationale: El verbo expresa un movimiento súbito y enérgico. 'Saltó' transmite el gesto corporal con naturalidad en español, y permite luego especificar el matiz afectivo del contexto.
- source_word: ἐν ἀγαλλιάσει
  english_pob_choice: for joy
  chosen_spanish: de alegría
  alternatives_spanish:
  - con alegría
  - en exultación
  - de exultación
  lexicon: BDAG
  rationale: La frase indica modo o acompañamiento afectivo. 'De alegría' mantiene el vínculo directo con el motivo de júbilo; además, evita un tecnicismo como 'exultación' que sonaría menos natural.
- source_word: τὸ βρέφος
  english_pob_choice: the baby
  chosen_spanish: el bebé
  alternatives_spanish:
  - el niño
  - el infante
  lexicon: BDAG
  rationale: βρέφος designa al niño en etapa muy temprana, incluso prenatal en este contexto. 'Bebé' conserva la concreción y la naturalidad del texto, sin añadir interpretaciones extra.
- source_word: ἐν τῇ κοιλίᾳ μου
  english_pob_choice: in my womb
  chosen_spanish: en mi vientre
  alternatives_spanish:
  - en mi seno
  - en mi matriz
  lexicon: BDAG
  rationale: Aunque el sentido preciso es 'útero/vientre materno', 'vientre' funciona bien en español bíblico contemporáneo y evita la dureza de un término más técnico. Mantiene la imagen corporal de la escena.
theological_decisions:
- issue: Referencia al niño no nacido como βρέφος
  english_pob_reading: the baby
  chosen_spanish_reading: el bebé
  alternative_spanish_readings:
  - el niño
  - el infante
  rationale: El texto describe al hijo de Elisabet aún en el vientre. La traducción conserva la designación concreta del griego sin desarrollar una tesis adicional; simplemente mantiene la identidad del sujeto en el nivel léxico del pasaje.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió 'look' a 'behold' y ajustó 'with joy' a 'for joy'. Para el español se optó por un equivalente discursivo natural ('mira') y por una construcción afectiva idiomática ('de alegría'), manteniendo la relación temporal y la imaginería corporal del griego.
  spanish_consistency_notes:
  - Se preservó el paralelismo entre el saludo que llega a los oídos y el movimiento del bebé en el vientre.
  - Se evitó 'SEÑOR' o equivalentes porque este versículo no contiene el nombre divino ni una cita directa de κύριος.
  - '''Vientre'' se eligió como español natural y reverente para κοιλία en este contexto prenatal.'
  - La nota alternativa se ancló explícitamente en el texto con [a], conforme a la validación requerida.
