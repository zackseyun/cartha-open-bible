translation:
  language: es
  text: Y María se quedó con ella como tres meses[a], y regresó a su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «unos tres meses»; ὡς con una expresión temporal puede indicar aproximación.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔμεινεν
  english_pob_choice: stayed
  chosen_spanish: se quedó
  alternatives_spanish:
  - permaneció
  - se mantuvo
  lexicon: μένω
  rationale: El aoristo de μένω aquí expresa que María permaneció por un tiempo en un lugar. En español, «se quedó» comunica con naturalidad esa permanencia temporal sin perder el valor narrativo.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - entonces
  lexicon: δέ
  rationale: δέ funciona como conector suave. «Y» conserva la continuidad narrativa de manera sobria y natural en español.
- source_word: Μαριὰμ
  english_pob_choice: Mary
  chosen_spanish: María
  alternatives_spanish:
  - Mariam
  lexicon: Μαριάμ
  rationale: El nombre propio se adapta a la forma usual en español bíblico, «María», que es transparente para el lector y corresponde al referente de Lucas.
- source_word: σὺν αὐτῇ
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - junto con ella
  lexicon: σύν + dativo
  rationale: σύν con dativo indica compañía. «Con ella» es el equivalente directo y natural en español; el contexto identifica a Isabel como la persona acompañada.
- source_word: ὡς μῆνας τρεῖς
  english_pob_choice: about three months
  chosen_spanish: como tres meses
  alternatives_spanish:
  - unos tres meses
  - aproximadamente tres meses
  lexicon: ὡς + expresión temporal
  rationale: ὡς con una medida temporal suele introducir aproximación. «Como tres meses» mantiene esa indefinición sin sobreexplicar el matiz.
- source_word: ὑπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: regresó
  alternatives_spanish:
  - volvió
  - retornó
  lexicon: ὑποστρέφω
  rationale: El verbo indica volver a un lugar previo. «Regresó» expresa bien ese movimiento de retorno en un registro moderno y digno.
- source_word: εἰς τὸν οἶκον αὐτῆς
  english_pob_choice: to her home
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su hogar/casa
  lexicon: οἶκος
  rationale: οἶκος puede significar casa, hogar o casa/familia según el contexto. Aquí el sentido es espacial y personal, y «a su casa» es claro en español sin forzar el término hacia «hogar» o «familia».
theological_decisions:
- issue: Valor de aproximación en la duración de la estancia
  english_pob_reading: about three months
  chosen_spanish_reading: como tres meses
  alternative_spanish_readings:
  - unos tres meses
  - aproximadamente tres meses
  rationale: 'No hay un debate doctrinal aquí, pero sí un matiz semántico importante: el griego usa ὡς para señalar aproximación. La traducción debe conservar esa indeterminación temporal.'
  doctrine_reference: Lexical precision / fidelity to temporal approximation
translation_notes:
  revision_awareness: 'Se revisó el tramo y no se requirieron cambios sustanciales: la lectura griega y la solución inglesa están en alta concordancia, con el único matiz relevante de la aproximación en ὡς μῆνας τρεῖς.'
  spanish_consistency_notes:
  - Se mantiene un español neutral y publicable, con terminología bíblica sobria.
  - «María» se usa como forma estándar del nombre propio en español.
  - «Se quedó» y «regresó» preservan la secuencia narrativa sin calco excesivo.
  - La nota al pie se ancla en la expresión temporal para reflejar el valor aproximado de ὡς.
