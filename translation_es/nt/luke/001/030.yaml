translation:
  language: es
  text: 'Y el ángel le dijo: «No temas, María, porque has hallado favor[a] ante Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «gracia»: el sustantivo griego χάρις puede significar tanto «gracia» como «favor»; en la expresión «hallar favor ante Dios», «favor» reproduce mejor el modismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - dijo
  lexicon: BDAG
  rationale: El aoristo narrativo de λέγω se expresa de manera natural en español con 'le dijo'; conserva el acto de habla directo sin añadir matices que el griego no exige.
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En el relato de la infancia de Lucas, el referente es un ser celestial; 'ángel' es la equivalencia contextual e idiomática adecuada.
- source_word: Μὴ φοβοῦ
  english_pob_choice: Do not be afraid
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas, María
  lexicon: BDAG
  rationale: La prohibición con μή + imperativo se traduce de forma breve y solemne con 'No temas'. En español mantiene la fuerza exhortativa y el tono bíblico sin sonar arcaico.
- source_word: Μαριάμ
  english_pob_choice: Mary
  chosen_spanish: María
  alternatives_spanish:
  - Maríam
  lexicon: standard proper-name convention
  rationale: El nombre se adapta a la forma usual en español bíblico, 'María', que es clara y reconocible para la lectura pública.
- source_word: εὗρες
  english_pob_choice: you have found
  chosen_spanish: has hallado
  alternatives_spanish:
  - has encontrado
  - hallaste
  lexicon: BDAG
  rationale: 'El perfecto español comunica bien el estado resultante de la acción: María queda como alguien que ya ha hallado favor.'
- source_word: χάριν
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  lexicon: BDAG
  rationale: En la expresión idiomática 'hallar favor ante Dios', 'favor' reproduce mejor la construcción y evita resolver prematuramente la tensión semántica de χάρις entre 'gracia' y 'favor'.
- source_word: παρὰ τῷ θεῷ
  english_pob_choice: with God
  chosen_spanish: ante Dios
  alternatives_spanish:
  - con Dios
  - delante de Dios
  lexicon: BDAG
  rationale: Con παρά + dativo tras 'hallar favor', el sentido idiomático es la aprobación o aceptación en la presencia de Dios; 'ante Dios' es natural en español y preserva ese valor relacional.
theological_decisions:
- issue: χάρις en un contexto de anuncio a María
  english_pob_reading: favor
  chosen_spanish_reading: favor
  alternative_spanish_readings:
  - gracia
  rationale: La frase griega εὑρίσκω χάριν παρά + dativo es un modismo de aceptación favorable. Traducirla como 'favor' evita introducir una formulación doctrinal posterior, pero deja abierta la resonancia de 'gracia' que el mismo término puede tener en otros contextos.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve lexical tension where the source does not force a single theological gloss.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y el criterio auditado del POB en inglés: mantiene ''favor'' para χάρις en este modismo, conserva el tono directivo de la prohibición y usa una estructura española natural para una lectura pública sin perder precisión semántica.'
  spanish_consistency_notes:
  - Se prefirió 'No temas' sobre 'No tengas miedo' por sobriedad y correspondencia con el tono bíblico.
  - '''Ante Dios'' se eligió por su valor idiomático en español y su capacidad de representar παρά + dativo en este contexto.'
  - Se evitó 'SEÑOR' porque el versículo usa θεός, no el tetragrama ni κύριος como sustituto.
