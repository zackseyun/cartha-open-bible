lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Se mantiene la coordinación simple del griego sin añadir una idea temporal más fuerte que la del texto.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: El aoristo narrativo de λέγω se vierte naturalmente como «dijo» en español, con el mismo valor introductorio.
- source_word: Μαριάμ
  english_pob_choice: Mary
  chosen_spanish: María
  alternatives_spanish:
  - Mariam
  lexicon: BDAG
  rationale: Se usa el nombre bíblico habitual en español; «María» es la forma inteligible y establecida para el lector hispanohablante.
- source_word: Μεγαλύνει
  english_pob_choice: magnifies
  chosen_spanish: magnifica
  alternatives_spanish:
  - engrandece
  - proclama la grandeza de
  lexicon: BDAG
  rationale: «Magnifica» conserva el valor verbal y la imagen del verbo μεγαλύνω sin explicitar una paráfrasis más interpretativa. Mantiene el paralelismo poético del canto.
- source_word: ἡ ψυχή μου
  english_pob_choice: My soul
  chosen_spanish: Mi alma
  alternatives_spanish:
  - yo
  - mi ser interior
  lexicon: BDAG
  rationale: Se preserva la expresión antropológica y poética; «alma» evita reducirlo a un mero pronombre y corresponde bien al registro bíblico.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título reverente para Dios; en español, «el Señor» es la equivalencia directa y litúrgicamente comprensible, sin ocultar el carácter divino del término.
theological_decisions:
- issue: Título divino para κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  rationale: En este himno de alabanza, κύριος tiene peso teológico y apunta a Dios; «el Señor» comunica mejor ese uso reverente que una traducción como «el Maestro», demasiado estrecha para el contexto.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor'
- issue: Expresión antropológica ἡ ψυχή μου
  english_pob_reading: My soul
  chosen_spanish_reading: Mi alma
  alternative_spanish_readings:
  - yo
  - mi ser interior
  rationale: La frase conserva el lenguaje poético-bíblico sin resolverlo en una formulación psicológica moderna. Así se mantiene la tensión entre sujeto personal y lenguaje del alma.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el pasaje griego y coincide con el audit trail inglés en las decisiones principales: coordinación simple, verbo narrativo de decir, nombre propio estándar, imagen verbal de μεγαλύνω y la traducción reverente de κύριος. No se requieren revisiones documentadas respecto del registro o del sentido.'
  spanish_consistency_notes:
  - Se mantiene el orden natural del español sin perder la estructura poética del griego.
  - «Magnifica» conserva mejor la imagen lexical que una paráfrasis amplia.
  - «Señor» respeta el valor teológico de κύριος y es la forma española más transparente para este contexto.
  - La nota alternativa refleja la tensión léxica entre traducción literal e interpretación de la alabanza.
