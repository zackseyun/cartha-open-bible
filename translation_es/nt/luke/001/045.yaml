  glossary_alignment: 'No hay conflicto con los términos base del proyecto salvo el tratamiento de κύριος. Aquí no corresponde «Yahvé», porque el texto griego usa κύριος, no el tetragrámaton. «Señor» está bien. El resto de las decisiones terminológicas coincide con la línea POB. La nota léxica b también puede afinarse: «accomplimiento» no es español estándar y no debe mantenerse ni como alternativa interna.'
