translation:
  language: es
  text: Y bienaventurada es la que creyó que habrá cumplimiento de lo que le fue dicho de parte del Señor[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque habrá cumplimiento de lo que le fue dicho de parte del Señor». El griego ὅτι puede leerse causalmente en algunos contextos, aunque aquí es más probable el sentido de contenido («que»).
    reason: alternative_reading
  - marker: b
    text: O «realización» o «consumación» para «cumplimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: μακαρία
  english_pob_choice: blessed
  chosen_spanish: bienaventurada
  alternatives_spanish:
  - bendita
  - feliz
  lexicon: BDAG
  rationale: «Bienaventurada» conserva el peso bíblico y reverente de μακάριος en Lucas mejor que «feliz», y evita volverlo una mera emoción subjetiva. «Bendita» puede sonar más tradicional, pero aquí «bienaventurada» mantiene el tono declarativo de dicha favorecida por Dios.
- source_word: πιστεύσασα
  english_pob_choice: she who believed
  chosen_spanish: la que creyó
  alternatives_spanish:
  - la que confió
  - la que tuvo fe
  lexicon: BDAG
  rationale: El participio articular se vierte de modo sustantivo y natural en español. «La que creyó» preserva el acto de creer como hecho completo y corresponde bien al uso lucano de πιστεύω. «Confió» es semánticamente posible, pero desplaza el énfasis léxico hacia confianza.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: En esta construcción, ὅτι introduce con mayor probabilidad el contenido de lo creído, no una causalidad. En español, «que» expresa esa subordinación de contenido con naturalidad. Se conserva la posibilidad causal en nota.
- source_word: τελείωσις
  english_pob_choice: fulfillment
  chosen_spanish: cumplimiento
  alternatives_spanish:
  - realización
  - consumación
  - accomplimiento
  lexicon: BDAG
  rationale: «Cumplimiento» refleja la idea de llegar a término lo prometido y encaja bien con lenguaje de promesa. En español bíblico es claro y menos forzado que «consumación»; «realización» también es posible, pero algo más abstracta.
- source_word: τοῖς λελαλημένοις
  english_pob_choice: of what was spoken
  chosen_spanish: de lo que le fue dicho
  alternatives_spanish:
  - de lo que fue hablado
  - de las cosas dichas
  lexicon: BDAG
  rationale: El participio perfecto pasivo con artículo apunta al contenido de lo ya dicho. «Le fue dicho» mantiene el valor pasivo y la referencia personal a María sin volver la frase pesada. «Lo que fue hablado» suena menos natural en español.
- source_word: παρὰ κυρίου
  english_pob_choice: by the Lord
  chosen_spanish: por el Señor
  alternatives_spanish:
  - del Señor
  - de parte del Señor
  lexicon: BDAG
  rationale: Aunque παρά con genitivo puede expresar fuente/origen, el sentido en la revisión inglesa quedó como agente/source with speaking. En español, «por el Señor» es la forma más natural para el origen de lo dicho. Se evita «del Señor» para no perder la relación personal de autoría, y «de parte del Señor» sería más perifrástico.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: Se conserva el título reverente habitual en español para κύριος en este contexto. Aquí se refiere al Dios de Israel como fuente de la promesa.
theological_decisions:
- issue: Relación entre la bienaventuranza de María y su fe en la promesa
  english_pob_reading: Mary is pronounced blessed because she believed that the Lord's spoken promise would be fulfilled.
  chosen_spanish_reading: María es declarada bienaventurada porque creyó que se cumpliría lo que el Señor le dijo.
  alternative_spanish_readings:
  - María es bienaventurada porque habrá cumplimiento de lo que le fue dicho por el Señor.
  - María es bienaventurada por haber creído en el cumplimiento de la palabra del Señor.
  rationale: La sintaxis favorece unir el participio con una cláusula de contenido introducida por «que». El español refleja así el énfasis de Lucas en la fe en la promesa divina sin añadir desarrollos doctrinales ajenos al versículo. Se preserva la tensión entre la bendición declarada y el cumplimiento prometido.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla de antemano.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión reciente en παρὰ κυρίου: de «from the Lord» a «by the Lord» por naturalidad y precisión. En español se decidió «por el Señor», que conserva el matiz de agente/origen en una formulación idiomática. También se mantuvo la preferencia por el sentido de contenido de ὅτι, como en la versión inglesa final.'
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος, conforme al estándar del proyecto y al contexto de la promesa divina.
  - Se usa «bienaventurada» para μακαρία, manteniendo el registro bíblico sin sonar arcaico.
  - Se mantiene el verbo «creyó» para πιστεύσασα, evitando reemplazarlo por «confió» sin una justificación contextual.
  - «Cumplimiento» expresa bien τελείωσις en un contexto de promesa; se deja constancia de las alternativas.
  - La preposición «por» en «por el Señor» refleja de manera natural la fuente/autoría de lo dicho sin borrar el valor de παρά con genitivo.
