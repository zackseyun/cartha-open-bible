translation:
  language: es
  text: para dar conocimiento de la salvación a su pueblo en el perdón[a] de sus pecados,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por el perdón' o 'mediante el perdón'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ δοῦναι
  english_pob_choice: to give
  chosen_spanish: para dar
  alternatives_spanish:
  - para conceder
  - para otorgar
  lexicon: δίδωμι
  rationale: El infinitivo articular expresa propósito; en español, 'para dar' conserva esa relación final de manera natural y directa. 'Conceder' u 'otorgar' son posibles, pero suenan más interpretativos y menos inmediatos para este contexto.
- source_word: γνῶσιν
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría
  - entendimiento
  lexicon: γνῶσις
  rationale: '''Conocimiento'' es el equivalente más directo de γνῶσις y preserva el vínculo léxico sin especificar indebidamente el tipo de saber. ''Entendimiento'' o ''sabiduría'' desplazan el matiz hacia la comprensión o la prudencia.'
- source_word: σωτηρίας
  english_pob_choice: of salvation
  chosen_spanish: de la salvación
  alternatives_spanish:
  - de la liberación
  - de rescate
  lexicon: σωτηρία
  rationale: '''Salvación'' es la forma más estable y teológicamente apropiada en este contexto lucano. ''Liberación'' o ''rescate'' pueden ser válidos en ciertos contextos, pero aquí reducirían la amplitud soteriológica del término.'
- source_word: τῷ λαῷ αὐτοῦ
  english_pob_choice: to his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - para su pueblo
  lexicon: λαός
  rationale: El dativo marca destinatario; en español, 'a su pueblo' reproduce bien esa función. 'Pueblo' conserva el sentido colectivo/covenantal de λαός mejor que 'gente' o una formulación más genérica.
- source_word: ἐν ἀφέσει
  english_pob_choice: in the forgiveness
  chosen_spanish: en el perdón[a]
  alternatives_spanish:
  - por el perdón
  - mediante el perdón
  - a través del perdón
  lexicon: ἄφεσις
  rationale: Se mantiene la preposición 'en' para reflejar la sintaxis griega y preservar la tensión interpretativa que el POB inglés conserva. 'Perdón' es una traducción natural de ἄφεσις; se evita resolver demasiado pronto la relación como causal o instrumental.
- source_word: ἁμαρτιῶν αὐτῶν
  english_pob_choice: of their sins
  chosen_spanish: de sus pecados
  alternatives_spanish:
  - de sus faltas
  - de su pecado
  lexicon: ἁμαρτία
  rationale: 'El plural debe mantenerse: ''pecados''. ''Faltas'' suaviza demasiado el alcance moral; ''pecado'' en singular borra el plural explícito del griego.'
theological_decisions:
- issue: Relación entre salvación y perdón de los pecados
  english_pob_reading: The verse presents salvation as known in connection with, and concretely expressed by, the forgiveness of sins.
  chosen_spanish_reading: El versículo presenta el conocimiento de la salvación en conexión con, y concretamente expresado en, el perdón de los pecados.
  alternative_spanish_readings:
  - El versículo puede entenderse como salvación conocida mediante el perdón de los pecados.
  - El versículo puede entenderse como salvación conocida por el perdón de los pecados.
  rationale: La frase ἐν ἀφέσει ἁμαρτιῶν αὐτῶν permite varias relaciones cercanas en español. Mantener 'en el perdón' conserva la amplitud sintáctica y no obliga a escoger entre una lectura causal, instrumental o de esfera cuando el griego no exige una sola.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma indebida.
translation_notes:
  revision_awareness: Coincide con el análisis revisado del texto fuente y con el acuerdo alto del control cruzado; no se requirieron cambios respecto al último pase.
  spanish_consistency_notes:
  - Se mantiene 'salvación' para σωτηρία y 'perdón' para ἄφεσις, evitando sustituirlos por vocabulario más explicativo.
  - Se conserva el orden natural del español sin perder los principales vínculos sintácticos del griego.
  - La puntuación coloca una coma antes de la frase preposicional final para reflejar la estructura de la cláusula y facilitar la lectura pública.
