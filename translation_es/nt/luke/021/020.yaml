revisions:
- from: Pero cuando vean a Jerusalén rodeada[a] por ejércitos[b], entonces sepan que su desolación ha llegado cerca.
  to: Pero cuando vean a Jerusalén rodeada por ejércitos[a], entonces sepan que su desolación[b] se ha acercado.
  rationale: Se reemplaza «ha llegado cerca» por «se ha acercado», que expresa de forma natural en español el perfecto de ἐγγίζω y mantiene el matiz de cercanía resultante. Se elimina la nota innecesaria en «rodeada» y se conserva la alternativa relevante para στρατόπεδα. Además, se añade la nota de referencia cruzada sobre «desolación» para reflejar el rastro auditado del POB inglés y preservar la resonancia profética del término.
