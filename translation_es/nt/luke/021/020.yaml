    rationale: Aunque intenta reflejar «has drawn near», en español bíblico y general la forma idiomática es «se ha acercado» o «está cerca». La redacción actual distrae y reduce la calidad del texto.
  - severity: medium
    issue: Falta la nota sobre la resonancia profética de «desolación» presente en el POB inglés
    rationale: El rastro inglés preserva explícitamente una referencia cruzada importante a Mateo 24:15 y Marcos 13:14. Dado que «desolación» es una decisión teológica/lexical significativa, conviene mantenerla también en español.
  - severity: low
    issue: La nota en «rodeada» no corresponde a una nota preservada en el POB inglés
    rationale: El inglés no añadió nota a «surrounded» sino a «armies» y «desolation». La alternativa «cercada» es legítima, pero no necesaria; mantener notas solo donde aportan valor evita sobrecargar el texto.
  revised_spanish_text: Pero cuando vean a Jerusalén rodeada por ejércitos[a], entonces sepan que su desolación[b] se ha acercado.
