base_translation:
  language: en
  yaml_path: translation/nt/luke/021/020.yaml
  text: But when you see Jerusalem surrounded by armies[b][a], then know that her desolation has drawn near.
  footnotes:
  - marker: a
    text: Or 'surrounded by military encampments.' The Greek term can refer to camps or encamped armies; here it denotes the forces besieging Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: '''Desolation'' echoes prophetic judgment language; compare the related wording in Matthew 24:15 and Mark 13:14.'
    reason: cross_reference
