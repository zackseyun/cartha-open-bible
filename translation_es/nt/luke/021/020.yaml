translation:
  language: es
  text: Pero cuando vean a Jerusalén rodeada por ejércitos[a], entonces sepan que su desolación[b] se ha acercado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por campamentos militares». El término griego puede referirse a campamentos o a tropas acampadas; aquí señala a las fuerzas que sitian Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: «Desolación» evoca el lenguaje profético de juicio; compárese la redacción relacionada en Mateo 24:15 y Marcos 13:14.
    reason: cross_reference
lexical_decisions:
- source_word: Ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cuandoquiera que
  - siempre que
  lexicon: BDAG
  rationale: Introduce una condición futura con matiz temporal; en español, «cuando» es la forma más natural y fiel en este contexto profético.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca una transición discursiva leve desde el contexto anterior. «Pero» conserva ese giro sin exagerarlo.
- source_word: ἴδητε
  english_pob_choice: you see
  chosen_spanish: vean
  alternatives_spanish:
  - vean con sus propios ojos
  - perciban
  lexicon: BDAG
  rationale: 'El aoristo subjuntivo tras ὅταν funciona naturalmente en español con presente de subjuntivo en una condición futura: «cuando vean».'
- source_word: κυκλουμένην
  english_pob_choice: surrounded
  chosen_spanish: rodeada
  alternatives_spanish:
  - cercada
  - circundada
  lexicon: BDAG
  rationale: Participio pasivo que describe el estado de Jerusalén. «Rodeada» es claro y natural en español, y conserva la idea de cerco militar.
- source_word: ὑπὸ στρατοπέδων
  english_pob_choice: by armies
  chosen_spanish: por ejércitos
  alternatives_spanish:
  - por campamentos militares
  - por fuerzas militares acampadas
  lexicon: BDAG
  rationale: στρατόπεδον puede referirse a campamento o a tropas acampadas, pero en este contexto el sentido es el de fuerzas sitiadoras. «Ejércitos» comunica con claridad el hecho histórico y militar.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: standard proper name
  rationale: Nombre propio tradicional en español y plenamente transparente para lectores de lengua española.
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - en ese momento
  lexicon: BDAG
  rationale: Adverbio temporal que señala la consecuencia; «entonces» es la opción más directa y natural.
- source_word: γνῶτε
  english_pob_choice: know
  chosen_spanish: sepan
  alternatives_spanish:
  - reconozcan
  - entiendan
  lexicon: BDAG
  rationale: Imperativo aoristo dirigido a la comprensión del signo. «Sepan» preserva la fuerza exhortativa y resulta idiomático en plural.
- source_word: ἤγγικεν
  english_pob_choice: has drawn near
  chosen_spanish: ha llegado cerca
  alternatives_spanish:
  - está cerca
  - se ha acercado
  lexicon: BDAG
  rationale: El perfecto de ἐγγίζω expresa un estado resultante de acercamiento. «Ha llegado cerca» mantiene esa idea de proceso completado con resultado presente; también deja visible la cercanía sin reducirla a un simple «está cerca».
- source_word: ἡ ἐρήμωσις αὐτῆς
  english_pob_choice: her desolation
  chosen_spanish: su desolación
  alternatives_spanish:
  - su devastación
  - su ruina
  lexicon: BDAG
  rationale: 'ἐρήμωσις conserva el peso profético de «desolación». En español, el posesivo concuerda naturalmente con Jerusalén implícita: «su desolación». Se evita explicitar una interpretación más amplia que el texto no dice aquí.'
theological_decisions:
- issue: Alcance profético de «desolación»
  english_pob_reading: Render ἐρήμωσις as 'desolation' without specifying a later interpretive framework beyond the city's impending devastation.
  chosen_spanish_reading: Traducir ἐρήμωσις como «desolación» sin añadir en el texto principal un marco escatológico más amplio que el verso no explicita.
  alternative_spanish_readings:
  - destrucción
  - devastación
  rationale: «Desolación» mantiene la resonancia bíblica y la carga profética del término. Evita resolver la tensión interpretativa o desplazar el énfasis a una interpretación posterior no presente en el versículo.
  doctrine_reference: Mantener la tensión profética sin resolverla de manera interpretativa.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y el auditorial inglés de la POB, conservando la secuencia condicional-temporal y el valor perfecto de ἤγγικεν. Se evita sobreinterpretar la ‘desolación’ y se mantiene la imagen militar del sitio con una solución española natural.
  spanish_consistency_notes:
  - Se usa «Jerusalén» para el nombre propio en forma estándar española.
  - Se traduce ἐρήμωσις como «desolación» para conservar el eco profético señalado en el audit trail inglés.
  - Se evita «SEÑOR» o terminología ajena al versículo; no hay referencias al nombre divino en este pasaje.
  - La estructura «cuando… entonces…» refleja bien la relación gramatical del griego.
  - Las notas alternativas se limitan a las ambigüedades léxicas realmente presentes en el texto.
