revisions:
- from: Y habrá señales en el sol, en la luna y en las estrellas[a], y sobre la tierra angustia de naciones, en perplejidad[b] por el estruendo del mar y el bramido de las olas.
  to: Y habrá señales en el sol, en la luna y en las estrellas[a], y sobre la tierra angustia de naciones en perplejidad por el estruendo del mar y el oleaje[b].
  rationale: Se quitó la coma para mantener unida la construcción «angustia de naciones en perplejidad». Se sustituyó «bramido de las olas» por «oleaje» para reflejar mejor σάλου sin sobreinterpretación. Se corrigió la nota [b] para que preserve la alternativa literal documentada en el POB inglés, y se ajustó la nota [a] a una alternativa real frente al texto principal con artículos.
