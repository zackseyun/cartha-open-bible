translation:
  language: es
  text: Y habrá señales en el sol, en la luna y en las estrellas[a], y sobre la tierra angustia de naciones en perplejidad por el estruendo del mar y el oleaje[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en sol, luna y estrellas».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «al sonido del mar y su agitación».
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - portentos
  lexicon: BDAG
  rationale: '''Señales'' conserva el valor amplio de σημεῖα sin cargar innecesariamente una lectura ominosa. ''Portentos'' sería más interpretativo y ''signos'' también es posible, pero ''señales'' suena natural en español bíblico contemporáneo.'
- source_word: ἐν ἡλίῳ καὶ σελήνῃ καὶ ἄστροις
  english_pob_choice: in sun and moon and stars
  chosen_spanish: en el sol, en la luna y en las estrellas
  alternatives_spanish:
  - en el sol, la luna y las estrellas
  - en el sol, y la luna y las estrellas
  lexicon: BDAG
  rationale: Se mantiene la estructura coordinada del griego y, en español, los artículos explícitos hacen la frase natural sin alterar el sentido. El texto no obliga a decidir aquí entre 'en' espacial o local/relacional, así que se conserva la fórmula directa.
- source_word: συνοχὴ
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - opresión
  - angustia apremiante
  lexicon: BDAG
  rationale: συνοχή expresa presión o constricción; 'angustia' comunica bien esa idea en español y funciona con el genitivo colectivo 'de naciones'. 'Aflicción' es válida, pero 'angustia' transmite mejor la sensación de estrechez y desasosiego.
- source_word: ἐθνῶν
  english_pob_choice: of nations
  chosen_spanish: de naciones
  alternatives_spanish:
  - de las naciones
  - entre las naciones
  - de los pueblos
  lexicon: BDAG
  rationale: Aquí ἔθνη designa a las naciones en sentido amplio, no específicamente 'gentiles' en contraste con judíos. 'De naciones' refleja el genitivo sin sobreespecificar.
- source_word: ἐν ἀπορίᾳ
  english_pob_choice: in perplexity
  chosen_spanish: en perplejidad
  alternatives_spanish:
  - desconcertadas
  - sin salida
  - en desconcierto
  lexicon: BDAG
  rationale: '''Perplejidad'' preserva el matiz de estar sin camino o sin salida y mantiene el tono formal del pasaje. ''Desconcierto'' es posible, pero ''perplejidad'' conserva mejor la equivalencia con el sustantivo abstracto del griego.'
- source_word: ἤχους θαλάσσης
  english_pob_choice: because of the roaring of the sea
  chosen_spanish: por el estruendo del mar
  alternatives_spanish:
  - a causa del ruido del mar
  - por el rugido del mar
  - por el estrépito del mar
  lexicon: BDAG
  rationale: El griego apunta causalmente al ruido/estruendo del mar. 'Estruendo' captura el valor sonoro fuerte de ἦχος en contexto marítimo y suena natural en español.
- source_word: σάλου
  english_pob_choice: the surging waves
  chosen_spanish: el bramido de las olas
  alternatives_spanish:
  - el oleaje
  - el vaivén de las olas
  - el agitarse del mar
  lexicon: BDAG
  rationale: σάλος expresa agitación, vaivén o sacudida; 'bramido de las olas' ofrece una imagen idiomática que acompaña al 'estruendo del mar' y evita la dureza de una traducción demasiado literal. La decisión mantiene la fuerza poética sin borrar el movimiento turbulento.
theological_decisions:
- issue: Naturaleza de las señales celestes y del trastorno en la tierra
  english_pob_reading: Render the language straightforwardly as apocalyptic signs without explaining whether they are literal astronomical events, symbolic imagery, or both.
  chosen_spanish_reading: Traducir el lenguaje de manera directa como señales apocalípticas, sin decidir si se trata de fenómenos astronómicos literales, imágenes simbólicas o ambas cosas.
  alternative_spanish_readings:
  - fenómenos cósmicos literales
  - imaginería político-simbólica principal
  rationale: El versículo anuncia señales en los astros y angustia en la tierra, pero no resuelve la cuestión interpretativa. La traducción debe conservar esa tensión y no imponer un sistema escatológico ajeno al texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego y toma en cuenta el ajuste revisado en el POB inglés que hizo explícita la causa ('because of'). En español se refleja con 'por', que mantiene el valor causal de ἐν ἀπορίᾳ ἤχους... sin añadir interpretación adicional. También se conservó la tensión apocalíptica del texto, evitando precisar si las señales son literales o simbólicas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aplica.
  - Se mantiene 'señales' para σημεῖα y no se sustituye por 'portentos' para no estrechar el sentido.
  - '''Perplejidad'' se usa con valor de desconcierto sin salida, coherente con el registro bíblico contemporáneo.'
  - '''Mar'' y ''olas'' se prefieren a formulaciones más arcaicas para mayor claridad y fluidez.'
  - La puntuación conserva la coordinación en serie típica del griego apocalíptico.
