translation:
  language: es
  text: como una trampa[a][b][c]. Pues vendrá sobre todos los que habitan sobre la faz de toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "como un lazo".
    reason: lexical_alternative
  - marker: b
    text: O "todos los que están sentados/viven sobre la faz de toda la tierra". El giro griego se refiere idiomáticamente a quienes habitan o residen en la tierra.
    reason: lexical_alternative
  - marker: c
    text: O "toda la tierra" en el sentido de "toda la región/país"; sin embargo, aquí "toda la tierra" con alcance universal encaja mejor con la frase.
    reason: alternative_reading
lexical_decisions:
- source_word: ὡς παγίς
  english_pob_choice: like a trap
  chosen_spanish: como una trampa
  alternatives_spanish:
  - como una red
  - como un lazo
  lexicon: BDAG
  rationale: παγίς designa un dispositivo para atrapar; en español, "trampa" comunica con claridad la imagen súbita e ineludible. "Como" reproduce ὡς sin añadir matiz interpretativo.
- source_word: ἐπεισελεύσεται
  english_pob_choice: it will come upon
  chosen_spanish: vendrá sobre
  alternatives_spanish:
  - vendrá encima de
  - se abatirá sobre
  - sobrevendrá
  lexicon: BDAG
  rationale: El verbo expresa venir encima de alguien o alcanzarlo de manera repentina. "Vendrá sobre" conserva la fuerza del aviso y resulta natural en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí γάρ introduce la razón de la advertencia anterior. "Porque" expresa bien la conexión causal en español moderno y digno.
- source_word: ἐπὶ πάντας
  english_pob_choice: upon all
  chosen_spanish: sobre todos
  alternatives_spanish:
  - encima de todos
  - contra todos
  lexicon: BDAG
  rationale: ἐπί con acusativo indica movimiento hacia/encima de. "Sobre todos" mantiene el tono solemne y la relación con el verbo.
- source_word: τοὺς καθημένους
  english_pob_choice: those dwelling
  chosen_spanish: los que habitan
  alternatives_spanish:
  - los que viven
  - los que están sentados
  lexicon: BDAG
  rationale: Aunque el verbo literalmente significa "sentarse", en esta expresión idiomática se refiere a quienes residen en la tierra. "Habitan" comunica el sentido idiomático sin perder gravedad.
- source_word: ἐπὶ πρόσωπον
  english_pob_choice: on the face of
  chosen_spanish: sobre la faz de
  alternatives_spanish:
  - sobre la superficie de
  - en la faz de
  lexicon: BDAG
  rationale: La locución conserva un giro semítico común. "Faz" reproduce el registro bíblico y hace natural la expresión en español.
- source_word: πάσης τῆς γῆς
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - todo el país
  lexicon: BDAG
  rationale: γῆ puede significar "tierra" o "país/land". En este contexto de alcance universal, "toda la tierra" sigue la lectura amplia adoptada por el POB en inglés.
theological_decisions:
- issue: Alcance de γῆ
  english_pob_reading: the whole earth
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - todo el país
  - toda la tierra habitada
  rationale: La formulación completa, con "los que habitan sobre la faz de toda la tierra", favorece un alcance universal. Traducir "tierra" mantiene la amplitud escatológica sin estrechar el sentido a una región.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el trazado auditado en inglés. Se conserva la imagen de una trampa y la construcción idiomática de "habitar sobre la faz"; no se detectaron revisiones aplicadas en el expediente inglés más reciente.
  spanish_consistency_notes:
  - Se prefirió "trampa" por claridad moderna, manteniendo la fuerza de παγίς.
  - '"Habitan" traduce el participio idiomático sin convertirlo en una descripción literal de estar sentado.'
  - '"Sobre la faz de" conserva el sabor bíblico del semitismo y evita una paráfrasis plana.'
  - '"Tierra" se usa en sentido amplio y universal, coherente con el contexto escatológico.'
