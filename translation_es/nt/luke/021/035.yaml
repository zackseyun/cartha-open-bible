review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: la imagen de παγίς como trampa, el valor causal de γάρ, el sentido idiomático de τοὺς καθημένους como quienes habitan, y el alcance universal de πάσης τῆς γῆς. Sin embargo, las notas al pie no preservan con suficiente fidelidad las alternativas del expediente inglés: para παγίς conviene ''lazo'' o ''trampa''/''red'' con mejor precisión; para la alternativa de γῆ la nota debe contrastar ''toda la tierra'' con ''toda la tierra/el mundo entero'' vs. ''toda la región/la tierra'', no repetir casi el texto principal con ''la tierra entera''.'
  spanish_quality_summary: El español es claro y digno. 'Porque vendrá sobre' es correcto, pero 'Pues vendrá sobre' suena algo más natural en continuidad con el versículo previo sin perder el valor de γάρ. La frase 'sobre la faz de toda la tierra' es bíblica y legible. El principal ajuste necesario está en las notas, no en la sintaxis principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La elección 'tierra' para γῆ concuerda con la decisión teológica documentada, pero la nota alternativa debe reflejar correctamente la opción 'land' como 'tierra/región/país', no solo 'la tierra entera'.
  issues:
  - severity: medium
    issue: La nota [a] traduce παγίς como 'red' en vez de preservar mejor la alternativa 'lazo'/'snare'.
    rationale: El expediente inglés distingue 'trap' como principal y 'snare' como alternativa. 'Red' no es imposible, pero es menos precisa y puede sugerir un instrumento distinto al matiz de 'lazo'.
  - severity: high
    issue: La nota [c] no reproduce la alternativa semántica principal de γῆ como 'land/tierra/región', sino una simple reformulación de 'whole earth'.
    rationale: El inglés conserva la alternativa exegética 'the whole land'. La nota española 'la tierra entera' no introduce esa posibilidad y por tanto no preserva el razonamiento lexical/teológico auditado.
  - severity: low
    issue: '''Porque'' es aceptable, pero ''Pues'' encaja mejor como conector explicativo en español bíblico fluido dentro de la misma oración discursiva.'
    rationale: No es error de fidelidad, pero mejora la naturalidad y el tono sin alterar el sentido.
  revised_spanish_text: como una trampa[a][b][c]. Pues vendrá sobre todos los que habitan sobre la faz de toda la tierra.
