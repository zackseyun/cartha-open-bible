    changes_summary: Changed 'have happened' to 'happen' to better reflect the Greek aorist subjunctive γένηται after ἕως ἂν in natural English future sense. Retained 'will certainly not pass away' for οὐ μὴ παρέλθῃ.
translation:
  language: es
  text: En verdad les digo[a] que esta generación[b] de ningún modo pasará hasta que suceda todo[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Les aseguro». La fórmula griega mantiene un habla directa y autoritativa.
    reason: lexical_alternative
  - marker: b
    text: O «este pueblo» o «esta era»; la palabra griega puede entenderse de más de una manera, aunque «generación» es la traducción más directa.
    reason: alternative_reading
  - marker: c
    text: O «ocurra» o «tenga lugar». γένηται señala el acontecimiento de lo dicho.
    reason: lexical_alternative
  - marker: d
    text: Algunas traducciones ponen «todo esto», tomándolo del contexto circundante; el griego aquí simplemente dice «todo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: ¡Amén!
  alternatives_spanish:
  - En verdad
  - Ciertamente
  lexicon: BDAG
  rationale: Conserva la fórmula solemne de afirmación al inicio del dicho. En español, «Amén» funciona de manera natural como marcación enfática y mantiene la fuerza litúrgica y declarativa del griego.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: Les digo
  alternatives_spanish:
  - Les digo a ustedes
  - Les aseguro
  lexicon: BDAG
  rationale: Reproduce la fórmula directa de discurso sin volverla más interpretativa de lo que permite el griego. «Les digo» es natural en español y mantiene el valor de primera persona singular con destinatario plural.
- source_word: οὐ μὴ παρέλθῃ
  english_pob_choice: will certainly not pass away
  chosen_spanish: no pasará de ningún modo
  alternatives_spanish:
  - no pasará ciertamente
  - de ninguna manera pasará
  lexicon: BDAG
  rationale: οὐ μή con subjuntivo aoristo expresa negación enfática fuerte. «No pasará de ningún modo» conserva esa contundencia sin sonar forzado en español.
- source_word: ἡ γενεὰ αὕτη
  english_pob_choice: this generation
  chosen_spanish: esta generación
  alternatives_spanish:
  - este pueblo
  - esta era
  lexicon: BDAG
  rationale: «Generación» es la correspondencia más directa para γενεά y preserva la tensión interpretativa documentada sin resolverla en el texto principal.
- source_word: ἕως ἂν
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  lexicon: BDAG
  rationale: Equivale de manera natural al valor temporal de la construcción griega e introduce el límite temporal de la acción precedente.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo esto
  lexicon: BDAG
  rationale: El neutro plural admite «todo» en español cuando el contexto ya delimita el conjunto. Se evita añadir «estas» porque el griego no la expresa explícitamente.
- source_word: γένηται
  english_pob_choice: happen
  chosen_spanish: suceda
  alternatives_spanish:
  - ocurra
  - tenga lugar
  - se cumpla
  lexicon: BDAG
  rationale: En este contexto el verbo denota que algo ocurre o llega a suceder. «Suceda» refleja bien la referencia a acontecimiento sin introducir, en el texto principal, una lectura más fuerte como «se cumpla».
theological_decisions:
- issue: Sentido de γενεά en «esta generación»
  english_pob_reading: Render the phrase lexically as 'this generation' without resolving whether it refers to Jesus' contemporaries, the generation that sees the signs, or a people-group.
  chosen_spanish_reading: Traducir literalmente «esta generación» sin decidir su referente interpretativo.
  alternative_spanish_readings:
  - este pueblo
  - esta era
  - la generación que ve estas cosas
  rationale: La frase griega es clara en su forma, pero su referente sigue siendo debatido. La traducción preserva esa tensión en vez de resolverla por anticipado.
  doctrine_reference: Preservar la tensión interpretativa en lugar de cerrarla
- issue: Fuerza de la negación οὐ μή
  english_pob_reading: will certainly not pass away
  chosen_spanish_reading: no pasará de ningún modo
  alternative_spanish_readings:
  - ciertamente no pasará
  - de ninguna manera pasará
  rationale: La construcción griega expresa una negación enfática. El español elegido comunica con claridad esa fuerza sin perder naturalidad.
  doctrine_reference: Énfasis gramatical del griego conservado en español
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB que prefirió «happen» para γένηται después de ἕως ἄν, y el mantenimiento de la negación enfática de οὐ μή. La versión española sigue esa decisión al usar un verbo de acontecimiento natural («suceda») y una negación fuerte («no pasará de ningún modo»).
  spanish_consistency_notes:
  - Se conservó la fórmula directa de discurso sin elevarla a una paráfrasis.
  - No se añadió «estas» en «todo» porque el griego solo dice πάντα.
  - Se mantuvo «generación» para respetar la ambigüedad interpretativa documentada.
  - Los pies de nota están anclados en el texto con [a], [b] y [c].
