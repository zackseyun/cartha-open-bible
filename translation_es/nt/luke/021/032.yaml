  text: ἀμὴν λέγω ὑμῖν ὅτι οὐ μὴ παρέλθῃ ἡ γενεὰ αὕτη ἕως ἂν πάντα γένηται.
base_translation:
  language: en
  yaml_path: translation/nt/luke/021/032.yaml
  text: Truly I say to you[c][b][a], this generation will certainly not pass away until all things happen.
  footnotes:
  - marker: a
    text: Or 'this people' or 'this age'; the Greek word can be understood in more than one way, though 'generation' is the most direct rendering.
    reason: alternative_reading
  - marker: b
    text: Some translations read 'all these things,' supplying 'these' from the surrounding context; the Greek here simply says 'all things.'
    reason: lexical_alternative
  - marker: c
    text: Or 'take place' or 'come to pass.'
    reason: lexical_alternative
