revisions:
- from: ¡Amén![a] Les digo[b] que esta generación no pasará de ningún modo hasta que suceda[c] todo.
  to: En verdad les digo[a] que esta generación[b] de ningún modo pasará hasta que suceda todo[c][d].
  rationale: Se reemplaza «¡Amén!» por «En verdad» para reflejar mejor la función solemne de ἀμὴν en español natural y sin exclamación añadida. Se conserva «esta generación» como traducción principal de γενεά, pero se añade la nota exigida por el audit trail con las alternativas «este pueblo» y «esta era». Se mantiene la fuerza enfática de οὐ μή con «de ningún modo pasará», en orden más idiomático. También se conserva «suceda» para γένηται y se añade la nota sobre «todo» frente a «todo esto», conforme a la documentación inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:02:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: ἀμὴν + λέγω ὑμῖν, la negación enfática οὐ μὴ παρέλθῃ, «esta generación», y el límite temporal «hasta que …». Sin embargo, omite dos alternativas significativas preservadas en el rastro inglés: la ambigüedad de γενεά («generación / pueblo / era») y la nota sobre πάντα, donde el griego dice simplemente «todas las cosas / todo» y no «todas estas cosas».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «¡Amén!» al inicio suena menos natural que «En verdad» para una afirmación solemne de Jesús en español corriente. Además, la combinación «¡Amén! Les digo» introduce una exclamación innecesaria. «No pasará de ningún modo» comunica énfasis, pero resulta algo pesado; «de ningún modo pasará» suena más idiomático y mantiene mejor la fuerza. En conjunto, requiere un ajuste menor para mayor naturalidad y mejor correspondencia con las notas del POB.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Esta generación» conserva correctamente γενεά en el texto principal. Conviene añadir nota de alternativa para «pueblo/era» según el audit trail inglés, y nota para «todo» aclarando que el griego no añade «estas».
  issues:
  - severity: medium
    issue: ἀμὴν se tradujo como «¡Amén!»
    rationale: Aunque es posible léxicamente, en español bíblico moderno y legible «En verdad» o «De cierto» funciona mejor como fórmula introductoria de afirmación solemne. La exclamación no está motivada por el griego.
  - severity: medium
    issue: Falta una nota para «esta generación»
    rationale: El POB inglés preserva explícitamente las alternativas «this people» y «this age». Dado que el debate es teológicamente sensible, esa información debe mantenerse también en español.
  - severity: medium
    issue: Falta una nota para «todo»
    rationale: El rastro inglés documenta que algunas versiones añaden «estas» por el contexto, pero el griego dice simplemente πάντα. Esa precisión debe conservarse en español.
  - severity: low
    issue: «no pasará de ningún modo» suena menos idiomático
    rationale: La fuerza de οὐ μή puede expresarse de manera más natural en español como «de ningún modo pasará» o «ciertamente no pasará», sin pérdida de énfasis.
  revised_spanish_text: En verdad les digo[a] que esta generación[b] de ningún modo pasará hasta que suceda todo[c][d].
