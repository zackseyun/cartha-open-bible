    reason: alternative_reading
  - marker: c
    text: O «ocurra» o «tenga lugar». γένηται señala el acontecimiento de lo dicho.
    reason: lexical_alternative
  - marker: d
    text: Algunas traducciones ponen «todo esto», tomándolo del contexto circundante; el griego aquí simplemente dice «todo».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «¡Amén!» por «En verdad» para reflejar mejor la función solemne de ἀμὴν en español natural y sin exclamación añadida. Se conserva «esta generación» como traducción principal de γενεά, pero se añade la nota exigida por el audit trail con las alternativas «este pueblo» y «esta era». Se mantiene la fuerza enfática de οὐ μή con «de ningún modo pasará», en orden más idiomático. También se conserva «suceda» para γένηται y se añade la nota sobre «todo» frente a «todo esto», conforme a la documentación inglesa.
