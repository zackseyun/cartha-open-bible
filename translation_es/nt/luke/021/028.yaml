translation:
  language: es
  text: Pero cuando estas cosas comiencen a suceder[a], enderécense[b] y levanten sus cabezas, porque su redención[c] se acerca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando estas cosas comiencen a tener lugar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «miren hacia arriba y levanten sus cabezas».'
    reason: lexical_alternative
  - marker: c
    text: «Redención» también puede traducirse «liberación»; aquí se refiere a la liberación final que se acerca para los seguidores de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχομένων δὲ τούτων γίνεσθαι
  english_pob_choice: when these things begin to happen
  chosen_spanish: cuando estas cosas comiencen a suceder
  alternatives_spanish:
  - cuando estas cosas comiencen a acontecer
  - cuando estas cosas empiecen a suceder
  - cuando estas cosas empiecen a tener lugar
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto marca circunstancia temporal; en español, "cuando estas cosas comiencen a suceder" conserva tanto el inicio del proceso como la naturalidad idiomática. "Suceder" mantiene la amplitud de γίνομαι sin sobretraducir a un matiz demasiado técnico.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ introduce una transición suave desde el discurso anterior de juicio y angustia hacia una exhortación de ánimo; "Pero" comunica bien ese giro en español.
- source_word: ἀνακύψατε
  english_pob_choice: straighten up
  chosen_spanish: enderézense
  alternatives_spanish:
  - pónganse erguidos
  - levántense
  - manténganse derechos
  lexicon: BDAG
  rationale: El verbo puede significar incorporarse o enderezarse tras estar abatido; "enderézense" conserva la imagen corporal y el valor exhortativo sin convertirlo en una mera acción visual como "miren".
- source_word: ἐπάρατε τὰς κεφαλὰς ὑμῶν
  english_pob_choice: lift up your heads
  chosen_spanish: levanten sus cabezas
  alternatives_spanish:
  - alcen sus cabezas
  - levanten la cabeza
  lexicon: BDAG
  rationale: '"Levanten sus cabezas" reproduce el imperativo plural y la imagen idiomática de confianza/esperanza. Se evita singularizarlo o volverlo demasiado interpretativo.'
- source_word: διότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: '"Porque" expresa con claridad la relación causal en español contemporáneo sin perder fuerza argumentativa.'
- source_word: ἐγγίζει
  english_pob_choice: is drawing near
  chosen_spanish: se acerca
  alternatives_spanish:
  - está cerca
  - se está acercando
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por una forma progresiva, en español "se acerca" suele comunicar mejor la cercanía en curso y evita una perífrasis forzada.
- source_word: ἀπολύτρωσις
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: '"Redención" es el equivalente teológico estándar y conserva el peso soteriológico del término. En este contexto escatológico no conviene reducirlo a una simple liberación circunstancial.'
theological_decisions:
- issue: Sentido escatológico de "su redención"
  english_pob_reading: Rendered as 'your redemption,' understood as the approaching final deliverance/vindication of Jesus' disciples at the consummation.
  chosen_spanish_reading: '"su redención" se entiende como la liberación/vindicación final de los discípulos de Jesús al consumarse los acontecimientos.'
  alternative_spanish_readings:
  - su liberación inmediata
  - su rescate espiritual no escatológico
  rationale: El contexto es apocalíptico y futuro; la traducción preserva "redención" sin estrecharla a escape político inmediato ni disolverla en un sentido meramente interior.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor exhortativo de los dos imperativos
  english_pob_reading: '''straighten up and lift up your heads'' as an encouragement of confidence and hope.'
  chosen_spanish_reading: '"enderézense y levanten sus cabezas" se lee como un llamado a recuperar ánimo, firmeza y esperanza.'
  alternative_spanish_readings:
  - miren hacia arriba y alcen la cabeza
  - pónganse de pie con confianza
  rationale: Se mantiene la imagen corporal del texto griego como símbolo de confianza esperanzada, sin borrar la tensión entre postura física y aliento espiritual.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: El texto base en inglés no muestra revisiones aplicadas en esta unidad; el estado de revisión indica acuerdo alto y sin cambios, por lo que la redacción española sigue de cerca el audit trail sin introducir ajustes no documentados.
  spanish_consistency_notes:
  - Se conserva "redención" en sentido soteriológico y escatológico, coherente con el término técnico del pasaje.
  - Se mantiene el tono exhortativo y directo de los imperativos griegos con segunda persona plural formal de cortesía no marcada en español bíblico contemporáneo.
  - La puntuación y el orden siguen una estructura natural en español sin perder la secuencia temporal-causal del griego.
