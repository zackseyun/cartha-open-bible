    text: O «del firmamento». El griego οὐρανός puede referirse al cielo o al firmamento visible, y la frase puede describir fenómenos celestes visibles.
    reason: lexical_alternative
  - marker: b
    text: O «pestilencias». El griego λοιμοί se refiere a brotes epidémicos o plagas.
    reason: lexical_alternative
  - marker: c
    text: O «portentos» en lugar de «señales», especialmente en un sentido apocalíptico.
    reason: lexical_alternative
