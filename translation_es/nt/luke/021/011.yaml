translation:
  language: es
  text: Habrá grandes terremotos, y en diversos lugares habrá hambres y plagas[b]; y habrá terrores y grandes señales[c] del cielo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del firmamento». El griego οὐρανός puede referirse al cielo o al firmamento visible, y la frase puede describir fenómenos celestes visibles.
    reason: lexical_alternative
  - marker: b
    text: O «pestilencias». El griego λοιμοί se refiere a brotes epidémicos o plagas.
    reason: lexical_alternative
  - marker: c
    text: O «portentos» en lugar de «señales», especialmente en un sentido apocalíptico.
    reason: lexical_alternative
lexical_decisions:
- source_word: σεισμοί
  english_pob_choice: earthquakes
  chosen_spanish: terremotos
  alternatives_spanish:
  - sismos
  - movimientos sísmicos
  lexicon: BDAG
  rationale: σεισμοί designa terremotos o sismos reales. En español, «terremotos» es la opción más natural y comprensible en registro bíblico contemporáneo; «sismos» suena más técnico y menos idiomático aquí.
- source_word: μεγάλοι
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - severos
  - fuertes
  lexicon: BDAG
  rationale: Con «terremotos», μέγας expresa magnitud o intensidad. «Grandes» conserva la relación directa con el griego y el paralelismo del texto, sin interpretar más de lo debido.
- source_word: κατὰ τόπους
  english_pob_choice: in various places
  chosen_spanish: en diversos lugares
  alternatives_spanish:
  - en distintos lugares
  - por diversos lugares
  lexicon: BDAG
  rationale: La expresión idiomática indica distribución geográfica. «En diversos lugares» suena natural en español y mantiene la idea de dispersión espacial.
- source_word: λιμοὶ
  english_pob_choice: famines
  chosen_spanish: hambres
  alternatives_spanish:
  - hambrunas
  - faminas
  lexicon: BDAG
  rationale: λιμός denota hambre generalizada o hambruna. «Hambres» reproduce bien el plural de calamidades en estilo bíblico; «hambrunas» también sería válido, pero «hambres» conserva mejor el tono conciso del griego.
- source_word: λοιμοὶ
  english_pob_choice: plagues
  chosen_spanish: plagas
  alternatives_spanish:
  - pestilencias
  - epidemias
  lexicon: BDAG
  rationale: λοιμός puede referirse a plaga, pestilencia o epidemia. «Plagas» es claro, grave y de uso bíblico en español; evita el arcaísmo de «pestilencias» sin diluir la fuerza del término.
- source_word: φόβητρά
  english_pob_choice: terrors
  chosen_spanish: terrores
  alternatives_spanish:
  - cosas aterradoras
  - eventos aterradores
  lexicon: BDAG
  rationale: El plural neutro alude a realidades que causan miedo. «Terrores» mantiene la fuerza ominosa y la concisión del griego, con un sustantivo plural natural en español.
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - portentos
  - signos
  lexicon: BDAG
  rationale: σημεῖον suele significar «señal». En español, «señales» es el equivalente más directo y claro; «portentos» introduciría un matiz más interpretativo/apocalíptico que el griego no obliga a fijar.
- source_word: ἀπ’ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - del cielo o del cielo/firmamento
  - del cielo/desde el cielo
  lexicon: BDAG
  rationale: οὐρανός puede significar «cielo» o «cielo/firmamento». Aquí, «del cielo» preserva la elevación del registro y la ambigüedad entre fenómeno celeste y resonancia teológica, sin forzar una precisión que el texto no exige.
- source_word: μεγάλα
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - múltiples
  - poderosas
  lexicon: BDAG
  rationale: Con «señales», μέγας se traduce de manera directa por «grandes», manteniendo la sencillez del adjetivo y sin añadir la idea de poder milagroso.
- source_word: τε ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - tanto ... como
  - y asimismo ... y
  lexicon: Greek grammar
  rationale: La coordinación acumulativa se refleja bien con repeticiones de «y» en español. Así se conserva el ritmo enumerativo del griego sin rigidizar la sintaxis.
- source_word: ἔσονται / ἔσται
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - existirán
  - sucederán
  lexicon: BDAG
  rationale: El futuro de εἰμί en estas enumeraciones se expresa naturalmente con «habrá». Es la forma más idiomática en español para anunciar eventos futuros dentro de una lista profética.
theological_decisions:
- issue: 'οὐρανός: cielo o cielo/firmamento en un dicho apocalíptico'
  english_pob_reading: from heaven
  chosen_spanish_reading: del cielo
  alternative_spanish_readings:
  - desde el cielo
  - del firmamento
  rationale: 'La POB en inglés preserva la tensión entre una lectura cósmica visible («sky») y una resonancia más elevada («heaven»). «Del cielo» conserva esa ambigüedad en español: puede referirse tanto al ámbito celeste visible como al cielo en sentido teológico, sin resolver el alcance del signo.'
  doctrine_reference: Translation philosophy §3 (preservar tensiones textuales y teológicas)
translation_notes:
  revision_awareness: La versión inglesa más reciente no requirió cambios; esta propuesta sigue de cerca su acuerdo alto con el griego, manteniendo las mismas decisiones léxicas clave y la ambigüedad de οὐρανός mediante «del cielo».
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y legible, evitando arcaísmos innecesarios.
  - 'Se preserva la enumeración profética con paralelismo directo: «habrá ... y ...; y habrá ...».'
  - «Señales» se conserva para σημεῖα, en línea con el uso neotestamentario y sin imponer «portentos».
