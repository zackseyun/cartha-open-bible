base_translation:
  language: en
  yaml_path: translation/nt/luke/021/011.yaml
  text: There will be great earthquakes[a], and in various places famines and plagues[c][b]; and there will be terrors and great signs from heaven.
  footnotes:
  - marker: a
    text: Or 'from the sky.' The Greek οὐρανός can refer either to heaven or to the sky, and the phrase may describe visible celestial phenomena.
    reason: lexical_alternative
  - marker: b
    text: Or 'pestilences.' The Greek λοιμοί refers to epidemic outbreaks or plagues.
    reason: lexical_alternative
  - marker: c
    text: Or 'portents' for 'signs,' especially in an apocalyptic sense.
    reason: lexical_alternative
