review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: terremotos grandes, distribución geográfica de hambres y plagas, y luego terrores y grandes señales procedentes del cielo. También mantiene adecuadamente la tensión de ἀπ’ οὐρανοῦ con «del cielo». Sin embargo, hay desajustes en el sistema de notas respecto del rastro de auditoría inglés: la nota [a] en español se ancla a «terremotos», pero en la POB inglesa la alternativa relevante marcada con [a] corresponde a «from heaven / sky», no a σεισμοί. Además, las notas [b] y [c] no preservan con precisión las alternativas documentadas por separado para λοιμοί («pestilencias») y σημεῖα («portentos»).'
  spanish_quality_summary: El español es claro, natural y de buen registro bíblico contemporáneo. «Habrá grandes terremotos…» y «en diversos lugares» suenan bien. «Hambres» es defendible, pero «hambrunas» sería más idiomático para muchos lectores; no obstante, no exige cambio. La frase «grandes señales del cielo» es legible, aunque conviene alinear sus notas con las alternativas semánticas reales.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Se usan bien «señales», «plagas» y «cielo». La decisión «del cielo» para ἀπ’ οὐρανοῦ es aceptable en español para preservar la ambigüedad cielo/cielo visible. El principal problema no es terminológico sino de correspondencia de notas y marcadores.
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «terremotos», pero la alternativa auditada con ese contenido pertenece a ἀπ’ οὐρανοῦ.
    rationale: La POB inglesa documenta la alternativa «from the sky» para la frase final, no una alternativa principal para σεισμοί. En español, la nota de σεισμοί introduce una decisión nueva no respaldada por el rastro de auditoría.
  - severity: medium
    issue: La nota [b] combina dos términos («hambrunas» y «pestilencias») cuando el rastro inglés solo documenta la alternativa de λοιμοί.
    rationale: 'Esto diluye la precisión del aparato: λιμοί no lleva una nota alternativa en inglés, mientras λοιμοί sí. Conviene separar o eliminar el elemento no auditado.'
  - severity: medium
    issue: La nota [c] en español explica ἀπ’ οὐρανοῦ, pero en la POB inglesa [c] corresponde a σημεῖα = «portents».
    rationale: Aunque el contenido de la nota es válido, el emparejamiento marcador-concepto no conserva el rastro de decisiones léxicas del inglés. Debe reanclarse «portentos» a «señales» y mover la nota cielo/cielo visible a la frase final.
  revised_spanish_text: Habrá grandes terremotos, y en diversos lugares habrá hambres y plagas[b]; y habrá terrores y grandes señales[c] del cielo[a].
  revised_footnotes:
