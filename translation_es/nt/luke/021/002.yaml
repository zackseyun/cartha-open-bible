review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: vio, una viuda pobre, echando allí. Sin embargo, en λεπτὰ δύο el texto principal en español se aparta innecesariamente de la decisión auditada del POB inglés, que prioriza claridad accesible en el texto principal y deja «two lepta» en nota. Mantener «leptas» en el cuerpo principal reduce legibilidad y desplaza al texto principal una precisión técnica que el rastro de auditoría reservó para nota.'
  spanish_quality_summary: El español es natural y claro en casi todo el versículo. «Que echaba allí» es aceptable y digno. El principal problema de legibilidad es «dos leptas» en el texto principal, que no es término transparente para lectores generales. «Dos monedas pequeñas de cobre» comunica mejor el sentido sin perder precisión esencial.
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. La revisión propuesta sigue la filosofía del proyecto: español moderno, claro y no innecesariamente técnico. Se conserva la alternativa léxica griega en nota, como en el POB inglés.'
  issues:
  - severity: medium
    issue: «dos leptas» en el texto principal
    rationale: El griego λεπτά designa una moneda específica, pero el POB inglés decidió expresar el sentido en lenguaje accesible en el texto principal («two small copper coins») y preservar «two lepta» en nota. En español, «leptas» no es transparentemente comprensible para la mayoría de lectores y suena más técnico de lo necesario.
  - severity: low
    issue: La nota debe corresponder a la alternativa léxica preservada, no duplicar el texto principal revisado
    rationale: Si el texto principal se hace más claro con «dos monedas pequeñas de cobre», la nota puede conservar la forma griega específica «dos leptas», alineándose mejor con el rastro auditado.
