translation:
  language: es
  text: Y vio a una viuda pobre que echaba allí dos monedas pequeñas de cobre.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «dos leptas», es decir, dos monedas de cobre muy pequeñas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - notó
  lexicon: BDAG
  rationale: El aoristo de ὁράω se expresa de forma directa con "vio". Mantiene la sencillez narrativa sin añadir matiz interpretativo.
- source_word: δέ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona como enlace narrativo suave. "Y" preserva continuidad sin introducir contraste que el griego no exige.
- source_word: τινα
  english_pob_choice: a
  chosen_spanish: una
  alternatives_spanish:
  - una cierta
  - alguna
  lexicon: BDAG
  rationale: El indefinido τινα se vuelve naturalmente en español con el artículo indefinido "una"; evita una formulación forzada como "una cierta".
- source_word: χήραν
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - esposa viuda
  lexicon: BDAG
  rationale: χήρα significa "viuda" de manera directa. Se conserva el término común y socialmente marcado por su vulnerabilidad.
- source_word: πενιχρὰν
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitada
  - desamparada
  - paupérrima
  lexicon: BDAG
  rationale: πενιχρός expresa pobreza o escasez de recursos. "Pobre" es el equivalente más natural y fiel en español sin exagerar la intensidad.
- source_word: βάλλουσαν
  english_pob_choice: putting in
  chosen_spanish: que echaba
  alternatives_spanish:
  - que estaba poniendo
  - que arrojaba
  - depositando
  lexicon: BDAG
  rationale: En el contexto de ofrenda al arca o tesoro, βάλλω conserva la idea de introducir algo en un receptáculo. "Echaba" resulta idiomático en español y no suaviza indebidamente la acción.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: BDAG
  rationale: ἐκεῖ se traduce con el adverbio locativo "allí", natural y preciso en español.
- source_word: λεπτὰ δύο
  english_pob_choice: two small copper coins
  chosen_spanish: dos leptas
  alternatives_spanish:
  - dos monedas pequeñas de cobre
  - dos mites
  - dos moneditas
  lexicon: BDAG
  rationale: Lepta es el nombre específico de las monedas; se conserva en transliteración para no perder la precisión del término monetario, que en español no tiene un equivalente exacto y corto. La explicación queda indicada en la nota.
translation_notes:
  revision_awareness: Coincide sustancialmente con el testimonio griego y con el criterio inglés de mantener la sencillez narrativa, pero en español se optó por conservar el nombre monetario específico "leptas" en vez de una paráfrasis, para evitar perder la precisión del valor y dejar la aclaración en nota.
  spanish_consistency_notes:
  - Se mantiene el sujeto implícito de la cláusula anterior como "Y vio" en continuidad narrativa.
  - '"Leptas" conserva la unidad monetaria griega; la nota ofrece la equivalencia explicativa sin reemplazarla en el texto principal.'
  - No se introdujo puntuación o léxico devocional ajeno al registro descriptivo del versículo.
