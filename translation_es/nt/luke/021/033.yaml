translation:
  language: es
  text: El cielo y la tierra pasarán[a], pero mis palabras nunca pasarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «mis palabras jamás pasarán». El griego usa una negación enfática (οὐ μή).'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐρανὸς
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - cielo
  - los cielos
  lexicon: BDAG
  rationale: En español, 'cielo y tierra' es la pareja merística natural y fiel para expresar el alcance cósmico del original. 'Los cielos' puede sonar más marcado o litúrgico; 'cielo' mantiene la sobriedad y la referencia al orden creado.
- source_word: γῆ
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: BDAG
  rationale: En la pareja fija con 'cielo', 'tierra' reproduce el contraste cósmico del griego y evita restringir el sentido a una 'tierra' local o territorial.
- source_word: παρελεύσονται
  english_pob_choice: will pass away
  chosen_spanish: pasarán
  alternatives_spanish:
  - pasarán
  - pasarán de largo
  - se acabarán
  lexicon: BDAG
  rationale: El verbo griego expresa pasar, dejar de estar o transcurrir fuera de la escena. 'Pasarán' conserva la repetición verbal del paralelismo y suena natural en español sin añadir matiz interpretativo.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - pero
  - mas
  lexicon: BDAG
  rationale: Aquí δέ introduce contraste directo entre lo creado y las palabras de Jesús; 'pero' comunica esa oposición de manera clara y contemporánea.
- source_word: λόγοι
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras
  - dichos
  - expresiones
  lexicon: BDAG
  rationale: En este contexto λόγοι se refiere a las palabras pronunciadas por Jesús. 'Palabras' es la opción más directa y sobria, y preserva el peso autoritativo de la afirmación.
- source_word: οὐ μὴ
  english_pob_choice: certainly not
  chosen_spanish: de ningún modo
  alternatives_spanish:
  - de ningún modo
  - nunca
  - jamás
  lexicon: BDAG
  rationale: La combinación οὐ μή con futuro es una negación enfática. En español, 'de ningún modo' transmite con fuerza esa imposibilidad sin depender de una doble negación forzada ni sonar arcaico.
- source_word: παρελεύσονται
  english_pob_choice: will pass away
  chosen_spanish: pasarán
  alternatives_spanish:
  - pasarán
  - desaparecerán
  - dejarán de existir
  lexicon: BDAG
  rationale: 'Se mantiene la misma solución verbal para ambas ocurrencias de παρελεύσονται, preservando el paralelismo retórico: cielo y tierra pasarán, pero las palabras de Jesús no.'
theological_decisions:
- issue: Fuerza de la afirmación sobre la permanencia de las palabras de Jesús
  english_pob_reading: The verse preserves the stark contrast between the transience of heaven and earth and the absolute permanence of Jesus' words, without softening the emphatic negation.
  chosen_spanish_reading: El versículo conserva el contraste tajante entre la transitoriedad del cielo y la tierra y la permanencia absoluta de las palabras de Jesús, sin suavizar la negación enfática.
  alternative_spanish_readings:
  - El cielo y la tierra pasarán, pero mis palabras nunca pasarán.
  - El cielo y la tierra pasarán, pero mis palabras no pasarán en absoluto.
  rationale: '''De ningún modo'' comunica la fuerza de οὐ μή y sostiene la solemnidad de la declaración. Evita una lectura diluida y conserva el carácter de autoridad de las palabras de Jesús sin añadir contenido externo.'
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: El texto griego, la morfología y el audit trail inglés están en alto acuerdo; no se documentan revisiones aplicadas, por lo que la versión española mantiene de forma directa el paralelismo y la negación enfática del original.
  spanish_consistency_notes:
  - Se conserva la pareja merística 'cielo y tierra' por su naturalidad y fidelidad al alcance cósmico del griego.
  - '''Palabras'' se mantiene para λόγοι, siguiendo la opción inglesa auditada y evitando ampliar a ''dichos'' o ''enseñanzas''.'
  - La negación enfática se vierte con 'de ningún modo' para reflejar οὐ μή sin arcaísmo.
  - 'Se evita ''SEÑOR'' u otra sustitución reverencial: el versículo habla de las palabras de Jesús, no del nombre divino.'
