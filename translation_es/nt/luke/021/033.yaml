    rationale: Aunque intenta reflejar la fuerza de οὐ μὴ, en español suena más idiomático y solemne decir 'nunca pasarán' o 'jamás pasarán'. La fidelidad incluye legibilidad natural.
  - severity: low
    issue: La nota al pie tiene una redacción y puntuación defectuosas.
    rationale: Empieza con una comilla simple innecesaria y con 'O:' en vez de una formulación más natural como 'O bien:'. Debe corregirse para claridad editorial.
