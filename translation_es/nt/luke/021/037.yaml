translation:
  language: es
  text: Y durante el día enseñaba en el templo[a], pero de noche salía y se alojaba[b] en el Monte de los Olivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἱερόν se refiere al templo como complejo o recinto, no específicamente al santuario interior.
    reason: lexical_alternative
  - marker: b
    text: O «pasaba la noche»; el verbo también puede sugerir alojamiento al aire libre.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦν ... διδάσκων
  english_pob_choice: he was teaching
  chosen_spanish: enseñaba
  alternatives_spanish:
  - estaba enseñando
  - estaba dando enseñanza
  - enseñaba continuamente
  lexicon: BDAG
  rationale: El imperfecto con participio presente expresa una actividad continua o habitual. En español, «enseñaba» comunica de manera natural ese valor durativo sin añadir más de lo que el griego exige.
- source_word: τὰς ἡμέρας
  english_pob_choice: during the days
  chosen_spanish: durante el día
  alternatives_spanish:
  - de día
  - en los días
  - durante los días
  lexicon: BDAG
  rationale: El plural griego marca el contraste con la noche, pero en español «durante el día» suena más idiomático y conserva el sentido de actividad diurna repetida. Se mantiene el contraste día/noche sin forzar una pluralidad literal poco natural.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el recinto del templo
  - en los atrios del templo
  - en el complejo del templo
  lexicon: BDAG
  rationale: Se conserva la forma idiomática «en el templo» y se aclara en nota que ἱερόν abarca el complejo o recinto del templo, no solo el santuario interior.
- source_word: τὰς δὲ νύκτας
  english_pob_choice: but at night
  chosen_spanish: pero de noche
  alternatives_spanish:
  - pero durante la noche
  - y de noche
  - pero por la noche
  lexicon: BDAG
  rationale: «De noche» es la forma más natural en español para el valor repetido y contrastivo del texto. El «pero» reproduce la oposición marcada por δέ.
- source_word: ἐξερχόμενος
  english_pob_choice: he would go out
  chosen_spanish: salía
  alternatives_spanish:
  - iba saliendo
  - saliendo
  - se iba
  lexicon: BDAG
  rationale: 'El participio contemporáneo con el imperfecto principal describe una acción habitual: Jesús salía repetidamente. «Salía» preserva la habitualidad sin recargar la frase.'
- source_word: ηὐλίζετο
  english_pob_choice: lodge
  chosen_spanish: se alojaba
  alternatives_spanish:
  - pasaba la noche
  - pernoctaba
  - acampaba
  lexicon: BDAG
  rationale: El verbo puede significar pasar la noche o alojarse, incluso al aire libre. «Se alojaba» conserva la idea de hospedarse o pasar la noche sin especificar más de lo que el griego asegura.
- source_word: εἰς τὸ ὄρος
  english_pob_choice: on the mount
  chosen_spanish: en el monte
  alternatives_spanish:
  - al monte
  - sobre el monte
  - en la montaña
  lexicon: BDAG
  rationale: Aunque εἰς sugiere dirección, con verbos de pernoctar el resultado es ubicación. En español, «en el monte» es la opción más natural y fiel al sentido final de estancia.
- source_word: τὸ καλούμενον Ἐλαιῶν
  english_pob_choice: called Olivet
  chosen_spanish: llamado de los Olivos
  alternatives_spanish:
  - llamado Olivete
  - llamado el Monte de los Olivos
  - llamado de las Olivas
  lexicon: BDAG
  rationale: 'Se traduce el topónimo de modo transparente como nombre geográfico: Ἐλαιῶν alude a los olivos. «De los Olivos» mantiene el valor semántico del nombre y evita introducir una forma tradicional eclesiástica sin necesidad textual.'
theological_decisions:
- issue: Alcance de ἱερόν
  english_pob_reading: Greek ἱερόν refers to the temple complex or precincts, not specifically the inner sanctuary.
  chosen_spanish_reading: «Templo» en el texto principal, con nota aclaratoria de que se trata del recinto o complejo del templo.
  alternative_spanish_readings:
  - «recinto del templo» en el texto principal
  - «atrios del templo» en el texto principal
  rationale: La aclaración evita que el lector piense en el santuario interior solamente, pero no sobrecarga el verso principal con una perífrasis menos idiomática. Se preserva la amplitud semántica documentada por el texto griego y por el audit trail en inglés.
  doctrine_reference: No doctrinal issue; lexical precision only.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «Olivet» como forma más directa para τὸ ὄρος τὸ καλούμενον Ἐλαιῶν. En español se optó por conservar la transparencia semántica del topónimo mediante «de los Olivos», que comunica el mismo valor léxico sin depender de una transliteración no usual. Se mantuvo el paralelismo día/noche y el matiz habitual del imperfecto.
  spanish_consistency_notes:
  - Se mantiene «templo» como término principal, con nota para el sentido ampliado de ἱερόν.
  - Se evita «Cristo/SEÑOR» porque no aparecen en este versículo.
  - Se conserva un registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - «Monte» se usa consistentemente para ὄρος; no se introduce «montaña» para no romper la forma idiomática del topónimo.
