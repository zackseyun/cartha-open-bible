revisions:
- from: Y durante el día enseñaba en el templo[a], pero de noche salía y se alojaba en el monte llamado de los Olivos[b].
  to: Y durante el día enseñaba en el templo[a], pero de noche salía y se alojaba[b] en el Monte de los Olivos.
  rationale: Se conserva la estructura y el sentido del borrador, pero se corrige el topónimo a «Monte de los Olivos», que es la forma natural y reconocible en español para τὸ ὄρος τὸ καλούμενον Ἐλαιῶν. También se mueve la nota [b] al verbo «se alojaba», que es el elemento léxico al que realmente explica. El resto del verso ya preservaba bien el valor habitual del imperfecto y el contraste día/noche.
