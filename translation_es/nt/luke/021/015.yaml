translation:
  language: es
  text: Porque yo les daré una boca y sabiduría[a], a la cual no podrán resistir ni contradecir todos los que se les oponen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «una boca y sabiduría». La frase expresa el don de hablar, junto con sabiduría dada por Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ γὰρ
  english_pob_choice: For I
  chosen_spanish: Porque yo
  alternatives_spanish:
  - Pues yo
  - Porque yo mismo
  lexicon: BDAG
  rationale: γάρ introduce una explicación o fundamento; en español, «porque» comunica bien esa relación. El pronombre explícito «yo» conserva el énfasis de ἐγώ sin volver la frase pesada.
- source_word: δώσω
  english_pob_choice: will give
  chosen_spanish: daré
  alternatives_spanish:
  - voy a dar
  - entregaré
  lexicon: BDAG
  rationale: El futuro de δίδωμι se refleja de forma natural con el futuro simple «daré», que mantiene el tono de promesa.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa naturalmente en español con clítico indirecto. «Les» evita repetir «a ustedes» y mantiene fluidez.
- source_word: στόμα
  english_pob_choice: a mouth
  chosen_spanish: boca
  alternatives_spanish:
  - una boca
  - palabra
  - habla
  lexicon: BDAG
  rationale: Se conserva la imagen literal de στόμα con «boca», porque el texto griego la presenta como parte del don. A diferencia de una paráfrasis como «palabra(s)», esta opción no borra la tensión idiomática entre órgano y capacidad de hablar.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  - discernimiento
  lexicon: BDAG
  rationale: σοφίαν se traduce de manera directa como «sabiduría», el equivalente normal y adecuado en español bíblico.
- source_word: ᾗ
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - con la cual
  - por la cual
  lexicon: BDAG
  rationale: El relativo ᾗ retoma conjuntamente el don de «boca y sabiduría». En español, «que» permite una oración fluida sin perder la referencia a ese don compuesto.
- source_word: οὐ δυνήσονται
  english_pob_choice: will not be able to
  chosen_spanish: no podrán
  alternatives_spanish:
  - no serán capaces de
  - no tendrán capacidad para
  lexicon: BDAG
  rationale: La perífrasis de incapacidad futura se expresa con «no podrán», concisa y natural, conservando el matiz de imposibilidad futura.
- source_word: ἀντιστῆναι
  english_pob_choice: withstand
  chosen_spanish: resistir
  alternatives_spanish:
  - hacer frente a
  - oponerse
  lexicon: BDAG
  rationale: En este contexto de confrontación verbal y judicial, «resistir» conserva bien la idea de no poder mantenerse en contra de la palabra dada por Dios.
- source_word: ἢ ἀντειπεῖν
  english_pob_choice: or contradict
  chosen_spanish: ni contradecir
  alternatives_spanish:
  - ni hablar en contra
  - ni replicar
  lexicon: BDAG
  rationale: ἀντειπεῖν añade el matiz de réplica verbal. «Contradecir» es la forma más natural y exacta en español; con «ni» se mantiene la correlación negativa del griego.
- source_word: ἅπαντες οἱ ἀντικείμενοι ὑμῖν
  english_pob_choice: all who oppose you
  chosen_spanish: todos los que se les opongan
  alternatives_spanish:
  - todos los que les son contrarios
  - todos sus adversarios
  lexicon: BDAG
  rationale: El participio presente sustantivado expresa a quienes están en postura de oposición. «Los que se les opongan» conserva la fuerza de oposición continua y evita una sustitución demasiado abstracta como «adversarios».
theological_decisions:
- issue: Literalidad idiomática de στόμα frente a equivalencia funcional
  english_pob_reading: The English audit trail moved from 'words' back to the more literal 'a mouth,' while noting the idiom means divinely supplied speech and wisdom.
  chosen_spanish_reading: Se mantiene «boca» en el texto principal y se deja la lectura idiomática implícita en la construcción completa.
  alternative_spanish_readings:
  - palabras
  - habla
  - un modo de hablar
  rationale: En español, «boca» suena literal pero sigue siendo comprensible dentro de la promesa. Esta opción respeta la tensión lexical del griego sin sustituirla por una paráfrasis que apagaría la imagen.
  doctrine_reference: Lexical transparency; source idiom preserved without doctrinal expansion
- issue: Valor del grupo opositor en ἅπαντες οἱ ἀντικείμενοι ὑμῖν
  english_pob_reading: all who oppose you
  chosen_spanish_reading: todos los que se les opongan
  alternative_spanish_readings:
  - todos sus adversarios
  - todos los que están contra ustedes
  rationale: El participio presente refleja una oposición activa. La formulación elegida conserva el sentido de quienes están en actitud de oposición, sin endurecerlo innecesariamente con un término más técnico o legal.
  doctrine_reference: Contextual semantics; present participle of opposition
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de SBLGNT y tiene en cuenta la revisión inglesa más reciente, que volvió a una formulación más literal para στόμα. En español se optó por conservar esa literalidad con «boca», pero se ajustó la sintaxis para que suene natural y publicable en castellano.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se evitó «Cristo» o terminología no presente en el texto.
  - El relativo y la negación se acomodaron al español para conservar la relación entre el don y la incapacidad de los opositores.
  - La combinación «resistir ni contradecir» refleja bien el par verbal griego ἀντιστῆναι / ἀντειπεῖν.
