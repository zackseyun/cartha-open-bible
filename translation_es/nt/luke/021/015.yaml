review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: «Porque yo» para ἐγὼ γὰρ, futuro de promesa con «daré», y la doble acción «resistir ni contradecir» para ἀντιστῆναι ἢ ἀντειπεῖν. También conserva correctamente la literalidad de στόμα como «boca», en línea con la revisión auditada en inglés. Sin embargo, la sintaxis española actual («que no podrán resistir ni contradecir todos los que se les opongan») es ambigua y suena forzada: parece que «todos» es objeto pospuesto de «contradecir», en vez de sujeto de «no podrán». El sentido fuente exige que «todos los que se les opongan» sea el sujeto de la incapacidad.'
  spanish_quality_summary: 'La frase necesita una reparación menor de orden y naturalidad. En español eclesial claro, conviene reordenar la relativa para que el sujeto quede explícito antes del verbo: «a la cual no podrán resistir ni contradecir todos los que se les oponen» o equivalente. Además, «boca y sabiduría» sin artículo es menos natural que «una boca y sabiduría» cuando se mantiene la literalidad de στόμα; esa pequeña adición ayuda a la legibilidad sin alejarse del griego. También es preferible evitar el subjuntivo futuro-contextual «se les opongan» dentro de esta relativa explicativa y usar presente: «se les oponen».'
  glossary_alignment: No hay conflicto con la terminología de proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La decisión de mantener στόμα como «boca» está alineada con la documentación auditada, siempre que se sostenga con una nota aclaratoria. «Sabiduría» es correcta. «Contradecir» preserva bien ἀντειπεῖν.
  issues:
  - severity: medium
    issue: Orden sintáctico ambiguo en la cláusula relativa
    rationale: La secuencia «que no podrán resistir ni contradecir todos los que se les opongan» puede leerse torpemente en español y oscurece que «todos los que se les oponen» es el sujeto. El griego marca con claridad que los opositores son quienes no podrán resistir ni contradecir.
  - severity: low
    issue: Falta de artículo con «boca»
    rationale: Aunque el griego anartro puede reflejarse sin artículo, en español «daré boca y sabiduría» suena demasiado abrupto. «Daré una boca y sabiduría» conserva mejor la literalidad y mejora la naturalidad.
  - severity: low
    issue: Tiempo verbal menos natural en «se les opongan»
    rationale: En esta relativa general que describe a los opositores, el presente «se les oponen» suena más natural y directo en español que el subjuntivo «se les opongan».
  revised_spanish_text: Porque yo les daré una boca y sabiduría[a], a la cual no podrán resistir ni contradecir todos los que se les oponen.
  revised_footnotes:
  - marker: a
    text: Literalmente, «una boca y sabiduría». La frase expresa el don de hablar, junto con sabiduría dada por Dios.
    reason: lexical_alternative
  revision_rationale: Se conserva la literalidad principal de στόμα con «una boca», conforme al rastro de auditoría en inglés, pero se reordena la cláusula relativa para producir español claro y sin ambigüedad sintáctica. La nota se mantiene porque la expresión sigue siendo idiomática y puede requerir aclaración para lectores modernos.
