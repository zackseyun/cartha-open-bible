- from: Porque yo les daré boca y sabiduría[a], que no podrán resistir ni contradecir todos los que se les opongan.
  to: Porque yo les daré una boca y sabiduría[a], a la cual no podrán resistir ni contradecir todos los que se les oponen.
  rationale: Se conserva la literalidad principal de στόμα con «una boca», conforme al rastro de auditoría en inglés, pero se reordena la cláusula relativa para producir español claro y sin ambigüedad sintáctica. La nota se mantiene porque la expresión sigue siendo idiomática y puede requerir aclaración para lectores modernos.
