translation:
  language: es
  text: Y seréis odiados por todos a causa de mi nombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por mí» / «a causa de mi nombre». La expresión «mi nombre» puede referirse a la identidad, autoridad y confesión de lealtad a Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσεσθε
  english_pob_choice: you will be
  chosen_spanish: seréis
  alternatives_spanish:
  - vais a ser
  - serán
  lexicon: BDAG
  rationale: El futuro de ἐίμι con participio se expresa con naturalidad en español como futuro simple. «Seréis» mantiene la referencia directa a los destinatarios y el valor futuro sin recurrir a una perífrasis menos compacta.
- source_word: μισούμενοι
  english_pob_choice: hated
  chosen_spanish: odiados
  alternatives_spanish:
  - siendo odiados
  - aborrecidos
  lexicon: BDAG
  rationale: El participio pasivo de μισέω se vierte de manera idiomática con el pasivo español «odiados», que conserva el sentido de hostilidad sufrida. «Siendo odiados» sonaría más literal pero menos natural en esta construcción con futuro de «ser».
- source_word: ὑπὸ πάντων
  english_pob_choice: by all
  chosen_spanish: por todos
  alternatives_spanish:
  - por toda la gente
  - por cada uno
  lexicon: BDAG
  rationale: ὑπό con genitivo marca agente; «por todos» reproduce la fuerza universal de πάντων sin añadir «gente», que no está explícito en el griego.
- source_word: διὰ τὸ ὄνομά μου
  english_pob_choice: because of my name
  chosen_spanish: a causa de mi nombre
  alternatives_spanish:
  - por mi nombre
  - por causa de mi nombre
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o motivo. «A causa de» conserva bien esa relación causal en español y mantiene el matiz de persecución debido al «nombre», que en el contexto bíblico conserva resonancias de identidad, autoridad y lealtad.
theological_decisions:
- issue: Sentido de «mi nombre» en un contexto de persecución y discipulado
  english_pob_reading: Retain the literal expression 'my name' rather than interpretively expanding it to 'because you belong to me' or 'because of me.'
  chosen_spanish_reading: Conservar «mi nombre» sin expansión interpretativa en el texto principal.
  alternative_spanish_readings:
  - porque me pertenecéis
  - por mí
  - porque llevan mi nombre
  rationale: El griego dice explícitamente «mi nombre». En Lucas-Hechos, «nombre» puede abarcar identidad, autoridad y confesión de lealtad a Jesús. Mantener la forma literal preserva esa riqueza semántica y evita reducir la causa de la persecución a una sola faceta.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La revisión más reciente indicó «unchanged: true» y coincidencia alta con el control cruzado; no se registraron cambios sustantivos respecto del inglés auditado.'
  spanish_consistency_notes:
  - Se preservó el paralelismo futuro + participio con una construcción española natural («seréis odiados»).
  - Se mantuvo el léxico relacional de causa («a causa de») para reflejar διά con acusativo.
  - Se conservó «nombre» de manera literal para sostener la resonancia teológica documentada en el audit trail.
