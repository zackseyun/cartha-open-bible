translation:
  language: es
  text: Pero cuando oigan hablar de guerras y convulsiones[a], no se aterroricen; porque es necesario que estas cosas sucedan primero, pero el fin no llega enseguida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «disturbios», «tumultos» o «desórdenes» para «convulsiones».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pero el fin no vendrá inmediatamente».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅταν δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: BDAG
  rationale: ὅταν introduce una cláusula temporal indefinida y δέ aporta una transición suave. En español, «Pero cuando» conserva el avance discursivo sin forzar una oposición más fuerte de la que el griego expresa.
- source_word: ἀκούσητε
  english_pob_choice: you hear of
  chosen_spanish: oigan de
  alternatives_spanish:
  - oigan
  - oigan acerca de
  lexicon: BDAG
  rationale: El verbo se entiende como recibir noticia de acontecimientos. «Oigan de» refleja naturalmente el matiz de informes sobre sucesos, como en el inglés POB.
- source_word: πολέμους
  english_pob_choice: wars
  chosen_spanish: guerras
  alternatives_spanish:
  - conflictos armados
  - batallas
  lexicon: BDAG
  rationale: πόλεμος se refiere de manera directa a guerras o conflictos armados; «guerras» es la opción más transparente y fiel.
- source_word: ἀκαταστασίας
  english_pob_choice: upheavals
  chosen_spanish: perturbaciones
  alternatives_spanish:
  - disturbios
  - tumultos
  - desórdenes
  - convulsiones
  lexicon: BDAG
  rationale: ἀκαταστασία puede abarcar desorden, agitación o inestabilidad. «Perturbaciones» mantiene amplitud semántica sin restringir el sentido a una forma específica de revuelta.
- source_word: μὴ πτοηθῆτε
  english_pob_choice: do not be terrified
  chosen_spanish: no se aterroricen
  alternatives_spanish:
  - no se alarmen
  - no tengan miedo
  lexicon: BDAG
  rationale: πτοέομαι expresa quedar sobrecogido por el miedo o el pánico. «No se aterroricen» conserva mejor la fuerza emocional que una opción más suave como «no se alarmen».
- source_word: δεῖ γὰρ
  english_pob_choice: for ... must
  chosen_spanish: porque es necesario que
  alternatives_spanish:
  - pues debe
  - porque deben
  lexicon: BDAG
  rationale: δεῖ comunica necesidad; en español, la construcción impersonal «es necesario que» expresa con claridad esa obligación/necessidad. γάρ aporta explicación, por eso «porque».
- source_word: ταῦτα γενέσθαι
  english_pob_choice: these things must happen
  chosen_spanish: estas cosas sucedan
  alternatives_spanish:
  - estas cosas tengan lugar
  - estas cosas ocurran
  lexicon: BDAG
  rationale: γίνομαι aquí se refiere a eventos que suceden. «Sucedan» es natural en español y mantiene el sentido de ocurrencia de hechos.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - en primer lugar
  lexicon: BDAG
  rationale: Adverbio de secuencia; «primero» comunica la prioridad temporal de estos acontecimientos.
- source_word: ἀλλ’ οὐκ εὐθέως τὸ τέλος
  english_pob_choice: but the end is not at once
  chosen_spanish: pero el fin no es enseguida
  alternatives_spanish:
  - pero el fin no viene inmediatamente
  - pero el fin no será inmediato
  lexicon: BDAG
  rationale: 'El griego es elíptico: «pero no inmediatamente el fin». «No es enseguida» reproduce esa concisión sin añadir una interpretación temporal más explícita de la necesaria.'
theological_decisions:
- issue: Relación entre guerras/perturbaciones y el fin
  english_pob_reading: Jesus says wars and upheavals are necessary precursors, but they do not mean the end follows immediately.
  chosen_spanish_reading: Jesús dice que guerras y perturbaciones deben suceder primero, pero eso no significa que el fin llegue de inmediato.
  alternative_spanish_readings:
  - El fin no viene inmediatamente después de estos acontecimientos
  - Estos sucesos son previos al fin, pero no son el fin mismo
  rationale: 'La traducción conserva la tensión escatológica: los hechos son necesarios y anteriores, pero no deben identificarse con la llegada inmediata del fin. No se introduce un sistema escatológico específico.'
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma dogmática.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y el auditorial inglés: mantiene la conexión suave de δέ, la amplitud semántica de ἀκαταστασία y la elipsis final de ἀλλ’ οὐκ εὐθέως τὸ τέλος, sin resolverla más allá de lo que el texto permite. No hubo revisiones aplicadas en el último pase, y el estado de alta concordancia confirma que solo se requerían ajustes menores de estilo español.'
  spanish_consistency_notes:
  - Se usa «perturbaciones» para ἀκαταστασίας, siguiendo el campo semántico amplio de inestabilidad y desorden.
  - Se usa «no se aterroricen» para πτοηθῆτε, manteniendo una fuerza emocional fuerte acorde con el inglés POB.
  - Se conserva «el fin» para τὸ τέλος, evitando ampliarlo a una paráfrasis como «el final de los tiempos».
  - La nota final deja visible la lectura alternativa sobre la inmediatez, sin suprimir la tensión escatológica del original.
