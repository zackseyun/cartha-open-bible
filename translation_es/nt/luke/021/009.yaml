review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido griego general: la cláusula temporal futura, los «guerras», la prohibición de entrar en pánico, la necesidad de que estos eventos ocurran primero, y la negación de un fin inmediato. También preserva las dos notas del rastro POB inglés. Sin embargo, hay dos puntos mejorables para mayor fidelidad idiomática y semántica en español: «oigan de» suena menos natural que «oigan hablar de», y «perturbaciones» no comunica tan claramente como «convulsiones» o «trastornos» la idea de desorden social/político de ἀκαταστασίας.'
  spanish_quality_summary: El texto es legible y digno, pero tiene ligera rigidez en «oigan de guerras» y una elección léxica algo débil en «perturbaciones». Además, «porque» puede mantenerse, aunque «pues» sería un poco más fluido; no es indispensable cambiarlo. La frase final «el fin no es enseguida» es comprensible y bastante cercana al griego, pero suena más natural en español «el fin no llega enseguida» o, si se quiere conservar la elipsis, «el fin no es inmediato».
  glossary_alignment: No hay términos del glosario de alto impacto aquí (Yahvé, Mesías, esclavo, etc.). La revisión propuesta mantiene la filosofía POB de equivalencia óptima y preserva las alternativas léxicas y de lectura en notas. Se respeta la tensión escatológica documentada.
  issues:
  - severity: medium
    issue: «oigan de guerras» suena poco natural en español general
    rationale: Aunque calca el inglés «hear of», en español bíblico natural «oigan hablar de guerras» o «oigan acerca de guerras» comunica mejor recibir noticias de tales eventos.
  - severity: medium
    issue: «perturbaciones» debilita o difumina ἀκαταστασίας
    rationale: El término griego apunta a desórdenes, tumultos, convulsiones o trastornos sociales. «Perturbaciones» en español puede sonar demasiado psicológico o abstracto y menos ligado a agitación pública.
  - severity: low
    issue: La frase final puede sonar algo forzada
    rationale: «El fin no es enseguida» es entendible y cercana al griego, pero «el fin no llega enseguida» resulta más idiomática sin alterar la tensión ni resolver en exceso la elipsis.
  revised_spanish_text: Pero cuando oigan hablar de guerras y convulsiones[a], no se aterroricen; porque es necesario que estas cosas sucedan primero, pero el fin no llega enseguida[b].
