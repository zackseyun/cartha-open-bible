revisions:
- from: Pero cuando oigan de guerras y perturbaciones[a], no se aterroricen; porque es necesario que estas cosas sucedan primero, pero el fin no es enseguida[b].
  to: Pero cuando oigan hablar de guerras y convulsiones[a], no se aterroricen; porque es necesario que estas cosas sucedan primero, pero el fin no llega enseguida[b].
  rationale: Se ajusta «oigan de» a «oigan hablar de» para un español más natural; se cambia «perturbaciones» por «convulsiones» para reflejar mejor la amplitud de ἀκαταστασίας como agitación o desorden social; y se suaviza la expresión final a «no llega enseguida», que sigue siendo fiel al griego y más idiomática en español. Se conservan las notas del POB inglés con anclajes correctos.
