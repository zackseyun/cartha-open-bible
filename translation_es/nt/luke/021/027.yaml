translation:
  language: es
  text: Y entonces verán al Hijo del Hombre viniendo en una nube[a] con poder y gran gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre una nube». El griego usa el singular «en una nube», aunque la imagen evoca Daniel 7 y pasajes afines sobre la venida del Hijo del Hombre con las nubes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄψονται
  english_pob_choice: they will see
  chosen_spanish: verán
  alternatives_spanish:
  - divisarán
  - contemplarán
  lexicon: BDAG
  rationale: El futuro de ὁράω expresa percepción visual futura; «verán» es la equivalencia natural y directa en español, sin elevar el registro ni añadir matiz interpretativo.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Humano
  lexicon: BDAG
  rationale: Se conserva el título cristológico tradicional y su resonancia con Daniel 7. En español, «el Hijo del Hombre» mantiene la fórmula reconocible y el peso intertextual del original.
- source_word: ἐρχόμενον
  english_pob_choice: coming
  chosen_spanish: viniendo
  alternatives_spanish:
  - que viene
  - llegando
  lexicon: BDAG
  rationale: 'El participio presente se rinde con una forma dinámica que mantiene la acción en curso vista por el sujeto: «viniendo» conserva el aspecto sin endurecer la frase.'
- source_word: ἐν νεφέλῃ
  english_pob_choice: in a cloud
  chosen_spanish: en una nube
  alternatives_spanish:
  - sobre una nube
  - con una nube
  - en las nubes
  lexicon: BDAG
  rationale: La construcción griega es singular y literal («en una nube»). Se evita armonizarla con expresiones más tradicionales como «con las nubes» para respetar el dato textual específico.
- source_word: μετὰ δυνάμεως
  english_pob_choice: with power
  chosen_spanish: con poder
  alternatives_spanish:
  - con fuerza
  - con potencia
  lexicon: BDAG
  rationale: μετά con genitivo indica acompañamiento; «con poder» refleja con claridad δύναμις y preserva el tono apocalíptico sin perder naturalidad en español.
- source_word: δόξης πολλῆς
  english_pob_choice: great glory
  chosen_spanish: gran gloria
  alternatives_spanish:
  - mucha gloria
  - gloria abundante
  lexicon: BDAG
  rationale: La combinación es idiomática en el campo de la exaltación; «gran gloria» reproduce el sentido intensivo de πολλῆς con un español más natural que «mucha gloria».
theological_decisions:
- issue: Título cristológico τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Humano
  rationale: Se preserva el título establecido y su continuidad bíblica, especialmente su eco de Daniel 7. Traducirlo de forma más interpretativa debilitaría la referencia teológica y literaria.
  doctrine_reference: 'Affirmations; Translation philosophy #2'
- issue: Imaginería de la nube y posible eco daniélico
  english_pob_reading: in a cloud
  chosen_spanish_reading: en una nube
  alternative_spanish_readings:
  - sobre una nube
  - con las nubes
  rationale: Se sigue la singularidad del griego de Lucas sin nivelar el texto con pasajes paralelos. Así se mantiene la prioridad del testimonio lucano y, a la vez, el eco teofánico/daniélico.
  doctrine_reference: 'Translation philosophy #1'
translation_notes:
  revision_awareness: El pasaje coincide con el último pase de revisión, que quedó sin cambios; la versión inglesa auditada muestra acuerdo alto y no exige ajustes textuales adicionales. Se ha mantenido la singularidad de νεφέλῃ y el título cristológico sin armonizarlos con formulaciones paralelas.
  spanish_consistency_notes:
  - Se usa «Hijo del Hombre» de manera uniforme para el título cristológico.
  - Se conserva «nube» en singular para reflejar el dato gramatical del griego.
  - «Poder» y «gloria» mantienen el registro elevado del contexto apocalíptico sin introducir vocabulario eclesiástico ajeno.
