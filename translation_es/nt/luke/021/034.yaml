translation:
  language: es
  text: Pero cuídense ustedes mismos,[a] no sea que sus corazones se hagan pesados con desenfreno, embriaguez y las preocupaciones de la vida, y aquel día venga sobre ustedes de repente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estén en guardia»; el griego expresa vigilancia activa y continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσέχετε
  english_pob_choice: watch
  chosen_spanish: manténganse alerta
  alternatives_spanish:
  - vigilen
  - estén atentos
  - guárdense
  lexicon: BDAG
  rationale: La exhortación pide vigilancia continua y autocontrol. «Manténganse alerta» comunica bien el imperativo sin sonar forzado en español y conserva el matiz preventivo.
- source_word: ἑαυτοῖς
  english_pob_choice: yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - a ustedes mismos
  - por ustedes mismos
  lexicon: BDAG
  rationale: El dativo reflexivo con προσέχετε señala atención dirigida a la propia conducta. «Ustedes mismos» reproduce ese valor en un español natural.
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: BDAG
  rationale: La cláusula expresa advertencia preventiva. En español, «para que no» transmite con claridad la finalidad negativa sin forzar un arcaismo.
- source_word: βαρηθῶσιν
  english_pob_choice: be weighed down
  chosen_spanish: se carguen
  alternatives_spanish:
  - se vean agobiados
  - se hagan pesados
  - se vean abrumados
  lexicon: BDAG
  rationale: El verbo conserva la imagen de peso y carga sobre el corazón. «Se carguen» mantiene la metáfora de peso y resulta idiomático en español.
- source_word: καρδίαι
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - vida interior
  - ánimo
  - mente
  lexicon: BDAG
  rationale: «Corazones» es la correspondencia directa y bíblicamente reconocible para el centro interior de la persona, sin reducirlo sólo a emoción.
- source_word: κραιπάλῃ
  english_pob_choice: dissipation
  chosen_spanish: disolución
  alternatives_spanish:
  - juerga
  - carousal
  - excesos
  lexicon: BDAG
  rationale: El término griego puede abarcar el exceso y sus efectos posteriores por beber en demasía. «Disolución» preserva el campo moral de desenfreno sin restringirlo sólo a resaca o a una escena de fiesta.
- source_word: μέθῃ
  english_pob_choice: drunkenness
  chosen_spanish: embriaguez
  alternatives_spanish:
  - borrachera
  - intoxicación
  lexicon: BDAG
  rationale: «Embriaguez» es un equivalente directo, digno y claro para el estado de estar ebrio.
- source_word: μερίμναις βιωτικαῖς
  english_pob_choice: the worries of life
  chosen_spanish: las preocupaciones de la vida
  alternatives_spanish:
  - las ansiedades de la vida diaria
  - los afanes de la vida
  - las preocupaciones mundanas
  lexicon: BDAG
  rationale: El griego habla de preocupaciones relativas a la vida ordinaria. «Las preocupaciones de la vida» es natural, amplio y no añade un matiz despectivo que el texto no exige.
- source_word: ἐπιστῇ ἐφ’ ὑμᾶς
  english_pob_choice: come upon you
  chosen_spanish: venga sobre ustedes
  alternatives_spanish:
  - llegue sobre ustedes
  - caiga sobre ustedes
  - los sorprenda
  lexicon: BDAG
  rationale: La idea es de llegada repentina e inesperada. «Venga sobre ustedes» conserva el impacto de la irrupción, y el contexto ya aporta la sorpresa con «de repente».
- source_word: αἰφνίδιος
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - inesperadamente
  lexicon: BDAG
  rationale: Aunque formalmente modifica a «día», el español comunica mejor el efecto con un adverbio. «De repente» expresa bien la súbita irrupción del día.
- source_word: ἡ ἡμέρα ἐκείνη
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - el día aquel
  lexicon: BDAG
  rationale: El griego dice simplemente «aquel día». «Aquel día» conserva la referencia escatológica sin expandirla indebidamente.
theological_decisions:
- issue: Referencia escatológica de «aquel día»
  english_pob_reading: that day
  chosen_spanish_reading: aquel día
  alternative_spanish_readings:
  - aquel día de juicio
  - el día del juicio
  rationale: El contexto apunta claramente al día culminante del discurso, pero la traducción mantiene la formulación breve del texto sin explicitar más de lo que dice.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla por paráfrasis doctrinal.
- issue: Alcance de κραιπάλῃ
  english_pob_reading: dissipation
  chosen_spanish_reading: disolución
  alternative_spanish_readings:
  - carousal
  - juerga
  - excesos
  rationale: La palabra griega puede incluir tanto la juerga como sus secuelas de exceso. «Disolución» mantiene esa amplitud moral y evita limitar el sentido sólo al acto de beber o sólo a la resaca.
  doctrine_reference: Mantener la amplitud semántica del léxico original.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el expediente auditado en inglés. Se preservó la fuerza preventiva de μήποτε, la metáfora de peso en βαρηθῶσιν, la amplitud semántica de κραιπάλῃ y la sobriedad de ἡ ἡμέρα ἐκείνη sin añadir etiquetas doctrinales al texto.
  spanish_consistency_notes:
  - Se usó «Yahvé» según la norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo un registro neutro y bíblico en «aquel día» para no sobrerresolver la referencia escatológica.
  - La nota al pie se ancló en la exhortación inicial para reflejar la alternativa lexical de vigilancia activa.
