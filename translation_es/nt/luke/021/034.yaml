revisions:
- from: Pero manténganse alerta[a] ustedes mismos, para que sus corazones no se carguen con disolución y embriaguez y con las preocupaciones de la vida, y aquel día venga sobre ustedes de repente.
  to: Pero cuídense ustedes mismos,[a] no sea que sus corazones se hagan pesados con desenfreno, embriaguez y las preocupaciones de la vida, y aquel día venga sobre ustedes de repente.
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y precisión semántica en español: «cuídense ustedes mismos» expresa bien προσέχετε δὲ ἑαυτοῖς; «se hagan pesados» preserva mejor la metáfora de βαρηθῶσιν; y «desenfreno» comunica con mayor claridad el sentido de κραιπάλῃ documentado en el POB inglés. El resto del versículo se mantiene sustancialmente igual.'
