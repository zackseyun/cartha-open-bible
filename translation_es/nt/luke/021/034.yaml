review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del POB inglés: advertencia vigilante, corazones cargados por excesos y preocupaciones de la vida, y la llegada súbita de aquel día. Sin embargo, dos elecciones españolas debilitan la fidelidad idiomática/semántica: «se carguen» suena poco natural con «corazones» para βαρηθῶσιν, y «disolución» no comunica con claridad en español actual el campo de κραιπάλῃ como exceso/juerga/resaca moralmente desordenada.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «manténganse alerta ustedes mismos» está algo pesado, y «disolución» resulta poco natural/ambiguo para muchos lectores. Una redacción más fluida y fiel en español eclesial general sería «Cuídense ustedes mismos» y «desenfreno», además de «se hagan pesados» o equivalente para conservar la metáfora del corazón cargado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones sobre «corazones», «embriaguez», «preocupaciones de la vida» y «aquel día» están bien alineadas. El ajuste principal es lexical/estilístico en βαρηθῶσιν y κραιπάλῃ.
  issues:
  - severity: medium
    issue: «disolución» para κραιπάλῃ
    rationale: Aunque etimológicamente posible, en español actual es poco transparente y puede sugerir desintegración más que desenfreno/exceso. El POB inglés documenta un campo como dissipation/carousing/aftereffects of overindulgence; «desenfreno» comunica mejor esa amplitud moral.
  - severity: medium
    issue: «sus corazones no se carguen» para βαρηθῶσιν
    rationale: La construcción es poco idiomática en español. El griego expresa que los corazones se vuelvan pesados o agobiados. «Se hagan pesados» conserva mejor la metáfora; «se vean agobiados» sería más natural pero menos imagético.
  - severity: low
    issue: «manténganse alerta ustedes mismos» suena redundante
    rationale: El sentido reflexivo de ἑαυτοῖς puede expresarse más naturalmente con «Cuídense ustedes mismos» o «Estén atentos a ustedes mismos». Esto mejora la fluidez sin perder vigilancia.
  revised_spanish_text: Pero cuídense ustedes mismos,[a] no sea que sus corazones se hagan pesados con desenfreno, embriaguez y las preocupaciones de la vida, y aquel día venga sobre ustedes de repente.
  revised_footnotes:
  - marker: a
    text: O «estén en guardia»; el griego expresa vigilancia activa y continua.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y precisión semántica en español: «cuídense ustedes mismos» expresa bien προσέχετε δὲ ἑαυτοῖς; «se hagan pesados» preserva mejor la metáfora de βαρηθῶσιν; y «desenfreno» comunica con mayor claridad el sentido de κραιπάλῃ documentado en el POB inglés. El resto del versículo se mantiene sustancialmente igual.'
