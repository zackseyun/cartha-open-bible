translation:
  language: es
  text: Pero ustedes serán entregados incluso por padres, hermanos[a], parientes y amigos, y ellos matarán a algunos de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas» / «hermanos», porque el plural masculino griego puede a veces referirse a un grupo mixto de hermanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραδοθήσεσθε
  english_pob_choice: you will be handed over
  chosen_spanish: serán entregados
  alternatives_spanish:
  - serán entregados en manos de
  - serán traicionados
  lexicon: BDAG
  rationale: El futuro pasivo de παραδίδωμι expresa ser puesto en manos de otros o entregado a su poder. «Serán entregados» conserva ese sentido básico en español sin forzar desde el verbo una idea de traición, que en el contexto proviene sobre todo de los allegados mencionados.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una transición con matiz adversativo respecto de la afirmación previa. «Pero» reproduce bien ese giro en español.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: incluso
  alternatives_spanish:
  - también
  lexicon: BDAG
  rationale: 'El primer καί tiene fuerza ascendente: no solo gente externa, sino incluso los parientes cercanos. «Incluso» comunica esa intensificación de forma natural.'
- source_word: ὑπὸ
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - a manos de
  lexicon: BDAG
  rationale: Con el pasivo, ὑπό marca agente. «Por» es la equivalencia normal y clara en español.
- source_word: γονέων
  english_pob_choice: parents
  chosen_spanish: padres
  alternatives_spanish:
  - progenitores
  lexicon: BDAG
  rationale: γονεῖς designa a los padres como categoría de parentesco. «Padres» es la forma natural y comprende al padre y la madre como grupo.
- source_word: ἀδελφῶν
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural de la lista de parentesco, como en el griego. «Hermanos» conserva el valor léxico principal sin neutralizarlo en el texto base.
- source_word: συγγενῶν
  english_pob_choice: relatives
  chosen_spanish: parientes
  alternatives_spanish:
  - familiares
  - consanguíneos
  lexicon: BDAG
  rationale: συγγενεῖς se refiere a personas del mismo linaje o círculo familiar. «Parientes» es amplio, preciso y natural en español.
- source_word: φίλων
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - amigos cercanos
  lexicon: BDAG
  rationale: φίλοι significa amigos. «Amigos» mantiene la relación personal del texto sin añadir calificaciones que el griego no exige.
- source_word: θανατώσουσιν
  english_pob_choice: they will put some of you to death
  chosen_spanish: matarán a algunos de ustedes
  alternatives_spanish:
  - darán muerte a algunos de ustedes
  - pondrán a muerte a algunos de ustedes
  lexicon: BDAG
  rationale: θανατόω significa causar la muerte. «Matarán» es la manera más directa y idiomática en español; «a algunos de ustedes» recoge ἐξ ὑμῶν como un grupo parcial dentro del total.
- source_word: ἐξ ὑμῶν
  english_pob_choice: some of you
  chosen_spanish: a algunos de ustedes
  alternatives_spanish:
  - de entre ustedes
  - entre ustedes
  lexicon: BDAG
  rationale: La expresión idiomática μετά de un verbo de matar no necesita un calco como «de entre ustedes»; en español, «a algunos de ustedes» comunica correctamente que no se trata de todos.
theological_decisions:
- issue: Valor de ἀδελφῶν en la lista de parentesco
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  - hermanos (con sentido inclusivo implícito)
  rationale: Se conserva la forma masculina plural del griego en la línea principal, siguiendo la política de precisión de género del POB en el texto base. Dado que el español puede sugerir un grupo masculino o mixto, la redacción deja la posibilidad inclusiva implícita sin expandir el texto más allá de lo que el griego dice explícitamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Fuerza del verbo pasivo παραδοθήσεσθε en contexto de persecución
  english_pob_reading: you will be handed over
  chosen_spanish_reading: serán entregados
  alternative_spanish_readings:
  - serán traicionados
  - serán entregados en manos de
  rationale: El verbo por sí mismo no significa necesariamente «traicionar», aunque el contexto de familiares sí intensifica la deslealtad. Por eso el español principal mantiene el valor básico de «ser entregados» y deja que el contexto haga visible la traición implícita, sin recargarla en el verbo principal.
  doctrine_reference: BDAG; lectura contextual del pasivo de παραδίδωμι
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el último estado de revisión inglesa, sin cambios sustanciales respecto del sentido auditado: mantiene el pasivo de παραδίδωμι como «ser entregados», preserva la lista de parientes y traduce ἐξ ὑμῶν con una expresión idiomática equivalente. No se detectaron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se usa «Pero» para δὲ conforme al giro adversativo suave del contexto.
  - Se mantiene «Yahvé»/«Mesías» como normas generales del proyecto, aunque este versículo no las contiene.
  - «Hermanos» conserva la forma masculina plural del original; la posible lectura mixta queda en nota.
  - «Matarán a algunos de ustedes» evita un calco duro de ἐξ ὑμῶν y es idiomático en español.
  - Se ha evitado «siervos» u այլ terminología no pertinente; el versículo trata de entrega y muerte en persecución.
