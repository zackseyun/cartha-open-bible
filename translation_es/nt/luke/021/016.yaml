revisions:
- from: Pero ustedes serán entregados[a] incluso por padres, hermanos y parientes y amigos[b], y matarán a algunos de ustedes.
  to: Pero ustedes serán entregados incluso por padres, hermanos[a], parientes y amigos, y ellos matarán a algunos de ustedes.
  rationale: Se corrige el anclaje de la nota de ἀδελφῶν, se elimina una nota no sustentada por el audit trail inglés, y se explicita el sujeto de la segunda cláusula para mejorar la claridad en español sin alterar el sentido del griego.
