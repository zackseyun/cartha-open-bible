review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: futuro pasivo de παραδοθήσεσθε (''serán entregados''), la fuerza ascensiva de καὶ (''incluso''), la lista de agentes (''padres, hermanos, parientes y amigos'') y el sentido idiomático de ἐξ ὑμῶν (''algunos de ustedes''). Sin embargo, la sintaxis española de la segunda cláusula pierde claridad referencial: ''y matarán a algunos de ustedes'' deja más natural como sujeto implícito a agentes indeterminados, mientras que el contexto sugiere que esos mismos allegados serán los traidores y causantes de muerte. Conviene explicitar el sujeto con ''ellos''.'
  spanish_quality_summary: 'El español es natural y legible, pero hay dos problemas de calidad editorial: (1) la nota [b] está anclada en ''amigos'' aunque en realidad comenta ''hermanos''; debe moverse a ''hermanos''; (2) la nota [a] sobre ''serán traicionados'' no está respaldada por el inglés auditado, que decidió no elevar esa alternativa a nota. La frase revisada con ''ellos matarán...'' mejora la fluidez y evita ambigüedad.'
  glossary_alignment: No hay términos del glosario maestro en disputa aquí. 'Hermanos' respeta la decisión POB para ἀδελφῶν, con nota alternativa permitida. 'Serán entregados' sigue correctamente la decisión léxica para παραδοθήσεσθε. 'Parientes' y 'amigos' están bien. 'Matarán' es aceptable en español, aunque 'darán muerte' también sería posible; no es necesario cambiarlo.
  issues:
  - severity: medium
    issue: La nota sobre ἀδελφῶν está anclada al término equivocado.
    rationale: La nota [b] explica la posibilidad de 'hermanos y hermanas' / 'siblings', pero en el texto está colocada después de 'amigos'. Debe aparecer junto a 'hermanos' para corresponder al término comentado.
  - severity: low
    issue: La nota [a] introduce una alternativa no preservada en el audit trail inglés.
    rationale: El inglés documenta 'betrayed'/'traicionados' como alternativa léxica en decisiones, pero no la conserva como nota al lector. Dado que el verbo principal debe seguir siendo 'entregados' y no hay necesidad de crear una nota nueva en español, conviene omitirla.
  - severity: medium
    issue: La segunda cláusula puede sonar ambigüa en español sin sujeto expreso.
    rationale: Aunque el griego permite un sujeto implícito en θανατώσουσιν, en español 'y matarán a algunos de ustedes' puede leerse con sujeto inespecífico. 'Y ellos matarán a algunos de ustedes' enlaza claramente con los agentes recién enumerados.
  revised_spanish_text: Pero ustedes serán entregados incluso por padres, hermanos[a], parientes y amigos, y ellos matarán a algunos de ustedes.
  revised_footnotes:
  - marker: a
    text: O «hermanos y hermanas» / «hermanos», porque el plural masculino griego puede a veces referirse a un grupo mixto de hermanos.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota de ἀδελφῶν, se elimina una nota no sustentada por el audit trail inglés, y se explicita el sujeto de la segunda cláusula para mejorar la claridad en español sin alterar el sentido del griego.
