translation:
  language: es
  text: Pero antes de todas estas cosas, les echarán mano[a] y los perseguirán, entregándolos a sinagogas y cárceles, llevándolos ante reyes y gobernadores por causa de mi nombre.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los apresarán’. El griego literalmente dice ‘les echarán/pondrán las manos encima’, un modismo para arresto hostil o maltrato.
    reason: lexical_alternative
  - marker: b
    text: ‘Por causa de mi nombre’ también puede traducirse ‘a causa de mi nombre’ o, de forma más interpretativa, ‘por mí’. El texto principal conserva la expresión bíblica que vincula el nombre de Jesús con su persona y autoridad.
    reason: alternative_reading
lexical_decisions:
- source_word: Πρὸ δὲ τούτων πάντων
  english_pob_choice: But before all these things
  chosen_spanish: Pero antes de todas estas cosas
  alternatives_spanish:
  - Pero antes de todo esto
  - Ahora bien, antes de todas estas cosas
  lexicon: BDAG
  rationale: πρό con genitivo expresa anterioridad temporal; πάντων refuerza la totalidad de ‘estas cosas’. δέ marca transición/contraste, bien rendido con ‘Pero’. 'Estas cosas' conserva la referencia inmediata del discurso sin añadir interpretaciones.
- source_word: ἐπιβαλοῦσιν ἐφ’ ὑμᾶς τὰς χεῖρας αὐτῶν
  english_pob_choice: they will lay their hands on you
  chosen_spanish: pondrán sus manos sobre ustedes
  alternatives_spanish:
  - echarán mano de ustedes
  - los apresarán
  lexicon: BDAG
  rationale: La expresión es idiomática para arresto hostil o maltrato. ‘Pondrán sus manos sobre ustedes’ mantiene la imagen concreta del griego y su fuerza hostil; ‘echar mano de’ es más tradicional, pero menos transparente en español moderno. 'Apresarán' interpreta más explícitamente la acción.
- source_word: διώξουσιν
  english_pob_choice: persecute
  chosen_spanish: los perseguirán
  alternatives_spanish:
  - los acosarán
  - los hostigarán
  lexicon: BDAG
  rationale: En este contexto de oposición por causa de Jesús, διώκω tiene claramente el sentido de persecución, no de simple seguimiento. ‘Perseguir’ conserva ese valor.
- source_word: παραδιδόντες
  english_pob_choice: handing you over
  chosen_spanish: entregándolos
  alternatives_spanish:
  - poniéndolos en manos de
  - pasándolos a
  lexicon: BDAG
  rationale: El participio explica la manera de la persecución. ‘Entregándolos’ comunica bien el acto de pasar a alguien a custodia o autoridad en un contexto hostil, con naturalidad en español.
- source_word: εἰς τὰς συναγωγὰς καὶ φυλακάς
  english_pob_choice: to synagogues and prisons
  chosen_spanish: a sinagogas y cárceles
  alternatives_spanish:
  - a las sinagogas y cárceles
  - hacia sinagogas y cárceles
  lexicon: BDAG
  rationale: El griego permite un destino institucional; en español ‘a’ es más natural que ‘a las’ y se ajusta mejor a la forma sobria del original. Se conserva ‘sinagogas’ sin expandirlo a ‘autoridades de la sinagoga’ para no ir más allá del texto.
- source_word: ἀπαγομένους
  english_pob_choice: bringing you before
  chosen_spanish: llevándolos
  alternatives_spanish:
  - trayéndolos
  - conduciéndolos
  lexicon: BDAG
  rationale: El participio activo sigue la secuencia de acciones hostiles. ‘Llevándolos’ expresa el traslado forzado de manera natural y mantiene el movimiento hacia la instancia judicial.
- source_word: ἐπὶ βασιλεῖς καὶ ἡγεμόνας
  english_pob_choice: before kings and governors
  chosen_spanish: ante reyes y gobernadores
  alternatives_spanish:
  - delante de reyes y gobernadores
  - frente a reyes y gobernadores
  lexicon: BDAG
  rationale: En contexto judicial ἐπί con acusativo expresa comparecencia ‘ante’. ‘Ante’ reproduce bien la escena forense y evita una lectura meramente espacial.
- source_word: ἕνεκεν τοῦ ὀνόματός μου
  english_pob_choice: because of my name
  chosen_spanish: por causa de mi nombre
  alternatives_spanish:
  - a causa de mi nombre
  - por el bien de mi nombre
  lexicon: BDAG
  rationale: ‘Por causa de mi nombre’ conserva la expresión bíblica y su peso teológico. En español permite mantener ‘mi nombre’ como referencia a la persona y autoridad de Jesús sin reducirlo a un simple ‘por mí’.
theological_decisions:
- issue: Sentido teológico de ‘mi nombre’
  english_pob_reading: Retain the biblical expression ‘my name’ rather than interpretively expanding it to ‘because of me’ or ‘because you bear my name.’
  chosen_spanish_reading: Conservar ‘mi nombre’ como expresión bíblica, en lugar de expandirla interpretativamente a ‘por mí’ o ‘porque llevan mi nombre’.
  alternative_spanish_readings:
  - por mí
  - porque llevan mi nombre
  rationale: 'La frase τοῦ ὀνόματός μου tiene peso bíblico y cristológico: el ‘nombre’ representa la persona, autoridad y confesión de Jesús. Mantenerla en español preserva esa resonancia sin cerrar su alcance.'
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés POB: se evitó añadir artículo antes de ‘sinagogas’ y se reflejó el participio activo con una construcción española de movimiento (‘llevándolos’) en vez de una pasiva o perifrástica que oscurecería el sujeto agente.'
  spanish_consistency_notes:
  - Se usa ‘Jesús’ implícitamente en la expresión ‘mi nombre’ conforme al contexto y a la convención POB para Ἰησοῦς.
  - Se mantiene un registro sobrio y bíblico, con español moderno pero digno.
  - No se introdujo ‘Cristo’ ni ‘Señor’ porque el versículo no los contiene y la expresión clave es ‘mi nombre’.
