source:
  edition: SBLGNT
  text: Πρὸ δὲ τούτων πάντων ἐπιβαλοῦσιν ἐφ’ ὑμᾶς τὰς χεῖρας αὐτῶν καὶ διώξουσιν, παραδιδόντες εἰς ⸀τὰς συναγωγὰς καὶ φυλακάς, ⸀ἀπαγομένους ἐπὶ βασιλεῖς καὶ ἡγεμόνας ἕνεκεν τοῦ ὀνόματός μου·
base_translation:
  language: en
  yaml_path: translation/nt/luke/021/012.yaml
  text: But before all these things[a], they will lay their hands on you and persecute you, handing you over to synagogues and prisons[b], bringing you before kings and governors because of my name.
  footnotes:
  - marker: a
    text: Or 'they will seize you.' The Greek literally says 'they will lay their hands on you,' an idiom for hostile arrest or mistreatment.
    reason: lexical_alternative
  - marker: b
    text: '''Because of my name'' can also be rendered ''for the sake of my name'' or more interpretively ''because of me.'' The main text preserves the biblical expression linking Jesus'' name with his person and authority.'
    reason: alternative_reading
  ai_draft:
