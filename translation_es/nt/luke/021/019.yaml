revisions:
- from: Por vuestra perseverancia[a] ganaréis vuestras vidas[b].
  to: Por su perseverancia[a] conservarán su vida[b].
  rationale: Apliqué una reparación para mejorar la naturalidad en español neutral y evitar la flexión peninsular 'ganaréis/vuestra'. También ajusté a singular 'su vida' porque en español, con valor distributivo y sentido idiomático, suena más natural que 'sus vidas', sin perder el sentido holístico de ψυχάς. Además corregí la puntuación de la nota [a] y simplifiqué la nota [b] para que suene más natural en español. Aunque el cambio de segunda persona plural a formas no marcadas sacrifica algo de explicitud, mantiene el sentido central del texto de manera más idiomática para el público meta.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:02:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: ἐν expresa medio, ὑπομονή se comunica adecuadamente como perseverancia, κτήσασθε se vierte de forma resultativa/futura, y ψυχάς se entiende correctamente como ''vidas'' en sentido holístico. También preserva las dos notas del POB inglés: la alternativa más formal con imperativo y la alternativa léxica ''almas''.'
  spanish_quality_summary: 'La redacción principal es clara y comprensible, pero ''ganaréis'' suena algo literario/peninsular para el objetivo de español neutral latinoamericano. ''Obtendrán/ganarán'' con voseo/castellano no corresponde; la mejor reparación mínima es mantener segunda persona plural pero con una formulación más neutral y moderna: ''obtendrán'' no sirve por persona, así que conviene cambiar toda la cláusula a una construcción más natural: ''Por su perseverancia, preservarán sus vidas'' no sigue el POB. La opción más fiel y natural es ''Por su perseverancia'' tampoco porque el griego es segunda persona. Por eso la mejor solución es conservar persona pero usar una perífrasis moderna: ''Por su perseverancia, llegarán a conservar la vida'' tampoco cambia número/persona. Dado que el proyecto acepta formas eclesiales ampliamente legibles, puede mantenerse la segunda plural, pero hay un problema real de neutralidad. Además, la nota a dice ''O, más formalmente'' con coma innecesaria
    tras ''O''.'
  glossary_alignment: No hay términos de glosario mayores en juego. 'Perseverancia' para ὑπομονή es aceptable aunque 'endurance' se acerca también a 'resistencia perseverante'. 'Vidas' para ψυχὰς sigue correctamente la decisión del POB y la nota con 'almas' está bien. No hay conflicto con terminología teológica del proyecto.
  issues:
  - severity: medium
    issue: '''Ganaréis'' suena marcado y menos natural para español neutral latinoamericano.'
    rationale: Aunque es fiel semánticamente, la forma futura en -éis es más propia del castellano peninsular. Para un objetivo neutral LATAM/church-readable, conviene una formulación más natural que no dependa de esa flexión, si puede hacerse sin perder fidelidad.
  - severity: low
    issue: 'La nota [a] tiene puntuación poco natural: ''O, más formalmente''.'
    rationale: En español es más natural 'O más formalmente:' sin coma tras 'O'.
  - severity: low
    issue: La alternativa 'seres' en la nota [b] puede sonar algo extraña en español bíblico.
    rationale: Aunque refleja 'selves' del inglés, 'personas' o 'vidas mismas' serían más naturales. Sin embargo, como la nota actual ya es comprensible, no es un problema grave.
  revised_spanish_text: Por su perseverancia[a] conservarán su vida[b].
