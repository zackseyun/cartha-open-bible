translation:
  language: es
  text: Por su perseverancia[a] conservarán su vida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más formalmente: «En su perseverancia, ganen su vida», reflejando la forma imperativa del verbo.'
    reason: textual_variant
  - marker: b
    text: O «alma»; la palabra griega puede significar «vida», «ser» o «alma» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῇ ὑπομονῇ ὑμῶν
  english_pob_choice: By your endurance
  chosen_spanish: Por vuestra perseverancia
  alternatives_spanish:
  - Por vuestra endurance
  - En vuestra perseverancia
  - Mediante vuestra perseverancia
  lexicon: BDAG
  rationale: ἐν con dativo expresa medio o instrumento. En español, 'por' comunica de forma natural el medio; 'vuestra perseverancia' conserva el valor de ὑπομονή como resistencia firme bajo prueba. 'Perseverancia' suena más natural que un calco como 'endurance', pero mantiene el sentido de constancia ante la aflicción.
- source_word: κτήσασθε
  english_pob_choice: you will gain
  chosen_spanish: ganaréis
  alternatives_spanish:
  - ganad
  - adquiriréis
  - obtendréis
  - poseeréis
  lexicon: BDAG
  rationale: 'Aunque la forma griega es imperativa aorista media, el contexto admite un sentido resultativo o de consecuencia: por perseverar, los discípulos llegarán a ganar/conservar su vida. ''Ganaréis'' reproduce bien ese resultado en español y evita forzar un imperativo directo que sonaría menos natural en esta construcción.'
- source_word: τὰς ψυχὰς ὑμῶν
  english_pob_choice: your lives
  chosen_spanish: vuestras vidas
  alternatives_spanish:
  - vuestras almas
  - vuestros seres
  - vuestras personas
  lexicon: BDAG
  rationale: ψυχή puede significar 'vida', 'alma' o 'ser' según el contexto. Aquí el tema es la preservación de la vida frente a la persecución, por lo que 'vidas' conserva el sentido holístico preferido por el POB inglés y evita restringir indebidamente el término a la esfera inmortal del alma.
theological_decisions:
- issue: Sentido de ψυχή en un contexto de persecución y preservación final
  english_pob_reading: holistic 'lives' rather than narrowly immaterial 'souls'
  chosen_spanish_reading: vidas, no 'almas' en sentido restringido
  alternative_spanish_readings:
  - almas
  - seres
  rationale: La frase trata de la fidelidad bajo prueba y de la preservación última de los discípulos. 'Vidas' mantiene la tensión teológica entre peligro físico y preservación final, sin resolver prematuramente la cuestión antropológica. Esto sigue la lectura del POB inglés y evita introducir una dicotomía alma/cuerpo que el texto no exige.
  doctrine_reference: Preservar la tensión teológica; equivalencia óptima
translation_notes:
  revision_awareness: No se registran revisiones posteriores en el audit trail; la redacción sigue la lectura óptima ya estabilizada en el inglés POB, con la misma tensión formal/resultado del verbo y la misma amplitud semántica de ψυχή.
  spanish_consistency_notes:
  - Se prefirió 'perseverancia' para ὑπομονή por naturalidad y claridad en español, sin perder el matiz de resistencia bajo prueba.
  - Se mantuvo 'vidas' para ψυχάς, coherente con la decisión inglesa de evitar una restricción innecesaria a 'almas'.
  - El plural posesivo 'vuestras' conserva el destinatario directo del dicho a los discípulos.
