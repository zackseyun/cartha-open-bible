translation:
  language: es
  text: Y caerán a filo de espada y serán llevados cautivos a todas las naciones[c][b][a], y Jerusalén será pisoteada por las naciones, hasta que se cumplan los tiempos de las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre todas las naciones» / «a todos los gentiles» / «entre todos los gentiles»; el griego ἔθνη puede significar «naciones» o «gentiles» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «Jerusalén será pisoteada por los gentiles».
    reason: alternative_reading
  - marker: c
    text: O «hasta que se cumplan los tiempos de los gentiles».
    reason: alternative_reading
lexical_decisions:
- source_word: πεσοῦνται
  english_pob_choice: they will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - morirán
  - serán derribados
  lexicon: BDAG
  rationale: El futuro de πίπτω en un contexto bélico puede expresar la muerte o la caída en combate. «Caerán» conserva esa fuerza idiomática sin explicitar más de lo que el griego dice.
- source_word: στόματι μαχαίρης
  english_pob_choice: by the edge of the sword
  chosen_spanish: a filo de espada
  alternatives_spanish:
  - por la espada
  - a la boca de la espada
  lexicon: BDAG
  rationale: La expresión griega es un giro semítico literal, «boca de espada». En español, «a filo de espada» reproduce mejor la imagen concreta y el registro idiomático que una paráfrasis más plana.
- source_word: αἰχμαλωτισθήσονται
  english_pob_choice: will be led captive
  chosen_spanish: serán llevados cautivos
  alternatives_spanish:
  - serán tomados cautivos
  - serán deportados como cautivos
  lexicon: BDAG
  rationale: El pasivo futuro de αἰχμαλωτίζω indica ser llevados como prisioneros. «Serán llevados cautivos» conserva el sentido pasivo y el matiz de traslado forzado.
- source_word: εἰς τὰ ἔθνη πάντα
  english_pob_choice: into all the nations
  chosen_spanish: entre todas las naciones
  alternatives_spanish:
  - a todas las naciones
  - entre todos los gentiles
  lexicon: BDAG
  rationale: «Entre» puede expresar bien la dispersión dentro de un conjunto plural de pueblos y evita una rigidez excesivamente espacial de «en/ hacia». Mantengo «naciones» para conservar la coherencia léxica de ἔθνη en todo el versículo.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: Tradición onomástica española
  rationale: La forma española estándar del topónimo es «Jerusalén».
- source_word: πατουμένη
  english_pob_choice: will be trampled
  chosen_spanish: será pisoteada
  alternatives_spanish:
  - será hollada
  - será aplastada bajo los pies
  lexicon: BDAG
  rationale: El participio pasivo con ἔσται forma una perífrasis futura que describe un estado continuo. «Será pisoteada» preserva la imagen de humillación y dominio.
- source_word: ὑπὸ ἐθνῶν
  english_pob_choice: by the nations
  chosen_spanish: por las naciones
  alternatives_spanish:
  - por los gentiles
  - por los pueblos
  lexicon: BDAG
  rationale: Se mantiene «naciones» para responder de manera consistente a ἔθνη en todo el versículo. «Gentiles» queda como alternativa contextual posible, pero no necesaria en el texto principal.
- source_word: ἄχρι οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta cuando
  lexicon: BDAG
  rationale: La construcción temporal se vierte naturalmente como «hasta que» en español.
- source_word: πληρωθῶσιν
  english_pob_choice: are fulfilled
  chosen_spanish: se cumplan
  alternatives_spanish:
  - se completen
  - alcancen su plenitud
  lexicon: BDAG
  rationale: El subjuntivo pasivo aoristo de πληρόω permite un sentido de cumplimiento o realización de un período señalado. «Se cumplan» es la forma española más natural y conserva la pasividad.
- source_word: καιροὶ ἐθνῶν
  english_pob_choice: the times of the nations
  chosen_spanish: los tiempos de las naciones
  alternatives_spanish:
  - los tiempos de los gentiles
  - los tiempos señalados de las naciones
  lexicon: BDAG
  rationale: «Tiempos» refleja καιροί como épocas o momentos señalados, no solo duración cronológica. Se conserva «naciones» para no resolver prematuramente la ambigüedad semántica de ἔθνη.
theological_decisions:
- issue: Repetición de ἔθνη y posible contraste 'naciones' / 'gentiles'
  english_pob_reading: nations throughout the verse, with 'Gentiles' as a footnoted alternative
  chosen_spanish_reading: naciones throughout the verse, with 'gentiles' preserved only as an alternative note
  alternative_spanish_readings:
  - gentiles
  rationale: La repetición del mismo lexema griego pide cohesión léxica en español. Traducir siempre «naciones» preserva la unidad del versículo y deja abierta la pregunta teológica sobre si el énfasis es geopolítico o étnico-religioso.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §5 (consistency of key terms) and §3 (preserve theological tension).'
- issue: Sentido escatológico de καιροὶ ἐθνῶν
  english_pob_reading: the times of the nations are fulfilled
  chosen_spanish_reading: los tiempos de las naciones se cumplan
  alternative_spanish_readings:
  - los tiempos de los gentiles se cumplan
  - los tiempos señalados de las naciones se completen
  rationale: La traducción evita introducir un esquema escatológico específico que el griego no detalla. «Se cumplan» conserva el carácter de periodo divinamente fijado y su terminación sin explicitar cronologías posteriores.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3 (preserve theological tension rather than resolve it).'
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT y el rastro auditado en inglés. Se mantuvo la coherencia de ἔθνη como «naciones» en todo el versículo, se conservó la imagen idiomática de στόματι μαχαίρης con una equivalencia natural en español, y se respetó la perífrasis futura pasiva de πατουμένη. No se aplicaron revisiones posteriores al último pase auditado porque el estado indicado es 'unchanged'.
  spanish_consistency_notes:
  - Se usa «Jerusalén» como forma española estable del topónimo.
  - Se mantiene «naciones» para ἔθνη en todo el versículo, con la alternativa «gentiles» en notas.
  - «Tiempos» traduce καιροί como periodos señalados, no meramente duración.
  - Se evita 'SEÑOR' u otras sustituciones porque no interviene el tetragrama en este versículo.
  - El registro es bíblico moderno y claramente publicable, sin calcos innecesarios.
