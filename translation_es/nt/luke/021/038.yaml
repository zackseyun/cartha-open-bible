translation:
  language: es
  text: Y todo el pueblo acudía muy temprano a él en el templo[a] para oírlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior.
    reason: cultural_note
lexical_decisions:
- source_word: πᾶς ὁ λαὸς
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo reunido
  lexicon: BDAG
  rationale: La expresión es colectiva y distributiva. «Todo el pueblo» preserva el alcance amplio sin sugerir indebidamente a cada individuo de forma absoluta; además suena natural y digno en español.
- source_word: ὤρθριζεν
  english_pob_choice: would come early in the morning
  chosen_spanish: madrugaba
  alternatives_spanish:
  - iba temprano en la mañana
  - se levantaba temprano
  lexicon: BDAG
  rationale: El imperfecto indica acción habitual o repetida. «Madrugaba» transmite bien esa costumbre de ir temprano y evita una perífrasis pesada, manteniendo el matiz aspectual.
- source_word: πρὸς αὐτὸν
  english_pob_choice: to him
  chosen_spanish: para ir a él
  alternatives_spanish:
  - hacia él
  - a él
  lexicon: BDAG
  rationale: En este contexto, πρός con acusativo marca movimiento hacia una persona. «Para ir a él» hace explícito el movimiento implícito en español y conserva la referencia anafórica sin repetir «Jesús».
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en los atrios del templo
  - en el recinto del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo o recinto del templo, no el santuario interior. «En el templo» es la forma más natural y readable; la nota aclara el alcance del término griego.
- source_word: ἀκούειν αὐτοῦ
  english_pob_choice: to hear him
  chosen_spanish: para oírlo
  alternatives_spanish:
  - para escucharlo
  - para oír de él
  lexicon: BDAG
  rationale: El infinitivo expresa finalidad. «Para oírlo» es conciso, fiel e idiomático en español; conserva el sentido de escuchar sus palabras sin añadir información.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota al pie [a] ahora aparece anclada en el texto principal junto a «templo».'
  spanish_consistency_notes:
  - Se mantuvo «pueblo» para πᾶς ὁ λαός, en paralelo con el valor colectivo del griego.
  - Se evitó traducir κύριος o Χριστός, porque no aparecen en este versículo.
  - Se conservó el matiz iterativo del imperfecto con una forma habitual en español («madrugaba»).
  - La nota [a] aclara el valor de ἱερόν sin sobrecargar el cuerpo del texto.
