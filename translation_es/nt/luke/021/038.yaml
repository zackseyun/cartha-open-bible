revisions:
- from: Y todo el pueblo madrugaba para ir a él en el templo[a], para oírlo.
  to: Y todo el pueblo acudía muy temprano a él en el templo[a] para oírlo.
  rationale: Se reemplaza «madrugaba para ir a él» por «acudía muy temprano a él» para expresar con mayor naturalidad en español el imperfecto habitual de ὤρθριζεν junto con πρὸς αὐτόν. Se mantiene «en el templo» con nota para ἱερόν y «para oírlo» para la finalidad de ἀκούειν αὐτοῦ.
