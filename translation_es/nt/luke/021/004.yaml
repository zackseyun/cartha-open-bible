source:
  edition: SBLGNT
  text: ⸀πάντες γὰρ οὗτοι ἐκ τοῦ περισσεύοντος αὐτοῖς ἔβαλον εἰς τὰ ⸀δῶρα, αὕτη δὲ ἐκ τοῦ ὑστερήματος αὐτῆς ⸀πάντα τὸν βίον ὃν εἶχεν ἔβαλεν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/021/004.yaml
  text: For all these gave out of their abundance into the gifts[a], but she, out of her lack[c][b], put in all the livelihood she had.
  footnotes:
  - marker: a
    text: Or 'the offerings.' The Greek says 'the gifts,' referring to donated gifts in the temple context.
    reason: lexical_alternative
  - marker: b
    text: Or 'out of her poverty' or 'out of her need.'
    reason: lexical_alternative
  - marker: c
    text: Or 'all her living' or 'her whole means of living'; not 'all her life' in the sense of her entire existence.
    reason: lexical_alternative
