translation:
  language: es
  text: Porque todos estos echaron de lo que les sobraba en los dones[a]; pero ella, de su escasez[b], echó todo el sustento[c] que tenía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ofrendas». El griego dice literalmente «los dones», en un contexto de ofrendas en el templo.
    reason: lexical_alternative
  - marker: b
    text: O «de su pobreza» o «de su necesidad».
    reason: lexical_alternative
  - marker: c
    text: O «todo su modo de vivir» o «todos sus medios de vida»; no «toda su vida» en el sentido de su existencia entera.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες γὰρ οὗτοι
  english_pob_choice: For all these
  chosen_spanish: Porque todos estos
  alternatives_spanish:
  - Pues todos estos
  - Porque todos ellos
  lexicon: BDAG
  rationale: γάρ expresa conexión explicativa con el versículo anterior; en español, «Porque» mantiene ese enlace natural. πάντες οὗτοι se rinde como «todos estos» para conservar la referencia al grupo ya mencionado sin añadir paráfrasis.
- source_word: ἐκ τοῦ περισσεύοντος αὐτοῖς
  english_pob_choice: out of their abundance
  chosen_spanish: de lo que les sobraba
  alternatives_spanish:
  - de su abundancia
  - de lo que tenían en exceso
  lexicon: BDAG
  rationale: El participio περισσεύοντος apunta a lo que excede o sobra. «De lo que les sobraba» comunica con claridad ese exceso en español y mantiene el contraste con la escasez de la viuda.
- source_word: ἔβαλον εἰς τὰ δῶρα
  english_pob_choice: gave into the gifts
  chosen_spanish: echaron ... en las ofrendas
  alternatives_spanish:
  - pusieron ... en los dones
  - echaron ... en los dones
  lexicon: BDAG
  rationale: ἔβαλον conserva una imagen física de depositar/echar. «Echaron» la preserva mejor que «dieron» en español. τὰ δῶρα se traduce aquí como «las ofrendas» para evitar un giro poco natural como «los dones» y porque el contexto del templo aclara que son donativos dedicados a Dios.
- source_word: αὕτη δὲ
  english_pob_choice: but she
  chosen_spanish: pero ella
  alternatives_spanish:
  - sino que ella
  - pero esta mujer
  lexicon: BDAG
  rationale: La demostrativa femenina remite a la viuda del contexto. «Pero ella» es natural, conserva el contraste de δέ y evita redundancia innecesaria.
- source_word: ἐκ τοῦ ὑστερήματος αὐτῆς
  english_pob_choice: out of her lack
  chosen_spanish: de su escasez
  alternatives_spanish:
  - de su pobreza
  - de su necesidad
  - de lo que le faltaba
  lexicon: BDAG
  rationale: ὑστέρημα denota falta, carencia o escasez. «Escasez» mantiene el paralelismo con «sobraba» y suena más idiomático en español que una traducción demasiado literal como «falta».
- source_word: πάντα τὸν βίον
  english_pob_choice: all the livelihood
  chosen_spanish: todo el sustento
  alternatives_spanish:
  - todo su medio de vida
  - todo lo que tenía para vivir
  - toda su vida
  lexicon: BDAG
  rationale: βίος aquí se refiere a los medios de subsistencia, no a la vida biológica en abstracto. «Sustento» comunica ese valor material y evita que el lector entienda que entregó literalmente su existencia.
- source_word: ὃν εἶχεν
  english_pob_choice: she had
  chosen_spanish: que tenía
  alternatives_spanish:
  - que poseía
  - que le quedaba
  lexicon: BDAG
  rationale: La cláusula relativa modifica βίον y en español se integra naturalmente como «que tenía». Mantiene la idea de posesión o disponibilidad sin forzar la sintaxis.
- source_word: ἔβαλεν
  english_pob_choice: put in
  chosen_spanish: echó
  alternatives_spanish:
  - puso
  - depositó
  lexicon: BDAG
  rationale: Para la acción de la viuda, «echó» conserva el gesto concreto de depositar monedas y corresponde bien al verbo griego βάλλω en este contexto.
theological_decisions:
- issue: Sentido de βίος en la ofrenda de la viuda
  english_pob_reading: Rendered as material means of living ('livelihood'), not 'life' in an existential sense.
  chosen_spanish_reading: Se entiende como sustento/medios de vida, no como vida en sentido existencial.
  alternative_spanish_readings:
  - toda su vida
  - su vida entera
  rationale: El contexto trata de una entrega monetaria. Traducir βίος como «vida» podría inducir una lectura exagerada o confusa; «sustento» mantiene el sentido económico concreto del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Referencia de τὰ δῶρα
  english_pob_reading: Rendered closely as 'the gifts' rather than interpretively as 'the temple treasury' or simply 'the offering.'
  chosen_spanish_reading: Se traduce como «las ofrendas», manteniendo el contexto del templo sin introducir más precisión de la que da el griego.
  alternative_spanish_readings:
  - los dones
  - el tesoro del templo
  - las ofrendas del templo
  rationale: Aunque el contexto apunta al área de ofrendas del templo, τὰ δῶρα literalmente dice «los dones/gifts». En español, «ofrendas» es la opción más clara y eclesialmente inteligible sin sobreespecificar.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB al conservar la secuencia natural de la acción y la oposición entre abundancia/escasez, pero adapta la última expresión a un español publicable con «sustento» para βίος, manteniendo el sentido material del pasaje. También evita una traducción mecánica de δῶρα como «dones» en el cuerpo principal, reservando esa alternativa en nota.
  spanish_consistency_notes:
  - Se preserva el contraste léxico entre «sobraba» y «escasez» para reflejar περισσεύοντος / ὑστερήματος.
  - «Echaron» y «echó» mantienen la imaginería de βάλλω sin perder naturalidad en español.
  - «Ofrendas» es una decisión contextual para τὰ δῶρα; la alternativa literal «dones» queda documentada en nota.
  - «Sustento» comunica βίος como medios de vida, no como vida biológica o existencial.
  - El registro es reverente y contemporáneo, sin recurrir a fórmulas eclesiásticas más tradicionales que no están exigidas por el griego.
