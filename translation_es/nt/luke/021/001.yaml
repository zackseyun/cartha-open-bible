translation:
  language: es
  text: Entonces levantó la vista y vio a los ricos que echaban sus ofrendas en el tesoro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término griego traducido «tesoro» puede referirse al área del tesoro del templo o a recipientes para las ofrendas. O «sus dones» para «sus ofrendas».
    reason: combined_cultural_note_and_lexical_alternative
lexical_decisions:
- source_word: Ἀναβλέψας
  english_pob_choice: looked up
  chosen_spanish: levantó la vista
  alternatives_spanish:
  - miró hacia arriba
  - alzó la vista
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción concreta de alzar la mirada. «Levantó la vista» es natural en español y conserva el movimiento físico sin sonar rígido.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: La partícula es un conector suave de progresión narrativa. «Entonces» comunica avance temporal sin cargar contraste.
- source_word: εἶδεν
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - notó
  lexicon: BDAG
  rationale: El aoristo de ὁράω aquí es perceptivo y directo. «Vio» es la forma más simple y fiel.
- source_word: τοὺς βάλλοντας
  english_pob_choice: people putting
  chosen_spanish: a los que echaban
  alternatives_spanish:
  - a los que ponían
  - a los que depositaban
  lexicon: BDAG
  rationale: βάλλω puede tener sentido de echar o depositar en este contexto. Mantener «echaban» conserva mejor el verbo griego y evita suavizar demasiado la imagen.
- source_word: εἰς τὸ γαζοφυλάκιον
  english_pob_choice: into the treasury
  chosen_spanish: en el tesoro
  alternatives_spanish:
  - en la tesorería
  - en el arca del tesoro
  lexicon: BDAG
  rationale: γαζοφυλάκιον designa el área o receptáculo del templo para las ofrendas. «Tesoro» es breve y comprensible en español; «tesorería» sería más explicativo, pero menos natural aquí.
- source_word: τὰ δῶρα αὐτῶν
  english_pob_choice: their gifts
  chosen_spanish: sus dones
  alternatives_spanish:
  - sus regalos
  - sus ofrendas
  lexicon: BDAG
  rationale: δῶρα significa «dones» o «regalos»; en este contexto son ofrendas. «Dones» conserva la amplitud del término y permite que el contexto indique la función cultual.
- source_word: πλουσίους
  english_pob_choice: rich people
  chosen_spanish: a los ricos
  alternatives_spanish:
  - a las personas ricas
  - a los adinerados
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente. «A los ricos» reproduce esa función sin añadir explicaciones innecesarias.
translation_notes:
  revision_awareness: 'Se mantiene alta concordancia con el audit trail inglés: se conserva la progresión narrativa, el verbo perceptivo simple y el sentido de depósito de ofrendas en el área del tesoro del templo. La principal decisión de ajuste es traducir βάλλω con «echar» para reflejar mejor el verbo griego, sin perder inteligibilidad en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Tesoro» se emplea como equivalente conciso de γαζοφυλάκιον, con nota explicativa sobre su posible referencia al área o receptáculo del templo.
  - «Ricos» mantiene la función sustantiva del adjetivo griego πλουσίους.
