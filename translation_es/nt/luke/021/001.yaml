  rationale: Se cambia «dones» por «ofrendas» para evitar una ambigüedad importante en español y reflejar con claridad el contexto de contribuciones al templo. Se conserva «tesoro» con la nota explicativa existente. Para mantener la alternativa léxica documentada en el rastro inglés sin introducir una segunda marca innecesaria, se combina en una sola nota la explicación cultural de γαζοφυλάκιον y la alternativa «dones».
