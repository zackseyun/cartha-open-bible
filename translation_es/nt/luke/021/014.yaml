revisions:
- from: Por tanto[a], fijen en sus corazones no preparar de antemano cómo defenderse[b],
  to: Por tanto[a], decidan en sus corazones no preparar de antemano su defensa[b],
  rationale: Se reemplaza «fijen» por «decidan» para expresar de manera más natural en español el uso idiomático de θέτε ἐν ταῖς καρδίαις. Se elimina «cómo» del texto principal para ceñirse mejor a los infinitivos griegos, conservando esa expansión explicativa en la nota. «Su defensa» vierte con claridad ἀπολογηθῆναι en contexto forense y mantiene buena legibilidad.
