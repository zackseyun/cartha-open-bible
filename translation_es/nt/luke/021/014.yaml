    text: 'O: «establézcanlo en sus corazones» o «resuélvanlo en sus corazones».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no ensayar de antemano cómo hacer su defensa».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «fijen» por «decidan» para expresar de manera más natural en español el uso idiomático de θέτε ἐν ταῖς καρδίαις. Se elimina «cómo» del texto principal para ceñirse mejor a los infinitivos griegos, conservando esa expansión explicativa en la nota. «Su defensa» vierte con claridad ἀπολογηθῆναι en contexto forense y mantiene buena legibilidad.
