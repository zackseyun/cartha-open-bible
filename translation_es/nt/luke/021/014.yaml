translation:
  language: es
  text: Por tanto[a], decidan en sus corazones no preparar de antemano su defensa[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «establézcanlo en sus corazones» o «resuélvanlo en sus corazones».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no ensayar de antemano cómo hacer su defensa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: θέτε
  english_pob_choice: settle it
  chosen_spanish: fijen
  alternatives_spanish:
  - pongan
  - establézcanlo
  - decídanlo
  lexicon: BDAG
  rationale: El imperativo de τίθημι aquí es idiomático con ἐν ταῖς καρδίαις; en español, «fijen» expresa bien la idea de determinar internamente algo con decisión, sin perder el valor imperativo.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  - Por eso
  lexicon: BDAG
  rationale: Marca conclusión/inferencia respecto del contexto previo; «Por tanto» conserva claramente la relación lógica en un registro digno y natural.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  english_pob_choice: in your hearts
  chosen_spanish: en sus corazones
  alternatives_spanish:
  - en su corazón
  - dentro de ustedes
  - en lo íntimo de ustedes
  lexicon: BDAG
  rationale: Mantiene la imagen antropológica del interior como sede de resolución. En español, «corazones» conserva mejor el plural y el valor idiomático que una simplificación a «mente».
- source_word: μὴ προμελετᾶν
  english_pob_choice: not to prepare beforehand
  chosen_spanish: no preparar de antemano
  alternatives_spanish:
  - no ensayar de antemano
  - no meditar previamente
  - no premeditar
  lexicon: BDAG
  rationale: El verbo implica pensar o practicar con anticipación; «preparar de antemano» es claro en español moderno y evita el tono penal de «premeditar».
- source_word: ἀπολογηθῆναι
  english_pob_choice: to defend yourselves
  chosen_spanish: cómo defenderse
  alternatives_spanish:
  - cómo hacer su defensa
  - cómo responder en su defensa
  - cómo alegar en su defensa
  lexicon: BDAG
  rationale: El infinitivo medio apunta a presentar defensa; «defenderse» reproduce bien la fuerza reflexiva y suena natural en el contexto de respuesta ante acusación.
theological_decisions:
- issue: Alcance del mandato sobre la preparación para la defensa
  english_pob_reading: do not prepare beforehand to defend yourselves
  chosen_spanish_reading: no preparar de antemano cómo defenderse
  alternative_spanish_readings:
  - no pensar previamente en su defensa
  - no ensayar de antemano su defensa
  rationale: 'No se debilita la exhortación a la confianza en la asistencia divina, pero se conserva la tensión del texto: no prohibe toda reflexión, sino la preparación anticipada ansiosa o autosuficiente para la defensa.'
  doctrine_reference: Providencia y asistencia del Espíritu en testimonio bajo persecución; cf. paralelos sinópticos en el discurso escatológico.
translation_notes:
  revision_awareness: Coincide sustancialmente con el audit trail inglés de alta concordancia; se mantiene la equivalencia óptima sin suavizar la prohibición ni convertirla en una mera recomendación de serenidad. No se registraron revisiones textuales que alteren el sentido del verso.
  spanish_consistency_notes:
  - Se conserva «corazones» para reflejar el plural griego y el idioma bíblico del centro interior de decisión.
  - Se evita «Cristo», «Señor» o vocabulario no presente en el versículo.
  - «Defenderse» se usa como equivalente natural de ἀπολογηθῆναι sin perder el matiz forense.
  - La puntuación sigue el flujo imperativo + infinitivo en español, con nota alternativa para el matiz de θέτε.
