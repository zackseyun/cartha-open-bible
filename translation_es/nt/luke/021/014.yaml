review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: οὖν = «Por tanto», θέτε ἐν ταῖς καρδίαις ὑμῶν = una resolución interna en plural, y μὴ προμελετᾶν ἀπολογηθῆναι = no preparar de antemano la defensa. Sin embargo, «fijen en sus corazones no preparar...» omite el objeto implícito de θέτε y suena incompleto en español; además, «cómo defenderse» introduce un «cómo» que no está en el griego, aunque aparece en la nota inglesa como alternativa secundaria.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la construcción principal resulta algo forzada. «Decidan en sus corazones no preparar de antemano su defensa» o «resuélvanse en sus corazones a no preparar...» expresa mejor el giro idiomático. También conviene alinear la nota [a] con alternativas idiomáticas más naturales en español.
  glossary_alignment: No hay términos del glosario mayor en juego. «Corazones» preserva bien καρδίαις. «Defensa» mantiene adecuadamente el campo semántico de ἀπολογηθῆναι. La revisión propuesta mejora la fidelidad idiomática sin apartarse de las decisiones léxicas documentadas.
  issues:
  - severity: medium
    issue: Construcción española incompleta con «fijen en sus corazones»
    rationale: En español, «fijar en el corazón» normalmente requiere un objeto expreso («esto», «lo»). Sin ese objeto, la frase suena truncada y menos natural que el inglés «settle it in your hearts». El griego permite elipsis idiomática, pero el español la tolera peor.
  - severity: medium
    issue: Adición de «cómo» en «cómo defenderse»
    rationale: El griego tiene dos infinitivos («no preparar de antemano defenderse / hacer defensa»), no una cláusula interrogativa indirecta. «Cómo» es posible como expansión interpretativa, pero aquí es mejor evitarlo en el texto principal y dejar ese matiz para la nota.
  - severity: low
    issue: Nota [a] mejorable en naturalidad y correspondencia
    rationale: «Pongan» como alternativa es demasiado literal y poco natural sin objeto. Conviene ofrecer alternativas como «Establézcanlo» o «Resuélvanse»/«Decidan» que reflejen mejor el valor idiomático documentado.
  revised_spanish_text: Por tanto[a], decidan en sus corazones no preparar de antemano su defensa[b],
  revised_footnotes:
