translation:
  language: es
  text: Y mientras algunos hablaban acerca del templo, que había sido adornado con piedras hermosas y ofrendas votivas[a], dijo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dones dedicados'. El término griego se refiere a ofrendas dedicadas a Dios y expuestas en el templo.
    reason: lexical_alternative
  - marker: b
    text: Griego ἱερόν se refiere al recinto del templo en general, no específicamente al santuario interior.
    reason: cultural_note
lexical_decisions:
- source_word: τινων λεγόντων
  english_pob_choice: as some were speaking
  chosen_spanish: y mientras algunos hablaban
  alternatives_spanish:
  - mientras algunos hablaban
  - y cuando algunos hablaban
  lexicon: BDAG
  rationale: El participio en genitivo absoluto expresa una acción en curso concomitante; en español, 'mientras' reproduce bien ese trasfondo temporal sin sonar forzado. Se mantiene el carácter progresivo de 'hablaban'.
- source_word: τοῦ ἱεροῦ
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el complejo del templo
  - los atrios del templo
  lexicon: BDAG
  rationale: '''ἱερόν'' abarca el recinto del templo, no solo el santuario interior. ''El templo'' es la forma natural y fiel en español; el alcance más amplio queda implícito y se aclara en nota.'
- source_word: λίθοις καλοῖς
  english_pob_choice: with beautiful stones
  chosen_spanish: con piedras hermosas
  alternatives_spanish:
  - con piedras finas
  - con piedras espléndidas
  lexicon: BDAG
  rationale: '''Hermosas'' conserva el valor apreciativo de καλός aplicado a la calidad/atractivo de las piedras y suena natural en español moderno.'
- source_word: ἀναθήμασιν
  english_pob_choice: votive offerings
  chosen_spanish: ofrendas votivas
  alternatives_spanish:
  - dones dedicados
  - ofrendas dedicadas a Dios
  lexicon: BDAG
  rationale: '''Ἀνάθημα'' designa dones dedicados a una divinidad y expuestos en el ámbito del templo. ''Ofrendas votivas'' preserva el matiz cultual preciso sin confundirlo con sacrificios ordinarios.'
- source_word: κεκόσμηται
  english_pob_choice: had been adorned
  chosen_spanish: había sido adornado
  alternatives_spanish:
  - estaba adornado
  - había sido decorado
  lexicon: BDAG
  rationale: 'El perfecto pasivo señala un estado resultante: el templo estaba ya adornado. ''Había sido adornado'' conserva bien ese resultado previo al momento del discurso indirecto.'
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: él dijo
  alternatives_spanish:
  - dijo
  - Jesús dijo
  lexicon: BDAG
  rationale: El griego solo expresa el verbo y el sujeto se sobreentiende. 'Él dijo' respeta la economía del texto y evita introducir explícitamente un nombre no presente en el versículo.
theological_decisions:
- issue: Alcance de ἱερόν
  english_pob_reading: temple precincts generally, not specifically the inner sanctuary
  chosen_spanish_reading: el templo, entendido como el recinto del templo y no solo el santuario interior
  alternative_spanish_readings:
  - el santuario
  - el complejo del templo
  rationale: La distinción entre ἱερόν y ναός debe mantenerse. 'El templo' es idiomático en español y la nota preserva la precisión semántica sobre el recinto frente al santuario interior.
  doctrine_reference: Precisión léxica y contextual del vocabulario del Segundo Templo; no implica una doctrina específica.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el trazado auditado de la POB en inglés y conserva sus decisiones clave: marco temporal, ''templo'' para ἱερόν, ''piedras hermosas'', ''ofrendas votivas'' y el perfecto pasivo ''había sido adornado''. No se detectaron revisiones sustantivas aplicadas en el paquete fuente, por lo que la redacción española se alinea con el estado más reciente y estable del verso.'
  spanish_consistency_notes:
  - Se usa 'templo' en el texto principal, con nota aclaratoria para evitar confundir ἱερόν con ναός.
  - '''Ofrendas votivas'' mantiene el registro cultual preciso y consistente con el inglés POB.'
  - Se conserva el sujeto implícito con 'él'/'él dijo' para no añadir contenido ajeno al griego.
  - La puntuación refleja una sola cláusula introductoria seguida del discurso, conforme al griego.
