review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: «Así también ustedes» refleja οὕτως καὶ ὑμεῖς, «cuando vean» refleja bien ὅταν ἴδητε, «sepan» comunica adecuadamente γινώσκετε, y «el reino de Dios está cerca» preserva ἡ βασιλεία τοῦ θεοῦ / ἐγγύς ἐστιν sin expansión teológica. Sin embargo, «cuando vean que estas cosas suceden» añade «que» y cambia la construcción participial ταῦτα γινόμενα a una subordinada finita menos directa. No es un error grave, pero «estas cosas sucediendo» sería poco natural; por eso conviene una reparación idiomática como «estas cosas suceder» o mejor «estas cosas pasar / suceder» con infinitivo tras «ver».'
  spanish_quality_summary: La redacción es clara, natural y de registro eclesial amplio. El único punto mejorable es la fluidez y exactitud de «cuando vean que estas cosas suceden», que en español suena un poco menos natural en este contexto que «cuando vean suceder estas cosas». Las notas son útiles, pero la nota [a] debe acompañar la forma revisada del texto.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Dios», «reino de Dios» y el resto del léxico principal están alineados. La alternativa «reinado de Dios» como nota es aceptable como alternativa lexical, manteniendo en texto principal «reino de Dios».
  issues:
  - severity: medium
    issue: Construcción de ταῦτα γινόμενα
    rationale: El griego usa un participio («estas cosas sucediendo/aconteciendo»). El español del borrador («que estas cosas suceden») transmite el sentido, pero reestructura la frase de una manera menos cercana y ligeramente menos idiomática en este contexto. «Cuando vean suceder estas cosas» conserva mejor el valor aspectual de eventos en proceso y suena más natural.
  - severity: low
    issue: Anclaje de la nota [a] tras la revisión
    rationale: Si se revisa la frase principal, la nota alternativa debe corresponder exactamente al segmento marcado en el nuevo texto para mantener trazabilidad editorial.
  revised_spanish_text: Así también ustedes, cuando vean suceder estas cosas[a], sepan que el reino de Dios está cerca[b].
  revised_footnotes:
  - marker: a
    text: O «cuando vean que estas cosas tienen lugar».
    reason: lexical_alternative
  - marker: b
    text: O «el reinado de Dios está cerca».
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación pequeña para reflejar mejor ταῦτα γινόμενα y lograr una construcción más natural en español: «cuando vean suceder estas cosas». Se conservan el sentido, el registro, y la decisión teológica del POB sobre «el reino de Dios».'
