translation:
  language: es
  text: Así también ustedes, cuando vean suceder estas cosas[a], sepan que el reino de Dios está cerca[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando vean que estas cosas tienen lugar».
    reason: lexical_alternative
  - marker: b
    text: O «el reinado de Dios está cerca».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: So also
  chosen_spanish: Así también
  alternatives_spanish:
  - De la misma manera
  - Igualmente
  lexicon: BDAG
  rationale: Conserva la fuerza inferencial y comparativa del griego. «Así también» suena natural en español y mantiene el enlace con lo dicho antes sin añadir paráfrasis.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: BDAG
  rationale: El pronombre explícito queda en español sin forzarlo con una forma enfática. «Ustedes» es la opción neutral y pública para un registro eclesial amplio.
- source_word: ὅταν ἴδητε
  english_pob_choice: when you see
  chosen_spanish: cuando vean
  alternatives_spanish:
  - cuando ustedes vean
  - cada vez que vean
  lexicon: BDAG
  rationale: La construcción temporal futura en contexto predictivo se expresa de forma idiomática con «cuando vean». Mantiene la contingencia futura del subjuntivo sin cargar la frase.
- source_word: ταῦτα γινόμενα
  english_pob_choice: these things happening
  chosen_spanish: estas cosas suceden
  alternatives_spanish:
  - estas cosas acontecen
  - estas cosas tienen lugar
  - estas cosas van sucediendo
  lexicon: BDAG
  rationale: «γινόμενα» señala eventos que ocurren. En español, «suceden» comunica bien el sentido de hechos en desarrollo y evita el calco de «están ocurriendo» si se busca mayor fluidez. La relación con «estas cosas» se conserva sin expandir el texto.
- source_word: γινώσκετε
  english_pob_choice: know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - reconozcan
  lexicon: BDAG
  rationale: El imperativo pide comprender el significado de las señales. «Sepan» es natural, directo y conserva la fuerza exhortativa del verbo.
- source_word: ἐγγύς ἐστιν
  english_pob_choice: is near
  chosen_spanish: está cerca
  alternatives_spanish:
  - está próximo
  - se ha acercado
  lexicon: BDAG
  rationale: «Está cerca» reproduce la noción de proximidad temporal sin sobreinterpretar el matiz aspectual. Es claro y idiomático en español.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - la realeza de Dios
  lexicon: BDAG
  rationale: Se conserva la expresión bíblica tradicional y reconocible. En español, «reino» mantiene la tensión entre dominio y esfera sin resolverla a favor de una sola lectura.
theological_decisions:
- issue: Sentido de ἡ βασιλεία τοῦ θεοῦ en contexto escatológico
  english_pob_reading: Retain the phrase 'the kingdom of God' without interpretive expansion.
  chosen_spanish_reading: Conservar «el reino de Dios» sin ampliarlo interpretativamente.
  alternative_spanish_readings:
  - el reinado de Dios
  - el gobierno de Dios está cerca en su consumación
  rationale: El pasaje anuncia cercanía en relación con las señales descritas, pero no precisa si se trata de manifestación, consumación o vindicación. Mantener la frase bíblica preserva la tensión teológica en vez de resolverla.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión sigue de cerca el texto griego y el audit trail inglés, sin cambios de revisión pendientes; se preserva la equivalencia óptima y la tensión teológica documentada sobre βασιλεία τοῦ θεοῦ.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ y «reino de Dios» como fórmula estable, sin sustituirla por una paráfrasis doctrinal.
  - «Así también» mantiene el vínculo lógico con la comparación previa.
  - El verbo «suceden» evita una calca dura y sigue siendo fiel a γινόμενα en este contexto.
  - No se introduce lenguaje de «SEÑOR» porque aquí el texto griego no contiene κύριος.
