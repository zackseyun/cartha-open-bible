revisions:
- from: Así también ustedes, cuando vean que estas cosas suceden[a], sepan que el reino de Dios está cerca[b].
  to: Así también ustedes, cuando vean suceder estas cosas[a], sepan que el reino de Dios está cerca[b].
  rationale: 'Se hace una reparación pequeña para reflejar mejor ταῦτα γινόμενα y lograr una construcción más natural en español: «cuando vean suceder estas cosas». Se conservan el sentido, el registro, y la decisión teológica del POB sobre «el reino de Dios».'
  reviewer_model: gpt-5.4
