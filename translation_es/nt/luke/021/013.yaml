translation:
  language: es
  text: Esto resultará para ustedes en testimonio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esto resultará para ustedes en una oportunidad de dar testimonio»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποβήσεται
  english_pob_choice: will turn out
  chosen_spanish: les resultará
  alternatives_spanish:
  - les sucederá
  - terminará siendo
  - les ocurrirá
  lexicon: BDAG
  rationale: El futuro medio de ἀποβαίνω aquí expresa resultado o desenlace, no simple ocurrencia. «Les resultará» conserva esa idea de efecto final sobre los discípulos y suena natural en español.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  - les
  - a vosotros
  lexicon: BDAG
  rationale: Con un verbo de resultado en español, el dativo se expresa bien con «a ustedes»; evita forzar una construcción menos natural y mantiene la referencia directa a los discípulos.
- source_word: εἰς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - para
  - en
  - en calidad de
  lexicon: BDAG
  rationale: En la expresión εἰς μαρτύριον, εἰς marca resultado o finalidad. «Como» comunica en español la función resultante de ese hecho sin añadir más de lo que el griego dice.
- source_word: μαρτύριον
  english_pob_choice: a testimony
  chosen_spanish: un testimonio
  alternatives_spanish:
  - un testimonio público
  - un testimonio judicial
  - un acto de testimonio
  lexicon: BDAG
  rationale: μαρτύριον denota testimonio o acto/contenido de dar testimonio. «Un testimonio» preserva el sentido legal y público, y evita reducirlo a «evidencia» o a la persona del testigo.
theological_decisions:
- issue: Sentido del resultado de la persecución y comparecencias
  english_pob_reading: The events Jesus predicts will become an occasion for the disciples to bear testimony.
  chosen_spanish_reading: Los hechos que Jesús predice se convertirán en ocasión de testimonio para los discípulos.
  alternative_spanish_readings:
  - Los hechos servirán como evidencia contra sus opositores.
  - Les dará oportunidad de testificar.
  rationale: El contexto lucano apunta a comparecencias y examen ante autoridades, donde el resultado es testimonio acerca de Jesús. La redacción española conserva esa amplitud sin decidir en exceso si el matiz es principalmente evangelístico o judicial.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: El texto griego es breve y el audit trail inglés mantiene una ambigüedad significativa entre resultado, oportunidad de testimonio y posible valor jurídico. La versión española conserva esa amplitud con una formulación idiomática y no añade explicaciones no presentes en el griego.
  spanish_consistency_notes:
  - Se mantiene «testimonio» para μαρτύριον, coherente con la elección auditada en inglés.
  - Se evita «Cristo» o terminología no pertinente; el versículo no contiene vocabulario cristológico.
  - Se usa «a ustedes» en registro neutro latinoamericano y lector de iglesia, sin regionalismos marcados.
