translation:
  language: es
  text: con personas desmayándose[a] por el miedo y la expectativa de lo que vendrá sobre el mundo habitado[b], porque las potencias de los cielos[c] serán sacudidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desfalleciendo» o «expirando». El griego expresa pérdida de fuerzas o colapso ante el terror.
    reason: lexical_alternative
  - marker: b
    text: O «mundo» o «tierra»; el griego dice «el mundo habitado».
    reason: lexical_alternative
  - marker: c
    text: O «las potencias celestiales» o «las potencias del cielo». La expresión puede referirse en sentido amplio a poderes cósmicos o celestiales.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποψυχόντων
  english_pob_choice: fainting
  chosen_spanish: desmayándose
  alternatives_spanish:
  - desfalleciendo
  - sintiéndose morir
  - quedándose sin fuerzas
  lexicon: BDAG
  rationale: El participio presenta a las personas perdiendo fuerzas o colapsando por el terror. «Desmayándose» comunica bien esa reacción física y psicológica en español moderno sin volverlo demasiado técnico o arcaico.
- source_word: ἀνθρώπων
  english_pob_choice: people
  chosen_spanish: personas
  alternatives_spanish:
  - gente
  - humanidad
  - hombres
  lexicon: BDAG
  rationale: El griego es genérico y no masculino específico. «Personas» mantiene el referente humano general de manera natural en español.
- source_word: ἀπὸ φόβου
  english_pob_choice: from fear
  chosen_spanish: por el miedo
  alternatives_spanish:
  - a causa del miedo
  - de miedo
  - por temor
  lexicon: BDAG
  rationale: La preposición indica causa u origen. «Por el miedo» expresa la causa de forma clara y fluida en español.
- source_word: προσδοκίας
  english_pob_choice: expectation
  chosen_spanish: expectativa
  alternatives_spanish:
  - espera
  - anticipación
  - presagio
  lexicon: BDAG
  rationale: El sustantivo denota expectativa o espera. «Expectativa» conserva el núcleo léxico sin añadir por sí sola una interpretación más sombría que el griego.
- source_word: τῶν ἐπερχομένων
  english_pob_choice: of the things coming
  chosen_spanish: de lo que vendrá
  alternatives_spanish:
  - de las cosas que vienen
  - de los acontecimientos que se acercan
  - de lo que está por venir
  lexicon: BDAG
  rationale: El participio sustantivado alude a eventos inminentes. «Lo que vendrá» es una forma natural en español que conserva la referencia futura y evita una calca pesada.
- source_word: τῇ οἰκουμένῃ
  english_pob_choice: upon the inhabited world
  chosen_spanish: sobre la tierra habitada
  alternatives_spanish:
  - sobre el mundo habitado
  - sobre el mundo
  - sobre la tierra
  lexicon: BDAG
  rationale: «Tierra habitada» refleja bien οἰκουμένη y permite conservar la nota de humanidad habitante, no solo el planeta físico. Mantiene además la alternativa abierta entre «mundo» y «tierra».
- source_word: αἱ ... δυνάμεις τῶν οὐρανῶν
  english_pob_choice: the powers of the heavens
  chosen_spanish: las potencias de los cielos
  alternatives_spanish:
  - las potencias celestiales
  - las fuerzas de los cielos
  - las potencias del cielo
  lexicon: BDAG
  rationale: «Potencias» preserva el campo semántico de δύναμις y su posible referencia cósmica/celestial sin resolverla prematuramente. «De los cielos» mantiene la pluralidad y la forma del griego.
- source_word: σαλευθήσονται
  english_pob_choice: will be shaken
  chosen_spanish: serán sacudidas
  alternatives_spanish:
  - serán movidas
  - serán conmovidas
  - serán agitadas
  lexicon: BDAG
  rationale: El futuro pasivo expresa una conmoción real. «Serán sacudidas» comunica con claridad la imagen apocalíptica de perturbación cósmica.
theological_decisions:
- issue: Sentido de «las potencias de los cielos»
  english_pob_reading: Retain the ambiguous cosmic expression 'the powers of the heavens' rather than interpret it as either angelic beings or astronomical bodies alone.
  chosen_spanish_reading: Mantener la expresión ambigua «las potencias de los cielos» sin identificarla únicamente con seres angélicos ni con cuerpos astronómicos.
  alternative_spanish_readings:
  - las huestes celestiales
  - los cuerpos celestes
  - los poderes celestiales
  rationale: El texto participa del lenguaje apocalíptico y permite varias referencias posibles. La traducción conserva la tensión teológica y no estrecha el alcance más allá de lo que exige el griego.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al texto base; el estado más reciente indica que no hubo cambios necesarios y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se mantiene «personas» para el valor genérico de ἀνθρώπων, evitando un masculino no marcado.
  - «Cielos» y no «cielo» preserva la pluralidad formal del griego en τῶν οὐρανῶν.
  - Se eligió un español natural pero cercano al orden y a la imaginería del original, sin suavizar la escena apocalíptica.
