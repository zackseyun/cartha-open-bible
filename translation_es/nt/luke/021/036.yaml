translation:
  language: es
  text: Pero manténganse despiertos en todo momento[a], orando para que tengan fuerza para escapar de todas estas cosas que están por suceder[b], y para estar de pie ante el Hijo del Hombre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «para que sean considerados dignos de escapar de todas estas cosas...» en lugar de «para que tengan fuerza para escapar de todas estas cosas...».'
    reason: textual_variant
  - marker: b
    text: 'O: «que están por tener lugar».'
    reason: lexical_alternative
  - marker: c
    text: La expresión «estar de pie ante el Hijo del Hombre» puede implicar estar aceptados o vindicados delante de él, pero el griego lo deja implícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγρυπνεῖτε
  english_pob_choice: stay awake
  chosen_spanish: manténganse despiertos
  alternatives_spanish:
  - estén vigilantes
  - permanezcan alerta
  lexicon: BDAG
  rationale: ἀγρυπνέω expresa vigilancia mediante la imagen de no dormir; en español, «mantenerse despiertos» conserva la metáfora de alerta continua de forma natural y clara.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca transición con leve contraste respecto de la advertencia anterior; «Pero» reproduce bien ese giro discursivo en español.
- source_word: ἐν παντὶ καιρῷ
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - en todo momento
  lexicon: BDAG
  rationale: La idea distributiva y continua se expresa de modo natural con «en todo tiempo», sin perder la fuerza de permanencia.
- source_word: δεόμενοι
  english_pob_choice: praying
  chosen_spanish: orando
  alternatives_spanish:
  - rogando
  - suplicando
  lexicon: BDAG
  rationale: El participio indica oración de petición; «orando» es fiel y suficientemente amplio, mientras que «rogando» podría intensificar más de lo que el contexto exige.
- source_word: ἵνα κατισχύσητε
  english_pob_choice: that you may have strength
  chosen_spanish: para que tengan fuerza
  alternatives_spanish:
  - para que prevalezcan
  - para que sean lo bastante fuertes
  lexicon: BDAG
  rationale: κατισχύω puede significar tener fuerza suficiente o prevalecer. «Tengan fuerza» sigue la lectura principal del POB inglés y mantiene abierta la relación con el infinitivo siguiente sin introducir la variante textual de «ser considerados dignos» en el texto principal.
- source_word: ἐκφυγεῖν
  english_pob_choice: to escape
  chosen_spanish: escapar
  alternatives_spanish:
  - huir de
  - salir ilesos de
  lexicon: BDAG
  rationale: El infinitivo expresa el resultado esperado de tener fuerza; «escapar» es el equivalente más directo y claro en español.
- source_word: ταῦτα πάντα τὰ μέλλοντα γίνεσθαι
  english_pob_choice: all these things that are about to happen
  chosen_spanish: de todas estas cosas que están por suceder
  alternatives_spanish:
  - de todas estas cosas que van a ocurrir
  - de todas estas cosas que están a punto de pasar
  lexicon: BDAG
  rationale: La construcción μέλλω + infinitivo comunica cercanía/futuridad. «Están por suceder» conserva esa inminencia sin volverla excesivamente literal.
- source_word: σταθῆναι
  english_pob_choice: to stand
  chosen_spanish: estar en pie
  alternatives_spanish:
  - ponerse de pie
  - estar de pie
  lexicon: BDAG
  rationale: El infinitivo pasivo de ἵστημι en este contexto retiene la imagen de presentarse de pie ante alguien; «estar en pie» preserva esa imagen sin añadir explícitamente una valoración interpretativa.
- source_word: ἔμπροσθεν
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: Es un término relacional simple; «delante de» es claro y natural en español contemporáneo.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: La expresión titulativa se conserva de forma estándar en español bíblico, manteniendo su trasfondo semítico y cristológico.
theological_decisions:
- issue: Sentido de κατισχύσητε en relación con la perseverancia escatológica
  english_pob_reading: Rendered as 'may have strength' rather than 'may be counted worthy.'
  chosen_spanish_reading: «para que tengan fuerza»
  alternative_spanish_readings:
  - «para que sean considerados dignos»
  rationale: El texto griego principal lee κατισχύσητε, que habla de fuerza o capacidad para resistir/escapar. La variante «ser considerados dignos» pertenece a otra tradición textual y se conserva solo en nota para no mezclarla con el texto base.
  doctrine_reference: Filología textual y principio de transparencia textual
- issue: Alcance de σταθῆναι ἔμπροσθεν τοῦ υἱοῦ τοῦ ἀνθρώπου
  english_pob_reading: Kept as 'to stand before the Son of Man' without specifying acquittal or acceptance.
  chosen_spanish_reading: «estar en pie delante del Hijo del Hombre»
  alternative_spanish_readings:
  - «presentarse ante el Hijo del Hombre»
  - «ser aceptados delante del Hijo del Hombre»
  rationale: La frase puede sugerir vindicación o aceptación, pero el griego no lo explicita. Mantener la imagen de estar en pie preserva la tensión teológica sin interpretarla de más en el texto principal.
  doctrine_reference: Transparencia semántica y reserva exegética
translation_notes:
  revision_awareness: Se revisó el antecedente inglés y el control de concordancia textual; no hubo cambios en la decisión base. La versión española mantiene la lectura griega principal, conserva la variante textual en nota y evita sobreinterpretar la escena final.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «Hijo del Hombre» como título fijo, en línea con el estándar POB y el trasfondo del texto.
  - Se evitó traducir mecánicamente «be counted worthy» al texto principal, porque el griego base no lo dice; se dejó como variante en nota.
  - «Estar en pie» conserva mejor la imagen verbal de σταθῆναι que una paráfrasis interpretativa.
