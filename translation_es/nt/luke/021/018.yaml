- from: Y ni un solo cabello de su cabeza perecerá[a].
  to: Y ni un solo cabello de la cabeza de ustedes perecerá[a].
  rationale: Se cambia 'de su cabeza' por 'de la cabeza de ustedes' para reflejar con claridad la segunda persona plural del griego en español neutral y evitar ambigüedad. Se conserva 'ni un solo cabello' y 'perecerá' por fidelidad idiomática y de registro. La nota se corrige para que explique de verdad la fuerza de οὐ μὴ con una formulación más literal útil, en lugar de repetir la traducción principal.
