review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien el sentido básico de καὶ θρὶξ ἐκ τῆς κεφαλῆς ὑμῶν οὐ μὴ ἀπόληται como una garantía enfática proverbial de preservación. Sin embargo, 'de su cabeza' no refleja adecuadamente el ὑμῶν de segunda persona plural en el contexto directo de Jesús hablando a sus discípulos; en español neutral resulta más fiel y claro 'de la cabeza de ustedes' o 'de vuestra cabeza', y la primera opción es preferible por registro latinoamericano amplio. Además, la nota al pie no aporta una alternativa real, porque repite sustancialmente la misma redacción.
  spanish_quality_summary: La frase suena natural y digna, pero el uso de 'su cabeza' introduce ambigüedad entre tercera persona y tratamiento de cortesía singular/plural. 'Ni un solo cabello' es idiomático y claro; 'perecerá' preserva bien el registro solemne. Conviene ajustar la formulación para claridad referencial y rehacer la nota para que explique la doble negación griega en vez de presentar una falsa alternativa literal.
  glossary_alignment: No hay términos del glosario mayor en juego. La elección de 'perecerá' concuerda con la decisión POB para ἀπόληται. La representación de la doble negación enfática debe mantenerse en la explicación de nota, y la referencia pronominal debe alinearse mejor con la segunda persona plural del griego.
  issues:
  - severity: medium
    issue: Pronombre posesivo 'su' para ὑμῶν
    rationale: El griego tiene segunda persona plural ('de ustedes/de vosotros'). En español neutral, 'su cabeza' puede entenderse como tercera persona o tratamiento formal, creando ambigüedad innecesaria y debilitando la dirección directa del discurso.
  - severity: low
    issue: La nota al pie no ofrece una alternativa real
    rationale: Dice 'O, más literalmente...' pero repite básicamente la misma frase. La nota debería explicar la doble negación enfática o dar una formulación más literal distinta, como 'de ningún modo perecerá'.
  revised_spanish_text: Y ni un solo cabello de la cabeza de ustedes perecerá[a].
