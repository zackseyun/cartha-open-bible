translation:
  language: es
  text: Y ni un solo cabello de la cabeza de ustedes perecerá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «ni un solo cabello de la cabeza de ustedes de ningún modo perecerá»; el griego usa una doble negación enfática para expresar una seguridad muy fuerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - Y también
  lexicon: BDAG
  rationale: Se conserva la conexión simple del griego sin introducir contraste ni énfasis ajenos al texto.
- source_word: θρὶξ
  english_pob_choice: a hair
  chosen_spanish: ni un solo cabello
  alternatives_spanish:
  - un cabello
  - ni un cabello
  lexicon: BDAG
  rationale: Cabello reproduce el referente natural en español; la negación distributiva 'ni un solo' expresa con naturalidad la idea idiomática de la mínima parte, sin volverse mecánico.
- source_word: ἐκ τῆς κεφαλῆς ὑμῶν
  english_pob_choice: from your head
  chosen_spanish: de su cabeza
  alternatives_spanish:
  - de vuestra cabeza
  - de sus cabezas
  lexicon: BDAG
  rationale: En español actual, el posesivo de cortesía o plural colectivo puede sonar más natural como 'su' para dirigirse a un grupo, manteniendo el valor colectivo del griego sin forzar una pluralidad anatómica.
- source_word: οὐ μὴ
  english_pob_choice: will certainly not
  chosen_spanish: perecerá
  alternatives_spanish:
  - de ningún modo perecerá
  - no perecerá en absoluto
  lexicon: BDAG
  rationale: La doble negación enfática del griego se refleja con la fuerza global de la frase, sin añadir adverbios que el pasaje no exige. El sentido de seguridad queda intacto en español.
- source_word: ἀπόληται
  english_pob_choice: perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - se perderá
  - será destruido
  lexicon: BDAG
  rationale: '''Perecer'' preserva el registro solemne y el matiz de pérdida/ruina que el inglés POB eligió, sin convertirlo indebidamente en una afirmación sobre daño físico inmediato.'
theological_decisions:
- issue: Tensión aparente con persecución, sufrimiento y muerte en el contexto cercano
  english_pob_reading: Render the statement as a proverbial assurance of ultimate preservation rather than as a denial of any physical harm.
  chosen_spanish_reading: La frase se traduce como una garantía proverbial de preservación final, no como una negación de toda lesión física inmediata.
  alternative_spanish_readings:
  - Una promesa literal de que ningún daño corporal ocurrirá
  - Una imagen puramente hiperbólica sin valor de promesa
  rationale: El contexto no permite resolver la tensión eliminando el sufrimiento real; la traducción debe conservar la seguridad enfática del dicho sin sobreexplicarla ni suavizarla en exceso.
  doctrine_reference: Preservar la tensión teológica del contexto inmediato.
translation_notes:
  revision_awareness: La versión inglesa más reciente retiró 'ever' para no añadir énfasis no explícito en el griego. Esta redacción española evita añadir un equivalente como 'jamás' y mantiene la fuerza de la negación con una formulación natural.
  spanish_consistency_notes:
  - Se usa 'cabello' para θρὶξ por ser el equivalente natural en español; 'pelo' también sería posible, pero 'cabello' conserva mejor el registro bíblico sin volverse arcaico.
  - Se evita 'SEÑOR' o un sustituto interpretativo porque el verso no contiene el nombre divino.
  - '''Perecerá'' mantiene el valor de ἀπόλλυμι sin introducir ''perderse'' o ''destruirse'' como lectura dominante.'
