translation:
  language: es
  text: ¡Ay de las que están encintas y de las que amamantan en aquellos días! Porque habrá gran angustia sobre el país[a], e ira contra este pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la tierra». El griego γῆ puede significar «tierra» o «país/territorio»; aquí se traduce «país» porque el contexto inmediato se centra en Jerusalén y Judea.
    reason: lexical_alternative
  - marker: b
    text: O «ira para este pueblo» o «ira sobre este pueblo». El griego también puede expresarse de esas maneras en español según cómo se entienda la relación del dativo con «ira».
    reason: alternative_reading
lexical_decisions:
- source_word: οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de!
  - ¡Ay, desgracia de!
  lexicon: BDAG
  rationale: Conserva el valor profético de lamentación y juicio. En español, «¡Ay de…!» expresa bien el lamento amenazante sin volverlo meramente exclamativo.
- source_word: ταῖς ἐν γαστρὶ ἐχούσαις
  english_pob_choice: those who are pregnant
  chosen_spanish: las que están encintas
  alternatives_spanish:
  - las embarazadas
  - las que están embarazadas
  - las que llevan un hijo en el vientre
  lexicon: BDAG
  rationale: «ἐν γαστρὶ ἐχούσαις» es una expresión idiomática para embarazo. «Encintas» es fiel, natural en registro bíblico y evita una paráfrasis excesiva.
- source_word: ταῖς θηλαζούσαις
  english_pob_choice: those who are nursing infants
  chosen_spanish: las que amamantan
  alternatives_spanish:
  - las que están amamantando a sus bebés
  - las que lactan
  lexicon: BDAG
  rationale: El griego nombra a las madres que dan de mamar, sin especificar el objeto en la forma verbal. «Amamantan» conserva el sentido básico sin añadir «infantes» al texto principal.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - durante aquellos días
  lexicon: BDAG
  rationale: «Aquellos días» reproduce de forma natural la referencia temporal distal y solemne del griego.
- source_word: ἀνάγκη μεγάλη
  english_pob_choice: great distress
  chosen_spanish: gran angustia
  alternatives_spanish:
  - gran aflicción
  - gran calamidad
  - gran necesidad
  lexicon: BDAG
  rationale: En este contexto de desastre, ἀνάγκη expresa presión extrema, aflicción o calamidad. «Angustia» comunica bien la severidad sin perder el tono de crisis.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: upon the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra/país
  - en la tierra
  - sobre el país
  lexicon: BDAG
  rationale: La POB inglesa opta por «land» por el contexto local; en español, «sobre la tierra» mantiene la amplitud semántica de γῆ y la fuerza preposicional. La nota aclara la alternativa «la tierra»/«el país» y el posible alcance local.
- source_word: ὀργὴ
  english_pob_choice: wrath
  chosen_spanish: enojo
  alternatives_spanish:
  - ira
  - furor
  - juicio
  lexicon: BDAG
  rationale: 'Se preserva la tensión del término sin introducir explícitamente «ira divina» en el texto principal. «Enojo» es semánticamente legítimo, aunque más general que «ira»; la nota deja abiertas las lecturas alternativas. '
- source_word: τῷ λαῷ τούτῳ
  english_pob_choice: against this people
  chosen_spanish: contra este pueblo
  alternatives_spanish:
  - para este pueblo
  - sobre este pueblo
  lexicon: BDAG
  rationale: El dativo con ὀργή puede reflejar al destinatario del enojo. «Contra este pueblo» expresa adecuadamente el efecto hostil del sustantivo en español y conserva el demostrativo.
theological_decisions:
- issue: Alcance de γῆ
  english_pob_reading: 'A primarily local judgment is in view: ''the land'' refers most directly to Israel/Judea in the immediate discourse context.'
  chosen_spanish_reading: Se mantiene una traducción amplia («la tierra»), pero la nota permite leerla como referencia local al territorio de Judea/Israel según el contexto inmediato.
  alternative_spanish_readings:
  - la tierra
  - el país
  - la tierra/país
  rationale: El texto griego admite tanto 'tierra' como 'tierra/país'. La POB inglesa justifica 'land' por el contexto de Jerusalén y Judea; en español, 'tierra' evita perder la ambigüedad sin imponer una delimitación geográfica cerrada.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Naturaleza de ὀργή
  english_pob_reading: Rendered as 'wrath' without explicitly adding 'God's' in the main text.
  chosen_spanish_reading: Se traduce como «enojo»/«ira» sin añadir «de Dios» en el texto principal.
  alternative_spanish_readings:
  - ira de Dios
  - juicio
  - furor
  rationale: 'El griego solo dice ''ira/enojo''. Mantener la referencia no especificada preserva la tensión documentada por la POB: puede entenderse como ira divina, pero el texto no la explicita.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión indicado: no se registran cambios posteriores en el análisis fuente/auditoría. La redacción sigue la lectura óptima ya aprobada, manteniendo la ambigüedad documentada de γῆ y ὀργή.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece.
  - Se mantiene una distinción entre «tierra» como posible territorio local y la amplitud cósmica de «tierra» en español.
  - «Amamantan» conserva el sentido materno del participio griego sin introducir un objeto explícito en el cuerpo principal.
  - La puntuación exclamativa inicial refleja el tono profético de οὐαί.
