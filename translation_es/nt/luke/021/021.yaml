- from: Entonces, los que están en Judea huyan a los montes[a], y los que están en medio de ella se retiren, y los que están en las regiones no entren en ella.
  to: Entonces, los que están en Judea huyan a los montes, y los que están en medio de ella[a] se retiren, y los que están en el campo no entren en ella.
