translation:
  language: es
  text: Entonces, los que están en Judea huyan a los montes, y los que están en medio de ella[a] se retiren, y los que están en el campo no entren en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre femenino apunta a Jerusalén, personificada como mujer en el griego; por eso el texto dice «ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: BDAG
  rationale: El adverbio marca secuencia temporal inmediata con respecto a lo anterior. «Entonces» conserva esa relación de manera natural y sobria en español.
- source_word: οἱ ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: those in Judea
  chosen_spanish: los que están en Judea
  alternatives_spanish:
  - los que se hallan en Judea
  - los habitantes de Judea
  lexicon: BDAG
  rationale: La construcción articular con frase preposicional designa a las personas ubicadas allí. «Los que están en Judea» es idiomático y mantiene el carácter descriptivo sin añadir precisión inexistente.
- source_word: φευγέτωσαν
  english_pob_choice: let ... flee
  chosen_spanish: huyan
  alternatives_spanish:
  - que huyan
  - deben huir
  lexicon: BDAG
  rationale: El imperativo de tercera persona expresa urgencia. En español, el subjuntivo exhortativo «huyan» comunica mejor la fuerza imperativa que una perífrasis más pesada.
- source_word: εἰς τὰ ὄρη
  english_pob_choice: to the mountains
  chosen_spanish: a los montes
  alternatives_spanish:
  - a las montañas
  - a los cerros
  lexicon: BDAG
  rationale: «ὄρη» corresponde literalmente a montes/montañas. «Montes» es una opción clara y bíblica en español, sin forzar un matiz distinto.
- source_word: οἱ ἐν μέσῳ αὐτῆς
  english_pob_choice: those in the midst of it/her
  chosen_spanish: los que están en medio de ella
  alternatives_spanish:
  - los que están en medio de ésta
  - los que están dentro de ella
  lexicon: BDAG
  rationale: Se conserva el referente femenino implícito del griego, que apunta a Jerusalén personificada. «En medio de ella» reproduce la anáfora sin resolverla prematuramente en el cuerpo del texto.
- source_word: ἐκχωρείτωσαν
  english_pob_choice: let ... depart
  chosen_spanish: se retiren
  alternatives_spanish:
  - salgan
  - se aparten
  lexicon: BDAG
  rationale: El verbo comunica retirarse o alejarse de un lugar. «Se retiren» suena natural en español y mantiene la idea de evacuación sin añadir una dirección explícita no expresada por el griego.
- source_word: οἱ ἐν ταῖς χώραις
  english_pob_choice: those in the countryside
  chosen_spanish: los que están en las regiones
  alternatives_spanish:
  - los que están en el campo
  - los que están en la campiña
  lexicon: BDAG
  rationale: χώρα puede referirse a zonas rurales o regiones fuera de la ciudad. Dado el contexto de evacuación urbana, «las regiones» preserva la amplitud semántica y evita restringir indebidamente a terreno agrícola.
- source_word: μὴ εἰσερχέσθωσαν
  english_pob_choice: let ... not enter
  chosen_spanish: no entren
  alternatives_spanish:
  - no se metan
  - que no entren
  lexicon: BDAG
  rationale: La prohibición imperativa se expresa con «no entren», forma directa y natural en español, manteniendo el paralelismo con los otros mandatos.
- source_word: εἰς αὐτήν
  english_pob_choice: into her/it
  chosen_spanish: en ella
  alternatives_spanish:
  - dentro de ella
  - a ella
  lexicon: BDAG
  rationale: Aunque el griego dice «a/into ella», en español la prohibición de entrar suele expresarse con «en ella» o «a ella». Aquí «en ella» conserva el sentido de acceso al interior y permite mantener el pronombre femenino del texto fuente.
theological_decisions:
- issue: Referente femenino de los pronombres αὐτῆς / αὐτήν
  english_pob_reading: Preserve the feminine pronoun in English as 'it'/'her' depending on revision, with note clarifying Jerusalem personification.
  chosen_spanish_reading: Conservar «ella» para reflejar la personificación femenina del referente, entendida como Jerusalén.
  alternative_spanish_readings:
  - resolverlo como «la ciudad» en el texto principal
  - usar «eso»/«ello» para evitar la personificación
  rationale: No hay un problema doctrinal, sino de fidelidad al texto y a su personificación gramatical. En español, «ella» conserva la huella del femenino griego y evita introducir un sustantivo no presente en el verso.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa del POB pasó de «her» a «it» en una revisión posterior para mayor naturalidad y claridad referencial. En español, sin embargo, se conserva el femenino «ella» porque permite mantener la personificación subyacente del griego sin perder comprensibilidad; el referente sigue siendo Jerusalén dentro del contexto inmediato.
  spanish_consistency_notes:
  - Se usa «montes» para ὄρη, coherente con un registro bíblico sobrio.
  - Se usa «ella» para el referente femenino implícito, en continuidad con la textura del griego.
  - Se evita «SEÑOR» o cualquier sustitución teológica ajena, pues el verso no contiene el nombre divino.
  - Se mantiene una estructura paralela para las tres exhortaciones, como en el griego.
