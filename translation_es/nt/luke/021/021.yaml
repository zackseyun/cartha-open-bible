review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura tripartita del griego, el valor exhortativo de los imperativos y la referencia contextual a Jerusalén mediante pronombres femeninos. Sin embargo, «en las regiones» no transmite tan bien como «en el campo» o «en la campiña» el sentido de οἱ ἐν ταῖς χώραις como zonas rurales/campo alrededor de la ciudad. Además, «no entren en ella» pierde un poco la fuerza direccional de εἰς αὐτήν, mejor expresada como «no entren en ella» o «no entren allí»; el texto actual ya usa «en ella», que es aceptable, pero conviene mantener la nota solo donde realmente ancla el rasgo personificante.
  spanish_quality_summary: El español es claro y digno, pero «las regiones» suena administrativo y menos natural en este contexto de huida/evacuación. «Los que estén en el campo» resulta más idiomático y corresponde mejor al contraste ciudad/campo. El resto del verso fluye bien en español eclesial moderno.
  glossary_alignment: No hay términos del glosario mayor en juego aparte de la referencia femenina a Jerusalén, que el borrador conserva adecuadamente con «ella» y una nota. No se detectan conflictos con Yahvé/Mesías/etc. La decisión de mantener «montes» es válida y legible.
  issues:
  - severity: medium
    issue: «los que están en las regiones» para οἱ ἐν ταῖς χώραις
    rationale: χῶραι aquí contrasta con la ciudad/Jerusalén y apunta a zonas rurales o al campo. «Las regiones» es demasiado amplio y burocrático en español, y debilita la imagen concreta del texto.
  - severity: low
    issue: Anclaje de la nota solo en «montes»
    rationale: La nota explica el pronombre femenino «ella», no «montes». El marcador debe ir donde aparece el rasgo comentado, para cumplir la disciplina de notas y evitar confusión.
  revised_spanish_text: Entonces, los que están en Judea huyan a los montes, y los que están en medio de ella[a] se retiren, y los que están en el campo no entren en ella.
  revised_footnotes:
