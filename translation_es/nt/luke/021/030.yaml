    issue: «al verlo por ustedes mismos» introduce un objeto singular no explícito y algo ambiguo
    rationale: βλέποντες ἀφ’ ἑαυτῶν no especifica «lo»; expresa ver/observar por cuenta propia. El singular puede hacer pensar en una sola señal concreta en vez de la observación directa del brotar.
  - severity: low
    issue: La razón léxica de βλέποντες debería evitar depender de un objeto no expreso
    rationale: La decisión documentada puede afinarse para reflejar mejor el participio circunstancial sin añadir un referente singular artificial.
