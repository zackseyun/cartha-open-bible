  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: cláusula temporal («cuando»), crecimiento botánico implícito, repetición de «ya», reconocimiento por observación propia y cercanía del verano. Sin embargo, «al verlo» introduce un singular («lo») no presente en el original y reduce el alcance de βλέποντες ἀφ’ ἑαυτῶν, que apunta más ampliamente a observar por cuenta propia lo que los árboles muestran.'
  spanish_quality_summary: El español es claro y natural, pero «al verlo por ustedes mismos» suena algo forzado por la combinación del infinitivo singular con un referente implícito. «Al verlas ustedes mismos» mejora la concordancia con «hojas», pero aun así estrecha el sentido. «Viéndolo ustedes mismos» también sería ambiguo. La formulación más fiel y fluida es «al verlo por ustedes mismos» -> mejor «al observarlo ustedes mismos» o, más directamente, «viendo esto por ustedes mismos».
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. La nota sobre «hojas» conserva correctamente la aclaración de que el griego no lo dice explícitamente. La repetición de «ya» está bien preservada.
  issues:
