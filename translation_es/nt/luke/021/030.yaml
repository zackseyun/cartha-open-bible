translation:
  language: es
  text: cuando ya broten hojas[a], al observarlo ustedes mismos, saben que el verano ya está cerca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «cuando ya broten [crecimiento]». El griego no dice explícitamente «hojas», pero el contexto botánico lo implica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: BDAG
  rationale: Introduce una cláusula temporal contingente; «cuando» reproduce de manera natural la fuerza introductoria sin volverla repetitiva o demasiado condicional.
- source_word: προβάλωσιν
  english_pob_choice: have already put forth leaves
  chosen_spanish: ya broten hojas
  alternatives_spanish:
  - ya echen brotes
  - ya saquen hojas
  - ya den crecimiento
  lexicon: BDAG
  rationale: El verbo describe la aparición de nuevo crecimiento en el marco botánico del contexto inmediato. En español, «broten hojas» comunica bien la imagen implícita y evita una paráfrasis excesiva.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - todavía
  lexicon: BDAG
  rationale: El adverbio aparece dos veces y marca la evidencia inmediata del signo estacional. «Ya» conserva esa repetición y naturalidad en español.
- source_word: βλέποντες
  english_pob_choice: seeing
  chosen_spanish: al verlo
  alternatives_spanish:
  - viendo
  - al observar
  lexicon: BDAG
  rationale: 'El participio expresa circunstancia concomitante: al observar la señal, se reconoce su significado. «Al verlo» suena natural en español y mantiene la relación participial.'
- source_word: ἀφ’ ἑαυτῶν
  english_pob_choice: for yourselves
  chosen_spanish: por ustedes mismos
  alternatives_spanish:
  - de ustedes mismos
  - por sí mismos
  - a partir de ustedes mismos
  lexicon: BDAG
  rationale: El modismo apunta a discernimiento propio, sin explicación externa. «Por ustedes mismos» expresa esa observación directa de manera clara en español latinoamericano.
- source_word: γινώσκετε
  english_pob_choice: you know
  chosen_spanish: saben
  alternatives_spanish:
  - reconocen
  - entienden
  lexicon: BDAG
  rationale: Se trata de un conocimiento práctico y evidente a partir de lo observado. «Saben» es breve, idiomático y adecuado al tono proverbial del dicho.
- source_word: ἐγγὺς
  english_pob_choice: near
  chosen_spanish: cerca
  alternatives_spanish:
  - próximo
  - a la mano
  lexicon: BDAG
  rationale: Término básico de cercanía temporal. «Cerca» es la opción más natural en español para la analogía estacional.
- source_word: θέρος
  english_pob_choice: summer
  chosen_spanish: el verano
  alternatives_spanish:
  - la estación del verano
  lexicon: BDAG
  rationale: Designa la estación del verano. «El verano» es claro, idiomático y fiel al sentido.
translation_notes:
  revision_awareness: 'Se ajustó la versión española para evitar una nota sin anclaje: el marcador [a] quedó incorporado en «hojas[a]». La redacción sigue de cerca el griego, conservando la secuencia temporal, el matiz de observación propia y la repetición de «ya».'
  spanish_consistency_notes:
  - Se mantuvo un registro neutral y públicamente legible para lectores cristianos de habla hispana.
  - Se evitó «SEÑOR» u otra terminología no presente en este versículo.
  - Se preservó la fuerza botánica implícita del verbo sin sobreespecificar más allá de lo que el contexto apoya.
  - La repetición de «ya» corresponde al doble ἤδη del griego y ayuda a sostener la inmediatez del signo.
