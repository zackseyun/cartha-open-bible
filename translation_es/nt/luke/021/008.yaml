translation:
  language: es
  text: 'Y él dijo[a]: «Tengan cuidado de que no sean extraviados. Porque muchos vendrán en mi nombre, diciendo: “Yo soy él”, y: “El tiempo se ha acercado”. No vayan tras ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «Yo soy»; es decir, un falso reclamante que se identifica como el esperado, posiblemente el Mesías.'
    reason: alternative_reading
lexical_decisions:
- source_word: Βλέπετε
  english_pob_choice: See that
  chosen_spanish: Miren que
  alternatives_spanish:
  - Vigilen que
  - Tengan cuidado de que
  lexicon: BDAG
  rationale: El imperativo plural pide vigilancia atenta. «Miren que» es natural en español y gobierna bien la advertencia que sigue.
- source_word: μὴ πλανηθῆτε
  english_pob_choice: you are not led astray
  chosen_spanish: no sean extraviados
  alternatives_spanish:
  - no sean engañados
  - no se desvíen
  lexicon: BDAG
  rationale: «Extraviados» conserva la imagen de ser desviados del camino, más cercana al matiz metafórico de πλανηθῆτε que una mera idea de engaño intelectual.
- source_word: ἐλεύσονται ἐπὶ τῷ ὀνόματί μου
  english_pob_choice: will come in my name
  chosen_spanish: vendrán en mi nombre
  alternatives_spanish:
  - vendrán apelando a mi nombre
  - vendrán bajo mi nombre
  lexicon: BDAG
  rationale: La expresión idiomática se vierte de manera directa y natural en español. «En mi nombre» mantiene el sentido de autoridad o respaldo reclamado.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - afirmando
  - alegando
  lexicon: BDAG
  rationale: El participio introduce el contenido del falso reclamo; «diciendo» es la equivalencia más directa y no añade una interpretación que el griego no exige.
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am he
  chosen_spanish: Yo soy él
  alternatives_spanish:
  - Yo soy
  - Yo soy el indicado
  lexicon: BDAG
  rationale: En este contexto de impostores, el griego es una autoidentificación implícita. «Yo soy él» expresa la frase elíptica sin convertirla en una afirmación más explícita de lo que el texto dice.
- source_word: Ὁ καιρὸς ἤγγικεν
  english_pob_choice: The time has drawn near
  chosen_spanish: El tiempo ha llegado
  alternatives_spanish:
  - El tiempo está cerca
  - El tiempo se ha acercado
  lexicon: BDAG
  rationale: καιρός puede referirse al momento decisivo o señalado; en español «El tiempo ha llegado» comunica esa proximidad y carácter decisivo sin sonar forzado.
- source_word: μὴ πορευθῆτε ὀπίσω αὐτῶν
  english_pob_choice: Do not go after them
  chosen_spanish: No vayan tras ellos
  alternatives_spanish:
  - No los sigan
  - No vayan detrás de ellos
  lexicon: BDAG
  rationale: «Ir tras ellos» conserva la imagen direccional de ὀπίσω y mantiene el tono de advertencia del mandato.
theological_decisions:
- issue: Valor de Ἐγώ εἰμι en un dicho de falsos reclamantes
  english_pob_reading: I am he
  chosen_spanish_reading: Yo soy él
  alternative_spanish_readings:
  - Yo soy
  - Yo soy el Mesías
  rationale: La frase puede sonar absoluta en español, pero aquí funciona como identificación implícita de un pretendiente. Se evita añadir «el Mesías», porque el griego no lo dice explícitamente; a la vez, se conserva la tensión interpretativa del pasaje.
  doctrine_reference: Preservar la tensión exegética sin resolverla con una especificación no presente en el texto.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece exactamente en el texto español y la nota queda anclada a esa frase. No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque el texto no contiene el nombre divino.
  - Se conservó «tiempo» para καιρός, evitando una paráfrasis que diluyera el sentido de momento decisivo.
  - Se usó «No vayan tras ellos» para reproducir la dirección de ὀπίσω sin sobreinterpretar como mera obediencia o adhesión.
