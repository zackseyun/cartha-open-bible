revisions:
- from: 'Y él dijo[a]: «Miren que no sean extraviados. Porque muchos vendrán en mi nombre, diciendo: “Yo soy él”, y: “El tiempo ha llegado”. No vayan tras ellos».'
  to: 'Y él dijo[a]: «Tengan cuidado de que no sean extraviados. Porque muchos vendrán en mi nombre, diciendo: “Yo soy él”, y: “El tiempo se ha acercado”. No vayan tras ellos».'
  rationale: Se ajusta «El tiempo ha llegado» a «El tiempo se ha acercado» para reflejar con más precisión ἤγγικεν y la decisión léxica del POB inglés. También se mejora «Miren que» a «Tengan cuidado de que» por claridad panhispánica y mejor registro exhortativo. Se conserva «Yo soy él» con nota, ya que transmite la autoidentificación implícita sin sobreinterpretar como «el Mesías».
