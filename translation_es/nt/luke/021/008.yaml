review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: vigilancia contra ser desviados, falsos reclamantes que vendrán en el nombre de Jesús, sus dos afirmaciones, y la prohibición de ir tras ellos. Sin embargo, «El tiempo ha llegado» cambia el matiz de ἤγγικεν (''se ha acercado / está cerca'') a cumplimiento pleno (''ha llegado''), y conviene ajustar esa cláusula para preservar la fuerza aspectual y semántica documentada en el POB inglés.'
  spanish_quality_summary: 'El español es claro y legible, pero tiene dos puntos mejorables: «Miren que» suena menos panhispánico y algo coloquial frente a una advertencia solemne; «Tengan cuidado de que» o «Miren bien que» sería más estable. Además, «Yo soy él» es comprensible pero algo tieso; aun así, puede mantenerse por fidelidad al inglés auditado y apoyarse con la nota. El cambio principal necesario es «El tiempo se ha acercado» o «El tiempo está cerca»; la primera preserva mejor el perfecto griego.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La nota sobre Ἐγώ εἰμι conserva adecuadamente la alternativa «Yo soy» y la posible referencia al Mesías. La decisión «extraviados» mantiene bien la imagen de ser desviados. Se recomienda una leve mejora idiomática en la advertencia inicial sin apartarse del sentido fuente.
  issues:
  - severity: medium
    issue: «El tiempo ha llegado» para Ὁ καιρὸς ἤγγικεν
    rationale: ἤγγικεν expresa cercanía presente ('se ha acercado', 'está cerca'), no llegada consumada. «Ha llegado» puede sugerir que el momento ya ocurrió plenamente, debilitando el matiz fuente y contradiciendo la rationale inglesa auditada.
  - severity: low
    issue: «Miren que» como equivalente de Βλέπετε
    rationale: Es entendible, pero suena más regional/coloquial y menos natural en registro bíblico panhispánico que «Tengan cuidado de que» o «Cuiden de no…». Conviene pulir la legibilidad sin perder la función exhortativa.
  revised_spanish_text: 'Y él dijo[a]: «Tengan cuidado de que no sean extraviados. Porque muchos vendrán en mi nombre, diciendo: “Yo soy él”, y: “El tiempo se ha acercado”. No vayan tras ellos».'
  revised_footnotes:
