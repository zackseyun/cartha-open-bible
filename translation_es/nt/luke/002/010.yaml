translation:
  language: es
  text: 'Y el ángel les dijo: «No teman, porque miren,[a] les anuncio buenas noticias de gran alegría, que será para todo el pueblo».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he aquí». El griego tiene un marcador discursivo de atención.
    reason: lexical_alternative
  - marker: b
    text: O «para todas las personas». El griego dice más literalmente «para todo el pueblo», que en Lucas a menudo tiene un sentido definido en su contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἄγγελος
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - un ángel
  lexicon: BDAG
  rationale: El artículo definido apunta al ángel ya presentado en el contexto; por eso, en español también conviene usar el definido «el ángel» y no un indefinido.
- source_word: Μὴ φοβεῖσθε
  english_pob_choice: Do not be afraid
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No teman ustedes
  lexicon: BDAG
  rationale: La prohibición negativa se expresa de forma natural en español con «No teman», que conserva el tono directo e imperativo sin rigidez arcaica.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: porque
  alternatives_spanish:
  - miren
  - he aquí
  lexicon: BDAG
  rationale: Aquí ἰδού funciona como marcador discursivo que introduce la razón y el anuncio; en español, la relación se vuelve natural con «porque» sin perder el impulso explicativo del original.
- source_word: εὐαγγελίζομαι
  english_pob_choice: I bring you good news
  chosen_spanish: les anuncio buenas noticias
  alternatives_spanish:
  - les proclamo buenas noticias
  - les traigo buenas noticias
  lexicon: BDAG
  rationale: El verbo significa anunciar buenas noticias. «Les anuncio buenas noticias» preserva el contenido verbal y evita introducir una formulación demasiado idiomática o más interpretativa de lo necesario.
- source_word: χαρὰν μεγάλην
  english_pob_choice: great joy
  chosen_spanish: gran gozo
  alternatives_spanish:
  - gran alegría
  - gozo grande
  lexicon: BDAG
  rationale: «Gozo» comunica mejor el matiz bíblico de χαρά en este anuncio angelical; «gran gozo» reproduce con naturalidad el adjetivo intensivo μεγάλην.
- source_word: ἥτις
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  lexicon: BDAG
  rationale: La relativa se mantiene de forma simple con «que», que en español resulta natural y conserva la conexión cualitativa con «gozo».
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: serán
  alternatives_spanish:
  - será
  lexicon: BDAG
  rationale: Se eligió plural por concordancia natural con «buenas noticias» en la cláusula española. Aunque el griego conecta la relativa con «gozo», la forma española busca claridad sin alterar el alcance del anuncio.
- source_word: παντὶ τῷ λαῷ
  english_pob_choice: for all the people
  chosen_spanish: para todo el pueblo
  alternatives_spanish:
  - para todo el pueblo[a]
  - para todas las personas
  lexicon: BDAG
  rationale: Se conserva el artículo y la referencia definida con «todo el pueblo», siguiendo la observación del POB inglés de que λαός con artículo suele tener un sentido concreto en Lucas. «Pueblo» evita universalizar prematuramente la frase.
theological_decisions:
- issue: Alcance de παντὶ τῷ λαῷ
  english_pob_reading: for all the people
  chosen_spanish_reading: para todo el pueblo
  alternative_spanish_readings:
  - para todas las personas
  rationale: La forma con artículo sugiere un referente definido, probablemente Israel en el marco narrativo inmediato. La traducción española mantiene esa tensión sin convertirla de antemano en una afirmación genérica sobre toda la humanidad.
  doctrine_reference: Preservar la tensión teológica y el sentido histórico-covenantal del texto; primacía del griego sobre la tradición de traducción.
- issue: Valor discursivo de ἰδοὺ
  english_pob_reading: behold
  chosen_spanish_reading: porque
  alternative_spanish_readings:
  - he aquí
  - miren
  rationale: En este contexto ἰδοὺ no necesita ser tratado como un imperativo visual independiente; funciona como transición explicativa. «Porque» refleja mejor la relación lógica con el anuncio y evita una fórmula ornamental innecesaria.
  doctrine_reference: Coherencia discursiva del griego koiné; evitar sobrecargar el español con marcadores solemnes donde no son imprescindibles.
translation_notes:
  revision_awareness: El draft toma en cuenta el POB inglés sin copiarlo mecánicamente. En particular, respeta la decisión auditada sobre λαός con artículo como referencia definida, pero adapta la cláusula final al español para mantener la concordancia y la legibilidad. También integra el valor explicativo de ἰδοὺ en la sintaxis española en vez de conservar una fórmula arcaica sin función clara.
  spanish_consistency_notes:
  - Se usó «ángel» con artículo definido por la referencia contextual.
  - Se prefirió «gozo» por su registro bíblico y por corresponder mejor a χαρά en un anuncio salvífico.
  - No se creó nota al pie porque la decisión sobre παντὶ τῷ λαῷ se incorporó directamente en la redacción y en las decisiones léxicas.
  - La concordancia plural de «serán» sigue el sustantivo español «buenas noticias», aunque el griego vincula la relativa con «gozo»; esto se considera una adaptación de claridad aceptable en español.
