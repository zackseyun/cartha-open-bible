review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del versículo y acierta en «el ángel», «No teman» y «para todo el pueblo». Sin embargo, no preserva adecuadamente la relación sintáctica del griego en la cláusula final: ἥτις ἔσται concuerda con χαρὰν μεγάλην, no con «buenas noticias», por lo que «serán» desplaza el referente. Además, ἰδοὺ queda omitido al absorberse en «porque»; aunque el español puede suavizarlo, aquí conviene conservar el matiz de llamada de atención con «miren» o similar.'
  spanish_quality_summary: El español es claro y natural, pero «gran gozo» suena algo más tradicional que natural en español neutro contemporáneo; «gran alegría» fluye mejor sin perder dignidad. La frase revisada mejora la concordancia y la legibilidad general.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión sobre παντὶ τῷ λαῷ debe mantener el sentido definido; «todo el pueblo» lo hace bien. No hay términos teológicos mayores en disputa. Sí conviene respetar el valor discursivo de ἰδοὺ mejor que el borrador actual.
  issues:
  - severity: high
    issue: Concordancia errónea en «que serán»
    rationale: En el griego, ἥτις ἔσται es singular y retoma «χαρὰν μεγάλην» («gran alegría/gozo»), no «buenas noticias». El plural «serán» altera la referencia semántica.
  - severity: medium
    issue: Pérdida del matiz de ἰδοὺ
    rationale: El borrador lo reduce a «porque», pero γὰρ ya aporta la relación causal. ἰδοὺ añade una llamada de atención que conviene reflejar en español con «miren» o, menos naturalmente, «he aquí».
  - severity: low
    issue: «gran gozo» es menos natural que «gran alegría»
    rationale: Aunque no es incorrecto, «gran alegría» es más idiomático en español neutro amplio y transmite bien χαρὰν μεγάλην.
  - severity: medium
    issue: Falta la nota alternativa sobre «todo el pueblo»
    rationale: El POB inglés conserva una nota por la alternativa «all people». Dado que en español también puede surgir la misma ambigüedad interpretativa, conviene preservar esa nota.
  revised_spanish_text: 'Y el ángel les dijo: «No teman, porque miren,[a] les anuncio buenas noticias de gran alegría, que será para todo el pueblo».[b]'
  revised_footnotes:
  - marker: a
    text: O «he aquí». El griego tiene un marcador discursivo de atención.
    reason: lexical_alternative
  - marker: b
    text: O «para todas las personas». El griego dice más literalmente «para todo el pueblo», que en Lucas a menudo tiene un sentido definido en su contexto.
    reason: alternative_reading
  revision_rationale: Se corrige la concordancia para que la cláusula relativa modifique «gran alegría» en singular, se restituye el valor de ἰδοὺ con una forma natural en español, y se preserva la nota interpretativa sobre «todo el pueblo» presente en el rastro de auditoría inglés. La redacción resultante sigue siendo clara, digna y fiel al griego.
