revisions:
- from: 'Y el ángel les dijo: «No teman, porque les anuncio buenas noticias de gran gozo que serán para todo el pueblo».'
  to: 'Y el ángel les dijo: «No teman, porque miren,[a] les anuncio buenas noticias de gran alegría, que será para todo el pueblo».[b]'
  rationale: Se corrige la concordancia para que la cláusula relativa modifique «gran alegría» en singular, se restituye el valor de ἰδοὺ con una forma natural en español, y se preserva la nota interpretativa sobre «todo el pueblo» presente en el rastro de auditoría inglés. La redacción resultante sigue siendo clara, digna y fiel al griego.
