translation:
  language: es
  text: 'Y cuando lo vieron[a], se asombraron, y su madre le dijo: «Hijo[b], ¿por qué nos has hecho esto? Mira, tu padre y yo te hemos estado buscando con angustia[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al verlo». El participio griego puede expresarse de forma temporal simple; se eligió la fórmula más natural en español.
    reason: alternative_reading
  - marker: b
    text: Gr. τέκνον, un vocativo afectuoso que también puede significar «niño» o «hijo»; aquí se traduce «Hijo» por naturalidad contextual en español, aunque el término griego no subraya específicamente el género.
    reason: lexical_alternative
  - marker: c
    text: O «en angustia». El participio ὀδυνώμενοι comunica dolor o aflicción emocional mientras lo buscaban.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: when they saw him
  chosen_spanish: cuando lo vieron
  alternatives_spanish:
  - al verlo
  - cuando le vieron
  lexicon: BDAG
  rationale: El participio aoristo se traduce de modo temporal y natural en español con «cuando lo vieron», preservando la secuencia narrativa sin rigidez.
- source_word: ἐξεπλάγησαν
  english_pob_choice: they were astonished
  chosen_spanish: se asombraron
  alternatives_spanish:
  - quedaron asombrados
  - se maravillaron
  - se asustaron
  lexicon: BDAG
  rationale: «Asombrarse» transmite sorpresa intensa y funciona con claridad en español actual. Evita suavizar el impacto del verbo griego.
- source_word: Τέκνον
  english_pob_choice: Child
  chosen_spanish: Hijo
  alternatives_spanish:
  - Niño
  - Hijo mío
  - Hijo querido
  lexicon: BDAG
  rationale: Aunque τέκνον es un vocativo afectuoso y no estrictamente masculino, en este contexto español «Hijo» suena natural en la voz materna. Se evita añadir posesivo o afecto no explicitado por el griego.
- source_word: τί ἐποίησας ἡμῖν οὕτως
  english_pob_choice: why have you done this to us?
  chosen_spanish: ¿por qué nos has hecho esto?
  alternatives_spanish:
  - ¿qué nos has hecho así?
  - ¿por qué nos trataste así?
  - ¿qué has hecho a nosotros de esta manera?
  lexicon: BDAG
  rationale: En español, el sentido idiomático exige «por qué» para expresar la queja. «Nos has hecho esto» conserva el objeto indirecto/dativo relacional y el alcance interpersonal de οὕτως.
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Fíjate
  - He aquí
  lexicon: BDAG
  rationale: «Mira» reproduce la llamada enfática a atender lo que sigue con un español natural y sobrio.
- source_word: ὁ πατήρ σου
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - tu padre terrenal
  - tu padre aquí presente
  lexicon: BDAG
  rationale: Se mantiene la referencia llana del griego sin añadir aclaraciones interpretativas. El contexto narrativo inmediato sostiene la tensión cristológica sin resolverla artificialmente.
- source_word: ὀδυνώμενοι
  english_pob_choice: searching for you in distress
  chosen_spanish: con angustia
  alternatives_spanish:
  - con dolor
  - angustiados
  - con gran aflicción
  lexicon: BDAG
  rationale: El participio expresa dolor/emoción intensa durante la búsqueda. En español, la construcción adverbial «con angustia» conserva el matiz afectivo sin volver pesada la frase.
- source_word: ἐζητοῦμέν σε
  english_pob_choice: have been searching for you
  chosen_spanish: te hemos estado buscando
  alternatives_spanish:
  - te buscamos
  - te venimos buscando
  - te hemos buscado
  lexicon: BDAG
  rationale: El imperfecto indica acción continuada; «te hemos estado buscando» lo refleja bien en español. El orden se ajusta a la naturalidad idiomática.
theological_decisions:
- issue: «Tu padre» aplicado a José en relación con la filiación divina de Jesús
  english_pob_reading: Retain the plain wording 'your father' in the main text without qualification.
  chosen_spanish_reading: Mantener «tu padre» sin añadir «terrenal» ni otra glosa interpretativa.
  alternative_spanish_readings:
  - tu padre terrenal
  - tu padre adoptivo
  rationale: El griego presenta las palabras de María como referencia familiar ordinaria. Añadir un calificativo resolvería la tensión cristológica en vez de dejarla visible para el lector, como hace el POB inglés.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Se siguió la última revisión inglesa: ὀδυνώμενοι se reflejó como un estado de angustia durante la búsqueda, evitando una paráfrasis demasiado interpretativa y conservando el matiz participial. También se mantuvo la referencia llana a «tu padre», conforme al audit trail y a la decisión teológica de no resolver la tensión cristológica en el texto principal.'
  spanish_consistency_notes:
  - Se usó «Jesús» solo implícitamente por el contexto narrativo, sin añadirlo al versículo.
  - Se prefirió un español neutro y litúrgicamente legible, evitando calcos como «buscando en angustia».
  - No se introdujo una nota sobre «Mesías/Cristo» porque este verso no la requiere.
  - La puntuación y las comillas siguen el uso estándar del español de América Latina.
