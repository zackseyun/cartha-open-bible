translation:
  language: es
  text: Y un ángel del Señor[a] se puso delante de ellos, y la gloria[b] del Señor brilló alrededor de ellos, y temieron con gran temor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se puso junto a ellos» o «se les presentó». El verbo griego puede indicar presencia repentina además de colocación espacial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «esplendor». Aquí «gloria» conserva mejor el peso bíblico y teológico de δόξα.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελος κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel del Señor
  alternatives_spanish:
  - el ángel del Señor
  - un mensajero del Señor
  lexicon: BDAG
  rationale: En este contexto narrativo, ἄγγελος designa naturalmente un ser angelical, no solo un 'mensajero'. El artículo indefinido español corresponde al anartro griego y al inglés POB 'an angel of the Lord'.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Maestro
  lexicon: BDAG
  rationale: Se mantiene la terminología devocional y bíblica estándar para κύριος en este contexto divino. En español, 'del Señor' refleja bien la relación posesiva del genitivo sin perder la referencia teológica.
- source_word: ἐπέστη αὐτοῖς
  english_pob_choice: stood before them
  chosen_spanish: se puso delante de ellos
  alternatives_spanish:
  - se presentó ante ellos
  - se les apareció
  - se puso junto a ellos
  lexicon: BDAG
  rationale: ἐφίστημι puede expresar presencia repentina, ponerse al lado o presentarse. 'Se puso delante de ellos' conserva la imagen concreta de presencia inmediata sin decidir en exceso entre los matices posibles.
- source_word: δόξα κυρίου
  english_pob_choice: the glory of the Lord
  chosen_spanish: la gloria del Señor
  alternatives_spanish:
  - la gloria del Señor
  - el esplendor del Señor
  lexicon: BDAG
  rationale: '''Gloria'' conserva el peso teológico de δόξα como resplandor majestuoso divino. ''Señor'' sigue la decisión estable para κύριος y evita oscurecer el vínculo con el texto fuente.'
- source_word: περιέλαμψεν αὐτούς
  english_pob_choice: shone around them
  chosen_spanish: los rodeó con su resplandor
  alternatives_spanish:
  - brilló alrededor de ellos
  - los iluminó por todas partes
  lexicon: BDAG
  rationale: περιλάμπω indica una luz que envuelve o brilla alrededor. En español, 'los rodeó con su resplandor' comunica esa envoltura luminosa de forma natural y reverente.
- source_word: ἐφοβήθησαν φόβον μέγαν
  english_pob_choice: they feared a great fear
  chosen_spanish: sintieron un gran temor
  alternatives_spanish:
  - temieron con gran temor
  - fueron sobrecogidos de gran temor
  lexicon: BDAG
  rationale: La construcción verbo + acusativo cognado intensifica la experiencia del miedo. 'Sintieron un gran temor' conserva la intensidad y resulta fluido en español, sin borrar la fuerza idiomática del griego; las alternativas más literales se reservan como posibilidades, pero suenan menos naturales.
theological_decisions:
- issue: Renderizado de κύριος en un contexto claramente divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  rationale: El pasaje asocia al mensajero angelical con la gloria divina; por eso 'el Señor' mantiene la referencia teológica y coincide con la política del proyecto para κύριος.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Intensificación idiomática del miedo final
  english_pob_reading: they feared a great fear
  chosen_spanish_reading: sintieron un gran temor
  alternative_spanish_readings:
  - temieron con gran temor
  - fueron sobrecogidos de gran temor
  rationale: El griego usa una construcción enfática que no debe banalizarse. La traducción elegida comunica intensidad sin sonar artificial en español; no intenta suavizar el terror ni reemplazarlo por una formulación explicativa.
  doctrine_reference: Greek idiom preservation in narrative affect
translation_notes:
  revision_awareness: La versión española sigue la última revisión auditada del inglés POB en el cierre intensificado del miedo, evitando una expansión interpretativa como 'quedaron llenos de gran temor'. También conserva el carácter concreto de ἐπέστη y de περιέλαμψεν sin sobretraducirlos.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος, conforme al criterio doctrinal del proyecto.
  - Se usa 'ángel' y no 'mensajero' porque el contexto narrativo angelológico lo exige.
  - '''Gloria'' se conserva como término bíblico estable para δόξα.'
  - La puntuación y el orden de cláusulas siguen la cadencia del original sin calcado rígido.
