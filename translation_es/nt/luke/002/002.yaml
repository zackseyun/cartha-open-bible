translation:
  language: es
  text: Este registro se realizó primero[a] mientras Quirinio gobernaba Siria[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este registro se realizó antes de que Quirinio gobernara Siria». Algunos entienden πρώτη aquí en sentido temporal comparativo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «censo» en lugar de «registro». El término griego se refiere a una inscripción oficial, con frecuencia vinculada a impuestos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὕτη
  english_pob_choice: This
  chosen_spanish: Este
  alternatives_spanish:
  - Esta
  lexicon: BDAG
  rationale: El demostrativo retoma el registro mencionado en el versículo anterior; en español, «este» concuerda de forma natural con «registro» y preserva la referencia deíctica simple.
- source_word: ἀπογραφὴ
  english_pob_choice: registration
  chosen_spanish: registro
  alternatives_spanish:
  - censo
  - inscripción
  lexicon: BDAG
  rationale: El término griego indica un enrolamiento o registro administrativo oficial. «Registro» mantiene esa amplitud sin estrecharlo injustificadamente a «censo», aunque esta opción queda como alternativa válida.
- source_word: πρώτη
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - primera
  lexicon: BDAG
  rationale: Con ἐγένετο, la colocación más natural en español es «se realizó primero», que conserva el valor ordinal y la ambigüedad histórica del griego. «Antes» queda como posibilidad interpretativa documentada por la POB inglesa.
- source_word: ἐγένετο
  english_pob_choice: took place
  chosen_spanish: se realizó
  alternatives_spanish:
  - tuvo lugar
  - ocurrió
  lexicon: BDAG
  rationale: Para un hecho administrativo, «se realizó» expresa bien el acontecimiento sin volverlo demasiado coloquial. Mantiene el sentido de suceder o llevarse a cabo.
- source_word: ἡγεμονεύοντος
  english_pob_choice: while ... was governing
  chosen_spanish: cuando ... gobernaba
  alternatives_spanish:
  - mientras ... gobernaba
  - durante el gobierno de
  lexicon: BDAG
  rationale: El genitivo absoluto marca circunstancia temporal contemporánea. «Cuando Quirinio gobernaba Siria» suena natural en español y conserva el valor temporal sin añadir un título oficial no presente en el griego.
- source_word: Συρίας
  english_pob_choice: Syria
  chosen_spanish: Siria
  lexicon: BDAG
  rationale: Nombre geográfico estándar en español.
- source_word: Κυρηνίου
  english_pob_choice: Quirinius
  chosen_spanish: Quirinio
  alternatives_spanish:
  - Quirino
  lexicon: BDAG
  rationale: Transliteración habitual y clara del nombre propio Κυρήνιος en español bíblico.
theological_decisions:
- issue: Interpretación de πρώτη en una cláusula históricamente debatida
  english_pob_reading: The main text keeps the ordinary ordinal sense of 'first'; an alternative 'before' is preserved in a note.
  chosen_spanish_reading: El texto principal mantiene el sentido ordinal de «primero», y la nota preserva la lectura «antes» sin resolver la tensión histórica.
  alternative_spanish_readings:
  - Este registro tuvo lugar antes de que Quirinio gobernara Siria.
  - Este fue el primer registro cuando Quirinio gobernaba Siria.
  rationale: La construcción es discutida tanto sintáctica como históricamente. Siguiendo la primacía del texto original y la filosofía de la POB, el español principal no fuerza una solución; conserva la forma más directa y deja constancia de la alternativa interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El inglés POB fue revisado desde «This registration first took place while Quirinius was governing Syria» a «This registration took place first while Quirinius was governing Syria» para reflejar con mayor naturalidad la relación entre πρώτη y ἐγένετο; la versión española sigue ese ajuste manteniendo el orden adverbial similar: «se realizó primero».'
  spanish_consistency_notes:
  - Se usó «Quirinio» de forma consistente para Κυρήνιος.
  - Se evitó «SEÑOR» u otras convenciones no pertinentes, ya que no aparece el nombre divino en este versículo.
  - «Registro» se mantuvo como término principal para ἀπογραφή, con la alternativa «censo» documentada en nota.
  - La puntuación y el orden reflejan una frase española natural sin perder la estructura temporal de la cláusula griega.
