  glossary_alignment: No hay conflictos con los términos troncales del proyecto. «Jesús», «sabiduría» y «favor» están bien. «Estatura» con nota para «edad»/«madurez» sigue correctamente la decisión auditada. «Los hombres» es aceptable aquí si se conserva la nota inclusiva; no exige cambio de glosario, solo una nota más idiomática.
