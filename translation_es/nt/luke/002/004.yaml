translation:
  language: es
  text: Y José también subió[a] de Galilea, de la ciudad de Nazaret, a Judea, a la ciudad de David, que se llama Belén, porque era de la casa y del linaje de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue». El verbo griego expresa literalmente una subida, conservando el matiz geográfico del viaje hacia Judea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - viajó
  lexicon: BDAG
  rationale: ‘Subió’ conserva el valor idiomático de ascenso geográfico al ir hacia Judea, sin neutralizarlo en un simple ‘fue’.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: Se requiere un conector leve en español para mantener la continuidad narrativa; ‘Y’ reproduce bien el enlace sencillo del griego.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igual
  lexicon: BDAG
  rationale: Marca que José se añade al movimiento ya mencionado en el contexto narrativo.
- source_word: πόλεως / πόλιν
  english_pob_choice: town / city
  chosen_spanish: ciudad / ciudad
  alternatives_spanish:
  - pueblo / ciudad
  - aldea / ciudad
  lexicon: BDAG
  rationale: En español, ‘ciudad’ funciona naturalmente para ambas ocurrencias y permite mantener la relación entre Nazaret y la ‘ciudad de David’ sin introducir una distinción artificial.
- source_word: Ναζαρὲθ
  english_pob_choice: Nazareth
  chosen_spanish: Nazaret
  alternatives_spanish:
  - Nazareth
  lexicon: convencional
  rationale: Se translitera con la forma usual en español bíblico, ‘Nazaret’.
- source_word: Ἰουδαίαν
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - la región de Judea
  - Judá
  lexicon: BDAG
  rationale: ‘Judea’ es la designación geográfica estándar para el período y evita confundir la región con la tribu de Judá.
- source_word: πόλιν Δαυὶδ ἥτις καλεῖται Βηθλέεμ
  english_pob_choice: the city of David, which is called Bethlehem
  chosen_spanish: la ciudad de David, que se llama Belén
  alternatives_spanish:
  - la ciudad de David, llamada Belén
  - la ciudad de David, es decir, Belén
  lexicon: BDAG
  rationale: 'Conserva la estructura explicativa del griego: la identificación de Belén como la ciudad asociada con David.'
- source_word: καλεῖται
  english_pob_choice: is called
  chosen_spanish: se llama
  alternatives_spanish:
  - es llamada
  - lleva por nombre
  lexicon: BDAG
  rationale: ‘Se llama’ es una pasiva/impersonal natural en español y refleja adecuadamente el griego sin forzar un calco.
- source_word: διὰ τὸ εἶναι αὐτὸν
  english_pob_choice: because he was
  chosen_spanish: porque era
  alternatives_spanish:
  - porque él era
  - a causa de que era
  lexicon: BDAG
  rationale: La cláusula causal se expresa de forma natural con ‘porque era’, manteniendo el sentido del infinitivo articular griego.
- source_word: ἐξ οἴκου
  english_pob_choice: of the house
  chosen_spanish: de la casa
  alternatives_spanish:
  - del linaje
  - de la familia
  lexicon: BDAG
  rationale: ‘Casa’ preserva el matiz dinástico y bíblico de οἶκος, especialmente en relación con David.
- source_word: πατριᾶς
  english_pob_choice: family line
  chosen_spanish: linaje
  alternatives_spanish:
  - línea familiar
  - familia
  lexicon: BDAG
  rationale: ‘Linaje’ comunica la descendencia ancestral con mayor precisión que ‘familia’ en este contexto, y mantiene la tensión entre las dos expresiones relacionadas del griego.
- source_word: Δαυίδ
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: convencional
  rationale: Nombre propio conservado según la convención española.
theological_decisions:
- issue: Terminología de ascendencia davídica
  english_pob_reading: of the house and family line of David
  chosen_spanish_reading: de la casa y del linaje de David
  alternative_spanish_readings:
  - de la casa y de la línea de David
  - de la casa y de la familia de David
  rationale: Se preservan dos términos relacionados sin fusionarlos en una sola idea. ‘Casa’ conserva el tono dinástico; ‘linaje’ mantiene la referencia a descendencia ancestral. Esto sigue la decisión inglesa de no resolver la tensión léxica del griego.
  doctrine_reference: Preservar la tensión lexical; no ampliar más allá del texto
- issue: Referencia geográfica de subida a Judea
  english_pob_reading: went up from Galilee
  chosen_spanish_reading: subió desde Galilea
  alternative_spanish_readings:
  - subió de Galilea
  - fue desde Galilea
  rationale: ‘Subió’ conserva la dirección ascendente implícita en el itinerario hacia Judea y Jerusalén, sin convertir el dato geográfico en una mera traslación neutral.
  doctrine_reference: Geografía narrativa del texto; fidelidad semántica
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó la puntuación para mejorar la legibilidad y cambió la relación preposicional a ‘of the house and family line of David’ para reflejar con más naturalidad ἐξ οἴκου καὶ πατριᾶς. La redacción española sigue esa decisión al usar ‘de la casa y del linaje de David’, manteniendo la doble referencia ancestral sin simplificarla.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - ‘Mesías/Cristo’ no aparece en este versículo.
  - Se mantuvo ‘Judea’ como región histórica y ‘Belén’ como forma española estándar del topónimo.
  - La nota al pie se ancla en ‘Galilea[a]’ para señalar el matiz del ascenso geográfico sin sobrecargar el texto principal.
