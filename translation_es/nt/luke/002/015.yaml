translation:
  language: es
  text: 'Y sucedió que, cuando los ángeles se fueron de junto a ellos al cielo, los pastores se decían unos a otros: «Vayamos ahora a Belén y veamos esto[a] que ha sucedido, lo cual el Señor nos ha dado a conocer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este asunto que ha sucedido»; el griego ῥῆμα puede significar «palabra», «asunto» o «cosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: BDAG
  rationale: La fórmula narrativa de Lucas se reproduce de manera natural con «y sucedió», que conserva el arranque eventivo sin sonar arcaico.
- source_word: ὡς
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al
  - después que
  lexicon: BDAG
  rationale: Introduce la circunstancia temporal de la partida de los ángeles; «cuando» es la equivalencia más clara y fluida en español.
- source_word: ἀπῆλθον ἀπ’ αὐτῶν εἰς τὸν οὐρανὸν
  english_pob_choice: had gone away from them into heaven
  chosen_spanish: se habían ido de ellos al cielo
  alternatives_spanish:
  - habían partido de ellos al cielo
  - se habían alejado de ellos al cielo
  lexicon: BDAG
  rationale: «Se habían ido» refleja bien la acción anterior al discurso de los pastores. Para οὐρανός, el español bíblico puede decir «cielo» sin perder el sentido del ámbito divino en este contexto narrativo.
- source_word: οἱ ἄγγελοι
  english_pob_choice: the angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - los mensajeros
  lexicon: BDAG
  rationale: Rendering directo y estándar del sujeto nominativo plural.
- source_word: οἱ ποιμένες
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los ovejeros
  lexicon: BDAG
  rationale: Término normal y claro para el grupo que habla.
- source_word: ἐλάλουν πρὸς ἀλλήλους
  english_pob_choice: said to one another
  chosen_spanish: se decían unos a otros
  alternatives_spanish:
  - hablaban entre sí
  - se hablaban unos a otros
  lexicon: BDAG
  rationale: El imperfecto de λαλέω introduce el diálogo; «se decían unos a otros» conserva la reciprocidad y suena natural en español.
- source_word: Διέλθωμεν
  english_pob_choice: Let us go
  chosen_spanish: Vayamos
  alternatives_spanish:
  - Crucemos
  - Pasemos
  lexicon: BDAG
  rationale: Aunque el verbo puede sugerir literalmente ‘ir a través/pasar’, en este contexto exhortativo el español natural es «vayamos».
- source_word: δὴ
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - pues
  - entonces
  lexicon: BDAG
  rationale: La partícula añade inmediatez o urgencia; «ahora» comunica bien ese impulso práctico sin sobretraducir.
- source_word: ἕως Βηθλέεμ
  english_pob_choice: to Bethlehem
  chosen_spanish: a Belén
  alternatives_spanish:
  - hasta Belén
  lexicon: BDAG
  rationale: El inglés POB pasó de la literalidad de ἕως a una equivalencia más natural. En español, «a Belén» expresa con claridad el destino; «hasta Belén» queda como alternativa más cercana al matiz de límite/progresión.
- source_word: ἴδωμεν
  english_pob_choice: see
  chosen_spanish: veamos
  alternatives_spanish:
  - miremos
  - veamos qué
  lexicon: BDAG
  rationale: 'Subjuntivo exhortativo coordinado con el primero: «veamos» es la forma idiomática y exacta.'
- source_word: τὸ ῥῆμα τοῦτο τὸ γεγονὸς
  english_pob_choice: this thing that has happened
  chosen_spanish: esta cosa[a] que ha sucedido
  alternatives_spanish:
  - este asunto que ha sucedido
  - este hecho que ha sucedido
  - este acontecimiento que ha sucedido
  lexicon: BDAG
  rationale: ῥῆμα puede significar ‘palabra’, ‘asunto’ o ‘cosa’. Aquí alude al hecho ocurrido, no solo a un dicho; «cosa» conserva la amplitud semántica del original, y la nota explica la alternativa léxica.
- source_word: ὃ ὁ κύριος ἐγνώρισεν ἡμῖν
  english_pob_choice: which the Lord has made known to us
  chosen_spanish: la cual el Señor nos ha dado a conocer
  alternatives_spanish:
  - la cual el Señor nos ha hecho saber
  - la cual el Señor nos reveló
  lexicon: BDAG
  rationale: ἐγνώρισεν expresa ‘hacer saber / dar a conocer’; «ha dado a conocer» preserva ese matiz sin convertirlo en un tecnicismo de ‘revelación’ más fuerte de lo necesario.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el título teológico de uso canónico y congruente con el contexto de la comunicación angélica; no se sustituye por un término más doméstico.
theological_decisions:
- issue: Referencia de ὁ κύριος en el anuncio de los ángeles
  english_pob_reading: Rendered as 'the Lord,' referring to God as the source of the revelation announced by the angels.
  chosen_spanish_reading: Se traduce «el Señor» sin especificar más allá de lo que el texto dice; el referente inmediato es Dios como quien da a conocer el mensaje.
  alternative_spanish_readings:
  - podría entenderse de modo más amplio como el Señor divino sin precisar si se enfatiza al Padre o al Señor mesiánico por implicación
  rationale: El contexto inmediato apunta a Dios como el que comunica el hecho a los pastores. La traducción conserva el término y no fuerza una identificación doctrinal más estrecha que la del pasaje.
  doctrine_reference: 'DOCTRINE.md: κύριος se traduce por defecto como «Señor»; conservar la tensión teológica sin resolverla artificialmente.'
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del audit trail inglés, que prefirió una expresión más natural para el destino («to Bethlehem»). En español se optó por «a Belén» por naturalidad equivalente, manteniendo en la nota la posibilidad más literal «hasta Belén» como alternativa contextual. No se añadieron cambios doctrinales ni se intensificó el valor de ῥῆμα más allá de lo que el contexto exige.
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος, conforme al criterio doctrinal del proyecto y al contexto narrativo de la revelación.
  - Se usó «Belén» como forma española estable del topónimo.
  - Se eligió «cielo» para οὐρανός por ser la opción más natural en español bíblico y adecuada al ámbito divino del contexto.
  - 'Se mantuvo el paralelismo verbal de la exhortación con dos subjuntivos: «Vayamos... y veamos».'
