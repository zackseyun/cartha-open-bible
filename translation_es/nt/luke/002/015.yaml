    text: O «este asunto que ha sucedido»; el griego ῥῆμα puede significar «palabra», «asunto» o «cosa».
    reason: lexical_alternative
  revision_rationale: 'Se ajustó el español para mayor naturalidad y dignidad sin apartarse del griego ni del expediente inglés: «de junto a ellos» expresa mejor ἀπ’ αὐτῶν; «se fueron» fluye mejor en narrativa; y «esto» evita la torpeza de «esta cosa» mientras conserva la amplitud semántica de ῥῆμα con la nota léxica correspondiente.'
