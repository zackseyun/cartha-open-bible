revisions:
- from: 'Y sucedió que, cuando los ángeles se habían ido de ellos al cielo, los pastores se decían unos a otros: «Vayamos ahora a Belén y veamos esta cosa[a] que ha sucedido, la cual el Señor nos ha dado a conocer».'
  to: 'Y sucedió que, cuando los ángeles se fueron de junto a ellos al cielo, los pastores se decían unos a otros: «Vayamos ahora a Belén y veamos esto[a] que ha sucedido, lo cual el Señor nos ha dado a conocer».'
  rationale: 'Se ajustó el español para mayor naturalidad y dignidad sin apartarse del griego ni del expediente inglés: «de junto a ellos» expresa mejor ἀπ’ αὐτῶν; «se fueron» fluye mejor en narrativa; y «esto» evita la torpeza de «esta cosa» mientras conserva la amplitud semántica de ῥῆμα con la nota léxica correspondiente.'
