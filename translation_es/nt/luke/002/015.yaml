source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ὡς ἀπῆλθον ἀπ’ αὐτῶν εἰς τὸν οὐρανὸν οἱ ἄγγελοι, ⸀οἱ ποιμένες ⸀ἐλάλουν πρὸς ἀλλήλους· Διέλθωμεν δὴ ἕως Βηθλέεμ καὶ ἴδωμεν τὸ ῥῆμα τοῦτο τὸ γεγονὸς ὃ ὁ κύριος ἐγνώρισεν ἡμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/002/015.yaml
  text: And it happened that when the angels had gone away from them into heaven[a], the shepherds said to one another, “Let us go now to Bethlehem and see this thing that has happened[b], which the Lord has made known to us.”
  footnotes:
  - marker: a
    text: Or 'this matter that has happened'; Greek ῥῆμα can mean 'word,' 'matter,' or 'thing.'
    reason: lexical_alternative
  - marker: b
    text: Or simply 'to Bethlehem'; Greek 'as far as Bethlehem' more literally preserves ἕως.
    reason: lexical_alternative
