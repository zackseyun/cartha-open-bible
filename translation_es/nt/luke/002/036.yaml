translation:
  language: es
  text: Y había una profetisa, Ana, hija de Fanuel, de la tribu de Aser. Ella estaba avanzada en años[a], habiendo vivido con su esposo siete años desde su virginidad[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «muy anciana». El griego dice literalmente «avanzada en muchos días», un modismo para la vejez.
    reason: lexical_alternative
  - marker: b
    text: O, «habiendo vivido con su esposo siete años después de su virginidad», es decir, siete años después del matrimonio, desde que dejó la doncellez.
    reason: lexical_alternative
lexical_decisions:
- source_word: προφῆτις
  english_pob_choice: prophetess
  chosen_spanish: profetisa
  alternatives_spanish:
  - mujer profeta
  - profeta
  lexicon: BDAG
  rationale: El griego usa un sustantivo femenino explícito; «profetisa» preserva el género y el valor común del término sin suavizarlo a una descripción más vaga.
- source_word: θυγάτηρ Φανουήλ
  english_pob_choice: the daughter of Phanuel
  chosen_spanish: hija de Fanuel
  alternatives_spanish:
  - la hija de Fanuel
  - descendiente de Fanuel
  lexicon: BDAG
  rationale: La expresión es genealógica y directa; «hija de Fanuel» refleja de manera natural la apposición del griego.
- source_word: ἐκ φυλῆς Ἀσήρ
  english_pob_choice: from the tribe of Asher
  chosen_spanish: de la tribu de Aser
  alternatives_spanish:
  - de entre la tribu de Aser
  - procedente de la tribu de Aser
  lexicon: BDAG
  rationale: ἐκ indica origen/pertenencia; «de la tribu de Aser» es la forma más natural en español y conserva la afiliación tribal.
- source_word: προβεβηκυῖα ἐν ἡμέραις πολλαῖς
  english_pob_choice: advanced in years
  chosen_spanish: avanzada en muchos días
  alternatives_spanish:
  - muy anciana
  - avanzada en años
  - muy vieja
  lexicon: BDAG
  rationale: Se conserva el giro idiomático más cerca del griego («en muchos días») para no borrar la imagen temporal del original, tal como hace la auditoría inglesa en su primera opción y su nota léxica.
- source_word: ζήσασα μετὰ ἀνδρὸς
  english_pob_choice: having lived with a husband
  chosen_spanish: habiendo vivido con un esposo
  alternatives_spanish:
  - habiendo vivido con su esposo
  - habiendo vivido como esposa con un esposo
  lexicon: BDAG
  rationale: μετὰ ἀνδρός se refiere a vida matrimonial; «con un esposo» conserva la construcción sin introducir más de lo que dice el texto.
- source_word: ἔτη ἑπτὰ
  english_pob_choice: seven years
  chosen_spanish: siete años
  alternatives_spanish:
  - por siete años
  lexicon: BDAG
  rationale: Duración simple y directa, sin necesidad de ampliación.
- source_word: ἀπὸ τῆς παρθενίας αὐτῆς
  english_pob_choice: from her virginity
  chosen_spanish: desde su virginidad
  alternatives_spanish:
  - después de su virginidad
  - desde el tiempo de su virginidad
  - después de haber sido virgen
  lexicon: BDAG
  rationale: παρθενία alude a virginidad/maidenhood; «desde su virginidad» reproduce con fidelidad la expresión y deja abierta la precisión cronológica que la nota inglesa explica.
theological_decisions:
- issue: Identificación de Ana como προφῆτις
  english_pob_reading: Anna is identified as a prophetess in the ordinary biblical sense of a woman who speaks under divine inspiration.
  chosen_spanish_reading: Ana es identificada como profetisa en el sentido bíblico ordinario de una mujer que habla por inspiración divina.
  alternative_spanish_readings:
  - Ana era solo una devota religiosa
  - Ana tenía un título honorífico sin contenido profético
  rationale: No hay motivo textual para rebajar el término; la traducción conserva la designación explícita del griego y su peso profético.
  doctrine_reference: Affirmations; Translation philosophy §1, §4
- issue: Descripción de la edad con ἐν ἡμέραις πολλαῖς
  english_pob_reading: The main text preserves the idiom 'advanced in many days' rather than resolving the chronology here.
  chosen_spanish_reading: El texto principal conserva el giro idiomático «avanzada en muchos días» en vez de resolver aquí la cronología.
  alternative_spanish_readings:
  - muy anciana
  - avanzada en años
  rationale: El griego usa una expresión idiomática; mantenerla permite respetar la imagen del original y evita adelantar la explicación que el contexto posterior completa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La auditoría inglesa muestra una revisión que prefirió ‘advanced in years’ por claridad idiomática, pero también mantuvo la nota sobre el giro literal ‘advanced in many days’. En español, se conserva el valor literal del modismo en el texto principal y se ofrece en nota la equivalencia idiomática, sin resolver la cronología más allá de lo que el versículo dice.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; aquí no aplica.
  - Se usa «profetisa» para preservar el femenino explícito del sustantivo griego.
  - Se conserva «Aser» como forma española estable del nombre tribal.
  - La secuencia final queda abierta con coma, como en el original, para reflejar que la cláusula continúa en el versículo siguiente.
