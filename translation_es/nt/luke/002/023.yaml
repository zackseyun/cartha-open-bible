translation:
  language: es
  text: como está escrito en la Ley de Yahvé, que todo varón que abre la matriz[a] será llamado santo a Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todo hijo varón que abre la matriz'.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el primogénito varón es considerado santo, o consagrado, a Yahvé; compárese Éxodo 13:2, 12.
    reason: cross_reference
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: BDAG
  rationale: Expresa la correspondencia con la cita escrita de manera natural en español, manteniendo el valor comparativo sin añadir énfasis innecesario.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  - se ha escrito
  lexicon: BDAG
  rationale: La fórmula bíblica en español se comunica con claridad mediante una pasiva resultativa. 'Está escrito' conserva el registro de autoridad escritural sin sonar artificial.
- source_word: ἐν νόμῳ κυρίου
  english_pob_choice: in the Law of the Lord
  chosen_spanish: en la Ley de Yahvé
  alternatives_spanish:
  - en la ley del Señor
  - en la Ley del Señor
  lexicon: BDAG
  rationale: '''Νόμος'' aquí señala la ley revelada de Dios; se conserva ''Ley'' con mayúscula por tratarse de una referencia escritural. ''Κυρίου'' se vierte como ''Yahvé'' según el criterio POB cuando el contexto remite al nombre divino en la fuente subyacente del texto legal citado.'
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - a saber
  lexicon: BDAG
  rationale: Introduce el contenido de la cita; 'que' es la forma española más directa y fluida.
- source_word: Πᾶν ἄρσεν
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo macho
  - todo hijo varón
  lexicon: BDAG
  rationale: '''Ἄρσεν'' marca el sexo masculino; en español, ''varón'' comunica de forma digna y bíblica esa referencia. ''Todo varón'' preserva el alcance general del griego mejor que una paráfrasis más explicativa.'
- source_word: διανοῖγον μήτραν
  english_pob_choice: opening the womb
  chosen_spanish: que abre matriz
  alternatives_spanish:
  - abriendo matriz
  - que abre el vientre
  lexicon: BDAG
  rationale: Se conserva la expresión bíblica de la apertura de la matriz, que funciona como modismo de primogenitura. 'Matriz' mantiene más de cerca el lenguaje tradicional de la cita sin perder inteligibilidad; se evita 'vientre' por ser menos específico en este contexto legal.
- source_word: ἅγιον
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - consagrado
  - apartado
  lexicon: BDAG
  rationale: '''Ἅγιον'' conserva la idea de santidad, y en español ''santo'' es un equivalente claro y reverente. ''Consagrado'' explicaría la dedicación, pero desplaza el término central de santidad que el griego usa explícitamente.'
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - al Señor
  - a Yahvé
  lexicon: BDAG
  rationale: El dativo expresa pertenencia/dedicación; 'para Yahvé' comunica bien la consagración al destinatario divino. Se mantiene 'Yahvé' para coherencia con el tratamiento del nombre divino en este pasaje.
- source_word: κληθήσεται
  english_pob_choice: shall be called
  chosen_spanish: será llamado
  alternatives_spanish:
  - será considerado
  - será designado
  lexicon: BDAG
  rationale: La pasiva futura se traduce de manera directa y solemne. 'Será llamado' conserva el eco bíblico del acto de designación sin interpretar más allá del texto.
theological_decisions:
- issue: Tratamiento de κύριος en una cita de la ley bíblica
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Aunque el griego cita κύριος, el pasaje alude a la formulación de la Ley en Éxodo 13:2, 12, donde el referente es el nombre divino. Siguiendo el principio POB de no ocultar el nombre divino, se usa 'Yahvé' en el texto principal para conservar la referencia teológica de la cita.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος / יְהוָה; policy on divine-name transparency'
- issue: '''ἅγιον'' como categoría de santidad o de consagración'
  english_pob_reading: holy to the Lord
  chosen_spanish_reading: santo para Yahvé
  alternative_spanish_readings:
  - consagrado para Yahvé
  - apartado para Yahvé
  rationale: El griego usa explícitamente la familia léxica de 'santo'. 'Santo para Yahvé' preserva la santidad como término central y deja abierta la implicación de dedicación cultual sin reemplazar el lexema por una explicación más interpretativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5; holiness terminology'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por ajustes menores de puntuación y claridad, especialmente en la delimitación de la cláusula citada. En español se refleja esa misma estructura con una coma natural tras 'Yahvé' y se mantiene el flujo directo de la fórmula citacional sin añadir explicaciones al cuerpo principal.
  spanish_consistency_notes:
  - Se conserva 'Ley' con mayúscula para reflejar el cuerpo normativo citado.
  - Se usa 'Yahvé' de manera consistente para el referente divino de la cita veterotestamentaria subyacente.
  - '''Matriz'' mantiene la expresión bíblica tradicional de primogenitura y evita una reducción semántica a ''vientre''.'
  - El orden y la sintaxis respetan el valor de cita formal del versículo sin recalcar interpretaciones no explícitas en el griego.
