translation:
  language: es
  text: Y los pastores regresaron[a], glorificando y alabando a Dios por todo lo que habían oído y visto[c][b], tal como se les había dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «volvieron».
    reason: lexical_alternative
  - marker: b
    text: O «a causa de todo lo que habían oído y visto».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «tal como se les había hablado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπέστρεψαν
  english_pob_choice: returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: BDAG
  rationale: El aoristo de ὑποστρέφω expresa el regreso de los pastores a su lugar o actividad anterior. «Regresaron» es natural en español moderno y conserva bien el matiz de volver a un punto previo.
- source_word: ποιμένες
  english_pob_choice: shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - pastores de ovejas
  lexicon: BDAG
  rationale: En este contexto narrativo, ποιμένες designa a los pastores presentados en el relato. «Pastores» es el equivalente directo y claro en español.
- source_word: δοξάζοντες
  english_pob_choice: glorifying
  chosen_spanish: glorificando
  alternatives_spanish:
  - dando gloria a
  lexicon: BDAG
  rationale: El participio presente describe la manera continua en que regresaban. «Glorificando» mantiene la relación verbal con δόξα y conserva el paralelismo con el participio siguiente.
- source_word: αἰνοῦντες
  english_pob_choice: praising
  chosen_spanish: alabando
  alternatives_spanish:
  - pregonando alabanzas a
  - dando alabanza a
  lexicon: BDAG
  rationale: Aunque se superpone con δοξάζοντες, αἰνέω aporta el matiz de alabanza verbal. «Alabando» conserva el segundo participio sin fundirlo con el primero.
- source_word: τὸν θεὸν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: El objeto directo de ambos participios es θεός. En español conviene explicitar la preposición personal con «a Dios» para una sintaxis natural y reverente.
- source_word: ἐπὶ πᾶσιν οἷς
  english_pob_choice: for all that
  chosen_spanish: por todo lo que
  alternatives_spanish:
  - a causa de todo lo que
  - por todo cuanto
  lexicon: BDAG
  rationale: ἐπί con dativo señala aquí la base u ocasión de la alabanza. «Por todo lo que» comunica bien esa relación causal/ocasional en español sin añadir explicación extra.
- source_word: ἤκουσαν καὶ εἶδον
  english_pob_choice: they had heard and seen
  chosen_spanish: habían oído y visto
  alternatives_spanish:
  - oyeron y vieron
  - habían escuchado y visto
  lexicon: BDAG
  rationale: 'El pluscuamperfecto español refleja la relación temporal que la POB inglesa expresó de forma similar: los hechos escuchados y vistos preceden a su regreso alabando. «Oído» y «visto» siguen de cerca el contenido verbal del griego.'
- source_word: καθὼς ἐλαλήθη πρὸς αὐτούς
  english_pob_choice: just as it had been told to them
  chosen_spanish: tal como se les había dicho
  alternatives_spanish:
  - justo como se les había hablado
  - tal como les había sido dicho
  lexicon: BDAG
  rationale: El pasivo ἐλαλήθη no nombra explícitamente al hablante. «Se les había dicho» preserva ese pasivo impersonal en un español natural; «tal como» corresponde bien a καθώς.
theological_decisions:
- issue: Si debe hacerse explícito el agente implícito del anuncio final
  english_pob_reading: The Greek passive does not explicitly name the speaker; the translation preserves the passive and leaves the agent implicit.
  chosen_spanish_reading: 'Se mantiene el pasivo impersonal: «se les había dicho».'
  alternative_spanish_readings:
  - tal como el ángel les había dicho
  - tal como se lo habían dicho los ángeles
  rationale: Aunque el contexto narra el anuncio angélico, el griego de este versículo solo dice que «se habló» a ellos. No se debe introducir un sujeto explícito que el texto no expresa.
  doctrine_reference: 'Principio de fidelidad textual: no importar detalles contextuales como si fueran parte de la cláusula griega.'
translation_notes:
  revision_awareness: 'El audit trail inglés no muestra cambios sustantivos; la versión permanece estable. Se conservan las mismas tres alternativas principales: ὑπέστρεψαν = regresar/volver, ἐπὶ πᾶσιν οἷς = por todo lo que / a causa de todo lo que, y la clausula pasiva final como impersonal sin agente explícito.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - Se usa «glorificando» y «alabando» para conservar el doble participio sin fusionarlos.
  - Se evita convertir el pasivo final en una paráfrasis con sujeto explícito no presente en el griego.
  - El orden de las cláusulas sigue el flujo narrativo del original y de la POB inglesa, con español natural.
  - 'Los corchetes de notas se colocan en los mismos puntos funcionales que en el texto inglés: regreso, base de la alabanza y cláusula final comparativa.'
