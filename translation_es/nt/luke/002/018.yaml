    issue: Se añadió el objeto «lo» en «los que lo oyeron».
    rationale: La revisión auditada del POB eliminó «it» porque no está explícito en el griego. En español, «los que oyeron» es natural y más fiel al texto fuente.
  - severity: medium
    issue: La elección principal «se maravillaron» no sigue la preferencia léxica auditada.
    rationale: El POB inglés escogió «were amazed» y dejó «marveled» como alternativa. En español, «se asombraron» reproduce mejor esa preferencia, mientras «se maravillaron» puede conservarse en nota como opción más tradicional.
  revised_spanish_text: Y todos los que oyeron se asombraron[a] de lo que les habían dicho los pastores.
