  to: Y todos los que oyeron se asombraron[a] de lo que les habían dicho los pastores.
  rationale: Se quita «lo» para no añadir un objeto ausente del griego y para seguir la revisión auditada del POB. Se cambia «se maravillaron» por «se asombraron» como opción principal porque refleja mejor «were amazed» en español natural contemporáneo, manteniendo la alternativa tradicional en nota.
