translation:
  language: es
  text: Y todos los que oyeron se asombraron[a] de lo que les habían dicho los pastores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se maravillaron» por «se asombraron».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Conserva la conexión narrativa simple de καί sin añadir matiz temporal no explicitado.
- source_word: πάντες οἱ ἀκούσαντες
  english_pob_choice: all who heard
  chosen_spanish: todos los que lo oyeron
  alternatives_spanish:
  - todos los que oyeron
  - toda la gente que oyó
  lexicon: BDAG
  rationale: 'El participio articular funciona de manera sustantiva: «los que oyeron». En español, «los que lo oyeron» comunica con naturalidad el referente del anuncio sin sobreespecificar el objeto.'
- source_word: ἐθαύμασαν
  english_pob_choice: were amazed
  chosen_spanish: se maravillaron
  alternatives_spanish:
  - se asombraron
  - quedaron maravillados
  lexicon: BDAG
  rationale: θαυμάζω expresa asombro/maravilla. «Se maravillaron» preserva bien el valor verbal y mantiene una resonancia bíblica comprensible en español contemporáneo.
- source_word: περὶ τῶν λαληθέντων
  english_pob_choice: at what had been told
  chosen_spanish: de lo que les habían dicho
  alternatives_spanish:
  - acerca de lo que les habían dicho
  - sobre lo que les habían dicho
  lexicon: BDAG
  rationale: περί con genitivo indica referencia o relación. En español, tras «maravillarse» es natural expresar esa relación con «de». El participio pasivo se rinde como «les habían dicho», que conserva el contenido comunicado.
- source_word: ὑπὸ τῶν ποιμένων
  english_pob_choice: by the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - por los pastores
  lexicon: BDAG
  rationale: La agencia está ya implícita en el contexto del dicho reportado; en español, el giro completo «les habían dicho los pastores» resulta natural y conserva el agente sin un calco pesado.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El pronombre dativo de interés/dirección se expresa de forma idiomática con «les» en español, manteniendo la referencia a los oyentes mencionados.
theological_decisions:
- issue: Naturaleza de la reacción de ἐθαύμασαν
  english_pob_reading: The verse reports amazement or astonishment, without implying saving faith or disbelief.
  chosen_spanish_reading: El versículo describe admiración o asombro, sin implicar por sí mismo fe salvadora ni incredulidad.
  alternative_spanish_readings:
  - Los oyentes creyeron al oírlo
  - Solo sintieron curiosidad
  rationale: El verbo θαυμάζω comunica reacción emocional de asombro. La traducción debe preservar esa apertura narrativa y no resolver la respuesta espiritual de los oyentes más allá de lo que el texto dice.
  doctrine_reference: Preservar la tensión teológica sin añadir conclusión doctrinal.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando la nota textual al marcador [a] dentro de la traducción. Además, se mantuvo la lectura revisada del audit trail: sin añadir un objeto explícito innecesario a «oyeron», y con una preposición española natural para expresar la referencia de περί.'
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí; no hay término divino en este versículo.
  - «Se maravillaron» conserva el tono de asombro sin forzar un léxico demasiado arcaico.
  - «Les habían dicho los pastores» refleja la agencia del pasivo griego de forma natural en español.
  - Se evita añadir «it»/«ello» explícito porque el griego no lo expresa y el contexto ya lo suministra.
