    rationale: «O ‘envuelto en pañales’» no concuerda del todo con el verbo finito del contexto. Es mejor «O ‘lo envolvió en pañales de tela’» o «O ‘lo envolvió en pañales’» anclado correctamente en el verbo/frase.
