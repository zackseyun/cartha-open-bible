  rationale: Se conserva el texto principal casi intacto porque representa bien el griego y la decisión exegética del POB. Se corrigen los marcadores para que cada nota ancle la palabra correcta, se eliminan notas espurias creadas por desalineación, y se normaliza el contenido de las notas al español y a la auditoría inglesa. La nota sobre φάτνη se adapta a una alternativa española útil («comedero») en vez de repetir «pesebre», ya presente en el texto principal.
