translation:
  language: es
  text: Y ella dio a luz a su hijo primogénito, y lo envolvió en pañales[a] y lo acostó en un pesebre[b], porque no había lugar para ellos en la habitación de huéspedes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo envolvió en pañales de tela».
    reason: lexical_alternative
  - marker: b
    text: O «comedero». El término griego se refiere a un lugar o recipiente para dar de comer a los animales.
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente «posada». El griego κατάλυμα puede significar habitación de huéspedes o lugar de alojamiento; Lucas usa otro término para una posada comercial en Lucas 10:34.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔτεκεν
  english_pob_choice: gave birth to
  chosen_spanish: dio a luz a
  alternatives_spanish:
  - parió a
  - engendró
  lexicon: BDAG
  rationale: En un contexto de parto, «dio a luz a» es el español moderno más natural y preciso; conserva el sentido concreto de τίκτω sin elevar el registro ni volverlo arcaico.
- source_word: πρωτότοκον
  english_pob_choice: firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - primero nacido
  - hijo primero
  lexicon: BDAG
  rationale: «Primogénito» es el equivalente español establecido para πρωτότοκος y comunica el orden de nacimiento de manera clara y digna. Se evita añadir implicaciones doctrinales no exigidas por el contexto narrativo inmediato.
- source_word: ἐσπαργάνωσεν
  english_pob_choice: wrapped him in cloths
  chosen_spanish: lo envolvió en pañales
  alternatives_spanish:
  - lo envolvió en lienzos
  - lo fajó
  - lo envolvió en telas
  lexicon: BDAG
  rationale: El verbo se refiere a envolver al bebé con tiras o paños. «En pañales» comunica de forma natural para el lector hispanohablante la acción de envolver a un recién nacido; mantiene la imagen sin sonar mecánico. La alternativa más literal se preserva en nota.
- source_word: ἀνέκλινεν
  english_pob_choice: laid him
  chosen_spanish: lo acostó
  alternatives_spanish:
  - lo puso
  - lo recostó
  lexicon: BDAG
  rationale: Aquí el verbo expresa colocar al niño para que repose. «Lo acostó» es idiomático en español y evita un calco rígido como «lo reclinó».
- source_word: φάτνῃ
  english_pob_choice: feeding trough
  chosen_spanish: pesebre
  alternatives_spanish:
  - comedor de animales
  - bajante de alimento
  - trogue de alimento
  lexicon: BDAG
  rationale: Aunque el inglés POB prefiere desambiguar con «feeding trough», en español «pesebre» es el término estándar y natural para el receptáculo de alimento de animales; comunica el sentido básico del sustantivo griego sin perder inteligibilidad. La nota explica el sentido funcional del término.
- source_word: τόπος
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - espacio
  - sitio
  lexicon: BDAG
  rationale: «Lugar» reproduce bien la amplitud de τόπος y encaja de forma natural con la expresión «no había lugar para ellos».
- source_word: καταλύματι
  english_pob_choice: guest room
  chosen_spanish: habitación de huéspedes
  alternatives_spanish:
  - cuarto de huéspedes
  - albergue
  - posada
  lexicon: BDAG
  rationale: El griego κατάλυμα puede significar un espacio de alojamiento, especialmente una habitación para huéspedes, y no requiere la noción de una posada comercial. «Habitación de huéspedes» conserva la lectura preferida por el POB inglés y evita importar la tradición de «posada/inn» donde el texto no la exige.
theological_decisions:
- issue: Si κατάλυμα debe entenderse como una posada comercial o como un espacio de alojamiento en una casa
  english_pob_reading: guest room
  chosen_spanish_reading: habitación de huéspedes
  alternative_spanish_readings:
  - posada
  - albergue
  - cuarto de huéspedes
  rationale: La preferencia por «habitación de huéspedes» sigue la evidencia lexical de κατάλυμα en Lucas y evita fijar en la narración una escena tradicional que el griego no impone. Esta decisión mantiene la primacía del texto original sobre la tradición de traducción.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso alto del paquete fuente y del audit trail inglés, sin aplicar revisiones adicionales. Se preserva la distinción lexical principal de κατάλυμα frente a la tradición de «posada», y se mantiene la referencia concreta al recipiente de alimento animal en φάτνῃ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda al nombre divino; este versículo no contiene ese término.
  - Se usa «primogénito» como término bíblico claro y estable en español.
  - Se evita «Cristo» porque el verso no contiene Χριστός.
  - La elección de «pesebre» es compatible con el uso eclesial común en español, pero aquí se justifica por el valor lexical del griego.
  - Se conserva un registro sobrio y narrativo, sin añadir elementos interpretativos ajenos al texto.
