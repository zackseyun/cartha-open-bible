revisions:
- from: Y ellos no entendieron[a] la palabra que les habló.
  to: Y ellos no entendieron la declaración[a] que les dijo.
  rationale: Se revisa para hacer el español natural y fiel al sentido de ῥῆμα como enunciado o dicho específico de Jesús. «La declaración que les dijo» comunica mejor el referente que «la palabra que les habló», y la nota conserva las alternativas léxicas documentadas por el POB inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:51:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: καὶ αὐτοὶ οὐ συνῆκαν = «Y ellos no entendieron». Sin embargo, τὸ ῥῆμα ὃ ἐλάλησεν αὐτοῖς se representa de forma menos natural y algo menos precisa con «la palabra que les habló». En español, «hablar una palabra» no suena idiomático aquí; el referente es el dicho/declaración/asunto que Jesús les dijo. Conviene ajustar la cláusula relativa para preservar mejor el sentido de ῥῆμα como enunciado dicho.'
  spanish_quality_summary: La redacción actual es comprensible pero «la palabra que les habló» suena forzada y poco natural en español eclesial general. «La palabra que les dijo» mejora notablemente la legibilidad y mantiene fidelidad. También conviene actualizar la nota para incluir la alternativa principal del inglés POB («la palabra») en posición de alternativa, ya que el texto revisado usará una opción más idiomática.
  glossary_alignment: No hay términos del glosario principal especialmente controvertidos en este versículo. «Entendieron» alinea bien con συνῆκαν. Para τὸ ῥῆμα, «declaración» o «dicho» funciona mejor en español que «palabra» como texto principal en este contexto, aunque «palabra» debe conservarse como alternativa léxica en nota por fidelidad al rango semántico documentado.
  issues:
  - severity: medium
    issue: 'Expresión no idiomática: «la palabra que les habló»'
    rationale: Aunque sigue de cerca elementos léxicos individuales, en español esta construcción suena antinatural. El griego ὃ ἐλάλησεν αὐτοῖς se expresa mejor como «que les dijo» o «que les habló», pero con un sustantivo como «declaración» o «dicho», no «palabra».
  - severity: low
    issue: La nota léxica no refleja del todo la mejor relación entre texto principal y alternativas
    rationale: Si el texto principal cambia a «declaración», la nota debe conservar «la palabra» entre las alternativas, ya que el inglés POB la documenta explícitamente como opción válida de ῥῆμα.
  revised_spanish_text: Y ellos no entendieron la declaración[a] que les dijo.
  revised_footnotes:
  - marker: a
    text: O «la palabra», «el dicho» o «el asunto».
    reason: lexical_alternative
  revision_rationale: Se revisa para hacer el español natural y fiel al sentido de ῥῆμα como enunciado o dicho específico de Jesús. «La declaración que les dijo» comunica mejor el referente que «la palabra que les habló», y la nota conserva las alternativas léxicas documentadas por el POB inglés.
