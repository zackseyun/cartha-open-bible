lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Pero
  lexicon: BDAG
  rationale: La conjunción es coordinante simple. En español, 'Y' conserva el flujo narrativo sin añadir un matiz adversativo que el griego no expresa explícitamente.
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: BDAG
  rationale: El pronombre es explícito en griego y remite a los padres de Jesús en el contexto inmediato. 'Ellos' suena natural en español y mantiene la referencia sin forzar énfasis innecesario.
- source_word: οὐ συνῆκαν
  english_pob_choice: did not understand
  chosen_spanish: no entendieron
  alternatives_spanish:
  - no comprendieron
  - no llegaron a entender
  lexicon: BDAG
  rationale: συνίημι significa entender/comprender. 'No entendieron' es la forma más natural y directa en español, y preserva el sentido básico sin suavizar la afirmación.
- source_word: τὸ ῥῆμα
  english_pob_choice: the statement
  chosen_spanish: la palabra
  alternatives_spanish:
  - la declaración
  - el dicho
  - el asunto
  lexicon: BDAG
  rationale: ῥῆμα puede significar palabra, dicho, declaración o asunto. Aquí el contexto inmediato es la frase pronunciada por Jesús; 'la palabra' mantiene la amplitud semántica del término griego y permite conservar la alternativa lexical documentada por el POB inglés.
- source_word: ὃ ἐλάλησεν αὐτοῖς
  english_pob_choice: that he spoke to them
  chosen_spanish: que les habló
  alternatives_spanish:
  - que les dijo
  - que había hablado con ellos
  lexicon: BDAG
  rationale: λαλέω se traduce naturalmente como hablar/decir. 'Que les habló' sigue de cerca la estructura griega y funciona bien en español; el pasado simple reproduce el aoristo narrativo.
theological_decisions:
- issue: La falta de comprensión de los padres de Jesús
  english_pob_reading: The verse states plainly that they did not understand Jesus' saying, without softening or expanding the claim.
  chosen_spanish_reading: El versículo afirma de forma directa que no entendieron la palabra de Jesús, sin atenuar ni ampliar la afirmación.
  alternative_spanish_readings:
  - No entendieron del todo
  - No aceptaron
  rationale: El griego expresa falta de entendimiento, no aceptación ni comprensión parcial explícita. La traducción conserva la tensión narrativa sin resolverla interpretativamente.
  doctrine_reference: Preservar la tensión teológica narrativa sin importarle una explicación doctrinal ajena al texto.
translation_notes:
  revision_awareness: El contexto de auditoría en inglés muestra acuerdo alto y no registra revisiones sustantivas; por ello, la versión española sigue de cerca la lectura estable del texto, conservando la ambigüedad lexical de ῥῆμα mediante una opción natural en español y una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'comprendieron' para no diluir el sentido simple de συνίημι.
  - Se usa 'la palabra' para conservar la amplitud semántica de ῥῆμα y porque en español puede abarcar dicho/declaración/asunto según contexto.
  - La nota al pie recoge las alternativas léxicas relevantes sin añadir interpretación doctrinal.
