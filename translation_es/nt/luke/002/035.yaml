revisions:
- from: y a ti misma una espada te atravesará el alma también[a], para que los pensamientos de muchos corazones sean revelados.
  to: y una espada pasará por tu propia alma también[a][b], para que los pensamientos de muchos corazones sean revelados.
  rationale: Se ajusta el texto principal para seguir más fielmente la decisión léxica auditada sobre διελεύσεται, dejando la lectura más interpretativa en nota. También se reubica el énfasis en 'tu propia alma', que representa mejor σοῦ ... αὐτῆς en español natural. Se añade la nota cultural ya documentada en la auditoría inglesa. No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:47:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: mantiene la dirección directa a María, conserva la imagen de la espada y expresa la finalidad de que se revelen los pensamientos de muchos corazones. Sin embargo, se aparta innecesariamente de la decisión léxica auditada para διελεύσεται (''pasará a través de'' / ''pasará por'') al poner ''te atravesará'' en el texto principal; ese matiz interpretativo debía quedar como alternativa en nota, no como texto base. También falta la nota cultural del inglés sobre la espada como figura de la profunda angustia de María.'
  spanish_quality_summary: El español es claro y natural, pero 'a ti misma una espada te atravesará el alma' suena algo forzado por el orden y por duplicar el énfasis fuera del sintagma del alma. 'Una espada pasará por tu propia alma también' fluye mejor, preserva mejor el énfasis de 'your own soul also' y evita que 'a ti misma' parezca objeto directo de la espada. 'Sean revelados' es entendible, aunque con 'pensamientos' suena más natural 'sean puestos al descubierto' o mantener el pasivo formal; en este caso puede conservarse 'sean revelados' por cercanía al audit trail.
  glossary_alignment: No hay conflictos con la terminología global principal. 'alma' para ψυχή y 'espada' para ῥομφαία están bien. La principal desalineación es que el texto principal debería seguir la preferencia auditada de διελεύσεται como 'pasará por' / 'pasará a través de', dejando 'atravesará' como alternativa en nota. El énfasis de σοῦ ... αὐτῆς se expresa mejor en español como 'tu propia alma' que como 'a ti misma'.
  issues:
  - severity: medium
    issue: El verbo principal traduce διελεύσεται de forma demasiado interpretativa en el texto base.
    rationale: El audit trail inglés eligió deliberadamente 'will pass through' y relegó 'will pierce' a nota. En español, 'te atravesará' equivale a esa lectura interpretativa y conviene moverla a nota, mientras el texto principal use 'pasará por' o 'pasará a través de'.
  - severity: medium
    issue: El énfasis de σοῦ ... αὐτῆς está colocado de manera menos natural en español.
    rationale: '''A ti misma ... el alma'' es comprensible, pero en español bíblico y natural suena mejor ''tu propia alma'', que concentra el énfasis donde lo hace la frase completa y evita torpeza sintáctica.'
  - severity: low
    issue: Falta la nota cultural presente en el English POB.
    rationale: 'La auditoría inglesa conserva una nota explicativa importante: la espada se entiende comúnmente como figura de la profunda angustia de María. Debe preservarse también en español salvo razón fuerte para omitirla, y no la hay aquí.'
  revised_spanish_text: y una espada pasará por tu propia alma también[a][b], para que los pensamientos de muchos corazones sean revelados.
  revised_footnotes:
  - marker: a
    text: O «te atravesará». El verbo griego significa más literalmente «pasará por» o «pasará a través de», aunque la imagen de una espada naturalmente comunica atravesar.
    reason: lexical_alternative
  - marker: b
    text: La «espada» comúnmente se entiende como una figura de la profunda angustia que María experimentaría.
    reason: cultural_note
  revision_rationale: Se ajusta el texto principal para seguir más fielmente la decisión léxica auditada sobre διελεύσεται, dejando la lectura más interpretativa en nota. También se reubica el énfasis en 'tu propia alma', que representa mejor σοῦ ... αὐτῆς en español natural. Se añade la nota cultural ya documentada en la auditoría inglesa. No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
