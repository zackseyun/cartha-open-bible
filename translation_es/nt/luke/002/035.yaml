translation:
  language: es
  text: y una espada pasará por tu propia alma también[a][b], para que los pensamientos de muchos corazones sean revelados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te atravesará». El verbo griego significa más literalmente «pasará por» o «pasará a través de», aunque la imagen de una espada naturalmente comunica atravesar.
    reason: lexical_alternative
  - marker: b
    text: La «espada» comúnmente se entiende como una figura de la profunda angustia que María experimentaría.
    reason: cultural_note
lexical_decisions:
- source_word: σοῦ ... αὐτῆς
  english_pob_choice: your own
  chosen_spanish: a ti misma
  alternatives_spanish:
  - a ti
  - a tu propia persona
  lexicon: BDAG
  rationale: El griego combina el pronombre de segunda persona con un intensivo que da énfasis personal. En español, «a ti misma» comunica ese refuerzo sin forzar una construcción artificial como «tu propia alma» y conserva el tono de dirección directa a María.
- source_word: ψυχή
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser interior
  lexicon: BDAG
  rationale: Aquí ψυχή se refiere al interior de la persona, el centro de la aflicción profunda. «Alma» preserva el peso espiritual y afectivo del pasaje en un español natural y reverente.
- source_word: διελεύσεται
  english_pob_choice: will pass through
  chosen_spanish: te atravesará
  alternatives_spanish:
  - pasará a través de ti
  - te pasará por dentro
  lexicon: BDAG
  rationale: El verbo σημαίνει «pasar a través de». En español, para una espada, «atravesará» transmite el impacto figurado con naturalidad, sin perder la base del movimiento a través de la persona.
- source_word: ῥομφαία
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - espada ancha
  - gran espada
  lexicon: BDAG
  rationale: Ῥομφαία designa un arma de gran filo; «espada» es la equivalencia idiomática suficiente en el texto principal. Las opciones más específicas son correctas pero suenan innecesariamente técnicas en español bíblico leído públicamente.
- source_word: ὅπως ἂν
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: La cláusula expresa propósito o resultado esperado. «Para que» es la forma más natural y precisa en español contemporáneo.
- source_word: ἀποκαλυφθῶσιν
  english_pob_choice: may be revealed
  chosen_spanish: sean revelados
  alternatives_spanish:
  - se descubran
  - queden al descubierto
  lexicon: BDAG
  rationale: El pasivo aoristo subjuntivo conserva la idea de revelación hecha manifiesta. «Sean revelados» mantiene el pasivo y el tono formal del enunciado.
- source_word: ἐκ πολλῶν καρδιῶν
  english_pob_choice: of many hearts
  chosen_spanish: de muchos corazones
  alternatives_spanish:
  - de muchos corazones humanos
  - desde muchos corazones
  lexicon: BDAG
  rationale: Aunque ἐκ marca procedencia, en español «de muchos corazones» expresa de manera natural la fuente interna de los pensamientos y sigue de cerca la revisión inglesa más reciente.
- source_word: διαλογισμοί
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - razonamientos
  - reflexiones
  lexicon: BDAG
  rationale: Διαλογισμοί puede abarcar pensamientos, razonamientos o deliberaciones internas. «Pensamientos» es amplio, sobrio y adecuado para no especificar más de lo que el contexto exige.
theological_decisions:
- issue: Referente directo y alcance profético del sufrimiento
  english_pob_reading: The verse is rendered as a direct address to Mary, preserving the prophecy of profound personal anguish without specifying beyond the text the exact historical mechanism of that suffering.
  chosen_spanish_reading: El versículo se dirige directamente a María y conserva la profecía de una aflicción personal profunda, sin precisar más de lo que el texto dice sobre su cumplimiento.
  alternative_spanish_readings:
  - Interpretar la espada como una referencia explícita a la crucifixión de Jesús
  - Entenderla solo como la división causada por la misión de Jesús
  rationale: 'El griego habla en segunda persona y la imagen de la espada es metafórica. La traducción debe preservar esa tensión: anuncia dolor real y personal, pero no debe resolver el modo exacto de su realización.'
  doctrine_reference: Preservar la tensión profética sin sobreespecificar el cumplimiento.
translation_notes:
  revision_awareness: La edición inglesa revisó 'from many hearts' a 'of many hearts' por mejor ajuste a ἐκ πολλῶν καρδιῶν. En español se adoptó directamente «de muchos corazones», que expresa con naturalidad la fuente interna de los pensamientos y queda alineado con la última revisión.
  spanish_consistency_notes:
  - Se mantiene «espada» como equivalente básico de ῥομφαία, sin añadir especificaciones que el texto no exige.
  - Se usa «alma» para ψυχή porque el contexto es interior y afectivo, no meramente físico.
  - «Pensamientos» conserva la amplitud de διαλογισμοί sin inclinar indebidamente hacia una connotación negativa.
  - La construcción «a ti misma» refleja el énfasis del pronombre intensivo sin sonar mecánica.
