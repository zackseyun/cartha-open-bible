translation:
  language: es
  text: Y bajó con ellos y llegó[a] a Nazaret, y estaba sujeto a ellos[b]. Y su madre guardaba todas estas cosas en su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue a Nazaret». El griego ἦλθεν puede expresarse como «venir», «ir» o «llegar» según el punto de vista narrativo.
    reason: lexical_alternative
  - marker: b
    text: O «se sometía a ellos». La expresión griega denota sujeción u obediencia continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέβη
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue hacia abajo
  lexicon: BDAG
  rationale: El verbo aoristo de καταβαίνω conserva con claridad el movimiento descendente; en español, «descendió» mantiene ese valor sin perder naturalidad.
- source_word: μετ’ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: BDAG
  rationale: Expresa acompañamiento simple y directo, fiel al griego.
- source_word: ἦλθεν εἰς Ναζαρέθ
  english_pob_choice: came to Nazareth
  chosen_spanish: llegó a Nazaret
  alternatives_spanish:
  - vino a Nazaret
  - fue a Nazaret
  lexicon: BDAG
  rationale: «Llegó a» comunica el arribo de forma idiomática en español y preserva el movimiento narrativo.
- source_word: ἦν ὑποτασσόμενος αὐτοῖς
  english_pob_choice: was subject to them
  chosen_spanish: estaba sujeto a ellos
  alternatives_spanish:
  - se sometía a ellos
  - estaba sometiéndose a ellos
  lexicon: BDAG
  rationale: La construcción perifrástica imperfecta indica estado/acción continua; «estaba sujeto a ellos» refleja bien el sentido relacional de subordinación obediente sin forzar una paráfrasis.
- source_word: διετήρει
  english_pob_choice: kept
  chosen_spanish: guardaba
  alternatives_spanish:
  - conservaba
  - retenía
  lexicon: BDAG
  rationale: διατηρέω sugiere conservar cuidadosamente; «guardaba» en español bíblico conserva esa idea de retención atenta y resulta natural en el contexto.
- source_word: πάντα τὰ ῥήματα ταῦτα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todas estas palabras
  - todos estos dichos
  lexicon: BDAG
  rationale: En este contexto ῥήματα puede abarcar palabras, dichos o asuntos; «cosas» sigue la decisión revisada del audit trail y evita estrechar indebidamente el alcance semántico.
- source_word: ἐν τῇ καρδίᾳ αὐτῆς
  english_pob_choice: in her heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de su corazón
  lexicon: BDAG
  rationale: Se mantiene el modismo bíblico de interioridad y reflexión con una formulación natural en español.
theological_decisions:
- issue: La obediencia/sujeción de Jesús a sus padres terrenales
  english_pob_reading: he was subject to them
  chosen_spanish_reading: estaba sujeto a ellos
  alternative_spanish_readings:
  - se sometía a ellos
  - estaba sometiéndose a ellos
  rationale: El griego afirma una sujeción real y continua en la vida terrenal de Jesús. La traducción conserva esa tensión cristológica sin suavizarla ni explicarla fuera del texto.
  doctrine_reference: Nicene Creed; Definition of Chalcedon
translation_notes:
  revision_awareness: 'Se tomó en cuenta el pasaje por la revisión más reciente: el auditor inglés prefirió «was subject to them» y «all these things». En español se refleja esa dirección con «estaba sujeto a ellos» y «todas estas cosas», manteniendo el valor continuo de la perífrasis y la amplitud semántica de ῥήματα.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y no hay nombres divinos en el versículo.
  - Se conservó el tono bíblico sin arcaísmos innecesarios.
  - Las notas [a] y [b] están ancladas en el texto para cumplir la disciplina de marcación.
