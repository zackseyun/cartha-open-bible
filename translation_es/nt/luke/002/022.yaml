translation:
  language: es
  text: Y cuando se cumplieron los días de la purificación de ellos[a], conforme a la ley de Moisés, lo llevaron a Jerusalén para presentarlo al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «la purificación de ella» en lugar de «la purificación de ellos».
    reason: textual_variant
lexical_decisions:
- source_word: ἐπλήσθησαν
  english_pob_choice: were fulfilled
  chosen_spanish: se cumplieron
  alternatives_spanish:
  - fueron cumplidos
  - llegaron a su plenitud
  lexicon: BDAG
  rationale: En este contexto temporal, el verbo expresa que el período llegó a su término completo. «Se cumplieron» conserva el valor idiomático de plenitud temporal sin sonar mecánico en español.
- source_word: καθαρισμοῦ
  english_pob_choice: purification
  chosen_spanish: purificación
  alternatives_spanish:
  - limpieza ritual
  - purificación ritual
  lexicon: BDAG
  rationale: El contexto es legal-ritual bajo la ley mosaica, así que «purificación» es el equivalente natural y más preciso. El adjetivo «ritual» queda implícito por el contexto y podría añadirse solo si fuera necesario aclarar más.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de ella
  lexicon: BDAG
  rationale: Aunque el griego conserva el plural, el español debe concordar con «días» y expresar el posesivo de forma natural. «Su» mantiene la tensión textual sin forzar una resolución interpretativa en el cuerpo principal.
- source_word: κατὰ τὸν νόμον Μωϋσέως
  english_pob_choice: according to the law of Moses
  chosen_spanish: conforme a la ley de Moisés
  alternatives_spanish:
  - según la ley de Moisés
  - de acuerdo con la ley de Moisés
  lexicon: BDAG
  rationale: «Conforme a» comunica bien la idea de conformidad normativa y suena sobrio en registro bíblico. «Ley de Moisés» reproduce la referencia legal sin reemplazarla por una formulación más interpretativa.
- source_word: ἀνήγαγον
  english_pob_choice: they brought him up
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo subieron
  - lo condujeron
  lexicon: BDAG
  rationale: En español, el componente direccional de «subir» hacia Jerusalén puede explicarse por el contexto sin hacer pesada la frase. «Lo llevaron a Jerusalén» es natural y evita una repetición poco idiomática, aunque la idea de ascenso queda en el movimiento hacia la ciudad.
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: παραστῆσαι
  english_pob_choice: to present
  chosen_spanish: para presentarlo
  alternatives_spanish:
  - para ponerlo delante
  - para llevarlo ante
  lexicon: BDAG
  rationale: En el marco cultual/legal, «presentarlo» expresa adecuadamente la acción de poner a alguien ante Dios sin añadir explicación innecesaria.
- source_word: κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - al Señor
  lexicon: BDAG
  rationale: En español litúrgico y bíblico, «el Señor» es la forma estable para κύριος cuando se refiere a Dios. La preposición implícita en «presentarlo al Señor» refleja naturalmente el dativo final/objetivo del griego.
theological_decisions:
- issue: Número del pronombre posesivo en «purificación»
  english_pob_reading: Retain the plural 'their purification' in the main text, with a footnote noting the singular manuscript variant
  chosen_spanish_reading: Mantener la forma posesiva en el texto principal sin resolver la tensión, y anotar la variante singular en nota
  alternative_spanish_readings:
  - de su purificación
  - de su purificación (entendida como la de ella)
  rationale: El griego base leído aquí usa αὐτῶν, y la traducción principal debe reflejar ese dato sin armonizarlo silenciosamente. En español, «su purificación» conserva la ambigüedad de número en la forma más natural posible, mientras la nota documenta la variante textual singular.
  doctrine_reference: Principios de fidelidad textual y manejo transparente de variantes
translation_notes:
  revision_awareness: Conforme al último pase de revisión, no se registraron cambios adicionales; la propuesta mantiene el acuerdo alto con el expediente en inglés y conserva la variante textual en nota.
  spanish_consistency_notes:
  - Se mantiene «Moisés» con acento y forma estándar en español bíblico.
  - Se usa «el Señor» para κύριος, coherente con la convención reverente en español y con el expediente inglés.
  - La dirección ascendente de ἀνήγαγον queda implícita en «a Jerusalén», sin sobrecargar el verso con una perífrasis poco natural.
  - La nota textual evita resolver la variante manuscrita en el cuerpo principal.
