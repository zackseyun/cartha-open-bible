translation:
  language: es
  text: Sucedió que en aquellos días salió un decreto de César Augusto para que fuera inscrito todo el mundo habitado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el mundo romano» o «todo el imperio». El término griego suele referirse al mundo habitado tal como se concebía dentro del contexto imperial romano.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Sucedió
  - Aconteció
  lexicon: BDAG
  rationale: La fórmula narrativa introduce un nuevo episodio. En español, ‘Ahora bien’ transmite bien el giro discursivo y evita un calco rígido de ‘ocurrió’ o ‘aconteció’ al inicio.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: δέ marca transición narrativa. ‘Ahora bien’ funciona como conector natural en español y preserva el avance del relato.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - durante aquellos días
  lexicon: BDAG
  rationale: La expresión temporal estándar se refleja de manera directa y natural en español con ‘en aquellos días’.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue emitido
  - salió publicado
  - se promulgó
  lexicon: BDAG
  rationale: El griego literalmente dice que el decreto ‘salió’. ‘Salió’ conserva la imagen de promulgación oficial sin sobreespecificar el mecanismo jurídico.
- source_word: δόγμα
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - edicto
  - orden
  lexicon: BDAG
  rationale: En este contexto imperial, ‘decreto’ es formal y claro en español moderno. ‘Edicto’ también sería posible, pero ‘decreto’ comunica bien la idea de una disposición oficial.
- source_word: παρὰ Καίσαρος Αὐγούστου
  english_pob_choice: from Caesar Augustus
  chosen_spanish: de César Augusto
  alternatives_spanish:
  - procedente de César Augusto
  - emitido por César Augusto
  lexicon: BDAG
  rationale: παρά con genitivo expresa origen. ‘De César Augusto’ es la forma más natural en español para indicar procedencia manteniendo la relación fuente/origen.
- source_word: ἀπογράφεσθαι
  english_pob_choice: should be registered
  chosen_spanish: para que fuera inscrito
  alternatives_spanish:
  - para que se registrara
  - para que fuera empadronado
  - para que se censara
  lexicon: BDAG
  rationale: El verbo se refiere a inscripción o registro oficial, a menudo ligado a un censo. ‘Fuera inscrito’ conserva el matiz administrativo sin añadir más especificidad que la del griego.
- source_word: πᾶσαν τὴν οἰκουμένην
  english_pob_choice: all the inhabited world
  chosen_spanish: todo el mundo habitado
  alternatives_spanish:
  - toda la tierra habitada
  - todo el mundo
  - todo el imperio
  lexicon: BDAG
  rationale: οἰκουμένη alude al mundo habitado, frecuentemente en el marco imperial romano. ‘Todo el mundo habitado’ refleja esa precisión mejor que ‘todo el mundo’, sin cerrar el posible sentido contextual de ‘imperio’.
theological_decisions:
- issue: Alcance de οἰκουμένη
  english_pob_reading: all the inhabited world
  chosen_spanish_reading: todo el mundo habitado
  alternative_spanish_readings:
  - todo el mundo
  - todo el mundo romano
  - todo el imperio
  rationale: La cuestión es principalmente léxica e ისტორical, no doctrinal. Se mantiene en el texto principal la referencia amplia a la ‘oikoumenē’ y se preserva en nota la alternativa contextual romana/imperial.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente griego y el rastro auditado en inglés. Se conserva la fórmula narrativa, el movimiento oficial del decreto y la ambigüedad controlada de οἰκουμένη, sin introducir información extra al texto principal.
  spanish_consistency_notes:
  - Se usó ‘decreto’ para δόγμα, coherente con el valor administrativo imperial del contexto.
  - Se mantuvo ‘inscrito’ para ἀπογράφεσθαι, evitando ‘censado’ en el texto principal porque añade una especificidad que el verso no expresa de forma explícita.
  - Se eligió ‘mundo habitado’ para οἰκουμένη, con nota que preserva la lectura contextual de ‘mundo romano’ o ‘imperio’.
