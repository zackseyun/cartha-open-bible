  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. «César Augusto», «decreto» e «inscrito» son compatibles con las decisiones auditadas. La nota sobre «mundo habitado» preserva correctamente la alternativa «mundo romano / imperio».
