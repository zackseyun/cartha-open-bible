revisions:
- from: Ahora bien, en aquellos días salió[a] un decreto de César Augusto para que fuera inscrito todo el mundo habitado[b].
  to: Sucedió que en aquellos días salió un decreto de César Augusto para que fuera inscrito todo el mundo habitado[a].
  rationale: La revisión restaura el valor narrativo de Ἐγένετο con «Sucedió que», dejando de cargar ese sentido sobre «Ahora bien». Se mantiene «salió un decreto» para conservar la imagen verbal de ἐξῆλθεν, pero se elimina la nota léxica secundaria para no sobrecargar el versículo. La nota sobre οἰκουμένη se conserva porque sí preserva una alternativa interpretativa relevante documentada por la auditoría inglesa.
