revisions:
- from: 'Y de repente apareció con el ángel una multitud de la hueste celestial[a], alabando a Dios y diciendo:'
  to: 'Y de repente hubo, con el ángel, una multitud de la hueste celestial[a], alabando a Dios y diciendo:'
  rationale: Se revisa únicamente ἐγένετο para reflejar mejor la construcción existencial del griego y la decisión auditada en inglés, evitando el matiz visual más fuerte de «apareció». Se conserva «hueste celestial» y su nota por su fidelidad léxica y teológica, y se mantiene el resto del verso por estar bien resuelto.
