translation:
  language: es
  text: 'Y de repente hubo, con el ángel, una multitud de la hueste celestial[a], alabando a Dios y diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una multitud del ejército del cielo» o «una multitud de la hueste del cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαίφνης
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - repentinamente
  lexicon: BDAG
  rationale: El adverbio expresa irrupción inesperada en la escena. «De repente» es natural en español y conserva el efecto narrativo sin volverse arcaico.
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: apareció
  alternatives_spanish:
  - hubo
  - se presentó
  lexicon: BDAG
  rationale: En esta construcción existencial, el griego introduce la presencia/manifestación del grupo celestial. «Apareció» comunica bien la irrupción en la escena, aunque no fuerza un matiz visual más allá de lo que el contexto sugiere.
- source_word: σὺν τῷ ἀγγέλῳ
  english_pob_choice: with the angel
  chosen_spanish: con el ángel
  alternatives_spanish:
  - junto con el ángel
  lexicon: BDAG
  rationale: σύν con dativo expresa compañía. «Con el ángel» es la forma más directa y natural en español.
- source_word: πλῆθος
  english_pob_choice: a multitude
  chosen_spanish: una multitud
  alternatives_spanish:
  - un gran número
  - una muchedumbre
  lexicon: BDAG
  rationale: πλῆθος denota gran cantidad. «Multitud» conserva el tono elevado y el valor cuantitativo del término.
- source_word: στρατιᾶς οὐρανίου
  english_pob_choice: of the heavenly host
  chosen_spanish: de la hueste celestial
  alternatives_spanish:
  - del ejército del cielo
  - de la hueste del cielo
  lexicon: BDAG
  rationale: στρατιά puede significar ejército/hueste. «Hueste celestial» mantiene la imaginería militar-celestial del original y suena idiomático en español bíblico sin reducirlo a un simple grupo de ángeles.
- source_word: αἰνούντων
  english_pob_choice: praising
  chosen_spanish: alabando
  alternatives_spanish:
  - dando alabanza
  - glorificando
  lexicon: BDAG
  rationale: El participio describe la acción de la multitud. «Alabando» corresponde bien a αἰνέω y es una forma clara en español litúrgico actual.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios Todopoderoso
  lexicon: BDAG
  rationale: Objeto directo del participio. En español, el verbo «alabar» rige normalmente objeto con «a» personal cuando se refiere a una persona divina; así se evita una formulación menos natural.
- source_word: λεγόντων
  english_pob_choice: and saying
  chosen_spanish: y diciendo
  alternatives_spanish:
  - y diciendo estas palabras
  lexicon: BDAG
  rationale: El participio coordinado introduce la cita siguiente. «Y diciendo» preserva la progresión sintáctica del griego y prepara la continuación.
theological_decisions:
- issue: 'στρατιᾶς οὐρανίου: imaginería militar celeste'
  english_pob_reading: the heavenly host
  chosen_spanish_reading: la hueste celestial
  alternative_spanish_readings:
  - el ejército del cielo
  - la multitud celestial
  rationale: La expresión conserva la tensión entre multitud adorante e imagen militar. «Hueste celestial» mantiene ambos aspectos sin banalizar el trasfondo bélico ni convertirlo en una descripción meramente genérica.
  doctrine_reference: Ángeles como ejército ordenado de Dios; lenguaje bíblico de la corte/hueste celestial (cf. salmos y relatos de revelación)
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden de manera alta; no se requiere corrección textual. La principal decisión fue cómo reflejar στρατιᾶς οὐρανίου en español sin perder el matiz de host/army. También se eligió una construcción verbal natural para ἐγένετο que conserve la irrupción narrativa.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - «Hueste celestial» conserva la imagen tradicional sin caer en una traducción mecánica.
  - El estilo mantiene tono bíblico moderno y legible para lectura pública.
