review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: llegada urgente, hallazgo de María, José y el bebé, y su ubicación en la φάτνη. Sin embargo, «fueron» se aparta de ἦλθαν, que aquí se entiende mejor como movimiento hacia el lugar anunciado («vinieron»/«llegaron»), y «niño» debilita el matiz de βρέφος, que en este contexto de nacimiento se expresa mejor como «bebé».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Y fueron presurosos» suena menos natural que «Fueron de prisa» o «Vinieron de prisa». Además, «presurosos» funciona más como adjetivo de sujeto que como modo verbal fluido. «Acostado» es aceptable para κείμενον, pero con «bebé» la frase mejora en naturalidad y precisión narrativa.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. La nota sobre φάτνη está bien encaminada. La principal mejora léxica es ajustar βρέφος a «bebé» y ἦλθαν a «vinieron» para alinearse mejor con el audit trail inglés y el valor contextual del griego.
  issues:
  - severity: medium
    issue: «fueron» para ἦλθαν
    rationale: Aunque no es imposible en español, el verbo griego en este contexto narrativo se entiende mejor como llegada al lugar señalado; «vinieron» preserva más de cerca el valor contextual reflejado también en el inglés POB («came»).
  - severity: medium
    issue: «presurosos» para σπεύσαντες
    rationale: Comunica urgencia, pero resulta algo rígido y menos idiomático como modificador verbal. «De prisa» o «aprisa» expresa mejor el participio modal en español natural.
  - severity: medium
    issue: «niño» para βρέφος
    rationale: βρέφος se refiere a un bebé/infante muy pequeño; en el contexto inmediato del nacimiento, «bebé» es más preciso que «niño» y más cercano a la decisión inglesa «the baby».
  revised_spanish_text: Y vinieron de prisa y hallaron a María y a José, y al bebé acostado en el pesebre[a].
  revised_footnotes:
  - marker: a
    text: O «comedero». El griego φάτνη puede referirse a un pesebre o a un comedero para animales.
    reason: lexical_alternative
  revision_rationale: Se ajusta ἦλθαν a «vinieron» para reflejar mejor el movimiento de llegada al lugar indicado; σπεύσαντες a «de prisa» para un español más natural; y βρέφος a «bebé» para preservar mejor el contexto de recién nacido. Se mantiene «hallaron» y «pesebre» por fidelidad y buen registro.
