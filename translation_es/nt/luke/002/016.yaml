  to: Y vinieron de prisa y hallaron a María y a José, y al bebé acostado en el pesebre[a].
  rationale: Se ajusta ἦλθαν a «vinieron» para reflejar mejor el movimiento de llegada al lugar indicado; σπεύσαντες a «de prisa» para un español más natural; y βρέφος a «bebé» para preservar mejor el contexto de recién nacido. Se mantiene «hallaron» y «pesebre» por fidelidad y buen registro.
