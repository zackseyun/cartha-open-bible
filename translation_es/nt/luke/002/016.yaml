translation:
  language: es
  text: Y vinieron de prisa y hallaron a María y a José, y al bebé acostado en el pesebre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «comedero». El griego φάτνη puede referirse a un pesebre o a un comedero para animales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθαν
  english_pob_choice: came
  chosen_spanish: fueron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι aquí marca el movimiento hacia el lugar; en español, con el complemento implícito del contexto, «fueron» conserva la acción narrativa sin forzar un «venir» que dependería del punto de vista.
- source_word: σπεύσαντες
  english_pob_choice: in haste
  chosen_spanish: presurosos
  alternatives_spanish:
  - con prisa
  - apresuradamente
  lexicon: BDAG
  rationale: El participio expresa modo y urgencia. «Presurosos» mantiene la idea de rapidez con un registro natural y sobrio en español; evita una perífrasis más pesada como «habían ido de prisa».
- source_word: ἀνεῦραν
  english_pob_choice: found
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  - descubrieron
  lexicon: BDAG
  rationale: El verbo implica encontrar tras buscar. «Hallaron» conserva el matiz de encuentro logrado y resulta adecuado en un contexto narrativo reverente; «encontraron» también sería posible, pero menos marcado.
- source_word: τήν τε Μαριὰμ
  english_pob_choice: Mary
  chosen_spanish: a María
  alternatives_spanish:
  - a la María
  - María
  lexicon: BDAG
  rationale: El nombre propio Μαριάμ se vierte como «María» según el uso español estándar; se mantiene la preposición personal «a» por tratarse de objeto directo animado.
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: a José
  alternatives_spanish:
  - José
  lexicon: BDAG
  rationale: Nombre propio transliterado al español común. Se conserva la marca de objeto directo animado con «a» por la sintaxis española.
- source_word: τὸ βρέφος
  english_pob_choice: the baby
  chosen_spanish: al niño
  alternatives_spanish:
  - al bebé
  - al infante
  lexicon: BDAG
  rationale: βρέφος designa a un niño muy pequeño, aquí el recién nacido Jesús. En español, «niño» es claro y natural en este contexto narrativo; «bebé» sería más coloquial, y «infante» más técnico.
- source_word: κείμενον
  english_pob_choice: lying
  chosen_spanish: acostado
  alternatives_spanish:
  - yaciendo
  - tendido
  lexicon: BDAG
  rationale: El participio de κεῖμαι describe el estado/posición del niño, no una acción de colocarlo. «Acostado» comunica la postura de manera natural en español; «yaciendo» preserva más el matiz formal, pero suena más literario.
- source_word: ἐν τῇ φάτνῃ
  english_pob_choice: in the manger
  chosen_spanish: en el pesebre
  alternatives_spanish:
  - en el establo
  - en el comedero
  lexicon: BDAG
  rationale: φάτνη puede referirse a un pesebre o comedero para animales; «pesebre» es el equivalente tradicional y comprensible en español, sin perder la referencia concreta al lugar de reposo del niño.
- source_word: καὶ ... καὶ ... καὶ
  english_pob_choice: and ... and ... and
  chosen_spanish: y ... y ... y
  alternatives_spanish:
  - —
  lexicon: Greek grammar
  rationale: Se conserva la coordinación repetida del griego para reflejar el ritmo narrativo acumulativo. En español, la serie con «y» es natural y mantiene la sencillez del original.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue de cerca el texto griego y el audit trail inglés, manteniendo la equivalencia natural del relato sin añadir explicaciones implícitas.
  spanish_consistency_notes:
  - Se mantiene «María» y «José» como nombres propios estándar en español.
  - Se evita «SEÑOR» u otros términos no presentes en el versículo.
  - Se preserva el valor narrativo simple de la serie coordinada con «y».
  - La nota sobre φάτνη conserva la tensión léxica entre «pesebre» y «comedero» sin imponer una sola glosa interpretativa.
