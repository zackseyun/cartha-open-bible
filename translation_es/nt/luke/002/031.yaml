  text: el cual preparaste delante de todos los pueblos[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante todos los pueblos»; el giro griego puede expresar algo puesto públicamente delante de la vista de todos.
