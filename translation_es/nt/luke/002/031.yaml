lexical_decisions:
- source_word: ὃ
  english_pob_choice: which
  chosen_spanish: el cual
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: El relativo neutro retoma de manera natural el antecedente implícito de la oración anterior. En español, «el cual» conserva mejor la referencia formal y evita ambigüedad en un registro bíblico sobrio.
- source_word: ἡτοίμασας
  english_pob_choice: you prepared
  chosen_spanish: preparaste
  alternatives_spanish:
  - has preparado
  - preparaste tú
  lexicon: BDAG
  rationale: El aoristo indicativo se rinde con pretérito simple. «Preparaste» es claro, directo y mantiene el valor perfectivo del griego.
- source_word: κατὰ πρόσωπον
  english_pob_choice: before the face of
  chosen_spanish: ante el rostro de
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: BDAG
  rationale: La expresión griega es idiomática y sugiere algo puesto abiertamente delante de la vista de otros. «Ante el rostro de» conserva con mayor cercanía la imagen de πρόσωπον y el matiz público/visible del conjunto, sin perder naturalidad en español.
- source_word: πάντων
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los
  lexicon: BDAG
  rationale: Se mantiene el valor universal del genitivo plural mediante «todos», que en español fluye de manera natural con el sustantivo siguiente.
- source_word: τῶν λαῶν
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - todos los pueblos
  lexicon: BDAG
  rationale: El plural λαῶν se conserva como plural colectivo con «pueblos», para no borrar la referencia a múltiples grupos humanos. «Naciones» sería posible, pero «pueblos» preserva mejor la amplitud semántica y la relación con el versículo siguiente.
theological_decisions:
- issue: Alcance de λαῶν y relación con el versículo siguiente
  english_pob_reading: the peoples
  chosen_spanish_reading: los pueblos
  alternative_spanish_readings:
  - las naciones
  - la humanidad
  rationale: La forma plural debe permanecer visible en español porque el texto apunta a varios pueblos a la vista de todos. «Los pueblos» conserva la apertura del alcance sin anticipar la distinción que se explicita en el versículo siguiente.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue el ajuste del audit trail inglés que prefirió una expresión más cercana a κατὰ πρόσωπον, pero en español se evitó una calca demasiado dura y se eligió una fórmula idiomática que conserva el sentido de exposición pública y visibilidad.
  spanish_consistency_notes:
  - Se mantuvo «pueblos» para reflejar el plural griego λαῶν y no adelantar la identificación específica del versículo siguiente.
  - Se evitó «SEÑOR» y no hay terminología del nombre divino en este verso; por tanto, no aplica la convención Yahvé.
  - El registro es formal pero readable, alineado con el estilo bíblico público del proyecto.
