  rationale: Se corrige una construcción pasiva poco natural en español. «Que se les había dicho» comunica fielmente el participio pasivo griego en un español claro y digno, sin cambiar el sentido ni la relación temporal. Se mantiene «mensaje» como equivalente principal de ῥῆμα y la nota conserva las alternativas documentadas.
