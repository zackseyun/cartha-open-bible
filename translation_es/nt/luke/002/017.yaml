translation:
  language: es
  text: Y al verlo[a], dieron a conocer el mensaje que se les había dicho acerca de este niño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la palabra» o «el dicho» que se les había dicho acerca de este niño.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: when they saw it
  chosen_spanish: al verlo
  alternatives_spanish:
  - cuando lo vieron
  - después de verlo
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente antes del verbo principal. En español, «al verlo» expresa de manera natural la secuencia anterior sin añadir una interpretación excesiva. El objeto implícito se recupera por el contexto inmediato del niño y del anuncio recibido.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Entonces
  - pero
  lexicon: BDAG
  rationale: δέ aquí solo enlaza la narración con suavidad. «Y» conserva ese avance narrativo sencillo y fluido en español.
- source_word: ἐγνώρισαν
  english_pob_choice: they made known
  chosen_spanish: dieron a conocer
  alternatives_spanish:
  - hicieron saber
  - reportaron
  - revelaron
  lexicon: BDAG
  rationale: γνωρίζω significa hacer saber o dar a conocer. «Dieron a conocer» mantiene la fuerza declarativa sin convertirlo en un término técnico o eclesiástico más fuerte de lo que el griego exige.
- source_word: περὶ τοῦ ῥήματος
  english_pob_choice: the message
  chosen_spanish: el mensaje
  alternatives_spanish:
  - la palabra
  - el dicho
  - el asunto
  lexicon: BDAG
  rationale: ῥῆμα puede significar palabra, dicho o mensaje. En este contexto se refiere al contenido comunicado a los pastores respecto del niño; «mensaje» comunica bien ese contenido en español actual. Se preserva la alternativa «la palabra» como posibilidad legítima del término griego.
- source_word: τοῦ λαληθέντος αὐτοῖς
  english_pob_choice: that had been spoken to them
  chosen_spanish: que les había sido hablado
  alternatives_spanish:
  - que les había sido dicho
  - que se les había hablado
  lexicon: BDAG
  rationale: El participio pasivo articular modifica a «mensaje» y expresa una acción anterior. «Les había sido hablado» conserva la pasiva y la anterioridad relativa; aunque suena algo más formal que «les había sido dicho», reproduce con más precisión la estructura del griego.
- source_word: περὶ τοῦ παιδίου τούτου
  english_pob_choice: about this child
  chosen_spanish: acerca de este niño
  alternatives_spanish:
  - sobre este niño
  - acerca de este pequeño niño
  lexicon: BDAG
  rationale: παιδίον designa un niño pequeño; en el contexto se trata del niño recién nacido Jesús. «Niño» es natural y fiel en español; «acerca de» refleja bien περὶ sin forzar el matiz.
theological_decisions:
- issue: Valor de ῥῆμα en relación con el anuncio angélico
  english_pob_reading: message
  chosen_spanish_reading: mensaje
  alternative_spanish_readings:
  - palabra
  - dicho
  - saying
  rationale: 'La decisión no es doctrinal sino semántica: ῥῆμα aquí alude al contenido comunicado a los pastores. «Mensaje» expresa con claridad ese contenido en español moderno sin añadir una carga litúrgica o técnica que el texto no exige. Se conserva en las alternativas la posibilidad de «palabra», por si el lector desea percibir el vínculo más literal con el griego.'
  doctrine_reference: Transparencia léxica; el sentido se determina por el contexto narrativo del anuncio angélico.
translation_notes:
  revision_awareness: La versión sigue de cerca el texto griego y coincide con la lectura inglesa auditada en la secuencia temporal, el valor de γνωρίζω y la ambigüedad de ῥῆμα. Se evita una traducción mecánica desde el inglés, pero se conserva su decisión principal de entender ῥῆμα como 'message'.
  spanish_consistency_notes:
  - Se mantiene «niño» para παιδίον, en vez de «niñito» o «pequeño niño», porque el contexto ya identifica claramente al referente.
  - Se usa la pasiva perifrástica «les había sido hablado» para reflejar el participio pasivo griego sin perder naturalidad en español.
  - La nota de pie marca la alternativa léxica importante de ῥῆμα, ya que el español también admite «palabra» y «dicho» con distinto matiz.
