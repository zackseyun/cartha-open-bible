    text: 'O: «cuando se completaron los ocho días».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fue llamado Jesús».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, antes de su concepción en el vientre de María.
    reason: cross_reference
  revision_rationale: Se ajustó la cláusula de nombramiento para conservar mejor el papel explícito de «nombre» en ἐκλήθη τὸ ὄνομα αὐτοῦ sin producir una pasiva española forzada. También se reemplazó «el nombre llamado por el ángel» por «el nombre anunciado por el ángel», porque esa es una manera natural y fiel de expresar en español la referencia al nombre previamente designado por el ángel, evitando una literalidad que suena defectuosa. Se mantuvieron el orden temporal, la referencia a la concepción y las notas esenciales del audit trail inglés.
