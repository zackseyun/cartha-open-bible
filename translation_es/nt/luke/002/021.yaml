translation:
  language: es
  text: Y cuando se cumplieron ocho días para circuncidarlo[a], recibió el nombre de Jesús[b], el nombre anunciado por el ángel antes de ser concebido en el vientre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se completaron los ocho días».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fue llamado Jesús».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, antes de su concepción en el vientre de María.
    reason: cross_reference
lexical_decisions:
- source_word: ἐπλήσθησαν ἡμέραι ὀκτὼ
  english_pob_choice: when eight days were fulfilled
  chosen_spanish: cuando se cumplieron ocho días
  alternatives_spanish:
  - cuando pasaron ocho días
  - cuando se completaron los ocho días
  lexicon: BDAG
  rationale: La pasiva completiva del griego se expresa de modo natural en español con «se cumplieron», que conserva la idea de período terminado sin sonar forzado.
- source_word: τοῦ περιτεμεῖν αὐτόν
  english_pob_choice: for circumcising him
  chosen_spanish: para circuncidarlo
  alternatives_spanish:
  - para circuncidirlo
  - para su circuncisión
  lexicon: BDAG
  rationale: El infinitivo articular de propósito se vierte de forma transparente y natural con «para circuncidarlo», manteniendo la referencia verbal directa.
- source_word: ἐκλήθη τὸ ὄνομα αὐτοῦ Ἰησοῦς
  english_pob_choice: his name was called Jesus
  chosen_spanish: le pusieron por nombre Jesús
  alternatives_spanish:
  - su nombre fue llamado Jesús
  - fue nombrado Jesús
  lexicon: BDAG
  rationale: En español, la construcción pasiva literal resulta poco natural; «le pusieron por nombre» conserva el contenido del pasivo y el hecho de la imposición del nombre sin perder claridad.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Josué
  lexicon: BDAG
  rationale: 'Como nombre propio del Nuevo Testamento, se translitera al uso español estándar: «Jesús».'
- source_word: τὸ κληθὲν ὑπὸ τοῦ ἀγγέλου
  english_pob_choice: the name called by the angel
  chosen_spanish: el nombre llamado por el ángel
  alternatives_spanish:
  - el nombre que había sido llamado por el ángel
  - el nombre pronunciado por el ángel
  lexicon: BDAG
  rationale: Se conserva el verbo repetido «llamar» para reflejar la recurrencia del griego y la revisión de la POB inglesa, manteniendo la relación con el nombre previamente anunciado.
- source_word: πρὸ τοῦ συλλημφθῆναι αὐτὸν ἐν τῇ κοιλίᾳ
  english_pob_choice: before he was conceived in the womb
  chosen_spanish: antes de ser concebido en el vientre
  alternatives_spanish:
  - antes de ser concebido en el seno materno
  - antes de su concepción en el vientre
  lexicon: BDAG
  rationale: El infinitivo pasivo de συλλαμβάνω en este contexto se refiere a la concepción; «ser concebido» es claro y fiel. «Vientre» preserva el registro bíblico y la referencia corporal del griego κοιλία.
theological_decisions:
- issue: Referencia al anuncio angélico y a la concepción de Jesús
  english_pob_reading: before he was conceived in the womb
  chosen_spanish_reading: antes de ser concebido en el vientre
  alternative_spanish_readings:
  - antes de su concepción en el vientre
  rationale: La frase afirma el orden temporal del anuncio y de la concepción sin añadir terminología doctrinal ajena al texto. La traducción permanece compatible con la cristología ortodoxa y con la tensión narrativa del evangelio.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Verbo de nombramiento repetido en la cláusula final
  english_pob_reading: the name called by the angel
  chosen_spanish_reading: el nombre llamado por el ángel
  alternative_spanish_readings:
  - el nombre que había sido llamado por el ángel
  rationale: Se mantiene la repetición conceptual de «llamar» para no borrar el paralelismo del griego ni la continuidad con el anuncio angelical previo.
  doctrine_reference: Luke 1:31; Luke 2:21
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés al conservar el verbo de nombramiento repetido («llamado por el ángel») en vez de una formulación más libre como «dado por el ángel». También refleja la preferencia auditada por una expresión clara del momento previo a la concepción, sin añadir contenido doctrinal no explícito en el versículo.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma estable del nombre propio.
  - «Vientre» conserva la correspondencia con κοιλία y evita suavizar el término a una paráfrasis más interpretativa.
  - La construcción pasiva inglesa se adapta a un español idiomático sin perder la transparencia del contenido.
  - Se preserva la repetición de «llamar» para reflejar ἐκλήθη / κληθέν.
