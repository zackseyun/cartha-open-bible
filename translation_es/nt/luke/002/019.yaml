translation:
  language: es
  text: Pero María guardaba[a] todas estas palabras, meditándolas[b] en su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «conservaba» o «preservaba»; el verbo puede incluir la idea de guardar cuidadosamente.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «poniéndolas juntas mentalmente» o «considerándolas juntas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca una transición narrativa con contraste leve desde la reacción de los pastores; «Pero» comunica bien ese giro en español natural.
- source_word: Μαρία
  english_pob_choice: Mary
  chosen_spanish: María
  lexicon: convención onomástica
  rationale: Nombre propio transliterado según la forma española estándar.
- source_word: συνετήρει
  english_pob_choice: was treasuring up
  chosen_spanish: guardaba
  alternatives_spanish:
  - conservaba
  - preservaba
  - atesoraba
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o sostenida. En español, «guardaba» comunica el cuidado de retener y conservar con naturalidad; «atesoraba» sería más interpretativo y más afectivo que el griego exige de forma explícita.
- source_word: πάντα
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todas las cosas
  - todo
  lexicon: BDAG
  rationale: Con «estas palabras», el conjunto es específico y el femenino plural concuerda con «palabras». «Todas» preserva la amplitud del contenido retenido.
- source_word: τὰ ῥήματα ταῦτα
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estos dichos
  - estas cosas
  - estos dichos y hechos
  lexicon: BDAG
  rationale: ῥήματα aquí apunta directamente a lo dicho por los pastores. «Palabras» es el equivalente más directo y claro en español; «cosas» diluiría el carácter verbal.
- source_word: συμβάλλουσα
  english_pob_choice: pondering
  chosen_spanish: meditándolas
  alternatives_spanish:
  - ponderándolas
  - considerándolas
  - juntándolas mentalmente
  lexicon: BDAG
  rationale: El participio sugiere comparar y reunir mentalmente lo escuchado. «Meditándolas» expresa reflexión interior en español digno y bíblico sin cerrar la amplitud del proceso mental.
- source_word: ἐν τῇ καρδίᾳ αὐτῆς
  english_pob_choice: in her heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de sí
  - en su interior
  lexicon: BDAG
  rationale: La expresión conserva el idiomatismo bíblico de interioridad, afecto y pensamiento. «Corazón» mantiene mejor la metáfora que una paráfrasis psicológica.
theological_decisions:
- issue: Naturaleza de la respuesta de María
  english_pob_reading: Mary inwardly treasured and reflected on the reported message.
  chosen_spanish_reading: María guardaba y meditaba interiormente lo que había oído.
  alternative_spanish_readings:
  - María solo recordaba los hechos
  - María ya los comprendía plenamente
  rationale: 'La frase española mantiene la tensión del texto: conservación cuidadosa y reflexión, sin afirmar ni simple memoria ni comprensión total.'
  doctrine_reference: Conservar la tensión teológica y literaria del pasaje.
translation_notes:
  revision_awareness: 'El contexto auditado en inglés permanece estable: la traducción inglesa opta por «was treasuring up» y «pondering» sin resolver la amplitud del proceso mental de María. No se detectan revisiones posteriores que alteren esa lectura; la versión española preserva ese mismo equilibrio semántico.'
  spanish_consistency_notes:
  - Se mantiene el contraste narrativo con «Pero».
  - Se conserva el idiomatismo bíblico «en su corazón» para καρδία.
  - «Guardaba» y «meditándolas» trabajan juntos para reflejar duratividad y reflexión sin sobreinterpretar.
  - Las notas alternativas evitan cerrar el sentido de συμβάλλουσα a una sola idea inglesa o española.
