translation:
  language: es
  text: 'y para ofrecer un sacrificio conforme a lo que está dicho en la Ley del Señor: un par de tórtolas o dos pichones de paloma[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conforme a lo que había sido dicho en la Ley del Señor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ δοῦναι
  english_pob_choice: to offer
  chosen_spanish: para ofrecer
  alternatives_spanish:
  - para dar
  - para presentar
  lexicon: BDAG
  rationale: El infinitivo articular expresa finalidad en contexto. En español, con θυσίαν, ‘ofrecer’ comunica mejor la idea sacrificial que ‘dar’, sin perder el valor del verbo de base.
- source_word: θυσίαν
  english_pob_choice: a sacrifice
  chosen_spanish: un sacrificio
  alternatives_spanish:
  - una ofrenda
  lexicon: BDAG
  rationale: θυσία designa un acto sacrificial; ‘sacrificio’ es la equivalencia más directa y clara en español para este contexto levítico.
- source_word: κατὰ τὸ εἰρημένον
  english_pob_choice: according to what had been said
  chosen_spanish: conforme a lo que había sido dicho
  alternatives_spanish:
  - según lo que está dicho
  - conforme a lo que fue dicho
  lexicon: BDAG
  rationale: El participio perfecto pasivo de λέγω sugiere algo que ya ha sido dicho y permanece vigente como referencia. ‘Conforme a lo que había sido dicho’ conserva ese matiz sin volverlo demasiado rígido.
- source_word: ἐν τῷ νόμῳ κυρίου
  english_pob_choice: in the Law of the Lord
  chosen_spanish: en la Ley del Señor
  alternatives_spanish:
  - en la Ley del Señor Dios
  - en la ley del Señor
  lexicon: BDAG
  rationale: νόμος se rinde como ‘Ley’ por el eco escriturario y legal; κύριος se traduce ‘Señor’ conforme al testimonio auditado del POB en este giro fórmico bíblico.
- source_word: ζεῦγος
  english_pob_choice: a pair
  chosen_spanish: un par
  alternatives_spanish:
  - una pareja
  - dos
  lexicon: BDAG
  rationale: ζεῦγος aquí denota dos aves como unidad; ‘un par’ es la forma natural en español y preserva la unidad del sintagma.
- source_word: τρυγόνων
  english_pob_choice: turtledoves
  chosen_spanish: tórtolas
  alternatives_spanish:
  - tortolitas
  - palomas torcaces
  lexicon: BDAG
  rationale: τρυγών es específicamente ‘tórtola’, no paloma genérica; conviene mantener la precisión zoológica y sacrificial.
- source_word: νοσσοὺς περιστερῶν
  english_pob_choice: young pigeons
  chosen_spanish: polluelos de paloma
  alternatives_spanish:
  - pichones de paloma
  - polluelos de las palomas
  lexicon: BDAG
  rationale: νοσσός es un ave joven; περιστερά aquí puede equivaler a ‘paloma/pigeon’. ‘Polluelos de paloma’ preserva la juventud del ave y suena natural en español. Se evita ‘pichones’ por posible regionalismo.
theological_decisions:
- issue: κύριος en una fórmula de la Ley
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - SEÑOR
  - Dueño
  rationale: El texto griego tiene κύριος dentro de una referencia a la Ley; en español del POB se mantiene ‘Señor’ sin mayúsculas de máscara, coherente con la transliteración funcional del audit trail y con el uso reverente normal.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'Se siguió el análisis auditado del POB en los puntos léxicos principales: infinitivo de finalidad con ‘ofrecer’, θυσία como ‘sacrificio’, y el sintagma de la Ley con κύριος como ‘Señor’. No se observaron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y no arcaizante.
  - Se evitó ‘SEÑOR’ como convención tipográfica de máscara; se usó ‘Señor’ porque el texto griego dice κύριος.
  - 'Se conservó la especificidad de las aves sacrificadas: tórtolas y polluelos de paloma.'
  - La nota al pie recoge la alternativa verbal de κατὰ τὸ εἰρημένον sin introducir una interpretación más fuerte que el griego.
