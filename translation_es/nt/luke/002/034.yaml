translation:
  language: es
  text: 'Y Simeón los bendijo y dijo a María, su madre: «He aquí, este ha sido puesto para caída y levantamiento de muchos en Israel, y para señal[a] a la que se opondrán[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «signo». El griego σημεῖον admite ambas posibilidades; «señal» es la opción más natural aquí.
    reason: lexical_alternative
  - marker: b
    text: O «hablada en contra» o «contradicha». El participio griego subraya oposición expresada con palabras; «se opondrán» comunica el sentido principal de manera más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλόγησεν
  english_pob_choice: blessed
  chosen_spanish: los bendijo
  alternatives_spanish:
  - les dio su bendición
  - los bendijo con una bendición
  lexicon: BDAG
  rationale: En contexto narrativo, εὐλόγησεν se expresa naturalmente como una acción de bendecir. «Los bendijo» conserva la brevedad y el valor verbal directo del griego sin añadir contenido.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - a ambos
  lexicon: BDAG
  rationale: El pronombre plural se refiere de forma natural al grupo presente. «Los» mantiene la referencia plural sin sobreespecificar.
- source_word: πρὸς Μαριὰμ
  english_pob_choice: to Mary
  chosen_spanish: a María
  alternatives_spanish:
  - hacia María
  lexicon: BDAG
  rationale: Para el habla dirigida a una persona, el español natural usa «a». «Hacia» suena más direccional de lo que exige el contexto.
- source_word: τὴν μητέρα αὐτοῦ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de él
  lexicon: BDAG
  rationale: El posesivo español expresa con claridad la relación contextual con Jesús. «Su madre» evita la literalidad pesada y preserva la referencia sin ambigüedad en el contexto inmediato.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: BDAG
  rationale: El griego introduce una llamada solemne a prestar atención. «Mira» conserva la fuerza deíctica en español actual; «He aquí» sería más tradicional, pero menos natural.
- source_word: οὗτος
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - este niño
  - él
  lexicon: BDAG
  rationale: El demostrativo explícito se preserva con «este». En español, el sustantivo implícito se entiende por el contexto; añadir «niño» iría más allá del griego.
- source_word: κεῖται
  english_pob_choice: is appointed
  chosen_spanish: está puesto
  alternatives_spanish:
  - está destinado
  - ha sido puesto
  lexicon: BDAG
  rationale: En este contexto profético, κεῖται comunica disposición/colocación para un fin. «Está puesto» conserva la imagen de ser establecido sin cerrar del todo la amplitud de sentido que el griego admite.
- source_word: εἰς πτῶσιν
  english_pob_choice: for the fall
  chosen_spanish: para caída
  alternatives_spanish:
  - para el tropiezo
  - para la ruina
  lexicon: BDAG
  rationale: πτῶσις aquí expresa caída o derrumbe figurado. «Caída» es breve y directo; mantiene la par con «levantamiento».
- source_word: καὶ ἀνάστασιν
  english_pob_choice: and rising
  chosen_spanish: y levantamiento
  alternatives_spanish:
  - y resurrección
  - y alzamiento
  lexicon: BDAG
  rationale: ἀνάστασις puede significar «levantamiento» o «resurrección». Dado el contraste inmediato con πτῶσις, «levantamiento» preserva el sentido amplio de ser alzado/recuperado sin fijarlo de entrada en una lectura más estrecha.
- source_word: πολλῶν ἐν τῷ Ἰσραὴλ
  english_pob_choice: of many in Israel
  chosen_spanish: de muchos en Israel
  alternatives_spanish:
  - de muchos dentro de Israel
  - de muchos entre Israel
  lexicon: BDAG
  rationale: La frase se conserva de manera directa. «En Israel» mantiene el ámbito pactual/comunitario del texto.
- source_word: σημεῖον
  english_pob_choice: a sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - portento
  lexicon: BDAG
  rationale: En español bíblico contemporáneo, «señal» comunica bien σημεῖον sin sonar técnico ni arcaico.
- source_word: ἀντιλεγόμενον
  english_pob_choice: that is opposed
  chosen_spanish: que es contradicha
  alternatives_spanish:
  - que es opuesta
  - de quien se habla en contra
  lexicon: BDAG
  rationale: El participio pasivo/medio subraya contradicción verbal y oposición. «Que es contradicha» mantiene ese matiz de oposición expresada con palabras, que el audit trail en inglés preserva con nota.
theological_decisions:
- issue: Alcance de ἀνάστασις en «πτῶσιν καὶ ἀνάστασιν πολλῶν»
  english_pob_reading: Rendered broadly as 'rise' rather than explicitly 'resurrection.'
  chosen_spanish_reading: «levantamiento» en lugar de «resurrección»
  alternative_spanish_readings:
  - resurrección
  - alzamiento
  - levantarse
  rationale: El contraste inmediato con «caída» apunta primero a un movimiento de abatimiento y elevación entre muchos en Israel. Traducir «resurrección» estrecharía el campo semántico más de lo que exige la frase y resolvería una tensión que el original deja abierta.
  doctrine_reference: Preservar la ambigüedad teológica del original; no sobretraducir hacia una lectura doctrinal específica.
- issue: Valor de κεῖται respecto del papel de Jesús
  english_pob_reading: Rendered as 'is appointed.'
  chosen_spanish_reading: «está puesto»
  alternative_spanish_readings:
  - está destinado
  - ha sido puesto
  - está establecido
  rationale: El texto tiene fuerza profética y de destino, pero sin necesidad de forzar una formulación más interpretativa. «Está puesto» comunica establecimiento para una función o efecto, manteniendo la densidad del griego.
  doctrine_reference: Primacía del texto original; equivalencia óptima sin sobredeterminación.
- issue: Naturaleza de ἀντιλεγόμενον
  english_pob_reading: '''that is opposed'' with a note preserving ''spoken against.'''
  chosen_spanish_reading: «que es contradicha»
  alternative_spanish_readings:
  - que es opuesta
  - de quien se habla en contra
  - que es rechazada
  rationale: El participio resalta oposición verbal; el español necesita una forma pasiva natural para conservar esa tensión. «Contradicha» puede sonar menos usual, pero reproduce mejor la idea de ser objetada por palabras, como indica el audit trail.
  doctrine_reference: Mantener la tensión léxica entre oposición y contradicción verbal; no neutralizar el conflicto del texto.
translation_notes:
  revision_awareness: 'He tenido en cuenta la revisión inglesa más reciente: en el audit trail, ''Behold'' y ''rising'' reemplazaron formas anteriores para un registro más formal y para reflejar mejor ἀνάστασιν. En español, he optado por «Mira» por naturalidad solemne y por «levantamiento» para sostener el alcance amplio de ἀνάστασιν sin cerrar la lectura en «resurrección». También he preservado la oposición verbal de ἀντιλεγόμενον mediante una formulación pasiva que mantenga la tensión documentada.'
  spanish_consistency_notes:
  - Se mantiene «María» en lugar de un equivalente eclesiástico tradicional más arcaico, por fidelidad al nombre propio.
  - Se evita «Señor» o sustituciones devocionales porque no aparecen en este verso.
  - «Y Simeón» refleja el enlace narrativo de καὶ sin añadir interpretación.
  - La puntuación conserva la cita directa y el ritmo solemne del oráculo.
  - La opción «contradicha» puede sonar menos corriente, pero se eligió para no perder la huella de la contradicción verbal presente en el griego y en el audit trail en inglés.
