translation:
  language: es
  text: Y su padre y su madre se maravillaban[a] de las cosas que se decían acerca de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «su padre». Esto se refiere a José en el sentido narrativo ordinario/legal; algunas traducciones leen «José y su madre» para evitar malentendidos a la luz del relato previo de la concepción virginal de Jesús.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ πατὴρ αὐτοῦ
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - José
  - su padre (en sentido legal/social)
  lexicon: BDAG
  rationale: El griego dice literalmente «su padre». En español, «su padre» conserva el wording del texto sin armonizarlo con José en el cuerpo principal. La nota explica el sentido social/legal documentado en la audición inglesa, preservando la tensión narrativa sin ocultarla.
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre
  lexicon: BDAG
  rationale: Correspondencia directa y natural de μήτηρ en esta construcción coordinada con «su padre».
- source_word: θαυμάζοντες
  english_pob_choice: were marveling
  chosen_spanish: se maravillaban
  alternatives_spanish:
  - estaban maravillados
  - se asombraban
  lexicon: BDAG
  rationale: El participio presente con ἦν expresa acción continua en pasado; «se maravillaban» conserva esa progresividad mejor que un perfecto simple y mantiene el matiz de asombro admirado.
- source_word: ἐπὶ τοῖς λαλουμένοις
  english_pob_choice: the things being said
  chosen_spanish: de las cosas que se decían
  alternatives_spanish:
  - de lo que se decía
  - por lo que se decía
  lexicon: BDAG
  rationale: La formulación inglesa «the things being said» refleja el plural participial. En español, «las cosas que se decían» conserva ese plural y el carácter pasivo/procesual de λαλουμένοις, sin forzar una construcción poco natural.
- source_word: περὶ αὐτοῦ
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - de él
  lexicon: BDAG
  rationale: «Acerca de él» es una equivalencia idiomática y clara para περί con genitivo en este contexto narrativo.
theological_decisions:
- issue: Referencia a «su padre» en un contexto compatible con la concepción virginal
  english_pob_reading: Translate the textual wording as 'his father' and preserve the christological nuance in documentation/footnote rather than altering the main text.
  chosen_spanish_reading: Traducir «su padre» en el texto principal y aclarar en la nota que se refiere a José en sentido narrativo ordinario/legal.
  alternative_spanish_readings:
  - José y su madre
  - su padre (es decir, José, en sentido legal/social)
  rationale: La prioridad es traducir lo que el griego dice, no resolver en el texto una tensión ya manejada por el contexto lucano. La nota mantiene la observación doctrinal y narrativa sin modificar el enunciado recibido.
  doctrine_reference: Ortodoxia nicena/calcedoniana; principio de primacía del texto fuente
- issue: Marcado del sujeto coordinado con artículo y posesivo implícito
  english_pob_reading: And his father and mother were marveling...
  chosen_spanish_reading: Y su padre y su madre se maravillaban...
  alternative_spanish_readings:
  - Y el padre y la madre se maravillaban...
  rationale: El posesivo «su» reproduce con naturalidad el referente compartido del griego y evita introducir una generalización impersonal que debilitaría la referencia familiar concreta.
  doctrine_reference: Consistencia referencial narrativa
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del audit trail inglés: se prefirió «las cosas que se decían» en lugar de una equivalencia más libre como «lo que se decía», para reflejar mejor el plural participial y el tono formal del registro.'
  spanish_consistency_notes:
  - Se mantuvo «su padre» en el cuerpo principal, con la aclaración correspondiente en nota, siguiendo la decisión auditada en inglés.
  - Se evitó «Cristo» o terminología eclesial no presente en el verso.
  - La construcción verbal en imperfecto («se maravillaban») conserva el aspecto progresivo del participio perifrástico griego.
  - «Acerca de él» mantiene un registro bíblico claro sin arcaísmo excesivo.
