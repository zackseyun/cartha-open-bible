translation:
  language: es
  text: Y vino en el Espíritu al templo[a]; y cuando los padres[b] llevaron al niño Jesús para cumplir por él lo acostumbrado de la ley,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el Espíritu». La expresión griega puede verterse de ambas maneras; «en el Espíritu» preserva mejor la formulación y el énfasis lucano en el Espíritu Santo en este contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «los padres». Lucas usa aquí el lenguaje familiar ordinario para María y José en su cuidado de Jesús.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - por el Espíritu
  - en espíritu
  lexicon: BDAG
  rationale: La expresión preposicional se conserva de manera cercana al griego y, en el contexto inmediato de Lucas 2:25–27, se entiende mejor como referencia al Espíritu Santo. «En el Espíritu» mantiene la formulación y la carga teológica sin explicar en exceso.
- source_word: ἱερόν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - atrio del templo
  - recinto del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo, no el santuario interior. «Templo» es la equivalencia natural y suficiente en español aquí.
- source_word: ἐν τῷ εἰσαγαγεῖν
  english_pob_choice: when ... brought in
  chosen_spanish: cuando ... llevaron
  alternatives_spanish:
  - al introducir
  - en el traer
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν tiene valor temporal. En español se expresa con naturalidad como «cuando ... llevaron», conservando la relación temporal sin rigidez sintáctica.
- source_word: γονεῖς
  english_pob_choice: the parents
  chosen_spanish: los padres
  alternatives_spanish:
  - sus padres
  - el padre y la madre
  lexicon: BDAG
  rationale: Se traduce de forma directa el plural con artículo. En el contexto narrativo, se refiere a María y José como padres humanos de Jesús en su cuidado cotidiano, sin añadir más de lo que dice el texto.
- source_word: παιδίον Ἰησοῦν
  english_pob_choice: the child Jesus
  chosen_spanish: al niño Jesús
  alternatives_spanish:
  - al pequeño Jesús
  - al niño, Jesús
  lexicon: BDAG
  rationale: παιδίον aquí significa un niño pequeño/infante. «Al niño Jesús» es natural en español y conserva la apposición.
- source_word: τοῦ ποιῆσαι αὐτοὺς
  english_pob_choice: to do for him
  chosen_spanish: para hacer por él
  alternatives_spanish:
  - para que hicieran por él
  - para cumplir para él
  lexicon: BDAG
  rationale: El infinitivo articular indica propósito. En español, la estructura más natural es «para hacer por él», que refleja la acción emprendida por los padres respecto de Jesús.
- source_word: κατὰ τὸ εἰθισμένον τοῦ νόμου
  english_pob_choice: according to the custom of the law
  chosen_spanish: conforme a la costumbre de la ley
  alternatives_spanish:
  - según la costumbre de la ley
  - de acuerdo con lo acostumbrado por la ley
  lexicon: BDAG
  rationale: εἰθισμένον señala lo acostumbrado o prescrito por costumbre. «Conforme a la costumbre de la ley» reproduce bien la relación entre costumbre y norma legal en un español claro.
- source_word: περὶ αὐτοῦ
  english_pob_choice: for him
  chosen_spanish: por él
  alternatives_spanish:
  - acerca de él
  - con respecto a él
  lexicon: BDAG
  rationale: περί con genitivo expresa referencia o relación. En este contexto ritual, «por él» es idiomático en español y comunica que el cumplimiento de la ley se hace en relación con Jesús.
theological_decisions:
- issue: Referencia de «el Espíritu» en la acción de Simeón
  english_pob_reading: Holy Spirit
  chosen_spanish_reading: Espíritu Santo
  alternative_spanish_readings:
  - espíritu de Simeón
  - su propio espíritu
  rationale: El contexto inmediato de Lucas 2:25–27 acumula referencias al Espíritu Santo; por eso la capitalización en español es la lectura más sólida. Mantener «en el Espíritu» permite reconocer la formulación griega y la referencia pneumatológica.
  doctrine_reference: Afirmaciones; Filosofía de traducción §3
- issue: Uso de «los padres» para María y José
  english_pob_reading: Translate γονεῖς straightforwardly as 'the parents'
  chosen_spanish_reading: los padres
  alternative_spanish_readings:
  - los guardianes
  - José y María
  rationale: Se conserva la descripción social ordinaria del texto sin debilitarla ni ampliarla. Esta redacción no niega la concepción virginal; simplemente refleja la forma narrativa de Lucas.
  doctrine_reference: Afirmaciones; Filosofía de traducción §1 y §3
translation_notes:
  revision_awareness: 'La presente propuesta coincide con la última pasada de revisión: no se registraron cambios aplicados y el estado más reciente fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula cuando el contexto remite al Espíritu Santo.
  - Se conserva «templo» para ἱερόν, sin especificar «atrio» porque el griego no lo exige.
  - «Los padres» se usa de manera directa y consistente con el tono narrativo de Lucas.
  - La sintaxis española prioriza claridad natural sin perder la relación temporal y de propósito del griego.
