translation:
  language: es
  text: Y cuando tenía doce años[a], mientras ellos subían conforme a la costumbre de la fiesta[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cumplió doce años». El griego usa una expresión idiomática de edad que puede verterse de manera más literal o más natural en español.
    reason: lexical_alternative
  - marker: b
    text: Es decir, la fiesta de la Pascua, según se indicó en el versículo anterior.
    reason: cross_reference
lexical_decisions:
- source_word: ἐγένετο ἐτῶν δώδεκα
  english_pob_choice: he was twelve years old
  chosen_spanish: cumplió doce años
  alternatives_spanish:
  - tenía doce años
  - era de doce años
  lexicon: BDAG
  rationale: La expresión griega γίνομαι + genitivo de edad indica llegar a una edad determinada. En español, «cumplió doce años» comunica con naturalidad ese cambio de estado, sin perder el valor idiomático del original.
- source_word: ἀναβαινόντων
  english_pob_choice: were going up
  chosen_spanish: subían
  alternatives_spanish:
  - iban subiendo
  - estaban subiendo
  - subieron
  lexicon: BDAG
  rationale: El participio presente expresa acción concomitante y en desarrollo. «Subían» preserva bien ese sentido continuo y el valor narrativo de ascenso, sin añadir destino explícito que el versículo no repite.
- source_word: αὐτῶν
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - sus padres
  - todos ellos
  lexicon: BDAG
  rationale: El pronombre genitivo remite al grupo familiar en el contexto inmediato. «Ellos» mantiene la referencia sin sobreespecificar más allá del texto griego.
- source_word: κατὰ τὸ ἔθος
  english_pob_choice: according to the custom
  chosen_spanish: conforme a la costumbre
  alternatives_spanish:
  - según la costumbre
  - de acuerdo con la costumbre
  lexicon: BDAG
  rationale: La frase expresa conformidad con una práctica establecida. «Conforme a la costumbre» es claro en español y conserva la relación normativa del original.
- source_word: τῆς ἑορτῆς
  english_pob_choice: of the feast
  chosen_spanish: de la fiesta
  alternatives_spanish:
  - de la celebración
  - de la fiesta solemne
  lexicon: BDAG
  rationale: ἑορτή designa una fiesta religiosa. «Fiesta» es natural y fiel en español; el contexto inmediato ya identifica la Pascua, por lo que no hace falta explicitarla en el texto principal.
- source_word: καὶ ὅτε
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Cuando
  - Ahora bien, cuando
  lexicon: BDAG
  rationale: La conjunción καί enlaza la narración y ὅτε introduce la cláusula temporal. «Y cuando» conserva ambos matices de forma breve y clara.
theological_decisions:
- issue: Referencia implícita a la Pascua en «la fiesta»
  english_pob_reading: That is, the Passover feast, as stated in the previous verse.
  chosen_spanish_reading: «La fiesta» se deja sin explicitar en el texto principal, pero remite a la Pascua mencionada en el versículo anterior.
  alternative_spanish_readings:
  - la Pascua
  - la fiesta de la Pascua
  - la festividad
  rationale: El griego de este versículo no repite Πάσχα, pero el contexto inmediato lo identifica. Mantener «la fiesta» respeta el texto presente y conserva la referencia contextual ya establecida.
  doctrine_reference: Lucas 2:41-42; referencia contextual inmediata
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el audit trail inglés. No se introdujeron añadidos como «a Jerusalén» porque el versículo no lo dice explícitamente; se conservó el sentido continuo del participio presente con «subían».
  spanish_consistency_notes:
  - Se prefirió «Yahvé» cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió «fiesta» para ἑορτή, consistente con un contexto pascual y con el registro bíblico natural en español.
  - Se mantuvo el imperfecto «subían» para reflejar el aspecto progresivo del participio griego.
  - No se añadió el destino de la subida en el cuerpo del texto, siguiendo la reserva del original.
