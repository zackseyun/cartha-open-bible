translation:
  language: es
  text: Y todos iban a inscribirse[a], cada uno a su propia ciudad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser inscritos» / «registrarse». El verbo se refiere a una inscripción oficial relacionada con el censo.
    reason: lexical_alternative
  - marker: b
    text: 'O «cada uno a su ciudad». El griego usa singular masculino: «cada uno a su propia ciudad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύοντο
  english_pob_choice: was going
  chosen_spanish: iban
  alternatives_spanish:
  - fueron
  - estaban yendo
  - se dirigían
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso o habitual; «iban» conserva bien ese aspecto imperfectivo en español natural y claro.
- source_word: πάντες
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno
  - la gente
  lexicon: BDAG
  rationale: «Todos» mantiene el sentido distributivo del plural sin añadir un sustantivo que no está en el griego.
- source_word: ἀπογράφεσθαι
  english_pob_choice: to be registered
  chosen_spanish: inscribirse
  alternatives_spanish:
  - registrarse
  - ser inscritos
  - empadronarse
  lexicon: BDAG
  rationale: En este contexto de censo, el verbo alude a una inscripción oficial. «Inscribirse» comunica la acción de manera clara y digna en español; «registrarse» también sería posible, pero «inscribirse» suena más cercano al acto administrativo aquí implicado.
- source_word: ἕκαστος
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - cada persona
  - uno por uno
  lexicon: BDAG
  rationale: «Cada uno» expresa el valor distributivo de ἕκαστος con naturalidad y sin perder la referencia individual.
- source_word: ἑαυτοῦ
  english_pob_choice: his own
  chosen_spanish: su propia
  alternatives_spanish:
  - de él mismo
  - de cada uno
  - su
  lexicon: BDAG
  rationale: El griego usa un singular masculino; en español, «su propia» mantiene el referente singular sin forzar una forma marcadamente masculina que resultaría pesada en la frase. La relación distributiva ya queda preservada por «cada uno».
- source_word: πόλιν
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - pueblo
  - villa
  lexicon: BDAG
  rationale: «Ciudad» es la equivalencia estándar de πόλις y encaja con el marco administrativo del relato.
theological_decisions:
- issue: Expresión distributiva singular en ἕκαστος ... ἑαυτοῦ
  english_pob_reading: Retain singular masculine sense in English as 'each to his own city'
  chosen_spanish_reading: Conservar la distribución individual con «cada uno ... su propia ciudad» sin masculinizar innecesariamente el posesivo.
  alternative_spanish_readings:
  - cada uno a su ciudad
  - cada uno a la ciudad de él
  - cada cual a su propia ciudad
  rationale: El griego es singular masculino gramatical, pero el español puede conservar la individualidad distributiva de forma idiomática. «Su propia» evita una ambigüedad de referencia y mantiene el sentido sin añadir un tono ajeno al español bíblico moderno.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete griego y el audit trail inglés. Se conservó el valor imperfectivo de ἐπορεύοντο con «iban», y se mantuvo la distribución individual de πάντες + ἕκαστος. No hay revisiones previas aplicadas en el expediente, y la redacción española busca una equivalencia óptima, legible y auditable.
  spanish_consistency_notes:
  - Se usó «inscribirse» para ἀπογράφεσθαι en línea con el contexto de censo, evitando una paráfrasis más amplia como «hacer un censo».
  - Se eligió «cada uno» para ἕκαστος, preservando la distribución individual.
  - Se evitó «SEÑOR» u otras convenciones no presentes en el texto; este versículo no contiene el tetragrámaton ni títulos cristológicos.
  - «Ciudad» se mantuvo por fidelidad a πόλις y por coherencia con el relato administrativo.
