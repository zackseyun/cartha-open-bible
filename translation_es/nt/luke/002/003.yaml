  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: imperfecto narrativo («iban»), totalidad distributiva («todos»), propósito de registro censal («a inscribirse») y destino individual («cada uno ... ciudad»). Sin embargo, el aparato de notas no preserva fielmente la auditoría inglesa: la nota sobre el verbo debe reflejar mejor «to be registered / to enroll / to be enrolled», y la nota b está mal anclada y no ofrece una alternativa real, pues repite el texto principal en vez de señalar la opción española correspondiente al matiz de género/número.'
  spanish_quality_summary: La frase principal es natural y legible en español moderno y digno. «Y todos iban a inscribirse, cada uno a su propia ciudad» suena bien y conserva el flujo narrativo. No obstante, la colocación de las notas debe corregirse para que cada una ancle al elemento relevante, y la redacción de la nota de género debe ser más clara y útil para el lector en español.
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos en este versículo. «Inscribirse» para ἀπογράφεσθαι es aceptable en contexto censal; «ciudad» para πόλιν está bien. La decisión distributiva con «cada uno ... su propia ciudad» es compatible con la racionalidad documentada, aunque conviene explicarla correctamente en nota.
  issues:
  - severity: medium
    issue: La nota b no preserva la alternativa documentada del inglés
    rationale: El inglés ofrece como alternativa «each to their own city» frente al texto principal «each to his own city». En español, la nota actual repite «cada uno a su propia ciudad», o sea el mismo texto principal, y por eso no aporta una alternativa real ni explica con precisión la decisión de género/número.
  - severity: medium
    issue: La nota a mezcla voces no paralelas y omite la equivalencia principal pasiva
    rationale: La auditoría inglesa distingue «to be registered» con alternativas «to enroll / to be enrolled». En español, «registrarse» es reflexivo y «ser inscritos» es pasiva plural; conviene formular la nota de modo más claro y más cercano al valor administrativo del griego.
  - severity: low
    issue: El anclaje de las notas puede mejorar
    rationale: La nota sobre el verbo debe anclarse a «inscribirse», y la nota sobre la construcción distributiva debe anclarse a «cada uno» o a la frase final, no quedar como duplicación poco informativa.
  revised_spanish_text: Y todos iban a inscribirse[a], cada uno a su propia ciudad[b].
