translation:
  language: es
  text: para registrarse con María[a], que estaba comprometida en matrimonio con él y estaba embarazada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desposada con él». El griego denota un desposorio formal, un vínculo legal y social más fuerte que un compromiso moderno.
    reason: lexical_alternative
  - marker: b
    text: O «encinta».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπογράψασθαι
  english_pob_choice: to register
  chosen_spanish: registrarse
  alternatives_spanish:
  - inscribirse
  - ser registrado
  lexicon: BDAG
  rationale: El infinitivo aoristo medio expresa aquí el propósito del viaje de José en el contexto del censo. «Registrarse» comunica de forma natural el sentido administrativo de ἀπογράφω sin convertir innecesariamente la construcción en pasiva.
- source_word: σὺν
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: BDAG
  rationale: La preposición de acompañamiento se rinde normalmente por «con». «Junto con» también es posible, pero «con» es más directo y natural en español bíblico contemporáneo.
- source_word: Μαριὰμ
  english_pob_choice: Mary
  chosen_spanish: María
  alternatives_spanish:
  - Mariam
  lexicon: convención onomástica
  rationale: Se usa la forma española establecida del nombre propio. La forma griega conserva la referencia a la misma persona sin requerir transliteración inusual en español.
- source_word: ἐμνηστευμένῃ αὐτῷ
  english_pob_choice: who was betrothed to him
  chosen_spanish: que estaba desposada con él
  alternatives_spanish:
  - que estaba comprometida con él
  - su desposada
  lexicon: BDAG
  rationale: «Desposada» preserva mejor que «comprometida» la fuerza legal y social formal de μνηστεύομαι en el mundo judío del primer siglo. Se mantiene explícito «con él» para reflejar αὐτῷ.
- source_word: οὔσῃ ἐγκύῳ
  english_pob_choice: and was pregnant
  chosen_spanish: y estaba encinta
  alternatives_spanish:
  - y estaba embarazada
  - y estaba con hijo
  lexicon: BDAG
  rationale: «Encinta» es una opción natural, digna y fiel al estado descrito. También conserva la posibilidad de la nota alternativa «con child / con hijo» sin forzar un registro médico moderno.
theological_decisions:
- issue: Cómo expresar el estado nupcial de María respecto de José
  english_pob_reading: betrothed to him
  chosen_spanish_reading: desposada con él
  alternative_spanish_readings:
  - comprometida con él
  - su esposa
  rationale: El griego usa μνηστεύομαι, que señala un vínculo formal previo al matrimonio consumado. «Desposada» evita rebajar la relación a una simple noviazgo moderno y también evita afirmar que ya era esposa, cosa que el texto no dice.
  doctrine_reference: Principio de primacía del original; preservar el alcance histórico-social del término sin ampliarlo.
- issue: Cómo traducir el estado de gravidez
  english_pob_reading: was pregnant
  chosen_spanish_reading: estaba encinta
  alternative_spanish_readings:
  - estaba embarazada
  - estaba con hijo
  rationale: «Encinta» traduce de manera sobria y fiel ἐγκύῳ, sin introducir matices médicos ajenos al texto. La alternativa «embarazada» es válida en español, pero «encinta» conserva mejor el tono bíblico y literario.
  doctrine_reference: Claridad semántica sin sobreinterpretación.
translation_notes:
  revision_awareness: 'Concordante con el audit trail inglés: se mantiene el sentido administrativo de ἀπογράψασθαι, la preposición de acompañamiento σὺν, el nombre propio María, la formalidad de μνηστευμένῃ αὐτῷ y el estado de embarazo de οὔσῃ ἐγκύῳ. No se detectan revisiones textuales en el pasaje fuente.'
  spanish_consistency_notes:
  - Se prefirió «desposada» sobre «comprometida» para preservar la fuerza jurídico-social del desposorio antiguo.
  - Se prefirió «encinta» por registro bíblico y equivalencia natural en español, aunque «embarazada» sigue siendo una alternativa válida.
  - La nota [a] se ancla en «desposada» porque allí está la alternativa lexical relevante.
  - La nota [b] se ancla en «encinta» para reflejar la variante expresiva equivalente.
