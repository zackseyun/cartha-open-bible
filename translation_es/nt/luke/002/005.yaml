- from: para registrarse con María[a], que estaba desposada con él y estaba encinta[b].
  to: para registrarse con María[a], que estaba comprometida en matrimonio con él y estaba embarazada[b].
  rationale: La revisión conserva plenamente el sentido del griego y de la auditoría inglesa, pero mejora la legibilidad panhispánica y la naturalidad. «Comprometida en matrimonio con él» comunica mejor en español actual la fuerza de μνηστεύομαι sin rebajarla a un noviazgo moderno ni subirla a «esposa». «Embarazada» es más clara y ampliamente natural que «encinta» en el cuerpo del texto, mientras que la nota retiene la alternativa más tradicional. Se corrige también la nota no idiomática «con hijo».
