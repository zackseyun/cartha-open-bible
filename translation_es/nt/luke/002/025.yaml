translation:
  language: es
  text: Y he aquí[a], había en Jerusalén un hombre llamado Simeón, y este hombre era justo y piadoso, esperando la consolación de Israel[b], y el Espíritu Santo[c] estaba sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira». Aquí se conserva una fórmula de introducción narrativa enfática.
    reason: lexical_alternative
  - marker: b
    text: O «el consuelo de Israel». La expresión apunta al consuelo y la restauración divinos esperados para Israel.
    reason: lexical_alternative
  - marker: c
    text: O posiblemente «un espíritu santo estaba sobre él», aunque en el contexto de Lucas esto se refiere más naturalmente al Espíritu Santo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - mira
  lexicon: BDAG
  rationale: «He aquí» conserva el marcador discursivo de introducción vívida que Luke usa para llamar la atención sobre la escena, sin caer en una calca impropia del español moderno.
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: BDAG
  rationale: El referente es Simeón, un individuo masculino; por eso se mantiene «un hombre» y no se neutraliza a «persona».
- source_word: ᾧ ὄνομα Συμεών
  english_pob_choice: whose name was Simeon
  chosen_spanish: llamado Simeón
  alternatives_spanish:
  - de nombre Simeón
  - cuyo nombre era Simeón
  lexicon: BDAG
  rationale: La construcción se vierte de forma natural en español como identificación nominal. «Llamado Simeón» preserva el valor identificador sin forzar una estructura más pesada.
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  lexicon: BDAG
  rationale: «Justo» reproduce bien el sentido moral y relacional del adjetivo. En español bíblico, además, comunica el matiz de rectitud sin sonar tan técnico como otras opciones.
- source_word: εὐλαβής
  english_pob_choice: devout
  chosen_spanish: piadoso
  alternatives_spanish:
  - devoto
  - reverente
  lexicon: BDAG
  rationale: «Piadoso» expresa de manera natural la devoción reverente hacia Dios. Aunque «devoto» también es posible, «piadoso» encaja mejor con el tono bíblico español y evita una connotación excesivamente afectiva.
- source_word: προσδεχόμενος
  english_pob_choice: waiting for
  chosen_spanish: esperando
  alternatives_spanish:
  - aguardando
  - en espera de
  lexicon: BDAG
  rationale: El participio expresa una expectativa sostenida. «Esperando» es claro y mantiene la postura continua de Simeón sin añadir énfasis interpretativo.
- source_word: παράκλησιν τοῦ Ἰσραήλ
  english_pob_choice: the consolation of Israel
  chosen_spanish: la consolación de Israel
  alternatives_spanish:
  - el consuelo de Israel
  lexicon: BDAG
  rationale: Se conserva «consolación» para mantener el eco bíblico e Isaías-resonante que el inglés POB preservó. «Consuelo» es posible, pero suena menos literario y menos fijo en este contexto.
- source_word: πνεῦμα ἦν ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - un espíritu santo
  - espíritu santo
  lexicon: BDAG
  rationale: En Lucas-Hechos, este giro normalmente designa al Espíritu Santo personal; por eso se traduce con mayúsculas y artículo definido según el uso español teológico estándar.
- source_word: ἐπ’ αὐτόν
  english_pob_choice: was upon him
  chosen_spanish: estaba sobre él
  alternatives_spanish:
  - reposaba sobre él
  - venía sobre él
  lexicon: BDAG
  rationale: «Estaba sobre él» conserva el modismo bíblico del griego y del texto inglés. «Reposaba» sería interpretativo; «sobre él» mantiene la imagen de presencia y poder sin ampliar el sentido.
theological_decisions:
- issue: Referente de πνεῦμα ἦν ἅγιον ἐπ’ αὐτόν
  english_pob_reading: the Holy Spirit was upon him
  chosen_spanish_reading: el Espíritu Santo estaba sobre él
  alternative_spanish_readings:
  - un espíritu santo estaba sobre él
  rationale: El contexto inmediato de Lucas y el uso lucano favorecen entender la expresión como el Espíritu Santo personal. La traducción mantiene esa lectura sin ocultar la posibilidad gramatical alternativa en nota.
  doctrine_reference: Luke 2:26–27; POB translation philosophy §3
- issue: Tensión lexical de παράκλησις
  english_pob_reading: the consolation of Israel
  chosen_spanish_reading: la consolación de Israel
  alternative_spanish_readings:
  - el consuelo de Israel
  rationale: Se preserva el término más cargado bíblicamente para no borrar el eco de restauración y alivio divino esperado para Israel. La nota deja abierta la alternativa semántica sin reducirla a una sola glosa.
  doctrine_reference: Isaías 40:1; 49:13; Luke 2:25
translation_notes:
  revision_awareness: 'El texto inglés auditado quedó sin cambios en la última revisión, con acuerdo alto entre revisores. La versión española sigue esa estabilidad: conserva las decisiones léxicas principales de la POB inglesa, especialmente «he aquí», «consolación de Israel» y la referencia personal al Espíritu Santo, sin introducir paráfrasis nuevas.'
  spanish_consistency_notes:
  - Se mantiene «Espíritu Santo» con mayúsculas por tratarse del referente personal en Lucas.
  - Se usa «consolación» en lugar de «consuelo» para conservar la resonancia bíblica del sintagma.
  - «Justo» y «piadoso» forman una pareja natural en español y corresponden a δίκαιος y εὐλαβής sin sobreinterpretación.
  - La puntuación con punto y coma refleja bien la estructura coordinada del griego y la cadencia de la frase en español.
