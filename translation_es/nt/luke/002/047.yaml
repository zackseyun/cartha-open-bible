translation:
  language: es
  text: Y todos los que lo oían se admiraban[a] de su entendimiento y de sus respuestas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Se admiraban» conserva el fuerte asombro del verbo griego; también puede entenderse como «se asombraban».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξίσταντο
  english_pob_choice: were astonished
  chosen_spanish: se admiraban
  alternatives_spanish:
  - se asombraban
  - quedaban atónitos
  lexicon: BDAG
  rationale: El verbo griego expresa una reacción intensa y sostenida de sorpresa o asombro. En español, «se admiraban» comunica bien esa reacción sin sonar demasiado coloquial ni forzar un giro extrañeño.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ funciona como enlace suave. «Y» conserva la continuidad narrativa de forma natural en español.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno
  lexicon: BDAG
  rationale: 'El participio con πάντες expresa un conjunto total: «todos» mantiene ese alcance colectivo de manera idiomática.'
- source_word: οἱ ἀκούοντες αὐτοῦ
  english_pob_choice: who heard him
  chosen_spanish: los que lo oían
  alternatives_spanish:
  - los que lo escuchaban
  - quienes lo oían
  lexicon: BDAG
  rationale: El participio presente describe a quienes estaban en la acción de oírlo. «Los que lo oían» refleja ese estado/proceso de manera natural y evita volverlo demasiado puntual.
- source_word: ἐπὶ τῇ συνέσει
  english_pob_choice: at his understanding
  chosen_spanish: de su entendimiento
  alternatives_spanish:
  - por su entendimiento
  - a causa de su entendimiento
  lexicon: BDAG
  rationale: En este contexto ἐπί con dativo marca la base u ocasión de la admiración. En español, la preposición más fluida es «de» con un verbo como «admirarse», que enmarca el motivo de la reacción.
- source_word: σύνεσις
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - comprensión
  - discernimiento
  lexicon: BDAG
  rationale: σύνεσις alude a comprensión, discernimiento o entendimiento. «Entendimiento» es claro, digno y suficientemente amplio para el contexto.
- source_word: ταῖς ἀποκρίσεσιν
  english_pob_choice: his answers
  chosen_spanish: sus respuestas
  alternatives_spanish:
  - sus respuestas dadas
  - sus réplicas
  lexicon: BDAG
  rationale: ἀπόκρισις significa respuesta o contestación. «Respuestas» es la opción más natural en español y conserva el paralelo con «entendimiento».
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su / sus
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El genitivo pronominal se refiere a Jesús. En español, el posesivo «su/sus» es la forma más natural y clara en ambos miembros de la frase.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el packet griego y el rastro auditado en inglés: δέ se vierte con una conjunción suave; ἐξίσταντο se conserva como reacción intensa; σύνεσις y ἀποκρίσεις se mantienen en un registro claro y común en español.'
  spanish_consistency_notes:
  - Se evitó «Cristo» o terminología cristológica ajena porque el versículo solo describe la reacción de los oyentes.
  - Se mantuvo «lo» para αὐτοῦ en referencia a Jesús, con un español natural y sin ambigüedad contextual.
  - La relación causal/base expresada por ἐπί se resolvió idiomáticamente con «de» en vez de una preposición más rígida.
