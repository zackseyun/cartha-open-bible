translation:
  language: es
  text: Y sus padres iban cada año a Jerusalén para la fiesta de la Pascua.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπορεύοντο
  english_pob_choice: went
  chosen_spanish: iban
  alternatives_spanish:
  - fueron
  - viajaban
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción habitual en el pasado. En español, el imperfecto «iban» comunica bien la repetición anual sin perder la naturalidad narrativa. «Fueron» sonaría puntual, y «viajaban» es posible pero menos directo aquí.
- source_word: γονεῖς
  english_pob_choice: parents
  chosen_spanish: padres
  alternatives_spanish:
  - progenitores
  - padre y madre
  lexicon: BDAG
  rationale: El plural nominal significa de forma simple «padres». En español, «padres» es la equivalencia natural y transparente; evita añadir una formulación más explicativa que el griego no exige.
- source_word: κατ’ ἔτος
  english_pob_choice: year by year
  chosen_spanish: cada año
  alternatives_spanish:
  - año tras año
  - anualmente
  lexicon: BDAG
  rationale: La expresión indica repetición anual. «Cada año» transmite con claridad el valor distributivo en español actual. «Año tras año» también es posible, pero suena más idiomático en tono enfático que como simple dato narrativo.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: nombre propio
  rationale: Se conserva el nombre propio en su forma estándar en español, «Jerusalén».
- source_word: τῇ ἑορτῇ
  english_pob_choice: for the Feast
  chosen_spanish: para la fiesta
  alternatives_spanish:
  - a la fiesta
  - en la fiesta
  lexicon: BDAG
  rationale: El contexto de viaje señala finalidad u ocasión. «Para la fiesta» comunica bien esa relación en español sin forzar un calco como «a la fiesta», que puede sonar menos natural.
- source_word: τοῦ πάσχα
  english_pob_choice: of the Passover
  chosen_spanish: de la Pascua
  alternatives_spanish:
  - de la Pascua judía
  - de la Pascua
  lexicon: BDAG
  rationale: πάσχα designa la Pascua judía. En español, «Pascua» es la forma establecida y suficiente en este contexto; el artículo del original queda reflejado naturalmente en la construcción nominal.
theological_decisions:
- issue: Referencia familiar ordinaria a Jesús
  english_pob_reading: his parents
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - su padre y su madre
  rationale: El griego presenta una referencia familiar ordinaria. «Sus padres» preserva ese sentido sin introducir una formulación más interpretativa. No resuelve ni altera la tensión doctrinal del nacimiento virginal afirmado en el conjunto lucano; simplemente mantiene el enunciado narrativo.
  doctrine_reference: Afirmaciones; preservar la tensión teológica sin resolverla artificialmente
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y sin notas previas; por eso la propuesta española sigue de cerca la estructura semántica del original, con ajustes de naturalidad propios del español.
  spanish_consistency_notes:
  - Se usa «Jerusalén» como topónimo estándar en español.
  - Se usa «Pascua» para πάσχα, conforme al sentido festivo judío del contexto.
  - Se conserva el imperfecto narrativo con «iban» para expresar costumbre repetida.
  - No se introduce mayúscula en «fiesta» porque aquí funciona como nombre común del festival.
