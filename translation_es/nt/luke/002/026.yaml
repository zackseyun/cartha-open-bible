translation:
  language: es
  text: Y le había sido revelado por el Espíritu Santo que no vería la muerte antes de haber visto al Mesías del Señor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «al Cristo del Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: κεχρηματισμένον
  english_pob_choice: had been revealed
  chosen_spanish: le había sido revelado
  alternatives_spanish:
  - había recibido una revelación
  - le había sido comunicado divinamente
  - le había sido advertido
  lexicon: BDAG
  rationale: El pasivo de χρηματίζω aquí expresa que Simeón recibió una comunicación divina. La forma impersonal en español (“le había sido revelado”) conserva el valor pasivo y suena natural sin debilitar el origen divino.
- source_word: ὑπὸ τοῦ πνεύματος τοῦ ἁγίου
  english_pob_choice: by the Holy Spirit
  chosen_spanish: por el Espíritu Santo
  alternatives_spanish:
  - del Espíritu Santo
  - a través del Espíritu Santo
  lexicon: BDAG
  rationale: ὑπό con genitivo indica agente personal. “Por el Espíritu Santo” refleja bien esa agencia y mantiene la referencia personal al Espíritu.
- source_word: μὴ ἰδεῖν θάνατον
  english_pob_choice: would not see death
  chosen_spanish: no vería la muerte
  alternatives_spanish:
  - no moriría
  - no probaría la muerte
  lexicon: BDAG
  rationale: La construcción griega conserva la imagen de “ver la muerte”. En español, “no vería la muerte” mantiene el giro idiomático con suficiente naturalidad y evita reducirlo a una paráfrasis más interpretativa.
- source_word: πρὶν ⸂ἢ ἂν⸃ ἴδῃ
  english_pob_choice: before he had seen
  chosen_spanish: antes de haber visto
  alternatives_spanish:
  - antes de que viera
  - hasta que hubiera visto
  lexicon: BDAG
  rationale: La relación temporal expresa una anterioridad condicionada respecto de la cláusula principal. “Antes de haber visto” comunica esa secuencia de modo claro y sobrio en español.
- source_word: τὸν χριστὸν κυρίου
  english_pob_choice: the Lord’s Messiah
  chosen_spanish: al Mesías del Señor
  alternatives_spanish:
  - al Cristo del Señor
  - al Cristo del Señor[a]
  - al Ungido del Señor
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título mesiánico, por lo que se traduce como “Mesías” según la terminología POB. El genitivo κυρίου se conserva como relación posesiva (“del Señor”).
- source_word: κυρίου
  english_pob_choice: Lord’s
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - de Dios
  lexicon: BDAG
  rationale: En este contexto, κύριος conserva el sentido de “Señor” como título divino en una fórmula mesiánica reconocible. “Del Señor” es la forma más natural en español y preserva la relación del Mesías con el Señor.
theological_decisions:
- issue: Cómo renderizar Χριστός en un título mesiánico
  english_pob_reading: Messiah rather than Christ in the main text; traditional Christ preserved in note
  chosen_spanish_reading: Mesías en el texto principal; “Cristo” queda como alternativa en nota
  alternative_spanish_readings:
  - Cristo
  - Ungido
  rationale: En τὸν χριστὸν κυρίου, Χριστός es un título, no un nombre propio. La política POB favorece “Mesías” para conservar el contexto hebraico y mesiánico; se documenta “Cristo” como alternativa tradicional sin imponerla en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah (where title; Christ where name-like)'''
- issue: Agencia del Espíritu Santo en la revelación
  english_pob_reading: by the Holy Spirit
  chosen_spanish_reading: por el Espíritu Santo
  alternative_spanish_readings:
  - del Espíritu Santo
  - a través del Espíritu Santo
  rationale: El griego atribuye la comunicación a una agencia personal del Espíritu, no a una mera inspiración impersonal. La traducción mantiene esa agencia explícita.
  doctrine_reference: Uso gramatical de ὑπό con genitivo para agente personal
translation_notes:
  revision_awareness: 'La base inglesa pasó por una revisión que alternó entre “Lord’s Messiah” y “Lord’s Christ”, con corrección final de vuelta a “Messiah” por coherencia doctrinal y terminológica. La versión española sigue esa decisión final: conserva el título mesiánico como “Mesías” y no adopta “Cristo” en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de κύριος como “Señor” en un contexto mesiánico, sin sustituirlo por una máscara tipográfica.
  - La construcción temporal “antes de haber visto” refleja bien la secuencia previa al evento principal.
  - El orden y la sintaxis buscan ser fieles al griego sin sonar calcados en español.
  - No se introduce una lectura teológica adicional sobre la naturaleza de la revelación más allá de lo que el pasivo griego y el agente explícito permiten.
