    issue: La frase «antes de haber visto» es un poco más pesada que «antes de ver» o «antes de que viera».
    rationale: No constituye error de fidelidad ni de estilo grave; de hecho, expresa bien la anterioridad completiva que el inglés auditado quiso resaltar. Se puede aprobar sin cambio.
