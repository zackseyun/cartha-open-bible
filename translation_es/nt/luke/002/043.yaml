translation:
  language: es
  text: Y cuando hubieron terminado los días, al regresar ellos, Jesús el muchacho permaneció[a] en Jerusalén[b], y sus padres no lo supieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se quedó atrás».
    reason: lexical_alternative
  - marker: b
    text: El griego dice «sus padres»; el lenguaje familiar ordinario de Lucas aquí no niega la concepción virginal afirmada antes en el Evangelio.
    reason: cross_reference
lexical_decisions:
- source_word: τελειωσάντων τὰς ἡμέρας
  english_pob_choice: when they had completed the days
  chosen_spanish: cuando hubieron terminado los días
  alternatives_spanish:
  - cuando terminaron los días
  - después de haber terminado los días
  lexicon: BDAG
  rationale: El participio genitivo absoluto indica una circunstancia ya concluida antes de la acción principal. En español, «hubieron terminado» conserva bien la anterioridad y suena natural en registro narrativo. «Terminar los días» mantiene la referencia a los días festivos sin añadir detalles no presentes en el griego.
- source_word: ἐν τῷ ὑποστρέφειν αὐτοὺς
  english_pob_choice: as they were returning
  chosen_spanish: al regresar ellos
  alternatives_spanish:
  - mientras regresaban
  - cuando regresaban
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa contemporaneidad. «Al regresar ellos» comunica esa simultaneidad de forma fluida en español, sin forzar un calco pesado.
- source_word: ὑπέμεινεν
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - se quedó atrás
  lexicon: BDAG
  rationale: En este contexto ὑπομένω significa quedarse o permanecer en un lugar. «Permaneció» mantiene el sentido narrativo formal. «Se quedó atrás» es una alternativa contextual que resalta el matiz de quedarse separado del grupo.
- source_word: ὁ παῖς
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: BDAG
  rationale: παῖς puede significar niño, muchacho o joven según el contexto. Como Jesús tiene doce años en el pasaje inmediato, «el muchacho» es una opción natural y precisa en español, evitando una infantilización excesiva.
- source_word: ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: BDAG
  rationale: Uso locativo estándar de ἐν con nombre de lugar.
- source_word: οὐκ ἔγνωσαν
  english_pob_choice: did not know it
  chosen_spanish: no lo supieron
  alternatives_spanish:
  - no se dieron cuenta
  - no lo advirtieron
  lexicon: BDAG
  rationale: Aquí γινώσκω indica llegar a saber o percatarse de un hecho. En español, «no lo supieron» refleja que no llegaron a saber que Jesús se había quedado. Conserva la referencia implícita al hecho sin añadir una glosa explícita en el texto principal.
- source_word: οἱ γονεῖς αὐτοῦ
  english_pob_choice: his parents
  chosen_spanish: sus padres
  alternatives_spanish:
  - su padre y su madre
  lexicon: BDAG
  rationale: γονεῖς significa directamente «padres». La traducción mantiene el lenguaje familiar ordinario de Lucas. «Su padre y su madre» es una expansión posible, pero no necesaria para el texto principal.
theological_decisions:
- issue: Referencia a María y José como γονεῖς de Jesús
  english_pob_reading: his parents
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - su padre y su madre
  rationale: El griego usa el lenguaje ordinario de familia desde la perspectiva narrativa. Traducir «sus padres» reproduce fielmente la forma del texto y preserva la tensión con la concepción virginal afirmada en otros lugares de Lucas, sin intentar armonizarla en la traducción.
  doctrine_reference: Affirmations; preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: Revisado con el pasaje griego SBLGNT y el audit trail en inglés. No se detectaron revisiones posteriores que alteren las decisiones léxicas principales; la versión actual mantiene la equivalencia óptima y conserva la tensión narrativa-teológica del texto.
  spanish_consistency_notes:
  - Se conserva «Jesús» como forma estable del nombre propio.
  - Se traduce παῖς como «muchacho» para mantener el matiz de edad sin perder naturalidad.
  - Se evita el calco rígido de la estructura griega cuando el español exige una colocación más fluida, pero sin ampliar el sentido.
  - Se mantiene «sus padres» como equivalente directo de γονεῖς y se explicita la nota doctrinal en lugar de suavizar el texto principal.
