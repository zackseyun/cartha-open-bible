translation:
  language: es
  text: Ahora despides a tu esclavo[a], Maestro, conforme a tu palabra[b], en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu siervo». El griego δοῦλος puede significar «esclavo» o «siervo»; se usa «esclavo» aquí porque el vocativo «Maestro» hace especialmente explícita la relación de autoridad y pertenencia.
    reason: lexical_alternative
  - marker: b
    text: El sentido es que Simeón está listo para partir de esta vida en paz, aunque el griego dice más literalmente «despides» o «dejas partir».
    reason: alternative_reading
lexical_decisions:
- source_word: Νῦν
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - En este momento
  lexicon: BDAG
  rationale: Adverbio temporal que marca la realización presente de la esperanza de Simeón. «Ahora» es la equivalencia natural y directa en español.
- source_word: ἀπολύεις
  english_pob_choice: are dismissing
  chosen_spanish: liberas
  alternatives_spanish:
  - despides
  - dejas ir
  - sueltas
  lexicon: BDAG
  rationale: ἀπολύω significa liberar, soltar o despedir. En este contexto conserva bien la imagen de dejar partir sin explicitar en el texto principal la muerte. «Liberas» suena natural en español y mantiene la tensión interpretativa.
- source_word: τὸν δοῦλόν σου
  english_pob_choice: your slave
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: BDAG
  rationale: δοῦλος puede significar «esclavo» o «siervo». Dado que el vocativo δέσποτα («Maestro») hace explícita la relación de pertenencia y autoridad, «esclavo» preserva mejor la fuerza léxica. Se evita «siervo» por suavizar indebidamente el término.
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Soberano Señor
  - Señor
  lexicon: BDAG
  rationale: Vocativo de δεσπότης, con sentido de dueño/amo con autoridad. «Maestro» reproduce bien el tono de dirección y dominio personal en una oración dirigida a Dios, sin ampliar innecesariamente el título.
- source_word: κατὰ τὸ ῥῆμά σου
  english_pob_choice: according to your word
  chosen_spanish: conforme a tu palabra
  alternatives_spanish:
  - de acuerdo con tu palabra
  - según tu palabra
  lexicon: BDAG
  rationale: κατά con acusativo indica conformidad. ῥῆμα puede ser «palabra» o «declaración». «Conforme a tu palabra» suena natural en español y conserva la referencia a la promesa divina.
- source_word: ἐν εἰρήνῃ
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  lexicon: BDAG
  rationale: La preposición se conserva de forma literal. «En paz» mantiene el matiz bíblico de partida serena bajo el favor de Dios mejor que el adverbio «pacíficamente».
theological_decisions:
- issue: Si el verbo ἀπολύεις debe hacer explícita la muerte de Simeón
  english_pob_reading: Retain the metaphor of release/departure without making death explicit in the main text
  chosen_spanish_reading: Conservar la imagen de liberación/salida sin explicitar la muerte en el texto principal
  alternative_spanish_readings:
  - Ahora dejas morir a tu esclavo en paz
  - Ahora despides a tu esclavo en paz
  rationale: El contexto sugiere fuertemente que Simeón está listo para partir de esta vida, pero el verbo griego significa liberar, soltar o despedir, no «causar la muerte» de manera explícita. Mantener la metáfora preserva la tensión poética y teológica del pasaje.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
- issue: Cómo reflejar la relación entre δοῦλος y δέσποτα sin atenuar el lenguaje
  english_pob_reading: Use slave because the paired address Master makes the bond of ownership/service especially explicit
  chosen_spanish_reading: Usar esclavo porque el par con Maestro hace especialmente explícita la relación de autoridad y pertenencia
  alternative_spanish_readings:
  - tu siervo, Maestro
  - tu servidor, Maestro
  rationale: En español, «esclavo» comunica con mayor precisión la fuerza de δοῦλος cuando se acompaña de δέσποτα. «Siervo» o «servidor» debilitan la asimetría relacional que el griego presenta de modo deliberado.
  doctrine_reference: 'DOCTRINE.md: preservar el peso léxico de δοῦλος cuando la relación de esclavitud/propiedad es saliente'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión inglés: la preferencia por un verbo más natural en el contexto («dismissing») y la restauración de «slave» para δοῦλος. La versión española sigue esa misma evaluación, pero ajusta el verbo a un equivalente natural y mantiene el valor léxico fuerte de «esclavo».'
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino explícito, por lo que no se usa.
  - Se mantiene un registro reverente y bíblico, pero sin recurrir a fórmulas arcaizantes innecesarias.
  - «Maestro» se usa como vocativo de δέσποτα para no sustituirlo por «Señor», que podría ocultar la relación maestro-esclavo del pasaje.
  - «En paz» conserva la construcción preposicional del griego y su resonancia bíblica.
  - No se explicita la muerte en el texto principal; esa inferencia queda en la nota, conforme al criterio del POB de preservar la tensión interpretativa.
