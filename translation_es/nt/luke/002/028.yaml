translation:
  language: es
  text: Y él lo tomó en brazos y bendijo a Dios y dijo:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo recibió». El verbo griego puede significar «recibir» o «acoger», pero la frase siguiente, «en brazos», hace que el sentido físico «tomó» sea la traducción más natural en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδέξατο
  english_pob_choice: took
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo recibió
  - lo acogió
  lexicon: BDAG
  rationale: δέχομαι puede significar 'recibir' o 'acoger', pero el contexto inmediato 'en sus brazos' apunta a un acto físico de tomar al niño. En español, 'lo tomó' conserva ese sentido natural sin perder la relación con 'recibir'.
- source_word: αὐτὸ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  lexicon: BDAG
  rationale: Aunque la forma griega es neutra, el referente es el niño Jesús. En español, el objeto directo personal natural es 'lo'; 'le' introduciría leísmo regional no necesario.
- source_word: εἰς τὰς ἀγκάλας
  english_pob_choice: into his arms
  chosen_spanish: en sus brazos
  alternatives_spanish:
  - entre sus brazos
  - en el regazo
  - en sus brazos abiertos
  lexicon: BDAG
  rationale: ἀγκάλαι designa los brazos como lugar de abrazo o de cargar a alguien. 'En sus brazos' es idiomático en español y conserva la imagen física; se evita añadir un posesivo explícito en griego que no está presente, aunque el contexto lo sugiere.
- source_word: εὐλόγησεν τὸν θεόν
  english_pob_choice: blessed God
  chosen_spanish: bendijo a Dios
  alternatives_spanish:
  - alabó a Dios
  - bendijo a Dios y alabó
  lexicon: BDAG
  rationale: Con Dios como objeto, εὐλογέω se traduce de forma más directa como 'bendecir'. 'Alabar' expresa una implicación posible, pero 'bendijo a Dios' preserva mejor la forma verbal y el matiz bíblico.
- source_word: καὶ εἶπεν
  english_pob_choice: and said,
  chosen_spanish: 'y dijo:'
  alternatives_spanish:
  - y dijo,
  - 'y exclamó:'
  lexicon: BDAG
  rationale: Es una continuación narrativa simple. En español no hace falta repetir el sujeto; 'y dijo:' conserva el avance del relato y abre la cita que sigue.
theological_decisions:
- issue: Referencia del pronombre neutro αὐτό
  english_pob_reading: The pronoun refers personally to the infant Jesus, rendered 'him.'
  chosen_spanish_reading: El pronombre se refiere personalmente al niño Jesús y se traduce como 'lo'.
  alternative_spanish_readings:
  - '''lo'' entendido de modo impersonal por el género gramatical'
  - '''le'' por leísmo'
  rationale: La gramática griega sigue el sustantivo implícito 'niño', pero el referente narrativo es la persona de Jesús. Traducirlo como objeto directo personal evita una lectura impersonal extraña en español sin introducir una interpretación teológica adicional.
  doctrine_reference: Referencia narrativa personal del niño Jesús; fidelidad al referente discursivo.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; se mantiene la decisión óptima de traducir ἐδέξατο con un verbo físico natural en español y de reflejar personalmente el referente del pronombre.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para τὸν θεόν conforme al estándar del proyecto.
  - Se evita 'SEÑOR' porque el texto griego aquí tiene θεός, no κύριος.
  - El estilo es narrativo, sobrio y publicable, con puntuación española y apertura de cita tras 'dijo:'.
