translation:
  language: es
  text: Y al no hallarlo, volvieron a Jerusalén, buscándolo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al no encontrarlo, volvieron a Jerusalén, buscándolo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simple conserva la coordinación narrativa paratáctica de Lucas sin añadir inferencia temporal innecesaria.
- source_word: μὴ εὑρόντες
  english_pob_choice: when they did not find
  chosen_spanish: al no hallarlo
  alternatives_spanish:
  - cuando no lo encontraron
  - no hallándolo
  lexicon: BDAG
  rationale: El participio aoristo con μή funciona como circunstancia previa; en español, 'al no hallarlo' expresa con naturalidad el valor temporal-circunstancial sin perder la idea de fracaso en encontrarlo.
- source_word: ὑπέστρεψαν
  english_pob_choice: they returned
  chosen_spanish: volvieron
  alternatives_spanish:
  - regresaron
  - retornaron
  lexicon: BDAG
  rationale: '''Volvieron'' es natural y fiel al sentido de regresar; mantiene el movimiento narrativo sin sonar más formal de lo necesario.'
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - hasta Jerusalén
  lexicon: BDAG
  rationale: Con nombres de ciudad, 'a' reproduce de manera idiomática el destino indicado por εἰς.
- source_word: ἀναζητοῦντες
  english_pob_choice: searching for
  chosen_spanish: buscándolo
  alternatives_spanish:
  - buscándolo con empeño
  - buscándolo de nuevo
  lexicon: BDAG
  rationale: 'El participio presente expresa acción simultánea: regresan mientras lo buscan. ''Buscándolo'' conserva la simultaneidad y el carácter activo de la búsqueda; evita una perífrasis más pesada.'
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre átono de objeto directo es la forma natural en español para referirse a Jesús en este contexto.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios; la presente propuesta sigue ese acuerdo de alta concordancia y mantiene el mismo valor narrativo y lexical desde el griego.
  spanish_consistency_notes:
  - Se mantiene 'Jerusalén' como topónimo estándar.
  - Se usa 'buscándolo' para reflejar la simultaneidad del participio presente, coherente con el flujo narrativo.
  - No se introduce terminología teológica adicional porque el versículo es puramente narrativo.
