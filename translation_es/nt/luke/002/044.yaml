translation:
  language: es
  text: Pero, suponiendo que él estaba en el grupo de viaje[a], recorrieron una jornada de camino y comenzaron a buscarlo[b] entre sus parientes y conocidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘caravana’ para συνοδία, es decir, una compañía que viaja junta.
    reason: lexical_alternative
  - marker: b
    text: El verbo imperfecto también puede traducirse ‘lo buscaban’, enfatizando el carácter continuo de la búsqueda.
    reason: lexical_alternative
lexical_decisions:
- source_word: νομίσαντες
  english_pob_choice: supposing
  chosen_spanish: suponiendo
  alternatives_spanish:
  - pensando
  - creyendo
  lexicon: BDAG
  rationale: El participio aoristo expresa una suposición previa a la acción principal. 'Suponiendo' conserva el carácter provisional sin sonar más concluyente que el griego.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una transición narrativa suave; 'Pero' refleja bien el giro respecto al versículo anterior en un español natural.
- source_word: εἶναι ἐν τῇ συνοδίᾳ
  english_pob_choice: to be in the traveling group
  chosen_spanish: estar en el grupo[a]
  alternatives_spanish:
  - estar en la caravana
  - estar en la compañía
  lexicon: BDAG
  rationale: συνοδία designa un conjunto de personas que viajan juntas. 'Grupo' comunica el sentido de forma clara y no añade una connotación demasiado específica como 'caravana'.
- source_word: ἦλθον ἡμέρας ὁδὸν
  english_pob_choice: they went a day's journey
  chosen_spanish: caminaron un día de viaje[b]
  alternatives_spanish:
  - viajaron un día
  - anduvieron una jornada
  lexicon: BDAG
  rationale: La expresión idiomática indica la distancia recorrida en un día. 'Un día de viaje' transmite la medida temporal sin forzar un calco demasiado rígido.
- source_word: ἀνεζήτουν
  english_pob_choice: they began searching for
  chosen_spanish: comenzaron a buscarlo
  alternatives_spanish:
  - lo buscaban
  - empezaron a buscarlo
  lexicon: BDAG
  rationale: El imperfecto sugiere búsqueda en curso; 'comenzaron a buscarlo' conserva el inicio de la acción y su continuidad implícita.
- source_word: συγγενεῦσιν
  english_pob_choice: relatives
  chosen_spanish: parientes
  alternatives_spanish:
  - familiares
  - consanguíneos
  lexicon: BDAG
  rationale: El término abarca vínculos de familia en sentido amplio. 'Parientes' es natural en español y mantiene ese rango semántico.
- source_word: γνωστοῖς
  english_pob_choice: acquaintances
  chosen_spanish: conocidos
  alternatives_spanish:
  - amigos
  - personas que conocían
  lexicon: BDAG
  rationale: γνωστοί son personas conocidas, no necesariamente amistades íntimas. 'Conocidos' preserva esa amplitud mejor que 'amigos'.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y el audit trail inglés: mantiene la suposición previa, el matiz de viaje en compañía, la duración del trayecto y el imperfecto de búsqueda continua. No se documentan revisiones aplicadas en el material de referencia.'
  spanish_consistency_notes:
  - Se prefirió 'parientes' y 'conocidos' por su naturalidad y por cubrir el rango semántico de los sustantivos griegos.
  - Se evitó 'caravana' en el texto principal para no imponer una imagen cultural más específica que la requerida por συνοδία.
  - La puntuación y el ritmo buscan ser publicables en español bíblico contemporáneo, sin sonar coloquiales.
