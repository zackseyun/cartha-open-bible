  text: καὶ ἐγένετο μετὰ ἡμέρας τρεῖς εὗρον αὐτὸν ἐν τῷ ἱερῷ καθεζόμενον ἐν μέσῳ τῶν διδασκάλων καὶ ἀκούοντα αὐτῶν καὶ ἐπερωτῶντα αὐτούς·
base_translation:
  language: en
  yaml_path: translation/nt/luke/002/046.yaml
  text: And it happened that after three days they found him in the temple[b][a], sitting among the teachers and listening to them and asking them questions.
  footnotes:
