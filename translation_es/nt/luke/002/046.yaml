translation:
  language: es
  text: Y sucedió que, después de tres días, lo encontraron en el templo[a], sentado en medio de los maestros y escuchándolos y haciéndoles preguntas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior.
    reason: cultural_note
  - marker: b
    text: 'O: «preguntándoles».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y pasó que
  lexicon: BDAG
  rationale: La fórmula narrativa de Lucas se conserva con una apertura eventiva natural en español. «Sucedió que» transmite bien el inicio del relato sin recurrir a una expresión arcaica.
- source_word: μετὰ ἡμέρας τρεῖς
  english_pob_choice: after three days
  chosen_spanish: después de tres días
  alternatives_spanish:
  - al cabo de tres días
  - tras tres días
  lexicon: BDAG
  rationale: «Después de» refleja con fidelidad la sucesión temporal del griego y mantiene la relación directa con el original.
- source_word: εὗρον
  english_pob_choice: they found
  chosen_spanish: lo encontraron
  alternatives_spanish:
  - lo hallaron
  lexicon: BDAG
  rationale: «Encontraron» es el equivalente narrativo más natural y directo; el pronombre «lo» conserva el objeto implícito del griego.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el recinto del templo
  - en los patios del templo
  lexicon: BDAG
  rationale: Se mantiene el término general «templo» como el texto base, sin especificar más de lo que exige el griego. La amplitud del término queda explicada en la nota.
- source_word: καθεζόμενον
  english_pob_choice: sitting
  chosen_spanish: sentado
  alternatives_spanish:
  - estando sentado
  lexicon: BDAG
  rationale: «Sentado» expresa de modo natural la postura continua descrita por el participio presente.
- source_word: ἐν μέσῳ τῶν διδασκάλων
  english_pob_choice: among the teachers
  chosen_spanish: en medio de los maestros
  alternatives_spanish:
  - entre los maestros
  - en medio de los maestros de la Ley
  lexicon: BDAG
  rationale: «Maestros» traduce διδάσκαλοι de manera fiel y comprensible. Se evita añadir «de la Ley» porque el griego no lo especifica.
- source_word: ἀκούοντα αὐτῶν
  english_pob_choice: listening to them
  chosen_spanish: escuchándolos
  alternatives_spanish:
  - oyéndolos
  lexicon: BDAG
  rationale: «Escuchándolos» comunica mejor la atención activa del contexto que un simple «oyéndolos».
- source_word: ἐπερωτῶντα αὐτούς
  english_pob_choice: asking them questions
  chosen_spanish: haciéndoles preguntas
  alternatives_spanish:
  - preguntándoles
  - interrogándolos
  lexicon: BDAG
  rationale: La expresión española conserva el sentido recíproco y discursivo de ἐπερωτάω sin forzar una idea de confrontación. «Haciéndoles preguntas» es idiomático y fiel.
theological_decisions:
- issue: El carácter de la interacción de Jesús con los maestros
  english_pob_reading: 'Rendered as active participation in learning and discussion: ''listening to them and asking them questions.'''
  chosen_spanish_reading: «escuchándolos y haciéndoles preguntas» describe una participación activa en la escucha y el diálogo, sin convertir la escena en debate hostil.
  alternative_spanish_readings:
  - «escuchándolos y preguntándoles»
  - «escuchándolos e interrogándolos»
  rationale: 'El texto presenta al niño Jesús en un intercambio serio con los maestros. La traducción debe conservar esa tensión: aprendizaje y discusión, pero sin imponer una postura polémica que el griego no exige.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios adicionales respecto del pasaje base; se mantiene la lectura auditada de Lucas 2:46 con la misma distinción semántica para ἱερόν y ἐπερωτῶντα.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones no presentes en este versículo.
  - «templo» queda apoyado por nota para conservar la amplitud de ἱερόν.
  - «maestros» respeta διδάσκαλοι sin introducir «de la Ley».
  - La puntuación y la coordinación verbal siguen la fluidez narrativa del español bíblico moderno.
