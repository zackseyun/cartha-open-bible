translation:
  language: es
  text: Y había pastores en esa misma región, pasando la noche al aire libre[a] y haciendo guardia[b] sobre su rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «viviendo al aire libre» o «acampeando en campo abierto». El verbo griego destaca que los pastores estaban fuera, pasando la noche en el campo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «guardando las vigilias de la noche sobre su rebaño», lo que sugiere turnos de guardia durante la noche.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιμένες
  english_pob_choice: shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - pastores de ovejas
  - ganaderos
  lexicon: BDAG
  rationale: ποιμήν designa propiamente a quienes cuidan ovejas; en español, «pastores» es el equivalente natural y preciso. «Ganaderos» sería demasiado amplio y desviaría el sentido.
- source_word: ἐν τῇ χώρᾳ τῇ αὐτῇ
  english_pob_choice: in that same region
  chosen_spanish: en aquella misma región
  alternatives_spanish:
  - en ese mismo lugar
  - en aquella misma zona
  lexicon: BDAG
  rationale: χώρα aquí se refiere al ámbito geográfico inmediato del relato. «Región» conserva bien esa amplitud y evita el calco de «país», que en español sonaría excesivo.
- source_word: ἀγραυλοῦντες
  english_pob_choice: staying out in the fields
  chosen_spanish: velando de noche
  alternatives_spanish:
  - pasando la noche al aire libre
  - acamparon al raso
  - durmiendo al aire libre
  lexicon: BDAG
  rationale: El verbo subraya que estaban fuera, pasando la noche al exterior. En esta cláusula, «velando de noche» comunica de forma natural el estado nocturno ya reforzado por el contexto, sin perder el sentido de permanencia al aire libre.
- source_word: φυλάσσοντες φυλακὰς τῆς νυκτὸς
  english_pob_choice: keeping watch ... by night
  chosen_spanish: velando de noche
  alternatives_spanish:
  - haciendo las vigilias de la noche
  - guardando las vigilias nocturnas
  - haciendo guardia por la noche
  lexicon: BDAG
  rationale: La construcción cognada alude a guardar las vigilias de la noche. «Velando de noche» es una solución idiomática que preserva la función de guardia nocturna sin sonar rígida en español.
- source_word: ἐπὶ τὴν ποίμνην αὐτῶν
  english_pob_choice: over their flock
  chosen_spanish: sobre su rebaño
  alternatives_spanish:
  - sobre su manada
  - sobre sus ovejas
  lexicon: BDAG
  rationale: ποίημνη designa un conjunto de ovejas, un rebaño. «Rebaño» mantiene el sentido colectivo y el vínculo pastoral con «pastores».
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula narrativa continúa la escena de manera simple. «Y» conserva la conexión directa sin añadir matiz interpretativo.
- source_word: ἦσαν
  english_pob_choice: there were
  chosen_spanish: había
  alternatives_spanish:
  - eran
  - estaban
  lexicon: BDAG
  rationale: El valor existencial de εἰμί en español se expresa naturalmente con «había». Introduce la escena con fluidez narrativa.
translation_notes:
  revision_awareness: El texto sigue el sentido del griego SBLGNT y armoniza con el criterio POB de equivalencia óptima ya reflejado en el inglés. Se ha mantenido la escena pastoral nocturna y la posible idea de vigilias/turnos sin sobrecargar el español.
  spanish_consistency_notes:
  - Se prefirió «pastores» por precisión léxica y naturalidad bíblica en español.
  - «Región» refleja χώρα con amplitud moderada sin convertir el lugar en un «país».
  - La combinación de «velando de noche» y la nota b preserva tanto la idea de estar al aire libre como la de las vigilias nocturnas.
  - Se evitó «SEÑOR» u otros ajustes doctrinales porque este versículo no involucra nombres divinos ni términos cristológicos.
