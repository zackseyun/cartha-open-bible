translation:
  language: es
  text: Y cuando habían completado todo conforme a la ley del Señor[a], volvieron a Galilea, a su propio pueblo[b], Nazaret.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo lo requerido por la ley del Señor».
    reason: lexical_alternative
  - marker: b
    text: El griego dice «ciudad»; se traduce «pueblo» porque Nazaret era un asentamiento pequeño.
    reason: cultural_note
lexical_decisions:
- source_word: ὡς
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - as soon as
  - después de que
  lexicon: BDAG
  rationale: En esta construcción temporal con aoristo, ὡς marca el momento en que sigue la acción principal. «Cuando» es natural en español y conserva la secuencia sin añadir una idea de inmediatez más fuerte de la que exige el griego.
- source_word: ἐτέλεσαν
  english_pob_choice: had completed
  chosen_spanish: habían completado
  alternatives_spanish:
  - terminaron
  - cumplieron
  - llevaron a cabo
  lexicon: BDAG
  rationale: τελέω aquí se refiere a llevar a término lo requerido. «Habían completado» refleja bien el valor narrativo del pluscuamperfecto y evita imponer una lectura más teológica como «cumplieron».
- source_word: πάντα τὰ κατὰ τὸν νόμον κυρίου
  english_pob_choice: everything according to the law of the Lord
  chosen_spanish: todo conforme a la ley del Señor
  alternatives_spanish:
  - todo lo prescrito por la ley del Señor
  - todo según la ley del Señor
  lexicon: BDAG
  rationale: La frase indica la totalidad de lo que correspondía o estaba prescrito por la ley. «Conforme a la ley del Señor» suena natural en español y mantiene el vínculo jurídico/ritual del griego sin expandir demasiado el sentido.
- source_word: νόμον κυρίου
  english_pob_choice: the law of the Lord
  chosen_spanish: la ley del Señor
  alternatives_spanish:
  - la ley de Yahvé
  - la ley del Señor
  lexicon: BDAG
  rationale: El griego tiene κύριος, no el Tetragrámaton; por eso se conserva «Señor» en esta referencia escrituraria. «Ley» reproduce νόμος con su fuerza normativa en este contexto.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: BDAG
  rationale: Aquí κύριος designa a Dios en el marco de la ley dada en la Escritura. La tradición editorial del proyecto pide «Yahvé» para el nombre divino cuando el texto fuente lo justifique directamente, pero en este caso el griego dice κύριος y la fórmula bíblica establecida en español conserva «Señor».
- source_word: ἐπέστρεψαν
  english_pob_choice: returned
  chosen_spanish: volvieron
  alternatives_spanish:
  - regresaron
  - retornaron
  lexicon: BDAG
  rationale: En un contexto de desplazamiento, ἐπιστρέφω significa volver o regresar. «Volvieron» es fluido y suficientemente formal para el relato.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: to Galilee
  chosen_spanish: a Galilea
  alternatives_spanish:
  - hacia Galilea
  - a la Galilea
  lexicon: BDAG
  rationale: Con destino, εἰς se rinde de manera natural con «a». Se evita «en» porque alteraría la dirección del movimiento.
- source_word: εἰς πόλιν ἑαυτῶν
  english_pob_choice: to their own town
  chosen_spanish: a su propia ciudad[b]
  alternatives_spanish:
  - a su propio pueblo
  - a su propia ciudad
  lexicon: BDAG
  rationale: πόλις puede significar ciudad o población/centro habitado. «Ciudad» sigue de cerca el griego; la nota explica que el inglés POB optó por «town» por el tamaño de Nazaret. En español, «ciudad» conserva mejor el término del original, con una nota cultural para evitar sobreinterpretación.
- source_word: Ναζαρέθ
  english_pob_choice: Nazareth
  chosen_spanish: Nazaret
  alternatives_spanish:
  - Nazaret
  - Nazaret
  lexicon: BDAG
  rationale: Se usa la transliteración española común «Nazaret», estándar y plenamente reconocible.
theological_decisions:
- issue: Referencia de κύριος en «la ley del Señor»
  english_pob_reading: '''Lord'' refers to God in the sense of the divine law given in Scripture.'
  chosen_spanish_reading: «Señor» refiere a Dios en el marco de la ley divina de la Escritura.
  alternative_spanish_readings:
  - «Yahvé» refiere a Dios en la ley divina.
  - No se especifica más que un señor humano.
  rationale: El texto no contiene el Tetragrámaton, sino κύριος. Para no borrar la forma original ni introducir una sustitución no presente en el griego, se mantiene «Señor» en la fórmula bíblica. La referencia es claramente a Dios en el contexto de la ley.
  doctrine_reference: 'DOCTRINE.md: κύριος se traduce por defecto como ''Lord/Señor''; no sustituir por el nombre divino cuando el texto fuente no usa el Tetragrámaton.'
translation_notes:
  revision_awareness: La revisión inglesa reciente mantiene la misma lectura y no introduce cambios. El consenso de revisión es alto y no se registran enmiendas textuales, así que el español sigue de cerca la solución auditada del POB inglés, conservando las decisiones léxicas y la nota cultural sobre Nazaret.
  spanish_consistency_notes:
  - Se mantiene «Señor» en la fórmula «ley del Señor» por corresponder al griego κύριος, reservando «Yahvé» para contextos donde el texto fuente apunte más directamente al nombre divino.
  - Se usa «Nazaret» como forma española estándar del topónimo.
  - «Volvieron» y «habían completado» conservan la secuencia narrativa del griego sin forzar un matiz exegético adicional.
