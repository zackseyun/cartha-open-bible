revisions:
- from: Y cuando habían completado todo conforme a la ley del Señor[a], volvieron a Galilea, a su propia ciudad[b], Nazaret.
  to: Y cuando habían completado todo conforme a la ley del Señor[a], volvieron a Galilea, a su propio pueblo[b], Nazaret.
  rationale: Se conserva la estructura y el sentido del borrador, pero se ajusta πόλις a «pueblo» para reflejar mejor el referente contextual de Nazaret y el criterio documentado en la auditoría. También se mejora la nota cultural para que explique directamente la decisión en español, sin remitir al inglés como autoridad intermedia.
