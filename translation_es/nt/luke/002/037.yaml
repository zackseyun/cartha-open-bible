translation:
  language: es
  text: y siguió viuda hasta los ochenta y cuatro años[a]. No se apartaba del templo[b], adorando con ayunos y súplicas[c] noche y día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "y como viuda durante ochenta y cuatro años". El griego puede entenderse como indicando la edad de Ana o la duración de su viudez.'
    reason: alternative_reading
  - marker: b
    text: El griego aquí se refiere al recinto o conjunto del templo, no específicamente al santuario interior.
    reason: cultural_note
  - marker: c
    text: 'O: "peticiones" o "rogativas".'
    reason: lexical_alternative
lexical_decisions:
- source_word: χήρα
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - mujer viuda
  lexicon: BDAG
  rationale: El sustantivo griego designa a una mujer cuyo esposo ha muerto. 'Viuda' es el equivalente natural y fiel en español, sin añadir matices no presentes en el texto.
- source_word: ἕως ἐτῶν ὀγδοήκοντα τεσσάρων
  english_pob_choice: until she was eighty-four years old
  chosen_spanish: hasta los ochenta y cuatro años
  alternatives_spanish:
  - hasta los ochenta y cuatro años de edad
  - por ochenta y cuatro años
  lexicon: BDAG
  rationale: La construcción es comprimida y admite la lectura de edad o la duración de la viudez. En español, 'hasta los ochenta y cuatro años' mantiene esa ambigüedad mejor que una formulación más explícita, y deja espacio para la nota de alternativa.
- source_word: ἀφίστατο τοῦ ἱεροῦ
  english_pob_choice: did not depart from the temple
  chosen_spanish: No se apartaba del templo
  alternatives_spanish:
  - No dejaba el templo
  - No se ausentaba del templo
  lexicon: BDAG
  rationale: El imperfecto indica acción habitual o continuada; 'no se apartaba' conserva bien ese valor. Se mantiene 'templo' como equivalente idiomático de ἱερόν, sin sobrecargar el texto principal con precisión arquitectónica.
- source_word: ἱεροῦ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - recinto del templo
  - complexo del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al conjunto o recinto del templo, no al santuario interior. En el cuerpo principal, 'templo' es la forma más natural; la precisión del recinto queda explicada en la nota.
- source_word: νηστείαις
  english_pob_choice: with fastings
  chosen_spanish: con ayunos
  alternatives_spanish:
  - en ayunos
  - mediante ayunos
  lexicon: BDAG
  rationale: El dativo plural expresa medio o acompañamiento. En español, 'con ayunos' comunica el plural y la práctica reiterada de manera sobria y natural.
- source_word: δεήσεσιν
  english_pob_choice: prayers
  chosen_spanish: súplicas
  alternatives_spanish:
  - oraciones
  - peticiones
  lexicon: BDAG
  rationale: δέησις enfatiza ruego o petición. 'Súplicas' conserva mejor esa fuerza que el más general 'oraciones', y corresponde al registro devocional del pasaje. La alternativa semántica se preserva en la nota.
- source_word: λατρεύουσα
  english_pob_choice: worshiping
  chosen_spanish: sirviendo
  alternatives_spanish:
  - adorando
  - rindiendo servicio de culto
  lexicon: BDAG
  rationale: λατρεύω tiene el sentido de prestar servicio religioso/culto. 'Sirviendo' evita un calco pesado y, unido al contexto de ayuno y súplica, comunica el servicio devoto sin perder el matiz de culto.
- source_word: νύκτα καὶ ἡμέραν
  english_pob_choice: night and day
  chosen_spanish: noche y día
  alternatives_spanish:
  - de noche y de día
  - día y noche
  lexicon: BDAG
  rationale: Es una locución idiomática de continuidad. 'Noche y día' sigue el orden griego y suena natural en español.
theological_decisions:
- issue: Interpretación de la edad de Ana o de la duración de su viudez
  english_pob_reading: The main text reads the phrase as indicating that Anna was eighty-four years old.
  chosen_spanish_reading: El texto principal se lee como una referencia a que Ana tenía ochenta y cuatro años.
  alternative_spanish_readings:
  - La frase puede entenderse como que había sido viuda durante ochenta y cuatro años.
  rationale: No es una disputa doctrinal sino exegética. El griego permite ambas lecturas en relación con el versículo anterior. La redacción principal conserva la lectura de edad, mientras que la nota preserva la alternativa para no cerrar indebidamente la ambigüedad.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; el pasaje fue confirmado sin cambios en el último repaso, con alta concordancia y solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la distinción entre 'templo' y 'santuario' mediante nota, conforme al valor de ἱερόν.
  - La ambigüedad de la frase temporal se preserva en la nota sin forzar una resolución en el texto principal.
  - '''Súplicas'' se usa por la fuerza semántica de δέησις; la alternativa ''peticiones'' queda documentada.'
