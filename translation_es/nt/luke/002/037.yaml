    issue: Inserción de 'entonces' en el texto principal
    rationale: καὶ αὐτή no significa 'y entonces'; 'entonces' añade un matiz temporal/discursivo no presente en el griego ni en el inglés auditado.
  - severity: medium
    issue: '''sirviendo'' debilita el sentido de λατρεύουσα'
    rationale: Aunque λατρεύω puede incluir servicio sagrado, aquí el inglés auditado eligió 'worshiping'. En español, 'sirviendo' puede sonar demasiado general y menos cultual que el original.
  - severity: low
    issue: La construcción 'como viuda hasta los ochenta y cuatro años' suena algo rígida
    rationale: Es comprensible, pero 'siguió viuda hasta los ochenta y cuatro años' expresa mejor en español el estado continuado sin perder la ambigüedad preservada por la nota.
  - severity: low
    issue: Detalles tipográficos y de estilo en notas
    rationale: 'Las notas usan comillas y formato poco natural (''O: ...''). Conviene normalizarlas para claridad editorial.'
  revised_spanish_text: y siguió viuda hasta los ochenta y cuatro años[a]. No se apartaba del templo[b], adorando con ayunos y súplicas[c] noche y día.
