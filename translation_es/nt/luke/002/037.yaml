- from: y entonces, como viuda hasta los ochenta y cuatro años[a]. No se apartaba del templo[b], sirviendo con ayunos y súplicas[c] noche y día.
  to: y siguió viuda hasta los ochenta y cuatro años[a]. No se apartaba del templo[b], adorando con ayunos y súplicas[c] noche y día.
