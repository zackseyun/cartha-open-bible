revisions:
- from: Y el niño crecía y se fortalecía[a], lleno de sabiduría, y la gracia de Dios estaba sobre él.
  to: Y el niño crecía y se fortalecía[a], lleno de sabiduría, y el favor de Dios[b] estaba sobre él.
  rationale: Se cambia «la gracia de Dios» por «el favor de Dios» para seguir la decisión léxico-teológica principal documentada en el expediente inglés, conservando «gracia» como alternativa válida en nota. También se corrige la nota [a] para que corresponda exactamente al segmento anclado «se fortalecía». El resto del texto puede mantenerse por ser fiel y natural en español.
