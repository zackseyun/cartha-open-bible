translation:
  language: es
  text: Y el niño crecía y se fortalecía[a], lleno de sabiduría, y el favor de Dios[b] estaba sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se hacía fuerte».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la gracia de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸ δὲ παιδίον
  english_pob_choice: And the child
  chosen_spanish: Y el niño
  alternatives_spanish:
  - Y el niño pequeño
  - Y el muchacho
  lexicon: BDAG
  rationale: παιδίον nombra a un niño en el contexto inmediato de la infancia de Jesús. «Niño» es natural en español y conserva la referencia de edad mejor que «muchacho».
- source_word: ηὔξανεν
  english_pob_choice: grew
  chosen_spanish: crecía
  alternatives_spanish:
  - creció
  - iba creciendo
  lexicon: BDAG
  rationale: El imperfecto expresa desarrollo continuo. «Crecía» mantiene esa progresividad de forma natural en español.
- source_word: ἐκραταιοῦτο
  english_pob_choice: became strong
  chosen_spanish: se fortalecía
  alternatives_spanish:
  - se hacía fuerte
  - iba fortaleciéndose
  lexicon: BDAG
  rationale: El imperfecto medio/pasivo indica fortalecimiento en proceso. «Se fortalecía» preserva el matiz progresivo sin sonar forzado.
- source_word: πληρούμενον σοφίᾳ
  english_pob_choice: being filled with wisdom
  chosen_spanish: lleno de sabiduría
  alternatives_spanish:
  - siendo lleno de sabiduría
  - colmado de sabiduría
  lexicon: BDAG
  rationale: El participio expresa una condición acompañante. En español, «lleno de sabiduría» comunica bien el estado resultante sin perder la relación con el proceso descrito por los verbos anteriores.
- source_word: χάρις θεοῦ
  english_pob_choice: the favor of God
  chosen_spanish: la gracia de Dios
  alternatives_spanish:
  - el favor de Dios
  lexicon: BDAG
  rationale: El griego permite «gracia» o «favor». Aquí se conserva «gracia» porque es la correspondencia léxica más directa de χάρις y mantiene la tensión teológica que el texto admite; el inglés POB documenta «favor» como alternativa interpretativa.
- source_word: ἦν ἐπ’ αὐτό
  english_pob_choice: was upon him
  chosen_spanish: estaba sobre él
  alternatives_spanish:
  - reposaba sobre él
  - estaba encima de él
  lexicon: BDAG
  rationale: ἐπί con acusativo tras εἰμί indica presencia recayendo sobre alguien. «Estaba sobre él» conserva el modismo bíblico en español y corresponde bien al griego.
theological_decisions:
- issue: χάρις θεοῦ en un contexto de crecimiento humano de Jesús
  english_pob_reading: the favor of God
  chosen_spanish_reading: la gracia de Dios
  alternative_spanish_readings:
  - el favor de Dios
  rationale: El griego dice χάρις θεοῦ de manera directa; en español, «gracia» mantiene la fuerza léxica normal del término. «Favor» sigue siendo una lectura válida y ayuda a expresar la benevolencia divina en el marco del desarrollo humano de Jesús, pero no se impone como única traducción.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Definition of Chalcedon (451 AD)'
translation_notes:
  revision_awareness: El borrador sigue el contexto griego directo y el audit trail inglés. Se conserva la progresión verbal del imperfecto, el participio acompañante de sabiduría y la ambigüedad léxica de χάρις mediante una nota alternativa, sin copiar mecánicamente la elección interpretativa inglesa de «favor».
  spanish_consistency_notes:
  - Se usa «niño» para παιδίον por coherencia con el contexto de infancia.
  - Se mantiene «gracia» para χάρις, en línea con el valor léxico principal del término en español bíblico.
  - «Estaba sobre él» reproduce el valor de ἐπί con mayor naturalidad que una paráfrasis explicativa.
