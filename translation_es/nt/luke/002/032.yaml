translation:
  language: es
  text: luz para revelación a los gentiles[a], y gloria para tu pueblo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una luz para revelación a las naciones». El término griego puede significar «naciones» en general, pero aquí probablemente subraya a los gentiles en contraste con Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: φῶς
  english_pob_choice: a light
  chosen_spanish: luz
  alternatives_spanish:
  - una luz
  lexicon: BDAG
  rationale: En español, el sustantivo funciona naturalmente sin artículo explícito en una expresión poética como esta. «Luz» conserva el valor predicativo y evita forzar un artículo que el griego no exige.
- source_word: εἰς
  english_pob_choice: for
  chosen_spanish: para
  alternatives_spanish:
  - a
  - con el fin de
  lexicon: BDAG
  rationale: Aquí εἰς expresa finalidad o resultado. «Para» comunica bien esa dirección en español sin volver la frase pesada.
- source_word: ἀποκάλυψιν
  english_pob_choice: revelation
  chosen_spanish: revelación
  alternatives_spanish:
  - desvelamiento
  - manifestación
  - descubrimiento
  lexicon: BDAG
  rationale: «Revelación» es el equivalente más natural y fiel para el acto de hacer algo conocido o manifiesto. Conserva además el peso teológico del término.
- source_word: ἐθνῶν
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  lexicon: BDAG
  rationale: En este contexto el contraste con «tu pueblo Israel» hace que «los gentiles» comunique mejor la distinción judíos/no judíos que la forma más literal «las naciones». La alternativa «las naciones» sigue siendo posible para resaltar el valor general del término.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: BDAG
  rationale: «Gloria» conserva la fuerza bíblica habitual del término y su sentido de honor exaltado y resplandor, sin perder naturalidad en español.
- source_word: λαοῦ σου Ἰσραήλ
  english_pob_choice: your people Israel
  chosen_spanish: tu pueblo Israel
  alternatives_spanish:
  - tu pueblo de Israel
  - tu pueblo, Israel
  lexicon: BDAG
  rationale: 'La construcción refleja el genitivo posesivo y la aposición del griego: Israel es el pueblo de Dios. En español, «tu pueblo Israel» es breve y claro; la alternativa con «de» explicita la relación posesiva.'
theological_decisions:
- issue: Contraste entre ἐθνῶν e Israel
  english_pob_reading: the Gentiles
  chosen_spanish_reading: los gentiles
  alternative_spanish_readings:
  - las naciones
  rationale: El contexto inmediato contrapone a los no judíos con Israel. «Los gentiles» hace explícita esa oposición y reproduce bien la intención contextual del texto, mientras que «las naciones» mantiene la literalidad más amplia del término griego.
  doctrine_reference: Principio de primacía del sentido contextual del original; claridad comunicativa sin borrar el contraste bíblico Israel/gentiles.
translation_notes:
  revision_awareness: No se registran revisiones textuales en el paquete fuente. La versión española sigue de cerca el griego y la solución inglesa auditada, conservando el contraste gentiles/Israel y la finalidad de εἰς.
  spanish_consistency_notes:
  - Se usó «gentiles» en minúscula por tratarse de un sustantivo común en español religioso.
  - Se mantuvo «Israel» como nombre propio sin artículo, en paralelo con el griego.
  - No se añadió artículo a «luz» porque en español suena natural y respeta la concisión del original.
