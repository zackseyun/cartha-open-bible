translation:
  language: es
  text: 'Y les dijo[a]: «¿Por qué me buscaban? ¿No sabían que debo estar en la casa de mi Padre?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que debo estar en los asuntos de mi Padre» / «en las cosas de mi Padre». La expresión griega es elíptica y puede referirse tanto a la casa del Padre como a los asuntos del Padre.'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ εἶπεν πρὸς αὐτούς
  english_pob_choice: And he said to them
  chosen_spanish: Y les dijo
  alternatives_spanish:
  - Y les habló
  - Y respondió
  lexicon: SBLGNT; BDAG
  rationale: El griego introduce una respuesta directa con εἶπεν πρὸς αὐτούς. En español, «les dijo» conserva la direccionalidad hacia los interlocutores sin sobrecargar el estilo.
- source_word: Τί ὅτι
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿Qué es lo que
  lexicon: BDAG
  rationale: La expresión funciona idiomáticamente como pregunta de causa o motivo. «¿Por qué?» transmite la fuerza interrogativa de manera natural en español.
- source_word: ἐζητεῖτέ με
  english_pob_choice: were you looking for me
  chosen_spanish: me buscaban
  alternatives_spanish:
  - me buscaban ustedes
  - me andaban buscando
  - me buscaban ustedes
  lexicon: BDAG
  rationale: ζητέω puede ser «buscar» o «buscar por/tras». Dado el contexto narrativo de búsqueda ansiosa, «me buscaban» es idiomático en español y mantiene el sentido de búsqueda sin endurecerlo en exceso. El imperfecto conserva el trasfondo de acción en curso.
- source_word: οὐκ ᾔδειτε
  english_pob_choice: Did you not know
  chosen_spanish: ¿No sabían
  alternatives_spanish:
  - ¿No conocían
  - ¿No se daban cuenta
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento o conciencia. En una pregunta retórica, «¿No sabían?» conserva la reproche implícito y suena natural en español.
- source_word: ἐν τοῖς τοῦ πατρός μου
  english_pob_choice: in my Father’s house
  chosen_spanish: en los asuntos de mi Padre
  alternatives_spanish:
  - en la casa de mi Padre
  - en las cosas de mi Padre
  - en los negocios de mi Padre
  lexicon: BDAG
  rationale: 'El griego es elíptico: literalmente, «en las [cosas] de mi Padre». El inglés POB preserva la ambigüedad entre casa y asuntos. En español, «en los asuntos de mi Padre» conserva mejor esa amplitud semántica que cerrar demasiado pronto en «casa», aunque esa posibilidad sigue siendo contextual por la escena del templo.'
- source_word: δεῖ
  english_pob_choice: I must
  chosen_spanish: me es necesario
  alternatives_spanish:
  - debo
  - tengo que
  lexicon: BDAG
  rationale: δεῖ expresa necesidad obligatoria, a menudo con matiz de deber divino o providencial. «Me es necesario» reproduce con mayor sobriedad esa necesidad que un simple «debo» o el más coloquial «tengo que».
- source_word: εἶναί με
  english_pob_choice: be
  chosen_spanish: estar
  alternatives_spanish:
  - ser
  - permanecer
  lexicon: BDAG
  rationale: Después de δεῖ, el infinitivo εἶναι con acusativo de sujeto se vierte de forma natural como «estar» cuando el complemento implícito se entiende por el contexto. Aquí evita una expansión innecesaria y encaja con la frase elíptica.
- source_word: πατρός μου
  english_pob_choice: my Father’s
  chosen_spanish: mi Padre
  alternatives_spanish:
  - mi padre
  - de mi Padre
  lexicon: BDAG
  rationale: Se capitaliza «Padre» porque Jesús se refiere a Dios como su Padre. Esto mantiene la carga cristológica del pasaje y la distinción respecto a José.
theological_decisions:
- issue: Ambigüedad de ἐν τοῖς τοῦ πατρός μου
  english_pob_reading: Rendered as 'in my Father’s house' in the main text, with a footnote preserving 'my Father’s affairs/business'
  chosen_spanish_reading: Se opta por «en los asuntos de mi Padre» en el texto principal, dejando abierta la posibilidad de la referencia espacial del templo por el contexto.
  alternative_spanish_readings:
  - en la casa de mi Padre
  - en las cosas de mi Padre
  - en los negocios de mi Padre
  rationale: La frase griega es elíptica y verdaderamente ambigua. En español, «asuntos» conserva mejor la amplitud de sentido entre lugar y ocupación/ocupación propia del Padre. El contexto del templo permite oír la lectura espacial sin forzarla en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Referencia de 'mi Padre'
  english_pob_reading: Understood as God the Father
  chosen_spanish_reading: Se entiende como Dios Padre, no como José.
  alternative_spanish_readings:
  - mi padre terrenal
  - mi padre
  rationale: En el relato de Lucas y en el marco del templo, la expresión apunta a la filiación única de Jesús respecto de Dios. La traducción conserva esa afirmación sin añadir explicación doctrinal al texto.
  doctrine_reference: 'Affirmations: Nicene Creed; Definition of Chalcedon'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el consenso de revisión fue alto y estable, por lo que la versión española busca reflejar la misma resolución con una equivalencia natural y auditable.
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula para la referencia a Dios, en coherencia con el uso del POB.
  - Se evita «SEÑOR» porque el texto no contiene κύριος ni una cita del nombre divino en esta unidad.
  - Se conserva la tensión semántica de la frase elíptica mediante «asuntos» y una nota alternativa, en lugar de fijar sin más solo la lectura espacial.
