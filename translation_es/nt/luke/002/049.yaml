    reason: alternative_reading
  revision_rationale: 'Se ajusta el texto principal para reflejar la decisión auditada del POB inglés: en este contexto del templo, la lectura principal debe ser «en la casa de mi Padre», mientras que la ambigüedad real de la expresión griega se conserva en la nota. También se mejora la naturalidad española con «debo estar», que mantiene adecuadamente la fuerza de δεῖ.'
