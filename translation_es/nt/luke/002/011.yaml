translation:
  language: es
  text: porque hoy les nació un Salvador en la ciudad de David[a], que es el Mesías el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: "Cristo el Señor". Los títulos griegos son χριστὸς κύριος, literalmente "Mesías Señor", y generalmente se entienden como "Mesías el Señor".'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduces la explicación del anuncio angélico anterior; 'porque' expresa con naturalidad esa relación causal o explicativa en español.
- source_word: ἐτέχθη
  english_pob_choice: was born
  chosen_spanish: les ha nacido
  alternatives_spanish:
  - les nació
  - ha sido nacido para ustedes
  lexicon: BDAG
  rationale: El griego usa un aoristo pasivo de τίκτω. En español, 'les ha nacido' comunica el hecho natal y mantiene el sentido de beneficio para los oyentes. 'Les nació' es posible, pero 'ha nacido' conserva mejor el impacto del anuncio.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: les
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: BDAG
  rationale: El dativo expresa destinatarios beneficiarios; en español, el pronombre dativo 'les' integrado con 'ha nacido' comunica de forma natural que el nacimiento es para su bien.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: BDAG
  rationale: Adverbio temporal directo; 'hoy' es la forma más natural y clara en español contemporáneo.
- source_word: σωτὴρ
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - Libertador
  lexicon: BDAG
  rationale: '''Salvador'' es el equivalente estable y preciso en este contexto teológico y mesiánico; ''Libertador'' enfatizaría solo un aspecto del término.'
- source_word: χριστὸς
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Se preserva el valor titular de Χριστός como 'Mesías', conforme al criterio doctrinal del proyecto. 'Cristo' quedaría más tradicional, pero en español puede sonar más como nombre fijo que como título.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: En esta confesión cristológica, κύριος se vierte con el título reverente 'el Señor'. 'Maestro' o 'Dueño' rebajarían o desplazarían el peso teológico del término.
- source_word: ἐν πόλει Δαυίδ
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la ciudad de David, es decir, Belén
  lexicon: BDAG
  rationale: La frase se conserva de manera idiomática y directa, manteniendo la asociación davídica. No se explicita 'Belén' porque el griego solo dice 'la ciudad de David'.
theological_decisions:
- issue: Renderizado de χριστὸς κύριος
  english_pob_reading: Messiah the Lord
  chosen_spanish_reading: el Mesías, el Señor
  alternative_spanish_readings:
  - el Cristo, el Señor
  - el Mesías Señor
  rationale: El griego presenta dos títulos en aposición, y el inglés POB opta por 'Messiah the Lord' con nota sobre la lectura más tradicional. En español, 'el Mesías, el Señor' conserva el orden de títulos y evita confundir el título μεσías con el nombre litúrgico 'Cristo'.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Χριστός cuando es título → Mesías; κύριος → Señor.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió la oscilación entre ''Christ'' y ''Messiah'' en el audit trail inglés; por eso se mantiene ''el Mesías'' como traducción titular de χριστός. También se respetó el orden más cercano al griego: nacimiento → destinatarios → tiempo → lugar → identificación titulary.'
  spanish_consistency_notes:
  - Se usa 'Salvador' para σωτήρ, en armonía con el valor soteriológico del anuncio.
  - '''el Señor'' traduce κύριος como título cristológico, no como paráfrasis devocional.'
  - La nota al pie está anclada en el texto con [a], y solo se ofrece una alternativa textual documentada.
  - Se mantiene 'ciudad de David' sin añadir 'Belén', para no exceder el alcance del griego.
