translation:
  language: es
  text: ¡Gloria a Dios en las alturas, y en la tierra paz entre las personas de su favor[a][b][c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «entre las personas con quienes él está complacido».'
    reason: lexical_alternative
  - marker: b
    text: 'Algunos manuscritos leen: «y en la tierra paz, buena voluntad entre los hombres».'
    reason: textual_variant
  - marker: c
    text: Aquí «personas» traduce el valor genérico de ἀνθρώποις, aunque el griego esté en plural masculino.
    reason: cultural_note
lexical_decisions:
- source_word: Δόξα
  english_pob_choice: Glory
  chosen_spanish: ¡Gloria!
  alternatives_spanish:
  - ¡Alabanza!
  - ¡Honor!
  lexicon: BDAG
  rationale: δόξα funciona aquí como exclamación doxológica dirigida a Dios. «Gloria» conserva el peso litúrgico y teológico del término mejor que «alabanza» u «honor».
- source_word: ἐν ὑψίστοις
  english_pob_choice: in the highest
  chosen_spanish: en las alturas
  alternatives_spanish:
  - en lo más alto
  - en los cielos más altos
  lexicon: BDAG
  rationale: La expresión es idiomática para la esfera celestial más elevada. «En las alturas» es natural en español y mantiene el contraste espacial del texto.
- source_word: θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  - Dios
  lexicon: BDAG
  rationale: Aunque el dativo griego no exige una preposición en español, «Gloria a Dios» es la construcción idiomática y refleja bien el valor de referencia/ascripción.
- source_word: ἐπὶ γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: BDAG
  rationale: «En la tierra» expresa de manera natural el contraste con «en las alturas» y conserva el sentido espacial del griego.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz
  lexicon: BDAG
  rationale: El sustantivo designa paz en su sentido bíblico amplio; «paz» es la equivalencia directa y clara en español.
- source_word: ἐν ἀνθρώποις
  english_pob_choice: among people
  chosen_spanish: entre las personas
  alternatives_spanish:
  - entre los hombres
  - entre la humanidad
  lexicon: BDAG
  rationale: ἄνθρωποι es masculino plural gramatical, pero puede funcionar de manera representativa/general. En español, «entre las personas» comunica el valor genérico sin perder el alcance humano universal del término.
- source_word: εὐδοκίας
  english_pob_choice: of his good pleasure
  chosen_spanish: de su buen placer
  alternatives_spanish:
  - de su buena voluntad
  - con quienes él se complace
  lexicon: BDAG
  rationale: El genitivo εὐδοκίας en el texto adoptado califica a las personas como objeto del buen placer/favor de Dios. «Buen placer» preserva la fuerza semántica del sustantivo, aunque suene menos habitual; la alternativa más idiomática se mantiene disponible sin borrar la tensión lexical.
theological_decisions:
- issue: Sentido del genitivo εὐδοκίας en la proclamación angélica
  english_pob_reading: Peace among people of good pleasure, not a third independent clause of universal 'good will'.
  chosen_spanish_reading: Paz entre las personas de su buen placer.
  alternative_spanish_readings:
  - Paz entre las personas a quienes él favorece.
  - Paz entre las personas con quienes él se complace.
  rationale: El texto griego adoptado lee εὐδοκίας en genitivo, por lo que la paz se relaciona con personas caracterizadas por el favor/divino buen placer, no con un enunciado separado de «buena voluntad» universal. La traducción conserva esa fuerza sintáctica sin añadir un sistema doctrinal que el texto no explicita.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Tratamiento de ἄνθρωποι como plural masculino con valor genérico
  english_pob_reading: '''Men'' represents humanity in a generic sense.'
  chosen_spanish_reading: «personas» en lugar de un masculino genérico explícito.
  alternative_spanish_readings:
  - entre los hombres
  - entre la humanidad
  rationale: El español permite un genérico natural con «personas», que evita una lectura innecesariamente masculina y sigue siendo fiel al alcance representativo del griego. Se preserva la universalidad humana sin forzar una forma marcada por género en español.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: Se tomó como texto base la lectura SBLGNT con εὐδοκίας en genitivo, siguiendo el audit trail inglés que distingue esta lectura de la variante nominativa εὐδοκία. En español se mantuvo la tensión entre una traducción formal del genitivo ('de su buen placer') y una alternativa más idiomática en nota. También se ajustó el inglés auditado que había pasado de 'men' a 'people'; en español se optó por un genérico natural y readable ('personas').
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεῷ conforme al estándar del proyecto.
  - Se evita 'SEÑOR' porque el texto no contiene el tetragrámaton ni una cita directa de יהוה.
  - Se conserva el tono doxológico con puntuación exclamativa.
  - '''Buen placer'' se usa de forma consistente con la decisión de reflejar εὐδοκίας sin diluirlo en ''buena voluntad'' en el texto principal.'
