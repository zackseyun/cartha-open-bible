revisions:
- from: ¡Gloria a Dios en las alturas, y en la tierra paz entre las personas de su buen placer[a][b][c]!.
  to: ¡Gloria a Dios en las alturas, y en la tierra paz entre las personas de su favor[a][b][c]!
  rationale: Se reemplaza «de su buen placer» por «de su favor» para conservar el sentido genitival de εὐδοκίας en un español natural y eclesialmente inteligible. Se mantiene la alternativa idiomática en nota, así como la variante textual tradicional y la nota sobre el valor genérico de ἀνθρώποις. También se corrige la puntuación final.
