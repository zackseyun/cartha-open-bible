translation:
  language: es
  text: Porque él será entregado a los gentiles[a] y será objeto de burlas e insultos, y le escupirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a las naciones». Aquí el sentido se refiere específicamente a los no judíos, es decir, a los gentiles.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραδοθήσεται
  english_pob_choice: will be handed over
  chosen_spanish: será entregado
  alternatives_spanish:
  - será puesto en manos de
  - será traicionado
  lexicon: BDAG
  rationale: El futuro pasivo de παραδίδωμι pide un pasivo natural en español. «Será entregado» conserva la entrega a otras manos sin anticipar el agente ni restringirlo a traición.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Y es que
  lexicon: BDAG
  rationale: γάρ da una relación explicativa con el contexto previo. «Porque» mantiene ese enlace de manera clara y sobria en español.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the Gentiles
  chosen_spanish: a los gentiles
  alternatives_spanish:
  - a las naciones
  lexicon: BDAG
  rationale: En Lucas-Hechos, ἔθνη suele referirse a no judíos. «Gentiles» preserva ese sentido histórico-teológico mejor que «naciones» en este contexto.
- source_word: ἐμπαιχθήσεται
  english_pob_choice: will be mocked
  chosen_spanish: será burlado
  alternatives_spanish:
  - será ridiculizado
  - será objeto de burla
  lexicon: BDAG
  rationale: La idea central es la burla o escarnio. «Será burlado» es natural en español y conserva el tono de desprecio público.
- source_word: ὑβρισθήσεται
  english_pob_choice: will be insulted
  chosen_spanish: insultado
  alternatives_spanish:
  - maltratado
  - afrentado
  - tratado vergonzosamente
  lexicon: BDAG
  rationale: ὑβρίζω puede abarcar insulto y trato vergonzoso/abusivo. «Insultado» sigue de cerca la decisión inglesa revisada y mantiene la progresión de ofensas verbales y humillantes.
- source_word: ἐμπτυσθήσεται
  english_pob_choice: spit on
  chosen_spanish: escupido
  alternatives_spanish:
  - escupido encima
  - escupido sobre él
  lexicon: BDAG
  rationale: El español idiomático puede decir simplemente «escupido» en un contexto de afrenta, sin perder la concreción del acto.
theological_decisions:
- issue: Sujeto implícito de los pasivos
  english_pob_reading: Rendered as 'he', referring to the Son of Man from the preceding context
  chosen_spanish_reading: Se mantiene el sujeto implícito en «él», referido al Hijo del Hombre del contexto inmediato
  alternative_spanish_readings:
  - será entregado a los gentiles y será burlado... (sin sujeto explícito)
  - el Hijo del Hombre será entregado...
  rationale: El griego usa pasivos en tercera persona singular sin sujeto expreso, pero el antecedente está claro en el contexto inmediato. «Él» hace la oración natural en español sin añadir contenido nuevo.
  doctrine_reference: Principio de claridad referencial en traducción bíblica
- issue: Reproducción de la secuencia de agravios
  english_pob_reading: mocked and insulted and spit on
  chosen_spanish_reading: burlado e insultado y escupido
  alternative_spanish_readings:
  - burlado y maltratado y escupido
  - burlado y tratado vergonzosamente y escupido
  rationale: La secuencia conserva el escalonamiento de humillación y no neutraliza la dureza de los verbos griegos. «Insultado» mantiene la lectura revisada en el audit trail.
  doctrine_reference: Fidelidad léxica y retención de tensiones semánticas
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que sustituyó 'mistreated' por 'insulted' para reflejar con más precisión ὑβρισθήσεται. En español se optó por «insultado» para alinearse con esa decisión auditada, sin perder la posibilidad semántica más amplia de humillación/afrenta que queda documentada en las alternativas.
  spanish_consistency_notes:
  - Se mantiene «gentiles» para ἔθνεσιν conforme al uso lucano-acts.
  - Se usa «será entregado» como pasivo natural y amplio, evitando «traicionado» por ser demasiado específico.
  - «Burlado e insultado y escupido» conserva el encadenamiento de καὶ... καὶ... καὶ sin sobreexplicar.
  - No se emplea «Señor» ni otro sustituto para el nombre divino, pues no aparece en este versículo.
