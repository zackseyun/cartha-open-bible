  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido general del griego: pasivos futuros coordinados, entrega a los gentiles, burla, insulto y escupitajos. Sin embargo, «será burlado» suena menos natural que «será objeto de burlas» o «se burlarán de él», y «escupido» sin complemento resulta incompleto en español para ἐμπτυσθήσεται, que aquí significa claramente «escupido encima / escupido sobre él», es decir, «escupido». También falta reflejar la nota léxica preservada en el audit trail para ἔθνεσιν.'
  spanish_quality_summary: El texto es comprensible y bastante fiel, pero necesita un ajuste menor de naturalidad e idiomaticidad. «Porque él será entregado a los gentiles y será objeto de burlas e insultos y escupido[a]» lee mejor en español eclesial moderno. Conviene además evitar la coordinación mixta «será burlado e insultado y escupido» cuando el primer verbo no es la opción más idiomática.
  glossary_alignment: «gentiles» está bien y coincide con la decisión del proyecto para τοῖς ἔθνεσιν. No hay términos teológicos problemáticos. La revisión propuesta mantiene la fuerza pasiva de παραδοθήσεται y la secuencia de humillaciones del griego.
  issues:
  - severity: medium
    issue: «será burlado» es poco idiomático en este contexto
    rationale: Aunque se entiende, en español bíblico natural suena mejor «será objeto de burlas» o una construcción con «se burlarán de él». La forma actual parece calco innecesario.
  - severity: medium
    issue: «escupido» queda demasiado elíptico en español
    rationale: Para ἐμπτυσθήσεται, el español normalmente requiere una expresión como «escupido encima» o, más naturalmente en este contexto, «le escupirán». La forma actual suena truncada.
  - severity: low
    issue: Falta la nota alternativa para «gentiles» / «naciones»
    rationale: El audit trail inglés preserva una alternativa léxica relevante para τοῖς ἔθνεσιν. En español conviene conservarla con una nota equivalente.
  revised_spanish_text: Porque él será entregado a los gentiles[a] y será objeto de burlas e insultos, y le escupirán.
  revised_footnotes:
  - marker: a
    text: O «a las naciones». Aquí el sentido se refiere específicamente a los no judíos, es decir, a los gentiles.
    reason: lexical_alternative
