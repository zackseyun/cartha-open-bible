translation:
  language: es
  text: 'Entonces Pedro dijo[a]: «Mira, nosotros hemos dejado lo nuestro y te hemos seguido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que era nuestro» o «nuestras posesiones». La expresión griega es amplia y no especifica con exactitud qué dejaron Pedro y los demás.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν δὲ
  english_pob_choice: Then said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Y dijo
  - Luego dijo
  lexicon: BDAG
  rationale: δὲ marca continuación narrativa; «Entonces» transmite esa transición de manera natural en español. «Dijo» conserva el valor básico de λέγω sin añadir matiz interpretativo.
- source_word: ὁ Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - el Pedro
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico y contemporáneo.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - He aquí
  lexicon: BDAG
  rationale: Ἰδοὺ funciona como llamada de atención; «Mira» conserva la fuerza directa con naturalidad en español moderno. «He aquí» sería más tradicional pero menos idiomático.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito mantiene el énfasis del griego. En español no hace falta reforzarlo más allá de «nosotros» en este contexto.
- source_word: ἀφέντες τὰ ἴδια
  english_pob_choice: we have left our own
  chosen_spanish: hemos dejado lo nuestro
  alternatives_spanish:
  - hemos dejado lo propio
  - hemos dejado nuestras cosas
  - hemos dejado nuestras posesiones
  lexicon: BDAG
  rationale: La expresión griega es amplia y no especifica qué dejaron. «Lo nuestro» preserva esa amplitud mejor que concretar «posesiones» o «cosas». El perfecto español refleja bien la acción pasada con relevancia presente en la declaración de Pedro.
- source_word: ἠκολουθήσαμέν σοι
  english_pob_choice: followed you
  chosen_spanish: te hemos seguido
  alternatives_spanish:
  - te seguimos
  - hemos seguido a ti
  lexicon: BDAG
  rationale: ἀκολουθέω con dativo es el verbo normal de seguimiento discipular. «Te hemos seguido» comunica tanto el movimiento físico como el sentido de discipulado sin sobreparafrasear.
translation_notes:
  revision_awareness: La redacción inglesa final del POB redujo «our own things» a «our own» para reflejar mejor la amplitud de τὰ ἴδια. La versión española sigue esa misma revisión con «lo nuestro», evitando concretar el objeto dejado.
  spanish_consistency_notes:
  - Se conserva el tono narrativo sobrio y directo del POB.
  - «Lo nuestro» mantiene la amplitud semántica documentada en el auditorio inglés.
  - Se evita «seguido a ti» porque en español natural el clítico de objeto directo con «seguir» expresa bien el dativo griego aquí.
