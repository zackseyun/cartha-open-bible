review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura interrogativa y las decisiones principales del griego: θεὸς = «Dios», οὐ μὴ ποιήσῃ como pregunta retórica fuerte, ἐκδίκησιν con sentido forense, ἐκλεκτῶν como sustantivo, βοώντων αὐτῷ «claman a él», e ἡμέρας καὶ νυκτός «día y noche». Sin embargo, la línea principal para μακροθυμεῖ ἐπ’ αὐτοῖς se aparta de la decisión auditada del POB inglés, que puso en texto principal la lectura de demora («Will he delay long over them?») y dejó la lectura de paciencia en nota. Además, «sobre ellos» suena demasiado calcado y no es español natural para ἐπ’ αὐτοῖς en este contexto.'
  spanish_quality_summary: 'El español es en general claro y eclesialmente legible, pero requiere una reparación menor. «¿Y será paciente sobre ellos?» es poco idiomático; en español natural sería «con ellos», pero aun así no seguiría la opción principal documentada por el POB. También conviene simplificar la nota a una formulación más natural y precisa en español. El resto del verso lee bien: «¿Y Dios no hará justicia a sus escogidos, los que claman a él día y noche?»'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» es correcto; no aparecen Yahvé, Mesías, Espíritu, etc. «Escogidos» es aceptable para ἐκλεκτῶν, aunque «los escogidos» fluye mejor en español. «Hará justicia» alinea bien con la justificación léxica de ἐκδίκησις.
  issues:
  - severity: high
    issue: La línea principal de μακροθυμεῖ ἐπ’ αὐτοῖς no sigue la decisión auditada del POB inglés.
    rationale: El English POB fijó como texto principal «Will he delay long over them?» y reservó la lectura de paciencia para nota. El borrador invierte esa decisión sin nueva justificación fuente-suficiente.
  - severity: medium
    issue: «será paciente sobre ellos» es un calco poco natural en español.
    rationale: La preposición «sobre» no expresa bien ἐπ’ αὐτοῖς aquí. En español natural serían opciones como «con ellos» o, mejor siguiendo el POB, «tardará mucho en actuar por ellos / con respecto a ellos».
  - severity: low
    issue: La nota de ἐκδίκησις contiene un anglicismo técnico innecesario.
    rationale: «redress judicial» puede expresarse mejor como «reparación judicial» o simplemente «amparo o vindicación judicial», más natural para lectores hispanos.
  revised_spanish_text: ¿Y Dios no hará justicia[a] a sus escogidos, los que claman a él día y noche? ¿Tardará mucho en actuar por ellos[b]?
  revised_footnotes:
