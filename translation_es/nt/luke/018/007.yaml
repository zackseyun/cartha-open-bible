translation:
  language: es
  text: ¿Y Dios no hará justicia[a] a sus escogidos, los que claman a él día y noche? ¿Tardará mucho en actuar por ellos[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vindicación» o «hacerles justicia»; ἐκδίκησις puede expresar amparo o vindicación judicial más que venganza.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «aunque es paciente con ellos» o «¿y es paciente con ellos?». La frase griega también puede entenderse en términos de paciencia o longanimidad, no solo de demora.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκδίκησιν
  english_pob_choice: bring justice
  chosen_spanish: hará justicia
  alternatives_spanish:
  - les dará vindicación
  - hará vindicación
  - les hará justicia
  lexicon: BDAG
  rationale: ἐκδίκησις aquí apunta a redress judicial o vindicación, no a venganza personal. «Hará justicia» conserva el sentido forense en español natural y sigue la decisión auditada del POB inglés.
- source_word: ἐκλεκτῶν
  english_pob_choice: chosen ones
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - los escogidos
  - los electos
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente. «Escogidos» comunica la elección divina sin recurrir a «electos», que suena más técnico o eclesiástico en español.
- source_word: βοώντων
  english_pob_choice: who cry out
  chosen_spanish: los que claman
  alternatives_spanish:
  - los que gritan
  - los que llaman
  - los que claman a él
  lexicon: BDAG
  rationale: El participio expresa súplica insistente y urgente. «Claman» mantiene el tono de oración apremiante y es un equivalente natural de «cry out».
- source_word: ἡμέρας καὶ νυκτός
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - noche y día
  - sin cesar
  - continuamente
  lexicon: BDAG
  rationale: La expresión idiomática se conserva literalmente porque es clara en español y mantiene la intensidad temporal de la petición continua.
- source_word: μακροθυμεῖ ἐπ’ αὐτοῖς
  english_pob_choice: Will he delay long over them?
  chosen_spanish: ¿Y será paciente sobre ellos?[b]
  alternatives_spanish:
  - ¿Y tardará en atenderlos?
  - ¿Y los dejará esperando mucho tiempo?
  - ¿Y se mostrará paciente con ellos?
  lexicon: BDAG
  rationale: μακροθυμέω puede implicar paciencia/longanimidad o demora. Dado que el griego permite la tensión y el contexto inmediato (v. 8) enfatiza vindicación pronta, la redacción principal conserva la posibilidad de paciencia, mientras la nota ofrece la alternativa de demora.
- source_word: οὐ μὴ ποιήσῃ
  english_pob_choice: will not ... bring
  chosen_spanish: no hará
  alternatives_spanish:
  - ciertamente hará
  - no dejará de hacer
  - de ningún modo hará
  lexicon: BDAG
  rationale: οὐ μή con aoristo subjuntivo expresa una negación enfática con expectativa de respuesta afirmativa. En español, la forma interrogativa con «¿no hará?» transmite esa fuerza de modo natural.
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: BDAG
  rationale: Traducción estándar; no requiere ampliación porque el artículo griego marca el sujeto sin añadir un matiz especial.
theological_decisions:
- issue: Sentido de μακροθυμεῖ ἐπ’ αὐτοῖς en relación con la prontitud de la respuesta divina
  english_pob_reading: 'Rendered as a question about delaying action: ''Will he delay long over them?'''
  chosen_spanish_reading: «¿Y será paciente sobre ellos?» con nota alternativa sobre demora.
  alternative_spanish_readings:
  - «¿Y tardará en atenderlos?»
  - «¿Y será longánime con ellos?»
  - «¿Y los dejará esperando?»
  rationale: El texto griego admite una lectura de paciencia/longanimidad o de demora en actuar. Para no borrar esa tensión, la línea principal conserva la posibilidad de paciencia, y la nota registra la lectura de demora que armoniza con el argumento del pasaje.
  doctrine_reference: Preservar la tensión exegética sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'Concordante con el audit trail inglés: se mantiene la justicia/vindicación para ἐκδίκησις, «escogidos» para ἐκλεκτῶν, «claman» para βοώντων, y se preserva la ambigüedad de μακροθυμεῖ ἐπ’ αὐτοῖς mediante una nota alternativa sin resolverla de forma dogmática.'
  spanish_consistency_notes:
  - Se usa «Dios» sin disfrazar el nombre divino, conforme al texto fuente griego.
  - Se conserva el orden interrogativo para reproducir la fuerza retórica del original.
  - «Escogidos» se usa como sustantivo colectivo, no como término técnico denominacional.
  - La nota de μακροθυμεῖ distingue paciencia de demora para no eliminar la tensión del griego.
  - La puntuación con dos preguntas reproduce las dos cláusulas interrogativas del versículo.
