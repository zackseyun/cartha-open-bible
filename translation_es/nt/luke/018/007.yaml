revisions:
- from: ¿Y Dios no hará justicia[a] a sus escogidos, los que claman a él día y noche? ¿Y será paciente sobre ellos[b]?
  to: ¿Y Dios no hará justicia[a] a sus escogidos, los que claman a él día y noche? ¿Tardará mucho en actuar por ellos[b]?
