translation:
  language: es
  text: Y después de azotarlo, lo matarán, y al tercer día se levantará.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «será levantado». El griego aquí es más directamente «se levantará».
    reason: alternative_reading
lexical_decisions:
- source_word: μαστιγώσαντες
  english_pob_choice: after flogging
  chosen_spanish: después de azotarlo
  alternatives_spanish:
  - habiéndolo azotado
  - después de flagelarlo
  - después de darle azotes
  lexicon: BDAG
  rationale: El participio aoristo antecedente se expresa naturalmente en español con una construcción temporal previa. «Azotar» conserva el sentido brutal del verbo griego y suena más directo y actual que «flagelar», que aunque posible es más técnico o eclesiástico.
- source_word: ἀποκτενοῦσιν
  english_pob_choice: they will kill
  chosen_spanish: lo matarán
  alternatives_spanish:
  - lo darán muerte
  - lo pondrán a muerte
  - lo asesinarán
  lexicon: BDAG
  rationale: El futuro activo plural exige una traducción futura simple. «Matarán» reproduce el valor léxico básico sin añadir la carga moral específica de «asesinarán», que no está explícita en el verbo.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - le
  lexicon: BDAG
  rationale: El pronombre de objeto directo se expresa de forma natural en español como «lo», manteniendo la referencia a Jesús/Hijo del Hombre sin sobrecargar la frase.
- source_word: τῇ ἡμέρᾳ τῇ τρίτῃ
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - el tercer día
  lexicon: BDAG
  rationale: La dativa de tiempo se vierte idiomáticamente con «al». Esta forma es natural en español bíblico moderno y conserva la referencia temporal exacta sin expansión interpretativa.
- source_word: ἀναστήσεται
  english_pob_choice: he will rise
  chosen_spanish: se levantará
  alternatives_spanish:
  - resucitará
  - será levantado
  lexicon: BDAG
  rationale: El futuro medio de ἀνίστημι se traduce de manera intransitiva, reflejando la lectura más directa del griego. «Se levantará» conserva el movimiento verbal del texto fuente y evita introducir de entrada una pasiva que el griego no usa aquí. «Resucitará» es posible en español cristiano, pero interpreta de modo más explícito el resultado teológico; «será levantado» expresa una lectura alternativa pasiva.
theological_decisions:
- issue: Forma de la resurrección
  english_pob_reading: he will rise
  chosen_spanish_reading: se levantará
  alternative_spanish_readings:
  - resucitará
  - será levantado
  rationale: Se preserva la tensión documentada entre el griego medio/intransitivo y la teología pasiva de otros pasajes. «Se levantará» sigue más de cerca la forma del texto, mientras que «resucitará» o «será levantado» serían interpretaciones posibles pero menos directas aquí.
  doctrine_reference: Mantener la tensión entre forma verbal y doctrina de la resurrección sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'El pasaje coincide en sustancia con el control inglés POB y el análisis griego: participio aoristo de acción previa, futuro activo para la muerte y futuro medio/intransitivo para la resurrección. No hubo cambios textuales en la revisión reciente; la única tensión relevante es la posible alternancia entre «se levantará» y una lectura pasiva teológica.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece aquí un tetragrámaton ni una cita explícita que lo requiera.
  - Se prefirió «azotarlo» sobre «flagelarlo» por claridad pública y correspondencia con el grado de violencia del verbo griego.
  - «Al tercer día» mantiene la fórmula bíblica natural en español.
  - La nota al pie conserva la alternativa pasiva documentada por el audit trail inglés.
