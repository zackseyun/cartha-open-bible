translation:
  language: es
  text: 'Dos hombres subieron al templo[a] a orar: uno era fariseo y el otro, recaudador de impuestos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἱερόν se refiere al templo como complejo o recinto, no específicamente al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνθρωποι δύο
  english_pob_choice: Two men
  chosen_spanish: Dos hombres
  alternatives_spanish:
  - Dos personas
  - Dos seres humanos
  lexicon: BDAG
  rationale: ἄνθρωποι puede ser genérico, pero el contexto inmediato presenta a dos individuos masculinos concretos (ὁ εἷς... καὶ ὁ ἕτερος). Por eso, como en la decisión inglesa, «hombres» conserva la referencia de género sin volver el texto artificial.
- source_word: ἀνέβησαν
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron
  - ascendieron
  lexicon: BDAG
  rationale: ἀναβαίνω significa literalmente subir/ascender. «Subieron» comunica el movimiento de forma natural en español y preserva la imagen de ir hacia un lugar elevado.
- source_word: εἰς τὸ ἱερὸν
  english_pob_choice: into the temple
  chosen_spanish: al templo[a]
  alternatives_spanish:
  - al recinto del templo
  - al complejo del templo
  lexicon: BDAG
  rationale: ἱερόν denota el complejo o recinto del templo, no el santuario interior (ναός). En español, «templo» es la opción más clara y readable; la nota documenta la precisión lexical sin sobrecargar el texto principal.
- source_word: προσεύξασθαι
  english_pob_choice: to pray
  chosen_spanish: a orar
  alternatives_spanish:
  - para orar
  - a hacer oración
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa finalidad. En español, la construcción «subieron... a orar» reproduce de forma natural el propósito indicado por el griego.
- source_word: Φαρισαῖος
  english_pob_choice: a Pharisee
  chosen_spanish: fariseo
  alternatives_spanish:
  - un fariseo
  lexicon: BDAG
  rationale: «Fariseo» es el equivalente estable y comprensible en español para el grupo religioso judío designado por Φαρισαῖος.
- source_word: τελώνης
  english_pob_choice: a tax collector
  chosen_spanish: recaudador de impuestos
  alternatives_spanish:
  - cobrador de impuestos
  - publicano
  lexicon: BDAG
  rationale: τελώνης designa a un cobrador de impuestos o peajes. «Recaudador de impuestos» es claro y actual en español; se evita «publicano» por ser arcaico y potencialmente ambiguo para lectores modernos.
theological_decisions:
- issue: Alcance de ἱερόν frente a ναός
  english_pob_reading: temple
  chosen_spanish_reading: templo
  alternative_spanish_readings:
  - recinto del templo
  - complejo del templo
  rationale: La escena ocurre en el espacio del templo en general, no en el santuario interior. Mantener «templo» conserva la lectura pública y devocional, mientras la nota deja constancia de la precisión lexical.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de ἄνθρωποι en el contexto
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - personas
  - seres humanos
  rationale: Aunque el sustantivo puede ser genérico, el contexto inmediato identifica dos varones concretos. Traducir «hombres» sigue la decisión auditable de mantener la referencia masculina explícita.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue la lectura estable del registro inglés auditado, sin cambios en la decisión textual ni en la valoración lexical; se conserva la distinción entre ἱερόν y ναός mediante nota, y la referencia masculina explícita de ἄνθρωποι se mantiene por el contexto inmediato.
  spanish_consistency_notes:
  - «Templo» se usa en sentido del recinto/complexo del templo, no como traducción de ναός.
  - «Recaudador de impuestos» evita el arcaísmo de «publicano» y mantiene claridad moderna.
  - «Dos hombres» refleja el contraste distributivo con «uno... y el otro».
