translation:
  language: es
  text: Y al oír pasar una multitud, preguntaba qué significaba esto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: hearing
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyó
  - después de oír
  lexicon: BDAG
  rationale: El participio aoristo se vierte como construcción circunstancial en español para conservar la relación temporal sin volver la frase pesada; "al oír" comunica bien la acción previa en el flujo narrativo.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Entonces
  - Y, al
  lexicon: BDAG
  rationale: δέ funciona como enlace narrativo suave; "Y" preserva continuidad sin introducir contraste fuerte ni explicitar una transición que el griego no exige.
- source_word: ὄχλου
  english_pob_choice: a crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - una multitud
  - el gentío
  - la gente
  lexicon: BDAG
  rationale: En este contexto la referencia es al grupo que va pasando por el camino. "Multitud" es natural en español bíblico y conserva el valor colectivo del ὄχλος sin volverlo demasiado general.
- source_word: διαπορευομένου
  english_pob_choice: passing by
  chosen_spanish: pasar
  alternatives_spanish:
  - ir pasando
  - transitar
  - pasando
  lexicon: BDAG
  rationale: El participio presente indica movimiento en curso; con "al oír pasar" se reproduce esa acción simultánea de manera idiomática en español.
- source_word: ἐπυνθάνετο
  english_pob_choice: he was asking
  chosen_spanish: preguntaba
  alternatives_spanish:
  - andaba preguntando
  - seguía preguntando
  - inquiría
  lexicon: BDAG
  rationale: El imperfecto medio expresa acción en desarrollo o reiterada. "Preguntaba" refleja ese aspecto sin forzar una perífrasis excesiva; "inquiría" sería posible pero menos natural para lectura pública.
- source_word: τί εἴη τοῦτο
  english_pob_choice: what this meant
  chosen_spanish: qué era aquello
  alternatives_spanish:
  - qué era eso
  - qué significaba aquello
  - qué podía ser eso
  lexicon: BDAG
  rationale: La pregunta indirecta con optativo admite una traducción sobria que no sobreinterprete. "Qué era aquello" mantiene la referencia inmediata y deja abierta la implicación de sentido; "qué significaba aquello" interpreta más explícitamente el alcance contextual.
translation_notes:
  revision_awareness: La revisión inglesa cambió de una lectura más inceptiva ('he began asking') a una imperfectiva ('he was asking') y de una formulación más literal ('what this was') a otra más idiomática ('what this meant'). En español se optó por una solución que conserva el imperfecto narrativo mediante 'preguntaba' y evita una paráfrasis interpretativa excesiva con 'qué era aquello'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no aparece aquí el Tetragrámaton ni una cita explícita del nombre divino.
  - Se mantiene 'multitud' como término narrativo estándar para ὄχλος en este contexto.
  - No se introduce nota textual porque el versículo no presenta variante relevante en el paquete fuente provisto.
