revisions:
- from: Y ellos no entendieron ninguna de estas cosas[a], y esta palabra[b] estaba oculta para ellos, y no entendían lo que se decía[c].
  to: Y ellos no comprendieron ninguna de estas cosas[a], y este dicho[b] les estaba oculto[c], y no entendían lo que se decía[d].
  rationale: Se ajusta ῥῆμα a «dicho» para un español más natural y más alineado con la revisión inglesa contextual; se añade la nota faltante sobre el pasivo sin agente; y se mejora la variación léxica entre συνῆκαν y ἐγίνωσκον usando «comprendieron ... entendían» sin alterar el sentido fuente. «Les estaba oculto» preserva la pasividad y suena mejor en español que «estaba oculta para ellos».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:02:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la triple descripción de la incomprensión: no entendieron nada de esto, el dicho/expresión estaba oculto, y no entendían lo que se decía. Sin embargo, hay dos desajustes importantes con el griego y con la auditoría inglesa: (1) τὸ ῥῆμα τοῦτο se traduce mejor aquí como «este dicho» o «estas palabras» que «esta palabra», ya que en español «esta palabra» suena demasiado literal y menos natural en contexto; además la revisión inglesa ya prefirió «this saying». (2) κεκρυμμένον ἀπ’ αὐτῶν se expresa más fiel e idiomáticamente como «estaba oculto de ellos» o mejor «les estaba oculto» / «estaba oculto para ellos»; pero como el referente es neutro singular («dicho»), el borrador tiene discordancia de género al decir «esta palabra ... estaba oculta».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «esta palabra» suena forzado en este contexto narrativo, y la combinación con «estaba oculta para ellos» resulta menos natural que «este dicho les estaba oculto» o «este dicho estaba oculto para ellos». También conviene mantener cierta distinción léxica entre la primera y la tercera cláusula; usar «comprendieron» primero y «entendían» después mejora la variación sin perder sentido. El resto del verso fluye bien.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones sobre συνῆκαν, ῥῆμα, κεκρυμμένον y τὰ λεγόμενα deben seguir la evidencia fuente y la racionalidad POB: preservar la pasividad sin nombrar agente, y mantener la descripción triple de la incomprensión. La nota inglesa sobre el pasivo oculto debe preservarse también en español, porque se perdió en el borrador.'
  issues:
  - severity: medium
    issue: «esta palabra» para τὸ ῥῆμα τοῦτο suena demasiado literal y menos contextual
    rationale: Aunque ῥῆμα puede ser «palabra», en este contexto de un anuncio de Jesús el español natural y fiel prefiere «este dicho» o «estas palabras». La auditoría inglesa revisada ya cambió a «this saying» por naturalidad contextual.
  - severity: medium
    issue: Falta la nota sobre el pasivo sin agente en «was hidden from them»
    rationale: 'La auditoría inglesa conserva una nota teológica/gramatical importante: el pasivo no especifica quién lo ocultó. El borrador español omite esa nota y con ello pierde una decisión documentada.'
  - severity: low
    issue: Repetición de «entendieron / entendían» aplana levemente la variación léxica
    rationale: El griego usa συνῆκαν y ἐγίνωσκον. Aunque ambos pueden expresar comprensión, conviene reflejar la capa doble con una leve variación en español, por ejemplo «comprendieron ... entendían», sin forzar una diferencia artificial.
  revised_spanish_text: Y ellos no comprendieron ninguna de estas cosas[a], y este dicho[b] les estaba oculto[c], y no entendían lo que se decía[d].
  revised_footnotes:
  - marker: a
    text: O «entendieron» o «captaron» para «comprendieron».
    reason: lexical_alternative
  - marker: b
    text: O «esta palabra» o «este mensaje».
    reason: lexical_alternative
  - marker: c
    text: El pasivo «les estaba oculto» no especifica quién o qué lo ocultó.
    reason: alternative_reading
  - marker: d
    text: O «las cosas que se decían».
    reason: lexical_alternative
  revision_rationale: Se ajusta ῥῆμα a «dicho» para un español más natural y más alineado con la revisión inglesa contextual; se añade la nota faltante sobre el pasivo sin agente; y se mejora la variación léxica entre συνῆκαν y ἐγίνωσκον usando «comprendieron ... entendían» sin alterar el sentido fuente. «Les estaba oculto» preserva la pasividad y suena mejor en español que «estaba oculta para ellos».
