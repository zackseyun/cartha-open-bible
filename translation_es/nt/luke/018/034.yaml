translation:
  language: es
  text: Y ellos no comprendieron ninguna de estas cosas[a], y este dicho[b] les estaba oculto[c], y no entendían lo que se decía[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entendieron» o «captaron» para «comprendieron».
    reason: lexical_alternative
  - marker: b
    text: O «esta palabra» o «este mensaje».
    reason: lexical_alternative
  - marker: c
    text: El pasivo «les estaba oculto» no especifica quién o qué lo ocultó.
    reason: alternative_reading
  - marker: d
    text: O «las cosas que se decían».
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆκαν
  english_pob_choice: understood
  chosen_spanish: entendieron
  alternatives_spanish:
  - comprendieron
  - captaron
  lexicon: BDAG
  rationale: συνίημι expresa comprensión intelectual de lo que Jesús acababa de decir. «Entendieron» es natural en español y conserva el sentido cognitivo sin añadir una respuesta espiritual que el texto no explicita.
- source_word: οὐδὲν τούτων
  english_pob_choice: none of these things
  chosen_spanish: ninguna de estas cosas
  alternatives_spanish:
  - nada de esto
  - ninguna de estas
  lexicon: BDAG
  rationale: El demostrativo genitivo plural apunta al conjunto de anuncios previos. «Ninguna de estas cosas» mantiene con claridad la referencia plural y el alcance acumulativo.
- source_word: τὸ ῥῆμα τοῦτο
  english_pob_choice: this saying / this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este dicho
  - este mensaje
  - este asunto
  lexicon: BDAG
  rationale: ῥῆμα puede referirse a palabra, dicho, mensaje o asunto. «Palabra» conserva la forma más cercana al griego y suena natural en español; no se fija el matiz como si fuera solo un enunciado o solo el contenido.
- source_word: κεκρυμμένον ἀπ’ αὐτῶν
  english_pob_choice: was hidden from them
  chosen_spanish: estaba oculta para ellos
  alternatives_spanish:
  - estaba escondida de ellos
  - había sido ocultada para ellos
  lexicon: BDAG
  rationale: La construcción perifrástica con participio perfecto pasivo expresa un estado resultante. «Estaba oculta para ellos» conserva la pasividad y no identifica al agente del ocultamiento.
- source_word: ἐγίνωσκον
  english_pob_choice: did not understand
  chosen_spanish: no entendían
  alternatives_spanish:
  - no sabían
  - no reconocían
  lexicon: BDAG
  rationale: γινώσκω aquí se superpone con comprender, pero conviene no repetir exactamente el mismo verbo de la primera cláusula. «No entendían» reproduce la capa de incomprensión sin borrar la distinción léxica.
- source_word: τὰ λεγόμενα
  english_pob_choice: the things being said
  chosen_spanish: lo que se decía
  alternatives_spanish:
  - las cosas que se decían
  - lo que estaba siendo dicho
  lexicon: BDAG
  rationale: El participio presente pasivo señala el contenido en curso de la խոսa. «Lo que se decía» es idiomático en español y conserva la referencia al habla actual sin endurecer la frase.
theological_decisions:
- issue: Naturaleza de la ocultación de la comprensión
  english_pob_reading: Retain the text's threefold description of incomprehension without specifying whether the concealment is divine, providential, or simply narrative.
  chosen_spanish_reading: Mantener la triple descripción de incomprensión sin precisar si el ocultamiento es divino, providencial o solo narrativo.
  alternative_spanish_readings:
  - Interpretar el ocultamiento como acción explícita de Dios
  - Interpretar el ocultamiento como mera confusión psicológica
  rationale: El pasivo «estaba oculta» deja sin nombrar al agente. En español conviene preservar esa tensión teológica y narrativa en vez de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que prefirió un equivalente más natural para ῥῆμα y una expresión que preserva la distinción entre συνῆκαν y ἐγίνωσκον. También conserva el pasivo sin agente explícito en el segundo miembro.
  spanish_consistency_notes:
  - Se usa «Yahvé» en toda la serie bíblica según el estándar del proyecto; este versículo no contiene el tetragrámaton.
  - Se mantiene la diferencia entre «entendieron» y «no entendían» para reflejar la variación léxica del griego.
  - «Palabra» se usa aquí como rendering de ῥῆμα, con la alternativa documentada en nota para lectores que prefieran enfatizar el acto de decir.
