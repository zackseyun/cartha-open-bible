translation:
  language: es
  text: Pero cuando oyó estas cosas[a], se puso muy triste, porque era extremadamente rico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «profundamente afligido». El adjetivo griego indica una tristeza o angustia intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: when he heard
  chosen_spanish: cuando oyó
  alternatives_spanish:
  - después de oír
  - al oír
  lexicon: BDAG
  rationale: El participio aoristo tiene valor temporal en este contexto; en español, «cuando oyó» comunica con naturalidad la secuencia de reacción sin volverla demasiado literal.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  lexicon: BDAG
  rationale: El demostrativo plural se refiere a lo dicho por Jesús inmediatamente antes. «Estas cosas» conserva el plural y la referencia amplia del griego.
- source_word: περίλυπος
  english_pob_choice: very sorrowful
  chosen_spanish: muy triste
  alternatives_spanish:
  - profundamente afligido
  - sumamente dolido
  lexicon: BDAG
  rationale: El adjetivo expresa una tristeza intensa o gran aflicción. «Muy triste» es claro y natural en español; «profundamente afligido» sería una alternativa más intensa, pero menos directa.
- source_word: ἐγενήθη
  english_pob_choice: he became
  chosen_spanish: se puso
  alternatives_spanish:
  - llegó a estar
  - se volvió
  lexicon: BDAG
  rationale: γίνομαι aquí indica entrada en un estado. En español, «se puso» refleja bien el cambio de estado y suena más natural que un calco como «llegó a ser».
- source_word: πλούσιος
  english_pob_choice: rich
  chosen_spanish: rico
  alternatives_spanish:
  - adinerado
  - muy rico
  lexicon: BDAG
  rationale: «Rico» es el equivalente directo y más transparente. Mantiene el valor léxico sin introducir matices sociales ajenos al texto.
- source_word: σφόδρα
  english_pob_choice: extremely
  chosen_spanish: extremadamente
  alternatives_spanish:
  - muchísimo
  - muy
  lexicon: BDAG
  rationale: El adverbio intensifica con fuerza el adjetivo. «Extremadamente» conserva esa intensidad mejor que un simple «muy» y sigue siendo idiomático en español.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste con la escena anterior y con la reacción del hombre. «Pero» reproduce con claridad ese valor adversativo.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la explicación de su tristeza. En español, «porque» expresa de forma natural la relación causal del texto.
translation_notes:
  revision_awareness: 'Esta versión sigue de cerca el griego SBLGNT y concuerda con el audit trail inglés: mantiene el contraste inicial, el valor temporal del participio, el cambio de estado de γίνομαι, la intensidad de περίλυπος y el intensificador σφόδρα sin suavizarlos indebidamente.'
  spanish_consistency_notes:
  - Se usa «rico» de manera consistente con la traducción de πλούσιος en el resto del proyecto.
  - Se evita «Señor» u otras fórmulas no presentes en el texto.
  - «Muy triste» en el cuerpo principal se acompaña de una nota para preservar la alternativa de mayor intensidad documentada en el inglés POB.
