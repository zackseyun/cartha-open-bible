translation:
  language: es
  text: 'Pero el recaudador de impuestos[a], de pie a lo lejos, no quería ni siquiera alzar los ojos al cielo, sino que se golpeaba el pecho, diciendo: «Dios, ten misericordia de mí[b], el pecador».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «publicano»; «recaudador de impuestos» expresa el oficio en español actual.
    reason: lexical_alternative
  - marker: b
    text: O «sé propicio para mí»; el verbo se relaciona con el lenguaje de la expiación y la propiciación.
    reason: lexical_alternative
lexical_decisions:
- source_word: τελώνης
  english_pob_choice: tax collector
  chosen_spanish: recaudador de impuestos
  alternatives_spanish:
  - publicano
  - cobrador de impuestos
  lexicon: BDAG
  rationale: «Recaudador de impuestos» comunica el oficio con claridad para el lector moderno y evita «publicano», que en español bíblico tradicional puede sonar arcaico o eclesiástico. «Cobrador de impuestos» es posible, pero «recaudador» conserva mejor el matiz oficial del cargo.
- source_word: μακρόθεν
  english_pob_choice: far off
  chosen_spanish: a lo lejos
  alternatives_spanish:
  - lejos
  - desde lejos
  lexicon: BDAG
  rationale: «A lo lejos» es una forma natural en español y conserva la distancia espacial y la postura humilde implícita en el contexto.
- source_word: ἑστὼς
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - estando en pie
  - puesto en pie
  lexicon: BDAG
  rationale: El participio se expresa con naturalidad en español con «de pie», manteniendo la postura sin sonar forzado.
- source_word: οὐκ ἤθελεν οὐδὲ
  english_pob_choice: was not willing even
  chosen_spanish: no quería ni siquiera
  alternatives_spanish:
  - no estaba dispuesto ni siquiera
  - no quiso ni siquiera
  lexicon: BDAG
  rationale: «No quería ni siquiera» refleja bien la voluntad o renuencia de θέλω y conserva el énfasis del doble negativo griego.
- source_word: ἐπᾶραι εἰς τὸν οὐρανόν
  english_pob_choice: to lift up his eyes to heaven
  chosen_spanish: alzar los ojos al cielo
  alternatives_spanish:
  - levantar los ojos al cielo
  - mirar al cielo
  lexicon: BDAG
  rationale: La imagen idiomática se mantiene en español con una expresión natural y reverente. «Cielo» es más idiomático que «cielo» en español bíblico moderno para este contexto.
- source_word: ἔτυπτε
  english_pob_choice: kept beating
  chosen_spanish: se golpeaba
  alternatives_spanish:
  - se daba golpes en el pecho
  - golpeaba su pecho repetidamente
  lexicon: BDAG
  rationale: El imperfecto expresa acción continuada; «se golpeaba» lo comunica de forma breve y natural. El complemento posterior deja claro el lugar del golpe.
- source_word: τὸ στῆθος αὐτοῦ
  english_pob_choice: his chest
  chosen_spanish: el pecho
  alternatives_spanish:
  - el pecho de él
  - su pecho
  lexicon: BDAG
  rationale: «El pecho» es la manera más natural en español para la expresión corporal y conserva el gesto de dolor y contrición. Se evita «chest» por sonar menos idiomático.
- source_word: ἱλάσθητί μοι
  english_pob_choice: be merciful to me
  chosen_spanish: sé propicio para conmigo
  alternatives_spanish:
  - ten misericordia de mí
  - apiádate de mí
  lexicon: BDAG
  rationale: La raíz de ἱλάσκομαι pertenece al campo de la propiciación/expiación. «Sé propicio para conmigo» preserva mejor esa tensión lexical-teológica que una simple petición de misericordia, aunque sigue siendo comprensible en español culto. «Ten misericordia de mí» queda como alternativa natural pero menos precisa para este verbo.
- source_word: τῷ ἁμαρτωλῷ
  english_pob_choice: the sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - el pecador por excelencia
  - un pecador
  lexicon: BDAG
  rationale: El artículo griego tiene fuerza enfática; en español, «el pecador» preserva mejor esa autoidentificación marcada que «un pecador».
theological_decisions:
- issue: Cómo traducir ἱλάσθητί μοι en una oración dirigida a Dios
  english_pob_reading: be merciful to me; the verb is related to language of atonement and propitiation
  chosen_spanish_reading: sé propicio para conmigo
  alternative_spanish_readings:
  - ten misericordia de mí
  - haz expiación por mí
  rationale: La forma elegida mantiene visible la relación con la propiciación/expiación sin reducir el verbo a una petición genérica de ayuda. En un registro bíblico español, «sé propicio para conmigo» comunica mejor el trasfondo sacrificial del término.
  doctrine_reference: Filología bíblica del grupo ἱλάσκομαι; nota doctrinal de propiciación/expiación
- issue: Cómo conservar la fuerza del artículo con τῷ ἁμαρτωλῷ
  english_pob_reading: the sinner
  chosen_spanish_reading: el pecador
  alternative_spanish_readings:
  - un pecador
  - el pecador culpable
  rationale: La forma con artículo en griego suena autodesignativa y enfática. «El pecador» reproduce mejor esa contundencia que una forma indefinida.
  doctrine_reference: Observación gramatical sobre el artículo definido en el griego koiné
translation_notes:
  revision_awareness: Se revisó la redacción para mantener una equivalencia óptima con el griego SBLGNT y con el rastro auditado en inglés. No hubo cambios de revisión pendientes en el expediente base; la decisión española conserva la tensión lexical de ἱλάσκομαι mediante una fórmula culta y bíblica, en vez de suavizarla demasiado.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefirió «el pecador» para conservar el artículo enfático del griego.
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - La puntuación de cita directa sigue el uso español con comillas angulares no requeridas por la interfaz, por lo que se emplearon comillas latinas simples por legibilidad en el campo de texto.
