translation:
  language: es
  text: '«¿Qué quieres que haga por ti?» Y él dijo: «Señor[a], que recobre la vista[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor»; el griego κύριε puede ser una forma respetuosa de tratamiento, aunque «Señor» es la equivalencia por defecto del proyecto para κύριος.
    reason: alternative_reading
  - marker: b
    text: O «que vuelva a ver» o «que recupere la vista».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί
  english_pob_choice: What
  chosen_spanish: Qué
  alternatives_spanish:
  - Qué cosa
  lexicon: BDAG
  rationale: El interrogativo introduce la pregunta específica de Jesús sobre la petición; en español, «qué» expresa de forma natural y directa el valor de τί sin añadir matiz causal.
- source_word: σοι
  english_pob_choice: for you
  chosen_spanish: por ti
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: BDAG
  rationale: Con hacer/pedir, el dativo de beneficio se vierte de manera idiomática en español como «por ti»; «para ti» también sería posible, pero «por ti» mantiene bien la idea de acción en favor del destinatario.
- source_word: θέλεις
  english_pob_choice: do you want
  chosen_spanish: quieres
  alternatives_spanish:
  - deseas
  - quieres que
  lexicon: BDAG
  rationale: El verbo de voluntad se expresa con naturalidad en español con «quieres»; el contexto dialogal breve favorece una forma concisa sin perder el sentido de querer/pretender.
- source_word: ποιήσω
  english_pob_choice: me to do
  chosen_spanish: que haga
  alternatives_spanish:
  - hacer
  - que yo haga
  lexicon: BDAG
  rationale: 'La construcción con θέλεις + aoristo subjuntivo se vuelve en español una subordinada final/interrogativa natural: «que haga». Evita el calco y conserva la fuerza de la solicitud.'
- source_word: ὁ δὲ εἶπεν
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Pero él dijo
  - Entonces él dijo
  lexicon: BDAG
  rationale: δέ aquí enlaza la respuesta sin oposición fuerte; «Y él dijo» reproduce el flujo narrativo de manera limpia y fiel.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Sire
  lexicon: BDAG
  rationale: Siguiendo la decisión del proyecto para κύριος en dirección a Jesús, «Señor» conserva el respeto y la posible resonancia cristológica. «Sire» sería anticuado en español; «señor mío» sobreexplicaría.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: En una respuesta de petición, ἵνα introduce el contenido deseado; en español, «que yo...» es la forma más natural y no exagera el valor final/purpose del enlace.
- source_word: ἀναβλέψω
  english_pob_choice: I may see again
  chosen_spanish: recobre la vista
  alternatives_spanish:
  - vea de nuevo
  - vuelva a ver
  - recupere la vista
  lexicon: BDAG
  rationale: En contexto de sanidad, ἀναβλέπω suele implicar recuperar la vista. «Recobre la vista» es idiomático y claro en español; mantiene la idea de restauración sin forzar un literalismo raro.
theological_decisions:
- issue: Título aplicado a Jesús en κύριε
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  - maestro
  rationale: Se mantiene la opción doctrinal del POB de no rebajar κύριος a una mera cortesía. «Señor» preserva la ambigüedad reverente y la posible carga cristológica, en vez de resolverla hacia un simple tratamiento social.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; preservar tensión teológica y reverencia'
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en la última pasada; no se registran revisiones aplicadas. La propuesta española sigue la misma lectura base y conserva la tensión entre «Señor» como tratamiento respetuoso y su posible alcance cristológico.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» en versalitas porque el proyecto español usa «Yahvé» para יהוה y aquí el vocativo corresponde a κύριος aplicado a Jesús.
  - «Recobre la vista» mantiene el sentido de sanidad visual sin convertirlo en una paráfrasis más amplia.
  - La puntuación y el diálogo siguen el estilo natural del español bíblico contemporáneo, con comillas latinas y oración breve equivalente al griego.
