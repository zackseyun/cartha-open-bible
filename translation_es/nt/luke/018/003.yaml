translation:
  language: es
  text: 'Y había una viuda en aquella ciudad[a], y seguía yendo a él, diciendo: «Hazme justicia contra mi adversario»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en esa ciudad». El griego ἐκείνῃ señala una ciudad determinada en el relato; «aquella» preserva mejor la distancia narrativa.
    reason: lexical_alternative
  - marker: b
    text: O «Vindícame contra mi adversario» o «Hazme justicia contra mi oponente». El verbo griego puede expresar justicia legal o vindicación, no necesariamente venganza personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: χήρα
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - mujer viuda
  lexicon: BDAG
  rationale: Es el equivalente directo y preciso de χήρα. En español, «viuda» comunica de manera natural el estado social y legal relevante en la parábola.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: La partícula enlaza la escena con el contexto inmediato. «Y» conserva la continuidad narrativa sin introducir contraste que el griego no exige aquí.
- source_word: ἦν
  english_pob_choice: there was
  chosen_spanish: había
  alternatives_spanish:
  - era
  - estaba
  lexicon: BDAG
  rationale: El valor existencial de εἰμί se expresa naturalmente en español con «había».
- source_word: ἐν τῇ πόλει ἐκείνῃ
  english_pob_choice: in that city
  chosen_spanish: en aquella ciudad
  alternatives_spanish:
  - en esa ciudad
  - en aquel pueblo
  lexicon: BDAG
  rationale: «Ciudad» respeta πόλις con precisión. «Aquella» refleja ἐκείνῃ con distancia narrativa, más idiomática que «esa» en este contexto.
- source_word: ἤρχετο
  english_pob_choice: kept coming
  chosen_spanish: venía
  alternatives_spanish:
  - iba y venía
  - seguía viniendo
  - venía repetidamente
  lexicon: BDAG
  rationale: El imperfecto indica acción repetida o continua. En español, el contexto de insistencia queda claro con «venía», apoyado por el resto de la frase; una perífrasis más explícita sería válida pero menos sobria.
- source_word: πρὸς αὐτὸν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - ante él
  - hacia él
  lexicon: BDAG
  rationale: La preposición πρός con movimiento se vierte de forma simple y natural como «a él».
- source_word: λέγουσα
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - mientras decía
  lexicon: BDAG
  rationale: El participio circunstancial se expresa con un gerundio español fluido y plenamente natural.
- source_word: Ἐκδίκησόν με
  english_pob_choice: Give me justice
  chosen_spanish: Hazme justicia
  alternatives_spanish:
  - Dame justicia
  - Defiéndeme
  - Vindicame
  lexicon: BDAG
  rationale: ἐκδικέω aquí funciona en sentido judicial, no como venganza personal. «Hazme justicia» comunica con fidelidad la petición de reparación o reivindicación legal; «Dame justicia» sería posible, pero suena menos idiomático en español bíblico actual.
- source_word: ἀπὸ τοῦ ἀντιδίκου μου
  english_pob_choice: against my adversary
  chosen_spanish: contra mi adversario
  alternatives_spanish:
  - de mi adversario
  - contra mi oponente
  - contra mi acusador
  lexicon: BDAG
  rationale: ἀντίδικος denota un oponente en disputa, especialmente legal. «Adversario» mantiene el carácter conflictivo y judicial; con «contra» se reproduce bien el sentido de la petición.
theological_decisions:
- issue: Sentido de ἐκδικέω en la petición de la viuda
  english_pob_reading: Give me justice; possible alternatives include vindication or avenging, but the sense is legal justice rather than revenge.
  chosen_spanish_reading: Hazme justicia
  alternative_spanish_readings:
  - Vindicame
  - Véngame justicia
  - Dame justicia
  rationale: El contexto de la parábola es judicial. La traducción elegida evita el matiz de represalia y conserva la tensión entre justicia, vindicación y reparación que el griego admite.
  doctrine_reference: Justicia/vindicación en contexto judicial; cf. uso forense del lenguaje de ἐκδικέω en el NT.
translation_notes:
  revision_awareness: 'El audit trail en inglés quedó en acuerdo alto y sin cambios recientes: la elección central es mantener el sentido judicial de ἐκδικέω y la iteración del imperfecto ἤρχετο, sin sobrecargar el español con explicaciones que el contexto ya sugiere.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «adversario» para ἀντίδικος en coherencia con el campo forense documentado por el POB inglés.
  - «Hazme justicia» preserva la tensión entre justicia y vindicación sin imponer el sentido de venganza.
