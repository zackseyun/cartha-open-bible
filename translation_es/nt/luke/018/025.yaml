base_translation:
  language: en
  yaml_path: translation/nt/luke/018/025.yaml
  text: For it is easier for a camel to enter through the eye of a needle than for a rich man to enter the kingdom of God[a][b].
  footnotes:
  - marker: a
    text: Or, more literally, 'through a needle's eye.'
    reason: lexical_alternative
  - marker: b
    text: Some have proposed interpretive explanations such as a narrow gate called 'the needle's eye' or the sense 'rope' instead of 'camel,' but the Greek text here reads 'camel.'
    reason: alternative_reading
