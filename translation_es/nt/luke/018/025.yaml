translation:
  language: es
  text: Porque es más fácil que un camello entre por el ojo de una aguja[a] que un rico entre en el reino de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'por el ojo de aguja'.
    reason: lexical_alternative
  - marker: b
    text: Algunos han propuesto explicaciones interpretativas, como una puerta angosta llamada 'el ojo de la aguja' o el sentido 'cuerda' en lugar de 'camello', pero el texto griego aquí dice 'camello'.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐκοπώτερον
  english_pob_choice: easier
  chosen_spanish: más fácil
  alternatives_spanish:
  - más fácilmente
  - más sencillo
  lexicon: BDAG
  rationale: El comparativo predicativo se expresa de manera natural en español con 'más fácil'. Mantiene el matiz de posibilidad/dificultad del dicho sin volverlo pesado o artificial.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula introduce explicación o fundamento respecto del contexto anterior. 'Porque' conserva bien esa relación causal-explicativa en español bíblico contemporáneo.
- source_word: κάμηλον
  english_pob_choice: a camel
  chosen_spanish: un camello
  alternatives_spanish:
  - un dromedario
  lexicon: BDAG
  rationale: El sentido léxico normal es 'camello'. No se adopta ninguna reinterpretación tradicional sin apoyo textual.
- source_word: διὰ τρήματος βελόνης
  english_pob_choice: through the eye of a needle
  chosen_spanish: por el ojo de una aguja
  alternatives_spanish:
  - a través del ojo de una aguja
  - por el orificio de una aguja
  lexicon: BDAG
  rationale: La imagen griega usa el 'agujero/orificio' de una aguja; en español, 'ojo de una aguja' es la equivalencia idiomática estable y fiel.
- source_word: εἰσελθεῖν
  english_pob_choice: to enter
  chosen_spanish: entre
  alternatives_spanish:
  - entre a
  - pueda entrar
  lexicon: BDAG
  rationale: El infinitivo griego se vierte con una subordinada natural en español. En la comparación, 'entre' reproduce el valor de entrada sin forzar el estilo.
- source_word: πλούσιον
  english_pob_choice: a rich man
  chosen_spanish: un rico
  alternatives_spanish:
  - una persona rica
  - un hombre rico
  lexicon: BDAG
  rationale: El adjetivo sustantivado masculino singular puede expresarse de forma concisa como 'un rico'. Evita añadir 'hombre' si no es necesario para el español y mantiene la representación singular del texto.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ
  english_pob_choice: into the kingdom of God
  chosen_spanish: en el reino de Dios
  alternatives_spanish:
  - al reino de Dios
  - dentro del reino de Dios
  lexicon: BDAG
  rationale: En español, con verbos de movimiento y en este tipo de dicho comparativo, 'entrar en' expresa naturalmente la dirección de εἰς. 'Reino de Dios' conserva la fórmula bíblica transparente y tradicionalmente reconocible.
theological_decisions:
- issue: Imagen hiperbólica del camello y la aguja
  english_pob_reading: Retain the literal hyperbolic image 'a camel ... through the eye of a needle.'
  chosen_spanish_reading: Mantener la imagen literal e hiperbólica de 'un camello ... por el ojo de una aguja'.
  alternative_spanish_readings:
  - '''un cordel'' en lugar de ''un camello'''
  - explicaciones como una puerta angosta llamada 'el ojo de la aguja'
  rationale: El texto griego leído aquí dice claramente κάμηλον, 'camello'. La fuerza del dicho está en la imposibilidad deliberada de la imagen; por eso no se importan explicaciones posteriores al texto principal.
  doctrine_reference: Translation philosophy §1 (primacía del texto original)
- issue: Dirección de 'entrar' hacia el reino de Dios
  english_pob_reading: '''enter the kingdom of God'''
  chosen_spanish_reading: '''entrar en el reino de Dios'''
  alternative_spanish_readings:
  - '''entrar al reino de Dios'''
  - '''entrar dentro del reino de Dios'''
  rationale: '''Entrar en'' es la forma más natural y fiel para el infinitivo griego con εἰς. Conserva el movimiento hacia la esfera real del reinado divino sin alterar el sentido.'
  doctrine_reference: BDAG; uso sintáctico estándar del español
translation_notes:
  revision_awareness: 'El contexto inglés revisado mantuvo la imagen literal del camello y ajustó mínimamente la preposición antes de ''kingdom of God'' para naturalidad. En español se preserva la misma decisión de base: la hipérbole literal se mantiene, y ''entrar en el reino de Dios'' expresa de forma natural la dirección del griego.'
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ y no una paráfrasis devocional.
  - Se mantiene 'reino de Dios' como fórmula bíblica transparente.
  - No se introduce ninguna explicación interpretativa del 'ojo de la aguja' en el cuerpo del texto.
  - '''Camello'' se conserva por fidelidad léxica al griego κάμηλον.'
