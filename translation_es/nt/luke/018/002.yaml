    rationale: El texto griego repite τις tanto para el juez como para la ciudad. El borrador conserva 'cierta ciudad' pero reduce Κριτής τις a 'un juez'. En español, 'un cierto juez' suena menos natural, pero 'cierto juez' preserva bien la indefinición narrativa del original.
  - severity: low
    issue: La nota [a] sobre el gerundio es innecesaria en el texto publicado
    rationale: El gerundio 'diciendo' es una decisión traductora normal y no crea ambigüedad que exija nota para el lector. Mantener solo notas con valor textual o lexical mejora la legibilidad editorial.
  revised_spanish_text: 'diciendo: «Había cierto juez en cierta ciudad que no temía a Dios y no respetaba a nadie[a].»'
