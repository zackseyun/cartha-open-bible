translation:
  language: es
  text: 'diciendo: «Había cierto juez en cierta ciudad que no temía a Dios y no respetaba a nadie[a].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «no respetaba a un hombre»; el singular griego ἄνθρωπον es genérico. En español se expresa de forma natural como «a nadie».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decía
  - al decir
  lexicon: BDAG
  rationale: El participio presente introduce el contenido de la parábola y funciona naturalmente en español con un gerundio que mantiene la vinculación discursiva con el contexto anterior.
- source_word: Κριτής τις
  english_pob_choice: a certain judge
  chosen_spanish: un juez
  alternatives_spanish:
  - un cierto juez
  - un juez determinado
  lexicon: BDAG
  rationale: El valor indefinido de τις se conserva con un artículo indefinido en español; 'un juez' comunica la introducción narrativa sin forzar una calca poco natural. La cualidad de indefinición reaparece con 'cierta ciudad'.
- source_word: ἦν
  english_pob_choice: there was
  chosen_spanish: había
  alternatives_spanish:
  - era
  - existía
  lexicon: BDAG
  rationale: En español narrativo, 'había' expresa mejor la introducción existencial de un personaje que 'era'.
- source_word: ἔν τινι πόλει
  english_pob_choice: in a certain city
  chosen_spanish: en cierta ciudad
  alternatives_spanish:
  - en una ciudad
  - en alguna ciudad
  lexicon: BDAG
  rationale: '''Cierta ciudad'' reproduce la indefinición intencional del griego y mantiene el paralelismo con ''un juez''.'
- source_word: τὸν θεὸν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - al Dios
  lexicon: BDAG
  rationale: 'El artículo griego no exige artículo en español cuando ''Dios'' es nombre propio teológico. El acusativo con negación se vierte naturalmente con la preposición ''a'' en español: ''temer a Dios''.'
- source_word: μὴ φοβούμενος
  english_pob_choice: did not fear
  chosen_spanish: no temía
  alternatives_spanish:
  - no tenía temor de
  - no reverenciaba
  lexicon: BDAG
  rationale: '''Temer'' mantiene el sentido bíblico-religioso de φόβος/φοβέομαι en este contexto y suena idiomático en español.'
- source_word: ἄνθρωπον
  english_pob_choice: people
  chosen_spanish: a nadie
  alternatives_spanish:
  - a ningún hombre
  - a las personas
  lexicon: BDAG
  rationale: Aunque el griego usa el singular genérico 'ἄνθρωπον', en español 'a nadie' comunica con claridad la falta total de deferencia sin sonar forzado ni excluir el valor genérico del original. Se preserva así la tensión entre singular griego y naturalidad española.
- source_word: μὴ ἐντρεπόμενος
  english_pob_choice: did not respect
  chosen_spanish: no respetaba
  alternatives_spanish:
  - no tenía respeto por
  - no se avergonzaba ante
  lexicon: BDAG
  rationale: En este contexto ἐντρέπω/ἐντρεπόμενος expresa deferencia o respeto hacia otros. 'No respetaba' mantiene el contraste moral con 'no temía a Dios' y es la opción más clara en español.
theological_decisions:
- issue: Tratamiento del singular genérico ἄνθρωπον
  english_pob_reading: man / people (generic singular)
  chosen_spanish_reading: a nadie
  alternative_spanish_readings:
  - a ningún hombre
  - a las personas
  - a nadie en absoluto
  rationale: El griego presenta un singular genérico en paralelo con Dios. En español, la forma 'a nadie' transmite la negación universal de respeto sin ocultar el contraste original entre Dios y el ser humano. Se deja constancia de que la opción no intenta borrar el valor genérico del singular griego, sino volverlo idiomático para el lector español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Posible matiz de φοβέομαι con referencia a Dios
  english_pob_reading: did not fear God
  chosen_spanish_reading: no temía a Dios
  alternative_spanish_readings:
  - no tenía temor de Dios
  - no reverenciaba a Dios
  rationale: Se preserva el matiz religioso-moral de 'temer a Dios', que en español es comprensible y no debe diluirse en una mera emoción psicológica. La formulación conserva la fuerza ética del contraste en la parábola.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Lexical fidelity with idiomatic Spanish)
- issue: Economía narrativa del dicho introductorio
  english_pob_reading: saying
  chosen_spanish_reading: diciendo
  alternative_spanish_readings:
  - y decía
  - al decir
  rationale: El gerundio mantiene la continuidad narrativa de la introducción sin añadir una relación causal o temporal no presente en el griego.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 (Source-led discourse alignment)
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan en la estructura narrativa y en el valor genérico de ἄνθρωπον. La revisión inglesa pasó de 'man' a 'people' para mejorar naturalidad; en español se optó por una solución equivalente de máxima claridad ('a nadie') sin perder el contraste con Dios ni ocultar el singular genérico subyacente.
  spanish_consistency_notes:
  - Se mantiene 'Dios' sin artículo, conforme al uso español cuando el referente es el Dios verdadero.
  - Se usa 'temía' con valor reverencial, no meramente emocional.
  - 'La pareja contrastiva principal queda explícita: ''no temía a Dios'' / ''no respetaba a nadie''.'
  - El registro es sobrio y narrativo, adecuado para un dicho parabólico.
