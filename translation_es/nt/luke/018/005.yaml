translation:
  language: es
  text: pero porque esta viuda me causa problemas, le haré justicia[a], para que, viniendo continuamente, no me agote[b]”.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “la vindicaré”. El griego ἐκδικέω también puede traducirse “vengarla” en algunos contextos, pero aquí se refiere a conceder justicia en sentido jurídico.
    reason: alternative_reading
  - marker: b
    text: Literalmente, “me golpee bajo el ojo”; idiomáticamente, “agotarme” o “desgastarme”.
    reason: lexical_alternative
lexical_decisions:
- source_word: διά γε τὸ παρέχειν μοι κόπον
  english_pob_choice: because this widow is causing me trouble
  chosen_spanish: porque esta viuda me causa problemas
  alternatives_spanish:
  - porque esta viuda me da molestias
  - porque esta viuda me está causando dificultades
  lexicon: BDAG
  rationale: La construcción causal con διά + infinitivo articular expresa la razón de la decisión del juez. παρέχειν μοι κόπον es idiomático para causar molestia o dificultad; “me causa problemas” comunica bien la carga de la expresión sin sonar artificial. Se evita una traducción demasiado literal que oscurezca el valor idiomático.
- source_word: χήραν ταύτην
  english_pob_choice: this widow
  chosen_spanish: esta viuda
  alternatives_spanish:
  - esta mujer viuda
  lexicon: BDAG
  rationale: Se conserva explícitamente “viuda”, porque el dato social y narrativo es importante en la parábola. El demostrativo “esta” mantiene la referencia directa del griego.
- source_word: ἐκδικήσω αὐτήν
  english_pob_choice: I will give her justice
  chosen_spanish: le haré justicia
  alternatives_spanish:
  - la vindicaré
  - le concederé justicia legal
  - la vengaré
  lexicon: BDAG
  rationale: En este contexto jurídico-parabólico, ἐκδικέω apunta a conceder justicia o vindicación, no a venganza personal. “Le haré justicia” es natural en español y preserva el sentido legal que la POB inglesa documenta.
- source_word: ἵνα μὴ εἰς τέλος ἐρχομένη
  english_pob_choice: so that by continually coming
  chosen_spanish: para que, viniendo continuamente
  alternatives_spanish:
  - para que, al venir continuamente
  - para que no siga viniendo
  lexicon: BDAG
  rationale: ἵνα μὴ introduce finalidad negativa. ἐρχομένη, participio presente, expresa acción repetida o continua; “viniendo continuamente” refleja esa fuerza sin añadir una interpretación excesiva como “sin cesar” o “para siempre”.
- source_word: ὑπωπιάζῃ με
  english_pob_choice: wear me out
  chosen_spanish: no me agote
  alternatives_spanish:
  - no me desgaste
  - no me deje exhausto
  - no me golpee bajo el ojo
  lexicon: BDAG
  rationale: Aunque el verbo tiene literalmente la imagen de “golpear bajo el ojo”, aquí funciona idiomáticamente como desgastar o agotar por insistencia. “No me agote” transmite el efecto figurado y evita una lectura corporal que no encaja con el contexto del juez.
theological_decisions:
- issue: Sentido de ἐκδικήσω en una parábola sobre justicia
  english_pob_reading: I will give her justice
  chosen_spanish_reading: le haré justicia
  alternative_spanish_readings:
  - la vengaré
  - la vindicaré
  rationale: La escena trata de una petición de amparo/justicia ante un juez injusto, no de represalia personal. “Le haré justicia” mantiene el vínculo temático con la justicia concedida en el pasaje, sin importar connotaciones vengativas que el contexto no exige.
  doctrine_reference: Justicia divina y vindicación en el marco narrativo de Lucas 18
- issue: Valor del participio presente ἐρχομένη
  english_pob_reading: by continually coming
  chosen_spanish_reading: viniendo continuamente
  alternative_spanish_readings:
  - al venir una y otra vez
  - siguiendo viniendo
  rationale: El griego destaca la acción repetida de venir. La versión elegida conserva la continuidad sin convertirla en adverbio interpretativo más fuerte que el texto.
  doctrine_reference: Persistencia en la súplica dentro de la enseñanza de la parábola
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: mantiene el valor directo del participio presente (“is causing me trouble”) y refleja ἐρχομένη con una construcción de continuidad (“by continually coming”), sin introducir “endlessly” como interpretación añadida. También conserva la decisión de traducir ἐκδικήσω en clave de justicia legal y no de venganza.'
  spanish_consistency_notes:
  - Se mantiene el registro reverente y publicable, con español latinoamericano neutro.
  - Se preserva la tensión lexical entre el sentido literal de ὑπωπιάζω y su valor idiomático, explicándola en nota.
  - No se sustituye “justicia” por “venganza” ni por “vindicación” en el texto principal, para respetar la lectura contextual documentada.
  - Se usa puntuación y colocación natural en español, manteniendo la estructura causal-final del versículo.
