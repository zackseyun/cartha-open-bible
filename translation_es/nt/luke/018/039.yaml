translation:
  language: es
  text: 'Y los que iban delante le reprendían para que callara; pero él seguía gritando aún más: «¡Hijo de David, ten misericordia de mí!»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ προάγοντες
  english_pob_choice: those going ahead
  chosen_spanish: los que iban delante
  alternatives_spanish:
  - los que iban adelante
  - los que iban al frente
  - los que iban primero
  lexicon: BDAG
  rationale: El participio presente sustantivado señala a personas situadas delante en el movimiento de la multitud. «Los que iban delante» conserva el valor espacial sin añadir una función de liderazgo que el griego no explicita.
- source_word: ἐπετίμων
  english_pob_choice: were rebuking
  chosen_spanish: le reprendían
  alternatives_spanish:
  - lo reprendían
  - lo increpaban
  - le regañaban
  lexicon: BDAG
  rationale: El imperfecto comunica acción շարունակada o repetida. «Reprender» recoge bien la fuerza de ἐπιτιμάω como censura o amonestación fuerte, mejor que opciones más suaves como «advertir».
- source_word: ἵνα σιγήσῃ
  english_pob_choice: so that he would be silent
  chosen_spanish: para que callara
  alternatives_spanish:
  - para que estuviera callado
  - para que guardara silencio
  - para que se callara
  lexicon: BDAG
  rationale: La construcción con ἵνα expresa propósito o resultado deseado. «Para que callara» es natural en español y mantiene la finalidad de hacer que dejara de hablar o gritar sin sobreexplicar.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - lo
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de manera natural con pronombre átono en español. «Le» preserva la relación con el destinatario de la reprimenda.
- source_word: πολλῷ μᾶλλον
  english_pob_choice: all the more
  chosen_spanish: mucho más
  alternatives_spanish:
  - cada vez más
  - aún más
  - con mayor fuerza
  lexicon: BDAG
  rationale: La combinación es un intensificador comparativo. «Mucho más» reproduce la escala intensificada sin introducir adverbios no presentes en el griego.
- source_word: ἔκραζεν
  english_pob_choice: kept crying out
  chosen_spanish: gritaba
  alternatives_spanish:
  - seguía clamando
  - seguía gritando
  - clamaba
  lexicon: BDAG
  rationale: El imperfecto indica insistencia o continuidad. «Gritaba» es breve y natural; el contexto ya muestra la persistencia con «mucho más».
- source_word: Υἱὲ Δαυίδ
  english_pob_choice: Son of David
  chosen_spanish: Hijo de David
  alternatives_spanish:
  - Hijo de David
  - Mesías hijo de David
  lexicon: BDAG
  rationale: Es un título vocativo mesiánico y debe traducirse, no transliterarse. «Hijo de David» conserva la resonancia davídica y la carga cristológica sin añadir explicación interpretativa.
- source_word: ἐλέησόν με
  english_pob_choice: have mercy on me
  chosen_spanish: ten misericordia de mí
  alternatives_spanish:
  - apiádate de mí
  - muéstrame misericordia
  - sé misericordioso conmigo
  lexicon: BDAG
  rationale: La súplica de ἐλεάω/ἐλεέω se expresa de modo directo en español con «tener misericordia de». «Ten misericordia de mí» es idiomático y mantiene la urgencia de la petición.
theological_decisions:
- issue: Título mesiánico de Υἱὲ Δαυίδ
  english_pob_reading: Translate as the title 'Son of David' in the main text.
  chosen_spanish_reading: Traducirlo como «Hijo de David» en el texto principal.
  alternative_spanish_readings:
  - Dejarlo sin traducir como un apelativo honorífico
  - Explicitarlo como «Mesías, Hijo de David»
  rationale: En el relato de Lucas, el título tiene peso mesiánico y davídico, no es solo una fórmula de respeto. Traducirlo directamente conserva la significación cristológica sin ampliar más allá del texto.
  doctrine_reference: 'DOCTRINE.md: Traduzca títulos; translitere nombres.'
translation_notes:
  revision_awareness: El texto inglés auditado no introdujo notas ni revisiones; la versión española sigue de cerca su lectura óptima-equivalente y el griego subyacente, sin cambios textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Hijo de David» como traducción del título mesiánico, coherente con la política de traducir títulos.
  - Se usa «misericordia» para ἐλεέω/ἐλεάω, en línea con el valor teológico y litúrgico habitual del pedido.
  - Se conserva el contraste aspectual con un imperfecto español («iban», «reprendían», «gritaba») para reflejar continuidad.
