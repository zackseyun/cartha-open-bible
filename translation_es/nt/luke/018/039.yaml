- from: 'Y los que iban delante le reprendían para que callara; pero él gritaba mucho más: «¡Hijo de David, ten misericordia de mí!»'
  to: 'Y los que iban delante le reprendían para que callara; pero él seguía gritando aún más: «¡Hijo de David, ten misericordia de mí!»'
  rationale: Se ajusta el verbo principal a «seguía gritando» para reflejar mejor el imperfecto ἔκραζεν como acción persistente, y se cambia «mucho más» por «aún más» para una intensificación comparativa más idiomática en español sin alterar el sentido.
