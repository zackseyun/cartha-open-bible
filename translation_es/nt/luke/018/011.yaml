  text: ὁ Φαρισαῖος σταθεὶς ⸂πρὸς ἑαυτὸν ταῦτα⸃ προσηύχετο· Ὁ θεός, εὐχαριστῶ σοι ὅτι οὐκ εἰμὶ ⸀ὥσπερ οἱ λοιποὶ τῶν ἀνθρώπων, ἅρπαγες, ἄδικοι, μοιχοί, ἢ καὶ ὡς οὗτος ὁ τελώνης·
base_translation:
  language: en
  yaml_path: translation/nt/luke/018/011.yaml
  text: 'The Pharisee[a], standing by himself, was praying these things: ‘God, I thank you that I am not like the rest of men—extortioners, unrighteous, adulterers—or even like this tax collector.’'
  footnotes:
