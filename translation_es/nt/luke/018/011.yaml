translation:
  language: es
  text: 'El fariseo[a], estando de pie aparte, oraba estas cosas: «Dios, te doy gracias porque no soy como los demás hombres: extorsionadores, injustos, adúlteros, o incluso como este recaudador de impuestos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estando de pie, oraba para sí mismo estas cosas». La expresión «πρὸς ἑαυτόν» puede significar tanto que estaba aparte como que su oración iba dirigida a sí mismo en un sentido irónico.
    reason: alternative_reading
lexical_decisions:
- source_word: σταθεὶς
  english_pob_choice: standing
  chosen_spanish: puesto de pie
  alternatives_spanish:
  - de pie
  - estando de pie
  lexicon: BDAG
  rationale: El participio aoristo se presenta de modo circunstancial; en español, «puesto de pie» conserva la escena sin sonar forzado y mantiene el valor narrativo de postura.
- source_word: πρὸς ἑαυτόν
  english_pob_choice: by himself
  chosen_spanish: consigo mismo
  alternatives_spanish:
  - para sí
  - a solas
  lexicon: BDAG
  rationale: 'La expresión es ambigua en griego: puede señalar separación espacial o una orientación reflexiva de la oración. «Consigo mismo» deja abierta esa tensión sin resolverla de forma excesiva; la alternativa reflexiva se preserva en nota.'
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - así
  lexicon: BDAG
  rationale: El demostrativo plural acusa el contenido de la oración que sigue; «estas cosas» es la correspondencia más directa y precisa en español.
- source_word: προσηύχετο
  english_pob_choice: was praying
  chosen_spanish: orando
  alternatives_spanish:
  - estaba orando
  - oraba
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso; en español, el gerundio en «orando» fluye naturalmente dentro de la construcción narrativa y conserva el aspecto durativo.
- source_word: εὐχαριστῶ σοι
  english_pob_choice: I thank you
  chosen_spanish: te doy gracias
  alternatives_spanish:
  - te agradezco
  - te agradezco a ti
  lexicon: BDAG
  rationale: «Te doy gracias» es idiomático, fiel al valor de εὐχαριστέω con dativo, y mantiene el tono de oración directa sin añadir matices ajenos.
- source_word: ὥσπερ οἱ λοιποὶ τῶν ἀνθρώπων
  english_pob_choice: like the rest of men
  chosen_spanish: como los demás hombres
  alternatives_spanish:
  - como el resto de la humanidad
  - como los otros hombres
  lexicon: BDAG
  rationale: «Los demás hombres» conserva el contraste de οἱ λοιποί («los demás») y mantiene el plural masculino genérico del griego sin neutralizarlo innecesariamente.
- source_word: ἅρπαγες
  english_pob_choice: extortioners
  chosen_spanish: ladrones
  alternatives_spanish:
  - rapaces
  - extorsionadores
  - raptores
  lexicon: BDAG
  rationale: Aunque ἅρπαξ puede incluir la idea de explotación codiciosa, en español «ladrones» comunica con claridad el vicio acusado en la lista y evita una rareza léxica que podría oscurecer la frase en lectura pública. La alternativa más específica queda implícita en el campo semántico de robo/explotación.
- source_word: ἄδικοι
  english_pob_choice: unrighteous
  chosen_spanish: injustos
  alternatives_spanish:
  - inicuos
  - malvados
  - deshonestos
  lexicon: BDAG
  rationale: «Injustos» reproduce de forma natural ἄδικος y conserva la acusación moral/jurídica; en español bíblico es plenamente inteligible y no pierde el peso ético del término.
- source_word: μοιχοί
  english_pob_choice: adulterers
  chosen_spanish: adúlteros
  alternatives_spanish:
  - adúlteras
  - los adúlteros
  lexicon: BDAG
  rationale: El sustantivo plural se rinde con el término directo «adúlteros», adecuado para una lista de vicios y fiel al griego.
- source_word: ἢ καὶ ὡς οὗτος ὁ τελώνης
  english_pob_choice: or even like this tax collector
  chosen_spanish: ni aun como este recaudador de impuestos
  alternatives_spanish:
  - o incluso como este recaudador de impuestos
  - ni siquiera como este publicano
  lexicon: BDAG
  rationale: La secuencia ἢ καὶ intensifica el desprecio; «ni aun» en español transmite bien ese escalamiento. «Recaudador de impuestos» sigue la terminología pública y evita un término eclesiástico tradicional que no aparece en el original.
theological_decisions:
- issue: Ambigüedad de πρὸς ἑαυτόν en la oración del fariseo
  english_pob_reading: Rendered spatially as 'by himself' in the main text, with a footnote preserving the reflexive possibility.
  chosen_spanish_reading: Se traduce de forma abierta como «consigo mismo» y se nota que también puede entenderse como oración dirigida a sí mismo.
  alternative_spanish_readings:
  - a solas
  - para sí
  - orando para sí mismo
  rationale: El griego permite tanto una lectura espacial como una reflexiva/irónica. La versión principal evita resolver la ambigüedad y la nota conserva la tensión interpretativa documentada por el POB en inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; la presente redacción sigue de cerca el texto griego y la decisión auditada del POB inglés, ajustando solo la formulación española para lectura natural y pública.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma para el nombre divino, pero aquí el griego dice θεός; por eso se traduce «Dios».
  - Se conserva la voz de lista de vicios sin suavizarla, porque el texto griego usa términos morales fuertes.
  - Se evita «publicano» en favor de «recaudador de impuestos» por fidelidad auditada al término τελώνης y para claridad contemporánea.
