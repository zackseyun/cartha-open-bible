translation:
  language: es
  text: 'Y le dijeron[a]: «Jesús el Nazareno va pasando».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesús de Nazaret va pasando». El griego dice «Jesús el Nazareno», preservando más literalmente la designación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγγειλαν
  english_pob_choice: they told
  chosen_spanish: le informaron
  alternatives_spanish:
  - le dijeron
  - le contaron
  - le reportaron
  lexicon: BDAG / uso narrativo
  rationale: El verbo comunica el acto de transmitir una noticia. En español, «le informaron» conserva el valor de comunicar datos y suena natural en un contexto narrativo sin volverlo demasiado formal o burocrático.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Pero
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula funciona como enlace suave del relato. «Y» preserva la continuidad narrativa sin imponer contraste.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - lo
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de forma natural en español con el pronombre dativo «le».
- source_word: ὅτι
  english_pob_choice: “...”
  chosen_spanish: «...»,
  alternatives_spanish:
  - que
  - —
  lexicon: BDAG
  rationale: La cláusula de discurso indirecto se vierte mejor como cita directa en español para mantener viveza y claridad, tal como hace la versión inglesa POB.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: BDAG
  rationale: Nombre propio estándar en español, correspondiente al griego Ἰησοῦς.
- source_word: ὁ Ναζωραῖος
  english_pob_choice: the Nazarene
  chosen_spanish: el Nazareno
  alternatives_spanish:
  - el de Nazaret
  - el Nazoreo
  lexicon: BDAG
  rationale: La forma griega es un designativo substantivado, no una expresión preposicional. «El Nazareno» conserva mejor esa forma y coincide con la decisión inglesa de reflejar el título/epíteto de manera más literal.
- source_word: παρέρχεται
  english_pob_choice: is passing by
  chosen_spanish: está pasando
  alternatives_spanish:
  - pasa
  - va pasando
  - está pasando junto a ellos
  lexicon: BDAG
  rationale: El presente describe una acción en curso. «Está pasando» preserva el valor aspectual inmediato y suena natural en español.
theological_decisions:
- issue: Tratamiento de la designación ὁ Ναζωραῖος de Jesús
  english_pob_reading: the Nazarene
  chosen_spanish_reading: el Nazareno
  alternative_spanish_readings:
  - el de Nazaret
  - el Nazoreo
  rationale: Se trata de un identificador geográfico/designativo, no de un título doctrinal que requiera ampliación. La traducción mantiene la cercanía al griego sin introducir interpretación adicional.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y coincide con la auditoría inglesa POB: conecta con una partícula narrativa suave, expresa el dativo con un pronombre natural, y conserva la designación «el Nazareno» por ser una forma substantivada del original. No se registran revisiones previas en este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς según el estándar POB.
  - Se usa «el Nazareno» en lugar de una paráfrasis geográfica, por fidelidad al sintagma griego.
  - Se conserva el aspecto progresivo con «está pasando», coherente con el presente de παρέρχεται.
  - La cita directa en español evita una construcción demasiado rígida con «que» y refleja bien el contenido comunicado.
