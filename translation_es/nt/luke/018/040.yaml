translation:
  language: es
  text: Entonces Jesús se detuvo y mandó que se lo trajeran[a] a él. Y cuando se acercó, le preguntó,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que lo llevaran a él». El verbo puede denotar ser llevado o traído; aquí «trajeran» encaja mejor con la escena.
    reason: lexical_alternative
lexical_decisions:
- source_word: σταθεὶς
  english_pob_choice: stood still
  chosen_spanish: se detuvo
  alternatives_spanish:
  - se paró
  - quedó inmóvil
  lexicon: BDAG
  rationale: El participio aoristo de ἵστημι aquí funciona intransitivamente y marca que Jesús se detuvo en su marcha. En español, «se detuvo» comunica con naturalidad la interrupción de movimiento; evita una formulación demasiado mecánica y no exige explicar de más el matiz ya cubierto por el contexto.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: δέ aporta una conexión narrativa suave. «Entonces» mantiene la progresión temporal del relato en español sin introducir contraste fuerte.
- source_word: ἐκέλευσεν
  english_pob_choice: ordered
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - mandó decir
  - indicó
  lexicon: BDAG
  rationale: κελεύω expresa una orden o mandato. «Mandó» preserva la autoridad de la acción y suena natural en español bíblico contemporáneo.
- source_word: ἀχθῆναι
  english_pob_choice: be brought
  chosen_spanish: se lo trajeran
  alternatives_spanish:
  - fuera llevado
  - lo llevaran
  - se lo condujeran
  lexicon: BDAG
  rationale: El infinitivo pasivo de ἄγω puede significar ser llevado o traído. Aquí, en el contexto de acercarlo a Jesús, «se lo trajeran» comunica bien la acción sin perder la idea de traslado hacia él. El dativo implícito del destino se expresa con claridad en español.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - hasta él
  - ante él
  lexicon: BDAG
  rationale: πρός con acusativo indica movimiento hacia Jesús. «A él» es breve y natural; evita añadir matices que el griego no exige.
- source_word: ἐγγίσαντος δὲ αὐτοῦ
  english_pob_choice: when he came near
  chosen_spanish: Y cuando se acercó
  alternatives_spanish:
  - y al acercarse
  - cuando estuvo cerca
  - cuando llegó cerca
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto con ἐγγίζω marca la acción temporal previa. «Y cuando se acercó» conserva el valor temporal de manera clara y fluida en español.
- source_word: ἐπηρώτησεν
  english_pob_choice: he asked
  chosen_spanish: le preguntó
  alternatives_spanish:
  - le preguntó algo
  - lo interrogó
  - le inquirió
  lexicon: BDAG
  rationale: ἐπερωτάω suele significar preguntar. «Le preguntó» es la forma más natural en español para el verbo de habla dirigido a una persona; evita la dureza de «interrogó» y el arcaísmo de «inquirió».
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - el Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado según la convención del proyecto y el uso cristiano estándar en español.
translation_notes:
  revision_awareness: No se observaron revisiones aplicadas en el expediente inglés; el texto español sigue de cerca la lectura auditada sin introducir cambios no respaldados. La decisión principal fue resolver con naturalidad en español la secuencia narrativa y la voz pasiva de ἀχθῆναι.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Jesús» como forma estable.
  - Se evita el calco rígido de la pasiva griega cuando el español pide una construcción más idiomática.
  - El registro es reverente y moderno, sin recurrir a arcaísmos innecesarios.
