- from: Entonces Jesús se detuvo y mandó que se lo trajeran a él[a]. Y cuando se acercó, le preguntó[b],
  to: Entonces Jesús se detuvo y mandó que se lo trajeran[a] a él. Y cuando se acercó, le preguntó,
  rationale: 'Se conserva el texto español principal casi intacto por su buena calidad, pero se corrige el aparato de notas para alinearlo con la evidencia griega y la auditoría inglesa: la única nota necesaria en este versículo corresponde a ἀχθῆναι (''ser traído/llevado''), no a ''le preguntó''. También se mueve el anclaje al verbo de traslado, donde pertenece semánticamente.'
