base_translation:
  language: en
  yaml_path: translation/nt/luke/018/015.yaml
  text: Now they were even bringing infants to him so that he might touch them[a], but when the disciples saw it[c][b], they rebuked them.
  footnotes:
  - marker: a
    text: Or 'babies.' The Greek term refers to very young children, specifically infants.
    reason: lexical_alternative
  - marker: b
    text: That is, those who were bringing the infants to Jesus.
    reason: lexical_alternative
  - marker: c
    text: In the parallel accounts, Jesus' touch is associated with blessing and laying hands on the children (cf. Matt 19:13; Mark 10:13, 16).
    reason: cross_reference
