translation:
  language: es
  text: Le traían incluso a los infantes[a] para que él los tocara; pero cuando los discípulos vieron esto[c][b], los reprendieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bebés». El término griego se refiere a niños muy pequeños, específicamente a infantes.
    reason: lexical_alternative
  - marker: b
    text: Es decir, a los que estaban llevando a los infantes a Jesús.
    reason: lexical_alternative
  - marker: c
    text: En los relatos paralelos, este gesto de Jesús se asocia con bendición y con la imposición de manos sobre los niños (cf. Mt 19:13; Mr 10:13, 16).
    reason: cross_reference
lexical_decisions:
- source_word: Προσέφερον
  english_pob_choice: were bringing
  chosen_spanish: estaban trayendo
  alternatives_spanish:
  - traían
  - venían trayendo
  - iban trayendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida; «estaban trayendo» conserva ese valor aspectual de manera natural en español.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  - Pues
  lexicon: BDAG
  rationale: Aquí funciona como conector narrativo suave. «Ahora» introduce el avance de la escena sin cargar demasiado el contraste.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a Jesús
  lexicon: BDAG
  rationale: El pronombre se refiere a Jesús por el contexto inmediato. «A él» sigue de cerca el griego; en español puede leerse con claridad en esta narrativa.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: incluso
  alternatives_spanish:
  - también
  - hasta
  lexicon: BDAG
  rationale: 'En este contexto aporta énfasis: no solo traían niños, sino incluso niños muy pequeños. «Incluso» reproduce bien ese matiz.'
- source_word: τὰ βρέφη
  english_pob_choice: infants
  chosen_spanish: los niños pequeños
  alternatives_spanish:
  - los bebés
  - los infantes
  lexicon: BDAG
  rationale: βρέφη señala niños muy pequeños, en especial bebés o infantes. «Niños pequeños» es natural y amplio en español, pero mantiene la idea de extrema corta edad; la alternativa más literal se conserva en nota.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce finalidad. «Para que» es la forma más natural y fiel en español.
- source_word: αὐτῶν ἅπτηται
  english_pob_choice: he might touch them
  chosen_spanish: él los tocara
  alternatives_spanish:
  - él les impusiera las manos
  - él los bendijera
  lexicon: BDAG
  rationale: ἅπτομαι aquí significa «tocar». Aunque el contexto paralelo sugiere bendición, Lucas formula la acción de manera más sobria; por eso el texto principal conserva «tocara» sin añadir «bendecir» o «imponer las manos».
- source_word: ἰδόντες
  english_pob_choice: when ... saw it
  chosen_spanish: cuando ... lo vieron
  alternatives_spanish:
  - al ver
  - después de ver
  lexicon: BDAG
  rationale: El participio aoristo puede expresarse temporalmente de modo natural. El objeto implícito se traduce como «lo» para referirse al hecho observado.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  lexicon: BDAG
  rationale: La construcción es directa y no exige el posesivo explícito en español; «los discípulos» reproduce bien el artículo + sustantivo.
- source_word: ἐπετίμων
  english_pob_choice: rebuked
  chosen_spanish: los reprendieron
  alternatives_spanish:
  - los censuraron
  - los amonestaron con dureza
  lexicon: BDAG
  rationale: ἐπιτιμάω tiene fuerza de reprensión fuerte. «Reprendieron» conserva mejor ese tono que opciones más suaves.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - a los que los traían
  lexicon: BDAG
  rationale: El dativo se refiere con mayor probabilidad a quienes traían a los niños. En español, «los reprendieron» mantiene la referencia natural y evita sobreexplicar en el texto principal.
theological_decisions:
- issue: Si debe explicitarse una acción de bendición o imposición de manos en el texto principal
  english_pob_reading: touch them
  chosen_spanish_reading: él los tocara
  alternative_spanish_readings:
  - él los bendijera
  - él les impusiera las manos
  rationale: El griego dice simplemente «tocar». Aunque el contexto sinóptico paralelo asocia este gesto con bendición e imposición de manos, la redacción de Lucas es más contenida; por fidelidad al testimonio fuente, el texto principal no introduce esa interpretación.
  doctrine_reference: 'Translation philosophy: primacía del texto original; preservar la tensión interpretativa sin resolverla prematuramente.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios posteriores; el juicio de alta concordancia fue mantenido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «discípulos» sin posesivo explícito porque el referente es claro en el contexto narrativo.
  - Se evita introducir «bendecir» en el texto principal para no borrar la restricción léxica documentada para ἅπτομαι.
  - La nota c preserva la lectura contextual sin desplazar la traducción literal del verbo en el cuerpo del texto.
