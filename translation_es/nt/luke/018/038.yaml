translation:
  language: es
  text: 'Y gritó[a], diciendo: «¡Jesús, Hijo de David, ten misericordia de mí!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijo de David» es un título mesiánico; alternativamente, de manera más general, «descendiente de David».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβόησεν
  english_pob_choice: cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - dio voces
  lexicon: BDAG
  rationale: El verbo griego expresa un grito fuerte y urgente. En español, «gritó» comunica la intensidad del acto con naturalidad. «Clamó» sería más solemne, pero menos directo; «dio voces» suena más regional o arcaico.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio introduce el discurso directo de forma natural en español con «diciendo», manteniendo la relación narrativa del griego sin sobrecargar la sintaxis.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado según el uso español estándar y fiel al vocativo griego.
- source_word: υἱὲ Δαυίδ
  english_pob_choice: Son of David
  chosen_spanish: Hijo de David
  alternatives_spanish:
  - descendiente de David
  lexicon: BDAG
  rationale: Se conserva la fórmula titulativa tradicional porque en el contexto de Lucas funciona como un título mesiánico y no solo como una descripción genealógica. «Descendiente de David» aclara el sentido, pero diluye la fuerza titulativa preservada por el griego y por la decisión auditada en inglés.
- source_word: ἐλέησόν με
  english_pob_choice: have mercy on me
  chosen_spanish: ten misericordia de mí
  alternatives_spanish:
  - muéstrame misericordia
  - apiádate de mí
  lexicon: BDAG
  rationale: La súplica imperativa pide una acción misericordiosa. «Ten misericordia de mí» es la equivalencia más natural y estable en español bíblico contemporáneo. «Apiádate de mí» expresa compasión, pero puede sonar más afectivo que el matiz de petición de misericordia.
theological_decisions:
- issue: Fuerza mesiánica del título υἱὲ Δαυίδ
  english_pob_reading: Render as the title “Son of David.”
  chosen_spanish_reading: «Hijo de David» como título mesiánico preservado.
  alternative_spanish_readings:
  - «descendiente de David» como explicación más explícita
  rationale: En el contexto narrativo, la expresión no es meramente genealógica; identifica a Jesús con la esperanza davídica. Mantener la forma titulativa permite que la carga mesiánica permanezca visible para el lector español, como en el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT y coincide con la decisión inglesa auditada de mantener «Son of David» como título mesiánico. No se detectaron revisiones posteriores que alteren la elección léxica o teológica.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio y «Hijo de David» como título fijo en estilo bíblico.
  - «Ten misericordia de mí» conserva el tono de súplica directa y evita una paráfrasis explicativa.
  - La puntuación y comillas siguen la convención española para discurso directo.
