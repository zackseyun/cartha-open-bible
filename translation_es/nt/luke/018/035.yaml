translation:
  language: es
  text: Sucedió que, cuando se acercaba a Jericó[a], un ciego[b] estaba sentado junto al camino, pidiendo limosna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras se acercaba a Jericó».'
    reason: lexical_alternative
  - marker: b
    text: 'O simplemente: «un ciego»; el griego τις añade un leve sentido de «uno en particular» o «un cierto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  english_pob_choice: Now
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y sucedió que
  - Ahora
  lexicon: BDAG
  rationale: La fórmula narrativa ἐγένετο δὲ funciona como transición en el discurso. En español, «Y aconteció que» mantiene ese arranque narrativo sin introducir una paráfrasis excesiva; conserva el matiz idiomático que el POB inglés resolvió con «Now».
- source_word: ἐν τῷ ἐγγίζειν αὐτὸν
  english_pob_choice: as he was approaching
  chosen_spanish: mientras él se acercaba
  alternatives_spanish:
  - cuando él se acercaba
  - al acercarse él
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa tiempo simultáneo y acción en progreso. «Mientras él se acercaba» refleja bien ese aspecto imperfectivo y evita una construcción demasiado rígida en español.
- source_word: εἰς Ἰεριχὼ
  english_pob_choice: Jericho
  chosen_spanish: a Jericó
  alternatives_spanish:
  - hacia Jericó
  - a la ciudad de Jericó
  lexicon: BDAG
  rationale: Con ἐγγίζω, εἰς conserva dirección hacia el destino. En español, «a Jericó» comunica de forma natural ese movimiento implícito sin duplicar innecesariamente la idea de cercanía.
- source_word: τυφλός τις
  english_pob_choice: a certain blind man
  chosen_spanish: un ciego[b]
  alternatives_spanish:
  - un cierto ciego
  - un hombre ciego
  lexicon: BDAG
  rationale: El τις añade indefinición con un leve matiz individuante. En español, «un ciego» es la forma más natural; se conserva el matiz de indefinición mediante la nota[b], en vez de forzar una expresión poco idiomática.
- source_word: ἐκάθητο
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se sentaba
  - estaba sentado allí
  lexicon: BDAG
  rationale: El imperfecto marca acción en curso o escena de fondo. «Estaba sentado» reproduce esa duratividad mejor que un simple pasado puntual.
- source_word: παρὰ τὴν ὁδὸν
  english_pob_choice: beside the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al lado del camino
  - junto a la carretera
  lexicon: BDAG
  rationale: παρά con acusativo indica posición al lado de algo. «Junto al camino» es claro y natural; «camino» puede abarcar tanto senda como ruta sin perder el sentido.
- source_word: ἐπαιτῶν
  english_pob_choice: begging
  chosen_spanish: pidiendo limosna
  alternatives_spanish:
  - mendigando
  - pidiendo
  lexicon: BDAG
  rationale: El participio describe la actividad del hombre como mendigo. «Pidiendo limosna» comunica con precisión esa acción y mantiene un registro sobrio; «mendigando» también sería posible, pero suena algo más marcado en español.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide sustancialmente con el criterio óptimo-equivalente del POB en inglés; se preserva la progresión narrativa de Ἐγένετο δὲ, el aspecto imperfectivo de ἐγγίζειν/ἐκάθητο y el matiz indefinido de τις mediante una nota, sin sobretraducción.
  spanish_consistency_notes:
  - Se usa «Jericó» con acento según la ortografía española.
  - Se conserva la preposición direccional con «a Jericó» para reflejar εἰς.
  - «Camino» evita el calco rígido de «road» y funciona naturalmente en contexto bíblico.
  - La puntuación reproduce una sola oración con inciso temporal inicial, acorde con el griego.
