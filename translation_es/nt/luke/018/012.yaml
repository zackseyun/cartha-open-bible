translation:
  language: es
  text: Ayuno dos veces a la semana[a]; diezmo todo cuanto adquiero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «dos veces del sábado», un modismo que significa «dos veces a la semana».'
    reason: lexical_alternative
lexical_decisions:
- source_word: νηστεύω
  english_pob_choice: I fast
  chosen_spanish: Ayuno
  alternatives_spanish:
  - Estoy ayunando
  lexicon: BDAG
  rationale: El presente indicativo en primera persona expresa una práctica habitual; en español, «ayuno» comunica de forma natural esa costumbre sin forzar un progresivo.
- source_word: δὶς
  english_pob_choice: twice
  chosen_spanish: dos veces
  alternatives_spanish:
  - dos ocasiones
  lexicon: BDAG
  rationale: Adverbio directo de frecuencia; «dos veces» es la equivalencia natural y clara en español.
- source_word: τοῦ σαββάτου
  english_pob_choice: a week
  chosen_spanish: a la semana
  alternatives_spanish:
  - por semana
  - en la semana
  lexicon: BDAG
  rationale: Aunque literalmente dice «del sábado», en griego koiné la expresión funciona idiomáticamente como referencia al ciclo semanal. «A la semana» conserva el valor temporal sin inducir una lectura demasiado literal.
- source_word: ἀποδεκατῶ
  english_pob_choice: I tithe
  chosen_spanish: diezmo
  alternatives_spanish:
  - doy el diezmo
  - doy la décima parte
  lexicon: BDAG
  rationale: El verbo denota dar la décima parte; «diezmo» mantiene el término verbal/conceptual tradicional y es comprensible en español bíblico actual.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo cuanto
  - todas las cosas
  lexicon: BDAG
  rationale: El plural neutro tiene sentido comprehensivo; «todo» en español puede abarcar ese alcance sin perder naturalidad.
- source_word: ὅσα κτῶμαι
  english_pob_choice: I acquire
  chosen_spanish: cuanto adquiero
  alternatives_spanish:
  - todo lo que adquiero
  - cuanto gano
  lexicon: BDAG
  rationale: La forma relativa más el verbo medio expresan aquello que obtiene para sí. «Cuanto adquiero» preserva la relación entre la totalidad y el proceso de adquisición mejor que una paráfrasis más amplia.
theological_decisions:
- issue: Sentido idiomático de «τοῦ σαββάτου» en la declaración de ayuno
  english_pob_reading: 'idiomatic temporal sense: ''a week'''
  chosen_spanish_reading: 'sentido idiomático temporal: «a la semana»'
  alternative_spanish_readings:
  - «del sábado»
  - «por semana»
  rationale: No se trata de una afirmación doctrinal sobre el sábado, sino de frecuencia. La versión idiomática evita sugerir erróneamente un ayuno ligado específicamente al día de reposo.
  doctrine_reference: Principio de primacía del sentido original y claridad comunicativa; evitar introducir una lectura litúrgica no sostenida por el contexto.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden en leer la primera cláusula como un modismo temporal y la segunda como una afirmación habitual de diezmo. No se detectan revisiones sustantivas en el expediente; se mantiene la equivalencia óptima con naturalidad española y sin ocultar el trasfondo idiomático.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; no hay referencia al nombre divino en este versículo.
  - «Ayuno» conserva el valor de presente habitual, acorde con la auto-descripción del hablante.
  - «Diezmo» funciona como verbo nominalizado comprensible y fiel al valor de ἀποδεκατῶ.
  - La nota al pie explica el modismo de «toû sabbátou» sin sobrecargar el texto principal.
