translation:
  language: es
  text: Y les dijo también esta parábola a algunos que confiaban en sí mismos que eran justos, y trataban con desprecio a los demás:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘menospreciaban a los demás’ / ‘miraban a los demás con desprecio’.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν
  english_pob_choice: he ... told
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les contó
  lexicon: BDAG
  rationale: λέγω admite ‘decir’ y también el sentido de comunicar o narrar. En español, con el complemento ‘esta parábola’, ‘les dijo’ mantiene la forma natural y conserva el acto de enseñanza sin forzar una construcción menos idiomática.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: δέ funciona aquí como un conector leve de avance narrativo. ‘Y’ reproduce bien esa continuidad sin introducir contraste que el griego no exige.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: BDAG
  rationale: El καί adverbial añade una acción más a la secuencia. ‘También’ expresa con claridad ese matiz aditivo en español.
- source_word: πρός τινας
  english_pob_choice: to some
  chosen_spanish: a algunos
  alternatives_spanish:
  - para algunos
  - contra algunos
  lexicon: BDAG
  rationale: πρός con personas tras un verbo de habla señala el destinatario. ‘A algunos’ es la forma más directa y natural en español.
- source_word: τοὺς πεποιθότας ἐφ’ ἑαυτοῖς
  english_pob_choice: who trusted in themselves
  chosen_spanish: que confiaban en sí mismos
  alternatives_spanish:
  - que estaban confiados en sí mismos
  - que habían puesto su confianza en sí mismos
  lexicon: BDAG
  rationale: El participio perfecto expresa un estado asentado de confianza; ἐφ’ ἑαυτοῖς especifica la autoconfianza. ‘Confiaban en sí mismos’ conserva ese sentido de dependencia en uno mismo sin recargar la frase.
- source_word: ὅτι εἰσὶν δίκαιοι
  english_pob_choice: that they were righteous
  chosen_spanish: creyendo que eran justos
  alternatives_spanish:
  - que eran justos
  - que estaban en lo justo
  - que eran rectos
  lexicon: BDAG
  rationale: δίκαιοι aquí es una autoevaluación moral ante Dios y los demás. ‘Justos’ conserva el término bíblico habitual en español y, con ‘creyendo’, deja ver que se trata de su propia percepción sin añadir interpretación ajena al texto.
- source_word: ἐξουθενοῦντας
  english_pob_choice: treated the others with contempt
  chosen_spanish: y que despreciaban a los otros
  alternatives_spanish:
  - y que trataban con desprecio a los otros
  - y que menospreciaban a los otros
  - y que miraban con desprecio a los otros
  lexicon: BDAG
  rationale: ἐξουθενέω implica considerar a otros como nada, despreciar, menospreciar. ‘Despreciaban’ es breve y fiel; en español comunica bien el juicio de valor activo del participio.
- source_word: τοὺς λοιποὺς
  english_pob_choice: the others
  chosen_spanish: a los otros
  alternatives_spanish:
  - a los demás
  - al resto
  lexicon: BDAG
  rationale: λοιποί significa ‘los demás’ o ‘los otros’. ‘A los otros’ mantiene la referencia directa y coincide con el sentido de grupo restante sin expandirlo más de lo necesario.
- source_word: τὴν παραβολὴν ταύτην
  english_pob_choice: this parable
  chosen_spanish: esta parábola
  alternatives_spanish:
  - esta comparación
  - esta ilustración
  lexicon: BDAG
  rationale: παραβολή en los Evangelios sinópticos se traduce normalmente ‘parábola’. Mantener ese término conserva el género literario reconocido por el texto.
theological_decisions:
- issue: δίκαιοι en un contexto de autojustificación y desprecio de otros
  english_pob_reading: righteous
  chosen_spanish_reading: justos
  alternative_spanish_readings:
  - rectos
  - en lo justo
  rationale: Aunque el contexto critica la autojusticia, el término griego sigue siendo δίκαιοι. Traducir ‘justos’ preserva el vocabulario bíblico y deja que el contexto exprese la ironía o la crítica sin cargar la palabra con un matiz que el griego no añade por sí mismo.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La pauta inglesa revisada optó por ‘the others’ frente a ‘the rest’ para reflejar con mayor precisión τοὺς λοιπούς. En español, ‘a los otros’ conserva esa misma dirección semántica y evita una expansión innecesaria. También se mantuvo la relación de participios en forma coordinada para reflejar el encadenamiento del griego.
  spanish_consistency_notes:
  - Se usa ‘parábola’ para παραβολή, en coherencia con el uso sinóptico estándar.
  - ‘Justos’ mantiene la terminología bíblica de δικ- sin sustituirla por una paráfrasis moralista.
  - ‘Confiaban en sí mismos’ conserva el matiz reflexivo de ἐφ’ ἑαυτοῖς.
  - Se evita ‘SEÑOR’ u otra sustitución teológica no presente; este versículo no contiene el nombre divino.
  - El participio final se vertió en imperfecto coordinado (‘despreciaban’) para naturalidad en español, sin perder el valor descriptivo del original.
