revisions:
- from: Y les dijo también esta parábola a algunos que confiaban en sí mismos, creyendo que eran justos, y que despreciaban a los otros:[a]
  to: Y les dijo también esta parábola a algunos que confiaban en sí mismos que eran justos, y trataban con desprecio a los demás:[a]
  rationale: Se elimina ‘creyendo’ para ajustarse mejor a la sintaxis y al alcance semántico del griego. Se cambia ‘despreciaban a los otros’ por ‘trataban con desprecio a los demás’ para reflejar mejor ἐξουθενοῦντας según la decisión léxica auditada, y se sustituye ‘los otros’ por ‘los demás’ por mayor naturalidad en español.
