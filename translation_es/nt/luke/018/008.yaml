translation:
  language: es
  text: Les digo que él les hará justicia[a] pronto. Sin embargo, cuando el Hijo del Hombre venga, ¿acaso hallará la fe[b] sobre la tierra?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los vindicará» o «les concederá justicia». El término griego puede expresar vindicación legal o justicia hecha en favor de alguien.
    reason: lexical_alternative
  - marker: b
    text: O «fidelidad» o «confianza». La palabra griega puede denotar fe, confianza o fidelidad; el texto principal mantiene «fe» por su amplitud.
    reason: alternative_reading
lexical_decisions:
- source_word: ποιήσει τὴν ἐκδίκησιν αὐτῶν
  english_pob_choice: he will bring about justice for them
  chosen_spanish: les hará justicia
  alternatives_spanish:
  - les dará justicia
  - vindicará su causa
  - hará justicia por ellos
  lexicon: BDAG
  rationale: ἐκδίκησις puede abarcar vindicación, justicia hecha o satisfacción de un reclamo legal. En este contexto de petición de justicia, "les hará justicia" comunica de forma natural la acción judicial en español sin cargar innecesariamente el sentido de venganza. El dativo implícito se expresa con "les" para reflejar a los beneficiarios del acto.
- source_word: ἐν τάχει
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - sin demora
  - de inmediato
  lexicon: BDAG
  rationale: La expresión griega indica prontitud o rapidez. "Pronto" suena natural en español y mantiene la fuerza temporal sin convertirlo en una afirmación demasiado técnica o cronométrica.
- source_word: πλὴν
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  - Con todo
  lexicon: BDAG
  rationale: πλήν introduce un giro concesivo fuerte. "Sin embargo" conserva bien el contraste retórico entre la promesa anterior y la pregunta que sigue.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se mantiene el título cristológico tradicional y reconocido, que corresponde al auto-designativo de Jesús y conserva su resonancia intertextual con Daniel 7.
- source_word: ἐλθὼν
  english_pob_choice: comes
  chosen_spanish: venga
  alternatives_spanish:
  - venga
  - cuando haya venido
  lexicon: BDAG
  rationale: 'El participio aoristo se vierte de manera temporal en una cláusula natural en español: "cuando... venga". "Venga" preserva la relación temporal sin sonar forzado.'
- source_word: ἆρα
  english_pob_choice: really
  chosen_spanish: acaso
  alternatives_spanish:
  - realmente
  - de veras
  - ¿será que?
  lexicon: BDAG
  rationale: ἆρα marca una pregunta reflexiva y matizada. En español, "acaso" reproduce bien esa carga interrogativa sin endurecerla como una simple afirmación de duda.
- source_word: τὴν πίστιν
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fe
  - la fidelidad
  - la confianza
  lexicon: BDAG
  rationale: Se conserva "fe" como traducción principal de πίστις, siguiendo la decisión del POB en inglés. Aunque el contexto puede sugerir perseverancia, "fe" mantiene la amplitud semántica y evita resolver la tensión en una sola dirección.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra
  - en el mundo
  lexicon: BDAG
  rationale: γῆ puede significar tierra, suelo, mundo o tierra habitada. "Sobre la tierra" sigue de cerca la imagen del griego y su alcance global, manteniendo el matiz del artículo sin sonar excesivamente técnico.
theological_decisions:
- issue: πίστις en un dicho escatológico y exhortativo
  english_pob_reading: faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la fidelidad
  - la confianza
  rationale: 'Se sigue la lectura principal del POB en inglés: πίστις como "fe". En este contexto puede incluir confianza perseverante, pero no se reduce a "fidelidad" en el texto principal para no cerrar indebidamente el alcance del término.'
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις'
- issue: ἐκδίκησις como justicia/vindicación sin carga de venganza
  english_pob_reading: he will bring about justice for them
  chosen_spanish_reading: les hará justicia
  alternative_spanish_readings:
  - vindicará su causa
  - les concederá justicia
  - hará justicia por ellos
  rationale: La escena es de reparación judicial, no de venganza humana. "Les hará justicia" mantiene la ambigüedad productiva entre vindicación y justicia efectiva, en línea con el criterio auditado del POB.
  doctrine_reference: 'DOCTRINE.md contested/lexical terms: ἐκδίκησις'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene en concordancia alta con el auditor de referencia y no requiere ajustes respecto del borrador inglés auditado.
  spanish_consistency_notes:
  - Se conserva el tratamiento de YHWH según la norma del proyecto, aunque este versículo no lo contiene.
  - '"Hijo del Hombre" se mantiene en mayúsculas iniciales como título cristológico fijo.'
  - '"Fe" se usa como traducción principal de πίστις, y las alternativas quedan reservadas a la nota.'
  - '"Les hará justicia" evita un giro mecánico y mantiene el campo semántico judicial del sustantivo ἐκδίκησις.'
  - '"Sobre la tierra" reproduce con naturalidad el alcance de ἐπὶ τῆς γῆς sin imponer una lectura local restringida.'
