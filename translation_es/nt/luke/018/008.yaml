    text: Or 'he will vindicate them' or 'he will grant them justice.' The Greek term can carry the sense of legal vindication or justice done on behalf of someone.
    reason: lexical_alternative
  - marker: b
    text: Or 'faithfulness' or 'trust.' The Greek word can denote faith, trust, or faithfulness; the main text keeps the broader rendering 'faith.'
    reason: alternative_reading
