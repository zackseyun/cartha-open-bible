  text: λέγω ὑμῖν ὅτι ποιήσει τὴν ἐκδίκησιν αὐτῶν ἐν τάχει. πλὴν ὁ υἱὸς τοῦ ἀνθρώπου ἐλθὼν ἆρα εὑρήσει τὴν πίστιν ἐπὶ τῆς γῆς;
base_translation:
  language: en
  yaml_path: translation/nt/luke/018/008.yaml
  text: I tell you that he will bring about justice for them quickly[a]. Nevertheless, when the Son of Man comes[b], will he really find faith on the earth?
  footnotes:
