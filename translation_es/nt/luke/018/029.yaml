    text: O «hermanos y hermanas», si se entiende la referencia de manera inclusiva.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre «hermanos», que es el término al que realmente corresponde la alternativa léxica. No se requieren más cambios sustanciales.
