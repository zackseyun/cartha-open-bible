review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: fórmula solemne de Jesús, construcción existencial negativa, lista de renuncias, y motivación «por causa del reino de Dios». También preserva acertadamente «esposa» para γυναῖκα y evita el verbo más fuerte «abandonar». Sin embargo, hay un problema de anclaje de nota: la nota [a] aparece tras «dijo», pero su contenido corresponde a «hermanos». Además, «padres» y «hijos» pueden leerse en español como masculinos específicos, mientras que γονεῖς y τέκνα son términos inclusivos; conviene afinar a «padre o madre» y «hijos[a]» con nota alternativa, o mejor aún a «padres» y «hijos[a]» solo si se acepta esa ambigüedad. Aquí la corrección mínima más fiel y clara es reanclar la nota a «hermanos».'
  spanish_quality_summary: El español es natural, digno y legible. «En verdad les digo» funciona bien; «no hay nadie que haya dejado» suena idiomático; «por causa del reino de Dios» es claro. La única falla real de calidad editorial es la ubicación incorrecta de la nota al pie. El resto requiere solo ajuste menor, no reescritura extensa.
  glossary_alignment: 'Alinea correctamente con los términos del proyecto en este versículo: «Dios», «reino», y la conservación de «hermanos» con alternativa inclusiva en nota sigue la filosofía auditada. No hay conflicto con Yahvé/Mesías/Cristo u otros términos troncales.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «dijo» pero explica «hermanos».
    rationale: Según la disciplina requerida, el marcador debe aparecer exactamente en la palabra o frase relevante. La nota léxica trata ἀδελφοὺς, no εἶπεν.
  - severity: low
    issue: «Padres» y «hijos» en español pueden sonar menos explícitamente inclusivos que γονεῖς y τέκνα.
    rationale: No es un error suficiente para rechazar el texto, porque ambos pueden funcionar genéricamente en español bíblico actual; aun así, la ambigüedad existe. Dado que el inglés no añadió nota aquí, no es obligatorio crear una nueva en español.
  revised_spanish_text: 'Y les dijo: «En verdad les digo que no hay nadie que haya dejado casa o esposa o hermanos[a] o padres o hijos por causa del reino de Dios».'
  revised_footnotes:
