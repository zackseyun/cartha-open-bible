translation:
  language: es
  text: 'Y les dijo: «En verdad les digo que no hay nadie que haya dejado casa o esposa o hermanos[a] o padres o hijos por causa del reino de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas», si se entiende la referencia de manera inclusiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I say to you
  chosen_spanish: En verdad les digo
  alternatives_spanish:
  - Amén, les digo
  - De cierto les digo
  lexicon: BDAG
  rationale: La fórmula solemne de Jesús se conserva con una expresión natural y reverente en español. «En verdad» comunica la fuerza enfática de Ἀμὴν sin introducir una repetición innecesaria; «les digo» preserva el valor discursivo de λέγω ὑμῖν.
- source_word: οὐδείς ἐστιν ὃς
  english_pob_choice: there is no one who
  chosen_spanish: no hay nadie que
  alternatives_spanish:
  - no existe quien
  - nadie que
  lexicon: BDAG
  rationale: En español, la construcción existencial «no hay nadie que» suena más natural y mantiene el universal negativo del griego sin perder el matiz de «οὐδείς ἐστιν ὃς».
- source_word: ἀφῆκεν
  english_pob_choice: has left
  chosen_spanish: haya dejado
  alternatives_spanish:
  - dejó
  - haya abandonado
  lexicon: BDAG
  rationale: El subjuntivo perfecto en español refleja bien la idea de una acción completada con relevancia para la afirmación general. «Dejado» es más neutro que «abandonado» y evita cargar el verbo con una connotación moral que el griego no exige.
- source_word: οἰκίαν
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - vivienda
  lexicon: BDAG
  rationale: «Casa» sigue de cerca el valor concreto de οἰκίαν y funciona mejor en una lista breve de relaciones y pertenencias. «Hogar» sería más interpretativo y afectivo; «vivienda» suena demasiado técnico.
- source_word: γυναῖκα
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - esposa
  lexicon: BDAG
  rationale: En este contexto familiar, γυνή se entiende como la cónyuge masculina. «Esposa» comunica el sentido relacional en español de manera clara y precisa.
- source_word: ἀδελφοὺς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos
  - hermanos y hermanas
  - parientes
  lexicon: BDAG
  rationale: Se conserva el masculino plural del griego como «hermanos», siguiendo la distinción de género del texto fuente. Aunque el conjunto pueda sentirse inclusivo para algunas lecturas, el griego no lo explicita aquí.
- source_word: γονεῖς
  english_pob_choice: parents
  chosen_spanish: padres
  alternatives_spanish:
  - padres
  - progenitores
  lexicon: BDAG
  rationale: «Padres» es el equivalente español más directo y natural para γονεῖς en una lista de vínculos familiares. «Progenitores» sería demasiado formal y menos idiomático.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos
  - hijos e hijas
  - niños
  lexicon: BDAG
  rationale: Aunque τέκνα puede ser inclusivo, en esta secuencia relacional «hijos» resulta el equivalente más sobrio y fluido en español. «Hijos e hijas» ampliaría explícitamente lo que el griego no desglosa; «niños» sería incorrecto por edad.
- source_word: ἕνεκεν
  english_pob_choice: for the sake of
  chosen_spanish: por causa de
  alternatives_spanish:
  - por causa de
  - por el bien de
  - a causa de
  lexicon: BDAG
  rationale: «Por causa de» expresa la motivación o razón del abandono de forma fiel y natural. En español bíblico actual, esta fórmula comunica bien el sentido de ἕνεκεν sin sonar artificiosa.
- source_word: βασιλείας τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios
  - el reinado de Dios
  lexicon: BDAG
  rationale: Se mantiene la expresión establecida y transparente «reino de Dios». «Reinado de Dios» explicita el aspecto dinámico del término, pero no es necesario aquí y se aparta más del uso bíblico común.
theological_decisions:
- issue: El dejar familia y bienes podría leerse como un mandato de abandono irresponsable.
  english_pob_reading: left ... for the sake of the kingdom of God
  chosen_spanish_reading: haya dejado ... por causa del reino de Dios
  alternative_spanish_readings:
  - haya abandonado ... por el reino de Dios
  - dejó ... por causa del reino de Dios
  rationale: 'La redacción conserva la tensión del pasaje: habla de renuncia costosa por causa del reino, no de una aprobación general del descuido familiar. «Dejado» mantiene la neutralidad relativa del griego, mientras que «abandonado» endurecería indebidamente el sentido.'
  doctrine_reference: Mantener la tensión textual sin resolverla por interpretación pastoral.
- issue: El griego usa ἀδελφοὺς en masculino plural, con posible lectura inclusiva, pero no explícita.
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - parientes
  rationale: Se preserva la forma gramatical masculina plural como en el griego. Aunque algunos contextos pueden implicar inclusión amplia, aquí no se fuerza una neutralización que el texto no formula.
  doctrine_reference: Principio de precisión de género según el texto fuente.
translation_notes:
  revision_awareness: El español sigue la última revisión auditada del inglés al omitir cualquier artículo antes de «casa» y mantiene la estructura breve de la lista. También conserva la decisión revisada de no intensificar ἀφῆκεν con «abandonado», respetando la formulación más neutra del inglés final.
  spanish_consistency_notes:
  - Se usa «reino de Dios» de forma consistente con la terminología POB establecida.
  - Se evita «SEÑOR» como sustituto de θεός, pues aquí el texto griego dice explícitamente τοῦ θεοῦ.
  - La lista de vínculos familiares conserva el paralelismo simple del griego sin añadir elementos explicativos.
