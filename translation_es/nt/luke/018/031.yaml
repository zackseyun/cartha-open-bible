translation:
  language: es
  text: 'Entonces, tomando aparte a los doce, les dijo: «Miren, subimos a Jerusalén, y todo lo escrito por medio de los profetas acerca del Hijo del Hombre[a] se cumplirá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse más literalmente: “todo lo escrito por los profetas para el Hijo del Hombre”; la construcción griega admite una lectura más cercana al destinatario, pero aquí probablemente significa lo que los profetas escribieron acerca de él.'
    reason: alternative_reading
lexical_decisions:
- source_word: Παραλαβὼν
  english_pob_choice: taking the twelve aside
  chosen_spanish: tomando aparte
  alternatives_spanish:
  - tomando
  - llevando consigo
  - apartando
  lexicon: BDAG
  rationale: El participio de παραλαμβάνω aquí sugiere que Jesús no solo “recibe” a los doce, sino que los toma consigo para una instrucción más privada. En español, “tomando aparte” conserva esa matiz contextual sin sobrerinterpretar.
- source_word: τοὺς δώδεκα
  english_pob_choice: the twelve
  chosen_spanish: los doce
  alternatives_spanish:
  - los doce discípulos
  lexicon: BDAG
  rationale: El griego dice simplemente “los doce”. Mantener “los doce” conserva el designativo fijo del grupo íntimo de Jesús sin añadir una glosa interpretativa.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren aquí
  - Vean
  - He aquí
  lexicon: BDAG
  rationale: Como marcador discursivo de atención, ἰδού pide una forma natural en español. “Miren” comunica la apelación directa con dignidad y claridad, mejor que un calco arcaico.
- source_word: ἀναβαίνομεν
  english_pob_choice: we are going up
  chosen_spanish: subimos
  alternatives_spanish:
  - vamos subiendo
  - estamos subiendo
  lexicon: BDAG
  rationale: El sentido de ascenso está implícito en el movimiento hacia Jerusalén, pero en español “subimos a Jerusalén” suena natural y conserva la orientación geográfica sin perder la imagen de ascenso.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: τελεσθήσεται
  english_pob_choice: will be fulfilled
  chosen_spanish: se cumplirá
  alternatives_spanish:
  - será cumplido
  - se llevará a cumplimiento
  - será realizado
  lexicon: BDAG
  rationale: En contexto profético, el futuro pasivo comunica que lo escrito alcanzará su cumplimiento previsto. “Se cumplirá” es la forma más natural en español y preserva la fuerza profética.
- source_word: πάντα τὰ γεγραμμένα
  english_pob_choice: everything written
  chosen_spanish: todo lo escrito
  alternatives_spanish:
  - todas las cosas escritas
  - todo cuanto está escrito
  lexicon: BDAG
  rationale: La expresión griega totaliza lo escrito; “todo lo escrito” reproduce esa amplitud de modo claro y idiomático en español.
- source_word: διὰ τῶν προφητῶν
  english_pob_choice: through the prophets
  chosen_spanish: por medio de los profetas
  alternatives_spanish:
  - a través de los profetas
  - por los profetas
  lexicon: BDAG
  rationale: διά con genitivo puede expresar instrumento o agencia. “Por medio de los profetas” conserva la idea de mediación profética y evita un español ambiguo o demasiado literal.
- source_word: τῷ υἱῷ τοῦ ἀνθρώπου
  english_pob_choice: about the Son of Man
  chosen_spanish: acerca del Hijo del Hombre
  alternatives_spanish:
  - para el Hijo del Hombre
  - con respecto al Hijo del Hombre
  lexicon: BDAG
  rationale: La construcción griega permite una relación de referencia/contenido con lo escrito. “Acerca del Hijo del Hombre” expresa esa relación de manera natural y mantiene el título cristológico sin diluirlo.
theological_decisions:
- issue: Título cristológico ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Ser Humano
  - el Hombre
  rationale: Se conserva la traducción tradicional del título para mantener su peso intertextual y mesiánico. Aunque en español puede sonar menos explícito para lectores modernos, evita resolver la tensión teológica del título con una paráfrasis interpretativa.
  doctrine_reference: 'Translation philosophy: translate titles; preserve theological tension rather than resolve it.'
- issue: Relación sintáctica de τῷ υἱῷ τοῦ ἀνθρώπου con 'lo escrito'
  english_pob_reading: what is written through the prophets about the Son of Man
  chosen_spanish_reading: todo lo escrito por medio de los profetas acerca del Hijo del Hombre
  alternative_spanish_readings:
  - todo lo escrito por los profetas para el Hijo del Hombre
  - todo lo escrito por medio de los profetas para el Hijo del Hombre
  rationale: La dative griega puede leerse con referencia/contenido (“acerca de”) o más literalmente como destinatario (“para”). La lectura adoptada sigue el entendimiento contextual del audit trail inglés, pero la redacción española conserva la posibilidad de una relación más literal sin cerrar innecesariamente la ambigüedad.
  doctrine_reference: Source syntax and fulfillment motif in Luke
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso alto del audit trail inglés sin introducir revisiones textuales nuevas. Se mantiene la preferencia por equivalencia óptima: español natural, pero anclado en el griego y en la decisión inglesa de preservar el título cristológico y la lógica de cumplimiento profético.'
  spanish_consistency_notes:
  - Se usa “los doce” como designación fija del grupo íntimo de Jesús, sin añadir ‘discípulos’.
  - Se conserva “Hijo del Hombre” para mantener consistencia cristológica en toda la obra.
  - Se traduce ἰδού con una forma exhortativa natural (“Miren”) en lugar de un calco arcaico.
  - Se mantiene “por medio de” para δια + genitivo cuando expresa mediación profética.
  - Se evita “SEÑOR” u otras sustituciones no presentes en el versículo.
