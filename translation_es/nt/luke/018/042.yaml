translation:
  language: es
  text: 'Y Jesús le dijo: «Recobra la vista[a]; tu fe te ha salvado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Vuelve a ver». El imperativo griego puede significar «ver de nuevo» en un contexto de sanidad.
    reason: lexical_alternative
  - marker: b
    text: O «te ha sanado» o «te ha hecho bien». El verbo griego puede referirse tanto a sanidad como a salvación.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Conector narrativo simple; en español, «Y» mantiene la coordinación sin introducir matiz interpretativo adicional.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le comentó
  lexicon: BDAG
  rationale: Forma natural y directa para introducir el discurso, conservando el dativo de destinatario.
- source_word: Ἀνάβλεψον
  english_pob_choice: Receive your sight
  chosen_spanish: Recobra la vista
  alternatives_spanish:
  - Recibe tu vista
  - Vuelve a ver
  - Recupera la vista
  lexicon: BDAG
  rationale: En este contexto de sanidad, el imperativo expresa el restablecimiento de la visión. «Recobra la vista» es idiomático en español y preserva la fuerza de «ver de nuevo» sin sonar forzado.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: «Fe» es la equivalencia principal en este contexto. Mantiene la referencia a la confianza creyente del hombre en Jesús, sin desplazar el término hacia una glosa explicativa.
- source_word: σέσωκέν
  english_pob_choice: has saved
  chosen_spanish: ha salvado
  alternatives_spanish:
  - te ha sanado
  - te ha hecho bien
  lexicon: BDAG
  rationale: 'Se conserva «salvado» para mantener la amplitud de σῴζω en Lucas: puede incluir sanidad física y, a la vez, un sentido salvífico más amplio. Evita reducir el verbo solo a curación corporal.'
theological_decisions:
- issue: Alcance de σῴζω en un relato de sanidad
  english_pob_reading: saved
  chosen_spanish_reading: ha salvado
  alternative_spanish_readings:
  - te ha sanado
  - te ha hecho bien
  rationale: La traducción mantiene la tensión lucana entre sanidad y salvación. En vez de resolver el verbo exclusivamente como curación, «ha salvado» conserva la amplitud teológica del pasaje.
  doctrine_reference: 'Philosophy of translation §3; contested terms: preserve genuine ambiguity/tension where the source allows it'
- issue: Sentido de Ἀνάβλεψον en contexto curativo
  english_pob_reading: Receive your sight
  chosen_spanish_reading: Recobra la vista
  alternative_spanish_readings:
  - Vuelve a ver
  - Recupera la vista
  rationale: El imperativo griego puede referir al acto de volver a ver. En español, «Recobra la vista» comunica de modo claro el restablecimiento visual sin perder la orientación al milagro.
  doctrine_reference: Lexical decision for ἀναβλέπω in healing contexts
translation_notes:
  revision_awareness: Coincide con el pasaje griego SBLGNT y con el audit trail en inglés. Se mantiene la apertura semántica de σῴζω y la lectura curativa de ἀναβλέπω, sin añadir contenido no sustentado por el texto fuente.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y «fe» para πίστις, conforme al estándar del proyecto.
  - Se conserva «salvado» en vez de una glosa exclusivamente médica para preservar la amplitud lucana de σῴζω.
  - La puntuación con comillas angulares sigue el uso editorial del español; los marcadores de nota se colocan en las palabras afectadas.
