translation:
  language: es
  text: Les digo que este hombre descendió a su casa justificado[a] más bien que el otro; porque todo el que se enaltece será humillado, pero el que se humilla será enaltecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justificado en comparación con el otro»; la frase contrapone a este hombre con el otro adorador.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: Les digo
  alternatives_spanish:
  - Les aseguro
  - Les afirmo
  lexicon: SBLGNT / discourse context
  rationale: La frase introduce una declaración solemne de Jesús. «Les digo» conserva la inmediatez y la primera persona sin sobrecargar con una fórmula interpretativa adicional.
- source_word: κατέβη
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue hacia abajo
  lexicon: BDAG
  rationale: El verbo griego expresa movimiento hacia abajo. «Descendió» es natural en español culto y conserva la imagen concreta del movimiento desde el templo.
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - este individuo
  lexicon: BDAG
  rationale: El demostrativo apunta al recaudador de impuestos en contraste con el otro orante. «Este hombre» expresa bien la referencia personal y el contraste narrativo.
- source_word: δεδικαιωμένος
  english_pob_choice: justified
  chosen_spanish: justificado
  alternatives_spanish:
  - declarado justo
  - vindicado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de δικαιόω mantiene un sentido forense/resultativo. «Justificado» preserva esa carga teológica de manera concisa y reconocible en español.
- source_word: παρ’ ἐκεῖνον
  english_pob_choice: rather than the other
  chosen_spanish: antes que el otro
  alternatives_spanish:
  - más que el otro
  - en comparación con el otro
  - en vez del otro
  lexicon: BDAG
  rationale: La preposición παρά con acusativo marca contraste/comparación. «Antes que el otro» comunica de forma idiomática que este hombre fue recibido de manera favorable en contraste con el otro participante, sin perder la comparación implícita.
- source_word: οἶκον αὐτοῦ
  english_pob_choice: his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su casa propia
  lexicon: BDAG
  rationale: Aunque οἶκος puede ser «casa» o «hogar», aquí el movimiento de regreso se expresa de manera natural con «a su casa». En español la preposición de dirección hace innecesario repetir un calco verbal.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la afirmación anterior. «Porque» conserva claramente el valor causal del griego.
- source_word: πᾶς ὁ ὑψῶν ἑαυτὸν
  english_pob_choice: everyone who exalts himself
  chosen_spanish: todo el que se enaltece
  alternatives_spanish:
  - todo el que se exalta
  - quien se engrandece
  lexicon: BDAG
  rationale: La construcción articular expresa una máxima general. «Todo el que se enaltece» mantiene el alcance universal y el tono proverbial. En español, el reflexivo singular genérico comunica bien la forma griega.
- source_word: ταπεινωθήσεται
  english_pob_choice: will be humbled
  chosen_spanish: será humillado
  alternatives_spanish:
  - será abatido
  - será rebajado
  lexicon: BDAG
  rationale: La pasiva futura de ταπεινόω puede traducirse con un pasivo impersonal. «Será humillado» sigue de cerca la forma y conserva la pasividad del verbo.
- source_word: ὁ δὲ ταπεινῶν ἑαυτὸν
  english_pob_choice: the one who humbles himself
  chosen_spanish: pero el que se humilla
  alternatives_spanish:
  - pero quien se humilla
  - el que se abaja
  lexicon: BDAG
  rationale: La segunda cláusula mantiene el paralelismo con la primera y el contraste de δέ. «Se humilla» es el equivalente más natural y fiel para el participio presente reflexivo.
- source_word: ὑψωθήσεται
  english_pob_choice: will be exalted
  chosen_spanish: será enaltecido
  alternatives_spanish:
  - será exaltado
  - será levantado
  lexicon: BDAG
  rationale: ὑψόω puede expresarse como «exaltar» o «enaltecer». Se prefiere «enaltecido» para mantener el paralelo léxico con «se enaltece» en la primera mitad y para sonar natural en español contemporáneo. No se pierde la inversión moral del dicho.
theological_decisions:
- issue: Sentido de δικαιόω en el cierre de la parábola
  english_pob_reading: forensic/favorable divine verdict expressed as 'justified'
  chosen_spanish_reading: veredicto favorable y forense expresado como «justificado»
  alternative_spanish_readings:
  - declarado justo
  - vindicado
  rationale: El contexto contrasta al fariseo autojustificado con el recaudador que se presenta con humildad ante Dios. «Justificado» conserva el peso teológico del veredicto divino sin convertir el verso en una paráfrasis doctrinal más amplia.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Contraste comparativo en παρ’ ἐκεῖνον
  english_pob_reading: rather than the other
  chosen_spanish_reading: «antes que el otro» como comparación contrastiva
  alternative_spanish_readings:
  - en comparación con el otro
  - más que el otro
  - en vez del otro
  rationale: La frase griega puede expresar contraste/comparación. La redacción española mantiene la comparación sin forzar una explicación técnica en el cuerpo del texto; el matiz queda suficientemente claro en la nota.
  doctrine_reference: BDAG; Translation philosophy §§2, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó sin cambios necesarios; la presente redacción sigue de cerca el texto griego y conserva el contraste comparativo de παρ’ ἐκεῖνον con una formulación española idiomática.
  spanish_consistency_notes:
  - Se mantiene «justificado» para δεδικαιωμένος, en coherencia con el peso forense del término en la POB.
  - Se usa «enaltece / enaltecido» para ὑψόω a fin de preservar el paralelismo verbal en español.
  - El reflexivo singular «se humilla» conserva la fuerza representativa del griego sin pluralizar el dicho.
