translation:
  language: es
  text: 'En verdad les digo[a]: quien no reciba el reino de Dios como un niño, no entrará en él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "como niño". La expresión puede destacar receptividad, confianza, humildad o dependencia; el griego no especifica cuál de esas cualidades es la exacta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: De cierto
  alternatives_spanish:
  - Amén
  - Verdaderamente
  lexicon: BDAG
  rationale: En la fórmula solemne de Jesús, 'De cierto' comunica en español la fuerza afirmativa y enfática de ἀμὴν sin introducir una transliteración poco natural en este contexto.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les hablo
  lexicon: BDAG
  rationale: '''Les digo'' es la forma natural y directa para reproducir el discurso de Jesús a sus oyentes, preservando el valor de dirección personal del giro griego.'
- source_word: ὃς ἂν
  english_pob_choice: whoever
  chosen_spanish: quien
  alternatives_spanish:
  - el que
  - cualquiera que
  lexicon: BDAG
  rationale: El relativo indefinido griego expresa una condición general; 'quien' en español transmite bien la generalidad sin recargar la frase.
- source_word: μὴ δέξηται
  english_pob_choice: does not receive
  chosen_spanish: no reciba
  alternatives_spanish:
  - no acepte
  - no acoja
  - no reciba ni acepte
  lexicon: BDAG
  rationale: '''Recibir'' conserva el objeto ''el reino de Dios'' como algo que se acoge con disposición abierta, sin especificar más de lo que el verbo griego exige.'
- source_word: βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios Padre
  - el gobierno de Dios
  - el reinado de Dios
  lexicon: BDAG
  rationale: La expresión estable 'reino de Dios' es la equivalencia más transparente y fiel; 'reinado' destacaría la acción de reinar, pero no es necesario para este versículo.
- source_word: ὡς παιδίον
  english_pob_choice: like a child
  chosen_spanish: como un niño
  alternatives_spanish:
  - como un niño pequeño
  - como un niño[a]
  - como un pequeño
  lexicon: BDAG
  rationale: La comparación griega queda abierta; 'como un niño' es la manera más natural en español y no fija indebidamente si el énfasis es receptividad, humildad, confianza o dependencia.
- source_word: οὐ μὴ εἰσέλθῃ
  english_pob_choice: will certainly not enter
  chosen_spanish: no entrará
  alternatives_spanish:
  - no entrará de ninguna manera
  - ciertamente no entrará
  - no llegará a entrar
  lexicon: BDAG
  rationale: La negación enfática del griego queda bien representada en español con una negación simple en futuro en este contexto, que suena natural y mantiene la certeza de la exclusión.
- source_word: εἰς αὐτήν
  english_pob_choice: it
  chosen_spanish: en él
  alternatives_spanish:
  - en ella
  - dentro de él
  - dentro de ella
  lexicon: BDAG
  rationale: Aunque el antecedente griego es femenino ('el reino'), en español 'reino' es masculino; por eso se ajusta el pronombre a 'él' para concordancia natural y transparente.
theological_decisions:
- issue: La comparación 'como un niño' y el tipo de cualidad implicada
  english_pob_reading: The translation preserves the simile without specifying whether the emphasis is humility, trust, dependence, or receptivity.
  chosen_spanish_reading: La traducción conserva la comparación sin decidir si el énfasis es humildad, confianza, dependencia o receptividad.
  alternative_spanish_readings:
  - con humildad de niño
  - con confianza de niño
  - como quien es un niño
  rationale: El griego no define la cualidad exacta. Mantener la imagen abierta evita imponer una interpretación más estrecha que el texto no explicita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Texto revisado a la luz del paquete fuente griego y del auditorial inglés de la POB; no se detectaron cambios aplicados en la última pasada, y la redacción española preserva la misma apertura interpretativa del original.
  spanish_consistency_notes:
  - Se mantuvo 'reino de Dios' como término estable y transparente.
  - Se eligió 'De cierto' para reflejar la fórmula enfática inicial sin transliterar 'Amén'.
  - Se evitó resolver la comparación 'como un niño' en una cualidad teológica específica.
  - Se ajustó el pronombre final a la concordancia natural del español ('en él') por referencia a 'reino'.
