review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: certeza de recibir recompensa abundante en el presente y vida eterna en el siglo futuro. También preserva correctamente el contraste escatológico entre «este tiempo» y «el αἰών venidero». Sin embargo, «edad venidera» suena menos natural y menos eclesial en español bíblico general que «era venidera» o «era por venir», y la nota alternativa actual («la edad que viene») no es la mejor formulación española del alternante auditado en inglés («the age to come»).'
  spanish_quality_summary: El español es claro y digno, pero «edad venidera» resulta algo rígido y poco idiomático en este contexto teológico; puede sugerir etapa de vida más que orden escatológico. «Era venidera» mejora la legibilidad y mantiene la distinción conceptual frente a «este tiempo». El resto del versículo está bien construido y fluye naturalmente.
  glossary_alignment: 'No hay conflictos con los términos por defecto del proyecto. «Vida eterna» es correcto. La decisión para οὐχὶ μὴ como «ciertamente recibirá» es aceptable y natural en español. La principal mejora léxica es αἰῶνι τῷ ἐρχομένῳ: conviene «era venidera» en vez de «edad venidera», y la nota alternativa debe alinearse mejor con «la era por venir».'
  issues:
  - severity: medium
    issue: «edad venidera» para αἰῶνι τῷ ἐρχομένῳ
    rationale: Aunque intenta preservar la teología de las dos edades/eras, «edad» en español contemporáneo puede sonar menos natural y más ambiguo que «era» en un contexto escatológico. «Era venidera» comunica mejor un orden o época escatológica.
  - severity: low
    issue: Nota alternativa «la edad que viene»
    rationale: Es comprensible, pero no es la alternativa española más natural ni la mejor correspondencia del inglés auditado «the age to come». «La era por venir» preserva mejor el registro y el matiz teológico.
  revised_spanish_text: el que ciertamente recibirá muchas veces más en este tiempo[a], y en la era venidera, vida eterna.
  revised_footnotes:
  - marker: a
    text: O, «la era por venir».
    reason: alternative_reading
  revision_rationale: Se ajusta αἰών a «era» para lograr un español más natural y teológicamente preciso en el contraste escatológico con «este tiempo». También se mejora la nota alternativa para reflejar de forma más idiomática y fiel el alternante auditado «the age to come». No se requiere adjudicación adicional porque el cambio es estilístico-lexical menor y no altera la decisión teológica de fondo.
