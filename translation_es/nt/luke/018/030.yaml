revisions:
- from: el que ciertamente recibirá muchas veces más en este tiempo[a], y en la edad venidera, vida eterna.
  to: el que ciertamente recibirá muchas veces más en este tiempo[a], y en la era venidera, vida eterna.
  rationale: Se ajusta αἰών a «era» para lograr un español más natural y teológicamente preciso en el contraste escatológico con «este tiempo». También se mejora la nota alternativa para reflejar de forma más idiomática y fiel el alternante auditado «the age to come». No se requiere adjudicación adicional porque el cambio es estilístico-lexical menor y no altera la decisión teológica de fondo.
