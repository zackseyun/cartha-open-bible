translation:
  language: es
  text: el que ciertamente recibirá muchas veces más en este tiempo[a], y en la era venidera, vida eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la era por venir».
    reason: alternative_reading
lexical_decisions:
- source_word: ὃς
  english_pob_choice: who
  chosen_spanish: el que
  alternatives_spanish:
  - quien
  - quienquiera que
  lexicon: BDAG
  rationale: El relativo retoma a la persona mencionada en el contexto previo; en español, «el que» mantiene bien la continuidad sintáctica sin volver la frase excesivamente general.
- source_word: οὐχὶ μὴ
  english_pob_choice: will certainly receive
  chosen_spanish: ciertamente
  alternatives_spanish:
  - de ningún modo
  - sin falta
  - seguramente
  lexicon: BDAG
  rationale: La fuerza enfática de la doble negación griega se expresa de manera natural con un adverbio de certeza. Aquí se integra con el verbo para evitar una negación artificiosa en español y conservar la seguridad del enunciado.
- source_word: ἀπολάβῃ
  english_pob_choice: receive
  chosen_spanish: recibirá
  alternatives_spanish:
  - recibirá de vuelta
  - obtendrá
  - volverá a recibir
  lexicon: BDAG
  rationale: «Recibirá» es idiomático y fiel. En este contexto de recompensa por lo dejado atrás, no hace falta explicitar «de vuelta» en el texto principal; esa idea queda implícita en el marco inmediato.
- source_word: πολλαπλασίονα
  english_pob_choice: many times more
  chosen_spanish: muchas veces más
  alternatives_spanish:
  - mucho más
  - múltiplas veces más
  - manifold más
  lexicon: BDAG
  rationale: «Muchas veces más» preserva la idea de multiplicación abundante con naturalidad en español. Es más claro que una opción calcaica y no atenúa el valor cuantitativo.
- source_word: ἐν τῷ καιρῷ τούτῳ
  english_pob_choice: in this time
  chosen_spanish: en este tiempo
  alternatives_spanish:
  - en esta época
  - en este tiempo presente
  - en esta sazón
  lexicon: BDAG
  rationale: «καιρός» aquí señala el tiempo/ocasión presente en contraste con la era venidera. «En este tiempo» mantiene el paralelismo con la cláusula siguiente y conserva el contraste escatológico.
- source_word: ἐν τῷ αἰῶνι τῷ ἐρχομένῳ
  english_pob_choice: in the age to come
  chosen_spanish: en la edad venidera
  alternatives_spanish:
  - en la edad que viene
  - en el siglo venidero
  - en la edad por venir
  lexicon: BDAG
  rationale: «αἰών» en este marco no es solo «tiempo futuro», sino una era ordenada escatológicamente. «Edad venidera» conserva esa carga teológica y la diferencia respecto a «este tiempo».
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida perpetua
  - vida del siglo venidero
  lexicon: BDAG
  rationale: «Vida eterna» es la equivalencia estable y más transparente en los evangelios. Conserva el sentido escatológico reconocido sin perder inteligibilidad para lectores de iglesia.
theological_decisions:
- issue: Contraste escatológico entre «este tiempo» y «la edad venidera»
  english_pob_reading: the age to come
  chosen_spanish_reading: la edad venidera
  alternative_spanish_readings:
  - la edad que viene
  - el siglo venidero
  - la era venidera
  rationale: Se preserva la tensión de dos edades sin reducirla a un simple futuro cronológico. «Edad venidera» mantiene la perspectiva escatológica y el paralelismo con el presente.
  doctrine_reference: Translation philosophy §3; two-age eschatology in the Gospel tradition.
- issue: Fuerza enfática de la negación οὐχὶ μὴ
  english_pob_reading: will certainly receive
  chosen_spanish_reading: ciertamente recibirá
  alternative_spanish_readings:
  - seguramente recibirá
  - no dejará de recibir
  - recibirá con toda certeza
  rationale: La doble negación griega expresa certeza fuerte, no mera posibilidad. En español, una formulación afirmativa con «ciertamente» conserva la seguridad sin sonar forzada.
  doctrine_reference: BDAG on emphatic negation; translation philosophy §2, preserve force without unnatural calque.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés: se evitó expandir la negación a una perífrasis como «no dejará de», y se mantuvo la traducción natural de la expresión escatológica con una nota alternativa. El español conserva la misma relación entre presente y era venidera que el POB inglés revisado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - «Vida eterna» se mantiene como término establecido y no se parafrasea como «vida del siglo venidero» en el texto principal.
  - «Edad venidera» se prefiere por su transparencia escatológica y su buena recepción en español bíblico contemporáneo.
  - La nota al pie marca la alternativa legítima «la edad que viene» sin duplicar el contenido principal.
