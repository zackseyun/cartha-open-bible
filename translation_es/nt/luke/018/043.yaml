  text: καὶ παραχρῆμα ἀνέβλεψεν, καὶ ἠκολούθει αὐτῷ δοξάζων τὸν θεόν. καὶ πᾶς ὁ λαὸς ἰδὼν ἔδωκεν αἶνον τῷ θεῷ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/018/043.yaml
  text: And immediately he received his sight[a], and he followed him, glorifying God. And all the people, when they saw it[b], gave praise to God.
  footnotes:
  - marker: a
    text: Or 'saw again' or 'regained his sight.' The Greek verb can mean to recover sight; here 'received his sight' is chosen as the most natural English rendering in context.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''followed him.'' The Greek imperfect may emphasize continued action: ''was following him.'''
    reason: lexical_alternative
