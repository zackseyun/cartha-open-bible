    issue: '''al verlo'' introduce un referente ambiguo y probablemente incorrecto para ἰδὼν'
    rationale: El griego usa un participio singular colectivo con πᾶς ὁ λαός; el audit trail inglés aclara el objeto implícito como 'it' (lo sucedido/la sanidad). En español, 'al verlo' suele referirse a una persona masculina, no al acontecimiento.
  - severity: low
    issue: La nota [b] apoya una lectura menos fiel al objeto implícito contextual
    rationale: La nota actual ofrece 'cuando lo vieron', que conserva la misma ambigüedad personal. Conviene orientar hacia 'al ver esto' o 'cuando vieron esto'.
  revised_spanish_text: Y enseguida recuperó la vista[a], y lo siguió, glorificando a Dios. Y todo el pueblo, al ver esto[b], dio alabanza a Dios.
