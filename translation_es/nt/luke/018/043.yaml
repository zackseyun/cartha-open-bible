revisions:
- from: Y enseguida recuperó la vista[a], y lo siguió, glorificando a Dios. Y todo el pueblo, al verlo[b], dio alabanza a Dios.
  to: Y enseguida recuperó la vista[a], y lo siguió, glorificando a Dios. Y todo el pueblo, al ver esto[b], dio alabanza a Dios.
  rationale: Se ajusta 'al verlo' a 'al ver esto' para reflejar mejor el objeto implícito contextual del griego y del audit trail inglés, evitando una ambigüedad personal no deseada en español. Se conserva el resto del versículo, que es fiel y legible.
