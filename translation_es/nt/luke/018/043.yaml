translation:
  language: es
  text: Y enseguida recuperó la vista[a], y lo siguió, glorificando a Dios. Y todo el pueblo, al ver esto[b], dio alabanza a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'recobró la vista' o 'volvió a ver'. El verbo griego puede significar recuperar la vista; aquí se eligió 'recuperó la vista' por ser la forma más natural en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'cuando vieron esto'. El participio griego es singular porque concuerda con el colectivo 'todo el pueblo', pero en español puede expresarse naturalmente con una referencia al hecho visto.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: Expresa la inmediatez del adverbio griego con un español natural y digno; 'enseguida' mantiene la fuerza temporal sin sonar rígido.
- source_word: ἀνέβλεψεν
  english_pob_choice: received his sight
  chosen_spanish: recuperó la vista
  alternatives_spanish:
  - recobró la vista
  - volvió a ver
  lexicon: BDAG
  rationale: En contexto de sanidad ocular, ἀναβλέπω puede significar recuperar la vista. 'Recuperó la vista' es claro en español y conserva la idea de restauración; evita implicar innecesariamente una historia previa específica de ceguera más allá del contexto narrativo.
- source_word: ἠκολούθει
  english_pob_choice: he followed him
  chosen_spanish: lo siguió
  alternatives_spanish:
  - lo iba siguiendo
  - seguía tras él
  lexicon: BDAG
  rationale: Aunque el imperfecto griego puede sugerir acción en curso, el audit trail en inglés revisado optó por una forma narrativa simple más natural. En español, 'lo siguió' comunica adecuadamente la acción sin sobrecargarla; la continuidad queda implícita en el contexto.
- source_word: δοξάζων
  english_pob_choice: glorifying
  chosen_spanish: glorificando
  alternatives_spanish:
  - dando gloria
  - alabando
  lexicon: BDAG
  rationale: Conserva el vínculo léxico con δοξάζω y el matiz de honor dirigido a Dios. 'Alabando' se acerca demasiado a αἶνον al final del versículo.
- source_word: λαός
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  lexicon: BDAG
  rationale: '''El pueblo'' refleja con precisión λαός como colectivo reunido y mantiene el tono bíblico sin recurrir a una formulación demasiado coloquial.'
- source_word: ἰδὼν
  english_pob_choice: when they saw it
  chosen_spanish: al verlo
  alternatives_spanish:
  - cuando lo vieron
  - al ver esto
  lexicon: BDAG
  rationale: El participio singular colectivo se vuelve naturalmente impersonal en español con 'al verlo'. El pronombre objeto retoma el hecho narrativo de la sanidad y evita una expansión innecesaria.
- source_word: ἔδωκεν αἶνον
  english_pob_choice: gave praise
  chosen_spanish: dio alabanza
  alternatives_spanish:
  - dio alabanza
  - dio alabanza y gloria
  - lo alabó
  lexicon: BDAG
  rationale: La construcción griega es literalmente 'dio alabanza'. 'Dar alabanza' preserva la estructura verbal-nominal y distingue este gesto de δοξάζω, que ya aparece antes en el versículo.
- source_word: θεός / θεῷ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - a Dios
  - al Dios
  lexicon: BDAG
  rationale: Renderiza de forma estándar θεός/θεῷ como 'Dios', manteniendo la referencia repetida al destinatario de la glorificación y la alabanza.
theological_decisions:
- issue: Relación entre glorificar a Dios y dar alabanza a Dios en la misma unidad versicular
  english_pob_reading: glorifying God ... gave praise to God
  chosen_spanish_reading: glorificando a Dios ... dio alabanza a Dios
  alternative_spanish_readings:
  - dando gloria a Dios ... alabó a Dios
  - glorificando a Dios ... alabaron a Dios
  rationale: Se preservan ambas expresiones sin fusionarlas, porque el griego usa dos verbos distintos (δοξάζω y ἔδωκεν αἶνον) para acciones relacionadas pero no idénticas. Esto evita borrar la distinción retórica del texto.
  doctrine_reference: Translation philosophy §3, §5
- issue: Aspecto narrativo de ἠκολούθει en una traducción española natural
  english_pob_reading: he followed him
  chosen_spanish_reading: lo siguió
  alternative_spanish_readings:
  - lo iba siguiendo
  - seguía tras él
  rationale: Aunque el imperfecto puede señalar continuidad, una forma española simple en pretérito mantiene la fluidez narrativa y sigue siendo compatible con la acción continuada por el contexto. No se introduce un matiz doctrinal nuevo.
  doctrine_reference: Translation philosophy §2, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió una narración más natural para el segundo verbo; por eso se evitó una perífrasis continua en español. También se mantuvo la distinción entre 'glorificando' y 'dio alabanza' para reflejar los dos verbos griegos distintos.
  spanish_consistency_notes:
  - Se usó 'Dios' de forma uniforme para θεός/θεῷ.
  - Se evitó 'SEÑOR' o equivalentes de máscara, porque el texto griego contiene θεός.
  - '''El pueblo'' conserva el sustantivo colectivo λαός.'
  - La traducción mantiene estilo bíblico claro y moderno, sin arcaísmos innecesarios.
