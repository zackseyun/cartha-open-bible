  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y conserva la forma de cita del Decálogo: «los mandamientos», la serie de prohibiciones y el mandato final de honrar a los padres. Sin embargo, «no mates» no preserva con suficiente precisión el valor de φονεύω, que en el expediente inglés fue decidido como «murder» y no «kill».'
  spanish_quality_summary: 'El español es claro y natural, con buen registro eclesial moderno. «Tú conoces» es comprensible, aunque «sabes» sería más idiomático; no requiere cambio. La principal mejora necesaria es lexical: «no asesines» expresa mejor el sentido y sigue siendo plenamente natural. Conviene además reflejar en nota la alternativa tradicional futura, ya preservada en el POB inglés.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo la fidelidad a las decisiones léxicas del expediente. «Los mandamientos», «no cometas adulterio», «no robes», «no des falso testimonio» y «honra a tu padre y a tu madre» están alineados. «No mates» no está alineado con la decisión documentada para φονεύω.
