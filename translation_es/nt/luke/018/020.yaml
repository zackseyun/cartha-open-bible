    rationale: El expediente inglés justificó «do not murder» precisamente para evitar el sentido demasiado amplio de «kill». En español, «no mates» vuelve a introducir esa amplitud; «no asesines» preserva mejor el significado.
  - severity: low
    issue: Falta la nota de alternativa tradicional para la serie del Decálogo
    rationale: 'El POB inglés conserva una nota con la formulación más tradicional «You shall not ...». En español conviene mantener el paralelo: «No cometerás... / No asesinarás...», anclado en la primera prohibición para evitar redundancia.'
  revised_spanish_text: 'Tú conoces los mandamientos: No cometas adulterio[a], no asesines, no robes, no des falso testimonio, honra a tu padre y a tu madre.'
