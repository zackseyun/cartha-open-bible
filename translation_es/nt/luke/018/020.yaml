translation:
  language: es
  text: 'Tú conoces los mandamientos: No cometas adulterio[a], no asesines, no robes, no des falso testimonio, honra a tu padre y a tu madre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «No cometerás adulterio... no asesinarás... no robarás... no darás falso testimonio»'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰς ἐντολὰς
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - las órdenes
  lexicon: BDAG
  rationale: ἐντολή designa un mandato o mandamiento con fuerza normativa. En este contexto Jesús alude a mandamientos bien conocidos de la Ley; por eso «los mandamientos» conserva el sentido jurídico-religioso reconocido y resulta natural en español.
- source_word: οἶδας
  english_pob_choice: you know
  chosen_spanish: tú conoces
  alternatives_spanish:
  - sabes
  - tú sabes
  lexicon: BDAG
  rationale: Aunque οἶδα puede funcionar con valor presente de 'saber', en español «conoces» comunica con claridad que la persona reconoce esos mandamientos. Se evita la repetición de «sabes» con «mandamientos» y se mantiene el tono directo.
- source_word: Μὴ μοιχεύσῃς
  english_pob_choice: Do not commit adultery
  chosen_spanish: No cometas adulterio
  alternatives_spanish:
  - No adulteres
  - No cometas adulterio
  lexicon: BDAG
  rationale: μοιχεύω significa cometer adulterio. «No cometas adulterio» es la forma más clara y fiel en español moderno, preservando la prohibición moral específica sin suavizarla.
- source_word: Μὴ φονεύσῃς
  english_pob_choice: do not murder
  chosen_spanish: no mates
  alternatives_spanish:
  - no asesines
  - no cometas homicidio
  lexicon: BDAG
  rationale: φονεύω apunta a matar de manera homicida; sin embargo, en español bíblico «no mates» transmite la prohibición de forma natural y breve. «No asesines» sería más explícito, pero puede sonar más interpretativo; aquí se conserva la forma imperativa concisa.
- source_word: Μὴ κλέψῃς
  english_pob_choice: do not steal
  chosen_spanish: no robes
  alternatives_spanish:
  - no hurtes
  - no sustraigas
  lexicon: BDAG
  rationale: κλέπτω significa robar. «No robes» es el equivalente directo, idiomático y suficientemente preciso para el lector español.
- source_word: Μὴ ψευδομαρτυρήσῃς
  english_pob_choice: do not bear false witness
  chosen_spanish: no des falso testimonio
  alternatives_spanish:
  - no testifiques falsamente
  - no levantes falso testimonio
  lexicon: BDAG
  rationale: ψευδομαρτυρέω remite a dar testimonio falso. «No des falso testimonio» conserva la resonancia del Decálogo y funciona bien en español contemporáneo.
- source_word: Τίμα
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honra a
  - respeta
  lexicon: BDAG
  rationale: τιμάω expresa honrar con reconocimiento debido. «Honra» mantiene la forma imperativa natural en español y el peso ético-covenantal del mandamiento.
- source_word: τὸν πατέρα σου καὶ τὴν μητέρα
  english_pob_choice: your father and mother
  chosen_spanish: a tu padre y a tu madre
  alternatives_spanish:
  - a tu padre y madre
  - a tu padre y tu madre
  lexicon: BDAG
  rationale: La frase nombra a ambos progenitores. En español, añadir la preposición «a» con el objeto directo personal mejora la claridad y la naturalidad sintáctica sin alterar el sentido.
theological_decisions:
- issue: Forma de las prohibiciones del Decálogo en cita de Jesús
  english_pob_reading: Use modern imperative prohibitions ('Do not ...') rather than traditional future-style ('You shall not ...').
  chosen_spanish_reading: Usar prohibiciones imperativas modernas («No ...») en vez de la forma futura tradicional («No ...ás» / «No ...rás»).
  alternative_spanish_readings:
  - No cometerás adulterio, no matarás, no robarás, no darás falso testimonio
  - No cometerás adulterio, no asesinarás, no hurtarás, no levantarás falso testimonio
  rationale: El griego presenta prohibiciones directas en forma de cita. En español, la serie con «No ...» comunica con mayor naturalidad la fuerza prohibitiva y evita introducir un tono arcaizante que no añade fidelidad. No cambia el contenido doctrinal del mandamiento.
  doctrine_reference: Translation philosophy §6 (Readable modern Spanish, not archaic or academic)
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada. Esta versión no incluye marcadores de nota, por lo que no hay footnotes sin referencia en el texto.
  spanish_consistency_notes:
  - Se conservó un registro bíblico sobrio y contemporáneo.
  - Se evitó «SEÑOR» o equivalentes porque este versículo no contiene el nombre divino.
  - Se mantuvo la secuencia de mandamientos sin expandir ni reordenar el texto.
  - Se prefirió una sintaxis natural en español, pero sin suavizar la fuerza prohibitiva del original.
