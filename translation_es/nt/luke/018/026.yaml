lexical_decisions:
- source_word: Εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - dijeron entonces
  - respondieron
  lexicon: BDAG
  rationale: El aoristo narrativo se expresa naturalmente en español con pretérito simple. «Dijeron» mantiene la sucesión narrativa sin sobrecargar el verbo con matices no explícitos.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce transición narrativa; «Entonces» reproduce esa progresión con fluidez natural en español.
- source_word: οἱ ἀκούσαντες
  english_pob_choice: those who heard it
  chosen_spanish: los que lo oyeron
  alternatives_spanish:
  - los que oyeron
  - quienes lo escucharon
  lexicon: BDAG
  rationale: El participio sustantivado se refiere a quienes oyeron la declaración previa. En español, «lo» recupera el objeto implícito del contexto con naturalidad.
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Y quién
  lexicon: BDAG
  rationale: καί encabeza la réplica con sentido aditivo y continuidad discursiva; «Y» conserva esa conexión directa.
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - quién, pues
  - quién entonces
  lexicon: BDAG
  rationale: El interrogativo busca la identidad de una persona posible. «Quién» es el equivalente directo y más natural en español.
- source_word: δύναται
  english_pob_choice: can
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  - tiene poder para
  lexicon: BDAG
  rationale: El verbo expresa capacidad/posibilidad. «Puede» preserva esa fuerza de manera breve y idiomática.
- source_word: σωθῆναι
  english_pob_choice: be saved
  chosen_spanish: ser salvo
  alternatives_spanish:
  - ser rescatado
  - ser librado
  lexicon: BDAG
  rationale: En el contexto lucano la referencia es soteriológica. «Ser salvo» mantiene la terminología bíblica sin desviar el sentido hacia un rescate meramente físico.
theological_decisions:
- issue: Sentido de σωθῆναι en contexto
  english_pob_reading: soteriological 'be saved'
  chosen_spanish_reading: ser salvo
  alternative_spanish_readings:
  - ser rescatado
  - ser librado
  rationale: El contexto inmediato trata de la dificultad de entrar en el reino de Dios; por eso la lectura primaria es de salvación, no solo de rescate general. «Ser salvo» comunica esa carga teológica con fidelidad.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense without importing extra doctrinal claims.'
translation_notes:
  revision_awareness: El texto inglés auditado no requiere notas ni correcciones; se conserva la progresión narrativa y el sentido soteriológico del pasivo aoristo infinitivo.
  spanish_consistency_notes:
  - Se mantiene «salvo» para coherencia con la terminología soteriológica del pasaje.
  - No se usa «Cristo» ni vocabulario técnico adicional porque el versículo no lo contiene.
  - La partícula griega δὲ se refleja con «Entonces», no con una simple «y», para conservar el avance narrativo.
