revisions:
- from: Entonces les decía una parábola sobre la necesidad de que siempre oraran y no se desanimaran.[a]
  to: Y les decía una parábola acerca de la necesidad de orar siempre y no perder el ánimo.[a]
  rationale: Se ajusta el conector discursivo para no sobrerrepresentar secuencia temporal, se mejora la naturalidad de la frase sobre δεῖν, y se adopta una expresión más idiomática para ἐγκακεῖν, manteniendo el sentido del original y la alternativa documentada en la nota.
