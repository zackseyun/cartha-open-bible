translation:
  language: es
  text: Y les decía una parábola acerca de la necesidad de orar siempre y no perder el ánimo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para mostrar que debían orar siempre y no desanimarse».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  english_pob_choice: he was telling
  chosen_spanish: les decía
  alternatives_spanish:
  - les estaba diciendo
  - les contaba
  lexicon: BDAG
  rationale: El imperfecto griego marca una acción en curso o de fondo; en español, el imperfecto narrativo 'les decía' conserva bien ese aspecto sin sonar forzado.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Entonces
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: δέ funciona como transición discursiva suave. 'Entonces' enlaza naturalmente la escena en español sin añadir una relación lógica más fuerte de la que ofrece el griego.
- source_word: παραβολὴν
  english_pob_choice: a parable
  chosen_spanish: una parábola
  alternatives_spanish:
  - una ilustración
  lexicon: BDAG
  rationale: '''Parábola'' es el equivalente directo y conserva el género narrativo de enseñanza propio del contexto sinóptico.'
- source_word: πρὸς τὸ δεῖν
  english_pob_choice: about the need for them
  chosen_spanish: sobre la necesidad de que
  alternatives_spanish:
  - para mostrar que debían
  - con miras a que
  lexicon: BDAG
  rationale: La construcción πρὸς τὸ + infinitivo expresa referencia o propósito. 'Sobre la necesidad de que' preserva esa relación y permite expresar con naturalidad la cláusula subordinada en español.
- source_word: δεῖν
  english_pob_choice: need
  chosen_spanish: necesidad
  alternatives_spanish:
  - obligación
  - deber
  lexicon: BDAG
  rationale: El verbo δεῖ expresa necesidad/obligación. El sustantivo 'necesidad' mantiene la fuerza de necesidad sin convertirla prematuramente en mandato explícito.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - en todo tiempo
  - constantemente
  lexicon: BDAG
  rationale: '''Siempre'' es la equivalencia más natural y directa en español, preservando la continuidad de la acción.'
- source_word: προσεύχεσθαι
  english_pob_choice: to pray
  chosen_spanish: oraran
  alternatives_spanish:
  - oraran
  - estuvieran orando
  lexicon: BDAG
  rationale: En español, el subjuntivo imperfecto encaja bien dentro de la estructura 'la necesidad de que...'; 'orar' conserva el sentido básico de προσεύχομαι.
- source_word: αὐτοὺς
  english_pob_choice: their / them
  chosen_spanish: que
  alternatives_spanish:
  - de ellos
  - para ellos
  lexicon: BDAG
  rationale: El acusativo con infinitivos se refleja en español mediante la subordinación 'de que... oraran', que hace explícita la relación sintáctica sin sobrecargar el texto.
- source_word: μὴ ἐγκακεῖν
  english_pob_choice: not lose heart
  chosen_spanish: no se desanimaran
  alternatives_spanish:
  - no perdieran el ánimo
  - no desfallecieran
  lexicon: BDAG
  rationale: ἐγκακέω puede expresar perder el ánimo, desanimarse o cansarse. 'No se desanimaran' comunica bien la idea de desaliento persistente en un español claro y natural.
theological_decisions:
- issue: Force of Jesus' teaching on prayer persistence
  english_pob_reading: The verse states the necessity of continual prayer and perseverance without specifying a denominational doctrine of prayer efficacy.
  chosen_spanish_reading: El versículo presenta la necesidad de orar siempre y perseverar sin convertirla en una formulación doctrinal más amplia.
  alternative_spanish_readings:
  - Deben orar siempre y no desanimarse.
  - Es necesario que oren siempre y no pierdan el ánimo.
  rationale: 'δεῖ expresa necesidad real, pero el texto no desarrolla una teoría de la eficacia de la oración. La redacción española conserva esa tensión: exhorta con claridad, sin cerrar el alcance teológico más allá del versículo.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que ajustó la estructura a 'the need for them to pray always and not lose heart'. En español, se reflejó esa construcción con 'la necesidad de que siempre oraran y no se desanimaran', manteniendo el valor de πρὸς τὸ δεῖν y el sujeto implícito de los infinitivos sin traducir mecánicamente desde el inglés.
  spanish_consistency_notes:
  - Se eligió 'orar' en vez de 'rezar' por consistencia con el registro bíblico amplio del proyecto y por corresponder mejor al uso neutral latinoamericano.
  - Se mantuvo 'siempre' para πάντοτε y 'desanimaran' para ἐγκακεῖν, evitando una paráfrasis como 'dejar de intentarlo' que debilitaría la fuerza lexical.
  - La nota al pie conserva la alternativa interpretativa que hace explícito el sentido exhortativo del griego, paralelo a la nota inglesa.
