review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Jesús estaba contando una parábola a su audiencia acerca de la necesidad de orar siempre y no desanimarse. Sin embargo, el conector δέ como «Entonces» suena más secuencial de lo que exige el original; «Y/Entonces» puede leerse como avance temporal fuerte, mientras que el inglés auditado justificó una transición suave. Además, «sobre la necesidad de que siempre oraran» es comprensible, pero resulta algo menos natural y algo más pesada que una formulación que mantenga la necesidad sin rigidez.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para sonar más natural y fiel al matiz discursivo. «Les decía» funciona bien para el imperfecto. «No se desanimaran» es correcto, aunque «no perdieran el ánimo» refleja mejor el matiz interno de ἐγκακεῖν y armoniza bien con el registro bíblico moderno. La nota al pie es adecuada y conserva la alternativa del inglés.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Parábola», «orar» y el tratamiento de la necesidad concuerdan con el expediente auditado. No intervienen términos como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: «Entonces» para δέ
    rationale: δὲ aquí es un conector transicional suave, no necesariamente secuencial. «Entonces» puede sobrerrepresentar progresión temporal. «Y» o incluso omitir el conector en español sería más neutral y natural.
  - severity: low
    issue: «sobre la necesidad de que siempre oraran» suena algo pesada
    rationale: Aunque es fiel, la construcción puede mejorarse en naturalidad sin perder el matiz de δεῖν. «acerca de la necesidad de orar siempre...» mantiene bien el sentido y fluye mejor en español.
  - severity: low
    issue: «no se desanimaran» frente a una opción más idiomática
    rationale: «No se desanimaran» es aceptable, pero «no perdieran el ánimo» representa bien el campo semántico de ἐγκακεῖν/‘lose heart’ y suena más natural en registro bíblico claro.
  revised_spanish_text: Y les decía una parábola acerca de la necesidad de orar siempre y no perder el ánimo.[a]
  revised_footnotes:
  - marker: a
    text: 'O: «para mostrar que debían orar siempre y no desanimarse».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el conector discursivo para no sobrerrepresentar secuencia temporal, se mejora la naturalidad de la frase sobre δεῖν, y se adopta una expresión más idiomática para ἐγκακεῖν, manteniendo el sentido del original y la alternativa documentada en la nota.
