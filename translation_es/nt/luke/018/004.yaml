revisions:
- from: 'Y durante un tiempo no quiso[a], pero después se dijo a sí mismo: «Aunque no temo a Dios ni respeto a nadie,»'
  to: 'Y durante un tiempo no estaba dispuesto[a], pero después se dijo a sí mismo: «Aunque no temo a Dios ni respeto a nadie,»'
  rationale: Se ajusta ἤθελεν a «no estaba dispuesto» para reflejar mejor la idea durativa de falta de voluntad sostenida que motivó la decisión inglesa «was unwilling». Se conserva «durante un tiempo», «pero después», «se dijo a sí mismo», «no temo a Dios» y «ni respeto a nadie» por ser fieles, naturales y coherentes con el expediente auditado. No se requiere adjudicación adicional.
