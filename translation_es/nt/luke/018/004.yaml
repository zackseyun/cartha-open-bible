    rationale: Aunque es comprensible, «no quiso» puede leerse como una negativa puntual. El inglés auditado privilegia «was unwilling» precisamente para reflejar una falta sostenida de disposición durante un tiempo. En español, «no estaba dispuesto» conserva mejor ese matiz sin sobreactuar como «se negó».
  - severity: low
