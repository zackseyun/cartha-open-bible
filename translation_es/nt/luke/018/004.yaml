    rationale: La nota explica bien el imperfecto, pero si se revisa el texto debe actualizarse para corresponder al nuevo anclaje y alternativa.
  - severity: low
    issue: Puntuación de la cita
    rationale: En español conviene cerrar la cita con la coma dentro de las comillas angulares al final del segmento citado.
