translation:
  language: es
  text: 'Y durante un tiempo no estaba dispuesto[a], pero después se dijo a sí mismo: «Aunque no temo a Dios ni respeto a nadie,»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no quiso». El imperfecto griego expresa una negativa sostenida durante un periodo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤθελεν
  english_pob_choice: was unwilling
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estaba dispuesto
  - se negó
  lexicon: BDAG
  rationale: El imperfecto expresa una negativa sostenida durante un periodo; en español, «no quiso» comunica bien la voluntad negativa sin volverla demasiado dura como «se negó» ni demasiado explicativa como «no estaba dispuesto».
- source_word: ἐπὶ χρόνον
  english_pob_choice: for a time
  chosen_spanish: durante un tiempo
  alternatives_spanish:
  - por un tiempo
  - por algún tiempo
  lexicon: BDAG
  rationale: La expresión idiomática señala duración limitada sin precisar cuánto. «Durante un tiempo» es natural en español y conserva esa amplitud temporal.
- source_word: μετὰ ταῦτα δὲ
  english_pob_choice: but afterward
  chosen_spanish: pero después
  alternatives_spanish:
  - pero luego
  - pero más tarde
  lexicon: BDAG
  rationale: La frase marca secuencia narrativa con leve contraste. «Pero después» mantiene ambas funciones de manera breve y clara.
- source_word: εἶπεν ἐν ἑαυτῷ
  english_pob_choice: he said to himself
  chosen_spanish: se dijo a sí mismo
  alternatives_spanish:
  - pensó
  - se dijo dentro de sí
  lexicon: BDAG
  rationale: La expresión introduce discurso interior. «Se dijo a sí mismo» preserva la auto-deliberación con naturalidad en español y evita reducirlo a mero pensamiento.
- source_word: Εἰ καὶ
  english_pob_choice: Even though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Aun si
  - Aunque bien
  lexicon: BDAG
  rationale: Aquí la construcción es concesiva. «Aunque» expresa la concesión de forma directa y idiomática.
- source_word: τὸν θεὸν οὐ φοβοῦμαι
  english_pob_choice: I do not fear God
  chosen_spanish: no temo a Dios
  alternatives_spanish:
  - no reverencio a Dios
  - no tengo temor de Dios
  lexicon: BDAG
  rationale: φοβέομαι con Dios puede abarcar temor o reverencia. En boca del juez, la falta moral se expresa con mayor fuerza y claridad mediante «no temo a Dios», que conserva el eco bíblico.
- source_word: οὐδὲ ἄνθρωπον ἐντρέπομαι
  english_pob_choice: nor respect anyone
  chosen_spanish: ni respeto a nadie
  alternatives_spanish:
  - ni respeto al hombre
  - ni me avergüenzo ante nadie
  - ni tengo consideración por nadie
  lexicon: BDAG
  rationale: ἐντρέπομαι aquí indica mostrar respeto, deferencia o consideración. En español, «ni respeto a nadie» comunica bien el sentido general y evita una calca poco natural del singular genérico griego.
theological_decisions:
- issue: ἄνθρωπον como singular genérico
  english_pob_reading: anyone
  chosen_spanish_reading: nadie
  alternative_spanish_readings:
  - el hombre
  - una persona
  rationale: El griego usa ἄνθρωπον en singular con valor genérico. Dado que la revisión inglesa más reciente ya optó por «anyone», la formulación española natural y fiel es «nadie», que preserva el sentido universal sin forzar un masculino genérico en este contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
- issue: Tensión semántica de φοβέομαι con Dios
  english_pob_reading: fear God
  chosen_spanish_reading: temo a Dios
  alternative_spanish_readings:
  - reverencio a Dios
  - tengo temor de Dios
  rationale: El contexto no suaviza la falta del juez; por eso se mantiene el verbo de temor. «Temo a Dios» conserva la fuerza del original y la tensión moral del pasaje.
  doctrine_reference: BDAG φοβέομαι; contexto narrativo de Lucas 18:4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que pasó de «nor respect man» a «nor respect anyone» para reflejar idiomáticamente el singular genérico ἄνθρωπον. La versión española sigue esa línea con «ni respeto a nadie», manteniendo la misma decisión semántica sin perder naturalidad.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al estándar del proyecto.
  - Se conserva el tono sobrio y narrativo, sin añadir explicaciones interpretativas.
  - La cláusula final queda abierta con comillas de cita directa, siguiendo el flujo del versículo en la edición fuente.
