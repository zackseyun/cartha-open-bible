  rationale: Se corrige la forma verbal no estándar «désenla» a «dénsela»; se mejora la naturalidad española con «Quítenle»; y se ajusta «los que estaban allí» a «los que estaban cerca» para reflejar mejor el sentido concreto de παρεστῶσιν / «those standing by» en la escena.
