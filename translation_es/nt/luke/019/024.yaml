translation:
  language: es
  text: 'Y dijo a los que estaban cerca[a]: «Quítenle la mina y dénsela al que tiene las diez minas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «libra». El término griego designa una antigua unidad monetaria, una mina.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς παρεστῶσιν
  english_pob_choice: those standing by
  chosen_spanish: los que estaban allí
  alternatives_spanish:
  - los presentes
  - los que estaban junto a él
  - los de pie alrededor
  lexicon: BDAG
  rationale: El participio sustantivado en dativo plural indica a los presentes alrededor de la escena. «Los que estaban allí» conserva la referencia concreta sin introducir una imagen innecesariamente literal de postura corporal en español.
- source_word: Ἄρατε
  english_pob_choice: Take
  chosen_spanish: Quiten
  alternatives_spanish:
  - Tomen
  - Retiren
  - Saquen
  lexicon: BDAG
  rationale: El imperativo aoristo de αἴρω aquí expresa quitar o retirar algo de una persona. «Quiten» comunica mejor la idea de remover el bien de él que «tomen», que en español puede sonar demasiado genérico.
- source_word: ἀπ’ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de parte de él
  - desde él
  - lejos de él
  lexicon: BDAG
  rationale: La preposición ἀπό con genitivo marca separación. «De él» es la forma natural y directa en español para expresar que la mina se le quita.
- source_word: μνᾶν
  english_pob_choice: mina
  chosen_spanish: mina
  alternatives_spanish:
  - pound
  - libra
  lexicon: BDAG
  rationale: Se conserva el nombre de la unidad monetaria antigua para reflejar el valor histórico del texto y evitar una equivalencia moderna engañosa.
- source_word: δότε
  english_pob_choice: give
  chosen_spanish: désenla
  alternatives_spanish:
  - denla
  - entréguenla
  - dársela
  lexicon: BDAG
  rationale: El imperativo de δίδωμι aquí es una transferencia directa a otra persona. «Désenla» mantiene el sentido de dar y hace explícito el pronombre objeto ya presente en español.
- source_word: τῷ ... ἔχοντι
  english_pob_choice: to the one who has
  chosen_spanish: al que tiene
  alternatives_spanish:
  - al que posee
  - al que lo tiene
  - al que ya tiene
  lexicon: BDAG
  rationale: El participio articular en dativo singular funciona sustantivamente. «Al que tiene» es natural en español y no agrega un sustantivo como «hombre» que el griego no explicita.
- source_word: τὰς δέκα μνᾶς
  english_pob_choice: the ten minas
  chosen_spanish: las diez minas
  alternatives_spanish:
  - diez minas
  lexicon: BDAG
  rationale: La forma con artículo plural femenino se refleja de manera natural con «las diez minas», preservando la identificación del monto previamente mencionado.
theological_decisions:
- issue: Unidad monetaria antigua sin equivalencia moderna
  english_pob_reading: mina
  chosen_spanish_reading: mina
  alternative_spanish_readings:
  - pound
  - libra
  rationale: No se trata de un punto doctrinal, sino de fidelidad histórica y lexical. Mantener «mina» conserva la referencia a una unidad monetaria antigua sin inducir a una equivalencia cultural o económica inexacta.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden estrechamente; no se detectan revisiones sustantivas en el pasaje. La única decisión destacable es conservar la unidad monetaria como «mina» y reflejar la alternativa tradicional en una nota.
  spanish_consistency_notes:
  - Se evita «Señor» porque no aparece en este versículo.
  - Se mantiene el estilo de mandato directo en plural, acorde con Ἄρατε y δότε.
  - La nota al pie conserva la alternativa tradicional sin sustituir la traducción principal.
