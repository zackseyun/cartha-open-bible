  - severity: low
    issue: «gritarán» es correcto pero menos digno que «clamarán» en este contexto
    rationale: κράζω puede ser «gritar» o «clamar». Dado el tono solemne y profético del pasaje, «clamarán» suena más natural en español bíblico moderno sin caer en arcaísmo.
  revised_spanish_text: 'Y respondiendo[a], dijo: «Les digo que, si estos guardan silencio, las piedras clamarán».'
