translation:
  language: es
  text: 'porque te tenía miedo de ti[a], porque eres un hombre severo: tomas lo que no pusiste[b] y siegas lo que no sembraste.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'estricto' o 'duro' para 'severo'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'lo que no pusiste'. Algunas traducciones lo interpretan como 'lo que no dejaste' o 'lo que no depositaste'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφοβούμην
  english_pob_choice: I was afraid
  chosen_spanish: tuve miedo
  alternatives_spanish:
  - temía
  - estaba temeroso
  lexicon: BDAG
  rationale: El imperfecto de φοβέομαι expresa un estado continuo en pasado. En español, 'tuve miedo' comunica con naturalidad la reacción del siervo sin perder el valor de temor expresado en el contexto.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: '''γάρ'' introduce la razón de la afirmación anterior. ''Pues'' conserva bien la conexión explicativa en español y suena natural en un registro bíblico actual.'
- source_word: αὐστηρὸς
  english_pob_choice: severe
  chosen_spanish: severo
  alternatives_spanish:
  - estricto
  - duro
  - rígido
  lexicon: BDAG
  rationale: '''αὐστηρός'' describe a alguien exigente o severo. ''Severo'' mantiene la fuerza negativa sin suavizar la acusación del siervo, tal como hace el texto fuente.'
- source_word: αἴρεις
  english_pob_choice: you take
  chosen_spanish: tomas
  alternatives_spanish:
  - quitas
  - tomas para ti
  - te llevas
  lexicon: BDAG
  rationale: Aquí αἴρω significa tomar o quitar. 'Tomas' es breve y directo, y deja abierto el matiz económico del dicho sin introducir una interpretación más específica.
- source_word: ὃ οὐκ ἔθηκας
  english_pob_choice: what you did not put down
  chosen_spanish: lo que no pusiste
  alternatives_spanish:
  - lo que no colocaste
  - lo que no depositaste
  - lo que no dejaste
  lexicon: BDAG
  rationale: τίθημι significa 'poner' o 'colocar'. En español, 'lo que no pusiste' conserva la imagen concreta del griego sin forzar un término comercial que el original no exige.
- source_word: θερίζεις
  english_pob_choice: you reap
  chosen_spanish: siegas
  alternatives_spanish:
  - cosechas
  - recoges
  lexicon: BDAG
  rationale: '''Siegas'' reproduce el paralelo agrícola de θερίζω y mantiene la correspondencia con ''sembraste'' en la segunda cláusula.'
- source_word: ὃ οὐκ ἔσπειρας
  english_pob_choice: what you did not sow
  chosen_spanish: lo que no sembraste
  alternatives_spanish:
  - lo que no plantaste
  lexicon: BDAG
  rationale: σπείρω significa 'sembrar'. 'Lo que no sembraste' conserva el paralelo proverbial con 'siegas' y la metáfora agrícola directa.
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: BDAG
  rationale: El término griego es masculino singular y se refiere a una figura masculina concreta de la parábola. 'Hombre' es la correspondencia más exacta en español.
theological_decisions:
- issue: Cómo traducir la acusación del siervo sin suavizarla
  english_pob_reading: Retain the servant's accusatory wording without softening
  chosen_spanish_reading: Conservar el tono acusatorio del siervo sin atenuarlo
  alternative_spanish_readings:
  - Suavizar el lenguaje a 'estricto' o 'exigente'
  - Interpretar la frase de modo más benevolente
  rationale: La frase pertenece a la explicación/queja del siervo y no debe ser corregida por la traducción. Mantener 'severo' y la imagen de tomar y segar preserva la tensión retórica y teológica del pasaje.
  doctrine_reference: Preservar la tensión del relato sin resolverla
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; el texto se mantiene alineado con el audit trail inglés y con la puntuación/estructura del griego.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplicable aquí, pues el versículo no contiene el nombre divino.
  - Se evitó 'Cristo'/'Mesías' porque no aparecen en el texto.
  - Se mantuvo el paralelismo verbal 'siegas/sembraste' para reflejar θερίζεις/ἔσπειρας.
  - La puntuación con dos puntos reproduce la pausa explicativa del original y del inglés auditado.
