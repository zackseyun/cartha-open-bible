review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido general del griego y conserva la acusación del siervo sin suavizarla. Sin embargo, ἐφοβούμην es imperfecto y 'tuve miedo' lo presenta más como evento puntual que como estado pasado continuo; 'temía' o 'te tenía miedo' preserva mejor el aspecto. También hay una pequeña incoherencia discursiva al usar 'porque' al inicio y luego 'pues' para la misma relación explicativa en una sola oración.
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. 'Severo', 'tomas', 'siegas' y 'sembraste' funcionan bien. La mejora principal es ajustar 'tuve miedo' a 'te tenía miedo' o 'temía' para mayor fidelidad y fluidez. El resto del verso es legible y digno.
  glossary_alignment: 'No hay términos de glosario mayor en juego aquí. El borrador sigue bien las decisiones auditadas: αὐστηρός -> ''severo'', αἴρεις -> ''tomas'', θερίζεις/σπείρω -> ''siegas/sembraste'', ἄνθρωπος -> ''hombre''. La nota [a] preserva alternativas adecuadas para ''severo'', y la nota [b] mantiene la literalidad de ''lo que no pusiste''.'
  issues:
  - severity: medium
    issue: Aspecto verbal de ἐφοβούμην
    rationale: El imperfecto griego expresa un estado continuo en el pasado. 'Tuve miedo' en español tiende a sonar perfectivo o puntual; 'te tenía miedo' o 'temía' representa mejor el original.
  - severity: low
    issue: Conector doble 'porque... pues'
    rationale: 'No es incorrecto, pero en español suena más limpio usar un solo hilo causal: ''porque te tenía miedo, porque...'' o ''pues te tenía miedo, porque...''.'
