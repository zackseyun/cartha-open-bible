  to: 'Él le dijo[a]: “Por tu propia boca te juzgaré, esclavo malvado[b]. ¿Sabías que yo soy un hombre severo, que recojo lo que no puse[c] y cosecho lo que no sembré[d]?”'
  rationale: Se corrige la puntuación española, se realinea el sistema de notas con el audit trail inglés y se mejora levemente la fluidez de αἴρων con 'que recojo', manteniendo el sentido de apropiarse de lo no puesto. 'Severo' se conserva como opción válida para αὐστηρός, pero sin una nota d incorrectamente anclada allí.
