translation:
  language: es
  text: 'Él le dijo[a]: “Por tu propia boca te juzgaré, esclavo malvado[b]. ¿Sabías que yo soy un hombre severo, que recojo lo que no puse[c] y cosecho lo que no sembré[d]?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Por tus propias palabras te juzgaré.”'
    reason: lexical_alternative
  - marker: b
    text: 'O: “siervo.” El griego δοῦλος designa aquí una relación de esclavitud; se conserva “esclavo” por su fuerza contextual.'
    reason: alternative_reading
  - marker: c
    text: 'O: “lo que no deposité” para “lo que no puse.”'
    reason: lexical_alternative
  - marker: d
    text: Algunas versiones dicen “donde no sembré”, pero el griego aquí es más literalmente “lo que no sembré”.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐκ τοῦ στόματός σου
  english_pob_choice: Out of your own mouth
  chosen_spanish: Por tu propia boca
  alternatives_spanish:
  - De tu propia boca
  - Por tus propias palabras
  lexicon: BDAG
  rationale: La expresión conserva el valor idiomático de que el juicio se basa en la misma declaración del interlocutor. “Por tu propia boca” suena natural en español y mantiene la fuerza reflexiva que el audit trail inglés explicitó con “own”.
- source_word: κρίνω
  english_pob_choice: I will judge
  chosen_spanish: te juzgaré
  alternatives_spanish:
  - te juzgo
  - te condenaré
  lexicon: BDAG
  rationale: El griego está en futuro; por eso se usa “juzgaré”. “Condenaré” estrecha demasiado el verbo griego, que es más amplio que una sentencia condenatoria.
- source_word: πονηρὲ
  english_pob_choice: wicked
  chosen_spanish: malvado
  alternatives_spanish:
  - maligno
  - malo
  lexicon: BDAG
  rationale: “Malvado” expresa bien la censura moral de la vocación directa. “Malo” sería demasiado débil; “maligno” suena más cargado de connotaciones demonológicas en español.
- source_word: δοῦλε
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: BDAG
  rationale: Se conserva “esclavo” porque en esta escena parabólica el estatus de dependencia y posesión es lexicalmente saliente. “Siervo” suavizaría el término y perdería la fuerza de δοῦλος que el POB inglés quiso preservar.
- source_word: ᾔδεις
  english_pob_choice: You knew
  chosen_spanish: Sabías
  alternatives_spanish:
  - Tú sabías
  - Habías sabido
  lexicon: BDAG
  rationale: La forma imperfectiva se vierte naturalmente como “Sabías”. El contexto retórico de la parábola no requiere una paráfrasis adicional.
- source_word: αὐστηρός
  english_pob_choice: harsh
  chosen_spanish: severo
  alternatives_spanish:
  - duro
  - rígido
  - austero
  lexicon: BDAG
  rationale: “Severo” transmite un carácter exigente y difícil sin sonar tan coloquial como “duro” ni tan arcaico como “austero”. Conserva el juicio negativo atribuido al personaje sin intensificarlo más allá del griego.
- source_word: αἴρων
  english_pob_choice: taking up
  chosen_spanish: que tomo
  alternatives_spanish:
  - que estoy tomando
  - que levanto
  lexicon: BDAG
  rationale: Aunque el inglés amplía con “taking up”, en español una traducción directa como “tomando” resulta más natural y sigue el sentido de apropiarse o llevarse lo que no es propio. “Levanto” sería literal pero opaco en este contexto.
- source_word: ὃ οὐκ ἔθηκα
  english_pob_choice: what I did not lay down
  chosen_spanish: lo que no puse
  alternatives_spanish:
  - lo que no deposité
  - lo que no coloqué
  lexicon: BDAG
  rationale: “Puse” conserva la imagen básica de poner/colocar sin forzar una lectura técnica de depósito. El POB inglés dejó abierta la alternativa financiera; en español se mantiene igual apertura con un verbo más natural.
- source_word: θερίζων
  english_pob_choice: reaping
  chosen_spanish: cosecho
  alternatives_spanish:
  - siego
  - recojo
  lexicon: BDAG
  rationale: En español moderno “cosecho” comunica bien la metáfora agrícola y mantiene la relación con “sembré”. “Siego” es más tradicional pero menos transparente para lectores amplios.
- source_word: ὃ οὐκ ἔσπειρα
  english_pob_choice: what I did not sow
  chosen_spanish: lo que no sembré
  alternatives_spanish:
  - donde no sembré
  lexicon: BDAG
  rationale: Se sigue de cerca el griego, que usa pronombre relativo neutro acusativo (“lo que”), no un adverbio de lugar. Esto preserva la tensión observada en el audit trail inglés frente a la tradición “donde no sembré”.
theological_decisions:
- issue: Rendering of δοῦλος in a master-slave parable
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente
  rationale: La escena presenta una relación de subordinación y posesión que hace saliente el estatus ligado a δοῦλος. Traducir “esclavo” preserva esa fuerza semántica y sigue la política del POB para términos discutidos, en vez de suavizarlo con “siervo”.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, δοῦλος; Translation philosophy §1'
- issue: Whether the master's self-description should be read as affirmed fact or as the servant's reported characterization
  english_pob_reading: The wording is retained as the master's rhetorical citation of the servant's claim without adding interpretive qualifiers in the main text.
  chosen_spanish_reading: El texto conserva la formulación directa sin añadir en el cuerpo principal una aclaración interpretativa.
  alternative_spanish_readings:
  - Dices que soy un hombre severo
  - Si supieras que soy un hombre severo
  rationale: En la parábola, la frase funciona retóricamente dentro del argumento del siervo y del amo; por eso la traducción no introduce marcadores interpretativos que vayan más allá de la forma griega. Así se preserva la tensión exegética sin resolverla prematuramente.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3'
- issue: Whether ἐκ τοῦ στόματός σου should be made explicit as a judicial idiom
  english_pob_reading: Out of your own mouth I will judge you
  chosen_spanish_reading: Por tu propia boca te juzgaré
  alternative_spanish_readings:
  - Con tus propias palabras te juzgaré
  - De tu propia boca te juzgaré
  rationale: La frase española mantiene el valor idiomático y jurídico del dicho, permitiendo que el juicio se funde en la declaración del interlocutor. No se pierde el matiz de imputación por auto-incriminación implícita.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2'
translation_notes:
  revision_awareness: El inglés POB fue revisado para acercar αἴρων a “taking up what I did not lay down”; en español se optó por “que tomo lo que no puse”, manteniendo la naturalidad y la imagen de apropiación sin perder el vínculo con el participio presente. También se conservó la decisión auditada de δοῦλος como “slave/esclavo” y la lectura más literal de ὃ οὐκ ἔσπειρα como “what I did not sow / lo que no sembré”.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo en segunda persona singular, coherente con el griego y con el inglés POB.
  - Se conserva el paralelismo agrícola “sembré/cosecho” para reflejar θερίζων ... ἔσπειρα.
  - La puntuación reproduce el contraste retórico del dicho y mantiene la fluidez para lectura pública.
  - Los corchetes de notas se colocan solo donde hay alternativas lexicales reales o una ambigüedad española nueva.
