  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: aproximación, percepción de la ciudad y reacción emocional. «al acercarse», «al ver la ciudad» y «lloró» corresponden fielmente a ὡς ἤγγισεν, ἰδὼν τὴν πόλιν y ἔκλαυσεν. El punto principal a corregir es ἐπ’ αὐτήν: en español «llorar sobre ella» suena poco natural y puede sugerir ubicación física más que objeto de lamentación. Conviene una formulación idiomática que mantenga el sentido de lamentarse por la ciudad.'
  spanish_quality_summary: El texto es claro y digno, pero «lloró sobre ella» resulta forzado en español bíblico-natural contemporáneo. «Lloró por ella» suena más idiomático y comunica mejor la relación semántica con κλαίω + ἐπί. Para no perder la posible personificación femenina destacada en la auditoría inglesa, debe conservarse una nota con la alternativa «sobre ella» / «sobre la ciudad».
  glossary_alignment: No hay términos del glosario mayor en juego salvo la concordancia femenina de «la ciudad». La elección propuesta mantiene la feminidad con «ella» y respeta la rationale teológica/lexical documentada, pero desplaza esa posibilidad al aparato de nota para evitar una frase española poco natural en el texto principal.
  issues:
