translation:
  language: es
  text: Y al acercarse, al ver la ciudad, lloró por ella[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre ella», preservando el femenino gramatical de «la ciudad» y la posible personificación de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ἤγγισεν
  english_pob_choice: as he drew near
  chosen_spanish: al acercarse
  alternatives_spanish:
  - cuando se acercó
  - mientras se acercaba
  lexicon: BDAG
  rationale: ἐγγίζω expresa llegar cerca o acercarse. En español, la construcción infinitiva «al acercarse» conserva la relación temporal y el movimiento hacia la ciudad con naturalidad y sin añadir precisión innecesaria.
- source_word: ἰδὼν
  english_pob_choice: seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - cuando vio
  lexicon: BDAG
  rationale: El participio aoristo acompaña la acción principal y señala una percepción ligada al llanto. «Al ver» mantiene ese flujo participial de forma idiomática en español.
- source_word: τὴν πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la ciudad de Jerusalén
  lexicon: BDAG
  rationale: πόλις significa simplemente «ciudad». Como Jerusalén ya está clara por el contexto, no se expande el texto principal con el nombre propio.
- source_word: ἔκλαυσεν
  english_pob_choice: he wept
  chosen_spanish: lloró
  alternatives_spanish:
  - lloró amargamente
  - se echó a llorar
  lexicon: BDAG
  rationale: κλαίω puede significar llorar o lamentarse con llanto. «Lloró» es la forma más directa y digna en español para conservar la fuerza emocional sin intensificar más de lo que el verbo exige.
- source_word: ἐπ’ αὐτήν
  english_pob_choice: over it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - por ella
  - sobre la ciudad
  lexicon: BDAG
  rationale: ἐπί con acusativo puede expresar llanto sobre alguien o algo. Aquí se conserva la femenidad gramatical de πόλις mediante «ella», siguiendo la posibilidad señalada en el inglés auditado y manteniendo abierta la personificación de Jerusalén.
theological_decisions:
- issue: Si mantener la feminidad gramatical de «la ciudad» en el pronombre final
  english_pob_reading: Use 'it' rather than 'her' in English, with 'her' preserved as an alternative because of the feminine grammar of πόλις and possible personification of Jerusalem.
  chosen_spanish_reading: Usar «ella» en lugar de neutralizar con «la ciudad» o «ello».
  alternative_spanish_readings:
  - sobre la ciudad
  - sobre ello
  rationale: En español, «ciudad» es femenino y el pronombre «ella» reproduce naturalmente tanto la concordancia gramatical como la posibilidad de personificación. Esto además preserva la tensión observada en el inglés auditado, sin forzar una neutralización innecesaria.
  doctrine_reference: Translation philosophy §5–6; consistencia léxico-teológica sobre personificación y concordancia gramatical
translation_notes:
  revision_awareness: El inglés auditado mantiene «over it» como opción principal y ofrece «over her» como alternativa para conservar la feminidad gramatical y la posible personificación de Jerusalén; esta versión española adopta directamente la solución personificada y femenina, que resulta natural en español.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - No se expande «la ciudad» a «Jerusalén» en el texto principal porque el contexto ya la identifica.
  - La cláusula participial se vertió con infinitivos coordinados («al acercarse, al ver») para reflejar el encadenamiento griego sin perder naturalidad.
  - Se conserva la ambigüedad devocional de la personificación con el pronombre femenino «ella».
