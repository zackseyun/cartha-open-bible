    issue: «lloró sobre ella» es poco idiomático en español
    rationale: Aunque reproduce de cerca «over it/her», en español normalmente se dice «llorar por» alguien o algo al expresar lamentación. «Sobre ella» puede leerse como espacial y afecta la legibilidad.
  - severity: medium
    issue: Falta nota para preservar la alternativa de personificación femenina documentada en el inglés POB
    rationale: La auditoría inglesa conserva explícitamente la opción «over her». Si el texto español principal usa la opción más natural «por ella», conviene anotar la alternativa «sobre ella» para reflejar la concordancia femenina y posible personificación de Jerusalén.
