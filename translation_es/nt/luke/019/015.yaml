base_translation:
  language: en
  yaml_path: translation/nt/luke/019/015.yaml
  text: And it happened[a], when he returned after receiving the kingdom, that he ordered these slaves to whom he had given the money to be called to him[b], so that he might know what they had gained by trading.
  footnotes:
  - marker: a
    text: Or 'servants.' The Greek word is doulous, which can mean either 'servants' or 'slaves' depending on context; here 'slaves' was chosen to reflect their bonded status under the nobleman.
    reason: lexical_alternative
  - marker: b
    text: Or 'what business they had done' or 'what profit they had made.' The Greek verb refers to engaging in trade or business and the result of it.
    reason: lexical_alternative
