revisions:
- from: Y aconteció[a] que, cuando volvió después de recibir el reino, mandó llamar a estos esclavos, a quienes había dado el dinero, para saber qué habían negociado[b].
  to: Y sucedió[a] que, cuando volvió después de recibir el reino, mandó llamar ante él a estos esclavos, a quienes había dado el dinero, para saber qué habían ganado al negociar[b].
  rationale: Se revisa el inicio a «Y sucedió» para un español más natural sin perder la fórmula narrativa lucana. Se ajusta «mandó llamar ante él» para reflejar con más claridad la idea de convocatoria a su presencia. La corrección principal es «qué habían ganado al negociar», que preserva mejor el sentido de διεπραγματεύσαντο como actividad comercial con resultado evaluable, en línea con la evidencia griega y el rastro de auditoría en inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:02:17Z'
