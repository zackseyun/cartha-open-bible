translation:
  language: es
  text: Y sucedió[a] que, cuando volvió después de recibir el reino, mandó llamar ante él a estos esclavos, a quienes había dado el dinero, para saber qué habían ganado al negociar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aconteció». La fórmula griega introduce la narración de manera idiomática.
    reason: lexical_alternative
  - marker: b
    text: O «qué negocios habían hecho» o «qué ganancia habían obtenido». El verbo griego alude a comerciar o hacer negocios y al resultado de esa actividad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: BDAG
  rationale: La fórmula narrativa de inicio en Lucas se reproduce con una expresión natural y elevada en español. «Aconteció» conserva el valor idiomático sin sonar excesivamente moderno ni forzado.
- source_word: ἐν τῷ ἐπανελθεῖν αὐτὸν
  english_pob_choice: when he returned
  chosen_spanish: cuando volvió
  alternatives_spanish:
  - al volver
  - cuando regresó
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa tiempo; «cuando volvió» comunica bien la relación temporal de manera fluida en español.
- source_word: λαβόντα τὴν βασιλείαν
  english_pob_choice: after receiving the kingdom
  chosen_spanish: después de recibir el reino
  alternatives_spanish:
  - habiendo recibido el reino
  - después de haber recibido el reino
  lexicon: BDAG
  rationale: Se mantiene la relación temporal antecedente mediante «después de recibir». «Reino» refleja βασιλεία como dominio real recibido por el noble, sin forzar una interpretación eclesiástica.
- source_word: βασιλείαν
  english_pob_choice: kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  - el dominio real
  lexicon: BDAG
  rationale: En este contexto parabólico-político, «reino» es el equivalente más natural y fiel. Puede sugerir el ámbito o la soberanía recibida; no se restringe a una noción puramente territorial.
- source_word: φωνηθῆναι αὐτῷ
  english_pob_choice: to be called to him
  chosen_spanish: mandó llamar ... a
  alternatives_spanish:
  - ordenó que fueran llamados ... ante él
  - los hizo llamar
  lexicon: BDAG
  rationale: El pasivo infinitivo se expresa de forma idiomática con «mandó llamar», que conserva la idea de convocar sin agregar matices innecesarios.
- source_word: δούλους
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: Se conserva la fuerza social del término δοῦλος. En esta parábola la relación de dependencia y autoridad es saliente, por lo que «esclavos» refleja mejor el vínculo que «siervos».
- source_word: δεδώκει
  english_pob_choice: had given
  chosen_spanish: había dado
  alternatives_spanish:
  - había entregado
  - había confiado
  lexicon: BDAG
  rationale: El pluscuamperfecto indica una acción anterior ya completada. «Había dado» es fiel y transparente; el matiz de encargo o confianza se obtiene por el contexto inmediato.
- source_word: ἀργύριον
  english_pob_choice: the money
  chosen_spanish: el dinero
  alternatives_spanish:
  - la plata
  - el capital
  lexicon: BDAG
  rationale: Aquí ἀργύριον funciona como suma monetaria general. «El dinero» es más claro para el lector español moderno que una traducción literal como «la plata».
- source_word: ἵνα γνοῖ
  english_pob_choice: so that he might know
  chosen_spanish: para saber
  alternatives_spanish:
  - a fin de saber
  - para que supiera
  lexicon: BDAG
  rationale: La cláusula final se naturaliza como propósito en infinitivo. «Para saber» preserva la finalidad sin sobrecargar el español.
- source_word: τί
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - cuánto
  - lo que
  lexicon: BDAG
  rationale: El interrogativo cubre el contenido de la evaluación del resultado. En este contexto, «qué» deja abierta la exacta medida del rendimiento sin imponerla.
- source_word: διεπραγματεύσαντο
  english_pob_choice: had gained by trading
  chosen_spanish: habían negociado
  alternatives_spanish:
  - habían hecho negocios
  - habían obtenido por comercio
  - habían ganado al negociar
  lexicon: BDAG
  rationale: El verbo medio se refiere a comerciar/negociar y obtener un resultado. «Habían negociado» conserva la acción comercial de forma breve y idiomática; el contexto de evaluación sugiere que se busca el resultado obtenido de esa actividad.
theological_decisions:
- issue: δοῦλος en contexto parabólico de administración económica
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - criados
  rationale: Se sigue la decisión POB de mantener la fuerza social del término cuando la relación de dependencia es central. En la escena, el noble convoca a quienes están bajo su autoridad y a quienes confió su dinero; «esclavos» evita suavizar una relación jerárquica explícita.
  doctrine_reference: 'DOCTRINE.md: contested terms table for δοῦλος; Translation philosophy §1'
- issue: βασιλεία como título/ámbito recibido
  english_pob_reading: kingdom
  chosen_spanish_reading: reino
  alternative_spanish_readings:
  - reinado
  - realeza
  - dominio real
  rationale: «Reino» conserva la amplitud semántica del término griego y encaja con la imagen del relato. No se sustituye por un término más interpretativo, para no estrechar el alcance narrativo.
  doctrine_reference: Lexical policy for βασιλεία in parabolic contexts
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del audit trail inglés y no se detectaron cambios necesarios frente a la última pasada; se mantuvo la decisión de traducir δοῦλος como «esclavos» y διεπραγματεύσαντο con un verbo comercial breve y natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «reino» para βασιλεία en coherencia con el contexto parabólico y con la decisión inglesa auditada.
  - La puntuación y el orden sintáctico se ajustan al español bíblico moderno sin introducir paráfrasis interpretativas.
