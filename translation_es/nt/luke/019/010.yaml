translation:
  language: es
  text: Porque el Hijo del Hombre vino a buscar y a salvar lo perdido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa un participio perfecto neutro singular (τὸ ἀπολωλός), que puede entenderse de manera colectiva o genérica: «lo perdido» o «lo que estaba perdido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  - ha venido
  lexicon: BDAG
  rationale: El aoristo indicativo de ἔρχομαι se entiende bien como pasado simple. En español, "vino" conserva el valor narrativo y la fuerza de misión/iniciativa sin añadir aspecto que el griego no explicita aquí.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: BDAG
  rationale: γάρ introduce una explicación o razón. "Porque" es natural al inicio de la oración en español y mantiene la conexión causal con el dicho anterior.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Es un título reconocido de Jesús con resonancias daniélicas. Se conserva de forma directa para no perder la carga teológica e idiomática del original.
- source_word: ζητῆσαι
  english_pob_choice: to seek
  chosen_spanish: a buscar
  alternatives_spanish:
  - a buscar
  - a procurar
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa propósito después de "vino". "Buscar" transmite bien la idea de búsqueda intencional y encaja de forma natural con el español bíblico contemporáneo.
- source_word: σῶσαι
  english_pob_choice: to save
  chosen_spanish: a salvar
  alternatives_spanish:
  - a salvar
  - a rescatar
  - a librar
  lexicon: BDAG
  rationale: σῴζω tiene peso salvífico en Lucas. "Salvar" preserva esa amplitud teológica mejor que alternativas más restrictivas como "rescatar" o "librar".
- source_word: τὸ ἀπολωλός
  english_pob_choice: the lost
  chosen_spanish: lo perdido
  alternatives_spanish:
  - el perdido
  - lo que estaba perdido
  - la persona perdida
  lexicon: BDAG
  rationale: El participio perfecto neutro singular articular puede funcionar de manera genérica/colectiva. "Lo perdido" conserva la neutralidad y la amplitud del griego, sin restringirlo solo a una persona masculina ni borrar el alcance general.
theological_decisions:
- issue: Alcance de τὸ ἀπολωλός
  english_pob_reading: the lost
  chosen_spanish_reading: lo perdido
  alternative_spanish_readings:
  - el perdido
  - lo que estaba perdido
  - la persona perdida
  rationale: El griego es neutro singular y puede leerse de modo genérico. En el contexto inmediato se refiere a Zaqueo, pero la frase también formula la misión amplia de Jesús. "Lo perdido" conserva esa tensión sin resolverla prematuramente.
  doctrine_reference: Mantener la tensión contextual y teológica; equivalencia óptima
- issue: Título cristológico "Hijo del Hombre"
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Hijo del Hombre
  rationale: La expresión funciona como autodesignación de Jesús y evoca Daniel 7. No conviene paraphrasearla porque perdería su densidad bíblica y cristológica.
  doctrine_reference: Cristología bíblica; fidelidad al título tradicional con valor técnico
translation_notes:
  revision_awareness: 'El pasaje no requiere revisión adicional según el audit trail más reciente: el inglés POB quedó sin cambios y la revisión cruzada informó alto acuerdo (1.0).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en este proyecto, pero no aparece en este versículo.
  - Se conserva «Hijo del Hombre» como título cristológico fijo.
  - Se eligió «salvar» por la amplitud soteriológica lucana, en continuidad con la lectura auditada del POB inglés.
  - Se evitó «el perdido» porque en español suena más personal/masculino y estrecha innecesariamente el neutro singular griego.
