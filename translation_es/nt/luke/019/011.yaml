  glossary_alignment: 'La terminología clave está bien alineada: «parábola», «reino de Dios», y ausencia de sobreinterpretación teológica. No hay conflicto con los términos por defecto del proyecto. La elección «manifestarse» para ἀναφαίνεσθαι es aceptable y está respaldada por la nota alternativa. «Dios» para θεοῦ es correcto.'
