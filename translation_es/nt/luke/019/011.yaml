translation:
  language: es
  text: Mientras ellos escuchaban estas cosas, él continuó y contó una parábola, porque estaba cerca de Jerusalén y ellos pensaban que el reino de Dios iba a manifestarse[a] inmediatamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba a punto de revelarse inmediatamente». El verbo puede denotar hacerse visible o manifestarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκουόντων δὲ αὐτῶν ταῦτα
  english_pob_choice: As they were hearing these things
  chosen_spanish: Mientras ellos escuchaban estas cosas
  alternatives_spanish:
  - Mientras oían estas cosas
  - Al escuchar ellos estas cosas
  lexicon: BDAG
  rationale: El genitivo absoluto con participio presente expresa acción simultánea y en curso. «Mientras ellos escuchaban» mantiene ese valor progresivo en un español natural y digno.
- source_word: προσθεὶς εἶπεν
  english_pob_choice: he went on and told
  chosen_spanish: él siguió adelante y contó
  alternatives_spanish:
  - él añadió y dijo
  - él prosiguió y dijo
  lexicon: BDAG
  rationale: La construcción expresa continuación en el habla o en la acción. «Siguió adelante y contó» comunica esa continuación de forma idiomática y conserva la introducción directa de la parábola.
- source_word: παραβολὴν
  english_pob_choice: a parable
  chosen_spanish: una parábola
  alternatives_spanish:
  - una ilustración
  lexicon: BDAG
  rationale: Es el término narrativo estándar en los Evangelios y preserva la forma literaria sin debilitarla con un equivalente más general.
- source_word: διὰ τὸ ἐγγὺς εἶναι Ἰερουσαλὴμ αὐτὸν
  english_pob_choice: because he was near Jerusalem
  chosen_spanish: porque estaba cerca de Jerusalén
  alternatives_spanish:
  - porque estaba próximo a Jerusalén
  - porque se encontraba cerca de Jerusalén
  lexicon: BDAG
  rationale: La construcción causal indica que Jesús estaba cerca de Jerusalén. «Estaba cerca de Jerusalén» conserva el sentido causal y la referencia correcta del sujeto implícito.
- source_word: δοκεῖν αὐτοὺς
  english_pob_choice: they supposed
  chosen_spanish: ellos pensaban
  alternatives_spanish:
  - ellos suponían
  - ellos creían
  lexicon: BDAG
  rationale: Aquí el infinitivo expresa la expectativa de la gente. «Pensaban» transmite una opinión o expectativa sin hacerla más fuerte de lo que el griego permite.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - de inmediato
  - enseguida
  lexicon: BDAG
  rationale: Adverbio de inmediatez; «inmediatamente» es claro, formal y fiel al énfasis temporal del texto.
- source_word: μέλλει ... ἀναφαίνεσθαι
  english_pob_choice: was about to appear
  chosen_spanish: iba a manifestarse
  alternatives_spanish:
  - estaba a punto de aparecer
  - estaba por revelarse
  lexicon: BDAG
  rationale: μέλλω + infinitivo expresa inminencia. ἀναφαίνεσθαι puede significar aparecer o hacerse visible/manifestarse. «Iba a manifestarse» conserva la idea de aparición sin imponer una lectura exclusivamente visual; además suena natural en español.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el reino de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la equivalencia establecida y comunica con precisión la expresión del texto, manteniendo continuidad narrativa y teológica en Lucas.
theological_decisions:
- issue: Modo de la manifestación del reino
  english_pob_reading: Render the crowd's expectation as that the kingdom of God 'was about to appear immediately,' without specifying a political, apocalyptic, or spiritual form.
  chosen_spanish_reading: La traducción deja que la expectativa sea la de una manifestación inmediata del reino de Dios, sin precisar si sería política, apocalíptica o espiritual.
  alternative_spanish_readings:
  - que el reino de Dios iba a establecerse políticamente
  - que el reino de Dios iba a revelarse plenamente en sentido escatológico
  rationale: El versículo registra la expectativa de la gente, pero no define la forma exacta de esa manifestación. Conviene preservar esa tensión en vez de resolverla con una interpretación doctrinal anticipada.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: Se siguió la lectura del griego SBLGNT y el audit trail inglés. No se introdujeron cambios de sentido; la única tensión léxica relevante se mantiene en la nota sobre ἀναφαίνεσθαι, que puede significar aparecer o manifestarse/revelarse.
  spanish_consistency_notes:
  - Se usó «Jesús» implícitamente mediante el pronombre «él», conforme al referente del contexto.
  - Se mantuvo «reino de Dios» en vez de una paráfrasis como «reinado de Dios» para conservar continuidad con el uso lucano y la terminología POB.
  - «Manifestarse» preserva la ambigüedad útil de ἀναφαίνεσθαι mejor que una decisión cerrada por «aparecer» solamente.
