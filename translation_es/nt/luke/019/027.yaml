translation:
  language: es
  text: Pero en cuanto a estos enemigos míos, que no quisieron que yo reinara sobre ellos[a], tráiganlos aquí y masácrenlos[b] delante de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que no estuvieron dispuestos a que yo reinara sobre ellos».
    reason: lexical_alternative
  - marker: b
    text: O «mátenlos delante de mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: But as for
  chosen_spanish: Pero en cuanto a
  alternatives_spanish:
  - Pero
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: πλήν introduce un giro adversativo y de foco. «Pero en cuanto a» conserva el cambio de énfasis y suena natural en español, mejor que un simple «pero».
- source_word: ἐχθρούς
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - enemigos
  lexicon: BDAG
  rationale: En un contexto de oposición personal, «enemigos» expresa con claridad el sentido normal de ἐχθρός sin suavizarlo.
- source_word: τούτους
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - estos mismos
  - estos aquí
  lexicon: BDAG
  rationale: El demostrativo añade señalamiento e intensidad; «estos» preserva esa fuerza de manera natural en español.
- source_word: τοὺς μὴ θελήσαντάς με βασιλεῦσαι ἐπ’ αὐτοὺς
  english_pob_choice: who did not want me to reign over them
  chosen_spanish: que no quisieron que yo reinara sobre ellos
  alternatives_spanish:
  - que no estaban dispuestos a que yo reinara sobre ellos
  - que no quisieron que yo fuese rey sobre ellos
  lexicon: BDAG
  rationale: La frase participial se vierte con una relativa. «Quisieron» / «reinara» preserva la fuerza volitiva de θέλω y el sentido verbal de βασιλεύω como reinar sobre otros.
- source_word: ἀγάγετε ὧδε
  english_pob_choice: bring them here
  chosen_spanish: tráiganlos acá
  alternatives_spanish:
  - tráiganlos aquí
  - llévenlos acá
  lexicon: BDAG
  rationale: ἄγω puede ser «llevar/traer» según el punto de vista. Aquí el mandato dirigido a quienes ejecutan la orden suena natural como «tráiganlos acá».
- source_word: κατασφάξατε
  english_pob_choice: slaughter
  chosen_spanish: degüéllenlos
  alternatives_spanish:
  - mátenlos
  - sacrifíquenlos
  - despéñenlos
  lexicon: BDAG
  rationale: κατασφάζω es un verbo intensamente gráfico. «Degüéllenlos» conserva la violencia específica y evita una neutralización como «matenlos».
- source_word: ἔμπροσθέν μου
  english_pob_choice: in front of me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - antes de mí
  lexicon: BDAG
  rationale: La expresión señala presencia espacial/personal. «Delante de mí» es claro y idiomático en español, manteniendo la escena con concreción.
theological_decisions:
- issue: Mandato violento en la parábola
  english_pob_reading: Translate the nobleman's command directly without softening its violence or explicitly identifying it with Jesus' own direct command outside the parable.
  chosen_spanish_reading: Traducir el mandato con toda su violencia, sin atenuarlo ni añadir un rodeo interpretativo que lo distancie del habla del noble dentro de la parábola.
  alternative_spanish_readings:
  - Atenuarlo con lenguaje más general, como «mátelos»
  - Marcar explícitamente que es solo una imagen parabólica
  rationale: El griego presenta un imperativo directo y fuerte. La traducción debe conservar esa tensión y no resolverla por cuenta propia.
  doctrine_reference: Preservar la tensión teológica en la narrativa sin sobreinterpretar.
translation_notes:
  revision_awareness: Se siguió el consenso alto del audit trail inglés y no hubo revisiones posteriores que alteraran el sentido. La traducción mantiene la fuerza adversativa de πλήν, la referencia demostrativa de τούτους y la violencia explícita de κατασφάξατε.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Reinara sobre ellos» conserva la noción de βασιλεύω como reinar, sin introducir una formulación más interpretativa.
  - Se mantuvo un registro digno y moderno, evitando tanto calcos rígidos como suavizaciones innecesarias.
