revisions:
- from: Porque vendrán días sobre ti cuando tus enemigos levantarán un vallado[a] contra ti, te rodearán y te cercarán por todos lados.
  to: Porque vendrán días sobre ti cuando tus enemigos levantarán un terraplén[a] contra ti, te rodearán y te cercarán por todos lados.
  rationale: Se ajusta χάραξ a «terraplén», que en español comunica mejor una obra de asedio que «vallado», y se actualiza la nota para reflejar una alternativa técnica más próxima al expediente auditado en inglés. No se requiere una reescritura mayor del versículo.
