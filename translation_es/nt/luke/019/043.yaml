review_pass:
  verdict: revise
  source_alignment_summary: El borrador transmite bien la secuencia de asedio y mantiene correctamente el singular dirigido a Jerusalén personificada. Sin embargo, «vallado» no refleja tan bien como «terraplén» o una expresión equivalente el sentido militar de χάραξ como obra de asedio/terraplén, y «Porque» suena algo más causal que el inglés auditado «For», aunque sigue siendo aceptable. El resto de la cadena verbal («rodearán… te cercarán») preserva adecuadamente περικυκλώσουσίν / συνέξουσίν.
  spanish_quality_summary: El español es claro y legible, pero «levantarán un vallado» suena menos natural y menos preciso en un contexto de sitio militar. «Levantarán un terraplén[a] contra ti» mejora la naturalidad y la precisión semántica. «Por todos lados» funciona bien y el registro general es digno y moderno.
  glossary_alignment: No hay términos del glosario mayor en juego aquí. La decisión singular «ti / tus» está bien alineada con la personificación de Jerusalén. La nota léxica debe conservar una alternativa de asedio; con texto principal «terraplén», una alternativa como «rampa de asedio» preserva mejor el expediente inglés.
  issues:
  - severity: medium
    issue: «vallado» para χάρακά
    rationale: χάραξ aquí denota una obra de asedio, más cercana a un terraplén/rampa de asedio que a un simple cercado. «Vallado» puede sugerir cerca o cerramiento genérico y debilita la imagen militar específica.
  - severity: low
    issue: Nota alternativa «empalizada de asedio»
    rationale: Es posible, pero si el texto principal se corrige a «terraplén», conviene una alternativa más cercana al expediente inglés, como «rampa de asedio», para conservar el matiz técnico sin sobrecargar el texto principal.
  revised_spanish_text: Porque vendrán días sobre ti cuando tus enemigos levantarán un terraplén[a] contra ti, te rodearán y te cercarán por todos lados.
  revised_footnotes:
  - marker: a
    text: O «rampa de asedio».
    reason: lexical_alternative
  revision_rationale: Se ajusta χάραξ a «terraplén», que en español comunica mejor una obra de asedio que «vallado», y se actualiza la nota para reflejar una alternativa técnica más próxima al expediente auditado en inglés. No se requiere una reescritura mayor del versículo.
