translation:
  language: es
  text: Porque vendrán días sobre ti cuando tus enemigos levantarán un terraplén[a] contra ti, te rodearán y te cercarán por todos lados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rampa de asedio».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la explicación o continuación profética de lo dicho antes. «Porque» conserva la fuerza conectiva natural en español sin perder el matiz causal o explicativo.
- source_word: ἥξουσιν ἡμέραι
  english_pob_choice: days will come
  chosen_spanish: vendrán días
  alternatives_spanish:
  - llegarán días
  - se acercarán días
  lexicon: BDAG
  rationale: Es un giro idiomático de anuncio futuro. «Vendrán días» mantiene el tono profético y resulta natural en español.
- source_word: ἐπὶ σὲ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - sobre ustedes
  lexicon: BDAG
  rationale: «Sobre ti» conserva el valor de irrupción o alcance del evento. En este contexto no se pierde la hostilidad, que ya queda explícita por la acción de los enemigos.
- source_word: παρεμβαλοῦσιν
  english_pob_choice: will build
  chosen_spanish: levantarán
  alternatives_spanish:
  - construirán
  - pondrán
  lexicon: BDAG
  rationale: En combinación con χάραξ, el verbo refiere a la construcción de obras de asedio. «Levantarán» comunica bien la acción militar en español y evita un calco torpe.
- source_word: οἱ ἐχθροί σου
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - los que te odian
  - tus adversarios
  lexicon: BDAG
  rationale: Traducción directa y sobria del sustantivo; el posesivo singular mantiene el hablante/oyente personificado.
- source_word: χάρακά
  english_pob_choice: an embankment
  chosen_spanish: un vallado[a]
  alternatives_spanish:
  - una empalizada
  - un terraplén
  - un muro de asedio
  lexicon: BDAG
  rationale: χάραξ designa aquí una obra de asedio. «Vallado» es comprensible y mantiene una imagen de cerramiento; se acompaña de nota para preservar la alternativa más técnica del texto fuente. No se elige «empalizada» como texto principal porque puede sonar más específico de madera que el griego en este contexto.
- source_word: σοι
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: BDAG
  rationale: 'El dativo es de perjuicio: la obra se construye en tu contra. «Contra ti» explicita la hostilidad que el español no expresa por sí sola en una dativa simple.'
- source_word: περικυκλώσουσίν σε
  english_pob_choice: surround you
  chosen_spanish: te rodearán
  alternatives_spanish:
  - te circundarán
  - te cercarán
  lexicon: BDAG
  rationale: Verbo militar de rodear por completo. «Rodearán» es claro y fluido; se conserva el encadenamiento de acciones de asedio.
- source_word: συνέξουσίν σε
  english_pob_choice: hem you in
  chosen_spanish: te cercarán
  alternatives_spanish:
  - te estrecharán
  - te encerrarán
  - te acorralarán
  lexicon: BDAG
  rationale: La imagen es de presión y confinamiento total. «Cercarán» preserva el campo militar y evita duplicar exactamente «rodearán», manteniendo una progresión semántica.
- source_word: πάντοθεν
  english_pob_choice: on every side
  chosen_spanish: por todos lados
  alternatives_spanish:
  - de todos lados
  - en todas partes
  lexicon: BDAG
  rationale: Expresión idiomática natural en español para total encierro. «Por todos lados» transmite bien la idea de cerco completo.
theological_decisions:
- issue: Second-person singular address to Jerusalem personified
  english_pob_reading: The singular 'you' is retained, addressing Jerusalem personified.
  chosen_spanish_reading: Se mantiene el singular («ti», «tus»), dirigiéndose a Jerusalén personificada.
  alternative_spanish_readings:
  - Dirigirse al pueblo en plural («ustedes»)
  - neutralizar el referente como colectivo
  rationale: El griego usa singular y el contexto profético personifica la ciudad. Conservar el singular preserva la fuerza retórica y no resuelve la tensión del referente.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve it
translation_notes:
  revision_awareness: El audit trail inglés no requirió cambios de sentido sustantivos; la única decisión notable es la elección de un término español accesible para χάραξ, acompañada de nota para conservar la alternativa técnica del asedio. La lectura sigue la revisión final sin divergencias relevantes.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico, pero con sintaxis española natural.
  - Se conservó el singular de la segunda persona para reflejar la personificación de Jerusalén.
  - El vocabulario militar se distribuyó para evitar repetición excesiva y preservar la progresión del cerco.
