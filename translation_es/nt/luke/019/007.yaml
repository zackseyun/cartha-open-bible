  rationale: Se conserva la estructura y el sentido del borrador, pero se mejora la precisión de καταλῦσαι con «para hospedarse», que comunica mejor el matiz de estancia como huésped. La nota al pie se reubica para reflejar la alternativa léxica significativa ya documentada en el audit trail inglés, evitando una nota menos necesaria sobre «al ver esto».
