review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del griego: la reacción universal de la gente, la murmuración, y la acusación de que Jesús entró para hospedarse con Zaqueo. Sin embargo, la nota al pie no refleja la alternativa preservada en el rastro inglés para καταλῦσαι + παρὰ ἁμαρτωλῷ ἀνδρί; en cambio, introduce una alternativa sobre ἰδόντες que no es la más significativa aquí. Además, «para quedarse con» puede sonar ambiguo en español actual y menos preciso que una formulación de hospedaje.'
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. No obstante, «ha entrado para quedarse con un hombre pecador» puede leerse de forma algo coloquial o ambigua. «A hospedarse con» o «a quedarse como huésped de» expresa mejor el sentido de καταλῦσαι. También conviene ajustar la nota al pie para apoyar una alternativa realmente relevante y clara en español.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Hombre pecador» preserva correctamente ἁμαρτωλῷ ἀνδρί. «Murmurar» corresponde bien a διεγόγγυζον. El punto principal es léxico-estilístico: precisar el valor de καταλῦσαι en español y alinear la nota con la decisión léxica auditada en inglés.'
  issues:
  - severity: medium
    issue: La nota al pie está anclada a «esto» y ofrece «O «al verlo»», pero la alternativa significativa documentada en el audit trail inglés corresponde a «to be the guest of a sinner».
    rationale: El inglés preserva una alternativa léxica relevante para καταλῦσαι y la relación de hospedaje; la nota española actual desplaza la atención a ἰδόντες, donde no hay una ambigüedad igualmente importante para el lector.
  - severity: medium
    issue: «Para quedarse con un hombre pecador» suena menos preciso y puede resultar ambiguo en español.
    rationale: καταλῦσαι aquí denota hospedarse/quedarse como huésped. «Quedarse con» en español puede sugerir mera permanencia con alguien, sin el matiz de hospedaje que sí está presente en el griego y en la auditoría inglesa.
  revised_spanish_text: 'Y al ver esto, todos comenzaron a murmurar, diciendo: «Ha entrado para hospedarse con un hombre pecador[a]».

    '
  revised_footnotes:
  - marker: a
