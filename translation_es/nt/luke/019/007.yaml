translation:
  language: es
  text: 'Y al ver esto, todos comenzaron a murmurar, diciendo: «Ha entrado para hospedarse con un hombre pecador[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha entrado para ser huésped de un pecador».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: when they all saw it
  chosen_spanish: al ver esto
  alternatives_spanish:
  - cuando lo vieron
  - después de verlo
  lexicon: BDAG
  rationale: 'El participio aoristo se vuelve una cláusula temporal natural en español. «Esto» refleja el hecho observado: la entrada de Jesús en casa de Zaqueo, sin añadir contenido ajeno.'
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - la multitud entera
  lexicon: BDAG
  rationale: «Todos» conserva el valor de totalidad del sujeto y suena natural en español corriente y eclesial.
- source_word: διεγόγγυζον
  english_pob_choice: began to grumble
  chosen_spanish: comenzaron a murmurar
  alternatives_spanish:
  - estaban murmurando
  - empezaron a quejarse
  - refunfuñaban
  lexicon: BDAG
  rationale: El imperfecto expresa una reacción en desarrollo; «comenzaron a murmurar» reproduce bien el matiz inceptivo y el sentido negativo de queja/murmuración bíblica.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: BDAG
  rationale: Participio complementario estándar que introduce el contenido de la murmuración.
- source_word: παρὰ ἁμαρτωλῷ ἀνδρὶ
  english_pob_choice: with a sinful man
  chosen_spanish: con un hombre pecador
  alternatives_spanish:
  - con un pecador
  - con una persona pecadora
  lexicon: BDAG
  rationale: La construcción con παρά + dativo comunica relación de hospedaje/estancia. Se conserva el sustantivo «hombre» junto con el adjetivo «pecador» para reflejar el griego ἀνδρί + ἁμαρτωλῷ y la descalificación del hablante.
- source_word: εἰσῆλθεν
  english_pob_choice: He has gone in
  chosen_spanish: ha entrado
  alternatives_spanish:
  - entró
  - ha ido adentro
  lexicon: BDAG
  rationale: El aoristo se puede presentar con perfecto o pretérito en español; «ha entrado» mantiene la acción completada con relevancia inmediata dentro del reproche.
- source_word: καταλῦσαι
  english_pob_choice: to stay
  chosen_spanish: para quedarse
  alternatives_spanish:
  - para alojarse
  - para hospedarse
  - para ser su huésped
  lexicon: BDAG
  rationale: El infinitivo expresa la finalidad de alojarse/estarse en la casa. «Para quedarse» es una solución clara y natural; otras opciones son más explícitas pero menos idiomáticas.
theological_decisions:
- issue: Caracterización despectiva de Zaqueo
  english_pob_reading: a sinful man
  chosen_spanish_reading: un hombre pecador
  alternative_spanish_readings:
  - un pecador
  rationale: El griego usa adjetivo + sustantivo, no solo un sustantivo abstracto. Mantener ambos elementos preserva la censura del grupo sin borrar la tensión lexical del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, items 4 and 5
translation_notes:
  revision_awareness: Coincide con el estado de alta concordancia del audit trail inglés; no se introducen cambios revisionales adicionales.
  spanish_consistency_notes:
  - Se preserva la diferencia entre «murmurar» y una queja neutral como «quejarse».
  - Se evita sustituir «hombre pecador» por una formulación más general que borre el par adjetivo+sustantivo del griego.
  - «Ha entrado» y «para quedarse» mantienen el movimiento y la finalidad de la frase sin sobretraducirla.
