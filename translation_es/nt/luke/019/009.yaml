    issue: La nota al pie altera la alternativa léxica de οἶκος
    rationale: El inglés auditado ofrece «to this household» como alternativa a «to this house». La nota española «a esta casa y a su casa» no refleja esa alternativa, añade contenido no presente y puede confundir al lector.
  revised_spanish_text: 'Y Jesús le dijo: «Hoy la salvación ha llegado a esta casa[a], porque él también es hijo de Abraham.»'
  revised_footnotes:
  - marker: a
    text: O «a esta familia» o «a este hogar». El griego οἶκος puede referirse a la casa física o al grupo doméstico asociado con ella.
    reason: lexical_alternative
