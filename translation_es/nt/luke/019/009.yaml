translation:
  language: es
  text: 'Y Jesús le dijo: «Hoy la salvación ha llegado a esta casa[a], porque él también es hijo de Abraham.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a esta familia» o «a este hogar». El griego οἶκος puede referirse a la casa física o al grupo doméstico asociado con ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Ahora ... dijo
  lexicon: BDAG
  rationale: δὲ es una conexión leve; en español, «Y» conserva el avance narrativo sin sobrecargar el matiz.
- source_word: πρὸς αὐτὸν
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Zacareo
  lexicon: BDAG
  rationale: El pronombre explícito se expresa naturalmente con el dativo clítico «le». Nombrar a Zaqueo añadiría información no presente en el versículo.
- source_word: Σήμερον
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  lexicon: BDAG
  rationale: «Hoy» es la equivalencia moderna más natural y conserva el énfasis temporal inicial.
- source_word: σωτηρία
  english_pob_choice: salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - liberación
  lexicon: BDAG
  rationale: En Lucas, σωτηρία tiene peso teológico; «salvación» preserva ese alcance mejor que un sentido meramente de rescate.
- source_word: τῷ οἴκῳ τούτῳ
  english_pob_choice: to this house
  chosen_spanish: a esta casa
  alternatives_spanish:
  - a esta familia
  - a este hogar
  - a esta casa y familia
  lexicon: BDAG
  rationale: «Casa» corresponde directamente a οἶκος. En español, además, puede abarcar por extensión la casa con su grupo doméstico sin perder la base léxica.
- source_word: ἐγένετο
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha venido
  - ha sucedido
  lexicon: BDAG
  rationale: Aunque γίνομαι significa literalmente «llegar a ser / suceder», con σωτηρία la idea es de llegada o arribo; «ha llegado» reproduce bien ese sentido idiomático.
- source_word: καθότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Introduce la razón de la afirmación de Jesús; «porque» es claro y directo en español.
- source_word: καὶ αὐτὸς
  english_pob_choice: he too
  chosen_spanish: él también
  alternatives_spanish:
  - también él
  - hasta él
  lexicon: BDAG
  rationale: La combinación subraya inclusión; «él también» reproduce esa fuerza de manera natural.
- source_word: υἱὸς Ἀβραάμ
  english_pob_choice: a son of Abraham
  chosen_spanish: hijo de Abraham
  alternatives_spanish:
  - descendiente de Abraham
  - hijo de Abraham por descendencia
  lexicon: BDAG
  rationale: Se mantiene la expresión idiomática y su resonancia de identidad/covenio sin resolverla en una sola interpretación más estrecha.
theological_decisions:
- issue: Sentido de «hijo de Abraham»
  english_pob_reading: The phrase is retained as a covenantal/identity expression without specifying whether Jesus means ethnic descent, faithful belonging within Abraham's line, or both.
  chosen_spanish_reading: La frase se conserva como expresión de identidad y pertenencia al pacto, sin precisar si Jesús alude a descendencia étnica, a pertenencia fiel a la línea de Abraham, o a ambas.
  alternative_spanish_readings:
  - descendiente étnico de Abraham
  - miembro verdadero de la familia de la fe de Abraham
  rationale: El versículo no obliga a resolver la tensión teológica. Mantener la expresión permite que el contexto inmediato de Lucas siga informando la interpretación.
  doctrine_reference: Preservar la tensión teológica en lugar de cerrarla.
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: se mantuvo la estructura narrativa, el valor idiomático de σωτηρία + ἐγένετο y la ambigüedad productiva de οἶκος y de «hijo de Abraham», sin introducir glosas no respaldadas.'
  spanish_consistency_notes:
  - Se prefirió «Y» para δὲ por fluidez narrativa en español.
  - Se usó «ha llegado» para respetar el valor idiomático de σωτηρία ἐγένετο.
  - «Casa» se conservó en el texto principal, con nota para la posible extensión a «hogar/familia».
  - Se mantuvo «hijo de Abraham» por fidelidad al idiomático y a la tensión teológica documentada.
