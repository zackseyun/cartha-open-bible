- from: 'Y cuando Jesús llegó al lugar[a], levantando la vista dijo a él: «Zaqueo, baja de prisa[b], porque hoy me es necesario quedarme en tu casa».'
  to: 'Y cuando Jesús llegó al lugar[a], miró hacia arriba y le dijo: «Zaqueo, date prisa y baja, porque hoy me es necesario[b] quedarme en tu casa».'
