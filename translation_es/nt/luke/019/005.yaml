translation:
  language: es
  text: 'Y cuando Jesús llegó al lugar[a], miró hacia arriba y le dijo: «Zaqueo, date prisa y baja, porque hoy me es necesario[b] quedarme en tu casa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu casa» o «en tu hogar».
    reason: lexical_alternative
  - marker: b
    text: El griego δεῖ («me es necesario») puede implicar una necesidad vinculada a la misión de Jesús o al propósito divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - as
  - al
  lexicon: BDAG
  rationale: En la secuencia narrativa, ὡς introduce una cláusula temporal. «Cuando» es la forma natural en español y conserva la relación temporal sin forzar un calco.
- source_word: ἐπὶ τὸν τόπον
  english_pob_choice: to the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - a ese lugar
  - al sitio
  lexicon: BDAG
  rationale: La expresión es locativa y concreta. «Al lugar» preserva el sentido sin redundancia y suena natural en español bíblico contemporáneo.
- source_word: ἀναβλέψας
  english_pob_choice: he looked up
  chosen_spanish: levantando la vista
  alternatives_spanish:
  - miró hacia arriba
  - alzando la vista
  lexicon: BDAG
  rationale: El participio describe la acción de dirigir la mirada hacia arriba, en este contexto hacia Zaqueo. «Levantando la vista» mantiene la relación participial con buena fluidez en español; el texto principal no sobreespecifica más allá de lo que el griego permite.
- source_word: εἶπεν πρὸς αὐτόν
  english_pob_choice: said to him
  chosen_spanish: dijo a él
  alternatives_spanish:
  - le dijo
  - habló con él
  lexicon: BDAG
  rationale: La fórmula griega es literalmente «dijo a él». En español, «dijo a él» mantiene la dirección explícita del discurso, aunque «le dijo» sería más idiomático; aquí se prefiere conservar la estructura del original con legibilidad aceptable.
- source_word: Ζακχαῖε
  english_pob_choice: Zacchaeus
  chosen_spanish: Zaqueo
  alternatives_spanish:
  - Zaqueo
  lexicon: Transliteración estándar al español
  rationale: 'El nombre propio se adapta a la forma usual en español bíblico: «Zaqueo».'
- source_word: σπεύσας κατάβηθι
  english_pob_choice: hurry and come down
  chosen_spanish: baja de prisa
  alternatives_spanish:
  - apúrate y baja
  - baja rápidamente
  lexicon: BDAG
  rationale: El participio aoristo con imperativo expresa urgencia en una sola instrucción. «Baja de prisa» conserva la premura sin añadir más contenido del necesario; «apúrate y baja» sería una alternativa más explícita.
- source_word: σήμερον γὰρ
  english_pob_choice: because today
  chosen_spanish: porque hoy
  alternatives_spanish:
  - pues hoy
  - ya que hoy
  lexicon: BDAG
  rationale: γάρ introduce la razón de la orden. «Porque hoy» conserva el valor causal de forma natural en español.
- source_word: ἐν τῷ οἴκῳ σου
  english_pob_choice: at your house
  chosen_spanish: en tu casa
  alternatives_spanish:
  - en tu hogar
  - en tu casa misma
  lexicon: BDAG
  rationale: οἶκος puede referirse a casa, hogar o incluso familia/household según contexto. Aquí, por el marco de la visita y la estancia de Jesús, «en tu casa» expresa con claridad el sentido inmediato.
- source_word: δεῖ
  english_pob_choice: I must
  chosen_spanish: me es necesario
  alternatives_spanish:
  - debo
  - tengo que
  - es necesario que
  lexicon: BDAG
  rationale: δεῖ expresa necesidad o conveniencia obligatoria; en Lucas suele llevar un peso de necesidad ligada al propósito de Jesús. «Me es necesario» preserva esa fuerza sin resolverla en exceso ni reducirla a una simple obligación subjetiva.
- source_word: μεῖναι
  english_pob_choice: stay
  chosen_spanish: quedarme
  alternatives_spanish:
  - permanecer
  - quedar
  lexicon: BDAG
  rationale: Aquí μένω significa permanecer o alojarse por un tiempo. «Quedarme» es natural en español y puede abarcar tanto estancia como permanencia.
theological_decisions:
- issue: Fuerza de δεῖ en Lucas
  english_pob_reading: Rendered as 'I must' to preserve necessity without over-specifying it as explicit divine compulsion in the main text.
  chosen_spanish_reading: «Me es necesario» para conservar la noción de necesidad sin explicarla en exceso.
  alternative_spanish_readings:
  - debo
  - tengo que
  - es necesario que
  rationale: 'En Lucas, δεῖ puede señalar una necesidad vinculada al plan y misión de Jesús. La traducción mantiene esa tensión: expresa obligación/necesidad real, pero no la desarrolla más allá del dato textual.'
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: 'El pasaje mantiene alta concordancia con el auditorial inglés: se conservan la secuencia temporal, la urgencia de la orden y la fuerza de δεῖ. No se registraron revisiones en el pase más reciente, y el texto final sigue la lectura aprobada sin cambios sustanciales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - Se mantiene «Jesús» y la forma habitual «Zaqueo» para nombres propios.
  - «Me es necesario» conserva la necesidad fuerte de δεῖ sin convertirla en una formulación doctrinal más explícita.
  - «Casa» se eligió por el contexto inmediato de visita y estancia; la nota permite «hogar» como alternativa contextual.
  - El orden y la puntuación buscan una lectura natural en español sin perder la relación entre las acciones del texto griego.
