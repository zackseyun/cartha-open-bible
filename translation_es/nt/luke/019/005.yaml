review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: llegada al lugar, mirada hacia arriba, llamado a Zaqueo, urgencia en bajar y necesidad de quedarse en su casa. Sin embargo, hay dos desajustes importantes de forma y sentido: «dijo a él» es poco idiomático en español y no mejora la fidelidad frente a «le dijo»; y la nota [b] está mal anclada, porque comenta δεῖ («me es necesario»), no «baja de prisa». Además, «levantando la vista» es aceptable, pero «miró hacia arriba» refleja mejor el valor verbal finito que el inglés POB eligió en contexto narrativo.'
  spanish_quality_summary: El español es mayormente claro, pero «dijo a él» suena antinatural. También conviene coordinar «date prisa y baja» o «apresúrate y baja» para reflejar mejor σπεύσας κατάβηθι, en vez de comprimirlo en «baja de prisa». «Me es necesario quedarme» es digno y fiel, aunque algo más natural es «debo quedarme»; sin embargo, por la decisión teológica documentada, puede mantenerse «me es necesario».
  glossary_alignment: No hay términos del glosario mayor que entren en conflicto. «Jesús» y «Dios» no presentan problema aquí. La decisión sobre δεῖ se conserva adecuadamente con «me es necesario».
  issues:
  - severity: high
    issue: La nota [b] está colocada en la frase equivocada.
    rationale: La nota explica δεῖ, que en el borrador corresponde a «me es necesario», pero el marcador [b] está unido a «baja de prisa». Eso rompe la trazabilidad de la decisión léxica y teológica.
  - severity: medium
    issue: «Dijo a él» es español poco natural.
    rationale: Aunque reproduce de manera más literal la estructura griega, en español bíblico contemporáneo «le dijo» es la forma fiel y legible. «Dijo a él» suena forzado y reduce la calidad sin ganar precisión.
  - severity: medium
    issue: «Baja de prisa» atenúa la doble fuerza de σπεύσας κατάβηθι.
    rationale: El griego expresa urgencia más imperativo de descenso. «Date prisa y baja» o «apresúrate y baja» representa mejor la construcción sin parafrasear.
  - severity: low
    issue: «Levantando la vista» es menos directo que «miró hacia arriba».
    rationale: El participio griego en narrativa suele resolverse naturalmente con un verbo finito en español. «Miró hacia arriba» conecta mejor con el contexto de Zaqueo en el árbol y con la auditoría inglesa.
  revised_spanish_text: 'Y cuando Jesús llegó al lugar[a], miró hacia arriba y le dijo: «Zaqueo, date prisa y baja, porque hoy me es necesario[b] quedarme en tu casa».'
  revised_footnotes:
