    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre el cual nadie de entre los hombres se ha sentado jamás»; de forma más idiomática, «sobre el cual ningún ser humano se ha sentado jamás».
    reason: lexical_alternative
