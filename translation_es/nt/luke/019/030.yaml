base_translation:
  language: en
  yaml_path: translation/nt/luke/019/030.yaml
  text: saying[a], “Go into the village opposite you, in which, as you enter, you will find a colt tied, on which no one among men has ever sat[b]. Untie it and bring it.”
  footnotes:
