  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: mandato de ir, referencia a la aldea enfrente, hallazgo del pollino atado, y la secuencia desatarlo/tráiganlo. También preserva adecuadamente πῶλον como «pollino» con nota alternativa. Sin embargo, se aparta de una decisión léxica significativa del original y del POB en ἐκάθισεν: el griego dice «se sentó / ha se sentado sobre», no «ha montado». Además, la nota [a] es innecesaria y confusa, porque el texto español no conserva un gerundio sino «diciendo».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse ligeramente para mayor naturalidad y fidelidad. «Sobre el cual nadie de entre los hombres se ha sentado jamás» suena algo pesado pero es aceptable y más fiel que «ha montado». La puntuación con punto y coma funciona, aunque una coma también sería posible. La redacción revisada mantiene buena legibilidad eclesial sin paraprasear.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto en este versículo. La elección «pollino» concuerda con la rationale documentada para πῶλον. La principal desalineación está en ἐκάθισεν, donde debe mantenerse el valor de «sentarse» en vez de sustituirlo por «montar».
  issues:
  - severity: medium
    issue: «ha montado» traduce interpretativamente ἐκάθισεν
    rationale: El verbo griego significa «se sentó»; el POB inglés preserva explícitamente «sat» y rechaza «mounted» como exceso interpretativo. En español puede decirse «se ha sentado» sin pérdida de claridad.
  - severity: low
    issue: La nota [a] no corresponde bien al texto español
    rationale: La nota explica que el participio se conserva con gerundio, pero el texto dice «diciendo», no una construcción alterna relevante. Además, «O “diciendo”» no aporta una alternativa real.
