translation:
  language: es
  text: 'diciendo: «Vayan a la aldea que está enfrente de ustedes; al entrar en ella, hallarán un pollino[a] atado, sobre el cual nadie de entre los hombres se ha sentado jamás[b]. Desátenlo y tráiganlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un asno joven». El griego πῶλος puede designar un animal joven y, en este contexto de la entrada triunfal, se refiere a un asno joven.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre el cual nadie de entre los hombres se ha sentado jamás»; de forma más idiomática, «sobre el cual ningún ser humano se ha sentado jamás».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑπάγετε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan allá
  - Prosigan
  lexicon: BDAG
  rationale: Imperativo plural de movimiento; «Vayan» es natural en español y conserva la fuerza directa de la orden sin añadir matices.
- source_word: κατέναντι
  english_pob_choice: opposite you
  chosen_spanish: que está enfrente de ustedes
  alternatives_spanish:
  - frente a ustedes
  - opuesta a ustedes
  lexicon: BDAG
  rationale: La relación espacial se expresa mejor en español con una frase preposicional; «enfrente de ustedes» mantiene el valor relacional del griego sin sonar forzado.
- source_word: κώμην
  english_pob_choice: village
  chosen_spanish: aldea
  alternatives_spanish:
  - pueblo
  - villa
  lexicon: BDAG
  rationale: «Aldea» comunica el asentamiento pequeño rural de κώμη con claridad; «pueblo» podría sonar demasiado amplio en algunos contextos.
- source_word: ἐν ᾗ εἰσπορευόμενοι
  english_pob_choice: in which, as you enter
  chosen_spanish: al entrar en ella
  alternatives_spanish:
  - cuando entren en ella
  - mientras entren en ella
  lexicon: BDAG
  rationale: La forma participial temporal/circunstancial se vierte de manera fluida con «al entrar en ella», que preserva el sentido de entrada sin sobretraducción.
- source_word: εὑρήσετε
  english_pob_choice: you will find
  chosen_spanish: hallarán
  alternatives_spanish:
  - encontrarán
  - verán que hay
  lexicon: BDAG
  rationale: «Hallarán» es un equivalente claro y digno para el futuro de εὑρήσετε; mantiene el carácter de hallazgo previsto por Jesús.
- source_word: πῶλον
  english_pob_choice: a colt
  chosen_spanish: un pollino
  alternatives_spanish:
  - un potrillo
  - un asnillo joven
  lexicon: BDAG
  rationale: El término griego designa un animal joven; en este contexto de la entrada triunfal se entiende como asno joven. «Pollino» preserva la amplitud del término y es compatible con la identificación contextual.
- source_word: δεδεμένον
  english_pob_choice: tied
  chosen_spanish: atado
  alternatives_spanish:
  - amarrado
  - ligado
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe un estado resultante; «atado» es directo, formal y fiel al estado de sujeción.
- source_word: ἐφ’ ὃν
  english_pob_choice: on which
  chosen_spanish: sobre el cual
  alternatives_spanish:
  - en el que
  - encima del cual
  lexicon: BDAG
  rationale: La relación preposicional se expresa con «sobre el cual», que reproduce bien el referente del cual luego se dice que nadie se ha sentado/ montado.
- source_word: οὐδεὶς πώποτε ἀνθρώπων
  english_pob_choice: no one among men has ever
  chosen_spanish: nadie de entre los hombres ha montado jamás
  alternatives_spanish:
  - ningún ser humano ha montado jamás
  - nadie ha montado jamás
  lexicon: BDAG
  rationale: Se conserva la referencia humana explícita del genitivo partitivo. En español, «de entre los hombres» mantiene esa marca sin volver la frase demasiado pesada.
- source_word: ἐκάθισεν
  english_pob_choice: sat
  chosen_spanish: ha montado
  alternatives_spanish:
  - se ha sentado
  - ha cabalgado
  lexicon: BDAG
  rationale: Aunque el verbo griego significa literalmente «se sentó», el contexto narrativo de un animal de monta hace que en español «ha montado» comunique con mayor naturalidad el acto relevante; se evita una traducción engañosamente literal que podría oscurecer el sentido.
- source_word: λύσαντες αὐτὸν
  english_pob_choice: Untie it
  chosen_spanish: Desátenlo
  alternatives_spanish:
  - Desátenlo y libérenlo
  - Suéltenlo
  lexicon: BDAG
  rationale: El participio aoristo con valor imperatival se vierte con un imperativo español directo. «Desátenlo» mantiene la secuencia de acciones sin agregar interpretación.
- source_word: ἀγάγετε
  english_pob_choice: bring it
  chosen_spanish: tráiganlo
  alternatives_spanish:
  - llévenlo
  - conduzcanlo
  lexicon: BDAG
  rationale: Imperativo de ἄγω; «tráiganlo» es la opción más natural en español y conserva el movimiento hacia los hablantes implícito en el contexto.
theological_decisions:
- issue: Identificación contextual de πῶλον
  english_pob_reading: Main text uses 'a colt'; English footnote notes it may mean 'a young donkey' in the triumphal-entry context.
  chosen_spanish_reading: Main text uses «un pollino» with no species added in the verse itself.
  alternative_spanish_readings:
  - un asno joven
  - un potrillo
  - un burrito joven
  rationale: Se conserva la amplitud del término griego en el texto principal y se evita fijar innecesariamente la especie en la línea base. El contexto narrativo permite entenderlo como asno joven, pero esa aclaración no se impone al versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
- issue: Referencia humana explícita en οὐδεὶς πώποτε ἀνθρώπων
  english_pob_reading: Literally, 'on which no one among men has ever sat'; more idiomatically, 'on which no human being has ever sat.'
  chosen_spanish_reading: «nadie de entre los hombres ha montado jamás»
  alternative_spanish_readings:
  - nadie ha montado jamás
  - ningún ser humano ha montado jamás
  rationale: Se conserva la marca del genitivo partitivo del griego mediante «de entre los hombres», evitando aplanar la referencia antropológica. La elección de «ha montado» en español responde al contexto de un animal destinado a ser montado, aunque el griego diga literalmente «se sentó»; así no se pierde el sentido narrativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión que prefirió un término más directo y formal para δεδεμένον; por eso se escogió «atado» en vez de una expansión como «atado»/«atado y sujeto». También se respetó el análisis del audit trail sobre πῶλος y la fuerza relacional de κατέναντι.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió un español natural y digno, evitando calcos innecesarios, pero conservando la estructura argumental del griego.
  - Los pronombres plurales se regularizaron a «ustedes» por lectura pública latinoamericana neutral.
  - No se usó «Cristo» ni terminología de título mesiánico porque el versículo no lo contiene.
