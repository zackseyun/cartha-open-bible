translation:
  language: es
  text: 'Y si alguien les pregunta[a]: «¿Por qué lo desatan?», dirán: «El Señor lo necesita».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el dueño lo necesita».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐρωτᾷ
  english_pob_choice: asks
  chosen_spanish: pregunta
  alternatives_spanish:
  - les pregunta
  - les hace una pregunta
  lexicon: BDAG
  rationale: En español, «pregunta» transmite de forma natural la acción de pedir una explicación en este diálogo breve. Se conserva el destinatario explícito con «les» para reflejar ὑμᾶς.
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Para qué razón?
  - ¿Con qué motivo?
  lexicon: BDAG
  rationale: Es la interrogativa idiomática normal en español y reproduce con claridad la fuerza causal de la pregunta griega.
- source_word: λύετε
  english_pob_choice: are you untying it
  chosen_spanish: lo desatan
  alternatives_spanish:
  - lo desamarran
  - lo sueltan
  lexicon: BDAG
  rationale: En el contexto del animal atado, λύω significa desatar o soltar de una atadura. «Desatan» es natural en español y mantiene la acción concreta sin sobreexplicarla.
- source_word: οὕτως
  english_pob_choice: this
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - esto
  lexicon: BDAG
  rationale: El adverbio introduce la fórmula de respuesta; «así» preserva esa función directiva en español sin volverla rígida.
- source_word: ἐρεῖτε
  english_pob_choice: you shall say
  chosen_spanish: dirán
  alternatives_spanish:
  - dirán ustedes
  - han de decir
  lexicon: BDAG
  rationale: Aunque el griego usa segunda persona plural, en español la estructura de discurso directo permite «dirán» como forma imperativa-futura natural. Si se quisiera marcar más explícitamente la instrucción, podría ser «dirán ustedes», pero «dirán» fluye mejor en la cita.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - dueño
  - amo
  lexicon: BDAG
  rationale: La equivalencia normal de κύριος en este contexto es «Señor», que conserva tanto el título reverente como la resonancia teológica que el audit trail inglés preserva con «Lord».
- source_word: χρείαν ἔχει
  english_pob_choice: has need of
  chosen_spanish: tiene necesidad de
  alternatives_spanish:
  - necesita
  - requiere
  lexicon: BDAG
  rationale: La expresión griega es idiomática y literalmente significa «tiene necesidad de». En español, «tiene necesidad de» conserva mejor la textura del original que simplemente «necesita», sin perder claridad.
- source_word: αὐτοῦ
  english_pob_choice: of it
  chosen_spanish: de ello
  alternatives_spanish:
  - de él
  - de él/ello
  lexicon: BDAG
  rationale: El pronombre genitivo se refiere al animal en el contexto inmediato; «de ello» evita forzar el género en español y mantiene la referencia objetiva sin decidir más de lo que el contexto exige.
theological_decisions:
- issue: Renderización de κύριος en un contexto narrativo con posible referencia a Jesús
  english_pob_reading: Rendered as 'The Lord,' referring to Jesus and preserving the title's theological resonance.
  chosen_spanish_reading: «El Señor», preservando el título reverente y la resonancia teológica.
  alternative_spanish_readings:
  - «el dueño»
  - «el amo»
  rationale: El contexto narrativo permite una lectura de título reverente, y el POB inglés opta por «Lord». En español, «Señor» conserva ese rango semántico y evita reducir la expresión a una mera relación de propiedad.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Fuerza directiva del futuro ἐρεῖτε
  english_pob_reading: you shall say
  chosen_spanish_reading: «dirán» como forma de mandato/instrucción futura en discurso directo.
  alternative_spanish_readings:
  - «dirán ustedes»
  - «deberán decir»
  rationale: El griego usa futuro con fuerza instructiva. En español, una traducción demasiado imperativa podría alterar el tono de la orden dada por Jesús; «dirán» conserva el valor directivo y suena natural en el relato.
  doctrine_reference: Gramática narrativa del imperativo futuro en el NT
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: se mantiene la directiva futura, la referencia concreta al animal y la decisión doctrinal de κύριος como «Señor». No se registran revisiones previas en el paquete.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al estándar POB, sin sustituirlo por un término de mera propiedad.
  - «Desatan» refleja la acción concreta de λύω en contexto de animal atado.
  - La nota alternativa «el dueño» recoge la posibilidad semántica sin desplazar la lectura principal.
