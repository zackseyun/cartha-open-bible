revisions:
- from: 'Y si alguien les pregunta[a]: «¿Por qué lo desatan?», dirán así: «El Señor tiene necesidad de ello».'
  to: 'Y si alguien les pregunta[a]: «¿Por qué lo desatan?», dirán: «El Señor lo necesita».'
  rationale: Se revisa «dirán así» a «dirán:» para un español más natural sin perder la función de οὕτως. Se cambia «tiene necesidad de ello» por «lo necesita» porque transmite con claridad la referencia de αὐτοῦ al pollino y evita una construcción artificiosa en español. Aunque se pierde algo de la literalidad de χρείαν ἔχει, la mejora de legibilidad y naturalidad en español compensa, y la solemnidad general del versículo se conserva con «El Señor». No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:02:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: pregunta condicional, contenido de la objeción, respuesta instruida y título κύριος como «Señor». Sin embargo, hay dos ajustes necesarios para una fidelidad más precisa y un español más natural: el futuro imperatival ἐρεῖτε se expresa mejor como «dirán»/«diréis» sin el matiz algo marcado de «dirán así», y αὐτοῦ no conviene verterlo como «de ello», que suena poco natural en español para un animal concreto en este contexto.'
  spanish_quality_summary: El texto es claro y comprensible, pero «tiene necesidad de ello» resulta rígido y poco idiomático en español bíblico actual. «Lo necesita» sería natural, pero pierde la textura del original; «tiene necesidad de él» preserva mejor la forma, aunque fuerza género masculino sobre el pollino implícito. La mejor salida equilibrada es «lo necesita» o bien una formulación más idiomática con nota. Además, «dirán así» suena traducido; «dirán:» o «dirán esto:» fluye mejor.
  glossary_alignment: 'Se alinea bien con el glosario en «Señor» para κύριος. No hay conflicto con Yahvé/Mesías/etc. La nota alternativa «el dueño» capta de forma aceptable la alternativa inglesa «The master», aunque «el amo» sería menos natural en este contexto. La principal desalineación es estilística/lexical: «de ello» no corresponde al estándar de español claro y eclesialmente legible.'
  issues:
  - severity: medium
    issue: «de ello» para αὐτοῦ suena poco natural en español
    rationale: Aunque intenta evitar decidir género, en contexto narrativo de un pollino concreto «de ello» es impersonal y rígido. El español natural requiere o un pronombre directo («lo necesita») o «de él», si se prioriza la forma literal.
  - severity: low
    issue: «dirán así» es torpe como introducción de cita
    rationale: οὕτως introduce la respuesta, pero en español «dirán así» no suena idiomático. «Dirán:» comunica la función con naturalidad; si se desea reflejar οὕτως más explícitamente, «dirán esto:» sería mejor que «así».
  - severity: low
    issue: 'La nota «O: “el dueño”» podría acercarse más a la nota inglesa'
    rationale: La alternativa inglesa es «The master». «El dueño» es posible en este contexto, pero semánticamente desplaza el matiz de superior/señor hacia propiedad. Aun así, es defendible y no exige rechazo.
  revised_spanish_text: 'Y si alguien les pregunta[a]: «¿Por qué lo desatan?», dirán: «El Señor lo necesita».'
  revised_footnotes:
  - marker: a
    text: 'O: «el dueño lo necesita».'
    reason: alternative_reading
  revision_rationale: Se revisa «dirán así» a «dirán:» para un español más natural sin perder la función de οὕτως. Se cambia «tiene necesidad de ello» por «lo necesita» porque transmite con claridad la referencia de αὐτοῦ al pollino y evita una construcción artificiosa en español. Aunque se pierde algo de la literalidad de χρείαν ἔχει, la mejora de legibilidad y naturalidad en español compensa, y la solemnidad general del versículo se conserva con «El Señor». No se requiere adjudicación adicional.
