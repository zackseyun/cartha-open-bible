translation:
  language: es
  text: 'Entonces vino el primero, diciendo: «Señor[a], tu mina ha producido diez minas más».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Maestro». El título griego κύριε puede ser un trato respetuoso a un superior, además de «Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: παρεγένετο
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se presentó
  lexicon: BDAG
  rationale: En contexto narrativo, παραγίνομαι expresa venir o llegar. «Vino» transmite con naturalidad el movimiento del primero hacia el señor sin añadir matices no presentes en el griego.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ marca avance narrativo; «Entonces» conserva esa progresión de manera idiomática en español.
- source_word: ὁ πρῶτος
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el primero de ellos
  - el primer siervo
  lexicon: BDAG
  rationale: El griego identifica al primero en la secuencia. «El primero» es suficiente y fiel, sin introducir una especificación no explícita.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio acompaña la acción principal de manera contemporánea; «diciendo» reproduce bien esa relación narrativa.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene la equivalencia habitual de κύριος en el proyecto como «Señor». En esta parábola también podría leerse como un trato respetuoso a un superior, pero «Señor» preserva la consistencia terminológica y la ambigüedad del original.
- source_word: ἡ μνᾶ σου
  english_pob_choice: your mina
  chosen_spanish: tu mina
  alternatives_spanish:
  - tu mina de dinero
  - la mina tuya
  lexicon: BDAG
  rationale: μνᾶ se translitera como «mina» para conservar la unidad monetaria histórica. El posesivo «tu» sigue el griego σου y mantiene la relación de pertenencia al señor.
- source_word: δέκα προσηργάσατο μνᾶς
  english_pob_choice: has made ten minas more
  chosen_spanish: ha producido diez minas más
  alternatives_spanish:
  - ha ganado diez minas más
  - ha hecho diez minas más
  lexicon: BDAG
  rationale: προσεργάζομαι aquí expresa producir o generar una ganancia adicional. «Ha producido diez minas más» refleja con claridad que la mina original generó un rendimiento adicional, sin reducirlo a una ganancia financiera moderna ni perder la idea de incremento.
theological_decisions:
- issue: Rendering of κύριος in a parabolic address
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Aunque el hablante se dirige a un personaje de la parábola y no está haciendo una confesión cristológica directa, el término κύριος admite un trato respetuoso o un título de autoridad. «Señor» sigue la decisión auditada del POB inglés y conserva esa ambigüedad.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El inglés POB revisó «has earned ten minas» a «has made ten minas more» para reflejar más directamente προσηργάσατο. La versión española adopta esa misma dirección semántica con «ha producido diez minas más», manteniendo el énfasis en que la mina original generó un rendimiento adicional.
  spanish_consistency_notes:
  - Se conserva «mina» como unidad monetaria transliterada, en línea con la decisión inglesa auditada.
  - «Señor» mantiene la terminología consistente para κύριος, sin borrar la posibilidad contextual de «Maestro».
  - La construcción «ha producido diez minas más» preserva la idea de incremento resultante, no solo de ganancia abstracta.
