    text: 'O simplemente: «se le dará». El griego no incluye explícitamente «más», aunque el sentido de aumento suele entenderse por el contexto.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta «δοθήσεται» a la decisión documentada del English POB («more will be given») con una formulación española natural: «se le dará más». Se mantiene en nota la alternativa más literal porque el griego no expresa «más» de forma explícita. También se mejora la fluidez eliminando la coma innecesaria en la primera cláusula y simplificando la forma pasiva final a «se le quitará», que conserva el sentido de privación de ἀρθήσεται.'
