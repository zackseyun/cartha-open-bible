translation:
  language: es
  text: Les digo que a todo el que tiene se le dará más[a]; pero al que no tiene, aun lo que tiene se le quitará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «se le dará». El griego no incluye explícitamente «más», aunque el sentido de aumento suele entenderse por el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω
  english_pob_choice: I tell
  chosen_spanish: Les digo
  alternatives_spanish:
  - Les digo a ustedes
  - Les afirmo
  lexicon: BDAG
  rationale: El presente introductorio de discurso se expresa naturalmente en español con «les digo», conservando el tono directo y enfático de Jesús sin volverlo más solemne de lo necesario.
- source_word: παντὶ τῷ ἔχοντι
  english_pob_choice: to everyone who has
  chosen_spanish: a todo el que tiene
  alternatives_spanish:
  - a todos los que tienen
  - a todo el que posee
  lexicon: BDAG
  rationale: 'El participio articular funciona como sustantivo: «el que tiene». «A todo el que tiene» conserva el valor general y proverbial del griego y suena natural en español.'
- source_word: δοθήσεται
  english_pob_choice: more will be given
  chosen_spanish: se le dará
  alternatives_spanish:
  - se le dará más
  - le será dado
  lexicon: BDAG
  rationale: El griego dice simplemente «será dado»; la idea de aumento está implícita por el contexto, pero no es explícita en la forma verbal. Por eso se evita introducir «más» en el texto principal y se deja la posibilidad en nota.
- source_word: ἀπὸ δὲ τοῦ μὴ ἔχοντος
  english_pob_choice: but from the one who does not have
  chosen_spanish: pero al que no tiene
  alternatives_spanish:
  - pero del que no tiene
  - pero del que no posee
  lexicon: BDAG
  rationale: La preposición ἀπό marca origen o separación; en español, el contraste proverbial se expresa con naturalidad como «al que no tiene». Se mantiene el contraste sin recargar la sintaxis.
- source_word: καὶ ὃ ἔχει
  english_pob_choice: even what he has
  chosen_spanish: aun lo que tiene
  alternatives_spanish:
  - también lo que tiene
  - inclusive lo que tiene
  lexicon: BDAG
  rationale: καί es intensivo aquí; «aun» comunica mejor esa fuerza que un simple «también». Se conserva el sentido de pérdida total de lo que todavía posee.
- source_word: ἀρθήσεται
  english_pob_choice: will be taken away
  chosen_spanish: le será quitado
  alternatives_spanish:
  - será quitado
  - será tomado
  lexicon: BDAG
  rationale: El futuro pasivo de αἴρω implica remoción o privación. «Le será quitado» es una equivalencia natural en español que mantiene la idea de despojo.
theological_decisions:
- issue: Alcance interpretativo del dicho
  english_pob_reading: Render the proverb straightforwardly without importing a doctrinal explanation about salvation, merit, or predestination.
  chosen_spanish_reading: Traducir el proverbio de forma directa, sin añadir una explicación doctrinal sobre salvación, mérito o predestinación.
  alternative_spanish_readings:
  - Leerlo explícitamente como principio de mayordomía en el contexto de la parábola
  - Leerlo como un principio más amplio del reino
  rationale: El versículo formula un principio general de aumento y pérdida. La traducción no debe resolver la aplicación teológica ni expandir el dicho más allá de lo que el griego expresa.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la redacción.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al criterio auditado; la decisión clave es mantener en el texto principal la forma explícita del griego («se le dará») y reservar la idea de aumento para la nota.'
  spanish_consistency_notes:
  - Se conserva el pronombre dativo implícito con «le» para reflejar el beneficio/pérdida del enunciado.
  - Se evita «más» en el cuerpo para no convertir en explícito lo que el griego solo sugiere contextualmente.
  - «Aun» se usa para reproducir el valor intensivo de καί en la segunda cláusula.
  - El registro es neutro y digno, compatible con lectura eclesial amplia.
