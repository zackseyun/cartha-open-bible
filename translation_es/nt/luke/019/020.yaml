review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: «el otro», la llegada con introducción de discurso, «Señor», «tu mina» y la idea de haberla mantenido apartada. Sin embargo, hay dos desajustes importantes con la evidencia y el rastro POB: (1) el texto principal usa «en un pañuelo», mientras que el inglés auditado eligió el término más general «in a cloth» y reservó «handkerchief» para nota; (2) «había guardado» atenúa el valor durativo de ἣν εἶχον ἀποκειμένην mejor preservado en español por «tenía guardada» o similar.'
  spanish_quality_summary: 'El español es claro y natural, pero la frase puede ganar fidelidad y precisión sin perder fluidez. «Aquí está» funciona bien para ἰδού. «Vino, diciendo» es aceptable aunque algo rígido; no necesita cambio obligatorio. La combinación actual de texto y notas presenta inconsistencia de marcadores: en el texto [a] ancla «había guardado» y [b] «pañuelo», pero en las decisiones léxicas se invierte el anclaje. Conviene simplificar y alinear.'
  glossary_alignment: La terminología del proyecto está bien respetada en «Señor» para κύριε y «mina» para μνᾶ. No hay términos doctrinalmente conflictivos adicionales. La principal corrección terminológica es preferir «paño» en el texto principal para σουδάριον, con «pañuelo» como alternativa en nota, conforme al audit trail inglés.
  issues:
  - severity: medium
    issue: «en un pañuelo» en el texto principal sobreespecifica σουδάριον
    rationale: El POB inglés eligió «in a cloth» como lectura principal y dejó «handkerchief» como alternativa léxica. En español, «pañuelo» introduce una imagen más específica de la que exige el griego.
  - severity: medium
    issue: «había guardado» debilita el estado continuo de ἣν εἶχον ἀποκειμένην
    rationale: La construcción griega expresa que la mina estaba mantenida apartada. «La tenía guardada» preserva mejor ese matiz durativo/resultativo que un pluscuamperfecto simple.
  - severity: low
    issue: Inconsistencia interna de marcadores y justificación de notas
    rationale: Las notas del borrador y las decisiones léxicas no coinciden en cuál marcador corresponde a qué expresión. Además, la nota aspectual no es necesaria si el texto principal ya refleja mejor el matiz.
  revised_spanish_text: 'Y el otro vino, diciendo: “Señor, aquí está tu mina, que yo tenía guardada en un paño[a].”'
  revised_footnotes:
  - marker: a
    text: O «en un pañuelo». El griego σουδάριον se refiere a un paño, a menudo usado como tela para la cara o pañuelo.
    reason: lexical_alternative
  revision_rationale: Se revisa «había guardado» a «tenía guardada» para reflejar mejor el aspecto durativo de ἣν εἶχον ἀποκειμένην, y «pañuelo» a «paño» para seguir la elección principal documentada por el POB para σουδάριον, manteniendo «pañuelo» como alternativa en nota. Se elimina la nota aspectual porque el texto revisado ya expresa adecuadamente el matiz griego y así se evita sobrecargar el versículo.
