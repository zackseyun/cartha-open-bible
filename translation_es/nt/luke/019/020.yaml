- from: 'Y el otro vino, diciendo: “Señor, aquí está tu mina, que yo había guardado[a] en un pañuelo[b].”'
  to: 'Y el otro vino, diciendo: “Señor, aquí está tu mina, que yo tenía guardada en un paño[a].”'
  rationale: Se revisa «había guardado» a «tenía guardada» para reflejar mejor el aspecto durativo de ἣν εἶχον ἀποκειμένην, y «pañuelo» a «paño» para seguir la elección principal documentada por el POB para σουδάριον, manteniendo «pañuelo» como alternativa en nota. Se elimina la nota aspectual porque el texto revisado ya expresa adecuadamente el matiz griego y así se evita sobrecargar el versículo.
