translation:
  language: es
  text: 'Y el otro vino, diciendo: “Señor, aquí está tu mina, que yo tenía guardada en un paño[a].”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un pañuelo». El griego σουδάριον se refiere a un paño, a menudo usado como tela para la cara o pañuelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἕτερος
  english_pob_choice: the other
  chosen_spanish: el otro
  alternatives_spanish:
  - otro
  - el otro hombre
  lexicon: BDAG
  rationale: ἕτερος señala a uno distinto de los anteriores; «el otro» conserva bien el contraste narrativo sin añadir matices innecesarios.
- source_word: ἦλθεν λέγων
  english_pob_choice: came, saying
  chosen_spanish: vino, diciendo
  alternatives_spanish:
  - vino y dijo
  - llegó, diciendo
  lexicon: BDAG
  rationale: La construcción participial se vierte de modo natural en español con «vino, diciendo», manteniendo la secuencia narrativa y la introducción del discurso.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se sigue el valor de κύριος como fórmula de tratamiento reverente. En español, «Señor» es la equivalencia más directa y mantiene la decisión doctrinal del POB en el término principal.
- source_word: ἰδοὺ
  english_pob_choice: look, here is
  chosen_spanish: aquí está
  alternatives_spanish:
  - mira, aquí está
  - he aquí
  lexicon: BDAG
  rationale: ἰδού funciona como deíctico de atención; «aquí está» comunica con naturalidad la presentación del objeto en español, sin el tono arcaizante de «he aquí».
- source_word: ἡ μνᾶ σου
  english_pob_choice: your mina
  chosen_spanish: tu mina
  alternatives_spanish:
  - tu moneda mina
  - tu libra
  lexicon: BDAG
  rationale: μνᾶ se translitera como «mina» para conservar el término monetario antiguo sin sustituirlo por una equivalencia moderna engañosa.
- source_word: ἣν εἶχον ἀποκειμένην
  english_pob_choice: which I kept laid away
  chosen_spanish: que yo había guardado
  alternatives_spanish:
  - que yo había puesto aparte
  - que yo tenía guardada
  lexicon: BDAG
  rationale: 'El imperfecto con participio expresa una अवस्था/estado continuado: la mina permanecía apartada. «Había guardado» transmite de forma fluida ese estado conservado; el matiz de permanencia se preserva en la nota sobre el lugar donde estaba depositada.'
- source_word: ἐν σουδαρίῳ
  english_pob_choice: in a cloth
  chosen_spanish: en un pañuelo[a]
  alternatives_spanish:
  - en un paño
  - en un lienzo
  lexicon: BDAG
  rationale: σουδάριον designa un paño pequeño usado para el sudor o la cara, a menudo equivalente a un pañuelo. Se conserva una nota porque el español puede oscilar entre «pañuelo» y «paño», y la elección depende del grado de especificidad que se quiera dar.
theological_decisions:
- issue: Tratamiento de κύριος en la parábola
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Aunque el referente narrativo es el amo de la parábola, se mantiene «Señor» conforme a la regla del proyecto para κύριος. Esto preserva la consistencia terminológica y deja abierta la resonancia del título sin forzar una lectura cristológica explícita.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Valor aspectual de εἶχον ἀποκειμένην
  english_pob_reading: which I kept laid away
  chosen_spanish_reading: que yo había guardado
  alternative_spanish_readings:
  - que yo tenía guardada
  - que yo había puesto aparte
  rationale: La expresión griega resalta un estado mantenido, no solo una acción puntual pasada. El español elegido evita borrar ese aspecto al presentar la mina como algo ya conservado desde antes.
  doctrine_reference: 'Gramática verbal griega: imperfecto perifrástico/estado resultante con participio'
translation_notes:
  revision_awareness: 'Se revisó la relación entre el inglés POB y el griego: se conservó el contraste de ὁ ἕτερος, la introducción narrativa ἦλθεν λέγων, el tratamiento reverente κύριε y la imagen concreta de σουδάριον. Se ajustó el español para mantener naturalidad sin perder el valor aspectual de ἣν εἶχον ἀποκειμένην ni la ambigüedad lexical de σουδάριον.'
  spanish_consistency_notes:
  - Se usa «mina» como transliteración consistente del término monetario antiguo.
  - «Señor» mantiene la terminología POB para κύριος en trato directo.
  - Se evita «he aquí» por registro más arcaico; «aquí está» preserva la función deíctica.
  - La nota sobre «pañuelo» queda anclada para reflejar la alternativa lexical documentada.
