- from: Y apresurándose, bajó y lo recibió con alegría[a].
  to: Y se apresuró a bajar y lo recibió con alegría[a].
  rationale: Se reemplaza el gerundio «apresurándose» por la construcción finita «se apresuró a bajar» para reflejar de forma más natural en español la secuencia de σπεύσας + κατέβη sin perder el sentido de prontitud y descenso. Se mantiene «lo recibió con alegría» como traducción fiel y clara de ὑπεδέξατο ... χαίρων. La nota se normaliza para español más idiomático y coherente con la alternativa inglesa auditada.
