lexical_decisions:
- source_word: σπεύσας
  english_pob_choice: hurried
  chosen_spanish: apresurándose
  alternatives_spanish:
  - se apresuró
  - se dio prisa
  lexicon: BDAG
  rationale: El participio aoristo expresa prontitud y diligencia. En español, «apresurándose» mantiene el matiz de acción rápida y encaja bien con la coordinación narrativa del verso sin sonar forzado.
- source_word: κατέβη
  english_pob_choice: down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - vino abajo
  lexicon: BDAG
  rationale: El verbo indica movimiento hacia abajo. «Bajó» es la forma más natural y directa en español para conservar la dirección del movimiento sin redundancia innecesaria.
- source_word: ὑπεδέξατο
  english_pob_choice: welcomed
  chosen_spanish: lo recibió
  alternatives_spanish:
  - lo acogió
  - lo dio la bienvenida
  lexicon: BDAG
  rationale: El medio de ὑποδέχομαι puede significar recibir con hospitalidad. En español, «lo recibió» preserva el sentido básico y deja abierta la nota de hospitalidad que el contexto aporta; «acogió» sería posible, pero algo más interpretativo.
- source_word: χαίρων
  english_pob_choice: joyfully
  chosen_spanish: con alegría
  alternatives_spanish:
  - gozoso
  - alegremente
  - regocijándose
  lexicon: BDAG
  rationale: El participio presente funciona como expresión de manera. «Con alegría» mantiene el carácter afectivo de χαίρων en un español natural y público; evita un adverbio demasiado rígido o una forma más marcada como «regocijándose».
- source_word: καὶ ... καὶ
  english_pob_choice: And ... and
  chosen_spanish: Y ... y
  alternatives_spanish:
  - Entonces ... y
  lexicon: sintaxis narrativa
  rationale: Se conserva la coordinación simple del griego, reflejando el ritmo narrativo de Lucas sin sobreexplicar la relación entre acciones.
