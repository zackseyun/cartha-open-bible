    issue: «apresurándose» suena poco natural en esta secuencia narrativa.
    rationale: El participio aoristo σπεύσας expresa acción previa/inmediata; en español narrativo, un gerundio introductorio aquí puede sonar torpe o ambiguo. Una forma finita como «se apresuró a bajar» preserva mejor el sentido y la fluidez.
  - severity: low
    issue: La nota alternativa contiene una formulación algo rígida y puntuación innecesaria dentro del texto de nota.
    rationale: 'Puede simplificarse a una alternativa española más natural y paralela al audit trail inglés: «O: “Y se apresuró y bajó, y lo recibió con gozo”».'
