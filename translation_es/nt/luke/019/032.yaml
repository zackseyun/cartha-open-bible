translation:
  language: es
  text: Entonces los que fueron enviados fueron y encontraron[a] tal como les había dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Encontraron» puede leerse con objeto implícito por el contexto: el pollino mencionado antes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπελθόντες
  english_pob_choice: went away
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - partieron
  lexicon: BDAG
  rationale: El participio aoristo expresa la salida/partida de los enviados. En español, «fueron» mantiene la acción de desplazamiento con naturalidad; «se fueron» sería más enfático en la salida, y «partieron» más literario.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - y
  - entonces
  - pues
  lexicon: BDAG
  rationale: δέ funciona como transición narrativa. «Así que» comunica continuidad y consecuencia de manera natural en español, sin cargar el valor lógico más allá de lo que el contexto exige.
- source_word: οἱ ἀπεσταλμένοι
  english_pob_choice: those who were sent
  chosen_spanish: los que habían sido enviados
  alternatives_spanish:
  - los enviados
  - los que fueron enviados
  - los mandados
  lexicon: BDAG
  rationale: El participio pasivo sustantivado conserva la idea de haber sido enviados. «Los que habían sido enviados» preserva el pasivo y evita convertirlos de antemano en un título interpretativo como «mensajeros».
- source_word: εὗρον
  english_pob_choice: found it
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  - hallaronlo
  lexicon: BDAG
  rationale: El verbo significa «encontrar/hallar». Aquí el objeto está implícito por el contexto inmediato; en español puede omitirse sin pérdida. «Hallaron» conserva el valor verbal sin añadir un pronombre no presente en el texto.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: BDAG
  rationale: καθώς indica correspondencia precisa. «Tal como» transmite bien la exactitud de la correspondencia entre la instrucción de Jesús y lo encontrado.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: he had told them
  chosen_spanish: les había dicho
  alternatives_spanish:
  - les dijo
  - les había hablado
  lexicon: BDAG
  rationale: λέγω puede rendirse como «decir» o «hablar». «Les había dicho» expresa de forma natural la instrucción previa en relación con el hallazgo posterior, reflejando la relación temporal que el inglés POB explicitó con pasado pluscuamperfecto.
translation_notes:
  revision_awareness: El texto griego y el inglés auditado coinciden en una lectura narrativa simple sin variantes textuales relevantes. La decisión principal en español fue conservar la referencia implícita del objeto de εὗρον sin sobreexplicarla en el cuerpo del versículo, como hace el POB en inglés con su nota lexical.
  spanish_consistency_notes:
  - Se mantuvo «los que habían sido enviados» para preservar el pasivo y la estructura substantival del participio.
  - Se evitó «SEÑOR» y «Cristo» porque no aparecen en este versículo.
  - La nota al pie marca la omisión del objeto explícito en «hallaron», siguiendo la economía del griego y la alternativa lexical documentada en inglés.
