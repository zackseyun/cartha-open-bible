revisions:
- from: Así que los que habían sido enviados fueron y hallaron[a] tal como les había dicho.
  to: Entonces los que fueron enviados fueron y encontraron[a] tal como les había dicho.
  rationale: Se ajusta el conector para reflejar mejor la función narrativa de δέ y se aligera la frase pasiva sustantivada para un español más natural. Se mantiene la omisión del objeto en el texto principal, con nota que explica el referente contextual, en consonancia con la evidencia griega y el rastro de auditoría inglés.
  reviewer_model: gpt-5.4
