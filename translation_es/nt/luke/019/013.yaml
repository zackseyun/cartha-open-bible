review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del participio aoristo («Después de llamar»), la fuerza posesiva de ἑαυτοῦ («sus propios»), la unidad monetaria histórica («minas») y el sentido temporal idiomático de ἐν ᾧ ἔρχομαι («hasta que yo venga»). También sigue correctamente la decisión del POB de traducir δοῦλος como «esclavos» en este contexto parabólico. Sin embargo, el anclaje y contenido de las notas no siguen fielmente el rastro auditado en inglés: la nota de alternativa léxica para Πραγματεύσασθε fue colocada en «les dijo» en vez de en el imperativo; además se añadió una nota extra para «hasta que regrese» que no corresponde a una ambigüedad nueva necesaria en español.'
  spanish_quality_summary: El español es natural y claro. No obstante, «Hagan negocios» puede sonar algo moderno/coloquial en ciertos registros bíblicos; «Negocien» o «Hagan comercio» serían opciones posibles, pero «Hagan negocios» sigue siendo aceptable y fiel al sentido amplio. El problema principal es de aparato de notas y anclaje, no de legibilidad principal.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: δοῦλος -> «esclavos», μνᾶς -> «minas», y no hay conflictos con términos teológicos mayores. La decisión de mantener «esclavos» está bien justificada en línea con la política del POB.'
  issues:
  - severity: medium
    issue: La nota léxica para Πραγματεύσασθε está anclada en «les dijo» en lugar del mandato comercial.
    rationale: La nota inglesa c explica alternativas de «Do business», no de «said to them». En español, el marcador debe ir sobre «Hagan negocios» para preservar la trazabilidad de la decisión léxica.
  - severity: medium
    issue: Se añadió una nota d («O “hasta que regrese”») innecesaria.
    rationale: El POB inglés no conserva esa alternativa como nota, y en español «hasta que yo venga» no crea una ambigüedad nueva que exija nota adicional. Mantenerla sobrecarga el aparato y rompe la correspondencia auditada.
  - severity: low
    issue: La nota a usa «sirvientes» como alternativa a δοῦλος.
    rationale: No es incorrecto, pero «servidores» no aparece y «sirvientes» puede sonar más doméstico. Aun así, como el inglés trae “servants” y “bondservants”, una adaptación como «siervos» o «siervos por obligación» sería más cercana; sin embargo, basta con una reparación mínima manteniendo una nota natural en español.
  revised_spanish_text: 'Después de llamar a diez de sus propios esclavos[a], les dio diez minas[b] y les dijo: «Hagan negocios[c] hasta que yo venga».'
  revised_footnotes:
