translation:
  language: es
  text: 'Después de llamar a diez de sus propios esclavos[a], les dio diez minas[b] y les dijo: «Hagan negocios[c] hasta que yo venga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos» o «siervos por obligación». El griego δοῦλος puede denotar un siervo o un esclavo según el contexto.
    reason: alternative_reading
  - marker: b
    text: Una mina era una antigua unidad monetaria.
    reason: cultural_note
  - marker: c
    text: O «Hagan comercio» o «Negocien hasta que yo venga».
    reason: lexical_alternative
lexical_decisions:
- source_word: καλέσας
  english_pob_choice: After calling
  chosen_spanish: Después de llamar
  alternatives_spanish:
  - habiendo llamado
  - cuando llamó
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal; en español, «Después de llamar» expresa con naturalidad la secuencia temporal y conserva la relación participial sin sobretraducción.
- source_word: δούλους
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - sirvientes
  - siervos esclavos
  lexicon: BDAG
  rationale: El griego δοῦλος denota aquí una relación de pertenencia y dependencia bajo un amo; en el marco de la parábola, «esclavos» preserva esa fuerza social y evita suavizar el término.
- source_word: ἑαυτοῦ
  english_pob_choice: his own
  chosen_spanish: sus propios
  alternatives_spanish:
  - suyos
  - de él
  lexicon: BDAG
  rationale: El reflexivo añade énfasis de posesión/relación. «Sus propios» reproduce ese matiz de pertenencia de manera idiomática en español.
- source_word: μνᾶς
  english_pob_choice: minas
  chosen_spanish: minas
  alternatives_spanish:
  - pounds
  - minas (unidad monetaria)
  lexicon: BDAG
  rationale: La μνᾶ es una unidad monetaria antigua; transliterarla como «minas» mantiene la especificidad histórica y evita equivalencias modernas engañosas.
- source_word: Πραγματεύσασθε
  english_pob_choice: Do business
  chosen_spanish: Hagan negocios
  alternatives_spanish:
  - Hagan comercio
  - Negocien
  - Trabajen con ello
  lexicon: BDAG
  rationale: El imperativo pide actividad económica con lo confiado. «Hagan negocios» es natural en español y suficientemente amplio para incluir comerciar, invertir o administrar con fines lucrativos sin restringir indebidamente el alcance.
- source_word: ἐν ᾧ ἔρχομαι
  english_pob_choice: until I come
  chosen_spanish: hasta que yo venga
  alternatives_spanish:
  - mientras yo venga
  - hasta mi regreso
  lexicon: BDAG
  rationale: La expresión idiomática significa temporalmente ‘hasta que venga/retorne’. En español, «hasta que yo venga» comunica esa temporalidad con fidelidad y sin calco.
theological_decisions:
- issue: Renderización de δοῦλος en contexto parabólico de amo-esclavo
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - sirvientes
  - criados
  rationale: La escena presenta a personas pertenecientes a un amo y encargadas de sus recursos. «Esclavos» conserva la realidad social del texto y evita una atenuación que perdería la tensión lexical documentada.
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos para δοῦλος; filosofía de traducción §1'
- issue: Alcance de la orden πραγµατεύσασθε
  english_pob_reading: Do business / Trade / Engage in business
  chosen_spanish_reading: Hagan negocios
  alternative_spanish_readings:
  - Comercien
  - Negocien
  - Ocúpense en negocios
  rationale: El mandato exige una actividad productiva con el capital recibido. «Hagan negocios» conserva el impulso comercial amplio del griego sin añadir una técnica específica no indicada por el texto.
  doctrine_reference: BDAG sobre πραγματεύομαι; decisión léxica del POB inglés
translation_notes:
  revision_awareness: La versión inglesa más reciente quedó sin cambios tras revisión de alta concordancia; por ello se mantiene la solución léxica base de la POB y se traslada con cuidado al español sin introducir ajustes interpretativos nuevos.
  spanish_consistency_notes:
  - Se mantiene «esclavos» para δοῦλος conforme a la política contextual del POB cuando el marco es de amo y posesión.
  - Se mantiene «minas» como transliteración monetaria histórica, no como equivalente moderno.
  - Se conserva «hasta que yo venga» para la idiomática temporal griega, evitando un calco de «en lo cual».
  - Se usa «Hagan negocios» por su amplitud semántica y naturalidad en español, equivalente al registro óptimo del POB inglés.
