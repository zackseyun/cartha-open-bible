translation:
  language: es
  text: Y he aquí[a] un hombre de nombre Zaqueo; era jefe de los recaudadores de impuestos y era rico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘llamado Zaqueo’. El giro griego incluye literalmente la idea de ‘llamado’, pero en español ‘de nombre Zaqueo’ es una equivalencia más natural en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - mira bien
  lexicon: BDAG
  rationale: Conservo el marcador discursivo de atención de Lucas con una fórmula natural y reverente en español. 'He aquí' mantiene la vividez y la función de señalamiento sin omitir el valor retórico del griego.
- source_word: ἀνὴρ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un varón
  lexicon: BDAG
  rationale: El término griego es masculino singular y se refiere a un individuo varón; 'un hombre' es la correspondencia directa y natural en español.
- source_word: ὀνόματι καλούμενος
  english_pob_choice: named
  chosen_spanish: llamado
  alternatives_spanish:
  - nombrado
  - de nombre
  lexicon: BDAG
  rationale: El giro idiomático significa 'llamado' o 'nombrado'. 'Llamado' conserva el contenido literal de καλούμενος y funciona de manera natural en español, sin forzar una paráfrasis excesiva.
- source_word: Ζακχαῖος
  english_pob_choice: Zacchaeus
  chosen_spanish: Zaqueo
  alternatives_spanish:
  - Zacaqueo
  lexicon: standard transliteration
  rationale: Se usa la transliteración bíblica establecida en español, 'Zaqueo', para un nombre propio reconocido y readable en el ámbito eclesial hispanohablante.
- source_word: αὐτὸς ἦν
  english_pob_choice: he was
  chosen_spanish: él era
  alternatives_spanish:
  - era
  - él fue
  lexicon: BDAG
  rationale: El pronombre intensivo se comunica de forma natural con 'él era'. Mantiene la reanudación del sujeto y evita una redundancia extraña en español.
- source_word: ἀρχιτελώνης
  english_pob_choice: chief tax collector
  chosen_spanish: jefe de los recaudadores de impuestos
  alternatives_spanish:
  - principal recaudador de impuestos
  - superintendente de los recaudadores de impuestos
  lexicon: BDAG
  rationale: '''ἀρχι-'' expresa liderazgo o rango superior. En español, ''jefe de los recaudadores de impuestos'' preserva la jerarquía con claridad. ''Recaudadores de impuestos'' evita el término administrativo moderno ''tributarios'' y traduce con precisión la función fiscal.'
- source_word: αὐτὸς πλούσιος
  english_pob_choice: was rich
  chosen_spanish: era rico
  alternatives_spanish:
  - era adinerado
  - era muy rico
  lexicon: BDAG
  rationale: '''πλούσιος'' se traduce de modo directo como ''rico''. El segundo αὐτός añade énfasis leve, pero en español no requiere reproducirse con una perífrasis reflexiva que sonaría pesada.'
translation_notes:
  revision_awareness: La base inglesa revisada eliminó 'was there' por no estar en el griego y conservó dos predicados separados ('was a chief tax collector and was rich'). El español sigue esa estructura con 'era jefe...' y 'era rico', sin añadir elementos no atestiguados.
  spanish_consistency_notes:
  - Se conserva 'Y he aquí' para reflejar ἰδοὺ como marcador narrativo.
  - Se traduce ἀρχιτελώνης con una expresión jerárquica clara y no con una forma eclesiástica o técnica ajena al contexto.
  - No se sobrecarga el doble αὐτός; su énfasis queda suavizado de manera natural en español.
  - 'El nombre propio sigue la forma bíblica habitual en español: Zaqueo.'
