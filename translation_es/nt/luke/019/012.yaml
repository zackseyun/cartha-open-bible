translation:
  language: es
  text: 'Entonces dijo: «Cierto noble fue a un país lejano para recibir un reino[a] para sí mismo y volver».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reinado» o «poder real». El griego βασιλείαν puede referirse al reino mismo o al ejercicio de la autoridad real.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: Marca continuidad narrativa e inferencial. «Entonces» preserva la transición sin añadir una relación causal más fuerte de la que el griego exige en este contexto.
- source_word: Ἄνθρωπός τις εὐγενὴς
  english_pob_choice: A certain nobleman
  chosen_spanish: Un cierto noble
  alternatives_spanish:
  - Un noble
  - Un hombre noble
  lexicon: BDAG
  rationale: Ἄνθρωπός τις introduce un referente indefinido; εὐγενής indica alta condición social. En español, «un cierto noble» conserva la indefinición y el rango sin forzar la expresión idiomática inglesa «nobleman».
- source_word: ἐπορεύθη
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - marchó
  - viajó
  lexicon: BDAG
  rationale: El aoristo deponente expresa desplazamiento simple. «Fue» es natural en español y mantiene la sobriedad narrativa del verbo griego.
- source_word: εἰς χώραν μακρὰν
  english_pob_choice: to a distant country
  chosen_spanish: a un país lejano
  alternatives_spanish:
  - a una tierra distante
  - a una región lejana
  lexicon: BDAG
  rationale: χώρα puede ser país, región o territorio. «País lejano» es claro en español y conserva la idea de lejanía geográfica sin añadir matices no presentes.
- source_word: λαβεῖν
  english_pob_choice: to receive
  chosen_spanish: recibir
  alternatives_spanish:
  - obtener
  - tomar
  lexicon: BDAG
  rationale: En este contexto político, el verbo apunta a recibir una investidura o autoridad, no a arrebatarla. «Recibir» sigue de cerca el valor del infinitivo y evita un sesgo interpretativo adicional.
- source_word: ἑαυτῷ
  english_pob_choice: for himself
  chosen_spanish: para sí mismo
  alternatives_spanish:
  - para él mismo
  - en favor propio
  lexicon: BDAG
  rationale: El dativo reflexivo indica beneficio o posesión personal. «Para sí mismo» es la equivalencia más natural y precisa en español.
- source_word: βασιλείαν
  english_pob_choice: a kingdom
  chosen_spanish: un reino[a]
  alternatives_spanish:
  - reinado
  - poder real
  lexicon: BDAG
  rationale: βασιλεία puede significar reino, realeza o autoridad real. «Reino» reproduce la lectura principal del POB en inglés y funciona bien en español; la nota preserva la alternativa semántica importante para la interpretación.
- source_word: ὑποστρέψαι
  english_pob_choice: return
  chosen_spanish: volver
  alternatives_spanish:
  - regresar
  - volver de nuevo
  lexicon: BDAG
  rationale: El infinitivo coordinado expresa la acción posterior de regresar. «Volver» es breve, natural y suficientemente formal para el registro narrativo.
theological_decisions:
- issue: Alcance semántico de βασιλείαν en una parábola con trasfondo político-real
  english_pob_reading: a kingdom
  chosen_spanish_reading: un reino
  alternative_spanish_readings:
  - reinado
  - poder real
  rationale: El griego puede referirse al territorio-reino o al ejercicio de la realeza/autoridad. Mantener «un reino» conserva la formulación principal del POB y la imagen narrativa más inmediata, mientras la nota deja visible la tensión semántica sin resolverla indebidamente.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La redacción sigue el pasaje revisado del POB en inglés, evitando añadir conectores temporales no explícitos en el griego y manteniendo la coordinación simple entre «recibir» y «volver».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «reino» como traducción principal de βασιλείαν, con nota de alternativa para preservar la tensión semántica documentada.
  - El tono es bíblico-moderado y apto para lectura pública, sin depender de formulaciones tradicionales que oculten matices del original.
