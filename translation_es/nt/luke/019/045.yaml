translation:
  language: es
  text: Y entrando en el templo[a], comenzó a echar fuera a los que vendían,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el recinto del templo» o «los atrios del templo»; el griego ἱερόν se refiere al complejo del templo, no específicamente al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθὼν
  english_pob_choice: entering
  chosen_spanish: Y entrando
  alternatives_spanish:
  - Y después de entrar
  - Y al entrar
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, «entrando» mantiene la secuencia narrativa sin añadir una relación temporal más específica que la del griego.
- source_word: ἱερὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - los atrios del templo
  - el recinto del templo
  - el santuario
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo, no el santuario interior. «Templo» es natural y fiel; la nota conserva la posibilidad más precisa de «recinto/atrios» sin estrechar indebidamente el espacio.
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: BDAG
  rationale: El valor ingresivo de ἄρχομαι con infinitivo se expresa bien con «comenzó», preservando que la acción se inicia en este punto del relato.
- source_word: ἐκβάλλειν
  english_pob_choice: to drive out
  chosen_spanish: a echar fuera
  alternatives_spanish:
  - a expulsar
  - a sacar
  lexicon: BDAG
  rationale: ἐκβάλλω es enérgico. «Echar fuera» comunica el gesto de remover con fuerza en un español claro y natural; «expulsar» sería más formal pero menos inmediato.
- source_word: πωλοῦντας
  english_pob_choice: those who were selling
  chosen_spanish: a los que vendían
  alternatives_spanish:
  - a los vendedores
  - a los que estaban vendiendo
  lexicon: BDAG
  rationale: El participio presente describe a las personas que estaban en la actividad de vender. «Los que vendían» mantiene el sentido sin especificar el objeto de la venta, que el versículo no dice.
theological_decisions:
- issue: Alcance espacial de ἱερόν
  english_pob_reading: Rendered as 'temple' in the main text, understood as the broader temple precincts rather than the inner sanctuary.
  chosen_spanish_reading: «templo» en el texto principal, entendido como el complejo o recinto del templo, no como el santuario interior.
  alternative_spanish_readings:
  - los atrios del templo
  - el recinto del templo
  - el santuario
  rationale: La elección evita importar la idea del santuario interior, que correspondería más a ναός. La nota preserva la precisión espacial sin perder legibilidad.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del audit trail inglés: se conserva el participio simple «entrando» en vez de una equivalencia temporal más amplia, y se mantiene la misma estructura narrativa breve del original griego.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y «Cristo» porque este versículo no contiene esos términos.
  - «Templo» se usa como equivalente principal de ἱερόν, con nota para el matiz del complejo/recinto.
  - La construcción «a echar fuera» refleja el infinitivo de propósito/comienzo sin sobrerrepresentar la fuerza del verbo.
  - No se añadió el objeto de la venta, porque el griego tampoco lo especifica en este versículo.
