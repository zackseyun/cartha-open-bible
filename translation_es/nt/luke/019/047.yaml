translation:
  language: es
  text: Y él enseñaba cada día en el templo. Pero los principales sacerdotes y los escribas, y los hombres prominentes del pueblo[a], buscaban destruirlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los líderes del pueblo». La frase griega dice literalmente «los primeros del pueblo», refiriéndose a personas prominentes o influyentes entre la población.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν διδάσκων
  english_pob_choice: he was teaching
  chosen_spanish: enseñaba
  alternatives_spanish:
  - estaba enseñando
  - enseñaba continuamente
  lexicon: BDAG
  rationale: El imperfecto perifrástico griego expresa acción en curso o reiterada en pasado. En español, el imperfecto simple «enseñaba» comunica bien esa duración sin volver la frase pesada.
- source_word: τὸ καθ’ ἡμέραν
  english_pob_choice: day by day
  chosen_spanish: cada día
  alternatives_spanish:
  - día tras día
  - diariamente
  lexicon: BDAG
  rationale: La expresión es distributiva e idiomática. «Cada día» es natural en español y preserva la idea de repetición cotidiana.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el recinto del templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo del templo, no al santuario interior. «En el templo» es conciso y fiel; el contexto no exige mayor precisión.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: Se conserva el plural colectivo y el matiz de liderazgo sacerdotal. «Principales sacerdotes» sigue de cerca el valor del grupo sin imponer una fórmula litúrgica fija.
- source_word: οἱ γραμματεῖς
  english_pob_choice: the scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los maestros de la ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente directo y tradicional para γραμματεῖς. La alternativa es más interpretativa y menos inmediata.
- source_word: ἐζήτουν
  english_pob_choice: were seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - trataban de
  - andaban buscando
  lexicon: BDAG
  rationale: El imperfecto indica una acción sostenida. «Buscaban» reproduce bien la intención continua de intentar lograr algo.
- source_word: ἀπολέσαι
  english_pob_choice: to destroy him
  chosen_spanish: destruirlo
  alternatives_spanish:
  - matarlo
  - quitarlo de en medio
  lexicon: BDAG
  rationale: ἀπόλλυμι puede significar destruir o matar según el contexto. Dado el lenguaje de hostilidad aquí, «destruirlo» mantiene la amplitud del griego sin especificar más de lo que el texto exige.
- source_word: οἱ πρῶτοι τοῦ λαοῦ
  english_pob_choice: the leading men of the people
  chosen_spanish: los principales hombres del pueblo
  alternatives_spanish:
  - los líderes del pueblo
  - los hombres prominentes del pueblo
  lexicon: BDAG
  rationale: πρῶτοι literalmente significa «primeros», aquí en sentido de personas prominentes o influyentes. «Principales hombres» conserva el plural masculino y el matiz de notables, de acuerdo con la lectura documentada del POB en inglés.
theological_decisions:
- issue: Referencia masculina de οἱ πρῶτοι τοῦ λαοῦ
  english_pob_reading: the leading men of the people
  chosen_spanish_reading: los principales hombres del pueblo
  alternative_spanish_readings:
  - los líderes del pueblo
  rationale: Se mantiene la referencia masculina plural porque el griego usa οἱ πρῶτοι y el contexto histórico apunta a notables varones. No se neutraliza la forma para no perder la señal gramatical y social del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el audit trail inglés y no requiere revisiones sustantivas. La principal decisión traductológica es mantener el valor durativo del imperfecto y el matiz de prominencia de οἱ πρῶτοι τοῦ λαοῦ sin neutralizar el masculino plural.
  spanish_consistency_notes:
  - Se usa «templo» para ἱερόν en sentido de complejo del templo, coherente con el patrón POB.
  - Se conserva «escribas» como término técnico estable.
  - «Destruirlo» mantiene la ambigüedad semántica de ἀπολέσαι entre destruir y matar.
  - «Principales hombres del pueblo» armoniza con la lectura auditada del inglés y con el género gramatical del griego.
