    issue: «los principales hombres del pueblo» es poco idiomático
    rationale: Aunque intenta reflejar literalmente el masculino plural y el rango social, en español suena calcado. «los hombres prominentes del pueblo» conserva la referencia masculina y expresa mejor el sentido de notables o influyentes.
  - severity: low
    issue: Inicio con «Y enseñaba» puede sentirse algo abrupto
    rationale: El griego tiene Καὶ ἦν διδάσκων. En español, «Y él enseñaba» o simplemente «Enseñaba» son opciones más fluidas. Dado que la coordinación narrativa se mantiene bien, el cambio es estilístico menor.
  revised_spanish_text: Y él enseñaba cada día en el templo. Pero los principales sacerdotes y los escribas, y los hombres prominentes del pueblo[a], buscaban destruirlo.
