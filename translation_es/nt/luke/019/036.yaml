review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: un genitivo absoluto temporal/contemporáneo (''mientras iba'') seguido del imperfecto durativo (''iban tendiendo'') y la ubicación de los mantos en la vía. Sin embargo, la nota [a] no preserva la alternativa léxica documentada para ἱμάτια, sino que comenta de nuevo πορευομένου. Además, ''sobre el camino'' es posible, pero ''en el camino'' o ''por el camino'' suele sonar más natural; aquí conviene mantener la imagen de colocar prendas en la calzada sin añadir una preposición algo pesada.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse. 'Y mientras él iba' funciona, aunque el pronombre 'él' no es necesario en español. 'Iban tendiendo' es aceptable para el imperfecto progresivo. 'Mantos' es buena opción para ἱμάτια en este contexto. La principal reparación necesaria es mover la nota al sustantivo correcto y hacer que la nota trate las alternativas de 'mantos', no de 'iba'.
  glossary_alignment: No hay términos teológicos sensibles aquí. La elección 'mantos' concuerda con la rationale inglesa para ἱμάτια como prendas exteriores/cloaks. No hay conflicto con la terminología base del proyecto.
  issues:
  - severity: medium
    issue: La nota [a] está anclada y explicada en la frase equivocada.
    rationale: La nota inglesa documenta alternativas léxicas para ἱμάτια ('garments', 'outer garments'), no para πορευομένου. En español, la nota debe ir con 'mantos' y ofrecer alternativas como 'ropas' o 'prendas exteriores'.
  - severity: low
    issue: El pronombre explícito 'él' es innecesario.
    rationale: En español natural, 'mientras iba' basta salvo que se necesite contraste enfático, que aquí no existe.
  - severity: low
    issue: '''Sobre el camino'' es comprensible, pero algo menos natural que otras opciones.'
    rationale: Para el acto de extender prendas en la vía, 'en el camino' suena más idiomático en español y sigue siendo fiel al valor locativo de ἐν τῇ ὁδῷ.
  revised_spanish_text: Y mientras iba, ellos iban tendiendo sus mantos[a] en el camino.
  revised_footnotes:
  - marker: a
    text: O «sus ropas» o «sus prendas exteriores».
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura temporal y el aspecto progresivo del original, pero se corrige la nota para que documente la alternativa léxica de ἱμάτια, como en el rastro de auditoría inglés. También se mejora la naturalidad del español al omitir 'él' y usar 'en el camino', que mantiene el sentido locativo sin sonar forzado.
