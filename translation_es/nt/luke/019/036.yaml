revisions:
- from: Y mientras él iba[a], ellos iban tendiendo sus mantos sobre el camino.
  to: Y mientras iba, ellos iban tendiendo sus mantos[a] en el camino.
  rationale: Se conserva la estructura temporal y el aspecto progresivo del original, pero se corrige la nota para que documente la alternativa léxica de ἱμάτια, como en el rastro de auditoría inglés. También se mejora la naturalidad del español al omitir 'él' y usar 'en el camino', que mantiene el sentido locativo sin sonar forzado.
