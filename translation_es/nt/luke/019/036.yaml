translation:
  language: es
  text: Y mientras iba, ellos iban tendiendo sus mantos[a] en el camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ropas» o «sus prendas exteriores».
    reason: lexical_alternative
lexical_decisions:
- source_word: πορευομένου δὲ αὐτοῦ
  english_pob_choice: as he went
  chosen_spanish: Y mientras él iba[a]
  alternatives_spanish:
  - Y cuando él iba
  - Y mientras caminaba
  - Y al ir él
  lexicon: BDAG
  rationale: El genitivo absoluto con participio presente indica acción simultánea. En español, «mientras él iba» comunica esa simultaneidad de forma natural y sin rigidez; se añade «Y» para mantener la función narrativa leve de δέ.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ enlaza la escena con avance narrativo, no con contraste fuerte. «Y» preserva esa continuidad de modo fluido en español.
- source_word: ὑπεστρώννυον
  english_pob_choice: were spreading
  chosen_spanish: iban tendiendo
  alternatives_spanish:
  - tendían
  - iban poniendo
  - iban extendiendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida en la escena. «Iban tendiendo» reproduce bien ese valor durativo en español y se ajusta al gesto de colocar algo sobre el suelo.
- source_word: τὰ ἱμάτια ἑαυτῶν
  english_pob_choice: their cloaks
  chosen_spanish: sus mantos
  alternatives_spanish:
  - sus vestidos
  - sus ropas
  - sus prendas exteriores
  lexicon: BDAG
  rationale: ἱμάτια puede designar ropa en general, pero en este contexto procesional se refiere de manera concreta a prendas externas que pueden ponerse en el camino. «Mantos» es una opción natural y reverente en español; conserva la concreción sin quedar demasiado técnica.
- source_word: ἐν τῇ ὁδῷ
  english_pob_choice: on the road
  chosen_spanish: sobre el camino
  alternatives_spanish:
  - en el camino
  - a lo largo del camino
  - sobre la vía
  lexicon: BDAG
  rationale: La preposición con dativo marca ubicación. «Sobre el camino» expresa con claridad que los mantos se colocaban encima de la superficie por donde Jesús pasaba, evitando la posible ambigüedad de «en el camino» en español.
translation_notes:
  revision_awareness: 'El inglés POB mantiene el aspecto progresivo con «were spreading» y traduce ἱμάτια como «cloaks». La versión española conserva ambos valores: progresividad con «iban tendiendo» y una prenda concreta con «mantos», sin introducir interpretaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se mantiene el tono narrativo simple y directo.
  - «Camino» traduce ὁδός de forma literal y natural en este contexto.
  - No se usa una equivalencia eclesiástica fija donde el griego no la exige.
