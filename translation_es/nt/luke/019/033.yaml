translation:
  language: es
  text: 'Y mientras ellos desataban el pollino, sus dueños[a] les dijeron: «¿Por qué están desatando el pollino?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus amos». La palabra griega es el plural de «señor/amo» (κύριος), pero aquí se refiere a los propietarios humanos del pollino.
    reason: lexical_alternative
lexical_decisions:
- source_word: λυόντων
  english_pob_choice: as they were untying
  chosen_spanish: mientras ellos desataban
  alternatives_spanish:
  - mientras lo desataban
  - así como lo desataban
  lexicon: BDAG
  rationale: El participio presente en genitivo absoluto expresa acción simultánea con el verbo principal. «Mientras ellos desataban» conserva esa simultaneidad en español natural. Se evita «soltando» porque no refleja con precisión la repetición léxica con λύετε y puede perder el matiz concreto de liberar al animal.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector narrativo suave. «Y» mantiene el avance del relato sin introducir contraste que el griego no exige.
- source_word: πῶλον
  english_pob_choice: colt
  chosen_spanish: pollino
  alternatives_spanish:
  - potrillo
  - cría de asno
  lexicon: BDAG
  rationale: En este contexto el animal es el asno del relato previo; «pollino» comunica en español bíblico y actual la idea de animal joven sin añadir especificación innecesaria. «Potrillo» puede sonar más general equino; «cría de asno» es más explicativo de lo que el texto exige.
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - preguntaron
  lexicon: BDAG
  rationale: λέγω se vierte de manera directa como «decir»/«dijeron». Aunque el contenido es interrogativo, el verbo griego sigue siendo de habla, no de pregunta en sentido léxico principal.
- source_word: οἱ κύριοι αὐτοῦ
  english_pob_choice: its owners
  chosen_spanish: sus dueños
  alternatives_spanish:
  - sus amos
  - sus señores
  lexicon: BDAG
  rationale: κύριος aquí se refiere a propietarios humanos del animal, no a un título teológico. «Dueños» reproduce con naturalidad esa relación de posesión. «Amos» puede sonar más duro o esclavista; «señores» sería engañoso en español por su resonancia honorífica.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: La preposición πρός con acusativo en discurso se expresa de forma idiomática en español con dativo de destinatario. «Les dijeron» evita una redundancia innecesaria y conserva la relación de habla.
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué?
  - ¿Qué razón hay para...?
  lexicon: BDAG
  rationale: En esta pregunta idiomática, τί expresa motivo o causa. «¿Por qué?» capta mejor la fuerza natural de la pregunta que una traducción literal «¿Qué?».
- source_word: λύετε
  english_pob_choice: are you untying
  chosen_spanish: desatan
  alternatives_spanish:
  - están desatando
  - sueltan
  lexicon: BDAG
  rationale: Se mantiene el mismo verbo español que en «desataban» para conservar la correspondencia verbal con λυόντων. En la cita directa, el presente funciona de modo interrogativo; en español, el presente simple es natural en preguntas directas y evita una perífrasis menos compacta.
theological_decisions:
- issue: κύριοι como término de propiedad humana, no como título religioso
  english_pob_reading: owners
  chosen_spanish_reading: sus dueños
  alternative_spanish_readings:
  - sus amos
  - sus señores
  rationale: El contexto inmediato muestra que los κύριοι del pollino son quienes lo poseen. Traducirlo como «dueños» evita crear una resonancia cristológica o honorífica inexistente en el pasaje y preserva la tensión léxica entre κύριος como título teológico en otros contextos y como simple propietario aquí.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Spanish project terminology for contextual κύριος'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y coincide con el sentido auditado del inglés POB: la acción simultánea de desatar, la pregunta por la causa y el uso no teológico de κύριος. No se requieren notas textuales ni alternativas adicionales porque el español puede expresar con naturalidad los mismos matices sin perder audibilidad del original.'
  spanish_consistency_notes:
  - Se conserva «desatar» para reflejar el enlace léxico con λύω en ambos lugares del versículo.
  - Se usa «pollino» de manera coherente con el contexto narrativo del asno joven.
  - Se evita «Señor» para κύριος, ya que aquí el referente es propietario humano y no un título divino.
