review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: genitivo absoluto contemporáneo («mientras ... desataban»), referencia al πῶλος como «pollino», y κύριοι en sentido no teológico como propietarios humanos («dueños»). También preserva bien la repetición verbal de λύω/λύετε con «desataban/desatan». Sin embargo, la cita directa en español usa segunda persona plural («desatan») cuando los hablantes se dirigen a «ellos»; en español natural y fiel al discurso directo debe ser «desatan ustedes» de manera implícita, es decir, «desatan» solo funciona en voseo peninsular/no latinoamericano. Para neutral latinoamericano e inteligibilidad eclesial amplia, debe ser «están desatando» o «desatan ustedes»; la primera es más natural. Además, el borrador omite la alternativa léxica documentada para κύριοι (''masters''), que conviene conservar en nota como en el rastro POB inglés.'
  spanish_quality_summary: 'El texto es claro y legible, y «pollino» encaja bien en registro bíblico moderno. «Sus dueños» es natural. La principal falla de calidad es morfosintáctica y dialectal: «¿Por qué desatan el pollino?» suena a tratamiento de vosotros, no a español neutro latinoamericano. «¿Por qué están desatando el pollino?» resuelve esto con naturalidad. También puede simplificarse «mientras ellos desataban» a «mientras desataban», pero no es necesario; mantener «ellos» ayuda a explicitar el sujeto del genitivo absoluto.'
  glossary_alignment: Buena alineación general con las decisiones del proyecto. κύριοι no se traduce con resonancia teológica sino como «dueños», correctamente contextual. No hay términos del glosario mayor en disputa aparte de κύριος, y la decisión es adecuada. Conviene añadir nota léxica para preservar la alternativa «amos» como equivalente contextual de 'masters' ya documentada en inglés.
  issues:
  - severity: medium
    issue: La pregunta directa usa «desatan» en registro no neutro para el destinatario plural
    rationale: El griego λύετε es segunda persona plural dirigida a los discípulos. En español neutro latinoamericano, «¿Por qué desatan...?» se oye peninsular/voseo de vosotros. La forma más natural y ampliamente inteligible es «¿Por qué están desatando el pollino?».
  - severity: low
    issue: Falta nota que preserve la alternativa léxica documentada para κύριοι
    rationale: 'El audit trail inglés conservó una nota: ''Or its masters.'' Dado que el español también tiene una alternativa significativa («amos»), conviene mantenerla para transparencia léxica, anclada en «dueños».'
  revised_spanish_text: 'Y mientras ellos desataban el pollino, sus dueños[a] les dijeron: «¿Por qué están desatando el pollino?»'
  revised_footnotes:
  - marker: a
    text: O «sus amos». La palabra griega es el plural de «señor/amo» (κύριος), pero aquí se refiere a los propietarios humanos del pollino.
    reason: lexical_alternative
  revision_rationale: Se corrige la forma verbal de la pregunta para español neutro latinoamericano y mayor fidelidad pragmática al discurso directo plural, y se añade la nota léxica ya respaldada por el audit trail inglés para κύριοι. El resto del borrador puede mantenerse.
