translation:
  language: es
  text: ¿Y por qué no pusiste mi dinero[a] en el banco? Entonces, cuando yo regresara, lo habría cobrado con intereses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «depositaste mi dinero con banqueros»; literalmente, «diste mi dinero sobre una mesa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τί
  english_pob_choice: why
  chosen_spanish: ¿y por qué
  alternatives_spanish:
  - ¿por qué
  - ¿por qué razón
  lexicon: BDAG
  rationale: La pregunta es una reprensión idiomática; «¿por qué» transmite de manera natural la acusación implícita sin volverla más fría o más técnica. Se añade «y» para reflejar el enlace inicial del griego y mantener el tono discursivo.
- source_word: ἔδωκάς ... ἐπὶ τράπεζαν
  english_pob_choice: put ... in the bank
  chosen_spanish: pusiste ... en el banco
  alternatives_spanish:
  - depositaste ... en el banco
  - pusiste ... sobre la mesa de un banquero
  - entregaste ... a los banqueros
  lexicon: BDAG
  rationale: τράπεζα puede referirse literalmente a una mesa, pero en este contexto económico apunta al lugar o institución bancaria. «En el banco» comunica la acción financiera prevista sin perder la base comercial de la expresión.
- source_word: μου τὸ ἀργύριον
  english_pob_choice: my money
  chosen_spanish: mi dinero
  alternatives_spanish:
  - mi plata
  - mi dinero de plata
  lexicon: BDAG
  rationale: ἀργύριον significa literalmente plata o dinero de plata, pero aquí funciona como dinero en sentido económico general. «Mi dinero» es la forma natural en español y evita una literalidad que sonaría engañosa.
- source_word: κἀγὼ ἐλθὼν
  english_pob_choice: Then when I came
  chosen_spanish: Entonces, cuando yo viniera
  alternatives_spanish:
  - Y cuando yo viniera
  - Entonces, al venir yo
  lexicon: BDAG
  rationale: La construcción participial se vierte con una subordinada temporal. «Viniera» conserva bien el valor hipotético del condicional pasado en español, correspondiente al potencial del griego en el discurso indirecto del reclamo.
- source_word: σὺν τόκῳ
  english_pob_choice: with interest
  chosen_spanish: con intereses
  alternatives_spanish:
  - con interés
  - con usura
  lexicon: BDAG
  rationale: τόκος se refiere al rendimiento sobre dinero depositado; en español, el plural «intereses» es la forma financiera más natural y precisa. «Usura» introduciría una valoración ajena al contexto.
- source_word: αὐτὸ ἔπραξα
  english_pob_choice: I would have collected it
  chosen_spanish: lo habría cobrado
  alternatives_spanish:
  - lo habría recobrado
  - lo habría recuperado
  - lo habría recibido
  lexicon: BDAG
  rationale: πράσσω aquí tiene sentido comercial de obtener o cobrar una suma debida. «Cobrar» expresa bien la recuperación del capital junto con sus intereses en español actual.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y el audit trail en inglés: mantiene la pregunta de reprensión, conserva la imagen bancaria subyacente a τράπεζα y traduce τόκος y πράσσω en su sentido financiero. La decisión principal respecto de la forma verbal en la subordinada temporal busca equilibrar fidelidad semántica e inteligibilidad en español.'
  spanish_consistency_notes:
  - Se usó «banco» para τράπεζα en sentido financiero, no como equivalente automático de «mesa», siguiendo el contexto del pasaje.
  - Se prefirió «dinero» para ἀργύριον por claridad contextual; la nota preserva la alternativa literal de «plata».
  - «Con intereses» se mantiene como terminología financiera estándar y no como moralización sobre la práctica de cobrar interés.
  - La nota al pie conserva la alternativa literal y la imagen de la «mesa» para transparencia textual.
