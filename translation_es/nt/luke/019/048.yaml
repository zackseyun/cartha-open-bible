- from: Y no hallaban qué podían hacer, porque todo el pueblo estaba pendiente de él[a], escuchándolo.
  to: Y no hallaban qué podían hacer, porque todo el pueblo estaba pendiente de él[a], escuchando.
  rationale: Se conserva la buena solución idiomática «estaba pendiente de él» para ἐξεκρέματο αὐτοῦ, pero se corrige «escuchándolo» a «escuchando» para reflejar con mayor precisión el participio ἀκούων sin añadir un objeto explícito ausente en el griego. No requiere adjudicación adicional.
