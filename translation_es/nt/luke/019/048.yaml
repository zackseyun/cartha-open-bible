translation:
  language: es
  text: Y no hallaban qué podían hacer, porque todo el pueblo estaba pendiente de él[a], escuchando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «todo el pueblo estaba colgado de él, escuchando». El griego usa un modismo de atención intensa y expectante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ εὕρισκον
  english_pob_choice: could not find
  chosen_spanish: no hallaban
  alternatives_spanish:
  - no encontraban
  - no podían hallar
  lexicon: BDAG
  rationale: El imperfecto negativo expresa una incapacidad sostenida o una búsqueda sin resultado. «No hallaban» conserva ese matiz de esfuerzo frustrado y suena natural en español bíblico contemporáneo.
- source_word: τὸ τί ποιήσωσιν
  english_pob_choice: what they might do
  chosen_spanish: qué podían hacer
  alternatives_spanish:
  - qué hacer
  - qué debían hacer
  lexicon: BDAG
  rationale: 'La construcción expresa el contenido de su deliberación: un curso de acción. «Qué podían hacer» comunica la incertidumbre práctica sin volver demasiado literal la estructura griega.'
- source_word: ὁ λαὸς γὰρ ἅπας
  english_pob_choice: because all the people
  chosen_spanish: porque todo el pueblo
  alternatives_spanish:
  - porque toda la gente
  - porque el pueblo entero
  lexicon: BDAG
  rationale: γάρ introduce la razón, por lo que «porque» es apropiado. λαός aquí funciona como colectivo; «todo el pueblo» conserva la amplitud de ἅπας sin sonar forzado.
- source_word: ἐξεκρέματο αὐτοῦ
  english_pob_choice: were hanging on him
  chosen_spanish: estaba pendiente de él
  alternatives_spanish:
  - colgaba de él
  - estaba colgado de él
  lexicon: BDAG
  rationale: El modismo griego expresa atención absorta. En español, «estaba pendiente de él» transmite esa idea con naturalidad y evita una imagen corporal extraña.
- source_word: ἀκούων
  english_pob_choice: listening
  chosen_spanish: escuchándolo
  alternatives_spanish:
  - oyéndolo
  - mientras escuchaba
  lexicon: BDAG
  rationale: El participio contemporáneo refuerza la actitud de atención. «Escuchándolo» conserva la acción en progreso y se integra bien con el modismo anterior.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que corrigió una interpretación más explícita de «his words»; el griego refiere directamente a él (αὐτοῦ), no a sus palabras. Por eso la traducción española mantiene el referente personal y evita añadir «palabras».
  spanish_consistency_notes:
  - Se mantiene «pueblo» para λαός en vez de «gente» para conservar el tono colectivo del pasaje.
  - «Escuchándolo» conserva la relación con αὐτοῦ y ἀκούων sin introducir objetos no presentes en el griego.
  - La nota al pie está anclada explícitamente en «pendiente de él[a]» para cumplir la correspondencia exacta entre marca y texto.
