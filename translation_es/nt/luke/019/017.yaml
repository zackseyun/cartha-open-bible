review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: elogio directo, fidelidad en algo mínimo, y concesión de autoridad sobre diez ciudades. Sin embargo, no sigue fielmente la decisión auditada del English POB para δοῦλε, que aquí optó por ''servant'' por contexto parabólico, con la alternativa fuerte en nota. Además, el texto español introduce dos notas léxicas redundantes y mal ancladas, una en ''buen'' y otra en ''esclavo'', cuando solo corresponde una nota en el sustantivo.'
  spanish_quality_summary: El español es mayormente claro, pero 'buen[a] esclavo[b]' es torpe e incorrecto por la doble marcación de nota. 'En lo muy poco' es comprensible, aunque menos natural que 'en algo muy pequeño' o 'en una cosa muy pequeña'; no obstante, puede mantenerse por cercanía al original. 'Bien hecho' funciona, pero en español bíblico y narrativo suena mejor '¡Muy bien!'. La reparación principal es léxica y de notas.
  glossary_alignment: No hay conflicto con términos de alto impacto doctrinal salvo δοῦλος. Aunque el valor por defecto del proyecto favorece 'esclavo' cuando el English POB eligió 'slave', aquí la auditoría inglesa documentó explícitamente 'servant' por contexto y preservó 'slave' solo como alternativa en nota. En español, 'siervo' corresponde mejor a esa decisión contextual que 'esclavo' en el texto principal.
  issues:
  - severity: high
    issue: δοῦλε se tradujo como 'esclavo' en el texto principal contra la decisión contextual auditada del English POB.
    rationale: La evidencia y la auditoría inglesa para este versículo prefieren 'servant' en una parábola, no 'slave'; el español debe seguir esa decisión documentada salvo razón fuerte en contra, que aquí no se justifica.
  - severity: high
    issue: 'Las notas al pie están duplicadas y mal ancladas: [a] en ''buen'' y [b] en ''esclavo'' para la misma alternativa léxica.'
    rationale: La instrucción exige marcadores únicos y solo donde realmente pertenezcan. Aquí basta una sola nota en el sustantivo traducido.
  - severity: medium
    issue: La explicación teológica/lexical del borrador contradice la racionalidad documentada del English POB.
    rationale: Afirma que 'siervo' sería domesticación no respaldada, pero el propio expediente inglés lo eligió deliberadamente por contexto narrativo.
  - severity: low
    issue: '''¡Bien hecho!'' y ''en lo muy poco'' son posibles, pero suenan algo menos naturales en español bíblico contemporáneo.'
    rationale: No distorsionan el sentido, pero puede mejorarse la fluidez con formulaciones más idiomáticas.
  revised_spanish_text: 'Y le dijo: «¡Muy bien, buen siervo[a]! Porque en lo muy poco fuiste fiel, ten autoridad sobre diez ciudades».'
  revised_footnotes:
  - marker: a
    text: O «esclavo»; el griego δοῦλος puede significar «siervo» o «esclavo» según el contexto.
    reason: lexical_alternative
  revision_rationale: Se ajusta δοῦλε a 'siervo' para seguir la decisión contextual auditada del English POB, preservando 'esclavo' como alternativa léxica en una sola nota correctamente anclada. Se elimina la duplicación de notas. También se mejora la naturalidad de Εὖγε con '¡Muy bien!' sin apartarse del sentido de aprobación.
