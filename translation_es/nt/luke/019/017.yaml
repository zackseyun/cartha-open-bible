- from: 'Y le dijo: «¡Bien hecho, buen[a] esclavo[b]; porque en lo muy poco fuiste fiel, ten autoridad sobre diez ciudades».'
  to: 'Y le dijo: «¡Muy bien, buen siervo[a]! Porque en lo muy poco fuiste fiel, ten autoridad sobre diez ciudades».'
  rationale: Se ajusta δοῦλε a 'siervo' para seguir la decisión contextual auditada del English POB, preservando 'esclavo' como alternativa léxica en una sola nota correctamente anclada. Se elimina la duplicación de notas. También se mejora la naturalidad de Εὖγε con '¡Muy bien!' sin apartarse del sentido de aprobación.
