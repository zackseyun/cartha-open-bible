translation:
  language: es
  text: 'Y le dijo: «¡Muy bien, buen siervo[a]! Porque en lo muy poco fuiste fiel, ten autoridad sobre diez ciudades».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclavo»; el griego δοῦλος puede significar «siervo» o «esclavo» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὖγε
  english_pob_choice: Well done
  chosen_spanish: ¡Bien hecho!
  alternatives_spanish:
  - ¡Bravo!
  - ¡Muy bien!
  lexicon: BDAG
  rationale: Es una exclamación idiomática de aprobación; «¡Bien hecho!» comunica elogio natural en español sin debilitar el tono de aprobación.
- source_word: ἀγαθὲ
  english_pob_choice: good
  chosen_spanish: buen
  alternatives_spanish:
  - bueno
  - excelente
  - digno
  lexicon: BDAG
  rationale: El vocativo adjetival que acompaña a δοῦλε se expresa de forma natural en español como «buen esclavo», manteniendo la valoración directa sin sobrecargar el matiz.
- source_word: δοῦλε
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  - servidor
  lexicon: BDAG
  rationale: POB documenta para δοῦλος la alternativa «slave»; en español, «esclavo» conserva la fuerza léxica de la relación de propiedad/sujeción. «Siervo» suaviza demasiado el término y sería una domesticación no respaldada por el griego ni por la auditoría inglesa.
- source_word: ἐν ἐλαχίστῳ
  english_pob_choice: in a very small matter
  chosen_spanish: en lo muy poco
  alternatives_spanish:
  - en un asunto muy pequeño
  - en muy poco
  - en lo mínimo
  lexicon: BDAG
  rationale: La frase expresa pequeñez de alcance o cantidad; «en lo muy poco» preserva la idea sin añadir «asunto» que no aparece explícitamente en el griego.
- source_word: πιστὸς ἐγένου
  english_pob_choice: you were faithful
  chosen_spanish: fuiste fiel
  alternatives_spanish:
  - resultaste fiel
  - te mostraste fiel
  - has sido fiel
  lexicon: BDAG
  rationale: El griego ἐγένου πιστός se rinde de manera directa con «fuiste fiel», manteniendo la evaluación de fidelidad sin introducir matices de proceso que el texto no exige.
- source_word: ἴσθι ἐξουσίαν ἔχων
  english_pob_choice: have authority
  chosen_spanish: ten autoridad
  alternatives_spanish:
  - sé teniendo autoridad
  - mantén autoridad
  - ejercita autoridad
  lexicon: BDAG
  rationale: La construcción perifrástica imperativa se expresa con un imperativo simple en español. «Ten autoridad» preserva la idea de posesión/ejercicio de autoridad de forma idiomática y breve.
- source_word: ἐπάνω δέκα πόλεων
  english_pob_choice: over ten cities
  chosen_spanish: sobre diez ciudades
  alternatives_spanish:
  - sobre diez urbes
  - encima de diez ciudades
  lexicon: BDAG
  rationale: «Sobre» reproduce la relación de gobierno/supervisión de ἐπάνω; «ciudades» es la equivalencia natural de πόλεις en este contexto administrativo.
theological_decisions:
- issue: δοῦλος y la tensión entre 'esclavo' y 'siervo'
  english_pob_reading: servant, with footnoted alternative slave
  chosen_spanish_reading: esclavo, con nota para la alternativa más suave
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: La auditoría inglesa preserva la alternativa fuerte y la nota léxica. En español, «esclavo» refleja mejor la fuerza semántica de δοῦλος y evita diluir el estatus de dependencia bajo el amo en la parábola. Dado que el término no es aquí una autoidentificación teológica sino una figura narrativa, la traducción mantiene el peso léxico sin necesidad de suavizarlo.
  doctrine_reference: 'DOCTRINE.md: contested terms table for δοῦλος; translation philosophy on lexical transparency'
translation_notes:
  revision_awareness: La auditoría inglesa fue revisada desde «you proved faithful» a «you were faithful» para ajustarse más directamente a ἐγένου πιστός; por ello la versión española evita verbos inferenciales como «demostraste» o «resultaste» y mantiene la forma simple «fuiste fiel». Se conservó el sentido imperativo de autoridad y la referencia a diez ciudades sin expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aplica.
  - Se prefirió «esclavo» para δοῦλος en coherencia con la política de transparencia léxica.
  - «Autoridad sobre diez ciudades» respeta el marco de gobierno implícito en ἐπάνω.
  - La puntuación y el cierre con comillas españolas siguen el estilo editorial del proyecto.
