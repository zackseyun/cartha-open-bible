translation:
  language: es
  text: Y mientras él ya se acercaba, a la bajada del Monte de los Olivos, toda la multitud de los discípulos comenzó, llena de alegría, a alabar a Dios a gran voz por todas las obras poderosas[a] que habían visto,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «milagros» o «hechos poderosos»; el griego dice literalmente «obras/poderes» y enfatiza actos de poder divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγγίζοντος ... αὐτοῦ
  english_pob_choice: as he was already drawing near
  chosen_spanish: mientras él ya se acercaba
  alternatives_spanish:
  - cuando él ya se acercaba
  - al acercarse ya
  lexicon: BDAG
  rationale: El genitivo absoluto funciona como trasfondo temporal; «mientras» y el imperfecto «se acercaba» conservan el movimiento progresivo sin volver la frase rígida en español.
- source_word: πρὸς τῇ καταβάσει
  english_pob_choice: at the descent
  chosen_spanish: a la bajada
  alternatives_spanish:
  - en la bajada
  - junto a la bajada
  - al descenso
  lexicon: BDAG
  rationale: La construcción sitúa a Jesús en relación con la pendiente descendente. «A la bajada» mantiene la localización sin sobreespecificar la topografía.
- source_word: τοῦ Ὄρους τῶν Ἐλαιῶν
  english_pob_choice: the Mount of Olives
  chosen_spanish: del Monte de los Olivos
  alternatives_spanish:
  - del monte de las olivas
  - del Monte Olivar
  lexicon: BDAG
  rationale: Se conserva el nombre propio de lugar con una forma clara y reconocible en español bíblico.
- source_word: ἤρξαντο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - se puso a
  lexicon: BDAG
  rationale: «Comenzó» refleja el valor ingresivo del verbo y encaja naturalmente con la construcción siguiente.
- source_word: ἅπαν τὸ πλῆθος τῶν μαθητῶν
  english_pob_choice: the whole multitude of the disciples
  chosen_spanish: toda la multitud de los discípulos
  alternatives_spanish:
  - toda la muchedumbre de los discípulos
  - la multitud entera de los discípulos
  lexicon: BDAG
  rationale: «Multitud» conserva el registro elevado del griego y evita reducir el grupo a un simple «grupo» o «gente».
- source_word: χαίροντες
  english_pob_choice: rejoicing
  chosen_spanish: gozándose
  alternatives_spanish:
  - regocijándose
  - alegrándose
  lexicon: BDAG
  rationale: La forma participial expresa modo; «gozándose» mantiene el matiz verbal y la conexión con la alabanza.
- source_word: αἰνεῖν τὸν θεὸν
  english_pob_choice: to praise God
  chosen_spanish: alabando a Dios
  alternatives_spanish:
  - para alabar a Dios
  - para darle alabanza a Dios
  lexicon: BDAG
  rationale: 'El infinitivo se vierte con un gerundio coordinado para reflejar la acción concomitante del texto: estaban gozándose y alabando a Dios.'
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - con voz alta
  - en voz fuerte
  lexicon: BDAG
  rationale: «Con voz fuerte» conserva la imagen concreta de una voz audible y poderosa sin sonar demasiado idiomático o técnico.
- source_word: περὶ πασῶν ... δυνάμεων
  english_pob_choice: for all the mighty works
  chosen_spanish: por todas las obras poderosas
  alternatives_spanish:
  - por todos los milagros
  - por todas las obras poderosas de Dios
  lexicon: BDAG
  rationale: δύναμις en este contexto puede ser «milagros», «hechos poderosos» o «obras poderosas». «Obras poderosas» conserva la amplitud léxica y la referencia a actos de poder divino sin cerrar prematuramente la lectura.
- source_word: ὧν εἶδον
  english_pob_choice: that they had seen
  chosen_spanish: que habían visto
  alternatives_spanish:
  - las cuales habían visto
  - que vieron
  lexicon: BDAG
  rationale: El pluscuamperfecto en español aclara que las obras vistas preceden al acto presente de alabanza.
theological_decisions:
- issue: Renderizar δύναμις en un contexto de milagros sin estrechar el sentido
  english_pob_reading: mighty works
  chosen_spanish_reading: obras poderosas
  alternative_spanish_readings:
  - milagros
  - hechos poderosos
  - obras portentosas
  rationale: El griego puede referirse a milagros, hechos de poder o manifestaciones de fuerza divina. «Obras poderosas» mantiene esa tensión semántica y evita imponer una paráfrasis más técnica de lo que el texto exige.
  doctrine_reference: Preservar la tensión lexical y teológica en vez de resolverla de forma reductora.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el trazado auditado en inglés, especialmente la relación temporal del genitivo absoluto, el valor ingresivo de ἤρξαντο, la construcción participial «gozándose y alabando», y la ambigüedad de δύναμις en contexto milagroso. Se evitó traducir mecánicamente desde el inglés cuando el español pedía una sintaxis más natural, pero se conservó el mismo alcance semántico y la misma tensión léxica documentada.
  spanish_consistency_notes:
  - Se usó «Dios» conforme al término θεόν, sin sustituciones devocionales.
  - Se mantuvo «Monte de los Olivos» como nombre propio estándar y transparente en español.
  - «Obras poderosas» preserva la amplitud de δύναμις y no fuerza una equivalencia exclusiva con «milagros».
  - La coordinación «gozándose y alabando» refleja mejor el valor participial griego que una subordinación final o causal.
