translation:
  language: es
  text: 'Pero sus ciudadanos lo odiaban[a], y enviaron una delegación tras él, diciendo: «No queremos que este hombre reine sobre nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una embajada». El término griego puede referirse a un cuerpo representativo enviado en misión oficial.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολῖται
  english_pob_choice: citizens
  chosen_spanish: ciudadanos
  alternatives_spanish:
  - súbditos
  - compatriotas
  lexicon: BDAG
  rationale: πολίτης designa a un miembro de una comunidad política. «Ciudadanos» conserva mejor el matiz cívico-político del término y evita anticipar una relación de vasallaje que el propio rechazo expresa después.
- source_word: ἐμίσουν
  english_pob_choice: hated
  chosen_spanish: lo odiaban
  alternatives_spanish:
  - lo detestaban
  - lo estaban odiando
  lexicon: BDAG
  rationale: El imperfecto expresa hostilidad continua o característica. En español, el imperfecto «lo odiaban» comunica esa acción mantenida con naturalidad; «lo estaban odiando» resulta poco idiomático y «lo detestaban» intensifica más de lo necesario.
- source_word: ἀπέστειλαν
  english_pob_choice: sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - despacharon
  lexicon: BDAG
  rationale: El aoristo narrativo se vierte con un pasado simple claro. «Enviaron» es idiomático y suficientemente neutral para la narración.
- source_word: πρεσβείαν
  english_pob_choice: a delegation
  chosen_spanish: una delegación
  alternatives_spanish:
  - una embajada
  - un cuerpo de representantes
  lexicon: BDAG
  rationale: πρεσβεία puede significar embajada o delegación. «Delegación» es la opción más natural en español moderno y conserva el sentido de un grupo oficial enviado en misión; no hace falta adoptar el término más diplomático «embajada».
- source_word: ὀπίσω αὐτοῦ
  english_pob_choice: after him
  chosen_spanish: tras él
  alternatives_spanish:
  - detrás de él
  - siguiéndolo
  lexicon: BDAG
  rationale: La expresión indica que la delegación fue enviada después de su partida. «Tras él» suena natural en español y conserva la relación temporal/posicional sin recargarla.
- source_word: Οὐ θέλομεν
  english_pob_choice: We do not want
  chosen_spanish: No queremos
  alternatives_spanish:
  - No deseamos
  - No estamos dispuestos a
  lexicon: BDAG
  rationale: θέλω expresa voluntad o deseo. «No queremos» reproduce con sencillez la negativa volitiva de la protesta.
- source_word: τοῦτον
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - este sujeto
  lexicon: BDAG
  rationale: El demostrativo tiene un matiz despectivo o distante. «Este hombre» mantiene la referencia señalando desdén sin volver el español excesivamente coloquial.
- source_word: βασιλεῦσαι ἐφ’ ἡμᾶς
  english_pob_choice: to reign over us
  chosen_spanish: reine sobre nosotros
  alternatives_spanish:
  - sea rey sobre nosotros
  - gobierne sobre nosotros
  lexicon: BDAG
  rationale: βασιλεύω conserva la imagen real. En español, «reine sobre nosotros» mantiene el lenguaje monárquico mejor que «gobierne», que lo generaliza, y mejor que «sea rey», que suena menos natural en esta cláusula.
theological_decisions:
- issue: Lenguaje real y resistencia política en la parábola
  english_pob_reading: Retain explicit royal language with 'reign over us' rather than flattening to generic authority.
  chosen_spanish_reading: 'Conservar el lenguaje monárquico explícito: «reine sobre nosotros».'
  alternative_spanish_readings:
  - gobierne sobre nosotros
  - mande sobre nosotros
  rationale: La escena depende de la imagen de realeza rechazada. Mantener «reine» preserva la fuerza política y narrativa del pasaje y evita diluir la tensión del texto en una simple idea de autoridad general.
  doctrine_reference: Principio de primacía del texto original; conservar la tensión teológica/narrativa sin resolverla por anticipado.
translation_notes:
  revision_awareness: La base inglesa y el cotejo de revisión muestran alta concordancia y sin cambios necesarios; el español sigue de cerca las decisiones léxicas auditadas, adaptándolas a una formulación natural y publicable en español.
  spanish_consistency_notes:
  - Se mantiene «ciudadanos» para πολῖται, en continuidad con la lectura cívico-política del original.
  - Se conserva el imperfecto en «lo odiaban» para reflejar hostilidad continua.
  - «Delegación» traduce πρεσβείαν como término neutral y claro, con nota alternativa a «embajada».
  - «Reine sobre nosotros» preserva el léxico monárquico de βασιλεύω sin sustituirlo por un verbo más genérico.
