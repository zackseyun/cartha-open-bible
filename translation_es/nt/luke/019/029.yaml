translation:
  language: es
  text: Y sucedió que, cuando se acercó a Betfagé y Betania, hacia el monte llamado de los Olivos[a], envió dos de los discípulos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más idiomática: «hacia el monte llamado el Monte de los Olivos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἐγένετο
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: BDAG
  rationale: La fórmula narrativa lucana se conserva como introducción de relato, en un español natural y reverente. 'Sucedió que' refleja bien el giro de acontecimiento sin caer en un calco áspero.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: cuando
  alternatives_spanish:
  - mientras
  - así como
  lexicon: BDAG
  rationale: En este contexto temporal, 'cuando' comunica mejor la llegada en curso que un 'como' literal, que en español podría sonar ambiguo.
- source_word: ἤγγισεν
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - llegó cerca
  - arrimó
  lexicon: BDAG
  rationale: El verbo describe proximidad en movimiento; 'se acercó' es idiomático y fiel al sentido de aproximación.
- source_word: εἰς Βηθφαγὴ καὶ Βηθανίαν
  english_pob_choice: to Bethphage and Bethany
  chosen_spanish: a Betfagé y Betania
  alternatives_spanish:
  - hacia Betfagé y Betania
  - hasta Betfagé y Betania
  lexicon: BDAG
  rationale: Se conserva la transliteración habitual de los topónimos y el valor direccional de εἰς con 'a'.
- source_word: πρὸς τὸ ὄρος
  english_pob_choice: toward the mount
  chosen_spanish: hacia el monte
  alternatives_spanish:
  - hacia la montaña
  - junto al monte
  lexicon: BDAG
  rationale: πρός indica dirección o referencia espacial; 'hacia' mantiene ese movimiento sin sobreespecificar.
- source_word: τὸ καλούμενον Ἐλαιῶν
  english_pob_choice: called Olives
  chosen_spanish: llamado de los Olivos
  alternatives_spanish:
  - llamado Olivos
  - llamado el Monte de los Olivos
  lexicon: BDAG
  rationale: El griego dice literalmente 'llamado Olivos' con un genitivo plural; en español, 'de los Olivos' conserva mejor la forma auditable y suena natural. La expansión tradicional 'Monte de los Olivos' queda implícita y puede explicitarse en nota solo si se requiere, pero no se añade al texto principal para no ir más allá del griego.
- source_word: ἀπέστειλεν
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: '''Envió'' reproduce el acto simple de remitir/mandar a alguien; es la opción más neutral y fiel.'
- source_word: δύο τῶν μαθητῶν
  english_pob_choice: two of the disciples
  chosen_spanish: dos de los discípulos
  alternatives_spanish:
  - dos de sus discípulos
  lexicon: BDAG
  rationale: El posesivo 'sus' no está explícito en el griego, aunque el referente sea claro por el contexto. Se omite para mantener la transparencia textual.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota sin anclaje. Esta versión no usa notas al pie, por lo que no requiere marcadores en el texto.
  spanish_consistency_notes:
  - Se usa 'Betfagé' y 'Betania' como transliteraciones consistentes de los topónimos.
  - Se evita 'Cristo' porque no aparece en el versículo.
  - Se mantiene 'discípulos' sin posesivo explícito para respetar el genitivo griego.
  - Se prefiere 'monte' en consonancia con el movimiento direccional del pasaje y con la formulación tradicional, pero sin expandir innecesariamente el texto principal.
