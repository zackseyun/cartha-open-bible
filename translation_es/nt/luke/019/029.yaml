revisions:
- from: Y sucedió que, cuando se acercó a Betfagé y Betania, hacia el monte llamado de los Olivos, envió dos de los discípulos.
  to: Y sucedió que, cuando se acercó a Betfagé y Betania, hacia el monte llamado de los Olivos[a], envió dos de los discípulos.
  rationale: Se conserva la redacción principal del borrador porque es fiel al griego y al enfoque auditable del POB. Se añade la nota léxica que faltaba para reflejar la alternativa idiomática documentada en inglés y mejorar la legibilidad sin expandir indebidamente el texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:01:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: conserva la fórmula narrativa inicial, la cláusula temporal de aproximación, los topónimos, la referencia al monte, y la acción de enviar a dos de los discípulos. Sin embargo, no preserva un matiz importante del rastro de auditoría POB: el inglés mantuvo la forma comprimida auditable ''called Olives'' y añadió una nota con la expansión idiomática ''the Mount of Olives''. En español, ''llamado de los Olivos'' es comprensible pero algo áspero; conviene mantenerlo en el texto con una nota que dé la forma idiomática tradicional.'
  spanish_quality_summary: 'El español es claro y mayormente natural. ''Y sucedió que'' funciona bien para Καὶ ἐγένετο. ''Cuando se acercó'' es una buena opción idiomática para ὡς ἤγγισεν. El punto principal a mejorar es ''llamado de los Olivos'': aunque defendible, queda algo poco fluido sin apoyo. Una nota al pie resolvería la naturalidad y alinearía mejor el texto con la política de auditabilidad del POB.'
  glossary_alignment: No hay términos teológicos del glosario principal en juego. Los topónimos están bien transliterados. 'Discípulos' corresponde correctamente a μαθητῶν. La decisión de no añadir 'sus' respeta el griego.
  issues:
  - severity: medium
    issue: Falta la nota léxica equivalente para 'llamado de los Olivos'
    rationale: El English POB preserva la forma más literal/comprimida en el texto principal y documenta en nota la expansión idiomática 'the Mount of Olives'. El español debería reflejar esa misma decisión auditada, especialmente porque 'llamado de los Olivos' puede sonar menos natural sin aclaración.
  - severity: low
    issue: Ligera tensión estilística en 'llamado de los Olivos'
    rationale: La frase no es incorrecta, pero en español eclesial general la forma más reconocible es 'llamado Monte de los Olivos' o 'llamado el monte de los Olivos'. Mantener la forma más ceñida al griego es válido si se apoya con nota.
  revised_spanish_text: Y sucedió que, cuando se acercó a Betfagé y Betania, hacia el monte llamado de los Olivos[a], envió dos de los discípulos.
  revised_footnotes:
  - marker: a
    text: 'O, de forma más idiomática: «hacia el monte llamado el Monte de los Olivos».'
    reason: lexical_alternative
  revision_rationale: Se conserva la redacción principal del borrador porque es fiel al griego y al enfoque auditable del POB. Se añade la nota léxica que faltaba para reflejar la alternativa idiomática documentada en inglés y mejorar la legibilidad sin expandir indebidamente el texto principal.
