translation:
  language: es
  text: Y trajeron el pollino a Jesús[a], y después de echar sus mantos sobre el pollino[b], hicieron subir a Jesús sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «lo»; el pronombre griego es masculino y se refiere al pollino.
    reason: lexical_alternative
  - marker: b
    text: «Pollino» puede referirse aquí a un asno joven; compárese el contexto circundante.
    reason: cross_reference
lexical_decisions:
- source_word: ἤγαγον
  english_pob_choice: brought
  chosen_spanish: llevaron
  alternatives_spanish:
  - trajeron
  - guiaron
  lexicon: BDAG
  rationale: En este contexto narrativo, ἤγαγον expresa que condujeron el animal hasta Jesús. «Llevaron» conserva el movimiento hacia Jesús y suena natural en español; «trajeron» enfatiza más el punto de llegada, pero aquí el énfasis del contexto inmediato es la acción de conducir el animal.
- source_word: αὐτὸν
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - le
  - él
  lexicon: BDAG
  rationale: El pronombre griego es masculino, pero remite al pollino, no a una persona. En español, el objeto directo exige «lo»; así se mantiene la referencia al animal sin introducir ambigüedad personal.
- source_word: πρὸς τὸν Ἰησοῦν
  english_pob_choice: to Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - hacia Jesús
  - ante Jesús
  lexicon: BDAG
  rationale: La preposición πρός con acusativo indica movimiento hacia una persona. «A Jesús» es la forma más natural y fiel en español.
- source_word: ἐπιρίψαντες
  english_pob_choice: after throwing
  chosen_spanish: después de echar
  alternatives_spanish:
  - después de poner
  - luego de arrojar
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. «Después de echar» comunica la secuencia sin sonar mecánico; «arrojar» sería posible, pero en español sugiere más brusquedad de la que el contexto requiere.
- source_word: αὐτῶν τὰ ἱμάτια
  english_pob_choice: their cloaks
  chosen_spanish: sus mantos
  alternatives_spanish:
  - sus capas
  - sus vestiduras
  lexicon: BDAG
  rationale: ἱμάτια designa prendas exteriores. «Mantos» es claro, digno y frecuente en español bíblico; «capas» podría funcionar, pero «mantos» preserva mejor el valor de prenda exterior sin reducirlo a un objeto moderno.
- source_word: ἐπὶ τὸν πῶλον
  english_pob_choice: on the colt
  chosen_spanish: sobre el pollino
  alternatives_spanish:
  - encima del pollino
  - sobre el potrillo
  lexicon: BDAG
  rationale: ἐπί con acusativo indica colocación encima. «Sobre el pollino» sigue de cerca el movimiento del texto y mantiene la referencia al animal joven. En el contexto lucano, «pollino» comunica bien el sentido de πῶλος.
- source_word: πῶλον
  english_pob_choice: colt
  chosen_spanish: pollino
  alternatives_spanish:
  - potrillo
  - cría
  lexicon: BDAG
  rationale: πῶλος denota un animal joven; en este pasaje se trata de un asno joven por el contexto mayor de la entrada triunfal. «Pollino» es un equivalente español estable y más preciso que «potrillo» para este entorno bíblico.
- source_word: ἐπεβίβασαν
  english_pob_choice: they put
  chosen_spanish: pusieron
  alternatives_spanish:
  - hicieron subir
  - montaron
  lexicon: BDAG
  rationale: El verbo expresa causar que alguien suba o monte. «Pusieron a Jesús sobre él» conserva la causatividad de manera natural en español y evita «montaron», que podría sonar a que ellos mismos montaron.
- source_word: τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: El nombre propio se conserva sin traducción. En español, al ser complemento directo personal, se marca con la preposición «a».
translation_notes:
  revision_awareness: 'Coincide con el pasaje griego y con el audit trail inglés en las decisiones principales: el pronombre masculino se entiende como referencia al pollino, πῶλος se mantiene como «pollino», y la secuencia participial se vierte con antecedencia temporal explícita. No se registran revisiones posteriores que alteren esta lectura.'
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Jesús» y el complemento directo personal con «a».
  - Se evitó «SEÑOR» o equivalentes irrelevantes, porque el versículo no contiene vocabulario divino.
  - «Mantos» y «pollino» conservan el registro bíblico y la precisión léxica sin depender de calco inglés.
