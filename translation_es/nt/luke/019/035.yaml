  - marker: b
    text: «Pollino» puede referirse aquí a un asno joven; compárese el contexto circundante.
    reason: cross_reference
  revision_rationale: Se reemplaza el pronombre inicial por «el pollino» para evitar una ambigüedad fuerte en español, manteniendo en nota la alternativa literal documentada por el inglés. También se ajusta «llevaron» a «trajeron» por mayor naturalidad con «a Jesús», y «pusieron a Jesús sobre él» a «hicieron subir a Jesús sobre él» para reflejar mejor la causatividad del verbo griego.
