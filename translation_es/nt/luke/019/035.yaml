  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la secuencia del griego: trajeron/llevaron el animal a Jesús, pusieron sus mantos sobre el pollino, y luego hicieron subir a Jesús. Conserva bien la referencia de αὐτόν al animal y la nota sobre «pollino». Sin embargo, «lo llevaron a Jesús» en español se entiende con demasiada facilidad como referido a una persona masculina, y «llevaron» es menos idiomático que «trajeron» dado el complemento «a Jesús».'
  spanish_quality_summary: La redacción es mayormente natural y digna, pero el inicio crea una ambigüedad innecesaria que la nota no resuelve en lectura continua. Además, «pusieron a Jesús sobre él» es comprensible, pero «hicieron subir a Jesús» expresa mejor la causatividad de ἐπεβίβασαν en español natural. El resto del verso es claro y eclesialmente legible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús» está bien. «Pollino» es una buena elección contextual para πῶλος. «Mantos» también encaja bien para ἱμάτια.
  issues:
  - severity: medium
    issue: Ambigüedad en «Y lo llevaron a Jesús[a]»
    rationale: Aunque el griego usa un pronombre masculino referido al pollino, en español «lo llevaron a Jesús» suena como si llevaran a un varón a Jesús, no al animal. Dado que el español puede omitir el pronombre y expresar el referente con claridad, conviene explicitar «el pollino» en el texto principal y conservar la alternativa en nota.
  - severity: low
    issue: «Pusieron a Jesús sobre él» suena algo mecánico
    rationale: La frase es fiel en términos generales, pero «hicieron subir a Jesús» comunica mejor el valor causativo de ἐπεβίβασαν en español idiomático, sin perder precisión.
  revised_spanish_text: Y trajeron el pollino a Jesús[a], y después de echar sus mantos sobre el pollino[b], hicieron subir a Jesús sobre él.
