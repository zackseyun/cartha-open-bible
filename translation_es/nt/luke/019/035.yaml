revisions:
- from: Y lo llevaron a Jesús[a], y después de echar sus mantos sobre el pollino[b], pusieron a Jesús sobre él.
  to: Y trajeron el pollino a Jesús[a], y después de echar sus mantos sobre el pollino[b], hicieron subir a Jesús sobre él.
  rationale: Se reemplaza el pronombre inicial por «el pollino» para evitar una ambigüedad fuerte en español, manteniendo en nota la alternativa literal documentada por el inglés. También se ajusta «llevaron» a «trajeron» por mayor naturalidad con «a Jesús», y «pusieron a Jesús sobre él» a «hicieron subir a Jesús sobre él» para reflejar mejor la causatividad del verbo griego.
