translation:
  language: es
  text: Y después de decir estas cosas, iba delante, subiendo a Jerusalén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Conserva la función conectiva narrativa del griego sin introducir matiz temporal adicional. En español, «Y» mantiene la secuencia del relato con naturalidad.
- source_word: εἰπὼν
  english_pob_choice: after saying
  chosen_spanish: después de decir
  alternatives_spanish:
  - habiendo dicho
  - cuando hubo dicho
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a la principal. «Después de decir» comunica esa anterioridad de manera natural en español sin volver la frase pesada.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas palabras
  - esto
  lexicon: BDAG
  rationale: El demostrativo plural se refiere al discurso previo sin limitarlo solo a palabras. «Estas cosas» conserva esa amplitud referencial.
- source_word: ἐπορεύετο
  english_pob_choice: he went on
  chosen_spanish: iba
  alternatives_spanish:
  - proseguía
  - se encaminaba
  - iba avanzando
  lexicon: BDAG
  rationale: El imperfecto de πορεύομαι marca movimiento en curso. «Iba» es breve, natural y mantiene la continuidad narrativa; el contexto ya muestra que se trata de desplazamiento.
- source_word: ἔμπροσθεν
  english_pob_choice: ahead
  chosen_spanish: delante
  alternatives_spanish:
  - adelante
  - en frente
  lexicon: BDAG
  rationale: El adverbio indica posición anterior con respecto a los demás. «Delante» es idiomático en español y conserva la idea de ir al frente del grupo.
- source_word: ἀναβαίνων
  english_pob_choice: going up
  chosen_spanish: subiendo
  alternatives_spanish:
  - ascendiendo
  - yendo de subida
  lexicon: BDAG
  rationale: Se preserva el idioma de ascenso hacia Jerusalén, que en Lucas tiene valor geográfico y narrativo. «Subiendo» mantiene la imagen sin sonar forzado en español.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - hasta Jerusalén
  lexicon: BDAG
  rationale: Con destino o dirección hacia una ciudad, εἰς se traduce de forma natural con «a». «Jerusalén» es el topónimo estándar en español.
theological_decisions:
- issue: Conservar el lenguaje de ascenso hacia Jerusalén
  english_pob_reading: Render ἀναβαίνων literally as 'going up' rather than flattening it to 'traveling' or omitting it.
  chosen_spanish_reading: Traducir ἀναβαίνων como «subiendo» en vez de neutralizarlo como «yendo» o «viajando».
  alternative_spanish_readings:
  - viajando a Jerusalén
  - yendo a Jerusalén
  rationale: Lucas usa deliberadamente el lenguaje de subida para Jerusalén. Mantenerlo en español conserva el matiz geográfico y narrativo del original sin sobreexplicarlo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan alta concordancia y no muestran revisiones aplicadas; por ello, el borrador español sigue de cerca la estructura del original sin necesidad de notas textuales adicionales.
  spanish_consistency_notes:
  - Se preserva la progresión narrativa con una coordinación simple («Y») y un participio anterior traducido de manera idiomática.
  - Se mantiene «subiendo» para reflejar el valor de ascenso hacia Jerusalén, coherente con la decisión inglesa auditada.
  - No se emplean fórmulas eclesiásticas añadidas; el topónimo y la sintaxis permanecen transparentes al griego.
