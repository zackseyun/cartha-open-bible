translation:
  language: es
  text: Y se adelantó corriendo y subió a un sicómoro[a] para verlo, porque iba a pasar por allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más precisamente, «un sicómoro-higuera» (el sicómoro egipcio, Ficus sycomorus).
    reason: lexical_alternative
lexical_decisions:
- source_word: προδραμὼν
  english_pob_choice: ran on ahead
  chosen_spanish: corrió adelante
  alternatives_spanish:
  - corrió por delante
  - se adelantó corriendo
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción de correr para ponerse delante; en español, «corrió adelante» comunica bien el movimiento sin volver la frase pesada. No hace falta reflejar de manera separada el matiz de «on» porque queda absorbido por el verbo y el complemento siguiente.
- source_word: εἰς τὸ ἔμπροσθεν
  english_pob_choice: on ahead
  chosen_spanish: adelante
  alternatives_spanish:
  - más adelante
  - hacia delante
  lexicon: BDAG
  rationale: La expresión refuerza la idea de ir hacia una posición delantera. En español, «adelante» mantiene el sentido idiomático y evita una redundancia artificial.
- source_word: ἀνέβη ἐπὶ
  english_pob_choice: climbed up into
  chosen_spanish: subió a
  alternatives_spanish:
  - trepó a
  - subió sobre
  lexicon: BDAG
  rationale: Con un árbol, el griego comunica subir a/encima de él. «Subió a» es natural en español y suficientemente exacto; «trepó a» también sería posible, pero «subió a» resulta más sobrio y readable.
- source_word: συκομορέαν
  english_pob_choice: a sycamore tree
  chosen_spanish: una higuera de sicómoro
  alternatives_spanish:
  - un sicómoro
  - una higuera sicómoro
  lexicon: BDAG
  rationale: El término griego designa específicamente el sicómoro-higuera (Ficus sycomorus). Se conserva la precisión botánica en la nota, mientras que el texto principal usa una forma comprensible y fiel; «higuera de sicómoro» mantiene la relación semántica de árbol/fig frutal del término.
- source_word: ἵνα ἴδῃ αὐτόν
  english_pob_choice: so that he might see him
  chosen_spanish: para verlo
  alternatives_spanish:
  - para poder verlo
  - a fin de verlo
  lexicon: BDAG
  rationale: La cláusula de propósito con ἵνα más subjuntivo puede expresarse naturalmente con «para + infinitivo» en español. «Para verlo» conserva la finalidad sin añadir solemnidad innecesaria.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Aquí introduce la razón por la que subió al árbol. «Porque» es la opción más clara y directa en español moderno.
- source_word: ἐκείνης
  english_pob_choice: that way
  chosen_spanish: por allí
  alternatives_spanish:
  - por ese camino
  - por aquel lado
  lexicon: BDAG
  rationale: El genitivo femenino singular presupone un sustantivo como «camino/calle/parte»; el español natural es una expresión adverbial de lugar. «Por allí» mantiene la vaguedad contextual sin imponer un referente demasiado específico.
- source_word: ἤμελλεν διέρχεσθαι
  english_pob_choice: he was about to pass that way
  chosen_spanish: iba a pasar por allí
  alternatives_spanish:
  - estaba a punto de pasar por allí
  - estaba por pasar por allí
  lexicon: BDAG
  rationale: μέλλω con infinitivo expresa inminencia. «Iba a pasar por allí» reproduce de forma fluida esa proximidad temporal y el valor direccional de la frase.
theological_decisions:
- issue: Ningún punto doctrinal específico en este versículo; la decisión principal es léxica y narrativa.
  english_pob_reading: The verse simply describes Zacchaeus's actions and Jesus' imminent route.
  chosen_spanish_reading: El versículo simplemente describe las acciones de Zaqueo y el paso inminente de Jesús.
  alternative_spanish_readings:
  - El versículo solo narra que Zaqueo se adelantó y que Jesús pasaría por ese lugar.
  rationale: No hay carga doctrinal controvertida en este versículo. La traducción debe preservar la secuencia narrativa y la finalidad de la acción sin introducir interpretaciones adicionales.
  doctrine_reference: None
translation_notes:
  revision_awareness: Se siguió el acuerdo alto del contexto auditado en inglés. No hubo revisiones aplicadas en el texto inglés; por eso la versión española mantiene una equivalencia óptima y conserva la alternativa botánica en nota, como lo hace el POB inglés.
  spanish_consistency_notes:
  - Se usó «porque» para ὅτι por claridad causal en español.
  - Se mantuvo «por allí» para conservar la deixis vaga de ἐκείνης sin especificar indebidamente «camino» o «calle».
  - «Subió a» se prefirió sobre «trepó a» por fluidez narrativa, sin perder el sentido de ascenso.
  - El marcador de nota [a] está colocado en la frase botánica relevante y corresponde exactamente a la nota adicional.
