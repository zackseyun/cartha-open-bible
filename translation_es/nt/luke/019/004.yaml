revisions:
- from: Entonces corrió adelante y subió a una higuera de sicómoro[a] para verlo, porque iba a pasar por allí.
  to: Y se adelantó corriendo y subió a un sicómoro[a] para verlo, porque iba a pasar por allí.
  rationale: La revisión elimina «Entonces», que excede el valor de καὶ; sustituye «corrió adelante» por «se adelantó corriendo», una forma más idiomática y fiel a προδραμὼν εἰς τὸ ἔμπροσθεν; y simplifica «higuera de sicómoro» a «sicómoro» en el texto principal, preservando la precisión botánica en la nota, en línea con el audit trail inglés.
