base_translation:
  language: en
  yaml_path: translation/nt/luke/019/018.yaml
  text: And the second came[a], saying, ‘Your mina, lord[c][b], has made five minas.’
  footnotes:
  - marker: a
    text: Or 'Master.' The Greek κύριε can function as a respectful address to a superior in this parable.
    reason: alternative_reading
  - marker: b
    text: A mina was an ancient unit of money.
    reason: cultural_note
  - marker: c
    text: Or 'has made five more minas.' The Greek does not explicitly include 'more,' though the sense is implied by the context.
    reason: lexical_alternative
