translation:
  language: es
  text: 'Y llegó el segundo, diciendo: «Tu mina, señor[a], ha producido cinco minas[b][c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amo». El griego κύριε puede funcionar aquí como un trato respetuoso a un superior en esta parábola.
    reason: alternative_reading
  - marker: b
    text: Una mina era una antigua unidad de dinero.
    reason: cultural_note
  - marker: c
    text: O «ha producido cinco minas más». El griego no incluye explícitamente «más», aunque el sentido se entiende por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι en secuencia narrativa se expresa naturalmente en español con «llegó». Mantiene el avance del relato sin sonar rígido.
- source_word: ὁ δεύτερος
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el segundo hombre
  - el segundo siervo
  lexicon: BDAG
  rationale: El artículo con ordinal identifica al segundo personaje en la serie; «el segundo» es conciso y fiel al griego.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - mientras decía
  lexicon: BDAG
  rationale: El participio presente que introduce discurso directo se vierte bien con «diciendo», conservando el enlace narrativo sin añadir matiz extra.
- source_word: μνᾶ
  english_pob_choice: mina
  chosen_spanish: mina
  alternatives_spanish:
  - libra
  lexicon: BDAG
  rationale: Se conserva el término transliterado «mina» para reflejar la unidad monetaria antigua y evitar la ambigüedad de «libra» en español.
- source_word: σου
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - su
  lexicon: BDAG
  rationale: 'El posesivo de segunda persona singular marca pertenencia: la mina pertenece al destinatario del discurso. «Tu» reproduce esa relación de forma directa.'
- source_word: κύριε
  english_pob_choice: lord
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - maestro
  lexicon: BDAG
  rationale: Aunque el inglés POB optó por «lord» como forma de tratamiento, en español «señor» expresa respetuosamente el vocativo y evita la carga teológica que tendría «Señor» con mayúscula.
- source_word: ἐποίησεν
  english_pob_choice: has made
  chosen_spanish: ha producido
  alternatives_spanish:
  - ha hecho
  - ha ganado
  lexicon: BDAG
  rationale: Aquí ποιέω describe el resultado obtenido por la mina. «Ha producido» transmite el efecto productivo de la inversión con claridad en español y evita la ambigüedad de «ha hecho».
- source_word: πέντε μνᾶς
  english_pob_choice: five minas
  chosen_spanish: cinco minas
  alternatives_spanish:
  - cinco minas más
  - cinco adicionales
  lexicon: BDAG
  rationale: El griego expresa simplemente la cantidad producida, sin una palabra explícita para «más». Por eso se mantiene «cinco minas» y no se añade la idea interpretativa de «más» en el texto principal.
theological_decisions:
- issue: Tratamiento de κύριε como vocativo de respeto en la parábola
  english_pob_reading: lord
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - Señor
  - amo
  - maestro
  rationale: El contexto narrativo permite entender κύριε como un trato deferente a un superior. En español, «señor» comunica esa deferencia de manera natural sin convertir automáticamente la forma de tratamiento en un título divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord / respectful address'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y el audit trail inglés: conserva la secuencia narrativa, el vocativo respetuoso y la transparencia sobre la unidad monetaria, pero adapta el verbo de resultado a una formulación más natural en español.'
  spanish_consistency_notes:
  - Se mantuvo «mina» como transliteración estable para la unidad monetaria.
  - Se usó «señor» en minúscula para reflejar vocativo de respeto, no un título divino.
  - «Ha producido» preserva el sentido resultativo de ἐποίησεν sin añadir explícitamente la noción de ganancia.
  - La puntuación con comillas angulares sigue la norma tipográfica española.
