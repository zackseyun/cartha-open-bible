translation:
  language: es
  text: 'Y le dijo también a este: «Y tú, estarás a cargo[a] de cinco ciudades».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ten autoridad sobre cinco ciudades» o «sé puesto sobre cinco ciudades».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le señaló
  lexicon: BDAG
  rationale: El aoristo de λέγω en narrativa directa se rinde de forma natural con «dijo»; el dativo de destinatario queda explícito con «le».
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector suave en la secuencia narrativa; «Y» conserva la continuidad sin añadir contraste.
- source_word: καὶ τούτῳ
  english_pob_choice: to this one also
  chosen_spanish: también a este
  alternatives_spanish:
  - a este también
  - también a él
  lexicon: BDAG
  rationale: «τούτῳ» apunta de modo demostrativo a la persona concreta, y καί añade la idea de inclusión distributiva. En español, «a este» preserva esa referencia; «también» mantiene el valor aditivo.
- source_word: Καὶ σὺ
  english_pob_choice: And you
  chosen_spanish: Tú también
  alternatives_spanish:
  - Y tú
  - Y tú también
  lexicon: BDAG
  rationale: La frase intensifica el trato personal y paralelo con el anterior. «Tú también» conserva la segunda persona enfática y la idea de correspondencia.
- source_word: ἐπάνω γίνου
  english_pob_choice: be over
  chosen_spanish: gobierna sobre
  alternatives_spanish:
  - sé sobre
  - está sobre
  - ten autoridad sobre
  lexicon: BDAG
  rationale: El giro idiomático con γίνομαι + ἐπάνω expresa colocación en una esfera de autoridad o encargo. En español, «gobierna sobre» comunica con naturalidad esa función sin perder el sentido de jurisdicción; se mantiene como alternativa implícita la idea de autoridad/nombramiento que el inglés POB documenta.
- source_word: πέντε πόλεων
  english_pob_choice: five cities
  chosen_spanish: cinco ciudades
  alternatives_spanish:
  - cinco poblaciones
  - cinco villas
  lexicon: BDAG
  rationale: πόλις designa normalmente «ciudad»; el genitivo depende de ἐπάνω e indica esfera de gobierno o responsabilidad sobre cinco ciudades.
translation_notes:
  revision_awareness: 'Se corrigió la ubicación de la nota: el marcador [a] aparece ahora en el texto principal junto al término verbal que concentra la alternativa semántica de ἐπάνω γίνου. No se realizaron otros cambios de contenido respecto al borrador previo.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de la línea griega con una estructura breve y directa.
  - Se eligió «ciudades» para πόλεων conforme al valor léxico normal de πόλις.
  - La nota alternativa se ancla únicamente al verbo de autoridad, donde reside la tensión de traducción principal.
