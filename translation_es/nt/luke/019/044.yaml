translation:
  language: es
  text: y te arrasarán[a], a ti y a tus hijos dentro de ti, y no dejarán piedra sobre piedra dentro de ti, porque no reconociste el tiempo de tu visitación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el tiempo de tu inspección». El término griego puede denotar visitación o inspección, especialmente una visitación divina que puede traer misericordia o juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδαφιοῦσίν
  english_pob_choice: will level ... to the ground
  chosen_spanish: te derribarán a ti
  alternatives_spanish:
  - te arrasarán
  - te derribarán hasta el suelo
  - te reducirán a ruinas
  lexicon: BDAG
  rationale: ἐδαφίζω expresa la acción de abatir algo hasta el suelo o dejarlo en ruinas. En español, «derribar» comunica con naturalidad ese golpe devastador; el complemento «a ti» mantiene la personificación de Jerusalén sin añadir una interpretación ajena al griego.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: te / a ti
  alternatives_spanish:
  - a tu ciudad
  - a Jerusalén
  lexicon: BDAG
  rationale: El griego usa un objeto directo de segunda persona singular. Mantener «te» preserva la forma retórica de dirigirse a Jerusalén personificada, sin explicitar «Jerusalén» donde el texto no lo dice.
- source_word: τὰ τέκνα σου ἐν σοί
  english_pob_choice: your children within you
  chosen_spanish: a tus hijos dentro de ti
  alternatives_spanish:
  - a tus hijos en ti
  - a tus habitantes dentro de ti
  lexicon: BDAG
  rationale: τέκνα significa literalmente «hijos/niños». «Hijos» conserva esa imagen, y «dentro de ti» refleja ἐν σοί de modo natural para una ciudad personificada. «Habitantes» suavizaría la imagen y perdería parte de la fuerza del original.
- source_word: οὐκ ἀφήσουσιν λίθον ἐπὶ λίθον ἐν σοί
  english_pob_choice: they will not leave one stone upon another within you
  chosen_spanish: no dejarán piedra sobre piedra dentro de ti
  alternatives_spanish:
  - no dejarán una piedra sobre otra dentro de ti
  - no quedará piedra sobre piedra en ti
  lexicon: BDAG
  rationale: La expresión es un modismo de destrucción total. «Piedra sobre piedra» es una equivalencia idiomática estable en español; el texto mantiene «dentro de ti» para conservar el valor locativo de ἐν σοί.
- source_word: ἀνθ’ ὧν
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - debido a que
  - por cuanto
  lexicon: BDAG
  rationale: Aquí la construcción introduce la causa del juicio. «Porque» es la forma española más directa y clara, sin añadir matices que el griego no obliga a establecer.
- source_word: ἔγνως
  english_pob_choice: did not recognize
  chosen_spanish: no reconociste
  alternatives_spanish:
  - no conociste
  - no entendiste
  - no discerniste
  lexicon: BDAG
  rationale: γινώσκω puede abarcar conocer o reconocer. En este contexto, el fracaso es no percibir adecuadamente la acción decisiva de Dios; «reconociste» conserva esa idea mejor que un simple «supiste» o «conociste».
- source_word: καιρὸν
  english_pob_choice: time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - la hora
  - el momento
  - el tiempo señalado
  lexicon: BDAG
  rationale: καιρός se refiere a un tiempo significativo o señalado. «El tiempo» es natural en español y deja que la gravedad del momento sea expresada por la frase siguiente.
- source_word: τῆς ἐπισκοπῆς σου
  english_pob_choice: of your visitation
  chosen_spanish: de tu visitación
  alternatives_spanish:
  - de tu inspección
  - de tu visita
  - de tu vigilancia
  lexicon: BDAG
  rationale: ἐπισκοπή puede significar visitación, inspección u oversight. «Visitación» conserva la resonancia bíblica y la ambigüedad teológica del término, sin reducirlo a una mera inspección administrativa ni cerrar su sentido a una sola lectura.
theological_decisions:
- issue: Sentido de ἐπισκοπή en un contexto de juicio
  english_pob_reading: Rendered as 'visitation' with divine-visit nuance left implicit
  chosen_spanish_reading: «visitación», con la posibilidad de una visitación divina implícita
  alternative_spanish_readings:
  - inspección
  - visita de Dios
  - tiempo en que Dios te visitó
  rationale: El contexto de Lucas 19:44 es de juicio sobre Jerusalén, pero el sustantivo griego es más amplio que una explicación cerrada. «Visitación» conserva la tensión entre visita misericordiosa y visita judicial, como hace el texto fuente y la traducción inglesa de referencia.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de revisión indica alta concordancia con el texto fuente y con la decisión inglesa de conservar la ambigüedad de ἐπισκοπή.
  spanish_consistency_notes:
  - Se mantuvo el tuteo singular («te», «tus», «tu») para reproducir el адресamiento directo a Jerusalén personificada.
  - Se prefirió «visitación» en lugar de «inspección» para conservar la resonancia bíblico-teológica del término ἐπισκοπή.
  - Se evitó sustituir «hijos» por «habitantes» para no suavizar la imagen original de τέκνα.
  - La frase «piedra sobre piedra» conserva el modismo de destrucción total con una formulación natural en español.
