review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido globales del griego: mantiene la personificación de Jerusalén con «te», preserva «tus hijos dentro de ti», retiene el modismo de destrucción total y traduce ἀνθ’ ὧν causalmente como «porque». También conserva acertadamente la ambigüedad teológica de ἐπισκοπή con «visitación». Sin embargo, la decisión principal para ἐδαφιοῦσίν («te derribarán a ti») queda algo débil e incompleta frente al valor de «arrasar/raer hasta el suelo» del verbo, y la frase resultante suena menos natural en español que una formulación que exprese explícitamente la devastación total.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «te derribarán a ti» suena redundante y poco idiomático, especialmente al ir seguido por «y a tus hijos dentro de ti». Una mejora menor produciría una línea más natural y más cercana al matiz devastador del griego. El resto del versículo es legible y apropiado para un registro bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Visitación» alinea bien con la documentación auditada para ἐπισκοπή. «Hijos», «tiempo» y «reconociste» también son buenas decisiones contextuales. El único ajuste recomendado es lexical/estilístico en ἐδαφιοῦσίν, no terminológico.
  issues:
  - severity: medium
    issue: «te derribarán a ti» no expresa con suficiente fuerza ἐδαφιοῦσίν y suena redundante en español.
    rationale: El verbo griego indica abatir/raer hasta el suelo. «Derribar» puede servir, pero aquí la combinación «te derribarán a ti» queda poco natural y no comunica tan bien la devastación total como «te arrasarán» o «te derribarán hasta el suelo». Además, el pronombre tónico «a ti» no añade información y endurece la frase.
  revised_spanish_text: y te arrasarán[a], a ti y a tus hijos dentro de ti, y no dejarán piedra sobre piedra dentro de ti, porque no reconociste el tiempo de tu visitación.
  revised_footnotes:
  - marker: a
    text: O «el tiempo de tu inspección». El término griego puede denotar visitación o inspección, especialmente una visitación divina que puede traer misericordia o juicio.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «te derribarán a ti» por «te arrasarán, a ti» para reflejar mejor la fuerza de ἐδαφιοῦσίν y mejorar la naturalidad del español, mientras se mantiene la personificación de Jerusalén y la sintaxis enfática del original. La nota existente se conserva sin cambios porque sigue representando fielmente la ambigüedad de ἐπισκοπή.
