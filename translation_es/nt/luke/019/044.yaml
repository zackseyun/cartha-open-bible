revisions:
- from: y te derribarán[a] a ti y a tus hijos dentro de ti, y no dejarán piedra sobre piedra dentro de ti, porque no reconociste el tiempo de tu visitación.
  to: y te arrasarán[a], a ti y a tus hijos dentro de ti, y no dejarán piedra sobre piedra dentro de ti, porque no reconociste el tiempo de tu visitación.
  rationale: Se reemplaza «te derribarán a ti» por «te arrasarán, a ti» para reflejar mejor la fuerza de ἐδαφιοῦσίν y mejorar la naturalidad del español, mientras se mantiene la personificación de Jerusalén y la sintaxis enfática del original. La nota existente se conserva sin cambios porque sigue representando fielmente la ambigüedad de ἐπισκοπή.
