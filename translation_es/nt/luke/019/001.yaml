lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: Se conserva la coordinación narrativa simple del griego sin añadir matiz interpretativo. En español, "Y" reproduce la continuidad básica del relato de manera natural.
- source_word: εἰσελθὼν
  english_pob_choice: he entered
  chosen_spanish: al entrar
  alternatives_spanish:
  - habiendo entrado
  - después de entrar
  lexicon: BDAG
  rationale: El participio aoristo antecede temporalmente al verbo principal; en español, la construcción circunstancial "al entrar" comunica esa anterioridad de forma más natural y directa que una paráfrasis más pesada.
- source_word: διήρχετο
  english_pob_choice: was passing through
  chosen_spanish: seguía pasando por
  alternatives_spanish:
  - pasaba por
  - iba pasando por
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso. "Seguía pasando por" conserva ese valor imperfectivo y suena claro en español actual, sin reducirlo a un pretérito puntual.
- source_word: τὴν Ἰεριχώ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  alternatives_spanish:
  - Jericó la ciudad
  lexicon: BDAG
  rationale: Nombre propio geográfico; en español se usa la forma usual "Jericó". El artículo griego no se refleja en la traducción porque no aporta naturalidad ni información adicional en español.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente reemplazó la paráfrasis temporal más explícita (''after entering'') por una formulación más directa (''he entered'') y mantuvo el imperfecto (''was passing through''). La redacción española procura reflejar ambas decisiones: anterioridad del participio y aspecto progresivo del verbo principal, sin sobrerrepresentar la relación temporal.'
  spanish_consistency_notes:
  - Se evita "Cristo" o terminología teológica no presente en el texto.
  - '"Jericó" se mantiene como topónimo estándar en español.'
  - La construcción con participio se resolvió con "al entrar" para preservar la secuencia verbal sin calco rígido.
  - No se añadió nota textual porque el griego no presenta variante relevante en este versículo.
