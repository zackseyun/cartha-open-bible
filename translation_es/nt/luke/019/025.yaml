lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: La conjunción simple se conserva con 'Y', que en español mantiene la coordinación narrativa sin añadir matiz temporal o adversativo no explícito en el griego.
- source_word: εἶπαν
  english_pob_choice: they said
  chosen_spanish: dijeron
  alternatives_spanish:
  - estaban diciendo
  lexicon: BDAG
  rationale: 'El aoristo narrativo se vierte naturalmente con pretérito perfecto simple en español: ''dijeron''.'
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo de complemento indirecto se expresa de forma natural con el clítico dativo 'le' en español.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Sir
  - Maestro
  lexicon: BDAG
  rationale: Aunque en el contexto parabólico puede funcionar como trato respetuoso, 'Señor' preserva el valor léxico de κύριος y es la equivalencia más estable para el término en español eclesial sin forzar un tono arcaizante.
- source_word: ἔχει
  english_pob_choice: he has
  chosen_spanish: tiene
  alternatives_spanish:
  - ya tiene
  - está teniendo
  lexicon: BDAG
  rationale: El presente de posesión se expresa de manera idiomática en español con 'tiene'.
- source_word: δέκα
  english_pob_choice: ten
  chosen_spanish: diez
  lexicon: BDAG
  rationale: El numeral cardinal se traduce directamente como 'diez'.
- source_word: μνᾶς
  english_pob_choice: minas
  chosen_spanish: minas
  alternatives_spanish:
  - libras
  - minae
  lexicon: BDAG
  rationale: Se conserva el préstamo transliterado 'minas' para mantener la unidad monetaria antigua y evitar equivalencias modernas engañosas o sustituciones tradicionales menos precisas.
theological_decisions:
- issue: Tratamiento de κύριος en un diálogo dentro de una parábola
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Sir
  - Maestro
  rationale: La POB en inglés mantiene 'Lord' por consistencia léxica y por la resonancia de autoridad. En español, 'Señor' es el equivalente normal de κύριος y conserva esa misma fuerza sin introducir una lectura devocional excesiva que el contexto no exige.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Unidad monetaria μνᾶ
  english_pob_reading: minas
  chosen_spanish_reading: minas
  alternative_spanish_readings:
  - libras
  - monedas
  rationale: El término designa una unidad antigua específica; transliterarlo como 'minas' respeta el referente histórico y evita una actualización monetaria que oscurezca la medida original.
  doctrine_reference: English audit trail on μνᾶς; cultural-note policy
translation_notes:
  revision_awareness: El pasaje en inglés no presenta revisiones aplicadas; el control más reciente indica acuerdo alto y sin cambios. La versión española sigue de cerca el texto griego y el audit trail inglés, ajustando solo la sintaxis natural del español.
  spanish_consistency_notes:
  - Se mantiene 'minas' para μνᾶς, en coherencia con la política terminológica del proyecto.
  - Se traduce κύριος como 'Señor' por consistencia léxica, aunque el contexto sea un trato respetuoso en la parábola.
  - Se usa 'Y' para la coordinación inicial, sin añadir matiz interpretativo.
  - La puntuación con raya final reproduce el cierre abierto del enunciado griego.
