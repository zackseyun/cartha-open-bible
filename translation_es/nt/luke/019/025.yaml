translation:
  language: es
  text: 'Y le dijeron: «Señor[a], tiene diez minas[b]—»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor» o «amo» como forma de tratamiento para κύριος.
    reason: lexical_alternative
  - marker: b
