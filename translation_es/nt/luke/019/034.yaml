  to: 'Y ellos dijeron[a]: «El Señor tiene necesidad de él».'
  rationale: Se ajusta la frase final para un español más natural y legible sin perder la cercanía al griego ni al POB inglés. «de él» refiere al pollino de manera más idiomática que «de ello». La nota se suaviza estilísticamente manteniendo la misma alternativa léxica y teológica.
