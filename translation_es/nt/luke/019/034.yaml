review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: οἱ δὲ εἶπαν se vierte adecuadamente como «Y ellos dijeron», ὅτι queda bien representado por puntuación de cita, y «El Señor» preserva la decisión principal para Ὁ κύριος con nota para la alternativa «maestro/dueño». La referencia de αὐτοῦ al pollino también está bien entendida.'
  spanish_quality_summary: La principal dificultad es la naturalidad del español. «Tiene necesidad de ello» suena forzado y poco idiomático en español bíblico actual; además «ello» resulta distante y rígido para referirse al pollino. Una formulación como «lo necesita» o «tiene necesidad de él» sería más natural, pero para conservar el tono y la cercanía al POB inglés conviene «tiene necesidad de él». También es mejor en la nota evitar «dueño/amo», que suena esquemático, y usar una coordinación más natural.
  glossary_alignment: «Señor» para κύριος está alineado con la política del proyecto. No hay términos que activen los defaults de Yahvé, Mesías, Espíritu, etc. La nota alternativa con «maestro» es legítima; puede añadirse «dueño» como alternativa contextual sin desplazar «Señor» del texto principal.
  issues:
