    issue: «de ello» suena poco natural en español para un animal concreto
    rationale: Aunque intenta reflejar αὐτοῦ de manera no explicitada, en español «ello» es rígido y poco idiomático en este contexto narrativo. «de él» mantiene mejor la referencia al pollino sin sobreexplicitar.
  - severity: low
    issue: La nota usa «dueño/amo», formulación poco fluida
    rationale: La barra es útil en apuntes técnicos, pero en una nota para lectores conviene una formulación más natural como «dueño o amo».
