translation:
  language: es
  text: 'Y ellos dijeron[a]: «El Señor tiene necesidad de él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El maestro tiene necesidad de él», si κύριος se entiende en el sentido de dueño o amo y no como título aplicado a Jesús.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: And they
  chosen_spanish: Y ellos
  alternatives_spanish:
  - Pero ellos
  - Entonces ellos
  lexicon: BDAG
  rationale: δέ es un conector suave; en español, «Y» transmite mejor la continuación narrativa sin imponer contraste. El artículo sustantivado οἱ se refiere a los hablantes ya mencionados, por eso se traduce simplemente «ellos».
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - respondieron
  - contestaron
  lexicon: BDAG
  rationale: El aoristo de λέγω se expresa de manera directa con «dijeron». «Respondieron» o «contestaron» añadirían una matización conversacional no obligada por el verbo.
- source_word: ὅτι
  english_pob_choice: '[represented by quotation punctuation and omitted as a separate English word]'
  chosen_spanish: '[representado por los dos puntos y las comillas]'
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: ὅτι introduce el discurso directo. En español, los dos puntos y las comillas cumplen naturalmente esa función, sin necesidad de un «que» explícito.
- source_word: Ὁ κύριος
  english_pob_choice: The Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - El maestro
  lexicon: BDAG
  rationale: Se conserva el título «Señor» como la opción principal del proyecto para κύριος. En este contexto puede referirse a Jesús o al dueño del animal; la nota preserva esa ambigüedad, pero el texto principal mantiene la forma titular establecida.
- source_word: αὐτοῦ
  english_pob_choice: of it
  chosen_spanish: de ello
  alternatives_spanish:
  - de él
  - de este pollino
  lexicon: BDAG
  rationale: El genitivo se refiere de manera natural al animal mencionado, pero el español requiere un complemento con «necesidad de». «De ello» mantiene la referencia sin forzar una explicitación mayor que la del griego.
- source_word: χρείαν ἔχει
  english_pob_choice: has need
  chosen_spanish: tiene necesidad
  alternatives_spanish:
  - necesita
  - tiene necesidad de
  lexicon: BDAG
  rationale: La expresión idiomática griega χρείαν ἔχει se preserva bien con «tiene necesidad». Esta opción mantiene el tono solemne y la cercanía al giro original mejor que un simple «necesita».
theological_decisions:
- issue: Referente de κύριος en la respuesta de los discípulos
  english_pob_reading: Rendered as 'The Lord,' understood in context as referring to Jesus, while noting the alternative sense 'master/owner.'
  chosen_spanish_reading: «El Señor», entendido en contexto como referencia a Jesús, con la posibilidad alternativa de «el maestro/amo» preservada en nota.
  alternative_spanish_readings:
  - «El maestro»
  - «El dueño»
  rationale: En Lucas, κύριος puede señalar a Jesús y también significar dueño/amo. El contexto narrativo favorece la lectura titular, pero la ambigüedad léxica real no se elimina del todo; por eso se conserva en una nota en vez de resolverse de manera dogmática en el texto principal.
  doctrine_reference: 'Términos disputados: κύριος → Señor; preservar ambigüedad cuando es genuina'
translation_notes:
  revision_awareness: La versión inglesa más reciente no introdujo cambios; el testimonio revisado coincide plenamente con el texto de referencia, por lo que no se requieren ajustes derivados de revisiones posteriores.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al default del proyecto, evitando sustituirlo por «SEÑOR» o por una solución eclesiástica tradicional sin base textual directa.
  - «Tiene necesidad de ello» conserva el giro idiomático griego y evita una simplificación excesiva a «necesita».
  - La puntuación con dos puntos y comillas refleja adecuadamente el valor de ὅτι en discurso directo.
