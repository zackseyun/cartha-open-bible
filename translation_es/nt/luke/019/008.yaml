translation:
  language: es
  text: 'Pero Zaqueo, puesto de pie, dijo al Señor: «Mira, Señor, doy[a] la mitad de mis bienes a los pobres, y si a alguien le he extorsionado algo[b], se lo devuelvo cuadruplicado[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los verbos en presente en griego también pueden entenderse como «daré» y «devolveré», expresando una resolución inmediata.
    reason: alternative_reading
  - marker: b
    text: O «si he defraudado a alguien de algo». El verbo griego puede referirse a extorsionar, explotar o defraudar, a veces por falsa acusación.
    reason: lexical_alternative
lexical_decisions:
- source_word: σταθεὶς
  english_pob_choice: stood
  chosen_spanish: puesto de pie
  alternatives_spanish:
  - se puso de pie
  - estuvo de pie
  lexicon: BDAG
  rationale: El participio aoristo indica la acción narrativa de levantarse/quedar en pie antes de hablar. «Puesto de pie» conserva el valor aspectual sin sonar rígido; «se puso de pie» es la alternativa más natural.
- source_word: κύριον / κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - dueño
  - maestro
  lexicon: BDAG
  rationale: La POB en inglés mantiene «Lord» para κύριος. En español, «Señor» preserva el título respetuoso y teológicamente cargado sin reducirlo a simple cortesía.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  - Mira, aquí
  lexicon: BDAG
  rationale: Es una fórmula de atención enfática. «Mira» reproduce bien la fuerza inmediata y es idiomático en español contemporáneo.
- source_word: τὰ ἡμίσιά μου τῶν ὑπαρχόντων
  english_pob_choice: half of my possessions
  chosen_spanish: la mitad de mis bienes
  alternatives_spanish:
  - la mitad de mis posesiones
  - la mitad de lo que poseo
  lexicon: BDAG
  rationale: La frase griega se refiere a propiedades/bienes poseídos. «Bienes» comunica con naturalidad el alcance material y evita un calco pesado.
- source_word: τοῖς πτωχοῖς
  english_pob_choice: to the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - a los necesitados
  lexicon: BDAG
  rationale: Uso sustantivado normal de πτωχός. «A los pobres» es directo y fiel al referente social-económico.
- source_word: δίδωμι
  english_pob_choice: I give
  chosen_spanish: doy
  alternatives_spanish:
  - estoy dando
  - daré
  lexicon: BDAG
  rationale: El presente indicativo se conserva como presente simple. «Doy» mantiene la forma verbal y deja abierta la tensión entre práctica actual e inmediata resolución.
- source_word: εἴ τινός τι
  english_pob_choice: if I have extorted anything from anyone
  chosen_spanish: si a alguien le he extorsionado algo
  alternatives_spanish:
  - si de alguien he defraudado algo
  - si a alguien le he quitado algo por fraude
  lexicon: BDAG
  rationale: La construcción indefinida pide «a alguien ... algo». «Extorsionado» sigue la decisión léxica del inglés para συκοφαντέω y preserva el matiz de abuso/obtención indebida.
- source_word: ἐσυκοφάντησα
  english_pob_choice: have extorted
  chosen_spanish: le he extorsionado
  alternatives_spanish:
  - le he defraudado
  - le he explotado
  lexicon: BDAG
  rationale: συκοφαντέω puede implicar extorsión, explotación o defraudación, a menudo mediante abuso de poder o falsa acusación. «Extorsionado» conserva esa dureza y encaja con el contexto de restitución.
- source_word: ἀποδίδωμι
  english_pob_choice: I repay
  chosen_spanish: se lo devuelvo
  alternatives_spanish:
  - lo repago
  - lo restituyo
  - se lo pago de vuelta
  lexicon: BDAG
  rationale: El verbo expresa devolver/repagar en clave de restitución. «Se lo devuelvo» es natural en español; el objeto pronominal explicita el retorno de lo obtenido indebidamente.
- source_word: τετραπλοῦν
  english_pob_choice: fourfold
  chosen_spanish: cuadruplicado
  alternatives_spanish:
  - cuatro veces
  - por cuatro
  lexicon: BDAG
  rationale: El adjetivo/adverbio adverbial indica restitución en cuatro partes. «Cuadruplicado» es preciso y formal; «cuatro veces» sería una alternativa más llana.
theological_decisions:
- issue: Fuerza de los presentes δίδωμι y ἀποδίδωμι
  english_pob_reading: Render as simple present ('I give ... I repay')
  chosen_spanish_reading: Render como presente simple («doy ... devuelvo»), sin convertirlo en futuro en el texto principal
  alternative_spanish_readings:
  - «daré ... devolveré»
  - «estoy dando ... estoy devolviendo»
  rationale: El griego usa indicativos presentes. Traducirlos como presente simple preserva la forma y deja sin resolver si Zaqueo describe una práctica actual, una resolución inmediata, o ambas cosas. Así se conserva la tensión interpretativa documentada por la POB inglesa.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de control cruzado es de alta concordancia y coincide con la lectura previa. Se mantiene la decisión de conservar los presentes griegos y la ambigüedad léxica de συκοφαντέω mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en coherencia con el tratamiento del término en la serie.
  - «Pobres» conserva el sustantivo social de πτωχοί sin suavizarlo a «necesitados».
  - «Bienes» para ὑπάρχοντα sigue el uso de la POB inglesa y su referencia a posesiones materiales.
  - La restitución «cuadruplicado» conserva la idea de quadruple restitution sin expandirla innecesariamente.
