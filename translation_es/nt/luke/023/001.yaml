translation:
  language: es
  text: Y todos ellos se levantaron y lo llevaron a Pilato[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'toda la multitud de ellos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Conserva el conector narrativo simple del griego y mantiene el flujo de la escena sin añadir énfasis temporal interpretativo.
- source_word: ἀναστὰν
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - habiéndose levantado
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: El participio aoristo funciona de modo adverbial antes del verbo principal; en español, 'se levantó' comunica con naturalidad la acción previa sin forzar una construcción más pesada.
- source_word: ἅπαν τὸ πλῆθος αὐτῶν
  english_pob_choice: the whole assembly of them
  chosen_spanish: toda la asamblea de ellos
  alternatives_spanish:
  - toda la multitud de ellos
  - todo su grupo
  - toda la muchedumbre de ellos
  lexicon: BDAG
  rationale: En este contexto judicial, 'asamblea' refleja mejor un cuerpo reunido y deliberativo que 'multitud'; 'de ellos' conserva el genitivo explícito del griego sin borrarlo.
- source_word: ἤγαγον
  english_pob_choice: led
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo guiaron
  - lo condujeron
  - lo trajeron
  lexicon: BDAG
  rationale: El aoristo de ἄγω puede significar 'llevar' o 'conducir'; en español, 'lo llevaron' expresa de forma natural el traslado bajo custodia hacia Pilato.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: Pronombre directo normal en español; el referente a Jesús queda claro por el contexto inmediato.
- source_word: ἐπὶ τὸν Πιλᾶτον
  english_pob_choice: to Pilate
  chosen_spanish: ante Pilato
  alternatives_spanish:
  - a Pilato
  - frente a Pilato
  - hasta Pilato
  lexicon: BDAG
  rationale: Aunque el valor básico de movimiento hacia una persona puede traducirse con 'a', el contexto judicial hace que 'ante Pilato' comunique mejor el sentido de comparecer delante de él sin exceder la evidencia contextual.
- source_word: Πιλᾶτον
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  alternatives_spanish:
  - Pilato el gobernador
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar en español.
theological_decisions:
- issue: Valor de ἐπὶ con acusativo en contexto judicial
  english_pob_reading: to Pilate
  chosen_spanish_reading: ante Pilato
  alternative_spanish_readings:
  - a Pilato
  - frente a Pilato
  rationale: La escena no describe solo dirección espacial, sino la presentación del acusado ante la autoridad. 'Ante Pilato' preserva esa implicación judicial sin añadir detalles inexistentes en el griego.
  doctrine_reference: Principio de equivalencia óptima y primacía del texto original; sin conflicto doctrinal
- issue: Distinción entre πλῆθος y una institución formal
  english_pob_reading: the whole assembly of them
  chosen_spanish_reading: toda la asamblea de ellos
  alternative_spanish_readings:
  - toda la multitud de ellos
  - todo su grupo
  rationale: '''Asamblea'' evita reducir la escena a una masa amorfa y también evita imponer una formalidad institucional mayor de la que el griego exige. Mantiene la tensión entre colectividad y escena procesal.'
  doctrine_reference: Lectura contextual del discurso narrativo; sin implicación doctrinal
translation_notes:
  revision_awareness: La redacción sigue de cerca la traducción auditada en inglés, pero ajusta el valor de ἐπὶ τὸν Πιλᾶτον al español judicial natural 'ante Pilato', una elección contextual ya implícita en el audit trail inglés ('before Pilate' como alternativa interpretiva). No se identifican cambios textuales críticos ni variantes relevantes en el expediente proporcionado.
  spanish_consistency_notes:
  - Se mantiene 'Pilato' como transliteración uniforme del nombre propio.
  - Se usa 'asamblea' para πλῆθος en este contexto, en coherencia con la lectura colectiva no meramente cuantitativa.
  - Se evita 'Señor' u otras fórmulas teológicas no presentes en el versículo.
