revisions:
- from: Y toda la asamblea de ellos se levantó y lo llevaron ante Pilato.
  to: Y todos ellos se levantaron y lo llevaron a Pilato[a].
  rationale: Se rehízo la cláusula para producir un español natural y coherente, preservando a la vez la fuerza colectiva de ἅπαν τὸ πλῆθος αὐτῶν mediante 'todos ellos'. Se cambió 'ante Pilato' por 'a Pilato' para ajustarse mejor al valor direccional de ἐπὶ con acusativo y al texto principal auditado en inglés. Se añadió la nota con la alternativa 'multitud' porque el POB inglés la documentó explícitamente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:02:32Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la secuencia narrativa general, pero no preserva del todo dos rasgos del griego y del rastro POB en inglés: 1) hay discordancia de número entre el sujeto singular colectivo πλῆθος y el verbo español singular ''se levantó'' frente al plural posterior ''lo llevaron''; 2) ''ante Pilato'' introduce una matización más interpretativa que el valor básico de movimiento de ἐπὶ τὸν Πιλᾶτον, donde el inglés POB prefirió ''to Pilate''. Además, se omitió la alternativa léxica documentada para πλῆθος.'
  spanish_quality_summary: '''Toda la asamblea de ellos'' es inteligible y digno, pero el conjunto suena algo forzado por la mezcla de sujeto singular con verbo plural. En español fluye mejor un sujeto plural explícito (''todos ellos'') o una estructura plenamente singular, pero esta última sería menos natural con ''llevaron''. También conviene evitar ''ante Pilato'' aquí para mantener una formulación más directa y menos interpretativa.'
  glossary_alignment: 'No hay conflicto con terminología doctrinal del proyecto. La decisión clave es léxica/sintáctica: πλῆθος puede representarse como ''asamblea'', pero en español conviene ajustar la sintaxis para legibilidad. Se debe conservar la alternativa documentada ''multitud'' en nota, ya que el inglés POB la preservó.'
  issues:
  - severity: medium
    issue: Discordancia sintáctica en el sujeto colectivo
    rationale: El griego tiene sujeto singular colectivo (ἅπαν τὸ πλῆθος αὐτῶν) con verbo plural semántico (ἤγαγον). En español, 'toda la asamblea de ellos se levantó y lo llevaron' suena defectuoso por cambiar de singular a plural sin apoyo suficiente.
  - severity: medium
    issue: '''Ante Pilato'' es más interpretativo que el griego base y que la decisión inglesa auditada'
    rationale: ἐπὶ τὸν Πιλᾶτον tras verbo de movimiento se refleja de forma más directa con 'a Pilato'. 'Ante Pilato' puede estar implícito por el contexto judicial, pero añade una capa interpretativa que el POB inglés evitó en el texto principal.
  - severity: low
    issue: Falta la nota de alternativa léxica para πλῆθος
    rationale: El rastro inglés conservó la alternativa 'the whole multitude of them'. La revisión española debería reflejar una alternativa equivalente para mantener la transparencia léxica del proyecto.
  revised_spanish_text: Y todos ellos se levantaron y lo llevaron a Pilato[a].
  revised_footnotes:
  - marker: a
    text: O 'toda la multitud de ellos'.
    reason: lexical_alternative
  revision_rationale: Se rehízo la cláusula para producir un español natural y coherente, preservando a la vez la fuerza colectiva de ἅπαν τὸ πλῆθος αὐτῶν mediante 'todos ellos'. Se cambió 'ante Pilato' por 'a Pilato' para ajustarse mejor al valor direccional de ἐπὶ con acusativo y al texto principal auditado en inglés. Se añadió la nota con la alternativa 'multitud' porque el POB inglés la documentó explícitamente.
