translation:
  language: es
  text: Y he aquí[a] un hombre llamado José, miembro del consejo, hombre bueno y recto—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombre bueno y justo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἰδοὺ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mirad
  - Ahora he aquí
  lexicon: BDAG
  rationale: Conserva el marcador discursivo de Lucas y el giro de atención de ἰδού. «He aquí» mantiene la fuerza formal de «behold» sin sonar forzado en español bíblico actual.
- source_word: ἀνὴρ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: BDAG
  rationale: ἀνήρ designa aquí a un varón adulto individual. En español, «un hombre» reproduce esa referencia con precisión de género y número.
- source_word: ὀνόματι Ἰωσὴφ
  english_pob_choice: named Joseph
  chosen_spanish: llamado José
  alternatives_spanish:
  - de nombre José
  - con el nombre de José
  lexicon: BDAG
  rationale: La construcción dativa idiomática se vierte de modo natural en español con «llamado», sin perder la fórmula introductoria del nombre propio.
- source_word: βουλευτὴς ὑπάρχων
  english_pob_choice: who was a council member
  chosen_spanish: miembro del consejo
  alternatives_spanish:
  - consejero
  - miembro del sanedrín
  - concejal
  lexicon: BDAG
  rationale: βουλευτής indica pertenencia a un consejo gobernante. «Miembro del consejo» es claro y evita un término más interpretativo como «concejal»; el contexto narrativo sugiere el consejo judío.
- source_word: ἀνὴρ ἀγαθὸς καὶ δίκαιος
  english_pob_choice: a good and righteous man
  chosen_spanish: hombre bueno y justo
  alternatives_spanish:
  - hombre bueno y recto
  - hombre bueno y righteous
  lexicon: BDAG
  rationale: Se conserva la repetición de ἀνήρ con «hombre» para mantener el énfasis del texto. Para δίκαιος, «justo» es una equivalencia natural y fiel; en español también puede expresar la cualidad ética de rectitud que el contexto exige.
theological_decisions:
- issue: Valor de δίκαιος en la caracterización de José
  english_pob_reading: righteous
  chosen_spanish_reading: justo
  alternative_spanish_readings:
  - recto
  - righteous
  rationale: En esta descripción narrativa, δίκαιος apunta a integridad moral y rectitud delante de Dios y de los demás. «Justo» preserva ese campo semántico sin introducir una afirmación doctrinal técnica; «recto» sería posible, pero menos directo en español bíblico.
  doctrine_reference: Translation philosophy §5; notas de δικαιοσύνη/δίκαιος en el glosario POB
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alta concordancia, sin revisiones aplicadas en la última pasada. La única decisión sensible es δίκαιος, donde el inglés opta por «righteous» y admite «just» como alternativa; en español se eligió «justo» por naturalidad y precisión semántica.
  spanish_consistency_notes:
  - Se mantiene el orden narrativo breve y la pausa final con raya, acorde con el versículo incompleto en el fuente.
  - Se evita «SEÑOR» u otras sustituciones porque no aparecen en este versículo.
  - «Consejo» se usa de forma genérica conforme al audit trail, sin forzar una identificación explícita que el griego no nombra aquí.
