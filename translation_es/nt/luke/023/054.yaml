translation:
  language: es
  text: Y era el día de Preparación, y el sábado estaba comenzando[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «estaba despuntando». El verbo griego puede significar «despuntar» o «comenzar»; aquí se refiere al inicio del sábado al anochecer.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρασκευῆς
  english_pob_choice: Preparation
  chosen_spanish: Preparación
  alternatives_spanish:
  - preparación
  - día de preparación
  - viernes
  lexicon: BDAG
  rationale: παρασκευή en el uso judeo-griego puede nombrar el día de preparación antes del sábado. Con mayúscula, «Preparación» conserva ese valor terminológico sin sustituirlo por la equivalencia interpretativa «viernes»; también mantiene la conexión con la formulación inglesa auditada.
- source_word: σάββατον
  english_pob_choice: the Sabbath
  chosen_spanish: el sábado
  alternatives_spanish:
  - el Sabbat
  - el día de reposo
  lexicon: BDAG
  rationale: En español bíblico, «sábado» comunica de manera natural y directa el día semanal al que se refiere el contexto. «Sabbat» sería más transliterado, pero menos transparente para el lector común; «día de reposo» añade interpretación y puede ocultar el término base.
- source_word: ἐπέφωσκεν
  english_pob_choice: was dawning
  chosen_spanish: estaba despuntando
  alternatives_spanish:
  - estaba amaneciendo
  - estaba despuntando
  - estaba comenzando
  lexicon: BDAG
  rationale: El verbo puede significar «dawn» o «begin», pero aquí la referencia es al comienzo del sábado al anochecer. «Estaba despuntando» preserva la imagen verbal del inglés auditado («was dawning») sin inducir necesariamente a pensar en amanecer matutino; «estaba comenzando» aclara el sentido temporal pero pierde la imagen.
- source_word: ἡμέρα ἦν παρασκευῆς
  english_pob_choice: it was the day of Preparation
  chosen_spanish: era el día de Preparación
  alternatives_spanish:
  - era día de Preparación
  - era el día de preparación
  - era el día de preparativos
  lexicon: BDAG
  rationale: La construcción se vierte de modo idiomático en español manteniendo el genitivo de pertenencia/denominación. La mayúscula en «Preparación» sigue la decisión lexical de tratarlo como designación reconocible del día.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: y
  alternatives_spanish:
  - y entonces
  - además
  lexicon: BDAG
  rationale: Se conserva la coordinación narrativa simple de Lucas sin añadir matiz discursivo no indicado por el griego.
theological_decisions:
- issue: Sentido de ἐπέφωσκεν respecto al inicio del sábado
  english_pob_reading: The verse refers to the Sabbath beginning at evening, not to morning dawn.
  chosen_spanish_reading: El versículo se refiere al comienzo del sábado al anochecer, no al amanecer de la mañana.
  alternative_spanish_readings:
  - el sábado estaba amaneciendo
  - el sábado estaba despuntando
  rationale: En el contexto judío los días se cuentan de tarde a tarde. Por eso el verbo se traduce con una expresión que conserva la imagen de «despuntar» pero evita que el lector suponga erróneamente una escena de amanecer matutino. La alternativa más literal se mantiene en nota para no borrar la tensión léxica.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de «was beginning» a «was dawning» para reflejar más de cerca ἐπέφωσκεν sin perder naturalidad. La redacción española sigue esa decisión: mantiene la imagen de «despuntando» y, a la vez, aclara en nota que el referente temporal es el inicio del sábado al anochecer.'
  spanish_consistency_notes:
  - Se usa «Y» al inicio para reflejar la coordinación narrativa del griego.
  - «Preparación» se capitaliza como designación terminológica del día, en paralelo con la estrategia inglesa.
  - Se evita «SEÑOR» o «día de reposo» porque no corresponden a este versículo ni al término base auditado.
  - La nota sobre ἐπέφωσκεν preserva la alternativa literal sin resolverla de manera opaca.
  - No se introduce «Cristo» ni terminología cristológica, ya que el versículo no la contiene.
