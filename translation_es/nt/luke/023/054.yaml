  - severity: medium
    issue: «Estaba despuntando» es posible, pero en español puede sonar extraño o ambiguo en referencia al sábado que inicia al anochecer.
    rationale: El audit trail explica que el sentido contextual es el comienzo del sábado al caer la tarde. «Estaba comenzando» expresa mejor ese valor semántico para lectores hispanos sin introducir la falsa impresión de amanecer matutino.
  - severity: medium
