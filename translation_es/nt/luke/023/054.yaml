    rationale: «El sábado» no requiere una nota explicativa adicional, y la explicación teológica de [c] se puede condensar en una única nota léxica sobre el verbo, como en el POB inglés.
  revised_spanish_text: Y era el día de Preparación, y el sábado estaba comenzando[a].
