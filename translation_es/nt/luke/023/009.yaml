translation:
  language: es
  text: Entonces lo estuvo interrogando[a] extensamente, pero él no le respondió nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con muchas palabras» o «con muchas preguntas». La expresión griega subraya un interrogatorio verbal prolongado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτα
  english_pob_choice: questioned
  chosen_spanish: lo interrogó
  alternatives_spanish:
  - le preguntó
  - lo estuvo interrogando
  - lo cuestionó
  lexicon: BDAG
  rationale: El imperfecto sugiere acción շարունակada o repetida. En español, «interrogó» comunica mejor que una simple pregunta una indagación insistente y sostenida, acorde con el contexto de una audiencia judicial o investigativa. Mantiene más fuerza que «preguntó» sin añadir contenido no sustentado.
- source_word: δὲ
  english_pob_choice: So / but
  chosen_spanish: Así que / pero
  alternatives_spanish:
  - y
  - entonces
  - sin embargo
  lexicon: BDAG
  rationale: El primer δέ funciona como enlace narrativo suave; «Así que» conserva la fluidez. El segundo marca contraste entre la insistencia de Herodes y el silencio de Jesús; «pero» es natural y suficiente en español.
- source_word: ἐν λόγοις ἱκανοῖς
  english_pob_choice: at considerable length
  chosen_spanish: largamente
  alternatives_spanish:
  - con muchas palabras
  - con muchas preguntas
  - extensamente
  lexicon: BDAG
  rationale: La expresión griega es idiomática y enfatiza una conversación prolongada. «Largamente» comunica duración verbal sin forzar una traducción demasiado literal como «con muchas palabras». Evita limitar λόγοις a «preguntas», algo que el griego no dice de forma explícita.
- source_word: λόγοις
  english_pob_choice: length
  chosen_spanish: largamente
  alternatives_spanish:
  - palabras
  - preguntas
  - discursos
  lexicon: BDAG
  rationale: Dentro de la locución ἐν λόγοις ἱκανοῖς, λόγοις apunta al intercambio verbal prolongado, no a unidades léxicas aisladas. Por eso se integra en un adverbio de modo/duración en español.
- source_word: ἱκανοῖς
  english_pob_choice: considerable
  chosen_spanish: largamente
  alternatives_spanish:
  - considerablemente
  - en gran medida
  - con abundancia
  lexicon: BDAG
  rationale: ἱκανός aquí intensifica la extensión del discurso. En español, el matiz se expresa de manera natural con «largamente», que transmite duración considerable sin sobreexplicar el grado.
- source_word: οὐδὲν ἀπεκρίνατο
  english_pob_choice: he answered him nothing
  chosen_spanish: no le respondió nada
  alternatives_spanish:
  - no le contestó nada
  - no le dio respuesta alguna
  - nada le respondió
  lexicon: BDAG
  rationale: La construcción griega niega la respuesta de Jesús de manera enfática. «No le respondió nada» preserva la fuerza semítica/grecolatina del giro sin convertirlo en una paráfrasis explicativa.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa naturalmente con el clítico dativo español «le». Mantiene la referencia a Herodes sin recargar la frase con un complemento preposicional.
theological_decisions:
- issue: Silencio de Jesús ante Herodes
  english_pob_reading: but he answered him nothing
  chosen_spanish_reading: pero él no le respondió nada
  alternative_spanish_readings:
  - pero no respondió nada
  - sin embargo, no le respondió
  rationale: No hay desarrollo doctrinal explícito en el versículo; la traducción debe mantener el hecho narrativo del silencio de Jesús sin interpretarlo. Se conserva la oposición entre la insistencia de Herodes y la ausencia de respuesta.
  doctrine_reference: Narrative Christology / Passion narrative
translation_notes:
  revision_awareness: El contexto inglés ya había optado por una equivalencia óptima y no reportó revisiones sustantivas; esta propuesta mantiene ese nivel de fidelidad y conserva la tensión del texto griego entre insistencia verbal y silencio.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita «Cristo» porque no aparece en el pasaje.
  - Se mantiene «le» como dativo natural en español para αὐτῷ.
  - La nota al pie conserva la alternativa lexical relevante que el inglés documentó para la frase idiomática.
