translation:
  language: es
  text: Pero ni siquiera Herodes[a], porque nos lo devolvió. Y he aquí, nada digno de muerte se ha hecho por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero ni Herodes, porque nos lo devolvió; y he aquí, nada digno de muerte se ha hecho por él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’ οὐδὲ
  english_pob_choice: But neither did
  chosen_spanish: Pero ni siquiera
  alternatives_spanish:
  - Pero tampoco
  - Pero no siquiera
  lexicon: BDAG
  rationale: La combinación introduce contraste y añade a Herodes como otra autoridad que tampoco halló delito capital. En español, «ni siquiera» comunica con naturalidad esa fuerza aditiva y contrastiva sin forzar una elipsis verbal innecesaria.
- source_word: Ἡρῴδης
  english_pob_choice: Herod
  chosen_spanish: Herodes
  alternatives_spanish:
  - Herod
  lexicon: nombre propio
  rationale: Se conserva la transliteración estándar al español del nombre propio.
- source_word: ἀνέπεμψεν
  english_pob_choice: sent ... back
  chosen_spanish: lo volvió a enviar
  alternatives_spanish:
  - lo envió de vuelta
  - lo remitió
  lexicon: BDAG
  rationale: En contexto judicial, ἀναπέμπω puede implicar devolver o remitir a una autoridad. «Lo volvió a enviar» conserva la idea de retorno y mantiene un español natural y claro.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la cláusula explicativa que justifica la afirmación anterior. «Porque» es claro y apropiado en español contemporáneo.
- source_word: πρὸς ἡμᾶς
  english_pob_choice: to us
  chosen_spanish: a nosotros
  alternatives_spanish:
  - hacia nosotros
  - para nosotros
  lexicon: BDAG
  rationale: El complemento expresa dirección hacia quienes hablan. «A nosotros» es el equivalente más natural en español; el sentido de retorno ya queda expresado por el verbo compuesto.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ved
  lexicon: BDAG
  rationale: «He aquí» reproduce el valor discursivo de atención y solemnidad de ἰδού con un registro bíblico comprensible y no anticuado en exceso.
- source_word: οὐδὲν ἄξιον θανάτου
  english_pob_choice: nothing deserving of death
  chosen_spanish: nada digno de muerte
  alternatives_spanish:
  - nada merecedor de muerte
  - nada que merezca muerte
  lexicon: BDAG
  rationale: La frase expresa ausencia de causa para pena capital. «Digno de muerte» mantiene la fuerza judicial y se ajusta bien al español bíblico sin perder claridad.
- source_word: ἐστὶν πεπραγμένον
  english_pob_choice: has been done
  chosen_spanish: ha sido hecho
  alternatives_spanish:
  - ha sido cometido
  - se ha hecho
  lexicon: BDAG
  rationale: La perífrasis perfecta comunica una acción concluida con relevancia presente. «Ha sido hecho» es una correspondencia directa y suficientemente amplia para el hecho indefinido bajo juicio.
- source_word: αὐτῷ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - de su parte
  - por este hombre
  lexicon: BDAG
  rationale: En este contexto, el dativo se entiende como agente con el participio pasivo perfecto. «Por él» evita la lectura errónea de que algo fue hecho 'a él'.
theological_decisions:
- issue: Sentido del dativo αὐτῷ con πεπραγμένον
  english_pob_reading: 'agent: ''done by him'''
  chosen_spanish_reading: 'agente: «hecho por él»'
  alternative_spanish_readings:
  - «hecho en él»
  - «hecho a él»
  rationale: El contexto es un veredicto de inocencia respecto de un delito capital. Por eso el dativo se interpreta como agente del participio pasivo, no como objeto de una acción sufrida por Jesús.
  doctrine_reference: Inocencia de Jesús ante el juicio humano; coherente con el testimonio narrativo lucano.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de 'And look' a 'And behold' para ajustar el registro de ἰδοὺ. En español se eligió «he aquí» para mantener esa solemnidad con naturalidad bíblica.
  spanish_consistency_notes:
  - Se mantuvo «Herodes» como nombre propio estándar en español.
  - Se preservó la fuerza judicial de «nada digno de muerte».
  - «Por él» se usa para reflejar el valor agente del dativo con el participio pasivo.
  - «He aquí» funciona como equivalente reverente y transparente de ἰδοὺ.
