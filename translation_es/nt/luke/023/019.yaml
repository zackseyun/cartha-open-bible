  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico del griego: se refiere a Barrabás, encarcelado por una revuelta en la ciudad y por homicidio. Conserva bien la relación causal de διὰ con los dos cargos y mantiene la referencia implícita a «la ciudad». También preserva la nota léxica sobre στάσις.'
  spanish_quality_summary: La redacción es generalmente clara, pero «había sido arrojado en la cárcel» suena poco natural en español; la expresión idiomática es «arrojado a la cárcel» o mejor «echado/metido en la cárcel». Además, «una cierta insurrección» es fiel pero algo tieso; «una insurrección» o «cierta insurrección» serían más naturales, aunque no es imprescindible. «Homicidio» es aceptable, pero en registro bíblico general «asesinato» suele ser más claro para lectores no jurídicos. La mejora principal necesaria es la preposición con «arrojado».
  glossary_alignment: No hay términos teológicos de proyecto en juego aquí. El manejo de στάσις como «insurrección» concuerda con la evidencia y la nota. La elección de «homicidio» no contradice el glosario, aunque «asesinato» reflejaría con más claridad el valor de φόνος para lectura eclesial general.
  issues:
  - severity: medium
    issue: 'Expresión no idiomática: «arrojado en la cárcel»'
    rationale: Para βληθεὶς ἐν τῇ φυλακῇ, el español natural exige «a la cárcel» si se conserva «arrojado». «En la cárcel» describe estado o ubicación, pero con «arrojado» la construcción suena forzada.
  - severity: low
    issue: «Una cierta insurrección» suena rígido en español
    rationale: Aunque reproduce τινὰ de manera formal, la combinación es menos natural en español bíblico moderno. Puede mantenerse si se prioriza la explicitud, pero conviene suavizarla.
  - severity: low
    issue: «Homicidio» es técnico-jurídico
    rationale: φόνος expresa asesinato/muerte criminal. «Homicidio» es defendible, pero «asesinato» comunica mejor el sentido para lectores generales.
