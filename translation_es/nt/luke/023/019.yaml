translation:
  language: es
  text: que había sido arrojado a la cárcel por cierta insurrección que había ocurrido en la ciudad[a], y por asesinato.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Insurrección» traduce στάσις en su sentido de revuelta o levantamiento violento; también podría entenderse como «levantamiento» o «rebelión».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅστις
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el cual
  lexicon: BDAG
  rationale: En este contexto el relativo remite a Barrabás de manera directa; en español, «que» produce la relación relativa más natural y sobria sin añadir énfasis innecesario.
- source_word: διὰ στάσιν τινὰ
  english_pob_choice: for a certain uprising
  chosen_spanish: por una cierta insurrección
  alternatives_spanish:
  - por un cierto levantamiento
  - por una cierta rebelión
  lexicon: BDAG
  rationale: «στάσις» puede abarcar disturbio cívico, revuelta o insurrección. Dado el paralelo con el contexto judicial y el matiz político, «insurrección» conserva mejor la fuerza revolucionaria que un término más débil como «levantamiento».
- source_word: τινὰ
  english_pob_choice: a certain
  chosen_spanish: una cierta
  alternatives_spanish:
  - alguna
  lexicon: BDAG
  rationale: La indefinición de τις se mantiene con «una cierta», que refleja bien la indeterminación del griego y el orden enfático del sintagma.
- source_word: γενομένην ἐν τῇ πόλει
  english_pob_choice: that had taken place in the city
  chosen_spanish: que había ocurrido en la ciudad
  alternatives_spanish:
  - que había tenido lugar en la ciudad
  - ocurrida en la ciudad
  lexicon: BDAG
  rationale: El participio aoristo medio se vierte naturalmente con una relativa en pretérito pluscuamperfecto. «Había ocurrido» es claro y fiel al carácter eventivo del griego.
- source_word: φόνον
  english_pob_choice: murder
  chosen_spanish: homicidio
  alternatives_spanish:
  - asesinato
  - muerte
  lexicon: BDAG
  rationale: φόνος denota asesinato/homicidio criminal. «Homicidio» conserva el sentido jurídico-criminal sin decidir de forma excesiva por la especificación de «asesinato».
- source_word: βληθεὶς ἐν τῇ φυλακῇ
  english_pob_choice: had been thrown into prison
  chosen_spanish: había sido arrojado en la cárcel
  alternatives_spanish:
  - había sido echado en la cárcel
  - había sido puesto en la cárcel
  lexicon: BDAG
  rationale: El pasivo de βάλλω conserva la imagen de arrojar/lançar. «Arrojado» mantiene esa fuerza verbal y «en la cárcel» expresa de forma idiomática el recinto de detención.
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «because of» por «for» para estrechar el paralelo con «for murder»; en español se refleja con la repetición causal «por ... y por ...», manteniendo la estructura y el sentido judicial del texto.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o lenguaje de título litúrgico porque el versículo no lo requiere.
  - Se mantiene la referencia genérica a «la ciudad» como en el griego, sin identificarla explícitamente.
  - «Homicidio» conserva el matiz jurídico-criminal del griego sin sobretraducirlo como «asesinato».
