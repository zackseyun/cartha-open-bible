- from: que había sido arrojado en la cárcel por una cierta insurrección que había ocurrido en la ciudad[a], y por homicidio.
  to: que había sido arrojado a la cárcel por cierta insurrección que había ocurrido en la ciudad[a], y por asesinato.
  rationale: Se corrige «en la cárcel» a «a la cárcel» para español idiomático y fiel al movimiento implícito en βληθεὶς. Se suaviza «una cierta insurrección» a «cierta insurrección» para mantener la indefinición de τινὰ sin rigidez innecesaria. Se cambia «homicidio» por «asesinato» para reflejar con mayor claridad el valor de φόνος en lectura eclesial general, sin perder el matiz criminal.
