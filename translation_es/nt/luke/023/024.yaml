translation:
  language: es
  text: Y Pilato decidió que se concediera su petición[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Pilato dio sentencia de que se cumpliera su petición».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Conserva la conexión narrativa inmediata sin añadir una matiz temporal o conclusivo que el griego no expresa de manera explícita.
- source_word: Πιλᾶτος
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  lexicon: Nombre propio transliterado estándar
  rationale: Se mantiene la forma habitual en español para el nombre propio, en continuidad con el texto fuente y la convención bíblica.
- source_word: ἐπέκρινεν
  english_pob_choice: decided
  chosen_spanish: decidió
  alternatives_spanish:
  - dio sentencia
  - resolvió
  - dictaminó
  lexicon: BDAG
  rationale: El verbo tiene un matiz judicial de emitir una decisión. «Decidió» comunica con claridad ese acto formal sin sobrecargarlo con el tecnicismo de una sentencia penal específica.
- source_word: γενέσθαι
  english_pob_choice: should be granted
  chosen_spanish: se concediera
  alternatives_spanish:
  - se hiciera
  - ocurriera
  - tuviera lugar
  lexicon: BDAG
  rationale: Como infinitivo complementario con ἐπέκρινεν, expresa que el resultado pedido debía llegar a realizarse. En español, «se concediera» capta bien la idea de autorizar o dar curso a la petición.
- source_word: τὸ αἴτημα
  english_pob_choice: their demand
  chosen_spanish: su demanda
  alternatives_spanish:
  - su petición
  - su solicitud
  lexicon: BDAG
  rationale: αἴτημα puede ser «petición», «solicitud» o «demanda». Dado el contexto de presión hostil de la multitud, «demanda» preserva mejor la fuerza del término, como en la traducción inglesa POB.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de ellos mismos
  lexicon: BDAG
  rationale: El posesivo singular español naturaliza el plural griego y remite a los que presionaban a Pilato; el sentido colectivo ya queda claro por el contexto.
theological_decisions:
- issue: Matiz judicial de la decisión de Pilato
  english_pob_reading: Pilate decided that their demand should be granted
  chosen_spanish_reading: Pilato decidió que se concediera su demanda
  alternative_spanish_readings:
  - Pilato dio sentencia para que se cumpliera su petición
  - Pilato dictaminó que se realizara su demanda
  rationale: La frase debe conservar el acto formal de decisión judicial sin convertirlo en una sentencia penal más específica de lo que el griego exige. La opción elegida mantiene el peso legal y la claridad moderna.
  doctrine_reference: 'Principio de equivalencia óptima: conservar el sentido llano del texto sin ampliar su alcance.'
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y el rastro de auditoría inglés POB. La revisión inglesa quedó sin cambios, y la propuesta española procura reflejar ese mismo equilibrio entre claridad moderna y fuerza judicial del verbo ἐπέκρινεν.
  spanish_consistency_notes:
  - Se mantiene «Pilato» como nombre propio estándar.
  - Se usa «demanda» para reflejar la fuerza de αἴτημα en este contexto.
  - No se introduce «SEÑOR» ni otra cobertura teológica no pertinente al versículo.
  - La puntuación y el orden siguen una cadencia natural en español bíblico contemporáneo.
