  glossary_alignment: 'Sin términos del glosario mayor implicados salvo consistencia de estilo. La principal tensión terminológica está en καταπέτασμα: el proyecto favorece un equivalente moderno en el texto principal; por eso conviene «cortina» y dejar «velo» en nota alternativa. «Templo» y «se oscureció» están alineados con las decisiones auditadas.'
