translation:
  language: es
  text: cuando el sol se oscureció[a], y la cortina[b] del templo se rasgó por la mitad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando el sol se eclipsó» o «cuando el sol estaba oscurecido»; el griego no exige un tecnicismo astronómico.'
    reason: alternative_reading
  - marker: b
    text: 'O: «el velo del templo».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «por en medio» o «en dos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ ἡλίου ἐκλιπόντος
  english_pob_choice: the sun having been darkened
  chosen_spanish: cuando el sol se oscureció
  alternatives_spanish:
  - cuando el sol se eclipsó
  - cuando el sol se apagó
  - cuando el sol se desvaneció
  lexicon: BDAG
  rationale: El participio genitivo describe una circunstancia concomitante; en español, una subordinada temporal resulta natural y conserva el marco narrativo. «Se oscureció» refleja bien el efecto descrito por ἐκλιπόντος en contexto sin forzar una explicación técnica como «eclipsó», que sería más específica de lo que el griego exige.
- source_word: ἐσχίσθη
  english_pob_choice: was torn
  chosen_spanish: se rasgó
  alternatives_spanish:
  - se partió
  - se rompió
  - se desgarró
  lexicon: BDAG
  rationale: El aoristo pasivo de σχίζω se traduce de manera natural con «rasgar(se)» para un paño o cortina. «Se rasgó» mantiene la imagen física del desgarro y suena idiomático en español.
- source_word: τὸ καταπέτασμα
  english_pob_choice: the curtain
  chosen_spanish: el velo
  alternatives_spanish:
  - la cortina
  - el cortinaje
  lexicon: BDAG
  rationale: Aunque el audit trail inglés prefirió «curtain», en español «velo» es el término más asentado para el dividerio del templo y conserva la equivalencia tradicional sin perder inteligibilidad. Se mantiene la posibilidad léxica «cortina» como alternativa, pero «velo» resulta más natural en este contexto bíblico.
- source_word: τοῦ ναοῦ
  english_pob_choice: of the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del santuario
  lexicon: BDAG
  rationale: ναός se refiere aquí al templo/santuario propiamente dicho. «Templo» es la equivalencia más natural y reconocible en español, mientras que «santuario» sería más técnico y menos idiomático en esta frase.
- source_word: μέσον
  english_pob_choice: in the middle
  chosen_spanish: por la mitad
  alternatives_spanish:
  - en medio
  - en dos
  lexicon: BDAG
  rationale: La expresión final indica el modo/resultante de la rotura. «Por la mitad» comunica con claridad que el rasgamiento dividió el velo en dos, sin añadir una formulación más interpretativa de la necesaria.
theological_decisions:
- issue: Sentido de ἐκλιπόντος aplicado al sol
  english_pob_reading: Rendered non-technically as 'the sun having been darkened' rather than specifying an eclipse.
  chosen_spanish_reading: «cuando el sol se oscureció» evita identificar el fenómeno como un eclipse técnico.
  alternative_spanish_readings:
  - cuando el sol fue eclipsado
  - cuando el sol se apagó
  rationale: El texto describe la oscuridad en torno a la muerte de Jesús, pero el verbo griego no obliga a una explicación astronómica precisa. La redacción española conserva el hecho narrado sin imponer una interpretación científica no explicitada por Lucas.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor del καταπέτασμα como signo cultual
  english_pob_reading: Rendered as 'curtain' in the main text.
  chosen_spanish_reading: «velo» conserva la referencia al divisor del templo y la carga simbólica del evento.
  alternative_spanish_readings:
  - cortina
  - cortinaje
  rationale: 'La muerte de Jesús está acompañada por un signo cultual significativo: el rasgamiento del separador del templo. En español, «velo» comunica bien ese referente bíblico y permite mantener la resonancia teológica del suceso sin perder claridad.'
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El borrador sigue el estado revisado del audit trail, evitando la lectura técnica de «eclipse» y manteniendo una traducción natural del efecto del verbo griego; además, adapta καταπέτασμα a un término español bíblicamente claro y conserva la idea de un rasgamiento central.
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico moderno y sobrio, evitando calcos innecesarios.
  - Se prefirió una subordinada temporal para reflejar el participio genitivo absoluto.
  - Se conservaron los matices de evento visible y de signo cultual sin sobreinterpretarlos.
  - Las notas al pie están ancladas exactamente en el texto principal con los marcadores [a], [b] y [c].
