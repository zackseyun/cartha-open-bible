  text: Now he had an obligation[a] to release one man to them at the festival.
  footnotes:
  - marker: a
    text: This entire verse is absent from several of the earliest Greek manuscripts (including the 3rd-century Papyrus 75 and 4th-century Vaticanus) and early Coptic translations. It is present in other major early manuscripts (such as the 4th-century Sinaiticus), the Latin tradition, and the later Byzantine majority. It was likely added by scribes to harmonize Luke's account with the release custom mentioned in Matthew 27:15 and Mark 15:6. Some manuscripts place this sentence after verse 18.
    reason: textual_critical
