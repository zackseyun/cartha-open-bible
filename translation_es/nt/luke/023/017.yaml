translation:
  language: es
  text: Ahora bien, tenía la obligación[a] de poner en libertad a un preso para ellos en la fiesta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo completo está ausente en varios de los manuscritos griegos más antiguos (incluidos el papiro 75 del siglo III y el Vaticano del siglo IV) y en traducciones coptas tempranas. Está presente en otros manuscritos antiguos importantes (como el Sinaítico del siglo IV), en la tradición latina y en la mayoría bizantina posterior. Probablemente fue añadido por escribas para armonizar el relato de Lucas con la costumbre de soltar a un preso mencionada en Mateo 27:15 y Marcos 15:6. Algunos manuscritos colocan esta frase después del versículo 18.
    reason: textual_critical
lexical_decisions:
- source_word: Ἀνάγκην εἶχεν
  english_pob_choice: had an obligation
  chosen_spanish: tenía la obligación
  alternatives_spanish:
  - tenía necesidad
  - estaba obligado
  - tenía que
  lexicon: BDAG
  rationale: La expresión griega indica presión o deber impuesto por la costumbre/jurisdicción, no simple necesidad interna. «Tenía la obligación» conserva ese matiz de deber externo con naturalidad en español.
- source_word: ἀπολύειν
  english_pob_choice: release
  chosen_spanish: soltar
  alternatives_spanish:
  - liberar
  - dejar libre
  - poner en libertad
  lexicon: BDAG
  rationale: En contexto penal/judicial, el sentido es dejar salir a un preso de custodia. «Soltar» refleja el verbo de forma breve y clara; la nota lexical mantiene la idea de liberación jurídica implícita en el contexto.
- source_word: ἑορτή
  english_pob_choice: festival
  chosen_spanish: fiesta
  alternatives_spanish:
  - festival
  - celebración
  - fiesta ritual
  lexicon: BDAG
  rationale: La POB en inglés opta por «festival» para una celebración pública y religiosa; en español, «fiesta» comunica de modo natural la referencia a la Pascua sin sonar artificial. La frase sigue siendo fiel al carácter festivo y público del contexto.
theological_decisions:
- issue: 'Variante textual: versículo ausente en algunos manuscritos antiguos y presente en la tradición mayoritaria'
  english_pob_reading: This entire verse is absent from several of the earliest Greek manuscripts... It was likely added by scribes to harmonize Luke's account with the release custom mentioned in Matthew 27:15 and Mark 15:6.
  chosen_spanish_reading: Se conserva el versículo con aviso textual, sin resolver la tensión a favor o en contra de su autenticidad en el texto principal.
  alternative_spanish_readings:
  - omitir el versículo en el texto principal
  - integrarlo sin nota crítica
  rationale: 'El encargo pide reflejar el expediente auditado de la POB: hay evidencia textual significativa en ambos sentidos. Por eso el texto español mantiene el versículo y una nota crítica, sin borrar la variante ni sobreinterpretarla.'
  doctrine_reference: Crítica textual del Nuevo Testamento; coherencia sinóptica con Mateo 27:15 y Marcos 15:6
translation_notes:
  revision_awareness: El texto griego de la tradición bizantina y el expediente en inglés coinciden en la lectura sustancial del versículo; no se reportan revisiones recientes que alteren el sentido. La única cuestión relevante es crítica textual, ya tratada en la nota.
  spanish_consistency_notes:
  - Se mantiene un español neutro, bíblico y publicable.
  - «Yahvé» no aparece porque el versículo no contiene el nombre divino.
  - Se evita «SEÑOR» o fórmulas litúrgicas no presentes en el fuente.
  - La equivalencia de tiempo verbal y orden sintáctico sigue de cerca el griego sin sonar rígida.
