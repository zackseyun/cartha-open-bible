translation:
  language: es
  text: 'Entonces Pilato le preguntó, diciendo: «¿Eres tú el rey de los judíos[a]?». Y él, respondiéndole, dijo: «Tú lo dices[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los judeanos». El término griego puede referirse a «judíos» o «judeanos» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «Tú lo dices» o «Sí, así es como dices». La respuesta griega es breve y puede entenderse como una afirmación matizada.
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  - Pero
  lexicon: BDAG
  rationale: δέ funciona aquí como enlace narrativo leve que avanza la escena; «Entonces» mantiene la secuencia sin introducir contraste fuerte.
- source_word: ἠρώτησεν
  english_pob_choice: asked
  chosen_spanish: le preguntó
  alternatives_spanish:
  - le interrogó
  - le inquirió
  lexicon: BDAG
  rationale: El verbo expresa una pregunta directa. En español, «le preguntó» es natural y preserva el valor de pregunta del aoristo.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: —
  alternatives_spanish:
  - diciendo
  - y diciendo
  lexicon: BDAG
  rationale: El participio introduce la cita y es frecuente en discurso narrativo; en español puede quedar implícito para evitar pesadez, aunque la función discursiva se conserva con los dos puntos y la cita directa.
- source_word: Σὺ εἶ
  english_pob_choice: Are you
  chosen_spanish: ¿Eres tú
  alternatives_spanish:
  - ¿Tú eres
  lexicon: BDAG
  rationale: En contexto es interrogativo. El orden natural del español exige la inversión para una pregunta clara y fiel.
- source_word: βασιλεὺς
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - gobernante
  - monarca
  lexicon: BDAG
  rationale: βασιλεύς denota un rey; «rey» conserva la fuerza del título examinado por Pilato.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: BDAG
  rationale: Ἰουδαῖος puede referirse a «judíos» o «judeanos». En el contexto narrativo de la pasión, la forma tradicional y comprensible en español es «judíos», preservando la opción alternativa en nota.
- source_word: ἀποκριθεὶς
  english_pob_choice: answering
  chosen_spanish: respondiendo
  alternatives_spanish:
  - en respuesta
  lexicon: BDAG
  rationale: El participio señala que Jesús contesta a la pregunta. «Respondiendo» mantiene la relación de respuesta sin añadir matices ajenos.
- source_word: ἔφη
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - replicó
  - declaró
  lexicon: BDAG
  rationale: φημί es un verbo de decir neutral; «dijo» es la opción más sobria y fiel.
- source_word: Σὺ λέγεις
  english_pob_choice: You say so
  chosen_spanish: Tú dices
  alternatives_spanish:
  - Tú lo dices
  - Eso dices
  lexicon: BDAG
  rationale: 'La respuesta griega es breve y elíptica. «Tú dices» conserva la ambigüedad: no fuerza un «sí» explícito, pero tampoco la convierte en negación.'
theological_decisions:
- issue: Fuerza de la respuesta de Jesús Σὺ λέγεις
  english_pob_reading: An intentionally qualified affirmation rendered as 'You say so.'
  chosen_spanish_reading: 'Una respuesta breve y ambigua: «Tú dices».'
  alternative_spanish_readings:
  - «Sí, como tú dices»
  - «Tú lo dices»
  rationale: El griego permite una afirmación cualificada, no un «sí» desnudo. La versión española mantiene la tensión retórica y cristológica sin resolverla en exceso.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción española sigue el último paso de revisión del audit trail al reflejar el participio ἀποκριθεὶς con «respondiendo» y mantener una cita breve y ambigua en la respuesta final.
  spanish_consistency_notes:
  - Se conserva «judíos» como forma principal por adecuación contextual y claridad eclesial amplia.
  - Se evita sustituir el título real por «gobernante» para no debilitar la carga del interrogatorio.
  - La puntuación reproduce la estructura narrativa con pregunta directa y respuesta concisa.
