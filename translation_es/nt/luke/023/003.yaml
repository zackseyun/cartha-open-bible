revisions:
- from: 'Entonces Pilato le preguntó[a]: «¿Eres tú el rey de los judíos?». Y él, respondiendo, dijo[b]: «Tú dices».'
  to: 'Entonces Pilato le preguntó, diciendo: «¿Eres tú el rey de los judíos[a]?». Y él, respondiéndole, dijo: «Tú lo dices[b]».'
  rationale: Se reancló la nota léxica al sintagma correcto («judíos»), se sustituyó la nota [b] por una que sí preserve las alternativas interpretativas de Σὺ λέγεις, y se ajustó la redacción para mayor naturalidad y fidelidad discursiva («respondiéndole», «Tú lo dices»).
