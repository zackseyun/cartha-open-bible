translation:
  language: es
  text: Y los principales sacerdotes y los escribas estaban allí[a], acusándolo con vehemencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «permanecían allí» / «estaban de pie allí»; el griego presenta a los personajes como presentes y en postura de pie, no solo como ubicados en el lugar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἱστήκεισαν
  english_pob_choice: stood there
  chosen_spanish: estaban allí
  alternatives_spanish:
  - estaban de pie
  - permanecían allí
  lexicon: BDAG
  rationale: El imperfecto pluscuamperfectivo de ἵστημι funciona aquí como estado/presencia en escena. «Estaban allí» comunica bien la presencia continua sin forzar un valor aspectual demasiado pesado; además suena natural en español narrativo.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Pero
  lexicon: BDAG
  rationale: δέ introduce la siguiente acción sin contraste fuerte. «Y» mantiene la continuidad narrativa de manera fluida en español.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: principales sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  - jefes de los sacerdotes
  lexicon: BDAG
  rationale: El plural designa a las autoridades sacerdotales principales. «Principales sacerdotes» evita sugerir varios titulares únicos de un mismo cargo y conserva la referencia institucional.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la ley
  - expertos en la Ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente directo y tradicional para γραμματεῖς en la narrativa evangélica, sin añadir explicación interpretativa.
- source_word: εὐτόνως
  english_pob_choice: vehemently
  chosen_spanish: con vehemencia
  alternatives_spanish:
  - fervorosamente
  - con intensidad
  - con dureza
  lexicon: BDAG
  rationale: El adverbio expresa fuerza e intensidad hostil. «Con vehemencia» conserva ese matiz de manera natural y formal en español.
- source_word: κατηγοροῦντες
  english_pob_choice: accusing
  chosen_spanish: acusándolo
  alternatives_spanish:
  - presentando cargos contra él
  - denunciándolo
  lexicon: BDAG
  rationale: 'El participio presente expresa acción simultánea: estaban allí mientras acusaban. «Acusándolo» reproduce el verbo base de forma idiomática y clara.'
- source_word: αὐτοῦ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - contra él
  lexicon: BDAG
  rationale: El genitivo con κατηγορέω implica acusar a alguien / presentar cargos contra alguien. En español, el objeto directo pronominal «lo» es la forma más natural en la cláusula participial; el matiz jurídico queda incluido por el verbo «acusando».
translation_notes:
  revision_awareness: 'Se siguió el texto griego SBLGNT y el audit trail inglés: δέ como conector leve, εἱστήκεισαν como estado/presencia en escena, εὐτόνως como intensidad hostil, y κατηγοροῦντες como acusación continua. No se introdujeron cambios textuales ni tensiones teológicas nuevas.'
  spanish_consistency_notes:
  - Se mantiene «principales sacerdotes» para el plural de ἀρχιερεῖς, evitando el singular litúrgico «sumo sacerdote» como traducción automática.
  - «Escribas» se conserva como término técnico estable en el corpus evangélico.
  - La estructura narrativa conserva el valor aspectual del participio presente mediante «acusándolo».
