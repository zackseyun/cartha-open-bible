revisions:
- from: 'Y el pueblo estaba observando. Pero aun los gobernantes se burlaban de él[a], diciendo: «Salvó a otros; que se salve a sí mismo, si este es el Mesías de Dios, el Elegido».'
  to: 'Y el pueblo estaba de pie, mirando. Pero aun los gobernantes se burlaban de él, diciendo: «Salvó a otros; que se salve a sí mismo, si este es el Mesías de Dios, el Elegido[a]».'
  rationale: 'Se revisa la primera oración para preservar ambos elementos del griego: la postura escénica de εἱστήκει y la observación continua de θεωρῶν. Se elimina la nota irrelevante sobre «gobernantes» y se reemplaza por una nota que sí refleja la alternativa documentada en la auditoría inglesa para los títulos mesiánicos finales. El resto del versículo se mantiene por su buena fidelidad y legibilidad.'
  reviewer_model: gpt-5.4
