review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la burla de los dirigentes, la repetición de «salvar», el demostrativo despectivo «este» y el título «Mesías». Sin embargo, no preserva plenamente la estructura inicial del griego: εἱστήκει y θεωρῶν se han fusionado en «estaba observando», omitiendo la idea explícita de que el pueblo estaba de pie/plantado allí mirando. Además, la nota al pie actual no refleja la alternativa preservada en la auditoría inglesa sobre «el Cristo de Dios, el Elegido / el Escogido», sino una lista de sinónimos para ἄρχοντες que no requiere nota.'
  spanish_quality_summary: El español es claro y natural, pero la primera oración necesita ajuste para representar tanto la postura escénica como la observación continua. «Y el pueblo estaba de pie, mirando» suena natural, digno y más fiel que «estaba observando». El resto del versículo es legible y apropiado para un registro bíblico moderno.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: Χριστός se vierte correctamente como «Mesías», θεοῦ como «Dios», y ἐκλεκτός puede representarse bien como «el Elegido». Debe corregirse la nota para reflejar la alternativa léxica/documental de la auditoría inglesa: «el Cristo de Dios, el Escogido» o equivalente. No hay conflicto con otras políticas terminológicas.'
  issues:
  - severity: high
    issue: La cláusula inicial omite la postura de εἱστήκει
    rationale: El borrador traduce εἱστήκει + θεωρῶν como «estaba observando», pero el griego expresa que «el pueblo estaba de pie/plantado allí» y además «mirando». Se pierde un elemento de la escena.
  - severity: medium
    issue: La nota al pie no corresponde a la alternativa auditada
    rationale: La nota inglesa conserva una alternativa para «ὁ χριστὸς τοῦ θεοῦ, ὁ ἐκλεκτός», no para ἄρχοντες. La nota española actual introduce una variación no necesaria y omite la alternativa textual/lexical relevante.
  - severity: low
    issue: «Aun» podría formularse como «hasta» o mantenerse sin problema
    rationale: «Pero aun los gobernantes» es comprensible, aunque «pero incluso/hasta los gobernantes» suena más natural para algunos lectores. No es un error, solo una cuestión de fluidez menor.
  revised_spanish_text: 'Y el pueblo estaba de pie, mirando. Pero aun los gobernantes se burlaban de él, diciendo: «Salvó a otros; que se salve a sí mismo, si este es el Mesías de Dios, el Elegido[a]».'
  revised_footnotes:
  - marker: a
    text: O «el Cristo de Dios, el Escogido».
    reason: alternative_reading
  revision_rationale: 'Se revisa la primera oración para preservar ambos elementos del griego: la postura escénica de εἱστήκει y la observación continua de θεωρῶν. Se elimina la nota irrelevante sobre «gobernantes» y se reemplaza por una nota que sí refleja la alternativa documentada en la auditoría inglesa para los títulos mesiánicos finales. El resto del versículo se mantiene por su buena fidelidad y legibilidad.'
