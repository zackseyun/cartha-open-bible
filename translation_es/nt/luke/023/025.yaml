revisions:
- from: Así que liberó al hombre que había sido echado en prisión por insurrección y homicidio[a], a quien ellos venían pidiendo[b]; pero entregó a Jesús a la voluntad de ellos.
  to: Entonces liberó al hombre que había sido echado en prisión por insurrección y asesinato[a], por quien ellos estaban pidiendo[b]; pero entregó a Jesús a la voluntad de ellos.
  rationale: 'Se hicieron ajustes menores para mejorar la fidelidad léxica al POB inglés y la naturalidad del español: «asesinato» por «homicidio», «estaban pidiendo» por «venían pidiendo», y «Entonces» por «Así que». Se preservó la vividez de «echado en prisión» y la formalidad de «a la voluntad de ellos».'
  reviewer_model: gpt-5.4
