translation:
  language: es
  text: Entonces liberó al hombre que había sido echado en prisión por insurrección y asesinato[a], por quien ellos estaban pidiendo[b]; pero entregó a Jesús a la voluntad de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había sido puesto en prisión». El griego es más vívidamente «había sido echado en prisión».
    reason: lexical_alternative
  - marker: b
    text: O «a lo que ellos querían».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέλυσεν
  english_pob_choice: released
  chosen_spanish: liberó
  alternatives_spanish:
  - lo soltó
  - lo puso en libertad
  lexicon: BDAG
  rationale: En este contexto de custodia judicial, ἀπολύω expresa la puesta en libertad de un preso. «Liberó» comunica bien la acción sin perder el matiz legal de la liberación.
- source_word: διὰ στάσιν καὶ φόνον
  english_pob_choice: for insurrection and murder
  chosen_spanish: por insurrección y homicidio
  alternatives_spanish:
  - por rebelión y homicidio
  - por insurrección y asesinato
  lexicon: BDAG
  rationale: διά con acusativo indica causa. «Insurrección» conserva el sentido político-criminal de στάσις en este pasaje; «homicidio» mantiene el hecho penal de φόνος sin cargar más de lo que el texto dice.
- source_word: βεβλημένον εἰς φυλακήν
  english_pob_choice: had been thrown into prison
  chosen_spanish: había sido echado en prisión
  alternatives_spanish:
  - había sido puesto en prisión
  - había sido arrojado a la cárcel
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo de βάλλω con εἰς φυλακήν es vívido: literalmente «echado/arrojado». «Había sido echado en prisión» preserva ese tono más fuerte que «puesto».'
- source_word: ὃν ᾐτοῦντο
  english_pob_choice: whom they were asking for
  chosen_spanish: a quien ellos venían pidiendo
  alternatives_spanish:
  - a quien ellos estaban pidiendo
  - a quien ellos habían pedido
  lexicon: BDAG
  rationale: El imperfecto de αἰτέω sugiere una petición en curso. «Venían pidiendo» conserva esa continuidad en español y evita intensificar indebidamente a «exigían».
- source_word: παρέδωκεν
  english_pob_choice: handed ... over
  chosen_spanish: entregó
  alternatives_spanish:
  - lo entregó
  - lo puso en manos de
  lexicon: BDAG
  rationale: παραδίδωμι es verbo clave de entrega judicial o pasiva de Jesús. Aquí «entregó» es natural en español y mantiene el valor de transferencia a disposición de otros.
- source_word: τῷ θελήματι αὐτῶν
  english_pob_choice: to their will
  chosen_spanish: a la voluntad de ellos
  alternatives_spanish:
  - a lo que ellos querían
  - según la voluntad de ellos
  lexicon: BDAG
  rationale: θέλημα conserva el matiz volitivo de «voluntad». «A la voluntad de ellos» refleja de forma clara y formal el dativo de referencia/destino.
- source_word: δὲ ... δὲ
  english_pob_choice: So ... but
  chosen_spanish: Así que ... pero
  alternatives_spanish:
  - Entonces ... pero
  - Y ... pero
  lexicon: BDAG
  rationale: Los dos δέ marcan avance narrativo y contraste. «Así que» da continuidad, y «pero» conserva la oposición entre la liberación del preso y la entrega de Jesús.
theological_decisions:
- issue: Evitar una lectura sustitutiva no explicitada en el versículo
  english_pob_reading: Kept the narrative contrast explicit in the wording but did not add explanatory theological language.
  chosen_spanish_reading: Se mantuvo explícito el contraste narrativo sin añadir lenguaje explicativo de sustitución o expiación.
  alternative_spanish_readings:
  - lo entregó en su lugar
  - lo entregó en vez de Jesús
  - Jesús fue reemplazado por el preso
  rationale: El versículo narra la acción de Pilato y la voluntad de la multitud; no formula por sí mismo una explicación doctrinal. La traducción evita importar una interpretación teológica que pertenece al contexto más amplio del relato.
  doctrine_reference: 'Principio de fidelidad textual: no introducir afirmaciones doctrinales que el versículo no expresa.'
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y el griego SBLGNT. No se detectaron cambios de revisión aplicados en el paquete; la redacción española conserva el contraste narrativo, el valor aspectual del imperfecto y la imagen vívida de βάλλω sin sobreinterpretación teológica.
  spanish_consistency_notes:
  - Se usó «Jesús» como forma estable del nombre propio.
  - Se prefirió «voluntad» para θέλημα, en coherencia con un registro formal y bíblico.
  - Se evitó «SEÑOR» o sustituciones litúrgicas no presentes en el texto.
  - Se mantuvo «insurrección» para στάσις por su fuerza política en este contexto.
  - Se mantuvo el contraste verbal entre liberación del preso y entrega de Jesús.
