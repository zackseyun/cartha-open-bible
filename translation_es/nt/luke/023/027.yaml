    unchanged: false
    changes_summary: Clarified that the relative clause refers specifically to the women by replacing 'who were' with 'and the women were.' This better reflects the feminine relative pronoun and avoids ambiguity in English.
translation:
  language: es
  text: Y una gran multitud del pueblo y de mujeres iba siguiéndolo, y las mujeres se golpeaban el pecho y se lamentaban por él[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «se golpeaban a sí mismas y lo lamentaban»; el griego probablemente alude al gesto acostumbrado de golpearse el pecho en duelo.
    reason: cultural_note
  - marker: b
    text: El pronombre relativo femenino plural del griego indica que las acciones de duelo se atribuyen específicamente a las mujeres.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἠκολούθει
  english_pob_choice: was following
  chosen_spanish: iba siguiéndolo
  alternatives_spanish:
  - lo seguía
  - seguía tras él
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso; «iba siguiéndolo» conserva bien el aspecto progresivo en español sin sonar rígido.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora bien
  - Y, además
  lexicon: BDAG
  rationale: Aquí δέ funciona como continuidad narrativa; «Y» mantiene la conexión de manera natural.
- source_word: πολὺ πλῆθος
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran muchedumbre
  - una multitud numerosa
  lexicon: BDAG
  rationale: «πλῆθος» expresa una masa numerosa; «gran multitud» refleja el valor cuantitativo y es idiomático en español.
- source_word: τοῦ λαοῦ
  english_pob_choice: of the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de la gente
  - del pueblo en general
  lexicon: BDAG
  rationale: «λαός» puede ser «pueblo»; esta opción conserva el matiz colectivo y evita reducirlo a mera «gente».
- source_word: γυναικῶν
  english_pob_choice: and of women
  chosen_spanish: y de mujeres
  alternatives_spanish:
  - y mujeres
  lexicon: BDAG
  rationale: 'Se mantiene la coordinación genitiva del griego: la multitud estaba compuesta también por mujeres.'
- source_word: Ἠκολούθει ... αὐτῷ
  english_pob_choice: was following him
  chosen_spanish: iba siguiéndolo
  alternatives_spanish:
  - lo seguía
  - seguía detrás de él
  lexicon: BDAG
  rationale: El dativo con ἀκολουθέω se expresa de forma natural con objeto directo en español; el clítico «-lo» preserva la referencia a Jesús.
- source_word: αἳ
  english_pob_choice: the women were
  chosen_spanish: las mujeres
  alternatives_spanish:
  - quienes
  - las cuales
  lexicon: BDAG
  rationale: El relativo femenino plural remite específicamente a «mujeres»; repetir el sustantivo elimina ambigüedad y refleja la revisión auditada del inglés.
- source_word: ἐκόπτοντο
  english_pob_choice: were beating their breasts
  chosen_spanish: se golpeaban el pecho
  alternatives_spanish:
  - se daban golpes en el pecho
  - se herían el pecho
  lexicon: BDAG
  rationale: En contexto de duelo, κόπτω alude al gesto cultural de golpear el pecho; esta formulación comunica la acción sin imponer una paráfrasis excesiva.
- source_word: ἐθρήνουν
  english_pob_choice: mourning
  chosen_spanish: lo lamentaban
  alternatives_spanish:
  - lo lloraban
  - se lamentaban por él
  lexicon: BDAG
  rationale: θρηνέω denota lamentación audible o duelo; «lo lamentaban» conserva la sobriedad del verbo y evita un giro demasiado interpretativo.
- source_word: αὐτόν
  english_pob_choice: for him
  chosen_spanish: lo
  alternatives_spanish:
  - por él
  - para él
  lexicon: BDAG
  rationale: El pronombre objeto retoma a Jesús; en español el lamento puede expresarse con objeto directo, mientras el contexto ya aporta el sentido de duelo por él.
translation_notes:
  revision_awareness: La revisión auditada del inglés aclaró que la cláusula relativa se refiere específicamente a las mujeres. En español se eliminó la ambigüedad repitiendo «las mujeres» y se conservó el gesto cultural con una nota que refleja la alternativa más literal del griego.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y publicable, con «gran multitud» y «se golpeaban el pecho» como equivalentes naturales del griego.
  - No se usó «Cristo» ni terminología doctrinal ajena al verso.
  - Las notas al pie se anclaron en la traducción con [a] y [b] para respetar la referencia explícita del texto auditado.
