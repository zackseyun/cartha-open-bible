  text: Ἠκολούθει δὲ αὐτῷ πολὺ πλῆθος τοῦ λαοῦ καὶ γυναικῶν ⸀αἳ ἐκόπτοντο καὶ ἐθρήνουν αὐτόν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/023/027.yaml
  text: And a large crowd of the people and of women was following him[b][a], and the women were beating their breasts and mourning for him.
  footnotes:
  - marker: a
    text: Or, more literally, 'were beating themselves and lamenting him'; the Greek likely refers to the customary act of beating the breast in mourning.
    reason: cultural_note
  - marker: b
    text: The relative pronoun 'who' is feminine plural, indicating that the mourning actions are specifically attributed to the women.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
