revisions:
- from: Y dos otros[a], que eran criminales[b], eran llevados con él para ser puestos a muerte.
  to: Y otros dos, que eran criminales[a], eran llevados con él para ser ejecutados[b].
  rationale: Se corrigió el orden a «otros dos» para un español natural y fiel. Se reubicaron las notas en los términos que realmente explican. También se sustituyó «puestos a muerte» en el texto principal por «ejecutados», una opción ya permitida en el expediente inglés y más idiomática en español, mientras la nota conserva la literalidad y aclara que el método no se especifica en este versículo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:02:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: enlace narrativo, identificación de dos personas distintas de Jesús, acompañamiento con él y la idea amplia de ser llevados para morir sin especificar crucifixión. Sin embargo, hay dos desajustes importantes: «dos otros» suena poco natural en español y no expresa bien la construcción; y las notas al pie están ancladas a palabras equivocadas. La nota sobre κακοῦργοι debe ir con «criminales», y la nota sobre ἀναιρεθῆναι debe ir con la frase de muerte, no con «criminales».'
  spanish_quality_summary: El texto es generalmente claro, pero «Y dos otros» es torpe; en español natural y fiel conviene «Y otros dos». Además, «eran llevados» funciona, aunque «eran conducidos» también sería válido; no requiere cambio. «para ser puestos a muerte» es comprensible, pero en español más idiomático y digno resulta mejor «para ser ejecutados[a]», dejando en nota que el griego dice «puestos a muerte» y no especifica el método. Esto mejora la fluidez sin perder la decisión teológica documentada, siempre que la nota preserve la amplitud léxica.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. «criminales» alinea bien con κακοῦργοι. La nota alternativa debe evitar «malvados», que moraliza más de lo que exige el término; «malhechores» o «malefactores» son mejores alternativas. La decisión sobre ἀναιρεθῆναι debe seguir sin especificar «crucificados» en el texto principal o, si se usa «ejecutados» por naturalidad española, debe explicarse en nota que el griego literalmente dice «puestos a muerte» y no nombra el método.
  issues:
  - severity: medium
    issue: «dos otros» es poco natural en español
    rationale: Aunque refleja los elementos griegos, el orden idiomático normal es «otros dos». La fidelidad no exige conservar un orden forzado.
  - severity: high
    issue: Las notas al pie están ancladas a términos incorrectos
    rationale: La nota [a] explica κακοῦργοι pero está puesta en «otros»; la nota [b] explica ἀναιρεθῆναι pero está puesta en «criminales». Esto rompe la trazabilidad léxica requerida.
  - severity: medium
    issue: La alternativa «malvados» en la nota de κακοῦργοι no es la mejor
    rationale: «Malvados» enfatiza maldad moral general, mientras κακοῦργοι en este contexto apunta a delincuentes/condenados. «Malhechores» o «malefactores» preservan mejor el campo semántico.
  revised_spanish_text: Y otros dos, que eran criminales[a], eran llevados con él para ser ejecutados[b].
  revised_footnotes:
  - marker: a
    text: O «malhechores» o «malefactores». El término griego se refiere a personas culpables bajo condena criminal.
    reason: lexical_alternative
  - marker: b
    text: O «para ser puestos a muerte». El griego dice literalmente «para ser puestos a muerte» y no especifica aquí el método, aunque el contexto muestra la crucifixión.
    reason: lexical_alternative
