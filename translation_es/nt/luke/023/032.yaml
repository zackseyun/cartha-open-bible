translation:
  language: es
  text: Y otros dos, que eran criminales[a], eran llevados con él para ser ejecutados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «malhechores» o «malefactores». El término griego se refiere a personas culpables bajo condena criminal.
    reason: lexical_alternative
  - marker: b
    text: O «para ser puestos a muerte». El griego dice literalmente «para ser puestos a muerte» y no especifica aquí el método, aunque el contexto muestra la crucifixión.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤγοντο
  english_pob_choice: were being led
  chosen_spanish: eran llevados
  alternatives_spanish:
  - eran conducidos
  - iban siendo llevados
  lexicon: BDAG
  rationale: El imperfecto pasivo griego expresa acción en curso en el pasado. «Eran llevados» conserva ese valor procesivo con naturalidad en español; «iban siendo llevados» es más explícito pero algo más pesado.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona como enlace narrativo suave. «Y» reproduce ese avance sencillo sin cargar contraste que el griego no exige.
- source_word: ἕτεροι
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - otros hombres
  - diferentes
  lexicon: BDAG
  rationale: ἕτεροι señala a dos personas distintas de Jesús. «Otros» es la forma más directa y natural; «diferentes» suena artificial.
- source_word: κακοῦργοι
  english_pob_choice: criminals
  chosen_spanish: criminales
  alternatives_spanish:
  - malhechores
  - malvados
  - malefactores
  lexicon: BDAG
  rationale: El término denota personas culpables de grave delito y bajo condena. «Criminales» comunica bien ese sentido jurídico; «malhechores» es posible pero menos preciso en registro moderno.
- source_word: σὺν αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - acompañándolo
  lexicon: BDAG
  rationale: σύν con dativo expresa acompañamiento. «Con él» es breve y fiel; «junto con él» añade énfasis innecesario.
- source_word: ἀναιρεθῆναι
  english_pob_choice: to be put to death
  chosen_spanish: ser puestos a muerte
  alternatives_spanish:
  - ser ejecutados
  - ser matados
  lexicon: BDAG
  rationale: El infinitivo aoristo pasivo apunta a la muerte impuesta en contexto judicial, pero sin especificar el método en este versículo. «Ser puestos a muerte» preserva esa amplitud; «ser ejecutados» interpreta con mayor precisión legal moderna, y «ser matados» suena menos formal.
theological_decisions:
- issue: Whether to specify crucifixion in the rendering of ἀναιρεθῆναι
  english_pob_reading: Use the broader 'to be put to death' rather than 'to be crucified.'
  chosen_spanish_reading: 'Mantener una formulación amplia: «ser puestos a muerte», sin añadir «crucificados».'
  alternative_spanish_readings:
  - ser crucificados
  - ser ejecutados
  rationale: Aunque el contexto inmediato de Lucas deja claro que Jesús va a la crucifixión, el verbo griego en sí no la nombra. Conviene respetar el alcance léxico del texto base y no especificar más de lo que el versículo dice.
  doctrine_reference: Primacía del texto original y equivalencia óptima; no sobreespecificar donde el griego mantiene amplitud semántica.
translation_notes:
  revision_awareness: 'La redacción sigue el consenso alto del audit trail en inglés: mantiene la progresión imperfectiva de Ἤγοντο con una forma continua en pasado, conserva la función narrativa suave de δέ, identifica a «dos otros» como sujetos distintos de Jesús, y evita especificar crucifixión en ἀναιρεθῆναι. También incorpora la revisión inglesa que aclaró que «criminals» caracteriza a los dos otros, lo cual en español se refleja con una oración de relativo explícita: «que eran criminales».'
  spanish_consistency_notes:
  - Se mantiene «con él» para σὺν αὐτῷ por consistencia con el valor de acompañamiento del griego.
  - «Puestos a muerte» se usa en lugar de una fórmula más interpretativa como «ejecutados» para conservar la amplitud semántica del verbo.
  - Los marcadores de nota [a] y [b] aparecen en el texto exactamente donde corresponden, sin reutilización.
  - El estilo es formal y publicable, sin calco innecesario ni arcaísmo confesional.
