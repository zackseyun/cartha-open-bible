revisions:
- from: Pero todos los que lo conocían[a], y las mujeres que lo habían seguido desde Galilea, estaban a distancia, mirando estas cosas.
  to: Pero todos los que lo conocían[a], y las mujeres que lo habían seguido desde Galilea, estaban de pie a distancia, mirando estas cosas.
  rationale: Se revisa «estaban» a «estaban de pie» para conservar el valor visual y aspectual de εἱστήκεισαν, en línea con la auditoría inglesa y el griego. Se mantiene el resto de la redacción por su fidelidad y naturalidad. También se pule la nota léxica para que suene idiomática en español y explique mejor la alternativa «sus conocidos».
