review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego y sigue de cerca la auditoría inglesa: mantiene el contraste de δέ, la referencia amplia de πάντες οἱ γνωστοὶ αὐτῷ, el grupo definido de las mujeres, el origen «desde/de Galilea» y la observación continua de los acontecimientos. Sin embargo, εἱστήκεισαν expresa explícitamente que estaban de pie/plantados allí, no solo que «estaban», de modo que el español actual pierde un elemento visual importante de la escena.'
  spanish_quality_summary: 'El texto es claro y natural, con buen registro bíblico moderno. La principal mejora necesaria es explicitar la postura con «estaban de pie», que en español suena natural y preserva mejor la imagen narrativa. La nota al pie también necesita pulirse: «sus conocidos» es mejor que repetir «conocidos» dos veces, y la redacción actual tiene un pequeño problema de estilo y puntuación de cita.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son adecuadas. La excepción relevante es que para εἱστήκεισαν conviene preferir «estaban de pie» sobre «estaban» para no atenuar el valor aspectual y escénico del verbo.
  issues:
  - severity: medium
    issue: «estaban» omite la postura explícita de εἱστήκεισαν
    rationale: El griego no solo indica presencia continua sino una postura concreta de estar de pie. «Estaban a distancia» en español comunica ubicación, pero no preserva plenamente la imagen de los observadores de pie, que sí queda en la traducción inglesa auditada («were standing»).
  - severity: low
    issue: La nota al pie puede mejorarse estilísticamente
    rationale: La glosa «γνωστοί puede denotar a quienes son conocidos por alguien, es decir, conocidos o asociados» suena torpe en español por la repetición de «conocidos». «Sus conocidos» / «sus allegados o asociados» expresa mejor la alternativa léxica.
  revised_spanish_text: Pero todos los que lo conocían[a], y las mujeres que lo habían seguido desde Galilea, estaban de pie a distancia, mirando estas cosas.
  revised_footnotes:
  - marker: a
    text: 'O: «todos sus conocidos». γνωστοί puede denotar a quienes son conocidos de alguien, es decir, sus conocidos o asociados.'
    reason: lexical_alternative
  revision_rationale: Se revisa «estaban» a «estaban de pie» para conservar el valor visual y aspectual de εἱστήκεισαν, en línea con la auditoría inglesa y el griego. Se mantiene el resto de la redacción por su fidelidad y naturalidad. También se pule la nota léxica para que suene idiomática en español y explique mejor la alternativa «sus conocidos».
