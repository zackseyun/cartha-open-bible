translation:
  language: es
  text: Pero todos los que lo conocían[a], y las mujeres que lo habían seguido desde Galilea, estaban de pie a distancia, mirando estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos sus conocidos». γνωστοί puede denotar a quienes son conocidos de alguien, es decir, sus conocidos o asociados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἱστήκεισαν
  english_pob_choice: were standing
  chosen_spanish: estaban
  alternatives_spanish:
  - estaban de pie
  - estaban parados
  lexicon: BDAG
  rationale: El imperfecto pluscuamperfectivo de ἵστημι describe una postura continua en la escena; en español, «estaban» comunica esa continuidad con naturalidad. «Estaban de pie» sería más explícito, pero no necesario aquí.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce transición con leve contraste respecto de la escena anterior; «Pero» reproduce bien ese cambio discursivo en español.
- source_word: πάντες οἱ γνωστοὶ αὐτῷ
  english_pob_choice: all those who knew him
  chosen_spanish: todos los que lo conocían
  alternatives_spanish:
  - todos sus conocidos
  - todos sus allegados
  lexicon: BDAG
  rationale: γνωστοί puede significar «conocidos» o «aquellos que lo conocían». Opto por una frase verbal natural en español que no reduce indebidamente el alcance relacional del griego.
- source_word: μακρόθεν
  english_pob_choice: at a distance
  chosen_spanish: a distancia
  alternatives_spanish:
  - desde lejos
  - de lejos
  lexicon: BDAG
  rationale: La expresión denota separación espacial. «A distancia» es idiomática y conserva el matiz sin añadir distancia emocional que el texto no exige.
- source_word: γυναῖκες αἱ συνακολουθοῦσαι αὐτῷ
  english_pob_choice: the women who had followed him
  chosen_spanish: las mujeres que lo habían seguido
  alternatives_spanish:
  - las mujeres que lo seguían
  - las mujeres que lo acompañaban
  lexicon: BDAG
  rationale: El participio presenta a estas mujeres por su acompañamiento anterior y continuo; el pluscuamperfecto español comunica bien esa anterioridad respecto de la escena de la crucifixión.
- source_word: ἀπὸ τῆς Γαλιλαίας
  english_pob_choice: from Galilee
  chosen_spanish: desde Galilea
  alternatives_spanish:
  - de Galilea
  lexicon: BDAG
  rationale: «Desde» resalta el origen geográfico y conserva el valor de procedencia del griego de manera clara en español.
- source_word: ὁρῶσαι ταῦτα
  english_pob_choice: watching these things
  chosen_spanish: mirando estas cosas
  alternatives_spanish:
  - viendo estas cosas
  - observando esto
  lexicon: BDAG
  rationale: El participio indica observación visual en desarrollo. «Mirando» preserva ese aspecto durativo y mantiene un registro sencillo y fiel; «estas cosas» refleja el plural de ταῦτα.
translation_notes:
  revision_awareness: 'Se mantiene el sentido del griego y el acuerdo general con el audit trail inglés: transición con δὲ, postura continua de ἵστημι, referencia relacional de γνωστοί, procedencia geográfica desde Galilea y observación visual de ταῦτα. La versión española evita sobrerreducir γνωστοί a un parentesco íntimo y conserva la ambigüedad útil entre «los que lo conocían» y «sus conocidos».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se evita «SEÑOR» porque no hay κύριος en el versículo.
  - Se mantiene «Galilea» como topónimo sin adaptación.
  - «Lo» funciona como objeto directo masculino singular referido a Jesús, en continuidad narrativa clara.
