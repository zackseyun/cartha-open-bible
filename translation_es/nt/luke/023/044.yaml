translation:
  language: es
  text: Y ya era como la hora sexta[b], y la oscuridad cayó sobre toda la tierra[a] hasta la hora novena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la región» o «todo el territorio». El griego γῆ puede significar «tierra», «región» o «territorio».
    reason: alternative_reading
  - marker: b
    text: Es decir, desde alrededor del mediodía hasta alrededor de las tres de la tarde.
    reason: cultural_note
lexical_decisions:
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya para entonces
  - ya desde hacía rato
  lexicon: BDAG
  rationale: ‘Ya’ comunica en español la idea de que el momento narrado había sido alcanzado, con un tono natural y conciso equivalente a ‘already’.
- source_word: ὡσεὶ
  english_pob_choice: about
  chosen_spanish: como
  alternatives_spanish:
  - aproximadamente
  - alrededor de
  lexicon: BDAG
  rationale: En una datación horaria, ‘como’ es la forma más idiomática y breve para indicar aproximación sin endurecer el valor exacto del número.
- source_word: ὥρα ἕκτη
  english_pob_choice: the sixth hour
  chosen_spanish: la hora sexta
  alternatives_spanish:
  - el mediodía
  lexicon: BDAG
  rationale: Se conserva la expresión temporal del original para mantener transparencia y el tejido narrativo; la equivalencia idiomática ‘mediodía’ no se coloca en el texto principal porque suavizaría la forma fuente.
- source_word: σκότος
  english_pob_choice: darkness
  chosen_spanish: la oscuridad
  alternatives_spanish:
  - tinieblas
  - lóbrego oscuridad
  lexicon: BDAG
  rationale: ‘Oscuridad’ es el equivalente directo y claro en español para σκότος en este contexto narrativo.
- source_word: ἐγένετο
  english_pob_choice: came
  chosen_spanish: cayó
  alternatives_spanish:
  - vino
  - se abatió
  lexicon: BDAG
  rationale: Con ‘oscuridad’ como sujeto, ‘cayó’ transmite de manera natural la irrupción del fenómeno sin añadir más interpretación que la que permite el verbo eventivo.
- source_word: ἐφ’ ὅλην τὴν γῆν
  english_pob_choice: over the whole land
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - sobre toda la región
  - sobre todo el país
  lexicon: BDAG
  rationale: Aquí se eligió ‘tierra’ porque reproduce de forma amplia la posible extensión de γῆ y permite la misma tensión que el texto inglés preservó entre ‘land’ y ‘earth’; en español ‘tierra’ mantiene abierta esa ambigüedad.
- source_word: ἕως ὥρας ἐνάτης
  english_pob_choice: until the ninth hour
  chosen_spanish: hasta la hora novena
  alternatives_spanish:
  - hasta las tres de la tarde
  lexicon: BDAG
  rationale: Se conserva la medida horaria antigua en el texto principal para coherencia con ‘la hora sexta’; la equivalencia moderna se deja como alternativa implícita sin desplazar la forma original.
theological_decisions:
- issue: Alcance de γῆ en la oscuridad
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - tierra en sentido regional
  - mundo/toda la tierra
  rationale: El griego permite una extensión regional o más amplia. ‘Tierra’ conserva esa tensión sin resolverla prematuramente ni limitarla a una simple zona local.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando ambos marcadores en el texto principal mediante [a] y [b]. El versículo conserva la estructura temporal y la ambigüedad de γῆ sin sobreexplicar el alcance de la oscuridad.
  spanish_consistency_notes:
  - Se mantuvo ‘la hora sexta’ y ‘la hora novena’ para transparencia con el original.
  - Se prefirió ‘tierra’ en el texto principal para conservar la amplitud semántica de γῆ, con nota que explicita la alternativa lexical.
  - No se sustituyó la expresión horaria antigua por equivalentes modernos dentro del cuerpo del texto.
