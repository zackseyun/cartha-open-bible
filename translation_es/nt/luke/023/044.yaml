revisions:
- from: Y ya era como la hora sexta[a][b], y la oscuridad cayó sobre toda la tierra hasta la hora novena.
  to: Y ya era como la hora sexta[b], y la oscuridad cayó sobre toda la tierra[a] hasta la hora novena.
  rationale: Se corrigen los anclajes de notas para que correspondan al lugar relevante en el texto, se elimina la alternativa redundante sobre «tierra» reformulándola como la otra posibilidad semántica de γῆ en español, y se completa la nota cultural para reflejar el intervalo temporal que el POB inglés documenta.
