review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la secuencia básica del griego: regreso previo, preparación de dos clases de sustancias funerarias y reposo sabático conforme al mandamiento. Sin embargo, ἀρώματα se alineó con «aromas», mientras que el POB en inglés documenta y escoge «spices» en contexto funerario; en español «aromas» suena más abstracto y menos concreto para materiales de sepultura. Además, falta la nota léxica correspondiente a μύρα que el inglés preserva como alternativa.'
  spanish_quality_summary: 'El español es claro y digno, pero «aromas y ungüentos» resulta algo desigual: «aromas» en español contemporáneo suele referirse al olor más que a las sustancias. «Especias y ungüentos» o «especias aromáticas y ungüentos» lee con más naturalidad y precisión en este contexto. El resto del versículo es fluido y bien formado.'
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. La principal cuestión léxica es mantener la distinción entre ἀρώματα y μύρα de forma idiomática en español y conservar la nota alternativa que el rastro inglés incluyó para μύρα.
  issues:
  - severity: medium
    issue: «Aromas» para ἀρώματα
    rationale: Aunque semánticamente relacionado, en español «aromas» suele denotar olores y no necesariamente sustancias preparadas para el entierro. El contexto funerario y la decisión inglesa favorecen «especias» como equivalente más fiel y natural.
  - severity: medium
    issue: Falta la nota léxica para μύρα
    rationale: El English POB conservó una nota de alternativa para «ointment(s)» ('perfumes' o 'fragrant oils'). La revisión española debe preservarla también, con marcador anclado en el texto.
  revised_spanish_text: Luego de regresar[a], prepararon especias y ungüentos[b]. Y el sábado descansaron conforme al mandamiento.
