revisions:
- from: Luego de regresar[a], prepararon aromas y ungüentos. Y el sábado descansaron conforme al mandamiento.
  to: Luego de regresar[a], prepararon especias y ungüentos[b]. Y el sábado descansaron conforme al mandamiento.
  rationale: Se cambia «aromas» por «especias» para reflejar mejor ἀρώματα en contexto funerario y para alinearse con la decisión léxica documentada en el POB inglés. Se añade la nota para «ungüentos» a fin de preservar las alternativas léxicas de μύρα que el rastro inglés mantuvo. El resto del texto se conserva por ser fiel, natural y teológicamente adecuado.
