translation:
  language: es
  text: Luego de regresar[a], prepararon especias y ungüentos[b]. Y el sábado descansaron conforme al mandamiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo regresado». El participio griego indica una acción anterior al verbo principal.
    reason: lexical_alternative
  - marker: b
    text: «Ungüentos» también puede traducirse «perfumes» o «aceites perfumados».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποστρέψασαι
  english_pob_choice: after returning
  chosen_spanish: Luego de regresar[a]
  alternatives_spanish:
  - Después de volver
  - Habiendo regresado
  lexicon: BDAG
  rationale: El participio aoristo femenino plural expresa una acción anterior a la del verbo principal. «Luego de regresar» conserva esa anterioridad de forma natural en español; se mantiene la alternativa literal en la nota.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Luego
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ introduce progresión narrativa suave. «Luego» reproduce ese avance sin añadir fuerza interpretativa excesiva.
- source_word: ἡτοίμασαν
  english_pob_choice: they prepared
  chosen_spanish: prepararon
  alternatives_spanish:
  - pusieron a punto
  - hicieron preparar
  lexicon: BDAG
  rationale: ἑτοιμάζω en contexto narrativo se traduce de forma directa como «preparar». En español el sujeto ya es claro por la forma verbal.
- source_word: ἀρώματα
  english_pob_choice: spices
  chosen_spanish: aromas
  alternatives_spanish:
  - especias
  - sustancias aromáticas
  lexicon: BDAG
  rationale: En contexto funerario, ἄρωμα puede referirse a sustancias aromáticas usadas para ungir. «Aromas» conserva la amplitud del término griego y evita estrecharlo innecesariamente solo a condimentos; la alternativa más interpretativa queda disponible en la nota implícita de decisión léxica.
- source_word: μύρα
  english_pob_choice: ointments
  chosen_spanish: ungüentos
  alternatives_spanish:
  - perfumes
  - aceites perfumados
  lexicon: BDAG
  rationale: μύρον designa aceite o preparación perfumada para ungir. «Ungüentos» distingue este término de ἀρώματα y funciona bien en un contexto de sepultura.
- source_word: τὸ μὲν σάββατον
  english_pob_choice: on the Sabbath
  chosen_spanish: el sábado
  alternatives_spanish:
  - durante el sábado
  - en el sábado
  lexicon: BDAG
  rationale: 'En español, el artículo con σάββατον se expresa con naturalidad como una referencia temporal: «el sábado». Se mantiene el valor del día de reposo sin sobreexplicar el trasfondo.'
- source_word: ἡσύχασαν
  english_pob_choice: they rested
  chosen_spanish: descansaron
  alternatives_spanish:
  - guardaron reposo
  - cesaron de trabajar
  lexicon: BDAG
  rationale: En el contexto del sábado, ἡσυχάζω implica reposo o cese de actividad. «Descansaron» es claro y digno en español, sin perder la idea de observancia sabática.
- source_word: κατὰ τὴν ἐντολήν
  english_pob_choice: according to the commandment
  chosen_spanish: conforme al mandamiento
  alternatives_spanish:
  - según el mandamiento
  - de acuerdo con el mandamiento
  lexicon: BDAG
  rationale: «Conforme al mandamiento» conserva el sentido normativo de κατά con acusativo y mantiene la singularidad de ἐντολήν. En el contexto, la referencia es al mandamiento sabático de la Ley.
theological_decisions:
- issue: Referencia de «el mandamiento»
  english_pob_reading: the Mosaic commandment concerning Sabbath observance
  chosen_spanish_reading: el mandamiento mosaico relativo a la observancia del sábado
  alternative_spanish_readings:
  - un mandamiento divino general
  - su costumbre religiosa
  rationale: El contexto apunta al mandamiento de la Torá sobre el sábado. La traducción conserva la expresión breve del texto («el mandamiento») y, en la decisión teológica, aclara su referente sin introducirlo en el cuerpo del versículo.
  doctrine_reference: Principio de primacía del texto original; no añadir glosas interpretativas al texto principal cuando el referente se desprende del contexto.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el control inglés POB: se conserva la secuencia narrativa, la referencia a las preparaciones funerarias y el descanso sabático. Se ajusta solo la formulación española para mayor naturalidad y para mantener la distinción entre ἀρώματα y μύρα.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no aparece en el texto.
  - «Mandamiento» conserva la singularidad del griego ἐντολήν.
  - La distinción entre «aromas» y «ungüentos» intenta reflejar la diferencia léxica entre ἀρώματα y μύρα sin forzar equivalencias rígidas.
