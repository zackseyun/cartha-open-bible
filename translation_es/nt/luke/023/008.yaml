review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura y el sentido general del griego: Herodes ve a Jesús, se alegra mucho, desde hace tiempo quería verlo por lo que había oído de él, y esperaba ver un σημεῖον realizado por él. Sin embargo, hay un desajuste menor con la auditoría inglesa revisada en la cláusula causal: el inglés final suavizó el aspecto de ἀκούειν a ''had heard about him'', y en español ''había estado oyendo acerca de él'' suena más pesado de lo necesario. Además, ''signo'' es defendible léxicamente, pero en español bíblico general ''señal'' suele comunicar mejor σημεῖον.'
  spanish_quality_summary: 'El texto es claro y fiel, pero puede ganar naturalidad y legibilidad con ajustes pequeños: ''desde hacía bastante tiempo'' funciona, aunque ''desde hacía mucho tiempo'' suena más idiomático; ''había estado oyendo acerca de él'' resulta algo forzado; y ''alguna señal'' es más natural que ''algún signo'' en registro bíblico eclesial amplio sin perder precisión semántica. La sintaxis general es buena.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Jesús' está correcto. Para σημεῖον, el borrador usa 'signo', en línea con la decisión inglesa de evitar reducirlo a 'milagro'; no obstante, en español la mejor equivalencia contextual y eclesial suele ser 'señal', con nota alternativa para 'milagro'.
  issues:
  - severity: medium
    issue: La frase 'había estado oyendo acerca de él' suena innecesariamente pesada en español.
    rationale: Aunque el infinitivo presente ἀκούειν puede sugerir oír repetido/continuado, la revisión inglesa aprobada prefirió una forma más natural ('had heard about him'). En español, 'había oído hablar de él' mantiene la causa sin rigidez aspectual excesiva.
  - severity: medium
    issue: '''Algún signo'' es menos natural que ''alguna señal'' para σημεῖον en español bíblico general.'
    rationale: '''Signo'' no es incorrecto, pero ''señal'' suele ser la opción más idiomática y reconocible en contextos evangélicos, y preserva mejor el valor de σημεῖον sin cerrarlo a ''milagro''.'
  - severity: low
    issue: '''Desde hacía bastante tiempo'' puede mejorarse a ''desde hacía mucho tiempo''.'
    rationale: Ambas opciones son fieles, pero 'mucho tiempo' es más natural y sobrio en español neutro eclesial.
  revised_spanish_text: Entonces Herodes, al ver a Jesús, se alegró mucho, porque desde hacía mucho tiempo quería verlo, ya que había oído hablar de él, y esperaba ver alguna señal[a] hecha por él.
  revised_footnotes:
