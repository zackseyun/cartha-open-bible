translation:
  language: es
  text: Entonces Herodes, al ver a Jesús, se alegró mucho, porque desde hacía mucho tiempo quería verlo, ya que había oído hablar de él, y esperaba ver alguna señal[a] hecha por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'milagro'. El griego dice 'señal' (σημεῖον), que puede referirse a una obra portentosa vista como señal significativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ Ἡρῴδης
  english_pob_choice: Now when Herod
  chosen_spanish: Entonces Herodes
  alternatives_spanish:
  - Y Herodes
  - Ahora Herodes
  lexicon: BDAG
  rationale: δέ introduce avance narrativo; en español, 'Entonces' comunica bien el paso de escena sin forzar una temporalidad innecesaria.
- source_word: ἰδὼν τὸν Ἰησοῦν
  english_pob_choice: when Herod saw Jesus
  chosen_spanish: al ver a Jesús
  alternatives_spanish:
  - cuando vio a Jesús
  - después de ver a Jesús
  lexicon: BDAG
  rationale: El participio aoristo se entiende temporalmente. 'Al ver a Jesús' es natural y conserva la relación previa a la acción principal.
- source_word: ἐχάρη λίαν
  english_pob_choice: he rejoiced greatly
  chosen_spanish: se alegró mucho
  alternatives_spanish:
  - se regocijó grandemente
  - se alegró muchísimo
  lexicon: BDAG
  rationale: χαίρω aquí expresa gozo/alegría. 'Se alegró mucho' preserva el verbo de alegría en español natural; λίαν queda reflejado por 'mucho'.
- source_word: ἐξ ἱκανῶν χρόνων
  english_pob_choice: for a long time
  chosen_spanish: desde hacía bastante tiempo
  alternatives_spanish:
  - desde hacía mucho tiempo
  - por bastante tiempo
  lexicon: BDAG
  rationale: La expresión idiomática indica duración prolongada. 'Desde hacía bastante tiempo' mantiene el valor temporal sin especificar más de lo que el griego dice.
- source_word: θέλων ἰδεῖν αὐτὸν
  english_pob_choice: wanted to see him
  chosen_spanish: quería verlo
  alternatives_spanish:
  - deseaba verlo
  - quería ver a Jesús
  lexicon: BDAG
  rationale: θέλω expresa querer/deseo. 'Quería verlo' es breve, natural y conserva el matiz de deseo continuo asociado con ἦν + participio.
- source_word: διὰ τὸ ἀκούειν περὶ αὐτοῦ
  english_pob_choice: because he had heard about him
  chosen_spanish: ya que había estado oyendo acerca de él
  alternatives_spanish:
  - porque había oído acerca de él
  - ya que había oído hablar de él
  lexicon: BDAG
  rationale: El infinitivo presente con διά sugiere una causa vinculada a oír repetido/continuado. 'Había estado oyendo' intenta reflejar ese aspecto sin volver la frase artificial.
- source_word: ἤλπιζέν τι σημεῖον ἰδεῖν
  english_pob_choice: he was hoping to see some sign
  chosen_spanish: esperaba ver algún signo
  alternatives_spanish:
  - esperaba ver algún milagro
  - tenía la esperanza de ver alguna señal
  lexicon: BDAG
  rationale: σημεῖον se conserva como 'signo' para mantener la amplitud del término griego; el contexto sugiere un acto milagroso, pero el griego no obliga a reducirlo a 'milagro'.
- source_word: ὑπ’ αὐτοῦ γινόμενον
  english_pob_choice: done by him
  chosen_spanish: hecho por él
  alternatives_spanish:
  - realizado por él
  - efectuado por él
  lexicon: BDAG
  rationale: El participio pasivo presente con ὑπό señala agencia externa. 'Hecho por él' conserva la pasiva/agency del original con fluidez en español.
theological_decisions:
- issue: σημεῖον como 'signo' y no 'milagro'
  english_pob_reading: some sign done by him
  chosen_spanish_reading: algún signo hecho por él
  alternative_spanish_readings:
  - algún milagro hecho por él
  - alguna señal hecha por él
  rationale: Se preserva 'signo' porque el término griego σημεῖον abarca más que 'milagro' y puede señalar un acto con valor probatorio o revelador. El contexto hace pensar en una obra portentosa, pero la traducción no debe cerrar prematuramente ese alcance.
  doctrine_reference: Lexical/theological precision on σημεῖον
- issue: Relación causal del oír continuo
  english_pob_reading: because he had heard about him
  chosen_spanish_reading: ya que había estado oyendo acerca de él
  alternative_spanish_readings:
  - porque había oído acerca de él
  - ya que había oído hablar de él
  rationale: El presente infinitivo ἀκούειν sugiere una acción de oír repetida o continuada. La versión española procura dejar visible esa continuidad sin sobreinterpretar el texto.
  doctrine_reference: Aspect and discourse fidelity
translation_notes:
  revision_awareness: Se incorporó el ajuste del audit trail inglés que simplificó la mención del signo a una forma más natural, pero aquí se conservó la distinción lexical 'signo' para no perder el alcance de σημεῖον. También se mantuvo una expresión causal que refleje el valor continuativo del infinitivo de 'oír'.
  spanish_consistency_notes:
  - Se usa 'Jesús' como nombre propio sin artículo.
  - Se prefirió 'signo' para σημεῖον, con nota alternativa 'milagro' por el matiz contextual.
  - Se evitó 'SEÑOR' u otras sustituciones no presentes en el versículo.
  - La frase 'ya que había estado oyendo' intenta reflejar el aspecto durativo del original griego.
