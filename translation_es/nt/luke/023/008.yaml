revisions:
- from: Entonces Herodes, al ver a Jesús, se alegró mucho, porque desde hacía bastante tiempo quería verlo, ya que había estado oyendo acerca de él, y esperaba ver algún signo[a] hecho por él.
  to: Entonces Herodes, al ver a Jesús, se alegró mucho, porque desde hacía mucho tiempo quería verlo, ya que había oído hablar de él, y esperaba ver alguna señal[a] hecha por él.
  rationale: 'Se ajusta la redacción para mayor naturalidad y mejor alineación con la auditoría inglesa final: ''había oído hablar de él'' evita una perífrasis aspectual pesada; ''alguna señal'' comunica mejor σημεῖον en español bíblico sin reducirlo a ''milagro''; y ''desde hacía mucho tiempo'' suena más idiomático que ''bastante tiempo''. No hay cuestión doctrinal ni textual que requiera adjudicación adicional.'
  reviewer_model: gpt-5.4
