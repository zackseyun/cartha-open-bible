    reason: lexical_alternative
  revision_rationale: 'Se ajusta la redacción para mayor naturalidad y mejor alineación con la auditoría inglesa final: ''había oído hablar de él'' evita una perífrasis aspectual pesada; ''alguna señal'' comunica mejor σημεῖον en español bíblico sin reducirlo a ''milagro''; y ''desde hacía mucho tiempo'' suena más idiomático que ''bastante tiempo''. No hay cuestión doctrinal ni textual que requiera adjudicación adicional.'
