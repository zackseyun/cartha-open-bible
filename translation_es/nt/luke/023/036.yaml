translation:
  language: es
  text: Los soldados también se burlaron de él, acercándose y ofreciéndole vino agrio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vinagre». El griego ὄξος se refiere a vino agrio, una bebida barata y común; en español tradicional a menudo se traduce «vinagre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέπαιξαν
  english_pob_choice: mocked
  chosen_spanish: se burlaban de él
  alternatives_spanish:
  - lo ridiculizaban
  - se mofaban de él
  lexicon: BDAG
  rationale: El verbo ἐμπαίζω expresa burla hostil o despectiva. En español, «se burlaban de él» comunica bien esa acción con naturalidad; mantiene el tono de desprecio sin sonar excesivamente técnico o arcaizante.
- source_word: δὲ + καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - además
  lexicon: BDAG
  rationale: La combinación discursiva de δὲ con καὶ aquí añade a los soldados a la acción previa. «También» transmite con claridad que los soldados se sumaron a la burla.
- source_word: οἱ στρατιῶται
  english_pob_choice: the soldiers
  chosen_spanish: los soldados
  alternatives_spanish:
  - las tropas
  lexicon: BDAG
  rationale: στρατιῶται significa soldados. «Los soldados» es la equivalencia directa, clara y adecuada al contexto de la ejecución romana.
- source_word: προσερχόμενοι
  english_pob_choice: coming up
  chosen_spanish: acercándose
  alternatives_spanish:
  - aproximándose
  - llegando
  lexicon: BDAG
  rationale: El participio describe el movimiento hacia Jesús. «Acercándose» es la forma más natural en español y conserva el matiz aspectual de la acción en curso.
- source_word: ὄξος
  english_pob_choice: sour wine
  chosen_spanish: vino agrio
  alternatives_spanish:
  - vinagre
  - vino avinagrado
  lexicon: BDAG
  rationale: ὄξος se refiere al vino agrio, una bebida barata y agria de uso común. «Vino agrio» mantiene mejor esa referencia concreta que «vinagre», que en español moderno suele entenderse como condimento.
- source_word: προσφέροντες
  english_pob_choice: offering
  chosen_spanish: ofreciéndole
  alternatives_spanish:
  - presentándole
  - llevándole
  lexicon: BDAG
  rationale: El participio indica que le estaban ofreciendo la bebida. «Ofreciéndole» conserva el sentido de la acción y la ironía narrativa del pasaje.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo se expresa naturalmente en español con el clítico de objeto indirecto «le». Aquí se integra bien con «ofreciéndole».
theological_decisions:
- issue: Naturaleza del gesto de ofrecer el ὄξος
  english_pob_reading: The verse is rendered neutrally as an act within the mockery scene, without implying either compassion or intensified cruelty beyond what the text states.
  chosen_spanish_reading: El versículo se traduce de manera neutral dentro de la escena de burla, sin convertir el gesto en un acto de compasión ni en una crueldad más intensa de la que el texto expresa.
  alternative_spanish_readings:
  - El gesto fue un pequeño acto de misericordia
  - El gesto fue una burla puramente cruel
  rationale: El contexto inmediato presenta burla, pero este versículo por sí solo no explicita una intención adicional. La traducción conserva esa tensión y deja que el contexto narrativo determine el tono sin imponer una lectura psicológica o moral más amplia.
  doctrine_reference: Conservar la tensión interpretativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión sigue el expediente inglés aprobado y no introduce cambios respecto del último pase; se mantiene la equivalencia óptima ya validada por el control cruzado.
  spanish_consistency_notes:
  - Se preserva «Dios»/«Yahvé» según corresponda, aunque este versículo no los contiene.
  - Se usa «vino agrio» para ὄξος, evitando el posible malentendido moderno de «vinagre» como condimento.
  - La estructura mantiene el participio narrativo con «acercándose y ofreciéndole», en paralelo al flujo del griego.
