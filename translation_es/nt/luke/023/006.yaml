translation:
  language: es
  text: Pero Pilato[a], al oír esto, preguntó si el hombre era galileo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También podría traducirse más formalmente: «habiendo oído, preguntó si el hombre es galileo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πιλᾶτος
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  alternatives_spanish:
  - Pilate
  lexicon: BDAG
  rationale: Nombre propio transliterado al español con la forma establecida y natural en el uso bíblico.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce un giro narrativo suave; en español, 'Pero' refleja bien el avance inmediato de la escena tras lo escuchado por Pilato.
- source_word: ἀκούσας
  english_pob_choice: hearing this
  chosen_spanish: al oír esto
  alternatives_spanish:
  - habiendo oído
  - cuando oyó
  lexicon: BDAG
  rationale: El participio aoristo se vierte con una construcción natural en español que mantiene la relación temporal con la acción principal sin añadir más contenido del que ofrece el griego.
- source_word: ἐπηρώτησεν
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - inquirió
  - interrogó
  lexicon: BDAG
  rationale: El verbo expresa una acción de preguntar o hacer una indagación; 'preguntó' es la opción más directa y natural en español.
- source_word: εἰ
  english_pob_choice: whether
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  lexicon: BDAG
  rationale: Introduce una pregunta indirecta; en español 'si' es la manera normal de reproducir esa construcción.
- source_word: ὁ ἄνθρωπος
  english_pob_choice: the man
  chosen_spanish: aquel hombre
  alternatives_spanish:
  - el hombre
  - ese hombre
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente 'el hombre', en contexto español conviene una referencia ligeramente anafórica ('aquel hombre') para evitar aspereza y para reflejar la referencia ya identificable en la escena, sin convertirla en una demostración más fuerte de la que el texto exige.
- source_word: Γαλιλαῖός
  english_pob_choice: a Galilean
  chosen_spanish: galileo
  alternatives_spanish:
  - galileo de Galilea
  - de Galilea
  lexicon: BDAG
  rationale: El adjetivo predicativo designa procedencia o identidad regional; 'galileo' comunica de modo natural la categoría en español.
- source_word: ἐστιν
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - es
  lexicon: BDAG
  rationale: En estilo indirecto tras un verbo en pasado, el español normalmente retrocede el tiempo verbal; 'era' corresponde a la solución idiomática que el POB inglés también adopta con 'was'.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español y que no haya notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene el nombre propio 'Pilato' como transliteración estable.
  - Se preserva la estructura narrativa breve y la pregunta indirecta del griego sin ampliar innecesariamente el sentido.
  - El tiempo verbal 'era' sigue la acomodación natural del español en discurso indirecto, en línea con la decisión inglesa de 'was'.
