translation:
  language: es
  text: Y todas las multitudes que se habían reunido para este espectáculo[a], después de ver lo que había sucedido, volvían[b], dándose golpes en el pecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para esta vista».
    reason: lexical_alternative
  - marker: b
    text: Gesto de duelo, lamento o conmoción.
    reason: cultural_note
lexical_decisions:
- source_word: συμπαραγενόμενοι
  english_pob_choice: had gathered
  chosen_spanish: se había reunido
  alternatives_spanish:
  - se había juntado
  - se había congregado
  - había acudido
  lexicon: BDAG
  rationale: El participio describe a las personas que habían llegado y se habían reunido en el lugar. «Se había reunido» comunica bien la idea colectiva en español y evita sobrecargar el prefijo σύν-.
- source_word: ὄχλοι
  english_pob_choice: crowds
  chosen_spanish: la multitud
  alternatives_spanish:
  - las multitudes
  - la gente
  lexicon: BDAG
  rationale: Aunque el griego está en plural, en español «la multitud» suena natural y conserva el sentido colectivo del grupo reunido. En este contexto, el plural literal «las multitudes» resultaría más forzado.
- source_word: ἐπὶ τὴν θεωρίαν ταύτην
  english_pob_choice: for this spectacle
  chosen_spanish: para este espectáculo
  alternatives_spanish:
  - para esta vista
  - para este espectáculo público
  - para ver este espectáculo
  lexicon: BDAG
  rationale: θεωρία puede referirse a una visión, contemplación o espectáculo público. Aquí «espectáculo» refleja el carácter público de la escena. Se mantiene una nota alternativa porque «vista» es una posibilidad más literal.
- source_word: θεωρήσαντες
  english_pob_choice: after seeing
  chosen_spanish: después de ver
  alternatives_spanish:
  - habiendo visto
  - cuando vieron
  - tras ver
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a la del verbo principal. «Después de ver» es natural en español y preserva esa secuencia temporal.
- source_word: τὰ γενόμενα
  english_pob_choice: what had happened
  chosen_spanish: lo que había sucedido
  alternatives_spanish:
  - las cosas que habían sucedido
  - lo que había pasado
  - lo ocurrido
  lexicon: BDAG
  rationale: La expresión substantivada se refiere a los hechos acontecidos. «Lo que había sucedido» comunica claramente el sentido eventivo sin añadir interpretación.
- source_word: τύπτοντες τὰ στήθη
  english_pob_choice: beating their chests
  chosen_spanish: golpeándose el pecho
  alternatives_spanish:
  - golpeándose el pecho con las manos
  - dándose golpes en el pecho
  - golpeándose el pecho
  lexicon: BDAG
  rationale: La frase describe un gesto físico de lamento, shock o dolor. «Golpeándose el pecho» mantiene el acto corporal sin interpretar de manera explícita si implicaba arrepentimiento.
- source_word: ὑπέστρεφον
  english_pob_choice: were returning
  chosen_spanish: regresaba
  alternatives_spanish:
  - regresaban
  - volvía
  - volvían
  lexicon: BDAG
  rationale: El imperfecto griego indica acción en curso. En español, «regresaba» transmite ese trasfondo aspectual de manera fluida; el singular colectivo concuerda con «la multitud».
theological_decisions:
- issue: Sentido del gesto de golpear el pecho
  english_pob_reading: The translation leaves the gesture as a physical act of lament ('beating their chests') without specifying repentance, guilt, or mere shock.
  chosen_spanish_reading: La traducción deja el gesto como una acción física de lamento («golpeándose el pecho») sin precisar si implicaba arrepentimiento, culpa o solo conmoción.
  alternative_spanish_readings:
  - se arrepentían
  - expresaban duelo o horror
  - mostraban dolor
  rationale: El griego describe el gesto, pero no explicita el estado espiritual interior. Mantenerlo como gesto físico preserva la tensión teológica y evita imponer una conclusión no expresada por el texto.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con el audito en inglés. Se mantuvo la misma decisión interpretativa principal: traducir θεωρία como «espectáculo» y no resolver el gesto final como arrepentimiento; la única adaptación relevante fue ajustar la concordancia y la fluidez natural del español.'
  spanish_consistency_notes:
  - Se preserva el valor colectivo del grupo con una construcción natural en español.
  - Se mantiene la secuencia temporal del participio aoristo con «después de ver».
  - «Golpeándose el pecho» conserva el gesto corporal sin añadir contenido doctrinal.
  - La nota de «espectáculo» ofrece la alternativa literal «vista» para reflejar la ambigüedad léxica de θεωρία.
