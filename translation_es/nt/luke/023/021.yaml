translation:
  language: es
  text: 'Pero ellos seguían gritando, diciendo: «¡Crucifícalo[a], crucifícalo!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «Ejecútalo en una cruz, ejecútalo en una cruz».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Pero aquellos
  - Y ellos
  lexicon: BDAG
  rationale: El artículo sustantivado apunta al grupo presente en el contexto; en español conviene explicitar el sujeto con 'ellos' para que la frase fluya de manera natural. 'Pero' conserva el matiz adversativo de δέ.
- source_word: ἐπεφώνουν
  english_pob_choice: kept shouting
  chosen_spanish: seguían gritando
  alternatives_spanish:
  - gritaban
  - seguían clamando
  - no dejaban de gritar
  lexicon: BDAG
  rationale: El imperfecto expresa acción استمرار/continua; 'seguían gritando' preserva esa iteración y el tono insistente de la multitud con naturalidad en español.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - clamando
  lexicon: BDAG
  rationale: El participio contemporáneo introduce el contenido del grito; 'diciendo' es literal e idiomático en español.
- source_word: Σταύρου σταύρου
  english_pob_choice: Crucify him, crucify him
  chosen_spanish: Crucifícalo, crucifícalo
  alternatives_spanish:
  - Crucifíquenlo, crucifíquenlo
  - Ejecuta(lo) en una cruz, ejecútalo en una cruz
  lexicon: BDAG
  rationale: El imperativo singular reproduce la urgencia directa del griego. 'Crucifícalo' mantiene el valor lexical de σταυρόω y el objeto explícito αὐτόν; el plural de cortesía no corresponde al texto.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre acusativo directo de la orden se expresa naturalmente con 'lo' en español. Mantener el objeto explícito ayuda a reflejar el griego y evita ambigüedad.
theological_decisions:
- issue: Cómo rendir σταυρόω en la demanda de ejecución
  english_pob_reading: Crucify
  chosen_spanish_reading: Crucifícalo
  alternative_spanish_readings:
  - Ejecútalo en una cruz
  - Pásalo por la cruz
  rationale: La forma española tradicional y precisa para σταυρόω es 'crucificar'. Aunque existe la alternativa explicativa 'ejecutar en una cruz', el texto griego y la revisión inglesa prefieren la equivalencia directa sin expandir el sentido.
  doctrine_reference: Lexical primacy from original-language source; no doctrinal expansion beyond the execution demand.
translation_notes:
  revision_awareness: 'El texto inglés fue revisado para reflejar la repetición imperativa como «Crucify him, crucify him!» y no «Crucify, crucify him!». En español se preserva esa repetición con objeto explícito en ambos miembros: «Crucifícalo, crucifícalo».'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y contemporáneo.
  - No se sustituye el imperativo por una paráfrasis explicativa.
  - La puntuación y las comillas siguen el uso español estándar.
