    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Tal como está, induce a pensar que hay una variante o nota sobre «Jesús», cuando la explicación corresponde a παρατίθεμαι / «encomiendo».
  - severity: medium
    issue: «Habiendo dicho esto» suena más calcado que natural en español corriente.
    rationale: Aunque es gramatical, «Después de decir esto» conserva el valor previo del participio aoristo y resulta más idiomático sin perder fidelidad.
  - severity: low
