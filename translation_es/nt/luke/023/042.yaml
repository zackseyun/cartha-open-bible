  glossary_alignment: El borrador mantiene correctamente «Jesús» para Ἰησοῦ y «reino» para βασιλεία. No hay conflicto con la terminología de proyecto. La elección «acuérdate de mí» es una buena equivalencia española de μνήσθητί μου.
