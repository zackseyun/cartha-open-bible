translation:
  language: es
  text: 'Y él dijo[a]: «Jesús, acuérdate de mí cuando vengas en tu reino[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando vengas a tu reino». Algunos manuscritos expresan más explícitamente la idea de movimiento, mientras que el texto SBLGNT dice «en tu reino».
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Conectivo narrativo simple; en español, «Y» conserva la coordinación sin añadir énfasis interpretativo.
- source_word: ἔλεγεν
  english_pob_choice: he said
  chosen_spanish: él decía
  alternatives_spanish:
  - él dijo
  - estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto puede expresar acción en desarrollo; «decía» conserva ese valor mejor que un pasado puntual, aunque en español sigue siendo natural en introducción de discurso directo.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio en vocativo; se mantiene la forma establecida en español.
- source_word: μνήσθητί
  english_pob_choice: remember
  chosen_spanish: acuérdate
  alternatives_spanish:
  - recuerda
  - ten presente
  lexicon: BDAG
  rationale: En petición directa, el imperativo de μιμνῄσκομαι se expresa de manera natural como «acuérdate de mí»; comunica la súplica personal sin sobreexplicar la implicación de favor.
- source_word: μου
  english_pob_choice: me
  chosen_spanish: de mí
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: En español, el giro idiomático con «acordarse» exige complemento con «de»; preserva el sentido relacional del ruego.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  lexicon: BDAG
  rationale: Introduce una circunstancia futura con subjuntivo; «cuando» es el equivalente idiomático y claro en español.
- source_word: ἔλθῃς
  english_pob_choice: you come
  chosen_spanish: vengas
  alternatives_spanish:
  - llegues
  - vengas a
  lexicon: BDAG
  rationale: El verbo de movimiento se expresa naturalmente con «venir» en este contexto escatológico; mantiene la sencillez del original.
- source_word: ἐν τῇ βασιλείᾳ σου
  english_pob_choice: in your kingdom
  chosen_spanish: en tu reino
  alternatives_spanish:
  - en tu realeza
  - en tu reinado
  lexicon: BDAG
  rationale: Se traduce βασιλεία como «reino», la opción más idiomática y fiel en español bíblico. «En» refleja directamente ἐν, y se conserva la posibilidad de lectura espacial/relacional sin forzar «hacia» o «dentro de».
theological_decisions:
- issue: Alcance escatológico de «en tu reino»
  english_pob_reading: The speaker asks to be remembered at Jesus' future coming into his kingdom, without specifying timing beyond the text.
  chosen_spanish_reading: El hablante pide ser recordado cuando Jesús venga en su reino, sin precisar más el marco temporal o la cronología final.
  alternative_spanish_readings:
  - cuando vengas a tu reino
  - cuando vengas con tu reino
  - cuando vengas en poder real
  rationale: La frase conserva la referencia futura a la realeza de Jesús, pero no resuelve el alcance exacto del acontecimiento. Mantener esa apertura evita introducir un esquema escatológico más preciso que el del versículo.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «into your kingdom» a «in your kingdom» para ajustarse más de cerca a ἐν τῇ βασιλείᾳ σου. La redacción española sigue esa corrección con «en tu reino» y evita introducir una direccionalidad («a/dentro de») que el texto base no exige.
  spanish_consistency_notes:
  - Se usa «Jesús» como nombre propio establecido.
  - Se conserva «reino» para βασιλεία, no «reinado», por ser la opción más natural y estable en español bíblico.
  - Se mantiene el registro reverente pero moderno, sin arcaísmos innecesarios.
  - La nota crítica se ancla en la frase «en tu reino» para reflejar la alternativa textual/traslacional preservada en el auditorio inglés.
