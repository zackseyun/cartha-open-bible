translation:
  language: es
  text: 'Entonces comenzarán a decir a los montes[a]: «Caigan sobre nosotros», y a los collados[b]: «Cúbrannos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este lenguaje evoca el juicio profético, especialmente Oseas 10:8.
    reason: cross_reference
  - marker: b
    text: O «Escóndannos». El verbo significa literalmente «cubrir», pero en este contexto lleva la idea de ocultarnos del juicio venidero.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Marca secuencia temporal y mantiene el avance narrativo del contexto anterior sin añadir matiz interpretativo.
- source_word: ἄρξονται λέγειν
  english_pob_choice: they will begin to say
  chosen_spanish: comenzarán a decir
  alternatives_spanish:
  - empezarán a decir
  - dirán
  lexicon: BDAG
  rationale: Conserva el matiz incoativo de ἄρχω con infinitivo, evitando reducirlo a un simple futuro 'dirán'.
- source_word: τοῖς ὄρεσιν
  english_pob_choice: to the mountains
  chosen_spanish: a los montes
  alternatives_spanish:
  - a las montañas
  - a los cerros
  lexicon: BDAG
  rationale: '''Montes'' es natural en español bíblico y preserva la distinción con βουνοῖς, que se rinde aparte.'
- source_word: Πέσετε
  english_pob_choice: Fall
  chosen_spanish: Caigan
  alternatives_spanish:
  - Caed
  - Caigan sobre
  lexicon: BDAG
  rationale: El imperativo plural en español requiere una forma natural dirigida a los montes; 'Caigan' transmite la orden con claridad y sin rusticidad.
- source_word: ἐφ’ ἡμᾶς
  english_pob_choice: on us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - encima de nosotros
  - contra nosotros
  lexicon: BDAG
  rationale: '''Sobre nosotros'' es idiomático y conserva el sentido de movimiento hacia/encima de las víctimas implícito en ἐπί con acusativo.'
- source_word: τοῖς βουνοῖς
  english_pob_choice: to the hills
  chosen_spanish: a los collados
  alternatives_spanish:
  - a los cerros
  - a las colinas
  lexicon: BDAG
  rationale: '''Collados'' distingue βουνός de ὄρος en español y refleja bien el par montes/collados sin sonar excesivamente técnico.'
- source_word: Καλύψατε
  english_pob_choice: Cover
  chosen_spanish: Cúbrenos
  alternatives_spanish:
  - Cúbrannos
  - Escóndannos
  lexicon: BDAG
  rationale: '''Cubrir'' es la traducción más directa; en el imperativo plural español, ''Cúbrenos'' mantiene la literalidad y el tono de la cita profética, dejando la posible implicación de ocultamiento para la nota.'
theological_decisions:
- issue: Lenguaje profético de juicio e intertextualidad
  english_pob_reading: Retain the literal cry to mountains and hills without interpretive expansion.
  chosen_spanish_reading: Conservar el grito literal a montes y collados sin expandirlo interpretativamente en el texto principal.
  alternative_spanish_readings:
  - Expresar explícitamente 'escondednos del juicio'
  - Parafrasear como una petición de refugio
  rationale: La frase alude al lenguaje profético de juicio y mantiene una tensión teológica que el POB inglés decidió no resolver en el cuerpo del texto. La traducción española conserva esa imagen concreta y deja la implicación de ocultamiento en nota.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión inglesa de referencia está en alta concordancia y fue revisada sin cambios sustanciales; la presente propuesta sigue esa línea estable y conserva la distinción léxica entre ὄρεσιν y βουνοῖς.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no la contiene.
  - Se usa 'montes' / 'collados' para preservar la distinción léxica del griego entre ὄρος y βουνός.
  - El imperativo plural español se adapta naturalmente a una cita dirigida a entidades personificadas, sin introducir explicaciones en el texto principal.
