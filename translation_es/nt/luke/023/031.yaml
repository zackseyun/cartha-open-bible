translation:
  language: es
  text: Porque si hacen estas cosas cuando el leño está verde[a][b], ¿qué sucederá cuando esté seco?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el leño verde ... en el seco». El griego conserva la imagen más literalmente; la traducción la expresa de manera más natural en español como un contraste de estado.'
    reason: lexical_alternative
  - marker: b
    text: 'La imagen probablemente va de lo menor a lo mayor: si tales cosas se hacen con el leño verde, ¿qué sucederá con el seco?'
    reason: cultural_note
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón o fundamento de la advertencia anterior; en español, «Porque» expresa con naturalidad esa relación causal sin perder el valor explicativo del griego.
- source_word: εἰ
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: BDAG
  rationale: La condición del griego se conserva con «si». Aunque el inglés POB usó «when» para naturalidad, en español la estructura condicional con «si» comunica mejor la forma del dicho sin resolverlo interpretativamente.
- source_word: ἐν τῷ ὑγρῷ ξύλῳ
  english_pob_choice: when the wood is green
  chosen_spanish: cuando el árbol está verde
  alternatives_spanish:
  - en el árbol verde
  - cuando la madera está verde
  lexicon: BDAG
  rationale: La imagen proverbial se mantiene, pero «árbol» resulta más natural en español que una repetición literal de «madera» en un dicho de contraste visual. «Verde» conserva el valor idiomático de ὑγρός en este contexto, mientras que «está verde» evita un calco torpe.
- source_word: ὑγρῷ
  english_pob_choice: green
  chosen_spanish: verde
  alternatives_spanish:
  - húmedo
  - mojado
  - fresco
  lexicon: BDAG
  rationale: Aunque el adjetivo básico puede significar húmedo o mojado, en este contraste proverbial con ξηρός la equivalencia más inteligible en español es «verde», como en la imagen de madera sin secar.
- source_word: ξύλῳ
  english_pob_choice: wood
  chosen_spanish: árbol
  alternatives_spanish:
  - madera
  - leño
  - leña
  lexicon: BDAG
  rationale: ξύλον puede referirse a madera o árbol según contexto. Dado que el dicho contrapone «verde» y «seco» de manera proverbial y el español bíblico suele entender este tipo de imagen con «árbol», se eligió esa opción para preservar la metáfora con claridad. «Madera» queda como alternativa válida, pero menos idiomática en esta construcción.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: Se conserva el plural demostrativo, que remite de manera amplia a los hechos y tratos mencionados en el contexto inmediato.
- source_word: ποιοῦσιν
  english_pob_choice: they do
  chosen_spanish: hacen
  alternatives_spanish:
  - están haciendo
  - hacen estas cosas
  lexicon: BDAG
  rationale: El verbo se expresa de manera directa y natural en español. El sujeto indefinido del griego queda implícito, como suele ocurrir en español cuando el contexto lo permite.
- source_word: ἐν τῷ ξηρῷ
  english_pob_choice: when it is dry
  chosen_spanish: cuando esté seco
  alternatives_spanish:
  - en el seco
  - cuando el árbol esté seco
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con la primera cláusula. «Esté seco» comunica la condición futura/hipotética de forma idiomática, y la referencia al árbol se sobreentiende por el contexto de la metáfora.
- source_word: τί γένηται
  english_pob_choice: what will happen
  chosen_spanish: ¿qué sucederá?
  alternatives_spanish:
  - ¿qué pasará?
  - ¿qué llegará a ser?
  lexicon: BDAG
  rationale: La pregunta retórica expresa resultado esperado; «sucederá» preserva ese valor sin introducir una interpretación adicional. «Llegará a ser» sería demasiado literal y menos natural en este contexto.
theological_decisions:
- issue: Sentido de la imagen del árbol verde y el seco
  english_pob_reading: Retain the metaphor without interpreting it in the main text.
  chosen_spanish_reading: Mantener la metáfora sin explicarla en el texto principal.
  alternative_spanish_readings:
  - Jesús se identifica con el árbol verde y otros con el seco
  - Es un proverbio general de menor a mayor sobre juicio
  rationale: La referencia exacta del contraste es interpretativa. Para no cerrar la tensión teológica que el texto deja abierta, la versión española conserva la imagen proverbial sin identificar de forma explícita sus referentes.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'Se siguió el pasaje base sin cambios relevantes respecto del último repaso; la elección española mantiene el paralelismo y la metáfora, con ajuste idiomático para lectura pública. '
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en otros pasajes cuando corresponda; este versículo no contiene el nombre divino.
  - Se mantuvo el carácter proverbial de la imagen sin identificar de forma cerrada sus referentes.
  - «Árbol» se eligió como equivalente contextual de ξύλον para conservar el paralelismo con «verde/seco» en español.
  - Se evitó una paráfrasis explicativa en el cuerpo del texto para no borrar la ambigüedad teológica documentada.
