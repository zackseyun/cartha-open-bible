translation:
  language: es
  text: Y al enterarse de que estaba bajo la jurisdicción de Herodes[a], lo envió a Herodes, quien él mismo también estaba en Jerusalén en aquellos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo la autoridad de Herodes». La expresión griega se refiere al ámbito de gobierno o a la autoridad legal de Herodes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνοὺς
  english_pob_choice: when he learned
  chosen_spanish: al darse cuenta de que
  alternatives_spanish:
  - cuando supo
  - habiendo sabido
  - al enterarse de que
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a la del verbo principal. En español, «al darse cuenta de que» mantiene bien la relación temporal y suena natural en narrativa; «cuando supo» también sería posible, pero «darse cuenta» refleja la percepción del dato antes de actuar.
- source_word: ἐκ τῆς ἐξουσίας Ἡρῴδου ἐστὶν
  english_pob_choice: he was under Herod’s jurisdiction
  chosen_spanish: estaba bajo la jurisdicción de Herodes
  alternatives_spanish:
  - estaba bajo la autoridad de Herodes
  - pertenecía a la jurisdicción de Herodes
  - estaba bajo el dominio de Herodes
  lexicon: BDAG
  rationale: La expresión griega apunta al ámbito administrativo o legal de Herodes, no solo a una idea abstracta de poder. «Jurisdicción» conserva ese matiz forense y político en español, en línea con la opción inglesa auditada.
- source_word: ἀνέπεμψεν
  english_pob_choice: he sent him
  chosen_spanish: lo envió
  alternatives_spanish:
  - lo remitió
  - lo devolvió
  - lo mandó
  lexicon: BDAG
  rationale: En este contexto judicial, el verbo puede sugerir remisión de un caso, pero el español simple «lo envió» comunica con claridad la acción principal sin sobrecargar el verso. El matiz legal queda apoyado por «jurisdicción».
- source_word: πρὸς Ἡρῴδην
  english_pob_choice: to Herod
  chosen_spanish: a Herodes
  alternatives_spanish:
  - hacia Herodes
  - ante Herodes
  - para Herodes
  lexicon: BDAG
  rationale: πρός con acusativo indica movimiento hacia una persona. «A Herodes» es la forma más natural y fiel en español.
- source_word: ὄντα καὶ αὐτὸν
  english_pob_choice: who himself was also
  chosen_spanish: quien también estaba
  alternatives_spanish:
  - quien él mismo también estaba
  - que también estaba allí
  - quien asimismo estaba
  lexicon: BDAG
  rationale: La frase participial modifica a Herodes y el énfasis de καὶ αὐτόν es que Herodes también se encontraba allí. En español, «quien también estaba» conserva el referente y evita una repetición excesivamente pesada; el énfasis se entiende por el contexto.
- source_word: ἐν Ἱεροσολύμοις
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: BDAG
  rationale: Es el nombre propio estándar de la ciudad en español.
- source_word: ἐν ταύταις ταῖς ἡμέραις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - durante aquellos días
  - en ese tiempo
  lexicon: BDAG
  rationale: La expresión temporal es idiomática; «en aquellos días» es natural en español bíblico contemporáneo y preserva la referencia narrativa.
theological_decisions:
- issue: Sentido político-jurídico de ἐξουσία aplicado a Herodes
  english_pob_reading: jurisdiction
  chosen_spanish_reading: jurisdicción
  alternative_spanish_readings:
  - autoridad
  - dominio
  rationale: No se trata aquí de una afirmación doctrinal sobre autoridad espiritual, sino del marco legal-administrativo en que Jesús es enviado a Herodes. «Jurisdicción» evita diluir ese sentido y reproduce bien la precisión del texto fuente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pasaje fuente griego y el audit trail inglés: la elección principal mantiene el matiz jurídico de ἐξουσία con una formulación española natural. No se detectaron revisiones posteriores que exigieran ajuste del sentido.'
  spanish_consistency_notes:
  - Se usó «Herodes» de forma consistente para el nombre propio.
  - Se mantuvo «jurisdicción» como término técnico principal para ἐξουσία en este contexto.
  - El tono es sobrio y bíblico sin recurrir a calcos innecesarios.
