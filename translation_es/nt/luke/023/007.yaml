revisions:
- from: Y al darse cuenta de que estaba bajo la jurisdicción de Herodes[a], lo envió a Herodes, quien también estaba en Jerusalén en aquellos días.
  to: Y al enterarse de que estaba bajo la jurisdicción de Herodes[a], lo envió a Herodes, quien él mismo también estaba en Jerusalén en aquellos días.
  rationale: Se ajusta ἐπιγνοὺς a «al enterarse de que» para reflejar mejor el valor narrativo del participio, y se refuerza el énfasis de ὄντα καὶ αὐτὸν con «quien él mismo también estaba», preservando el sentido del original y del audit trail inglés. Se mantiene «jurisdicción» y su nota por ser una decisión léxica correcta y precisa.
