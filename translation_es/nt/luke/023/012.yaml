    rationale: La nota [a] explica una alternativa para φίλοι ('amistosos'), por lo que debe ir con 'amigos', no con 'entre sí'. La nota [b] explica una alternativa para la cláusula de enemistad previa, no para 'aquel mismo día'.
  - severity: low
