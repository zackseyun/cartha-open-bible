    rationale: En español bíblico y general, comenzar con 'Y Herodes y Pilato' es posible, pero sin necesidad de reproducir de forma rígida el καί implícito del inglés. 'Herodes y Pilato' mejora la fluidez sin pérdida de sentido.
  - severity: low
    issue: Expresión recíproca final algo pesada
    rationale: '''El uno con el otro'' es correcto, pero ''entre sí'' es más natural aquí y ya corresponde bien al sentido recíproco del griego en este contexto.'
  revised_spanish_text: Herodes y Pilato se hicieron amigos[a] entre sí aquel mismo día, porque antes estaban enemistados entre sí[b].
