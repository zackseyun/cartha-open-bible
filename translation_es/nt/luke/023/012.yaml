translation:
  language: es
  text: Herodes y Pilato se hicieron amigos[a] entre sí aquel mismo día, porque antes estaban enemistados entre sí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se hicieron amistosos entre sí'.
    reason: lexical_alternative
  - marker: b
    text: O 'habían estado antes en enemistad entre sí'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένοντο
  english_pob_choice: became
  chosen_spanish: se hicieron
  alternatives_spanish:
  - llegaron a ser
  - se volvieron
  lexicon: BDAG
  rationale: El aoristo de γίνομαι señala un cambio de estado o relación. En español, 'se hicieron' comunica bien ese cambio sin perder naturalidad ni introducir un sentido más fuerte que el del texto.
- source_word: φίλοι
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - amigables
  - aliados
  lexicon: BDAG
  rationale: '''Amigos'' refleja el sustantivo predicativo del griego. ''Aliados'' sería posible en un contexto político, pero el texto no lo especifica; ''amigables'' rebajaría demasiado el valor nominal.'
- source_word: ὅ τε Ἡρῴδης καὶ ὁ Πιλᾶτος
  english_pob_choice: Herod and Pilate
  chosen_spanish: Herodes y Pilato
  alternatives_spanish:
  - ambos, Herodes y Pilato
  - Herodes junto con Pilato
  lexicon: BDAG
  rationale: La construcción correlativa incluye a ambos sujetos. En español el nombre simple de los dos personajes transmite esa coordinación de forma natural; no es necesario añadir 'ambos'.
- source_word: ἐν αὐτῇ τῇ ἡμέρᾳ
  english_pob_choice: on that very day
  chosen_spanish: aquel mismo día
  alternatives_spanish:
  - ese mismo día
  - en aquel mismo día
  lexicon: BDAG
  rationale: La doble marca demostrativa expresa énfasis temporal. 'Aquel mismo día' conserva mejor ese énfasis que un simple 'ese día'.
- source_word: μετ’ ἀλλήλων
  english_pob_choice: with each other
  chosen_spanish: entre sí
  alternatives_spanish:
  - el uno con el otro
  - mutuamente
  lexicon: BDAG
  rationale: La reciprocidad del griego se puede expresar con 'entre sí', que es natural en español y evita una repetición pesada de los nombres.
- source_word: προϋπῆρχον
  english_pob_choice: previously they had been
  chosen_spanish: antes estaban
  alternatives_spanish:
  - antes habían estado
  - ya antes eran
  lexicon: BDAG
  rationale: El imperfecto expresa un estado anterior y continuo. 'Antes estaban' mantiene la anterioridad y la continuidad sin volver la frase torpe en español.
- source_word: ἐν ἔχθρᾳ
  english_pob_choice: in hostility
  chosen_spanish: enemistados
  alternatives_spanish:
  - en enemistad
  - hostiles
  lexicon: BDAG
  rationale: ἔχθρα denota enemistad/hostilidad. 'Enemistados' permite un español fluido y conserva la relación de oposición; 'en enemistad' sería más literal pero menos idiomático.
- source_word: ὄντες
  english_pob_choice: had been
  chosen_spanish: estaban
  alternatives_spanish:
  - siendo
  - habían estado
  lexicon: BDAG
  rationale: El participio presente, coordinado con el imperfecto, refuerza la condición previa. Integrarlo con 'estaban' produce un español claro y fiel al estado continuo.
- source_word: πρὸς αὑτούς
  english_pob_choice: toward each other
  chosen_spanish: el uno con el otro
  alternatives_spanish:
  - unos a otros
  - entre sí
  lexicon: BDAG
  rationale: La preposición πρός conserva una orientación relacional de mutua oposición. 'El uno con el otro' expresa con claridad la referencia recíproca y la tensión interpersonal.
theological_decisions:
- issue: Alcance del cambio relacional entre Herodes y Pilato
  english_pob_reading: The verse states that they became friends or political allies that day without specifying deeper moral or theological significance.
  chosen_spanish_reading: El versículo afirma un cambio real de relación entre Herodes y Pilato ese día, sin precisar si fue amistad personal o una alianza circunstancial.
  alternative_spanish_readings:
  - El versículo podría entenderse como que se volvieron simplemente más cordiales.
  - Podría leerse como una alianza política más que amistad personal.
  rationale: El griego permite 'amigos' o un matiz de relación favorable, pero no explica motivos. La traducción española debe dejar abierto el alcance exacto del vínculo sin resolverlo más allá del texto.
  doctrine_reference: Preservar la tensión interpretativa sin sobreinterpretar el motivo del cambio.
translation_notes:
  revision_awareness: La redacción sigue el consenso alto del audit trail inglés y conserva el contraste temporal entre la nueva amistad y la enemistad previa, evitando suavizar la fuerza relacional de φίλοι y ἔχθρα. Se optó por una formulación española más natural ('se hicieron amigos', 'antes estaban enemistados') sin perder la reciprocidad.
  spanish_consistency_notes:
  - Se mantiene 'Herodes' y 'Pilato' como formas estándar de los nombres propios.
  - '''Amigos'' se usa como equivalente principal de φίλοι, reservando ''amistosos'' como alternativa de nota para no debilitar el sustantivo del griego.'
  - '''Enemistados'' traduce ἔχθρα/πρὸς αὑτούς con una solución idiomática que conserva la relación mutua negativa.'
  - La nota temporal 'aquel mismo día' preserva el énfasis demostrativo del griego.
  - La reciprocidad queda explícita en 'entre sí', coherente con el valor relacional de μετ’ ἀλλήλων y πρὸς αὑτούς.
