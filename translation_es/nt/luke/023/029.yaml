revisions:
- from: 'Porque, he aquí[a], vienen días en que dirán: «Bienaventuradas las estériles, y los vientres que no concibieron, y los pechos que no amamantaron».'
  to: 'Porque, he aquí[a], vienen días en que dirán: «Bienaventuradas las estériles, y los vientres que no dieron a luz, y los pechos que no amamantaron».'
  rationale: Se corrige «que no concibieron» a «que no dieron a luz» para reflejar con fidelidad αἳ οὐκ ἐγέννησαν y la decisión léxica documentada en el English POB («that never bore»). El resto del texto puede mantenerse.
  reviewer_model: gpt-5.4
