review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y la lógica del English POB: ὅτι como conexión causal/explanativa, ἰδοὺ con tono deíctico solemne, ἔρχονται ἡμέραι como modismo profético, y la tercera plural indefinida en «dirán». También conserva correctamente la fuerza solemne de μακάριαι con nota de alternativa léxica. Sin embargo, hay un desajuste importante en αἳ οὐκ ἐγέννησαν: el griego significa «no dieron a luz / no engendraron / no parieron», no «no concibieron».'
  spanish_quality_summary: El español es claro y digno, pero «los vientres que no concibieron» suena menos natural y además semánticamente impreciso, porque en español concibe la mujer, no el vientre, y «concebir» desplaza el sentido desde dar a luz hacia quedar embarazada. Conviene ajustar a una formulación anatómicamente y semánticamente más natural. El resto del verso es legible; «he aquí» funciona por solemnidad, y «pechos que no amamantaron» es aceptable en registro bíblico amplio.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Bienaventuradas» representa bien μακάριαι en este contexto. No intervienen términos del glosario principal como Yahvé, Mesías, espíritu, etc. La decisión revisada debe seguir la razón léxica del English POB para γεννάω: «dar a luz / llevar a término el parto», no «concebir».'
  issues:
  - severity: high
    issue: «que no concibieron» no refleja fielmente αἳ οὐκ ἐγέννησαν
    rationale: γεννάω aquí se refiere a dar a luz / parir / engendrar en contexto de maternidad, como muestra el English POB «that never bore». «Concebir» traduce una etapa distinta del proceso y altera el significado.
  - severity: medium
    issue: «los vientres que no concibieron» resulta poco idiomático en español
    rationale: Aunque «vientres» puede funcionar para κοιλίαι, en español el sujeto natural de «concebir» no es «vientres». «Los vientres que no dieron a luz» o «los vientres que nunca dieron a luz» conserva mejor el paralelismo y suena más natural.
  revised_spanish_text: 'Porque, he aquí[a], vienen días en que dirán: «Bienaventuradas las estériles, y los vientres que no dieron a luz, y los pechos que no amamantaron».'
  revised_footnotes:
  - marker: a
    text: O «dichosas» o «afortunadas»; el griego dice «bienaventuradas», y la expresión comunica una inversión impactante a la luz de la angustia que se acerca.
    reason: lexical_alternative
  revision_rationale: Se corrige «que no concibieron» a «que no dieron a luz» para reflejar con fidelidad αἳ οὐκ ἐγέννησαν y la decisión léxica documentada en el English POB («that never bore»). El resto del texto puede mantenerse.
