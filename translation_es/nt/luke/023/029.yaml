translation:
  language: es
  text: 'Porque, he aquí[a], vienen días en que dirán: «Bienaventuradas las estériles, y los vientres que no dieron a luz, y los pechos que no amamantaron».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dichosas» o «afortunadas»; el griego dice «bienaventuradas», y la expresión comunica una inversión impactante a la luz de la angustia que se acerca.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  lexicon: BDAG
  rationale: Conecta esta frase con lo anterior como razón o explicación; «porque» expresa con claridad esa relación discursiva en español sin perder la función causal/explicativa del griego.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: Es una fórmula de llamado de atención más solemne y fiel al valor deíctico del original. «He aquí» conserva el tono profético y la inmediatez retórica mejor que opciones más coloquiales.
- source_word: ἔρχονται ἡμέραι
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - se acercan días
  - vendrán días
  lexicon: BDAG
  rationale: La imagen profética de días que llegan se mantiene de forma natural en español con «vienen días». Es breve, idiomática y reproduce el presente con sentido futuro del griego.
- source_word: ἐν αἷς
  english_pob_choice: in which
  chosen_spanish: en que
  alternatives_spanish:
  - cuando
  lexicon: BDAG
  rationale: «En que» refleja de manera directa la construcción relativa y mantiene la transparencia sintáctica del griego sin volver la frase pesada en español.
- source_word: ἐροῦσιν
  english_pob_choice: they will say
  chosen_spanish: dirán
  alternatives_spanish:
  - dirá la gente
  - dirán ellos
  lexicon: BDAG
  rationale: El griego usa una tercera persona plural indefinida. En español, el sujeto implícito en «dirán» conserva esa indefinición sin sobreespecificar quiénes hablarán.
- source_word: Μακάριαι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventuradas
  alternatives_spanish:
  - Dichosas
  - Feliz
  lexicon: BDAG
  rationale: En este dicho solemne, «bienaventuradas» preserva el tono de beatitud y la fuerza declarativa del término mejor que alternativas más débiles o meramente emocionales.
- source_word: αἱ στεῖραι
  english_pob_choice: the barren women
  chosen_spanish: las estériles
  alternatives_spanish:
  - las mujeres estériles
  - las que no pueden tener hijos
  lexicon: BDAG
  rationale: στεῖραι funciona aquí como adjetivo sustantivado femenino plural. «Las estériles» es natural en español y mantiene la concisión del griego; el contexto deja claro que se trata de mujeres.
- source_word: κοιλίαι
  english_pob_choice: the wombs
  chosen_spanish: los vientres
  alternatives_spanish:
  - los úteros
  - las entrañas
  lexicon: BDAG
  rationale: Aunque el sentido contextual apunta al órgano reproductivo, «vientres» reproduce mejor el término concreto del griego y mantiene el paralelismo con el texto fuente. «Úteros» sería más técnico, pero menos idiomático en este contexto.
- source_word: αἳ οὐκ ἐγέννησαν
  english_pob_choice: that never bore
  chosen_spanish: que no concibieron
  alternatives_spanish:
  - que no dieron a luz
  - que nunca dieron a luz
  lexicon: BDAG
  rationale: Para κοιλίαι en este paralelismo, el verbo debe expresar no haber llevado a término maternidad. «No concibieron» mantiene la relación con vientres y conserva el aspecto de no haber tenido esa fecundidad; alternativas como «dieron a luz» desplazan el foco al parto ya realizado.
- source_word: μαστοὶ
  english_pob_choice: the breasts
  chosen_spanish: los pechos
  alternatives_spanish:
  - los senos
  - las mamas
  lexicon: BDAG
  rationale: En español, «pechos» es un término claro y natural para el paralelismo anatómico del versículo. Evita tecnicismos y conserva la referencia corporal directa del original.
- source_word: οἳ οὐκ ἔθρεψαν
  english_pob_choice: that never nursed
  chosen_spanish: que no amamantaron
  alternatives_spanish:
  - que no criaron
  - que no alimentaron
  lexicon: BDAG
  rationale: Con «pechos» como antecedente implícito, «amamantar» expresa el acto de nutrir al niño de forma concreta y fiel al campo semántico de τρέφω en este contexto. «Criaron» sería demasiado amplio.
theological_decisions:
- issue: Renderización de μακάριαι en una declaración de inversión de valores bajo juicio venidero
  english_pob_reading: Blessed; the POB note also preserves the alternatives ‘happy’ or ‘fortunate’ and explains the shocking reversal in view of coming distress.
  chosen_spanish_reading: Bienaventuradas
  alternative_spanish_readings:
  - Dichosas
  - Afortunadas
  rationale: La expresión no celebra la esterilidad en sí, sino que presenta una inversión irónica y trágica ante el sufrimiento que se avecina. «Bienaventuradas» conserva el tono de beatitud del griego y permite mantener esa tensión sin domesticarla.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Referencia implícita al habla indefinida del anuncio futuro
  english_pob_reading: they will say
  chosen_spanish_reading: dirán
  alternative_spanish_readings:
  - dirá la gente
  - se dirá
  rationale: El griego no identifica a los hablantes. «Dirán» conserva la indefinición y evita introducir una interpretación teológica o sociológica no garantizada por el texto.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión final del inglés POB que sustituyó ‘look’ por ‘behold’; por eso se eligió una fórmula española más solemne y deíctica («he aquí») en lugar de una opción más coloquial. También se respetó el marco auditado de la traducción inglesa: conexión causal de ὅτι, atención profética de ἰδοὺ, y mantenimiento del paralelismo anatómico de κοιλίαι / μαστοί sin suavizar la tensión del dicho.'
  spanish_consistency_notes:
  - Se mantuvo «bienaventuradas» como equivalente solemne y de tradición bíblica para μακάριαι, coherente con el valor pronunciativo del contexto.
  - Se evitó «SEÑOR» u otros sustitutos no pertinentes porque este verso no contiene el tetragrámaton ni κύριος en cita divina.
  - La relación cuerpo-maternidad se preservó con «vientres» y «pechos» para mantener el paralelismo del griego; no se introdujo lenguaje más explicativo que borrara la forma compacta del original.
  - Se usó puntuación de cita española con comillas angulares para la frase directa.
