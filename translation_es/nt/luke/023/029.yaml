  text: ὅτι ἰδοὺ ἔρχονται ἡμέραι ἐν αἷς ἐροῦσιν Μακάριαι αἱ στεῖραι καὶ ⸀αἱ κοιλίαι αἳ οὐκ ἐγέννησαν καὶ μαστοὶ οἳ οὐκ ⸀ἔθρεψαν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/023/029.yaml
  text: For behold[a], days are coming in which they will say, ‘Blessed are the barren women, and the wombs that never bore, and the breasts that never nursed.’
  footnotes:
  - marker: a
    text: Or 'happy' or 'fortunate'; Greek 'blessed,' expressing a shocking reversal in view of coming distress.
    reason: lexical_alternative
