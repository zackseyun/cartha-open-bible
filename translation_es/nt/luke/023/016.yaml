  glossary_alignment: 'No hay conflicto con términos teológicos mayores del glosario del proyecto. La decisión clave es léxica: παιδεύσας debe mantener amplitud correctiva/punitiva sin caer en un sentido pedagógico; ἀπολύσω conviene expresarlo con un verbo de liberación más propio del contexto judicial.'
