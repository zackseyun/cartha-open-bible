translation:
  language: es
  text: Por tanto[a], después de castigarlo, lo pondré en libertad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "después de disciplinarlo" o "después de corregirlo"; el verbo puede denotar un castigo correctivo. Algunos entienden aquí un castigo más específico, como un azote, aunque el griego en sí es más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδεύσας
  english_pob_choice: after disciplining him
  chosen_spanish: después de disciplinarlo
  alternatives_spanish:
  - después de castigarlo
  - después de azotarlo
  - después de corregirlo
  lexicon: BDAG
  rationale: El participio aoristo expresa acción anterior al verbo principal, por eso se vierte con valor temporal. En este contexto judicial, παιδεύω tiene fuerza punitiva o correctiva; "disciplinarlo" conserva esa amplitud sin especificar un método que el griego no nombra. "Castigarlo" es posible, pero suena más general; "azotarlo" sería demasiado preciso; "corregirlo" podría suavizar indebidamente el matiz penal.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: οὖν introduce inferencia o continuación lógica. "Por tanto" conserva mejor ese enlace conclusivo en español formal que alternativas más coloquiales o menos marcadas.
- source_word: ἀπολύσω
  english_pob_choice: I will release
  chosen_spanish: lo soltaré
  alternatives_spanish:
  - lo liberaré
  - lo dejaré ir
  - lo pondré en libertad
  lexicon: BDAG
  rationale: En un contexto de custodia o proceso judicial, ἀπολύω significa soltar, dejar libre o liberar. "Lo soltaré" es natural en español y mantiene la idea de liberación; "lo pondré en libertad" sería más explicativo y menos directo.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - le
  lexicon: BDAG
  rationale: El pronombre acusativo se refiere a Jesús. En español, el objeto directo masculino animado se expresa normalmente con clítico; "lo" es la forma más natural y clara.
theological_decisions:
- issue: Alcance punitivo de παιδεύω en la propuesta de Pilato
  english_pob_reading: Rendered in a penal/judicial sense as 'disciplining' rather than educational 'disciplining.'
  chosen_spanish_reading: Se mantiene "disciplinarlo" con sentido correctivo/punitivo, no pedagógico en el sentido de instrucción escolar.
  alternative_spanish_readings:
  - castigarlo
  - azotarlo
  - corregirlo
  rationale: El contexto inmediato es judicial, de modo que la acción previa al envío en libertad no puede leerse como educación. A la vez, el griego no obliga a identificar el método exacto del castigo, así que la traducción evita concretarlo más allá de lo que el texto dice.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa fue revisada de "punishing" a "disciplining" para reflejar mejor παιδεύσας, manteniendo el marco judicial. La redacción española sigue esa revisión y conserva la amplitud semántica del verbo sin precisar el método del castigo.
  spanish_consistency_notes:
  - Se usa "Por tanto" para reproducir la fuerza inferencial de οὖν.
  - Se evita "SEÑOR" u otras formas de ocultación porque el versículo no contiene el nombre divino.
  - '"Lo soltaré" mantiene el valor de liberación legal/custodial de ἀπολύω sin añadir una formulación más interpretativa.'
