translation:
  language: es
  text: Este hombre se acercó a Pilato y pidió el cuerpo de Jesús.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Él
  - Este
  lexicon: BDAG
  rationale: El demostrativo retoma a José de Arimatea del versículo anterior. «Este hombre» conserva la referencia anafórica y el matiz señalador sin volverse tan seco como «Él» ni tan incompleto como «Este».
- source_word: προσελθὼν
  english_pob_choice: went to
  chosen_spanish: se acercó
  alternatives_spanish:
  - fue a
  - se presentó ante
  lexicon: BDAG
  rationale: El participio aoristo de προσέρχομαι introduce una acción previa y acompañante. En español, «se acercó» reproduce bien la idea de aproximarse a Pilato sin añadir una dirección demasiado interpretativa como «fue a».
- source_word: τῷ Πιλάτῳ
  english_pob_choice: to Pilate
  chosen_spanish: a Pilato
  alternatives_spanish:
  - ante Pilato
  - con Pilato
  lexicon: BDAG
  rationale: El dativo con προσέρχομαι señala la persona a quien se acerca. «A Pilato» es la equivalencia natural y suficiente; no se expande a «Poncio Pilato» porque el texto griego de este versículo no lo hace.
- source_word: ᾐτήσατο
  english_pob_choice: asked for
  chosen_spanish: pidió
  alternatives_spanish:
  - solicitó
  - reclamó
  lexicon: BDAG
  rationale: El verbo medio αἰτέω aquí expresa pedir o solicitar algo. «Pidió» es claro, directo y suficientemente formal en español; «solicitó» suena más burocrático, y «reclamó» añadiría una fuerza no indicada por el contexto.
- source_word: τὸ σῶμα
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cadáver
  lexicon: BDAG
  rationale: σῶμα significa literalmente «cuerpo». Aunque el referente es el cuerpo muerto de Jesús, «cadáver» introduce una dureza e interpretación que el griego no exige; por eso se mantiene «el cuerpo».
- source_word: τοῦ Ἰησοῦ
  english_pob_choice: of Jesus
  chosen_spanish: de Jesús
  alternatives_spanish:
  - perteneciente a Jesús
  lexicon: BDAG
  rationale: El genitivo es posesivo/relacional sencillo. «De Jesús» preserva la naturalidad y la transparencia de la relación sin sobreexplicarla.
translation_notes:
  revision_awareness: El versículo presenta alta concordancia con el texto griego y con la auditoría inglesa; no se documentan revisiones aplicadas ni tensiones léxicas adicionales en este pasaje.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se evita «SEÑOR» y otras sustituciones no presentes en el verso.
  - El español conserva el orden narrativo natural sin alterar la secuencia de la acción del participio y del verbo principal.
