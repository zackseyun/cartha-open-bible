revisions:
- from: 'Pero Jesús decía[a]: «Padre, perdónalos, porque no saben lo que están haciendo». Y, mientras repartían sus vestidos, echaron suertes.'
  to: 'Pero Jesús decía[a]: «Padre, perdónalos, porque no saben lo que están haciendo». Y dividiendo sus ropas, echaron suertes.'
  rationale: Se mantiene la traducción principal casi intacta, pero se ajusta la segunda cláusula para reflejar con mayor cercanía el participio griego διαμεριζόμενοι y evitar la posible especificidad indebida de «vestidos». «Y dividiendo sus ropas, echaron suertes» preserva bien el flujo narrativo y el sentido del original, con español claro y digno.
  reviewer_model: gpt-5.4
