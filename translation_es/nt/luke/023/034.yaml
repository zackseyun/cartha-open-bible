translation:
  language: es
  text: 'Pero Jesús decía[a]: «Padre, perdónalos, porque no saben lo que están haciendo». Y dividiendo sus ropas, echaron suertes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos omiten: «Padre, perdónalos, porque no saben lo que están haciendo».'
    reason: textual_variant
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: decía
  alternatives_spanish:
  - dijo
  - estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa habla en curso o reiterada; «decía» conserva ese aspecto mejor que un perfecto simple («dijo») y suena natural en español bíblico actual.
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Mi Padre
  - Padre mío
  lexicon: BDAG
  rationale: Es vocativo de trato directo. «Padre» reproduce el valor inmediato sin añadir posesivo que no aparece en el griego.
- source_word: ἄφες
  english_pob_choice: forgive
  chosen_spanish: perdónalos
  alternatives_spanish:
  - suéltalos
  - dispénsalos
  lexicon: BDAG
  rationale: En una oración dirigida a Dios por unos ofensores, ἀφίημι aquí se entiende naturalmente como perdonar. En español, el imperativo «perdónalos» comunica esa petición de manera clara y fiel.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - a estas personas
  lexicon: BDAG
  rationale: El pronombre dativo es indefinido respecto del grupo exacto; «los» en el mandato español mantiene la referencia sin especificarla más de lo que hace el griego.
- source_word: οὐ γὰρ οἴδασιν τί ποιοῦσιν
  english_pob_choice: for they do not know what they are doing
  chosen_spanish: porque no saben lo que están haciendo
  alternatives_spanish:
  - porque no entienden lo que están haciendo
  lexicon: BDAG
  rationale: οἶδα denota conocimiento; «saben» es la correspondencia más directa. «Entienden» introduciría una interpretación más amplia que el griego no exige.
- source_word: διαμεριζόμενοι
  english_pob_choice: dividing
  chosen_spanish: mientras repartían
  alternatives_spanish:
  - dividiendo
  - al repartirse
  lexicon: BDAG
  rationale: El participio describe la acción concomitante de repartir/partir los vestidos. En español, «mientras repartían» transmite esa simultaneidad con fluidez narrativa.
- source_word: ἱμάτια
  english_pob_choice: garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: BDAG
  rationale: ἱμάτια son prendas de vestir; «vestidos» es una opción digna y bíblica en español, aunque algo más amplia que «ropa». Se mantiene el posesivo «sus» del griego.
- source_word: ἔβαλον κλήρους
  english_pob_choice: cast lots
  chosen_spanish: echaron suertes
  alternatives_spanish:
  - tiraron suertes
  - sortearon
  lexicon: BDAG
  rationale: La expresión española tradicional y transparente para el sorteo antiguo es «echaron suertes». Conserva el valor idiomático de κλῆρος sin modernizarlo indebidamente.
- source_word: δὲ
  english_pob_choice: But / And
  chosen_spanish: Pero / Y
  alternatives_spanish:
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: El πρώτο δέ marca contraste suave y se rinde bien con «Pero». El segundo δέ continúa la narración y en español se expresa naturalmente con «Y».
theological_decisions:
- issue: 'Variante textual: la frase de perdón puede omitirse en algunos manuscritos'
  english_pob_reading: Included in the main text; footnote notes omission in some manuscripts
  chosen_spanish_reading: Incluida en el texto principal; nota de variante textual indica que algunos manuscritos la omiten
  alternative_spanish_readings:
  - Omitir la frase en el texto principal
  - Trasladarla solo a nota
  rationale: Se sigue el texto griego dado (SBLGNT), que incluye la cláusula, y se preserva la transparencia textual con una nota. Esto evita resolver la tensión documental y deja visible la variante.
  doctrine_reference: Preservar variantes textuales significativas y documentarlas sin armonizarlas artificialmente.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego SBLGNT y el criterio auditado del POB en inglés: imperfecto aspectual para ἔλεγεν, imperativo de petición para ἄφες, y expresión idiomática para ἔβαλον κλήρους. Se mantiene la variante textual documentada en nota, sin eliminarla ni suavizarla.'
  spanish_consistency_notes:
  - Se usa «Padre» como vocativo directo, sin añadir posesivo inexistente.
  - Se emplea «perdónalos» para ἄφες por el contexto de oración dirigida a Dios por los ofensores.
  - «Echaron suertes» conserva el modismo bíblico español más claro para ἔβαλον κλήρους.
  - La puntuación mantiene la división narrativa entre la palabra de Jesús y la acción de los soldados.
