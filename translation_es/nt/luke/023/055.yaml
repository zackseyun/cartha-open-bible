translation:
  language: es
  text: Ahora bien, las mujeres que habían venido con él desde Galilea siguieron[a] y vieron el sepulcro, y cómo fue colocado su cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habían acompañado a Jesús desde Galilea».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακολουθήσασαι
  english_pob_choice: followed
  chosen_spanish: siguieron
  alternatives_spanish:
  - habían seguido
  - siguieron de cerca
  lexicon: BDAG
  rationale: El participio aoristo funciona aquí como acción previa que desemboca en la observación posterior. En español, «siguieron» conserva la secuencia narrativa de manera natural; «habían seguido» puede sonar más pesado, y «siguieron de cerca» añade una idea no explicitada por el griego.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: δέ marca una transición suave en la narración. «Ahora bien» mantiene ese avance discursivo sin forzar una coordinación fuerte.
- source_word: γυναῖκες
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - mujeres
  lexicon: BDAG
  rationale: El artículo señala un grupo identificado en el relato; «las mujeres» preserva esa referencia definida.
- source_word: αἵτινες
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quienes
  lexicon: BDAG
  rationale: El relativo es identificador y restringe al grupo; «que» resulta natural en español y evita una formulación demasiado marcada.
- source_word: συνεληλυθυῖαι ἐκ τῆς Γαλιλαίας αὐτῷ
  english_pob_choice: had come with him from Galilee
  chosen_spanish: habían venido con él desde Galilea
  alternatives_spanish:
  - habían acompañado con él desde Galilea
  - habían venido desde Galilea con él
  lexicon: BDAG
  rationale: La forma compuesta expresa una acción anterior y conjunta. «Habían venido con él desde Galilea» conserva el origen geográfico y la compañía sin sonar artificioso en español.
- source_word: ἐθεάσαντο
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - observaron
  - miraron
  lexicon: BDAG
  rationale: Aunque θεάομαι puede implicar observación atenta, aquí el contexto queda completado por el objeto y la cláusula siguiente. «Vieron» es fiel y natural.
- source_word: μνημεῖον
  english_pob_choice: tomb
  chosen_spanish: sepulcro
  alternatives_spanish:
  - tumba
  - tumba sepulcral
  lexicon: BDAG
  rationale: En este contexto funerario, «sepulcro» es claro y solemne en español bíblico, y corresponde al lugar de entierro de Jesús.
- source_word: ὡς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - que
  lexicon: BDAG
  rationale: Introduce la manera en que fue colocado el cuerpo; «cómo» conserva esa función de manera directa.
- source_word: ἐτέθη
  english_pob_choice: was laid
  chosen_spanish: fue puesto
  alternatives_spanish:
  - fue depositado
  - fue colocado
  lexicon: BDAG
  rationale: El pasivo de τίθημι en un contexto sepulcral admite «fue puesto»; es sobrio y suficientemente literal, sin perder naturalidad.
- source_word: σῶμα αὐτοῦ
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - el cuerpo de él
  lexicon: BDAG
  rationale: La posesión se expresa de modo natural con «su cuerpo», manteniendo la referencia personal sin redundancia.
theological_decisions:
- issue: Secuencia del participio κατακολουθήσασαι respecto del verbo principal ἐθεάσαντο
  english_pob_reading: 'Rendered as coordinate past actions: ''followed and saw'''
  chosen_spanish_reading: «siguieron y vieron»
  alternative_spanish_readings:
  - «habiendo seguido, vieron»
  - «tras seguirlo, vieron»
  rationale: La elección privilegia la fluidez narrativa sin borrar que el seguimiento precede a la visión. No introduce una inferencia doctrinal; solo conserva el orden de los hechos de forma idiomática.
  doctrine_reference: 'Translation philosophy: optimal-equivalence'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al marcador [a] dentro del texto español. El resto de la redacción sigue el mismo acuerdo de alta concordancia con el texto fuente y con la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y moderno.
  - «Sepulcro» se eligió por precisión funeraria y por su resonancia natural en español bíblico.
  - Se evitó traducir mecánicamente el participio griego con una perífrasis pesada; la secuencia sigue siendo clara en español.
