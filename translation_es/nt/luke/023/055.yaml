review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: transición narrativa suave, identificación de las mujeres, procedencia/asociación con Jesús desde Galilea, observación del sepulcro y de la manera en que fue colocado el cuerpo. Sin embargo, la nota alternativa no reproduce fielmente la alternativa inglesa/auditada, porque «habían acompañado con él» es español defectuoso y no refleja bien la construcción «had accompanied him from Galilee». Además, «fue puesto» es comprensible, pero «fue colocado» o «fue depositado» suena más natural en este contexto en español; no obstante, esto es una mejora menor, no un error grave de sentido.'
  spanish_quality_summary: El texto es mayormente claro y digno. «Ahora bien» funciona para δέ, aunque es algo más formal; «sepulcro» es apropiado. La principal incidencia de calidad está en la nota al pie, cuya redacción es antinatural. También conviene mejorar «fue puesto su cuerpo» a «fue colocado su cuerpo» o, mejor aún, «cómo fue colocado su cuerpo», que suena más idiomático en español bíblico moderno.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. «Sepulcro» para μνημεῖον y «su cuerpo» para σῶμα αὐτοῦ son aceptables. La alternativa léxica en nota debe ajustarse a un español correcto: «habían acompañado a Jesús desde Galilea» o «habían venido con él desde Galilea».'
  issues:
  - severity: medium
    issue: La nota al pie usa «habían acompañado con él desde Galilea»
    rationale: En español, «acompañar con él» es incorrecto; debe ser «acompañado a Jesús»/«acompañado a él» o mantenerse la formulación principal «venido con él». La nota debe preservar la alternativa del audit trail sin introducir español defectuoso.
  - severity: low
    issue: «cómo fue puesto su cuerpo» suena menos natural que otras opciones
    rationale: Aunque comunica el sentido básico de ὡς ἐτέθη τὸ σῶμα αὐτοῦ, en español contemporáneo y digno resulta más idiomático «cómo fue colocado su cuerpo» o «cómo habían puesto su cuerpo». Dado el pasivo griego y la línea inglesa, «fue colocado» conserva mejor naturalidad y solemnidad.
  revised_spanish_text: Ahora bien, las mujeres que habían venido con él desde Galilea siguieron[a] y vieron el sepulcro, y cómo fue colocado su cuerpo.
  revised_footnotes:
  - marker: a
    text: 'O: «habían acompañado a Jesús desde Galilea».'
    reason: lexical_alternative
  revision_rationale: Se mantiene el sentido y la estructura del borrador, pero se corrige la nota alternativa para que sea español correcto y fiel a la alternativa documentada, y se mejora ligeramente la naturalidad de la cláusula final con «fue colocado». No se requiere adjudicación adicional.
