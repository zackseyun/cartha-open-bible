translation:
  language: es
  text: Y nosotros, en verdad, con justicia[a], porque recibimos lo debido por lo que hicimos[b]; pero este hombre no ha hecho nada malo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «justamente»; el griego expresa que la condena es merecida en sentido judicial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «recibimos las cosas debidas por lo que hicimos»; la idea es recibir consecuencias proporcionales a nuestras acciones.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «este hombre no ha hecho nada impropio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαίως
  english_pob_choice: justly
  chosen_spanish: con justicia
  alternatives_spanish:
  - justamente
  - con razón
  lexicon: BDAG
  rationale: El adverbio expresa que el castigo recibido es merecido en sentido judicial. «Con justicia» conserva ese valor forense con naturalidad en español; «justamente» también sería posible, pero «con justicia» evita una lectura meramente moral o emocional.
- source_word: ἄξια
  english_pob_choice: what our deeds deserve
  chosen_spanish: lo que merecen nuestras obras
  alternatives_spanish:
  - las cosas dignas de nuestras obras
  - lo debido por nuestras obras
  lexicon: BDAG
  rationale: Con ἀπολαμβάνομεν, la expresión comunica retribución proporcional a las acciones previas. «Lo que merecen nuestras obras» mantiene la relación entre acto y consecuencia sin sonar forzado en español.
- source_word: ὧν ἐπράξαμεν
  english_pob_choice: our deeds
  chosen_spanish: nuestras obras
  alternatives_spanish:
  - lo que hicimos
  - nuestras acciones
  lexicon: BDAG
  rationale: La cláusula relativa concreta la base del castigo. «Obras» recoge de manera breve y natural el conjunto de actos realizados; «lo que hicimos» sería más explícito, pero menos compacto y menos alineado con el contraste judicial del contexto.
- source_word: ἀπολαμβάνομεν
  english_pob_choice: we are receiving
  chosen_spanish: recibimos
  alternatives_spanish:
  - estamos recibiendo
  - estamos recibiendo ahora
  lexicon: BDAG
  rationale: El presente indica la recepción actual del castigo. En español, el presente simple transmite bien esa continuidad en este contexto y suena más fluido que una perífrasis progresiva.
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - él
  lexicon: BDAG
  rationale: El demostrativo contrasta a Jesús con los otros implicados. «Este hombre» es idiomático y conserva la referencia demonstrativa sin perder claridad.
- source_word: οὐδὲν ἄτοπον
  english_pob_choice: nothing wrong
  chosen_spanish: nada malo
  alternatives_spanish:
  - nada impropio
  - nada fuera de lugar
  - nada incorrecto
  lexicon: BDAG
  rationale: Ἄτοπος puede abarcar lo impropio, incorrecto o malo en un contexto judicial. «Nada malo» es la opción más natural en español y comunica con claridad la afirmación de inocencia sin sobredeterminar el matiz legal.
- source_word: ἔπραξεν
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - hizo
  - ha cometido
  lexicon: BDAG
  rationale: El perfecto compuesto funciona bien para expresar la evaluación del acto de Jesús hasta este momento. «Ha hecho» mantiene la naturalidad del español; «ha cometido» introduciría un matiz demasiado penal/jurídico.
theological_decisions:
- issue: Declaración humana sobre la inocencia de Jesús en un contexto judicial
  english_pob_reading: but this man has done nothing wrong
  chosen_spanish_reading: pero este hombre no ha hecho nada malo
  alternative_spanish_readings:
  - pero este hombre no ha hecho nada impropio
  - pero este hombre no ha hecho nada fuera de lugar
  rationale: La frase debe conservar la afirmación explícita de inocencia tal como aparece en boca del criminal, sin añadir formulaciones doctrinales que el texto no desarrolla. Se mantiene la tensión histórica y judicial del pasaje.
  doctrine_reference: Preservar la tensión textual sin ampliarla; la inocencia de Jesús se afirma aquí como testimonio inmediato, no como comentario dogmático desarrollado.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren revisión sustancial. Se preservó el valor forense de δικαίως, la retribución proporcional de ἄξια/ἀπολαμβάνομεν y la afirmación de inocencia de οὗτος δὲ οὐδὲν ἄτοπον ἔπραξεν sin intensificar el sentido más allá de la evidencia.
  spanish_consistency_notes:
  - Se usó «Y» inicial para corresponder al arranque conjuntivo del griego, aunque el español fluye mejor con una estructura directa.
  - Se prefirió «con justicia» antes que «justamente» para mantener un matiz judicial claro.
  - «Obras» traduce el conjunto de acciones de ἐπράξαμεν sin moralizar ni especificar más de lo que el texto permite.
  - Se evitó «SEÑOR» u otras terminologías no presentes, porque el versículo no contiene el nombre divino ni un título cristológico técnico.
  - No se agregó ninguna nota teológica aparte de la afirmación de inocencia, ya que el versículo mismo no desarrolla más doctrina.
