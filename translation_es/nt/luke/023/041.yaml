    rationale: «Con razón» en español suele expresar justificación subjetiva o lógica, no tanto justicia forense. «Justamente» funciona mejor como alternativa breve y cercana al valor del griego y del inglés 'justly/rightly'.
  revised_spanish_text: Y nosotros, en verdad, con justicia[a], porque recibimos lo debido por lo que hicimos[b]; pero este hombre no ha hecho nada malo[c].
