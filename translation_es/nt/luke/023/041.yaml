    issue: La nota [b] está asociada al segmento equivocado y no preserva la distribución de alternativas del audit trail inglés.
    rationale: En el POB inglés, una nota alternativa pertenece a la idea de retribución merecida y la otra a «nothing improper». En el borrador español, solo se conserva la alternativa de retribución y está anclada en «nuestras obras», no en la frase completa donde recae el sentido de ἄξια ... ἀπολαμβάνομεν.
  - severity: low
