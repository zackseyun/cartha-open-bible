- from: 'Ahora, cuando el centurión vio lo que había sucedido[a], glorificaba a Dios, diciendo: «Ciertamente este hombre era justo[b]» .'
  to: 'Entonces, cuando el centurión vio lo que había sucedido[a], glorificó a Dios, diciendo: «Ciertamente este hombre era justo[b]».'
  rationale: Se ajusta el conector narrativo a un español más natural («Entonces»), se reemplaza «glorificaba» por «glorificó» para reflejar mejor la decisión auditada del POB y mejorar la fluidez en español, y se corrige la puntuación. Se mantienen «justo» y las notas léxicas porque preservan adecuadamente la tensión semántica de δίκαιος.
