review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: conducían a Jesús, tomaron a Simón de Cirene que venía de fuera, le pusieron la cruz y la llevó detrás de Jesús. Sin embargo, hay dos desajustes con el audit trail inglés y con el griego: el anclaje de notas está invertido respecto a las notas inglesas documentadas, y «mientras lo llevaban» pierde el matiz de alejamiento/custodia mejor conservado por «se lo llevaban» o equivalente. Además, la nota sobre «la cruz» documentada en inglés falta en español.'
  spanish_quality_summary: El español es claro y legible, pero «prendieron a» suena algo jurídico/policial y menos natural aquí que «agarraron» o «tomaron». «Le cargaron la cruz» es entendible, pero «le pusieron la cruz encima» o «le pusieron la cruz» refleja más directamente ἐπέθηκαν αὐτῷ. La redacción general es buena; requiere una reparación pequeña para alinear notas y mejorar fidelidad léxica.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús» y «cruz» están bien. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión de mantener «cruz» concuerda con la justificación teológica documentada.
  issues:
  - severity: high
    issue: Las notas al pie están asociadas a los lugares equivocados.
    rationale: En el audit trail inglés, una nota trata ἀγροῦ ('campo/campo abierto/campo/rural') y la otra trata σταυρός ('cruz' vs. 'travesaño'). En el borrador español, [a] está anclada en «llevaban» y [b] en «campo», dejando sin nota «cruz». Eso no preserva la evidencia documentada.
  - severity: medium
    issue: «mientras lo llevaban» debilita el matiz de ἀπήγαγον.
    rationale: El griego y la decisión inglesa favorecen 'led him away'. En español, «se lo llevaban» o «lo iban llevando» conserva mejor la idea de llevárselo bajo custodia que el más plano «lo llevaban».
  - severity: medium
    issue: «prendieron a» y «le cargaron la cruz» son menos directos que el griego.
    rationale: ἐπιλαβόμενοι expresa tomar/asir físicamente; «agarraron a» o «se apoderaron de» resulta más concreto en este contexto. ἐπέθηκαν αὐτῷ es 'pusieron/colocaron sobre él'; «le cargaron la cruz» añade una expresión idiomática española útil, pero se aleja un poco de la imagen verbal directa.
  revised_spanish_text: Y mientras se lo llevaban, agarraron a cierto Simón de Cirene, que venía del campo[a], y le pusieron la cruz[b] para que la llevara detrás de Jesús.
  revised_footnotes:
  - marker: a
    text: O «de la zona rural». El griego puede referirse al campo como tal o, de manera más amplia, al área rural fuera de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: Algunos entienden aquí «la cruz» más específicamente como «el travesaño», pero el texto griego dice simplemente «la cruz».
    reason: lexical_alternative
  revision_rationale: 'Se corrige el principal problema documental: las notas vuelven a anclarse donde corresponde según el audit trail inglés, una en «campo» y otra en «cruz». También se mejora la fidelidad de ἀπήγαγον con «se lo llevaban» y se hace más directa la acción sobre Simón y la cruz con «agarraron» y «le pusieron la cruz».'
