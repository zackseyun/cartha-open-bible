  to: Y mientras se lo llevaban, agarraron a cierto Simón de Cirene, que venía del campo[a], y le pusieron la cruz[b] para que la llevara detrás de Jesús.
  rationale: 'Se corrige el principal problema documental: las notas vuelven a anclarse donde corresponde según el audit trail inglés, una en «campo» y otra en «cruz». También se mejora la fidelidad de ἀπήγαγον con «se lo llevaban» y se hace más directa la acción sobre Simón y la cruz con «agarraron» y «le pusieron la cruz».'
