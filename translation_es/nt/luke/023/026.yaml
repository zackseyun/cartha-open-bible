translation:
  language: es
  text: Y mientras se lo llevaban, agarraron a cierto Simón de Cirene, que venía del campo[a], y le pusieron la cruz[b] para que la llevara detrás de Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la zona rural». El griego puede referirse al campo como tal o, de manera más amplia, al área rural fuera de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: Algunos entienden aquí «la cruz» más específicamente como «el travesaño», pero el texto griego dice simplemente «la cruz».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγαγον
  english_pob_choice: led ... away
  chosen_spanish: llevaban
  alternatives_spanish:
  - se lo llevaban
  - lo conducían lejos
  - lo llevaban consigo
  lexicon: BDAG
  rationale: ἀπάγω expresa el llevarse o conducir a alguien; en este contexto de custodia, «lo llevaban» conserva el movimiento forzado sin sonar demasiado técnico ni recargar el castellano.
- source_word: ἐπιλαβόμενοι
  english_pob_choice: they seized
  chosen_spanish: prendieron a
  alternatives_spanish:
  - tomaron a
  - se apoderaron de
  - agarraron a
  lexicon: BDAG
  rationale: El participio medio de ἐπιλαμβάνομαι indica una acción física de sujetar o tomar con fuerza. «Prendieron a» comunica bien la intervención brusca en español y encaja con el tono de la escena.
- source_word: Σίμωνά τινα Κυρηναῖον
  english_pob_choice: a certain Simon of Cyrene
  chosen_spanish: cierto Simón de Cirene
  alternatives_spanish:
  - un hombre llamado Simón, de Cirene
  - Simón, un cireneo
  - algún Simón de Cirene
  lexicon: BDAG
  rationale: τινα aporta la idea de «cierto» o «uno llamado». «De Cirene» conserva la relación geográfica de Κυρηναῖον de manera natural en español y sin introducir una reconstrucción adicional.
- source_word: ἐρχόμενον ἀπ’ ἀγροῦ
  english_pob_choice: coming in from the countryside
  chosen_spanish: que venía del campo
  alternatives_spanish:
  - que venía del campo abierto
  - que venía del campo/labranza
  - que entraba desde el campo
  lexicon: BDAG
  rationale: ἀγρός puede significar campo, terreno rural o el ámbito rural fuera de la ciudad. «Del campo» es la opción más natural en español y mantiene abierta la posible amplitud semántica señalada por el audit trail inglés.
- source_word: ἐπέθηκαν αὐτῷ τὸν σταυρὸν
  english_pob_choice: laid the cross on him
  chosen_spanish: le cargaron la cruz
  alternatives_spanish:
  - le pusieron la cruz
  - le echaron la cruz encima
  - le colocaron la cruz
  lexicon: BDAG
  rationale: ἐπιτίθημι significa poner o colocar sobre alguien. En español, «cargar la cruz» expresa con claridad la imposición de un peso sobre Simón y evita una construcción menos natural, sin perder el sentido de poner algo sobre él.
- source_word: τὸν σταυρὸν
  english_pob_choice: the cross
  chosen_spanish: la cruz
  alternatives_spanish:
  - el cruz
  - el patíbulo
  lexicon: BDAG
  rationale: σταυρός se traduce de forma directa por «cruz». Aunque existen interpretaciones más específicas como «patíbulo» o «travesaño», el texto griego dice simplemente σταυρός y la traducción directa es la más fiel y clara.
- source_word: φέρειν
  english_pob_choice: to carry
  chosen_spanish: para que la llevara
  alternatives_spanish:
  - para cargarla
  - para portarla
  - para llevarla
  lexicon: BDAG
  rationale: φέρειν expresa llevar o cargar físicamente. La perífrasis «para que la llevara» suena natural en español y conserva el sentido de un traslado impuesto.
- source_word: ὄπισθεν τοῦ Ἰησοῦ
  english_pob_choice: behind Jesus
  chosen_spanish: detrás de Jesús
  alternatives_spanish:
  - tras Jesús
  - siguiendo a Jesús
  - a espaldas de Jesús
  lexicon: BDAG
  rationale: ὄπισθεν indica posición espacial detrás de alguien. «Detrás de Jesús» corresponde de manera directa al sentido espacial del griego y evita extenderlo innecesariamente a una idea temporal de «después».
theological_decisions:
- issue: Si σταυρός debe concretarse como «cruz» o como una pieza más específica como «travesaño»
  english_pob_reading: the cross
  chosen_spanish_reading: la cruz
  alternative_spanish_readings:
  - el travesaño
  - el patíbulo
  rationale: El texto griego usa σταυρός y no un término más específico para una pieza de la cruz. Traducir «la cruz» sigue el sentido léxico llano y evita introducir una reconstrucción histórica no explícita en el versículo.
  doctrine_reference: Primacía del texto original y transparencia traductora
- issue: Cómo reflejar el matiz de imposición física sobre Simón al recibir la cruz
  english_pob_reading: laid the cross on him
  chosen_spanish_reading: le cargaron la cruz
  alternative_spanish_readings:
  - le pusieron la cruz
  - le impusieron la cruz
  rationale: La escena describe una acción forzada. «Le cargaron la cruz» expresa tanto la imposición como el peso físico, manteniendo el tono narrativo sin suavizar la fuerza del acto.
  doctrine_reference: Claridad narrativa sin atenuar el sentido del original
translation_notes:
  revision_awareness: Este borrador sigue de cerca el audit trail inglés y no introduce revisiones registradas adicionales; conserva las decisiones clave sobre ἀπάγω, ἐπιλαμβάνομαι, ἀγρός y σταυρός, con equivalencias naturales en español.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se traduce el participio narrativo con un pasado simple español para mantener fluidez en una sola oración coordinada.
  - Se prefiere «la cruz» frente a alternativas más técnicas por fidelidad al término griego y claridad para lectores generales.
  - Se mantiene la distinción espacial de ὄπισθεν con «detrás», evitando «después» que podría sonar temporal y ser menos preciso.
