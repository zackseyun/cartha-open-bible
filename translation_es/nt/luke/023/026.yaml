  text: Καὶ ὡς ἀπήγαγον αὐτόν, ἐπιλαβόμενοι ⸂Σίμωνά τινα Κυρηναῖον ἐρχόμενον⸃ ἀπ’ ἀγροῦ ἐπέθηκαν αὐτῷ τὸν σταυρὸν φέρειν ὄπισθεν τοῦ Ἰησοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/023/026.yaml
  text: And as they led him away[a], they seized a certain Simon of Cyrene, coming in from the countryside[b], and laid the cross on him to carry behind Jesus.
  footnotes:
  - marker: a
    text: Or 'coming in from the field.' The Greek may refer either to a field specifically or more generally to the countryside outside the city.
    reason: lexical_alternative
  - marker: b
    text: Some understand 'the cross' here more specifically as 'the crossbeam,' but the Greek text says simply 'the cross.'
    reason: lexical_alternative
