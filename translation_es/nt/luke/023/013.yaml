translation:
  language: es
  text: Pero Pilato, habiendo convocado[a] a los sumos sacerdotes, a los gobernantes y al pueblo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Habiendo convocado» conserva el valor participial y la idea de reunir oficialmente; «habiendo llamado juntos» sería más literal pero menos natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πιλᾶτος
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  alternatives_spanish:
  - Pílato
  lexicon: Transliteración estándar del nombre propio
  rationale: Se conserva el nombre propio en forma española usual, siguiendo la práctica de transliterar nombres y no traducirlos.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ marca transición suave y contraste narrativo; «Pero» reproduce bien el giro respecto de la escena anterior sin forzar el sentido.
- source_word: συγκαλεσάμενος
  english_pob_choice: having called together
  chosen_spanish: habiendo convocado
  alternatives_spanish:
  - habiendo llamado juntos
  - después de convocar
  - convocando
  lexicon: BDAG
  rationale: El participio aoristo medio expresa acción previa de reunir/convocar. «Habiendo convocado» conserva la relación temporal y el matiz de reunir formalmente sin perder transparencia.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: sumos sacerdotes
  alternatives_spanish:
  - principales sacerdotes
  - jefes de los sacerdotes
  lexicon: BDAG
  rationale: En contexto del NT el plural designa a las autoridades sacerdotales principales. «Sumos sacerdotes» comunica ese grupo dirigente de modo natural en español y mantiene el sentido institucional.
- source_word: ἄρχοντας
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - autoridades
  - jefes
  - príncipes
  lexicon: BDAG
  rationale: ἄρχοντας remite a quienes ejercen mando o autoridad. «Gobernantes» preserva la fuerza oficial del término y funciona bien junto a «sumos sacerdotes».
- source_word: λαὸν
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  - la población
  lexicon: BDAG
  rationale: λαός suele referirse al colectivo del pueblo. «El pueblo» es la correspondencia más directa y evita reducir indebidamente el referente a una simple multitud.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail; el texto griego y la traducción inglesa están en alto acuerdo y no muestran variantes textuales relevantes para esta cláusula.
