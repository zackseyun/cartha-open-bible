translation:
  language: es
  text: Pero ellos seguían insistiendo a grandes voces[a], pidiendo que él fuera crucificado, y sus voces prevalecían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a grandes gritos». El griego repite «voz» en ambas cláusulas; por eso también puede traducirse «gritos» o «clamores», según el matiz que se quiera destacar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέκειντο
  english_pob_choice: kept pressing
  chosen_spanish: seguían insistiendo
  alternatives_spanish:
  - seguían presionando
  - insistían
  - seguían apremiando
  lexicon: BDAG
  rationale: El imperfecto indica presión continua e insistencia sostenida; «seguían insistiendo» transmite bien la duración y la fuerza del reclamo en el contexto judicial.
- source_word: φωναῖς μεγάλαις
  english_pob_choice: with loud voices
  chosen_spanish: con grandes voces
  alternatives_spanish:
  - con voces fuertes
  - a grandes gritos
  - con fuertes voces
  lexicon: BDAG
  rationale: Se conserva la imagen del dativo plural con μέγας y la repetición de φωνή. «Con grandes voces» es natural en español bíblico y mantiene el énfasis acústico sin añadir un matiz más específico que el griego no obliga a tener.
- source_word: αἰτούμενοι
  english_pob_choice: asking
  chosen_spanish: pidiendo
  alternatives_spanish:
  - solicitando
  - rogando
  - demandando
  lexicon: BDAG
  rationale: αἰτέω puede significar pedir o solicitar. En este contexto hostil, «pidiendo» preserva el núcleo léxico sin exagerar a «demandando», ya que la presión ya está expresada por el verbo anterior y por «grandes voces».
- source_word: αὐτὸν σταυρωθῆναι
  english_pob_choice: that he be crucified
  chosen_spanish: que él fuera crucificado
  alternatives_spanish:
  - para que fuera crucificado
  - que lo crucificaran
  - para crucificarlo
  lexicon: BDAG
  rationale: La construcción acusativo + infinitivo se vierte con naturalidad como proposición subordinada final/completiva en español. Se mantiene el pasivo de σταυρωθῆναι y la referencia explícita a Jesús implícita en el pronombre.
- source_word: κατίσχυον
  english_pob_choice: prevailed
  chosen_spanish: prevalecían
  alternatives_spanish:
  - se imponían
  - ganaban la partida
  - vencían
  lexicon: BDAG
  rationale: El imperfecto expresa una acción en curso. «Prevalecían» conserva esa duratividad y reproduce bien la idea de que sus voces se imponían en la escena, en línea con la solución final del audit trail inglés.
- source_word: αἱ φωναὶ αὐτῶν
  english_pob_choice: their voices
  chosen_spanish: sus voces
  alternatives_spanish:
  - sus gritos
  - sus clamores
  lexicon: BDAG
  rationale: Se conserva la repetición de φωνή en ambas cláusulas mediante «voces». Esto mantiene el enlace retórico del griego; «gritos» o «clamores» son posibles, pero romperían esa repetición lexical documentada.
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego de forma directa y toma en cuenta la revisión inglesa que prefirió «prevailed» frente a «were prevailing», por lo que el español también usa un imperfecto natural («prevalecían») para reflejar el aspecto continuo del original sin sonar forzado.
  spanish_consistency_notes:
  - Se mantiene la repetición de «voces» para conservar el enlace léxico de φωνή en los dos miembros del versículo.
  - Se usa «crucificado» para σταυρωθῆναι, evitando una paráfrasis activa que debilitara el pasivo griego.
  - El registro es bíblico moderno y sobrio, sin recurrir a un calco rígido del inglés.
