    reason: lexical_alternative
  revision_rationale: Se corrige una cuestión menor de naturalidad en español («a grandes voces» en lugar de «con grandes voces») y se mueve la nota al lugar correcto, ya que la variante léxica corresponde a «voces/gritos/clamores», no a «insistiendo». El resto del versículo preserva bien el sentido fuente y la decisión inglesa de mantener la repetición de «voces».
