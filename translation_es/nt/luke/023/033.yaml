translation:
  language: es
  text: Y cuando llegaron al lugar llamado Calavera[a], allí lo crucificaron y a los criminales, uno a la derecha y otro a la izquierda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'llamado la Calavera'. El topónimo griego Κρανίον significa literalmente 'calavera' o 'cráneo'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'uno de la derecha y uno de la izquierda'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - arribaron
  lexicon: BDAG
  rationale: Con un verbo de movimiento hacia un destino, el español natural es 'llegaron'. Conserva el valor narrativo de arribo sin sonar forzado.
- source_word: ἐπὶ τὸν τόπον
  english_pob_choice: to the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - a la जगह
  - al sitio
  lexicon: BDAG
  rationale: Con movimiento implícito, 'al lugar' expresa bien la dirección del griego ἐπί + acusativo y su resultado de llegada.
- source_word: τὸν καλούμενον Κρανίον
  english_pob_choice: called Skull
  chosen_spanish: llamado Calavera
  alternatives_spanish:
  - llamado la Calavera
  - llamado Cráneo
  lexicon: BDAG
  rationale: Κρανίον significa literalmente 'cráneo'/'calavera'. En español, 'Calavera' comunica el nombre de lugar con claridad y conserva el valor semántico del original mejor que transliterar o dejarlo sin traducir.
- source_word: ἐσταύρωσαν
  english_pob_choice: they crucified
  chosen_spanish: lo crucificaron
  alternatives_spanish:
  - lo clavaron en una cruz
  - lo colgaron en una cruz
  lexicon: BDAG
  rationale: '''Crucificaron'' es el equivalente preciso y directo de σταυρόω, sin añadir detalle interpretativo no explícito en el verbo.'
- source_word: κακούργους
  english_pob_choice: criminals
  chosen_spanish: a los criminales
  alternatives_spanish:
  - a los malhechores
  - a los malhechores culpables
  lexicon: BDAG
  rationale: κακοῦργος designa a personas que hacen el mal o delincuentes. 'Criminales' es claro, actual y mantiene la amplitud del término sin armonizarlo con otras tradiciones evangélicas.
- source_word: ὃν μὲν ἐκ δεξιῶν ὃν δὲ ἐξ ἀριστερῶν
  english_pob_choice: one on the right and one on the left
  chosen_spanish: uno a la derecha y otro a la izquierda
  alternatives_spanish:
  - uno a su derecha y otro a su izquierda
  - uno a la diestra y otro a la siniestra
  lexicon: BDAG
  rationale: La construcción distributiva se vierte de forma natural en español con 'uno... y otro...'. Se omite el posesivo implícito porque no aparece en el griego y el contexto ya lo sugiere.
theological_decisions:
- issue: Cómo rendir Κρανίον como topónimo
  english_pob_reading: Skull
  chosen_spanish_reading: Calavera
  alternative_spanish_readings:
  - la Calavera
  - Cráneo
  rationale: El POB inglés traduce el nombre común en vez de transliterarlo. En español, 'Calavera' preserva el sentido del topónimo y sugiere al lector el valor semántico del nombre sin importar una forma culta innecesaria.
  doctrine_reference: Translation philosophy §2
- issue: Cómo traducir κακοῦργοι sin armonizar con otras variantes evangélicas
  english_pob_reading: criminals
  chosen_spanish_reading: criminales
  alternative_spanish_readings:
  - malhechores
  - delincuentes
  rationale: Lucas usa un término amplio para personas culpables de delitos. 'Criminales' conserva esa amplitud y evita introducir especificaciones que el texto de Lucas no menciona.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de SBLGNT y coincide sustancialmente con el audit trail inglés. No se detectaron revisiones aplicadas en el pasaje; se mantuvo la decisión de traducir Κρανίον por su sentido léxico y de verter κακούργους como 'criminales' para no armonizar con otras tradiciones.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general del proyecto solo cuando corresponde; este versículo no contiene el tetragrámaton.
  - Se mantuvo 'crucificaron' como verbo técnico estándar en español bíblico contemporáneo.
  - '''A la derecha'' y ''a la izquierda'' conservan la simetría distributiva del griego sin añadir posesivos no expresos.'
