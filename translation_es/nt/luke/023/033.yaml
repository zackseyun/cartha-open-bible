revisions:
- from: Y cuando llegaron al lugar llamado Calavera[a], allí lo crucificaron a él y a los criminales[b], uno a la derecha y otro a la izquierda.
  to: Y cuando llegaron al lugar llamado Calavera[a], allí lo crucificaron y a los criminales, uno a la derecha y otro a la izquierda[b].
  rationale: 'La revisión conserva todas las decisiones de fondo del original y del POB inglés, pero mejora el español publicado: elimina una redundancia no necesaria (''a él'') y corrige la nota b para que sea fiel al griego sin sonar antinatural. También se ancla correctamente la nota b en la frase distributiva correspondiente.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:02:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: llegada al lugar, crucifixión de Jesús y de los κακοῦργοι, y la distribución ''uno... otro...''. También preserva correctamente la decisión de traducir Κρανίον semánticamente en vez de transliterarlo. Sin embargo, la nota b sigue demasiado literalmente el inglés y produce un español poco natural (''desde la derecha...''), cuando el español ya expresa bien la alternativa con ''a la derecha... a la izquierda''.'
  spanish_quality_summary: 'El texto principal es claro y legible en español eclesial moderno. La única mejora necesaria es estilística y de precisión idiomática menor: quitar el redundante ''a él'' después de ''lo crucificaron'', y ajustar la nota b para que el literal no suene antinatural ni engañoso. Además, en las decisiones léxicas aparece un error tipográfico grave (''a la जगह''), lo que confirma la necesidad de una pequeña corrección editorial, aunque no afecta directamente el texto publicado.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Calavera' para Κρανίον y 'criminales' para κακούργους concuerdan con el rastro de auditoría inglés. No intervienen términos sensibles del glosario como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: Redundancia en 'allí lo crucificaron a él'
    rationale: El griego tiene αὐτόν explícito, pero en español el clítico 'lo' ya expresa el objeto directo; añadir 'a él' aquí suena innecesario y algo pesado sin aportar contraste enfático claro.
  - severity: medium
    issue: 'Nota b poco natural: ''uno desde la derecha y uno desde la izquierda'''
    rationale: 'Aunque busca reflejar ἐκ/ἐξ, en español esa formulación no funciona como alternativa útil ni como literal claro. Conviene una nota que explique más naturalmente la forma griega: ''Literalmente, “uno de la derecha y uno de la izquierda”''.'
  - severity: low
    issue: 'Error tipográfico en decisiones léxicas: ''a la जगह'''
    rationale: Es un error editorial ajeno al texto bíblico principal, pero debe corregirse en el registro para mantener calidad y evitar confusión.
  revised_spanish_text: Y cuando llegaron al lugar llamado Calavera[a], allí lo crucificaron y a los criminales, uno a la derecha y otro a la izquierda[b].
  revised_footnotes:
  - marker: a
    text: O 'llamado la Calavera'. El topónimo griego Κρανίον significa literalmente 'calavera' o 'cráneo'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'uno de la derecha y uno de la izquierda'.
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva todas las decisiones de fondo del original y del POB inglés, pero mejora el español publicado: elimina una redundancia no necesaria (''a él'') y corrige la nota b para que sea fiel al griego sin sonar antinatural. También se ancla correctamente la nota b en la frase distributiva correspondiente.'
