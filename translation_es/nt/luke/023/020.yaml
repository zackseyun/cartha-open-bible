translation:
  language: es
  text: Pero Pilato volvió a hablarles[a], queriendo poner en libertad a Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se dirigió a ellos otra vez».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: volvió
  alternatives_spanish:
  - otra vez
  - de nuevo
  lexicon: BDAG
  rationale: En español, 'volvió' comunica de forma natural la repetición marcada por πάλιν y mantiene el movimiento narrativo sin sonar repetitivo o pesado.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: '''Pero'' expresa mejor el leve contraste narrativo con la reacción del pueblo que una mera continuación coordinada.'
- source_word: Πιλᾶτος
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  lexicon: nombre propio transliterado
  rationale: Se conserva el nombre propio en su forma española usual y reconocible.
- source_word: προσεφώνησεν
  english_pob_choice: called out
  chosen_spanish: se dirigió a
  alternatives_spanish:
  - llamó
  - habló en voz alta a
  - se dirigió nuevamente
  lexicon: BDAG
  rationale: El verbo puede significar 'dirigirse a' o 'llamar/llamar en voz alta'. En español, 'se dirigió a' preserva el sentido de hablar a un grupo, mientras el adverbio 'volvió' transmite la repetición pública.
- source_word: θέλων
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - quería
  lexicon: BDAG
  rationale: El participio expresa intención contemporánea con la acción principal; 'queriendo' conserva ese matiz sin transformar la estructura del griego en una oración finita.
- source_word: ἀπολῦσαι
  english_pob_choice: to release
  chosen_spanish: soltar
  alternatives_spanish:
  - liberar
  - poner en libertad
  lexicon: BDAG
  rationale: Aunque 'liberar' sería posible, 'soltar' refleja con más sobriedad el sentido de dejar libre en un contexto judicial; además evita un tono demasiado interpretativo.
- source_word: τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - a Jesús
  lexicon: nombre propio transliterado
  rationale: El objeto directo personal lleva la preposición 'a' en español; se mantiene el nombre en su forma estándar.
translation_notes:
  revision_awareness: El texto base en inglés lee 'called out again' y anota como alternativa 'addressed them again'. La versión española sigue esa misma tensión lexical con 'volvió a dirigirse a ellos', que conserva tanto la repetición como la dirección verbal al grupo.
  spanish_consistency_notes:
  - Se conserva 'Jesús' como nombre propio estándar.
  - No se usó 'SEÑOR' ni terminología eclesiástica no presente en el griego.
  - '''Queriendo'' mantiene el participio de intención sin sobretraducirlo.'
  - La nota al pie refleja la alternativa principal del verbo griego, coherente con el audit trail inglés.
