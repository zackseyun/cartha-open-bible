review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del griego: primero bajar el cuerpo, luego envolverlo en lino, luego ponerlo en un sepulcro, y finalmente aclarar que nadie había sido puesto allí antes. Sin embargo, la distribución de las notas al pie no sigue fielmente la auditoría inglesa: la nota [a] en inglés corresponde a alternativas para λαξευτῷ (''cut in stone''), mientras que la nota [b] corresponde a la cláusula final ''where no one had yet been laid''. En el borrador español, [a] se asignó a καθελὼν y [b] a λαξευτῷ, dejando sin nota la alternativa de la cláusula final. Además, ''lo puso'' es fiel pero algo menos digno que ''lo colocó'' o ''lo depositó'', y la cláusula final puede sonar más natural como ''donde todavía no habían puesto a nadie''.'
  spanish_quality_summary: El español es generalmente claro y natural. 'Después de bajarlo' y 'lo envolvió en una sábana de lino' funcionan bien. 'Sepulcro tallado en piedra' es comprensible, aunque 'excavado en la roca' sería más idiomático en algunos registros; no es necesario cambiarlo. La frase final del borrador actual, 'donde todavía no había sido puesto nadie', es entendible pero algo pesada. Una formulación activa impersonal como 'donde todavía no habían puesto a nadie' suena más natural sin perder el sentido funerario.
  glossary_alignment: No hay términos del glosario de alto impacto en este versículo que entren en conflicto. 'Sepulcro' para μνήματι es adecuado y eclesialmente legible. 'Sábana de lino' para σινδόνι es fiel y menos interpretativa que 'mortaja'. La principal corrección necesaria es de anclaje y contenido de notas, no de terminología doctrinal.
  issues:
  - severity: medium
    issue: Las notas al pie están mal asignadas respecto de la auditoría inglesa.
    rationale: La nota [a] del POB inglés corresponde a alternativas para 'tomb cut in stone', no para 'after taking him down'. La nota [b] corresponde a la cláusula final 'where no one had yet been laid'. En español se debe preservar esa evidencia léxica/documental o, si se adapta, hacerlo de forma coherente y completa.
  - severity: low
    issue: La cláusula final suena algo forzada en pasiva.
    rationale: '''Todavía no había sido puesto nadie'' es comprensible, pero menos natural en español público que ''donde todavía no habían puesto a nadie'' o ''donde nadie había sido puesto todavía''.'
  - severity: low
    issue: '''Lo puso'' es algo llano para el tono buscado.'
    rationale: Aunque fiel, 'lo colocó' mantiene mejor un tono moderno pero digno, coherente con el estilo del proyecto.
  revised_spanish_text: Y después de bajarlo, lo envolvió en una sábana de lino y lo colocó en un sepulcro tallado en piedra[a], donde todavía no habían puesto a nadie[b].
  revised_footnotes:
  - marker: a
    text: O «un sepulcro labrado» o «un sepulcro excavado en la roca».
    reason: lexical_alternative
  - marker: b
    text: O «donde nadie había yacido nunca».
    reason: lexical_alternative
  revision_rationale: 'Se corrigieron las notas al pie para alinearlas con la auditoría inglesa y con las decisiones léxicas del griego: [a] ahora ancla λαξευτῷ y [b] la cláusula οὐδεὶς οὔπω κείμενος. También se suavizó la redacción española a un registro más natural y digno con ''lo colocó'' y ''donde todavía no habían puesto a nadie'', sin alterar el sentido fuente.'
