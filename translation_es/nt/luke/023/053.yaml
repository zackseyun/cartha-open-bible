revisions:
- from: Y después de bajarlo[a], lo envolvió en una sábana de lino y lo puso en un sepulcro tallado en piedra[b], donde todavía no había sido puesto nadie.
  to: Y después de bajarlo, lo envolvió en una sábana de lino y lo colocó en un sepulcro tallado en piedra[a], donde todavía no habían puesto a nadie[b].
  rationale: 'Se corrigieron las notas al pie para alinearlas con la auditoría inglesa y con las decisiones léxicas del griego: [a] ahora ancla λαξευτῷ y [b] la cláusula οὐδεὶς οὔπω κείμενος. También se suavizó la redacción española a un registro más natural y digno con ''lo colocó'' y ''donde todavía no habían puesto a nadie'', sin alterar el sentido fuente.'
