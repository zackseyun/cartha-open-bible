translation:
  language: es
  text: Y después de bajarlo, lo envolvió en una sábana de lino y lo colocó en un sepulcro tallado en piedra[a], donde todavía no habían puesto a nadie[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un sepulcro labrado» o «un sepulcro excavado en la roca».
    reason: lexical_alternative
  - marker: b
    text: O «donde nadie había yacido nunca».
    reason: lexical_alternative
lexical_decisions:
- source_word: καθελὼν
  english_pob_choice: after taking him down
  chosen_spanish: después de bajarlo
  alternatives_spanish:
  - habiéndolo bajado
  - tras bajarlo
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a los verbos principales. «Después de bajarlo» comunica bien la secuencia sin volver rígida la sintaxis española. El objeto directo se mantiene implícito con el clítico «lo», coherente con Jesús ya mencionado en el contexto inmediato.
- source_word: ἐνετύλιξεν
  english_pob_choice: wrapped
  chosen_spanish: lo envolvió
  alternatives_spanish:
  - lo envolvió cuidadosamente
  - lo arropó
  lexicon: BDAG
  rationale: ἐντυλίσσω significa envolver o enrollar en tela. «Lo envolvió» es natural, claro y suficientemente preciso para el contexto funerario, sin añadir detalle no presente en el griego.
- source_word: σινδόνι
  english_pob_choice: in a linen cloth
  chosen_spanish: en una sábana de lino
  alternatives_spanish:
  - en un lienzo de lino
  - en un paño de lino
  - en una mortaja de lino
  lexicon: BDAG
  rationale: σινδών denota una tela de lino, a menudo de uso funerario. «Sábana de lino» comunica el material y la función de envoltura en español moderno; «mortaja» sería más interpretativa y menos transparente.
- source_word: ἔθηκεν
  english_pob_choice: placed
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo depositó
  lexicon: BDAG
  rationale: τίθημι aquí indica poner o colocar el cuerpo en el sepulcro. «Lo puso» es sencillo y fiel; evita introducir matices que el griego no exige.
- source_word: μνήματι
  english_pob_choice: in a tomb
  chosen_spanish: en un sepulcro
  alternatives_spanish:
  - en una tumba
  - en un mausoleo
  lexicon: BDAG
  rationale: μνῆμα puede referirse a sepulcro o tumba. «Sepulcro» conserva el sentido funerario de enterramiento y es natural en español bíblico sin depender de lenguaje eclesiástico más tradicional que el texto no requiere.
- source_word: λαξευτῷ
  english_pob_choice: cut in stone
  chosen_spanish: tallado en piedra
  alternatives_spanish:
  - labrado en piedra
  - cavado en roca
  - excavado en la roca
  lexicon: BDAG
  rationale: λαξευτός describe algo tallado o labrado, especialmente en piedra o roca. «Tallado en piedra» suena natural en español y conserva la imagen de un sepulcro hecho por talla, no por mera construcción.
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en el que
  lexicon: BDAG
  rationale: El relativo de lugar se vierte naturalmente con «donde», que evita una construcción más pesada sin perder referencia al sepulcro.
- source_word: οὐδεὶς οὔπω κείμενος
  english_pob_choice: where no one had yet been laid
  chosen_spanish: todavía no había sido puesto nadie
  alternatives_spanish:
  - todavía no yacía nadie
  - nunca había sido puesto nadie
  lexicon: BDAG
  rationale: La construcción comunica ausencia previa de uso funerario. «Todavía no había sido puesto nadie» preserva la pasiva implícita de κείμενος en un español natural. La opción «yacer» existe, pero puede sonar más literaria y menos directa para la claridad pública.
theological_decisions:
- issue: Uso del sepulcro nuevo o no usado
  english_pob_reading: Joseph placed Jesus in a tomb cut in stone that had not yet been used for anyone.
  chosen_spanish_reading: José colocó a Jesús en un sepulcro tallado en piedra que todavía no había sido usado por nadie.
  alternative_spanish_readings:
  - en un sepulcro donde todavía no había sido puesto nadie
  - en un sepulcro donde nadie había yacido nunca
  rationale: El versículo es descriptivo y no doctrinalmente polémico. La traducción conserva el detalle histórico del sepulcro sin armonizarlo con formulaciones de paralelos ni convertirlo en afirmación teológica adicional. La variante pasiva en español mantiene la idea de no uso previo.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y el audit trail inglés. Se conservó la secuencia participial anterior a los verbos principales, el valor funerario de σινδών y μνῆμα, y la idea de un sepulcro aún no usado. No se adoptaron lecturas más interpretativas que el griego no exige.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» implícito por el contexto inmediato, como en el español bíblico natural, sin repetir el nombre en el texto del versículo.
  - Se prefirió «sepulcro» para μνῆμα y «tallado en piedra» para λαξευτός, manteniendo un registro digno y claro.
  - La pasiva final se expresó de modo natural en español para conservar la idea de no uso previo sin forzar un calco griego.
