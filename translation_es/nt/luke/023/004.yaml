translation:
  language: es
  text: 'Entonces Pilato dijo a los principales sacerdotes y a las multitudes[a]: «No encuentro contra este hombre base para una acusación».


    [a] O «No encuentro culpa en este hombre». El griego αἴτιον puede significar «culpa», pero aquí tiene un sentido judicial: no hay fundamento válido para acusarlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «No encuentro culpa en este hombre». El griego αἴτιον puede significar «culpa», pero aquí tiene un sentido judicial: no hay fundamento válido para acusarlo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Pero
  - Y
  lexicon: BDAG
  rationale: δέ es una conexión suave de continuidad narrativa. «Entonces» expresa bien la progresión del relato en español sin introducir contraste fuerte.
- source_word: Πιλᾶτος
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  alternatives_spanish:
  - Pilatos
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio transliterado según el uso bíblico estándar en español.
- source_word: εἶπεν πρὸς
  english_pob_choice: said to
  chosen_spanish: dijo a
  alternatives_spanish:
  - habló a
  - se dirigió a
  lexicon: BDAG
  rationale: La combinación λέγω + πρός se expresa naturalmente como «dijo a» en español, conservando el valor de discurso dirigido.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: «Principales sacerdotes» comunica el plural de la dirigencia sacerdotal. «Sumos sacerdotes» puede sonar más tradicional, pero en español puede sugerir indebidamente varios titulares del mismo oficio sin matiz de liderazgo.
- source_word: ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - la multitud
  - el pueblo
  lexicon: BDAG
  rationale: El plural griego se preserva mejor con «las multitudes». «La multitud» singulariza de manera no deseada; «el pueblo» es más amplio y menos preciso.
- source_word: Οὐδὲν εὑρίσκω
  english_pob_choice: I find no basis
  chosen_spanish: No encuentro ninguna base
  alternatives_spanish:
  - No encuentro nada
  - No hallo motivo alguno
  lexicon: BDAG
  rationale: Se conserva la fuerza negativa de la declaración judicial. «Base» expresa el valor forense de αἴτιον en este contexto, sin recurrir a una traducción demasiado vaga como «culpa».
- source_word: αἴτιον
  english_pob_choice: basis for a charge
  chosen_spanish: base para una acusación
  alternatives_spanish:
  - culpa
  - motivo
  - fundamento para acusarlo
  lexicon: BDAG
  rationale: 'αἴτιον tiene aquí sentido jurídico: un fundamento o causa imputable. «Base para una acusación» comunica mejor el matiz forense que «culpa» sola.'
- source_word: ἐν τῷ ἀνθρώπῳ τούτῳ
  english_pob_choice: against this man
  chosen_spanish: en este hombre
  alternatives_spanish:
  - contra este hombre
  - en la persona de este hombre
  lexicon: BDAG
  rationale: Se mantiene la preposición «en» de manera transparente, porque el griego dice literalmente «en este hombre». La nota aclara que la expresión funciona judicialmente como ausencia de fundamento para acusarlo. «Este hombre» conserva el demostrativo y el valor singular de ἄνθρωπος.
theological_decisions:
- issue: Sentido judicial de αἴτιον
  english_pob_reading: no basis for a charge; the Greek carries a judicial sense rather than mere 'fault'
  chosen_spanish_reading: no encuentro ninguna base para una acusación
  alternative_spanish_readings:
  - no encuentro culpa en este hombre
  - no encuentro motivo para acusarlo
  rationale: El versículo presenta una declaración de inocencia en un marco legal. En español conviene preservar el matiz forense sin reducirlo a una simple evaluación moral.
  doctrine_reference: Narrativa de la pasión; juicio injusto de Jesús
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin revisiones aplicadas; la versión española sigue esa lectura estable y conserva la alternativa lexical documentada para αἴτιον en nota.
  spanish_consistency_notes:
  - Se usa «Pilato» y no «Pilatos» para uniformidad bíblica en español.
  - Se prefirió «principales sacerdotes» para evitar una carga doctrinal o tradicional no exigida por el griego.
  - La decisión de conservar la pluralidad de ὄχλους como «las multitudes» mantiene la forma del original.
  - La frase final busca ser clara en español moderno, pero la nota preserva la tensión entre el sentido literal de ἐν y el sentido forense de la expresión.
