translation:
  language: es
  text: No temas[a], pequeño rebaño[b], porque a su Padre le agradó darles el reino[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No tengas miedo».
    reason: lexical_alternative
  - marker: b
    text: O «rebaño pequeño».
    reason: lexical_alternative
  - marker: c
    text: «El reino» también puede entenderse como «el reinado», resaltando tanto el gobierno real de Dios como la esfera entregada a su pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ φοβοῦ
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas; no te asustes
  lexicon: BDAG
  rationale: El imperativo negativo expresa una prohibición directa. «No temas» es natural, digno y conserva la concisión y fuerza exhortativa del griego; «No tengas miedo» es una alternativa idiomática válida, pero menos compacta.
- source_word: τὸ μικρὸν ποίμνιον
  english_pob_choice: little flock
  chosen_spanish: rebaño pequeño
  alternatives_spanish:
  - pequeño rebaño
  - rebaño poco numeroso
  lexicon: BDAG
  rationale: ποίμνιον denota un rebaño/flock, y μικρόν indica tamaño pequeño. «Rebaño pequeño» mantiene la metáfora pastoral con claridad en español. «Pequeño rebaño» también es posible; «rebaño poco numeroso» explicita el tamaño numérico, pero pierde algo de la ternura del diminutivo conceptual.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la exhortación. «Porque» expresa de forma directa la relación causal en español contemporáneo.
- source_word: εὐδόκησεν
  english_pob_choice: was pleased
  chosen_spanish: le agradó
  alternatives_spanish:
  - estuvo complacido
  - se agradó
  lexicon: BDAG
  rationale: El aoristo de εὐδοκέω comunica beneplácito o buena voluntad. En español, «le agradó» preserva la idea de complacencia favorable sin convertirlo en una formulación más técnica o abstracta. El sujeto sigue siendo «a vuestro Padre», como en el griego.
- source_word: ὁ πατὴρ ὑμῶν
  english_pob_choice: your Father
  chosen_spanish: vuestro Padre
  alternatives_spanish:
  - su Padre
  - su Padre de ustedes
  lexicon: BDAG
  rationale: El posesivo plural de segunda persona se refleja mejor con «vuestro» en un registro bíblico neutral y respetuoso. «Su Padre» puede ser ambiguo en español; «vuestro Padre» conserva la relación directa del original.
- source_word: δοῦναι ὑμῖν
  english_pob_choice: to give you
  chosen_spanish: daros
  alternatives_spanish:
  - darles
  - concederos
  lexicon: BDAG
  rationale: El infinitivo con dativo se naturaliza en español con el enclítico «-os» al conservar el tratamiento plural directo del texto. «Concederos» sería más interpretativo y elevado; «darles» pierde el vínculo inmediato con el destinatario.
- source_word: τὴν βασιλείαν
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  lexicon: BDAG
  rationale: βασιλεία puede señalar reino o reinado. «El reino» preserva la expresión bíblica asentada y deja abierta la tensión entre esfera y ejercicio del gobierno real de Dios, tal como el audit trail en inglés la mantiene.
theological_decisions:
- issue: Ambigüedad teológica de βασιλεία
  english_pob_reading: the kingdom
  chosen_spanish_reading: el reino
  alternative_spanish_readings:
  - el reinado
  rationale: «El reino» conserva el alcance bíblico tradicional sin reducirlo solo al territorio ni solo al acto de gobernar. Así se mantiene la tensión documentada entre reino como realidad recibida y reinado como ejercicio de autoridad.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Benevolencia divina en εὐδόκησεν
  english_pob_reading: was pleased
  chosen_spanish_reading: le agradó
  alternative_spanish_readings:
  - tuvo a bien
  - se complació en
  rationale: La frase resalta la iniciativa bondadosa del Padre. «Le agradó» comunica beneplácito divino sin convertirlo en una formulación doctrinal más estrecha sobre decreto o determinación.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior haciendo que cada marcador de nota aparezca explícitamente en el texto español. También se preservó la distinción entre la metáfora pastoral, la causalidad de ὅτι y la tensión semántica de βασιλεία sin añadir material no sustentado por la fuente.
  spanish_consistency_notes:
  - Usar «reino» de manera consistente para βασιλεία, salvo nota explicativa cuando el contexto requiera destacar la idea de reinado.
  - Mantener «Padre» sin adjetivos añadidos, porque el griego no dice «celestial».
  - Preferir «rebaño» en esta perícopa para conservar la imagen pastoral del original.
  - Conservar el tratamiento plural bíblico con «vuestro» y «daros» para reflejar ὑμῶν / ὑμῖν.
