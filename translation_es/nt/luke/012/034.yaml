translation:
  language: es
  text: Porque donde está su[a] tesoro, allí estará también su corazón.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa un posesivo de segunda persona plural: «de ustedes» o «de vosotros».'
    reason: aclaración gramatical
  - marker: b
    text: 'O: «Porque dondequiera que esté su[a] tesoro, allí estará también su corazón.»'
    reason: lectura_alternativa
lexical_decisions:
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - adonde
  - dondequiera que
  lexicon: BDAG
  rationale: «Donde» reproduce de manera natural la cláusula locativa y el paralelismo proverbial «donde... allí...». «Dondequiera que» sería más expansivo de lo que exige el griego aquí.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: En español, «porque» expresa bien la relación explicativa con el dicho previo y suena natural al inicio de una sentencia proverbial. Mantiene el valor conectivo de γάρ sin volverlo mecánico.
- source_word: θησαυρός
  english_pob_choice: treasure
  chosen_spanish: tesoro
  alternatives_spanish:
  - riqueza
  - acopio de bienes
  - lo que atesoras
  lexicon: BDAG
  rationale: «Tesoro» es el equivalente directo y conserva tanto el sentido material como la fuerza metafórica del término en el contexto de lo que se valora y acumula.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - ser interior
  - mente
  - deseos
  lexicon: BDAG
  rationale: «Corazón» preserva el sentido bíblico del centro de afectos, voluntad y orientación personal. Alternativas más interpretativas reducirían el alcance antropológico del término.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: «Allí» sostiene el correlativo natural con «donde» y refleja la relación espacial/proverbial del griego.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - igual
  - además
  - asimismo
  lexicon: BDAG
  rationale: «También» reproduce la adición del griego y encaja en español al final de la frase sin perder naturalidad.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: estará
  alternatives_spanish:
  - será
  - va a estar
  lexicon: BDAG
  rationale: «Estará» conserva el futuro explícito del griego y expresa bien la certeza proverbial. «Será» sonaría más abstracto en español aquí.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: vuestro
  alternatives_spanish:
  - su
  - de ustedes
  lexicon: BDAG
  rationale: «Vuestro» refleja el plural de segunda persona del griego. Aunque en parte del español americano puede sonar menos usual, es el equivalente más preciso para mantener el número y la relación directa del texto.
theological_decisions:
- issue: Sentido antropológico de «corazón»
  english_pob_reading: Retain 'heart' as the biblical term for the center of a person's affections and commitments.
  chosen_spanish_reading: Mantener «corazón» como el término bíblico para el centro de afectos, lealtades y orientación interior.
  alternative_spanish_readings:
  - interior
  - mente
  - deseos
  rationale: La frase es proverbial y no exige reducir καρδία a una sola facultad psicológica. «Corazón» preserva la tensión bíblica entre afecto, voluntad y dirección moral sin sobreinterpretar.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto griego aportado y con la decisión inglesa de conservar la estructura correlativa «where... there...». No se requieren revisiones textuales ni cambios de sentido; solo se ajustó la formulación al español natural manteniendo el futuro, el paralelismo y el valor proverbial.
  spanish_consistency_notes:
  - Se mantuvo «tesoro» como equivalente estable de θησαυρός.
  - Se preservó «corazón» para καρδία, sin sustituirlo por un término más interpretativo.
  - Se reflejó el plural de segunda persona con «vuestro/vuestro», coherente con el ὑμῶν griego.
  - El marcador de nota [a] se colocó en el punto de mayor variación posible sin alterar la línea principal.
