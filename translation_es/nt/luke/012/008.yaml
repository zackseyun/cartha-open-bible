translation:
  language: es
  text: 'Y les digo[a]: todo el que me confiese delante de los hombres, también el Hijo del Hombre lo reconocerá delante de los ángeles de Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «delante de la gente». El griego dice literalmente «delante de los hombres», con plural masculino de valor representativo para los seres humanos en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγω δὲ ὑμῖν
  english_pob_choice: And I tell you
  chosen_spanish: Y yo les digo
  alternatives_spanish:
  - Pero yo les digo
  - Ahora yo les digo
  lexicon: BDAG
  rationale: λέγω aquí funciona como una afirmación solemne de Jesús dirigida a los oyentes; en español, «Y yo les digo» conserva la continuidad discursiva de δὲ sin forzar un contraste más fuerte de lo que el griego exige.
- source_word: πᾶς ὃς ἂν
  english_pob_choice: everyone who
  chosen_spanish: todo el que
  alternatives_spanish:
  - quienquiera que
  - cada uno que
  lexicon: BDAG
  rationale: La construcción expresa una condición general e indefinida. «Todo el que» comunica bien el alcance universal y suena natural en español bíblico contemporáneo.
- source_word: ὁμολογήσῃ
  english_pob_choice: confesses
  chosen_spanish: me confiese
  alternatives_spanish:
  - me reconozca
  - declare públicamente por mí
  lexicon: BDAG
  rationale: Se mantiene «confiese» para conservar el vínculo verbal con ὁμολογήσει en la segunda cláusula y el sentido de confesión o reconocimiento público.
- source_word: ἐν ἐμοὶ
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - en mí
  - por mí
  lexicon: BDAG
  rationale: Aunque el griego usa ἐν, en esta construcción el español pide un objeto directo natural. «Me» evita una calca poco idiomática y preserva la idea de reconocimiento personal respecto de Jesús.
- source_word: ἔμπροσθεν τῶν ἀνθρώπων
  english_pob_choice: before men
  chosen_spanish: delante de los hombres
  alternatives_spanish:
  - delante de la gente
  - en presencia de los hombres
  lexicon: BDAG
  rationale: «Delante de los hombres» reproduce de cerca la forma y el valor representativo del plural masculino; «delante de» es la manera más natural de expresar ἔμπροσθεν en español.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional y cargado de resonancia daniélica. En español, «el Hijo del Hombre» es la forma establecida y fiel al carácter titular de la expresión.
- source_word: ὁμολογήσει
  english_pob_choice: will confess
  chosen_spanish: lo confesará
  alternatives_spanish:
  - lo reconocerá
  - hará confesión de él
  lexicon: BDAG
  rationale: Se conserva la misma raíz verbal que en la primera cláusula, lo que mantiene la reciprocidad del dicho. El objeto clítico «lo» expresa el complemento de persona de forma natural en español.
- source_word: ἐν αὐτῷ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - en él
  - por él
  lexicon: BDAG
  rationale: Como en la primera cláusula, la preposición griega funciona idiomáticamente con ὁμολογέω. En español, el clítico directo comunica mejor la reciprocidad que una traducción literal con «en él».
- source_word: ἔμπροσθεν τῶν ἀγγέλων τοῦ θεοῦ
  english_pob_choice: before the angels of God
  chosen_spanish: delante de los ángeles de Dios
  alternatives_spanish:
  - en presencia de los ángeles de Dios
  - ante los ángeles de Dios
  lexicon: BDAG
  rationale: «Delante de» mantiene el valor de testimonio público y la escena solemne ante la corte celestial. «Ángeles de Dios» sigue de cerca el genitivo griego sin añadir explicación interpretativa.
theological_decisions:
- issue: Construcción recíproca con ἐν + dativo en ὁμολογέω
  english_pob_reading: Translate idiomatically as 'confesses me ... will confess [him]' rather than woodenly retaining 'in me/in him.'
  chosen_spanish_reading: Traducir de forma idiomática como «me confiese ... lo confesará» en lugar de «confiese en mí ... confesará en él».
  alternative_spanish_readings:
  - me confiese ... confesará en él
  - confiese en mí ... lo confesará
  rationale: El griego expresa una confesión o reconocimiento personal con ἐν + dativo, pero en español la literalidad resultaría extraña y oscurecería el paralelismo. La versión elegida conserva la reciprocidad del dicho sin introducir matices doctrinales adicionales.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor representativo de ἀνθρώπων
  english_pob_reading: Use 'men' in the main text, with inclusive force understood.
  chosen_spanish_reading: Mantener «los hombres» en el texto principal, con sentido representativo de la humanidad en general.
  alternative_spanish_readings:
  - las personas
  - la gente
  rationale: El plural masculino del griego tiene fuerza representativa; en español, «los hombres» conserva esa correspondencia formal y el peso tradicional del dicho, mientras que la nota puede aclarar el alcance inclusivo sin borrar la forma del original.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran acuerdo estable: la elección principal debe conservar el paralelismo verbal de ὁμολογέω y el valor público de ἔμπροσθεν. No se registran revisiones aplicadas en el paquete fuente, así que el borrador español sigue la lectura estable del pasaje sin introducir variantes textuales.'
  spanish_consistency_notes:
  - Se mantiene «Hijo del Hombre» como título cristológico fijo.
  - Se usa «delante de» para ambos valores de ἔμπροσθεν, por consistencia estilística y semántica.
  - Se conserva «confiese/confesará» para reflejar la repetición de ὁμολογέω.
  - Se evita calcar ἐν con «en» cuando el español exige un objeto directo natural.
