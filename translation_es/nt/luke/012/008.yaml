revisions:
- from: 'Y yo les digo[a]: todo el que me confiese delante de los hombres, también el Hijo del Hombre lo confesará delante de los ángeles de Dios.'
  to: 'Y les digo[a]: todo el que me confiese delante de los hombres, también el Hijo del Hombre lo reconocerá delante de los ángeles de Dios.'
  rationale: Se quita el pronombre «yo» para evitar énfasis no exigido por el original, y se cambia «lo confesará» por «lo reconocerá» para lograr un español más natural y claro, manteniendo el sentido de reconocimiento público documentado en el expediente léxico-teológico. La nota sobre «los hombres» se conserva sin cambios porque está bien anclada y explica adecuadamente el valor representativo del plural griego.
