translation:
  language: es
  text: Y ustedes, no busquen qué van a comer y qué van a beber, y no estén inquietos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no estén preocupados' o 'no estén desasosegados'; más literalmente, 'no queden en suspenso'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - ustedes mismos
  - vosotros
  lexicon: BDAG
  rationale: El pronombre está explícito y es enfático en griego. En español, colocar 'ustedes' al inicio conserva ese énfasis sin sobrecargar la frase. 'Ustedes mismos' suena más pesado de lo que exige el contexto, y 'vosotros' no es neutral para todo el ámbito hispanohablante.
- source_word: ζητεῖτε
  english_pob_choice: seek
  chosen_spanish: busquen
  alternatives_spanish:
  - busquen afanosamente
  - procuren
  lexicon: BDAG
  rationale: ζητέω en este contexto expresa una búsqueda preocupada o insistente. 'Busquen' preserva el vínculo léxico y comunica una prohibición de ocupación mental excesiva sin añadir matices no requeridos. 'Procuren' suaviza demasiado la fuerza del verbo.
- source_word: τί φάγητε
  english_pob_choice: what you may eat
  chosen_spanish: qué comerán
  alternatives_spanish:
  - qué podrían comer
  - qué hayan de comer
  lexicon: BDAG
  rationale: La construcción deliberativa/indefinida se puede expresar de forma natural en español con un futuro simple en una pregunta indirecta dependiente de la prohibición. 'Qué comerán' mantiene fluidez y evita una rigidez artificial; 'qué podrían comer' introduce una posibilidad que el griego no requiere.
- source_word: τί πίητε
  english_pob_choice: what you may drink
  chosen_spanish: qué beberán
  alternatives_spanish:
  - qué podrían beber
  - qué hayan de beber
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con 'qué comerán'. El futuro simple en español conserva la referencia a la provisión futura sin forzar la estructura griega ni sonar mecánico.
- source_word: μετεωρίζεσθε
  english_pob_choice: be unsettled
  chosen_spanish: estén inquietos
  alternatives_spanish:
  - estén preocupados
  - estén ansiosos
  - queden en suspenso
  lexicon: BDAG
  rationale: μετεωρίζομαι evoca estar elevado/en suspenso y, por extensión, agitación interior e incertidumbre. 'Estén inquietos' comunica esa inestabilidad mental de modo natural en español y evita interpretar demasiado el término. 'Estén ansiosos' es posible, pero en español puede sonar más clínico o teológico que el griego inmediato.
- source_word: καὶ ... καὶ ... καὶ
  english_pob_choice: and ... and ... and
  chosen_spanish: y ... y ... y
  alternatives_spanish:
  - y ... o ... y
  lexicon: BDAG
  rationale: Se conserva la coordinación acumulativa del griego. Mantener 'y' reproduce mejor el ritmo y la estructura del texto fuente que suavizarlo con una disyuntiva.
theological_decisions:
- issue: La prohibición puede entenderse como rechazo de la preocupación ansiosa, no de la provisión cotidiana legítima.
  english_pob_reading: A direct prohibition against anxious seeking of food and drink
  chosen_spanish_reading: Una prohibición directa contra la búsqueda ansiosa de comida y bebida
  alternative_spanish_readings:
  - Una prohibición de planear de manera ordinaria la comida y la bebida
  - Una llamada a la indiferencia total hacia las necesidades corporales
  rationale: El contexto favorece una advertencia contra la inquietud por las necesidades materiales, no contra el alimento o la bebida como tales. 'No busquen ... y no estén inquietos' conserva esa tensión sin convertir el mandato en ascetismo ni reducirlo a simple consejo.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: Se ajustó la redacción para que la nota [a] quede anclada en el texto y para reflejar mejor el valor de μετεωρίζεσθε sin sobreinterpretarlo. La decisión de usar 'estén inquietos' intenta equilibrar naturalidad española y cercanía al matiz de 'be unsettled' del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo el pronombre explícito al inicio para reflejar el énfasis de ὑμεῖς.
  - Se preservó la coordinación repetida con 'y' para reflejar la acumulación del griego.
  - Se evitó 'SEÑOR' u otra terminología no pertinente; no hay nombres divinos en este versículo.
  - La nota de alternativa léxica está anclada exactamente en el marcador [a] dentro del texto principal.
