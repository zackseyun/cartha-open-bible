review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura griega y el sentido general: conserva el pronombre explícito inicial, la doble cláusula sobre comer y beber, y la prohibición final contra la agitación interior. Sin embargo, ''qué comerán y qué beberán'' suena más predictivo/futuro que el matiz deliberativo e indefinido de τί φάγητε / τί πίητε. En español natural y fiel conviene ''qué van a comer y qué van a beber'' o similar. Además, la nota al pie inglesa preserva tres alternativas para μετεωρίζεσθε; la española actual omite ''no estén inquietos'' como alternativa y no refleja plenamente ''do not be unsettled'' / ''do not be worried'' / literal ''be kept in suspense''.'
  spanish_quality_summary: 'La frase es clara y legible en español neutro. ''Y ustedes'' funciona, aunque el anclaje de nota en ''ustedes'' no está respaldado por una necesidad real de nota; la única nota pertinente es sobre μετεωρίζεσθε. ''No estén inquietos'' es una buena solución idiomática y digna. La reparación necesaria es menor: ajustar la expresión de las preguntas indirectas y reubicar/rehacer la nota para el término final.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas: ''busquen'' para ζητεῖτε y ''inquietos'' para μετεωρίζεσθε son defendibles. La principal mejora es hacer que la nota léxica corresponda al término griego discutido y no al pronombre ὑμεῖς.'
  issues:
  - severity: medium
    issue: '''qué comerán y qué beberán'' sobredetermina el sentido hacia un futuro predictivo'
    rationale: Las cláusulas τί φάγητε / τί πίητε después de ζητεῖτε expresan una preocupación deliberativa/indefinida ('qué van a comer/beber', 'qué han de comer/beber'), no tanto una simple predicción futura. El futuro simple en español puede sonar más a anuncio de lo que ocurrirá que a preocupación por provisiones.
  - severity: medium
    issue: La nota al pie está anclada en 'ustedes' pero su contenido trata μετεωρίζεσθε
    rationale: La nota dice 'O “no estén preocupados”; más literalmente, “no queden en suspenso”', lo cual claramente comenta la prohibición final, no el pronombre ὑμεῖς. Debe anclarse en 'inquietos' o en la cláusula final.
  - severity: low
    issue: La nota no preserva completamente las alternativas documentadas en el inglés POB
    rationale: El rastro auditado inglés ofrece 'do not be worried,' 'do not be unsettled,' o más literalmente 'do not be kept in suspense.' En español conviene reflejar al menos 'no estén preocupados', 'no estén inquietos/desasosegados' y la opción más literal.
  revised_spanish_text: Y ustedes, no busquen qué van a comer y qué van a beber, y no estén inquietos[a].
  revised_footnotes:
  - marker: a
    text: O 'no estén preocupados' o 'no estén desasosegados'; más literalmente, 'no queden en suspenso'.
    reason: lexical_alternative
  revision_rationale: Se corrige el matiz de las preguntas indirectas para reflejar mejor el sentido deliberativo del griego en español natural, y se reubica la nota léxica al término que realmente comenta, preservando mejor las alternativas documentadas para μετεωρίζεσθε.
