revisions:
- from: ¿Y por qué no juzgan ustedes mismos lo que es justo?[a]
  to: ¿Y por qué ustedes mismos no juzgan lo que es correcto?[a]
  rationale: Se ajusta τὸ δίκαιον a una opción española que corresponde mejor a la decisión inglesa principal («what is right») sin perder las alternativas semánticas preservadas en la auditoría. También se corrige la nota al pie para que sea idiomática, no redundante y útil al lector. La reubicación de «ustedes mismos» mejora la naturalidad del español sin apartarse del sentido de ἀφ’ ἑαυτῶν.
