translation:
  language: es
  text: ¿Y por qué ustedes mismos no juzgan lo que es correcto?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que es justo» o «lo recto».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί δὲ καὶ
  english_pob_choice: And why
  chosen_spanish: ¿Y por qué
  alternatives_spanish:
  - ¿Pero por qué
  - ¿Y por qué también
  lexicon: BDAG
  rationale: La combinación introduce una pregunta retórica que continúa el reproche anterior. «¿Y por qué» conserva el enlace discursivo natural en español sin forzar una traducción palabra por palabra de las partículas.
- source_word: ἀφ’ ἑαυτῶν
  english_pob_choice: for yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - por ustedes mismos
  - de ustedes mismos
  - por su propia cuenta
  lexicon: BDAG
  rationale: La expresión apunta a actuar o discernir por iniciativa propia. En español, «ustedes mismos» expresa de manera natural la idea de juicio independiente; «por ustedes mismos» también es posible, pero suena más explícito que el griego y menos directo en esta pregunta.
- source_word: οὐ κρίνετε
  english_pob_choice: do you not judge
  chosen_spanish: no juzgan
  alternatives_spanish:
  - no deciden
  - no disciernen
  lexicon: BDAG
  rationale: κρίνω aquí significa evaluar o emitir juicio correcto. «Juzgan» conserva el valor léxico principal y la conexión verbal con la pregunta de Jesús; «disciernen» comunica la idea, pero desplaza el matiz judicial/evaluativo.
- source_word: τὸ δίκαιον
  english_pob_choice: what is right
  chosen_spanish: lo que es justo
  alternatives_spanish:
  - lo que es recto
  - la cosa justa
  - lo que es correcto
  lexicon: BDAG
  rationale: El neutro sustantivado pide una expresión sustantiva en español. «Lo que es justo» preserva el sentido de algo moralmente y evaluativamente correcto; mantiene abierta la posible cercanía con «lo justo» sin reducirlo a un tecnicismo legal.
theological_decisions:
- issue: Matiz de τὸ δίκαιον
  english_pob_reading: what is right
  chosen_spanish_reading: lo que es justo
  alternative_spanish_readings:
  - lo que es recto
  - lo que es correcto
  - la justicia
  rationale: El dicho exhorta al discernimiento moral práctico más que a una afirmación doctrinal abstracta. «Lo que es justo» conserva la amplitud ética de δίκαιον y evita estrecharlo indebidamente a una sola noción jurídica o a una formulación demasiado general como «correcto».
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without importing doctrinal claims.'
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada coinciden en una pregunta retórica que pide juicio independiente; no hubo revisiones aplicadas y la concordancia de revisión fue alta, así que el español sigue de cerca el sentido ya validado.
  spanish_consistency_notes:
  - Se mantuvo «juzgan» para conservar la fuerza judicial de κρίνω.
  - Se evitó «SEÑOR» u այլ lenguaje no pertinente; no hay léxico divino en este versículo.
  - «Lo que es justo» mantiene una formulación natural en español y respeta la ambigüedad ética de δίκαιον.
