review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura de la pregunta retórica y refleja adecuadamente Τί δὲ καὶ, ἀφ’ ἑαυτῶν y οὐ κρίνετε. Sin embargo, τὸ δίκαιον en el contexto y según la auditoría inglesa se orienta mejor a «lo que es correcto/recto» o «lo que es debido» que a «lo que es justo» como opción principal, porque «justo» en español puede estrecharse hacia justicia legal o distributiva. Además, la nota actual no preserva bien las alternativas inglesas, ya que repite la lectura principal y ofrece «la cosa justa», que suena poco natural.
  spanish_quality_summary: '«¿Y por qué no juzgan ustedes mismos...?» es gramatical y legible, pero en español más natural y claro sería «¿Y por qué ustedes mismos no juzgan...?» o «¿Y por qué no juzgan por ustedes mismos...?»; la primera mantiene mejor la concisión del griego. La principal mejora necesaria es léxica y de nota al pie: evitar una nota redundante y una alternativa poco idiomática.'
  glossary_alignment: 'No hay conflictos con la terminología del proyecto en nombres divinos o títulos. La decisión clave es δίκαιον: el inglés auditado privilegia «what is right», y en español conviene alinearlo con «lo que es correcto» o «lo recto» más que con «lo que es justo» como texto principal.'
  issues:
  - severity: medium
    issue: La traducción principal de τὸ δίκαιον como «lo que es justo» no refleja de la mejor manera la decisión auditada «what is right».
    rationale: En este contexto Jesús apela al discernimiento moral práctico. «Justo» en español puede oírse más jurídico o distributivo; «correcto» o «recto» comunica mejor el sentido amplio de «what is right».
  - severity: medium
    issue: La nota al pie es defectuosa y poco útil.
    rationale: Repite la lectura principal («lo que es justo») como alternativa y propone «la cosa justa», que no es una formulación natural ni digna en español bíblico contemporáneo. Debe conservar alternativas significativas como «lo que es justo» o «lo recto».},{
