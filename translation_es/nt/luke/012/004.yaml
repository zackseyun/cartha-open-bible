translation:
  language: es
  text: 'Pero yo les digo, mis amigos: no teman[a] a los que matan el cuerpo y después de eso no tienen nada más que puedan hacer.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no teman a los que matan el cuerpo y después de eso no pueden hacer nada más».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγω δὲ
  english_pob_choice: But I say
  chosen_spanish: Pero yo les digo
  alternatives_spanish:
  - Y yo les digo
  - Ahora yo les digo
  lexicon: BDAG
  rationale: δέ introduce un giro discursivo; «Pero» conserva ese matiz transicional de forma natural en español. Mantengo «yo» para reflejar el énfasis explícito del verbo y la primera persona.
- source_word: ὑμῖν τοῖς φίλοις μου
  english_pob_choice: to you, my friends
  chosen_spanish: les digo, mis amigos
  alternatives_spanish:
  - les digo a ustedes, mis amigos
  - les digo a ustedes que son mis amigos
  lexicon: BDAG
  rationale: La frase funciona como apelación directa y apposición afectuosa. En español, «mis amigos» expresa bien la relación; el clítico «les» mantiene el destinatario implícito sin forzar una construcción pesada.
- source_word: μὴ φοβηθῆτε
  english_pob_choice: do not fear
  chosen_spanish: no teman
  alternatives_spanish:
  - no tengan miedo
  - no estén asustados
  lexicon: BDAG
  rationale: La prohibición en español se expresa de manera natural con «no teman», que conserva el tono imperativo y la fuerza de la advertencia sin añadir matices no presentes en el griego.
- source_word: ἀπὸ τῶν ἀποκτεινόντων
  english_pob_choice: those who kill
  chosen_spanish: a los que matan
  alternatives_spanish:
  - de los que matan
  - a quienes matan
  lexicon: BDAG
  rationale: Aunque ἀπό rige la relación con el verbo de temor, en español la construcción normal es «temer a». «Los que matan» reproduce el participio presente de modo genérico y continuo.
- source_word: τὸ σῶμα
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cadáver
  - el organismo
  lexicon: BDAG
  rationale: «Cuerpo» es la equivalencia directa y adecuada para σῶμα en este contexto de muerte física.
- source_word: μετὰ ταῦτα
  english_pob_choice: and after that
  chosen_spanish: después de eso
  alternatives_spanish:
  - y después de eso
  - y luego
  lexicon: BDAG
  rationale: La secuencia temporal se expresa con claridad en español con «después de eso»; mantiene la referencia al acto previo de matar el cuerpo.
- source_word: μὴ ἐχόντων περισσότερόν τι ποιῆσαι
  english_pob_choice: have nothing more they can do
  chosen_spanish: no tienen nada más que puedan hacer
  alternatives_spanish:
  - no pueden hacer nada más
  - no les queda nada más que hacer
  lexicon: BDAG
  rationale: La frase participial indica limitación real posterior a la muerte corporal. «No tienen nada más que puedan hacer» conserva el sentido de incapacidad para ir más allá sin importar una especificación ausente del texto.
theological_decisions:
- issue: Límite del poder humano después de la muerte corporal
  english_pob_reading: The verse states only that human persecutors can kill the body and cannot do anything further beyond that.
  chosen_spanish_reading: El versículo afirma solo que los perseguidores humanos pueden matar el cuerpo y después de eso no pueden hacer nada más.
  alternative_spanish_readings:
  - El versículo afirma que no pueden tocar el alma.
  - El versículo implica que no pueden afectar más que el cuerpo.
  rationale: Se conserva la tensión interpretativa sin añadir la mención del alma, que pertenece al contexto inmediato siguiente y no está explícita aquí. La redacción española evita resolver teológicamente lo que el texto solo delimita.
  doctrine_reference: Preservar la tensión textual y no importar el contraste de Lucas 12:5 en Lucas 12:4.
translation_notes:
  revision_awareness: 'Alineado con el auditable English POB: se conserva la transición de δέ, la apelación afectuosa «my friends», la prohibición directa, y la limitación de los agresores sin importar explícitamente la cláusula teológica posterior sobre el alma.'
  spanish_consistency_notes:
  - Se usa «cuerpo» para σῶμα en sentido físico.
  - 'Se usa una fórmula de prohibición breve y natural: «no teman».'
  - Se mantiene el tono directo de Jesús y su apelación cercana «mis amigos».
  - La nota conserva una alternativa idiomática sin alterar el sentido base.
