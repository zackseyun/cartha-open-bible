review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite fielmente el sentido básico del griego: Jesús se dirige a sus discípulos como «mis amigos», les prohíbe temer a quienes matan el cuerpo, y afirma que después no pueden hacer nada más. También respeta la decisión teológica de no importar explícitamente la referencia al alma desde el versículo siguiente. Sin embargo, la puntuación y una leve mejora de fluidez pueden ajustarse mejor al ritmo del original y al español natural.'
  spanish_quality_summary: El español es claro, digno y comprensible. No obstante, «Pero yo les digo[a], mis amigos» suena algo menos natural por la colocación de la nota y la pausa; «Pero yo les digo a ustedes, mis amigos» o «Pero yo les digo, amigos míos» serían opciones más plenas, aunque no indispensables. La reparación principal es mover la nota para no interrumpir artificialmente la fórmula introductoria y mejorar la puntuación. También conviene mantener «y después de eso» para reflejar explícitamente el καὶ del original.
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, carne, justicia o gracia. «Cuerpo» para σῶμα y «no teman» para μὴ φοβηθῆτε están bien escogidos. La alternativa de nota también es adecuada.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «digo», pero la alternativa afecta a toda la cláusula de prohibición y su complemento.
    rationale: La variante documentada por el English POB contrasta la formulación completa «no teman ... no tienen nada más que puedan hacer» con «no teman ... no pueden hacer nada más». En español, el anclaje debería colocarse en la frase pertinente, no en «digo».
  - severity: low
    issue: Falta el «y» explícito antes de «después de eso».
    rationale: El griego tiene καὶ μετὰ ταῦτα. Aunque en español podría sobreentenderse, incluir «y» preserva mejor la secuencia del original sin sonar forzado.
  - severity: low
    issue: La puntuación introductoria puede pulirse.
    rationale: «Pero yo les digo, mis amigos:» fluye mejor en español que insertar la nota inmediatamente tras «digo». Mantiene la aposición afectuosa del original con mejor legibilidad.
  revised_spanish_text: 'Pero yo les digo, mis amigos: no teman[a] a los que matan el cuerpo y después de eso no tienen nada más que puedan hacer.'
  revised_footnotes:
  - marker: a
    text: 'O: «no teman a los que matan el cuerpo y después de eso no pueden hacer nada más».'
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor: reubica la nota al segmento que realmente presenta la alternativa léxica, conserva explícitamente la conjunción secuencial del original y mejora la puntuación para un español más natural sin cambiar el sentido. El contenido semántico y la decisión teológica del borrador quedan intactos.'
