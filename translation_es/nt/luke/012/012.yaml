review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja con fidelidad el sentido básico del griego: γὰρ como explicación, τὸ ἅγιον πνεῦμα como sujeto personal, διδάξει como promesa futura de enseñanza, y ἃ δεῖ εἰπεῖν como el contenido necesario de lo que han de decir. También preserva bien la nota alternativa sobre ἐν αὐτῇ τῇ ὥρᾳ. Sin embargo, ''en esa misma hora'' suena menos natural en español bíblico actual que ''en aquella misma hora'' o ''en ese mismo momento'', y ''deben decir'' atenúa ligeramente la fuerza de δεῖ frente a una forma más directa como ''tienen que decir'' o ''han de decir''.'
  spanish_quality_summary: 'La redacción es clara y comprensible, con buen registro eclesial moderno. La principal mejora necesaria es idiomática: ''en esa misma hora'' es entendible, pero no es la formulación más natural ni más digna en este contexto; ''en aquella misma hora'' fluye mejor y mantiene la referencia enfática. Además, ''lo que deben decir'' es aceptable, pero ''lo que tienen que decir'' comunica con más claridad la necesidad inmediata sin volverse coloquial en exceso.'
  glossary_alignment: 'El borrador sigue bien la terminología del proyecto: ''Espíritu Santo'' para τὸ ἅγιον πνεῦμα, sin conflictos con los glosarios principales. No hay términos problemáticos de Yahvé, Mesías, esclavo, etc. La capitalización y el tratamiento de ''Espíritu Santo'' son correctos.'
  issues:
  - severity: medium
    issue: Expresión temporal poco idiomática en español
    rationale: La frase 'en esa misma hora' calca de cerca el inglés y el griego, pero en español suena algo rígida y menos natural. 'En aquella misma hora' preserva el énfasis demostrativo y resulta más fluida en registro bíblico contemporáneo.
  - severity: low
    issue: Ligera atenuación de la fuerza de δεῖ
    rationale: '''Deben decir'' es posible, pero puede sonar más de obligación moral general. ''Tienen que decir'' o ''han de decir'' comunican mejor la necesidad concreta del contexto judicial/discursivo. No es un error grave, pero sí una mejora de precisión.'
  revised_spanish_text: porque el Espíritu Santo les enseñará en aquella misma hora[a] lo que tienen que decir.
  revised_footnotes:
  - marker: a
    text: O «a aquella hora» o «en aquella hora». La expresión griega enfatiza el momento preciso de necesidad.
    reason: lexical_alternative
