revisions:
- from: porque el Espíritu Santo les enseñará en esa misma hora lo que deben decir[a].
  to: porque el Espíritu Santo les enseñará en aquella misma hora[a] lo que tienen que decir.
  rationale: Se ajusta la expresión temporal a un español más natural y digno, conservando el énfasis de ἐν αὐτῇ τῇ ὥρᾳ, y se refuerza ligeramente la necesidad expresada por δεῖ con 'tienen que decir'. La nota se actualiza para coincidir exactamente con la redacción revisada.
