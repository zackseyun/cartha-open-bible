translation:
  language: es
  text: porque el Espíritu Santo les enseñará en aquella misma hora[a] lo que tienen que decir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a aquella hora» o «en aquella hora». La expresión griega enfatiza el momento preciso de necesidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: BDAG
  rationale: Conserva el valor explicativo/consecutivo del enlace griego con la afirmación anterior, en un español natural y digno.
- source_word: τὸ ἅγιον πνεῦμα
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Santo Espíritu
  lexicon: BDAG
  rationale: El sintagma articular se refiere al agente divino personal; en español contemporáneo eclesial, 'Espíritu Santo' es la forma clara y fiel, y mantiene la referencia personal sin borrar el título.
- source_word: διδάξει
  english_pob_choice: will teach
  chosen_spanish: les enseñará
  alternatives_spanish:
  - les instruirá
  lexicon: BDAG
  rationale: El futuro de διδάσκω se vierte naturalmente como 'enseñará'; el dativo/objeto plural del contexto se expresa con 'les' para hacer explícita la referencia a los discípulos.
- source_word: ἐν αὐτῇ τῇ ὥρᾳ
  english_pob_choice: in that very hour
  chosen_spanish: en esa misma hora
  alternatives_spanish:
  - en esa hora
  - a esa hora
  lexicon: BDAG
  rationale: '''Esa misma'' refleja el intensificador de αὐτῇ con τῇ ὥρᾳ y conserva la idea de inmediatez puntual que el inglés POB captó con ''that very hour''.'
- source_word: ἃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  lexicon: BDAG
  rationale: El relativo neutro plural se traduce idiomáticamente como 'lo que' en español, evitando la rigidez de 'las cosas que' y manteniendo el contenido indeterminado.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: deben
  alternatives_spanish:
  - tienen que
  - es necesario que
  lexicon: BDAG
  rationale: En este contexto de necesidad imperativa para hablar, 'deben' expresa obligación de modo natural en español; conserva la fuerza de necesidad sin sonar excesivamente literal.
- source_word: εἰπεῖν
  english_pob_choice: say
  chosen_spanish: decir
  alternatives_spanish:
  - hablar
  lexicon: BDAG
  rationale: El infinitivo aoristo de λέγω aquí apunta al contenido verbal que ha de pronunciarse; 'decir' es la equivalencia más directa y precisa en español.
theological_decisions:
- issue: Referencia y acción del Espíritu Santo
  english_pob_reading: A personal divine agent who will actively teach the disciples what to say
  chosen_spanish_reading: El Espíritu Santo aparece como agente personal que enseñará activamente a los discípulos qué decir.
  alternative_spanish_readings:
  - Una influencia divina más impersonal
  - Una inspiración general sin agencia personal explícita
  rationale: El sujeto del futuro activo 'enseñará' favorece una lectura personal y agente, sin añadir formulaciones doctrinales ajenas al versículo. 'Espíritu Santo' en español mantiene esa agencia y claridad.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se detectaron cambios necesarios y la concordancia con el análisis previo es alta.'
  spanish_consistency_notes:
  - Se mantuvo 'Espíritu Santo' como terminología estándar y fiel al referente personal del griego.
  - '''Esa misma hora'' conserva el énfasis puntual del griego y del audit trail en inglés.'
  - El tono es formal y claro, apto para lectura pública eclesial, sin calcos innecesarios.
