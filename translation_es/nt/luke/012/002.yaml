translation:
  language: es
  text: Pero no hay nada cubierto[a][c] que no sea revelado, ni oculto[b] que no sea conocido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'encubierto' para 'cubierto'; el griego conserva la imagen de algo puesto bajo cobertura y luego revelado.
    reason: lexical_alternative
  - marker: b
    text: O 'secreto' para 'oculto'.
    reason: lexical_alternative
  - marker: c
    text: El dicho puede referirse en sentido amplio a una divulgación eventual, ya sea en el presente o en el juicio final.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - nada alguna
  - ninguna cosa
  lexicon: BDAG
  rationale: El pronombre negativo neutro pide un equivalente absoluto y natural en español. 'Nada' conserva el alcance total de οὐδὲν sin añadir matices innecesarios.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una transición con matiz contrastivo. 'Pero' reproduce mejor ese giro dentro del contexto de advertencia que un simple 'y'.
- source_word: συγκεκαλυμμένον
  english_pob_choice: covered up
  chosen_spanish: cubierto
  alternatives_spanish:
  - encubierto
  - oculto
  - velado
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe algo en estado de estar cubierto/oculto. 'Cubierto' mantiene la imagen de algo puesto bajo cobertura y funciona con naturalidad en español; la nota recoge la alternativa 'encubierto' como matiz posible.
- source_word: ἀποκαλυφθήσεται
  english_pob_choice: will not be revealed
  chosen_spanish: será revelado
  alternatives_spanish:
  - será descubierto
  - será puesto al descubierto
  - será dado a conocer
  lexicon: BDAG
  rationale: El futuro pasivo de ἀποκαλύπτω se traduce de forma directa con 'será revelado', que conserva el contraste verbal con 'cubierto' y evita sobreespecificar el modo de la revelación.
- source_word: κρυπτὸν
  english_pob_choice: hidden
  chosen_spanish: escondido
  alternatives_spanish:
  - oculto
  - secreto
  lexicon: BDAG
  rationale: '''Escondido'' es el equivalente más natural para el adjetivo κρυπτός en este paralelismo; mantiene la idea de algo no visible sin convertirlo en sustantivo como ''secreto''.'
- source_word: γνωσθήσεται
  english_pob_choice: will not be known
  chosen_spanish: será conocido
  alternatives_spanish:
  - llegará a conocerse
  - será dado a conocer
  lexicon: BDAG
  rationale: El futuro pasivo de γινώσκω apunta a un llegar a ser conocido. 'Será conocido' es fiel y breve en español, y preserva el paralelismo con 'será revelado'.
- source_word: ὃ οὐκ / ὃ οὐ
  english_pob_choice: that will not
  chosen_spanish: que no
  alternatives_spanish:
  - el cual no
  - lo que no
  lexicon: BDAG
  rationale: La cláusula relativa se naturaliza en español con 'que no', manteniendo la estructura paralela de las dos frases relativas sin forzar un calco.
theological_decisions:
- issue: Alcance de la revelación futura
  english_pob_reading: A general principle that what is presently concealed will eventually be disclosed/known.
  chosen_spanish_reading: 'Un principio general: lo que ahora está oculto o cubierto terminará por ser revelado y conocido.'
  alternative_spanish_readings:
  - Una referencia específica al juicio final y la revelación escatológica
  - Una denuncia limitada a la exposición inmediata de la hipocresía
  rationale: Los futuros pasivos griegos permiten una declaración general sobre la divulgación eventual sin fijar el momento exacto. La redacción española conserva esa amplitud y no reduce el dicho a una sola aplicación.
  doctrine_reference: Preservar la tensión teológica sin resolverla en una sola interpretación.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta versión sigue la lectura aprobada del texto griego y del audit trail en inglés, manteniendo la tensión entre revelación presente y futura sin estrechar el alcance.
  spanish_consistency_notes:
  - Se mantiene 'revelado' y 'conocido' como par verbal paralelo para reflejar ἀποκαλυφθήσεται / γνωσθήσεται.
  - Se usó 'cubierto' y 'escondido' para conservar dos imágenes distintas de ocultamiento.
  - Se prefirió 'Pero' para reflejar el valor contrastivo de δέ en contexto de advertencia.
