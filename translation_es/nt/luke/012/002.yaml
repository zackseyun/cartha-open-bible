  rationale: La revisión mantiene el significado del griego y del POB inglés, pero mejora la naturalidad y dignidad del español. 'No hay nada ... que no sea ...' expresa de forma idiomática el sentido general/futuro del original sin endurecer un calco extraño. También se simplifica el paralelismo y se sustituye 'escondido' por 'oculto' para mejor registro.
