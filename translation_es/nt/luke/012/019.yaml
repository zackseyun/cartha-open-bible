translation:
  language: es
  text: 'Y diré a mi alma[a]: «Alma, tienes muchos bienes guardados para muchos años. Descansa, come, bebe, alégrate[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser interior» o «vida» para ψυχή, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «date buena vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρῶ
  english_pob_choice: I will say
  chosen_spanish: diré
  alternatives_spanish:
  - diré yo
  - voy a decir
  lexicon: BDAG
  rationale: El futuro de λέγω se expresa de forma natural y directa con «diré»; conserva la simpleza del anuncio en primera persona futura sin añadir matices ajenos.
- source_word: ψυχῇ / Ψυχή
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - self
  - vida
  lexicon: BDAG
  rationale: En el auto-referirse del personaje, «alma» conserva la fuerza retórica de ψυχή y es comprensible en español eclesial. «Vida» suena menos apto para el diálogo directo, y «self» no pertenece al registro natural del español.
- source_word: ἀγαθὰ
  english_pob_choice: good things
  chosen_spanish: bienes
  alternatives_spanish:
  - cosas buenas
  - posesiones
  lexicon: BDAG
  rationale: En contexto económico, ἀγαθά se refiere a bienes materiales acumulados. «Bienes» preserva esa amplitud con una palabra natural y suficientemente precisa en español.
- source_word: κείμενα
  english_pob_choice: laid up
  chosen_spanish: guardados
  alternatives_spanish:
  - almacenados
  - puestos aparte
  lexicon: BDAG
  rationale: El participio expresa cosas puestas en depósito o reserva. «Guardados» comunica de manera idiomática la idea de reserva acumulada sin perder el matiz de almacenamiento.
- source_word: εἰς ἔτη πολλά
  english_pob_choice: for many years
  chosen_spanish: para muchos años
  alternatives_spanish:
  - por muchos años
  - durante muchos años
  lexicon: BDAG
  rationale: La preposición con duración futura se traduce de modo natural con «para muchos años», manteniendo la referencia temporal amplia y futura.
- source_word: ἀναπαύου
  english_pob_choice: Rest
  chosen_spanish: Descansa
  alternatives_spanish:
  - Toma tu descanso
  - Reposa
  lexicon: BDAG
  rationale: El imperativo medio expresa reposo o tranquilidad. «Descansa» es claro, digno y suficientemente directo en español.
- source_word: φάγε
  english_pob_choice: eat
  chosen_spanish: come
  alternatives_spanish:
  - aliméntate
  - ingiere
  lexicon: BDAG
  rationale: Es un imperativo simple de comer; «come» es la equivalencia más directa y natural.
- source_word: πίε
  english_pob_choice: drink
  chosen_spanish: bebe
  alternatives_spanish:
  - toma
  - ingiere
  lexicon: BDAG
  rationale: Es el paralelo directo de «come» y traduce con precisión el mandato simple de beber.
- source_word: εὐφραίνου
  english_pob_choice: be merry
  chosen_spanish: alégrate
  alternatives_spanish:
  - regocíjate
  - pásalo bien
  lexicon: BDAG
  rationale: El verbo expresa alegría festiva o gozo desenfrenado. «Alégrate» conserva la idea de gozo, aunque en español puede sonar algo más sobrio que el inglés «be merry»; se evita un giro demasiado coloquial o moralmente interpretativo.
theological_decisions:
- issue: Sentido de ψυχή en un discurso de auto-dirección
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - ser interior
  rationale: La escena es una personificación del yo interior, no una afirmación técnica sobre antropología. «Alma» preserva la resonancia literaria y teológica del término griego sin convertirlo en un simple 'yo' explicativo.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «celebrate» por «be merry» para reflejar con más precisión εὐφραίνου y mantener un registro más formal y natural. En español se siguió esa última decisión con «alégrate», evitando una formulación más festiva o coloquial que pudiera exceder el tono del griego en este contexto.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelo verbal breve del original: «Descansa, come, bebe, alégrate».'
  - Se evitó «SEÑOR» u otra sustitución teológica irrelevante, ya que el versículo no contiene el nombre divino.
  - «Alma» se usó de forma consistente con la decisión lexical documentada para ψυχή.
  - La puntuación con comillas angulares y dos puntos reproduce de forma natural el discurso directo en español.
  - Se preservó la tensión entre alegría y auto-indulgencia en εὐφραίνου sin moralizar el término.
