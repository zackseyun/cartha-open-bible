translation:
  language: es
  text: 'Y dijo: «Esto es lo que haré: derribaré mis graneros[a] y construiré otros más grandes, y allí reuniré todo mi grano[b] y mis bienes[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «almacenes» o «depósitos» para «graneros» (ἀποθήκας).
    reason: lexical_alternative
  - marker: b
    text: «Grano» (σῖτος) también puede significar más específicamente «trigo» en algunos contextos.
    reason: lexical_alternative
  - marker: c
    text: O «mis posesiones» para «mis bienes» (τὰ ἀγαθά μου).
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτο ποιήσω
  english_pob_choice: This is what I will do
  chosen_spanish: Esto es lo que haré
  alternatives_spanish:
  - Haré esto
  - Esto haré
  lexicon: BDAG
  rationale: Conserva el valor enfático de la expresión introductoria y su orientación al futuro, con una formulación natural en español.
- source_word: καθελῶ
  english_pob_choice: I will tear down
  chosen_spanish: derribaré
  alternatives_spanish:
  - demoleré
  - tumbaré
  lexicon: BDAG
  rationale: Expresa de manera idiomática y concreta la acción de desmontar o echar abajo una construcción, sin suavizarla demasiado.
- source_word: ἀποθήκας
  english_pob_choice: barns
  chosen_spanish: graneros
  alternatives_spanish:
  - almacenes
  - depósitos
  lexicon: BDAG
  rationale: En este contexto agrario, «graneros» comunica bien la función de guardar cosechas. «Almacenes» o «depósitos» son posibles, pero menos naturales aquí.
- source_word: μείζονας οἰκοδομήσω
  english_pob_choice: build larger ones
  chosen_spanish: construiré otros más grandes
  alternatives_spanish:
  - edificaré unos mayores
  - levantaré otros más grandes
  lexicon: BDAG
  rationale: El griego supone el sustantivo implícito; en español conviene explicitar «otros» para que la referencia quede clara y fluida, manteniendo el comparativo.
- source_word: συνάξω
  english_pob_choice: I will gather
  chosen_spanish: juntaré
  alternatives_spanish:
  - reuniré
  - acumularé
  lexicon: BDAG
  rationale: «Juntaré» conserva la idea básica de reunir o recoger en un lugar, con un español natural. «Acumularé» sería más interpretativo.
- source_word: τὸν σῖτον
  english_pob_choice: my grain
  chosen_spanish: mi grano
  alternatives_spanish:
  - mi cereal
  - mi trigo
  lexicon: BDAG
  rationale: «Grano» es un equivalente amplio y fiel; evita restringir innecesariamente el término a «trigo», aunque ese matiz sea posible en algunos contextos.
- source_word: τὰ ἀγαθά μου
  english_pob_choice: my goods
  chosen_spanish: mis bienes
  alternatives_spanish:
  - mis posesiones
  - mis cosas
  lexicon: BDAG
  rationale: «Bienes» reproduce el campo semántico amplio de posesiones materiales sin reducirlo a dinero ni a un uso excesivamente moderno.
translation_notes:
  revision_awareness: La revisión auditada muestra alto acuerdo y sin cambios necesarios; esta redacción sigue de cerca el texto griego y preserva las alternativas léxicas documentadas en el registro inglés.
  spanish_consistency_notes:
  - Se mantiene el tono narrativo directo y sobrio de la POB.
  - Se evita «SEÑOR» u otras terminologías no pertinentes; no hay términos teológicos adicionales en este versículo.
  - «Graneros» y «bienes» reflejan el contexto material/agrario con claridad para lectores de español latinoamericano.
