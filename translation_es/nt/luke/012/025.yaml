translation:
  language: es
  text: ¿Y quién de ustedes, por preocuparse, puede añadir un codo a su vida?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «añadir un codo a su estatura». La palabra griega puede referirse tanto a la estatura como a la edad o al lapso de vida.
    reason: alternative_reading
lexical_decisions:
- source_word: τίς δὲ ἐξ ὑμῶν
  english_pob_choice: And which of you
  chosen_spanish: ¿Y quién de ustedes...
  alternatives_spanish:
  - ¿Y cuál de ustedes...?
  - ¿Y quién entre ustedes...?
  lexicon: BDAG
  rationale: τίς introduce una pregunta retórica; ἐξ ὑμῶν expresa procedencia dentro del grupo. En español, «quién de ustedes» conserva bien el tono directo y retórico, y «y» reproduce el enlace discursivo suave de δέ.
- source_word: μεριμνῶν
  english_pob_choice: by worrying
  chosen_spanish: por preocuparse
  alternatives_spanish:
  - por estar ansioso
  - por andar preocupado
  lexicon: BDAG
  rationale: El participio presente expresa la circunstancia o medio de la acción. «Por preocuparse» comunica la idea de ansiedad/preocupación en español natural sin intensificar innecesariamente el matiz psicológico.
- source_word: δύναται
  english_pob_choice: can
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  - logra
  lexicon: BDAG
  rationale: El verbo expresa capacidad. «Puede» es la equivalencia más natural y fiel en español para una pregunta retórica de posibilidad.
- source_word: ἐπὶ τὴν ἡλικίαν αὐτοῦ
  english_pob_choice: to his lifespan
  chosen_spanish: a su estatura
  alternatives_spanish:
  - a su edad
  - a su vida
  - a su duración de vida
  lexicon: BDAG
  rationale: ἡλικία admite tanto «estatura» como «edad / duración de vida». En español, «estatura» permite conservar la imagen concreta del «codo» y evita forzar una interpretación que el griego deja abierta; además, el auditorio puede entender la pregunta como imposible en sentido literal. La alternativa de «vida/lifespan» permanece reflejada en la nota.
- source_word: προσθεῖναι
  english_pob_choice: to add
  chosen_spanish: añadir
  alternatives_spanish:
  - agregar
  - sumar
  lexicon: BDAG
  rationale: El infinitivo significa literalmente «añadir». «Añadir» es claro, idiomático y preserva la metáfora de incremento.
- source_word: πῆχυν
  english_pob_choice: a cubit
  chosen_spanish: un codo
  alternatives_spanish:
  - un codo de medida
  - unos 45 centímetros
  lexicon: BDAG
  rationale: πῆχυς es una medida antigua equivalente a un codo. «Un codo» conserva la concreción histórica y la imagen corporal/medida del dicho.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de uno
  lexicon: BDAG
  rationale: El posesivo griego es masculino singular; en español, «su» conserva la referencia sin sobrecargar el texto con un posesivo explícitamente masculino donde el contexto ya lo hace claro.
theological_decisions:
- issue: Sentido de ἡλικία en la pregunta
  english_pob_reading: lifespan
  chosen_spanish_reading: estatura
  alternative_spanish_readings:
  - edad
  - duración de vida
  rationale: La tradición interpretativa oscila entre estatura y duración de vida. Dado que el contexto inmediato habla de la inutilidad de la preocupación y la imagen del «codo» funciona de modo muy concreto, se optó por «estatura» en el texto principal; la posibilidad de «vida/duración de vida» se preserva como alternativa legítima para no borrar la tensión lexical del griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 4
- issue: Valor retórico de la pregunta
  english_pob_reading: rhetorical question about anxiety and futility
  chosen_spanish_reading: pregunta retórica sobre la inutilidad de la preocupación
  alternative_spanish_readings:
  - pregunta sobre ansiedad
  - pregunta sobre preocupación
  rationale: La frase no solicita información sino que subraya la incapacidad humana. El español mantiene el tono interrogativo para conservar la fuerza retórica del dicho de Jesús.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 2
translation_notes:
  revision_awareness: El audit trail inglés mantuvo como lectura principal «lifespan» y conservó en nota la alternativa «stature». En esta versión española, por exigencias de naturalidad idiomática y por la fuerza de la imagen del «codo», la lectura principal se volcó como «estatura», sin borrar la alternativa de sentido que el griego y el POB inglés documentan. También se reflejó la revisión estilística inglesa («can» en lugar de «is able to») con «puede».
  spanish_consistency_notes:
  - Se preservó el tratamiento retórico de la pregunta, con puntuación interrogativa completa en español.
  - Se evitó la máscara reverencial de «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se mantuvo un registro bíblico contemporáneo y claro, evitando arcaísmos innecesarios.
  - Se conservó la medida antigua «codo» para no deshistorizar la imagen.
  - La nota al pie explicita la ambigüedad de ἡλικία para que no se pierda la tensión lexical documentada por el POB inglés.
