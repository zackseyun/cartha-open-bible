translation:
  language: es
  text: 'Y cuando sopla el viento del sur[a], ustedes dicen: «Habrá calor abrasador[b]», y sucede.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sur»; es decir, el viento del sur.
    reason: lexical_alternative
  - marker: b
    text: O «calor» o «calor ardiente».
    reason: lexical_alternative
lexical_decisions:
- source_word: νότον
  english_pob_choice: the south wind
  chosen_spanish: el viento del sur
  alternatives_spanish:
  - el sur
  - un viento del sur
  lexicon: BDAG
  rationale: En contexto meteorológico, νότον con πνέοντα indica el viento que viene del sur. «El viento del sur» expresa naturalmente el sentido meteorológico y evita el calco de «el sur», que en español sonaría incompleto.
- source_word: πνέοντα
  english_pob_choice: blowing
  chosen_spanish: sopla
  alternatives_spanish:
  - está soplando
  - soplando
  lexicon: BDAG
  rationale: El participio presente describe la acción del viento. «Sopla» conserva la observación general y resulta más natural en español que una perífrasis demasiado pesada.
- source_word: λέγετε
  english_pob_choice: you say
  chosen_spanish: dicen
  alternatives_spanish:
  - ustedes dicen
  - suelen decir
  - dicen ustedes
  lexicon: BDAG
  rationale: El plural genérico dirigido a los oyentes se vuelve naturalmente impersonal en español con «dicen». Mantiene el valor habitual/cotidiano de la afirmación sin añadir contenido no explícito.
- source_word: Καύσων
  english_pob_choice: scorching heat
  chosen_spanish: calor abrasador
  alternatives_spanish:
  - calor
  - calor intenso
  - ardor
  lexicon: BDAG
  rationale: Καύσων denota calor opresivo o abrasador. «Calor abrasador» conserva la intensidad mejor que «calor» y evita una expresión moderna ajena al registro del texto.
- source_word: ἔσται
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - será
  - va a haber
  lexicon: BDAG
  rationale: 'Con un fenómeno atmosférico previsto, el español idiomático exige una construcción existencial: «habrá calor abrasador».'
- source_word: γίνεται
  english_pob_choice: it happens
  chosen_spanish: sucede
  alternatives_spanish:
  - ocurre
  - se cumple
  - pasa
  lexicon: BDAG
  rationale: El verbo marca el cumplimiento de la previsión. «Sucede» mantiene la brevedad y la naturalidad del español, a la vez que conserva la idea de que lo dicho ocurre efectivamente.
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del audit trail inglés: no introduce ningún verbo de ‘ver’; refleja directamente el participio presente griego con una forma verbal natural en español, y mantiene la predicción meteorológica con un equivalente existencial.'
  spanish_consistency_notes:
  - 'Se conserva el orden semántico básico del griego: condición meteorológica, dicho habitual, contenido predictivo y cumplimiento.'
  - No se usa «SEÑOR» ni terminología eclesiástica ajena al versículo; el campo semántico es puramente meteorológico.
  - 'Los dos matices léxicos del inglés auditado se preservan en notas: νότον y Καύσων.'
