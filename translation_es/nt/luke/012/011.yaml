review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: comparecencia ante instancias religiosas y civiles, prohibición de preocuparse, y distinción entre cómo/qué decir en defensa y qué decir. Sin embargo, hay dos ajustes de fidelidad y naturalidad: (1) ὅταν se expresa mejor con «cuando» o «si alguna vez», pero con el matiz indefinido puede mantenerse; el problema principal no está allí. (2) «por cómo o qué» suena poco natural en español; además, «habrán de decir» introduce un matiz de futurición/deber no explícito y resulta más pesado que «van a decir» o simplemente «decir». También conviene restaurar la conjunción repetida antes de «las autoridades» para reflejar la serie coordinada griega.'
  spanish_quality_summary: 'El texto es legible, pero tiene leves asperezas idiomáticas: «por cómo o qué» no es español fluido en registro bíblico natural, y «habrán de decir» suena más rígido de lo necesario. «Ante las sinagogas, los gobernantes y las autoridades» funciona, pero con la repetición de «y» queda más fiel y natural al paralelismo del original. Una revisión menor produce un español más claro y digno sin apartarse del sentido fuente.'
  glossary_alignment: No hay conflicto con los términos doctrinales del proyecto. «Sinagogas», «gobernantes» y «autoridades» son aceptables en contexto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La nota sobre ἀπολογήσησθε está bien orientada; solo requiere ajuste del anclaje textual al mejorar la redacción principal.
  issues:
  - severity: medium
    issue: «por cómo o qué» es poco natural en español
    rationale: Aunque intenta reflejar πῶς ἢ τί, la combinación con «preocuparse por» produce una secuencia torpe. «Cómo o qué van a decir en su defensa» o «acerca de cómo o qué decir en su defensa» comunica mejor el par interrogativo sin perder precisión.
  - severity: medium
    issue: «habrán de decir» añade rigidez innecesaria
    rationale: El griego no exige ese matiz perifrástico de obligación/futuro. En español contemporáneo y digno, «van a decir» o la estructura infinitiva con «qué decir» suenan más naturales y fieles al tono exhortativo.
  - severity: low
    issue: Falta la repetición de «y» antes de «las autoridades»
    rationale: El original coordina tres elementos con καὶ ... καὶ. En español no es obligatorio replicarlo siempre, pero aquí ayuda a conservar el ritmo y la enumeración judicial del texto fuente.
  revised_spanish_text: Pero cuando los lleven ante las sinagogas y los gobernantes y las autoridades, no se preocupen[a] por cómo o qué van a decir en su defensa, o qué van a decir[b];
