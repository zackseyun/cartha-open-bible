translation:
  language: es
  text: Pero cuando los lleven ante las sinagogas y los gobernantes y las autoridades, no se preocupen[a] por cómo o qué van a decir en su defensa, o qué van a decir[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «cómo van a presentar su defensa».
    reason: lexical_alternative
  - marker: b
    text: La frase «las sinagogas y los gobernantes y las autoridades» se refiere a instancias religiosas y civiles ante las cuales los discípulos podrían ser examinados.
    reason: cultural_note
lexical_decisions:
- source_word: ὅταν δὲ
  english_pob_choice: But whenever
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Cuando
  lexicon: BDAG
  rationale: ὅταν introduce una contingencia futura indefinida; en español, «cuando» comunica bien ese valor. Se conserva el matiz continuativo/adversativo de δέ con «Pero», sin exagerar el contraste.
- source_word: εἰσφέρωσιν
  english_pob_choice: they bring
  chosen_spanish: los lleven
  alternatives_spanish:
  - los traigan
  - los conduzcan
  lexicon: BDAG
  rationale: En este contexto judicial, el verbo indica llevar a alguien ante una instancia. «Los lleven» es natural en español y mantiene la idea de traslado hacia un foro de juicio o examen.
- source_word: ἐπὶ τὰς συναγωγὰς καὶ τὰς ἀρχὰς καὶ τὰς ἐξουσίας
  english_pob_choice: before the synagogues and the rulers and the authorities
  chosen_spanish: ante las sinagogas, los gobernantes y las autoridades
  alternatives_spanish:
  - ante las sinagogas y los gobernantes y las autoridades
  - delante de las sinagogas, los gobernantes y las autoridades
  lexicon: BDAG
  rationale: ἐπί con acusativo expresa aquí comparecencia ante instancias de juicio o gobierno; «ante» comunica mejor ese marco que un simple «a». Se mantiene el orden del texto y se traduce con términos claros y naturales.
- source_word: συναγωγάς
  english_pob_choice: synagogues
  chosen_spanish: sinagogas
  alternatives_spanish:
  - tribunales de la sinagoga
  - asambleas
  lexicon: BDAG
  rationale: El sustantivo significa literalmente «sinagogas». Aunque puede haber un sentido metonímico de tribunal sinagogal, el texto conserva el valor léxico básico; el contexto ya sugiere la función judicial.
- source_word: ἀρχάς
  english_pob_choice: rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los magistrados
  - los jefes
  lexicon: BDAG
  rationale: En un entorno legal o administrativo, ἀρχαί se refiere a autoridades gobernantes. «Gobernantes» es amplio, comprensible y fiel al contexto.
- source_word: ἐξουσίας
  english_pob_choice: authorities
  chosen_spanish: las autoridades
  alternatives_spanish:
  - los poderes
  - las autoridades oficiales
  lexicon: BDAG
  rationale: ἐξουσίαι denota autoridades investidas de poder. «Las autoridades» es la forma más natural en español moderno para este ámbito.
- source_word: μὴ μεριμνήσητε
  english_pob_choice: do not worry
  chosen_spanish: no se preocupen
  alternatives_spanish:
  - no estén ansiosos
  - no se preocupen de antemano
  lexicon: BDAG
  rationale: El mandato negativo apunta a la preocupación ansiosa. «No se preocupen» es idiomático y conserva la fuerza exhortativa sin sonar técnico o arcaico.
- source_word: πῶς ἢ τί
  english_pob_choice: how or what
  chosen_spanish: por cómo o qué
  alternatives_spanish:
  - sobre cómo o qué
  - cómo o qué
  lexicon: BDAG
  rationale: La pareja interrogativa cubre modo y contenido. «Por cómo o qué» expresa de manera natural la preocupación acerca del modo y del contenido de la respuesta.
- source_word: ἀπολογήσησθε
  english_pob_choice: say in your defense
  chosen_spanish: decir en su defensa
  alternatives_spanish:
  - presentar su defensa
  - responder en su defensa
  lexicon: BDAG
  rationale: El verbo tiene sentido forense de defenderse o presentar una defensa. En español, «decir en su defensa» mantiene el valor de discurso defensivo sin perder naturalidad; se evita un término demasiado técnico donde el contexto ya comunica la idea legal.
- source_word: ἢ τί εἴπητε
  english_pob_choice: or what you should say
  chosen_spanish: o qué habrán de decir
  alternatives_spanish:
  - o qué dirán
  - o qué deben decir
  lexicon: BDAG
  rationale: La segunda cláusula distingue el contenido del hablar respecto de la defensa formal. «Habrán de decir» mantiene el carácter futuro/expectativo del texto y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Marco judicial y religioso de «sinagogas, gobernantes y autoridades»
  english_pob_reading: The phrase refers to religious and civil bodies before whom disciples might be examined.
  chosen_spanish_reading: La frase alude a instancias religiosas y civiles ante las cuales los discípulos podrían ser examinados.
  alternative_spanish_readings:
  - La frase se refiere a tribunales de sinagoga y autoridades civiles.
  - La frase designa cuerpos religiosos y gubernativos ante los que podrían comparecer los discípulos.
  rationale: La lectura contextual no es meramente espacial; describe una comparecencia ante foros de examen. El español mantiene esa carga sin forzar una explicación interpretativa demasiado extensa en el texto principal.
  doctrine_reference: Lucas 12:11; cf. Mt 10:17-20
- issue: ἀπολογήσησθε como defensa verbal, no solo autodefensa general
  english_pob_reading: Or, more formally, 'how you should make your defense.'
  chosen_spanish_reading: O, más formalmente, «cómo habrán de hacer su defensa».
  alternative_spanish_readings:
  - O, más formalmente, «cómo deben presentar su defensa».
  - O, más formalmente, «cómo habrán de defenderse».
  rationale: Se conserva la tensión entre una defensa verbal formal y la expresión más idiomática del texto principal. La nota permite al lector ver la opción más literal sin sustituir la claridad del cuerpo del texto.
  doctrine_reference: Lucas 12:11; BDAG ἀπολογέομαι
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del contexto inglés, que ajustó ἀπολογήσησθε para reflejar con mayor precisión una «defensa» formal. En español se refleja esa precisión en la frase principal «decir en su defensa», mientras que la nota[a] conserva la alternativa más formal.
  spanish_consistency_notes:
  - Se mantiene «sinagogas» en sentido literal, sin sustituirlo por una paráfrasis de tribunales, para no borrar la referencia léxica del texto.
  - Se usa «ante» para ἐπί con acusativo en contexto judicial, evitando un simple desplazamiento espacial.
  - Se traduce μεριμνάω con «preocuparse» por su valor idiomático en español, equivalente al inglés POB «do not worry».
  - Se preserva la distinción entre la defensa formal (ἀπολογήσησθε) y lo que habrán de decir (τί εἴπητε).
