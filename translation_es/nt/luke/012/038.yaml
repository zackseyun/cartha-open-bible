translation:
  language: es
  text: Aun si viene en la segunda vigilia[a], o aun en la tercera, y los encuentra así, bienaventurados son esos siervos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «en la segunda vigilia de la noche, o en la tercera vigilia de la noche».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «bienaventurados son aquellos». El referente es los siervos mencionados en el contexto inmediato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἂν ... κἂν
  english_pob_choice: Even if ... or even
  chosen_spanish: Aun si ... o aun
  alternatives_spanish:
  - Incluso si ... o incluso
  - Aunque ... o aunque
  lexicon: BDAG
  rationale: κἄν introduce una condición concesiva e indefinida; en español, «aun si ... o aun» conserva la fuerza enfática de la repetición sin sonar artificial.
- source_word: δευτέρᾳ ... τρίτῃ φυλακῇ
  english_pob_choice: the second watch ... the third
  chosen_spanish: la segunda vigilia ... la tercera
  alternatives_spanish:
  - la segunda vigilia de la noche ... la tercera vigilia de la noche
  - el segundo turno ... el tercer turno
  lexicon: BDAG
  rationale: φυλακή aquí se refiere a una vigilia de la noche, no a cárcel ni guardia. «Vigilia» mantiene el sentido temporal y el tono bíblico; en el texto principal se omite «de la noche» por economía, pero se conserva como alternativa explícita.
- source_word: ἔλθῃ
  english_pob_choice: he comes
  chosen_spanish: viene
  alternatives_spanish:
  - llegue
  - viniera
  lexicon: BDAG
  rationale: El aoristo subjuntivo en esta construcción condicional se expresa naturalmente en español con presente («viene») para una condición futura e indefinida.
- source_word: εὕρῃ οὕτως
  english_pob_choice: finds them so
  chosen_spanish: los encuentra así
  alternatives_spanish:
  - lo encuentra así
  - los halla así
  lexicon: BDAG
  rationale: οὕτως remite al estado de preparación del contexto inmediato. En español, el objeto implícito se entiende mejor como «los» (los siervos), sin forzar una paraphrasis más amplia.
- source_word: μακάριοί
  english_pob_choice: blessed
  chosen_spanish: dichosos
  alternatives_spanish:
  - bienaventurados
  - benditos
  lexicon: BDAG
  rationale: μακάριος expresa un estado favorable delante de Dios. «Dichosos» es natural en español y conserva la idea de favor/ventaja sin introducir un registro demasiado eclesiástico; «bienaventurados» queda como alternativa más tradicional.
- source_word: ἐκεῖνοι
  english_pob_choice: those servants
  chosen_spanish: aquellos
  alternatives_spanish:
  - aquellos siervos
  - éstos
  lexicon: BDAG
  rationale: El pronombre demostrativo significa literalmente «aquellos». Dado que el referente está claro por el contexto inmediato, se deja explícito de modo conciso en español sin añadir un sustantivo que el griego de este versículo no repite.
theological_decisions:
- issue: Cualidad de μακάριοι
  english_pob_reading: blessed are those servants
  chosen_spanish_reading: dichosos son aquellos
  alternative_spanish_readings:
  - bienaventurados son aquellos
  - benditos son aquellos
  rationale: Se preserva el valor bíblico de μακάριος como estado favorecido por Dios, evitando reducirlo a mera emoción psicológica. «Dichosos» comunica ese favor de manera clara en español contemporáneo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Antecedente implícito de ἐκεῖνοι
  english_pob_reading: those servants
  chosen_spanish_reading: aquellos
  alternative_spanish_readings:
  - aquellos siervos
  - ellos
  rationale: El griego usa un demostrativo cuyo referente se entiende por el contexto previo. En español se evita añadir «siervos» en el texto principal para no sobreespecificar lo que el versículo no repite, manteniendo la referencia contextual sin perder claridad.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de SBLGNT y el rastro auditado en inglés POB. Se conserva la repetición enfática de κἄν con «aun si ... o aun», se traduce φυλακή como «vigilia», y se mantiene el demostrativo final sin expandirlo innecesariamente. No se documentaron revisiones recientes que alteren esta elección.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «dichosos» para μακάριος de manera coherente con un registro bíblico sobrio, dejando «bienaventurados» como alternativa documentada.
  - Se evita introducir «siervos» en el texto principal porque el griego de este versículo no lo expresa explícitamente; el antecedente queda recuperado por contexto y se explica en nota.
