revisions:
- from: Aun si viene en la segunda vigilia[a], o aun en la tercera, y los encuentra así[b], dichosos son aquellos.
  to: Aun si viene en la segunda vigilia[a], o aun en la tercera, y los encuentra así, bienaventurados son esos siervos[b].
  rationale: Se explicita el referente de ἐκεῖνοι en el texto principal para reflejar la decisión documentada en el inglés POB y evitar ambigüedad en español. Se mueve la nota de literalidad al segmento correcto, ya que la literalidad relevante está en «aquellos», no en «los encuentra así». También se ajusta μακάριοι a «bienaventurados» para una mejor alineación con «blessed» y con el tono bíblico del pasaje.
