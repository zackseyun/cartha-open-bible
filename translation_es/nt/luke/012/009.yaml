  glossary_alignment: 'No hay conflicto con la terminología del proyecto: θεοῦ = ''Dios''; no aparece YHWH ni Χριστός. La preservación del pasivo sin agente explícito respeta la decisión teológica auditada. ''Los hombres'' es defendible por el contraste con los ángeles, con nota alternativa inclusiva.'
