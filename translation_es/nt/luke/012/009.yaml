translation:
  language: es
  text: Pero el que me niega delante de los hombres será negado delante de los ángeles de Dios[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la gente' o 'los seres humanos' para 'los hombres'; el griego dice 'hombres/seres humanos' en contraste con 'los ángeles de Dios'.
    reason: lexical_alternative
  - marker: b
    text: 'O ''será repudiado''; el verbo griego es un cognado más fuerte de ''negar'', pero el texto principal conserva el paralelismo verbal: ''niega ... será negado''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste con el dicho anterior y conserva el tono adversativo natural en español.
- source_word: ἀρνησάμενός
  english_pob_choice: the one who denies
  chosen_spanish: el que me niegue
  alternatives_spanish:
  - quien me niegue
  - el que me niega
  - el que me haya negado
  lexicon: BDAG
  rationale: El participio aoristo con artículo funciona sustantivamente. En español, 'el que me niegue' expresa de manera natural la condición general del dicho y mantiene el enlace verbal con el futuro pasivo de la segunda cláusula.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: pronombre directo
  rationale: Se conserva como objeto directo explícito referido a Jesús, tal como en el griego y en el inglés POB.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: BDAG
  rationale: '''Delante de'' comunica bien el sentido público/testimonial y resulta idiomático en español sin perder la solemnidad.'
- source_word: τῶν ἀνθρώπων
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - la gente
  - los seres humanos
  lexicon: BDAG
  rationale: Sigue la decisión del POB inglés de mantener el paralelismo retórico con 'los ángeles de Dios'. En español, 'los hombres' funciona como plural genérico humano; se deja abierta la alternativa inclusiva en nota.
- source_word: ἀπαρνηθήσεται
  english_pob_choice: will be denied
  chosen_spanish: será negado
  alternatives_spanish:
  - será desechado
  - será repudiado
  - será desconocido
  lexicon: BDAG
  rationale: '''Será negado'' preserva la correspondencia verbal con ''niegue'' y mantiene la pasiva solemne del dicho. No se explicita un agente para conservar la tensión del texto fuente.'
- source_word: τῶν ἀγγέλων τοῦ θεοῦ
  english_pob_choice: the angels of God
  chosen_spanish: los ángeles de Dios
  alternatives_spanish:
  - los ángeles de Dios mismo
  - los ángeles de Dios
  lexicon: BDAG
  rationale: Se conserva la referencia celestial y la forma genitiva transparente del griego. 'Dios' corresponde directamente a θεοῦ; no se introduce 'SEÑOR' ni otro sustituto.
theological_decisions:
- issue: Agente implícito del pasivo 'será negado'
  english_pob_reading: Leave the passive as stated without supplying an explicit subject such as 'by the Son of Man' or 'by God.'
  chosen_spanish_reading: 'Se mantiene la pasiva sin añadir sujeto explícito: ''será negado''.'
  alternative_spanish_readings:
  - será negado por el Hijo del Hombre
  - será negado por Dios
  rationale: El griego no nombra el agente. En línea con el POB inglés, la versión española conserva esa ambigüedad reverente y no resuelve la tensión teológica del contexto inmediato.
  doctrine_reference: Preservar la tensión teológica sin añadir elementos no expresados en el texto.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete fuente; el último pase indicó que no eran necesarios cambios y hubo alto acuerdo en la revisión cruzada.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ y 'ángeles de Dios' para el grupo celestial, en correspondencia directa con el griego.
  - Se evita 'SEÑOR' como sustituto del nombre divino porque el texto fuente aquí usa θεοῦ, no κύριος.
  - La pasiva española conserva la indeterminación del agente, como en el POB inglés.
  - La elección de 'los hombres' sigue la decisión documentada del POB inglés; la nota ofrece alternativas inclusivas sin alterar el cuerpo del texto.
