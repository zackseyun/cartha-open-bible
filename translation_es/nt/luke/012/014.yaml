  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. Las decisiones relevantes son de estilo y precisión léxica: mantener «Hombre» para Ἄνθρωπε es correcto; «juez» para κριτής también. Para μεριστής, el borrador sigue demasiado de cerca una solución inglesa revisada pero menos idiomática en español; una nota puede conservar la dimensión de «repartidor/divisor de bienes».'
