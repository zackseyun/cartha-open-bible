revisions:
- from: 'Pero él le dijo: «Hombre, ¿quién me ha puesto como juez o arbitrador[a] sobre ustedes?»'
  to: 'Pero él le dijo: «Hombre, ¿quién me nombró juez o árbitro[a] sobre ustedes?»'
  rationale: Se ajusta «ha puesto como» a «nombró» para reflejar mejor el sentido de designación formal de κατέστησεν en una pregunta retórica. Se reemplaza «arbitrador» por «árbitro» por mayor claridad y naturalidad en español, mientras la nota preserva el matiz concreto de μεριστής como repartidor o divisor de bienes. No se requiere adjudicación adicional porque la corrección es menor y no afecta una cuestión doctrinal compleja.
