source:
  edition: SBLGNT
  text: μακάριοι οἱ δοῦλοι ἐκεῖνοι, οὓς ἐλθὼν ὁ κύριος εὑρήσει γρηγοροῦντας· ἀμὴν λέγω ὑμῖν ὅτι περιζώσεται καὶ ἀνακλινεῖ αὐτοὺς καὶ παρελθὼν διακονήσει αὐτοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/luke/012/037.yaml
  text: Blessed are those slaves whom the Lord[a], when he comes, will find staying awake. Truly I say to you, he will dress himself for service and have them recline at the table[c][b], and he will come and serve them.
  footnotes:
  - marker: a
    text: Or 'servants' (Greek doulos); 'slaves' is used here because the household relationship to the master is explicit in the parable.
    reason: lexical_alternative
  - marker: b
    text: Or 'master' for 'Lord' (Greek kyrios) in the immediate parable setting.
    reason: lexical_alternative
  - marker: c
    text: Literally 'will gird himself.' The expression means to dress for active service.
    reason: cultural_note
