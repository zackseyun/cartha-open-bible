translation:
  language: es
  text: Bienaventurados[a] esos esclavos, a quienes, cuando venga el Señor[b], encuentre velando. En verdad les digo que se ceñirá[c] y hará que se reclinen a la mesa, y acercándose, les servirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dichosos».
    reason: lexical_alternative
  - marker: b
    text: O «amo» en el marco inmediato de la parábola para κύριος.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «se ceñirá». La expresión significa prepararse para el servicio activo.
    reason: cultural_note
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: BDAG
  rationale: Conserva el tono de bienaventuranza solemne y religioso; en español, 'bienaventurados' es el equivalente más natural y reverente para este marco.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: En esta escena parabólica la relación de pertenencia al amo/señor es explícita; 'esclavos' mantiene esa fuerza social y lexical que el POB inglés decidió no suavizar.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - amo
  - maestro
  lexicon: BDAG
  rationale: Se conserva el título habitual para κύριος en el POB, y en español 'Señor' mantiene tanto la referencia narrativa del dueño como la posible resonancia más amplia sin forzar una paráfrasis.
- source_word: γρηγοροῦντας
  english_pob_choice: staying awake
  chosen_spanish: velando
  alternatives_spanish:
  - despiertos
  - vigilando
  lexicon: BDAG
  rationale: '''Velando'' expresa vigilancia activa y disponibilidad, y en español suena natural en un contexto de espera nocturna o alerta, sin reducirlo a mera insomnio.'
- source_word: ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I say to you
  chosen_spanish: En verdad les digo
  alternatives_spanish:
  - Amén, les digo
  - De cierto les digo
  lexicon: BDAG
  rationale: Reproduce la fórmula enfática con registro digno y claro en español. 'En verdad' transmite la solemnidad sin introducir una frase demasiado calcada.
- source_word: περιζώσεται
  english_pob_choice: will dress himself for service
  chosen_spanish: se ceñirá
  alternatives_spanish:
  - se preparará para servir
  - se ajustará la ropa
  lexicon: BDAG
  rationale: La imagen literal de ceñirse es la base del verbo; en español 'se ceñirá' conserva la metáfora de preparación para el servicio, y el contexto ya comunica su finalidad servicial.
- source_word: ἀνακλινεῖ αὐτοὺς
  english_pob_choice: have them recline at the table
  chosen_spanish: hará que se sienten a la mesa
  alternatives_spanish:
  - los hará recostarse a la mesa
  - los hará reclinarse a la mesa
  lexicon: BDAG
  rationale: En español contemporáneo 'sentarse a la mesa' comunica el acto de banquete con más naturalidad. Se reconoce que el griego habla propiamente de reclinarse; la opción evita una rigidez poco idiomática.
- source_word: παρελθὼν
  english_pob_choice: he will come
  chosen_spanish: pasando
  alternatives_spanish:
  - al pasar
  - luego de pasar
  lexicon: BDAG
  rationale: El participio expresa movimiento concomitante; 'pasando' mantiene esa secuencia sin convertirla en un verbo principal que altere el ritmo de la frase.
- source_word: διακονήσει αὐτοῖς
  english_pob_choice: serve them
  chosen_spanish: les servirá
  alternatives_spanish:
  - les atenderá
  - les ministrará
  lexicon: BDAG
  rationale: '''Servirá'' conserva el servicio práctico del contexto de mesa y evita el tecnicismo eclesiástico de ''ministrar''.'
theological_decisions:
- issue: La tensión entre la humildad de los esclavos y la inversión sorprendente del señor que sirve
  english_pob_reading: The master/lord unexpectedly serves the slaves at table.
  chosen_spanish_reading: El Señor, después de hacerlos sentar a la mesa, les servirá.
  alternative_spanish_readings:
  - El amo los servirá.
  - El Señor les ministrará.
  rationale: 'La traducción mantiene la inversión sorprendente del pasaje: quien tiene autoridad termina sirviendo. ''Señor'' preserva la lectura del POB para κύριος, mientras el verbo final conserva el servicio concreto de mesa sin eclesializarlo.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation philosophy #5'
- issue: La carga social de δοῦλος
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - criados
  rationale: Se conserva la dureza social del término en una parábola donde la relación amo-esclavo es parte del sentido. 'Siervos' suavizaría indebidamente la imagen.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1; Contested terms table (δοῦλος → servant / slave context-dependent)'
translation_notes:
  revision_awareness: Este borrador sigue el pasaje griego SBLGNT y el rastro auditado del POB en inglés. Se mantiene la decisión de 'esclavos' para δοῦλοι, 'Señor' para κύριος y la imagen de servicio activo para περιζώσεται, ajustando el español para que sea natural sin borrar la tensión lexical o narrativa documentada. No se introdujeron revisiones posteriores; el texto inglés de referencia permanece sin cambios en la última pasada.
  spanish_consistency_notes:
  - Se usa 'Señor' con mayúscula como término reverencial coherente con el POB inglés.
  - '''Bienaventurados'' conserva el tono de beatitud y evita una simplificación psicológica.'
  - '''Velando'' refleja vigilancia continua mejor que un simple ''despiertos''.'
  - 'La secuencia verbal mantiene el orden del griego: llegada del Señor, hallazgo vigilante, servicio inverso del señor a sus esclavos.'
