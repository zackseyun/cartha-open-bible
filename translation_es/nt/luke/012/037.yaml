review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y respeta las decisiones del POB en puntos clave: μακάριοι → «Bienaventurados», δοῦλοι → «esclavos», κύριος → «Señor» con nota alternativa, γρηγοροῦντας → «velando», y διακονήσει → «les servirá». Sin embargo, dos puntos requieren ajuste para mayor fidelidad: (1) ἀνακλινεῖ αὐτούς expresa reclinarlos/acomodarlos para la mesa, no simplemente «hacer que se sienten»; en español puede decirse idiomáticamente «hará que se reclinen a la mesa». (2) παρελθὼν en esta secuencia de servicio se vierte mejor como acción personal del señor que se acerca para atenderlos; «y acercándose» comunica mejor el valor contextual que «y pasando», que suena poco natural y ambiguo en español.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «y pasando, les servirá» resulta poco idiomático. Además, «hará que se sienten a la mesa» es natural, pero atenúa una imagen que el inglés auditado quiso conservar explícitamente. Un pequeño ajuste mejora tanto la naturalidad como la precisión sin volver el texto rígido.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Señor» para κύριος, no hay caso de Yahvé; «esclavos» sigue la preferencia por δοῦλος en contexto de servidumbre explícita; «servirá» preserva el sentido práctico de διακονέω. La nota sobre «amo» como alternativa a «Señor» está bien. La nota cultural sobre «se ceñirá» también está bien preservada.'
  issues:
  - severity: medium
    issue: «hará que se sienten a la mesa» debilita ἀνακλινεῖ αὐτούς
    rationale: El verbo griego se refiere específicamente a reclinarse en una comida. Aunque «sentarse a la mesa» es idiomático, aquí el inglés POB decidió explicitar la imagen del banquete. Conviene conservarla en español con una formulación natural como «hará que se reclinen a la mesa».
  - severity: medium
    issue: «y pasando» es poco natural para παρελθὼν en este contexto
    rationale: El participio describe el movimiento del señor al atenderlos. «Pasando» en español suena ambiguo y no comunica bien la acción servicial. «Y acercándose» o «y vendrá a servirles» expresa mejor el sentido contextual sin alejarse del original.
  revised_spanish_text: Bienaventurados[a] esos esclavos, a quienes, cuando venga el Señor[b], encuentre velando. En verdad les digo que se ceñirá[c] y hará que se reclinen a la mesa, y acercándose, les servirá.
  revised_footnotes:
  - marker: a
    text: O «dichosos».
    reason: lexical_alternative
  - marker: b
    text: O «amo» en el marco inmediato de la parábola para κύριος.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «se ceñirá». La expresión significa prepararse para el servicio activo.
    reason: cultural_note
  revision_rationale: 'La revisión conserva todas las decisiones centrales del borrador, pero corrige dos puntos para reflejar mejor el griego y el audit trail inglés: se restaura la imagen de reclinarse a la mesa para ἀνακλινεῖ αὐτούς, y se reemplaza «pasando» por «acercándose» para expresar de manera más idiomática y precisa la acción del señor que se mueve a servirles.'
