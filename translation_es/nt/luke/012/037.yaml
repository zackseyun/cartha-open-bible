revisions:
- from: Bienaventurados[a] esos esclavos, a quienes, cuando venga el Señor[b], encuentre velando. En verdad les digo que se ceñirá[c] y hará que se sienten a la mesa, y pasando, les servirá.
  to: Bienaventurados[a] esos esclavos, a quienes, cuando venga el Señor[b], encuentre velando. En verdad les digo que se ceñirá[c] y hará que se reclinen a la mesa, y acercándose, les servirá.
  rationale: 'La revisión conserva todas las decisiones centrales del borrador, pero corrige dos puntos para reflejar mejor el griego y el audit trail inglés: se restaura la imagen de reclinarse a la mesa para ἀνακλινεῖ αὐτούς, y se reemplaza «pasando» por «acercándose» para expresar de manera más idiomática y precisa la acción del señor que se mueve a servirles.'
