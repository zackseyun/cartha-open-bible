  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura y el sentido general del griego: «todas estas cosas», «las naciones del mundo», el contraste con «su Padre», y «necesitan estas cosas». Sin embargo, la colocación verbal en español («todas estas cosas buscan las naciones del mundo») suena marcada y poco natural, y conviene reflejar el matiz léxico alternativo de ἔθνη con una nota, ya que el English POB la preserva.'
  spanish_quality_summary: La redacción actual es inteligible, pero no es la más natural en español eclesial contemporáneo. El orden «las naciones del mundo buscan todas estas cosas» mejora mucho la fluidez sin perder formalidad ni énfasis. «Su Padre» con «ustedes» es aceptable en registro neutral latinoamericano. Añadir una nota a «naciones» ayuda a preservar la alternativa «gentiles» documentada en el rastro de auditoría.
  glossary_alignment: 'No hay conflicto con los términos base del proyecto. «Padre» y «Dios» no presentan problema aquí. La decisión clave es ἔθνη: «naciones» debe mantenerse en el texto principal, con nota por la alternativa «gentiles», tal como en el English POB. «Buscan» es aceptable para ἐπιζητοῦσιν en esta revisión.'
  issues:
  - severity: medium
    issue: 'Orden de palabras poco natural en español: «Pues todas estas cosas buscan las naciones del mundo»'
    rationale: Aunque comprensible, este orden suena calcado del griego/inglés y menos idiomático que «las naciones del mundo buscan todas estas cosas». La revisión mejora la legibilidad sin alterar el sentido.
  - severity: medium
    issue: Falta la nota léxica sobre ἔθνη
    rationale: El English POB conserva explícitamente la alternativa «Gentiles». Dado que «naciones» se mantiene en el texto principal, conviene preservar esa alternativa con nota al pie también en español.
  - severity: low
    issue: «Pues» puede sonar algo discursivo aquí
    rationale: No es incorrecto, pero «Porque» conecta de manera más directa con γάρ y suena más natural en esta construcción en español bíblico actual.
  revised_spanish_text: Porque las naciones[a] del mundo buscan todas estas cosas, pero su Padre sabe que ustedes necesitan estas cosas.
