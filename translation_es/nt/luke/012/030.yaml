translation:
  language: es
  text: Porque las naciones[a] del mundo buscan todas estas cosas, pero su Padre sabe que ustedes necesitan estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los gentiles del mundo». El término griego puede significar «naciones» o «gentiles».
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα ... πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - estas cosas
  - todas estas
  lexicon: BDAG
  rationale: El demostrativo neutro plural con πᾶς refiere a los elementos materiales mencionados en el contexto inmediato. «Todas estas cosas» conserva el alcance total y suena natural en español.
- source_word: τὰ ἔθνη τοῦ κόσμου
  english_pob_choice: the nations of the world
  chosen_spanish: las naciones del mundo
  alternatives_spanish:
  - los gentiles del mundo
  - los pueblos del mundo
  lexicon: BDAG
  rationale: ἔθνη puede significar «naciones» o «gentiles». Aquí se mantiene la forma más literal y amplia, sin estrechar innecesariamente el contraste teológico ni introducir una interpretación más específica que el griego no exige.
- source_word: ἐπιζητοῦσιν
  english_pob_choice: seek
  chosen_spanish: buscan
  alternatives_spanish:
  - buscan afanosamente
  - procuran
  lexicon: BDAG
  rationale: El verbo compuesto expresa una búsqueda activa o insistente. En español, «buscan» comunica bien la idea sin forzar una perífrasis pesada; el contexto ya aporta la intensidad de la búsqueda.
- source_word: ὑμῶν ... ὁ πατήρ
  english_pob_choice: your Father
  chosen_spanish: su Padre
  alternatives_spanish:
  - su Padre celestial
  - vuestro Padre
  lexicon: BDAG
  rationale: El griego dice literalmente «su Padre» en relación con los discípulos a quienes Jesús habla. Se evita importar «celestial», que no está en este versículo, y se prefiere «su» por el tratamiento reverente natural en español en este contexto.
- source_word: οἶδεν
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - sabe bien
  lexicon: BDAG
  rationale: οἶδα funciona con sentido presente. «Sabe» es la equivalencia más natural en español y preserva el valor de conocimiento pleno o seguro.
- source_word: χρῄζετε
  english_pob_choice: you need
  chosen_spanish: necesitan
  alternatives_spanish:
  - tienen necesidad de
  - requieren
  lexicon: BDAG
  rationale: χρῄζω significa «necesitar» o «tener necesidad de». Se usa «necesitan» por claridad y fluidez contemporánea, manteniendo el sentido directo del verbo.
- source_word: τούτων
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - de estas cosas
  - de ello
  lexicon: BDAG
  rationale: Se repite «estas cosas» para conservar la referencia explícita y el énfasis retórico del demostrativo griego.
theological_decisions:
- issue: Alcance de ἔθνη y contraste con los discípulos
  english_pob_reading: Retain 'the nations of the world' without interpretive expansion.
  chosen_spanish_reading: Conservar «las naciones del mundo» sin añadir «gentiles» en el texto principal.
  alternative_spanish_readings:
  - los gentiles del mundo
  - los pueblos del mundo
  rationale: La frase puede tener matiz étnico-religioso, pero el texto griego mantiene una formulación amplia. «Las naciones del mundo» preserva esa amplitud y deja visible el contraste entre la búsqueda ansiosa del mundo y la confianza filial de los discípulos.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relación filial expresada por ὁ πατήρ
  english_pob_reading: your Father
  chosen_spanish_reading: su Padre
  alternative_spanish_readings:
  - vuestro Padre
  - su Padre celestial
  rationale: El versículo habla de la paternidad de Dios en relación con los discípulos, pero no añade el calificativo «celestial». La traducción mantiene la relación filial sin importar una ampliación contextual ajena al versículo.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que redujo 'seek after' a 'seek' por naturalidad. En español se adoptó igualmente una forma simple y natural («buscan»), conservando el valor de búsqueda activa del compuesto griego sin sobrecargar la frase.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en «su Padre» conforme al estilo POB y al contexto de Jesús dirigiéndose a sus discípulos.
  - No se usa «Cristo» ni terminología litúrgica no presente en el versículo.
  - «Naciones del mundo» conserva la ambigüedad útil entre sentido político-étnico y religioso sin resolverla por adelantado.
