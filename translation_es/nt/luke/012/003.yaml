translation:
  language: es
  text: Por tanto[a], todo lo que dijeron en la oscuridad será oído en la luz, y lo que hablaron al oído en las habitaciones interiores será proclamado en las azoteas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde las azoteas». La imagen es la de un anuncio público desde los techos planos de las casas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθ’ ὧν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por esta razón
  - Así que
  - En consecuencia
  lexicon: BDAG
  rationale: La expresión funciona de modo inferencial y enlaza la frase con lo anterior. «Por tanto» conserva esa fuerza conclusiva en español sin sonar mecánico.
- source_word: ὅσα
  english_pob_choice: whatever
  chosen_spanish: todo lo que
  alternatives_spanish:
  - lo que sea que
  - cualquier cosa que
  - todo cuanto
  lexicon: BDAG
  rationale: El relativo indefinido abarca de manera amplia cualquier cosa dicha en secreto. «Todo lo que» mantiene esa amplitud con naturalidad en español.
- source_word: ἐν τῇ σκοτίᾳ
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en la oscuridad
  - en lo oscuro
  - en la penumbra
  lexicon: BDAG
  rationale: «Oscuridad» preserva la imagen literal y su valor metafórico de ocultamiento, en paralelo con «la luz».
- source_word: εἴπατε
  english_pob_choice: you said
  chosen_spanish: hayan dicho
  alternatives_spanish:
  - dijeron
  - han dicho
  - hayan hablado
  lexicon: BDAG
  rationale: «Decir» es el valor principal del verbo; el subjuntivo en la relativa indefinida suena natural en español tras «todo lo que».
- source_word: ἐν τῷ φωτί
  english_pob_choice: in the light
  chosen_spanish: en la luz
  alternatives_spanish:
  - a la luz
  - en la claridad
  - en pleno día
  lexicon: BDAG
  rationale: Se mantiene el contraste directo con «en la oscuridad» y la posibilidad de un sentido literal y figurado de manifestación pública.
- source_word: ἀκουσθήσεται
  english_pob_choice: will be heard
  chosen_spanish: será oído
  alternatives_spanish:
  - será escuchado
  - llegará a oírse
  lexicon: BDAG
  rationale: El pasivo futuro se conserva de forma directa. «Será oído» mantiene la imagen de divulgación sin añadir matices interpretativos.
- source_word: ὃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - lo cual
  - aquello que
  lexicon: BDAG
  rationale: En la segunda cláusula, «lo que» reproduce de manera natural el relativo singular con valor general.
- source_word: πρὸς τὸ οὖς
  english_pob_choice: into the ear
  chosen_spanish: al oído
  alternatives_spanish:
  - en el oído
  - al oído de alguien
  - muy en secreto
  lexicon: BDAG
  rationale: La expresión idiomática se entiende mejor en español como una acción dirigida «al oído», conservando el matiz de susurro privado sin forzar una preposición literal poco natural.
- source_word: ἐλαλήσατε
  english_pob_choice: you spoke
  chosen_spanish: hayan hablado
  alternatives_spanish:
  - dijeron
  - hayan dicho
  lexicon: BDAG
  rationale: «Hablar» distingue levemente este verbo de εἴπατε y reproduce bien la idea de hablar en voz baja o en privado.
- source_word: ἐν τοῖς ταμείοις
  english_pob_choice: in the inner rooms
  chosen_spanish: en las habitaciones interiores
  alternatives_spanish:
  - en los aposentos interiores
  - en las habitaciones privadas
  - en los cuartos interiores
  lexicon: BDAG
  rationale: ταμεῖον puede designar un cuarto interior o reservado. «Habitaciones interiores» conserva el sentido de privacidad y encierro sin restringirlo a una función de almacén.
- source_word: κηρυχθήσεται
  english_pob_choice: will be proclaimed
  chosen_spanish: será proclamado
  alternatives_spanish:
  - será anunciado
  - será pregonado
  lexicon: BDAG
  rationale: El verbo expresa proclamación pública. «Será proclamado» conserva el registro formal y el sentido de anuncio público mejor que «será predicado» en este contexto.
- source_word: ἐπὶ τῶν δωμάτων
  english_pob_choice: on the housetops
  chosen_spanish: en las azoteas
  alternatives_spanish:
  - sobre los techos
  - en los tejados
  - desde las azoteas
  lexicon: BDAG
  rationale: En el contexto mediterráneo antiguo, el plural sugiere los techos planos desde donde se hacía pública una घोषणा. «Azoteas» es claro en español y conserva la imagen de anuncio visible desde lo alto.
theological_decisions:
- issue: Alcance de la divulgación de lo oculto
  english_pob_reading: Render the verse as a warning that what is hidden or whispered will become public, without specifying whether the disclosure is divine judgment, providential exposure in history, or eschatological revelation.
  chosen_spanish_reading: Se traduce como una advertencia de que lo oculto y lo susurrado llegará a hacerse público, sin precisar si esa divulgación corresponde al juicio final, a una exposición providencial en la historia o a una revelación escatológica.
  alternative_spanish_readings:
  - Primariamente como divulgación en el juicio final
  - Primariamente como exposición de la hipocresía en la historia presente
  rationale: El contexto inmediato apunta a la revelación de lo escondido, pero el versículo no determina de manera exclusiva el momento ni el mecanismo. La traducción preserva esa tensión teológica en lugar de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el veredicto de concordancia alta se mantuvo. Se conservó el sentido inferencial de ἀνθ’ ὧν, el contraste oscuridad/luz y la imagen de proclamación pública desde los techos, sin suavizar el valor de la divulgación.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; aquí no aparece ninguna referencia al nombre divino.
  - Se evitó «Cristo» porque el pasaje no contiene Χριστός.
  - Se eligió un registro formal y readable, con «será proclamado» para κηρυχθήσεται y «azoteas» para la imagen final.
  - La nota de pie conserva la alternativa espacial «desde las azoteas» porque el griego permite matiz locativo o de procedencia en la proclamación pública.
