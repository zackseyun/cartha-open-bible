    text: Or 'Observe the ravens' or 'Think carefully about the ravens.'
    reason: lexical_alternative
  - marker: b
    text: '''Storeroom'' translates ταμεῖον; ''barn'' translates ἀποθήκη. The Greek uses two distinct storage terms.'
    reason: lexical_alternative
  - marker: c
    text: Or 'How much more are you worth than the birds.'
    reason: lexical_alternative
