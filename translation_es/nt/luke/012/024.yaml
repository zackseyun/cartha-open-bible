  text: κατανοήσατε τοὺς κόρακας ὅτι οὐ σπείρουσιν οὐδὲ θερίζουσιν, οἷς οὐκ ἔστιν ταμεῖον οὐδὲ ἀποθήκη, καὶ ὁ θεὸς τρέφει αὐτούς· πόσῳ μᾶλλον ὑμεῖς διαφέρετε τῶν πετεινῶν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/012/024.yaml
  text: 'Consider the ravens: they neither sow nor reap[a]; they have neither storeroom nor barn, and God feeds them[c][b]. How much more valuable are you than the birds!'
  footnotes:
