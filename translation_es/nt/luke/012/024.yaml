    issue: La pareja «granero ni almacén» desalineada con el griego y con el audit trail
    rationale: El POB inglés documenta que ταμεῖον es un espacio interior de almacenamiento («storeroom») y ἀποθήκη es «barn». El español borrador invierte esa lógica, debilitando la distinción source-driven.
  - severity: low
    issue: Falta la nota que preserva la distinción entre los dos términos de almacenamiento
    rationale: El audit trail inglés incluyó una nota explícita sobre ταμεῖον y ἀποθήκη. Dado que el español requiere una solución menos directa, conviene conservar la aclaración en nota para transparencia léxica.
  - severity: low
    issue: «valen ustedes» es comprensible pero menos idiomático que una formulación adjetival
    rationale: διαφέρετε aquí expresa superioridad en valor. «Son más valiosos» comunica esa comparación con mayor naturalidad en español bíblico contemporáneo.
