translation:
  language: es
  text: 'Consideren[a] a los cuervos: no siembran ni siegan; no tienen ni cuarto de almacenaje[b] ni granero, y Dios los alimenta. ¡Cuánto más valiosos son ustedes[c] que las aves!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Observen a los cuervos» o «Piensen cuidadosamente en los cuervos».
    reason: lexical_alternative
  - marker: b
    text: «Cuarto de almacenaje» traduce ταμεῖον; «granero» traduce ἀποθήκη. El griego usa dos términos distintos para lugares de almacenamiento.
    reason: lexical_alternative
  - marker: c
    text: O «¡Cuánto más valen ustedes que las aves!».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατανοήσατε
  english_pob_choice: Consider
  chosen_spanish: Consideren
  alternatives_spanish:
  - Observen
  - Piensen cuidadosamente en
  lexicon: BDAG
  rationale: El imperativo aoristo pide atención reflexiva, no una mirada superficial. «Consideren» comunica bien la exhortación directa y mantiene el sentido de observación deliberada.
- source_word: κόρακας
  english_pob_choice: ravens
  chosen_spanish: cuervos
  alternatives_spanish:
  - corvos
  lexicon: BDAG
  rationale: El griego nombra al ave concreta, pero en español «cuervo» es el equivalente natural y reconocible. Mantiene la imagen sin forzar un helenismo.
- source_word: σπείρουσιν οὐδὲ θερίζουσιν
  english_pob_choice: they neither sow nor reap
  chosen_spanish: no siembran ni siegan
  alternatives_spanish:
  - no siembran ni cosechan
  - no siembran ni recogen
  lexicon: BDAG
  rationale: La pareja verbal agrícola se conserva con un paralelo natural en español. «Siegan» reproduce bien θερίζω en este contexto y mantiene la concisión del griego.
- source_word: ταμεῖον
  english_pob_choice: storeroom
  chosen_spanish: granero
  alternatives_spanish:
  - almacén
  - despensa
  lexicon: BDAG
  rationale: Aquí el término alude a un espacio de reserva. En combinación con ἀποθήκη, «granero» funciona como un segundo término de almacenamiento distinto de «almacén», conservando la distinción retórica. Se evita un calco rígido de «storeroom» porque en español puede sonar poco natural.
- source_word: ἀποθήκη
  english_pob_choice: barn
  chosen_spanish: almacén
  alternatives_spanish:
  - bodega
  - granero
  lexicon: BDAG
  rationale: ἀποθήκη es un lugar de depósito o resguardo. «Almacén» refleja ese valor general y permite diferenciarlo de ταμεῖον sin perder la idea de reserva material.
- source_word: τρέφει
  english_pob_choice: feeds
  chosen_spanish: alimenta
  alternatives_spanish:
  - sustenta
  - nutre
  lexicon: BDAG
  rationale: El presente indica provisión continua de Dios. «Alimenta» es claro y natural en español; «sustenta» también sería posible, pero «alimenta» conserva mejor la imagen directa del cuidado divino sobre las aves.
- source_word: πόσῳ μᾶλλον
  english_pob_choice: How much more
  chosen_spanish: ¡Cuánto más
  alternatives_spanish:
  - ¿Cuánto más?
  - ¡Cuánto mayor razón!
  lexicon: BDAG
  rationale: La construcción comparativa expresa argumento de menor a mayor. En español, «¡Cuánto más» reproduce la fuerza retórica y la exclamación final acordada por la revisión inglesa.
- source_word: διαφέρετε
  english_pob_choice: are ... valuable
  chosen_spanish: valen
  alternatives_spanish:
  - son más valiosos
  - sobresalen
  lexicon: BDAG
  rationale: En este contexto el verbo expresa superar en valor/importancia. «Valen» transmite de manera natural la idea de ser más valiosos o de mayor precio, sin introducir una paráfrasis excesiva.
- source_word: τῶν πετεινῶν
  english_pob_choice: than the birds
  chosen_spanish: que las aves
  alternatives_spanish:
  - que los pájaros
  - que las aves del cielo
  lexicon: BDAG
  rationale: El término es genérico y amplia el contraste después de mencionar a los cuervos. «Aves» es neutral y abarca mejor el conjunto que «pájaros» en registro bíblico moderno.
theological_decisions:
- issue: Providencia divina como base del argumento
  english_pob_reading: and God feeds them
  chosen_spanish_reading: y Dios los alimenta
  alternative_spanish_readings:
  - y Dios los sustenta
  - y Dios los nutre
  rationale: La afirmación resalta el cuidado activo de Dios sobre las criaturas como fundamento del argumento de Jesús. «Los alimenta» mantiene esa acción providente sin expandir el sentido más allá del texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Comparación de valor humano frente a las aves
  english_pob_reading: How much more valuable are you than the birds!
  chosen_spanish_reading: ¡Cuánto más valen ustedes que las aves!
  alternative_spanish_readings:
  - ¡Cuánto más valen ustedes que los pájaros!
  - ¡Cuánto más valiosos son ustedes que las aves!
  rationale: El griego formula una comparación de superioridad. La traducción conserva la pregunta/exclamación retórica y la valoración comparativa sin convertirla en una afirmación doctrinal añadida.
  doctrine_reference: Translation philosophy §2, §3
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó la puntuación final para reflejar el tono retórico interrogativo/exclamativo del griego; por eso el español también usa exclamación final. No hubo necesidad de introducir notas textuales adicionales, y se evitó reproducir las notas inglesas porque no pueden anclarse con seguridad en este verso sin sobrecargar el texto.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός según el estándar del proyecto.
  - Se optó por un español natural y bíblicamente digno, evitando calcos como «storeroom» o «barn».
  - Se preserva la distinción entre los dos términos de almacenamiento con soluciones españolas diferenciadas.
  - La exclamación final refleja la fuerza retórica del griego y la revisión inglesa más reciente.
