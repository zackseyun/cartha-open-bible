translation:
  language: es
  text: 'Entonces Pedro dijo: «Señor, ¿nos estás diciendo esta parábola a nosotros o también a todos[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego πάντας es masculino plural, pero aquí se usa de manera genérica para el auditorio más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν / dijo
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - preguntó
  lexicon: BDAG
  rationale: El aoristo de λέγω se rinde naturalmente como 'dijo'. Aunque el contenido es una pregunta, el verbo de reporte puede mantenerse sin perder el tono interrogativo de la cita directa.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ funciona como continuidad discursiva; 'Entonces' suena natural en español narrativo y conserva la secuencia.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En el habla directa a Jesús, 'Señor' es la equivalencia regular y conserva el valor reverencial y la posible resonancia cristológica.
- source_word: πρὸς ἡμᾶς
  english_pob_choice: to us
  chosen_spanish: a nosotros
  alternatives_spanish:
  - para nosotros
  - a nosotros los discípulos
  lexicon: BDAG
  rationale: Con λέγεις, πρός + acusativo expresa dirección del habla; 'a nosotros' es la forma más directa y natural en español.
- source_word: τὴν παραβολὴν ταύτην
  english_pob_choice: this parable
  chosen_spanish: esta parábola
  alternatives_spanish:
  - esta ilustración
  lexicon: BDAG
  rationale: παραβολή se traduce de forma consistente como 'parábola' en los Evangelios, conservando la continuidad literaria y canónica.
- source_word: λέγεις
  english_pob_choice: are you telling
  chosen_spanish: estás diciendo
  alternatives_spanish:
  - dices
  - estás hablando
  lexicon: BDAG
  rationale: El presente interrogativo admite una perífrasis progresiva en español para reproducir la vivacidad de la pregunta de Pedro sin alterar el sentido.
- source_word: ἢ καὶ
  english_pob_choice: or also
  chosen_spanish: o también
  alternatives_spanish:
  - o incluso
  - o
  lexicon: BDAG
  rationale: La combinación mantiene la alternativa y el matiz aditivo; 'o también' reproduce de manera natural el valor de ἤ + καί.
- source_word: πρὸς πάντας
  english_pob_choice: to everyone
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos
  - a toda la gente
  lexicon: BDAG
  rationale: πάντας es masculino plural pero genérico; 'a todos' expresa el alcance amplio sin limitarlo a varones, y encaja bien en español.
theological_decisions:
- issue: Tratamiento de κύριος en la dirección a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: No hay razón contextual para apartarse del valor reverencial estándar; 'Señor' preserva el respeto y la posible carga cristológica sin sobrerrepresentarla.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Valor genérico de πάντας
  english_pob_reading: everyone
  chosen_spanish_reading: a todos
  alternative_spanish_readings:
  - a toda la gente
  - a todos los presentes
  rationale: El plural masculino es genérico en este contexto; 'a todos' mantiene la inclusividad del referente sin forzar una paráfrasis explicativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4 (Gender-accurate over gender-neutral)'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español y se ancle a la frase correspondiente.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριος por consistencia con el proyecto.
  - Se empleó 'parábola' para παραβολή, conforme a la terminología establecida.
  - Se tradujo πάντας como 'a todos' con nota para preservar su valor genérico.
