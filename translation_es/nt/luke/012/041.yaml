review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Pedro habla, se dirige a Jesús como «Señor», pregunta si la parábola va dirigida «a nosotros» o al grupo más amplio. También preserva adecuadamente el matiz de ἢ καὶ como alternativa con adición («o también»). Sin embargo, la redacción «¿les estás diciendo esta parábola a nosotros...?» no corresponde bien a la sintaxis española para el complemento indirecto y debilita la fidelidad idiomática de πρὸς ἡμᾶς / πρὸς πάντας como destinatarios del habla.'
  spanish_quality_summary: La frase es comprensible, pero «les estás diciendo ... a nosotros» suena incorrecto o muy forzado en español general, porque mezcla «les» con un complemento expreso de primera persona. La construcción natural y clara es «¿nos estás diciendo esta parábola ... o también a todos[a]?». El resto del versículo es legible y digno.
  glossary_alignment: «Señor» para Κύριε está alineado con la terminología del proyecto. «Parábola» para παραβολή también. La nota sobre πάντας como plural masculino genérico está bien encaminada; en español «a todos» es aceptable aquí con nota. No hay conflicto con Yahvé/Mesías u otros términos sensibles del glosario.
  issues:
  - severity: medium
    issue: 'Construcción pronominal no natural: «¿les estás diciendo ... a nosotros...?»'
    rationale: 'El griego contrasta «a nosotros» con «a todos», pero en español debe expresarse con el clítico correcto: «nos estás diciendo ... o también a todos». La forma actual resulta gramaticalmente anómala y poco natural para lectura pública.'
  - severity: low
    issue: Leve tensión entre el borrador principal y la nota al pie
    rationale: El texto ya usa «a todos[a]» y la nota dice «O «a todos»», que no ofrece una alternativa real al lector español. Conviene reformular la nota para explicar el valor genérico de πάντας sin presentar como alternativa exactamente la misma expresión del texto.
  revised_spanish_text: 'Entonces Pedro dijo: «Señor, ¿nos estás diciendo esta parábola a nosotros o también a todos[a]?»'
  revised_footnotes:
  - marker: a
    text: El griego πάντας es masculino plural, pero aquí se usa de manera genérica para el auditorio más amplio.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la sintaxis española del complemento indirecto para que el contraste del griego suene natural y fiel: «nos estás diciendo ... a nosotros o también a todos». Se mantiene «a nosotros» dentro de la cita para conservar el contraste explícito con «a todos». También se ajusta la nota, ya que en español no aporta decir «O “a todos”» cuando esa misma forma ya aparece en el texto.'
