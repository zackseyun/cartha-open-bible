translation:
  language: es
  text: Pero busquen su reino[a][b], y estas cosas se les añadirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el reino de Dios»; el griego dice «su reino», y el referente se sobreentiende por el contexto.
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen «el reino de Dios» en lugar de «su reino».
    reason: textual_variant
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: But
  chosen_spanish: Más bien
  alternatives_spanish:
  - Pero
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: En este contexto, la partícula introduce una transición contrastiva respecto de la exhortación previa. «Más bien» comunica bien el giro exhortativo en español y evita una oposición demasiado dura que «pero» podría dar en este enlace discursivo.
- source_word: ζητεῖτε
  english_pob_choice: seek
  chosen_spanish: busquen
  alternatives_spanish:
  - busquen con empeño
  - sigan buscando
  - busquen primero
  lexicon: BDAG
  rationale: El imperativo presente expresa una orientación continua. «Busquen» conserva la fuerza imperativa de manera natural en español; añadir «con empeño» o «primero» introduciría matices no explicitados en el griego de este versículo.
- source_word: τὴν βασιλείαν
  english_pob_choice: kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - el reino de Dios
  - su reinado
  - su dominio
  lexicon: BDAG
  rationale: «Reino» mantiene la correspondencia más reconocible con βασιλεία. En español, «su reino» conserva además la referencia pronominal del texto griego, mientras que «el reino de Dios» explicita el referente más allá de lo que dice la forma presente en este versículo.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de Dios
  lexicon: BDAG
  rationale: El pronombre se refiere a Dios por el contexto inmediato. En español, «su» preserva la forma pronominal sin explicitar el nombre divino, manteniendo la misma tensión que el texto griego entre referencia clara y expresión implícita.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas cosas
  lexicon: BDAG
  rationale: La expresión breve «estas cosas» refleja el demostrativo sin armonizar con la forma mateana que añade «todo». La frase alude a las necesidades del contexto anterior, pero el griego aquí no lleva el intensificador adicional.
- source_word: προστεθήσεται
  english_pob_choice: will be added
  chosen_spanish: les serán añadidas
  alternatives_spanish:
  - se les añadirá
  - les serán dadas además
  - se les proporcionarán
  lexicon: BDAG
  rationale: La pasiva futura conserva la imagen de «añadir» sin convertirla en paráfrasis de provisión. El dativo plural se expresa naturalmente con «les». La forma pasiva en español preserva el matiz de que el suministro ocurre a su favor sin nombrar al agente.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: El dativo de segunda persona plural se integra en la construcción pasiva con «les». Es una solución idiomática en español que mantiene el destinatario plural sin recargar la frase con un complemento redundante.
theological_decisions:
- issue: Referencia implícita de αὐτοῦ
  english_pob_reading: The pronoun refers to God, rendered implicitly as 'his kingdom.'
  chosen_spanish_reading: La referencia queda implícita en «su reino», sin explicitar «de Dios».
  alternative_spanish_readings:
  - «el reino de Dios»
  - «su reino» con nota explícita
  rationale: El texto griego usa un posesivo pronominal, no el nombre divino. Mantener la referencia implícita respeta la forma del original y conserva la tensión documental entre el pronombre y su referente contextual, sin borrar la claridad teológica del pasaje.
  doctrine_reference: Principio de primacía del texto original; preservación de la referencia implícita cuando el original no la explicita.
translation_notes:
  revision_awareness: El pasaje griego y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas; la versión española sigue esa lectura estable y conserva la distinción entre el pronombre posesivo del texto base y la explicitación interpretativa de su referente.
  spanish_consistency_notes:
  - Se mantiene «reino» para βασιλεία en coherencia con el registro bíblico del proyecto.
  - Se conserva el pronombre posesivo implícito en la nota, sin sustituirlo por una expansión doctrinal en el texto principal.
  - La pasiva futura «les serán añadidas» refleja el valor de προστεθήσεται sin desviarse hacia una formulación más explicativa.
  - No se introduce «Cristo», «SEÑOR» ni otras sustituciones no sustentadas por este versículo.
