translation:
  language: es
  text: Pero el que no supo y, sin embargo, hizo lo que merecía golpes, recibirá pocos.[a] De todo aquel a quien se le dio mucho, mucho se le requerirá; y de aquel a quien se le confió mucho, le pedirán más.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: «será golpeado con pocos golpes». El español puede dejar implícito «golpes» por el contexto inmediato, como hace la traducción inglesa auditada.'
    reason: lexical_alternative
  - marker: b
    text: 'Alternativa posible: «le exigirán más». «Pedirán» conserva mejor la distinción verbal con «se le requerirá» y mantiene el sujeto indefinido del griego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ γνοὺς
  english_pob_choice: the one who did not know
  chosen_spanish: el que no supo
  alternatives_spanish:
  - el que no sabía
  - el que no conoció
  lexicon: BDAG γινώσκω
  rationale: El participio aoristo substantivado expresa falta de conocimiento en un caso concreto; «no supo» es natural en español y conserva esa falta de conocimiento sin añadir una ignorancia más fuerte de la que el texto exige.
- source_word: ποιήσας δὲ ἄξια πληγῶν
  english_pob_choice: yet did what deserved blows
  chosen_spanish: y sin embargo hizo cosas dignas de golpes
  alternatives_spanish:
  - y aun así hizo lo que merecía golpes
  - pero hizo lo que merecía una golpiza
  lexicon: BDAG ἄξιος; πληγή
  rationale: «Dignas de golpes» preserva la relación de mérito del castigo sin convertirla en una abstracción. «Golpes» refleja πληγαί de forma concreta y menos interpretativa que «castigo» o «golpiza».
- source_word: δαρήσεται ὀλίγας
  english_pob_choice: will receive few
  chosen_spanish: recibirá pocos
  alternatives_spanish:
  - será golpeado con pocos golpes
  - recibirá pocos golpes
  lexicon: BDAG δέρω; ὀλίγος
  rationale: Siguiendo el audit trail inglés, el objeto «golpes» puede quedar implícito en español para mayor fluidez. «Recibirá pocos» mantiene la idea de una medida menor de disciplina y deja el sustantivo entendido por el contexto inmediato.
- source_word: παντὶ δὲ ᾧ ἐδόθη πολύ
  english_pob_choice: From everyone to whom much was given
  chosen_spanish: A todo el que se le dio mucho
  alternatives_spanish:
  - A todo aquel a quien mucho fue dado
  - A todo el que recibió mucho
  lexicon: BDAG δίδωμι
  rationale: La pasiva conserva el dato de que el don viene de fuera, sin especificar agente. «Se le dio» es idiomático en español y mantiene la construcción de atribución de responsabilidad.
- source_word: πολὺ ζητηθήσεται παρ’ αὐτοῦ
  english_pob_choice: much will be required
  chosen_spanish: mucho se le requerirá
  alternatives_spanish:
  - mucho se le exigirá
  - mucho se pedirá de él
  lexicon: BDAG ζητέω
  rationale: «Requerir» reproduce bien el valor de exigencia o rendición de cuentas del pasivo de ζητέω. El dativo pronominal español expresa de manera natural el «de él» implícito en παρά con genitivo.
- source_word: καὶ ᾧ παρέθεντο πολύ
  english_pob_choice: and from the one to whom they entrusted much
  chosen_spanish: y de aquel a quien se le confió mucho
  alternatives_spanish:
  - y de aquel a quien le encomendaron mucho
  - y de aquel a quien le entregaron mucho en custodia
  lexicon: BDAG παρατίθημι
  rationale: «Confiar» y la pasiva refleja «se le confió» captan la idea de depósito o encargo sin introducir un sujeto explícito. Esto respeta la ambigüedad del plural indefinido del griego y del audit trail inglés.
- source_word: περισσότερον αἰτήσουσιν αὐτόν
  english_pob_choice: they will ask even more of him
  chosen_spanish: le pedirán más
  alternatives_spanish:
  - le exigirán aún más
  - le reclamarán más
  lexicon: BDAG αἰτέω
  rationale: αἰτέω puede oscilar entre «pedir» y «exigir». En este contexto de mayordomía, «le pedirán más» preserva la diferencia con ζητηθήσεται y mantiene el sujeto indefinido sin forzarlo hacia una formulación más dura que el texto.
theological_decisions:
- issue: Imágenes de disciplina y juicio
  english_pob_reading: Retain the concrete disciplinary imagery ('blows') without softening it into a vague consequence or intensifying it into a specific judicial system.
  chosen_spanish_reading: Conservar la imagen concreta de golpes y medida de responsabilidad sin convertirla en un sistema penal más específico ni en una mera consecuencia abstracta.
  alternative_spanish_readings:
  - castigo
  - azotes
  - consecuencia
  rationale: El griego presenta una imagen graduada de responsabilidad y disciplina. «Golpes» y el lenguaje de requerimiento conservan esa tensión sin resolver si se trata de castigo corporal literal, imagen parabólica o principio moral general.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Sujeto indefinido de las últimas cláusulas
  english_pob_reading: Keep the indefinite plural 'they' in 'they entrusted' / 'they will ask' rather than specifying God explicitly.
  chosen_spanish_reading: 'Mantener el sujeto indefinido en voz pasiva o impersonal: «se le confió» y «le pedirán».'
  alternative_spanish_readings:
  - Dios le confió... Dios le pedirá
  - la gente le confió... le pedirán
  rationale: El griego usa formas verbales en plural sin sujeto explícito. El español puede conservar esa indeterminación con pasiva refleja e impersonal, evitando identificar al agente más allá de lo que el texto dice.
  doctrine_reference: No importar una identificación doctrinal del agente que el texto no explicita.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés auditado: conserva el contraste con «sin embargo/y», evita especificar un agente explícito en las cláusulas finales y refleja la paralela relación entre «se le requerirá» y «le pedirán más» sin añadir sujeto doctrinal.'
  spanish_consistency_notes:
  - Se mantuvo «golpes» para πληγαί, en coherencia con el término base preferido por la POB.
  - Se evitó «SEÑOR» u otras convenciones no pertinentes; no hay teónimos en el versículo.
  - Se usó la pasiva refleja «se le dio / se le confió» para preservar el indefinido griego y una prosa española natural.
  - «Requerirá» y «pedirán» mantienen la diferencia de matiz entre ζητέω y αἰτέω.
  - La puntuación separa con punto y coma la segunda sentencia para reflejar el cambio de principio general dentro del versículo.
