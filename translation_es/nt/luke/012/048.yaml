  rationale: La revisión corrige un pequeño desajuste sintáctico respecto de la lógica de rendición de cuentas del original («De todo aquel…»), mejora la naturalidad de «hizo cosas dignas de golpes» a una formulación más idiomática en español, y pule la redacción de la nota [a] sin alterar las decisiones exegéticas ni teológicas del audit trail.
