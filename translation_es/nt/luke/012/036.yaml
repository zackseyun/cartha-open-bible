review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura exhortativa, la espera vigilante, el regreso desde las bodas y la prontitud de abrir. Sin embargo, hay dos desajustes con la evidencia y el audit trail: (1) el anclaje de la nota [a] está puesto sobre «señor» aunque la nota trata de «de las bodas»; (2) «llame» para κρούσαντος suaviza el sentido físico de ‘tocar/llamar a la puerta’, y en este contexto «toque» o «llame a la puerta» preserva mejor la imagen de alguien que llega y pide entrada.'
  spanish_quality_summary: El español es claro, digno y natural. «Y ustedes, sean como hombres...» funciona bien en registro eclesial amplio. «Su señor» es defendible y legible en contexto parabólico. Conviene corregir la colocación de la nota y afinar «llame» a «toque» para mayor precisión imagética y cercanía al griego.
  glossary_alignment: No hay conflicto con los términos doctrinales mayores del proyecto. κύριος aquí como superior humano puede verterse como «señor» en minúscula. ἀνθρώποις como «hombres» concuerda con la política documentada. El único problema de terminología es más bien de precisión verbal en κρούσαντος.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «señor», pero su contenido explica «de las bodas».
    rationale: Los marcadores deben aparecer en la palabra o frase relevante. Tal como está, induce a pensar que la nota comenta κύριος en vez de γάμων.
  - severity: medium
    issue: «Llame» para κρούσαντος es menos preciso que «toque» en este contexto de abrir la puerta.
    rationale: Aunque «llamar» puede ser idiomático en español, κρούω denota golpear/tocar. Dado que el contexto inmediato es abrirle, «cuando venga y toque» conserva mejor la escena concreta sin sonar forzado.
  revised_spanish_text: Y ustedes, sean como hombres que esperan a su señor cuando vuelva de las bodas[a], para que, cuando venga y toque, le abran en seguida.
  revised_footnotes:
  - marker: a
    text: O «de la boda» o «de la fiesta de bodas». El plural griego puede referirse al conjunto de las celebraciones nupciales.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al sintagma correcto («de las bodas») y se ajusta «llame» a «toque» para reflejar mejor κρούσαντος en la imagen de abrir la puerta. El resto del texto puede mantenerse.
