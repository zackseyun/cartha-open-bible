    changes_summary: Changed 'lord' to 'master' for more natural and contextually appropriate rendering of κύριον here; otherwise retained the draft.
translation:
  language: es
  text: Y ustedes, sean como hombres que esperan a su señor cuando vuelva de las bodas[a], para que, cuando venga y toque, le abran en seguida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la boda» o «de la fiesta de bodas». El plural griego puede referirse al conjunto de las celebraciones nupciales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: And you
  chosen_spanish: Y ustedes
  alternatives_spanish:
  - Y vosotros
  - Y ustedes mismos
  lexicon: SBLGNT
  rationale: El pronombre plural se conserva de forma natural en español con «ustedes». Evita un giro artificial y mantiene la apelación directa del texto.
- source_word: ὅμοιοι
  english_pob_choice: be like
  chosen_spanish: sean como
  alternatives_spanish:
  - sean semejantes a
  - son como
  lexicon: BDAG
  rationale: El griego expresa comparación exhortativa; en español, «sean como» transmite mejor ese valor imperativo implícito que una simple descripción.
- source_word: ἀνθρώποις
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - gente
  lexicon: BDAG
  rationale: Se conserva el plural masculino representativo que el inglés POB preserva con «men». «Hombres» mantiene el valor gramatical y el marco de la parábola sin neutralizarlo.
- source_word: προσδεχομένοις
  english_pob_choice: waiting for
  chosen_spanish: que esperan
  alternatives_spanish:
  - que aguardan
  - que están esperando
  lexicon: BDAG
  rationale: El participio expresa espera expectante y disposición. «Que esperan» es natural en español y conserva la noción de vigilancia sin añadir emoción ajena al texto.
- source_word: κύριον
  english_pob_choice: master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su dueño
  lexicon: BDAG
  rationale: Aunque el audit trail inglés pasó de «lord» a «master», en español «señor» es la forma más directa y sobria para un superior humano en una parábola. Evita introducir una carga de «amo» más dura de la que el contexto exige, y mantiene la tensión semántica de κύριος sin convertirlo en título divino aquí.
- source_word: πότε ἀναλύσῃ
  english_pob_choice: when he returns
  chosen_spanish: cuando vuelva
  alternatives_spanish:
  - cuando regrese
  - cuando retorne
  lexicon: BDAG
  rationale: ἀναλύω aquí apunta al regreso desde un evento, no simplemente a «irse». «Cuando vuelva» reproduce de modo natural el movimiento de retorno implicado por el contexto inmediato.
- source_word: ἐκ τῶν γάμων
  english_pob_choice: from the wedding feast
  chosen_spanish: de las bodas
  alternatives_spanish:
  - de la fiesta de bodas
  - de las celebraciones de bodas
  lexicon: BDAG
  rationale: El plural γάμων puede referirse al conjunto de las celebraciones nupciales. «De las bodas» preserva ese plural y la amplitud del sentido; la frase no se reduce a una sola ceremonia ni se añade innecesariamente «feast» como glosa interpretativa al texto principal.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce la finalidad de la exhortación. «Para que» es la equivalencia española más directa y natural.
- source_word: ἐλθόντος καὶ κρούσαντος
  english_pob_choice: when he comes and knocks
  chosen_spanish: cuando venga y llame
  alternatives_spanish:
  - cuando llegue y llame
  - cuando venga y toque
  lexicon: BDAG
  rationale: El genitivo absoluto se vierte temporalmente. «Llame» comunica de forma idiomática el acto de tocar a la puerta en español; «toque» sería posible, pero «llame» encaja mejor con la secuencia de acceso a la casa.
- source_word: εὐθέως
  english_pob_choice: at once
  chosen_spanish: en seguida
  alternatives_spanish:
  - de inmediato
  - al instante
  lexicon: BDAG
  rationale: El adverbio exige prontitud. «En seguida» es claro, moderno y conserva la inmediatez sin excesiva rigidez.
- source_word: ἀνοίξωσιν αὐτῷ
  english_pob_choice: they may open to him
  chosen_spanish: le abran
  alternatives_spanish:
  - le abran la puerta
  - le abran para él
  lexicon: BDAG
  rationale: El objeto «puerta» está implícito en el contexto; el español permite omitirlo con naturalidad. «Le abran» sigue de cerca el griego y evita añadir un sustantivo no expresado.
theological_decisions:
- issue: κύριος en una parábola doméstica
  english_pob_reading: master
  chosen_spanish_reading: su señor
  alternative_spanish_readings:
  - su amo
  - su dueño
  rationale: El audit trail inglés prefirió «master» por el contexto doméstico, pero en español «señor» conserva mejor el valor relacional y evita una dureza innecesaria. No se usa «Señor» con mayúscula porque aquí no funciona como título divino, aunque la palabra griega sea la misma que puede referirse a Dios en otros contextos.
  doctrine_reference: 'DOCTRINE.md: κύριος, distinción contextual entre señorío humano y título divino'
- issue: Plural masculino ἀνθρώποις
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - personas
  - gente
  rationale: Se mantiene el plural masculino representativo del griego y del inglés POB. No se neutraliza a «personas» porque eso borraría una señal gramatical que el proyecto ha decidido preservar en este contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «lord» a «master» en una revisión posterior para κύριος. En español se optó por «su señor», buscando un equivalente natural y sobrio para un superior humano en la parábola, sin perder la posibilidad semántica de κύριος ni introducir un título divino.
  spanish_consistency_notes:
  - Se usa «ustedes» como forma plural estándar y neutral para el español latinoamericano.
  - Se preserva la comparación exhortativa con «sean como».
  - «Le abran» mantiene el objeto implícito de la puerta, tal como ocurre en el griego.
  - No se capitaliza «señor» porque el contexto no refiere al título divino.
