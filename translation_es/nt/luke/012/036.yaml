source:
  edition: SBLGNT
  text: καὶ ὑμεῖς ὅμοιοι ἀνθρώποις προσδεχομένοις τὸν κύριον ἑαυτῶν πότε ἀναλύσῃ ἐκ τῶν γάμων, ἵνα ἐλθόντος καὶ κρούσαντος εὐθέως ἀνοίξωσιν αὐτῷ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/012/036.yaml
  text: And you[a], be like men waiting for their master when he returns from the wedding feast, so that when he comes and knocks[b], they may open to him at once.
  footnotes:
  - marker: a
    text: Or 'from the wedding' or 'from the marriage feast.' The Greek plural can refer to the wedding festivities as a whole.
    reason: lexical_alternative
  - marker: b
    text: Or 'master' for 'lord.' Greek kyrios can denote a human superior as well as the divine title 'Lord.'
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
