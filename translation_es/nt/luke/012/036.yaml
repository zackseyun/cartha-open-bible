- from: Y ustedes, sean como hombres que esperan a su señor[a] cuando vuelva de las bodas, para que, cuando venga y llame, le abran en seguida.
  to: Y ustedes, sean como hombres que esperan a su señor cuando vuelva de las bodas[a], para que, cuando venga y toque, le abran en seguida.
  rationale: Se reubica la nota al sintagma correcto («de las bodas») y se ajusta «llame» a «toque» para reflejar mejor κρούσαντος en la imagen de abrir la puerta. El resto del texto puede mantenerse.
