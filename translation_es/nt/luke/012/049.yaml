translation:
  language: es
  text: He venido a arrojar fuego sobre la tierra[a], ¡y cuánto deseo que ya estuviera encendido!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «¿y qué quiero si ya se ha encendido?». La cláusula griega es difícil; el texto principal refleja el sentido idiomático probable de un deseo intenso.'
    reason: alternative_reading
lexical_decisions:
- source_word: Πῦρ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - un fuego
  lexicon: BDAG
  rationale: El sustantivo anartro se traduce de forma natural como ‘fuego’. Se conserva la imagen sin interpretarla en el texto principal como ‘juicio’ o ‘purificación’, para no resolver la tensión teológica del dicho.
- source_word: ἦλθον
  english_pob_choice: I came
  chosen_spanish: he venido
  alternatives_spanish:
  - vine
  - he llegado
  lexicon: BDAG
  rationale: Aunque el aoristo puede reflejarse con ‘vine’, en español ‘he venido’ resulta más natural y mantiene bien la idea de misión o propósito de Jesús. ‘He venido’ conserva la referencia al acto de llegada con fuerza de estado resultante presente.
- source_word: βαλεῖν
  english_pob_choice: to cast
  chosen_spanish: arrojar
  alternatives_spanish:
  - echar
  - lanzar
  lexicon: BDAG
  rationale: βάλλω expresa la acción vívida de lanzar/castear. ‘Arrojar’ conserva mejor el tono enfático y la fuerza imagística que ‘poner’ o ‘traer’.
- source_word: ἐπὶ τὴν γῆν
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - sobre la tierra/ el mundo
  - sobre la tierra
  lexicon: BDAG
  rationale: γῆ puede ser ‘tierra’, ‘suelo’ o ‘país’. Aquí el alcance es amplio y universal, por lo que ‘la tierra’ comunica bien el ámbito total sin reducirlo a una región. ‘Sobre’ refleja ἐπί con naturalidad en español.
- source_word: καὶ τί θέλω εἰ ἤδη ἀνήφθη;
  english_pob_choice: and how I wish it were already kindled!
  chosen_spanish: ¡y cómo deseo que ya estuviera encendido!
  alternatives_spanish:
  - ¿y qué quiero si ya se ha encendido?
  - ¡y cuánto quisiera que ya estuviera encendido!
  lexicon: BDAG
  rationale: 'La cláusula es difícil y admite una lectura más literal interrogativa, pero el sentido idiomático más probable en contexto es exclamativo: expresa un deseo intenso. ‘Estuviera encendido’ conserva la idea de estado ya iniciado sin forzar una explicación interpretativa en el texto principal.'
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya
  - todavía
  lexicon: BDAG
  rationale: ἤδη marca que la acción deseada debería estar cumplida en este momento. ‘Ya’ es la equivalencia más natural y directa en español.
- source_word: ἀνήφθη
  english_pob_choice: were kindled
  chosen_spanish: estuviera encendido
  alternatives_spanish:
  - estuviera encendido
  - hubiera sido encendido
  - estuviera prendido
  lexicon: BDAG
  rationale: El pasivo de ἀνάπτω se expresa con ‘encenderse/estar encendido’. ‘Encendido’ preserva la imagen del fuego y suena más dignificado que ‘prendido’.
theological_decisions:
- issue: Sentido de ‘fuego’ en el dicho de Jesús
  english_pob_reading: Retain the metaphor as 'fire' without specifying whether it refers to judgment, purification, the Spirit, or division.
  chosen_spanish_reading: Conservar la metáfora como ‘fuego’ sin especificar si se trata de juicio, purificación, el Espíritu o división.
  alternative_spanish_readings:
  - juicio
  - purificación
  - el Espíritu Santo
  - la crisis divisiva de la misión de Jesús
  rationale: El versículo no define el símbolo; traducirlo como ‘fuego’ preserva la ambigüedad productiva y la tensión teológica documentada por la POB en inglés. No se introduce una interpretación cerrada en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Fuerza de la cláusula difícil τί θέλω εἰ ἤδη ἀνήφθη
  english_pob_reading: 'Render as an exclamation of desire: ''how I wish it were already kindled!'''
  chosen_spanish_reading: 'Renderizarla como exclamación de deseo: ‘¡cómo deseo que ya estuviera encendido!’'
  alternative_spanish_readings:
  - ‘¿y qué quiero si ya se ha encendido?’
  - ‘¡cuánto quisiera que ya estuviera encendido!’
  rationale: La forma literal interrogativa es posible, pero en español resulta menos natural y no transmite tan bien el ímpetu del dicho. La exclamación refleja la lectura idiomática documentada en el audit trail y conserva la tensión del texto sin resolverla doctrinalmente.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source meaning in readable modern Spanish.'
translation_notes:
  revision_awareness: 'El texto sigue la versión auditada en inglés sin cambios de fondo: conserva la metáfora de ‘fuego’, mantiene la lectura idiomática exclamativa de la cláusula difícil y no añade interpretaciones doctrinales no explicitadas por el griego o por el audit trail inglés. La única adaptación relevante es la naturalización al español de ‘I came’ como ‘he venido’ y de ‘kindled’ como ‘encendido’.'
  spanish_consistency_notes:
  - Se mantiene ‘tierra’ para γῆ en sentido amplio y no se sustituye por ‘mundo’, porque el audit trail inglés opta por el alcance universal de ‘earth’.
  - Se evita ‘SEÑOR’ u otras sustituciones teológicas no presentes en el texto, ya que no aparece κύριος ni el Nombre divino en este versículo.
  - Se conserva el registro solemne con ‘arrojar’ y ‘fuego’, evitando suavizar la imagen.
  - La nota al pie se ancla en la cláusula difícil para preservar la variante literal sin desplazar la lectura principal.
