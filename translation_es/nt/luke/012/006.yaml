translation:
  language: es
  text: ¿No se venden cinco gorriones por dos assaria[a]? Sin embargo, ni uno de ellos está olvidado delante de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por dos monedas de cobre' o 'por dos moneditas'; el griego nombra la moneda como assaria, pequeñas monedas romanas de cobre.
    reason: cultural_note
  - marker: b
    text: O 'es pasado por alto a la vista de Dios'.
    reason: lexical_alternative
lexical_decisions:
- source_word: στρουθία
  english_pob_choice: sparrows
  chosen_spanish: gorriones
  alternatives_spanish:
  - pajarillos
  - pájaros pequeños
  lexicon: BDAG
  rationale: El griego puede referirse a pequeños pájaros, y en contexto el equivalente natural en español es 'gorriones'. Como el POB inglés eligió 'sparrows' por especificidad y uso bíblico común, 'gorriones' mantiene esa precisión sin sonar forzado.
- source_word: πωλοῦνται
  english_pob_choice: are sold
  chosen_spanish: se venden
  alternatives_spanish:
  - son vendidos
  - se venden por
  lexicon: BDAG
  rationale: La forma pasiva/medio-pasiva se expresa de modo natural en español con 'se venden'. Conserva el valor de venta sin introducir un agente.
- source_word: ἀσσαρίων δύο
  english_pob_choice: for two assaria
  chosen_spanish: por dos assaria
  alternatives_spanish:
  - por dos monedas de cobre
  - por dos cuartos
  lexicon: BDAG
  rationale: Se conserva el nombre específico de la moneda antigua para no borrar el dato histórico-cultural del griego, siguiendo la decisión inglesa de mantener 'assaria' en el texto principal.
- source_word: ἐπιλελησμένον
  english_pob_choice: forgotten
  chosen_spanish: olvidado
  alternatives_spanish:
  - pasado por alto
  - desatendido
  lexicon: BDAG
  rationale: 'El perfecto participial comunica un estado resultante: no está olvidado. ''Olvidado'' es la forma más directa y fiel en español; ''pasado por alto'' introduce una matiz interpretativo que el inglés reservó como alternativa.'
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en la presencia de Dios
  - a la vista de Dios
  lexicon: BDAG
  rationale: '''Delante de Dios'' reproduce bien la preposición relacional/judicial de ἐνώπιον y suena natural en español bíblico contemporáneo. Se evita uniformar a ''en la presencia'' porque puede sonar más expansivo que el griego.'
- source_word: οὐχὶ ... ;
  english_pob_choice: Are not ... ?
  chosen_spanish: ¿No ... ?
  alternatives_spanish:
  - ¿Acaso no ... ?
  - ¿No es cierto que ... ?
  lexicon: BDAG
  rationale: La pregunta retórica busca una respuesta afirmativa. '¿No...?' conserva esa fuerza de manera idiomática en español.
- source_word: καὶ ἓν ἐξ αὐτῶν
  english_pob_choice: Yet not one of them
  chosen_spanish: Y ni uno de ellos
  alternatives_spanish:
  - Y no uno de ellos
  - Y ni siquiera uno de ellos
  lexicon: BDAG
  rationale: El contraste se expresa con 'Y ni uno de ellos', manteniendo la idea enfática de que ni uno solo queda olvidado. 'Y' reproduce el enlace griego sin atenuar la transición retórica.
theological_decisions:
- issue: Cuidado providencial de Dios por criaturas insignificantes
  english_pob_reading: not one of them is forgotten before God
  chosen_spanish_reading: ni uno de ellos está olvidado delante de Dios
  alternative_spanish_readings:
  - ni uno de ellos es pasado por alto delante de Dios
  - ni uno de ellos es olvidado por Dios
  rationale: La traducción mantiene la afirmación de conocimiento y atención divina sin convertirla en una elaboración doctrinal más amplia. 'Delante de Dios' conserva el encuadre del texto, y 'olvidado' deja abierta la tensión lexical que el POB inglés también preserva con su nota alternativa.
  doctrine_reference: Preservar la tensión lexical y la afirmación de cuidado divino sin expandirla más allá del enunciado del verso.
translation_notes:
  revision_awareness: Se siguió de cerca el auditorial inglés de POB, manteniendo el nombre de la moneda antigua en el texto principal y reflejando la alternativa lexical de ἐπιλελησμένον en una nota. No se adoptaron equivalentes modernizados para la moneda en el texto principal para no borrar el dato histórico del original.
  spanish_consistency_notes:
  - Se prefirió 'gorriones' por ser el equivalente bíblico natural y específico de στρουθία en este contexto.
  - Se mantuvo 'assaria' sin castellanizar para respetar la decisión de conservar el nombre de la moneda del original.
  - '''Delante de Dios'' se usó de forma consistente con el valor relacional/judicial de ἐνώπιον.'
  - La formulación negativa enfática 'ni uno' refleja el griego y conserva el contraste retórico del verso.
