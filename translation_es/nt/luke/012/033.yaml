  glossary_alignment: No hay conflictos con la terminología base del proyecto. «limosna» refleja bien ἐλεημοσύνη en línea con la revisión inglesa auditada; «en los cielos» preserva correctamente el plural de οὐρανοῖς. La mejora principal es precisar βαλλάντια.
