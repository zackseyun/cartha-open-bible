translation:
  language: es
  text: Vendan sus posesiones y den limosna[a]. Háganse bolsas de dinero que no se desgasten, un tesoro inagotable en los cielos[b], donde ningún ladrón se acerca ni la polilla destruye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término griego se refiere a actos de misericordia expresados en dar a los necesitados.
    reason: lexical_alternative
  - marker: b
    text: 'O «en el cielo». El griego tiene el plural: «en los cielos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πωλήσατε
  english_pob_choice: Sell
  chosen_spanish: Vendan
  alternatives_spanish:
  - Vendan sus bienes
  - Vendan
  lexicon: BDAG
  rationale: El aoristo imperativo plural expresa una acción decidida; «Vendan» comunica el mandato con naturalidad en español. Evita añadir la idea de liquidación total que no está explicitada en el griego.
- source_word: τὰ ὑπάρχοντα ὑμῶν
  english_pob_choice: your possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - lo que tienen
  - sus pertenencias
  lexicon: BDAG
  rationale: ὑπάρχοντα refiere a los bienes o propiedad de alguien. «Sus posesiones» es idiomático y conserva el sentido de pertenencia material.
- source_word: δότε ἐλεημοσύνην
  english_pob_choice: give alms
  chosen_spanish: den limosna
  alternatives_spanish:
  - den limosna
  - den caridad
  - hagan limosna
  lexicon: BDAG
  rationale: ἐλεημοσύνη designa dar a los necesitados; «limosna» conserva el valor lexical de la acción de dar a los pobres sin volverlo institucional. En español, «den limosna» mantiene el registro formal y la referencia concreta a la ayuda material.
- source_word: ποιήσατε ἑαυτοῖς
  english_pob_choice: Make for yourselves
  chosen_spanish: Hagan para ustedes
  alternatives_spanish:
  - Háganse
  - Provean para ustedes
  lexicon: BDAG
  rationale: La construcción reflexiva indica beneficio propio. «Hagan para ustedes» preserva la estructura y evita suavizar el mandato.
- source_word: βαλλάντια
  english_pob_choice: money bags
  chosen_spanish: bolsas
  alternatives_spanish:
  - bolsas para dinero
  - bolsas de dinero
  - monederos
  lexicon: BDAG
  rationale: βαλλάντιον es una bolsa o bolsa para dinero. En español, «bolsas» mantiene la imagen concreta; el complemento «que no se desgasten» deja claro que se trata del recipiente, no de una billetera moderna.
- source_word: μὴ παλαιούμενα
  english_pob_choice: that do not wear out
  chosen_spanish: que no se desgasten
  alternatives_spanish:
  - que no envejezcan
  - que no se echen a perder
  lexicon: BDAG
  rationale: El participio alude a algo que no se vuelve viejo o gastado. «Que no se desgasten» es natural en español para un objeto de uso y refleja bien la imagen de durabilidad.
- source_word: θησαυρὸν ἀνέκλειπτον
  english_pob_choice: an unfailing treasure
  chosen_spanish: un tesoro inagotable
  alternatives_spanish:
  - un tesoro inextinguible
  - un tesoro que no falla
  lexicon: BDAG
  rationale: ἀνέκλειπτος comunica que no se agota ni falla. «Inagotable» conserva la idea de abundancia permanente de manera clara y digna.
- source_word: ἐν τοῖς οὐρανοῖς
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: BDAG
  rationale: El plural griego se mantiene con «los cielos», respetando la forma de la fuente y la idiomática bíblica, en lugar de reducirlo a un singular tradicional.
- source_word: ὅπου κλέπτης οὐκ ἐγγίζει
  english_pob_choice: where no thief comes near
  chosen_spanish: donde ningún ladrón se acerca
  alternatives_spanish:
  - donde ningún ladrón llega
  - donde ningún ladrón se aproxima
  lexicon: BDAG
  rationale: ἐγγίζω significa acercarse o venir cerca. «Se acerca» reproduce la imagen espacial de forma natural en español.
- source_word: οὐδὲ σὴς διαφθείρει
  english_pob_choice: and no moth destroys
  chosen_spanish: ni la polilla destruye
  alternatives_spanish:
  - ni la polilla arruina
  - ni la polilla corrompe
  lexicon: BDAG
  rationale: σής es polilla y διαφθείρω aquí expresa destruir/arruinar por consumo. «Destruye» conserva el paralelismo con el ladrón y el contraste con el tesoro imperecedero.
theological_decisions:
- issue: Sentido de ἐλεημοσύνην en un mandato de desprendimiento y generosidad
  english_pob_reading: give alms
  chosen_spanish_reading: den limosna
  alternative_spanish_readings:
  - den limosna
  - den caridad
  rationale: La orden se dirige a una dádiva concreta hacia los necesitados; «den limosna» preserva esa referencia sin ampliar innecesariamente el alcance a un programa económico más amplio. Se evita traducirlo como una virtud abstracta.
  doctrine_reference: Translation philosophy sections 1 and 6
- issue: Retención del plural ἐν τοῖς οὐρανοῖς
  english_pob_reading: in the heavens
  chosen_spanish_reading: en los cielos
  alternative_spanish_readings:
  - en el cielo
  rationale: Se conserva el plural para reflejar la forma del griego y su textura semítica, sin alterar la enseñanza del texto. La pluralidad no se interpreta doctrinalmente aquí, sino como rasgo lingüístico.
  doctrine_reference: Translation philosophy sections 1 and 5
translation_notes:
  revision_awareness: La redacción española sigue el último estado revisado del POB inglés, que prefirió «give alms» frente a «give to the poor» para reflejar con más precisión ἐλεημοσύνην y mantener un registro más formal. También conserva la decisión de respetar el plural de ἐν τοῖς οὐρανοῖς como «en los cielos».
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - «Limosna» se usa aquí por fidelidad a ἐλεημοσύνην y a la nota lexical del auditrack; no se sustituye por «caridad» porque esa palabra puede sonar más institucional que personal.
  - «Cielos» conserva el plural griego y armoniza con el estilo de la serie POB.
  - Los verbos imperativos plurales en segunda persona del trato formal («Vendan», «den», «Hagan») mantienen claridad y reverencia sin caer en calco rígido.
