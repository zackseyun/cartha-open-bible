base_translation:
  language: en
  yaml_path: translation/nt/luke/012/033.yaml
  text: Sell your possessions and give alms[a]. Make for yourselves money bags that do not wear out, an unfailing treasure in the heavens[b], where no thief comes near and no moth destroys.
  footnotes:
  - marker: a
    text: Or 'give alms.' The Greek term refers to acts of mercy expressed in giving to the needy.
    reason: lexical_alternative
  - marker: b
    text: Or 'in heaven.' Greek has the plural, 'in the heavens.'
    reason: lexical_alternative
