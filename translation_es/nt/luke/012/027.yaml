translation:
  language: es
  text: 'Fíjense en los lirios[a], cómo crecen: no trabajan ni hilan; pero les digo: ni siquiera Salomón en toda su gloria[b] se vistió como uno de ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las flores silvestres' o 'las flores'; el griego dice específicamente 'lirios'.
    reason: lexical_alternative
  - marker: b
    text: O 'con toda su magnificencia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατανοήσατε
  english_pob_choice: Consider
  chosen_spanish: Consideren
  alternatives_spanish:
  - Observen
  - Piensen cuidadosamente en
  lexicon: BDAG
  rationale: El imperativo aoristo pide atención reflexiva y no solo mirar. 'Consideren' mantiene la llamada a una observación deliberada y suena natural en español bíblico contemporáneo.
- source_word: τὰ κρίνα
  english_pob_choice: the lilies
  chosen_spanish: los lirios
  alternatives_spanish:
  - las flores silvestres
  - las flores
  lexicon: BDAG
  rationale: κρίνα nombra específicamente lirios; aunque el trasfondo de la enseñanza abarca la vegetación del campo, el texto griego es más preciso y conviene conservar esa especificidad.
- source_word: πῶς αὐξάνει
  english_pob_choice: how they grow
  chosen_spanish: cómo crecen
  alternatives_spanish:
  - cómo crece
  - de qué manera crecen
  lexicon: BDAG
  rationale: En español, el plural concuerda de modo natural con 'los lirios'. 'Cómo' conserva el matiz de modo/forma de crecimiento del adverbio griego.
- source_word: οὐ κοπιᾷ
  english_pob_choice: they do not labor
  chosen_spanish: no trabajan
  alternatives_spanish:
  - no se fatigan
  - no se afanan
  lexicon: BDAG
  rationale: κοπιάω expresa labor intensa o afanarse. 'Trabajan' comunica bien la idea en contraste con la actividad humana implicada en producir ropa, sin sonar demasiado técnico.
- source_word: οὐδὲ νήθει
  english_pob_choice: or spin
  chosen_spanish: ni hilan
  alternatives_spanish:
  - ni tejen
  - ni hilan hilo
  lexicon: BDAG
  rationale: νήθω significa hilar fibras o hilo. 'Hilan' es el equivalente más directo y mantiene el paralelismo con el trabajo humano de vestir.
- source_word: λέγω δὲ ὑμῖν
  english_pob_choice: yet I tell you
  chosen_spanish: pero les digo
  alternatives_spanish:
  - sin embargo, les digo
  - y les digo
  lexicon: BDAG
  rationale: δέ aquí introduce transición y contraste leve. 'Pero' transmite bien ese giro retórico desde la observación hasta la afirmación enfática.
- source_word: οὐδὲ Σολομὼν
  english_pob_choice: not even Solomon
  chosen_spanish: ni siquiera Salomón
  alternatives_spanish:
  - ni Salomón siquiera
  - no aun Salomón
  lexicon: BDAG
  rationale: 'οὐδὲ añade una negación enfática: aun el rey paradigmático no alcanza el nivel de los lirios. ''Ni siquiera'' es la forma natural y enfática en español.'
- source_word: ἐν πάσῃ τῇ δόξῃ αὐτοῦ
  english_pob_choice: in all his glory
  chosen_spanish: en toda su gloria
  alternatives_spanish:
  - con todo su esplendor
  - en todo su esplendor
  lexicon: BDAG
  rationale: δόξα aquí apunta al brillo regio de Salomón. 'Gloria' conserva la continuidad bíblica del término y el matiz de magnificencia real.
- source_word: περιεβάλετο
  english_pob_choice: was clothed
  chosen_spanish: se vistió
  alternatives_spanish:
  - fue vestido
  - estuvo vestido
  lexicon: BDAG
  rationale: La forma media/pasiva se expresa de manera idiomática como 'se vistió' en español. Mantiene la imagen de la vestidura sin sobrecargar la agencia verbal.
- source_word: ὡς ἓν τούτων
  english_pob_choice: like one of these
  chosen_spanish: como uno de ellos
  alternatives_spanish:
  - como uno de estos
  - como uno de estos lirios
  lexicon: BDAG
  rationale: La comparación final remite a los lirios mencionados; 'uno de ellos' es fluido y natural en español, y el referente inmediato queda claro por el contexto.
theological_decisions:
- issue: Alcance de κρίνα
  english_pob_reading: Specific 'lilies' retained rather than generalized to 'flowers' or 'wildflowers.'
  chosen_spanish_reading: Se mantiene 'lirios' sin generalizar a 'flores' o 'flores silvestres'.
  alternative_spanish_readings:
  - las flores
  - las flores silvestres
  rationale: El griego usa un término específico. No hay necesidad teológica de ampliar el referente, y conservarlo respeta la primacía del texto original sobre la tradición de paráfrasis.
  doctrine_reference: Primacía del texto original y transparencia de la traducción
- issue: Matiz de δόξα aplicado a Salomón
  english_pob_reading: Rendered as 'glory' rather than 'splendor.'
  chosen_spanish_reading: Se traduce como 'gloria' y no 'esplendor'.
  alternative_spanish_readings:
  - esplendor
  - magnificencia
  rationale: Ambas opciones son posibles, pero 'gloria' preserva la continuidad léxica bíblica y mantiene visible el vínculo con el lenguaje de honor y magnificencia real presente en el contexto.
  doctrine_reference: Consistencia terminológica y resonancia bíblica
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés; no hubo revisiones aplicadas en la etapa más reciente, y la redacción española sigue de cerca las decisiones léxicas aprobadas sin introducir generalizaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene el singular colectivo natural en español para 'lirios' mediante concordancia verbal plural ('crecen').
  - '''Trabajan ni hilan'' conserva el paralelismo de dos actividades humanas, evitando términos más interpretativos como ''afanarse'' o ''tejer''.'
  - '''Ni siquiera'' expresa adecuadamente la fuerza enfática de οὐδὲ.'
  - '''Gloria'' se usa en sentido de magnificencia regia, no como honor abstracto, según el contexto inmediato.'
  - Los marcadores de nota al pie se colocan solo donde hay alternativa léxica documentada en el texto inglés.
