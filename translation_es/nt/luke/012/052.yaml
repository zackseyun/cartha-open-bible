translation:
  language: es
  text: Porque desde ahora habrá cinco en una casa[a] divididos, tres contra dos y dos contra tres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hogar». El griego puede referirse tanto a la casa como al grupo familiar que vive en ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσονται
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - serán
  - van a haber
  lexicon: BDAG
  rationale: El griego usa el futuro de εἰμί con valor existencial; en español, «habrá» expresa de manera natural la presencia futura de personas en el escenario, sin imponer un sujeto personal donde el texto presenta una situación.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conserva la fuerza explicativa que enlaza con la declaración anterior sobre la división. «Porque» es natural al inicio de la oración en español y mantiene la relación causal/explicativa.
- source_word: ἀπὸ τοῦ νῦν
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - a partir de ahora
  - desde este momento
  lexicon: BDAG
  rationale: Expresa fielmente el sentido temporal prospectivo del giro griego con una fórmula idiomática y clara en español actual.
- source_word: πέντε
  english_pob_choice: five
  chosen_spanish: cinco
  lexicon: BDAG
  rationale: Numeral directo y sin carga interpretativa adicional.
- source_word: ἐν ἑνὶ οἴκῳ
  english_pob_choice: in one house
  chosen_spanish: en una casa
  alternatives_spanish:
  - en un hogar
  - en una casa / en un hogar
  lexicon: BDAG
  rationale: Se preserva el valor más literal de οἶκος como «casa», mientras la nota permite la alternativa «hogar»/unidad doméstica que el contexto inmediato puede sugerir. En español, «casa» suena natural y deja abierta la referencia al ámbito familiar sin resolverla demasiado pronto.
- source_word: διαμεμερισμένοι
  english_pob_choice: divided
  chosen_spanish: divididos
  alternatives_spanish:
  - separados
  - partidos
  lexicon: BDAG
  rationale: El participio perfecto pasivo de διαμερίζω indica un estado resultante de división. «Divididos» reproduce bien ese estado y mantiene la tensión relacional del pasaje.
- source_word: τρεῖς ἐπὶ δυσὶν
  english_pob_choice: three against two
  chosen_spanish: tres contra dos
  alternatives_spanish:
  - tres frente a dos
  - tres en contra de dos
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo expresa oposición en un grupo dividido. «Contra» es la opción más clara y natural en español para conservar la fuerza adversativa.
- source_word: καὶ δύο ἐπὶ τρισίν
  english_pob_choice: and two against three
  chosen_spanish: y dos contra tres
  alternatives_spanish:
  - y dos frente a tres
  - y dos en contra de tres
  lexicon: BDAG
  rationale: Mantiene el paralelismo y la simetría del griego con la misma solución traductora que la frase anterior.
theological_decisions:
- issue: οἶκος puede referirse tanto a la casa física como a la unidad familiar/hogar
  english_pob_reading: house, with household as a viable alternative preserved in a footnote
  chosen_spanish_reading: casa, con la alternativa «hogar» preservada en nota
  alternative_spanish_readings:
  - hogar
  - unidad doméstica
  rationale: La frase inmediata habla de relaciones familiares divididas, por lo que el referente social es claro; sin embargo, el sustantivo griego es literalmente «casa». Se conserva esa forma en el texto principal para no sobreinterpretar, y se documenta la alternativa semántica en nota para reflejar el alcance del término.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preservar la tensión interpretativa sin resolverla de más'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente indicada en el expediente: no se reportan cambios necesarios; la redacción española mantiene esa estabilidad y refleja el mismo juicio de equivalencia óptima.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se mantiene «casa» en el texto principal para respetar οἶκος, con nota explicando la alternativa de «hogar».
  - Se traduce ἐπί con dativo como «contra» para conservar la oposición entre los grupos.
  - La puntuación reproduce la cadencia del griego y la relación explicativa de γάρ con «Porque».
