review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: discurso continuado a los grupos, observación meteorológica, reacción inmediata, anuncio de lluvia/aguacero y confirmación de que así ocurre. Sin embargo, «dicen» en tercera persona rompe la correspondencia directa con el segundo plural griego λέγετε y con el vocativo implícito del discurso de Jesús a las multitudes.'
  spanish_quality_summary: El español es claro y natural, pero «Él también estaba hablando» suena algo más pesado que «También decía», y el cambio de persona en «Cuando vean... dicen» produce una ligera incoherencia discursiva. «A las multitudes» es aceptable, aunque «a las multitudes» mantiene un registro bíblico comprensible.
  glossary_alignment: No hay términos del glosario mayor en juego. La nota léxica sobre ὄμβρος está bien orientada; en español conviene formular la alternativa de modo más idiomático que «una lluvia viene».
  issues:
  - severity: medium
    issue: Incoherencia de persona verbal en «Cuando vean ... dicen»
    rationale: El griego usa segunda persona plural tanto en ἴδητε como en λέγετε. Pasar a tercera persona plural en «dicen» debilita la continuidad del discurso dirigido a los oyentes.
  - severity: low
    issue: «Él también estaba hablando» suena menos natural que una forma imperfecta simple
    rationale: Aunque aspectualmente defendible, «estaba hablando» aquí resulta algo perifrástico. «También decía» preserva mejor el trasfondo narrativo y fluye con más naturalidad en español bíblico moderno.
  - severity: low
    issue: Redacción mejorable de la nota alternativa
    rationale: «Una lluvia viene» es comprensible, pero menos idiomático que «viene lluvia» o «viene la lluvia» para expresar la alternativa léxica en español.
  revised_spanish_text: 'También decía a las multitudes[a]: «Cuando vean una nube que se levanta en el oeste, enseguida dicen: “Viene un aguacero”, y así sucede».'
  revised_footnotes:
  - marker: a
    text: O «viene lluvia». El griego ὄμβρος puede denotar lluvia en general o un aguacero/chaparrón más específicamente.
    reason: lexical_alternative
  revision_rationale: Se ajusta la narración a un imperfecto más natural en español («También decía»), se conserva la segunda persona plural en toda la sentencia proverbial («vean ... dicen»), y se mejora la idiomaticidad de la nota alternativa sin alterar la decisión léxica principal.
