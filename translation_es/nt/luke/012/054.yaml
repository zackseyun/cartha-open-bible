revisions:
- from: 'Él también estaba hablando a las multitudes[a]: «Cuando vean una nube que se levanta en el oeste, enseguida dicen: “Viene un aguacero”, y así sucede».'
  to: 'También decía a las multitudes[a]: «Cuando vean una nube que se levanta en el oeste, enseguida dicen: “Viene un aguacero”, y así sucede».'
  rationale: Se ajusta la narración a un imperfecto más natural en español («También decía»), se conserva la segunda persona plural en toda la sentencia proverbial («vean ... dicen»), y se mejora la idiomaticidad de la nota alternativa sin alterar la decisión léxica principal.
