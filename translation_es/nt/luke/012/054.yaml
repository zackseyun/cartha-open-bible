translation:
  language: es
  text: 'También decía a las multitudes[a]: «Cuando vean una nube que se levanta en el oeste, enseguida dicen: “Viene un aguacero”, y así sucede».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «viene lluvia». El griego ὄμβρος puede denotar lluvia en general o un aguacero/chaparrón más específicamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  english_pob_choice: He was also saying
  chosen_spanish: también estaba hablando
  alternatives_spanish:
  - también decía
  - también estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso o reiterada; «estaba hablando» conserva ese valor aspectual sin sonar forzado en español. Se mantiene el matiz aditivo de καὶ con «también».
- source_word: δὲ καὶ
  english_pob_choice: was also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - además
  lexicon: BDAG
  rationale: La combinación añade continuidad y adición; «también» reproduce esa fuerza sin sobrecargar la coordinación.
- source_word: τοῖς ὄχλοις
  english_pob_choice: to the crowds
  chosen_spanish: a las multitudes
  alternatives_spanish:
  - a la multitud
  - a las masas
  lexicon: BDAG
  rationale: El plural es explícito en griego. «Multitudes» preserva el plural mejor que un singular colectivo y es natural en español bíblico moderno.
- source_word: Ὅταν ἴδητε
  english_pob_choice: When you see
  chosen_spanish: Cuando vean
  alternatives_spanish:
  - Siempre que vean
  - Cuando ustedes vean
  lexicon: BDAG
  rationale: Ὅταν con subjuntivo aoristo expresa una contingencia general futura; en español, el presente de subjuntivo en una cláusula temporal condicional («cuando vean») transmite bien ese sentido.
- source_word: νεφέλην
  english_pob_choice: a cloud
  chosen_spanish: una nube
  alternatives_spanish:
  - una nube de lluvia
  - una nube oscura
  lexicon: BDAG
  rationale: El sustantivo significa simplemente «nube»; el contexto meteorológico aporta la implicación de lluvia, por lo que conviene mantener el término básico.
- source_word: ἀνατέλλουσαν
  english_pob_choice: rising
  chosen_spanish: que se levanta
  alternatives_spanish:
  - que sube
  - que aparece
  lexicon: BDAG
  rationale: El participio alude a elevarse o surgir; «que se levanta» conserva la imagen de ascenso y funciona bien con «nube».
- source_word: ἐπὶ δυσμῶν
  english_pob_choice: in the west
  chosen_spanish: en el oeste
  alternatives_spanish:
  - desde el oeste
  - sobre el horizonte occidental
  lexicon: BDAG
  rationale: En este contexto observacional, «en el oeste» reproduce el sentido direccional de manera natural en español.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: «Enseguida» es idiomático en español y conserva la inmediatez de εὐθέως.
- source_word: λέγετε
  english_pob_choice: you say
  chosen_spanish: dicen
  alternatives_spanish:
  - ustedes dicen
  - dicen ustedes
  lexicon: BDAG
  rationale: Aquí el presente tiene valor habitual o proverbial. En español, la tercera persona plural genérica resulta natural en el refrán citado.
- source_word: ὅτι
  english_pob_choice: that / introducing direct speech as quotation punctuation
  chosen_spanish: dos puntos para introducir la cita
  alternatives_spanish:
  - que
  - porque
  lexicon: BDAG
  rationale: ὅτι introduce el contenido del dicho; en español, la puntuación con dos puntos comunica con claridad la cita directa sin añadir una conjunción innecesaria.
- source_word: Ὄμβρος
  english_pob_choice: a rainstorm
  chosen_spanish: un aguacero
  alternatives_spanish:
  - una lluvia
  - una tormenta de lluvia
  lexicon: BDAG
  rationale: Ὄμβρος puede referirse a lluvia en general o a un chaparrón/aguacero más concreto. «Aguacero» preserva ese matiz fuerte de precipitación repentina sin sonar demasiado técnico.
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está llegando
  - se acerca
  lexicon: BDAG
  rationale: El presente con fuerza inminente se puede expresar naturalmente con «viene» en español, manteniendo la inmediatez del anuncio.
- source_word: καὶ γίνεται οὕτως
  english_pob_choice: and so it happens
  chosen_spanish: y así sucede
  alternatives_spanish:
  - y así ocurre
  - y resulta así
  lexicon: BDAG
  rationale: La frase afirma que la predicción se cumple; «y así sucede» conserva la confirmación sin añadir interpretaciones.
translation_notes:
  revision_awareness: El texto griego y el auditorial inglés están en alto acuerdo; no se requieren revisiones textuales especiales. La principal decisión de traducción es conservar el valor aspectual del imperfecto y el matiz meteorológico de ὄμβρος sin perder naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda al tetragrama; este versículo no lo contiene.
  - Se usa «multitudes» para reflejar el plural de ὄχλοις.
  - «Aguacero» se eligió por su fuerza concreta; la nota preserva la alternativa más general «lluvia».
  - La cita directa se introduce con dos puntos en lugar de traducir ὅτι con «que», para reflejar mejor la estructura del español.
