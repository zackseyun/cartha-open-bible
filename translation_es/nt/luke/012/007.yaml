translation:
  language: es
  text: Pero aun los cabellos de su cabeza han sido todos contados[a][b]. No tengan miedo; ustedes valen más que muchos gorriones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «están numerados».
    reason: lexical_alternative
  - marker: b
    text: La traducción tradicional a menudo dice «están numerados» en lugar de «han sido contados».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ
  english_pob_choice: But even
  chosen_spanish: Pero aun
  alternatives_spanish:
  - Y aun
  - Pero también
  lexicon: BDAG
  rationale: ἀλλά introduce contraste y καί añade énfasis. «Pero aun» conserva el giro adversativo e intensificador sin sonar forzado en español.
- source_word: αἱ τρίχες τῆς κεφαλῆς ὑμῶν
  english_pob_choice: the hairs of your head
  chosen_spanish: los cabellos de vuestra cabeza
  alternatives_spanish:
  - los cabellos de su cabeza
  - los pelos de la cabeza de ustedes
  lexicon: BDAG
  rationale: «Cabellos» es natural y digno en español bíblico contemporáneo. Se mantiene la imagen concreta del original con el posesivo plural «vuestra» para reflejar el griego plural.
- source_word: πᾶσαι
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno
  - enteramente
  lexicon: BDAG
  rationale: El distributivo plural se integra naturalmente en «están todos contados», preservando la idea de totalidad de manera idiomática.
- source_word: ἠρίθμηνται
  english_pob_choice: have all been counted
  chosen_spanish: están todos contados
  alternatives_spanish:
  - han sido contados
  - están numerados
  lexicon: BDAG
  rationale: El perfecto pasivo comunica un estado resultante. «Están todos contados» mantiene el resultado presente y evita una traducción excesivamente literal o arcaica.
- source_word: μὴ φοβεῖσθε
  english_pob_choice: Do not fear
  chosen_spanish: No temáis
  alternatives_spanish:
  - No tengan miedo
  - No os asustéis
  lexicon: BDAG
  rationale: La forma imperativa plural se traduce de manera directa. «No temáis» conserva el tono bíblico y la fuerza verbal del mandato.
- source_word: πολλῶν στρουθίων
  english_pob_choice: many sparrows
  chosen_spanish: muchos gorriones
  alternatives_spanish:
  - muchos pardillos
  - muchos pájaros pequeños
  lexicon: BDAG
  rationale: El término específico del contexto es «gorrión». En español, «gorriones» comunica con naturalidad la especie evocada por στρουθίον y mantiene la continuidad temática con el valor comparativo del verso.
- source_word: διαφέρετε
  english_pob_choice: you are worth more than
  chosen_spanish: valéis más que
  alternatives_spanish:
  - sois más valiosos que
  - tenéis más valor que
  lexicon: BDAG
  rationale: El verbo expresa comparación de valor, no mera diferencia. «Valéis más que» es claro, breve y conserva la fuerza del argumento de menor a mayor.
theological_decisions:
- issue: Comparación del valor humano frente a los gorriones
  english_pob_reading: you are worth more than many sparrows
  chosen_spanish_reading: valéis más que muchos gorriones
  alternative_spanish_readings:
  - sois más valiosos que muchos gorriones
  - tenéis más valor que muchos gorriones
  rationale: La frase expresa el cuidado atento de Dios por los discípulos mediante un argumento de menor a mayor. «Valéis más» conserva la comparación sin ampliar el alcance filosófico del texto.
  doctrine_reference: Cuidado providente de Dios; mantener la tensión teológica del texto sin suavizarla.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el auditorial inglés en la equivalencia funcional: perfecto pasivo como estado resultante, imperativo negativo directo y comparación de valor en lenguaje natural español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se evita «Cristo» porque no hay título mesiánico en el verso.
  - Se usa el plural reverencial/relacional «vuestra» para reflejar el plural griego.
  - Se conserva el tono de seguridad pastoral sin añadir explicaciones devocionales ajenas al verso.
