translation:
  language: es
  text: 'Entonces les contó una parábola[a]: «La tierra de cierto hombre rico produjo abundantemente».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dio mucho fruto» o «fue muy productiva».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ
  english_pob_choice: Then he told
  chosen_spanish: Entonces les contó
  alternatives_spanish:
  - Y les dijo
  - Ahora les contó
  lexicon: BDAG
  rationale: δέ funciona aquí como una transición narrativa suave; «entonces» conserva el avance del relato sin forzar contraste. «Contó» es más natural en español con «parábola» que un calco como «dijo una parábola».
- source_word: παραβολὴν
  english_pob_choice: a parable
  chosen_spanish: una parábola
  alternatives_spanish:
  - una ilustración
  lexicon: BDAG
  rationale: «Parábola» mantiene la categoría literaria propia de los evangelios y evita diluir el género en un término más general.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: En español, el dativo se expresa con naturalidad mediante el pronombre indirecto «les», que preserva el sentido de dirección de la habla sin sobrecargar la frase.
- source_word: λέγων
  english_pob_choice: saying
  alternatives_spanish:
  - diciendo
  - y dijo
  lexicon: BDAG
  rationale: El participio introduce el contenido de la parábola; en español puede integrarse naturalmente por dos puntos sin necesidad de repetir un verbo de habla adicional.
- source_word: Ἀνθρώπου τινὸς πλουσίου
  english_pob_choice: of a certain rich man
  chosen_spanish: de cierto hombre rico
  alternatives_spanish:
  - de un hombre rico
  - de un rico
  lexicon: BDAG
  rationale: 'El genitivo expresa pertenencia o relación: «la tierra de cierto hombre rico». «Cierto» refleja τινός y conserva la indefinición narrativa. Se mantiene «hombre» para respetar el referente masculino explícito.'
- source_word: εὐφόρησεν
  english_pob_choice: produced abundantly
  chosen_spanish: produjo abundantemente
  alternatives_spanish:
  - dio mucho fruto
  - fue muy productiva
  - rindió abundantemente
  lexicon: BDAG
  rationale: εὐφορέω se usa de producir bien o en abundancia, especialmente de la tierra. «Produjo abundantemente» es claro y fiel; «dio mucho fruto» añade una imagen no explicitada en el griego, aunque compatible en contexto agrícola.
- source_word: ἡ χώρα
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el campo
  - la finca
  - la tierra de cultivo
  lexicon: BDAG
  rationale: En este contexto χώρα alude a tierra o terreno agrícola bajo posesión, no a un país. «Tierra» es natural en español y conserva la relación posesiva con el hombre rico.
translation_notes:
  revision_awareness: Se tuvo en cuenta que la versión inglesa POB eligió «land» para χώρα y una nota con alternativas para εὐφόρησεν. La redacción española conserva esa misma distinción agrícola y reproduce la ambigüedad léxica relevante en una nota breve.
  spanish_consistency_notes:
  - Se mantiene el género masculino de «hombre» porque el griego usa Ἀνθρώπου τινὸς πλουσίου.
  - «Tierra» traduce aquí χώρα en sentido agrario, no geográfico-político.
  - La puntuación con dos puntos integra naturalmente el participio λέγων en español sin perder la dependencia del discurso directo.
