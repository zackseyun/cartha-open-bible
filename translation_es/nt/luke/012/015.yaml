review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español refleja fielmente el sentido del griego: la doble advertencia imperativa («Ὁρᾶτε καὶ φυλάσσεσθε») queda bien expresada en «Estén atentos y guárdense»; «ἀπὸ πάσης πλεονεξίας» se comunica adecuadamente con «de toda clase de avaricia»; y la cláusula causal sobre la vida y las posesiones preserva correctamente la idea de que la vida no consiste en la abundancia de lo que uno posee.'
  spanish_quality_summary: El español es natural, claro y digno, con registro bíblico moderno y buena legibilidad eclesial amplia. La redacción fluye bien y evita calcos forzados. «La vida de uno» suena aceptable en este contexto proverbial, y «sus bienes» es idiomático y preciso.
  glossary_alignment: No hay términos del glosario de proyecto en juego que entren en conflicto. La decisión «avaricia» para πλεονεξία concuerda con la amplitud semántica documentada, y la nota alternativa con «codicia» preserva la alternativa léxica relevante del rastro inglés.
  issues:
  - severity: low
    issue: Matiz entre «avaricia» y «codicia»
    rationale: Aunque «avaricia» funciona bien en el texto principal, «codicia» también sería una opción fuerte por su cercanía a πλεονεξία. Sin embargo, la nota al pie ya preserva esta alternativa, así que no hace falta revisión.
  - severity: low
    issue: «La vida de uno» podría sonar levemente formularia
    rationale: En algunos contextos «la vida de una persona» sería más coloquial, pero aquí «la vida de uno» mantiene bien el valor genérico del original y el tono sentencioso del dicho.
