translation:
  language: es
  text: 'Entonces les dijo: «Estén atentos y guárdense[a] de toda clase de avaricia, porque la vida de uno no consiste en la abundancia de sus bienes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de toda codicia». El griego πλεονεξία puede denotar avaricia, codicia o afán de adquirir más.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁρᾶτε
  english_pob_choice: Watch out
  chosen_spanish: Estén atentos
  alternatives_spanish:
  - Miren
  - Presten atención
  - Estén en guardia
  lexicon: BDAG
  rationale: El imperativo plural aquí tiene fuerza de advertencia. «Estén atentos» comunica la alerta de modo natural en español moderno y conserva el tono preventivo del original sin sonar demasiado coloquial.
- source_word: φυλάσσεσθε
  english_pob_choice: guard yourselves
  chosen_spanish: guárdense
  alternatives_spanish:
  - protéjanse
  - manténganse en guardia
  - cuídense
  lexicon: BDAG
  rationale: El verbo medio/reflexivo expresa vigilancia sobre uno mismo. «Guárdense» preserva esa idea reflexiva y complementa bien la advertencia inicial.
- source_word: ἀπὸ πάσης πλεονεξίας
  english_pob_choice: from every kind of greed
  chosen_spanish: de toda clase de avaricia
  alternatives_spanish:
  - de toda codicia
  - de toda forma de avaricia
  - de toda avidez
  lexicon: BDAG
  rationale: πλεονεξία abarca avaricia, codicia y deseo de tener más. «Avaricia» es clara y bíblica en español; «toda clase de» representa bien πάσης como advertencia inclusiva contra toda manifestación de ese vicio.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la advertencia. «Porque» mantiene la relación causal de forma natural y directa en español.
- source_word: οὐκ ἐν τῷ περισσεύειν τινὶ
  english_pob_choice: does not consist in the abundance
  chosen_spanish: no consiste en la abundancia
  alternatives_spanish:
  - no está en tener abundancia
  - no proviene de la abundancia
  - no se define por la abundancia
  lexicon: BDAG
  rationale: La construcción indica que la vida no está constituida por la abundancia. «No consiste en la abundancia» es fiel, conciso y idiomático en español.
- source_word: ἡ ζωὴ αὐτοῦ
  english_pob_choice: one’s life
  chosen_spanish: la vida de uno
  alternatives_spanish:
  - la vida de una persona
  - su vida
  - la vida de cada uno
  lexicon: BDAG
  rationale: El griego usa un pronombre masculino singular con valor genérico. «La vida de uno» conserva ese valor inclusivo sin convertirlo en masculino específico.
- source_word: ἐκ τῶν ὑπαρχόντων αὐτῷ
  english_pob_choice: of his possessions
  chosen_spanish: de sus bienes
  alternatives_spanish:
  - de sus posesiones
  - de lo que posee
  - de sus pertenencias
  lexicon: BDAG
  rationale: ὑπάρχοντα se refiere a las pertenencias o bienes de alguien. «Bienes» es natural en español bíblico y comunica propiedad/posesiones con suficiente amplitud.
theological_decisions:
- issue: Sentido inclusivo del dicho
  english_pob_reading: one’s life ... his possessions
  chosen_spanish_reading: la vida de uno ... sus bienes
  alternative_spanish_readings:
  - su vida ... sus bienes
  - la vida de una persona ... sus bienes
  rationale: El dicho es general, no limitado a varones. «La vida de uno» mantiene el valor genérico del griego y evita restringir el alcance del proverbio.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Alcance de πλεονεξία
  english_pob_reading: every kind of greed
  chosen_spanish_reading: toda clase de avaricia
  alternative_spanish_readings:
  - toda codicia
  - toda forma de avaricia
  rationale: El término griego puede incluir codicia, avaricia y afán de acumular. «Avaricia» comunica el campo moral amplio en español, sin reducirlo a una sola situación legal o social.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 6
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por una revisión menor: de «a person’s life» a «one’s life» para reforzar el valor genérico. En español se reflejó directamente con «la vida de uno», manteniendo el mismo efecto inclusivo y la misma claridad.'
  spanish_consistency_notes:
  - 'Se conservó la advertencia doble con dos imperativos: «Estén atentos» y «guárdense».'
  - Se evitó «SEÑOR» o términos de sustitución innecesarios, porque el versículo no contiene el nombre divino.
  - Se usó «bienes» para ὑπαρχόντων por ser un equivalente amplio y natural en español, coherente con el contexto de posesiones.
