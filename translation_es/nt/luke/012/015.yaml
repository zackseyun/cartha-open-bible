  text: εἶπεν δὲ πρὸς αὐτούς· Ὁρᾶτε καὶ φυλάσσεσθε ἀπὸ ⸀πάσης πλεονεξίας, ὅτι οὐκ ἐν τῷ περισσεύειν τινὶ ἡ ζωὴ ⸀αὐτοῦ ἐστιν ἐκ τῶν ὑπαρχόντων ⸀αὐτῷ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/012/015.yaml
  text: Then he said to them[a], “Watch out and guard yourselves from every kind of greed, because one’s life does not consist in the abundance of his possessions.”
  footnotes:
  - marker: a
    text: Or “from all covetousness.” The Greek πλεονεξία can denote greed, covetousness, or acquisitiveness.
    reason: lexical_alternative
