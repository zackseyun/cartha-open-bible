translation:
  language: es
  text: Porque, cuando vas con tu acusador[a] ante un magistrado, haz un esfuerzo en el camino por ser liberado de él, no sea que te arrastre ante el juez, y el juez te entregue al agente judicial, y el agente judicial te arroje a la cárcel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para llegar a un acuerdo con él». La frase griega es literalmente «ser liberado de él», pero en contexto probablemente se refiere a resolver el caso antes de que llegue ante el juez.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς γὰρ
  english_pob_choice: For as
  chosen_spanish: Porque, mientras
  alternatives_spanish:
  - Porque, como
  - Pues, mientras
  lexicon: BDAG
  rationale: Conserva la función explicativa de γάρ y el marco comparativo-temporal de ὡς. En español, «mientras» comunica con naturalidad la simultaneidad del viaje y la acción exhortativa sin volver la frase rígida.
- source_word: ὑπάγεις
  english_pob_choice: you are going
  chosen_spanish: vas
  alternatives_spanish:
  - te diriges
  - vas caminando
  lexicon: BDAG
  rationale: El verbo expresa desplazamiento en curso; «vas» es natural y suficientemente preciso en este contexto legal de camino a una autoridad.
- source_word: ἀντιδίκου
  english_pob_choice: accuser
  chosen_spanish: acusador
  alternatives_spanish:
  - adversario
  - oponente en juicio
  lexicon: BDAG
  rationale: Como en el contexto se trata de una parte en litigio que presenta una acusación, «acusador» conserva la fuerza legal del término y evita suavizarlo con un mero «adversario».
- source_word: ἄρχοντα
  english_pob_choice: magistrate
  chosen_spanish: magistrado
  alternatives_spanish:
  - gobernante
  - funcionario
  lexicon: BDAG
  rationale: Aquí ἄρχων funciona como autoridad civil ante la cual se presenta el caso; «magistrado» mantiene el sentido administrativo-judicial más que el genérico «gobernante».
- source_word: δὸς ἐργασίαν
  english_pob_choice: make an effort
  chosen_spanish: haz un esfuerzo
  alternatives_spanish:
  - esfuérzate
  - aplica diligencia
  lexicon: BDAG
  rationale: La construcción idiomática combina dar con una noción de actividad aplicada; «haz un esfuerzo» reproduce la fuerza exhortativa en español moderno sin arcaísmo.
- source_word: ἀπηλλάχθαι ἀπ’ αὐτοῦ
  english_pob_choice: to be released from him
  chosen_spanish: ser liberado de él
  alternatives_spanish:
  - quedar libre de él
  - llegar a un acuerdo con él
  lexicon: BDAG
  rationale: La literalidad del infinitivo pasivo apunta a quedar libre de la reclamación o control del acusador. «Ser liberado de él» mantiene esa relación verbal. La opción «llegar a un acuerdo con él» queda como alternativa interpretativa, no como sustitución del sentido base.
- source_word: μήποτε κατασύρῃ σε πρὸς τὸν κριτήν
  english_pob_choice: lest he drag you to the judge
  chosen_spanish: no sea que te arrastre hasta el juez
  alternatives_spanish:
  - no sea que te lleve ante el juez
  - no vaya a arrastrarte al juez
  lexicon: BDAG
  rationale: «Arrastre» preserva la imagen violenta del verbo y «hasta el juez» conserva el movimiento coercitivo hacia la autoridad judicial.
- source_word: κριτήν / κριτής
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - magistrado
  - jueza
  lexicon: BDAG
  rationale: El sustantivo es el término legal estándar; «juez» es la equivalencia directa y natural en español.
- source_word: παραδώσει
  english_pob_choice: hand you over
  chosen_spanish: te entregue
  alternatives_spanish:
  - te entregue en manos de
  - te ponga en manos de
  lexicon: BDAG
  rationale: «Entregue» conserva la transferencia judicial implícita en el verbo y funciona de manera fluida en español.
- source_word: πράκτορι / πράκτωρ
  english_pob_choice: officer
  chosen_spanish: oficial
  alternatives_spanish:
  - alguacil
  - ejecutor
  lexicon: BDAG
  rationale: El término designa al funcionario que ejecuta la decisión judicial. «Oficial» es amplio y comprensible; «alguacil» sería más culturalmente específico, pero no necesariamente más claro para todo público hispanohablante.
- source_word: βαλεῖ εἰς φυλακήν
  english_pob_choice: throw you into prison
  chosen_spanish: te arroje a la cárcel
  alternatives_spanish:
  - te lance a la prisión
  - te meta en prisión
  lexicon: BDAG
  rationale: «Arroje» preserva la imagen enérgica de βάλλω y «cárcel» es la forma más natural en español para φυλακή en este contexto.
theological_decisions:
- issue: Alcance interpretativo de la escena legal
  english_pob_reading: Retain the legal image without making the spiritual application explicit in the verse itself.
  chosen_spanish_reading: Conservar la imagen legal sin explicitar dentro del versículo la aplicación espiritual o escatológica.
  alternative_spanish_readings:
  - Reformular como una exhortación a reconciliarse con Dios antes del juicio final.
  - Identificar explícitamente al acusador, al juez y a la cárcel con realidades teológicas.
  rationale: El texto griego presenta una analogía jurídica concreta; la aplicación más amplia depende del contexto inmediato y no está expresada de forma directa en este versículo. Por fidelidad al original, la traducción mantiene la escena sin importar una interpretación doctrinal al cuerpo del versículo.
  doctrine_reference: Principios de traducción POB sobre no introducir interpretaciones no explícitas en el texto base
translation_notes:
  revision_awareness: Alineado con el último pase de revisión, no se registraron cambios aplicados al texto base inglés; la versión española sigue la misma decisión de mantener la escena jurídica literal con una nota alternativa para la posible implicación de conciliación. Se preserva el tono exhortativo y la secuencia procesal del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «acusador» y «juez» por coherencia con el campo jurídico del pasaje.
  - Se evita «siervo» u otra terminología eclesiástica ajena al contexto legal.
  - La nota a pie de página marca la alternativa interpretativa sin reemplazar el sentido principal del texto.
