review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la escena legal y sigue de cerca las decisiones del POB en la mayoría de los puntos: «acusador», «magistrado», «haz un esfuerzo», «ser liberado de él», «juez», «te entregue», y la nota alternativa sobre llegar a un acuerdo. Sin embargo, «Porque, mientras vas...» no preserva bien la fuerza comparativa-explicativa de ὡς γὰρ («Porque, como / Pues, cuando»), y «hasta el juez» debilita ligeramente πρὸς τὸν κριτήν al sonar más espacial que judicial. Además, «oficial» para πράκτωρ es comprensible, pero «agente judicial» o «alguacil» comunica mejor el rol ejecutor sin depender de un anglicismo semántico amplio.'
  spanish_quality_summary: El español es claro y ampliamente legible. No obstante, la apertura «Porque, mientras vas...» suena algo pesada y menos natural que una formulación más directa. También conviene afinar el registro jurídico de πράκτωρ para que el encadenamiento procesal quede más claro en español. La nota está bien redactada y útil.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son consistentes con el POB. La revisión propuesta solo ajusta naturalidad y precisión legal: «Porque, cuando vas...» y «agente judicial».'
  issues:
  - severity: medium
    issue: «Porque, mientras vas» no reproduce de la mejor manera ὡς γὰρ
    rationale: ὡς γὰρ introduce una explicación con matiz comparativo/ilustrativo, no meramente simultáneo. «Mientras» desplaza el foco a la simultaneidad y suena algo forzado en español en este contexto proverbial.
  - severity: low
    issue: «hasta el juez» es menos preciso que «ante/al juez»
    rationale: πρὸς τὸν κριτήν expresa movimiento dirigido al juez dentro de un proceso legal. «Hasta» puede sonar principalmente locativo; «ante el juez» o «al juez» encaja mejor con el marco jurídico.
  - severity: medium
    issue: «oficial» para πράκτωρ es demasiado amplio en español
    rationale: Aunque inteligible, «oficial» no comunica claramente que se trata del funcionario que ejecuta la orden judicial. «Agente judicial» mantiene neutralidad panhispánica y mayor precisión legal.
  revised_spanish_text: Porque, cuando vas con tu acusador[a] ante un magistrado, haz un esfuerzo en el camino por ser liberado de él, no sea que te arrastre ante el juez, y el juez te entregue al agente judicial, y el agente judicial te arroje a la cárcel.
  revised_footnotes:
