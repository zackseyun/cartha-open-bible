revisions:
- from: Porque, mientras vas con tu acusador[a] ante un magistrado, haz un esfuerzo en el camino por ser liberado de él, no sea que te arrastre hasta el juez, y el juez te entregue al oficial, y el oficial te arroje a la cárcel.
  to: Porque, cuando vas con tu acusador[a] ante un magistrado, haz un esfuerzo en el camino por ser liberado de él, no sea que te arrastre ante el juez, y el juez te entregue al agente judicial, y el agente judicial te arroje a la cárcel.
  rationale: Se ajusta la apertura para reflejar mejor ὡς γὰρ en español natural, se afina la preposición con «ante el juez» para el movimiento jurídico, y se reemplaza «oficial» por «agente judicial» para representar con mayor precisión el rol de πράκτωρ. La nota léxica se conserva porque refleja correctamente la alternativa interpretativa documentada por el POB.
  reviewer_model: gpt-5.4
