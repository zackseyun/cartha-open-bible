  text: ὡς γὰρ ὑπάγεις μετὰ τοῦ ἀντιδίκου σου ἐπ’ ἄρχοντα, ἐν τῇ ὁδῷ δὸς ἐργασίαν ἀπηλλάχθαι ἀπ’ αὐτοῦ, μήποτε κατασύρῃ σε πρὸς τὸν κριτήν, καὶ ὁ κριτής σε ⸀παραδώσει τῷ πράκτορι, καὶ ὁ πράκτωρ σε ⸀βαλεῖ εἰς φυλακήν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/012/058.yaml
  text: For as you are going with your accuser before a magistrate[a], make an effort on the way to be released from him, lest he drag you to the judge, and the judge hand you over to the officer, and the officer throw you into prison.
  footnotes:
  - marker: a
    text: Or 'to settle with him.' The Greek wording is literally 'to be released from him,' but in context it likely refers to resolving the case before it reaches the judge.
    reason: lexical_alternative
