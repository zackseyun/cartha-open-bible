translation:
  language: es
  text: Bienaventurado aquel esclavo a quien su señor[a], cuando venga, hallará haciendo así.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Bienaventurado aquel esclavo a quien su amo, cuando venga, hallará haciendo así». El griego κύριος puede referirse al superior doméstico del esclavo («amo» o «señor») y, en una aplicación más amplia, también puede oírse con resonancia de «Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: BDAG
  rationale: Conserva el tono de bienaventuranza y el peso religioso del término mejor que opciones más psicológicas o circunstanciales. En español, 'Bienaventurado' es natural y solemne en este contexto.
- source_word: δοῦλος
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: BDAG
  rationale: El término griego puede referirse a un esclavo o siervo. En la política terminológica del proyecto, 'esclavo' preserva mejor la fuerza léxica básica; el contexto parabólico de casa y señor no elimina esa realidad de dependencia.
- source_word: κύριος
  english_pob_choice: master
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - Señor
  lexicon: BDAG
  rationale: En la escena inmediata la relación es doméstica y de autoridad, por lo que 'señor' comunica con naturalidad la figura del superior del esclavo. 'Señor' con mayúscula podría sugerir una decisión cristológica no obligada por el texto inmediato; 'amo' es más duro y menos natural en este registro.
- source_word: ἐλθὼν
  english_pob_choice: when he comes
  chosen_spanish: cuando venga
  alternatives_spanish:
  - cuando llegue
  - habiendo venido
  lexicon: BDAG
  rationale: La cláusula temporal expresa bien la acción futura del regreso en español con 'cuando venga', que es idiomática y mantiene la relación temporal con 'hallará'.
- source_word: εὑρήσει
  english_pob_choice: will find
  chosen_spanish: hallará
  alternatives_spanish:
  - encontrará
  lexicon: BDAG
  rationale: '''Hallará'' suena más elevado y literario en español bíblico sin dejar de ser claro. ''Encontrará'' sería correcto, pero menos marcado en este contexto solemne.'
- source_word: ποιοῦντα οὕτως
  english_pob_choice: doing thus
  chosen_spanish: haciendo así
  alternatives_spanish:
  - obrando así
  - actuando de esta manera
  lexicon: BDAG
  rationale: '''Haciendo así'' reproduce con sencillez la referencia al comportamiento ya descrito. ''Así'' mantiene la deixis del griego; ''obrando así'' es posible, pero algo más interpretativo.'
- source_word: ἐκεῖνος
  english_pob_choice: that
  chosen_spanish: aquel
  alternatives_spanish:
  - ese
  - ese mismo
  lexicon: BDAG
  rationale: El demostrativo aporta énfasis y especificidad; 'aquel' reproduce mejor esa distancia destacada que 'ese'.
theological_decisions:
- issue: 'κύριος en una parábola: ¿figura doméstica o resonancia cristológica?'
  english_pob_reading: Rendered as 'master' in the main text, with a footnote preserving the possible 'Lord' reading.
  chosen_spanish_reading: '''señor'' en el texto principal, sin capitalización cristológica'
  alternative_spanish_readings:
  - '''Señor'' con mayúscula'
  - '''amo'''
  rationale: El marco inmediato es el de una casa, un esclavo y su superior; por eso 'señor' expresa la relación social sin resolver el término hacia una lectura cristológica explícita. La tensión entre sentido parabólico y posible aplicación escatológica queda preservada en la redacción sin imponer una solución.
  doctrine_reference: 'DOCTRINE.md: κύριος default ''Lord''; preserve theological tension rather than resolve it'
- issue: δοῦλος y la fuerza de dependencia en el contexto parabólico
  english_pob_reading: '''servant'' retained for contextual role while acknowledging slave/bondservant lexical range.'
  chosen_spanish_reading: '''esclavo'''
  alternative_spanish_readings:
  - '''siervo'''
  - '''servidor'''
  rationale: En español, 'siervo' puede suavizar indebidamente la fuerza del vocablo. 'Esclavo' mantiene la relación de propiedad y obediencia que el griego permite, sin añadir una doctrina distinta; el contexto doméstico sigue siendo claro.
  doctrine_reference: 'DOCTRINE.md: δοῦλος normally ''esclavo'' where lexical force requires; context-sensitive exceptions documented'
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido y la estructura del griego SBLGNT, y toma en cuenta la decisión inglesa de mantener la imagen doméstica sin borrar la posible resonancia teológica de κύριος. La revisión inglesa finalizó en 'doing thus'; en español se refleja con 'haciendo así', una equivalencia natural y formal.
  spanish_consistency_notes:
  - Se mantuvo la bienaventuranza con 'Bienaventurado' para conservar el tono bíblico solemne.
  - Se eligió 'esclavo' conforme al valor léxico básico de δοῦλος y a la política terminológica del proyecto.
  - Se usó 'señor' en minúscula en el texto principal para no fijar de antemano una lectura cristológica no requerida por el contexto inmediato.
  - '''Aquel'' reproduce el énfasis del demostrativo ἐκεῖνος.'
  - '''Haciendo así'' conserva la referencia anafórica a la conducta previa y resulta idiomático en español.'
  - La nota al pie preserva la alternativa 'Señor' para respetar la tensión documentada en el audit trail inglés.
