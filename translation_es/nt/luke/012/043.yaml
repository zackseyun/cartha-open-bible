    rationale: En español, la diferencia por capitalización sola puede parecer puramente devocional y no explica bien el matiz doméstico frente al título cristológico. «Amo» funciona mejor como alternativa doméstica explícita si el texto principal mantiene «señor», o viceversa.
  - severity: low
