translation:
  language: es
  text: Pero aquel esclavo[a], que sabía la voluntad de su amo y no se preparó o actuó conforme a su voluntad, será azotado con muchos golpes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «será azotado muchas veces» o «recibirá muchas azotaduras». El griego deja implícito el sustantivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: El griego δοῦλος designa a una persona en condición de esclavitud o sujeción servil, no a un simple empleado. En la escena parabólica, la relación de autoridad y el castigo resultan más claros con «esclavo», en continuidad con la decisión auditada del inglés POB.
- source_word: γνοὺς
  english_pob_choice: knew
  chosen_spanish: conoció
  alternatives_spanish:
  - habiendo conocido
  - supo
  lexicon: BDAG
  rationale: El participio aoristo expresa conocimiento previo de la voluntad del amo. «Conoció» conserva ese valor de conocimiento adquirido o poseído antes de la omisión posterior, sin volver la frase pesada en español.
- source_word: θέλημα
  english_pob_choice: will
  chosen_spanish: voluntad
  alternatives_spanish:
  - deseo
  - querer
  lexicon: BDAG
  rationale: En este contexto, θέλημα se refiere a la intención o mandato del amo. «Voluntad» es el equivalente natural en español y mantiene la fuerza normativa del término.
- source_word: κυρίου
  english_pob_choice: master's
  chosen_spanish: amo
  alternatives_spanish:
  - señor
  - dueño
  lexicon: BDAG
  rationale: Aquí κύριος funciona dentro de la relación doméstica de la parábola, no como título divino directo en la cláusula. «Amo» expresa mejor la relación de dominio que el esclavo tiene con su superior inmediato.
- source_word: ἑτοιμάσας
  english_pob_choice: prepare
  chosen_spanish: se preparó
  alternatives_spanish:
  - se puso listo
  - se dispuso
  lexicon: BDAG
  rationale: El verbo significa hacer los preparativos o ponerse listo. La forma reflexiva española comunica bien la omisión de prepararse para cumplir la voluntad conocida.
- source_word: ποιήσας πρὸς τὸ θέλημα αὐτοῦ
  english_pob_choice: act according to his will
  chosen_spanish: hizo conforme a su voluntad
  alternatives_spanish:
  - obró conforme a su voluntad
  - actuó conforme a su voluntad
  lexicon: BDAG
  rationale: La preposición πρός con el infinitivo verbalizado sugiere conformidad con la voluntad del amo. «Hizo conforme a su voluntad» reproduce esa idea de actuación acorde, en una construcción española natural y fiel.
- source_word: δαρήσεται
  english_pob_choice: will be beaten
  chosen_spanish: será azotado
  alternatives_spanish:
  - será golpeado
  - recibirá azotes
  lexicon: BDAG
  rationale: δέρω implica golpear o azotar físicamente. «Será azotado» preserva la violencia concreta del verbo sin añadir especificaciones no presentes en el texto.
- source_word: πολλάς
  english_pob_choice: with many blows
  chosen_spanish: con muchos golpes
  alternatives_spanish:
  - muchas veces
  - con muchas azotaduras
  lexicon: BDAG
  rationale: El griego deja implícito el sustantivo acompañado por πολλάς. En español conviene explicitarlo; «golpes» mantiene la imagen concreta y evita la abstracción de «severamente».
theological_decisions:
- issue: Relación social de κύριος en la parábola
  english_pob_reading: master
  chosen_spanish_reading: amo
  alternative_spanish_readings:
  - señor
  - dueño
  rationale: La escena describe un vínculo de dominio doméstico entre amo y esclavo. «Amo» evita una lectura devocional automática de κύριος y conserva la función narrativa del término en la parábola, en línea con la lectura auditada del POB en inglés.
  doctrine_reference: 'DOCTRINE.md: el contexto puede exigir variar κύριος cuando no funciona como título divino directo.'
- issue: Intensidad de πολλάς con sustantivo implícito
  english_pob_reading: with many blows
  chosen_spanish_reading: con muchos golpes
  alternative_spanish_readings:
  - muchas veces
  - con muchas azotaduras
  rationale: El adjetivo plural femenino queda elíptico en griego. Al suplir «golpes» se conserva el aviso físico y repetido del castigo sin recurrir a una formulación arcaica.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima con claridad moderna, evitando oscurecer el valor concreto del texto.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y concuerda con la decisión auditada del POB inglés de mantener la imagen concreta del castigo, explicitando en español el sustantivo implícito detrás de πολλάς. No se detectaron revisiones previas aplicadas en el paquete de referencia.
  spanish_consistency_notes:
  - Se mantiene «esclavo» para δοῦλος, conforme a la preferencia terminológica del proyecto.
  - Se usa «amo» para κύριος en este contexto parabólico, no «Señor», para preservar la relación doméstica.
  - «Voluntad» se conserva de forma consistente para θέλημα.
  - La nota al pie explica la ambigüedad de πολλάς y ofrece alternativas sin alterar el texto principal.
