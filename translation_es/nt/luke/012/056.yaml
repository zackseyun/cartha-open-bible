translation:
  language: es
  text: ¡Hipócritas! Ustedes saben interpretar la apariencia de la tierra y del cielo[a], pero ¿cómo es que no saben interpretar este tiempo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta temporada» o «este momento decisivo». El griego καιρός puede indicar un tiempo significativo u oportuno, no solo tiempo en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποκριταί
  english_pob_choice: Hypocrites
  chosen_spanish: ¡Hipócritas!
  alternatives_spanish:
  - ¡Actores!
  - ¡Pretendientes!
  lexicon: BDAG
  rationale: La forma vocativa expresa una reprensión directa y moral-religiosa; «hipócritas» es el equivalente establecido y fiel, no una referencia literal al teatro.
- source_word: πρόσωπον
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - rostro
  - faz
  - superficie
  lexicon: BDAG
  rationale: En la expresión idiomática «el πρόσωπον de la tierra y del cielo», el sentido es el aspecto visible o la apariencia exterior. «Apariencia» comunica mejor el valor idiomático en español.
- source_word: γῆς
  english_pob_choice: earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra firme
  - el país
  lexicon: BDAG
  rationale: Junto con «cielo», el marco es cósmico y de observación del clima; «tierra» refleja bien ese contraste amplio.
- source_word: οὐρανοῦ
  english_pob_choice: sky
  chosen_spanish: del cielo
  alternatives_spanish:
  - del firmamento
  - del cielo atmosférico
  lexicon: BDAG
  rationale: Aquí Jesús habla de signos visibles del clima; «cielo» en español mantiene la referencia inmediata sin desplazarla hacia un sentido teológico de «cielo» como morada divina.
- source_word: οἴδατε δοκιμάζειν
  english_pob_choice: you know how to interpret
  chosen_spanish: saben interpretar
  alternatives_spanish:
  - saben discernir
  - saben evaluar
  lexicon: BDAG
  rationale: La combinación expresa capacidad o pericia para evaluar signos. «Interpretar» es natural en español y transmite la idea de leer correctamente las señales visibles.
- source_word: καιρὸν τοῦτον
  english_pob_choice: this time
  chosen_spanish: este tiempo
  alternatives_spanish:
  - esta época
  - este momento
  - esta temporada
  lexicon: BDAG
  rationale: Se conserva la ambigüedad significativa de καιρός sin forzar «temporada» ni «momento». «Este tiempo» respeta el demostrativo y la carga cualitativa/decisiva del término.
- source_word: πῶς οὐκ οἴδατε δοκιμάζειν
  english_pob_choice: how is it that you do not know how to interpret
  chosen_spanish: ¿cómo es que no saben interpretar?
  alternatives_spanish:
  - ¿por qué no saben discernir?
  - ¿cómo no saben interpretar?
  lexicon: BDAG
  rationale: La pregunta retórica en español necesita naturalidad y fuerza de reproche. La repetición de «interpretar» conserva el paralelismo del griego con δοκιμάζειν.
theological_decisions:
- issue: Sentido de καιρός en la reprensión de Jesús
  english_pob_reading: this time
  chosen_spanish_reading: este tiempo
  alternative_spanish_readings:
  - esta temporada
  - este momento decisivo
  rationale: La traducción mantiene el alcance abierto de καιρός, sin especificar más de lo que el griego dice. Se preserva así la tensión entre tiempo cronológico y momento significativo/decisivo.
  doctrine_reference: Conservar la tensión léxica y no resolverla de forma interpretativa
translation_notes:
  revision_awareness: El texto inglés de POB revisó 'this present time' a 'this time' para ajustarse más directamente a τοῦτον καιρόν. La versión española sigue esa decisión con «este tiempo», evitando añadir un adjetivo como «presente» o una explicación interpretativa mayor que la permitida por el griego.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o equivalentes de máscara porque no aparece el nombre divino en el versículo.
  - Se mantuvo «interpretar» para δοκιμάζειν por coherencia con la auditoría inglesa y la metáfora de leer señales.
  - «Cielo» se usó en sentido meteorológico/visible, no como sustituto de un término teológico.
  - Se conservó el vocativo en exclamación para reproducir la fuerza retórica del griego.
