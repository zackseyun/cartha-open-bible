  text: ὑποκριταί, τὸ πρόσωπον τῆς γῆς καὶ τοῦ οὐρανοῦ οἴδατε δοκιμάζειν, τὸν ⸂δὲ καιρὸν⸃ τοῦτον πῶς ⸂οὐκ οἴδατε δοκιμάζειν⸃;
base_translation:
  language: en
  yaml_path: translation/nt/luke/012/056.yaml
  text: Hypocrites! You know how to interpret the appearance of the earth and the sky[a], but how is it that you do not know how to interpret this time?
  footnotes:
  - marker: a
    text: Or 'this season' or 'this decisive time.' The Greek καιρός can mean a significant or opportune time, not merely time in general.
    reason: lexical_alternative
