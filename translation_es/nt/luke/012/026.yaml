    issue: La nota [a] está colocada sobre 'lo más pequeño' en vez de sobre la cláusula de ansiedad.
    rationale: La nota inglesa 'Or "why do you worry about the remaining things?"' ofrece una alternativa para μεριμνᾶτε / περὶ τῶν λοιπῶν, no para οὐδὲ ἐλάχιστον. Tal como está, el anclaje español desorienta sobre qué expresión varía.
  - severity: low
    issue: '''Se angustian'' intensifica levemente μεριμνᾶτε respecto de la alternativa ''se preocupan''.'
    rationale: No obliga a rechazo, porque el contexto de Lucas 12 trata la ansiedad, pero en español puede percibirse más emocional que 'estar ansioso/preocuparse'. Se puede mantener dado el rationale documentado.
  revised_spanish_text: Si, pues, no pueden hacer ni lo más pequeño, ¿por qué se angustian por lo demás?[a]
