translation:
  language: es
  text: Si, pues, no pueden hacer ni lo más pequeño, ¿por qué se angustian por lo demás?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿por qué se preocupan por lo restante?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ οὖν
  english_pob_choice: If, then
  chosen_spanish: Si, pues
  alternatives_spanish:
  - Si, entonces
  - Por tanto, si
  lexicon: BDAG
  rationale: La combinación introduce una conclusión inferida del argumento previo. «Si, pues» conserva la fuerza lógica de εἰ + οὖν con un giro natural en español.
- source_word: οὐδὲ ἐλάχιστον
  english_pob_choice: not able to do even the smallest thing
  chosen_spanish: no pueden hacer ni lo más pequeño
  alternatives_spanish:
  - no pueden hacer ni lo menos
  - no pueden hacer ni lo más mínimo
  lexicon: BDAG
  rationale: 'ἐλάχιστον es neutro singular sustantivado: «lo más pequeño» expresa la mínima medida sin añadir más contenido del que el griego permite. «Ni» reproduce el refuerzo de οὐδὲ.'
- source_word: δύνασθε
  english_pob_choice: you are not able to do
  chosen_spanish: no pueden hacer
  alternatives_spanish:
  - no pueden
  - no son capaces de hacer
  lexicon: BDAG
  rationale: δύναμαι expresa capacidad/posibilidad. En español, «no pueden hacer» mantiene el sentido de capacidad con una estructura fluida y directa.
- source_word: τί
  english_pob_choice: why
  chosen_spanish: ¿por qué
  alternatives_spanish:
  - ¿para qué motivo
  - ¿qué razón hay para que
  lexicon: BDAG
  rationale: En esta construcción interrogativa con μεριμνάω, τί funciona de forma causal/rhetórica. «¿Por qué» es la equivalencia natural y clara en español.
- source_word: περὶ τῶν λοιπῶν
  english_pob_choice: about the rest
  chosen_spanish: por lo demás
  alternatives_spanish:
  - acerca de lo demás
  - por las cosas restantes
  lexicon: BDAG
  rationale: λοιπῶν se refiere a las cosas restantes o restantes asuntos. «Por lo demás» conserva el contraste con «lo más pequeño» y suena idiomático sin perder el referente.
- source_word: μεριμνᾶτε
  english_pob_choice: are you anxious
  chosen_spanish: se angustian
  alternatives_spanish:
  - se preocupan
  - se afanan
  lexicon: BDAG
  rationale: μεριμνάω puede expresar ansiedad o preocupación. «Se angustian» mantiene la tensión afectiva del contexto y evita reducir el término a una simple inquietud cotidiana.
theological_decisions:
- issue: Alcance de μεριμνάω en la enseñanza de Jesús sobre la dependencia de Dios
  english_pob_reading: anxious
  chosen_spanish_reading: se angustian
  alternative_spanish_readings:
  - se preocupan
  - se afanan
  rationale: El contexto de Lucas 12 aborda la ansiedad impropia frente al cuidado de Dios. «Se angustian» conserva el peso del término sin convertirlo en una prohibición general de toda preocupación prudente.
  doctrine_reference: Translation philosophy §6; preservar la tensión teológica sin resolverla
- issue: Valor inferencial de εἰ οὖν
  english_pob_reading: If, then
  chosen_spanish_reading: Si, pues
  alternative_spanish_readings:
  - Por tanto, si
  - Si entonces
  rationale: La partícula οὖν enlaza la pregunta con la argumentación previa. «Si, pues» deja visible la conclusión lógica del razonamiento.
  doctrine_reference: Discursus argumentativo del texto base; coherencia exegética
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al texto mediante [a] en «lo más pequeño[a]». No se añadieron notas no ancladas. Se mantuvo la lectura inferencial de εἰ οὖν y la tensión semántica de μεριμνάω, según el audit trail en inglés y el griego.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Se angustian» mantiene un registro digno y bíblico, coherente con el estilo POB en español.
  - «Lo demás» traduce el sustantivo plural neutro sin sobrerrepresentarlo como personas o cosas específicas.
