  spanish_quality_summary: El español es generalmente claro y digno, pero «le horadaran la casa» suena algo rígido y menos natural para lectura eclesial amplia. «Le abrieran un boquete en la casa» sería más explicativo, pero se aleja del texto principal. La mejor solución es usar una formulación idiomática principal («irrumpieran en su casa») con nota literal/cultural anclada en esa acción.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. La única cuestión léxica relevante es διορυχθῆναι, donde conviene seguir la lógica del POB inglés: sentido principal idiomático en el texto y la imagen literal en nota. «el amo de la casa» es aceptable aquí, aunque «el dueño de la casa» también sería posible; no requiere cambio.'
