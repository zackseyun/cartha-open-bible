translation:
  language: es
  text: 'Pero sepan esto: si el amo de la casa hubiera sabido a qué hora venía el ladrón, no habría dejado que irrumpieran en su casa[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «que su casa fuera horadada» o «excavada a través de ella», reflejando la práctica de abrir un boquete en la pared de una casa.
    reason: cultural_note
lexical_decisions:
- source_word: Τοῦτο δὲ γινώσκετε
  english_pob_choice: But know this
  chosen_spanish: Pero sepan esto
  alternatives_spanish:
  - Pero entiendan esto
  - Y sepan esto
  lexicon: BDAG
  rationale: γινώσκετε es un imperativo plural dirigido a los oyentes; en español, «sepan esto» conserva el llamado directo al reconocimiento. «Pero» refleja δέ como transición/contraste, sin sonar forzado.
- source_word: ὁ οἰκοδεσπότης
  english_pob_choice: the master of the house
  chosen_spanish: el amo de la casa
  alternatives_spanish:
  - el dueño de la casa
  - el cabeza de familia
  lexicon: BDAG
  rationale: οἰκοδεσπότης designa al responsable o señor de la casa. «Amo de la casa» conserva mejor la relación de autoridad y la imagen doméstica del contexto que «dueño», que puede sonar más posesiva o moderna.
- source_word: ποίᾳ ὥρᾳ
  english_pob_choice: at what hour
  chosen_spanish: a qué hora
  alternatives_spanish:
  - en qué hora
  - a qué tiempo
  lexicon: BDAG
  rationale: La pregunta indirecta exige una formulación natural en español. «A qué hora» comunica bien la especificidad temporal de ποίᾳ ὥρᾳ sin volverlo rígido.
- source_word: ὁ κλέπτης ἔρχεται
  english_pob_choice: the thief was coming
  chosen_spanish: venía el ladrón
  alternatives_spanish:
  - llegaba el ladrón
  - estaba viniendo el ladrón
  lexicon: BDAG
  rationale: El inglés auditado expresa el punto de vista retrospectivo con pasado. En español, «venía el ladrón» preserva esa perspectiva y suena más natural que un calco como «estaba viniendo».
- source_word: οὐκ ἂν ἀφῆκεν
  english_pob_choice: he would not have allowed
  chosen_spanish: no habría dejado que
  alternatives_spanish:
  - no habría permitido que
  - no lo habría dejado
  lexicon: BDAG
  rationale: La apódosis contrafactual se mantiene con «no habría dejado que». Esta opción suena idiomática y conserva la fuerza de la negación potencial de ἄν + aoristo indicativo.
- source_word: διορυχθῆναι
  english_pob_choice: to be broken into
  chosen_spanish: le horadaran
  alternatives_spanish:
  - lo perforaran
  - le abrieran un boquete
  lexicon: BDAG
  rationale: El verbo griego significa literalmente «abrir a golpe de excavación/perforación», especialmente respecto de muros de barro o adobe. «Le horadaran» conserva la imagen física sin perder inteligibilidad; en la frase completa deja claro el sentido de allanamiento.
- source_word: τὸν οἶκον αὐτοῦ
  english_pob_choice: his house
  chosen_spanish: la casa
  alternatives_spanish:
  - su casa
  - su vivienda
  lexicon: BDAG
  rationale: «Casa» mantiene el objeto directo de la acción de irrumpir y encaja con la imagen de una entrada forzada. El posesivo clítico «le» en la construcción verbal ya expresa el referente humano; por eso la repetición de «su» no es necesaria aquí.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece en el texto español junto a la frase correspondiente. No se añadieron notas sin anclaje textual.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico claro y contemporáneo, evitando el calco excesivo.
  - Se preservó la imagen concreta del allanamiento doméstico sin reemplazarla por una paráfrasis abstracta.
  - La formulación respeta el contrafactual del griego y del seguimiento auditado en inglés.
  - Se usó «casa» en coherencia con οἶκος y con el motivo narrativo de irrupción física.
