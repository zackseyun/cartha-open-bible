revisions:
- from: Y cualquiera que hable una palabra contra el Hijo del Hombre[a], le será perdonado[b]; pero el que blasfeme contra el Espíritu Santo no será perdonado.
  to: Y cualquiera que hable una palabra contra el Hijo del Hombre[a], le será perdonado[b]; pero al que blasfeme contra el Espíritu Santo no le será perdonado.
  rationale: Se ajustó la segunda cláusula a «no le será perdonado» para conservar mejor el paralelismo con la primera y reflejar con más precisión el pasivo con dativo implícito del griego. También se pulió la nota b, reemplazando una expresión poco idiomática («acto ofendido») por «ofensa implícita».
