    text: 'El griego dice literalmente: «le será perdonado», con la ofensa implícita como aquello que recibe perdón.'
    reason: lexical_alternative
  revision_rationale: Se ajustó la segunda cláusula a «no le será perdonado» para conservar mejor el paralelismo con la primera y reflejar con más precisión el pasivo con dativo implícito del griego. También se pulió la nota b, reemplazando una expresión poco idiomática («acto ofendido») por «ofensa implícita».
