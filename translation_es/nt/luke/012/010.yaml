translation:
  language: es
  text: Y cualquiera que hable una palabra contra el Hijo del Hombre[a], le será perdonado[b]; pero al que blasfeme contra el Espíritu Santo no le será perdonado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quien diga una palabra contra el Hijo del Hombre».
    reason: lexical_alternative
  - marker: b
    text: 'El griego dice literalmente: «le será perdonado», con la ofensa implícita como aquello que recibe perdón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὃς
  english_pob_choice: everyone who
  chosen_spanish: cualquiera que
  alternatives_spanish:
  - todo el que
  - quienquiera que
  lexicon: BDAG
  rationale: La construcción es distributiva y general. «Cualquiera que» expresa bien el alcance universal en español sin sonar forzada.
- source_word: ἐρεῖ λόγον
  english_pob_choice: speaks a word
  chosen_spanish: hable una palabra
  alternatives_spanish:
  - diga una palabra
  - hable
  lexicon: BDAG
  rationale: Se conserva la imagen verbal de λόγον con «una palabra», como en el inglés POB, pero adaptada a un español natural.
- source_word: εἰς
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - a
  - acerca de
  lexicon: BDAG
  rationale: En este contexto hostil de reproche y blasfemia, «contra» expresa mejor oposición que una mera dirección o referencia.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  lexicon: BDAG
  rationale: Es la forma establecida y fiel del título cristológico; conserva el trasfondo semítico y la fuerza del título.
- source_word: ἀφεθήσεται αὐτῷ
  english_pob_choice: it will be forgiven him
  chosen_spanish: le será perdonado
  alternatives_spanish:
  - le será perdonada
  - será perdonado
  lexicon: BDAG
  rationale: El griego usa un pasivo impersonal con objeto implícito. En español, «le será perdonado» mantiene esa impersonalidad y la claridad natural.
- source_word: τῷ ... βλασφημήσαντι
  english_pob_choice: the one who blasphemes
  chosen_spanish: el que blasfeme
  alternatives_spanish:
  - el que blasfema
  - quien blasfema
  lexicon: BDAG
  rationale: El participio se refleja mejor con una relativa general en presente subjuntivo, que preserva el valor genérico sin cargar un aspecto completivo no explicitado.
- source_word: τὸ ἅγιον πνεῦμα
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Sagrado
  lexicon: BDAG
  rationale: Es la traducción estándar y fiel para la persona divina nombrada en el texto; «Espíritu Santo» es clara y natural en español.
- source_word: οὐκ ἀφεθήσεται
  english_pob_choice: will not be forgiven
  chosen_spanish: no será perdonado
  alternatives_spanish:
  - no le será perdonado
  - no tendrá perdón
  lexicon: BDAG
  rationale: La negación del futuro pasivo se conserva de forma directa y solemne. El sujeto implícito del perdón queda entendido, como en el griego.
theological_decisions:
- issue: Contraste entre hablar contra el Hijo del Hombre y blasfemar contra el Espíritu Santo
  english_pob_reading: Preserve the textual distinction without explaining or resolving the theology of the 'unforgivable sin' in the translation itself.
  chosen_spanish_reading: Preservar la distinción textual sin explicar ni resolver la teología del pecado imperdonable dentro de la traducción.
  alternative_spanish_readings:
  - Interpretar la primera cláusula como ignorancia menor y la segunda como impenitencia final
  - armonizar con pasajes paralelos ampliando el sentido en la traducción
  rationale: El versículo presenta un contraste en cuanto al perdón, pero no define aquí el mecanismo ni pretende resolver la tensión teológica. La traducción debe conservar esa tensión.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolver interpretaciones debatidas.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que prefirió la forma presente genérica «the one who blasphemes» frente a un participio completivo. Por eso se eligió en español «el que blasfeme», manteniendo el valor genérico sin introducir un aspecto no exigido por el griego. También se preservó la relación impersonal del pasivo con una construcción española natural.
  spanish_consistency_notes:
  - Se usa «Hijo del Hombre» para el título cristológico, en línea con la terminología POB.
  - Se usa «Espíritu Santo» y no una variante arcaica.
  - Se conserva el pasivo impersonal de ἀφίημι con «le será perdonado», evitando reexpresar indebidamente el objeto implícito.
  - Se mantiene un tono sobrio y digno, apto para lectura eclesial contemporánea.
