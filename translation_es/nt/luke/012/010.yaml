review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego: mantiene el alcance distributivo, conserva la oposición de εἰς como «contra», preserva el título «el Hijo del Hombre» y la tensión teológica entre la primera y segunda cláusula. También refleja aceptablemente ἀφεθήσεται αὐτῷ con una formulación impersonal. Sin embargo, en español la simetría del pasivo queda mejor preservada si la segunda cláusula también explicita el dativo implícito: «no le será perdonado».'
  spanish_quality_summary: 'El texto es claro, natural y digno. La única mejora necesaria es de paralelismo y precisión: «no será perdonado» puede sonar en español como si la persona fuera el objeto del perdón, mientras que el griego mantiene implícita la ofensa/pertenencia al dativo, como ya se reconoce en la nota b. Ajustar la segunda cláusula a «no le será perdonado» mejora la coherencia con la primera y evita una leve pérdida semántica.'
  glossary_alignment: 'La terminología del proyecto está bien observada: «Espíritu Santo», «Hijo del Hombre», «Dios» no aparece aquí, y no hay conflicto con Yahvé/Mesías. Las decisiones léxicas son en general sólidas. La única excepción es la asimetría entre «le será perdonado» y «no será perdonado», que conviene regularizar por fidelidad al valor implícito del griego.'
  issues:
  - severity: medium
    issue: Asimetría en la representación de ἀφεθήσεται entre las dos cláusulas
    rationale: La primera cláusula traduce ἀφεθήσεται αὐτῷ como «le será perdonado», pero la segunda reduce οὐκ ἀφεθήσεται a «no será perdonado». Aunque no es incorrecto, en español esto desplaza levemente el foco hacia la persona, mientras que el griego mantiene el acto/ofensa como elemento implícito. «No le será perdonado» conserva mejor el paralelismo y la lógica interna del versículo.
  - severity: low
    issue: Redacción de la nota b
    rationale: «el acto ofendido» no es una formulación idiomática en español. Lo natural sería «la ofensa» o «la falta». Aunque la nota es comprensible, conviene pulirla para claridad.
  revised_spanish_text: Y cualquiera que hable una palabra contra el Hijo del Hombre[a], le será perdonado[b]; pero al que blasfeme contra el Espíritu Santo no le será perdonado.
  revised_footnotes:
