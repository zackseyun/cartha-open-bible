lexical_decisions:
- source_word: ἀληθῶς
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Verdaderamente
  - Ciertamente
  lexicon: BDAG
  rationale: El adverbio introduce una afirmación solemne y enfática. «En verdad» conserva el tono enfático de ἀληθῶς en un español natural y digno.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les aseguro
  - les hablo
  lexicon: BDAG
  rationale: La fórmula discursiva se expresa con naturalidad en español como «les digo», manteniendo el destinatario plural y el peso autoritativo de la declaración.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  lexicon: BDAG
  rationale: Introduce la cláusula completiva de manera estándar en español.
- source_word: ἐπὶ πᾶσιν τοῖς ὑπάρχουσιν αὐτοῦ
  english_pob_choice: over all that he has
  chosen_spanish: sobre todo lo que tiene
  alternatives_spanish:
  - sobre todas sus posesiones
  - sobre toda su propiedad
  lexicon: BDAG
  rationale: Con dativo, ἐπί expresa autoridad o supervisión; «sobre» conserva esa relación. El participio sustantivado de ὑπάρχω señala aquello que le pertenece, por lo que «todo lo que tiene» evita restringir indebidamente a bienes materiales y mantiene el alcance amplio del griego.
- source_word: καταστήσει
  english_pob_choice: he will appoint
  chosen_spanish: lo pondrá
  alternatives_spanish:
  - lo nombrará
  - lo establecerá
  lexicon: BDAG
  rationale: Aunque el inglés optó por «appoint» para transmitir investidura formal, en español «lo pondrá» en contexto comunica con naturalidad el acto de colocarlo en una posición de responsabilidad. Se conserva la idea de designación implícita por el sintagma «sobre todo lo que tiene».
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El objeto directo masculino singular se mantiene con el pronombre átono «lo», conforme al referente masculino de la parábola y a la concordancia normal del español.
theological_decisions:
- issue: Pronombres masculinos en la parábola
  english_pob_reading: Retain 'he' and 'him'
  chosen_spanish_reading: Mantener las formas masculinas implícitas en el verbo y el pronombre de objeto
  alternative_spanish_readings:
  - neutralizar con «la persona» o «quien»
  - usar formas inclusivas no marcadas
  rationale: El griego usa formas masculinas singulares para el personaje de la parábola. En español, se respeta ese referente sin neutralizarlo, manteniendo la precisión gramatical y la continuidad con el texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Alcance de «all that he has»
  english_pob_reading: all that he has
  chosen_spanish_reading: todo lo que tiene
  alternative_spanish_readings:
  - todas sus posesiones
  - toda su propiedad
  rationale: El participio ὑπάρχοντα puede abarcar posesiones y pertenencias en sentido amplio. «Todo lo que tiene» preserva esa amplitud y evita reducir el sentido a propiedad material únicamente.
  doctrine_reference: BDAG; contexto inmediato de la parábola
translation_notes:
  revision_awareness: El pasaje coincide con el registro inglés auditado y no muestra revisiones pendientes; se ha mantenido la misma decisión semántica principal para ἐπὶ πᾶσιν τοῖς ὑπάρχουσιν αὐτοῦ, con adaptación natural al español.
  spanish_consistency_notes:
  - Se usó «En verdad» para ἀληθῶς, en coherencia con el tono solemne del dicho.
  - Se conservó el valor de autoridad de ἐπί con «sobre», no con una formulación más interpretativa.
  - «Lo pondrá» refleja en español el acto de designar/colocar en una posición de responsabilidad sin añadir contenido ausente.
  - El pronombre de objeto «lo» mantiene el referente masculino singular del texto griego.
