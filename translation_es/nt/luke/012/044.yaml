review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido general del griego: ἀληθῶς λέγω ὑμῖν = «En verdad les digo», ὅτι introduce la cláusula, y πᾶσιν τοῖς ὑπάρχουσιν αὐτοῦ se transmite bien como «todo lo que tiene», con nota alternativa adecuada. Sin embargo, καταστήσει aquí tiene matiz de designar/poner a cargo, y «lo pondrá sobre» suena menos natural en español que una formulación de nombramiento o encargo.'
  spanish_quality_summary: '«En verdad les digo» es digno y legible. El principal problema es de naturalidad y precisión idiomática: «lo pondrá sobre todo lo que tiene» suena calcado y algo torpe en español eclesial contemporáneo. «Lo pondrá a cargo de todo lo que tiene» o «lo nombrará sobre...» mejora claramente; la primera opción comunica mejor la función de autoridad implícita en ἐπί + dativo y καθίστημι.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se mantienen adecuadamente los masculinos singulares del contexto parabólico. La nota léxica para «todo lo que tiene» preserva las alternativas del inglés POB.
  issues:
  - severity: medium
    issue: «lo pondrá sobre todo lo que tiene» es poco natural en español
    rationale: Aunque reproduce de cerca «over», en español esta construcción suena forzada. El griego expresa autoridad/encargo; una formulación como «lo pondrá a cargo de» transmite mejor esa relación sin alejarse del sentido fuente.
  - severity: low
    issue: καταστήσει merece un verbo de designación más explícito
    rationale: El inglés auditado escogió «appoint» por su fuerza de nombramiento. «Pondrá» puede aceptarse, pero combinado con «a cargo de» conserva mejor el sentido de investidura funcional en español.
  revised_spanish_text: En verdad les digo que lo pondrá a cargo de todo lo que tiene[a].
  revised_footnotes:
  - marker: a
    text: O «todas sus posesiones» o «toda su propiedad».
    reason: lexical_alternative
  revision_rationale: Se ajusta la expresión preposicional para que suene natural y precisa en español, preservando el sentido de autoridad/administración de ἐπὶ + dativo y el matiz de designación de καταστήσει, sin cambiar el contenido semántico ni la nota léxica existente.
