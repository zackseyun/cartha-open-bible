revisions:
- from: Vendrá el señor de aquel esclavo en el día en que no lo espera y a la hora que no sabe; y lo partirá[a] en dos, y asignará su lugar con los infieles[b].
  to: Vendrá el amo de aquel esclavo en un día en que no lo espera y a una hora que no conoce,[b] y lo despedazará[a] y asignará su lugar con los infieles.
  rationale: Se ajusta κύριος a «amo» para reflejar con claridad la relación amo-esclavo de la parábola; se mejora la naturalidad de la cláusula temporal con «a una hora que no conoce» preservando la distinción entre «esperar» y «conocer»; y, sobre todo, se corrige διχοτομήσει para que el texto principal mantenga una imagen de desmembramiento fuerte, dejando «lo partirá en dos» como alternativa en nota, conforme al POB inglés. También se corrige la anclaje de notas para que cada marcador corresponda a la nota adecuada y no se repita una lectura ya presente en el texto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:01:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: mantiene la relación amo/esclavo, la doble sorpresa temporal, el juicio severo y la asignación final con los ἀπίστων. Sin embargo, hay dos desajustes relevantes con el audit trail inglés: (1) el texto principal español escoge «lo partirá en dos», mientras que el POB inglés fijó en el texto principal una formulación más amplia equivalente a «cut him in pieces», dejando «cut him in two» solo como alternativa de nota; (2) la nota [a] repite exactamente la lectura ya puesta en el texto principal, por lo que no preserva correctamente la alternativa documentada.'
  spanish_quality_summary: El español es legible y digno, pero «a la hora que no sabe» suena poco natural en español; «a una hora que no conoce» o «a una hora que no sabe» requiere ajuste. También «señor» para κύριος aquí puede leerse como título reverencial, cuando el contexto parabolicamente pide el jefe/amo del esclavo. «Amo» comunica mejor la relación social sin ambigüedad cristológica. El resto fluye bien.
  glossary_alignment: '«esclavo» alinea correctamente con δοῦλος. «infieles» alinea bien con ἀπίστων y conserva la nota alternativa «incrédulos». No hay términos del glosario mayor en juego como Yahvé/Mesías. El principal punto terminológico es κύριος: en esta parábola conviene «amo» mejor que «señor» para reflejar la decisión inglesa ''master''.'
  issues:
  - severity: high
    issue: El texto principal usa «lo partirá en dos» para διχοτομήσει, pero el audit trail inglés fijó la opción principal equivalente a «lo cortará en pedazos / lo despedazará», dejando «lo partirá en dos» como alternativa en nota.
    rationale: 'Debe preservarse la jerarquía de decisiones del POB: lectura principal literal fuerte en el texto y la variante más estrecha «en dos» en nota. El borrador invierte esa relación.'
  - severity: high
    issue: La nota [a] duplica el texto principal en vez de dar una alternativa real.
    rationale: La nota dice «O, “lo partirá en dos”» cuando esa ya es exactamente la redacción del texto. Esto inutiliza la nota y no refleja la documentación inglesa, que daba como alternativa 'cut him in two' y como interpretación adicional 'castigará severamente'.
  - severity: medium
    issue: «a la hora que no sabe» suena antinatural e impreciso en español.
    rationale: γινώσκει debe distinguirse de «espera», pero en español se expresa mejor con «a una hora que no conoce» o «que no sabe». La primera es más idiomática y clara.
  - severity: medium
    issue: «el señor de aquel esclavo» puede sugerir un título reverencial más que una relación de propiedad/autoridad doméstica.
    rationale: Dado que κύριος aquí significa 'master' en una parábola sobre un δοῦλος, «amo» refleja mejor la decisión léxica documentada y evita ambigüedad innecesaria.
  revised_spanish_text: Vendrá el amo de aquel esclavo en un día en que no lo espera y a una hora que no conoce,[b] y lo despedazará[a] y asignará su lugar con los infieles.
  revised_footnotes:
  - marker: a
    text: O, «lo partirá en dos»; algunos entienden esta expresión de manera idiomática como «lo castigará severamente».
    reason: lexical_alternative
  - marker: b
    text: O, «con los incrédulos».
    reason: alternative_reading
  revision_rationale: Se ajusta κύριος a «amo» para reflejar con claridad la relación amo-esclavo de la parábola; se mejora la naturalidad de la cláusula temporal con «a una hora que no conoce» preservando la distinción entre «esperar» y «conocer»; y, sobre todo, se corrige διχοτομήσει para que el texto principal mantenga una imagen de desmembramiento fuerte, dejando «lo partirá en dos» como alternativa en nota, conforme al POB inglés. También se corrige la anclaje de notas para que cada marcador corresponda a la nota adecuada y no se repita una lectura ya presente en el texto.
