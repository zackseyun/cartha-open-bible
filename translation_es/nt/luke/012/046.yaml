translation:
  language: es
  text: Vendrá el amo de aquel esclavo en un día en que no lo espera y a una hora que no conoce,[b] y lo despedazará[a] y asignará su lugar con los infieles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «lo partirá en dos»; algunos entienden esta expresión de manera idiomática como «lo castigará severamente».
    reason: lexical_alternative
  - marker: b
    text: O, «con los incrédulos».
    reason: alternative_reading
lexical_decisions:
- source_word: κύριος
  english_pob_choice: master
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - dueño
  lexicon: BDAG
  rationale: En esta parábola, κύριος nombra al superior del esclavo dentro de una relación de propiedad y autoridad. En español, «señor» comunica esa autoridad de manera natural y digna; «amo» o «dueño» sonarían más duros o más marcadamente posesivos, aunque siguen siendo posibles.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: La relación de dependencia y pertenencia es explícita en el contexto, por lo que «esclavo» conserva la fuerza lexical que el POB inglés quiso mantener. «Siervo» suavizaría indebidamente el término.
- source_word: ἥξει
  english_pob_choice: will come
  chosen_spanish: Vendrá
  alternatives_spanish:
  - Llegará
  lexicon: BDAG
  rationale: El futuro de ἥκω aquí expresa la llegada del señor. «Vendrá» es natural en español y conserva el sentido de movimiento hacia el esclavo.
- source_word: ἐν ἡμέρᾳ ᾗ οὐ προσδοκᾷ
  english_pob_choice: on a day when he does not expect him
  chosen_spanish: en el día en que no lo espera
  alternatives_spanish:
  - en el día que no lo espera
  - en un día en que no espera su llegada
  lexicon: BDAG
  rationale: προσδοκάω significa «esperar/aguardar». El objeto implícito es la venida del señor; en español, «no lo espera» mantiene la claridad sin añadir una paráfrasis excesiva.
- source_word: ἐν ὥρᾳ ᾗ οὐ γινώσκει
  english_pob_choice: at an hour he does not know
  chosen_spanish: a la hora que no sabe
  alternatives_spanish:
  - a la hora que desconoce
  - a una hora que no conoce
  lexicon: BDAG
  rationale: 'γινώσκω es «saber/conocer». Mantener «no sabe» preserva la distinción con la cláusula anterior: aquí no se trata de expectativa, sino de conocimiento.'
- source_word: διχοτομήσει
  english_pob_choice: will cut him in pieces
  chosen_spanish: lo partirá en dos
  alternatives_spanish:
  - lo cortará en dos
  - lo despedazará
  lexicon: BDAG
  rationale: El verbo puede leerse literalmente como «cortar en dos»; en español, «lo partirá en dos» conserva la imagen directa. Es una opción menos idiomática que «despedazar», pero más fiel a la posibilidad literal que el POB inglés dejó abierta.
- source_word: τὸ μέρος αὐτοῦ
  english_pob_choice: his place
  chosen_spanish: su lugar
  alternatives_spanish:
  - su porción
  - su parte
  lexicon: BDAG
  rationale: μέρος puede significar «parte/porción», pero en la construcción con θήσει expresa el sitio o destino asignado. «Su lugar» comunica mejor la asignación final sin perder el matiz de destino.
- source_word: ἀπίστων
  english_pob_choice: the unfaithful
  chosen_spanish: los infieles
  alternatives_spanish:
  - los incrédulos
  - los no creyentes
  lexicon: BDAG
  rationale: ἄπιστος puede significar tanto «infiel» como «incrédulo/no creyente». Aquí la escena es la de un esclavo desleal dentro de una casa, pero el cierre también admite una lectura escatológica más amplia; «infieles» conserva esa tensión mejor que «incrédulos» en el flujo del español.
- source_word: θήσει
  english_pob_choice: assign
  chosen_spanish: asignará
  alternatives_spanish:
  - pondrá
  - colocará
  lexicon: BDAG
  rationale: τίθημι aquí tiene sentido de establecer o asignar un destino. «Asignará» expresa ese acto judicial de fijar su lugar con otros.
theological_decisions:
- issue: Cómo conservar la fuerza del juicio en διχοτομήσει sin convertirlo en una paráfrasis interpretativa
  english_pob_reading: Retain the literal imagery 'will cut him in pieces' in the main text
  chosen_spanish_reading: Mantener la imagen «lo partirá en dos» en el texto principal
  alternative_spanish_readings:
  - lo castigará severamente
  - lo despedazará
  rationale: La traducción debe preservar la dureza de la advertencia. «Lo partirá en dos» mantiene la imagen corporal sin reducirla a una explicación interpretativa; la opción idiomática de castigo severo queda implícita, pero no desplaza el texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo traducir ἀπίστων manteniendo la tensión entre incredulidad y deslealtad
  english_pob_reading: Use 'the unfaithful' in the main text
  chosen_spanish_reading: Usar «los infieles» en el texto principal
  alternative_spanish_readings:
  - los incrédulos
  - los no creyentes
  rationale: En la lógica inmediata de la parábola, el contraste es con la fidelidad del esclavo. «Infieles» comunica deslealtad y permite, sin cerrarla, la resonancia más amplia hacia quienes están fuera de la fe.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y el audit trail inglés del POB. Se conserva la distinción entre «no lo espera» y «no sabe», la dureza literal de διχοτομήσει mediante una imagen corporal no suavizada, y la ambigüedad de ἀπίστων entre fidelidad quebrantada e incredulidad. No se introdujeron revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; aquí no aplica.
  - Se prefirió «esclavo» por la fuerza de δοῦλος en el contexto narrativo.
  - «Señor» traduce κύριος como relación de autoridad doméstica, no como título cristológico.
  - Las notas mantienen el mismo tipo de alternativas que el POB inglés preserva en su aparato.
