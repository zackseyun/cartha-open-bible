translation:
  language: es
  text: 'Y razonaba dentro de sí, diciendo: «¿Qué haré[a], puesto que no tengo dónde reunir mis cosechas[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué debo hacer?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi producción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διελογίζετο
  english_pob_choice: reasoned
  chosen_spanish: razonaba
  alternatives_spanish:
  - pensaba
  - deliberaba
  lexicon: BDAG
  rationale: El imperfecto medio indica un proceso interno y continuo de reflexión; «razonaba» conserva el sentido de deliberación calculada sin sonar rígido en español.
- source_word: ἐν ἑαυτῷ
  english_pob_choice: within himself
  chosen_spanish: dentro de sí
  alternatives_spanish:
  - en sí mismo
  - para sí
  lexicon: BDAG
  rationale: La frase marca una deliberación interior. «Dentro de sí» expresa bien el ámbito interno y evita sugerir necesariamente palabras dichas en voz alta.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decía
  lexicon: BDAG
  rationale: El participio introduce el contenido del discurso interior. «Diciendo» sigue de cerca la estructura griega y funciona naturalmente en español.
- source_word: Τί ποιήσω
  english_pob_choice: What will I do
  chosen_spanish: ¿Qué haré?
  alternatives_spanish:
  - ¿Qué debo hacer?
  - ¿Qué voy a hacer?
  lexicon: BDAG
  rationale: 'La pregunta deliberativa aorística se vierte de forma natural en español con futuro: «¿Qué haré?». Mantiene la indecisión reflexiva del original.'
- source_word: ὅτι
  english_pob_choice: since
  chosen_spanish: puesto que
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la causa de la pregunta. «Puesto que» conserva el valor causal en un registro digno y claro.
- source_word: οὐκ ἔχω ποῦ
  english_pob_choice: I have nowhere
  chosen_spanish: no tengo dónde
  alternatives_spanish:
  - no tengo lugar donde
  - no tengo adónde
  lexicon: BDAG
  rationale: La construcción idiomática se expresa de forma natural en español como «no tengo dónde», que comunica la carencia de lugar para la acción.
- source_word: συνάξω
  english_pob_choice: to gather
  chosen_spanish: reunir
  alternatives_spanish:
  - juntar
  - almacenar
  lexicon: BDAG
  rationale: En este contexto agrícola, el verbo puede implicar juntar para guardar. «Reunir» conserva la idea básica de recoger y agrupar sin imponer más de lo que el griego dice.
- source_word: τοὺς καρπούς μου
  english_pob_choice: my crops
  chosen_spanish: mis cosechas
  alternatives_spanish:
  - mi producción
  - mis frutos
  lexicon: BDAG
  rationale: En contexto agrícola, καρποί se refiere al rendimiento de la tierra, no solo a «frutos» en sentido estrecho. «Mis cosechas» es claro, natural y fiel al contexto.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español, y se mantuvo una traducción verbal y contextual coherente con el griego y con la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, sin calcos innecesarios.
  - Se evitó «Cristo», «SEÑOR» y otras sustituciones no pertinentes al versículo.
  - «Cosechas» refleja el valor agrícola de καρποί según el contexto y la nota auditada en inglés.
