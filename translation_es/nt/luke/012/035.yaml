revisions:
- from: Mantengan ceñidos[a] sus lomos y sus lámparas encendidas.
  to: Que sus lomos estén ceñidos[a] y sus lámparas ardiendo.
  rationale: Se ajusta Ἔστωσαν a una exhortación española más cercana al verbo copulativo griego, se preserva mejor el paralelismo de las dos imágenes coordinadas, y se refuerza el valor durativo de καιόμενοι con 'ardiendo'. La nota al pie se limpia estilísticamente sin cambiar su contenido esencial.
