translation:
  language: es
  text: Que sus lomos estén ceñidos[a] y sus lámparas ardiendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Tengan la ropa lista para la acción". La imagen es la de recoger las prendas largas y sujetarlas para estar listos.'
    reason: cultural_note
lexical_decisions:
- source_word: Ἔστωσαν
  english_pob_choice: Let ... be
  chosen_spanish: Mantengan
  alternatives_spanish:
  - Sean
  - Estén
  lexicon: BDAG
  rationale: El griego es una tercera persona plural de imperativo exhortativo; en español, un imperativo directo plural comunica mejor la exhortación. 'Mantengan' transmite la idea de sostener un estado continuo de preparación sin volver la frase innecesariamente pesada.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: sus
  alternatives_spanish:
  - de ustedes
  - vuestros
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa de forma natural con el posesivo de tercera persona plural en español. 'Sus' mantiene la referencia al grupo destinatario con registro neutral y amplio.
- source_word: ὀσφύες
  english_pob_choice: waists
  chosen_spanish: lomos
  alternatives_spanish:
  - cinturas
  - riñones
  lexicon: BDAG
  rationale: '''ὀσφύες'' designa la zona de la cintura/loins. ''Lomos'' conserva mejor la imaginería bíblica corporal y la resonancia tradicional sin caer en una paráfrasis explicativa. ''Cinturas'' sería más moderno, pero menos fiel al matiz idiomático.'
- source_word: περιεζωσμέναι
  english_pob_choice: girded
  chosen_spanish: ceñidos
  alternatives_spanish:
  - ceñidas
  - ajustados
  lexicon: BDAG
  rationale: El participio perfecto pasivo de περιζώννυμι expresa estar sujeto o ceñido para estar listo. 'Ceñidos' preserva la metáfora de preparación y funciona naturalmente con 'lomos' en español.
- source_word: λύχνοι
  english_pob_choice: lamps
  chosen_spanish: lámparas
  alternatives_spanish:
  - lámparas de aceite
  - luces
  lexicon: BDAG
  rationale: '''λύχνος'' nombra una lámpara concreta, no ''luz'' abstracta. ''Lámparas'' es preciso y readable; añadir ''de aceite'' aclararía el contexto, pero no es necesario en el texto principal.'
- source_word: καιόμενοι
  english_pob_choice: burning
  chosen_spanish: encendidas
  alternatives_spanish:
  - ardiendo
  - quemándose
  lexicon: BDAG
  rationale: El participio presente de καίω indica estado continuo. En español, con 'lámparas', 'encendidas' comunica mejor el estado resultante y natural que 'ardiendo', que suena más literal pero menos idiomático para lámparas.
theological_decisions:
- issue: Imagen cultural de preparación y vigilancia
  english_pob_reading: Preserve the concrete metaphor ('waists be girded') in the main text
  chosen_spanish_reading: Conservar la metáfora concreta ('lomos ceñidos') en el texto principal
  alternative_spanish_readings:
  - Tengan la ropa lista para la acción
  - Estén preparados para actuar
  rationale: El versículo usa una imagen cultural específica de prontitud. La versión española mantiene la metáfora corporal en vez de sustituirla por una paráfrasis interpretativa, preservando así la fuerza retórica y la transparencia hacia la fuente.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El borrador sigue el audit trail inglés y no introduce revisiones posteriores; se mantiene la lectura metafórica concreta en el texto principal, con una nota cultural para lectores modernos.
  spanish_consistency_notes:
  - Se mantuvo 'lomos' como equivalente de 'waists/loins' para conservar la imaginería bíblica.
  - Se usó 'ceñidos' para reflejar el valor de preparación continua de περιεζωσμέναι.
  - Se eligió 'encendidas' para las lámparas por naturalidad en español, sin perder el estado continuo de la acción.
