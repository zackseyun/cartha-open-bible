review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la exhortación de preparación y vigilancia del griego: conserva las dos imágenes coordinadas (''ὀσφύες ... περιεζωσμέναι'' y ''λύχνοι καιόμενοι''). Sin embargo, ''Mantengan ceñidos sus lomos'' reorganiza la sintaxis de manera más interpretativa que el griego y pierde un poco la estructura ''sean/estén ... y ...''. Además, ''encendidas'' es natural, pero atenúa el matiz durativo de καιόμενοι frente a una opción más directa como ''ardiendo''.'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero 'Mantengan ceñidos sus lomos' suena algo forzado en registro y estructura. Una formulación como 'Que sus lomos estén ceñidos' preserva mejor la exhortación y la imagen concreta en español digno y natural. La nota al pie necesita corrección de comillas y redacción más limpia.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. 'Lomos' y 'ceñidos' respetan la decisión de mantener la metáfora concreta. 'Lámparas' está bien alineado con λύχνοι. La revisión propuesta mejora la fidelidad formal sin apartarse de la racionalidad léxica documentada.
  issues:
  - severity: medium
    issue: La elección 'Mantengan' para Ἔστωσαν introduce un matiz de 'mantener' no explicitado en el verbo copulativo griego.
    rationale: Ἔστωσαν con los predicados participiales se refleja mejor en español con 'estén' o una exhortación equivalente. 'Mantengan' no es imposible, pero añade una noción de sostenimiento más interpretativa.
  - severity: medium
    issue: La sintaxis 'Mantengan ceñidos sus lomos' no refleja tan de cerca la estructura coordinada del griego.
    rationale: El original presenta dos sujetos con sus predicados participiales paralelos. 'Que sus lomos estén ceñidos y sus lámparas ardiendo' conserva mejor ese paralelismo.
  - severity: low
    issue: '''Encendidas'' es idiomático, pero reduce el matiz progresivo/durativo de καιόμενοι.'
    rationale: 'El participio presente ''καιόμενοι'' se representa más plenamente con ''ardiendo''. En este contexto la expresión sigue siendo natural en español: ''lámparas ardiendo''.'
  - severity: low
    issue: La nota al pie tiene puntuación y formulación mejorables.
    rationale: 'Debe evitarse la comilla inicial innecesaria y puede redactarse con mayor naturalidad: ''O: "Tengan la ropa lista para la acción". La imagen es la de recoger las prendas largas y sujetarlas para estar listos.'''
  revised_spanish_text: Que sus lomos estén ceñidos[a] y sus lámparas ardiendo.
