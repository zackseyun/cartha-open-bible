translation:
  language: es
  text: Te digo[a], no saldrás de allí hasta que hayas pagado incluso el último leptón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Te aseguro». La fórmula griega introduce una afirmación dirigida personalmente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la última moneda pequeña». El griego λεπτόν se refiere a una moneda muy pequeña.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω σοι
  english_pob_choice: I tell you
  chosen_spanish: Te digo
  alternatives_spanish:
  - Te digo a ti
  - Te aseguro
  lexicon: BDAG
  rationale: La fórmula directa de habla conserva el tono de dirección personal. En español, «te digo» suena natural y mantiene la fuerza del presente de indicativo y del pronombre dativo sin sobrecargar la frase.
- source_word: οὐ μὴ ἐξέλθῃς
  english_pob_choice: you will certainly not get out
  chosen_spanish: no saldrás
  alternatives_spanish:
  - de ningún modo saldrás
  - no podrás salir
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con subjuntivo aoristo expresa una negativa muy fuerte sobre un hecho futuro. En español, «no saldrás» comunica la certeza de la negación con fluidez, y el contexto de salida de un lugar permite omitir una perífrasis más pesada.
- source_word: ἐκεῖθεν
  english_pob_choice: of there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ese lugar
  - de allí mismo
  lexicon: BDAG
  rationale: «ἐκεῖθεν» significa «de allí / desde allí». Tras «salir», «de allí» es la forma más natural en español y conserva la referencia espacial.
- source_word: ἕως
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - antes de que
  lexicon: BDAG
  rationale: Como marca temporal que introduce el límite de la acción negada, «hasta que» expresa con claridad la condición que debe completarse antes de la liberación.
- source_word: καὶ τὸ ἔσχατον
  english_pob_choice: even the last
  chosen_spanish: hasta el último
  alternatives_spanish:
  - incluso el último
  - el último incluso
  lexicon: BDAG
  rationale: El valor intensivo de καί se comunica naturalmente con «hasta», y ἔσχατον se expresa como «último». La combinación transmite la idea de totalidad del pago.
- source_word: λεπτόν
  english_pob_choice: lepton
  chosen_spanish: leptón
  alternatives_spanish:
  - moneda pequeña
  - centavo
  lexicon: BDAG
  rationale: Se conserva el término técnico monetario «leptón» para mantener la especificidad histórica del texto. El sentido de moneda muy pequeña queda explícito en la nota.
- source_word: ἀποδῷς
  english_pob_choice: you have paid
  chosen_spanish: hayas pagado
  alternatives_spanish:
  - hayas repuesto
  - hayas saldado
  lexicon: BDAG
  rationale: El aoristo subjuntivo tras ἕως se expresa bien en español con un perfecto de subjuntivo. «Hayas pagado» comunica que el pago debe completarse antes de la salida, en un contexto legal/deuda.
theological_decisions:
- issue: Imagen de deuda y encarcelamiento
  english_pob_reading: Retain the debt-prison image without specifying whether it refers to earthly legal consequences, divine judgment, or purgatorial punishment.
  chosen_spanish_reading: Mantener la imagen de deuda y encierro sin precisar si alude a consecuencias legales terrenales, juicio divino o interpretación purgatorial.
  alternative_spanish_readings:
  - referencia a una pena legal terrenal
  - metáfora del juicio divino
  - apoyo para una lectura purgatorial posterior
  rationale: El versículo presenta la imagen de estar retenido hasta completar el pago, pero no identifica explícitamente su referente. La traducción debe preservar esa tensión teológica y no resolverla con una interpretación posterior.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se siguió de cerca el contexto de auditoría en inglés y no hubo revisiones aplicadas en la versión fuente más reciente; la redacción española conserva la estructura y el énfasis del original griego sin añadir interpretación doctrinal.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento de segunda persona singular («te», «saldrás», «hayas pagado») acorde con el griego.
  - Se conservó la imagen monetaria específica mediante «leptón», evitando sustituirla por una moneda moderna de valor aproximado.
  - La negación enfática se expresó en español natural sin perder el carácter absoluto del original.
