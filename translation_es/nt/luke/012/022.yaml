translation:
  language: es
  text: 'Entonces les dijo a sus discípulos: «Por esto les digo: no se preocupen[a] por su vida[b], por lo que comerán, ni por su cuerpo, por lo que vestirán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no estén ansiosos».
    reason: lexical_alternative
  - marker: b
    text: O «alma»; aquí la palabra griega a menudo significa «vida» en el sentido de la existencia terrenal de una persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν δὲ
  english_pob_choice: Then he said
  chosen_spanish: Entonces les dijo
  alternatives_spanish:
  - Y les dijo
  - Luego les dijo
  lexicon: BDAG
  rationale: δὲ es una partícula de enlace suave; «Entonces» da una progresión narrativa natural en español sin intensificar indebidamente el contraste.
- source_word: πρὸς τοὺς μαθητὰς αὐτοῦ
  english_pob_choice: to his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a los discípulos
  lexicon: BDAG
  rationale: Se conserva el posesivo implícito en español con «sus», correspondiente a αὐτοῦ, y «discípulos» es el equivalente directo y natural de μαθηταί.
- source_word: Διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esto
  alternatives_spanish:
  - Por esta razón
  - Así que
  lexicon: BDAG
  rationale: La frase remite a lo anterior e introduce una inferencia. «Por esto» conserva la fuerza causal/inferencial con brevedad y naturalidad en español.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les estoy diciendo
  - les digo a ustedes
  lexicon: BDAG
  rationale: «Les digo» comunica de manera idiomática la dirección explícita del discurso sin añadir énfasis innecesario.
- source_word: μὴ μεριμνᾶτε
  english_pob_choice: do not worry
  chosen_spanish: no se preocupen
  alternatives_spanish:
  - no se angustien
  - no estén ansiosos
  lexicon: BDAG
  rationale: μεριμνάω aquí expresa cuidado ansioso o preocupación. «No se preocupen» es claro y natural; preserva el tono exhortativo sin mecanizar el matiz clínico de «ansiosos».
- source_word: τῇ ψυχῇ
  english_pob_choice: about your life
  chosen_spanish: por su vida
  alternatives_spanish:
  - acerca de su vida
  - por su alma
  lexicon: BDAG
  rationale: En este contexto ψυχή se refiere a la vida terrenal o existencia, en paralelo con comida y ropa. «Por su vida» conserva el sentido práctico; no se traduce por «alma» porque eso introduciría una carga teológica ajena al contexto inmediato.
- source_word: τί φάγητε
  english_pob_choice: what you will eat
  chosen_spanish: qué comerán
  alternatives_spanish:
  - qué van a comer
  - qué han de comer
  lexicon: BDAG
  rationale: 'El sentido deliberativo se vierte de forma natural al español con futuro simple: «qué comerán».'
- source_word: μηδὲ τῷ σώματι
  english_pob_choice: nor about your body
  chosen_spanish: ni por su cuerpo
  alternatives_spanish:
  - ni acerca de su cuerpo
  - ni por el cuerpo
  lexicon: BDAG
  rationale: «Ni por su cuerpo» mantiene el paralelismo con la primera cláusula y corresponde al segundo objeto de la preocupación. «Cuerpo» traduce σῶμα de forma directa.
- source_word: τί ἐνδύσησθε
  english_pob_choice: what you will wear
  chosen_spanish: qué vestirán
  alternatives_spanish:
  - qué se pondrán
  - qué habrán de vestir
  lexicon: BDAG
  rationale: ἐνδύω en este contexto se refiere a ponerse ropa. «Qué vestirán» es una equivalencia natural y sobria en español, paralela a «qué comerán».
theological_decisions:
- issue: Sentido de ψυχή en el contraste con σώμα
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  rationale: El contraste con el cuerpo y la mención de comida y vestido muestran que ψυχή aquí apunta a la vida cotidiana, no a una entidad separada del cuerpo. «Vida» preserva la fuerza práctica del dicho de Jesús sin forzar una antropología dualista.
  doctrine_reference: 'Translation philosophy: primacía del sentido del texto original en su contexto inmediato; evitar importaciones doctrinales no requeridas por el pasaje.'
translation_notes:
  revision_awareness: La versión española sigue de cerca el flujo del griego y la solución auditada del POB inglés, conservando el valor inferencial de Διὰ τοῦτο, el sentido de ψυχή como «vida» y la exhortación de μεριμνᾶτε como preocupación ansiosa, pero expresándolos en español idiomático y publicable.
  spanish_consistency_notes:
  - Se mantiene «discípulos» como término estándar para μαθηταί.
  - Se usa «vida» para ψυχή en este contexto, en continuidad con la decisión auditada del POB inglés.
  - Se evita «alma» para no oscurecer el contraste práctico entre alimento y vestido.
  - Se conserva el paralelismo «qué comerán / qué vestirán» para reflejar la simetría griega.
  - No se introduce puntuación ni notas innecesarias que alteren la claridad del enunciado.
