  to: Ustedes también deben estar preparados[a], porque el Hijo del Hombre[c] viene[b] a la hora en que no lo esperan.
  rationale: Se conserva la traducción base porque es fiel y natural, pero se corrige la ubicación de la nota temporal para que corresponda a la frase que realmente comenta, y se mejora la nota [a] para reflejar una alternativa lexical significativa documentada en el rastro inglés. Se mantiene «viene» por su valor de presente futurista y «el Hijo del Hombre» por fidelidad al título cristológico.
