review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del griego: inclusión enfática («Ustedes también»), exhortación a una preparación continua, razón introducida por «porque», título cristológico «el Hijo del Hombre», y presente futurista «viene». Sin embargo, la nota [b] está mal anclada: comenta la frase temporal/final «a la hora en que no lo esperan / cuando no lo esperan», pero en el texto está colocada sobre «porque». Además, «a la hora en que» en español suena algo más específico de lo que sugiere ᾗ ὥρᾳ con el matiz indefinido reflejado por el inglés «at an hour».'
  spanish_quality_summary: El español es claro, natural y digno. «Deben estar preparados» funciona bien para γίνεσθε ἕτοιμοι, y «viene» es una buena solución idiomática para el presente futurista. El único problema de calidad/editorial relevante es la ubicación de la nota [b], que puede confundir al lector. También conviene alinear mejor la nota [a] con la alternativa inglesa «You too be ready», no solo con el orden de «también ustedes».
  glossary_alignment: 'La terminología clave está bien alineada con el proyecto: ὁ υἱὸς τοῦ ἀνθρώπου -> «el Hijo del Hombre»; ἔρχεται -> «viene» preservando el presente futurista; no hay conflictos con los términos por defecto del glosario. No aparecen aquí Yahvé, Mesías/Cristo, δοῦλος, πνεῦμα u otros términos sensibles del glosario.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada en «porque» pero explica la frase temporal «a la hora en que no lo esperan / cuando no lo esperan».
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Tal como está, induce a pensar que la alternativa afecta a ὅτι («porque») cuando en realidad afecta a ᾗ ὥρᾳ οὐ δοκεῖτε.
  - severity: low
    issue: La nota [a] no refleja bien la alternativa inglesa principal para γίνεσθε ἕτοιμοι.
    rationale: 'El inglés conserva «Or ''You too be ready.''». La nota española «O: “también ustedes”» solo ofrece un reordenamiento del sujeto enfático y no una alternativa significativa de la exhortación completa. Conviene dar una alternativa como «O: “Ustedes también estén preparados”».'
  revised_spanish_text: Ustedes también deben estar preparados[a], porque el Hijo del Hombre[c] viene[b] a la hora en que no lo esperan.
