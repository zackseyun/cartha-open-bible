translation:
  language: es
  text: Ustedes también deben estar preparados[a], porque el Hijo del Hombre[c] viene[b] a la hora en que no lo esperan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ustedes también estén preparados».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a una hora que no esperan»; o «cuando no lo esperan».'
    reason: lexical_alternative
  - marker: c
    text: 'Título griego: «el Hijo del Hombre», una designación que Jesús usa para sí mismo con probables ecos de Daniel 7:13–14.'
    reason: cross_reference
lexical_decisions:
- source_word: καὶ ὑμεῖς
  english_pob_choice: You also
  chosen_spanish: Ustedes también
  alternatives_spanish:
  - Y ustedes
  - Ustedes igualmente
  lexicon: BDAG
  rationale: 'La combinación añade inclusión y énfasis: los oyentes, como los siervos de la ilustración anterior, también están incluidos en la advertencia. «Ustedes también» conserva ese valor de énfasis en un español natural.'
- source_word: γίνεσθε ἕτοιμοι
  english_pob_choice: must be ready
  chosen_spanish: deben estar preparados
  alternatives_spanish:
  - estén listos
  - deben estar listos
  - manténganse preparados
  lexicon: BDAG
  rationale: El imperativo presente medio/pasivo pide una postura continua de preparación. En español, «deben estar preparados» transmite con claridad la fuerza exhortativa y la continuidad, sin sonar forzado.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la exhortación. «Porque» es el conector moderno más claro y directo en español.
- source_word: ᾗ ὥρᾳ
  english_pob_choice: at an hour
  chosen_spanish: a la hora en que
  alternatives_spanish:
  - a la hora
  - cuando
  lexicon: BDAG
  rationale: La frase dativa relativa funciona temporalmente. «A la hora en que» mantiene la idea de tiempo inesperado sin obligar a una referencia a una hora específica.
- source_word: οὐ δοκεῖτε
  english_pob_choice: you do not expect
  chosen_spanish: no lo esperan
  alternatives_spanish:
  - no piensan
  - no lo esperan ustedes
  - no se imaginan
  lexicon: BDAG
  rationale: δοκέω puede significar pensar, suponer o parecer. En este aviso escatológico, «no lo esperan» capta mejor la idea práctica de no anticipar su llegada. Se explicita el objeto con «lo» para evitar ambigüedad en español.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva el título cristológico tradicional y transparente. «Hijo del Hombre» mantiene la forma literal y su resonancia apocalíptica, especialmente con el trasfondo de Daniel 7:13–14.
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - está por venir
  - vendrá
  lexicon: BDAG
  rationale: El presente griego tiene fuerza futurista. «Viene» es natural en español y conserva la inmediatez y el tono de advertencia mejor que una futura más distante.
theological_decisions:
- issue: Título cristológico ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Hombre
  - el Hijo del ser humano
  rationale: Se conserva el título tradicional porque en este dicho funciona como autodesignación de Jesús con ecos apocalípticos y daniélicos. No se atenúa a una paráfrasis que borre esa carga intertextual.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Valor temporal del presente ἔρχεται en dicho escatológico
  english_pob_reading: is coming
  chosen_spanish_reading: viene
  alternative_spanish_readings:
  - vendrá
  - está viniendo
  rationale: El presente puede ser futurista. «Viene» preserva la vivacidad e inmediatez de la advertencia sin imponer un sistema escatológico más amplio.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente griego y el audit trail en inglés. Se preservan la exhortación continua en γίνεσθε ἕτοιμοι, el matiz temporal de ᾗ ὥρᾳ, el valor práctico de οὐ δοκεῖτε como expectativa no anticipada, y el título cristológico sin aplanarlo. No se detectaron revisiones aplicadas en el contexto inglés, así que el texto se formula directamente a partir del estado más reciente.
  spanish_consistency_notes:
  - Se usa «Ustedes» como forma neutra y de uso amplio en América Latina.
  - Se mantiene «Hijo del Hombre» como fórmula estable para el título cristológico.
  - Se evita «SEÑOR» o sustituciones tradicionales no presentes en este versículo.
  - «Viene» conserva el presente futurista sin añadir una futura más distante.
  - La estructura española prioriza claridad natural sin perder la relación causal del original.
