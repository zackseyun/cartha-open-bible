review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: contraste temporal de la hierba, acción divina de vestir, argumento de menor a mayor y reprensión final. Sin embargo, añade un matiz no presente en el texto con «no» en «¿cuánto más no los vestirá...?» y especifica el vocativo como «hombres», cuando el griego solo tiene «de poca fe» en vocativo plural. También falta en español la nota cultural sobre el horno que el POB inglés preservó.'
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. «Hierba del campo» y «viste» funcionan bien. No obstante, «¿cuánto más no...?» suena menos limpio en español contemporáneo y puede percibirse como énfasis añadido; «¿cuánto más...?» basta. «Hombres de poca fe» es comprensible pero innecesariamente masculino y menos fiel que «ustedes, de poca fe» o simplemente «de poca fe».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Dios» corresponde bien a ὁ θεός. La decisión «hierba» para χόρτον es adecuada. La principal cuestión léxica es ὀλιγόπιστοι: conviene evitar «hombres» porque no está en el griego. También debe preservarse la nota cultural para «horno», ya que el audit trail inglés la conserva.'
  issues:
  - severity: medium
    issue: Se añade «no» en «¿cuánto más no los vestirá...?».
    rationale: πόσῳ μᾶλλον significa «cuánto más»; la negación no está en el griego y añade un matiz enfático innecesario en español.
  - severity: medium
    issue: «Hombres de poca fe» sobreespecifica el vocativo.
    rationale: ὀλιγόπιστοι es vocativo plural, pero no incluye un sustantivo como «hombres». En español neutro y fiel, conviene «ustedes, de poca fe» o «de poca fe».
  - severity: low
    issue: Falta la nota cultural correspondiente al «horno».
    rationale: El POB inglés conserva una nota explicando que se trata de un horno de pan y que la hierba seca podía usarse como combustible; esa información sigue siendo útil y pertinente en español.
  revised_spanish_text: Pero si Dios así viste la hierba del campo[a], que hoy está aquí y mañana es echada en un horno[b], ¿cuánto más los vestirá a ustedes, ustedes de poca fe?
  revised_footnotes:
  - marker: a
    text: «Hierba» puede equivaler aquí a «vegetación» o «herbage»; el término abarca el crecimiento vegetal breve y seco del campo.
    reason: lexical_alternative
  - marker: b
    text: El «horno» se refiere a un horno para cocer pan; la hierba seca del campo podía usarse como combustible.
    reason: cultural_note
  revision_rationale: 'La revisión elimina una negación no presente en el griego, evita añadir «hombres» al vocativo y restaura la nota cultural del horno preservada en el audit trail inglés. Se mantiene la buena base del borrador: «hierba del campo», «viste» y la estructura argumentativa general.'
