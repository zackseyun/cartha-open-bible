translation:
  language: es
  text: Pero si Dios así viste la hierba del campo[a], que hoy está aquí y mañana es echada en un horno[b], ¿cuánto más los vestirá a ustedes, ustedes de poca fe?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hierba» puede equivaler aquí a «vegetación» o «herbage»; el término abarca el crecimiento vegetal breve y seco del campo.
    reason: lexical_alternative
  - marker: b
    text: El «horno» se refiere a un horno para cocer pan; la hierba seca del campo podía usarse como combustible.
    reason: cultural_note
lexical_decisions:
- source_word: χόρτον
  english_pob_choice: grass
  chosen_spanish: hierba
  alternatives_spanish:
  - pasto
  - vegetación
  - herbage
  lexicon: BDAG
  rationale: χόρτος puede referirse a hierba, pasto o vegetación. En español, «hierba del campo» comunica con naturalidad la imagen de la vegetación breve y seca que se usa como combustible, sin endurecer el texto con un tecnicismo.
- source_word: ἐν ἀγρῷ
  english_pob_choice: in the field
  chosen_spanish: del campo
  alternatives_spanish:
  - en el campo
  - en un campo
  - del terreno
  lexicon: BDAG
  rationale: La idea es locativa y genérica. «Del campo» funciona de manera idiomática en español junto con «hierba» y conserva el sentido de crecimiento silvestre al aire libre.
- source_word: ὄντα σήμερον καὶ αὔριον ... βαλλόμενον
  english_pob_choice: which is here today and tomorrow is thrown
  chosen_spanish: que hoy está aquí y mañana es echada
  alternatives_spanish:
  - que hoy existe y mañana es arrojada
  - que hoy está y mañana será echada
  lexicon: BDAG
  rationale: La construcción participial griega exige expansión en español. «Hoy está aquí y mañana es echada» conserva la brevedad temporal y la transitoriedad sin volverlo demasiado literal o pesado.
- source_word: κλίβανον
  english_pob_choice: oven
  chosen_spanish: horno
  alternatives_spanish:
  - horno de pan
  - horno de cocción
  - horno de barro
  lexicon: BDAG
  rationale: «Horno» es el equivalente natural y claro en español moderno. Mantiene la referencia a un horno de cocción sin introducir una especificación que el texto no explicita.
- source_word: ἀμφιέζει
  english_pob_choice: clothes
  chosen_spanish: viste
  alternatives_spanish:
  - cubre
  - adorna
  - reveste
  lexicon: BDAG
  rationale: El verbo significa vestir o poner ropa. «Viste» es directo, bíblico y natural en español, y conserva la personificación de Dios como quien cubre a la vegetación.
- source_word: πόσῳ μᾶλλον
  english_pob_choice: how much more
  chosen_spanish: ¿cuánto más no
  alternatives_spanish:
  - ¿cuánto más
  - ¡con cuánta más razón!
  - ¡mucho más!
  lexicon: BDAG
  rationale: La comparación de menor a mayor se expresa con «cuánto más». La partícula negativa enfática en español ayuda a reproducir el énfasis argumentativo del griego sin alterar el sentido.
- source_word: ὀλιγόπιστοι
  english_pob_choice: you of little faith
  chosen_spanish: hombres de poca fe
  alternatives_spanish:
  - de poca fe
  - ustedes, de poca fe
  - personas de poca fe
  lexicon: BDAG
  rationale: La vocación en vocativo es una reprensión directa pero afectuosa. «Hombres de poca fe» sigue el uso bíblico tradicional en español para el vocativo plural masculino y conserva el matiz de reproche pastoral.
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  - Pues si
  lexicon: BDAG
  rationale: «δέ» marca continuidad con leve contraste; «Pero si» reproduce bien ese giro argumental y su función de introducir un nuevo ejemplo.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: BDAG
  rationale: El sujeto es explícito y no requiere perífrasis. «Dios» es la forma directa y plenamente transparente en español.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esa manera
  - de tal modo
  - de esta forma
  lexicon: BDAG
  rationale: «Así» conserva la manera o modo del vestir divino y enlaza con la comparación en una forma natural en español.
theological_decisions:
- issue: Tono de la reprensión en ὀλιγόπιστοι
  english_pob_reading: 'A direct but gentle rebuke: ''you of little faith'''
  chosen_spanish_reading: 'Una reprensión directa pero no desmedida: «hombres de poca fe»'
  alternative_spanish_readings:
  - de poca fe
  - ustedes, de poca fe
  - poca fe tienen
  rationale: 'El griego no formula una condena doctrinal sino una censura pastoral de la confianza deficiente. La traducción mantiene esa tensión: reprende con fuerza, pero sin convertirlo en una acusación más severa que la del texto.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y no introduce revisiones textuales adicionales; se conserva la imagen del campo, el horno y la comparación de menor a mayor con el vocativo de reprensión.
  spanish_consistency_notes:
  - Se mantiene «Dios» para ὁ θεός, sin sustituirlo por una forma reverencial más interpretativa.
  - Se eligió «viste» para ἀμφιέζει por concordar con el campo semántico de vestir y con el paralelismo del inglés auditado.
  - «Hombres de poca fe» conserva el vocativo plural y el tono bíblico tradicional, sin borrar la reprensión.
  - «Horno» se usa como equivalente natural de κλίβανον, manteniendo la referencia cultural a un horno de cocción.
