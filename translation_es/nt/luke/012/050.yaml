revisions:
- from: Pero tengo un bautismo que recibir[b][a], y ¡cómo me angustio[c] hasta que se cumpla!
  to: Pero tengo un bautismo que recibir[b][a], y ¡qué angustiado estoy[c] hasta que se cumpla!
  rationale: Se ajusta συνέχομαι a una expresión española más fiel al estado de presión/angustia que describe el griego, sin perder naturalidad. También se refuerza la nota alternativa para reflejar mejor la explicitud de la imagen bautismal en el original. El resto del versículo puede mantenerse.
