translation:
  language: es
  text: Pero tengo un bautismo que recibir[b][a], y ¡qué angustiado estoy[c] hasta que se cumpla!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tengo un bautismo con el que he de ser bautizado». El griego conserva explícita la imagen del bautismo.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «bautismo» es metafórico y alude al sufrimiento abrumador que Jesús está por enfrentar.
    reason: theological_note
  - marker: c
    text: 'O: «cómo estoy bajo presión» o «cómo me siento constreñido» hasta que se complete.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βάπτισμα
  english_pob_choice: a baptism
  chosen_spanish: un bautismo
  alternatives_spanish:
  - una inmersión
  lexicon: BDAG
  rationale: Conservo el sustantivo 'bautismo' para mantener la imagen metafórica explícita que el texto griego preserva. 'Inmersión' sería posible, pero en español perdería la resonancia bíblica y la tensión interpretativa que el POB documenta.
- source_word: ἔχω βαπτισθῆναι
  english_pob_choice: I have a baptism to undergo
  chosen_spanish: tengo un bautismo que recibir
  alternatives_spanish:
  - tengo un bautismo que sufrir
  - tengo que pasar por un bautismo
  - debo recibir un bautismo
  lexicon: BDAG
  rationale: La construcción expresa algo pendiente y necesario. 'Tener que recibir' suena natural en español y conserva el pasivo de βαπτισθῆναι sin recurrir a una paráfrasis interpretativa como 'sufrir'.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: ¡cómo
  alternatives_spanish:
  - cuánto
  - de qué manera
  lexicon: BDAG
  rationale: Mantengo el exclamativo 'cómo' para reproducir la intensidad afectiva de la expresión. En español introduce con naturalidad el estado emocional que sigue.
- source_word: συνέχομαι
  english_pob_choice: am distressed
  chosen_spanish: me angustio
  alternatives_spanish:
  - estoy angustiado
  - me siento oprimido
  - estoy bajo presión
  - estoy constreñido
  lexicon: BDAG
  rationale: '''Me angustio'' comunica de forma clara la presión interna o constricción que el verbo puede implicar. Preserva la tensión sin fijarla de manera demasiado técnica como ''constreñido''.'
- source_word: ἕως ὅτου
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta cuando
  lexicon: BDAG
  rationale: '''Hasta que'' es la equivalencia temporal natural en español para marcar el límite de la angustia de Jesús.'
- source_word: τελεσθῇ
  english_pob_choice: it is accomplished
  chosen_spanish: se cumpla
  alternatives_spanish:
  - se complete
  - se realice
  - se lleve a cabo
  - se termine
  lexicon: BDAG
  rationale: '''Se cumpla'' expresa la idea de llegar a su realización completa e intencional, y en español bíblico conserva mejor la noción de cumplimiento que ''terminar'' o ''completar''.'
theological_decisions:
- issue: Referencia metafórica del 'bautismo'
  english_pob_reading: Jesus speaks metaphorically of his coming suffering and death, while retaining the baptism imagery in translation.
  chosen_spanish_reading: Jesús habla metafóricamente de su sufrimiento y muerte venideros, conservando la imagen del bautismo en la traducción.
  alternative_spanish_readings:
  - Jesús se refiere solo a una prueba intensa
  - Jesús habla de un bautismo literal en agua
  rationale: El contexto apunta a la pasión de Jesús, pero el texto no debe resolver la metáfora. Mantener 'bautismo' en el texto principal conserva la imagen y la tensión teológica que el POB documenta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincido con el último pase revisado: no se requieren cambios respecto del análisis auditado; la redacción española mantiene la imagen metafórica de βάπτισμα, conserva el matiz de necesidad de ἔχω + infinitivo y refleja la presión interior de συνέχομαι sin sobreinterpretarla.'
  spanish_consistency_notes:
  - Se usa 'bautismo' en lugar de una glosa explicativa para conservar la metáfora.
  - '''Me angustio'' evita tanto la rigidez de ''constreñido'' como la excesiva expansión interpretativa.'
  - '''Se cumpla'' traduce la culminación de τελεσθῇ con un verbo idiomático y reverente en español.'
  - Las notas distinguen claramente la alternativa literal, la interpretación metafórica y el matiz verbal.
