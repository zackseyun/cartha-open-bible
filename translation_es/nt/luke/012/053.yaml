translation:
  language: es
  text: 'Quedarán divididos[a]: padre contra hijo y hijo contra padre, madre contra hija y hija contra madre[c], suegra contra su nuera[b] y nuera contra su suegra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán separados». El verbo griego enfatiza una división interna dentro de un mismo grupo o casa.
    reason: lexical_alternative
  - marker: b
    text: La palabra griega para «nuera» también puede significar «novia» en otros contextos, pero aquí la pareja familiar con «suegra» favorece el sentido «nuera».
    reason: lexical_alternative
  - marker: c
    text: 'Una redacción anterior decía: «y nuera contra suegra».'
    reason: previous_rendering
lexical_decisions:
- source_word: διαμερισθήσονται
  english_pob_choice: will be divided
  chosen_spanish: serán divididos
  alternatives_spanish:
  - serán separados
  - se partirán
  lexicon: BDAG
  rationale: El verbo futuro pasivo expresa una división interna dentro del grupo familiar. «Serán divididos» conserva ese valor resultativo y es natural en español; «se partirán» suena menos claro y «serán separados» suaviza un poco el énfasis de conflicto.
- source_word: ἐπὶ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: BDAG
  rationale: En esta construcción repetida con personas, ἐπί tiene sentido adversativo. «Contra» reproduce mejor la oposición y el paralelismo del pasaje.
- source_word: πατήρ
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - papá
  lexicon: BDAG
  rationale: «Padre» es la equivalencia estándar, sobria y fiel al término familiar específico.
- source_word: υἱός
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - vástago
  lexicon: BDAG
  rationale: El griego designa un hijo varón; «hijo» mantiene la reciprocidad con «padre».
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - mamá
  lexicon: BDAG
  rationale: Término familiar estándar y preciso; se mantiene la simetría con el resto de los pares.
- source_word: θυγάτηρ
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - muchacha
  - nieta
  lexicon: BDAG
  rationale: El término griego es específicamente femenino; «hija» preserva la pareja padre/madre-hijo/hija.
- source_word: πενθερά
  english_pob_choice: mother-in-law
  chosen_spanish: suegra
  alternatives_spanish:
  - madre política
  lexicon: BDAG
  rationale: «Suegra» es el equivalente contemporáneo claro de πενθερά y evita una perífrasis poco natural.
- source_word: νύμφη
  english_pob_choice: daughter-in-law
  chosen_spanish: nuera
  alternatives_spanish:
  - novia
  - esposa
  lexicon: BDAG
  rationale: Aunque νύμφη puede significar «novia» o «novia desposada» en otros contextos, aquí el emparejamiento con πενθερά muestra el sentido kinship de «nuera».
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: su
  alternatives_spanish:
  - de ella
  lexicon: BDAG
  rationale: El pronombre posesivo está explícito en el griego final; «su suegra» reproduce de modo natural la relación marcada por αὐτῆς.
theological_decisions:
- issue: Naturaleza de la división familiar
  english_pob_reading: A description of social and familial conflict resulting from Jesus' mission, not a doctrinal endorsement of family hostility.
  chosen_spanish_reading: Una descripción del conflicto social y familiar que acompaña la misión de Jesús, no una aprobación de la hostilidad dentro de la familia.
  alternative_spanish_readings:
  - Un proverbio general sobre tensiones familiares
  - Una predicción neutral sin matiz conflictivo
  rationale: El versículo enumera oposiciones recíprocas dentro del hogar. La traducción conserva la dureza del enunciado sin suavizarla ni presentarla como norma moral.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El audio de revisión en inglés concluyó sin cambios necesarios en la última pasada; la única decisión especialmente sensible fue mantener la fuerza adversativa de ἐπί y la equivalencia kinship de νύμφη como «nuera», con la posesión explícita en el último miembro del paralelismo para claridad natural en español.
  spanish_consistency_notes:
  - Se mantiene «contra» para ἐπί en todo el versículo, preservando el paralelismo.
  - Se usa «suegra»/«nuera» para el par final, evitando ambigüedad con «novia».
  - Se conserva la secuencia sintáctica breve y enumerativa del griego, adecuada para lectura pública.
  - El pie de nota [a] está anclado en «Serán divididos» porque refleja la alternativa lexical documentada para διαμερισθήσονται.
