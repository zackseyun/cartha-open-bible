    changes_summary: 'Revised ‘is delaying his coming’ to ‘delays in coming’ for more natural English while preserving the Greek sense. No other changes needed. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Pero si ese esclavo[a] dice en su corazón: «Mi amo[b] tarda en venir», y empieza a golpear a los esclavos varones y a las esclavas, y a comer y beber y emborracharse,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo» para «esclavo» (griego δοῦλος); aquí se usa «esclavo» porque en la relación doméstica del pasaje pesa el vínculo de subordinación.
    reason: lexical_alternative
  - marker: b
    text: O «mi señor». El griego dice literalmente «mi señor/amo» y aquí se refiere al superior doméstico dentro de la parábola.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δοῦλος ἐκεῖνος
  english_pob_choice: that slave
  chosen_spanish: ese esclavo
  alternatives_spanish:
  - ese siervo
  - ese criado
  lexicon: BDAG
  rationale: Se mantiene la fuerza de δοῦλος como relación de propiedad y subordinación; en este contexto parabólico la condición de esclavo es la más salientable. ‘Ese’ refleja ἐκεῖνος con deíxis enfática.
- source_word: ἐν τῇ καρδίᾳ αὐτοῦ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - para sí
  - dentro de sí
  lexicon: BDAG
  rationale: ‘En su corazón’ conserva la locución interior e idiomática del griego, manteniendo el pensamiento privado e ինտimo sin explicitarlo más de lo necesario.
- source_word: Χρονίζει
  english_pob_choice: delays in coming
  chosen_spanish: tarda en venir
  alternatives_spanish:
  - se demora en venir
  - está tardando en venir
  lexicon: BDAG
  rationale: ‘Tarda en venir’ expresa con naturalidad la demora continua implícita en el presente del griego y evita una calca pesada.
- source_word: ὁ κύριός μου
  english_pob_choice: my master
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi maestro
  lexicon: BDAG
  rationale: Aunque el contexto narrativo es doméstico, κύριος aquí puede leerse como señor/amo del hogar. En español, ‘señor’ conserva la ambigüedad del término griego sin forzar una identificación litúrgica; la nota explica que se trata del superior doméstico del relato.
- source_word: ἔρχεσθαι
  english_pob_choice: his coming
  chosen_spanish: venir
  alternatives_spanish:
  - llegar
  - su venida
  lexicon: BDAG
  rationale: El infinitivo complementario con χρονίζει se traduce de forma directa y natural como ‘venir’.
- source_word: ἄρξηται
  english_pob_choice: begins
  chosen_spanish: empieza a
  alternatives_spanish:
  - comienza a
  - se pone a
  lexicon: BDAG
  rationale: ‘Empieza a’ reproduce el valor ingrésivo del aoristo subjuntivo y fluye bien en español.
- source_word: τύπτειν
  english_pob_choice: to beat
  chosen_spanish: golpear
  alternatives_spanish:
  - pegar
  - azotar
  lexicon: BDAG
  rationale: Se opta por ‘golpear’ como equivalente moderno y suficientemente fuerte; ‘pegar’ sería más coloquial y ‘azotar’ introduciría una especificidad no requerida por el texto.
- source_word: τοὺς παῖδας
  english_pob_choice: the male servants
  chosen_spanish: a los esclavos varones
  alternatives_spanish:
  - a los siervos varones
  - a los criados varones
  lexicon: BDAG
  rationale: Se conserva la distinción de género del par con παιδίσκας. ‘Esclavos varones’ refleja el valor de παῖδες aquí dentro de la relación servil del pasaje y evita perder la fuerza social del texto.
- source_word: τὰς παιδίσκας
  english_pob_choice: the female servants
  chosen_spanish: a las esclavas
  alternatives_spanish:
  - a las siervas
  - a las muchachas de servicio
  lexicon: BDAG
  rationale: Se mantiene el paralelo femenino explícito del griego. ‘Esclavas’ preserva la simetría semántica con παῖδας.
- source_word: ἐσθίειν τε καὶ πίνειν
  english_pob_choice: to eat and drink
  chosen_spanish: a comer y beber
  alternatives_spanish:
  - a comer y a beber
  - a comer, beber
  lexicon: BDAG
  rationale: Se vierte la pareja verbal de forma simple y transparente; en español la repetición de ‘a’ antes de cada infinitivo no es necesaria.
- source_word: μεθύσκεσθαι
  english_pob_choice: get drunk
  chosen_spanish: emborracharse
  alternatives_spanish:
  - embriagarse
  - ponerse ebrio
  lexicon: BDAG
  rationale: ‘Emborracharse’ comunica con claridad el sentido de intox icarse del verbo y es natural en español contemporáneo. Se evita una forma excesivamente culta o ambigua.
theological_decisions:
- issue: κύριος en una parábola doméstica, no como título divino
  english_pob_reading: my master
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  - mi maestro
  rationale: El contexto es la relación amo-esclavo dentro de la parábola; por eso se evita ‘Señor’ con mayúscula. ‘Señor’ en minúscula mantiene la relación de autoridad sin cargar una lectura cristológica o divina.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation philosophy #1 y #5'
- issue: δοῦλος y la fuerza social de esclavitud en el relato
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: La escena subraya posesión, jerarquía y abuso. ‘Esclavo’ preserva esa tensión y evita suavizar el término con ‘siervo’, que en español suele sonar más noble o eclesiástico.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy #1'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión final del inglés POB: δοῦλος se mantiene como ‘slave/esclavo’; χρονίζει se expresa de forma natural como ‘tarda en venir’; y κύριος se entiende aquí en el marco doméstico del relato. También se conserva la distinción de género entre παῖδας y παιδίσκας.'
  spanish_consistency_notes:
  - Se mantiene ‘esclavo’ para δοῦλος de forma coherente con la política POB y con el contexto de abuso doméstico.
  - Se usa ‘señor’ en minúscula para κύριος porque el referente es humano dentro de la parábola.
  - Se conserva el paralelismo de género con ‘esclavos varones’ / ‘esclavas’.
  - El orden verbal sigue el griego sin forzar una sintaxis artificiosa en español.
