review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego: condición hipotética, pensamiento interior, demora del superior, abuso de subordinados y autoindulgencia. También conserva correctamente δοῦλος como «esclavo» y distingue los grupos masculino y femenino. Sin embargo, «mi señor» para ὁ κύριός μου no refleja bien la decisión auditada del POB ni la referencia doméstica del contexto; en español introduce una ambigüedad más fuerte hacia título honorífico o religioso que la deseada. «Mi amo» o «mi patrón» comunicaría mejor la relación doméstica; aquí «mi amo» es el ajuste más fiel.'
  spanish_quality_summary: El español es claro y legible. «Tarda en venir», «empieza a golpear» y «emborracharse» son naturales. La frase completa fluye bien. El único problema importante de calidad/fidelidad es «mi señor», que en español bíblico puede sonar demasiado cercano a un título reverencial y debilita la precisión contextual que el inglés auditado quiso fijar con «my master».
  glossary_alignment: Se alinea bien con la política de δοῦλος -> «esclavo». No hay términos divinos en juego salvo κύριος, que aquí debe tratarse contextualmente como superior humano, no como «Señor». Por eso la mejor alineación terminológica es cambiar «mi señor» por «mi amo», manteniendo una nota con la alternativa literal «mi señor».
  issues:
  - severity: high
    issue: «Mi señor» para κύριός μου en este contexto parabólico doméstico
    rationale: La evidencia griega y la decisión teológica/lexical auditada del POB favorecen «my master» porque κύριος se refiere al superior humano del esclavo. En español, «mi señor» conserva demasiado una resonancia reverencial o ambigua; «mi amo» expresa mejor la relación amo-esclavo sin sugerir título divino.
  - severity: low
    issue: La nota b presenta como alternativa «mi amo» cuando en realidad debería ser la lectura principal
    rationale: Si se corrige el texto principal a «mi amo», la nota puede conservar «mi señor» como alternativa más literal, explicando que el referente es el superior doméstico de la parábola.
  revised_spanish_text: 'Pero si ese esclavo[a] dice en su corazón: «Mi amo[b] tarda en venir», y empieza a golpear a los esclavos varones y a las esclavas, y a comer y beber y emborracharse,'
  revised_footnotes:
  - marker: a
    text: O «siervo» para «esclavo» (griego δοῦλος); aquí se usa «esclavo» porque en la relación doméstica del pasaje pesa el vínculo de subordinación.
    reason: lexical_alternative
  - marker: b
    text: O «mi señor». El griego dice literalmente «mi señor/amo» y aquí se refiere al superior doméstico dentro de la parábola.
    reason: alternative_reading
  revision_rationale: Se cambia solo κύριός μου de «mi señor» a «mi amo» para ajustarlo a la decisión contextual del POB y evitar una ambigüedad reverencial innecesaria en español. El resto del versículo es fiel, claro y natural, y las notas se conservan con la alternativa reubicada correctamente.
