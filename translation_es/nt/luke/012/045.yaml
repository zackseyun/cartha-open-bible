source:
  edition: SBLGNT
  text: ἐὰν δὲ εἴπῃ ὁ δοῦλος ἐκεῖνος ἐν τῇ καρδίᾳ αὐτοῦ· Χρονίζει ὁ κύριός μου ἔρχεσθαι, καὶ ἄρξηται τύπτειν τοὺς παῖδας καὶ τὰς παιδίσκας, ἐσθίειν τε καὶ πίνειν καὶ μεθύσκεσθαι,
base_translation:
  language: en
  yaml_path: translation/nt/luke/012/045.yaml
  text: But if that slave says in his heart[a], ‘My master delays in coming,’ and begins to beat the male slaves and the female servants, and to eat and drink and get drunk[b],
  footnotes:
  - marker: a
    text: Or 'My lord delays coming.' The Greek has 'my lord/master is delaying to come,' with κύριος here referring to the household superior in the parable.
    reason: alternative_reading
  - marker: b
    text: Or 'servant' for 'slave' (Greek δοῦλος); 'slave' is used here because the bonded household relationship is prominent in the context.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
