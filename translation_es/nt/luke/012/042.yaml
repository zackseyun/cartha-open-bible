translation:
  language: es
  text: 'Y dijo el Señor: «¿Quién, pues, es el mayordomo fiel y prudente[a], a quien el señor pondrá sobre su servidumbre, para que les dé su ración de alimento[b] a su debido tiempo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sabio» mayordomo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la ración de grano», es decir, la porción medida de comida asignada a cada sirviente.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord / master
  chosen_spanish: Señor / señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En el primer uso, ὁ κύριος funciona como título narrativo para Jesús y en español se conserva naturalmente como «el Señor». En la cláusula parabólica, κύριος refiere al dueño de la casa; en español conviene mantener la distinción con «el señor» sin mayúscula para conservar la diferencia de referente que documenta el audit trail inglés.
- source_word: πιστὸς
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - leal
  lexicon: BDAG
  rationale: πιστός describe confiabilidad en una responsabilidad recibida. «Fiel» es la equivalencia más natural y estable en español bíblico para este contexto de mayordomía.
- source_word: οἰκονόμος
  english_pob_choice: steward
  chosen_spanish: mayordomo
  alternatives_spanish:
  - administrador
  - encargado
  lexicon: BDAG
  rationale: οἰκονόμος es la persona encargada de administrar una casa o hacienda. «Mayordomo» preserva bien esa función de administración delegada y es transparente para el lector en español.
- source_word: φρόνιμος
  english_pob_choice: prudent
  chosen_spanish: prudente
  alternatives_spanish:
  - sabio
  - sensato
  lexicon: BDAG
  rationale: φρόνιμος destaca juicio práctico y discernimiento. «Prudente» reproduce ese matiz de buen juicio administrativo sin sobrecargar el verso.
- source_word: καταστήσει
  english_pob_choice: will appoint
  chosen_spanish: pondrá
  alternatives_spanish:
  - nombrará
  - colocará
  lexicon: BDAG
  rationale: καθίστημι en futuro activo expresa colocar a alguien en una posición de responsabilidad. «Pondrá sobre» comunica de forma natural la instalación en una función de supervisión; «nombrará» sería posible, pero menos visual aquí.
- source_word: θεραπείας
  english_pob_choice: household staff
  chosen_spanish: su servidumbre
  alternatives_spanish:
  - su servidumbre doméstica
  - sus servidores
  lexicon: BDAG
  rationale: θεραπεία puede referirse al conjunto de sirvientes o asistentes de una casa. «Servidumbre» conserva el sentido colectivo de personas bajo la administración del mayordomo; se evita «casa» aislado porque no explicita el grupo de personas que recibe el alimento.
- source_word: ἐν καιρῷ
  english_pob_choice: at the proper time
  chosen_spanish: a su debido tiempo
  alternatives_spanish:
  - en el momento oportuno
  - a tiempo
  lexicon: BDAG
  rationale: καιρός señala el tiempo adecuado o señalado. «A su debido tiempo» refleja bien esa oportunidad debida y suena natural en español.
- source_word: σιτομέτριον
  english_pob_choice: food allowance
  chosen_spanish: ración de alimento
  alternatives_spanish:
  - ración de grano
  - porción medida de comida
  lexicon: BDAG
  rationale: σιτομέτριον significa literalmente una porción medida, históricamente de grano. «Ración de alimento» comunica en español la distribución concreta y permite conservar la nota de lectura más literal sin imponer un tecnicismo innecesario en el texto principal.
theological_decisions:
- issue: Distinguir entre Jesús como narrador y el dueño de la parábola, ambos llamados κύριος
  english_pob_reading: '''the Lord'' for Jesus as speaker; ''the master'' for the parable''s household owner'
  chosen_spanish_reading: «el Señor» para Jesús como hablante; «el señor» para el dueño de la casa en la parábola
  alternative_spanish_readings:
  - «el Señor» en ambos lugares
  rationale: El griego usa la misma palabra, pero el contexto narrativo exige distinguir referentes. El español puede hacerlo sin perder el vínculo léxico, evitando confusión entre el Señor que habla y el señor de la parábola.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor; se permite variación contextual documentada cuando el referente interno de la parábola lo requiere.'
translation_notes:
  revision_awareness: La versión sigue el pasaje griego SBLGNT y el audit trail en inglés sin cambios de revisión aplicados; se conserva la distinción entre κύριος narrativo y parabólico, y el valor concreto de σιτομέτριον como porción medida de alimento.
  spanish_consistency_notes:
  - Se usa «Señor» con mayúscula para la referencia a Jesús y «señor» en minúscula para el dueño de la parábola, manteniendo la distinción documentada.
  - «Mayordomo» se emplea consistentemente para οἰκονόμος; «ración de alimento» refleja el sentido distributivo de σιτομέτριον sin exigir tecnicismo.
  - «A su debido tiempo» traduce ἐν καιρῷ con naturalidad y mantiene el matiz de oportunidad señalada.
