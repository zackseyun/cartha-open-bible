translation:
  language: es
  text: Porque la vida[a] es más que el alimento, y el cuerpo más que la ropa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «alma»: la palabra griega ψυχή puede significar «vida», «yo» o «alma»; aquí el contexto favorece «vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón explicativa del mandato previo de no preocuparse. En español, «porque» conserva bien esa relación causal/explicativa y suena natural en un contexto discursivo continuo.
- source_word: ψυχή
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - ser
  lexicon: BDAG
  rationale: En este contexto de comida, preocupación y provisión del cuerpo, ψυχή apunta a la vida terrenal de la persona, no a una afirmación directa sobre el alma inmortal. «Vida» preserva esa comparación con alimento y vestido sin borrar la tensión semántica del término griego.
- source_word: πλεῖόν
  english_pob_choice: more than
  chosen_spanish: más que
  alternatives_spanish:
  - mayor que
  - más importante que
  lexicon: BDAG
  rationale: El comparativo con genitivo expresa excedencia o superioridad. «Más que» reproduce la comparación de forma natural en español sin añadir una valoración interpretativa como «más importante».
- source_word: τροφῆς
  english_pob_choice: food
  chosen_spanish: el alimento
  alternatives_spanish:
  - la comida
  - el sustento
  lexicon: BDAG
  rationale: «Alimento» es una opción amplia y digna que cubre el sentido básico de τροφή. Se prefiere sobre «comida» porque suena ligeramente más formal y corresponde bien al paralelo con el cuerpo y la ropa.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el organismo
  lexicon: BDAG
  rationale: Referencia literal al cuerpo físico, en paralelo con el vestido. No hay motivo contextual para desplazarlo a un sentido metafórico.
- source_word: ἔνδυμα
  english_pob_choice: clothing
  chosen_spanish: la ropa
  alternatives_spanish:
  - el vestido
  - la vestimenta
  lexicon: BDAG
  rationale: «Ropa» es la equivalencia moderna más clara y natural para lo que cubre el cuerpo. «Vestido» o «vestimenta» son posibles, pero menos idiomáticos en español contemporáneo.
theological_decisions:
- issue: Sentido de ψυχή en la enseñanza sobre la preocupación
  english_pob_reading: ψυχή is rendered 'life' rather than 'soul'
  chosen_spanish_reading: ψυχή se traduce como «vida», no como «alma»
  alternative_spanish_readings:
  - alma
  - ser
  rationale: La frase contrapone ψυχή con alimento y σώμα con ropa, de modo que el foco está en la existencia concreta y sus necesidades. Traducir «alma» introduciría una antropología más estrecha que la que exige el contexto; «vida» mantiene el alcance inmediato y deja intactos otros usos teológicos de ψυχή.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa pasó por una revisión que restauró explícitamente el segundo comparativo («more than») para reflejar la estructura griega; la redacción española mantiene ese paralelismo con «más que» en ambas cláusulas.
  spanish_consistency_notes:
  - 'Se mantiene el patrón comparativo doble del griego: «la vida ... más que ... y el cuerpo más que ...».'
  - Se evita «Señor» u otra convención de sustitución divina porque el versículo no contiene el tetragrámaton ni un título divino directo.
  - Se elige «ropa» por claridad moderna, sin perder el valor general de ἔνδυμα como prenda o vestimenta.
