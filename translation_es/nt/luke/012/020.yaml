translation:
  language: es
  text: 'Pero Dios le dijo: «¡Necio! Esta misma noche te reclaman la vida[a], y lo que has preparado, ¿para quién será?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu alma». El término griego ψυχή puede significar «vida» o «alma», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ αὐτῷ ὁ θεός
  english_pob_choice: But God said to him
  chosen_spanish: Pero Dios le dijo
  alternatives_spanish:
  - Y Dios le dijo
  - Pero Dios le respondió
  lexicon: θεός
  rationale: Se mantiene Dios como sujeto explícito. «Le dijo» reproduce el dativo con naturalidad en español, sin añadir matices que el griego no exige.
- source_word: Ἄφρων
  english_pob_choice: Fool
  chosen_spanish: ¡Necio!
  alternatives_spanish:
  - ¡Fool!
  - ¡Insensato!
  - ¡Torpe!
  lexicon: ἄφρων
  rationale: «Necio» conserva la fuerza de reprensión y es un equivalente bíblico sobrio en español. «Insensato» es posible, pero puede sonar más explicativo que el vocativo abrupto del griego.
- source_word: ταύτῃ τῇ νυκτί
  english_pob_choice: This very night
  chosen_spanish: Esta misma noche
  alternatives_spanish:
  - Esta noche
  - En esta misma noche
  lexicon: νύξ
  rationale: La doble deíxis refuerza inmediatez. «Esta misma noche» comunica bien esa urgencia en español sin sonar forzado.
- source_word: τὴν ψυχήν σου
  english_pob_choice: your life
  chosen_spanish: la vida
  alternatives_spanish:
  - tu vida
  - tu alma
  lexicon: ψυχή
  rationale: En este contexto, ψυχή apunta a la vida del hombre que será quitada esa misma noche. «La vida» conserva el sentido contextual; «alma» se reserva como alternativa léxica tradicional, pero podría estrechar indebidamente el alcance aquí.
- source_word: ἀπαιτοῦσιν ἀπὸ σοῦ
  english_pob_choice: is demanded from you
  chosen_spanish: te demandan
  alternatives_spanish:
  - te es demandada
  - te la demandan
  - te la reclaman
  lexicon: ἀπαιτέω
  rationale: El verbo está en plural impersonal en griego. En español, «te demandan» mantiene la impersonalidad y la fuerza de exigencia sin inventar un sujeto explícito. Se evita «te es demandada» por resultar menos natural y menos directo en este contexto.
- source_word: ἃ δὲ ἡτοίμασας
  english_pob_choice: the things you prepared
  chosen_spanish: lo que has preparado
  alternatives_spanish:
  - las cosas que preparaste
  - lo que preparaste
  lexicon: ἑτοιμάζω
  rationale: El neutro plural puede referirse al conjunto de bienes acumulados. «Lo que has preparado» es idiomático y abarca ese conjunto sin añadir detalle.
- source_word: τίνι ἔσται
  english_pob_choice: whose will they be?
  chosen_spanish: ¿para quién será?
  alternatives_spanish:
  - ¿de quién será?
  - ¿a quién pertenecerá?
  lexicon: τίς
  rationale: La pregunta apunta al destino/posesión de lo preparado. «¿Para quién será?» conserva el golpe retórico y evita forzar una construcción posesiva que en español puede sonar menos directa. El singular «será» sigue al neutro colectivo implícito.
theological_decisions:
- issue: Sentido de ψυχή en un contexto de muerte inminente
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  rationale: El pasaje trata de la muerte inmediata del rico insensato y de la pérdida de su existencia terrenal. Traducir ψυχή como «vida» evita imponer una antropología más estrecha que el contexto no desarrolla, aunque «alma» permanece como posibilidad semántica reconocida.
  doctrine_reference: Preservar la tensión lexical sin resolverla dogmáticamente.
- issue: Sujeto implícito de ἀπαιτοῦσιν
  english_pob_reading: is demanded from you
  chosen_spanish_reading: te demandan
  alternative_spanish_readings:
  - te es demandada
  - te reclaman
  rationale: El griego usa un plural sin sujeto explícito. En español conviene conservar esa indefinición para no precisar quién exige la vida. «Te demandan» reproduce bien el carácter impersonal y la gravedad del anuncio.
  doctrine_reference: Mantener la pasiva/impersonalidad del original sin añadir agentes.
translation_notes:
  revision_awareness: La redacción sigue el ajuste auditado del inglés POB que pasó de una paráfrasis con 'being demanded back' a una forma más sobria ('is demanded'). En español, se reflejó esa sobriedad con una impersonal directa ('te demandan') y se evitó añadir 'de vuelta' o 'otra vez', que el griego no exige.
  spanish_consistency_notes:
  - Se usó «Dios» para θεός conforme al estándar del proyecto.
  - Se eligió una forma breve y directa para ἄφρων, manteniendo el tono de reprensión.
  - Se conservó la ambigüedad semántica de ψυχή en una nota, pero no en el cuerpo del texto.
  - La pregunta final se vertió con valor posesivo/destinativo en español natural, sin perder el carácter retórico del griego.
  - La puntuación refleja el contraste de oráculo y pregunta final con comillas españolas y signos de exclamación/interrogación invertidos.
