translation:
  language: es
  text: Así es el que acumula tesoros para sí y no es rico hacia Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «rico ante Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: So is
  chosen_spanish: Así es
  alternatives_spanish:
  - De este modo es
  - Así le sucede al que
  lexicon: BDAG
  rationale: οὕτως introduce una conclusión aplicada desde la parábola anterior. «Así es» conserva el valor conclusivo y proverbial sin forzar una paráfrasis más larga.
- source_word: ὁ θησαυρίζων
  english_pob_choice: the one who stores up treasure
  chosen_spanish: el que acumula tesoros
  alternatives_spanish:
  - el que guarda tesoros
  - el que atesora
  - la persona que acumula tesoros
  lexicon: BDAG
  rationale: El participio con artículo funciona de manera sustantiva. «El que» mantiene el valor genérico; «acumula tesoros» expresa el acto de juntar riquezas con buena naturalidad en español y conserva la imagen de acumulación, sin borrar el matiz de tesoro/hoarding.
- source_word: ἑαυτῷ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para sí mismo
  - para su propio beneficio
  lexicon: BDAG
  rationale: El dativo reflexivo señala beneficio centrado en la propia persona. «Para sí» es idiomático en español y preserva la orientación egoísta del sujeto.
- source_word: καὶ μὴ
  english_pob_choice: and is not
  chosen_spanish: y no es
  alternatives_spanish:
  - pero no es
  - y no está
  lexicon: BDAG
  rationale: La coordinación con el segundo participio permite una frase verbal fluida en español. «Y no es» reproduce la yuxtaposición sin añadir un contraste más fuerte que el del griego.
- source_word: εἰς θεὸν
  english_pob_choice: toward God
  chosen_spanish: hacia Dios
  alternatives_spanish:
  - ante Dios
  - delante de Dios
  - para con Dios
  lexicon: BDAG
  rationale: Con πλουτέω, εἰς expresa dirección u orientación relacional. «Hacia Dios» conserva esa fuerza direccional mejor que una interpretación ya explicada como «ante Dios».
- source_word: πλουτῶν
  english_pob_choice: rich
  chosen_spanish: rico
  alternatives_spanish:
  - siendo rico
  - opulento
  lexicon: BDAG
  rationale: Aunque formalmente es participio, en español el predicado nominal «es rico» resulta natural y mantiene el contraste con acumular tesoros. Se conserva la ambigüedad relacional de la expresión.
theological_decisions:
- issue: Orientación de πλουτέω con εἰς θεόν
  english_pob_reading: rich toward God
  chosen_spanish_reading: rico hacia Dios
  alternative_spanish_readings:
  - rico ante Dios
  - rico en relación con Dios
  - rico para con Dios
  rationale: La frase es teológicamente abierta y no se define en el versículo. «Hacia Dios» mantiene la relación direccional sin imponer una explicación doctrinal adicional, preservando la tensión del dicho.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
- issue: Sujeto genérico masculino singular
  english_pob_reading: the one who
  chosen_spanish_reading: el que
  alternative_spanish_readings:
  - quien
  - la persona que
  rationale: El griego usa un participio sustantivado masculino singular con valor genérico. «El que» conserva ese valor representativo en español sin convertirlo en una formulación abstracta o neutralizante.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «the man» por «the one» para reflejar con más precisión el participio genérico. La versión española ya refleja ese valor con «el que», por lo que no requiere ajuste adicional. También se mantuvo la frase relacional abierta «hacia Dios» para no resolver interpretativamente la expresión de πλουτέω con εἰς.
  spanish_consistency_notes:
  - Se evitó «Cristo» o terminología no presente en el versículo.
  - Se conservó «Dios» como traducción directa de θεός, sin sustituirlo por una perífrasis devocional.
  - La construcción verbal española sigue la concisión proverbial del griego.
  - La nota al pie preserva la alternativa relacional que el audit trail inglés documenta.
