  spanish_quality_summary: 'El texto es claro y digno, pero tiene dos problemas de calidad: (1) «al Gehenna» es gramaticalmente extraño e impropio en español; (2) «Gehenna» resulta poco adaptado al uso ortográfico español. El resto del versículo es legible y fiel. La nota al pie también debe armonizarse con la forma española elegida.'
  glossary_alignment: 'No hay conflicto con los términos por defecto del proyecto principales. La decisión teológica de no traducir γέεννα como «infierno» en el texto principal está bien alineada con el rastro POB. La corrección necesaria es ortográfica y de naturalidad española: usar «Gehena» en texto y nota, manteniendo «infierno» como alternativa en nota.'
