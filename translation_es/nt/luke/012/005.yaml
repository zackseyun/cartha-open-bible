translation:
  language: es
  text: 'Pero yo les mostraré a quién temer: teman al que, después de matar, tiene autoridad para arrojar a la Gehena[a]. Sí, les digo: a este teman.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «infierno». El término griego es Gehena, una palabra de juicio con raíces en la imagen del valle de Hinón.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποδείξω
  english_pob_choice: I will show
  chosen_spanish: les mostraré
  alternatives_spanish:
  - les señalaré
  - les indicaré
  lexicon: BDAG
  rationale: El futuro de ὑποδείκνυμι introduce una explicación o indicación. «Mostraré» es natural en español y conserva la idea de presentar claramente a quién debe referirse el temor.
- source_word: τίνα φοβηθῆτε
  english_pob_choice: whom to fear
  chosen_spanish: a quién temer
  alternatives_spanish:
  - a quién deben temer
  - a quién han de temer
  lexicon: BDAG
  rationale: La pregunta indirecta se vuelve en español de forma natural como «a quién temer», manteniendo brevedad y la fuerza de la instrucción.
- source_word: φοβήθητε
  english_pob_choice: fear
  chosen_spanish: teman
  alternatives_spanish:
  - témanlo
  - tengan miedo de
  lexicon: BDAG
  rationale: El imperativo exhortativo se traduce con «teman» para conservar la repetición y el tono solemne del mandato. «Tengan miedo de» sería más explicativo y menos directo.
- source_word: τὸν
  english_pob_choice: the one
  chosen_spanish: al que
  alternatives_spanish:
  - al que es
  - al que
  lexicon: BDAG
  rationale: El artículo sustantivado se expresa naturalmente con «al que», que en español funciona como referente personal sin introducir una forma artificial como «el uno».
- source_word: μετὰ τὸ ἀποκτεῖναι
  english_pob_choice: after killing
  chosen_spanish: después de matar
  alternatives_spanish:
  - tras matar
  - después de haber matado
  lexicon: BDAG
  rationale: La construcción temporal se vierte con «después de matar», preservando la secuencia de acción sin añadir una interpretación excesiva del sujeto implícito.
- source_word: ἀποκτεῖναι
  english_pob_choice: killing
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte
  - quitar la vida
  lexicon: BDAG
  rationale: «Matar» reproduce de manera directa el verbo de causar la muerte, en un registro claro y sobrio.
- source_word: ἔχοντα ἐξουσίαν
  english_pob_choice: has authority
  chosen_spanish: tiene autoridad
  alternatives_spanish:
  - tiene poder
  - está autorizado
  lexicon: BDAG
  rationale: «Autoridad» conserva mejor la fuerza de ἐξουσία que «poder», porque el término puede implicar derecho o competencia para actuar, no solo capacidad bruta.
- source_word: ἐμβαλεῖν εἰς
  english_pob_choice: to throw into
  chosen_spanish: arrojar al
  alternatives_spanish:
  - echar en
  - lanzar al
  lexicon: BDAG
  rationale: «Arrojar» comunica bien la acción de ἐμβάλλω y es idiomático en español con destinos de juicio. Se usa «al» por la combinación con un lugar/realidad personificada en español.
- source_word: γέενναν
  english_pob_choice: Gehenna
  chosen_spanish: Gehenna
  alternatives_spanish:
  - infierno
  lexicon: BDAG
  rationale: Se conserva el transliterado «Gehenna» para respetar el término fuente y su trasfondo judío. No se sustituye por «infierno» en el texto principal para no borrar la tensión léxica documentada; la alternativa interpretativa queda en nota.
- source_word: ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Ciertamente
  - Así es
  lexicon: BDAG
  rationale: La partícula enfática se traduce con «Sí», breve y enfático, manteniendo el tono de confirmación.
- source_word: τοῦτον
  english_pob_choice: this one
  chosen_spanish: a este
  alternatives_spanish:
  - a él
  - a ese
  lexicon: BDAG
  rationale: El demostrativo intensifica la referencia final. «A este» conserva ese énfasis mejor que un pronombre más neutro.
theological_decisions:
- issue: γέεννα en un contexto de juicio
  english_pob_reading: Gehenna
  chosen_spanish_reading: Gehenna
  alternative_spanish_readings:
  - infierno
  rationale: Se conserva el término griego transliterado para no importar automáticamente asociaciones doctrinales posteriores que no están explícitas en la palabra original. La opción funcional «infierno» queda documentada como alternativa, no como texto principal.
  doctrine_reference: Prioridad del lenguaje original y preservación de la tensión lexical en temas de juicio final.
translation_notes:
  revision_awareness: La versión en inglés no requirió revisiones posteriores; el pasaje quedó estable tras la última pasada y el acuerdo de revisión fue alto. La redacción española sigue esa lectura estable y conserva las decisiones léxicas clave, especialmente el contraste entre φόβος y el nombre propio Gehenna.
  spanish_consistency_notes:
  - Se mantuvo el registro solemne y directo del mandato repetido con «teman».
  - Se conservó «Gehenna» en el cuerpo del texto para alinearse con la política del proyecto y el audit trail en inglés.
  - 'La sintaxis española evita calcos innecesarios pero sigue de cerca la secuencia del griego: mostrar -> temer -> después de matar -> tiene autoridad -> arrojar -> afirmación final.'
