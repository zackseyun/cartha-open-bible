translation:
  language: es
  text: Y cuando la encuentra[a], se la pone sobre los hombros, regocijándose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la oveja perdida del contexto anterior.
    reason: cross_reference
lexical_decisions:
- source_word: εὑρὼν
  english_pob_choice: when he has found it
  chosen_spanish: cuando lo ha encontrado
  alternatives_spanish:
  - habiéndolo encontrado
  - después de encontrarlo
  lexicon: BDAG
  rationale: El participio aoristo funciona como circunstancia temporal. En español, una cláusula temporal con 'cuando' comunica con naturalidad la secuencia sin perder la relación con el hallazgo del cordero ya implícito en el contexto inmediato. Se mantiene el objeto directo implícito del contexto con 'lo'.
- source_word: ἐπιτίθησιν
  english_pob_choice: he lays
  chosen_spanish: lo pone
  alternatives_spanish:
  - lo coloca
  - lo deposita
  lexicon: BDAG
  rationale: El presente indicativo expresa la acción principal en curso. 'Pone' es la opción más natural en español para la imagen de cargar sobre los hombros; 'coloca' o 'deposita' suenan más técnicos o menos vivos. Se evita 'lleva' porque desplaza el foco de la acción de poner sobre los hombros.
- source_word: ἐπὶ τοὺς ὤμους
  english_pob_choice: on his shoulders
  chosen_spanish: sobre sus hombros
  alternatives_spanish:
  - en sus hombros
  - encima de sus hombros
  lexicon: BDAG
  rationale: La preposición con acusativo indica movimiento hacia y colocación sobre la superficie. 'Sobre sus hombros' refleja esa imagen de manera clara y natural en español. Se conserva el plural 'hombros' como en el griego.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: sus
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El pronombre genitivo se refiere al pastor, no al cordero. En español, el posesivo 'sus' es la forma idiomática para 'his' en esta construcción y evita una frase pesada como 'de él'.
- source_word: χαίρων
  english_pob_choice: rejoicing
  chosen_spanish: gozoso
  alternatives_spanish:
  - regocijándose
  - con gozo
  lexicon: BDAG
  rationale: El participio presente expresa estado concomitante o manera. 'Gozoso' conserva el valor de alegría acompañante de forma fluida y digna en español. Se evita 'regocijándose' porque puede sonar más explicativo y menos natural en una narración breve; 'con gozo' convierte el participio en frase adverbial y debilita el paralelismo verbal.
theological_decisions:
- issue: Objeto directo implícito del verbo 'encontrar'
  english_pob_reading: Included 'it' after 'found' to refer to the lost sheep from context.
  chosen_spanish_reading: Se mantiene el objeto implícito con 'lo', refiriéndolo al cordero perdido del contexto inmediato.
  alternative_spanish_readings:
  - Y cuando lo ha encontrado, pone sobre sus hombros, gozoso.
  - Y cuando ha encontrado, lo pone sobre sus hombros, gozoso.
  rationale: El griego permite omitir el objeto cuando el contexto lo hace evidente. En español, el pronombre 'lo' recupera de manera natural al cordero sin añadir contenido nuevo ni alterar la parábola. No se explicita 'cordero' para no sobreespecificar el texto en el versículo mismo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Con base en el control cruzado del expediente inglés, no hubo revisiones necesarias: el sentido, la imagen del pastor y el matiz participial coinciden claramente con el texto fuente griego.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa 'gozoso' para conservar el matiz de alegría acompañante sin añadir una explicación externa.
  - Se conserva un estilo narrativo simple y directo, acorde con la escena parabolica y con la equivalencia óptima del expediente inglés.
