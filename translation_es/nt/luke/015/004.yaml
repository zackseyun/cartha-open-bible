review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego: pregunta retórica representativa, cien ovejas, una perdida, dejar las noventa y nueve, ir tras la perdida hasta hallarla. También mantiene correctamente «hombre» para ἄνθρωπος y «desierto»/lugar despoblado para ἐρήμῳ dentro del rango semántico documentado. Sin embargo, la nota al pie está mal alineada con el texto: marca como alternativa «en el desierto» cuando esa es precisamente la lectura principal, y además falta tilde en «perdida» si se usa como adjetivo sustantivado femenino.'
  spanish_quality_summary: 'El español es mayormente natural y legible, pero requiere un ajuste menor. «La perdida» debe corregirse a «la perdida» no como participio verbal sino como adjetivo lleva tilde: «la perdida» es incorrecto; la forma correcta es «la perdida»? En realidad la forma correcta es «la perdida» con tilde: «la perdida» -> «la perdida»? Debe quedar «la perdida»? Mejor evitar la posible ambigüedad usando «la oveja perdida», que además suena más natural en español bíblico contemporáneo. También conviene corregir la nota para que la alternativa sea «en el campo abierto» o «en la soledad», no repetir el texto principal.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La conservación de «hombre» concuerda con la decisión teológica auditada sobre lenguaje masculino representativo. «Desierto» es defendible para ἐρήμῳ, aunque el pie de nota debe reflejar una alternativa real.
  issues:
  - severity: medium
    issue: La nota al pie repite la lectura principal en lugar de ofrecer una alternativa real.
    rationale: El texto principal dice «en el desierto», pero la nota dice «O «en el desierto»». Esto invalida la función de la nota y contradice el rastro auditado, donde la alternativa es algo como «en el campo abierto» / «en la soledad».
  - severity: medium
    issue: «La perdida» es una forma ortográfica incorrecta y poco natural en este contexto.
    rationale: 'Como adjetivo sustantivado femenino de «perdida», la forma correcta es «la perdida» con tilde: «la perdida»? Para evitar ambigüedad y mejorar la legibilidad, es preferible «la oveja perdida», que además hace explícito el referente sin alterar el sentido.'
  revised_spanish_text: ¿Qué hombre entre ustedes[a], teniendo cien ovejas y perdiendo una de ellas, no deja las noventa y nueve en el desierto y va tras la oveja perdida hasta encontrarla?
  revised_footnotes:
  - marker: a
    text: O «en el campo abierto». El término griego puede referirse a campo abierto, pastizal o un lugar desolado.
    reason: lexical_alternative
