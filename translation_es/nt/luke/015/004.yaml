translation:
  language: es
  text: ¿Qué hombre entre ustedes[a], teniendo cien ovejas y perdiendo una de ellas, no deja las noventa y nueve en el desierto y va tras la oveja perdida hasta encontrarla?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el campo abierto». El término griego puede referirse a campo abierto, pastizal o un lugar desolado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίς ἄνθρωπος ἐξ ὑμῶν
  english_pob_choice: What man among you
  chosen_spanish: ¿Qué hombre entre ustedes
  alternatives_spanish:
  - ¿Qué persona entre ustedes
  - ¿Qué hombre de entre ustedes
  lexicon: BDAG
  rationale: ἄνθρωπος es masculino singular y aquí introduce un ejemplo representativo. En español, «hombre» conserva ese valor genérico y refleja la decisión auditada de mantener la forma masculina en vez de neutralizarla con «persona». «Entre ustedes» expresa con naturalidad ἐξ ὑμῶν.
- source_word: ἔχων
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - que tiene
  lexicon: BDAG
  rationale: El participio presente se vierte con una construcción participial en español para conservar el flujo de la pregunta retórica. «Teniendo» resulta más cercano al giro griego que una subordinada relativa.
- source_word: ἑκατὸν πρόβατα
  english_pob_choice: a hundred sheep
  chosen_spanish: cien ovejas
  alternatives_spanish:
  - cien corderos
  lexicon: BDAG
  rationale: «Ovejas» es el equivalente normal de πρόβατα y mantiene el referente pastoral. Se prefiere el numeral simple «cien» por naturalidad en español.
- source_word: ἀπολέσας
  english_pob_choice: losing
  chosen_spanish: perdiendo
  alternatives_spanish:
  - habiendo perdido
  - habiendo extraviado
  lexicon: BDAG
  rationale: El aoristo participial describe la condición de una oveja que llega a perderse; «perdiendo» funciona de manera idiomática en la pregunta retórica y evita sugerir destrucción deliberada. «Perdiendo» también preserva la tensión aspectual sin volverla demasiado pesada.
- source_word: ἐξ αὐτῶν ἓν
  english_pob_choice: one of them
  chosen_spanish: una de ellas
  alternatives_spanish:
  - una entre ellas
  - una de las ovejas
  lexicon: BDAG
  rationale: La frase precisa que se trata de una sola oveja del conjunto. «Una de ellas» es claro y natural; el antecedente femenino está determinado por «ovejas».
- source_word: οὐ καταλείπει
  english_pob_choice: does not leave
  chosen_spanish: no deja
  alternatives_spanish:
  - no abandona
  - no suelta
  lexicon: BDAG
  rationale: El verbo expresa la acción de dejar atrás a las noventa y nueve. «No deja» sigue de cerca el valor básico sin introducir matices más fuertes como «abandona».
- source_word: τὰ ἐνενήκοντα ἐννέα
  english_pob_choice: the ninety-nine
  chosen_spanish: las noventa y nueve
  alternatives_spanish:
  - las 99
  lexicon: BDAG
  rationale: Se conserva el numeral en palabras como en el griego y en el inglés POB. El artículo femenino concuerda con «ovejas».
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto abierto
  - en la soledad
  lexicon: BDAG
  rationale: ἔρημος puede significar desierto, lugar desolado o campo abierto. La revisión inglesa optó por «the wilderness» para mayor cercanía léxica; en español «desierto» comunica bien ese campo semántico sin imponer una imagen de arena, y mantiene la ambigüedad de un lugar despoblado más que un desierto geográfico estricto.
- source_word: πορεύεται ἐπὶ
  english_pob_choice: go after
  chosen_spanish: va tras
  alternatives_spanish:
  - va en busca de
  - se encamina hacia
  lexicon: BDAG
  rationale: La combinación indica movimiento dirigido con propósito de búsqueda. «Va tras» es una solución breve e idiomática que conserva la idea de persecución/búsqueda.
- source_word: τὸ ἀπολωλὸς
  english_pob_choice: the lost one
  chosen_spanish: la perdida
  alternatives_spanish:
  - la oveja perdida
  - la que se ha perdido
  lexicon: BDAG
  rationale: El participio perfecto sustantivado señala a la oveja en su condición de perdida. «La perdida» conserva la sustantivación y su referencia femenina queda clara por el contexto; se evita expandir a «oveja» para no perder la forma breve del griego.
- source_word: ἕως εὕρῃ αὐτό
  english_pob_choice: until he finds it
  chosen_spanish: hasta encontrarla
  alternatives_spanish:
  - hasta que la encuentre
  - hasta hallarla
  lexicon: BDAG
  rationale: El complemento temporal expresa continuidad hasta el hallazgo. «Hasta encontrarla» es natural y mantiene el referente femenino de la oveja. Se evita «hasta que la encuentre» porque es más explícito y menos compacto.
theological_decisions:
- issue: Lenguaje masculino representativo en la pregunta parabólica
  english_pob_reading: Retain 'man' in the main text
  chosen_spanish_reading: Mantener «hombre» en el texto principal
  alternative_spanish_readings:
  - persona
  rationale: El griego usa ἄνθρωπος en singular masculino como ejemplo representativo. Siguiendo la lectura auditada, la traducción conserva la forma masculina en vez de neutralizarla, sin que eso limite el alcance del ejemplo parabólico.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Sentido de ἐν τῇ ἐρήμῳ
  english_pob_reading: in the wilderness / open country / pastureland
  chosen_spanish_reading: en el desierto
  alternative_spanish_readings:
  - en el campo abierto
  - en la soledad
  rationale: La decisión inglesa revisada favorece una correspondencia más cercana con ἐρήμῳ. En español, «desierto» conserva el sentido de lugar despoblado o desolado sin fijarlo en una sola imagen cultural, y por eso funciona mejor que «campo abierto», que se aparta más del valor léxico principal.
  doctrine_reference: BDAG; English POB revision pass 2026-04-23
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente que prefirió «the wilderness» en lugar de «open country» para ἐν τῇ ἐρήμῳ, y he trasladado esa cercanía léxica al español con «en el desierto», manteniendo además la ambigüedad pastoral del término. También conservo la opción auditada de lenguaje masculino representativo («hombre») en la pregunta retórica, y la sustantivación de τὸ ἀπολωλός como «la perdida».
  spanish_consistency_notes:
  - Se mantuvo una sintaxis fluida y suficientemente formal para lectura eclesial.
  - Se preservó la secuencia de participios con gerundio donde resultaba natural en español.
  - No se sustituyó el masculino representativo por lenguaje neutral.
  - «Desierto» se usó como equivalente principal de ἐρήμῳ, con nota para las alternativas semánticas.
