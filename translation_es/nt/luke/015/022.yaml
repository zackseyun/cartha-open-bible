translation:
  language: es
  text: 'Pero el padre dijo a sus esclavos[a]: «Rápidamente, saquen la mejor[b] túnica y vístanlo, y pónganle un anillo[c] en su mano y sandalias en sus pies».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos»; el griego douloús denota aquí esclavos o siervos domésticos, y se conserva «esclavos» para mantener esa realidad social.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «la primera túnica»; idiomáticamente, probablemente «la mejor túnica» o «la más distinguida».
    reason: lexical_alternative
  - marker: c
    text: El griego dice simplemente «un anillo»; algunos entienden que era un anillo de sello como señal de estatus restaurado.
    reason: lexical_alternative
lexical_decisions:
- source_word: δούλους
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: El griego δοῦλος conserva aquí su fuerza de dependencia doméstica. Como el contexto es la casa/propiedad del padre, 'esclavos' preserva mejor esa realidad social que 'siervos', que en español puede suavizarla demasiado.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: '''Pero'' refleja el giro narrativo entre la situación previa y la acción inmediata del padre, de modo cercano al valor transicional/contrastivo de δέ.'
- source_word: Ταχὺ
  english_pob_choice: Quickly
  chosen_spanish: Rápido
  alternatives_spanish:
  - ¡Rápido!
  - Pronto
  lexicon: BDAG
  rationale: El adverbio aquí impulsa una acción inmediata. 'Rápido' es natural en español y conserva la urgencia del mandato sin añadir contenido.
- source_word: ἐξενέγκατε
  english_pob_choice: bring out
  chosen_spanish: saquen
  alternatives_spanish:
  - traigan
  - sáquenlo
  lexicon: BDAG
  rationale: El imperativo plural de ἐκφέρω implica sacar algo desde dentro de la casa o de un lugar de resguardo. 'Saquen' es una forma idiomática y concreta en español.
- source_word: στολὴν τὴν πρώτην
  english_pob_choice: the best robe
  chosen_spanish: la mejor túnica
  alternatives_spanish:
  - la primera túnica
  - la túnica principal
  - la túnica más fina
  lexicon: BDAG
  rationale: La combinación con πρῶτος aquí probablemente señala rango o calidad, no mera secuencia. 'La mejor túnica' comunica bien el sentido idiomático en español, sin importar simbología adicional.
- source_word: ἐνδύσατε αὐτόν
  english_pob_choice: put it on him
  chosen_spanish: vístanlo
  alternatives_spanish:
  - póngansela
  - cúbranlo
  lexicon: BDAG
  rationale: El verbo significa vestir o poner una prenda a alguien. Dado que la túnica ya fue mencionada, 'vístanlo' mantiene la acción natural en español sin perder la referencia al vestido.
- source_word: δακτύλιον
  english_pob_choice: a ring
  chosen_spanish: un anillo
  alternatives_spanish:
  - un anillo de sello
  - un sello
  lexicon: BDAG
  rationale: El texto griego nombra solo un anillo. Aunque puede entenderse como anillo de sello, esa precisión no está explícita; por eso se conserva el valor léxico básico.
- source_word: εἰς τὴν χεῖρα αὐτοῦ
  english_pob_choice: on his hand
  chosen_spanish: en la mano
  alternatives_spanish:
  - sobre la mano
  - para la mano
  lexicon: BDAG
  rationale: Con una prenda o adorno, el español usa naturalmente 'en la mano'. Esto preserva el sentido del griego sin forzar un calco de εἰς.
- source_word: ὑποδήματα
  english_pob_choice: sandals
  chosen_spanish: sandalias
  alternatives_spanish:
  - zapatos
  lexicon: BDAG
  rationale: El término designa calzado, especialmente sandalias en el ambiente mediterráneo antiguo. 'Sandalias' es más preciso culturalmente que 'zapatos'.
- source_word: εἰς τοὺς πόδας
  english_pob_choice: on his feet
  chosen_spanish: en los pies
  alternatives_spanish:
  - sobre los pies
  - para los pies
  lexicon: BDAG
  rationale: En español, el destino natural del calzado se expresa con 'en los pies'. Así se conserva la imagen sin una construcción artificiosa.
theological_decisions:
- issue: Preservar δοῦλος como un término que refleja esclavitud doméstica, no suavizarlo automáticamente a 'siervo'
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - criados
  rationale: La lectura inglesa retiene la realidad social del término. En español, 'esclavos' mantiene esa fuerza y evita diluir la relación de dependencia que el texto presupone en la casa del padre.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy #1'
- issue: Decidir si στολὴν τὴν πρώτην debe traducirse literalmente como 'la primera túnica' o idiomáticamente
  english_pob_reading: the best robe
  chosen_spanish_reading: la mejor túnica
  alternative_spanish_readings:
  - la primera túnica
  - la túnica principal
  - la túnica más fina
  rationale: La evidencia auditada favorece una lectura idiomática de estatus o calidad. 'La mejor túnica' evita una literalidad que sonaría extraña y no refleja tan bien el sentido probable.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy on optimal equivalence and readable modern English'
- issue: Evitar importar la interpretación de 'anillo de sello' al texto principal
  english_pob_reading: a ring
  chosen_spanish_reading: un anillo
  alternative_spanish_readings:
  - un anillo de sello
  - un sello
  rationale: El griego dice solo 'anillo'. Mantener 'un anillo' preserva la restricción textual; cualquier implicación de autoridad o restauración queda como posible lectura, no como ampliación del texto.
  doctrine_reference: 'DOCTRINE.md: Never import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el cotejo externo reportó alta concordancia y no se registraron revisiones aplicadas en el pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general, pero este versículo no contiene el nombre divino.
  - '''Esclavos'' se usa de forma consistente con el valor de δοῦλος en la auditoría inglesa.'
  - '''Túnica'' se eligió por claridad y registro bíblico, manteniendo ''la mejor'' como solución idiomática para πρῶτην.'
  - '''Anillo'' y ''sandalias'' evitan sobreinterpretaciones no explícitas del griego.'
  - La puntuación y el tratamiento de comillas siguen el uso editorial en español.
