translation:
  language: es
  text: Y deseaba llenar su vientre con las algarrobas que comían los cerdos[a], y nadie le daba nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Algarrobas» traduce el término para las vainas del algarrobo; el griego se refiere específicamente a ese alimento para animales, no a “granos” o “semillas”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεθύμει
  english_pob_choice: longed
  chosen_spanish: deseaba
  alternatives_spanish:
  - anhelaba
  - codiciaba
  lexicon: BDAG
  rationale: El imperfecto expresa deseo continuo. «Deseaba» comunica bien el anhelo persistente sin cargarlo con matices excesivos; «anhelaba» sería posible, pero más enfático y menos neutro en este contexto.
- source_word: γεμίσαι
  english_pob_choice: to fill
  chosen_spanish: llenar
  alternatives_spanish:
  - colmar
  - satisfacer
  lexicon: BDAG
  rationale: El infinitivo conserva una acción concreta y física. «Llenar» es la correspondencia más natural en español; «satisfacer» interpretaría el efecto, no la imagen verbal.
- source_word: τὴν κοιλίαν αὐτοῦ
  english_pob_choice: his stomach
  chosen_spanish: su vientre
  alternatives_spanish:
  - su estómago
  - su barriga
  lexicon: BDAG
  rationale: κοιλία puede referirse al vientre/estómago. «Vientre» mantiene la fuerza corporal y resulta más bíblico y sobrio en español; «estómago» sería más explícito anatómicamente, pero menos acorde con el registro del pasaje.
- source_word: ἀπὸ τῶν κερατίων
  english_pob_choice: with the carob pods
  chosen_spanish: con las algarrobas
  alternatives_spanish:
  - con las vainas de algarrobo
  - con las vainas
  lexicon: BDAG
  rationale: κεράτια designa las vainas del algarrobo, alimento para animales. En español, «algarrobas» comunica de forma natural ese referente; aunque el griego usa ἀπό («de / desde»), la construcción española «llenar su vientre con» expresa bien la relación instrumental o de contenido sin forzar un calco.
- source_word: κερατίων
  english_pob_choice: carob pods
  chosen_spanish: algarrobas
  alternatives_spanish:
  - vainas de algarrobo
  - algarroba
  lexicon: BDAG
  rationale: El término apunta a las vainas del algarrobo, no a «carob beans». «Algarrobas» es una equivalencia española clara y reconocible; se mantiene la referencia a forraje animal sin introducir una explicación innecesaria en el texto principal.
- source_word: οἱ χοῖροι
  english_pob_choice: the pigs
  chosen_spanish: los cerdos
  alternatives_spanish:
  - los puercos
  - los marranos
  lexicon: BDAG
  rationale: «Cerdos» es el equivalente estándar y digno en español moderno. «Puercos» sería más regional o despectivo; «marranos» introduce un registro coloquial no adecuado.
- source_word: ἤσθιον
  english_pob_choice: were eating
  chosen_spanish: comían
  alternatives_spanish:
  - estaban comiendo
  - se alimentaban
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en curso. En español, el pretérito imperfecto «comían» reproduce de manera natural ese aspecto sin recargar la frase con perífrasis.
- source_word: οὐδεὶς ἐδίδου αὐτῷ
  english_pob_choice: no one was giving him anything
  chosen_spanish: nadie le daba nada
  alternatives_spanish:
  - nadie le estaba dando nada
  - nadie le daba
  lexicon: BDAG
  rationale: El imperfecto indica una carencia sostenida de provisión. «Nadie le daba nada» es idiomático en español y conserva esa continuidad; «nadie le estaba dando nada» suena más pesado sin aportar más claridad.
translation_notes:
  revision_awareness: 'El texto español sigue el sentido del griego con alta concordancia respecto del audit trail inglés: deseo continuo, imagen concreta de llenarse con alimento para cerdos y ausencia sostenida de provisión. No se introdujeron decisiones doctrinales ni variantes textuales relevantes.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y claro, evitando arcaísmos innecesarios.
  - Se preservó el valor imperfectivo de los verbos principales con formas naturales del español.
  - 'Se prefirió una equivalencia léxica transparente para κεράτια: «algarrobas», con nota para explicitar el referente botánico y alimentario.'
