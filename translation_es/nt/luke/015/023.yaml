    issue: '''mátenlo'' para θύσατε es demasiado genérico'
    rationale: θύω en este contexto de banquete implica sacrificar/degollar un animal para la comida. 'Mátenlo' preserva solo el nivel más básico de significado y pierde la especificidad que el inglés POB intentó mantener con 'slaughter it'.
  - severity: low
    issue: La nota actual está en μόσχον τὸν σιτευτόν en lugar de θύσατε
    rationale: La nota inglesa documenta la alternativa léxica de θύσατε ('sacrifice it'), no del sintagma 'the fattened calf'. Aunque la nota sobre 'becerro cebado' no es incorrecta, no refleja la principal decisión auditada.
  revised_spanish_text: Y traigan el ternero engordado, degüéllenlo[a], y comamos y alegrémonos,
