translation:
  language: es
  text: Y traigan el ternero engordado, degüéllenlo[a], y comamos y alegrémonos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "sacrifíquenlo"; el verbo griego puede referirse a degollar un animal y, en algunos contextos, tiene matices sacrificiales.
    reason: lexical_alternative
lexical_decisions:
- source_word: φέρετε
  english_pob_choice: bring
  chosen_spanish: traigan
  alternatives_spanish:
  - traigan aquí
  - traigan fuera
  lexicon: BDAG
  rationale: El imperativo plural de φέρω pide una orden directa. En español, "traigan" es natural y mantiene el tono de instrucción inmediata sin añadir una especificación de lugar que el griego no exige.
- source_word: μόσχον τὸν σιτευτόν
  english_pob_choice: the fattened calf
  chosen_spanish: el ternero engordado
  alternatives_spanish:
  - el becerro engordado
  - el ternero cebado
  lexicon: BDAG
  rationale: μόσχος designa un bovino joven; σιτευτός indica que ha sido alimentado o engordado para una ocasión especial. "Ternero engordado" conserva la idea de un animal joven preparado para el banquete. "Becerro" es posible, pero "ternero" resulta más claro y natural en español contemporáneo.
- source_word: θύσατε
  english_pob_choice: slaughter it
  chosen_spanish: mátenlo
  alternatives_spanish:
  - sacrifíquenlo
  - sáquenle la vida
  lexicon: BDAG
  rationale: θύω puede significar matar para sacrificio o simplemente degollar/matar un animal. En este contexto de comida festiva, "mátenlo" transmite la acción preparatoria sin imponer explícitamente un matiz cultual que el pasaje no desarrolla.
- source_word: φαγόντες
  english_pob_choice: eat
  chosen_spanish: comamos
  alternatives_spanish:
  - después de comer
  - y habiendo comido
  lexicon: BDAG
  rationale: El participio aoristo coordinado con los imperativos funciona de manera exhortativa en la secuencia. En español, "comamos" fluye con naturalidad en la invitación colectiva y preserva el movimiento hacia la celebración compartida.
- source_word: εὐφρανθῶμεν
  english_pob_choice: let us celebrate
  chosen_spanish: alegrémonos
  alternatives_spanish:
  - celebremos
  - pongámonos alegres
  lexicon: BDAG
  rationale: El subjuntivo exhortativo de εὐφραίνω expresa gozo/celebración. "Alegrémonos" mantiene el núcleo semántico de alegría y evita reducir el término a una mera fiesta externa; "celebremos" sería más contextual pero menos fiel al verbo mismo.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - entonces ... y
  lexicon: BDAG
  rationale: Conservar la repetición de καί reproduce la acumulación de mandatos y la coordinación final, sin suavizar la progresión del mandato hacia el gozo compartido.
theological_decisions:
- issue: Posible matiz sacrificial de θύσατε
  english_pob_reading: Rendered as a feast-preparation command ('slaughter it') rather than explicit sacrificial language.
  chosen_spanish_reading: Se traduce como una orden de matar/preparar el animal para la comida, no como un sacrificio explícito.
  alternative_spanish_readings:
  - sacrifíquenlo
  - ofrécanlo en sacrificio
  rationale: Aunque θύω puede tener connotaciones sacrificiales, aquí el contexto narrativo es el de una celebración doméstica. "Mátenlo" conserva la ambigüedad posible del griego sin cargar el texto con una teología sacrificial que no está explicitada en la escena.
  doctrine_reference: Principio de primacía del texto original y preservación de tensiones semánticas documentadas
translation_notes:
  revision_awareness: El texto sigue el estado revisado más reciente del POB inglés, con acuerdo alto y sin cambios aplicados en la última pasada; la redacción española mantiene esa lectura estable.
  spanish_consistency_notes:
  - Se evita "SEÑOR" u otra sustitución no pertinente porque el versículo no contiene el nombre divino.
  - '"Alegrémonos" conserva el valor exhortativo del griego mejor que una simple afirmación de estado.'
  - '"Ternero engordado" respeta el campo semántico de un bovino joven preparado para una comida festiva, sin sobreespecificar la especie.'
