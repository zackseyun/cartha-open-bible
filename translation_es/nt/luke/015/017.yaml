translation:
  language: es
  text: 'Pero cuando volvió en sí[a], dijo: «¿Cuántos de los jornaleros de mi padre tienen pan de sobra[b], y yo aquí me muero de hambre[c]! »'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando recobró el juicio». El griego literalmente dice «cuando vino a sí mismo».
    reason: lexical_alternative
  - marker: b
    text: O «tienen más que suficiente pan».
    reason: lexical_alternative
  - marker: c
    text: O «estoy pereciendo de hambre».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἑαυτὸν ... ἐλθὼν
  english_pob_choice: when he came to himself
  chosen_spanish: cuando volvió en sí
  alternatives_spanish:
  - cuando recobró el juicio
  - cuando vino a sí mismo
  lexicon: BDAG
  rationale: La expresión griega es idiomática y señala un regreso a la lucidez o a la conciencia de su situación. «Volvió en sí» conserva la imagen y es natural en español bíblico y contemporáneo.
- source_word: ἔφη
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - iba diciendo
  lexicon: BDAG
  rationale: El aoristo narrativo se expresa con pasado simple en español. «Dijo» mantiene la fluidez del relato.
- source_word: μίσθιοι
  english_pob_choice: hired workers
  chosen_spanish: jornaleros
  alternatives_spanish:
  - trabajadores contratados
  - sirvientes asalariados
  lexicon: BDAG
  rationale: μίσθιοι son trabajadores pagados por jornada o salario, no esclavos domésticos. «Jornaleros» comunica bien esa idea en español y distingue la categoría de δοῦλοι.
- source_word: περισσεύονται ἄρτων
  english_pob_choice: have more than enough bread
  chosen_spanish: tienen pan de sobra
  alternatives_spanish:
  - abundan en pan
  - tienen más que suficiente pan
  lexicon: BDAG
  rationale: El verbo indica abundancia o excedente, y ἄρτων debe conservarse con el concreto «pan». «Tienen pan de sobra» expresa de modo natural el excedente sin perder la fuerza del original.
- source_word: ἄρτων
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: BDAG
  rationale: El griego nombra literalmente pan; no conviene generalizarlo a «alimento» porque se perdería la concreción de la imagen.
- source_word: λιμῷ
  english_pob_choice: from hunger
  chosen_spanish: de hambre
  alternatives_spanish:
  - por hambre
  - a causa del hambre
  lexicon: BDAG
  rationale: El dativo con λιμός expresa la condición de hambre o inanición. «Me muero de hambre» es la formulación más natural en español y preserva el matiz de gravedad.
- source_word: ὧδε
  english_pob_choice: here I am
  chosen_spanish: aquí
  alternatives_spanish:
  - aquí estoy
  - en este lugar
  lexicon: BDAG
  rationale: El adverbio enfatiza su estado presente y su contraste con la abundancia ajena. En español, el sentido queda bien integrado en «y yo aquí».
- source_word: ἀπόλλυμαι
  english_pob_choice: I am perishing
  chosen_spanish: me muero
  alternatives_spanish:
  - estoy pereciendo
  - estoy arruinándome
  lexicon: BDAG
  rationale: El presente medio/pasivo indica ruina o destrucción en curso. «Me muero» reproduce la intensidad de forma idiomática; aunque puede leerse literalmente como muerte, aquí conserva la gravedad del griego en español natural.
theological_decisions:
- issue: El grado de literalidad en la auto-descripción de ruina
  english_pob_reading: I am perishing from hunger
  chosen_spanish_reading: me muero de hambre
  alternative_spanish_readings:
  - estoy pereciendo por hambre
  - estoy muriendo de hambre
  rationale: No hay una cuestión doctrinal disputada, pero sí una tensión semántica entre una traducción más literal y otra más idiomática. «Me muero de hambre» transmite la intensidad del verbo ἀπόλλυμαι y del dative de causa sin endurecer el español.
  doctrine_reference: none
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que cambió 'with hunger' a 'from hunger' para reflejar mejor λιμῷ; en español se adoptó una solución idiomática equivalente («me muero de hambre») y se preservó la alternativa más literal en nota. También se respetó la distinción entre μίσθιοι y otras categorías de servicio, evitando 'siervos' o 'esclavos'.
  spanish_consistency_notes:
  - Se mantiene «pan» para ἄρτων, conforme a la concreción del original.
  - Se usa «jornaleros» para μίσθιοι para distinguirlos de esclavos o siervos domésticos.
  - El orden y la puntuación reflejan una cita directa en estilo narrativo bíblico, con comillas angulares.
  - La nota b se ancla en «pan de sobra» y la nota c en «me muero de hambre», con marcadores únicos y no reutilizados.
