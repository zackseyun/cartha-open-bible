translation:
  language: es
  text: Ahora bien, su hijo mayor estaba en el campo; y cuando venía y se acercó a la casa[a], oyó música y bailes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «música instrumental y grupos de danzantes». Los términos griegos pueden referirse más específicamente a la ejecución musical y a grupos que bailan.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦν δὲ
  english_pob_choice: Now ... was
  chosen_spanish: Ahora bien, ... estaba
  alternatives_spanish:
  - Y ... estaba
  - Pero ... estaba
  lexicon: BDAG
  rationale: δέ marca transición narrativa; «Ahora bien» conserva el avance del relato sin forzar contraste. «Estaba» expresa naturalmente el imperfecto descriptivo del griego.
- source_word: ὁ υἱὸς αὐτοῦ ὁ πρεσβύτερος
  english_pob_choice: his older son
  chosen_spanish: su hijo mayor
  alternatives_spanish:
  - su hijo mayor de edad
  - su hijo primogénito
  lexicon: BDAG
  rationale: πρεσβύτερος aquí significa «mayor/older», no necesariamente «el primero nacido». «Hijo mayor» es la forma más natural y fiel en español.
- source_word: ἐν ἀγρῷ
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo de labor
  - en la parcela
  lexicon: BDAG
  rationale: ἀγρός puede referirse a campo, terreno de labor o campo abierto. «En el campo» comunica bien el sentido rural/laboral sin recargar el texto.
- source_word: ὡς ἐρχόμενος
  english_pob_choice: as he came
  chosen_spanish: mientras venía
  alternatives_spanish:
  - cuando venía
  - al venir
  lexicon: BDAG
  rationale: La construcción participial con ὡς expresa la circunstancia de su acercamiento. «Mientras venía» preserva el movimiento en curso con naturalidad en español.
- source_word: ἤγγισεν τῇ οἰκίᾳ
  english_pob_choice: drew near to the house
  chosen_spanish: se acercaba a la casa
  alternatives_spanish:
  - llegó cerca de la casa
  - se aproximó a la casa
  lexicon: BDAG
  rationale: ἐγγίζω significa acercarse/llegar cerca. «Se acercaba» mantiene la progresión narrativa y el aspecto de aproximación; la referencia a la casa está dada por τῇ οἰκίᾳ.
- source_word: ἤκουσεν
  english_pob_choice: he heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - percibió
  lexicon: BDAG
  rationale: El aoristo narrativo simple se rinde de forma directa con «oyó». «Escuchó» podría sugerir atención voluntaria, que aquí no es necesaria.
- source_word: συμφωνίας
  english_pob_choice: music
  chosen_spanish: música
  alternatives_spanish:
  - música instrumental
  - sonidos musicales
  lexicon: BDAG
  rationale: συμφωνία puede denotar música, especialmente música instrumental o ejecución musical. «Música» es el equivalente español más claro e idiomático.
- source_word: χορῶν
  english_pob_choice: dancing
  chosen_spanish: danza
  alternatives_spanish:
  - bailes
  - baile
  lexicon: BDAG
  rationale: χορός puede referirse al baile o al grupo que baila. En español, «danza» conserva el evento de baile y suena más sobrio que una mera repetición coloquial de «baile».
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al texto con el marcador [a] en la frase correspondiente. El resto del versículo se mantiene alineado con el griego y con la lectura auditada en inglés.
  spanish_consistency_notes:
  - Se mantuvo «hijo mayor» para πρεσβύτερος, evitando «primogénito» por no estar exigido por el griego.
  - Se prefirió «música» y «danza» como equivalentes idiomáticos; la nota preserva la alternativa más específica.
  - Se evitó «SEÑOR» u otra terminología teológica no pertinente; el versículo es narrativo y no contiene vocabulario divino explícito.
