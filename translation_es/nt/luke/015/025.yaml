    rationale: El griego usa participio presente ὡς ἐρχόμενος + aoristo ἤγγισεν. La traducción con dos imperfectos diluye el avance narrativo y no refleja bien el punto de llegada al acercarse a la casa.
  - severity: low
    issue: «Danza» suena menos idiomático que «bailes» en este contexto
    rationale: Aunque semánticamente posible, «danza» en español bíblico actual puede sonar más técnico o elevado de lo que requiere la escena festiva. «Bailes» conserva naturalidad y cubre bien χορῶν.
