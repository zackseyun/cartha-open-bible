translation:
  language: es
  text: Así que fue y se unió[a] a uno de los ciudadanos de aquel país, y lo envió a sus campos para cuidar cerdos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se pegó a» o «se adhirió a»; el verbo griego sugiere una unión estrecha, incluso dependiente, con alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορευθεὶς
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  lexicon: BDAG
  rationale: El participio aoristo funciona de manera adverbial y marca la acción previa al verbo principal. En español, «fue» conserva el movimiento de forma natural y sobria sin añadir matices no presentes en el griego.
- source_word: ἐκολλήθη
  english_pob_choice: joined himself to
  chosen_spanish: se juntó con
  alternatives_spanish:
  - se unió a
  - se pegó a
  - se adherió a
  lexicon: BDAG
  rationale: κολλάομαι expresa una unión/apego estrecho, incluso dependiente. «Se juntó con» es idiomático en español y puede conservar la cercanía relacional sin forzar un giro demasiado literal como «se pegó a».
- source_word: ἑνὶ τῶν πολιτῶν
  english_pob_choice: one of the citizens
  chosen_spanish: uno de los ciudadanos
  alternatives_spanish:
  - uno de los habitantes
  - uno de los hombres
  - uno de los pobladores
  lexicon: BDAG
  rationale: πολίτης denota ciudadano o miembro de una comunidad política. «Ciudadanos» es la correspondencia más directa y mantiene el matiz social del relato.
- source_word: τῆς χώρας ἐκείνης
  english_pob_choice: that country
  chosen_spanish: aquel país
  alternatives_spanish:
  - aquella región
  - aquella tierra
  - ese país
  lexicon: BDAG
  rationale: χώρα puede significar país, región o tierra. Aquí «país» comunica bien la lejanía y el marco territorial de la parábola. Se opta por «aquel» para reflejar el valor de distancia de ἐκείνης.
- source_word: ἔπεμψεν
  english_pob_choice: he sent him
  chosen_spanish: él lo envió
  alternatives_spanish:
  - lo mandó
  - lo despachó
  lexicon: BDAG
  rationale: πέμπω significa enviar. Se explicita el sujeto en español porque el griego ya lo identifica por el contexto; «él lo envió» mantiene claridad sin alterar el referente.
- source_word: εἰς τοὺς ἀγροὺς αὐτοῦ
  english_pob_choice: into his fields
  chosen_spanish: a sus campos
  alternatives_spanish:
  - a sus campos de labor
  - a sus terrenos
  - a sus tierras
  lexicon: BDAG
  rationale: ἀγρός puede referirse a campo, terreno cultivado o tierras de labor. «Campos» es natural y conserva el plural; se usa «a» en vez de «en» porque la meta del envío es el lugar de trabajo.
- source_word: βόσκειν
  english_pob_choice: to feed
  chosen_spanish: apacentar
  alternatives_spanish:
  - alimentar
  - pastorear
  - pacer
  lexicon: BDAG
  rationale: βόσκω puede significar alimentar o apacentar animales. Con cerdos, «apacentar» mantiene el valor de cuidar/alimentar ganado y evita una lectura excesivamente moderna de «alimentar».
- source_word: χοίρους
  english_pob_choice: pigs
  chosen_spanish: cerdos
  alternatives_spanish:
  - puercos
  - puercos
  lexicon: BDAG
  rationale: χοῖρος significa cerdo/puerco. «Cerdos» es el término neutral y ampliamente comprensible en español; «puercos» sería más regional o expresivo.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés POB que prefirió «joined himself to» por encima de «attached himself to» por ser más natural, pero conserva el matiz de dependencia del verbo griego κολλάομαι mediante «se juntó con». No se introducen lecturas textuales nuevas; el contenido coincide plenamente con SBLGNT y con el estado revisado del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda a YHWH; este versículo no lo contiene.
  - Se preserva el tratamiento directo y sobrio de los verbos de movimiento y envío, sin intensificar el texto con explicaciones no presentes en el griego.
  - «Cerdos» se prefiere a formas más arcaicas como «puercos» para una lectura pública moderna y clara.
