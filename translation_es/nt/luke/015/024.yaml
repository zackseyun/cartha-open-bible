translation:
  language: es
  text: porque este hijo mío estaba muerto y ha vuelto a la vida[a]; estaba perdido y ha sido hallado[b]. Y comenzaron a regocijarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «volvió a la vida» para «ha vuelto a la vida».
    reason: lexical_alternative
  - marker: b
    text: O «fue hallado» para «ha sido hallado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La partícula introduce la explicación del padre para la celebración; «porque» expresa de manera natural la relación causal en español sin añadir matiz extra.
- source_word: οὗτος ὁ υἱός μου
  english_pob_choice: this son of mine
  chosen_spanish: este hijo mío
  alternatives_spanish:
  - este hijo de mí
  - mi hijo este
  - este hijo mío aquí
  lexicon: BDAG
  rationale: Conserva el énfasis demostrativo de οὗτος y el vínculo afectivo de «my son» con un orden natural en español.
- source_word: νεκρὸς ἦν
  english_pob_choice: was dead
  chosen_spanish: estaba muerto
  alternatives_spanish:
  - había estado muerto
  lexicon: BDAG
  rationale: El griego presenta un estado pasado con εἰμί + predicado; «estaba muerto» mantiene esa cualidad sin suavizar la dureza de la imagen.
- source_word: ἀνέζησεν
  english_pob_choice: has come to life again
  chosen_spanish: ha vuelto a la vida
  alternatives_spanish:
  - volvió a la vida
  - revivió
  lexicon: BDAG
  rationale: «Volver a la vida» comunica la restauración del hijo con un español idiomático y preserva el contraste con «muerto».
- source_word: ἦν ἀπολωλὼς
  english_pob_choice: he was lost
  chosen_spanish: estaba perdido
  alternatives_spanish:
  - había estado perdido
  - se había perdido
  lexicon: BDAG
  rationale: La forma perifrástica indica un estado anterior; «perdido» mantiene el motivo temático de perdido/encontrado en el capítulo.
- source_word: εὑρέθη
  english_pob_choice: has been found
  chosen_spanish: ha sido hallado
  alternatives_spanish:
  - fue hallado
  - ha sido encontrado
  lexicon: BDAG
  rationale: El pasivo conserva la apertura del sujeto agente; «hallado» encaja bien con el par perdido/hallado y suena más bíblico sin ser arcaizante.
- source_word: ἤρξαντο εὐφραίνεσθαι
  english_pob_choice: they began to celebrate
  chosen_spanish: comenzaron a regocijarse
  alternatives_spanish:
  - empezaron a celebrar
  - comenzaron a alegrarse
  lexicon: BDAG
  rationale: «Regocijarse» recoge el matiz festivo de εὐφραίνεσθαι y mantiene el inicio ingesivo de ἤρξαντο mediante «comenzaron».
theological_decisions:
- issue: Lenguaje fuerte de muerte/vida en la parábola
  english_pob_reading: Retain the literal life/death language in English without interpretive paraphrase.
  chosen_spanish_reading: Mantener el lenguaje directo de muerte y vida sin convertirlo en una paráfrasis espiritualizante.
  alternative_spanish_readings:
  - estaba como muerto y ha sido restaurado
  - estaba separado y ha sido reconciliado
  rationale: El texto usa deliberadamente imágenes intensas; la traducción española debe conservar esa tensión narrativa y no resolverla con explicaciones interpretativas.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en una lectura alta de acuerdo; no se registran revisiones aplicadas. La redacción española conserva el paralelismo perdido/hallado y el contraste muerto/vivo sin atenuarlo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; no aplica en este versículo.
  - Se mantiene un español neutral y eclesial, con verbos naturales en lugar de calcos excesivos.
  - «Hallado» se prefirió por coherencia con el motivo literario del pasaje y por su registro bíblico natural en español.
