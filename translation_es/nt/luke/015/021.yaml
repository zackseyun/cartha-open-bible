translation:
  language: es
  text: 'Pero el hijo le dijo: «Padre, he pecado contra el cielo[a] y delante de ti; ya no soy digno de ser llamado tu hijo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego «contra el cielo» usa «cielo» como una manera reverente de referirse a Dios; algunas traducciones lo interpretan como «contra Dios».
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos continúan el habla del hijo con palabras equivalentes a «Trátame como a uno de tus jornaleros», armonizando con el v. 19; el texto SBLGNT termina la oración en «tu hijo».
    reason: textual_variant
lexical_decisions:
- source_word: εἶπεν δὲ
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  - Ahora ... dijo
  lexicon: BDAG
  rationale: δέ funciona como enlace suave; «Pero» conserva el giro narrativo del relato sin volverlo más fuerte de lo que el griego exige.
- source_word: ὁ υἱὸς αὐτῷ
  english_pob_choice: the son said to him
  chosen_spanish: el hijo le dijo
  alternatives_spanish:
  - su hijo le dijo
  - el hijo le dijo al padre
  lexicon: BDAG
  rationale: «El hijo» reproduce el referente nominal del griego y «le dijo» conserva el dativo αὐτῷ sin añadir identificación explícita que el texto no da en esta frase.
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Mi padre
  lexicon: BDAG
  rationale: El vocativo πατήρ se traduce de manera directa y natural como «Padre»; añadir «mi» sería una expansión no explicitada en el griego.
- source_word: ἥμαρτον
  english_pob_choice: I have sinned
  chosen_spanish: he pecado
  alternatives_spanish:
  - he cometido pecado
  - pequé
  lexicon: BDAG
  rationale: En una confesión, el aoristo se expresa con naturalidad en español como perfecto («he pecado»), manteniendo el peso de una culpa ya reconocida y todavía vigente para el hablante.
- source_word: εἰς τὸν οὐρανὸν
  english_pob_choice: against heaven
  chosen_spanish: contra el cielo
  alternatives_spanish:
  - contra Dios
  - ante el cielo
  lexicon: BDAG
  rationale: Se preserva el giro reverencial literal «cielo» para no resolver interpretativamente la circunlocución judía; en español «contra el cielo» es entendible y respeta la forma del original.
- source_word: καὶ ἐνώπιόν σου
  english_pob_choice: and before you
  chosen_spanish: y delante de ti
  alternatives_spanish:
  - y ante ti
  - y en tu presencia
  - y contra ti
  lexicon: BDAG
  rationale: ἐνώπιον expresa estar «delante de» o «en presencia de»; «delante de ti» conserva la imagen espacial y relacional sin cargar de interpretación el sentido como «contra ti».
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - ya no más
  - no soy más
  lexicon: BDAG
  rationale: «Ya no» es una equivalencia idiomática natural de οὐκέτι en español contemporáneo y mantiene el valor temporal/continuativo del adverbio.
- source_word: ἄξιος
  english_pob_choice: worthy
  chosen_spanish: digno
  alternatives_spanish:
  - merecedor
  - apto
  lexicon: BDAG
  rationale: «Digno» comunica adecuadamente la valoración moral y relacional de ἄξιος en este contexto penitencial, con registro claro y bíblico en español.
- source_word: κληθῆναι
  english_pob_choice: to be called
  chosen_spanish: ser llamado
  alternatives_spanish:
  - ser nombrado
  - ser considerado
  lexicon: BDAG
  rationale: El infinitivo pasivo de καλέω se vierte de manera natural como «ser llamado», especialmente en una fórmula filial como esta.
- source_word: υἱός σου
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - hijo tuyo
  - un hijo tuyo
  lexicon: BDAG
  rationale: «Tu hijo» preserva la relación familiar con un español natural; evita sobreexplicar la frase y mantiene el contraste afectivo del hablante sobre su propia indignidad.
theological_decisions:
- issue: La expresión «contra el cielo» como circunloquio reverencial
  english_pob_reading: Treat 'against heaven' as a reverential circumlocution for sin against God while translating it literally.
  chosen_spanish_reading: Traducir literalmente «contra el cielo» y dejar implícita la referencia reverencial a Dios.
  alternative_spanish_readings:
  - contra Dios
  - contra el Cielo
  rationale: El texto griego dice «cielo»; la traducción preserva la formulación original sin borrar la tensión semántica. La interpretación teológica queda disponible para el lector sin imponerse en el cuerpo principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Límite de la confesión del hijo en este versículo
  english_pob_reading: End the son's statement with 'your son' as in the SBLGNT text.
  chosen_spanish_reading: Cerrar la frase en «tu hijo», siguiendo el texto SBLGNT provisto.
  alternative_spanish_readings:
  - Agregar «trátame como a uno de tus jornaleros» según la forma más larga de algunos manuscritos
  rationale: El testimonio base termina aquí; incluir la continuación armonizada de v. 19 introduciría una lectura textual no respaldada por el SBLGNT de este pasaje. La nota conserva conciencia de la variante sin incorporarla al texto principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue el texto SBLGNT provisto y conserva la ambigüedad reverencial de «cielo» sin resolverla interpretativamente en el cuerpo principal; también mantiene el final breve de la confesión del hijo y registra la variante manuscrita más larga en nota.
  spanish_consistency_notes:
  - Se usa «Padre» como vocativo directo, sin añadir posesivo.
  - Se conserva «cielo» en la expresión reverencial para respetar el griego y el auditable sentido circunlocutivo.
  - «He pecado» y «ya no soy digno» reflejan un registro confesional natural en español sin suavizar la culpa ni la indignidad.
  - «Tu hijo» mantiene la relación filial central del pasaje con un equivalente idiomático claro.
