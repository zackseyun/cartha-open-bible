base_translation:
  language: en
  yaml_path: translation/nt/luke/015/021.yaml
  text: But the son said to him[a], ‘Father, I have sinned against heaven and before you[b]. I am no longer worthy to be called your son.’
  footnotes:
  - marker: a
    text: Greek 'against heaven' uses 'heaven' as a reverential way of referring to God; some translations render it interpretively as 'against God.'
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts continue the son's speech with words equivalent to 'Treat me as one of your hired servants,' harmonizing with v. 19; the SBLGNT text ends the sentence at 'your son.'
    reason: textual_variant
