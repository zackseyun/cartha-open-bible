  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La principal mejora es léxica: para θύω conviene una formulación española más natural y precisa («mataste para él el becerro engordado»), y para βίος conviene evitar una posible lectura demasiado estrecha de «sustento».'
