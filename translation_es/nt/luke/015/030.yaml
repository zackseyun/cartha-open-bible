revisions:
- from: Pero cuando este hijo tuyo vino[a], el que devoró tu sustento con prostitutas, le mataste el becerro engordado.
  to: Pero cuando vino[a] este hijo tuyo, el que devoró tus bienes con prostitutas, mataste para él el becerro engordado.
  rationale: Se ajusta βίος a «bienes» para reflejar mejor el referente patrimonial del contexto, manteniendo en nota la amplitud léxica. Se reordena la cláusula inicial para un español más natural y se cambia «le mataste» por «mataste para él» para expresar con claridad el dativo beneficiario de αὐτῷ y el sentido de θύω sin introducir matiz cultual. No se requiere adjudicación adicional porque son mejoras estilístico-léxicas claras y de bajo riesgo doctrinal.
