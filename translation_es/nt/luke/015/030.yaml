translation:
  language: es
  text: Pero cuando vino[a] este hijo tuyo, el que devoró tus bienes con prostitutas, mataste para él el becerro engordado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu patrimonio»; el griego dice literalmente «tu βίος», que aquí puede referirse a los medios de vida, las posesiones o el patrimonio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora bien, cuando
  lexicon: BDAG
  rationale: Conserva el valor temporal de ὅτε y el matiz contrastivo de δέ. «Pero cuando» reproduce bien la queja confrontativa del hermano mayor sin volverla más interpretativa de lo que es en el griego.
- source_word: ὁ υἱός σου οὗτος
  english_pob_choice: this son of yours
  chosen_spanish: este hijo tuyo
  alternatives_spanish:
  - ese hijo tuyo
  - este tu hijo
  lexicon: BDAG
  rationale: '«Este» preserva la fuerza de οὗτος y la distancia despectiva. «Hijo» resulta más natural en español que una traducción literal como «este tu hijo», pero sigue comunicando el desaire: no dice «mi hermano».'
- source_word: ὁ καταφαγών
  english_pob_choice: the one who devoured
  chosen_spanish: el que devoró
  alternatives_spanish:
  - el que consumió
  - el que se comió
  - el que despilfarró
  lexicon: BDAG
  rationale: El participio de κατεσθίω es vívido y fuerte. «Devoró» mantiene la metáfora agresiva mejor que una paráfrasis como «despilfarró», que suavizaría el lenguaje del hermano.
- source_word: σου τὸν βίον
  english_pob_choice: your livelihood
  chosen_spanish: tu sustento
  alternatives_spanish:
  - tu vida
  - tus bienes
  - tu hacienda
  lexicon: BDAG
  rationale: βίος aquí no significa vida biológica, sino recursos/medios de vida. «Sustento» conserva esa amplitud en español y suena natural; «hacienda» o «bienes» son posibles, pero estrechan o desplazan el matiz.
- source_word: μετὰ πορνῶν
  english_pob_choice: with prostitutes
  chosen_spanish: con prostitutas
  alternatives_spanish:
  - con rameras
  - con meretrices
  lexicon: BDAG
  rationale: πόρνη significa «prostituta». Se mantiene un término directo y contemporáneo, sin suavizar la acusación del hermano mayor.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - volvió
  - regresó
  lexicon: BDAG
  rationale: El griego dice literalmente «vino»; en este contexto narrativo puede implicar retorno, pero el verbo no lo explicita. «Vino» preserva esa sobriedad, evitando añadir una inferencia que no está en la cláusula.
- source_word: ἔθυσας
  english_pob_choice: you slaughtered
  chosen_spanish: le mataste
  alternatives_spanish:
  - lo sacrificaste
  - degollaste
  - mataste
  lexicon: BDAG
  rationale: θύω aquí se usa para matar un animal para una comida festiva. En español, «mataste» evita el matiz cultual de «sacrificaste» y no resulta tan técnico como «degollaste»; el contexto hace claro que se trata del becerro para una celebración.
- source_word: τὸν σιτευτὸν μόσχον
  english_pob_choice: the fattened calf
  chosen_spanish: el becerro engordado
  alternatives_spanish:
  - el ternero cebado
  - el becerro cebado
  - el becerro gordo
  lexicon: BDAG
  rationale: «Becerro engordado» expresa la idea de un animal preparado especialmente para comer. «Cebado» es también posible, pero «engordado» resulta más transparente y ampliamente entendido en español.
- source_word: αὐτῷ
  english_pob_choice: for him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  - en su honor
  lexicon: BDAG
  rationale: El dativo aquí funciona como destinatario/beneficiario. En español, el pronombre átono «le» comunica esa relación de manera natural en la construcción verbal elegida.
theological_decisions:
- issue: Cómo reflejar que habla el hermano mayor sin convertir su acusación en afirmación del narrador
  english_pob_reading: Retain the accusation straightforwardly in the main text without adding qualifiers
  chosen_spanish_reading: Mantener la acusación como palabras del hermano mayor, sin añadir marcas de duda ni armonizarla con el relato previo
  alternative_spanish_readings:
  - presuntamente devoró tu sustento
  - después de malgastar tus bienes en vida inmoral
  rationale: El griego presenta una acusación dentro del discurso directo. El español puede conservar esa tensión narrativo-teológica sin introducir expresiones como «presuntamente» o suavizaciones que cambien el tono del reproche.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete de auditoría; la propuesta sigue la lectura griega SBLGNT y la solución inglesa POB, ajustadas a un español natural y fiel al valor léxico de βίος, καταφαγών y θύω.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se mantuvo «prostitutas» para πόρνῶν por claridad y fidelidad léxica.
  - Se evitó «Cristo»/«Mesías» por no aparecer en el texto.
  - «Becerro engordado» conserva el valor de un animal especialmente preparado para la fiesta, sin cargarlo con lenguaje sacrificial cultual.
