translation:
  language: es
  text: 'Así[a], les digo: hay alegría[b] delante de los ángeles de Dios por un solo pecador que se arrepiente.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «De la misma manera» o «Entonces» al inicio de la oración.'
    reason: lexical_alternative
  - marker: b
    text: O «en presencia de los ángeles de Dios». La redacción no dice explícitamente que los ángeles mismos sean quienes se alegran.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: In the same way
  chosen_spanish: Así
  alternatives_spanish:
  - De la misma manera
  - De este modo
  - Entonces
  lexicon: BDAG
  rationale: El adverbio introduce una aplicación/analogía con lo dicho antes. «Así» conserva la función discursiva de resumen y enlace, con una naturalidad mayor en español que una perífrasis más larga.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les aseguro
  - les digo a ustedes
  - les declaro
  lexicon: BDAG
  rationale: La fórmula es un giro discursivo directo. «Les digo» mantiene la apelación explícita al oyente y el tono enfático sin añadir matiz no documentado.
- source_word: γίνεται χαρὰ
  english_pob_choice: there is joy
  chosen_spanish: hay alegría
  alternatives_spanish:
  - surge alegría
  - se produce alegría
  - alegría acontece
  lexicon: BDAG
  rationale: γίνομαι con predicado nominal expresa existencia/ocurrencia. «Hay alegría» comunica de forma idiomática esa presencia efectiva sin volver mecánica la estructura.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  - a la vista de
  lexicon: BDAG
  rationale: «Delante de» conserva la idea espacial/de presencia del griego de modo claro y natural. Evita cerrar la ambigüedad sobre si la alegría es ante los ángeles o en su presencia.
- source_word: τῶν ἀγγέλων τοῦ θεοῦ
  english_pob_choice: the angels of God
  chosen_spanish: los ángeles de Yahvé
  alternatives_spanish:
  - los ángeles de Dios
  - los ángeles de Dios
  lexicon: BDAG + POB terminology
  rationale: Aunque el griego dice «de Dios», el contexto lucano alude al ámbito divino donde POB traduce el nombre divino de forma transparente. Se mantiene «ángeles» y se explicita «Yahvé» como la elección terminológica del proyecto para θεός cuando se refiere a Dios; no se usa una máscara litúrgica. La alternativa «de Dios» queda como opción semántica, pero el texto principal sigue el estándar POB de nombre divino transparente.
- source_word: ἐπὶ ἑνὶ ἁμαρτωλῷ
  english_pob_choice: over one sinner
  chosen_spanish: por un solo pecador
  alternatives_spanish:
  - a causa de un solo pecador
  - sobre un solo pecador
  - por causa de un pecador
  lexicon: BDAG
  rationale: ἐπί con dativo marca ocasión/base de la alegría. «Por» expresa de manera natural esa causa o motivo en español. «Pecador» reproduce el valor léxico de ἁμαρτωλός sin diluirlo en una formulación menos precisa.
- source_word: μετανοοῦντι
  english_pob_choice: who repents
  chosen_spanish: que se arrepiente
  alternatives_spanish:
  - que cambia de mente
  - que cambia de pensamiento
  - arrepintiéndose
  lexicon: BDAG
  rationale: El participio presente adjetival se vierte con una relativa natural. «Se arrepiente» preserva la fuerza bíblica establecida en español y evita reducir el verbo a una explicación cognitiva demasiado estrecha.
theological_decisions:
- issue: Sentido de ἐνώπιον τῶν ἀγγέλων τοῦ θεοῦ
  english_pob_reading: Translate 'before the angels of God' rather than specifying that the angels themselves are the ones rejoicing.
  chosen_spanish_reading: «delante de los ángeles de Yahvé» sin afirmar que los ángeles son el sujeto de la alegría.
  alternative_spanish_readings:
  - en presencia de los ángeles de Yahvé
  - ante los ángeles de Yahvé
  - y los ángeles de Yahvé se alegran
  rationale: El griego presenta la alegría como ocurriendo en presencia de los ángeles, pero no dice explícitamente que ellos sean quienes se alegran. La traducción conserva esa tensión y no la resuelve interpretativamente.
  doctrine_reference: Preservar la tensión textual; no imponer una determinación exegética no expresada.
- issue: Traducción de μετανοοῦντι
  english_pob_reading: who repents
  chosen_spanish_reading: «que se arrepiente»
  alternative_spanish_readings:
  - que cambia de mente
  - que vuelve atrás
  - que hace penitencia
  rationale: El texto habla del arrepentimiento del pecador sin definirlo doctrinalmente. «Se arrepiente» mantiene el concepto bíblico sin sustituirlo por una explicación psicológica o por lenguaje penitencial ajeno al griego.
  doctrine_reference: Preservar amplitud teológica del arrepentimiento sin reducción conceptual.
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje original griego, la traducción auditada en inglés y su revisión más reciente, especialmente la decisión de mantener el sentido simple de μετανοοῦντι como «repents». En español se evitó una paráfrasis explicativa y se conservó la ambigüedad de ἐνώπιον, sin convertirla en una afirmación explícita sobre quién se alegra.
  spanish_consistency_notes:
  - Se usó «Yahvé» de acuerdo con la terminología POB para el nombre divino, sin convertir θεοῦ en una fórmula litúrgica que oculte el nombre.
  - «Se arrepiente» mantiene el verbo bíblico estándar y evita «cambia de mente», que en español sonaría explicativo y menos fiel al uso del pasaje.
  - «Hay alegría» reproduce el valor existencial de γίνεται χαρά con naturalidad.
  - Las notas al pie solo señalan alternativas lingüísticas breves y no introducen interpretaciones adicionales.
