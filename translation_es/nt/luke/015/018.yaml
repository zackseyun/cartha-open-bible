translation:
  language: es
  text: 'Me levantaré y iré a mi padre, y le diré: «Padre, he pecado contra el cielo[a] y delante de ti[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra Dios»; aquí «cielo» probablemente funciona como una forma reverente de referirse a Dios.
    reason: lexical_alternative
  - marker: b
    text: O «a tus ojos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: I will get up
  chosen_spanish: Me levantaré
  alternatives_spanish:
  - Me pondré en pie
  - Me alzaré
  lexicon: BDAG
  rationale: El participio aoristo expresa la primera acción de la resolución del hijo antes del verbo principal. En español, «me levantaré» comunica con naturalidad ese movimiento concreto previo, sin calcar de forma rígida la construcción griega.
- source_word: πορεύσομαι
  english_pob_choice: go
  chosen_spanish: iré
  alternatives_spanish:
  - me dirigiré
  - saldré rumbo a
  lexicon: BDAG
  rationale: El futuro medio de πορεύομαι indica desplazamiento hacia el padre. «Iré» es la opción más clara y sobria en español, manteniendo el simple movimiento sin añadir matices no explícitos.
- source_word: πρὸς τὸν πατέρα μου
  english_pob_choice: to my father
  chosen_spanish: a mi padre
  alternatives_spanish:
  - hacia mi padre
  lexicon: BDAG
  rationale: πρός con acusativo señala movimiento hacia una persona. En este contexto, «a mi padre» es idiomático en español y conserva la dirección relacional sin sonar forzado.
- source_word: ἐρῶ αὐτῷ
  english_pob_choice: I will say to him
  chosen_spanish: le diré
  alternatives_spanish:
  - le diré a él
  - le hablaré
  lexicon: BDAG
  rationale: El futuro de λέγω con dativo se expresa naturalmente con «le diré». Esta forma conserva el acto de habla y evita el énfasis narrativo que tendría «le contaré».
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Mi padre
  lexicon: BDAG
  rationale: El vocativo directo debe mantenerse como apelación personal. «Padre» reproduce la forma de tratamiento sin añadir posesivo que no está en el griego.
- source_word: ἥμαρτον
  english_pob_choice: I have sinned
  chosen_spanish: he pecado
  alternatives_spanish:
  - he cometido pecado
  - he fallado
  lexicon: BDAG
  rationale: 'El aoristo confesional se vierte de modo natural en español con pretérito perfecto: «he pecado». Esta opción preserva el acto ya consumado y su vigencia moral presente.'
- source_word: εἰς τὸν οὐρανὸν
  english_pob_choice: against heaven
  chosen_spanish: contra el cielo
  alternatives_spanish:
  - contra Dios
  - hacia el cielo
  lexicon: BDAG
  rationale: Se mantiene «cielo» porque el griego dice literalmente οὐρανός y el audit trail inglés retiene la circunlocución reverencial. «Contra el cielo» conserva la tensión interpretativa entre la expresión literal y su función reverente, sin resolverla prematuramente por «contra Dios».
- source_word: ἐνώπιόν σου
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - a tus ojos
  lexicon: BDAG
  rationale: ἐνώπιον con genitivo significa «ante, delante de, en presencia de». «Delante de ti» es una solución natural en español y mantiene la dimensión relacional y evaluativa de la confesión.
theological_decisions:
- issue: Tratamiento de εἰς τὸν οὐρανὸν como circunlocución reverencial
  english_pob_reading: 'Retain ''heaven'' in the main text: ''I have sinned against heaven and before you'''
  chosen_spanish_reading: 'Retener «cielo» en el texto principal: «he pecado contra el cielo y delante de ti»'
  alternative_spanish_readings:
  - he pecado contra Dios y contra ti
  - he pecado contra Dios y delante de ti
  rationale: El griego usa οὐρανός, probablemente como circunlocución reverencial para Dios. La traducción conserva la expresión literal para no borrar la ambigüedad/documentada tensión teológica; así el lector ve el giro original y puede percibir su referencia reverente sin que la traducción lo sustituya de antemano.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Relación entre εἰς τὸν οὐρανὸν y ἐνώπιόν σου
  english_pob_reading: '''against heaven'' and ''before you'' remain distinct'
  chosen_spanish_reading: «contra el cielo» y «delante de ti» se mantienen distintos
  alternative_spanish_readings:
  - «contra Dios» y «contra ti»
  - «contra el cielo» y «en tu presencia»
  rationale: Conviene no fusionar las dos cláusulas en una sola idea. La primera preserva la circunlocución reverencial; la segunda añade el matiz de confesión personal y pública ante el padre. Mantener la distinción respeta el griego y la lectura auditada en inglés.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La versión española sigue el pasaje sin cambios de revisión recientes en el expediente inglés; se conserva la lectura auditada de alta concordancia, especialmente la tensión entre la expresión literal «cielo» y su posible sentido reverencial.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo exige; este versículo no contiene el nombre divino explícito.
  - «Cielo» se conserva como equivalente de οὐρανός para mantener la circunlocución reverencial documentada.
  - El habla directa se marca con comillas angulares para lectura editorial clara y uso eclesial contemporáneo.
  - Se prefiere un español natural («me levantaré», «iré», «le diré») sin perder el orden semántico del griego.
