translation:
  language: es
  text: Ya no soy digno de ser llamado tu hijo[a]. Hazme como uno de tus jornaleros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno de tus sirvientes asalariados» o «uno de tus trabajadores por paga». El griego alude a trabajadores remunerados, no a esclavos domésticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no ya
  - ya no más
  lexicon: BDAG
  rationale: 'Expresa el cambio de estado con naturalidad en español y conserva la fuerza temporal de la negación: el hablante reconoce que su condición anterior ya no aplica.'
- source_word: ἄξιος
  english_pob_choice: worthy
  chosen_spanish: digno
  alternatives_spanish:
  - merecedor
  - apto
  lexicon: BDAG
  rationale: «Digno» comunica bien la idea de ser moral o socialmente apto para un estatus. En español bíblico conserva el peso de valor/desmerecimiento sin sonar forzado.
- source_word: κληθῆναι
  english_pob_choice: to be called
  chosen_spanish: ser llamado
  alternatives_spanish:
  - ser nombrado
  - ser considerado
  lexicon: BDAG
  rationale: El infinitivo pasivo expresa designación o reconocimiento; «ser llamado» mantiene el paralelo formal y el sentido idiomático de recibir un estatus o nombre.
- source_word: υἱός
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - hija
  - niño
  - descendiente
  lexicon: BDAG
  rationale: El griego es masculino singular y la relación filial es central en la parábola. «Hijo» conserva la referencia precisa y no neutraliza el matiz relacional.
- source_word: ποίησόν
  english_pob_choice: Make
  chosen_spanish: Trátame
  alternatives_spanish:
  - Hazme
  - Ponme
  - Conviérteme
  lexicon: BDAG
  rationale: Aunque el verbo básico es «hacer», en este contexto la petición no busca una creación ontológica sino un trato/status. «Trátame» comunica con naturalidad la solicitud de ser recibido en una condición inferior, sin perder la dependencia implícita.
- source_word: ὡς
  english_pob_choice: like
  chosen_spanish: como a
  alternatives_spanish:
  - como
  - igual que
  lexicon: BDAG
  rationale: Aquí introduce comparación. La forma «como a uno de» suena natural en español y preserva la idea de ser puesto en la categoría de un trabajador contratado.
- source_word: ἕνα τῶν μισθίων
  english_pob_choice: one of your hired workers
  chosen_spanish: uno de tus jornaleros
  alternatives_spanish:
  - uno de tus trabajadores asalariados
  - uno de tus sirvientes asalariados
  - uno de tus empleados
  lexicon: BDAG
  rationale: «μίσθιος» se refiere a personas contratadas por paga, no a esclavos domésticos. «Jornaleros» transmite bien el matiz de trabajo remunerado y condición social inferior, de forma clara y idiomática en español.
theological_decisions:
- issue: Conservar la tensión filial y de estatus social en la confesión del hijo
  english_pob_reading: Retain 'worthy' and 'son' without softening the filial and honor-shame dimensions.
  chosen_spanish_reading: Conservar «digno» y «hijo», y rendir la segunda frase como una petición de trato inferior, no como una mera autodefinición sentimental.
  alternative_spanish_readings:
  - Ya no merezco ser llamado tu hijo. Hazme como uno de tus sirvientes.
  - Ya no soy apto para ser llamado tu hijo. Trátame como a uno de tus empleados.
  rationale: El verso expresa la percepción del hijo de que ya no merece el estatus filial. Mantener «hijo» y «digno» conserva el peso relacional y social del texto; «jornaleros» resguarda la distinción económica de μίσθιος sin borrar la humillación implícita.
  doctrine_reference: Translation philosophy §§3-4
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se conserva la lectura de estatus («worthy»/«digno»), la designación filial («son»/«hijo») y la distinción lexical de μίσθιος como trabajador contratado y no esclavo. No se detectaron revisiones aplicadas en la fuente inglesa reciente.'
  spanish_consistency_notes:
  - Se mantuvo un registro uniforme de tratamiento en segunda persona singular («tu», «Trátame»), acorde con el contexto narrativo y la relación padre-hijo.
  - «Jornaleros» evita la posible confusión de «sirvientes» con esclavos domésticos, en línea con la nota lexical inglesa.
  - Se añadió la nota de pie solo en el punto donde el español introduce una alternativa posible que podría oscurecer el matiz económico del término griego.
