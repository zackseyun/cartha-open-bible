translation:
  language: es
  text: Y todos los recaudadores de impuestos y los pecadores se acercaban a él para oírle[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «venían acercándose a él». El griego usa una forma continua, que sugiere una aproximación repetida o sostenida.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦσαν δὲ
  english_pob_choice: Now ... were
  chosen_spanish: Ahora ... se acercaban
  alternatives_spanish:
  - Y ... se acercaban
  - Entonces ... se acercaban
  lexicon: BDAG
  rationale: El imperfecto con δέ presenta una escena en desarrollo. «Ahora» funciona de modo natural en español para marcar el cambio discursivo sin sobrecargar δέ; «se acercaban» mantiene la acción continua o repetida del participio presente.
- source_word: αὐτῷ ἐγγίζοντες
  english_pob_choice: drawing near to him
  chosen_spanish: se acercaban a él
  alternatives_spanish:
  - iban acercándose a él
  - se iban acercando a él
  lexicon: BDAG
  rationale: ἐγγίζω expresa acercarse, con aspecto progresivo en esta construcción perifrástica. «Se acercaban» es fluido en español y conserva la idea de movimiento sostenido hacia Jesús.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - la totalidad
  lexicon: BDAG
  rationale: «Todos» reproduce de forma directa el alcance colectivo de los sujetos y su énfasis en la amplitud del grupo.
- source_word: οἱ τελῶναι
  english_pob_choice: the tax collectors
  chosen_spanish: los recaudadores de impuestos
  alternatives_spanish:
  - los publicanos
  - los cobradores de impuestos
  lexicon: BDAG
  rationale: «Recaudadores de impuestos» expresa el sentido lexical de τελώναι de forma clara en español moderno. Se evita «publicanos» por ser más tradicional e históricamente cargado; «cobradores de impuestos» es posible, pero «recaudadores» suena más natural para la función fiscal.
- source_word: οἱ ἁμαρτωλοὶ
  english_pob_choice: sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los pecadores notorios
  - los malvados
  lexicon: BDAG
  rationale: El sustantivo plural funciona como categoría social-religiosa. «Pecadores» mantiene la tensión narrativa sin explicar ni suavizar el término.
- source_word: ἀκούειν αὐτοῦ
  english_pob_choice: to hear him
  chosen_spanish: para oírle
  alternatives_spanish:
  - para escucharlo
  - para oírlo
  lexicon: BDAG
  rationale: El infinitivo de propósito se vierte naturalmente con «para». «Oírle» conserva un registro bíblico sobrio y la relación directa con su enseñanza; «escucharlo» sería igualmente posible, pero introduce más énfasis en atención que en simple audición.
theological_decisions:
- issue: Categorías sociales y religiosas sin expansión interpretativa
  english_pob_reading: Retained the paired categories without interpretive expansion.
  chosen_spanish_reading: Se conservan las dos categorías sin añadir aclaraciones interpretativas en el texto principal.
  alternative_spanish_readings:
  - los recaudadores de impuestos y otros marginados
  - los recaudadores de impuestos y pecadores notorios
  rationale: El griego nombra dos grupos reconocibles y la traducción no debe resolver su tensión narrativa con una paráfrasis explicativa. Mantener la formulación simple preserva el contraste del relato y respeta el alcance del original.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés coinciden en leer una escena narrativa continua: imperfecto de εἰμί + participio presente de ἐγγίζω + infinitivo de propósito. La versión española mantiene ese valor aspectual con «se acercaban» y conserva el propósito con «para oírle». No se observan revisiones aplicadas en el material fuente, y el control cruzado reporta alto acuerdo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica en este versículo.
  - Se evitó «publicanos» como término principal para τελῶναι porque el proyecto pide claridad moderna y el contexto no requiere el tecnicismo tradicional.
  - Se prefirió el infinitivo con pronombre enclítico «oírle» por registro bíblico natural; «oírlo» también sería gramatical, pero aquí el objeto directo de persona es estilísticamente sobrio en español culto.
