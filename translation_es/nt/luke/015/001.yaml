  spanish_quality_summary: El español es claro y comprensible, con buen registro general. No obstante, «Ahora todos...» suena menos natural como apertura narrativa que «Y todos...» o «Todos...». El resto de la frase fluye bien. «Oírle» es digno y natural; «recaudadores de impuestos» y «pecadores» son adecuados.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Recaudadores de impuestos» para τελῶναι y «pecadores» para ἁμαρτωλοὶ están bien. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
