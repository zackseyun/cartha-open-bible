translation:
  language: es
  text: 'Y cuando llega a la casa[a], convoca a sus amigos y vecinos, diciéndoles: «Alégrense conmigo[b], porque he encontrado mi oveja perdida[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «cuando llega a casa». El griego dice literalmente «cuando llega a la casa».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Regocíjense conmigo». El imperativo griego expresa gozo compartido.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «mi oveja que estaba perdida». El griego dice literalmente «mi oveja, la que estaba perdida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν εἰς τὸν οἶκον
  english_pob_choice: when he comes into the house
  chosen_spanish: cuando llega a la casa
  alternatives_spanish:
  - cuando entra en la casa
  - cuando llega a su casa
  lexicon: BDAG
  rationale: El participio aoristo con εἰς τὸν οἶκον expresa secuencia temporal. «Llega a la casa» conserva la imagen de entrar en la casa y suena natural en español. «Llega a su casa» sería más idiomático, pero añade posesivo que no está explícito en el griego.
- source_word: συγκαλεῖ
  english_pob_choice: he calls together
  chosen_spanish: convoca
  alternatives_spanish:
  - llama juntos a
  - reúne
  - convoca a
  lexicon: BDAG
  rationale: El verbo significa llamar o convocar a un grupo. «Convoca» expresa bien la acción de reunir por llamado y funciona con dignidad en español. «Reúne» es posible, pero pierde algo del matiz de llamada previa.
- source_word: φίλους
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - amigos cercanos
  - amigos
  lexicon: BDAG
  rationale: «Amigos» es el equivalente directo y natural de φίλους.
- source_word: γείτονας
  english_pob_choice: neighbors
  chosen_spanish: vecinos
  alternatives_spanish:
  - vecinos
  - colindantes
  lexicon: BDAG
  rationale: «Vecinos» es la equivalencia estándar y comunicable para γείτονας.
- source_word: λέγων αὐτοῖς
  english_pob_choice: saying to them
  chosen_spanish: diciéndoles
  alternatives_spanish:
  - y les dice
  - mientras les dice
  lexicon: BDAG
  rationale: 'El participio presente se vierte naturalmente con gerundio: «diciéndoles». Conserva la relación con la acción principal sin sobrecargar la sintaxis.'
- source_word: Συγχάρητέ μοι
  english_pob_choice: Rejoice with me
  chosen_spanish: Alégrense conmigo
  alternatives_spanish:
  - Regocíjense conmigo
  - Celebren conmigo
  - Compartan mi alegría
  lexicon: BDAG
  rationale: El imperativo aoristo de συγχαίρω expresa gozo compartido. «Alégrense conmigo» mantiene el mandato y la idea de alegría conjunta. «Celebren conmigo» es viable, pero desplaza el énfasis hacia celebración más que gozo.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón del llamado. «Porque» es la equivalencia más clara y directa en español.
- source_word: εὗρον
  english_pob_choice: I have found
  chosen_spanish: he encontrado
  alternatives_spanish:
  - he hallado
  - encontré
  lexicon: BDAG
  rationale: Aunque el griego está en aoristo, el perfecto español «he encontrado» comunica de modo natural el resultado presente de la acción completada.
- source_word: τὸ πρόβατόν μου
  english_pob_choice: my sheep
  chosen_spanish: mi oveja
  alternatives_spanish:
  - mi oveja
  - mi cordero
  lexicon: BDAG
  rationale: πρόβατον significa «oveja» aquí; en singular, «mi oveja» es natural y exacto en español.
- source_word: τὸ ἀπολωλός
  english_pob_choice: that was lost
  chosen_spanish: perdida
  alternatives_spanish:
  - que estaba perdida
  - extraviada
  - la que se había perdido
  lexicon: BDAG
  rationale: 'El participio perfecto funciona adjetivalmente: «la que estaba perdida». En español, «perdida» conserva la cualidad resultante de haber estado perdida y permite la expresión compacta «mi oveja perdida».'
theological_decisions:
- issue: Imagen parabólica de recuperación sin explicación interpretativa añadida
  english_pob_reading: Retain the concrete image 'my lost sheep' without importing interpretive language about sinners or salvation into the verse itself.
  chosen_spanish_reading: Mantener la imagen concreta «mi oveja perdida» sin introducir en el versículo una explicación sobre pecadores o salvación.
  alternative_spanish_readings:
  - mi oveja perdida
  - mi oveja que estaba perdida
  rationale: El contexto inmediato es una parábola; el versículo debe conservar la imagen narrativa sin colapsarla en comentario teológico. «Mi oveja perdida» refleja bien el griego y evita sobreexplicar.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última revisión inglesa: la cláusula final se mantiene con una forma natural y compacta en español («mi oveja perdida»), preservando el participio adjetival del griego. También conserva la imagen literal de «la casa» como opción principal, con nota para la lectura más idiomática «casa».'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantiene «oveja» en singular para πρόβατον, siguiendo el sentido de un animal concreto y no un colectivo.
  - «Convoca» comunica mejor la acción de llamar a un grupo que «reúne» en este contexto festivo.
  - Las comillas angulares se usan para el discurso directo según convención española.
