translation:
  language: es
  text: Y levantándose, fue a su padre. Pero cuando todavía estaba lejos[a], su padre lo vio y se llenó de compasión; y corrió, se echó sobre su cuello y lo besó con fervor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando todavía estaba a gran distancia».
    reason: lexical_alternative
  - marker: b
    text: El verbo griego puede implicar una intensidad afectuosa, posiblemente «lo besó repetidamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: arose
  chosen_spanish: levantándose
  alternatives_spanish:
  - se levantó
  - habiéndose levantado
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción previa y decisiva antes de ir al padre. En español, «levantándose» conserva la secuencia narrativa sin volver la frase rígida ni añadir interpretación no explícita.
- source_word: ἦλθεν πρὸς τὸν πατέρα ἑαυτοῦ
  english_pob_choice: came to his father
  chosen_spanish: fue a su padre
  alternatives_spanish:
  - vino a su padre
  - llegó a su padre
  lexicon: BDAG
  rationale: El verbo de movimiento admite «ir/venir» según el punto de vista. Aquí «fue a su padre» suena natural en español y mantiene el foco relacional. «Su» refleja el reflexivo ἑαυτοῦ.
- source_word: ἔτι δὲ αὐτοῦ μακρὰν ἀπέχοντος
  english_pob_choice: while he was still far away
  chosen_spanish: cuando todavía estaba lejos
  alternatives_spanish:
  - mientras todavía estaba a gran distancia
  - cuando aún estaba muy lejos
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa circunstancia simultánea. «Cuando todavía estaba lejos» conserva la claridad narrativa y la distancia física sin sobrerreproducir la sintaxis griega.
- source_word: ἐσπλαγχνίσθη
  english_pob_choice: was moved with compassion
  chosen_spanish: se compadeció profundamente
  alternatives_spanish:
  - sintió compasión
  - tuvo compasión
  lexicon: BDAG
  rationale: El verbo expresa una compasión entrañable e intensa. «Se compadeció profundamente» preserva esa fuerza afectiva mejor que un equivalente más plano, sin convertirlo en explicación teológica.
- source_word: δραμὼν
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - echó a correr
  - salió corriendo
  lexicon: BDAG
  rationale: El participio aoristo de τρέχω es directo; «corrió» mantiene la inmediatez y el movimiento rápido con naturalidad en español.
- source_word: ἐπέπεσεν ἐπὶ τὸν τράχηλον αὐτοῦ
  english_pob_choice: fell on his neck
  chosen_spanish: se echó sobre su cuello
  alternatives_spanish:
  - se lanzó sobre su cuello
  - se abrazó a su cuello
  lexicon: BDAG
  rationale: La imagen griega es literalmente «caer sobre el cuello». En español, «se echó sobre su cuello» conserva la vividez sin forzar un giro demasiado literal o poco natural.
- source_word: κατεφίλησεν
  english_pob_choice: kissed him fervently
  chosen_spanish: lo besó con fervor
  alternatives_spanish:
  - lo besó intensamente
  - lo besó repetidamente
  lexicon: BDAG
  rationale: El verbo compuesto intensifica el beso, con posible matiz de reiteración o afecto marcado. «Con fervor» comunica la intensidad afectiva sin añadir necesariamente repetición que el texto no exige.
theological_decisions:
- issue: La compasión paterna en la parábola
  english_pob_reading: Render the father's response in emotionally vivid but non-allegorizing language.
  chosen_spanish_reading: Conservar la respuesta del padre con fuerza emocional, sin convertirla en una explicación alegórica.
  alternative_spanish_readings:
  - Hacer el tono más sobrio y menos afectivo
  - Explicitar que el padre simboliza directamente a Dios
  rationale: El texto presenta una iniciativa paterna marcada por verbos vigorosos. La traducción mantiene esa intensidad narrativa sin añadir una interpretación doctrinal que el verso no formula explícitamente.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó con alta concordancia y sólo observaciones menores. La presente versión conserva ese perfil, manteniendo la fuerza narrativa y la precisión léxica del original.
  spanish_consistency_notes:
  - Se emplea «Dios»/«Yahvé» según corresponda en el proyecto; aquí no aparece ningún término divino directo.
  - No se usa «Cristo» ni terminología eclesiástica tradicional ajena al verso.
  - Se mantiene un español moderno y reverente, evitando calcos innecesarios pero conservando la imagen corporal del texto griego.
