revisions:
- from: 'Él le dijo[a]: «Tu hermano ha llegado, y tu padre ha sacrificado el ternero engordado, porque lo ha recibido de vuelta sano y salvo».[b]'
  to: 'Le dijo: «Tu hermano ha llegado, y tu padre mandó matar el ternero engordado, porque lo ha recibido de vuelta sano y salvo[a]».'
  rationale: Se revisa «ha sacrificado» a «mandó matar» para reflejar ἔθυσεν en contexto de preparación festiva sin sugerir un sacrificio cultual, en línea con la decisión inglesa documentada. Se elimina la nota duplicada y se reubica la única nota lexical en «sano y salvo», donde realmente pertenece. También se suprime el pronombre explícito inicial para un español más natural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:01:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: llegada del hermano, acción del padre con el animal preparado para la fiesta, y razón expresada por ὅτι…ἀπέλαβεν. También preserva bien ἥκει como llegada con resultado presente y ἀπέλαβεν como recuperación/recepción de vuelta. Sin embargo, «ha sacrificado» para ἔθυσεν introduce un matiz cultual más fuerte que el audit trail inglés explícitamente evitó; aquí conviene una forma de matanza festiva no ritualizada. Además, las notas al pie no están bien ancladas: [a] aparece tras «dijo» pero comenta ὑγιαίνοντα, y [b] queda suelta al final cuando debe anclarse en la expresión relevante.'
  spanish_quality_summary: El español es generalmente claro y digno, pero puede sonar más natural y fiel con «mandó matar» o «mató» en vez de «ha sacrificado». «Ternero engordado» es entendible, aunque «ternero cebado» suena más idiomático en registros bíblicos actuales; no obstante, no es imprescindible cambiarlo. La puntuación y el discurso directo funcionan bien. Hay que corregir la colocación de las notas para cumplir el formato del proyecto.
  glossary_alignment: 'No hay conflictos con la terminología teológica global del proyecto. La principal cuestión léxica es θύω: el proyecto inglés justificó «slaughtered» precisamente para evitar implicar sacrificio cultual; por eso «sacrificado» desaline­a la decisión documentada. «Sano y salvo» para ὑγιαίνοντα está bien y conviene conservar la alternativa «sano» en nota. «Ha llegado» para ἥκει y «lo ha recibido de vuelta» para ἀπέλαβεν están alineados.'
  issues:
  - severity: high
    issue: «ha sacrificado» para ἔθυσεν añade un matiz cultual no deseado
    rationale: El audit trail inglés eligió «slaughtered» para evitar precisamente la implicación de un sacrificio formal. En la parábola el contexto es de comida festiva, no de rito cultual.
  - severity: medium
    issue: Las notas al pie están mal ancladas en el texto
    rationale: El marcador [a] está colocado tras «dijo» pero la nota explica ὑγιαίνοντα; el marcador [b] aparece al final de la cita sin asociarse claramente con «sano y salvo». Las notas deben aparecer en la palabra o frase pertinente.
  - severity: low
    issue: El uso de «Él» es innecesario en español
    rationale: No es infiel, pero «Le dijo» fluye mejor en español natural sin perder el sujeto del contexto narrativo.
  revised_spanish_text: 'Le dijo: «Tu hermano ha llegado, y tu padre mandó matar el ternero engordado, porque lo ha recibido de vuelta sano y salvo[a]».'
  revised_footnotes:
  - marker: a
    text: O «sano». El participio griego ὑγιαίνοντα puede significar «estando sano» o, según el contexto, más ampliamente «sano y salvo».
    reason: lexical_alternative
  revision_rationale: Se revisa «ha sacrificado» a «mandó matar» para reflejar ἔθυσεν en contexto de preparación festiva sin sugerir un sacrificio cultual, en línea con la decisión inglesa documentada. Se elimina la nota duplicada y se reubica la única nota lexical en «sano y salvo», donde realmente pertenece. También se suprime el pronombre explícito inicial para un español más natural.
