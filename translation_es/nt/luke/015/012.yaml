translation:
  language: es
  text: 'Y el menor de ellos dijo a su padre: «Padre, dame la parte[a] que me corresponde de los bienes». Entonces les repartió su sustento[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la porción de los bienes que me corresponde» o «la parte debida a mí».
    reason: lexical_alternative
  - marker: b
    text: Griego «su vida/sustento» (βίον), referido aquí a los bienes o medios de vida del padre.
    reason: lexical_alternative
lexical_decisions:
- source_word: νεώτερος
  english_pob_choice: the younger
  chosen_spanish: el menor
  alternatives_spanish:
  - el más joven
  - el hijo menor
  lexicon: BDAG
  rationale: El griego usa un comparativo sustantivado (“el más joven / el menor”) sin añadir explícitamente “hijo”. En español, “el menor” conserva esa economía y resulta natural en la escena familiar. “Hijo menor” explicita el contexto, pero añade una palabra que el griego no expresa aquí.
- source_word: πατρί / Πάτερ
  english_pob_choice: his father / Father
  chosen_spanish: a su padre / Padre
  alternatives_spanish:
  - a su padre / Padre mío
  - a su padre / papá
  lexicon: BDAG
  rationale: Se distingue entre la referencia narrativa (“a su padre”) y el vocativo directo (“Padre”). Mantener ambas formas evita aplanar el cambio de caso y conserva el tono respetuoso pero directo del diálogo.
- source_word: δός μοι
  english_pob_choice: give me
  chosen_spanish: dame
  alternatives_spanish:
  - da me
  - te pido que me des
  lexicon: BDAG
  rationale: El imperativo aoristo con pronombre dativo se expresa de manera natural y fiel con “dame”. Es más idiomático que una calca como “da me” y no suaviza el ruego/mandato del original.
- source_word: τὸ ἐπιβάλλον μέρος
  english_pob_choice: the share ... that falls to me
  chosen_spanish: la parte que me corresponde
  alternatives_spanish:
  - la porción que cae para mí
  - la parte debida a mí
  - la parte asignada a mí
  lexicon: BDAG
  rationale: ἐπιβάλλον expresa lo que “corresponde” o “toca” por derecho. “Me corresponde” transmite bien la idea de porción asignada sin volverla arcaica. “Parte” mantiene el paralelismo con “share” y funciona mejor que “porción” en español común.
- source_word: οὐσία
  english_pob_choice: estate
  chosen_spanish: bienes
  alternatives_spanish:
  - propiedad
  - herencia
  - patrimonio
  lexicon: BDAG
  rationale: En este contexto de herencia, οὐσία apunta a los bienes materiales del padre. “Bienes” es amplio, natural y suficientemente preciso; evita que “herencia” se anticipe demasiado al reparto legal, y “patrimonio” puede sonar más técnico.
- source_word: διεῖλεν
  english_pob_choice: divided
  chosen_spanish: repartió
  alternatives_spanish:
  - dividió
  - distribuyó
  - apportionó
  lexicon: BDAG
  rationale: διαιρέω puede significar dividir o repartir. “Repartió” comunica claramente la acción narrativa y sugiere una distribución entre varios, lo que encaja con el contexto de los dos hijos. “Dividió” sería literal, pero menos transparente en español actual.
- source_word: αὐτοῖς
  english_pob_choice: between them
  chosen_spanish: les
  alternatives_spanish:
  - entre ellos
  - a ellos
  lexicon: BDAG
  rationale: El dativo plural aquí implica que el padre distribuyó el patrimonio a ambos hijos. En español, el objeto indirecto “les” deja abierta la distribución sin añadir una frase explicativa pesada; el contexto ya hace visible que fue entre los dos.
- source_word: βίον
  english_pob_choice: his livelihood
  chosen_spanish: sus bienes
  alternatives_spanish:
  - su sustento
  - su vida
  - su modo de vivir
  lexicon: BDAG
  rationale: βίος puede significar vida, medios de vida o lo que sostiene la vida. En esta escena, el sentido práctico apunta a los recursos del padre. “Sus bienes” mantiene el vínculo con la herencia repartida y evita que “su vida” suene demasiado literal o confuso en español.
theological_decisions:
- issue: Lenguaje de repartición de la herencia en una parábola de familia
  english_pob_reading: The father divides his livelihood/property between the sons; the wording preserves the legal-familial force without moralizing it.
  chosen_spanish_reading: El padre reparte sus bienes entre los dos hijos, conservando el tono legal y familiar del relato.
  alternative_spanish_readings:
  - el padre dividió su patrimonio
  - el padre les dio su herencia
  rationale: No hay una carga doctrinal añadida en el versículo, pero sí una escena de derecho familiar. “Repartió sus bienes” conserva la precisión narrativa sin convertir el texto en una formulación teológica o patrimonial más abstracta de lo que el griego requiere.
  doctrine_reference: Lucas 15:11-32; derecho de herencia y dinámica familiar en la parábola del hijo pródigo
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del audit trail inglés y conserva sus puntos lexicales clave: νεώτερος como “el menor”, τὸ ἐπιβάλλον μέρος como “la parte que me corresponde”, οὐσία como bienes/propiedad, y βίον como un término de sustento patrimonial. No se incorporaron cambios de revisión adicionales porque el contexto mostró acuerdo alto y sin correcciones aplicadas.'
  spanish_consistency_notes:
  - Se mantuvo “Padre” en vocativo para distinguirlo de “a su padre” en la narración.
  - Se prefirió “bienes” en lugar de “estate”/“patrimonio” por naturalidad en español y por la referencia al reparto concreto.
  - Se usó “repartió” en vez de “dividió” para expresar mejor la distribución entre los dos hijos sin perder fidelidad.
  - Las notas al pie se limitaron a alternativas léxicas documentadas por el audit trail, sin añadir especulación interpretativa.
