    rationale: El original usa οὐσία en la petición del hijo y βίον en la respuesta del padre. El POB inglés documenta esta diferencia con «estate» / «livelihood». En español, repetir «bienes» en ambas cláusulas borra ese contraste y reduce la precisión semántica.
  - severity: low
    issue: La repetición de «bienes» en ambas mitades del versículo suena menos elegante en español.
    rationale: Aunque no es incorrecta, la repetición inmediata hace el texto más plano estilísticamente y menos fiel al cambio léxico del griego.
