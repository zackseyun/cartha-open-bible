translation:
  language: es
  text: Y llamando a uno de los siervos, preguntaba qué podrían ser estas cosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «qué podría significar esto». El griego dice más literalmente: «qué podrían ser estas cosas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  english_pob_choice: calling
  chosen_spanish: llamando
  alternatives_spanish:
  - llamando a sí
  - haciendo llamar
  - convocando
  lexicon: BDAG
  rationale: El participio aoristo medio indica que lo llamó hacia sí antes de preguntar. En español, «llamando» conserva la secuencia participial y suena natural; «convocando» sería más formal y menos idiomático aquí.
- source_word: παίδων
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - criados
  - sirvientes
  - hijos
  lexicon: BDAG
  rationale: Aunque παῖς puede significar «niño» o «siervo», el contexto doméstico y la función narrativa favorecen personas al servicio de la casa. «Siervos» mantiene la fuerza léxica del contexto sin volver la escena infantil.
- source_word: ἐπυνθάνετο
  english_pob_choice: he asked
  chosen_spanish: preguntaba
  alternatives_spanish:
  - preguntó
  - inquiría
  - estaba preguntando
  lexicon: BDAG
  rationale: El imperfecto medio expresa que estaba indagando. «Preguntaba» conserva mejor ese trasfondo aspectual que un pretérito puntual, sin sonar forzado en español.
- source_word: τί ἂν εἴη ταῦτα
  english_pob_choice: what these things might be
  chosen_spanish: qué pudieran ser estas cosas
  alternatives_spanish:
  - qué significaban estas cosas
  - qué era esto
  - qué podrían ser estas cosas
  lexicon: BDAG
  rationale: La construcción con ἂν + optativo expresa una pregunta indirecta con matiz de posibilidad/incertidumbre. «Qué pudieran ser estas cosas» reproduce mejor esa vacilación que una paráfrasis como «qué significaban».
translation_notes:
  revision_awareness: El texto griego de SBLGNT y el audit trail inglés concuerdan en una lectura sencilla y estable; no se documentan revisiones textuales ni tensiones teológicas relevantes para este versículo.
  spanish_consistency_notes:
  - Se eligió «Yahvé» como norma general solo cuando el hebreo subyacente esté presente; este versículo no la requiere.
  - Se mantuvo un registro verbal imperfectivo con «preguntaba» para reflejar el matiz del griego.
  - No se añadió una nota interpretativa para τί ἂν εἴη más allá de la alternativa semántica, porque el español ya permite conservar la incertidumbre sin explicarla excesivamente.
