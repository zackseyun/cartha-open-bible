  to: Y llamando a uno de los siervos, preguntaba qué podrían ser estas cosas[a].
  rationale: Se conserva la fidelidad al griego y al POB inglés, pero se corrige la ubicación y el contenido de la nota para reflejar la alternativa documentada sobre la cláusula final, no sobre «siervos». También se suaviza «pudieran» a «podrían» para una lectura más natural en español sin perder el matiz de posibilidad.
