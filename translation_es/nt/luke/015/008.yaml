translation:
  language: es
  text: ¿O qué mujer[a], teniendo diez dracmas, si pierde una dracma, no enciende una lámpara, barre la casa y busca cuidadosamente[b] hasta encontrarla?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una dracma era una moneda de plata griega.
    reason: cultural_note
  - marker: b
    text: O «buscar diligentemente».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿O acaso
  - ¿O bien
  lexicon: BDAG
  rationale: Conserva la conexión discursiva e introduce la ilustración paralela en forma natural en español.
- source_word: τίς γυνὴ
  english_pob_choice: what woman
  chosen_spanish: qué mujer
  alternatives_spanish:
  - qué mujer entre ustedes
  - cuál mujer
  lexicon: BDAG
  rationale: La pregunta retórica funciona de modo natural con «qué mujer» y evita añadir un complemento no presente en el griego.
- source_word: δραχμὰς
  english_pob_choice: drachmas
  chosen_spanish: dracmas
  alternatives_spanish:
  - monedas de plata
  - monedas
  lexicon: BDAG
  rationale: Se mantiene el término específico de la moneda para conservar la precisión histórica y lexical del texto.
- source_word: ἔχουσα δέκα
  english_pob_choice: having ten
  chosen_spanish: teniendo diez
  alternatives_spanish:
  - que tiene diez
  - con diez
  lexicon: BDAG
  rationale: El participio se vierte de manera directa y natural, preservando la imagen de posesión sin recargar la frase.
- source_word: ἐὰν ἀπολέσῃ δραχμὴν μίαν
  english_pob_choice: if she loses one drachma
  chosen_spanish: si pierde una dracma
  alternatives_spanish:
  - si llega a perder una dracma
  - si perdiera una dracma
  lexicon: BDAG
  rationale: La condicional general se expresa con presente simple en español; se conserva el objeto singular y el término monetario específico.
- source_word: ἅπτει λύχνον
  english_pob_choice: light a lamp
  chosen_spanish: enciende una lámpara
  alternatives_spanish:
  - prende una lámpara
  - alumbra una lámpara
  lexicon: BDAG
  rationale: «Encender una lámpara» es la equivalencia española más natural y fiel para ἅπτω en este contexto.
- source_word: σαροῖ τὴν οἰκίαν
  english_pob_choice: sweep the house
  chosen_spanish: barre la casa
  alternatives_spanish:
  - barre el hogar
  - barre la vivienda
  lexicon: BDAG
  rationale: «Casa» reproduce el espacio concreto de la escena doméstica; «barre» es la traducción directa y clara de σαρόω.
- source_word: ζητεῖ ἐπιμελῶς
  english_pob_choice: search carefully
  chosen_spanish: busca cuidadosamente
  alternatives_spanish:
  - busca diligentemente
  - la busca con cuidado
  lexicon: BDAG
  rationale: Se conserva el matiz de diligencia/cuidado con una expresión idiomática y transparente en español.
- source_word: ἕως οὗ εὕρῃ
  english_pob_choice: until she finds it
  chosen_spanish: hasta encontrarla
  alternatives_spanish:
  - hasta que la encuentre
  - hasta que la halle
  lexicon: BDAG
  rationale: El español puede expresar el resultado final con infinitivo después de «hasta», manteniendo fluidez sin perder el sentido de término de la búsqueda.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego y coincide con la solución auditada en inglés: mantiene la pregunta retórica, el léxico monetario específico y la secuencia doméstica de encender, barrer y buscar. No se introdujeron cambios textuales respecto del pasaje base; solo se ajustó la sintaxis para que suene natural en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto solo cuando corresponda; este versículo no contiene el tetragrámaton ni κύριος como cita nominal del nombre divino.
  - Se prefirió «dracmas» para conservar el término técnico de la moneda, en paralelo con la decisión inglesa de mantener «drachmas».
  - «Busca cuidadosamente» conserva el sentido de ἐπιμελῶς y queda alineado con la nota alternativa «buscar diligentemente».
