translation:
  language: es
  text: 'Y cuando la encuentra, reúne a sus amigas y vecinas, diciendo: «Alégrense conmigo, porque encontré la dracma[a] que había perdido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una dracma era una moneda de plata griega, aproximadamente equivalente al salario de un día de un trabajador en muchos contextos.
    reason: cultural_note
lexical_decisions:
- source_word: εὑροῦσα
  english_pob_choice: when she has found it
  chosen_spanish: Y cuando la ha encontrado
  alternatives_spanish:
  - después de haberla encontrado
  - habiéndola encontrado
  lexicon: BDAG
  rationale: El participio aoristo femenino singular se vierte de modo temporal en una secuencia natural del español. Se mantiene la referencia implícita al objeto ya mencionado sin repetir innecesariamente 'la moneda'.
- source_word: συγκαλεῖ
  english_pob_choice: she calls together
  chosen_spanish: reúne
  alternatives_spanish:
  - convoca
  - llama para reunir
  lexicon: BDAG
  rationale: El compuesto sugiere llamar a otros hacia uno mismo para estar juntos. 'Reúne' expresa bien el acto en español y conserva la fuerza narrativa sin sonar rígido.
- source_word: τὰς φίλας
  english_pob_choice: her women friends
  chosen_spanish: sus amigas
  alternatives_spanish:
  - sus amigas mujeres
  - sus amistades femeninas
  lexicon: BDAG
  rationale: El plural femenino se refleja naturalmente como 'amigas'. En español, el femenino ya queda claro por la forma; añadir 'mujeres' sería redundante y torpe.
- source_word: γείτονας
  english_pob_choice: neighbors
  chosen_spanish: vecinas
  alternatives_spanish:
  - vecinos
  - personas vecinas
  lexicon: BDAG
  rationale: Aunque el griego puede ser genérico, aquí coordina con φίλας en femenino y parece referirse al círculo social de la mujer. 'Vecinas' preserva esa concordancia visible en español.
- source_word: λέγουσα
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dice
  lexicon: BDAG
  rationale: Participio presente introductorio de discurso directo; 'diciendo' es la equivalencia natural y breve en español.
- source_word: Συγχάρητέ μοι
  english_pob_choice: Rejoice with me
  chosen_spanish: Alégrense conmigo
  alternatives_spanish:
  - Celebren conmigo
  - Compartan mi alegría
  lexicon: BDAG
  rationale: El imperativo plural de συγχαίρω expresa alegría compartida. 'Alégrense conmigo' es directo y fiel; evita un calco extraño y conserva el tono exhortativo.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón del llamado a alegrarse. 'Porque' es la forma más clara y natural en español actual.
- source_word: εὗρον
  english_pob_choice: I found
  chosen_spanish: he encontrado
  alternatives_spanish:
  - encontré
  - he hallado
  lexicon: BDAG
  rationale: Aunque el aoristo puede reflejarse con pasado simple, en este contexto del discurso directo el perfecto compuesto suena más vivo en español y mantiene la inmediatez del hallazgo.
- source_word: δραχμὴν
  english_pob_choice: drachma
  chosen_spanish: dracma
  alternatives_spanish:
  - moneda dracma
  - drahma
  lexicon: BDAG
  rationale: Se conserva el nombre específico de la moneda griega, siguiendo la preferencia del POB de mantener la especificidad del término fuente cuando es entendible en español.
- source_word: ἣν ἀπώλεσα
  english_pob_choice: that I had lost
  chosen_spanish: que había perdido
  alternatives_spanish:
  - que perdí
  - que yo había perdido
  lexicon: BDAG
  rationale: La relativa identifica la moneda previamente extraviada. El pluscuamperfecto español reproduce bien la relación temporal anterior al hallazgo y suena natural.
translation_notes:
  revision_awareness: 'El griego de SBLGNT presenta un participio aoristo inicial, un presente narrativo en συγκαλεῖ y un imperativo plural directo en el discurso. La versión española conserva esa secuencia con una temporalidad natural: ''cuando la ha encontrado... reúne... diciendo...''. También se mantiene la especificidad cultural de δραχμή mediante ''dracma'', con nota explicativa, siguiendo el antecedente inglés.'
  spanish_consistency_notes:
  - Se mantiene 'dracma' en lugar de generalizar a 'moneda' para preservar la especificidad del original.
  - Se usa 'vecinas' porque el contexto inmediato y el femenino de φίλας favorecen una referencia femenina explícita.
  - Se conserva el tono directo y exhortativo de 'Alégrense conmigo' sin sustituirlo por una paráfrasis más libre.
