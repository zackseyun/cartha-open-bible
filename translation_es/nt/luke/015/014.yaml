translation:
  language: es
  text: Pero después de haber gastado todo[a], vino una hambre severa sobre aquella región, y él comenzó a pasar necesidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando hubo gastado todo» o «después de haber despilfarrado todo» para «después de haber gastado todo».
    reason: lexical_alternative
  - marker: b
    text: O «comenzó a carecer» o «comenzó a estar en necesidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: δαπανήσαντος ... αὐτοῦ πάντα
  english_pob_choice: after he had spent everything
  chosen_spanish: después de haber gastado todo
  alternatives_spanish:
  - cuando hubo gastado todo
  - después de haber despilfarrado todo
  lexicon: BDAG
  rationale: El participio aoristo en genitivo absoluto funciona naturalmente en español como una cláusula temporal. «Gastado» refleja con fidelidad δαπανάω; «despilfarrado» añadiría una valoración que no exige este verbo en el versículo.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ introduce un giro narrativo y contraste. «Pero» expresa bien el cambio de abundancia a crisis en español actual.
- source_word: ἐγένετο
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - surgió
  - ocurrió
  - hubo
  lexicon: BDAG
  rationale: Con λιμός, γίνομαι indica la irrupción o llegada de un evento. «Vino» conserva esa idea de aparición sobre la región y suena natural en español bíblico contemporáneo.
- source_word: λιμὸς ἰσχυρά
  english_pob_choice: a severe famine
  chosen_spanish: un hambre severa
  alternatives_spanish:
  - una gran hambre
  - un hambre fuerte
  lexicon: BDAG
  rationale: ἰσχυρός intensifica λιμός. «Hambre severa» comunica con claridad la intensidad; «hambre fuerte» sería demasiado literal y menos natural.
- source_word: κατὰ τὴν χώραν ἐκείνην
  english_pob_choice: upon that country
  chosen_spanish: sobre aquella región
  alternatives_spanish:
  - en aquella región
  - por toda aquella región
  lexicon: BDAG
  rationale: κατά con acusativo puede indicar extensión sobre un área. «Sobre aquella región» reproduce mejor la imagen de una calamidad que cae o se extiende por el territorio; «región» refleja χώρα en un español más natural que «país» en este contexto.
- source_word: ἤρξατο ὑστερεῖσθαι
  english_pob_choice: he began to be in need
  chosen_spanish: comenzó a tener necesidad
  alternatives_spanish:
  - comenzó a carecer
  - comenzó a estar en necesidad
  lexicon: BDAG
  rationale: La perífrasis inceptiva expresa el inicio de una carencia. «Tener necesidad» es claro y fiel al valor de ὑστερέω como falta o carencia; «carecer» sería posible pero menos directo en esta construcción.
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: El pronombre griego explicita al sujeto; en español basta «él» para mantener la continuidad narrativa sin sobrecargar.
theological_decisions:
- issue: Intensidad de la calamidad y alcance geográfico
  english_pob_reading: a severe famine came upon that country
  chosen_spanish_reading: vino un hambre severa sobre aquella región
  alternative_spanish_readings:
  - hubo un hambre severa en aquella región
  - vino una gran hambre sobre aquella región
  rationale: 'No hay una decisión doctrinal controvertida, pero sí una elección semántica relevante: mantener la imagen de una calamidad que se abate sobre el territorio. «Sobre aquella región» preserva mejor la fuerza de κατά con acusativo que una simple localización neutral.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin revisiones relevantes; la versión española sigue de cerca las decisiones léxicas asentadas en el POB inglés y ajusta solo lo necesario para una expresión natural en español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando corresponda; este versículo no la contiene.
  - «Hambre severa» mantiene la intensificación de λιμός ἰσχυρά sin introducir un matiz distinto.
  - «Región» se usa para χώρα por adecuación contextual; «país» sonaría menos natural aquí y podría sobrerrepresentar la extensión política del término.
