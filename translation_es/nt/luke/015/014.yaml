revisions:
- from: Pero después de haber gastado todo[a], vino un hambre severa sobre aquella región[b], y él comenzó a tener necesidad.
  to: Pero después de haber gastado todo[a], vino una hambre severa sobre aquella región, y él comenzó a pasar necesidad[b].
  rationale: Se corrigió la discordancia gramatical en «hambre», se reubicó la nota [b] para que corresponda al segmento correcto según el expediente inglés, y se hizo más natural la expresión de ὑστερεῖσθαι con «pasar necesidad», sin cambiar el sentido del original.
