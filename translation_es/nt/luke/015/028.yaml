translation:
  language: es
  text: Pero él se enojó y no quería entrar[a]. Entonces su padre salió y le rogaba[b] que entrara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no estaba dispuesto a entrar» o «se negó a entrar».'
    reason: lexical_alternative
  - marker: b
    text: El verbo traducido «rogaba» también puede rendirse como «insistía» o «suplicaba»; el imperfecto sugiere una apelación continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠργίσθη
  english_pob_choice: became angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se puso enojado
  - se irritó
  - se enfureció
  lexicon: BDAG
  rationale: El aoristo de ὀργίζομαι aquí expresa el comienzo del enojo. En español, «se enojó» comunica bien ese ingreso al estado emocional sin subir la intensidad a «se enfureció».
- source_word: δὲ
  english_pob_choice: But / So
  chosen_spanish: Pero / Entonces
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: El primer δέ introduce contraste con la celebración anterior; «Pero» lo refleja naturalmente. El segundo δέ avanza la escena; «Entonces» comunica esa progresión narrativa en español.
- source_word: οὐκ ἤθελεν εἰσελθεῖν
  english_pob_choice: was unwilling to go in
  chosen_spanish: no quería entrar
  alternatives_spanish:
  - no estaba dispuesto a entrar
  - se negó a entrar
  - no quiso entrar
  lexicon: BDAG
  rationale: θέλω con infinitivo expresa voluntad. «No quería entrar» conserva el matiz volitivo e interno; «se negó» sería más fuerte y resolvería la tensión hacia una negativa explícita.
- source_word: ἐξελθὼν
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - vino afuera
  - se salió
  lexicon: BDAG
  rationale: El participio de ἐξέρχομαι indica movimiento hacia afuera. En español, «salió» es la forma más natural y fiel al movimiento narrativo.
- source_word: παρεκάλει
  english_pob_choice: pleaded with him
  chosen_spanish: le rogaba
  alternatives_spanish:
  - le suplicaba
  - le insistía
  - le exhortaba
  lexicon: BDAG
  rationale: El imperfecto de παρακαλέω sugiere una acción continuada o repetida. «Le rogaba» preserva la apelación insistente y respetuosa sin exagerar hacia «suplicaba».
theological_decisions:
- issue: Tono de la intervención del padre en la parábola
  english_pob_reading: The father came out and pleaded with him.
  chosen_spanish_reading: su padre salió y le rogaba
  alternative_spanish_readings:
  - su padre salió y le suplicaba
  - su padre salió y le insistía
  rationale: La escena muestra la iniciativa compasiva y persistente del padre. «Le rogaba» conserva esa insistencia continua sin añadir interpretación doctrinal ajena al texto.
  doctrine_reference: Preservar la tensión narrativa y la iniciativa misericordiosa del padre; equivalencia óptima
translation_notes:
  revision_awareness: 'Coincide con el pasaje griego SBLGNT y con el audit trail inglés: se mantiene el valor ingresivo de ὠργίσθη, la volición de ἤθελεν y el imperfecto continuo de παρεκάλει, sin suavizar ni intensificar indebidamente la escena.'
  spanish_consistency_notes:
  - Se usa «Dios» / «Yahvé» según corresponda en otros pasajes; aquí no aplica.
  - Se mantiene «se enojó» para ὠργίσθη, en línea con un inicio de estado emocional.
  - Se conserva «entrar» como equivalente idiomático de εἰσελθεῖν.
  - «Rogaba» preserva la continuidad imperfectiva del griego.
  - Las notas al pie usan marcadores únicos y aparecen ancladas en el texto principal.
