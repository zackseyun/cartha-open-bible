    issue: Los marcadores de notas [a] y [b] están invertidos respecto al modelo auditado y a su contenido.
    rationale: En la auditoría inglesa, la nota de alternativas léxicas corresponde a «go in», mientras que la nota sobre el imperfecto continuo corresponde a «pleaded». En español, [a] está anclado a «entrar» pero contiene la nota de «no quería entrar», lo cual es redundante; [b] está en «rogaba» correctamente, pero la alineación global debe quedar clara y exacta.
