- from: Pero él se enojó y no quería entrar[a]. Entonces su padre salió y le rogaba[b].
  to: Pero él se enojó y no quería entrar[a]. Entonces su padre salió y le rogaba[b] que entrara.
  rationale: Se conserva el sentido del griego y de la auditoría inglesa, pero se corrige la utilidad y precisión de la nota sobre «no quería entrar» y se mejora la naturalidad española de la apelación del padre con «le rogaba que entrara», sin alterar la fuerza léxica de παρεκάλει.
