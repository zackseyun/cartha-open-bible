translation:
  language: es
  text: Y después de no muchos días[a], el hijo menor juntó todo[b] y se fue a un país lejano, y allí malgastó sus bienes[c][d], viviendo desenfrenadamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de unos pocos días». La expresión griega dice literalmente «después de no muchos días».
    reason: lexical_alternative
  - marker: b
    text: O «reunió todo» o «juntó todas sus cosas».
    reason: lexical_alternative
  - marker: c
    text: O «su propiedad», «su patrimonio» o «su riqueza» para «sus bienes».
    reason: lexical_alternative
  - marker: d
    text: O «viviendo de manera derrochadora» o «en una vida desenfrenada». El texto no especifica aquí pecados concretos, sino una manera de vivir disipada.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετ’ οὐ πολλὰς ἡμέρας
  english_pob_choice: after not many days
  chosen_spanish: después de no muchos días
  alternatives_spanish:
  - a los pocos días
  - después de unos pocos días
  lexicon: BDAG
  rationale: Conserva la expresión negativa y el orden temporal del griego sin volverla innecesariamente idiomática; suena natural en español y mantiene la transparencia fuente-texto.
- source_word: συναγαγὼν πάντα
  english_pob_choice: gathered everything together
  chosen_spanish: juntó todo
  alternatives_spanish:
  - habiendo juntado todo
  - reunió todo
  lexicon: BDAG
  rationale: El participio antecede a la acción de irse; «juntó todo» comunica la recolección/agrupación previa con naturalidad. Se evita especificar más de lo que el texto dice.
- source_word: ὁ νεώτερος υἱός
  english_pob_choice: the younger son
  chosen_spanish: el hijo menor
  alternatives_spanish:
  - el hijo más joven
  - el menor de los hijos
  lexicon: BDAG
  rationale: «Menor» es una equivalencia natural y fiel al comparativo en este contexto narrativo; mantiene claridad en español sin carga interpretativa añadida.
- source_word: ἀπεδήμησεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: BDAG
  rationale: «Se fue» expresa la salida hacia otra región de manera simple y directa; evita un tono arcaico y funciona bien con la frase siguiente sobre el país lejano.
- source_word: εἰς χώραν μακράν
  english_pob_choice: to a distant country
  chosen_spanish: a un país lejano
  alternatives_spanish:
  - a una tierra lejana
  - a un país distante
  lexicon: BDAG
  rationale: «País lejano» reproduce el valor espacial de χώρα μακράν con un sustantivo natural en español. «Lejano» mantiene la distancia sin cargar el verso con una imagen más literaria de la necesaria.
- source_word: διεσκόρπισεν
  english_pob_choice: squandered
  chosen_spanish: disipó
  alternatives_spanish:
  - desperdició
  - malgastó
  - disipó sus bienes
  lexicon: BDAG
  rationale: El verbo griego literalmente sugiere dispersar; en este contexto económico implica derrochar los recursos. «Disipó» conserva la idea de dispersión/dilución sin introducir connotaciones más específicas que el texto no declara.
- source_word: τὴν οὐσίαν αὐτοῦ
  english_pob_choice: his property
  chosen_spanish: su hacienda
  alternatives_spanish:
  - su propiedad
  - sus bienes
  - su fortuna
  lexicon: BDAG
  rationale: «Hacienda» puede abarcar patrimonio/posesiones y mantiene cierta densidad lexical sin precisar de más. Se conserva la amplitud del término griego para los bienes heredados o poseídos.
- source_word: ζῶν ἀσώτως
  english_pob_choice: living recklessly
  chosen_spanish: viviendo sin freno
  alternatives_spanish:
  - viviendo de manera disoluta
  - viviendo desenfrenadamente
  - viviendo irresponsablemente
  lexicon: BDAG
  rationale: La forma verbal con adverbio describe el modo de vida con desenfreno, pero sin señalar pecados concretos. «Sin freno» preserva esa amplitud y evita añadir una lectura más estrecha que el texto no exige.
theological_decisions:
- issue: No especificar pecados concretos en la descripción de la vida del hijo menor
  english_pob_reading: The text does not specify particular sins here, only a dissipated manner of life.
  chosen_spanish_reading: El texto no especifica pecados concretos aquí, sino solo un modo de vida disoluto o desenfrenado.
  alternative_spanish_readings:
  - vida de debauchery / desenfreno moral
  - vida licenciosa
  - vida pecaminosa
  rationale: El griego ζῶν ἀσώτως describe el modo de vida, no una lista de actos. La traducción debe conservar esa tensión y no concretar más de lo que el pasaje afirma.
  doctrine_reference: Precisión exegética; evitar sobreinterpretación moralizante no sustentada por el texto
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail al expresar ζῶν ἀσώτως con un gerundio más directo y natural, manteniendo el valor adverbial del participio sin añadir un matiz causal o temporal innecesario. También conserva la transparencia del griego en la apertura temporal y evita precisar las faltas del hijo más allá del carácter desenfrenado de su vida.
  spanish_consistency_notes:
  - Se mantuvo «hijo menor» para ὁ νεώτερος υἱός, en coherencia con el contexto parabólico.
  - Se eligió «hacienda» para οὐσία como equivalente amplio de bienes/patrimonio, consistente con la amplitud semántica del sustantivo.
  - Se evitó «Cristo», «Señor» y otras terminologías no presentes en el versículo.
  - Las notas al pie solo aparecen cuando el marcador correspondiente está anclado en el texto principal.
