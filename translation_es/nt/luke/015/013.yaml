review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: mantiene la expresión temporal negada, la reunión previa de todo, la ida a una región lejana y la idea de derrochar los bienes por un modo de vida disipado. Sin embargo, dos elecciones españolas debilitan la fidelidad práctica: «disipó su hacienda» suena menos natural y más ambiguo que el sentido económico de διεσκόρπισεν τὴν οὐσίαν αὐτοῦ; y «viviendo sin freno» puede sugerir una intensificación moral algo más marcada que el inglés auditado «living recklessly», aunque no llega a ser inaceptable.'
  spanish_quality_summary: El texto es legible, pero «su hacienda» en español general contemporáneo puede evocar finca, hacienda rural o registro demasiado arcaizante. «Disipó» también resulta menos idiomático con bienes materiales en español bíblico contemporáneo que «malgastó». Una leve revisión mejora claridad, naturalidad y precisión sin apartarse de la fuente.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones clave deberían favorecer español moderno y eclesialmente legible. Conviene alinear οὐσία con «bienes» o «propiedad» antes que «hacienda» en este contexto, y διεσκόρπισεν con «malgastó»/«derrochó» antes que «disipó» para reflejar mejor el uso económico contextual documentado en el POB.
  issues:
  - severity: medium
    issue: «su hacienda» es ambiguo y poco natural para οὐσία
    rationale: Aunque históricamente puede significar patrimonio, en español amplio actual suele evocar una finca o sonar arcaizante. El contexto pide bienes/propiedad/riqueza, no una posible propiedad rural.
  - severity: medium
    issue: «disipó» no es la mejor combinación idiomática con bienes en español actual
    rationale: El griego aquí significa derrochar o malgastar recursos. «Disipó su hacienda» es comprensible, pero menos claro y menos natural que «malgastó sus bienes».
  - severity: low
    issue: Falta una nota para la amplitud de «su hacienda / sus bienes» correspondiente a la nota inglesa sobre property/estate/wealth
    rationale: El inglés POB preserva alternativas léxicas para οὐσία. Si se revisa a «sus bienes», conviene conservar una nota que indique alternativas como «su propiedad» o «su patrimonio».
  revised_spanish_text: Y después de no muchos días[a], el hijo menor juntó todo[b] y se fue a un país lejano, y allí malgastó sus bienes[c][d], viviendo desenfrenadamente.
