revisions:
- from: Y después de no muchos días[a], el hijo menor juntó todo[b] y se fue a un país lejano, y allí disipó[c] su hacienda, viviendo sin freno.
  to: Y después de no muchos días[a], el hijo menor juntó todo[b] y se fue a un país lejano, y allí malgastó sus bienes[c][d], viviendo desenfrenadamente.
  rationale: Se revisa «disipó su hacienda» a «malgastó sus bienes» para reflejar con mayor claridad y naturalidad el sentido económico contextual de διεσκόρπισεν τὴν οὐσίαν αὐτοῦ en español contemporáneo. También se añade una nota léxica para «sus bienes», en línea con el audit trail inglés. Se mantiene una expresión amplia para ζῶν ἀσώτως sin especificar pecados concretos.
