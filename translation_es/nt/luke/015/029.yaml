translation:
  language: es
  text: 'Pero él respondió a su padre[a]: «Mira, tantos años te he servido, y nunca he desobedecido tu mandato; y nunca me has dado ni siquiera un cabrito, para celebrar con mis amigos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he estado como esclavo a tu servicio». El verbo griego δουλεύω puede significar «servir» o, en un sentido más fuerte, «ser esclavo / estar esclavizado». Aquí el texto principal sigue la revisión inglesa final con «te he servido», aunque la queja del hijo mayor puede sonar más amarga en griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió diciendo
  lexicon: BDAG
  rationale: La fórmula griega es una idiomática de respuesta en discurso directo. En español, «respondió» comunica el valor conversacional sin duplicación innecesaria.
- source_word: τῷ πατρὶ αὐτοῦ
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre mismo
  lexicon: BDAG
  rationale: Mantiene el objeto indirecto explícito en español y preserva la relación familiar del texto.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - He aquí
  lexicon: BDAG
  rationale: Como marcador discursivo de énfasis, «Mira» suena natural en español moderno y conserva la fuerza apelativa.
- source_word: τοσαῦτα ἔτη
  english_pob_choice: for so many years
  chosen_spanish: tantos años
  alternatives_spanish:
  - por tantos años
  - estos muchos años
  lexicon: BDAG
  rationale: Expresa duración de manera natural en español y corresponde al valor temporal del griego.
- source_word: δουλεύω
  english_pob_choice: have been serving
  chosen_spanish: he servido
  alternatives_spanish:
  - he estado sirviendo
  - he trabajado para ti
  - he estado esclavizado
  lexicon: BDAG
  rationale: La revisión inglesa decidió suavizar el matiz de dureza de «slaving» a «serving»; en español, «te he servido» refleja la lectura aprobada y mantiene el tono de queja sin introducir una equivalencia más fuerte que el texto final inglés.
- source_word: ἐντολήν σου παρῆλθον
  english_pob_choice: disobeyed your command
  chosen_spanish: he desobedecido tu mandato
  alternatives_spanish:
  - he pasado por alto tu mandato
  - he transgredido tu mandato
  - he desobedecido tu orden
  lexicon: BDAG
  rationale: «Παρέρχομαι» con «ἐντολή» expresa infringir o pasar por alto un mandato. «Desobedecido tu mandato» conserva la claridad y el registro formal.
- source_word: ἔδωκας ἔριφον
  english_pob_choice: gave me even a young goat
  chosen_spanish: me has dado ni siquiera un cabrito
  alternatives_spanish:
  - me has dado ni siquiera un chivito
  - me has dado un cabrito
  lexicon: BDAG
  rationale: «ἔριφος» es un cabrito o cría de cabra. «Cabrito» es claro y natural en español; «ni siquiera» expresa la minimización de la queja.
- source_word: ἵνα ... εὐφρανθῶ
  english_pob_choice: so that I might celebrate
  chosen_spanish: para que me alegre
  alternatives_spanish:
  - para que celebre
  - para que me regocije
  - para festejar
  lexicon: BDAG
  rationale: El verbo tiene un sentido festivo o de regocijo. «Me alegre» conserva la idea de gozo/celebración sin forzar una fiesta explícita donde el español puede sonar más idiomático con esa forma.
- source_word: μετὰ τῶν φίλων μου
  english_pob_choice: with my friends
  chosen_spanish: con mis amigos
  alternatives_spanish:
  - junto con mis amigos
  lexicon: BDAG
  rationale: La preposición de compañía se expresa de forma directa y natural en español.
theological_decisions:
- issue: Matiz de δουλεύω en la queja del hijo mayor
  english_pob_reading: have been serving you
  chosen_spanish_reading: te he servido
  alternative_spanish_readings:
  - te he estado sirviendo
  - te he esclavizado
  rationale: La versión inglesa revisada optó por «serving» para evitar sobredimensionar la metáfora de esclavitud. En español, «te he servido» sigue esa lectura y evita introducir una dureza doctrinal o retórica mayor que la acordada en el texto base final.
  doctrine_reference: 'DOCTRINE.md: Contested terms table on δοῦλος; Translation philosophy items 1 and 5'
- issue: Tono de la afirmación del hijo mayor
  english_pob_reading: I never disobeyed your command
  chosen_spanish_reading: nunca he desobedecido tu mandato
  alternative_spanish_readings:
  - nunca he transgredido tu mandato
  - nunca he pasado por alto tu mandato
  rationale: «Mandato» mantiene el peso de la obediencia exigida por el relato y conserva la acusación implícita del hijo mayor contra su padre, sin suavizarla con un término demasiado cotidiano.
  doctrine_reference: Narrative register and obedience language in Luke 15
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail inglés, que cambió «slaving for you» por «serving you». La redacción española sigue esa decisión revisada y evita una traducción más fuerte de δουλεύω que reintroduzca el matiz descartado en inglés.
  spanish_consistency_notes:
  - Se mantuvo el registro formal pero claro, con vocabulario bíblico inteligible en español actual.
  - Se usó «cabrito» para ἔριφος por claridad y naturalidad en español.
  - Se evitó «Cristo», «SEÑOR» u այլ terminología no presente en el versículo.
  - La nota al pie está anclada correctamente en «padre[a]» y resume la alternativa lexical relevante.
