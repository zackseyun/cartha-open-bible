base_translation:
  language: en
  yaml_path: translation/nt/luke/015/029.yaml
  text: But he answered his father[a], ‘Look, for so many years I have been serving you, and I never disobeyed your command; yet you never gave me even a young goat so that I might celebrate with my friends.’
  footnotes:
  - marker: a
    text: Or “I have been serving you.” The Greek verb δουλεύω can mean “serve” or, in a stronger sense, “be enslaved / slave.” Here “slaving” reflects the elder son’s bitter tone.
    reason: lexical_alternative
