lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: he told
  chosen_spanish: les contó
  alternatives_spanish:
  - les dijo
  - les habló
  lexicon: BDAG
  rationale: El aoristo de λέγω introduce el discurso de Jesús. En español, «contó» funciona de manera natural con «parábola» y conserva el acto de comunicar la narración que sigue, sin perder el valor de introducción del dicho.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: δέ es una partícula leve de transición. «Entonces» mantiene el enlace narrativo en español sin exagerar contraste ni añadir fuerza causal que el griego no exige.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos les
  lexicon: BDAG
  rationale: La construcción πρός + acusativo marca a los destinatarios. En español, el dativo clítico «les» expresa de forma natural el destinatario del discurso.
- source_word: τὴν παραβολὴν ταύτην
  english_pob_choice: this parable
  chosen_spanish: esta parábola
  alternatives_spanish:
  - esta ilustración
  - esta figura
  lexicon: BDAG
  rationale: 'παραβολή en los Evangelios sinópticos se traduce normalmente como «parábola». El demostrativo se coloca antes del sustantivo de manera natural en español: «esta parábola».'
- source_word: λέγων
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y diciendo:'
  - 'con estas palabras:'
  lexicon: BDAG
  rationale: El participio presenta el contenido de la parábola. «Diciendo:» conserva la estructura griega de introducción al discurso y funciona bien antes de la cita que sigue.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide sustancialmente con la solución inglesa auditada. Se preserva la transición suave de δέ y la fórmula introductoria de la parábola sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se mantiene «parábola» como término técnico narrativo de los evangelios.
  - Se usa un estilo bíblico moderno y claro, evitando arcaísmos innecesarios.
  - El marcador de nota [a] aparece en el punto exacto del término con alternativa formal documentada.
