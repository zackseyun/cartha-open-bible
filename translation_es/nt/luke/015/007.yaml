translation:
  language: es
  text: Les digo que, de la misma manera[a], habrá alegría en el cielo por un pecador que se arrepiente[b] más que por noventa y nueve justos[c] que no tienen necesidad de arrepentimiento[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De la misma manera» puede leerse también como «así» o «de este modo». La expresión enlaza la alegría celestial con el punto de la parábola anterior.
    reason: lexical_alternative
  - marker: b
    text: El participio griego presenta al pecador como uno que se arrepiente; la traducción adopta la forma natural en español sin perder el sentido de acción en curso.
    reason: lexical_alternative
  - marker: c
    text: «Justos» conserva el término del texto. Según el contexto, puede entenderse de manera directa o con ironía, sin que la traducción decida el caso.
    reason: alternative_reading
  - marker: d
    text: La expresión griega es literalmente «no tienen necesidad de arrepentimiento».
    reason: source_note
lexical_decisions:
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: Les digo
  alternatives_spanish:
  - Les aseguro
  - Les digo a ustedes
  lexicon: BDAG
  rationale: La fórmula introductoria es directa y solemne; en español, «Les digo» conserva el acto de habla y la segunda persona plural implícita sin volverlo artificial.
- source_word: οὕτως
  english_pob_choice: in the same way
  chosen_spanish: de la misma manera
  alternatives_spanish:
  - así
  - de esta manera
  lexicon: BDAG
  rationale: La frase conecta con la enseñanza de la parábola anterior. «De la misma manera» expresa con claridad el valor comparativo y la relación argumental.
- source_word: χαρὰ ἐν τῷ οὐρανῷ ἔσται
  english_pob_choice: there will be joy in heaven
  chosen_spanish: habrá alegría en el cielo
  alternatives_spanish:
  - habrá gozo en el cielo
  - habrá alegría en los cielos
  lexicon: BDAG
  rationale: «Alegría» es natural y fiel; «en el cielo» sigue el sentido locativo del griego sin introducir agentes que el texto no nombra.
- source_word: ἐπὶ ἑνὶ ἁμαρτωλῷ
  english_pob_choice: over one sinner
  chosen_spanish: por un pecador
  alternatives_spanish:
  - sobre un pecador
  - a causa de un pecador
  lexicon: BDAG
  rationale: Con χαρά, ἐπί expresa aquí ocasión o motivo de la alegría. En español, «por» comunica bien ese motivo y evita una literalidad torpe.
- source_word: μετανοοῦντι
  english_pob_choice: who repents
  chosen_spanish: que se arrepiente
  alternatives_spanish:
  - arrepentido
  - que está arrepintiéndose
  lexicon: BDAG
  rationale: El participio presente se vierte naturalmente como relativa. «Se arrepiente» preserva la acción en curso sin forzar un matiz técnico de «cambio de mente» que sería menos idiomático.
- source_word: ἢ
  english_pob_choice: than
  chosen_spanish: más que
  alternatives_spanish:
  - que
  - antes que
  lexicon: BDAG
  rationale: En la comparación implícita de mayor alegría, «más que» es la forma más natural en español.
- source_word: ἐνενήκοντα ἐννέα δικαίοις
  english_pob_choice: ninety-nine righteous people
  chosen_spanish: noventa y nueve justos
  alternatives_spanish:
  - noventa y nueve personas justas
  - noventa y nueve rectos
  lexicon: BDAG
  rationale: «Justos» conserva el valor sustantivado de δίκαιοι y mantiene la tensión interpretativa del texto, sin decidir si se trata de justos verdaderos o de justos irónicos/self-righteous.
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - los cuales
  - quienes
  lexicon: BDAG
  rationale: El relativo descriptivo se traduce de forma simple y fluida; «que» evita sobrecargar el español.
- source_word: οὐ χρείαν ἔχουσιν μετανοίας
  english_pob_choice: who have no need of repentance
  chosen_spanish: que no tienen necesidad de arrepentimiento
  alternatives_spanish:
  - que no necesitan arrepentirse
  - que no requieren arrepentimiento
  lexicon: BDAG
  rationale: La construcción nominal χρείαν ἔχειν + genitivo se vuelve idiomática en español con «tener necesidad de». «Arrepentimiento» refleja con precisión el sustantivo μετανοίας.
theological_decisions:
- issue: Si δικαίοις debe interpretarse como personas realmente justas o con ironía contextual
  english_pob_reading: Retain the wording as 'righteous people' without making the irony explicit in translation.
  chosen_spanish_reading: Mantener «justos» sin resolver la posible ironía.
  alternative_spanish_readings:
  - los que se creen justos
  - justos entre comillas
  - personas supuestamente justas
  rationale: El griego dice simplemente «justos»; el contexto puede sugerir ironía o autocomplacencia, pero la traducción no debe decidirlo por el lector. «Justos» conserva la tensión textual.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica/interpretativa sin resolverla.'
- issue: Cómo traducir ἐν τῷ οὐρανῷ sin añadir sujetos implícitos como ángeles
  english_pob_reading: Translate locatively as 'in heaven' rather than specifying God or angels as the rejoicing subjects.
  chosen_spanish_reading: Traducir locativamente como «en el cielo».
  alternative_spanish_readings:
  - ante los ángeles de Dios
  - entre los ángeles en el cielo
  - en presencia del cielo
  rationale: El texto habla del lugar de la alegría, no del sujeto que se alegra. «En el cielo» respeta esa ambigüedad y evita ir más allá del griego, especialmente frente al v.10.
  doctrine_reference: Original-language primacy; preserve ambiguity where the Greek does not specify agents.
- issue: Cómo reflejar μετανοοῦντι y μετανοίας sin perder el matiz de arrepentimiento
  english_pob_reading: repents / repentance
  chosen_spanish_reading: se arrepiente / arrepentimiento
  alternative_spanish_readings:
  - cambia de mente / cambio de mente
  - se vuelve / vuelta
  rationale: En español bíblico actual, «arrepentirse/arrepentimiento» comunica con fidelidad la dimensión volitiva y relacional del texto; «cambio de mente» sería más técnico y menos natural aquí.
  doctrine_reference: 'Lexical/theological default for μετάνοια: sin-turning contexts -> arrepentimiento/arrepentirse.'
translation_notes:
  revision_awareness: 'El texto siguió la revisión más reciente del audit trail: se prefirió una formulación natural y precisa para μετανοοῦντι («se arrepiente») y para χρείαν ἔχουσιν μετανοίας («no tienen necesidad de arrepentimiento»), evitando la ambigüedad de un giro más literal. También se mantuvo la comparación con «más que», que en español expresa mejor la relación implícita de mayor alegría que la mera conjunción alternativa.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el contexto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «justos» y no «rectos» para conservar el valor sustantivado y la tensión interpretativa del griego.
  - Se eligió «en el cielo» como equivalente estable de ἐν τῷ οὐρανῷ, sin especificar agentes.
  - Se prefirió «arrepentimiento/arrepentirse» para μετανοία y μετανοέω según el criterio terminológico del proyecto.
  - La puntuación y el registro buscan ser bíblicos y actuales, evitando calcos innecesarios.
