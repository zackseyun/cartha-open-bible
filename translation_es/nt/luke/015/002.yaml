translation:
  language: es
  text: 'Y tanto los fariseos como los escribas estaban murmurando,[a] diciendo: «Este hombre recibe a los pecadores y come con ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acoge a los pecadores y come con ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ διεγόγγυζον
  english_pob_choice: were grumbling
  chosen_spanish: estaban murmurando
  alternatives_spanish:
  - se quejaban
  - estaban refunfuñando
  lexicon: BDAG
  rationale: El imperfecto expresa acción շարունակada/repetida; «estaban murmurando» conserva ese aspecto y el matiz negativo de queja soterrada mejor que un perfecto simple. «Refunfuñando» suena más coloquial; «quejaban» pierde parte del tono de murmullo.
- source_word: οἵ τε Φαρισαῖοι καὶ οἱ γραμματεῖς
  english_pob_choice: both the Pharisees and the scribes
  chosen_spanish: ambos, los fariseos y los escribas
  alternatives_spanish:
  - los fariseos y los escribas
  - tanto los fariseos como los escribas
  lexicon: BDAG
  rationale: La correlación τε ... καί se expresa de forma natural con «ambos ... y ...». «Escribas» es el equivalente estándar de γραμματεῖς en este contexto evangélico.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio contemporáneo se traduce de forma directa como «diciendo», manteniendo la relación inmediata con la murmuración sin recargar la sintaxis.
- source_word: Οὗτος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Este
  - Él
  lexicon: BDAG
  rationale: El demostrativo tiene un matiz algo distante o despectivo; «Este hombre» lo conserva mejor que «Él». En español, «este» solo sonaría demasiado elíptico.
- source_word: ἁμαρτωλοὺς
  english_pob_choice: sinners
  chosen_spanish: a los pecadores
  alternatives_spanish:
  - a los pecadores y a la gente pecadora
  - a los pecadores
  lexicon: BDAG
  rationale: El adjetivo sustantivado se traduce idiomáticamente como «pecadores». Se explicita el objeto directo con «a», requerido por el español para personas concretas.
- source_word: προσδέχεται
  english_pob_choice: welcomes
  chosen_spanish: recibe
  alternatives_spanish:
  - acoge
  - recibe favorablemente
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por «welcomes» por idiomaticidad, en español «recibe» preserva mejor la posibilidad lexical de προσδέχομαι documentada en la nota inglesa («receives»), sin añadir una calidez no explicitada por el reproche.
- source_word: συνεσθίει αὐτοῖς
  english_pob_choice: eats with them
  chosen_spanish: come con ellos
  alternatives_spanish:
  - come junto con ellos
  - comparte la mesa con ellos
  lexicon: BDAG
  rationale: La construcción indica convivencia a la mesa. «Come con ellos» es claro y fiel; «comparte la mesa» explicita la implicación social pero se aleja más del verbo griego.
theological_decisions:
- issue: La fuerza polémica de la acusación sobre la mesa compartida con pecadores
  english_pob_reading: Render the accusation in straightforward terms without softening the scandal of table fellowship.
  chosen_spanish_reading: 'Conservar la acusación directa: Jesús recibe a los pecadores y come con ellos, sin suavizar el escándalo de comer a la mesa con ellos.'
  alternative_spanish_readings:
  - Este hombre acoge a los pecadores y come con ellos
  - Este hombre acepta a los pecadores y come con ellos
  rationale: La frase debe sonar como una queja real de los fariseos y escribas. «Recibe» mantiene la lectura lexical abierta de προσδέχεται y deja intacta la carga social de la comida compartida.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no hubo cambios sustanciales en el contenido inglés auditado. La versión española sigue esa misma lectura, con la única decisión de preferir «recibe» para preservar la alternativa lexical documentada por el POB inglés.'
  spanish_consistency_notes:
  - Se mantiene «fariseos» y «escribas» como términos evangélicos estándar.
  - Se evita «Cristo/SEÑOR» porque no aparecen en el versículo.
  - 'La nota a pie de página preserva la alternativa lexical documentada en el inglés: «recibe» frente a «welcomes».'
  - Se usa puntuación española con comillas angulares para el discurso directo.
