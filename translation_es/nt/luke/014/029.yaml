translation:
  language: es
  text: de lo contrario[a], después de haber puesto un fundamento y no poder terminar, todos los que lo vean empiecen a burlarse de él,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no sea que, después de haber puesto un fundamento y no poder terminar, todos los que lo vean empiecen a ridiculizarlo».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα μήποτε
  english_pob_choice: otherwise
  chosen_spanish: de otro modo
  alternatives_spanish:
  - si no
  - de lo contrario
  - no sea que
  lexicon: BDAG
  rationale: En este contexto de advertencia parabólica, la construcción introduce el resultado indeseable que se quiere evitar. «De otro modo» conserva la fuerza cautelar de la POB inglesa con un español natural; «no sea que» sería más literal pero menos fluido aquí.
- source_word: θέντος αὐτοῦ
  english_pob_choice: after he has laid
  chosen_spanish: después de haber puesto
  alternatives_spanish:
  - cuando haya puesto
  - habiendo puesto
  lexicon: BDAG
  rationale: El genitivo absoluto expresa una acción previa a la principal. «Después de haber puesto» comunica con claridad la secuencia temporal y evita un calco duro.
- source_word: θεμέλιον
  english_pob_choice: a foundation
  chosen_spanish: el fundamento
  alternatives_spanish:
  - un fundamento
  - la base
  lexicon: BDAG
  rationale: Aunque el inglés POB usa un indefinido, en español «poner el fundamento» suena más idiomático y mantiene la imagen de iniciar una obra. «Base» es posible, pero «fundamento» conserva mejor el léxico de construcción.
- source_word: μὴ ἰσχύοντος
  english_pob_choice: is not able
  chosen_spanish: no poder
  alternatives_spanish:
  - no ser capaz
  - no tener fuerzas
  lexicon: BDAG
  rationale: ἰσχύω aquí denota capacidad, no solo fuerza física. «No poder» transmite esa incapacidad de manera natural y breve.
- source_word: ἐκτελέσαι
  english_pob_choice: to finish
  chosen_spanish: terminar
  alternatives_spanish:
  - completar
  - llevar a cabo hasta el fin
  lexicon: BDAG
  rationale: En un contexto de construcción, «terminar» comunica bien la idea de llevar la obra a su conclusión. «Completar» es viable, pero algo menos natural en esta frase.
- source_word: πάντες οἱ θεωροῦντες
  english_pob_choice: all who see it
  chosen_spanish: todos los que lo vean
  alternatives_spanish:
  - todos los que lo observen
  - todos los que estén mirando
  lexicon: BDAG
  rationale: θεωρέω implica ver/observar. El futuro subjuntivo español «lo vean» encaja con el valor potencial del griego y hace natural la referencia al objeto visible implícito por el contexto.
- source_word: ἄρξωνται
  english_pob_choice: may begin
  chosen_spanish: empezarán
  alternatives_spanish:
  - pueden empezar
  - podrán empezar
  lexicon: BDAG
  rationale: 'Aunque el griego expresa potencialidad, en español la construcción de advertencia suena más natural como resultado esperado: «empezarán». Esto mantiene el efecto de la escena sin forzar un giro demasiado analítico.'
- source_word: αὐτῷ ἐμπαίζειν
  english_pob_choice: to mock him
  chosen_spanish: a burlarse de él
  alternatives_spanish:
  - a ridiculizarlo
  - a hacerle burla
  lexicon: BDAG
  rationale: ἐμπαίζω lleva la idea de burlarse o ridiculizar. «Burlarse de él» es digno, claro y de uso amplio en español; «ridiculizarlo» intensifica el tono pero puede sonar más fuerte de lo necesario.
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con el texto griego y con la auditoría inglesa; la única tensión principal es cómo verter ἵνα μήποτε: mantengo una solución natural en español («de otro modo») y conservo en nota una alternativa más literal para reflejar la advertencia implícita. También he preferido un español idiomático para el futuro/potencial de ἄρξωνται sin perder el sentido de consecuencia.'
  spanish_consistency_notes:
  - Se mantiene «fundamento» para el léxico de construcción.
  - Se evita «SEÑOR» u otros reemplazos innecesarios; no hay vocabulario teológico sensible en este versículo.
  - «Burlarse de él» corresponde al valor de ἐμπαίζω sin añadir matices no presentes en el griego.
