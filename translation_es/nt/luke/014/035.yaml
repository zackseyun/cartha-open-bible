translation:
  language: es
  text: No es apto ni para la tierra ni para el montón de estiércol[a]; lo echan fuera. El que tiene oídos para oír[b], que oiga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el estercolero» / «el montón de abono».
    reason: lexical_alternative
  - marker: b
    text: O «Quien tenga oídos para oír, oiga».
    reason: lexical_alternative
lexical_decisions:
- source_word: γῆν
  english_pob_choice: the soil
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - la tierra de cultivo
  lexicon: BDAG
  rationale: En este dicho agrícola, γῆν se refiere a la tierra/suelo en contraste con el montón de estiércol. En español, «la tierra» es natural y comunica bien la imagen campesina sin forzar un tecnicismo. «El suelo» es una alternativa posible, pero aquí «tierra» suena más idiomático y mantiene la oposición paralela con «estiércol».
- source_word: κοπρίαν
  english_pob_choice: the manure pile
  chosen_spanish: el montón de estiércol
  alternatives_spanish:
  - el montón de abono
  - el estercolero
  - el montón de estiércol
  lexicon: BDAG
  rationale: κοπρίαν denota estiércol/desecho orgánico usado en contexto agrícola. «El montón de estiércol» preserva la concreción y el tono rudo de la imagen. «Abono» suavizaría demasiado el término y perdería fuerza. La expresión refleja con claridad la función y la crudeza del original.
- source_word: εὔθετόν
  english_pob_choice: fit
  chosen_spanish: es apto
  alternatives_spanish:
  - es útil
  - es adecuado
  - sirve
  lexicon: BDAG
  rationale: εὔθετον significa apto, adecuado, idóneo para un uso. «Es apto» mantiene la valoración funcional del griego sin expandirla a una interpretación más libre como «útil». Además, encaja bien con la estructura negativa del versículo.
- source_word: ἔξω βάλλουσιν αὐτό
  english_pob_choice: they throw it outside
  chosen_spanish: lo echan fuera
  alternatives_spanish:
  - lo arrojan fuera
  - lo sacan afuera
  - lo tiran fuera
  lexicon: BDAG
  rationale: El griego usa un verbo activo con sujeto indefinido. «Lo echan fuera» conserva esa fuerza verbal directa y es una fórmula natural en español. «Arrojan» sería más formal; «sacan afuera» pierde algo de contundencia. Se mantiene el objeto en singular neutro como «lo».
- source_word: ὁ ἔχων ὦτα ἀκούειν ἀκουέτω
  english_pob_choice: The one who has ears to hear, let him hear
  chosen_spanish: El que tiene oídos para oír, que oiga
  alternatives_spanish:
  - Quien tenga oídos para oír, oiga
  - El que tenga oídos para oír, que oiga
  lexicon: BDAG
  rationale: La fórmula proverbial se vierte de forma cercana al griego, conservando el participio articular como «El que tiene». «Oídos para oír» reproduce el giro idiomático de ἀκούειν sin explicar ni suavizar el mandato. Se usa «que oiga» para reflejar el imperativo exhortativo de ἀκουέτω con estilo natural en español.
theological_decisions:
- issue: Fórmula exhortativa final y su fuerza representativa
  english_pob_reading: The one who has ears to hear, let him hear
  chosen_spanish_reading: El que tiene oídos para oír, que oiga
  alternative_spanish_readings:
  - Quien tenga oídos para oír, oiga
  - El que tenga oídos para oír, que oiga
  rationale: El griego está en masculino singular con valor genérico. Se conserva la forma masculina representativa «El que», siguiendo la política de precisión gramatical del proyecto. La exhortación no se neutraliza, pero su alcance es inclusivo por el contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El expediente inglés indica alta concordancia, sin revisiones aplicadas y sin cambios necesarios en el último pase. La presente propuesta sigue de cerca el sentido del griego y conserva las dos ambigüedades principales ya documentadas: γῆν como tierra/suelo agrícola y la fórmula proverbial final con su valor representativo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otra convención de ocultamiento porque el versículo no contiene el nombre divino.
  - Se mantiene un registro sobrio y directo, acorde con la metáfora agrícola y con el cierre proverbial.
  - La puntuación reproduce la pausa fuerte del primer miembro y el remate exhortativo del segundo.
