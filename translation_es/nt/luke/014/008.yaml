translation:
  language: es
  text: Cuando seas invitado[a] por alguien a una fiesta de bodas, no te reclines[c] en el lugar de honor[b], no sea que por él haya sido invitado alguien más honrado que tú.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «a una boda». El plural griego puede referirse a las festividades de boda, especialmente al banquete.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el lugar más honrado en la mesa.
    reason: cultural_note
  - marker: c
    text: En los banquetes formales antiguos era común reclinarse en vez de sentarse erguido.
    reason: cultural_note
lexical_decisions:
- source_word: Ὅταν
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Siempre que
  - Cada vez que
  lexicon: BDAG
  rationale: Introduce una situación general y exhortativa de manera natural en español, conservando el valor condicional general del griego.
- source_word: κληθῇς
  english_pob_choice: you are invited
  chosen_spanish: seas invitado
  alternatives_spanish:
  - te llamen
  - te citen
  - seas convocado
  lexicon: BDAG
  rationale: En contexto de banquete, καλέω significa invitar; 'seas invitado' preserva el sentido social sin perder naturalidad.
- source_word: ὑπό τινος
  english_pob_choice: by someone
  chosen_spanish: por alguien
  alternatives_spanish:
  - por una persona
  - por cierto hombre
  lexicon: BDAG
  rationale: τινος es indefinido; 'por alguien' mantiene esa indefinición de forma idiomática.
- source_word: εἰς γάμους
  english_pob_choice: to a wedding feast
  chosen_spanish: a una fiesta de bodas
  alternatives_spanish:
  - a una boda
  - a las bodas
  - a un banquete de bodas
  lexicon: BDAG
  rationale: El plural γάμοι puede referirse a las festividades nupciales y al banquete; 'fiesta de bodas' comunica mejor ese marco que solo 'boda'.
- source_word: μὴ κατακλιθῇς
  english_pob_choice: do not recline
  chosen_spanish: no te recuestes
  alternatives_spanish:
  - no te sientes
  - no tomes tu lugar
  - no te acomodes a la mesa
  lexicon: BDAG
  rationale: En español 'reclinarse' suena más técnico; 'recuéstese' comunica la postura de mesa antigua sin perder inteligibilidad.
- source_word: εἰς τὴν πρωτοκλισίαν
  english_pob_choice: in the place of honor
  chosen_spanish: en el lugar de honor
  alternatives_spanish:
  - en el puesto de honor
  - en el asiento de honor
  - en el primer lugar
  lexicon: BDAG
  rationale: πρωτοκλισία designa el lugar más distinguido en la mesa; 'lugar de honor' expresa esa función social de manera clara y natural.
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - porque quizá
  - a fin de que no
  lexicon: BDAG
  rationale: '''No sea que'' conserva la advertencia preventiva del griego y suena natural en español bíblico contemporáneo.'
- source_word: ἐντιμότερός σου
  english_pob_choice: more honored than you
  chosen_spanish: más honrado que tú
  alternatives_spanish:
  - más distinguido que tú
  - más estimado que tú
  lexicon: BDAG
  rationale: El comparativo de ἔντιμος apunta a mayor honor o prestigio; 'más honrado' conserva bien ese campo semántico en español.
- source_word: ᾖ κεκλημένος
  english_pob_choice: may have been invited
  chosen_spanish: haya sido invitado
  alternatives_spanish:
  - pueda haber sido invitado
  - sea invitado
  lexicon: BDAG
  rationale: 'La idea de perfecto perifrástico en una cláusula de prevención se expresa en español de modo natural con subjuntivo perfecto: ''haya sido invitado''.'
- source_word: ὑπ’ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - por ese anfitrión
  - por quien te invitó
  lexicon: BDAG
  rationale: El referente es el que invitó; 'por él' es formalmente cercano y evita introducir una interpretación explicativa innecesaria.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del inglés POB, que ajusta la última cláusula para reflejar mejor el matiz de subjuntivo preventivo tras μήποτε. La redacción española usa 'haya sido invitado' para mantener ese valor prospectivo/precautorio.
  spanish_consistency_notes:
  - Se mantuvo 'lugar de honor' como equivalente funcional de πρωτοκλισία, coherente con el audit trail en inglés.
  - Se conservó el marco cultural de banquete mediante 'fiesta de bodas' y la nota sobre recostarse, en línea con las notas del POB en inglés.
  - Se evitó 'SEÑOR' o terminología eclesiástica no presente; el versículo no requiere equivalentes teológicos específicos.
  - Se prefirió 'más honrado' sobre alternativas más estilizadas para conservar el registro de honor-shame del texto fuente.
