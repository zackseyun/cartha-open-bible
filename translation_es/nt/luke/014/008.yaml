  text: Ὅταν κληθῇς ὑπό τινος εἰς γάμους, μὴ κατακλιθῇς εἰς τὴν πρωτοκλισίαν, μήποτε ἐντιμότερός σου ᾖ κεκλημένος ὑπ’ αὐτοῦ
base_translation:
  language: en
  yaml_path: translation/nt/luke/014/008.yaml
  text: When you are invited by someone to a wedding feast[a], do not recline in the place of honor[c][b], lest someone more honored than you may have been invited by him.
  footnotes:
  - marker: a
    text: Or, 'to a wedding.' The Greek plural can refer to the wedding festivities, especially the banquet.
    reason: lexical_alternative
  - marker: b
    text: That is, the most honored place at the table.
    reason: cultural_note
  - marker: c
    text: Ancient formal meals commonly involved reclining rather than sitting upright.
    reason: cultural_note
