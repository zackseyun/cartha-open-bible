translation:
  language: es
  text: ¿O qué rey[a], al ir a encontrarse con otro rey en guerra, no se sentará primero y considerará si puede, con diez mil, hacer frente al que viene contra él con veinte mil?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'encontrarse' (para 'hacer frente'); el verbo griego puede traducirse más literalmente así, pero aquí se refiere a hacer frente a un ejército que avanza en batalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿O bien
  lexicon: BDAG
  rationale: Mantiene la transición retórica de la comparación anterior con una conjunción simple y natural en español.
- source_word: τίς βασιλεὺς
  english_pob_choice: what king
  chosen_spanish: qué rey
  alternatives_spanish:
  - qué clase de rey
  - cuál rey
  lexicon: BDAG
  rationale: La pregunta retórica en español suena más natural con 'qué rey' y conserva el valor genérico de τίς.
- source_word: πορευόμενος
  english_pob_choice: going
  chosen_spanish: que va
  alternatives_spanish:
  - yendo
  - que se dirige
  lexicon: BDAG
  rationale: '''Que va'' expresa movimiento con propósito en un español fluido sin añadir contenido extra.'
- source_word: ἑτέρῳ βασιλεῖ
  english_pob_choice: another king
  chosen_spanish: otro rey
  alternatives_spanish:
  - un rey distinto
  - el otro rey
  lexicon: BDAG
  rationale: '''Otro rey'' transmite adecuadamente ἕτερος como un segundo soberano opositor en la comparación.'
- source_word: συμβαλεῖν εἰς πόλεμον
  english_pob_choice: to meet another king in war
  chosen_spanish: va a guerrear contra otro rey
  alternatives_spanish:
  - va a entrar en guerra contra otro rey
  - va a enfrentarse en guerra con otro rey
  lexicon: BDAG
  rationale: El giro griego apunta a entrar en conflicto bélico; en español 'guerrear contra' comunica el choque militar de modo natural sin perder la fuerza del contexto.
- source_word: οὐχὶ
  english_pob_choice: will not
  chosen_spanish: 'no'
  alternatives_spanish:
  - acaso no
  - no será que
  lexicon: BDAG
  rationale: En una pregunta retórica, 'no' conserva la expectativa de respuesta afirmativa sin forzar un futuro auxiliar innecesario en español.
- source_word: καθίσας πρῶτον
  english_pob_choice: first sit down
  chosen_spanish: se sentará primero
  alternatives_spanish:
  - primero se sentará
  - se sentará antes
  lexicon: BDAG
  rationale: '''Se sentará primero'' refleja el orden previo de deliberación y suena idiomático en español.'
- source_word: βουλεύσεται
  english_pob_choice: consider
  chosen_spanish: considerará
  alternatives_spanish:
  - deliberará
  - tomará consejo
  lexicon: BDAG
  rationale: '''Considerará'' recoge el sentido de reflexionar/calcultar antes de actuar, acorde con el contexto de evaluar el costo.'
- source_word: εἰ δυνατός ἐστιν
  english_pob_choice: whether he is able
  chosen_spanish: si puede
  alternatives_spanish:
  - si es capaz
  - si tiene la capacidad
  lexicon: BDAG
  rationale: '''Si puede'' expresa capacidad de forma breve y natural; el contexto militar hace innecesaria una formulación más pesada.'
- source_word: ἐν δέκα χιλιάσιν
  english_pob_choice: with ten thousand
  chosen_spanish: con diez mil
  alternatives_spanish:
  - con diez mil hombres
  - al frente de diez mil
  lexicon: BDAG
  rationale: '''Con diez mil'' mantiene el valor instrumental/asociativo de ἐν y es la forma más natural en español.'
- source_word: ὑπαντῆσαι
  english_pob_choice: to oppose
  chosen_spanish: hacer frente
  alternatives_spanish:
  - enfrentarse
  - oponerse
  lexicon: BDAG
  rationale: En el contexto bélico, 'hacer frente' comunica oposición directa sin sonar excesivamente interpretativo.
- source_word: τῷ μετὰ εἴκοσι χιλιάδων ἐρχομένῳ ἐπ’ αὐτόν
  english_pob_choice: the one coming against him with twenty thousand
  chosen_spanish: al que viene contra él con veinte mil
  alternatives_spanish:
  - al que avanza contra él con veinte mil
  - al que se acerca contra él con veinte mil
  lexicon: BDAG
  rationale: '''Viene contra él'' refleja claramente el avance hostil del participio y conserva la imaginería de aproximación enemiga.'
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail en inglés y no requiere cambios sustantivos; la única decisión sensible es cómo trasladar ὑπαντῆσαι en contexto militar. Se mantiene la equivalencia óptima, con una nota que conserva la alternativa literal de ‘encontrarse’/‘hacer frente’ sin perder el sentido bélico.
  spanish_consistency_notes:
  - Se conservó ‘rey’ para βασιλεύς y ‘otro rey’ para ἑτέρῳ βασιλεῖ, en línea con el contraste de dos soberanos.
  - Se evitó ‘SEÑOR’ u otras sustituciones teológicas no pertinentes; el versículo no contiene vocabulario divino.
  - ‘Con diez mil’ y ‘con veinte mil’ reproducen el valor numérico militar del griego sin añadir ‘hombres’ que el texto no expresa.
  - La pregunta retórica se dejó en forma natural española, manteniendo la expectativa de una respuesta afirmativa implícita.
