  glossary_alignment: 'No hay términos del glosario principal especialmente sensibles en este versículo. ''Rey'', ''considerará'', ''puede'' y ''hacer frente'' son adecuados. La principal cuestión léxica es mantener la distinción entre συμβαλεῖν εἰς πόλεμον y ὑπαντῆσαι: conviene no cargar demasiado el primer verbo con ''guerrear contra'' y reservar el matiz de oposición directa para el segundo.'
