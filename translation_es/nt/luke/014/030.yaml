translation:
  language: es
  text: 'diciendo[a]: «Este hombre comenzó a construir y no pudo terminar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no pudo completar [la obra]».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - mientras decían
  - diciendo que
  lexicon: BDAG
  rationale: El participio presente se conserva naturalmente como gerundio español, manteniendo la conexión discursiva con el contexto anterior sin añadir contenido que el griego no expresa.
- source_word: ὅτι
  english_pob_choice: ‘
  chosen_spanish: «
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: El griego introduce el contenido del dicho; en español es más idiomático marcar el discurso directo con comillas en vez de repetir 'que'.
- source_word: Οὗτος ὁ ἄνθρωπος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Esta persona
  - Este sujeto
  lexicon: BDAG
  rationale: Se conserva el demostrativo y el sustantivo masculino singular de manera directa. 'Hombre' refleja mejor el griego que 'persona' y mantiene el tono algo señalador del contexto.
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: BDAG
  rationale: El aoristo con infinitivo se rinde de forma natural con 'comenzó a'. 'Comenzó' conserva el sentido inicial de la acción sin sobrecargar el tono.
- source_word: οἰκοδομεῖν
  english_pob_choice: to build
  chosen_spanish: a construir
  alternatives_spanish:
  - a edificar
  - a levantar
  lexicon: BDAG
  rationale: En este contexto de edificación material, 'construir' es el equivalente más natural y claro en español. 'Edificar' es posible, pero suena más literario y puede sugerir matices metafóricos no presentes aquí.
- source_word: οὐκ ἴσχυσεν
  english_pob_choice: was not able
  chosen_spanish: no pudo
  alternatives_spanish:
  - no fue capaz de
  - no tuvo fuerzas para
  lexicon: BDAG
  rationale: ἰσχύω aquí expresa capacidad. En español, 'no pudo' comunica con naturalidad esa falta de capacidad; 'no tuvo fuerzas para' sería más físico de lo que el contexto exige.
- source_word: ἐκτελέσαι
  english_pob_choice: to finish
  chosen_spanish: terminar
  alternatives_spanish:
  - completar
  - llevar a cabo hasta el final
  lexicon: BDAG
  rationale: En el contexto de construir, el sentido es llevar la obra a su conclusión. 'Terminar' es la opción más fluida en español y conserva el valor de completar la tarea.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: participio presente en conexión con el verso anterior, ἰσχύω como capacidad y ἐκτελέω como terminar/completar una obra. No se añadieron matices ajenos al texto.'
  spanish_consistency_notes:
  - Se preservó un registro sobrio y publicable, evitando calcos innecesarios.
  - Se mantuvo la voz directa del dicho con comillas españolas.
  - La nota al pie conserva la alternativa léxica principal para ἐκτελέσαι, sin introducir una glosa doctrinal.
