    issue: La nota añade «[la obra]», elemento no expreso en el griego.
    rationale: Es una explicitación menor y solo en nota, útil para claridad en español. No requiere corrección obligatoria porque la alternativa principal sigue siendo fiel y la nota se mantiene dentro del sentido contextual de ἐκτελέσαι.
