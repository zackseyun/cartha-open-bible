translation:
  language: es
  text: 'Y el amo dijo al esclavo[a]: «Sal a los caminos y cercas, y obliga a la gente a entrar, para que mi casa se llene».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «insísteles mucho que entren». El verbo griego es fuerte («obligar, presionar»), pero en esta parábola no necesariamente implica fuerza física.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: master
  chosen_spanish: maestro
  alternatives_spanish:
  - señor
  - amo
  lexicon: BDAG
  rationale: En esta parábola, κύριος designa al dueño de la casa dentro de la escena. «Maestro» conserva una relación de autoridad personal sin convertirlo automáticamente en título divino; «amo» sería más duro y «señor» podría sonar más litúrgico o ambiguo en español.
- source_word: δοῦλον
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: POB opta por preservar la fuerza de δοῦλος como relación de sujeción. «Esclavo» reproduce mejor ese valor social que «siervo», que suaviza el término.
- source_word: Ἔξελθε
  english_pob_choice: Go out
  chosen_spanish: Sal
  alternatives_spanish:
  - Ve
  - Sal fuera
  lexicon: BDAG
  rationale: El imperativo aoristo de ἐξέρχομαι incluye la idea de salir hacia afuera. «Sal» es natural en español; el contexto ya aporta el movimiento hacia el exterior, por lo que no es necesario repetir «fuera».
- source_word: ὁδοὺς
  english_pob_choice: roads
  chosen_spanish: caminos
  alternatives_spanish:
  - rutas
  - carreteras
  lexicon: BDAG
  rationale: Aunque «roads» en inglés se tradujo como «roads» por naturalidad, en español «caminos» suena más amplio y adecuado al par «caminos y cercas», sin perder la imagen de lugares periféricos o transitados.
- source_word: φραγμοὺς
  english_pob_choice: hedges
  chosen_spanish: cercas
  alternatives_spanish:
  - setos
  - vallados
  lexicon: BDAG
  rationale: φραγμός puede referirse a cerca, vallado o seto. «Cercas» comunica bien en español la idea de límites o bordes del campo/propiedad y evita una expresión demasiado regional o botánica.
- source_word: ἀνάγκασον
  english_pob_choice: compel
  chosen_spanish: fuérzalos a entrar
  alternatives_spanish:
  - oblígalos a entrar
  - apremia a entrar
  lexicon: BDAG
  rationale: El verbo es fuerte y conviene conservar su intensidad. En español, «fuérzalos a entrar» mantiene esa presión verbal mejor que «invítalos» o «anímalos». La forma plural implícita de «los» sigue el sentido contextual del mandato de traer comensales.
- source_word: εἰσελθεῖν
  english_pob_choice: to come in
  chosen_spanish: entrar
  alternatives_spanish:
  - ingresar
  - pasar adentro
  lexicon: BDAG
  rationale: Después de un verbo de coerción/presión, el infinitivo natural en español es «entrar». Es más directo que «ingresar» y más fiel al movimiento de εισέρχομαι.
- source_word: ἵνα γεμισθῇ
  english_pob_choice: so that ... may be filled
  chosen_spanish: para que ... se llene
  alternatives_spanish:
  - a fin de que ... quede lleno
  - para que ... sea lleno
  lexicon: BDAG
  rationale: La construcción expresa propósito. «Para que ... se llene» es la forma más natural en español y conserva el resultado buscado sin introducir un sujeto innecesario.
- source_word: μου ὁ οἶκος
  english_pob_choice: my house
  chosen_spanish: mi casa
  alternatives_spanish:
  - mi casa de banquete
  - mi hogar
  lexicon: BDAG
  rationale: οἶκος puede significar casa o casa/hogar. En el marco de la parábola del banquete, «mi casa» es la opción más directa. «Mi casa» también mantiene el paralelo con la imagen de la casa llena.
theological_decisions:
- issue: Alcance de κύριος en una parábola
  english_pob_reading: master
  chosen_spanish_reading: maestro
  alternative_spanish_readings:
  - señor
  rationale: Se conserva la lectura del personaje como dueño de la casa dentro de la narración, no como una designación directa de Yahvé o de Jesús en esa frase. «Maestro» comunica autoridad sin cargar el verso con una lectura más teológica de la que exige el contexto inmediato.
  doctrine_reference: 'DOCTRINE.md: mantener la variación contextual de κύριος cuando la escena lo requiere'
- issue: Fuerza de ἀνάγκασον sin imponer violencia física
  english_pob_reading: compel them to come in
  chosen_spanish_reading: fuérzalos a entrar
  alternative_spanish_readings:
  - oblígalos a entrar
  - apremia a entrar
  rationale: La traducción debe conservar la fuerza del verbo. «Fuérzalos» refleja la intensidad léxica, pero en el contexto de la parábola no obliga a leer violencia física; la presión puede ser insistencia fuerte o coerción social. Así se preserva la tensión sin suavizarla ni resolverla.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones léxicas y teológicas en vez de domesticarlas'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete fuente; el último paso de revisión indicó que no eran necesarios cambios y hubo alto grado de acuerdo entre las verificaciones.
  spanish_consistency_notes:
  - Se mantiene «esclavo» para δοῦλος, conforme a la preferencia POB de conservar la fuerza social del término.
  - Se usa «casa» para οἶκος, porque en este contexto es la sede del banquete y suena natural en español.
  - Se evita «SEÑOR» como máscara automática para κύριος, dado que aquí la escena presenta al dueño de la casa.
  - La nota al pie conserva la alternativa de intensidad verbal sin diluir el mandato principal.
