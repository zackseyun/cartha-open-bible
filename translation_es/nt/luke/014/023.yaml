review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido básico del griego: κύριος como figura humana del relato, δοῦλος con fuerza social, Ἔξελθε como salida, y el propósito final de llenar la casa. Sin embargo, dos decisiones no preservan de la mejor manera la evidencia ni la línea del POB: «maestro» para κύριος en este contexto doméstico-parabólico suena menos exacto que «amo», y «fuérzalos» junto con la nota «forzar» inclina demasiado hacia coerción física frente al equilibrio documentado por el inglés, que mantiene la fuerza con una alternativa de insistencia fuerte.'
  spanish_quality_summary: El español es mayormente claro y natural, pero «maestro dijo al esclavo» puede leerse como docente/discípulo y no como dueño de casa. Además, «caminos y cercas» funciona, aunque «cercas» puede sonar algo rígido; aun así es aceptable. La mayor mejora es usar una formulación más idiomática y contextual para κύριος y una nota que refleje mejor la tensión de ἀνάγκασον sin empujar demasiado a violencia física.
  glossary_alignment: Correcto en «esclavo», «casa», y en no introducir «Señor» ni terminología litúrgica indebida. Se aparta del razonamiento auditado al usar «maestro» en vez de un equivalente español de 'master' más doméstico/social, y la nota de ἀνάγκασον debería acercarse más a «insísteles/aprémialos fuertemente» que a «forzar».
  issues:
  - severity: high
    issue: «maestro» para κύριος en esta parábola
    rationale: Aunque evita una lectura teológica excesiva, en español «maestro» suele evocar profesor o guía, no el dueño/amo de una casa con esclavo. El inglés auditado escogió 'master' por rol social doméstico; «amo» lo preserva mejor.
  - severity: medium
    issue: «fuérzalos a entrar» y la nota «forzar» cargan demasiado el matiz físico
    rationale: El POB inglés conserva 'compel' pero aclara que no necesariamente implica fuerza física. En español, «forzar/fuérzalos» suena más física que «compel»; conviene mantener un verbo fuerte en texto principal, pero ajustar la nota para ofrecer una alternativa de insistencia fuerte más natural, como «insísteles mucho que entren».
  - severity: low
    issue: La nota alternativa «aprémalos a entrar» es poco natural
    rationale: «Apremar» es comprensible pero menos idiomático para muchos lectores contemporáneos. Una alternativa como «insísteles mucho que entren» comunica mejor la fuerza contextual sin rebajar demasiado el verbo.
  revised_spanish_text: 'Y el amo dijo al esclavo[a]: «Sal a los caminos y cercas, y obliga a la gente a entrar, para que mi casa se llene».'
  revised_footnotes:
