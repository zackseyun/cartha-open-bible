revisions:
- from: 'Y el maestro dijo al esclavo[a]: «Sal a los caminos y cercas, y fuérzalos a entrar, para que mi casa se llene».'
  to: 'Y el amo dijo al esclavo[a]: «Sal a los caminos y cercas, y obliga a la gente a entrar, para que mi casa se llene».'
  rationale: Se cambia «maestro» por «amo» para reflejar con más precisión el papel social de κύριος dentro de la parábola y alinearse mejor con la justificación auditada de 'master'. Se mantiene un verbo fuerte para ἀνάγκασον en el texto principal, pero se ajusta la nota para que el español preserve mejor la tensión léxica sin sugerir de manera desmedida coerción física. Se conserva «esclavo», «caminos y cercas» y «para que mi casa se llene» como lecturas fieles y naturales.
