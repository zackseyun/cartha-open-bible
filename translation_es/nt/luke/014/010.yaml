translation:
  language: es
  text: 'Pero cuando seas invitado[a], ve y recuéstate en el lugar más bajo, para que cuando venga el que te invitó, te diga: «Amigo, sube más arriba[b].» Entonces habrá honor para ti delante de todos los que se recuestan contigo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siéntate en el asiento más bajo». El verbo griego se refiere específicamente a recostarse a la mesa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ven más arriba».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κληθῇς
  english_pob_choice: are invited
  chosen_spanish: seas invitado
  alternatives_spanish:
  - seas llamado
  - te inviten
  lexicon: BDAG
  rationale: En contexto de banquete, καλέω expresa invitación más que simple llamado. En español, "seas invitado" comunica con naturalidad la situación social y mantiene la fuerza pasiva del griego.
- source_word: πορευθεὶς
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - después de ir
  - yendo
  lexicon: BDAG
  rationale: 'El participio acompaña al imperativo principal y se expresa bien en español como acción coordinada: "ve y recuéstate".'
- source_word: ἀνάπεσε
  english_pob_choice: recline
  chosen_spanish: recuéstate
  alternatives_spanish:
  - siéntate
  - toma tu lugar
  lexicon: BDAG
  rationale: El verbo alude específicamente a recostarse a la mesa, no simplemente a sentarse. "Recuéstate" conserva esa imagen cultural sin volver la frase demasiado técnica.
- source_word: ἔσχατον τόπον
  english_pob_choice: the lowest place
  chosen_spanish: el lugar más bajo
  alternatives_spanish:
  - el último lugar
  - el asiento más bajo
  lexicon: BDAG
  rationale: ἔσχατος aquí señala la posición menos prominente. "Lugar más bajo" comunica claramente la idea de rango social, con una forma natural en español.
- source_word: ὁ κεκληκώς σε
  english_pob_choice: the one who invited you
  chosen_spanish: el que te invitó
  alternatives_spanish:
  - tu anfitrión
  - el que te llamó
  lexicon: BDAG
  rationale: La forma verbal identifica al invitador. "El que te invitó" es transparente y evita introducir la interpretación más específica de "anfitrión".
- source_word: Φίλε
  english_pob_choice: Friend
  chosen_spanish: Amigo
  alternatives_spanish:
  - Amigo mío
  - Compañero
  lexicon: BDAG
  rationale: El vocativo se vierte de manera directa y cortés. "Amigo" preserva el tono sin añadir un posesivo que el griego no expresa.
- source_word: προσανάβηθι ἀνώτερον
  english_pob_choice: move up higher
  chosen_spanish: sube más arriba
  alternatives_spanish:
  - ven más arriba
  - pasa a un lugar más alto
  lexicon: BDAG
  rationale: La expresión indica moverse a una posición de mayor honor. "Sube más arriba" mantiene la imagen ascendente y su valor social en español.
- source_word: δόξα
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honor
  - gloria
  lexicon: BDAG
  rationale: En este contexto de mesa y reconocimiento público, δόξα se refiere a estima u honra social, no a gloria divina. "Honra" suena natural y conserva ese valor relacional.
- source_word: ἐνώπιον πάντων τῶν συνανακειμένων σοι
  english_pob_choice: in the presence of all who are reclining with you
  chosen_spanish: delante de todos los que se recuestan contigo
  alternatives_spanish:
  - en presencia de todos los que comen contigo
  - ante todos tus comensales
  lexicon: BDAG
  rationale: La frase conserva el aspecto público del reconocimiento y mantiene la imagen de mesa con "recuestan" para reflejar συνανακειμένων.
theological_decisions:
- issue: 'Sentido de la exhortación: ética social y reversión de honor'
  english_pob_reading: Render as practical instruction within a parabolic teaching on humility and honor, without importing later doctrinal categories.
  chosen_spanish_reading: Traducirlo como instrucción práctica dentro de una enseñanza parabólica sobre la humildad y el honor, sin forzar categorías doctrinales posteriores.
  alternative_spanish_readings:
  - Tratarlo solo como consejo de etiqueta
  - Espiritualizarlo como recompensa exclusivamente escatológica
  rationale: El texto usa la imagen del banquete para enseñar humildad y la inversión del honor. La traducción debe dejar abierta esa tensión, sin reducirla a mera cortesía ni convertirla en una promesa exclusivamente futura.
  doctrine_reference: Preservar la tensión interpretativa del pasaje.
translation_notes:
  revision_awareness: 'Coincide con la última revisión del testimonio inglés: no hubo cambios necesarios y la concordancia general fue alta. La versión española sigue la decisión óptima de mantener el lenguaje de banquete, la inversión de honor y la transparencia del invitador.'
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se mantiene "honra" para δόξα por el contexto social de banquete.
  - Se conserva la imagen de recostarse a la mesa para no diluir el trasfondo cultural.
  - El marcador [a] está anclado en "invitado[a]" para reflejar la alternativa del verbo de invitación y la nota sobre el matiz de mesa.
