base_translation:
  language: en
  yaml_path: translation/nt/luke/014/010.yaml
  text: But when you are invited[a], go and recline in the lowest place, so that when the one who invited you comes, he will say to you, ‘Friend[b], move up higher.’ Then there will be honor for you in the presence of all who are reclining with you.
  footnotes:
