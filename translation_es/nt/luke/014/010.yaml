review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: invitación en contexto de banquete, acción coordinada (''ve y recuéstate''), posición humilde, ascenso honorífico cuando llegue el invitador, y reconocimiento público ante los demás comensales. Sin embargo, no preserva una nota léxica importante del inglés POB sobre προσανάβηθι ἀνώτερον (''come up higher'' / ''move up higher''), y ''Entonces tendrás honra'' se aparta un poco de la forma impersonal/futura ''habrá honor para ti''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Recuéstate' y 'se recuestan contigo' preservan bien la imagen de mesa, aunque suenan un poco marcados; aun así son aceptables dado el objetivo de conservar el trasfondo cultural. Conviene ajustar la puntuación española colocando el punto final dentro de las comillas y mejorar levemente la formulación final para acercarla al griego y sonar más idiomática.
  glossary_alignment: 'No hay términos del glosario base en juego como Yahvé, Mesías o esclavo. Las decisiones clave están bien alineadas con el expediente inglés: κληθῇς -> ''seas invitado'', ἀνάπεσε -> ''recuéstate'', ἔσχατον τόπον -> ''el lugar más bajo'', Φίλε -> ''Amigo'', δόξα -> ''honra/honor''. Recomiendo ''honor'' en el texto revisado por mayor naturalidad panhispánica en este contexto social, aunque ''honra'' no es incorrecto.'
  issues:
  - severity: medium
    issue: Falta la segunda nota léxica presente en el POB inglés para προσανάβηθι ἀνώτερον.
    rationale: El expediente inglés preserva la alternativa 'come up higher'. En español conviene conservar esa alternativa mediante nota, especialmente porque el texto principal usa 'sube más arriba'.
  - severity: medium
    issue: '''Entonces tendrás honra'' interpreta un poco más libremente ἔσται σοι δόξα.'
    rationale: El griego expresa más literalmente 'entonces habrá honor para ti'. La formulación actual no es errónea, pero desplaza la construcción hacia posesión directa. Una redacción más cercana preserva mejor el matiz de honor público conferido.
  - severity: low
    issue: Puntuación de cita mejorable en español.
    rationale: 'En español es preferible colocar el punto dentro de las comillas al cerrar la cita completa: «Amigo, sube más arriba.»'
  revised_spanish_text: 'Pero cuando seas invitado[a], ve y recuéstate en el lugar más bajo, para que cuando venga el que te invitó, te diga: «Amigo, sube más arriba[b].» Entonces habrá honor para ti delante de todos los que se recuestan contigo.'
  revised_footnotes:
