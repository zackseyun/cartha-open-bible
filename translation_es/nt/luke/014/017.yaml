  source_alignment_summary: 'El borrador comunica bien el sentido general del griego: el envío del mensajero, el momento de la cena, la convocatoria a los previamente invitados y la razón de que ya está todo preparado. Sin embargo, no sigue fielmente la decisión auditada del POB para δοῦλον, donde el inglés documentó explícitamente «servant» por contexto parabólico doméstico, no «slave». Además, la nota [a] está invertida: el texto principal ya dice «esclavo», pero la nota lo presenta como alternativa más literal, lo cual resulta incoherente.'
  spanish_quality_summary: 'El español es claro y natural. «A la hora de la cena», «para decir» y «Vengan, porque ya todo está listo» son fluidos y apropiados. La única fricción importante es léxica y editorial: «esclavo» suena más duro de lo que el propio expediente POB justificó aquí, y la nota asociada confunde en vez de aclarar.'
  glossary_alignment: 'Aunque el proyecto por defecto prefiere «esclavo» para δοῦλος, aquí la evidencia auditada ya documentó una excepción contextual válida: en este entorno parabólico de servicio doméstico y mensajería, «sirviente»/«siervo» preserva mejor la intención del POB que «esclavo». El resto del glosario está bien alineado. La nota sobre ἕτοιμά ἐστιν debe conservar la explicación de que el sujeto está implícito y la expresión es colectiva.'
  issues:
  - severity: high
    issue: δοῦλον fue traducido como «esclavo» en contra de la decisión contextual auditada del POB.
    rationale: 'El expediente inglés escogió «servant» con una justificación explícita: en este contexto parabólico la condición servil no es el punto teológico ni narrativo principal. En español conviene reflejar esa misma decisión con «sirviente» o «siervo», no reforzar el término por una preferencia general del glosario.'
  - severity: high
