translation:
  language: es
  text: 'Y a la hora de la cena envió a su sirviente[a] para decir a los invitados: «Vengan, porque ya todo está listo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «esclavo». Aquí «sirviente» comunica mejor la función doméstica del δοῦλος en esta parábola.
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «ya está listo». El griego deja implícito el sujeto y usa una expresión neutra colectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: El aoristo de ἀποστέλλω se vierte de manera natural y directa como «envió». «Mandó» puede sonar más autoritativo y «despachó» es posible, pero añade matiz no exigido por el contexto.
- source_word: δοῦλον
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: BDAG
  rationale: La pauta del proyecto favorece «esclavo» para δοῦλος cuando se quiere conservar la fuerza léxica. Aunque el contexto parabólico muestra una función de mensajero doméstico, la relación de dependencia sigue presente; por eso no se suaviza a «siervo» sin necesidad textual.
- source_word: τῇ ὥρᾳ τοῦ δείπνου
  english_pob_choice: at the hour of the dinner
  chosen_spanish: a la hora de la cena
  alternatives_spanish:
  - a la hora de la comida
  - a la hora del banquete
  lexicon: BDAG
  rationale: «A la hora de la cena» conserva el valor temporal y suena natural en español. «Banquete» sería más interpretativo; «comida» es más general que δείπνον.
- source_word: εἰπεῖν
  english_pob_choice: to say
  chosen_spanish: para decir
  alternatives_spanish:
  - para hablar
  - para avisar
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa bien con «para decir». «Avisar» introduce una especificación que el griego no obliga.
- source_word: τοῖς κεκλημένοις
  english_pob_choice: to those who had been invited
  chosen_spanish: a los invitados
  alternatives_spanish:
  - a los que habían sido invitados
  - a los convocados
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica personas ya invitadas con anterioridad. En español, «los invitados» comunica de forma natural ese estado resultante; la alternativa más explícita queda preservada como opción.
- source_word: Ἔρχεσθε
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan ahora
  - Acérquense
  lexicon: BDAG
  rationale: El imperativo plural de segunda persona se traduce con el mandato natural «Vengan». «Acérquense» debilita la urgencia de la convocatoria.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la convocatoria; «porque» es la forma más clara y directa en español.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - ahora
  lexicon: BDAG
  rationale: «Ya» reproduce la inmediatez y el énfasis de ἤδη de manera idiomática.
- source_word: ἕτοιμά ἐστιν
  english_pob_choice: it is already ready
  chosen_spanish: todo está listo
  alternatives_spanish:
  - ya todo está listo
  - está todo preparado
  lexicon: BDAG
  rationale: El griego usa una construcción neutra colectiva con sujeto implícito; en español conviene explicitar el sentido como «todo está listo». Mantiene la idea de preparación completa sin forzar un «ello» impersonal.
translation_notes:
  revision_awareness: Se tomó en cuenta que el audit trail inglés favorece una equivalencia óptima con notas para alternativas idiomáticas; en español se mantuvo la misma tensión entre literalidad y naturalidad, preservando δοῦλος con «esclavo» y explicitando la construcción colectiva de ἕτοιμά ἐστιν mediante una nota.
  spanish_consistency_notes:
  - Se respetó el tratamiento de YHWH/κύριος no aplicable en este versículo.
  - Se mantuvo un registro neutral y eclesialmente legible, sin calco rígido del inglés.
  - La puntuación y comillas siguen convención española.
  - Las notas a y b reflejan alternativas reales derivadas del griego y del audit trail inglés.
