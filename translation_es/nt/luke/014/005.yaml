translation:
  language: es
  text: 'Y él les dijo: «¿Quién de ustedes, si un hijo[a] o un buey cae en un pozo, no lo sacará inmediatamente en el día de sábado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos dicen «asno» en lugar de «hijo».
    reason: textual_variant
lexical_decisions:
- source_word: Τίνος ὑμῶν
  english_pob_choice: Which of you
  chosen_spanish: ¿Quién de ustedes
  alternatives_spanish:
  - ¿Cuál de ustedes
  - ¿Quién entre ustedes
  lexicon: BDAG
  rationale: La pregunta retórica griega no pide pertenencia (“de quién”) sino identificar a la persona del grupo que actuaría así. En español, “¿Quién de ustedes” comunica mejor la fuerza idiomática y conserva el tono retórico.
- source_word: υἱὸς
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo varón
  - niño
  lexicon: BDAG
  rationale: El griego dice literalmente “hijo” masculino singular. Aunque la POB inglesa usa “son”, en español “hijo” es natural, explícito y mantiene la referencia filial concreta sin volverlo genérico como “niño”.
- source_word: βοῦς
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - boya
  - res de trabajo
  lexicon: BDAG
  rationale: Para un animal de labor bovino, “buey” es el equivalente más natural y claro en español bíblico contemporáneo. Conserva la imagen de un animal útil y pesado sin volverla ambigua.
- source_word: φρέαρ
  english_pob_choice: well
  chosen_spanish: pozo
  alternatives_spanish:
  - cisterna
  - pozo de agua
  lexicon: BDAG
  rationale: Aunque “well” puede ser “pozo” o “aljibe/cisterna”, aquí el término griego designa de manera natural una cavidad de extracción de agua. “Pozo” es el español más transparente y no sobreespecifica más allá del texto.
- source_word: πεσεῖται
  english_pob_choice: falls
  chosen_spanish: cae
  alternatives_spanish:
  - caiga
  - se cae
  lexicon: BDAG
  rationale: En la pregunta condicional, el futuro griego se expresa con naturalidad en español mediante presente (“cae”), manteniendo el valor general del caso hipotético sin forzar una perífrasis innecesaria.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - enseguida
  lexicon: BDAG
  rationale: “Inmediatamente” conserva la urgencia temporal del adverbio griego y el contraste implícito con cualquier demora por razones sabáticas.
- source_word: ἀνασπάσει
  english_pob_choice: pull ... out
  chosen_spanish: lo sacará
  alternatives_spanish:
  - lo sacará afuera
  - lo sacará hacia arriba
  - lo extraerá
  lexicon: BDAG
  rationale: El verbo griego implica sacar o tirar hacia arriba desde abajo. En español, “sacar” es la forma más natural y clara para un rescate de un pozo, sin perder el sentido de extracción.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Aunque el pronombre griego es masculino singular, en español el objeto directo para “hijo” o “buey” se expresa naturalmente con “lo”. Evita una construcción pesada y mantiene la referencia singular.
- source_word: ἐν ἡμέρᾳ τοῦ σαββάτου
  english_pob_choice: on the Sabbath day
  chosen_spanish: en día de sábado
  alternatives_spanish:
  - en sábado
  - el día de sábado
  lexicon: BDAG
  rationale: La forma griega menciona literalmente “en día del sábado”. “En día de sábado” mantiene esa estructura y evita sustituirla por una fórmula eclesiástica más tradicional que ocultaría el sustantivo subyacente.
theological_decisions:
- issue: Variante textual en el objeto de la comparación
  english_pob_reading: son or an ox
  chosen_spanish_reading: un hijo o un buey
  alternative_spanish_readings:
  - un asno o un buey
  - un hijo o un asno
  rationale: La base SBLGNT dada lee υἱός (“hijo”), y la traducción principal sigue ese texto. La nota conserva la variante manuscrita conocida (“asno”) en lugar de importarla al texto principal, respetando la primacía de la fuente original y la trazabilidad textual.
  doctrine_reference: Principio de primacía del texto base y preservación de variantes en nota, no en el cuerpo principal.
translation_notes:
  revision_awareness: La revisión más reciente del paquete de auditoría indica que no hubo cambios necesarios; por eso esta versión sigue de cerca el texto griego SBLGNT proporcionado y mantiene la variante manuscrita solo en nota.
  spanish_consistency_notes:
  - Se usa “Yahvé” como norma en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene “sábado” en una construcción transparente (“día de sábado”) para reflejar el griego sin borrar el sustantivo base.
  - Se evita “SEÑOR” o formulación litúrgica equivalente porque el pasaje no contiene κύριος ni una referencia nominal directa al nombre divino.
  - Se prefiere “buey” sobre “ox” transliterado o sobre un genérico más amplio, por fidelidad al animal de labor concreto del contexto.
