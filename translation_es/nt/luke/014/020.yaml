  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: un tercer invitado presenta otra excusa, basada en un matrimonio reciente, y afirma que no puede asistir. Sin embargo, dos decisiones merecen ajuste: ἐλθεῖν se alinea mejor con «venir» en este contexto de invitación al banquete, y «he tomado esposa» suena algo calcado y menos natural que una formulación española más clara que aún preserve la nota literal del aoristo.'
  spanish_quality_summary: El texto es comprensible, pero «he tomado esposa» resulta poco idiomático en español neutral contemporáneo y «no puedo ir» suena menos natural que «no puedo venir» desde la perspectiva del anfitrión/siervo que llama a los invitados. Una leve revisión mejora legibilidad y naturalidad sin perder precisión.
  glossary_alignment: No hay términos del glosario mayor en juego. «Otro» para ἕτερος y «esposa» para Γυναῖκα están bien. La nota literal sobre ἔγημα debe conservarse. Conviene expresar el texto principal con español natural («me he casado») y mantener la alternativa más literal en nota.
  issues:
  - severity: medium
    issue: «He tomado esposa» suena forzado en español actual
    rationale: Aunque intenta reflejar la formulación griega, en español neutral eclesial contemporáneo es menos natural que «me he casado». La literalidad puede preservarse adecuadamente en una nota, como ya hace el inglés con 'I married a wife'.
  - severity: medium
    issue: «No puedo ir» es menos adecuado que «no puedo venir» para ἐλθεῖν en esta escena
    rationale: En una invitación a asistir al banquete, el movimiento se conceptualiza naturalmente como venir hacia el anfitrión. «Venir» comunica mejor la situación discursiva en español y corresponde bien a «come» del POB inglés.
