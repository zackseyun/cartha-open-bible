lexical_decisions:
- source_word: ἕτερος
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - uno más
  - otro más
  lexicon: BDAG
  rationale: ἕτερος introduce a un segundo excusante dentro de la serie. En español, «otro» expresa de manera natural esa adición sin cargar el sentido con matices no presentes en el griego.
- source_word: Γυναῖκα
  english_pob_choice: a wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - una mujer
  lexicon: BDAG
  rationale: Aunque γυνή puede significar «mujer» o «esposa», aquí el objeto de ἔγημα exige el sentido marital. «Esposa» comunica la relación con claridad y evita la rareza de una traducción más literal como «mujer» en este contexto.
- source_word: ἔγημα
  english_pob_choice: I have married
  chosen_spanish: he tomado esposa
  alternatives_spanish:
  - me casé
  - he me casado
  lexicon: BDAG
  rationale: El aoristo de γαμέω señala la acción completada. En español, «he tomado esposa» conserva el valor de hecho ya realizado y su relevancia presente, además de reflejar la formulación breve y enfática del original sin depender del giro inglés «I have married».
- source_word: διὰ τοῦτο
  english_pob_choice: for this reason
  chosen_spanish: por esto
  alternatives_spanish:
  - por esta razón
  - por lo cual
  lexicon: BDAG
  rationale: La frase introduce la causa de la negativa. «Por esto» es breve, natural y causal, y mantiene la relación lógica del griego sin endurecerla con un conector más interpretativo.
- source_word: οὐ δύναμαι ἐλθεῖν
  english_pob_choice: I cannot come
  chosen_spanish: no puedo ir
  alternatives_spanish:
  - no puedo venir
  - no me es posible ir
  lexicon: BDAG
  rationale: δύναμαι + infinitivo expresa incapacidad. «No puedo ir» es una solución española natural y fiel al reclamo de imposibilidad del hablante; «venir» también sería posible, pero «ir» sigue de cerca el movimiento expresado por ἐλθεῖν desde la perspectiva del invitado.
translation_notes:
  revision_awareness: 'El texto griego y el expediente inglés coinciden en lo esencial: otro invitado presenta como excusa un matrimonio reciente. Se mantiene la tensión lexical de γυνή/ἔγημα con una opción española idiomática pero controlada, evitando suavizar el valor verbal del aoristo.'
  spanish_consistency_notes:
  - Se conserva «otro» para ἕτερος, en línea con el valor narrativo de un excusante adicional.
  - «Esposa» se usa para γυνή por el contexto matrimonial explícito de ἔγημα.
  - La nota al pie preserva la alternativa más literal del verbo griego, equivalente a la observación lexical del POB inglés.
  - Se eligió «ir» para ἐλθεῖν porque el contexto del invitado ausente lo hace natural en español, aunque «venir» sea posible desde otra perspectiva deíctica.
