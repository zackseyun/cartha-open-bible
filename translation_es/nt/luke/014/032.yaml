translation:
  language: es
  text: Pero si no,[a] mientras el otro todavía está lejos, envía una delegación y pide condiciones de paz.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si no» o «de lo contrario». La construcción griega introduce una alternativa adversativa y condicional.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las cosas que conducen a la paz»; es decir, condiciones que asegurarían la paz.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήγε
  english_pob_choice: if not
  chosen_spanish: pero si no
  alternatives_spanish:
  - si no
  - de lo contrario
  lexicon: BDAG
  rationale: La construcción εἰ δὲ μήγε introduce una alternativa adversativa. En español, «pero si no» conserva el contraste y la condicionalidad sin sonar rígido.
- source_word: ἔτι αὐτοῦ πόρρω ὄντος
  english_pob_choice: while the other is still far away
  chosen_spanish: mientras el otro todavía está lejos
  alternatives_spanish:
  - mientras él todavía está lejos
  - cuando aún está lejos
  lexicon: BDAG
  rationale: El genitivo absoluto expresa una circunstancia simultánea. «El otro» mantiene claro el referente del rey opuesto en la parábola, y «todavía está lejos» refleja πόρρω de manera natural en español.
- source_word: πρεσβείαν
  english_pob_choice: a delegation
  chosen_spanish: una delegación
  alternatives_spanish:
  - una embajada
  - unos enviados
  lexicon: BDAG
  rationale: «Delegación» es el equivalente español más natural y fiel al valor de πρεσβεία como cuerpo enviado; evita el tono demasiado formal de «embajada».
- source_word: ἀποστείλας
  english_pob_choice: he sends
  chosen_spanish: envía
  alternatives_spanish:
  - habiendo enviado
  - después de enviar
  lexicon: BDAG
  rationale: 'Aunque es un participio aoristo, en español fluye mejor como acción coordinada: «envía una delegación y pide...», preservando la secuencia narrativa sin calco pesado.'
- source_word: ἐρωτᾷ
  english_pob_choice: asks for
  chosen_spanish: pide
  alternatives_spanish:
  - solicita
  - pregunta por
  lexicon: BDAG
  rationale: Aquí ἐρωτάω significa pedir o solicitar, no simplemente formular una pregunta. «Pide» encaja bien con el complemento siguiente.
- source_word: τὰ πρὸς εἰρήνην
  english_pob_choice: terms of peace
  chosen_spanish: condiciones de paz
  alternatives_spanish:
  - términos de paz
  - lo necesario para la paz
  lexicon: BDAG
  rationale: La expresión idiomática apunta a los arreglos que aseguran la paz. «Condiciones de paz» comunica bien ese sentido político y negociador en español.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el inglés POB muestra acuerdo alto y sin cambios necesarios. La propuesta española sigue ese estado estable, conservando el valor condicional-adversativo, el genitivo absoluto de simultaneidad y la expresión idiomática de paz.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma del proyecto solo cuando corresponda; este versículo no lo contiene.
  - Se evita «SEÑOR» y otras sustituciones no pertinentes al texto.
  - Se usa «delegación» y «condiciones de paz» como equivalentes naturales de los términos griegos y del audit trail en inglés.
  - La puntuación refleja el matiz de alternativa condicional con coma tras «no» para facilitar la lectura.
