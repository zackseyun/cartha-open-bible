translation:
  language: es
  text: 'Ahora bien, grandes multitudes iban con él[a], y volviéndose, les dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «numerosas multitudes iban con él». El griego subraya que muchas multitudes acompañaban a Jesús mientras él iba de camino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνεπορεύοντο
  english_pob_choice: were traveling with
  chosen_spanish: iban con
  alternatives_spanish:
  - viajaban con
  - iban acompañándolo
  - se desplazaban con
  lexicon: BDAG
  rationale: El imperfecto indica acción continua en el pasado. «Iban con» conserva esa continuidad y el sentido de acompañamiento en el camino sin sonar artificial en español.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce una transición narrativa suave. «Ahora bien» funciona como marcador discursivo natural en español y no exagera una oposición.
- source_word: ὄχλοι πολλοί
  english_pob_choice: large crowds
  chosen_spanish: muchas multitudes
  alternatives_spanish:
  - grandes multitudes
  - muchas personas
  - multitudes numerosas
  lexicon: BDAG
  rationale: El griego combina pluralidad y abundancia. «Muchas multitudes» conserva el plural enfático de ὄχλοι πολλοί mejor que «grandes multitudes», aunque suene menos idiomático; aquí se mantiene la fuerza del original.
- source_word: στραφεὶς
  english_pob_choice: turning
  chosen_spanish: volviéndose
  alternatives_spanish:
  - habiéndose vuelto
  - dándose vuelta
  - al volverse
  lexicon: BDAG
  rationale: El participio aoristo se vierte de manera fluida como acción concomitante en la narración. «Volviéndose» preserva la secuencia y evita un exceso de explicación.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - dijo
  - habló
  - les habló
  lexicon: BDAG
  rationale: Se incorpora el objeto dativo explícito del griego para claridad en español. «Les dijo» es natural y refleja que el discurso se dirige a ellos.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a las multitudes
  - para ellos
  lexicon: BDAG
  rationale: La preposición πρός con acusativo marca destinatarios del discurso. En español, el clítico «les» comunica esa dirección de manera idiomática y breve.
translation_notes:
  revision_awareness: El texto griego y el registro auditado en inglés están en alto acuerdo; no hubo revisiones aplicadas en la fuente inglesa, por lo que la versión española sigue de cerca el valor aspectual de los verbos y conserva la tensión de ὄχλοι πολλοί sin suavizarla.
  spanish_consistency_notes:
  - Se usa «él» para referirse a Jesús, coherente con el pronombre del griego y con el contexto inmediato.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - La nota al pie conserva la alternativa lexicalmente relevante reflejada en el audit trail inglés.
