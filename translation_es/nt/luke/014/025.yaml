- from: 'Ahora bien, muchas multitudes iban con él[a], y volviéndose, les dijo:'
  to: 'Ahora bien, grandes multitudes iban con él[a], y volviéndose, les dijo:'
  rationale: Se revisa «muchas multitudes» a «grandes multitudes» para mantener el sentido de ὄχλοι πολλοί en un español natural y digno, en línea con la filosofía del POB de equivalencia óptima. Se conserva «iban con él» por su buen ajuste al imperfecto de acompañamiento, y se mejora la nota con una alternativa más útil y una explicación más fluida.
