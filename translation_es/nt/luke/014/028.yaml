translation:
  language: es
  text: Porque, ¿quién de ustedes, queriendo construir una torre, no se sienta primero a calcular el costo, si tiene con qué terminarla?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τίς γὰρ ἐξ ὑμῶν
  english_pob_choice: For which of you
  chosen_spanish: Porque, ¿quién de ustedes
  alternatives_spanish:
  - Porque, ¿cuál de ustedes
  - Porque, ¿quién entre ustedes
  lexicon: BDAG
  rationale: La pregunta retórica conserva el plural dirigido a la audiencia y la conexión lógica de γάρ con ‘Porque’. ‘¿Quién de ustedes?’ es natural en español y mantiene el tono directo sin perder el valor interrogativo.
- source_word: θέλων
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - intentando
  lexicon: BDAG
  rationale: El participio presente expresa intención o disposición previa. ‘Queriendo’ comunica bien esa condición previa en español sin añadir una glosa excesiva.
- source_word: πύργον
  english_pob_choice: a tower
  chosen_spanish: una torre
  alternatives_spanish:
  - una torre de vigilancia
  - un torreón
  lexicon: BDAG
  rationale: πύργος significa normalmente ‘torre’; ‘una torre’ es la equivalencia directa y más natural en español.
- source_word: οἰκοδομῆσαι
  english_pob_choice: to build
  chosen_spanish: construir
  alternatives_spanish:
  - edificar
  - levantar
  lexicon: BDAG
  rationale: El infinitivo indica la acción proyectada. ‘Construir’ refleja el sentido básico de forma clara y actual en español.
- source_word: πρῶτον καθίσας
  english_pob_choice: first sit down
  chosen_spanish: se sienta primero
  alternatives_spanish:
  - se siente primero
  - habiendo primero tomado asiento
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. En español, una formulación finita y natural —‘se sienta primero’— transmite la prioridad temporal sin calco duro.
- source_word: ψηφίζει
  english_pob_choice: calculate
  chosen_spanish: calcula
  alternatives_spanish:
  - cuenta
  - hace cuentas
  lexicon: BDAG
  rationale: ψηφίζω puede significar contar o calcular. En el contexto de una torre, ‘calcula’ preserva la idea de evaluar deliberadamente el costo, no solo contar monedas.
- source_word: τὴν δαπάνην
  english_pob_choice: the cost
  chosen_spanish: el costo
  alternatives_spanish:
  - el gasto
  - la inversión
  lexicon: BDAG
  rationale: δαπάνη puede referirse a gasto o costo; ‘el costo’ es la opción más natural y precisa para una obra de construcción.
- source_word: εἰ ἔχει
  english_pob_choice: whether he has enough
  chosen_spanish: para ver si tiene con qué
  alternatives_spanish:
  - para ver si tiene suficiente
  - para ver si cuenta con los medios
  lexicon: BDAG
  rationale: El griego pregunta si ‘tiene’ para completar la obra; el español necesita explicitar suficiencia. ‘Con qué’ conserva esa idea de recursos disponibles sin añadir más de lo necesario.
- source_word: εἰς ἀπαρτισμόν
  english_pob_choice: to complete it
  chosen_spanish: terminarla
  alternatives_spanish:
  - completarla
  - acabarla
  lexicon: BDAG
  rationale: ἀπαρτισμός denota finalización o terminación. ‘Terminarla’ es una forma idiomática y fiel que hace explícita la torre como objeto implícito.
translation_notes:
  revision_awareness: 'El texto se alinea con el auditable sentido del griego y con la solución inglesa aprobada: pregunta retórica, cálculo previo del costo y suficiencia de recursos para completar la obra. No se registraron revisiones previas ni tensiones textuales relevantes en este versículo.'
  spanish_consistency_notes:
  - Se mantiene ‘torre’ como imagen concreta del original.
  - Se conserva el valor lógico de γάρ con ‘Porque’.
  - ‘Costo’ y ‘calcula’ reflejan la evaluación económica del contexto, no un simple conteo.
  - La suficiencia implícita de εἰ ἔχει se expresa de manera natural con ‘tener con qué’.
