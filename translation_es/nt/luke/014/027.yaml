revisions:
- from: Todo el que no lleve su propia cruz y venga detrás de mí no puede ser mi discípulo[a][b].
  to: Todo el que no lleve su propia cruz[a] y venga en pos de mí[b], no puede ser mi discípulo.
  rationale: Se conserva la estructura y el sentido del borrador, pero se mejora la naturalidad y el registro con «venga en pos de mí», que sigue reflejando el movimiento detrás de Jesús y encaja mejor en español bíblico. La nota b se corrige para evitar el imperativo impropio «sígame» y para distinguir con claridad entre la literalidad del griego y la expresión idiomática relacionada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:01:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: condición general (ὅστις), cargar/llevar la cruz propia (βαστάζει τὸν σταυρὸν ἑαυτοῦ), venir detrás/depués de Jesús (ἔρχεται ὀπίσω μου) e imposibilidad de ser su discípulo (οὐ δύναται εἶναί μου μαθητής). Sin embargo, la nota b introduce una forma imperativa («sígame») que no corresponde bien a la alternativa inglesa documentada («follow me») ni al valor del infinitivo/frase citada; además, en español bíblico-natural «venir en pos de mí» expresa mejor el giro discipular sin sonar torpe.'
  spanish_quality_summary: El texto principal es claro y legible. «Todo el que» y «no puede ser mi discípulo» son buenas elecciones. «Venga detrás de mí» es comprensible, pero suena algo físico/coloquial; «venga en pos de mí» conserva mejor la imagen de discipulado en registro digno. La nota b necesita reparación de redacción y de fidelidad formal.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Discípulo» para μαθητής y «cruz» para σταυρός están bien. No hay términos como Yahvé/Mesías/esclavo en este versículo. La decisión española de no marcar masculino explícito en «su propia cruz» es aceptable y fiel al alcance genérico del original.
  issues:
  - severity: medium
    issue: La nota b usa «sígame».
    rationale: El inglés auditado ofrece como comparación «follow me», una expresión léxica, no una cita imperativa. «Sígame» cambia persona y modo y puede confundir al lector sobre qué es literal y qué es comparación idiomática.
  - severity: low
    issue: «Venga detrás de mí» es menos idiomático para lenguaje de discipulado.
    rationale: Aunque es fiel en sentido básico a ὀπίσω μου, en español bíblico y eclesial «venir en pos de mí» o «venir tras mí» comunica mejor la fórmula de seguimiento sin reducirla a «seguir».
  revised_spanish_text: Todo el que no lleve su propia cruz[a] y venga en pos de mí[b], no puede ser mi discípulo.
  revised_footnotes:
  - marker: a
    text: O «lleve su cruz».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «venga detrás de mí»; compárese la expresión común de discipulado «seguir(me)».'
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y el sentido del borrador, pero se mejora la naturalidad y el registro con «venga en pos de mí», que sigue reflejando el movimiento detrás de Jesús y encaja mejor en español bíblico. La nota b se corrige para evitar el imperativo impropio «sígame» y para distinguir con claridad entre la literalidad del griego y la expresión idiomática relacionada.
