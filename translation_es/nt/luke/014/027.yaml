translation:
  language: es
  text: Todo el que no lleve su propia cruz[a] y venga en pos de mí[b], no puede ser mi discípulo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lleve su cruz».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «venga detrás de mí»; compárese la expresión común de discipulado «seguir(me)».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅστις
  english_pob_choice: Whoever
  chosen_spanish: Todo el que
  alternatives_spanish:
  - Quienquiera que
  - Cualquiera que
  lexicon: BDAG
  rationale: El relativo indefinido introduce una condición general. «Todo el que» conserva esa fuerza universal de manera natural en español y suena más fluido que un calco más duro.
- source_word: βαστάζει
  english_pob_choice: carry
  chosen_spanish: lleve
  alternatives_spanish:
  - cargue
  - porte
  - soporte
  lexicon: BDAG
  rationale: El verbo puede significar «llevar» o «cargar». «Lleve» transmite bien la imagen concreta de asumir la cruz y mantiene una amplitud compatible con el matiz de carga o porte sin exagerar el tono.
- source_word: τὸν σταυρὸν
  english_pob_choice: cross
  chosen_spanish: su propia cruz
  alternatives_spanish:
  - su cruz
  - la cruz de él
  lexicon: BDAG
  rationale: «Cruz» es el equivalente directo de σταυρός y conserva tanto el referente literal como su valor metafórico de sufrimiento y vergüenza en el discipulado. «Su propia» refleja el énfasis reflexivo de ἑαυτοῦ.
- source_word: ἑαυτοῦ
  english_pob_choice: his own
  chosen_spanish: su propia
  alternatives_spanish:
  - de sí mismo
  - la propia
  lexicon: BDAG
  rationale: El posesivo reflexivo singular subraya pertenencia personal. En español, «su propia» expresa bien esa propiedad reflexiva sin perder naturalidad ni necesidad de marcar género explícito en cada caso.
- source_word: ἔρχεται ὀπίσω μου
  english_pob_choice: come after me
  chosen_spanish: venga detrás de mí
  alternatives_spanish:
  - siga detrás de mí
  - venga tras de mí
  - me siga
  lexicon: BDAG
  rationale: «Venga detrás de mí» reproduce con bastante cercanía la imagen espacial de ὀπίσω μου. Mantiene visible la expresión de movimiento y no la reduce de entrada al equivalente interpretativo «me siga».
- source_word: οὐ δύναται εἶναί μου μαθητής
  english_pob_choice: cannot be my disciple
  chosen_spanish: no puede ser mi discípulo
  alternatives_spanish:
  - no es capaz de ser mi discípulo
  - no puede llegar a ser mi discípulo
  lexicon: BDAG
  rationale: La construcción expresa incapacidad o imposibilidad, no solo prohibición. «No puede ser mi discípulo» es natural en español y conserva esa fuerza de imposibilidad/incompatibilidad. «Discípulo» es el término bíblico establecido para μαθητής.
theological_decisions:
- issue: Fuerza universal del sujeto indefinido y elección de forma no masculina explícita en español
  english_pob_reading: Retains 'Whoever' with singular masculine 'his own cross' in English as grammatically generic.
  chosen_spanish_reading: «Todo el que» mantiene la universalidad sin forzar género masculino explícito; el posesivo reflexivo queda integrado en «su propia cruz».
  alternative_spanish_readings:
  - Quienquiera que no lleve su propia cruz...
  - Cualquiera que no lleve su propia cruz...
  rationale: El griego usa un relativo indefinido singular con valor genérico. En español, «todo el que» es una forma idiomática, inclusiva en función referencial y plenamente fiel al alcance universal del enunciado.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Matiz de incapacidad en la cláusula final
  english_pob_reading: '''cannot be my disciple'' expresses inability rather than mere prohibition.'
  chosen_spanish_reading: «no puede ser mi discípulo»
  alternative_spanish_readings:
  - no debe ser mi discípulo
  - no le es posible ser mi discípulo
  rationale: La negación con δύναμαι + infinitivo comunica imposibilidad/capacidad, no solo mandato. La formulación elegida conserva esa incompatibilidad de manera clara y sobria.
  doctrine_reference: BDAG on δύναμαι; doctrinally neutral translation choice
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la última revisión. La versión española sigue el mismo consenso de alta concordancia, evitando recalcar una equivalencia más interpretativa que la que permite el griego y manteniendo la imagen espacial de ὀπίσω μου con una formulación natural en español.
  spanish_consistency_notes:
  - Se mantiene «discípulo» para μαθητής, en continuidad con la terminología bíblica estándar del proyecto.
  - Se usa «cruz» y no un equivalente explicativo, para conservar el referente histórico y metafórico del texto.
  - Se evita «SEÑOR» o sustituciones litúrgicas porque el versículo no contiene el nombre divino ni κύριος en el locus principal.
  - La negación final se redacta con «no puede» para preservar el valor de incapacidad indicado por el análisis del inglés POB.
