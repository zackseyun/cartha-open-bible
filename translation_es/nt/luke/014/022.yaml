review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: el δοῦλος habla al dueño, informa el cumplimiento de la orden (γέγονεν ὃ ἐπέταξας) y añade que todavía queda capacidad (ἔτι τόπος ἐστίν). Sin embargo, la elección principal para δοῦλος no sigue la decisión auditada del POB inglés, que en este contexto parabólico prefirió ''servant'' por naturalidad dialogal, preservando ''slave'' solo como alternativa léxica. En español conviene seguir esa lógica con ''siervo'' como texto principal y ''esclavo'' como alternativa en nota.'
  spanish_quality_summary: 'La redacción es clara y natural. ''Señor'', ''se ha hecho lo que mandaste'' y ''aún hay lugar'' son idiomáticos y dignos. El único ajuste necesario es terminológico: ''el esclavo'' suena más duro y menos natural en este diálogo parabólico que ''el siervo'', y además se aparta de la racionalidad documentada del audit trail inglés.'
  glossary_alignment: 'Buen uso de ''Señor'' para Κύριε en contexto parabólico y de formulaciones naturales para γέγονεν, ὃ ἐπέταξας, ἔτι, y τόπος. La desalineación principal está en δοῦλος: aunque el proyecto permite ''esclavo'' cuando el POB eligió ''slave'', aquí el POB inglés eligió ''servant'' con alternativa ''slave''. Por fidelidad al registro y a la decisión documentada, el español debería usar ''siervo'' con nota alternativa ''esclavo''.'
  issues:
  - severity: medium
    issue: δοῦλος se vertió como 'esclavo' en el texto principal
    rationale: El audit trail inglés justifica 'servant' en esta parábola porque la condición servil no está teológicamente enfatizada. En español, 'siervo' preserva la relación jerárquica de manera natural en el diálogo; 'esclavo' puede mantenerse como alternativa léxica en nota.
  - severity: low
    issue: La nota de alternativa para Κύριε usa ancla en el verbo 'dijo' en vez del vocativo
    rationale: No es incorrecto funcionalmente, pero es más preciso anclar la nota al término correspondiente 'Señor'.
  revised_spanish_text: 'Y el siervo[a] dijo: «Señor[b], se ha hecho lo que mandaste, y aún hay lugar».'
  revised_footnotes:
  - marker: a
    text: O 'esclavo' para δοῦλος.
    reason: lexical_alternative
  - marker: b
    text: O 'Maestro' para Κύριε.
    reason: lexical_alternative
  revision_rationale: Se cambia 'esclavo' por 'siervo' para alinearse con la decisión contextual documentada del POB inglés para δοῦλος en esta parábola, manteniendo 'esclavo' como alternativa léxica válida en nota. También se reubica la nota de Κύριε al vocativo 'Señor' para mayor precisión.
