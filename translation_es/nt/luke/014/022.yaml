translation:
  language: es
  text: 'Y el siervo[a] dijo: «Señor[b], se ha hecho lo que mandaste, y aún hay lugar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'esclavo' para δοῦλος.
    reason: lexical_alternative
  - marker: b
    text: O 'Maestro' para Κύριε.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: BDAG
  rationale: δοῦλος puede significar 'esclavo'; aquí el término de relación con el amo/householder conserva mejor la fuerza léxica que 'siervo'. En español, 'esclavo' mantiene la asimetría de autoridad sin suavizarla indebidamente.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Es un vocativo dirigido al anfitrión de la parábola. 'Señor' es la forma natural y reverente en español, y comunica la autoridad sin imponer una lectura doctrinal ajena al contexto.
- source_word: γέγονεν
  english_pob_choice: has been done
  chosen_spanish: se ha hecho
  alternatives_spanish:
  - ha sido hecho
  - se cumplió
  lexicon: BDAG
  rationale: El perfecto de γίνομαι expresa estado/resultación de una acción completada. 'Se ha hecho' reproduce bien ese valor resultativo en español y encaja con la frase siguiente.
- source_word: ὃ ἐπέταξας
  english_pob_choice: what you commanded
  chosen_spanish: lo que mandaste
  alternatives_spanish:
  - lo que ordenaste
  - lo que diste
  lexicon: BDAG
  rationale: El relativo neutro con ἐπιτάσσω señala el contenido de la instrucción previa. 'Mandaste' conserva la fuerza directiva del verbo y suena natural en diálogo directo; 'ordenaste' también sería posible.
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  lexicon: BDAG
  rationale: '''Aún'' expresa de manera idiomática que sigue existiendo disponibilidad después de cumplir la instrucción.'
- source_word: τόπος
  english_pob_choice: room
  chosen_spanish: lugar
  alternatives_spanish:
  - espacio
  - sitio
  lexicon: BDAG
  rationale: En español, 'lugar' funciona bien para capacidad disponible en el contexto de banquete. 'Espacio' también es posible, pero 'lugar' conserva mejor la amplitud semántica de τόπος sin volverlo técnico.
theological_decisions:
- issue: Tratamiento de δοῦλος en contexto parabólico
  english_pob_reading: servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  rationale: La lectura inglesa opta por suavizar a 'servant', pero el griego δοῦλος conserva una carga de dependencia real. En español, 'esclavo' preserva mejor esa tensión léxica sin desfigurar el contexto narrativo.
  doctrine_reference: Léxica/contextual; ver BDAG s.v. δοῦλος
translation_notes:
  revision_awareness: 'Se revisó el pasaje a la luz del texto griego SBLGNT y del audit trail inglés. La versión final mantiene correspondencia estrecha con el contenido: sujeto vocativo, perfecto resultativo, relativa de contenido y adverbio de continuidad. No se requirieron cambios por revisión reciente.'
  spanish_consistency_notes:
  - Se prefirió 'Señor' para Κύριε por idiomaticidad reverente en español.
  - Se evitó 'sirviente' porque atenúa la fuerza de δοῦλος; 'esclavo' conserva la tensión lexical.
  - '''Aún'' y ''lugar'' reproducen de forma natural la idea de disponibilidad restante en el banquete.'
