translation:
  language: es
  text: Y he aquí[a] cierto hombre con hidropesía[b] estaba delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «mira» o «miren». El griego ἰδοὺ funciona como marcador de atención y no añade contenido proposicional nuevo.
    reason: alternative_reading
  - marker: b
    text: O, «que padecía hidropesía». El término griego ὑδρωπικός describe a una persona afectada por una acumulación anormal de líquidos; «hidropesía» preserva el registro tradicional, mientras que «edema» expresa el sentido médico en español actual.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Entonces
  lexicon: BDAG
  rationale: La conjunción introduce la escena sin añadir matiz temporal que no está explícito en el griego; en español, 'Y' conserva la conexión narrativa de forma natural.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - mira
  lexicon: BDAG
  rationale: '''He aquí'' preserva el valor discursivo de llamada de atención y mantiene el tono narrativo elevado que la POB inglesa quiso conservar con ''behold''.'
- source_word: ἄνθρωπός τις
  english_pob_choice: a certain man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un cierto hombre
  - alguien
  lexicon: BDAG
  rationale: En español, 'un hombre' comunica de manera natural la referencia indefinida a una persona particular no nombrada. 'Un cierto hombre' suena más forzado; la indefinición queda suficientemente marcada por el contexto y por τις.
- source_word: ὑδρωπικὸς
  english_pob_choice: with dropsy
  chosen_spanish: con hidropesía
  alternatives_spanish:
  - que padecía hidropesía
  - afligido de hidropesía
  - con edema
  lexicon: BDAG
  rationale: '''Hidropesía'' corresponde al término tradicional y comprensible en registro bíblico para el cuadro descrito. Evita la terminología clínica moderna (''edema'') que no suena tan natural en este contexto narrativo, y también evita reducir el valor adjetival del griego a una paráfrasis demasiado libre.'
- source_word: ἔμπροσθεν αὐτοῦ
  english_pob_choice: was before him
  chosen_spanish: estaba delante de él
  alternatives_spanish:
  - estaba ante él
  - estaba en su presencia
  lexicon: BDAG
  rationale: '''Delante de él'' es una forma idiomática clara en español y conserva tanto la ubicación espacial como la posible lectura de presencia sin forzar una sola opción.'
theological_decisions:
- issue: Valor de ἰδοὺ como marcador discursivo de atención
  english_pob_reading: behold
  chosen_spanish_reading: he aquí
  alternative_spanish_readings:
  - miren
  - vean
  rationale: 'No hay una cuestión doctrinal directa, pero sí un efecto retórico importante: la frase llama la atención del lector sobre la escena. ''He aquí'' conserva mejor esa solemnidad narrativa que una omisión o una forma demasiado coloquial.'
  doctrine_reference: n/a
translation_notes:
  revision_awareness: La POB inglesa pasó de 'who had edema' a 'with dropsy' para reflejar más directamente ὑδρωπικός y evitar un tecnicismo moderno en un registro formal. La versión española sigue esa decisión, pero usa 'hidropesía' como equivalente más natural y tradicional en español bíblico que 'edema', manteniendo la misma tensión entre precisión médica y legibilidad.
  spanish_consistency_notes:
  - Se mantiene 'Y' para καὶ y 'he aquí' para ἰδοὺ, coherentes con la función narrativa observada en la fuente.
  - Se evita 'SEÑOR' u otra terminología teológica no presente; el versículo es descriptivo.
  - '''Hidropesía'' conserva el valor de condición física sin introducir interpretación adicional.'
  - '''Delante de él'' deja abierta la relación espacial/presencial como en el griego.'
