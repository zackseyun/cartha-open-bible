translation:
  language: es
  text: 'Y cuando el siervo[a] volvió, informó de estas cosas a su señor. Entonces el dueño de la casa, enojado, dijo a su siervo: «Sal rápidamente a las plazas y callejones de la ciudad, y trae aquí a los pobres, a los discapacitados[b], a los ciegos y a los cojos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclavo» para δοῦλος; aquí el término se refiere al subordinado doméstico del relato parabólico, por lo que «siervo» también es una traducción fiel y más natural en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «mutilados» para ἀναπείρους.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: BDAG
  rationale: En español, «esclavo» conserva la fuerza lexical de δοῦλος mejor que «siervo». Aunque el inglés POB usó «servant» por el contexto parabólico, en español «siervo» puede suavizar en exceso la relación de dependencia. Aquí el texto mantiene el rol doméstico sin borrar la subordinación implícita.
- source_word: παραγενόμενος
  english_pob_choice: came back
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - vino de vuelta
  lexicon: BDAG
  rationale: El participio indica llegada de retorno en el flujo narrativo. «Volvió» es natural en español y conserva la idea de regreso sin añadir más que el griego.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: informó
  alternatives_spanish:
  - dio cuenta
  - reportó
  - dijo
  lexicon: BDAG
  rationale: «Informó» transmite el acto de comunicar a un superior los hechos previos, con tono narrativo claro y digno.
- source_word: κυρίῳ
  english_pob_choice: lord
  chosen_spanish: señor
  alternatives_spanish:
  - dueño
  - amo
  lexicon: BDAG
  rationale: Como el referente es humano y no divino, «señor» preserva la relación de autoridad sin capitalización devocional. «Dueño» también sería posible, pero «señor» mantiene mejor la continuidad con el campo semántico de κύριος.
- source_word: ὀργισθεὶς
  english_pob_choice: becoming angry
  chosen_spanish: enojado
  alternatives_spanish:
  - airado
  - muy enojado
  - irritado
  lexicon: BDAG
  rationale: El participio describe el estado resultante previo al dicho. «Enojado» es directo y natural en español; no fuerza un matiz más intenso de lo que el contexto exige.
- source_word: οἰκοδεσπότης
  english_pob_choice: master of the house
  chosen_spanish: dueño de la casa
  alternatives_spanish:
  - amo de la casa
  - patrón de la casa
  - jefe de la casa
  lexicon: BDAG
  rationale: El término designa al cabeza de la casa/propietario del hogar. «Dueño de la casa» es idiomático y claro en español, y evita confusión con κύριος, que ya se tradujo como «señor».
- source_word: Ἔξελθε
  english_pob_choice: Go out
  chosen_spanish: Sal
  alternatives_spanish:
  - Sal fuera
  - Ve fuera
  lexicon: BDAG
  rationale: El imperativo compuesto exige movimiento hacia afuera. «Sal» es conciso y natural; el adverbio posterior («rápido») mantiene la urgencia.
- source_word: ταχέως
  english_pob_choice: quickly
  chosen_spanish: rápido
  alternatives_spanish:
  - de prisa
  - pronto
  - velozmente
  lexicon: BDAG
  rationale: «Rápido» funciona aquí adverbialmente en el mandato y preserva la urgencia de la acción.
- source_word: πλατείας
  english_pob_choice: broad streets
  chosen_spanish: plazas anchas
  alternatives_spanish:
  - calles anchas
  - plazas
  - espacios abiertos
  lexicon: BDAG
  rationale: πλατεῖαι puede referirse a calles amplias o plazas públicas. «Plazas anchas» conserva la amplitud urbana y funciona bien en contraste con ῥύμας. Se evita forzar «calles» aquí para mantener el contraste lexical con el término siguiente.
- source_word: ῥύμας
  english_pob_choice: lanes
  chosen_spanish: calles
  alternatives_spanish:
  - callejones
  - angosturas
  - carriles
  lexicon: BDAG
  rationale: ῥύμαι son vías más estrechas o callejones. «Calles» es un equivalente amplio y comprensible en español; la oposición con «plazas anchas» ayuda a sugerir la diferencia de tamaño, aunque no la especifica por completo.
- source_word: πτωχοὺς
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - pobres
  - los necesitados
  lexicon: BDAG
  rationale: Traducción directa del adjetivo substantivado, manteniendo la categoría social del grupo convocado.
- source_word: ἀναπείρους
  english_pob_choice: disabled
  chosen_spanish: los discapacitados
  alternatives_spanish:
  - los incapacitados
  - los inválidos
  - los cojos
  lexicon: BDAG
  rationale: El término alude a personas con impedimento físico. «Discapacitados» es claro en español contemporáneo y evita el posible tono despectivo de «inválidos» o la estrechez de «cojos». El POB inglés señaló la alternativa «maimed»; en español no se adopta porque podría sugerir lesión corporal específica.
- source_word: τυφλοὺς
  english_pob_choice: blind
  chosen_spanish: los ciegos
  alternatives_spanish:
  - ciegos
  lexicon: BDAG
  rationale: Forma sustantivada natural en español, adecuada dentro de la serie coordinada.
- source_word: χωλοὺς
  english_pob_choice: lame
  chosen_spanish: cojos
  alternatives_spanish:
  - lisiados
  - rengos
  lexicon: BDAG
  rationale: «Cojos» es la traducción más directa y tradicional para χωλοὺς, distinguiéndolo de ἀναπείρους. En español conserva la referencia a dificultad de marcha.
- source_word: εἰσάγαγε
  english_pob_choice: bring in
  chosen_spanish: introduce
  alternatives_spanish:
  - mete
  - trae adentro
  - haz entrar
  lexicon: BDAG
  rationale: El verbo expresa hacer entrar a un lugar. «Introduce» conserva el movimiento direccional con registro digno y preciso.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - acá
  lexicon: BDAG
  rationale: Adverbio locativo simple y natural que mantiene el destino hacia la presencia del hablante.
theological_decisions:
- issue: Cómo traducir δοῦλος en una escena parabólica de dependencia doméstica
  english_pob_reading: servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: Aunque el POB inglés optó por «servant» por claridad narrativa, el griego δοῦλος conserva una relación de dependencia más fuerte. En español, «esclavo» comunica mejor esa fuerza sin suavizar el dato lexical; en esta escena no hay una razón contextual suficiente para rebajarlo a «siervo».
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: Diferenciación entre κύριος y οἰκοδεσπότης
  english_pob_reading: lord / master of the house
  chosen_spanish_reading: señor / dueño de la casa
  alternative_spanish_readings:
  - amo / amo de la casa
  - dueño / patrón
  rationale: 'El texto distingue dos autoridades humanas: κύριος y οἰκοδεσπότης. Traducirlos como «señor» y «dueño de la casa» preserva esa distinción sin introducir capitalización teológica ni fusionar ambos términos en una sola idea.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation philosophy §5'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés sin traducir mecánicamente: conserva la oposición entre δοῦλος y οἰκοδεσπότης, refleja el retorno narrativo de παραγενόμενος y mantiene la secuencia de grupos vulnerables. Se decidió intensificar δοῦλος como «esclavo» por fidelidad léxica en español, mientras que κύριος se dejó como «señor» para un referente humano. No se incorporaron revisiones adicionales porque el pass más reciente indicó que no había cambios necesarios.'
  spanish_consistency_notes:
  - Se usa «señor» en minúscula para κύριος cuando el referente es humano, en continuidad con la decisión teológica del POB.
  - Se distingue «dueño de la casa» de «señor» para evitar confusión entre οἰκοδεσπότης y κύριος.
  - «Discapacitados» se emplea solo para ἀναπείρους en este verso; no implica una normalización para otros contextos donde el griego pueda ser más específico.
  - Las comillas españolas se aplican solo al discurso directo; la puntuación final sigue el uso editorial estándar en español.
