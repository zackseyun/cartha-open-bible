revisions:
- from: 'Y cuando el esclavo[a] volvió, informó de estas cosas a su señor. Entonces el dueño de la casa, enojado, dijo a su esclavo: “Sal rápido a las plazas anchas y a las calles[b] de la ciudad, e introduce aquí a los pobres, a los discapacitados y a los ciegos y cojos.”'
  to: 'Y cuando el siervo[a] volvió, informó de estas cosas a su señor. Entonces el dueño de la casa, enojado, dijo a su siervo: «Sal rápidamente a las plazas y callejones de la ciudad, y trae aquí a los pobres, a los discapacitados[b], a los ciegos y a los cojos»'
  rationale: Se revisa para alinearse mejor con la decisión lexical auditada del POB en contexto parabólico (‘siervo’), restaurar el contraste entre πλατείας y ῥύμας con ‘plazas y callejones’, y mover la nota alternativa al término ἀναπείρους, que sí está documentado en el rastro inglés. También se mejora la naturalidad con ‘rápidamente’ y ‘trae aquí’.
