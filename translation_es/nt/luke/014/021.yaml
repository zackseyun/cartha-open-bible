review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia narrativa y la mayor parte del sentido del griego: el esclavo/siervo vuelve, reporta, el jefe de la casa reacciona con enojo, y se manda salir con urgencia para traer a grupos marginados. Sin embargo, hay dos desajustes relevantes con la evidencia y el rastro POB: (1) δοῦλος aquí fue documentado en el POB inglés como ‘servant’ por el contexto parabólico doméstico, por lo que ‘esclavo’ sobrecarga la escena y se aparta de la decisión auditada sin necesidad contextual suficiente; (2) las vías urbanas quedan mal contrastadas con ‘plazas anchas y calles’, porque ῥύμας apunta a callejuelas/callejones o vías estrechas, y el inglés preservó expresamente el contraste ‘broad streets and lanes’.'
  spanish_quality_summary: 'El español es legible y digno, pero algunos giros pueden mejorarse para naturalidad y precisión: ‘rápido’ funciona coloquialmente, aunque ‘rápidamente’ o ‘de prisa’ suena más pulido; ‘plazas anchas’ resulta algo forzado; ‘introduce aquí’ es comprensible, pero ‘trae aquí’ o ‘haz entrar aquí’ suena más idiomático en este contexto. La oración revisada mejora claridad urbana y registro narrativo sin alejarse del original.'
  glossary_alignment: Alineación parcial. ‘señor’ para κύριος humano y ‘dueño de la casa’ para οἰκοδεσπότης respetan la distinción. Pero el proyecto permite ‘siervo’ con razón contextual, y el POB inglés la documentó explícitamente aquí para δοῦλος en esta parábola; por eso conviene ‘siervo’ en español en vez de ‘esclavo’. No hay términos teológicos mayores comprometidos.
  issues:
  - severity: medium
    issue: δοῦλος traducido como «esclavo» en vez de «siervo» en este contexto parabólico
    rationale: Aunque δοῦλος suele inclinar a ‘esclavo’, la auditoría inglesa justificó ‘servant’ porque aquí lo relevante es el papel doméstico dentro de la parábola, no el estatus servil como punto teológico. En español ‘siervo’ preserva subordinación y encaja mejor con la decisión documentada.
  - severity: medium
    issue: Contraste urbano insuficiente en «plazas anchas y calles»
    rationale: πλατείας y ῥύμας forman un par contrastivo. El borrador solo marca amplitud en el primer término pero neutraliza el segundo con ‘calles’. ‘Plazas y calles’ o mejor ‘calles principales y callejones’/‘plazas y callejuelas’ preserva mejor la oposición.
  - severity: low
    issue: La nota b está anclada en el término equivocado
    rationale: La nota actual comenta una alternativa para πλατείας, pero el rastro inglés conserva nota sobre ἀναπείρους (‘disabled’ / ‘maimed’). La nota española debería reflejar esa alternativa léxica documentada, no crear otra menos necesaria.
  - severity: low
    issue: «introduce aquí» suena menos idiomático que otras opciones
    rationale: εἰσάγαγε significa hacer entrar/traer adentro. En español narrativo, ‘trae aquí’ o ‘haz entrar aquí’ comunica mejor el mandato sin rigidez.
  revised_spanish_text: 'Y cuando el siervo[a] volvió, informó de estas cosas a su señor. Entonces el dueño de la casa, enojado, dijo a su siervo: «Sal rápidamente a las plazas y callejones de la ciudad, y trae aquí a los pobres, a los discapacitados[b], a los ciegos y a los cojos»'
  revised_footnotes:
