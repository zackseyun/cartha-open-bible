translation:
  language: es
  text: La sal, entonces, es buena; pero si incluso la sal se vuelve insípida[a], ¿con qué se sazonará?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si la sal pierde su sabor». El verbo griego puede significar literalmente «volverse necia», pero aquí se refiere a la sal que se vuelve insípida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καλὸν
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - útil
  - excelente
  lexicon: BDAG
  rationale: El griego καλός evalúa positivamente la sal en sentido general. En español, «buena» conserva esa valoración natural sin volverla demasiado técnica ni añadir una matización que el contexto no exige.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: οὖν expresa inferencia o continuidad discursiva. «Entonces» comunica esa transición de manera fluida y clara en español, sin cargar el tono.
- source_word: ἅλας
  english_pob_choice: salt
  chosen_spanish: sal
  alternatives_spanish:
  - sal de mesa
  lexicon: BDAG
  rationale: El término es literal y proverbial. «Sal» preserva la imagen sin explicarla ni especificarla indebidamente.
- source_word: ἐὰν δὲ καὶ
  english_pob_choice: but if even
  chosen_spanish: pero si aun
  alternatives_spanish:
  - pero si incluso
  - y si aun
  lexicon: BDAG
  rationale: La combinación introduce contraste y énfasis. «Pero si aun» conserva ambas fuerzas en un español natural; «aun» refleja el καί enfático sin suavizar el argumento.
- source_word: μωρανθῇ
  english_pob_choice: becomes tasteless
  chosen_spanish: se vuelve insípida
  alternatives_spanish:
  - pierde el sabor
  - se hace sosa
  - se vuelve tonta
  lexicon: BDAG
  rationale: Aunque μωραίνω puede significar literalmente «volverse necio», aquí aplicado a la sal significa volverse insípida o sin sabor. «Se vuelve insípida» preserva el sentido idiomático y evita introducir la acepción literal que no encaja en el contexto.
- source_word: ἐν τίνι
  english_pob_choice: with what
  chosen_spanish: ¿con qué?
  alternatives_spanish:
  - ¿por medio de qué?
  - ¿con qué medio?
  lexicon: BDAG
  rationale: La pregunta instrumental en español se expresa de forma más natural con «con qué». Mantiene el valor de medio o instrumento que requiere la imagen culinaria.
- source_word: ἀρτυθήσεται
  english_pob_choice: will it be seasoned
  chosen_spanish: se sazonará
  alternatives_spanish:
  - será sazonada
  - se condimentará
  lexicon: BDAG
  rationale: ἀρτύω significa sazonar o dar sazón. «Se sazonará» conserva el campo culinario y suena idiomático en español. El femenino concuerda con «la sal».
theological_decisions:
- issue: Conservar la ambigüedad proverbial de la imagen de la sal
  english_pob_reading: Retain the proverb literally without explicating its discipleship meaning in the translation.
  chosen_spanish_reading: Mantener la imagen literal de la sal sin desarrollar en el texto principal la aplicación a los discípulos.
  alternative_spanish_readings:
  - si los discípulos pierden su distintividad...
  - si la sal pierde su función...
  rationale: El verso presenta una imagen proverbial cuya aplicación depende del contexto inmediato. En español conviene preservar esa tensión metafórica en vez de resolverla interpretativamente dentro del versículo.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y no introduce expansiones interpretativas. Se conserva el valor proverbial de la frase, la fuerza enfática de καί en «aun», y la metáfora culinaria de ἀρτύω mediante «sazonará».
  spanish_consistency_notes:
  - Se evitó «Cristo» o terminología doctrinal ajena porque el versículo no la contiene.
  - Se eligió «insípida» en lugar de «tonta» para reflejar el sentido contextual de μωρανθῇ sin perder la nota léxica en la nota al pie.
  - Se usó «sal» y no «sal de mesa» para mantener la literalidad y la generalidad proverbial del pasaje.
  - La concordancia femenina en «insípida» y «sazonará» sigue naturalmente a «la sal».
