revisions:
- from: Y serás bienaventurado[a], porque no pueden recompensarte; porque se te recompensará[b] en la resurrección de los justos.
  to: Y serás bendecido[a], porque no pueden recompensarte; pues se te recompensará[b] en la resurrección de los justos.
  rationale: 'La revisión hace dos ajustes menores y seguros: reemplaza «bienaventurado» por «bendecido» para mejorar la naturalidad y claridad en español contemporáneo sin perder el peso de μακάριος, y cambia el segundo conector a «pues» para reflejar mejor el valor explicativo de γάρ en una frase española más fluida. No se altera el contenido teológico ni la estructura esencial del versículo.'
