translation:
  language: es
  text: Y serás bendecido[a], porque no pueden recompensarte; pues se te recompensará[b] en la resurrección de los justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «bienaventurado». El griego usa μακάριος, término que puede expresar bendición, bienaventuranza o dicha en sentido declarativo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la resurrección de los justos». El griego ἐν τῇ ἀναστάσει puede entenderse de modo temporal («en / al momento de») o locativo («en»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριος
  english_pob_choice: blessed
  chosen_spanish: bienaventurado
  alternatives_spanish:
  - bendecido
  - feliz
  lexicon: BDAG
  rationale: «Bienaventurado» comunica bien el valor declarativo y escatológico de μακάριος en labios de Jesús. «Feliz» suena demasiado subjetivo y «bendecido» es correcto, pero en español puede perder el matiz proverbial y solemne que conviene aquí.
- source_word: ἔσῃ
  english_pob_choice: you will be
  chosen_spanish: serás
  alternatives_spanish:
  - estarás
  lexicon: BDAG
  rationale: El futuro de εἰμί se expresa naturalmente con «serás» cuando funciona como cópula con un predicado adjetival. «Estarás» no conserva tan bien el valor de identidad/estado proclamado por el adjetivo.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la causa de la bienaventuranza; «porque» es la forma más clara y natural en español para ese valor causal.
- source_word: οὐκ ἔχουσιν ἀνταποδοῦναί σοι
  english_pob_choice: they cannot repay you
  chosen_spanish: no pueden recompensarte
  alternatives_spanish:
  - no tienen cómo recompensarte
  - no pueden pagarte
  lexicon: BDAG
  rationale: La construcción griega expresa incapacidad o falta de medios para devolver algo. «No pueden recompensarte» reproduce esa fuerza de manera directa y natural; «no tienen cómo recompensarte» explicita el sentido pero añade más palabras, y «pagarte» podría sonar demasiado comercial en este contexto.
- source_word: ἀνταποδοθήσεται
  english_pob_choice: you will be repaid
  chosen_spanish: se te recompensará
  alternatives_spanish:
  - serás recompensado
  - se te pagará
  lexicon: BDAG
  rationale: El pasivo futuro se rinde con una construcción impersonal/pasiva natural en español. «Se te recompensará» preserva la idea de retribución sin imponer un tono monetario que «pagar» podría sugerir.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: 'Aunque en inglés POB se traduce con «for», en español la mejor conexión explicativa en este versículo es también causal: la segunda cláusula fundamenta la primera. «Porque» mantiene la relación lógica con claridad.'
- source_word: ἐν τῇ ἀναστάσει
  english_pob_choice: at the resurrection
  chosen_spanish: en la resurrección
  alternatives_spanish:
  - al tiempo de la resurrección
  - cuando ocurra la resurrección
  lexicon: BDAG
  rationale: Se conserva la preposición «en» de forma transparente, dado que el griego usa ἐν. Aunque en español puede sonar temporalmente más natural «en la resurrección» que «at the resurrection» en inglés, la frase sigue siendo comprensible y fiel.
- source_word: τῶν δικαίων
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos y rectos
  lexicon: BDAG
  rationale: «Justos» es la opción más estable y bíblicamente reconocible para δίκαιος en plural sustantivado. «Rectos» es posible, pero en este contexto perdería parte del peso moral-teológico del término.
theological_decisions:
- issue: Naturaleza de la recompensa futura
  english_pob_reading: Rendered straightforwardly as a future resurrection associated with the righteous, without importing a more detailed eschatological scheme.
  chosen_spanish_reading: Se expresa como una recompensa futura vinculada a la resurrección de los justos, sin precisar más el orden o la cronología escatológica.
  alternative_spanish_readings:
  - una recompensa en una resurrección general de los justos
  - una resurrección distinta o previa de los justos
  rationale: El texto afirma con claridad una retribución futura ligada a la resurrección, pero no exige resolver debates escatológicos más amplios. La formulación española conserva esa tensión y evita añadir una cronología no explicitada por el pasaje.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que prefirió la forma más directa «cannot repay you» frente a una ampliación explicativa. Por eso el español evita paráfrasis como «no tienen los medios para» y opta por una formulación breve y natural que conserva la incapacidad expresa del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se eligió «bienaventurado» para μακάριος por su valor declarativo y eclesial, manteniendo el tono de Jesús sin sonar anticuado.
  - Se conserva una estructura paralela entre la imposibilidad de retribución humana y la retribución divina futura.
  - La puntuación con punto y coma ayuda a reflejar la relación explicativa de γάρ sin hacer la frase pesada.
