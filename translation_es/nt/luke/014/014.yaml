review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: una bienaventuranza futura, la incapacidad de los invitados para corresponder, y la recompensa futura en la resurrección de los justos. Sin embargo, la cláusula principal usa «bienaventurado», que en español actual eclesial es comprensible pero más arcaizante y menos natural que «bendecido» en este contexto, especialmente dado que el POB inglés escogió «blessed» y ofreció la alternativa, no al revés. Además, la doble secuencia «porque ...; porque ...» suena pesada en español; conviene conservar la relación explicativa de γάρ con «pues» o «porque» de forma más idiomática.'
  spanish_quality_summary: 'El texto es claro y fiel, pero necesita un ajuste menor de naturalidad y estilo: «serás bendecido» fluye mejor que «serás bienaventurado» en español latinoamericano neutral, manteniendo el peso semántico sin sonar excesivamente formulaico. También mejora la lectura cambiar el segundo «porque» por «pues». El resto —«no pueden recompensarte» y «en la resurrección de los justos»— es sólido y legible.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Justos» para δικαίων es adecuado. «Recompensarte / se te recompensará» preserva bien la reciprocidad de ἀνταποδοῦναί / ἀνταποδοθήσεται. La principal excepción recomendada es preferir «bendecido» sobre «bienaventurado» para μακάριος aquí por claridad y naturalidad en español, sin pérdida teológica.
  issues:
  - severity: medium
    issue: «bienaventurado» suena más rígido y menos natural que «bendecido» en este versículo
    rationale: Aunque «bienaventurado» puede ser correcto para μακάριος, en esta construcción futura («serás ...») resulta menos idiomático en español actual. «Bendecido» preserva mejor el sentido declarativo de blessed sin la rigidez tradicionalista.
  - severity: low
    issue: La repetición de «porque» en ambas cláusulas reduce la fluidez
    rationale: El primer ὅτι es causal y se traduce bien «porque»; el γάρ explicativo posterior se expresa con más naturalidad en español como «pues» tras punto y coma.
  - severity: low
    issue: La nota al pie sobre μακάριος queda invertida respecto de la mejor opción española
    rationale: Si se adopta «bendecido» en el texto, «bienaventurado» debe pasar a ser alternativa, manteniendo la explicación semántica.
  revised_spanish_text: Y serás bendecido[a], porque no pueden recompensarte; pues se te recompensará[b] en la resurrección de los justos.
