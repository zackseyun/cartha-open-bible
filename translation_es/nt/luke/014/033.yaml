revisions:
- from: Así pues, todo el que entre ustedes[a] no renuncia a todas sus propias posesiones[b] no puede ser mi discípulo.
  to: Así pues, cada uno de ustedes que no renuncia a todos sus bienes[a] no puede ser mi discípulo.
  rationale: Se ajusta la redacción para un español más natural y fiel al distributivo del griego («cada uno de ustedes»). Se sustituye «sus propias posesiones» por «sus bienes», que suena más idiomático en español y conserva el sentido de ὑπάρχουσιν en este contexto. Se elimina la nota de género por innecesaria en la formulación revisada y se conserva la nota léxica útil sobre la alternativa «todo lo que tiene» y el matiz de ἀποτάσσεται.
