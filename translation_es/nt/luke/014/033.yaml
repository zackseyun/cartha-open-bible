base_translation:
  language: en
  yaml_path: translation/nt/luke/014/033.yaml
  text: So then[b][a], every one of you who does not renounce all his own possessions cannot be my disciple.
  footnotes:
  - marker: a
    text: Or 'does not give up all that he has.' The Greek verb can mean 'say farewell to' and here conveys renouncing one's claim to possessions.
    reason: lexical_alternative
  - marker: b
    text: The Greek uses a masculine singular form ('his own') in a generic sense, applying to every disciple.
    reason: lexical_alternative
