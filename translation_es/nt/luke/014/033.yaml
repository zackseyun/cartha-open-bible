translation:
  language: es
  text: Así pues, cada uno de ustedes que no renuncia a todos sus bienes[a] no puede ser mi discípulo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «a todo lo que tiene» o «a todo cuanto posee». El verbo griego puede implicar «despedirse de» en el sentido de renunciar a un derecho o apego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως οὖν
  english_pob_choice: So then
  chosen_spanish: Así pues
  alternatives_spanish:
  - Por tanto
  - De modo que
  - Entonces
  lexicon: BDAG
  rationale: La combinación inferencial de οὕτως + οὖν pide una conexión conclusiva con el contexto anterior. «Así pues» conserva esa relación discursiva en un español natural y solemne.
- source_word: πᾶς ἐξ ὑμῶν
  english_pob_choice: every one of you
  chosen_spanish: todo el que entre ustedes
  alternatives_spanish:
  - cada uno de ustedes
  - toda persona entre ustedes
  lexicon: BDAG
  rationale: La frase es distributiva e individualiza la exigencia para cada oyente. «Todo el que entre ustedes» expresa bien ese valor sin sonar forzado en español.
- source_word: ὃς οὐκ ἀποτάσσεται
  english_pob_choice: who does not renounce
  chosen_spanish: no renuncia
  alternatives_spanish:
  - no se despide de
  - no deja
  - no se desprende de
  lexicon: BDAG
  rationale: ἀποτάσσομαι puede significar literalmente «despedirse» o «tomar leave», pero aquí el contexto de discipulado y posesiones exige el valor de renuncia. «No renuncia» comunica la decisión de desistir del derecho o reclamo sobre las posesiones.
- source_word: πᾶσιν τοῖς ἑαυτοῦ ὑπάρχουσιν
  english_pob_choice: all his own possessions
  chosen_spanish: a todas sus propias posesiones
  alternatives_spanish:
  - a todo lo que posee
  - a todos sus bienes
  - a todas sus pertenencias
  lexicon: BDAG
  rationale: ὑπάρχοντα/ὑπάρχουσιν apunta a bienes o posesiones. «Posesiones» es más preciso que un genérico, y «propias» refleja ἑαυτοῦ. Se mantiene el alcance total de πᾶσιν.
- source_word: οὐ δύναται εἶναί μου μαθητής
  english_pob_choice: cannot be my disciple
  chosen_spanish: no puede ser mi discípulo
  alternatives_spanish:
  - no es capaz de ser mi discípulo
  - no puede llegar a ser mi discípulo
  lexicon: BDAG
  rationale: La construcción expresa imposibilidad, no solo impropiedad. «No puede ser mi discípulo» conserva la fuerza de οὐ δύναται εἶναι y es idiomático en español.
- source_word: μαθητής
  english_pob_choice: disciple
  chosen_spanish: discípulo
  alternatives_spanish:
  - seguidor
  - aprendiz
  lexicon: BDAG
  rationale: «Discípulo» es el término establecido en el ámbito evangélico y preserva la dimensión relacional y formativa del seguimiento de Jesús.
- source_word: ἑαυτοῦ
  english_pob_choice: his own
  chosen_spanish: sus propias
  alternatives_spanish:
  - las suyas
  - de él
  lexicon: BDAG
  rationale: El griego usa singular masculino genérico. En español, «sus propias» mantiene la fuerza distributiva y evita un masculino singular poco natural en este contexto, sin alterar el sentido inclusivo.
theological_decisions:
- issue: Alcance de la exigencia respecto de las posesiones
  english_pob_reading: Renounce all his own possessions, understood as relinquishing claim or allegiance rather than necessarily mandating literal disposal in every case.
  chosen_spanish_reading: Renunciar a todas sus propias posesiones, entendido como abandonar el reclamo o la lealtad sobre ellas, no necesariamente como exigir su disposición material en todo caso.
  alternative_spanish_readings:
  - Dejar todas sus posesiones
  - Vender todas sus posesiones
  rationale: El verbo y el contexto apuntan a una renuncia decisiva, severa, al dominio de las posesiones sobre el discípulo. La traducción conserva esa tensión sin resolverla en una regla económica universal que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica sin suavizar el llamado radical al discipulado.
translation_notes:
  revision_awareness: Texto revisado a la luz del contexto inmediato y del audit trail inglés. Se mantuvo la lectura conclusiva de οὕτως οὖν, la fuerza de imposibilidad en οὐ δύναται, y la tensión entre una renuncia total y la posibilidad de entender el verbo como abandono de reclamo más que desposesión literal.
  spanish_consistency_notes:
  - Se usó «discípulo» para μαθητής, conforme al uso evangélico estándar y a la decisión auditada en inglés.
  - Se mantuvo «posesiones» para ὑπάρχουσιν, evitando un genérico excesivo.
  - Se evitó traducir con «SEÑOR» o terminología eclesiástica no presente en el texto.
  - La nota sobre el masculino singular se adaptó al español para no forzar un singular genérico poco natural.
