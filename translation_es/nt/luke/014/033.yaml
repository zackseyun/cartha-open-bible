  glossary_alignment: No hay conflictos con la terminología base del proyecto. «discípulo» está bien. «Renuncia» preserva correctamente ἀποτάσσεται según la decisión inglesa y la rationale teológica. Se mantiene la severidad del llamado sin convertirlo en mandato explícito de venta o desposesión material en todos los casos.
