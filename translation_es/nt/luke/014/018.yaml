translation:
  language: es
  text: 'Pero todos comenzaron a excusarse por igual[a]. El primero le dijo: «He comprado un campo, y necesito salir a verlo. Te pido, considérame excusado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente, «de uno»; un modismo que significa «todos juntos», «al mismo tiempo» o «por igual». O: «comenzaron a poner excusas». El verbo griego puede denotar declinar una invitación mediante una excusa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἤρξαντο ἀπὸ μιᾶς ⸂πάντες παραιτεῖσθαι⸃
  english_pob_choice: But they all alike began to excuse themselves
  chosen_spanish: Pero todos, de común acuerdo, comenzaron a excusarse
  alternatives_spanish:
  - y todos comenzaron a excusarse
  - pero todos, al mismo tiempo, comenzaron a excusarse
  - pero todos, con un mismo impulso, comenzaron a excusarse
  lexicon: BDAG; SBLGNT
  rationale: El griego combina la idea de inicio de una acción colectiva con el giro idiomático ἀπὸ μιᾶς, que en el POB inglés se toma como fuerza colectiva ('alike'). 'De común acuerdo' comunica bien el valor idiomático de unidad sin forzar una fórmula litúrgica ni perder la nota de acción conjunta. 'Comenzaron a excusarse' conserva el matiz reflexivo de παραιτεῖσθαι.
- source_word: ὁ πρῶτος
  english_pob_choice: The first
  chosen_spanish: El primero
  alternatives_spanish:
  - El primero de ellos
  - El primero que habló
  lexicon: BDAG
  rationale: Es la traducción directa del sustantivado ordinal, introduciendo al primer orador de la serie.
- source_word: Ἀγρὸν ἠγόρασα
  english_pob_choice: I have bought a field
  chosen_spanish: He comprado un campo
  alternatives_spanish:
  - Compré un campo
  - He adquirido un campo
  - He comprado un terreno
  lexicon: BDAG
  rationale: ἀγρός es 'campo' en sentido más directo y frecuente. 'Terreno' sería más general, pero 'campo' mantiene mejor la imagen concreta del texto. El perfecto español comunica la compra hecha con relevancia presente, como en el inglés POB.
- source_word: ἔχω ἀνάγκην
  english_pob_choice: I need
  chosen_spanish: necesito
  alternatives_spanish:
  - tengo necesidad de
  - me es necesario
  lexicon: BDAG
  rationale: La expresión idiomática se vierte de forma natural con 'necesito', que preserva la fuerza de necesidad sin un calco rígido.
- source_word: ἐξελθὼν ἰδεῖν αὐτόν
  english_pob_choice: to go out and see it
  chosen_spanish: salir y verlo
  alternatives_spanish:
  - salir para verlo
  - ir a verlo
  - salir a examinarlo
  lexicon: BDAG
  rationale: El participio y el infinitivo expresan acción concomitante o de finalidad. 'Salir y verlo' es natural en español y conserva la secuencia verbal. Se usa 'lo' para referir el campo.
- source_word: ἐρωτῶ σε
  english_pob_choice: I ask you
  chosen_spanish: Te ruego
  alternatives_spanish:
  - te pido
  - te suplico
  - te ruego que
  lexicon: BDAG
  rationale: Aunque el verbo básico es 'pedir/preguntar', en la fórmula de cortesía la petición suena con más fuerza y naturalidad en español con 'te ruego', sin añadir contenido ajeno.
- source_word: ἔχε με παρῃτημένον
  english_pob_choice: consider me excused
  chosen_spanish: considérame excusado
  alternatives_spanish:
  - tenme por excusado
  - considera que quedo excusado
  - déjame por excusado
  lexicon: BDAG
  rationale: La expresión es idiomática; 'considérame excusado' mantiene el valor de resultar aceptado como dispensado/exceptuado. 'Excusado' conserva la correspondencia con el campo semántico de παραιτέομαι.
- source_word: καί
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: Al inicio de la respuesta narrada, 'pero' refleja mejor el giro adversativo que introduce la negativa frente a la invitación previa.
theological_decisions:
- issue: Valor del rechazo de la invitación en la parábola
  english_pob_reading: The guests' excuses are presented as a refusal to accept the invitation.
  chosen_spanish_reading: Las excusas se presentan como una negativa a aceptar la invitación.
  alternative_spanish_readings:
  - Las excusas se presentan como simples razones para posponer la respuesta.
  - Las excusas se presentan como una declinación de la invitación.
  rationale: El verbo παραιτεῖσθαι admite tanto 'excusarse' como 'rechazar/declinar'. Mantener 'excusarse' en la traducción preserva la tensión entre la forma cortés y la realidad del rechazo, tal como lo hace el POB inglés con 'excuse themselves'.
  doctrine_reference: Lucas 14:16-24; parábola del gran banquete
translation_notes:
  revision_awareness: Se revisó el contexto inmediato y el audit trail inglés. No se detectaron cambios posteriores aplicados; la redacción sigue de cerca la decisión óptima-equivalente del POB inglés, pero con español natural y auditable.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se prefirió 'excusarse/excusado' para conservar la relación léxica con παραιτέομαι y la ambigüedad entre cortesía y rechazo.
  - '''Campo'' se eligió por ser el equivalente más directo de ἀγρός; no se amplió a ''finca'' o ''terreno'' sin necesidad contextual.'
  - La puntuación sigue la norma española con comillas angulares para el discurso directo.
