translation:
  language: es
  text: Pero siempre que hagas un banquete[a], invita a los pobres, a los lisiados[b], a los cojos y a los ciegos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'siempre que hagas una fiesta' o 'siempre que ofrezcas una recepción'.
    reason: lexical_alternative
  - marker: b
    text: O 'los tullidos' o 'los impedidos' para ἀναπείρους. El término griego se refiere a personas con impedimentos físicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Más bien
  lexicon: BDAG
  rationale: Conecta la instrucción en contraste con la prohibición anterior. 'Pero' es la equivalencia adversativa más natural y concisa en español.
- source_word: ὅταν
  english_pob_choice: whenever
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: BDAG
  rationale: El griego introduce una cláusula temporal indefinida con valor iterativo. En español, 'cuando' comunica bien la condición temporal general sin sonar forzado; la iteración queda implícita por el contexto y por el futuro exhortativo.
- source_word: δοχὴν ποιῇς
  english_pob_choice: you give a banquet
  chosen_spanish: hagas un banquete
  alternatives_spanish:
  - hagas una fiesta
  - ofrezcas un banquete
  - hagas una recepción
  lexicon: BDAG
  rationale: La expresión idiomática apunta a un acto de hospitalidad formal. 'Hagas un banquete' conserva el sentido de celebración/convite sin depender de una formulación demasiado técnica.
- source_word: κάλει
  english_pob_choice: invite
  chosen_spanish: invita
  alternatives_spanish:
  - llama
  - convoca
  lexicon: BDAG
  rationale: En este contexto, καλέω significa invitar a una comida, no simplemente llamar. 'Invita' es el equivalente directo y natural.
- source_word: πτωχούς
  english_pob_choice: the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - a los necesitados
  - a los pobres de la sociedad
  lexicon: BDAG
  rationale: Adjetivo sustantivado que designa una clase de personas. 'Los pobres' preserva la referencia de grupo y la tersa enumeración del griego.
- source_word: ἀναπείρους
  english_pob_choice: the crippled
  chosen_spanish: a los lisiados
  alternatives_spanish:
  - a los discapacitados
  - a los impedidos
  - a los tullidos
  lexicon: BDAG
  rationale: El término refiere a personas con impedimentos físicos. 'Lisiados' refleja esa fuerza concreta y distingue este grupo del siguiente ('cojos'), manteniendo la distinción semántica del texto fuente.
- source_word: χωλούς
  english_pob_choice: the lame
  chosen_spanish: a los cojos
  alternatives_spanish:
  - a los mancos
  - a los rengos
  - a los que cojean
  lexicon: BDAG
  rationale: Es el término habitual para quienes tienen dificultad al caminar. 'Cojos' conserva la correspondencia tradicional y la distinción con ἀναπείρους.
- source_word: τυφλούς
  english_pob_choice: the blind
  chosen_spanish: a los ciegos
  alternatives_spanish:
  - a los invidentes
  - a los ciegos
  lexicon: BDAG
  rationale: Adjetivo sustantivado estándar; 'a los ciegos' es claro, conciso y fiel.
theological_decisions:
- issue: Lista de personas marginadas y tono social de la instrucción
  english_pob_reading: Use class terms ('the poor, the crippled, the lame, the blind') that preserve the Greek list structure and social categories in view.
  chosen_spanish_reading: 'Se mantiene una lista breve de grupos sociales y corporales: ''los pobres, los cojos, los lisiados y los ciegos''.'
  alternative_spanish_readings:
  - los pobres, los discapacitados, los lisiados y los ciegos
  - los pobres, los tullidos, los cojos y los ciegos
  rationale: La frase no formula una doctrina sobre identidad, sino una exhortación a incluir a quienes suelen quedar fuera. La enumeración conserva el paralelismo del griego y evita diluir la distinción entre ἀναπείρους y χωλούς.
  doctrine_reference: Translation philosophy points 5 and 6
- issue: Diferencia entre ἀναπείρους y χωλούς
  english_pob_reading: Replaced 'the disabled' with 'the crippled' to more closely reflect ἀναπείρους and preserve the distinct list of categories in the Greek.
  chosen_spanish_reading: '''Lisiados'' para ἀναπείρους y ''cojos'' para χωλούς, conservando dos categorías distintas.'
  alternative_spanish_readings:
  - '''discapacitados'' y ''cojos'''
  - '''tullidos'' y ''cojos'''
  rationale: El griego distingue entre un término más general de impedimento físico y otro más específico para dificultad al andar. 'Lisiados' mantiene esa diferencia en español y evita fusionar ambas categorías.
  doctrine_reference: Lexical distinction in the Greek source
translation_notes:
  revision_awareness: La revisión inglesa ajustó ἀναπείρους desde 'the disabled' a 'the crippled' para reflejar mejor la distinción léxica del griego respecto de χωλούς. La versión española sigue esa misma sensibilidad al usar 'lisiados' para ἀναπείρους y 'cojos' para χωλούς, evitando una traducción que los colapse en una sola categoría.
  spanish_consistency_notes:
  - Se mantiene 'banquete' como equivalente principal de δοχήν, en línea con la opción inglesa más idiomática.
  - 'Se conserva la secuencia de cuatro grupos humanos y su orden fuente: pobres, lisiados, cojos, ciegos.'
  - Se evita 'SEÑOR' u otro término teológico no pertinente; el versículo no contiene nombres divinos ni cristológicos.
