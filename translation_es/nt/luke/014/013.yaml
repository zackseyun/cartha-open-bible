  - severity: low
    issue: Puntuación poco natural en la enumeración.
    rationale: En español general no hace falta coma antes de 'y' en una lista simple.
  revised_spanish_text: Pero siempre que hagas un banquete[a], invita a los pobres, a los lisiados[b], a los cojos y a los ciegos.
