  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del griego: fórmula narrativa lucana, entrada en la casa de un dirigente fariseo, contexto sabático, modismo ''comer pan'' y observación atenta de Jesús. Sin embargo, hay un problema de anclaje de notas: la nota sobre ''observando/vigilando'' está colocada sobre ''pan'' en vez de sobre la frase de observación. Además, ''en sábado'' es comprensible pero menos natural y menos alineado con el inglés auditado que ''en el sábado''.'
  spanish_quality_summary: El español es claro y digno, pero la puntuación con comas alrededor de 'en sábado' suena algo trabada. 'Al entrar él' funciona, aunque 'cuando él entró' o 'al entrar él' ambos son aceptables; no requiere cambio. La principal mejora necesaria es reubicar la nota [b] al verbo de observación y pulir ligeramente la fluidez.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. 'Fariseos', 'casa' y 'pan' están bien. 'Jefes de los fariseos' es aceptable para ἀρχόντων, aunque 'dirigentes' también sería viable. No hay conflicto con Yahvé/Mesías/Cristo u otras políticas terminológicas globales.
  issues:
  - severity: medium
    issue: La nota [b] está anclada en 'pan' en lugar de en la frase 'lo estaban observando con atención'.
    rationale: La nota b explica παρατηρούμενοι ('observando/vigilando'), no φαγεῖν ἄρτον ('comer pan'). Según las reglas del proyecto, el marcador debe aparecer exactamente en la palabra o frase pertinente.
  - severity: low
    issue: La secuencia con comas '..., en sábado, para comer pan...' suena algo menos natural en español.
    rationale: No es infiel, pero 'en el sábado para comer pan' o 'en sábado para comer pan' sin comas innecesarias mejora la fluidez narrativa.
  - severity: low
    issue: '''en sábado'' es idiomáticamente posible, pero menos transparente que ''en el sábado'' para reflejar σαββάτῳ y el audit trail inglés ''on the Sabbath''.'
    rationale: No es error grave, pero una formulación más explícita ayuda a lectores eclesiales generales y se alinea mejor con la decisión documentada.
  revised_spanish_text: Y sucedió que, al entrar él en la casa de uno de los jefes de los fariseos en el sábado para comer pan[a], ellos lo estaban observando con atención[b].
