translation:
  language: es
  text: Y sucedió que, al entrar él en la casa de uno de los jefes de los fariseos en el sábado para comer pan[a], ellos lo estaban observando con atención[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para comer una comida'; literalmente, 'para comer pan'.
    reason: lexical_alternative
  - marker: b
    text: O 'lo estaban vigilando de cerca'; el griego puede implicar una observación sospechosa u hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y pasó que
  lexicon: BDAG
  rationale: La fórmula lucana introductoria se vierte con una expresión natural en español que conserva el carácter narrativo y eventivo sin volverse arcaica.
- source_word: ἐν τῷ ἐλθεῖν αὐτὸν
  english_pob_choice: when he went
  chosen_spanish: al entrar él
  alternatives_spanish:
  - cuando entró él
  - mientras entraba él
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa una relación temporal; en español, 'al entrar' reproduce bien ese valor y suena más natural que una construcción demasiado literal.
- source_word: οἶκόν
  english_pob_choice: house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  - la casa de
  lexicon: BDAG
  rationale: '''Casa'' es el equivalente directo y adecuado para el contexto de una comida ofrecida por un anfitrión.'
- source_word: τινος τῶν ἀρχόντων τῶν Φαρισαίων
  english_pob_choice: one of the rulers of the Pharisees
  chosen_spanish: uno de los jefes de los fariseos
  alternatives_spanish:
  - uno de los gobernantes de los fariseos
  - uno de los dirigentes de los fariseos
  lexicon: BDAG
  rationale: '''ἄρχοντες'' se refiere a figuras principales o dirigentes; ''jefes'' comunica esa función de liderazgo sin introducir un matiz político más fuerte que el del contexto.'
- source_word: σαββάτῳ
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - el día de reposo
  - en el sábado
  lexicon: BDAG
  rationale: El dativo temporal se expresa de forma natural con 'en sábado'. Aunque 'Sabbath' es el trasfondo judío, en español la forma más idiomática y clara aquí es temporal.
- source_word: φαγεῖν ἄρτον
  english_pob_choice: to eat bread
  chosen_spanish: para comer pan
  alternatives_spanish:
  - para tomar una comida
  - para cenar
  lexicon: BDAG
  rationale: Se conserva la literalidad del giro 'comer pan', que en griego funciona como modismo para tomar una comida. Esto mantiene visible la expresión de la fuente sin perder inteligibilidad.
- source_word: παρατηρούμενοι
  english_pob_choice: watching him closely
  chosen_spanish: lo estaban observando con atención
  alternatives_spanish:
  - lo vigilaban de cerca
  - lo estaban siguiendo con la mirada
  lexicon: BDAG
  rationale: '''Observando con atención'' preserva la idea de vigilancia atenta sin decidir de antemano si era mera curiosidad o una hostilidad más marcada.'
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: BDAG
  rationale: El pronombre enfático se puede reflejar con 'ellos' en español, manteniendo el sujeto explícito sin forzar una redundancia.
theological_decisions:
- issue: Posible hostilidad implícita en la observación de Jesús por parte de los fariseos
  english_pob_reading: they were watching him closely
  chosen_spanish_reading: lo estaban observando con atención
  alternative_spanish_readings:
  - lo vigilaban de cerca
  - lo espiaban
  rationale: El participio griego puede sugerir vigilancia sospechosa, pero el verso por sí solo no declara motivación hostil. La redacción española conserva la tensión narrativa sin exagerarla.
  doctrine_reference: Preservar la tensión textual sin resolverla prematuramente.
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la revisión inglesa más reciente y no requiere cambios sustanciales; se mantiene la solución óptima-equivalente con ligera adaptación al español natural.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé/Mesías' como norma general del proyecto, aunque este versículo no los contiene.
  - '''Jefes'' se eligió para ἀρχόντων por naturalidad y por su valor de liderazgo, evitando una especificación política ajena al contexto.'
  - Se conserva la metáfora literal 'comer pan' en el texto principal y se explicita su carácter idiomático en la nota.
  - La observación de los fariseos queda intencionalmente ambigua entre atención, vigilancia o posible sospecha, conforme al audit trail inglés.
