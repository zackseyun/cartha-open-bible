- from: Y sucedió que, al entrar él en la casa de uno de los jefes de los fariseos, en sábado, para comer pan[a][b], ellos lo estaban observando con atención.
  to: Y sucedió que, al entrar él en la casa de uno de los jefes de los fariseos en el sábado para comer pan[a], ellos lo estaban observando con atención[b].
  rationale: Se conserva el sentido del borrador, pero se corrige el anclaje de la nota [b] para que corresponda a παρατηρούμενοι, y se suaviza la puntuación para una lectura más natural. También se ajusta 'en sábado' a 'en el sábado' para reflejar con más claridad la referencia temporal sabática del original y del audit trail inglés, sin cambiar el contenido.
