translation:
  language: es
  text: Pero ellos guardaron silencio[a]. Y, tomándolo, lo sanó y lo despidió[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “se quedaron callados” o “no dijeron nada”.
    reason: lexical_alternative
  - marker: b
    text: O “lo dejó ir” o “lo soltó”.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Pero los presentes
  lexicon: BDAG
  rationale: οἱ es un artículo sustantivado que retoma a los interlocutores previos; en español, "ellos" evita una repetición pesada del antecedente y conserva el contraste adversativo de δέ con "Pero".
- source_word: ἡσύχασαν
  english_pob_choice: kept silent
  chosen_spanish: se quedaron callados
  alternatives_spanish:
  - guardaron silencio
  - no dijeron nada
  - estuvieron callados
  lexicon: BDAG
  rationale: El aoristo de ἡσυχάζω aquí expresa que no respondieron. "Se quedaron callados" comunica bien la ausencia de respuesta y suena natural en español, manteniendo la fuerza narrativa del silencio.
- source_word: ἐπιλαβόμενος
  english_pob_choice: taking hold of
  chosen_spanish: tomando
  alternatives_spanish:
  - tomando por el brazo
  - agarrando
  - tomándolo
  lexicon: BDAG
  rationale: El participio medio de ἐπιλαμβάνομαι indica una acción física de tomar o agarrar. "Tomando" conserva esa acción sin añadir un detalle no explicitado por el griego sobre la parte del cuerpo o la manera exacta.
- source_word: ἰάσατο
  english_pob_choice: healed
  chosen_spanish: lo sanó
  alternatives_spanish:
  - lo curó
  - lo restauró
  lexicon: BDAG
  rationale: ἰάομαι se refiere a sanar o curar. "Lo sanó" mantiene el sentido de sanidad física en un registro bíblico claro y natural; "curó" sería posible, pero aquí "sanó" conserva mejor el tono de la escena.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre directo masculino singular que remite al hombre de la historia. En español, el clítico "lo" es la forma natural y no requiere mayor expansión.
- source_word: ἀπέλυσεν
  english_pob_choice: sent him away
  chosen_spanish: lo despidió
  alternatives_spanish:
  - lo dejó ir
  - lo envió lejos
  - lo soltó
  lexicon: BDAG
  rationale: ἀπολύω puede significar soltar, despedir o enviar lejos. En este contexto narrativo, "lo despidió" reproduce bien la idea de dejarlo ir sin introducir matices legales de liberación ni una distancia espacial que el griego no exige.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y mostró alto acuerdo con el texto base; por eso esta versión mantiene la estructura narrativa y las equivalencias léxicas principales, ajustadas al español natural.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa "sanó" para ἰάσατο en coherencia con el valor de sanidad física documentado en el audit trail.
  - Se conserva la distinción entre silencio efectivo y mero estado de calma mediante "se quedaron callados".
