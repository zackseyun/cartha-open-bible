    issue: La nota [b] está anclada al participio equivocado.
    rationale: El texto marca [b] en “tomando al hombre”, pero la nota ofrece alternativas de ἀπέλυσεν (“released/dismissed”), no de ἐπιλαβόμενος. Esto distorsiona la correspondencia entre fuente, traducción y aparato de notas.
  - severity: medium
    issue: “Tomando al hombre” atenúa la fuerza física de ἐπιλαβόμενος.
    rationale: ἐπιλαμβάνομαι sugiere ‘asir/tomar de la mano o del cuerpo, tomarlo’. “Tomando al hombre” puede sonar genérico en español; “tomándolo” conserva mejor la acción física sin sobretraducción.
  - severity: low
    issue: “Se quedaron callados” es natural, pero algo más coloquial que el registro del proyecto.
    rationale: “Guardaron silencio” expresa con mayor dignidad el no responder y combina bien con el tono narrativo bíblico moderno.
  revised_spanish_text: Pero ellos guardaron silencio[a]. Y, tomándolo, lo sanó y lo despidió[b].
  revised_footnotes:
  - marker: a
