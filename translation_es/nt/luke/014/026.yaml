translation:
  language: es
  text: Si alguno viene a mí y no odia a su propio padre y madre y esposa e hijos y hermanos y hermanas —y aun su propia vida—, no puede ser mi discípulo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no ama ... menos». El verbo es literalmente «odiar», pero aquí expresa que la lealtad a Jesús debe tener precedencia sobre los vínculos familiares más cercanos; compárese Mateo 10:37.
    reason: lexical_alternative
  - marker: b
    text: O «su propia alma». Aquí «vida» refleja el sentido más probable de ψυχή en el contexto del costo del discipulado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται πρός με
  english_pob_choice: comes to me
  chosen_spanish: viene a mí
  alternatives_spanish:
  - acude a mí
  - se acerca a mí
  lexicon: BDAG
  rationale: La construcción expresa movimiento relacional hacia Jesús. «Viene a mí» preserva la direccionalidad simple de πρός με sin introducir una paráfrasis discipular más amplia.
- source_word: μισεῖ
  english_pob_choice: hate
  chosen_spanish: odia
  alternatives_spanish:
  - ama menos
  - renuncia a
  lexicon: BDAG
  rationale: El verbo conserva su fuerza léxica básica en español. Mantener «odia» en el texto principal preserva la tensión del dicho; la posible idea comparativa de preferencia se deja para la nota.
- source_word: τὸν πατέρα ἑαυτοῦ
  english_pob_choice: his own father
  chosen_spanish: a su propio padre
  alternatives_spanish:
  - a su padre
  lexicon: BDAG
  rationale: «Propio» refleja el valor enfático del reflexivo ἑαυτοῦ y mantiene la amplitud personal de la exigencia.
- source_word: τὴν γυναῖκα
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  lexicon: BDAG
  rationale: En esta lista doméstica, el contexto señala a la cónyuge. «Esposa» es el equivalente natural y claro en español contemporáneo.
- source_word: τὰ τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - niños
  lexicon: BDAG
  rationale: El término griego es genérico; en español, «hijos» puede funcionar en sentido colectivo para descendencia/niñez dentro de la lista familiar. La opción refleja el uso común sin añadir más precisión de la que el texto exige.
- source_word: τοὺς ἀδελφοὺς καὶ τὰς ἀδελφάς
  english_pob_choice: brothers and sisters
  chosen_spanish: hermanos y hermanas
  alternatives_spanish:
  - hermanos
  - hermanos y hermanas de la familia
  lexicon: BDAG
  rationale: El griego menciona ambos sexos explícitamente; el español debe conservar esa duplicación para no borrar el alcance del listado.
- source_word: ἔτι τε καὶ
  english_pob_choice: and even
  chosen_spanish: y aun
  alternatives_spanish:
  - e incluso
  - y también
  lexicon: BDAG
  rationale: La secuencia intensifica el último elemento de la lista. «Y aun» comunica bien el remate enfático en español natural.
- source_word: τὴν ψυχὴν ἑαυτοῦ
  english_pob_choice: his own life
  chosen_spanish: su propia vida
  alternatives_spanish:
  - su alma
  - su propia alma
  - su propia vida
  lexicon: BDAG
  rationale: En este contexto de costo del discipulado, ψυχή apunta a la vida/yo propio más que a una antropología técnica del alma. «Vida» es claro y fiel; se conserva la alternativa «alma» en la nota.
- source_word: οὐ δύναται εἶναί μου μαθητής
  english_pob_choice: he cannot be my disciple
  chosen_spanish: no puede ser mi discípulo
  alternatives_spanish:
  - no puede llegar a ser mi discípulo
  - no es capaz de ser mi discípulo
  lexicon: BDAG
  rationale: La frase expresa incapacidad o incompatibilidad, no simple prohibición. «No puede ser» reproduce la fuerza del idiomático griego de forma natural en español.
theological_decisions:
- issue: Cómo traducir μισεῖ sin suavizar la demanda de Jesús
  english_pob_reading: Retain 'hate' in the main text and explain the comparative/priority sense in a footnote.
  chosen_spanish_reading: Conservar «odia» en el texto principal y explicar en nota la posible fuerza comparativa de preferencia.
  alternative_spanish_readings:
  - «ama menos» en el texto principal
  - «renuncia a» en el texto principal
  rationale: La lectura principal mantiene el filo del dicho y evita interpretar de antemano la expresión. La nota preserva la posibilidad semítica/comparativa sin borrar la dureza retórica de Jesús.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Sentido de ψυχή en esta exigencia de discipulado
  english_pob_reading: Translate as 'life' rather than 'soul.'
  chosen_spanish_reading: Traducir con «vida» y no con «alma» en el texto principal.
  alternative_spanish_readings:
  - alma
  - yo
  - persona
  rationale: En el contexto inmediato, ψυχή designa la propia vida que uno podría preservar o perder por Cristo. «Vida» comunica mejor el alcance práctico de la demanda y evita una lectura estrechamente doctrinal.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hubo cambios aplicados en la última pasada, y el veredicto de revisión fue de alto acuerdo.'
  spanish_consistency_notes:
  - Se mantuvo «discípulo» para μαθητής, en continuidad con la terminología POB.
  - Se conservó el patrón de lista familiar sin reordenar los miembros ni diluir la progresión retórica.
  - La puntuación con comas y la colocación del inciso final siguen el ritmo enfático del original y del POB inglés.
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
