translation:
  language: es
  text: 'Y otro dijo[a]: «He comprado cinco yuntas de bueyes, y voy a probarlas. Te pido[b], considérame excusado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cinco pares de bueyes» o «cinco equipos de bueyes».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «tenme excusado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτερος
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - uno más
  - alguien más
  lexicon: BDAG
  rationale: En la serie de invitados que presentan excusas, ἕτερος señala a una persona adicional. En español, «otro» conserva esa referencia natural y breve sin añadir matices no presentes en el griego.
- source_word: Ζεύγη βοῶν
  english_pob_choice: five yoke of oxen
  chosen_spanish: cinco yuntas de bueyes
  alternatives_spanish:
  - cinco pares de bueyes
  - cinco equipos de bueyes
  lexicon: BDAG
  rationale: ζεῦγος refiere un par o yunta, y con βοῶν designa bueyes uncidos para el trabajo. «Yuntas de bueyes» conserva la imagen agraria concreta y resulta idiomático en español.
- source_word: ἠγόρασα
  english_pob_choice: I have bought
  chosen_spanish: he comprado
  alternatives_spanish:
  - compré
  - he adquirido
  lexicon: BDAG
  rationale: El aoristo puede traducirse como pasado simple o perfecto. Aquí el valor de compra reciente y relevante para la excusa queda bien expresado con «he comprado», natural en español y cercano al sentido del inglés auditado.
- source_word: πορεύομαι
  english_pob_choice: I am going
  chosen_spanish: voy
  alternatives_spanish:
  - estoy yendo
  - me dirijo
  lexicon: BDAG
  rationale: El presente medio comunica intención o desplazamiento inmediato. «Voy» es la forma más natural en español y mantiene la inmediatez de la acción.
- source_word: δοκιμάσαι
  english_pob_choice: to test
  chosen_spanish: probarlas
  alternatives_spanish:
  - examinarlas
  - ponerlas a prueba
  lexicon: BDAG
  rationale: Aquí δοκιμάζω se refiere a verificar la aptitud de los bueyes recién adquiridos. «Probarlas» transmite esa evaluación práctica de modo claro; el pronombre femenino plural concuerda con «yuntas» en español, aunque la referencia concreta sea a los bueyes.
- source_word: ἐρωτῶ σε
  english_pob_choice: I ask you
  chosen_spanish: Te ruego
  alternatives_spanish:
  - te pido
  - te solicito
  lexicon: BDAG
  rationale: ἐρωτάω puede ser una petición directa y cortés. En esta fórmula de excusa, «Te ruego» conserva la deferencia del ruego implícito sin endurecer la expresión.
- source_word: ἔχε με παρῃτημένον
  english_pob_choice: consider me excused
  chosen_spanish: considérame excusado
  alternatives_spanish:
  - tenme por excusado
  - déjame por excusado
  lexicon: BDAG
  rationale: 'La expresión griega es idiomática: literalmente equivale a «tenme excusado». «Considérame excusado» reproduce bien el estado resultante en español y mantiene la fuerza del ruego.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios respecto del acuerdo alto entre evaluaciones; se mantiene una solución estable y auditable sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se conserva «bueyes» para βοῶν y «yuntas» para ζεύγη, distinguiendo el animal del arnés/pareja de trabajo.
  - «Probarlas» se refiere a las yuntas como unidad de trabajo; la concordancia femenina sigue el español natural de «yuntas».
  - Se mantiene un registro digno y contemporáneo, evitando arcaísmos innecesarios como «habe».
  - Las notas al pie se limitan a alternativas léxicas documentadas en el audit trail, sin añadir variantes doctrinales no pertinentes.
