translation:
  language: es
  text: Y no pudieron responder a esto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a estas cosas' o 'en respuesta a estas cosas'. El griego usa una expresión plural, literalmente 'a estas cosas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Conserva la conexión simple con la escena previa sin añadir matiz temporal o inferencial que el griego no exige.
- source_word: οὐκ
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no pudieron
  - no fueron capaces de
  lexicon: BDAG
  rationale: La negación se integra naturalmente con el verbo de capacidad en español.
- source_word: ἴσχυσαν
  english_pob_choice: were able
  chosen_spanish: pudieron
  alternatives_spanish:
  - fueron capaces de
  - tuvieron fuerzas para
  lexicon: BDAG
  rationale: Aquí ἰσχύω expresa capacidad/incapacidad, no fuerza física literal; 'pudieron' comunica esa idea de forma clara y natural.
- source_word: ἀνταποκριθῆναι
  english_pob_choice: to reply
  chosen_spanish: responder
  alternatives_spanish:
  - replicar
  - dar respuesta
  lexicon: BDAG
  rationale: El infinitivo indica responder en retorno; 'responder' preserva la reciprocidad sin implicar insolencia o agresividad.
- source_word: πρὸς ταῦτα
  english_pob_choice: to these things
  chosen_spanish: a estas cosas
  alternatives_spanish:
  - ante estas cosas
  - en respuesta a estas cosas
  - a esto
  lexicon: BDAG
  rationale: La preposición πρός con ταῦτα expresa aquí respuesta dirigida 'a' estas cosas. Se mantiene el plural del griego con 'estas cosas', aunque suene algo formal.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran alta concordancia y no requieren revisión sustantiva; la principal decisión en español es conservar el plural de ταῦτα con una formulación idiomática.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras sustituciones teológicas porque el versículo no contiene referencias divinas.
  - Se prefiere 'pudieron' por el valor aspectual de capacidad de ἴσχυσαν en este contexto.
  - '''Estas cosas'' conserva el plural griego y permite una nota alternativa para lectores que prefieran una referencia más idiomática singular.'
