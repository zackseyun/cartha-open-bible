translation:
  language: es
  text: 'Les decía una parábola a los invitados, observando cómo escogían los lugares de honor[a], diciéndoles:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los asientos principales». El griego se refiere a los lugares más honrosos en un banquete.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  english_pob_choice: he was telling
  chosen_spanish: les contó
  alternatives_spanish:
  - les estaba contando
  - les decía
  lexicon: BDAG
  rationale: El imperfecto griego presenta la acción como en curso o como marco narrativo. En español, «les contó» introduce con naturalidad la escena y evita una repetición demasiado pesada de un progresivo, manteniendo el sentido discursivo de inicio de relato.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Entonces
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: Aquí δέ funciona como transición narrativa suave. «Entonces» comunica el avance de la escena sin cargar indebidamente la conjunción con contraste.
- source_word: τοὺς κεκλημένους
  english_pob_choice: those who had been invited
  chosen_spanish: los invitados
  alternatives_spanish:
  - los que habían sido invitados
  - los convocados
  lexicon: BDAG
  rationale: El participio perfecto de καλέω señala a personas en estado de haber sido invitadas. «Los invitados» es una equivalencia idiomática clara en español; la alternativa más explícita se reserva para una nota.
- source_word: παραβολήν
  english_pob_choice: a parable
  chosen_spanish: una parábola
  alternatives_spanish:
  - una ilustración
  - un ejemplo
  lexicon: BDAG
  rationale: El término es el vocablo evangélico estándar para «parable». «Parábola» conserva la categorización literaria del texto fuente.
- source_word: ἐπέχων
  english_pob_choice: noticing
  chosen_spanish: observando
  alternatives_spanish:
  - notando
  - prestando atención a
  lexicon: BDAG
  rationale: El participio introduce la circunstancia que motiva la parábola. «Observando» mantiene la idea de atención visual y evaluativa con un registro natural en español.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  lexicon: BDAG
  rationale: Introduce la manera en que actuaban; «cómo» es la correspondencia más directa y clara.
- source_word: πρωτοκλισίας
  english_pob_choice: the places of honor
  chosen_spanish: los lugares de honor
  alternatives_spanish:
  - los primeros asientos
  - los puestos principales
  lexicon: BDAG
  rationale: El sustantivo refiere a los sitios más distinguidos en un banquete. «Lugares de honor» comunica bien la función social del término sin recurrir a un calco opaco.
- source_word: ἐξελέγοντο
  english_pob_choice: they were choosing
  chosen_spanish: escogían
  alternatives_spanish:
  - estaban escogiendo
  - se escogían
  lexicon: BDAG
  rationale: El imperfecto medio describe una acción repetida o en progreso. En español, el imperfecto simple «escogían» conserva esa duratividad de manera natural; el matiz reflexivo no exige explicitación en el texto principal.
- source_word: λέγων πρὸς αὐτούς
  english_pob_choice: saying to them
  chosen_spanish: diciéndoles
  alternatives_spanish:
  - y les dijo
  - hablándoles
  lexicon: BDAG
  rationale: El participio introduce el discurso directo siguiente. «Diciéndoles» sigue de cerca la sintaxis griega y suena fluido en español.
translation_notes:
  revision_awareness: La versión española sigue de cerca el griego de SBLGNT y el acuerdo alto del auditor inglés. Se conservó la progresión narrativa del imperfecto y la referencia social de πρωτοκλισία como «lugares de honor», evitando un calco poco transparente. Se mantuvo la categoría literaria «parábola» y se optó por una equivalencia idiomática para τοὺς κεκλημένους, con nota para la alternativa más explícita.
  spanish_consistency_notes:
  - Se mantiene «parábola» como término técnico evangélico.
  - Se usa «lugares de honor» para πρωτοκλισία, coherente con el valor social del término.
  - El participio imperfectivo se refleja con formas de progresión/escena en español sin forzar perífrasis innecesarias.
  - «Los invitados» conserva el estado resultante de haber sido invitados, en línea con el audit trail inglés.
