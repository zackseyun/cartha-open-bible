  source_alignment_summary: 'El borrador español transmite bien el sentido global del griego: Jesús dirige una parábola a los invitados, al notar cómo elegían los lugares de honor, e introduce el discurso directo. Sin embargo, «les contó» debilita el imperfecto Ἔλεγεν, que en contexto funciona mejor como acción en desarrollo o marco narrativo («les decía» / «estaba diciendo»), no como un pretérito puntual de relato concluido.'
  spanish_quality_summary: El español es natural y claro, con buen registro eclesial moderno. «Observando», «los lugares de honor» y «diciéndoles» funcionan bien. La única reparación importante es ajustar el verbo inicial para reflejar mejor el aspecto imperfectivo y evitar un matiz demasiado puntual en «contó».
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. «Parábola» y «lugares de honor» están bien alineados con las decisiones del POB. La nota alternativa sobre «asientos principales» preserva correctamente la alternativa léxica inglesa.
