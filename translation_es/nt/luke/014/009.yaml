review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva la secuencia general del griego, pero falla en dos puntos de sentido importantes: ὁ σὲ καὶ αὐτὸν καλέσας está mal formulado en español como «el que invitó a ti y a él», y sobre todo Δὸς τούτῳ τόπον queda incorrectamente como «Dale a este lugar», que en español significa dar un lugar a alguien, no cederle tu puesto. El griego exige que el anfitrión diga que cedas tu lugar a ese hombre. El resto —«vendrá», «te dirá», «con vergüenza», «el último lugar»— refleja bien el texto fuente.'
  spanish_quality_summary: La redacción actual suena poco natural y parcialmente ambigua en español. «Invitó a ti y a él» es gramaticalmente torpe; «los invitó a ambos» o equivalente es claro y fiel. «Dale a este lugar» es español deficiente para este contexto y altera el sentido. Una revisión menor produce una lectura natural, digna y clara para uso bíblico eclesial.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto en este versículo. La decisión «último lugar» con nota alternativa «lugar más bajo» está bien alineada con el expediente inglés. «Lugar» también es apropiado para τόπος, aunque en la orden directa debe explicitarse «tu lugar» para preservar el sentido contextual documentado en el POB inglés.
  issues:
  - severity: high
    issue: «Dale a este[a] lugar» no expresa el sentido de Δὸς τούτῳ τόπον
    rationale: En contexto, el mandato no es simplemente asignar un lugar, sino ceder el propio puesto al otro invitado. El expediente inglés lo documenta explícitamente con «Give this man your place». En español, la formulación correcta debe incluir «tu lugar» o equivalente y hacer claro que «este» es la persona destinataria.
  - severity: medium
    issue: «el que invitó a ti y a él» es poco natural en español
    rationale: Aunque intenta reflejar la estructura griega, en español moderno suena forzado. «el que los invitó a ambos» conserva el contraste de los dos invitados y mejora la legibilidad sin sobreinterpretar.
  - severity: low
    issue: La nota al pie debe permanecer anclada en la frase relevante del texto revisado
    rationale: La nota sobre «el lugar más bajo» corresponde a «el último lugar», no a «este». En el borrador, el marcador [a] está mal colocado sobre «este», lo cual desajusta la referencia semántica.
  revised_spanish_text: 'y el que los invitó a ambos vendrá y te dirá: «Dale a este hombre tu lugar», y entonces comenzarás con vergüenza a ocupar el último lugar[a].'
  revised_footnotes:
  - marker: a
    text: O «el lugar más bajo». La expresión griega τὸν ἔσχατον τόπον puede denotar el último lugar en el orden y, por tanto, en este contexto de banquete, el asiento más bajo de honor.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la sintaxis española para que sea natural y fiel al griego y al expediente inglés: «los invitó a ambos» expresa bien la construcción sustantivada; «Dale a este hombre tu lugar» restituye el sentido contextual de ceder el propio puesto; y el marcador de la nota se mueve a «el último lugar», que es donde corresponde la alternativa léxica documentada.'
