translation:
  language: es
  text: 'y el que los invitó a ambos vendrá y te dirá: «Dale a este hombre tu lugar», y entonces comenzarás con vergüenza a ocupar el último lugar[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lugar más bajo». La expresión griega τὸν ἔσχατον τόπον puede denotar el último lugar en el orden y, por tanto, en este contexto de banquete, el asiento más bajo de honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ σὲ καὶ αὐτὸν καλέσας
  english_pob_choice: the one who invited both you and him
  chosen_spanish: el que invitó a ti y a él
  alternatives_spanish:
  - el que los invitó a ambos
  - el anfitrión que los invitó a ambos
  lexicon: BDAG
  rationale: 'La construcción participial con artículo funciona como un sustantivo: se refiere al que invita. En español, «el que invitó a ti y a él» conserva la referencia a los dos invitados sin añadir explícitamente «anfitrión», que sería interpretativo.'
- source_word: ἐλθὼν
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - habiendo venido
  - cuando venga
  lexicon: BDAG
  rationale: 'Aunque es participio aoristo, va seguido de futuro y en español se expresa con fluidez como acción futura coordinada: «vendrá». Así se mantiene la secuencia narrativa natural sin perder el sentido.'
- source_word: ἐρεῖ σοι
  english_pob_choice: will say to you
  chosen_spanish: te dirá
  alternatives_spanish:
  - te dirá a ti
  - te hablará
  lexicon: BDAG
  rationale: λέγω aquí introduce discurso directo. «Te dirá» es natural en español y conserva el valor de habla directa con la segunda persona dativa.
- source_word: Δὸς τούτῳ τόπον
  english_pob_choice: Give this man your place
  chosen_spanish: Dale a este lugar
  alternatives_spanish:
  - Cede tu lugar a este
  - Dale a este hombre tu lugar
  lexicon: BDAG
  rationale: La frase exige en contexto la cesión del asiento o puesto de honor. En español, «Dale a este lugar» mantiene la brevedad del imperativo y la referencia al lugar; el sentido de ceder asiento queda asegurado por el contexto de banquete.
- source_word: τόπον
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - puesto
  - asiento
  lexicon: BDAG
  rationale: τόπος significa «lugar». En este contexto de banquete puede implicar asiento o puesto, pero «lugar» preserva el sentido léxico básico y funciona de manera natural en español.
- source_word: ἄρξῃ
  english_pob_choice: you will begin
  chosen_spanish: comenzarás
  alternatives_spanish:
  - empezarás
  - te verás obligado a comenzar
  lexicon: BDAG
  rationale: El futuro medio de ἄρχω se traduce idiomáticamente como «comenzar». No se añade una idea de obligación que no esté explícita en el griego.
- source_word: μετὰ αἰσχύνης
  english_pob_choice: with shame
  chosen_spanish: con vergüenza
  alternatives_spanish:
  - con vergüenza ajena
  - con deshonra
  - avergonzado
  lexicon: BDAG
  rationale: αἰσχύνη expresa vergüenza/deshonra social. «Con vergüenza» es la equivalencia más directa y clara en español; mantiene el peso honor–vergüenza del pasaje.
- source_word: τὸν ἔσχατον τόπον
  english_pob_choice: the last place
  chosen_spanish: el último lugar
  alternatives_spanish:
  - el lugar postrero
  - el lugar más bajo
  lexicon: BDAG
  rationale: 'En el contexto de banquete, ἔσχατος puede referirse al último o al más bajo. «El último lugar» preserva la ambigüedad útil: último en orden y, por extensión, el de menor honor.'
- source_word: κατέχειν
  english_pob_choice: to take
  chosen_spanish: ocupar
  alternatives_spanish:
  - tomar
  - retener
  - mantener
  lexicon: BDAG
  rationale: κατέχω puede significar ocupar, retener o mantener. En este contexto de asientos, «ocupar» expresa bien el sentido de entrar y quedar en ese lugar; por eso se usa en la cláusula infinitiva.
theological_decisions:
- issue: La posible carga de honor/vergüenza en el dicho de Jesús
  english_pob_reading: with shame to take the last place
  chosen_spanish_reading: con vergüenza a ocupar el último lugar
  alternative_spanish_readings:
  - con deshonra a ocupar el último lugar
  - avergonzado a ocupar el último lugar
  rationale: El texto no desarrolla una doctrina explícita, pero sí una dinámica social de humillación pública. «Con vergüenza» preserva esa fuerza sin intensificarla a «deshonra» ni psicologizarla demasiado con «avergonzado».
  doctrine_reference: Proverbial teaching on humility; no doctrinal expansion beyond the text
- issue: El valor social de «el último lugar» en un contexto de banquete
  english_pob_reading: the last place / the lowest place
  chosen_spanish_reading: el último lugar
  alternative_spanish_readings:
  - el lugar más bajo
  - el último puesto
  rationale: La expresión puede ser temporal/ordinal o espacial/social. La versión principal mantiene la ambigüedad del griego y deja que el contexto de banquete sugiera la inferioridad de honor.
  doctrine_reference: Contextual social imagery; banquet honor-shame setting
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego y armoniza con la lectura auditada en inglés. Se conservó la secuencia narrativa futura («vendrá... y te dirá... y entonces comenzarás») y se mantuvo la ambigüedad útil de ἔσχατον τόπον mediante «el último lugar», con nota alternativa para «el lugar más bajo».
  spanish_consistency_notes:
  - Se usó «lugar» para τόπος, coherente con la equivalencia léxica del proyecto.
  - Se eligió «vergüenza» para αἰσχύνη para conservar el eje honor–vergüenza del pasaje.
  - Se evitó «SEÑOR» o terminología no presente en el versículo.
  - Se mantuvo un tono digno y publicable, sin añadir elementos explicativos al texto principal.
