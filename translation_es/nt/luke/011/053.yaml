    text: 'También puede entenderse: «a cuestionarlo de cerca» o «a hacerlo hablar de improviso». El verbo griego es raro y sugiere una presión agresiva para sacarle respuestas.'
    reason: lexical_alternative
  revision_rationale: Se ajusta `acosarlo` a `presionarlo` para reflejar mejor δεινῶς ἐνέχειν según la evidencia léxica y la auditoría inglesa. Se mejora la claridad inicial con `después de que salió de allí`. Se afina `para hacerlo hablar` para expresar con más naturalidad en español el valor de ἀποστοματίζειν, manteniendo la nota de alternativas raras del verbo. No se requiere adjudicación adicional.
