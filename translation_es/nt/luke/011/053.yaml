translation:
  language: es
  text: Y después de que salió de allí, los escribas y los fariseos comenzaron a presionarlo con dureza y a provocarlo para hacerlo hablar[a] acerca de muchas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «a cuestionarlo de cerca» o «a hacerlo hablar de improviso». El verbo griego es raro y sugiere una presión agresiva para sacarle respuestas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κἀκεῖθεν
  english_pob_choice: And after he left there
  chosen_spanish: Y después de salir de allí
  alternatives_spanish:
  - Y de allí
  - Y cuando salió de allí
  lexicon: BDAG
  rationale: La forma introduce una transición espacial y temporal. «Después de salir de allí» conserva el valor secuencial del contexto y suena natural en español.
- source_word: ἐξελθόντος αὐτοῦ
  english_pob_choice: after he left
  chosen_spanish: después de salir
  alternatives_spanish:
  - cuando salió
  - al salir
  lexicon: BDAG
  rationale: El genitivo absoluto indica una acción previa a la principal; en español, «después de salir» expresa bien esa anterioridad sin forzar la sintaxis.
- source_word: γραμματεῖς
  english_pob_choice: the scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los expertos en la ley
  - los maestros de la ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente directo y tradicional para este grupo en los evangelios, y mantiene la categoría histórica del término griego.
- source_word: Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los fariseos
  lexicon: BDAG
  rationale: La transliteración estable «fariseos» es la forma normal en español y corresponde al nombre del grupo.
- source_word: δεινῶς ἐνέχειν
  english_pob_choice: to press him hard
  chosen_spanish: acosarlo con dureza
  alternatives_spanish:
  - presionarlo con dureza
  - insistirle con dureza
  - apremiarlo con dureza
  lexicon: BDAG
  rationale: La combinación intensifica una presión hostil. «Acosarlo con dureza» comunica bien la insistencia agresiva y el tono desfavorable del contexto, sin perder el matiz de fuerte presión interpersonal.
- source_word: ἀποστοματίζειν
  english_pob_choice: to provoke him to speak
  chosen_spanish: a provocarlo para que hablara
  alternatives_spanish:
  - a cuestionarlo de cerca
  - a hacerlo hablar sin rodeos
  - a sacarle respuestas
  lexicon: BDAG
  rationale: El verbo es raro y puede sugerir arrancar respuestas o empujarlo a hablar. «Provocarlo para que hablara» conserva la intención adversarial sin concretar más de lo que el griego exige.
- source_word: περὶ πλειόνων
  english_pob_choice: about many things
  chosen_spanish: acerca de muchas cosas
  alternatives_spanish:
  - sobre muchos asuntos
  - respecto de muchas cosas
  lexicon: BDAG
  rationale: La expresión señala una amplitud de temas. «Acerca de muchas cosas» es una equivalencia idiomática clara en español.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés. No hubo revisiones textuales pendientes en el paquete: el cierre se mantiene en alta concordancia, y la versión española conserva la secuencia temporal, la hostilidad de la acción y la amplitud del último complemento sin introducir interpretaciones extra.'
  spanish_consistency_notes:
  - Se mantuvo «escribas» y «fariseos» como términos de grupo estables en español bíblico.
  - Se evitó suavizar el matiz hostil de δεινῶς ἐνέχειν; la redacción busca reflejar presión intensa, no una simple conversación.
  - «Acerca de muchas cosas» preserva la idea de amplitud temática sin convertirla en un comparativo.
