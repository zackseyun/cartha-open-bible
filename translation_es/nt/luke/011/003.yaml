translation:
  language: es
  text: Danos cada día nuestro pan de cada día[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pan para el día que viene», «pan que necesitamos» o, menos probablemente aquí, «pan supersustancial». El adjetivo griego es raro y debatido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: BDAG
  rationale: En español, 'pan' conserva el valor concreto y tradicional de 'bread' en la oración, y puede funcionar de manera representativa para el sustento básico sin ampliar indebidamente el sentido a 'alimento' o 'comida'.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - de nosotros
  lexicon: BDAG
  rationale: Es el posesivo directo natural en español para modificar 'pan'.
- source_word: ἐπιούσιον
  english_pob_choice: daily
  chosen_spanish: diario
  alternatives_spanish:
  - para el día que viene
  - necesario para la existencia
  - necesario
  lexicon: BDAG
  rationale: La palabra griega es rara y debatida. 'Diario' comunica con claridad la provisión ordinaria que exige el contexto de Lucas, sin borrar las alternativas lexicográficas que siguen abiertas.
- source_word: δίδου
  english_pob_choice: Give
  chosen_spanish: Danos
  alternatives_spanish:
  - Sigue dándonos
  - Da
  lexicon: BDAG
  rationale: El imperativo presente puede tener matiz durativo, pero en español la forma imperativa breve 'Danos' es la más idiomática en esta petición; la continuidad queda suficientemente sugerida por 'cada día'.
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: Pronombre de objeto indirecto normal y directo en español.
- source_word: τὸ καθ’ ἡμέραν
  english_pob_choice: each day
  chosen_spanish: cada día
  alternatives_spanish:
  - día tras día
  - diariamente
  lexicon: BDAG
  rationale: La expresión adverbial subraya repetición cotidiana. 'Cada día' es natural en español y evita una repetición forzada con 'diario'.
theological_decisions:
- issue: Sentido de ἐπιούσιον en la petición del pan
  english_pob_reading: daily
  chosen_spanish_reading: diario
  alternative_spanish_readings:
  - para el día que viene
  - necesario para la existencia
  - supersustancial
  rationale: Sigo la lectura principal de la POB en inglés porque el contexto inmediato de 'cada día' favorece la provisión cotidiana. En el texto principal no se introduce una lectura sacramental o metafísica que el griego de Lucas no exige; la tensión léxica se preserva en la nota.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: la revisión más reciente no introdujo cambios, y el cotejo cruzado reportó alta concordancia. Por eso la redacción española sigue la misma solución de sentido y conserva la ambigüedad léxica en la nota.'
  spanish_consistency_notes:
  - Se usó 'pan' para mantener el referente concreto y proverbial del sustento básico, en línea con la elección inglesa de 'bread'.
  - Se eligió 'cada día' para τὸ καθ’ ἡμέραν y 'diario' para ἐπιούσιον, evitando una repetición áspera pero manteniendo el énfasis en la provisión cotidiana.
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes, ya que el versículo no contiene el Tetragrámaton ni κύριος.
