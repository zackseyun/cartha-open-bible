- from: ¡Ay de ustedes, los expertos en la ley[a]!, porque han quitado la llave del conocimiento[b]; ustedes mismos no entraron, y a los que entraban se lo impidieron.
  to: ¡Ay de ustedes, expertos en la ley[a]!, porque han quitado la llave del conocimiento[b]; ustedes mismos no entraron y estorbaron a los que entraban.
  rationale: La revisión corrige el anclaje de la nota [b], hace que la nota [a] sea una alternativa real y ajusta ἐκωλύσατε a 'estorbaron' para reflejar mejor el matiz de 'hindered' sin ambigüedad pronominal. El resto del verso se mantiene porque representa fielmente el griego y el razonamiento documentado del POB.
