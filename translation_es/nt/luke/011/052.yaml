translation:
  language: es
  text: ¡Ay de ustedes, expertos en la ley[a]!, porque han quitado la llave del conocimiento[b]; ustedes mismos no entraron y estorbaron a los que entraban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'doctores de la ley'. El término se refiere a especialistas en la ley judía, no a abogados civiles modernos.
    reason: lexical_alternative
  - marker: b
    text: O 'la llave para el conocimiento'.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes, expertos en la ley!
  lexicon: BDAG
  rationale: Conserva el tono profético de denuncia de οὐαί con una exclamación natural en español. 'Ay' transmite el lamento/admonición sin suavizar la severidad del reproche.
- source_word: νομικοῖς
  english_pob_choice: lawyers
  chosen_spanish: expertos en la ley
  alternatives_spanish:
  - doctores de la ley
  - juristas
  lexicon: BDAG
  rationale: En este contexto no se trata de abogados civiles, sino de especialistas en la ley mosaica. 'Expertos en la ley' hace explícito el sentido sin depender de un uso moderno ambiguo de 'abogados' o 'lawyers'.
- source_word: ἤρατε
  english_pob_choice: took away
  chosen_spanish: han quitado
  alternatives_spanish:
  - han tomado
  - han removido
  lexicon: BDAG
  rationale: αἴρω aquí indica quitar o remover, no simplemente tomar en la mano. 'Han quitado' expresa bien la privación de acceso que el contexto requiere.
- source_word: κλεῖδα τῆς γνώσεως
  english_pob_choice: the key of knowledge
  chosen_spanish: la llave del conocimiento
  alternatives_spanish:
  - la llave para el conocimiento
  - la llave del saber
  lexicon: BDAG
  rationale: '''Llave'' es el equivalente natural de κλείς en español. Se mantiene la construcción ''del conocimiento'' para conservar la metáfora y la relación genitiva del griego, siguiendo de cerca la forma del texto fuente.'
- source_word: αὐτοὶ
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes
  - ustedes mismos, precisamente
  lexicon: BDAG
  rationale: La forma griega es enfática; 'ustedes mismos' preserva el contraste acusatorio y la responsabilidad directa de los destinatarios.
- source_word: εἰσήλθατε
  english_pob_choice: did not enter
  chosen_spanish: no entraron
  alternatives_spanish:
  - no pasaron
  - no entraron ustedes
  lexicon: BDAG
  rationale: Mantiene la metáfora de entrar sin especificar el objeto, conforme al cuidado del POB inglés de no añadir más de lo que el griego dice explícitamente.
- source_word: τοὺς εἰσερχομένους
  english_pob_choice: those who were entering
  chosen_spanish: a los que entraban
  alternatives_spanish:
  - a los que iban entrando
  - a los que estaban entrando
  lexicon: BDAG
  rationale: El participio presente comunica acción en curso; 'a los que entraban' es natural en español y conserva la idea de personas en proceso de entrar.
- source_word: ἐκωλύσατε
  english_pob_choice: hindered
  chosen_spanish: se lo impidieron
  alternatives_spanish:
  - los estorbaron
  - los obstaculizaron
  lexicon: BDAG
  rationale: El verbo puede expresar impedir o estorbar. Dado el objeto implícito de entrada, 'se lo impidieron' comunica con claridad que bloquearon su acceso sin exagerar el alcance causal.
theological_decisions:
- issue: Objeto de la entrada y alcance de la metáfora
  english_pob_reading: Retained the access/entrance metaphor without specifying 'the kingdom' in the main text.
  chosen_spanish_reading: Se conserva la metáfora de entrar sin añadir explícitamente 'el reino'.
  alternative_spanish_readings:
  - entrar en el reino de Dios
  - entrar en el conocimiento verdadero de Dios
  rationale: El texto griego no nombra el objeto de la entrada. Mantener la referencia abierta evita importar una glosa doctrinal que el versículo deja implícita, aunque el contexto de Lucas sugiere una dimensión salvífica y reveladora.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje coincide con el estado de alta concordancia del audit trail inglés y no requiere cambios respecto de la lectura fuente. Se mantuvo la metáfora de acceso/entrada, la fuerza profética de la reprensión y la distinción entre especialistas de la ley y abogados modernos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto solo cuando el texto lo exige; este versículo no contiene el nombre divino.
  - Se eligió 'expertos en la ley' para evitar el falso amigo 'abogados' y reflejar el contexto judío.
  - Se prefirió 'llave del conocimiento' para conservar la imagen verbal y la estructura del genitivo.
  - El pronombre enfático griego se refleja con 'ustedes mismos'.
  - '''Se lo impidieron'' mantiene el sentido de obstaculizar el acceso sin añadir un objeto explícito no presente en el griego.'
