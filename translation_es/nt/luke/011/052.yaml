    issue: La nota [a] repite el mismo texto del cuerpo principal.
    rationale: La nota dice 'O “expertos en la ley”' cuando el texto principal ya usa exactamente esa frase. Esto falla como alternativa léxica y no preserva correctamente la intención del audit trail inglés.
  - severity: medium
    issue: La nota [b] está anclada en el lugar equivocado.
    rationale: El marcador [b] aparece tras 'entraron', pero la nota comenta la alternativa de 'la llave del conocimiento'. Según las reglas del proyecto, el marcador debe aparecer en la palabra o frase relevante del texto.
  - severity: low
    issue: '''Se lo impidieron'' suena algo ambiguo y más fuerte que ''hindered''.'
    rationale: ἐκωλύσατε puede ser 'estorbaron' o 'impidieron', pero el POB inglés eligió 'hindered'. En español, 'estorbaron a los que entraban' mantiene mejor la amplitud del verbo y evita el pronombre 'lo' sin antecedente explícito.
  revised_spanish_text: ¡Ay de ustedes, expertos en la ley[a]!, porque han quitado la llave del conocimiento[b]; ustedes mismos no entraron y estorbaron a los que entraban.
