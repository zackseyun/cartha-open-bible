revisions:
- from: 'Cuando el espíritu inmundo[a] sale del hombre, anda por lugares sin agua[b] buscando descanso, y no hallándolo, dice: “Volveré a mi casa, de donde salí”.'
  to: 'Cuando el espíritu inmundo[a] sale del hombre, pasa por lugares sin agua[b] buscando descanso, y no encuentra ninguno, dice: «Volveré a mi casa, de donde salí».'
  rationale: Se ajusta ‘anda por’ a ‘pasa por’ para reflejar mejor διέρχεται y mantener un registro más digno; se cambia ‘no hallándolo’ por ‘no encuentra ninguno’ para expresar con claridad la elipsis de ‘descanso’ y seguir más de cerca el audit trail inglés; y se normaliza levemente la puntuación y comillas al uso español.
