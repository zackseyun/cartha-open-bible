translation:
  language: es
  text: 'Cuando el espíritu inmundo[a] sale del hombre, pasa por lugares sin agua[b] buscando descanso, y no encuentra ninguno, dice: «Volveré a mi casa, de donde salí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritu impuro». «Inmundo» conserva mejor el matiz ritual y moral del griego.
    reason: lexical_alternative
  - marker: b
    text: O «lugares secos». Lit. «lugares sin agua». La expresión griega alude a lugares desolados o sin agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκάθαρτον πνεῦμα
  english_pob_choice: the unclean spirit
  chosen_spanish: el espíritu inmundo
  alternatives_spanish:
  - el espíritu impuro
  lexicon: BDAG
  rationale: “Inmundo” reproduce el matiz ritual/moral de ἀκάθαρτον y mantiene la fórmula estable de los Evangelios mejor que “impuro”, que suena más genérico en español.
- source_word: ἐξέλθῃ
  english_pob_choice: has gone out
  chosen_spanish: sale
  alternatives_spanish:
  - ha salido
  lexicon: BDAG
  rationale: En la cláusula temporal con ὅταν, el presente narrativo español comunica bien la acción general o ejemplar; “ha salido” sería más explícito, pero menos natural en este registro sentencioso.
- source_word: ἀπὸ τοῦ ἀνθρώπου
  english_pob_choice: from the man
  chosen_spanish: del hombre
  alternatives_spanish:
  - de la persona
  - de un hombre
  lexicon: BDAG
  rationale: Se conserva el masculino singular del griego, que funciona como caso representativo. “Hombre” mantiene mejor la correspondencia lexical que “persona”.
- source_word: διέρχεται
  english_pob_choice: it passes through
  chosen_spanish: anda
  alternatives_spanish:
  - pasa por
  - recorre
  lexicon: BDAG
  rationale: “Anda por” expresa el desplazamiento continuo por diversos lugares y suena natural en español; “pasa por” es posible, pero algo más literal y menos idiomático aquí.
- source_word: δι’ ἀνύδρων τόπων
  english_pob_choice: through waterless places
  chosen_spanish: por lugares sin agua
  alternatives_spanish:
  - por lugares secos
  - por regiones áridas
  lexicon: BDAG
  rationale: Se traduce literalmente la idea de ausencia de agua. “Sin agua” preserva el valor básico de ἀνύδρων sin sobreinterpretar como “áridos” o suavizar a “secos”.
- source_word: ζητοῦν ἀνάπαυσιν
  english_pob_choice: seeking rest
  chosen_spanish: buscando descanso
  alternatives_spanish:
  - buscando reposo
  - en busca de descanso
  lexicon: BDAG
  rationale: “Descanso” comunica ἀνάπαυσις de manera clara y natural en español; “reposo” sería válido, pero puede sonar más solemne o eclesiástico.
- source_word: καὶ μὴ ⸀εὑρίσκον
  english_pob_choice: and not finding any
  chosen_spanish: y no hallándolo
  alternatives_spanish:
  - y no encontrándolo
  - y no hallando descanso
  lexicon: BDAG
  rationale: El participio se integra en español con un pronombre neutro implícito que retoma el descanso buscado. “No hallándolo” conserva la elipsis del griego sin añadir objeto explícito.
- source_word: λέγει
  english_pob_choice: it says
  chosen_spanish: dice
  alternatives_spanish:
  - dice para sí
  - decía
  lexicon: BDAG
  rationale: El presente histórico griego se conserva con el presente español “dice”, que mantiene la viveza del relato.
- source_word: Ὑποστρέψω
  english_pob_choice: I will return
  chosen_spanish: Volveré
  alternatives_spanish:
  - Regresaré
  - Iré de vuelta
  lexicon: BDAG
  rationale: “Volveré” es la forma más natural y directa para expresar el futuro de intención; conserva el sentido de retorno sin rigidez.
- source_word: εἰς τὸν οἶκόν μου
  english_pob_choice: to my house
  chosen_spanish: a mi casa
  alternatives_spanish:
  - a mi hogar
  - a mi casa
  lexicon: BDAG
  rationale: Se mantiene “casa” para respetar la metáfora concreta del texto y su continuidad con el contexto inmediato. En español, “a mi casa” es la correspondencia más clara de εἰς τὸν οἶκόν μου.
- source_word: ὅθεν ἐξῆλθον
  english_pob_choice: from which I came out
  chosen_spanish: de donde salí
  alternatives_spanish:
  - de donde salí
  - de la cual salí
  lexicon: BDAG
  rationale: “De donde salí” es idiomático y conserva la relación de procedencia del relativo ὅθεν; también retiene el eco con “sale/salí” del inicio del versículo.
theological_decisions:
- issue: Naturaleza del “espíritu inmundo”
  english_pob_reading: Rendered as 'the unclean spirit,' preserving the text's presentation of a personal evil spirit without reduction to mere metaphor.
  chosen_spanish_reading: Se mantiene “el espíritu inmundo” como sujeto personal real, no como simple metáfora moral.
  alternative_spanish_readings:
  - una impureza moral
  - una fuerza impersonal
  rationale: El contexto sinóptico presenta al espíritu como agente que sale, anda, busca y habla. La traducción no debe despersonalizarlo ni reducirlo a un estado interior.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Valor representativo de ἀνθρώπου
  english_pob_reading: Rendered 'the man' rather than 'the person.'
  chosen_spanish_reading: Se traduce “del hombre” y no “de la persona”.
  alternative_spanish_readings:
  - de la persona
  - de alguien
  rationale: El griego usa un masculino singular con valor representativo; en español, “hombre” conserva mejor esa forma y evita neutralizar innecesariamente el texto.
  doctrine_reference: 'Translation philosophy #4'
translation_notes:
  revision_awareness: La comparación con el audit trail inglés muestra acuerdo alto y sin cambios aplicados en la última revisión; esta versión española sigue la misma decisión óptima-equivalente, conservando la imaginería concreta de ‘espíritu inmundo’, ‘lugares sin agua’ y el paralelismo de salida y retorno.
  spanish_consistency_notes:
  - Se mantiene el presente narrativo para ἐξέρχομαι/διέρχεται/λέγει, coherente con la vivacidad del griego.
  - Se preserva la metáfora concreta de οἶκος como ‘casa’ en lugar de ‘hogar’.
  - No se neutraliza ἀνθρώπου; se conserva ‘hombre’ por correspondencia con el griego y la política de género-accurate rendering.
  - ‘Sin agua’ traduce ἀνύδρων de forma más literal que ‘secos’, pero la nota permite la alternativa semántica.
  - Se evita ‘SEÑOR’ u otras sustituciones no pertinentes, pues el versículo no contiene κύριος ni el tetragrama.
