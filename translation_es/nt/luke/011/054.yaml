  to: acechándolo[a], para atrapar[b] algo de su boca[c].
  rationale: La revisión conserva el sentido hostil de ἐνεδρεύοντες con «acechándolo», mejora la naturalidad de θηρεῦσαί con «atrapar», y restaura en el texto principal la imagen formal de ἐκ τοῦ στόματος αὐτοῦ como «de su boca», dejando la explicación idiomática en nota. Es una corrección menor y segura.
