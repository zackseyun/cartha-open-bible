lexical_decisions:
- source_word: ἐνεδρεύοντες
  english_pob_choice: lying in wait
  chosen_spanish: acechándolo[a]
  alternatives_spanish:
  - estando al acecho de él[a]
  - poniéndole una trampa[a]
  lexicon: BDAG
  rationale: ἐνεδρεύοντες expresa una espera hostil con intención de atrapar. «Acechar» comunica bien esa idea en español natural, preservando el matiz adversarial sin suavizarlo.
- source_word: αὐτόν
  english_pob_choice: for him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El pronombre se refiere a Jesús. En español, el objeto directo clítico integra mejor la frase verbal y mantiene la referencia sin añadir interpretación innecesaria.
- source_word: θηρεύσαί
  english_pob_choice: to catch
  chosen_spanish: cazar[b]
  alternatives_spanish:
  - atrapar[b]
  - capturar[b]
  lexicon: BDAG
  rationale: El verbo tiene trasfondo de caza o captura. «Cazar» conserva la imagen concreta del griego y, en este contexto, puede referirse a sorprenderlo por sus palabras.
- source_word: τι
  english_pob_choice: something
  chosen_spanish: algo
  alternatives_spanish:
  - algo que
  - alguna cosa
  lexicon: BDAG
  rationale: El indefinido se traduce de manera natural como «algo», indicando que esperaban encontrar alguna declaración aprovechable.
- source_word: ἐκ τοῦ στόματος αὐτοῦ
  english_pob_choice: from his mouth
  chosen_spanish: de lo que decía[c]
  alternatives_spanish:
  - de su boca[c]
  - de sus labios[c]
  - de lo que había dicho[c]
  lexicon: BDAG
  rationale: La expresión griega es idiomática para el habla. «De lo que decía» explicita el sentido sin perder la base concreta de la metáfora; se conserva una alternativa más literal en la nota.
translation_notes:
  revision_awareness: La redacción corrige el problema de validación anterior asegurando que cada marcador de nota aparece exactamente en el texto principal. También ajusta la segunda mitad para que el sentido idiomático de «ἐκ τοῦ στόματος αὐτοῦ» quede claro en español sin perder la imagen verbal de la fuente griega.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y publicable, con verbos de acecho y captura que reflejan el tono hostil del pasaje.
  - Se evita introducir explicaciones excesivas en el texto principal; la aclaración idiomática queda en nota.
  - La referencia a Jesús queda implícita mediante el pronombre, como en el griego, sin añadir el nombre propio.
