review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: participio hostil + infinitivo de captura + objeto indefinido + complemento «de su boca». Sin embargo, «cazar algo de lo que decía» no preserva del todo el sentido idiomático de θηρεῦσαί τι ἐκ τοῦ στόματος αὐτοῦ, que apunta a atrapar alguna palabra suya para usarla contra él. Además, el español actual suena algo forzado con «cazar» en este contexto.'
  spanish_quality_summary: «Acechándolo» es natural y fiel. El punto débil es «para cazar algo de lo que decía», que resulta menos idiomático y algo ambiguo en español. Una reparación menor con «atrapar algo de su boca» mantiene mejor la imagen formal y permite explicar en nota el sentido de «aprovechar alguna palabra suya».
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales son compatibles con el proyecto, salvo que para θηρεῦσαί conviene «atrapar» en vez de «cazar» por claridad y naturalidad, manteniendo la nota sobre la imagen literal.
  issues:
  - severity: medium
    issue: «cazar» para θηρεῦσαί suena poco natural en español en contexto de trampa verbal
    rationale: Aunque conserva la metáfora cinegética, en español bíblico y general «cazar algo de lo que decía» se oye torpe y puede distraer del sentido de atrapar una declaración.
  - severity: medium
    issue: «de lo que decía» explicita demasiado y desplaza la imagen concreta «de su boca»
    rationale: El griego conserva la expresión corporal/idiomática. El inglés POB también privilegia «from his mouth». En español puede mantenerse «de su boca» y aclararlo en nota sin perder legibilidad.
  - severity: low
    issue: La nota c debería clasificarse como previous_rendering, no lexical_alternative
    rationale: Corresponde al rastro de auditoría inglés que distingue esta variante como redacción previa, no como mera alternativa léxica.
  revised_spanish_text: acechándolo[a], para atrapar[b] algo de su boca[c].
