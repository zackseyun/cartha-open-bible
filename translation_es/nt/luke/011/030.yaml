translation:
  language: es
  text: Pues así como Jonás llegó a ser una señal a los ninivitas[a], así también el Hijo del Hombre será a esta generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «así también el Hijo del Hombre será a esta generación»; el sentido de «será una señal a esta generación» queda implícito por el paralelismo con Jonás.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς γὰρ
  english_pob_choice: For just as
  chosen_spanish: Pues así como
  alternatives_spanish:
  - Porque así como
  - Así como
  lexicon: BDAG
  rationale: γάρ aporta conexión explicativa, y καθώς introduce comparación; en español, «Pues así como» conserva ambas funciones de manera natural y digna. «Porque» enfatiza la explicación, pero suena más causal que comparativa en este contexto.
- source_word: ἐγένετο
  english_pob_choice: became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - se hizo
  - fue
  lexicon: BDAG
  rationale: γίνομαι aquí expresa que Jonás pasó a desempeñar la función de señal; «llegó a ser» preserva ese valor ingresivo/resultativo mejor que el simple «fue».
- source_word: Ἰωνᾶς
  english_pob_choice: Jonah
  chosen_spanish: Jonás
  lexicon: BDAG
  rationale: Nombre propio transliterado al uso bíblico español estándar.
- source_word: τοῖς Νινευίταις
  english_pob_choice: to the Ninevites
  chosen_spanish: para los ninivitas
  alternatives_spanish:
  - a los ninivitas
  - respecto de los ninivitas
  lexicon: BDAG
  rationale: 'El dativo expresa referencia/relación: Jonás funcionó como señal en relación con ellos. «Para» comunica bien esa orientación en español y evita una construcción demasiado mecánica.'
- source_word: σημεῖον
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - una señal milagrosa
  - un signo
  lexicon: BDAG
  rationale: «Señal» es la equivalencia más natural en español para σημείον en este contexto lucano, manteniendo el sentido revelador sin añadir especificación interpretativa.
- source_word: οὕτως
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - de igual modo
  - así
  lexicon: BDAG
  rationale: La correlación con καθώς queda bien reflejada con «así también», que hace explícito el paralelo argumentativo.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - será una señal
  lexicon: BDAG
  rationale: El futuro de εἰμί se traduce de forma directa con «será». En español, el predicado implícito puede quedar sobrentendido por el paralelismo con la primera cláusula, sin sobrecargar la frase.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: BDAG
  rationale: «También» reproduce el valor aditivo de καί en la comparación.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre será una señal
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional y su resonancia mesiánica/apocalíptica, sin reemplazarlo por una paráfrasis interpretativa.
- source_word: τῇ γενεᾷ ταύτῃ
  english_pob_choice: to this generation
  chosen_spanish: para esta generación
  alternatives_spanish:
  - a esta generación
  - en esta generación
  lexicon: BDAG
  rationale: El dativo de referencia/relación se comunica naturalmente con «para». Esto mantiene el sentido de dirección o pertinencia hacia el destinatario colectivo.
theological_decisions:
- issue: Predicado implícito en la segunda cláusula
  english_pob_reading: The Son of Man will be to this generation; the sense 'will be a sign to this generation' is implied by the parallel with Jonah.
  chosen_spanish_reading: El Hijo del Hombre será para esta generación; la idea de «señal» queda implícita por el paralelismo con Jonás.
  alternative_spanish_readings:
  - El Hijo del Hombre será una señal para esta generación
  - El Hijo del Hombre será para esta generación
  rationale: El griego no repite σημείον en la segunda cláusula, por lo que conviene no imponerlo como explícito en el texto principal. A la vez, el paralelismo permite que el lector infiera la misma función, como indica el audit trail en inglés.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Título 'Hijo del Hombre'
  english_pob_reading: Retain the traditional title 'the Son of Man' without interpretive expansion.
  chosen_spanish_reading: Conservar «el Hijo del Hombre» como título tradicional, sin expandirlo a una paráfrasis como «el ser humano» o «el humano».
  alternative_spanish_readings:
  - el Hombre
  - el ser humano
  rationale: La expresión tiene carga titula​r e intertextual en los Evangelios. Mantenerla preserva la tensión lexical y teológica documentada por el POB inglés.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje fue revisado en el POB inglés y quedó sin cambios en el último pase (high_agreement, 0.95). La principal tensión auditada es el predicado implícito en la segunda cláusula; la versión española la conserva de forma sobria y deja la aclaración en nota, sin añadir una paráfrasis no expresada en el griego.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Hijo del Hombre» se mantiene como título fijo, en continuidad con el criterio del POB.
  - «Señal» se eligió para σημεῖον por su naturalidad bíblica en español y por su compatibilidad con el paralelismo del versículo.
  - Se evita introducir «Cristo» o «Mesías», porque el griego no los usa aquí.
