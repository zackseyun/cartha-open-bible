translation:
  language: es
  text: Y estaba expulsando un demonio mudo[a]. Cuando el demonio salió, el hombre mudo habló, y la gente se asombró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sordo»; el adjetivo griego puede significar «sordo» o «mudo», pero aquí «mudo» encaja mejor con el contexto porque el hombre habla después de que el demonio sale.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν ἐκβάλλων
  english_pob_choice: he was casting out
  chosen_spanish: estaba expulsando
  alternatives_spanish:
  - expulsaba
  - estaba echando fuera
  lexicon: BDAG
  rationale: El imperfecto perifrástico en griego expresa acción en desarrollo en pasado. En español, «estaba expulsando» conserva ese aspecto progresivo sin sonar rígido. «Expulsaba» también es posible, pero «estaba expulsando» hace más visible la continuidad de la acción narrativa.
- source_word: δαιμόνιον
  english_pob_choice: demon
  chosen_spanish: demonio
  alternatives_spanish:
  - espíritu inmundo
  - demonio maligno
  lexicon: BDAG
  rationale: El término griego designa directamente un ser demoníaco. Se mantiene «demonio» por fidelidad léxica y porque el contexto ya presenta una acción de exorcismo. «Espíritu inmundo» introduciría una formulación no presente en este versículo.
- source_word: κωφόν
  english_pob_choice: mute
  chosen_spanish: mudo
  alternatives_spanish:
  - sordo
  - incapaz de hablar
  lexicon: BDAG
  rationale: Aunque κωφός puede significar «sordo» o «mudo», aquí el contexto inmediato aclara que la condición destacada es la incapacidad de hablar, porque después «habló». En español, «mudo» reproduce bien ese enfoque y mantiene la fuerza narrativa. Se preserva la tensión de la ambigüedad del adjetivo mediante nota.
- source_word: ἐγένετο δὲ τοῦ δαιμονίου ἐξελθόντος
  english_pob_choice: Then, when the demon had gone out
  chosen_spanish: Entonces, cuando el demonio salió
  alternatives_spanish:
  - Y sucedió que, cuando el demonio salió
  - Entonces, después de que el demonio salió
  lexicon: BDAG
  rationale: La construcción marca la secuencia temporal del relato. «Entonces, cuando el demonio salió» comunica la transición con naturalidad en español. La forma más literal «cuando el demonio había salido» sería correcta, pero en español puede sonar menos fluida sin aportar más claridad al contexto.
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - comenzó a hablar
  - dijo
  lexicon: BDAG
  rationale: λαλέω significa «hablar». «Habló» es la equivalencia directa y natural. No se añade «comenzó a» porque el griego no lo exige.
- source_word: ὁ κωφός
  english_pob_choice: the mute man
  chosen_spanish: el mudo
  alternatives_spanish:
  - el hombre mudo
  - el que era mudo
  lexicon: BDAG
  rationale: El adjetivo sustantivado se refiere a la persona afectada. En español, «el mudo» es conciso y conserva el paralelismo con el adjetivo del versículo. «El hombre mudo» aclara la referencialidad, pero añade un matiz no expresado explícitamente en el griego.
- source_word: ἐθαύμασαν
  english_pob_choice: marveled
  chosen_spanish: se asombraron
  alternatives_spanish:
  - se maravillaron
  - quedaron maravillados
  lexicon: BDAG
  rationale: El verbo expresa sorpresa reverente o admiración. «Se asombraron» comunica bien ese impacto en español actual. «Se maravillaron» también es posible, pero puede sonar un poco más literario y menos inmediato.
- source_word: οἱ ὄχλοι
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - la gente
  - las turbas
  lexicon: BDAG
  rationale: El plural griego se refleja con un plural español. «Las multitudes» preserva la pluralidad y el tono narrativo. «La gente» suavizaría el plural; «las turbas» introduciría una connotación no requerida.
theological_decisions:
- issue: Naturaleza sobrenatural del relato de exorcismo
  english_pob_reading: Render the text as describing an actual demon being cast out, resulting in restored speech.
  chosen_spanish_reading: Mantener el relato como la expulsión real de un demonio, causa inmediata de la recuperación del habla.
  alternative_spanish_readings:
  - Reducirlo a una explicación psicológica o simbólica
  - Traducirlo de modo que oculte la referencia al demonio
  rationale: El griego nombra explícitamente a un δαιμόνιον y presenta su salida como la causa del habla restaurada. La traducción conserva esa afirmación sobrenatural sin suavizarla ni reinterpretarla.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Ambigüedad de κωφός entre 'sordo' y 'mudo'
  english_pob_reading: Or 'deaf'; the Greek adjective can mean either 'deaf' or 'mute,' but here 'mute' best fits the context because the man speaks after the demon departs.
  chosen_spanish_reading: Traducir «mudo» en el texto principal y señalar que el adjetivo griego también puede significar «sordo».
  alternative_spanish_readings:
  - Traducir «sordo»
  - Usar una solución mixta como «sordo-mudo»
  rationale: El contexto inmediato favorece «mudo», porque el resultado narrado es que el hombre habla. Sin embargo, se preserva la tensión léxica con una nota, ya que el griego admite ambos sentidos en distintos contextos.
  doctrine_reference: BDAG; notas textuales y léxicas del POB
- issue: Secuencia temporal de la cláusula genitiva absoluta
  english_pob_reading: Then, when the demon had gone out
  chosen_spanish_reading: Entonces, cuando el demonio salió
  alternative_spanish_readings:
  - Y sucedió que, cuando el demonio salió
  - Entonces, cuando el demonio había salido
  rationale: La cláusula indica una acción anterior a la del verbo principal. El español de la traducción principal mantiene la secuencia narrativa con naturalidad, sin sobrecargar la frase con una reconstrucción demasiado literal.
  doctrine_reference: Principios de equivalencia óptima; gramática del griego koiné
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión sin cambios sustantivos: el texto fuente griego, la auditoría inglesa y el consenso de revisión mantienen alta concordancia. La versión española conserva la decisión de «demonio» y la preferencia contextual por «mudo», con una nota para la ambigüedad léxica de κωφός.'
  spanish_consistency_notes:
  - Se usa «demonio» de manera consistente con el valor directo de δαιμόνιον.
  - Se evita «SEÑOR» o fórmulas equivalentes porque no intervienen nombres divinos en este versículo.
  - Se emplea «las multitudes» para reflejar el plural de οἱ ὄχλοι.
  - Se mantiene un registro sobrio y narrativo, apto para lectura pública y auditoría léxica.
