  revision_rationale: La revisión mantiene todas las decisiones léxicas principales del griego y del POB inglés, pero mejora la naturalidad del español. «El hombre mudo» expresa mejor el referente de ὁ κωφός en español actual. «La gente se asombró» es más idiomático que «las multitudes se asombraron», aun si sacrifica el plural formal; en este contexto narrativo, esa compensación favorece la legibilidad. También se simplifica el enlace temporal para una lectura más fluida sin alterar la secuencia de eventos.
