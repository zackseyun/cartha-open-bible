translation:
  language: es
  text: ¿O si le pide un huevo, le dará un escorpión?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἢ καὶ
  english_pob_choice: Or if
  chosen_spanish: ¿O también, si...
  alternatives_spanish:
  - ¿O si...
  - ¿O incluso si...
  lexicon: BDAG
  rationale: La secuencia griega introduce otro ejemplo en la cadena retórica. «O también, si...» conserva la progresión disyuntiva y el valor acumulativo de καί sin forzar una expansión interpretativa.
- source_word: αἰτήσει
  english_pob_choice: he asks for
  chosen_spanish: le pide
  alternatives_spanish:
  - pide
  - le solicita
  lexicon: BDAG
  rationale: Aunque la forma griega es futuro, en esta pregunta retórica funciona naturalmente como acto de petición. En español, «le pide» expresa con claridad la relación padre-hijo y evita un giro menos idiomático como «le pedirá».
- source_word: ᾠόν
  english_pob_choice: an egg
  chosen_spanish: un huevo
  alternatives_spanish:
  - un huevo de ave
  lexicon: BDAG
  rationale: Glosa directa y normal del sustantivo. «Huevo» comunica el objeto mínimo y cotidiano que sostiene el contraste con «escorpión».
- source_word: ἐπιδώσει
  english_pob_choice: will he give
  chosen_spanish: le dará
  alternatives_spanish:
  - se lo dará
  - le entregará
  lexicon: BDAG
  rationale: El verbo en contexto significa dar en respuesta a una petición. «Le dará» es la forma más natural en español y mantiene la fuerza de la pregunta retórica sin añadir matiz explicativo.
- source_word: σκορπίον
  english_pob_choice: a scorpion
  chosen_spanish: un escorpión
  alternatives_spanish:
  - un alacrán
  lexicon: BDAG
  rationale: «Escorpión» corresponde de manera directa al término griego. Se conserva el contraste abrupto con «huevo» para mantener el absurdo retórico del ejemplo.
theological_decisions:
- issue: Fuerza retórica de la comparación padre-hijo
  english_pob_reading: Render as a straightforward rhetorical question without adding interpretive explanation.
  chosen_spanish_reading: Se traduce como una pregunta retórica directa, sin explicitar con palabras añadidas el contraste implícito.
  alternative_spanish_readings:
  - ¿O también, si le pide un huevo, en lugar de eso le dará un escorpión?
  - ¿O también, si le pide un huevo, acaso le dará un escorpión?
  rationale: El griego deja implícita la oposición absurda entre un huevo y un escorpión. La versión española conserva esa sobriedad para no debilitar la lógica argumentativa de Jesús ni sobreexplicarla.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: No hay cambios relevantes respecto del pasaje fuente ni del audit trail inglés; la decisión principal es mantener el paralelismo retórico con español natural y preciso.
  spanish_consistency_notes:
  - Se usa «huevo» y «escorpión» como equivalentes directos y transparentes.
  - Se evita «SEÑOR» u այլ terminología no pertinente porque el versículo no contiene vocabulario divino nominal.
  - La estructura interrogativa se conserva para reflejar el carácter retórico del texto griego.
