translation:
  language: es
  text: Pero si Satanás también está dividido contra sí mismo, ¿cómo permanecerá su reino? Pues ustedes dicen que yo echo fuera los demonios por Beelzebul[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Beelzebul; algunas tradiciones en inglés usan Beelzebub.
    reason: alternative_reading
lexical_decisions:
- source_word: Σατανᾶς
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - Satán
  lexicon: BDAG
  rationale: Se conserva el nombre propio/transliteración del griego; «Satanás» es la forma más clara y ampliamente reconocible en español.
- source_word: ἐφ’ ἑαυτὸν
  english_pob_choice: against himself
  chosen_spanish: contra sí mismo
  alternatives_spanish:
  - contra él mismo
  - en contra de sí mismo
  lexicon: BDAG
  rationale: La idea es de oposición interna o auto-división; «contra sí mismo» expresa mejor esa tensión en español natural.
- source_word: διεμερίσθη
  english_pob_choice: is divided
  chosen_spanish: está dividido
  alternatives_spanish:
  - fue dividido
  - ha sido dividido
  lexicon: BDAG
  rationale: 'Aunque el griego es aoristo pasivo, en esta pregunta retórica conviene un presente resultativo en español para conservar la fuerza lógica: un reino dividido no puede sostenerse.'
- source_word: πῶς σταθήσεται
  english_pob_choice: how will ... stand
  chosen_spanish: ¿cómo permanecerá...
  alternatives_spanish:
  - ¿cómo se mantendrá...
  - ¿cómo subsistirá...
  lexicon: BDAG
  rationale: «Permanecerá» transmite la idea de mantenerse firme/estable sin sonar forzado; conserva la imagen de estabilidad del verbo griego.
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - dominio
  - reinado
  lexicon: BDAG
  rationale: «Reino» es la correspondencia más directa y natural en este contexto de una entidad gobernada que podría quedar dividida.
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón de la pregunta anterior. En español, «porque» comunica con claridad el valor explicativo/causal.
- source_word: ἐν Βεελζεβοὺλ
  english_pob_choice: by Beelzebul
  chosen_spanish: por Beelzebul
  alternatives_spanish:
  - en Beelzebul
  - mediante Beelzebul
  - con Beelzebul
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente «en», aquí la acusación funciona con sentido instrumental o de agencia; «por Beelzebul» es la opción más natural sin expandir el texto.
- source_word: Βεελζεβοὺλ
  english_pob_choice: Beelzebul
  chosen_spanish: Beelzebul
  alternatives_spanish:
  - Beelzebub
  lexicon: BDAG
  rationale: Se sigue la forma griega atestiguada en el texto fuente. «Beelzebub» queda como variante conocida, pero no es la forma base aquí.
- source_word: ἐκβάλλειν
  english_pob_choice: cast out
  chosen_spanish: echo fuera
  alternatives_spanish:
  - expulso
  - arrojo fuera
  lexicon: BDAG
  rationale: En español bíblico contemporáneo, «echar fuera» conserva bien el sentido exorcístico de ἐκβάλλειν sin sonar arcaico ni técnico.
- source_word: δαιμόνια
  english_pob_choice: demons
  chosen_spanish: los demonios
  alternatives_spanish:
  - los espíritus malignos
  - los demonios/espíritus
  lexicon: BDAG
  rationale: «Demonios» es la equivalencia directa. Se mantiene el artículo para reflejar el sustantivo plural definido del griego y el contexto específico.
theological_decisions:
- issue: Sentido de la acusación sobre la fuente del exorcismo
  english_pob_reading: The verse reports the accusation plainly, without adding interpretive material beyond the Greek.
  chosen_spanish_reading: 'La traducción presenta la acusación de forma directa: que Jesús echa fuera los demonios por Beelzebul, sin añadir explicación doctrinal adicional.'
  alternative_spanish_readings:
  - que Jesús expulsa demonios con ayuda de Beelzebul
  - que Jesús expulsa demonios por el poder de Beelzebul
  rationale: El griego solo afirma la acusación y su medio/instrumento; conviene no resolverla ni amplificarla. Se preserva así la tensión polémica del pasaje.
  doctrine_reference: Preservar la tensión teológica sin explicarla de más.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de SBLGNT y el audit trail inglés. Se ajustó la cláusula final para reflejar la fuerza instrumental de ἐν Βεελζεβούλ en español natural, y se mantuvo la división de la pregunta retórica con un presente resultativo («está dividido / permanecerá»).
  spanish_consistency_notes:
  - Se usó «Satanás» como transliteración estándar del nombre propio.
  - Se conservó «reino» para βασιλεία por claridad y paralelismo contextual.
  - Se prefirió «echar fuera» para el verbo exorcístico ἐκβάλλειν, coherente con el uso bíblico en español.
  - Se mantuvo «demonios» en lugar de una glosa interpretativa más amplia.
  - La nota al pie marca solo la variante del nombre Beelzebul/Beelzebub, siguiendo el aparato inglés.
