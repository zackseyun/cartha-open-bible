    rationale: Aunque no es imposible, «ante» en español suele sugerir presencia o reacción ‘delante de’ algo. Aquí el sentido es que se arrepintieron en respuesta al mensaje proclamado por Jonás. «A la proclamación de Jonás» o «en respuesta a la proclamación de Jonás» comunica mejor el valor causal-responsivo documentado en el audit trail.
  - severity: medium
    issue: La nota [a] está anclada en «la condenarán» pero explica «algo mayor que Jonás está aquí»
    rationale: La disciplina del proyecto exige que el marcador aparezca en la palabra o frase relevante. La nota trata sobre el neutro πλεῖον y sus alternativas, no sobre κατακρινοῦσιν αὐτήν. Debe trasladarse al segmento «algo mayor».
