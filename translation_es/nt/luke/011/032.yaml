base_translation:
  language: en
  yaml_path: translation/nt/luke/011/032.yaml
  text: The men of Nineveh will rise up in the judgment with this generation and will condemn it[a], because they repented at the proclamation of Jonah, and behold, something greater than Jonah is here.
  footnotes:
  - marker: a
    text: Or, 'one greater than Jonah is here' or 'more than Jonah is here.' The Greek uses a neuter form ('greater/more'), which may point broadly to the greater reality present in Jesus and his ministry, not only to a personal comparison.
