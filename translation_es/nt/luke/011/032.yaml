translation:
  language: es
  text: Los hombres de Nínive se levantarán en el juicio junto con esta generación y la condenarán, porque se arrepintieron a la proclamación de Jonás, y he aquí, algo mayor[a] que Jonás está aquí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «uno mayor que Jonás está aquí» o «más que Jonás está aquí». El griego usa una forma neutra («mayor/más»), que puede apuntar de manera amplia a la realidad mayor presente en Jesús y su ministerio, no solo a una comparación personal.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἄνδρες Νινευῖται
  english_pob_choice: The men of Nineveh
  chosen_spanish: Los hombres de Nínive
  alternatives_spanish:
  - Los ninivitas
  - La gente de Nínive
  lexicon: BDAG
  rationale: ἄνδρες marca explícitamente varones; por eso se conserva «hombres» y no se neutraliza a «gente». «De Nínive» mantiene la identificación geográfica/étnica de Νινευῖται sin forzar un gentilicio menos natural en español.
- source_word: ἀναστήσονται
  english_pob_choice: will rise up
  chosen_spanish: se levantarán
  alternatives_spanish:
  - resucitarán
  - se alzarán
  lexicon: BDAG
  rationale: En este contexto judicial-escatológico, ἀναστήσονται puede expresar levantarse o surgir para comparecer. «Se levantarán» conserva la imagen y suena natural en español; «resucitarán» es posible pero añade un matiz más específico que el texto no explicita aquí.
- source_word: ἐν τῇ κρίσει
  english_pob_choice: in the judgment
  chosen_spanish: en el juicio
  alternatives_spanish:
  - en el juicio final
  - en la condenación
  lexicon: BDAG
  rationale: κρίσις designa el acto o escena judicial. «Juicio» es la equivalencia más directa y evita cerrar prematuramente el sentido a «condenación».
- source_word: μετὰ τῆς γενεᾶς ταύτης
  english_pob_choice: with this generation
  chosen_spanish: junto con esta generación
  alternatives_spanish:
  - con esta generación
  - al lado de esta generación
  lexicon: BDAG
  rationale: μετά con genitivo indica asociación. «Junto con» comunica mejor la idea de comparecer en el mismo marco judicial que «con» sin perder naturalidad en español.
- source_word: κατακρινοῦσιν αὐτήν
  english_pob_choice: will condemn it
  chosen_spanish: la condenarán[a]
  alternatives_spanish:
  - la sentenciarán
  - la declararán culpable
  lexicon: BDAG
  rationale: κατακρίνω significa condenar. En español, el objeto femenino concuerda con «esta generación»; por eso se usa «la» para reflejar el antecedente gramatical y la fuerza judicial del verbo.
- source_word: μετενόησαν
  english_pob_choice: they repented
  chosen_spanish: se arrepintieron
  alternatives_spanish:
  - cambiaron de mente
  - cambiaron su manera de pensar
  lexicon: BDAG
  rationale: En este contexto profético, μετανοέω tiene fuerza moral y espiritual, no solo cognitiva. «Se arrepintieron» preserva esa fuerza en español de manera clara y bíblica sin reducirlo a un mero cambio mental.
- source_word: εἰς τὸ κήρυγμα Ἰωνᾶ
  english_pob_choice: at the proclamation of Jonah
  chosen_spanish: ante la proclamación de Jonás
  alternatives_spanish:
  - a la proclamación de Jonás
  - por la proclamación de Jonás
  lexicon: BDAG
  rationale: κήρυγμα es «proclamación»/«anuncio»; el giro con εἰς expresa respuesta o referencia a ese anuncio. «Ante» mantiene la idea de respuesta provocada por el mensaje y funciona con solemnidad en español.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: «He aquí» conserva el tono enfático y solemnemente deíctico de ἰδού. Se añade «y» por fluidez discursiva en español, sin añadir contenido nuevo.
- source_word: πλεῖον Ἰωνᾶ ὧδε
  english_pob_choice: something greater than Jonah is here
  chosen_spanish: algo mayor que Jonás está aquí
  alternatives_spanish:
  - uno mayor que Jonás está aquí
  - más que Jonás está aquí
  lexicon: BDAG
  rationale: πλεῖον es neutro; por eso se evita forzarlo a una comparación masculina («uno mayor»). «Algo mayor» preserva la amplitud del neutro y deja abierta la tensión interpretativa documentada en el aparato inglés. «Está aquí» refleja el presente enfático de ὧδε.
theological_decisions:
- issue: Valor del neutro πλεῖον Ἰωνᾶ
  english_pob_reading: something greater than Jonah is here
  chosen_spanish_reading: algo mayor que Jonás está aquí
  alternative_spanish_readings:
  - uno mayor que Jonás está aquí
  - más que Jonás está aquí
  rationale: 'Se mantiene el neutro como «algo» para no resolver la frase solo en clave de una comparación personal masculina. Así queda abierta la tensión teológica señalada en el audit trail: Jesús está en vista, pero la expresión puede abarcar más ampliamente la realidad mayor presente en su persona y ministerio.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sentido judicial de la escena futura
  english_pob_reading: will rise up in the judgment ... and will condemn it
  chosen_spanish_reading: se levantarán en el juicio ... y la condenarán
  alternative_spanish_readings:
  - resucitarán en el juicio ... y la condenarán
  - comparecerán en el juicio ... y la condenarán
  rationale: La formulación española conserva el marco judicial sin convertirlo innecesariamente en una explicación doctrinal más explícita que el griego. «Se levantarán» mantiene la vividez de la escena y deja abierta la relación entre comparecencia y vindicación/juicio final.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que corrigió «changed their thinking» por «repented» y ajustó la frase de la proclamación de Jonás para un registro más formal. También se respetó la decisión auditada de mantener el neutro πλεῖον sin reducirlo a una comparación masculina estricta.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - «Jonás» se mantiene como forma española estándar del nombre bíblico.
  - Se prefirió «juicio» y «condenarán» para conservar el campo semántico forense de κρίσις y κατακρίνω.
  - La nota al pie a está anclada en la frase «algo mayor que Jonás» para reflejar la alternativa neutra documentada en el audit trail.
