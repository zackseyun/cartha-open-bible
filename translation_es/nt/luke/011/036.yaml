review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego y sigue de cerca el rastro del POB en los puntos principales: «cuerpo», la doble totalidad de ὅλον, «lleno de luz», la negación de una parte oscura, «como cuando», «lámpara» y el valor de ἀστραπή como resplandor/brillo y no relámpago literal. Sin embargo, «estará completamente lleno de luz» introduce un matiz adverbial más interpretativo que la repetición enfática del griego («será todo luminoso / estará todo lleno de luz»). Además, la nota al pie omite la alternativa más cercana al inglés auditado («como cuando una lámpara te ilumina con un destello»).'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para sonar más natural y más pegado a la estructura enfática del original. «sin tener parte alguna oscura» es correcto, aunque «sin tener ninguna parte oscura» fluye mejor. «te alumbra» es aceptable, pero «te ilumina» encaja mejor con el registro neutral moderno y con la alternativa documentada. La principal mejora es evitar «completamente» y repetir la idea de totalidad de modo más paralelo.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los términos clave se manejan adecuadamente: σῶμα -> «cuerpo»; φωτεινόν -> «lleno de luz»; λύχνος -> «lámpara». No aparecen términos del glosario maestro como Yahvé, Mesías, Espíritu, etc. La decisión de no explicitar la metáfora teológica es correcta.'
  issues:
  - severity: medium
    issue: La segunda ocurrencia de ὅλον se vierte como «completamente» en vez de mantener la repetición enfática de totalidad.
    rationale: El griego repite φωτεινὸν ὅλον, y el inglés POB conserva «wholly full of light». «Completamente» comunica intensidad, pero debilita el paralelismo imagético del original. Una forma como «estará todo lleno de luz» o «será todo luminoso» preserva mejor la repetición.
  - severity: low
    issue: «sin tener parte alguna oscura» es correcto pero algo menos natural que una formulación más llana.
    rationale: La frase actual es fiel, pero «sin tener ninguna parte oscura» suena más natural en español general sin perder precisión.
  - severity: low
    issue: La nota al pie no preserva del todo la alternativa auditada de «flash/destello».
    rationale: El inglés POB mantiene la alternativa «as when a lamp illumines you with a flash». Conviene reflejar esa posibilidad en español con «destello» o «fulgor» además de «brillo».
  revised_spanish_text: Si, pues, tu cuerpo entero está lleno de luz, sin tener ninguna parte oscura, estará todo lleno de luz, como cuando una lámpara te ilumina[a] con su resplandor.
  revised_footnotes:
  - marker: a
    text: O «como cuando una lámpara te ilumina con un destello»; el término griego puede denotar destello o resplandor, aunque aquí probablemente se refiere al brillo de la lámpara y no a un relámpago literal.
    reason: lexical_alternative
  revision_rationale: Se ajusta la segunda mitad para reflejar mejor la repetición enfática de ὅλον, se mejora la fluidez de la negación con «ninguna parte oscura», y se actualiza la nota para preservar más fielmente la alternativa léxica auditada sobre ἀστραπή.
