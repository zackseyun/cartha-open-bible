translation:
  language: es
  text: Si, pues, tu cuerpo entero está lleno de luz, sin tener ninguna parte oscura, estará todo lleno de luz, como cuando una lámpara te ilumina[a] con su resplandor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como cuando una lámpara te ilumina con un destello»; el término griego puede denotar destello o resplandor, aunque aquí probablemente se refiere al brillo de la lámpara y no a un relámpago literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: σῶμά
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo entero
  - persona entera
  - ser
  lexicon: BDAG
  rationale: «σῶμα» es literalmente «cuerpo»; en este dicho conserva la imagen concreta que Jesús usa en el contexto del ojo y la luz. «Cuerpo» mantiene la metáfora sin explicarla indebidamente.
- source_word: ὅλον
  english_pob_choice: whole
  chosen_spanish: entero / completamente
  alternatives_spanish:
  - todo
  - completo
  - totalmente
  lexicon: BDAG
  rationale: El término aparece dos veces para intensificar la totalidad. «Entero» y «completamente» reproducen esa fuerza totalizadora en español sin sonar forzados.
- source_word: φωτεινόν
  english_pob_choice: full of light
  chosen_spanish: lleno de luz
  alternatives_spanish:
  - luminoso
  - brillante
  - repleto de luz
  lexicon: BDAG
  rationale: «Lleno de luz» comunica el predicado de manera natural en español y preserva el contraste con «oscura».
- source_word: μὴ ἔχον μέρος τι σκοτεινόν
  english_pob_choice: having no dark part
  chosen_spanish: sin tener parte alguna oscura
  alternatives_spanish:
  - sin tener ningún parte oscura
  - sin ninguna parte oscura
  - sin tener parte oscura alguna
  lexicon: BDAG
  rationale: La construcción participial se vierte con una frase natural en español que mantiene la imagen concreta de una «parte» oscura y el sentido de negación total.
- source_word: μέρος τι
  english_pob_choice: part
  chosen_spanish: parte alguna
  alternatives_spanish:
  - alguna parte
  - algún lado
  - ninguna parte
  lexicon: BDAG
  rationale: El indefinido con negación se expresa bien con «parte alguna», que suena idiomático y conserva la idea de «alguna/some part» sin añadir explicación.
- source_word: ἔσται
  english_pob_choice: it will be
  chosen_spanish: estará
  alternatives_spanish:
  - será
  - va a estar
  lexicon: BDAG
  rationale: El futuro de εἰμί se traduce de forma directa; «estará» es claro y natural en español actual.
- source_word: ὡς ὅταν
  english_pob_choice: as when
  chosen_spanish: como cuando
  alternatives_spanish:
  - así como cuando
  - tal como cuando
  - igual que cuando
  lexicon: BDAG
  rationale: La combinación comparativa-temporal se expresa con «como cuando», que es concisa y fiel al paralelismo del texto.
- source_word: λύχνος
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - lámpara de aceite
  - lámpara
  - farol
  lexicon: BDAG
  rationale: «λύχνος» designa una lámpara portátil; «lámpara» es el equivalente más natural en español y conserva la imagen concreta.
- source_word: τῇ ἀστραπῇ
  english_pob_choice: with its brightness
  chosen_spanish: con su resplandor
  alternatives_spanish:
  - con su brillo
  - con su brillo radiante
  - con su fulgor
  lexicon: BDAG
  rationale: En este contexto, ἀστραπή no se lee como «relámpago» literal, sino como fulgor/brillo. «Resplandor» transmite bien el sentido luminoso asociado a la lámpara.
- source_word: φωτίζῃ σε
  english_pob_choice: lights you
  chosen_spanish: te alumbra
  alternatives_spanish:
  - te ilumina
  - te da luz
  - te esclarece
  lexicon: BDAG
  rationale: «Alumbrar» es una forma natural y bíblicamente inteligible en español para el verbo de dar luz; conserva el objeto personal «te» y el acto de iluminar.
theological_decisions:
- issue: Metáfora del cuerpo lleno de luz y su condición moral/espiritual
  english_pob_reading: Retain the bodily/light imagery without explicating it as a doctrinal statement about the soul or moral state.
  chosen_spanish_reading: Conservar la imaginería del cuerpo y la luz sin convertirla en una paráfrasis explicativa sobre el alma o la condición interior.
  alternative_spanish_readings:
  - parafrasear como vida interior o condición espiritual
  - explicitar una interpretación moral del texto
  rationale: El versículo forma parte de un dicho metafórico enlazado con el contexto del ojo como lámpara del cuerpo. La traducción mantiene la tensión interpretativa en lugar de resolverla.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incluyendo el marcador [a] directamente en el texto español, anclado en «alumbra[a]».
  spanish_consistency_notes:
  - Se mantuvo «cuerpo» para σῶμα, coherente con el lenguaje metafórico del contexto.
  - Se eligió «luz» / «resplandor» para conservar la imaginería luminosa sin forzar una explicación doctrinal.
  - Se evitó «SEÑOR» u այլ sustituciones no pertinentes; el pasaje no contiene nombres divinos explícitos.
  - «Alumbra» es preferido aquí por fluidez y tradición bíblica del español, sin perder el sentido de φωτίζῃ.
