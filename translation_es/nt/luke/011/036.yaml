revisions:
- from: Si, pues, tu cuerpo entero está lleno de luz, sin tener parte alguna oscura, estará completamente lleno de luz, como cuando una lámpara te alumbra[a] con su resplandor.
  to: Si, pues, tu cuerpo entero está lleno de luz, sin tener ninguna parte oscura, estará todo lleno de luz, como cuando una lámpara te ilumina[a] con su resplandor.
  rationale: Se ajusta la segunda mitad para reflejar mejor la repetición enfática de ὅλον, se mejora la fluidez de la negación con «ninguna parte oscura», y se actualiza la nota para preservar más fielmente la alternativa léxica auditada sobre ἀστραπή.
