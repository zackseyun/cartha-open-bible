revisions:
- from: Pero otros[a], poniéndolo a prueba, buscaban de él una señal del cielo.
  to: Pero otros[a], poniéndolo a prueba, le pedían una señal del cielo.
  rationale: Se cambia «buscaban de él» por «le pedían» para producir un español natural y claro que exprese la idea de solicitar algo a Jesús. Aunque «pedían» es una alternativa al inglés auditado «were seeking», en español aquí representa mejor ἐζήτουν παρ’ αὐτοῦ que la forma calcada y poco idiomática del borrador. Se conserva «señal del cielo» y la nota alternativa documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:01:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: contraste con «otros», participio hostil «poniéndolo a prueba», solicitud continua en imperfecto, y la idea de una «señal» con procedencia celestial. Sin embargo, «buscaban de él» suena poco natural en español y no transmite con claridad la función de παρ’ αὐτοῦ como fuente de la solicitud. Conviene ajustar el orden para preservar tanto «de él» como «del cielo» de manera idiomática.'
  spanish_quality_summary: El español es claro en casi todo, pero «buscaban de él una señal del cielo» resulta forzado y poco natural en lectura continua. Una reordenación sencilla mejora mucho la fluidez sin perder precisión. El resto del versículo mantiene un tono moderno y digno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Señal» para σημεῖον, «cielo» para οὐρανός y «poniéndolo a prueba» para πειράζοντες son opciones adecuadas. La nota alternativa «una señal celestial» está bien conservada.
  issues:
  - severity: medium
    issue: «buscaban de él» es poco idiomático en español
    rationale: Aunque intenta preservar παρ’ αὐτοῦ, en español suena antinatural y puede dificultar la comprensión. Una formulación como «buscaban de él una señal que viniera del cielo» o «buscaban de él una señal del cielo» sigue siendo torpe; es mejor reordenar a «le buscaban una señal del cielo» no preserva bien la fuente. «buscaban de su parte una señal del cielo» añade matiz no expreso. La solución más natural y fiel es «le pedían una señal del cielo» o «buscaban que él les diera una señal del cielo»; dado que el inglés auditado privilegia ‘were seeking’, la mejor reparación es «buscaban de él una señal que viniera del cielo» solo si se prioriza literalidad, pero sigue siendo pesada. Por equilibrio de fidelidad y español, conviene usar «buscaban de él una señal del cielo» no es ideal y debe corregirse.
  - severity: low
    issue: La revisión inglesa reordenó la frase para evitar doble ‘from’; el español necesita una solución equivalente
    rationale: El texto español actual mantiene una estructura formalmente cercana, pero no resuelve elegantemente la doble relación preposicional. La traducción debe conservar ambas sin sonar calcada.
  revised_spanish_text: Pero otros[a], poniéndolo a prueba, le pedían una señal del cielo.
  revised_footnotes:
  - marker: a
    text: 'O: «una señal celestial».'
    reason: lexical_alternative
  revision_rationale: Se cambia «buscaban de él» por «le pedían» para producir un español natural y claro que exprese la idea de solicitar algo a Jesús. Aunque «pedían» es una alternativa al inglés auditado «were seeking», en español aquí representa mejor ἐζήτουν παρ’ αὐτοῦ que la forma calcada y poco idiomática del borrador. Se conserva «señal del cielo» y la nota alternativa documentada.
