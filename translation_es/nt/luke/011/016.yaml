translation:
  language: es
  text: Pero otros[a], poniéndolo a prueba, le pedían una señal del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una señal celestial».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτεροι
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - algunos otros
  lexicon: BDAG
  rationale: ἕτεροι contrasta a este grupo con los hablantes anteriores; «otros» conserva esa oposición de manera natural en español.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce contraste suave; «Pero» expresa bien la transición adversativa en el contexto narrativo.
- source_word: πειράζοντες
  english_pob_choice: testing him
  chosen_spanish: poniéndolo a prueba
  alternatives_spanish:
  - tentándolo
  - probándolo
  lexicon: BDAG
  rationale: En este contexto hostil, πειράζω implica una prueba con intención negativa. «Poniéndolo a prueba» comunica esa fuerza sin limitarla al sentido moral más estrecho de «tentar».
- source_word: σημεῖον
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - un signo
  - una señal milagrosa
  lexicon: BDAG
  rationale: «Señal» es el equivalente natural y transparente de σημεῖον. Mantiene la ambigüedad controlada del término sin añadir más de lo que el texto dice.
- source_word: ἐξ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  - celestial
  lexicon: BDAG
  rationale: La frase indica procedencia celeste; «del cielo» es idiomático en español y preserva la referencia al origen de la señal.
- source_word: ἐζήτουν
  english_pob_choice: were seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - estaban buscando
  - pedían
  lexicon: BDAG
  rationale: El imperfecto marca acción շարունակada. «Buscaban» reproduce bien ese valor durativo sin forzar una perífrasis pesada.
- source_word: παρ’ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de parte de él
  - le pedían a él
  lexicon: BDAG
  rationale: παρά con genitivo señala procedencia o fuente de la solicitud. «De él» conserva esa relación y evita una repetición pesada en español.
theological_decisions:
- issue: Naturaleza de la señal pedida
  english_pob_reading: a sign from heaven
  chosen_spanish_reading: una señal del cielo
  alternative_spanish_readings:
  - una señal celestial
  - una señal que viniera del cielo
  rationale: 'La frase se traduce de manera directa para conservar la tensión narrativa: no se especifica más de lo que el griego afirma, solo que la señal debía venir del ámbito celestial.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del inglés POB al reflejar ἐζήτουν con un imperfecto continuo («buscaban») y al conservar por separado la procedencia de la señal («del cielo») y la fuente de la solicitud («de él») sin acumular preposiciones en español.
  spanish_consistency_notes:
  - Se mantuvo «señal» para σημεῖον por consistencia con el valor básico del término y por ser el equivalente más natural en español.
  - Se usó «del cielo» para ἐξ οὐρανοῦ, reservando «celestial» para la nota alternativa, porque el texto habla de procedencia y no de cualidad adjetival.
  - Se evitó «tentar» para πειράζοντες para no reducir indebidamente el matiz de prueba hostil.
  - La estructura conserva el contraste inicial con «Pero» y el sujeto implícito de la acción de buscar, de acuerdo con el griego.
