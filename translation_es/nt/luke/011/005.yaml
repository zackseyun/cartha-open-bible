translation:
  language: es
  text: 'Y les dijo[a]: «¿Quién de ustedes que tiene un amigo irá a verlo a medianoche y le dirá: “Amigo, préstame tres panes”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posibilidad es: «¿Quién de ustedes tiene un amigo y va a verlo a medianoche…?». El griego usa formas futuras dentro de una pregunta retórica; en español puede sonar más natural expresar la primera parte con presente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ εἶπεν πρὸς αὐτούς
  english_pob_choice: And he said to them
  chosen_spanish: Y les dijo
  alternatives_spanish:
  - Entonces les dijo
  - Y les habló
  lexicon: BDAG
  rationale: El griego usa una fórmula narrativa simple de continuación. «Y les dijo» conserva la conexión y la dirección del habla sin sobrecargar el texto.
- source_word: Τίς ἐξ ὑμῶν
  english_pob_choice: Which of you
  chosen_spanish: ¿Quién de ustedes
  alternatives_spanish:
  - ¿Cuál de ustedes
  - ¿Quién entre ustedes
  lexicon: BDAG
  rationale: «¿Quién de ustedes?» es la forma natural en español para una pregunta retórica dirigida al auditorio, y mantiene el desafío directo del original.
- source_word: ἕξει
  english_pob_choice: who has / will have
  chosen_spanish: que tiene
  alternatives_spanish:
  - que tendrá
  - que posee
  lexicon: BDAG
  rationale: 'Aunque el griego usa futuro, la pregunta retórica suena más natural en español con presente: «que tiene». Esto sigue la revisión inglesa que privilegia la idiomaticidad sin perder la fuerza del planteamiento.'
- source_word: φίλον / Φίλε
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - amigo mío
  - compañero
  lexicon: BDAG
  rationale: Se conserva la repetición léxica entre el sustantivo y el vocativo con «amigo», que es la equivalencia más directa y natural.
- source_word: πορεύσεται πρὸς αὐτόν
  english_pob_choice: will go to him
  chosen_spanish: irá a él
  alternatives_spanish:
  - se irá con él
  - se acercará a él
  lexicon: BDAG
  rationale: El verbo de movimiento se vierte de manera simple y fiel. «Irá a él» expresa el desplazamiento sin añadir matices no explícitos.
- source_word: μεσονυκτίου
  english_pob_choice: at midnight
  chosen_spanish: a medianoche
  alternatives_spanish:
  - a la medianoche
  - en plena medianoche
  lexicon: BDAG
  rationale: «A medianoche» es la forma idiomática y precisa en español para el valor temporal del genitivo.
- source_word: εἴπῃ αὐτῷ
  english_pob_choice: say to him
  chosen_spanish: le dirá
  alternatives_spanish:
  - le dirá a él
  - le dirá esto
  lexicon: BDAG
  rationale: El español permite comprimir «decir a él» en «le dirá», manteniendo claridad y naturalidad.
- source_word: Φίλε
  english_pob_choice: Friend
  chosen_spanish: Amigo
  alternatives_spanish:
  - Amigo mío
  - Querido amigo
  lexicon: BDAG
  rationale: El vocativo se conserva con la misma palabra base que el sustantivo previo para mantener la repetición del griego.
- source_word: χρῆσόν μοι
  english_pob_choice: lend me
  chosen_spanish: préstame
  alternatives_spanish:
  - hazme el favor de prestarme
  - dame prestados
  lexicon: BDAG
  rationale: En el contexto de una solicitud temporal a un vecino, «préstame» reproduce bien el sentido de pedir algo para uso momentáneo.
- source_word: τρεῖς ἄρτους
  english_pob_choice: three loaves
  chosen_spanish: tres panes
  alternatives_spanish:
  - tres hogazas
  - tres panes grandes
  lexicon: BDAG
  rationale: Ἄρτους puede referirse a panes/loaves. En español, «tres panes» es natural y suficientemente preciso; «hogazas» sería más específico de lo necesario.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego SBLGNT y toma como guía la revisión inglesa más reciente, que prefirió una formulación idiomática para la pregunta retórica inicial sin cambiar el contenido. También conserva la repetición de «amigo» y el valor temporal de «a medianoche».
  spanish_consistency_notes:
  - Se mantuvo «amigo» para φίλον/Φίλε para preservar la repetición léxica del griego.
  - Se prefirió «a medianoche» como equivalente natural de μεσονυκτίου.
  - Se usó presente en «que tiene» por la fuerza retórica del dicho, aunque el griego emplea futuro.
  - «Panes» traduce ἄρτους en un registro claro y amplio, sin introducir un matiz más técnico que el necesario.
