translation:
  language: es
  text: Y yo les digo[a], pidan, y se les dará; busquen, y hallarán; toquen, y se les abrirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más explícita reflejando los imperativos presentes griegos: «sigan pidiendo ... sigan buscando ... sigan tocando».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: Κἀγὼ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y yo también
  - Así que yo
  lexicon: BDAG
  rationale: La crasis añade continuidad y énfasis. «Y yo» conserva la conexión con la enseñanza previa sin sobrecargar el matiz.
- source_word: λέγω
  english_pob_choice: tell
  chosen_spanish: les digo
  alternatives_spanish:
  - les hablo
  - les aseguro
  lexicon: BDAG
  rationale: En español, «les digo» reproduce de forma natural la fórmula introductoria de discurso directo y mantiene el tono solemne.
- source_word: αἰτεῖτε
  english_pob_choice: ask
  chosen_spanish: pidan
  alternatives_spanish:
  - sigan pidiendo
  - soliciten
  lexicon: BDAG
  rationale: «Pidan» expresa bien el imperativo plural y es idiomático. El posible matiz durativo del presente queda disponible en el contexto, sin imponerse en la redacción principal.
- source_word: ζητεῖτε
  english_pob_choice: seek
  chosen_spanish: busquen
  alternatives_spanish:
  - sigan buscando
  - procuren
  lexicon: BDAG
  rationale: «Busquen» es el equivalente más natural de ζητέω en este contexto de búsqueda diligente y mantiene el paralelismo con los otros imperativos.
- source_word: κρούετε
  english_pob_choice: knock
  chosen_spanish: llamen
  alternatives_spanish:
  - toquen
  - golpeen
  lexicon: BDAG
  rationale: En español, para una puerta la forma más natural y fiel es «llamen». Conserva la imagen de llamar a la puerta con el sentido del griego κρούω.
- source_word: δοθήσεται
  english_pob_choice: it will be given
  chosen_spanish: se les dará
  alternatives_spanish:
  - les será dado
  lexicon: BDAG
  rationale: La pasiva futura se vierte de manera natural en español con «se les dará», manteniendo el valor impersonal y la promesa dirigida a los destinatarios.
- source_word: εὑρήσετε
  english_pob_choice: you will find
  chosen_spanish: hallarán
  alternatives_spanish:
  - encontrarán
  lexicon: BDAG
  rationale: «Hallarán» es una opción clásica pero plenamente comprensible para εὑρίσκω y preserva el paralelismo con el ritmo de la serie. «Encontrarán» sería igualmente viable, pero «hallarán» sostiene mejor la cadencia tradicional sin arcaísmo excesivo.
- source_word: ἀνοιγήσεται
  english_pob_choice: it will be opened
  chosen_spanish: se les abrirá
  alternatives_spanish:
  - será abierto para ustedes
  lexicon: BDAG
  rationale: El pasivo futuro deja el objeto implícito; en español, «se les abrirá» mantiene la impersonalidad y la referencia contextual a la puerta sugerida por «llamen».
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  lexicon: BDAG
  rationale: El dativo plural se integra naturalmente en los clíticos de objeto indirecto «les»; «a ustedes» sería más explícito, pero menos fluido en esta serie paralela.
theological_decisions:
- issue: Aspecto de los imperativos presentes αἰτεῖτε, ζητεῖτε, κρούετε
  english_pob_reading: La traducción inglesa los deja como imperativos simples en el cuerpo principal, con una nota para la posible fuerza continuativa ('keep asking...').
  chosen_spanish_reading: 'Imperativos simples: «pidan, busquen, llamen», con la fuerza de perseverancia sugerida por el contexto, no explicitada en el texto principal.'
  alternative_spanish_readings:
  - sigan pidiendo, sigan buscando, sigan llamando
  - mantengan la petición, la búsqueda y el llamado
  rationale: El presente imperativo puede sugerir acción continua, pero en español conviene evitar una expansión interpretativa en el cuerpo principal. La nota puede reservar la alternativa de continuidad si se desea reflejarla.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando el marcador [a] directamente en el texto español en el lugar correspondiente («les digo[a]»), de modo que la nota quede anclada y consistente con el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo triple del griego con tres imperativos breves en español.
  - Se evitó traducir mecánicamente «knock» por «golpear»; «llamen» comunica mejor la imagen de llamar a la puerta en español.
  - Se preservó la impersonalidad de las pasivas futuras con construcciones en «se».
  - Se eligió un registro moderno y reverente, sin recurrir a fórmulas eclesiásticas innecesariamente arcaicas.
