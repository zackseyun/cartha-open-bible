review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura triple del griego y refleja adecuadamente Κἀγὼ ὑμῖν λέγω con «Y yo les digo». También conserva correctamente los imperativos simples y la nota sobre la posible fuerza continuativa de los presentes. Sin embargo, κρούετε significa específicamente «llamar/golpear/tocar a la puerta», y en este contexto la secuencia tradicional y semánticamente más precisa en español se expresa mejor con «toquen» que con «llamen», ya que «llamen» en español moderno puede entenderse como «hacer una llamada» o «llamar por nombre».
  spanish_quality_summary: El texto es claro y digno, pero «hallarán» suena algo más elevado que el resto; aun así, sigue siendo comprensible y aceptable. El ajuste principal es de precisión idiomática en «toquen», que mejora la imagen concreta de la puerta y evita una ambigüedad moderna. La puntuación debe seguir más de cerca el modelo auditado con coma tras «digo» en lugar de dos puntos, aunque esto es menor.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones para «pidan», «busquen» y «se les dará / se les abrirá» son adecuadas. La única decisión léxica a corregir es κρούετε: preferible «toquen» en este contexto.'
  issues:
  - severity: medium
    issue: «llamen» para κρούετε es menos preciso y más ambiguo que «toquen»
    rationale: κρούω aquí describe la acción física de tocar/golpear a una puerta. «Llamen» puede funcionar por la expresión «llamar a la puerta», pero en español contemporáneo también puede sugerir «hacer una llamada» o «convocar», debilitando la imagen concreta que el griego mantiene.
  - severity: low
    issue: Los dos puntos tras «les digo» no reproducen tan bien la puntuación y el flujo del original/POB como una coma
    rationale: El griego y el inglés auditado presentan la fórmula introductoria seguida de coma. En español, la coma mantiene mejor el ritmo paratáctico de la sentencia.
  revised_spanish_text: Y yo les digo[a], pidan, y se les dará; busquen, y hallarán; toquen, y se les abrirá.
  revised_footnotes:
  - marker: a
    text: 'O, de manera más explícita reflejando los imperativos presentes griegos: «sigan pidiendo ... sigan buscando ... sigan tocando».

      '
    reason: lexical_alternative
  revision_rationale: Se corrige κρούετε de «llamen» a «toquen» para preservar mejor la imagen concreta de tocar a una puerta y evitar ambigüedad moderna. También se ajusta la puntuación introductoria a una coma para seguir más de cerca el flujo del original y del POB inglés. Se mantiene la nota aspectual, adaptando «llamando» a «tocando» para concordar con el texto principal.
