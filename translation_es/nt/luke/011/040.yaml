translation:
  language: es
  text: ¡Necios! ¿No hizo también lo interior el que hizo lo exterior?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el exterior ... el interior». La expresión puede referirse tanto al exterior y al interior del recipiente en el contexto inmediato como, por extensión, a la vida exterior e interior de la persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφρονες
  english_pob_choice: Fools
  chosen_spanish: ¡Necios!
  alternatives_spanish:
  - ¡Insensatos!
  - ¡Faltos de juicio!
  lexicon: BDAG
  rationale: El vocativo plural funciona como reproche directo y fuerte. «Necios» conserva la fuerza retórica natural en español y comunica la reprensión sin suavizarla. «Insensatos» sería posible, pero suena más literario y menos directo en este contexto.
- source_word: οὐχ ... ἐποίησεν;
  english_pob_choice: Did not ... make?
  chosen_spanish: ¿No hizo ...?
  alternatives_spanish:
  - ¿Acaso no hizo ...?
  - ¿No ha hecho ...?
  lexicon: BDAG
  rationale: La pregunta negativa espera respuesta afirmativa. En español, «¿No hizo ...?» reproduce bien el valor retórico del griego y mantiene el aoristo como pasado simple, sin volverlo una afirmación plana.
- source_word: ὁ ποιήσας
  english_pob_choice: the one who made
  chosen_spanish: el que hizo
  alternatives_spanish:
  - el que hizo
  - el que formó
  - el hacedor de
  lexicon: BDAG
  rationale: El participio articular funciona como sustantivo. «El que hizo» es claro, natural y conserva la referencia personal al agente sin añadir explícitamente «Dios» donde el griego no lo dice.
- source_word: τὸ ἔξωθεν
  english_pob_choice: the outside
  chosen_spanish: lo de afuera
  alternatives_spanish:
  - el exterior
  - lo exterior
  lexicon: BDAG
  rationale: La expresión neutra apunta al aspecto externo y, en el contexto inmediato, al exterior del vaso o plato. «Lo de afuera» mantiene esa amplitud y permite la extensión a la vida externa.
- source_word: τὸ ἔσωθεν
  english_pob_choice: the inside
  chosen_spanish: lo de adentro
  alternatives_spanish:
  - lo interior
  - el interior
  lexicon: BDAG
  rationale: En paralelo con τὸ ἔξωθεν, «lo de adentro» preserva el contraste y deja abierta la aplicación tanto al interior del recipiente como a la vida interior humana.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - además
  lexicon: BDAG
  rationale: '«También» expresa mejor en español la lógica implícita del argumento: el mismo que hizo lo exterior hizo igualmente lo interior.'
theological_decisions:
- issue: Referencia implícita al Creador
  english_pob_reading: An implicit reference to God as Creator is preserved without explicit interpretive expansion.
  chosen_spanish_reading: Se conserva una referencia implícita al Creador sin añadir explícitamente «Dios».
  alternative_spanish_readings:
  - 'Hacer explícito: «¿No hizo también Dios...?»'
  - Reducir la frase al mero fabricante del recipiente
  rationale: El griego mantiene la formulación general; la frase puede leerse en el nivel inmediato del objeto y, a la vez, con implicación teológica sobre Dios como Creador. El español conserva esa tensión sin resolverla por expansión interpretativa.
  doctrine_reference: Preservar la tensión exegética y teológica sin sobreexplicarla.
translation_notes:
  revision_awareness: 'Coincide con el trazado auditado en inglés: no se requieren revisiones posteriores; se mantiene la pregunta retórica, la alternancia exterior/interior y la referencia implícita al Creador.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el texto griego no contiene κύριος.
  - Se mantiene «lo de afuera / lo de adentro» para reflejar el alcance semántico del neutro griego.
  - La nota al pie preserva la amplitud contextual que el POB inglés documentó para exterior/interior.
