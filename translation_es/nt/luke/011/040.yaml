revisions:
- from: ¡Necios! ¿No hizo también el que hizo lo de afuera y lo de adentro?[a]
  to: ¡Necios! ¿No hizo también lo interior el que hizo lo exterior?[a]
  rationale: Se ajusta la sintaxis para evitar la repetición poco natural de «hizo» y reflejar con más claridad el participio sustantivado «el que hizo». También se adopta «lo exterior / lo interior» en el texto principal por mayor dignidad y legibilidad en español, manteniendo la amplitud semántica y la nota explicativa ya documentada.
