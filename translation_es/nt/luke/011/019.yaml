translation:
  language: es
  text: Pero si yo expulso los demonios por Beelzebul, ¿por quién[a] los expulsan sus hijos? Por tanto, ellos[b] serán sus jueces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por qué medio» o «por qué poder» los expulsan sus hijos.
    reason: lexical_alternative
  - marker: b
    text: O «ellos mismos serán sus jueces», preservando el énfasis del pronombre griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: BDAG
  rationale: δέ introduce contraste argumentativo; en español, «Pero si» conserva mejor la réplica polémica de Jesús que una simple adición coordinante.
- source_word: ἐγώ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: BDAG
  rationale: El pronombre explícito refuerza el contraste; en español puede mantenerse por medio del orden «yo expulso» sin necesidad de enfatizador adicional.
- source_word: ἐν Βεελζεβοὺλ
  english_pob_choice: by Beelzebul
  chosen_spanish: por Beelzebul
  alternatives_spanish:
  - en Beelzebul
  - por el poder de Beelzebul
  lexicon: BDAG
  rationale: Aquí ἐν tiene valor instrumental/agentivo en el argumento; «por Beelzebul» es la forma natural en español para ese matiz, sin expandir a «por el poder de».
- source_word: ἐκβάλλω τὰ δαιμόνια
  english_pob_choice: cast out the demons
  chosen_spanish: expulso los demonios
  alternatives_spanish:
  - echo fuera a los demonios
  - arrojo fuera a los demonios
  lexicon: BDAG
  rationale: «Expulsar» transmite bien ἐκβάλλω en contexto de exorcismo y suena más fluido en español que un calco de «echar/castar fuera». «Demonios» traduce τὰ δαιμόνια con el valor personal/espiritual adecuado.
- source_word: οἱ υἱοὶ ὑμῶν
  english_pob_choice: your sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos de ustedes
  lexicon: BDAG
  rationale: Se conserva el sentido literal de υἱοί como «hijos», pero en español la referencia posesiva queda más natural con «sus» en este contexto polémico dirigido a los interlocutores.
- source_word: ἐν τίνι
  english_pob_choice: by whom
  chosen_spanish: ¿por quién?
  alternatives_spanish:
  - ¿por qué?
  - ¿por medio de quién?
  lexicon: BDAG
  rationale: El interrogativo con ἐν pregunta por agente o medio; dado que el contraste es con Beelzebul como referente personal, «¿por quién?» reproduce mejor la fuerza retórica que «¿por qué?».
- source_word: ἐκβάλλουσιν
  english_pob_choice: cast them out
  chosen_spanish: los expulsan
  alternatives_spanish:
  - los echan fuera
  - los arrojan fuera
  lexicon: BDAG
  rationale: Se mantiene la misma raíz semántica que en la primera cláusula mediante «expulsan», y el objeto se recupera de manera natural en español a partir del contexto inmediato.
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Introducción inferencial directa y formal, apropiada para el razonamiento de Jesús.
- source_word: αὐτοὶ ὑμῶν κριταὶ ἔσονται
  english_pob_choice: they will be your judges
  chosen_spanish: ellos serán sus jueces
  alternatives_spanish:
  - ellos mismos serán sus jueces
  - serán jueces de ustedes
  lexicon: BDAG
  rationale: Se conserva la estructura predicativa y el valor de κριταί como «jueces». El pronombre intensivo αὐτοί queda implícito en el énfasis natural del español; la alternativa más explícita se deja reflejada en notas.
theological_decisions:
- issue: Identidad de «sus hijos»
  english_pob_reading: Retain the literal rendering 'your sons' rather than resolving it to 'your followers' or 'your disciples.'
  chosen_spanish_reading: Mantener la referencia literal a «sus hijos» en lugar de resolverla como «sus discípulos» o «sus seguidores».
  alternative_spanish_readings:
  - sus discípulos
  - sus seguidores
  - los de ustedes
  rationale: El griego dice υἱοί, no un término para discípulos. La traducción debe conservar la tensión interpretativa y dejar abierta la relación exacta entre esos exorcistas y los interlocutores de Jesús.
  doctrine_reference: Translation philosophy §§3–4
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado de revisión más reciente: no hubo cambios sustantivos en el inglés auditado, y la versión española conserva la misma estructura argumentativa, la referencia literal a «sus hijos» y la ambigüedad relativa de ἐν τίνι.'
  spanish_consistency_notes:
  - Se eligió «expulso/expulsan» para mantener consistencia verbal con el campo semántico de ἐκβάλλω.
  - Se prefirió «Beelzebul» como transliteración del nombre propio, sin añadir glosas interpretativas en el texto principal.
  - La relación posesiva se adaptó a «sus hijos / sus jueces» para una lectura natural en español sin alterar el referente de segunda persona plural.
  - Los corchetes de notas aparecen únicamente donde hay un marcador correspondiente en el texto principal.
