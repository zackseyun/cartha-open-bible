    text: O «por qué medio» o «por qué poder» los expulsan sus hijos.
    reason: lexical_alternative
  - marker: b
    text: O «ellos mismos serán sus jueces», preservando el énfasis del pronombre griego.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal casi intacto porque es fiel y natural, pero se corrigen los anclajes de las notas para que correspondan a las unidades griegas correctas, y se reemplaza la alternativa errónea «por qué» por «por qué medio/por qué poder», que sí expresa medio o agencia.
