review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura argumentativa del griego: contraste con «Pero si», instrumental «por Beelzebul», repetición de «expulsar», conservación literal de «sus hijos» para οἱ υἱοὶ ὑμῶν, e inferencia «Por tanto». Sin embargo, las notas al pie están cruzadas respecto de sus anclajes: [a] está colocado en «Beelzebul» pero contiene la alternativa de ἐν τίνι; [b] está colocado en «expulsan» pero contiene la alternativa sobre αὐτοὶ… κριταί. Además, la nota «por qué» es incorrecta para ἐν τίνι; debe ser «por qué medio» o «por qué poder».'
  spanish_quality_summary: El texto principal es natural, claro y digno en español eclesial contemporáneo. «Expulso/expulsan los demonios» suena idiomático. «Ellos serán sus jueces» es aceptable, aunque la nota debe ir en esa cláusula si se quiere preservar el énfasis de αὐτοί. La legibilidad general es buena; el problema principal es de aparato de notas y precisión léxica en la alternativa.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Demonios», «Beelzebul» y «jueces» están bien. La conservación de «sus hijos» sigue la decisión auditada de mantener la literalidad de υἱοί y no resolverla como «discípulos» o «seguidores».
  issues:
  - severity: high
    issue: Las notas al pie están asignadas a los lugares equivocados.
    rationale: La nota [a] anclada en «Beelzebul» no trata de ese término sino de ἐν τίνι («¿por quién?/¿por qué medio?»). La nota [b] anclada en «expulsan» no trata del verbo sino del énfasis de αὐτοὶ… κριταί. Esto desinforma al lector y rompe la trazabilidad con el audit trail inglés.
  - severity: medium
    issue: La alternativa «por qué» en la nota es semánticamente incorrecta.
    rationale: En español «por qué» pregunta causa, no medio/agencia. El inglés auditado dice «by what / by what power»; en español debe ser «por qué medio» o «por qué poder».
  - severity: low
    issue: La nota sobre αὐτοί conviene anclarla en la cláusula final, no en «expulsan».
    rationale: Así se preserva la correspondencia exacta entre el marcador y el elemento griego enfatizado.
  revised_spanish_text: Pero si yo expulso los demonios por Beelzebul, ¿por quién[a] los expulsan sus hijos? Por tanto, ellos[b] serán sus jueces.
  revised_footnotes:
