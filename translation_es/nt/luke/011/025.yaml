translation:
  language: es
  text: Y cuando llega, la encuentra barrida y ordenada.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλθὸν
  english_pob_choice: when it comes
  chosen_spanish: cuando llega
  alternatives_spanish:
  - después de haber llegado
  - al llegar
  lexicon: BDAG
  rationale: El participio aoristo se usa temporalmente; en español, 'cuando llega' expresa con naturalidad la secuencia narrativa sin volverlo demasiado literal.
- source_word: εὑρίσκει
  english_pob_choice: it finds
  chosen_spanish: lo encuentra
  alternatives_spanish:
  - lo halla
  - encuentra
  lexicon: BDAG
  rationale: El presente histórico conserva viveza narrativa. 'Lo' mantiene el referente implícito del objeto en español, identificado por el contexto como la casa.
- source_word: σεσαρωμένον
  english_pob_choice: swept
  chosen_spanish: barrido
  alternatives_spanish:
  - barrido y limpio
  - barrido a fondo
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo de σαρόω describe un estado resultante: la casa ha sido barrida y sigue así. ''Barrido'' es la forma más directa y fiel; no se añade ''limpio'' porque no está explícito en el griego.'
- source_word: κεκοσμημένον
  english_pob_choice: put in order
  chosen_spanish: ordenado
  alternatives_spanish:
  - arreglado
  - puesto en orden
  lexicon: BDAG
  rationale: En el contexto doméstico, κοσμέω apunta a una disposición ordenada más que a adorno ornamental. 'Ordenado' comunica bien ese resultado sin sobrecargar el texto.
theological_decisions:
- issue: Referente implícito del objeto
  english_pob_reading: it finds it
  chosen_spanish_reading: lo encuentra
  alternative_spanish_readings:
  - encuentra la casa
  - la encuentra
  rationale: El griego deja el objeto implícito; el contexto inmediato identifica la casa. En español, 'lo' conserva la concisión del original y evita forzar el texto con un sustantivo inexistente en la cláusula.
  doctrine_reference: Mantener la tensión contextual sin resolverla artificialmente; lectura transparente del texto.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó 'clean' por no estar explícito en el griego; la versión española sigue esa decisión al usar solo 'barrido y ordenado', sin añadir 'limpio'.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico en español moderno.
  - No se sustituyó el valor resultativo de los perfectos por un simple pasado puntual.
  - Se conservó la impersonalidad del sujeto implícito mediante 'lo', acorde con el contexto.
