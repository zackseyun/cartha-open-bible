translation:
  language: es
  text: La lámpara de tu cuerpo es tu ojo[a]. Cuando tu ojo está sano, todo tu cuerpo también está lleno de luz; pero cuando tu ojo está malo[b], también tu cuerpo está oscuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «claro», «íntegro» o, en sentido tradicional, «simple/único». El adjetivo griego puede sugerir integridad, ausencia de división o buen estado funcional; aquí describe el ojo en contraste con uno «malo».
    reason: lexical_alternative
  - marker: b
    text: O «malvado». El término griego puede significar «malo» o «malvado»; aquí puede sugerir tanto un defecto del ojo como una percepción moralmente torcida.
    reason: lexical_alternative
lexical_decisions:
- source_word: λύχνος
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - luz
  - candil
  lexicon: BDAG
  rationale: λύχνος nombra un objeto fuente de luz, no la luz abstracta. «Lámpara» conserva la imagen concreta y es natural en español bíblico contemporáneo.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  - ser
  lexicon: BDAG
  rationale: El sentido básico aquí es corporal, aunque la metáfora apunta a la condición integral de la persona. «Cuerpo» mantiene esa base sin explicitar más de lo que el griego dice.
- source_word: ὀφθαλμός
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - vista
  - mirada
  lexicon: BDAG
  rationale: 'Se conserva el órgano literal para sostener la metáfora: el ojo como lámpara del cuerpo.'
- source_word: ὅταν ... ᾖ
  english_pob_choice: When ... is
  chosen_spanish: Cuando ... está
  alternatives_spanish:
  - Cuando ... sea
  - Cada vez que ... esté
  lexicon: BDAG
  rationale: La construcción general condicional-temporal se expresa de manera natural con «cuando». En español, «está» suena más idiomático que un futuro o subjuntivo rígido en esta sentencia proverbial.
- source_word: ἁπλοῦς
  english_pob_choice: healthy
  chosen_spanish: sano
  alternatives_spanish:
  - claro
  - simple
  - íntimo
  - generoso
  lexicon: BDAG
  rationale: El adjetivo admite varios matices, pero en contraste con πονηρός y unido a la imagen del ojo/cuerpo, el valor funcional de «sano» comunica mejor la idea de un ojo que cumple bien su función, sin cancelar la posible tensión moral de fondo.
- source_word: ὅλον ... φωτεινόν
  english_pob_choice: your whole body also is full of light
  chosen_spanish: todo tu cuerpo también está lleno de luz
  alternatives_spanish:
  - todo tu cuerpo también está brillante
  - todo tu cuerpo también es luminoso
  lexicon: BDAG
  rationale: «Lleno de luz» reproduce bien φωτεινόν y mantiene el paralelismo con «oscuro» al final del versículo.
- source_word: ἐπὰν δὲ
  english_pob_choice: but when
  chosen_spanish: pero cuando
  alternatives_spanish:
  - pero si
  - mas cuando
  lexicon: BDAG
  rationale: El contraste adversativo-temporal queda claro en español con «pero cuando», que refleja la estructura griega y mantiene la simetría de las dos cláusulas.
- source_word: πονηρός
  english_pob_choice: bad
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - maligno
  - enfermo
  - dañado
  lexicon: BDAG
  rationale: «Malo» preserva la amplitud semántica de πονηρός, que puede sugerir tanto deficiencia funcional como cualidad moral torcida. En este contexto no conviene estrecharlo prematuramente a «malvado» o «enfermo».
- source_word: σκοτεινόν
  english_pob_choice: dark
  chosen_spanish: oscuro
  alternatives_spanish:
  - tenebroso
  - lleno de oscuridad
  lexicon: BDAG
  rationale: «Oscuro» es el correlato natural de «lleno de luz» y conserva la antítesis sin añadir una formulación más pesada.
theological_decisions:
- issue: Cómo renderizar ἁπλοῦς en la metáfora del ojo
  english_pob_reading: Render as 'healthy' in the main text, with notes preserving alternatives like 'single' or 'clear'
  chosen_spanish_reading: Renderizar como «sano» en el texto principal, con nota que preserve alternativas como «claro» o «simple/único»
  alternative_spanish_readings:
  - claro
  - simple/único
  - generoso
  rationale: La imagen se refiere al ojo como fuente de luz para el cuerpo; por eso el rasgo funcional es prioritario. «Sano» comunica bien la idea de un ojo en buen estado, sin eliminar la posible tensión entre integridad física y rectitud interior.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than resolve it'
- issue: Alcance moral de πονηρός aplicado al ojo
  english_pob_reading: Render as 'bad,' preserving possible moral and functional ambiguity
  chosen_spanish_reading: Renderizar como «malo», preservando la ambigüedad entre defecto funcional y desviación moral
  alternative_spanish_readings:
  - malvado
  - maligno
  - dañado
  - enfermo
  rationale: En el contexto, πονηρός puede abarcar más que mera enfermedad física, pero el texto no exige fijar solo un sentido moral. «Malo» deja abierta la tensión que el audit trail documenta.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not erase lexical/theological tension'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta propuesta mantiene ese acuerdo alto con el original y con el audit trail inglés, trasladando sus decisiones léxicas al español sin endurecer las ambigüedades documentadas.
  spanish_consistency_notes:
  - Se mantuvo «lámpara» para λύχνος, coherente con el valor concreto del término.
  - Se prefirió «cuerpo» para σῶμα y no una paráfrasis espiritualizante.
  - «Sano» y «malo» conservan la tensión funcional/moral documentada en el inglés POB.
  - El orden de las cláusulas sigue de cerca el griego y el inglés auditado, con sintaxis natural en español.
  - Se usó «oscuro» y no «lleno de oscuridad» para mantener brevedad y simetría con «lleno de luz».
