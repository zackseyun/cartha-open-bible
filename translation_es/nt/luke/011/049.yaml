revisions:
- from: 'Por este motivo también la sabiduría de Dios dijo[a]: «Enviaré a ellos profetas y apóstoles, y a algunos de ellos matarán y perseguirán»'
  to: 'Por este motivo también la sabiduría de Dios dijo[a]: «Les enviaré profetas y apóstoles, y a algunos de ellos los matarán y perseguirán»'
  rationale: 'La revisión hace ajustes menores pero necesarios de naturalidad y precisión: «Les enviaré» expresa de forma idiomática el complemento de envío; «a algunos de ellos los matarán y perseguirán» refleja mejor el partitivo de ἐξ αὐτῶν y fluye con claridad en español; y la nota se corrige para evitar una falsa alternativa idéntica al texto principal, manteniendo la ambigüedad teológica documentada por la auditoría inglesa.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:58:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del griego: la causalidad de διὰ τοῦτο, el matiz aditivo de καὶ, la ambigüedad teológica de ἡ σοφία τοῦ θεοῦ, el futuro de Ἀποστελῶ, el valor técnico de ἀποστόλους y el partitivo de ἐξ αὐτῶν. Sin embargo, la sintaxis española en la cita directa no es del todo natural ni plenamente fiel en su fuerza partitiva: «Enviaré a ellos» suena calcado, y «a algunos de ellos matarán y perseguirán» coloca el objeto de forma torpe. Una leve reparación mejora fidelidad y legibilidad sin cambiar el sentido.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene dos giros poco naturales para un registro bíblico moderno y ampliamente legible: «Enviaré a ellos» debe ser «les enviaré» o «enviaré a ellos» solo en contextos muy marcados; y «a algunos de ellos matarán y perseguirán» resulta rígido. También la nota al pie dice «O “la sabiduría de Dios”», que no funciona porque el texto principal ya tiene esa forma; la alternativa real documentada es «la sabiduría de Dios» / «la sabiduría de Dios» en inglés frente a «la sabiduría de Dios» no cambia en español, por lo que conviene reformular la nota para reflejar una alternativa española genuina como «la sabiduría de Dios» / «la sabiduría divina» o, mejor aún, mantener la nota explicativa sobre la interpretación sin introducir un falso “O”.'
  glossary_alignment: 'Alineado con la terminología del proyecto en los términos relevantes de este versículo: θεοῦ -> «Dios», ἀποστόλους -> «apóstoles», προφήτας -> «profetas». No hay conflictos con Yahvé/Mesías/Espíritu. La decisión de mantener «la sabiduría de Dios» preserva correctamente la tensión teológica documentada.'
  issues:
  - severity: medium
    issue: «Enviaré a ellos» es poco natural en español.
    rationale: Aunque refleja εἰς αὐτούς, en español moderno y digno con verbo de envío es más idiomático «les enviaré» o «enviaré profetas y apóstoles a ellos». La forma actual suena calcada del original/inglés.
  - severity: medium
    issue: «a algunos de ellos matarán y perseguirán» es sintácticamente torpe.
    rationale: El griego expresa un partitivo claro (ἐξ αὐτῶν). En español, «a algunos de ellos los matarán y perseguirán» o «a algunos de ellos los matarán y los perseguirán» transmite mejor la relación verbal y evita dureza innecesaria.
  - severity: medium
    issue: La nota al pie comienza con «O “la sabiduría de Dios”», pero esa no es una alternativa real al texto principal.
    rationale: Como el texto principal ya usa «la sabiduría de Dios», la fórmula «O...» es engañosa. La nota debe centrarse en la ambigüedad interpretativa, o en una alternativa española auténtica si se quiere conservar el formato de variante.
  revised_spanish_text: 'Por este motivo también la sabiduría de Dios dijo[a]: «Les enviaré profetas y apóstoles, y a algunos de ellos los matarán y perseguirán»'
