    reason: lexical_alternative
  revision_rationale: 'La revisión hace ajustes menores pero necesarios de naturalidad y precisión: «Les enviaré» expresa de forma idiomática el complemento de envío; «a algunos de ellos los matarán y perseguirán» refleja mejor el partitivo de ἐξ αὐτῶν y fluye con claridad en español; y la nota se corrige para evitar una falsa alternativa idéntica al texto principal, manteniendo la ambigüedad teológica documentada por la auditoría inglesa.'
