translation:
  language: es
  text: 'Por este motivo también la sabiduría de Dios dijo[a]: «Les enviaré profetas y apóstoles, y a algunos de ellos los matarán y perseguirán»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase también puede expresarse como «la sabiduría divina». Puede entenderse como una personificación de la sabiduría de Dios, como el decreto sabio de Dios, o como una autorreferencia implícita de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por este motivo
  alternatives_spanish:
  - Por esta razón
  - Por eso
  lexicon: BDAG
  rationale: Expresa la relación causal e inferencial del griego sin sonar forzado. 'Por este motivo' conserva el valor explicativo del contexto inmediato.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - aun
  lexicon: BDAG
  rationale: Reproduce el matiz aditivo de manera natural en español junto con la frase causal inicial.
- source_word: ἡ σοφία τοῦ θεοῦ
  english_pob_choice: the wisdom of God
  chosen_spanish: la sabiduría de Dios
  alternatives_spanish:
  - la sabiduría divina
  - la sabiduría de Dios
  lexicon: BDAG
  rationale: Se conserva la construcción genitiva sin resolver interpretivamente si se trata de personificación, decreto sabio o auto-referencia implícita. 'Sabiduría de Dios' mantiene abierta la tensión del texto.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dijo
  - declaró
  lexicon: BDAG
  rationale: Verbo narrativo simple y natural en español, sin carga interpretativa añadida.
- source_word: Ἀποστελῶ
  english_pob_choice: I will send
  chosen_spanish: Enviaré
  alternatives_spanish:
  - Yo enviaré
  - Mandaré
  lexicon: BDAG
  rationale: Futuro directo y natural en español. 'Enviaré' conserva el sentido de ἀποστέλλω sin añadir matices innecesarios.
- source_word: εἰς αὐτούς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - hacia ellos
  - entre ellos
  lexicon: BDAG
  rationale: Con verbos de envío, el complemento indirecto/objetivo se expresa naturalmente como 'a ellos'.
- source_word: προφήτας
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - profetas
  lexicon: BDAG
  rationale: Término estándar y transparente para προφήτης.
- source_word: ἀποστόλους
  english_pob_choice: apostles
  chosen_spanish: apóstoles
  alternatives_spanish:
  - mensajeros
  - enviados
  lexicon: BDAG
  rationale: Se preserva el título/función reconocible en el contexto lucano y cristiano primitivo, evitando diluirlo en un término más general.
- source_word: ἐξ αὐτῶν
  english_pob_choice: some of them
  chosen_spanish: a algunos de ellos
  alternatives_spanish:
  - de entre ellos
  - algunos de ellos
  lexicon: BDAG
  rationale: El partitivo se expresa de forma idiomática en español, indicando que no todos los enviados sufrirán la misma suerte.
- source_word: ἀποκτενοῦσιν
  english_pob_choice: they will kill
  chosen_spanish: matarán
  alternatives_spanish:
  - darán muerte
  - pondrán a muerte
  lexicon: BDAG
  rationale: Equivalente directo y natural del verbo; conserva la fuerza inmediata del acto violento.
- source_word: διώξουσιν
  english_pob_choice: persecute
  chosen_spanish: perseguirán
  alternatives_spanish:
  - hostigarán
  - acribillarán
  lexicon: BDAG
  rationale: En el contexto hostil posterior a 'matar', διώκω significa persecución; 'perseguirán' mantiene esa carga semántica.
theological_decisions:
- issue: Significado de 'la sabiduría de Dios'
  english_pob_reading: Rendered as 'the wisdom of God' without identifying it explicitly as Jesus, Scripture, or a separate hypostatic figure.
  chosen_spanish_reading: Se traduce literalmente como 'la sabiduría de Dios' sin identificarla como una figura separada o como una auto-referencia explícita de Jesús.
  alternative_spanish_readings:
  - la sabiduría divina
  - Dios, en su sabiduría
  - Jesús dijo
  rationale: La redacción conserva la ambigüedad presente en el texto y en la auditoría inglesa, evitando cerrar una tensión interpretativa que el griego permite.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La auditoría inglesa indica acuerdo alto y ninguna revisión aplicada; esta versión sigue la lectura establecida y conserva la misma tensión interpretativa en 'la sabiduría de Dios'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ según la terminología estándar del proyecto.
  - Se usa 'apóstoles' para ἀποστόλους, en coherencia con el valor funcional/titular documentado en el contexto lucano.
  - '''Perseguirán'' conserva el matiz hostil de διώκω en este contexto, no un simple ''seguir''.'
  - '''A algunos de ellos'' reproduce el partitivo de ἐξ αὐτῶν sin perder naturalidad en español.'
