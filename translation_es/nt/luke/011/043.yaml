translation:
  language: es
  text: ¡Ay de ustedes, fariseos, porque aman los mejores asientos[a] en las sinagogas y los saludos[b] en los mercados públicos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los asientos principales» o «los lugares de honor».
    reason: lexical_alternative
  - marker: b
    text: Es decir, saludos públicos que comunicaban honor y reconocimiento social.
    reason: cultural_note
lexical_decisions:
- source_word: οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes, fariseos!
  lexicon: BDAG
  rationale: «¡Ay!» conserva el tono profético de denuncia. Añadir «de ustedes» expresa el vocativo directo del griego y mantiene la fuerza admonitiva sin volverlo meramente exclamativo.
- source_word: ὑμῖν τοῖς Φαρισαίοις
  english_pob_choice: to you Pharisees
  chosen_spanish: de ustedes, fariseos
  alternatives_spanish:
  - a ustedes, fariseos
  - ustedes, fariseos
  lexicon: BDAG
  rationale: El dativo de destinatario se vierte naturalmente en español con «de ustedes» en una exclamación de reprensión; «fariseos» conserva el vocativo explícito.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Introduce la razón del ay con una causalidad clara y directa, fiel a la función explicativa del griego.
- source_word: ἀγαπᾶτε
  english_pob_choice: you love
  chosen_spanish: aman
  alternatives_spanish:
  - les gustan
  - prefieren
  - aprecian
  lexicon: BDAG
  rationale: Aquí ἀγαπάω expresa fuerte preferencia por puestos de honor; «aman» reproduce la intensidad del verbo sin diluirla en una preferencia débil.
- source_word: πρωτοκαθεδρίαν
  english_pob_choice: the best seats
  chosen_spanish: los mejores asientos
  alternatives_spanish:
  - los primeros asientos
  - los asientos de honor
  - los principales asientos
  lexicon: BDAG
  rationale: Se mantiene la lectura concreta adoptada en inglés. «Los mejores asientos» comunica la posición privilegiada de manera natural en español, sin perder el matiz de honor social. La alternativa «asientos de honor» sigue siendo válida y se preserva en nota.
- source_word: ἐν ταῖς συναγωγαῖς
  english_pob_choice: in the synagogues
  chosen_spanish: en las sinagogas
  alternatives_spanish:
  - en sinagogas
  lexicon: BDAG
  rationale: Traducción directa y transparente del espacio de reunión judío.
- source_word: τοὺς ἀσπασμοὺς
  english_pob_choice: greetings
  chosen_spanish: los saludos
  alternatives_spanish:
  - las salutaciones
  - los saludos públicos
  - los saludos honoríficos
  lexicon: BDAG
  rationale: «Saludos» es la forma más natural en español. Dado el contexto, puede incluir el matiz de reconocimiento social; ese aspecto se explicita en la nota cultural, como en el audit trail inglés.
- source_word: ἐν ταῖς ἀγοραῖς
  english_pob_choice: in the marketplaces
  chosen_spanish: en las plazas
  alternatives_spanish:
  - en los mercados
  - en las plazas de mercado
  - en los mercados públicos
  lexicon: BDAG
  rationale: «Plazas» comunica bien el espacio público de encuentro del griego ἀγορά en español moderno y sugiere el ámbito social donde se exhibía el honor. Se conserva el posible matiz comercial en nota y alternativa.
theological_decisions:
- issue: Naturaleza de la reprensión de Jesús
  english_pob_reading: A prophetic woe against the Pharisees' love of public honor.
  chosen_spanish_reading: Una reprensión profética contra el amor a los lugares de honor y al reconocimiento público.
  alternative_spanish_readings:
  - Una crítica meramente social de malas maneras
  - Una denuncia solo de privilegios externos
  rationale: El griego οὐαί y la razón introducida por ὅτι muestran una denuncia moral y espiritual, no solo de etiqueta. El español conserva ese tono sin añadir interpretación extra.
  doctrine_reference: 'Translation philosophy: preserve the plain sense and prophetic force of the source text.'
translation_notes:
  revision_awareness: Se mantuvo el acuerdo alto del expediente inglés y no se introdujeron cambios de sentido. La principal adaptación fue escoger un español fluido que preserve el tono profético y el matiz honorífico de πρωτοκαθεδρίαν y ἀσπασμοὺς.
  spanish_consistency_notes:
  - Se usó «Yahvé» no corresponde aquí porque el versículo no contiene el nombre divino ni κύριος con cita directa.
  - Se evitó «Cristo» porque no aparece χριστός en el texto.
  - Se tradujo ἀσπασμοὺς como «saludos» y se aclaró su dimensión honorífica en nota para no perder la carga social del término.
  - Se prefirió «plazas» para ἀγοραῖς por naturalidad en español, con nota que preserva el posible matiz de mercado.
