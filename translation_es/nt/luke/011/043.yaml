  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: ay profético dirigido a los fariseos, seguido por la razón causal de que aman lugares de honor y saludos públicos. Sin embargo, hay un desajuste léxico importante en ἐν ταῖς ἀγοραῖς: «en las plazas» puede sonar demasiado amplio y perder el matiz de mercado/espacio público comercial-social que el inglés auditado preserva con «marketplaces».'
  spanish_quality_summary: El español es claro y natural, pero la colocación de las notas al final de la oración debilita el anclaje exacto de cada nota. Además, «de ustedes» en la justificación léxica del dativo no es la mejor explicación idiomática, aunque el texto principal «¡Ay de ustedes, fariseos...» sí funciona. Conviene anclar [a] en «mejores asientos» y [b] en «saludos».
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Fariseos», «sinagogas» y «aman» son adecuados. La decisión sobre ἀγοραί debe alinearse mejor con el audit trail: «mercados públicos» o «plazas de mercado» preserva mejor el referente que solo «plazas».'
  issues:
  - severity: medium
    issue: «en las plazas» subtraduce ἐν ταῖς ἀγοραῖς
    rationale: ἀγορά denota el mercado/espacio público de comercio y reconocimiento social. «Plazas» puede incluir ese sentido, pero en español general resulta más indeterminado que el griego y que el inglés auditado «marketplaces».
  - severity: low
    issue: Las notas [a][b] están ambas al final en vez de ancladas a los términos pertinentes
    rationale: La instrucción del proyecto pide que el marcador exacto aparezca en la palabra o frase relevante. Aquí [a] corresponde a «mejores asientos» y [b] a «saludos».
  - severity: low
    issue: La nota alternativa de [a] podría reflejar mejor el matiz de honor
    rationale: «Asientos principales» está bien, pero conviene mantener también «lugares de honor» para acercarse a la alternativa inglesa documentada «places of honor».
