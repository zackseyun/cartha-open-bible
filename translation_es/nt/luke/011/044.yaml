translation:
  language: es
  text: ¡Ay de ustedes, porque son como tumbas[a][b] sin marcar, y las personas que caminan sobre ellas no lo saben.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tumbas ocultas» o «sepulcros no vistos». El sentido en este contexto es tumbas que los que pasan no reconocen.
    reason: lexical_alternative
  - marker: b
    text: La imagen probablemente alude al peligro de quedar ceremonialmente impuro por contacto con tumbas sin darse cuenta; compárese Números 19:16.
    reason: cross_reference
lexical_decisions:
- source_word: οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes!
  lexicon: BDAG
  rationale: Conserva el tono profético de denuncia o lamento. En español, «¡Ay de ustedes!» comunica mejor la reprensión directa que un simple «¡Ay!».
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: En español, con una exclamación de reprensión, la relación destinataria se expresa de manera natural con «de ustedes» en esta construcción idiomática, sin perder el valor de segunda persona plural.
- source_word: μνημεῖα
  english_pob_choice: tombs
  chosen_spanish: tumbas
  alternatives_spanish:
  - sepulcros
  - graves
  lexicon: BDAG
  rationale: «Tumbas» es la opción más natural y clara en español moderno para la imagen funeraria. «Sepulcros» sería más tradicional, pero menos transparente; «graves» suena menos idiomático en español bíblico.
- source_word: ἄδηλα
  english_pob_choice: unmarked
  chosen_spanish: sin señal
  alternatives_spanish:
  - ocultas
  - invisibles
  - sin marcar
  lexicon: BDAG
  rationale: La idea contextual es que no se reconocen a simple vista. «Sin señal» conserva la noción funcional de no estar identificadas para los transeúntes, sin forzar un tecnicismo.
- source_word: οἱ ἄνθρωποι
  english_pob_choice: the people
  chosen_spanish: las personas
  alternatives_spanish:
  - la gente
  - los hombres
  lexicon: BDAG
  rationale: Sigo la revisión inglesa que entendió el plural como genérico en el contexto. «Las personas» evita un masculino genérico innecesario en español y mantiene el referente representativo.
- source_word: περιπατοῦντες ἐπάνω
  english_pob_choice: walking over them
  chosen_spanish: que caminan sobre ellas
  alternatives_spanish:
  - que pasan sobre ellas
  - que andan encima de ellas
  lexicon: BDAG
  rationale: Reproduce con naturalidad el participio presente y la relación espacial del texto. «Sobre ellas» retoma las tumbas, que en español son femeninas.
- source_word: οὐκ οἴδασιν
  english_pob_choice: do not know it
  chosen_spanish: no lo saben
  alternatives_spanish:
  - no saben
  - no se dan cuenta
  lexicon: BDAG
  rationale: «No lo saben» mantiene la ignorancia objetiva del peligro sin introducir una interpretación más explicativa como «no se dan cuenta».
theological_decisions:
- issue: Imagen de impureza ritual asociada con las tumbas
  english_pob_reading: Render the image concretely as 'unmarked tombs' without importing an explanatory statement about ritual defilement into the main text.
  chosen_spanish_reading: Traducir la imagen de forma concreta como «tumbas sin señal», sin añadir en el texto principal la explicación de contaminación ritual.
  alternative_spanish_readings:
  - «tumbas ocultas»
  - «sepulcros invisibles»
  - «tumbas sin marcar»
  rationale: El griego presenta la comparación y la ignorancia de los que pasan encima; la implicación de impureza pertenece al trasfondo, pero no se explicita en el versículo. La redacción española conserva esa tensión sin sobredeterminarla.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor del plural masculino οἱ ἄνθρωποι frente al uso genérico en español
  english_pob_reading: Use 'the men' in the main text with a footnote indicating representative/generic force.
  chosen_spanish_reading: Usar «las personas» en el texto principal para reflejar el valor genérico del plural en este contexto.
  alternative_spanish_readings:
  - «los hombres»
  - «la gente»
  rationale: La revisión inglesa terminó preferiendo una lectura genérica más natural. En español, «las personas» comunica bien el referente representativo sin introducir un masculino marcado que podría sonar menos transparente en lectura pública.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Tomé como base la lectura inglesa más reciente, que entiende οἱ ἄνθρωποι de manera genérica como «the people». También conservé la decisión auditada de no explicitar en el texto principal la contaminación ritual, aunque la imagen de tumbas no reconocidas lo sugiere. En español ajusté la exclamación y la relación preposicional para que suenen naturales sin perder el golpe profético del griego.
  spanish_consistency_notes:
  - Mantengo «tumbas» como término principal para μνημεῖα, en línea con la decisión inglesa de conservar el campo funerario concreto.
  - Evito «Señor» o equivalentes tradicionales porque no aparecen en este versículo.
  - Uso «las personas» como solución genérica y pública en español, coherente con la revisión inglesa hacia un referente no restringido por sexo.
  - Conservo la ambigüedad de ἄδηλα mediante una nota, ya que el griego admite «sin señal», «ocultas» o «sin marcar» y el contexto dirige la lectura hacia el reconocimiento práctico por parte de los transeúntes.
