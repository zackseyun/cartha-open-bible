base_translation:
  language: en
  yaml_path: translation/nt/luke/011/044.yaml
  text: Woe to you[a], because you are like unmarked tombs[c][b], and the people walking over them do not know it.
  footnotes:
  - marker: a
    text: Or 'hidden tombs' or 'unseen graves.' The sense in context is tombs not recognized by passersby.
    reason: lexical_alternative
  - marker: b
    text: '''The men'' reflects the masculine plural Greek and may function representatively here, that is, of people walking over them.'
    reason: lexical_alternative
  - marker: c
    text: The image likely alludes to the danger of becoming ceremonially defiled by contact with graves without realizing it; compare Numbers 19:16.
    reason: cross_reference
