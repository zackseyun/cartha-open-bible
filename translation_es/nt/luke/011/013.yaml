revisions:
- from: Si ustedes, pues, siendo malos, saben dar buenos dones a sus hijos, ¿cuánto más el Padre desde el cielo dará el Espíritu Santo[a] a los que se lo piden?
  to: Si ustedes, pues, siendo malos, saben dar buenos dones a sus hijos,[a] ¿cuánto más el Padre desde el cielo dará el Espíritu Santo a los que le piden?
  rationale: Se corrige la frase final para reflejar con exactitud αὐτόν como objeto de «pedirle a él», sin añadir un «lo» inexistente en el griego. Se reemplaza la nota por la decisión auditada principal sobre «el Padre desde el cielo», evitando una referencia no sustentada a manuscritos y preservando la distinción de Lucas frente a Mateo.
  reviewer_model: gpt-5.4
