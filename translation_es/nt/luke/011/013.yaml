translation:
  language: es
  text: Si ustedes, pues, siendo malos, saben dar buenos dones a sus hijos,[a] ¿cuánto más el Padre desde el cielo dará el Espíritu Santo a los que le piden?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas versiones dicen «su Padre celestial» por analogía con Mateo 7:11, pero el griego de Lucas dice «el Padre desde el cielo».
    reason: alternative_reading
lexical_decisions:
- source_word: ὑμεῖς πονηροὶ ὑπάρχοντες
  english_pob_choice: being evil
  chosen_spanish: si ustedes, pues, siendo malos
  alternatives_spanish:
  - aunque ustedes son malos
  - siendo malos ustedes
  lexicon: BDAG
  rationale: La construcción participial tiene valor concesivo/descriptivo. «Si ustedes, pues, siendo malos» conserva la fuerza del argumento sin suavizarla ni volverla más interpretativa de lo que permite el griego.
- source_word: οἴδατε
  english_pob_choice: know how
  chosen_spanish: saben dar
  alternatives_spanish:
  - saben cómo dar
  - saben
  lexicon: BDAG
  rationale: Con el infinitivo complementario διδόναι, el sentido es capacidad/conocimiento práctico. En español, «saben dar» comunica naturalmente esa idea sin añadir una fórmula demasiado larga.
- source_word: δόματα ἀγαθὰ
  english_pob_choice: good gifts
  chosen_spanish: buenos dones
  alternatives_spanish:
  - buenos regalos
  - buenas cosas
  lexicon: BDAG
  rationale: δόματα se refiere concretamente a dones/regalos. «Dones» preserva el sustantivo de ofrenda, y «buenos» reproduce ἀγαθά con un registro bíblico claro y natural.
- source_word: τοῖς τέκνοις ὑμῶν
  english_pob_choice: to your children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus niños
  - a sus hijos e hijas
  lexicon: BDAG
  rationale: «Hijos» es la equivalencia natural de τέκνα en este contexto familiar. En español, el posesivo de tercera persona reflejado por «sus» mantiene la referencia al oyente plural sin forzar un calco de «vuestros».
- source_word: πόσῳ μᾶλλον
  english_pob_choice: how much more
  chosen_spanish: ¿cuánto más
  alternatives_spanish:
  - ¿cuánto más bien
  - ¡cuánto más!
  lexicon: BDAG
  rationale: Es el giro comparativo a fortiori estándar. «¿Cuánto más?» es idiomático en español y conserva la lógica de contraste.
- source_word: ὁ πατὴρ ὁ ἐξ οὐρανοῦ
  english_pob_choice: the Father from heaven
  chosen_spanish: el Padre desde el cielo
  alternatives_spanish:
  - el Padre del cielo
  - el Padre que está en el cielo
  lexicon: BDAG
  rationale: La frase griega dice literalmente «el Padre desde el cielo», sin el «tu» de Mateo. «Desde el cielo» conserva la preposición ἐξ y evita harmonizar con el paralelo mateano.
- source_word: πνεῦμα ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - un espíritu santo
  lexicon: BDAG
  rationale: En este contexto lucano se trata del don personal/divino del Espíritu de Dios. La mayúscula y el artículo en español reflejan ese referente, sin borrar la tensión de que el griego es anartro.
- source_word: τοῖς αἰτοῦσιν αὐτόν
  english_pob_choice: to those who ask him
  chosen_spanish: a los que se lo piden
  alternatives_spanish:
  - a los que le piden
  - a quienes lo piden
  lexicon: BDAG
  rationale: El participio presente sustantivado se expresa de forma natural como «a los que piden». «Se lo piden» conserva el objeto explícito αὐτόν referido al Padre, mediante un giro español natural.
theological_decisions:
- issue: Referencia de πνεῦμα ἅγιον
  english_pob_reading: the Holy Spirit as the personal divine Spirit
  chosen_spanish_reading: el Espíritu Santo como don personal de Dios
  alternative_spanish_readings:
  - un espíritu santo
  - el espíritu santo
  rationale: Aunque el griego no lleva artículo, el contexto de Lucas presenta al Espíritu como el don que el Padre da. «Espíritu Santo» con mayúsculas expresa ese referente personal sin ocultar la forma griega anartro.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Diferencia con Mateo 7:11
  english_pob_reading: retain Luke's distinct wording 'the Father from heaven' and 'the Holy Spirit'
  chosen_spanish_reading: mantener «el Padre desde el cielo» y «el Espíritu Santo»
  alternative_spanish_readings:
  - armonizar a «su Padre celestial» y «buenas cosas»
  - armonizar a «el Padre en el cielo»
  rationale: La traducción sigue a Lucas y no armoniza con Mateo. Así se preserva la particularidad del texto lucano, que nombra explícitamente al Espíritu Santo en lugar de «buenos dones/cosas».
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se revisó la redacción para evitar una armonización con Mateo 7:11 y para mantener la frase lucana «desde el cielo». La versión final conserva el contraste a fortiori y la referencia específica al Espíritu Santo.
  spanish_consistency_notes:
  - Se usó «ustedes» para concordar con el español latinoamericano neutro y evitar arcaísmos.
  - «El Padre» se capitaliza como tratamiento reverente, mientras «cielo» permanece en minúscula por norma tipográfica.
  - Se prefirió «dones» sobre «cosas» para mantener la concreción de δόματα y el paralelismo con el dar del Padre.
