translation:
  language: es
  text: ¿Qué padre entre ustedes, si su hijo le pide un pez, le dará una serpiente[a] en lugar de un pez?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «culebra».
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνα δὲ ἐξ ὑμῶν τὸν πατέρα
  english_pob_choice: What father among you
  chosen_spanish: ¿Qué padre entre ustedes
  alternatives_spanish:
  - ¿Cuál de ustedes, siendo padre
  - ¿Qué hombre entre ustedes, siendo padre
  lexicon: BDAG
  rationale: La pregunta griega busca a un miembro cualquiera del auditorio que encaje en la descripción de “padre”. En español, “¿Qué padre entre ustedes” conserva bien el tono retórico y suena natural sin perder el valor idiomático.
- source_word: αἰτήσει
  english_pob_choice: asks for
  chosen_spanish: le pide
  alternatives_spanish:
  - pedirá
  - solicita
  lexicon: BDAG
  rationale: En español, “pedir” expresa con naturalidad la petición de un hijo a su padre. La forma “le pide” mantiene la relación interpersonal implícita en el griego y evita una construcción pesada.
- source_word: ὁ υἱὸς
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo
  - su muchacho
  lexicon: BDAG
  rationale: El artículo griego es relacional y genérico; “su hijo” hace explícita la relación padre-hijo sin añadir contenido ajeno al texto.
- source_word: ἰχθύν / ἰχθύος
  english_pob_choice: a fish / a fish
  chosen_spanish: un pez / un pez
  alternatives_spanish:
  - pez / pez
  lexicon: BDAG
  rationale: Se conserva el singular concreto del ejemplo, como en el griego y en el inglés POB.
- source_word: ἀντὶ
  english_pob_choice: instead of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en sustitución de
  lexicon: BDAG
  rationale: “En lugar de” expresa claramente la idea de sustitución y es idiomático en español contemporáneo.
- source_word: ὄφιν
  english_pob_choice: a snake
  chosen_spanish: una serpiente
  alternatives_spanish:
  - una culebra
  - una víbora
  lexicon: BDAG
  rationale: El inglés POB optó por “snake” y señaló la alternativa “serpent”. En español, “serpiente” cubre el sentido básico de ὄφις con dignidad y sin arrastrar excesivamente el registro zoológico de “culebra” ni la carga específica de “víbora”.
- source_word: αὐτῷ ἐπιδώσει
  english_pob_choice: will give him
  chosen_spanish: le dará
  alternatives_spanish:
  - se lo dará
  - le entregará
  lexicon: BDAG
  rationale: “Dar” traduce de forma natural ἐπιδίδωμι en esta pregunta retórica; “le dará” conserva el destinatario indirecto y la fluidez del español.
translation_notes:
  revision_awareness: 'Se siguió de cerca el contexto auditado en inglés: la pregunta retórica, el valor relacional de “father/son”, el singular concreto de “fish”, y la opción léxica por “snake” con nota alternativa para el posible matiz de ὄφις. No se detectaron revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se evitó “SEÑOR” y otros equivalentes no pertinentes porque este versículo no contiene el nombre divino.
  - Se mantuvo un español claro y directo, sin arcaísmos innecesarios, para conservar el tono proverbial de la pregunta retórica.
  - La nota textual/lexical se ancla solo en ὄφις, donde el español admite ‘serpiente’ como principal y otras opciones posibles.
