translation:
  language: es
  text: Por tanto, ten cuidado[a] de que la luz que hay en ti no sea tinieblas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mira bien que la luz que hay en ti no sea tinieblas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκόπει
  english_pob_choice: watch out
  chosen_spanish: ten cuidado
  alternatives_spanish:
  - vigila
  - mira bien
  - estate atento
  lexicon: BDAG
  rationale: El imperativo presente pide vigilancia continua. «Ten cuidado» comunica con naturalidad la advertencia y el tono exhortativo sin sonar mecánico.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca la inferencia respecto del contexto previo; «Por tanto» conserva claramente la conexión lógica en español formal.
- source_word: μὴ
  english_pob_choice: lest
  chosen_spanish: no sea
  alternatives_spanish:
  - no resulte
  - no llegue a ser
  - para que no sea
  lexicon: BDAG
  rationale: Con el imperativo, μή introduce una advertencia sobre un resultado no deseado. En español, «no sea» expresa de modo natural esa cautela sin añadir interpretación.
- source_word: τὸ φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la iluminación
  - la claridad
  lexicon: BDAG
  rationale: Se conserva la metáfora literal de φῶς para mantener el contraste luz/tinieblas del contexto inmediato.
- source_word: τὸ ἐν σοὶ
  english_pob_choice: in you
  chosen_spanish: que hay en ti
  alternatives_spanish:
  - en ti
  - dentro de ti
  lexicon: BDAG
  rationale: «Que hay en ti» suena natural en español y preserva la referencia interna sin estrechar el sentido a una facultad específica como conciencia o entendimiento.
- source_word: σκότος
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - tiniebla
  lexicon: BDAG
  rationale: Aunque «oscuridad» es posible, «tinieblas» mantiene mejor el paralelismo bíblico con «luz» y conserva la fuerza metafórica del contraste.
theological_decisions:
- issue: Metáfora de la luz y las tinieblas
  english_pob_reading: Preserve the metaphor in the main text without specifying a doctrinally narrowed meaning such as conscience, understanding, or spiritual state alone.
  chosen_spanish_reading: Conservar la metáfora sin precisar si «luz» se refiere a entendimiento, conciencia o estado espiritual.
  alternative_spanish_readings:
  - la comprensión que hay en ti
  - la luz interior
  - tu conciencia
  rationale: El griego presenta una imagen amplia. La traducción evita resolver la ambigüedad y conserva la tensión teológica del dicho de Jesús.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa prefirió «be» tras «lest» para mantener una forma formal y natural. En español, esa misma función se expresa de modo más idiomático con «no sea», sin perder la advertencia ni introducir una lectura más fuerte que la del griego.
  spanish_consistency_notes:
  - Se mantiene «luz» y «tinieblas» para conservar el paralelismo metafórico del texto fuente.
  - Se evita «SEÑOR» u otra terminología no pertinente; no hay nombre divino explícito en este versículo.
  - «Ten cuidado» reproduce la fuerza imperativa mejor que un calco como «ve» o «mira».
  - La nota al pie preserva la alternativa lexical del audit trail inglés sin desplazar el texto principal.
