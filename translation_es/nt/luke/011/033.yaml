translation:
  language: es
  text: Nadie[a], después de encender una lámpara, la pone en un lugar oculto ni debajo de un cesto[b], sino sobre un soporte para lámpara, para que los que entran vean la luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un sótano» o «en un lugar secreto»; la palabra griega κρύπτη puede referirse a un lugar oculto, incluso a un área subterránea de almacenamiento.
    reason: lexical_alternative
  - marker: b
    text: Griego μόδιος, un recipiente de medida; tradicionalmente «celemín» o «celemín/cesta de medida».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐδεὶς
  english_pob_choice: No one
  chosen_spanish: Nadie
  alternatives_spanish:
  - Ninguna persona
  - Nadie en absoluto
  lexicon: BDAG
  rationale: El indefinido negativo se expresa naturalmente con «nadie» en español, conservando la negación universal sin artificio.
- source_word: λύχνον
  english_pob_choice: a lamp
  chosen_spanish: una lámpara
  alternatives_spanish:
  - una lámpara de aceite
  - una luz
  lexicon: BDAG
  rationale: λύχνος designa una lámpara portátil; «lámpara» comunica con naturalidad el objeto sin añadir precisión no exigida por el texto.
- source_word: ἅψας
  english_pob_choice: after lighting
  chosen_spanish: después de encender
  alternatives_spanish:
  - habiendo encendido
  - al encender
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; «después de encender» mantiene claramente la secuencia temporal en español.
- source_word: εἰς κρύπτην
  english_pob_choice: in a hidden place
  chosen_spanish: en un lugar oculto
  alternatives_spanish:
  - en un escondite
  - en una celda
  - en un lugar secreto
  lexicon: BDAG
  rationale: κρύπτη puede referirse a un lugar oculto o subterráneo, pero aquí la idea central es el ocultamiento. «Lugar oculto» conserva esa fuerza sin especificar de más.
- source_word: τίθησιν
  english_pob_choice: puts
  chosen_spanish: la pone
  alternatives_spanish:
  - la coloca
  - la pone allí
  lexicon: BDAG
  rationale: El verbo de colocar se vierte de forma directa y natural; el pronombre retoma «una lámpara» para evitar repetición innecesaria.
- source_word: ὑπὸ τὸν μόδιον
  english_pob_choice: under a basket
  chosen_spanish: debajo de un cesto
  alternatives_spanish:
  - debajo de una medida
  - debajo de un canasto
  - debajo de un celemín
  lexicon: BDAG
  rationale: μόδιος es una medida seca y, por extensión, su recipiente. «Cesto» comunica el objeto de cubrir la lámpara con un término claro y ampliamente inteligible, preservando la imagen sin depender de una medida histórica poco transparente.
- source_word: ἐπὶ τὴν λυχνίαν
  english_pob_choice: on a lampstand
  chosen_spanish: sobre un candelero
  alternatives_spanish:
  - sobre un soporte para lámpara
  - sobre un lampadario
  lexicon: BDAG
  rationale: λυχνία es el soporte donde se coloca la lámpara; «candelero» es el equivalente tradicional y comprensible en español bíblico, sin forzar el sentido de «candela».
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: La partícula final expresa propósito; «para que» es la solución natural y fiel en español.
- source_word: οἱ εἰσπορευόμενοι
  english_pob_choice: those who enter
  chosen_spanish: los que entran
  alternatives_spanish:
  - los que van entrando
  - los que ingresan
  lexicon: BDAG
  rationale: El participio sustantivado se vierte con una expresión simple y directa que mantiene el sentido de personas que entran.
- source_word: τὸ φέγγος
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - el resplandor
  - la claridad
  lexicon: BDAG
  rationale: φέγγος denota luz/claridad visible; «la luz» es la solución más natural en esta imagen, sin perder el sentido concreto de iluminación.
- source_word: βλέπωσιν
  english_pob_choice: may see
  chosen_spanish: vean
  alternatives_spanish:
  - puedan ver
  - vean claramente
  lexicon: BDAG
  rationale: El subjuntivo de propósito se conserva con «para que... vean», una forma idiomática en español que mantiene la finalidad del texto.
theological_decisions:
- issue: Sentido de κρύπτη
  english_pob_reading: generic 'hidden place' rather than a specific architectural 'cellar'
  chosen_spanish_reading: «lugar oculto» en vez de una especificación arquitectónica
  alternative_spanish_readings:
  - celda
  - sótano
  - despensa
  rationale: La fuerza retórica de la frase está en lo absurdo de ocultar una lámpara, no en identificar con precisión la clase de recinto. La redacción amplia preserva el punto del dicho.
  doctrine_reference: Translation philosophy §1, §6
- issue: Traducción de μόδιος
  english_pob_reading: '''basket'' in the main text'
  chosen_spanish_reading: «cesto» en el texto principal
  alternative_spanish_readings:
  - cesto para medir
  - celemín
  - canasto de medida
  rationale: Se prioriza una imagen clara y funcional para el lector moderno. El valor de recipiente que cubre la lámpara se conserva, mientras la alusión a la medida queda implícita y auditada por el contexto.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La revisión más reciente se mantuvo sin cambios; el texto español sigue la lectura de alta concordancia del auditor, conservando las decisiones óptimas para κρύπτη y μόδιος sin necesidad de ajuste textual.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y también «luz» con mayúscula, porque el contexto se refiere a iluminación física dentro de la metáfora.
  - «Candelero» se eligió por ser el término bíblico español natural para λυχνία; no se sustituyó por «soporte» para no debilitar la imagen tradicional del texto.
