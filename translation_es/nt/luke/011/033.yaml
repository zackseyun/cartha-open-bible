review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del griego: negación universal, acción antecedente de encender, contraste entre ocultar/cubrir y poner en alto, y propósito de que los que entran vean la luz. Sin embargo, hay un desajuste importante entre el texto principal y la nota b: la nota atribuye el marcador al griego μόδιος, pero el marcador [b] está anclado a «cesto», mientras μόδιος corresponde a «debajo de un cesto», no a «candelero». Además, «candelero» es comprensible pero menos preciso que «soporte para lámpara» o «lampadario/lamparero» para λυχνία, ya que el griego habla de un soporte para lámpara, no para vela.'
  spanish_quality_summary: El español es claro y ampliamente legible. «Nadie, después de encender una lámpara...» suena natural. «Lugar oculto» y «cesto» funcionan bien. La principal mejora de estilo-fidelidad es evitar «candelero», que en español moderno sugiere soporte para velas y puede introducir una imagen levemente distinta; «soporte para lámpara» suena más exacto y suficientemente natural en contexto bíblico moderno. También conviene corregir la nota b para que no use «celemín/cesto de medida», formulación torpe y regionalmente poco clara.
  glossary_alignment: No hay términos del glosario mayor en juego salvo mantener claridad léxica. El borrador sigue adecuadamente la decisión auditada de κρύπτη como «lugar oculto» y μόδιος como recipiente/cesto en el texto principal, con alternativa en nota. La revisión propuesta preserva esa racionalidad y mejora la precisión de λυχνία.
  issues:
  - severity: medium
    issue: Marcador y contenido de la nota b mal enfocados
    rationale: La nota b explica μόδιος, pero el marcador está colocado tras «cesto» dentro de la frase; eso es aceptable, pero el contenido actual incluye «celemín/cesto de medida», expresión poco natural. Debe formularse con más claridad y precisión.
  - severity: medium
    issue: «Candelero» no refleja con la máxima precisión λυχνία
    rationale: Aunque tradicional y entendible, «candelero» suele asociarse a velas. λυχνία es un soporte para lámpara; una redacción más precisa evita una imagen anacrónica o desplazada.
  - severity: low
    issue: Alternativa española «celda» en decisiones léxicas para κρύπτη es inadecuada
    rationale: No afecta el texto principal, pero «celda» no es una alternativa defendible aquí; el campo semántico auditado es lugar oculto/cellar/escondite, no prisión o habitación pequeña.
  revised_spanish_text: Nadie[a], después de encender una lámpara, la pone en un lugar oculto ni debajo de un cesto[b], sino sobre un soporte para lámpara, para que los que entran vean la luz.
  revised_footnotes:
