base_translation:
  language: en
  yaml_path: translation/nt/luke/011/033.yaml
  text: No one[a], after lighting a lamp, puts it in a hidden place or under a basket, but on a lampstand[b], so that those who enter may see the light.
  footnotes:
  - marker: a
    text: Or 'in a cellar' or 'in a secret place'; the Greek κρύπτη can refer to a hidden place, including an underground storage area.
    reason: lexical_alternative
  - marker: b
    text: Greek μόδιος, a measuring container; traditionally 'bushel' or 'bushel basket.'
    reason: lexical_alternative
