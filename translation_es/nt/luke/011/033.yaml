revisions:
- from: Nadie[a], después de encender una lámpara, la pone en un lugar oculto ni debajo de un cesto[b], sino sobre un candelero, para que los que entran vean la luz.
  to: Nadie[a], después de encender una lámpara, la pone en un lugar oculto ni debajo de un cesto[b], sino sobre un soporte para lámpara, para que los que entran vean la luz.
  rationale: Se reemplaza «candelero» por «soporte para lámpara» para reflejar mejor λυχνία en español moderno sin perder dignidad ni claridad. Se ajustan las notas para mayor naturalidad y precisión léxica, manteniendo las alternativas auditadas para κρύπτη y μόδιος. El resto del texto ya preserva bien el sentido del original y la filosofía de traducción del POB.
