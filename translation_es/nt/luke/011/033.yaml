    text: O «en un sótano» o «en un lugar secreto»; la palabra griega κρύπτη puede referirse a un lugar oculto, incluso a un área subterránea de almacenamiento.
    reason: lexical_alternative
  - marker: b
    text: Griego μόδιος, un recipiente de medida; tradicionalmente «celemín» o «celemín/cesta de medida».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «candelero» por «soporte para lámpara» para reflejar mejor λυχνία en español moderno sin perder dignidad ni claridad. Se ajustan las notas para mayor naturalidad y precisión léxica, manteniendo las alternativas auditadas para κρύπτη y μόδιος. El resto del texto ya preserva bien el sentido del original y la filosofía de traducción del POB.
