translation:
  language: es
  text: ¡Ay de ustedes, porque edifican las tumbas[a] de los profetas a quienes sus padres mataron!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sepulcros conmemorativos'. El término griego puede referirse a tumbas o a monumentos funerarios.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαὶ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ti/ustedes!
  - ¡Ay de vosotros!
  lexicon: BDAG
  rationale: En español, '¡Ay de ustedes!' conserva el valor profético de denuncia y juicio de οὐαί. 'Ay' comunica mejor la carga de reproche que '¡Ay!' aislado, y evita una formulación demasiado neutral como 'desdicha'.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: Con una exclamación de lamento/denuncia, el destinatario se expresa naturalmente en español con 'de ustedes' dentro de '¡Ay de ustedes!'. Mantiene la dirección personal del original sin sonar forzado.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Introduce la causa de la denuncia. 'Porque' es claro, natural y causal, y refleja bien la función de ὅτι en este contexto.
- source_word: οἰκοδομεῖτε
  english_pob_choice: you build
  chosen_spanish: edifican
  alternatives_spanish:
  - construyen
  - levantan
  lexicon: BDAG
  rationale: '''Edifican'' preserva la idea de construir/levantar una estructura funeraria y suena digno en español bíblico moderno. ''Construyen'' es posible, pero ''edifican'' mantiene mejor el tono formal sin volverse arcaico.'
- source_word: τὰ μνημεῖα
  english_pob_choice: the tombs
  chosen_spanish: las tumbas
  alternatives_spanish:
  - los sepulcros
  - los monumentos funerarios
  - las tumbas conmemorativas
  lexicon: BDAG
  rationale: El inglés POB optó por 'tombs' como el sentido más natural de μνημεῖα. En español, 'tumbas' comunica con claridad el sentido funerario. Se evita 'monumentos' porque puede oscurecer el referente sepulcral.
- source_word: τῶν προφητῶν
  english_pob_choice: of the prophets
  chosen_spanish: de los profetas
  lexicon: BDAG
  rationale: Genitivo posesivo directo y transparente en español; no requiere adaptación adicional.
- source_word: πατέρες
  english_pob_choice: fathers
  chosen_spanish: padres
  alternatives_spanish:
  - antepasados
  - ancestros
  lexicon: BDAG
  rationale: Se conserva 'padres' para reflejar la cercanía lexical del griego y seguir la preferencia auditada del POB. 'Ancestros' aclara la referencia histórica, pero desplaza el lenguaje familiar del original.
- source_word: ἀπέκτειναν
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte a
  - asesinaron
  lexicon: BDAG
  rationale: '''Mataron'' es la equivalencia más directa y natural. ''Asesinaron'' añade una valoración jurídica/moral más fuerte de la que exige el verbo por sí solo, aunque el contexto la implique.'
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: a ellos
  alternatives_spanish:
  - los
  lexicon: BDAG
  rationale: En español, el objeto directo animado suele expresarse con 'a ellos' en una formulación más explícita y solemne. Aquí se integra naturalmente en la relativa 'a quienes sus padres mataron'.
theological_decisions:
- issue: Relación entre la construcción de tumbas y la culpa de los padres
  english_pob_reading: Keep the statement concise and implicit; do not add the following verse's accusation into this verse.
  chosen_spanish_reading: 'Mantener la estructura breve e implícita: los oyentes construyen las tumbas de los profetas, y sus padres los mataron.'
  alternative_spanish_readings:
  - ustedes edifican las tumbas de los profetas, pero sus padres los mataron
  - ustedes edifican las tumbas de los profetas, y con eso testifican contra sus padres
  rationale: El griego presenta la yuxtaposición sin explicitar todavía la inferencia moral completa. La traducción conserva esa tensión retórica y evita introducir una conjunción adversativa que el ajuste revisado del POB decidió retirar.
  doctrine_reference: 'Translation philosophy: preservar la tensión textual y no resolver anticipadamente la implicación teológica.'
translation_notes:
  revision_awareness: Seguí la revisión auditada que eliminó la adversativa explícita y unió más naturalmente la cláusula relativa a 'los profetas'. Por eso opté por una estructura española directa con 'a quienes sus padres mataron', sin añadir 'pero'.
  spanish_consistency_notes:
  - Usé 'profetas' y no 'profetas' con ampliación interpretativa; el referente permanece literal.
  - Conservé 'padres' para mantener la huella léxica del griego y la preferencia auditada del POB, sin sustituirla por 'ancestros'.
  - Elegí 'mataron' en vez de 'asesinaron' para no sobrecargar el juicio moral más allá del verbo griego.
  - No empleé 'Mesías', 'Yahvé' ni otros términos del sistema terminológico general porque no aparecen en este versículo.
