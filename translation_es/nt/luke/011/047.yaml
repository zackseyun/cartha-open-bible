    rationale: El English POB conservó una alternativa significativa ('memorial tombs'). Como en español también existe una alternativa relevante ('sepulcros conmemorativos' o 'monumentos funerarios'), conviene preservarla en nota para mantener la trazabilidad léxica del proyecto.
  revised_spanish_text: ¡Ay de ustedes, porque edifican las tumbas[a] de los profetas a quienes sus padres mataron!
