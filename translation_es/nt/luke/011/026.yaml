translation:
  language: es
  text: Entonces va y toma consigo otros siete espíritus[a] más malignos que él[b], y entran y habitan allí[c]; y el estado final de aquel hombre se vuelve peor que el primero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «espíritus», no explícitamente «demonios» ni «espíritus inmundos» en este versículo, aunque el contexto deja claro su carácter hostil.
    reason: lexical_alternative
  - marker: b
    text: O «más perversos que él». El griego usa una comparación reflexiva cuya forma es neutra, literalmente «más malos que sí mismo / que él mismo».
    reason: lexical_alternative
  - marker: c
    text: O «la condición final de aquel hombre se vuelve peor que la primera».
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal y narrativo; «Entonces» expresa con naturalidad la secuencia en español y preserva el avance del relato.
- source_word: πορεύεται
  english_pob_choice: it goes
  chosen_spanish: va
  alternatives_spanish:
  - se va
  - procede
  lexicon: BDAG
  rationale: Verbo de movimiento en forma deponente; «va» es breve y idiomático, y mantiene el flujo narrativo sin introducir matices no exigidos.
- source_word: παραλαμβάνει
  english_pob_choice: takes along
  chosen_spanish: toma consigo
  alternatives_spanish:
  - toma
  - lleva consigo
  lexicon: BDAG
  rationale: El valor de acompañamiento queda mejor explícito en español con «consigo»; evita reducir el verbo a un simple ‘tomar’.
- source_word: ἕτερα
  english_pob_choice: other
  chosen_spanish: otros
  alternatives_spanish:
  - diferentes
  lexicon: BDAG
  rationale: «Otros» reproduce el contraste de ἕτερα sin sobrecargar el texto; el matiz de diferencia queda sostenido por el comparativo siguiente.
- source_word: πνεύματα
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - espíritus inmundos
  - demonios
  lexicon: BDAG
  rationale: El sustantivo del verso es simplemente πνεύματα. Por fidelidad al texto, el cuerpo principal mantiene «espíritus» y no importa calificativos que aquí no aparecen.
- source_word: πονηρότερα ἑαυτοῦ
  english_pob_choice: more evil than itself
  chosen_spanish: más malos que él mismo
  alternatives_spanish:
  - más malignos que él mismo
  - más perversos que él mismo
  lexicon: BDAG
  rationale: Conservo la comparación intensiva y el referente reflexivo. En español, «más malos» es comprensible y directo; «él mismo» refleja la referencia personal asumida por el relato, aunque el griego usa neutro.
- source_word: ἑπτά
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - '7'
  lexicon: BDAG
  rationale: Numeral cardinal normal y directo.
- source_word: εἰσελθόντα
  english_pob_choice: and they enter
  chosen_spanish: entrando
  alternatives_spanish:
  - y entrando
  - cuando entran
  lexicon: BDAG
  rationale: El participio aoristo se vierte de modo adverbial para enlazar la acción previa con la principal. «Entrando» es natural y conserva la simultaneidad/secuencia del griego sin añadir un sujeto distinto.
- source_word: κατοικεῖ
  english_pob_choice: live there
  chosen_spanish: habitan allí
  alternatives_spanish:
  - viven allí
  - moran allí
  lexicon: BDAG
  rationale: «Habitan» expresa residencia estable y suena más digno que una mera repetición de ‘viven’. Mantiene el valor de κατοικέω como residir/establecerse.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: BDAG
  rationale: Adverbio locativo simple; «allí» conserva neutralidad y registro.
- source_word: γίνεται
  english_pob_choice: becomes
  chosen_spanish: se vuelve
  alternatives_spanish:
  - se hace
  - llega a ser
  lexicon: BDAG
  rationale: Verbo de resultado/cambio de estado; «se vuelve» refleja bien el giro de condición sin sonar demasiado técnico.
- source_word: τὰ ἔσχατα
  english_pob_choice: the last state
  chosen_spanish: el estado final
  alternatives_spanish:
  - la condición final
  - el último estado
  lexicon: BDAG
  rationale: En español, «estado final» comunica la idea idiomática de condición posterior o desenlace. Se evita una traducción demasiado literal que sonaría extraña.
- source_word: τοῦ ἀνθρώπου ἐκείνου
  english_pob_choice: of that man
  chosen_spanish: de aquel hombre
  alternatives_spanish:
  - de ese hombre
  - de aquel varón
  lexicon: BDAG
  rationale: «Aquel» reproduce la deixis distante de ἐκείνου y «hombre» conserva la referencia individual masculina del relato.
- source_word: χείρονα τῶν πρώτων
  english_pob_choice: worse than the first
  chosen_spanish: peor que el primero
  alternatives_spanish:
  - más malo que el primero
  - peor que antes
  lexicon: BDAG
  rationale: La comparación final se expresa de modo natural con «peor que el primero». «El primero» conserva la oposición concisa del griego con «los primeros» implícitos en el contraste.
theological_decisions:
- issue: Si especificar a los espíritus como demonios o espíritus inmundos en el texto principal
  english_pob_reading: spirits
  chosen_spanish_reading: espíritus
  alternative_spanish_readings:
  - espíritus inmundos
  - demonios
  rationale: El verso nombra solo πνεύματα. Mantener «espíritus» respeta la primacía del texto fuente y deja que el contexto inmediato determine su carácter hostil.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition
- issue: Cómo reflejar el neutro griego con el referente personal del relato en la comparación 'more evil than itself'
  english_pob_reading: more evil than itself
  chosen_spanish_reading: más malos que él mismo
  alternative_spanish_readings:
  - más malos que sí mismos
  - más malignos que él
  rationale: El griego usa un neutro, pero el contexto narrativo personaliza al espíritu inicial. «Él mismo» comunica de forma natural esa referencia sin ocultar la tensión gramatical del original.
  doctrine_reference: Translation philosophy §2 Preserve grammatical/theological tension where meaningful
- issue: Cómo verter τὰ ἔσχατα τοῦ ἀνθρώπου ἐκείνου
  english_pob_reading: the last state of that man
  chosen_spanish_reading: el estado final de aquel hombre
  alternative_spanish_readings:
  - la condición final de aquel hombre
  - el último estado de aquel hombre
  rationale: «Estado final» suena idiomático en español y conserva la idea de condición/resultados posteriores. La frase evita una simplificación doctrinal y mantiene el contraste con «el primero».
  doctrine_reference: Translation philosophy §3 Idiomatic clarity without paraphrase
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó una formulación participial más libre por «they enter and live there» para reflejar mejor el participio plural griego. En español, «entrando, habitan allí» preserva esa secuencia de acción de manera compacta, sin añadir un sujeto distinto ni convertir el participio en una explicación excesiva.
  spanish_consistency_notes:
  - Se mantiene «espíritus» en el texto principal, conforme a la preferencia auditada de no importar ‘demonios’/‘inmundos’ al cuerpo del verso.
  - «Yahvé» no aplica en este versículo.
  - Se usa un comparativo directo («más malos») que refleja el campo semántico de πονηρότερα; la nota ofrece la alternativa más idiomática de «más perversos».
  - «Aquel» y «él mismo» mantienen la referencia distante e individual del episodio, sin neutralizar el género del sustantivo ἄνθρωπος.
