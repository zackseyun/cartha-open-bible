revisions:
- from: Entonces va y toma consigo siete otros espíritus[a] más malos que él mismo, y, entrando, habitan allí; y el estado final de aquel hombre se vuelve peor que el primero.
  to: Entonces va y toma consigo otros siete espíritus[a] más malignos que él[b], y entran y habitan allí[c]; y el estado final de aquel hombre se vuelve peor que el primero.
  rationale: Se ajusta el orden a «otros siete espíritus» para un español más natural; se cambia «entrando, habitan allí» por «entran y habitan allí» para reflejar mejor la revisión inglesa y la acción coordinada del griego; y se sustituye «más malos que él mismo» por «más malignos que él», acompañado de nota que preserva la tensión del reflexivo neutro griego sin forzar una formulación española poco natural en el texto principal. También se restauran notas significativas de la auditoría inglesa.
