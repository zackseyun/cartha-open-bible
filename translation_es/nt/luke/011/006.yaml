translation:
  language: es
  text: porque un amigo mío ha venido a mí de un viaje[a], y no tengo nada que poner delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «del camino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειδὴ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Introduce la causa de la petición. «Porque» es la conjunción causal más natural y directa en español aquí.
- source_word: φίλος μου
  english_pob_choice: a friend of mine
  chosen_spanish: un amigo mío
  alternatives_spanish:
  - mi amigo
  lexicon: BDAG
  rationale: El griego anartro con posesivo conserva un matiz indefinido; «un amigo mío» reproduce mejor ese valor que «mi amigo».
- source_word: παρεγένετο
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - ha llegado
  - vino
  lexicon: BDAG
  rationale: El aoristo aquí expresa llegada/presencia ya efectiva; el perfecto compuesto español comunica bien que ya está presente.
- source_word: ἐξ ὁδοῦ
  english_pob_choice: from a journey
  chosen_spanish: de camino
  alternatives_spanish:
  - de un viaje
  - del camino
  lexicon: BDAG
  rationale: La expresión idiomática señala que viene tras viajar. «De camino» mantiene naturalidad en español y evita una literalidad rígida; en nota puede explicarse el valor más literal de «desde el camino / del camino».
- source_word: πρός με
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - a mi casa
  - para verme
  lexicon: BDAG
  rationale: La preposición indica movimiento hacia el hablante. «A mí» es suficientemente literal y no añade elementos implícitos como casa o visita.
- source_word: οὐκ ἔχω
  english_pob_choice: I have nothing
  chosen_spanish: no tengo nada
  alternatives_spanish:
  - no tengo nada que
  lexicon: BDAG
  rationale: Negación simple de posesión. «No tengo nada» es la forma natural y completa en español.
- source_word: ὃ παραθήσω αὐτῷ
  english_pob_choice: to set before him
  chosen_spanish: que poner delante de él
  alternatives_spanish:
  - que servirle
  - que presentarle
  lexicon: BDAG
  rationale: παρατίθημι en contexto de comida/hospitalidad es «poner delante» alimentos. «Poner delante de él» preserva la imagen de hospitalidad mejor que una paráfrasis más interpretativa como «servirle».
translation_notes:
  revision_awareness: 'Se siguió la lectura auditada en inglés sin cambios de sentido: el amigo ya ha llegado y el hablante carece de algo para ofrecerle. La única nota mantiene la tensión entre el español idiomático y el valor más literal de ἐξ ὁδοῦ.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR»/«Cristo» porque no aparecen en el versículo.
  - Se mantuvo «amigo mío»/«un amigo mío» como poseedor afectivo-indefinido, coherente con el griego.
  - «Poner delante de él» conserva la imaginería de hospitalidad del verbo griego.
