  text: κἀκεῖνος ἔσωθεν ἀποκριθεὶς εἴπῃ· Μή μοι κόπους πάρεχε· ἤδη ἡ θύρα κέκλεισται, καὶ τὰ παιδία μου μετ’ ἐμοῦ εἰς τὴν κοίτην εἰσίν· οὐ δύναμαι ἀναστὰς δοῦναί σοι.
base_translation:
  language: en
  yaml_path: translation/nt/luke/011/007.yaml
  text: and he from inside answers and says[a], ‘Do not trouble me. The door has already been shut, and my children are with me in bed[c][b]. I am not able to get up and give you.’
  footnotes:
  - marker: a
    text: Or 'Do not cause me trouble' or 'Do not keep bothering me.' The Greek idiom literally involves 'providing troubles.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the door is already shut.' The Greek perfect verb can emphasize either the completed action ('has been shut') or the resulting state ('is shut').
    reason: lexical_alternative
  - marker: c
    text: '''In bed'' refers to the shared sleeping place in a household setting, not to marital intimacy.'
    reason: cultural_note
