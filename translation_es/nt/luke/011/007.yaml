translation:
  language: es
  text: 'y él, respondiendo desde dentro, dice: «No me causes molestias[a]. La puerta ya ha sido cerrada, y mis hijos están conmigo en la cama[b][c]. No puedo levantarme y darte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativas: «No me des molestias» o «No sigas molestándome». El modismo griego literalmente expresa la idea de ''causarme/proporcionarme molestias''.'
    reason: lexical_alternative
  - marker: b
    text: 'Alternativa: «La puerta ya está cerrada». El perfecto griego puede enfocarse tanto en la acción concluida como en el estado resultante.'
    reason: lexical_alternative
  - marker: c
    text: «En la cama» alude al lugar compartido para dormir en una casa, no a intimidad sexual.
    reason: cultural_note
lexical_decisions:
- source_word: κἀκεῖνος
  english_pob_choice: and he
  chosen_spanish: y él
  alternatives_spanish:
  - y aquel
  - entonces él
  lexicon: BDAG
  rationale: Mantiene la referencia narrativa con un simple pronombre personal en español, natural y suficiente en el contexto de la parábola.
- source_word: ἔσωθεν
  english_pob_choice: from inside
  chosen_spanish: desde dentro
  alternatives_spanish:
  - desde adentro
  - por dentro
  lexicon: BDAG
  rationale: Conserva la indicación espacial de procedencia de la respuesta y su contraste con quien está afuera.
- source_word: ἀποκριθεὶς εἴπῃ
  english_pob_choice: answers and says
  chosen_spanish: respondiendo ... dice
  alternatives_spanish:
  - respondió y dijo
  - replica y dice
  lexicon: BDAG
  rationale: Reproduce la fórmula narrativa semítica sin volverla pesada en español; el presente narrativo puede mantener vivacidad sin perder el doble verbo.
- source_word: Μή μοι κόπους πάρεχε
  english_pob_choice: Do not trouble me
  chosen_spanish: No me des molestias
  alternatives_spanish:
  - No me causes molestias
  - No me estés molestando
  lexicon: BDAG
  rationale: κοπους παρέχε literally implica 'proveer molestias/trabajos'; 'dar molestias' conserva la fuerza idiomática sin diluirla, y evita el tono excesivamente general de 'molestar'.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - ya para entonces
  lexicon: BDAG
  rationale: '''Ya'' expresa de forma natural el estado vigente y el sentido de anterioridad completada.'
- source_word: ἡ θύρα κέκλεισται
  english_pob_choice: The door has already been shut
  chosen_spanish: La puerta ya ha sido cerrada
  alternatives_spanish:
  - La puerta ya está cerrada
  - La puerta ya ha sido cerrada
  lexicon: BDAG
  rationale: El perfecto griego comunica una acción completada con resultado presente; 'ha sido cerrada' preserva esa carga aspectual mejor que un simple estado, y 'ya' recoge ἤδη.
- source_word: τὰ παιδία μου
  english_pob_choice: my children
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis niños
  - mis hijos pequeños
  lexicon: BDAG
  rationale: παιδία refiere a hijos/niños del hogar; 'mis hijos' es claro y neutral en español sin sobreespecificar edad.
- source_word: μετ’ ἐμοῦ εἰς τὴν κοίτην εἰσίν
  english_pob_choice: are with me in bed
  chosen_spanish: están conmigo en la cama
  alternatives_spanish:
  - están conmigo en la cama compartida
  - están conmigo acostados
  lexicon: BDAG
  rationale: '''Cama'' comunica el lugar de dormir de manera natural en español. Evita un giro demasiado literal que sonaría forzado, sin perder el sentido doméstico de κοίτη.'
- source_word: οὐ δύναμαι ἀναστὰς δοῦναί σοι
  english_pob_choice: I am not able to get up and give you
  chosen_spanish: No puedo levantarme y darte
  alternatives_spanish:
  - No puedo levantarme para darte
  - No me es posible levantarme y darte
  lexicon: BDAG
  rationale: '''Levantarme'' traduce ἀναστὰς como acción previa necesaria; ''darte'' conserva el objeto implícito del contexto sin añadir ''algo'', ya que el texto griego no lo expresa.'
translation_notes:
  revision_awareness: La revisión inglesa eliminó «anything» porque no aparece en el griego. La redacción española evita añadir un complemento indefinido equivalente y mantiene la omisión del original. También se preservó la fuerza idiomática de κόπους πάρεχε con una solución española natural.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por defecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se usó 'cama' para κοίτη siguiendo el contexto doméstico señalado por la auditoría inglesa; 'cama' es más natural que una traducción rígida como 'lecho' en este pasaje.
  - No se añadió equivalente de 'anything' porque el griego no lo expresa y la revisión inglesa lo retiró.
  - Se evitó 'molestar' a secas para no perder la idea idiomática de 'proporcionar molestias' que documenta la auditoría.
