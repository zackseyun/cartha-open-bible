translation:
  language: es
  text: desde la sangre de Abel hasta la sangre de Zacarías[a], que pereció entre el altar y la casa. Sí, les digo[b], se exigirá de esta generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''entre el altar y el templo''; el griego dice literalmente: ''entre el altar y la casa''.'
    reason: lexical_alternative
  - marker: b
    text: La identidad de Zacarías aquí es debatida; pueden ser Zacarías hijo de Joiada (2 Crónicas 24:20–22) o Zacarías hijo de Berequías.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπὸ αἵματος Ἅβελ
  english_pob_choice: from the blood of Abel
  chosen_spanish: desde la sangre de Abel
  alternatives_spanish:
  - de la sangre de Abel
  - desde la sangre derramada de Abel
  lexicon: BDAG
  rationale: Conserva ἀπό como punto de partida espacial/temporal con 'desde', y αἷμα como 'sangre' en el sentido bíblico de sangre derramada y culpa de sangre. 'Desde' mantiene el paralelismo con el segundo miembro.
- source_word: ἕως αἵματος Ζαχαρίου
  english_pob_choice: to the blood of Zechariah
  chosen_spanish: hasta la sangre de Zacarías
  alternatives_spanish:
  - hasta la sangre derramada de Zacarías
  - hasta Zacarías
  lexicon: BDAG
  rationale: '''Hasta'' reproduce bien el alcance de ἕως y mantiene el paralelismo retórico con ''desde''. ''Sangre de Zacarías'' preserva la construcción semítica sin sobreexplicar la referencia.'
- source_word: τοῦ ἀπολομένου
  english_pob_choice: who perished
  chosen_spanish: que pereció
  alternatives_spanish:
  - que murió
  - que fue muerto
  lexicon: BDAG
  rationale: '''Pereció'' refleja el matiz de ἀπόλλυμι sin decidir en el texto principal el modo exacto de su muerte. Conserva la ambigüedad auditada del inglés POB entre morir y ser asesinado.'
- source_word: μεταξὺ τοῦ θυσιαστηρίου καὶ τοῦ οἴκου
  english_pob_choice: between the altar and the house
  chosen_spanish: entre el altar y la casa
  alternatives_spanish:
  - entre el altar y el templo
  - entre el altar y el santuario
  lexicon: BDAG
  rationale: Se mantiene 'casa' para reproducir el sentido literal de οἶκος y preservar la tensión documentada entre la literalidad y el referente contextual del templo. 'Templo' queda como alternativa contextual, no como sustitución automática.
- source_word: ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Ciertamente
  - En efecto
  lexicon: BDAG
  rationale: '''Sí'' transmite la afirmación enfática de manera natural y sobria en español, adecuada a una declaración solemne de Jesús.'
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les aseguro
  lexicon: BDAG
  rationale: '''Les digo'' reproduce el dativo plural de destinatarios con una fórmula idiomática y directa. Se evita intensificar a ''les aseguro'' para no añadir matiz no explicitado por el griego.'
- source_word: ἐκζητηθήσεται
  english_pob_choice: it will be required
  chosen_spanish: se pedirá cuentas
  alternatives_spanish:
  - será requerido
  - se exigirá
  - se reclamará
  lexicon: BDAG
  rationale: El pasivo divino de ἐκζητέω en este contexto judicial sugiere rendición de cuentas o exigencia de responsabilidad. 'Se pedirá cuentas' comunica el valor forense sin introducir un sujeto explícito ni sonar artificial en español.
- source_word: ἀπὸ τῆς γενεᾶς ταύτης
  english_pob_choice: from this generation
  chosen_spanish: a esta generación
  alternatives_spanish:
  - de esta generación
  - por esta generación
  - entre esta generación
  lexicon: BDAG
  rationale: En español, con el giro 'pedir cuentas', la preposición más natural es 'a'. Aunque ἀπό subyace al sujeto de la exigencia, el equivalente funcional español evita una construcción pesada sin perder la referencia a la generación contemporánea.
theological_decisions:
- issue: Identidad de Zacarías y referencia histórica implícita
  english_pob_reading: The verse is translated without identifying which Zechariah is meant; the issue remains debated.
  chosen_spanish_reading: El texto se traduce sin resolver cuál Zacarías es, y se conserva la referencia abierta.
  alternative_spanish_readings:
  - Zacarías hijo de Joiada
  - Zacarías hijo de Berequías
  - una figura profética representativa
  rationale: La traducción principal no debe cerrar una identificación histórica debatida que el griego no explicita aquí. Mantener la referencia abierta respeta el texto y la auditoría inglesa.
  doctrine_reference: Preservar la tensión histórica sin resolverla en la traducción principal.
- issue: Alcance de la acusación sobre 'esta generación'
  english_pob_reading: '''This generation'' remains the generation addressed by Jesus, without extending or narrowing it doctrinally.'
  chosen_spanish_reading: '''Esta generación'' se deja como el grupo contemporáneo al que Jesús habla, sin ampliar ni restringir su alcance.'
  alternative_spanish_readings:
  - esta raza
  - la generación incrédula
  - la generación judía
  rationale: '''Generación'' mantiene la fuerza concreta de γενεά y evita interpretaciones doctrinales o étnicas que el versículo por sí solo no impone.'
  doctrine_reference: Conservar el marco judicial del dicho sin añadir sistematizaciones externas.
translation_notes:
  revision_awareness: El audio y la revisión más reciente indican que no hubo cambios necesarios; esta versión sigue de cerca el texto griego y conserva la alternativa contextual 'templo/casa' en nota, como en el expediente inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva 'casa' en el texto principal por fidelidad al οἶκος literal, con 'templo' solo como alternativa anotada.
  - '''Se pedirá cuentas'' refleja el matiz judicial de ἐκζητηθήσεται sin forzar una voz pasiva rígida en español.'
  - La puntuación y el orden retórico buscan reproducir el paralelismo 'desde... hasta...' del griego.
