    text: Or 'between the altar and the temple'; Greek literally, 'between the altar and the house.'
    reason: lexical_alternative
  - marker: b
    text: The Zechariah mentioned here is debated; possibilities include Zechariah son of Jehoiada (2 Chronicles 24:20–22) or Zechariah son of Berechiah.
    reason: cross_reference
