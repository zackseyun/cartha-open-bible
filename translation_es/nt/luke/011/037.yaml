    reason: lexical_alternative
  - marker: b
    text: Es decir, adoptó la postura acostumbrada para una comida formal.
    reason: cultural_note
  revision_rationale: 'La revisión conserva el contenido principal del borrador, pero corrige lo más importante: las notas ahora reflejan exactamente las decisiones léxicas y culturales documentadas en el POB inglés. También se mejora «se recostó» a «se reclinó» para mayor precisión y naturalidad. No hace falta adjudicación adicional.'
