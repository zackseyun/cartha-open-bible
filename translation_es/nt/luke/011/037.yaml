translation:
  language: es
  text: Mientras él hablaba, un fariseo le pide que coma con él[a]; así que entró y se reclinó a la mesa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que desayune» o «que haga una comida de la mañana»; el verbo griego puede referirse a una comida más temprana, pero aquí denota en sentido amplio compartir una comida.
    reason: lexical_alternative
  - marker: b
    text: Es decir, adoptó la postura acostumbrada para una comida formal.
    reason: cultural_note
lexical_decisions:
- source_word: Ἐν δὲ τῷ λαλῆσαι
  english_pob_choice: While he was speaking
  chosen_spanish: Mientras él hablaba
  alternatives_spanish:
  - Mientras estaba hablando
  - Mientras hablaba
  lexicon: BDAG
  rationale: La construcción con ἐν + infinitivo articular expresa simultaneidad. En español, «Mientras él hablaba» reproduce bien el tiempo concurrente sin sonar rígido.
- source_word: ἐρωτᾷ
  english_pob_choice: asks
  chosen_spanish: le pide
  alternatives_spanish:
  - le pregunta
  - lo invita
  - le solicita
  lexicon: BDAG
  rationale: El presente histórico conserva la vivacidad narrativa. En este contexto, el verbo no solo es «preguntar», sino hacer una petición/invitación; «le pide» refleja ese valor sin añadir una traducción más interpretativa que el griego no exige.
- source_word: Φαρισαῖος
  english_pob_choice: a Pharisee
  chosen_spanish: un fariseo
  alternatives_spanish:
  - el fariseo
  lexicon: BDAG
  rationale: El singular anarthrous admite artículo indefinido en español. «Un fariseo» es natural y mantiene la referencia no específica del texto.
- source_word: ὅπως ἀριστήσῃ
  english_pob_choice: to dine
  chosen_spanish: que coma
  alternatives_spanish:
  - a comer
  - que tome una comida
  - que cene
  lexicon: BDAG
  rationale: ἀριστάω puede referirse a la comida de la mañana o del mediodía. En español, «que coma» preserva la referencia general a una comida sin fijar indebidamente la hora del día; «comer con él» refleja la invitación social implícita.
- source_word: παρ’ αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - en su casa
  - en su mesa
  lexicon: BDAG
  rationale: El griego dice literalmente «junto a / con él», no especifica la casa. «Con él» sigue de cerca la relación expresada por la preposición y evita introducir un lugar no dicho en el original.
- source_word: εἰσελθὼν
  english_pob_choice: he went in
  chosen_spanish: entró
  alternatives_spanish:
  - habiendo entrado
  - al entrar
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. «Entró» transmite de forma natural el movimiento previo sin recargar la frase.
- source_word: ἀνέπεσεν
  english_pob_choice: reclined at the table
  chosen_spanish: se recostó a la mesa
  alternatives_spanish:
  - se reclinó a la mesa
  - se recostó para la comida
  - se sentó a la mesa
  lexicon: BDAG
  rationale: El verbo alude a la postura típica de banquete en el mundo antiguo. «Se recostó a la mesa» conserva ese matiz histórico-cultural mejor que «sentó», y «a la mesa» mantiene el sentido de comida compartida.
translation_notes:
  revision_awareness: El borrador sigue de cerca el último ajuste auditado del inglés POB, que corrigió el entorno social de «at his house» a «with him». En español se evita especificar una casa y se conserva la invitación personal. También se mantiene el presente histórico de «pide» para reproducir la vivacidad narrativa del original griego.
  spanish_consistency_notes:
  - Se usa «fariseo» como transliteración estable del grupo religioso.
  - Se conserva el valor de comida/banquete de ἀριστάω sin precisar desayuno o almuerzo.
  - La imagen cultural de reclinarse para comer se mantiene con una formulación natural en español.
  - No se introduce «casa» porque el griego no lo menciona explícitamente.
