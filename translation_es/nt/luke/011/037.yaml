    rationale: La nota inglesa [a] trata de ἀριστήσῃ ('desayunar / comer temprano / tener una comida'), pero la española [a] comenta λαλῆσαι. La nota inglesa [b] explica la postura de reclinarse, pero la española [b] comenta la invitación implícita.
  - severity: low
    issue: «se recostó a la mesa» es comprensible pero menos preciso/idiomático que «se reclinó a la mesa».
    rationale: Dado que ἀνέπεσεν en contexto de comida formal alude a reclinarse, «se reclinó» refleja mejor la postura de banquete y suena más natural en español bíblico moderno.
