translation:
  language: es
  text: Pero si yo echo fuera a los demonios por el dedo de Dios[a][b], entonces el reino de Dios ha llegado a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con el dedo de Dios». La expresión es un modismo que señala la acción directa de Dios y evoca Éxodo 8:19.
    reason: lexical_alternative
  - marker: b
    text: O «los ha alcanzado» o «ha venido sobre ustedes».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν δακτύλῳ θεοῦ
  english_pob_choice: by the finger of God
  chosen_spanish: por el dedo de Dios
  alternatives_spanish:
  - con el dedo de Dios
  lexicon: BDAG
  rationale: Conserva la imagen idiomática de instrumentación/agencia sin volverla explicación. En español, «por el dedo de Dios» mantiene mejor el paralelismo metafórico que una paráfrasis como «con el poder de Dios», y deja visible la posible alusión a Éxodo 8:19.
- source_word: ἐκβάλλω
  english_pob_choice: cast out
  chosen_spanish: echo fuera
  alternatives_spanish:
  - expulso
  - arrojo fuera
  lexicon: BDAG
  rationale: En contexto de exorcismo, «echar fuera» es una equivalencia natural y fiel en español bíblico contemporáneo. «Expulsar» es posible, pero «echar fuera» conserva el registro narrativo y la imagen verbal del griego.
- source_word: τὰ δαιμόνια
  english_pob_choice: the demons
  chosen_spanish: los demonios
  alternatives_spanish:
  - los espíritus demoníacos
  - los demonios inmundos
  lexicon: BDAG
  rationale: «Demonios» es el equivalente léxico directo de δαιμόνια. No se sustituye por «espíritus inmundos» porque el griego aquí usa otro término; el artículo plural se refleja de forma natural en español.
- source_word: ἄρα
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: Marca la inferencia lógica de la condición precedente. «Entonces» es conciso y natural en español, sin perder la fuerza inferencial del griego.
- source_word: ἔφθασεν ἐφ’ ὑμᾶς
  english_pob_choice: has come upon you
  chosen_spanish: ha llegado hasta ustedes
  alternatives_spanish:
  - ha venido sobre ustedes
  - los ha alcanzado
  lexicon: BDAG
  rationale: «Ha llegado hasta ustedes» conserva el valor de llegada/alcance decisivo del aoristo con ἐπί, evitando que «sobre ustedes» sugiera únicamente juicio adversativo. También mantiene bien la lectura de llegada presente e inaugurada del reino.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el reino de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la traducción más estable y fiel al sustantivo βασιλεία en este contexto, preservando tanto el sentido concreto como el dinámico que la tradición bíblica en español reconoce con claridad.
theological_decisions:
- issue: El valor de «el dedo de Dios»
  english_pob_reading: A metaphor for God's direct power/agency in Jesus' exorcisms, left as an image rather than interpreted in the translation.
  chosen_spanish_reading: Una metáfora de la acción y el poder directos de Dios en los exorcismos de Jesús, conservada como imagen.
  alternative_spanish_readings:
  - Una referencia explícita al Espíritu Santo
  - Una paráfrasis como «el poder de Dios»
  rationale: La traducción conserva la metáfora tal como está en Lucas y no la convierte en glosa interpretativa. Eso mantiene la resonancia intertextual con Éxodo 8:19 y evita importar al texto principal la formulación de Mateo 12:28.
  doctrine_reference: Translation philosophy §§1, 3
- issue: La llegada del reino de Dios
  english_pob_reading: The verse declares the present arrival/inbreaking of God's kingdom in Jesus' ministry.
  chosen_spanish_reading: El versículo afirma la llegada presente e irruptiva del reino de Dios en el ministerio de Jesús.
  alternative_spanish_readings:
  - El reino de Dios es solo futuro
  - La frase implica únicamente que el reino los ha alcanzado en juicio
  rationale: «Ha llegado hasta ustedes» expresa llegada efectiva en el presente, coherente con el contexto de expulsión de demonios. No se restringe el sentido a un futuro distante ni se carga la frase exclusivamente con un matiz condenatorio.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto griego SBLGNT y coincide con el consenso del control de calidad más reciente: no se requirieron cambios adicionales tras la última pasada de revisión.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «reino de Dios» para βασιλεία τοῦ θεοῦ, conforme al criterio del proyecto.
  - Se usa «demonios» para δαιμόνια, evitando mezclarlo con «espíritus inmundos» porque el griego aquí no usa esa expresión.
  - Se conserva la imagen corporal-metafórica «dedo de Dios» en el texto principal, con nota explicativa para la alternativa instrumental.
  - «Ha llegado hasta ustedes» procura una sintaxis natural en español sin perder el matiz de llegada decisiva del verbo griego.
