translation:
  language: es
  text: Porque todo el que pide recibe, y el que busca encuentra, y al que toca[a] se le abrirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más explícita según el contexto, «se le abrirá la puerta al que toca». El griego deja el objeto sin expresar.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  english_pob_choice: everyone
  chosen_spanish: todo el que
  alternatives_spanish:
  - todos los que
  - cada uno que
  lexicon: BDAG
  rationale: El griego usa πᾶς con participio sustantivado en sentido distributivo. «Todo el que» conserva el alcance universal y suena natural en español bíblico contemporáneo sin perder la fuerza proverbial.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Mantiene el valor explicativo-conectivo de la oración respecto del contexto anterior. «Porque» es claro y fiel en español.
- source_word: ὁ αἰτῶν
  english_pob_choice: the one who asks
  chosen_spanish: el que pide
  alternatives_spanish:
  - el que solicita
  - el que ruega
  lexicon: BDAG
  rationale: El participio presente se vierte como una expresión genérica y natural. «Pide» corresponde al sentido básico de αἰτέω en este contexto de petición.
- source_word: λαμβάνει
  english_pob_choice: receives
  chosen_spanish: recibe
  alternatives_spanish:
  - obtiene
  - lo recibe
  lexicon: BDAG
  rationale: «Recibe» es el equivalente directo y más idiomático en la secuencia petición-respuesta. No añade matices ajenos al texto.
- source_word: ὁ ζητῶν
  english_pob_choice: the one who seeks
  chosen_spanish: el que busca
  alternatives_spanish:
  - el que procura
  - el que anda buscando
  lexicon: BDAG
  rationale: «Busca» preserva el valor durativo/generic del participio presente y resulta claro y natural en español.
- source_word: εὑρίσκει
  english_pob_choice: finds
  chosen_spanish: halla
  alternatives_spanish:
  - encuentra
  - lo encuentra
  lexicon: BDAG
  rationale: «Halla» es una alternativa válida y reverente en español bíblico, y evita la repetición excesiva de formas modernas mientras sigue siendo plenamente comprensible.
- source_word: τῷ κρούοντι
  english_pob_choice: to the one who knocks
  chosen_spanish: al que llama
  alternatives_spanish:
  - al que toca
  - al que golpea
  lexicon: BDAG
  rationale: La imagen de κρούω es la de llamar a una puerta mediante golpear/tocar, pero «llama» comunica bien la acción en español y funciona naturalmente con el verbo pasivo final. Se conserva la referencia personal del dativo con «al que».
- source_word: ἀνοιγήσεται
  english_pob_choice: it will be opened
  chosen_spanish: se le abrirá
  alternatives_spanish:
  - le será abierto
  - se abrirá
  lexicon: BDAG
  rationale: El griego deja el objeto implícito. En español, «se le abrirá» conserva la pasiva y la indeterminación del objeto sin añadir explícitamente «la puerta», como hace la nota inglesa para explicar una posibilidad contextual pero no obligatoria.
theological_decisions:
- issue: Alcance universal de la promesa
  english_pob_reading: Render the statement as a general universal principle without adding qualifications.
  chosen_spanish_reading: Presentar la afirmación como principio general universal, sin introducir condiciones interpretativas que no están en el versículo.
  alternative_spanish_readings:
  - «Todo el que pide recibe, si pide correctamente»
  - «El que busca sinceramente halla»
  - «Al que llama se le abrirá, según la voluntad de Dios»
  rationale: El griego formula una máxima universal en el marco de la enseñanza sobre la oración. La traducción debe preservar esa tensión y no resolverla añadiendo restricciones teológicas que el texto no expresa.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con el pasaje griego SBLGNT y con la línea auditada de la POB inglesa: mantiene el valor explicativo de γὰρ, el carácter distributivo de πᾶς con participios sustantivados, y la pasiva con objeto implícito en ἀνοιγήσεται sin sobreespecificarlo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo»/«Mesías» porque no aparecen en el texto.
  - «Pide / busca / llama» conserva la tríada proverbial y el paralelismo del griego.
  - 'La nota al pie refleja la misma ambigüedad objetiva que la nota inglesa: el objeto de «abrir» está implícito, no explícito.'
