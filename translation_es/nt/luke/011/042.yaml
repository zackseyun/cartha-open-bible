translation:
  language: es
  text: Pero ¡ay de ustedes, fariseos!, porque diezman la menta, la ruda y toda hortaliza, y descuidan la justicia y el amor de Dios[a]. Estas cosas debían hacer, sin descuidar aquellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'amor por Dios'; el griego también puede significar 'el amor que Dios tiene'.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐαὶ
  english_pob_choice: woe
  chosen_spanish: ¡ay!
  alternatives_spanish:
  - ¡ay de!
  - ¡ay, desgracia para!
  lexicon: BDAG
  rationale: Conserva el tono profético de denuncia y lamentación del interjección griega, sin suavizarlo a una mera exclamación neutra.
- source_word: ἀποδεκατοῦτε
  english_pob_choice: tithe
  chosen_spanish: diezman
  alternatives_spanish:
  - pagan el diezmo de
  - entregan la décima parte de
  lexicon: BDAG
  rationale: '''Diezman'' es el equivalente natural y preciso en español para la acción religiosa de dar la décima parte.'
- source_word: ἡδύοσμον
  english_pob_choice: mint
  chosen_spanish: menta
  alternatives_spanish:
  - hierbabuena
  lexicon: BDAG
  rationale: Nombre botánico estándar y claro en español; corresponde al listado concreto de plantas pequeñas sometidas al diezmo.
- source_word: πήγανον
  english_pob_choice: rue
  chosen_spanish: ruda
  alternatives_spanish:
  - arruda
  lexicon: BDAG
  rationale: Mantiene la especificidad de la planta nombrada por el griego y el valor enumerativo del pasaje.
- source_word: πᾶν λάχανον
  english_pob_choice: every herb
  chosen_spanish: toda hortaliza
  alternatives_spanish:
  - toda hierba
  - toda planta del huerto
  lexicon: BDAG
  rationale: '''Λάχανον'' abarca el producto del huerto o vegetación comestible. ''Hortaliza'' comunica bien la idea de todo lo pequeño y cultivado sin restringirlo indebidamente a una sola especie.'
- source_word: παρέρχεσθε
  english_pob_choice: neglect
  chosen_spanish: descuidan
  alternatives_spanish:
  - pasan por alto
  - ignoran
  lexicon: BDAG
  rationale: El contexto exige la idea de omitir o dejar sin atender. 'Descuidan' refleja el abandono moral sin forzar una imagen demasiado literal.
- source_word: κρίσιν
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - la rectitud
  lexicon: BDAG
  rationale: En este contexto ético-social, 'justicia' expresa mejor la práctica debida que 'juicio', que en español puede sonar más forense o ambiguo.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - la caridad
  lexicon: BDAG
  rationale: Sigue el sentido central de ἀγάπη y conserva el campo semántico de amor activo y fiel que el pasaje requiere.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - para Dios
  - amor divino
  lexicon: BDAG
  rationale: La construcción genitiva queda abierta en griego; 'de Dios' mantiene la ambigüedad entre amor hacia Dios y amor que pertenece a Dios, como en el POB inglés.
- source_word: ἔδει
  english_pob_choice: ought
  chosen_spanish: debieron haber
  alternatives_spanish:
  - era necesario que
  - tenían que
  lexicon: BDAG
  rationale: Expresa obligación moral con naturalidad en español, siguiendo la fuerza de deber que el inglés POB quiso mantener con 'ought'.
- source_word: ποιῆσαι
  english_pob_choice: have done
  chosen_spanish: haber hecho
  alternatives_spanish:
  - hacer
  - practicar
  lexicon: BDAG
  rationale: 'Conserva el infinitivo perfecto implícito en la obligación: algo que debía estar cumplido antes, no solo en abstracto.'
- source_word: κἀκεῖνα
  english_pob_choice: those things
  chosen_spanish: aquellas
  alternatives_spanish:
  - las otras cosas
  - esas cosas
  lexicon: BDAG
  rationale: El demostrativo contrasta con 'estas cosas' y puede mantenerse brevemente en español mediante 'aquellas' para preservar la oposición deíctica.
- source_word: μὴ παρεῖναι
  english_pob_choice: without neglecting
  chosen_spanish: sin dejar de lado
  alternatives_spanish:
  - sin omitir
  - sin descuidar
  lexicon: BDAG
  rationale: El idiomático μὴ παρεῖναι pide una expresión que comunique no abandonar lo otro al cumplir lo primero. 'Sin dejar de lado' preserva esa tensión y suena natural en español.
theological_decisions:
- issue: Ambigüedad de τὴν ἀγάπην τοῦ θεοῦ
  english_pob_reading: Preserve the genitival ambiguity in the main text as 'the love of God.'
  chosen_spanish_reading: Mantener 'el amor de Dios' sin especificar si es amor hacia Dios o amor que proviene de Dios.
  alternative_spanish_readings:
  - el amor para Dios
  - el amor de parte de Dios
  - el amor de Dios hacia ustedes
  rationale: El griego permite más de una relación genitiva y el POB inglés preserva esa tensión. El español 'de Dios' mantiene abierta la lectura objetiva o subjetiva sin resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se siguió la revisión auditada del POB inglés: se evitó una traducción literal tipo ''pasan por alto'' para παρέρχεσθε y se optó por ''descuidan'', más natural y coherente con el contexto. También se mantuvo la ambigüedad genitiva de ''el amor de Dios'' tal como la versión inglesa la preserva con nota.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - '''Fariseos'' se mantiene como transliteración estable del grupo religioso.'
  - Se prefirió 'diezman' por ser el verbo bíblico idiomático en español.
  - '''Justicia'' y no ''juicio'' para κρίσις, siguiendo el valor ético del contexto.'
  - Se evitó 'caridad' para ἀγάπη porque estrecha indebidamente el campo semántico.
  - La estructura final conserva el contraste 'estas... aquellas' del griego.
