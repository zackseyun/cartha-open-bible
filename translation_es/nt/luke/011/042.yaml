  text: Ἀλλὰ οὐαὶ ὑμῖν τοῖς Φαρισαίοις, ὅτι ἀποδεκατοῦτε τὸ ἡδύοσμον καὶ τὸ πήγανον καὶ πᾶν λάχανον, καὶ παρέρχεσθε τὴν κρίσιν καὶ τὴν ἀγάπην τοῦ θεοῦ· ταῦτα ⸀δὲ ἔδει ποιῆσαι κἀκεῖνα μὴ ⸀παρεῖναι.
base_translation:
  language: en
  yaml_path: translation/nt/luke/011/042.yaml
  text: But woe to you Pharisees[a], because you tithe mint and rue and every herb, and you neglect justice and the love of God. These things you ought to have done, without neglecting those things.
  footnotes:
  - marker: a
    text: Or 'love for God'; the Greek could also mean 'God's love.'
    reason: alternative_reading
