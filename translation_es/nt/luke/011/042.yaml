revisions:
- from: ¡Pero ay de ustedes, fariseos[a], porque diezman la menta, la ruda y toda hortaliza, y descuidan la justicia y el amor de Dios. Estas cosas debieron haber hecho, sin dejar de lado aquellas.
  to: Pero ¡ay de ustedes, fariseos!, porque diezman la menta, la ruda y toda hortaliza, y descuidan la justicia y el amor de Dios[a]. Estas cosas debían hacer, sin descuidar aquellas.
  rationale: Se corrige la nota para expresar con español natural y fidelidad la ambigüedad de τὴν ἀγάπην τοῦ θεοῦ, siguiendo el expediente inglés. También se mejora la naturalidad y precisión de ἔδει ποιῆσαι con 'debían hacer'. Se ajusta levemente la puntuación inicial a un orden más natural en español ('Pero ¡ay de ustedes, fariseos!').
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:01:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: denuncia a los fariseos, menciona el diezmo minucioso de hierbas pequeñas, contrasta eso con el descuido de la justicia y el amor de Dios, y conserva la idea de hacer lo uno sin omitir lo otro. Sin embargo, hay dos problemas de fidelidad/forma: la nota al pie no preserva correctamente las alternativas documentadas en inglés, y ''debieron haber hecho'' suena menos natural y menos preciso que una formulación idiomática como ''debían hacer''.'
  spanish_quality_summary: 'El texto es mayormente claro y legible en español neutral. ''Diezman'', ''menta'', ''ruda'', ''justicia'' y ''el amor de Dios'' funcionan bien. ''Toda hortaliza'' es aceptable, aunque algo más amplio/cultivado que ''every herb''; aun así comunica el punto de escrúpulo minucioso. La principal mejora estilística es reemplazar ''Estas cosas debieron haber hecho'' por ''Estas cosas debían hacer'', que suena más natural y dignificado en español bíblico contemporáneo. También conviene ajustar la nota: ''amor para Dios'' no es español natural aquí; debe ser ''amor por Dios'', y debe conservarse también la alternativa ''el amor de Dios'' entendido como ''el amor que Dios tiene''.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεοῦ -> ''Dios'' está bien; no aparece YHWH, Mesías/Cristo, ni otros términos de glosario sensibles. La decisión de mantener ''el amor de Dios'' en el texto principal es correcta por la ambigüedad genitiva documentada. La nota debe expresar esa ambigüedad con español natural.'
  issues:
  - severity: medium
    issue: La nota al pie está mal formulada y no preserva fielmente la alternativa inglesa.
    rationale: 'El inglés dice: Or ''love for God''; the Greek could also mean ''God''s love.'' El borrador pone ''amor para Dios'', que no es idiomático, y luego repite ''amor de Dios'', que ya es el texto principal y no aclara la lectura subjetiva (''el amor que Dios tiene'').'
  - severity: medium
    issue: '''Estas cosas debieron haber hecho'' suena poco natural en español y puede leerse como pluscuamperfecto coloquial.'
    rationale: Para ἔδει ποιῆσαι, una forma más idiomática y estable es 'Estas cosas debían hacer' o 'debían haberlas hecho'. Dado el cierre con 'sin descuidar aquellas', 'debían hacer' fluye mejor y conserva la obligación moral.
  revised_spanish_text: Pero ¡ay de ustedes, fariseos!, porque diezman la menta, la ruda y toda hortaliza, y descuidan la justicia y el amor de Dios[a]. Estas cosas debían hacer, sin descuidar aquellas.
  revised_footnotes:
  - marker: a
    text: O 'amor por Dios'; el griego también puede significar 'el amor que Dios tiene'.
    reason: alternative_reading
  revision_rationale: Se corrige la nota para expresar con español natural y fidelidad la ambigüedad de τὴν ἀγάπην τοῦ θεοῦ, siguiendo el expediente inglés. También se mejora la naturalidad y precisión de ἔδει ποιῆσαι con 'debían hacer'. Se ajusta levemente la puntuación inicial a un orden más natural en español ('Pero ¡ay de ustedes, fariseos!').
