translation:
  language: es
  text: Y perdónanos nuestros pecados, porque nosotros mismos también perdonamos a todo el que nos debe[a][c]. Y no nos lleves a la tentación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a todo el que nos debe»; el griego usa lenguaje de deuda en esta cláusula, aunque la primera dice «pecados».
    reason: lexical_alternative
  - marker: b
    text: O «prueba» o «tribulación».
    reason: alternative_reading
  - marker: c
    text: O «pues nosotros mismos también».
    reason: previous_rendering
lexical_decisions:
- source_word: ἄφες
  english_pob_choice: forgive
  chosen_spanish: perdónanos
  alternatives_spanish:
  - déjanos
  - libéranos
  lexicon: BDAG
  rationale: En una oración dirigida a Dios, ἄφες expresa perdón; en español, «perdónanos» comunica con naturalidad la petición sin introducir un matiz jurídico ajeno al contexto.
- source_word: τὰς ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: nuestros pecados
  alternatives_spanish:
  - nuestras ofensas
  - nuestras faltas
  lexicon: BDAG
  rationale: ἁμαρτίας significa literalmente «pecados». «Nuestros pecados» conserva el sentido lexical básico y la relación con la primera cláusula, sin sustituirlo por una tradición litúrgica menos precisa.
- source_word: καὶ γὰρ αὐτοὶ
  english_pob_choice: for we ourselves also
  chosen_spanish: porque nosotros mismos también
  alternatives_spanish:
  - pues nosotros mismos también
  - porque también nosotros
  lexicon: BDAG
  rationale: La combinación introduce la base de la petición y αὐτοὶ es enfático. «Nosotros mismos también» preserva ese énfasis y el valor explicativo de καὶ γάρ con una construcción natural en español.
- source_word: ἀφίομεν
  english_pob_choice: forgive
  chosen_spanish: perdonamos
  alternatives_spanish:
  - liberamos
  - condonamos
  lexicon: BDAG
  rationale: Se mantiene el vínculo verbal con ἄφες mediante el mismo verbo en español. «Perdonamos» es el equivalente más claro y contextualmente adecuado; «condonamos» forzaría la metáfora económica de manera excesiva.
- source_word: παντὶ ὀφείλοντι ἡμῖν
  english_pob_choice: everyone indebted to us
  chosen_spanish: a todo el que nos debe
  alternatives_spanish:
  - a todo deudor nuestro
  - a cualquiera que esté en deuda con nosotros
  lexicon: BDAG
  rationale: ὀφείλοντι expresa deuda. «A todo el que nos debe» conserva la imagen de deuda de forma viva y idiomática en español, sin perder la distinción entre «pecados» y «deudas» que aparece en el griego.
- source_word: μὴ εἰσενέγκῃς ἡμᾶς εἰς πειρασμόν
  english_pob_choice: do not bring us into temptation
  chosen_spanish: no nos lleves a la tentación
  alternatives_spanish:
  - no nos introduzcas en la tentación
  - no nos conduzcas a la tentación
  lexicon: BDAG
  rationale: εἰσενέγκῃς significa literalmente «introducir/traer dentro». En español, «no nos lleves a la tentación» es idiomático y suficientemente cercano al movimiento implícito del griego; «llevar» evita una formulación torpe como «traer dentro».
- source_word: πειρασμόν
  english_pob_choice: temptation
  chosen_spanish: la tentación
  alternatives_spanish:
  - la prueba
  - el juicio
  lexicon: BDAG
  rationale: πειρασμός puede significar «tentación», «prueba» o «tribulación». Se conserva «tentación» en el texto principal por ser la lectura más conocida y probable aquí, dejando la alternativa semántica en nota.
theological_decisions:
- issue: Sentido de πειρασμόν en la petición final
  english_pob_reading: Do not bring us into temptation, while preserving the lexical alternative 'testing' in a note.
  chosen_spanish_reading: No nos lleves a la tentación, con la alternativa más amplia de 'prueba' preservada en nota.
  alternative_spanish_readings:
  - no nos lleves a la prueba
  - no nos lleves al tiempo de prueba
  rationale: El griego no resuelve la tensión teológica sobre la relación de Dios con la prueba/temptación; la traducción mantiene la formulación directa sin explicarla. La nota conserva el rango semántico más amplio para que el lector lo vea explícitamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la frase equivalente a καὶ γὰρ αὐτοὶ para hacerla más natural. En español, se refleja con «porque nosotros mismos también», manteniendo el énfasis de αὐτοὶ y la fuerza explicativa de καὶ γάρ. También se conservó la distinción entre «pecados» y «deuda» como en el griego, y se mantuvo la petición final sin suavizarla teológicamente.
  spanish_consistency_notes:
  - Se usa «perdónanos» para ἄφες y «perdonamos» para ἀφίομεν, preservando el vínculo verbal.
  - «Pecados» traduce ἁμαρτίας; «debe» traduce ὀφείλοντι para mantener la metáfora de deuda.
  - «Tentación» se mantiene en el texto principal; la nota abre la alternativa semántica de πειρασμός.
  - La puntuación separa las tres peticiones como en el griego, con una cláusula causal intermedia bien marcada.
