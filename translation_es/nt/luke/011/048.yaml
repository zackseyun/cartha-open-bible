translation:
  language: es
  text: Así que ustedes son testigos y aprueban los hechos de sus padres, porque ellos los mataron, pero ustedes edifican sus tumbas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, edifican las tumbas de los profetas, como se dice en el versículo anterior.
    reason: cross_reference
lexical_decisions:
- source_word: ἄρα
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: Expresa la conclusión inferida del contexto inmediato con un giro natural en español contemporáneo, sin volverlo excesivamente formal.
- source_word: μάρτυρές ἐστε
  english_pob_choice: you are witnesses
  chosen_spanish: ustedes son testigos
  alternatives_spanish:
  - ustedes dan testimonio
  - ustedes son testigos de ello
  lexicon: BDAG
  rationale: 'Mantiene la construcción predicativa literal y el valor acusatorio: no solo hablan, sino que quedan como testigos por su conducta.'
- source_word: συνευδοκεῖτε
  english_pob_choice: approve of
  chosen_spanish: aprueban
  alternatives_spanish:
  - consienten en
  - están de acuerdo con
  - toman placer en
  lexicon: BDAG
  rationale: «Aprueban» comunica bien la aceptación moral de lo que hicieron sus padres; conserva la fuerza ética sin sonar arcaico.
- source_word: τοῖς ἔργοις
  english_pob_choice: the deeds
  chosen_spanish: las obras
  alternatives_spanish:
  - las acciones
  - los hechos
  lexicon: BDAG
  rationale: En español «obras» es natural y puede abarcar actos concretos con carga moral. «Hechos» también sería posible, pero «obras» conserva mejor el eco verbal del texto.
- source_word: τῶν πατέρων ὑμῶν
  english_pob_choice: of your fathers
  chosen_spanish: de sus padres
  alternatives_spanish:
  - de sus antepasados
  lexicon: BDAG
  rationale: Retiene el parentesco generacional y la dureza retórica del original. «Padres» es más cercano al griego que «antepasados».
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce con claridad la base explicativa de la acusación en español actual.
- source_word: αὐτοὶ μὲν ἀπέκτειναν αὐτοὺς
  english_pob_choice: they killed them
  chosen_spanish: ellos sí los mataron
  alternatives_spanish:
  - ellos los mataron
  - ellos ciertamente los mataron
  lexicon: BDAG
  rationale: «Sí» ayuda a reflejar el contraste enfático de μέν/δέ y la fuerza de la afirmación. «Mataron» conserva el sentido directo de ἀπέκτειναν.
- source_word: ὑμεῖς δὲ
  english_pob_choice: but you
  chosen_spanish: pero ustedes
  alternatives_spanish:
  - y ustedes
  - mientras que ustedes
  lexicon: BDAG
  rationale: «Pero» preserva el contraste adversativo con el asesinato previo y marca la ironía de la continuación de la conducta.
- source_word: οἰκοδομεῖτε
  english_pob_choice: build
  chosen_spanish: edifican sus tumbas
  alternatives_spanish:
  - construyen
  - edifican
  lexicon: BDAG
  rationale: El verbo significa «edificar/construir», y el objeto implícito se toma del contexto inmediato (las tumbas de los profetas en el versículo anterior). Se explicita en la traducción para que el sentido completo sea legible en español, como en la revisión inglesa final.
theological_decisions:
- issue: Si conviene dejar implícito o explicitar el objeto de «edifican»
  english_pob_reading: 'The main English draft initially left the object implicit, but the latest revision made it explicit: ''their tombs.'''
  chosen_spanish_reading: «edifican sus tumbas»
  alternative_spanish_readings:
  - «edifican»
  - «edifican las tumbas de ellos»
  rationale: El español necesita el complemento para sonar natural y transparente; además, el contexto inmediato ya identifica las tumbas de los profetas. Explicitarlo no añade una interpretación nueva, sino que completa el sentido contextual que el griego presupone.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo reflejar el contraste enfático entre «ellos» y «ustedes»
  english_pob_reading: The English audit trail notes that μέν was not separately marked in the main clause, but the contrast is preserved with 'but you'.
  chosen_spanish_reading: «ellos sí... pero ustedes...»
  alternative_spanish_readings:
  - «ellos... pero ustedes...»
  - «ellos, por un lado... pero ustedes...»
  rationale: El español puede reproducir el matiz contrastivo con «sí» y «pero» sin sobrecargar la frase. Así se conserva la oposición entre los padres asesinos y la generación actual que continúa su obra.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió explícitamente 'their tombs' para completar οἰκοδομεῖτε a partir del contexto. El español adopta esa misma resolución contextual, manteniendo el contraste acusatorio y la referencia a los profetas del versículo precedente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; este versículo no contiene el nombre divino.
  - Se mantiene «ustedes» para el plural de segunda persona, en registro neutro latinoamericano.
  - «Padres» conserva la resonancia generacional del griego mejor que «antepasados» en este contexto polémico.
  - La nota al pie se ancla en «tumbas» para señalar el complemento contextual implícito.
