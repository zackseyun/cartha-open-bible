review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: inferencia (''Así que''), acusación de ser testigos, aprobación de las acciones de los padres, contraste entre ''ellos'' y ''ustedes'', y explicitación contextual del objeto de ''edifican''. Sin embargo, ''las obras'' suena menos preciso que ''los hechos'' o ''las acciones'' para ἔργοις en un contexto de culpa moral, y ''ellos sí los mataron'' introduce un énfasis algo más marcado de lo necesario para μέν, que ya queda suficientemente expresado por el contraste con ''pero ustedes''.'
  spanish_quality_summary: El español es claro y legible, pero puede pulirse para sonar más natural y más exacto. 'Aprueban las obras' resulta ligeramente extraño en contexto polémico; 'aprueban los hechos' es más idiomático. 'Como se declaró en el versículo anterior' en la nota suena algo rígido; 'como se dice en el versículo anterior' es más natural. El resto del registro y la sintaxis son adecuados para un español bíblico moderno y digno.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Padres' preserva bien πατέρων. 'Edifican' es aceptable para οἰκοδομεῖτε, aunque 'construyen' también sería posible; mantener 'edifican' es defendible por continuidad verbal. La explicitación de 'sus tumbas' concuerda con la revisión inglesa final y con la nota contextual.
  issues:
  - severity: medium
    issue: '''las obras'' para τοῖς ἔργοις es poco idiomático aquí'
    rationale: En este contexto acusatorio, 'obras' suena algo genérico o literario en español; 'hechos' o 'acciones' comunica mejor actos concretos moralmente cargados.
  - severity: low
    issue: '''ellos sí los mataron'' sobreexpresa el μέν'
    rationale: El contraste principal ya está dado por 'pero ustedes'. El 'sí' no es incorrecto, pero añade una fuerza enfática no necesaria y puede sonar algo pesado en español.
  - severity: low
    issue: Redacción de la nota al pie algo rígida
    rationale: '''Como se declaró en el versículo anterior'' es menos natural que ''como se dice en el versículo anterior'' en español contemporáneo.'
  revised_spanish_text: Así que ustedes son testigos y aprueban los hechos de sus padres, porque ellos los mataron, pero ustedes edifican sus tumbas[a].
  revised_footnotes:
  - marker: a
    text: Es decir, edifican las tumbas de los profetas, como se dice en el versículo anterior.
    reason: cross_reference
  revision_rationale: Se ajusta 'obras' a 'hechos' para reflejar mejor el sentido moral concreto de ἔργοις en español natural; se elimina 'sí' para no sobrecargar el contraste que ya expresa 'pero ustedes'; y se suaviza la nota al pie para una redacción más idiomática sin cambiar su contenido.
