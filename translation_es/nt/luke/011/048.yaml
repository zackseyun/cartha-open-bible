- from: Así que ustedes son testigos y aprueban las obras de sus padres, porque ellos sí los mataron, pero ustedes edifican sus tumbas[a].
  to: Así que ustedes son testigos y aprueban los hechos de sus padres, porque ellos los mataron, pero ustedes edifican sus tumbas[a].
  rationale: Se ajusta 'obras' a 'hechos' para reflejar mejor el sentido moral concreto de ἔργοις en español natural; se elimina 'sí' para no sobrecargar el contraste que ya expresa 'pero ustedes'; y se suaviza la nota al pie para una redacción más idiomática sin cambiar su contenido.
