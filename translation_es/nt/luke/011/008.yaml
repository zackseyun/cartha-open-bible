review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura concesiva/contrastiva del griego, la relación personal de φίλον αὐτοῦ y el cierre inclusivo de ὅσων χρῄζει. Sin embargo, en la primera cláusula 'aunque no se levante a darle nada' desplaza levemente la sintaxis del original, donde 'levantarse' modifica el acto de dar ('no le dará, levantándose...'), y la nota léxica no conserva la alternativa principal del POB inglés 'persistencia descarada/sin vergüenza'.
  spanish_quality_summary: El español es claro y natural, pero 'sin embargo' tras 'aunque' suena algo pesado y 'desvergüenza' sin apoyo puede inclinarse más a vicio moral estable que a insistencia socialmente desinhibida. Una pequeña revisión puede mantener la aspereza léxica y mejorar la fluidez.
  glossary_alignment: 'No hay conflictos con la terminología global del proyecto. La decisión sobre ἀναίδεια necesita alinearse mejor con la justificación documentada del POB inglés: conservar ''shameless'' pero explicitar el matiz contextual de insistencia/persistencia, idealmente en el texto o al menos en la nota.'
  issues:
  - severity: medium
    issue: La primera cláusula vincula 'levantarse' demasiado estrechamente a la negación.
    rationale: εἰ καὶ οὐ δώσει αὐτῷ ἀναστὰς significa 'aunque no le dé [nada] levantándose / aunque no se levante y le dé', no tanto 'aunque no se levante para darle nada' como unidad fija. La diferencia es menor, pero una redacción más cercana mejora la correspondencia con el original.
  - severity: medium
    issue: La traducción de ἀναίδεια como 'desvergüenza' necesita reflejar mejor el matiz contextual de persistencia.
    rationale: El POB inglés eligió 'shameless persistence' para no perder ni la aspereza léxica ni la insistencia contextual. En español, 'desvergüenza' sola puede sonar menos precisa. 'persistencia sin vergüenza' o similar comunica mejor el razonamiento documentado.
  - severity: low
    issue: La nota al pie no incluye la alternativa más cercana a la elección inglesa auditada.
    rationale: La nota ofrece 'atrevimiento' y 'descaro', pero no una formulación que recoja explícitamente la idea de persistencia insistente. Conviene ajustar la nota para reflejar la justificación léxica y teológica del expediente inglés.
  revised_spanish_text: 'Les digo[a]: aunque no se levante y le dé nada porque es su amigo, aun así, por su persistencia sin vergüenza, se levantará y le dará todo lo que necesite.'
  revised_footnotes:
  - marker: a
    text: O 'por su atrevimiento', 'por su descaro', o más literalmente 'por su desvergüenza'.
    reason: lexical_alternative
  revision_rationale: La revisión hace un ajuste menor para acercar la primera cláusula a la sintaxis griega y, sobre todo, expresa ἀναίδεια de un modo que preserve tanto la aspereza léxica ('sin vergüenza') como el matiz contextual de insistencia/persistencia documentado en el POB inglés. También mejora levemente la fluidez con 'aun así'.
