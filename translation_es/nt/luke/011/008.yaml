translation:
  language: es
  text: 'Les digo[a]: aunque no se levante y le dé nada porque es su amigo, aun así, por su persistencia sin vergüenza, se levantará y le dará todo lo que necesite.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por su atrevimiento', 'por su descaro', o más literalmente 'por su desvergüenza'.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: Les digo
  alternatives_spanish:
  - Les digo a ustedes
  - Les aseguro
  lexicon: λόγος/λέγω
  rationale: La fórmula introductoria de Jesús se vierte de manera natural en español con un presente directo. 'Les digo' conserva el valor de anuncio oral y la segunda persona plural implícita del griego sin volverla pesada.
- source_word: εἰ καὶ οὐ δώσει αὐτῷ
  english_pob_choice: even if he will not ... give him
  chosen_spanish: aunque no se levante a darle nada
  alternatives_spanish:
  - aunque no le dará
  - si bien no le dará nada
  lexicon: εἰ καί
  rationale: '''εἰ καί'' introduce una concesión; en español, ''aunque'' expresa bien esa fuerza. Se mantiene el futuro lógico del relato mediante la construcción narrativa, sin forzar un futuro que suene menos natural en español.'
- source_word: ἀναστὰς
  english_pob_choice: get up
  chosen_spanish: se levante
  alternatives_spanish:
  - se ponga de pie
  - se alce
  lexicon: ἀνίστημι
  rationale: En la escena doméstica, el participio indica levantarse físicamente. 'Se levante' es la forma más natural en español y conserva la acción corporal sin perder claridad.
- source_word: διὰ τὸ εἶναι φίλον αὐτοῦ
  english_pob_choice: because he is his friend
  chosen_spanish: porque es su amigo
  alternatives_spanish:
  - por ser su amigo
  - porque es amigo suyo
  lexicon: φίλος
  rationale: La construcción causal se traduce de forma directa. 'Su amigo' preserva la relación personal concreta, sin abstraerla en 'amistad'.
- source_word: διά γε τὴν ἀναίδειαν αὐτοῦ
  english_pob_choice: yet because of his shameless persistence
  chosen_spanish: sin embargo, por su desvergüenza
  alternatives_spanish:
  - pero por su desvergüenza
  - a causa de su descaro
  lexicon: ἀναίδεια
  rationale: '''ἀναίδεια'' tiene el peso de falta de pudor, descaro o desvergüenza. Se eligió ''desvergüenza'' para conservar la dureza léxica del término; el matiz de insistencia queda sugerido por el contexto y se explica en la nota.'
- source_word: ἐγερθεὶς
  english_pob_choice: he will get up
  chosen_spanish: se levantará
  alternatives_spanish:
  - se despertará y se levantará
  - se pondrá en pie
  lexicon: ἐγείρω
  rationale: El participio aoristo expresa la acción de ponerse en pie o alzarse de la cama para responder. 'Se levantará' funciona naturalmente en español y evita duplicar innecesariamente la idea ya dada por ἀναστὰς.
- source_word: δώσει αὐτῷ
  english_pob_choice: give him
  chosen_spanish: le dará
  alternatives_spanish:
  - se lo dará
  - le concederá
  lexicon: δίδωμι
  rationale: El dativo de destinatario se expresa de forma idiomática con 'le dará'. Mantiene la sencillez del griego y evita añadir precisiones no presentes en el texto.
- source_word: ὅσων χρῄζει
  english_pob_choice: whatever he needs
  chosen_spanish: todo lo que necesite
  alternatives_spanish:
  - cuanto necesite
  - lo que necesite
  lexicon: χρῄζω
  rationale: La construcción relativa con genitivo plural comunica la totalidad de lo requerido. 'Todo lo que necesite' conserva esa amplitud y suena natural en español.
theological_decisions:
- issue: Sentido de ἀναίδεια en la parábola
  english_pob_reading: The term refers to the petitioner's shameless persistence rather than a commendation of morally improper behavior.
  chosen_spanish_reading: El término se vierte como 'desvergüenza' y se entiende aquí como la falta de pudor persistente del que sigue pidiendo, no como aprobación de una conducta moralmente reprobable.
  alternative_spanish_readings:
  - descaro
  - insistencia sin pudor
  - atrevimiento
  rationale: La parábola contrasta motivos humanos y no elogia la grosería como virtud. El español 'desvergüenza' conserva la aspereza del término y deja abierta la tensión interpretativa que el contexto aclara.
  doctrine_reference: Conservar la tensión lexical y parabólica sin suavizarla; equivalencia óptima
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el análisis auditado en inglés; no se registran revisiones previas que alteren la traducción. Se preservó la tensión de ἀναίδεια sin resolverla en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'Les digo' para la fórmula de introducción directa.
  - Se usa 'amigo' en relación personal concreta, no 'amistad' abstracta.
  - Se conserva el valor fuerte de ἀναίδεια con 'desvergüenza' y se explica en nota.
  - '''Todo lo que necesite'' refleja la amplitud de ὅσων χρῄζει sin añadir contenido.'
  - La puntuación busca fluidez pública en español sin diluir la estructura concesiva del griego.
