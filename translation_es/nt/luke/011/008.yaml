revisions:
- from: 'Les digo[a]: aunque no se levante a darle nada porque es su amigo, sin embargo, por su desvergüenza se levantará y le dará todo lo que necesite.'
  to: 'Les digo[a]: aunque no se levante y le dé nada porque es su amigo, aun así, por su persistencia sin vergüenza, se levantará y le dará todo lo que necesite.'
  rationale: La revisión hace un ajuste menor para acercar la primera cláusula a la sintaxis griega y, sobre todo, expresa ἀναίδεια de un modo que preserve tanto la aspereza léxica ('sin vergüenza') como el matiz contextual de insistencia/persistencia documentado en el POB inglés. También mejora levemente la fluidez con 'aun así'.
