base_translation:
  language: en
  yaml_path: translation/nt/luke/011/046.yaml
  text: But he said[a], “Woe also to you lawyers, because you load people with burdens hard to bear[b], and you yourselves do not touch the burdens with one of your fingers.”
  footnotes:
  - marker: a
    text: Or 'experts in the law.' The Greek term refers to specialists in the Jewish law.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not lay a finger on the burdens.' The expression emphasizes that they make no effort to help with what they impose on others.
    reason: lexical_alternative
