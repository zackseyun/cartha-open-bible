revisions:
- from: 'Pero él dijo[a]: «¡Ay también de ustedes, expertos en la ley, porque cargan a los hombres con cargas difíciles de llevar[b], y ustedes mismos no tocan las cargas ni con uno de sus dedos!»'
  to: 'Pero él dijo: «¡Ay también de ustedes, letrados[a], porque cargan a la gente con cargas difíciles de llevar[b], y ustedes mismos no tocan las cargas ni con uno de sus dedos!»'
  rationale: 'La revisión corrige la principal desalineación con el audit trail: coloca una opción más concisa en el texto principal para νομικοῖς («letrados») y deja la explicación «expertos en la ley» en nota, donde realmente funciona como alternativa lexical. Además, sustituye «a los hombres» por «a la gente» para reflejar mejor el sentido genérico de ἀνθρώπους en español natural. Se elimina la nota sobre «dijo» porque no añade valor en este versículo.'
  reviewer_model: gpt-5.4
