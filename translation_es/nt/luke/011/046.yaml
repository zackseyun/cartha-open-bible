review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y la metáfora del griego: οὐαί como denuncia profética, φορτίζετε/φορτία como imagen de cargar cargas, δυσβάστακτα como cargas difíciles de llevar, y la cláusula final mantiene la imagen concreta de no tocar las cargas con un dedo. Sin embargo, se aparta innecesariamente del audit trail inglés al llevar νομικοῖς al texto principal como «expertos en la ley» en vez de reservar esa explicación para nota, y «a los hombres» reduce la genericidad de ἀνθρώπους, que aquí se refiere a la gente en general.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos mejoras importantes: «a los hombres» suena menos natural e inclusivo que «a la gente» o «a las personas» para ἀνθρώπους; y la nota a está mal planteada, porque repite la lectura principal en vez de ofrecer una alternativa real. También conviene simplificar «Pero él dijo[a]» a «Pero él dijo:» porque no hay una variante significativa que justifique nota en español.'
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La decisión clave es νομικοῖς: dado que el POB inglés escogió «lawyers» con nota explicativa, en español una correspondencia más fiel al tono conciso sería «letrados» en el texto con nota «expertos en la ley». Esto preserva la distinción entre texto principal y explicación lexical documentada. El resto («¡Ay!», «cargas», «difíciles de llevar», «no tocan») alinea bien con el audit trail.'
  issues:
