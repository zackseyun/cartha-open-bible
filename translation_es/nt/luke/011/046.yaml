    issue: νομικοῖς se traduce en el texto principal como «expertos en la ley»
    rationale: Aunque semánticamente correcto, el audit trail inglés eligió una forma más breve en el texto principal («lawyers») y dejó la explicación en nota. En español, «letrados» reproduce mejor esa concisión sin caer en «abogados» moderno.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real
    rationale: El texto principal ya dice «expertos en la ley», y la nota repite exactamente esa misma expresión. Esto incumple la función de una nota lexical alternativa.
  - severity: medium
    issue: ἀνθρώπους se vierte como «a los hombres»
    rationale: En este contexto el sentido es genérico, no masculino. «A la gente» o «a las personas» comunica mejor el valor inclusivo y natural del español actual.
  - severity: low
    issue: La nota [a] anclada en «dijo» es poco útil
    rationale: No hay una decisión textual o lexical relevante sobre εἶπεν que requiera nota en español; mantenerla solo arrastra mecánicamente la nota inglesa.
