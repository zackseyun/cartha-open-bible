  rationale: Se reemplaza «sea reclamada de esta generación» por «a esta generación se le pidan cuentas por la sangre...» para expresar de manera natural en español el valor judicial de ἐκζητηθῇ, sin perder el sentido de que esta generación es tenida responsable por la sangre derramada. La nota se ajusta a una alternativa igualmente judicial pero más idiomática en español. El resto del versículo se mantiene porque refleja bien el griego y el razonamiento del POB inglés.
