translation:
  language: es
  text: para que a esta generación se le pidan cuentas por la sangre de todos los profetas[a], derramada desde la fundación del mundo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se le demande cuenta a esta generación». El verbo lleva el sentido de llamar a cuentas por el derramamiento de sangre.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Marca la finalidad/resultadodel enunciado anterior con una construcción natural en español, sin perder el valor telico del griego.
- source_word: ἐκζητηθῇ
  english_pob_choice: may be required
  chosen_spanish: sea reclamada
  alternatives_spanish:
  - sea requerida
  - sea demandada
  - sea exigida
  lexicon: BDAG
  rationale: El verbo en pasiva tiene matiz judicial de rendición de cuentas por derramamiento de sangre. «Sea reclamada» conserva esa fuerza de exigencia legal y evita sonar demasiado técnico o mecánico en español.
- source_word: τὸ αἷμα
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre derramada
  lexicon: BDAG
  rationale: Se preserva la metáfora bíblica literal de «sangre», que en este contexto funciona metonímicamente para la sangre-guílta asociada con la muerte de los profetas.
- source_word: πάντων τῶν προφητῶν
  english_pob_choice: of all the prophets
  chosen_spanish: de todos los profetas
  alternatives_spanish:
  - de todos los profetas de Dios
  lexicon: BDAG
  rationale: La construcción genitiva es directa y totalizante; «todos los profetas» mantiene el alcance comprensivo del juicio.
- source_word: τὸ ἐκκεχυμένον
  english_pob_choice: shed
  chosen_spanish: derramada
  alternatives_spanish:
  - vertida
  - expulsada
  lexicon: BDAG
  rationale: «Derramada» es el equivalente idiomático de la sangre en contextos de muerte violenta y reproduce bien la imagen participial del griego.
- source_word: ἀπὸ καταβολῆς κόσμου
  english_pob_choice: from the foundation of the world
  chosen_spanish: desde la fundación del mundo
  alternatives_spanish:
  - desde la creación del mundo
  - desde que el mundo fue fundado
  lexicon: BDAG
  rationale: Se conserva la expresión bíblica estable con el mismo alcance temporal y la misma solemnidad.
- source_word: ἀπὸ τῆς γενεᾶς ταύτης
  english_pob_choice: of this generation
  chosen_spanish: de esta generación
  alternatives_spanish:
  - por esta generación
  - a manos de esta generación
  lexicon: BDAG
  rationale: La preposición en la pasiva marca la parte sobre la cual recae la rendición de cuentas. «De esta generación» sigue de cerca el griego y mantiene la relación de responsabilidad sin sobreespecificar el agente.
theological_decisions:
- issue: Sentido judicial de la pasiva ἐκζητηθῇ aplicada a la sangre de los profetas
  english_pob_reading: A statement of divine judicial accountability placed on 'this generation' for the accumulated bloodguilt of rejecting God's messengers.
  chosen_spanish_reading: Una afirmación de responsabilidad judicial divina que recae sobre «esta generación» por la sangre derramada de los profetas.
  alternative_spanish_readings:
  - Una simple referencia retórica a la continuidad histórica sin peso judicial fuerte
  - Una acusación exclusivamente moral sin idea de cuentas que rendir
  rationale: La pasiva en este contexto de sangre derramada comunica exigencia de cuentas o reclamación judicial. La traducción conserva esa tensión sin resolverla más allá de lo que el versículo dice.
  doctrine_reference: Preservar la tensión teológica en lugar de suavizarla.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del inglés («required of this generation») y mantiene la relación de responsabilidad indicada por la pasiva griega, evitando una formulación más libre como «a manos de».
  spanish_consistency_notes:
  - Se usa «sangre» y no una paráfrasis explicativa, para conservar el lenguaje bíblico directo.
  - «Fundación del mundo» mantiene la fórmula bíblica estable y la audiencia la reconoce con facilidad.
  - Se eligió «reclamada» para reflejar la fuerza judicial del verbo sin introducir una terminología ajena al registro bíblico en español.
