revisions:
- from: La reina del Sur se levantará en el juicio con los hombres de esta generación y los condenará[a], porque vino desde los confines de la tierra para oír la sabiduría de Salomón, y he aquí[b] algo mayor que Salomón está aquí.
  to: La reina del Sur se levantará en el juicio con los hombres de esta generación y los condenará[a], porque vino desde los confines de la tierra para oír la sabiduría de Salomón, y he aquí[b] algo mayor que Salomón está presente aquí.
  rationale: Se propone una revisión mínima únicamente para suavizar la repetición de 'aquí' al final del versículo. 'Está presente aquí' conserva el valor locativo de ὧδε y la solemnidad del enunciado, a la vez que mejora la fluidez del español. El resto del borrador está bien resuelto y no requiere cambios.
