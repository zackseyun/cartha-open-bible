translation:
  language: es
  text: La reina del Sur se levantará en el juicio con los hombres de esta generación y los condenará[a], porque vino desde los confines de la tierra para oír la sabiduría de Salomón, y he aquí[b] algo mayor que Salomón está presente aquí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la figura comúnmente identificada con la reina de Saba (véase 1 Reyes 10:1–13; 2 Crónicas 9:1–12).
    reason: cross_reference
  - marker: b
    text: O 'uno mayor que Salomón'. El griego tiene una expresión neutra, literalmente 'algo mayor que Salomón', lo que puede enfatizar más que una comparación directa entre personas.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασίλισσα νότου
  english_pob_choice: the queen of the South
  chosen_spanish: la reina del Sur
  alternatives_spanish:
  - la reina de Saba
  - la reina meridional
  lexicon: BDAG
  rationale: Conservo la construcción geográfica literal del griego, como en el audit trail en inglés, para no introducir en el texto principal la identificación con Saba; esa identificación se deja para nota.
- source_word: ἐγερθήσεται
  english_pob_choice: will rise up
  chosen_spanish: se levantará
  alternatives_spanish:
  - será levantada
  - se pondrá de pie
  lexicon: BDAG
  rationale: En este marco judicial, 'se levantará' comunica la aparición/comparecencia de forma natural en español y mantiene abierta la resonancia escatológica sin explicitar resurrección.
- source_word: ἐν τῇ κρίσει
  english_pob_choice: in the judgment
  chosen_spanish: en el juicio
  alternatives_spanish:
  - en el juicio final
  - ante el juicio
  lexicon: BDAG
  rationale: '''Juicio'' expresa de manera clara y sobria la referencia definida al acto judicial/escatológico sin añadir una paráfrasis más específica que el griego no exige.'
- source_word: μετὰ τῶν ἀνδρῶν
  english_pob_choice: with the men
  chosen_spanish: con los hombres
  alternatives_spanish:
  - con los varones
  - junto con los hombres
  lexicon: BDAG
  rationale: Mantengo el masculino explícito porque ἀνδρῶν es gramatical y léxicamente masculino; 'hombres' es el equivalente natural y fiel en español.
- source_word: τῆς γενεᾶς ταύτης
  english_pob_choice: of this generation
  chosen_spanish: de esta generación
  alternatives_spanish:
  - de esta época
  - de esta raza
  lexicon: BDAG
  rationale: '''Generación'' es el término estándar y preciso en el contexto sinóptico para los contemporáneos de Jesús.'
- source_word: κατακρινεῖ αὐτούς
  english_pob_choice: will condemn them
  chosen_spanish: los condenará
  alternatives_spanish:
  - los condenará en juicio
  - los sentenciará
  lexicon: BDAG
  rationale: '''Condenará'' conserva la fuerza de κατακρίνω y evita suavizarlo con un mero ''juzgará''.'
- source_word: ἐκ τῶν περάτων τῆς γῆς
  english_pob_choice: from the ends of the earth
  chosen_spanish: desde los confines de la tierra
  alternatives_spanish:
  - desde los extremos de la tierra
  - desde los rincones de la tierra
  lexicon: BDAG
  rationale: '''Confines de la tierra'' es una fórmula española digna y fiel para el idiomático ''ends of the earth'', preservando el alcance lejano sin localización excesiva.'
- source_word: ἀκοῦσαι
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  lexicon: BDAG
  rationale: '''Oír'' refleja bien el infinitivo de propósito y sigue de cerca el verbo griego, mientras que ''escuchar'' podría introducir una matización más activa.'
- source_word: τὴν σοφίαν Σολομῶνος
  english_pob_choice: the wisdom of Solomon
  chosen_spanish: la sabiduría de Salomón
  alternatives_spanish:
  - la sabiduría salomónica
  - la sabiduría que tenía Salomón
  lexicon: BDAG
  rationale: Sigo la relación nominal directa del griego; 'sabiduría de Salomón' conserva el foco en la sabiduría como objeto buscado.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - obsérvese
  lexicon: BDAG
  rationale: '''He aquí'' mantiene la función discursiva solemne y de realce retórico que el audit trail inglés preserva con ''behold''.'
- source_word: πλεῖον Σολομῶνος
  english_pob_choice: something greater than Solomon
  chosen_spanish: algo mayor que Salomón
  alternatives_spanish:
  - uno mayor que Salomón
  - algo más grande que Salomón
  lexicon: BDAG
  rationale: El neutro πλεῖον se vierte mejor con 'algo mayor', preservando la tensión del griego que no identifica de manera explícita 'uno' sino una realidad mayor que Salomón.
- source_word: ὧδε
  english_pob_choice: is here
  chosen_spanish: está aquí
  alternatives_spanish:
  - se halla aquí
  - aquí está
  lexicon: BDAG
  rationale: '''Está aquí'' es la forma más natural en español para una presencia inmediata y corresponde al adverbio locativo del griego.'
theological_decisions:
- issue: Identidad de la reina del Sur
  english_pob_reading: Kept the Greek expression 'the queen of the South' in the main text
  chosen_spanish_reading: Se mantiene 'la reina del Sur' en el texto principal
  alternative_spanish_readings:
  - la reina de Saba
  rationale: El texto griego nombra a la 'reina del Sur'; la identificación con Saba es probable por el trasfondo veterotestamentario, pero no se impone en el cuerpo principal para respetar la prioridad del original y dejar la alusión en nota.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition'
- issue: Forma de πλεῖον Σολομῶνος
  english_pob_reading: Rendered as 'something greater than Solomon'
  chosen_spanish_reading: '''algo mayor que Salomón'''
  alternative_spanish_readings:
  - '''uno mayor que Salomón'''
  - '''más que Salomón'''
  rationale: El griego usa un neutro, no un masculino; por eso la versión española conserva una formulación impersonal que no resuelve la referencia sólo a la persona de Jesús y deja abierta la amplitud del dicho.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
- issue: Alcance de ἐγερθήσεται en contexto judicial
  english_pob_reading: will rise up
  chosen_spanish_reading: se levantará
  alternative_spanish_readings:
  - será levantada
  - resucitará
  rationale: En este contexto puede sugerir comparecencia judicial y, por resonancia, resurrección; la versión española conserva esa tensión sin explicitar una sola lectura.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego SBLGNT y el registro crítico del POB en inglés. No se aplicaron revisiones tardías al contenido base; la elección española mantiene las tensiones documentadas: identificación implícita de la reina del Sur, el matiz neutro de πλεῖον y la ambigüedad de ἐγερθήσεται en un contexto de juicio.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' sólo cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Salomón'' se conserva como nombre propio estándar en español bíblico.'
  - '''Juicio'' y ''condenará'' mantienen el registro judicial del pasaje.'
  - La nota a explica la alusión histórica sin sustituir el texto principal.
  - La nota b preserva la alternativa neutra documentada por el audit trail inglés.
