review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: el fariseo ve, se sorprende, y la causa de su sorpresa es que Jesús no realizó primero un lavado ritual antes de comer. La decisión central de ἐβαπτίσθη como ''lavado'' y no ''bautizado'' es correcta y está bien sustentada por el contexto farisaico de pureza. Sin embargo, la forma verbal española ''no se hubiera lavado'' tras ''se asombró de que'' no es la opción más natural ni más precisa aquí; el indicativo pluscuamperfecto (''no se había lavado'') expresa mejor el hecho observado previo a la comida.'
  spanish_quality_summary: 'El texto es claro y comprensible, pero suena algo forzado por la secuencia ''se asombró de que no se hubiera lavado primero''. En español bíblico natural y moderno, ''se asombró de que no se había lavado primero antes de la comida'' sigue siendo menos idiomático que una reestructuración ligera: ''se asombró de que no se hubiera lavado antes de la comida'' o mejor ''se asombró de que no se había lavado antes de la comida''. También conviene evitar redundancia semántica excesiva entre ''primero'' y ''antes de''. La nota al pie es útil, aunque ''sometido primero al lavado ceremonial'' suena menos natural que ''realizado primero el lavado ceremonial'' o ''hecho primero la ablución ritual''.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Fariseo', 'comida' y la explicación de ἐβαπτίσθη como lavado ritual están alineadas con el rastro de auditoría inglés y con la política de evitar asociaciones bautismales indebidas. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: Uso de subjuntivo compuesto 'no se hubiera lavado' después de 'se asombró de que'
    rationale: Aunque posible en ciertos registros, aquí el griego describe un hecho observado, no una situación hipotética o dudosa. En español, el indicativo pluscuamperfecto o una reestructuración más directa comunica mejor la secuencia narrativa.
  - severity: low
    issue: Ligera redundancia entre 'primero' y 'antes de la comida'
    rationale: Ambos elementos son defendibles porque πρῶτον y πρὸ τοῦ ἀρίστου están en el griego, pero en español conviene ordenar la frase para que no suene pesada.
  - severity: low
    issue: 'Redacción de la nota: ''sometido primero al lavado ceremonial'''
    rationale: La formulación no es la más idiomática en español. 'Haberse hecho primero el lavado ceremonial' o 'haber realizado primero la ablución ritual' expresa la idea con más naturalidad.
  revised_spanish_text: Pero el fariseo, al verlo, se asombró de que no se había lavado primero antes de la comida.[a]
  revised_footnotes:
  - marker: a
    text: O ‘no se había hecho primero el lavado ceremonial antes de la comida’. El verbo griego es el mismo que a menudo se usa para ‘bautizar’, pero aquí se refiere a una ablución ritual en el contexto de la práctica de pureza farisea.
    reason: lexical_alternative
  revision_rationale: Se ajustó la forma verbal principal para reflejar mejor en español un hecho previo observado, no una posibilidad subjuntiva. Se conservó 'primero' por πρῶτον y 'antes de la comida' por πρὸ τοῦ ἀρίστου. También se suavizó la nota al pie para que suene más idiomática sin perder la explicación lexical sobre ἐβαπτίσθη.
