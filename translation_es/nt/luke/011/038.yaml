translation:
  language: es
  text: Pero el fariseo, al verlo, se asombró de que no se había lavado primero antes de la comida.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘no se había hecho primero el lavado ceremonial antes de la comida’. El verbo griego es el mismo que a menudo se usa para ‘bautizar’, pero aquí se refiere a una ablución ritual en el contexto de la práctica de pureza farisea.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Mantiene el matiz de contraste narrativo suave entre la escena anterior y la reacción del fariseo, con una conjunción natural en español.
- source_word: Φαρισαῖος
  english_pob_choice: the Pharisee
  chosen_spanish: el fariseo
  alternatives_spanish:
  - un fariseo
  lexicon: BDAG
  rationale: Conserva el artículo definido implícito en el contexto y nombra al grupo con el término usual en español.
- source_word: ἰδὼν
  english_pob_choice: seeing it
  chosen_spanish: al verlo
  alternatives_spanish:
  - viendo esto
  - habiéndolo visto
  lexicon: BDAG
  rationale: Reproduce el participio aoristo con valor circunstancial y anterioridad inmediata de forma idiomática en español.
- source_word: ἐθαύμασεν
  english_pob_choice: was astonished
  chosen_spanish: se asombró
  alternatives_spanish:
  - se maravilló
  - quedó asombrado
  lexicon: BDAG
  rationale: Expresa la reacción de sorpresa del fariseo sin sonar excesivamente literario ni suavizarla.
- source_word: οὐ πρῶτον
  english_pob_choice: had not first
  chosen_spanish: no se hubiera ... primero
  alternatives_spanish:
  - no se había ... primero
  - no se lavó primero
  lexicon: BDAG
  rationale: En español, la negación con pluscuamperfecto/subjuntivo compuesto comunica mejor la expectativa previa al acto de comer; 'primero' conserva el valor de πρῶτον.
- source_word: ἐβαπτίσθη
  english_pob_choice: washed
  chosen_spanish: se hubiera lavado
  alternatives_spanish:
  - se hubiera purificado
  - se hubiera hecho la ablución
  lexicon: BDAG
  rationale: Sigue la decisión inglesa de referir el verbo a un lavado ritual, no al bautismo cristiano. 'Lavarse' es claro y no introduce un tecnicismo innecesario.
- source_word: πρὸ τοῦ ἀρίστου
  english_pob_choice: before the meal
  chosen_spanish: antes de la comida
  alternatives_spanish:
  - antes del almuerzo
  - antes de la comida principal
  lexicon: BDAG
  rationale: ἄριστον designa una comida, a menudo de mediodía; 'la comida' mantiene la referencia sin especificar más de lo que el contexto exige.
theological_decisions:
- issue: Sentido de ἐβαπτίσθη en un contexto de pureza farisaica
  english_pob_reading: ritual washing before eating, rendered 'washed'
  chosen_spanish_reading: lavado ritual antes de comer, no bautismo sacramental
  alternative_spanish_readings:
  - bautizado
  - sumergido
  rationale: El contexto inmediato trata de prácticas de pureza antes de la mesa. Traducirlo como 'lavado' evita trasladar al pasaje asociaciones cristianas posteriores que el griego aquí no exige.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it only where genuine ambiguity exists.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió una participialidad más directa para ἰδών y mantuvo 'washed before the meal' como solución contextual. La versión española refleja esa misma decisión exegética con un español natural y auditable.
  spanish_consistency_notes:
  - Se mantuvo 'fariseo' como designación grupal estándar.
  - Se evitó 'bautizado' en el texto principal para no borrar la tensión léxica documentada en ἐβαπτίσθη.
  - '''Antes de la comida'' conserva la generalidad de ἀρίστου sin sobreespecificar la hora.'
  - La nota a pie preserva la alternativa ceremonial que el audit trail inglés documenta.
