translation:
  language: es
  text: El que no está conmigo está contra mí[a], y el que no reúne junto conmigo dispersa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quien no está conmigo está contra mí, y quien no reúne junto conmigo dispersa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μὴ ὢν
  english_pob_choice: the one who is not
  chosen_spanish: el que no está
  alternatives_spanish:
  - quien no está
  - el que no se encuentra
  lexicon: BDAG
  rationale: La construcción griega con artículo y participio funciona de manera sustantiva y general. «El que no está» mantiene la fuerza singular genérica sin volver la frase artificial en español.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo
  - junto conmigo
  lexicon: BDAG
  rationale: μετά con genitivo expresa asociación o acompañamiento. «Conmigo» es la equivalencia natural y clara en español.
- source_word: κατ’ ἐμοῦ
  english_pob_choice: against me
  chosen_spanish: está contra mí
  alternatives_spanish:
  - se opone a mí
  - está en contra de mí
  lexicon: BDAG
  rationale: κατά con genitivo expresa oposición. «Está contra mí» conserva la antítesis directa con «conmigo» y refleja bien el valor oposicional del griego.
- source_word: συνάγων
  english_pob_choice: gather
  chosen_spanish: reúne
  alternatives_spanish:
  - junta
  - recoge
  lexicon: BDAG
  rationale: El verbo significa reunir o juntar. En español, «reúne» comunica de forma natural la acción de convocar o agrupar, manteniendo el contraste con «dispersa».
- source_word: σκορπίζει
  english_pob_choice: scatters
  chosen_spanish: dispersa
  alternatives_spanish:
  - esparce
  - desparrama
  lexicon: BDAG
  rationale: σκορπίζω significa dispersar o esparcir. «Dispersa» es un equivalente sobrio y fiel, y conserva el paralelismo con «reúne».
theological_decisions:
- issue: Fuerza absoluta de la afirmación sobre la relación con Jesús
  english_pob_reading: A person not aligned with Jesus is presented as being in opposition to him; the translation preserves the stark binary without softening it.
  chosen_spanish_reading: 'La traducción conserva la oposición tajante: quien no está con Jesús está contra él, y no se suaviza a una mera falta de apoyo.'
  alternative_spanish_readings:
  - quien no apoya a Jesús
  - quien no actúa a favor de Jesús
  rationale: El griego presenta una dicotomía directa y absoluta. En español, «está contra mí» mantiene ese carácter sin atenuarlo ni convertirlo en una simple neutralidad.
  doctrine_reference: Conservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ninguna revisión aplicada; por eso la redacción sigue de cerca la estructura del griego y la decisión inglesa de preservar el paralelismo y la fuerza absoluta del dicho.
  spanish_consistency_notes:
  - Se usa «conmigo» para μετ’ ἐμοῦ y «contra mí» para κατ’ ἐμοῦ, manteniendo la antítesis básica del texto.
  - Se eligió «reúne» / «dispersa» para conservar el contraste verbal del segundo hemistiquio.
  - No se introdujo terminología eclesiástica ajena al pasaje; la frase queda en registro bíblico claro y contemporáneo.
