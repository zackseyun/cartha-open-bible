translation:
  language: es
  text: Cuando el hombre fuerte, completamente armado, guarda su propio patio interior[a], sus posesiones están seguras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su propio palacio» o «su propio dominio»; el término griego puede referirse a un patio o al recinto o residencia al que pertenece.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «están en paz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἰσχυρός
  english_pob_choice: the strong man
  chosen_spanish: el hombre fuerte
  alternatives_spanish:
  - el fuerte
  - el hombre poderoso
  lexicon: BDAG
  rationale: El artículo y el adjetivo funcionan sustantivadamente; en español, «el hombre fuerte» preserva la referencia a una persona masculina fuerte y suena natural sin agregar contenido ajeno.
- source_word: καθωπλισμένος
  english_pob_choice: fully armed
  chosen_spanish: bien armado
  alternatives_spanish:
  - completamente armado
  - plenamente armado
  lexicon: BDAG
  rationale: El participio perfecto expresa un estado resultante de estar equipado con armas. «Bien armado» comunica esa condición de preparación sin sonar pesado en español.
- source_word: φυλάσσῃ
  english_pob_choice: guards
  chosen_spanish: guarda
  alternatives_spanish:
  - vigila
  - custodia
  lexicon: BDAG
  rationale: El verbo indica acción continua de vigilancia/protección en la cláusula condicional. «Guarda» mantiene el sentido de vigilancia y protección de forma breve y natural.
- source_word: τὴν ἑαυτοῦ αὐλήν
  english_pob_choice: his own courtyard
  chosen_spanish: su propio patio
  alternatives_spanish:
  - su propio atrio
  - su propia casa
  - su propia residencia
  lexicon: BDAG
  rationale: αὐλή puede designar patio, atrio o el recinto/residencia asociado. «Patio» es la equivalencia más directa y flexible en español; «su propio» refleja ἑαυτοῦ y el énfasis posesivo.
- source_word: ἐν εἰρήνῃ
  english_pob_choice: are secure
  chosen_spanish: están seguras
  alternatives_spanish:
  - están en paz
  - gozan de seguridad
  - permanecen tranquilas
  lexicon: BDAG
  rationale: La expresión literalmente es «en paz», pero en este contexto describe la condición segura e indemne de las posesiones. «Están seguras» transmite el efecto idiomático sin borrar la base semántica de paz.
- source_word: τὰ ὑπάρχοντα αὐτοῦ
  english_pob_choice: his possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - sus bienes
  - lo que posee
  - sus propiedades
  lexicon: BDAG
  rationale: El participio sustantivado se refiere a lo que le pertenece. «Sus posesiones» es claro, amplio y mantiene el sentido de pertenencia material.
theological_decisions:
- issue: Sentido metafórico del «hombre fuerte»
  english_pob_reading: Translate the imagery straightforwardly without making the satanic referent explicit in the verse itself.
  chosen_spanish_reading: Traducir la imagen de manera directa, sin identificar explícitamente al referente satánico dentro del versículo.
  alternative_spanish_readings:
  - El hombre fuerte es Satanás
  - El maligno fuerte
  rationale: El versículo presenta la imagen; la identificación teológica se deriva del contexto inmediato, no de la forma verbal del verso. Conviene preservar la tensión interpretativa en vez de resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica y el carácter metafórico del dicho.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y toma en cuenta el ajuste del inglés auditado desde «are at peace» a «are secure», reflejándolo con una formulación española natural que conserva la idea de seguridad resultante de «en paz».
  spanish_consistency_notes:
  - Se mantuvo «hombre fuerte» para conservar el sustantivo masculino implícito del griego.
  - «Patio» se eligió como equivalente base de αὐλή, con nota para alternativas contextuales.
  - «Están seguras» traduce el efecto idiomático de ἐν εἰρήνῃ sin perder la nota literal en el pie.
  - No se explicitó el referente demoníaco en el cuerpo del texto, para respetar el uso metafórico del versículo.
