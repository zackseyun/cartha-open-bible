translation:
  language: es
  text: Pero den como limosna lo que está dentro[a], y he aquí, todo es limpio para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «den como limosna lo que tienen». La frase griega puede entenderse como referencia a lo que está dentro o a las posesiones que uno tiene a mano.'
    reason: alternative_reading
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Más bien
  lexicon: BDAG
  rationale: Introduce un giro correctivo frente a la crítica anterior sobre la limpieza exterior. «Pero» conserva la fuerza adversativa con naturalidad en español contemporáneo.
- source_word: τὰ ἐνόντα
  english_pob_choice: the things that are within
  chosen_spanish: lo que tienen dentro
  alternatives_spanish:
  - las cosas que están dentro
  - lo interior
  - lo que está dentro
  - lo que poseen
  lexicon: BDAG
  rationale: La frase griega es la tensión principal del versículo. En el contexto inmediato, el contraste interior/exterior favorece una lectura interna, pero la expresión también puede entenderse como «lo que tienen» o poseen a mano. «Lo que tienen dentro» mantiene ambas posibilidades en una forma natural para el español y deja abierta la ambigüedad documentada.
- source_word: δότε
  english_pob_choice: give
  chosen_spanish: den
  alternatives_spanish:
  - den ustedes
  - entreguen
  - déjenlo
  lexicon: BDAG
  rationale: Imperativo aoristo plural; «den» reproduce bien el llamado decisivo sin añadir matices no presentes en el griego.
- source_word: ἐλεημοσύνην
  english_pob_choice: as alms
  chosen_spanish: limosna
  alternatives_spanish:
  - como limosna
  - almosna
  - caridad
  lexicon: BDAG
  rationale: El sustantivo designa la dádiva caritativa. En español, «limosna» es el equivalente más directo y transparente; evita una perífrasis más pesada. El complemento «de lo que tienen dentro» conserva la sintaxis exigida por el griego.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: Marca atención o resultado enfático. «He aquí» es la correspondencia más estable para el registro bíblico y mantiene la solemnidad sin oscurecer el sentido.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo ello
  lexicon: BDAG
  rationale: El plural neutro funciona de manera comprehensiva; «todo» es idiomático en español y comunica la totalidad sin sobrecargar la frase.
- source_word: καθαρὰ
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - puro
  - limpio ritualmente
  - puro y limpio
  lexicon: BDAG
  rationale: En este contexto la limpieza se relaciona con pureza ritual y la cuestión de lavar recipientes. «Limpio» conserva la conexión inmediata con la discusión previa y suena natural en español.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: les
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: BDAG
  rationale: El dativo expresa referencia/beneficio. En español, «les será limpio» suena más natural que una frase explícita con «para ustedes» y mantiene la relación referencial del original.
theological_decisions:
- issue: 'τὰ ἐνόντα: lectura interior o posesiones disponibles'
  english_pob_reading: 'an inward moral sense: ''the things that are within'''
  chosen_spanish_reading: «lo que tienen dentro», con ambigüedad conservada
  alternative_spanish_readings:
  - «lo que poseen»
  - «las cosas que están dentro»
  rationale: El contexto inmediato del cap. 11 contrasta el interior y el exterior de la copa y el plato, así que una referencia interior tiene fuerte apoyo. A la vez, la tradición interpretativa conoce la lectura de bienes o recursos disponibles. La redacción española mantiene la tensión sin resolverla unilateralmente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: 'Resultado de pureza: relación entre limosna y limpieza'
  english_pob_reading: everything is clean for you
  chosen_spanish_reading: «todo les será limpio»
  alternative_spanish_readings:
  - «todo les quedará limpio»
  - «todo será limpio para ustedes»
  rationale: El griego presenta la limpieza como resultado o estado respecto de ellos. «Les será limpio» conserva la idea de referencia personal y el vínculo con el lenguaje de pureza del pasaje, sin convertirlo en una afirmación doctrinal más extensa de lo que el texto expresa.
  doctrine_reference: Luke 11:39–41; purity language in immediate context
translation_notes:
  revision_awareness: Se revisó el punto más debatido del versículo —τὰ ἐνόντα— para evitar una traducción excesivamente interpretativa. La redacción final conserva la ambigüedad documentada por el auditor inglés, pero en un español natural que sigue funcionando dentro del contraste limpio/sucio del contexto inmediato.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención POB general, pero no aplica en este versículo.
  - Se eligió «limosna» para ἐλεημοσύνην por ser el equivalente más directo y tradicionalmente inteligible en español.
  - Se evitó «caridad» por su mayor amplitud semántica y menor precisión en este contexto.
  - «He aquí» se conservó por su valor retórico y por alinearse con el tono bíblico sin perder claridad.
