review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura básica del griego y conserva la lectura principal interior de τὰ ἐνόντα, además de mantener en nota la alternativa «lo que tienen». Sin embargo, «lo que tienen dentro» introduce en español una ambigüedad distinta y menos natural, porque puede sugerir algo que llevan dentro de sí mismos en sentido posesivo más que «las cosas de adentro / lo interior». Además, «todo les será limpio» desplaza innecesariamente ἐστιν («es») a futuro («será»).
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere un ajuste para sonar más natural y más preciso al griego. «Den limosna de lo que está dentro» comunica mejor el contraste interior/exterior del contexto inmediato. «Y entonces» o «y miren» sería posible para ἰδοὺ, pero «he aquí» es aceptable en registro bíblico. «Todo les es limpio» es demasiado rígido; «todo queda limpio para ustedes» o «todo es limpio para ustedes» suena mejor. Para cercanía al POB y claridad, conviene «todo es limpio para ustedes».
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Limosna» corresponde bien a ἐλεημοσύνην. La decisión clave es τὰ ἐνόντα: debe conservar el sentido interior principal con nota para «lo que tienen».'
  issues:
  - severity: medium
    issue: «lo que tienen dentro» no refleja con precisión natural τὰ ἐνόντα
    rationale: El griego apunta principalmente a «las cosas que están dentro / lo interior» en contraste con el exterior del vaso en el contexto inmediato. La forma española elegida sugiere más fácilmente «algo que ustedes tienen dentro» y no reproduce bien la expresión fuente ni la tensión retórica.
  - severity: medium
    issue: «todo les será limpio» cambia el tiempo de ἐστιν
    rationale: El verbo griego está en presente («es»), no en futuro. Aunque el español puede usar futuro con matiz resultativo, aquí no es necesario y se aleja de la forma y sentido básicos del original y del English POB («is clean for you»).
  - severity: low
    issue: La nota al pie puede simplificarse para alinearse mejor con la audit trail inglesa
    rationale: La nota inglesa contrasta «lo que está dentro» con «lo que tienen». La glosa «es decir, lo que poseen a mano» es válida, pero conviene mantener la formulación más directa y menos interpretativa.
  revised_spanish_text: Pero den como limosna lo que está dentro[a], y he aquí, todo es limpio para ustedes.
  revised_footnotes:
  - marker: a
    text: 'O: «den como limosna lo que tienen». La frase griega puede entenderse como referencia a lo que está dentro o a las posesiones que uno tiene a mano.'
    reason: alternative_reading
  revision_rationale: Se ajusta τὰ ἐνόντα a una expresión española más natural y más fiel al contraste interior/exterior del contexto, se conserva en nota la alternativa tradicional «lo que tienen», y se corrige el presente ἐστιν evitando el futuro «será». También se explicita «como limosna» para reflejar mejor la sintaxis de ἐλεημοσύνην según la audit trail inglesa.
