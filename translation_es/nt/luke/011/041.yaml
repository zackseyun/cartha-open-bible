- from: Pero den limosna de lo que tienen dentro[a], y he aquí, todo les será limpio.
  to: Pero den como limosna lo que está dentro[a], y he aquí, todo es limpio para ustedes.
  rationale: Se ajusta τὰ ἐνόντα a una expresión española más natural y más fiel al contraste interior/exterior del contexto, se conserva en nota la alternativa tradicional «lo que tienen», y se corrige el presente ἐστιν evitando el futuro «será». También se explicita «como limosna» para reflejar mejor la sintaxis de ἐλεημοσύνην según la audit trail inglesa.
