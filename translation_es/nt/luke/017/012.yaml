review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: el genitivo absoluto se refleja con acción simultánea en curso, κώμην se traduce adecuadamente como «aldea», ἀπήντησαν conserva la idea de encuentro, y πόρρωθεν mantiene la separación espacial. Sin embargo, «quienes se quedaron a distancia» debilita οἳ ἔστησαν πόρρωθεν, que expresa más directamente «se pararon/estuvieron de pie a cierta distancia» que una permanencia resultativa. También «le salieron al encuentro» es posible, pero «se encontraron con él» o «le salieron al encuentro» puede sonar más dinámico que el simple «lo encontraron/metieron»; no es error grave, pero el conjunto puede ajustarse más al POB inglés.'
  spanish_quality_summary: El español es claro y digno, pero «una cierta aldea» suena algo calcado en español bíblico actual; «cierta aldea» o «una aldea» sería más natural. Además, «quienes se quedaron a distancia» resulta menos fiel y menos vívido que «que se quedaron lejos» o mejor «que se detuvieron a cierta distancia / que estaban a cierta distancia». Conviene simplificar la sintaxis para una lectura más natural y cercana al original.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hombres leprosos» concuerda con la decisión léxica documentada de preservar la forma adjetival de λεπροί. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: «una cierta aldea» suena poco natural en español
    rationale: Aunque refleja τινα, en español la colocación más idiomática es «cierta aldea». «Una cierta aldea» se percibe como calco del inglés y reduce la fluidez sin ganar precisión.
  - severity: medium
    issue: «quienes se quedaron a distancia» no refleja bien ἔστησαν
    rationale: ἔστησαν significa «se pararon / estuvieron de pie / se detuvieron», no primariamente «se quedaron». La forma actual difumina la imagen espacial y corporal del texto griego.
  - severity: low
    issue: La nota b incluye «far off» en inglés
    rationale: La nota al pie en español debería explicar alternativas en español, no mezclar una glosa inglesa innecesaria.
  revised_spanish_text: Y mientras él entraba en cierta aldea[a], le salieron al encuentro diez hombres leprosos, que se detuvieron a distancia[b].
