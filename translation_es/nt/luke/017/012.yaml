    reason: lexical_alternative
  revision_rationale: Se ajusta «una cierta aldea» a «cierta aldea» para un español más natural sin perder el matiz indefinido de τινα. Se cambia «quienes se quedaron a distancia» por «que se detuvieron a distancia» para reflejar mejor ἔστησαν y mantener la escena concreta del original. También se limpia la nota b para que use solo alternativas pertinentes en español.
