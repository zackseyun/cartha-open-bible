translation:
  language: es
  text: Y mientras él entraba en cierta aldea[a], le salieron al encuentro diez hombres leprosos, que se detuvieron a distancia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una aldea»; el griego usa un indefinido (τινα) que señala una aldea no identificada, sin nombrarla específicamente.
    reason: lexical_alternative
  - marker: b
    text: O «de lejos» o «lejos». El adverbio griego indica separación espacial; también puede expresarse como «a cierta distancia».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσερχομένου αὐτοῦ
  english_pob_choice: as he was entering
  chosen_spanish: y mientras él entraba
  alternatives_spanish:
  - cuando entraba
  - al entrar
  lexicon: BDAG
  rationale: El genitivo absoluto con participio presente expresa acción en curso simultánea; «mientras él entraba» conserva ese valor progresivo mejor que una forma más puntual.
- source_word: εἴς τινα κώμην
  english_pob_choice: a certain village
  chosen_spanish: en una cierta aldea
  alternatives_spanish:
  - en una aldea
  - en alguna aldea
  lexicon: BDAG
  rationale: τινα es indefinido pero no vacío; «una cierta aldea» refleja la indefinición específica del griego y suena natural en español. Se eligió «aldea» por la común equivalencia bíblica de κώμη, sin forzar un matiz mayor que el texto no exige.
- source_word: ἀπήντησαν
  english_pob_choice: met
  chosen_spanish: le salieron al encuentro
  alternatives_spanish:
  - lo encontraron
  - se encontraron con él
  lexicon: BDAG
  rationale: ἀπαντάω puede significar «encontrar» o «salir al encuentro». En este contexto, «le salieron al encuentro» comunica mejor el matiz de movimiento implícito sin perder naturalidad en español.
- source_word: δέκα λεπροὶ ἄνδρες
  english_pob_choice: ten leprous men
  chosen_spanish: diez hombres leprosos
  alternatives_spanish:
  - diez hombres con lepra
  - diez hombres que eran leprosos
  lexicon: BDAG
  rationale: Se conserva la descripción adjetival del griego («leprosos») en vez de sustituirla por una formulación más clínica o person-first. «Hombres leprosos» mantiene la fuerza lexical y la forma del texto fuente.
- source_word: οἳ ἔστησαν
  english_pob_choice: who stood
  chosen_spanish: quienes se quedaron
  alternatives_spanish:
  - quienes se detuvieron
  - quienes estuvieron
  lexicon: BDAG
  rationale: Aquí ἔστησαν puede expresar simplemente que permanecieron o se plantaron en un lugar; en combinación con πόρρωθεν, «se quedaron» resulta idiomático y comunica la postura sin imponer más interpretación de la necesaria.
- source_word: πόρρωθεν
  english_pob_choice: at a distance
  chosen_spanish: a distancia
  alternatives_spanish:
  - lejos
  - de lejos
  lexicon: BDAG
  rationale: «A distancia» traduce de manera clara y sobria la separación espacial indicada por πόρρωθεν. Evita el tono más tradicional de «de lejos» o «far off», aunque esas alternativas siguen siendo válidas.
theological_decisions:
- issue: Designación de los enfermos como λεπροί
  english_pob_reading: leprous men
  chosen_spanish_reading: hombres leprosos
  alternative_spanish_readings:
  - hombres con lepra
  - hombres que eran leprosos
  rationale: No se neutraliza la categoría descriptiva del griego ni se moderniza a un diagnóstico clínico más preciso de lo que el texto dice. «Hombres leprosos» preserva la designación antigua y la tensión lexical del original.
  doctrine_reference: Principio de primacía del texto original y de no sobreespecificar el referente histórico
- issue: Valor aspectual de la entrada de Jesús
  english_pob_reading: as he was entering
  chosen_spanish_reading: y mientras él entraba
  alternative_spanish_readings:
  - cuando entraba
  - al entrar
  rationale: La escena presenta acción simultánea y en progreso; la traducción evita volverla excesivamente puntual. No hay decisión doctrinal, pero sí una preferencia sintáctica que protege la relación temporal del relato.
  doctrine_reference: Principio de equivalencia óptima y respeto por el aspecto verbal del original
translation_notes:
  revision_awareness: Se tomó en cuenta que el audit trail inglés mantuvo una traducción óptima-equivalente sin revisiones posteriores. La versión española sigue esa misma línea, conservando la simultaneidad del participio, el indefinido de τινα, la fuerza adjetival de λεπροί y la indicación espacial de πόρρωθεν.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se eligió «leprosos» en forma adjetival para conservar la estructura del griego, coherente con el criterio POB documentado.
  - «A cierta aldea» se armoniza con el registro bíblico moderno sin caer en calco inglés.
  - Las notas usan marcadores únicos y están ancladas exactamente en los términos que generan la alternativa traducible.
