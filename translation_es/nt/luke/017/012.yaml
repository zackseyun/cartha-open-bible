revisions:
- from: Y mientras él entraba en una cierta aldea[a], le salieron al encuentro diez hombres leprosos, quienes se quedaron a distancia[b].
  to: Y mientras él entraba en cierta aldea[a], le salieron al encuentro diez hombres leprosos, que se detuvieron a distancia[b].
  rationale: Se ajusta «una cierta aldea» a «cierta aldea» para un español más natural sin perder el matiz indefinido de τινα. Se cambia «quienes se quedaron a distancia» por «que se detuvieron a distancia» para reflejar mejor ἔστησαν y mantener la escena concreta del original. También se limpia la nota b para que use solo alternativas pertinentes en español.
