    text: This verse is absent from the earliest Greek manuscripts (including the 4th-century Sinaiticus and Vaticanus) and early Coptic translations, but is present in the Western tradition (such as the 5th-century Codex Bezae), the Byzantine majority tradition, and the Latin Vulgate. It was likely added by later scribes to harmonize with Matthew 24:40.
