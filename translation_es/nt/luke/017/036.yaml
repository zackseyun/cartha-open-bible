translation:
  language: es
  text: Dos hombres[a] estarán en el campo; uno será tomado, y el otro será dejado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo está ausente en los manuscritos griegos más antiguos (incluidos el Sinaítico y el Vaticano, del siglo IV) y en antiguas traducciones coptas, pero está presente en la tradición occidental (como el Códice Beza del siglo V), en la tradición mayoritaria bizantina y en la Vulgata latina. Probablemente fue añadido por escribas posteriores para armonizar con Mateo 24:40.
    reason: textual_critical
lexical_decisions:
- source_word: Δύο
  english_pob_choice: Two
  chosen_spanish: Dos
  alternatives_spanish:
  - Dos hombres
  - Dos personas
  lexicon: no-entry-required
  rationale: El griego introduce simplemente la cantidad; en español hace falta un sustantivo implícito para una frase natural. Como el contexto habla de sujetos humanos y el POB inglés explicita “men”, se conserva el sentido con una formulación breve y natural.
- source_word: παραληφθήσεται
  english_pob_choice: will be taken
  chosen_spanish: será tomado
  alternatives_spanish:
  - será recibido
  - será llevado junto
  lexicon: BDAG
  rationale: En este contexto escatológico la idea principal es que uno será tomado aparte; “será tomado” refleja bien la pasiva y la fuerza del contraste con el que queda.
- source_word: ἀφεθήσεται
  english_pob_choice: will be left
  chosen_spanish: será dejado
  alternatives_spanish:
  - será abandonado
  - será soltado
  lexicon: BDAG
  rationale: La oposición con παραληφθήσεται pide una forma breve y directa. “Será dejado” comunica la idea de permanecer atrás sin cargar más matiz del que el griego obliga.
- source_word: ὁ ἕτερος
  english_pob_choice: the other
  chosen_spanish: el otro
  alternatives_spanish:
  - el segundo
  - el diferente
  lexicon: BDAG
  rationale: Se refiere al segundo de los dos mencionados. “El otro” es la equivalencia más directa y natural en español.
theological_decisions:
- issue: 'Voz pasiva escatológica: tomado vs. dejado'
  english_pob_reading: one will be taken, and the other will be left
  chosen_spanish_reading: uno será tomado, y el otro será dejado
  alternative_spanish_readings:
  - uno será recibido, y el otro será dejado
  - uno será llevado, y el otro será dejado
  rationale: El texto no especifica por sí mismo el destino exacto de quien es “tomado”; por eso se evita ampliar con una interpretación más explícita de la que el griego y la tradición auditada justifican. La traducción mantiene la tensión interpretativa.
  doctrine_reference: Lectura textual y exegética de Lucas 17:36; paralelos con Mateo 24:40 sin fijar una interpretación doctrinal adicional.
- issue: Nota crítica textual ausente en el cuerpo del versículo
  english_pob_reading: This verse is absent from the earliest Greek manuscripts...
  chosen_spanish_reading: Nota textual en pie de página, no en el cuerpo del texto
  alternative_spanish_readings:
  - Incorporarla en el cuerpo del versículo
  - Omitir toda nota
  rationale: Siguiendo el POB inglés, la advertencia textual se conserva como nota crítica para transparencia, pero no se mezcla con el texto versicular para no confundir la lectura del versículo en sí.
  doctrine_reference: Crítica textual del Nuevo Testamento; tradición manuscrita de Lucas 17:36.
translation_notes:
  revision_awareness: Se siguió la lectura aprobada del POB inglés sin cambios de fondo; no hubo revisiones aplicadas en el pasaje de origen y el estado de acuerdo del control cruzado fue alto. La versión española preserva la advertencia crítica textual y evita introducir interpretaciones no sostenidas por el griego.
  spanish_consistency_notes:
  - Se mantuvo el contraste pasivo directo entre ‘será tomado’ y ‘será dejado’, como en el POB inglés.
  - Se usó ‘Dos’ sin añadir ‘hombres’ en el cuerpo para evitar sobrecargar el verso; la referencia humana queda clara por el contexto y por la nota inglesa de base.
  - Se conservaron puntuación y ritmo breves para reflejar la estructura del griego y del texto base inglés.
