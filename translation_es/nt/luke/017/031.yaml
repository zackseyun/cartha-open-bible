    unchanged: false
    changes_summary: Removed 'to the things behind' as an overly literal and unnatural rendering of εἰς τὰ ὀπίσω here; translated it naturally as 'turn back.'
translation:
  language: es
  text: Aquel día, el que esté en la azotea[b], con sus pertenencias en la casa, no baje a tomarlas; y asimismo, el que esté en el campo no vuelva atrás[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más fluidamente: ''no vuelva por lo que dejó atrás''.'
    reason: lexical_alternative
  - marker: b
    text: La 'azotea' se refiere al techo plano de una casa, que en ese contexto solía ser un espacio accesible y utilizable.
    reason: cultural_note
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: BDAG
  rationale: Conserva el énfasis demostrativo de ἐκείνῃ y la referencia temporal concreta; 'aquel día' es natural en español y no añade interpretación ajena.
- source_word: ὃς ἔσται
  english_pob_choice: whoever is
  chosen_spanish: el que esté
  alternatives_spanish:
  - quien esté
  - el que será
  lexicon: BDAG
  rationale: En español, la construcción con 'el que' comunica bien el valor generalizador del relativo; el subjuntivo 'esté' evita un futurismo torpe y mantiene la fuerza de situación general.
- source_word: ἐπὶ τοῦ δώματος
  english_pob_choice: on the housetop
  chosen_spanish: en la azotea
  alternatives_spanish:
  - en el techo
  - en la terraza
  lexicon: BDAG
  rationale: δώμα se refiere aquí al techo plano accesible de una casa; 'azotea' transmite mejor ese espacio habitable que 'techo', que en español puede sonar demasiado general.
- source_word: τὰ σκεύη αὐτοῦ
  english_pob_choice: his belongings
  chosen_spanish: sus pertenencias
  alternatives_spanish:
  - sus bienes
  - sus objetos
  lexicon: BDAG
  rationale: σκεύη puede abarcar enseres o pertenencias movibles; 'pertenencias' es natural y suficientemente amplio sin especificar más de lo que el contexto exige.
- source_word: μὴ καταβάτω
  english_pob_choice: must not go down
  chosen_spanish: no baje
  alternatives_spanish:
  - no debe bajar
  - no ha de bajar
  lexicon: BDAG
  rationale: El imperativo prohibitivo se expresa con una forma breve y directa en español. 'No baje' preserva la urgencia sin recargar el mandato.
- source_word: ἆραι αὐτά
  english_pob_choice: to take them away
  chosen_spanish: a tomarlas
  alternatives_spanish:
  - para llevárselas
  - para recogerlas
  lexicon: BDAG
  rationale: αἴρω aquí implica ir a recoger o retirar lo que quedó dentro; 'tomarlas' en este contexto es idiomático en español y mantiene la referencia a las pertenencias mencionadas.
- source_word: ὁ ἐν ἀγρῷ
  english_pob_choice: the one in the field
  chosen_spanish: el que esté en el campo
  alternatives_spanish:
  - el que está en el campo
  - quien esté en el campo
  lexicon: BDAG
  rationale: La frase sustantivada identifica a una persona representativa; 'el que esté en el campo' equilibra naturalidad y paralelismo con la primera cláusula.
- source_word: ὁμοίως
  english_pob_choice: likewise
  chosen_spanish: asimismo
  alternatives_spanish:
  - de igual manera
  - igualmente
  lexicon: BDAG
  rationale: '''Asimismo'' reproduce la conexión paralela entre las dos prohibiciones con un español sobrio y fluido.'
- source_word: μὴ ἐπιστρεψάτω
  english_pob_choice: must not turn back
  chosen_spanish: no vuelva atrás
  alternatives_spanish:
  - no se devuelva
  - no regrese
  lexicon: BDAG
  rationale: ἐπιστρέφω aquí expresa volver o retroceder; 'volver atrás' es la forma más natural y exacta para el contexto de huida urgente.
theological_decisions:
- issue: Urgencia escatológica concreta
  english_pob_reading: Retain the concrete commands about not descending or turning back rather than paraphrasing them into a general call to detachment.
  chosen_spanish_reading: Mantener las prohibiciones concretas sobre no bajar ni volver atrás, sin convertirlas en una exhortación generalizada a desprenderse de las posesiones.
  alternative_spanish_readings:
  - No aferrarse a los bienes materiales
  - No mirar atrás en sentido moral general
  rationale: La imagen es situacional y apremiante; conservarla evita ampliar indebidamente el alcance del texto y respeta la tensión escatológica del pasaje.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que eliminó una glosa demasiado literal de εἰς τὰ ὀπίσω y prefirió 'turn back'; por eso la traducción española usa 'no vuelva atrás' en lugar de una paráfrasis más explicativa. También se preservó la concreción de 'housetop' como espacio accesible de la casa, con 'azotea' como equivalente culturalmente adecuado.
  spanish_consistency_notes:
  - Se prefirió 'azotea' por ser el equivalente más natural del techo plano accesible implícito en δώμα.
  - '''Pertenencias'' mantiene la amplitud semántica de σκεύη sin forzar un matiz comercial o doméstico más estrecho.'
  - '''No baje'' y ''no vuelva atrás'' reproducen el tono prohibitivo breve del griego.'
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes; no hay vocabulario teológico conflictivo en este versículo.
