revisions:
- from: En aquel día[a], el que esté en la azotea, con sus pertenencias en la casa, no baje a tomarlas; y asimismo[b], el que esté en el campo, no vuelva atrás.
  to: Aquel día, el que esté en la azotea[b], con sus pertenencias en la casa, no baje a tomarlas; y asimismo, el que esté en el campo no vuelva atrás[a].
  rationale: 'Se ajustan las notas para que coincidan con el expediente inglés y con el segmento textual pertinente: la alternativa léxica se aplica a ''no vuelva atrás'' y la nota cultural se aplica a ''azotea''. Además, se mejora ligeramente la naturalidad de la apertura con ''Aquel día'' sin cambiar el sentido.'
