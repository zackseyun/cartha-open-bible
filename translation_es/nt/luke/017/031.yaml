source:
  edition: SBLGNT
  text: ἐν ἐκείνῃ τῇ ἡμέρᾳ ὃς ἔσται ἐπὶ τοῦ δώματος καὶ τὰ σκεύη αὐτοῦ ἐν τῇ οἰκίᾳ, μὴ καταβάτω ἆραι αὐτά, καὶ ὁ ⸀ἐν ἀγρῷ ὁμοίως μὴ ἐπιστρεψάτω εἰς τὰ ὀπίσω.
base_translation:
  language: en
  yaml_path: translation/nt/luke/017/031.yaml
  text: On that day[a], whoever is on the housetop, with his belongings in the house, must not go down to take them away; and likewise[b], the one in the field must not turn back.
  footnotes:
  - marker: a
    text: Or more smoothly, 'must not turn back for what was left behind.'
    reason: lexical_alternative
  - marker: b
    text: The 'housetop' refers to the flat roof of a house, which in that setting was commonly accessible and usable space.
    reason: cultural_note
