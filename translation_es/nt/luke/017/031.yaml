review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido principal del griego: la urgencia escatológica, la escena concreta de la azotea y el campo, y las dos prohibiciones paralelas. ''Azotea'', ''pertenencias'' y ''no vuelva atrás'' reflejan adecuadamente δώμα, σκεύη y μὴ ἐπιστρεψάτω. Sin embargo, las notas al pie no siguen fielmente el rastro auditado en inglés: la nota [a] fue trasladada a otro segmento y ya no corresponde a la alternativa inglesa sobre ''turn back'', mientras que la nota [b] reemplaza indebidamente la nota cultural sobre ''housetop'' por una explicación nueva no documentada.'
  spanish_quality_summary: El español es claro, natural y de tono digno. No obstante, 'En aquel día' suena menos idiomático que 'En ese día' o simplemente 'Aquel día' en este contexto, y la nota [a] anclada en 'día' resulta extraña porque no comenta esa frase. También conviene conservar la nota cultural en 'azotea' y mover la alternativa léxica a 'no vuelva atrás' para mantener coherencia y legibilidad editorial.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones clave son apropiadas: ἐπὶ τοῦ δώματος -> ''en la azotea'', τὰ σκεύη αὐτοῦ -> ''sus pertenencias'', μὴ καταβάτω -> ''no baje'', μὴ ἐπιστρεψάτω -> ''no vuelva atrás''. La revisión propuesta alinea las notas con el expediente POB sin alterar estas elecciones léxicas centrales.'
  issues:
  - severity: medium
    issue: Las notas al pie no corresponden al expediente inglés auditado.
    rationale: La nota inglesa [a] ofrece una alternativa para la idea de 'turn back', pero en el borrador español [a] está anclada en 'En aquel día' y comenta 'no baje a recogerlas', lo cual no corresponde. La nota inglesa [b] es una nota cultural sobre 'housetop', pero en español se sustituyó por una explicación nueva sobre 'volver atrás'.
  - severity: low
    issue: La colocación de los marcadores en el texto español es poco natural.
    rationale: Anclar [a] a 'En aquel día' no tiene relación semántica con el contenido de la nota. Las notas deben aparecer junto al segmento que comentan para evitar confusión editorial.
  - severity: low
    issue: '''En aquel día'' es aceptable, pero menos idiomático que una formulación más natural en español contemporáneo.'
    rationale: En español bíblico moderno y claro, 'Aquel día' o 'En ese día' suelen leerse con mayor naturalidad. Dado que el inglés POB usa 'On that day', 'Aquel día' preserva bien la fuerza temporal sin sonar forzado.
  revised_spanish_text: Aquel día, el que esté en la azotea[b], con sus pertenencias en la casa, no baje a tomarlas; y asimismo, el que esté en el campo no vuelva atrás[a].
  revised_footnotes:
  - marker: a
    text: 'O, más fluidamente: ''no vuelva por lo que dejó atrás''.'
    reason: lexical_alternative
  - marker: b
    text: La 'azotea' se refiere al techo plano de una casa, que en ese contexto solía ser un espacio accesible y utilizable.
    reason: cultural_note
  revision_rationale: 'Se ajustan las notas para que coincidan con el expediente inglés y con el segmento textual pertinente: la alternativa léxica se aplica a ''no vuelva atrás'' y la nota cultural se aplica a ''azotea''. Además, se mejora ligeramente la naturalidad de la apertura con ''Aquel día'' sin cambiar el sentido.'
