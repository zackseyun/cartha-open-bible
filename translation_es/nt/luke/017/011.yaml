- from: Y sucedió que[a], mientras iba a Jerusalén, él pasaba por en medio de Samaria y de Galilea.
  to: Y sucedió que[a], mientras iba a Jerusalén, pasaba por en medio de Samaria y de Galilea.
  rationale: Se mantiene la fidelidad al griego y al expediente POB, pero se corrige la nota para que exprese una alternativa auténtica y se mejora la naturalidad del español suprimiendo el pronombre explícito innecesario.
