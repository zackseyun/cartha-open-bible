translation:
  language: es
  text: Y sucedió que[a], mientras iba a Jerusalén, pasaba por en medio de Samaria y de Galilea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «iba entre Samaria y Galilea». La expresión griega puede entenderse como movimiento entre las dos regiones o a través de la zona fronteriza que las separa.'
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ ἐγένετο
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y ocurrió que
  lexicon: BDAG
  rationale: La fórmula narrativa lucana se reproduce con una construcción natural en español que conserva el valor de introducción de episodio sin sonar excesivamente arcaica.
- source_word: ἐν τῷ πορεύεσθαι
  english_pob_choice: as he was going
  chosen_spanish: mientras iba
  alternatives_spanish:
  - mientras estaba yendo
  - cuando iba
  lexicon: BDAG
  rationale: El infinitivo articular indica acción simultánea y en curso; 'mientras iba' expresa bien la temporalidad progresiva en español.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  lexicon: BDAG
  rationale: εἰς con destino se rinde de forma natural con 'a' en español, manteniendo la idea de movimiento hacia la ciudad.
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: El pronombre explícito puede conservarse de manera simple en español; no exige un énfasis adicional en este contexto.
- source_word: διήρχετο
  english_pob_choice: was passing through / was passing through the midst of
  chosen_spanish: pasaba
  alternatives_spanish:
  - iba pasando
  - atravesaba
  lexicon: BDAG
  rationale: El imperfecto señala acción continua; 'pasaba' es una forma sobria y natural que permite, con el complemento, reflejar el avance por la zona.
- source_word: διὰ μέσον
  english_pob_choice: through the midst of
  chosen_spanish: por en medio de
  alternatives_spanish:
  - a través de
  - en medio de
  lexicon: BDAG
  rationale: La expresión griega admite la idea de desplazamiento entre regiones o por la franja fronteriza que las separa. 'Por en medio de' preserva la ambigüedad documentada y suena idiomático en español.
- source_word: Σαμαρείας καὶ Γαλιλαίας
  english_pob_choice: Samaria and Galilee
  chosen_spanish: Samaria y de Galilea
  alternatives_spanish:
  - Samaria y Galilea
  lexicon: BDAG
  rationale: En español, tras 'en medio de' resulta más fluido repetir la preposición antes del segundo genitivo para señalar las dos regiones delimitadoras sin perder claridad.
theological_decisions:
- issue: Ambigüedad espacial de διὰ μέσον
  english_pob_reading: The Greek expression can be understood either as movement between the two regions or through the border area separating them.
  chosen_spanish_reading: La expresión griega puede entenderse como movimiento entre las dos regiones o a través de la zona fronteriza que las separa.
  alternative_spanish_readings:
  - movimiento entre Samaria y Galilea
  - pasando por la franja que separa Samaria de Galilea
  rationale: Se conserva la tensión interpretativa documentada por el texto fuente y por la nota inglesa, sin resolverla artificialmente en una sola dirección.
  doctrine_reference: No doctrinal issue; lexical/topographical ambiguity only.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde una formulación más general ('passing along between') a otra más cercana a διήρχετο διὰ μέσον ('passing through the midst of'). La redacción española sigue esa revisión y mantiene el registro formal sin perder naturalidad.
  spanish_consistency_notes:
  - Se usa 'Yahvé' cuando el texto lo requiera, pero este versículo no contiene el nombre divino.
  - Se conserva el valor imperfectivo de ἐγένετο/διήρχετο con formas narrativas naturales en español.
  - La nota mantiene la ambigüedad topográfica documentada en el auditor inglés y no la convierte en una certeza interpretativa.
