translation:
  language: es
  text: Será de la misma manera[a] el día en que el Hijo del Hombre sea revelado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Así será» o «igualmente». El giro griego remite a los ejemplos anteriores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ τὰ αὐτά
  english_pob_choice: It will be the same
  chosen_spanish: Así será
  alternatives_spanish:
  - Será de la misma manera
  - Será igual
  - De igual manera será
  lexicon: BDAG
  rationale: La expresión griega es idiomática y remite a los ejemplos anteriores; en español, «Así será» conserva la referencia anafórica y la orientación futura sin volverla pesada. Otras opciones como «de la misma manera» explicitan más el paralelismo, pero «así» es natural y fiel al valor comparativo.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  - va a ser
  lexicon: BDAG
  rationale: El futuro de εἰμί se refleja de forma directa con «será». Mantiene la simpleza temporal del griego y evita perífrasis menos sobrias.
- source_word: ᾗ ἡμέρᾳ
  english_pob_choice: on the day when
  chosen_spanish: el día en que
  alternatives_spanish:
  - en el día cuando
  - el día cuando
  lexicon: BDAG
  rationale: La construcción temporal relativa se expresa de modo natural en español con «el día en que». Conserva la especificidad temporal sin calco innecesario.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hombre
  lexicon: BDAG
  rationale: Se mantiene el título tradicional porque en los Evangelios funciona como designación estable de Jesús y conserva su resonancia intertextual con Daniel 7. «Hijo del Hombre» sigue siendo la forma más reconocible y fiel en español eclesial.
- source_word: ἀποκαλύπτεται
  english_pob_choice: is revealed
  chosen_spanish: sea revelado
  alternatives_spanish:
  - sea descubierto
  - sea manifestado
  - aparezca
  lexicon: BDAG
  rationale: El pasivo presente indica revelación o desvelamiento, no simplemente llegada. «Sea revelado» conserva el matiz de una manifestación pública y respeta el valor pasivo del verbo en el contexto escatológico.
theological_decisions:
- issue: Valor escatológico de la revelación del Hijo del Hombre
  english_pob_reading: the Son of Man is revealed
  chosen_spanish_reading: el Hijo del Hombre sea revelado
  alternative_spanish_readings:
  - el Hijo del Hombre aparezca
  - el Hijo del Hombre venga
  rationale: La traducción evita sustituir la revelación por una mera venida o aparición, porque el griego usa ἀποκαλύπτεται. En este pasaje el énfasis está en la manifestación pública y desvelada de Jesús como el Hijo del Hombre.
  doctrine_reference: Translation philosophy §1; §3; Daniel 7
- issue: Mantenimiento del título cristológico tradicional
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el ser humano
  - el Hombre
  rationale: Conservar el título protege la carga mesiánica y apocalíptica del texto, evitando una paráfrasis que debilitaría su conexión con el trasfondo bíblico y con el uso fijo en los Evangelios.
  doctrine_reference: Affirmations; Translation philosophy §2
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el último pase del texto fuente en inglés, que no introdujo cambios respecto de la revisión previa. Se conserva la misma decisión léxica y teológica básica: κατὰ τὰ αὐτά como referencia anafórica a los ejemplos anteriores, ἔσται como futuro simple, ᾗ ἡμέρᾳ como temporalidad específica, ὁ υἱὸς τοῦ ἀνθρώπου como título cristológico fijo y ἀποκαλύπτεται como revelación/desvelamiento, no mera llegada.'
  spanish_consistency_notes:
  - Se usa «Hijo del Hombre» con mayúsculas en coherencia con el tratamiento cristológico del título.
  - Se evita «Señor» o «Cristo» porque no corresponden al léxico del versículo.
  - El pasivo «sea revelado» conserva la voz y el peso escatológico del original.
  - La nota al pie se ancla en «Así será» para preservar la alternativa idiomática del giro griego.
