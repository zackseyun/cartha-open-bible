- from: 'Pero ¿quién de ustedes[a], teniendo un esclavo que ara o pastorea, le dirá, cuando vuelva del campo[b]: «Pasa enseguida y recuéstate»?'
  to: 'Pero ¿quién de ustedes[a], teniendo un esclavo que ara o pastorea, le dirá cuando vuelva del campo: «Pasa enseguida y recuéstate a la mesa[b]»?'
  rationale: Se añadió «a la mesa» para reflejar con fidelidad ἀνάπεσε y evitar ambigüedad en español. Se movió el marcador [b] a la frase que realmente explica la nota cultural. Se simplificó la nota [a] para mantener una alternativa natural sin debilitar innecesariamente la fuerza léxica principal de «esclavo».
