review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura retórica, el valor de δοῦλον como «esclavo», las labores de arar/pastorear, y la inmediatez de la orden. Sin embargo, no preserva plenamente el matiz de ἀνάπεσε como «recostarse a la mesa», porque «recuéstate» sin complemento en español sugiere acostarse más que tomar el lugar para comer. Además, la nota b está anclada al lugar equivocado: el marcador [b] aparece tras «campo», pero la nota explica «Pasa enseguida y recuéstate».'
  spanish_quality_summary: El español es legible y digno, pero «recuéstate» sin «a la mesa» suena poco natural y potencialmente confuso. «Vuelva del campo» funciona, aunque «entre del campo» sería más literal; no requiere cambio. La puntuación puede fluir mejor colocando la coma fuera del inciso temporal y manteniendo la cita sin dos puntos antes de la comilla si se reestructura mínimamente.
  glossary_alignment: Buen alineamiento con la política del proyecto en δοῦλος -> «esclavo». No hay términos teológicos conflictivos adicionales. La excepción necesaria es explicitar «a la mesa» para representar ἀνάπεσε conforme al razonamiento léxico auditado en inglés.
  issues:
  - severity: medium
    issue: «recuéstate» sin complemento no comunica bien el sentido de ἀνάπεσε
    rationale: El griego se refiere específicamente a recostarse para una comida. En español, «recuéstate» solo puede entenderse como acostarse físicamente. «recuéstate a la mesa» o equivalente preserva mejor el dato cultural y la claridad.
  - severity: medium
    issue: La nota [b] está anclada en «campo» pero comenta la frase final de la orden
    rationale: Las instrucciones exigen que el marcador aparezca en la palabra o frase pertinente. Aquí la nota cultural corresponde a «recuéstate a la mesa», no a «campo».
  - severity: low
    issue: La nota alternativa de δοῦλος usa «criado», que puede sonar demasiado doméstico o suavizado
    rationale: No es necesariamente incorrecto como alternativa española, pero se aleja del campo semántico fuerte que el audit trail intenta preservar. «siervo» y «esclavo por deuda»/«esclavo» serían más transparentes; aun así puede mantenerse una nota breve con «siervo» como alternativa principal.
  revised_spanish_text: 'Pero ¿quién de ustedes[a], teniendo un esclavo que ara o pastorea, le dirá cuando vuelva del campo: «Pasa enseguida y recuéstate a la mesa[b]»?'
