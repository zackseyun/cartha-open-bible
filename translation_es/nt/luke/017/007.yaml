translation:
  language: es
  text: 'Pero ¿quién de ustedes[a], teniendo un esclavo que ara o pastorea, le dirá cuando vuelva del campo: «Pasa enseguida y recuéstate a la mesa[b]»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo» para δοῦλος.
    reason: alternative_reading
  - marker: b
    text: '«Recuéstate a la mesa» refleja la costumbre antigua de recostarse para comer; de manera más libre: «siéntate a comer».'
    reason: cultural_note
lexical_decisions:
- source_word: δοῦλον
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  - siervo esclavo
  lexicon: BDAG
  rationale: El griego δοῦλος designa a una persona en condición de esclavitud o servidumbre ligada por dependencia. En esta parábola, la asimetría de autoridad entre el amo y el trabajador es parte del argumento; por eso “esclavo” conserva mejor la fuerza social del término que “siervo”, que en español suele suavizarlo.
- source_word: ἀροτριῶντα
  english_pob_choice: plowing
  chosen_spanish: que ara
  alternatives_spanish:
  - arando
  - que está arando
  - labrando
  lexicon: BDAG
  rationale: El participio indica la labor agrícola específica de arar. “Que ara” es natural en español y mantiene el valor verbal y la especificidad del trabajo.
- source_word: ποιμαίνοντα
  english_pob_choice: shepherding
  chosen_spanish: pastorea
  alternatives_spanish:
  - cuidando ovejas
  - apacentando
  - que pastorea
  lexicon: BDAG
  rationale: El verbo significa actuar como pastor o apacentar un rebaño. “Pastorea” preserva la imagen pastoral sin añadir detalle innecesario sobre el tipo de animal.
- source_word: εἰσελθόντι ἐκ τοῦ ἀγροῦ
  english_pob_choice: when he has come in from the field
  chosen_spanish: cuando vuelva del campo
  alternatives_spanish:
  - cuando haya entrado del campo
  - después de venir del campo
  - cuando entre del campo
  lexicon: BDAG
  rationale: La construcción temporal describe la llegada del esclavo desde el campo antes de la orden del amo. “Cuando vuelva del campo” expresa con naturalidad en español la acción completada previa al habla, sin perder el sentido temporal del griego.
- source_word: ἐρεῖ αὐτῷ
  english_pob_choice: will say to him
  chosen_spanish: le dirá
  alternatives_spanish:
  - le dirá a él
  - le hablará
  - le dirá esto
  lexicon: BDAG
  rationale: El futuro de λέγω se traduce de manera directa como “dirá”. En español, el clítico “le” ya marca el destinatario, por lo que la frase queda más fluida que un calco más literal.
- source_word: Εὐθέως
  english_pob_choice: at once
  chosen_spanish: enseguida
  alternatives_spanish:
  - al instante
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: El adverbio marca inmediatez. “Enseguida” es idiomático, claro y transmite la urgencia del mandato sin recargar el registro.
- source_word: παρελθὼν
  english_pob_choice: Come
  chosen_spanish: Pasa
  alternatives_spanish:
  - Acércate
  - Ven
  - Ven aquí
  lexicon: BDAG
  rationale: En esta secuencia idiomática con ἀνάπεσε, el participio funciona como movimiento previo al mandato de sentarse a la mesa. “Pasa” comunica el acercamiento de forma breve y natural en español.
- source_word: ἀνάπεσε
  english_pob_choice: recline at the table
  chosen_spanish: recuéstate
  alternatives_spanish:
  - recuéstate a la mesa
  - toma tu lugar para comer
  - siéntate a comer
  lexicon: BDAG
  rationale: El verbo alude al gesto antiguo de recostarse para comer. “Recuéstate” conserva el valor histórico del término; se evita añadir “a la mesa” en el texto principal para no sobrecargar el imperativo, aunque la imagen de comida de mesa queda implícita por el contexto.
theological_decisions:
- issue: Valor social y retórico de δοῦλος en la parábola
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: La enseñanza depende de una relación desigual de autoridad que no debe suavizarse. “Esclavo” preserva esa tensión y evita trasladar al texto una lectura devocional posterior que debilite el argumento de Jesús.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: Implicación cultural de ἀνάπεσε
  english_pob_reading: recline at the table
  chosen_spanish_reading: recuéstate
  alternative_spanish_readings:
  - siéntate a comer
  - recuéstate a la mesa
  rationale: El griego refleja la costumbre antigua de recostarse para comer. En español, “recuéstate” mantiene el dato cultural sin forzar una explicación intrusiva en el cuerpo del versículo; el contexto ya deja ver que se trata de una comida.
  doctrine_reference: BDAG; cultural note from English POB audit trail
translation_notes:
  revision_awareness: 'Coincide con el paso de revisión más reciente: no se identificaron cambios necesarios; el draft mantiene alta concordancia con el texto griego y con la lectura auditada en inglés.'
  spanish_consistency_notes:
  - Se mantiene “esclavo” para δοῦλος conforme al valor social central del pasaje.
  - Se conserva el verbo de inmediatez con “enseguida”, equivalente natural de εὐθέως.
  - La secuencia verbal en español busca naturalidad sin perder el movimiento implícito del participio griego.
  - No se introduce “SEÑOR” ni otros términos eclesiásticos ajenos al versículo.
  - El texto principal usa puntuación de diálogo en estilo bíblico moderno, con comillas angulares para la cita directa.
