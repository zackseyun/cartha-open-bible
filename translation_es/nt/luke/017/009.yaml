translation:
  language: es
  text: ¿Acaso le agradece al esclavo[a] porque hizo lo que se le había ordenado?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo» para «esclavo» (griego doulos).
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ἔχει χάριν
  english_pob_choice: Does he thank
  chosen_spanish: ¿No le da gracias?
  alternatives_spanish:
  - ¿Le agradece?
  - ¿Le muestra gratitud?
  lexicon: BDAG
  rationale: El giro griego ἔχειν χάριν significa agradecer o tener gratitud hacia alguien. En español, «dar gracias» comunica de forma natural la idea de agradecer y preserva el valor relacional del verbo sin forzar una perífrasis más pesada.
- source_word: δούλῳ
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: El contexto de la parábola presenta una relación de autoridad y obligación bajo mandato, por lo que «esclavo» conserva la fuerza social y retórica del término δοῦλος. «Siervo» suaviza indebidamente esa relación en español.
- source_word: ὅτι ἐποίησεν
  english_pob_choice: because he did
  chosen_spanish: porque hizo
  alternatives_spanish:
  - porque cumplió
  - porque realizó
  lexicon: BDAG
  rationale: ὅτι introduce la razón de la supuesta gratitud. «Porque hizo» es fiel, directo y suficientemente amplio para el valor de ποιέω aquí, que se refiere a ejecutar lo mandado.
- source_word: τὰ διαταχθέντα
  english_pob_choice: what was commanded
  chosen_spanish: lo que se le había ordenado
  alternatives_spanish:
  - lo que se había mandado
  - las cosas mandadas
  lexicon: BDAG
  rationale: El participio pasivo sustantivado expresa «las cosas que habían sido ordenadas». En español, «lo que se le había ordenado» mantiene el pasivo y la referencia al destinatario del mandato con naturalidad idiomática.
theological_decisions:
- issue: Rendering of δοῦλος in a master-slave context
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: La escena presupone subordinación obligatoria bajo autoridad del amo. «Esclavo» evita suavizar la relación y conserva la dureza social implicada por el término griego, en línea con la lectura auditada del POB en inglés.
  doctrine_reference: 'DOCTRINE.md: contested terms for δοῦλος; translation philosophy on lexical force'
translation_notes:
  revision_awareness: El borrador sigue el sentido y la decisión léxica auditada del POB en inglés, especialmente en ἔχει χάριν = agradecer y δοῦλος = esclavo, sin introducir una paráfrasis más amplia que el griego no requiera.
  spanish_consistency_notes:
  - Se mantiene «esclavo» para δοῦλος por coherencia con la política terminológica del proyecto en contextos de subordinación obligada.
  - Se traduce el giro interrogativo con una forma natural en español que conserva la expectativa de respuesta negativa implícita.
  - «Lo que se le había ordenado» preserva el pasivo y evita convertir el participio en una simple acción activa.
