revisions:
- from: ¿No le da gracias al esclavo[a] porque hizo lo que se le había ordenado?
  to: ¿Acaso le agradece al esclavo[a] porque hizo lo que se le había ordenado?
  rationale: Se ajusta «da gracias» a «agradece» para un español más natural y fiel al sentido idiomático de ἔχει χάριν. Se reformula la pregunta con «¿Acaso...?» para reflejar con naturalidad la expectativa de respuesta negativa introducida por μή. Se corrige la nota al pie eliminando «criado», que no representa bien δοῦλος en este contexto ni la justificación léxica auditada.
