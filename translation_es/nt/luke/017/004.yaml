translation:
  language: es
  text: 'Y si peca contra ti siete veces en un día[a], y siete veces vuelve[b] a ti, diciendo: «Me arrepiento», le perdonarás[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al día». La expresión griega puede referirse al lapso de un día como marco temporal de la repetición.
    reason: lexical_alternative
  - marker: b
    text: O «se vuelve a ti». El verbo puede significar tanto «volver» como «volverse» o «volver hacia» en este contexto.
    reason: lexical_alternative
  - marker: c
    text: O «debes perdonarle». El futuro griego aquí tiene fuerza de mandato.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑπτάκις
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete veces exactamente
  - siete ocasiones
  lexicon: BDAG
  rationale: ἑπτάκις es un adverbio de frecuencia; en español natural y fiel, «siete veces» conserva la repetición sin introducir matices ajenos.
- source_word: τῆς ἡμέρας
  english_pob_choice: in a day
  chosen_spanish: al día
  alternatives_spanish:
  - en un día
  - en el día
  lexicon: BDAG
  rationale: La frase expresa un marco temporal de frecuencia; «al día» suena natural en español y mantiene el valor de tiempo dentro del cual ocurre la repetición.
- source_word: ἁμαρτήσῃ εἰς σὲ
  english_pob_choice: sins against you
  chosen_spanish: peca contra ti
  alternatives_spanish:
  - peque contra ti
  - peca en tu contra
  lexicon: BDAG
  rationale: ἁμαρτάνω con εἰς σέ señala ofensa dirigida a la persona. «Peca contra ti» es directo, claro y conserva el valor relacional y ofensivo.
- source_word: ἐπιστρέψῃ πρὸς σὲ
  english_pob_choice: returns to you
  chosen_spanish: vuelve a ti
  alternatives_spanish:
  - regresa a ti
  - se vuelve a ti
  - se vuelve hacia ti
  lexicon: BDAG
  rationale: ἐπιστρέφω puede significar «volver/retornar» o «volver(se)». Aquí, tras el agravio y la súplica, «vuelve a ti» comunica adecuadamente el movimiento de retorno y reaproximación.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio presente expresa modo concomitante; «diciendo» mantiene la dependencia sintáctica sin sobrerrepresentar la conjunción.
- source_word: Μετανοῶ
  english_pob_choice: I repent
  chosen_spanish: Me arrepiento
  alternatives_spanish:
  - Estoy arrepentido
  - Cambio de mente
  lexicon: BDAG
  rationale: μετανοέω aquí lleva el sentido moral/relacional de arrepentirse. «Me arrepiento» conserva esa fuerza mejor que una formulación meramente cognitiva o afectiva.
- source_word: ἀφήσεις
  english_pob_choice: you shall forgive
  chosen_spanish: le perdonarás
  alternatives_spanish:
  - debes perdonarle
  - perdonarás
  lexicon: BDAG
  rationale: El futuro griego funciona con fuerza imperativa en este contexto. «Le perdonarás» mantiene la forma futura y la directivez; el clítico anticipa el objeto directo en español con naturalidad.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - lo
  lexicon: BDAG
  rationale: El dativo personal masculino singular se expresa naturalmente con «le» en la construcción de dativo ético/dativo de destinatario en español.
theological_decisions:
- issue: Fuerza imperativa del futuro ἀφήσεις
  english_pob_reading: '''you shall forgive him'' as a directive preserving the future form'
  chosen_spanish_reading: «le perdonarás» como futuro con fuerza de mandato
  alternative_spanish_readings:
  - «debes perdonarle»
  - «perdona»
  rationale: El texto no describe mera predicción, sino una instrucción ética. El futuro simple en español puede conservar esa tensión entre forma verbal y fuerza exhortativa sin volverla demasiado explicativa.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sentido de Μετανοῶ
  english_pob_reading: Translated 'I repent' rather than 'I am sorry' or 'I have changed my mind'
  chosen_spanish_reading: «Me arrepiento»
  alternative_spanish_readings:
  - «Lo siento»
  - «He cambiado de parecer»
  rationale: La respuesta requerida es arrepentimiento, no solo remordimiento o cambio de opinión. «Me arrepiento» conserva el peso moral y relacional del término.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y la auditoría inglesa POB, manteniendo la tensión entre el futuro con valor imperativo (ἀφήσεις) y la respuesta verbal de arrepentimiento (Μετανοῶ). Se evita calcar mecánicamente el inglés, especialmente en el tratamiento de τῆς ἡμέρας, donde el español idiomático requiere una solución temporal más natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo demande; aquí no aparece el tetragrámaton.
  - Se mantiene «arrepentirse/arrepentimiento» para μετανοέω salvo evidencia contextual contraria.
  - Se traduce el dativo indirecto con «le» para evitar una estructura menos natural en español.
  - No se introduce una distinción doctrinal adicional entre perdón y absolución que el verso no explicita.
