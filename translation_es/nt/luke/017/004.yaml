review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: pecado repetido contra la persona, retorno repetido con declaración de arrepentimiento, y mandato de perdonar. «Peca contra ti», «vuelve a ti», «Me arrepiento» y «le perdonarás» están alineados con las decisiones del POB en inglés. Sin embargo, el anclaje y contenido de las notas no preservan fielmente la auditoría inglesa: la nota [b] fue colocada sobre «diciendo» aunque la alternativa corresponde a «vuelve a ti»; y la nota [c] en español dice exactamente lo mismo que el texto principal («le perdonarás») en vez de dar la alternativa inglesa documentada («debes perdonarle» / «tienes que perdonarlo»).'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, «siete veces al día» en el orden actual suena menos natural que «si peca contra ti siete veces en un día». Además, la nota [b] es confusa porque propone un infinitivo («volviendo a ti») como alternativa a un participio distinto, cuando en realidad la alternativa léxica recae en «vuelve a ti» / «se vuelve a ti». La nota [c] necesita corrección para no repetir el texto principal y para expresar mejor la fuerza imperativa del futuro.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Me arrepiento» preserva correctamente μετανοῶ en contexto de arrepentimiento moral. «Le perdonarás» es aceptable para ἀφήσεις con futuro imperatival, pero la nota alternativa debe recoger «debes perdonarle» o equivalente, conforme al rastro inglés.
  issues:
  - severity: medium
    issue: Nota [b] mal anclada y mal formulada
    rationale: La alternativa documentada en inglés corresponde a ἐπιστρέψῃ πρὸς σὲ ('returns/turns to you'), no a λέγων ('saying'). En el borrador, [b] está anclada en «diciendo» y ofrece «volviendo a ti», lo cual no corresponde al segmento señalado.
  - severity: medium
    issue: Nota [c] repite el texto principal en lugar de ofrecer la alternativa real
    rationale: El texto principal ya dice «le perdonarás». La nota inglesa ofrece «you must forgive him» como alternativa explícita de fuerza imperativa. La nota española debe reflejar esa alternativa, no duplicar el texto base.
  - severity: low
    issue: Orden sintáctico algo rígido en español
    rationale: «Y si siete veces al día peca contra ti» es comprensible, pero «Y si peca contra ti siete veces en un día» suena más natural en español sin pérdida de fidelidad.
  revised_spanish_text: 'Y si peca contra ti siete veces en un día[a], y siete veces vuelve[b] a ti, diciendo: «Me arrepiento», le perdonarás[c].'
