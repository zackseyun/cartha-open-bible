translation:
  language: es
  text: Pero primero debe sufrir muchas cosas y ser rechazado por esta generación.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - en primer lugar
  lexicon: BDAG
  rationale: Adverbio de prioridad temporal. «Primero» conserva la secuencia marcada por el griego sin sobreexplicar.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ introduce transición con matiz contrastivo respecto de lo anterior. «Pero» es natural en español y reproduce ese giro.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debe
  alternatives_spanish:
  - es necesario que
  - tiene que
  lexicon: BDAG
  rationale: δεῖ expresa necesidad. «Debe» conserva la obligación/necessidad de forma concisa, sin agregar una explicación explícita de la causa divina que el versículo no formula.
- source_word: αὐτὸν
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - lo
  - a él
  lexicon: BDAG
  rationale: 'Aunque funciona como sujeto lógico de los infinitivos, en español conviene explicitar el pronombre de sujeto en la cláusula finita: «él». La referencia es al Hijo del Hombre en el contexto inmediato.'
- source_word: πολλὰ
  english_pob_choice: many things
  chosen_spanish: muchas cosas
  alternatives_spanish:
  - mucho
  - muchas pruebas
  lexicon: BDAG
  rationale: El neutro plural abarca la amplitud de los padecimientos. «Muchas cosas» preserva esa amplitud concreta mejor que una abstracción como «mucho».
- source_word: παθεῖν
  english_pob_choice: suffer
  chosen_spanish: padecer
  alternatives_spanish:
  - sufrir
  - experimentar sufrimiento
  lexicon: BDAG
  rationale: «Padecer» es un equivalente digno y fiel para πάσχω en este contexto de pasión anunciada, y en español bíblico comunica el peso de la aflicción sin perder naturalidad.
- source_word: ἀποδοκιμασθῆναι
  english_pob_choice: be rejected
  chosen_spanish: ser rechazado
  alternatives_spanish:
  - ser repudiado
  - ser desechado
  lexicon: BDAG
  rationale: El verbo indica rechazo tras evaluación o prueba. «Ser rechazado» es la forma más clara y idiomática en español, manteniendo la fuerza del pasivo sin tecnicismos.
- source_word: ἀπὸ τῆς γενεᾶς ταύτης
  english_pob_choice: by this generation
  chosen_spanish: por esta generación
  alternatives_spanish:
  - de esta generación
  - a manos de esta generación
  lexicon: BDAG
  rationale: Con un pasivo, ἀπό puede marcar agente o fuente. «Por esta generación» expresa de manera natural quién lo rechaza, y «esta generación» conserva el sentido temporal-contemporáneo de γενεά.
theological_decisions:
- issue: Fuerza de la necesidad en δεῖ respecto del sufrimiento del Hijo del Hombre
  english_pob_reading: Rendered as 'must' to preserve necessity without explicitly specifying divine decree in the translation.
  chosen_spanish_reading: «debe» preserva la necesidad sin añadir en el texto una glosa interpretativa sobre el decreto divino.
  alternative_spanish_readings:
  - «es necesario que»
  - «tiene que»
  rationale: Lucas usa δεῖ con frecuencia para acontecimientos que encajan en el propósito de Dios, pero el versículo mismo no lo explica. La traducción conserva esa tensión teológica en forma sobria, sin resolverla de manera interpretativa.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el trazado auditado en inglés; no hubo revisiones aplicadas en la fuente inglesa, y la versión española sigue esa lectura estable sin introducir cambios de alcance.
  spanish_consistency_notes:
  - Se mantiene «generación» para γενεά, sin sustituirlo por un equivalente sociológico más amplio.
  - Se usa «padecer» como opción bíblica natural para πάσχω, en coherencia con el tono de anuncio de la pasión.
  - Se emplea «rechazado» en voz pasiva para reflejar ἀποδοκιμασθῆναι y la agencia implícita marcada por ἀπό.
