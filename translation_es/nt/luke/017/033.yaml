base_translation:
  language: en
  yaml_path: translation/nt/luke/017/033.yaml
  text: Whoever seeks to preserve his life will lose it[b][a], but whoever loses it will preserve it alive.
  footnotes:
  - marker: a
    text: Or 'soul' for 'life' (ψυχή), though here the sense is likely one's life/self rather than the immaterial soul.
    reason: lexical_alternative
  - marker: b
    text: Or 'will preserve it alive' or traditionally 'will save it'; the Greek verb literally means 'will keep alive.'
    reason: lexical_alternative
