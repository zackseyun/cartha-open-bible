translation:
  language: es
  text: Todo el que procura preservar su vida[a] la perderá, pero todo el que la pierda la preservará viva[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alma» para ψυχή, aunque aquí el sentido probablemente es la vida de la persona o su propio ser, no el alma inmaterial.
    reason: lexical_alternative
  - marker: b
    text: O «la mantendrá con vida» o, tradicionalmente, «la salvará»; el verbo griego significa literalmente «mantenerla con vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητήσῃ
  english_pob_choice: seeks
  chosen_spanish: procura
  alternatives_spanish:
  - busca
  - se esfuerza por
  lexicon: BDAG
  rationale: ζητέω aquí expresa un empeño deliberado, no un simple deseo. «Procura» transmite esa búsqueda intencional en un español natural y digno.
- source_word: ψυχὴν
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - vida propia
  lexicon: BDAG
  rationale: En este dicho, ψυχή se refiere a la vida de la persona, no de manera primaria al alma inmaterial. «Vida» conserva el paralelismo con perder y preservar sin introducir una distinción antropológica ajena al contexto.
- source_word: περιποιήσασθαι
  english_pob_choice: to preserve
  chosen_spanish: preservar
  alternatives_spanish:
  - conservar
  - guardar
  - asegurar para sí
  lexicon: BDAG
  rationale: El infinitivo medio tiene el matiz de guardar o preservar para uno mismo. «Preservar» refleja bien ese sentido y mantiene la conexión verbal con la primera cláusula.
- source_word: ἀπολέσει
  english_pob_choice: will lose
  chosen_spanish: la perderá
  alternatives_spanish:
  - la destruirá
  - la hará perecer
  - la dejará perder
  lexicon: BDAG
  rationale: ἀπόλλυμι en este refrán se expresa naturalmente como «perder». Así se conserva la paradoja del dicho sin sobrerinterpretar el verbo.
- source_word: ἀπολέσῃ
  english_pob_choice: loses
  chosen_spanish: la pierda
  alternatives_spanish:
  - la destruya
  - la entregue
  - la abandone
  lexicon: BDAG
  rationale: El aoristo subjuntivo pide una construcción condicional equivalente en español. «La pierda» mantiene la correspondencia léxica con la primera cláusula y el carácter proverbial.
- source_word: ζῳογονήσει
  english_pob_choice: will preserve it alive
  chosen_spanish: la preservará viva
  alternatives_spanish:
  - la mantendrá con vida
  - la conservará viva
  - la hará vivir
  lexicon: BDAG
  rationale: ζῳογονέω significa literalmente dar vida o mantener con vida. «Preservará viva» conserva la transparencia del verbo y la relación con «preservar» en la primera parte, sin recurrir al más tradicional pero menos transparente «salvar».
- source_word: ὃς ἐὰν ... ὃς δ’ ἂν
  english_pob_choice: Whoever ... but whoever
  chosen_spanish: Todo el que ... pero todo el que
  alternatives_spanish:
  - Quienquiera que ... pero quienquiera que
  - Todo aquel que ... pero todo aquel que
  lexicon: Greek grammar
  rationale: La construcción es genérica y condicional. «Todo el que» suena natural en español bíblico moderno; «pero» marca con claridad el contraste adversativo del segundo miembro.
- source_word: αὐτοῦ / αὐτήν
  english_pob_choice: his ... it
  chosen_spanish: su ... la
  alternatives_spanish:
  - su ... su vida
  - su ... ella
  lexicon: Greek grammar
  rationale: El posesivo masculino singular es genérico en griego; «su» lo refleja sin marcar género en español. El objeto vuelve a «vida», por lo que el pronombre «la» evita repetición innecesaria y conserva la referencia clara.
theological_decisions:
- issue: Sentido de ψυχή en el dicho de Jesús
  english_pob_reading: Rendered as 'life' rather than 'soul'
  chosen_spanish_reading: ψυχή se traduce como «vida», no como «alma»
  alternative_spanish_readings:
  - «alma»
  - «vida/alma» con nota explicativa
  rationale: El contexto habla de perder y preservar en una situación de discipulado y juicio, y el contraste funciona mejor en términos de vida concreta. «Alma» estrecharía indebidamente el alcance del dicho y podría sugerir una dicotomía alma/cuerpo que el griego aquí no exige.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Valor de ζῳογονήσει
  english_pob_reading: Rendered transparently as 'will preserve it alive'
  chosen_spanish_reading: Se traduce de manera transparente como «la preservará viva»
  alternative_spanish_readings:
  - «la mantendrá con vida»
  - «la salvará»
  rationale: El verbo griego no es el verbo usual para «salvar» y literalmente expresa mantener o hacer vivir. Una traducción transparente conserva la tensión verbal del dicho y evita reemplazarla por una fórmula eclesial más convencional.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'Este borrador sigue la revisión más reciente del registro inglés, que prefirió una formulación formal y transparente en la cláusula final: de «mantendrá con vida» a «preservará viva». En español se refleja esa misma decisión mediante la repetición controlada de «preservar» y el adjetivo «viva», manteniendo la transparencia del verbo ζῳογονέω.'
  spanish_consistency_notes:
  - Se mantiene «vida» para ψυχή, coherente con el tratamiento POB de este término en contextos de pérdida y conservación existencial.
  - Se evita «salvar» en el cuerpo principal para no oscurecer el valor léxico de ζῳογονέω.
  - La estructura «Todo el que ... pero todo el que ...» conserva el carácter proverbial y contrastivo del griego.
  - El pronombre átono «la» se usa con antecedente claro («vida») para evitar redundancia y mantener fluidez natural en español.
