translation:
  language: es
  text: 'Ni dirán: «¡Miren, aquí!» o «¡Allí!»; pues he aquí, el reino de Dios está en medio de ustedes[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dentro de ustedes». La frase griega puede entenderse en sentido interior o en sentido corporativo, como «entre ustedes / en medio de ustedes».'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδὲ
  english_pob_choice: Nor
  chosen_spanish: Ni
  alternatives_spanish:
  - Y no
  - Tampoco
  lexicon: BDAG
  rationale: Cierra de manera natural la continuidad negativa con la cláusula anterior. «Ni» preserva la coordinación negativa sin volver la frase pesada en español.
- source_word: ἐροῦσιν
  english_pob_choice: will they say
  chosen_spanish: dirán
  alternatives_spanish:
  - dirán ellos
  - van a decir
  lexicon: BDAG
  rationale: El futuro simple reproduce bien el valor de futuro del verbo griego y suena más sobrio que una perífrasis.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - He aquí
  lexicon: BDAG
  rationale: Es una forma de llamar la atención del oyente. «Miren» es claro y natural en español contemporáneo; se repite para reflejar ambos ἰδοὺ del verso.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - acá
  lexicon: BDAG
  rationale: Adverbio locativo simple; «aquí» conserva la referencia espacial directa.
- source_word: ἤ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - u
  lexicon: BDAG
  rationale: Conjunción disyuntiva estándar en español.
- source_word: Ἐκεῖ
  english_pob_choice: There
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: Mantiene el paralelismo con «aquí» y el contraste deíctico del griego.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el reino de Yahvé
  lexicon: BDAG
  rationale: «Reino» es la equivalencia directa y transparente en español; conserva tanto la dimensión real como la escatológica sin decidir de antemano entre dominio o esfera.
- source_word: ἐντὸς
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - dentro de
  - entre
  lexicon: BDAG
  rationale: 'En este contexto, con un plural de segunda persona, la lectura corporativa encaja mejor: no como interior individual, sino como presencia entre el grupo. «En medio de» expresa bien esa presencia colectiva en español natural.'
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ti
  lexicon: BDAG
  rationale: El griego está en plural; en español de registro amplio, «ustedes» comunica el plural de manera neutral y abarca la audiencia plural del pasaje.
- source_word: ἐστιν
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - es
  - se encuentra
  lexicon: BDAG
  rationale: Con una expresión locativa, «está» suena más natural que el simple «es» y preserva la idea de presencia.
theological_decisions:
- issue: Sentido de ἐντὸς ὑμῶν
  english_pob_reading: the kingdom of God is in your midst
  chosen_spanish_reading: el reino de Dios está en medio de ustedes
  alternative_spanish_readings:
  - el reino de Dios está dentro de ustedes
  - el reino de Dios está entre ustedes
  rationale: El contexto inmediato habla de una realidad no localizada por señales externas; además, Jesús se dirige a un plural. Por eso, la lectura corporativa/presente entre ellos se expresa mejor con «en medio de ustedes». Se mantiene la ambigüedad legítima del griego mediante nota, sin imponer una lectura puramente interior que el contexto no exige.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor de Ἰδοὺ
  english_pob_reading: Look
  chosen_spanish_reading: Miren
  alternative_spanish_readings:
  - He aquí
  - Vean
  rationale: El griego funciona como atención enfática, no como contenido doctrinal. En español, «Miren» transmite con claridad esa llamada de atención sin cargar el estilo con arcaísmo innecesario. La duplicación del término mantiene la estructura retórica del versículo.
  doctrine_reference: 'Principio de transparencia retórica: conservar deícticos y repeticiones significativas del original.'
translation_notes:
  revision_awareness: Se siguió el audit trail inglés que prefirió una lectura corporativa de ἐντὸς ὑμῶν y conservó la ambigüedad en nota. También se respetó la revisión que reforzó el tono formal del segundo ἰδοὺ; en español se refleja con la repetición de «Miren» para mantener la función deíctica sin forzar un arcaísmo. No se añadieron matices no sustentados por el griego.
  spanish_consistency_notes:
  - Se usa «reino de Dios» de forma consistente con el lema establecido para βασιλεία τοῦ θεοῦ.
  - Se usa «Dios» para θεοῦ según el estándar del proyecto.
  - Se evita «SEÑOR» porque este verso no contiene κύριος.
  - Se mantiene un español amplio y eclesialmente legible, evitando giros excesivamente regionales.
  - La nota conserva la tensión entre lectura interior y lectura corporativa sin resolverla unilateralmente.
