translation:
  language: es
  text: ¿No hubo quienes volvieran para dar gloria a Dios, sino este extranjero[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este forastero» o «este hombre de otra nación»; el griego designa a un extranjero, es decir, a alguien ajeno a Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρέθησαν
  english_pob_choice: were found
  chosen_spanish: se halló
  alternatives_spanish:
  - se encontraron
  - fueron hallados
  lexicon: BDAG
  rationale: El pasivo aoristo de εὑρίσκω se expresa en español de manera natural con una construcción impersonal/reflexiva. En una pregunta retórica, «¿No se halló…?» conserva bien el sentido existencial de la versión inglesa sin volverse torpe.
- source_word: ὑποστρέψαντες
  english_pob_choice: to return
  chosen_spanish: volviera
  alternatives_spanish:
  - volvieran
  - regresara
  - después de volver
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción previa necesaria antes de «dar gloria». En español, «quien volviera» reproduce de forma fluida esa relación de retorno previo sin forzar un participio absoluto.
- source_word: δοῦναι δόξαν
  english_pob_choice: give glory
  chosen_spanish: dar gloria
  alternatives_spanish:
  - glorificar
  - dar alabanza
  lexicon: BDAG
  rationale: La expresión literal «dar gloria» es un giro bíblico estable y en español suena natural. Se preserva mejor que «glorificar», que cambia la forma verbal y atenúa la imagen de dar gloria a Dios.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a el Dios
  lexicon: BDAG
  rationale: En español, la preposición de dativo se rinde normalmente con «a». Se mantiene «Dios» sin artículo, conforme al uso idiomático y al valor del texto fuente.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: En esta construcción excluyente, «sino» es la forma más idiomática en español cuando sigue una negación previa. Conserva la fuerza de exclusión de εἰ μὴ mejor que un calco más pesado.
- source_word: ἀλλογενής
  english_pob_choice: foreigner
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - de otra nación
  - ajeno
  lexicon: BDAG
  rationale: ἀλλογενής designa a alguien de otro pueblo, subrayando su condición de no pertenecer a Israel. «Extranjero» es claro y mantiene el contraste social y religioso del pasaje; «forastero» sería posible, pero menos preciso aquí.
- source_word: οὗτος
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - este mismo
  lexicon: BDAG
  rationale: 'El demostrativo añade énfasis al contraste: «este extranjero». Se conserva con «este» para mantener esa deíxis fuerte sin sobretraducir.'
theological_decisions:
- issue: Contraste entre el único que vuelve y los otros nueve
  english_pob_reading: this foreigner
  chosen_spanish_reading: este extranjero
  alternative_spanish_readings:
  - este forastero
  - este hombre de otra nación
  rationale: El texto resalta la ironía de que el único que regresa a honrar a Dios es el outsider. «Extranjero» preserva esa tensión étnico-religiosa sin introducir una explicación adicional que no está explícita en el versículo.
  doctrine_reference: Lectura narrativa de Lucas 17:11-19; contraste de gratitud y pertenencia al pueblo de Dios.
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del audit trail inglés: se conserva la pregunta retórica, el valor de exclusión de εἰ μὴ y el término ἀλλογενής con un equivalente español que mantiene la tensión social/religiosa. No se detectaron cambios de revisión posteriores que exigieran ajustes.'
  spanish_consistency_notes:
  - Se usa «Dios» sin artículo, como en español bíblico contemporáneo.
  - Se mantiene «dar gloria» para respetar el giro lexical del griego.
  - «Extranjero» se eligió por precisión contextual; se dejó nota alternativa por si el contexto editorial prefiriera «forastero».
