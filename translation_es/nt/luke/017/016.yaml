review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la secuencia básica del griego: cayó/postura de postración/agradecimiento/identidad samaritana. Sin embargo, dos giros españoles no preservan bien la naturalidad ni la fuerza idiomática del original: «sobre su rostro» no es español natural para ἐπὶ πρόσωπον, y «a los pies de él» es una construcción poco idiomática para παρὰ τοὺς πόδας αὐτοῦ. Además, «Y él era samaritano» suena algo rígido; puede mantenerse el énfasis con una formulación más natural.'
  spanish_quality_summary: La redacción actual es comprensible pero presenta calcos poco naturales. En español bíblico claro y moderno, «cayó rostro en tierra a sus pies» o «cayó de bruces a sus pies» expresa mejor la postura reverente. «Dándole gracias» es adecuado. La cláusula final funciona mejor como «Y él era un samaritano» para sonar idiomática y conservar la revelación enfática de identidad.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «samaritano» está bien. No aparecen términos sensibles del glosario principal. La revisión propuesta mejora la equivalencia idiomática sin alterar las decisiones léxicas documentadas.
  issues:
  - severity: medium
    issue: «sobre su rostro» es un calco poco natural de ἐπὶ πρόσωπον
    rationale: Aunque intenta ser literal, en español no suena natural decir que alguien cayó «sobre su rostro». El griego describe la postura de postración; «rostro en tierra» o «de bruces» la comunica con fidelidad y mejor legibilidad.
  - severity: medium
    issue: «a los pies de él» es una construcción forzada
    rationale: Para παρὰ τοὺς πόδας αὐτοῦ, el español idiomático pide «a sus pies». La forma con pronombre tónico pospuesto es gramaticalmente posible, pero torpe y poco natural en este contexto narrativo.
  - severity: low
    issue: Falta de artículo en «era samaritano»
    rationale: «Era samaritano» no es incorrecto, pero «era un samaritano» suena más natural en español narrativo y mantiene mejor la identificación enfática del personaje sin añadir interpretación.
  revised_spanish_text: Y cayó rostro en tierra a sus pies, dándole gracias. Y él era un samaritano.
  revision_rationale: Se ajusta el texto para evitar calcos poco idiomáticos y reflejar con mejor español la postura de postración y la referencia espacial del griego. «Cayó» y «dándole gracias» se conservan por su fidelidad al aspecto verbal y al tono. La cláusula final mantiene el énfasis de αὐτός con una formulación natural en español.
