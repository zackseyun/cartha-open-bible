- from: Y cayó sobre su rostro a los pies de él, dándole gracias. Y él era samaritano.
  to: Y cayó rostro en tierra a sus pies, dándole gracias. Y él era un samaritano.
  rationale: Se ajusta el texto para evitar calcos poco idiomáticos y reflejar con mejor español la postura de postración y la referencia espacial del griego. «Cayó» y «dándole gracias» se conservan por su fidelidad al aspecto verbal y al tono. La cláusula final mantiene el énfasis de αὐτός con una formulación natural en español.
