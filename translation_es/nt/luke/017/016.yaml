translation:
  language: es
  text: Y cayó rostro en tierra a sus pies, dándole gracias. Y él era un samaritano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se postró
  - se echó a los pies
  lexicon: BDAG
  rationale: El aoristo de πίπτω se expresa de forma natural como «cayó». El contexto de reverencia y humildad lo completa la frase siguiente, sin necesidad de añadir un verbo más interpretativo en el texto principal.
- source_word: ἐπὶ πρόσωπον
  english_pob_choice: on his face
  chosen_spanish: sobre su rostro
  alternatives_spanish:
  - de bruces
  - con el rostro en tierra
  lexicon: BDAG
  rationale: La locución describe una postura de postración. «Sobre su rostro» conserva la imagen corporal de manera fiel y suena más natural en español bíblico contemporáneo que un calco rígido.
- source_word: παρὰ τοὺς πόδας αὐτοῦ
  english_pob_choice: at his feet
  chosen_spanish: a los pies de él
  alternatives_spanish:
  - junto a sus pies
  - delante de sus pies
  lexicon: BDAG
  rationale: Aunque παρά puede significar «junto a», en este contexto reverente la idea es de estar postrado ante Jesús. «A los pies de él» preserva la relación espacial y el matiz de humillación sin forzar una fórmula tradicional.
- source_word: εὐχαριστῶν αὐτῷ
  english_pob_choice: thanking him
  chosen_spanish: dándole gracias
  alternatives_spanish:
  - agradeciéndole
  - dándole gracias a él
  lexicon: BDAG
  rationale: El participio presente expresa acción concomitante. «Dándole gracias» comunica bien la acción continua y mantiene el verbo de gratitud con un tono natural y digno en español.
- source_word: Σαμαρίτης
  english_pob_choice: Samaritan
  chosen_spanish: samaritano
  alternatives_spanish:
  - habitante de Samaria
  - samaritano hombre
  lexicon: BDAG
  rationale: Se conserva el designativo etnorreligioso como «samaritano», que es el equivalente transparente en español y preserva la carga narrativa y social del término.
- source_word: καὶ αὐτὸς ἦν Σαμαρίτης
  english_pob_choice: And he was a Samaritan
  chosen_spanish: Y él era samaritano
  alternatives_spanish:
  - Y era samaritano
  - Y este era samaritano
  lexicon: BDAG
  rationale: El pronombre enfático αὐτός se refleja con «él» para mantener la simpleza del enunciado y la revelación sorprendente de su identidad sin añadir comentario explicativo.
theological_decisions:
- issue: Tensión narrativa sobre la identidad del agradecido
  english_pob_reading: Retain the simple statement 'And he was a Samaritan' without adding interpretive wording.
  chosen_spanish_reading: 'Mantener la afirmación breve: «Y él era samaritano».'
  alternative_spanish_readings:
  - Y era samaritano
  - Y este era samaritano
  - Y resultó ser samaritano
  rationale: La fuerza del versículo está en la sobriedad con que revela que el agradecido pertenecía a un grupo social y religiosamente marginado. La traducción conserva esa tensión sin amplificarla con comentarios o giros explicativos.
  doctrine_reference: Preservar la tensión teológica y narrativa; no resolverla en el texto principal.
translation_notes:
  revision_awareness: El contexto inglés revisado muestra un acuerdo alto y sin cambios recientes; por eso se mantiene una equivalencia óptima sobria, con las decisiones léxicas principales reflejadas directamente en el español sin expansión interpretativa.
  spanish_consistency_notes:
  - Se usa puntuación y mayúsculas propias del español.
  - Se mantiene el orden de dos cláusulas con «Y» inicial para reflejar el encadenamiento narrativo del griego.
  - No se introduce «Cristo» ni otra terminología no presente en el original.
  - «samaritano» se deja en minúscula por funcionar como designación común dentro de la oración.
