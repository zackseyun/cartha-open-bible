revisions:
- from: Estén atentos a ustedes mismos[a]. Si tu hermano peca, repréndelo, y si se arrepiente[b], perdónalo.
  to: Ten cuidado[a]. Si tu hermano peca, repréndelo, y si se arrepiente, perdónalo[b].
  rationale: Se revisa para mejorar la naturalidad del español y corregir la mezcla de tratamientos («ustedes» / «tu»). «Ten cuidado» comunica bien el imperativo de vigilancia de προσέχετε en un español claro y digno, y permite mantener el resto del versículo de forma coherente en segunda persona singular. La nota cultural se reancla al final porque explica «hermano», no «se arrepiente».
