    rationale: El texto empieza con «Estén atentos a ustedes mismos» pero luego pasa a «tu hermano... repréndelo... perdónalo». Esa alternancia no proviene del griego de manera que deba preservarse en español aquí, y dificulta la fluidez lectora.
  - severity: medium
    issue: «Estén atentos a ustedes mismos» suena poco natural para προσέχετε ἑαυτοῖς
    rationale: Aunque es comprensible, en español más idiomático y digno suena mejor «Tengan cuidado» o «Presten atención». Dado que el resto del versículo está en singular, «Ten cuidado» integra mejor la exhortación sin perder la reflexividad implícita del contexto.
  - severity: low
    issue: La nota [a] no refleja la nueva coherencia pronominal deseable
    rationale: Si se corrige el versículo al singular, la variante textual en nota debe mantener el mismo tratamiento para que el conjunto sea uniforme.
