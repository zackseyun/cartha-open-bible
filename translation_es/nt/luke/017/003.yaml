translation:
  language: es
  text: Ten cuidado[a]. Si tu hermano peca, repréndelo, y si se arrepiente, perdónalo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos dicen: «Si tu hermano peca contra ti, repréndelo».'
    reason: textual_variant
  - marker: b
    text: «Hermano» es masculino singular en griego y puede referirse de manera más amplia a un compañero de discipulado.
    reason: cultural_note
lexical_decisions:
- source_word: προσέχετε
  english_pob_choice: Pay attention
  chosen_spanish: Estén atentos
  alternatives_spanish:
  - Presten atención
  - Estén alertas
  - Velen
  lexicon: BDAG
  rationale: El imperativo presente exige vigilancia continua. «Estén atentos» transmite bien la idea de prestar atención con constancia y suena natural en español actual sin debilitar la advertencia.
- source_word: ἑαυτοῖς
  english_pob_choice: to yourselves
  chosen_spanish: a ustedes mismos
  alternatives_spanish:
  - a ustedes mismos / entre ustedes
  - a sí mismos
  lexicon: BDAG
  rationale: El dativo reflexivo conserva la referencia a los propios oyentes. «A ustedes mismos» mantiene la idea de vigilancia personal y puede abarcar también la responsabilidad mutua dentro del grupo.
- source_word: ἁμάρτῃ
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - peque contra ustedes
  - haga mal
  - cometa pecado
  lexicon: BDAG
  rationale: El texto griego breve no añade explícitamente «contra ti». «Peca» es la equivalencia más directa y no introduce una limitación que el testimonio textual no exige en la lectura principal.
- source_word: ἀδελφός σου
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano o hermana
  - tu creyente
  lexicon: BDAG
  rationale: Se conserva el singular masculino del griego. «Tu hermano» reproduce el término fuente con fidelidad, y en contexto puede abarcar a un miembro de la comunidad de discípulos sin alterar la redacción principal.
- source_word: ἐπιτίμησον
  english_pob_choice: rebuke
  chosen_spanish: repréndelo
  alternatives_spanish:
  - repróchale
  - corrígelo
  - amonéstalo
  lexicon: BDAG
  rationale: El aoristo imperativo pide una corrección verbal directa. «Repréndelo» comunica esa fuerza con claridad en español y evita suavizar el mandato a una simple sugerencia.
- source_word: μετανοήσῃ
  english_pob_choice: repents
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - cambia de mente
  - vuelve en sí
  - se vuelve atrás
  lexicon: BDAG
  rationale: En un contexto moral y relacional, μετάνοέω se expresa mejor como arrepentimiento. «Se arrepiente» mantiene la dimensión ética y la condición para el perdón.
- source_word: ἄφες
  english_pob_choice: forgive
  chosen_spanish: perdónalo
  alternatives_spanish:
  - absuélvelo
  - déjalo ir
  - consolídalo
  lexicon: BDAG
  rationale: En este contexto interpersonal, ἀφίημι significa perdonar. «Perdónalo» es la equivalencia más clara, idiomática y fiel al uso verbal del griego.
theological_decisions:
- issue: Incluir o no «contra ti» después de «peca»
  english_pob_reading: The main text omits 'against you' because the shorter Greek reading lacks an explicit object.
  chosen_spanish_reading: La frase principal omite «contra ti» y deja simplemente «si tu hermano peca».
  alternative_spanish_readings:
  - Si tu hermano peca contra ti...
  - Si tu hermano te ofende...
  rationale: La lectura griega proporcionada no contiene εἰς σέ ni equivalente. Para respetar la primacía del texto fuente y no importar una expansión armonizada, la versión principal mantiene la formulación breve; la variante larga queda documentada en nota.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor del masculino singular ἀδελφός
  english_pob_reading: your brother
  chosen_spanish_reading: tu hermano
  alternative_spanish_readings:
  - tu hermano o hermana
  - tu hermano, es decir, un hermano o hermana en la fe
  rationale: El griego es masculino singular y la pauta doctrinal favorece una traducción acorde con la forma del original. El posible alcance comunitario se puede aclarar en nota sin cambiar el texto principal.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: se mantiene la lectura breve «si tu hermano peca», se conserva el mandato fuerte «repréndelo», y se traduce μετανοέω con el sentido ético-relacional de «se arrepiente». No se registraron revisiones aplicadas en el último pase.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantiene el singular masculino «hermano» por fidelidad al griego, con aclaración en nota sobre su posible alcance comunitario.
  - «Peca» evita añadir «contra ti» en el texto principal y preserva la tensión textual documentada.
  - «Perdónalo» traduce ἄφες en su valor interpersonal, sin recurrir a un calco como «déjalo ir» que sería menos natural en español bíblico.
