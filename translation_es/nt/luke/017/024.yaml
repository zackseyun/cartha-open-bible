    reason: lexical_alternative
  - marker: b
    text: O «en el día que le pertenece». La frase se refiere al tiempo asociado con el Hijo del Hombre y se deja intencionalmente amplia en el texto principal.
    reason: alternative_reading
  revision_rationale: La revisión corrige una construcción española defectuosa, mantiene la repetición literal importante para la POB, y alinea mejor los dos verbos luminosos con la distinción griega y la auditoría inglesa. También ajusta la nota b para que ofrezca una alternativa real en vez de repetir el texto principal.
