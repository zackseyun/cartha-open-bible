translation:
  language: es
  text: Porque, así como el relámpago relampaguea desde debajo del cielo hasta debajo del cielo y brilla[a], así será el Hijo del Hombre en su día[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «de un extremo del cielo al otro». El griego repite más literalmente «debajo del cielo» en ambas mitades de la expresión.'
    reason: lexical_alternative
  - marker: b
    text: O «en el día que le pertenece». La frase se refiere al tiempo asociado con el Hijo del Hombre y se deja intencionalmente amplia en el texto principal.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥσπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque, así como
  alternatives_spanish:
  - Así como
  - Porque así como
  lexicon: BDAG
  rationale: Conserva la función explicativa de γάρ y la comparación introducida por ὥσπερ en un español natural. 'Porque, así como' mantiene el enlace causal/explicativo sin volverla rígida.
- source_word: ἀστραπὴ
  english_pob_choice: lightning
  chosen_spanish: el relámpago
  alternatives_spanish:
  - la luz relampagueante
  - la centella
  lexicon: BDAG
  rationale: '''Relámpago'' comunica la imagen visible y súbita del griego en un registro claro y bíblico. En español suele cubrir bien el campo semántico de ἀστραπὴ en este contexto.'
- source_word: ἀστράπτουσα
  english_pob_choice: flashing
  chosen_spanish: resplandece ... y destella
  alternatives_spanish:
  - relampaguea
  - brilla
  lexicon: BDAG
  rationale: Se conservan dos verbos para reflejar la participación activa del griego y no aplanar la diferencia entre el participio ἀστράπτουσα y el verbo siguiente λάμπει. 'Resplandece' y 'destella' mantienen la vivacidad del movimiento.
- source_word: ἐκ τῆς ὑπὸ τὸν οὐρανὸν ... εἰς τὴν ὑπ’ οὐρανόν
  english_pob_choice: from under heaven to under heaven
  chosen_spanish: de bajo del cielo hasta bajo el cielo
  alternatives_spanish:
  - desde debajo del cielo hasta debajo del cielo
  - de un extremo del cielo al otro
  lexicon: BDAG
  rationale: Se preserva la repetición literal de 'bajo el cielo' que el griego repite en ambas mitades. Aunque 'de un extremo del cielo al otro' sería más idiomático, aquí se mantiene la tensión léxica documentada por la POB inglesa.
- source_word: λάμπει
  english_pob_choice: shines
  chosen_spanish: destella
  alternatives_spanish:
  - brilla
  - alumbra
  lexicon: BDAG
  rationale: El verbo final se distingue del participio anterior; por eso se evita repetir solo 'brilla'. 'Destella' conserva el efecto luminoso y el contraste con 'resplandece'.
- source_word: οὕτως ἔσται
  english_pob_choice: so will ... be
  chosen_spanish: así será
  alternatives_spanish:
  - de ese modo será
  - así estará
  lexicon: BDAG
  rationale: Equivale de modo sencillo a la estructura comparativa y futura del griego, con naturalidad en español.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo del hombre
  lexicon: BDAG
  rationale: Se mantiene el título tradicional y transparente, ya asentado como designación de Jesús, sin parafrasearlo.
- source_word: ἐν τῇ ἡμέρᾳ αὐτοῦ
  english_pob_choice: in his day
  chosen_spanish: en su día
  alternatives_spanish:
  - en el día de él
  - en el día que le pertenece
  lexicon: BDAG
  rationale: '''En su día'' conserva la amplitud temporal y la referencia posesiva del griego, sin concretar más de lo que el texto dice.'
theological_decisions:
- issue: Alcance escatológico de 'en su día'
  english_pob_reading: Retain the phrase 'in his day' without expanding it to 'at his coming' or 'on the day of judgment.'
  chosen_spanish_reading: Mantener 'en su día' sin ampliarlo a 'en su venida' o 'en el día del juicio'.
  alternative_spanish_readings:
  - en su venida
  - en el día del juicio
  - el día del Hijo del Hombre
  rationale: El contexto es escatológico, pero el griego solo dice 'en su día'. Ampliar la frase introduciría una precisión interpretativa no explícita en el texto. La traducción preserva esa tensión teológica.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'La versión inglesa revisada prefirió eliminar una formulación torpe tipo ''one part ... the other part'' y conservar la repetición de ''under heaven'' de manera más natural. El español sigue esa revisión: mantiene la repetición literal de ''bajo el cielo'' pero la integra con sintaxis fluida. También conserva la distinción entre el participio de ''resplandecer/destellar'' y el verbo final de ''brillar/destellar'', evitando aplanar el doble movimiento del verso.'
  spanish_consistency_notes:
  - Se emplea 'Hijo del Hombre' de forma consistente con el título cristológico estándar y con la POB inglesa.
  - Se evita 'SEÑOR' u otras sustituciones no presentes porque el verso no contiene el nombre divino.
  - La repetición léxica de 'bajo el cielo' se conserva por fidelidad al griego y al tramo auditado en inglés.
  - La nota b mantiene la ambigüedad temporal de 'su día' sin cerrarla interpretativamente.
