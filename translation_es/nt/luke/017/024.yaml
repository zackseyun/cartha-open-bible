revisions:
- from: Porque, así como el relámpago resplandece de bajo del cielo hasta bajo el cielo y destella[a], así será el Hijo del Hombre en su día[b].
  to: Porque, así como el relámpago relampaguea desde debajo del cielo hasta debajo del cielo y brilla[a], así será el Hijo del Hombre en su día[b].
  rationale: La revisión corrige una construcción española defectuosa, mantiene la repetición literal importante para la POB, y alinea mejor los dos verbos luminosos con la distinción griega y la auditoría inglesa. También ajusta la nota b para que ofrezca una alternativa real en vez de repetir el texto principal.
