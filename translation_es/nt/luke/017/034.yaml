translation:
  language: es
  text: 'Les digo: aquella noche habrá dos en una misma cama; uno será tomado[a] y el otro será dejado[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será llevado consigo» para παραλημφθήσεται; el verbo por sí mismo no especifica aquí si el tomar es para liberación o para juicio.
    reason: lexical_alternative
  - marker: b
    text: O «será dejado atrás»; la forma breve «será dejado» se usa en el texto principal para no introducir asociaciones escatológicas posteriores que el griego no expresa de manera explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: Les digo
  alternatives_spanish:
  - Les digo a ustedes
  - Les digo a ustedes mismos
  - Les digo
  lexicon: BDAG
  rationale: La fórmula discursiva es directa y enfática. En español, «Les digo» conserva la inmediatez y la apelación personal sin sonar forzado. Se evita «les digo a ustedes» por redundante en este contexto.
- source_word: ταύτῃ τῇ νυκτί
  english_pob_choice: on that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - en aquella noche
  - esa noche
  - aquella noche
  lexicon: BDAG
  rationale: El demostrativo y el dativo temporal apuntan a una noche específica. «Aquella noche» es natural en español y mantiene la referencia definida mejor que una construcción más literal como «en aquella noche».
- source_word: ἔσονται δύο
  english_pob_choice: there will be two
  chosen_spanish: habrá dos
  alternatives_spanish:
  - serán dos
  - existirán dos
  lexicon: BDAG
  rationale: El valor existencial del griego se refleja de modo natural con «habrá dos». Evita una literalidad rígida y conserva el futuro del enunciado.
- source_word: ἐπὶ κλίνης μιᾶς
  english_pob_choice: on one bed
  chosen_spanish: en una misma cama
  alternatives_spanish:
  - sobre una cama
  - en una cama
  - sobre una misma cama
  lexicon: BDAG
  rationale: κλίνη puede significar cama o lecho/camilla. En este contexto nocturno, «cama» es la opción más clara para lectores hispanos. Se usa «en» en vez de «sobre» porque en español expresa mejor la situación de estar recostados, sin perder el sentido del lugar compartido. «Una misma» preserva el énfasis en la unidad del lecho.
- source_word: ὁ εἷς
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - el uno
  - uno de ellos
  lexicon: BDAG
  rationale: El artículo con numeral funciona sustantivamente; en español, «uno» es la forma más natural en la correlación «uno... el otro». Se evita «el uno» porque suena más marcado y menos fluido.
- source_word: παραλημφθήσεται
  english_pob_choice: will be taken
  chosen_spanish: será tomado[a]
  alternatives_spanish:
  - será llevado
  - será recogido
  - será tomado junto
  lexicon: BDAG
  rationale: El pasivo futuro de παραλαμβάνω puede expresar «tomar consigo» o «llevar/recibir». «Será tomado» conserva la brevedad y la ambigüedad del original. Se evita especificar si es para liberación o juicio, porque el griego no lo determina aquí.
- source_word: ὁ ἕτερος
  english_pob_choice: the other
  chosen_spanish: el otro
  alternatives_spanish:
  - el segundo
  - el restante
  lexicon: BDAG
  rationale: ἕτερος contrasta a una persona distinta con la primera. «El otro» es el correlato natural en español para esta pareja contrastiva.
- source_word: ἀφεθήσεται
  english_pob_choice: will be left
  chosen_spanish: será dejado[b]
  alternatives_spanish:
  - será abandonado
  - quedará
  - será dejado atrás
  lexicon: BDAG
  rationale: Aquí ἀφίημι no se usa con el sentido de «perdonar», sino de dejar/soltar. «Será dejado» reproduce la neutralidad del texto y evita añadir asociaciones escatológicas no explícitas. Se prefiere no usar «quedará» porque desplaza ligeramente el foco hacia un estado resultante más que al acto de ser dejado.
theological_decisions:
- issue: Si el versículo identifica al tomado con salvación y al dejado con juicio, o viceversa
  english_pob_reading: 'The main text remains neutral: ''one will be taken, and the other will be left.'''
  chosen_spanish_reading: 'El texto principal permanece neutral: «uno será tomado y el otro será dejado».'
  alternative_spanish_readings:
  - el tomado es el salvo/liberado
  - el tomado es el juzgado
  - el dejado es el salvo/liberado
  - el dejado es el juzgado
  rationale: El griego no resuelve por sí mismo la dirección teológica de la acción. La traducción debe preservar esa tensión y no importar un esquema escatológico posterior al verso.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final fue marcado como sin cambios y con alto acuerdo entre revisiones, por lo que se conserva la solución existente con solo ajuste de formulación al español.
  spanish_consistency_notes:
  - Se mantiene el contraste binario «uno... el otro» para reflejar ὁ εἷς / ὁ ἕτερος.
  - Se conserva la ambigüedad de παραλημφθήσεται y ἀφεθήσεται sin orientar el sentido hacia salvación o juicio.
  - «Cama» se usa por claridad moderna; «lecho» sería posible, pero menos natural para lectores generales.
  - La puntuación con punto y coma refleja la estructura contrastiva del griego y del audit trail inglés.
