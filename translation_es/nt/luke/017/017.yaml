review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: continuidad narrativa («Entonces»), fórmula de habla («Jesús respondió»), pregunta retórica con expectativa afirmativa, y contraste entre el uno que volvió y los otros nueve. También mantiene correctamente la elección teológica de καθαρίζω como ‘cleansed’ y no ‘healed’.'
  spanish_quality_summary: El español es claro y natural, pero «fueron limpiados» suena algo físico/doméstico en este contexto y pierde parte del matiz cultual y bíblico de καθαρίζω en relatos de lepra. «Quedaron limpios» suena más idiomático y conserva mejor la idea de resultar limpios sin reducirla a mera sanidad. El resto de la frase es fluido y digno.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Jesús» está correcto. La principal cuestión léxica es καθαρίζω: conviene ajustar de «fueron limpiados» a «quedaron limpios» para representar mejor el valor bíblico-contextual de limpieza/restauración. La nota alternativa puede mantenerse, con leve pulido idiomático.'
  issues:
  - severity: medium
    issue: «fueron limpiados» para ἐκαθαρίσθησαν
    rationale: Aunque es comprensible y cercano al inglés ‘were cleansed’, en español suena menos idiomático en el relato de leprosos y puede evocar una limpieza física literal. «quedaron limpios» conserva mejor el resultado pasivo y el matiz bíblico de limpieza.
  - severity: low
    issue: Redacción de la nota alternativa
    rationale: «todos los diez hechos limpios» es entendible, pero más natural en español es «los diez quedaron limpios» o «todos los diez quedaron limpios». Conviene pulirla para legibilidad sin alterar el sentido.
  revised_spanish_text: 'Entonces Jesús respondió[a]: «¿No quedaron limpios los diez? ¿Y los nueve, dónde están?»'
  revised_footnotes:
  - marker: a
    text: 'O: «¿No quedaron limpios todos los diez?»'
    reason: lexical_alternative
  revision_rationale: Se recomienda una corrección menor para mejorar la fidelidad léxica y la naturalidad en español. «Quedaron limpios» representa mejor καθαρίζω en este contexto de lepra que «fueron limpiados», y la nota alternativa se ajusta a un español más idiomático.
