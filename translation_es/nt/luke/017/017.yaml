revisions:
- from: 'Entonces Jesús respondió[a]: «¿No fueron limpiados los diez? ¿Y los nueve, dónde están?»'
  to: 'Entonces Jesús respondió[a]: «¿No quedaron limpios los diez? ¿Y los nueve, dónde están?»'
  rationale: Se recomienda una corrección menor para mejorar la fidelidad léxica y la naturalidad en español. «Quedaron limpios» representa mejor καθαρίζω en este contexto de lepra que «fueron limpiados», y la nota alternativa se ajusta a un español más idiomático.
  reviewer_model: gpt-5.4
