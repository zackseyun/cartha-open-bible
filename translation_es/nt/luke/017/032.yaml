    reason: cross_reference
  revision_rationale: Se reemplaza «Recuerden a» por «Acuérdense de» para lograr un español más natural y exhortativo en este contexto, sin perder el sentido del imperativo griego. Se corrige la nota léxica para que aporte una alternativa real y útil, reflejando mejor la construcción más literal documentada en la auditoría inglesa.
