lexical_decisions:
- source_word: μνημονεύετε
  english_pob_choice: Remember
  chosen_spanish: Recuerden
  alternatives_spanish:
  - Recuerden siempre
  - Tengan presente
  - Recuerden constantemente
  lexicon: BDAG
  rationale: El imperativo presente plural pide una exhortación continua. En español, «Recuerden» comunica de manera natural y directa el llamado a mantener presente el ejemplo advertido, sin añadir paráfrasis innecesaria.
- source_word: τῆς γυναικὸς
  english_pob_choice: wife
  chosen_spanish: la esposa
  alternatives_spanish:
  - la mujer
  - la mujer de Lot
  lexicon: BDAG
  rationale: 'Aunque γυνή puede significar «mujer» o «esposa», el genitivo con el nombre propio Lot señala claramente la relación conyugal. En español, «la esposa de Lot» sería la forma más explícita, pero la economía de la frase permite «la esposa» con Lot implícito en el contexto del versículo; aun así, para claridad pública y fidelidad al sentido, se mantiene el nombre propio en el texto completo: «la esposa de Lot».'
- source_word: Λώτ
  english_pob_choice: Lot
  chosen_spanish: Lot
  alternatives_spanish:
  - Lot
  lexicon: uso bíblico estándar
  rationale: El nombre propio se translitera como «Lot», conforme al uso bíblico en español y al criterio de conservar nombres propios sin adaptación interpretativa.
theological_decisions:
- issue: Forma del mandato y fuerza del allusion to Genesis 19:26
  english_pob_reading: 'A concise imperative preserving Jesus''s direct appeal to the Genesis narrative: ''Remember Lot''s wife.'''
  chosen_spanish_reading: 'Un mandato breve y directo: «Recuerden a la esposa de Lot».'
  alternative_spanish_readings:
  - Acuérdense de la esposa de Lot.
  - Recuerden la esposa de Lot.
  rationale: El versículo funciona como advertencia alusiva a Génesis 19:26. «Recuerden» preserva la fuerza exhortativa del presente imperativo plural. No hay término doctrinalmente disputado; la decisión principal es mantener una formulación breve, natural y fiel al valor admonitorio del texto.
  doctrine_reference: Lucas 17:32; Génesis 19:26; filosofía de traducción optimal equivalence
translation_notes:
  revision_awareness: El texto griego es breve y estable; la revisión inglesa no introdujo cambios textuales ni variantes significativas. Se siguió el mismo sentido general del POB inglés, ajustando la sintaxis para un español natural y público.
  spanish_consistency_notes:
  - Se mantiene «Lot» como nombre propio transliterado estándar.
  - Se conserva el mandato en plural para reflejar μνημονεύετε.
  - No se introduce «Cristo», «SEÑOR» ni otras equivalencias no presentes en el verso.
