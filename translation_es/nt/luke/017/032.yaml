review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido básico de μνημονεύετε τῆς γυναικὸς Λώτ como advertencia breve alusiva a Génesis 19:26. Sin embargo, en español bíblico natural, el complemento de «recordar/recuerden» aquí no lleva «a»; la forma más fiel y idiomática es «Recuerden[b] la esposa de Lot[a]» o, mejor para el estilo natural, «Recuerden[b] a la esposa de Lot»? No: el griego usa genitivo de objeto con μνημονεύω, y el inglés documenta como alternativa literal «the wife of Lot». En español, el problema principal no es semántico sino sintáctico: con «recordar» en este uso exhortativo, la formulación más natural y directa es «Acuérdense de la esposa de Lot[a][b]».'
  spanish_quality_summary: El texto actual es comprensible, pero «Recuerden a la esposa de Lot» suena menos natural en este contexto admonitorio que «Acuérdense de la esposa de Lot». Además, la nota a repite exactamente el texto principal y no ofrece una verdadera alternativa; debe señalar la construcción más literal «la mujer de Lot» o «la esposa de Lot» según corresponda. Hay también un pequeño error de redacción en las decisiones teológicas («allusion to» mezclado con inglés), aunque eso no afecta el texto final.
  glossary_alignment: No hay términos del glosario mayor en juego. «esposa» para γυνή y «Lot» para Λώτ están bien alineados con la evidencia y con el razonamiento auditado. La revisión propuesta mantiene esa alineación y mejora la naturalidad española.
  issues:
  - severity: medium
    issue: La formulación «Recuerden a la esposa de Lot» es poco natural en español para este mandato exhortativo.
    rationale: Aunque es comprensible, en español idiomático bíblico y general se prefiere «Acuérdense de…» para este tipo de llamada memorial. Esto preserva mejor la fuerza admonitoria breve del griego sin sonar forzado.
  - severity: medium
    issue: La nota a no presenta una alternativa real; repite esencialmente el texto principal.
    rationale: 'Una nota de alternativa léxica debe aportar una variante significativa. Aquí conviene conservar la observación del inglés sobre la formulación más literal: «la mujer/esposa de Lot».'
  revised_spanish_text: Acuérdense de la esposa de Lot[a][b].
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «Acuérdense de la mujer de Lot».'
    reason: lexical_alternative
