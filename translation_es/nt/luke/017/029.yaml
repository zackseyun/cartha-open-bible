translation:
  language: es
  text: pero el día en que Lot salió de Sodoma[a], llovió fuego y azufre del cielo y los destruyó a todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, 'fuego y azufre llovieron del cielo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾗ δὲ ἡμέρᾳ
  english_pob_choice: but on the day
  chosen_spanish: pero en el día en que
  alternatives_spanish:
  - y en el día en que
  - el mismo día en que
  lexicon: BDAG
  rationale: 'La frase dativa relativa es temporal: ''en el día en que''. Conservé δέ con ''pero'' para reflejar la leve transición o contraste del contexto, sin forzar un contraste fuerte.'
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue fuera
  - partió
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι expresa una salida concreta. 'Salió' es natural en español y mantiene la acción de movimiento.
- source_word: Λὼτ
  english_pob_choice: Lot
  chosen_spanish: Lot
  alternatives_spanish:
  - Loṭ
  lexicon: Transliteración estándar
  rationale: Nombre propio tradicionalmente transliterado como Lot en español bíblico.
- source_word: ἀπὸ Σοδόμων
  english_pob_choice: from Sodom
  chosen_spanish: de Sodoma
  alternatives_spanish:
  - desde Sodoma
  - fuera de Sodoma
  lexicon: BDAG
  rationale: 'Aunque el griego tiene forma plural originaria, en español el topónimo se usa idiomáticamente en singular: ''Sodoma''. ''De Sodoma'' comunica de manera natural la procedencia.'
- source_word: ἔβρεξεν
  english_pob_choice: rained
  chosen_spanish: llovió
  alternatives_spanish:
  - hizo llover
  - cayó lluvia de
  lexicon: BDAG
  rationale: βρέχω se usa aquí impersonalmente con los objetos 'fuego y azufre'. 'Llovió' reproduce bien la imagen sin añadir un sujeto explícito.
- source_word: πῦρ καὶ θεῖον
  english_pob_choice: fire and sulfur
  chosen_spanish: fuego y azufre
  alternatives_spanish:
  - fuego y brimstone
  - fuego y piedra de azufre
  lexicon: BDAG
  rationale: θεῖον significa 'azufre'. 'Fuego y azufre' es la traducción más directa y transparente; evita el arcaísmo de 'brimstone' y conserva la imagen de juicio.
- source_word: ἀπ’ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - desde los cielos
  lexicon: BDAG
  rationale: οὐρανός puede ser 'cielo' o 'cielo/heaven' según contexto. Aquí, para una lectura natural en español y fiel al movimiento descendente, 'desde el cielo' funciona bien; el contexto bíblico de juicio mantiene la alusión elevada sin requerir el término 'cielo' en sentido doctrinal especial.
- source_word: ἀπώλεσεν πάντας
  english_pob_choice: destroyed them all
  chosen_spanish: los destruyó a todos
  alternatives_spanish:
  - los destruyó por completo
  - destruyó a todos
  lexicon: BDAG
  rationale: ἀπόλλυμι aquí significa 'destruir'. Dado el referente humano implícito, 'los destruyó a todos' expresa con claridad el objeto directo y conserva la fuerza total de πάντας.
theological_decisions:
- issue: Allusion to Genesis judgment language
  english_pob_reading: fire and sulfur rained from heaven
  chosen_spanish_reading: llovió fuego y azufre desde el cielo
  alternative_spanish_readings:
  - llovió fuego y azufre del cielo
  - llovieron fuego y azufre desde el cielo
  rationale: La formulación conserva la alusión a Génesis 19:24 sin importar la expresión tradicional 'fuego y azufre' por una formulación menos precisa. 'Desde el cielo' mantiene el sentido de juicio que desciende de arriba.
  doctrine_reference: Translation philosophy §1 y §6
- issue: Range of ἀπόλλυμι in a judgment narrative
  english_pob_reading: destroyed them all
  chosen_spanish_reading: los destruyó a todos
  alternative_spanish_readings:
  - los hizo perecer a todos
  - los arruinó por completo
  rationale: En este contexto narrativo, ἀπόλλυμι expresa destrucción real, no mera pérdida. 'Los destruyó a todos' mantiene la fuerza judicial del texto sin sobreinterpretar.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece anclado en el texto español en ''Sodoma[a]''. La redacción sigue de cerca el griego y el audít trail inglés, manteniendo la alternativa tradicional como nota.'
  spanish_consistency_notes:
  - Se usa 'azufre' para θεῖον por transparencia léxica, evitando 'brimstone' en español.
  - '''Cielo'' traduce οὐρανοῦ de forma natural y conserva la imaginería bíblica de juicio.'
  - '''Los destruyó a todos'' refleja el valor de πάντας con referente humano implícito.'
  - El nombre propio se normaliza como 'Sodoma' en español, aunque el griego sea plural en origen.
