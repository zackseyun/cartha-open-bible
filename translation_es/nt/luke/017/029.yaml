review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: conserva la relación temporal de ᾗ δὲ ἡμέρᾳ, la salida de Lot, la lluvia de fuego y azufre, el origen desde arriba y la destrucción total. Sin embargo, hay un desajuste menor con el audit trail inglés en ἀπ’ οὐρανοῦ: el inglés documenta deliberadamente ''from heaven'', mientras que el español usa ''desde el cielo''. En español bíblico-natural, ''del cielo'' preserva mejor la idiomaticidad escritural y la cercanía al fundamento documentado sin sonar arcaico.'
  spanish_quality_summary: El texto es claro y legible, pero 'pero en el día en que' suena algo pesado; 'pero el día en que' es más natural. También 'desde el cielo' es aceptable, pero 'del cielo' fluye mejor en este contexto y encaja mejor con la alusión bíblica. La nota al pie debe corresponder exactamente al texto revisado y mantener la alternativa tradicional de manera idiomática en español.
  glossary_alignment: No hay términos del glosario maestro en conflicto directo. 'Lot', 'Sodoma', 'fuego y azufre' y 'destruyó' están bien. La cuestión principal es estilística y de alineación con la decisión documentada sobre οὐρανός ('heaven'), mejor representada aquí como 'cielo' en la forma idiomática 'del cielo'.
  issues:
  - severity: medium
    issue: '''pero en el día en que'' es innecesariamente calcado'
    rationale: Aunque es comprensible, en español natural la construcción temporal se expresa mejor como 'pero el día en que', sin pérdida de sentido temporal ni del matiz de δέ.
  - severity: medium
    issue: '''desde el cielo'' no refleja tan bien la decisión auditada ''from heaven'' como ''del cielo'''
    rationale: El griego ἀπ’ οὐρανοῦ se documentó en inglés como 'from heaven' por su idiomaticidad bíblica y su alusión a Génesis. En español, 'del cielo' preserva mejor esa resonancia que 'desde el cielo'.
  - severity: low
    issue: La nota al pie puede sonar más idiomática con 'del cielo'
    rationale: Si el texto principal se revisa a 'del cielo', la alternativa tradicional también debe ajustarse para consistencia y mejor español bíblico.
  revised_spanish_text: pero el día en que Lot salió de Sodoma[a], llovió fuego y azufre del cielo y los destruyó a todos.
  revised_footnotes:
  - marker: a
    text: O, más tradicionalmente, 'fuego y azufre llovieron del cielo'.
    reason: lexical_alternative
  revision_rationale: La revisión hace el español más natural ('pero el día en que') y alinea mejor ἀπ’ οὐρανοῦ con la decisión documentada del POB ('from heaven') mediante 'del cielo', que en español suena más bíblico e idiomático que 'desde el cielo'. Se conserva intacto el sentido fuente y la alternativa tradicional de la nota.
