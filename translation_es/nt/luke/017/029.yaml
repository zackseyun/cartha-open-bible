revisions:
- from: pero en el día en que Lot salió de Sodoma[a], llovió fuego y azufre desde el cielo y los destruyó a todos.
  to: pero el día en que Lot salió de Sodoma[a], llovió fuego y azufre del cielo y los destruyó a todos.
  rationale: La revisión hace el español más natural ('pero el día en que') y alinea mejor ἀπ’ οὐρανοῦ con la decisión documentada del POB ('from heaven') mediante 'del cielo', que en español suena más bíblico e idiomático que 'desde el cielo'. Se conserva intacto el sentido fuente y la alternativa tradicional de la nota.
