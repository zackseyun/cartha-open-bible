translation:
  language: es
  text: 'Y los apóstoles dijeron al Señor[a][b]: «Aumenta nuestra fe».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Añádenos fe». El verbo griego es literalmente «añadir», pero aquí la idea idiomática es de incremento.'
    reason: lexical_alternative
  - marker: b
    text: «Fe» también puede entenderse como «confianza»; «fidelidad» es una posibilidad semántica menos probable en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: Conecta la escena de manera simple y narrativa, sin añadir una relación temporal que el griego no explicita.
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - estaban diciendo
  - hablaron
  lexicon: BDAG
  rationale: 'El aoristo narrativo se expresa naturalmente en español con un pretérito simple: ''dijeron''.'
- source_word: οἱ ἀπόστολοι
  english_pob_choice: the apostles
  chosen_spanish: los apóstoles
  alternatives_spanish:
  - los emisarios
  - los mensajeros
  lexicon: BDAG
  rationale: '''Apóstoles'' es el equivalente establecido para ἀπόστολοι en Lucas-Hechos y conserva el valor técnico del grupo de Jesús.'
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al maestro
  lexicon: BDAG
  rationale: Se mantiene el título cristológico y de respeto con 'Señor', que corresponde al uso doctrinal habitual de κύριος en este contexto.
- source_word: Πρόσθες
  english_pob_choice: Increase
  chosen_spanish: Auméntanos
  alternatives_spanish:
  - Añádenos
  - Aumenta nuestra fe
  lexicon: BDAG
  rationale: El imperativo de προστίθημι es literalmente 'añadir', pero en esta petición idiomática el sentido es pedir un incremento de la fe; en español 'aumentarnos' conserva la fuerza directa y natural de la súplica.
- source_word: ἡμῖν
  english_pob_choice: our
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  - nuestra
  lexicon: BDAG
  rationale: El dativo 'a nosotros' queda incorporado de forma natural en el verbo pronominal 'auméntanos'.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la confianza
  - la fidelidad
  lexicon: BDAG
  rationale: '''Fe'' es el rendering principal para πίστις en este pasaje; ''confianza'' y ''fidelidad'' quedan como matices semánticos posibles, pero no son la opción principal aquí.'
theological_decisions:
- issue: Renderización de κύριος referido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - maestro
  rationale: '''Señor'' conserva tanto el trato reverente como el peso cristológico de κύριος; ''maestro'' debilitaría ese alcance.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος *Kyrios* → Lord'
- issue: Renderización de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: La petición de los apóstoles se entiende mejor como un pedido de mayor fe; 'confianza' es posible en algunos contextos, y 'fidelidad' es menos probable aquí, pero se preserva como matiz semántico.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις *pistis* → faith'
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registran cambios sustantivos respecto del sentido auditado; se mantiene la equivalencia óptima entre la literalidad de προστίθημι y el valor idiomático de la petición.'
  spanish_consistency_notes:
  - Se usa 'Señor' para κύριος de manera consistente con la terminología doctrinal del proyecto.
  - Se preserva 'fe' para πίστις en el texto principal, dejando 'confianza' y 'fidelidad' solo en nota, como en el audit trail inglés.
  - La construcción española 'Auméntanos la fe' expresa de forma natural el dativo 'a nosotros' sin perder la fuerza de la petición.
