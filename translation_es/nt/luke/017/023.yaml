  spanish_quality_summary: 'El español es claro y natural, pero «No vayan allá» suena algo redundante tras «allí/aquí» y estrecha innecesariamente el sentido. «No se vayan» suena más idiomático, fiel y sobrio. También conviene ajustar la puntuación del discurso directo a una forma más natural en español con coma antes del segundo miembro: «“Miren, allí”, o “Miren, aquí”».'
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones «les dirán», «Miren», «allí/aquí» y «los sigan» son en general adecuadas. La única corrección léxica importante es cambiar «No vayan allá» por «No se vayan» para respetar mejor ἀπέλθητε sin añadir localización.
  issues:
  - severity: medium
    issue: «No vayan allá» añade un adverbio de destino no presente en el griego
    rationale: μὴ ἀπέλθητε prohíbe irse/alejarse, pero no dice «allá». Añadir «allá» estrecha el sentido y duplica innecesariamente la deíxis ya expresada en «allí/aquí».
  - severity: medium
    issue: Falta una nota que preserve que el objeto de «seguir» no está expreso en griego
    rationale: El English POB documenta esta decisión léxica; como el español también explicita «los», debe conservarse la transparencia traductológica con una nota equivalente.
  - severity: low
    issue: Puntuación del discurso directo mejorable
    rationale: En español suena más natural «“Miren, allí”, o “Miren, aquí”» que usar punto y coma dentro de la cita en esta construcción breve.
