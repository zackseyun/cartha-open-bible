translation:
  language: es
  text: 'Y les dirán: «Miren, allí», o «Miren, aquí». No se vayan ni los sigan[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No se vayan ni persigan». El griego deja sin expresar el objeto de «sigan/persigan».'
    reason: alternativa_lexica_y_transparencia_sobre_objeto_implicito
lexical_decisions:
- source_word: ἐροῦσιν
  english_pob_choice: they will say
  chosen_spanish: les dirán
  alternatives_spanish:
  - dirán
  - les van a decir
  lexicon: BDAG
  rationale: El futuro de λέγω se expresa de manera natural con «dirán». Se conserva el destinatario con «les» para reflejar ὑμῖν y la introducción de discurso directo sin añadir matiz de información más allá de «decir».
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Fíjense
  lexicon: BDAG
  rationale: Ἰδού funciona como llamado de atención. «Miren» es natural en español actual y conserva la fuerza deictica mejor que un calco solemne como «he aquí» o «hebehold».
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: BDAG
  rationale: Adverbio distal simple. «Allí» mantiene el contraste con «aquí» de forma clara y sobria.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - acá
  - en este lugar
  lexicon: BDAG
  rationale: Adverbio proximal contrastivo. «Aquí» conserva la oposición breve con «allí» y suena idiomático en español bíblico contemporáneo.
- source_word: μὴ ἀπέλθητε
  english_pob_choice: Do not go away
  chosen_spanish: No vayan allá
  alternatives_spanish:
  - No se vayan
  - No se alejen
  lexicon: BDAG
  rationale: ἀπέρχομαι aquí prohíbe irse en respuesta a los reclamos de ubicación. «No vayan allá» reproduce el movimiento en una forma natural para el español y evita una expresión demasiado general; el adverbio «allá» enlaza con las supuestas indicaciones de lugar del versículo.
- source_word: μηδὲ διώξητε
  english_pob_choice: or run after them
  chosen_spanish: ni los sigan
  alternatives_spanish:
  - ni los persigan
  - ni corran tras ellos
  lexicon: BDAG
  rationale: διώκω puede significar perseguir o seguir tras alguien/algo. En este contexto de avisos engañosos, «sigan» comunica la advertencia práctica sin exagerar el tono; el objeto explícito «los» refleja el complemento implícito que el griego no expresa de manera visible.
theological_decisions:
- issue: Cómo traducir las dos exclamaciones deícticas sin perder su carácter de falsa alarma
  english_pob_reading: ‘Look, there!’ or ‘Look, here!’
  chosen_spanish_reading: “Miren, allí”; o “Miren, aquí”.
  alternative_spanish_readings:
  - “Vean, allí”; o “Vean, aquí”.
  - “He aquí, allí”; o “He aquí, aquí”.
  rationale: La intención del versículo es advertir contra anuncios que pretenden localizar al Hijo del Hombre. «Miren» conserva la urgencia y la inmediatez del original sin cargar el texto con un registro arcaico innecesario.
  doctrine_reference: Translation philosophy §6
- issue: Si explicitar el objeto de διώξητε en español
  english_pob_reading: 'Supply the implicit object in English: ''run after them'''
  chosen_spanish_reading: «ni los sigan»
  alternative_spanish_readings:
  - «ni los persigan»
  - «ni corran tras ellos»
  rationale: El griego deja implícito el objeto, pero el español necesita una referencia clara. «Los» es una decisión de claridad contextual, no una adición doctrinal; apunta a quienes difunden o acompañan los reclamos de localización.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail en inglés, pero adapta ἀπέλθητε a una prohibición idiomática en español («No vayan allá») y mantiene διώξητε con un complemento explícito natural («los sigan»). Se preserva el paralelo deíctico entre «allí» y «aquí» y la estructura de dos avisos alternativos.
  spanish_consistency_notes:
  - Se evita «he aquí» por su tono arcaizante, salvo que el contexto exija una forma litúrgica fija; aquí no es necesario.
  - Se mantiene el plural de trato («Miren», «vayan», «sigan») para concordar con ὑμῖν y los verbos plurales del griego.
  - Se usa «allí/aquí» como contraste principal; «allá» aparece solo en la primera prohibición para reflejar movimiento hacia un lugar señalado de forma engañosa.
