translation:
  language: es
  text: Pero uno de ellos[a], al ver que había sido sanado, volvió, glorificando a Dios a gran voz,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alabando a Dios». El verbo griego puede significar «glorificar» o «dar alabanza/gloria».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷς δὲ ἐξ αὐτῶν
  english_pob_choice: But one of them
  chosen_spanish: Pero uno de ellos
  alternatives_spanish:
  - Y uno de ellos
  - Ahora bien, uno de ellos
  lexicon: BDAG
  rationale: εἷς ἐξ αὐτῶν expresa claramente que fue uno entre varios; δὲ aporta un giro narrativo suave. "Pero" conserva esa transición y suena natural en español.
- source_word: ἰδὼν
  english_pob_choice: seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - cuando vio
  lexicon: BDAG
  rationale: El participio aoristo se adapta bien con "al ver", que mantiene la relación temporal sin sobrerrepresentarla.
- source_word: ὅτι ἰάθη
  english_pob_choice: that he had been healed
  chosen_spanish: que había sido sanado
  alternatives_spanish:
  - que fue sanado
  - que había sido curado
  lexicon: BDAG
  rationale: ἰάθη es pasivo aoristo de ἰάομαι. "Había sido sanado" refleja la acción completada antes de su regreso y conserva el matiz de sanidad/curación sin forzar una diferencia terminológica inexistente en el español.
- source_word: ὑπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - dio la vuelta
  lexicon: BDAG
  rationale: En este contexto narrativo, "volvió" es idiomático y comunica bien el retorno hacia Jesús.
- source_word: μετὰ φωνῆς μεγάλης
  english_pob_choice: with a loud voice
  chosen_spanish: con voz muy alta
  alternatives_spanish:
  - en voz alta
  - con gran voz
  lexicon: BDAG
  rationale: La expresión idiomática se traduce de forma natural. "Con voz muy alta" conserva la intensidad del griego sin sonar demasiado rígido.
- source_word: δοξάζων τὸν θεόν
  english_pob_choice: glorifying God
  chosen_spanish: glorificando a Dios
  alternatives_spanish:
  - alabando a Dios
  - dando gloria a Dios
  lexicon: BDAG
  rationale: δοξάζω mantiene el campo de la gloria; "glorificando" preserva esa conexión mejor que limitarlo a "alabando". "A Dios" refleja el objeto directo personal en español.
theological_decisions:
- issue: Rendering of τὸν θεόν
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios verdadero
  rationale: No hay expansión doctrinal en el versículo; el texto simplemente afirma que el hombre glorificó a Dios. "Dios" es la traducción suficiente y precisa de θεός aquí.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español. No se introdujeron otras modificaciones textuales ni notas adicionales.
  spanish_consistency_notes:
  - Se mantuvo una construcción natural en español con el participio "al ver" y el adverbial "con voz muy alta".
  - '"Glorificando" conserva el vínculo semántico con δοξάζω, en línea con la decisión inglesa y con el campo de gloria en español bíblico contemporáneo.'
  - Se evitó sustituir "Dios" por una perífrasis más interpretativa, porque el griego no añade mayor especificación.
