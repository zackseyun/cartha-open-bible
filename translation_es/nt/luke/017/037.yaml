translation:
  language: es
  text: 'Y respondiendo, le dijeron: «¿Dónde, Señor?» Y él les dijo: «Donde esté el cuerpo[a], allí también se reunirán los buitres[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cuerpo» también podría traducirse «cadáver», lo que haría más explícita la imagen de aves carroñeras.
    reason: lexical_alternative
  - marker: b
    text: O «águilas». La palabra griega puede designar águilas, pero en este contexto de aves reunidas alrededor de un cuerpo, «buitres» comunica mejor el sentido probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθέντες
  english_pob_choice: answering
  chosen_spanish: respondiendo
  alternatives_spanish:
  - contestando
  - dando respuesta
  lexicon: BDAG
  rationale: El participio introduce la réplica de los discípulos. «Respondiendo» conserva la función participial del griego y suena natural en español; «contestando» o «dando respuesta» serían posibles, pero menos fluidos aquí.
- source_word: λέγουσιν
  english_pob_choice: they say
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le dicen
  - le respondieron
  lexicon: BDAG
  rationale: Aunque el presente histórico puede mantenerse en español, aquí la forma narrativa fluye mejor en pretérito. El sentido del intercambio se conserva sin perder vivacidad.
- source_word: Ποῦ
  english_pob_choice: Where
  chosen_spanish: ¿Dónde?
  alternatives_spanish:
  - ¿En qué lugar?
  - ¿Adónde?
  lexicon: BDAG
  rationale: La pregunta pide ubicación. «¿Dónde?» es la forma más natural y directa en español.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En el vocativo dirigido a Jesús, «Señor» refleja el tratamiento del griego κύριε y conserva la terminología cristológica habitual del español bíblico sin sustituirla innecesariamente.
- source_word: Ὅπου
  english_pob_choice: Where
  chosen_spanish: Donde
  alternatives_spanish:
  - Allí donde
  - Allá donde
  lexicon: BDAG
  rationale: La construcción proverbial en español se expresa con «Donde», que mantiene la relación local sin añadir matices distributivos que el griego no exige explícitamente.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cadáver
  - cuerpo muerto
  lexicon: BDAG
  rationale: «Cuerpo» sigue de cerca el término griego. Aunque el contexto sugiere un cuerpo muerto, el español puede dejar que esa implicación surja de la imagen, sin resolverla demasiado pronto con «cadáver».
- source_word: ἀετοὶ
  english_pob_choice: vultures
  chosen_spanish: buitres
  alternatives_spanish:
  - águilas
  - aves rapaces
  lexicon: BDAG
  rationale: Como en el inglés POB, el contexto de carroña favorece «buitres» para comunicar la imagen con claridad. Se preserva la tensión léxica con la alternativa tradicional de «águilas» en una nota.
- source_word: ἐπισυναχθήσονται
  english_pob_choice: will be gathered
  chosen_spanish: se reunirán
  alternatives_spanish:
  - serán reunidos
  - se congregarán
  lexicon: BDAG
  rationale: El futuro pasivo puede expresarse de forma natural en español con «se reunirán». Esta opción conserva el movimiento de juntarse en torno al cuerpo y resulta idiomática en una imagen proverbial.
theological_decisions:
- issue: Imagen proverbial y sentido interpretativo
  english_pob_reading: Translate the imagery straightforwardly without specifying whether it refers to Roman armies, final judgment, or a general principle of inevitable exposure and judgment.
  chosen_spanish_reading: Traducir la imagen de manera llana, sin precisar si alude a ejércitos romanos, al juicio final o a un principio general de exposición inevitable y juicio.
  alternative_spanish_readings:
  - Referir la imagen a las aves carroñeras alrededor de un cadáver como proverbio general
  - Entenderla como alusión escatológica al juicio
  - Entenderla como alusión a poderes invasores como Roma
  rationale: El griego no identifica el referente de la imagen. La traducción mantiene la ambigüedad interpretativa y evita cerrar el pasaje con una explicación doctrinal o histórica que el texto no impone.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios adicionales; se mantiene la solución óptima ya validada y coherente con el audit trail inglés.
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριε, en línea con la terminología bíblica española habitual y con el tratamiento dirigido a Jesús.
  - Se mantiene la tensión entre «cuerpo» y la posible idea de «cadáver», sin forzar la explicitación en el texto principal.
  - Se usa «buitres» en el texto principal y se documenta «águilas» como alternativa léxica relevante.
  - La puntuación y el orden reflejan un español natural sin perder el paralelismo proverbial del griego.
