base_translation:
  language: en
  yaml_path: translation/nt/luke/017/037.yaml
  text: And answering[a], they say to him, “Where, Lord?” And he said to them, “Where the body is[b], there also the vultures will be gathered.”
  footnotes:
  - marker: a
    text: Or “eagles.” The Greek word can denote eagles, but in this context of birds gathering around a body, “vultures” likely conveys the sense more clearly.
    reason: lexical_alternative
  - marker: b
    text: “Body” could also be rendered “corpse,” making the image of carrion birds more explicit.
    reason: lexical_alternative
