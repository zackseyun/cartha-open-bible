review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis y el flujo del griego: οὕτως καὶ ὑμεῖς = «Así también ustedes»; ὅταν ποιήσητε… λέγετε = «cuando hayan hecho… digan»; πάντα τὰ διαταχθέντα ὑμῖν = «todo lo que se les ha mandado»; y πεποιήκαμεν = «hemos hecho». Sin embargo, el punto principal se desvía en ἀχρεῖοι. El expediente inglés documenta que aquí el sentido preferido es ‘unworthy’, es decir, sin mérito ni derecho a recompensa, no ‘inútiles’ en el sentido más directo de inutilidad o falta de valor. La nota al pie ya reconoce alternativas, pero el texto principal debería reflejar la decisión auditada.'
  spanish_quality_summary: El español es mayormente claro y digno. No obstante, «Somos esclavos inútiles» suena más duro y más fácilmente malinterpretable en español actual que el sentido pretendido del pasaje. «Indignos» o una formulación equivalente comunica mejor la falta de mérito ante el amo/Dios. También conviene corregir el espacio antes del punto final de cierre de comillas.
  glossary_alignment: '«Esclavos» alinea correctamente con el término de proyecto para δοῦλοι en este contexto. No hay términos divinos en disputa aquí. El problema de alineación terminológica y teológica está en ἀχρεῖοι: el borrador se aparta de la decisión POB ‘unworthy’ y de su razón doctrinal. La nota b puede conservar «deber» como alternativa; el texto principal «debíamos hacer» es aceptable.'
  issues:
  - severity: high
    issue: Renderización principal de ἀχρεῖοι como «inútiles»
    rationale: En español, «inútiles» tiende a afirmar inutilidad o falta de valor intrínseco. El expediente inglés selecciona ‘unworthy’ para expresar ausencia de mérito o de derecho a recompensa. «Indignos» preserva mejor esa intención contextual y teológica.
  - severity: low
    issue: Puntuación final con espacio indebido
    rationale: Hay un espacio antes del punto en «» .», lo cual es incorrecto en español.
  - severity: medium
    issue: Nota al pie a no prioriza la alternativa que mejor explica el sentido contextual
    rationale: Si el texto principal se corrige a «indignos», la nota debe presentar como alternativas «sin provecho» o «inútiles»/«sin valor», explicando que el griego puede señalar falta de provecho o ausencia de derecho a recompensa.
  revised_spanish_text: 'Así también ustedes, cuando hayan hecho todo lo que se les ha mandado, digan: «Somos esclavos[a] indignos; hemos hecho lo que debíamos hacer[b]».'
  revised_footnotes:
  - marker: a
    text: O «esclavos sin provecho» o «esclavos inútiles». El adjetivo griego puede expresar la idea de no ser de provecho o de no tener derecho a recompensa.
    reason: lexical_alternative
  - marker: b
    text: O «lo que era nuestro deber hacer».
    reason: lexical_alternative
  revision_rationale: 'Se revisa ἀχρεῖοι de «inútiles» a «indignos» para ajustarse a la decisión lexical y teológica documentada en el expediente inglés: el énfasis es que los discípulos no adquieren mérito ni derecho a recompensa por obedecer. Se conserva «esclavos» por fidelidad a δοῦλοι en este contexto. También se corrige la puntuación final y se armoniza la nota al pie con la nueva elección principal.'
