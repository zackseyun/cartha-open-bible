revisions:
- from: 'Así también ustedes, cuando hayan hecho todo lo que se les ha mandado, digan: «Somos esclavos[a] inútiles; hemos hecho lo que debíamos hacer[b]» .'
  to: 'Así también ustedes, cuando hayan hecho todo lo que se les ha mandado, digan: «Somos esclavos[a] indignos; hemos hecho lo que debíamos hacer[b]».'
