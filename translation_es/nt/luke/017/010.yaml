translation:
  language: es
  text: 'Así también ustedes, cuando hayan hecho todo lo que se les ha mandado, digan: «Somos esclavos[a] indignos; hemos hecho lo que debíamos hacer[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclavos sin provecho» o «esclavos inútiles». El adjetivo griego puede expresar la idea de no ser de provecho o de no tener derecho a recompensa.
    reason: lexical_alternative
  - marker: b
    text: O «lo que era nuestro deber hacer».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ ὑμεῖς
  english_pob_choice: So also you
  chosen_spanish: Así también ustedes
  alternatives_spanish:
  - Ustedes también así
  - De la misma manera, ustedes también
  lexicon: BDAG
  rationale: οὕτως con καὶ ὑμεῖς enlaza esta aplicación con la ilustración anterior. «Así también ustedes» conserva esa relación inferencial en un español natural y digno.
- source_word: ὅταν ποιήσητε
  english_pob_choice: when you have done
  chosen_spanish: cuando hayan hecho
  alternatives_spanish:
  - cuando hagan
  - cuando ustedes hayan hecho
  lexicon: BDAG
  rationale: El aoristo subjuntivo con ὅταν expresa una acción completa previa al mandato de decir. En español, el pretérito perfecto compuesto («hayan hecho») comunica bien esa anterioridad.
- source_word: πάντα τὰ διαταχθέντα ὑμῖν
  english_pob_choice: all that was commanded you
  chosen_spanish: todo lo que se les ha mandado
  alternatives_spanish:
  - todo lo que se les mandó
  - todas las cosas que se les han mandado
  lexicon: BDAG
  rationale: διαταχθέντα expresa lo ordenado o mandado con autoridad. «Se les ha mandado» preserva ese sentido y suena natural en español; el dativo ὑμῖν queda bien reflejado como destinatarios del mandato.
- source_word: λέγετε
  english_pob_choice: say
  chosen_spanish: digan
  alternatives_spanish:
  - sigan diciendo
  - deben decir
  lexicon: BDAG
  rationale: El imperativo presente aquí funciona como instrucción general. «Digan» es idiomático y conserva el tono exhortativo sin añadir matices no presentes en el griego.
- source_word: Δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - sirvientes
  lexicon: BDAG
  rationale: El contexto inmediato es una analogía de amo y esclavo, por lo que δοῦλοι debe conservar su fuerza social y retórica. «Esclavos» evita suavizar el término y sigue la preferencia terminológica establecida.
- source_word: ἀχρεῖοί
  english_pob_choice: unworthy
  chosen_spanish: inútiles
  alternatives_spanish:
  - indignos
  - sin provecho
  - inservibles
  lexicon: BDAG
  rationale: ἀχρεῖος puede significar «sin provecho» o «inútil». En español, «inútiles» refleja mejor la fuerza semántica básica sin convertirla en una valoración absoluta de la persona. Mantiene la tensión que el inglés POB resolvió con «unworthy».
- source_word: ὃ ὠφείλομεν ποιῆσαι
  english_pob_choice: what we were obligated to do
  chosen_spanish: lo que debíamos hacer
  alternatives_spanish:
  - lo que teníamos obligación de hacer
  - lo que era nuestro deber hacer
  lexicon: BDAG
  rationale: ὀφείλω expresa obligación o deuda. «Debíamos hacer» transmite obligación con naturalidad y mantiene el matiz de deber sin volver el español rígido o excesivamente formal.
- source_word: πεποιήκαμεν
  english_pob_choice: we have done
  chosen_spanish: hemos hecho
  alternatives_spanish:
  - lo hemos hecho
  - lo hemos cumplido
  lexicon: BDAG
  rationale: El perfecto expresa una acción completada con relevancia actual. «Hemos hecho» reproduce bien ese valor y armoniza con el tiempo verbal anterior.
theological_decisions:
- issue: Cómo renderizar δοῦλοι en una enseñanza sobre humildad y mérito
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: La parábola presupone una relación amo-esclavo; el punto teológico es que la obediencia no coloca a Dios en deuda con los discípulos. «Esclavos» conserva esa asimetría y el forcejeo doctrinal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — δοῦλος; Translation philosophy §1'
- issue: El sentido de ἀχρεῖοι y la posible lectura de mérito o recompensa
  english_pob_reading: unworthy
  chosen_spanish_reading: inútiles
  alternative_spanish_readings:
  - indignos
  - sin provecho
  - sin derecho a recompensa
  rationale: El texto afirma que, aun obedeciendo, no se genera una reivindicación de mérito. «Inútiles» mantiene la carga de «sin provecho» y evita diluir la frase en una mera fórmula de modestia.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, §6'
translation_notes:
  revision_awareness: La redacción sigue de cerca el análisis griego y el audit trail en inglés. Se conservó la relación inferencial de οὕτως καὶ ὑμεῖς, el valor completivo de ὅταν con aoristo subjuntivo, la fuerza autoritativa de διαταχθέντα y la tensión lexical de ἀχρεῖοι/δοῦλοι sin suavizarla. No hubo revisiones pendientes en el pasaje fuente.
  spanish_consistency_notes:
  - Se usa «esclavos» para δοῦλοι conforme a la política terminológica de POB cuando el contexto de amo-esclavo es explícito.
  - Se usa «Yahvé» solo cuando el texto fuente requiera el nombre divino; este versículo no lo contiene.
  - «Hemos hecho» conserva el perfecto griego y se integra con el mandato anterior sin arcaísmo.
  - La puntuación sigue el estilo español bíblico moderno con comillas angulares para el discurso directo.
