translation:
  language: es
  text: 'Al contrario[a], ¿no le dirá: «Prepara mi cena, y cíñete[b] y sírveme hasta que haya comido y bebido[c], y después de eso comerás y beberás tú»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por el contrario». La frase griega introduce un contraste retórico fuerte.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cíñete»; la imagen es la de recoger la ropa para trabajar.
    reason: cultural_note
  - marker: c
    text: O «hasta que coma y beba». El griego puede expresarse más literalmente así, aunque el perfecto compuesto resalta mejor la acción completada antes del turno del otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’ οὐχὶ
  english_pob_choice: On the contrary, will he not
  chosen_spanish: Al contrario, ¿no le dirá
  alternatives_spanish:
  - Pero, ¿no le dirá
  - Más bien, ¿no le dirá
  lexicon: BDAG
  rationale: La combinación introduce una pregunta retórica con contraste y expectativa de respuesta afirmativa. «Al contrario» conserva bien la fuerza adversativa de ἀλλά; «¿no le dirá?» reproduce οὐχί con naturalidad en español.
- source_word: ἐρεῖ αὐτῷ
  english_pob_choice: will he ... say to him
  chosen_spanish: ¿no le dirá
  alternatives_spanish:
  - ¿no le hablará
  - ¿no le dirá a él
  lexicon: BDAG
  rationale: λέγω aquí es «decir». En español, «decirle» o «le dirá» mantiene la introducción del discurso directo sin sobreinterpretar el verbo.
- source_word: Ἑτοίμασον τί δειπνήσω
  english_pob_choice: Prepare my supper
  chosen_spanish: Prepara mi cena
  alternatives_spanish:
  - Prepara mi comida
  - Prepara la cena para mí
  lexicon: BDAG
  rationale: El infinitivo de propósito con τί δειπνήσω en este contexto apunta a la comida principal nocturna; «cena» refleja mejor el matiz contextual que una formulación más genérica. «Prepara mi cena» mantiene la concreción y el tono natural en español.
- source_word: περιζωσάμενος
  english_pob_choice: gird yourself
  chosen_spanish: cíñete
  alternatives_spanish:
  - ciñe tus vestidos
  - prepárate para el servicio
  lexicon: BDAG
  rationale: El participio alude a ceñirse la ropa para trabajar. «Cíñete» conserva la imagen corporal concreta; en español bíblico es claro y fiel sin sonar excesivamente arcaico.
- source_word: διακόνει μοι
  english_pob_choice: serve me
  chosen_spanish: sírveme
  alternatives_spanish:
  - atiéndeme
  - hazme el servicio
  lexicon: BDAG
  rationale: Aquí διακονέω es servicio de mesa. «Sírveme» es la opción más natural y precisa; evita el tono eclesiástico que tendría «ministrar».
- source_word: ἕως φάγω καὶ πίω
  english_pob_choice: until I have eaten and drunk
  chosen_spanish: hasta que haya comido y bebido
  alternatives_spanish:
  - hasta que coma y beba
  - hasta que haya acabado de comer y beber
  lexicon: BDAG
  rationale: Los subjuntivos aoristos con ἕως marcan acción completa antes del siguiente turno. El pretérito perfecto compuesto en español («haya comido y bebido») expresa bien esa culminación anterior.
- source_word: μετὰ ταῦτα
  english_pob_choice: after that
  chosen_spanish: después de esto
  alternatives_spanish:
  - luego de eso
  - entonces
  lexicon: BDAG
  rationale: Expresión temporal simple y directa. «Después de esto» es plenamente idiomática y reproduce el valor secuencial.
- source_word: φάγεσαι καὶ πίεσαι σύ
  english_pob_choice: you will eat and drink
  chosen_spanish: comerás y beberás tú
  alternatives_spanish:
  - tú comerás y beberás
  - entonces comerás y beberás
  lexicon: BDAG
  rationale: Los futuros medios tienen sentido futuro aquí. La colocación final de «tú» refleja el énfasis del σύ, sin volver pesada la frase.
theological_decisions:
- issue: Presencia implícita del rol social en la escena
  english_pob_reading: Render the actions and commands directly without inserting 'servant' or 'slave' into the verse beyond what the Greek explicitly states.
  chosen_spanish_reading: Traducir las órdenes de manera directa sin añadir un sustantivo como «siervo» o «esclavo» que el griego de este versículo no expresa explícitamente.
  alternative_spanish_readings:
  - «ese esclavo»
  - «ese siervo»
  rationale: El versículo usa pronombres y mandatos; el estatus del personaje queda implícito por el contexto inmediato. Mantener la referencia implícita evita importar un sustantivo no presente y respeta la precisión del original.
  doctrine_reference: Principio de primacía del texto original; no añadir contenido discursivo que el versículo no enuncia.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que cambió «something for me to eat» por «my supper» para reflejar con mayor precisión τί δειπνήσω en este contexto. Por eso el español adopta «mi cena» en vez de una formulación genérica. También se mantuvo la equivalencia del resto de la cláusula con especial atención a la secuencia aspectual y al énfasis del pronombre explícito.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aplica aquí.
  - Se evitó introducir «siervo» o «esclavo» porque el versículo no emplea un sustantivo de ese tipo.
  - «sírveme» se eligió por su valor de servicio de mesa, no como término eclesiástico.
