  text: ἀλλ’ οὐχὶ ἐρεῖ αὐτῷ· Ἑτοίμασον τί δειπνήσω καὶ περιζωσάμενος διακόνει μοι ἕως φάγω καὶ πίω, καὶ μετὰ ταῦτα φάγεσαι καὶ πίεσαι σύ;
base_translation:
  language: en
  yaml_path: translation/nt/luke/017/008.yaml
  text: On the contrary[a], will he not say to him, ‘Prepare my supper, and gird yourself and serve me until I have eaten and drunk[b], and after that you will eat and drink’?”
  footnotes:
  - marker: a
    text: Or 'dress yourself for service'; literally 'gird yourself,' referring to tying up one's garments in preparation for work.
    reason: cultural_note
  - marker: b
    text: Or 'until I eat and drink.' The Greek can be rendered more literally this way; 'have eaten and drunk' brings out the sense of completed action before the servant's turn.
    reason: lexical_alternative
