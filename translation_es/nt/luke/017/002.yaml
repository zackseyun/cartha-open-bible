translation:
  language: es
  text: Sería mejor para él que le colgaran una piedra de molino[a] al cuello y lo arrojaran al mar, más bien que haga tropezar[b] a uno de estos pequeños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «una gran piedra de molino». La expresión griega puede referirse a la piedra más pesada usada en un molino.
    reason: lexical_alternative
  - marker: b
    text: O «hacer que uno de estos pequeños caiga en pecado». El verbo griego puede incluir la idea de provocar caída en pecado o ruina espiritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: λυσιτελεῖ
  english_pob_choice: it would be better
  chosen_spanish: sería mejor
  alternatives_spanish:
  - sería más provechoso
  - sería más conveniente
  lexicon: BDAG
  rationale: La expresión comunica comparación de conveniencia o preferencia. «Sería mejor» es natural en español y conserva el sentido comparativo sin introducir matices de utilidad económica o técnica que el contexto no exige.
- source_word: λίθος μυλικὸς
  english_pob_choice: a millstone
  chosen_spanish: una piedra de molino
  alternatives_spanish:
  - una muela de molino
  - una gran piedra de molino
  lexicon: BDAG
  rationale: El sintagma designa una piedra usada en un molino. «Piedra de molino» es claro y fiel en español; la nota mantiene la posibilidad de una piedra de molino más grande o pesada sin sobrecargar el texto principal.
- source_word: περίκειται περὶ τὸν τράχηλον αὐτοῦ
  english_pob_choice: were hung around his neck
  chosen_spanish: le colgaran ... del cuello
  alternatives_spanish:
  - le pusieran ... alrededor del cuello
  - estuviera ... alrededor del cuello
  lexicon: BDAG
  rationale: 'En español, la imagen queda natural con una pasiva impersonal en subjuntivo: «le colgaran». Mantiene la idea resultante de tenerla suspendida alrededor del cuello, que es la fuerza idiomática del griego en este contexto.'
- source_word: ἔρριπται εἰς τὴν θάλασσαν
  english_pob_choice: he were thrown into the sea
  chosen_spanish: lo arrojaran al mar
  alternatives_spanish:
  - lo echaran al mar
  - fuera arrojado al mar
  lexicon: BDAG
  rationale: '«Mar» es el equivalente natural de θάλασσα en español. La coordinación con la primera cláusula pide una construcción paralela e impersonal: «lo arrojaran al mar», que preserva el resultado violento del verbo.'
- source_word: σκανδαλίσῃ
  english_pob_choice: should cause ... to stumble
  chosen_spanish: hacer tropezar
  alternatives_spanish:
  - hacer caer en pecado
  - escandalizar
  - hacer caer
  lexicon: BDAG
  rationale: El verbo incluye la idea de causar tropiezo o caída moral. «Hacer tropezar» conserva la metáfora del tropiezo y evita resolver de antemano si el énfasis es físico, moral o espiritual. La alternativa más explícita se deja para nota.
- source_word: τῶν μικρῶν τούτων ἕνα
  english_pob_choice: one of these little ones
  chosen_spanish: a uno de estos pequeños
  alternatives_spanish:
  - a uno de estos pequeños niños
  - a uno de estos humildes
  lexicon: BDAG
  rationale: «Pequeños» reproduce el valor básico de μικροί sin especificar edad o categoría más de lo que el texto permite. «Uno de estos pequeños» conserva la amplitud referencial que el audit trail inglés también preserva.
theological_decisions:
- issue: Alcance de «estos pequeños»
  english_pob_reading: Render generically as 'these little ones' without specifying children only or believers only.
  chosen_spanish_reading: Traducir de manera genérica como «estos pequeños», sin decidir si se refiere solo a niños o también a discípulos/humildes.
  alternative_spanish_readings:
  - estos niños
  - estos humildes creyentes
  - estos discípulos
  rationale: El griego no identifica explícitamente el grupo más allá de «pequeños». La traducción debe preservar esa amplitud y no resolver una cuestión interpretativa que el texto por sí mismo deja abierta.
  doctrine_reference: Preservar la tensión interpretativa sin imponer una identificación más estrecha.
translation_notes:
  revision_awareness: 'Alineado con el pasaje fuente y con el audit trail inglés: se preserva la comparación de conveniencia, la imagen concreta de la piedra de molino y el sentido amplio de σκανδαλίζω sin cerrar indebidamente el alcance de «estos pequeños».'
  spanish_consistency_notes:
  - Se usa «mar» para θάλασσα, conforme al uso bíblico natural en español.
  - Se mantiene un registro neutral y digno, sin lenguaje eclesiástico que cierre la ambigüedad del pasaje.
  - La sintaxis impersonal con subjuntivo conserva el tono proverbial/hipotético del original.
