    issue: 'La cláusula comparativa final está mal construida: «que hacer tropezar...»'
    rationale: 'El griego ἢ ἵνα introduce el segundo término de la comparación: ''mejor... que...''. En español, tras «Sería mejor para él que...», la secuencia «, que hacer tropezar...» queda sintácticamente defectuosa y no expresa bien la comparación verbal/subjuntiva.'
  - severity: medium
    issue: La nota b usa singular masculino («hacerlo caer en pecado»)
    rationale: El referente es «a uno de estos pequeños», pero la nota explica el verbo de forma genérica. En español suena mejor y más exacto «hacer que uno de estos pequeños caiga en pecado» o «causar que caiga en pecado», evitando un pronombre ambiguo.
