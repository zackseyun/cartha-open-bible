    text: Or more specifically, 'a large millstone.' The Greek phrase can refer to the heavier millstone used in a mill.
    reason: lexical_alternative
  - marker: b
    text: Or 'cause one of these little ones to sin.' The Greek verb includes the sense of causing someone to fall into sin or spiritual ruin.
    reason: lexical_alternative
