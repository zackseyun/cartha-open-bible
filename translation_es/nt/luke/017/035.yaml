  rationale: La revisión hace dos ajustes estilístico-léxicos menores para mejorar la naturalidad del español sin cambiar el sentido fuente ni la decisión teológica documentada. «Será llevada» evita la rigidez de «será tomada», y «será dejada atrás» expresa con mayor naturalidad la separación del contexto, manteniendo la pasiva y la ambigüedad interpretativa.
