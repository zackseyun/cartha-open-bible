translation:
  language: es
  text: Habrá dos mujeres moliendo juntas[a]; una será llevada[b], pero la otra será dejada atrás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el mismo lugar». La expresión griega puede significar «juntas» o «en el mismo lugar».
    reason: lexical_alternative
  - marker: b
    text: «Será llevada» no especifica por sí mismo si la acción es para salvación o para juicio; el griego deja eso al contexto más amplio.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔσονται
  english_pob_choice: There will be
  chosen_spanish: Habrá
  alternatives_spanish:
  - Serán
  - Existirán
  lexicon: BDAG
  rationale: El futuro de εἰμί introduce la escena de manera existencial; en español, «habrá» expresa con naturalidad esa introducción futura sin perder el valor temporal.
- source_word: δύο
  english_pob_choice: two women
  chosen_spanish: dos mujeres
  alternatives_spanish:
  - dos
  lexicon: BDAG
  rationale: El numeral es simplemente «dos», pero el participio femenino plural exige referentes femeninos; «mujeres» hace explícito el rasgo de género que el griego ya marca.
- source_word: ἀλήθουσαι
  english_pob_choice: grinding
  chosen_spanish: moliendo
  alternatives_spanish:
  - moliendo grano
  - moliendo cereal
  - molinando
  lexicon: BDAG
  rationale: El participio presente de ἀλήθω se refiere a moler, normalmente grano o harina. «Moliendo» es breve, natural y suficientemente fiel sin añadir un objeto que el texto no expresa.
- source_word: ἐπὶ τὸ αὐτό
  english_pob_choice: together
  chosen_spanish: juntas
  alternatives_spanish:
  - en el mismo lugar
  - juntamente
  lexicon: BDAG
  rationale: El modismo puede significar «juntas» o «en el mismo lugar». En esta escena doméstica, «juntas» es la forma más idiomática en español y conserva la idea de simultaneidad/compañía.
- source_word: παραλημφθήσεται
  english_pob_choice: will be taken
  chosen_spanish: será tomada
  alternatives_spanish:
  - será llevada con
  - será recibida
  lexicon: BDAG
  rationale: El futuro pasivo de παραλαμβάνω se rinde de modo transparente con «será tomada». Mantiene la ambigüedad del griego sobre si la acción implica salvación o juicio.
- source_word: ἀφεθήσεται
  english_pob_choice: will be left
  chosen_spanish: será dejada
  alternatives_spanish:
  - será abandonada
  - quedará
  lexicon: BDAG
  rationale: El futuro pasivo de ἀφίημι puede significar «dejar» o «dejar atrás». «Será dejada» preserva la neutralidad semántica y evita inferencias interpretativas no presentes en el verso.
theological_decisions:
- issue: La dirección teológica de «tomada» y «dejada» (salvación vs. juicio)
  english_pob_reading: Use the formally transparent 'one will be taken, but the other will be left' without specifying the theological valence of either state.
  chosen_spanish_reading: Usar «una será tomada, pero la otra será dejada» sin precisar si la toma es para salvación o para juicio.
  alternative_spanish_readings:
  - una será tomada en juicio, pero la otra será perdonada
  - una será tomada para salvación, pero la otra será dejada para juicio
  rationale: El versículo solo afirma la separación; no determina la carga teológica de «tomada» y «dejada». La traducción debe conservar esa tensión para que el contexto amplio decida el sentido.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca anclado exactamente en el texto español: [a] en «juntas[a]» y [b] en «tomada[b]». No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - 'Se mantuvo el contraste breve y paralelo del griego: «una será tomada, pero la otra será dejada».'
  - Se evitó «dejada atrás» porque añade una inferencia espacial no requerida por el griego.
  - Se eligió «mujeres» para reflejar el participio femenino plural y evitar ambigüedad en español.
  - No se usó «Cristo», «SEÑOR» ni terminología doctrinal ajena al pasaje.
