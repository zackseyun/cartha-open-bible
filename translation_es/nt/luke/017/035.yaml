    issue: «Será tomada» suena poco idiomático en este contexto.
    rationale: Aunque es formalmente posible, en español actual aplicado a una persona en este tipo de construcción resulta más natural «será llevada» o «será llevada consigo». «Será llevada» conserva mejor la fluidez sin fijar la valencia teológica.
