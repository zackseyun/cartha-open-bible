    rationale: Aunque es comprensible, en español general y eclesial suena más idiomático «era inútil para ti» o «fue inútil para ti». La forma con pronombre átono no refleja tan limpiamente la estructura contrastiva del versículo.
  - severity: low
    issue: La combinación «te fue inútil ... para ti» divide innecesariamente la correspondencia entre las dos mitades
    rationale: El original tiene un paralelismo claro con dativos en ambos lados. Usar «para ti» en ambas mitades ayuda a percibir mejor el contraste retórico completo.
