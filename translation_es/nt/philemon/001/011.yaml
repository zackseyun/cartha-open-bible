translation:
  language: es
  text: quien una vez era inútil[a] para ti, pero ahora es útil tanto para ti como para mí,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Probablemente Pablo alude al nombre Onésimo, que está relacionado con la idea de ser útil o provechoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: τόν / ὁ (anaphoric article)
  english_pob_choice: who
  chosen_spanish: quien
  alternatives_spanish:
  - el que
  - aquel que
  lexicon: BDAG
  rationale: El artículo acusativo funciona de modo substantivado y remite a Onésimo del versículo anterior; en español, «quien» mantiene bien la referencia personal y la continuidad natural de la frase.
- source_word: ποτέ
  english_pob_choice: once
  chosen_spanish: una vez
  alternatives_spanish:
  - antes
  - en otro tiempo
  lexicon: BDAG
  rationale: «Una vez» expresa el contraste temporal con νυνί de forma breve y idiomática en español, sin añadir matices no presentes en el griego.
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: BDAG
  rationale: 'Con ἄχρηστον, el dativo personal se expresa de manera natural en español con pronombre átono: «te fue inútil». Mantiene la relación directa y evita una construcción pesada.'
- source_word: ἄχρηστον
  english_pob_choice: useless
  chosen_spanish: inútil
  alternatives_spanish:
  - no útil
  - improductivo
  - sin provecho
  lexicon: BDAG
  rationale: «Inútil» comunica el contraste léxico con εὔχρηστον y conserva la fuerza de «no útil» sin sonar arcaico o explicativo.
- source_word: νυνὶ δὲ
  english_pob_choice: but now
  chosen_spanish: pero ahora
  alternatives_spanish:
  - y ahora
  - mas ahora
  lexicon: BDAG
  rationale: «Pero ahora» reproduce con claridad el contraste temporal y adversativo de νυνὶ δέ en español contemporáneo.
- source_word: σοὶ καὶ ἐμοὶ
  english_pob_choice: to you and to me
  chosen_spanish: tanto para ti como para mí
  alternatives_spanish:
  - para ti y para mí
  - te y me
  lexicon: BDAG
  rationale: La repetición de la relación dativa se expresa con «tanto... como...» para conservar el paralelismo y la amplitud del beneficio sin sonar forzado.
- source_word: εὔχρηστον
  english_pob_choice: useful
  chosen_spanish: útil
  alternatives_spanish:
  - provechoso
  - aprovechable
  lexicon: BDAG
  rationale: «Útil» es el equivalente más directo y natural de εὔχρηστος/εὔχρηστον y preserva el juego verbal con ἄχρηστος («inútil»).
theological_decisions:
- issue: Juego de palabras con el nombre Onésimo y la transformación relacional
  english_pob_reading: Retain the simple useful/useless contrast in the main text
  chosen_spanish_reading: Mantener en el texto principal el contraste simple «inútil / útil» sin expandirlo interpretativamente
  alternative_spanish_readings:
  - «antes no te servía, pero ahora sí»
  - «antes fue de ningún provecho para ti, pero ahora es de provecho»
  rationale: El griego presenta el contraste de manera explícita; la traducción debe conservarlo sin sobreexplicar el posible juego de palabras con el nombre Onésimo. La brevedad preserva tanto la transparencia como la fuerza literaria del pasaje.
  doctrine_reference: 'Translation philosophy: optimal equivalence; no paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: La redacción sigue el ajuste de la auditoría inglesa que reforzó la coordinación «both to you and to me». En español se reflejó con «tanto para ti como para mí» para conservar el paralelismo y la claridad sin perder la economía del original.
  spanish_consistency_notes:
  - Se mantiene «útil / inútil» como par léxico principal, coherente con el contraste del griego y con la terminología proyectada para la POB en español.
  - Se usa «Yahvé» para el tetragrámaton en otros contextos del proyecto; aquí no aplica.
  - Se evita «siervo» porque el texto no contiene δοῦλος, y no corresponde introducir terminología servil ajena al versículo.
