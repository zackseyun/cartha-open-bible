translation:
  language: es
  text: Porque quizá por esto fue separado de ti por un tiempo, para que lo tuvieras de vuelta para siempre.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él partió de ti por un tiempo». El pasivo griego («fue separado») puede evitar atribuir culpa directa y también dejar abierta una posible intención divina implícita.'
    reason: alternative_reading
lexical_decisions:
- source_word: τάχα
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - quizás
  lexicon: BDAG
  rationale: Expresa con naturalidad la inferencia cautelosa de Pablo sin afirmar más de lo que dice el griego.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduzco la relación explicativa de manera fluida en español; aquí 'porque' funciona bien junto con la apertura modal 'quizá'.
- source_word: διὰ τοῦτο
  english_pob_choice: for this reason
  chosen_spanish: por un tiempo
  alternatives_spanish:
  - por esto
  - por tal razón
  lexicon: BDAG
  rationale: En este versículo la fuerza causal ya queda absorbida por la frase completa; el matiz temporal inmediato se expresa mejor con 'por un tiempo' en combinación con 'fue separado'.
- source_word: ἐχωρίσθη
  english_pob_choice: was separated
  chosen_spanish: fue separado
  alternatives_spanish:
  - se apartó
  - partió
  lexicon: BDAG
  rationale: 'La voz pasiva conserva la ambigüedad deliberada del griego: no asigna de forma directa la acción a Onésimo ni la resuelve explícitamente como providencia divina.'
- source_word: πρὸς ὥραν
  english_pob_choice: for a time
  chosen_spanish: por un tiempo
  alternatives_spanish:
  - por un momento
  - por una temporada
  lexicon: BDAG
  rationale: Es una expresión idiomática de duración limitada; 'por un tiempo' es la equivalencia más natural y fiel en español.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Indica propósito o resultado previsto; 'para que' es claro y idiomático en español.
- source_word: αἰώνιον
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - de por vida
  lexicon: BDAG
  rationale: Con ἀπέχῃς funciona de manera adverbial y contrasta con la separación temporal previa; 'para siempre' comunica bien esa duración continua.
- source_word: ἀπέχῃς
  english_pob_choice: you might have him back
  chosen_spanish: lo recuperaras
  alternatives_spanish:
  - lo recibieras de vuelta
  - lo tuvieras de nuevo
  lexicon: BDAG
  rationale: En este contexto el verbo apunta a tener/recibir de vuelta a una persona en relación restaurada; 'lo recuperaras' es conciso y natural, aunque mantiene la idea de restitución más que la de mera posesión.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Refiere a Onésimo como objeto directo en español.
theological_decisions:
- issue: Agencia implícita en el pasivo ἐχωρίσθη
  english_pob_reading: Retain the passive 'was separated' without explicitly naming God or Onesimus as the agent.
  chosen_spanish_reading: Conservar 'fue separado' sin explicitar el agente.
  alternative_spanish_readings:
  - se fue
  - Dios lo separó
  rationale: La redacción de Pablo deja abierta la posibilidad de una intención providencial sin decirlo de forma explícita. El español debe preservar esa tensión y no resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El archivo inglés reciente no requirió cambios sustanciales; la versión española mantiene la misma ambigüedad del pasivo y la misma oposición temporal/eterna, adaptadas con sintaxis natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando aparezca en el contexto inmediato, aunque este versículo no lo contiene.
  - Se evitó 'Cristo' y vocabulario eclesiástico tradicional no presente en el texto griego.
  - El objeto referido a Onésimo se traduce con pronombre átono ('lo') para un español natural y conciso.
  - La nota al pie se usa para reflejar la alternativa verbal y la tensión del pasivo, siguiendo el expediente inglés.
