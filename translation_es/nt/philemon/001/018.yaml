translation:
  language: es
  text: Pero si en algo te ha agraviado o te debe algo[a], cárgalo a mi cuenta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pon esto en mi cuenta». El verbo tiene un sentido contable de cargar o contabilizar algo a la cuenta de alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δέ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Ahora bien, si
  - Y si
  lexicon: BDAG
  rationale: εἰ introduce una condición y δέ añade una transición suave; «Pero si» reproduce bien el giro adversativo y suena natural en español.
- source_word: τι
  english_pob_choice: in any way
  chosen_spanish: en algo
  alternatives_spanish:
  - en algo que sea
  - de algún modo
  - en nada
  lexicon: BDAG
  rationale: El indefinido τι con ἠδίκησέν amplía la condición de forma no específica. «En algo» conserva esa amplitud sin sonar forzado en español.
- source_word: ἠδίκησέν σε
  english_pob_choice: he has wronged you
  chosen_spanish: te hizo daño
  alternatives_spanish:
  - te ha agraviado
  - te ha hecho injusticia
  - te ha perjudicado
  lexicon: BDAG
  rationale: ἀδικέω significa hacer mal, actuar injustamente o causar perjuicio. «Te hizo daño» expresa la ofensa de manera amplia y natural, aunque algo menos jurídica que «te ha agraviado».
- source_word: ἢ ὀφείλει
  english_pob_choice: or owes you anything
  chosen_spanish: o te debe algo
  alternatives_spanish:
  - o te debe cualquier cosa
  - o tiene una deuda contigo
  - o te es deudor
  lexicon: BDAG
  rationale: ὀφείλω aquí tiene fuerza de deuda u obligación. «Te debe algo» conserva el matiz económico/legal y evita sobrecargar la frase.
- source_word: ἐλλόγα
  english_pob_choice: charge this to me
  chosen_spanish: cárgalo a mi cuenta
  alternatives_spanish:
  - cárgalo a mí
  - ponlo en mi cuenta
  - imputámelo
  lexicon: BDAG
  rationale: 'ἐλλογέω es un término contable: asignar o cargar a una cuenta. «Cárgalo a mi cuenta» mantiene el campo semántico contable y el tono claro para el lector moderno.'
translation_notes:
  revision_awareness: Se corrigió el anclaje de nota al incluir [a] en el texto principal y se mantuvo el sentido contable explícito del verbo ἐλλογέω sin recurrir a «imputar», que sería más técnico y menos natural en español.
  spanish_consistency_notes:
  - Se mantuvo el trato en segunda persona singular, coherente con el griego y con la apelación personal de Pablo.
  - Se preservó el contraste condicional con «Pero si» para reflejar εἰ δέ.
  - Se conservó la metáfora económica/legal de ὀφείλει y ἐλλόγα mediante «debe» y «cárgalo a mi cuenta».
