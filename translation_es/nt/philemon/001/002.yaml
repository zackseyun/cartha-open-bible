translation:
  language: es
  text: 'y a Apia, la hermana[a], y a Arquipo, nuestro compañero de milicia, y a la iglesia en tu casa:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «nuestra hermana» en lugar de «la hermana».
    reason: textual_variant
lexical_decisions:
- source_word: Ἀπφίᾳ
  english_pob_choice: Apphia
  chosen_spanish: Apia
  alternatives_spanish:
  - Appia
  lexicon: BDAG
  rationale: Se conserva el nombre propio por transliteración, como en la tradición de traducción de nombres; «Apia» adapta la forma al español de manera natural y legible.
- source_word: ἀδελφῇ
  english_pob_choice: sister
  chosen_spanish: hermana
  alternatives_spanish:
  - hermana nuestra
  - querida hermana
  lexicon: BDAG
  rationale: El sustantivo significa «hermana». En español, «nuestra hermana» puede sonar más fluido si se adopta la lectura con posesivo, pero el griego dado no trae ἡμῶν; por eso el texto principal usa simplemente «hermana» y mantiene la posible variante en nota.
- source_word: Ἀρχίππῳ
  english_pob_choice: Archippus
  chosen_spanish: Arquipo
  alternatives_spanish:
  - Archipo
  lexicon: BDAG
  rationale: Nombre propio transliterado al español con forma eufónica y reconocible, en vez de traducirse o latinizarse de manera rígida.
- source_word: συστρατιώτῃ
  english_pob_choice: fellow soldier
  chosen_spanish: compañero de milicia
  alternatives_spanish:
  - compañero de armas
  - fellow soldier
  lexicon: BDAG
  rationale: El término conserva la imagen militar compartida. «Compañero de milicia» reproduce la relación de solidaridad guerrera sin suavizarla a un sentido meramente amistoso.
- source_word: ἐκκλησίᾳ
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: En este saludo epistolar, «iglesia» es el equivalente natural y establecido para la comunidad cristiana reunida. «Asamblea» es posible, pero menos idiomática aquí.
- source_word: κατ’ οἶκόν σου
  english_pob_choice: in your house
  chosen_spanish: que está en tu casa
  alternatives_spanish:
  - en tu casa
  - que se reúne en tu casa
  lexicon: BDAG
  rationale: La expresión señala la iglesia doméstica vinculada a la casa de Filemón. «Que está en tu casa» mantiene la cercanía al griego y comunica con claridad la ubicación sin añadir una glosa interpretativa en el texto principal.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: BDAG
  rationale: Se conserva la coordinación repetida para reflejar la estructura acumulativa del saludo.
- source_word: τῇ
  english_pob_choice: to
  chosen_spanish: a
  lexicon: Greek grammar
  rationale: El artículo dativo de destinatario se representa en español con la preposición «a», que es la forma natural de marcar el destinatario del saludo.
theological_decisions:
- issue: Si traducir ἀδελφῇ con un posesivo explícito («nuestra hermana») por la variante textual/tradicional
  english_pob_reading: sister; some manuscripts read our sister
  chosen_spanish_reading: hermana
  alternative_spanish_readings:
  - nuestra hermana
  rationale: El texto griego base dado lee τῇ ἀδελφῇ sin ἡμῶν. Por fidelidad al testimonio fuente, el cuerpo principal no añade posesivo, aunque se reconoce la variante textual en nota para no borrar la tensión documentada.
  doctrine_reference: Primacía del texto original; respeto por variantes textuales sin armonización automática.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT provisto y el audit trail inglés. No hubo revisiones aplicadas; la principal tensión documentada es la variante textual en ἀδελφῇ/ἡμῶν, que se preserva como nota sin introducirla en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene «a» para el destinatario en el saludo epistolar, en vez de repetir «para», para reflejar la sintaxis griega con naturalidad en español.
  - Se usa «iglesia» como término establecido para ἐκκλησία en este contexto, no «asamblea», porque el saludo va dirigido a la comunidad cristiana doméstica.
  - Los nombres propios se transliteran al español con formas naturales («Apia», «Arquipo») y no se traducen.
  - Se conserva la imagen militar de συστρατιώτῃ con «compañero de milicia», evitando una paráfrasis generalizada.
