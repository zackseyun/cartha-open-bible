translation:
  language: es
  text: porque oigo de tu amor y fe que tienes hacia el Señor Jesús y por todos los santos[a][b][c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente por el sentido: ''tu fe hacia el Señor Jesús y tu amor por todos los santos.'''
    reason: alternative_reading
  - marker: b
    text: O 'la fidelidad que tienes'. La palabra griega puede denotar fe, confianza o fidelidad.
    reason: lexical_alternative
  - marker: c
    text: O 'tu amor y la fe que tienes'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀκούων
  english_pob_choice: I hear
  chosen_spanish: oigo
  alternatives_spanish:
  - estoy oyendo
  - porque oigo
  - al oír
  lexicon: BDAG
  rationale: El participio presente se entiende en el flujo causal de la acción de gracias. En español, un verbo finito en primera persona reproduce mejor el valor idiomático que una forma participial pesada. 'Oigo' mantiene el presente y la relación causal implícita con 'porque'.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor
  - caridad
  lexicon: BDAG
  rationale: ἀγάπη se traduce normalmente como 'amor'. 'Caridad' sería más tradicional, pero en español contemporáneo puede sonar más restringido o eclesiástico y no refleja tan bien el uso paulino amplio.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fe
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: El proyecto base usa 'faith' como equivalente principal de πίστις; en español, el correlato natural y conciso es 'fe'. Se preserva la posible amplitud semántica con una nota sobre 'fidelidad'.
- source_word: πρὸς τὸν κύριον Ἰησοῦν
  english_pob_choice: toward the Lord Jesus
  chosen_spanish: hacia el Señor Jesús
  alternatives_spanish:
  - hacia el Señor Jesús
  - para con el Señor Jesús
  - al Señor Jesús
  lexicon: BDAG
  rationale: πρός con objeto personal puede expresar orientación o dirección. 'Hacia' conserva esa direccionalidad y distingue este matiz del siguiente εἰς. 'Señor' sigue el título cristológico estándar del pasaje.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el título cristológico 'Señor', que es el equivalente natural y reconocido en español bíblico para κύριος en este contexto.
- source_word: εἰς πάντας τοὺς ἁγίους
  english_pob_choice: for all the saints
  chosen_spanish: para todos los santos
  alternatives_spanish:
  - para todos los santos
  - hacia todos los santos
  - en favor de todos los santos
  lexicon: BDAG
  rationale: εἰς se vierte idiomáticamente como 'para' en este contexto relacional. 'Santos' conserva la designación neotestamentaria de los creyentes sin paráfrasis.
- source_word: ἁγίους
  english_pob_choice: saints
  chosen_spanish: santos
  alternatives_spanish:
  - santos
  - personas santas
  - los santos de Dios
  lexicon: BDAG
  rationale: '''Santos'' es la forma breve y establecida en español bíblico para ἅγιοι. Se evita una ampliación explicativa que el griego no exige.'
theological_decisions:
- issue: Relación sintáctica entre 'amor', 'fe' y las dos frases preposicionales
  english_pob_reading: 'The verse keeps the Greek surface order and preserves the likely tension: ''your love and faith that you have toward the Lord Jesus and for all the saints,'' while noting the more explicit distributive interpretation in a footnote.'
  chosen_spanish_reading: 'Se mantiene el orden superficial del griego: ''tu amor y la fe que tienes hacia el Señor Jesús y para todos los santos''. La nota recoge la lectura distributiva más explícita.'
  alternative_spanish_readings:
  - tu fe hacia el Señor Jesús y tu amor para con todos los santos
  - tu amor para todos los santos y la fe que tienes hacia el Señor Jesús
  rationale: El griego permite discutir si las frases preposicionales se distribuyen entre 'amor' y 'fe'. En vez de resolver la tensión en el texto principal, se conserva la secuencia del original y se documenta la interpretación más explícita en nota. Esto sigue la pauta del POB de no borrar una ambigüedad significativa.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente para hacer más natural la relación posesiva ('your love and faith') y otra que mantuvo la formulación causal 'because I hear of your love and faith...'. En español se optó por una redacción natural y publicable que conserva el valor causal de ἀκούων mediante 'porque oigo', mantiene la secuencia de las dos cualidades y deja la redistribución interpretativa en nota, sin resolverla de forma definitiva en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Señor Jesús' para κύριος Ἰησοῦς, coherente con el estándar cristológico del proyecto.
  - Se usa 'santos' para ἅγιοι, sin expandir a 'pueblo santo' o 'creyentes', para mantener la designación paulina concisa.
  - Se evita 'caridad' porque introduciría una tonalidad tradicional no exigida por el texto.
  - La preposición 'hacia' en la frase cristológica preserva el matiz direccional de πρός mejor que 'para' o 'en' en el cuerpo principal.
