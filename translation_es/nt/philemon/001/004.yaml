translation:
  language: es
  text: Siempre doy gracias a mi Dios[a], haciendo mención de ti en mis oraciones,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «recordándote en mis oraciones». El griego dice más literalmente «haciendo mención de ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐχαριστῶ
  english_pob_choice: I thank
  chosen_spanish: doy gracias
  alternatives_spanish:
  - te agradezco
  - agradezco
  lexicon: BDAG
  rationale: El verbo griego expresa acción de agradecer; en español, 'dar gracias' conserva bien la fuerza verbal y suena natural y reverente. 'Agradezco' sería posible, pero 'doy gracias' mantiene mejor el tono litúrgico y epistolar del pasaje.
- source_word: τῷ θεῷ μου
  english_pob_choice: my God
  chosen_spanish: a mi Dios
  alternatives_spanish:
  - a Dios mío
  - a mi Dios
  lexicon: BDAG
  rationale: 'El dativo con εὐχαριστέω requiere en español una preposición explícita: ''a mi Dios''. Se conserva el posesivo personal ''mi'', como expresión devocional directa, sin sustituirlo por una fórmula más eclesiástica.'
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - siempre
  - constantemente
  lexicon: BDAG
  rationale: '''Siempre'' comunica la constancia habitual del adverbio con naturalidad en español contemporáneo. ''Constantemente'' es más pesado y menos idiomático en esta fórmula.'
- source_word: μνείαν σου ποιούμενος
  english_pob_choice: making mention of you
  chosen_spanish: haciendo memoria de ti
  alternatives_spanish:
  - mencionándote
  - haciendo mención de ti
  lexicon: BDAG
  rationale: La expresión griega es literalmente 'haciendo mención de ti'. En español, 'haciendo memoria de ti' conserva la idea de recordarte activamente delante de Dios y resulta más natural que una calca pesada. 'Haciendo mención de ti' es una alternativa muy cercana, pero 'haciendo memoria de ti' comunica mejor el valor devocional de la frase.
- source_word: ἐπὶ τῶν προσευχῶν μου
  english_pob_choice: in my prayers
  chosen_spanish: en mis oraciones
  alternatives_spanish:
  - en mis oraciones
  - durante mis oraciones
  lexicon: BDAG
  rationale: 'La preposición con genitivo se entiende de modo idiomático como local/relacional: ''en mis oraciones''. ''Oraciones'' mantiene el sustantivo concreto y es más transparente para el lector español que repetir ''plegarias'' o una paráfrasis más libre.'
theological_decisions:
- issue: Dirección del agradecimiento a Dios y no a un destinatario humano
  english_pob_reading: I always thank my God
  chosen_spanish_reading: Siempre doy gracias a mi Dios
  alternative_spanish_readings:
  - Siempre agradezco a mi Dios
  - Siempre doy gracias a Dios
  rationale: Se conserva la relación devocional personal del hablante con 'mi Dios' y la dirección explícita del agradecimiento hacia Dios, no hacia Filemón ni hacia otra persona. 'A Dios' sin posesivo sería correcto, pero perdería el matiz personal que el griego y el inglés POB retienen.
  doctrine_reference: Oración y gratitud dirigidas a Dios
- issue: Sentido de la frase participial en contexto de oración
  english_pob_reading: making mention of you in my prayers
  chosen_spanish_reading: haciendo memoria de ti en mis oraciones
  alternative_spanish_readings:
  - haciéndome memoria de ti en mis oraciones
  - haciendo mención de ti en mis oraciones
  - recordándote en mis oraciones
  rationale: La frase no se reduce a un simple recuerdo mental; presenta una intercesión consciente y verbal delante de Dios. 'Haciendo memoria de ti' preserva ese acto intencional sin borrar la fuerza de 'mención'.
  doctrine_reference: Intercesión y memoria delante de Dios
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota [a] ahora está anclada en el texto español mediante el marcador exacto después de «mi Dios». Se mantuvo la lectura auditada del inglés POB, pero se ajustó el español para reflejar de forma natural la idiomática griega sin perder la alternativa literal documentada.'
  spanish_consistency_notes:
  - Se usó 'Dios' para θεῷ y no 'Señor'.
  - Se evitó 'Cristo' porque no aparece en el versículo.
  - '''Haciendo memoria de ti'' se eligió como equivalente natural de μνείαν σου ποιούμενος, con la alternativa literal registrada en nota.'
  - '''Oraciones'' traduce προσευχῶν de forma directa y transparente.'
  - La puntuación conserva la frase epistolar completa y el cierre con coma, coherente con el original griego.
