translation:
  language: es
  text: Pero sin tu consentimiento no quise hacer nada[a], para que tu buena acción[b] no fuera como por obligación, sino voluntaria[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin tu aprobación» o «sin tu opinión».
    reason: lexical_alternative
  - marker: b
    text: O «tu bondad» o «tu amabilidad»; el griego puede referirse al acto concreto que Filemón haga en este asunto o, de manera más abstracta, a su bondad.
    reason: lexical_alternative
  - marker: c
    text: Lit. «sino según lo voluntario»; es decir, «de tu propia voluntad».
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς ... τῆς σῆς γνώμης
  english_pob_choice: without your consent
  chosen_spanish: sin tu consentimiento
  alternatives_spanish:
  - sin tu aprobación
  - sin tu opinión
  lexicon: BDAG
  rationale: γνώμη puede significar opinión, juicio, intención o consentimiento/aprobación. Aquí Pablo habla de no actuar respecto de Onésimo sin la anuencia de Filemón; en español, «consentimiento» expresa bien esa fuerza volitiva y relacional sin perder naturalidad.
- source_word: οὐδὲν ἠθέλησα ποιῆσαι
  english_pob_choice: I wanted to do nothing
  chosen_spanish: no quise hacer nada
  alternatives_spanish:
  - no estuve dispuesto a hacer nada
  - decidí no hacer nada
  lexicon: BDAG
  rationale: ἠθέλησα expresa voluntad. «No quise hacer nada» conserva esa nuancia de voluntad personal en un español claro y directo, sin cargar indebidamente el verbo con la idea de una decisión formal o decreto.
- source_word: ἵνα μὴ
  english_pob_choice: so that ... might not
  chosen_spanish: para que ... no
  alternatives_spanish:
  - a fin de que ... no
  - de modo que ... no
  lexicon: BDAG
  rationale: La cláusula introduce propósito. «Para que ... no» es el equivalente natural en español y preserva la fuerza final sin arcaísmo.
- source_word: ὡς κατὰ ἀνάγκην
  english_pob_choice: as if by compulsion
  chosen_spanish: como por obligación
  alternatives_spanish:
  - como por compulsión
  - como bajo presión
  lexicon: BDAG
  rationale: ἀνάγκη aquí apunta a presión/compulsión más que a una necesidad abstracta. «Como por obligación» comunica bien el carácter no libre de la acción; la comparación introducida por ὡς se mantiene con «como».
- source_word: τὸ ἀγαθόν σου
  english_pob_choice: your good deed
  chosen_spanish: tu bien
  alternatives_spanish:
  - tu buena acción
  - tu bondad
  - tu bondad en este asunto
  lexicon: BDAG
  rationale: El artículo con el adjetivo neutro puede referirse al bien concreto que Filemón haría en respuesta a la petición, o más abstractamente a su bondad. «Tu bien» conserva esa amplitud mejor que una formulación demasiado específica, y evita fijar el referente más de lo que el griego permite.
- source_word: ᾖ
  english_pob_choice: might be
  chosen_spanish: fuera
  alternatives_spanish:
  - sería
  - estuviera
  lexicon: BDAG
  rationale: Tras ἵνα, el subjuntivo se expresa naturalmente en español con una subordinada final en imperfecto de subjuntivo. «Fuera» mantiene la finalidad y suena idiomático en este contexto.
- source_word: ἀλλὰ κατὰ ἑκούσιον
  english_pob_choice: but voluntary
  chosen_spanish: sino voluntario
  alternatives_spanish:
  - sino de buena voluntad
  - sino de manera voluntaria
  - sino por libre voluntad
  lexicon: BDAG
  rationale: ἑκούσιος denota lo hecho voluntariamente. «Voluntario» conserva el contraste con «por obligación» y sigue de cerca la forma breve del griego, sin perder el sentido de libertad de acción.
theological_decisions:
- issue: Libre voluntad frente a coerción en la respuesta de Filemón
  english_pob_reading: Paul wants Philemon's action to be voluntary, not forced.
  chosen_spanish_reading: Pablo quiere que el bien de Filemón no ocurra como por obligación, sino voluntariamente.
  alternative_spanish_readings:
  - Pablo quiere que no se le obligue a Filemón
  - Pablo quiere que su bondad sea libre, no forzada
  rationale: El versículo subraya el valor moral de una respuesta libre. La traducción debe conservar la tensión entre obligación y voluntariedad sin precisar indebidamente la clase exacta de acto, que el griego deja implícita.
  doctrine_reference: Translation philosophy items 1, 3 y 6
translation_notes:
  revision_awareness: El pasaje coincide en sentido general con el audit trail inglés y con la revisión más reciente, que no introdujo cambios. La versión española conserva la estructura causal-final, la oposición entre obligación y voluntariedad, y la ambigüedad controlada de τὸ ἀγαθόν σου.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «consentimiento» para γνώμη porque aquí el contexto relacional y volitivo es más preciso que «opinión» sola.
  - Se conserva la tensión semántica de τὸ ἀγαθόν σου con «tu bien», y se explica la alternativa concreta posible en nota.
  - «Voluntario» se reserva para el contraste con la coerción, siguiendo de cerca el paralelismo del griego.
