  text: χωρὶς δὲ τῆς σῆς γνώμης οὐδὲν ἠθέλησα ποιῆσαι, ἵνα μὴ ὡς κατὰ ἀνάγκην τὸ ἀγαθόν σου ᾖ ἀλλὰ κατὰ ἑκούσιον·
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/014.yaml
  text: But without your consent I wanted to do nothing[a], so that your good deed might not be as if by compulsion[c][b], but voluntary.
  footnotes:
  - marker: a
    text: Or 'without your approval' or 'without your opinion.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your goodness' or 'your kindness'; the Greek can refer either to Philemon's good action in this matter or, more abstractly, to his goodness.
    reason: lexical_alternative
  - marker: c
    text: Literally 'but according to what is voluntary'; that is, 'of your own free will.'
    reason: lexical_alternative
