translation:
  language: es
  text: 'Yo, Pablo, escribo[a] con mi propia mano: yo lo pagaré; por no decirte que además me debes tu propia persona.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Yo, Pablo, escribí con mi propia mano; yo lo pagaré; por no decirte que además me debes tu propia persona».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψα
  english_pob_choice: write
  chosen_spanish: escribo
  alternatives_spanish:
  - escribí
  - he escrito
  lexicon: BDAG
  rationale: En contexto epistolar, el griego aoristo puede funcionar como una referencia al acto de poner el saludo o la garantía autógrafa en la carta. En español, "escribo" suena natural y conserva el énfasis inmediato en la mano propia de Pablo, sin perder el valor de autenticidad personal.
- source_word: τῇ ἐμῇ χειρί
  english_pob_choice: with my own hand
  chosen_spanish: con mi propia mano
  alternatives_spanish:
  - de mi propia mano
  - con la propia mano
  lexicon: BDAG
  rationale: La expresión señala escritura autógrafa y refuerza la garantía personal. "Con mi propia mano" es la forma más natural y transparente en español; mantiene el énfasis de autoría personal sin rigidizar la frase.
- source_word: ἀποτίσω
  english_pob_choice: I will repay it
  chosen_spanish: yo lo pagaré
  alternatives_spanish:
  - yo lo repagaré
  - yo lo reembolsaré
  - yo lo restituiré
  lexicon: BDAG
  rationale: El verbo expresa saldar una deuda o compensar una pérdida. "Pagaré" comunica con claridad el compromiso financiero en español y evita una tecnicidad innecesaria; el pronombre "lo" conserva el referente implícito de la deuda o daño.
- source_word: ἵνα μὴ λέγω σοι
  english_pob_choice: not to mention to you
  chosen_spanish: para no decirte
  alternatives_spanish:
  - por no decirte
  - sin decirte
  - no es por decirte
  lexicon: BDAG
  rationale: La cláusula funciona retóricamente, no como finalidad estricta. "Para no decirte" mantiene la delicadeza irónica del giro paulino en español, acercándose a la función pragmática que el audit trail identifica.
- source_word: σεαυτόν
  english_pob_choice: your very self
  chosen_spanish: tu propia persona
  alternatives_spanish:
  - a ti mismo
  - tu propio ser
  - tu misma persona
  lexicon: BDAG
  rationale: El reflexivo intensificado por καί pide conservar el énfasis. "Tu propia persona" suena natural en español y preserva la fuerza de que la deuda alcanza al mismo Philemon, sin precisar indebidamente si se trata de conversión, vida o relación personal.
- source_word: προσοφείλεις
  english_pob_choice: you owe me
  chosen_spanish: me debes
  alternatives_spanish:
  - me eres deudor
  - me debes además
  - estás en deuda conmigo
  lexicon: BDAG
  rationale: El verbo indica una deuda adicional. "Me debes" es claro y directo en español; el matiz de añadidura queda reforzado por "además" y por el objeto intensificado "tu propia persona".
theological_decisions:
- issue: Naturaleza de la deuda de Filemón a Pablo en "tu propia persona"
  english_pob_reading: Retain the metaphorical/personal indebtedness without specifying conversion, salvation, or life-debt in the main text.
  chosen_spanish_reading: Mantener la deuda personal/metafórica sin precisar si se refiere a conversión, salvación, vida física o un beneficio general.
  alternative_spanish_readings:
  - Filemón le debe a Pablo su conversión
  - Filemón le debe a Pablo su vida física
  - Filemón tiene una deuda meramente económica o social
  rationale: El griego afirma con fuerza que existe una deuda adicional, pero no define su base exacta. La traducción española conserva esa ambigüedad controlada para no importar una interpretación doctrinal o histórica que el texto no explicita.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla por adelantado.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el resultado auditado en inglés y no introduce cambios de sentido. La principal adaptación es idiomática al español: se mantiene el tono epistolar, la garantía autógrafa y la ironía retórica, evitando añadir especificaciones sobre la naturaleza exacta de la deuda.'
  spanish_consistency_notes:
  - Se usa "Pablo" como nombre propio fijo y "Jesús" no aparece en este versículo.
  - Se mantiene "persona" en singular para reflejar el énfasis de σεαυτόν sin sobreinterpretar.
  - Se preserva el tono de promesa financiera con "pagaré" y no con una formulación eclesiástica más interpretativa.
