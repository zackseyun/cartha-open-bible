translation:
  language: es
  text: Por tanto, aunque tengo mucha franqueza en el Mesías[a] para mandarte lo que conviene[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Cristo». El título griego Χριστός puede verterse de las dos maneras; aquí se usa «Mesías» para preservar su sentido titular.
    reason: alternative_reading
  - marker: b
    text: O «lo que es apropiado» o «lo que es debido». El participio articular τὸ ἀνῆκον expresa lo que conviene o corresponde.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διό
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - Por consiguiente
  lexicon: BDAG
  rationale: La partícula inferencial introduce una conclusión lógica respecto de lo anterior. «Por tanto» conserva la relación discursiva y suena natural en español bíblico contemporáneo.
- source_word: πολλὴν ... παρρησίαν
  english_pob_choice: much boldness
  chosen_spanish: mucha confianza
  alternatives_spanish:
  - mucha valentía
  - mucha libertad para hablar
  - mucha franqueza
  lexicon: BDAG
  rationale: παρρησία abarca boldness, confidence y franqueza. En español, «confianza» comunica bien la seguridad personal del hablante sin endurecer innecesariamente el matiz de audacia; se mantiene el intensificador «mucha».
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no solo como nombre propio. Se traduce «Mesías» para conservar el valor titular, conforme al criterio del proyecto; el artículo español es natural en esta construcción.
- source_word: ἔχων
  english_pob_choice: though I have
  chosen_spanish: aunque tengo
  alternatives_spanish:
  - teniendo
  - ya que tengo
  lexicon: BDAG
  rationale: El participio tiene fuerza concesiva en el contexto. «Aunque tengo» reproduce esa concesión de manera idiomática en español y prepara el contraste implícito del verso siguiente.
- source_word: ἐπιτάσσειν
  english_pob_choice: to command
  chosen_spanish: mandarte
  alternatives_spanish:
  - ordenarte
  - darte la orden de
  lexicon: BDAG
  rationale: El infinitivo expresa la acción que Pablo podría ejercer con autoridad. «Mandarte» conserva la fuerza directiva de ἐπιτάσσω en un español claro y directo.
- source_word: σοι
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa naturalmente con el clítico español «te» dentro de la construcción verbal.
- source_word: τὸ ἀνῆκον
  english_pob_choice: what is proper
  chosen_spanish: lo que conviene
  alternatives_spanish:
  - lo que es apropiado
  - lo que es debido
  - lo que es correcto
  lexicon: BDAG
  rationale: El participio articular denota lo que corresponde, conviene o es adecuado. «Lo que conviene» preserva la amplitud semántica sin forzar un sentido meramente moralista; en contexto, puede implicar tanto lo apropiado como lo debido.
theological_decisions:
- issue: Rendering of Χριστῷ as title
  english_pob_reading: in Messiah
  chosen_spanish_reading: en el Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: Se mantiene la decisión del POB inglés de traducir Χριστός como título cuando el contexto lo permite. «Mesías» conserva la referencia titular y evita diluir el matiz cristológico en un nombre fijo.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres, con la entrada discutida para Χριστός'
translation_notes:
  revision_awareness: El pasaje inglés fue revisado para volver a «Messiah» tras una regresión que lo había cambiado a «Christ»; la presente versión sigue esa intención doctrinal de traducir Χριστός como título. También se tuvo en cuenta que παρρησία no queda restringido solo a «boldness» sino a un campo de confianza/franqueza, y que τὸ ἀνῆκον admite varias equivalencias cercanas.
  spanish_consistency_notes:
  - Se mantiene «Mesías» como rendering titular de Χριστός en esta cláusula.
  - Se usa «lo que conviene» para τὸ ἀνῆκον, evitando una traducción demasiado estrecha.
  - El español conserva el tono concesivo de ἔχων con «aunque tengo».
  - La puntuación refleja una única oración subordinada con cierre en coma, acorde con el griego.
