translation:
  language: es
  text: Confiado en tu obediencia[a], te escribí, sabiendo que harás aún más de lo que digo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más allá de lo que digo». Pablo quizá insinúa que Filemón excederá la petición específica que ha hecho, pero el texto no dice con exactitud cómo.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεποιθὼς
  english_pob_choice: Confident
  chosen_spanish: Confiado
  alternatives_spanish:
  - Tengo confianza en
  - Confiando en
  lexicon: BDAG
  rationale: El participio perfecto activo expresa un estado asentado de confianza. «Confiado en» conserva ese valor de base para la acción de escribir, y suena natural en español sin perder la relación lógica con el verbo principal.
- source_word: τῇ ὑπακοῇ σου
  english_pob_choice: of your obedience
  chosen_spanish: en tu obediencia
  alternatives_spanish:
  - de tu obediencia
  - en tu sumisión
  lexicon: BDAG
  rationale: «ὑπακοή» denota obediencia, respuesta sujeta a autoridad. En español, «en tu obediencia» comunica mejor el matiz de confianza apoyada en la disposición obediente de Filemón, mientras que «de tu obediencia» resulta menos idiomático en esta construcción.
- source_word: ἔγραψά σοι
  english_pob_choice: I wrote to you
  chosen_spanish: te escribí
  alternatives_spanish:
  - he escrito a ti
  - te he escrito
  lexicon: BDAG
  rationale: El aoristo epistolar se vierte con pasado simple para una lectura natural en español. «Te escribí» conserva la referencia a la carta sin imponer un presente perfecto que el griego no exige.
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - conociendo
  - pues sé
  lexicon: BDAG
  rationale: El participio perfecto funciona de manera adverbial y expresa conocimiento concomitante. «Sabiendo» mantiene la relación circunstancial con la escritura y el tono de certeza retórica.
- source_word: καὶ ὑπὲρ ἃ λέγω
  english_pob_choice: even more than I say
  chosen_spanish: aun más de lo que digo
  alternatives_spanish:
  - más de lo que digo
  - más allá de lo que digo
  lexicon: BDAG
  rationale: '«ὑπέρ» con relativo acusativo expresa superación o rebasamiento. «Aun más de lo que digo» preserva la apertura intencional del texto: Pablo espera algo mayor que su petición explícita, sin precisar en la traducción cuál sea ese acto.'
- source_word: ποιήσεις
  english_pob_choice: you will do
  chosen_spanish: harás
  alternatives_spanish:
  - harás tú
  - vas a hacer
  lexicon: BDAG
  rationale: El futuro de ποιέω es amplio y aquí funciona de manera predictiva. «Harás» es la forma más directa y natural en español, conservando el sentido abierto de acción futura.
theological_decisions:
- issue: Fuerza de ὑπακοή en la apelación paulina
  english_pob_reading: Rendered as 'obedience' rather than a softer term such as 'compliance' or 'response.'
  chosen_spanish_reading: Se conserva «obediencia» y no se suaviza a «complacencia», «respuesta» ni «disposición».
  alternative_spanish_readings:
  - complacencia
  - respuesta
  - disposición
  rationale: El término griego carga un matiz de sujeción obediente, no meramente de cortesía. Mantener «obediencia» preserva la dinámica apostólica del pasaje y evita diluir el peso moral del término.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de «más de lo que digo»
  english_pob_reading: Left intentionally open-ended rather than specifying what extra action Paul expects.
  chosen_spanish_reading: 'Se deja abierto: «aun más de lo que digo».'
  alternative_spanish_readings:
  - que liberarás a Onésimo
  - que lo recibirás generosamente
  rationale: El texto no especifica cuál será exactamente la acción adicional. La traducción debe conservar esa tensión retórica y no resolver en el cuerpo del verso una interpretación debatida.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje presenta acuerdo alto con la auditoría inglesa y no requiere revisiones sustantivas. Se mantuvo el paralelismo participial, el pasado epistolar y la ambigüedad deliberada de ὑπὲρ ἃ λέγω.
  spanish_consistency_notes:
  - Se usa «obediencia» para ὑπακοή de forma consistente con el criterio POB de preservar la fuerza relacional y moral del término.
  - Se prefirió «te escribí» por el aoristo epistolar, evitando un presente perfecto innecesario.
  - Se mantuvo «aun más de lo que digo» con nota alternativa para reflejar la posibilidad semántica de «más allá de lo que digo» sin cerrar la implicación del verso.
  - «Confiado en» conserva el participio de estado y permite una lectura fluida en español moderno.
