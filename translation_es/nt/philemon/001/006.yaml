translation:
  language: es
  text: para que la comunión de tu fe[a] llegue a ser eficaz en el conocimiento de todo lo bueno[b] que está en nosotros[c] para el Mesías[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la participación/comunión de tu fe». κοινωνία puede llevar los matices de comunión, participación o compartir; πίστις también puede significar «fidelidad» o «confianza» en algunos contextos.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «cada cosa buena» o «todo bien». El griego emplea un neutro amplio que no obliga a concretar más.
    reason: lexical_alternative
  - marker: c
    text: Algunos manuscritos leen «en ti» en lugar de «en nosotros». Se mantiene la lectura de ἡμῖν («nosotros»).
    reason: textual_variant
  - marker: d
    text: O «para Cristo». Aquí Χριστός se vierte como «Mesías» siguiendo la terminología del proyecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce la finalidad del ruego de Pablo; «para que» expresa con naturalidad el valor telicopropósito sin añadir interpretación.
- source_word: κοινωνία
  english_pob_choice: fellowship
  chosen_spanish: comunión
  alternatives_spanish:
  - participación
  - comunión compartida
  - sociedad
  lexicon: BDAG
  rationale: El contexto admite «fellowship», «sharing», «partnership» o «participation». «Comunión» es la opción española más amplia y eclesialmente inteligible para κοινωνία, sin reducirla a simple institución ni a un sentido meramente interno.
- source_word: πίστεώς
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: La forma genitiva apunta a la fe de Filemón; «fe» conserva la referencia principal. Se mantiene la tensión posible con «fidelidad» en la nota de alternativa, porque πίστις puede abarcar más que asentimiento mental.
- source_word: ἐνεργὴς γένηται
  english_pob_choice: may become effective
  chosen_spanish: llegue a ser eficaz
  alternatives_spanish:
  - se vuelva activa
  - llegue a ser activa
  - se haga eficaz
  lexicon: BDAG
  rationale: La combinación expresa llegar a estar en funcionamiento/eficacia. «Llegue a ser eficaz» comunica el matiz de volverse operativa de manera natural en español.
- source_word: ἐν ἐπιγνώσει
  english_pob_choice: in the knowledge
  chosen_spanish: en el conocimiento
  alternatives_spanish:
  - mediante el conocimiento
  - por medio del conocimiento
  - en plena comprensión
  lexicon: BDAG
  rationale: El griego usa ἐν, y la tradición del POB inglés optó por mantenerlo de forma directa. «En el conocimiento» conserva la relación preposicional sin forzar una causalidad instrumental explícita que el texto no exige.
- source_word: παντὸς ἀγαθοῦ
  english_pob_choice: every good thing
  chosen_spanish: todo lo bueno
  alternatives_spanish:
  - cada cosa buena
  - todo bien
  lexicon: BDAG
  rationale: El neutro singular con πᾶς se puede verter naturalmente como «todo lo bueno». Esta opción preserva la amplitud del referente sin concretarlo indebidamente como «don» o «regalo».
- source_word: τοῦ ἐν ἡμῖν
  english_pob_choice: that is in us
  chosen_spanish: que está en nosotros
  alternatives_spanish:
  - que está en ustedes
  - que está entre nosotros
  lexicon: BDAG
  rationale: Se sigue el texto impreso con ἡμῖν («nosotros»), manteniendo el referente colectivo. «En nosotros» respeta la lectura manuscrita y la perspectiva comunitaria del pasaje.
- source_word: εἰς Χριστόν
  english_pob_choice: for the Messiah
  chosen_spanish: para el Mesías
  alternatives_spanish:
  - para Cristo
  - hacia el Mesías
  lexicon: BDAG
  rationale: 'Se adopta el default del proyecto para Χριστός como título: «Mesías». «Para» expresa mejor la orientación/referencia del último sintagma en español que un «hacia» demasiado literal o un «para Cristo» menos coherente con la terminología del proyecto.'
theological_decisions:
- issue: Sentido de κοινωνία τῆς πίστεώς σου
  english_pob_reading: the sharing/fellowship of your faith as the active expression or communication of faith
  chosen_spanish_reading: la comunión de tu fe como la expresión activa y comunicativa de esa fe
  alternative_spanish_readings:
  - la participación de tu fe
  - la comunión producida por tu fe
  - la fraternidad de tu fe
  rationale: La frase es ambigua y el POB inglés preserva esa amplitud. «Comunión de tu fe» conserva el vínculo entre κοινωνία y πίστις sin cerrar prematuramente si se trata de participación, relación comunitaria o expresión práctica de la fe. La formulación mantiene la tensión del texto y su impulso hacia la acción.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Referente de ἐν ἡμῖν
  english_pob_reading: collective 'us' referring to Paul, Philemon, and fellow believers
  chosen_spanish_reading: nosotros, entendido de manera colectiva entre Pablo, Filemón y los creyentes
  alternative_spanish_readings:
  - en ustedes
  - en ti
  rationale: Se conserva la lectura transmitida por el texto crítico. Esto evita estrechar el alcance del «bien» solo a Filemón y mantiene la perspectiva comunitaria del pasaje; la variante «en ti» queda reconocida como alternativa textual.
  doctrine_reference: Texto crítico y perspectiva comunitaria paulina
- issue: Valor de Χριστός
  english_pob_reading: rendered 'Messiah' rather than 'Christ'
  chosen_spanish_reading: renderido como «Mesías» y no como «Cristo»
  alternative_spanish_readings:
  - Cristo
  rationale: El proyecto pide normalmente «Mesías» para Χριστός cuando funciona como título. Se mantiene así la correspondencia semántica y se evita transformar el título en un nombre eclesiástico tradicional sin necesidad textual.
  doctrine_reference: Terminología del proyecto para Χριστός/Messiah
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste más reciente del audit trail inglés, que reordenó la cláusula final para vincular con más claridad «every good thing... in us for the Messiah». En español se preserva esa unión mediante «todo lo bueno que está en nosotros para el Mesías», sin introducir una relectura explicativa ajena al griego.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός conforme al estándar del proyecto.
  - Se mantiene «nosotros» para ἡμῖν siguiendo el texto crítico impreso.
  - «Comunión» se eligió como equivalente amplio de κοινωνία, dejando abiertas las alternativas semánticas en nota.
  - La puntuación conserva una sola oración con clausula final telicopropósito, acorde con ὅπως.
