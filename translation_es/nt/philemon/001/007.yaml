translation:
  language: es
  text: Porque tuve mucho gozo y aliento por tu amor, ya que las entrañas[a] de los santos han sido reconfortadas por medio de ti, hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O idiomáticamente, 'los afectos íntimos' o 'el corazón' de los santos.
    reason: lexical_alternative
lexical_decisions:
- source_word: χαρὰν
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - gozo
  lexicon: BDAG
  rationale: χαρά denota gozo/alegría. Aquí 'gozo' suena natural en español bíblico actual y conserva el tono afectivo fuerte del pasaje, paralelo a παράκλησις.
- source_word: πολλὴν ἔσχον
  english_pob_choice: I had much
  chosen_spanish: tuve mucho
  alternatives_spanish:
  - tuve gran
  - recibí mucho
  lexicon: BDAG
  rationale: 'El aoristo ἔσχον con πολλήν expresa experiencia/posesión: ''tuve mucho''. ''Mucho'' refleja con mayor literalidad la cuantía que ''gran''.'
- source_word: παράκλησιν
  english_pob_choice: encouragement
  chosen_spanish: consolación
  alternatives_spanish:
  - consuelo
  - aliento
  - encouragement
  lexicon: BDAG
  rationale: παράκλησις puede ser ánimo, consuelo o consolación. En español 'consolación' comunica bien el efecto de alivio y fortalecimiento en un contexto interpersonal, sin perder el matiz de apoyo afectivo; 'aliento' sería posible pero menos completo aquí.
- source_word: ἐπὶ τῇ ἀγάπῃ σου
  english_pob_choice: because of your love
  chosen_spanish: por tu amor
  alternatives_spanish:
  - a causa de tu amor
  - por causa de tu amor
  - sobre tu amor
  lexicon: BDAG
  rationale: 'Con ἐπί + dativo el sentido es causal o de base: la alegría y consolación surgen por el amor de Filemón. ''Por tu amor'' es breve y natural en español, sin forzar la relación causal.'
- source_word: ἀγάπῃ
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor
  - caridad
  lexicon: BDAG
  rationale: ἀγάπη se traduce por 'amor' según el valor estándar y para evitar un término eclesiástico menos transparente como 'caridad'.
- source_word: σπλάγχνα
  english_pob_choice: hearts
  chosen_spanish: entrañas
  alternatives_spanish:
  - entrañas
  - afectos íntimos
  - corazón
  lexicon: BDAG
  rationale: σπλάγχνα es literalmente 'entrañas' y en el griego bíblico puede designar los afectos profundos o la sede interior de la compasión. Aquí se conserva 'entrañas' para no suavizar el color idiomático del original; el contexto y la nota aclaran el sentido idiomático.
- source_word: τῶν ἁγίων
  english_pob_choice: of the saints
  chosen_spanish: de los santos
  alternatives_spanish:
  - de los santos
  - de los creyentes
  - del pueblo santo
  lexicon: BDAG
  rationale: ἅγιοι en Pablo designa a los creyentes como comunidad apartada para Dios. 'Santos' preserva el lenguaje paulino y su transparencia eclesial.
- source_word: ἀναπέπαυται
  english_pob_choice: have been refreshed
  chosen_spanish: han sido refrigeradas
  alternatives_spanish:
  - han sido refrescadas
  - han encontrado descanso
  - han sido aliviadas
  lexicon: BDAG
  rationale: 'El perfecto expresa un estado resultante: ''han sido'' + participio. ''Refrigeradas'' recupera el valor tradicional de refresco/reposo, pero en español moderno puede sonar algo elevado; aun así conserva la imagen de alivio y descanso del verbo, con resonancia bíblica.'
- source_word: διὰ σοῦ
  english_pob_choice: through you
  chosen_spanish: por medio de ti
  alternatives_spanish:
  - por medio de ti
  - a través de ti
  - por ti
  lexicon: BDAG
  rationale: διά con genitivo expresa medio/agentividad. 'Por medio de ti' refleja bien el instrumento personal sin ambigüedad.
- source_word: ἀδελφέ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano
  - hermano querido
  lexicon: BDAG
  rationale: Vocativo fraternal dentro de la comunidad cristiana. 'Hermano' es directo, fiel y natural en español.
theological_decisions:
- issue: ἅγιοι como designación de la comunidad creyente
  english_pob_reading: saints
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los creyentes
  - los santos de Dios
  - el pueblo santo
  rationale: '''Los santos'' conserva el lenguaje paulino sin introducir la idea posterior de canonización; mantiene la identidad comunitaria de los apartados para Dios.'
  doctrine_reference: 'Affirmations; Translation philosophy #5'
- issue: σπλάγχνα como idiomático antropológico/afectivo
  english_pob_reading: hearts
  chosen_spanish_reading: entrañas
  alternative_spanish_readings:
  - afectos íntimos
  - corazón
  - interior
  rationale: La metáfora corporal es más fuerte en el griego que en el inglés 'hearts'. En español, 'entrañas' preserva mejor la tensión literal/idiomática y evita aplanar la imagen; la nota explica el sentido más literal.
  doctrine_reference: 'Translation philosophy #6'
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una lectura óptima-equivalente con nota para σπλάγχνα. En español se decidió conservar la imagen corporal en el texto principal ('entrañas') en vez de trasladarla a 'corazón', porque el español permite esa literalidad con suficiente claridad y así se preserva mejor la tensión léxica documentada. No se detectan revisiones textuales que alteren el contenido base.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícitamente no aplicable en este versículo.
  - '''Santos'' y ''hermano'' conservan el registro paulino y comunitario.'
  - Se evitó 'Cristo'/'Mesías' por no aparecer en el versículo.
  - '''Consolación'' y ''por medio de ti'' sostienen un español bíblico claro sin calcos innecesarios.'
