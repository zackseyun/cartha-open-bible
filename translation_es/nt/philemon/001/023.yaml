lexical_decisions:
- source_word: Ἀσπάζεταί
  english_pob_choice: greets
  chosen_spanish: te saluda
  alternatives_spanish:
  - te envía saludos
  - te saluda cordialmente
  lexicon: BDAG
  rationale: El verbo medio/pasivo ἀσπάζομαι aquí funciona de modo idiomático como fórmula de saludo. En español, 'te saluda' conserva naturalidad y brevedad, sin añadir contenido no indicado por el griego.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: Es el objeto directo singular de segunda persona, dirigido a Filemón. En español, el clítico 'te' comunica con claridad esa relación directa.
- source_word: Ἐπαφρᾶς
  english_pob_choice: Epaphras
  chosen_spanish: Epapras
  alternatives_spanish:
  - Epaprafas
  lexicon: Convención onomástica
  rationale: Se translitera el nombre propio al español con una forma natural y reconocible. 'Epapras' evita una adaptación excesiva y mantiene la referencia al personaje.
- source_word: συναιχμάλωτός
  english_pob_choice: fellow prisoner
  chosen_spanish: compañero de prisión
  alternatives_spanish:
  - compañero de cautiverio
  - cautivo junto conmigo
  lexicon: BDAG
  rationale: El compuesto indica a alguien preso juntamente con otro. 'Compañero de prisión' es la equivalencia española más idiomática y preserva la relación compartida de encarcelamiento.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - mío
  lexicon: Gramática española
  rationale: El genitivo posesivo se expresa naturalmente con 'mi', que modifica 'compañero de prisión'.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  - en el Mesías Jesús
  lexicon: BDAG
  rationale: Se conserva la preposición 'en' para mantener la fórmula paulina de unión/esfera relacional. Χριστός se rinde como 'Mesías' según el criterio doctrinal del proyecto, porque aquí sigue siendo un título activo y no solo un nombre fijo. 'Jesús' traduce Ἰησοῦς.
theological_decisions:
- issue: Χριστός en la fórmula ἐν Χριστῷ Ἰησοῦ
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: El texto griego usa el título Χριστός en una expresión paulina con peso teológico. Siguiendo la política del proyecto, se traduce el título como 'Mesías' para no ocultar su fuerza semántica. La forma tradicional 'Cristo Jesús' queda como alternativa léxica reconocible en español.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: El antecedente inglés pasó por una revisión que intentó volver a 'Christ Jesus', pero la corrección regresó a 'Messiah Jesus' conforme a la política doctrinal documentada. Por eso el español mantiene 'Mesías Jesús' y ofrece la forma tradicional en nota.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona singular con 'te', en consonancia con el destinatario individual.
  - '''Mesías'' se usa como traducción del título Χριστός de forma consistente con el criterio del proyecto.'
  - La fórmula preposicional 'en Mesías Jesús' conserva la estructura del griego sin sustituirla por 'por' o 'para'.
