translation:
  language: es
  text: ya no como esclavo[a], sino más que un esclavo, un hermano amado, especialmente a mí, pero cuánto más a ti[b], tanto en la carne como en el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como siervo’ o ‘como siervo por contrato’; el término griego puede abarcar distintos rangos de condición servil, pero aquí probablemente alude a la condición social de dependencia de Onésimo.
    reason: alternative_reading
  - marker: b
    text: ‘En la carne’ aquí probablemente significa en la relación terrenal o social, o simplemente en persona, no ‘naturaleza pecaminosa’.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  lexicon: BDAG
  rationale: Expresa con naturalidad la negación temporal de un estado anterior y en español suena más idiomático que una calca rígida.
- source_word: ὡς δοῦλον
  english_pob_choice: as a slave
  chosen_spanish: como esclavo
  alternatives_spanish:
  - como siervo
  - como esclavo vinculado
  lexicon: BDAG
  rationale: Se conserva la fuerza social de δοῦλος, en línea con la decisión inglesa de no suavizar el término en este contexto de Filemón.
- source_word: ὑπὲρ δοῦλον
  english_pob_choice: more than a slave
  chosen_spanish: más que esclavo
  alternatives_spanish:
  - por encima de esclavo
  - más que un esclavo
  lexicon: BDAG
  rationale: ὑπέρ expresa aquí superación de estatus/valor; la fórmula española breve preserva el contraste sin añadir sentido ajeno.
- source_word: ἀδελφὸν ἀγαπητόν
  english_pob_choice: a beloved brother
  chosen_spanish: como hermano amado
  alternatives_spanish:
  - hermano amado
  - hermano querido
  lexicon: BDAG
  rationale: Se mantiene la metáfora fraterna directa; 'amado' reproduce ἀγαπητός con registro digno y eclesialmente claro.
- source_word: μάλιστα ἐμοί
  english_pob_choice: especially to me
  chosen_spanish: especialmente para mí
  alternatives_spanish:
  - sobre todo para mí
  - principalmente para mí
  lexicon: BDAG
  rationale: Conserva el matiz de prioridad afectiva o relacional sin cargarlo de interpretación adicional.
- source_word: πόσῳ δὲ μᾶλλον σοὶ
  english_pob_choice: but how much more to you
  chosen_spanish: pero cuánto más para ti
  alternatives_spanish:
  - pero mucho más para ti
  - y cuánto más para ti
  lexicon: BDAG
  rationale: La pregunta retórica comparativa se reproduce con naturalidad en español; 'cuánto más' refleja bien la intensificación.
- source_word: ἐν σαρκὶ
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en persona
  - en relación humana/terrenal
  lexicon: BDAG
  rationale: Se conserva la expresión paulina literal para no borrar la tensión; en español 'carne' puede sonar duro, pero es la opción más fiel y deja abierta la nota semántica.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en el Señor Jesús
  - en el ámbito del Señor
  lexicon: BDAG
  rationale: La expresión es un giro paulino estable y 'Señor' comunica de modo natural la esfera de relación cristiana.
theological_decisions:
- issue: Cómo rendir δοῦλος en Filemón 1:16
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  - criado vinculado
  rationale: La carta trata del estatus social de Onésimo; 'esclavo' conserva la realidad relacional y legal que el contraste de Pablo necesita para ser audible en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: Sentido de ἐν σαρκὶ καὶ ἐν κυρίῳ
  english_pob_reading: both in the flesh and in the Lord
  chosen_spanish_reading: tanto en la carne como en el Señor
  alternative_spanish_readings:
  - tanto en persona como en el Señor
  - tanto en relación humana como en el Señor
  rationale: 'Se preserva la doble esfera: la relación humana/encarnada y la relación cristiana en el Señor, sin fusionarlas ni reinterpretarlas de manera reductiva.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3; Contested terms table for σάρξ'
translation_notes:
  revision_awareness: 'Coincide con la última revisión del audit trail: no hubo cambios requeridos y el cotejo final informó alta concordancia (agree) con el texto fuente y las decisiones inglesas auditadas.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico moderno y digno, evitando el uso de ‘SEÑOR’ en mayúsculas como máscara tipográfica.
  - Se conservó la fuerza social de δοῦλος con ‘esclavo’, en continuidad con el criterio POB para este contexto.
  - La frase ‘en la carne’ se dejó literal para respetar la tensión semántica documentada; la nota aclara el rango posible en español.
  - Se evitó una paráfrasis excesiva de ‘más que esclavo’ para no diluir el contraste retórico del griego.
