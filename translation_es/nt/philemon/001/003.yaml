translation:
  language: es
  text: Gracia a ustedes y paz de Dios nuestro Padre y del Señor Jesús el Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesús Cristo». Χριστός puede funcionar como título («Mesías») o, en ciertos contextos, más como forma nominal fija («Cristo»).'
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  english_pob_choice: Grace
  chosen_spanish: Gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: En los saludos epistolares paulinos, χάρις funciona como fórmula de salutación con peso teológico. «Gracia» conserva ese valor convencional y doctrinal mejor que «favor», que suena más restringido.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  lexicon: BDAG
  rationale: El dativo de destinatario en español se expresa de modo natural con «a ustedes» en una bendición/saludo epistolar.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - shalom
  - paz y bienestar
  lexicon: BDAG
  rationale: «Paz» reproduce el saludo y mantiene el trasfondo semítico de shalom sin explicitarlo innecesariamente en el texto principal.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  lexicon: BDAG
  rationale: La preposición introduce origen/fuente; en español, «de» expresa con naturalidad esa procedencia en la fórmula.
- source_word: θεοῦ πατρὸς ἡμῶν
  english_pob_choice: God our Father
  chosen_spanish: Dios nuestro Padre
  alternatives_spanish:
  - nuestro Dios y Padre
  - Dios el Padre nuestro
  lexicon: BDAG
  rationale: 'La secuencia genitiva se entiende mejor como aposición: «Dios nuestro Padre». Evita imponer una coordinación («nuestro Dios y Padre») que el griego no exige.'
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es el equivalente más fiel y natural para κύριος en este contexto cristológico, preservando el tono confesional del saludo.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Siguiendo la política del proyecto, Χριστός se traduce como «Mesías» cuando funciona como título. En español, «Jesús Mesías» mantiene el valor titular sin volverlo un apellido fijo.
theological_decisions:
- issue: Χριστοῦ como título o forma nominal fija
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesucristo
  - Jesús Cristo
  rationale: El griego permite lectura titular y el POB inglés opta por la lectura titulativa. En español, «Mesías» conserva explícitamente el sentido del título y evita ocultarlo tras una forma más nominalizada.
  doctrine_reference: 'DOCTRINE.md: traducir títulos cristológicos; Χριστός → Mesías cuando el contexto es titular'
- issue: θεοῦ πατρὸς ἡμῶν como fórmula relacional
  english_pob_reading: God our Father
  chosen_spanish_reading: Dios nuestro Padre
  alternative_spanish_readings:
  - nuestro Dios y Padre
  - Dios, nuestro Padre
  rationale: La lectura elegida mantiene la relación paterna con Dios sin sobrecargar la sintaxis. La puntuación con coma no es necesaria en español porque la aposición ya queda clara.
  doctrine_reference: Sintaxis paulina de salutación y relación filial con Dios
translation_notes:
  revision_awareness: El registro griego y el audit trail inglés muestran una oscilación documentada entre «Christ» y «Messiah» para Χριστός; la regresión fue corregida para restaurar la lectura titulativa. La versión española sigue esa decisión y mantiene «Mesías» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Señor» para κύριος, conforme a las convenciones del proyecto.
  - Se usa «Mesías» en el texto principal porque el título es transparente en español y refleja la política del POB para Χριστός.
  - La fórmula de saludo se ha rendido con español natural y formal, sin agregar elementos ausentes del griego.
