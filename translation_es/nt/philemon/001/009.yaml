translation:
  language: es
  text: a causa del amor más bien ruego[a], siendo tal como Pablo, un anciano[b], y ahora también un prisionero de Mesías Jesús[c]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por amor de».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un embajador»; pero la palabra griega aquí significa más naturalmente «un anciano».'
    reason: alternative_reading
  - marker: c
    text: 'Griego: «Cristo Jesús»; aquí se traduce «Mesías Jesús» porque Χριστός funciona como título.'
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τὴν ἀγάπην
  english_pob_choice: because of love
  chosen_spanish: por amor
  alternatives_spanish:
  - a causa del amor
  - por causa del amor
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o motivo; en español, «por amor» comunica con naturalidad esa motivación y conserva la concisión del griego. Mantiene también el sentido relacional del sustantivo ἀγάπη sin añadir explicación.
- source_word: μᾶλλον
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - antes bien
  - más
  lexicon: BDAG
  rationale: Aquí μᾶλλον contrasta la apelación de Pablo con una posible orden. «Más bien» reproduce bien ese contraste en español actual y suena más natural que un simple «más».
- source_word: παρακαλῶ
  english_pob_choice: appeal
  chosen_spanish: ruego
  alternatives_spanish:
  - ruego encarecidamente
  - suplico
  - apelo
  lexicon: BDAG
  rationale: En este contexto Paul no manda, sino que hace una petición personal y relacional. «Ruego» preserva la fuerza respetuosa del verbo y resulta idiomático en español; «apelo» sería posible pero menos natural en registro bíblico español.
- source_word: τοιοῦτος ὢν
  english_pob_choice: being such a one
  chosen_spanish: siendo tal
  alternatives_spanish:
  - siendo tal como soy
  - siendo así
  lexicon: BDAG
  rationale: La frase es elíptica y autoreferencial. «Siendo tal» conserva esa estructura breve y prepara la aposición que sigue, sin sobreexplicar el griego.
- source_word: ὡς Παῦλος
  english_pob_choice: as Paul
  chosen_spanish: como Pablo
  alternatives_spanish:
  - en calidad de Pablo
  - yo, Pablo
  lexicon: BDAG
  rationale: ὡς introduce la caracterización de la persona que habla. «Como Pablo» preserva la relación comparativa/apositiva del griego de manera sobria y fiel.
- source_word: πρεσβύτης
  english_pob_choice: an old man
  chosen_spanish: un anciano
  alternatives_spanish:
  - un hombre viejo
  - un viejo
  lexicon: BDAG
  rationale: El término designa edad avanzada. «Anciano» es el equivalente español digno y natural; evita la lectura eclesiástica de «anciano» como oficio, aunque ese matiz puede seguir siendo una posible ambigüedad contextual si el lector la presupone.
- source_word: νυνὶ δὲ καὶ
  english_pob_choice: and now also
  chosen_spanish: y ahora también
  alternatives_spanish:
  - y también ahora
  - y ahora además
  lexicon: BDAG
  rationale: La secuencia añade un nuevo rasgo identificador a Pablo. «Y ahora también» refleja con claridad el valor temporal y aditivo de la expresión.
- source_word: δέσμιος
  english_pob_choice: a prisoner
  chosen_spanish: un preso
  alternatives_spanish:
  - un prisionero
  - uno que está preso
  lexicon: BDAG
  rationale: El sustantivo indica a una persona encarcelada o retenida. «Preso» es breve y natural en español; «prisionero» también sería correcto, pero «preso» encaja mejor con el tono personal de la frase.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: of Messiah Jesus
  chosen_spanish: de Mesías Jesús
  alternatives_spanish:
  - de Cristo Jesús
  lexicon: BDAG
  rationale: 'Siguiendo el criterio del proyecto, Χριστός se traduce como «Mesías» cuando funciona como título. El genitivo expresa pertenencia o relación: Pablo está preso en relación con Mesías Jesús. «Cristo» se conserva como alternativa posible, pero no como opción principal aquí.'
theological_decisions:
- issue: Sentido de πρεσβύτης
  english_pob_reading: Paul refers to himself as 'an old man' rather than 'an ambassador' or church 'elder.'
  chosen_spanish_reading: Pablo se presenta como «un anciano», es decir, un hombre de edad avanzada.
  alternative_spanish_readings:
  - un embajador
  - un anciano de la iglesia
  rationale: La forma griega es πρεσβύτης, no πρεσβευτής. Por eso el sentido normal es edad avanzada, no un oficio ministerial ni una figura diplomática. Traducirlo de manera directa evita importar una tradición interpretativa sin base textual.
  doctrine_reference: Translation philosophy §1 (primacía del original sobre la tradición de traducción)
- issue: Rendering of Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En este contexto Χριστός mantiene fuerza titular, no solo nominal. «Mesías» deja audible ese valor y sigue el criterio terminológico del proyecto para el título cuando aparece con sentido de función o identidad.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías (where title; Cristo where name-like)'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pass más reciente, que indicó que no hacían falta cambios sustanciales. La redacción española sigue de cerca la lectura auditada del griego y conserva las tensiones documentadas: la causalidad de διὰ τὴν ἀγάπην, el contraste de μᾶλλον, el valor elíptico de τοιοῦτος ὢν y la posibilidad titular de Χριστός. No se introdujeron expansiones interpretativas no respaldadas por el expediente.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme al criterio del proyecto y al audit trail inglés.
  - Se evita «SEÑOR» y otras sustituciones no presentes en el texto griego.
  - «Anciano» se usa en sentido etario, no eclesiástico.
  - La puntuación con raya final reproduce el cierre incompleto del segmento griego y del texto base en inglés.
