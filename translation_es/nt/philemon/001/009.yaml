review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del POB inglés: mantiene la causalidad de διὰ τὴν ἀγάπην, el contraste de μᾶλλον, el matiz de petición de παρακαλῶ, la autodescripción elíptica, πρεσβύτης como referencia a edad, y «Mesías Jesús» para Χριστοῦ Ἰησοῦ. Sin embargo, «por amor» en el texto principal es algo más idiomático pero menos explícito que «because of love» / «a causa del amor», y la nota [a] no preserva exactamente la alternativa del POB inglés, sino que mezcla la opción principal y la alternativa.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos mejoras de naturalidad y precisión: «por causa del amor» suena algo rígido en la nota, y «un preso» puede sonar más coloquial o jurídico-penal que el registro bíblico buscado; «prisionero» mantiene mejor la dignidad del pasaje. Además, para evitar que el texto principal suavice la causalidad, conviene usar «a causa del amor».'
  glossary_alignment: 'La terminología clave está bien alineada: Χριστός → «Mesías», Ἰησοῦς → «Jesús». No hay conflictos con otros términos del glosario. La decisión sobre πρεσβύτης como «anciano» concuerda con la justificación del POB, aunque en español conviene sostener la nota aclaratoria para evitar lectura eclesiástica.'
  issues:
  - severity: medium
    issue: La frase principal «por amor» no refleja con suficiente exactitud la opción principal auditada «because of love».
    rationale: «Por amor» puede entenderse como motivación genérica o incluso como fórmula idiomática más libre. «A causa del amor» conserva mejor la fuerza causal de διά con acusativo y se ajusta más estrechamente al rastro de auditoría inglés, dejando «por amor de» como alternativa en nota.
  - severity: low
    issue: La nota [a] no reproduce de forma limpia la relación principal/alternativa del POB inglés.
    rationale: El POB inglés tiene texto principal «because of love» y nota alternativa «for love's sake». La nota española actual presenta ambas como opciones de la misma categoría y además introduce comillas y puntuación poco pulidas. Conviene dejar el texto principal como «a causa del amor» y la nota con la alternativa «por amor de».
  - severity: low
    issue: «un preso» es menos digno y menos estable que «un prisionero» para δέσμιος.
    rationale: Ambas opciones son posibles, pero «prisionero» suena más natural en registro bíblico general y evita un matiz más coloquial de «preso», sin perder el sentido de δέσμιος.
