translation:
  language: es
  text: La gracia del Señor Jesús Mesías[a] sea con el espíritu de ustedes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tradicionalmente: «La gracia del Señor Jesucristo sea con el espíritu de ustedes».'
    reason: alternative_reading
  - marker: b
    text: El pronombre «ustedes» es plural, lo que muestra que la bendición se extiende más allá de Filemón solo y alcanza a los demás destinatarios de la carta.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia graciosa
  lexicon: BDAG
  rationale: En la fórmula paulina de bendición, χάρις designa la dádiva benévola de Dios; «gracia» es el equivalente español establecido y semánticamente más natural.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En este título cristológico, «Señor» conserva el valor reverente y el peso teológico de κύριος mejor que opciones más literales o menos idiomáticas.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús Cristo
  lexicon: BDAG
  rationale: Aunque el audit trail inglés explicita el sentido titular de Χριστός, en español la forma fija y plenamente inteligible en esta doxología es «Jesucristo». Mantiene el valor cristológico sin forzar una construcción poco natural en una fórmula de cierre.
- source_word: μετὰ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: BDAG
  rationale: La preposición expresa compañía/presencia; en español la cláusula de bendición se traduce naturalmente con «con».
- source_word: πνεύματος
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  lexicon: BDAG
  rationale: El posesivo «vuestro» apunta al espíritu de los destinatarios, no de manera directa al Espíritu Santo. Se conserva minúscula para no resolver una tensión que el griego no explicita.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: vuestro
  alternatives_spanish:
  - de ustedes
  - de vosotros
  lexicon: BDAG
  rationale: El pronombre es plural; «vuestro» preserva esa pluralidad en un español eclesial general y funciona bien en la bendición final.
theological_decisions:
- issue: Cómo traducir Χριστοῦ en la bendición final
  english_pob_reading: Jesus Messiah / traditional Jesus Christ
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús Cristo
  rationale: El audit trail inglés distingue el sentido titular de Χριστός, pero en esta fórmula final el español más natural y reconocido es «Jesucristo». No se introduce «Mesías» porque la expresión fija de bendición en español perdería fluidez; aun así, la decisión no niega el valor titular del término griego.
  doctrine_reference: 'DOCTRINE.md: traducir títulos cuando el contexto lo permita, pero sin sacrificar la inteligibilidad de la fórmula establecida en el receptor'
- issue: Referente de «espíritu» en «con vuestro espíritu»
  english_pob_reading: human spirit / inner person of the recipients
  chosen_spanish_reading: espíritu humano / interior de los destinatarios
  alternative_spanish_readings:
  - Espíritu Santo
  rationale: La forma con posesivo plural indica el espíritu de los destinatarios. Se evita capitalizarlo para no importar una lectura pneumatológica que el texto no exige, preservando la tensión interpretativa documentada.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones teológicas sin resolverlas más allá de lo que el texto explicita'
translation_notes:
  revision_awareness: Se revisó el pasaje contra el paquete fuente griego, la traducción inglesa auditada y las notas doctrinales. No hubo revisiones aplicadas en el último pase; esta propuesta conserva la bendición final, la pluralidad del pronombre y la ambigüedad controlada de «espíritu».
  spanish_consistency_notes:
  - Se mantiene «gracia» para χάρις, conforme al uso paulino.
  - Se mantiene «Señor» para κύριος en un título cristológico.
  - Se usa «Jesucristo» por naturalidad litúrgica en español, aunque el audit trail inglés documenta el matiz titula r de Χριστός.
  - «Espíritu» va en minúscula para respetar la referencia más probable al espíritu de los destinatarios.
  - «Vuestro» preserva el plural del griego, importante para la aplicación comunitaria del saludo final.
