  - severity: medium
    issue: «hijo» estrecha τέκνον
    rationale: La auditoría inglesa eligió deliberadamente «child» en vez de «son» para no sobredeterminar τέκνον. Aunque Onésimo es varón, el término griego sigue siendo más amplio y afectivo que específicamente filial-masculino.
