translation:
  language: es
  text: Te ruego acerca de mi hijo[a], Onésimo, a quien engendré en mis cadenas[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a quien llegué a ser padre en mi encarcelamiento». El griego usa una metáfora de nacimiento/engendramiento para la relación espiritual de Pablo con Onésimo; «hijo» traduce un término más amplio que también puede significar «hijo» o «hija» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «En mis cadenas» también puede entenderse como «en mi encarcelamiento»; el griego conserva la imagen concreta de las cadenas o ataduras.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακαλῶ
  english_pob_choice: I appeal
  chosen_spanish: Te ruego
  alternatives_spanish:
  - Te pido
  - Te suplico
  - Te imploro
  lexicon: BDAG
  rationale: παρακαλέω aquí expresa una petición personal y apremiante en tono epistolar. «Te ruego» conserva ese matiz respetuoso e insistente sin sonar demasiado fuerte ni demasiado débil en español.
- source_word: περὶ τοῦ ἐμοῦ τέκνου
  english_pob_choice: concerning my child
  chosen_spanish: por mi hijo
  alternatives_spanish:
  - acerca de mi hijo
  - por mi hijo querido
  - sobre mi hijo
  lexicon: BDAG
  rationale: El griego con περί + genitivo introduce el asunto de la petición; en español, «por» comunica naturalmente el motivo o la intercesión. τέκνον se traduce aquí como «hijo» para conservar el tono afectivo y relacional que la POB inglesa decidió, y porque el referente es masculino.
- source_word: τέκνου
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo espiritual
  - hijo amado
  - niño
  lexicon: BDAG
  rationale: Aunque τέκνον es más amplio que «hijo», el contexto y el referente masculino permiten usar «hijo» en español con naturalidad. «Hijo» también refleja mejor el vínculo paternal/metafórico que el pasaje desarrolla.
- source_word: ὃν ἐγέννησα
  english_pob_choice: whom I fathered
  chosen_spanish: a quien engendré
  alternatives_spanish:
  - a quien hice mi hijo
  - a quien fui como padre
  - a quien traje a la fe
  lexicon: BDAG
  rationale: ἐγέννησα mantiene la metáfora de engendrar/beget. En español, «engendré» conserva esa imagen con suficiente fuerza y evita introducir explícitamente «convertí» o «trajé a la fe», que irían más allá de la formulación griega.
- source_word: ἐν τοῖς δεσμοῖς
  english_pob_choice: in my chains
  chosen_spanish: en mis cadenas
  alternatives_spanish:
  - en mi prisión
  - en mi encarcelamiento
  - en mis prisiones
  lexicon: BDAG
  rationale: δεσμοί significa literalmente «cadenas» o «lazos», y por extensión puede aludir a la prisión. «En mis cadenas» preserva la imagen concreta que la POB inglesa destacó, sin perder la posibilidad secundaria de entender la situación carcelaria.
- source_word: Ὀνήσιμον
  english_pob_choice: Onesimus
  chosen_spanish: Onésimo
  alternatives_spanish:
  - Onesimo
  lexicon: Transliteración estándar al español
  rationale: Los nombres propios se adaptan por transliteración convencional al español. «Onésimo» es la forma usual y natural en español eclesiástico.
theological_decisions:
- issue: Metáfora de paternidad espiritual sin explicitación doctrinal adicional
  english_pob_reading: Retain the metaphor of spiritual parenthood without making explicit conversion language in the main text.
  chosen_spanish_reading: Conservar la metáfora de engendrar sin añadir en el texto principal que Pablo lo convirtió o que lo hizo hijo en sentido doctrinal explícito.
  alternative_spanish_readings:
  - a quien me convertí en padre en la prisión
  - quien llegó a ser mi hijo mientras estaba preso
  rationale: El griego usa una metáfora de nacimiento/engendramiento; la traducción debe preservar esa imagen y no sustituirla por una formulación explicativa. «Engendré» mantiene la fuerza metafórica y deja la implicación espiritual para el lector o la nota.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión inglés: se evitó sobretraducir ἐμοῦ como «propio» o «mío» enfático; se mantuvo la metáfora de γεννάω con un verbo directo en español; y se conservó «cadenas» como imagen concreta frente a una abstracción como «prisión».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Hijo» aquí es relacional/metafórico, no un marcador de sexo biológico ni una adopción formal.
  - «Cadenas» se mantiene para reflejar δεσμοί con su imaginería física y paulina.
  - La puntuación sigue el flujo epistolar breve del griego, con una sola coma final como en el original.
