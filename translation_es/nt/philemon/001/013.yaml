translation:
  language: es
  text: Yo quería retenerlo conmigo[a], para que por ti me sirviera en las cadenas del evangelio,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "por el evangelio"; es decir, cadenas llevadas a causa del evangelio.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὃν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a Onesimo
  lexicon: BDAG
  rationale: El acusativo relativo masculino singular se refiere a Onésimo. En español, el pronombre átono de objeto directo 'lo' es natural y mantiene la referencia sin sobrecargar el verso con el nombre propio.
- source_word: ἐβουλόμην
  english_pob_choice: I wanted
  chosen_spanish: yo quería
  alternatives_spanish:
  - yo deseaba
  - yo quisiera
  lexicon: BDAG
  rationale: El imperfecto de βούλομαι expresa una intención o deseo en curso en el pasado. 'Yo quería' conserva esa fuerza de voluntad/deseo de modo idiomático en español.
- source_word: πρὸς ἐμαυτὸν
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - para mí
  - a mi lado
  lexicon: BDAG
  rationale: La expresión con κατέχειν comunica retener a alguien en la propia compañía o presencia. 'Conmigo' es la equivalencia española más natural y directa.
- source_word: κατέχειν
  english_pob_choice: to keep
  chosen_spanish: retener
  alternatives_spanish:
  - tener
  - conservar
  lexicon: BDAG
  rationale: '''Retener'' refleja con precisión el sentido de mantener a alguien consigo. Evita la ambigüedad de ''tener'' y suena más específico que ''conservar''.'
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce la cláusula de propósito. 'Para que' es la forma más natural en español y preserva claramente el valor final.
- source_word: ὑπὲρ σοῦ
  english_pob_choice: on your behalf
  chosen_spanish: en tu lugar
  alternatives_spanish:
  - en tu favor
  - por ti
  lexicon: BDAG
  rationale: La preposición ὑπέρ con genitivo aquí puede expresar beneficio o representación. 'En tu lugar' recoge bien la idea de que el servicio de Onésimo a Pablo contaría como servicio representativo de Filemón, sin reducirlo solo a 'por ti'.
- source_word: μοι διακονῇ
  english_pob_choice: he might serve me
  chosen_spanish: me sirviera
  alternatives_spanish:
  - me ministrara
  - me atendiera
  lexicon: BDAG
  rationale: διακονέω implica servicio práctico/atención. 'Me sirviera' mantiene el verbo 'servir' sin introducir el tono eclesiástico de 'ministrar'.
- source_word: ἐν τοῖς δεσμοῖς
  english_pob_choice: in the chains
  chosen_spanish: en las cadenas
  alternatives_spanish:
  - en mi prisión
  - en mis prisiones
  lexicon: BDAG
  rationale: δεσμοί significa literalmente 'cadenas' o 'lazos' y en contexto alude al encarcelamiento de Pablo. 'En las cadenas' conserva la imagen concreta y el tono paulino.
- source_word: τοῦ εὐαγγελίου
  english_pob_choice: of the gospel
  chosen_spanish: del evangelio
  alternatives_spanish:
  - por el evangelio
  lexicon: BDAG
  rationale: Se conserva el genitivo compacto 'del evangelio' en el texto principal, como en el griego. Esta formulación mantiene la tensión interpretativa sin resolverla de manera excesiva.
theological_decisions:
- issue: Relación entre 'las cadenas' y 'del evangelio'
  english_pob_reading: of the gospel
  chosen_spanish_reading: del evangelio
  alternative_spanish_readings:
  - por el evangelio
  - a causa del evangelio
  rationale: 'El texto griego deja abierta la relación semántica: las cadenas pueden entenderse como pertenecientes al evangelio o como sufridas por causa de él. El texto principal conserva la forma compacta ''del evangelio'' y la nota aclara la posibilidad causal sin borrar la tensión.'
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El contexto auditado coincide en alta medida con la solución de la versión inglesa POB. Se mantiene la equivalencia óptima: ''retener'', ''conmigo'', ''para que'', ''en las cadenas del evangelio'', y se conserva la ambigüedad del genitivo final mediante nota.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; aquí no aplica.
  - '''Evangelio'' se mantiene como término técnico establecido.'
  - '''Sirviera'' conserva el subjuntivo de propósito; no se fuerza una paráfrasis explicativa.'
  - La nota a pie de página debe anclarse en 'del evangelio' para reflejar la alternativa causal.
