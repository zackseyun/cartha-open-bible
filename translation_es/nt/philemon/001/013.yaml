revisions:
- from: Yo quería retenerlo conmigo[a], para que en tu nombre me sirviera en las cadenas del evangelio,
  to: Yo quería retenerlo conmigo[a], para que por ti me sirviera en las cadenas del evangelio,
  rationale: Se corrige ὑπὲρ σοῦ a 'por ti' para reflejar de manera natural y fiel la idea de representación/beneficio sin sobretraducirla como sustitución plena ('en tu lugar') ni desviarla hacia autoridad nominal ('en tu nombre'). Se mantiene 'las cadenas del evangelio' con la nota alternativa causal, en línea con la filosofía de preservar la compacidad y la tensión semántica del genitivo griego. El resto del verso es adecuado y no requiere cambios.
