  source_alignment_summary: 'El borrador español refleja bien la estructura general del griego: deseo pasado de Pablo, propósito introducido por ἵνα, servicio de Onésimo a Pablo, y la expresión compacta ''las cadenas del evangelio'' con nota alternativa causal. Sin embargo, el texto principal traduce ὑπὲρ σοῦ como ''en tu nombre'', mientras que las decisiones léxicas documentadas correctamente favorecen una idea de representación/beneficio más cercana a ''por ti'' o ''en tu favor'', no ''en tu nombre''. Esa divergencia afecta el sentido fuente.'
  spanish_quality_summary: El español es claro y digno. 'Retenerlo conmigo', 'para que', 'me sirviera' y 'las cadenas del evangelio' son naturales y fieles. No obstante, 'en tu nombre' suena idiomáticamente distinto y puede sugerir autoridad o invocación nominal, lo cual no corresponde aquí. Conviene ajustar esa frase para mayor precisión y legibilidad contextual.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. ''Evangelio'' y ''servir'' están bien. La única desalineación relevante es semántica: ὑπὲρ σοῦ debe reflejar ''por ti / en tu favor / en representación tuya'', no ''en tu nombre''.'
  issues:
  - severity: high
    issue: El texto principal usa 'en tu nombre' para ὑπὲρ σοῦ.
    rationale: El griego expresa representación o beneficio ('on your behalf'), no actuar 'en el nombre' de Filemón. 'En tu nombre' introduce una noción distinta de autoridad o apelación nominal y no concuerda con el English POB audit trail ni con la decisión léxica española documentada.
  - severity: medium
    issue: Inconsistencia interna entre el texto y las decisiones léxicas.
    rationale: La ficha léxica española elige 'en tu lugar', pero el borrador dice 'en tu nombre'. Aunque 'en tu lugar' tampoco es ideal por su matiz de sustitución fuerte, la inconsistencia muestra que el texto final no siguió la decisión auditada.
  - severity: low
    issue: La nota al pie podría sonar más natural sin comillas forzadas.
    rationale: El contenido es correcto, pero puede presentarse con puntuación española más limpia.
  revised_spanish_text: Yo quería retenerlo conmigo[a], para que por ti me sirviera en las cadenas del evangelio,
