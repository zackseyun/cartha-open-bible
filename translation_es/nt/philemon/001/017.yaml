translation:
  language: es
  text: Así que, si me consideras un partícipe, recíbelo[a] como a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dale la bienvenida». El verbo puede expresar recibir favorablemente a alguien o aceptarlo dentro de la comunión.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ οὖν
  english_pob_choice: So if
  chosen_spanish: Así que, si
  alternatives_spanish:
  - Por tanto, si
  - Entonces, si
  lexicon: BDAG
  rationale: οὖν aporta conexión inferencial con lo anterior, y εἰ introduce la condición. «Así que, si» conserva esa relación lógica en un español natural y solemne.
- source_word: ἔχεις κοινωνόν
  english_pob_choice: you consider me a partner
  chosen_spanish: me consideras un compañero
  alternatives_spanish:
  - me tienes como compañero
  - me consideras un partícipe
  - me consideras un socio
  lexicon: BDAG
  rationale: κοινωνός expresa a alguien que comparte algo con otro; en este contexto la POB inglesa opta por «partner» para la relación de participación y cercanía. En español, «compañero» comunica bien esa relación sin introducir un tecnicismo ajeno; «consideras» refleja el matiz de ἔχεις en esta construcción idiomática.
- source_word: προσλαβοῦ
  english_pob_choice: receive
  chosen_spanish: recíbelo
  alternatives_spanish:
  - acéptalo
  - recíbelo con agrado
  - dale la bienvenida
  lexicon: BDAG
  rationale: El imperativo medio de προσλαμβάνομαι puede ser «recibir», «aceptar» o «dar la bienvenida». «Recíbelo» preserva la amplitud formal del verbo y deja abierta tanto la acogida personal como la aceptación relacional.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a Onesimo
  - le
  lexicon: BDAG
  rationale: Pronombre directo referido a Onésimo por el contexto. En español, el clítico «lo» mantiene la referencia natural y concisa.
- source_word: ὡς ἐμέ
  english_pob_choice: as you would me
  chosen_spanish: como a mí
  alternatives_spanish:
  - como me recibirías a mí
  - como si fuera yo
  - igual que a mí
  lexicon: BDAG
  rationale: La comparación de ὡς con el acusativo requiere expansión idiomática en español. «Como a mí» expresa de manera sobria y fiel la equivalencia de trato que Pablo pide.
theological_decisions:
- issue: Sentido relacional de κοινωνός
  english_pob_reading: partner
  chosen_spanish_reading: compañero / partícipe
  alternative_spanish_readings:
  - socio
  - compañero de comunión
  - copartícipe
  rationale: El pasaje apela a una relación de participación compartida entre Pablo y Filemón, no a una categoría doctrinal técnica. «Compañero» conserva la fuerza relacional sin imponer lenguaje eclesiástico más cargado; la nota léxica deja abierta la idea de participación.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without importing doctrinal claims.'
translation_notes:
  revision_awareness: 'Coincido con el estado de alta concordancia del seguimiento inglés: no se requieren revisiones sustantivas. La principal decisión española es cómo expresar κοινωνός sin perder el matiz de participación relacional; se optó por «compañero», con nota alternativa «partícipe».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, aunque este versículo no lo contiene.
  - «Recíbelo» preserva la amplitud del verbo mejor que «acéptalo» o «dale la bienvenida», en continuidad con la decisión inglesa.
  - La estructura condicional-inferencial se conserva con «Así que, si».
  - Se evita el calco rígido «tenerme como compañero» porque en español suena menos idiomático que «considerarme un compañero».
