revisions:
- from: Sí[a], hermano, permíteme tener beneficio de ti en el Señor; refresca mis entrañas[b] en el Mesías[c].
  to: Sí[a], hermano, déjame recibir beneficio de ti en el Señor; reconforta mi corazón[b] en el Mesías[c].
  rationale: Se ajusta el texto para mejorar la naturalidad y la claridad en español sin apartarse del griego ni del rastro POB. «Déjame recibir beneficio de ti» expresa mejor la petición de ἐγώ σου ὀναίμην que «permíteme tener beneficio de ti», y «reconforta mi corazón» comunica con mayor legibilidad el sentido idiomático de μου τὰ σπλάγχνα, preservando el literal griego en nota. Se mantiene «en el Señor» y «en el Mesías» conforme a la evidencia y a la terminología del proyecto.
