  text: ναί, ἀδελφέ, ἐγώ σου ὀναίμην ἐν κυρίῳ· ἀνάπαυσόν μου τὰ σπλάγχνα ἐν ⸀Χριστῷ.
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/020.yaml
  text: Yes[a], brother, let me have benefit from you in the Lord[c][b]; refresh my heart in Messiah.
  footnotes:
  - marker: a
    text: Or 'let me profit from you,' or 'let me have joy from you.' Paul may be making a wordplay on Onesimus' name and the idea of usefulness/benefit.
    reason: lexical_alternative
  - marker: b
    text: Greek 'my inward parts,' an idiom for deep affections or inner being; rendered 'my heart' in natural English.
    reason: lexical_alternative
  - marker: c
    text: Or 'in Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its titular sense.
    reason: alternative_reading
