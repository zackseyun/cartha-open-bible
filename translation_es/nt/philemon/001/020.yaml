translation:
  language: es
  text: Sí[a], hermano, déjame recibir beneficio de ti en el Señor; reconforta mi corazón[b] en el Mesías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «déjame sacar provecho de ti», o «déjame tener alegría de ti». Puede haber un juego de palabras con el nombre de Onésimo y la idea de utilidad o beneficio.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «mis entrañas», un modismo para los afectos profundos o el ser interior; aquí se expresa como «mi corazón» en español natural.'
    reason: lexical_alternative
  - marker: c
    text: O «en Cristo». Aquí Χριστός se vierte como «Mesías» para conservar su valor titular.
    reason: alternative_reading
lexical_decisions:
- source_word: ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Desde luego
  - Ciertamente
  lexicon: BDAG
  rationale: Interjección de afirmación directa y cálida; «Sí» es la equivalente natural en español moderno y conserva el tono de súplica amistosa.
- source_word: ἀδελφέ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano mío
  lexicon: BDAG
  rationale: Vocativo singular dirigido a Filemón como creyente y compañero; «hermano» comunica cercanía sin añadir énfasis no presente en el griego.
- source_word: ἐγώ σου ὀναίμην
  english_pob_choice: let me have benefit from you
  chosen_spanish: permíteme tener beneficio de ti
  alternatives_spanish:
  - déjame sacar provecho de ti
  - permíteme recibir provecho de ti
  - déjame tener alegría de ti
  lexicon: BDAG
  rationale: ὀναίμην expresa beneficio/provecho y puede resonar con el nombre de Onésimo; «tener beneficio de ti» mantiene el valor léxico y la petición personal sin convertirlo en paráfrasis libre.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en Señor
  lexicon: BDAG
  rationale: Fórmula paulina estándar de esfera o relación; en español, «el Señor» es la forma idiomática y reverente para κύριος en este contexto.
- source_word: ἀνάπαυσόν
  english_pob_choice: refresh
  chosen_spanish: refresca
  alternatives_spanish:
  - da descanso a
  - reconforta
  lexicon: BDAG
  rationale: Imperativo aoristo que pide alivio/consuelo concreto; «refresca» preserva el valor relacional y mantiene la resonancia con el contexto de Filemón 1:7.
- source_word: μου τὰ σπλάγχνα
  english_pob_choice: my heart
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mi corazón
  - mis afectos
  - mi ser interior
  lexicon: BDAG
  rationale: σπλάγχνα significa literalmente las entrañas, y figuradamente las emociones más profundas; se conserva la imagen corporal del griego con una nota para el sentido idiomático.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Χριστῷ funciona aquí como título; se usa «Mesías» conforme al criterio terminológico del proyecto para preservar el sentido titular y no ocultarlo detrás de una forma más convencional.
theological_decisions:
- issue: Traducción de Χριστῷ
  english_pob_reading: Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La lectura de la POB en inglés preserva el sentido titular de Χριστός. En español, «Mesías» expresa mejor esa carga titulare y evita reducirlo a un nombre eclesial fijo.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Traducción de κυρίῳ
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Amo
  rationale: κύριος en Pablo, y aquí en una fórmula devocional, se mantiene como título cristológico reverente; «el Señor» conserva el uso doctrinal estándar sin introducir una relación servil que el contexto no exige.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El borrador sigue la lectura más reciente que restauró «Messiah/Mesías» para Χριστῷ después de una revisión que había cambiado indebidamente el término titular a una forma más tradicional. También evita añadir palabras no presentes en el griego, como «este», y conserva el paralelismo directo de la petición en dos miembros.
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto: «Señor» para κύριος y «Mesías» para Χριστός cuando funciona como título.'
  - Se conserva «entrañas» para σπλάγχνα por su fuerza semítica y paulina, con nota explicativa para lectores modernos.
  - La sintaxis española busca ser pública y natural, pero sin borrar el juego verbal potencial entre ὀναίμην y Onésimo.
