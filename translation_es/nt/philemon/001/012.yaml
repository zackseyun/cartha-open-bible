translation:
  language: es
  text: Te lo envío[a] de vuelta —a él—, es decir[b], mi propio corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «te lo envié de vuelta» o «te lo he enviado de vuelta». El aoristo griego puede representarse de distintas maneras en español; el presente refleja la perspectiva de la carta cuando llega a Filemón.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «mis entrañas»; idiomáticamente, una expresión de afecto profundo o tierna compasión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a quien
  lexicon: BDAG
  rationale: El pronombre relativo acusativo masculino singular retoma a Onésimo. En español, el objeto directo se expresa naturalmente con 'lo'; la referencia a la persona queda clara por el contexto y evita una perífrasis innecesaria.
- source_word: ἀνέπεμψά
  english_pob_choice: I am sending ... back
  chosen_spanish: te lo envío de vuelta
  alternatives_spanish:
  - te lo envié de vuelta
  - te lo he enviado de vuelta
  lexicon: BDAG
  rationale: El aoristo se entiende en el marco epistolar como acción presentada desde la perspectiva de la carta. En español, el presente epistolar 'envío' comunica bien esa inmediatez; 'de vuelta' conserva el valor de ἀναπέμπω ('enviar de regreso').
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - a usted
  - para ti
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma natural con 'a ti'. Mantiene la segunda persona singular y hace explícita la relación de envío sin volver la frase pesada.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - él mismo
  lexicon: BDAG
  rationale: La repetición enfática del pronombre se conserva en español repitiendo el objeto directo 'lo'. Así se mantiene la intensificación del griego sin sonar forzado.
- source_word: τοῦτ’ ἔστιν
  english_pob_choice: that is
  chosen_spanish: esto es
  alternatives_spanish:
  - es decir
  - o sea
  lexicon: BDAG
  rationale: La fórmula explicativa se vierte de manera directa con 'esto es', que conserva el valor apposicional y resulta natural en español bíblico moderno.
- source_word: τὰ ἐμὰ σπλάγχνα
  english_pob_choice: my very heart
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mi corazón
  - mis afectos más profundos
  - mis entrañas, es decir, mi corazón
  lexicon: BDAG
  rationale: σπλάγχνα designa literalmente las entrañas y, por extensión, el asiento de los afectos profundos. 'Mis entrañas' conserva la imagen corporal del griego sin suavizarla; en nota puede aclararse el sentido afectivo que la expresión tiene en español bíblico y contemporáneo.
theological_decisions:
- issue: Metáfora afectiva de σπλάγχνα
  english_pob_reading: Rendered idiomatically as 'my very heart' rather than literally as 'my inward parts.'
  chosen_spanish_reading: Se conserva la metáfora corporal 'mis entrañas' para no borrar la fuerza retórica del griego.
  alternative_spanish_readings:
  - mi corazón
  - mis afectos más profundos
  - mis entrañas, es decir, mi corazón
  rationale: La decisión prioriza la transparencia al término original y evita reemplazarlo de entrada por una equivalencia interpretativa. En español, 'entrañas' todavía puede funcionar como metáfora afectiva, y la nota puede orientar al lector hacia su sentido de profunda ternura.
  doctrine_reference: Lexical/theological transparency; avoiding over-interpretation in metaphor translation.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego y conserva la tensión entre la formulación epistolar del aoristo y la imagen corporal de σπλάγχνα. Frente al inglés POB, se eligió una solución española más cercana al término original en el giro final, manteniendo la posibilidad de aclaración en nota sin sustituir la metáfora base.
  spanish_consistency_notes:
  - Se usa 'de vuelta' para ἀναπέμπω, manteniendo explícita la idea de regreso.
  - Se conserva la duplicación pronominal del griego con 'lo' y la referencia explícita al destinatario con 'a ti'.
  - '''Entrañas'' se mantiene como término bíblico comprensible en español, en continuidad con usos afectivos tradicionales, pero sin convertirlo de inmediato en ''corazón''.'
