    changes_summary: 'Changed ''Messiah Jesus'' to ''Christ Jesus'' for closer lexical correspondence and more standard formal register; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Pablo, prisionero del Mesías Jesús, y Timoteo nuestro hermano, a Filemón nuestro amado colaborador.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Paulo
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico; conserva identificación personal sin necesidad de transliteración extraña.
- source_word: δέσμιος
  english_pob_choice: prisoner
  chosen_spanish: preso
  alternatives_spanish:
  - prisionero
  - cautivo
  lexicon: BDAG
  rationale: δέσμιος denota alguien encadenado o encarcelado. "Preso" es natural y directo en español; "prisionero" también es posible, pero "preso" mantiene bien la concisión del saludo.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός como "Mesías", conforme a la política doctrinal del proyecto cuando el título está activo y no como mero nombre fijo.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar en español.
- source_word: Τιμόθεος
  english_pob_choice: Timothy
  chosen_spanish: Timoteo
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico.
- source_word: ὁ ἀδελφὸς
  english_pob_choice: our brother
  chosen_spanish: nuestro hermano
  alternatives_spanish:
  - el hermano
  - hermano
  lexicon: BDAG
  rationale: El griego tiene artículo, pero en un encabezado epistolar español resulta más natural expresar la relación fraternal como "nuestro hermano", preservando el vínculo de coemisor implícito en Pablo y Timoteo.
- source_word: Φιλήμονι
  english_pob_choice: to Philemon
  chosen_spanish: a Filemón
  alternatives_spanish:
  - para Filemón
  lexicon: BDAG
  rationale: Dativo de destinatario en saludo epistolar; "a" es la construcción natural en español.
- source_word: τῷ ἀγαπητῷ
  english_pob_choice: our beloved
  chosen_spanish: nuestro amado
  alternatives_spanish:
  - nuestro amado y querido
  - nuestro querido
  lexicon: BDAG
  rationale: '"Amado" conserva la carga afectiva fuerte de ἀγαπητός; el posesivo "nuestro" se mantiene para reflejar el plural de ἡμῶν.'
- source_word: συνεργῷ
  english_pob_choice: fellow worker
  chosen_spanish: colaborador
  alternatives_spanish:
  - compañero de trabajo
  - cooperador
  lexicon: BDAG
  rationale: '"Colaborador" comunica bien la idea de trabajar conjuntamente y fluye con naturalidad en español. Aunque "cooperador" es más literal, "colaborador" es más idiomático y mantiene el sentido ministerial.'
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - de nosotros
  lexicon: BDAG
  rationale: Se conserva el plural del emisor conjunto (Pablo y Timoteo).
theological_decisions:
- issue: Χριστός en la salutación inicial
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se sigue la decisión doctrinal del POB de traducir Χριστός como título cuando está semánticamente activo. En este saludo, el sentido titular permanece claro, por lo que "Mesías" es la opción más fiel al proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; Χριστός → Mesías when title, Cristo when name-like'
- issue: Relación entre δέσμιος y el genitivo Χριστοῦ Ἰησοῦ
  english_pob_reading: prisoner of Messiah Jesus
  chosen_spanish_reading: preso de Mesías Jesús
  alternative_spanish_readings:
  - preso por Mesías Jesús
  - preso de Jesús Mesías
  rationale: El griego permite relación posesiva o causal. El español principal mantiene la compactación con "de", sin cerrar de forma interpretativa la posible fuerza causal; así se evita imponer "por" como única lectura.
  doctrine_reference: Lexical note on genitive relation in epistolary opening
- issue: Carácter fraternal y corporativo de ὁ ἀδελφός + ἡμῶν
  english_pob_reading: our brother
  chosen_spanish_reading: nuestro hermano
  alternative_spanish_readings:
  - el hermano
  - hermano nuestro
  rationale: La forma elegida conserva el tono eclesial y la inclusión de Timoteo con Pablo en el saludo, sin traducir de forma rígidamente literal el artículo griego.
  doctrine_reference: Epistolary address conventions
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: una pasada temporal cambió Mesías por Cristo y luego se restauró Mesías conforme a la política doctrinal. La redacción española mantiene esa decisión y evita introducir notas no ancladas en el texto.'
  spanish_consistency_notes:
  - Se mantiene "Mesías" en vez de "Cristo" para Χριστός, de acuerdo con la política del proyecto.
  - Se conserva el plural de emisor con "nuestro" en "nuestro hermano" y "nuestro amado colaborador".
  - '"Preso" se usa por naturalidad y concisión; no se expande a una paráfrasis causal en el texto principal.'
  - El destinatario epistolar se expresa con "a Filemón", forma natural en español bíblico contemporáneo.
