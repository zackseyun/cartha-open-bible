- from: Pablo, preso de Mesías Jesús, y Timoteo nuestro hermano, a Filemón, nuestro amado colaborador.
  to: Pablo, prisionero del Mesías Jesús, y Timoteo nuestro hermano, a Filemón nuestro amado colaborador.
