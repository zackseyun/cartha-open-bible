translation:
  language: es
  text: Presta atención a ti mismo y a la enseñanza; persiste[a] en estas cosas. Porque al hacer esto, te salvarás[b] a ti mismo y a los que te escuchan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «continúa en ellas» o «persevera en ellas».
    reason: lexical_alternative
  - marker: b
    text: O «preservarás»; el griego «salvar» puede denotar rescate, preservación o salvación según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεχε
  english_pob_choice: Pay close attention
  chosen_spanish: Presta atención
  alternatives_spanish:
  - Pon atención
  - Cuida atentamente
  - Estate muy atento
  lexicon: BDAG
  rationale: El imperativo exige vigilancia sostenida sobre la propia conducta y ministerio. «Presta atención» comunica esa atención cuidadosa de forma natural en español, sin debilitar la fuerza exhortativa.
- source_word: σεαυτῷ
  english_pob_choice: to yourself
  chosen_spanish: a ti mismo
  alternatives_spanish:
  - sobre ti mismo
  - para ti mismo
  lexicon: BDAG
  rationale: El dativo reflexivo marca el ámbito del cuidado y la vigilancia. «A ti mismo» mantiene la relación con el verbo de atención y resulta idiomático en español.
- source_word: τῇ διδασκαλίᾳ
  english_pob_choice: to the teaching
  chosen_spanish: a la enseñanza
  alternatives_spanish:
  - a la doctrina
  - a la instrucción
  lexicon: BDAG
  rationale: διδασκαλία puede referirse al contenido doctrinal o al acto de enseñar. «Enseñanza» conserva amplitud semántica y evita imponer un tecnicismo que el contexto no obliga a usar.
- source_word: ἐπίμενε
  english_pob_choice: persist
  chosen_spanish: persiste
  alternatives_spanish:
  - continúa
  - persevera
  - permanece
  lexicon: BDAG
  rationale: El verbo pide continuidad firme y sostenida. «Persiste» preserva la idea de perseverancia activa mejor que un simple «continúa».
- source_word: αὐτοῖς
  english_pob_choice: in these things
  chosen_spanish: en estas cosas
  alternatives_spanish:
  - en ellas
  - con ellas
  lexicon: BDAG
  rationale: El pronombre neutro plural remite a los mandatos y preocupaciones anteriores en conjunto. «En estas cosas» aclara el referente de forma natural en español.
- source_word: τοῦτο γὰρ ποιῶν
  english_pob_choice: For by doing this
  chosen_spanish: Porque haciendo esto
  alternatives_spanish:
  - Pues al hacer esto
  - Porque al practicar esto
  lexicon: BDAG
  rationale: La construcción participial expresa medio o circunstancia acompañante. «Porque haciendo esto» mantiene la relación causal y el movimiento del griego sin sobreexplicar.
- source_word: σώσεις
  english_pob_choice: you will save
  chosen_spanish: te salvarás
  alternatives_spanish:
  - te preservarás
  - te rescatarás
  lexicon: BDAG
  rationale: σῴζω suele significar «salvar», y en este contexto pastoral no conviene rebajarlo a mera preservación temporal. La forma reflexiva en español conserva la tensión teológica del texto.
- source_word: τοὺς ἀκούοντάς σου
  english_pob_choice: those who listen to you
  chosen_spanish: a los que te escuchan
  alternatives_spanish:
  - a los que oyen tu enseñanza
  - a tus oyentes
  lexicon: BDAG
  rationale: El participio presente indica personas en acto de escuchar. «Te escuchan» es natural y conserva la continuidad del acto de oír/escuchar sin perder el sentido relacional.
theological_decisions:
- issue: Sentido de «salvar» en un exhorto pastoral
  english_pob_reading: Retain 'save' in the main text without narrowing it to either eternal salvation alone or mere ministerial preservation.
  chosen_spanish_reading: Conservar «salvar» en el texto principal sin reducirlo ni a salvación eterna aislada ni a simple preservación ministerial.
  alternative_spanish_readings:
  - «preservar» para enfatizar seguridad práctica o ministerial
  - «salvar» entendido sólo como salvación escatológica
  rationale: El texto vincula la perseverancia de Timoteo con la salvación de sí mismo y de sus oyentes. La traducción debe conservar esa tensión teológica, dejando que el contexto determine su alcance sin resolverlo de antemano.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla más allá de su contexto.
translation_notes:
  revision_awareness: 'La versión actual coincide con el estado de revisión más reciente: no se registran cambios aplicados y la concordancia con la auditoría inglesa es alta. La redacción española sigue de cerca el griego y conserva la tensión de σώσεις sin suavizarla.'
  spanish_consistency_notes:
  - Se mantiene «salvar» como equivalente principal de σῴζω, en coherencia con el marco POB.
  - «Enseñanza» se usa para διδασκαλία, evitando un tecnicismo innecesario sin perder el contenido doctrinal.
  - «Persiste» refleja ἐπίμενε con una fuerza exhortativa continua.
  - Los complementos preposicionales se ajustan a un español natural sin alterar la relación sintáctica básica del griego.
