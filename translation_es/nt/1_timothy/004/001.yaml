translation:
  language: es
  text: Ahora el Espíritu dice claramente que, en tiempos posteriores[b], algunos se apartarán[a] de la fe, prestando atención a espíritus engañosos[c] y a enseñanzas de demonios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caerán de la fe».
    reason: lexical_alternative
  - marker: b
    text: O «en los postreros tiempos».
    reason: lexical_alternative
  - marker: c
    text: O «espíritus engañadores».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸ ... πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: El contexto paulino y la presencia del artículo favorecen una referencia al Espíritu Santo, no a un espíritu genérico. En español, la mayúscula marca ese referente sin añadir contenido ajeno al texto.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pero
  - Y
  lexicon: BDAG
  rationale: δέ funciona aquí como transición suave; «Ahora» reproduce ese avance discursivo de manera natural en español, sin imponer una oposición fuerte.
- source_word: ῥητῶς
  english_pob_choice: explicitly
  chosen_spanish: claramente
  alternatives_spanish:
  - explícitamente
  - expresamente
  lexicon: BDAG
  rationale: «Clara-mente» comunica bien la fuerza de «de modo explícito e inequívoco» en un español más fluido. «Explícitamente» también sería posible, pero suena más técnico.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - habla
  lexicon: BDAG
  rationale: El presente mantiene el valor discursivo/profético del griego y «dice» es el equivalente natural en español bíblico contemporáneo.
- source_word: ἐν ὑστέροις καιροῖς
  english_pob_choice: in later times
  chosen_spanish: en tiempos posteriores
  alternatives_spanish:
  - en tiempos futuros
  - en los postreros tiempos
  lexicon: BDAG
  rationale: «Tiempos posteriores» conserva la relación temporal relativa del griego sin cargarla automáticamente con una terminología técnica de fin de los tiempos. En este contexto, el sentido es de una etapa venidera respecto al presente del autor.
- source_word: ἀποστήσονταί
  english_pob_choice: will depart
  chosen_spanish: se apartarán
  alternatives_spanish:
  - se alejarán
  - apostatarán
  - se desviarán
  lexicon: BDAG
  rationale: El verbo expresa separación/defección. «Se apartarán» mantiene la imagen sin volverla demasiado técnica; «apostatarán» sería más interpretativo y «se desviarán» demasiado débil.
- source_word: τῆς πίστεως
  english_pob_choice: the faith
  chosen_spanish: de la fe
  alternatives_spanish:
  - de la fe cristiana
  - de la fe verdadera
  lexicon: BDAG
  rationale: Con artículo, πίστις aquí apunta al contenido objetivo de la fe cristiana, no a la confianza subjetiva. «De la fe» conserva esa referencia y deja oír el lenguaje bíblico sin explicitar una glosa denominacional.
- source_word: προσέχοντες
  english_pob_choice: paying attention to
  chosen_spanish: prestando atención a
  alternatives_spanish:
  - dando oído a
  - dedicándose a
  lexicon: BDAG
  rationale: El participio explica la manera en que se apartan. «Prestando atención a» expresa bien la idea de atender/heeder y funciona con naturalidad en español.
- source_word: πνεύμασι πλάνοις
  english_pob_choice: deceitful spirits
  chosen_spanish: espíritus engañosos
  alternatives_spanish:
  - espíritus seductores
  - espíritus decepcionantes
  lexicon: BDAG
  rationale: πλάνος tiene fuerza activa de engañar o extraviar. «Espíritus engañosos» preserva esa cualidad sin adoptar un giro excesivamente técnico; también deja abierta la posibilidad de seres espirituales que inducen al error.
- source_word: διδασκαλίαις δαιμονίων
  english_pob_choice: teachings of demons
  chosen_spanish: enseñanzas de demonios
  alternatives_spanish:
  - doctrinas de demonios
  - enseñanzas demoníacas
  lexicon: BDAG
  rationale: La construcción genitiva puede entenderse como enseñanzas que proceden de demonios o están marcadas por ellos. «Enseñanzas de demonios» es transparente y sigue el criterio del POB inglés de evitar «doctrinas» si suena más eclesiástico que el griego.
theological_decisions:
- issue: Referente de «el Espíritu»
  english_pob_reading: The Holy Spirit
  chosen_spanish_reading: El Espíritu Santo
  alternative_spanish_readings:
  - un espíritu profético
  - el espíritu humano
  rationale: En este marco epistolar y profético, la lectura más natural es el Espíritu Santo hablando. La traducción en español usa mayúscula por el referente teológico, sin precisar más de lo que el texto afirma.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
- issue: Sentido de «la fe»
  english_pob_reading: the Christian faith as the content/body of belief
  chosen_spanish_reading: la fe cristiana como contenido objetivo de creencia
  alternative_spanish_readings:
  - fe personal/confianza
  - fidelidad
  rationale: 'El artículo y el contexto de abandono/apostasía favorecen un sentido objetivo: el cuerpo de la fe cristiana. «De la fe» mantiene la ambigüedad controlada del griego y no fuerza una lectura más subjetiva.'
  doctrine_reference: 'Contested terms: πίστις → faith; Translation philosophy #3'
- issue: «Tiempos posteriores» frente a un tecnicismo escatológico
  english_pob_reading: in later times
  chosen_spanish_reading: en tiempos posteriores
  alternative_spanish_readings:
  - en los postreros tiempos
  - en tiempos finales
  rationale: El griego habla de periodos posteriores al presente, no necesariamente de un rótulo técnico exclusivo del fin de la historia. «Tiempos posteriores» conserva esa amplitud.
  doctrine_reference: 'Contested terms: eschatological time language; Translation philosophy #2'
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés: mantiene el presente profético, la referencia al Espíritu Santo, el valor objetivo de «la fe» y la relación genitiva de «enseñanzas de demonios». No se aplicaron revisiones posteriores; el pasaje quedó sin cambios en el último pase.'
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula para el referente divino, coherente con el trasfondo del griego y con la convención POB en español.
  - Se evita «doctrinas de demonios» porque en español puede sonar más eclesiástico/tradicional que el griego; «enseñanzas de demonios» conserva transparencia.
  - «Se apartarán» mantiene la noción de defection/abandono sin convertir el verbo en un tecnicismo que cierre la ambigüedad del original.
  - «Espíritus engañosos» y no «deceitful spirits» calcado, para un español natural y fiel a la fuerza activa del adjetivo griego.
