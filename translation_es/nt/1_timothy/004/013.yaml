    issue: «presta atención» debilita πρόσεχε
    rationale: El griego πρόσεχε en este contexto pastoral comunica dedicación sostenida y aplicación continua, no solo atención mental. El rastro auditado del POB inglés justificó «devote yourself to» precisamente para evitar una lectura demasiado débil. «Dedícate a» o «aplícate a» preserva mejor esa fuerza en español.
