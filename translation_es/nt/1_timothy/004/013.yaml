translation:
  language: es
  text: Hasta que yo venga, dedícate[a] a la lectura pública, a la exhortación y a la enseñanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la lectura de las Escrituras». El griego dice simplemente «la lectura», pero en contexto probablemente se refiere a la lectura pública en la asamblea.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως
  english_pob_choice: Until
  chosen_spanish: Hasta que
  alternatives_spanish:
  - Mientras
  - Hasta el momento en que
  lexicon: BDAG
  rationale: ἕως introduce un límite temporal de duración; «Hasta que» expresa con naturalidad en español esa idea de continuidad hasta la llegada del hablante.
- source_word: ἔρχομαι
  english_pob_choice: I come
  chosen_spanish: yo venga
  alternatives_spanish:
  - yo llegue
  - yo venga de nuevo
  lexicon: BDAG
  rationale: El verbo está en forma presente con sentido orientado al futuro en contexto. En español, «venga» tras «hasta que» comunica bien la llegada futura sin añadir información ajena.
- source_word: πρόσεχε
  english_pob_choice: devote yourself to
  chosen_spanish: presta atención
  alternatives_spanish:
  - dedícate a
  - ocúpate de
  - aplícate a
  lexicon: BDAG
  rationale: El imperativo pide atención sostenida y compromiso ministerial. «Presta atención» conserva el llamado a enfocarse en las tres actividades; «dedícate a» sería más explícito pero menos directo al paralelismo del griego.
- source_word: τῇ ἀναγνώσει
  english_pob_choice: the public reading
  chosen_spanish: la lectura pública
  alternatives_spanish:
  - la lectura
  - la lectura de las Escrituras
  lexicon: BDAG
  rationale: ἀνάγνωσις puede significar simplemente «lectura», pero el contexto eclesial sugiere una lectura pública en la asamblea. «La lectura pública» refleja esa probabilidad sin introducir explícitamente «Escrituras» en el texto principal.
- source_word: τῇ παρακλήσει
  english_pob_choice: exhortation
  chosen_spanish: la exhortación
  alternatives_spanish:
  - el ánimo
  - el aliento
  - la exhortación y ánimo
  lexicon: BDAG
  rationale: παράκλησις puede abarcar ánimo o exhortación. Aquí, junto a lectura y enseñanza, «exhortación» conserva el tono pastoral y directivo que mejor encaja en la secuencia.
- source_word: τῇ διδασκαλίᾳ
  english_pob_choice: teaching
  chosen_spanish: la enseñanza
  alternatives_spanish:
  - la instrucción
  - la doctrina
  lexicon: BDAG
  rationale: διδασκαλία se refiere al acto y contenido de enseñar. «La enseñanza» es el equivalente más claro y natural en español, sin restringirlo a «doctrina».
theological_decisions:
- issue: Si ἀνάγνωσις debe hacerse explícitamente bíblica en el texto principal
  english_pob_reading: the public reading
  chosen_spanish_reading: la lectura pública
  alternative_spanish_readings:
  - la lectura de las Escrituras
  - la lectura
  rationale: La escena y el contexto pastoral apuntan a la lectura pública en la congregación, probablemente de las Escrituras, pero el griego no añade el objeto «Escritura». Mantener «la lectura pública» preserva la tensión documentada entre el sentido contextual y la sobriedad textual, sin sobreespecificar.
  doctrine_reference: 'Principio POB: primacía del idioma original y preservación de la tensión interpretativa documentada.'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión disponible: alto acuerdo; no se registraron cambios aplicados.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se usó «la enseñanza» para διδασκαλία en lugar de «doctrina» para conservar el sentido de actividad didáctica sin estrecharlo.
  - La construcción «Hasta que yo venga» reproduce con naturalidad la relación temporal del griego y el énfasis pastoral del mandato.
