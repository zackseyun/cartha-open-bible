translation:
  language: es
  text: Porque toda creación de Dios es buena[a], y nada ha de rechazarse[b] si se recibe con acción de gracias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda criatura de Dios es buena». κτίσμα puede significar «criatura» o, en sentido más amplio, «creación» o «cosa creada».
    reason: lexical_alternative
  - marker: b
    text: O «nada es rechazable cuando se recibe con acción de gracias».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: En este contexto introduce la razón o fundamento de la afirmación anterior. «Porque» conserva bien el valor explicativo y suena natural en español.
- source_word: πᾶν
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - todo
  lexicon: BDAG
  rationale: Con el singular κτίσμα, el valor distributivo se expresa naturalmente en español con «toda». Mantiene la amplitud sin convertirlo en una generalización más áspera.
- source_word: κτίσμα
  english_pob_choice: creation
  chosen_spanish: creación
  alternatives_spanish:
  - criatura
  - cosa creada
  - ser creado
  lexicon: BDAG
  rationale: «Creación» comunica con claridad lo creado por Dios y conserva el alcance más amplio del griego. «Criatura» estrecha demasiado el referente, mientras que «cosa creada» es más literal pero menos fluido.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  lexicon: BDAG
  rationale: 'Genitivo de origen/pertenencia: lo creado por Dios.'
- source_word: καλόν
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - bueno
  - apta
  - valiosa
  lexicon: BDAG
  rationale: 'En español, con «creación» el adjetivo concuerda en femenino: «buena». Conserva la valoración de bondad/aptitud creada sin sobreinterpretar.'
- source_word: οὐδὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  lexicon: BDAG
  rationale: Equivale de forma natural al negado absoluto del griego.
- source_word: ἀπόβλητον
  english_pob_choice: to be rejected
  chosen_spanish: desechable
  alternatives_spanish:
  - rechazable
  - para ser rechazado
  - que deba rechazarse
  lexicon: BDAG
  rationale: 'El adjetivo apunta a lo que puede o debe ser rechazado. «Desechable» transmite bien la idea de algo apto para ser descartado, y permite una frase fluida en español. Se preserva la alternativa interpretativa en nota porque el término admite una lectura más verbal: «debe rechazarse».'
- source_word: μετὰ εὐχαριστίας
  english_pob_choice: with thanksgiving
  chosen_spanish: con acción de gracias
  alternatives_spanish:
  - con gratitud
  - dando gracias
  lexicon: BDAG
  rationale: «Acción de gracias» es la expresión bíblica y litúrgicamente reconocible para εὐχαριστία, y evita reducir el matiz a una emoción subjetiva.
- source_word: λαμβανόμενον
  english_pob_choice: if it is received
  chosen_spanish: si se recibe
  alternatives_spanish:
  - cuando se recibe
  - al ser recibido
  - siendo recibido
  lexicon: BDAG
  rationale: La forma participial expresa la circunstancia bajo la cual nada ha de rechazarse. «Si se recibe» preserva con claridad el matiz condicional que el audit trail inglés considera importante.
theological_decisions:
- issue: Alcance de κτίσμα en un contexto de prohibiciones ascéticas y alimentarias
  english_pob_reading: Rendered broadly as 'every creation of God' rather than narrowing to 'every creature' or paraphrasing directly as 'all food.'
  chosen_spanish_reading: «Toda creación de Dios» mantiene un principio creacional amplio, sin estrecharlo a «toda criatura» ni reducirlo a «todo alimento».
  alternative_spanish_readings:
  - toda criatura de Dios
  - toda cosa creada por Dios
  - todo alimento creado por Dios
  rationale: El griego es más amplio que el simple tema de alimentos, aunque ese sea el contexto inmediato. La traducción conserva esa amplitud y la aplica al argumento de Pablo sin añadir una paráfrasis no requerida por el texto.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Fuerza condicional de μετὰ εὐχαριστίας con λαμβανόμενον
  english_pob_reading: Expressed as 'if it is received with thanksgiving.'
  chosen_spanish_reading: «si se recibe con acción de gracias» expresa la condición para que nada sea desechable.
  alternative_spanish_readings:
  - cuando se recibe con acción de gracias
  - al ser recibido con acción de gracias
  rationale: La estructura condicional evita absolutizar el participio y conserva el vínculo entre recibir con gratitud y no rechazar lo creado. No añade una doctrina extra; simplemente reproduce la condición textual.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran alto acuerdo y no requieren cambios de fondo. La única tensión principal es lexical: κτίσμα admite tanto «creación» como «criatura», y ἀπόβλητον puede expresarse como «desechable» o como una perífrasis verbal («debe rechazarse»). La redacción elegida conserva el sentido amplio y la fluidez del español, mientras que las notas preservan las alternativas relevantes.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se usa «acción de gracias» para εὐχαριστίας, dado su valor bíblico habitual y su claridad en español.
  - La concordancia femenina de «buena» responde al núcleo nominal «creación».
  - «Desechable» se emplea aquí en sentido de algo apto para ser descartado/rechazado, no en el sentido moderno de objeto de un solo uso.
