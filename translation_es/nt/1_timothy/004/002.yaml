translation:
  language: es
  text: por la hipocresía de mentirosos con su propia conciencia cauterizada[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «marcada en su propia conciencia» o «cauterizada en su propia conciencia». La imagen griega puede sugerir una conciencia marcada o hecha insensible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν
  english_pob_choice: through
  chosen_spanish: por
  alternatives_spanish:
  - mediante
  - a través de
  lexicon: BDAG
  rationale: En esta construcción, ἐν expresa medio o instrumento; en español, «por» comunica naturalmente esa causalidad instrumental sin sonar rígido.
- source_word: ὑποκρίσει
  english_pob_choice: hypocrisy
  chosen_spanish: hipocresía
  alternatives_spanish:
  - pretexto
  - insinceridad
  lexicon: BDAG
  rationale: ὑπόκρισις denota conducta hipócrita o fingida; «hipocresía» es el equivalente más directo y claro en español bíblico contemporáneo.
- source_word: ψευδολόγων
  english_pob_choice: of liars
  chosen_spanish: mentirosos
  alternatives_spanish:
  - de mentirosos
  - de falsos habladores
  - que mienten
  lexicon: BDAG
  rationale: El genitivo plural caracteriza a personas definidas por la mentira. En español, «mentirosos» funciona con naturalidad como sustantivo adjetival y conserva el rasgo personal y moral del término.
- source_word: κεκαυστηριασμένων
  english_pob_choice: whose own conscience has been seared
  chosen_spanish: que tienen cauterizada
  alternatives_spanish:
  - que tienen marcada
  - que tienen quemada
  - que tienen insensibilizada
  lexicon: BDAG
  rationale: El participio perfecto pasivo de καυστηριάζω sugiere una acción de cauterizar que deja una condición resultante. «Cauterizada» conserva la imagen corporal/metafórica y el estado permanente o resultante sin decidir demasiado entre branding y cauterización.
- source_word: τὴν ἰδίαν συνείδησιν
  english_pob_choice: their own conscience
  chosen_spanish: su propia conciencia
  alternatives_spanish:
  - su conciencia
  - sus propias conciencias
  lexicon: BDAG
  rationale: Aunque el griego usa singular, el español puede usar el singular colectivo «conciencia» de modo natural. «Su propia» preserva el énfasis de ἰδίαν.
theological_decisions:
- issue: Fuerza metafórica de κεκαυστηριασμένων
  english_pob_reading: Rendered metaphorically as 'has been seared,' implying a conscience rendered insensitive rather than making a doctrinal claim about irreversible reprobation.
  chosen_spanish_reading: «tienen cauterizada su propia conciencia» mantiene la metáfora de la cauterización como imagen de insensibilidad moral, sin cerrar el sentido a una sola explicación técnica.
  alternative_spanish_readings:
  - «tienen marcada su propia conciencia»
  - «tienen quemada su propia conciencia»
  - «tienen insensibilizada su propia conciencia»
  rationale: La imagen es vívida y ambigua; la traducción debe preservar esa tensión. «Cauterizada» conserva el valor metafórico y no fuerza una interpretación doctrinal más precisa de la que el texto ofrece.
  doctrine_reference: Preservar tensión teológica y metáfora moral sin resolverla dogmáticamente.
translation_notes:
  revision_awareness: 'El texto inglés auditado se mantiene sin cambios en su última revisión (latest_revision_pass: unchanged=true). La versión española sigue esa lectura estable y conserva el paralelismo de la imagen sin introducir ampliaciones.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando corresponda; este versículo no lo requiere.
  - Se evitó «siervo» y «SEÑOR» porque no hay esos términos en el segmento.
  - «Conciencia» se dejó en singular, acorde con el griego y con uso natural en español.
  - El giro «por la hipocresía de mentirosos» refleja el medio o causa instrumental de ἐν sin añadir preposición explicativa extra.
