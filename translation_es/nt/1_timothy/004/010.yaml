translation:
  language: es
  text: Porque con este fin trabajamos arduamente y somos reprochados[a], ya que hemos puesto nuestra esperanza en el Dios vivo[b], que es el Salvador de todas las personas[c], especialmente de los creyentes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nos afanamos y somos vituperados».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hemos depositado nuestra esperanza en el Dios vivo».'
    reason: lexical_alternative
  - marker: c
    text: La frase «Salvador de todas las personas, especialmente de los creyentes» se conserva tal como está; los intérpretes discrepan sobre si «Salvador» aquí destaca la preservación providencial de todos, la provisión salvífica para todos, o la salvación aplicada de manera especial a los creyentes.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰς τοῦτο
  english_pob_choice: for to this end
  chosen_spanish: para esto
  alternatives_spanish:
  - con este fin
  - para este propósito
  lexicon: BDAG
  rationale: La frase mira hacia un propósito o meta previa; en español, «para esto» comunica de manera natural la función final sin sobrecargar el texto.
- source_word: κοπιῶμεν
  english_pob_choice: we labor
  chosen_spanish: nos fatigamos
  alternatives_spanish:
  - trabajamos arduamente
  - nos esforzamos
  lexicon: BDAG
  rationale: κοπιάω sugiere trabajo penoso o fatigoso. «Nos fatigamos» conserva la idea de esfuerzo intenso y el tono de desgaste que la palabra tiene en el contexto.
- source_word: ὀνειδιζόμεθα
  english_pob_choice: are reproached
  chosen_spanish: somos maltratados
  alternatives_spanish:
  - somos reprochados
  - somos insultados
  - somos vituperados
  lexicon: BDAG
  rationale: El griego expresa recibir afrenta, deshonra o trato vergonzoso. «Somos maltratados» intenta conservar el peso hostil del pasivo, aunque también puede expresarse como reproche o insulto; se evita una fórmula demasiado arcaica.
- source_word: ἠλπίκαμεν ἐπὶ
  english_pob_choice: we have put our hope in
  chosen_spanish: hemos puesto nuestra esperanza en
  alternatives_spanish:
  - hemos esperado en
  - hemos depositado nuestra esperanza en
  lexicon: BDAG
  rationale: El perfecto sugiere una esperanza asumida y vigente. «Hemos puesto nuestra esperanza en» reproduce bien ese valor durativo y resulta idiomático en español.
- source_word: θεῷ ζῶντι
  english_pob_choice: the living God
  chosen_spanish: el Dios vivo
  alternatives_spanish:
  - Dios, que vive
  - el Dios que vive
  lexicon: BDAG
  rationale: La expresión es una fórmula bíblica estable. «El Dios vivo» mantiene su forma tradicional y su sentido de Dios activo y real.
- source_word: σωτὴρ
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  - preservador
  lexicon: BDAG
  rationale: «Salvador» es el equivalente natural y teológicamente cargado en español para σωτήρ en este contexto pastoral.
- source_word: πάντων ἀνθρώπων
  english_pob_choice: of all people
  chosen_spanish: de todos los hombres
  alternatives_spanish:
  - de todas las personas
  - de toda la humanidad
  lexicon: BDAG
  rationale: Se conserva la amplitud del genérico humano. «Hombres» sigue de cerca la estructura del griego y el registro del enunciado, sin anular la referencia inclusiva.
- source_word: μάλιστα
  english_pob_choice: especially
  chosen_spanish: especialmente
  alternatives_spanish:
  - particularmente
  - sobre todo
  lexicon: BDAG
  rationale: «Especialmente» reproduce la relación de particularidad sin resolver la tensión entre la afirmación universal y la focalización en los creyentes.
- source_word: πιστῶν
  english_pob_choice: believers
  chosen_spanish: de los creyentes
  alternatives_spanish:
  - de los fieles
  - de los que creen
  lexicon: BDAG
  rationale: En este contexto, πιστός designa a los que creen. «Creyentes» es claro, natural y mantiene el matiz confesional.
theological_decisions:
- issue: «Salvador de todos los hombres, especialmente de los creyentes»
  english_pob_reading: Retain the broad statement as written, with 'especially' indicating a distinct, heightened sense in relation to believers without narrowing 'all people' to 'all kinds of people' or asserting universal salvation in the translation itself.
  chosen_spanish_reading: «Salvador de todos los hombres, especialmente de los creyentes» se mantiene sin reducir «todos» a «toda clase de personas» ni convertir la frase en una afirmación explícita de salvación universal.
  alternative_spanish_readings:
  - Salvador que preserva a todos y salva de modo especial a los creyentes
  - Salvador de toda clase de personas
  - Salvador de todos, sin excepción
  rationale: El griego presenta simultáneamente universalidad y particularidad. La traducción debe conservar esa tensión teológica en vez de resolverla en favor de un sistema doctrinal específico.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el análisis previo indica acuerdo alto y el texto quedó sin modificaciones. Esta versión española sigue esa lectura estable y conserva la tensión lexical y teológica documentada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece explícitamente el nombre divino; aquí el texto griego dice θεῷ y la forma natural es «Dios».
  - Se mantiene «Salvador» para σωτήρ, conforme al valor teológico del pasaje.
  - Se preserva la oposición entre universalidad («de todos los hombres») y particularidad («especialmente de los creyentes») sin explicarla en el cuerpo del texto.
  - La puntuación sigue el ritmo de la cláusula causal con coma tras «maltratados» y antes de «ya que».
