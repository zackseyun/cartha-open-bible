revisions:
- from: Porque para esto nos fatigamos y somos maltratados[a], ya que hemos puesto nuestra esperanza en el Dios vivo[b], que es el Salvador de todos los hombres[c], especialmente de los creyentes.
  to: Porque con este fin trabajamos arduamente y somos reprochados[a], ya que hemos puesto nuestra esperanza en el Dios vivo[b], que es el Salvador de todas las personas[c], especialmente de los creyentes.
  rationale: Se corrige el verbo pasivo para reflejar con precisión ὀνειδιζόμεθα como afrenta/reproche, no maltrato. Se mejora la naturalidad de εἰς τοῦτο γὰρ con «Porque con este fin». Se actualiza «todos los hombres» a «todas las personas» para comunicar el valor genérico de ἀνθρώπων en español natural contemporáneo, en línea con la decisión inglesa «all people», sin resolver la tensión teológica del versículo.
  reviewer_model: gpt-5.4
