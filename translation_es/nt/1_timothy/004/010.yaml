review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del griego: propósito/fin, trabajo esforzado, esperanza puesta en el Dios vivo, y la tensión entre «todos» y «especialmente». Sin embargo, ὀνειδιζόμεθα significa recibir reproche, afrenta o vituperio, no «ser maltratados», que en español sugiere abuso físico o trato general hostil más amplio que el matiz verbal/social del griego. Además, «Porque para esto» invierte innecesariamente la progresión natural de εἰς τοῦτο γὰρ; «Porque con este fin» o «Pues para esto» refleja mejor el enlace explicativo.'
  spanish_quality_summary: El español es claro y digno, pero «somos maltratados» no es la mejor opción por precisión semántica. «Todos los hombres» es comprensible, pero en español actual eclesial más ampliamente legible «todas las personas» comunica mejor el valor inclusivo de πάντων ἀνθρώπων sin perder dignidad. También conviene ajustar la nota a para que corresponda a la nueva redacción principal.
  glossary_alignment: 'Alinea bien con los términos del proyecto: θεῷ ζῶντι → «el Dios vivo», σωτὴρ → «Salvador», πιστῶν → «creyentes». No hay conflicto con Yahvé/Mesías/etc. La principal corrección léxica necesaria es ὀνειδιζόμεθα → «somos reprochados» o similar. Para πάντων ἀνθρώπων, se prefiere «todas las personas» sobre «todos los hombres» por naturalidad e inclusividad fiel al sentido genérico.'
  issues:
  - severity: high
    issue: «somos maltratados» para ὀνειδιζόμεθα
    rationale: ὀνειδιζόμεθα denota ser objeto de reproche, afrenta, insulto o vituperio. «Maltratados» amplía el sentido y puede implicar daño físico o abuso general, no el matiz principal de deshonra verbal/social.
  - severity: medium
    issue: «Porque para esto» suena menos natural para εἰς τοῦτο γὰρ
    rationale: La combinación griega expresa «porque/con este fin». En español bíblico natural, «Porque con este fin» o «Pues para esto» fluye mejor y preserva mejor el valor explicativo de γάρ.
  - severity: medium
    issue: «todos los hombres» como equivalente de πάντων ἀνθρώπων
    rationale: Aunque posible, en español contemporáneo puede sonar marcado como masculino. «Todas las personas» o «toda la humanidad» transmite mejor la referencia genérica universal del griego y armoniza con la decisión inglesa «all people».
  - severity: low
    issue: La nota alternativa a no corresponde idealmente al texto revisado
    rationale: Si el texto principal cambia a «somos reprochados», la alternativa puede conservar «somos vituperados», pero conviene también reflejar «trabajamos arduamente» o «nos afanamos» con buena naturalidad.
