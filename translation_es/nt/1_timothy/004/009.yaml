translation:
  language: es
  text: Este dicho[a] es digno de confianza y digno de plena aceptación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «La palabra es digna de confianza» o «La declaración es digna de confianza».
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστὸς
  english_pob_choice: trustworthy
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - digno de confianza
  lexicon: BDAG
  rationale: En la fórmula fija πιστὸς ὁ λόγος, el adjetivo describe la declaración como digna de confianza. En español, «fiel» conserva bien la idea de fiabilidad y es natural en una construcción predicativa breve; «confiable» o «digno de confianza» también serían posibles, pero resultan menos formulaicos.
- source_word: ὁ λόγος
  english_pob_choice: the saying
  chosen_spanish: esta palabra
  alternatives_spanish:
  - esta declaración
  - este dicho
  lexicon: BDAG
  rationale: Aquí λόγος funciona como una afirmación o fórmula reconocible. «Esta palabra» mantiene la forma tradicional de la expresión en contextos bíblicos y permite una lectura natural en español; «esta declaración» o «este dicho» aclaran mejor el sentido discursivo, pero pierden algo de la resonancia de la fórmula.
- source_word: πάσης ἀποδοχῆς
  english_pob_choice: worthy of full acceptance
  chosen_spanish: digna de plena aceptación
  alternatives_spanish:
  - digna de toda aceptación
  - merecedora de completa aceptación
  lexicon: BDAG
  rationale: El genitivo expresa aceptación completa o total. «Plena aceptación» transmite la totalidad sin sonar forzado; «toda aceptación» sería más literal, pero menos natural en español.
- source_word: ἀποδοχῆς
  english_pob_choice: acceptance
  chosen_spanish: aceptación
  alternatives_spanish:
  - recepción
  - acogida
  lexicon: BDAG
  rationale: ἀποδοχή significa aceptación o acogida. «Aceptación» es la equivalencia más clara y directa en este contexto; «recepción» o «acogida» desplazan el matiz hacia el acto de recibir más que hacia reconocer como válido.
- source_word: ἄξιος
  english_pob_choice: worthy of
  chosen_spanish: digna de
  alternatives_spanish:
  - merecedora de
  - merecedora de ser aceptada
  lexicon: BDAG
  rationale: ἄξιος con genitivo expresa que algo es digno o merecedor de. «Digna de» reproduce bien la relación sintáctica y suena natural en español; se mantiene el valor evaluativo sin añadir interpretación.
translation_notes:
  revision_awareness: 'El texto griego y el auditable inglés coinciden en la lectura general: una fórmula breve que afirma la fiabilidad de la declaración y su pleno derecho a ser aceptada. La versión española conserva esa estructura formulística sin ampliar el alcance semántico.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología de sustitución porque no aparece aquí un nombre divino.
  - Se eligió «fiel» en lugar de «verdadero» para mantener el matiz de confiabilidad de πιστὸς en esta fórmula.
  - «Plena aceptación» conserva el sentido de totalidad de πάσης sin calco incómodo.
  - El pie de nota mantiene la alternativa documental sobre λόγος, ya que en español también existe la ambigüedad entre «palabra», «declaración» y «dicho».
