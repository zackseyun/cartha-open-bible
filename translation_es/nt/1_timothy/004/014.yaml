translation:
  language: es
  text: No descuides el don que hay en ti, el cual te fue dado mediante profecía[a], con la imposición de las manos del presbiterio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mediante palabra profética»; la expresión puede indicar que la profecía acompañó o mediaba la concesión del don.
    reason: lexical_alternative
  - marker: b
    text: O «del presbiterio»; es decir, del cuerpo colectivo de ancianos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμέλει
  english_pob_choice: do not neglect
  chosen_spanish: No descuides
  alternatives_spanish:
  - No menosprecies
  - No desatiendas
  - No te descuides con
  lexicon: BDAG
  rationale: El imperativo con μή expresa una prohibición continua. «No descuides» comunica de forma natural la idea de no dejar sin atención algo confiado, sin endurecer el tono ni suavizarlo indebidamente.
- source_word: τοῦ ἐν σοὶ χαρίσματος
  english_pob_choice: the gift that is in you
  chosen_spanish: el don que hay en ti
  alternatives_spanish:
  - el don dentro de ti
  - tu don
  lexicon: BDAG
  rationale: χάρισμα se vierte mejor aquí como «don» en español bíblico sobrio, manteniendo la idea de algo recibido por gracia. «Que hay en ti» conserva la localización explícita en el interior de la persona, como en el griego, sin reducirlo simplemente a posesión.
- source_word: ἐδόθη
  english_pob_choice: was given
  chosen_spanish: te fue dado
  alternatives_spanish:
  - te fue concedido
  - fue dado a ti
  lexicon: BDAG
  rationale: El pasivo aoristo se refleja con una pasiva natural en español. «Te fue dado» preserva el foco en la recepción del don sin introducir al dador de modo explícito.
- source_word: διὰ προφητείας
  english_pob_choice: through prophecy
  chosen_spanish: mediante profecía
  alternatives_spanish:
  - por profecía
  - a través de profecía
  - mediante palabra profética
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento. «Mediante profecía» suena idiomático en español y mantiene la idea de que la profecía acompañó o mediaba la concesión del don, sin añadir «palabra» que el griego no exige.
- source_word: μετὰ ἐπιθέσεως τῶν χειρῶν
  english_pob_choice: with the laying on of the hands
  chosen_spanish: con la imposición de las manos
  alternatives_spanish:
  - con la imposición de manos
  - junto con la imposición de las manos
  lexicon: BDAG
  rationale: La expresión es un giro ritual bien establecido. «Imposición de las manos» reproduce el sustantivo verbal de forma clara y digna en español, conservando la referencia al acto litúrgico sin expandirlo.
- source_word: τοῦ πρεσβυτερίου
  english_pob_choice: the eldership
  chosen_spanish: del presbiterio
  alternatives_spanish:
  - de la asamblea de ancianos
  - del grupo de ancianos
  - de la eldership
  lexicon: BDAG
  rationale: πρεσβυτέριον designa un cuerpo colectivo de ancianos. «Presbiterio» conserva esa referencia colectiva y evita cargar el pasaje con una formulación más explicativa de la que exige el griego; a la vez, mantiene el vínculo semántico con el término técnico ya auditado en el inglés POB.
theological_decisions:
- issue: Cómo traducir χάρισμα sin forzar una categoría carismática más específica
  english_pob_reading: gift
  chosen_spanish_reading: don
  alternative_spanish_readings:
  - don espiritual
  - carisma
  rationale: El griego dice simplemente χάρισμα. «Don» comunica bien la idea de algo concedido por gracia sin imponer una interpretación más estrecha como «don espiritual» o «carisma», que podría desplazar el énfasis del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Cómo reflejar πρεσβυτέριον sin introducir una estructura eclesial ajena al contexto
  english_pob_reading: eldership
  chosen_spanish_reading: presbiterio
  alternative_spanish_readings:
  - ancianato
  - consejo de ancianos
  - presbiterio/ancianato
  rationale: La frase señala una participación colectiva de ancianos en la imposición de manos. «Presbiterio» conserva el sentido de cuerpo de ancianos y evita una paráfrasis más amplia; no se adopta «consejo de ancianos» en el texto principal porque añade una formulación interpretativa que el griego no explicita.
  doctrine_reference: Affirmations; Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que mantuvo «eldership» para πρεσβυτέριον tras corregir una formulación más interpretativa. En español se preserva ese mismo ajuste mediante «presbiterio», y se mantiene la ambigüedad controlada de διὰ προφητείας con una nota alternativa.
  spanish_consistency_notes:
  - Se usó «don» para χάρισμα, en consonancia con el valor base del término y con el POB inglés.
  - Se evitó «SEÑOR» y otros cambios no pertinentes; este versículo no contiene el tetragrama ni κύριος aplicado al nombre divino.
  - Se tradujo el giro ritual de forma estable como «imposición de las manos», coherente con el lenguaje eclesial general y con el griego.
  - 'Se conservó el paralelismo sintáctico del original: prohibición inicial, relativa explicativa y complemento instrumental final.'
