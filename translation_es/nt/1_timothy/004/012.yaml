translation:
  language: es
  text: Que nadie menosprecie tu juventud, sino sé un ejemplo para los creyentes en hablar, en conducta, en amor, en fe[a], en pureza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fidelidad». El griego puede referirse aquí tanto a fe como a fidelidad.
    reason: alternative_reading
lexical_decisions:
- source_word: μηδείς
  english_pob_choice: Let no one
  chosen_spanish: Que nadie
  alternatives_spanish:
  - Que no haya nadie
  - Nadie
  lexicon: BDAG
  rationale: 'Con el imperativo prohibitivo καταφρονείτω, el español natural expresa mejor la exhortación con una cláusula jussiva: «Que nadie». Conserva el tono pastoral sin sonar mecánico.'
- source_word: τῆς νεότητος
  english_pob_choice: your youth
  chosen_spanish: tu juventud
  alternatives_spanish:
  - tu joven edad
  - tu edad joven
  lexicon: BDAG
  rationale: νεότης se refiere a la condición de juventud o a la edad joven. «Juventud» es la forma más natural y fiel en español, y mantiene el genitivo posesivo de σου.
- source_word: καταφρονείτω
  english_pob_choice: look down on
  chosen_spanish: menosprecie
  alternatives_spanish:
  - desprecie
  - trate con desprecio
  - mire con desdén
  lexicon: BDAG
  rationale: καταφρονέω significa mirar por debajo o tratar con desprecio. «Menosprecie» comunica bien ese sentido social sin forzar un tono arcaico.
- source_word: τύπος
  english_pob_choice: an example
  chosen_spanish: un ejemplo
  alternatives_spanish:
  - un modelo
  - un patrón
  lexicon: BDAG
  rationale: Aquí τύπος denota una pauta visible que otros puedan imitar. «Un ejemplo» es claro y natural en español pastoral.
- source_word: γίνου
  english_pob_choice: be
  chosen_spanish: sé
  alternatives_spanish:
  - llega a ser
  - muéstrate como
  lexicon: BDAG
  rationale: Con predicado nominal, γίνομαι en imperativo funciona como exhortación a ser o mostrarse como algo. «Sé» es la traducción más directa y natural.
- source_word: τῶν πιστῶν
  english_pob_choice: for the believers
  chosen_spanish: para los creyentes
  alternatives_spanish:
  - de los creyentes
  - ante los creyentes
  - para los fieles
  lexicon: BDAG
  rationale: El genitivo con τύπος señala el grupo para el que Timoteo ha de servir de ejemplo. «Creyentes» conserva el matiz de πιστοί como personas que creen, y evita resolver innecesariamente la tensión con «fieles».
- source_word: ἐν λόγῳ
  english_pob_choice: in speech
  chosen_spanish: en palabra
  alternatives_spanish:
  - en el hablar
  - en lo que dices
  - en discurso
  lexicon: BDAG
  rationale: λόγος en esta lista de virtudes apunta a la esfera del hablar. En español, «en palabra» mantiene la concisión y el paralelismo de la serie, aunque «en el hablar» sería más explicativo.
- source_word: ἐν ἀναστροφῇ
  english_pob_choice: in conduct
  chosen_spanish: en conducta
  alternatives_spanish:
  - en modo de vida
  - en comportamiento
  lexicon: BDAG
  rationale: ἀναστροφή suele significar conducta o manera de vivir. «Conducta» es breve, idiomática y encaja bien con la estructura enumerativa.
- source_word: ἐν ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - en caridad
  - en afecto
  lexicon: BDAG
  rationale: Por defecto doctrinal, ἀγάπη se rinde como «amor». «Amor» es la opción más fiel y ampliamente inteligible en español cristiano contemporáneo.
- source_word: ἐν πίστει
  english_pob_choice: in faith
  chosen_spanish: en fe
  alternatives_spanish:
  - en fidelidad
  - en confianza
  lexicon: BDAG
  rationale: Por defecto doctrinal, πίστις se traduce «fe». En este contexto puede abarcar tanto la fe como la fidelidad; la forma breve «fe» preserva esa amplitud sin cerrarla prematuramente.
- source_word: ἐν ἁγνείᾳ
  english_pob_choice: in purity
  chosen_spanish: en pureza
  alternatives_spanish:
  - en castidad
  - en limpieza moral
  lexicon: BDAG
  rationale: ἁγνεία denota pureza, especialmente moral y sexual en este marco pastoral. «Pureza» es la rendición más natural y suficientemente amplia en español.
theological_decisions:
- issue: Sentido de πίστις en la lista de virtudes
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  rationale: El expediente inglés conserva «faith» en el texto principal y deja abierta la alternativa «faithfulness» en nota. En español, «fe» mantiene la opción principal sin eliminar la posible referencia a fidelidad; por eso la ambigüedad queda reflejada en la nota.
  doctrine_reference: 'DOCTRINE.md: contested terms table for πίστις; Translation philosophy §3'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el veredicto de revisión fue de alta concordancia; por eso este borrador sigue de cerca la lectura auditada inglesa, ajustándola a una expresión natural y fiel en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el Tetragrámaton ni κύριος con referencia directa al nombre divino.
  - Se usa «creyentes» para τῶν πιστῶν siguiendo el contexto de la lista de virtudes y la decisión inglesa de no forzar «fieles» en el texto principal.
  - Se conserva el paralelismo de la enumeración con frases breves introducidas por «en».
