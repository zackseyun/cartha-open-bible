lexical_decisions:
- source_word: Παράγγελλε
  english_pob_choice: Command
  chosen_spanish: Ordena
  alternatives_spanish:
  - Manda
  - Encarga
  - Instruye
  lexicon: BDAG
  rationale: El imperativo presente singular expresa una acción continua con autoridad. En español, «Ordena» conserva mejor esa fuerza directiva sin sonar innecesariamente rígido como «Comanda» ni suavizarse a mera sugerencia.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas
  - estas instrucciones
  lexicon: BDAG
  rationale: El demostrativo neutro plural apunta a las enseñanzas previas. «Estas cosas» conserva el plural y su referencia anafórica de manera natural en español.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - además
  lexicon: BDAG
  rationale: Conjunción coordinante simple; «y» es la correspondencia más directa y natural.
- source_word: δίδασκε
  english_pob_choice: teach them
  chosen_spanish: enséñalas
  alternatives_spanish:
  - enséñalas continuamente
  - sigue enseñándolas
  - instrúyelas
  lexicon: BDAG
  rationale: El imperativo presente sugiere acción continua. En español, el objeto implícito de ταῦτα se expresa de modo natural con el enclítico femenino plural «las», manteniendo el referente plural de «estas cosas».
theological_decisions:
- issue: Fuerza autoritativa de παραγγέλλω
  english_pob_reading: Render with authoritative force as 'Command' without softening to a merely advisory sense.
  chosen_spanish_reading: Usar «Ordena» para conservar el peso directivo sin convertirlo en una instrucción débil.
  alternative_spanish_readings:
  - Instruye estas cosas y enséñalas
  - Encarga estas cosas y enséñalas
  rationale: El texto presenta dos imperativos presentes dirigidos a Timoteo. «Ordena» conserva la autoridad inherente al verbo griego sin añadir matices eclesiales ajenos al pasaje.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve the source text’s plain sense.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el pasaje muestra acuerdo alto y no requiere ajuste respecto del contexto auditado en inglés.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo de dos imperativos en español: «Ordena... y enséñalas».'
  - Se evita «SEÑOR»/coberturas tradicionales porque aquí no aparece el tetragrámaton ni κύριος.
  - El objeto plural implícito de δίδασκε se expresa con «las» para reflejar ταῦτα sin perder naturalidad en español.
