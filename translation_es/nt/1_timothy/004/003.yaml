    text: 'O, más literalmente: «prohibiendo casarse y abstenerse de alimentos». El texto principal explicita que los falsos maestros exigían abstenerse de ciertos alimentos.'
    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula final para preservar la lectura de un solo grupo descrito por dos rasgos coordinados, en línea con el griego y con la auditoría inglesa. También se mejora el matiz aspectual de ἐπεγνωκόσι con 'han llegado a conocer' y se corrige la nota para expresar con claridad que la abstinencia era impuesta por los falsos maestros, no prohibida. Se elimina la coma antes de la relativa restrictiva para una puntuación española más natural.
