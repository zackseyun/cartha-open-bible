translation:
  language: es
  text: prohibiendo casarse y ordenando abstenerse de alimentos[a] que Dios creó para ser recibidos con acción de gracias por los que creen y han llegado a conocer la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «prohibiendo casarse y abstenerse de alimentos». El texto principal explicita que los falsos maestros exigían abstenerse de ciertos alimentos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κωλυόντων
  english_pob_choice: forbidding
  chosen_spanish: prohibiendo
  alternatives_spanish:
  - impidiendo
  - prohibiendo
  lexicon: BDAG
  rationale: El participio presente conserva la idea de una acción continua o característica. «Prohibiendo» comunica de forma natural la fuerza de κωλύω en este contexto de falsa enseñanza.
- source_word: γαμεῖν
  english_pob_choice: marriage
  chosen_spanish: casarse
  alternatives_spanish:
  - contraer matrimonio
  - casarse
  lexicon: BDAG
  rationale: El infinitivo griego significa «casarse / tomar esposa-esposo». En español, «casarse» es más natural que el abstracto «matrimonio» y evita una paráfrasis demasiado institucional.
- source_word: ἀπέχεσθαι
  english_pob_choice: requiring abstinence
  chosen_spanish: ordenando abstenerse
  alternatives_spanish:
  - requiriendo abstinencia
  - mandando abstenerse
  lexicon: BDAG
  rationale: Aunque el infinitivo literalmente es «abstenerse», el contexto heredado del testimonio inglés muestra que se trata de una exigencia impuesta por los falsos maestros. «Ordenando abstenerse» preserva esa fuerza sin ocultar el sentido verbal.
- source_word: βρωμάτων
  english_pob_choice: foods
  chosen_spanish: alimentos
  alternatives_spanish:
  - comidas
  - alimentos
  lexicon: BDAG
  rationale: El plural genitivo apunta a varios tipos de alimento. «Alimentos» es un equivalente claro y sobrio en español.
- source_word: ἔκτισεν
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - hizo
  - creó
  lexicon: BDAG
  rationale: El verbo κτίζω mantiene un matiz de creación, no solo fabricación. «Creó» conserva mejor la fuerza teológica.
- source_word: εἰς μετάλημψιν
  english_pob_choice: to be received
  chosen_spanish: para ser recibidos
  alternatives_spanish:
  - para participar de ellos
  - para ser recibidos
  lexicon: BDAG
  rationale: La frase expresa propósito o destino de uso. «Para ser recibidos» reproduce bien el valor final sin añadir una explicación interpretativa excesiva.
- source_word: μετὰ εὐχαριστίας
  english_pob_choice: with thanksgiving
  chosen_spanish: con acción de gracias
  alternatives_spanish:
  - con gratitud
  - con acción de gracias
  lexicon: BDAG
  rationale: «Acción de gracias» es una fórmula bíblica y eclesial natural en español, y preserva el sustantivo de εὐχαριστία con precisión.
- source_word: τοῖς πιστοῖς
  english_pob_choice: by those who believe
  chosen_spanish: por los creyentes
  alternatives_spanish:
  - por los creyentes
  - por los fieles
  lexicon: BDAG
  rationale: πιστοῖς puede leerse como «fieles» o «creyentes». Dado el contexto, «creyentes» comunica con claridad el grupo destinatario sin perder el valor de fe/lealtad.
- source_word: ἐπεγνωκόσι τὴν ἀλήθειαν
  english_pob_choice: have come to know the truth
  chosen_spanish: los que han conocido la verdad
  alternatives_spanish:
  - los que han llegado a conocer la verdad
  - los que han conocido la verdad
  lexicon: BDAG
  rationale: El perfecto participial sugiere un estado resultante de conocimiento adquirido. «Han conocido» conserva bien ese resultado y suena natural en español. Se mantiene la conexión con la verdad como contenido reconocido.
theological_decisions:
- issue: Si τοῖς πιστοῖς καὶ ἐπεγνωκόσι τὴν ἀλήθειαν designa un solo grupo o dos grupos distintos
  english_pob_reading: 'One group described by two coordinated characteristics: believers who have come to know the truth'
  chosen_spanish_reading: 'un solo grupo descrito por dos rasgos coordinados: los creyentes que han conocido la verdad'
  alternative_spanish_readings:
  - 'dos grupos: los creyentes y los que han conocido la verdad'
  rationale: La coordinación gramatical favorece leer una sola clase de personas caracterizada de dos maneras. La traducción española mantiene esa unidad sin forzar una aclaración que la gramática no exige.
  doctrine_reference: Preservar la tensión gramatical sin dividir artificialmente el grupo destinatario.
translation_notes:
  revision_awareness: 'El testimonio inglés revisado no mostró cambios sustantivos: la lectura final se mantuvo estable, con acuerdo alto en la revisión cruzada. La versión española sigue esa línea estable y conserva la misma decisión interpretativa principal.'
  spanish_consistency_notes:
  - Se usó «Dios» para ὁ θεός conforme al patrón del proyecto.
  - Se prefirió «creó» para κτίζω por su peso teológico.
  - Se mantuvo «acción de gracias» para εὐχαριστία por su naturalidad bíblica en español.
  - «Creyentes» traduce πιστοῖς de manera inclusiva y clara en español contemporáneo.
  - La nota al pie preserva la alternativa literal reconocida por el audit trail inglés.
