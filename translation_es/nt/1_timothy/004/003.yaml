review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: participio de continuidad (''prohibiendo''), infinitivos dependientes (''casarse'', ''abstenerse''), creación divina de los alimentos, y el propósito de recibirlos con acción de gracias. Sin embargo, la frase final en español (''por los creyentes y los que han conocido la verdad'') introduce la impresión de dos grupos, mientras que el griego con artículo compartido favorece un solo grupo descrito con dos rasgos. También conviene ajustar la nota para no hablar de ''prohibición'' de la abstinencia, sino de la exigencia de abstenerse.'
  spanish_quality_summary: El español es claro y digno, pero la coordinación final suena ambigua y menos fiel que una formulación integrada como 'por los que creen y han llegado a conocer la verdad'. El resto del verso es natural y bien leído en español bíblico contemporáneo. La nota al pie necesita una leve corrección de redacción para evitar confusión semántica.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Dios', 'acción de gracias' y 'creyentes' son adecuados. La decisión sobre ἐπεγνωκόσι debe expresarse en español de modo que preserve mejor el matiz perfectivo ('han llegado a conocer') y, sobre todo, la referencia a un solo grupo.
  issues:
  - severity: high
    issue: La frase 'por los creyentes y los que han conocido la verdad' sugiere dos grupos distintos.
    rationale: El inglés auditado y la decisión teológica documentada entienden τοῖς πιστοῖς καὶ ἐπεγνωκόσι τὴν ἀλήθειαν como un solo grupo con dos características. El español actual rompe esa unidad de manera natural para el lector.
  - severity: medium
    issue: '''han conocido la verdad'' atenúa el matiz de ''have come to know''.'
    rationale: No es una infidelidad grave, pero 'han llegado a conocer la verdad' o una construcción equivalente preserva mejor el valor resultativo/ingresivo del perfecto participial ἐπεγνωκόσι.
  - severity: medium
    issue: La nota al pie dice 'la prohibición recae sobre la abstinencia de ciertos alimentos'.
    rationale: Esa redacción es confusa, porque parece prohibir la abstinencia en vez de indicar que los falsos maestros la imponían. Debe hablar de exigir/mandar abstenerse de ciertos alimentos.
  revised_spanish_text: prohibiendo casarse y ordenando abstenerse de alimentos[a] que Dios creó para ser recibidos con acción de gracias por los que creen y han llegado a conocer la verdad.
  revised_footnotes:
