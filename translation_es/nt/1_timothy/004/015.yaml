    issue: «permanece en ellas» debilita el matiz de inmersión total de ἐν τούτοις ἴσθι
    rationale: La frase griega literalmente significa «está en estas cosas» y, según el audit trail, expresa implicación profunda o absorción. «Permanece» enfatiza continuidad, pero no necesariamente concentración total o entrega absorbente.
  - severity: low
    issue: La nota al pie puede mejorarse en naturalidad y consistencia editorial
    rationale: '«''O: «sumérgete en ellas»...» mezcla comillas de forma poco limpia. Además, «sumérgete» funciona mejor presentado de manera directa y la explicación puede mantenerse más pulida en español editorial.'
  revised_spanish_text: Practica estas cosas; ocúpate por completo de ellas[a], para que tu progreso sea evidente a todos.
