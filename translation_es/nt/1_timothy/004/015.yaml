translation:
  language: es
  text: Practica estas cosas; ocúpate por completo de ellas[a], para que tu progreso sea evidente a todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sumérgete en ellas». La expresión griega dice literalmente: «está en estas cosas», y comunica una implicación profunda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estos asuntos
  lexicon: BDAG
  rationale: El demostrativo plural retoma las instrucciones anteriores. «Estas cosas» conserva esa referencia amplia y natural en español sin volver más técnico el texto.
- source_word: μελέτα
  english_pob_choice: Practice
  chosen_spanish: Practica
  alternatives_spanish:
  - Medita en
  - Ocúpate de
  - Dedica atención a
  lexicon: BDAG
  rationale: El verbo expresa atención disciplinada y aplicación constante, no solo reflexión interior. «Practica» comunica mejor la idea de ejercicio continuo y comprometido en este contexto pastoral.
- source_word: ἐν τούτοις ἴσθι
  english_pob_choice: be in them
  chosen_spanish: permanece en ellas
  alternatives_spanish:
  - estate en ellas
  - sumérgete en ellas
  - dedícate a ellas
  lexicon: BDAG
  rationale: La imagen literal es «estar en estas cosas», indicando inmersión o dedicación plena. «Permanece en ellas» conserva esa idea relacional y de constancia, con una naturalidad mejor en español que un calco más duro.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Conjunción final natural en español; mantiene la relación de propósito entre la exhortación y el resultado buscado.
- source_word: προκοπή
  english_pob_choice: progress
  chosen_spanish: progreso
  alternatives_spanish:
  - avance
  - adelanto
  lexicon: BDAG
  rationale: El sustantivo denota avance o progreso. «Progreso» es el equivalente más claro y equilibrado en español, y no estrecha indebidamente la referencia a una sola esfera de crecimiento.
- source_word: φανερὰ ᾖ
  english_pob_choice: may be evident
  chosen_spanish: sea evidente
  alternatives_spanish:
  - sea manifiesto
  - sea visible
  - quede claro
  lexicon: BDAG
  rationale: La construcción expresa que el progreso llegue a ser claramente perceptible. «Sea evidente» conserva bien la idea de visibilidad pública sin añadir matices no presentes en el griego.
- source_word: πᾶσιν
  english_pob_choice: to all
  chosen_spanish: a todos
  alternatives_spanish:
  - ante todos
  - para todos
  lexicon: BDAG
  rationale: El dativo plural se refiere de modo amplio a toda la audiencia pertinente. «A todos» es directo y formalmente adecuado en español.
theological_decisions:
- issue: Alcance del progreso visible de Timoteo
  english_pob_reading: The verse speaks broadly of Timothy's observable progress in the instructed duties, without narrowing it to either spiritual maturity alone or ministerial skill alone.
  chosen_spanish_reading: El versículo habla de manera amplia del progreso observable de Timoteo en las tareas recibidas, sin reducirlo solo a madurez espiritual o solo a habilidad ministerial.
  alternative_spanish_readings:
  - principalmente crecimiento espiritual
  - principalmente eficacia ministerial
  rationale: La combinación de «practica», «permanece» y «progreso» abarca una obediencia práctica visible. Mantener «progreso» evita resolver la tensión entre madurez interior y competencia pública, que el contexto deja abierta.
  doctrine_reference: Preservar la tensión teológica en vez de cerrarla
translation_notes:
  revision_awareness: No se requirieron cambios respecto del último pase auditado; la redacción española sigue la lectura estable del texto griego y el valor de progreso visible señalado en el expediente en inglés.
  spanish_consistency_notes:
  - Se mantuvo «progreso» para προκοπή, en línea con el expediente inglés y sin estrechar el sentido a una sola esfera.
  - Se evitó «SEÑOR» u այլ equivalentes; no hay vocabulario divino explícito en este versículo.
  - «Permanece en ellas» traduce de forma idiomática la inmersión implícita en ἐν τούτοις ἴσθι, mientras la nota preserva la alternativa más literal.
  - La puntuación con punto y coma sigue la división exhortativa del griego y el orden natural del español.
