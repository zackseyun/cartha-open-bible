- from: Practica estas cosas; permanece en ellas[a], para que tu progreso sea evidente a todos.
  to: Practica estas cosas; ocúpate por completo de ellas[a], para que tu progreso sea evidente a todos.
  rationale: 'Se revisa solo la segunda exhortación para reflejar mejor el sentido idiomático de ἐν τούτοις ἴσθι según el audit trail inglés: involucración total, no mera permanencia. «Ocúpate por completo de ellas» es español natural y conserva la fuerza pastoral. Se mantiene la alternativa más metafórica en nota, tal como hace el POB en inglés con «be absorbed in them». No se requiere adjudicación adicional.'
