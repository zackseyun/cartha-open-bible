    issue: 'Expresión principal poco natural: ''mitos profanos y de viejas'''
    rationale: γραφώδεις significa 'característico de viejas', no simplemente un complemento nominal suelto. En español, 'de viejas' aquí suena incompleto y estilísticamente tosco de una manera no controlada, lo que dificulta percibir con precisión la relación adjetival con 'mitos'.
  - severity: low
    issue: La nota y la decisión léxica ya apuntan a 'característicos de viejas', pero el texto principal no lo refleja con suficiente claridad
    rationale: Hay una leve desalineación interna entre la justificación léxica y la redacción escogida. Ajustar el texto principal resolvería esta inconsistencia sin cambiar la filosofía de traducción.
  revised_spanish_text: Pero rechaza los mitos profanos y propios de viejas[a], y ejercítate para la piedad.
