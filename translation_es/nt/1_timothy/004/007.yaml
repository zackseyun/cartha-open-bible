translation:
  language: es
  text: Pero rechaza los mitos profanos y propios de viejas[a], y ejercítate para la piedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “cuentos de viejas”. El griego significa literalmente “mitos característicos de viejas”, una expresión despectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: βεβήλους
  english_pob_choice: profane
  chosen_spanish: profanos
  alternatives_spanish:
  - impíos
  - irreverentes
  - mundanos
  lexicon: BDAG
  rationale: βεβήλους expresa lo que es ajeno a lo sagrado; “profanos” conserva mejor en español la oposición sagrado/profano que alternativas más generales como “impíos”.
- source_word: γραώδεις
  english_pob_choice: old-womanish
  chosen_spanish: de viejas
  alternatives_spanish:
  - de viejas chismosas
  - de viejas ridículas
  - de viejas
  lexicon: BDAG
  rationale: El adjetivo griego significa literalmente “característico de viejas”. “De viejas” mantiene la forma y el tono despectivo sin suavizarlo demasiado; en español suena áspero, pero sigue siendo inteligible. La alternativa idiomática se registra en la nota.
- source_word: μύθους
  english_pob_choice: myths
  chosen_spanish: mitos
  alternatives_spanish:
  - fábulas
  - leyendas
  lexicon: BDAG
  rationale: “Mitos” reproduce bien μῦθος en este contexto de relatos inventados o especulativos. “Fábulas” puede sonar más literaria y “leyendas” desplaza el sentido.
- source_word: παραιτοῦ
  english_pob_choice: reject
  chosen_spanish: rechaza
  alternatives_spanish:
  - evita
  - rehúsa
  - deséchalos
  lexicon: BDAG
  rationale: El imperativo medio pide apartarse o rehusar esas cosas. “Rechaza” es breve, fuerte y natural en español, y preserva el valor imperativo.
- source_word: γύμναζε
  english_pob_choice: train
  chosen_spanish: ejercítate
  alternatives_spanish:
  - entrena
  - disciplínate
  - ejercita tu vida
  lexicon: BDAG
  rationale: El verbo evoca entrenamiento atlético. “Ejercítate” comunica la idea de práctica diligente y conserva la imagen de disciplina corporal aplicada a la vida espiritual; “entrena” también sería posible, pero “ejercítate” suena más natural en esta construcción reflexiva.
- source_word: σεαυτόν
  english_pob_choice: yourself
  chosen_spanish: te
  alternatives_spanish:
  - a ti mismo
  - a ti
  lexicon: BDAG
  rationale: El reflexivo se integra naturalmente en el verbo pronominal español “ejercítate”; la referencia a Timoteo queda clara por el contexto.
- source_word: πρὸς εὐσέβειαν
  english_pob_choice: for godliness
  chosen_spanish: para la piedad
  alternatives_spanish:
  - hacia la piedad
  - para la devoción a Dios
  - para la reverencia
  lexicon: BDAG
  rationale: πρός con acusativo expresa meta o propósito. En las Pastorales, εὐσέβεια suele designar una vida reverente orientada a Dios; “piedad” es una equivalencia estable en español y evita estrechar el sentido a mero formalismo devocional.
- source_word: δὲ
  english_pob_choice: But ... and
  chosen_spanish: Pero ... y
  alternatives_spanish:
  - Ahora ... y
  - Sin embargo ... y
  lexicon: BDAG
  rationale: El primer δέ marca contraste, por eso va con “Pero”. El segundo conecta la segunda orden de forma natural con “y”, sin forzar un contraste repetido.
theological_decisions:
- issue: Fuerza despectiva de γραώδεις μύθους
  english_pob_reading: Retain the literal pejorative force as 'old-womanish myths' in the main text, with the idiomatic alternative 'old wives' myths/tales' preserved in a footnote.
  chosen_spanish_reading: Conservar la aspereza literal con “mitos ... de viejas” en el texto principal, y explicar en nota la alternativa idiomática “cuentos de viejas”.
  alternative_spanish_readings:
  - cuentos de viejas
  - fábulas de ancianas
  - mitos de viejas
  rationale: El griego no solo rechaza relatos falsos, sino que lo hace con una expresión socialmente marcada y peyorativa. Mantener esa aspereza evita diluir el tono retórico; la nota preserva la alternativa idiomática natural en español.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se introdujeron cambios sustanciales respecto del pasaje auditado; se mantuvo la decisión de preservar la aspereza del griego en la frase despectiva y la metáfora del entrenamiento.'
  spanish_consistency_notes:
  - Se mantuvo “profanos” para βέβηλους, en línea con la oposición sagrado/profano.
  - Se evitó “SEÑOR” u այլ equivalentes; el verso no contiene el nombre divino.
  - “Piedad” traduce εὐσέβεια de forma estable y legible en español eclesial.
  - La nota se ancla solo en la expresión marcada con [a] para evitar ambigüedad textual.
