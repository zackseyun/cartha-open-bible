translation:
  language: es
  text: Porque el entrenamiento corporal[a] es beneficioso por poco tiempo[b], pero la piedad es beneficiosa para todas las cosas[c], pues tiene promesa de la vida presente y de la vida venidera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ejercicio corporal» o «entrenamiento físico».
    reason: lexical_alternative
  - marker: b
    text: O «por un poco» o «en pequeña medida»; el griego puede indicar duración limitada o alcance limitado.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «teniendo promesa de la vida de ahora y de la venidera».
    reason: lexical_alternative
lexical_decisions:
- source_word: σωματικὴ γυμνασία
  english_pob_choice: bodily training
  chosen_spanish: entrenamiento corporal
  alternatives_spanish:
  - ejercicio corporal
  - entrenamiento físico
  lexicon: BDAG
  rationale: γυμνασία denota entrenamiento o ejercicio; σωματική añade la referencia al cuerpo. "Entrenamiento corporal" conserva ambos elementos con español natural y evita restringirlo a una práctica atlética específica.
- source_word: πρὸς ὀλίγον
  english_pob_choice: for a little while
  chosen_spanish: por poco tiempo
  alternatives_spanish:
  - por un poco
  - en pequeña medida
  lexicon: BDAG
  rationale: 'La frase puede señalar duración limitada o alcance limitado. En este contexto, el contraste con la utilidad amplia de la piedad favorece una noción temporal: "por poco tiempo".'
- source_word: ὠφέλιμος
  english_pob_choice: beneficial
  chosen_spanish: provechoso
  alternatives_spanish:
  - útil
  - beneficioso
  lexicon: BDAG
  rationale: '"Provechoso" comunica bien la idea de utilidad real sin sonar demasiado técnico o económico, y funciona en ambos miembros del contraste.'
- source_word: εὐσέβεια
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - vida piadosa
  lexicon: BDAG
  rationale: En las Pastorales εὐσέβεια designa una vida reverente orientada a Dios. "Piedad" es el equivalente español más asentado y conserva el matiz teológico del término.
- source_word: πρὸς πάντα
  english_pob_choice: for all things
  chosen_spanish: para todo
  alternatives_spanish:
  - en todo
  - para todas las cosas
  lexicon: BDAG
  rationale: La expresión abarca una utilidad completa o general. "Para todo" reproduce esa amplitud con fluidez en español.
- source_word: ἐπαγγελίαν ἔχουσα
  english_pob_choice: since it holds promise
  chosen_spanish: pues tiene promesa
  alternatives_spanish:
  - ya que tiene promesa
  - porque tiene promesa
  lexicon: BDAG
  rationale: El participio explica por qué la piedad es provechosa en todo. "Pues tiene promesa" mantiene el valor explicativo sin volverlo demasiado interpretativo.
- source_word: ζωῆς τῆς νῦν καὶ τῆς μελλούσης
  english_pob_choice: the present life and the coming one
  chosen_spanish: la vida de ahora y la de la venidera
  alternatives_spanish:
  - la vida presente y la futura
  - la vida actual y la venidera
  lexicon: BDAG
  rationale: La elipsis del segundo ζωή se preserva de forma natural en español mediante "la de la venidera". "De ahora" expresa el contraste temporal de τῆς νῦν.
theological_decisions:
- issue: Valor relativo del entrenamiento corporal frente a la piedad
  english_pob_reading: bodily training has limited value in contrast to the comprehensive value of godliness
  chosen_spanish_reading: el entrenamiento corporal tiene valor limitado, mientras que la piedad tiene valor amplio y abarcador
  alternative_spanish_readings:
  - el entrenamiento corporal no vale casi nada
  - el entrenamiento corporal vale solo un poco
  rationale: El griego no niega todo valor al entrenamiento corporal; solo lo limita. La traducción preserva esa tensión, contrastándolo con la utilidad universal de la piedad.
  doctrine_reference: Traslación cuidadosa de la comparación paulina sin absolutizar ni minimizar indebidamente el ejercicio corporal.
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registraron cambios posteriores al pasaje base y el cotejo indicó alta concordancia con solo observaciones menores.'
  spanish_consistency_notes:
  - Se usó «piedad» para εὐσέβεια, en continuidad con el valor técnico del término en las Pastorales.
  - Se mantuvo la tensión semántica de πρὸς ὀλίγον sin convertirla en una negación absoluta del valor del ejercicio corporal.
  - La elipsis de «vida» en el segundo miembro se conservó de manera natural con «la de la venidera».
