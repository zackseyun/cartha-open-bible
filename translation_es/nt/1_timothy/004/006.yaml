translation:
  language: es
  text: Al poner estas cosas delante de los hermanos[a], serás un buen servidor de Mesías Jesús[b], siendo nutrido por las palabras de la fe[c] y de la buena enseñanza que has seguido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» puede referirse a los creyentes en general, incluidas las mujeres, según el contexto.
    reason: cultural_note
  - marker: b
    text: O «Cristo Jesús». La traducción de Χριστός como «Mesías» aquí preserva su sentido de título.
    reason: alternative_reading
  - marker: c
    text: O «de la palabra de la fe»; aquí «la fe» probablemente señala el contenido reconocido de la creencia cristiana.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  - esto
  lexicon: BDAG
  rationale: El demostrativo neutro plural apunta a lo que antecede; «estas cosas» conserva el referente plural y suena natural en español.
- source_word: ὑποτιθέμενος
  english_pob_choice: putting ... before
  chosen_spanish: al poner ... delante
  alternatives_spanish:
  - al presentar ... delante
  - al colocar ... delante
  - al recordar
  lexicon: BDAG
  rationale: La imagen concreta de colocar algo delante de alguien se conserva con «poner delante», sin reducir el verbo a una explicación más abstracta.
- source_word: τοῖς ἀδελφοῖς
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  lexicon: BDAG
  rationale: El griego es masculino plural; «los hermanos» mantiene la forma marcada y puede incluir a la comunidad creyente según el contexto, como nota la POB inglesa.
- source_word: καλὸς
  english_pob_choice: good
  chosen_spanish: buen
  alternatives_spanish:
  - bueno
  - noble
  - excelente
  lexicon: BDAG
  rationale: En español, «buen esclavo» es más idiomático que «esclavo bueno» y conserva el valor evaluativo de καλός.
- source_word: διάκονος
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  - ministro
  lexicon: BDAG
  rationale: Para mantener la fuerza léxica que la POB inglesa da a διάκονος cuando no se trata claramente del oficio eclesiástico, «esclavo» comunica dependencia y servicio con mayor vigor que «siervo».
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  lexicon: BDAG
  rationale: Se sigue el criterio doctrinal de traducir Χριστός como «Mesías» cuando funciona como título, preservando su sentido original y evitando la forma litúrgica tradicional sin justificación textual.
- source_word: ἐντρεφόμενος
  english_pob_choice: being nourished
  chosen_spanish: alimentado
  alternatives_spanish:
  - nutrido
  - siendo alimentado
  - criado
  lexicon: BDAG
  rationale: El participio sugiere ser nutrido/formado por algo. «Alimentado» conserva la metáfora y funciona con naturalidad en español.
- source_word: τοῖς λόγοις
  english_pob_choice: by the words
  chosen_spanish: por las palabras
  alternatives_spanish:
  - en las palabras
  - con las palabras
  lexicon: BDAG
  rationale: El dativo instrumental se expresa bien con «por», manteniendo λόγοις como «palabras» en vez de diluirlo prematuramente en «enseñanza».
- source_word: τῆς πίστεως
  english_pob_choice: of the faith
  chosen_spanish: de la fe
  alternatives_spanish:
  - de la fidelidad
  - de la fe cristiana
  lexicon: BDAG
  rationale: La forma con artículo apunta probablemente al contenido reconocido de la fe cristiana; «de la fe» conserva la ambigüedad útil entre fe como confianza y fe como depósito doctrinal.
- source_word: τῆς καλῆς διδασκαλίας
  english_pob_choice: of the good teaching
  chosen_spanish: de la buena enseñanza
  alternatives_spanish:
  - de la sana enseñanza
  - de la buena doctrina
  lexicon: BDAG
  rationale: διδασκαλία puede ser enseñanza o doctrina. «Buena enseñanza» traduce el adjetivo sin introducir «sana», que sería más interpretativo.
- source_word: ᾗ
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - a la que
  - la cual
  lexicon: BDAG
  rationale: El relativo se refiere de manera natural a «la buena enseñanza»; «que» es la opción más fluida en español y evita rigidizar la sintaxis.
- source_word: παρηκολούθηκας
  english_pob_choice: you have followed
  chosen_spanish: has seguido
  alternatives_spanish:
  - has seguido de cerca
  - has prestado atención a
  - has adherido a
  lexicon: BDAG
  rationale: El verbo puede implicar seguir de cerca o adherirse; «has seguido» es suficientemente amplio e idiomático para abarcar ambas ideas sin sobreespecificar.
theological_decisions:
- issue: Cómo traducir Χριστός en un título cristológico
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La política doctrinal pide traducir Χριστός como título cuando el contexto lo permite. En español, «Mesías» preserva el contenido semántico de un título ungido y evita convertirlo en mero nombre propio.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Alcance de ἀδελφοί en contexto eclesial
  english_pob_reading: the brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: Se conserva la forma masculina plural como lectura gramatical primaria, dejando que el contexto determine la inclusión de mujeres sin borrar la forma del griego.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Sentido de πίστις con artículo
  english_pob_reading: the faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la fidelidad
  - la fe cristiana
  rationale: El artículo favorece la referencia al contenido reconocido de la fe; «la fe» mantiene la ambigüedad entre acto de creer y cuerpo de creencias, sin imponer una paráfrasis doctrinal.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις'
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre «Messiah Jesus» y «Christ Jesus», con corrección final de regreso a «Messiah Jesus» por política doctrinal. También mantiene «the brothers» y «the faith» como lecturas principales con notas de alternativa. La versión española sigue la forma final doctrinalmente restaurada y conserva las mismas tensiones léxicas en un registro publicable.
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστός conforme al criterio del proyecto.
  - «Esclavo» se usó para διάκονος siguiendo la decisión léxica aportada por el audit trail, aunque es una opción marcada en español; se conserva por fidelidad al matiz funcional y jerárquico del término.
  - Las notas reproducen las alternativas relevantes sin convertirlas en paráfrasis del texto principal.
  - La puntuación y el orden sintáctico se ajustan al español moderno sin perder la estructura participial del griego.
