lexical_decisions:
- source_word: ἁγιάζεται
  english_pob_choice: is sanctified
  chosen_spanish: es santificado
  alternatives_spanish:
  - es hecho santo
  - es consagrado
  lexicon: BDAG
  rationale: El pasivo presente indica que algo es puesto en un estado de santidad/consagración. «Es santificado» conserva la correspondencia léxica directa con la revisión más reciente del POB inglés y mantiene la ambigüedad contextual sin forzar una lectura moral o soteriológica.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: En español, «porque» comunica de forma natural la fuerza explicativa causal del contexto inmediato. «Pues» también sería posible, pero «porque» suena más claro en un registro moderno y digno.
- source_word: διὰ
  english_pob_choice: through
  chosen_spanish: por
  alternatives_spanish:
  - mediante
  - a través de
  lexicon: BDAG
  rationale: Con genitivo, διά expresa medio o instrumento. «Por» funciona de manera natural en español y conserva la idea de medio sin sobrecargar la frase.
- source_word: λόγου θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - la palabra de Dios
  lexicon: BDAG
  rationale: 'Se mantiene la fórmula bíblica estable «la palabra de Dios», que es fiel al genitivo y deja abierta la amplitud semántica que el audit trail inglés preserva: palabra hablada, declarada o autorizada por Dios.'
- source_word: ἐντεύξεως
  english_pob_choice: prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - la intercesión
  - la petición
  lexicon: BDAG
  rationale: Aunque ἔντευξις puede precisar «intercesión» o «petición», el contexto de 1 Timoteo 4:3–5 favorece una designación amplia. «La oración» comunica mejor la acción sin estrechar indebidamente el término; las alternativas se conservan como posibilidades semánticas.
theological_decisions:
- issue: Alcance de la santificación en contexto
  english_pob_reading: The verse speaks of food being set apart as acceptable for use, not of moral purification or salvation.
  chosen_spanish_reading: El versículo dice que el alimento es puesto aparte como santo para su uso, no que reciba purificación moral ni que hable de salvación.
  alternative_spanish_readings:
  - Puede leerse de modo más general como una santificación religiosa amplia.
  rationale: El contexto inmediato trata de alimentos recibidos con gratitud. «Es santificado» preserva el lenguaje de santificación sin convertirlo en una afirmación sacramental o soteriológica que el texto no exige.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «is made holy» a «is sanctified» para acercarse más al léxico de ἁγιάζεται. La versión española sigue esa decisión con «es santificado», evitando una paráfrasis explicativa excesiva.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque el texto no contiene κύριος ni una cita directa del nombre divino.
  - «Oración» se deja amplio para no forzar «intercesión» en el cuerpo del texto.
  - El orden y la brevedad siguen de cerca la estructura causal del griego.
