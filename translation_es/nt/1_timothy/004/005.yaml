  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Dios', 'palabra de Dios' y 'oración' son adecuados. 'Santificado' preserva la correspondencia con ἁγιάζεται y la decisión teológica de no reducir el término a purificación moral ni a salvación.
