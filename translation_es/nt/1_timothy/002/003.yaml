translation:
  language: es
  text: Esto es bueno y aceptable delante de Dios nuestro Salvador,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: This
  chosen_spanish: Esto
  alternatives_spanish:
  - Esto
  - Esto mismo
  lexicon: BDAG
  rationale: El demostrativo neutro remite a la instrucción anterior sobre la oración. «Esto» conserva bien la referencia anafórica sin añadir sustantivos no presentes en el griego.
- source_word: καλὸν
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bueno
  - recto
  - noble
  lexicon: BDAG
  rationale: En este contexto ético, καλός expresa la calidad moral o lo apropiado de la acción. «Bueno» es la opción más natural y suficientemente amplia en español.
- source_word: ἀπόδεκτον
  english_pob_choice: acceptable
  chosen_spanish: aceptable
  alternatives_spanish:
  - agradable
  - bien recibido
  - aprobado
  lexicon: BDAG
  rationale: El adjetivo señala que la acción es recibida favorablemente. «Aceptable» conserva ese valor evaluativo sin volver la frase más interpretativa que el original.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en la presencia de
  - a los ojos de
  lexicon: BDAG
  rationale: La preposición expresa la valoración hecha en la presencia o consideración de Dios. «Delante de» es idiomático en español y mantiene la relación espacial/valorativa del griego.
- source_word: σωτῆρος
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - Libertador
  - Redentor
  lexicon: BDAG
  rationale: σωτήρ es un título teológicamente cargado en las Pastorales. «Salvador» es el equivalente claro y establecido en español, y preserva el título divino sin diluirlo.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - nuestro
  lexicon: BDAG
  rationale: 'El pronombre posesivo se conserva directamente para mantener el vínculo relacional del título: Dios es «nuestro Salvador».'
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: θεοῦ funciona en aposición con σωτῆρος. En español, «Dios nuestro Salvador» reproduce de forma natural la estructura sin perder la identificación apposicional.
theological_decisions:
- issue: Relación aposicional en τοῦ σωτῆρος ἡμῶν θεοῦ
  english_pob_reading: Render as 'God our Savior'
  chosen_spanish_reading: Dios nuestro Salvador
  alternative_spanish_readings:
  - nuestro Salvador Dios
  - Dios, nuestro Salvador
  rationale: El griego identifica a Dios como Salvador mediante una construcción en aposición. «Dios nuestro Salvador» mantiene esa identificación de manera natural en español; «nuestro Salvador Dios» suena forzado, y la coma introduciría una pausa no exigida por el texto.
  doctrine_reference: 'Affirmations; Translation philosophy #6'
translation_notes:
  revision_awareness: El texto inglés auditado no introduce notas ni variantes; el griego coincide de manera alta con la lectura inglesa, por lo que no se requieren notas textuales ni alternativas destacadas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Salvador» para σωτήρ, en continuidad con la terminología POB.
  - Se evita reemplazar el título por formas eclesiásticas más tradicionales que no sean necesarias para la claridad del español.
  - La elección «delante de» conserva el valor relacional de ἐνώπιον sin sobreinterpretar la frase.
