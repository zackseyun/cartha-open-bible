lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: El contexto contrasta con el adorno externo del versículo anterior; en español, «sino» expresa mejor una corrección contrastiva directa que «pero» sin añadir peso innecesario.
- source_word: ὃ πρέπει
  english_pob_choice: what is proper
  chosen_spanish: lo que conviene
  alternatives_spanish:
  - lo que es apropiado
  - lo que es conveniente
  - lo que es propio
  lexicon: BDAG
  rationale: La construcción neutra relativa con πρέπω pide una frase impersonal de adecuación. «Conviene» conserva la idea de lo que corresponde o es apropiado, con naturalidad en español contemporáneo.
- source_word: γυναιξὶν
  english_pob_choice: for women
  chosen_spanish: a las mujeres
  alternatives_spanish:
  - para las mujeres
  - de las mujeres
  lexicon: BDAG
  rationale: El dativo aquí funciona como referencia destinataria o de ámbito. «A las mujeres» suena natural y mantiene el plural genérico, sin restringirlo a esposas.
- source_word: ἐπαγγελλομέναις
  english_pob_choice: professing
  chosen_spanish: que profesan
  alternatives_spanish:
  - que declaran
  - que proclaman
  - que prometen
  lexicon: BDAG
  rationale: El participio indica una profesión o declaración pública de devoción. «Profesan» refleja bien esa identificación religiosa sin convertirla en una promesa formal.
- source_word: θεοσέβειαν
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción a Dios
  - reverencia para con Dios
  - piedad hacia Dios
  lexicon: BDAG
  rationale: θεοσέβεια denota reverencia/devoción hacia Dios. En español, «piedad» es breve, comprensible y conserva el registro religioso; se deja abierta la posibilidad de la nota explicativa sobre devoción a Dios.
- source_word: δι’ ἔργων ἀγαθῶν
  english_pob_choice: with good works
  chosen_spanish: buenas obras
  alternatives_spanish:
  - por medio de buenas obras
  - mediante buenas obras
  - con buenas obras
  lexicon: BDAG
  rationale: διά con genitivo puede expresar medio o manera. Dado el contexto de adorno adecuado, «buenas obras» funciona como la expresión natural del adorno conveniente, sin forzar una preposición que suene pesada en español.
theological_decisions:
- issue: Relación entre buenas obras y la profesión de piedad
  english_pob_reading: The verse describes good works as the fitting outward expression for women who profess godliness, not as a doctrinal statement that works merit salvation.
  chosen_spanish_reading: El versículo presenta las buenas obras como la expresión apropiada de la piedad profesada, no como una afirmación de que las obras merezcan la salvación.
  alternative_spanish_readings:
  - Las buenas obras como base meritoria delante de Dios.
  - Las buenas obras como requisito para ser aceptadas por Dios.
  rationale: La sintaxis contrapone el adorno externo con la conducta que corresponde a la piedad. La traducción conserva ese valor ético y evita introducir una lectura soteriológica que el texto no expresa.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: La versión inglesa revisada redujo «who profess» a «professing» para hacer más directa la frase participial. La redacción española sigue esa compacidad con «que profesan» y mantiene la relación sintáctica breve entre la piedad y las buenas obras.
  spanish_consistency_notes:
  - Se eligió «piedad» para θεοσέβεια, manteniendo la posibilidad de aclaración en nota sin perder concisión.
  - Se usó «buenas obras» como equivalente natural de ἔργων ἀγαθῶν; en la nota se conserva la observación sobre el matiz instrumental de διά.
  - «Sino» refleja mejor el contraste adversativo inmediato que «pero» en este contexto.
  - No se introdujo «Cristo» ni terminología doctrinal ajena al versículo.
