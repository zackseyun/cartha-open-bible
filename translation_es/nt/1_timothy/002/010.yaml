translation:
  language: es
  text: 'sino con lo que conviene a mujeres que profesan devoción a Dios: con buenas obras[a][b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que es apropiado» o «lo que es conveniente».
    reason: lexical_alternative
  - marker: b
