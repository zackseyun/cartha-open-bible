    reason: alternative_reading
  - marker: b
    text: El griego puede entenderse también como «por medio del alumbramiento» o «por medio del dar a luz».
    reason: lexical_alternative
  - marker: c
    text: El griego cambia de singular («ella será salvada») a plural («si ellas permanecen»).
    reason: lexical_alternative
  - marker: d
    text: «Fe» también puede entenderse aquí como «fidelidad».
    reason: lexical_alternative
  revision_rationale: Se revisa «crianza de hijos» a «tener hijos» para reflejar mejor τεκνογονία sin imponer la interpretación de preservación física ni desplazar el sentido hacia la crianza posterior. Se corrige la nota correspondiente para mantener la ambigüedad auditada entre sentido genérico y posible referencia a un alumbramiento específico. Además, se añade la nota sobre el cambio de singular a plural, presente en el English POB, y se conserva la nota sobre «fe/fidelidad».
