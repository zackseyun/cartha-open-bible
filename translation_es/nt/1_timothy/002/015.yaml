    issue: «crianza de hijos» para διὰ τῆς τεκνογονίας
    rationale: τεκνογονία se refiere al engendrar o dar a luz hijos, no a la crianza posterior. «Crianza» desplaza el sentido y reduce la fidelidad al griego y al audit trail inglés, que eligió «childbearing», no «childrearing».
  - severity: medium
    issue: La nota sobre la alternativa específica repite «crianza de hijos»
    rationale: La nota a también hereda el mismo problema léxico. Debe preservar la ambigüedad entre sentido genérico y posible referencia a «el alumbramiento / el dar a luz», sin introducir «crianza».
  - severity: medium
