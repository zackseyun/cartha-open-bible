    rationale: El inglés POB preservó esta característica como nota significativa. En español también conviene anotarla para reflejar el mismo razonamiento auditado, especialmente porque «ella ... ellas» puede parecer abrupto al lector.
  revised_spanish_text: Pero ella será salvada[a] por medio de tener hijos[b], si ellas permanecen[c] en fe[d] y amor y santidad, con autocontrol.
  revised_footnotes:
