translation:
  language: es
  text: Pero ella será salvada[a] por medio de tener hijos[b], si ellas permanecen[c] en fe[d] y amor y santidad, con autocontrol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por medio del alumbramiento»; algunos entienden esta expresión como referencia a un nacimiento específico, quizá el del Mesías, aunque también puede leerse en sentido general como «por medio de tener hijos».'
    reason: alternative_reading
  - marker: b
    text: El griego puede entenderse también como «por medio del alumbramiento» o «por medio del dar a luz».
    reason: lexical_alternative
  - marker: c
    text: El griego cambia de singular («ella será salvada») a plural («si ellas permanecen»).
    reason: lexical_alternative
  - marker: d
    text: «Fe» también puede entenderse aquí como «fidelidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: σωθήσεται
  english_pob_choice: will be saved
  chosen_spanish: será salvada
  alternatives_spanish:
  - será preservada
  - será guardada
  lexicon: BDAG
  rationale: El futuro pasivo de σῴζω se refleja mejor con «será salvada», manteniendo el alcance teológico del verbo sin restringirlo a mera protección física.
- source_word: δὲ
  english_pob_choice: Yet
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Sin embargo
  lexicon: BDAG
  rationale: δέ introduce una transición contrastiva suave; «Pero» comunica bien esa continuación con matiz adversativo en español natural.
- source_word: διὰ τῆς τεκνογονίας
  english_pob_choice: through childbearing
  chosen_spanish: por medio de la crianza de hijos
  alternatives_spanish:
  - a través del dar a luz
  - por medio del alumbramiento
  - por medio de la maternidad
  lexicon: BDAG
  rationale: τεκνογονία se refiere al hecho de tener/criar hijos. «Crianza de hijos» evita reducirlo solo al acto fisiológico del parto y también evita una paráfrasis doctrinalmente más cerrada.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - en caso de que
  - con tal de que
  lexicon: BDAG
  rationale: La cláusula condicional se expresa de manera directa con «si».
- source_word: μείνωσιν
  english_pob_choice: they continue
  chosen_spanish: permanecen
  alternatives_spanish:
  - continúan
  - persisten
  - se mantienen
  lexicon: BDAG
  rationale: μένω en esta construcción condicional transmite permanencia o perseverancia; «permanecen» conserva ese valor sin sonar forzado.
- source_word: ἐν πίστει
  english_pob_choice: in faith
  chosen_spanish: en fe
  alternatives_spanish:
  - en fidelidad
  - en confianza
  lexicon: BDAG
  rationale: Se mantiene la correspondencia habitual para πίστις como «fe», preservando la posible tensión con «fidelidad» que el inglés POB anotó.
- source_word: ἀγάπῃ
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: ἀγάπη se traduce de manera directa como «amor», que es claro y fiel al registro del pasaje.
- source_word: ἁγιασμῷ
  english_pob_choice: holiness
  chosen_spanish: santidad
  alternatives_spanish:
  - santificación
  lexicon: BDAG
  rationale: ἁγιασμός puede ser «santificación» o «santidad». Aquí «santidad» encaja mejor en una lista ética y conserva el sentido moral-espiritual.
- source_word: σωφροσύνης
  english_pob_choice: self-control
  chosen_spanish: autocontrol
  alternatives_spanish:
  - dominio propio
  - sensatez
  - sobriedad
  lexicon: BDAG
  rationale: σωφροσύνη abarca autocontrol, sobriedad y juicio sano. «Autocontrol» es comprensible y mantiene el componente ético principal en español moderno.
theological_decisions:
- issue: Cambio de número de singular a plural
  english_pob_reading: Retain the grammatical shift as written, rendering singular 'she' and plural 'they' without harmonizing them.
  chosen_spanish_reading: Conservar el paso del singular implícito a plural («ella» / «ellas») sin armonizarlo.
  alternative_spanish_readings:
  - 'armonizar todo en plural: «las mujeres ... si perseveran»'
  - suavizar con un singular impersonal
  rationale: El griego pasa del singular al plural; la traducción conserva esa tensión en vez de homogenizarla, porque forma parte del texto y puede tener alcance interpretativo.
  doctrine_reference: Preservar la tensión teológica y gramatical sin resolverla.
- issue: Sentido de 'saved through childbearing'
  english_pob_reading: Keep the phrase as 'saved through childbearing' without specifying whether salvation is spiritual, eschatological, or preservation through the maternal vocation.
  chosen_spanish_reading: Mantener «será salvada por medio de la crianza de hijos» sin precisar si se trata de salvación espiritual, preservación en el parto o una referencia mesiánica.
  alternative_spanish_readings:
  - será preservada en el parto
  - será salvada por la maternidad
  - será salvada por el nacimiento del Mesías
  rationale: La frase es difícil y discutida; el griego no obliga a una sola explicación. La redacción española conserva la ambigüedad documentada por el audit trail.
  doctrine_reference: Preservar la tensión teológica y la ambigüedad del original.
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el historial más reciente; el último pase indicó que no eran necesarios cambios, por lo que este borrador sigue el consenso alto del audit trail y mantiene las tensiones léxicas y teológicas documentadas.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece.
  - Se mantuvo «fe» como traducción principal de πίστις, con nota de alternativa «fidelidad» preservada en el aparato.
  - Se conservó el cambio de número singular/plural sin armonización.
  - Se evitó «Cristo»/«Mesías» porque el versículo no contiene χριστός.
  - Se prefirió «santidad» sobre «santificación» por naturalidad en una lista de virtudes.
