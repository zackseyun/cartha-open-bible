translation:
  language: es
  text: Pues Adán fue formado primero[a], luego Eva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue modelado». El verbo hace eco del lenguaje de formación del relato de la creación en Génesis.
