lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  - Pues bien
  lexicon: BDAG
  rationale: Mantiene el matiz explicativo o de fundamento de γάρ sin volver la frase innecesariamente pesada en español. «Pues» funciona de manera natural al inicio de una cláusula expositiva y conserva el enlace con el contexto previo.
- source_word: Ἀδὰμ
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - Adam
  lexicon: BDAG
  rationale: Nombre propio bíblico en forma hispana estándar. «Adán» es la transliteración asentada en español y corresponde al referente del relato de Génesis.
- source_word: πρῶτος
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - antes
  lexicon: BDAG
  rationale: Expresa secuencia temporal directa, igual que en el inglés auditable. «Primero» conserva la sencillez del griego y la relación inmediata con «luego».
- source_word: ἐπλάσθη
  english_pob_choice: was formed
  chosen_spanish: fue formado
  alternatives_spanish:
  - fue modelado
  - fue hecho
  - fue plasmado
  lexicon: BDAG
  rationale: El pasivo de πλάσσω sugiere formar/moldear, no simplemente crear en sentido amplio. «Fue formado» preserva el eco verbal del relato de Génesis y la preferencia de la POB por mantener esa conexión léxica.
- source_word: εἶτα
  english_pob_choice: then
  chosen_spanish: luego
  alternatives_spanish:
  - después
  - entonces
  - a continuación
  lexicon: BDAG
  rationale: Marca la sucesión temporal de manera natural en español. «Luego» es breve, claro y no introduce inferencias adicionales.
- source_word: Εὕα
  english_pob_choice: Eve
  chosen_spanish: Eva
  alternatives_spanish:
  - Eva
  lexicon: BDAG
  rationale: Nombre propio bíblico en forma hispana estándar. «Eva» es la forma normal y transparente para el lector en español.
theological_decisions:
- issue: La relación entre el orden de creación y cualquier inferencia de autoridad o jerarquía
  english_pob_reading: 'Render the verse as a simple statement of temporal sequence: Adam was formed first, then Eve.'
  chosen_spanish_reading: 'La traducción presenta solo la secuencia temporal: Adán fue formado primero, luego Eva.'
  alternative_spanish_readings:
  - Adán fue formado primero, por tanto Eva quedó subordinada.
  - Adán fue formado primero, así que tiene prioridad de autoridad sobre Eva.
  rationale: El griego afirma el orden de formación, pero no formula aquí de manera explícita una conclusión doctrinal sobre autoridad o función. Por fidelidad al alcance del verso y para no resolver una tensión teológica que el propio texto no desarrolla, se conserva únicamente el dato temporal.
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar el texto.
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no requirió cambios de contenido; se mantuvo la misma decisión de fondo: una traducción breve y estrictamente temporal, con nota léxica que conserva el eco de Génesis.'
  spanish_consistency_notes:
  - Se mantiene «Adán» y «Eva» como nombres propios hispanos estándar.
  - «Fue formado» conserva el vínculo léxico con el relato de Génesis, coherente con la nota del texto fuente en inglés.
  - «Luego» reproduce la simple secuencia de εἶτα sin agregar matices causales o doctrinales.
  - El texto principal evita explicitar consecuencias teológicas no presentes en la cláusula griega.
