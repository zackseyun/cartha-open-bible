translation:
  language: es
  text: quien desea que todos los seres humanos sean salvos y lleguen al conocimiento de la verdad[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quiere que todos los seres humanos sean salvos». El verbo griego puede traducirse también «quiere»; se eligió «desea» para evitar decidir debates teológicos más allá de lo que expresa el texto.
    reason: lexical_alternative
  - marker: b
    text: O «al pleno conocimiento de la verdad». El sustantivo puede llevar el matiz de conocimiento más completo o pleno.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  english_pob_choice: who
  chosen_spanish: quien
  alternatives_spanish:
  - él que
  - el cual
  lexicon: BDAG
  rationale: El relativo griego retoma al referente inmediato del contexto; en español, «quien» mantiene la conexión sintáctica de forma natural y digna sin añadir matices innecesarios.
- source_word: πάντας ἀνθρώπους
  english_pob_choice: all people
  chosen_spanish: todos los seres humanos
  alternatives_spanish:
  - todas las personas
  - todos los hombres
  lexicon: BDAG
  rationale: La combinación πᾶς + ἄνθρωπος expresa humanidad en general. «Todos los seres humanos» conserva el alcance universal sin restringirlo a varones y sin sonar demasiado coloquial.
- source_word: θέλει
  english_pob_choice: desires
  chosen_spanish: quiere
  alternatives_spanish:
  - desea
  - quiere
  lexicon: BDAG
  rationale: θέλω puede significar querer, desear o querer con intención. «Quiere» es el equivalente más directo y natural en español; no fuerza una resolución teológica sobre la voluntad decretiva que el verbo por sí solo no exige.
- source_word: σωθῆναι
  english_pob_choice: to be saved
  chosen_spanish: sean salvos
  alternatives_spanish:
  - ser salvados
  - ser rescatados
  lexicon: BDAG
  rationale: El infinitivo pasivo de σῴζω en este contexto paulino tiene sentido soteriológico claro. «Sean salvos» reproduce ese valor con fluidez en español y mantiene la fuerza teológica habitual del término.
- source_word: εἰς ἐπίγνωσιν ἀληθείας
  english_pob_choice: to the knowledge of the truth
  chosen_spanish: al conocimiento de la verdad
  alternatives_spanish:
  - a un conocimiento de la verdad
  - al pleno conocimiento de la verdad
  lexicon: BDAG
  rationale: ἐπίγνωσις puede implicar conocimiento, reconocimiento o conocimiento pleno. «Al conocimiento de la verdad» es idiomático en español y no introduce explícitamente la idea de plenitud, que el contexto no obliga a expresar de manera absoluta.
- source_word: ἐλθεῖν
  english_pob_choice: to come
  chosen_spanish: lleguen
  alternatives_spanish:
  - vengan
  - alcancen
  lexicon: BDAG
  rationale: El aoristo infinitivo de ἔρχομαι con εἰς expresa movimiento hacia una realidad o estado. En español, «lleguen» comunica bien esa entrada o acceso a una condición sin perder naturalidad.
theological_decisions:
- issue: Alcance de πάντας ἀνθρώπους y voluntad salvífica de Dios
  english_pob_reading: Render the phrase straightforwardly as 'all people' and θέλει as 'desires,' preserving the text's universal scope and theological tension without narrowing it to 'all kinds of people' in translation.
  chosen_spanish_reading: Traducir de manera directa y universal con «todos los seres humanos» y «quiere», preservando la amplitud del texto sin reducirla a categorías como «todo tipo de personas».
  alternative_spanish_readings:
  - todos los hombres
  - todo tipo de personas
  - desea que todos sean salvos
  rationale: El griego se lee naturalmente con alcance universal. Dado que este versículo participa en debates sobre la voluntad salvífica de Dios, la traducción no debe resolverlos por adelantado, ni restringiendo πάντας ni reforzando θέλει con una formulación filosóficamente más pesada que el verbo mismo.
  doctrine_reference: Translation philosophy §3; Affirmations (non-sectarian within historic orthodoxy)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje fue considerado de alta concordancia y quedó sin modificaciones, por lo que esta versión conserva el sentido ya validado en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «verdad» con artículo implícito mediante la construcción fija «el conocimiento de la verdad», siguiendo el valor de la frase griega.
  - Se evita «Cristo» o terminología no presente en el versículo; el texto se limita al contenido explícito del griego.
  - «Todos los seres humanos» conserva el valor inclusivo de πάντας ἀνθρώπους sin marcar género masculino como exclusivo.
  - La nota a refleja la tensión semántica de θέλει; la nota b conserva la posibilidad de mayor intensidad en ἐπίγνωσις sin sobreactuarla en el cuerpo principal.
