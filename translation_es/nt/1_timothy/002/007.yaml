translation:
  language: es
  text: Para esto[a] fui constituido heraldo y apóstol—digo la verdad, no miento—maestro de los gentiles[b], en fe y verdad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para lo cual fui constituido».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «maestro de las naciones».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en fidelidad y verdad».'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰς ὃ
  english_pob_choice: For this
  chosen_spanish: Para esto
  alternatives_spanish:
  - para lo cual
  - para ese fin
  lexicon: BDAG
  rationale: La expresión apunta al propósito o la referencia anterior. «Para esto» conserva la fuerza teleológica de manera natural en español y evita una repetición pesada.
- source_word: ἐτέθην
  english_pob_choice: I was appointed
  chosen_spanish: fui constituido
  alternatives_spanish:
  - fui nombrado
  - fui asignado
  lexicon: BDAG
  rationale: El pasivo de τίθημι aquí expresa comisión o designación para una función. «Fui constituido» mantiene el sentido de designación oficial sin sonar demasiado administrativo.
- source_word: κῆρυξ
  english_pob_choice: a herald
  chosen_spanish: heraldo
  alternatives_spanish:
  - proclamador
  - pregonero
  lexicon: BDAG
  rationale: «Heraldo» reproduce el matiz de portavoz oficial que anuncia en nombre de otro, más precisamente que «predicador».
- source_word: ἀπόστολος
  english_pob_choice: an apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - enviado
  - mensajero
  lexicon: BDAG
  rationale: Es el título ministerial habitual de Pablo y el más preciso en este contexto.
- source_word: ἀλήθειαν λέγω, οὐ ψεύδομαι
  english_pob_choice: I am telling the truth; I am not lying
  chosen_spanish: estoy diciendo la verdad, no miento
  alternatives_spanish:
  - digo la verdad, no miento
  - estoy hablando la verdad, no miento
  lexicon: BDAG
  rationale: La duplicación enfática se mantiene en español con una formulación natural y directa.
- source_word: διδάσκαλος ἐθνῶν
  english_pob_choice: a teacher of the Gentiles
  chosen_spanish: maestro de los gentiles
  alternatives_spanish:
  - maestro de las naciones
  - maestro entre los gentiles
  lexicon: BDAG
  rationale: Pablo se refiere a los no judíos; «gentiles» conserva el valor contextual más preciso. «Maestro» sigue el sentido de διδάσκαλος sin necesidad de introducir una perífrasis eclesiástica.
- source_word: ἐν πίστει καὶ ἀληθείᾳ
  english_pob_choice: in faith and truth
  chosen_spanish: en fe y verdad
  alternatives_spanish:
  - en fidelidad y verdad
  - con fe y verdad
  lexicon: BDAG
  rationale: Se conserva la lectura principal de πίστις como «fe» y ἀλήθεια como «verdad». La alternativa «fidelidad» queda como posibilidad semántica, pero no se impone en el texto principal.
theological_decisions:
- issue: Alcance de ἐθνῶν
  english_pob_reading: Gentiles
  chosen_spanish_reading: gentiles
  alternative_spanish_readings:
  - naciones
  rationale: En el uso paulino, ἔθνη normalmente designa a los no judíos. «Gentiles» comunica con precisión ese referente y evita diluirlo en un sentido meramente geográfico o político.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de πίστις en la frase final
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: La traducción base preserva «fe» como lectura principal, siguiendo la decisión del POB en inglés. Se deja abierta la posibilidad semántica de «fidelidad», pero sin desplazar el texto principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις'
- issue: Función de κῆρυξ y ἀπόστολος como títulos ministeriales
  english_pob_reading: herald and an apostle
  chosen_spanish_reading: heraldo y apóstol
  alternative_spanish_readings:
  - predicador y apóstol
  - proclamador y enviado
  rationale: La combinación conserva dos títulos distintos y evita reemplazar κῆρυξ por un término más eclesial o menos exacto. No se atenúa la distinción entre un heraldo oficial y el título apostólico.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'Ajustado para corregir la validación anterior: ahora cada marcador de nota aparece exactamente en el texto español junto a la palabra o frase correspondiente. Se mantuvo la decisión auditada del POB inglés y se preservaron las alternativas relevantes sin añadir notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantuvo un registro formal pero natural en español, sin depender del inglés como plantilla rígida.
  - «Gentiles» se conservó por precisión paulina; no se sustituyó por «naciones» en el texto principal.
  - «Fe y verdad» permanece como lectura principal; la alternativa semántica se documenta en nota sin alterar el texto base.
  - La puntuación reproduce la estructura enfática del original con incisos separados por rayas.
  - No se introdujo terminología eclesiástica adicional que debilite el valor de κῆρυξ o ἀπόστολος.
