review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: «Para esto» transmite εἰς ὃ, «fui constituido» capta ἐτέθην como designación ministerial, y se preservan los tres roles «heraldo», «apóstol» y «maestro». También mantiene correctamente la afirmación parentética «digo la verdad, no miento» y la referencia contextual de ἐθνῶν como «gentiles». Sin embargo, la correspondencia de las notas al pie con el texto y con el rastro de auditoría en inglés está desalineada: la nota [b] está anclada a «apóstol» pero su contenido pertenece a «gentiles», y la nota [a] en inglés acompaña la cláusula inicial completa, no solo «constituido».'
  spanish_quality_summary: 'El español es claro y eclesialmente legible. No obstante, conviene hacer dos ajustes menores para mayor naturalidad y precisión editorial: 1) cambiar «estoy diciendo la verdad» por «digo la verdad», que suena más idiomático en este inciso enfático; 2) reubicar los marcadores de notas para que anclen exactamente donde corresponde. La puntuación con rayas funciona bien, aunque sin espacios alrededor de la raya suele verse más pulido en español editorial bíblico.'
  glossary_alignment: 'La terminología concuerda bien con las decisiones del POB: κῆρυξ = «heraldo», ἀπόστολος = «apóstol», ἐθνῶν = «gentiles», πίστις = «fe», ἀλήθεια = «verdad». No hay conflicto con los términos doctrinales del proyecto. La única desalineación relevante es de anclaje/razón de notas, no de glosario.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada a «apóstol», pero su contenido «maestro de las naciones» corresponde a «maestro de los gentiles».
    rationale: Esto induce a error al lector y no preserva fielmente la relación entre la alternativa léxica inglesa («a teacher of the nations») y el segmento griego διδάσκαλος ἐθνῶν.
  - severity: medium
    issue: La nota [a] se ancla solo a «constituido», aunque la alternativa «para lo cual fui constituido» corresponde a toda la expresión inicial «Para esto fui constituido».
    rationale: El marcador debe aparecer en el lugar donde la alternativa pueda sustituir naturalmente la frase, no solo una palabra interna.
  - severity: low
    issue: «Estoy diciendo la verdad» es comprensible, pero «digo la verdad» suena más natural y directo en español para ἀλήθειαν λέγω.
    rationale: La forma simple refleja mejor el carácter parentético y enfático del original sin perder sentido.
  revised_spanish_text: Para esto[a] fui constituido heraldo y apóstol—digo la verdad, no miento—maestro de los gentiles[b], en fe y verdad[c].
