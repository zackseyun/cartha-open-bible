  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Mujer' para γυνή y nota con 'esposa' concuerdan con la auditoría. 'Quietud' concuerda con la decisión léxica documentada para ἡσυχία. 'Sujeción' es aceptable para ὑποταγή, aunque 'sumisión' también sería posible; no requiere cambio.
