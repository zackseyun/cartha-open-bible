translation:
  language: es
  text: Que una mujer[a] aprenda en quietud[b], en toda sujeción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'esposa', según el contexto; la palabra griega puede significar tanto 'mujer' como 'esposa'.
    reason: alternative_reading
  - marker: b
    text: O 'en silencio'; el término griego también puede expresar quietud, calma o compostura, no necesariamente mutismo absoluto.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνὴ
  english_pob_choice: A woman
  chosen_spanish: Una mujer
  alternatives_spanish:
  - una esposa
  - una mujer
  lexicon: BDAG
  rationale: γυνή puede significar 'mujer' o 'esposa' según el contexto. Aquí el griego no marca de manera explícita el contexto marital, así que 'una mujer' preserva el valor genérico y la forma singular sin estrechar indebidamente el referente.
- source_word: ἐν ἡσυχίᾳ
  english_pob_choice: in quietness
  chosen_spanish: en quietud
  alternatives_spanish:
  - en silencio
  - calladamente
  lexicon: BDAG
  rationale: ἡσυχία suele expresar quietud, calma o conducta sosegada, no necesariamente mudez absoluta. 'En quietud' mantiene esa amplitud semántica y suena natural en español, sin convertir la exhortación en una prohibición total de hablar.
- source_word: μανθανέτω
  english_pob_choice: must learn
  chosen_spanish: aprenda
  alternatives_spanish:
  - debe aprender
  - que aprenda
  lexicon: BDAG
  rationale: El imperativo presente de tercera singular comunica una instrucción directa. En español, el subjuntivo exhortativo 'aprenda' conserva mejor la forma imperativa breve y sobria que 'debe aprender', sin añadir matiz modal ajeno al griego.
- source_word: ἐν πάσῃ ὑποταγῇ
  english_pob_choice: in all submission
  chosen_spanish: con toda sujeción
  alternatives_spanish:
  - en toda sumisión
  - con completa sujeción
  lexicon: BDAG
  rationale: ὑποταγή significa sumisión/sujeción. 'Con toda sujeción' reproduce la amplitud de πᾶς ('todo, toda') y evita una formulación más interpretativa. 'Sujeción' conserva mejor el registro lexical que 'sumisión' en este contexto, aunque ambas son posibles.
theological_decisions:
- issue: 'γυνή: ''mujer'' o ''esposa'''
  english_pob_reading: woman
  chosen_spanish_reading: mujer
  alternative_spanish_readings:
  - esposa
  rationale: El texto no especifica estado civil; por eso 'mujer' preserva la ambigüedad documentada y evita una restricción no presente en el griego. Se mantiene la alternativa 'esposa' como posibilidad contextual, no como decisión principal.
  doctrine_reference: 'Translation philosophy §1: Original-language primacy over translation tradition'
- issue: 'ἡσυχία: ''quietud'' vs. ''silencio'''
  english_pob_reading: quietness
  chosen_spanish_reading: quietud
  alternative_spanish_readings:
  - silencio
  rationale: La evidencia léxica favorece una actitud tranquila y no disruptiva más que el silencio absoluto. 'Quietud' transmite mejor ese campo semántico en español y conserva la tensión interpretativa señalada por el POB.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue el patrón del testimonio inglés auditado y no requiere revisión adicional; se conserva la ambigüedad léxica documentada en γυνή y ἡσυχία, sin intensificar ni suavizar indebidamente el imperativo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'sujeción' para ὑποταγή por cercanía lexical; 'sumisión' queda como alternativa válida en nota.
  - La puntuación y el registro buscan ser publicables en español bíblico moderno, sin depender de una fórmula eclesiástica tradicional.
