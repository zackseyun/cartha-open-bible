translation:
  language: es
  text: Y Adán no fue engañado, sino que la mujer, habiendo sido engañada[a], llegó a estar[b] en transgresión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'habiendo sido completamente engañada'; el verbo griego aquí es más fuerte que el usado antes de Adán y puede implicar la idea de ser engañada de manera más completa o intensa.
    reason: lexical_alternative
  - marker: b
    text: O 'ha llegado a estar en transgresión' o 'llegó a ser en transgresión'; el perfecto griego puede enfatizar el estado resultante.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδὰμ
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - Adam
  lexicon: nombre propio
  rationale: Se translitera el nombre propio según el uso español bíblico común, manteniendo la referencia histórica y narrativa sin traducir el nombre.
- source_word: ἠπατήθη
  english_pob_choice: was not deceived
  chosen_spanish: no fue engañado
  alternatives_spanish:
  - no fue decepcionado
  - no fue seducido
  lexicon: ἀπατάω
  rationale: El pasivo aoristo expresa que Adán no fue objeto de engaño. En español, 'engañado' comunica con claridad el sentido básico de ἀπατάω; 'decepcionado' no corresponde al campo semántico, y 'seducido' introduce una connotación no exigida por el verbo.
- source_word: γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: γυνή
  rationale: Aquí el contraste con Adán y la alusión a Génesis favorecen 'la mujer' más directamente que 'la esposa'. Aunque γυνή puede significar esposa, esa opción añadiría una relación no explicitada en el texto griego inmediato.
- source_word: ἐξαπατηθεῖσα
  english_pob_choice: having been deceived
  chosen_spanish: habiendo sido engañada
  alternatives_spanish:
  - habiendo sido completamente engañada
  - siendo engañada
  lexicon: ἐξαπατάω
  rationale: El prefijo ἐξ- intensifica ἀπατάω, pero el español debe sonar natural. 'Habiendo sido engañada' conserva la idea pasiva y el antecedente temporal del participio sin exagerar el grado de intensidad; se deja la posibilidad de una fuerza reforzada en nota.
- source_word: ἐν παραβάσει
  english_pob_choice: in transgression
  chosen_spanish: en transgresión
  alternatives_spanish:
  - en infracción
  - en pecado de transgresión
  lexicon: παράβασις
  rationale: Se mantiene la construcción preposicional de manera sobria y cercana al griego. 'Transgresión' preserva el sustantivo abstracto; 'infracción' es posible pero menos bíblico, y la tercera opción introduce elementos ajenos.
- source_word: γέγονεν
  english_pob_choice: came to be
  chosen_spanish: llegó a estar
  alternatives_spanish:
  - ha llegado a estar
  - llegó a ser
  lexicon: γίνομαι
  rationale: El perfecto de γίνομαι subraya un estado resultante. 'Llegó a estar' intenta reflejar el devenir y el estado resultante sin convertirlo simplemente en un copulativo estático; 'llegó a ser' podría sonar más identitario que situacional.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y además
  - Además
  lexicon: καί
  rationale: El conector inicial se vierte con 'Y' para respetar la continuidad discursiva sin añadir énfasis interpretativo.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - mas
  lexicon: δέ
  rationale: En español, después de una negación previa ('no fue engañado') la relación contrastiva se expresa con naturalidad mediante 'sino que'. Esto mantiene el contraste fuerte del griego sin sonar forzado en registro bíblico moderno.
theological_decisions:
- issue: Cómo expresar la afirmación sobre la mujer sin importar una conclusión doctrinal más amplia acerca de culpabilidad femenina o naturaleza ontológica.
  english_pob_reading: 'Translate the clause closely as a historical statement tied to the Genesis narrative: ''but the woman, having been deceived, came to be in transgression.'''
  chosen_spanish_reading: 'Traducir la cláusula de forma estrecha como una afirmación histórica vinculada al relato de Génesis: ''la mujer, habiendo sido engañada, llegó a estar en transgresión''.'
  alternative_spanish_readings:
  - la mujer, engañada, cayó en transgresión
  - la mujer se convirtió en transgresora
  rationale: La redacción conserva la tensión teológica del versículo sin ampliar el texto hacia formulaciones doctrinales que el griego no dice explícitamente. Se evita convertir el sustantivo abstracto en una designación personal ('transgresora') y también se evita suavizar demasiado el hecho de la transgresión.
  doctrine_reference: Principios de fidelidad al texto y de no importar conclusiones denominacionales no sostenidas de manera unívoca por la frase griega.
translation_notes:
  revision_awareness: El texto español sigue de cerca la última revisión del POB en inglés, que prefirió una formulación más sobria para ἐξαπατηθεῖσα ('having been deceived') y mantuvo la lectura del perfecto de γίνομαι como estado resultante. La versión española conserva esa moderación, mientras que la nota a[a] recoge la posible intensificación del prefijo ἐξ-.
  spanish_consistency_notes:
  - Se ha mantenido 'transgresión' para παράβασις, en línea con el uso terminológico del proyecto.
  - Se ha usado 'Adán' y 'la mujer' para conservar la transparencia narrativa del pasaje.
  - Se ha preferido 'engañado/engañada' frente a alternativas más interpretativas como 'seducido' o 'desviado'.
  - La sintaxis con 'llegó a estar' busca reflejar el perfecto de γίνομαι sin imponer un matiz doctrinal adicional.
