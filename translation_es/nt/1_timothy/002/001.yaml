translation:
  language: es
  text: Por tanto, en primer lugar, exhorto a que se hagan súplicas, oraciones, intercesiones y acciones de gracias por[a] todos los seres humanos[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en favor de todos los seres humanos».
    reason: lexical_alternative
  - marker: b
    text: «Seres humanos» traduce una expresión griega genérica para la humanidad, no sólo varones.
    reason: lexical_alternative
  - marker: c
    text: Algunos entienden aquí «todos los seres humanos» como «todas las clases de personas»; el griego dice simplemente «todos los seres humanos».
    reason: alternative_reading
lexical_decisions:
- source_word: Παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: exhorto
  alternatives_spanish:
  - ruego
  - insto
  lexicon: BDAG
  rationale: παρακαλέω aquí introduce una instrucción apostólica enfática. En español, «exhorto» conserva mejor ese tono exhortativo y de autoridad pastoral que una simple petición; «ruego» suavizaría demasiado el valor del verbo.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: οὖν marca una conclusión inferida del contexto anterior. «Por tanto» preserva con claridad la relación lógica sin sonar artificial en español.
- source_word: πρῶτον πάντων
  english_pob_choice: first of all
  chosen_spanish: en primer lugar
  alternatives_spanish:
  - primero de todo
  - ante todo
  lexicon: BDAG
  rationale: La expresión enfatiza prioridad, no necesariamente un orden numerado estricto. «En primer lugar» comunica bien esa prioridad en español actual y mantiene la naturalidad.
- source_word: ποιεῖσθαι
  english_pob_choice: be made
  chosen_spanish: se hagan
  alternatives_spanish:
  - se ofrezcan
  - se realicen
  lexicon: BDAG
  rationale: El infinitivo pasivo abarca la serie completa de expresiones de oración. «Se hagan» es suficientemente amplio para no restringir indebidamente el matiz litúrgico o devocional.
- source_word: δεήσεις
  english_pob_choice: petitions
  chosen_spanish: súplicas
  alternatives_spanish:
  - peticiones
  - ruegos
  lexicon: BDAG
  rationale: δέησις denota ruego urgente nacido de necesidad. «Súplicas» preserva mejor esa fuerza implorante que «peticiones», aunque ambas son posibles.
- source_word: προσευχάς
  english_pob_choice: prayers
  chosen_spanish: oraciones
  alternatives_spanish:
  - plegarias
  - oraciones
  lexicon: BDAG
  rationale: προσευχή es el término general para la oración dirigida a Dios. «Oraciones» es la forma más directa y comprensible en español.
- source_word: ἐντεύξεις
  english_pob_choice: intercessions
  chosen_spanish: intercesiones
  alternatives_spanish:
  - plegarias en favor de otros
  - súplicas
  lexicon: BDAG
  rationale: En este contexto el término alude a oraciones hechas por otros. «Intercesiones» preserva con precisión ese matiz representativo y corresponde bien al uso eclesial sin introducir una interpretación extra.
- source_word: εὐχαριστίας
  english_pob_choice: thanksgivings
  chosen_spanish: acciones de gracias
  alternatives_spanish:
  - agradecimientos
  - acciones de gratitud
  lexicon: BDAG
  rationale: El plural griego se refleja naturalmente con «acciones de gracias», una expresión clara y digna que conserva la diversidad de la lista verbal mejor que un singular abstracto.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - en nombre de
  lexicon: BDAG
  rationale: Con genitivo, ὑπέρ puede expresar beneficio o representación. «Por» es idiomático en español y conserva el sentido amplio; el matiz de representación queda implícito y no se reduce indebidamente.
- source_word: πάντων ἀνθρώπων
  english_pob_choice: all people
  chosen_spanish: todos los seres humanos
  alternatives_spanish:
  - todas las personas
  - todos los hombres
  lexicon: BDAG
  rationale: ἄνθρωπος aquí es genérico para la humanidad, no masculino exclusivo. «Todos los seres humanos» comunica de manera inequívoca ese alcance universal y mantiene la precisión de género que refleja el griego.
theological_decisions:
- issue: Alcance de πάντων ἀνθρώπων
  english_pob_reading: all people
  chosen_spanish_reading: todos los seres humanos
  alternative_spanish_readings:
  - todas las personas
  - todos los tipos de personas
  rationale: El griego permite la lectura llana de humanidad en general. La traducción conserva ese sentido amplio sin resolver por adelantado el debate sobre si se refiere a cada individuo o a todas las clases de personas.
  doctrine_reference: Preservar la tensión teológica sin resolverla; precisión de género conforme al original.
translation_notes:
  revision_awareness: 'Coincide con el sentido y la estructura del texto griego SBLGNT y con el cierre de revisión del audit trail inglés: no se observan cambios necesarios respecto de la lectura principal, manteniendo la lista de cuatro formas de oración y el alcance universal de ὑπὲρ πάντων ἀνθρώπων.'
  spanish_consistency_notes:
  - 'Se mantuvo el orden retórico de la frase griega: inferencia inicial, prioridad temporal y luego la cadena de sustantivos de oración.'
  - Se prefirió un registro eclesial moderno y sobrio, evitando arcaísmos innecesarios.
  - Se conservó la tensión entre beneficio/representación en ὑπέρ sin forzar una sola glosa exclusiva en el texto principal.
  - Se evitó masculinizar πάντων ἀνθρώπων; la nota aclara el valor genérico del sustantivo griego.
