translation:
  language: es
  text: Porque hay un solo Dios[a], y un solo mediador entre Dios y los hombres, el hombre, Mesías Jesús[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “entre Dios y la humanidad”. El griego ἀνθρώπων es un término genérico para la humanidad; “los hombres” se conserva aquí para mantener el vínculo léxico con “el hombre” más adelante en el versículo.
    reason: lexical_alternative
  - marker: b
    text: O “Cristo”. Χριστός se vierte como “Mesías” aquí porque funciona como título.
    reason: alternative_reading
  - marker: c
    text: O “el hombre Mesías Jesús”.
    reason: previous_rendering
lexical_decisions:
- source_word: εἷς
  english_pob_choice: one
  chosen_spanish: un / uno
  alternatives_spanish:
  - uno
  lexicon: BDAG
  rationale: 'Se mantiene la repetición enfática del griego: “un solo Dios” y “un solo mediador”. En español, “un solo” suena natural y conserva el paralelismo.'
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: En este contexto explicativo, “Porque” comunica bien la conexión causal o explicativa con lo anterior sin endurecer el ritmo del versículo.
- source_word: θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: “Dios” es la equivalencia directa y normal en español para θεός aquí, refiriéndose al único Dios verdadero.
- source_word: μεσίτης
  english_pob_choice: mediator
  chosen_spanish: mediador
  alternatives_spanish:
  - intermediario
  - gozne
  lexicon: BDAG
  rationale: “Mediador” es el equivalente más preciso y asentado en español para alguien que está entre dos partes para relacionarlas o reconciliarlas.
- source_word: θεοῦ καὶ ἀνθρώπων
  english_pob_choice: between God and men
  chosen_spanish: entre Dios y los hombres
  alternatives_spanish:
  - entre Dios y los seres humanos
  - entre Dios y la humanidad
  lexicon: BDAG
  rationale: Se conserva la fuerza lexical y el vínculo con ἄνθρωπος en la segunda mitad del verso. “Los hombres” mantiene la conexión representativa que el griego enfatiza entre la humanidad plural y “el hombre” singular aplicado a Jesús.
- source_word: ἄνθρωπος
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - humano
  lexicon: BDAG
  rationale: “El hombre” reproduce la identificación apposicional del mediador como verdaderamente humano. “Humano” sonaría menos personal y debilitaría el contraste representativo.
- source_word: Χριστὸς
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se traduce Χριστός como título, no como nombre fijo, siguiendo la política del proyecto. “Mesías” comunica mejor el valor titular en español y evita la simple transliteración litúrgica.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
theological_decisions:
- issue: Renderizado de ἀνθρώπων / ἄνθρωπος con contraste humano singular/plural
  english_pob_reading: men ... the man
  chosen_spanish_reading: los hombres ... el hombre
  alternative_spanish_readings:
  - los seres humanos ... el ser humano
  - la humanidad ... el hombre
  rationale: El versículo contrapone la humanidad genérica (plural) con el singular ἄνθρωπος aplicado a Jesús. “Los hombres ... el hombre” conserva esa relación léxica y teológica sin diluirla en un término más abstracto.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Preserve theological tension rather than resolve it'
- issue: Χριστός como título mesiánico
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La referencia subraya el oficio/título mesiánico de Jesús. Traducirlo como “Mesías” mantiene el valor semántico original y la política del proyecto de traducir títulos.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Afirmación cristológica de la humanidad del mediador
  english_pob_reading: the man Messiah Jesus
  chosen_spanish_reading: el hombre, Mesías Jesús
  alternative_spanish_readings:
  - el hombre Mesías Jesús
  - el hombre, Cristo Jesús
  rationale: La puntuación apposicional deja claro que Jesús es identificado como “el hombre”, y luego especificado como “Mesías Jesús”. Esto preserva la afirmación explícita de su humanidad sin implicar que sea solo humano, cosa que el verso no dice.
  doctrine_reference: 'DOCTRINE.md: Nicene Creed; Definition of Chalcedon; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por una revisión que ajustó la puntuación apposicional y luego volvió a fijar Χριστός como ‘Messiah’. La redacción española adopta esa misma lectura final: mantiene la estructura apposicional (‘el hombre, Mesías Jesús’) y traduce Χριστός como ‘Mesías’, sin borrar la tensión cristológica entre humanidad explícita y título mesiánico.'
  spanish_consistency_notes:
  - Se usó “Mesías” para Χριστός conforme al estándar del proyecto en títulos, reservando “Cristo” solo como alternativa registrada.
  - Se mantuvo “los hombres” para ἀνθρώπων a fin de preservar el paralelismo con “el hombre”.
  - Se respetó la puntuación con coma para reflejar la apposición del griego y la revisión auditada del texto inglés.
  - Se evitó “SEÑOR” para θεός/κύριος, porque en este versículo el texto griego usa θεός directamente.
