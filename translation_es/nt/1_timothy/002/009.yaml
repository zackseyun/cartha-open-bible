review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del POB inglés: mantiene ''mujeres'' frente a ''esposas'', conserva la estructura de adorno apropiado versus ostentación, y refleja adecuadamente αἰδώς/σωφροσύνη con ''modestia'' y ''dominio propio''. También preserva la nota cultural sobre una prohibición no necesariamente absoluta.'
  spanish_quality_summary: La redacción es clara y natural, pero 'ropa decente' puede sonar algo estrecha o coloquial en ciertos contextos latinoamericanos, donde 'decente' puede sugerir simplemente 'no indecente' más que 'decorosa/respetable'. Además, el pie de nota a remite a 'ropa decente', pero la alternativa inglesa se refiere a la expresión completa 'respectable clothing'. 'Vestimenta decorosa' suena más digno, más preciso semánticamente, y mejor alineado con καταστολῇ κοσμίῳ.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son compatibles con el POB. Se recomienda ajustar 'ropa decente' a 'vestimenta decorosa' para reflejar mejor el matiz de respetabilidad/propiedad de καταστολῇ κοσμίῳ.
  issues:
  - severity: medium
    issue: '''ropa decente'' subrepresenta el matiz de καταστολῇ κοσμίῳ'
    rationale: El griego no solo habla de ropa 'decente' en sentido moral mínimo, sino de atuendo apropiado, respetable y decoroso. 'Vestimenta decorosa' comunica mejor el rango semántico y el tono eclesial del pasaje.
  - severity: low
    issue: La nota [a] queda menos precisa con la formulación actual
    rationale: La glosa inglesa explica alternativas para 'respectable clothing'; en español conviene anclar la nota a una expresión más completa y formal que 'ropa decente', para que las alternativas 'atuendo apropiado' y 'vestimenta modesta' encajen naturalmente.
  revised_spanish_text: Asimismo[a], las mujeres deben adornarse con vestimenta decorosa, con modestia y dominio propio, no con peinados trenzados ni con oro o perlas o ropa costosa[b],
  revised_footnotes:
