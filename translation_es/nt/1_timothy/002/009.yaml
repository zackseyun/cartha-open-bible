    text: O 'atuendo apropiado' o 'vestimenta modesta' para 'vestimenta decorosa'.
    reason: lexical_alternative
  - marker: b
    text: ‘Peinados trenzados y oro o perlas o ropa costosa’ probablemente se refiere a un adorno ostentoso más que a prohibir toda trenza o joyería en cualquier circunstancia.
    reason: cultural_note
  revision_rationale: La revisión es menor y busca mejorar la precisión semántica y el registro eclesial del español. 'Vestimenta decorosa' refleja mejor καταστολῇ κοσμίῳ que 'ropa decente', sin apartarse del sentido del POB inglés. Se ajusta también la nota [a] para que corresponda exactamente a la nueva redacción.
