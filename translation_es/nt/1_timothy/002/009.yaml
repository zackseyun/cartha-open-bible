translation:
  language: es
  text: Asimismo[a], las mujeres deben adornarse con vestimenta decorosa, con modestia y dominio propio, no con peinados trenzados ni con oro o perlas o ropa costosa[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'atuendo apropiado' o 'vestimenta modesta' para 'vestimenta decorosa'.
    reason: lexical_alternative
  - marker: b
    text: ‘Peinados trenzados y oro o perlas o ropa costosa’ probablemente se refiere a un adorno ostentoso más que a prohibir toda trenza o joyería en cualquier circunstancia.
    reason: cultural_note
lexical_decisions:
- source_word: ὡσαύτως καὶ
  english_pob_choice: Likewise also
  chosen_spanish: Asimismo
  alternatives_spanish:
  - Igualmente
  - De la misma manera
  lexicon: BDAG
  rationale: ὡσαύτως y καί expresan enlace con lo anterior. En español, 'Asimismo' comunica la continuidad sin sonar forzado; la adición de καί queda implícita en el enlace discursivo natural.
- source_word: γυναῖκας
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  - mujeres
  lexicon: BDAG
  rationale: En el contexto exhortativo general, el plural γυναικας se entiende de manera amplia. 'Las mujeres' evita estrechar indebidamente a 'esposas'.
- source_word: ἐν καταστολῇ κοσμίῳ
  english_pob_choice: respectable clothing
  chosen_spanish: con ropa decente
  alternatives_spanish:
  - con vestimenta decorosa
  - con atuendo respetable
  - con ropa apropiada
  lexicon: BDAG
  rationale: καταστολή se refiere al vestir/atuendo, y κόσμιος aporta la idea de decoro, orden y respetabilidad. 'Ropa decente' suena natural en español y conserva la orientación hacia un vestir apropiado, sin especificar más de lo que el griego dice.
- source_word: μετὰ αἰδοῦς
  english_pob_choice: with modesty
  chosen_spanish: con modestia
  alternatives_spanish:
  - con pudor
  - con reserva
  - con decoro
  lexicon: BDAG
  rationale: αἰδώς incluye recato, pudor y una reserva que evita la impropiedad. 'Modestia' es la equivalencia más clara y fluida en este contexto de vestimenta.
- source_word: καὶ σωφροσύνης
  english_pob_choice: and self-control
  chosen_spanish: y dominio propio
  alternatives_spanish:
  - y autocontrol
  - y sensatez
  - y sobriedad
  lexicon: BDAG
  rationale: σωφροσύνη denota juicio sano expresado en contención y dominio de sí. 'Dominio propio' comunica bien esa disciplina interior en español contemporáneo.
- source_word: κοσμεῖν ἑαυτάς
  english_pob_choice: are to adorn themselves
  chosen_spanish: adornarse
  alternatives_spanish:
  - arreglarse
  - adornarse a sí mismas
  - vestirse
  lexicon: BDAG
  rationale: κοσμέω significa adornar o arreglar. 'Adornarse' mantiene el vínculo con la idea de presentación externa y el contraste con el adorno ostentoso de la frase siguiente.
- source_word: μὴ ἐν πλέγμασιν
  english_pob_choice: not with braided hair
  chosen_spanish: no con peinados trenzados
  alternatives_spanish:
  - no con trenzas
  - no con el cabello trenzado
  - no con elaboradas trenzas
  lexicon: BDAG
  rationale: πλέγματα alude a trenzas o arreglos trenzados del cabello. 'Peinados trenzados' conserva la referencia al arreglo capilar sin sugerir una prohibición absoluta de cualquier trenza.
- source_word: χρυσίῳ
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - joyas de oro
  - adornos de oro
  - oro
  lexicon: BDAG
  rationale: El dativo instrumental enumera medios de adorno. 'Oro' reproduce el término de manera amplia, sin sobreespecificar si se trata de joyería o incrustaciones.
- source_word: μαργαρίταις
  english_pob_choice: pearls
  chosen_spanish: perlas
  alternatives_spanish:
  - perlas finas
  - joyas de perla
  lexicon: BDAG
  rationale: Término léxico directo; forma parte de la lista de adornos valiosos.
- source_word: ἱματισμῷ πολυτελεῖ
  english_pob_choice: expensive clothing
  chosen_spanish: ropa costosa
  alternatives_spanish:
  - vestimenta costosa
  - ropa lujosa
  - atuendo costoso
  lexicon: BDAG
  rationale: ἱματισμός significa ropa o vestimenta, y πολυτελής indica algo caro, costoso o lujoso. 'Ropa costosa' preserva la crítica a la ostentación más que a la ropa en sí.
theological_decisions:
- issue: Si el mandato se dirige a mujeres en general o a esposas
  english_pob_reading: women generally
  chosen_spanish_reading: las mujeres en general
  alternative_spanish_readings:
  - las esposas
  - mujeres casadas
  rationale: El plural γυναικας aparece sin marcadores contextuales que restrinjan el sentido a mujeres casadas. Traducir 'las mujeres' evita añadir una limitación no explicitada por el griego.
  doctrine_reference: Translation philosophy §1, §4
- issue: Si la prohibición es absoluta o apunta al adorno ostentoso
  english_pob_reading: targets ostentatious adornment and manner of dress
  chosen_spanish_reading: apunta al adorno ostentoso y al modo de vestir
  alternative_spanish_readings:
  - prohíbe toda trenza, oro, perlas o ropa costosa
  - prohíbe cualquier tipo de adorno
  rationale: La sintaxis contrapone el adorno apropiado con la exhibición costosa. La traducción conserva la lista literal, pero 'ropa decente' y 'peinados trenzados' no fuerzan una lectura de prohibición universal.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la revisión inglesa más reciente, que no mostró cambios necesarios y mantiene el mismo perfil de decisiones léxicas y teológicas. Se conservaron las tensiones documentadas: mujer/esposa, modestia como conducta y vestimenta, y la lista de adornos como crítica al ostentoso lucimiento.'
  spanish_consistency_notes:
  - Se mantuvo 'las mujeres' para coherencia con el valor general de γυνή en este contexto.
  - '''Ropa decente'' refleja el registro natural del español moderno sin abandonar el matiz de κόσμιος.'
  - '''Dominio propio'' ofrece una equivalencia estable para σωφροσύνη en esta serie de virtudes.'
  - Las notas al pie preservan la alternativa de 'atuendo apropiado' y la advertencia cultural sobre peinados, oro, perlas y ropa costosa.
