translation:
  language: es
  text: Por tanto, quiero que los hombres oren[a] en todo lugar, levantando manos santas, sin ira ni discusiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin ira ni duda». La palabra griega puede referirse al razonamiento interior o a la duda, pero aquí probablemente apunta a una disputa contenciosa en la asamblea.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βούλομαι
  english_pob_choice: I want
  chosen_spanish: quiero
  alternatives_spanish:
  - deseo
  - intento
  lexicon: BDAG
  rationale: βούλομαι expresa voluntad o deseo. «Quiero» es natural en español moderno y conserva la fuerza directiva sin volver la frase innecesariamente solemne.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: οὖν marca consecuencia o continuidad lógica. «Por tanto» mantiene esa relación inferencial de forma clara y natural en español.
- source_word: προσεύχεσθαι
  english_pob_choice: to pray
  chosen_spanish: oren
  alternatives_spanish:
  - orar
  - hacer oración
  lexicon: BDAG
  rationale: El infinitivo de propósito en español puede expresarse de manera más idiomática con subjuntivo tras «quiero que». «Oren» mantiene el sentido de προσεύχομαι y fluye mejor que una calca literal.
- source_word: τοὺς ἄνδρας
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los maridos
  lexicon: BDAG
  rationale: ἀνήρ aquí se refiere de manera específica a varones, no a personas en general. «Los hombres» preserva esa especificidad de género; «los maridos» no está apoyado por el contexto inmediato.
- source_word: ἐν παντὶ τόπῳ
  english_pob_choice: in every place
  chosen_spanish: en todo lugar
  alternatives_spanish:
  - en cada lugar
  - en todas partes
  lexicon: BDAG
  rationale: La frase distributiva se conserva de modo transparente con «en todo lugar». «En todas partes» también sería posible, pero «en todo lugar» refleja mejor la estructura del griego.
- source_word: ἐπαίροντας
  english_pob_choice: lifting up
  chosen_spanish: levantando
  alternatives_spanish:
  - alzando
  - elevando
  lexicon: BDAG
  rationale: El participio describe la acción acompañante de la oración. «Levantando» es idiomático y comunica la imagen corporal de las manos alzadas en oración.
- source_word: ὁσίους χεῖρας
  english_pob_choice: holy hands
  chosen_spanish: manos santas
  alternatives_spanish:
  - manos piadosas
  - manos puras
  lexicon: BDAG
  rationale: ὅσιος apunta a santidad o devoción aceptable delante de Dios. «Santas» es la correspondencia más directa; «puras» introduciría un matiz distinto.
- source_word: χωρὶς
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - aparte de
  lexicon: BDAG
  rationale: Preposición de ausencia directa; «sin» es la opción más natural y fiel.
- source_word: ὀργῆς
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - cólera
  lexicon: BDAG
  rationale: En español bíblico contemporáneo, «ira» conserva el peso del término sin sonar rebuscado. «Enojo» sería más cotidiano, pero algo menos solemne.
- source_word: διαλογισμοῦ
  english_pob_choice: quarreling
  chosen_spanish: contienda
  alternatives_spanish:
  - disputa
  - duda
  - discusión
  lexicon: BDAG
  rationale: διαλογισμός puede referirse a razonamientos, disputas o cuestionamientos internos; en este contexto de oración comunitaria, la lectura de conflicto verbal/comunitario es la más probable. «Contienda» comunica bien ese matiz; la posibilidad de «duda» queda implícitamente reconocida en la nota textual.
theological_decisions:
- issue: Referencia específica de τοὺς ἄνδρας
  english_pob_reading: the men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - la gente
  - todos
  - los maridos
  rationale: La forma masculina plural es específica y no debe neutralizarse. Traducir «los hombres» conserva la distinción de género que el contexto inmediato presupone.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Sentido de διαλογισμοῦ en la oración
  english_pob_reading: quarreling
  chosen_spanish_reading: contienda
  alternative_spanish_readings:
  - disputa
  - duda
  rationale: En el marco de la instrucción sobre oración congregacional, el sentido de conflicto o disputa es el más verosímil. «Contienda» conserva ese matiz relacional y deja abierta la posibilidad semántica documentada por el griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 3
translation_notes:
  revision_awareness: 'El pasaje revisado coincide con el último pase del texto inglés: no hubo cambios aplicados y el consenso de revisión fue de alta concordancia. La redacción española sigue el mismo criterio auditable, manteniendo la especificidad de «los hombres», la relación inferencial de «Por tanto» y la ambigüedad controlada de διαλογισμοῦ mediante nota.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno, sin calcos innecesarios.
  - «Ira» y «contienda» conservan el tono moral y comunitario del pasaje.
  - La nota al pie recoge la alternativa «duda» para no borrar la tensión léxica documentada.
  - No se introduce terminología eclesiástica tradicional sin base textual adicional.
