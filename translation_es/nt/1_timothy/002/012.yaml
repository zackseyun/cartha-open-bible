  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: prohibición de enseñar, coordinación negativa con αὐθεντεῖν, y contraste final con ἐν ἡσυχίᾳ. También preserva correctamente la alternativa léxica mujer/esposa y hombre/esposo. Sin embargo, añade una nota para ἀλλά que el inglés POB no preservó como nota semánticamente necesaria, y omite una nota para αὐθεντεῖν, que sí es una de las decisiones léxicas y teológicas más importantes del versículo. Además, «al contrario» es menos preciso aquí que «más bien» o «sino que» para ἀλλά en esta construcción.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos problemas. Primero, «al contrario» suena algo más fuerte e idiomáticamente menos ajustado que «más bien» en este contexto contrastivo. Segundo, el anclaje y orden de notas no siguen bien la prioridad del contenido significativo: la nota sobre αὐθεντεῖν falta en el texto principal, mientras una nota menor sobre ἀλλά ocupa ese lugar. «Debe estar en quietud» es aceptable, aunque «debe estar en quietud» suena algo rígido; aun así, puede mantenerse por fidelidad a «in quietness».'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones «mujer», «hombre», «enseñe», «ejerza autoridad sobre» y «quietud» concuerdan con el expediente inglés. La principal desalineación es documental: debe preservarse la nota de αὐθεντεῖν (''tener autoridad sobre'' / posiblemente ''dominar'') y no hace falta crear una nota separada para ἀλλά.'
