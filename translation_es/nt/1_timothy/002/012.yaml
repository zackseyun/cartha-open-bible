base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/012.yaml
  text: But I do not permit a woman to teach or to exercise authority over a man[a]; instead[c][b], she is to be in quietness.
  footnotes:
  - marker: a
    text: Or 'a wife ... a husband.' The Greek words can carry either the general sense ('woman/man') or the marital sense ('wife/husband').
    reason: alternative_reading
  - marker: b
    text: Or 'to have authority over'; possibly 'to domineer over.' The Greek verb is rare and its nuance is debated.
    reason: lexical_alternative
  - marker: c
    text: Or 'in silence.' The Greek term can denote quietness, calmness, or silence depending on context.
    reason: lexical_alternative
