translation:
  language: es
  text: Pero no permito que una mujer[a] enseñe ni que ejerza autoridad sobre un hombre[b]; más bien, debe estar en quietud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esposa». El griego γυνή puede referirse tanto a «mujer» como a «esposa».
    reason: alternative_reading
  - marker: b
    text: O «un esposo». El griego ἀνήρ puede significar tanto «hombre» como «esposo». Además, «ejerza autoridad sobre» también puede traducirse «tenga autoridad sobre»; posiblemente «domine sobre». El verbo griego αὐθεντεῖν es raro y su matiz es debatido.
    reason: alternative_reading
  - marker: c
    text: O «en silencio». El término griego puede denotar quietud, calma o silencio según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: διδάσκειν
  english_pob_choice: to teach
  chosen_spanish: enseñe
  alternatives_spanish:
  - esté enseñando
  lexicon: BDAG
  rationale: El infinitivo griego funciona como complemento de ἐπιτρέπω; en español, la forma natural y precisa es un verbo finito en subjuntivo dependiente de «permito». «Enseñe» conserva el sentido directo de διδάσκειν sin añadir aspecto o matices no exigidos por el texto.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: δέ introduce aquí un giro contrastivo respecto de la instrucción previa. «Pero» reproduce bien ese valor adversativo en español.
- source_word: γυναικί
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa». El contexto amplio de 2:9–15 trata de mujeres en general, por lo que el sentido principal en el texto es «mujer». La alternativa marital se mantiene por la amplitud léxica del término.
- source_word: οὐκ ἐπιτρέπω
  english_pob_choice: I do not permit
  chosen_spanish: no permito
  alternatives_spanish:
  - no اجازه?
  - no estoy permitiendo
  - no اجازه
  lexicon: BDAG
  rationale: 'El presente indicativo se expresa de forma idiomática como una negación general: «no permito». «Permitir» conserva mejor el registro y la fuerza normativa que «dejar» o «autorizar» en este contexto.'
- source_word: οὐδὲ
  english_pob_choice: or
  chosen_spanish: ni
  alternatives_spanish:
  - o tampoco
  - ni tampoco
  lexicon: BDAG
  rationale: En la coordinación negativa, «ni» es la forma natural en español y mantiene la conexión entre los dos infinitivos prohibidos.
- source_word: αὐθεντεῖν
  english_pob_choice: to exercise authority over
  chosen_spanish: ejerza autoridad sobre
  alternatives_spanish:
  - tenga autoridad sobre
  - domine sobre
  lexicon: BDAG
  rationale: αὐθεντέω es raro y su matiz es debatido. «Ejerza autoridad sobre» conserva una lectura neutral de autoridad sin resolver la discusión léxica hacia un sentido excesivamente abusivo ni hacia uno demasiado técnico.
- source_word: ἀνδρός
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un esposo
  lexicon: BDAG
  rationale: ἀνήρ puede significar «hombre» o «esposo». En esta cláusula, el sentido general encaja mejor con el argumento del pasaje; la alternativa marital se conserva por la amplitud semántica del término.
- source_word: ἀλλ’
  english_pob_choice: instead
  chosen_spanish: al contrario
  alternatives_spanish:
  - sino
  - más bien
  lexicon: BDAG
  rationale: ἀλλά introduce el contraste con la prohibición anterior. «Al contrario» transmite bien ese giro en español actual sin suavizar la oposición.
- source_word: εἶναι
  english_pob_choice: she is to be
  chosen_spanish: debe estar
  alternatives_spanish:
  - ha de estar
  - esté
  lexicon: BDAG
  rationale: El infinitivo de εἶναι se vierte de manera idiomática en español como obligación/estado esperado. «Debe estar» expresa con claridad la postura requerida en el contraste.
- source_word: ἐν ἡσυχίᾳ
  english_pob_choice: in quietness
  chosen_spanish: en quietud
  alternatives_spanish:
  - en silencio
  - en calma
  lexicon: BDAG
  rationale: ἡσυχία aquí denota quietud, calma o serenidad más que mutismo absoluto. «Quietud» preserva esa gama semántica y evita imponer «silencio» como si fuera inequívoco.
theological_decisions:
- issue: Sentido de αὐθεντεῖν en un texto eclesial debatido
  english_pob_reading: to exercise authority over
  chosen_spanish_reading: ejerza autoridad sobre
  alternative_spanish_readings:
  - tenga autoridad sobre
  - domine sobre
  rationale: Se conserva una traducción neutral de autoridad, sin cargar el verbo con una connotación abusiva no exigida por la forma inmediata. Así se preserva la tensión lexical documentada en el texto fuente.
  doctrine_reference: Translation philosophy §3 (Preservar la tensión teológica en vez de resolverla)
- issue: γυνή / ἀνήρ como mujer/hombre o esposa/esposo
  english_pob_reading: a woman ... a man
  chosen_spanish_reading: una mujer ... un hombre
  alternative_spanish_readings:
  - una esposa ... un esposo
  rationale: La lectura general encaja mejor con el contexto de 2:9–15, que trata de mujeres en la asamblea, y con la argumentación de creación en los vv. 13–14. Se deja abierta la alternativa marital por la amplitud léxica de los sustantivos griegos.
  doctrine_reference: Translation philosophy §3 (Preservar la tensión teológica en vez de resolverla); §4 (Precisión de género sobre neutralización innecesaria)
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego SBLGNT y se alinea con el auditor de inglés POB. Se conservan las tensiones léxicas documentadas en γυνή/ἀνήρ, αὐθεντέω y ἡσυχία, sin resolverlas por paráfrasis. No se registraron revisiones aplicadas en el pase más reciente; el consenso de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «mujer» y «hombre» en el texto principal, con notas para las lecturas «esposa» y «esposo».
  - Se usa «Yahvé» como convención del proyecto solo cuando el texto la requiera; aquí no aparece.
  - 'Se conserva un verbo de autoridad neutral: «ejerza autoridad sobre».'
  - «Quietud» se prefiere sobre «silencio» para respetar el rango semántico de ἡσυχία.
  - La puntuación y el orden sintáctico buscan ser publicables en español, sin perder la estructura prohibitiva y contrastiva del original.
