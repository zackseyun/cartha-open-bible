  to: Pero no permito que una mujer[a] enseñe ni que ejerza autoridad sobre un hombre[b]; más bien, debe estar en quietud[c].
  rationale: Se revisa para alinear el aparato de notas con el expediente inglés y con la principal incertidumbre léxica del versículo. «Más bien» representa mejor ἀλλά que «al contrario», y se elimina la nota innecesaria sobre esa partícula. Se añade la nota indispensable sobre αὐθεντεῖν, anclada en la misma frase donde aparece el término debatido, y se conserva la nota sobre «quietud/silencio».
