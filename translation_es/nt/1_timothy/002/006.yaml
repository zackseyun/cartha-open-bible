translation:
  language: es
  text: el que se dio a sí mismo como rescate por todos[a], el testimonio en los tiempos señalados[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «a favor de todos». La frase conserva la amplitud del griego sin decidir si se refiere a cada individuo o a todos los tipos de personas.'
    reason: alternative_reading
  - marker: b
    text: O «el testimonio» o «el testimonio dado en los tiempos señalados». La expresión griega es compacta y puede funcionar como aposición a la entrega de Cristo, es decir, que su entrega misma es «el testimonio».
    reason: lexical_alternative
  - marker: c
    text: 'También puede traducirse: «en los tiempos apropiados» o «en los tiempos establecidos». El plural del griego sugiere «tiempos» más que un singular como «a su debido tiempo».'
    reason: previous_rendering
lexical_decisions:
- source_word: δοὺς
  english_pob_choice: gave
  chosen_spanish: se dio
  alternatives_spanish:
  - dio
  - había dado
  lexicon: BDAG
  rationale: El participio aoristo modifica al antecedente implícito («el hombre Mesías Jesús»). En español, «se dio a sí mismo» conserva la acción voluntaria y personal del sujeto con naturalidad y sin volver la frase pesada.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - sí mismo
  - él mismo
  lexicon: BDAG
  rationale: El reflexivo resalta que la entrega fue de su propia persona; «a sí mismo» es la forma más clara y directa en español.
- source_word: ἀντίλυτρον
  english_pob_choice: as a ransom
  chosen_spanish: como rescate
  alternatives_spanish:
  - como rescate sustitutivo
  - como precio de rescate
  lexicon: BDAG
  rationale: «Rescate» comunica el valor redentor del término sin sobrecargar el verso con tecnicismo. La fuerza sustitutiva del prefijo ἀντί queda preservada en la nota de alternativa, sin expandir indebidamente el texto principal.
- source_word: ὑπὲρ πάντων
  english_pob_choice: for all
  chosen_spanish: por todos
  alternatives_spanish:
  - a favor de todos
  - en favor de todos
  lexicon: BDAG
  rationale: «Por todos» refleja bien ὑπέρ en sentido de beneficio o representación y mantiene la amplitud de πάντων. Evita restringir el alcance que el griego no especifica.
- source_word: τὸ μαρτύριον
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - el testimonio dado
  - el testimonio rendido
  - el testigo
  lexicon: BDAG
  rationale: «Testimonio» es el equivalente normal de μαρτύριον y conserva la relación appositiva o resumptiva con la cláusula anterior. «Testigo» sería demasiado personal y no corresponde al sustantivo aquí.
- source_word: καιροῖς ἰδίοις
  english_pob_choice: at the proper times
  chosen_spanish: en sus tiempos propios
  alternatives_spanish:
  - en los tiempos señalados
  - a su debido tiempo
  lexicon: BDAG
  rationale: La pluralidad de καιροῖς se refleja mejor con «tiempos»; «propios» mantiene la idea de tiempos apropiados, establecidos o pertenecientes al plan de Dios, sin forzar una paráfrasis más interpretativa.
theological_decisions:
- issue: Alcance de πάντων en relación con el rescate de Cristo
  english_pob_reading: Rendered broadly as 'for all' without narrowing to either all people without exception or all kinds of people.
  chosen_spanish_reading: Traducido ampliamente como «por todos», sin resolver si el alcance es cada individuo o todos los tipos/clases de personas.
  alternative_spanish_readings:
  - por todos los hombres
  - por todas las personas
  - por toda clase de personas
  rationale: El verso presenta un alcance universal en términos amplios, pero no obliga a cerrar el debate teológico sobre la extensión de la expiación. La traducción conserva la tensión textual en vez de imponer una conclusión doctrinal.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Valor sustitutivo de ἀντίλυτρον
  english_pob_reading: Expressed as 'ransom' in the main text, with substitutionary nuance acknowledged in documentation rather than expanded in translation.
  chosen_spanish_reading: Expresado como «rescate» en el texto principal, con la matización sustitutiva mantenida en la documentación.
  alternative_spanish_readings:
  - rescate sustitutivo
  - rescate en lugar de otros
  - precio de rescate
  rationale: El término contiene fuerza redentora y sustitutiva, pero una ampliación en el cuerpo del texto excedería lo que el griego dice de forma compacta. «Rescate» es fiel, claro y permite documentar la mayor fuerza del prefijo ἀντί.
  doctrine_reference: Equivalencia óptima; no paraphrasear más allá de lo que permite el texto fuente.
- issue: Relación de la cláusula nominal 'τὸ μαρτύριον' con la frase anterior
  english_pob_reading: Kept formally as 'the testimony at the proper times' after revisions to avoid adding an implied verb.
  chosen_spanish_reading: Mantenida formalmente como «el testimonio en sus tiempos propios», sin introducir un verbo implícito.
  alternative_spanish_readings:
  - el testimonio a su debido tiempo
  - el testimonio en los tiempos señalados
  rationale: El griego es compacto y appositivo; en español también puede conservarse la estructura nominal para no añadir elementos inexistentes en el original. La frase resultante sigue siendo comprensible y refleja la misma tensión interpretativa.
  doctrine_reference: Fidelidad formal con claridad idiomática.
translation_notes:
  revision_awareness: La redacción española sigue el ajuste final del audit trail que conserva la cláusula nominal sin añadir un verbo implícito, pero la expresa de modo idiomático en español como una aposición compacta. Se mantuvo la amplitud de πάντων y la lectura de ἀντίλυτρον como rescate, documentando en notas la fuerza sustitutiva y las posibles alternativas.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; en este verso no aparece.
  - «Mesías» no es necesario aquí porque el antecedente queda implícito en el contexto inmediato; el verso español conserva la referencia pronominal.
  - Se mantuvo «rescate» para ἀντίλυτρον, coherente con la terminología POB en pasajes de redención.
  - «por todos» conserva la amplitud sin añadir especificaciones doctrinales no presentes en el griego.
  - La estructura nominal «el testimonio en sus tiempos propios» refleja la compresión del original y evita sobreinterpretación.
