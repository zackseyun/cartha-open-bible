translation:
  language: es
  text: por los reyes y por todos los que ocupan altas posiciones[a], para que llevemos una vida tranquila y sosegada, con toda piedad y dignidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los que están en autoridad». La expresión griega es literalmente «todos los que están en eminencia» o «en alta posición».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - a favor de
  - por causa de
  lexicon: BDAG
  rationale: En contexto de oración e intercesión, ὑπέρ expresa la referencia de la súplica; en español, «por» comunica de forma natural que se ora en beneficio de esas personas.
- source_word: βασιλέων
  english_pob_choice: kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los soberanos
  - los gobernantes
  lexicon: BDAG
  rationale: El término griego nombra reyes de manera directa. «Reyes» conserva la forma lexical sin diluirla en una categoría más general.
- source_word: πάντων τῶν ἐν ὑπεροχῇ ὄντων
  english_pob_choice: all who are in high positions
  chosen_spanish: todos los que están en eminencia
  alternatives_spanish:
  - todos los que están en autoridad
  - todos los que ocupan altos cargos
  - todos los que sobresalen en posición
  lexicon: BDAG
  rationale: La frase apunta a quienes se hallan en una condición de superioridad o prominencia. «En eminencia» conserva ese matiz amplio y no restringe el sentido solo a autoridad legal formal.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce propósito. «Para que» es la equivalencia natural y clara en español.
- source_word: ἤρεμον
  english_pob_choice: tranquil
  chosen_spanish: tranquila
  alternatives_spanish:
  - apacible
  - serena
  - pacífica
  lexicon: BDAG
  rationale: El adjetivo describe una vida libre de perturbación. «Tranquila» preserva ese valor sin volverlo excesivamente interpretativo.
- source_word: ἡσύχιον
  english_pob_choice: quiet
  chosen_spanish: sosegada
  alternatives_spanish:
  - quieta
  - reposada
  - serena
  lexicon: BDAG
  rationale: Para evitar que ambos adjetivos queden como sinónimos planos en español, «sosegada» aporta la idea de calma estable y distingue mejor el segundo matiz.
- source_word: βίον
  english_pob_choice: life
  chosen_spanish: una vida
  alternatives_spanish:
  - la vida
  - el modo de vida
  lexicon: BDAG
  rationale: Aquí βίος se refiere a la manera concreta de vivir. «Una vida» mantiene la naturalidad de la construcción española.
- source_word: διάγωμεν
  english_pob_choice: we may lead
  chosen_spanish: llevemos
  alternatives_spanish:
  - vivamos
  - pasemos
  - conduzcamos
  lexicon: BDAG
  rationale: El verbo expresa conducir o llevar la vida. «Llevemos una vida» reproduce bien la idiomática del griego y del inglés POB sin perder el matiz activo.
- source_word: ἐν πάσῃ εὐσεβείᾳ
  english_pob_choice: in all godliness
  chosen_spanish: con toda piedad
  alternatives_spanish:
  - en toda piedad
  - con completa devoción a Dios
  - en toda reverencia
  lexicon: BDAG
  rationale: εὐσέβεια denota devoción reverente vivida. «Piedad» es la opción concisa y eclesialmente inteligible en español; «con toda» refleja el alcance de πάσῃ de manera fluida.
- source_word: σεμνότητι
  english_pob_choice: dignity
  chosen_spanish: dignidad
  alternatives_spanish:
  - seriedad
  - decoro
  - graveza
  lexicon: BDAG
  rationale: El término expresa gravedad respetable y conducta sobria. «Dignidad» comunica bien esa carga moral y social en español moderno.
theological_decisions:
- issue: Alcance de la oración por autoridades civiles
  english_pob_reading: The verse is rendered to express prayer for rulers with the purpose that believers may live peacefully and piously, without implying unqualified endorsement of those rulers.
  chosen_spanish_reading: El versículo expresa oración por reyes y por quienes están en posiciones eminentes, con el propósito de una vida tranquila y piadosa, sin implicar aprobación automática de esas autoridades.
  alternative_spanish_readings:
  - una formulación que sugiera sumisión política explícita
  - una versión que limite el sentido a autoridades formalmente constituidas
  rationale: El griego presenta los objetos de la oración y el propósito social de esa intercesión. La traducción española conserva ese marco sin añadir una tesis política que el texto no formula.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta propuesta sigue de cerca el acuerdo alto del audit trail inglés y mantiene la distinción entre los dos adjetivos griegos de calma mediante «tranquila» y «sosegada».
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general solo cuando el texto la requiera; este versículo no contiene el nombre divino.
  - Se mantiene «piedad» para εὐσέβεια, en coherencia con el registro pastoral y con el uso eclesial del término.
  - Se conserva «dignidad» para σεμνότης para evitar un calco rígido y a la vez mantener el peso moral del término.
  - «En eminencia» refleja la amplitud semántica de ὑπεροχή sin estrecharlo innecesariamente a un cargo jurídico específico.
