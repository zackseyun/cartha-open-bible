review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: oración por reyes y por todos los que ocupan posición elevada, con el propósito de que los creyentes vivan una vida calmada en piedad y dignidad. También preserva la distinción entre ἤρεμον y ἡσύχιον. Sin embargo, «están en eminencia» suena poco idiomático en español actual y no comunica con claridad la idea de posición elevada; además, la nota literal «están siendo en eminencia/alta posición» es demasiado calcada.'
  spanish_quality_summary: La frase general es clara y digna, pero «por los reyes y por todos» puede simplificarse a «por los reyes y por todos los que ocupan altas posiciones» sin pérdida de sentido, y eso mejora el flujo. «Con toda piedad y dignidad» es aceptable, aunque «en toda piedad y dignidad» seguiría más de cerca el ἐν; no obstante, «con toda» es español natural y doctrinalmente suficiente. El principal ajuste necesario es idiomático-lexical en «eminencia».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Piedad» para εὐσέβεια y «dignidad» para σεμνότης concuerdan con el rastro inglés. La alternativa documentada «autoridad» debe mantenerse en nota, pero la línea principal debería reflejar mejor el valor amplio de ἐν ὑπεροχῇ con una expresión española natural como «ocupan altas posiciones».
  issues:
  - severity: medium
    issue: «están en eminencia» es una formulación poco natural en español contemporáneo.
    rationale: Aunque intenta preservar el matiz amplio de ἐν ὑπεροχῇ, resulta rígida y poco transparente para lectores hispanos. «Ocupan altas posiciones» o «están en posiciones elevadas» comunica mejor la idea de rango elevado sin reducirla solo a autoridad formal.
  - severity: low
    issue: La nota al pie literaliza en exceso «están siendo en eminencia/alta posición».
    rationale: La explicación de apoyo debe aclarar el griego sin sonar antinatural. Una reformulación como «todos los que están en eminencia o alta posición» o «todos los que están en posición elevada» informa mejor al lector español.
  revised_spanish_text: por los reyes y por todos los que ocupan altas posiciones[a], para que llevemos una vida tranquila y sosegada, con toda piedad y dignidad.
  revised_footnotes:
  - marker: a
    text: O «todos los que están en autoridad». La expresión griega es literalmente «todos los que están en eminencia» o «en alta posición».
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente la expresión principal de πάντων τῶν ἐν ὑπεροχῇ ὄντων para lograr un español más natural y claro, manteniendo en la nota la alternativa «en autoridad» y el matiz más literal de eminencia/alta posición. El resto del versículo es fiel al griego y al rastro léxico-teológico del POB.
