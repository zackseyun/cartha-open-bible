translation:
  language: es
  text: a las mujeres mayores, como a madres; a las más jóvenes, como a hermanas, con toda pureza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en toda pureza». La expresión también puede entenderse con un fuerte sentido de castidad o de decoro sexual, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρεσβυτέρας
  english_pob_choice: older women
  chosen_spanish: mujeres mayores
  alternatives_spanish:
  - mujeres de más edad
  - mujeres ancianas
  lexicon: BDAG
  rationale: El griego es femenino plural sustantivado y aquí contrasta por edad con νεωτέρας, no con el oficio de ancianos. En español, 'mujeres mayores' comunica de forma natural la relación etaria sin introducir una lectura eclesial ajena al contexto.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como a
  alternatives_spanish:
  - como
  - igual que
  lexicon: BDAG
  rationale: La comparación exhortativa se conserva con 'como a', que suena natural en español cuando se habla del trato hacia personas dentro de una relación familiar metafórica.
- source_word: μητέρας
  english_pob_choice: mothers
  chosen_spanish: madres
  alternatives_spanish:
  - como madres
  - madres
  lexicon: BDAG
  rationale: Se mantiene la metáfora familiar sin añadir un posesivo explícito que no está en el griego. 'Madres' es el equivalente directo y claro.
- source_word: νεωτέρας
  english_pob_choice: younger women
  chosen_spanish: las más jóvenes
  alternatives_spanish:
  - mujeres más jóvenes
  - jóvenes
  lexicon: BDAG
  rationale: El adjetivo femenino plural sustantivado contrasta por edad con 'mujeres mayores'. 'Las más jóvenes' preserva la comparación de edad en un español fluido y natural.
- source_word: ἀδελφὰς
  english_pob_choice: sisters
  chosen_spanish: hermanas
  alternatives_spanish:
  - como hermanas
  - hermanas
  lexicon: BDAG
  rationale: La metáfora de parentesco se conserva con 'hermanas', equivalente normal en español y acorde con el tono de exhortación pastoral.
- source_word: ἐν πάσῃ ἁγνείᾳ
  english_pob_choice: in all purity
  chosen_spanish: con toda pureza
  alternatives_spanish:
  - en toda pureza
  - con completa pureza
  - con toda castidad
  lexicon: BDAG
  rationale: El inglés POB deja abierta la amplitud semántica de ἁγνεία y reconoce su fuerza de decoro moral/sexual en contexto. En español, 'con toda pureza' conserva esa amplitud sin reducir el término únicamente a castidad sexual, y 'con' encaja bien como modificación de la manera de tratar a las mujeres más jóvenes.
theological_decisions:
- issue: Alcance de ἁγνεία en la instrucción sobre las mujeres más jóvenes
  english_pob_reading: Render broadly as 'purity' without restricting the term in the main text to sexual chastity alone, while recognizing that sexual propriety is strongly included by context.
  chosen_spanish_reading: Traducirlo como 'pureza' en sentido amplio, dejando implícita la exigencia de decoro sexual y moral según el contexto.
  alternative_spanish_readings:
  - castidad
  - pureza sexual
  - decoro sexual
  rationale: 'El contexto inmediato regula la conducta de Timoteo hacia mujeres dentro de un marco familiar metafórico. ''Pureza'' preserva la tensión semántica documentada por el POB en inglés: incluye la dimensión sexual, pero no la agota ni la vuelve demasiado explícita sin necesidad del griego.'
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; Never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios; por eso este borrador sigue de cerca la lectura auditada del POB en inglés y mantiene la ambigüedad significativa de ἁγνεία en una formulación española natural.
  spanish_consistency_notes:
  - Se usa 'mujeres mayores' y 'las más jóvenes' para conservar el contraste etario del griego sin introducir el sentido de oficio eclesial.
  - Se mantiene 'pureza' como término amplio, coherente con la decisión inglesa de no restringir ἁγνεία solo a castidad.
  - No se añade 'tu' ni otro posesivo porque el griego no lo expresa explícitamente.
  - La puntuación separa los dos paralelismos comparativos y deja la cláusula final como modificador de la manera de tratar a las mujeres más jóvenes.
