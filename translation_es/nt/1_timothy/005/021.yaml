translation:
  language: es
  text: Te encarezco solemnemente delante de Dios y de Mesías Jesús y de los ángeles escogidos[a], que guardes estas cosas sin prejuicio[b], sin hacer nada por parcialidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los ángeles electos».
    reason: lexical_alternative
  - marker: b
    text: O «sin juicio previo».
