lexical_decisions:
- source_word: διαμαρτύρομαι
  english_pob_choice: I solemnly charge
  chosen_spanish: Te encarezco solemnemente
  alternatives_spanish:
  - Te doy solemne encargo
  - Te exhorto solemnemente
  - Te atestiguo solemnemente
  lexicon: BDAG
  rationale: En un contexto epistolar de amonestación, el verbo expresa una carga/apremio formal y grave, no solo testimonio. «Te encarezco solemnemente» conserva el tono jurídico y pastoral del original.
- source_word: ἐνώπιον
  english_pob_choice: in the presence of
  chosen_spanish: delante de
  alternatives_spanish:
  - en la presencia de
  - ante
  lexicon: BDAG
  rationale: La preposición introduce una invocación solemne ante testigos divinos; «delante de» es natural en español y mantiene el matiz de comparecencia solemne.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Cristo Jesús
  alternatives_spanish:
  - Mesías Jesús
  lexicon: BDAG
  rationale: Aquí la forma funciona como designación estable y el flujo del pasaje en español gana naturalidad con «Cristo Jesús». La tensión terminológica de la serie POB entre «Mesías» y «Cristo» queda atenuada por la tradición estable en esta fórmula invocatoria.
- source_word: ἐκλεκτῶν ἀγγέλων
  english_pob_choice: the chosen angels
  chosen_spanish: los ángeles escogidos
  alternatives_spanish:
  - los ángeles elegidos
  - los ángeles electos
  lexicon: BDAG
  rationale: ἐκλεκτός significa «escogido/elegido». «Escogidos» es claro, natural y conserva la idea de selección divina sin cargar el término con tecnicismos eclesiales.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas instrucciones
  - esto
  lexicon: BDAG
  rationale: El demostrativo remite a las instrucciones inmediatas; «estas cosas» sigue de cerca el referente amplio sin sobreespecificar.
- source_word: φυλάξῃς
  english_pob_choice: you keep
  chosen_spanish: guardes
  alternatives_spanish:
  - observes
  - mantengas
  - cumplas
  lexicon: BDAG
  rationale: Aquí φυλάσσω implica custodiar/observar fielmente. «Guardes» conserva la idea de vigilar y mantener intacto lo mandado.
- source_word: χωρὶς προκρίματος
  english_pob_choice: without prejudice
  chosen_spanish: sin prejuicio
  alternatives_spanish:
  - sin prejuzgar
  - sin prejuicios
  - sin juicio previo
  lexicon: BDAG
  rationale: πρόκριμα alude a juicio previo o prejuzgamiento. «Sin prejuicio» es breve y comprensible en español; «sin juicio previo» se conserva como alternativa más explicativa.
- source_word: μηδὲν ποιῶν
  english_pob_choice: doing nothing
  chosen_spanish: sin hacer nada
  alternatives_spanish:
  - no haciendo nada
  - sin actuar
  lexicon: BDAG
  rationale: El participio añade una restricción concomitante a la orden principal. «Sin hacer nada» reproduce esa relación sin introducir una perífrasis extraña.
- source_word: κατὰ πρόσκλισιν
  english_pob_choice: according to partiality
  chosen_spanish: con parcialidad
  alternatives_spanish:
  - por favoritismo
  - con favoritismo
  - por sesgo
  lexicon: BDAG
  rationale: πρόσκλισις expresa inclinación hacia un lado, favoritismo o sesgo. En español, «con parcialidad» mantiene cercanía formal al griego; la alternativa más idiomática «por favoritismo» se deja como opción semántica.
theological_decisions:
- issue: Título Χριστός en una invocación solemne
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Cristo Jesús
  alternative_spanish_readings:
  - Mesías Jesús
  rationale: Aunque el marco editorial favorece «Mesías» para Χριστός como título, en esta fórmula fija la secuencia «Cristo Jesús» suena más natural y solemne en español litúrgico-bíblico, sin cambiar la referencia al Mesías ungido.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah'' where title; ''Christ'' where name-like'
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que osciló entre «Messiah Jesus» y «Christ Jesus»; para el español se optó por una forma natural y estable en la fórmula invocatoria, sin borrar la tensión documental entre la política terminológica del proyecto y el uso tradicional.
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia solemne completa: invocación ante Dios, Cristo Jesús y los ángeles escogidos.'
  - «Sin prejuicio» y «con parcialidad» conservan la relación semántica entre προκρίματος y πρόσκλισιν sin normalizarlas en exceso.
  - No se introdujo «Señor» para el nombre divino, pues aquí el griego dice θεοῦ y Χριστοῦ Ἰησοῦ, no κύριος.
