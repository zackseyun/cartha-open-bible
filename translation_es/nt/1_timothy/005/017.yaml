translation:
  language: es
  text: Que los ancianos[a] que dirigen bien sean tenidos por dignos de doble honor[b], especialmente los que se afanan en palabra y enseñanza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presbíteros». El término designa aquí a dirigentes reconocidos de la comunidad, no simplemente a hombres de mayor edad.
    reason: lexical_alternative
  - marker: b
    text: O «de honor doble». La expresión puede abarcar tanto estima como sostén material, especialmente a la luz del versículo siguiente.
    reason: lexical_alternative
  - marker: c
    text: «En palabra y enseñanza» probablemente se refiere al ministerio verbal, como la proclamación y la instrucción.
    reason: cultural_note
lexical_decisions:
- source_word: πρεσβύτεροι
  english_pob_choice: elders
  chosen_spanish: presbíteros
  alternatives_spanish:
  - ancianos
  - líderes de la iglesia
  - presbíteros/ancianos
  lexicon: BDAG
  rationale: El contexto de las Pastorales apunta a un grupo reconocido de dirigentes de la comunidad; en español, 'presbíteros' conserva el matiz de cargo eclesial y mantiene la correspondencia lexical con el griego, sin reducirlo a mera edad biológica. Se evita 'ancianos' porque puede sonar a edad solamente y 'líderes' porque suaviza demasiado el término técnico.
- source_word: καλῶς προεστῶτες
  english_pob_choice: who lead well
  chosen_spanish: que gobiernan bien
  alternatives_spanish:
  - que dirigen bien
  - que presiden bien
  - que administran bien
  lexicon: BDAG
  rationale: προΐστημι aquí implica liderazgo/encabezamiento con responsabilidad real. 'Gobiernan bien' conserva la fuerza de autoridad del verbo mejor que una simple idea de coordinación, y mantiene un registro digno. Aunque 'dirigen bien' es posible, 'gobiernan' refleja mejor la función de supervisión que el contexto sugiere.
- source_word: διπλῆς τιμῆς
  english_pob_choice: of double honor
  chosen_spanish: de doble honor
  alternatives_spanish:
  - de honor doble
  - de honor duplicado
  - de honra doble
  lexicon: BDAG
  rationale: 'Se conserva la ambigüedad semántica del griego: τιμή puede abarcar estima, reconocimiento y, por el contexto inmediato, posible sostén material. ''Doble honor'' es la forma más transparente y fiel al giro original, sin estrecharlo a solo respeto ni a solo remuneración.'
- source_word: ἀξιούσθωσαν
  english_pob_choice: be considered worthy
  chosen_spanish: sean tenidos por dignos
  alternatives_spanish:
  - sean considerados dignos
  - sean estimados dignos
  - sean contados dignos
  lexicon: BDAG
  rationale: El pasivo imperativo pide un reconocimiento evaluativo por parte de la comunidad. 'Sean tenidos por dignos' es natural en español bíblico actual y mantiene la idea de valoración pública sin forzar un lenguaje demasiado jurídico.
- source_word: μάλιστα
  english_pob_choice: especially
  chosen_spanish: especialmente
  alternatives_spanish:
  - particularmente
  - sobre todo
  - es decir
  lexicon: BDAG
  rationale: '''Especialmente'' preserva la fuerza de énfasis selectivo del adverbio griego sin convertirlo en una explicación appositiva. Deja abierta la relación entre los presbíteros en general y el subgrupo destacado por Pablo.'
- source_word: κοπιῶντες
  english_pob_choice: those who labor
  chosen_spanish: los que trabajan
  alternatives_spanish:
  - los que se afanan
  - los que laboran
  - los que se esfuerzan
  lexicon: BDAG
  rationale: κοπιάω expresa esfuerzo intenso; en español, 'trabajan' comunica bien la idea en un registro fluido y digno. Aunque 'laboran' es más literal, 'trabajan' suena más natural y no pierde necesariamente la carga de esfuerzo cuando se combina con el contexto.
- source_word: ἐν λόγῳ
  english_pob_choice: in word
  chosen_spanish: en la palabra
  alternatives_spanish:
  - en la Palabra
  - en la predicación
  - en el discurso
  lexicon: BDAG
  rationale: Se opta por 'la palabra' para mantener la amplitud del λόγος griego y su probable referencia al ministerio verbal, sin cerrar prematuramente la frase a 'predicación'. En español, esta forma puede leerse de manera natural como palabra proclamada o dicha, según el contexto.
- source_word: διδασκαλίᾳ
  english_pob_choice: teaching
  chosen_spanish: y en la enseñanza
  alternatives_spanish:
  - y en la instrucción
  - y en la doctrina
  lexicon: BDAG
  rationale: '''Enseñanza'' es el equivalente más claro y transparente en español para διδασκαλία. ''Doctrina'' sería más técnico de lo que el sustantivo griego exige aquí, y ''instrucción'' puede sonar menos a una función ministerial reconocida.'
theological_decisions:
- issue: Alcance de 'doble honor'
  english_pob_reading: Retain the broader phrase 'double honor' in the main text without narrowing it to either respect alone or financial remuneration alone.
  chosen_spanish_reading: Conservar 'doble honor' sin reducirlo ni a pura estima ni a solo pago material.
  alternative_spanish_readings:
  - doble respeto
  - doble remuneración
  - honor que incluye apoyo material
  rationale: El contexto inmediato sugiere que puede incluir sostenimiento material, pero τιμή también abarca honra/estima. Mantener la frase amplia evita cerrar indebidamente la tensión semántica y respeta la evidencia del verso siguiente sin imponer una lectura única en el texto principal.
  doctrine_reference: Principios de traducción del POB §§1, 3, 5
- issue: Relación entre los presbíteros y los que trabajan en palabra y enseñanza
  english_pob_reading: Render μάλιστα as 'especially' rather than an appositional 'namely.'
  chosen_spanish_reading: Traducir μάλιστα como 'especialmente', no como 'es decir'.
  alternative_spanish_readings:
  - es decir, los que trabajan en palabra y enseñanza
  - principalmente
  - a saber
  rationale: '''Especialmente'' preserva el contraste de énfasis y no cierra la discusión sobre si se trata de todos los presbíteros o de un subgrupo con ministerio destacado en la enseñanza. ''Es decir'' haría más apposicional la frase de lo que el griego exige.'
  doctrine_reference: Principios de traducción del POB §3
translation_notes:
  revision_awareness: La revisión más reciente no exigió cambios; el borrador se mantiene alineado con el texto griego SBLGNT y con el audit trail inglés, con alta concordancia en las decisiones principales.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' reservado para el tetragrámaton; este versículo no lo contiene.
  - Se conservó la distinción entre 'presbíteros' como término de cargo y 'ancianos' como alternativa explicativa en nota.
  - '''Doble honor'' permanece sin especificación de solo respeto o solo compensación, para preservar la tensión semántica documentada.'
  - Se usó 'palabra' y 'enseñanza' para reflejar el campo verbal/ministerial sin sobretraducir a 'predicación' en el texto principal.
