base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/017.yaml
  text: Let the elders who lead well be considered worthy of double honor[c][b][a], especially those who labor in word and teaching.
  footnotes:
  - marker: a
    text: Or 'be counted worthy of twofold honor.' The phrase may include both respect and material support, especially in light of the following verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'especially' may be understood by some as 'namely,' identifying the elders in view as those laboring in preaching and teaching.
    reason: alternative_reading
  - marker: c
    text: '''In word and teaching'' likely refers to verbal ministry such as preaching and instruction.'
    reason: cultural_note
