  to: Que los ancianos[a] que dirigen bien sean tenidos por dignos de doble honor[b], especialmente los que se afanan en palabra y enseñanza[c].
  rationale: 'Se revisa para alinear mejor el español con la evidencia griega y con las decisiones auditadas del POB inglés: «ancianos» refleja mejor πρεσβύτεροι sin sobrecargar el texto con terminología eclesiástica posterior; «dirigen bien» corresponde a προΐστημι según la opción documentada de ‘lead well’; «se afanan» recupera la fuerza de κοπιῶντες; y «en palabra y enseñanza» preserva la amplitud del griego con mejor naturalidad. Las notas se ajustan para conservar las alternativas relevantes sin introducir ambigüedad innecesaria.'
