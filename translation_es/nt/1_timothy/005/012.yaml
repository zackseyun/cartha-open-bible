translation:
  language: es
  text: incurriendo en juicio, porque han abandonado su fe anterior[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su primer compromiso» o «su anterior compromiso». La palabra griega puede significar «fe», pero en este contexto algunos la entienden como una promesa previa, probablemente relacionada con la inscripción como viuda.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔχουσαι
  english_pob_choice: incurring
  chosen_spanish: incurriendo en
  alternatives_spanish:
  - teniendo
  - cayendo en
  - contrayendo
  lexicon: BDAG
  rationale: El participio literal es «teniendo», pero con κρίμα en este contexto expresa la idea de entrar en una condición desfavorable. «Incurriendo en» comunica de forma natural la consecuencia judicial sin exagerar el matiz.
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - condenación
  - sentencia
  - castigo
  lexicon: BDAG
  rationale: «Juicio» conserva el valor forense amplio de κρίμα y evita especificar más de lo que el versículo dice. «Condenación» sería demasiado fuerte; «sentencia» y «castigo» estrechan el sentido.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Aquí introduce la causa del juicio. «Porque» es la equivalencia natural y clara en español.
- source_word: τὴν πρώτην πίστιν
  english_pob_choice: their former faith
  chosen_spanish: su fe anterior
  alternatives_spanish:
  - su primera fe
  - su primer compromiso
  - su anterior compromiso
  lexicon: BDAG
  rationale: «Anterior» reproduce bien el valor temporal de πρῶτον/πρώτην. Se mantiene «fe» como traducción principal de πίστις, en línea con la decisión POB inglesa, pero se conserva en nota la alternativa de «compromiso/juramento» porque el contexto de viudas genera una ambigüedad real.
- source_word: ἠθέτησαν
  english_pob_choice: have set aside
  chosen_spanish: han abandonado
  alternatives_spanish:
  - han rechazado
  - han invalidado
  - han desechado
  lexicon: BDAG
  rationale: ἀθετέω puede significar rechazar o anular. «Han abandonado» transmite bien la idea de apartarse de una obligación o compromiso previo, sin forzar un sentido técnico de nulidad.
theological_decisions:
- issue: Sentido de τὴν πρώτην πίστιν en el contexto de 1 Timoteo 5
  english_pob_reading: their former faith
  chosen_spanish_reading: su fe anterior
  alternative_spanish_readings:
  - su primer compromiso
  - su anterior compromiso
  - su primera promesa
  rationale: El texto griego permite entender πίστις como «fe» o como una promesa/compromiso previo asociado con la inscripción de viudas. La línea principal conserva «fe» por ser la equivalencia por defecto y porque el griego usa πίστις; la nota preserva la lectura alternativa sin resolver indebidamente la ambigüedad.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation philosophy §3'
translation_notes:
  revision_awareness: La revisión más reciente del proyecto indicó alta concordancia y que no eran necesarios cambios; esta propuesta mantiene esa lectura y solo ajusta el español para que suene natural y conserve la ambigüedad documentada.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico propio del proyecto, evitando vocabulario eclesiástico tradicional no exigido por el griego.
  - «Juicio» se usa en sentido forense amplio, coherente con la cautela de la POB inglesa frente a «condenación».
  - La nota al pie conserva la alternativa interpretativa clave sin desplazar la lectura principal del texto.
  - Se evita «Cristo/Mesías» porque el versículo no contiene ese campo léxico.
