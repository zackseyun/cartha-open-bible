translation:
  language: es
  text: A nadie le impongas las manos[a] apresuradamente, ni participes en pecados ajenos; consérvate puro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más específicamente en este contexto: “No nombres ni ordaines a nadie demasiado pronto”. El griego dice literalmente “imponer las manos”, un modismo que a menudo se asocia con la comisión o el reconocimiento para el ministerio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χεῖρας ... ἐπιτίθει
  english_pob_choice: lay hands on
  chosen_spanish: impongas las manos
  alternatives_spanish:
  - poner las manos sobre
  - imponer las manos
  - ordenar
  lexicon: BDAG
  rationale: El griego conserva el modismo eclesial de “poner/imponer las manos”. En español, “imponer las manos” comunica mejor el acto ritual sin reducirlo indebidamente a “ordenar”, que sería más interpretativo. Se mantiene la imagen verbal del original y el posible trasfondo de comisión o reconocimiento ministerial.
- source_word: ταχέως
  english_pob_choice: hastily
  chosen_spanish: con ligereza
  alternatives_spanish:
  - apresuradamente
  - demasiado pronto
  - con prisa
  lexicon: BDAG
  rationale: El adverbio apunta a una rapidez indebida o precipitada. “Con ligereza” expresa bien la falta de ponderación que el mandato prohíbe, sin sonar excesivamente técnico.
- source_word: μηδενὶ
  english_pob_choice: on anyone
  chosen_spanish: sobre nadie
  alternatives_spanish:
  - a nadie
  - sobre ninguna persona
  lexicon: BDAG
  rationale: Con el modismo de imponer/poner las manos, el complemento natural en español es “sobre nadie”. Mantiene el alcance universal de la prohibición y suena idiomático en el contexto ritual.
- source_word: μηδὲ κοινώνει
  english_pob_choice: nor share in
  chosen_spanish: ni participes en
  alternatives_spanish:
  - ni tengas parte en
  - ni te hagas cómplice de
  - ni compartas
  lexicon: BDAG
  rationale: κοινωνέω aquí tiene el sentido de participar o hacerse partícipe/complicidad. “Participes en” conserva ese valor sin forzar una formulación más interpretativa como “hacerte cómplice”, aunque esa sigue siendo una alternativa posible.
- source_word: ἁμαρτίαις ἀλλοτρίαις
  english_pob_choice: the sins of others
  chosen_spanish: los pecados ajenos
  alternatives_spanish:
  - los pecados de otros
  - pecados de otras personas
  - pecados que pertenecen a otros
  lexicon: BDAG
  rationale: ἀλλότριος significa “ajeno, de otro”. “Ajenos” es conciso, natural y conserva la relación de pertenencia sin perder el matiz de que los pecados no son propios.
- source_word: σεαυτὸν
  english_pob_choice: yourself
  chosen_spanish: te
  alternatives_spanish:
  - a ti mismo
  - tu persona
  lexicon: BDAG
  rationale: El reflexivo va integrado en la forma pronominal del imperativo en español. “Consérvate” reproduce de manera natural la fuerza reflexiva de τήρει + σεαυτόν.
- source_word: ἁγνὸν
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - casto
  - sin mancha
  lexicon: BDAG
  rationale: ἁγνός aquí describe pureza moral general. “Puro” es el equivalente más directo y amplio; “casto” restringiría indebidamente el sentido a pureza sexual.
- source_word: τήρει
  english_pob_choice: keep
  chosen_spanish: consérvate
  alternatives_spanish:
  - guárdate
  - mantente
  - preserva
  lexicon: BDAG
  rationale: El imperativo presente implica una acción continua de mantenimiento. “Consérvate” transmite bien la idea de mantenerse en ese estado de pureza de forma sostenida.
theological_decisions:
- issue: Sentido de imponer/poner las manos
  english_pob_reading: Retain the idiom 'lay hands on' without specifying ordination.
  chosen_spanish_reading: Mantener el modismo de imponer las manos sin traducirlo como una ordenación explícita.
  alternative_spanish_readings:
  - No ordenes a nadie con demasiada rapidez
  - No instituyas a nadie apresuradamente
  - No impongas las manos para ordenar a nadie con ligereza
  rationale: El contexto pastoral permite entender una comisión o reconocimiento ministerial, pero el griego no usa un verbo explícito para “ordenar”. Por fidelidad al modismo y para no estrechar más de lo debido la referencia, se conserva la fórmula ritual en la traducción principal y se deja la implicación contextual abierta.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relación entre las dos prohibiciones
  english_pob_reading: Translate the second clause as a warning against complicity in others' sins, likely connected to premature endorsement.
  chosen_spanish_reading: Entender la segunda cláusula como advertencia contra participar en pecados ajenos, probablemente vinculada a una aprobación o imposición precipitada.
  alternative_spanish_readings:
  - Una advertencia general sin conexión directa con la imposición de manos
  - Una advertencia específicamente sobre culpa por ordenación apresurada
  - Una exhortación separada sobre pureza personal
  rationale: El griego no explicita la conexión lógica, pero la proximidad de las cláusulas sugiere que una decisión apresurada puede implicar complicidad. La traducción principal conserva la amplitud del texto y no fuerza esa relación en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el original griego y toma como guía la decisión auditada del POB en inglés de conservar el modismo de “lay hands on”, sin añadir una especificación doctrinal que el texto no expresa de manera explícita. Se revisó que el español mantenga el contraste de prohibiciones y el mandato final de pureza personal.
  spanish_consistency_notes:
  - Se emplea “imponer las manos” como modismo eclesial reconocido en español, en lugar de sustituirlo por “ordenar” en el texto principal.
  - “Pecados ajenos” y “participes en” preservan el sentido de participación/complicidad de κοινωνέω sin exceso interpretativo.
  - “Consérvate puro” mantiene el tono exhortativo y la continuidad del imperativo presente.
  - La nota al pie recoge la alternativa contextual de imposición/ordenación sin desplazar el texto principal.
