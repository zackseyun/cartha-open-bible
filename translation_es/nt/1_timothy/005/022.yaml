review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y sigue de cerca la decisión del POB en casi todos los puntos: conserva el modismo ritual de χεῖρας ... ἐπιτίθει, expresa adecuadamente la prohibición de συμμετοχή/complicidad en pecados ajenos, y traduce ἁγνὸν τήρει con una exhortación a la pureza personal. Sin embargo, la combinación ''impongas las manos ... sobre nadie'' suena menos natural en español bíblico y eclesial que ''a nadie le impongas las manos'', y ''con ligereza'' atenúa un poco el valor de ταχέως como precipitación indebida; ''apresuradamente'' o ''demasiado pronto'' se ajusta mejor al matiz documentado.'
  spanish_quality_summary: 'El texto es claro y digno, pero requiere un pequeño ajuste de naturalidad y precisión idiomática. ''A nadie le impongas las manos apresuradamente'' fluye mejor en español amplio de iglesia que ''No impongas las manos con ligereza sobre nadie''. La última cláusula ''consérvate puro'' es aceptable, aunque ''mantente puro'' sería más coloquial; no es necesario cambiarla. La nota al pie también necesita pulirse: ''ordenes'' es inadecuado para este contexto; debe decir ''ordaines'' o mejor ''nombres/ordaines'', y conviene mantener el orden natural del español.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El versículo no contiene términos sensibles como Yahvé, Mesías/Cristo, δοῦλος, etc. La decisión de conservar el modismo 'imponer las manos' concuerda con el razonamiento léxico-teológico auditado. Se preserva correctamente la amplitud del original sin reducirlo a 'ordenar' en el texto principal.
  issues:
  - severity: medium
    issue: Orden y construcción poco naturales en 'No impongas las manos ... sobre nadie'
    rationale: Aunque es comprensible, en español amplio y eclesial suena más idiomático 'A nadie le impongas las manos' que colocar 'sobre nadie' al final. El ajuste mejora legibilidad sin alterar el sentido.
  - severity: medium
    issue: '''Con ligereza'' no refleja con la misma precisión el matiz de ταχέως'
    rationale: El POB inglés documenta la idea de actuar prematuramente o de forma precipitada. 'Con ligereza' puede sugerir frivolidad más que prisa indebida. 'Apresuradamente' reproduce mejor el valor adverbial.
  - severity: medium
    issue: La nota al pie usa 'ordenes' en lugar de una forma adecuada como 'ordaines'
    rationale: En español, 'ordenar' en el sentido de conferir ordenación ministerial es 'ordenar/ordainar' según algunas variedades, pero la forma verbal correcta y ampliamente reconocible es 'ordaines' dentro de la cita, o bien reformular con 'nombres/ordaines'. 'Ordenes' se entiende primero como 'des órdenes'.
  revised_spanish_text: A nadie le impongas las manos[a] apresuradamente, ni participes en pecados ajenos; consérvate puro.
  revised_footnotes:
