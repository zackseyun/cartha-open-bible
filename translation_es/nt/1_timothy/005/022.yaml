revisions:
- from: No impongas las manos[a] con ligereza sobre nadie, ni participes en los pecados ajenos; consérvate puro.
  to: A nadie le impongas las manos[a] apresuradamente, ni participes en pecados ajenos; consérvate puro.
  rationale: Se hicieron ajustes menores para mejorar la naturalidad y precisión del español sin apartarse del griego ni de las decisiones auditadas del POB. Se mantuvo el modismo principal 'imponer las manos', se afinó ταχέως con 'apresuradamente', y se corrigió la nota para evitar una forma verbal ambigua o incorrecta.
