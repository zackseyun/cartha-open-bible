translation:
  language: es
  text: Una viuda sea inscrita solo si no tiene menos de sesenta años, que haya sido mujer de un solo marido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mujer de un solo hombre»; la expresión puede referirse a fidelidad o reputación matrimonial, aunque algunos la entienden como «casada solo una vez».
    reason: alternative_reading
lexical_decisions:
- source_word: Χήρα
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - viuda desvalida
  - mujer viuda
  lexicon: BDAG
  rationale: El sustantivo griego designa a una mujer cuyo esposo ha muerto. «Viuda» es el equivalente natural y exacto en español.
- source_word: καταλεγέσθω
  english_pob_choice: be enrolled
  chosen_spanish: sea inscrita
  alternatives_spanish:
  - sea registrada
  - sea puesta en la lista
  lexicon: BDAG
  rationale: El verbo alude a ser incluida en una lista o registro oficial, no solo a ser considerada. «Sea inscrita» conserva bien el sentido administrativo en español.
- source_word: μὴ ἔλαττον ἐτῶν ἑξήκοντα
  english_pob_choice: only if she is not less than sixty years old
  chosen_spanish: solo si no tiene menos de sesenta años
  alternatives_spanish:
  - solo si tiene por lo menos sesenta años
  - solo si es de sesenta años o más
  lexicon: BDAG
  rationale: La expresión fija una edad mínima. La forma negativa mantiene con claridad el matiz limitador del griego y sigue siendo natural en español.
- source_word: γεγονυῖα
  english_pob_choice: having been
  chosen_spanish: habiendo sido
  alternatives_spanish:
  - siendo
  - habiendo llegado a ser
  lexicon: BDAG
  rationale: El participio funciona idiomáticamente con la edad y con la frase siguiente para introducir el estado/condición relevante. «Habiendo sido» permite una construcción completa sin perder la relación temporal/estativa.
- source_word: ἑνὸς ἀνδρὸς γυνή
  english_pob_choice: the wife of one husband
  chosen_spanish: esposa de un solo marido
  alternatives_spanish:
  - mujer de un solo hombre
  - mujer fiel a su marido
  - casada una sola vez
  lexicon: BDAG
  rationale: La frase es idiomática y debatida. «Esposa de un solo marido» conserva la estructura literal y la tensión interpretativa mejor que resolverla en una sola paráfrasis.
theological_decisions:
- issue: Sentido de ἑνὸς ἀνδρὸς γυνή
  english_pob_reading: Retain the idiomatic expression 'the wife of one husband' rather than resolving it as either strict single-marriage history or general marital faithfulness.
  chosen_spanish_reading: Mantener «esposa de un solo marido» en el texto principal sin decidir si exige haber estado casada una sola vez o si se refiere a fidelidad/reputación conyugal.
  alternative_spanish_readings:
  - mujer fiel a su marido
  - casada una sola vez
  - mujer de un solo hombre
  rationale: La frase pertenece a una lista de requisitos pastorales y conserva una ambigüedad real. Traducirla de forma idiomática pero no explicativa evita imponer una conclusión doctrinal o disciplinaria que el griego no resuelve de manera unívoca.
  doctrine_reference: Preservar la tensión interpretativa; no fijar más de lo que el texto exige.
translation_notes:
  revision_awareness: El texto inglés fue revisado para añadir 'having been' y reflejar el participio γεγονυῖα. La versión española incorpora esa relación con «habiendo sido» para mantener la completitud sintáctica y el matiz aspectual sin resolver la ambigüedad de ἑνὸς ἀνδρὸς γυνή.
  spanish_consistency_notes:
  - Se usa «inscrita» para el matiz administrativo de καταλεγέσθω.
  - Se conserva «viuda» como término normal y claro en español.
  - Se evita sustituir la frase idiomática por una explicación interpretativa en el texto principal.
  - La nota al pie mantiene la alternativa semántica documentada por la POB inglesa.
