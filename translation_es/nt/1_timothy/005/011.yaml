translation:
  language: es
  text: Pero rehúsa a las viudas más jóvenes[a], porque cuando se vuelven sensuales[b] contra el Mesías[c], quieren casarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «viudas jóvenes»; el comparativo apunta a edad relativa, no a una categoría técnica fija.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se entregan a sus pasiones» o «se vuelven dadas a los placeres». El verbo griego expresa una inclinación sensual o desordenada.'
    reason: lexical_alternative
  - marker: c
    text: El griego dice literalmente «del Mesías»; el sentido puede ser de oposición o de incompatibilidad con un compromiso previo con él. La traducción tradicional suele decir «contra Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: νεωτέρας χήρας
  english_pob_choice: younger widows
  chosen_spanish: las viudas más jóvenes
  alternatives_spanish:
  - viudas jóvenes
  - las viudas jóvenes
  lexicon: BDAG
  rationale: El comparativo νεωτέρας pide un matiz de edad relativa; en español, 'más jóvenes' conserva ese valor comparativo de forma natural y clara sin añadir un umbral etario.
- source_word: παραιτοῦ
  english_pob_choice: refuse
  chosen_spanish: rehúsa
  alternatives_spanish:
  - rechaza
  - no aceptes
  lexicon: BDAG
  rationale: El imperativo medio en este contexto administrativo indica que Timoteo no debe admitirlas para la lista tratada. 'Rehúsa' preserva la fuerza de negativa directa sin sonar excesivamente técnico.
- source_word: ὅταν γὰρ
  english_pob_choice: for when
  chosen_spanish: porque cuando
  alternatives_spanish:
  - pues cuando
  - ya que cuando
  lexicon: BDAG
  rationale: La combinación introduce razón y circunstancia general. 'Porque cuando' mantiene el valor explicativo de γάρ y el temporal de ὅταν en un español fluido.
- source_word: καταστρηνιάσωσιν
  english_pob_choice: become sensual
  chosen_spanish: se vuelven sensuales
  alternatives_spanish:
  - se entregan a sus pasiones
  - se vuelven dadas a los placeres
  - se vuelven desordenadas
  lexicon: BDAG
  rationale: El verbo raro expresa volverse dominados por impulsos sensuales o deseos desordenados. 'Se vuelven sensuales' sigue de cerca el sentido léxico básico y deja espacio para la tensión interpretativa sin reducirlo sólo al acto de casarse.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: against the Messiah
  chosen_spanish: con respecto al Mesías
  alternatives_spanish:
  - en oposición al Mesías
  - contra el Mesías
  - sin consideración al Mesías
  lexicon: BDAG
  rationale: Χριστοῦ se rinde como 'Mesías' según la terminología doctrinal. La relación genitiva es difícil; 'con respecto al Mesías' preserva la referencia sin forzar una lectura demasiado específica, dejando abierta la idea de conflicto con su lealtad previa.
- source_word: γαμεῖν θέλουσιν
  english_pob_choice: they desire to marry
  chosen_spanish: quieren casarse
  alternatives_spanish:
  - desean casarse
  - quieren contraer matrimonio
  lexicon: BDAG
  rationale: El infinitivo con θέλω expresa deseo o intención. 'Quieren casarse' es natural en español y mantiene la idea simple del acto matrimonial sin añadir matices ausentes en el griego.
theological_decisions:
- issue: Renderizado de Χριστοῦ
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Aquí Χριστός funciona como título. La política doctrinal favorece 'Mesías' en el texto principal; 'Cristo' queda como alternativa tradicional, pero no se adopta en la línea principal sin una razón contextual superior.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías cuando funciona como título'
- issue: Sentido de καταστρηνιάσωσιν τοῦ Χριστοῦ
  english_pob_reading: their sensual or self-indulgent impulses set them in opposition to prior devotion to the Messiah
  chosen_spanish_reading: se vuelven sensuales con respecto al Mesías, es decir, sus impulsos entran en tensión con una devoción previa a él
  alternative_spanish_readings:
  - se vuelven sensuales y se apartan del Mesías
  - sus pasiones las llevan a desconsiderar al Mesías
  rationale: 'La traducción principal evita resolver la dificultad como si el problema fuera simplemente el matrimonio. Mantiene la tensión teológica y pragmática del pasaje: un deseo sensualmente orientado que choca con una lealtad o compromiso previo asociado al Mesías.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue la última revisión del flujo inglés, que ajustó la idea desde una paráfrasis más libre ('grow wanton in disregard of the Messiah') hacia una alineación léxica más cercana a καταστρηνιάσωσιν τοῦ Χριστοῦ ('become sensual against the Messiah'), manteniendo la tensión interpretativa sin resolverla por completo.
  spanish_consistency_notes:
  - He usado «Mesías» en lugar de «Cristo» para Χριστοῦ, conforme al criterio doctrinal del proyecto.
  - He evitado 'siervas' u otros términos eclesiales porque χήρας exige 'viudas' sin mediación.
  - '''Rehúsa'' conserva la fuerza del imperativo y encaja con el contexto de instrucción pastoral.'
  - La nota [c] mantiene abierta la relación semántica difícil del genitivo griego sin sobreexplicar el pasaje en el texto principal.
