translation:
  language: es
  text: De la misma manera también[a], las buenas obras son evidentes, y las que son de otro modo no pueden permanecer ocultas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las que son diferentes» o «las que no son así»; algunos entienden que esto se refiere específicamente a obras malas por analogía con el versículo anterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὡσαύτως καὶ
  english_pob_choice: Likewise also
  chosen_spanish: Asimismo también
  alternatives_spanish:
  - De igual manera también
  - Igualmente también
  lexicon: BDAG
  rationale: ὡσαύτως y καί refuerzan la continuidad con el versículo anterior; por eso se conserva la doble marca en español. «Asimismo también» mantiene el paralelismo sin volver pesada la frase.
- source_word: ἔργα τὰ καλά
  english_pob_choice: good works
  chosen_spanish: las buenas obras
  alternatives_spanish:
  - las buenas obras
  - las buenas acciones
  lexicon: BDAG
  rationale: «Obras» conserva el sustantivo concreto de ἔργα, y «buenas» expresa καλά con naturalidad en español. Se evita «acciones» para no suavizar el matiz ético y conductual del texto.
- source_word: πρόδηλα
  english_pob_choice: evident
  chosen_spanish: son evidentes
  alternatives_spanish:
  - son manifiestas
  - son claras
  - son obvias
  lexicon: BDAG
  rationale: «Evidentes» reproduce el sentido de algo manifiesto o visible sin sobrecargar el verso con un tono explicativo. Encaja bien con el contraste inmediato con lo oculto.
- source_word: τὰ ἄλλως ἔχοντα
  english_pob_choice: those that are otherwise
  chosen_spanish: las que son de otra manera
  alternatives_spanish:
  - las que son diferentes
  - las que no son así
  - las de otro modo
  lexicon: BDAG
  rationale: La expresión griega es breve y abierta. «De otra manera» preserva esa ambigüedad sin decidir si la diferencia es moral, visible o de otro tipo. Se evita especificar «malas» porque el griego no lo dice explícitamente.
- source_word: κρυβῆναι οὐ δύνανται
  english_pob_choice: cannot remain hidden
  chosen_spanish: no pueden permanecer ocultas
  alternatives_spanish:
  - no pueden ocultarse
  - no pueden quedarse escondidas
  lexicon: BDAG
  rationale: «Permanecer ocultas» conserva la idea de imposibilidad durativa que da el infinitivo con δύνανται. «Ocultas» mantiene el campo semántico de κρύπτω sin introducir un agente no mencionado.
theological_decisions:
- issue: Si τὰ ἄλλως ἔχοντα debe entenderse como obras malas específicamente o más ampliamente como obras no evidentes de inmediato
  english_pob_reading: more generally to works that are otherwise/not immediately evident
  chosen_spanish_reading: más ampliamente como obras de otra índole o no evidentes de inmediato
  alternative_spanish_readings:
  - obras malas específicamente
  - obras opuestas a las buenas
  rationale: 'El griego no añade un adjetivo moral equivalente a «malas». La lectura más sobria conserva la tensión del texto: unas obras ya son evidentes, y las otras no pueden seguir ocultas. La traducción española evita cerrar el sentido más de lo que el original permite.'
  doctrine_reference: Primacía del texto original; conservar la tensión interpretativa cuando el griego no la resuelve explícitamente.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del audit trail al omitir cualquier intensificador añadido. Se conserva la estructura paralela del griego: dos miembros coordinados, con el segundo evitando especificar moralidad donde el original no la explicita.'
  spanish_consistency_notes:
  - Se usó «obras» para ἔργα en coherencia con el valor ético de la expresión y para mantener el paralelo con la tradición paulina.
  - Se prefirió «evidentes» para πρόδηλα y «ocultas» para κρυβῆναι, conservando el contraste visible/oculto.
  - Se mantuvo «de otra manera» como solución abierta para τὰ ἄλλως ἔχοντα, sin resolver la ambigüedad interpretativa.
  - La nota [a] se ancla en «Asimismo también» para reflejar la observación del audit trail sobre la fuerza conjunta de ὡσαύτως y καί.
