translation:
  language: es
  text: Reprende a los que están pecando[a][b] delante de todos, para que también los demás tengan temor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que persisten en pecado». El participio presente puede sugerir una conducta continuada, pero el texto griego dice literalmente «los que están pecando».
    reason: lexical_alternative
  - marker: b
    text: El contexto inmediato puede indicar en particular a ancianos que pecan, aunque este versículo en sí solo dice «los que están pecando».
    reason: cross_reference
lexical_decisions:
- source_word: τοὺς ἁμαρτάνοντας
  english_pob_choice: those who are sinning
  chosen_spanish: a los que están pecando
  alternatives_spanish:
  - a los que pecan
  - a los que persisten en pecado
  - a los que están en pecado
  lexicon: BDAG
  rationale: El participio presente sustantivado se entiende naturalmente como personas caracterizadas por una acción en curso; por eso se mantiene con una perífrasis progresiva. «Están pecando» conserva la idea de acción presente sin resolverla de modo más interpretativo como «persisten en pecado».
- source_word: ἐνώπιον πάντων
  english_pob_choice: before everyone
  chosen_spanish: delante de todos
  alternatives_spanish:
  - en presencia de todos
  - públicamente
  - ante todos
  lexicon: BDAG
  rationale: La frase expresa publicidad y visibilidad ante la comunidad. «Delante de todos» preserva ese sentido de manera clara y natural en español, sin añadir más especificidad que la que el griego exige.
- source_word: ἔλεγχε
  english_pob_choice: rebuke
  chosen_spanish: reprende
  alternatives_spanish:
  - corrige
  - reprueba
  - exhorta con severidad
  lexicon: BDAG
  rationale: En este contexto disciplinario, el valor de ἐλέγχω se vierte mejor con «reprender», que comunica corrección firme y pública. «Reprobar» es posible, pero menos natural en español contemporáneo; «corregir» debilita la fuerza del mandato.
- source_word: οἱ λοιποὶ
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - el resto
  - los otros
  - los restantes
  lexicon: BDAG
  rationale: «Los demás» expresa en español la idea de los que quedan aparte de los culpables, con un tono natural y claro. Mantiene el valor inclusivo del grupo restante sin cargarlo de matices adicionales.
- source_word: φόβον ἔχωσιν
  english_pob_choice: may have fear
  chosen_spanish: tengan temor
  alternatives_spanish:
  - tengan miedo
  - tengan temor reverente
  - estén temerosos
  lexicon: BDAG
  rationale: La construcción griega literalmente dice «tengan temor». En español, «temor» conserva mejor la amplitud semántica entre miedo, respeto y advertencia seria que «miedo» o una paráfrasis devocional como «temor reverente».
theological_decisions:
- issue: ¿A quiénes se refiere el mandato disciplinario?
  english_pob_reading: The verse is translated broadly as referring to those who are sinning, without specifying in the main text whether this means elders only or offenders more generally.
  chosen_spanish_reading: 'El texto en español se mantiene general: «a los que están pecando», sin introducir «ancianos» en el cuerpo del versículo.'
  alternative_spanish_readings:
  - a los ancianos que están pecando
  - a los que pecan dentro de la iglesia
  rationale: El contexto inmediato trata de ancianos, pero el versículo mismo no repite ese sustantivo. Para preservar la tensión documentada por el POB inglés, la traducción española conserva la referencia amplia del griego y deja el alcance contextual para la nota o el pasaje mayor.
  doctrine_reference: Preservar la tensión contextual sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado auditado más reciente del POB inglés, que no requirió cambios en la revisión más reciente. Se conservaron las dos tensiones principales documentadas: el matiz aspectual del participio presente y el alcance contextual del mandato disciplinario.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «temor» para preservar la amplitud semántica de φόβος sin forzarla hacia «miedo» o «temor reverente».
  - «Los demás» reproduce el grupo remanente de οἱ λοιποί con naturalidad y sin sobreinterpretación.
  - La puntuación y el orden se ajustaron a una lectura española fluida sin perder la estructura imperativa-final del griego.
