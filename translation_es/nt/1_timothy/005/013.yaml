base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/013.yaml
  text: At the same time[a], they also learn to be idle, going around from house to house; and not only idle, but also gossips and busybodies[b], saying what they ought not to say.
  footnotes:
