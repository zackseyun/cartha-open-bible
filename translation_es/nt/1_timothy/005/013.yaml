translation:
  language: es
  text: Al mismo tiempo[a], también aprenden a ser ociosas, andando de casa en casa; y no solo ociosas, sino también chismosas y entrometidas[b], diciendo lo que no deben decir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Además»; el griego expresa simultaneidad o adición al argumento anterior.
    reason: lexical_alternative
  - marker: b
    text: O «habladoras» o «charlatanas» para «chismosas»; el término griego puede abarcar charla vana o indiscreta más ampliamente. O «metiches» para «entrometidas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅμα δὲ καὶ
  english_pob_choice: At the same time, they also
  chosen_spanish: Al mismo tiempo, también
  alternatives_spanish:
  - Además
  - Mientras tanto
  lexicon: BDAG
  rationale: El adverbio expresa simultaneidad o adición al cuadro anterior. «Al mismo tiempo» conserva bien esa relación y suena natural en español.
- source_word: ἀργαὶ
  english_pob_choice: idle
  chosen_spanish: ociosas
  alternatives_spanish:
  - holgazanas
  - inactivas
  lexicon: BDAG
  rationale: El término apunta a estar sin ocupación útil, no solo a una pereza moral general. «Ociosas» reproduce esa fuerza y permite repetir el adjetivo en ambos lugares del versículo.
- source_word: μανθάνουσιν
  english_pob_choice: learn to be
  chosen_spanish: aprenden a ser
  alternatives_spanish:
  - aprenden
  - adquieren el hábito de ser
  lexicon: BDAG
  rationale: El verbo no describe instrucción formal sino un patrón adquirido. En español conviene completar el sentido con «a ser» para conservar la idea de hábito.
- source_word: περιερχόμεναι τὰς οἰκίας
  english_pob_choice: going around from house to house
  chosen_spanish: andando de casa en casa
  alternatives_spanish:
  - yendo de casa en casa
  - vagando de casa en casa
  lexicon: BDAG
  rationale: La construcción indica desplazamiento repetido entre hogares. «De casa en casa» preserva el valor distributivo y el gerundio expresa bien la acción continua.
- source_word: φλύαροι
  english_pob_choice: gossips
  chosen_spanish: chismosas
  alternatives_spanish:
  - habladoras
  - charlatanas
  lexicon: BDAG
  rationale: El término puede implicar charla vana o indiscreta; en este contexto la referencia al habla sobre otros hace que «chismosas» sea la equivalencia más clara para lectores modernos.
- source_word: περίεργοι
  english_pob_choice: busybodies
  chosen_spanish: entrometidas
  alternatives_spanish:
  - metiches
  - inmiscuidas
  lexicon: BDAG
  rationale: La palabra designa a quien se mete indebidamente en asuntos ajenos. «Entrometidas» comunica ese matiz con naturalidad en español.
- source_word: λαλοῦσαι
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - hablando
  - comentando
  lexicon: BDAG
  rationale: Basta un verbo simple de habla, y «diciendo» enlaza de forma directa con la cláusula siguiente sin añadir matices no presentes en el griego.
- source_word: τὰ μὴ δέοντα
  english_pob_choice: what they ought not to say
  chosen_spanish: lo que no deben
  alternatives_spanish:
  - lo que no conviene
  - lo impropio
  lexicon: BDAG
  rationale: δέοντα se refiere a lo debido o conveniente. Dado que el participio anterior ya delimita la esfera del habla, en español se puede resumir como «lo que no deben» sin perder el sentido de impropiedad.
theological_decisions:
- issue: Referencia femenina del sujeto implícito
  english_pob_reading: they ... gossips and busybodies
  chosen_spanish_reading: ellas ... chismosas y entrometidas
  alternative_spanish_readings:
  - ellos ...
  - estas mujeres ...
  rationale: Las formas griegas son femeninas plurales y, por el contexto inmediato, se refieren a las viudas más jóvenes. El español mantiene esa referencia femenina sin forzar una neutralización artificial.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Tensión entre "chismosas" y el alcance más amplio de φλύαροι
  english_pob_reading: gossips
  chosen_spanish_reading: chismosas
  alternative_spanish_readings:
  - habladoras
  - charlatanas
  rationale: La nota inglesa reconoce que el término puede abarcar habla vana o indiscreta más ampliamente. «Chismosas» es la opción más idiomática aquí, pero se conserva la posibilidad semántica amplia en la nota.
  doctrine_reference: Lexical transparency and auditable alternatives
- issue: Impropiedad del habla en τὰ μὴ δέοντα
  english_pob_reading: what they ought not to say
  chosen_spanish_reading: lo que no deben
  alternative_spanish_readings:
  - lo que no conviene
  - lo que no es apropiado
  rationale: El griego no solo censura el contenido, sino su falta de conveniencia o corrección. La formulación española mantiene esa valoración moral sin expandirla más allá del texto.
  doctrine_reference: BDAG; context-driven rendering
translation_notes:
  revision_awareness: La versión española sigue de cerca el sentido del griego y el audit trail inglés sin traducir mecánicamente. Se conservó la repetición de ἀργαὶ con «ociosas» en ambos lugares, se mantuvo la referencia femenina del sujeto implícito por el contexto, y se eligieron equivalentes idiomáticos que no diluyen las tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se preserva la repetición de «ociosas» para ἀργαὶ en ambas apariciones.
  - «De casa en casa» reproduce el valor distributivo de περιερχόμεναι τὰς οἰκίας.
  - La cláusula final se mantiene breve para reflejar τὰ μὴ δέοντα sin añadir contenido interpretativo.
  - El sujeto implícito queda femenino por concordancia con los participios y adjetivos griegos, acorde con el contexto de las viudas más jóvenes.
