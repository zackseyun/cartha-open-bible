  text: εἰ δέ τις χήρα τέκνα ἢ ἔκγονα ἔχει, μανθανέτωσαν πρῶτον τὸν ἴδιον οἶκον εὐσεβεῖν καὶ ἀμοιβὰς ἀποδιδόναι τοῖς προγόνοις, τοῦτο γάρ ἐστιν ἀπόδεκτον ἐνώπιον τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/004.yaml
  text: But if any widow has children or grandchildren[a], let them first learn to show godliness to their own household and to repay their forebears[c][b], for this is acceptable before God.
  footnotes:
  - marker: a
    text: Or 'children or descendants.' The Greek ἔκγονα can be broader than 'grandchildren,' but here likely refers to the next generation within the family.
    reason: lexical_alternative
  - marker: b
    text: Or 'to practice piety toward their own household.' The Greek links family care with godliness.
    reason: lexical_alternative
  - marker: c
    text: Or 'their parents' or 'their ancestors.' The Greek literally means 'forebears.'
    reason: lexical_alternative
