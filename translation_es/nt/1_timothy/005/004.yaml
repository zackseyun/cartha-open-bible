  - severity: medium
    issue: «dar compensación» para ἀμοιβὰς ἀποδιδόναι
    rationale: La frase griega expresa retribuir o devolver en reciprocidad. «Dar compensación» es menos natural y menos preciso en este contexto de cuidado filial.
  - severity: medium
    issue: «antepasados» en el texto principal para τοῖς προγόνοις
    rationale: Aunque léxicamente posible, en español suele sonar a ancestros remotos y puede desviar del contexto de padres o generaciones previas inmediatas. «Sus mayores» mantiene amplitud y mejor encaje contextual.
