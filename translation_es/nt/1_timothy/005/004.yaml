translation:
  language: es
  text: Pero si alguna viuda tiene hijos o nietos[a], que ellos primero aprendan a mostrar piedad en su propio hogar[b] y a retribuir a sus mayores[c], porque esto es aceptable delante de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos o descendientes». El griego ἔκγονα puede ser más amplio que «nietos», pero aquí probablemente se refiere a la siguiente generación dentro de la familia.
    reason: lexical_alternative
  - marker: b
    text: O «practicar la piedad hacia su propio hogar». El griego vincula el cuidado familiar con la piedad.
    reason: lexical_alternative
  - marker: c
    text: O «a sus padres» o «a sus antecesores». El griego literalmente significa «a sus predecesores/antecesores», es decir, generaciones anteriores de la familia.
    reason: lexical_alternative
lexical_decisions:
- source_word: χήρα
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - mujer viuda
  lexicon: BDAG
  rationale: El contexto del párrafo trata de viudas; «viuda» es el equivalente natural y preciso en español.
- source_word: τέκνα ἢ ἔκγονα
  english_pob_choice: children or grandchildren
  chosen_spanish: hijos o nietos
  alternatives_spanish:
  - hijos o descendientes
  - hijos o nietos/descendientes
  lexicon: BDAG
  rationale: τέκνα es «hijos» y ἔκγονα puede abarcar descendientes; en este contexto familiar inmediato, «nietos» transmite bien la generación siguiente sin perder la posibilidad de una referencia más amplia.
- source_word: μανθανέτωσαν
  english_pob_choice: let them first learn
  chosen_spanish: que ellos primero aprendan
  alternatives_spanish:
  - aprendan primero
  - que primero aprendan
  lexicon: BDAG
  rationale: El imperativo plural tercero se conserva con una exhortación natural en español mediante «que ellos primero aprendan».
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes que nada
  - en primer lugar
  lexicon: BDAG
  rationale: Marca prioridad; «primero» expresa de forma simple y fiel esa prioridad.
- source_word: τὸν ἴδιον οἶκον
  english_pob_choice: their own household
  chosen_spanish: su propia casa
  alternatives_spanish:
  - su propia familia
  - su propio hogar
  lexicon: BDAG
  rationale: Aunque οἶκος puede significar casa/hogar/familia, aquí se entiende la unidad doméstica concreta; «su propia casa» mantiene la imagen y la referencia familiar. «Su propia familia» sería explicativo, pero menos cercano a la forma griega.
- source_word: εὐσεβεῖν
  english_pob_choice: to show godliness
  chosen_spanish: mostrar piedad
  alternatives_spanish:
  - practicar la piedad
  - ser piadosos
  lexicon: BDAG
  rationale: El verbo conserva la idea de conducta reverente ante Dios. «Mostrar piedad» suena natural en español y mantiene la dimensión religiosa sin volverlo solo un deber social.
- source_word: ἀμοιβὰς ἀποδιδόναι
  english_pob_choice: to repay
  chosen_spanish: dar compensación
  alternatives_spanish:
  - retribuir
  - pagar lo debido
  lexicon: BDAG
  rationale: La expresión transmite devolver en reciprocidad lo recibido; «dar compensación» mantiene el sentido de retribución sin reducirlo a un pago económico estrictamente literal.
- source_word: τοῖς προγόνοις
  english_pob_choice: their forebears
  chosen_spanish: a sus antepasados
  alternatives_spanish:
  - a sus progenitores
  - a sus mayores
  lexicon: BDAG
  rationale: πρόγονοι significa literalmente antepasados/antecesores. En español, «antepasados» conserva la amplitud del término y evita sobreespecificar padre/madre cuando el griego es más amplio.
- source_word: ἀπόδεκτον
  english_pob_choice: acceptable
  chosen_spanish: agradable
  alternatives_spanish:
  - aceptable
  - bien visto
  lexicon: BDAG
  rationale: En la fórmula «delante de Dios», «agradable» expresa bien la idea de algo recibido favorablemente por Dios; «aceptable» sería más literal, pero menos natural en español en esta construcción.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en la presencia de Dios
  lexicon: BDAG
  rationale: La expresión idiomática señala la evaluación divina; «delante de Dios» es claro, sobrio y fiel al valor relacional/judicial de la frase.
theological_decisions:
- issue: A quién se dirige el plural μανθανέτωσαν
  english_pob_reading: The command is directed to the widow's children or grandchildren, not to widows in general.
  chosen_spanish_reading: El mandato se dirige a los hijos o nietos de la viuda, no a las viudas en general.
  alternative_spanish_readings:
  - El mandato se dirige a la viuda misma con un cambio implícito de sujeto.
  - El mandato podría entenderse de manera más general para la familia.
  rationale: El referente plural más cercano es τέκνα ἢ ἔκγονα. La traducción con «que ellos» mantiene ese sujeto familiar y evita desplazar el mandato a la viuda, lo que oscurecería la lógica del versículo.
  doctrine_reference: 1 Timoteo 5:4; lectura sintáctica del imperativo plural
- issue: Relación entre piedad y cuidado familiar en εὐσεβεῖν
  english_pob_reading: Family support is presented as an expression of godliness, not merely social duty.
  chosen_spanish_reading: El cuidado familiar se presenta como expresión de piedad, no solo como deber social.
  alternative_spanish_readings:
  - εὐσεβεῖν significa solo cumplir una obligación familiar.
  - La frase enfatiza únicamente la responsabilidad ética, sin matiz religioso.
  rationale: El verbo εὐσεβεῖν conserva un matiz explícitamente religioso. Por eso se traduce con una palabra de piedad que preserve la dimensión hacia Dios y no reduzca el texto a etiqueta moral.
  doctrine_reference: 1 Timoteo 5:4; piedad práctica delante de Dios
translation_notes:
  revision_awareness: La propuesta sigue de cerca el consenso del auditorio inglés sin cambios sustanciales respecto al último pase; se conservan las tensiones léxicas principales (ἔκγονα, εὐσεβεῖν, πρόγονοι) y se expresan en español con equivalentes naturales y auditables.
  spanish_consistency_notes:
  - Se usó «Yahvé» según la terminología base del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió «piedad» para εὐσεβεῖν a fin de conservar el matiz religioso que el inglés POB marcó con «godliness».
  - Se eligió «antepasados» para πρόγονοι por ser más amplio y fiel que «padres», aunque se conserva la alternativa en nota.
  - «Delante de Dios» mantiene la fórmula reverente y la orientación evaluativa de ἐνώπιον τοῦ θεοῦ.
