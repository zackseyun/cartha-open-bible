translation:
  language: es
  text: Porque algunos ya se han desviado[a] tras Satanás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “se han apartado”, “se han descarriado”; literalmente, “han ido detrás/tras Satanás”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya para este momento
  - ya en este tiempo
  lexicon: BDAG
  rationale: ‘Ya’ comunica la fuerza temporal de ἤδη en un español natural y breve, con el mismo valor de que la desviación es una realidad presente.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón de la advertencia anterior; ‘Porque’ mantiene la conexión explicativa de forma clara y digna en español.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - unos cuantos
  lexicon: BDAG
  rationale: El indefinido plural expresa un subconjunto no especificado; ‘algunos’ es natural y no añade precisión que el griego no da.
- source_word: ἐξετράπησαν
  english_pob_choice: have ... turned aside
  chosen_spanish: se han desviado
  alternatives_spanish:
  - se han apartado
  - han torcido el camino
  - se han descarriado
  lexicon: BDAG
  rationale: El verbo comunica apartarse de la vía recta. ‘Desviarse’ conserva la metáfora de apartamiento sin sugerir de antemano una causa externa más fuerte que la que el texto da.
- source_word: ὀπίσω
  english_pob_choice: after
  chosen_spanish: tras
  alternatives_spanish:
  - después de
  - detrás de
  lexicon: BDAG
  rationale: En este giro con un objeto personal, la preposición expresa seguimiento. ‘Tras’ conserva la imagen espacial/metafórica de ir detrás de alguien mejor que una simple paráfrasis interpretativa.
- source_word: Σατανᾶ
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - el Adversario
  lexicon: BDAG
  rationale: Se conserva la transliteración habitual en español para el nombre/título personal del NT. ‘Satanás’ es reconocible y no diluye la referencia concreta.
theological_decisions:
- issue: 'Cómo reflejar ὀπίσω τοῦ Σατανᾶ: si conviene ‘seguir a Satanás’, ‘tras Satanás’ o una versión más literal.'
  english_pob_reading: after Satan
  chosen_spanish_reading: tras Satanás
  alternative_spanish_readings:
  - seguir a Satanás
  - detrás de Satanás
  rationale: ‘Tras Satanás’ mantiene la dirección relacional del griego y la imagen de ir detrás de él, sin convertir la frase en una paráfrasis de discipulado que el texto no explicita con esas palabras. A la vez, es comprensible para el lector español.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the metaphorical directionality and the warning''s force.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés al preferir una forma más cercana a ὀπίσω τοῦ Σατανᾶ (‘after/behind Satan’) en vez de una paráfrasis interpretativa como ‘seguir a Satanás’. En español, ‘tras Satanás’ retiene esa cercanía literal con buena legibilidad.
  spanish_consistency_notes:
  - Se usa ‘ya’ para ἤδη, manteniendo el matiz de una acción ya ocurrida.
  - ‘Porque’ traduce la función explicativa de γάρ al inicio del enunciado.
  - ‘Satanás’ conserva la transliteración estándar y evita sustituciones doctrinales no motivadas por la fuente.
  - La nota al pie recoge alternativas léxicas reales sin borrar la imagen de ir ‘tras’/‘detrás de’ Satanás.
