translation:
  language: es
  text: No reprendas a un hombre mayor[a], sino apélale como a un padre, y a los hombres más jóvenes como a hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "No reprendas severamente a un anciano"; el término griego puede significar "hombre mayor" o "anciano/presbítero", pero el contraste por edad en este contexto favorece "hombre mayor".'
    reason: alternative_reading
lexical_decisions:
- source_word: Πρεσβυτέρῳ
  english_pob_choice: an older man
  chosen_spanish: un hombre mayor
  alternatives_spanish:
  - un anciano
  - un presbítero
  - un mayor
  lexicon: BDAG
  rationale: El griego usa πρεσβύτερος de manera sustantivada y, en este contexto, el paralelismo con νεωτέρους ('los más jóvenes') favorece una referencia por edad, no por oficio eclesial. En español, 'hombre mayor' conserva ese valor etario con naturalidad y evita importar 'presbítero' o 'anciano' como término técnico.
- source_word: μὴ ἐπιπλήξῃς
  english_pob_choice: Do not rebuke
  chosen_spanish: No reprendas
  alternatives_spanish:
  - No reprendas severamente
  - No censures
  - No lo reprendas duramente
  lexicon: BDAG
  rationale: ἐπιπλήσσω expresa reprensión o censura verbal. 'Reprendas' transmite bien la idea sin sobrecargar el texto con una intensidad que el griego no exige de manera explícita.
- source_word: ἀλλὰ παρακάλει
  english_pob_choice: but appeal to him
  chosen_spanish: sino exhórtalo
  alternatives_spanish:
  - sino aconséjalo
  - sino anímalo
  - sino implóralo
  lexicon: BDAG
  rationale: 'παρακαλέω tiene un rango amplio: exhortar, animar, urgir, apelar. En español, ''exhorta'' preserva el contraste con la reprensión y mantiene una relación respetuosa y pastoral. ''Exhórtalo'' funciona de forma natural y no introduce una suavidad excesiva.'
- source_word: ὡς πατέρα
  english_pob_choice: as a father
  chosen_spanish: como a un padre
  alternatives_spanish:
  - como un padre
  - igual que a un padre
  lexicon: BDAG
  rationale: ὡς introduce comparación. En español, 'como a un padre' suena natural en este contexto relacional y conserva el matiz de trato respetuoso.
- source_word: νεωτέρους
  english_pob_choice: younger men
  chosen_spanish: a los más jóvenes
  alternatives_spanish:
  - a los jóvenes
  - a los hombres más jóvenes
  - a los muchachos
  lexicon: BDAG
  rationale: El adjetivo sustantivado masculino plural contrasta con 'hombre mayor'. Dado que el siguiente versículo continúa con pares por sexo y edad, 'los más jóvenes' comunica claramente el contraste etario sin forzar una expresión demasiado marcada por género donde el español puede sonar pesado. La base masculina sigue implícita por el contraste del pasaje.
- source_word: ὡς ἀδελφούς
  english_pob_choice: as brothers
  chosen_spanish: como a hermanos
  alternatives_spanish:
  - como hermanos
  - como a los hermanos
  - como hermanos en la fe
  lexicon: BDAG
  rationale: ἀδελφούς conserva el valor fraterno masculino en la estructura del pasaje. 'Como a hermanos' es la forma más natural en español y mantiene la comparación familiar sin añadir 'en la fe', que no aparece en el texto.
theological_decisions:
- issue: Πρεσβυτέρῳ como referencia de edad o como oficio eclesial
  english_pob_reading: 'age-based: ''older man'''
  chosen_spanish_reading: 'referencia etaria: ''un hombre mayor'''
  alternative_spanish_readings:
  - un presbítero
  - un anciano (como cargo)
  rationale: 'La secuencia del verso contrasta edad y sexo: hombre mayor/padre, más jóvenes/hermanos, y en el versículo siguiente mujeres mayores/madres y mujeres jóvenes/hermanas. Esa simetría favorece una lectura por edad. Por eso se evita ''presbítero'' como término técnico, que no está exigido por el contexto.'
  doctrine_reference: Translation philosophy §§1, 4, 5
- issue: Si ἀδελφούς debe traducirse de forma inclusiva
  english_pob_reading: '''brothers'''
  chosen_spanish_reading: '''hermanos'''
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: El pasaje organiza exhortaciones diferenciadas por edad y sexo. En ese marco, el plural masculino se mantiene como 'hermanos' para respetar la precisión gramatical y la estructura del texto, sin introducir una neutralización no requerida por el griego.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La traducción sigue de cerca el hilo del original griego y coincide con el audit trail inglés en la lectura etaria de πρεσβυτέρῳ, en el valor relacional de παρακαλέω y en la conservación del plural masculino de νεωτέρους/ἀδελφούς. No se registran revisiones posteriores que cambien la decisión base.
  spanish_consistency_notes:
  - Se mantiene 'hombre mayor' para πρεσβυτέρῳ, en línea con la lectura etaria del contexto inmediato.
  - Se evita 'SEÑOR' o equivalentes porque el verso no contiene κύριος ni una referencia al nombre divino.
  - La secuencia de trato respetuoso se refleja con 'No reprendas... sino exhórtalo... como a un padre... como a hermanos'.
  - Se conserva el masculino plural donde el griego lo usa, sin neutralizar innecesariamente el pasaje.
