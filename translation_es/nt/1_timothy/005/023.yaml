translation:
  language: es
  text: Ya no bebas solo agua[a], sino toma un poco de vino por tu estómago y tus frecuentes enfermedades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Ya no seas un bebedor de agua». La idea es que Timoteo no siga bebiendo solamente agua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηκέτι
  english_pob_choice: No longer
  chosen_spanish: Ya no
  alternatives_spanish:
  - No más
  - No sigas
  lexicon: BDAG
  rationale: Marca cese de una práctica previa. 'Ya no' suena natural en español moderno y conserva el valor de interrupción continua.
- source_word: ὑδροπότει
  english_pob_choice: drink only water
  chosen_spanish: bebas solo agua
  alternatives_spanish:
  - bebas agua
  - sigas bebiendo agua
  lexicon: BDAG
  rationale: El griego sugiere beber agua como práctica exclusiva; en español conviene explicitar 'solo' para preservar la oposición con el vino sin volver opaca la instrucción.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  lexicon: BDAG
  rationale: En español, tras una negación previa, 'sino' reproduce mejor el giro adversativo y el contraste correctivo.
- source_word: οἴνῳ ὀλίγῳ
  english_pob_choice: a little wine
  chosen_spanish: un poco de vino
  alternatives_spanish:
  - algo de vino
  - una pequeña cantidad de vino
  lexicon: BDAG
  rationale: La dativa con χράομαι indica el medio o cosa usada. 'Un poco de vino' conserva la medida reducida y es idiomático en español.
- source_word: χρῶ
  english_pob_choice: use
  chosen_spanish: usa
  alternatives_spanish:
  - haz uso de
  - toma
  lexicon: BDAG
  rationale: '''Usar'' refleja el valor de χράομαι sin introducir una lectura más técnica o medicinal de la que el texto exige.'
- source_word: διὰ
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: BDAG
  rationale: Con acusativo, διά expresa causa. 'Por causa de' preserva claramente la relación causal y mantiene un tono formal.
- source_word: στόμαχον
  english_pob_choice: stomach
  chosen_spanish: estómago
  alternatives_spanish:
  - vientre
  - digestión
  lexicon: BDAG
  rationale: El término anatómico más directo en español es 'estómago'; evita una paráfrasis que debilite el referente corporal explícito.
- source_word: πυκνάς
  english_pob_choice: frequent
  chosen_spanish: frecuentes
  alternatives_spanish:
  - recurrentes
  - muy seguidas
  lexicon: BDAG
  rationale: El adjetivo denota repetición o frecuencia. 'Frecuentes' conserva la intensidad sin añadir más de lo que el griego dice.
- source_word: ἀσθενείας
  english_pob_choice: illnesses
  chosen_spanish: enfermedades
  alternatives_spanish:
  - debilidades
  - achaques
  lexicon: BDAG
  rationale: En este contexto médico, 'enfermedades' comunica mejor el sentido corporal que 'debilidades', aunque este último permanezca como posible trasfondo semántico.
theological_decisions:
- issue: Si ὑδροπότει debe hacerse exclusivo o simplemente referirse a beber agua
  english_pob_reading: No longer drink only water
  chosen_spanish_reading: Ya no bebas solo agua
  alternative_spanish_readings:
  - Ya no bebas agua
  - Deja de beber agua
  rationale: El contraste con 'usa un poco de vino' implica que el problema no es el agua en sí, sino beber solo agua. Explicitar 'solo' evita una mala lectura en español y sigue el sentido contextual del griego.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo renderizar οἶνος sin suavizar ni reinterpretar el término
  english_pob_reading: a little wine
  chosen_spanish_reading: un poco de vino
  alternative_spanish_readings:
  - vino medicinal
  - una bebida fermentada
  rationale: El texto dice explícitamente οἶνος. 'Vino' es la correspondencia directa; no conviene expandirlo a 'medicinal' ni generalizarlo por razones culturales o doctrinales.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se siguió el estado final de la auditoría inglesa (sin revisiones aplicadas y con alto acuerdo). La redacción española conserva la misma decisión interpretativa principal: explicitar la exclusividad de ''agua solamente'' y mantener ''vino'' como traducción directa de οἶνος, con moderación mediante ''un poco''.'
  spanish_consistency_notes:
  - Se prefirió 'sino' después de la negación para reflejar el contraste del griego con mayor naturalidad en español.
  - '''Estómago'' y ''enfermedades'' mantienen el registro médico sencillo del pasaje sin añadir color interpretativo.'
  - La nota al pie conserva la alternativa más literal, equivalente a la observación de la auditoría inglesa sobre 'water-drinker'.
