translation:
  language: es
  text: Por tanto, quiero que las viudas jóvenes se casen[b], tengan hijos, administren sus hogares y no den al adversario[a] ninguna ocasión para la calumnia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el adversario», posiblemente una referencia a Satanás.
    reason: alternative_reading
  - marker: b
    text: El griego dice simplemente «casarse»; como el contexto habla de viudas jóvenes, el nuevo matrimonio queda implícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: βούλομαι
  english_pob_choice: I want
  chosen_spanish: quiero
  alternatives_spanish:
  - deseo
  - quisiera
  lexicon: BDAG
  rationale: βούλομαι expresa voluntad o preferencia personal. «Quiero» conserva esa fuerza directa en español moderno y mantiene el tono resolutivo del original sin volverlo excesivamente formal.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca una inferencia lógica a partir del contexto inmediato. «Por tanto» preserva mejor ese vínculo argumentativo en español formal y readable.
- source_word: νεωτέρας
  english_pob_choice: younger widows
  chosen_spanish: las viudas jóvenes
  alternatives_spanish:
  - las mujeres jóvenes
  - las viudas más jóvenes
  lexicon: BDAG
  rationale: Aunque el adjetivo significa literalmente «más jóvenes», el contexto de 1 Timoteo 5 trata de viudas. En español conviene suplir el sustantivo implícito para no ampliar indebidamente el referente.
- source_word: γαμεῖν
  english_pob_choice: to marry
  chosen_spanish: se casen
  alternatives_spanish:
  - se casen de nuevo
  - contraigan matrimonio
  lexicon: BDAG
  rationale: El verbo griego significa simplemente «casarse». En este contexto de viudas, el sentido de nuevo matrimonio queda implícito, pero la forma básica «se casen» evita añadir un matiz que el verbo no expresa explícitamente.
- source_word: τεκνογονεῖν
  english_pob_choice: to bear children
  chosen_spanish: tengan hijos
  alternatives_spanish:
  - den a luz hijos
  - críen hijos
  lexicon: BDAG
  rationale: El verbo apunta a engendrar o traer hijos al mundo. «Tengan hijos» es la forma más natural en español para este contexto, aunque «den a luz hijos» sería más literal pero menos idiomática.
- source_word: οἰκοδεσποτεῖν
  english_pob_choice: to manage their households
  chosen_spanish: administren sus hogares
  alternatives_spanish:
  - dirijan su casa
  - gobiernen su hogar
  lexicon: BDAG
  rationale: El verbo denota administración u oversight doméstico. «Administren sus hogares» comunica esa responsabilidad activa sin cargar el texto con una idea de dominio más fuerte de la que exige el griego.
- source_word: μηδεμίαν ἀφορμὴν
  english_pob_choice: no opportunity
  chosen_spanish: ninguna ocasión
  alternatives_spanish:
  - ninguna oportunidad
  - ningún pretexto
  lexicon: BDAG
  rationale: La frase significa no dar ninguna base, apertura u ocasión. «Ninguna ocasión» refleja bien ese valor y suena natural con «dar» en español.
- source_word: διδόναι
  english_pob_choice: to give
  chosen_spanish: den
  alternatives_spanish:
  - proporcionen
  - ofrezcan
  lexicon: BDAG
  rationale: Es el verbo básico «dar», aquí coordinado con los infinitivos anteriores. El subjuntivo plural «den» encaja con la estructura exhortativa en español.
- source_word: τῷ ἀντικειμένῳ
  english_pob_choice: the opponent
  chosen_spanish: al adversario
  alternatives_spanish:
  - al oponente
  - al que se opone
  lexicon: BDAG
  rationale: El participio significa «el que se opone» o «el adversario». Aquí se conserva la ambigüedad del griego con un término que puede referirse a una persona hostil o, por lectura alternativa, a Satanás; el español «adversario» mantiene esa posibilidad sin resolverla en la línea principal.
- source_word: λοιδορίας χάριν
  english_pob_choice: for slander
  chosen_spanish: con reproche
  alternatives_spanish:
  - para calumnia
  - para hablar mal
  lexicon: BDAG
  rationale: La construcción expresa «por causa de» o «para» la injuria/reproche. «Con reproche» intenta recoger el sustantivo griego de manera breve y publica-readable; aunque «para calumnia» es posible, suena menos natural en español de registro bíblico. Se conserva el matiz de speech hostil mediante la expresión final «hablar con reproche».
theological_decisions:
- issue: Referente de τῷ ἀντικειμένῳ
  english_pob_reading: the opponent refers generically to a hostile person or party, not explicitly to Satan
  chosen_spanish_reading: al adversario de forma genérica, sin identificarlo explícitamente con Satanás
  alternative_spanish_readings:
  - al adversario entendido como Satanás
  - al oponente humano
  rationale: El participio griego no nombra a Satanás y el contexto inmediato trata de evitar reproche público. Para respetar la tensión documentada por el POB en inglés, la traducción principal conserva una referencia abierta con «adversario», y la nota ofrece la posibilidad satánica sin imponerla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y no requiere revisión textual adicional; se mantuvo la ambigüedad del referente de «adversario» y se evitó introducir «de nuevo» en el verbo de casarse, siguiendo la decisión lexical documentada.
  spanish_consistency_notes:
  - Se usó «Yahvé» como estándar proyectual cuando corresponda, aunque este versículo no contiene el nombre divino.
  - Se prefirió «casen» en lugar de «se remitan a un segundo matrimonio» para no exceder el valor léxico de γαμεῖν.
  - «Adversario» mantiene la apertura semántica del griego mejor que una identificación directa con Satanás en el texto principal.
  - «Hogares» evita una calca excesiva y funciona bien con el verbo «administrar» en español contemporáneo.
