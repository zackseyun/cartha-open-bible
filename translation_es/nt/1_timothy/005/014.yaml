    rationale: El contenido de la nota trata del verbo «casarse» y del matiz implícito de nuevo matrimonio; debe anclarse en «se casen», no en «hogares».
  - severity: medium
    issue: «No den al adversario ninguna ocasión de hablar con reproche» traduce de forma imprecisa λοιδορίας χάριν.
    rationale: λοιδορίας se refiere a injuria/slander/reviling, y la construcción completa expresa dar ocasión o base para tal habla hostil. «Hablar con reproche» suena forzado y menos exacto que «para la calumnia» o «para injuriar».
