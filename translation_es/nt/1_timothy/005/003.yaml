translation:
  language: es
  text: Honra a las viudas que verdaderamente son viudas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sostén a las viudas que verdaderamente son viudas»; en contexto, «honra» probablemente incluye cuidado material.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Χήρας
  english_pob_choice: widows
  chosen_spanish: viudas
  alternatives_spanish:
  - mujeres viudas
  lexicon: BDAG
  rationale: χήρα designa de manera directa a mujeres cuyo esposo ha muerto. 'Viudas' conserva esa referencia de forma natural y precisa en español.
- source_word: τίμα
  english_pob_choice: Honor
  chosen_spanish: Honra
  alternatives_spanish:
  - Haz honor a
  - Da honor a
  - Sostén
  lexicon: BDAG
  rationale: τιμάω expresa 'honrar, valorar, mostrar respeto'. 'Honra' mantiene el sentido amplio sin reducirlo a ayuda material; además funciona bien como imperativo breve en español.
- source_word: τὰς ὄντως χήρας
  english_pob_choice: who are truly widows
  chosen_spanish: que verdaderamente son viudas
  alternatives_spanish:
  - que son realmente viudas
  - viudas de verdad
  - las viudas verdaderas
  lexicon: BDAG
  rationale: ὄντως indica autenticidad o realidad. 'Verdaderamente' preserva esa cualidad y deja claro que la expresión distingue a las viudas genuinas dentro del contexto inmediato.
- source_word: ὄντως
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - realmente
  - de verdad
  - en verdad
  lexicon: BDAG
  rationale: '''Verdaderamente'' comunica bien el valor adverbial de autenticidad sin sonar demasiado coloquial. Mantiene la fuerza discriminante del adverbio griego.'
theological_decisions:
- issue: Alcance de τιμάω en el contexto eclesial
  english_pob_reading: Honor includes respect and likely material support, but the main text retains 'honor' rather than narrowing it to financial support alone.
  chosen_spanish_reading: Honra conserva el valor principal de respeto y estima, sin restringirlo a 'sostén' o 'apoyo' material en el texto principal.
  alternative_spanish_readings:
  - Sostén a las viudas que verdaderamente son viudas
  - Da apoyo a las viudas que verdaderamente son viudas
  rationale: El contexto de 1 Timoteo 5 trata de provisión concreta para viudas, pero el verbo griego es más amplio que una ayuda económica. Por fidelidad al rango semántico y para no estrechar indebidamente el mandato, el texto principal usa 'honra'; la alternativa material queda implícita sin imponerse en la traducción principal.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto griego y el contexto auditado coinciden en un imperativo breve con una calificación enfática. La versión española mantiene el paralelismo y la distinción de ὄντως sin añadir elementos ajenos. No se requirieron revisiones según el historial auditado.
  spanish_consistency_notes:
  - Se usa 'viudas' para χήρας, manteniendo el término bíblico natural en español.
  - Se evita 'SEÑOR' u otras sustituciones innecesarias porque el versículo no las requiere.
  - '''Honra'' conserva la amplitud semántica de τιμάω y deja abierta la implicación contextual de ayuda material.'
  - '''Verdaderamente'' representa ὄντως con tono formal y claro, adecuado para lectura eclesial.'
