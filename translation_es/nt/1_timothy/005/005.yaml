translation:
  language: es
  text: Ahora, la que es verdaderamente viuda y ha quedado sola[a], ha puesto su esperanza en Dios[b] y persevera en las súplicas[c] y en las oraciones[c] noche y día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'está sola' o 'ha sido dejada sola'; el participio griego enfatiza su estado de estar sin apoyo familiar.
    reason: lexical_alternative
  - marker: b
    text: O 'ha esperado en Dios'. El perfecto griego puede resaltar una esperanza ya establecida con efecto continuo.
    reason: lexical_alternative
  - marker: c
    text: Se conservan dos términos distintos para reflejar la diferencia entre súplicas específicas y oración en sentido general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄντως
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - realmente
  - de veras
  - en verdad
  lexicon: BDAG
  rationale: Mantiene el valor adverbial de autenticidad o genuinidad; en español, 'verdaderamente' suena natural y conserva la fuerza de criterio del contexto.
- source_word: χήρα
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - viuda
  lexicon: BDAG
  rationale: Término directo y preciso para una mujer cuyo esposo ha muerto.
- source_word: μεμονωμένη
  english_pob_choice: is left all alone
  chosen_spanish: ha quedado sola
  alternatives_spanish:
  - está sola
  - ha sido dejada sola
  - ha quedado completamente sola
  lexicon: BDAG
  rationale: El participio perfecto expresa un estado resultante; 'ha quedado sola' comunica bien la condición actual derivada de haber sido dejada sin apoyo familiar o social, sin añadir excesiva interpretación.
- source_word: ἤλπικεν ἐπὶ θεόν
  english_pob_choice: has set her hope on God
  chosen_spanish: ha puesto su esperanza en Dios
  alternatives_spanish:
  - ha esperado en Dios
  - ha depositado su esperanza en Dios
  lexicon: BDAG
  rationale: El perfecto indica una esperanza ya fijada con efecto continuo. 'Ha puesto su esperanza en Dios' es una equivalencia natural que conserva la orientación estable y el matiz de decisión previa.
- source_word: προσμένει
  english_pob_choice: continues
  chosen_spanish: persevera
  alternatives_spanish:
  - continúa
  - se mantiene firme
  - persiste
  lexicon: BDAG
  rationale: El verbo señala constancia sostenida; 'persevera' refleja mejor la idea de una práctica habitual y resistente que el simple 'continúa' en español, sin forzar el sentido.
- source_word: ταῖς δεήσεσιν
  english_pob_choice: petitions
  chosen_spanish: las súplicas
  alternatives_spanish:
  - las peticiones
  - las rogativas
  - las súplicas fervientes
  lexicon: BDAG
  rationale: Conserva la distinción entre una forma más específica de ruego y el término general siguiente. 'Súplicas' es bíblico y claro en español, y evita fusionarlo con 'oraciones'.
- source_word: ταῖς προσευχαῖς
  english_pob_choice: prayers
  chosen_spanish: las oraciones
  alternatives_spanish:
  - las oraciones
  - las plegarias
  lexicon: BDAG
  rationale: Término general para la oración; se mantiene la pareja semántica con 'súplicas' para reflejar la distinción griega.
- source_word: νυκτὸς καὶ ἡμέρας
  english_pob_choice: night and day
  chosen_spanish: noche y día
  alternatives_spanish:
  - de noche y de día
  - día y noche
  lexicon: BDAG
  rationale: Expresión idiomática de continuidad; 'noche y día' es natural en español y conserva el orden del griego.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  - Pues
  lexicon: BDAG
  rationale: Marca transición discursiva sin sobredeterminar oposición; 'Ahora' funciona bien en español para introducir la descripción contrastiva.
theological_decisions:
- issue: Definición de la 'viuda verdadera' en el contexto pastoral
  english_pob_reading: The verse describes a genuinely qualified widow in the church's care structure as one who is both bereft of support and marked by hope in God and persistent prayer.
  chosen_spanish_reading: 'El versículo describe a una viuda genuina en el marco del cuidado de la comunidad: alguien realmente sin apoyo y caracterizada por su esperanza en Dios y su perseverancia en la oración.'
  alternative_spanish_readings:
  - El versículo describe simplemente a viudas en general sin criterio de distinción.
  - El versículo solo enfatiza su estado civil, no su disposición espiritual.
  rationale: El adverbio ὄντως da una cualificación real, no meramente nominal, y el contexto inmediato de 1 Timoteo 5 distingue categorías de viudas. La traducción conserva esa fuerza contextual sin introducir categorías eclesiásticas ajenas al texto.
  doctrine_reference: 1 Timoteo 5:3-16; filosofía de traducción POB §§1, 3, 5
- issue: Distinción entre súplicas y oraciones
  english_pob_reading: The two terms 'petitions' and 'prayers' are both retained to reflect the Greek distinction between specific requests and prayer more generally.
  chosen_spanish_reading: Se conservan dos términos distintos, 'súplicas' y 'oraciones', para reflejar la diferencia griega entre ruego específico y oración en sentido más general.
  alternative_spanish_readings:
  - Unificar ambos términos como 'oraciones'.
  - Traducir ambos como 'peticiones'.
  rationale: El texto griego usa dos sustantivos relacionados pero no idénticos; mantener la distinción evita borrar una tensión léxica documentada por la POB inglesa.
  doctrine_reference: 'BDAG: δέησις; προσευχή; principios de precisión léxica POB'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión aplicada en el POB inglés que sustituyó 'the one who is' por 'she who is' para una referencia femenina más natural. En español, 'ella'/'viuda' ya expresa con claridad el sujeto femenino sin necesidad de perífrasis adicional. También se respetó la decisión revisada de mantener la distinción entre 'petitions' y 'prayers'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma general en el proyecto, pero aquí el griego ἐπὶ θεόν no alude al nombre divino sino a 'Dios', por lo que no corresponde aplicar 'Yahvé'.
  - Se evitó 'Cristo' porque el versículo no contiene Χριστός.
  - Se eligió 'súplicas' para δέησις y 'oraciones' para προσευχή, manteniendo la distinción léxica sin forzar arcaísmos.
  - '''Ha puesto su esperanza'' conserva el valor perfectivo de ἤλπικεν mejor que una forma simplemente presente.'
