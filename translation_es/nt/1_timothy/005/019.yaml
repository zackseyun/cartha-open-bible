translation:
  language: es
  text: No aceptes una acusación contra un anciano[a], a menos que sea sobre la base de dos o tres testigos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'contra un hombre mayor', si πρεσβυτέρου se toma en sentido de edad y no como el cargo eclesial de 'anciano'.
    reason: alternative_reading
  - marker: b
    text: Esta formulación refleja el principio legal del AT según el cual un asunto se establece por 'dos o tres testigos' (cf. Dt 19:15).
    reason: cross_reference
lexical_decisions:
- source_word: κατὰ πρεσβυτέρου
  english_pob_choice: against an elder
  chosen_spanish: contra un anciano
  alternatives_spanish:
  - contra un elder
  - contra un presbítero
  - contra un hombre mayor
  lexicon: BDAG
  rationale: πρεσβύτερος puede referirse a un hombre de edad avanzada o a un líder de iglesia. Siguiendo el criterio contextual del POB en las Pastorales, se mantiene el sentido de oficio con 'anciano', que en español bíblico puede designar al líder de iglesia sin imponer una formulación eclesiástica tradicional ajena al texto.
- source_word: κατηγορίαν
  english_pob_choice: an accusation
  chosen_spanish: una acusación
  alternatives_spanish:
  - un cargo
  - una denuncia
  - una acusación formal
  lexicon: BDAG
  rationale: El sustantivo apunta a una imputación o cargo con peso jurídico. 'Acusación' comunica bien el matiz forense sin volver la frase innecesariamente técnica.
- source_word: μὴ παραδέχου
  english_pob_choice: Do not accept
  chosen_spanish: No aceptes
  alternatives_spanish:
  - No recibas
  - No admitas
  lexicon: BDAG
  rationale: El imperativo prohíbe recibir o dar curso a la acusación. 'No aceptes' expresa de forma natural la idea procedimental de admitirla para consideración.
- source_word: ἐκτὸς εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino con base en
  alternatives_spanish:
  - excepto con
  - a menos que sea por
  lexicon: BDAG
  rationale: La frase introduce la excepción y, junto con la imagen legal del versículo, 'con base en' hace explícito el sentido probatorio de la construcción sin apartarse del valor del griego.
- source_word: ἐπὶ δύο ἢ τριῶν μαρτύρων
  english_pob_choice: on the basis of two or three witnesses
  chosen_spanish: con base en dos o tres testigos
  alternatives_spanish:
  - sobre la base de dos o tres testigos
  - por testimonio de dos o tres testigos
  - con el respaldo de dos o tres testigos
  lexicon: BDAG
  rationale: La preposición ἐπί con genitivo aquí tiene fuerza evidencial y judicial, eco de la legislación del AT. 'Con base en' preserva la fuerza legal y resulta claro en español contemporáneo.
theological_decisions:
- issue: Sentido de πρεσβυτέρου en el contexto eclesial
  english_pob_reading: elder as a church leader/officeholder
  chosen_spanish_reading: anciano como dirigente u офiciante de la iglesia
  alternative_spanish_readings:
  - hombre mayor
  - presbítero
  rationale: El contexto inmediato de 1 Timoteo 5 trata de la disciplina y el trato de los ancianos. Por eso se mantiene el sentido de cargo/función, no simplemente edad. 'Anciano' conserva la ambigüedad controlada que el original permite y evita sustituir la terminología del POB por una fórmula denominacional fija.
  doctrine_reference: Translation philosophy §1, §5
- issue: Principio legal de dos o tres testigos
  english_pob_reading: OT legal principle that a matter is established by two or three witnesses
  chosen_spanish_reading: principio legal veterotestamentario de confirmación por dos o tres testigos
  alternative_spanish_readings:
  - regla de dos o tres testigos
  - testimonio de dos o tres testigos
  rationale: La cláusula remite al patrón legal de Deuteronomio 19:15. Mantener una formulación explícitamente jurídica ayuda a preservar la alusión bíblica y la fuerza normativa del mandato.
  doctrine_reference: Deuteronomio 19:15
translation_notes:
  revision_awareness: Coincide con la última revisión auditada, que no introdujo cambios. La redacción española busca reflejar el sentido jurídico del griego y la lectura contextual de πρεσβυτέρου como oficio eclesial, manteniendo la alternativa de edad en nota.
  spanish_consistency_notes:
  - Se mantiene 'anciano' para πρεσβύτερος, coherente con el uso contextual del POB en las Pastorales.
  - '''No aceptes'' reproduce el mandato negativo de forma natural y evita un calco rígido.'
  - '''Con base en'' traduce la fuerza probatoria de ἐπὶ con valor legal.'
  - Se conserva la alusión veterotestamentaria en la nota para no perder la intertextualidad del versículo.
