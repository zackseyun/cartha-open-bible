  spanish_quality_summary: El español es claro y eclesialmente legible, pero la construcción 'sino con base en' suena menos natural y menos precisa que una excepción negativa plena. En español, 'No aceptes... sino...' puede sugerir contraste más que excepción condicional. 'A menos que sea sobre la base de...' o 'excepto sobre la base de...' expresa mejor ἐκτὸς εἰ μὴ.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Anciano' encaja con la decisión contextual para πρεσβύτερος. 'Acusación' y 'testigos' preservan bien el registro jurídico. No se requiere ajuste terminológico mayor.
  issues:
