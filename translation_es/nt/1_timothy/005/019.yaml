    rationale: El griego introduce una excepción ('excepto / a menos que'), no simplemente un contraste. En español, 'No aceptes... sino con base en...' resulta algo rígido y puede sonar sintácticamente incompleto. Una formulación con 'a menos que sea sobre la base de' o 'excepto sobre la base de' preserva mejor el sentido jurídico-procedimental.
  - severity: low
