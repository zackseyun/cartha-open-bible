revisions:
- from: Si alguna mujer creyente tiene viudas[a], que las mantenga, y que la iglesia no sea cargada, para que pueda mantener a las que de veras son viudas.
  to: Si alguna mujer creyente tiene viudas[a], que provea para ellas, y que la iglesia no sea sobrecargada, para que pueda proveer para las que verdaderamente son viudas.
  rationale: 'Se ajusta el español para reflejar mejor el sentido y la consistencia del griego y del rastro POB: ''provea para'' / ''pueda proveer para'' preserva el paralelismo de ἐπαρκέω en ambas cláusulas; ''no sea sobrecargada'' comunica de forma más idiomática el valor de βαρείσθω en contexto de obligación material; y ''verdaderamente'' mantiene un registro bíblico más digno que ''de veras'' para ὄντως.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:16:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: conserva el sujeto femenino singular de τις πιστὴ, mantiene ''viudas'', expresa la finalidad con ἵνα, y distingue a las viudas ''verdaderas''. También preserva correctamente la variante textual en nota. Sin embargo, dos elecciones debilitan la fidelidad y la naturalidad: ''no sea cargada'' suena poco idiomático para βαρείσθω, y la variación ''mantenga'' / ''pueda mantener'' rompe sin necesidad la consistencia léxica documentada para ἐπαρκέω.'
  spanish_quality_summary: El español es mayormente claro y eclesialmente legible, pero puede mejorar en naturalidad. 'Que la iglesia no sea cargada' resulta torpe en español; 'no sea cargada con esa responsabilidad' o, mejor, 'no sea cargada' con complemento implícito aún suena rígido, mientras 'no sea agobiada' se aleja del matiz económico. La mejor solución breve y natural es 'no sea cargada' -> 'no sea cargada' no convence; 'no sea sobrecargada' sería natural pero algo intensivo. 'No sea gravada' tampoco funciona bien. Además, 'de veras' es comprensible, pero 'verdaderamente' o 'realmente' encaja mejor en un registro bíblico digno. El texto revisado busca mayor fluidez sin perder precisión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Iglesia', 'creyente' y 'viudas' están bien. La revisión mantiene el sujeto femenino específico y mejora la consistencia de ἐπαρκέω con 'provea para / proveer para', más cercano al rastro inglés documentado que la mezcla con 'mantener'.
  issues:
  - severity: medium
    issue: '''no sea cargada'' es poco idiomático para βαρείσθω'
    rationale: Aunque intenta reflejar el pasivo de 'ser cargada', en español suena forzado. El sentido es que la iglesia no quede bajo esa carga u obligación de sostén. Conviene una formulación más natural y clara.
  - severity: medium
    issue: 'Inconsistencia léxica en ἐπαρκέω: ''mantenga'' / ''pueda mantener'''
    rationale: El rastro inglés justificó usar la misma base léxica en ambas ocurrencias para preservar el vínculo semántico. En español, 'proveer para' permite esa consistencia sin sonar antinatural.
  - severity: low
    issue: '''de veras'' baja ligeramente el registro'
    rationale: Es natural, pero en una Biblia de registro moderno-digno 'verdaderamente' encaja mejor con ὄντως y con la clasificación técnica de las viudas realmente calificadas.
  revised_spanish_text: Si alguna mujer creyente tiene viudas[a], que provea para ellas, y que la iglesia no sea sobrecargada, para que pueda proveer para las que verdaderamente son viudas.
  revised_footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «si algún hombre o mujer creyente tiene viudas» o «si algún creyente tiene viudas», ampliando la instrucción más allá de un sujeto específicamente femenino.'
    reason: textual_variant
  revision_rationale: 'Se ajusta el español para reflejar mejor el sentido y la consistencia del griego y del rastro POB: ''provea para'' / ''pueda proveer para'' preserva el paralelismo de ἐπαρκέω en ambas cláusulas; ''no sea sobrecargada'' comunica de forma más idiomática el valor de βαρείσθω en contexto de obligación material; y ''verdaderamente'' mantiene un registro bíblico más digno que ''de veras'' para ὄντως.'
