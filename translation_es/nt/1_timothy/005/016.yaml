translation:
  language: es
  text: Si alguna mujer creyente tiene viudas[a], que provea para ellas, y que la iglesia no sea sobrecargada, para que pueda proveer para las que verdaderamente son viudas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «si algún hombre o mujer creyente tiene viudas» o «si algún creyente tiene viudas», ampliando la instrucción más allá de un sujeto específicamente femenino.'
    reason: textual_variant
lexical_decisions:
- source_word: τις πιστὴ
  english_pob_choice: any believing woman
  chosen_spanish: alguna mujer creyente
  alternatives_spanish:
  - alguna mujer fiel
  - alguna creyente
  lexicon: BDAG
  rationale: La forma griega en el texto base es femenina singular, así que el sujeto debe conservarse como femenino y no neutralizarse. 'Creyente' comunica identidad cristiana de manera natural en español y evita desplazar el matiz de πιστή hacia mera lealtad moral sin necesidad.
- source_word: χήρας
  english_pob_choice: widows
  chosen_spanish: viudas
  alternatives_spanish:
  - viudas necesitadas
  - mujeres viudas
  lexicon: BDAG
  rationale: Es el plural directo de χήρα. En este contexto el término se refiere a mujeres viudas que reciben sostén material, por lo que 'viudas' es suficiente y preciso.
- source_word: ἐπαρκείτω
  english_pob_choice: let her provide for
  chosen_spanish: que las mantenga
  alternatives_spanish:
  - que provea para ellas
  - que las sostenga
  lexicon: BDAG
  rationale: El verbo expresa suplir adecuadamente o dar apoyo suficiente. En español, 'mantener' transmite de forma natural el soporte material requerido por el contexto familiar y económico.
- source_word: βαρείσθω
  english_pob_choice: let ... not be burdened
  chosen_spanish: no sea cargada
  alternatives_spanish:
  - no sea gravada
  - no sea agobiada
  lexicon: BDAG
  rationale: La pasiva imperativa expresa que la iglesia no debe quedar con esa carga. 'No sea cargada' conserva el sentido de peso u obligación, aunque la forma sea menos literal que una calca rígida.
- source_word: ἡ ἐκκλησία
  english_pob_choice: the church
  chosen_spanish: la iglesia
  alternatives_spanish:
  - la congregación
  - la asamblea
  lexicon: BDAG
  rationale: En las Pastorales ἐκκλησία designa la comunidad cristiana local. 'Iglesia' es la equivalencia estándar y clara en español.
- source_word: ὄντως
  english_pob_choice: truly
  chosen_spanish: de veras
  alternatives_spanish:
  - verdaderamente
  - realmente
  lexicon: BDAG
  rationale: ὄντως distingue a las viudas genuinas de otras posibles reclamantes. 'De veras' es natural en español y mantiene el contraste sin sobreformalizar el estilo.
- source_word: ταῖς ὄντως χήραις
  english_pob_choice: those who are truly widows
  chosen_spanish: a las que de veras son viudas
  alternatives_spanish:
  - a las viudas de veras
  - a las verdaderamente viudas
  lexicon: BDAG
  rationale: La frase griega es idiomática y apunta a las viudas auténticas en el sentido definido por el contexto. La traducción conserva esa clasificación sin suavizarla ni reinterpretarla.
- source_word: ἐπαρκέσῃ
  english_pob_choice: it may provide for
  chosen_spanish: pueda mantener
  alternatives_spanish:
  - pueda proveer para
  - pueda sostener
  lexicon: BDAG
  rationale: Se mantiene la misma raíz conceptual que en ἐπαρκείτω, pero en español conviene variar la expresión para que el final suene fluido. El subjuntivo de finalidad 'pueda mantener' recoge el propósito práctico del pasaje.
theological_decisions:
- issue: Alcance del sujeto inicial según el texto griego base
  english_pob_reading: 'specific female subject: ''any believing woman'''
  chosen_spanish_reading: una mujer creyente en singular femenino
  alternative_spanish_readings:
  - cualquier creyente
  - algún creyente o creyente
  rationale: El texto SBLGNT presenta πιστὴ en femenino singular; por eso la traducción no borra el género del sujeto. La posible ampliación textual queda fuera del cuerpo principal para no importar una lectura no atestiguada en el texto base.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral); §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios. Este borrador conserva esa decisión y sigue el texto griego base SBLGNT con la misma lectura femenina singular, reflejando la variante manuscrita solo en nota.
  spanish_consistency_notes:
  - Se conserva 'iglesia' para ἡ ἐκκλησία, conforme al uso estándar de las Pastorales.
  - Se mantiene 'creyente' para πιστὴ, evitando sustituirlo por 'fiel' como traducción primaria.
  - Se usa 'mantener' en ambos verbos de ἐπαρκέω para preservar la unidad léxica, con variación estilística mínima solo por fluidez.
  - '''Viudas'' se mantiene en sentido literal y material, sin añadir explicaciones interpretativas al texto principal.'
