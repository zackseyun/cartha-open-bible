translation:
  language: es
  text: 'Porque la Escritura dice[a]: «No pondrás bozal al buey que trilla», y: «Digno es el obrero de su salario»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trillando grano». El participio griego se refiere a un buey ocupado en la trilla.
    reason: lexical_alternative
  - marker: b
    text: O «Digno es el obrero de su paga».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει γὰρ ἡ γραφή
  english_pob_choice: For the Scripture says
  chosen_spanish: Porque la Escritura dice
  alternatives_spanish:
  - Porque dice la Escritura
  - Pues la Escritura dice
  lexicon: BDAG
  rationale: γάρ expresa continuación explicativa; en español, «Porque» conserva esa relación. ἡ γραφή se traduce naturalmente como «la Escritura», no como una mera «escritura». λέγει, como presente de una cita estable, se vierte con «dice».
- source_word: Βοῦν
  english_pob_choice: an ox
  chosen_spanish: buey
  alternatives_spanish:
  - un buey
  - un toro
  lexicon: BDAG
  rationale: El acusativo singular βοῦν se refiere al animal de trabajo; «buey» es el equivalente natural y preciso en español bíblico y agrícola.
- source_word: ἀλοῶντα
  english_pob_choice: while it is threshing
  chosen_spanish: que trilla
  alternatives_spanish:
  - mientras trilla
  - mientras está trillando
  - que está trillando
  lexicon: BDAG
  rationale: El participio describe al buey en la acción de trillar. «Que trilla» mantiene la simultaneidad sin sobrecargar la frase, y suena natural en español.
- source_word: οὐ φιμώσεις
  english_pob_choice: You shall not muzzle
  chosen_spanish: No pondrás bozal
  alternatives_spanish:
  - No amordazarás
  - No le pondrás bozal
  lexicon: BDAG
  rationale: φιμόω significa poner bozal o silenciar por restricción física; en este contexto agrícola, «poner bozal» es la imagen directa y clara. Se mantiene el tono imperativo prohibitivo de la cita.
- source_word: Ἄξιος ὁ ἐργάτης
  english_pob_choice: The laborer is worthy
  chosen_spanish: Digno es el labrador
  alternatives_spanish:
  - Digno es el trabajador
  - El labrador es digno
  lexicon: BDAG
  rationale: ἐργάτης denota a quien trabaja o labora. «Labrador» conserva el registro formal y el sentido de trabajador manual/campo, alineado con la imagen de salario y labor. Se respeta la inversión retórica del griego con «Digno es».
- source_word: τοῦ μισθοῦ αὐτοῦ
  english_pob_choice: of his wages
  chosen_spanish: de su salario
  alternatives_spanish:
  - de su paga
  - de sus salarios
  lexicon: BDAG
  rationale: μισθός remite a compensación ganada. «Salario» comunica bien la idea de remuneración en español actual; «paga» es posible, pero menos solemne. Se conserva el singular posesivo «su» según el griego.
theological_decisions:
- issue: Alcance de ἡ γραφή en la introducción de la cita
  english_pob_reading: Render both quotations straightforwardly under 'the Scripture says' without narrowing the term's canonical implications in translation.
  chosen_spanish_reading: Presentar ambas citas bajo «la Escritura dice» sin añadir una distinción interpretativa en el texto.
  alternative_spanish_readings:
  - «dice la Escritura» con coma explicativa más fuerte
  - «dice la Escritura:» y luego solo la primera cita como Escritura
  rationale: El versículo introduce las dos declaraciones como una sola apelación escrituraria; la traducción debe reflejar eso sin resolver en el texto una cuestión canónica o de clasificación de la segunda cita.
  doctrine_reference: Preservar la tensión interpretativa sin sobreinterpretar.
- issue: Valor del singular masculino αὐτοῦ
  english_pob_reading: his wages
  chosen_spanish_reading: su salario
  alternative_spanish_readings:
  - su paga
  - sus salarios
  rationale: El griego es singular masculino; en español, «su» puede funcionar de modo genérico sin forzar pluralización. Se evita neutralizar innecesariamente la forma fuente.
  doctrine_reference: Precisión gramatical y fidelidad al número singular.
translation_notes:
  revision_awareness: La redacción sigue de cerca el acuerdo alto del contexto auditado. Se adoptó «labrador» por su mayor cercanía formal a ἐργάτης en español y se mantuvo el valor agrícola explícito de la primera cita con «buey que trilla».
  spanish_consistency_notes:
  - Se preservó el imperativo prohibitivo con futuro negativo equivalente mediante «No pondrás» para mantener el tono de cita bíblica.
  - Se eligió «salario» como equivalente de μισθός por su valor de remuneración debida, aunque «paga» permanece como alternativa válida.
  - Se mantuvo el orden natural español sin perder la paralelía de las dos citas.
  - No se sustituyó «Escritura» por una fórmula eclesiástica más tradicional que obscureciera la referencia textual.
