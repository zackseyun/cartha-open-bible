translation:
  language: es
  text: Y ordena estas cosas[a][b], para que sean irreprochables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instruye» o «da directrices»; el verbo lleva fuerza autoritativa.
    reason: lexical_alternative
  - marker: b
    text: El sujeto implícito de «sean irreprochables» no está expresado en el griego; en contexto, lo más probable es que se refiera a los mencionados en las instrucciones anteriores, especialmente las viudas y sus familias.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - Ahora
  lexicon: BDAG
  rationale: La simple coordinación reproduce mejor el enlace con las instrucciones anteriores sin añadir énfasis que no está explícito en el griego.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas instrucciones
  - esto
  lexicon: BDAG
  rationale: El demostrativo neutro plural remite de manera natural a las indicaciones precedentes. 'Estas cosas' es transparente y no sobreinterpreta el referente.
- source_word: παράγγελλε
  english_pob_choice: command
  chosen_spanish: encarga
  alternatives_spanish:
  - ordena
  - instruye
  - da mandato
  lexicon: BDAG
  rationale: El imperativo presente expresa una instrucción con autoridad. 'Encarga' conserva fuerza directiva en español sin sonar excesivamente rígido; 'ordena' sería más fuerte, pero menos natural en este contexto pastoral.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Introduce propósito. 'Para que' es la forma más natural en español y preserva el valor final sin añadir matices.
- source_word: ἀνεπίλημπτοι
  english_pob_choice: above reproach
  chosen_spanish: irreprochables
  alternatives_spanish:
  - sin reproche
  - blameless
  - inculpables
  lexicon: BDAG
  rationale: El adjetivo indica estar fuera de crítica o acusación legítima. 'Irreprochables' comunica bien esa idea en español moderno y evita la absolutización posible de 'sin culpa'.
theological_decisions:
- issue: Sujeto implícito de 'ἵνα ἀνεπίλημπτοι ὦσιν'
  english_pob_reading: The implied subject of 'they may be above reproach' is not explicitly stated in Greek; in context it most likely refers to those addressed in the preceding instructions, especially the widows and their families.
  chosen_spanish_reading: Se deja el sujeto implícito como 'sean' sin especificarlo en el texto principal.
  alternative_spanish_readings:
  - para que ellas sean irreprochables
  - para que ellos sean irreprochables
  - para que los/las mencionados(as) sean irreprochables
  rationale: El griego no repite el sujeto y la referencia contextual, aunque probable, no está expresada de forma explícita. La traducción mantiene esa ambigüedad al usar una construcción impersonal/ellíptica en español.
  doctrine_reference: Preservar la ambigüedad textual cuando el contexto no obliga a resolverla.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto fuente y con el audit trail inglés; no se requieren revisiones adicionales. Se conservó la orden imperativa y la finalidad, y se evitó resolver en exceso el sujeto implícito.
  spanish_consistency_notes:
  - Se mantiene 'irreprochables' para ἀνεπίλημπτοι, en línea con el valor ético de estar fuera de legítima crítica.
  - Se evita 'SEÑOR' y no hay terminología teológica de capitalización relevante en este versículo.
  - La forma 'encarga' busca ser natural en español a la vez que conserva la fuerza directiva de παραγγέλλε.
