translation:
  language: es
  text: 'reconocida por sus buenas obras: si ha criado hijos, si ha practicado la hospitalidad[a], si ha lavado los pies de los santos[b], si ha ayudado a los que están bajo aflicción, si ha seguido toda buena obra[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha acogido extraños». El verbo griego se refiere específicamente a recibir huéspedes o desconocidos en la propia casa.
    reason: lexical_alternative
  - marker: b
    text: «Los santos» aquí se refiere al pueblo santo de Dios, es decir, a otros creyentes.
    reason: lexical_alternative
  - marker: c
    text: O «ha seguido de cerca toda buena obra». El giro griego enfatiza seguimiento activo y compromiso, más que mera imitación pasiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἔργοις καλοῖς
  english_pob_choice: for good works
  chosen_spanish: por sus buenas obras
  alternatives_spanish:
  - en buenas obras
  - en obras buenas
  lexicon: BDAG
  rationale: En griego la frase indica el ámbito o base del testimonio. «Por sus buenas obras» comunica de manera natural esa reputación fundada en hechos observables, manteniendo la relación estrecha con el original sin sonar forzado en español.
- source_word: μαρτυρουμένη
  english_pob_choice: well attested
  chosen_spanish: reconocida
  alternatives_spanish:
  - dada por testimonio
  - bien atestiguada
  - tenida por buena
  lexicon: BDAG
  rationale: El participio pasivo expresa que otros dan testimonio de ella. «Reconocida» es una solución española natural para una reputación pública validada por testimonio; evita una construcción dura y conserva la idea de ser acreditada por su conducta.
- source_word: ἐτεκνοτρόφησεν
  english_pob_choice: has raised children
  chosen_spanish: ha criado hijos
  alternatives_spanish:
  - ha criado niños
  - ha educado hijos
  - ha levantado hijos
  lexicon: BDAG
  rationale: El verbo alude a criar o nutrir hijos. «Ha criado hijos» es claro y suficientemente amplio, sin especificar indebidamente si son biológicos o adoptivos, algo que el griego no precisa.
- source_word: ἐξενοδόχησεν
  english_pob_choice: has shown hospitality
  chosen_spanish: ha practicado la hospitalidad
  alternatives_spanish:
  - ha recibido huéspedes
  - ha acogido extranjeros
  - ha hospedado
  lexicon: BDAG
  rationale: El verbo se refiere a recibir huéspedes o extraños en la casa. «Ha practicado la hospitalidad» preserva la virtud indicada y es un equivalente español natural, más explícito que un simple «ha hospedado».
- source_word: ἁγίων
  english_pob_choice: the saints
  chosen_spanish: los santos
  alternatives_spanish:
  - los creyentes
  - las personas santas
  - los consagrados
  lexicon: BDAG
  rationale: En el uso paulino, el término designa a los creyentes como pueblo santo de Dios. «Los santos» conserva el valor léxico tradicional del término y la referencia comunitaria sin diluirla.
- source_word: πόδας ἔνιψεν
  english_pob_choice: has washed the feet
  chosen_spanish: ha lavado los pies
  alternatives_spanish:
  - ha lavado los pies de
  - ha lavado los pies a
  lexicon: BDAG
  rationale: Se mantiene el objeto explícito porque el gesto tiene fuerza cultural y simbólica. En español, «ha lavado los pies» comunica el acto concreto de servicio humilde de manera directa.
- source_word: θλιβομένοις
  english_pob_choice: those under affliction
  chosen_spanish: los que están bajo aflicción
  alternatives_spanish:
  - los afligidos
  - los atribulados
  - los que sufren
  lexicon: BDAG
  rationale: El participio describe a quienes están experimentando presión, angustia o aflicción. «Los que están bajo aflicción» conserva la pasividad y amplitud del griego sin restringirlo a persecución exclusivamente.
- source_word: ἐπήρκεσεν
  english_pob_choice: has helped
  chosen_spanish: ha ayudado
  alternatives_spanish:
  - ha socorrido
  - ha asistido
  - ha prestado apoyo
  lexicon: BDAG
  rationale: El verbo significa prestar ayuda o sostén. «Ha ayudado» es breve, natural y lo bastante amplio para abarcar ayuda práctica o apoyo personal.
- source_word: παντὶ ἔργῳ ἀγαθῷ
  english_pob_choice: every good work
  chosen_spanish: toda buena obra
  alternatives_spanish:
  - toda obra buena
  - cada buena obra
  lexicon: BDAG
  rationale: La frase distributiva se traduce de forma directa. «Toda buena obra» conserva la expresión paulina habitual y funciona bien en español moderno.
- source_word: ἐπηκολούθησεν
  english_pob_choice: has followed every good work
  chosen_spanish: ha seguido toda buena obra
  alternatives_spanish:
  - ha perseguido toda buena obra
  - ha procurado toda buena obra
  - ha ido detrás de toda buena obra
  lexicon: BDAG
  rationale: El verbo significa seguir de cerca o ir tras algo. «Ha seguido toda buena obra» refleja el sentido básico sin expandirlo interpretativamente; evita sustituirlo por una idea más teológica o devocional de «dedicarse».
theological_decisions:
- issue: Referente de «los santos» (ἁγίων)
  english_pob_reading: A reference to fellow believers, rendered literally as 'the saints.'
  chosen_spanish_reading: Referencia a los creyentes como el pueblo santo de Dios, mantenida literalmente como «los santos».
  alternative_spanish_readings:
  - los creyentes
  - el pueblo santo
  - los consagrados
  rationale: En el contexto paulino, el término suele designar a los cristianos como pueblo apartado para Dios. Se conserva la forma léxica tradicional «los santos» para no perder la carga comunitaria y doctrinal del término, dejando su sentido claro por el contexto.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
- issue: Valor de la secuencia de criterios introducida por εἰ
  english_pob_reading: A series of qualifying criteria introduced by 'if'.
  chosen_spanish_reading: Una serie de criterios que se expresan con «si» en español.
  alternative_spanish_readings:
  - si
  - cuando
  - en caso de que
  rationale: La estructura repetida funciona como lista de evidencias o condiciones evaluativas. «Si» conserva la forma condicional del texto griego y la continuidad retórica del pasaje.
  doctrine_reference: Translation philosophy §2 (source-structure transparency)
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al mantener «ha seguido toda buena obra» en vez de expandirlo a una idea interpretativa como «se ha dedicado a». También conserva el valor literal de «los santos» y de la secuencia condicional repetida, sin suavizar la fuerza de la enumeración.
  spanish_consistency_notes:
  - Se mantiene «los santos» para ἁγίων, en línea con la terminología POB y con el sentido paulino de creyentes como pueblo santo de Dios.
  - Se usa «aflicción» para θλιβομένοις por su amplitud semántica; no se limita a persecución.
  - «Ha practicado la hospitalidad» y «ha seguido toda buena obra» equilibran naturalidad española con cercanía al texto griego.
  - Las notas al pie señalan alternativas léxicas reales sin desplazar la lectura principal.
