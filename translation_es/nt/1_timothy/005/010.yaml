base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/010.yaml
  text: 'well attested for good works: if she has raised children[a], if she has shown hospitality, if she has washed the feet of the saints, if she has helped those under affliction[c][b], if she has followed every good work.'
  footnotes:
