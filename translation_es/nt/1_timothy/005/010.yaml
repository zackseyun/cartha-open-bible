    reason: lexical_alternative
  - marker: b
    text: '''The saints'' here refers to God''s holy people, that is, fellow believers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'has followed after every good work.' The Greek expression emphasizes active pursuit and commitment.
    reason: lexical_alternative
