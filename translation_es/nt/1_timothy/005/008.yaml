revisions:
- from: Pero si alguno no provee para los suyos[a], y especialmente para los de su casa[b], ha negado la fe y es peor que un incrédulo.
  to: Pero si alguno no provee a los suyos[a], y especialmente a los de su casa, ha negado la fe[b] y es peor que un incrédulo.
  rationale: Se ajusta «provee para» a «provee a» por naturalidad idiomática en español, manteniendo el sentido de sostener/cuidar materialmente. También se corrige el anclaje de la nota [b] para que corresponda a «ha negado la fe», conforme a la auditoría léxica inglesa y al griego ἤρνηται.
