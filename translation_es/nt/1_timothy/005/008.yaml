  - severity: high
    issue: La nota [b] está anclada al segmento equivocado
    rationale: Según la auditoría inglesa, la nota b corresponde a ἤρνηται («ha renunciado a la fe»), no a οἰκείων («los de su casa»). Mantenerla donde está distorsiona la trazabilidad del fundamento léxico.
