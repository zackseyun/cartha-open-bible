translation:
  language: es
  text: Pero si alguno no provee a los suyos[a], y especialmente a los de su casa, ha negado la fe[b] y es peor que un incrédulo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su propia gente». La expresión es más amplia que solo quienes viven bajo el mismo techo; aquí se mantiene el sentido amplio y la siguiente frase precisa el subconjunto especialmente obligado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ha renunciado a la fe».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguno
  alternatives_spanish:
  - cualquiera
  - alguien
  lexicon: BDAG
  rationale: El indefinido singular tiene fuerza genérica. «Alguno» conserva esa amplitud en español sin restringir el sujeto a varones ni volverlo demasiado abstracto.
- source_word: τῶν ἰδίων
  english_pob_choice: his own
  chosen_spanish: los suyos
  alternatives_spanish:
  - su propia gente
  - su familia
  - los propios
  lexicon: BDAG
  rationale: La frase es más amplia que el hogar inmediato. «Los suyos» mantiene esa amplitud relacional y deja que la segunda cláusula precise el grupo especialmente obligado.
- source_word: μάλιστα
  english_pob_choice: especially
  chosen_spanish: especialmente
  alternatives_spanish:
  - particularmente
  - sobre todo
  lexicon: BDAG
  rationale: Marca un subconjunto con énfasis especial. «Especialmente» es la equivalencia más natural y directa en español.
- source_word: οἰκείων
  english_pob_choice: members of his household
  chosen_spanish: los de su casa
  alternatives_spanish:
  - los miembros de su casa
  - su familia
  - los de su hogar
  lexicon: BDAG
  rationale: Designa a los pertenecientes al ámbito doméstico. «Los de su casa» es natural en español y conserva el sentido de pertenencia al hogar mejor que «familia», que podría ampliar o desplazar el foco.
- source_word: προνοεῖ
  english_pob_choice: provide for
  chosen_spanish: proveer para
  alternatives_spanish:
  - cuidar de
  - velar por
  - ocuparse de
  lexicon: BDAG
  rationale: El verbo apunta a previsión práctica y sostenimiento material. «Proveer para» expresa bien la obligación concreta sin perder el matiz de anticipación.
- source_word: τὴν πίστιν
  english_pob_choice: the faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fe cristiana
  - la fidelidad
  - la creencia
  lexicon: BDAG
  rationale: Aquí πίστις se refiere a la fe confesada como realidad cristiana, no solo a la confianza subjetiva. «La fe» preserva el valor técnico y coincide con el uso habitual en las Pastorales.
- source_word: ἤρνηται
  english_pob_choice: has denied
  chosen_spanish: ha negado
  alternatives_spanish:
  - ha renunciado a
  - ha repudiado
  - ha desechado
  lexicon: BDAG
  rationale: El perfecto expresa una negación ya realizada con efecto presente. «Ha negado» es directo y suficientemente fuerte en español para reflejar la gravedad moral del acto.
- source_word: ἀπίστου
  english_pob_choice: an unbeliever
  chosen_spanish: un incrédulo
  alternatives_spanish:
  - un no creyente
  - un infiel
  - un incrédulo
  lexicon: BDAG
  rationale: En este contraste, ἄπιστος designa a quien no cree. «Un incrédulo» es la opción más concisa y comprensible en español para señalar a alguien fuera de la fe.
- source_word: χείρων
  english_pob_choice: worse
  chosen_spanish: peor
  alternatives_spanish:
  - más culpable
  - inferior
  - más reprensible
  lexicon: BDAG
  rationale: El comparativo expresa inferioridad moral/espiritual. «Peor» reproduce la fuerza del contraste de manera natural y fuerte.
theological_decisions:
- issue: Construcción genérica con masculino gramatical
  english_pob_reading: Use 'anyone' for τις but retain masculine possessive 'his' as representative generic reference.
  chosen_spanish_reading: Usar «alguno... los suyos / los de su casa» como genérico no restringido a varones, manteniendo el vínculo posesivo y doméstico del griego.
  alternative_spanish_readings:
  - «cualquiera... sus propios / los de su casa»
  - «algún hombre... los suyos / los de su casa»
  rationale: El griego usa un singular masculino genérico. En español, «alguno» permite una referencia amplia y no sexista sin perder la individualidad del sujeto. «Los suyos» y «los de su casa» conservan el poseer/pertener del texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de πίστις en «τὴν πίστιν ἤρνηται»
  english_pob_reading: '''the faith'' as the Christian faith professed'
  chosen_spanish_reading: «la fe» como la fe cristiana confesada.
  alternative_spanish_readings:
  - «la confianza»
  - «la fidelidad»
  - «la fe» en sentido de creencia personal
  rationale: En las Pastorales, «la fe» suele nombrar el contenido confesado de la fe cristiana. La frase describe una repudiación práctica de esa confesión por la falta de cuidado hacia los suyos.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις'
translation_notes:
  revision_awareness: 'El pasaje concuerda plenamente con la revisión más reciente: no se registran cambios respecto del borrador auditado en inglés, y la decisión española sigue la misma lectura de conjunto sin introducir ajustes de sentido.'
  spanish_consistency_notes:
  - 'Se mantiene la secuencia lógica del griego: condición adversativa, negligencia, negación de la fe y comparación final.'
  - «Los suyos» se reserva para la amplitud de τῶν ἰδίων; «los de su casa» estrecha correctamente el enfoque de οἰκείων.
  - Se conserva «la fe» como término técnico, sin sustituirlo por una paráfrasis más débil.
  - El registro es sobrio y publicable, evitando calcos innecesarios pero sin suavizar la severidad del dicho.
