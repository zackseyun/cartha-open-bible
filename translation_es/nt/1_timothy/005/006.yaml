lexical_decisions:
- source_word: σπαταλῶσα
  english_pob_choice: lives for pleasure
  chosen_spanish: vive para el placer
  alternatives_spanish:
  - es autoindulgente
  - vive lujosamente
  - se entrega al placer
  lexicon: BDAG
  rationale: El participio describe un modo de vida orientado al placer y la autocomplacencia. «Vive para el placer» conserva la idea de un estilo de vida continuo y natural en español, sin reducirlo solo a lujo ni volverlo demasiado interpretativo.
- source_word: ζῶσα
  english_pob_choice: while she lives
  chosen_spanish: aunque vive
  alternatives_spanish:
  - mientras vive
  - siendo aún viva
  - mientras está viva
  lexicon: BDAG
  rationale: El participio es concesivo o temporal frente al perfecto siguiente. «Aunque vive» comunica bien el contraste paradójico entre vida física y muerte en sentido no físico, con buen flujo en español.
- source_word: τέθνηκεν
  english_pob_choice: is dead
  chosen_spanish: está muerta
  alternatives_spanish:
  - ha muerto
  - es muerta
  lexicon: BDAG
  rationale: El perfecto enfatiza un estado presente resultante de la muerte. En español, «está muerta» expresa con naturalidad ese estado actual y mantiene el matiz resultativo.
- source_word: ἡ ... σπαταλῶσα
  english_pob_choice: she who lives for pleasure
  chosen_spanish: la que vive para el placer
  alternatives_spanish:
  - la mujer que vive para el placer
  - la autocomplaciente
  lexicon: Greek grammar
  rationale: El artículo femenino singular con participio funciona sustantivamente. «La que...» conserva la referencia femenina y la fuerza gramatical sin añadir «mujer» de forma innecesaria.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: Greek grammar
  rationale: δὲ marca contraste con el versículo previo. «Pero» reproduce de manera directa esa oposición en español.
theological_decisions:
- issue: Naturaleza de 'muerta' en contexto
  english_pob_reading: metaphorically/spiritually dead while physically alive
  chosen_spanish_reading: muerta en sentido metafórico o espiritual mientras sigue físicamente viva
  alternative_spanish_readings:
  - socialmente muerta
  - moralmente muerta
  rationale: La tensión entre «aunque vive» y «está muerta» debe conservarse sin resolverla en una sola categoría técnica. La formulación española mantiene el paradoja y permite la lectura espiritual o moral sugerida por el contexto.
  doctrine_reference: Preservar la tensión teológica sin suavizarla
translation_notes:
  revision_awareness: La redacción coincide con el sentido y la puntuación del paquete de fuente inglesa auditado; no hubo revisiones aplicadas en el último pase, y la decisión de traducir τέθνηκεν como un estado presente se mantiene.
  spanish_consistency_notes:
  - Se mantiene «placer» como equivalente principal de σπαταλῶσα, con nota alternativa para preservar la opción léxica del audit trail.
  - «Aunque vive» conserva el contraste temporal/concesivo de ζῶσα sin introducir una glosa doctrinal externa.
  - No se emplea «SEÑOR» ni terminología eclesiástica no presente en el texto; el versículo no contiene referencias a YHWH, Cristo ni términos que requieran ajustes terminológicos especiales.
