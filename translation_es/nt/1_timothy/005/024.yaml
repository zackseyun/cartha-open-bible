  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Juicio» preserva correctamente la amplitud de κρίσις. «Pecados» y el resto del vocabulario están alineados. La nota a sobrecarga indebidamente la alternativa, porque el texto principal ya usa «evidentes»; la alternativa útil debe ofrecer otra posibilidad real como «obvios» o «manifiestos».
