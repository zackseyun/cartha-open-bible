translation:
  language: es
  text: Los pecados de algunos son evidentes[a], yendo delante de ellos al juicio[b]; pero los de otros siguen después.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los pecados de algunos son obvios, yendo delante de ellos al juicio»; también puede traducirse «manifiestos».'
    reason: lexical_alternative
  - marker: b
    text: «Juicio» puede referirse a una evaluación presente en el contexto, aunque la expresión también puede abarcar un sentido más amplio de juicio divino.
    reason: alternative_reading
lexical_decisions:
- source_word: Τινῶν ἀνθρώπων
  english_pob_choice: of some people
  chosen_spanish: de algunos
  alternatives_spanish:
  - de algunas personas
  - de algunos hombres
  lexicon: BDAG
  rationale: El genitivo griego modifica a «los pecados»; en español, «de algunos» conserva la referencia genérica sin cargar con un masculino marcado innecesario. «Algunas personas» aclara el valor genérico, pero «de algunos» sigue más de cerca la estructura del original. «De algunos hombres» sería más estrecho y menos natural en este contexto.
- source_word: αἱ ἁμαρτίαι
  english_pob_choice: the sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - pecados
  lexicon: BDAG
  rationale: El artículo griego se refleja naturalmente con «los pecados», manteniendo la referencia definida a los pecados pertenecientes a las personas mencionadas. «Pecados» solo perdería esa precisión.
- source_word: πρόδηλοί
  english_pob_choice: obvious
  chosen_spanish: evidentes
  alternatives_spanish:
  - obvios
  - manifiestos
  lexicon: BDAG
  rationale: «Evidentes» comunica bien la idea de algo claramente visible o patente y evita el posible matiz coloquial de «obvios». «Manifiestos» también es válido, pero suena más técnico o arcaizante.
- source_word: προάγουσαι
  english_pob_choice: going before them
  chosen_spanish: yendo delante de ellos
  alternatives_spanish:
  - precediéndolos
  - yendo antes de ellos
  lexicon: BDAG
  rationale: La participio femenino plural conserva la imagen personificada de los pecados que «van delante». «Yendo delante de ellos» es transparente y mantiene el movimiento hacia adelante. «Precediéndolos» sería más literal pero menos natural en español.
- source_word: εἰς κρίσιν
  english_pob_choice: to judgment
  chosen_spanish: para el juicio
  alternatives_spanish:
  - hacia el juicio
  - al juicio
  lexicon: BDAG
  rationale: «Para el juicio» expresa la dirección/resultante de εἰς sin fijar innecesariamente si se trata de evaluación presente o de juicio divino final. «Al juicio» también funciona, pero «para» mantiene mejor el valor direccional y funcional.
- source_word: τισὶν δὲ καὶ
  english_pob_choice: but those of others
  chosen_spanish: pero los de otros
  alternatives_spanish:
  - pero los de algunos también
  - pero en otros casos
  lexicon: BDAG
  rationale: La frase introduce contraste con el primer grupo. En español, «pero los de otros» deja implícito «pecados» como en el griego, ya que el referente sigue siendo claro por el contexto. «Pero en otros casos» suaviza demasiado la referencia y pierde el paralelismo.
- source_word: ἐπακολουθοῦσιν
  english_pob_choice: they follow after
  chosen_spanish: los siguen después
  alternatives_spanish:
  - siguen después
  - vienen después
  lexicon: BDAG
  rationale: La forma verbal retoma la imagen de seguimiento. «Los siguen después» hace explícito el objeto implícito y conserva la idea de que los pecados salen a la luz más tarde. «Siguen después» sería más breve, pero en español puede sonar incompleto sin objeto.
theological_decisions:
- issue: Alcance de κρίσις
  english_pob_reading: Rendered simply as 'judgment' without specifying human investigation or final divine judgment.
  chosen_spanish_reading: «el juicio» sin especificar si es evaluación presente o juicio divino final
  alternative_spanish_readings:
  - evaluación
  - juicio divino
  - sentencia
  rationale: El contexto inmediato puede apuntar a una evaluación actual de personas, pero la expresión también admite un sentido más amplio y escatológico. Mantener «el juicio» conserva esa tensión interpretativa en vez de resolverla prematuramente.
  doctrine_reference: Preservar la tensión interpretativa; no cerrar el alcance de κρίσις más allá del texto.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se actualizó la referencia genérica de ἀνθρώπων a un español inclusivo pero natural («de algunos» / «otros»), y se hizo explícito el objeto implícito de ἐπακολουθοῦσιν en la clausula final para evitar ambigüedad en español.'
  spanish_consistency_notes:
  - Se mantiene «pecados» como sustantivo definido para reflejar αἱ ἁμαρτίαι.
  - Se evita «SEÑOR» u otra terminología teológica ajena al versículo; no aparecen vocablos divinos aquí.
  - Se conserva el paralelismo entre las dos cláusulas con una estructura contrastiva clara.
  - «Juicio» se usa de manera general, conforme al audit trail, sin concretar indebidamente el referente.
