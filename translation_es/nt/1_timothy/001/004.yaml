translation:
  language: es
  text: ni prestar atención a mitos y genealogías interminables, que promueven especulaciones[a] más que la administración[b] que proviene de Dios y que es por fe[c]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘controversias’ o ‘investigaciones’. El término griego puede referirse a indagaciones o disputas, aquí con un sentido negativo de especulación improductiva.
    reason: lexical_alternative
  - marker: b
    text: O ‘mayordomía’, ‘administración proveniente de Dios’ o ‘el plan de Dios’. Οἰκονομία puede referirse a mayordomía, administración o un ordenamiento dispuesto por Dios.
    reason: lexical_alternative
  - marker: c
    text: O ‘en la fe’. Para ‘fe’, algunos entienden un matiz más cercano a ‘fidelidad’ o ‘confianza’.
    reason: alternative_reading
lexical_decisions:
- source_word: προσέχειν
  english_pob_choice: to pay attention to
  chosen_spanish: prestar atención a
  alternatives_spanish:
  - dedicarse a
  - ocuparse de
  lexicon: BDAG
  rationale: Expresa con naturalidad la idea de fijar la atención o volcarse hacia algo, conservando el valor de darle lugar a aquello que se prohíbe sin volverlo más fuerte de lo que el griego exige.
- source_word: μύθοις
  english_pob_choice: myths
  chosen_spanish: mitos
  alternatives_spanish:
  - fábulas
  - leyendas
  lexicon: BDAG
  rationale: ‘Mitos’ es el equivalente más directo y actual en español. Mantiene el tono negativo del pasaje sin introducir el matiz infantil o moralizante que puede traer ‘fábulas’.
- source_word: γενεαλογίαις ἀπεράντοις
  english_pob_choice: endless genealogies
  chosen_spanish: genealogías interminables
  alternatives_spanish:
  - genealogías sin fin
  - genealogías interminables
  lexicon: BDAG
  rationale: ‘Interminables’ comunica bien ἀπέραντος y conserva la fuerza despectiva de algo que no llega a ninguna parte. ‘Genealogías’ se mantiene literal y claro.
- source_word: ἐκζητήσεις
  english_pob_choice: speculations
  chosen_spanish: especulaciones
  alternatives_spanish:
  - controversias
  - investigaciones
  - cuestionamientos
  lexicon: BDAG
  rationale: En este contexto, la palabra apunta a búsquedas o discusiones improductivas. ‘Especulaciones’ recoge bien ese sentido negativo sin restringirlo solo a conflicto verbal.
- source_word: οἰκονομίαν θεοῦ
  english_pob_choice: the stewardship from God
  chosen_spanish: la administración de Dios
  alternatives_spanish:
  - la administración proveniente de Dios
  - la mayordomía de Dios
  - el plan de Dios
  lexicon: BDAG
  rationale: Dado el ajuste revisado del inglés POB hacia ‘the stewardship from God’, ‘administración’ ofrece en español una opción natural que conserva el valor de οἰκονομία como ordenamiento/gestión. El genitivo θεοῦ se entiende aquí como origen o procedencia, por eso se formula ‘de Dios’.
- source_word: πίστει
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fidelidad
  - la confianza
  lexicon: BDAG
  rationale: Se mantiene el valor por defecto de πίστις como ‘fe’. La frase ‘por medio de la fe’ hace claro en español el valor instrumental/sférico de ἐν sin perder la opción auditada de leer el término en un sentido más amplio.
theological_decisions:
- issue: Sentido de οἰκονομίαν θεοῦ
  english_pob_reading: the stewardship from God
  chosen_spanish_reading: la administración de Dios
  alternative_spanish_readings:
  - la administración proveniente de Dios
  - la mayordomía de Dios
  - el plan de Dios
  rationale: El griego admite un rango que incluye administración, arreglo u ordenamiento. ‘Administración de Dios’ preserva la concreción lexical sin forzar una lectura doctrinal más estrecha. La alternativa ‘mayordomía’ fue evitada porque en español suele sonar a función humana más que a disposición divina.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Valor de πίστει en τὴν ἐν πίστει
  english_pob_reading: that is by faith
  chosen_spanish_reading: la que es por medio de la fe
  alternative_spanish_readings:
  - la que es en la fe
  - la que opera por la fe
  - la que es por fe
  rationale: La formulación conserva la ambigüedad auditada entre esfera e instrumento sin ocultarla. ‘Por medio de la fe’ es idiomática y permite que el lector entienda la relación con fe sin imponer ‘fidelidad’ como lectura principal.
  doctrine_reference: 'Contested terms: πίστις'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que cambió de ‘God’s stewardship’ a ‘the stewardship from God’ para reflejar con más naturalidad οἰκονομίαν θεοῦ. En español se optó por ‘la administración de Dios’ para conservar esa relación de procedencia sin volverla posesiva de manera demasiado fuerte, y se mantuvo la nota de πίστις con una alternativa abierta.
  spanish_consistency_notes:
  - 'Se evitó traducir mecánicamente desde el inglés cuando el español podía expresar mejor el contraste: ‘promueven especulaciones’ conserva el efecto causal de παρέχουσι.'
  - Se mantuvo ‘fe’ para πίστις conforme al estándar del proyecto, dejando la ampliación semántica en nota.
  - ‘Administración’ se usa como equivalente funcional de οἰκονομία, en continuidad con el audit trail, sin introducir lenguaje eclesiástico no atestiguado por el griego.
