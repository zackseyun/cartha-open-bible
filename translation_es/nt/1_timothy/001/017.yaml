translation:
  language: es
  text: Ahora, al Rey de los siglos, inmortal, invisible, al único Dios[a], sean honor y gloria por los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos dicen: «al único Dios sabio».'
    reason: textual_variant
lexical_decisions:
- source_word: βασιλεῖ τῶν αἰώνων
  english_pob_choice: the King of the ages
  chosen_spanish: el Rey de los siglos
  alternatives_spanish:
  - el Rey eterno
  - el Rey de la eternidad
  - el Rey de los tiempos
  lexicon: BDAG
  rationale: Conserva de forma transparente la construcción genitiva con αἰών en vez de reducirla a una equivalencia más interpretativa como 'eterno'. 'Siglos' comunica el alcance temporal y la idea de soberanía sobre todas las eras, manteniendo la cercanía al griego y al auditoría inglesa.
- source_word: ἀφθάρτῳ
  english_pob_choice: immortal
  chosen_spanish: inmortal
  alternatives_spanish:
  - incorruptible
  - imperecedero
  lexicon: BDAG
  rationale: En este contexto doxológico aplicado a Dios, 'inmortal' es natural en español y expresa bien la ausencia de muerte o decadencia. 'Incorruptible' e 'imperecedero' son posibles, pero suenan menos directos aquí.
- source_word: ἀοράτῳ
  english_pob_choice: invisible
  chosen_spanish: invisible
  alternatives_spanish:
  - no visto
  - inobservable
  lexicon: BDAG
  rationale: Es el equivalente más claro y establecido para ἀόρατος en una lista de atributos divinos solemnes.
- source_word: μόνῳ θεῷ
  english_pob_choice: the only God
  chosen_spanish: al único Dios
  alternatives_spanish:
  - al solo Dios
  - al único y sabio Dios
  lexicon: BDAG
  rationale: La construcción adjetivo-sustantivo se refleja de modo natural con 'al único Dios'. Se evita añadir 'sabio' porque no está en el texto griego base; esa expansión pertenece a la variante textual documentada.
- source_word: τιμὴ καὶ δόξα
  english_pob_choice: honor and glory
  chosen_spanish: honra y gloria
  alternatives_spanish:
  - honor y gloria
  - alabanza y gloria
  lexicon: BDAG
  rationale: '''Honra'' funciona bien en español bíblico y litúrgico para τιμή, sin sonar tan técnico como ''honor'' en algunos contextos. ''Gloria'' corresponde de manera estable a δόξα. Se mantiene la doxología en registro elevado.'
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - por la eternidad
  - por los siglos eternos
  lexicon: BDAG
  rationale: En español, la fórmula tradicional 'por los siglos de los siglos' comunica con precisión la duración indefinida y conserva el paralelismo intensivo del griego, sin perder naturalidad litúrgica.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén.
  lexicon: BDAG
  rationale: Se retiene la transliteración habitual en español bíblico y de culto.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Pues
  lexicon: BDAG
  rationale: '''Ahora'' reproduce bien el giro discursivo hacia una respuesta doxológica, sin introducir una secuencia excesivamente rígida.'
theological_decisions:
- issue: Cómo reflejar el título divino sin diluir la referencia al único Dios y sin introducir una armonización trinitaria ajena al versículo
  english_pob_reading: the only God
  chosen_spanish_reading: al único Dios
  alternative_spanish_readings:
  - a Dios solo
  - al único y sabio Dios
  rationale: La redacción española sigue directamente el texto griego preservado por la edición base y mantiene la confesión monoteísta explícita. No se añade 'sabio' en el texto principal porque el griego base no lo contiene; la variante queda documentada aparte. Esto conserva la tensión textual sin resolverla artificialmente.
  doctrine_reference: Affirmations; Original-language primacy over translation tradition
- issue: Variación textual en 1 Timoteo 1:17 respecto de σοφῷ ('sabio')
  english_pob_reading: 'footnote variant: ''the only wise God'''
  chosen_spanish_reading: 'nota sobre la variante: ''el único Dios sabio'''
  alternative_spanish_readings:
  - el único sabio Dios
  - el solo Dios sabio
  rationale: La versión principal sigue SBLGNT, que no incluye σοφῷ. Sin embargo, la variante tradicional merece quedar registrada en nota para transparencia textual, en continuidad con el aparato inglés.
  doctrine_reference: Textual criticism; Preserve documented variants
- issue: Expresión doxológica final
  english_pob_reading: honor and glory forever and ever
  chosen_spanish_reading: honra y gloria por los siglos de los siglos
  alternative_spanish_readings:
  - honor y gloria para siempre y siempre
  - alabanza y gloria por los siglos de los siglos
  rationale: La fórmula española mantiene el valor laudatorio de la doxología y el matiz de duración interminable, con una cadencia natural para lectura pública.
  doctrine_reference: Doxology; liturgical clarity
translation_notes:
  revision_awareness: 'La propuesta sigue el texto griego SBLGNT y el auditoría inglesa sin cambios sustantivos: se conserva la genitiva ''de los siglos'', se refleja μόνῳ θεῷ como ''al único Dios'', y la variante con ''sabio'' queda solo en nota textual.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino; aquí no aplica porque el versículo habla de 'Dios'.
  - Se mantiene 'Amén' como transliteración estable y reconocible en español.
  - La combinación 'honra y gloria' conserva el registro doxológico sin forzar un calco inglés de 'honor'.
