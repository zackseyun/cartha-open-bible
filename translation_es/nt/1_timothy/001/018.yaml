translation:
  language: es
  text: Este encargo te lo confío[a], querido Timoteo, conforme a las profecías que se hicieron antes sobre ti, para que por ellas pelees la buena batalla[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acerca de ti»; quizá «sobre ti», en el sentido de profecías pronunciadas sobre Timoteo.
    reason: lexical_alternative
  - marker: b
    text: O «en ellas» o «mediante ellas»; el griego puede expresar medio o esfera.
    reason: lexical_alternative
  - marker: c
    text: 'Traducción tradicional: «pelea la buena batalla». El griego dice más literalmente «libres la buena guerra» o conserva la imagen de una campaña militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγγελίαν
  english_pob_choice: charge
  chosen_spanish: encargo
  alternatives_spanish:
  - mandato
  - encargo solemne
  - instrucción
  lexicon: BDAG
  rationale: παραγγελία denota una directiva o instrucción con autoridad. En español, «encargo» comunica bien la idea de algo confiado con responsabilidad, sin volverlo demasiado duro como «mandato» ni demasiado débil como «instrucción».
- source_word: παρατίθεμαί
  english_pob_choice: entrust
  chosen_spanish: te lo confío
  alternatives_spanish:
  - te lo encomiendo
  - te lo entrego en confianza
  - te lo deposito
  lexicon: BDAG
  rationale: El medio de παρατίθημι expresa poner algo en manos de otro para su cuidado. «Te lo confío» refleja esa entrega personal y fiduciaria de manera natural en español.
- source_word: τέκνον
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo mío
  - niño
  - querido hijo
  lexicon: BDAG
  rationale: Aunque τέκνον es literalmente «hijo/descendiente/niño» y funciona aquí como apelativo afectuoso, en español «hijo» suena más natural en este contexto pastoral que «niño». Mantiene la relación íntima sin añadir más afecto del que el texto exige.
- source_word: κατὰ
  english_pob_choice: in accordance with
  chosen_spanish: conforme a
  alternatives_spanish:
  - de acuerdo con
  - en consonancia con
  - según
  lexicon: BDAG
  rationale: κατά con acusativo expresa conformidad o correspondencia. «Conforme a» es una equivalencia idiomática clara y fiel en español.
- source_word: προαγούσας
  english_pob_choice: previously made
  chosen_spanish: que se hicieron antes
  alternatives_spanish:
  - previamente dadas
  - anteriormente pronunciadas
  - que habían sido dichas antes
  lexicon: BDAG
  rationale: El participio literalmente habla de lo que «va delante». En contexto se refiere a profecías ya pronunciadas sobre Timoteo; «que se hicieron antes» conserva la referencia temporal sin sonar forzado.
- source_word: ἐπὶ σὲ
  english_pob_choice: about you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - acerca de ti
  - en relación contigo
  - sobre tu persona
  lexicon: BDAG
  rationale: Con προφητείας, ἐπί + acusativo puede indicar referencia hacia una persona. «Sobre ti» sigue de cerca la estructura y mantiene abierta la posible idea de profecías pronunciadas sobre Timoteo.
- source_word: προφητείας
  english_pob_choice: prophecies
  chosen_spanish: profecías
  alternatives_spanish:
  - mensajes proféticos
  - oráculos
  - palabras proféticas
  lexicon: BDAG
  rationale: El plural refiere de manera directa a mensajes proféticos. «Profecías» es la opción más transparente y estándar en español.
- source_word: στρατεύῃ
  english_pob_choice: you may wage
  chosen_spanish: hagas la buena milicia
  alternatives_spanish:
  - pelees la buena batalla
  - combatas la buena guerra
  - sirvas en la buena campaña
  lexicon: BDAG
  rationale: στρατεύομαι conserva la metáfora militar. En español, «hacer la buena milicia» puede sonar menos natural que el griego, pero preserva el sustantivo cognado con στρατεία y evita reducirlo a «batalla», que estrecha la imagen a un solo combate.
- source_word: ἐν αὐταῖς
  english_pob_choice: by them
  chosen_spanish: por ellas
  alternatives_spanish:
  - en ellas
  - mediante ellas
  - con ellas
  lexicon: BDAG
  rationale: ἐν puede expresar medio o esfera. «Por ellas» funciona bien en español como valor instrumental y mantiene la referencia a las profecías como medio de la acción de Timoteo.
- source_word: τὴν καλὴν στρατείαν
  english_pob_choice: the good warfare
  chosen_spanish: la buena milicia
  alternatives_spanish:
  - la buena guerra
  - el buen combate
  - la noble campaña
  lexicon: BDAG
  rationale: La frase griega usa στρατεία, término de campaña o servicio militar, no sólo de pelea. «Milicia» conserva el campo semántico militar de modo más amplio que «combate» y más naturalmente cognado con στρατεύῃ.
theological_decisions:
- issue: Relación entre las profecías y el encargo de Pablo
  english_pob_reading: The verse refers to prior prophecies concerning Timothy that ground or guide Paul's present charge, without specifying a sacramental or ordination theory beyond the text.
  chosen_spanish_reading: El versículo presenta profecías anteriores sobre Timoteo como el marco del encargo de Pablo y como medio para su «buena milicia», sin definir una teoría sacramental u ordenatoria que el texto no explicita.
  alternative_spanish_readings:
  - Las profecías lo ordenaron formalmente para el ministerio
  - Las profecías sólo lo animaban en privado
  rationale: El griego establece una relación real entre las profecías y el mandato de Pablo, pero no precisa una doctrina eclesial más amplia. La redacción española conserva esa tensión sin resolverla en una interpretación adicional.
  doctrine_reference: Preservar la tensión teológica en vez de cerrarla.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios adicionales. Se mantiene la solución óptima-equivalente del audit trail inglés, pero adaptada al español con el sustantivo militar «milicia» para preservar στρατεία y una formulación natural para ἐν αὐταῖς como «por ellas».'
  spanish_consistency_notes:
  - Se usó «Yahvé» sólo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - «Mesías/Cristo» no está en este versículo.
  - Se mantuvo la metáfora militar de στρατεύῃ / στρατείαν sin reducirla a un simple «combate».
  - «Profecías» se conservó en plural para reflejar el griego y la relación con el encargo.
  - La puntuación sigue el orden retórico del griego y del audit trail inglés.
