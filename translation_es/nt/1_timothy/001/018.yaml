    reason: lexical_alternative
  revision_rationale: Se revisa para evitar el español poco natural «hagas la buena milicia» y para no mantener sin más un «hijo» que estrecha τέκνον. «Querido Timoteo» introduce el tono afectuoso sin crear una relación biológica explícita, aunque reconoce una ligera explicitación afectiva para lograr español natural. «Pelees la buena batalla» mejora mucho la legibilidad; la nota [c] preserva la razón auditada de que el griego es más literalmente militar/campañal que la formulación tradicional.
