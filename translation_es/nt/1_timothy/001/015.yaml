translation:
  language: es
  text: 'Fiel es la palabra y digna de plena aceptación: que Mesías Jesús[a] vino al mundo para salvar a los pecadores, de los cuales yo soy el primero.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Cristo Jesús».
    reason: alternative_reading
lexical_decisions:
- source_word: πιστὸς ὁ λόγος
  english_pob_choice: The saying is trustworthy
  chosen_spanish: Fiel es la palabra
  alternatives_spanish:
  - Esta palabra es fiel
  - Fiel es este dicho
  lexicon: BDAG
  rationale: En la fórmula pastoral, λόγος funciona como una expresión sentenciosa o dicho reconocido; en español, «la palabra» conserva ese valor formular. «Fiel» comunica πιστός con naturalidad y mantiene el carácter de confiabilidad del enunciado.
- source_word: πάσης ἀποδοχῆς ἄξιος
  english_pob_choice: worthy of full acceptance
  chosen_spanish: digna de plena aceptación
  alternatives_spanish:
  - digna de toda aceptación
  - merecedora de aceptación plena
  lexicon: BDAG
  rationale: ἀποδοχή expresa aceptación o recepción; πάσης intensifica la idea. «Plena aceptación» transmite bien la amplitud sin volver la frase pesada o artificial en español.
- source_word: Χριστὸς Ἰησοῦς
  english_pob_choice: Messiah Jesus
  chosen_spanish: Cristo Jesús
  alternatives_spanish:
  - Mesías Jesús
  lexicon: BDAG
  rationale: Aunque la política del proyecto favorece «Mesías» para el título, el audit trail en inglés muestra una revisión final que volvió a «Christ Jesus» por naturalidad epistolar. En español, «Cristo Jesús» es la forma convencional y más natural para este contexto, sin perder el valor titular de Χριστός.
- source_word: ἦλθεν εἰς τὸν κόσμον
  english_pob_choice: came into the world
  chosen_spanish: vino al mundo
  alternatives_spanish:
  - entró en el mundo
  - vino al mundo
  lexicon: BDAG
  rationale: «Vino al mundo» conserva el movimiento de ἦλθεν εἰς τὸν κόσμον y es una forma natural en español bíblico, con resonancia encarnacional.
- source_word: ἁμαρτωλοὺς
  english_pob_choice: sinners
  chosen_spanish: a los pecadores
  alternatives_spanish:
  - a los que pecan
  - a los pecadores
  lexicon: BDAG
  rationale: El sustantivo se refiere a personas caracterizadas por el pecado. «Pecadores» es conciso, directo y fiel al valor lexical.
- source_word: σῶσαι
  english_pob_choice: to save
  chosen_spanish: salvar
  alternatives_spanish:
  - rescatar
  - salvar
  lexicon: BDAG
  rationale: En este contexto soteriológico, «salvar» es el equivalente español más preciso y establecido para σῴζω.
- source_word: ὧν πρῶτός εἰμι ἐγώ
  english_pob_choice: of whom I am the foremost
  chosen_spanish: de los cuales yo soy el primero
  alternatives_spanish:
  - de los cuales yo soy el principal
  - de los cuales yo soy el primero de todos
  lexicon: BDAG
  rationale: πρῶτος puede expresar primacía o preeminencia. «El primero» conserva la imagen de rango sin introducir una paráfrasis interpretativa más fuerte como «el peor». El pronombre enfático ἐγώ queda bien reflejado con «yo».
theological_decisions:
- issue: Título Χριστός en confesión cristológica
  english_pob_reading: Messiah Jesus / Christ Jesus in later revision
  chosen_spanish_reading: Cristo Jesús
  alternative_spanish_readings:
  - Mesías Jesús
  rationale: La sección funciona como confesión cristológica compacta. «Cristo Jesús» es la forma española más reconocible y natural en una fórmula epistolar, mientras que «Mesías Jesús» conservaría con más transparencia el valor titular de Χριστός. Aquí se opta por la forma estable y eclesialmente inteligible sin cambiar el sentido.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: El audit trail inglés registra oscilación entre «Messiah Jesus» y «Christ Jesus» por naturalidad epistolar, con restauración final de la política titulada. La versión española adopta «Cristo Jesús» como solución natural y fiel al título, evitando introducir una nota textual innecesaria al no haber ambigüedad sustantiva en el español resultante.
  spanish_consistency_notes:
  - Se preserva el tono formular de la sentencia con «Fiel es la palabra».
  - «Plena aceptación» reproduce la intensificación de πάσης ἀποδοχῆς sin calco excesivo.
  - No se usa «Señor» para κύριος porque este versículo no contiene ese término.
  - Se mantiene «pecadores» para ἁμαρτωλοὺς y «salvar» para σῶσαι por fuerza lexical y teológica.
  - «Cristo Jesús» se emplea como forma natural española para Χριστὸς Ἰησοῦς en este contexto.
