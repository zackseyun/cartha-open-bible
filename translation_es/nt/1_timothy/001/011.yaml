translation:
  language: es
  text: conforme al evangelio de la gloria del Dios bendito[a], que me fue confiado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse de manera más idiomática: «el evangelio glorioso del Dios bendito».'
