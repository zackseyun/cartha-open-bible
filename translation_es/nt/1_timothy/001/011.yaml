lexical_decisions:
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  lexicon: BDAG
  rationale: κατά con acusativo expresa norma o criterio. En español, «conforme a» mantiene ese valor normativo con buena naturalidad y un tono más sobrio que una simple paráfrasis.
- source_word: τὸ εὐαγγέλιον
  english_pob_choice: gospel
  chosen_spanish: el evangelio
  alternatives_spanish:
  - las buenas nuevas
  - la buena noticia
  lexicon: BDAG
  rationale: «Evangelio» conserva el peso técnico-teológico del término paulino y coincide con el uso eclesial inteligible en español.
- source_word: τῆς δόξης
  english_pob_choice: of the glory
  chosen_spanish: de la gloria
  alternatives_spanish:
  - glorioso
  - de gloria
  lexicon: BDAG
  rationale: Se preserva la relación nominal del genitivo griego, en vez de comprimirlo a un adjetivo. Así queda abierta la relación exacta sin sobreinterpretarla.
- source_word: τοῦ μακαρίου θεοῦ
  english_pob_choice: of the blessed God
  chosen_spanish: del Dios bendito
  alternatives_spanish:
  - del Dios feliz
  - del Dios dichoso
  lexicon: BDAG
  rationale: «Bendito» es la equivalencia reverente y teológicamente adecuada para μακάριος aplicado a Dios. «Feliz» o «dichoso» sonarían impropios o demasiado coloquiales.
- source_word: ὃ
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: BDAG
  rationale: El relativo vuelve sobre «el evangelio» y en español puede expresarse de manera natural con «que» sin perder la referencia.
- source_word: ἐπιστεύθην
  english_pob_choice: was entrusted
  chosen_spanish: me fue confiado
  alternatives_spanish:
  - me fue encomendado
  - se me confió
  lexicon: BDAG
  rationale: El pasivo aoristo de πιστεύω aquí significa ‘ser confiado/encargado’, no ‘creer’. En español, «me fue confiado» refleja bien la pasiva y el sentido de comisión o custodia.
- source_word: ἐγώ
  english_pob_choice: I
  chosen_spanish: me
  alternatives_spanish:
  - yo
  lexicon: BDAG
  rationale: El pronombre enfático griego queda integrado en la construcción española mediante el complemento indirecto «me», ya presente por el sentido pasivo del verbo.
theological_decisions:
- issue: Relación entre εὐαγγέλιον y δόξης
  english_pob_reading: the gospel of the glory of the blessed God
  chosen_spanish_reading: el evangelio de la gloria del Dios bendito
  alternative_spanish_readings:
  - el evangelio glorioso del Dios bendito
  - el glorioso evangelio del Dios bendito
  rationale: La traducción conserva la estructura nominal del griego y no fuerza el giro adjetival. Se evita perder la tensión interpretativa entre un evangelio caracterizado por la gloria y un evangelio cuyo contenido es la gloria de Dios.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Sentido de ἐπιστεύθην en voz pasiva
  english_pob_reading: which was entrusted to me
  chosen_spanish_reading: que me fue confiado
  alternative_spanish_readings:
  - que me fue encomendado
  - que se me confió
  rationale: El contexto exige el sentido de encargo/depósito. Traducirlo como ‘creer’ sería incompatible con la frase y con el uso léxico atestiguado. La pasiva española conserva la idea de que el evangelio fue puesto bajo responsabilidad de Pablo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que reemplazó una construcción menos natural por «which was entrusted to me». Por eso el español adopta una pasiva equivalente y directa («me fue confiado»), manteniendo el sentido de encargo sin introducir ambigüedad. La nota conserva la alternativa idiomática ya documentada para el genitivo.
  spanish_consistency_notes:
  - Se usa «evangelio» como término técnico en continuidad con el uso paulino.
  - Se evita «SEÑOR» para el nombre divino porque el texto griego aquí usa θεοῦ, no κύριος.
  - Se mantiene «bendito» para μακάριος aplicado a Dios, en lugar de equivalentes emocionales menos adecuados.
  - La pasiva española con dativo indirecto expresa bien el valor de ἐπιστεύθην sin forzar una traducción reflexiva.
