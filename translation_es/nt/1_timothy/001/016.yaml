translation:
  language: es
  text: Pero por este motivo recibí misericordia, para que en mí, como el principal[a], Mesías Jesús mostrara toda su paciencia, como un modelo para los que iban a creer en él para vida eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el primero».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠλεήθην
  english_pob_choice: I received mercy
  chosen_spanish: recibí misericordia
  alternatives_spanish:
  - se me mostró misericordia
  - fui objeto de misericordia
  lexicon: BDAG
  rationale: El pasivo de ἐλεάω expresa que la misericordia fue recibida; en español, «recibí misericordia» suena natural y conserva la idea de acción recibida sin explicitar indebidamente el agente.
- source_word: πρώτῳ
  english_pob_choice: the foremost
  chosen_spanish: el primero
  alternatives_spanish:
  - el principal
  - el más destacado
  - el peor
  lexicon: BDAG
  rationale: Aquí Pablo se refiere a sí mismo en relación con su condición previa (cf. v. 15). «El primero» preserva la fuerza de prioridad/superlativo sin cargar el verso con «el peor», que pertenece más claramente al versículo anterior.
- source_word: ἐνδείξηται
  english_pob_choice: might display
  chosen_spanish: mostrara
  alternatives_spanish:
  - demostrara
  - mostrara públicamente
  - hiciera ver
  lexicon: BDAG
  rationale: El verbo en cláusula de propósito señala manifestación visible. «Mostrara» es natural en español y mantiene el sentido de exhibir o poner de manifiesto.
- source_word: Χριστὸς Ἰησοῦς
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  lexicon: BDAG
  rationale: Se conserva «Mesías» para Χριστός según el criterio del proyecto cuando el título conserva su valor titular. En español, «Mesías Jesús» puede sonar menos idiomático que «Cristo Jesús», pero refleja mejor la decisión léxica y evita vaciar el título de su sentido.
- source_word: ἅπασαν μακροθυμίαν
  english_pob_choice: all his patience
  chosen_spanish: toda su paciencia
  alternatives_spanish:
  - toda su longanimidad
  - toda su longanimidad y paciencia
  - toda su mansedumbre
  lexicon: BDAG
  rationale: ἅπας intensifica la totalidad; μακροθυμία denota paciencia/longanimidad. «Toda su paciencia» es claro en español y preserva la idea de plenitud total.
- source_word: ὑποτύπωσιν
  english_pob_choice: a pattern
  chosen_spanish: un modelo
  alternatives_spanish:
  - un patrón
  - un ejemplo
  lexicon: BDAG
  rationale: El sustantivo indica una pauta o ejemplo para imitar. «Un modelo» comunica bien el valor ejemplar y resulta natural en español bíblico contemporáneo.
- source_word: τῶν μελλόντων πιστεύειν
  english_pob_choice: those who were going to believe
  chosen_spanish: los que iban a creer
  alternatives_spanish:
  - los que habrían de creer
  - los futuros creyentes
  lexicon: BDAG
  rationale: μέλλω con infinitivo expresa futuridad desde el punto de vista pasado. «Iban a creer» conserva esa prospectividad en español sin volverse pesado.
- source_word: πιστεύειν ἐπ’ αὐτῷ
  english_pob_choice: believe in him
  chosen_spanish: creer en él
  alternatives_spanish:
  - poner fe en él
  - confiar en él
  lexicon: BDAG
  rationale: La construcción con ἐπί + dativo se expresa de modo natural como «creer en él», manteniendo el sentido de confiar/creer sin introducir matices ajenos.
- source_word: εἰς ζωὴν αἰώνιον
  english_pob_choice: for eternal life
  chosen_spanish: para vida eterna
  alternatives_spanish:
  - hacia vida eterna
  - con miras a vida eterna
  lexicon: BDAG
  rationale: εἰς marca finalidad o meta. «Para vida eterna» es breve, idiomático y conserva la orientación teleológica del texto.
theological_decisions:
- issue: Cómo rendir Χριστός
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: Se mantiene la decisión del POB de traducir Χριστός como «Mesías» cuando funciona como título. Esto conserva la identificación mesiánica y evita tratarlo automáticamente como mero nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title; Christ where name-like)'
- issue: Relación entre la misericordia recibida por Pablo y la acción de Cristo Jesús en la cláusula de propósito
  english_pob_reading: Christ Jesus might display all his patience as a pattern
  chosen_spanish_reading: Mesías Jesús mostrara toda su paciencia como un modelo
  alternative_spanish_readings:
  - Dios mostrara su paciencia
  - el Señor mostrara su paciencia
  rationale: La frase de propósito conserva la agencia de Mesías Jesús en el texto, sin forzar la identificación explícita del agente de 'recibí misericordia'. Así se respeta la formulación del griego y la distinción trinitaria implícita.
  doctrine_reference: 'DOCTRINE.md: Affirmations — Nicene Creed / Chalcedonian orthodoxy'
translation_notes:
  revision_awareness: El texto sigue la lectura revisada del audit trail que favorece una cláusula fluida con coma tras «recibí misericordia», conserva la referencia titulatoria de Χριστός como «Mesías», y refleja la futuridad de τῶν μελλόντων πιστεύειν con una forma española natural («iban a creer»).
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme al criterio doctrinal del proyecto.
  - Se usa «misericordia» para ἠλεήθην, evitando una paráfrasis que debilitara el pasivo.
  - «Vida eterna» traduce εἰς ζωὴν αἰώνιον con el sentido de meta/finalidad.
  - La nota al pie solo se usa para la alternativa lexical de πρώτῳ, porque es el punto de mayor tensión en español.
