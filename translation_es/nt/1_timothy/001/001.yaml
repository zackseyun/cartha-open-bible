translation:
  language: es
  text: Pablo[a], apóstol de Mesías Jesús, por mandato de Dios nuestro Salvador y de Mesías Jesús nuestra esperanza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Cristo Jesús' en ambas ocurrencias de 'Mesías Jesús'. El título griego Χριστός puede funcionar como 'Mesías' o, en algunos contextos, como una forma más cercana a nombre propio, 'Cristo'.
    reason: alternative_reading
  - marker: b
    text: O 'de Dios nuestro Salvador y de Mesías Jesús, nuestra esperanza'.
    reason: alternative_reading
lexical_decisions:
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Pául
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico y eclesial. 'Pablo' preserva la identificación histórica y la inteligibilidad inmediata.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - enviado
  - mensajero
  lexicon: BDAG
  rationale: '''Apóstol'' conserva el título técnico paulino y su peso eclesial. ''Enviado'' o ''mensajero'' suavizarían indebidamente la designación.'
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  - Jesucristo
  lexicon: BDAG
  rationale: Se mantiene 'Mesías' porque el título Χριστός conserva fuerza titular en este saludo. En español, 'Mesías Jesús' refleja mejor la decisión doctrinal de traducir el título sin convertirlo en nombre fijo.
- source_word: κατ’ ἐπιταγὴν
  english_pob_choice: by the command
  chosen_spanish: por mandato
  alternatives_spanish:
  - por la orden
  - según el mandato
  lexicon: BDAG
  rationale: La preposición con acusativo expresa base o conformidad con una orden autorizada. 'Por mandato' suena natural en español y conserva el sentido de comisión divina.
- source_word: θεοῦ σωτῆρος ἡμῶν
  english_pob_choice: of God our Savior
  chosen_spanish: de Dios nuestro Salvador
  alternatives_spanish:
  - de Dios, nuestro Salvador
  - de nuestro Salvador Dios
  lexicon: BDAG
  rationale: La frase se conserva como título aplicado a Dios. 'Nuestro Salvador' mantiene la apposición y el valor honorífico de σωτήρ sin forzar el orden español.
- source_word: καὶ
  english_pob_choice: and of
  chosen_spanish: y de
  alternatives_spanish:
  - y también de
  - e
  lexicon: BDAG
  rationale: Se repite la relación genitiva de la segunda cláusula con una coordinación clara en español. 'Y de' mantiene la parataxis del griego sin añadir interpretación.
- source_word: τῆς ἐλπίδος ἡμῶν
  english_pob_choice: our hope
  chosen_spanish: nuestra esperanza
  alternatives_spanish:
  - la esperanza nuestra
  - nuestra confianza
  lexicon: BDAG
  rationale: '''Esperanza'' es la equivalencia natural y teológicamente cargada para ἐλπίς. Se preserva el posible valor apposicional: Mesías Jesús es identificado como ''nuestra esperanza''.'
theological_decisions:
- issue: Traducción de Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se sigue la pauta doctrinal de traducir el título cuando funciona de manera titular y no meramente nominal. Esto conserva la referencia al ungido esperado sin ocultarla tras una forma ya cristalizada como nombre propio.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres cuando corresponda'
- issue: Relación entre 'Dios nuestro Salvador' y 'Mesías Jesús, nuestra esperanza'
  english_pob_reading: 'Appositional: ''God our Savior and Messiah Jesus our hope'''
  chosen_spanish_reading: 'Aposición coordinada: ''Dios nuestro Salvador, y de Mesías Jesús, nuestra esperanza'''
  alternative_spanish_readings:
  - '''Dios nuestro Salvador y Mesías Jesús nuestra esperanza'''
  - '''Dios nuestro Salvador y Mesías Jesús, que es nuestra esperanza'''
  rationale: 'Se mantiene la estructura compacta del griego y la tensión interpretativa: el texto puede leerse como dos miembros coordinados ligados al mandato, sin resolverlo en una paráfrasis explicativa. La coma ayuda a leer la segunda designación con fluidez sin imponer una expansión no presente.'
  doctrine_reference: 'DOCTRINE.md: preservar tensiones textuales y teológicas; equivalencia óptima'
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión que osciló entre 'Messiah Jesus' y 'Christ Jesus'; se restauró 'Messiah' por coherencia doctrinal. La versión española conserva esa decisión con 'Mesías' en ambas ocurrencias y evita sustituirla por el nombre-forma tradicional 'Cristo Jesús'. También refleja la mejora de claridad con puntuación mínima sin ampliar el sentido.
  spanish_consistency_notes:
  - Se usa 'Mesías' de manera consistente para Χριστός en ambas ocurrencias.
  - '''Dios'' se mantiene para θεός; ''Salvador'' para σωτήρ.'
  - '''Esperanza'' conserva el sustantivo abstracto y no se paraphrasea como ''confianza''.'
  - La puntuación busca legibilidad en español sin desarmar la sintaxis griega.
  - Las notas al pie marcan la alternativa 'Cristo Jesús' solo donde el audit trail documenta la oscilación lexical.
