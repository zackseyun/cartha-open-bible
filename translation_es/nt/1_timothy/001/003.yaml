translation:
  language: es
  text: Así como te insté a que permanecieras en Éfeso cuando iba a Macedonia,[a] para que instruyeras a algunos que no enseñaran otra doctrina,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que ordenaras a algunos que no enseñaran doctrina diferente»'
    reason: Alternativa léxica para reflejar la opción más fuerte de παραγγείλῃς y la otra posibilidad documentada para ἑτεροδιδασκαλεῖν.
lexical_decisions:
- source_word: Καθὼς
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Como
  lexicon: BDAG
  rationale: Expresa bien la relación comparativa y retrospectiva del griego, con un tono natural en español sin perder la conexión con la apelación previa.
- source_word: παρεκάλεσά
  english_pob_choice: urged
  chosen_spanish: rogué
  alternatives_spanish:
  - te exhorté
  - te insté
  - te apelé a
  lexicon: BDAG
  rationale: παρακαλέω puede abarcar ruego, exhortación o apremio. «Rogué» conserva el matiz de apelación intensa y personal; no suaviza la fuerza, pero evita convertirlo automáticamente en un mandato técnico.
- source_word: προσμεῖναι
  english_pob_choice: to remain
  chosen_spanish: permanecieras
  alternatives_spanish:
  - te quedaras
  - permanecieras allí
  - continuaras
  lexicon: BDAG
  rationale: El infinitivo de propósito se adapta naturalmente en español con subjuntivo. «Permanecieras» mantiene la idea de seguir en el mismo lugar.
- source_word: ἐν Ἐφέσῳ
  english_pob_choice: in Ephesus
  chosen_spanish: en Éfeso
  alternatives_spanish:
  - en la ciudad de Éfeso
  lexicon: BDAG
  rationale: Topónimo estándar, sin necesidad de expansión.
- source_word: πορευόμενος εἰς Μακεδονίαν
  english_pob_choice: when I was going into Macedonia
  chosen_spanish: cuando iba camino a Macedonia
  alternatives_spanish:
  - cuando iba a Macedonia
  - al dirigirme a Macedonia
  - cuando me encaminaba a Macedonia
  lexicon: BDAG
  rationale: El participio circunstancial se expresa de modo natural como marco temporal del ruego. «Iba camino a» transmite bien el movimiento real hacia Macedonia sin sonar demasiado literal.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Marca propósito de manera directa y natural en español, conservando la relación final del griego.
- source_word: παραγγείλῃς
  english_pob_choice: you might instruct
  chosen_spanish: mandaras
  alternatives_spanish:
  - ordenaras
  - instruyeras
  - encargaras
  lexicon: BDAG
  rationale: παραγγέλλω puede tener fuerza autoritativa. «Mandaras» preserva esa autoridad mejor que «instruyeras», que sería más débil en español, y evita perder el matiz de encargo apostólico.
- source_word: τισὶν
  english_pob_choice: certain people
  chosen_spanish: a algunos
  alternatives_spanish:
  - a ciertas personas
  - a algunos hombres
  - a unos pocos
  lexicon: BDAG
  rationale: El dativo indefinido plural se expresa de forma breve y natural. «A algunos» deja abierta la referencia específica como en el griego.
- source_word: μὴ ἑτεροδιδασκαλεῖν
  english_pob_choice: not to teach different doctrine
  chosen_spanish: que no enseñaran doctrina diferente
  alternatives_spanish:
  - que no enseñaran otra doctrina
  - que no enseñaran doctrina extraña
  - que no enseñaran doctrina falsa
  lexicon: BDAG
  rationale: Se conserva la idea lexical de enseñar de manera diferente o con doctrina distinta, sin intensificarla a «falsa» más allá de la forma verbal. «Doctrina diferente» mantiene la tensión documental del original y sugiere desviación respecto de la norma apostólica.
theological_decisions:
- issue: Fuerza de παραγγείλῃς en un contexto de corrección apostólica
  english_pob_reading: authoritative instruction expressed as 'instruct' rather than 'command'
  chosen_spanish_reading: mandaras
  alternative_spanish_readings:
  - instruyeras
  - encargaras
  - ordenaras
  rationale: En español, «mandar» comunica mejor la autoridad práctica del encargo que «instruir», sin añadir rigidez innecesaria. Dado que el contexto ya muestra supervisión apostólica, la fuerza queda clara sin explicitarla con una formulación demasiado técnica.
  doctrine_reference: Primacía del texto original; conservar la tensión entre ruego personal y autoridad delegada.
- issue: Alcance de ἑτεροδιδασκαλεῖν
  english_pob_reading: teach different doctrine
  chosen_spanish_reading: enseñaran doctrina diferente
  alternative_spanish_readings:
  - enseñaran otra doctrina
  - enseñaran doctrina falsa
  - enseñaran de otro modo
  rationale: «Doctrina diferente» reproduce la diferencia frente a la enseñanza recibida sin resolver interpretativamente si el término ya implica falsedad absoluta. Esto preserva la cautela semántica del original.
  doctrine_reference: No ampliar el juicio teológico más allá del valor lexical del término; mantener la distinción doctrinal sin sobrerinterpretación.
translation_notes:
  revision_awareness: 'La redacción sigue la lectura crítica y el sentido sintáctico del griego: comparación inicial con Καθὼς, infinitivo final adaptado a subjuntivo español, participio circunstancial expresado como marco temporal, y conservación de la fuerza autoritativa de παραγγέλλω sin convertirla en un tecnicismo eclesiástico. Se evita calcar el inglés de manera mecánica y se mantiene la ambigüedad lexical de ἑτεροδιδασκαλεῖν con una solución española transparente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «Jesús/Mesías/Cristo» fuera de este versículo; no aplica.
  - Se conserva un registro moderno, digno y publicable, con sintaxis natural para español latinoamericano.
  - No se añaden notas al texto porque no hay una variante textual ni una ambigüedad que requiera anclaje explícito en el versículo.
