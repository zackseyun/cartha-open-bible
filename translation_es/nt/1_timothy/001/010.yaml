translation:
  language: es
  text: los sexualmente inmorales, los hombres que tienen relaciones sexuales con hombres[a], los traficantes de esclavos, los mentirosos, los perjuros y cualquier otra cosa que se opone a la sana enseñanza,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los hombres que practican la homosexualidad». El término griego ἀρσενοκοίταις es raro y debatido, pero claramente se refiere a actividad sexual varón-varón.'
    reason: alternative_reading
lexical_decisions:
- source_word: πόρνοις
  english_pob_choice: the sexually immoral
  chosen_spanish: los inmorales sexuales
  alternatives_spanish:
  - los fornicarios
  - las personas sexualmente inmorales
  lexicon: BDAG
  rationale: πόρνος nombra en general a la persona entregada a inmoralidad sexual. 'Inmorales sexuales' conserva la amplitud del término sin reducirlo indebidamente a un solo tipo de conducta ni cargarlo con un matiz eclesiástico más estrecho que el griego.
- source_word: ἀρσενοκοίταις
  english_pob_choice: men who have sex with men
  chosen_spanish: los hombres que tienen relaciones sexuales con hombres
  alternatives_spanish:
  - los hombres que practican la homosexualidad
  - los homosexuales
  lexicon: BDAG
  rationale: La forma griega es rara y compuesta, y señala actividad sexual varón-varón. El español elegido expresa el referente conductual de manera accesible sin introducir una categoría de identidad que el término griego no requiere. Se preserva la tensión interpretativa con una nota de alternativa.
- source_word: ἀνδραποδισταῖς
  english_pob_choice: slave traders
  chosen_spanish: los traficantes de esclavos
  alternatives_spanish:
  - los secuestradores
  - los esclavizadores
  - los comerciantes de esclavos
  lexicon: BDAG
  rationale: El término apunta a quienes compran, venden o trafican personas para esclavitud. 'Traficantes de esclavos' refleja mejor la violencia social y comercial del vocablo que un simple 'secuestradores'.
- source_word: ψεύσταις
  english_pob_choice: liars
  chosen_spanish: los mentirosos
  alternatives_spanish:
  - los falsos
  lexicon: BDAG
  rationale: Equivalente directo y natural en español para quienes mienten.
- source_word: ἐπιόρκοις
  english_pob_choice: perjurers
  chosen_spanish: los perjuros
  alternatives_spanish:
  - los que juran en falso
  - los quebrantadores de juramento
  lexicon: BDAG
  rationale: El término describe a quienes violan o falsifican un juramento. 'Perjuros' es breve, preciso y funciona bien en una lista de vicios.
- source_word: καὶ εἴ τι ἕτερον
  english_pob_choice: and whatever else
  chosen_spanish: y cualquier otra cosa
  alternatives_spanish:
  - y cualquier otra cosa que
  - y si hay algo más
  lexicon: BDAG
  rationale: La expresión abre la lista a otros comportamientos afines. 'Cualquier otra cosa' conserva el alcance abierto sin volver rígida la construcción.
- source_word: τῇ ὑγιαινούσῃ διδασκαλίᾳ
  english_pob_choice: to sound teaching
  chosen_spanish: a la sana enseñanza
  alternatives_spanish:
  - a la enseñanza sana
  - a la doctrina sana
  lexicon: BDAG
  rationale: Ὑγιαίνω aplica metafóricamente la idea de salud/sanidad a la enseñanza. 'Sana enseñanza' conserva la metáfora y evita un tecnicismo más marcado como 'doctrina' si no es necesario.
- source_word: ἀντίκειται
  english_pob_choice: is opposed
  chosen_spanish: se opone
  alternatives_spanish:
  - es contraria
  - está en contra
  lexicon: BDAG
  rationale: La forma verbal expresa oposición activa. 'Se opone' es la manera más natural en español para la clausula final.
theological_decisions:
- issue: Cómo traducir ἀρσενοκοίταις en una lista de vicios con término raro y debatido
  english_pob_reading: men who have sex with men
  chosen_spanish_reading: los hombres que tienen relaciones sexuales con hombres
  alternative_spanish_readings:
  - los hombres que practican la homosexualidad
  rationale: La traducción mantiene el rasgo masculino y sexual del término griego sin importar una etiqueta identitaria moderna. Dado que el alcance exacto del vocablo sigue debatido, la nota preserva una alternativa conocida sin resolver artificialmente la tensión.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; document contested renderings and preserve alternatives in footnotes.'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no registró cambios; se conserva la línea interpretativa del paquete auditado, con ajustes idiomáticos al español para mantener claridad y fidelidad lexical.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el lenguaje de esclavitud ('esclavos') según la preferencia del proyecto y el matiz léxico del término griego.
  - La lista de vicios se traduce con sustantivos plurales definidos para reflejar el carácter categorial del original.
  - Se preserva la distinción entre la conducta sexual específica de ἀρσενοκοίταις y la categoría más amplia de πόρνοις.
