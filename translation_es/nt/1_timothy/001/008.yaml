translation:
  language: es
  text: Ahora sabemos que la ley es buena[a], si uno la usa conforme a la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si uno la usa legítimamente» o «si uno la usa correctamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - entendemos
  - estamos conscientes
  lexicon: BDAG / οἶδα
  rationale: El perfecto con sentido presente expresa conocimiento asentado; «sabemos» comunica ese valor de certeza estable en español natural.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pero
  - Y
  lexicon: BDAG / δέ
  rationale: Aquí δέ funciona como transición suave, no como oposición fuerte; «Ahora» mantiene el giro discursivo sin cargar contraste.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  lexicon: BDAG / ὅτι
  rationale: Introduce el contenido de lo sabido; «que» es la equivalencia directa y idiomática en español.
- source_word: καλὸς
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - noble
  - excelente
  lexicon: BDAG / καλός
  rationale: En este contexto califica positivamente a la ley; «buena» preserva el sentido moral general sin precisar más de lo que el griego dice.
- source_word: ὁ νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la norma
  lexicon: BDAG / νόμος
  rationale: Se conserva el artículo y el término general «ley», sin especificar en el texto principal si se trata de la ley mosaica o de la ley como categoría, para no importar una precisión no explicitada por el griego.
- source_word: ἐάν τις
  english_pob_choice: if one
  chosen_spanish: si uno
  alternatives_spanish:
  - si alguien
  - si cualquiera
  lexicon: BDAG / τις
  rationale: La construcción es genérica e indefinida; «si uno» preserva el singular representativo sin pluralizar ni diluir la forma griega.
- source_word: αὐτῷ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - con ella
  - de ella
  lexicon: BDAG / αὐτός
  rationale: El pronombre remite a «la ley» y con χράομαι el español natural es «usar la ley»; el femenino singular mantiene la referencia explícita y evita un calco forzado.
- source_word: νομίμως
  english_pob_choice: lawfully
  chosen_spanish: legítimamente
  alternatives_spanish:
  - legalmente
  - conforme a la ley
  lexicon: BDAG / νομίμως
  rationale: El adverbio deriva de νόμος y expresa uso conforme a norma/ley. «Legítimamente» conserva la idea de validez o rectitud del uso; se prefiere aquí por ser claro y fluido en español, aunque «legalmente» o «conforme a la ley» también son posibles.
- source_word: χρῆται
  english_pob_choice: uses
  chosen_spanish: usa
  alternatives_spanish:
  - hace uso de
  - emplea
  lexicon: BDAG / χράομαι
  rationale: El verbo medio significa usar o emplear; «usa» es la opción más natural y directa en español, manteniendo el sentido sin sobrecargar la frase.
theological_decisions:
- issue: Alcance de «la ley»
  english_pob_reading: Rendered simply as 'the law' without specifying 'Mosaic law' in the main text.
  chosen_spanish_reading: Se mantiene «la ley» sin añadir «mosaica» ni otra precisión interpretativa en el texto principal.
  alternative_spanish_readings:
  - la ley mosaica
  - la ley en general
  rationale: El contexto paulino probablemente tiene en vista la ley mosaica, pero el griego solo dice «la ley». La traducción conserva esa amplitud para no resolver prematuramente una cuestión interpretativa que el verso no explicita.
  doctrine_reference: 'Principio POB: no introducir afirmaciones doctrinales o interpretativas que el texto no formule; preservar la tensión exegética cuando exista.'
- issue: Sentido de νομίμως
  english_pob_reading: lawfully / properly / legitimately
  chosen_spanish_reading: legítimamente
  alternative_spanish_readings:
  - legalmente
  - propiamente
  - conforme a la ley
  rationale: La forma adverbial está emparentada con νόμος y admite matices de legalidad, corrección o legitimidad. «Legítimamente» transmite bien la idea de uso autorizado o conforme a norma, sin perder la conexión léxica con «ley».
  doctrine_reference: 'Decisión léxica: conservar la relación semántica entre νόμος y νομίμως, evitando una paráfrasis que borre el juego de palabras.'
translation_notes:
  revision_awareness: 'El registro español sigue el texto griego y el audit trail inglés con alta correspondencia: transición suave con δέ, contenido introducido por ὅτι, genericidad singular de τις, y conservación del vínculo léxico entre νόμος y νομίμως. La decisión principal de estilo fue optar por «Ahora» y «legítimamente» para sonar natural en español sin perder la relación con «ley».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene «la ley» como traducción de νόμος, conforme al contexto y sin especificación doctrinal adicional.
  - Se preserva la singularidad genérica de τις con «si uno».
  - La nota al pie se ancla en «legítimamente» para reflejar las alternativas léxicas del audit trail inglés.
