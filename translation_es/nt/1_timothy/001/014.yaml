    issue: La cláusula relativa «que están en Mesías Jesús» es poco idiomática en español.
    rationale: Aunque calca aceptablemente el inglés auditado, en español suena rígido y antinatural con sustantivos abstractos. Una formulación como «fe y amor en Mesías Jesús» o «fe y amor que hay en Mesías Jesús» comunica mejor el mismo sentido sin perder fidelidad.
