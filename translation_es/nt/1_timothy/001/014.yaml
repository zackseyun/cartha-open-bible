translation:
  language: es
  text: Pero la gracia de nuestro Señor sobreabundó[a], con fe y amor en Mesías Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo Jesús».
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπερεπλεόνασεν
  english_pob_choice: overflowed all the more
  chosen_spanish: sobreabundó
  alternatives_spanish:
  - abundó sobremanera
  - se desbordó aún más
  - sobreabundó muchísimo
  lexicon: BDAG
  rationale: El verbo compuesto intensifica la idea de abundar. «Sobreabundó» transmite bien la superabundancia en español moderno, con fuerza verbal compacta y digna, sin volver la frase pesada.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ marca contraste con la descripción anterior; «Pero» conserva ese valor adversativo de forma natural en español.
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: «Gracia» es la equivalencia estándar y teológicamente adecuada para χάρις en este contexto de la obra de Dios en Pablo.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: El título κύριος se traduce como «Señor» conforme al uso cristiano bíblico y al valor confesional del término.
- source_word: μετὰ πίστεως καὶ ἀγάπης
  english_pob_choice: with faith and love
  chosen_spanish: con fe y amor
  alternatives_spanish:
  - junto con fe y amor
  - acompañada de fe y amor
  lexicon: BDAG
  rationale: μετά con genitivo expresa compañía; «con» es la forma más natural y fiel en español. «Fe» y «amor» conservan el sentido directo de πίστις y ἀγάπη.
- source_word: τῆς ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: that are in Messiah Jesus
  chosen_spanish: que están en Mesías Jesús
  alternatives_spanish:
  - que están en Cristo Jesús
  - que se encuentran en Mesías Jesús
  lexicon: BDAG
  rationale: El relativo en plural explicita que la frase preposicional modifica tanto «fe» como «amor». «Mesías» se mantiene para Χριστός según la guía terminológica, porque aquí funciona todavía como título y no solo como nombre fijo.
theological_decisions:
- issue: Relación sintáctica de «con fe y amor»
  english_pob_reading: The grace of the Lord is described as overflowing together with the faith and love that are in Messiah Jesus.
  chosen_spanish_reading: La gracia del Señor es descrita como sobreabundante junto con la fe y el amor que están en Mesías Jesús.
  alternative_spanish_readings:
  - La gracia del Señor produjo fe y amor en Pablo.
  - La gracia del Señor sobreabundó, y además hubo fe y amor en Mesías Jesús.
  rationale: La construcción más directa liga «con fe y amor» a la gracia que sobreabunda, sin añadir una causalidad que el griego no explicita abiertamente. A la vez, no se niega la implicación teológica de que la gracia produce esas virtudes.
  doctrine_reference: 'Translation philosophy #3'
- issue: Renderización de Χριστός
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: Se conserva el valor titular de Χριστός con «Mesías», conforme a la política terminológica del proyecto. Esto evita neutralizar el sentido judío-mesiánico del término en español.
  doctrine_reference: 'Contested terms table: Χριστός'
translation_notes:
  revision_awareness: El auditorio inglés mostró una oscilación editorial entre «Christ Jesus» y «Messiah Jesus»; la corrección más reciente restablece «Messiah» por coherencia doctrinal. La versión española sigue esa decisión y la expresa como «Mesías Jesús».
  spanish_consistency_notes:
  - Se mantiene «gracia» para χάρις y «Señor» para κύριος según los defaults del proyecto.
  - «Mesías Jesús» preserva el título de Χριστός sin adoptar la forma litúrgica tradicional «Cristo» en el texto principal.
  - 'La puntuación y el orden son naturales en español, pero la estructura básica del original se conserva: contraste, sujeto, verbo intensivo, compañía de fe y amor, y cláusula relativa final.'
