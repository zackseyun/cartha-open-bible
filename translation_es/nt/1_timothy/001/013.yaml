translation:
  language: es
  text: Antes fui blasfemo, perseguidor y hombre violento[a]; pero se me mostró misericordia[b], porque actué por ignorancia[c] en incredulidad[d],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'insolente' o 'brutal'. El término griego denota un comportamiento abusivo y violentamente ultrajante, no solo orgullo.
    reason: lexical_alternative
  - marker: b
    text: O 'recibí misericordia'.
    reason: lexical_alternative
  - marker: c
    text: O 'en ignorancia' o 'ignorando'.
    reason: lexical_alternative
  - marker: d
    text: O 'en falta de fe'. Aquí el sentido probablemente es falta de fe más que infidelidad pactual.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πρότερον ὄντα
  english_pob_choice: formerly a blasphemer and a persecutor and a violent man
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - en otro tiempo
  - antes, siendo
  lexicon: BDAG
  rationale: El valor temporal del participio articular se expresa de manera natural con 'antes'. En español, añadir 'siendo' en el texto principal sonaría forzado; el sentido retrospectivo queda claro por el contexto inmediato.
- source_word: βλάσφημον
  english_pob_choice: a blasphemer
  chosen_spanish: blasfemo
  alternatives_spanish:
  - blasfemador
  - el que blasfemaba
  lexicon: BDAG
  rationale: Como adjetivo sustantivado en una lista de rasgos personales, 'blasfemo' conserva la fuerza lexical y es idiomático en español.
- source_word: διώκτην
  english_pob_choice: a persecutor
  chosen_spanish: perseguidor
  alternatives_spanish:
  - el que perseguía
  - opresor
  lexicon: BDAG
  rationale: '''Perseguidor'' es la equivalencia directa y natural para el sustantivo, sin perder el sentido de hostilidad contra la iglesia.'
- source_word: ὑβριστήν
  english_pob_choice: a violent man
  chosen_spanish: hombre violento
  alternatives_spanish:
  - insolente
  - brutal
  - agresor violento
  lexicon: BDAG
  rationale: La gama semántica incluye violencia abusiva e insultante. 'Hombre violento' comunica el aspecto injurioso y contundente mejor que 'insolente', que en español podría sonar solo a falta de respeto.
- source_word: ἠλεήθην
  english_pob_choice: I was shown mercy
  chosen_spanish: se me mostró misericordia
  alternatives_spanish:
  - recibí misericordia
  - fui objeto de misericordia
  lexicon: BDAG
  rationale: El pasivo divino se preserva bien con una construcción impersonal/pasiva en español. 'Se me mostró misericordia' mantiene la acción recibida sin volverla reflexiva o abstracta.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la base explicativa de la misericordia. 'Porque' refleja la relación causal sin exagerar el peso teológico del enunciado.
- source_word: ἀγνοῶν
  english_pob_choice: acting ignorantly
  chosen_spanish: por ignorancia
  alternatives_spanish:
  - ignorando
  - siendo ignorante
  lexicon: BDAG
  rationale: El participio expresa la circunstancia en la que actuó Pablo. En español, 'por ignorancia' suena más natural que un gerundio y preserva la idea de acción realizada sin conocimiento.
- source_word: ἐποίησα
  english_pob_choice: I acted
  chosen_spanish: actué
  alternatives_spanish:
  - hice
  - procedí
  lexicon: BDAG
  rationale: Dado que el objeto no está explicitado y el verbo amplia el alcance de la conducta previa, 'actué' transmite bien la idea global sin añadir contenido no presente en el griego.
- source_word: ἐν ἀπιστίᾳ
  english_pob_choice: in unbelief
  chosen_spanish: en incredulidad
  alternatives_spanish:
  - en desconfianza
  - sin fe
  lexicon: BDAG
  rationale: '''Incredulidad'' es el equivalente más natural para la ausencia de fe en español bíblico contemporáneo. ''Sin fe'' sería posible, pero menos estable como sustantivo abstracto en este contexto.'
theological_decisions:
- issue: Relación entre ignorancia e incredulidad como fundamento de la misericordia
  english_pob_reading: Paul states that mercy was shown to him because his prior actions were done ignorantly in unbelief.
  chosen_spanish_reading: Pablo dice que se le mostró misericordia porque actuó por ignorancia en incredulidad.
  alternative_spanish_readings:
  - se me mostró misericordia, aunque actué por ignorancia
  - se me mostró misericordia, pues lo hice sin saber y en incredulidad
  rationale: 'La traducción conserva la causalidad de ὅτι sin convertir la ignorancia en mérito. La frase mantiene la tensión bíblica: hubo culpa real, pero no se trató de rebelión consciente contra una verdad reconocida.'
  doctrine_reference: Preservar la tensión entre culpa e ignorancia sin resolverla artificialmente.
translation_notes:
  revision_awareness: El inglés POB revisó 'formerly being' a 'formerly' por naturalidad, manteniendo el sentido participial. En español, esa misma naturalidad se logra con 'antes' al inicio, sin necesidad de conservar un gerundio equivalente. También se mantuvo la decisión inglesa de traducir ὑβριστής con un término que refleje violencia abusiva, no mera soberbia.
  spanish_consistency_notes:
  - Se usó 'misericordia' para ἠλεήθην, en línea con el valor verbal pasivo y la terminología bíblica usual.
  - '''Incredulidad'' traduce ἀπιστίᾳ como ausencia de fe, no como infidelidad pactual desarrollada.'
  - No se suavizó ὑβριστής a 'orgulloso' o 'insolente' en el texto principal, para conservar la fuerza violenta del término griego.
