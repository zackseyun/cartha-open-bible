translation:
  language: es
  text: queriendo ser maestros de la ley[a][b], aunque no entienden ni lo que dicen ni las cosas acerca de las cuales afirman tan categóricamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no entendiendo lo que dicen o las cosas que afirman tan categóricamente».'
    reason: lexical_alternative
  - marker: b
    text: «Maestros de la ley» probablemente se refiere a quienes reclamaban autoridad para enseñar la ley judía (la Torá).
    reason: cultural_note
lexical_decisions:
- source_word: θέλοντες
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - queriendo ser
  lexicon: BDAG
  rationale: El participio expresa la disposición volitiva continua del sujeto implícito; «queriendo» conserva ese matiz natural en español sin volver la frase demasiado explicativa.
- source_word: εἶναι
  english_pob_choice: to be
  chosen_spanish: ser
  alternatives_spanish:
  - estar
  lexicon: BDAG
  rationale: Con complemento predicativo, el infinitivo normal en español es «ser». Mantiene la relación de aspiración del participio anterior.
- source_word: νομοδιδάσκαλοι
  english_pob_choice: teachers of the law
  chosen_spanish: maestros de la ley
  alternatives_spanish:
  - doctores de la ley
  - maestros de la Ley
  lexicon: BDAG
  rationale: La forma compuesta apunta a personas que enseñan la ley. «Maestros de la ley» preserva el sentido funcional y es idiomático en español sin introducir una paráfrasis doctrinal.
- source_word: μὴ νοοῦντες
  english_pob_choice: though they understand
  chosen_spanish: sin entender
  alternatives_spanish:
  - aunque no entienden
  - no entendiendo
  lexicon: BDAG
  rationale: El valor concesivo del participio queda claro en español con «sin entender», que evita la dureza de un calco y mantiene la negación del verbo.
- source_word: μήτε ... μήτε
  english_pob_choice: neither ... nor
  chosen_spanish: ni ... ni
  alternatives_spanish:
  - ni ... ni tampoco
  lexicon: BDAG
  rationale: La correlación negativa se expresa de manera directa y natural con «ni ... ni», que reproduce la doble negación del griego.
- source_word: ἃ λέγουσιν
  english_pob_choice: what they are saying
  chosen_spanish: lo que dicen
  alternatives_spanish:
  - las cosas que dicen
  - lo que están diciendo
  lexicon: BDAG
  rationale: El relativo neutro plural se vierte de forma idiomática como «lo que», conservando el contenido del habla sin forzar una construcción literal.
- source_word: περὶ τίνων
  english_pob_choice: the things about which
  chosen_spanish: acerca de las cuales
  alternatives_spanish:
  - sobre qué
  - de qué cosas
  lexicon: BDAG
  rationale: La preposición περί con el interrogativo/indefinido señala los asuntos tratados; «acerca de las cuales» preserva la relación preposicional y el referente de los temas en discusión.
- source_word: διαβεβαιοῦνται
  english_pob_choice: they speak so confidently
  chosen_spanish: aseguran con tanta firmeza
  alternatives_spanish:
  - afirman con gran seguridad
  - insisten con tanta confianza
  lexicon: BDAG
  rationale: El verbo expresa afirmación o insistencia contundente. «Aseguran con tanta firmeza» comunica la fuerza retórica de la declaración y el tono crítico del pasaje.
theological_decisions:
- issue: Referencia de «la ley» en νομοδιδάσκαλοι
  english_pob_reading: Rendered generically as 'the law' without specifying Mosaic/Torah in the main text.
  chosen_spanish_reading: «la ley» sin especificar en el texto principal
  alternative_spanish_readings:
  - «la Ley de Moisés»
  - «la Torá»
  rationale: El griego dice simplemente «ley». Aunque el contexto pastoral sugiere la ley judía, el texto base no la explicita; por eso se conserva la formulación genérica en el cuerpo principal.
  doctrine_reference: 'Primacía del texto original y cautela exegética: no añadir precisiones contextuales que el griego no enuncia de forma explícita.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el consenso del audit trail inglés, manteniendo la relación concesiva del participio negativo y la fuerza afirmativa de διαβεβαιοῦνται sin suavizarla.
  spanish_consistency_notes:
  - Se usó «ley» en minúscula en el texto principal para mantener la referencia genérica del griego.
  - Se evitó «Cristo»/«Mesías» y otros términos no presentes en el versículo.
  - La doble negación se resolvió con «ni ... ni» para un español natural y fiel.
  - El tono es sobrio y publicable, sin añadir interpretaciones ajenas al verso.
