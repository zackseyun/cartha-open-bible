translation:
  language: es
  text: Ahora el objetivo[a] de la instrucción[b] es el amor que proviene de un corazón puro, de una buena conciencia y de una fe sincera[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la meta» o «el resultado» de la instrucción.
    reason: lexical_alternative
  - marker: b
    text: O «mandato» o «encargo» para «instrucción».
    reason: lexical_alternative
  - marker: c
    text: O «fe sin hipocresía»; πίστις también puede entenderse como «fidelidad» o «confianza» en algunos contextos.
    reason: alternative_reading
lexical_decisions:
- source_word: τέλος
  english_pob_choice: goal
  chosen_spanish: objetivo
  alternatives_spanish:
  - fin
  - meta
  - propósito
  lexicon: BDAG
  rationale: En este contexto, τέλος no señala terminación sino finalidad u उद्देश्य. «Objetivo» comunica bien la fuerza teleológica en español sin perder naturalidad. «Fin» sería posible, pero puede sonar más ambigua; «meta» y «propósito» también son viables, aunque menos cercanas al giro de una formulación doctrinal.
- source_word: παραγγελίας
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - mandato
  - encargo
  - orden
  lexicon: BDAG
  rationale: La palabra puede abarcar mandato, orden o instrucción. Aquí, por el contexto pastoral de 1 Timoteo 1:3–4, «instrucción» expresa mejor la función didáctica y exhortativa del término. «Mandato» o «orden» serían más fuertes, pero menos flexibles en español.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: Se mantiene el sentido básico de ἀγάπη como «amor», conforme al uso del proyecto y al contexto ético de la frase. «Caridad» es tradicional, pero en español actual puede restringirse demasiado.
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: que procede de
  alternatives_spanish:
  - desde
  - a partir de
  - nacido de
  lexicon: BDAG
  rationale: ἐκ marca origen o fuente. En español, una construcción con «que procede de» expresa con claridad que el amor brota de las cualidades que siguen, sin forzar una calca preposicional.
- source_word: καθαρᾶς καρδίας
  english_pob_choice: a pure heart
  chosen_spanish: un corazón puro
  alternatives_spanish:
  - un corazón limpio
  lexicon: BDAG
  rationale: «Corazón puro» conserva la cualidad moral e interior del original de manera natural. «Corazón limpio» es posible, pero puede sonar más idiomático/devocional que estrictamente equivalente.
- source_word: συνειδήσεως ἀγαθῆς
  english_pob_choice: a good conscience
  chosen_spanish: una buena conciencia
  alternatives_spanish:
  - una conciencia limpia
  - una conciencia recta
  lexicon: BDAG
  rationale: «Buena conciencia» sigue de cerca el adjetivo ἀγαθῆς y evita interpretar de más con «limpia». «Recta» también funciona, pero introduce una matización ética más específica que no está explícita en el texto.
- source_word: πίστεως ἀνυποκρίτου
  english_pob_choice: sincere faith
  chosen_spanish: fe sincera
  alternatives_spanish:
  - fe sin hipocresía
  - fe genuina
  - fe no fingida
  lexicon: BDAG
  rationale: «Sincera» traduce bien ἀνυποκρίτου en español moderno y encaja naturalmente con «fe». Mantiene la tensión entre sinceridad interior y ausencia de fingimiento sin volverlo innecesariamente técnico.
theological_decisions:
- issue: Alcance de πίστις en πίστεως ἀνυποκρίτου
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Se conserva «fe» como lectura principal, en continuidad con el valor por defecto del proyecto y con el contexto más probable de la frase. «Fidelidad» o «confianza» son posibilidades semánticas reales, pero aquí no son necesarias para la comprensión primaria.
  doctrine_reference: 'DOCTRINE.md: contested terms table for πίστις; Translation philosophy §3'
- issue: Valor de τέλους τῆς παραγγελίας
  english_pob_reading: the goal of the instruction
  chosen_spanish_reading: el objetivo de la instrucción
  alternative_spanish_readings:
  - el fin de la instrucción
  - la meta de la instrucción
  - el propósito de la instrucción
  rationale: 'Se mantiene la lectura teleológica: la instrucción apunta a un resultado buscado, no a su terminación. «Objetivo» es la forma más natural y clara en español para esa idea.'
  doctrine_reference: BDAG; contexto inmediato de 1 Timoteo 1:3–5
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios pendientes y el veredicto de revisión fue de alto acuerdo. La redacción española sigue el mismo conjunto de decisiones léxicas y la misma resolución teológica básica, adaptadas a un español natural y publicable.'
  spanish_consistency_notes:
  - 'Se conserva la estructura oracional teleológica del griego: objetivo + instrucción + amor + tres fuentes internas.'
  - Se evitó traducir ἐκ con una simple preposición literal cuando en español resulta más claro expresar procedencia con «que procede de».
  - «Buena conciencia» y «fe sincera» mantienen el paralelismo de los tres complementos genitivos sin suavizar la fuerza moral del original.
  - No se introdujo terminología eclesiástica tradicional no respaldada por el expediente, como «caridad» o «mandamiento», salvo donde la evidencia lo exigiera.
