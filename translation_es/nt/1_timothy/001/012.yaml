    reason: alternative_reading
  - marker: b
    text: O «en el ministerio» o «para servicio». El griego διακονία abarca ampliamente servicio o ministerio.
    reason: lexical_alternative
  revision_rationale: Se reubica [a] para que ancle correctamente a «Mesías Jesús»; se ajusta «me fortaleció» a «me ha fortalecido» para reflejar mejor el matiz de habilitación vigente; y se cambia el texto principal a «servicio» para representar con más amplitud διακονία, dejando «ministerio» como alternativa válida en la nota.
