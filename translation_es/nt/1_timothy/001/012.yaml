review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: acción de gracias, fortalecimiento por parte de Mesías Jesús, evaluación de Pablo como fiel, y colocación en διακονία. Sin embargo, la colocación de la nota [a] separa indebidamente «Mesías Jesús» de «nuestro Señor», cuando la alternativa documentada solo afecta a Χριστός. Además, «que me fortaleció» pierde el matiz resultativo del perfecto inglés auditado y del participio griego aplicado al estado de habilitación presente; «que me ha fortalecido» lo conserva mejor. «Al ponerme en el ministerio» es comprensible, pero «al ponerme en el servicio» se alinea mejor con la amplitud de διακονία y con la nota léxica preservada.'
  spanish_quality_summary: El español es claro y digno, pero la puntuación/ubicación de la nota [a] debe corregirse para anclarla a «Mesías Jesús». «Nuestro Señor» suena natural sin coma previa. «Me ha fortalecido» es más fluido y preciso en contexto. «Ministerio» no es incorrecto, pero en español puede sonar más institucional; «servicio» evita esa posible sobrelectura y armoniza mejor con la nota alternativa.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: Χριστός -> «Mesías», κύριος -> «Señor», χάριν ἔχω -> «Doy gracias». La principal mejora es mantener la nota alternativa de «Cristo Jesús» exactamente sobre «Mesías Jesús[a]». También conviene preferir «servicio» como realización principal de διακονία aquí, dejando «ministerio» como alternativa en nota.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «nuestro Señor» en vez de a «Mesías Jesús».
    rationale: La nota explica una alternativa para Χριστός («Cristo Jesús»), no para «nuestro Señor». El marcador debe aparecer inmediatamente tras la frase afectada para evitar ambigüedad.
  - severity: medium
    issue: «Que me fortaleció» debilita el matiz de habilitación vigente.
    rationale: Aunque el participio aoristo puede verterse en pasado, el inglés auditado eligió «who has strengthened» para preservar mejor el efecto resultante. En español, «que me ha fortalecido» suena natural y mantiene ese matiz.
  - severity: low
    issue: «En el ministerio» puede sonar más institucional de lo necesario para διακονία.
    rationale: 'El griego es más amplio: servicio/ministry. En este contexto, «servicio» como texto principal evita una lectura eclesiástica estrecha, mientras la nota puede conservar «ministerio» como alternativa.'
  revised_spanish_text: Doy gracias a Mesías Jesús[a], nuestro Señor, que me ha fortalecido, porque me consideró fiel, al ponerme en el servicio[b],
