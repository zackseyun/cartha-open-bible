    changes_summary: 'Changed ''Messiah Jesus'' to ''Christ Jesus'' for more natural formal English and closer alignment with standard rendering of Χριστῷ Ἰησοῦ; retained the rest as accurate and complete. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Doy gracias a Mesías Jesús[a], nuestro Señor, que me ha fortalecido, porque me consideró fiel, al ponerme en el servicio[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo Jesús». El título griego Χριστός puede verterse por traducción («Mesías») o por transliteración tradicional («Cristo»).
    reason: alternative_reading
  - marker: b
    text: O «en el ministerio» o «para servicio». El griego διακονία abarca ampliamente servicio o ministerio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Χάριν ἔχω
  english_pob_choice: I give thanks
  chosen_spanish: Doy gracias
  alternatives_spanish:
  - Tengo gratitud
  - Estoy agradecido
  lexicon: BDAG
  rationale: La expresión griega funciona como un giro idiomático de agradecimiento. «Doy gracias» comunica naturalmente la acción verbal y evita un calco poco idiomático como «tengo gracias».
- source_word: ἐνδυναμώσαντί
  english_pob_choice: who has strengthened
  chosen_spanish: que me fortaleció
  alternatives_spanish:
  - que me dio fuerza
  - que me capacitó
  lexicon: BDAG
  rationale: El participio aoristo presenta a Cristo como quien habilitó a Pablo. «Fortaleció» conserva la idea de dar capacidad o fuerza de manera directa y natural en español.
- source_word: Χριστῷ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  lexicon: BDAG
  rationale: Se sigue la directriz del proyecto de traducir Χριστός como «Mesías» cuando el título está semánticamente activo. En este contexto confesional, «Mesías Jesús» preserva el valor de título sin convertirlo en forma fija transliterada.
- source_word: κυρίῳ
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Maestro
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título cristológico. «Señor» es el equivalente español más estable y respetuoso del uso neotestamentario, sin introducir un matiz ajeno.
- source_word: πιστόν
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - digno de confianza
  lexicon: BDAG
  rationale: En relación con la comisión al servicio, πιστός describe la idoneidad y lealtad de Pablo. «Fiel» reproduce bien esa fuerza relacional y ministerial.
- source_word: ἡγήσατο
  english_pob_choice: considered
  chosen_spanish: consideró
  alternatives_spanish:
  - estimó
  - lo juzgó
  lexicon: BDAG
  rationale: El verbo significa valorar o considerar. «Consideró» es claro y evita que «juzgó» sugiera una lectura forense innecesaria.
- source_word: θέμενος
  english_pob_choice: appointing
  chosen_spanish: al ponerme
  alternatives_spanish:
  - al asignarme
  - al nombrarme
  lexicon: BDAG
  rationale: El participio expresa la acción de colocar/establecer en una función. «Al ponerme» mantiene de cerca la imagen verbal del griego; en español puede sonar un poco más general, pero sigue siendo fiel y evita importar una terminología eclesiástica más específica de la que exige el texto.
- source_word: εἰς διακονίαν
  english_pob_choice: to ministry
  chosen_spanish: en el ministerio
  alternatives_spanish:
  - para servicio
  - para ministerio
  lexicon: BDAG
  rationale: διακονία puede abarcar servicio o ministerio. Dado el contexto de comisión apostólica, «ministerio» comunica adecuadamente la tarea encargada sin reducirla a un oficio institucional concreto.
theological_decisions:
- issue: Tratamiento de Χριστός
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La política del proyecto pide traducir el título como «Mesías» cuando mantiene su fuerza titulativa. En español, «Mesías Jesús» conserva esa afirmación cristológica sin neutralizarla mediante transliteración habitual.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Naturaleza de la comisión de Pablo
  english_pob_reading: appointing me to ministry
  chosen_spanish_reading: al ponerme en el ministerio
  alternative_spanish_readings:
  - al asignarme al servicio
  - al nombrarme para el servicio
  rationale: El texto subraya que Cristo lo consideró fiel y lo estableció para διακονία. «En el ministerio» mantiene la idea de servicio comisionado sin introducir estructuras eclesiásticas posteriores que el versículo no explicita.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source text without importing doctrinal claims'
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra una ida y vuelta entre «Messiah Jesus» y «Christ Jesus», con restauración final de «Messiah Jesus» por fidelidad doctrinal al tratamiento de Χριστός. También confirma la lectura de διακονία como «ministry/service». La versión española adopta la misma decisión base: traducir Χριστός como «Mesías» y mantener la noción de comisión al ministerio/servicio, sin forzar una lectura clerical posterior.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme al estándar del proyecto en español.
  - «Señor» se conserva para κύριος como título cristológico natural en español.
  - «Doy gracias» refleja el giro idiomático de χάριν ἔχω sin perder formalidad.
  - «Fiel» y «consideró» reproducen con claridad la valoración de Pablo en la oración.
  - La frase «al ponerme en el ministerio» conserva la relación sintáctica del participio sin sobrerreformular el texto.
