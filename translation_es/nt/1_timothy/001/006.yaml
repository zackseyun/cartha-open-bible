    rationale: '"habiendo errado el blanco en estas cosas" es torpe en español. Es preferible "habiéndose desviado de estas cosas" o "habiendo fallado en alcanzar estas cosas".'
  - severity: low
    issue: '"vanas palabrerías" es algo recargado'
    rationale: El sustantivo ya contiene la idea de palabrería vacía. Una opción más limpia como "palabras vacías" mantiene bien el sentido de ματαιολογίαν.
