translation:
  language: es
  text: Algunos[a], habiéndose desviado de estas cosas, se desviaron hacia palabras vacías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "habiendo fallado en alcanzar estas cosas". El verbo puede expresar la idea de no alcanzar una meta o desviarse de ella.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "discusión vana" o "palabras sin sentido".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - de las cuales
  - esto
  - las cuales
  lexicon: BDAG
  rationale: El relativo genitivo mira hacia atrás a los rasgos éticos mencionados en el v. 5. En español, "estas cosas" conserva la referencia anafórica y hace natural el vínculo con el contexto inmediato sin forzar una formulación demasiado literal.
- source_word: τινες
  english_pob_choice: Some
  chosen_spanish: Algunos
  alternatives_spanish:
  - ciertos
  - algunas personas
  lexicon: BDAG
  rationale: El indefinido marca un subconjunto no especificado. "Algunos" es natural en español y preserva la indefinición intencional del texto.
- source_word: ἀστοχήσαντες
  english_pob_choice: having missed
  chosen_spanish: habiendo errado
  alternatives_spanish:
  - habiendo fallado
  - habiéndose desviado
  - habiendo perdido el blanco
  lexicon: BDAG
  rationale: El verbo puede significar fallar el objetivo o desviarse de él. "Habiendo errado" mantiene la imagen de no dar en el blanco y funciona bien en español; no impone todavía una interpretación más fuerte que la del griego.
- source_word: ἐξετράπησαν
  english_pob_choice: have turned aside
  chosen_spanish: se han apartado
  alternatives_spanish:
  - se han desviado
  - han girado hacia un lado
  - han sido apartados
  lexicon: BDAG
  rationale: La forma verbal expresa apartarse de un camino correcto. "Se han apartado" conserva la metáfora direccional y suena natural en español contemporáneo.
- source_word: ματαιολογίαν
  english_pob_choice: empty talk
  chosen_spanish: vanas palabrerías
  alternatives_spanish:
  - hablar vacío
  - discursos vanos
  - conversación inútil
  lexicon: BDAG
  rationale: El sustantivo denota discurso inútil, vacío, sin provecho. "Vanas palabrerías" reproduce bien la fuerza negativa y el carácter polémico del término, aunque es algo más enfático que "habla vacía".
theological_decisions:
- issue: Alcance del antecedente de ὧν
  english_pob_reading: It refers to the preceding ethical/spiritual aims in v. 5, rendered generically as 'these things.'
  chosen_spanish_reading: Se refiere a las cualidades y metas mencionadas en el v. 5, expresadas genéricamente como "estas cosas".
  alternative_spanish_readings:
  - Se refiere más estrechamente a la tríada final del v. 5
  - 'Podría traducirse de manera más literal: "de las cuales"'
  rationale: El griego depende del contexto previo, y la traducción debe hacer visible ese enlace. "Estas cosas" mantiene la referencia retrospectiva sin cerrar indebidamente el sentido a un subconjunto más estrecho que el que el flujo del discurso exige.
  doctrine_reference: Contexto inmediato de 1 Timoteo 1:5-6; coherencia discursiva y anáfora textual.
translation_notes:
  revision_awareness: 'El pasaje presenta una decisión estable en el audit trail inglés: ἀστοχήσαντες se mantiene cerca de la metáfora de "fallar el blanco" o "errar", y εἰς ματαιολογίαν se vierte como un discurso vacío o inútil. La revisión más reciente no introdujo cambios, y el consenso externo reporta sólo observaciones menores.'
  spanish_consistency_notes:
  - Mantengo "algunos" para τινες y no lo amplío a "algunos hombres" o "algunas personas" porque el griego no lo especifica.
  - Uso "estas cosas" para ὧν para conservar la referencia al contexto previo del v. 5.
  - Conservo una estructura verbal compuesta y participial que refleja la secuencia del original sin volverla rígida.
  - '"Vanas palabrerías" comunica la carga despectiva de ματαιολογίαν, aunque la nota ofrece alternativas más literales.'
