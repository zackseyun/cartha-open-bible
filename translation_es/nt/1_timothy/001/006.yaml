    issue: '"habiendo errado en estas cosas" no refleja con precisión ἀστοχήσαντες'
    rationale: En español, "errar en" suele significar equivocarse acerca de algo. El griego apunta más a faltar al blanco/meta o desviarse de ella, en referencia a las cualidades del v. 5.
  - severity: low
    issue: '"se han apartado a" suena menos natural en español'
    rationale: Aunque comprensible, con un complemento de destino abstracto español fluye mejor con "se desviaron hacia" o "se han desviado hacia".
  - severity: low
