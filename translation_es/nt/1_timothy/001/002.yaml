translation:
  language: es
  text: 'A Timoteo[a], mi verdadero hijo en la fe: gracia, misericordia[b] y paz de parte de Dios el Padre y de Mesías Jesús nuestro Señor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi genuino hijo en fe».'
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «Cristo Jesús nuestro Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: γνησίῳ
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - genuino
  - legítimo
  lexicon: BDAG
  rationale: ‘Verdadero’ comunica autenticidad de la relación espiritual sin sugerir filiación biológica. En español suena natural junto a ‘hijo’ y conserva el valor afectivo y relacional del griego.
- source_word: τέκνῳ
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - hija
  - hijo/a
  - niño
  lexicon: BDAG
  rationale: Aunque τέκνον es más amplio que ‘hijo’, en español ‘hijo’ funciona idiomáticamente para la metáfora de paternidad espiritual. Mantiene cercanía y no exige una formulación pesada como ‘hijo/descendiente’.
- source_word: ἐν πίστει
  english_pob_choice: in the faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - en fe
  - por la fe
  lexicon: BDAG
  rationale: La frase probablemente señala la esfera o relación compartida de la fe cristiana, no solo el acto subjetivo de creer. ‘En la fe’ preserva esa amplitud y sigue siendo natural en español.
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: Es el equivalente léxico estándar y conserva el tono paulino de la salutación.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - piedad
  - compasión
  lexicon: BDAG
  rationale: ‘Misericordia’ es el equivalente directo y reconocido en español bíblico, sin perder la tercera pieza distintiva de la fórmula pastoral.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - tranquilidad
  lexicon: BDAG
  rationale: ‘Paz’ mantiene el valor teológico y epistolar habitual del término.
- source_word: θεοῦ πατρὸς
  english_pob_choice: God the Father
  chosen_spanish: Dios el Padre
  alternatives_spanish:
  - Dios Padre
  - de Dios, el Padre
  lexicon: BDAG
  rationale: En español, ‘de parte de Dios el Padre’ expresa con naturalidad el origen de la bendición. Se evita sobrecargar la frase con una puntuación ajena al flujo del saludo.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se sigue la preferencia del proyecto por traducir el título como ‘Mesías’ cuando funciona titularmente. En este contexto conserva el valor confesional del nombre-título sin recurrir al latinismo tradicional.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar en español.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - nuestro Dueño
  - nuestro Maestro
  lexicon: BDAG
  rationale: ‘Señor’ preserva la función cristológica y litúrgica del término, y ‘nuestro Señor’ refleja el genitivo plural del griego.
theological_decisions:
- issue: Renderizar Χριστοῦ Ἰησοῦ
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  - Jesucristo
  rationale: Se mantiene la política del proyecto de traducir Χριστός como título (‘Mesías’) en lugar de conservar automáticamente ‘Cristo’. Esto evita ocultar el sentido titular del griego y sigue la trazabilidad doctrinal del POB.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms table for Χριστός'
- issue: Sentido de ἐν πίστει
  english_pob_reading: in the faith
  chosen_spanish_reading: en la fe
  alternative_spanish_readings:
  - por la fe
  - en fe
  rationale: La formulación conserva la tensión entre pertenencia compartida y acto creyente, sin reducir el sintagma a una sola lectura técnica.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por una ida y vuelta sobre Χριστοῦ Ἰησοῦ: una revisión cambió «Messiah Jesus» a «Christ Jesus» por naturalidad, y luego se restauró «Messiah Jesus» por la política doctrinal del proyecto. La versión española sigue la lectura restaurada y conserva la elección titular ‘Mesías’.'
  spanish_consistency_notes:
  - Usa ‘Mesías’ para Χριστός en el texto principal, conforme al criterio del proyecto.
  - Mantiene ‘Señor’ para κύριος por su valor cristológico establecido en español.
  - 'Evita calcos rígidos: ‘de parte de Dios el Padre y de Mesías Jesús nuestro Señor’ mantiene fluidez española sin borrar la estructura griega.'
  - ‘En la fe’ conserva la ambigüedad útil del sintagma preposicional sin forzar una interpretación única.
