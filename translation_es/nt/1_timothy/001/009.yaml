translation:
  language: es
  text: 'entendiendo esto: la ley no está establecida para una persona justa, sino para los sin ley y rebeldes, los impíos y pecadores, los irreverentes y profanos, los que matan[a] a sus padres y los que matan[a] a sus madres, homicidas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «los que golpean a sus padres y los que golpean a sus madres»; los términos griegos pueden referirse a agresión violenta contra los padres, aunque en este contexto probablemente significa «matan».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς τοῦτο
  english_pob_choice: understanding this
  chosen_spanish: entendiendo esto
  alternatives_spanish:
  - sabiendo esto
  - comprendiendo esto
  lexicon: BDAG
  rationale: El participio introduce la base de la instrucción anterior; «entendiendo esto» conserva el matiz cognitivo de εἰδώς con español natural y sobrio.
- source_word: δικαίῳ
  english_pob_choice: for a righteous person
  chosen_spanish: para una persona justa
  alternatives_spanish:
  - para el justo
  - para una persona recta
  lexicon: BDAG
  rationale: La forma singular dativa se conserva con valor representativo. «Persona justa» mantiene la claridad en español sin masculinizar innecesariamente el referente genérico.
- source_word: νόμος οὐ κεῖται
  english_pob_choice: the law is not laid down
  chosen_spanish: la ley no está establecida
  alternatives_spanish:
  - la ley no es promulgada
  - la ley no está puesta
  lexicon: BDAG
  rationale: κεῖται expresa la idea de ser puesta/establecida. «Está establecida» preserva el sentido jurídico de institución o disposición, con buena naturalidad en español.
- source_word: ἀνόμοις
  english_pob_choice: the lawless
  chosen_spanish: los sin ley
  alternatives_spanish:
  - los ilegales
  - los transgresores de la ley
  lexicon: BDAG
  rationale: Se conserva el valor moral-jurídico del término. «Los sin ley» refleja directamente la formación griega sin introducir una paráfrasis más interpretativa.
- source_word: ἀνυποτάκτοις
  english_pob_choice: rebellious
  chosen_spanish: rebeldes
  alternatives_spanish:
  - insubordinados
  - no sometidos
  lexicon: BDAG
  rationale: «Rebeldes» es la equivalencia más natural y comunica la negativa a someterse sin perder fuerza.
- source_word: ἀσεβέσι
  english_pob_choice: ungodly
  chosen_spanish: impíos
  alternatives_spanish:
  - sin reverencia
  - irreverentes
  lexicon: BDAG
  rationale: «Impíos» es el equivalente tradicional y claro para irreverencia o falta de piedad hacia Dios.
- source_word: ἁμαρτωλοῖς
  english_pob_choice: sinful
  chosen_spanish: pecadores
  alternatives_spanish:
  - pecaminosos
  - los que pecan
  lexicon: BDAG
  rationale: Aunque el inglés POB usa un adjetivo, en español «pecadores» suena más natural dentro de una lista nominal y conserva el sentido moral.
- source_word: ἀνοσίοις
  english_pob_choice: unholy
  chosen_spanish: los impuros
  alternatives_spanish:
  - los no santos
  - los no consagrados
  lexicon: BDAG
  rationale: Para evitar duplicar demasiado «impíos/profanos», se opta por «impuros», que en español puede comunicar bien la falta de santidad/reverencia según el contexto de la lista.
- source_word: βεβήλοις
  english_pob_choice: profane
  chosen_spanish: profanos
  alternatives_spanish:
  - irreverentes
  - comunes
  lexicon: BDAG
  rationale: «Profanos» conserva el contraste con lo sagrado y sigue de cerca la fuerza de βέβηλος.
- source_word: πατρολῴαις
  english_pob_choice: those who kill their fathers
  chosen_spanish: los que matan a sus padres
  alternatives_spanish:
  - patricidas
  - los que golpean a sus padres
  lexicon: BDAG
  rationale: El término puede abarcar agresión o asesinato a un progenitor masculino; en esta lista de vicios, el sentido severo es probable, pero en español se evita una construcción demasiado especializada y se mantiene la posibilidad semántica amplia dentro de la pareja con μητρολῴαις.
- source_word: μητρολῴαις
  english_pob_choice: those who kill their mothers
  chosen_spanish: los que matan a sus madres
  alternatives_spanish:
  - matricidas
  - los que golpean a sus madres
  lexicon: BDAG
  rationale: Se conserva el paralelismo con πατρολῴαις. La traducción directa mantiene la gravedad del vicio sin perder la posibilidad lexical más amplia indicada por la nota de auditoría.
- source_word: ἀνδροφόνοις
  english_pob_choice: murderers
  chosen_spanish: homicidas
  alternatives_spanish:
  - asesinos
  - matadores
  lexicon: BDAG
  rationale: En español bíblico y general, «homicidas» preserva el peso de la lista de delitos de sangre sin restringirlo solo a un registro jurídico moderno; además evita una repetición excesiva de «matan».
theological_decisions:
- issue: Fuerza representativa del singular en δικαίῳ
  english_pob_reading: a righteous person
  chosen_spanish_reading: una persona justa
  alternative_spanish_readings:
  - el justo
  - una persona recta
  rationale: El griego usa un singular masculino con valor representativo. En español, «persona justa» preserva la singularidad y el carácter genérico sin convertirlo en plural ni borrar el matiz del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Ambigüedad lexical de πατρολῴαις / μητρολῴαις
  english_pob_reading: those who kill their fathers / those who kill their mothers
  chosen_spanish_reading: los que matan a sus padres / los que matan a sus madres
  alternative_spanish_readings:
  - los que golpean a sus padres / madres
  - patricidas / matricidas
  rationale: Los términos raros pueden referirse a agresión violenta o asesinato; en esta vice-list, y por la cercanía con «homicidas», el sentido más fuerte es probablemente el correcto. La traducción mantiene esa decisión sin ocultar la tensión lexical.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión inglesa cambió de «a righteous man» a «a righteous person» para preservar la singularidad con un referente genérico más natural. La versión española sigue esa intención con «una persona justa», y mantiene sin cambios la lectura lexical principal de la lista de vicios.
  spanish_consistency_notes:
  - Se mantiene «ley» para νόμος conforme al contexto jurídico.
  - Se evita «Cristo» y cualquier terminología no presente en el versículo.
  - La secuencia nominal en plural se conserva para reflejar la lista griega.
  - No se añaden notas al pie porque la nota inglesa sobre πατρολῴαις / μητρολῴαις se integra en la elección léxica sin requerir marcador en el texto.
