review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: participio introductorio, singular representativo en δικαίῳ, negación con νόμος οὐ κεῖται y la serie de dativos de personas para quienes la ley es puesta. Sin embargo, dos decisiones requieren ajuste para alinearse mejor con la evidencia y la auditoría inglesa: (1) ἀνοσίοις se acerca más a «impíos hacia lo sagrado / no santos / irreverentes» que a «impuros», que en español desplaza el sentido hacia pureza ritual o moral-sexual; (2) la auditoría inglesa preservó explícitamente en nota la alternativa «golpear» para πατρολῴαις / μητρολῴαις, y el español debe conservar esa incertidumbre léxica con nota equivalente.'
  spanish_quality_summary: El español es claro y legible, con tono moderno y digno. «Entendiendo esto» funciona, y «la ley no está establecida» es aceptable, aunque algo menos idiomático que «no fue establecida / no está puesta». «Los sin ley» suena algo calcado pero todavía comprensible en registro bíblico. El problema principal de calidad es «impuros», porque introduce una asociación semántica no presente en ἀνοσίοις y además debilita el contraste con «profanos».
  glossary_alignment: No hay conflictos con los términos de proyecto principales. La revisión propuesta mantiene «justa», «impíos», «profanos» y «homicidas». Se corrige ἀνοσίοις a «irreverentes» para preservar mejor la distinción semántica de la serie ἀσεβέσι / ἁμαρτωλοῖς / ἀνοσίοις / βεβήλοις. También se añade una nota léxica para πατρολῴαις / μητρολῴαις conforme al rastro POB en inglés.
  issues:
  - severity: medium
    issue: «impuros» para ἀνοσίοις
    rationale: ἀνόσιος se refiere a lo no santo, impío o irreverente respecto de lo sagrado; «impuros» en español suele sugerir impureza ritual o moral, especialmente corporal/sexual, y no preserva bien la oposición con «profanos».
  - severity: medium
    issue: Falta la nota sobre la ambigüedad de πατρολῴαις / μητρολῴαις
    rationale: La auditoría inglesa conserva explícitamente la alternativa «golpear» además de «matar». El español debe reflejar esa incertidumbre léxica para fidelidad documental y auditabilidad.
  - severity: low
    issue: «los sin ley» es algo calcado
    rationale: No es incorrecto, pero suena menos natural en español general que «los transgresores» o «los que viven sin ley». Aun así, puede conservarse por cercanía al original si no se desea una paráfrasis mayor.
  revised_spanish_text: 'entendiendo esto: la ley no está establecida para una persona justa, sino para los sin ley y rebeldes, los impíos y pecadores, los irreverentes y profanos, los que matan[a] a sus padres y los que matan[a] a sus madres, homicidas.'
  revised_footnotes:
