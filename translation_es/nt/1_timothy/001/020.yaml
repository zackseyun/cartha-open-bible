  text: ὧν ἐστιν Ὑμέναιος καὶ Ἀλέξανδρος, οὓς παρέδωκα τῷ Σατανᾷ ἵνα παιδευθῶσι μὴ βλασφημεῖν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/020.yaml
  text: among whom are Hymenaeus and Alexander[b][a], whom I have handed over to Satan so that they may be taught not to blaspheme.
  footnotes:
