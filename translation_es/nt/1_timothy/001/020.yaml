    text: Or 'delivered over to Satan.' The phrase likely refers to severe corrective discipline rather than final condemnation.
    reason: lexical_alternative
  - marker: b
    text: '''Disciplined'' can also be rendered ''taught,'' ''trained,'' or ''corrected''; the Greek term includes the idea of formative correction.'
    reason: lexical_alternative
