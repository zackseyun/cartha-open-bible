translation:
  language: es
  text: entre los cuales están Himeneo y Alejandro, a quienes he entregado[a] a Satanás para que aprendan[b] a no blasfemar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'entregado a Satanás'. La expresión probablemente alude a una disciplina correctiva severa más que a una condenación final.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse 'sean enseñados', 'sean instruidos' o 'sean disciplinados'; el verbo griego incluye la idea de corrección formativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν ἐστιν
  english_pob_choice: among whom are
  chosen_spanish: entre los cuales están
  alternatives_spanish:
  - de los cuales están
  - entre quienes están
  lexicon: BDAG
  rationale: El relativo en genitivo tiene sentido partitivo o de inclusión; en español, 'entre los cuales están' conserva mejor ese matiz relacional que una construcción más literal y menos natural.
- source_word: Ὑμέναιος καὶ Ἀλέξανδρος
  english_pob_choice: Hymenaeus and Alexander
  chosen_spanish: Himeneo y Alejandro
  alternatives_spanish:
  - Hymenaeus y Alexander
  - Himeneo y Alexandre
  lexicon: Convención onomástica del NT
  rationale: Se usan las formas castellanas habituales de los nombres propios, manteniendo la identificación directa del texto griego.
- source_word: παρέδωκα
  english_pob_choice: have handed over
  chosen_spanish: he entregado
  alternatives_spanish:
  - he puesto en manos de
  - he entregado al poder de
  lexicon: BDAG
  rationale: '''Entregar'' reproduce bien παραδίδωμι en un registro claro y sobrio; el perfecto español preserva la conexión con la situación vigente en el contexto.'
- source_word: τῷ Σατανᾷ
  english_pob_choice: to Satan
  chosen_spanish: a Satanás
  alternatives_spanish:
  - al Adversario
  lexicon: BDAG
  rationale: Se conserva el nombre propio demonológico estándar del NT sin sustituirlo por una paráfrasis explicativa.
- source_word: ἵνα παιδευθῶσι
  english_pob_choice: so that they may be taught / disciplined
  chosen_spanish: para que sean corregidos
  alternatives_spanish:
  - para que sean enseñados
  - para que sean disciplinados
  - para que sean instruidos
  lexicon: BDAG
  rationale: παιδεύω puede abarcar instrucción, formación y disciplina correctiva. En este contexto, 'corregidos' comunica la finalidad remedial sin reducirlo a enseñanza intelectual ni endurecerlo indebidamente como castigo físico.
- source_word: μὴ βλασφημεῖν
  english_pob_choice: not to blaspheme
  chosen_spanish: para no blasfemar
  alternatives_spanish:
  - a fin de no blasfemar
  - para que no blasfemen
  lexicon: BDAG
  rationale: '''Blasfemar'' mantiene la gravedad teológica del verbo y en español suena natural con la negación final expresada por el infinitivo.'
theological_decisions:
- issue: Sentido de 'entregar a Satanás'
  english_pob_reading: A severe act of apostolic/church discipline placing the offenders outside the church's protective sphere for corrective purpose.
  chosen_spanish_reading: Una acción severa de disciplina apostólica/eclesial, con finalidad correctiva, sin convertirla en una sentencia final de condenación.
  alternative_spanish_readings:
  - los entregué a Satanás para castigo definitivo
  - los entregué a Satanás mediante un juicio meramente simbólico
  rationale: La cláusula de propósito indica corrección y no condenación final. El español conserva la expresión literal y deja intacta la tensión interpretativa documentada por la POB.
  doctrine_reference: Preservar la tensión teológica; no resolver de antemano el mecanismo eclesial exacto.
translation_notes:
  revision_awareness: El borrador sigue la última revisión del audit trail inglés, que prefirió una formulación más cercana a 'taught' para παιδευθῶσι, pero en español se opta por 'corregidos' por ser la opción más natural y suficientemente amplia para conservar tanto instrucción como disciplina correctiva sin perder la finalidad remedial.
  spanish_consistency_notes:
  - Se mantiene 'Satanás' como nombre propio, no 'el Adversario', por coherencia con la terminología POB para este caso.
  - La traducción conserva un tono formal y publicable, evitando tecnicismos excesivos pero sin diluir la fuerza disciplinaria del pasaje.
  - '''Para no blasfemar'' conserva mejor la construcción final y la gravedad del verbo que una paráfrasis más larga.'
