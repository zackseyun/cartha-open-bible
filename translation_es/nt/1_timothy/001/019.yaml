translation:
  language: es
  text: manteniendo la fe[b] y una buena conciencia, la cual[a] algunos, habiéndola rechazado, naufragaron en cuanto a la fe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "manteniendo la fe y una buena conciencia, la cual algunos han rechazado y han naufragado en cuanto a la fe". El relativo "la cual" se entiende más naturalmente de "conciencia", aunque algunos lo toman de manera más amplia.'
    reason: alternative_reading
  - marker: b
    text: '"Fe" también puede entenderse, en menor medida aquí, como "confianza" o "fidelidad".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχων
  english_pob_choice: holding
  chosen_spanish: manteniendo
  alternatives_spanish:
  - teniendo
  - reteniendo
  - sosteniendo
  lexicon: BDAG
  rationale: El participio describe una actitud continua del sujeto implícito; en español, 'manteniendo' comunica mejor la idea activa de conservar que un mero 'teniendo', y evita sonar demasiado literal o estático.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la confianza
  - la fidelidad
  lexicon: BDAG
  rationale: En este contexto, la lectura principal es la fe cristiana; 'la fe' preserva el valor doctrinal y coincide con la decisión auditada en inglés. 'Confianza' o 'fidelidad' quedan como posibilidades semánticas, pero no como opción principal aquí.
- source_word: ἀγαθὴν συνείδησιν
  english_pob_choice: a good conscience
  chosen_spanish: una buena conciencia
  alternatives_spanish:
  - una conciencia limpia
  - una conciencia clara
  lexicon: BDAG
  rationale: '''Buena'' traduce directamente ἀγαθή y mantiene el juicio moral general del griego. ''Conciencia limpia/clara'' sería más interpretativo y estrecharía el sentido hacia la sensación subjetiva de ausencia de culpa.'
- source_word: ἥν
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - que
  - la cual conciencia
  lexicon: BDAG
  rationale: El pronombre relativo femenino singular puede referirse más naturalmente a 'conciencia'. En español, 'la cual' permite conservar esa relación gramatical sin decidir de manera excesiva entre los posibles antecedentes.
- source_word: ἀπωσάμενοι
  english_pob_choice: having rejected
  chosen_spanish: habiéndola rechazado
  alternatives_spanish:
  - habiéndola apartado
  - rechazándola
  lexicon: BDAG
  rationale: El participio medio implica rechazo deliberado. 'Habiéndola rechazado' conserva la fuerza verbal y la relación con el antecedente femenino singular ('conciencia').
- source_word: περὶ τὴν πίστιν
  english_pob_choice: concerning the faith
  chosen_spanish: en cuanto a la fe
  alternatives_spanish:
  - con respecto a la fe
  - acerca de la fe
  lexicon: BDAG
  rationale: La preposición expresa el ámbito o respecto del naufragio. 'En cuanto a' reproduce bien ese valor relacional en español sin perder naturalidad.
- source_word: ἐναυάγησαν
  english_pob_choice: have suffered shipwreck
  chosen_spanish: naufragaron
  alternatives_spanish:
  - sufrieron naufragio
  - hicieron naufragio
  lexicon: BDAG
  rationale: El verbo es metafórico. 'Naufragaron' mantiene la imagen de desastre de forma natural en español. 'Sufrieron naufragio' es más explícito, pero menos ágil; 'hicieron naufragio' suena más tradicional y menos idiomático.
theological_decisions:
- issue: Referencia de ἥν
  english_pob_reading: The relative pronoun refers specifically to 'a good conscience,' not jointly to both 'faith and a good conscience.'
  chosen_spanish_reading: '''La cual'' se entiende primariamente de ''una buena conciencia''.'
  alternative_spanish_readings:
  - Puede leerse de manera más amplia, refiriéndose al conjunto 'la fe y una buena conciencia'.
  rationale: La forma femenina singular favorece 'conciencia' como antecedente inmediato. La redacción española conserva esa tensión sin resolverla de forma rígida; el contexto muestra que el naufragio ocurre en relación con la fe después de rechazar la conciencia.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
- issue: Valor de πίστις en el cierre de la frase
  english_pob_reading: '''Faith'' could also be understood as ''trust'' or, less likely here, ''faithfulness.'''
  chosen_spanish_reading: '''La fe'' es la lectura principal; ''confianza'' y ''fidelidad'' quedan como alternativas semánticas secundarias.'
  alternative_spanish_readings:
  - '''la confianza'''
  - '''la fidelidad'''
  rationale: El artículo y el contexto pastoral favorecen la fe cristiana objetiva. En español conviene mantener el término eclesial estándar, sin borrar que el campo semántico incluye confianza y, menos probablemente aquí, fidelidad.
  doctrine_reference: Project terminology default on πίστις / faith
- issue: Imagen metafórica del verbo ναυαγέω
  english_pob_reading: have suffered shipwreck
  chosen_spanish_reading: naufragaron
  alternative_spanish_readings:
  - sufrieron naufragio
  - hicieron naufragio
  rationale: La metáfora se conserva sin añadir explicaciones. 'Naufragaron' es suficientemente vívido y fiel al griego, y evita tanto la literalidad pesada como la reinterpretación doctrinal.
  doctrine_reference: Translation philosophy §2 (preserve metaphor when intelligible)
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: conserva el orden participial ''habiéndola rechazado'' y evita conectores interpretativos añadidos como ''así'' o ''por eso''.'
  spanish_consistency_notes:
  - Se mantiene 'fe' en el texto principal, conforme al valor doctrinal normal de πίστις en este proyecto.
  - '''Conciencia'' traduce συνείδησις de forma transparente y consistente con el léxico del NT.'
  - '''Naufragaron'' conserva la metáfora verbal del griego sin convertirla en paráfrasis explicativa.'
  - Los marcadores [a] y [b] aparecen exactamente en el texto y están anclados a las expresiones correspondientes.
