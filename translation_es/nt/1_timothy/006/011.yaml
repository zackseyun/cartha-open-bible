  to: Pero tú, hombre de Dios, huye de estas cosas; y persigue la rectitud[a], la piedad, la fe[b], el amor, la perseverancia y la mansedumbre[c].
  rationale: Se ajusta δικαιοσύνη al sentido principal auditado del POB mediante «rectitud» en el texto y «justicia» en nota; se elimina la nota innecesaria del vocativo; se mejora la fluidez española con «y persigue»; y se corrige la nota del término raro para acercarla más a las alternativas documentadas en inglés.
