translation:
  language: es
  text: Pero tú, hombre de Dios, huye de estas cosas; y persigue la rectitud[a], la piedad, la fe[b], el amor, la perseverancia y la mansedumbre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia».
    reason: lexical_alternative
  - marker: b
    text: O «fidelidad» o «confianza».
    reason: lexical_alternative
  - marker: c
    text: El término griego raro también puede rendirse «gentileza», «tolerancia» o «mansedumbre paciente».
    reason: lexical_alternative
lexical_decisions:
- source_word: Σὺ δέ
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Pero en cuanto a ti
  - Tú, sin embargo
  lexicon: BDAG
  rationale: Conserva el contraste fuerte de δέ y el pronombre enfático en segunda persona. «Pero tú» es natural en español y mantiene la brevedad y el énfasis.
- source_word: ὦ ἄνθρωπε θεοῦ
  english_pob_choice: man of God
  chosen_spanish: hombre de Dios
  alternatives_spanish:
  - oh hombre de Dios
  - persona de Dios
  lexicon: BDAG
  rationale: La forma vocativa griega es masculina singular y funciona como apelativo directo. «Hombre de Dios» conserva la idiomaticidad bíblica y la fuerza del título; se omite «oh» por estilo español más natural.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  - tales cosas
  lexicon: BDAG
  rationale: El demostrativo apunta a los vicios y errores inmediatamente previos. «Estas cosas» lo explicita sin añadir contenido ajeno.
- source_word: φεῦγε
  english_pob_choice: flee
  chosen_spanish: huye
  alternatives_spanish:
  - aléjate de
  - evita
  lexicon: BDAG
  rationale: El imperativo presente exige una evitación en curso. «Huye» conserva la urgencia y el color moral del verbo mejor que una opción más débil como «evita».
- source_word: δίωκε
  english_pob_choice: pursue
  chosen_spanish: persigue
  alternatives_spanish:
  - busca con empeño
  - procura
  lexicon: BDAG
  rationale: Mantiene el paralelo con «huye» y la idea de una búsqueda activa y persistente de las virtudes enumeradas.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia/righteousness
  lexicon: BDAG
  rationale: Se conserva la opción preferida para δικαιοσύνη en el corpus POB español, con «justicia» como equivalente natural en español. En esta lista de virtudes puede incluir tanto justicia moral como rectitud.
- source_word: εὐσέβειαν
  english_pob_choice: godliness
  chosen_spanish: la piedad
  alternatives_spanish:
  - la devoción
  - la reverencia a Dios
  lexicon: BDAG
  rationale: En este contexto de virtud cristiana, «piedad» comunica bien la vida reverente orientada a Dios. Es una opción más idiomática en español que un calco como «divinidad».
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fidelidad
  - la confianza
  lexicon: BDAG
  rationale: Se mantiene la traducción principal del POB. En una lista de virtudes, «fe» conserva la ambigüedad productiva entre creer y ser fiel; por eso se preserva la alternativa en nota.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: el amor
  lexicon: BDAG
  rationale: Correspondencia directa y clara en español para la virtud central del vocabulario cristiano.
- source_word: ὑπομονήν
  english_pob_choice: steadfastness
  chosen_spanish: la perseverancia
  alternatives_spanish:
  - la constancia
  - la paciencia
  - la firmeza
  lexicon: BDAG
  rationale: «Perseverancia» expresa la resistencia sostenida bajo presión que el término denota. En español comunica bien la continuidad activa sin reducir el sentido a simple paciencia pasiva.
- source_word: πραϋπαθίαν
  english_pob_choice: gentleness
  chosen_spanish: la mansedumbre
  alternatives_spanish:
  - la gentileza
  - la suavidad
  - la mansedumbre paciente
  lexicon: BDAG
  rationale: La forma rara combina suavidad y control paciente; «mansedumbre» preserva mejor esa cualidad bíblica que un término más moderno pero menos preciso. Se añade nota para la amplitud semántica.
theological_decisions:
- issue: Valor vocativo y masculino de ὦ ἄνθρωπε θεοῦ
  english_pob_reading: man of God
  chosen_spanish_reading: hombre de Dios
  alternative_spanish_readings:
  - persona de Dios
  rationale: El griego es vocativo masculino singular y el POB inglés preserva esa forma. Se evita neutralizar el género porque el apelativo es parte del registro y de la estructura del texto.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: δικαιοσύνην en una lista de virtudes
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: El POB inglés mantiene «righteousness» y anota «justice» como alternativa; en español, «justicia» es la forma principal más directa y audible, sin borrar el matiz de rectitud moral.
  doctrine_reference: 'DOCTRINE.md § Contested terms: δικαιοσύνη'
- issue: πίστιν como virtud
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: En esta lista la palabra puede abarcar confianza creyente y fidelidad. Se conserva «fe» como forma principal y se deja visible la alternativa semántica en nota.
  doctrine_reference: 'DOCTRINE.md § Contested terms: πίστις'
- issue: πραϋπαθίαν, término raro
  english_pob_reading: gentleness
  chosen_spanish_reading: mansedumbre
  alternative_spanish_readings:
  - gentileza
  - suavidad
  - mansedumbre paciente
  rationale: El término griego combina mansedumbre con moderación paciente; «mansedumbre» mantiene el tono bíblico y evita reducirlo a simple amabilidad. La nota conserva la amplitud del término raro.
  doctrine_reference: DOCTRINE.md § Lexical transparency and rare terms
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió «and pursue» por «but pursue» para reflejar mejor δέ. La redacción española conserva ese contraste con «pero ...; pero persigue», y mantiene la lista de virtudes sin añadir conectores que atenúen la oposición. También se cuidó no borrar las alternativas léxicas documentadas para δικαιοσύνη, πίστις y πραϋπαθία.
  spanish_consistency_notes:
  - Se emplea «Dios» para θεοῦ conforme al estándar POB en español.
  - Se usa «fe» como término principal para πίστις y se documenta la alternativa «fidelidad/confianza» en nota.
  - Se evita «Cristo» o terminología no presente en el versículo.
  - Se mantiene puntuación española con punto y coma para separar la doble exhortación.
  - Se conserva el tono exhortativo directo y la enumeración de virtudes en forma nominal.
