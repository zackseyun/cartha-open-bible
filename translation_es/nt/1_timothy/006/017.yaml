    reason: lexical_alternative
  - marker: b
    text: O «en riquezas inciertas».
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación y el contenido de la nota [b] para que refleje exactamente la alternativa léxica documentada en el POB inglés. Se ajusta 'abundantemente' a 'ricamente' para preservar el eco léxico del original. Además, se suaviza la sintaxis con 'en el presente siglo' y se usa 'arrogantes' por claridad moderna. El resto del sentido se mantiene intacto.
