translation:
  language: es
  text: Manda a los ricos en el presente siglo[a] que no sean arrogantes ni pongan su esperanza en la incertidumbre de las riquezas[b], sino en Dios, que nos provee ricamente de todo para que lo disfrutemos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en esta era presente». El griego puede referirse al «siglo» o, por extensión, al orden mundial presente; «siglo» conserva mejor el contraste temporal de Pablo.
    reason: lexical_alternative
  - marker: b
    text: O «en riquezas inciertas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῖς πλουσίοις
  english_pob_choice: those who are rich
  chosen_spanish: los ricos
  alternatives_spanish:
  - los que son ricos
  - personas ricas
  lexicon: BDAG
  rationale: El dativo con artículo funciona de manera sustantiva; en español, «los ricos» es natural y conserva la dirección del mandato sin añadir paráfrasis.
- source_word: ἐν τῷ νῦν αἰῶνι
  english_pob_choice: in the present age
  chosen_spanish: en este siglo presente
  alternatives_spanish:
  - en esta era presente
  - en el presente siglo
  lexicon: BDAG
  rationale: «αἰών» aquí apunta a una era o orden temporal, no solo al mundo físico. «Siglo» preserva bien la dimensión temporal y escatológica; «presente» refuerza el contraste con la era venidera.
- source_word: παράγγελλε
  english_pob_choice: Command
  chosen_spanish: Manda
  alternatives_spanish:
  - Ordena
  - Encarga
  lexicon: BDAG
  rationale: El imperativo tiene fuerza autoritativa. «Manda» comunica bien esa intensidad en español contemporáneo sin sonar excesivamente técnico.
- source_word: μὴ ὑψηλοφρονεῖν
  english_pob_choice: not to be arrogant
  chosen_spanish: que no sean altivos
  alternatives_spanish:
  - que no sean arrogantes
  - que no tengan pensamientos orgullosos
  lexicon: BDAG
  rationale: El verbo expresa altivez o soberbia; «altivos» es una opción natural y digna en español, aunque «arrogantes» también sería posible.
- source_word: μηδὲ ἠλπικέναι
  english_pob_choice: nor to set their hope
  chosen_spanish: ni pongan su esperanza
  alternatives_spanish:
  - ni depositen su esperanza
  - ni confíen
  lexicon: BDAG
  rationale: El perfecto infinitivo indica una esperanza ya asentada. «Pongan su esperanza» expresa ese acto de orientar la confianza hacia algo.
- source_word: ἐπὶ πλούτου ἀδηλότητι
  english_pob_choice: on the uncertainty of riches
  chosen_spanish: en la incertidumbre de las riquezas
  alternatives_spanish:
  - en riquezas inciertas
  - en la inestabilidad de las riquezas
  lexicon: BDAG
  rationale: La construcción caracteriza a las riquezas como inciertas. «Incertidumbre de las riquezas» mantiene la relación genitiva sin resolverla demasiado, y conserva el contraste moral del pasaje.
- source_word: ἀλλ’ ἐπὶ θεῷ
  english_pob_choice: but on God
  chosen_spanish: sino en Dios
  alternatives_spanish:
  - sino sobre Dios
  - sino en el Dios vivo
  lexicon: BDAG
  rationale: El paralelo con la frase anterior exige mantener el contraste de dependencia/esperanza. «Sino en Dios» es la formulación más natural en español y preserva el objeto de la confianza.
- source_word: τῷ παρέχοντι ἡμῖν
  english_pob_choice: who ... provides us
  chosen_spanish: que nos provee
  alternatives_spanish:
  - que nos da
  - que nos suministra
  lexicon: BDAG
  rationale: El participio atributivo describe a Dios como el que provee. «Provee» comunica bien la idea de suministro generoso y continuo.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: de todo
  alternatives_spanish:
  - todo
  - todas las cosas
  lexicon: BDAG
  rationale: El neutro plural abarca amplitud sin limitarse a necesidades. «De todo» suena natural en español junto con «nos provee» y conserva la amplitud del texto.
- source_word: πλουσίως
  english_pob_choice: richly
  chosen_spanish: abundantemente
  alternatives_spanish:
  - ricamente
  - generosamente
  lexicon: BDAG
  rationale: El adverbio alude a abundancia y además resuena con el tema de las riquezas. «Abundantemente» es claro y fluido en español; «ricamente» sería más literal pero menos idiomático.
- source_word: εἰς ἀπόλαυσιν
  english_pob_choice: for enjoyment
  chosen_spanish: para disfrutarlo
  alternatives_spanish:
  - para el disfrute
  - para gozarlo
  lexicon: BDAG
  rationale: 'La frase expresa propósito: lo provisto por Dios está destinado a ser disfrutado. «Para disfrutarlo» hace explícita la referencia a «todo» y mantiene el sentido de goce legítimo.'
theological_decisions:
- issue: Valor de αἰών en un contexto ético-escatológico
  english_pob_reading: age
  chosen_spanish_reading: siglo
  alternative_spanish_readings:
  - mundo
  - era
  rationale: 'Se conserva el matiz temporal y escatológico: no es solo el mundo material, sino la época presente frente al orden venidero. «Siglo» funciona en español bíblico sin perder la distinción.'
  doctrine_reference: Translation philosophy §1, primacía del original y contraste escatológico paulino
- issue: Alcance de πάντα en la provisión divina
  english_pob_reading: everything
  chosen_spanish_reading: de todo
  alternative_spanish_readings:
  - todas las cosas
  - todo lo necesario
  rationale: El texto no restringe la provisión a lo estrictamente necesario; tampoco autoriza una lectura de prosperidad. «De todo» mantiene la amplitud sin precisar más de lo que el griego dice.
  doctrine_reference: Affirmations; Translation philosophy §3, preservar tensiones teológicas sin resolverlas artificialmente
translation_notes:
  revision_awareness: La versión anterior en inglés fue revisada y quedó sin cambios tras la última pasada; esta propuesta española sigue de cerca ese estado estable, manteniendo las decisiones léxicas y teológicas auditadas sin introducir aclaraciones no respaldadas por el griego.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεῷ, conforme al uso estándar del proyecto.
  - Se preserva el contraste entre la incertidumbre de las riquezas y la confianza en Dios.
  - «Siglo» se usa con valor temporal-escatológico, no como simple sinónimo de «mundo».
  - «Abundantemente» traduce πλουσίως de modo natural y conserva el eco semántico con πλουσίοις/πλούτου.
