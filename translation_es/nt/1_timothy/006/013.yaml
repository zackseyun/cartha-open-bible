translation:
  language: es
  text: Te encargo en presencia de Dios[a], que da vida a todas las cosas, y de Mesías Jesús, que dio testimonio de la buena confesión delante de Poncio Pilato[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que preserva con vida a todas las cosas» o «que hace vivir a todas las cosas». El participio griego ζῳογονοῦντος puede enfatizar tanto el preservar la vida como el dar vida.
    reason: lexical_alternative
  - marker: b
    text: O «Cristo Jesús». Χριστός se vierte aquí como «Mesías» para preservar su sentido como título.
    reason: alternative_reading
  - marker: c
    text: O «que testificó de la buena confesión».
    reason: previous_rendering
lexical_decisions:
- source_word: παραγγέλλω
  english_pob_choice: I charge
  chosen_spanish: Te encargo
  alternatives_spanish:
  - Te mando
  - Te exhorto
  - Te ordeno
  lexicon: BDAG
  rationale: En este contexto solemne, παραγγέλλω expresa una instrucción formal y con peso. «Te encargo» conserva el tono de mandato serio sin sonar tan duro como «te ordeno» ni tan débil como «te exhorto».
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: BDAG
  rationale: «Delante de» comunica con naturalidad la idea de estar bajo la mirada/presencia de Dios y de Mesías Jesús, manteniendo el valor solemne de ἐνώπιον.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: El término es directo y no requiere matiz adicional en español.
- source_word: ζῳογονοῦντος
  english_pob_choice: who gives life
  chosen_spanish: que da vida
  alternatives_spanish:
  - que preserva con vida
  - que mantiene con vida
  - que hace vivir
  lexicon: BDAG
  rationale: La forma participial admite tanto la idea de preservar la vida como la de impartir vida. «Que da vida» preserva esa amplitud en español y suena natural en una fórmula de juramento o encargo solemne.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo lo creado
  lexicon: BDAG
  rationale: La expresión abarca la totalidad de lo existente; «todas las cosas» mantiene el alcance universal sin estrecharlo.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός con «Mesías», siguiendo la decisión POB de no ocultar el sentido del título. En español, «Mesías Jesús» mantiene ese énfasis confesional.
- source_word: μαρτυρήσαντος
  english_pob_choice: who testified to
  chosen_spanish: que dio testimonio de
  alternatives_spanish:
  - que testificó de
  - que confesó
  lexicon: BDAG
  rationale: El aoristo participial señala un testimonio público y jurídico. «Dar testimonio de» es la opción más natural en español y conserva el sentido de declaración ante una autoridad.
- source_word: ἐπὶ Ποντίου Πιλάτου
  english_pob_choice: before Pontius Pilate
  chosen_spanish: delante de Poncio Pilato
  alternatives_spanish:
  - ante Poncio Pilato
  - en tiempos de Poncio Pilato
  lexicon: BDAG
  rationale: El contexto de testimonio ante un tribunal hace que «delante de Poncio Pilato» sea fiel y idiomático. Mantiene la referencia a la presencia del gobernador sin reinterpretarla temporalmente.
- source_word: τὴν καλὴν ὁμολογίαν
  english_pob_choice: the good confession
  chosen_spanish: la buena confesión
  alternatives_spanish:
  - la noble confesión
  - la buena profesión
  lexicon: BDAG
  rationale: ὁμολογία se traduce mejor aquí como «confesión», por su fuerza declarativa y confesional. «Buena» conserva καλὴν sin suavizarlo ni intensificarlo indebidamente.
theological_decisions:
- issue: Rendering of Χριστός as title
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La línea editorial POB pide conservar el valor titulado de Χριστός cuando el contexto es confesional. «Mesías» en español mantiene la referencia a la promesa y evita convertir el término en simple nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default rendering'
- issue: Semantic range of ζῳογονοῦντος
  english_pob_reading: who gives life to all things
  chosen_spanish_reading: que da vida a todas las cosas
  alternative_spanish_readings:
  - que preserva con vida a todas las cosas
  - que hace vivir a todas las cosas
  rationale: La forma griega puede apuntar tanto a preservación de la vida como a causación de vida. La traducción elegida conserva esa tensión sin resolverla en una sola dirección, y permanece teológicamente amplia.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción española sigue el sentido del texto griego y del audit trail inglés. Se adopta la forma más natural para el español en «Te encargo» y «delante de», se preserva la tensión semántica de ζῳογονοῦντος, y se mantiene la decisión titulativa de Χριστός como «Mesías».
  spanish_consistency_notes:
  - Se usa «Mesías» en lugar de «Cristo» por coherencia con la política POB para Χριστός como título.
  - «Dar testimonio de» se emplea para evitar un calco rígido y para reflejar el valor jurídico-confesional del participio.
  - «La buena confesión» mantiene la conexión con el lenguaje confesional del pasaje y es la forma más natural en español.
