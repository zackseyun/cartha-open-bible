    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:36:53Z'
    unchanged: false
    changes_summary: 'Removed ''remaining'' to avoid adding wording not explicit in the Greek, and changed ''the Messiah'' to ''Christ'' for standard formal rendering of Ἰησοῦ Χριστοῦ. Also removed the unnecessary comma after ''commandment'' for smoother English. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: que guardes el mandamiento sin mancha e irreprochable[a][b][c], hasta la aparición de nuestro Señor Jesús Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Jesús Cristo'. El título griego Χριστός puede funcionar tanto como el título traducido 'Mesías' como en la forma más tradicional y cercana a nombre propio 'Cristo'.
    reason: alternative_reading
  - marker: b
    text: Los adjetivos 'sin mancha' e 'irreprochable' pueden referirse tanto al 'mandamiento' mismo como al modo en que Timoteo lo guarda; el griego deja esa relación sintáctica comprimida.
    reason: lexical_alternative
  - marker: c
    text: O 'que guardes el mandamiento, manteniéndote sin mancha e irreprochable'.
    reason: alternative_reading
lexical_decisions:
- source_word: τηρῆσαί
  english_pob_choice: keep
  chosen_spanish: guardes
  alternatives_spanish:
  - mantengas
  - observes
  lexicon: BDAG
  rationale: En este contexto de encargo pastoral, τηρῆσαί implica cumplir fielmente una encomienda. 'Guardes' expresa bien la idea de observar y custodiar el mandato sin forzar un matiz meramente defensivo; también permite que la acción se entienda como perseverante.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: guardes
  alternatives_spanish:
  - tú
  lexicon: BDAG
  rationale: El pronombre de segunda persona queda incorporado naturalmente en la forma verbal española. No se añade un pronombre explícito porque el imperativo sustantivado del infinitivo ya lo hace innecesario en español.
- source_word: ἐντολήν
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  - la encomienda
  lexicon: BDAG
  rationale: La forma singular definida pide un sustantivo definido. 'Mandamiento' conserva mejor la fuerza normativa y solemne de ἐντολή que 'mandato', y además corresponde al registro eclesial sin debilitar el peso del texto.
- source_word: ἄσπιλον
  english_pob_choice: unstained
  chosen_spanish: sin mancha
  alternatives_spanish:
  - inmaculado
  - sin defecto
  lexicon: BDAG
  rationale: '''Sin mancha'' reproduce con claridad la imagen de ausencia de mancha o suciedad moral. En español suena natural y mantiene la ambigüedad del griego, que puede describir tanto el mandamiento como al creyente en su cumplimiento.'
- source_word: ἀνεπίλημπτον
  english_pob_choice: above reproach
  chosen_spanish: sin reproche
  alternatives_spanish:
  - irreprochable
  - sin tacha
  lexicon: BDAG
  rationale: '''Sin reproche'' transmite de forma directa la idea de no ser objeto de acusación legítima. Se prefiere esta fórmula breve y transparente a ''irreprochable'', que es correcta pero menos idiomática en este encargo pastoral.'
- source_word: μέχρι
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  - hasta el momento de
  lexicon: BDAG
  rationale: '''Hasta'' conserva el valor temporal de duración con naturalidad en español. Dado que el complemento siguiente es nominal, ''hasta la manifestación'' resulta fluido y fiel.'
- source_word: ἐπιφανείας
  english_pob_choice: the appearing
  chosen_spanish: la manifestación
  alternatives_spanish:
  - la aparición
  - la venida visible
  lexicon: BDAG
  rationale: En las Pastorales ἐπιφάνεια apunta a la aparición visible y futura de Cristo. 'Manifestación' comunica esa irrupción pública y solemne en español sin añadir el matiz de 'segunda' venida, que el sustantivo no expresa explícitamente.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  lexicon: BDAG
  rationale: Se mantiene el título cristológico tradicional 'Señor', que en español es claro y reverente. No se usa 'Yahvé' aquí porque el término griego es κύριος en un título referido a Cristo, no una cita directa del nombre divino.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se sigue la pauta del proyecto de traducir Χριστός como 'Mesías' cuando funciona como título. 'Jesús Mesías' conserva el valor titular y evita convertirlo de inmediato en un nombre compuesto tradicional sin necesidad textual.
theological_decisions:
- issue: Cómo entender ἄσπιλον ἀνεπίλημπτον respecto de 'el mandamiento' o de 'tú'
  english_pob_reading: The adjectives 'unstained' and 'above reproach' may describe either 'the commandment' itself or Timothy's keeping of it; the Greek wording is compact enough to leave that relation somewhat compressed in English.
  chosen_spanish_reading: 'Se traduce de modo que la frase pueda leerse naturalmente con ambos posibles referentes: el mandamiento que ha de guardarse y el estado del que lo guarda.'
  alternative_spanish_readings:
  - que guardes el mandamiento, manteniéndolo sin mancha y sin reproche
  - que guardes, sin mancha y sin reproche, el mandamiento
  rationale: El griego permite una relación sintáctica compacta y algo ambigua. En español, una formulación breve con dos adjetivos adverbialmente cercanos preserva esa tensión sin imponer una decisión interpretativa cerrada.
  doctrine_reference: Nota exegética del pasaje; sensibilidad pastoral en la traducción de participios/adjetivos calificativos.
- issue: Renderización de Χριστοῦ en Ἰησοῦ Χριστοῦ
  english_pob_reading: Or 'Jesus Christ.' The Greek title Χριστός can function either as the translated title 'Messiah' or as the more name-like traditional form 'Christ.'
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: Se mantiene la traducción del título, no la transliteración, porque el contexto sigue siendo titular y escatológico. Esto preserva la transparencia semántica del griego y evita que la forma heredada opaque el sentido de 'Ungido/Mesías'.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested term Χριστός'
translation_notes:
  revision_awareness: 'El antecedente inglés pasó por varias revisiones: primero se aclaró que los adjetivos probablemente describen a Timoteo, luego se eliminó el añadido ''remaining'' por no estar explícito, y finalmente se restauró ''Messiah'' para Χριστός conforme a la norma doctrinal. La versión española evita añadir aspectos no explícitos, conserva la tensión sintáctica sobre los adjetivos y mantiene ''Mesías'' como traducción titular.'
  spanish_consistency_notes:
  - Se usa 'mandamiento' para ἐντολή, en línea con el registro formal del texto.
  - Se traduce κύριος como 'Señor' cuando se refiere a Cristo; no se introduce 'Yahvé' porque no hay referencia directa al nombre divino en esta frase.
  - Se mantiene 'Mesías' para Χριστός de acuerdo con la pauta del proyecto.
  - La puntuación y el orden buscan un español natural sin deshacer la ambigüedad del griego.
