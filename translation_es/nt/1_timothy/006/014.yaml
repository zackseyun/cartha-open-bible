revisions:
- from: que guardes el mandamiento, sin mancha y sin reproche, hasta la manifestación de nuestro Señor Jesús Mesías[a][b][c].
  to: que guardes el mandamiento sin mancha e irreprochable[a][b][c], hasta la aparición de nuestro Señor Jesús Mesías.
  rationale: Se ajusta 'manifestación' a 'aparición' para reflejar mejor ἐπιφάνεια según el expediente auditado y el uso natural en español bíblico. Se cambia 'sin reproche' por 'irreprochable' para representar con más precisión ἀνεπίλημπτον. Se elimina la coma tras 'mandamiento' para conservar mejor la ambigüedad compacta del griego. También se corrigen las notas para que sigan siendo realmente informativas y coincidan con el texto revisado.
