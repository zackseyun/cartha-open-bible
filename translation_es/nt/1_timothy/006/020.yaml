translation:
  language: es
  text: Oh, Timoteo, guarda el depósito que te fue confiado, apartándote de las palabrerías profanas y de las contradicciones[a] de lo que falsamente se llama conocimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "oposiciones".
    reason: lexical_alternative
  - marker: b
    text: O "del así llamado conocimiento".
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ Τιμόθεε
  english_pob_choice: O Timothy
  chosen_spanish: Oh Timoteo
  alternatives_spanish:
  - Timoteo
  lexicon: BDAG
  rationale: El vocativo con Ὦ aporta una dirección solemne y enfática; «Oh Timoteo» conserva ese tono mejor que omitir la interjección.
- source_word: τὴν παραθήκην
  english_pob_choice: the deposit entrusted to you
  chosen_spanish: el depósito que te fue confiado
  alternatives_spanish:
  - el depósito
  - lo que te fue confiado
  - el encargo confiado a ti
  lexicon: BDAG
  rationale: «Depósito» mantiene la metáfora de algo puesto en custodia. Añadir «que te fue confiado» explicita en español la idea de encomienda implícita en παραθήκη, sin cerrar indebidamente el contenido.
- source_word: φύλαξον
  english_pob_choice: guard
  chosen_spanish: guarda
  alternatives_spanish:
  - custodia
  - protege
  - mantén
  lexicon: BDAG
  rationale: «Guarda» expresa con naturalidad la vigilancia y preservación exigidas por el imperativo, y corresponde bien al sentido de custodiar algo valioso.
- source_word: ἐκτρεπόμενος
  english_pob_choice: turning away from
  chosen_spanish: apartándote de
  alternatives_spanish:
  - alejándote de
  - evitando
  - apartándote de
  lexicon: BDAG
  rationale: El participio describe una acción de desviarse o apartarse. «Apartándote de» conserva la imagen verbal y su función concomitante con el imperativo principal.
- source_word: βεβήλους
  english_pob_choice: profane
  chosen_spanish: profanas
  alternatives_spanish:
  - impías
  - irreverentes
  - profanas
  lexicon: BDAG
  rationale: «Profanas» comunica bien el contraste con lo santo o consagrado y mantiene la fuerza religiosa del término.
- source_word: κενοφωνίας
  english_pob_choice: empty talk
  chosen_spanish: palabrerías
  alternatives_spanish:
  - palabras vacías
  - charlas vacías
  - vanas palabrerías
  lexicon: BDAG
  rationale: El compuesto sugiere habla vacía o hueca. «Palabrerías» funciona en español como un equivalente natural y peyorativo; combinado con «profanas» preserva el carácter de habla inútil y hueca.
- source_word: ἀντιθέσεις
  english_pob_choice: contradictions
  chosen_spanish: contradicciones
  alternatives_spanish:
  - oposiciones
  - disputas
  - contradicciones
  lexicon: BDAG
  rationale: En el contexto polémico, «contradicciones» transmite bien afirmaciones opuestas a la verdad apostólica. La alternativa «oposiciones» queda preservada por el trasfondo léxico del término.
- source_word: τῆς ψευδωνύμου γνώσεως
  english_pob_choice: of what is falsely called knowledge
  chosen_spanish: de lo que falsamente se llama conocimiento
  alternatives_spanish:
  - del llamado conocimiento
  - del así llamado conocimiento
  - de la falsa llamada conocimiento
  lexicon: BDAG
  rationale: La expresión griega dice literalmente «conocimiento de falso nombre». «De lo que falsamente se llama conocimiento» conserva la crítica al nombre mismo sin reducirla a una mera etiqueta idiomática.
theological_decisions:
- issue: Alcance de παραθήκη
  english_pob_reading: Rendered generally as 'the deposit entrusted to you' without specifying its content beyond the text.
  chosen_spanish_reading: «El depósito que te fue confiado», sin identificar explícitamente si se trata del evangelio, la enseñanza apostólica o la comisión ministerial.
  alternative_spanish_readings:
  - el evangelio confiado
  - la enseñanza apostólica
  - el encargo ministerial
  rationale: El sustantivo es más amplio que una sola glosa doctrinal. La traducción conserva la metáfora y la tensión interpretativa, evitando fijar un contenido que el versículo no nombra explícitamente.
  doctrine_reference: Preservar la tensión teológica y no resolverla más allá del texto.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador español sigue de cerca la lectura auditada del griego y mantiene las alternativas léxicas documentadas por la POB inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no lo contiene.
  - «Conocimiento» conserva la forma abstracta del griego, sin convertirlo en un término técnico más estrecho.
  - La puntuación separa bien el imperativo principal de la frase participial concomitante en español natural.
  - Se evita «siervo» o vocabulario eclesiástico tradicional no sustentado por el texto griego.
