translation:
  language: es
  text: fricciones constantes[a] entre personas cuyas mentes están corrompidas y que han sido privadas[b] de la verdad, imaginando que la piedad es un medio de ganancia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contiendas constantes» o «disputas continuas». El término griego sugiere fricción persistente, como un roce continuo entre personas.
    reason: lexical_alternative
  - marker: b
    text: O «despojadas» o «dejadas sin». El verbo griego describe una pérdida sufrida, con la idea de quedar privadas de algo valioso.
    reason: lexical_alternative
  - marker: c
    text: O «la piedad es ganancia» o «una fuente de ganancia». El sentido es que usan la devoción a Dios como medio para obtener provecho material.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαπαρατριβαὶ
  english_pob_choice: constant friction
  chosen_spanish: fricciones constantes
  alternatives_spanish:
  - quebrantos constantes
  - contiendas constantes
  - rozamientos constantes
  lexicon: BDAG
  rationale: La imagen griega sugiere roce persistente y conflicto continuo. «Fricciones constantes» conserva la idea de fricción relacional sin sonar forzado en español.
- source_word: διεφθαρμένων
  english_pob_choice: corrupted
  chosen_spanish: corrompidos
  alternatives_spanish:
  - depravados
  - arruinados
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante. «Corrompidos» reproduce bien el sentido moral y evita cargar el texto con un matiz doctrinal más fuerte que el término exige.
- source_word: τὸν νοῦν
  english_pob_choice: minds
  chosen_spanish: pensamientos
  alternatives_spanish:
  - mente
  - entendimiento
  lexicon: BDAG
  rationale: En español, «mente» sería natural, pero aquí «pensamientos» ayuda a expresar el ámbito cognitivo afectado por el participio y mantiene fluidez con el resto de la frase. La tensión entre νοῦς como facultad mental y como orientación interior se conserva de manera funcional.
- source_word: ἀπεστερημένων
  english_pob_choice: have been deprived
  chosen_spanish: han sido despojadas
  alternatives_spanish:
  - han sido privadas
  - han quedado desprovistas
  lexicon: BDAG
  rationale: El verbo indica pérdida sufrida pasivamente. «Despojadas» expresa bien la fuerza de haber quedado sin algo valioso; el contexto decide que el objeto es la verdad.
- source_word: τῆς ἀληθείας
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  lexicon: BDAG
  rationale: Se conserva el artículo porque el contexto habla de la verdad cristiana concreta, no de verdad en sentido abstracto.
- source_word: νομιζόντων
  english_pob_choice: imagining
  chosen_spanish: imaginando
  alternatives_spanish:
  - pensando
  - suponiendo
  lexicon: BDAG
  rationale: El participio introduce la falsa evaluación de estas personas. «Imaginando» comunica con fuerza el error de su juicio sin alejarse del valor del verbo.
- source_word: πορισμὸν
  english_pob_choice: a means of gain
  chosen_spanish: medio de ganancia
  alternatives_spanish:
  - ganancia
  - fuente de ganancia
  lexicon: BDAG
  rationale: La construcción predicativa sugiere que consideran la piedad como instrumento para obtener provecho. «Medio de ganancia» preserva esa idea instrumental mejor que una simple palabra como «ganancia».
- source_word: εὐσέβειαν
  english_pob_choice: godliness
  chosen_spanish: la piedad
  alternatives_spanish:
  - devoción
  - religiosidad
  lexicon: BDAG
  rationale: Aunque el POB inglés usa «godliness», en español «piedad» es el equivalente más estable y reconocido para εὐσέβεια en las Pastorales. Se evita «religión» por su posible reducción a práctica externa.
theological_decisions:
- issue: Cómo verter εὐσέβεια sin desdibujar su valor positivo ni reducirla a formalismo religioso
  english_pob_reading: Rendered as 'godliness' while the context shows the false teachers treat it instrumentally.
  chosen_spanish_reading: Traducida como «piedad», manteniendo que el problema no está en la piedad misma sino en usarla como instrumento de ganancia.
  alternative_spanish_readings:
  - religión
  - devoción
  rationale: «Piedad» transmite de forma natural la reverencia y conducta orientada a Dios que caracteriza εὐσέβεια. El contexto condena el abuso, no la cualidad en sí.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo reflejar el estado moral de διεφθαρμένων sin exagerarlo
  english_pob_reading: Rendered as 'whose minds are corrupted' rather than 'depraved in mind.'
  chosen_spanish_reading: «cuyos pensamientos están corrompidos»
  alternative_spanish_readings:
  - cuyas mentes están corrompidas
  - de mente depravada
  rationale: «Corrompidos» mantiene el juicio moral fuerte pero no añade la carga conceptual de «depravados». La referencia al ámbito interior queda suficiente y naturalmente expresada.
  doctrine_reference: Translation philosophy §1, §3
- issue: Si τὸν νοῦν debe sonar como facultad mental o como actividad interior
  english_pob_reading: whose minds are corrupted
  chosen_spanish_reading: «pensamientos»
  alternative_spanish_readings:
  - mente
  - entendimiento
  rationale: En esta construcción, el español requiere una formulación idiomática. «Pensamientos» comunica el ámbito afectado de la vida mental y evita una calca rígida.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se revisó el texto griego y el tramo auditado en inglés. La redacción española sigue de cerca la estructura del original, preservando la serie de participios y la afirmación final sobre la piedad como instrumento de ganancia. Se ajustó la sintaxis para que el verso suene natural en español sin perder el juicio moral ni la metáfora de fricción continua.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se usó «piedad» para εὐσέβεια por ser el término español más asentado en este registro, aunque el proyecto suele preferir equivalencias directas según contexto.
  - Se conservó un tono sobrio y eclesial, sin ampliar el alcance semántico del griego.
