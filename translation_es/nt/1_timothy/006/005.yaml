review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del griego: conflicto continuo, corrupción interior, privación de la verdad y la idea errónea de tratar la piedad como instrumento de ganancia. Sin embargo, hay dos ajustes importantes de fidelidad: τὸν νοῦν se refleja mejor como «mente» que como «pensamientos», y ἀπεστερημένων se alinea mejor con «privadas» que con «despojadas», ya que el inglés auditado y el griego apuntan a privación resultante más que a un despojo vívido. También conviene conservar la nota léxica sobre διαπαρατριβαὶ, presente en el rastro inglés pero omitida en el español.'
  spanish_quality_summary: El español es claro y legible, pero «personas cuyos pensamientos están corrompidos» suena menos natural y menos preciso que «personas de mente corrompida» o «cuyas mentes están corrompidas». «Medio de ganancia» funciona, aunque «un medio de ganancia» mejora la fluidez idiomática. «Fricciones constantes» es aceptable y digno.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección de «piedad» para εὐσέβεια es defendible en español eclesial y preserva el valor positivo del término. Las decisiones principales deben ajustarse para reflejar mejor νοῦς como «mente» y ἀποστερέω como «privar».
  issues:
  - severity: medium
    issue: «pensamientos» para τὸν νοῦν
    rationale: νοῦς aquí apunta a la facultad mental / mente, no meramente a pensamientos concretos. «Cuyas mentes están corrompidas» o «de mente corrompida» preserva mejor el sentido cognitivo-moral documentado en el POB inglés.
  - severity: medium
    issue: «despojadas» para ἀπεστερημένων
    rationale: Aunque posible, «despojadas de la verdad» suena más dramático y material. El griego y la auditoría inglesa favorecen la idea de haber sido privadas o quedar desprovistas de la verdad.
  - severity: medium
    issue: Falta la nota léxica sobre διαπαρατριβαὶ
    rationale: El POB inglés preserva alternativas significativas para «constant friction». Dado que el español también usa una opción no única («fricciones constantes»), conviene conservar una nota correspondiente.
  - severity: low
    issue: Falta artículo en «medio de ganancia»
    rationale: «Es un medio de ganancia» suena más natural en español que «es medio de ganancia» en este contexto.
