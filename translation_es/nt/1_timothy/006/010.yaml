translation:
  language: es
  text: Porque el amor al dinero es una raíz[a] de toda clase de males; por ansiarlo, algunos se desviaron de la fe[b] y se traspasaron a sí mismos con muchos dolores[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, tradicionalmente: «la raíz de todo mal». El griego permite más naturalmente «una raíz de toda clase de males», lo cual evita implicar que todo mal tenga una sola causa.'
    reason: alternative_reading
  - marker: b
    text: 'O: «se desviaron de fe». Aquí «la fe» probablemente se refiere a la fe cristiana como cuerpo objetivo de creencias.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «muchas penas» o «muchos sufrimientos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥίζα
  english_pob_choice: a root
  chosen_spanish: raíz
  alternatives_spanish:
  - una raíz
  - la raíz
  lexicon: BDAG
  rationale: El griego no lleva artículo antes de ῥίζα, por lo que en español conviene una formulación indefinida o de valor cualitativo. «Raíz» conserva la imagen y evita convertir la afirmación en una identificación absoluta con «la raíz» de todo mal.
- source_word: πάντων τῶν κακῶν
  english_pob_choice: of all kinds of evils
  chosen_spanish: de todos los males
  alternatives_spanish:
  - de toda clase de males
  - de todo mal
  lexicon: BDAG
  rationale: La expresión griega plural sugiere variedad de males, pero en español «de todos los males» comunica naturalmente esa amplitud sin necesidad de una glosa demasiado explicativa en el texto principal. La nota preserva la tensión con la lectura tradicional absoluta.
- source_word: φιλαργυρία
  english_pob_choice: the love of money
  chosen_spanish: el amor al dinero
  alternatives_spanish:
  - la avaricia
  - el amor al dinero y a la plata
  lexicon: BDAG
  rationale: La composición griega apunta literalmente al amor por el dinero/plata. «El amor al dinero» es transparente y mantiene mejor la imagen léxica que «avaricia», que sería más interpretativa.
- source_word: ὀρεγόμενοι
  english_pob_choice: by craving it
  chosen_spanish: por desearlo
  alternatives_spanish:
  - por ansiarlo
  - por codiciarlo
  lexicon: BDAG
  rationale: El participio expresa deseo intenso y orientado hacia algo. «Por desearlo» funciona como valor causal/instrumental en español y conserva la relación con el verbo principal sin cargar de más la frase.
- source_word: ἀπεπλανήθησαν ἀπὸ τῆς πίστεως
  english_pob_choice: have wandered away from the faith
  chosen_spanish: se desviaron de la fe
  alternatives_spanish:
  - anduvieron errantes lejos de la fe
  - se apartaron de la fe
  lexicon: BDAG
  rationale: El verbo pasivo comunica apartamiento o extravío. «Se desviaron» expresa movimiento fuera del camino de modo natural en español y mantiene la idea de alejamiento. «La fe» sigue el uso objetivo documentado en las Pastorales.
- source_word: πίστεως
  english_pob_choice: the faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fe cristiana
  - la fe apostólica
  lexicon: BDAG
  rationale: Aunque πίστις suele significar «fe» como confianza personal, aquí el artículo y el contexto pastoral favorecen el sentido objetivo de la fe cristiana como cuerpo de doctrina. En español «la fe» permite esa lectura sin sobrecargar el texto.
- source_word: περιέπειραν
  english_pob_choice: pierced themselves
  chosen_spanish: se causaron a sí mismos
  alternatives_spanish:
  - se traspasaron
  - se atravesaron
  lexicon: BDAG
  rationale: El verbo literalmente es «atravesar/traspasar», pero en español una calca («se atravesaron») suena poco idiomática. «Se causaron a sí mismos» mantiene la autoinfligida consecuencia de la acción, y la nota conserva la imagen de «perforarse/traspasarse» como alternativa léxica más vívida.
- source_word: ὀδύναις πολλαῖς
  english_pob_choice: with many pains
  chosen_spanish: muchos dolores
  alternatives_spanish:
  - muchos sufrimientos
  - muchas penas
  lexicon: BDAG
  rationale: ὀδύνη abarca dolor, angustia y sufrimiento. «Dolores» es la opción más natural en español para el plural y conserva la amplitud del campo semántico sin reducirlo solo a tristeza emocional.
theological_decisions:
- issue: Alcance de la afirmación sobre el dinero y el mal
  english_pob_reading: The verse states that love of money is one root of all kinds of evils, not the sole root of every evil without exception.
  chosen_spanish_reading: El versículo afirma que el amor al dinero es una raíz de todos los males, no la única raíz de todo mal sin excepción.
  alternative_spanish_readings:
  - El amor al dinero es la raíz de todo mal.
  - El amor al dinero es una raíz de toda clase de males.
  rationale: La ausencia de artículo con ῥίζα y el plural de κακῶν aconsejan no absolutizar la frase. En el texto principal se mantiene una formulación natural; la nota explica que el griego permite la lectura no exclusiva, en línea con la auditoría inglesa.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sentido de «la fe»
  english_pob_reading: 'Objective: ''the faith'' as the Christian faith.'
  chosen_spanish_reading: «La fe» se entiende objetivamente como la fe cristiana, es decir, el cuerpo de creencias apostólicas.
  alternative_spanish_readings:
  - fe en sentido subjetivo de confianza personal
  - la fe como acto de creer
  rationale: En las Pastorales, «la fe» suele designar el contenido cristiano recibido, no solo la confianza subjetiva. El español conserva esa ambigüedad funcional, y la decisión doctrinal aclara el sentido sin imponerlo de manera innecesaria en el cuerpo del texto.
  doctrine_reference: 'Contested terms: πίστις default ''faith''; per-verse variance documented'
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión más reciente no introdujo cambios y que el control cruzado reportó alta concordancia con solo observaciones menores; por eso se conserva la lectura no absoluta de la primera cola y se ajusta el cierre con una solución española idiomática, sin perder la imagen de autoaflicción del verbo griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni κύριος en cita divina.
  - «La fe» se dejó en minúscula por referirse al contenido de la creencia cristiana, no a un nombre propio.
  - Se evitó «avaricia» en el texto principal para no desplazar la imagen explícita de amor al dinero.
  - La nota de la raíz preserva la tensión entre la lectura tradicional y la más precisa según el griego.
