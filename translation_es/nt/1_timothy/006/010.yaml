revisions:
- from: Porque el amor al dinero es raíz[a] de todos los males; por desearlo, algunos se desviaron de la fe y se causaron a sí mismos muchos dolores[b].
  to: Porque el amor al dinero es una raíz[a] de toda clase de males; por ansiarlo, algunos se desviaron de la fe[b] y se traspasaron a sí mismos con muchos dolores[c].
  rationale: 'La revisión restaura dos decisiones centrales del original y del audit trail inglés: la no absolutización de ῥίζα πάντων τῶν κακῶν mediante «una raíz de toda clase de males», y la fuerza concreta de περιέπειραν con «se traspasaron a sí mismos». También se recupera la nota sobre «la fe» que el inglés preserva, y se simplifica la nota final para que trate solo las alternativas de ὀδύναις πολλαῖς. «Por ansiarlo» refleja mejor la intensidad de ὀρεγόμενοι que el más débil «por desearlo».'
  reviewer_model: gpt-5.4
