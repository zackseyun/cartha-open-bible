  - severity: high
    issue: «Se causaron a sí mismos» debilita excesivamente περιέπειραν.
    rationale: El verbo griego significa perforar/traspasar. El POB inglés eligió mantener esa imagen en el texto principal («pierced themselves»). La versión española debería conservar una expresión vívida equivalente.
  - severity: medium
