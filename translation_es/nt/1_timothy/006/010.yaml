  text: ῥίζα γὰρ πάντων τῶν κακῶν ἐστιν ἡ φιλαργυρία, ἧς τινες ὀρεγόμενοι ἀπεπλανήθησαν ἀπὸ τῆς πίστεως καὶ ἑαυτοὺς περιέπειραν ὀδύναις πολλαῖς.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/010.yaml
  text: For the love of money is a root of all kinds of evils[a]; by craving it[c][b], some have wandered away from the faith and pierced themselves with many pains.
  footnotes:
  - marker: a
    text: Or, traditionally, 'For the love of money is the root of all evil.' The Greek more naturally allows 'a root of all kinds of evils,' which avoids implying that every evil has a single cause.
    reason: alternative_reading
  - marker: b
    text: Or 'have strayed from faith.' Here 'the faith' likely refers to the Christian faith as an objective body of belief.
    reason: lexical_alternative
  - marker: c
    text: Or 'pierced themselves with many griefs' or 'many sorrows.'
    reason: lexical_alternative
