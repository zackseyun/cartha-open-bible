translation:
  language: es
  text: Pero los que quieren ser ricos caen en tentación[a], en una trampa[b] y en muchos deseos necios y dañinos, que hunden a las personas[c] en ruina y destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacerse ricos». El griego puede expresar el deseo de llegar a ser rico, no solo el estado de poseer riqueza.
    reason: lexical_alternative
  - marker: b
    text: O «una red» o «un lazo».
    reason: lexical_alternative
  - marker: c
    text: «Personas» traduce aquí el griego en sentido genérico, no restringido a varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ βουλόμενοι
  english_pob_choice: But those who want
  chosen_spanish: Pero los que quieren
  alternatives_spanish:
  - Pero los que desean
  - Pero quienes aspiran a
  lexicon: BDAG
  rationale: βουλόμενοι expresa una voluntad o deseo sostenido; en español, «quieren» comunica con naturalidad ese impulso volitivo sin añadir matices que el griego no exige.
- source_word: πλουτεῖν
  english_pob_choice: to be rich
  chosen_spanish: hacerse ricos
  alternatives_spanish:
  - ser ricos
  - volverse ricos
  - enriquecerse
  lexicon: BDAG
  rationale: El infinitivo puede abarcar tanto el estado de ser rico como la aspiración a llegar a serlo. «Hacerse ricos» conserva ese movimiento hacia la riqueza, en línea con la nota inglesa que admite la idea de «get rich» sin forzar un matiz coloquial.
- source_word: ἐμπίπτουσιν
  english_pob_choice: fall into
  chosen_spanish: caen en
  alternatives_spanish:
  - entran en
  - se precipitan en
  - caen dentro de
  lexicon: BDAG
  rationale: La imagen es la de entrar en una situación negativa. «Caen en» es la equivalencia española más clara y sobria para conservar la metáfora sin endurecerla.
- source_word: πειρασμόν
  english_pob_choice: temptation
  chosen_spanish: tentación
  alternatives_spanish:
  - prueba
  - ensayo
  - examen
  lexicon: BDAG
  rationale: En este contexto de advertencia moral, πειρασμός apunta a una incitación al pecado más que a una prueba neutra; por eso «tentación» es la mejor opción.
- source_word: παγίδα
  english_pob_choice: a snare
  chosen_spanish: una trampa
  alternatives_spanish:
  - un lazo
  - una red
  lexicon: BDAG
  rationale: La POB inglesa preserva la imagen de un mecanismo de captura; en español, «trampa» comunica bien esa idea y resulta natural. Mantiene la posibilidad de la alternativa metafórica sin sacrificar claridad.
- source_word: ἐπιθυμίας πολλὰς ἀνοήτους καὶ βλαβεράς
  english_pob_choice: many foolish and harmful desires
  chosen_spanish: muchos deseos necios y dañinos
  alternatives_spanish:
  - muchos deseos insensatos y perjudiciales
  - muchas pasiones necias y dañinas
  - muchos anhelos necios y dañinos
  lexicon: BDAG
  rationale: ἐπιθυμίαι son deseos o anhelos; «deseos» es amplio y fiel. ἀνόητος se rinde bien como «necio» y βλαβερός como «dañino», conservando la carga moral y práctica del original.
- source_word: αἵτινες
  english_pob_choice: which
  chosen_spanish: los cuales
  alternatives_spanish:
  - que
  - las cuales
  lexicon: BDAG
  rationale: El relativo retoma la serie de deseos y presenta su efecto característico. «Los cuales» funciona de modo natural en español y permite mantener la conexión con el antecedente plural.
- source_word: βυθίζουσι
  english_pob_choice: plunge
  chosen_spanish: hunden
  alternatives_spanish:
  - sumergen
  - precipitan
  - arrastran
  lexicon: BDAG
  rationale: βυθίζω sugiere hundir o sumergir hasta hacer descender. «Hunden» conserva la fuerza imagística y el efecto activo del verbo.
- source_word: τοὺς ἀνθρώπους
  english_pob_choice: people
  chosen_spanish: a las personas
  alternatives_spanish:
  - a los hombres
  - a los seres humanos
  lexicon: BDAG
  rationale: ἄνθρωποι tiene sentido genérico. «Las personas» evita una lectura masculina restringida y refleja el valor inclusivo que la POB inglesa documenta.
- source_word: ὄλεθρον
  english_pob_choice: ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - destrucción
  - perdición
  - desastre
  lexicon: BDAG
  rationale: ὄλεθρος suele denotar ruina o devastación. «Ruina» permite distinguirlo del término siguiente y conserva el sentido de colapso o desmoronamiento.
- source_word: ἀπώλειαν
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - perdición
  - ruina
  lexicon: BDAG
  rationale: ἀπώλεια significa destrucción o pérdida. «Destrucción» mantiene la pareja intensificadora «ruina y destrucción» sin introducir una interpretación técnica no obligada por el griego.
theological_decisions:
- issue: Sentido de ὄλεθρον καὶ ἀπώλειαν
  english_pob_reading: Rendered as 'ruin and destruction' without specifying eternal condemnation
  chosen_spanish_reading: «ruina y destrucción» sin especificar condenación eterna
  alternative_spanish_readings:
  - «ruina y perdición»
  - «perdición y destrucción»
  rationale: El texto presenta una advertencia severa sobre consecuencias devastadoras, pero las palabras griegas por sí solas no obligan a traducirlas como condenación eterna específica. Mantener «ruina y destrucción» preserva la tensión teológica sin cerrarla de antemano.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: El texto inglés revisado mantuvo la secuencia «temptation, a snare, and many foolish and harmful desires» con comas para una enumeración más natural; la versión española conserva esa serie con puntuación equivalente y mantiene la distinción entre «ruina» y «destrucción» que el audit trail inglés explícitamente preserva.
  spanish_consistency_notes:
  - Se mantuvo «tentación» para πειρασμός por el contexto moral de advertencia.
  - Se evitó «SEÑOR» o lenguaje litúrgico no pertinente, pues no hay aquí referencia al nombre divino.
  - Se prefirió «ruina y destrucción» en vez de sinónimos teológicos más cerrados para no sobreinterpretar el alcance final del juicio.
  - «Las personas» se eligió por el valor genérico de ἄνθρωποι y la sensibilidad inclusiva ya documentada en el inglés.
