revisions:
- from: Pero los que quieren hacerse ricos caen en tentación[a], en una trampa[b] y en muchos deseos necios y dañinos, los cuales hunden a las personas[c] en ruina y destrucción.
  to: Pero los que quieren ser ricos caen en tentación[a], en una trampa[b] y en muchos deseos necios y dañinos, que hunden a las personas[c] en ruina y destrucción.
  rationale: Se ajusta «hacerse ricos» a «ser ricos» para que el texto principal refleje la elección principal documentada por la POB inglesa y la nota [a] vuelva a funcionar como verdadera alternativa léxica. También se sustituye «los cuales» por «que» para mejorar la naturalidad y evitar rigidez/concordancia problemática en español. El resto del versículo es fiel y no requiere cambios.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:17:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue de cerca las decisiones auditadas de la POB inglesa: voluntad de enriquecerse, caída en tentación/trampa, deseos necios y dañinos, y el resultado de ruina y destrucción sin forzar condenación eterna. Sin embargo, hay dos detalles de alineación que conviene corregir: (1) la nota [a] no funciona como alternativa real porque el texto ya dice «hacerse ricos» mientras la nota ofrece la misma idea; y (2) el relativo «los cuales» no concuerda con el antecedente femenino plural más cercano («muchos deseos»), por lo que debe ser «los cuales» -> mejor una reestructuración natural con «que» o «los cuales» con antecedente masculino no inmediato, pero en español aquí «que» es más claro y gramaticalmente limpio.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «Trampa» y «hunden» son comprensibles, y «ruina y destrucción» está bien lograda. No obstante, «quieren hacerse ricos» junto con una nota que repite «hacerse ricos» produce torpeza editorial; además, «los cuales» suena algo pesado y genera problema de concordancia con «deseos». Una revisión mínima mejora precisión y fluidez.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. Las decisiones «tentación», «trampa/lazo», «personas» y «ruina y destrucción» son compatibles con la racionalidad léxica documentada. La mejor alineación con la POB inglesa se logra usando «ser ricos» en el texto principal y dejando «hacerse ricos» como alternativa en nota.
  issues:
  - severity: medium
    issue: La nota [a] no aporta una alternativa distinta al texto principal.
    rationale: El texto dice «quieren hacerse ricos», mientras la nota ofrece «O «hacerse ricos»». Esto rompe la lógica editorial del aparato de notas y no preserva correctamente la decisión inglesa principal («to be rich») con alternativa («to get rich»).
  - severity: medium
    issue: El relativo «los cuales» es problemático por concordancia y naturalidad.
    rationale: El antecedente semántico inmediato es «muchos deseos» (femenino plural en griego, masculino en español por «deseos»), pero la construcción resulta rígida y potencialmente ambigua tras una serie. En español bíblico moderno aquí funciona mejor «que», que mantiene la referencia a los deseos sin pesadez.
  revised_spanish_text: Pero los que quieren ser ricos caen en tentación[a], en una trampa[b] y en muchos deseos necios y dañinos, que hunden a las personas[c] en ruina y destrucción.
  revised_footnotes:
