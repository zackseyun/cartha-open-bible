translation:
  language: es
  text: Pero la piedad con contentamiento es gran ganancia[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gran provecho» o «un gran medio de ganancia». El término griego está relacionado con ganancia o provecho y retoma el lenguaje del versículo anterior.
    reason: lexical_alternative
  - marker: b
    text: O «autosuficiencia». Aquí, sin embargo, el sentido probable es el de contentamiento o suficiencia, no el de independencia autónoma.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Se usa como adversativa suave para enlazar con la advertencia anterior. «Pero» conserva el contraste sin sonar arcaico.
- source_word: πορισμὸς
  english_pob_choice: gain
  chosen_spanish: ganancia
  alternatives_spanish:
  - provecho
  - lucro
  - ganancia/beneficio
  lexicon: BDAG
  rationale: El sustantivo puede expresar ganancia, provecho o medio para obtener recursos. «Ganancia» mantiene el paralelismo con el contexto inmediato y suena natural en español; no se especifica más de lo que el griego exige.
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - enorme
  - considerable
  lexicon: BDAG
  rationale: «Gran» reproduce el valor enfático del adjetivo de forma idiomática en español antes de un sustantivo femenino implícito («ganancia»).
- source_word: εὐσέβεια
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - vida piadosa
  - temor de Dios
  lexicon: BDAG
  rationale: En las Pastorales, el término designa una vida reverente orientada a Dios. «Piedad» es una equivalencia bíblica natural en español y evita reducir el concepto a mera religiosidad externa. Se conserva la tensión con «ganancia» sin introducir una interpretación más amplia que la del texto.
- source_word: μετὰ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - acompañada de
  lexicon: BDAG
  rationale: Con genitivo, expresa compañía o asociación. «Con» es claro y fiel al valor relacional del término.
- source_word: αὐταρκείας
  english_pob_choice: contentment
  chosen_spanish: contentamiento
  alternatives_spanish:
  - suficiencia
  - satisfacción
  - autosuficiencia
  lexicon: BDAG
  rationale: Aunque el término puede sugerir autosuficiencia en otros contextos, aquí el contexto cercano favorece la idea de estar satisfecho con lo necesario. «Contentamiento» comunica bien esa virtud cristiana; «autosuficiencia» podría inducir una independencia autónoma que el pasaje no apoya.
theological_decisions:
- issue: Sentido de αὐτάρκεια en contexto cristiano
  english_pob_reading: contentment
  chosen_spanish_reading: contentamiento
  alternative_spanish_readings:
  - autosuficiencia
  - suficiencia
  rationale: Los vv. 7–8 explican la idea en términos de estar satisfecho con alimento y abrigo básicos. Por eso se prefiere «contentamiento», que expresa virtud y suficiencia interior sin importar la noción estoica de autosuficiencia.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación entre piedad y ganancia
  english_pob_reading: godliness with contentment is itself great gain
  chosen_spanish_reading: la piedad con contentamiento es gran ganancia
  alternative_spanish_readings:
  - la piedad es medio de gran ganancia cuando va acompañada de contentamiento
  - la piedad con contentamiento produce gran ganancia
  rationale: La construcción predicativa puede entenderse como identificación directa o como medio de ganancia. Se opta por una formulación breve que mantiene el juego de palabras con el contexto previo y evita sugerir que la religión sea instrumentalizada para lucro.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se sigue de cerca el pasaje griego y el auditable del POB en inglés: se mantiene la relación adversativa con el versículo anterior, el campo semántico de πορισμός como «ganancia/provecho», y la lectura contextual de αὐτάρκεια como «contentamiento», sin introducir cambios respecto de la revisión aprobada.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - «Piedad» se usa como equivalente estable de εὐσέβεια en las Pastorales.
  - «Contentamiento» conserva la decisión lexical del POB inglés y evita «autosuficiencia» en el cuerpo principal.
  - La puntuación reproduce una afirmación breve y proverbial, acorde con el griego.
