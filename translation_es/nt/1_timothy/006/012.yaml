translation:
  language: es
  text: Lucha la buena lucha de la fe[a]; toma posesión de la vida eterna, para la cual fuiste llamado y acerca de la cual hiciste la buena confesión[b] delante de muchos testigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lucha la buena lucha de fe». La frase griega puede entenderse como la lucha caracterizada por la fe o como la lucha por la fe cristiana.'
    reason: alternative_reading
  - marker: b
    text: 'O simplemente: «y hiciste la buena confesión delante de muchos testigos». El griego no expresa de manera explícita el contenido de la confesión, aunque la vincula estrechamente con el llamado a la vida eterna.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγωνίζου
  english_pob_choice: Fight
  chosen_spanish: Lucha
  alternatives_spanish:
  - Pelea
  - Combate
  - Esfuérzate
  lexicon: BDAG
  rationale: El imperativo presenta una lucha activa y continua. En español, «lucha» conserva la imagen de esfuerzo intenso sin sonar forzado; como imperativo, «Lucha» comunica bien el sentido de combate sostenido.
- source_word: τὸν καλὸν ἀγῶνα
  english_pob_choice: the good fight
  chosen_spanish: la buena lucha
  alternatives_spanish:
  - el buen combate
  - la buena batalla
  - la noble lucha
  lexicon: BDAG
  rationale: Conserva la correspondencia retórica con ἀγωνίζου / ἀγῶνα y mantiene καλός como «bueno» en el texto principal. «Lucha» es natural en español y preserva la metáfora de esfuerzo.
- source_word: τῆς πίστεως
  english_pob_choice: of the faith
  chosen_spanish: de la fe
  alternatives_spanish:
  - de la fe cristiana
  - de la fe
  lexicon: BDAG
  rationale: «Fe» es la traducción estándar de πίστις. El artículo griego y el contexto de las Pastorales permiten el sentido definido de «la fe» como la fe cristiana; en español, «de la fe» mantiene esa tensión sin sobreexplicar.
- source_word: ἐπιλαβοῦ
  english_pob_choice: take hold of
  chosen_spanish: toma posesión de
  alternatives_spanish:
  - aférrate a
  - toma
  - agárrate de
  lexicon: BDAG
  rationale: El aoristo imperativo medio pide una apropiación decisiva. «Toma posesión de» expresa con fuerza la idea de apoderarse de algo ofrecido o perseguido, y evita una imagen demasiado coloquial.
- source_word: τῆς αἰωνίου ζωῆς
  english_pob_choice: the eternal life
  chosen_spanish: la vida eterna
  alternatives_spanish:
  - la vida eterna
  lexicon: BDAG
  rationale: Se conserva la formulación bíblica natural en español. El artículo ayuda a señalar la vida escatológica específica del evangelio, no solo una cualidad abstracta de vida.
- source_word: εἰς ἣν ἐκλήθης
  english_pob_choice: to which you were called
  chosen_spanish: para la cual fuiste llamado
  alternatives_spanish:
  - a la cual fuiste llamado
  - para la que fuiste llamado
  lexicon: BDAG
  rationale: εἰς con el relativo expresa meta o destino. «Para la cual fuiste llamado» es idiomático en español y conserva la relación entre llamado y vida eterna.
- source_word: ὡμολόγησας
  english_pob_choice: you made
  chosen_spanish: hiciste
  alternatives_spanish:
  - confesaste
  - pronunciaste
  lexicon: BDAG
  rationale: Unido a ὁμολογία, el giro natural en español es «hacer una confesión». «Hiciste» evita repetición y suena fluido, manteniendo el acto público de reconocimiento.
- source_word: τὴν καλὴν ὁμολογίαν
  english_pob_choice: the good confession
  chosen_spanish: la buena confesión
  alternatives_spanish:
  - la noble confesión
  - la buena profesión
  lexicon: BDAG
  rationale: «Confesión» expresa mejor ὁμολογία en español actual que «profesión». Se conserva καλός como «buena» para mantener el paralelismo con «buena lucha».
- source_word: ἐνώπιον πολλῶν μαρτύρων
  english_pob_choice: before many witnesses
  chosen_spanish: delante de muchos testigos
  alternatives_spanish:
  - en presencia de muchos testigos
  - ante muchos testigos
  lexicon: BDAG
  rationale: «Delante de» reproduce bien ἐνώπιον y es claro en español. «Testigos» mantiene el sentido judicial/testifical normal de μάρτυρες aquí, no el sentido posterior de «mártir».
theological_decisions:
- issue: Sentido de πίστις en «τὸν καλὸν ἀγῶνα τῆς πίστεως»
  english_pob_reading: 'objective/definite sense: ''the faith'''
  chosen_spanish_reading: 'sentido objetivo/definido: «la fe»'
  alternative_spanish_readings:
  - 'sentido subjetivo: «fe»'
  rationale: Las Pastorales suelen usar πίστις con un sentido más definido, referido a la fe cristiana o al depósito de la fe. El texto español principal conserva «la fe» y deja abierta la alternativa sin resolverla de manera artificial.
  doctrine_reference: 'DOCTRINE.md: términos disputados — πίστις normalmente «fe»; preservar alternativas cuando el contexto admite más de un matiz'
- issue: Relación entre la confesión y la vida eterna / el llamado
  english_pob_reading: rendered as 'about which you made the good confession'
  chosen_spanish_reading: «acerca de la cual hiciste la buena confesión»
  alternative_spanish_readings:
  - «y hiciste la buena confesión» sin relación explícita
  - «sobre la cual hiciste la buena confesión»
  rationale: El griego puede vincular la confesión con la vida eterna y el llamado. «Acerca de la cual» conserva esa relación sin especificar más de lo que el texto garantiza; mantiene la tensión exegética documentada.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones teológicas en lugar de resolverlas en exceso'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no hacía falta cambiar el texto base. Se conservó la misma decisión general del inglés auditado, ajustada al español natural y manteniendo las dos tensiones documentadas: el valor de πίστις y la relación sintáctica de la confesión con el llamado a la vida eterna.'
  spanish_consistency_notes:
  - Se mantuvo «la fe» para πίστις, coherente con el valor doctrinal del término en las Pastorales.
  - Se evitó «SEÑOR» y no hay necesidad de terminología divina aquí.
  - «Confesión» se usó en sentido público/testifical, no litúrgico.
  - «Testigos» conserva el valor de μάρτυρες sin introducir el sentido posterior de «mártir».
  - La puntuación separa las dos exhortaciones principales y mantiene la fluidez natural del español.
