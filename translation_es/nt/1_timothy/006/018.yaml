review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del griego: ἀγαθοεργεῖν = «hacer el bien», ἐν ἔργοις καλοῖς = «en buenas obras», εὐμεταδότους… κοινωνικούς = «generosos, dispuestos a compartir». Sin embargo, πλουτεῖν se tradujo como «enriquecerse», que en español suele sonar ingresivo o reflexivo («hacerse rico») y no preserva tan bien como el griego/inglés la idea estática y contrastiva de «ser ricos» en la esfera de las buenas obras.'
  spanish_quality_summary: El español es claro y natural, pero «enriquecerse en buenas obras» puede sugerir proceso o beneficio propio más que abundancia caracterológica. «Ser ricos en buenas obras» es más idiomático en registro bíblico moderno, más fiel al contraste contextual con la riqueza material y suena mejor en una cadena exhortativa.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección de «buenas obras», «generosos» y «dispuestos a compartir» concuerda con el expediente léxico. La única corrección recomendada es ajustar πλουτεῖν de «enriquecerse» a «ser ricos» para seguir la rationale documentada del POB.
  issues:
  - severity: medium
    issue: «enriquecerse» para πλουτεῖν
    rationale: El verbo griego aquí, con ἐν ἔργοις καλοῖς, expresa ser rico/abundante en un ámbito, no tanto el proceso de volverse rico. «Enriquecerse» en español tiende a leerse como proceso o adquisición, lo que debilita el contraste deliberado con la riqueza material en el contexto inmediato.
