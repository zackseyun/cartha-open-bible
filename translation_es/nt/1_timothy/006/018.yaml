translation:
  language: es
  text: hacer el bien, ser ricos en buenas obras, ser generosos, dispuestos a compartir
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγαθοεργεῖν
  english_pob_choice: to do good
  chosen_spanish: hacer el bien
  alternatives_spanish:
  - hacer buenas obras
  - hacer lo bueno
  - hacer el bien y lo bueno
  lexicon: BDAG
  rationale: El infinitivo mantiene el valor verbal exhortativo del griego. «Hacer el bien» es natural en español y conserva la idea de acción benéfica sin convertirla en un sustantivo.
- source_word: πλουτεῖν
  english_pob_choice: to be rich
  chosen_spanish: enriquecerse
  alternatives_spanish:
  - ser ricos
  - abundar
  - hacerse ricos
  lexicon: BDAG
  rationale: El verbo se usa metafóricamente con ἐν ἔργοις καλοῖς. «Enriquecerse» conserva la imagen de riqueza, pero en español funciona mejor en forma reflexiva para expresar la metáfora sin sonar forzado.
- source_word: ἐν ἔργοις καλοῖς
  english_pob_choice: in good works
  chosen_spanish: en buenas obras
  alternatives_spanish:
  - en buenas acciones
  - en buenas obras
  - en obras nobles
  lexicon: BDAG
  rationale: «Buenas obras» es una equivalencia estable y fiel para ἔργα καλά en las Pastorales. Mantiene la esfera en la que debe darse esa «riqueza» moral.
- source_word: εὐμεταδότους
  english_pob_choice: generous
  chosen_spanish: generosos
  alternatives_spanish:
  - generosos en dar
  - dadivosos
  - liberales
  lexicon: BDAG
  rationale: El adjetivo describe disposición a dar o repartir. «Generosos» es la opción más natural y comprensible en español moderno, y conserva el matiz ético sin arcaísmo.
- source_word: κοινωνικούς
  english_pob_choice: ready to share
  chosen_spanish: dispuestos a compartir
  alternatives_spanish:
  - listos para compartir
  - prontos a compartir
  - compartidores
  lexicon: BDAG
  rationale: El término expresa inclinación a compartir con otros. «Dispuestos a compartir» captura bien la disposición interior y evita connotaciones modernas ambiguas de un adjetivo como «comunitarios».
- source_word: εὐμεταδότους εἶναι, κοινωνικούς
  english_pob_choice: to be generous, ready to share
  chosen_spanish: ser generosos, dispuestos a compartir
  alternatives_spanish:
  - ser generosos y dispuestos a compartir
  - ser dadivosos y compartir con otros
  lexicon: BDAG
  rationale: 'Los dos adjetivos son cercanos pero no idénticos: el primero enfatiza la liberalidad al dar, el segundo la disposición a compartir. La formulación española conserva ambos rasgos en paralelo y con ritmo natural.'
translation_notes:
  revision_awareness: El texto base y el control cruzado muestran acuerdo alto, sin revisiones aplicadas; por tanto, se conserva la lectura del griego con una equivalencia óptima y sin notas textuales necesarias.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo.
  - Se evita «Cristo» porque este versículo no lo contiene ni lo presupone.
  - Se conserva el paralelismo de los cuatro infinitivos/adjetivos como una lista exhortativa breve.
  - «Buenas obras» sigue el uso habitual de las Pastorales y no se reduce a una mera moralidad general.
