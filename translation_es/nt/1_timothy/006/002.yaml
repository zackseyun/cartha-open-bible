base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/002.yaml
  text: And those who have believing masters must not despise them because they are brothers[a]; rather, they must serve them all the more, because those who partake of the benefit are believers and beloved[b]. Teach and urge these things.
  footnotes:
