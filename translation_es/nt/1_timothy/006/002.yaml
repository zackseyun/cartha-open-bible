    issue: μᾶλλον se vierte como 'con mayor empeño'
    rationale: μᾶλλον expresa comparación/aumento ('más bien... aún más'), no necesariamente mayor diligencia subjetiva. 'Con mayor empeño' introduce un matiz no explícito.
  - severity: low
    issue: La nota [b] presenta una 'literalidad' demasiado cerrada
    rationale: δουλεύω aquí sí conserva el trasfondo esclavista, pero la nota actual ('Lit. ...') puede sugerir que existe una equivalencia literal fija. Conviene formularla como explicación léxica del matiz, no como literalidad estricta.
