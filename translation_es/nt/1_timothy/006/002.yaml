translation:
  language: es
  text: Y los que tienen amos creyentes no deben despreciarlos porque son hermanos[a]; más bien, sírvanles[b] aún más, porque los que participan del beneficio son creyentes y amados[c]. Enseña y exhorta estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hermanos y hermanas'; el griego dice 'hermanos'.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego también puede expresarse como 'servir como esclavos' o 'ser esclavos de ellos'; aquí conserva la idea de servicio dentro de una relación esclavista.
    reason: lexical_alternative
  - marker: c
    text: La cláusula 'los que participan del beneficio' es difícil. Probablemente se refiere a los amos creyentes como quienes reciben el beneficio del servicio de los esclavos.
    reason: alternative_reading
lexical_decisions:
- source_word: πιστοὺς
  english_pob_choice: believing
  chosen_spanish: creyentes
  alternatives_spanish:
  - fieles
  lexicon: BDAG
  rationale: En este contexto con δεσπότας, el adjetivo señala que los amos son personas que creen en Cristo. 'Creyentes' comunica de forma natural la pertenencia a la fe, mientras que 'fieles' podría sonar a lealtad moral general y no tanto a identidad cristiana.
- source_word: δεσπότας
  english_pob_choice: masters
  chosen_spanish: amos
  alternatives_spanish:
  - señores
  - dueños
  lexicon: BDAG
  rationale: δεσπότης denota autoridad real de posesión y mando en un marco doméstico-esclavista. 'Amo' es el equivalente español más directo y mantiene la carga social del término; 'señores' suavizaría o elevaría indebidamente el registro.
- source_word: καταφρονείτωσαν
  english_pob_choice: must not despise
  chosen_spanish: no deben despreciarlos
  alternatives_spanish:
  - no deben mirarlos por encima del hombro
  - no deben tenerlos en poco
  - no deben tratarlos con desprecio
  lexicon: BDAG
  rationale: El verbo expresa desprecio o menosprecio. 'Despreciarlos' reproduce bien la fuerza negativa sin necesidad de una paráfrasis más larga.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos en la fe
  lexicon: BDAG
  rationale: El plural masculino griego se conserva como 'hermanos', siguiendo la forma del original y la política de precisión de género del proyecto. La relación fraternal cristiana queda clara por el contexto.
- source_word: δουλευέτωσαν
  english_pob_choice: serve them all the more
  chosen_spanish: sírvanles con mayor empeño
  alternatives_spanish:
  - síganles sirviendo con mayor empeño
  - sean esclavos de ellos con mayor empeño
  lexicon: BDAG
  rationale: δουλεύω aquí conserva la idea de prestar servicio dentro de la relación esclavista, pero en español 'servir' comunica el mandato con naturalidad. 'Con mayor empeño' refleja μᾶλλον.
- source_word: πιστοί
  english_pob_choice: believers
  chosen_spanish: creyentes
  alternatives_spanish:
  - fieles
  lexicon: BDAG
  rationale: El segundo uso de πιστοί retoma la identidad cristiana; 'creyentes' es más claro que repetir 'fieles', que en español puede ser ambiguo.
- source_word: ἀγαπητοὶ
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados por Dios
  - queridos
  lexicon: BDAG
  rationale: '''Amados'' preserva el peso afectivo y eclesial del término sin agregar una especificación no presente en la cláusula.'
- source_word: οἱ τῆς εὐεργεσίας ἀντιλαμβανόμενοι
  english_pob_choice: those who partake of the benefit
  chosen_spanish: los que participan del beneficio
  alternatives_spanish:
  - los que reciben el beneficio
  - los que se benefician de ello
  - los que participan del bien
  lexicon: BDAG
  rationale: La construcción es compacta y difícil. 'Participan del beneficio' mantiene la idea de compartir/participar recogida por la revisión inglesa más reciente, sin cerrar del todo una relación sintáctica debatida.
- source_word: Ταῦτα δίδασκε καὶ παρακάλει
  english_pob_choice: Teach and urge these things
  chosen_spanish: Enseña y exhorta estas cosas
  alternatives_spanish:
  - Sigue enseñando y exhortando estas cosas
  - Enséñalas y exhórtalas
  lexicon: BDAG
  rationale: Los imperativos dirigen a Timoteo a continuar la instrucción y la exhortación. 'Exhorta' refleja παρακάλει con tono pastoral y llamado a la obediencia.
theological_decisions:
- issue: Lectura de ἀδελφοί en un contexto de creyentes y esclavitud
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos en la fe
  rationale: Se mantiene el masculino plural del griego sin neutralizarlo, en consonancia con la política del proyecto. El sentido de familia espiritual entre creyentes queda explícito en el contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Cómo reflejar la relación esclavista sin añadir un término que no está en el versículo
  english_pob_reading: masters ... serve
  chosen_spanish_reading: amos ... sírvanles
  alternative_spanish_readings:
  - amos ... sean esclavos de ellos
  - dueños ... sírvanles
  rationale: El griego habla de δεσπόται y usa δουλεύω, pero no aparece δοῦλος. 'Amo' conserva la realidad social de dominio; 'sírvanles' comunica el mandato de modo idiomático en español sin forzar una fórmula más dura que el contexto no exige aquí.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table on δοῦλος
- issue: Interpretación de οἱ τῆς εὐεργεσίας ἀντιλαμβανόμενοι
  english_pob_reading: those who partake of the benefit are believers and beloved
  chosen_spanish_reading: los que participan del beneficio son creyentes y amados
  alternative_spanish_readings:
  - los que reciben el beneficio son creyentes y amados
  - los beneficiarios son los amos creyentes
  - quienes se benefician son creyentes y amados
  rationale: 'La redacción mantiene abierta la referencia, pero inclina la frase hacia la lectura más probable: que los amos creyentes son los que se benefician del servicio aumentado. Se respeta así la dificultad sintáctica señalada por el POB inglés.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que afinó la cláusula de εὐεργεσίας de 'receive the benefit' a 'partake of the benefit'. En español se reflejó como 'participan del beneficio' para mantener la misma idea de participación y la ambigüedad controlada del original.
  spanish_consistency_notes:
  - Se conserva 'creyentes' para πιστοί/πιστοὺς en ambos lugares, evitando alternar con 'fieles' sin necesidad contextual.
  - '''Amos'' se usa para δεσπότας, mientras que ''sírvanles'' traduce δουλευέτωσαν con naturalidad y sin borrar la realidad esclavista.'
  - '''Hermanos'' conserva el plural masculino del griego; la nota ofrece la alternativa inclusiva sin desplazar el texto principal.'
  - '''Exhorta'' mantiene el tono para παρακάλει, coherente con el mandato pastoral a Timoteo.'
