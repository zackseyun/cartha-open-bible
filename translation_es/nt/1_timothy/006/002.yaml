  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del POB inglés: πιστοὺς δεσπότας = ''amos creyentes'', μὴ καταφρονείτωσαν = ''no deben despreciarlos'', ἀδελφοί = ''hermanos'', y el cierre imperativo está bien representado. También preserva la dificultad de οἱ τῆς εὐεργεσίας ἀντιλαμβανόμενοι con nota. Sin embargo, ''con mayor empeño'' para μᾶλλον desplaza el sentido comparativo (''más'', ''aún más'') hacia una idea de intensidad/esfuerzo que no está explícita en el griego.'
  spanish_quality_summary: El español es claro y digno. No obstante, 'sírvanles con mayor empeño' suena algo interpretativo; 'sírvanles aún más' o 'mucho más' refleja mejor μᾶλλον y suena natural. La nota [b] es útil, pero no conviene imponer 'lit.' donde el griego no exige una glosa única; mejor presentar la fuerza esclavista como matiz léxico. El resto del texto lee bien en español eclesial neutral.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: δεσπότας -> ''amos'' es adecuado; πιστοὺς/πιστοί -> ''creyentes'' está bien; ἀδελφοί -> ''hermanos'' con nota inclusiva sigue la política documentada; παρακάλει -> ''exhorta'' es apropiado. No hay conflicto con términos troncales del glosario.'
  issues:
