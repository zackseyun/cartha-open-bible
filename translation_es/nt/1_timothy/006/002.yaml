revisions:
- from: Y los que tienen amos creyentes no deben despreciarlos porque son hermanos[a]; más bien, sírvanles[b] con mayor empeño, porque los que participan del beneficio son creyentes y amados[c]. Enseña y exhorta estas cosas.
  to: Y los que tienen amos creyentes no deben despreciarlos porque son hermanos[a]; más bien, sírvanles[b] aún más, porque los que participan del beneficio son creyentes y amados[c]. Enseña y exhorta estas cosas.
  rationale: Se ajusta μᾶλλον de 'con mayor empeño' a 'aún más' para reflejar con mayor fidelidad el comparativo griego sin añadir un matiz de esfuerzo. También se suaviza la formulación de la nota sobre δουλεύω para explicar el trasfondo esclavista sin presentar una literalidad excesivamente rígida.
  reviewer_model: gpt-5.4
