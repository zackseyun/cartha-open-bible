translation:
  language: es
  text: que él mostrará en sus propios tiempos[a]—el bienaventurado y único Soberano, el Rey de los que reinan y Señor de los que gobiernan[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en los tiempos señalados por él»; la frase denota los tiempos fijados por él.'
    reason: lexical_alternative
  - marker: b
    text: 'Rendición tradicional: «el Rey de reyes y Señor de señores». El griego usa participios, literalmente: «el Rey de los que reinan y Señor de los que gobiernan».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἣν
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - la que
  - que
  lexicon: BDAG
  rationale: El relativo femenino singular retoma ἐπιφάνειαν (v. 14), por lo que en español conviene un relativo femenino explícito. 'La cual' preserva el antecedente sin forzar una forma personal.
- source_word: καιροῖς ἰδίοις
  english_pob_choice: in his own times
  chosen_spanish: en sus propios tiempos
  alternatives_spanish:
  - a su debido tiempo
  - en el tiempo señalado por él
  - en sus tiempos propios
  lexicon: BDAG
  rationale: La expresión dativa con καιρός apunta a tiempos o temporadas fijadas. Se conserva el plural y el matiz de pertenencia con 'sus propios tiempos', siguiendo de cerca el griego y el audit trail inglés.
- source_word: δείξει
  english_pob_choice: will display
  chosen_spanish: mostrará
  alternatives_spanish:
  - revelará
  - dará a conocer
  - hará manifiesta
  lexicon: BDAG
  rationale: En español, 'mostrará' comunica bien la idea concreta de hacer visible o poner de manifiesto. 'Revelará' es posible, pero puede sonar más interpretativo; 'mostrará' mantiene mejor la fuerza del verbo.
- source_word: ὁ μακάριος
  english_pob_choice: the blessed
  chosen_spanish: el bienaventurado
  alternatives_spanish:
  - el bendito
  - el feliz
  lexicon: BDAG
  rationale: Como adjetivo sustantivado, μακάριος funciona aquí como título. 'Bienaventurado' mantiene el tono reverente y la carga tradicional adecuada en español; 'feliz' sería demasiado débil.
- source_word: μόνος δυνάστης
  english_pob_choice: only Sovereign
  chosen_spanish: único Soberano
  alternatives_spanish:
  - único Dominador
  - único gobernante
  - solo Soberano
  lexicon: BDAG
  rationale: δυνάστης expresa autoridad soberana y dominio. 'Soberano' transmite bien la majestad y el alcance del título; 'único' preserva μόνος con naturalidad en español.
- source_word: βασιλεὺς τῶν βασιλευόντων
  english_pob_choice: the King of those who reign
  chosen_spanish: el Rey de los que reinan
  alternatives_spanish:
  - el Rey de reyes
  - el Rey sobre los que reinan
  lexicon: BDAG
  rationale: Se mantiene el participio verbal del griego ('los que reinan') en lugar de convertirlo en el sustantivo tradicional 'reyes'. Esto conserva la transparencia morfológica del POB inglés y evita ocultar la forma griega.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - dueño
  - amo
  lexicon: BDAG
  rationale: En este título de majestad, 'Señor' es la equivalencia natural y reverente en español. 'Amo' o 'dueño' rebajarían el registro o sonarían demasiado domésticos.
- source_word: τῶν κυριευόντων
  english_pob_choice: of those who rule
  chosen_spanish: de los que gobiernan
  alternatives_spanish:
  - de los que ejercen dominio
  - de los señores
  lexicon: BDAG
  rationale: 'El participio κυριευόντων conserva fuerza verbal: ''los que gobiernan'' es fluido en español y mantiene la idea de ejercer dominio. Se evita ''señores'' para no convertir el participio en un sustantivo tradicional que borre la estructura griega.'
theological_decisions:
- issue: Identidad del sujeto que mostrará la aparición
  english_pob_reading: The subject is rendered without specifying beyond the Greek titles, allowing the verse's own wording to identify him as God in context.
  chosen_spanish_reading: Se mantiene la identificación por títulos exaltados sin añadir un sujeto explícito que resuelva la referencia más allá de lo que dice el griego.
  alternative_spanish_readings:
  - hacer explícito al Padre
  - nombrar directamente a Dios como sujeto
  rationale: El texto griego nombra al sujeto mediante títulos regios y no mediante un nombre propio. La traducción conserva esa forma y deja la identificación teológica en el contexto, sin forzar una aclaración que el versículo no formula.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés que ajustó 'at his own times' a 'in his own times'; por eso se eligió 'en sus propios tiempos' y se preservó el plural de καιροῖς ἰδίοις. También se retuvo la decisión auditada de traducir los participios con construcciones relativas para no ocultar la forma griega.
  spanish_consistency_notes:
  - Se usó 'Soberano' para δυνάστης conforme al registro de majestad del título y en coherencia con el principio POB de evitar trivializar términos de autoridad.
  - Se mantuvo 'Señor' para κύριος como título reverencial, sin sustituirlo por 'amo' o 'dueño'.
  - Se evitó 'Cristo' porque este versículo no contiene Χριστός; la referencia queda en los títulos exaltados del texto.
  - Se preservó el plural 'tiempos' para reflejar el griego καιροῖς sin suavizarlo a singular.
