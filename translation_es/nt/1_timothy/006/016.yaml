translation:
  language: es
  text: el único que tiene inmortalidad, que habita en luz inaccesible, a quien ninguno de los hombres[a] ha visto ni puede ver; a él sea la honra y el dominio eterno[b]. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ningún ser humano ha visto ni puede ver».
    reason: lexical_alternative
  - marker: b
    text: Algunos entienden esta descripción y doxología como referida más directamente al Señor Jesús Mesías en el contexto más amplio, aunque el lenguaje de invisibilidad apunta más naturalmente a Dios.
    reason: theological_note
lexical_decisions:
- source_word: μόνος
  english_pob_choice: alone
  chosen_spanish: el único
  alternatives_spanish:
  - solo
  - único
  lexicon: BDAG
  rationale: «El único» comunica con naturalidad la exclusividad que el inglés POB da con «alone», y suena más idiomático en español en una afirmación solemne sobre Dios.
- source_word: ἔχων ἀθανασίαν
  english_pob_choice: has immortality
  chosen_spanish: tiene inmortalidad
  alternatives_spanish:
  - posee inmortalidad
  - es inmortal
  lexicon: BDAG
  rationale: 'Se conserva la relación posesiva explícita del participio: la inmortalidad pertenece a él de manera única. «Tiene inmortalidad» sigue de cerca el griego sin volverlo una simple cualidad adjetival.'
- source_word: φῶς οἰκῶν ἀπρόσιτον
  english_pob_choice: dwelling in unapproachable light
  chosen_spanish: que habita en luz inaccesible
  alternatives_spanish:
  - que mora en luz inaccesible
  - habitante de luz inaccesible
  lexicon: BDAG
  rationale: «Habita» reproduce bien el participio de modo continuo y «luz inaccesible» conserva el valor de ἀπρόσιτος como algo que no puede ser abordado o alcanzado, no solo «visto».
- source_word: οὐδεὶς ἀνθρώπων
  english_pob_choice: no one among men
  chosen_spanish: ninguno de los hombres
  alternatives_spanish:
  - ningún ser humano
  - nadie
  lexicon: BDAG
  rationale: El griego usa un genitivo partitivo masculino plural con valor representativo. «Ninguno de los hombres» mantiene esa forma más cercana al texto fuente; «ningún ser humano» queda como alternativa inclusiva.
- source_word: οὐδὲ ἰδεῖν δύναται
  english_pob_choice: nor is able to see
  chosen_spanish: ni puede ver
  alternatives_spanish:
  - ni es capaz de verlo
  - ni puede llegar a verlo
  lexicon: BDAG
  rationale: En español, «ni puede ver» transmite de forma natural la incapacidad expresada por δύναται sin sobrecargar la frase. La idea de imposibilidad se conserva por el contexto y por el paralelismo con la vista previa.
- source_word: τιμὴ
  english_pob_choice: honor
  chosen_spanish: la honra
  alternatives_spanish:
  - el honor
  - la honra
  lexicon: BDAG
  rationale: Se prefirió «la honra» porque funciona bien en una doxología y evita una posible lectura meramente social de «honor»; además conserva un tono reverencial clásico sin ser arcaizante.
- source_word: κράτος αἰώνιον
  english_pob_choice: eternal dominion
  chosen_spanish: el dominio eterno
  alternatives_spanish:
  - el poder eterno
  - el señorío eterno
  lexicon: BDAG
  rationale: En contextos doxológicos, κράτος denota poder soberano manifestado en gobierno. «Dominio» refleja mejor esa idea que «poder» aislado y armoniza con la fórmula de alabanza.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén
  lexicon: BDAG
  rationale: Se conserva la transliteración litúrgica tradicional en español.
theological_decisions:
- issue: Referencia del sujeto implícito y de la doxología
  english_pob_reading: The verse continues describing God, and the doxology is addressed to him; the invisibility language most naturally points to God.
  chosen_spanish_reading: La cláusula describe a Dios y la doxología se dirige a él.
  alternative_spanish_readings:
  - Algunos podrían leer la descripción como referida más directamente al Señor Jesús Mesías en el contexto amplio.
  - La referencia queda deliberadamente abierta entre el Padre y el Hijo.
  rationale: La sintaxis inmediata y, sobre todo, la afirmación de que nadie lo ha visto ni puede verlo, favorecen que la referencia principal sea Dios. Se conserva la posibilidad cristológica señalada por el POB inglés sin resolverla artificialmente.
  doctrine_reference: Credo Niceno; principio POB de preservar la tensión teológica
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego y la auditoría inglesa del POB. Se mantuvo la tensión entre la exclusividad divina, la inaccesibilidad de la luz y la referencia de la doxología, sin suavizar el lenguaje ni convertirlo en una paráfrasis interpretativa. No se registraron revisiones previas aplicadas en este pasaje.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto cuando el texto lo exigiera; aquí no aparece el Tetragrámaton explícito.
  - «Mesías» se reserva para títulos donde el griego lo requiera; en este versículo la referencia doctrinal se expresa en la nota sin introducir el término en el texto principal.
  - «La honra» mantiene un registro doxológico natural en español y no altera el sentido de τιμή.
  - «Dominio eterno» conserva el valor soberano de κράτος en la fórmula de alabanza.
