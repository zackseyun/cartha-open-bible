translation:
  language: es
  text: Al profesarla[a], algunos se han desviado en cuanto a la fe[b]. La gracia[c] sea con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la cual, al profesarla algunos, se desviaron en cuanto a la fe». El griego conserva el pronombre relativo explícito, y el verbo también puede traducirse «erraron» o «se extraviaron».'
    reason: lexical_alternative
  - marker: b
    text: «La fe» aquí probablemente se refiere a la fe cristiana como cuerpo de creencias, aunque también podría entenderse más ampliamente como fe personal.
    reason: alternative_reading
  - marker: c
    text: El griego dice «con ustedes» en plural.
    reason: textual_variant
lexical_decisions:
- source_word: ἥν
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - la
  - eso
  lexicon: BDAG
  rationale: El relativo femenino singular retoma el antecedente inmediato; en español, tras el gerundio «profesándolo» el clítico «lo» funciona de manera natural y mantiene la referencia sin forzar un calco de género que podría sonar menos idiomático si se intentara reproducir literalmente el relativo.
- source_word: ἐπαγγελλόμενοι
  english_pob_choice: professing
  chosen_spanish: profesando
  alternatives_spanish:
  - afirmando
  - declarando
  - pretendiendo
  lexicon: BDAG
  rationale: El verbo aquí expresa una profesión o reivindicación pública, no una promesa. «Profesando» conserva el matiz de adhesión/afirmación doctrinal y corresponde bien al contexto polémico.
- source_word: περὶ τὴν πίστιν
  english_pob_choice: concerning the faith
  chosen_spanish: en cuanto a la fe
  alternatives_spanish:
  - con respecto a la fe
  - acerca de la fe
  - respecto de la fe
  lexicon: BDAG
  rationale: La preposición περί con acusativo indica referencia. «En cuanto a» suena natural en español y preserva la relación temática sin diluir el objeto doctrinal de «la fe».
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - fe
  - la fidelidad
  lexicon: BDAG
  rationale: Se conserva «la fe» porque en las Pastorales suele designar el cuerpo de la fe cristiana, no meramente la confianza subjetiva. El artículo ayuda a marcar ese sentido objetivo.
- source_word: ἠστόχησαν
  english_pob_choice: have missed the mark
  chosen_spanish: han errado
  alternatives_spanish:
  - se han desviado
  - han fallado el blanco
  - han y errado
  lexicon: BDAG
  rationale: El verbo apunta literalmente a fallar el objetivo. «Han errado» comunica la pérdida de dirección o desacierto doctrinal en un español sobrio; «fallado el blanco» sería más figurado, pero menos natural en este cierre epistolar.
- source_word: Ἡ χάρις
  english_pob_choice: Grace
  chosen_spanish: La gracia
  alternatives_spanish:
  - Gracia
  lexicon: BDAG
  rationale: Se mantiene el término teológico central «gracia». Aunque en español se puede omitir el artículo en una fórmula epistolar, aquí se conserva para reflejar con mayor literalidad la sintaxis griega y la fórmula de bendición.
- source_word: μεθ’ ὑμῶν
  english_pob_choice: be with you
  chosen_spanish: sea con ustedes
  alternatives_spanish:
  - esté con ustedes
  - sea con vosotros
  lexicon: BDAG
  rationale: El plural ὑμῶν se conserva con «ustedes». «Sea con ustedes» reproduce la bendición final de manera natural y completa en español, manteniendo el número plural sin singularizarla para Timoteo.
theological_decisions:
- issue: Sentido de «la fe»
  english_pob_reading: objective reference to the Christian faith
  chosen_spanish_reading: referencia objetiva a la fe cristiana como cuerpo de doctrina
  alternative_spanish_readings:
  - fe personal o confianza subjetiva
  - la fe como fidelidad
  rationale: En el contexto inmediato de la falsa enseñanza, «la fe» se entiende mejor como la fe cristiana recibida y confesada. Esa lectura preserva la advertencia paulina contra el desvío doctrinal.
  doctrine_reference: Contested terms table for πίστις; Translation philosophy §3
- issue: Destinatarios de la bendición final
  english_pob_reading: plural 'you' retained
  chosen_spanish_reading: plural «ustedes» retenido
  alternative_spanish_readings:
  - singularizar a Timoteo
  rationale: El griego tiene ὑμῶν en plural. Mantener el plural evita borrar un detalle textual y deja abierta la posible ampliación de la despedida a la comunidad creyente asociada con Timoteo.
  doctrine_reference: Translation philosophy §1 y §5
translation_notes:
  revision_awareness: No se requirieron cambios en la última pasada de revisión; el acuerdo externo fue alto y la forma final quedó estable.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se mantiene «la fe» como término técnico en línea con el uso pastoral.
  - Se conserva el plural de la bendición final con «ustedes», sin singularizarlo a Timoteo.
  - El registro es bíblico moderno y sobrio, sin arcaísmos innecesarios.
