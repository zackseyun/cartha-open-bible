translation:
  language: es
  text: Pero si tenemos alimento y cobertura[a], con estos nos contentaremos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ropa»; el término griego puede referirse más ampliamente a lo que cubre a una persona, posiblemente incluso refugio o techo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχοντες
  english_pob_choice: if we have
  chosen_spanish: si tenemos
  alternatives_spanish:
  - teniendo
  - puesto que tenemos
  lexicon: BDAG
  rationale: El participio funciona de manera circunstancial y introduce la condición o situación para la afirmación principal. En español, «si tenemos» comunica con naturalidad esa relación sin volverla demasiado causal o explicativa.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca un giro leve respecto de la advertencia anterior; «Pero» conserva ese matiz de contraste sin exagerarlo.
- source_word: διατροφὰς
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - provisiones
  - sustento
  lexicon: BDAG
  rationale: διατροφή denota medios de sustento, especialmente comida. «Alimento» es amplio, natural y suficientemente preciso para el español actual.
- source_word: σκεπάσματα
  english_pob_choice: covering
  chosen_spanish: abrigo
  alternatives_spanish:
  - cobertura
  - vestido
  - ropa
  - techo
  lexicon: BDAG
  rationale: σκέπασμα puede referirse a lo que cubre, con alcance potencialmente más amplio que solo ropa. «Abrigo» preserva la idea de cobertura y, en español, puede sugerir ropa y protección básica sin restringir indebidamente el término.
- source_word: τούτοις
  english_pob_choice: with these
  chosen_spanish: con estos
  alternatives_spanish:
  - con estas cosas
  - con ellos
  lexicon: BDAG
  rationale: El demostrativo retoma los bienes básicos mencionados. «Con estos» es breve y conserva el valor deíctico del griego.
- source_word: ἀρκεσθησόμεθα
  english_pob_choice: we will be content
  chosen_spanish: nos contentaremos
  alternatives_spanish:
  - nos bastará
  - estaremos satisfechos
  lexicon: BDAG
  rationale: La forma futura pasiva/deponente expresa suficiencia y contentamiento. «Nos contentaremos» reproduce bien el sentido de contentarse con lo suficiente en un futuro afirmativo.
theological_decisions:
- issue: Alcance de σκεπάσματα
  english_pob_reading: broad 'covering' that may include clothing and shelter
  chosen_spanish_reading: abrigo de alcance amplio, no limitado a ropa
  alternative_spanish_readings:
  - ropa
  - vestido
  - techo
  rationale: El griego no obliga a reducir el término a una sola categoría material. «Abrigo» mantiene la amplitud semántica y deja abierta la posibilidad de que incluya ropa y protección básica, conforme al criterio auditado del POB en inglés.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo en la revisión más reciente y no requirió cambios sustanciales; la presente redacción sigue el trazado auditado del inglés POB, manteniendo la amplitud de σκεπάσματα y el matiz circunstancial de ἔχοντες.
  spanish_consistency_notes:
  - Se usó «alimento» para διατροφὰς, manteniendo un registro claro y no especializado.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; el versículo no contiene el nombre divino.
  - «Abrigo» se eligió por su capacidad de cubrir sin estrechar el alcance de σκεπάσματα a una sola posibilidad.
  - La puntuación y el orden sintáctico buscan fluidez natural en español sin perder la estructura condicional/circunstancial del griego.
