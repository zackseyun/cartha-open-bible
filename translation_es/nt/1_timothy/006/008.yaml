  to: Pero si tenemos alimento y cobertura[a], con estos nos contentaremos.
  rationale: Se ajusta σκεπάσματα a una opción española más amplia y fiel al rationale auditado del POB inglés, evitando el estrechamiento potencial de «abrigo». También se simplifican las notas para conservar solo la ambigüedad léxica realmente significativa en este versículo.
