translation:
  language: es
  text: Si alguno enseña otra doctrina[a] y no se conforma con las sanas palabras, las de nuestro Señor Jesús Mesías[b][c], y con la enseñanza que es conforme a la piedad[d],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «enseña de otro modo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las palabras de nuestro Señor Jesús Mesías»; el griego también admite la lectura más literal: «las palabras de nuestro Señor Jesús Cristo».'
    reason: lexical_alternative
  - marker: c
    text: «Mesías» traduce aquí Χριστός para conservar su fuerza titular.
    reason: theological_note
  - marker: d
    text: 'O: «que corresponde a la piedad» o «en conformidad con la piedad».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἑτεροδιδασκαλεῖ
  english_pob_choice: teaches a different doctrine
  chosen_spanish: enseña otra doctrina
  alternatives_spanish:
  - enseña doctrinas distintas
  - enseña algo diferente
  - enseña doctrina falsa
  lexicon: BDAG
  rationale: El verbo compuesto comunica enseñar algo distinto de la enseñanza apostólica recibida. En español, «otra doctrina» preserva el contraste doctrinal sin añadir explícitamente «falsa», que el contexto sugiere pero no exige léxicamente.
- source_word: προσέρχεται
  english_pob_choice: agree with
  chosen_spanish: se conforma con
  alternatives_spanish:
  - se adhiere a
  - se acerca a
  - acepta
  lexicon: BDAG
  rationale: Aquí el verbo con dativo expresa adherirse o ajustarse a algo. «Se conforma con» refleja esa idea de conformidad con las palabras sanas y suena natural en español bíblico contemporáneo.
- source_word: ὑγιαίνουσι λόγοις
  english_pob_choice: sound words
  chosen_spanish: las palabras sanas
  alternatives_spanish:
  - palabras saludables
  - palabras sanas de doctrina
  - la sana enseñanza
  lexicon: BDAG
  rationale: Se conserva la metáfora de salud aplicada al habla/doctrina. «Palabras sanas» mantiene el vínculo con λόγοις («palabras») y evita desplazar el énfasis hacia «enseñanza» antes de tiempo.
- source_word: τοῖς τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: those of our Lord Jesus Messiah
  chosen_spanish: las de nuestro Señor Jesús Mesías
  alternatives_spanish:
  - las de nuestro Señor Jesús Cristo
  - las palabras de nuestro Señor Jesús Mesías
  - las de nuestro Señor Jesucristo
  lexicon: BDAG
  rationale: La frase genitiva señala que esas palabras pertenecen a Jesús y provienen de él. En español, «las de» evita repetir «palabras» y mantiene la referencia. Se conserva «Mesías» para Χριστός, conforme a la política del proyecto cuando el título sigue vivo como título.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός como «Mesías», no como nombre fijo. «Cristo» queda como alternativa tradicional, pero no se adopta en el texto principal porque el marco del proyecto prefiere traducir el título cuando conserva su fuerza semántica.
- source_word: κατ’ εὐσέβειαν
  english_pob_choice: that accords with godliness
  chosen_spanish: que es conforme a la piedad
  alternatives_spanish:
  - que corresponde a la piedad
  - en conformidad con la piedad
  - que conduce a la piedad
  lexicon: BDAG
  rationale: La construcción κατά expresa conformidad o correspondencia. «Que es conforme a la piedad» reproduce ese valor sin introducir una causalidad que el griego no exige. «Piedad» mantiene el término pastoral tradicional y comprensible en español.
- source_word: διδασκαλίᾳ
  english_pob_choice: the teaching
  chosen_spanish: la enseñanza
  alternatives_spanish:
  - la doctrina
  - la instrucción
  lexicon: BDAG
  rationale: διδασκαλία puede referirse al contenido enseñado. «Enseñanza» resulta natural en español y conserva la referencia al cuerpo de instrucción apostólica sin forzar un tecnicismo.
theological_decisions:
- issue: Rendering of Χριστοῦ in el título completo Ἰησοῦ Χριστοῦ
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  - Jesucristo
  rationale: Se conserva la distinción entre el nombre propio Jesús y el título mesiánico. En la línea del POB, traducir Χριστός como «Mesías» hace visible el contenido titular y evita que el término funcione solo como fórmula fija.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested terminology for Χριστός'
- issue: Matiz de προσέρχεται con dative objects
  english_pob_reading: does not agree with sound words
  chosen_spanish_reading: no se conforma con las palabras sanas
  alternative_spanish_readings:
  - no se adhiere a las palabras sanas
  - no acepta las palabras sanas
  - no se acerca a las palabras sanas
  rationale: El griego no describe mera cercanía física sino orientación/apego a un contenido. «Se conforma con» expresa adecuación o alineación doctrinal y conserva el peso de la negativa.
  doctrine_reference: BDAG for προσέρχομαι in this context; doctrinal consistency in Pastorals
- issue: Relación entre las palabras sanas y la enseñanza conforme a la piedad
  english_pob_reading: sound words ... and with the teaching that accords with godliness
  chosen_spanish_reading: las palabras sanas ... y con la enseñanza que es conforme a la piedad
  alternative_spanish_readings:
  - las palabras sanas ... y con la enseñanza acorde con la piedad
  - las palabras sanas ... y con la doctrina conforme a la piedad
  rationale: 'Se preservan como dos expresiones relacionadas pero no idénticas: «palabras sanas» y «enseñanza». Esto mantiene la estructura del griego y evita nivelarlas en una sola idea.'
  doctrine_reference: SBLGNT syntax; semantic distinction between λόγοις and διδασκαλίᾳ
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego SBLGNT y toma en cuenta el audit trail inglés: se conserva el contraste entre ἑτεροδιδασκαλεῖ y las palabras sanas; se mantiene la distinción entre λόγοις y διδασκαλίᾳ; y se adopta «Mesías» para Χριστός, acorde con la política del proyecto y la corrección final que restauró esa decisión tras una pasada de revisión que había cambiado el término a «Christ».'
  spanish_consistency_notes:
  - He usado «Mesías» de manera consistente para Χριστός en el texto principal.
  - He preferido «enseñanza» para διδασκαλία y «palabras» para λόγοις, preservando la diferencia léxica.
  - «Piedad» se mantiene como término pastoral estándar para εὐσέβεια; no se reemplaza por «devoción» salvo que el contexto lo exigiera.
  - La negación «no se conforma con» refleja mejor el valor contextual de προσέρχεται que un calco de «se acerca a».
