translation:
  language: es
  text: Todos los que son esclavos bajo un yugo[a] deben considerar a sus propios amos dignos de todo honor, para que no se difame[b] el nombre de Dios y la enseñanza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos»; griego δοῦλοι. Aquí se usa «esclavos» porque la expresión «bajo un yugo» hace explícita la condición de sujeción.
    reason: alternative_reading
  - marker: b
    text: O «se blasfeme»; o «se hable injuriosamente de».
    reason: lexical_alternative
  - marker: c
    text: O «la doctrina».
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - esclavos de casa
  - siervos sujetos
  lexicon: BDAG
  rationale: 'Sigo la fuerza social del griego y del POB inglés: δοῦλοι nombra una condición de esclavitud, no solo de servicio. En español, «esclavos» conserva esa carga; «siervos» la atenúa demasiado.'
- source_word: ὑπὸ ζυγὸν
  english_pob_choice: under a yoke
  chosen_spanish: bajo yugo
  alternatives_spanish:
  - bajo un yugo
  - sometidos a un yugo
  lexicon: BDAG
  rationale: La imagen de sujeción debe mantenerse. «Bajo yugo» es natural en español bíblico y conserva la metáfora de opresión sin explicarla en exceso.
- source_word: δεσπότας
  english_pob_choice: masters
  chosen_spanish: amos
  alternatives_spanish:
  - amos de casa
  - señores
  - patrones
  lexicon: BDAG
  rationale: En el contexto de esclavitud doméstica, «amos» refleja mejor la relación de autoridad que «señores» o «patrones». Evita además una asociación excesivamente formal o eclesiástica.
- source_word: ἰδίους
  english_pob_choice: their own
  chosen_spanish: sus propios
  alternatives_spanish:
  - sus respectivos
  - los propios
  lexicon: BDAG
  rationale: La posesión específica se expresa con claridad en español con «sus propios», distinguiendo a estos amos de cualquier otro.
- source_word: πάσης τιμῆς ἀξίους
  english_pob_choice: worthy of all honor
  chosen_spanish: dignos de todo honor
  alternatives_spanish:
  - dignos de pleno honor
  - dignos de todo respeto
  lexicon: BDAG
  rationale: «Dignos de todo honor» reproduce bien la valoración total del griego. «Respeto» sería posible, pero debilita el término y no mantiene tan bien la amplitud de τιμή.
- source_word: ἡγείσθωσαν
  english_pob_choice: should regard
  chosen_spanish: deben considerar
  alternatives_spanish:
  - deben estimar
  - deben tener por
  lexicon: BDAG
  rationale: El imperativo exhortativo pide una postura evaluativa sostenida. «Deben considerar» es claro y normativo en español, sin sonar arcaico.
- source_word: τὸ ὄνομα τοῦ θεοῦ
  english_pob_choice: the name of God
  chosen_spanish: el nombre de Dios
  alternatives_spanish:
  - el nombre de Dios
  - el nombre del Dios
  lexicon: BDAG
  rationale: Conservo la formulación directa del griego. En español, «el nombre de Dios» comunica tanto la identidad revelada como la reputación asociada al nombre.
- source_word: ἡ διδασκαλία
  english_pob_choice: the teaching
  chosen_spanish: la enseñanza
  alternatives_spanish:
  - la doctrina
  - la instrucción
  lexicon: BDAG
  rationale: Sigo la opción del POB inglés por «the teaching». En español, «la enseñanza» mantiene el sentido amplio sin cargar el término con tecnicismo doctrinal posterior.
- source_word: βλασφημῆται
  english_pob_choice: may not be slandered
  chosen_spanish: sea blasfemado
  alternatives_spanish:
  - sea difamado
  - sea ultrajado con palabras
  - sea maldecido
  lexicon: BDAG
  rationale: Aquí el verbo afecta tanto al nombre de Dios como a la enseñanza; por eso «sea blasfemado» conserva mejor la fuerza religiosa del griego que «difamado». En el registro bíblico español, esta opción mantiene la tensión entre ofensa verbal y profanación.
theological_decisions:
- issue: δοῦλοι en un contexto de esclavitud real
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - bondadosos
  rationale: La versión inglesa adopta «slaves» porque la condición de sujeción es explícita por «under a yoke». En español, «esclavos» preserva esa realidad social sin suavizarla. No pretende legitimar la esclavitud, sino representar fielmente el supuesto del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table for δοῦλος
- issue: βλασφημέω aplicado al nombre de Dios y a la enseñanza
  english_pob_reading: may not be slandered
  chosen_spanish_reading: sea blasfemado
  alternative_spanish_readings:
  - sea difamado
  - sea calumniado
  rationale: Aunque el inglés POB eligió «slandered» por naturalidad, en español el coordinado con «el nombre de Dios» y «la enseñanza» queda mejor con «blasfemado», porque conserva el peso religioso del verbo. Esto mantiene visible la tensión entre deshonra verbal y blasfemia.
  doctrine_reference: BDAG; contexto de coordinados en 1 Timoteo 6:1
- issue: ἡ διδασκαλία y su alcance
  english_pob_reading: the teaching
  chosen_spanish_reading: la enseñanza
  alternative_spanish_readings:
  - la doctrina
  rationale: La elección evita imponer un tecnicismo dogmático posterior donde el griego puede referirse más ampliamente a la enseñanza cristiana. En español, «la enseñanza» permite ese alcance sin perder precisión.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; el último pase de revisión indica que no hubo cambios necesarios y el acuerdo interrevisor fue alto. La presente redacción mantiene esa lectura base con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, sin sustituir por un equivalente más confesional o perifrástico.
  - Se conserva «enseñanza» para διδασκαλία, en coherencia con el POB inglés y su preferencia por un registro menos técnico que «doctrina».
  - Se traduce δοῦλοι como «esclavos» por la saliencia contextual de ὑπὸ ζυγὸν, siguiendo el criterio del POB inglés y evitando suavizar la realidad social del pasaje.
  - Se usa «blasfemado» para βλασφημῆται por la coordinación con el nombre de Dios, aunque el inglés POB opta por «slandered»; la nota registra la alternativa inglesa y la razón de la adaptación española.
