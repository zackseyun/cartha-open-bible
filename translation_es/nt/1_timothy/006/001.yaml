    rationale: «Todos los que están bajo yugo y son esclavos» es comprensible, pero «Todos los que son esclavos bajo un yugo» suena más idiomático y expresa mejor la estrecha relación entre esclavitud y yugo.
  - severity: low
    issue: La nota a incluye «sirvientes», que puede debilitar demasiado δοῦλοι.
    rationale: Dado el razonamiento auditado, la alternativa más relevante es «siervos»; «sirvientes» en español contemporáneo puede sugerir trabajo asalariado y alejarse del matiz de servidumbre forzada.
  - severity: low
