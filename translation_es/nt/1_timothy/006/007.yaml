translation:
  language: es
  text: Porque nada trajimos al mundo[a], y tampoco podemos sacar nada de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Porque nada trajimos al mundo, porque/ni tampoco podemos sacar nada de él». La conjunción griega puede entenderse en sentido causal («porque») o como introducción de la segunda afirmación paralela.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - no ... nada
  lexicon: BDAG
  rationale: El negativo indefinido funciona como objeto directo de «trajimos»; «nada» es la equivalencia natural en español y conserva la negación absoluta sin sobrecargar la frase.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón o fundamento de lo dicho antes. «Porque» conserva bien la fuerza explicativa del conector griego y suena natural en español.
- source_word: εἰσηνέγκαμεν
  english_pob_choice: brought
  chosen_spanish: trajimos
  alternatives_spanish:
  - metimos
  - introdujimos
  - llevamos dentro
  lexicon: BDAG
  rationale: Aoristo de εἰσφέρω, «traer dentro / introducir». En español, «trajimos» comunica con naturalidad la idea de entrar al mundo al nacer, sin perder el movimiento de entrada implícito.
- source_word: εἰς τὸν κόσμον
  english_pob_choice: into the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - en el mundo
  - a este mundo
  lexicon: BDAG
  rationale: κόσμος aquí apunta al ámbito humano de la existencia terrenal. «Al mundo» expresa el ingreso al ámbito de la vida con naturalidad y fidelidad semántica.
- source_word: ὅτι
  english_pob_choice: and
  chosen_spanish: y tampoco
  alternatives_spanish:
  - porque
  - ni
  lexicon: BDAG
  rationale: La conjunción puede leerse causalmente o como introducción de la segunda afirmación paralela. En español, «y tampoco» mantiene la relación coordinada y la simetría proverbial sin resolver de más la ambigüedad.
- source_word: ἐξενεγκεῖν
  english_pob_choice: to carry ... out
  chosen_spanish: sacar
  alternatives_spanish:
  - llevar afuera
  - sacar fuera
  - llevarnos
  lexicon: BDAG
  rationale: 'Infinitivo de ἐκφέρω: «sacar / llevar fuera». «Sacar» es breve, claro y reproduce la imagen de salida del mundo al morir.'
- source_word: τι
  english_pob_choice: anything
  chosen_spanish: nada
  alternatives_spanish:
  - algo
  - cosa alguna
  lexicon: BDAG
  rationale: Bajo negación, el pronombre indefinido se expresa naturalmente con «nada» en español, preservando la absolutidad del enunciado.
- source_word: δυνάμεθα
  english_pob_choice: we are not able
  chosen_spanish: podemos
  alternatives_spanish:
  - somos capaces
  - podemos hacerlo
  lexicon: BDAG
  rationale: El griego tiene δύναμαι con negación previa; en español, la idea total se expresa de forma más idiomática con «tampoco podemos» en vez de repetir una perífrasis larga, manteniendo el sentido de incapacidad.
theological_decisions:
- issue: Relación lógica de ὅτι en la segunda mitad del versículo
  english_pob_reading: A coordinate continuation expressing the corresponding truth that nothing can be taken out of the world at death.
  chosen_spanish_reading: 'Una continuación coordinada con valor paralelo: no trajimos nada al mundo y tampoco podemos sacar nada de él.'
  alternative_spanish_readings:
  - Porque tampoco podemos sacar nada.
  - Ya que tampoco podemos sacar nada.
  rationale: El griego admite una lectura causal o una lectura de paralelo proverbial. La redacción española conserva esa tensión, haciendo explícita la correspondencia sin fijar exclusivamente el valor causal.
  doctrine_reference: Translation philosophy §3 (preservar la tensión sin resolverla innecesariamente)
translation_notes:
  revision_awareness: 'Coincide con el pasaje griego y con el audit trail inglés en el punto principal: una sentencia proverbial de doble afirmación, con la ambigüedad de ὅτι preservada en español de manera natural.'
  spanish_consistency_notes:
  - Se mantiene «mundo» para κόσμος en sentido de ámbito de vida humana, no «cosmos».
  - Se evita «SEÑOR» u otros sustitutos no presentes en el texto.
  - La negación absoluta se conserva con «nada» en ambos miembros de la oración.
  - La segunda cláusula conserva la lectura paralela sin forzar una sola relación causal.
