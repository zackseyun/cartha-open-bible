translation:
  language: es
  text: está envanecido[a], sin entender nada, sino enfermo por polémicas y batallas de palabras[b], de las cuales provienen envidia, contienda, calumnias[c] y sospechas maliciosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha llegado a ser orgulloso». El griego evoca literalmente estar hinchado o inflado de orgullo.
    reason: lexical_alternative
  - marker: b
    text: O «disputas de palabras» o «riñas sobre palabras».
    reason: lexical_alternative
  - marker: c
    text: Aquí «calumnias» refleja habla injuriosa contra personas; el término griego en otros contextos puede significar «blasfemias».
    reason: lexical_alternative
lexical_decisions:
- source_word: τετύφωται
  english_pob_choice: is puffed up
  chosen_spanish: está envanecido
  alternatives_spanish:
  - está hinchado de orgullo
  - ha llegado a ser orgulloso
  - está puffed up
  lexicon: BDAG
  rationale: El perfecto pasivo/medio comunica un estado resultante de orgullo. «Está envanecido» conserva la idea de hinchazón moral sin sonar demasiado literal en español; mantiene la metáfora y el estado presente.
- source_word: μηδὲν ἐπιστάμενος
  english_pob_choice: understanding nothing
  chosen_spanish: no entendiendo nada
  alternatives_spanish:
  - no sabiendo nada
  - sin entender nada
  - ignorando todo
  lexicon: BDAG
  rationale: El participio describe una carencia real de comprensión. «No entendiendo nada» expresa bien la incapacidad de captar el asunto sin endurecer el matiz a mera falta de datos.
- source_word: νοσῶν
  english_pob_choice: sick with a craving
  chosen_spanish: enfermo por
  alternatives_spanish:
  - morbosamente aficionado a
  - con una obsesión enfermiza por
  - apasionado de manera malsana por
  lexicon: BDAG
  rationale: El verbo conserva una metáfora de enfermedad. «Enfermo por» mantiene la imagen patológica y permite que el complemento específico venga después, como en el griego.
- source_word: περὶ ζητήσεις
  english_pob_choice: for controversies
  chosen_spanish: polémicas
  alternatives_spanish:
  - controversias
  - disputas
  - especulaciones
  lexicon: BDAG
  rationale: En el contexto pastoral, ζητήσεις apunta a controversias o discusiones especulativas. «Polémicas» comunica esa idea en español actual y encaja con la imagen de una fijación malsana.
- source_word: καὶ λογομαχίας
  english_pob_choice: word-battles
  chosen_spanish: batallas de palabras
  alternatives_spanish:
  - disputas sobre palabras
  - contiendas verbales
  - riñas de palabras
  lexicon: BDAG
  rationale: El compuesto tiene fuerza combativa y verbal. «Batallas de palabras» preserva esa energía y resulta natural en español, aunque es una equivalencia más expresiva que técnica.
- source_word: ἐξ ὧν γίνεται
  english_pob_choice: from which come
  chosen_spanish: de las cuales provienen
  alternatives_spanish:
  - de donde nacen
  - de las que resultan
  - de las cuales surgen
  lexicon: BDAG
  rationale: La frase presenta los vicios como resultado de las controversias y batallas de palabras. «De las cuales provienen» refleja bien el origen causal con concordancia natural en español.
- source_word: φθόνος
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  lexicon: BDAG
  rationale: El término denota resentimiento envidioso. «Envidia» es la correspondencia más directa y estándar en español.
- source_word: ἔρις
  english_pob_choice: strife
  chosen_spanish: contienda
  alternatives_spanish:
  - discordia
  - pleito
  - riña
  lexicon: BDAG
  rationale: Ἔρις expresa disputa y conflicto. «Contienda» mantiene el registro bíblico y conserva la idea de pelea o discordia activa.
- source_word: βλασφημίαι
  english_pob_choice: slanders
  chosen_spanish: blasfemias
  alternatives_spanish:
  - calumnias
  - maledicencias
  - injurias
  lexicon: BDAG
  rationale: El inglés POB opta por «slanders» en este contexto interpersonal, aunque reconoce el sentido posible de «blasphemies». En español, «blasfemias» conserva la tensión léxica documentada; en uso contextual también puede oírse como habla injuriosa, pero no se desactiva la lectura literal del griego.
- source_word: ὑπόνοιαι πονηραί
  english_pob_choice: evil suspicions
  chosen_spanish: sospechas malas
  alternatives_spanish:
  - sospechas malignas
  - sospechas perversas
  - malas suposiciones
  lexicon: BDAG
  rationale: Ὑπόνοιαι son sospechas o conjeturas, y πονηραί las califica moralmente. «Sospechas malas» es fiel y claro; se evita suavizarlo a una formulación psicológica menos directa.
theological_decisions:
- issue: Sentido de βλασφημίαι en una lista de vicios relacionales
  english_pob_reading: Here 'slanders' reflects abusive speech against people; the Greek term can in other contexts mean 'blasphemies.'
  chosen_spanish_reading: «Blasfemias» se mantiene como traducción principal, con la tensión contextual de habla injuriosa contra personas sin borrar el valor habitual del término.
  alternative_spanish_readings:
  - calumnias
  - maledicencias
  - injurias
  rationale: El griego permite una oscilación entre injuria contra personas y blasfemia en sentido más amplio. En español, «blasfemias» conserva esa ambivalencia tradicional del vocablo y deja visible la tensión léxica documentada por la auditoría inglesa.
  doctrine_reference: Uso contextual del vocabulario de pecado de la lengua; cf. listas de vicios en las Pastorales.
translation_notes:
  revision_awareness: Se siguió de cerca el expediente inglés auditado y no se introdujeron cambios de sentido sustantivos. La principal adaptación fue ajustar la sintaxis al español natural manteniendo las metáforas de hinchazón y enfermedad, y preservando la tensión léxica de βλασφημίαι.
  spanish_consistency_notes:
  - Se mantuvo Yahvé/Jesús/Mesías según las normas del proyecto, aunque este versículo no contiene esos términos.
  - Se usó un registro bíblico moderno, evitando calcos innecesarios pero conservando imágenes corporales/metafóricas del griego.
  - Las alternativas en notas preservan las opciones documentadas por el POB inglés y la ambigüedad contextual de βλασφημίαι.
