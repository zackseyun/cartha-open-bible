translation:
  language: es
  text: acumulando para sí un buen fundamento para el futuro, a fin de que echen mano de la vida que verdaderamente es vida.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἀποθησαυρίζοντας
  english_pob_choice: storing up
  chosen_spanish: acumulando
  alternatives_spanish:
  - atesorando
  - guardando
  lexicon: BDAG
  rationale: El participio presente sigue la exhortación anterior y expresa acción continua. «Acumulando» conserva la idea de reunir con propósito y suena natural en español; «atesorando» mantiene más explícita la imagen del tesoro, pero puede sonar más valorativo que acumulativo.
- source_word: ἑαυτοῖς
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos mismos
  - para sí mismos
  lexicon: BDAG
  rationale: El dativo reflexivo indica beneficio para los sujetos. «Para sí» es una forma breve y natural en español, sin perder el sentido reflexivo.
- source_word: θεμέλιον καλὸν
  english_pob_choice: a good foundation
  chosen_spanish: un buen fundamento
  alternatives_spanish:
  - una buena base
  - un fundamento bueno
  lexicon: BDAG
  rationale: θεμέλιον es «fundamento» y καλός aquí expresa bondad, solidez o conveniencia. «Buen fundamento» conserva la metáfora arquitectónica y es idiomático en español.
- source_word: εἰς τὸ μέλλον
  english_pob_choice: for the future
  chosen_spanish: para el futuro
  alternatives_spanish:
  - para lo venidero
  - para el tiempo venidero
  lexicon: BDAG
  rationale: La frase mira hacia lo que está por venir. «Para el futuro» reproduce bien el alcance prospectivo sin añadir explícitamente una interpretación más técnica de «edad venidera».
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: a fin de que
  alternatives_spanish:
  - para que
  - de modo que
  lexicon: BDAG
  rationale: Conjunción final de propósito. «A fin de que» es clara y suficientemente formal para una prosa bíblica contemporánea.
- source_word: ἐπιλάβωνται
  english_pob_choice: they may take hold of
  chosen_spanish: se apoderen de
  alternatives_spanish:
  - tomen posesión de
  - se aferren a
  lexicon: BDAG
  rationale: El verbo medio puede expresar tomar, agarrar o apoderarse. «Se apoderen de» conserva la fuerza vívida y activa del gesto de tomar posesión; «se aferren a» desplaza el matiz hacia sujeción o adhesión.
- source_word: τῆς ⸀ὄντως ζωῆς
  english_pob_choice: the life that is truly life
  chosen_spanish: la vida que verdaderamente es vida
  alternatives_spanish:
  - la vida que realmente es vida
  - la verdadera vida
  lexicon: BDAG
  rationale: ὄντως modifica ζωή con el sentido de «verdaderamente, realmente». Mantener «vida» explícita preserva el contraste retórico del griego. «La verdadera vida» es más breve, pero pierde la repetición enfática de ζωή.
theological_decisions:
- issue: Si εἰς τὸ μέλλον debe sonar escatológico en español
  english_pob_reading: for the future
  chosen_spanish_reading: para el futuro
  alternative_spanish_readings:
  - para la venidera era
  - para el tiempo venidero
  rationale: El contexto sugiere una proyección hacia realidades futuras y eternas, pero la expresión griega es amplia. Se mantiene una formulación abierta para no forzar el texto más allá de su alcance verbal.
  doctrine_reference: Preservar la tensión escatológica sin resolverla de antemano.
- issue: Cómo expresar τῆς ὄντως ζωῆς sin neutralizar el contraste teológico
  english_pob_reading: the life that is truly life
  chosen_spanish_reading: la vida que verdaderamente es vida
  alternative_spanish_readings:
  - la vida que realmente es vida
  - la vida verdadera
  rationale: 'La repetición de «vida» deja ver el énfasis del griego: no se trata de cualquier vida, sino de la que posee realidad plena. Se evita reducirlo a una etiqueta abstracta como «vida verdadera» para conservar el golpe retórico.'
  doctrine_reference: Mantener el contraste entre vida aparente y vida real conforme al texto.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que preserva explícitamente ζωή en la cláusula final. En español se reflejó ese ajuste manteniendo la palabra «vida» dos veces para reproducir la intensidad del original, en lugar de resolverla con una sola expresión resumida.
  spanish_consistency_notes:
  - Se usa «fundamento» para θεμέλιον, siguiendo el campo metafórico de construcción.
  - «Para sí» mantiene el reflexivo de ἑαυτοῖς sin añadir énfasis innecesario.
  - No se introdujo vocabulario eclesiástico tradicional ajeno al griego, como «merecer» o «alcanzar»; se conservó la imagen de tomar posesión.
  - Se evitó «vida verdadera» en el texto principal porque en español puede sonar más interpretativo que el griego ὄντως ζωή.
