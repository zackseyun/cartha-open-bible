review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: participio continuado («acumulando»), dativo de beneficio («para sí»), metáfora de fundamento, orientación futura, propósito con ἵνα, y la cláusula final con la repetición enfática de «vida». Sin embargo, «se apoderen de» para ἐπιλάβωνται introduce en español un matiz de apropiación agresiva o despojo que no está exigido por el verbo griego ni por la decisión inglesa auditada («take hold of»).'
  spanish_quality_summary: El texto es claro y digno, pero «acumulando» pierde algo de la imaginería de tesoro presente en ἀποθησαυρίζοντας, y sobre todo «se apoderen de» suena poco natural en registro bíblico pastoral y puede sugerir violencia. «Atenorando/atesorando» sería posible, pero no imprescindible; el ajuste realmente necesario es la cláusula final verbal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La repetición «la vida que verdaderamente es vida» está bien alineada con la revisión inglesa. La nota al pie actual, sin embargo, no funciona como alternativa léxica porque repite exactamente el texto principal; debe ofrecer una alternativa real o eliminarse.
  issues:
  - severity: medium
    issue: «se apoderen de» para ἐπιλάβωνται
    rationale: En español suele implicar apropiación hostil o ilegítima. El griego aquí expresa «asir, tomar, aferrarse, alcanzar» en un sentido exhortativo positivo. «echen mano de» o «se aferren a» preservan mejor la fuerza sin el matiz impropio.
  - severity: medium
    issue: La nota [a] repite el texto principal
    rationale: El inglés conserva en nota la alternativa más literal frente a un texto principal algo más idiomático; aquí el texto principal ya es la forma literal, por lo que la nota no añade información y debe cambiarse o suprimirse.
  - severity: low
    issue: «acumulando» atenúa la imaginería de tesoro
    rationale: No es un error grave, porque comunica reunir para el futuro, pero «atesorando» reflejaría mejor ἀποθησαυρίζοντας. Aun así, el borrador puede repararse sin tocar este punto si se prioriza mínima intervención.
  revised_spanish_text: acumulando para sí un buen fundamento para el futuro, a fin de que echen mano de la vida que verdaderamente es vida.
  revision_rationale: 'Se elimina la nota porque duplicaba exactamente el texto principal y no aportaba una alternativa real. Se cambia «se apoderen de» por «echen mano de» para reflejar mejor ἐπιλάβωνται: una acción vigorosa de asir o apropiarse en sentido positivo, sin el matiz de despojo que tiene «apoderarse» en español. El resto del verso puede mantenerse, pues conserva fielmente el sentido del griego y la decisión auditada en inglés.'
