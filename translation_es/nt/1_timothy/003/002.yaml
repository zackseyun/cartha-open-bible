review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la lista de cualidades y preserva la nota interpretativa sobre μιᾶς γυναικὸς ἄνδρα. Sin embargo, no sigue adecuadamente la decisión léxica documentada del POB para ἐπίσκοπον, donde el inglés auditado eligió traducir por sentido ('overseer') y no por el término eclesiástico posterior 'bishop'. También conviene ajustar ἀνεπίλημπτον a una expresión más cercana a 'above reproach' que a 'irreproachable', que en español puede sonar más absoluto.
  spanish_quality_summary: El español es claro y digno. 'Por tanto' y la secuencia de virtudes leen bien. No obstante, 'obispo' introduce una carga eclesiástica más fuerte que la del griego según el criterio del proyecto, y 'irreprochable' puede sonar más categórico que 'intachable' o 'por encima de todo reproche'. 'Apto para enseñar' es correcto, pero 'capaz de enseñar' suena más natural en español contemporáneo.
  glossary_alignment: Cumple en general con el estilo español del proyecto, pero se aparta de la filosofía POB de traducir títulos por sentido al usar 'obispo' en vez de una forma funcional. No hay conflicto con los demás términos de glosario del proyecto en este versículo.
  issues:
  - severity: high
    issue: ἐπίσκοπον se tradujo como 'obispo'
    rationale: La evidencia auditada del POB inglés eligió 'overseer' explícitamente para evitar importar terminología eclesiástica posterior. En español, 'obispo' no es un simple equivalente funcional sino un título históricamente cargado, por lo que no preserva la misma decisión traductológica.
  - severity: medium
    issue: ἀνεπίλημπτον como 'irreprochable'
    rationale: Aunque posible, 'irreprochable' en español puede percibirse como demasiado absoluto. Una opción como 'intachable' o 'por encima de todo reproche' comunica mejor la idea de que no prospere una acusación válida, en línea con 'above reproach'.
  - severity: low
    issue: διδακτικόν como 'apto para enseñar'
    rationale: Es fiel, pero 'capaz de enseñar' suena más idiomático y contemporáneo sin perder el sentido de capacidad.
  revised_spanish_text: Por tanto, es necesario que el supervisor sea intachable,[a] esposo de una sola mujer, sobrio, sensato, decoroso, hospitalario, capaz de enseñar,
