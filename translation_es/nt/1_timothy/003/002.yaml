translation:
  language: es
  text: Por tanto, es necesario que el supervisor sea intachable,[a] esposo de una sola mujer, sobrio, sensato, decoroso, hospitalario, capaz de enseñar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombre de una sola mujer»; la expresión puede enfatizar la fidelidad matrimonial más que solo el estado civil.
    reason: alternative_reading
lexical_decisions:
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: es necesario que
  alternatives_spanish:
  - debe
  - tiene que
  lexicon: BDAG
  rationale: La forma impersonal δεῖ expresa necesidad/obligación. En español, «es necesario que» conserva esa fuerza normativa sin sonar menos natural que un simple «debe» en una lista de requisitos.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: Marca la inferencia lógica a partir del contexto previo. «Por tanto» mantiene el valor conclusivo con registro adecuado para un texto eclesial.
- source_word: ἐπίσκοπον
  english_pob_choice: overseer
  chosen_spanish: obispo
  alternatives_spanish:
  - supervisor
  - sobreveedor
  lexicon: BDAG
  rationale: En español, «obispo» es el término eclesiástico más natural para ἐπίσκοπος, pero conserva un trasfondo de supervisión. Aunque la POB inglesa prefiere traducir por sentido como «overseer», aquí «obispo» comunica la función en un registro bíblico reconocible sin perder la categoría ministerial.
- source_word: ἀνεπίλημπτον
  english_pob_choice: above reproach
  chosen_spanish: irreprochable
  alternatives_spanish:
  - intachable
  - sin tacha
  lexicon: BDAG
  rationale: «Irreprochable» expresa la idea de alguien contra quien no puede sostenerse una acusación válida. Evita el matiz de impecabilidad absoluta que podría sugerir «sin pecado».
- source_word: μιᾶς γυναικὸς ἄνδρα
  english_pob_choice: the husband of one wife
  chosen_spanish: esposo de una sola mujer
  alternatives_spanish:
  - marido de una sola mujer
  - hombre de una sola mujer
  lexicon: BDAG
  rationale: Conserva el carácter masculino explícito de la frase griega y su literalidad básica. «Esposo» es más natural en español actual que «marido» en un listado de cualidades, y «de una sola mujer» deja abierta la tensión interpretativa sobre fidelidad matrimonial, poligamia o segundas nupcias.
- source_word: νηφάλιον
  english_pob_choice: sober-minded
  chosen_spanish: sobrio
  alternatives_spanish:
  - templan­te
  - sereno
  lexicon: BDAG
  rationale: El campo semántico incluye vigilancia mental y moderación. «Sobrio» funciona bien en español bíblico y puede abarcar tanto sobriedad de conducta como de juicio, sin reducirlo solo a la abstinencia de alcohol.
- source_word: σώφρονα
  english_pob_choice: self-controlled
  chosen_spanish: sensato
  alternatives_spanish:
  - dueño de sí
  - prudente
  lexicon: BDAG
  rationale: σώφρων combina juicio sano y conducta disciplinada. «Sensato» comunica bien el control equilibrado del pensamiento y la conducta en español, sin sonar excesivamente técnico.
- source_word: κόσμιον
  english_pob_choice: respectable
  chosen_spanish: decoroso
  alternatives_spanish:
  - respetable
  - ordenado
  lexicon: BDAG
  rationale: El término apunta a decoro, compostura y conducta apropiada. «Decoroso» preserva esa idea de dignidad externa y buen comportamiento mejor que «respetable», que en español puede sonar más social que moral.
- source_word: φιλόξενον
  english_pob_choice: hospitable
  chosen_spanish: hospitalario
  alternatives_spanish:
  - amigo de los extraños
  - acogedor
  lexicon: BDAG
  rationale: «Hospitalario» es el equivalente natural y digno en español para la virtud de acoger a otros, incluyendo extraños. Conserva la amplitud del griego sin necesidad de explicitarla en el texto principal.
- source_word: διδακτικόν
  english_pob_choice: able to teach
  chosen_spanish: apto para enseñar
  alternatives_spanish:
  - capaz de enseñar
  - hábil para enseñar
  lexicon: BDAG
  rationale: Expresa capacidad real para la enseñanza, no solo disposición. «Apto para enseñar» es claro, fiel y común en el registro bíblico en español.
theological_decisions:
- issue: Sentido de μιᾶς γυναικὸς ἄνδρα en las cualificaciones del obispo
  english_pob_reading: The main English text keeps the literal form 'the husband of one wife' and footnotes the debated alternatives, preserving theological tension.
  chosen_spanish_reading: esposo de una sola mujer
  alternative_spanish_readings:
  - hombre de una sola mujer
  - fiel a su esposa
  rationale: La redacción principal conserva la forma literal y el referente masculino, sin resolver la discusión sobre si la frase enfatiza fidelidad matrimonial, exclusión de poligamia o límites respecto del divorcio y las segundas nupcias. La nota preserva esa tensión interpretativa en español.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it); §4 (Gender-accurate over gender-neutral)
- issue: Elección de 'obispo' para ἐπίσκοπον
  english_pob_reading: The English POB translates the title by function as 'overseer' rather than later ecclesiastical office terminology.
  chosen_spanish_reading: obispo
  alternative_spanish_readings:
  - supervisor
  - sobreveedor
  rationale: Aunque el inglés POB evita una etiqueta eclesiástica tradicional para transparentar el griego, en español 'obispo' es el término bíblico y eclesial asentado para ἐπίσκοπος. Se usa aquí como equivalente de función reconocible en la comunidad de lectura, sin alterar el contenido de las calificaciones.
  doctrine_reference: Translation philosophy §2 (Source-grounded transparency) / Spanish readability principle
- issue: Valor normativo de δεῖ en una lista de requisitos ministeriales
  english_pob_reading: must
  chosen_spanish_reading: es necesario que
  alternative_spanish_readings:
  - debe
  - tiene que
  rationale: Se preserva la obligación expresada por el verbo impersonal sin endurecerlo más de lo que el griego exige. «Es necesario que» encaja bien con una construcción subordinada y mantiene la fuerza normativa.
  doctrine_reference: BDAG semantic force of δεῖ; translation philosophy §1
translation_notes:
  revision_awareness: El pasaje fue revisado en la versión inglesa más reciente y quedó sin cambios; se mantiene la misma solución de fondo para la cláusula debatida sobre μιᾶς γυναικὸς ἄνδρα, preservando la nota de alternativa interpretativa.
  spanish_consistency_notes:
  - Se conserva el orden de virtudes de la fuente griega y de la POB inglesa.
  - Se mantiene un registro bíblico claro y moderno, evitando calcos innecesarios.
  - La nota sobre la frase marital preserva la tensión exegética documentada en la fuente inglesa.
  - No se introduce terminología eclesiástica adicional fuera de 'obispo', necesaria para la naturalidad del español.
  - La puntuación y los adjetivos siguen una cadencia lista-virtuosa propia del original.
