revisions:
- from: Por tanto, es necesario que el obispo sea irreprochable[a], esposo de una sola mujer, sobrio, sensato, decoroso, hospitalario, apto para enseñar,
  to: Por tanto, es necesario que el supervisor sea intachable,[a] esposo de una sola mujer, sobrio, sensato, decoroso, hospitalario, capaz de enseñar,
  rationale: Se reemplaza 'obispo' por 'supervisor' para seguir la decisión auditada de traducir ἐπίσκοπος por función y no por un título eclesiástico posterior. Se ajusta 'irreprochable' a 'intachable' para reflejar mejor ἀνεπίλημπτον sin sugerir perfección absoluta. Se mejora la naturalidad de 'apto para enseñar' a 'capaz de enseñar'. La nota se conserva, pero su anclaje debe moverse a la frase matrimonial, no a 'intachable', porque la nota explica μιᾶς γυναικὸς ἄνδρα.
