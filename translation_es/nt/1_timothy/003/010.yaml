translation:
  language: es
  text: Y estos también deben ser probados primero[a]; luego, que sirvan si son irreprochables[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que sean examinados primero». El verbo griego implica someter a prueba para verificar la idoneidad.
    reason: lexical_alternative
  - marker: b
    text: O «sin reproche». La expresión indica que no puede presentarse una acusación válida contra ellos, no que sean sin pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  english_pob_choice: these also
  chosen_spanish: estos también
  alternatives_spanish:
  - estos igualmente
  - estos asimismo
  lexicon: BDAG
  rationale: El demostrativo plural conserva la referencia al grupo ya tratado en el contexto inmediato. «También» reproduce el matiz aditivo de καὶ ... δέ sin forzar una explicación adicional.
- source_word: δοκιμαζέσθωσαν
  english_pob_choice: must first be tested
  chosen_spanish: deben ser probados primero
  alternatives_spanish:
  - deben ser examinados primero
  - deben pasar primero por prueba
  lexicon: BDAG
  rationale: δοκιμάζω implica someter a prueba para verificar idoneidad. «Probados» es natural en español y mantiene la idea de examen de aptitud; el valor imperativo se expresa con «deben».
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - ante todo
  - de antemano
  lexicon: BDAG
  rationale: 'Marca secuencia temporal: la prueba precede al servicio. «Primero» es claro y fiel.'
- source_word: διακονείτωσαν
  english_pob_choice: let them serve
  chosen_spanish: que sirvan
  alternatives_spanish:
  - que ministren
  - que ejerzan servicio
  lexicon: BDAG
  rationale: El verbo significa «servir» y, en este contexto, la redacción española puede conservar la forma verbal sin añadir explícitamente «como diáconos», ya que el cargo está determinado por el contexto cercano y el sustantivo no aparece en esta cláusula.
- source_word: ἀνέγκλητοι
  english_pob_choice: beyond reproach
  chosen_spanish: irreprochables
  alternatives_spanish:
  - sin reproche
  - intachables
  lexicon: BDAG
  rationale: Expresa que no pesa una acusación válida contra ellos. «Irreprochables» comunica bien la idea de respeto público y evita sugerir perfección moral absoluta.
- source_word: ὄντες
  english_pob_choice: being
  chosen_spanish: siendo
  alternatives_spanish:
  - mientras sean
  - estando
  lexicon: BDAG
  rationale: El participio presente modifica al sujeto y añade la condición acompañante del servicio. «Siendo» preserva esa relación sin volverla demasiado literal.
theological_decisions:
- issue: Si διακονείτωσαν debe explicitar el oficio o mantenerse como servicio verbal
  english_pob_reading: let them serve
  chosen_spanish_reading: que sirvan
  alternative_spanish_readings:
  - que sirvan como diáconos
  - que ejerzan el diaconado
  rationale: El texto griego de esta cláusula no añade un sustantivo equivalente a «diáconos». Mantener «que sirvan» respeta la forma verbal y deja que el contexto determine la función ministerial sin introducir una aclaración que el griego aquí no expresa explícitamente.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo entender ἀνέγκλητοι sin convertirlo en impecabilidad absoluta
  english_pob_reading: beyond reproach
  chosen_spanish_reading: irreprochables
  alternative_spanish_readings:
  - sin reproche
  - blameless
  rationale: En listas de requisitos ministeriales, el término señala ausencia de acusación válida, no ausencia total de pecado. «Irreprochables» conserva el sentido de reputación y aptitud pública para el servicio.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje griego y la revisión inglesa más reciente que dejó διακονείτωσαν en ‘let them serve’ sin añadir explícitamente ‘as deacons’. La versión española conserva ese mismo equilibrio: servicio verbal directo, con la función eclesial determinada por el contexto inmediato de 1 Timoteo 3.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto solo cuando corresponda; aquí no aparece.
  - «Diáconos» no se introduce en el texto principal porque el griego de esta cláusula usa un verbo y no un sustantivo.
  - «Irreprochables» se usa en sentido de ausencia de acusación válida, no de perfección moral absoluta.
  - El orden de las marcas de nota se corresponde exactamente con los anclajes [a] y [b] en el texto.
