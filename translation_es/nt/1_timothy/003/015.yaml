revisions:
- from: Pero si tardo[a], escribo para que sepas cómo es necesario comportarse en la casa de Dios, la cual es la asamblea del Dios vivo[b], columna y sostén de la verdad.
  to: Pero si me demoro,[a] escribo para que sepas cómo es necesario comportarse en la casa de Dios, la cual es la asamblea del Dios vivo,[b] columna y sostén de la verdad.
  rationale: Se ajusta βραδύνω a un español más natural y más cercano al sentido contextual de demora personal («me demoro»). Se corrige la nota [a] para reflejar alternativas léxicas reales en vez de etiquetarla erróneamente como tradicional. Se mejora la nota [b] traduciendo «bulwark» como «baluarte» y conservando la alternativa tradicional para ἐκκλησία, en línea con el audit trail inglés.
