translation:
  language: es
  text: Pero si me demoro,[a] escribo para que sepas cómo es necesario comportarse en la casa de Dios, la cual es la asamblea del Dios vivo,[b] columna y sostén de la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si tardo»; también «si me retraso en llegar».
    reason: lexical_alternative
  - marker: b
    text: O, tradicionalmente, «iglesia del Dios vivo»; también «columna y baluarte de la verdad»; se ha propuesto además «fundamento» para ἑδραίωμα.
    reason: lexical_alternative
lexical_decisions:
- source_word: βραδύνω
  english_pob_choice: am delayed
  chosen_spanish: tardo
  alternatives_spanish:
  - me demoro
  - soy retrasado en llegar
  - me atraso
  lexicon: BDAG
  rationale: En este contexto la idea es que Pablo llega con demora; en español, «tardo» expresa esa demora de manera natural y breve. Se evita un giro mecánico que sugiera lentitud moral.
- source_word: ἵνα εἰδῇς
  english_pob_choice: so that you may know
  chosen_spanish: para que sepas
  alternatives_spanish:
  - a fin de que sepas
  - para que conozcas
  lexicon: BDAG
  rationale: La oración final se conserva con finalidad clara y español idiomático. «Sepas» comunica bien el conocimiento requerido sin endurecer la frase.
- source_word: δεῖ
  english_pob_choice: ought to
  chosen_spanish: es necesario
  alternatives_spanish:
  - debe
  - conviene
  lexicon: BDAG
  rationale: «Es necesario» refleja la necesidad normativa del infinitivo con un registro sobrio. «Debe» sería posible, pero puede sonar más imperativo que el griego en este contexto.
- source_word: ἐν οἴκῳ θεοῦ
  english_pob_choice: in the household of God
  chosen_spanish: en la casa de Dios
  alternatives_spanish:
  - en el hogar de Dios
  - en la familia de Dios
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió «household of God» para captar el matiz comunitario, en español «casa de Dios» es la forma natural y mantiene el campo semántico de οἶκος; la aclaración siguiente («la asamblea») sostiene el sentido de comunidad y no solo edificio.
- source_word: ἀναστρέφεσθαι
  english_pob_choice: to conduct oneself
  chosen_spanish: comportarse
  alternatives_spanish:
  - conductarse
  - vivir
  lexicon: BDAG
  rationale: El verbo apunta al modo de vida y conducta dentro de la comunidad. «Comportarse» es claro y contemporáneo; «vivir» sería más amplio y menos preciso.
- source_word: ἥτις
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - que
  - la que
  lexicon: BDAG
  rationale: «La cual» preserva el valor explicativo y la referencia a «la casa de Dios» sin ambigüedad indebida.
- source_word: ἐκκλησία
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - iglesia
  - congregación
  lexicon: BDAG
  rationale: Se mantiene la decisión auditada de traducir ἐκκλησία por «asamblea», para no importar de entrada la carga institucional de «iglesia». Se conserva una alternativa tradicional en nota.
- source_word: θεοῦ ζῶντος
  english_pob_choice: of the living God
  chosen_spanish: del Dios vivo
  alternatives_spanish:
  - de Dios vivo
  - del Dios que vive
  lexicon: BDAG
  rationale: La expresión establecida en español bíblico «Dios vivo» conserva la fuerza teológica de ζῶντος y es natural en el registro bíblico.
- source_word: στῦλος
  english_pob_choice: pillar
  chosen_spanish: columna
  alternatives_spanish:
  - pilar
  lexicon: BDAG
  rationale: «Columna» reproduce la metáfora arquitectónica con buena fluidez en español; «pilar» también sería válido, pero «columna» suena más natural junto con «sostén».
- source_word: ἑδραίωμα
  english_pob_choice: support
  chosen_spanish: sostén
  alternatives_spanish:
  - apoyo
  - fundamento
  - bulwark
  lexicon: BDAG
  rationale: «Sostén» comunica la idea de firmeza y apoyo sin cargar el texto con la noción de que la iglesia sea el origen de la verdad. Mantiene la tensión lexical entre soporte y firmeza.
- source_word: τῆς ἀληθείας
  english_pob_choice: of the truth
  chosen_spanish: de la verdad
  alternatives_spanish:
  - de la verdad revelada
  - de la verdad
  lexicon: BDAG
  rationale: Se conserva la referencia definida a «la verdad» como en el texto fuente, sin expansión interpretativa.
theological_decisions:
- issue: ἐκκλησία en un contexto eclesiológico
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - iglesia
  - congregación
  rationale: La frase identifica a la comunidad reunida como portadora-testigo de la verdad. «Asamblea» preserva la concreción del término griego y evita que el lector presuma automáticamente una institución posterior, aunque la nota permite la lectura tradicional.
  doctrine_reference: Translation philosophy §1, §6
- issue: «columna y sostén de la verdad» y el alcance del predicado
  english_pob_reading: The phrase is predicated of the assembly/household of God and rendered without implying that the church originates truth.
  chosen_spanish_reading: la asamblea del Dios vivo, columna y sostén de la verdad
  alternative_spanish_readings:
  - la iglesia del Dios vivo, fundamento de la verdad
  - la congregación del Dios vivo, apoyo de la verdad
  rationale: La sintaxis española conserva que el predicado se aplica a la comunidad de Dios. «Sostén» evita sugerir que la comunidad produzca la verdad, pero afirma su función de apoyo y firmeza conforme al griego.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el último pase; la opción inglesa final quedó sin cambios y la versión española sigue esa lectura auditada, con ajustes naturales de registro en español.
  spanish_consistency_notes:
  - Se mantuvo el uso de «asamblea» para ἐκκλησία, coherente con la política POB y con la nota que preserva la alternativa tradicional «iglesia».
  - Se tradujo θεοῦ ζῶντος como «Dios vivo», forma estable y clara en español bíblico.
  - Se evitó «SEÑOR» para θεός/κύριος porque el texto griego aquí dice θεοῦ, no κύριος.
  - «Sostén» conserva la ambigüedad controlada de ἑδραίωμα entre apoyo y firmeza, sin imponer «fundamento» como lectura única.
