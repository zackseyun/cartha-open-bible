translation:
  language: es
  text: Los diáconos, asimismo, deben ser respetables[a], no de doble discurso[b], no dados a mucho vino[c], no ávidos de ganancia deshonesta[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dignos de respeto'.
    reason: lexical_alternative
  - marker: b
    text: O 'no diciendo una cosa a unos y otra a otros'.
    reason: lexical_alternative
  - marker: c
    text: O 'no dedicados a mucho vino'.
    reason: lexical_alternative
  - marker: d
    text: O 'no buscando ganancia sórdida'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διακόνους
  english_pob_choice: Deacons
  chosen_spanish: diáconos
  alternatives_spanish:
  - siervos
  - ministros
  lexicon: BDAG
  rationale: En este contexto se trata de una lista de cualificaciones para un cargo reconocido de la iglesia, en paralelo con los supervisores del versículo anterior. 'Diáconos' preserva esa especificidad institucional en español sin introducir estructura denominacional adicional.
- source_word: ὡσαύτως
  english_pob_choice: likewise
  chosen_spanish: asimismo
  alternatives_spanish:
  - de igual manera
  - también
  lexicon: BDAG
  rationale: Marca continuidad con las cualificaciones previas y suena natural en español formal.
- source_word: σεμνούς
  english_pob_choice: dignified
  chosen_spanish: dignos
  alternatives_spanish:
  - respetables
  - honorables
  - serios
  lexicon: BDAG
  rationale: '''Dignos'' comunica una conducta honrosa y respetable. En español evita la connotación algo rígida de ''serios'' y la posible abstracción de ''dignificados''.'
- source_word: μὴ διλόγους
  english_pob_choice: not double-tongued
  chosen_spanish: no de doble lengua
  alternatives_spanish:
  - no doble‑lengua
  - no insinceros en la խոսca
  - no diciendo una cosa a unos y otra a otros
  lexicon: BDAG
  rationale: Mantiene la imagen del griego de hablar con dos palabras o dos caras. 'De doble lengua' conserva la fuerza idiomática sin convertirla en paráfrasis excesiva.
- source_word: μὴ οἴνῳ πολλῷ προσέχοντας
  english_pob_choice: not devoted to much wine
  chosen_spanish: no dados a mucho vino
  alternatives_spanish:
  - no dedicados a mucho vino
  - no entregados a mucho vino
  - no esclavizados al mucho vino
  lexicon: BDAG
  rationale: '''Dados a'' refleja bien προσέχω como dar atención/adhesión continua. ''Mucho vino'' mantiene el cuantificador del griego y el sentido de hábito o inclinación.'
- source_word: μὴ αἰσχροκερδεῖς
  english_pob_choice: not greedy for shameful gain
  chosen_spanish: no ávidos de ganancia deshonesta
  alternatives_spanish:
  - no codiciosos de ganancia vergonzosa
  - no buscando ganancia sórdida
  - no amantes de lucro deshonroso
  lexicon: BDAG
  rationale: '''Ávidos de ganancia deshonesta'' preserva el matiz de deseo por lucro vergonzoso o moralmente torcido. ''Deshonesta'' comunica el juicio ético del término sin volverlo demasiado coloquial.'
theological_decisions:
- issue: Traducción de διάκονος como título eclesial en un listado de cualificaciones
  english_pob_reading: Translate as 'Deacons' as an office title
  chosen_spanish_reading: diáconos como título de oficio eclesial
  alternative_spanish_readings:
  - siervos
  - ministros
  rationale: El contexto inmediato es una lista de requisitos para un grupo específico dentro de la iglesia, junto a los supervisores. Traducirlo como título mantiene la referencia institucional del pasaje.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador anterior falló porque los marcadores de nota no aparecían anclados en el texto. Esta versión coloca [a], [b] y [c] directamente sobre las palabras o frases correspondientes, manteniendo una sola nota por marcador.
  spanish_consistency_notes:
  - Se conserva 'diáconos' como término de oficio, coherente con la sección previa del capítulo.
  - '''de doble lengua'' busca mantener el color idiomático de διλόγους sin recargar la frase.'
  - '''mucho vino'' reproduce el cuantificador del griego y evita suavizar el problema moral.'
  - '''ganancia deshonesta'' expresa el valor negativo del compuesto αἰσχροκερδής sin introducir un tecnicismo ajeno al español bíblico.'
