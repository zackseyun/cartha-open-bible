translation:
  language: es
  text: manteniendo el misterio de la fe con limpia conciencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manteniendo el misterio de la fe con conciencia pura».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχοντας
  english_pob_choice: holding
  chosen_spanish: reteniendo
  alternatives_spanish:
  - manteniendo
  - teniendo
  lexicon: BDAG
  rationale: El participio expresa una actitud continua de sostener o conservar firmemente, no solo poseer algo de manera estática. «Reteniendo» comunica esa adherencia sostenida en un español natural y conserva el valor aspectual del original.
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  - misterio revelado
  lexicon: BDAG
  rationale: «Misterio» es el equivalente español más estable para μυστήριον en Pablo. «Secreto» sonaría demasiado a algo meramente oculto, y «misterio revelado» añade una explicación que el texto no formula aquí.
- source_word: τῆς πίστεως
  english_pob_choice: of the faith
  chosen_spanish: de la fe
  alternatives_spanish:
  - de fe
  - de la fidelidad
  lexicon: BDAG
  rationale: 'La construcción con artículo favorece el sentido objetivo: la fe cristiana como contenido compartido, no solo el acto subjetivo de creer. «De la fe» preserva ese matiz y funciona bien en el contexto eclesial.'
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Según el criterio doctrinal del proyecto, πίστις se traduce normalmente como «fe» salvo que el contexto exija otra cosa. Aquí encaja mejor con la expresión «el misterio de la fe» y con la cualificación de los diáconos.
- source_word: ἐν καθαρᾷ συνειδήσει
  english_pob_choice: with a clear conscience
  chosen_spanish: con conciencia limpia
  alternatives_spanish:
  - con conciencia pura
  - en conciencia pura
  lexicon: BDAG
  rationale: El español idiomático favorece «con» antes que un calco de ἐν en este ámbito moral. «Limpia» comunica bien la integridad moral; se conserva la alternativa «pura» como posibilidad más literal.
- source_word: καθαρᾷ
  english_pob_choice: clear
  chosen_spanish: limpia
  alternatives_spanish:
  - pura
  - clara
  lexicon: BDAG
  rationale: En combinación con συνειδήσει, «limpia» ofrece una expresión natural y moralmente transparente. No se pierde el valor de pureza del adjetivo griego, pero se evita una formulación menos idiomática en español.
- source_word: συνειδήσει
  english_pob_choice: conscience
  chosen_spanish: conciencia
  alternatives_spanish:
  - conciencia moral
  lexicon: BDAG
  rationale: «Conciencia» es la equivalencia estándar y suficiente para συνείδησις en este contexto paulino. La adición de «moral» sería explicativa, no necesaria.
theological_decisions:
- issue: Sentido objetivo de «la fe» en τῆς πίστεως
  english_pob_reading: objective content of Christian belief ('the faith')
  chosen_spanish_reading: el contenido de la fe cristiana, no solo el acto personal de creer
  alternative_spanish_readings:
  - la capacidad de creer
  - la fidelidad
  rationale: En un contexto de requisitos para diáconos, la frase naturalmente alude a la fe apostólica que deben mantener firmemente. Traducirla como «la fe» conserva esa referencia doctrinal sin forzar una explicación adicional.
  doctrine_reference: 'DOCTRINE.md: πίστις default ''fe''; conservar la tensión teológica cuando la ambigüedad sea real'
translation_notes:
  revision_awareness: El texto base y el repaso cruzado coinciden sin cambios sustantivos; la única decisión visible es la elección estilística de una equivalencia natural en español para el participio y la expresión moral final, manteniendo intacto el sentido doctrinal de «el misterio de la fe».
  spanish_consistency_notes:
  - Se evita «SEÑOR» o sustituciones litúrgicas no presentes en el versículo.
  - «Fe» se conserva como traducción normal de πίστις en coherencia con el criterio del proyecto.
  - «Conciencia limpia» mantiene el sentido moral de καθαρᾷ συνειδήσει en español moderno y readable.
  - El participio presente se expresa con un gerundio no; aquí se prefirió un participio español dinámico («reteniendo») para preservar la continuidad de la acción.
