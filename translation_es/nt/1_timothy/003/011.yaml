translation:
  language: es
  text: Mujeres[a] igualmente, dignas, no calumniadoras, sobrias, fieles en todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esposas igualmente, dignas...». El griego γυναῖκας puede significar tanto «mujeres» como «esposas» en este contexto; el texto no dice explícitamente «sus esposas».'
    reason: alternative_reading
lexical_decisions:
- source_word: γυναῖκας
  english_pob_choice: Women
  chosen_spanish: Mujeres
  alternatives_spanish:
  - esposas
  - sus esposas
  lexicon: BDAG
  rationale: El griego γυνή puede significar 'mujeres' o 'esposas' según el contexto. Como el texto no añade un posesivo explícito ni especifica 'sus', 'Mujeres' conserva la amplitud del término sin resolver la ambigüedad del original. La alternativa 'esposas' queda preservada en la nota.
- source_word: ὡσαύτως
  english_pob_choice: likewise
  chosen_spanish: igualmente
  alternatives_spanish:
  - de la misma manera
  - asimismo
  lexicon: BDAG
  rationale: ὡσαύτως enlaza este grupo con el patrón de requisitos anterior. 'Igualmente' comunica bien la relación estructural en español y mantiene el tono formal.
- source_word: σεμνάς
  english_pob_choice: dignified
  chosen_spanish: dignas
  alternatives_spanish:
  - respetables
  - serias
  lexicon: BDAG
  rationale: σεμνός expresa gravedad moral, honorabilidad y respeto. 'Dignas' es natural en español y conserva esa cualidad sin añadir más de lo que el término implica.
- source_word: μὴ διαβόλους
  english_pob_choice: not slanderers
  chosen_spanish: no calumniadoras
  alternatives_spanish:
  - no chismosas maliciosas
  - no acusadoras
  lexicon: BDAG
  rationale: διάβολος, aquí como adjetivo, significa calumniador/acusador, no el nombre propio 'diablo'. 'Calumniadoras' transmite el sentido de hablar mal de otros de manera injusta y resulta idiomático en español.
- source_word: νηφαλίους
  english_pob_choice: sober-minded
  chosen_spanish: sobrias
  alternatives_spanish:
  - de mente sobria
  - templadas
  lexicon: BDAG
  rationale: νηφάλιος puede referirse tanto a sobriedad literal como a moderación y autocontrol mental. 'Sobrias' es una traducción breve y fiel, compatible con el registro de la lista de virtudes y con el audit trail inglés que optó por 'sober-minded'.
- source_word: πιστὰς
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - confiables
  - leales
  lexicon: BDAG
  rationale: πιστός describe fidelidad y confiabilidad. 'Fieles' preserva la relación léxica con el grupo πιστ- y funciona bien en una lista de cualidades.
- source_word: ἐν πᾶσιν
  english_pob_choice: in all things
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en todo sentido
  lexicon: BDAG
  rationale: La expresión es comprehensiva. 'En todo' es una forma natural en español que mantiene la amplitud del griego sin forzar la frase.
theological_decisions:
- issue: Referencia de γυναῖκας en la lista de requisitos
  english_pob_reading: Women
  chosen_spanish_reading: Mujeres
  alternative_spanish_readings:
  - esposas
  - las esposas de ellos
  rationale: Este versículo presenta una ambigüedad interpretativa conocida. El griego permite 'mujeres' o 'esposas', pero no exige un posesivo explícito. Mantener 'Mujeres' en el texto principal preserva la tensión interpretativa y evita introducir una especificación no presente en el griego; la alternativa 'esposas' queda registrada en la nota.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue el ajuste revisado del audit trail inglés que prefirió 'sober-minded' sobre 'self-controlled' para νηφαλίους. En español, 'sobrias' conserva esa sobriedad mental y moral en un registro natural y formal, sin perder la coherencia con la lista de virtudes.
  spanish_consistency_notes:
  - Se mantuvo 'Mujeres' en mayúscula inicial solo por inicio de versículo; no implica un título técnico.
  - '''Calumniadoras'' se eligió para evitar suavizar διάβολος a un mero ''chismosas''.'
  - '''Sobrias'' refleja νηφαλίους como sobriedad de juicio y conducta, no solo abstinencia física.'
  - '''Fieles en todo'' conserva el alcance total de ἐν πᾶσιν sin añadir contenido interpretativo.'
