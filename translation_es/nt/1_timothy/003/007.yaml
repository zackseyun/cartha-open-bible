    reason: lexical_alternative
  - marker: c
    text: O «la trampa del calumniador», si διάβολος se toma en un sentido más genérico; aquí se entiende como «el diablo».
    reason: alternative_reading
  revision_rationale: Se ajusta la expresión de ἀπὸ τῶν ἔξωθεν para que el español exprese con más precisión que el buen testimonio procede de quienes están fuera de la comunidad cristiana, y se corrige la nota alternativa para que no duplique el texto principal. El resto del versículo puede conservarse porque refleja fielmente el griego y el rastro de auditoría inglés.
