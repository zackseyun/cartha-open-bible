revisions:
- from: Y además debe tener buen testimonio de los de afuera[c][b][a], para que no caiga en reproche y en la trampa del diablo.
  to: Y además debe tener buen testimonio de parte de los de afuera[c][b][a], para que no caiga en reproche y en la trampa del diablo.
  rationale: Se ajusta la expresión de ἀπὸ τῶν ἔξωθεν para que el español exprese con más precisión que el buen testimonio procede de quienes están fuera de la comunidad cristiana, y se corrige la nota alternativa para que no duplique el texto principal. El resto del versículo puede conservarse porque refleja fielmente el griego y el rastro de auditoría inglés.
