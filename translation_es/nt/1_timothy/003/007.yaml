base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/007.yaml
  text: And he must also have a good testimony from those outside[c][b][a], so that he may not fall into reproach and the snare of the devil.
  footnotes:
  - marker: a
    text: Or 'from outsiders.' The phrase refers to people outside the Christian community.
    reason: lexical_alternative
  - marker: b
    text: Or 'fall into disgrace.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the slanderer’s trap,' if διάβολος is taken in a more generic sense; here it is understood as 'the devil.'
    reason: alternative_reading
