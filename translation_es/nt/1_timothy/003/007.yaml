translation:
  language: es
  text: Y además debe tener buen testimonio de parte de los de afuera[c][b][a], para que no caiga en reproche y en la trampa del diablo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los de afuera» o «de los de fuera». La frase se refiere a personas fuera de la comunidad cristiana.
    reason: lexical_alternative
  - marker: b
    text: O «caiga en desgracia».
    reason: lexical_alternative
  - marker: c
    text: O «la trampa del calumniador», si διάβολος se toma en un sentido más genérico; aquí se entiende como «el diablo».
    reason: alternative_reading
lexical_decisions:
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debe
  alternatives_spanish:
  - tiene que
  - es necesario que
  lexicon: BDAG
  rationale: Expresa obligación necesaria de manera natural en español moderno y conserva la fuerza normativa del griego.
- source_word: δὲ καὶ
  english_pob_choice: And ... also
  chosen_spanish: Y además
  alternatives_spanish:
  - Además
  - Y también
  lexicon: BDAG
  rationale: Mantiene el valor conectivo y aditivo de la construcción sin sonar rígido.
- source_word: μαρτυρίαν καλὴν
  english_pob_choice: a good testimony
  chosen_spanish: buen testimonio
  alternatives_spanish:
  - buena reputación
  - buen testimonio favorable
  lexicon: BDAG
  rationale: '"Testimonio" conserva el valor de attestation/report from others; "buena reputación" es posible pero desplaza el matiz hacia fama general.'
- source_word: ἔχειν
  english_pob_choice: have
  chosen_spanish: tener
  alternatives_spanish:
  - poseer
  lexicon: BDAG
  rationale: Verbo directo e idiomático para la infinitiva de posesión.
- source_word: ἀπὸ τῶν ἔξωθεν
  english_pob_choice: from those outside
  chosen_spanish: de los de afuera
  alternatives_spanish:
  - de los de fuera
  - de los de afuera de la iglesia
  lexicon: BDAG
  rationale: Reproduce de forma natural la referencia a personas fuera de la comunidad cristiana sin explicitar más de lo que el griego dice.
- source_word: ἵνα μὴ
  english_pob_choice: so that he may not
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - de modo que no
  lexicon: BDAG
  rationale: Expresa propósito negativo de manera clara y fluida en español.
- source_word: εἰς ὀνειδισμὸν ἐμπέσῃ
  english_pob_choice: fall into reproach
  chosen_spanish: caiga en reproche
  alternatives_spanish:
  - caiga en desgracia
  - caiga en oprobio
  lexicon: BDAG
  rationale: '"Reproche" mantiene bastante de la carga social del sustantivo griego y suena natural; "desgracia" suaviza el matiz de vergüenza pública.'
- source_word: παγίδα
  english_pob_choice: snare
  chosen_spanish: trampa
  alternatives_spanish:
  - lazo
  - red
  lexicon: BDAG
  rationale: '"Trampa" comunica bien la metáfora de captura para lectores contemporáneos; "lazo" sería más tradicional pero menos transparente para algunos lectores.'
- source_word: τοῦ διαβόλου
  english_pob_choice: the snare of the devil
  chosen_spanish: del diablo
  alternatives_spanish:
  - del acusador
  - del calumniador
  lexicon: BDAG
  rationale: La lectura personal de διάβολος como el diablo es la preferida en el contexto pastoral y del NT, y en español se conserva con la preposición de posesión/genitivo implícita en la estructura.
theological_decisions:
- issue: Sentido de τοῦ διαβόλου
  english_pob_reading: the devil as Satan, yielding 'the snare of the devil'
  chosen_spanish_reading: la trampa del diablo
  alternative_spanish_readings:
  - la trampa del acusador
  - la trampa del calumniador
  rationale: Se conserva la interpretación personal tradicional del término en el contexto de las Pastorales, sin borrar que el griego permite un matiz de 'calumniador'.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it
- issue: Relación entre reproche público y peligro espiritual
  english_pob_reading: public reproach and the snare of the devil
  chosen_spanish_reading: reproche y la trampa del diablo
  alternative_spanish_readings:
  - desgracia y la trampa del diablo
  - oprobio y la trampa del diablo
  rationale: 'El texto mantiene ambas dimensiones: la vergüenza pública y el peligro espiritual, sin fusionarlas ni reducir una a la otra.'
  doctrine_reference: Source-preserving distinction
translation_notes:
  revision_awareness: La redacción española sigue la última revisión auditada del POB en inglés, que prefirió una forma más formal de genitivo para τοῦ διαβόλου ('the snare of the devil') sin alterar el resto de la cláusula; se conservó esa decisión en español con una construcción directa y natural.
  spanish_consistency_notes:
  - Se usó «de los de afuera» para ἀπὸ τῶν ἔξωθεν, manteniendo el referente comunitario sin añadir «iglesia» en el texto principal.
  - Se prefirió «reproche» a «desgracia» para reflejar ὀνειδισμός con una carga de vergüenza pública.
  - Se optó por «trampa» en lugar de «lazo» para que la metáfora sea clara en español moderno, preservando el sentido de παγίς.
  - Se mantuvo «diablo» como lectura principal de διάβολος, en línea con la lectura teológica documentada del POB.
