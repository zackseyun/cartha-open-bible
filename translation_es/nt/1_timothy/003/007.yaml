review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y sentido del griego: obligación (δεῖ), buena evaluación de los de fuera, propósito negativo, y doble peligro de reproche y trampa del diablo. También preserva la lectura principal de τοῦ διαβόλου como referencia personal al diablo y conserva la alternativa en nota. Sin embargo, hay dos ajustes convenientes: en español ''buen testimonio de los de afuera'' suena menos natural y algo ambiguo; ''buen testimonio de parte de los de afuera'' expresa mejor el valor de ἀπό. Además, si se mantiene una nota alternativa para ἀπὸ τῶν ἔξωθεν, no debe repetir exactamente la misma frase que ya aparece en el texto principal.'
  spanish_quality_summary: El español es claro y comprensible, pero 'de los de afuera' en el texto principal suena algo coloquial para un registro bíblico digno. 'De parte de los de afuera' mejora naturalidad y precisión. 'Caiga en reproche' es aceptable aunque un poco rígido; no exige cambio porque preserva bien ὀνειδισμός y la nota con 'desgracia' ya cubre la alternativa más idiomática. 'La trampa del diablo' es buena y legible.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Diablo' concuerda con la decisión teológica auditada. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La elección 'trampa' para παγίδα es admisible en español contemporáneo, aunque 'lazo' sería más tradicional.
  issues:
  - severity: medium
    issue: La frase principal 'buen testimonio de los de afuera' es menos precisa que el griego ἀπὸ τῶν ἔξωθεν.
    rationale: En español puede sonar como una aposición posesiva o una etiqueta sociológica; 'de parte de los de afuera' comunica mejor que el buen testimonio proviene de ellos.
  - severity: medium
    issue: La nota [a] repite exactamente la misma formulación que el texto principal.
    rationale: Una nota de alternativa léxica debe ofrecer una opción real distinta. Si el texto se revisa a 'de parte de los de afuera', la alternativa puede ser 'de los de afuera' o 'de los de fuera'.
  - severity: low
    issue: '''Los de afuera'' tiene un matiz algo coloquial para el tono objetivo del proyecto.'
    rationale: No es incorrecto, pero conviene elevar ligeramente el registro sin perder claridad.
  revised_spanish_text: Y además debe tener buen testimonio de parte de los de afuera[c][b][a], para que no caiga en reproche y en la trampa del diablo.
  revised_footnotes:
  - marker: a
    text: O «de los de afuera» o «de los de fuera». La frase se refiere a personas fuera de la comunidad cristiana.
    reason: lexical_alternative
  - marker: b
