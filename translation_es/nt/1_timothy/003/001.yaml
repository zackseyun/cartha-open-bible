review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: la fórmula πιστὸς ὁ λόγος, la condición genérica εἴ τις, la aspiración positiva de ὀρέγεται y el énfasis en καλοῦ ἔργου. Sin embargo, ''supervisión'' para ἐπισκοπῆς suena demasiado administrativa en español general y debilita la conexión contextual con ἐπίσκοπος; una formulación como ''la tarea de supervisor'' preserva mejor el sentido funcional sin importar una estructura eclesiástica posterior.'
  spanish_quality_summary: El español es claro y natural, pero 'si alguien aspira a la supervisión' resulta algo impersonal y menos idiomático que una formulación orientada a función o tarea. El resto del verso lee bien y mantiene un tono moderno y digno.
  glossary_alignment: 'No hay conflicto con los términos nucleares del glosario del proyecto. La principal cuestión terminológica es ἐπισκοπῆς: conviene evitar ''obispado'', pero también mejorar ''supervisión'' con una opción más eclesialmente legible y contextualmente transparente en español, como ''la tarea de supervisor'', dejando ''el oficio de supervisor'' y ''obispado'' en nota.'
  issues:
  - severity: medium
    issue: '''la supervisión'' para ἐπισκοπῆς suena demasiado abstracto/administrativo'
    rationale: Aunque es defendible lexicalmente, en español eclesial amplio 'supervisión' suele oírse como gestión o control administrativo. El griego aquí apunta a la función/encargo asociado al supervisor, y el contexto inmediato hablará del ἐπίσκοπος. 'La tarea de supervisor' conserva la amplitud semántica sin imponer 'obispado'.
  - severity: low
    issue: La nota alternativa debería corresponder exactamente a la nueva formulación principal
    rationale: 'Si se ajusta el texto principal, la nota debe seguir ofreciendo la alternativa más cercana al campo semántico documentado: ''el oficio de supervisor'' y tradicionalmente ''obispado''.'
