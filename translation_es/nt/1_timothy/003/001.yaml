translation:
  language: es
  text: 'Este dicho es digno de confianza: si alguien aspira a la tarea de supervisor[a], desea una buena obra[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el oficio de supervisor'; tradicionalmente, 'obispado'.
    reason: alternative_reading
  - marker: b
    text: O 'una tarea noble'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πιστὸς ὁ λόγος
  english_pob_choice: This saying is trustworthy
  chosen_spanish: Este dicho es digno de confianza
  alternatives_spanish:
  - Esta palabra es digna de confianza
  - Este dicho es confiable
  - Esta afirmación es confiable
  lexicon: BDAG; uso formulaico en las Pastorales
  rationale: λόγος aquí funciona como fórmula introductoria de una afirmación fiable; por eso 'dicho' comunica mejor la idea que 'palabra'. 'Digno de confianza' reproduce πιστός de manera natural en español y mantiene el valor formulaico sin suavizarlo.
- source_word: εἴ τις
  english_pob_choice: if anyone
  chosen_spanish: si alguien
  alternatives_spanish:
  - si cualquiera
  - si una persona
  - si un hombre
  lexicon: BDAG
  rationale: τις es indefinido y genérico; 'si alguien' preserva esa genericidad en español sin introducir una restricción masculina que no está en la cláusula condicional misma.
- source_word: ἐπισκοπῆς
  english_pob_choice: oversight
  chosen_spanish: la supervisión
  alternatives_spanish:
  - el oficio de supervisor
  - la función de supervisión
  - el episcopado
  lexicon: BDAG
  rationale: ἐπισκοπή nombra supervisión/vigilancia/función de quien supervisa. 'Supervisión' conserva el alcance semántico amplio y evita fijar demasiado pronto una terminología eclesiástica posterior como 'episcopado' o 'obispado'.
- source_word: ὀρέγεται
  english_pob_choice: aspires to
  chosen_spanish: aspira a
  alternatives_spanish:
  - busca
  - se encamina hacia
  - anhela
  lexicon: BDAG
  rationale: ὀρέγομαι expresa tender hacia algo y, en este contexto, aspirar a ello. 'Aspira a' es la equivalencia española más natural y conserva el matiz de orientación hacia una meta.
- source_word: καλοῦ ἔργου
  english_pob_choice: a good work
  chosen_spanish: una buena obra
  alternatives_spanish:
  - una obra noble
  - un noble trabajo
  - una obra buena
  lexicon: BDAG
  rationale: καλός puede ser 'bueno', 'noble' u 'honorable'. 'Buena obra' sigue de cerca la estructura del griego, mantiene ἔργον como 'obra' y evita convertirlo en mero cargo o estatus. En español, 'buena obra' suena más natural y eclesialmente claro que 'buen trabajo'.
- source_word: ἐπιθυμεῖ
  english_pob_choice: he desires
  chosen_spanish: desea
  alternatives_spanish:
  - anhela
  - lo desea
  - lo desea intensamente
  lexicon: BDAG
  rationale: ἐπιθυμέω aquí tiene sentido positivo de desear. 'Desea' conserva la paridad con ὀρέγεται sin intensificar de más el verbo ni sugerir un matiz moralmente negativo.
theological_decisions:
- issue: Cómo traducir ἐπισκοπή sin importar una estructura eclesiástica posterior
  english_pob_reading: oversight
  chosen_spanish_reading: supervisión
  alternative_spanish_readings:
  - obispado
  - episcopado
  - oficio de supervisor
  rationale: La lectura inglesa evita fijar un término eclesiástico tardío. 'Supervisión' conserva la idea funcional y permite que el contexto posterior describa al ἐπίσκοπος sin adelantar una tradición institucional específica.
  doctrine_reference: Translation philosophy §1 y §6
- issue: Si la cláusula condicional debe sonar masculina en español
  english_pob_reading: if anyone
  chosen_spanish_reading: si alguien
  alternative_spanish_readings:
  - si un hombre
  - si uno
  rationale: El indefinido griego es genérico; por eso la apertura conviene en forma inclusiva y no específica de varón. El versículo siguiente ya tratará las cualidades del supervisor con lenguaje más concreto.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada coinciden ampliamente en sentido. Se mantuvo la fórmula introductoria de dicho confiable, la genericidad de τις y el contraste positivo entre aspirar/desea. La principal decisión interpretativa fue ἐπισκοπή, para la cual se prefirió una equivalencia funcional (‘supervisión’) con nota de alternativa institucional tradicional.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o terminología de ocultamiento porque no aplica al versículo.
  - '''Dicho'' mantiene mejor el valor formulaico de λόγος en las Pastorales que ''palabra''.'
  - '''Supervisión'' preserva el campo semántico sin forzar ''obispado'' como lectura primaria.'
  - '''Buena obra'' se mantiene en singular, como en el griego, y no se expande a plural o a cargo institucional.'
  - No se añadió una marca masculina en la primera cláusula; el contexto inmediato ya perfila la referencia en términos masculinos más adelante, pero aquí el indefinido sigue siendo genérico.
