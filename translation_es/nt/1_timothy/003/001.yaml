revisions:
- from: 'Este dicho es digno de confianza: si alguien aspira a la supervisión[a], desea una buena obra[b].'
  to: 'Este dicho es digno de confianza: si alguien aspira a la tarea de supervisor[a], desea una buena obra[b].'
  rationale: Se recomienda un ajuste menor para ἐπισκοπῆς. 'La tarea de supervisor' comunica mejor en español el sentido funcional del término, mantiene la conexión con el contexto de ἐπίσκοπος y evita tanto el tecnicismo administrativo de 'supervisión' como la sobreespecificación eclesiástica de 'obispado'.
