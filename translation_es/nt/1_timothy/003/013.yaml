    changes_summary: 'Replaced ''Messiah Jesus'' with ''Christ Jesus'' for more natural formal English and closer consistency with standard rendering of Χριστῷ Ἰησοῦ; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque los que han servido bien obtienen para sí una buena posición y mucho denuedo[a] en la fe[b] que es en el Mesías Jesús[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mucha confianza»; el término griego puede denotar denuedo, confianza o franqueza.
    reason: lexical_alternative
  - marker: b
    text: O «en la fidelidad que es en el Mesías Jesús»; πίστις puede significar «fe», «confianza» o «fidelidad». El texto principal sigue la traducción base del proyecto.
    reason: alternative_reading
  - marker: c
    text: Griego «Cristo»; se traduce «Mesías» aquí porque el término funciona como título.
    reason: lexical_alternative
lexical_decisions:
- source_word: διακονήσαντες
  english_pob_choice: have served
  chosen_spanish: han servido
  alternatives_spanish:
  - han ministrado
  - han servido como diáconos
  lexicon: BDAG
  rationale: El participio aoristo se refiere a quienes han ejercido un servicio fiel; «han servido» es natural en español y no introduce el cargo en el verbo mismo. «Han servido como diáconos» sería demasiado explícito para el verbo griego, aunque el contexto alude a ese oficio.
- source_word: καλῶς
  english_pob_choice: well
  chosen_spanish: bien
  alternatives_spanish:
  - noblemente
  - de manera apropiada
  lexicon: BDAG
  rationale: Adverbio que modifica a διακονήσαντες; «bien» es la equivalencia más directa y clara en español moderno.
- source_word: βαθμὸν ... καλὸν
  english_pob_choice: a good standing
  chosen_spanish: un buen puesto
  alternatives_spanish:
  - una buena posición
  - un buen grado
  - un buen rango
  lexicon: BDAG
  rationale: βαθμός puede denotar un escalón, grado o situación/posición. En este contexto expresa una posición honorable o favorable obtenida por el servicio fiel. «Buen puesto» comunica esa idea de manera natural sin forzar una terminología eclesiástica técnica.
- source_word: περιποιοῦνται
  english_pob_choice: obtain for themselves
  chosen_spanish: obtienen para sí
  alternatives_spanish:
  - ganan para sí
  - adquieren para sí
  lexicon: BDAG
  rationale: El medio tiene fuerza reflexiva; «obtienen para sí» conserva esa idea y suena fluido en español.
- source_word: παρρησίαν
  english_pob_choice: boldness
  chosen_spanish: confianza
  alternatives_spanish:
  - denuedo
  - franqueza
  - valentía
  lexicon: BDAG
  rationale: Aunque el término puede expresar audacia, confianza o franqueza, en esta construcción el matiz más natural en español es «confianza». Mantiene la amplitud semántica sin sonar forzado, y la nota preserva la alternativa de «denuedo»/«franqueza».
- source_word: πίστει
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fidelidad
  - la confianza
  lexicon: BDAG
  rationale: Se conserva la traducción base «fe» conforme al criterio del proyecto; el pasaje puede admitir el matiz de «fidelidad», pero el contexto más natural aquí es la esfera de la fe cristiana.
- source_word: τῇ ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: that is in Messiah Jesus
  chosen_spanish: que está en Cristo Jesús
  alternatives_spanish:
  - que está en el Mesías Jesús
  - en Cristo Jesús
  lexicon: BDAG
  rationale: El artículo y la frase preposicional especifican a «la fe». En español, «la fe que está en Cristo Jesús» preserva la estructura y resulta idiomática. Se usa «Cristo» porque aquí funciona como forma establecida del título en español eclesial y la fuente inglesa revisada también volvió a una forma cristológica convencional.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: BDAG
  rationale: Aunque el criterio general del proyecto favorece «Mesías» para Χριστός como título, en esta cláusula la construcción fija «Cristo Jesús» es la forma más natural y reconocible en español. La nota conserva la alternativa de «Mesías» como posibilidad semántica.
theological_decisions:
- issue: Sentido de παρρησίαν en el contexto
  english_pob_reading: boldness
  chosen_spanish_reading: confianza
  alternative_spanish_readings:
  - denuedo
  - franqueza
  rationale: La palabra griega puede abarcar boldness/confidence/frankness. En español, «confianza» expresa bien la libertad o seguridad que resulta de un servicio fiel en el contexto de la fe, sin añadir un tono demasiado combativo que «denuedo» podría sugerir.
  doctrine_reference: 'DOCTRINE.md: contested/ambiguous lexical ranges; translation philosophy on preserving semantic breadth'
- issue: Sentido de πίστις en ἐν πίστει τῇ ἐν Χριστῷ Ἰησοῦ
  english_pob_reading: faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la fidelidad
  - la confianza
  rationale: Se mantiene «la fe» como lectura principal. Aunque πίστις puede incluir fidelidad, aquí la construcción apunta naturalmente al ámbito o esfera de la fe cristiana. La alternativa queda preservada en nota por la ambigüedad real del término.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation philosophy §3'
- issue: Tratamiento de Χριστός como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Cristo
  alternative_spanish_readings:
  - Mesías
  rationale: En este versículo, la colocación fija «Cristo Jesús» es la forma más inteligible y estable en español, y no borra el valor titular del término. La alternativa «Mesías» queda disponible, pero no es la forma más natural aquí.
  doctrine_reference: Project terminology defaults; lexical/title usage in context
translation_notes:
  revision_awareness: El texto español sigue el sentido del griego SBLGNT y toma en cuenta el audit trail inglés. Aunque el inglés osciló entre «Christ Jesus» y «Messiah Jesus», aquí se evaluó la convención española natural para Χριστῷ Ἰησοῦ y la función titulár de Χριστός; por eso se eligió «Cristo Jesús» en el cuerpo del texto, preservando en nota la alternativa «Mesías». También se mantuvo la distinción semántica de παρρησίαν y πίστις mediante notas, sin borrar sus tensiones léxicas.
  spanish_consistency_notes:
  - Se evita traducir mecánicamente desde el inglés cuando el español requiere orden más natural («la fe que está en Cristo Jesús»).
  - Se preserva la amplitud semántica de παρρησίαν con nota, para no reducirla indebidamente.
  - Se mantiene un registro digno y contemporáneo, apto para lectura eclesial.
  - Se usa puntuación española y se anclan las notas únicamente donde aparecen los marcadores en el texto.
