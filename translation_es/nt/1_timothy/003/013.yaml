revisions:
- from: Porque los que han servido bien obtienen para sí un buen puesto[a] y mucha confianza[b] en la fe que está en Cristo Jesús[c].
  to: Porque los que han servido bien obtienen para sí una buena posición y mucho denuedo[a] en la fe[b] que es en el Mesías Jesús[c].
  rationale: Se corrigió 'Cristo' a 'Mesías' para ajustarse a la política terminológica y a la auditoría inglesa. Se restauró la fuerza de παρρησία con 'denuedo' en el texto principal, dejando 'confianza' como alternativa en nota. Se movieron y rehízo el aparato de notas para que cada marcador corresponda al término correcto. También se reemplazó 'un buen puesto' por 'una buena posición', que comunica mejor el sentido metafórico de βαθμός sin sugerir un empleo o cargo específico.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:15:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español acierta en la estructura básica del versículo: servicio fiel, resultado reflexivo (''obtienen para sí''), buen estado/posición, y una cualidad adicional dentro de la fe en Jesús. Sin embargo, falla en dos puntos importantes frente a la evidencia fuente y la auditoría POB: (1) παρρησία fue fijado por la POB inglesa como ''boldness'', con ''confidence'' como alternativa en nota; el español invirtió esa prioridad al poner ''confianza'' en texto y relegar la audacia/denuedo, debilitando la fuerza léxica. (2) Χριστῷ como título debe renderizarse normalmente ''Mesías'' según la política del proyecto y la auditoría inglesa restauró explícitamente ''Messiah Jesus''; el borrador usa ''Cristo Jesús'' contra esa decisión documentada. Además, la nota [a] está desanclada semánticamente: el marcador aparece en ''buen puesto'' pero su contenido habla de παρρησία, no de βαθμός.'
  spanish_quality_summary: El español es legible, pero 'un buen puesto' suena demasiado como cargo o empleo, y puede sugerir ascenso eclesiástico más que 'buena reputación/posición honorable'. 'Mucha confianza' es natural, pero aquí pierde la energía de παρρησία. 'La fe que está en Mesías Jesús' es comprensible, aunque en español suena más idiomático 'la fe que es en el Mesías Jesús' o, mejor, mantener la estructura sencilla con nota explicativa. La propuesta revisada busca fidelidad y mejor naturalidad eclesial sin caer en calco torpe.
  glossary_alignment: Debe corregirse Χριστός → 'Mesías' en el texto principal, no 'Cristo', porque aquí funciona como título y no hay carve-out documentado que justifique excepción. πίστις como 'fe' está bien en el texto principal con nota para 'fidelidad'. διακονήσαντες → 'han servido' está bien. Para παρρησία, el equivalente principal debe reflejar 'denuedo/audacia' más que solo 'confianza'.
  issues:
  - severity: high
    issue: Χριστῷ se tradujo 'Cristo' en vez de 'Mesías'.
    rationale: La política terminológica del proyecto y la auditoría inglesa para este versículo exigen 'Messiah' porque Χριστός funciona como título. El propio historial corrigió una regresión de 'Christ' a 'Messiah'.
  - severity: high
    issue: παρρησίαν se rebajó a 'confianza' en el texto principal.
    rationale: La decisión POB principal es 'boldness', con 'confidence' solo como alternativa. 'Confianza' por sí sola no preserva adecuadamente el matiz de franqueza/audacia confiada.
  - severity: high
    issue: La nota [a] está mal anclada.
    rationale: El marcador [a] aparece después de 'un buen puesto', pero la nota explica el término griego de παρρησία, no βαθμός. Esto rompe la trazabilidad del aparato de notas.
  - severity: medium
    issue: '''un buen puesto'' puede sonar demasiado ocupacional o jerárquico.'
    rationale: βαθμὸν ... καλὸν expresa más bien una buena posición/estima/standing ganado por el servicio. 'Puesto' en español moderno puede sugerir empleo o cargo.
  revised_spanish_text: Porque los que han servido bien obtienen para sí una buena posición y mucho denuedo[a] en la fe[b] que es en el Mesías Jesús[c].
  revised_footnotes:
  - marker: a
    text: O «mucha confianza»; el término griego puede denotar denuedo, confianza o franqueza.
    reason: lexical_alternative
  - marker: b
    text: O «en la fidelidad que es en el Mesías Jesús»; πίστις puede significar «fe», «confianza» o «fidelidad». El texto principal sigue la traducción base del proyecto.
    reason: alternative_reading
  - marker: c
    text: Griego «Cristo»; se traduce «Mesías» aquí porque el término funciona como título.
    reason: lexical_alternative
  revision_rationale: Se corrigió 'Cristo' a 'Mesías' para ajustarse a la política terminológica y a la auditoría inglesa. Se restauró la fuerza de παρρησία con 'denuedo' en el texto principal, dejando 'confianza' como alternativa en nota. Se movieron y rehízo el aparato de notas para que cada marcador corresponda al término correcto. También se reemplazó 'un buen puesto' por 'una buena posición', que comunica mejor el sentido metafórico de βαθμός sin sugerir un empleo o cargo específico.
