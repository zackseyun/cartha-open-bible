translation:
  language: es
  text: 'Y, sin duda alguna[a], grande es el misterio de la piedad:


    Él fue revelado en carne,


    fue reivindicado en espíritu[b],


    fue visto por los ángeles,


    fue proclamado entre las naciones[c],


    se creyó en él en el mundo,


    fue llevado en gloria[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «Dios fue revelado en carne» en vez de «Él fue revelado en carne». El texto griego crítico lee «quien/él», que es lo reflejado aquí.
    reason: textual_variant
  - marker: b
    text: O «por el Espíritu» o «en el Espíritu». La frase griega es concisa y puede referirse tanto a la acción del Espíritu Santo como a la esfera espiritual.
    reason: alternative_reading
  - marker: c
    text: O «entre los gentiles».
    reason: lexical_alternative
  - marker: d
    text: O «fue llevado a la gloria».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμολογουμένως
  english_pob_choice: undeniably
  chosen_spanish: sin duda alguna
  alternatives_spanish:
  - indudablemente
  - por confesión común
  - sin controversia
  lexicon: BDAG
  rationale: El adverbio expresa algo abiertamente reconocido o confesado. «Sin duda alguna» comunica con naturalidad moderna esa certeza compartida, sin recurrir a un giro arcaico como «sin controversia».
- source_word: μέγα ἐστὶν
  english_pob_choice: great is
  chosen_spanish: grande es
  alternatives_spanish:
  - es grande
  lexicon: BDAG
  rationale: Mantiene el énfasis del predicado colocado al frente, conservando el orden marcado del griego dentro de un español fluido.
- source_word: τὸ τῆς εὐσεβείας μυστήριον
  english_pob_choice: the mystery of godliness
  chosen_spanish: el misterio de la piedad
  alternatives_spanish:
  - el misterio de la devoción
  - el misterio de la religión
  - el misterio de la fe
  lexicon: BDAG
  rationale: «μυστήριον» se conserva como «misterio» en sentido paulino de verdad divina antes oculta y ahora revelada. «εὐσέβεια» en las Pastorales denota piedad/devoción; «piedad» es el equivalente más directo y respeta mejor el matiz que «religión».
- source_word: Ὃς
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Quien
  - Dios
  lexicon: NA28/SBLGNT textual tradition; BDAG
  rationale: El texto crítico lee el relativo masculino «quien/él», no «Dios». En español, «Él» continúa de manera natural el himno confesional y preserva la referencia personal a Cristo sin importar una lectura textual distinta al texto base.
- source_word: ἐφανερώθη
  english_pob_choice: was revealed
  chosen_spanish: fue revelado
  alternatives_spanish:
  - fue manifestado
  - apareció
  lexicon: BDAG
  rationale: La pasiva indica manifestación o puesta en claro. «Fue revelado» es claro y fiel al sentido de hacerse visible públicamente.
- source_word: ἐν σαρκί
  english_pob_choice: in flesh
  chosen_spanish: en carne
  alternatives_spanish:
  - en la carne
  - en un cuerpo
  lexicon: BDAG
  rationale: «σάρξ» aquí es literal, no metafórica, y alude a la existencia humana encarnada. «En carne» reproduce con sobriedad la frase breve del griego.
- source_word: ἐδικαιώθη
  english_pob_choice: was vindicated
  chosen_spanish: fue reivindicado
  alternatives_spanish:
  - fue justificado
  - fue mostrado como justo
  lexicon: BDAG
  rationale: Aquí δικαιόω no significa «hacer justo», sino declarar/mostrar en lo correcto. «Reivindicado» comunica bien la idea de ser vindicado públicamente sin cargar un sentido soteriológico inadecuado a «justificado».
- source_word: ἐν πνεύματι
  english_pob_choice: in spirit
  chosen_spanish: en espíritu
  alternatives_spanish:
  - por el Espíritu
  - en el Espíritu
  lexicon: BDAG
  rationale: La frase es ambigua en el griego. «En espíritu» conserva la concisión y no resuelve prematuramente si se trata de la esfera espiritual de Cristo o de la acción del Espíritu Santo.
- source_word: ὤφθη
  english_pob_choice: was seen
  chosen_spanish: fue visto
  alternatives_spanish:
  - apareció
  lexicon: BDAG
  rationale: El aoristo pasivo de ὁράω admite «fue visto» o «apareció». «Fue visto» mantiene la pasividad de la secuencia confesional.
- source_word: ἀγγέλοις
  english_pob_choice: by angels
  chosen_spanish: por los ángeles
  alternatives_spanish:
  - a los ángeles
  - por mensajeros
  lexicon: BDAG
  rationale: 'El dativo se expresa naturalmente como agente en una pasiva: «por los ángeles». En este contexto cristológico, la referencia a ángeles celestiales es la más probable.'
- source_word: ἐκηρύχθη ἐν ἔθνεσιν
  english_pob_choice: was proclaimed among the nations
  chosen_spanish: fue proclamado entre las naciones
  alternatives_spanish:
  - fue predicado entre los gentiles
  - fue anunciado entre las naciones
  lexicon: BDAG
  rationale: «κηρύσσω» es lenguaje de proclamación. «ἔθνη» puede significar «gentiles», pero «naciones» es más transparente en español moderno y conserva el alcance amplio del texto.
- source_word: ἐπιστεύθη
  english_pob_choice: was believed on
  chosen_spanish: fue creído
  alternatives_spanish:
  - fue creído en
  - fue confiado
  lexicon: BDAG
  rationale: En español, la construcción pasiva «fue creído» comunica de forma natural la respuesta de fe al mensaje sobre Cristo, sin añadir una preposición que el español no necesita aquí.
- source_word: ἐν κόσμῳ
  english_pob_choice: in the world
  chosen_spanish: en el mundo
  alternatives_spanish:
  - por todo el mundo
  lexicon: BDAG
  rationale: Traducción locativa directa que conserva el paralelismo de las frases con ἐν.
- source_word: ἀνελήμφθη
  english_pob_choice: was taken up
  chosen_spanish: fue llevado arriba
  alternatives_spanish:
  - fue recibido arriba
  - fue llevado
  lexicon: BDAG
  rationale: Es la forma estándar para el lenguaje de ascensión. «Fue llevado arriba» preserva la dirección implícita del verbo y mantiene una cadencia clara.
- source_word: ἐν δόξῃ
  english_pob_choice: in glory
  chosen_spanish: en gloria
  alternatives_spanish:
  - con gloria
  - hacia gloria
  lexicon: BDAG
  rationale: «ἐν» puede ser locativo o modal aquí. «En gloria» respeta más de cerca el griego y mantiene la elevación estilística del cierre.
theological_decisions:
- issue: Variante textual al inicio del himno (Ὃς vs θεός vs ὅ)
  english_pob_reading: 'Translate the critically attested reading as a personal reference: ''He'''
  chosen_spanish_reading: 'Traducir el testimonio crítico como referencia personal: «Él»'
  alternative_spanish_readings:
  - «Dios fue revelado en carne»
  - «Lo cual fue revelado en carne»
  rationale: El texto crítico leído por SBLGNT usa Ὃς («quien/él»). Como el himno es cristológico, «Él» resulta natural en español y preserva la referencia personal a Cristo. La lectura «Dios» tiene importancia histórica, pero debe quedar como variante textual, no como texto principal, para mantener la transparencia del texto base.
  doctrine_reference: Principio de primacía del texto original y preservación de variantes textuales significativas
- issue: Sentido de ἐν πνεύματι
  english_pob_reading: Render neutrally as 'in spirit' in the main text
  chosen_spanish_reading: Mantener la ambigüedad con «en espíritu»
  alternative_spanish_readings:
  - «por el Espíritu» (acción del Espíritu Santo)
  - «en el Espíritu» (esfera de vida espiritual)
  rationale: La frase es breve y ambigua. La traducción principal conserva esa concisión sin decidir dogmáticamente entre la agencia del Espíritu Santo y la esfera espiritual o resurreccional de Cristo.
  doctrine_reference: Principio de no resolver en la traducción una ambigüedad que el griego mantiene
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el estado más reciente del archivo fuente: revisión sin cambios respecto del pasaje auditado, con acuerdo alto entre revisores y sin correcciones pendientes relevantes. La formulación española se ajusta al texto crítico y preserva las variantes y ambigüedades documentadas por el POB inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología predeterminada del proyecto, aunque no aparece en este versículo.
  - Se usa «Mesías/Cristo» solo según el texto; aquí el referente cristológico se expresa con pronombre personal para seguir el texto crítico.
  - «piedad» se eligió para εὐσέβεια en coherencia con el uso pastoral del término.
  - Se conserva la pasiva y la secuencia de cláusulas breves para reflejar el tono confensional del original.
