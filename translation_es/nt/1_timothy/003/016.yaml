base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/016.yaml
  text: 'And undeniably[a], great is the mystery of godliness:

    He was revealed in flesh,

    was vindicated in spirit,

    was seen by angels,

    was proclaimed among the nations,

    was believed on in the world[d][c][b],

    was taken up in glory.'
  footnotes:
  - marker: a
    text: Some manuscripts read 'God was revealed in flesh' instead of 'He was revealed in flesh.' The critical Greek text reads 'who/he,' which is reflected here.
    reason: textual_variant
  - marker: b
    text: Or 'was vindicated by the Spirit' or 'was vindicated in the Spirit.' The Greek phrase is concise and may refer either to the Holy Spirit's agency or to the sphere of spiritual life.
    reason: alternative_reading
  - marker: c
    text: Or 'was proclaimed among the Gentiles.'
    reason: lexical_alternative
  - marker: d
    text: Or 'was taken up into glory.'
    reason: lexical_alternative
