translation:
  language: es
  text: No debe ser un recién convertido, para que no se envanezca y caiga en el juicio del diablo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «caiga en la misma condenación que el diablo»; alternativamente, «caiga bajo un juicio asociado con el diablo».'
    reason: alternative_reading
lexical_decisions:
- source_word: νεόφυτον
  english_pob_choice: a recent convert
  chosen_spanish: un recién convertido
  alternatives_spanish:
  - un nuevo convertido
  - un novato
  - uno recién plantado
  lexicon: BDAG
  rationale: El griego literalmente significa 'recién plantado', pero en sentido metafórico se refiere a alguien nuevo en la fe. 'Recién convertido' comunica con claridad ese sentido eclesial en español actual, sin perder la idea de novedad espiritual.
- source_word: τυφωθεὶς
  english_pob_choice: become puffed up
  chosen_spanish: se vuelva engreído
  alternatives_spanish:
  - se llene de soberbia
  - se vuelva presuntuoso
  - se infle de orgullo
  lexicon: BDAG
  rationale: La imagen de 'puffed up' en inglés se expresa de manera natural en español con 'engreído' o 'presuntuoso'. 'Se vuelva engreído' conserva el matiz de orgullo inflado y funciona bien en una advertencia pastoral breve.
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - condena
  lexicon: BDAG
  rationale: '''Juicio'' mantiene un campo semántico más amplio que ''condena'' y preserva la ambigüedad del texto griego sobre si se trata del juicio en sí o de un juicio relacionado con el diablo.'
- source_word: τοῦ διαβόλου
  english_pob_choice: of the devil
  chosen_spanish: del diablo
  alternatives_spanish:
  - del acusador
  - relacionado con el diablo
  - que recayó sobre el diablo
  lexicon: BDAG
  rationale: La construcción genitiva es ambigua. 'Del diablo' es la forma más directa y sobria en español, y conserva la tensión interpretativa sin resolver si el juicio es el del diablo o un juicio asociado con él.
- source_word: ἐμπέσῃ
  english_pob_choice: fall into
  chosen_spanish: caiga en
  alternatives_spanish:
  - entre en
  - incurra en
  - vaya a dar en
  lexicon: BDAG
  rationale: '''Caiga en'' reproduce de manera natural la metáfora de entrar en un estado o resultado peligroso, y corresponde bien al valor de ἐμπίπτω.'
- source_word: ἵνα μὴ
  english_pob_choice: so that he may not
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - de modo que no
  lexicon: BDAG
  rationale: '''Para que no'' expresa con claridad la finalidad/resultado negativo del griego sin arcaísmos innecesarios y mantiene el tono moderno y reverente del español bíblico.'
theological_decisions:
- issue: Ambigüedad de εἰς κρίμα ἐμπέσῃ τοῦ διαβόλου
  english_pob_reading: Rendered ambiguously as 'fall into the judgment of the devil'
  chosen_spanish_reading: '''caiga en el juicio del diablo'' conserva la ambigüedad'
  alternative_spanish_readings:
  - '''caiga en la misma condenación que el diablo'''
  - '''caiga bajo un juicio asociado con el diablo'''
  - '''caiga en la condena que el diablo sufrió'''
  rationale: El genitivo τοῦ διαβόλου admite más de una relación semántica. La redacción principal mantiene la tensión del original y evita decidir de antemano si se trata del juicio del diablo, del juicio sobre el diablo, o de un juicio vinculado con él.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla dogmáticamente.'
translation_notes:
  revision_awareness: El texto inglés POB ya había sido revisado y confirmado sin cambios en la última pasada; esta versión española sigue ese nivel de acuerdo y conserva la ambigüedad interpretativa relevante sin introducir explicaciones ajenas al versículo.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda; aquí no aparece el tetragrámaton ni κύριος con referencia directa al nombre divino.
  - Se mantiene «diablo» para διάβολος, sin suavizarlo a un término menos específico.
  - «Juicio» se prefiere sobre «condena» para no cerrar el sentido del genitivo.
  - La puntuación sigue el español moderno y la estructura de una frase breve de advertencia pastoral.
