lexical_decisions:
- source_word: πάροινον
  english_pob_choice: given to drunkenness
  chosen_spanish: no dado al vino
  alternatives_spanish:
  - no dado a la embriaguez
  - no bebedor empedernido
  - no adicto al vino
  lexicon: BDAG
  rationale: El adjetivo puede describir a alguien dominado por el vino o la embriaguez; en una lista de cualidades, el español natural y fiel es "no dado al vino", que conserva la idea de una disposición habitual sin convertirla solo en un acto aislado.
- source_word: πλήκτην
  english_pob_choice: violent
  chosen_spanish: no violento
  alternatives_spanish:
  - no golpeador
  - no pendenciero
  - no agresivo físicamente
  lexicon: BDAG
  rationale: Aunque el sentido literal es el de alguien que golpea, en esta enumeración de carácter la traducción más clara y ajustada para español es la cualidad general "no violento"; mantiene la fuerza moral del término sin sonar extraña o demasiado técnica.
- source_word: ἐπιεικῆ
  english_pob_choice: gentle
  chosen_spanish: amable
  alternatives_spanish:
  - manso
  - gentil
  - considerado
  lexicon: BDAG
  rationale: El término abarca gentileza, mansedumbre razonable y consideración. En español, "amable" expresa con naturalidad ese tono de trato y encaja con la serie de rasgos de carácter, aunque "manso" sería una alternativa más cercana en algunos contextos.
- source_word: ἄμαχον
  english_pob_choice: peaceable
  chosen_spanish: pacífico
  alternatives_spanish:
  - no contencioso
  - no pendenciero
  - sin espíritu de contienda
  lexicon: BDAG
  rationale: La palabra significa no inclinado a pelear o discutir; "pacífico" conserva la cualidad positiva y funciona bien en una lista de requisitos, aunque las alternativas negativas explicitan más el matiz de no ser litigioso.
- source_word: ἀφιλάργυρον
  english_pob_choice: free from the love of money
  chosen_spanish: libre del amor al dinero
  alternatives_spanish:
  - no amante del dinero
  - no avaro
  - sin amor al dinero
  lexicon: BDAG
  rationale: El compuesto niega el amor al dinero; "libre del amor al dinero" conserva esa estructura interna y la orientación del texto hacia una disposición interior, en vez de reducirlo solo a la idea de avaricia.
translation_notes:
  revision_awareness: El audit trail inglés mantiene una lectura de cualidades morales breves y paralelas, con equivalencias óptimas y notas alternativas léxicas para cada término clave; la versión española sigue esa misma línea sin añadir interpretación doctrinal ni suavizar el tono ético del original.
  spanish_consistency_notes:
  - Se mantiene un registro breve, paralelo y apto para lista de requisitos ministeriales.
  - Se evita "SEÑOR" u otras sustituciones no presentes, ya que el versículo no contiene el Nombre divino.
  - Los cuatro rasgos se traducen como cualidades de carácter, preservando la fuerza negativa del griego mediante "no" y la positiva mediante adjetivos simples.
  - Las notas recogen alternativas reales en español para los términos con tensión léxica documentada.
