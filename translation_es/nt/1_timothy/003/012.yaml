    reason: alternative_reading
  revision_rationale: Se ajusta «casas» a «hogares» para reflejar mejor οἶκος como unidad doméstica. Se cambia «que administren» por «dirigir» para un español más natural en relación con hijos y hogar dentro de una lista de requisitos. Se usa «esposos de una sola mujer» en el texto principal para corresponder más estrechamente a «husbands of one wife», preservando la alternativa más literal «hombres de una sola mujer» en la nota y manteniendo la ambigüedad exegética documentada.
