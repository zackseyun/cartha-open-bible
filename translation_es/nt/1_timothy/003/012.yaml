revisions:
- from: Los diáconos deben ser hombres de una sola mujer[a], que administren bien a sus hijos y sus propias casas.
  to: Los diáconos deben ser esposos de una sola mujer[a], y dirigir bien a sus hijos y sus propios hogares.
  rationale: Se ajusta «casas» a «hogares» para reflejar mejor οἶκος como unidad doméstica. Se cambia «que administren» por «dirigir» para un español más natural en relación con hijos y hogar dentro de una lista de requisitos. Se usa «esposos de una sola mujer» en el texto principal para corresponder más estrechamente a «husbands of one wife», preservando la alternativa más literal «hombres de una sola mujer» en la nota y manteniendo la ambigüedad exegética documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:16:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: διάκονοι como oficio eclesial, ἔστωσαν con fuerza normativa, μιᾶς γυναικὸς ἄνδρες con una formulación formal y ambigua, y προϊστάμενοι ... τῶν ἰδίων οἴκων como manejo responsable de hijos y hogar. Sin embargo, «sus propias casas» reduce οἶκοι al edificio y no preserva bien el sentido de unidad doméstica/household del contexto. Además, «que administren» como subordinada finita se aleja innecesariamente del participio atributivo y suena menos natural en esta lista de requisitos.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para mayor naturalidad y precisión. «Hombres de una sola mujer» es defendible, especialmente por la nota, aunque en el flujo de la frase «esposos de una sola mujer» encaja mejor con el matiz de ‘husbands’ del inglés POB. El problema principal es «sus propias casas», que en español común sugiere edificios; «sus propios hogares» o «sus propias familias» sería más claro, y «hogares» preserva mejor el alcance doméstico sin estrecharlo. También conviene evitar «a sus hijos», ya que con «administren» resulta poco idiomático; «que dirijan bien a sus hijos y sus propios hogares» o «manejando bien a sus hijos y sus propios hogares» suena más natural.
  glossary_alignment: «Diáconos» está alineado con la terminología del proyecto. No hay conflictos con Yahvé/Mesías/etc. La decisión sobre μιᾶς γυναικὸς ἄνδρες debe seguir preservando la ambigüedad teológica documentada; la nota actual lo hace bien. La mejor corrección terminológica es cambiar «casas» por «hogares» para reflejar οἶκος como household.
  issues:
  - severity: medium
    issue: «sus propias casas» para τῶν ἰδίων οἴκων
    rationale: En este contexto οἶκος se refiere al hogar o unidad doméstica, no principalmente al edificio. «Casas» en español tiende a concretarse como vivienda física y pierde el sentido social/familiar que el inglés POB preservó con «households».
  - severity: low
    issue: «que administren bien a sus hijos» suena poco idiomático
    rationale: Aunque transmite supervisión, en español administrar personas, especialmente hijos, resulta menos natural. Una formulación como «que dirijan bien a sus hijos y sus propios hogares» o una estructura participial equivalente comunica mejor el sentido de προϊστάμενοι en una lista de requisitos.
  - severity: low
    issue: Ligera tensión entre el texto principal y la nota en μιᾶς γυναικὸς ἄνδρες
    rationale: El texto principal dice «hombres de una sola mujer» y la nota ofrece exactamente la misma frase como alternativa. Conviene que la nota preserve una alternativa real; por ejemplo, si el texto se revisa a «esposos de una sola mujer», la nota puede conservar «hombres de una sola mujer».
