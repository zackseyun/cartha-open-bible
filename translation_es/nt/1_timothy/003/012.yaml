translation:
  language: es
  text: Los diáconos deben ser esposos de una sola mujer[a], y dirigir bien a sus hijos y sus propios hogares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombres de una sola mujer». La frase puede subrayar la fidelidad matrimonial; algunos la entienden más específicamente como exclusión de la poligamia o de segundas nupcias.
    reason: alternative_reading
lexical_decisions:
- source_word: διάκονοι
  english_pob_choice: Deacons
  chosen_spanish: diáconos
  alternatives_spanish:
  - siervos
  - ministros
  lexicon: BDAG
  rationale: En este contexto de orden eclesial, διάκονοι funciona como designación de oficio, no como servicio genérico. En español, el término natural y reconocible es «diáconos», que conserva el valor institucional del cargo sin ampliar ni reducir el sentido.
- source_word: ἔστωσαν
  english_pob_choice: must be
  chosen_spanish: deben ser
  alternatives_spanish:
  - han de ser
  - sean
  lexicon: BDAG
  rationale: El imperativo tiene fuerza normativa en una lista de requisitos. «Deben ser» comunica obligación de manera clara y digna en español moderno.
- source_word: μιᾶς γυναικὸς ἄνδρες
  english_pob_choice: husbands of one wife
  chosen_spanish: hombres de una sola mujer
  alternatives_spanish:
  - esposos de una sola mujer
  - hombres de una sola esposa
  - fieles a sus esposas
  lexicon: BDAG
  rationale: La expresión griega es breve e idiomática y mantiene un componente masculino explícito. «Hombres de una sola mujer» conserva mejor esa forma compacta y la tensión interpretativa que la POB inglesa preserva, sin resolver prematuramente si el énfasis es fidelidad marital, monogamia o exclusión de segundas nupcias.
- source_word: τέκνων
  english_pob_choice: their children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus niños
  - a sus descendientes
  lexicon: BDAG
  rationale: Aunque el posesivo no está explícito en el sustantivo aislado, el contexto de la frase participial y el paralelismo con «sus propias casas» permiten suplirlo naturalmente en español.
- source_word: καλῶς
  english_pob_choice: well
  chosen_spanish: bien
  alternatives_spanish:
  - correctamente
  - adecuadamente
  - competentemente
  lexicon: BDAG
  rationale: El adverbio modifica directamente el participio y su equivalente más natural y directo en español es «bien».
- source_word: προϊστάμενοι
  english_pob_choice: managing
  chosen_spanish: que administren
  alternatives_spanish:
  - que dirijan
  - que presidan
  - que gobiernen
  lexicon: BDAG
  rationale: El participio expresa ejercer supervisión responsable. «Administren» comunica cuidado y dirección efectiva en el marco doméstico, sin cargarlo de dureza autoritaria.
- source_word: τῶν ἰδίων οἴκων
  english_pob_choice: their own households
  chosen_spanish: sus propias casas
  alternatives_spanish:
  - sus propios hogares
  - sus propias familias
  - sus propias casas y familias
  lexicon: BDAG
  rationale: οἶκος puede abarcar el hogar doméstico como unidad social y familiar, pero en español «casas» permite una equivalencia formal cercana al sustantivo griego y mantiene la ambigüedad semántica. Se evita «familias» porque estrecha el alcance, y «hogares» porque sería una reinterpretación más contextual.
theological_decisions:
- issue: Interpretación de μιᾶς γυναικὸς ἄνδρες en los requisitos para diáconos
  english_pob_reading: Rendered formally as 'husbands of one wife' without resolving whether Paul primarily means marital faithfulness, monogamy, or exclusion of remarriage/polygamy.
  chosen_spanish_reading: Traducido formalmente como «hombres de una sola mujer», sin decidir si la frase enfatiza fidelidad conyugal, monogamia o exclusión de nuevas nupcias/poligamia.
  alternative_spanish_readings:
  - esposos de una sola mujer
  - fieles a sus esposas
  - casados una sola vez
  rationale: La frase sigue siendo compacta e interpretativamente debatida. Mantener una versión cercana al griego preserva la tensión exegética que el texto permite y evita imponer una conclusión doctrinal que el original no explicita por sí mismo.
  doctrine_reference: Translation philosophy §3; §4
translation_notes:
  revision_awareness: La fuente inglesa presenta un pasaje sin cambios en la última revisión y con acuerdo alto del revisor; por eso el borrador español sigue de cerca la decisión inglesa principal, preservando la misma ambigüedad interpretativa en μιᾶς γυναικὸς ἄνδρες.
  spanish_consistency_notes:
  - Se mantuvo «diáconos» como término de oficio eclesial coherente con el contexto de lista de requisitos.
  - Se evitó «SEÑOR» u otra normalización teológica ajena al versículo, ya que no hay aquí vocabulario divino directo.
  - «Casas» reproduce de manera cercana οἶκος sin cerrar el sentido a «familias», conservando la amplitud doméstica del griego.
  - La nota al pie usa un marcador único y se vincula exactamente al segmento «mujer[a]».
