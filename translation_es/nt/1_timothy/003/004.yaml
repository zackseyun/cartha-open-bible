translation:
  language: es
  text: dirigiendo bien su propio hogar[a], teniendo a sus hijos en sujeción, con toda dignidad[c][b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''administrando bien su propio hogar'' o ''gobernando bien su propia casa''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''teniendo hijos que sean sumisos'' o ''manteniendo a sus hijos bajo control''.'
    reason: lexical_alternative
  - marker: c
    text: La expresión 'con toda dignidad' puede describir la manera de la sujeción de los hijos o el modo general de dirigir el hogar.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ ἰδίου οἴκου
  english_pob_choice: his own household
  chosen_spanish: su propia casa
  alternatives_spanish:
  - su propia familia
  - su propio hogar
  lexicon: BDAG
  rationale: En este contexto de requisito para un supervisor, οἶκος puede referirse al ámbito doméstico bajo su cuidado. 'Su propia casa' conserva la imagen concreta y la posesión de ἰδίου; 'familia' o 'hogar' serían posibles, pero aquí 'casa' mantiene mejor la correspondencia con la construcción griega y con la idea de administración doméstica.
- source_word: καλῶς
  english_pob_choice: well
  chosen_spanish: bien
  alternatives_spanish:
  - adecuadamente
  - correctamente
  - como corresponde
  lexicon: BDAG
  rationale: El adverbio modifica directamente la manera de administrar. 'Bien' es la equivalencia más natural y breve en español, sin estrechar indebidamente el matiz de competencia, orden y conveniencia.
- source_word: προϊστάμενον
  english_pob_choice: managing
  chosen_spanish: administrando
  alternatives_spanish:
  - dirigiendo
  - presidiendo
  - gobernando
  lexicon: BDAG
  rationale: προΐστημι aquí expresa supervisión responsable sobre la casa. 'Administrando' comunica gobierno práctico y cuidado de la casa sin sonar tan áspero como 'gobernando', y sin reducirse solo a una idea de liderazgo abstracto. Mantiene una autoridad real en un registro natural para el español actual.
- source_word: τέκνα ἔχοντα
  english_pob_choice: having his children
  chosen_spanish: teniendo a sus hijos
  alternatives_spanish:
  - teniendo hijos
  - con sus hijos
  lexicon: BDAG
  rationale: La construcción participial especifica cómo se manifiesta esa buena administración. 'Teniendo a sus hijos' sigue de cerca el griego y conserva la relación posesiva implícita sin perder fluidez en español.
- source_word: ἐν ὑποταγῇ
  english_pob_choice: in submission
  chosen_spanish: en sujeción
  alternatives_spanish:
  - en sumisión
  - obedientes
  - sometidos
  lexicon: BDAG
  rationale: ὑποταγή denota subordinación o sujeción. 'Sujeción' preserva el sustantivo de la idea griega y evita suavizarla en exceso. 'Obedientes' sería más interpretativo y más estrecho; 'sumisión' puede sonar más marcado en español, por lo que 'sujeción' resulta más sobrio.
- source_word: μετὰ πάσης σεμνότητος
  english_pob_choice: with all dignity
  chosen_spanish: con toda dignidad
  alternatives_spanish:
  - con toda decencia
  - con toda seriedad
  - con toda propiedad
  lexicon: BDAG
  rationale: σεμνότης apunta a dignidad, seriedad o respetabilidad. 'Con toda dignidad' es la opción más directa y natural en español, y mantiene abierta la cuestión de si la frase caracteriza la sujeción de los hijos, la manera de administrar del padre, o el orden general de la casa.
theological_decisions:
- issue: Lenguaje de autoridad doméstica
  english_pob_reading: The verse describes a prospective overseer's responsible governance of his domestic household, not a broader doctrinal claim about all forms of authority.
  chosen_spanish_reading: El versículo describe la administración responsable de la casa propia como requisito para un posible supervisor, no una afirmación doctrinal general sobre toda autoridad.
  alternative_spanish_readings:
  - una lectura patriarcal más fuerte que enfatiza el gobierno
  - una lectura suavizada que reduce la autoridad a simple cuidado
  rationale: El griego expresa autoridad y orden real en la casa, pero dentro de una lista de requisitos. La traducción conserva esa fuerza con 'administrando' y 'sujeción' sin convertir el texto en una tesis general sobre estructura familiar.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
- issue: Alcance de 'con toda dignidad'
  english_pob_reading: Retain the phrase without over-specifying its referent.
  chosen_spanish_reading: Conservar la expresión sin decidir de manera cerrada si modifica principalmente la sujeción de los hijos o la administración del padre.
  alternative_spanish_readings:
  - los hijos en sujeción, con toda dignidad
  - administrando bien su propia casa con toda dignidad
  rationale: La sintaxis griega permite más de una relación posible. El español mantiene esa ambigüedad legítima al colocar la frase al final con marcadores de puntuación que no fuerzan una decisión interpretativa innecesaria.
  doctrine_reference: Translation philosophy item 3
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios según el expediente auditado; se conserva la ambigüedad sintáctica del original y la fuerza de la autoridad doméstica sin intensificarla ni debilitarla.'
  spanish_consistency_notes:
  - Se usa 'casa' para οἶκος por coherencia con el contexto doméstico y la terminología POB documentada.
  - '''Sujeción'' preserva el sustantivo ὑποταγή sin reemplazarlo por una formulación más interpretativa.'
  - '''Dignidad'' mantiene el matiz de σεμνότης con un registro comprensible y digno en español.'
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes, y no aparece ninguna referencia a Χριστός o θεός en este versículo.
