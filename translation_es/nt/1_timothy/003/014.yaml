translation:
  language: es
  text: Te escribo estas cosas, esperando ir pronto[a] a verte,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "rápidamente" / "en poco tiempo" para ἐν τάχει.
