lexical_decisions:
- source_word: Ταῦτά
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas
  lexicon: BDAG
  rationale: El neutro plural refiere al conjunto de instrucciones previas y posteriores; "estas cosas" conserva el plural y la referencia epistolar con naturalidad en español.
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  lexicon: BDAG
  rationale: Con γράφω en fórmula epistolar, el dativo de destinatario se expresa de forma natural como "a ti".
- source_word: γράφω
  english_pob_choice: I am writing
  chosen_spanish: les escribo
  alternatives_spanish:
  - estoy escribiendo
  - escribo
  lexicon: BDAG
  rationale: El presente epistolar en español suele sonar mejor como presente simple; aquí "les escribo" conserva el acto actual de la carta sin forzar un progresivo poco idiomático.
- source_word: ἐλπίζων
  english_pob_choice: hoping
  chosen_spanish: esperando
  alternatives_spanish:
  - con esperanza de
  - hoping
  lexicon: BDAG
  rationale: El participio expresa circunstancia concomitante. En español, "esperando" comunica el matiz de expectativa continua sin añadir certeza indebida.
- source_word: ἐλθεῖν
  english_pob_choice: to come
  chosen_spanish: ir
  alternatives_spanish:
  - venir
  - acudir
  lexicon: BDAG
  rationale: Aunque el griego usa "venir" desde la perspectiva del escritor, en español, con complemento de dirección personal, "ir a verte" evita ambigüedad y suena natural; se conserva el movimiento hacia Timoteo.
- source_word: πρὸς σὲ
  english_pob_choice: to you
  chosen_spanish: a verte
  alternatives_spanish:
  - a ti
  - junto a ti
  lexicon: BDAG
  rationale: La preposición de dirección hacia una persona se vuelve idiomática en español como "a verte" dentro del infinitivo de movimiento, manteniendo la cercanía personal del original.
- source_word: ἐν τάχει
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - en poco tiempo
  lexicon: BDAG
  rationale: El modismo significa "pronto" o "en breve"; "pronto" es la opción más natural y comunica la inminencia sin literalismo excesivo.
translation_notes:
  revision_awareness: 'Alineado con el texto griego SBLGNT y con el auditoría inglesa: se preserva el valor epistolar del presente, la expectativa expresada por el participio y el modismo temporal de ἐν τάχει. No se documentan revisiones textuales o cambios de sentido relevantes en este versículo.'
  spanish_consistency_notes:
  - Se usa "a ti" para el destinatario singular, coherente con el contexto inmediato.
  - Se evita "Cristo"/"Mesías" porque no aparece en el versículo.
  - Se mantiene un registro formal pero natural para carta pastoral.
  - La nota de pie marca la alternativa semántica de ἐν τάχει sin duplicar el sentido principal en el cuerpo.
