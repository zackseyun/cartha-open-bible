translation:
  language: es
  text: Pero si alguien no sabe cómo administrar su propio hogar[a][b], ¿cómo cuidará de la iglesia de Dios[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dirigir» o «presidir sobre» su propio hogar.
    reason: lexical_alternative
  - marker: b
    text: O «familia».
    reason: lexical_alternative
  - marker: c
    text: O «la iglesia de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δέ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Ahora bien, si
  - Y si
  lexicon: BDAG
  rationale: La combinación griega introduce una condición con contraste leve respecto del contexto anterior. «Pero si» conserva ese valor adversativo-condicional de manera natural en español.
- source_word: τις
  english_pob_choice: someone
  chosen_spanish: alguien
  alternatives_spanish:
  - cualquiera
  - un hombre
  lexicon: BDAG
  rationale: El indefinido griego es genérico. «Alguien» suena natural en español y evita precisar más de lo que el texto dice.
- source_word: τοῦ ἰδίου οἴκου
  english_pob_choice: his own household
  chosen_spanish: su propia casa
  alternatives_spanish:
  - su propio hogar
  - su propia familia
  - su propia casa y casa
  lexicon: BDAG
  rationale: οἶκος puede significar casa, hogar o unidad doméstica. Aquí, por el paralelo con la administración y el cuidado, «su propia casa» comunica bien el ámbito doméstico bajo su responsabilidad sin forzar una paráfrasis más amplia.
- source_word: προστῆναι
  english_pob_choice: to manage
  chosen_spanish: administrar
  alternatives_spanish:
  - dirigir
  - presidir sobre
  - gobernar
  lexicon: BDAG
  rationale: El infinitivo de προΐστημι aquí expresa responsabilidad y supervisión sobre la casa. «Administrar» transmite la idea de manejo cuidadoso y de orden sin cargar el verbo de un matiz autoritario que el contexto no exige.
- source_word: οὐκ οἶδεν
  english_pob_choice: does not know how
  chosen_spanish: no sabe cómo
  alternatives_spanish:
  - no sabe
  - no es capaz
  lexicon: BDAG
  rationale: La construcción con infinitivo en griego suele implicar saber cómo hacer algo, no solo poseer información. «No sabe cómo» reproduce ese valor idiomático con claridad.
- source_word: πῶς
  english_pob_choice: how will
  chosen_spanish: ¿cómo ...?
  alternatives_spanish:
  - ¿de qué manera ...?
  - ¿cómo podrá ...?
  lexicon: BDAG
  rationale: La pregunta retórica queda bien expresada en español con «¿cómo ...?»; el sentido inferencial del griego se mantiene sin sobreexplicar.
- source_word: ἐκκλησίας θεοῦ
  english_pob_choice: God’s church
  chosen_spanish: la iglesia de Dios
  alternatives_spanish:
  - la asamblea de Dios
  - la iglesia de Yahvé
  lexicon: BDAG
  rationale: ἐκκλησία en las Pastorales se refiere a la comunidad cristiana. «Iglesia» es la equivalencia contextual más natural en español; se mantiene el genitivo como «de Dios» para conservar la relación posesiva y eclesial del original.
- source_word: ἐπιμελήσεται
  english_pob_choice: care for
  chosen_spanish: cuidará de
  alternatives_spanish:
  - se preocupará por
  - atenderá
  - velará por
  lexicon: BDAG
  rationale: ἐπιμελέομαι denota cuidado atento y solicitud por el bienestar de alguien. «Cuidará de» preserva ese matiz de atención responsable y suena natural en español.
theological_decisions:
- issue: Distinción entre la esfera doméstica y la eclesial
  english_pob_reading: Render the contrast as 'manage his own household' versus 'care for God’s church' to preserve the distinction between governance at home and pastoral care in the church.
  chosen_spanish_reading: «administrar su propia casa» frente a «cuidará de la iglesia de Dios» mantiene la diferencia entre la responsabilidad doméstica y el cuidado eclesial.
  alternative_spanish_readings:
  - «dirigir su propia casa» frente a «atenderá la iglesia de Dios»
  - «presidir su propia casa» frente a «velará por la iglesia de Dios»
  rationale: El griego usa dos verbos distintos, προΐστημι y ἐπιμελέομαι. Conviene conservar la diferencia para no reducir la comparación a una sola idea de mando. En español, «administrar» y «cuidar de» reflejan esa tensión entre gestión y solicitud pastoral.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: El sujeto indefinido y el género gramatical
  english_pob_reading: Use 'someone' for τις but retain masculine pronouns ('his,' 'he') in keeping with the masculine singular grammar and the immediate context of overseer qualifications.
  chosen_spanish_reading: Se usa «alguien» para τις, y se conserva un referente masculino implícito en el contexto sin añadir marcadores innecesarios en español.
  alternative_spanish_readings:
  - «si un hombre no sabe...»
  - «si cualquiera no sabe cómo administrar su propia casa...»
  rationale: El griego es masculino singular en el marco de las cualificaciones del supervisor/anciano, pero τις sigue siendo indefinido. El español puede mantener la genericidad de «alguien» sin cerrar indebidamente el alcance del enunciado.
  doctrine_reference: Translation philosophy §4
- issue: Referencia posesiva de ἐκκλησίας θεοῦ
  english_pob_reading: God’s church
  chosen_spanish_reading: «la iglesia de Dios»
  alternative_spanish_readings:
  - «la iglesia de Yahvé»
  - «la iglesia perteneciente a Dios»
  rationale: La construcción genitiva se traduce de forma directa y reconocible en español. «La iglesia de Dios» conserva el sentido de pertenencia sin introducir una formulación más interpretativa que el texto no requiere.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés de POB, manteniendo la distinción verbal entre προΐστημι y ἐπιμελέομαι, el sujeto indefinido τις y la referencia eclesial de ἐκκλησία θεοῦ. No se registraron revisiones aplicadas en la última pasada, y el acuerdo de revisión fue alto y sin objeciones.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ, conforme al estándar del proyecto.
  - «Iglesia de Dios» conserva la referencia eclesial directa y evita sustituirla por una glosa más amplia.
  - «Administrar» y «cuidar de» preservan la diferencia semántica entre autoridad doméstica y atención pastoral.
  - Se evita «SEÑOR» o equivalentes de ocultamiento porque el texto no contiene יהוה.
  - La puntuación interrogativa española se adapta a la pregunta retórica final sin alterar el sentido.
