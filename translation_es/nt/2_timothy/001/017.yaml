translation:
  language: es
  text: pero cuando estaba en Roma[a], me buscó diligentemente y me encontró—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando llegó a Roma» o más formalmente «estando en Roma». El participio griego γενόμενος puede expresarse en español de varias maneras idiomáticas; aquí se eligió «cuando estaba en Roma» para reflejar su presencia allí sin exigir explícitamente la idea de llegada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - mas
  lexicon: BDAG
  rationale: Conjunción adversativa que contrasta la conducta de Onesíforo con el contexto previo; «pero» es la opción natural y fiel en español.
- source_word: γενόμενος
  english_pob_choice: when he was in
  chosen_spanish: cuando estaba en
  alternatives_spanish:
  - cuando llegó a
  - habiendo estado en
  - siendo en
  lexicon: BDAG
  rationale: La nota inglesa muestra la tensión entre el participio y su sentido idiomático. En español, «cuando estaba en» conserva la idea de presencia en Roma sin añadir explícitamente la noción de llegada.
- source_word: ἐν Ῥώμῃ
  english_pob_choice: in Rome
  chosen_spanish: en Roma
  alternatives_spanish:
  - en la ciudad de Roma
  lexicon: BDAG
  rationale: Valor locativo directo; «en Roma» reproduce con naturalidad el complemento de lugar.
- source_word: σπουδαίως
  english_pob_choice: diligently
  chosen_spanish: diligentemente
  alternatives_spanish:
  - con empeño
  - con diligencia
  - ardientemente
  lexicon: BDAG
  rationale: El adverbio expresa esfuerzo serio e intencional; «diligentemente» mantiene ese matiz y corresponde al registro de la versión inglesa.
- source_word: ἐζήτησέν με
  english_pob_choice: he searched for me
  chosen_spanish: me buscó
  alternatives_spanish:
  - me buscó con empeño
  - me buscó afanosamente
  - me procuró
  lexicon: BDAG
  rationale: ζητέω aquí es buscar a una persona. «Me buscó» es idiomático en español; el adverbio «diligentemente» ya lleva la fuerza de la búsqueda intensa.
- source_word: καὶ εὗρεν
  english_pob_choice: and found me
  chosen_spanish: y me halló
  alternatives_spanish:
  - y me encontró
  lexicon: BDAG
  rationale: «Halló» conserva un registro sobrio y bíblico sin perder claridad. Alternativamente, «encontró» también sería correcto, pero «halló» armoniza con la cadencia del pasaje.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «was in Rome» sobre «arrived in Rome» para ajustarse más de cerca a γενόμενος ἐν Ῥώμῃ sin introducir la idea de llegada. La versión española refleja esa misma cautela semántica.
  spanish_consistency_notes:
  - Se mantiene «Roma» como nombre propio sin artículo, conforme al uso español estándar.
  - 'Se conserva el orden natural del español con el objeto pronominal antes del verbo: «me buscó», «me halló».'
  - No se introduce ningún término eclesiástico tradicional no justificado por el griego; la traducción sigue el contraste adversativo simple del texto.
