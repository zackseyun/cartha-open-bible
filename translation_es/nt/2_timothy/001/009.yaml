  rationale: 'Se hicieron ajustes menores de estilo y alineación: se añadió ''un'' en ''con un llamamiento santo'' para mejorar la naturalidad sin perder la ambigüedad del dativo; se quitó el artículo en ''en Mesías Jesús'' para evitar una construcción española forzada mientras se mantiene la política de traducir Χριστός como título; y se afinó la nota final para reflejar mejor la alternativa idiomática documentada en el historial inglés.'
