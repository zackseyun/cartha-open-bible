    changes_summary: 'Changed ''Messiah Jesus'' to ''Christ Jesus'' to reflect the Greek Χριστῷ Ἰησοῦ and standard formal register; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: el que nos salvó y nos llamó con un llamamiento santo[a], no conforme a nuestras obras sino conforme a su propio propósito y gracia, la cual nos fue dada en Mesías Jesús[b] antes de los tiempos eternos[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: ''a un llamamiento santo'' o ''por un llamamiento santo''. El dativo griego admite más de una relación.'
    reason: lexical_alternative
  - marker: b
    text: O 'en Cristo Jesús'. Se usa 'Mesías Jesús' porque Χριστός aquí funciona como título.
    reason: alternative_reading
  - marker: c
    text: O 'antes de los siglos eternos' o 'antes de tiempos eternos'.
    reason: lexical_alternative
  - marker: d
    text: O 'antes de que comenzaran los tiempos', una forma más idiomática que comunica la misma anterioridad absoluta.
    reason: previous_rendering
lexical_decisions:
- source_word: σώσαντος
  english_pob_choice: saved
  chosen_spanish: salvó
  alternatives_spanish:
  - rescató
  - libró
  lexicon: BDAG
  rationale: En contexto paulino, σῴζω conserva su peso soteriológico. 'Salvó' es la equivalencia natural en español y mantiene la fuerza teológica sin introducir matices de rescate físico que el contexto no exige.
- source_word: καλέσαντος
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - invitó
  lexicon: BDAG
  rationale: El paralelismo con 'salvó' pide mantener el acto divino de convocatoria. 'Llamó' es la forma más estable y reconocible en el uso paulino en español.
- source_word: κλήσει ἁγίᾳ
  english_pob_choice: with a holy calling
  chosen_spanish: con llamamiento santo
  alternatives_spanish:
  - a un llamamiento santo
  - por un llamamiento santo
  lexicon: BDAG
  rationale: El dativo admite más de una relación. 'Con llamamiento santo' conserva la ambigüedad funcional del griego y evita decidir de forma estrecha entre medio, dirección o contenido del llamamiento.
- source_word: οὐ κατὰ τὰ ἔργα ἡμῶν
  english_pob_choice: not according to our works
  chosen_spanish: no conforme a nuestras obras
  alternatives_spanish:
  - no por nuestras obras
  - no sobre la base de nuestras obras
  lexicon: BDAG
  rationale: '''Conforme a'' reproduce bien el valor de κατά con acusativo como norma o base. ''Obras'' es el término paulino usual y debe conservarse.'
- source_word: ἰδίαν πρόθεσιν
  english_pob_choice: his own purpose
  chosen_spanish: su propio propósito
  alternatives_spanish:
  - su propio plan
  - su propia intención
  lexicon: BDAG
  rationale: '''Propósito'' es la equivalencia más natural y doctrinalmente adecuada para πρόθεσις en este contexto, y ''propio'' expresa la idea de pertenencia e iniciativa divina.'
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: '''Gracia'' es el término técnico paulino y debe conservarse; ''favor'' debilitaría el peso teológico del pasaje.'
- source_word: τὴν δοθεῖσαν ἡμῖν
  english_pob_choice: which was given to us
  chosen_spanish: la cual nos fue dada
  alternatives_spanish:
  - que nos fue concedida
  - que nos fue otorgada
  lexicon: BDAG
  rationale: La participio femenino concuerda con 'gracia', por eso el relativo femenino se mantiene en español. La pasiva 'nos fue dada' sigue de cerca la construcción griega y su claridad es suficiente.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en el Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: 'Se conserva ''Mesías'' porque Χριστός funciona aquí como título, no solo como nombre fijo. El español requiere el artículo para un titular natural: ''el Mesías Jesús''.'
- source_word: πρὸ χρόνων αἰωνίων
  english_pob_choice: before eternal ages
  chosen_spanish: antes de los tiempos eternos
  alternatives_spanish:
  - antes de los siglos eternos
  - antes de tiempos eternos
  lexicon: BDAG
  rationale: La expresión griega es idiomática y cargada. 'Antes de los tiempos eternos' mantiene la estructura y el sentido de anterioridad absoluta sin volverlo demasiado interpretativo.
theological_decisions:
- issue: Naturaleza del llamamiento santo
  english_pob_reading: The dative can be understood as 'with a holy calling,' 'to a holy calling,' or 'by a holy calling.'
  chosen_spanish_reading: con llamamiento santo
  alternative_spanish_readings:
  - a un llamamiento santo
  - por un llamamiento santo
  rationale: El griego permite más de una relación sintáctica. La redacción elegida conserva esa tensión en vez de resolverla, de modo que el lector español no pierda la ambigüedad documentada.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Χριστός como título mesiánico
  english_pob_reading: Messiah Jesus because Χριστός is understood as a title
  chosen_spanish_reading: el Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: Como título, Χριστός debe rendirse con 'Mesías' en la línea de la política del proyecto. El artículo se añade por fluidez natural del español y para expresar el valor titular del término.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: 'El expediente inglés muestra una secuencia de revisiones sobre Χριστός: una versión cambió a ''Christ Jesus'' por registro, pero la corrección posterior restauró ''Messiah Jesus'' conforme a la política doctrinal del proyecto. También se revisó la frase temporal desde una forma más literal e incómoda a ''before eternal ages''; en español se eligió una solución natural pero cercana (''antes de los tiempos eternos'') sin perder la anterioridad absoluta ni la densidad idiomática del griego.'
  spanish_consistency_notes:
  - '''Mesías'' se mantiene para Χριστός cuando funciona como título; no se usa ''Cristo'' salvo en la nota de alternativa.'
  - '''Gracia'' conserva el peso paulino de χάρις.'
  - '''Obras'' se mantiene para ἔργα en sentido paulino.'
  - '''Llamamiento'' se usa para κλῆσις; no se sustituye por ''vocación'' por ser menos directo en este contexto.'
  - La puntuación y el orden buscan reflejar el paralelismo del griego sin volverlo artificial.
