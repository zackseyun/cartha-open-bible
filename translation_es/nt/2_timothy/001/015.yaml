review_pass:
  verdict: revise
  source_alignment_summary: El borrador comunica bien el sentido general del versículo, pero no sigue de forma suficientemente fiel la decisión léxica principal auditada para ἀπεστράφησάν με. El griego expresa más literalmente que 'se apartaron / se volvieron de mí', y el English POB preserva esa imagen en el texto principal con 'turned away from me', dejando 'deserted/abandoned' como alternativas de nota. En español, poner 'me abandonaron' en el texto principal desplaza el énfasis hacia una interpretación más fuerte que la escogida por la auditoría inglesa. El resto de los elementos—'Sabes esto', 'todos los de Asia', 'entre quienes están', y los nombres propios—se alinean adecuadamente con el origen y con la lectura contextual de 'todos'.
  spanish_quality_summary: 'El español es claro y legible, pero ''todos los de Asia'' suena algo elíptico; ''todos los que están en Asia'' refleja mejor la forma griega y evita posible ambigüedad. También conviene omitir el pronombre explícito ''Tú'' por naturalidad en español, salvo énfasis especial no presente aquí. La frase resultante queda más fiel y fluida: ''Sabes esto: todos los que están en Asia se apartaron de mí[a][b], entre quienes están Fígelo y Hermógenes.'''
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los nombres propios están bien hispanizados. La principal desalineación es metodológica/lexical: el texto principal debe conservar la imagen de ἀπεστράφησάν με como ''se apartaron de mí'', dejando ''me abandonaron'' y ''me desertaron'' en nota como alternativas.'
  issues:
  - severity: high
    issue: 'El texto principal traduce ἀπεστράφησάν με como ''me abandonaron'' en vez de preservar la imagen escogida por la auditoría: ''se apartaron de mí''.'
    rationale: El English POB documenta como elección principal 'turned away from me' y reserva 'deserted/abandoned' para nota. 'Me abandonaron' interpreta más que el original y no preserva la decisión léxica auditada.
  - severity: medium
    issue: '''Todos los de Asia'' es más coloquial y menos explícito que la estructura griega πάντες οἱ ἐν τῇ Ἀσίᾳ.'
    rationale: Aunque comprensible, 'todos los que están en Asia' o similar refleja mejor 'all those in Asia' y evita que 'los de Asia' suene demasiado resumido o sociológico.
  - severity: low
    issue: El pronombre 'Tú' no es necesario en español.
    rationale: '''Sabes esto'' suena más natural y mantiene el tono directo sin introducir un énfasis adicional no marcado en el griego.'
  revised_spanish_text: 'Sabes esto: todos los que están en Asia se apartaron de mí[a][b], entre quienes están Fígelo y Hermógenes.'
  revised_footnotes:
  - marker: a
    text: «Asia» aquí se refiere a la provincia romana del occidente de Asia Menor, no al continente moderno.
    reason: cultural_note
  - marker: b
    text: O «me desertaron» / «me abandonaron». El griego dice más literalmente que «se apartaron de mí».
    reason: lexical_alternative
  revision_rationale: Se revisa el verbo principal para seguir la decisión auditada y preservar la imagen del griego en el texto principal; se mejora además la naturalidad y precisión de la frase sobre Asia sin cambiar el sentido. Las notas se conservan con los mismos contenidos y anclajes pertinentes.
