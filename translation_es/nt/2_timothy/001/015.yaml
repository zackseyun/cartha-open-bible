translation:
  language: es
  text: 'Sabes esto: todos los que están en Asia se apartaron de mí[a][b], entre quienes están Fígelo y Hermógenes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Asia» aquí se refiere a la provincia romana del occidente de Asia Menor, no al continente moderno.
    reason: cultural_note
  - marker: b
    text: O «me desertaron» / «me abandonaron». El griego dice más literalmente que «se apartaron de mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἶδας
  english_pob_choice: You know
  chosen_spanish: Tú sabes
  alternatives_spanish:
  - Sabes
  - Tú conoces
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento ya poseído; en español, «Tú sabes» comunica con naturalidad la misma certeza directa y conserva el tono interpersonal del original.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - este hecho
  - esta cosa
  lexicon: BDAG
  rationale: El demostrativo introduce el contenido de la afirmación siguiente. «Esto» mantiene la brevedad y la estructura del griego sin añadir explicaciones.
- source_word: ἀπεστράφησάν με
  english_pob_choice: turned away from me
  chosen_spanish: me abandonaron
  alternatives_spanish:
  - se apartaron de mí
  - me volvieron la espalda
  - me desertaron
  lexicon: BDAG
  rationale: El griego dice literalmente «se apartaron / se volvieron de mí», pero en este contexto relacional la fuerza comunica rechazo y ruptura de lealtad. «Me abandonaron» captura bien el efecto en español natural; la alternativa literal queda anotada en la nota.
- source_word: πάντες οἱ ἐν τῇ Ἀσίᾳ
  english_pob_choice: all those in Asia
  chosen_spanish: todos los de Asia
  alternatives_spanish:
  - todos los que están en Asia
  - todos los de la provincia de Asia
  lexicon: BDAG
  rationale: La frase puede leerse de forma amplia, pero el contexto de la carta limita el alcance a los asociados del ámbito de Asia. «Todos los de Asia» conserva la amplitud retórica sin forzar una aclaración interpretativa en el cuerpo del texto.
- source_word: Ἀσίᾳ
  english_pob_choice: Asia
  chosen_spanish: Asia
  alternatives_spanish:
  - la provincia de Asia
  - Asia Menor
  lexicon: BDAG
  rationale: Se conserva «Asia» como transliteración convencional; la nota explica que se trata de la provincia romana en el occidente de Asia Menor, no del continente moderno.
- source_word: ὧν ἐστιν
  english_pob_choice: among whom are
  chosen_spanish: entre quienes están
  alternatives_spanish:
  - de entre los cuales están
  - entre los cuales se cuentan
  lexicon: BDAG
  rationale: La construcción relativa selecciona ejemplos dentro del grupo anterior. «Entre quienes están» reproduce bien el sentido partitivo y resulta idiomático en español.
- source_word: Φύγελος
  english_pob_choice: Phygelus
  chosen_spanish: Fígelo
  alternatives_spanish:
  - Figuelo
  - Fígelos
  lexicon: Transliteración tradicional onomástica
  rationale: Se translitera el nombre propio de manera estándar al español; «Fígelo» es la forma más natural en lectura eclesial en español, manteniendo la referencia al nombre griego.
- source_word: Ἑρμογένης
  english_pob_choice: Hermogenes
  chosen_spanish: Hermógenes
  alternatives_spanish:
  - Hermógenas
  lexicon: Transliteración tradicional onomástica
  rationale: Nombre propio transliterado de forma estable al español. Se mantiene la acentuación natural para lectura pública.
theological_decisions:
- issue: Alcance de «todos los de Asia»
  english_pob_reading: A contextual 'all' referring to Paul's associates or professing supporters in the province of Asia, not an absolute statement about every individual in the region.
  chosen_spanish_reading: 'Una afirmación amplia pero contextual: se refiere al grupo relacionado con Pablo en la provincia de Asia, no necesariamente a cada persona que vivía allí.'
  alternative_spanish_readings:
  - Una afirmación absoluta sobre toda la población de Asia
  - Una hipérbole sin precisión de alcance
  rationale: Se preserva la tensión del texto sin resolverla artificialmente. El español mantiene el alcance amplio de πάντες y deja que el contexto determine el grupo aludido, como en la lectura inglesa auditada.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto base mostró acuerdo alto y se mantuvo estable en la auditoría final.
  spanish_consistency_notes:
  - Se usa «Asia» para el topónimo y «Fígelo» / «Hermógenes» para los nombres propios, siguiendo transliteración estándar.
  - Se mantiene un registro sobrio y público, evitando un calco excesivo de la sintaxis griega.
  - La nota lexical distingue entre el valor literal de ἀποστρέφω y la fuerza contextual de rechazo/abandono en español.
