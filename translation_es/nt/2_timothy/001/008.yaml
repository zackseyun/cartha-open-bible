  text: Μὴ οὖν ἐπαισχυνθῇς τὸ μαρτύριον τοῦ κυρίου ἡμῶν μηδὲ ἐμὲ τὸν δέσμιον αὐτοῦ, ἀλλὰ συγκακοπάθησον τῷ εὐαγγελίῳ κατὰ δύναμιν θεοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/008.yaml
  text: Therefore[a], do not be ashamed of the testimony about our Lord, nor of me, his prisoner, but suffer hardship for the gospel according to the power of God[c][b],
  footnotes:
  - marker: a
    text: Or, 'the testimony of our Lord.' The Greek genitive could be read that way, but here it likely means the testimony about the Lord.
    reason: alternative_reading
  - marker: b
    text: Or, 'share in suffering for the gospel.' The Greek verb includes the idea of joining with others in suffering hardship.
    reason: lexical_alternative
  - marker: c
    text: Or, 'by the power of God.'
    reason: lexical_alternative
