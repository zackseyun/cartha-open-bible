translation:
  language: es
  text: Por tanto[a], no te avergüences del testimonio acerca de nuestro Señor, ni de mí, su prisionero; antes bien, sufre penalidades por el evangelio según el poder de Dios[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el testimonio de nuestro Señor». El genitivo griego puede leerse así, pero en este contexto probablemente significa el testimonio acerca del Señor.'
    reason: alternative_reading
  - marker: b
    text: 'O: «comparte sufrimientos por el evangelio». El verbo griego incluye la idea de unirse a otros en el sufrimiento y la adversidad.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «por el poder de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ οὖν
  english_pob_choice: Therefore, do not
  chosen_spanish: Por tanto, no
  alternatives_spanish:
  - Así que, no
  - Entonces, no
  lexicon: BDAG
  rationale: οὖν expresa inferencia lógica; «Por tanto» conserva la relación con el contexto anterior. La prohibición se mantiene con «no te avergüences», que reproduce el matiz exhortativo del aoristo subjuntivo.
- source_word: ἐπαισχυνθῇς
  english_pob_choice: be ashamed
  chosen_spanish: te avergüences
  alternatives_spanish:
  - te sonrojes
  - sientas vergüenza
  lexicon: BDAG
  rationale: El verbo indica quedar cubierto de vergüenza o retraerse por deshonra. «Avergonzarse» es natural en español y preserva la fuerza moral y social del mandato.
- source_word: τὸ μαρτύριον
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - el testimonio dado
  - la declaración
  lexicon: BDAG
  rationale: μαρτύριον se refiere al testimonio/witness relacionado con Cristo. «Testimonio» conserva el sustantivo y funciona bien en español bíblico contemporáneo.
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: about our Lord
  chosen_spanish: acerca de nuestro Señor
  alternatives_spanish:
  - de nuestro Señor
  - de parte de nuestro Señor
  lexicon: BDAG
  rationale: 'La relación genitiva es objetal: el testimonio trata sobre el Señor. «Acerca de» hace explícita esa relación y evita la ambigüedad de una lectura subjetiva.'
- source_word: μηδὲ ἐμὲ τὸν δέσμιον αὐτοῦ
  english_pob_choice: nor of me, his prisoner
  chosen_spanish: ni de mí, su esclavo
  alternatives_spanish:
  - ni de mí, su prisionero
  - ni de mí, el preso de él
  lexicon: BDAG
  rationale: 'Aunque δέσμιος puede referirse a un prisionero, en el marco de las decisiones POB sobre δοῦλος/dέσμιος y el valor relacional del genitivo, «su esclavo» comunica mejor la pertenencia y la condición de cautiverio al servicio de Cristo. Aun así, se registra la tensión: la opción más literal sería «prisionero»; aquí se favorece una formulación teológica que mantiene el sentido de posesión/relación del genitivo αὐτοῦ.'
- source_word: συγκακοπάθησον
  english_pob_choice: suffer hardship for
  chosen_spanish: sufre penalidades por
  alternatives_spanish:
  - comparte sufrimientos por
  - sufre dificultades por
  lexicon: BDAG
  rationale: El compuesto con συν- implica participar junto con otros en sufrimiento. «Sufre penalidades por» preserva la exhortación a soportar adversidad vinculada al evangelio sin expandir demasiado el sujeto implícito. «Penalidades» permite un registro digno y evita sonar demasiado coloquial.
- source_word: τῷ εὐαγγελίῳ
  english_pob_choice: the gospel
  chosen_spanish: el evangelio
  alternatives_spanish:
  - la buena noticia
  lexicon: BDAG
  rationale: εὐαγγέλιον se traduce de forma estable como «evangelio» en el registro eclesial latinoamericano, y es el equivalente más asentado en español bíblico.
- source_word: κατὰ δύναμιν θεοῦ
  english_pob_choice: according to the power of God
  chosen_spanish: según el poder de Dios
  alternatives_spanish:
  - de acuerdo con el poder de Dios
  - por el poder de Dios
  lexicon: BDAG
  rationale: κατά con acusativo expresa norma/medida/criterio. «Según» conserva esa amplitud semántica mejor que una causal o instrumentalización cerrada.
theological_decisions:
- issue: Relación semántica de τὸ μαρτύριον τοῦ κυρίου ἡμῶν
  english_pob_reading: 'objective genitive: ''the testimony about our Lord'''
  chosen_spanish_reading: «el testimonio acerca de nuestro Señor»
  alternative_spanish_readings:
  - «el testimonio de nuestro Señor»
  rationale: El contexto exhorta a no avergonzarse del testimonio cristiano centrado en Jesús, paralelo a no avergonzarse de Pablo por su vínculo con Cristo. La lectura objetiva es la más clara y mejor apoyada por el flujo del versículo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de δέσμιος con el genitivo αὐτοῦ
  english_pob_reading: retain possessive relation to the Lord rather than flatten to merely 'a prisoner for him'
  chosen_spanish_reading: «su esclavo»
  alternative_spanish_readings:
  - «su prisionero»
  - «el preso de él»
  rationale: En español, «su esclavo» conserva la relación de pertenencia y la carga de sometimiento que el contexto exige, sin ocultar la dimensión de cautiverio. Se reconoce que hay una tensión lexical, porque δέσμιος denota primariamente 'prisionero'; sin embargo, la traducción busca hacer visible la dependencia total de Pablo respecto del Señor, no solo su situación carcelaria.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de συγκακοπάθησον τῷ εὐαγγελίῳ
  english_pob_reading: share in suffering for the gospel
  chosen_spanish_reading: «sufre penalidades por el evangelio»
  alternative_spanish_readings:
  - «comparte sufrimientos por el evangelio»
  - «participa en padecer por el evangelio»
  rationale: El verbo compuesto invita a participar en el sufrimiento ligado al evangelio. «Sufre penalidades por el evangelio» mantiene la exhortación sin forzar una construcción demasiado perifrástica; además, refleja el sentido de sacrificio por causa del mensaje.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó la segunda mitad de la frase de 'with the gospel' a 'for the gospel' para reflejar mejor el valor de συγκακοπάθησον; la presente propuesta española adopta ese mismo sentido con «por el evangelio». Además, se mantuvo explícita la relación genitiva en «acerca de nuestro Señor», siguiendo la nota de lectura objetiva del texto griego.
  spanish_consistency_notes:
  - Se mantuvo «evangelio» como término estable para εὐαγγέλιον.
  - Se empleó «Dios» para θεοῦ sin mayúsculas reverenciales añadidas fuera de uso normal.
  - Se conservó la forma de respeto directo en segunda persona singular («te avergüences», «sufre»), adecuada al imperativo exhortativo.
  - Se evitó «SEÑOR» como máscara tipográfica; el nombre/título se expresa según la fuente y el contexto.
  - Se registró la tensión entre «prisionero» y la opción elegida para δέσμιος en las decisiones lexicoteológicas.
