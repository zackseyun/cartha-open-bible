translation:
  language: es
  text: Que el Señor le conceda encontrar misericordia del Señor en aquel día—y tú sabes mejor cuánto sirvió en Éfeso[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con el Señor»; la frase griega con παρά + genitivo puede expresar procedencia («de parte de») o presencia/relación («con»). Aquí se adopta la lectura principal de procedencia.
    reason: lexical_alternative
  - marker: b
    text: «Aquel día» suele aludir en el Nuevo Testamento al día venidero de juicio o vindicación divina.
    reason: cross_reference
  - marker: c
    text: O «todo lo que sirvió» / «cuánto servicio prestó». La expresión griega resume la amplitud de su servicio en Éfeso.
    reason: lexical_alternative
lexical_decisions:
- source_word: δῴη
  english_pob_choice: May ... grant
  chosen_spanish: Que ... le conceda
  alternatives_spanish:
  - Que ... le dé
  - Ojalá ... le conceda
  lexicon: BDAG
  rationale: El optativo aoristo expresa un deseo o una oración; en español, una construcción desiderativa con «Que» y subjuntivo transmite bien ese matiz benedictivo sin perder naturalidad.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - le a él
  lexicon: BDAG
  rationale: 'El dativo funciona como complemento indirecto. En español se expresa de forma natural con «le» en la petición: «le conceda».'
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Dios
  lexicon: BDAG
  rationale: Se conserva la equivalencia estándar de κύριος como «Señor», sin ocultar el término con una sustitución litúrgica distinta.
- source_word: εὑρεῖν ἔλεος
  english_pob_choice: to find mercy
  chosen_spanish: encontrar misericordia
  alternatives_spanish:
  - hallar misericordia
  - recibir misericordia
  lexicon: BDAG
  rationale: «Encontrar misericordia» preserva la imagen verbal del griego y es natural en español bíblico; «misericordia» corresponde a ἔλεος.
- source_word: παρὰ κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de parte del Señor
  - junto al Señor
  lexicon: BDAG
  rationale: παρά con genitivo suele indicar procedencia o fuente. «Del Señor» mantiene esa lectura principal en español, sin resolver la ambigüedad teológica del segundo κύριος.
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: BDAG
  rationale: La fórmula temporal se traduce de manera directa y solemne. «Aquel día» conserva el valor deíctico y la resonancia escatológica.
- source_word: ὅσα
  english_pob_choice: how much
  chosen_spanish: cuánto
  alternatives_spanish:
  - todo lo que
  - cuan grande
  lexicon: BDAG
  rationale: El neutro plural resume la extensión del servicio. «Cuánto» expresa la medida de forma natural en español y evita la literalidad pesada de «qué cosas».
- source_word: ἐν Ἐφέσῳ
  english_pob_choice: in Ephesus
  chosen_spanish: en Éfeso
  alternatives_spanish:
  - en la ciudad de Éfeso
  lexicon: BDAG
  rationale: Se conserva la ubicación geográfica de manera estándar y directa.
- source_word: διηκόνησεν
  english_pob_choice: he served
  chosen_spanish: sirvió
  alternatives_spanish:
  - ministró
  - prestó servicio
  lexicon: BDAG
  rationale: διακονέω aquí describe servicio práctico. «Sirvió» es más claro y menos eclesiástico que «ministró», sin perder el contenido verbal.
- source_word: βέλτιον σὺ γινώσκεις
  english_pob_choice: you know better
  chosen_spanish: tú sabes mejor
  alternatives_spanish:
  - tú lo sabes mejor
  - tú conoces mejor
  lexicon: BDAG
  rationale: El comparativo βέλτιον junto con γινώσκεις se vierte de modo idiomático. «Tú sabes mejor» conserva la comparación implícita sin añadir un objeto inexistente en el griego.
theological_decisions:
- issue: Referencia del doble κύριος
  english_pob_reading: Both occurrences are rendered simply as 'the Lord' without specifying whether the second refers distinctly to the Father or to the Son.
  chosen_spanish_reading: Ambas ocurrencias se traducen como «el Señor», sin especificar si la segunda se refiere al Padre, al Hijo o a una referencia compartida.
  alternative_spanish_readings:
  - el Señor ... de parte de Dios
  - el Señor ... del Señor Jesús
  rationale: El griego repite κύριος sin diferenciación explícita. La traducción conserva esa ambigüedad teológica en vez de resolverla con una identificación no exigida por el texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
- issue: Fuerza escatológica de «aquel día»
  english_pob_reading: Rendered as 'that day' without interpretive expansion.
  chosen_spanish_reading: Se mantiene «aquel día» sin ampliarlo a una explicación doctrinal.
  alternative_spanish_readings:
  - el día del juicio
  - el día final
  rationale: La expresión funciona como fórmula escatológica conocida, pero el griego mismo solo dice «en aquel día». Mantenerla evita sobreinterpretar.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: Se revisó el pasaje con base en el texto griego SBLGNT y el rastro auditado en inglés. No se detectaron cambios necesarios respecto del pase más reciente; se mantuvieron la ambigüedad de κύριος, la fuerza escatológica de «aquel día» y el valor resumido de ὅσα.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος, en coherencia con el resto del proyecto y con la lectura auditada.
  - Se usó «misericordia» para ἔλεος y no un equivalente más interpretativo.
  - «Sirvió» se prefirió a «ministró» para reflejar διακονέω con mayor claridad y menor carga confesional.
  - La puntuación con raya se conservó en espíritu mediante una pausa coordinada y una cadencia fluida en español.
