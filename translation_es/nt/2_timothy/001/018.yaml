source:
  edition: SBLGNT
  text: δῴη αὐτῷ ὁ κύριος εὑρεῖν ἔλεος παρὰ κυρίου ἐν ἐκείνῃ τῇ ἡμέρᾳ— καὶ ὅσα ἐν Ἐφέσῳ διηκόνησεν, βέλτιον σὺ γινώσκεις.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/018.yaml
  text: May the Lord grant him to find mercy from the Lord on that day—and you know better how much he served in Ephesus[a][b][c].
  footnotes:
  - marker: a
    text: Or 'with the Lord'; the phrase 'from the Lord' takes παρά κυρίου as indicating source, while some understand it as emphasizing presence before the Lord.
    reason: lexical_alternative
  - marker: b
    text: '''That day'' is a common New Testament way of referring to the coming day of divine judgment or vindication.'
    reason: cross_reference
  - marker: c
    text: Or 'all that he served' / 'what services he rendered.' The Greek expression summarizes the extent of his service in Ephesus.
    reason: lexical_alternative
