revisions:
- from: Que el Señor conceda misericordia a la casa de Onesíforo[a], porque muchas veces me reanimó y no se avergonzó de mi cadena.
  to: Que el Señor conceda misericordia al hogar de Onesíforo[a], porque muchas veces me reconfortó y no se avergonzó de mi cadena.
  rationale: Se ajusta «casa» a «hogar» para reflejar mejor οἶκος como unidad doméstica y se cambia «me reanimó» por «me reconfortó» para acercarse más al sentido de ἀνέψυξεν en español natural. La nota se conserva con formulación pulida. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
