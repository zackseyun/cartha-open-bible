translation:
  language: es
  text: Que el Señor conceda misericordia al hogar de Onesíforo[a], porque muchas veces me reconfortó y no se avergonzó de mi cadena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi prisión»; literalmente, «mi cadena».
    reason: lexical_alternative
lexical_decisions:
- source_word: δῴη
  english_pob_choice: May ... grant
  chosen_spanish: Que ... conceda
  alternatives_spanish:
  - Que ... dé
  - Que ... otorgue
  lexicon: BDAG
  rationale: El optativo aoristo expresa un deseo o súplica; en español, una construcción con 'Que' + subjuntivo transmite de modo natural ese valor volitivo sin volver el texto pesado o mecánico.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - clemencia
  lexicon: BDAG
  rationale: '''Misericordia'' es el equivalente más estable y digno para una petición de favor divino en español bíblico y conserva el matiz de benevolencia activa.'
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Jesús
  lexicon: BDAG
  rationale: Se mantiene 'el Señor' porque el griego usa ὁ κύριος sin identificación explícita. En español es la forma natural y reverente, sin resolver una identificación que el texto no resuelve.
- source_word: τῷ Ὀνησιφόρου οἴκῳ
  english_pob_choice: to the household of Onesiphorus
  chosen_spanish: a la casa de Onesíforo
  alternatives_spanish:
  - a la familia de Onesíforo
  - a la casa / hogar de Onesíforo
  lexicon: BDAG
  rationale: οἶκος puede referirse al grupo doméstico; 'casa' conserva esa extensión semítica/social en español y evita reducirlo solo al edificio. Se usa el nombre en forma hispanizada convencional.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Introduce la razón de la petición; 'porque' es la conexión causal más clara y natural en español contemporáneo.
- source_word: πολλάκις
  english_pob_choice: often
  chosen_spanish: muchas veces
  alternatives_spanish:
  - frecuentemente
  - a menudo
  lexicon: BDAG
  rationale: '''Muchas veces'' conserva la repetición reiterada del adverbio griego y suena natural en español, sin perder énfasis.'
- source_word: ἀνέψυξεν
  english_pob_choice: refreshed
  chosen_spanish: me reanimó
  alternatives_spanish:
  - me refrescó
  - me dio alivio
  lexicon: BDAG
  rationale: El verbo puede implicar alivio/renovación. En español, 'me reanimó' comunica bien el efecto personal de alivio y fortalecimiento, sin sonar extraño con un objeto humano concreto.
- source_word: τὴν ἅλυσίν μου
  english_pob_choice: my chain
  chosen_spanish: mi cadena
  alternatives_spanish:
  - mi cadena de prisión
  - mi prisión
  lexicon: BDAG
  rationale: El singular ἅλυσις se conserva con 'cadena' para mantener la imagen concreta. En español, 'cadena' comunica la metonimia de la prisión sin forzar una glosa en el texto principal.
- source_word: οὐκ ἐπαισχύνθη
  english_pob_choice: was not ashamed
  chosen_spanish: no se avergonzó
  alternatives_spanish:
  - no sintió vergüenza
  - no se avergonzó de
  lexicon: BDAG
  rationale: La forma idiomática en español es 'no se avergonzó de', que conserva el valor social/moral del verbo mejor que 'no estuvo avergonzado' o 'no se avergonzó' sin preposición.
theological_decisions:
- issue: Referent of 'the Lord' in the benediction
  english_pob_reading: Render generically as 'the Lord' without specifying further in translation.
  chosen_spanish_reading: Traducir genéricamente como 'el Señor' sin identificar si es el Padre o el Señor Jesús.
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Jesús
  rationale: El texto griego dice solo ὁ κύριος. La traducción preserva esa ambigüedad reverente y no introduce una identificación doctrinal que el versículo no explicita.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones posteriores; se mantiene el sentido básico del original griego con la misma tensión semántica en torno a ἅλυσις y al referente de ὁ κύριος.
  spanish_consistency_notes:
  - Se mantiene 'el Señor' para κύριος, coherente con el tratamiento reverente del título en esta serie, sin mascar el nombre divino donde el griego no lo explicita.
  - Se conserva la imagen concreta de 'cadena' para ἅλυσις en el texto principal y se aclara en nota la posible referencia metonímica a la prisión.
  - Se usa 'casa' para οἶκος porque en este contexto apunta al grupo doméstico, no solo al edificio.
  - El tono es de súplica benedictoria, por eso se prefirió 'Que ... conceda' con subjuntivo.
  - '''Me reanimó'' expresa el valor de ἀναψύχω sin sobrecargar el texto con una paráfrasis interpretativa.'
