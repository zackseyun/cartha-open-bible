translation:
  language: es
  text: anhelando verte[a], recordando tus lágrimas, para que me llene de alegría,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «deseando verte intensamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιποθῶν
  english_pob_choice: longing
  chosen_spanish: anhelando
  alternatives_spanish:
  - deseando intensamente
  - sintiendo gran anhelo
  lexicon: BDAG
  rationale: El participio presente expresa un deseo intenso y personal. «Anhelando» comunica bien esa fuerza afectiva en español sin volverse rígido ni demasiado interpretativo.
- source_word: σε ἰδεῖν
  english_pob_choice: to see you
  chosen_spanish: verte
  alternatives_spanish:
  - verte
  - contemplarte
  lexicon: BDAG
  rationale: La construcción complementaria se expresa de manera directa y natural con un infinitivo en español. «Verte» conserva la relación inmediata entre el anhelo y el objeto de la acción.
- source_word: μεμνημένος
  english_pob_choice: remembering
  chosen_spanish: recordando
  alternatives_spanish:
  - acordándome
  - teniendo presente
  lexicon: BDAG
  rationale: El participio perfecto medio/pasivo de μιμνῄσκομαι denota un estado de memoria continua. «Recordando» fluye bien en español y mantiene la idea de una memoria activa en curso.
- source_word: σου τῶν δακρύων
  english_pob_choice: your tears
  chosen_spanish: tus lágrimas
  alternatives_spanish:
  - tu llanto
  - tus lágrimas derramadas
  lexicon: BDAG
  rationale: La construcción posesiva se refiere de forma directa a las lágrimas de Timoteo. «Tus lágrimas» es la correspondencia más inmediata y no fuerza la lectura hacia «llanto», que sería más interpretativa.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: La cláusula introduce propósito o resultado. «Para que» es la forma más natural en español y conserva bien la relación sintáctica.
- source_word: χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: de alegría
  alternatives_spanish:
  - con gozo
  - rebosante de alegría
  lexicon: BDAG
  rationale: Con πληρόω, el genitivo se expresa en español como el contenido de la plenitud. «De alegría» evita una traducción mecánica y mantiene la imagen de estar lleno de esa emoción.
- source_word: πληρωθῶ
  english_pob_choice: I may be filled
  chosen_spanish: sea lleno
  alternatives_spanish:
  - me llene
  - sea colmado
  lexicon: BDAG
  rationale: El aoristo pasivo subjuntivo tras ἵνα pide una forma equivalente en español. «Sea lleno» conserva la pasividad y la idea de plenitud sin añadir matices ajenos.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego: participios de deseo y memoria, cláusula final con ἵνα y pasivo de πληρόω. Se conserva la intensidad emocional de «longing» como «anhelando» y la imagen de plenitud con «sea lleno de alegría».'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - Se evita «Cristo»/«Mesías» porque no aparece en el versículo.
  - La puntuación refleja una sola cláusula continua, como en el griego, con comas que separan los participios.
