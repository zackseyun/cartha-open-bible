    text: Or 'in faithfulness and love.' The Greek word for 'faith' can also carry the sense 'faithfulness' or 'trust.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the sound words that you heard from me concerning faith and love in Messiah Jesus.' The Greek construction may be taken to describe either Timothy's manner of holding the pattern or the content of the words.
    reason: alternative_reading
  - marker: c
    text: 'Traditional rendering: ''Christ Jesus.'''
    reason: lexical_alternative
