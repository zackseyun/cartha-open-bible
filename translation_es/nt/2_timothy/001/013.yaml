translation:
  language: es
  text: Mantén el patrón de las palabras saludables que has oído de mí[a][b], en la fe y el amor que están en Mesías Jesús[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En la fe» también puede entenderse como «en fidelidad». La palabra griega para «fe» también puede tener el sentido de «fidelidad» o «confianza».
    reason: lexical_alternative
  - marker: b
    text: 'O bien: «las palabras saludables que has oído de mí acerca de la fe y el amor que están en Mesías Jesús». La construcción griega puede entenderse como descripción de la manera en que Timoteo debe mantener el patrón, o del contenido de las palabras.'
    reason: alternative_reading
  - marker: c
    text: 'Forma tradicional: «Cristo Jesús».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποτύπωσιν
  english_pob_choice: pattern
  chosen_spanish: modelo
  alternatives_spanish:
  - patrón
  - ejemplo
  - molde
  lexicon: BDAG
  rationale: ὑποτύπωσις designa una forma normativa o modelo a seguir. En español, «modelo» conserva bien la idea de una forma ejemplar y guía, con un matiz natural y claro; «patrón» también sería posible, pero puede sonar más técnico o menos fluido en este contexto.
- source_word: ἔχε
  english_pob_choice: Hold to
  chosen_spanish: Mantén
  alternatives_spanish:
  - Ten
  - Sostén
  - Aférrate a
  lexicon: BDAG
  rationale: El imperativo pide retener o adherirse al modelo recibido. «Mantén» expresa con naturalidad la idea de conservar y seguir, sin añadir una fuerza excesiva que no exige el griego.
- source_word: ὑγιαινόντων λόγων
  english_pob_choice: sound words
  chosen_spanish: las palabras sanas
  alternatives_spanish:
  - las palabras saludables
  - la sana enseñanza
  - las palabras íntegras
  lexicon: BDAG
  rationale: ὑγιαίνω en sentido figurado aplica a enseñanza o palabras «sanas», «íntegras», no enfermas. «Palabras sanas» sigue de cerca la metáfora y mantiene el paralelo lexical con el griego mejor que «enseñanza», que sería más interpretativa.
- source_word: ὧν παρ’ ἐμοῦ ἤκουσας
  english_pob_choice: that you heard from me
  chosen_spanish: que has oído de mí
  alternatives_spanish:
  - que oíste de mí
  - las que has oído de mí
  lexicon: BDAG
  rationale: 'παρά con genitivo indica fuente: «de mí». El relativo se adapta naturalmente en español como «que has oído de mí», preservando el origen apostólico del contenido.'
- source_word: ἐν πίστει
  english_pob_choice: in faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - con fe
  - en fidelidad
  - con confianza
  lexicon: BDAG
  rationale: La revisión inglesa añadió el artículo para reflejar el griego y la construcción preposicional. «En la fe» respeta la forma del texto y puede leerse como esfera o modo de perseverar en el modelo, sin cerrar indebidamente la ambigüedad semántica de πίστις.
- source_word: καὶ ἀγάπῃ
  english_pob_choice: and love
  chosen_spanish: y el amor
  alternatives_spanish:
  - y amor
  - y la caridad
  lexicon: BDAG
  rationale: ἀγάπη se traduce de manera directa como «amor»; el artículo definido en español ayuda a coordinar la serie con «la fe» y refleja la concreción del sintagma griego.
- source_word: τῇ ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: that are in Messiah Jesus
  chosen_spanish: que están en Mesías Jesús
  alternatives_spanish:
  - que están en Cristo Jesús
  - las que están en Mesías Jesús
  lexicon: BDAG
  rationale: El artículo griego modifica conjuntamente «la fe y el amor». En español, «que están en Mesías Jesús» reproduce esa relación y conserva la decisión del POB de traducir Χριστός como «Mesías» cuando funciona como título.
- source_word: Χριστῷ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  lexicon: BDAG
  rationale: Χριστός se conserva como título con «Mesías», conforme a la pauta del proyecto. En este contexto no hay necesidad de pasar a la forma tradicional «Cristo», ya que la referencia titular sigue siendo clara en español.
theological_decisions:
- issue: Alcance de ἐν πίστει καὶ ἀγάπῃ τῇ ἐν Χριστῷ Ἰησοῦ
  english_pob_reading: The phrase modifies Timothy's holding to the pattern, expressing the sphere/manner characterized by faith and love rooted in Messiah Jesus.
  chosen_spanish_reading: 'La frase modifica el mandato de mantener el modelo: se debe conservar ese patrón en la fe y el amor que están en Mesías Jesús.'
  alternative_spanish_readings:
  - 'La frase califica las palabras sanas mismas: las palabras que tratan de la fe y el amor en Mesías Jesús.'
  rationale: La sintaxis griega admite más de una conexión. La lectura principal sigue el flujo exhortativo y evita resolver demasiado la ambigüedad. La alternativa se deja abierta porque el texto puede entenderse también como descripción del contenido de las palabras.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Traducción de Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Cuando Χριστός funciona como título, el POB español debe preservar «Mesías» para no ocultar el valor titular y para mantener coherencia terminológica con la política del proyecto. La forma tradicional se mantiene como alternativa solo si el contexto la exigiera claramente.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías (where title; Cristo where name-like)'
translation_notes:
  revision_awareness: Se tomó como base la revisión más reciente del audit trail, que añadió el artículo antes de «fe» por reflejar mejor el griego; esa decisión se incorporó en «en la fe». También se mantuvo la preferencia del POB por «Mesías» para Χριστός.
  spanish_consistency_notes:
  - Se mantuvo el imperativo directo y breve, acorde con el tono exhortativo del versículo.
  - Se conservó la metáfora de palabras «sanas» para no sustituirla por un equivalente más explicativo.
  - «Mesías Jesús» sigue el estándar del proyecto para Χριστός en función titular.
  - La puntuación refleja que la segunda cláusula puede leerse como modificadora del mandato principal, sin eliminar la ambigüedad señalada en el audit trail.
