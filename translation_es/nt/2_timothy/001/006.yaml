translation:
  language: es
  text: Por esta razón te recuerdo que reavives el don de Dios que está en ti por la imposición de mis manos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «avives hasta convertirlo en llama». El verbo griego evoca reanimar un fuego para que vuelva a arder con plena fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ ἣν αἰτίαν
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por lo cual
  - Por ese motivo
  lexicon: BDAG
  rationale: La expresión causal es idiomática; «Por esta razón» conserva con naturalidad la relación lógica del griego sin volverse literalista.
- source_word: ἀναμιμνῄσκω
  english_pob_choice: I remind
  chosen_spanish: te recuerdo
  alternatives_spanish:
  - te hago recordar
  - te amonesto recordándote
  lexicon: BDAG
  rationale: El presente indicativo con objeto e infinitivo se expresa de manera natural en español con «te recuerdo», manteniendo el valor de exhortación implícita.
- source_word: ἀναζωπυρεῖν
  english_pob_choice: rekindle
  chosen_spanish: avives
  alternatives_spanish:
  - reavives
  - enciendas de nuevo
  - abanes para reavivar
  lexicon: BDAG
  rationale: El verbo griego evoca reanimar una llama; «avives» comunica bien esa imagen en español y permite mantener el matiz de reanimación del fuego. En el texto principal no se sobreexplicita la metáfora.
- source_word: τὸ χάρισμα τοῦ θεοῦ
  english_pob_choice: the gift of God
  chosen_spanish: el don de Dios
  alternatives_spanish:
  - el regalo de Dios
  - el don que viene de Dios
  - el don gracioso de Dios
  lexicon: BDAG
  rationale: «χάρισμα» puede traducirse como «don» en un registro bíblico natural y fiel; «don de Dios» conserva la fuerza del término sin imponer una especificación no presente en el verso.
- source_word: ὅ ἐστιν ἐν σοὶ
  english_pob_choice: that is in you
  chosen_spanish: que está en ti
  alternatives_spanish:
  - que vive en ti
  - que permanece en ti
  lexicon: BDAG
  rationale: La relativa identificadora se vierte de forma directa y clara. «Está en ti» refleja la localización actual del don.
- source_word: διὰ τῆς ἐπιθέσεως τῶν χειρῶν μου
  english_pob_choice: through the laying on of my hands
  chosen_spanish: por la imposición de mis manos
  alternatives_spanish:
  - mediante la imposición de mis manos
  - a través de la imposición de mis manos
  lexicon: BDAG
  rationale: «ἐπιθέσις τῶν χειρῶν» es el giro establecido para el rito de imponer las manos; «por» comunica la instrumentalidad de διά con genitivo en español natural. Se prefiere «imposición» por ser el equivalente más asentado y transparente en español bíblico.
theological_decisions:
- issue: Relación entre el don y la imposición de manos de Pablo
  english_pob_reading: through the laying on of my hands
  chosen_spanish_reading: por la imposición de mis manos
  alternative_spanish_readings:
  - mediante la imposición de mis manos
  - a través de la imposición de mis manos
  rationale: 'La redacción conserva la mediación expresada por el verso sin desarrollar una teología sacramental que el texto no explicita. Se mantiene la tensión: el don está en Timoteo y, a la vez, se lo vincula con la imposición de manos de Pablo.'
  doctrine_reference: Preservar la tensión teológica del texto, sin resolverla más allá de su alcance inmediato.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto griego y el auditorio inglés de la POB, conservando la imagen de fuego en ἀναζωπυρεῖν y la mediación de la imposición de manos sin añadir glosas interpretativas al cuerpo principal.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se traduce χάρισμα como «don», no como «don espiritual», porque el adjetivo no está explicitado en el griego.
  - Se mantiene «imposición de manos» como término bíblico estable y comprensible en español.
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
