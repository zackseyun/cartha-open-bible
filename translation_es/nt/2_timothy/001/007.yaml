translation:
  language: es
  text: Pues Dios no nos dio un espíritu de cobardía[a], sino de poder, de amor y de dominio propio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «timidez» o «temor»; el término griego tiene el sentido de cobardía más que de miedo ordinario.
    reason: lexical_alternative
  - marker: b
    text: O «juicio sano» o «disciplina» para «dominio propio».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ
  english_pob_choice: For ... not
  chosen_spanish: Pues ... no
  alternatives_spanish:
  - Porque ... no
  - Ya que ... no
  lexicon: BDAG
  rationale: γάρ introduce la explicación y el enlace argumental con el contexto previo; en español, «Pues» conserva bien ese valor explicativo sin sonar mecánico. La negación de οὐ queda en «no».
- source_word: ἔδωκεν
  english_pob_choice: did not give
  chosen_spanish: no nos ha dado
  alternatives_spanish:
  - no nos dio
  - no nos dio ni ha dado
  lexicon: BDAG
  rationale: El aoristo se puede ver como pasado simple, pero en español «no nos ha dado» transmite con naturalidad el resultado vigente del acto divino. Mantiene el sentido de acción completada sin perder actualidad.
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: 'El dativo de destinatario se expresa de forma natural en español con clítico de objeto indirecto: «nos».'
- source_word: πνεῦμα
  english_pob_choice: a spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - espíritu
  - el Espíritu
  lexicon: BDAG
  rationale: Aquí el griego no obliga a identificarlo directamente con el Espíritu Santo; por eso se conserva el valor cualitativo de «un espíritu», como disposición o impulso interior dado por Dios. Se evita sobrerresolver la referencia.
- source_word: δειλίας
  english_pob_choice: cowardice
  chosen_spanish: cobardía
  alternatives_spanish:
  - timidez
  - temor
  - miedo
  lexicon: BDAG
  rationale: δειλία tiene una fuerza negativa más fuerte que el temor ordinario. «Cobardía» reproduce mejor esa carga moral que «miedo» o «timidez».
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  lexicon: BDAG
  rationale: Después de una negación, «sino» expresa mejor el contraste exclusivo del griego ἀλλά que un simple «pero».
- source_word: δυνάμεως
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - capacidad
  lexicon: BDAG
  rationale: «Poder» es la equivalencia más directa y digna en esta tríada, y funciona naturalmente junto con «amor» y «dominio propio».
- source_word: ἀγάπης
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: Se conserva el sentido estándar de ἀγάπη como «amor», sin arcaísmos ni tecnicismos innecesarios.
- source_word: σωφρονισμοῦ
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autocontrol
  - sobriedad de juicio
  - disciplina
  lexicon: BDAG
  rationale: σωφρονισμός abarca cordura sobria, autodisciplina y control de sí. «Dominio propio» comunica bien esa mezcla en español bíblico moderno. Se evita reducirlo solo a conducta o solo a juicio mental.
theological_decisions:
- issue: Naturaleza de πνεῦμα en este versículo
  english_pob_reading: a spirit/disposition given by God, not a direct title for the Holy Spirit
  chosen_spanish_reading: un espíritu o disposición que Dios da, sin identificarlo explícitamente como el Espíritu Santo
  alternative_spanish_readings:
  - el Espíritu
  - el Espíritu Santo
  rationale: La sintaxis griega con πνεῦμα anartro y los genitivos calificativos favorece leer una disposición o cualidad dada por Dios. La traducción mantiene esa tensión y no la resuelve con una identificación explícita que el contexto inmediato no exige.
  doctrine_reference: Primacía del texto original; no sobrerdefinir el referente cuando la gramática permite más de una lectura
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT y la decisión auditada en inglés de mantener πνεῦμα como una disposición/espíritu dado por Dios, no como una referencia explícita al Espíritu Santo. También conserva la fuerte oposición de ἀλλά y el valor semántico robusto de δειλία y σωφρονισμός.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; aquí no aparece el tetragrámaton.
  - «Mesías/Cristo» no aplica en este versículo.
  - Se prefirió «cobardía» para δειλία por la fuerza negativa documentada.
  - Se prefirió «dominio propio» para σωφρονισμός, con nota alternativa para preservar la gama semántica.
  - La puntuación y el orden español siguen la sintaxis natural sin añadir contenido doctrinal ajeno al texto.
