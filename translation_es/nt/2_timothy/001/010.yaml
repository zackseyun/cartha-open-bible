id: 2TI.1.10
reference: 2 Timothy 1:10
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: φανερωθεῖσαν δὲ νῦν διὰ τῆς ἐπιφανείας τοῦ σωτῆρος ἡμῶν ⸂Ἰησοῦ Χριστοῦ⸃, καταργήσαντος μὲν τὸν θάνατον φωτίσαντος δὲ ζωὴν καὶ ἀφθαρσίαν διὰ τοῦ εὐαγγελίου,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/010.yaml
  text: but has now been revealed through the appearing of our Savior Jesus Messiah[a], who indeed abolished death and brought life and incorruptibility to light through the gospel[b],
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek Χριστός can function as a title ('Messiah') or as a name-like designation ('Christ').
    reason: alternative_reading
  - marker: b
    text: Or 'immortality.' The Greek term emphasizes imperishability or freedom from corruption.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: a8f3503ae6463a3b3d6e8b215fc294edf4b2342a9c81c4ddeb6cd81cbf14eba3
    timestamp: '2026-04-18T10:34:44Z'
    output_hash: ef9d77b73ed9bd30105d3a452ed7ee64f7caa04856bb95edd0c94803efdfdc65
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:38:22Z'
    unchanged: false
    changes_summary: 'Changed “Jesus the Messiah” to “Jesus Christ” to reflect the Greek text and maintain formal register and consistency; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: pero ahora ha sido revelado por medio de la manifestación de nuestro Salvador Jesús Mesías[a], quien abolió la muerte y sacó a la luz la vida y la incorrupción por medio del evangelio[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesús Cristo». Χριστός puede funcionar como título («Mesías») o como designación fija semejante a un nombre propio.
    reason: alternative_reading
  - marker: b
    text: O «inmortalidad». El término griego subraya la cualidad de no sufrir corrupción o deterioro.
    reason: lexical_alternative
lexical_decisions:
- source_word: φανερωθεῖσαν
  english_pob_choice: has now been revealed
  chosen_spanish: ha sido revelado
  alternatives_spanish:
  - ha sido manifestado
  - ha sido dado a conocer
  lexicon: BDAG
  rationale: El participio pasivo aoristo exige en español una construcción pasiva o resultativa natural; «ha sido revelado» conserva la pasividad y el sentido de algo hecho patente ahora, sin el tono más arcaico de «manifestado».
- source_word: ἐπιφανείας
  english_pob_choice: appearing
  chosen_spanish: aparición
  alternatives_spanish:
  - manifestación
  - epifanía
  lexicon: BDAG
  rationale: En este contexto cristológico, «aparición» transmite bien la venida visible e ისტორica de Cristo y es más natural en español actual que «epifanía», que suena más técnico o transliterado.
- source_word: σωτῆρος
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - Libertador
  lexicon: BDAG
  rationale: «Salvador» es el equivalente cristológico establecido y conserva el valor titular de σωτήρ sin forzar una paráfrasis.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός como «Mesías», coherente con la pauta doctrinal del proyecto de traducir títulos cuando funcionan como título y no como simple forma nominalizada.
- source_word: καταργήσαντος
  english_pob_choice: abolished
  chosen_spanish: abolió
  alternatives_spanish:
  - anuló
  - dejó sin efecto
  - destruyó
  lexicon: BDAG
  rationale: «Abolió» expresa la derrota decisiva de la muerte con fuerza suficiente, sin ir más allá del alcance léxico hacia una aniquilación absoluta que el contexto no exige.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: BDAG
  rationale: Se conserva el sustantivo común con artículo por la sintaxis española, manteniendo la personificación implícita del texto.
- source_word: φωτίσαντος
  english_pob_choice: brought ... to light
  chosen_spanish: sacó a la luz
  alternatives_spanish:
  - iluminó
  - dio a conocer
  lexicon: BDAG
  rationale: La locución «sacó a la luz» reproduce de forma idiomática la imagen de revelar públicamente aquello que antes estaba oculto.
- source_word: ζωὴν
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  lexicon: BDAG
  rationale: Traducción directa y sobria; no se amplía el alcance del término más allá del texto.
- source_word: ἀφθαρσίαν
  english_pob_choice: incorruptibility
  chosen_spanish: la incorrupción
  alternatives_spanish:
  - la inmortalidad
  - la imperishabilidad
  lexicon: BDAG
  rationale: «Incorrupción» preserva mejor la idea de ausencia de deterioro/corrupción que «inmortalidad», que puede estrechar el sentido hacia mera duración indefinida. Se mantiene la tensión léxica documentada por el POB inglés.
- source_word: διὰ τοῦ εὐαγγελίου
  english_pob_choice: through the gospel
  chosen_spanish: por medio del evangelio
  alternatives_spanish:
  - a través del evangelio
  - mediante el evangelio
  lexicon: BDAG
  rationale: «Por medio de» expresa bien la función instrumental de διά con el genitivo y suena natural y reverente en español bíblico contemporáneo.
- source_word: μὲν ... δὲ
  english_pob_choice: indeed ... and
  chosen_spanish: sí ... y
  alternatives_spanish:
  - por una parte ... y por otra
  - ciertamente ... y
  lexicon: BDAG
  rationale: La correlación contrastiva se vierte de manera sobria con «sí ... y», que mantiene el énfasis del contraste sin volver rígida la frase en español.
theological_decisions:
- issue: Renderización de Χριστός en Ἰησοῦ Χριστοῦ
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: 'Se conserva la traducción titular de Χριστός como «Mesías», siguiendo la política del proyecto y el análisis del griego: aquí el título sigue siendo semánticamente activo dentro de la designación de nuestro Salvador.'
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres / tratamiento de Χριστός'
- issue: Fuerza de καταργήσαντος respecto de la muerte
  english_pob_reading: abolished death
  chosen_spanish_reading: abolió la muerte
  alternative_spanish_readings:
  - anuló la muerte
  - destruyó la muerte
  rationale: «Abolió» preserva la afirmación fuerte de victoria sobre la muerte sin resolver indebidamente el alcance escatológico del verbo; evita tanto suavizar como exagerar el término.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica'
- issue: Valor de ἀφθαρσίαν
  english_pob_reading: incorruptibility
  chosen_spanish_reading: incorrupción
  alternative_spanish_readings:
  - inmortalidad
  - imperishabilidad
  rationale: La opción mantiene la fuerza semántica de ausencia de corrupción o deterioro. Se evita «inmortalidad» como equivalente principal porque puede reducir el matiz del griego, aunque sigue siendo una alternativa legítima para lectores.
  doctrine_reference: 'DOCTRINE.md: consistencia de términos clave con excepción documentada'
translation_notes:
  revision_awareness: El texto español sigue la última lectura revisada que restituye «Mesías» para Χριστός, en consonancia con la pauta doctrinal del proyecto y con el audit trail que corrige la oscilación previa hacia «Cristo». También conserva la alternativa léxica para ἀφθαρσίαν documentada en el inglés POB.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda; este versículo no contiene el tetragrámaton.
  - «evangelio» se conserva como término técnico estable del corpus.
  - La puntuación y el orden reflejan la sintaxis griega sin calco excesivo en español.
  - Se evita usar «Cristo» como forma principal en la frase Ἰησοῦ Χριστοῦ, dado el tratamiento titular de Χριστός en este contexto.
