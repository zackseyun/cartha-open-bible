translation:
  language: es
  text: Guarda el buen depósito[a] por medio del Espíritu Santo que habita en nosotros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el noble depósito» o «lo que te ha sido confiado».
    reason: lexical_alternative
  - marker: b
    text: O «por el Espíritu Santo que vive en nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: παραθήκην
  english_pob_choice: deposit
  chosen_spanish: depósito
  alternatives_spanish:
  - encargo confiado
  - lo que te ha sido confiado
  lexicon: BDAG
  rationale: παραθήκη designa algo puesto en custodia. «Depósito» mantiene bien la metáfora de un bien confiado para guardarse, de modo cercano al inglés POB y natural en español bíblico actual.
- source_word: καλὴν
  english_pob_choice: good
  chosen_spanish: buen
  alternatives_spanish:
  - noble
  - precioso
  - hermoso
  lexicon: BDAG
  rationale: Aquí καλός califica la calidad intrínseca del depósito. En español, «buen» reproduce con sobriedad esa valoración sin cargar el texto con matices no necesarios en el enunciado principal.
- source_word: φύλαξον
  english_pob_choice: Guard
  chosen_spanish: Guarda
  alternatives_spanish:
  - cuida
  - protege
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción vigilante de resguardo. «Guarda» conserva el sentido de proteger activamente algo confiado, de manera idiomática en español.
- source_word: διὰ πνεύματος ἁγίου
  english_pob_choice: through the Holy Spirit
  chosen_spanish: por medio del Espíritu Santo
  alternatives_spanish:
  - por el Espíritu Santo
  - mediante el Espíritu Santo
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o agencia. «Por medio de» conserva ese valor instrumental de forma clara en español, sin perder la referencia personal al Espíritu Santo.
- source_word: τοῦ ἐνοικοῦντος ἐν ἡμῖν
  english_pob_choice: who dwells in us
  chosen_spanish: que habita en nosotros
  alternatives_spanish:
  - que vive en nosotros
  - que mora en nosotros
  lexicon: BDAG
  rationale: El participio presente subraya una residencia continua. «Habita» es natural en español y preserva la idea de permanencia sin introducir tecnicismos como «inhabita» o «indwelling».
- source_word: ἐν ἡμῖν
  english_pob_choice: in us
  chosen_spanish: en nosotros
  alternatives_spanish:
  - entre nosotros
  lexicon: BDAG
  rationale: La preposición indica presencia interna de manera directa. «En nosotros» mantiene el sentido más inmediato y evita forzar una lectura meramente corporativa.
theological_decisions:
- issue: Alcance de «el buen depósito»
  english_pob_reading: The phrase is left general as 'the good deposit' rather than specifying 'the gospel' or 'your ministry.'
  chosen_spanish_reading: Se conserva como «el buen depósito», sin explicitar en el texto principal si se trata del evangelio, del encargo ministerial o de ambas cosas.
  alternative_spanish_readings:
  - el evangelio confiado a Timoteo
  - tu comisión ministerial
  rationale: El contexto sugiere un encargo apostólico vinculado al evangelio, pero la expresión griega es compacta y metafórica. La versión española mantiene esa reserva interpretativa.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla de antemano.
- issue: Alcance de «nosotros» en la presencia del Espíritu
  english_pob_reading: Rendered as 'us' without narrowing to either Paul-and-Timothy specifically or all believers universally.
  chosen_spanish_reading: Se deja «nosotros» sin restringirlo al dúo Pablo-Timoteo ni ampliarlo explícitamente a todos los creyentes.
  alternative_spanish_readings:
  - en nosotros, los creyentes en general
  - en nosotros, Pablo y Timoteo específicamente
  rationale: ἡμῖν puede oírse como la comunidad cristiana inmediata representada por Pablo y Timoteo, con implicación eclesial más amplia. La traducción no fuerza una conclusión teológica estrecha.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: El cotejo más reciente indicó alta concordancia y no requirió cambios; esta propuesta sigue ese estado sin introducir revisiones nuevas.
  spanish_consistency_notes:
  - Se mantiene «Espíritu Santo» con mayúsculas por tratarse del Espíritu personal.
  - Se usa «depósito» para preservar el valor metafórico y la continuidad con el audit trail inglés.
  - «Habita en nosotros» conserva el presente durativo del participio griego.
  - No se ha resuelto interpretativamente el referente de «el buen depósito» en el texto principal.
