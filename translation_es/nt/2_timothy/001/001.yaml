  glossary_alignment: 'Alineación general buena con la terminología del proyecto: ''Mesías'' para Χριστός, ''Jesús'' para Ἰησοῦς, ''Dios'' para θεοῦ, ''apóstol'' para ἀπόστολος. La excepción relevante es de estilo español: para que ''Mesías'' funcione idiomáticamente como título traducido en español, conviene ''el Mesías Jesús'' en vez de ''Mesías Jesús''. La nota con ''Cristo Jesús'' como alternativa sigue siendo apropiada.'
  issues:
