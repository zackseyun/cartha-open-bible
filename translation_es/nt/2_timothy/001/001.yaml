translation:
  language: es
  text: Pablo[a], apóstol del Mesías Jesús por la voluntad de Dios, conforme a la promesa de la vida que está en el Mesías Jesús,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Cristo Jesús» en ambas ocurrencias de «el Mesías Jesús».
    reason: alternative_reading
lexical_decisions:
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Paulo
  lexicon: BDAG
  rationale: Nombre propio estándar en español para Παῦλος; conserva la identificación personal sin añadir matiz interpretativo.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - mensajero
  - delegado
  lexicon: BDAG
  rationale: En la autodesignación paulina, el término técnico debe mantenerse; 'apóstol' preserva la función y el peso eclesial del cargo.
- source_word: Χριστοῦ Ἰησοῦ / Χριστῷ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός como 'Mesías', de acuerdo con la preferencia doctrinal del proyecto y el audit trail inglés. En español, 'Mesías Jesús' mantiene esa lectura más directamente que 'Cristo Jesús'.
- source_word: διὰ θελήματος θεοῦ
  english_pob_choice: by the will of God
  chosen_spanish: por la voluntad de Dios
  alternatives_spanish:
  - mediante la voluntad de Dios
  - a causa de la voluntad de Dios
  lexicon: BDAG
  rationale: διά con genitivo expresa agencia/autoridad en esta fórmula de comisión; 'por la voluntad de Dios' suena natural en español y preserva la relación causal/autorizadora.
- source_word: κατ’ ἐπαγγελίαν
  english_pob_choice: according to the promise
  chosen_spanish: conforme a la promesa
  alternatives_spanish:
  - según la promesa
  - de acuerdo con la promesa
  lexicon: BDAG
  rationale: κατά con acusativo marca correspondencia; 'conforme a' es fiel y sobrio en español bíblico contemporáneo.
- source_word: ζωῆς
  english_pob_choice: the life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  lexicon: BDAG
  rationale: Se mantiene el artículo por claridad y porque la expresión apunta a una vida específica, no a la vida en general.
- source_word: τῆς ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: that is in Messiah Jesus
  chosen_spanish: que está en Mesías Jesús
  alternatives_spanish:
  - que es en Mesías Jesús
  - en Mesías Jesús
  lexicon: BDAG
  rationale: El artículo con la frase preposicional funciona de manera atributiva; 'que está en' expresa la localización/ubicación relacional de la vida en unión con Cristo sin volverla demasiado explicativa.
theological_decisions:
- issue: Traducción de Χριστός como título mesiánico
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La guía doctrinal del proyecto indica traducir Χριστός como 'Mesías' cuando actúa como título. Aquí ocurre en ambas apariciones y la lectura titular sigue siendo transparente en español.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Relación entre la promesa y la vida
  english_pob_reading: according to the promise of the life that is in Messiah Jesus
  chosen_spanish_reading: conforme a la promesa de la vida que está en Mesías Jesús
  alternative_spanish_readings:
  - según la promesa de la vida en Mesías Jesús
  - conforme a la promesa de la vida que existe en Mesías Jesús
  rationale: La frase conserva la promesa como marco normativo de la vocación apostólica y evita diluir el matiz relacional de la vida 'en' Cristo/Mesías.
  doctrine_reference: BDAG / sintaxis atributiva de τῆς ἐν Χριστῷ Ἰησοῦ
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre 'Messiah Jesus' y 'Christ Jesus', con restauración final de 'Messiah Jesus' por fidelidad doctrinal. Por eso el español sigue la decisión final del paquete fuente y no la forma más habitual eclesiástica.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός, coherente con la política del proyecto, evitando la sustitución automática por 'Cristo'.
  - '''Pablo'' conserva el nombre propio estándar en español sin perder la correspondencia con Παῦλος.'
  - La puntuación final incluye coma para reflejar el carácter de encabezamiento/salutación del verso en la cadena textual.
