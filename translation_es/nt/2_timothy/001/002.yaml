  text: Τιμοθέῳ ἀγαπητῷ τέκνῳ· χάρις, ἔλεος, εἰρήνη ἀπὸ θεοῦ πατρὸς καὶ Χριστοῦ Ἰησοῦ τοῦ κυρίου ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/002.yaml
  text: 'To Timothy[a], beloved child: grace, mercy, and peace from God the Father and Messiah Jesus our Lord.'
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning rather than its traditional transliteration.
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: 4c1b2b2b29087b928074dc9a6c0a98080b866ef4b1423b19a9ad999103d33018
    timestamp: '2026-04-18T10:32:24Z'
    output_hash: 92256accbde8c5c6fad7999612ba3a4f3bd23fa3d25e435cd70dd16b4af9a51a
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:38:22Z'
    unchanged: false
    changes_summary: 'Removed ''my'' because it is not in the Greek, changed ''beloved'' to stand directly with ''child'' for a more literal and natural rendering, and replaced ''Messiah Jesus'' with the standard formal rendering ''Christ Jesus'' for Χριστοῦ Ἰησοῦ. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'A Timoteo, amado niño[a]: gracia, misericordia y paz de parte de Dios el Padre y de Mesías Jesús nuestro Señor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Cristo Jesús'. El título griego Χριστός se traduce aquí como 'Mesías' para conservar su sentido, en vez de mantener la transliteración tradicional.
    reason: alternative_reading
lexical_decisions:
- source_word: Τιμοθέῳ
  english_pob_choice: Timothy
  chosen_spanish: Timoteo
  alternatives_spanish:
  - Timoteo
  lexicon: N/A (nombre propio)
  rationale: Nombre propio transliterado de forma estándar en español bíblico. Se conserva la referencia directa al destinatario sin añadir posesivos que no están en el griego.
- source_word: ἀγαπητῷ
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - querido
  - amado
  lexicon: BDAG
  rationale: ἀγαπητός expresa afecto fuerte y estable; en español, 'amado' comunica mejor ese peso que 'querido', que puede sonar más ligero. Se une naturalmente a 'hijo' para reflejar el vínculo afectivo y relacional.
- source_word: τέκνῳ
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo
  - hija
  - hijo(a) espiritual
  lexicon: BDAG
  rationale: Aunque τέκνον es más general que 'hijo', en español 'hijo amado' transmite bien la relación filial espiritual y mantiene naturalidad. 'Hijo(a) espiritual' sería explicativo en exceso y menos fiel a la brevedad del saludo.
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - gracia
  lexicon: BDAG
  rationale: Equivalente directo y ya consolidado en el léxico bíblico español. Conserva el valor paulino del saludo sin ampliación interpretativa.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia
  - piedad
  lexicon: BDAG
  rationale: '''Misericordia'' es el equivalente español más preciso y natural para ἔλεος. ''Piedad'' puede sonar más estrecho o devocional, y por eso se evita.'
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz
  lexicon: BDAG
  rationale: Traducción directa y estable en español bíblico. Mantiene el matiz relacional y de bienestar integral del saludo apostólico.
- source_word: θεοῦ πατρὸς
  english_pob_choice: God the Father
  chosen_spanish: Dios el Padre
  alternatives_spanish:
  - Dios el Padre
  - Dios nuestro Padre
  lexicon: BDAG
  rationale: El griego no añade ἡμῶν a 'Padre', así que se evita 'nuestro'. 'Dios el Padre' refleja con precisión la construcción sin expandirla. En español suena natural y reverente.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Mesías
  - Cristo
  lexicon: BDAG
  rationale: Se traduce el título Χριστός como 'Mesías' para conservar su sentido léxico, en línea con la preferencia de la POB. En español bíblico, 'Mesías' comunica el valor titular mejor que la transliteración tradicional.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: N/A (nombre propio)
  rationale: Nombre propio transliterado estándar al español.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor
  - Dueño
  lexicon: BDAG
  rationale: '''Señor'' es la equivalencia española habitual para κύριος en contextos cristológicos y mantiene la dignidad y autoridad del título. ''Dueño'' sería demasiado restrictivo y no refleja el uso bíblico.'
theological_decisions:
- issue: Título Χριστοῦ aplicado a Jesús en el saludo apostólico
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: Se conserva la traducción del título como 'Mesías' para no ocultar el sentido semántico de Χριστός. En un saludo formal, el título sigue siendo titular y no meramente un nombre fijo; por eso se evita sustituirlo por una transliteración sin necesidad.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres propios'
- issue: Ausencia de ἡμῶν con πατρός
  english_pob_reading: God the Father
  chosen_spanish_reading: Dios el Padre
  alternative_spanish_readings:
  - Dios nuestro Padre
  rationale: No se añade 'nuestro' porque el texto griego no lo tiene. Así se preserva la precisión del saludo y se evita introducir una relación posesiva no explicitada en el versículo.
  doctrine_reference: Precisión textual y fidelidad sintáctica al griego
translation_notes:
  revision_awareness: 'El borrador sigue el texto griego SBLGNT y toma en cuenta el historial auditado en inglés: se mantiene la decisión de no añadir ''mi'' a ''Timoteo'', se conserva la separación entre ''gracia, misericordia y paz'', y se aplica la política terminológica de traducir Χριστός como ''Mesías'' en lugar de ''Cristo'' cuando funciona como título. También se respeta la precisión de ''Dios el Padre'' sin expandirlo a ''nuestro Padre''.'
  spanish_consistency_notes:
  - Se mantiene un registro formal y eclesial, pero sin arcaísmos innecesarios.
  - Se conserva la tríada 'gracia, misericordia y paz' en el mismo orden del griego.
  - '''Mesías'' se usa como título, no como nombre propio.'
  - No se introducen posesivos ni explicaciones que el griego no contiene.
