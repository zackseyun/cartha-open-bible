translation:
  language: es
  text: Por esta razón también padezco estas cosas, pero no me avergüenzo, porque sé en quién he creído[a], y estoy convencido de que es poderoso para guardar mi depósito[b] hasta aquel día[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aquel en quien he creído»; también posiblemente «aquel en quien he confiado».
    reason: lexical_alternative
  - marker: b
    text: «Mi depósito» traduce un término para algo puesto en manos de otro para su custodia. Puede referirse a lo que Pablo ha encomendado a Dios, o a lo que le ha sido encomendado a Pablo.
    reason: alternative_reading
  - marker: c
    text: Es decir, el día futuro del juicio final y de la vindicación de Dios.
    reason: cross_reference
lexical_decisions:
- source_word: δι’ ἣν αἰτίαν
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por este motivo
  - Por lo cual
  lexicon: BDAG
  rationale: La expresión causal es idiomática; «Por esta razón» conserva la relación lógica sin sonar calcado del griego.
- source_word: ταῦτα πάσχω
  english_pob_choice: I also suffer these things
  chosen_spanish: también padezco estas cosas
  alternatives_spanish:
  - también sufro estas cosas
  - también estoy padeciendo estas cosas
  lexicon: BDAG
  rationale: πάσχω expresa sufrir/padecer. «Padezco» mantiene fuerza y dignidad en español; «estas cosas» conserva el demostrativo sin especificar el contenido del sufrimiento.
- source_word: οὐκ ἐπαισχύνομαι
  english_pob_choice: I am not ashamed
  chosen_spanish: no me avergüenzo
  alternatives_spanish:
  - no soy avergonzado
  - no quedo avergonzado
  lexicon: BDAG
  rationale: La forma media se expresa naturalmente con el giro español estándar «me avergüenzo», que comunica la postura del hablante.
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - conozco
  - he llegado a saber
  lexicon: BDAG
  rationale: οἶδα funciona con valor presente estativo; «sé» es la forma más natural y fiel al sentido.
- source_word: ᾧ πεπίστευκα
  english_pob_choice: whom I have believed
  chosen_spanish: en quién he creído
  alternatives_spanish:
  - a quien he creído
  - en quien he confiado
  lexicon: BDAG
  rationale: El dativo con πιστεύω admite la idea de creer en/confiar en. «En quién he creído» conserva la referencia personal y el aspecto perfecto con naturalidad en español.
- source_word: πέπεισμαι
  english_pob_choice: I am convinced
  chosen_spanish: estoy convencido
  alternatives_spanish:
  - estoy persuadido
  - permanezco convencido
  lexicon: BDAG
  rationale: El perfecto con valor presente expresa una convicción asentada; «estoy convencido» es claro y idiomático.
- source_word: δυνατός ἐστιν
  english_pob_choice: he is able
  chosen_spanish: es poderoso para
  alternatives_spanish:
  - es capaz de
  - puede
  lexicon: BDAG
  rationale: «Poderoso para» reproduce la capacidad con un matiz de fuerza que el adjetivo δυνατός puede llevar; evita reducirlo a mera posibilidad con «puede».
- source_word: τὴν παραθήκην μου
  english_pob_choice: my deposit
  chosen_spanish: mi depósito
  alternatives_spanish:
  - lo que me ha sido encomendado
  - lo que he confiado
  lexicon: BDAG
  rationale: «Depósito» conserva el lenguaje de custodia/safekeeping y mantiene la ambigüedad sobre si se trata de lo confiado por Pablo o a Pablo.
- source_word: φυλάξαι
  english_pob_choice: to guard
  chosen_spanish: guardar
  alternatives_spanish:
  - custodiar
  - proteger
  lexicon: BDAG
  rationale: φυλάσσω aquí expresa custodiar/guardar algo en seguridad; «guardar» es la equivalencia más directa y transparente.
- source_word: εἰς ἐκείνην τὴν ἡμέραν
  english_pob_choice: until that day
  chosen_spanish: hasta aquel día
  alternatives_spanish:
  - hasta ese día
  - para aquel día
  lexicon: BDAG
  rationale: La preposición con valor temporal apunta hacia el día escatológico; «hasta aquel día» conserva la deixis futura sin capitalización interpretativa.
theological_decisions:
- issue: Referente implícito de «en quién» y de la capacidad para guardar
  english_pob_reading: The referent is left implicit in the main text as a personal 'whom'/'he,' naturally pointing to God/Christ without specifying beyond the Greek.
  chosen_spanish_reading: Se deja implícito el referente personal de «en quién» y de «es poderoso», sin explicitarlo en la línea principal.
  alternative_spanish_readings:
  - en Dios he creído
  - en Cristo Jesús he creído
  rationale: El griego no nombra aquí al referente; la frase funciona con una referencia personal implícita. El español mantiene esa misma especificidad limitada.
  doctrine_reference: Preservar la tensión textual sin resolverla por ampliación interpretativa.
- issue: Sentido de «mi depósito»
  english_pob_reading: The phrase is rendered 'my deposit' to preserve the Greek metaphor and ambiguity.
  chosen_spanish_reading: «Mi depósito» mantiene la metáfora y la ambigüedad de la παραθήκη.
  alternative_spanish_readings:
  - lo que Dios me ha confiado
  - lo que yo he confiado a Dios
  rationale: El sintagma puede leerse como lo confiado a Pablo o lo que Pablo confía a Dios; el texto griego no obliga a escoger una sola dirección, así que la traducción conserva esa tensión.
  doctrine_reference: Preservar la tensión lexical y teológica del original.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el aparato auditado en inglés. Se conserva la ambigüedad de ᾧ πεπίστευκα mediante «en quién he creído», y la de παραθήκη μου mediante «mi depósito», sin resolverlas en el cuerpo principal. No se requieren revisiones sustanciales frente al análisis base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se usa «padezco» para πάσχω y «no me avergüenzo» para ἐπαισχύνομαι, en un registro natural y reverente.
  - Se evita sustituir «depósito» por un equivalente eclesiástico tradicional que elimine la metáfora de custodia.
  - Se conserva la deixis futura de ἐκείνην τὴν ἡμέραν con «aquel día» sin mayúsculas interpretativas.
