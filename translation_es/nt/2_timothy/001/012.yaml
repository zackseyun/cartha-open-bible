  text: δι’ ἣν αἰτίαν καὶ ταῦτα πάσχω, ἀλλ’ οὐκ ἐπαισχύνομαι, οἶδα γὰρ ᾧ πεπίστευκα, καὶ πέπεισμαι ὅτι δυνατός ἐστιν τὴν παραθήκην μου φυλάξαι εἰς ἐκείνην τὴν ἡμέραν.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/012.yaml
  text: For this reason I also suffer these things[a], but I am not ashamed, for I know whom I have believed[c][b], and I am convinced that he is able to guard my deposit until that day.
  footnotes:
  - marker: a
    text: Or 'the one in whom I have believed'; also possibly 'the one I have trusted.'
    reason: lexical_alternative
  - marker: b
    text: '''My deposit'' translates a term for something placed in another''s care for safekeeping. It may refer to what Paul has entrusted to God, or to what has been entrusted to Paul.'
    reason: alternative_reading
  - marker: c
    text: That is, the future day of God's final judgment and vindication.
    reason: cross_reference
