translation:
  language: es
  text: para lo cual fui designado heraldo[a] y apóstol y maestro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «predicador». El término griego designa a un heraldo oficial o proclamador público.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ὃ
  english_pob_choice: for which
  chosen_spanish: para lo cual
  alternatives_spanish:
  - para esto
  - para lo que
  - para cuyo fin
  lexicon: BDAG
  rationale: La preposición εἰς con el relativo apunta hacia la misión o encargo mencionado en el contexto anterior. «Para lo cual» conserva la referencia retrospectiva y el matiz de propósito sin sonar forzado en español.
- source_word: ἐτέθην
  english_pob_choice: I was appointed
  chosen_spanish: fui constituido
  alternatives_spanish:
  - fui nombrado
  - fui asignado
  - fui puesto
  lexicon: BDAG
  rationale: El pasivo de τίθημι en este contexto expresa comisión para un cargo o función. «Fui constituido» transmite mejor la idea de designación oficial que una colocación meramente espacial, y funciona bien con la serie de oficios que sigue.
- source_word: ἐγώ
  english_pob_choice: I
  chosen_spanish: fui
  alternatives_spanish:
  - yo
  - yo mismo
  lexicon: BDAG
  rationale: El pronombre explícito aporta énfasis en griego, pero en español la pasiva con sujeto implícito ya puede reflejarlo sin recargar la frase. No hace falta añadir «yo».
- source_word: κῆρυξ
  english_pob_choice: a herald
  chosen_spanish: heraldo
  alternatives_spanish:
  - predicador
  - proclamador
  lexicon: BDAG
  rationale: «Heraldo» conserva el sentido de anunciador oficial o publicador autorizado. Evita reducir el término a un oficio eclesiástico posterior que el griego no exige, y sigue la decisión del POB inglés de priorizar el valor lexical oficial.
- source_word: ἀπόστολος
  english_pob_choice: an apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - mensajero
  - enviado
  lexicon: BDAG
  rationale: En la autodesignación paulina, el término funciona como título apostólico reconocido. «Apóstol» es la equivalencia natural y fiel en español.
- source_word: διδάσκαλος
  english_pob_choice: a teacher
  chosen_spanish: maestro
  alternatives_spanish:
  - maestro de enseñanza
  - instructor
  - enseñador
  lexicon: BDAG
  rationale: Aunque «teacher» se traduce normalmente por «maestro», aquí la serie de roles suena más fluida con «maestro». Mantiene la idea de docencia sin introducir una perifrasi innecesaria.
theological_decisions:
- issue: 'κῆρυξ: ¿‘heraldo’ o ‘predicador’ en un contexto ministerial?'
  english_pob_reading: herald
  chosen_spanish_reading: heraldo
  alternative_spanish_readings:
  - predicador
  - proclamador
  rationale: La POB inglesa eligió «herald» para subrayar el sentido de vocero oficial. En español, «heraldo» conserva esa misma fuerza y evita cargar el término con asociaciones posteriores de ministerio que el griego no especifica.
  doctrine_reference: Primacía del sentido léxico del original sobre la terminología eclesial tradicional
- issue: 'ἐτέθην: ¿‘fui constituido’ o una traducción más literal como ‘fui puesto’?'
  english_pob_reading: I was appointed
  chosen_spanish_reading: fui constituido
  alternative_spanish_readings:
  - fui nombrado
  - fui asignado
  - fui puesto
  rationale: La secuencia de títulos ministeriales muestra que el verbo habla de comisión para una tarea. «Fui constituido» comunica mejor la investidura oficial y preserva el matiz de designación que el inglés audita como appointed.
  doctrine_reference: Equivalencia óptima con atención al marco ministerial del versículo
translation_notes:
  revision_awareness: 'El inglés POB no fue seguido mecánicamente: se mantuvo la decisión lexical central de κῆρυξ como un término oficial, pero en español se optó por una construcción más natural («fui constituido») y por «heraldo» para conservar el matiz de proclamación autorizada. No hubo revisiones posteriores en el paquete auditado.'
  spanish_consistency_notes:
  - 'Se preserva el paralelismo de tres títulos: heraldo, apóstol y maestro.'
  - Se evita «SEÑOR» o terminología masking porque el versículo no contiene el nombre divino.
  - «Maestro» se mantiene como traducción directa y transparente de διδάσκαλος.
  - La frase inicial «para lo cual» refleja bien la referencia al encargo previo sin añadir contenido interpretativo.
