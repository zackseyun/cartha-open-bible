translation:
  language: es
  text: al recordar la fe sincera en ti[a], la cual habitó primero en tu abuela Lois y en tu madre Eunice, y estoy persuadido de que también está en ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fidelidad genuina en ti» o «la confianza genuina en ti». La palabra griega puede abarcar matices de fe, fidelidad o confianza.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπόμνησιν λαβὼν
  english_pob_choice: having been reminded
  chosen_spanish: habiendo recibido un recordatorio
  alternatives_spanish:
  - habiendo sido recordado
  - recordando
  - habiendo recibido un aviso
  lexicon: BDAG
  rationale: La construcción participial expresa la recepción de una rememoración o recordatorio. En español, «habiendo recibido un recordatorio» conserva el sentido pasivo/receptivo sin sonar forzado.
- source_word: ἀνυποκρίτου
  english_pob_choice: sincere
  chosen_spanish: sincera
  alternatives_spanish:
  - genuina
  - sin hipocresía
  - auténtica
  lexicon: BDAG
  rationale: El adjetivo apunta a una fe sin fingimiento. «Sincera» comunica bien la ausencia de pretensión y mantiene un registro natural en español.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: La decisión principal de la POB es «faith»; en español, «fe» es el equivalente directo y más natural. Se preserva la posible tensión con «fidelidad» en una nota.
- source_word: ἐν σοὶ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - dentro de ti
  lexicon: BDAG
  rationale: La preposición locativa se mantiene de forma directa para conservar el lenguaje de indwelling o interioridad presente en el texto.
- source_word: ἥτις ἐνῴκησεν
  english_pob_choice: which first dwelt
  chosen_spanish: la cual habitó
  alternatives_spanish:
  - la cual moró
  - la cual hizo su morada
  lexicon: BDAG
  rationale: El verbo σημαίνει habitar/dwelling. «Habitó» es claro y formal; evita un calco pesado y conserva la imagen de permanencia interior.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - primeramente
  lexicon: BDAG
  rationale: '«Primero» conserva la secuencia temporal: esa fe estaba antes en Loida y Eunice que en Timoteo.'
- source_word: μάμμῃ
  english_pob_choice: grandmother
  chosen_spanish: abuela
  alternatives_spanish:
  - abuela materna
  lexicon: BDAG
  rationale: El término designa a la abuela. «Abuela» es la equivalencia clara y contemporánea en español.
- source_word: πέπεισμαι
  english_pob_choice: I am persuaded
  chosen_spanish: estoy persuadido
  alternatives_spanish:
  - estoy convencido
  - estoy seguro
  lexicon: BDAG
  rationale: El perfecto expresa convicción estable. «Estoy persuadido» preserva el tono formal y la idea de convicción asentada.
- source_word: καὶ ἐν σοί
  english_pob_choice: is also in you
  chosen_spanish: también en ti
  alternatives_spanish:
  - también está en ti
  - también habita en ti
  lexicon: BDAG
  rationale: El español requiere suplir implícitamente el verbo en la cláusula final. Aquí se deja el verbo elíptico, como en el griego, para mantener el paralelismo con la frase anterior.
theological_decisions:
- issue: 'Matiz de πίστις: fe, fidelidad o confianza'
  english_pob_reading: faith; a footnote preserves the alternatives faithfulness and trust
  chosen_spanish_reading: fe; con nota sobre posible matiz de fidelidad o confianza
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Se mantiene «fe» en el texto principal por coherencia terminológica y porque el contexto apunta al creer cristiano de Timoteo. La nota preserva que πίστις también puede sugerir fidelidad o confianza sin borrar esa tensión léxica.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; alternatives preserved where contested'
- issue: Relación entre la fe de Loida, Eunice y Timoteo
  english_pob_reading: the faith first dwelt in your grandmother Lois and your mother Eunice, and I am persuaded that it is also in you
  chosen_spanish_reading: la misma fe habitó primero en tu abuela Loida y en tu madre Eunice, y estoy persuadido de que también en ti
  alternative_spanish_readings:
  - esa fe habitó primero...
  - la fe habitó primero...
  rationale: Se conserva la afirmación de continuidad espiritual entre las generaciones sin añadir inferencias doctrinales no expresadas. El texto mantiene la convicción personal de Pablo respecto de Timoteo.
  doctrine_reference: No doctrinal novelty; follows the relational and testimonial force of the clause
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés auditado: la cláusula final se entiende como una principal con ὅτι, por lo que se expresa en español con «y estoy persuadido de que también en ti», manteniendo la estructura clara y el paralelismo. También se reflejó la preferencia revisada por un verbo de morada más formal que «vivió».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; no aparece en este versículo.
  - Se mantiene «fe» como término principal para πίστις, conforme al patrón POB, y la alternativa se preserva en nota.
  - «Habitó» se eligió por su tono formal y su cercanía al valor de ἐνοικέω sin caer en un calco rígido.
  - La elipsis verbal final se deja natural en español, aunque el sentido completo queda explícito con «estoy persuadido de que».
