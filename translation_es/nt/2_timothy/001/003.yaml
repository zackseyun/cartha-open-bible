translation:
  language: es
  text: Doy gracias a Dios[a], a quien sirvo como lo hicieron mis antepasados[b], con una conciencia limpia, al recordarte[c] constantemente en mis súplicas, noche y día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a quien adoro». El verbo griego puede referirse al servicio religioso rendido a Dios o a la adoración misma.
    reason: lexical_alternative
  - marker: b
    text: O «en la tradición de mis antepasados» o, más literalmente, «desde mis antepasados». La frase expresa continuidad con la fe y el servicio heredados.
    reason: lexical_alternative
  - marker: c
    text: 'Más literalmente: «tengo la memoria acerca de ti en mis súplicas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Χάριν ἔχω
  english_pob_choice: I thank
  chosen_spanish: Doy gracias
  alternatives_spanish:
  - Le doy gracias
  - Estoy agradecido
  lexicon: BDAG
  rationale: La expresión griega es un giro idiomático de agradecimiento a Dios. En español, «doy gracias» conserva el acto verbal de agradecer y suena natural y reverente sin perder el sentido directo del original.
- source_word: τῷ θεῷ
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  lexicon: BDAG
  rationale: El dativo objeto de agradecimiento se expresa naturalmente en español con «a Dios». Mantiene la referencia directa sin añadir énfasis no presente en el texto.
- source_word: ᾧ λατρεύω
  english_pob_choice: whom I serve
  chosen_spanish: a quien sirvo
  alternatives_spanish:
  - a quien adoro
  - a quien rindo servicio sagrado
  lexicon: BDAG
  rationale: λατρεύω puede abarcar servicio religioso o adoración. «Sirvo» preserva ese rango semántico de manera fluida en español, sin reducirlo solo a culto litúrgico ni imponer una terminología más técnica que el contexto no exige.
- source_word: ἀπὸ προγόνων
  english_pob_choice: as my ancestors did
  chosen_spanish: como mis antepasados
  alternatives_spanish:
  - desde mis antepasados
  - en la tradición de mis antepasados
  lexicon: BDAG
  rationale: La frase marca continuidad con los antepasados. «Como mis antepasados» comunica esa continuidad de servicio y devoción, alineada con la lectura auditada de continuidad heredada más que de origen temporal בלבד.
- source_word: ἐν καθαρᾷ συνειδήσει
  english_pob_choice: with a clean conscience
  chosen_spanish: con limpia conciencia
  alternatives_spanish:
  - con conciencia pura
  - en buena conciencia
  lexicon: BDAG
  rationale: La construcción expresa manera y estado moral. «Limpia conciencia» reproduce la imagen de pureza/moralidad de forma natural en español, sin perder la metáfora de limpieza que el inglés POB conservó.
- source_word: ἀδιάλειπτον
  english_pob_choice: constantly
  chosen_spanish: sin cesar
  alternatives_spanish:
  - constantemente
  - sin interrupción
  lexicon: BDAG
  rationale: Aunque la palabra modifica la idea de tener memoria, en español «sin cesar» comunica mejor la continuidad incesante del acto. Conserva el valor adverbial y evita una repetición menos idiomática con «constantemente».
- source_word: τὴν περὶ σοῦ μνείαν
  english_pob_choice: remember you
  chosen_spanish: tengo memoria de ti
  alternatives_spanish:
  - te recuerdo
  - hago mención de ti
  lexicon: BDAG
  rationale: La expresión es literalmente «la memoria acerca de ti». El español «tengo memoria de ti» preserva el sustantivo «memoria» y la relación preposicional, respetando la tensión lexical que el POB inglés anotó sin volverla una paráfrasis demasiado libre.
- source_word: ἐν ταῖς δεήσεσίν μου
  english_pob_choice: in my prayers
  chosen_spanish: en mis súplicas
  alternatives_spanish:
  - en mis oraciones
  - en mis peticiones
  lexicon: BDAG
  rationale: δέησις enfatiza petición implorante. «Súplicas» conserva mejor ese matiz que el más general «oraciones», y encaja bien con el registro elevado del pasaje.
- source_word: νυκτὸς καὶ ἡμέρας
  english_pob_choice: night and day
  chosen_spanish: noche y día
  alternatives_spanish:
  - de noche y de día
  lexicon: BDAG
  rationale: Es una locución idiomática de continuidad. «Noche y día» es la forma más natural y fiel en español.
theological_decisions:
- issue: Relación de Pablo con su herencia ancestral en ἀπὸ προγόνων
  english_pob_reading: Paul presents his service to God as continuous with that of his ancestors, not as a repudiation of Israel's faith.
  chosen_spanish_reading: Pablo presenta su servicio a Dios como continuidad con el de sus antepasados, no como rechazo de la fe de Israel.
  alternative_spanish_readings:
  - sirvo a Dios desde mis antepasados
  - sirvo a Dios en la tradición de mis antepasados
  rationale: La redacción española debe conservar la continuidad histórica y religiosa implícita en la frase. «Como mis antepasados» evita forzar el sentido hacia simple antigüedad o hacia una mera tradición cultural sin contenido de fe.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance de λατρεύω
  english_pob_reading: serve
  chosen_spanish_reading: sirvo
  alternative_spanish_readings:
  - adoro
  - rindo servicio sagrado
  rationale: El griego permite servicio y adoración. «Sirvo» mantiene esa amplitud sin encerrar el término en un solo campo semántico. En español, «adoro» podría estrechar innecesariamente el verbo hacia culto interno o litúrgico.
  doctrine_reference: Translation philosophy §5
- issue: Valor de ἐν καθαρᾷ συνειδήσει
  english_pob_reading: with a clean conscience
  chosen_spanish_reading: con limpia conciencia
  alternative_spanish_readings:
  - con conciencia pura
  - con buena conciencia
  rationale: La expresión afirma integridad moral y no solo sinceridad subjetiva. «Limpia conciencia» preserva la imagen de pureza y permite que el lector perciba el matiz ético del texto sin exagerarlo.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del audit trail inglés y no se detectaron cambios sustantivos en la última revisión; la versión publicada en español sigue la misma línea de equivalencia óptima, con conservación de las alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός según el estándar del proyecto.
  - Se evitó «SEÑOR» porque el texto fuente dice θεός, no κύριος.
  - Se usó «antepasados» como equivalente neutral de προγόνων, coherente con el registro bíblico y comprensible en español latinoamericano.
  - «Súplicas» se eligió por el matiz intensivo de δέησις, mientras que «oraciones» quedó como alternativa en nota.
  - Las notas al pie conservan las alternativas documentadas por el POB inglés sin introducir nuevas lecturas doctrinales.
