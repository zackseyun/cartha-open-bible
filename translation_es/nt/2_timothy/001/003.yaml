    text: Or 'in the tradition of my ancestors' or more literally 'from my ancestors.' The phrase expresses continuity with ancestral faith and service.
    reason: lexical_alternative
  - marker: c
    text: More literally, 'I have the remembrance concerning you in my prayers.'
    reason: lexical_alternative
