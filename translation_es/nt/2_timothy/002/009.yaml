translation:
  language: es
  text: Por el cual padezco aflicción[a], hasta llevar cadenas, como un criminal[b]. Pero la palabra de Dios no está atada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en lo cual» o «por lo cual»; el griego probablemente remite al evangelio mencionado en el versículo anterior.
    reason: alternative_reading
  - marker: b
    text: O «como un malhechor».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: for which
  chosen_spanish: por lo cual
  alternatives_spanish:
  - en lo cual
  - por lo que
  - en el cual
  lexicon: BDAG
  rationale: La frase relativa vuelve sobre el evangelio del versículo anterior y expresa causa o relación. En español, «por lo cual» comunica bien la idea de sufrir a causa de eso, sin forzar una lectura espacial de «en lo cual».
- source_word: κακοπαθῶ
  english_pob_choice: I am suffering hardship
  chosen_spanish: padezco aflicción
  alternatives_spanish:
  - sufro dificultades
  - estoy sufriendo aflicción
  - padezco hardship
  lexicon: BDAG
  rationale: El verbo expresa padecer penurias o trato duro de manera continua. «Padezco aflicción» conserva el sentido de sufrimiento en curso y resulta natural en español bíblico actual.
- source_word: μέχρι δεσμῶν
  english_pob_choice: even to the point of chains
  chosen_spanish: hasta el punto de las cadenas
  alternatives_spanish:
  - hasta las cadenas
  - hasta el punto del encadenamiento
  - hasta la prisión
  lexicon: BDAG
  rationale: μέχρι marca extensión, y δεσμῶν literalmente significa «cadenas», con valor metonímico de encarcelamiento. Se mantiene la imagen concreta de las cadenas y la idea de límite extremo.
- source_word: ὡς κακοῦργος
  english_pob_choice: as a criminal
  chosen_spanish: como un criminal
  alternatives_spanish:
  - como un malhechor
  - como un evildoer
  - como un delincuente
  lexicon: BDAG
  rationale: κακοῦργος puede significar criminal o malhechor. «Criminal» es la equivalencia más clara y contemporánea en este contexto judicial y carcelario.
- source_word: ὁ λόγος τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - la palabra de Yahvé
  - la palabra divina
  lexicon: BDAG
  rationale: Se conserva la expresión amplia «palabra de Dios», que en español mantiene el alcance de λόγος sin restringirlo indebidamente a Escritura o a una fórmula litúrgica.
- source_word: οὐ δέδεται
  english_pob_choice: is not bound
  chosen_spanish: no está encadenada
  alternatives_spanish:
  - no está atada
  - no está ligada
  - no ha sido encadenada
  lexicon: BDAG
  rationale: 'El perfecto pasivo describe un estado resultante: la palabra permanece libre. «No está encadenada» preserva el contraste con las cadenas de Pablo y hace audible la metáfora en español.'
theological_decisions:
- issue: Referente de «la palabra de Dios»
  english_pob_reading: Rendered as 'the word of God' without specifying whether this means Scripture, the gospel proclamation, or God's message more broadly.
  chosen_spanish_reading: «la palabra de Dios» sin precisar si se trata del evangelio proclamado, de las Escrituras o del mensaje de Dios en sentido amplio.
  alternative_spanish_readings:
  - el evangelio
  - la Escritura
  - el mensaje de Dios
  rationale: El contexto inmediato apunta especialmente al evangelio anunciado, pero la expresión griega es más amplia. La traducción mantiene esa amplitud y evita cerrar el sentido más de lo que el texto exige.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios; el texto se alinea con el pasaje base y con la decisión auditada inglesa sin necesidad de ajustes adicionales.
  spanish_consistency_notes:
  - Se conserva «Dios» para θεοῦ, sin introducir «SEÑOR» ni sustituir el referente.
  - Se mantiene la imagen de «cadenas»/«encadenada» para respetar el contraste con δεσμῶν y δέδεται.
  - «Palabra de Dios» preserva la amplitud semántica del griego y su fuerza proclamada.
  - El registro es bíblico moderno, sin calcos innecesarios y sin apartarse del valor lexical documentado.
