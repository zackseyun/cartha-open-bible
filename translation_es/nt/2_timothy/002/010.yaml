review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: «Por esta razón», «soporto todo», el propósito con «para que», y «obtengan la salvación ... con gloria eterna». Sin embargo, hay dos desajustes con la guía y con la evidencia auditada: 1) ἐκλεκτούς se ha vertido como «escogidos», cuando el POB en inglés documenta y prioriza «the elect» y en español el equivalente más fiel y teológicamente estable es «los elegidos»; 2) la nota [b] no corresponde a la razón de la nota inglesa preservada, que era una alternativa de agrupación/sintaxis previa, mientras que aquí se usa como simple reformulación de toda la frase. La nota [c] añade explicación teológica no necesaria en el texto principal.'
  spanish_quality_summary: El español es claro y bastante natural. «Lo soporto todo» funciona, aunque «todo lo soporto» o «soporto todo» también serían naturales; no exige cambio. «Por amor de» es comprensible pero algo más marcado/tradicional; se puede conservar. La puntuación con coma antes de «con gloria eterna» ayuda a la lectura. La principal mejora necesaria es terminológica y de aparato de notas.
  glossary_alignment: 'Hay buen cumplimiento con «Mesías Jesús» para Χριστῷ Ἰησοῦ. No hay términos del glosario mayor en conflicto salvo ἐκλεκτούς: conviene «elegidos» en vez de «escogidos» para reflejar mejor la elección/electos del original y del audit trail. No se detectan problemas con «salvación», «gloria eterna» ni con el valor de propósito.'
  issues:
  - severity: medium
    issue: «los escogidos» para ἐκλεκτούς
    rationale: Aunque es semánticamente cercano, el inglés auditado fijó «the elect» con nota alternativa «the chosen». En español, «los elegidos» preserva mejor el término teológico principal, mientras que «los escogidos» encaja mejor como alternativa en nota.
  - severity: medium
    issue: La nota [b] no refleja fielmente la nota/documentación inglesa preservada
    rationale: 'La nota inglesa c conservaba una alternativa de agrupación: «Or ‘the salvation that is in Messiah Jesus with eternal glory’.» En español debe preservarse como alternativa formal de lectura, no como una reformulación libre desligada de ese historial.'
  - severity: low
    issue: La nota [c] añade una explicación interpretativa innecesaria
    rationale: El texto principal ya puede comunicar el sentido; la nota teológica extra no es requerida por la evidencia fuente ni por el audit trail, y complica el aparato sin necesidad.
  revised_spanish_text: Por esta razón lo soporto todo por amor de los elegidos[a], para que ellos también obtengan la salvación[b] que está en Mesías Jesús, con gloria eterna.
  revised_footnotes:
  - marker: a
    text: O «los escogidos». El término griego es ἐκλεκτούς.
    reason: lexical_alternative
  - marker: b
    text: O «la salvación que está en Mesías Jesús con gloria eterna».
    reason: previous_rendering
  revision_rationale: Se ajusta ἐκλεκτούς a «los elegidos» para alinear el español con el término principal documentado en el POB («the elect») y se deja «los escogidos» como alternativa léxica en nota. Se elimina la nota teológica redundante y se corrige la nota sobre la frase de salvación para que refleje la alternativa de agrupación preservada en el audit trail inglés. El resto del texto es fiel, claro y natural en español.
