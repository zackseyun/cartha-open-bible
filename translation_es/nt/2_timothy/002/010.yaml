revisions:
- from: Por esta razón lo soporto todo por amor de los escogidos[a], para que ellos también obtengan la salvación[b] que está en Mesías Jesús, con gloria eterna[c].
  to: Por esta razón lo soporto todo por amor de los elegidos[a], para que ellos también obtengan la salvación[b] que está en Mesías Jesús, con gloria eterna.
  rationale: Se ajusta ἐκλεκτούς a «los elegidos» para alinear el español con el término principal documentado en el POB («the elect») y se deja «los escogidos» como alternativa léxica en nota. Se elimina la nota teológica redundante y se corrige la nota sobre la frase de salvación para que refleje la alternativa de agrupación preservada en el audit trail inglés. El resto del texto es fiel, claro y natural en español.
