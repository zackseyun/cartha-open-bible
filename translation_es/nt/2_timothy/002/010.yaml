    changes_summary: 'Replaced ''Messiah Jesus'' with ''Christ Jesus'' to reflect the Greek more naturally and consistently in formal translation; simplified ''together with'' to ''with'' for smoother English while preserving meaning. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Por esta razón lo soporto todo por amor de los elegidos[a], para que ellos también obtengan la salvación[b] que está en Mesías Jesús, con gloria eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los escogidos». El término griego es ἐκλεκτούς.
    reason: lexical_alternative
  - marker: b
    text: O «la salvación que está en Mesías Jesús con gloria eterna».
    reason: previous_rendering
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Porque de esta razón
  - Así que
  lexicon: BDAG
  rationale: La frase retoma el motivo del contexto anterior. «Por esta razón» conserva claramente el valor causal y suena natural en español sin volverlo meramente inferencial.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo esto
  - todas las cosas
  lexicon: BDAG
  rationale: El acusativo neutro plural es totalizante. «Todo» transmite la amplitud sin sonar forzado en español.
- source_word: ὑπομένω
  english_pob_choice: I endure
  chosen_spanish: lo soporto
  alternatives_spanish:
  - persevero bajo ello
  - permanezco firme bajo ello
  lexicon: BDAG
  rationale: El verbo expresa resistencia perseverante bajo dificultad. «Lo soporto» comunica el peso del sufrimiento y la constancia de manera natural; el objeto implícito se recoge en «todo».
- source_word: διὰ τοὺς ἐκλεκτούς
  english_pob_choice: for the sake of the elect
  chosen_spanish: por amor de los escogidos
  alternatives_spanish:
  - por causa de los escogidos
  - para bien de los escogidos
  lexicon: BDAG
  rationale: διά con acusativo expresa beneficio/causa. «Por amor de» mantiene el sentido de beneficio y entrega personal. «Los escogidos» preserva el lenguaje electivo sin suavizarlo.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce propósito. «Para que» es la forma más natural y clara en español.
- source_word: καὶ αὐτοὶ
  english_pob_choice: they also
  chosen_spanish: ellos también
  alternatives_spanish:
  - también ellos
  - ellos mismos también
  lexicon: BDAG
  rationale: Se conserva el valor aditivo de καί y la referencia enfática de αὐτοί sin sobrecargar la frase.
- source_word: σωτηρίας τύχωσιν
  english_pob_choice: may obtain the salvation
  chosen_spanish: obtengan la salvación
  alternatives_spanish:
  - alcancen la salvación
  - lleguen a obtener la salvación
  lexicon: BDAG
  rationale: τύχωσιν con genitivo significa obtener/alcanzar. «Obtengan la salvación» conserva el propósito de la cláusula y el sentido de recibir lo buscado.
- source_word: τῆς ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: that is in Messiah Jesus
  chosen_spanish: que está en Mesías Jesús
  alternatives_spanish:
  - que está en Cristo Jesús
  - que se halla en Mesías Jesús
  lexicon: BDAG
  rationale: Siguiendo la pauta del proyecto, Χριστός se vierte como «Mesías» cuando funciona como título. La frase mantiene la localización/unión implícita de la salvación en relación con Jesús.
- source_word: μετὰ δόξης αἰωνίου
  english_pob_choice: with eternal glory
  chosen_spanish: con gloria eterna
  alternatives_spanish:
  - junto con gloria eterna
  - acompañada de gloria eterna
  lexicon: BDAG
  rationale: μετά con genitivo expresa acompañamiento. «Con gloria eterna» es breve y conserva la idea de que la gloria acompaña la salvación.
theological_decisions:
- issue: ἐκλεκτούς y su carga doctrinal
  english_pob_reading: the elect
  chosen_spanish_reading: los escogidos
  alternative_spanish_readings:
  - los elegidos
  rationale: El griego usa un término de elección divina con peso teológico. «Escogidos» preserva esa fuerza y evita sustituirla por una paráfrasis menos marcada. Se mantiene la tensión doctrinal del texto sin imponer un sistema interpretativo adicional.
  doctrine_reference: Translation philosophy §3; afirmaciones sobre elección
- issue: Χριστῷ Ἰησοῦ como título
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La guía del proyecto favorece «Mesías» cuando Χριστός funciona como título. En este contexto, la expresión retiene la densidad mesiánica y evita el uso automático de la forma tradicional eclesial sin justificación textual adicional.
  doctrine_reference: Translation philosophy §2; tabla de términos controvertidos para Χριστός
- issue: Relación entre salvación y gloria eterna
  english_pob_reading: the salvation that is in Messiah Jesus with eternal glory
  chosen_spanish_reading: la salvación que está en Mesías Jesús, con gloria eterna
  alternative_spanish_readings:
  - la salvación que está en Mesías Jesús junto con gloria eterna
  rationale: 'El griego permite distinguir dos rasgos: la salvación está en Cristo Jesús y va acompañada de gloria eterna. La coma ayuda a que el lector perciba ambos modificadores sin fusionarlos indebidamente.'
  doctrine_reference: Sintaxis del genitivo y de μετά con genitivo
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión inglés: la formulación final volvió a «Messiah Jesus» para respetar la política del proyecto sobre Χριστός. En español se mantuvo esa decisión con «Mesías Jesús». También se preservó la separación sintáctica entre la salvación «en» Cristo Jesús y la gloria «con» que la acompaña.'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός conforme a la terminología del proyecto.
  - Se evita «SEÑOR» como sustituto de un nombre divino, pues no aparece aquí.
  - «Escogidos» mantiene la fuerza lexical de ἐκλεκτούς sin neutralizarla.
  - «Con gloria eterna» refleja μετά con genitivo como acompañamiento, no mera añadidura ornamental.
