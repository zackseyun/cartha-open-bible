translation:
  language: es
  text: 'La declaración[a] es digna de confianza: pues si morimos con él[b], también viviremos con él[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «La palabra es fiel» o «La afirmación es confiable».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «si morimos juntamente con»; el verbo compuesto griego implica muerte compartida con Cristo.
    reason: lexical_alternative
  - marker: c
    text: El futuro «viviremos con él» puede referirse a la vida de resurrección con Cristo, a la participación presente en su vida, o a ambas.
    reason: alternative_reading
lexical_decisions:
- source_word: πιστὸς
  english_pob_choice: trustworthy
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - digna de confianza
  - verdadera
  lexicon: BDAG
  rationale: La fórmula fija πιστὸς ὁ λόγος en las Pastorales presenta la afirmación como plenamente digna de aceptación. En español, «fiel» conserva la idea de confiabilidad y solidez de la declaración, y evita cargarla demasiado hacia una mera cualidad personal.
- source_word: ὁ λόγος
  english_pob_choice: the saying
  chosen_spanish: la palabra
  alternatives_spanish:
  - el dicho
  - la declaración
  - el dicho fiel
  lexicon: BDAG
  rationale: Aunque el contexto formula una sentencia breve y memorable, en español «la palabra» mantiene la concisión de la expresión formulística y es natural en un registro bíblico. La alternativa «la declaración» sería más explicativa, pero menos idiomática y menos cercana al eco tradicional de la fórmula.
- source_word: εἰ γὰρ
  english_pob_choice: for if
  chosen_spanish: porque si
  alternatives_spanish:
  - pues si
  - si en efecto
  - porque si es que
  lexicon: BDAG
  rationale: 'Se conservan ambas partículas: εἰ introduce la condición y γάρ da fuerza explicativa. «Porque si» reproduce esa relación sin volver la frase pesada en español.'
- source_word: συναπεθάνομεν
  english_pob_choice: we died with him
  chosen_spanish: morimos con él
  alternatives_spanish:
  - hemos muerto con él
  - morimos juntamente con él
  - murimos con él
  lexicon: BDAG
  rationale: El prefijo συν- implica participación compartida. En español, «morimos con él» expresa esa unión sin añadir palabras innecesarias; «con él» explicita el referente implícito del contexto cristológico, como lo hace la audición inglesa.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - asimismo
  - además
  lexicon: BDAG
  rationale: Aquí καί marca correspondencia entre morir y vivir con Cristo. «También» refleja mejor ese paralelo que un simple «y».
- source_word: συζήσομεν
  english_pob_choice: we will also live with him
  chosen_spanish: viviremos con él
  alternatives_spanish:
  - también viviremos con él
  - viviremos juntamente con él
  - viviremos con él también
  lexicon: BDAG
  rationale: El futuro συζήσομεν indica vida compartida con Cristo. «Viviremos con él» conserva la amplitud del término sin decidir si el énfasis es estrictamente resurreccional, presente o ambos; el «también» ya queda cubierto por la coordinación anterior.
theological_decisions:
- issue: Referente implícito de los compuestos con συν-
  english_pob_reading: Supply 'with him' in both verbs, referring to Christ.
  chosen_spanish_reading: Expresar «con él» en ambos verbos, refiriéndolo a Cristo.
  alternative_spanish_readings:
  - dejar el referente implícito
  - 'traducir sin pronombre: «si morimos, viviremos»'
  rationale: Aunque el griego no nombra explícitamente a Cristo en este verso, los verbos compuestos con συν- implican participación compartida, y el contexto inmediato hace claro el referente. En español, añadir «con él» transmite esa unión sin introducir una interpretación ajena al texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Matiz temporal y teológico de 'viviremos'
  english_pob_reading: Render broadly as 'we will also live with him' without specifying whether the emphasis is present spiritual life, future resurrection life, or both.
  chosen_spanish_reading: Dejar «viviremos con él» en sentido amplio, sin cerrar si apunta a vida presente, resurrección futura o ambas.
  alternative_spanish_readings:
  - interpretar solo como resurrección futura
  - interpretar solo como vida espiritual presente
  rationale: El futuro συζήσομεν admite una lectura amplia. La traducción española preserva esa amplitud y no resuelve prematuramente la tensión teológica presente en el texto.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente anclado en el texto español. La redacción mantiene la lectura cristalina del paralelo morir/vivir con Cristo y conserva la amplitud teológica del futuro.
  spanish_consistency_notes:
  - Se usó «fiel» para πιστὸς, coherente con una fórmula sentenciosa y sin forzar un matiz de lealtad personal.
  - «La palabra» conserva la densidad formulística de πιστὸς ὁ λόγος en un español bíblico natural.
  - El referente de «él» queda intencionalmente explícito por contexto cristológico, sin añadir el nombre propio cuando no aparece en el griego.
  - No se distinguió aquí entre vida presente y futura en el cuerpo del texto; esa amplitud se dejó para la nota.
  - La puntuación con dos puntos respeta el carácter de sentencia introductoria del dicho.
