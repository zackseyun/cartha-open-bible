revisions:
- from: 'Fiel es la palabra: porque si morimos con él[b], también viviremos con él[c][a].'
  to: 'La declaración[a] es digna de confianza: pues si morimos con él[b], también viviremos con él[c].'
  rationale: Se reemplaza «Fiel es la palabra» por «La declaración es digna de confianza» para reflejar mejor la función idiomática de πιστὸς ὁ λόγος según el expediente inglés y sonar más natural en español contemporáneo. Se conserva la explicitación de «con él» en ambos verbos por fidelidad al sentido de los compuestos con συν-. Se reordenan y simplifican las notas para preservar las alternativas y matices del expediente auditado sin redundancias.
