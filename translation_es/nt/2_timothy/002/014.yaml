    text: La expresión puede aludir al testimonio divino en general, sin precisar aquí si «el Señor» se refiere específicamente a Jesús o de manera más amplia a Dios.
    reason: theological_note
  - marker: b
    text: O «sin ningún provecho».
    reason: lexical_alternative
  revision_rationale: 'Se corrigió el imperativo para reflejar el aspecto continuo de ὑπομίμνῃσκε y se añadió el pronombre indirecto implícito en contexto («recordándoles»). Se mantuvo «delante del Señor» con su nota teológica. También se reubicaron las notas para que coincidan con el rastro inglés: la nota teológica en «Señor» y la alternativa léxica en la expresión de inutilidad. «lo cual no aprovecha para nada» expresa con más naturalidad la falta total de beneficio de ἐπ’ οὐδὲν χρήσιμον.'
