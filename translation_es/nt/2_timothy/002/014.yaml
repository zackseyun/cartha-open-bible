translation:
  language: es
  text: Sigue recordándoles estas cosas, advirtiéndoles solemnemente delante del Señor[a] que no discutan sobre palabras, lo cual no aprovecha para nada[b], sino que conduce a la ruina de los que oyen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión puede aludir al testimonio divino en general, sin precisar aquí si «el Señor» se refiere específicamente a Jesús o de manera más amplia a Dios.
    reason: theological_note
  - marker: b
    text: O «sin ningún provecho».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El demostrativo neutro plural mira hacia lo dicho antes; en español, «estas cosas» conserva mejor el anafórico plural que un singular genérico como «esto».
- source_word: ὑπομίμνῃσκε
  english_pob_choice: Keep reminding
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Sigue recordando
  - No dejes de recordar
  lexicon: BDAG
  rationale: El imperativo presente expresa repetición o continuidad. «Recuerda» funciona de modo natural en español, y el contexto de la frase completa ya aporta el matiz de insistencia continua mediante la amonestación siguiente.
- source_word: διαμαρτυρόμενος
  english_pob_choice: solemnly charging them
  chosen_spanish: amonestándolos solemnemente
  alternatives_spanish:
  - exhortándolos solemnemente
  - advirtiéndoles solemnemente
  lexicon: BDAG
  rationale: El participio comunica una insistencia seria y solemne. «Amonestándolos solemnemente» mantiene el tono de cargo formal sin debilitarlo a una simple advertencia.
- source_word: ἐνώπιον τοῦ κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - en la presencia del Señor
  lexicon: BDAG
  rationale: La expresión idiomática indica actuación bajo testimonio divino. «Delante del Señor» es natural en español bíblico y conserva la idea de rendición de cuentas ante Dios.
- source_word: μὴ λογομαχεῖν
  english_pob_choice: not to quarrel about words
  chosen_spanish: para que no discutan sobre palabras
  alternatives_spanish:
  - para que no contiendan por palabras
  - para que no peleen por palabras
  lexicon: BDAG
  rationale: λογομαχέω denota contienda verbal o riña por palabras. «Discutan sobre palabras» reproduce bien el sentido de disputa estéril sin exagerarlo a una imagen más fuerte que el griego.
- source_word: ἐπ’ οὐδὲν χρήσιμον
  english_pob_choice: which is useful for nothing
  chosen_spanish: cosa que no sirve para nada
  alternatives_spanish:
  - que no es útil para nada
  - que no aprovecha en nada
  lexicon: BDAG
  rationale: La frase expresa ausencia total de beneficio. «No sirve para nada» es idiomático y comunica con claridad la inutilidad que subraya el texto.
- source_word: ἐπὶ καταστροφῇ τῶν ἀκουόντων
  english_pob_choice: leads to the ruin of those who hear
  chosen_spanish: conduce a la ruina de los que oyen
  alternatives_spanish:
  - lleva a la destrucción de los que oyen
  - resulta en la ruina de los oyentes
  lexicon: BDAG
  rationale: καταστροφή indica ruina, destrucción o derrumbe. «Conduce a la ruina» mantiene la fuerza causal del resultado y evita especificar más de lo que el término exige.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Dios
  - el Señor Jesús
  lexicon: BDAG
  rationale: Se conserva «el Señor» como traducción estándar de κύριος. La frase admite una referencia general a la presencia divina; en esta línea no se estrecha indebidamente a Jesús ni se reemplaza por un término más abstracto.
theological_decisions:
- issue: Referencia de κύριος en la expresión «delante del Señor»
  english_pob_reading: The phrase 'before the Lord' may refer generally to divine witness, without specifying whether 'Lord' here points particularly to the Lord Jesus or more broadly to God.
  chosen_spanish_reading: La frase «delante del Señor» se conserva abierta como testimonio divino general, sin precisar si se refiere de manera particular al Señor Jesús o de forma más amplia a Dios.
  alternative_spanish_readings:
  - delante de Dios
  - delante del Señor Jesús
  rationale: El griego no especifica el referente y el contexto pastoral permite una ambigüedad real. La traducción española mantiene esa tensión en lugar de resolverla interpretativamente.
  doctrine_reference: 'DOCTRINE.md: términos controvertidos — κύριος → Señor; principio de preservar la ambigüedad teológica genuina.'
translation_notes:
  revision_awareness: El pasaje no presenta revisiones aplicadas en el paquete auditado; la redacción española sigue directamente el texto griego y el consenso alto del control cruzado, manteniendo la ambigüedad genuina de κύριος.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al uso bíblico establecido en este contexto.
  - Se conserva «ruina» para καταστροφή, en vez de suavizarlo a una mera pérdida o daño.
  - 'La construcción verbal en español preserva la progresión: recordar, amonestar solemnemente, prohibir la contienda verbal y señalar su resultado destructivo.'
