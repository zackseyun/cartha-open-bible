    rationale: En 2 Timoteo 2:16–18 el enfoque está en el discurso/enseñanza falsa que se difunde. «Palabra» en español tiende a sonar más literal o más neutral de lo que exige el contexto; «mensaje» o «lo que dicen» preserva mejor la intención.
