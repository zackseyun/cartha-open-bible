translation:
  language: es
  text: y su mensaje se extenderá como gangrena[a]. Entre ellos están Himeneo y Fileto[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su palabra» o «lo que dicen».
    reason: lexical_alternative
  - marker: b
    text: Más literalmente, «tendrá su curso»; la idea es que se propagará destructivamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγος
  english_pob_choice: talk
  chosen_spanish: palabra
  alternatives_spanish:
  - charla
  - mensaje
  - discurso
  lexicon: BDAG
  rationale: En este contexto de enseñanza falsa, λόγος puede referirse al contenido dicho o transmitido. En español, «palabra» mantiene esa amplitud semántica sin sonar demasiado coloquial, y preserva la alternativa documentada por la POB inglesa entre «word» y «message».
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de ellas
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa naturalmente con «su»; el plural antecedente queda claro por el contexto inmediato.
- source_word: ὡς γάγγραινα
  english_pob_choice: like gangrene
  chosen_spanish: como gangrena
  alternatives_spanish:
  - como una gangrena
  - como cáncer
  lexicon: BDAG
  rationale: «Gangrena» es el equivalente léxico directo y conserva la imagen médica destructiva. No se suaviza a «cáncer», porque eso interpretaría más de lo que dice el griego y la nota inglesa ya marca la imagen como gangrena.
- source_word: νομὴν ἕξει
  english_pob_choice: will spread
  chosen_spanish: se extenderá
  alternatives_spanish:
  - hará progresos
  - tendrá su curso
  - se propagará
  lexicon: BDAG
  rationale: La expresión idiomática literalmente alude a tener pasto/curso, pero en el contexto de una enfermedad destructiva el sentido es de propagación. «Se extenderá» comunica ese avance sin volver la frase rígidamente literal.
- source_word: ὧν ἐστιν
  english_pob_choice: Among them are
  chosen_spanish: Entre ellos están
  alternatives_spanish:
  - De los cuales son
  - Entre los cuales están
  lexicon: BDAG
  rationale: La construcción partitiva se vuelve una fórmula idiomática natural en español con «Entre ellos están», conservando la identificación de ejemplos dentro del grupo mencionado.
- source_word: Ὑμέναιος
  english_pob_choice: Hymenaeus
  chosen_spanish: Himeneo
  alternatives_spanish:
  - Hymenaeus
  lexicon: convención onomástica
  rationale: Se translitera al español con la forma usual «Himeneo», más natural y reconocible en una versión bíblica en español.
- source_word: Φίλητος
  english_pob_choice: Philetus
  chosen_spanish: Fileto
  alternatives_spanish:
  - Philetus
  lexicon: convención onomástica
  rationale: Se adopta la forma española estándar «Fileto» para el nombre propio.
theological_decisions:
- issue: Imagen de corrupción doctrinal como enfermedad
  english_pob_reading: The verse depicts the corrupting teaching as something that spreads destructively through a community.
  chosen_spanish_reading: El dicho falso se presenta como una gangrena que se expande y daña la comunidad.
  alternative_spanish_readings:
  - Una traducción más literal que mantenga el giro médico sin explicitar la metáfora
  - Un cambio interpretativo a «cáncer»
  rationale: La lectura de la POB inglesa entiende que Pablo usa una metáfora de destrucción progresiva. «Se extenderá como gangrena» conserva la advertencia teológica sin exagerar ni sustituir la imagen original.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios en el texto base ni objeciones de revisión; se mantiene la equivalencia óptima ya aprobada por el control cruzado.'
  spanish_consistency_notes:
  - Se mantiene «gangrena» como equivalente principal de γάγγραινα, en línea con la POB inglesa.
  - Se usa «Entre ellos están» para ὧν ἐστιν por naturalidad idiomática y preservación del sentido partitivo.
  - Los nombres propios se adaptan a las formas españolas habituales «Himeneo» y «Fileto».
  - La nota [a] preserva la alternativa léxica documentada entre «palabra» y «mensaje» sin añadir interpretaciones ajenas al texto.
