review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: obligación negativa (οὐ δεῖ), contraste con ἀλλὰ, y la serie de cualidades ministeriales. Sin embargo, se aparta innecesariamente del audit trail inglés y de la decisión teológica documentada al poner δοῦλον como “esclavo” en el texto principal, cuando el contexto pastoral favorece “siervo”/“servidor” y el inglés POB eligió “servant” con “slave” solo como alternativa léxica. Además, “contender” es entendible pero menos natural en español contemporáneo que “pelear” o “andar en peleas/discusiones”; y “amable” suaviza un poco ἤπιον, donde “amable” puede sonar a mera cortesía más que a mansedumbre/gentileza.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para alinearse mejor con el registro eclesial legible y con la naturalidad actual. “Siervo del Señor” es más idiomático y adecuado aquí que “esclavo del Señor” en texto principal, especialmente dado que la nota ya preserva la alternativa léxica. “No debe pelear” suena más natural que “no debe contender”. “Amable con todos” es aceptable, aunque “bondadoso con todos” o “gentil con todos” también servirían; se puede conservar “amable” por fluidez. “Paciente cuando es maltratado” comunica bien ἀνεξίκακον.
  glossary_alignment: 'Ajuste principal necesario: δοῦλος. La política del proyecto permite “esclavo” donde la condición servil sea teológicamente saliente, pero aquí el audit trail inglés justificó explícitamente “servant” por tratarse de instrucción ministerial. En español, “siervo” es la mejor correspondencia contextual. κύριος como “Señor” está bien. Los demás términos están dentro de rango aceptable, con mejora de naturalidad recomendada para μάχεσθαι.'
