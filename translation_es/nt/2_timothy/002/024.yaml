translation:
  language: es
  text: Y el siervo del Señor no debe pelear[a], sino ser amable con todos, apto para enseñar, paciente cuando es maltratado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el esclavo del Señor”. El griego doulos puede significar “siervo” o “esclavo”, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλον
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: BDAG
  rationale: El audit trail inglés documenta la tensión léxica de δοῦλος entre “servant” y “slave”. En español, para conservar esa tensión y la fuerza semántica de pertenencia/condición servil, “esclavo” reproduce mejor el valor lexical de δοῦλος que “siervo”, que suena más piadoso y suaviza el término. Se mantiene la referencia al Señor en la construcción posesiva para reflejar el genitivo κυρίου.
- source_word: κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: del Señor
  alternatives_spanish:
  - de el Señor
  - del Dueño
  lexicon: BDAG
  rationale: κύριος se vierte con el término teológico normal “Señor”, según el patrón POB. La forma española idiomática para el genitivo es “del Señor”, que conserva el sentido relacional sin introducir una glosa explicativa como “Dueño”.
- source_word: οὐ δεῖ
  english_pob_choice: must not
  chosen_spanish: no debe
  alternatives_spanish:
  - no tiene que
  - no es necesario que
  lexicon: BDAG
  rationale: La secuencia impersonal de obligación expresa necesidad/prohibición. En español, “no debe” comunica con claridad la fuerza prescriptiva de οὐ δεῖ en este contexto pastoral, de forma natural y digna.
- source_word: μάχεσθαι
  english_pob_choice: quarrel
  chosen_spanish: contender
  alternatives_spanish:
  - pelear
  - disputar
  - litigar
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por “quarrel” para captar el matiz de disputa verbal, en español “contender” conserva bien la idea de entrar en disputa o altercación sin sonar excesivamente física como “pelear”. Evita además reducirlo solo a discusión ligera.
- source_word: ἤπιον
  english_pob_choice: gentle
  chosen_spanish: amable
  alternatives_spanish:
  - apacible
  - manso
  - gentil
  lexicon: BDAG
  rationale: ἤπιος denota mansedumbre y trato suave. En español, “amable” comunica la disposición benigna y accesible en un registro natural, mientras que “manso” puede sonar poco idiomático o demasiado pasivo; “apacible” sugiere más serenidad que trato interpersonal.
- source_word: πρὸς πάντας
  english_pob_choice: toward everyone
  chosen_spanish: con todos
  alternatives_spanish:
  - hacia todos
  - para con todos
  lexicon: BDAG
  rationale: La preposición πρός expresa orientación relacional. “Con todos” es la forma más natural en español para la conducta interpersonal y preserva la universalidad del alcance sin rigidez calcaica.
- source_word: διδακτικόν
  english_pob_choice: able to teach
  chosen_spanish: apto para enseñar
  alternatives_spanish:
  - capaz de enseñar
  - idóneo para enseñar
  - enseñable
  lexicon: BDAG
  rationale: διδακτικός significa apto/hábil para enseñar. “Apto para enseñar” reproduce con precisión la cualificación ministerial y evita la ambigüedad de “enseñable”, que en español suele significar más bien dispuesto a aprender.
- source_word: ἀνεξίκακον
  english_pob_choice: patient when wronged
  chosen_spanish: paciente cuando es maltratado
  alternatives_spanish:
  - tolerante ante el daño
  - soporta el agravio sin responder
  - forjador de paciencia
  lexicon: BDAG
  rationale: ἀνεξίκακος describe a quien soporta el agravio sin devolver mal por mal. “Paciente cuando es maltratado” hace explícita la situación de agravio que el inglés POB también explicita, y preserva el matiz de resistencia no retaliatoria. “Maltratado” aquí funciona como equivalente amplio de wronged, no solo violencia física.
theological_decisions:
- issue: Cómo traducir δοῦλος sin neutralizar su fuerza social
  english_pob_reading: servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: La guía POB permite escoger entre “servant” y “slave” según contexto. En español, para este sintagma (“esclavo del Señor”) la opción más fuente-fiel es “esclavo”, porque mantiene el peso del término y deja visible la relación de pertenencia/obediencia. “Siervo” suaviza el lexema y puede perder la tensión documentada.
  doctrine_reference: 'DOCTRINE.md: contested term δοῦλος; translation philosophy on lexical transparency'
- issue: Cómo expresar la cualidad moral y ministerial de ἤπιον, διδακτικόν y ἀνεξίκακον
  english_pob_reading: gentle ... able to teach ... patient when wronged
  chosen_spanish_reading: amable ... apto para enseñar ... paciente cuando es maltratado
  alternative_spanish_readings:
  - apacible ... capaz de enseñar ... forjando paciencia ante el agravio
  - manso ... hábil para enseñar ... tolerante ante el daño
  rationale: 'La serie de adjetivos en griego presenta rasgos ministeriales concretos: trato suave, capacidad docente y resistencia al agravio. La redacción española debe conservar esa tríada sin volverla genérica. “Amable”, “apto para enseñar” y “paciente cuando es maltratado” mantienen el sentido práctico y la progresión ética.'
  doctrine_reference: Pastoral qualification texts; lexical decisions for BDAG entries ἤπιος, διδακτικός, ἀνεξίκακος
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés POB. Se conserva la tensión de δοῦλος con una opción española más fuerte (“esclavo”) que la del inglés (“servant”), porque en español “siervo” tendería a desactivar el valor léxico documentado. No se registran revisiones posteriores en el material provisto; el texto permanece alineado con el pass más reciente y con el resumen de alta concordancia.
  spanish_consistency_notes:
  - Se usa “Señor” para κύριος de forma consistente con el estándar POB.
  - Se mantiene “esclavo” para δοῦλος en el cuerpo del texto, con nota alternativa para preservar la opción semántica.
  - Se evita “Cristo/Mesías” porque no aparece en este versículo.
  - La cadencia española conserva la lista de cualidades del original sin añadir ni omitir rasgos sustanciales.
