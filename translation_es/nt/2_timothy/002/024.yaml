revisions:
- from: Y el esclavo del Señor no debe contender[a], sino ser amable con todos, apto para enseñar, paciente cuando es maltratado.
  to: Y el siervo del Señor no debe pelear[a], sino ser amable con todos, apto para enseñar, paciente cuando es maltratado.
  rationale: Se cambia “esclavo” por “siervo” en el texto principal para seguir la decisión contextual documentada en el audit trail inglés para δοῦλος en un pasaje de instrucción ministerial, manteniendo “esclavo” como alternativa léxica en nota. Se sustituye “contender” por “pelear” para una expresión más natural y clara del sentido de μάχεσθαι en español contemporáneo. Se conservan “Señor”, “amable con todos”, “apto para enseñar” y “paciente cuando es maltratado” por ser fieles y legibles.
