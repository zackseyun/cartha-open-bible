review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura exhortativa del griego: contraste entre huir y perseguir, lista de virtudes, y la dimensión comunitaria de perseguirlas con quienes invocan al Señor. Sin embargo, hay dos desajustes relevantes con el rastro POB y el griego: (1) νεωτερικὰς ἐπιθυμίας se estrecha innecesariamente con «pasiones», mientras el POB eligió un término más amplio; (2) δικαιοσύνην en el texto principal debería seguir la decisión POB documentada equivalente a «rectitud/justicia» con preferencia por el sentido de righteousness, no reemplazarse por «justicia» como principal sin necesidad. Además, «desde un corazón puro» suena menos idiomático que «de corazón puro» o «con corazón puro», y conviene preservar mejor el matiz de ἐκ.'
  spanish_quality_summary: El español es generalmente claro y digno, pero puede mejorarse para mayor naturalidad y fidelidad semántica. «Huye de» y «junto con los que invocan al Señor» funcionan bien. «Sigue» es aceptable, aunque «persigue» expresa mejor el vigor de δίωκε. «Deseos juveniles» comunica mejor el alcance amplio del original que «pasiones juveniles». «De corazón puro» es más natural en español eclesial general que «desde un corazón puro».
  glossary_alignment: Alineación parcial. «Señor» para κύριος y «fe / fidelidad» en nota están bien. Pero la decisión del proyecto para δικαιοσύνη en Pablo favorece el equivalente de 'righteousness'; en español aquí «rectitud» preserva mejor ese valor, con «justicia» en nota. También conviene acercarse al inglés auditado en νεωτερικὰς ἐπιθυμίας usando «deseos juveniles» como texto principal y «pasiones juveniles» como alternativa.
  issues:
  - severity: medium
    issue: «pasiones juveniles» estrecha el sentido de νεωτερικὰς ἐπιθυμίας
    rationale: El griego y el POB inglés apuntan a deseos propios de la juventud en sentido amplio, no solo impulsos intensos o sexuales. «Deseos juveniles» preserva mejor esa amplitud; «pasiones juveniles» puede sonar más cargado.
  - severity: high
    issue: «justicia» en el texto principal no sigue la decisión léxica POB para δικαιοσύνην
    rationale: El rastro auditado conserva 'righteousness' en el texto principal y deja 'justice' como alternativa. En español, «rectitud» o una formulación equivalente representa mejor esa decisión que «justicia» como principal.
  - severity: low
    issue: «desde un corazón puro» suena menos idiomático
    rationale: Aunque intenta reflejar ἐκ, en español bíblico natural «de corazón puro» comunica bien el origen interno sin rigidez.
  - severity: low
    issue: La nota b invierte la relación principal/alternativa
    rationale: Si el texto principal usa «rectitud», la nota debe ofrecer «justicia» como alternativa, no al revés.
