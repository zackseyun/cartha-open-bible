translation:
  language: es
  text: Pero huye de los deseos[a] juveniles, y persigue la rectitud[b], la fe[c], el amor y la paz, junto con los que invocan al Señor de corazón puro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pasiones juveniles». La frase griega puede referirse en general a deseos o impulsos propios de la juventud, no solamente al deseo sexual.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «justicia». El término griego puede incluir tanto rectitud moral como justicia en sentido relacional o legal.'
    reason: alternative_reading
  - marker: c
    text: 'O: «fidelidad». El griego puede denotar fe, confianza o fidelidad según el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: νεωτερικὰς ἐπιθυμίας
  english_pob_choice: youthful desires
  chosen_spanish: pasiones juveniles
  alternatives_spanish:
  - deseos juveniles
  - deseos de juventud
  lexicon: BDAG
  rationale: νεωτερικός se refiere a lo propio de la juventud, y ἐπιθυμίαι puede abarcar deseos, apetitos o pasiones. En español, 'pasiones juveniles' comunica el alcance amplio y moral del término sin reducirlo solo a lo sexual, a la vez que mantiene naturalidad y fuerza exhortativa.
- source_word: φεῦγε
  english_pob_choice: flee
  chosen_spanish: huye
  alternatives_spanish:
  - aléjate
  - escapa
  lexicon: BDAG
  rationale: El imperativo presenta una acción continua y enérgica. 'Huye' conserva mejor la intensidad y el contraste con 'sigue' que opciones más suaves como 'aléjate'.
- source_word: δίωκε
  english_pob_choice: pursue
  chosen_spanish: sigue
  alternatives_spanish:
  - persigue
  - busca con empeño
  lexicon: BDAG
  rationale: δίωκω en exhortación ética expresa persecución activa y sostenida. 'Sigue' en español bíblico puede comunicar bien una búsqueda persistente, aunque 'persigue' también sería posible; se eligió 'sigue' para mantener fluidez natural en la lista de virtudes.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: BDAG
  rationale: Aunque el inglés POB conserva 'righteousness' en el texto principal por su lectura paulina, en español 'justicia' es el término más natural y también puede abarcar la dimensión moral y relacional/legal del griego. Se ancla la alternativa doctrinalmente relevante en nota.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fidelidad
  - la confianza
  lexicon: BDAG
  rationale: πίστις puede significar fe, confianza o fidelidad. En esta lista de virtudes, 'la fe' es la forma más directa y natural; se preserva 'fidelidad' como alternativa válida por la amplitud semántica del término.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - el amor fraternal
  - la caridad
  lexicon: BDAG
  rationale: ἀγάπη se vierte de manera estándar como 'amor'. Es claro, bíblico y fiel sin introducir matices eclesiásticos menos transparentes.
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - paz
  lexicon: BDAG
  rationale: εἰρήνη se traduce de forma directa como 'paz'. Mantiene el valor de virtud relacional y espiritual dentro de la serie.
- source_word: μετὰ τῶν ἐπικαλουμένων τὸν κύριον
  english_pob_choice: together with those who call on the Lord
  chosen_spanish: junto con los que invocan al Señor
  alternatives_spanish:
  - con los que llaman al Señor
  - junto con los que llaman sobre el Señor
  lexicon: BDAG
  rationale: μετά con genitivo indica asociación; 'junto con' expresa bien esa compañía. ἐπικαλέω en este uso puede ser 'invocar' o 'llamar en/ sobre'. 'Invocan al Señor' es idiomático, reverente y fiel al valor cultual del verbo.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: Siguiendo la convención del NT, κύριος se vierte como 'Señor'. En este contexto de invocación, es la opción más natural y reverente en español.
- source_word: ἐκ καθαρᾶς καρδίας
  english_pob_choice: from a pure heart
  chosen_spanish: desde un corazón puro
  alternatives_spanish:
  - de un corazón puro
  - con un corazón puro
  lexicon: BDAG
  rationale: ἐκ marca origen o fuente. 'Desde un corazón puro' conserva la idea de procedencia interna y suena natural en español. Se evita 'con' porque desplaza el matiz de fuente a acompañamiento.
theological_decisions:
- issue: Alcance de νεωτερικὰς ἐπιθυμίας
  english_pob_reading: Broad moral desires associated with youth, not limited to sexual lust
  chosen_spanish_reading: pasiones juveniles en sentido amplio, no restringidas a lo sexual
  alternative_spanish_readings:
  - deseos juveniles
  - lujurias juveniles
  rationale: La frase griega es más amplia que el deseo sexual exclusivo. 'Pasiones juveniles' permite incluir impulsos desordenados propios de la inmadurez sin estrechar el texto. Se evita 'lujurias', porque restringe injustificadamente el alcance del término.
  doctrine_reference: 'Translation philosophy: primacía del idioma original sobre la tradición de traducción'
- issue: δικαιοσύνην como término paulino
  english_pob_reading: righteousness in main text, with 'justice' preserved in footnote
  chosen_spanish_reading: la justicia en el texto principal, con nota sobre posible 'rectitud' o matiz de justicia relacional/legal
  alternative_spanish_readings:
  - la rectitud
  - la justicia
  rationale: En español, 'justicia' es el equivalente más común de δικαιοσύνη y puede abarcar el rango moral/legal del griego. Se conserva la tensión semántica en nota para no perder el matiz paulino de conducta correcta y orden justa.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: πίστιν como virtud en una lista ética
  english_pob_reading: faith, with alternative 'faithfulness'
  chosen_spanish_reading: la fe, con posibilidad de 'fidelidad'
  alternative_spanish_readings:
  - la fidelidad
  - la confianza
  rationale: En una serie de virtudes, 'la fe' es la traducción más reconocible y fiel al uso común del término. Aun así, se preserva la alternativa 'fidelidad' porque el griego puede señalar lealtad o constancia, no solo creencia interior.
  doctrine_reference: 'DOCTRINE.md lexical range: πίστις'
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios, con acuerdo alto entre los revisores y sin enmiendas aplicadas. La redacción española mantiene el alcance amplio de νεωτερικαὶ ἐπιθυμίαι, conserva la serie de virtudes en forma natural, y expone en notas las tensiones léxicas de δικαιοσύνη y πίστις.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριος, conforme a la convención del NT en español del proyecto.
  - Se evitó 'SEÑOR' como máscara tipográfica, siguiendo el enfoque del proyecto en referencias directas al texto griego.
  - '''Justicia'' se usa en el texto principal por naturalidad en español, pero la nota preserva la alternativa ''rectitud'' y el rango semántico de δικαιοσύνη.'
  - '''Fe'' se mantiene en el texto principal; la nota conserva la posible lectura de ''fidelidad''.'
  - '''Pasiones juveniles'' comunica el sentido amplio de νεωτερικαὶ ἐπιθυμίαι sin restringirlo a un solo tipo de deseo.'
