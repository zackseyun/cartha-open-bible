translation:
  language: es
  text: Nadie que sirve como soldado[a] se enreda en los asuntos de la vida ordinaria, para que agrade al que lo alistó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las ocupaciones de la vida civil». El griego contrasta el servicio militar con los asuntos ordinarios de la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  english_pob_choice: No one
  chosen_spanish: Nadie
  alternatives_spanish:
  - Ninguna persona
  - Ninguno
  lexicon: BDAG
  rationale: οὐδείς expresa una negación absoluta de persona. «Nadie» conserva esa fuerza universal de manera natural en español y evita una formulación más pesada.
- source_word: στρατευόμενος
  english_pob_choice: serving as a soldier
  chosen_spanish: sirve como soldado
  alternatives_spanish:
  - está en servicio militar
  - milita como soldado
  - está sirviendo como soldado
  lexicon: BDAG
  rationale: El participio presente comunica una acción en curso. «Sirve como soldado» mantiene el matiz aspectual y la imagen militar sin sonar arcaico.
- source_word: ἐμπλέκεται
  english_pob_choice: gets entangled
  chosen_spanish: se enreda
  alternatives_spanish:
  - queda enredado
  - se involucra
  - queda implicado
  lexicon: BDAG
  rationale: ἐμπλέκομαι sugiere quedar atrapado o enredado de manera que dificulta la libertad de acción. «Se enreda» conserva esa metáfora con buen español.
- source_word: ταῖς τοῦ βίου πραγματείαις
  english_pob_choice: in the affairs of ordinary life
  chosen_spanish: en los asuntos de la vida ordinaria
  alternatives_spanish:
  - en los asuntos de la vida cotidiana
  - en las ocupaciones de la vida común
  - en los negocios de la vida
  lexicon: BDAG
  rationale: πραγματεία puede ser negocios, ocupaciones o asuntos; βίος aquí apunta a la vida terrenal o cotidiana. «Vida ordinaria» reproduce la oposición con el servicio militar sin reducirla a un solo sector social como «civil».
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: La finalidad está clara en el griego. En español, «para» hace fluida la relación de propósito y evita sobrecargar la frase; la finalidad implícita queda preservada por el contexto.
- source_word: τῷ στρατολογήσαντι
  english_pob_choice: the one who enlisted him
  chosen_spanish: al que lo alistó
  alternatives_spanish:
  - al que lo reclutó
  - al que lo enlistó
  - a quien lo alistó
  lexicon: BDAG
  rationale: στρατολογέω significa alistar o reclutar para el servicio militar. «Alistó» es claro, idiomático y conserva el sentido de incorporación militar sin introducir un rango específico.
- source_word: ἀρέσῃ
  english_pob_choice: may please
  chosen_spanish: agradar
  alternatives_spanish:
  - agrade
  - le agradezca
  - pueda agradar
  lexicon: BDAG
  rationale: 'El subjuntivo de propósito se expresa naturalmente con infinitivo en español cuando el contexto ya marca finalidad. «Agradar» conserva el objetivo del soldado: ser grato a quien lo alistó.'
theological_decisions:
- issue: Extensión de la metáfora militar
  english_pob_reading: Render the imagery straightforwardly as a soldier avoiding entanglement in ordinary-life affairs to please his enlisting authority.
  chosen_spanish_reading: 'Mantener la metáfora militar de manera directa: un soldado no debe enredarse en asuntos de la vida ordinaria para agradar al que lo alistó.'
  alternative_spanish_readings:
  - Interpretar la imagen como una advertencia general sobre prioridades ministeriales
  - Sustituir la metáfora por una explicación más explícita de disciplina
  rationale: El griego presenta una imagen militar concreta. La versión española conserva esa imagen sin convertirla de antemano en una aplicación abstracta, para respetar la tensión retórica del pasaje.
  doctrine_reference: 'Principio de equivalencia óptima: preservar la imagen y su fuerza exhortativa sin resolver prematuramente la aplicación.'
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el audit trail inglés: conserva el contraste militar/vida ordinaria, mantiene el propósito de agradar al alistador y evita una paráfrasis interpretativa. No se requirieron revisiones previas adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparece en el texto fuente; aquí no aplica.
  - «Soldado» y «alistó» mantienen el campo militar del griego στρατευόμενος / στρατολογήσαντι.
  - «Vida ordinaria» se eligió para reflejar βίος + πραγματείαις sin introducir la noción de «civil» como única lectura.
