review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: nadie en servicio militar se enreda en los asuntos de la vida común con el fin de agradar a quien lo alistó. Conserva la metáfora militar y la alternativa léxica de la nota. Sin embargo, la construcción final «para agradar al que lo alistó» pierde la distinción explícita de sujeto entre el soldado y «el que lo alistó», y suena menos natural en español que una cláusula finita con subjuntivo.'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse en naturalidad y precisión sintáctica. «Nadie que sirve como soldado» es aceptable, aunque «Nadie que está sirviendo como soldado» sería más pesado; la forma actual funciona. La mejora principal es cambiar «para agradar» por «para que agrade», que expresa mejor la finalidad con sujeto tácito del soldado. El resto del verso es legible y fiel.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, δοῦλος, etc. La nota léxica sobre «vida civil» está bien orientada y preserva la alternativa del inglés.
  issues:
  - severity: medium
    issue: La cláusula de finalidad «para agradar al que lo alistó» usa infinitivo donde el griego marca propósito con sujeto del verbo principal.
    rationale: Aunque el infinitivo puede ser comprensible, en español aquí queda algo comprimido y menos explícito. «Para que agrade al que lo alistó» comunica con mayor naturalidad que el soldado procura agradar a quien lo alistó.
  - severity: low
    issue: La nota al pie usa «ocupaciones de la vida civil», mientras el texto principal usa «vida ordinaria».
    rationale: La nota sigue bien el inglés («civilian pursuits»), así que no es un error; solo conviene mantener la explicación de contraste militar/civil como alternativa léxica, no como sentido principal.
  revised_spanish_text: Nadie que sirve como soldado[a] se enreda en los asuntos de la vida ordinaria, para que agrade al que lo alistó.
  revised_footnotes:
  - marker: a
    text: O «en las ocupaciones de la vida civil». El griego contrasta el servicio militar con los asuntos ordinarios de la vida.
    reason: lexical_alternative
