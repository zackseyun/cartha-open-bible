translation:
  language: es
  text: Pero evita las profanas palabrerías[a], porque avanzarán más[b] en la impiedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «charlas vacías», «habladurías vanas» o «habla hueca».
    reason: lexical_alternative
  - marker: b
    text: O «aún más», «cada vez más» o «más y más».
    reason: lexical_alternative
lexical_decisions:
- source_word: βεβήλους
  english_pob_choice: profane
  chosen_spanish: profanas
  alternatives_spanish:
  - impías
  - irreverentes
  - mundanas
  lexicon: BDAG
  rationale: βέβηλος denota lo no santo, lo irreverente o no consagrado. «Profanas» conserva mejor esa fuerza religiosa que «mundanas», y encaja naturalmente con «palabrerías» en español.
- source_word: κενοφωνίας
  english_pob_choice: empty talk
  chosen_spanish: palabrerías
  alternatives_spanish:
  - hablar vacío
  - charla vacía
  - vanas palabrerías
  lexicon: BDAG
  rationale: κενοφωνία es literalmente habla vacía o sin sustancia. «Palabrerías» transmite en español la idea de discurso hueco o abundante pero sin valor, con un matiz idiomático natural.
- source_word: περιΐστασο
  english_pob_choice: avoid
  chosen_spanish: evita
  alternatives_spanish:
  - aléjate de
  - apártate de
  - esquiva
  lexicon: BDAG
  rationale: El imperativo medio exhorta a mantenerse aparte o rodear para no entrar en contacto. «Evita» es claro, directo y fiel al valor exhortativo sin sonar arcaico.
- source_word: ἐπὶ πλεῖον
  english_pob_choice: further
  chosen_spanish: más
  alternatives_spanish:
  - cada vez más
  - aún más
  - más y más
  lexicon: BDAG
  rationale: La expresión indica incremento o avance a mayor grado. En español, «más» en este contexto, junto con «avanzarán», comunica el progreso ulterior sin redundancia excesiva.
- source_word: προκόψουσιν
  english_pob_choice: will advance
  chosen_spanish: avanzarán
  alternatives_spanish:
  - progresarán
  - seguirán avanzando
  - irán adelante
  lexicon: BDAG
  rationale: προκόπτω significa avanzar o progresar. Aquí el movimiento es negativo, hacia la impiedad; «avanzarán» conserva esa ironía sin sugerir mejora positiva.
- source_word: ἀσεβείας
  english_pob_choice: ungodliness
  chosen_spanish: impiedad
  alternatives_spanish:
  - irreligión
  - falta de reverencia
  - impiedad hacia Dios
  lexicon: BDAG
  rationale: ἀσέβεια designa irreverencia o falta de piedad ante Dios. «Impiedad» es el equivalente español más directo y mantiene el peso moral-religioso del término.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δὲ marca contraste con la exhortación previa. «Pero» reproduce bien el giro adversativo al inicio del versículo.
theological_decisions:
- issue: 'El carácter de la habla descrita: no solo inútil, sino espiritualmente corrupta'
  english_pob_reading: '''profane empty talk'' preserves both emptiness and irreverent character.'
  chosen_spanish_reading: «palabrerías profanas» conserva tanto la vaciedad del discurso como su irreverencia delante de Dios.
  alternative_spanish_readings:
  - «charla vacía y profana»
  - «habladurías impías»
  - «palabrería irreverente»
  rationale: El griego une vaciedad y profanidad. La traducción mantiene ambos rasgos sin diluir el peso teológico en un simple problema de comunicación inútil.
  doctrine_reference: 'Principio de fidelidad semántica: no reducir el pecado del habla a mera inutilidad social.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se evita una repetición innecesaria equivalente a «más y más» y se conserva el sentido de avance hacia un grado mayor de impiedad mediante «avanzarán más ... en la impiedad». Se decidió, además, traducir κενοφωνίας con un plural natural en español («palabrerías») para reflejar el carácter colectivo y general del término sin perder su vaciedad.'
  spanish_consistency_notes:
  - Se usa «impiedad» para ἀσέβεια, en línea con el valor religioso-moral documentado.
  - Se evita «Señor» porque no aparece el nombre divino en este versículo.
  - Se mantiene un registro bíblico claro pero moderno, sin arcaísmos innecesarios.
  - La puntuación separa la exhortación y la cláusula causal conforme al griego y al estilo castellano actual.
