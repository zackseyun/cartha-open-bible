translation:
  language: es
  text: Tú, pues, mi querido niño, sé fortalecido[a] en la gracia que está en Mesías Jesús[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «sé fuerte». El verbo griego puede expresarse de manera más compacta, pero «sé fortalecido» refleja mejor la idea probable de recibir fuerza.
    reason: lexical_alternative
  - marker: b
    text: O, «que está en Cristo Jesús». Χριστός se traduce aquí como «Mesías» para preservar su sentido titular; muchas versiones usan la forma tradicional «Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: Σὺ
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú, pues
  - Y tú
  lexicon: BDAG
  rationale: El pronombre es explícito y enfático en griego. En español conviene conservar esa fuerza con «Tú», manteniendo el contraste personal sin añadir material innecesario.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - por tanto
  lexicon: BDAG
  rationale: «Pues» transmite la transición inferencial o conectiva de οὖν de manera natural en español bíblico contemporáneo sin endurecer el registro.
- source_word: τέκνον μου
  english_pob_choice: my child
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo querido
  - mi niño
  lexicon: BDAG
  rationale: Aunque τέκνον significa «hijo/niño/descendiente» en sentido amplio, en este contexto la relación afectuosa y paternal de Pablo con Timoteo permite «hijo mío». Se evita «mi hijo» por su menor naturalidad en este giro exhortativo; «hijo mío» preserva el matiz afectivo y la cercanía.
- source_word: ἐνδυναμοῦ
  english_pob_choice: be strengthened
  chosen_spanish: sé fortalecido
  alternatives_spanish:
  - fortalécete
  - sé fuerte
  - recibe fortaleza
  lexicon: BDAG
  rationale: El imperativo medio/pasivo sugiere fuerza recibida más que autogenerada. «Sé fortalecido» conserva esa pasividad/receptividad y sigue siendo claro en español.
- source_word: ἐν τῇ χάριτι
  english_pob_choice: in the grace
  chosen_spanish: en la gracia
  alternatives_spanish:
  - por la gracia
  - mediante la gracia
  lexicon: BDAG
  rationale: Se mantiene la preposición «en» para respetar la esfera o ámbito de la gracia, tal como sugiere el griego, sin estrechar prematuramente el sentido a solo medio instrumental.
- source_word: χάριτι
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: «Gracia» es el equivalente estándar y teológicamente adecuado en este contexto paulino, donde la idea incluye favor inmerecido y poder capacitador.
- source_word: τῇ ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: that is in Messiah Jesus
  chosen_spanish: que está en Mesías Jesús
  alternatives_spanish:
  - que está en Cristo Jesús
  - que se halla en Mesías Jesús
  lexicon: BDAG
  rationale: La frase atributiva identifica la gracia como la que está vinculada a Cristo Jesús. Conforme a la terminología del proyecto, Χριστός se rinde normalmente como «Mesías» cuando funciona como título, preservando su significado original en español.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός conserva fuerza titular, no meramente nominal; por eso se traduce «Mesías» de acuerdo con la guía terminológica del proyecto.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar para Ἰησοῦς.
theological_decisions:
- issue: Valor del imperativo ἐνδυναμοῦ
  english_pob_reading: be strengthened, implying received strength rather than autonomous self-strengthening
  chosen_spanish_reading: sé fortalecido, indicando fortaleza recibida y no autoafirmación
  alternative_spanish_readings:
  - fortalécete
  - sé fuerte
  rationale: El griego permite una lectura receptiva en voz media/pasiva. «Sé fortalecido» evita imponer una lectura autosuficiente y armoniza con la referencia a la gracia como ámbito de la provisión divina.
  doctrine_reference: Translation philosophy §1; §3
- issue: Traducción de Χριστός como título
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La política del proyecto privilegia «Mesías» cuando Χριστός funciona como título. Esto preserva el contenido semántico del original y evita depender de la forma tradicional heredada sin razón textual.
  doctrine_reference: Contested terms table for Χριστός; Translation philosophy §2
translation_notes:
  revision_awareness: Tomé como contexto el paquete fuente griego SBLGNT y el audit trail inglés. La traducción inglesa pasó por una revisión que osciló entre «Messiah Jesus» y «Christ Jesus», con una corrección regresiva que restauró «Messiah». Dado el mandato terminológico del proyecto, la versión española mantiene «Mesías» y conserva la tensión titular documentada en notas, sin borrar la alternativa tradicional «Cristo Jesús».
  spanish_consistency_notes:
  - Se usó «Mesías» para Χριστός por consistencia con el estándar del proyecto, no por dependencia mecánica del inglés.
  - Se prefirió «sé fortalecido» en lugar de «sé fuerte» para reflejar la voz media/pasiva del verbo griego.
  - «Hijo mío» mantiene el tono afectivo y relacional de τέκνον μου en un español natural y reverente.
  - Se conservó «gracia» como término técnico-teológico en lugar de «favor».
