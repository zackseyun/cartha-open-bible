review_pass:
  verdict: revise
  source_alignment_summary: El borrador no preserva fielmente el sentido de συγκακοπάθησον. El griego manda participar o compartir el sufrimiento en común; «Sufre contigo» es semánticamente incorrecto e infeliz en español, pues sugiere reflexividad ('con uno mismo') y no la dimensión comunal del prefijo σύν-. El resto del versículo, «como un buen soldado de Mesías Jesús», sí refleja adecuadamente ὡς καλὸς στρατιώτης Χριστοῦ Ἰησοῦ, incluyendo la política terminológica de Mesías para Χριστός como título.
  spanish_quality_summary: La frase principal suena poco natural y confusa en español. «Sufre contigo» no es una construcción idiomática para expresar sufrimiento compartido. Una formulación como «Comparte el sufrimiento» o «Participa en el sufrimiento» es clara, fiel y eclesialmente legible. El resto del español es correcto y digno.
  glossary_alignment: Hay buen alineamiento en «Mesías Jesús» y «soldado». El problema principal es lexical y sintáctico en συγκακοπάθησον, donde el borrador no sigue bien la decisión documentada del POB («Share in suffering») ni su matiz comunal. No se detecta conflicto con otras políticas terminológicas del proyecto.
  issues:
  - severity: high
    issue: «Sufre contigo» traduce mal συγκακοπάθησον
    rationale: El verbo griego significa sufrir con, participar en sufrimiento compartido. «Contigo» en español significa 'with yourself/with you' según contexto, pero aquí resulta reflexivo o incoherente y no comunica la idea de compartir el sufrimiento con otros.
  - severity: medium
    issue: La nota al pie a queda invertida respecto de la mejor traducción
    rationale: 'La nota ofrece «Comparte el sufrimiento» como alternativa, pero esa formulación es la que mejor representa tanto el griego como la decisión inglesa auditada. La lectura principal debería adoptar esa opción y la nota preservar la alternativa documentada: «Sufre penalidades conmigo...» o similar.'
  - severity: low
    issue: Una alternativa española en metadatos mezcla inglés («hardship»)
    rationale: No afecta el texto bíblico publicado, pero muestra falta de pulido en la documentación española.
