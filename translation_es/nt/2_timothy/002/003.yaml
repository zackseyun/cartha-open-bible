translation:
  language: es
  text: Comparte el sufrimiento[a] como un buen soldado de Mesías Jesús[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sufre penalidades conmigo como un buen soldado de Cristo Jesús» o «Soporta sufrimientos junto conmigo como un buen soldado de Cristo Jesús».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «Cristo Jesús»; aquí se traduce «Mesías Jesús» porque Χριστός funciona como título.'
    reason: alternative_reading
lexical_decisions:
- source_word: συγκακοπάθησον
  english_pob_choice: Share in suffering
  chosen_spanish: Sufre contigo
  alternatives_spanish:
  - Comparte el sufrimiento
  - Sufre hardship junto con otros
  - Comparte en el sufrimiento
  lexicon: BDAG
  rationale: El imperativo aoristo expresa una exhortación directa a participar en el sufrimiento. El prefijo σύν- aporta la idea de sufrir en común, no solo en privado. 'Sufre contigo' intenta conservar esa participación conjunta sin añadir explícitamente 'conmigo', que no está en la forma griega; la nota permite la alternativa más cercana al inglés POB.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - en calidad de
  lexicon: BDAG
  rationale: 'La partícula comparativa introduce la manera en que debe sufrir: ''como'' es la equivalencia natural y transparente en español.'
- source_word: καλὸς
  english_pob_choice: good
  chosen_spanish: buen
  alternatives_spanish:
  - bueno
  - noble
  - excelente
  - digno
  lexicon: BDAG
  rationale: En combinación con 'soldado', καλός comunica calidad aprobable o aptitud. 'Buen' funciona mejor en español idiomático y mantiene el valor evaluativo sin sobrerrefinarlo.
- source_word: στρατιώτης
  english_pob_choice: soldier
  chosen_spanish: soldado
  alternatives_spanish:
  - guerrero
  lexicon: BDAG
  rationale: '''Soldado'' es el equivalente directo y mantiene la metáfora paulina de disciplina y servicio militar.'
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Siguiendo la política del proyecto, Χριστός se vierte como 'Mesías' cuando funciona como título. Aquí el genitivo forma parte de la expresión titulativa 'Mesías Jesús', no de un nombre litúrgico fijo.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Nombre propio estándar transliterado al español.
theological_decisions:
- issue: Renderizado de Χριστοῦ Ἰησοῦ
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: Se preserva el valor titulativo de Χριστός y se evita masking convencional. 'Mesías Jesús' comunica el contenido semántico del título en español y mantiene la distinción entre título y nombre.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested term Χριστός'
- issue: Naturaleza del mandato verbal
  english_pob_reading: Share in suffering
  chosen_spanish_reading: Sufre contigo
  alternative_spanish_readings:
  - Comparte el sufrimiento
  - Sufre hardship
  rationale: El griego contiene una exhortación imperativa a participar del sufrimiento; no es solo una observación. La redacción elegida conserva el tono exhortativo y la dimensión participativa del prefijo σύν-.
  doctrine_reference: BDAG συγκακοπαθέω; POB audit trail on communal nuance
translation_notes:
  revision_awareness: El registro inglés pasó por una revisión que temporalmente cambió 'Messiah Jesus' a 'Christ Jesus' y luego restauró 'Messiah' por coherencia doctrinal. La versión española sigue la decisión restaurada y documenta la alternativa tradicional 'Cristo Jesús' como lectura posible.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός conforme a la política del proyecto.
  - '''Jesús'' se conserva como nombre propio sin adaptación adicional.'
  - La imperativa directa en español evita una paráfrasis excesiva y conserva la fuerza exhortativa del aoristo.
  - '''Buen soldado'' refleja la evaluación de καλός con naturalidad en español contemporáneo.'
