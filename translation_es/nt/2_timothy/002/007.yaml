translation:
  language: es
  text: Considera[a] lo que digo; pues el Señor[b] te dará entendimiento en todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Piensa en lo que digo»; el verbo también puede llevar la idea de «comprender».'
    reason: lexical_alternative
  - marker: b
    text: «El Señor» no está más especificado en el griego; los intérpretes difieren sobre si el referente es específicamente el Señor Jesús o Dios en sentido más general.
    reason: alternative_reading
lexical_decisions:
- source_word: νόει
  english_pob_choice: Consider
  chosen_spanish: Considera
  alternatives_spanish:
  - Piensa en
  - Comprende
  lexicon: BDAG
  rationale: El imperativo presente de νοέω pide atención mental activa y reflexión. «Considera» conserva el tono exhortativo y resulta natural en español, sin cerrar la posibilidad de que el verbo también incluya el sentido de comprender.
- source_word: ὃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - las cosas que
  lexicon: BDAG
  rationale: El relativo neutro funciona de manera idiomática para introducir el contenido de la enseñanza de Pablo. «Lo que» es la equivalencia más natural y fiel en español.
- source_word: λέγω
  english_pob_choice: I am saying
  chosen_spanish: digo
  alternatives_spanish:
  - estoy diciendo
  - estoy diciendo yo
  lexicon: BDAG
  rationale: En español, el presente simple expresa con naturalidad el valor inmediato del presente de λέγω en este mandato exhortativo, sin necesidad de un progresivo que sonaría forzado.
- source_word: δώσει
  english_pob_choice: will give
  chosen_spanish: dará
  alternatives_spanish:
  - concederá
  - otorgará
  lexicon: BDAG
  rationale: El futuro de δίδωμι expresa promesa. «Dará» es la forma más directa y clara en español.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Jesús
  - Dios
  lexicon: BDAG
  rationale: Se mantiene «el Señor» como equivalente natural de κύριος, conservando la ambigüedad referencial del griego. En este contexto, el texto no especifica si se refiere de manera más precisa a Jesús o a Dios.
- source_word: σύνεσιν
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - comprensión
  - discernimiento
  lexicon: BDAG
  rationale: σύνεσις denota comprensión o capacidad de captar el sentido. «Entendimiento» es claro, bíblico y amplio en español, y refleja bien el alcance del término.
- source_word: ἐν πᾶσιν
  english_pob_choice: in all things
  chosen_spanish: en todas las cosas
  alternatives_spanish:
  - en todo
  - en todo sentido
  lexicon: BDAG
  rationale: La expresión es amplia y totalizante. «En todas las cosas» preserva esa amplitud sin restringir el alcance del texto.
theological_decisions:
- issue: Referente de «el Señor» (ὁ κύριος)
  english_pob_reading: Render generically as 'the Lord' without specifying whether Paul means the Lord Jesus or God more broadly.
  chosen_spanish_reading: Traducir simplemente «el Señor», sin precisar si se trata de Jesús o de Dios en general.
  alternative_spanish_readings:
  - el Señor Jesús
  - Dios
  rationale: El griego no identifica de manera explícita el referente más allá de κύριος. Para respetar la tensión textual y el audit trail del POB inglés, la traducción no resuelve la ambigüedad.
  doctrine_reference: Preservar la ambigüedad textual sin imponer una identificación doctrinal no explicitada por el versículo.
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la última revisión; el presente borrador sigue esa lectura estable, conservando la misma ambigüedad sobre ὁ κύριος y la misma amplitud de σύνεσις. No se registraron revisiones aplicadas en el flujo inglés.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος como forma consagrada y clara en español, sin sustituirla por una paráfrasis.
  - «Entendimiento» se usa de manera consistente para σύνεσις por su amplitud semántica y naturalidad en español.
  - La puntuación reproduce el tono exhortativo y causal del griego con dos cláusulas breves y directas.
