translation:
  language: es
  text: Y si alguien también compite como atleta[a], no es coronado si no compite conforme a las reglas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «compite». El verbo griego evoca una competencia atlética.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «legalmente» o «de manera legítima». Aquí el sentido probable es competir conforme a las reglas de la prueba.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀθλῇ
  english_pob_choice: competes as an athlete
  chosen_spanish: compite
  alternatives_spanish:
  - compite como atleta
  - compite en la arena
  - se esfuerza en la competencia
  lexicon: BDAG
  rationale: El verbo ἀθλέω remite al ámbito atlético/competitivo. En español, «compite» conserva bien la imagen de concurso y evita una perífrasis demasiado pesada; el contexto de «corona» y «reglas» ya activa la metáfora deportiva. Se deja abierta la posibilidad de «como atleta» en nota por si se desea explicitar la imagen.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguien
  alternatives_spanish:
  - cualquiera
  - una persona
  - nadie
  lexicon: BDAG
  rationale: El indefinido tiene fuerza genérica. «Alguien» suena natural en español y mantiene el valor representativo de un caso cualquiera.
- source_word: στεφανοῦται
  english_pob_choice: is crowned
  chosen_spanish: no recibe la corona
  alternatives_spanish:
  - no es coronado
  - no recibe la corona del vencedor
  - no obtiene la corona
  lexicon: BDAG
  rationale: El pasivo de στεφανόω puede expresarse de manera natural como recibir la corona. En español «no recibe la corona» comunica la imagen del premio sin sonar forzado; «es coronado» queda como alternativa más literal.
- source_word: νομίμως
  english_pob_choice: according to the rules
  chosen_spanish: conforme a las reglas
  alternatives_spanish:
  - legítimamente
  - de manera legal
  - según las reglas
  lexicon: BDAG
  rationale: En este contexto atlético, νομίμως no exige primero la idea abstracta de «legalmente», sino de acuerdo con las normas de la competencia. «Conforme a las reglas» preserva con claridad ese sentido contextual en español.
- source_word: ἀθλήσῃ
  english_pob_choice: he competes
  chosen_spanish: compita
  alternatives_spanish:
  - haya competido
  - se esfuerce
  - entre en competencia
  lexicon: BDAG
  rationale: El aoristo subjuntivo en la cláusula condicional se refleja naturalmente con «compita». Repite el mismo campo léxico que ἀθλῇ y conserva la estructura condicional del griego.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: BDAG
  rationale: La partícula añade otro caso ilustrativo. «También» comunica el matiz aditivo de manera directa y natural.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: δέ introduce una transición suave. «Y» fluye bien en español y conserva la continuidad argumentativa.
theological_decisions:
- issue: Alcance de la corona y del premio
  english_pob_reading: Retain the athletic metaphor of a victor being crowned, without specifying a spiritual reward beyond the text.
  chosen_spanish_reading: Conservar la metáfora atlética de recibir la corona, sin precisar más allá del texto qué clase de recompensa se trata.
  alternative_spanish_readings:
  - entender la corona como recompensa escatológica
  - entenderla como aprobación ministerial
  rationale: El versículo usa una analogía deportiva para subrayar que hay una manera correcta de competir. La traducción no debe cerrar la tensión interpretativa añadiendo una explicación doctrinal que el griego no explicita.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: 'Concordancia alta con la auditoría inglesa: se conservó la secuencia condicional, la metáfora atlética y la equivalencia funcional de νομίμως como cumplimiento de reglas. No se introdujeron lecturas doctrinales adicionales; la corona queda intencionalmente abierta, como en el auditr trail inglés.'
  spanish_consistency_notes:
  - Se prefirió «compite» para mantener un español fluido sin perder la imagen atlética subyacente.
  - Se evitó «SEÑOR» u otra terminología no presente en el verso.
  - Se mantuvo «corona» como metáfora de premio sin especificar su alcance.
  - La formulación es neutra y pública, apta para lectura eclesial amplia.
