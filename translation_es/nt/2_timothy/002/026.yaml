    changes_summary: Revised 'captured alive' to 'captured' for more natural English in context, and changed 'for his will' to 'to do his will' to reflect the Greek idiom more clearly and naturally.
translation:
  language: es
  text: y puedan volver en sí de la trampa[b][a] del diablo, habiendo sido capturados por él para hacer su voluntad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo sido tomados cautivos por él para hacer la voluntad de aquel». Algunos entienden que «aquel» se refiere no al diablo, sino a Dios.
    reason: alternative_reading
  - marker: b
    text: El verbo griego puede sugerir más específicamente «capturados vivos», pero en español «capturados» comunica de manera más natural el resultado de la acción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνανήψωσιν
  english_pob_choice: may come to their senses
  chosen_spanish: puedan volver en sí
  alternatives_spanish:
  - puedan recobrar el juicio
  - puedan recuperar la sobriedad
  lexicon: BDAG
  rationale: El verbo griego sugiere recuperar claridad mental o sobriedad. «Volver en sí» comunica bien en español la idea de salir del engaño y recuperar juicio, sin volverla una paráfrasis excesiva.
- source_word: παγίδος
  english_pob_choice: snare
  chosen_spanish: trampa
  alternatives_spanish:
  - lazo
  - red
  lexicon: BDAG
  rationale: «Trampa» es un equivalente natural y claro en español para παγίς. Mantiene la metáfora de atrapamiento; «lazo» sería más bíblico en tono, pero menos directo para lectores modernos.
- source_word: διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el acusador
  - el calumniador
  lexicon: BDAG
  rationale: Aquí διάβολος funciona como el título personal de Satanás. «El diablo» es la equivalencia directa y natural en español.
- source_word: ἐζωγρημένοι
  english_pob_choice: having been captured alive
  chosen_spanish: habiendo sido capturados
  alternatives_spanish:
  - habiendo sido apresados
  - habiendo sido tomados cautivos
  lexicon: BDAG
  rationale: El griego indica un estado resultante de captura. Aunque ζωγρέω puede sugerir «capturar vivo», en español esa precisión puede sonar forzada; por eso se conserva el sentido principal con «capturados», dejando abierta la fuerza de captura previa sin añadir una glosa innecesaria en el texto principal.
- source_word: ὑπ’ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - por el diablo
  lexicon: BDAG
  rationale: El pronombre retoma al diablo mencionado antes. «Por él» evita redundancia y respeta la conexión referencial.
- source_word: εἰς τὸ ἐκείνου θέλημα
  english_pob_choice: to do his will
  chosen_spanish: para hacer su voluntad
  alternatives_spanish:
  - para su voluntad
  - para cumplir su voluntad
  lexicon: BDAG
  rationale: La construcción εἰς con el sustantivo puede expresar finalidad. «Para hacer su voluntad» reproduce de forma natural la función de finalidad y la idea de obediencia activa presente en el contexto.
theological_decisions:
- issue: Referente de ἐκείνου en εἰς τὸ ἐκείνου θέλημα
  english_pob_reading: The pronoun refers to the devil, yielding 'to do his will.'
  chosen_spanish_reading: 'El pronombre se refiere al diablo: «para hacer su voluntad».'
  alternative_spanish_readings:
  - 'El pronombre puede referirse a Dios: «para hacer la voluntad de aquel» / «para hacer su voluntad» con sentido de rescate hacia la voluntad de Dios.'
  rationale: El antecedente más inmediato es «el diablo» en la frase anterior, así que la lectura más natural es que «su» se refiera a él. Se conserva la tensión interpretativa en nota porque la tradición exegética ha discutido este punto.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla artificialmente
translation_notes:
  revision_awareness: 'El audit trail inglés revisó la frase desde una formulación más literal («captured alive» / «for his will») hacia una expresión más natural («captured by him to do his will»). La presente versión española sigue esa dirección: conserva la fuerza de captura y finalidad, pero evita una glosa demasiado rígida en el cuerpo principal, dejando la ambigüedad del referente en nota.'
  spanish_consistency_notes:
  - Se usa «el diablo» para διάβολος, conforme al valor personal del término en el contexto.
  - Se usa «voluntad» para θέλημα, manteniendo el sustantivo de finalidad y obediencia.
  - «Volver en sí» conserva la metáfora de sobriedad/claridad mental sin introducir una explicación interpretativa amplia en el texto principal.
  - El pronombre «su» se mantiene deliberadamente ambiguo en el cuerpo del texto, con aclaración en nota, para reflejar la tensión textual documentada.
