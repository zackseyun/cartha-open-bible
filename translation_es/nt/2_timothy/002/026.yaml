  text: καὶ ἀνανήψωσιν ἐκ τῆς τοῦ διαβόλου παγίδος, ἐζωγρημένοι ὑπ’ αὐτοῦ εἰς τὸ ἐκείνου θέλημα.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/026.yaml
  text: and they may come to their senses out of the devil’s snare[b][a], having been captured by him to do his will.
  footnotes:
  - marker: a
    text: Or 'having been taken captive by him to do that one’s will.' Some understand 'that one' to refer not to the devil but to God.
    reason: alternative_reading
  - marker: b
    text: The verb rendered 'captured alive' can also be translated more generally as 'taken captive,' but the Greek more specifically suggests being captured alive.
    reason: lexical_alternative
