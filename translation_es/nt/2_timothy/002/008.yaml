revisions:
- from: Recuerda a Jesucristo[a], resucitado[b] de entre los muertos, descendiente[c] de David, conforme a mi evangelio.
  to: Recuerda a Jesús Mesías[a], resucitado de entre los muertos, de la descendencia de David[b], conforme a mi evangelio.
  rationale: 'Se corrige el punto principal de fidelidad: Χριστός debe mantenerse como título mesiánico en este contexto, por lo que el texto principal pasa a «Jesús Mesías». También se ajusta la expresión davídica a «de la descendencia de David», que refleja mejor ἐκ σπέρματος Δαυίδ y armoniza con la nota léxica. Se eliminó la nota sobre «resucitado» porque el español principal ya comunica adecuadamente el sentido sin necesidad de una alternativa literal menos natural.'
