  text: Μνημόνευε Ἰησοῦν Χριστὸν ἐγηγερμένον ἐκ νεκρῶν, ἐκ σπέρματος Δαυίδ, κατὰ τὸ εὐαγγέλιόν μου·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/008.yaml
  text: Remember Jesus Messiah[a], raised from the dead, descended from David[b], according to my gospel.
  footnotes:
  - marker: a
    text: 'Or: ''Jesus Christ.'' The Greek title Χριστός can be rendered ''Christ'' or ''Messiah''; here ''Messiah'' is used to preserve the title''s meaning, especially alongside ''descended from David.'''
    reason: alternative_reading
  - marker: b
    text: Literally, 'from the seed of David.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
