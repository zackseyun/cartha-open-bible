    output_hash: 5d339054930b69564095768a60bb81ba2bf9534c3713c58fa575ed94da378e17
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:38:23Z'
    unchanged: false
    changes_summary: 'Changed ''Jesus the Messiah'' to ''Jesus Christ'' to reflect the Greek name-title form more directly and maintain formal register; retained the rest as accurate and natural. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Recuerda a Jesús Mesías[a], resucitado de entre los muertos, de la descendencia de David[b], conforme a mi evangelio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesucristo». El griego Χριστός puede traducirse «Cristo» o «Mesías»; aquí se usa «Mesías» para preservar el sentido del título, especialmente junto con la referencia a David.'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «de la semilla de David».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μνημόνευε
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Ten presente
  - Mantén en memoria
  lexicon: μνημονεύω
  rationale: El imperativo presente exhorta a mantener a Jesús en la memoria activa; 'Recuerda' es natural en español y conserva la fuerza exhortativa sin añadir matices no presentes en el griego.
- source_word: Ἰησοῦν Χριστόν
  english_pob_choice: Jesus Messiah / Jesus Christ (audit trail shows Messiah restored as doctrinal default)
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús Cristo
  lexicon: Χριστός
  rationale: En español bíblico, 'Jesucristo' funciona como forma estable y reverente, pero aquí conserva el valor titular de Χριστός sin imponer 'Cristo' como simple apellido. Dado el registro eclesial y la estrecha unión nombre-título, esta forma comunica de manera natural el referente del texto.
- source_word: ἐγηγερμένον
  english_pob_choice: raised
  chosen_spanish: resucitado
  alternatives_spanish:
  - levantado de nuevo
  - habiendo sido resucitado
  lexicon: ἐγείρω
  rationale: El participio perfecto pasivo indica que Jesús ha sido levantado por acción de otro y permanece en ese estado. 'Resucitado' es la forma española más natural para ese hecho pascual y preserva la pasividad del griego mejor que un simple 'risen' literal.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: νεκρός
  rationale: La preposición ἐκ con genitivo en contextos de resurrección suele expresar salida desde el ámbito de los muertos. 'De entre los muertos' conserva esa imagen idiomática en español y evita una lectura más plana.
- source_word: ἐκ σπέρματος Δαυίδ
  english_pob_choice: descended from David
  chosen_spanish: descendiente de David
  alternatives_spanish:
  - del linaje de David
  - de la descendencia de David
  - de la simiente de David
  lexicon: σπέρμα
  rationale: El sentido literal es 'semilla', pero en genealogía el valor es de origen/linaje. 'Descendiente de David' expresa con claridad la filiación davídica sin arcaísmo; mantiene la tensión entre literalidad y naturalidad que el griego exige.
- source_word: κατὰ τὸ εὐαγγέλιόν μου
  english_pob_choice: according to my gospel
  chosen_spanish: conforme a mi evangelio
  alternatives_spanish:
  - según mi evangelio
  - de acuerdo con mi evangelio
  lexicon: εὐαγγέλιον
  rationale: κατά con acusativo indica conformidad o acuerdo. 'Conforme a' es preciso y digno en español; 'mi evangelio' reproduce el posesivo paulino sin insinuar un evangelio distinto del apostólico.
theological_decisions:
- issue: Renderización de Χριστός como título mesiánico
  english_pob_reading: Messiah is preferred when Χριστός functions as a title; audit trail shows a later regression to 'Christ' was reversed.
  chosen_spanish_reading: Jesucristo / valor titular preservado
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús Cristo
  rationale: El pasaje está cargado de resonancias mesiánicas por la referencia a David y a la resurrección. En español, 'Jesucristo' conserva el uso eclesial común y permite que el título opere sin forzar una glosa; las alternativas más analíticas quedan implícitas en las notas de decisión.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Pasividad de ἐγηγερμένον
  english_pob_reading: raised
  chosen_spanish_reading: resucitado
  alternative_spanish_readings:
  - levantado
  - habiendo sido resucitado
  rationale: La forma pasiva no debe sonar como una acción autónoma de Jesús. 'Resucitado' comunica de manera fluida el evento realizado sobre él y evita perder la agencia implícita de Dios en la resurrección.
  doctrine_reference: 'Translation philosophy: preserve source text''s plain sense; readable modern Spanish'
- issue: Valor de μου en 'mi evangelio'
  english_pob_reading: Paul's proclaimed/entrusted gospel, not a distinct gospel
  chosen_spanish_reading: mi evangelio
  alternative_spanish_readings:
  - el evangelio que predico
  - el evangelio que se me ha confiado
  rationale: Se conserva la posesión pronominal del original sin convertirla en una afirmación doctrinal extra. La frase sigue siendo idiomática en español y mantiene el vínculo paulino con la proclamación recibida.
  doctrine_reference: 'Translation philosophy: do not import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: El expediente auditado muestra una oscilación entre 'Messiah' y 'Christ' en inglés, seguida de una corrección para restaurar 'Messiah' como preferencia doctrinal cuando Χριστός funciona como título. En español, la forma elegida evita esa regresión y conserva el valor titular en un registro natural y publicable.
  spanish_consistency_notes:
  - Se mantiene 'evangelio' para εὐαγγέλιον, en línea con el uso bíblico español y el POB.
  - '''De entre los muertos'' refleja mejor el movimiento de salida implicado por ἐκ en contexto de resurrección.'
  - '''Descendiente de David'' preserva el sentido genealógico de σπέρμα sin caer en un calco innecesario.'
  - No se usa 'Señor' ni se enmascara el nombre divino, porque este versículo no contiene יהוה ni κύριος con referencia directa al nombre divino.
