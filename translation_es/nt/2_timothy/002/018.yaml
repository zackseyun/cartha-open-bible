translation:
  language: es
  text: quienes se han desviado de la verdad[a], diciendo que la resurrección ya ha ocurrido[b], y están trastornando[c][e] la fe de algunos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘han fallado el blanco respecto de la verdad’ o ‘se han apartado de la verdad’.
    reason: lexical_alternative
  - marker: b
    text: Es decir, afirmaban que la resurrección futura ya había pasado.
    reason: cross_reference
  - marker: c
    text: O ‘están subvirtiendo’ o ‘están derribando’.
    reason: lexical_alternative
  - marker: d
    text: Griego ‘fe’; alternativamente, ‘confianza’ en el contexto.
    reason: alternative_reading
  - marker: e
    text: O ‘y trastornan’.
    reason: previous_rendering
lexical_decisions:
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: los cuales
  alternatives_spanish:
  - quienes
  - los que
  lexicon: BDAG
  rationale: El relativo introduce a los falsos maestros con un matiz cualitativo/referencial. En español, «los cuales» mantiene ese enlace sintáctico con tono claro y sobrio, sin sobrecargar el estilo.
- source_word: περὶ τὴν ἀλήθειαν
  english_pob_choice: from the truth
  chosen_spanish: de la verdad
  alternatives_spanish:
  - con respecto a la verdad
  - respecto de la verdad
  lexicon: BDAG
  rationale: Con ἀστοχέω, la expresión señala desviación respecto de la verdad. «De la verdad» comunica naturalmente la separación o desviación, sin perder la relación semántica con el texto griego.
- source_word: ἠστόχησαν
  english_pob_choice: have gone astray
  chosen_spanish: se han desviado
  alternatives_spanish:
  - han errado
  - han fallado el blanco
  - han se apartado
  lexicon: BDAG
  rationale: El verbo expresa desviación doctrinal o moral. «Se han desviado» conserva la idea de apartarse del camino correcto y suena más idiomático que una traducción demasiado literal de «fallado el blanco».
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: al decir
  alternatives_spanish:
  - diciendo
  - mientras dicen
  lexicon: BDAG
  rationale: 'El participio explica cómo se apartaron: mediante el contenido de su enseñanza. «Al decir» refleja bien esa relación causal o explicativa sin forzarla.'
- source_word: ἀνάστασιν
  english_pob_choice: the resurrection
  chosen_spanish: la resurrección
  alternatives_spanish:
  - una resurrección
  - el levantamiento
  lexicon: BDAG
  rationale: Aunque el griego no lleva artículo, aquí el contexto apunta a la resurrección escatológica conocida. En español, el artículo definido es el modo natural de expresar esa referencia doctrinal.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - todavía
  - a estas alturas
  lexicon: BDAG
  rationale: Adverbio temporal directo y natural en español; preserva el énfasis de la afirmación falsa.
- source_word: γεγονέναι
  english_pob_choice: has already happened
  chosen_spanish: ha ocurrido
  alternatives_spanish:
  - ha sucedido
  - ha tenido lugar
  lexicon: BDAG
  rationale: El perfecto infinitivo de γίνομαι comunica un evento presentado como ya completado. «Ha ocurrido» es natural y suficiente; el «ya» previo sostiene la fuerza aspectual del texto.
- source_word: ἀνατρέπουσιν
  english_pob_choice: are upsetting
  chosen_spanish: trastornan
  alternatives_spanish:
  - derriban
  - subvierten
  - destruyen
  lexicon: BDAG
  rationale: El verbo puede significar trastornar, subvertir u overturn. «Trastornan» conserva la idea de desestabilizar o volcar el orden interior de la fe de algunos, sin exagerar hacia destrucción total.
- source_word: τήν τινων πίστιν
  english_pob_choice: the faith of some
  chosen_spanish: la fe de algunos
  alternatives_spanish:
  - la confianza de algunos
  - la fe de ciertas personas
  lexicon: BDAG
  rationale: «Fe» es la equivalencia doctrinal estándar para πίστις y aquí mantiene la referencia a la confianza/adhesión creyente. El genitivo τινων se expresa naturalmente con «de algunos».
theological_decisions:
- issue: Alcance de «la resurrección ya ha ocurrido»
  english_pob_reading: Render as a false claim about the eschatological resurrection having already occurred, without specifying the exact heretical system behind it.
  chosen_spanish_reading: 'Presentar la afirmación falsa sin concretar más de lo que dice el versículo: que la resurrección ya ocurrió.'
  alternative_spanish_readings:
  - una resurrección espiritual ya cumplida
  - la negación de una resurrección corporal futura
  rationale: El griego reporta el contenido de la enseñanza errónea, pero no desarrolla aquí su sistema doctrinal. La traducción debe preservar esa tensión y no resolverla con una reconstrucción teológica más específica de la que el texto ofrece.
  doctrine_reference: Preservar la tensión teológica; no ampliar más allá del enunciado.
- issue: Renderización de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: La guía doctrinal de POB favorece «faith» como traducción base. En español, «fe» es la opción más natural y menos interpretativa en este contexto.
  doctrine_reference: 'Contested terms table: πίστις → fe'
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo ajustó una partícula de enlace («and are upsetting»), sin cambiar el contenido. La sintaxis griega sigue siendo un relativo con dos verbos coordinados, y la versión española conserva esa relación con una sola cláusula relativa y dos acciones en paralelo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí; no hay nombre divino en el versículo.
  - Se tradujo πίστις como «fe», coherente con el valor doctrinal estándar en POB.
  - Se optó por «trastornan» para ἀνατρέπουσιν, manteniendo una intensidad media compatible con el griego y con el audit trail inglés.
  - La nota sobre la resurrección preserva la lectura escatológica sin introducir una explicación heresiológica no explicitada por el texto.
