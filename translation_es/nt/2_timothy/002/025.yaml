  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, sin sustituirlo por una forma velada.
  - «Arrepentimiento» traduce μετάνοιαν en el sentido teológico establecido por el auditor inglés.
  - Se conserva el matiz contingente de μήποτε con «por si acaso», evitando convertirlo en certeza o simple probabilidad.
  - La construcción «los que se oponen» hace explícito el referente contextual en español, como hizo el texto inglés.
