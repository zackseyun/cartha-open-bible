translation:
  language: es
  text: El agricultor[a] que trabaja duro debe ser el primero en recibir una parte de la cosecha[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “que labora” o “que se afana”. El participio griego expresa trabajo esforzado y sostenido.'
    reason: lexical_alternative
  - marker: b
    text: Lit. “de los frutos”. En este contexto agrícola, también puede expresarse como “de la cosecha”.
    reason: lexical_alternative
lexical_decisions:
- source_word: κοπιῶντα
  english_pob_choice: hardworking
  chosen_spanish: que trabaja duro
  alternatives_spanish:
  - laborioso
  - que se afana
  - que trabaja intensamente
  lexicon: BDAG
  rationale: κοπιῶντα expresa esfuerzo intenso, fatiga o labor ardua. En español, 'que trabaja duro' comunica bien la idea de trabajo sostenido y esforzado sin volver la frase demasiado técnica o arcaica.
- source_word: γεωργὸν
  english_pob_choice: farmer
  chosen_spanish: agricultor
  alternatives_spanish:
  - campesino
  - labriego
  - cultivador
  lexicon: BDAG
  rationale: γεωργός designa a quien trabaja la tierra. 'Agricultor' es natural en español moderno y conserva el sentido agrícola mejor que un calco como 'granjero' en muchos contextos hispanos.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debe
  alternatives_spanish:
  - es necesario que
  - tiene que
  - debe necesariamente
  lexicon: BDAG
  rationale: δεῖ expresa necesidad u obligación. 'Debe' mantiene esa fuerza de obligación de manera concisa y idiomática en español.
- source_word: πρῶτον
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - primero
  - en primer lugar
  - antes que los demás
  lexicon: BDAG
  rationale: Aquí πρῶτον marca prioridad en la recepción de la recompensa o participación. 'El primero' conserva esa prioridad dentro de una construcción natural en español.
- source_word: τῶν καρπῶν
  english_pob_choice: of the crops
  chosen_spanish: de los frutos
  alternatives_spanish:
  - de las cosechas
  - del fruto
  - de la producción
  lexicon: BDAG
  rationale: Aunque el contexto agrícola permite 'cosechas', καρπῶν es literalmente 'frutos'. 'Frutos' mantiene la conexión más directa con el griego, mientras que en español sigue siendo comprensible como resultado de la labor del campo.
- source_word: μεταλαμβάνειν
  english_pob_choice: to receive a share
  chosen_spanish: recibir una parte
  alternatives_spanish:
  - participar de
  - tomar parte de
  - recibir su porción
  lexicon: BDAG
  rationale: μεταλαμβάνειν implica recibir o participar de una porción. 'Recibir una parte' expresa con claridad el sentido partitivo sin imponer una formulación eclesiástica ajena al contexto.
theological_decisions:
- issue: Prioridad en la participación del fruto del trabajo
  english_pob_reading: The verse states the principle that the one who labors should have prior participation in the results of that labor.
  chosen_spanish_reading: El versículo enuncia el principio de que quien trabaja debe tener prioridad para recibir parte del fruto de su labor.
  alternative_spanish_readings:
  - El agricultor debe trabajar primero antes de participar de los frutos.
  - Quien labra la tierra debe ser el primero en comer de la cosecha.
  rationale: La sintaxis griega vincula πρῶτον con la recepción de la porción, no con la mera anterioridad del trabajo. Por eso la traducción conserva la idea de prioridad en recibir parte del resultado, no solo la de trabajar antes de comer.
  doctrine_reference: 2 Timoteo 2:6; cf. 1 Corintios 9:10
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones sustanciales. Se mantuvo la lectura de prioridad en la participación del resultado del trabajo, evitando desplazar πρῶτον al mero orden temporal del laborar.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el hebreo o el griego lo exija explícitamente; este versículo no lo contiene.
  - Se prefirió 'agricultor' sobre 'siervo' o términos eclesiásticos, porque γεωργός es un trabajador de la tierra.
  - Se mantuvo 'frutos' en el texto y se aclaró en nota la posibilidad de entenderlo como cosecha o producción.
  - La frase 'recibir una parte' conserva el matiz partitivo de μεταλαμβάνειν sin introducir un término doctrinal ajeno.
