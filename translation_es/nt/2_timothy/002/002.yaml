base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/002.yaml
  text: And what you heard from me in the presence of many witnesses[a], entrust these things to faithful men[b], who will be competent to teach others also.
  footnotes:
  - marker: a
    text: Or 'before many witnesses.' The Greek phrase may emphasize that Paul's teaching was given publicly with many witnesses present; less likely, it could be understood as 'through many witnesses.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'faithful men.' The masculine form may be used representatively; alternatively, 'faithful people' or 'faithful persons.'
    reason: lexical_alternative
