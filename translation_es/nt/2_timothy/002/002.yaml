translation:
  language: es
  text: Y lo que oíste de mí en presencia de muchos testigos[a], encomienda estas cosas a hombres fieles[b], que serán competentes para enseñar también a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ante muchos testigos’. La expresión griega puede destacar que la enseñanza de Pablo fue dada públicamente con muchos testigos presentes; menos probablemente, podría entenderse como ‘por medio de muchos testigos’.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: ‘hombres fieles’. La forma masculina puede ser representativa; alternativamente, ‘personas fieles’ o ‘personas’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἃ ἤκουσας παρ’ ἐμοῦ
  english_pob_choice: And what you heard from me
  chosen_spanish: Y lo que oíste de mí
  alternatives_spanish:
  - Y las cosas que oíste de mí
  - Y aquello que oíste de mí
  lexicon: ἀκούω / παρά
  rationale: ‘Lo que oíste’ conserva el sentido de contenido recibido sin volver la frase pesada. ‘De mí’ reproduce el origen personal de la enseñanza indicado por παρά + genitivo.
- source_word: διὰ πολλῶν μαρτύρων
  english_pob_choice: in the presence of many witnesses
  chosen_spanish: en presencia de muchos testigos
  alternatives_spanish:
  - ante muchos testigos
  - por medio de muchos testigos
  lexicon: διά + genitive / μάρτυς
  rationale: ‘En presencia de’ expresa bien el valor circunstancial más probable en este contexto, siguiendo el audit trail inglés. ‘Testigos’ mantiene el término natural y transparente para μάρτυρες.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: lo
  alternatives_spanish:
  - estas cosas
  - esto
  lexicon: οὗτος
  rationale: Aunque el griego retoma ‘estas cosas’, en español el objeto directo pronominal ‘lo’ evita repetición y sigue remitiendo al contenido previamente mencionado.
- source_word: παράθου
  english_pob_choice: entrust
  chosen_spanish: encomiéndalo
  alternatives_spanish:
  - confíalo
  - entrégalo en depósito
  lexicon: παρατίθημι
  rationale: ‘Encomendar’ comunica la idea de poner algo bajo cuidado y responsabilidad de otro, conservando la noción de mayordomía que lleva el verbo.
- source_word: πιστοῖς
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - confiables
  - leales
  lexicon: πιστός
  rationale: ‘Fieles’ mantiene el valor de confiabilidad y constancia, y es la correspondencia más natural en español para el carácter requerido de las personas que recibirán la enseñanza.
- source_word: ἀνθρώποις
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - seres humanos
  lexicon: ἄνθρωπος
  rationale: Se conserva la forma masculina plural del griego, como en el audit trail inglés, sin forzar una neutralización que el texto base no explicita. En español, ‘hombres’ puede funcionar con fuerza representativa, y el matiz amplio queda resguardado en nota.
- source_word: οἵτινες ἱκανοὶ ἔσονται
  english_pob_choice: who will be competent
  chosen_spanish: que serán competentes
  alternatives_spanish:
  - que serán capaces
  - que serán aptos
  lexicon: ἱκανός / εἰμί
  rationale: ‘Competentes’ expresa adecuación y capacidad para la tarea de enseñar, de manera clara y fiel al sentido de ἱκανός.
- source_word: καὶ ἑτέρους διδάξαι
  english_pob_choice: to teach others also
  chosen_spanish: para enseñar también a otros
  alternatives_spanish:
  - para instruir también a otros
  - y enseñar también a otros
  lexicon: διδάσκω / ἕτερος
  rationale: La finalidad queda bien marcada con ‘para’, y ‘otros’ conserva la referencia a personas distintas de los receptores iniciales. ‘También’ refleja καί con sentido aditivo.
theological_decisions:
- issue: Alcance representativo de πιστοῖς ἀνθρώποις / ἀνθρώποις
  english_pob_reading: faithful men
  chosen_spanish_reading: hombres fieles
  alternative_spanish_readings:
  - personas fieles
  - personas de confianza
  rationale: Se mantiene la lectura masculina plural como forma del texto, siguiendo el audit trail inglés, pero la nota permite la posibilidad representativa que el griego puede tener en contexto. No se impone una neutralización que el texto no demanda explícitamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión sigue de cerca el paquete fuente griego y el audit trail inglés. Se mantuvo la distinción de género del plural masculino en ἀνθρώποις, pero se preservó la posibilidad representativa en nota, tal como la POB inglesa. No se detectaron revisiones previas aplicables en este versículo.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como norma general cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva ‘fieles’ para πιστοῖς, en coherencia con otros contextos de confiabilidad y lealtad.
  - ‘Encomendar’ se usa aquí en el sentido de poner algo bajo cuidado responsable, no como mero consejo.
  - ‘Competentes’ se eligió para ἱκανοί por su claridad moderna y su relación con la aptitud para enseñar.
