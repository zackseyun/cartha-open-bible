translation:
  language: es
  text: Pero rechaza las controversias[a] necias e ignorantes, sabiendo que producen[b] contiendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa: «cuestiones» o «debates»; el sustantivo griego puede referirse a preguntas o investigaciones, pero aquí probablemente designa disputas polémicas más que una búsqueda sincera.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «engendran» o «dan a luz a»; la expresión es metafórica y presenta las contiendas como resultado generado por esas controversias.
    reason: lexical_alternative
lexical_decisions:
- source_word: μωρὰς
  english_pob_choice: foolish
  chosen_spanish: necias
  alternatives_spanish:
  - insensatas
  - necias
  - tontas
  lexicon: BDAG
  rationale: μωρός expresa falta de sensatez; en español, "necias" conserva el tono valorativo y funciona con naturalidad en un registro bíblico digno sin sonar demasiado coloquial.
- source_word: ἀπαιδεύτους
  english_pob_choice: ignorant
  chosen_spanish: ignorantes
  alternatives_spanish:
  - sin instrucción
  - no instruidas
  - incultas
  lexicon: BDAG
  rationale: El término apunta a falta de formación o instrucción; "ignorantes" sigue la revisión inglesa reciente y mantiene la fuerza directa del adjetivo en este contexto de disputas especulativas.
- source_word: ζητήσεις
  english_pob_choice: controversies
  chosen_spanish: discusiones
  alternatives_spanish:
  - cuestiones
  - debates
  - controversias
  lexicon: BDAG
  rationale: Aunque el término puede significar "preguntas" o "investigaciones", aquí el contexto de 2 Timoteo sugiere intercambios polémicos. "Discusiones" comunica el carácter contencioso sin sonar excesivamente técnico; "controversias" queda como alternativa más fuerte si se quisiera reflejar más explícitamente la disputa.
- source_word: παραιτοῦ
  english_pob_choice: refuse
  chosen_spanish: rechaza
  alternatives_spanish:
  - evita
  - rehúsa
  - aléjate de
  lexicon: BDAG
  rationale: El imperativo medio pide declinar o apartarse de esas discusiones. "Rechaza" expresa con claridad la orden y conserva el tono firme del mandato.
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque sabes
  - ya que sabes
  lexicon: BDAG
  rationale: El participio introduce la razón de la exhortación. "Sabiendo" mantiene la relación participial y fluye bien en español.
- source_word: γεννῶσι
  english_pob_choice: produce
  chosen_spanish: producen
  alternatives_spanish:
  - engendran
  - dan a luz a
  - generan
  lexicon: BDAG
  rationale: La imagen literal es de engendrar o dar a luz, pero aquí es metafórica. "Producen" conserva el valor causal de forma clara y natural, como en el inglés POB.
- source_word: μάχας
  english_pob_choice: quarrels
  chosen_spanish: contiendas
  alternatives_spanish:
  - peleas
  - riñas
  - disputas
  lexicon: BDAG
  rationale: μάχη puede abarcar combate o disputa; en este contexto el sentido es polémico-relacional. "Contiendas" preserva la gravedad y el matiz de conflicto verbal mejor que términos demasiado cotidianos.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ marca contraste suave con la exhortación anterior; "Pero" es la forma más natural en español para reproducir ese giro.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió "ignorant" en lugar de "uninstructed" para ἀπαιδεύτους. En español se optó por "ignorantes" por naturalidad y por continuidad con esa decisión auditada, mientras que se conservó la tensión semántica de ζητήσεις como discusiones polémicas y de γεννῶσι como metáfora causal.
  spanish_consistency_notes:
  - Se evita "SEÑOR" porque este versículo no contiene el tetragrámaton ni una cita directa de κύριος con valor de nombre divino.
  - '"Discusiones" en el texto principal deja abierta la gama semántica de ζητήσεις; la nota aclara la alternativa de "cuestiones/debates/controversias".'
  - '"Contiendas" se usa para μάχας por su fuerza relacional y conflictiva, sin reducirlo a pelea física.'
  - 'La puntuación y el orden siguen el flujo imperativo + participio causal del griego: mandato primero, razón después.'
