revisions:
- from: Pero rechaza las discusiones necias e ignorantes[a], sabiendo que producen contiendas[b].
  to: Pero rechaza las controversias[a] necias e ignorantes, sabiendo que producen[b] contiendas.
  rationale: 'Se cambió «discusiones» por «controversias» para reflejar mejor ζητήσεις en contexto y mejorar la naturalidad de la combinación con «necias e ignorantes». También se reubicaron los marcadores de notas para que correspondan exactamente a las palabras explicadas: ζητήσεις y γεννῶσι.'
