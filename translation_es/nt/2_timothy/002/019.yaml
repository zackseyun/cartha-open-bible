revisions:
- from: 'Sin embargo[a], el firme fundamento de Dios permanece en pie, teniendo este sello: «El Señor conoce a los que son suyos», y[b]: «Apártese de la injusticia todo el que invoca el nombre del Señor».'
  to: 'Sin embargo[a], el firme fundamento de Dios permanece en pie, teniendo este sello: «El Señor conoce a los que son suyos», y[b]: «Apártese de la injusticia todo el que nombra el nombre del Señor».'
  rationale: 'La revisión es pequeña pero necesaria para alinear el español con la evidencia fuente y con la decisión auditada del POB inglés: se restaura en el texto principal la formulación más literal del modismo griego (''nombra el nombre del Señor'') y se deja la lectura idiomática (''invoca el nombre del Señor'') en la nota. También se corrige la redacción de la nota b para un español natural.'
  reviewer_model: gpt-5.4
