source:
  edition: SBLGNT
  text: ὁ μέντοι στερεὸς θεμέλιος τοῦ θεοῦ ἕστηκεν, ἔχων τὴν σφραγῖδα ταύτην· Ἔγνω κύριος τοὺς ὄντας αὐτοῦ, καί· Ἀποστήτω ἀπὸ ἀδικίας πᾶς ὁ ὀνομάζων τὸ ὄνομα κυρίου.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/019.yaml
  text: 'Nevertheless[a], the firm foundation of God stands, having this seal: “The Lord knows those who are his,” and[b], “Let everyone who names the name of the Lord depart from unrighteousness.”'
  footnotes:
  - marker: a
    text: Or 'bearing this inscription.' The word translated 'seal' can refer to the identifying mark or inscription on a seal.
    reason: lexical_alternative
  - marker: b
    text: Or 'everyone who calls on the name of the Lord.' The Greek literally says 'names the name of the Lord,' an idiom for invoking or professing allegiance to him.
    reason: lexical_alternative
