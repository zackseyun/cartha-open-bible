translation:
  language: es
  text: 'Sin embargo[a], el firme fundamento de Dios permanece en pie, teniendo este sello: «El Señor conoce a los que son suyos», y[b]: «Apártese de la injusticia todo el que nombra el nombre del Señor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llevando esta inscripción». La palabra traducida aquí «sello» puede referirse a la marca identificadora o a la inscripción de un sello.
    reason: lexical_alternative
  - marker: b
    text: O «todo el que invoca el nombre del Señor». El griego dice literalmente «nombra el nombre del Señor», un modismo para invocarlo o profesar lealtad a él.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέντοι
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Sin embargo
  lexicon: BDAG
  rationale: Expresa con naturalidad el contraste fuerte con lo anterior sin perder el valor concesivo/adversativo del griego y del inglés POB.
- source_word: στερεὸς θεμέλιος
  english_pob_choice: firm foundation
  chosen_spanish: firme fundamento
  alternatives_spanish:
  - sólido fundamento
  - fundamento firme
  lexicon: BDAG
  rationale: Conserva la imagen de estabilidad y permanencia. 'Firme fundamento' suena natural en español y mantiene la fuerza metafórica.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: La relación genitiva se conserva de forma directa y transparente; no hace falta especificarla más en el texto principal.
- source_word: ἕστηκεν
  english_pob_choice: stands
  chosen_spanish: permanece en pie
  alternatives_spanish:
  - está en pie
  - permanece
  lexicon: BDAG
  rationale: '''Permanece en pie'' comunica el estado durativo y estable del perfecto mejor que un simple pasado o un calco rígido.'
- source_word: ἔχων τὴν σφραγῖδα ταύτην
  english_pob_choice: having this seal
  chosen_spanish: teniendo este sello
  alternatives_spanish:
  - llevando este sello
  - con este sello
  lexicon: BDAG
  rationale: Se mantiene la construcción participial y la imagen de autentificación/identificación del sello. 'Sello' conserva la metáfora principal.
- source_word: σφραγῖδα
  english_pob_choice: seal
  chosen_spanish: sello
  alternatives_spanish:
  - inscripción
  - marca identificadora
  lexicon: BDAG
  rationale: El término básico es 'sello'; la posible idea de inscripción queda indicada en la nota para no borrar la tensión léxica documentada.
- source_word: Ἔγνω κύριος
  english_pob_choice: The Lord knows
  chosen_spanish: El Señor conoce
  alternatives_spanish:
  - El Señor sabe
  - El Señor ha conocido
  lexicon: BDAG
  rationale: En esta cita, el aoristo funciona como afirmación gnómica. 'Conoce' comunica mejor en español la verdad permanente que un pretérito.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Se conserva la fórmula bíblica 'Señor' para κύριος, respetando el registro escritural y la cita directiva del texto.
- source_word: τοὺς ὄντας αὐτοῦ
  english_pob_choice: those who are his
  chosen_spanish: a los que son suyos
  alternatives_spanish:
  - a los que le pertenecen
  - a sus propios
  lexicon: BDAG
  rationale: '''Son suyos'' reproduce con naturalidad la relación de pertenencia sin endurecer el participio griego ni volverlo demasiado explicativo.'
- source_word: Ἀποστήτω
  english_pob_choice: Let ... depart
  chosen_spanish: Apártese
  alternatives_spanish:
  - Aléjese
  - Sepárese
  lexicon: BDAG
  rationale: El imperativo aoristo pide una separación decisiva. En español, 'apártese' comunica bien el mandato moral y mantiene el tono formal.
- source_word: ἀπὸ ἀδικίας
  english_pob_choice: from unrighteousness
  chosen_spanish: de la injusticia
  alternatives_spanish:
  - de la maldad
  - de la iniquidad
  lexicon: BDAG
  rationale: '''ἀδικία'' puede abarcar injusticia, maldad o injusticia moral. ''Injusticia'' es una opción válida y sobria en español; se conserva la amplitud ética del término.'
- source_word: πᾶς ὁ ὀνομάζων τὸ ὄνομα κυρίου
  english_pob_choice: everyone who names the name of the Lord
  chosen_spanish: todo el que invoca el nombre del Señor
  alternatives_spanish:
  - todo el que nombra el nombre del Señor
  - todo el que confiesa el nombre del Señor
  lexicon: BDAG
  rationale: La redacción principal en español privilegia la idiomaticidad posible sin perder el valor de invocación/profesión de lealtad que el inglés POB deja en nota.
- source_word: τὸ ὄνομα κυρίου
  english_pob_choice: the name of the Lord
  chosen_spanish: el nombre del Señor
  alternatives_spanish:
  - el nombre del Señor
  lexicon: BDAG
  rationale: Se conserva la frase bíblica establecida en español, sin resolver en el texto principal la ambigüedad entre invocar y profesar el nombre.
theological_decisions:
- issue: Referente de κύριος en las dos citas del versículo
  english_pob_reading: Render both occurrences simply as 'the Lord' without specifying in the translation whether the referent is the Father, Christ, or a scriptural citation with layered referential force.
  chosen_spanish_reading: Traducir ambas apariciones como 'el Señor' sin decidir en el texto principal si el referente es el Padre, Cristo o una cita con fuerza referencial múltiple.
  alternative_spanish_readings:
  - Identificar ambas como 'Dios'
  - Identificar ambas como 'Cristo'
  - Distinguir de manera explícita un referente distinto en cada cláusula
  rationale: El griego usa κύριος sin aclaración y el contexto cita lenguaje bíblico aplicado en ámbito cristiano. La traducción debe preservar esa densidad teológica en lugar de resolverla más allá de lo que el texto dice.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La versión coincide con el último pase revisado, sin cambios necesarios respecto del texto fuente y el audit trail inglés. Se preserva la tensión lexical de σφραγίς y del modismo 'nombrar el nombre del Señor' mediante notas alternativas.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος, en armonía con la cita bíblica y sin introducir una paráfrasis teológica.
  - '''Injusticia'' conserva el campo semántico moral de ἀδικία sin estrecharlo a una sola noción jurídica.'
  - '''Sello'' se usa como término principal y ''inscripción'' queda en nota, evitando borrar la alternativa documentada.'
