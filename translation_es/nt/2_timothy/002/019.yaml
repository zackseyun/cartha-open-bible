review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: contraste adversativo, fundamento firme de Dios, imagen del sello, conocimiento del Señor de los suyos, y mandato de apartarse de la ἀδικία. También preserva correctamente la ambigüedad teológica de κύριος como ''Señor''. Sin embargo, en la segunda cita el texto principal se aparta de la decisión documentada del POB inglés: el griego dice literalmente ''nombra el nombre del Señor'', y el inglés mantuvo esa textura en el texto principal con alternativa idiomática en nota. El español principal cambió a ''invoca el nombre del Señor'', desplazando al texto base hacia la alternativa interpretativa. Además, la nota b usa ''llama sobre el nombre'', formulación poco natural en español.'
  spanish_quality_summary: 'El español es claro, digno y mayormente natural. ''Sin embargo'', ''firme fundamento'', ''permanece en pie'' y ''teniendo este sello'' funcionan bien. Hay dos reparaciones menores de calidad/ajuste: (1) conviene alinear la nota b con un español idiomático y con la explicación del modismo; (2) para preservar mejor la textura fuente sin sonar torpe, ''todo el que nombra el nombre del Señor'' puede mantenerse en el texto principal con nota aclaratoria. La puntuación con ''y[b]:'' es aceptable y refleja el griego.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: θεοῦ -> ''Dios'', κύριος -> ''Señor'', σφραγίς -> ''sello''. No hay conflicto con la preferencia ''Yahvé'', ya que aquí el texto griego cita κύριος y el POB inglés decidió conservar ''Lord'' sin resolver más el referente. La principal desalineación está en πᾶς ὁ ὀνομάζων τὸ ὄνομα κυρίου: el borrador español adoptó la alternativa idiomática en el texto principal, cuando la auditoría inglesa preservó la formulación más literal y dejó la interpretación idiomática en nota.'
  issues:
  - severity: medium
    issue: El texto principal traduce πᾶς ὁ ὀνομάζων τὸ ὄνομα κυρίου como 'todo el que invoca el nombre del Señor'.
    rationale: Aunque es una interpretación legítima del modismo, el POB inglés mantuvo 'everyone who names the name of the Lord' en el texto principal y reservó 'calls on' para nota. Para fidelidad al rastro de auditoría y a la textura retórica del griego, el español principal debería conservar 'nombra el nombre del Señor' y explicar el modismo en nota.
  - severity: low
    issue: La nota b dice 'llama sobre el nombre del Señor'.
    rationale: Es un calco poco idiomático en español. Si se ofrece una alternativa, 'invoca el nombre del Señor' o 'llama al Señor' expresa mejor el sentido documentado.
  - severity: low
    issue: La decisión léxica para ἀδικία como 'injusticia' es defendible pero menos cercana al matiz religioso amplio de 'unrighteousness'.
    rationale: No requiere adjudicación mayor; 'injusticia' puede mantenerse, aunque 'iniquidad' o 'maldad' serían alternativas más tradicionales. Dado que el inglés POB eligió 'unrighteousness' por su amplitud moral-religiosa, conviene al menos reconocer que 'injusticia' aquí se entiende en sentido moral amplio.
  revised_spanish_text: 'Sin embargo[a], el firme fundamento de Dios permanece en pie, teniendo este sello: «El Señor conoce a los que son suyos», y[b]: «Apártese de la injusticia todo el que nombra el nombre del Señor».'
  revised_footnotes:
  - marker: a
    text: O «llevando esta inscripción». La palabra traducida aquí «sello» puede referirse a la marca identificadora o a la inscripción de un sello.
    reason: lexical_alternative
  - marker: b
    text: O «todo el que invoca el nombre del Señor». El griego dice literalmente «nombra el nombre del Señor», un modismo para invocarlo o profesar lealtad a él.
    reason: lexical_alternative
  revision_rationale: 'La revisión es pequeña pero necesaria para alinear el español con la evidencia fuente y con la decisión auditada del POB inglés: se restaura en el texto principal la formulación más literal del modismo griego (''nombra el nombre del Señor'') y se deja la lectura idiomática (''invoca el nombre del Señor'') en la nota. También se corrige la redacción de la nota b para un español natural.'
