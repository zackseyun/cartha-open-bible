translation:
  language: es
  text: Esfuérzate[a] por presentarte ante Dios aprobado, como obrero que no tiene de qué avergonzarse, que traza rectamente[b] la palabra de la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Sé diligente»; el sentido es el de actuar con empeño serio y decidido.
    reason: lexical_alternative
  - marker: b
    text: O «que enseña correctamente»; más literalmente, «que corta rectamente» la palabra de la verdad.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπούδασον
  english_pob_choice: Be diligent
  chosen_spanish: Esfuérzate
  alternatives_spanish:
  - Sé diligente
  - Aplica todo tu esfuerzo
  - Procura con empeño
  lexicon: BDAG
  rationale: El imperativo aoristo expresa urgencia y empeño decidido. «Esfuérzate» comunica bien la seriedad de la exhortación en español natural; «sé diligente» es posible, pero suena más abstracto en este contexto exhortativo.
- source_word: σεαυτόν
  english_pob_choice: yourself
  chosen_spanish: te
  alternatives_spanish:
  - a ti mismo
  - tu propia persona
  lexicon: BDAG
  rationale: El reflexivo se integra de manera natural en la forma pronominal española «presentarte». Mantiene el sentido directo de la auto-presentación delante de Dios.
- source_word: δόκιμον
  english_pob_choice: approved
  chosen_spanish: aprobado
  alternatives_spanish:
  - aprobado tras la prueba
  - probado
  lexicon: BDAG
  rationale: «Aprobado» reproduce con claridad el valor evaluativo de δόκιμος en el contexto de examen ante Dios. La idea de haber sido probado queda implícita; se evita recargar el texto principal.
- source_word: παραστῆσαι
  english_pob_choice: to present
  chosen_spanish: presentarte
  alternatives_spanish:
  - colocarte delante
  - ponerte delante
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa naturalmente con «presentarte». Conserva la idea de ponerse ante Dios para evaluación o servicio, sin introducir una paráfrasis más amplia.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - delante de Dios
  - ante Dios
  lexicon: BDAG
  rationale: El dativo con παραστῆσαι puede verterse de forma directa como «a Dios». «Ante Dios» es una alternativa válida, pero «a Dios» sigue de cerca la relación verbal y resulta fluida en español.
- source_word: ἐργάτην
  english_pob_choice: a worker
  chosen_spanish: obrero
  alternatives_spanish:
  - trabajador
  - trabajador/labrador
  lexicon: BDAG
  rationale: «Obrero» conserva el oficio y la imagen de labor aplicada sin sonar tan genérico como «trabajador». Es un equivalente natural para el valor ocupacional del sustantivo griego.
- source_word: ἀνεπαίσχυντον
  english_pob_choice: with no need to be ashamed
  chosen_spanish: que no tiene de qué avergonzarse
  alternatives_spanish:
  - sin vergüenza
  - que no necesita avergonzarse
  lexicon: BDAG
  rationale: 'La frase española refleja mejor la fuerza idiomática del griego: no solo una actitud interna, sino la ausencia de motivo legítimo de vergüenza. «Sin vergüenza» sería ambiguo y demasiado abrupto.'
- source_word: ὀρθοτομοῦντα
  english_pob_choice: rightly handling
  chosen_spanish: que maneja rectamente
  alternatives_spanish:
  - que enseña correctamente
  - que corta rectamente
  - que traza rectamente
  lexicon: BDAG
  rationale: «Maneja rectamente» preserva el sentido amplio y ministerial que el POB inglés quiso mantener, sin reducir el verbo a solo «enseñar». En español mantiene la tensión entre la imagen literal de cortar recto y el uso metafórico de tratar correctamente el mensaje.
- source_word: τὸν λόγον τῆς ἀληθείας
  english_pob_choice: the word of truth
  chosen_spanish: la palabra de la verdad
  alternatives_spanish:
  - el mensaje de la verdad
  - la palabra verdadera
  lexicon: BDAG
  rationale: Se opta por «palabra de la verdad» / «palabra de la verdad» en el sentido más literal y reconocible del giro paulino. En español, «palabra de la verdad» suena más natural y fiel que un equivalente más libre como «mensaje de verdad».
theological_decisions:
- issue: Sentido de ὀρθοτομοῦντα en el ministerio de la palabra
  english_pob_reading: rightly handling the word of truth
  chosen_spanish_reading: que maneja rectamente la palabra de la verdad
  alternative_spanish_readings:
  - que enseña correctamente la palabra de la verdad
  - que corta rectamente la palabra de la verdad
  rationale: 'El texto debe preservar la tensión interpretativa: el verbo puede aludir a tratar el mensaje con exactitud, no solo a un acto estrecho de enseñanza. La redacción principal mantiene amplitud ministerial y deja abiertas las opciones más literales o más explicativas en nota.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: No se registran revisiones posteriores en el paquete auditado; la formulación inglesa más reciente quedó sin cambios, y el borrador español sigue esa misma lectura de base, manteniendo las tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se usa «Dios» para θεῷ, conforme al principio general dado.
  - Se conserva «palabra de la verdad» para λόγον τῆς ἀληθείας, siguiendo de cerca el giro paulino.
  - Se evita traducir ὀρθοτομοῦντα de manera exclusivamente técnica; la versión principal mantiene la amplitud semántica del verbo.
