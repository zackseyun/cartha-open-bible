revisions:
- from: Esfuérzate[a] por presentarte a Dios aprobado, como obrero que no tiene de qué avergonzarse, que maneja rectamente[b] la palabra de la verdad.
  to: Esfuérzate[a] por presentarte ante Dios aprobado, como obrero que no tiene de qué avergonzarse, que traza rectamente[b] la palabra de la verdad.
