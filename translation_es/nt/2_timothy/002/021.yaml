review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego: condición inferencial, limpieza reflexiva, metáfora de un vaso para honra, participios de estado resultante y finalidad para toda buena obra. Sin embargo, hay dos desajustes importantes con la evidencia y el rastro auditado: (1) las notas al pie están ancladas a palabras equivocadas; [a] se colocó tras «Por tanto» aunque la alternativa documentada corresponde a εἰς τιμήν («para honra/para uso honorable»), y [b] se colocó tras «Maestro» aunque la alternativa documentada corresponde a ἡγιασμένον («santificado/hecho santo/apartado»); (2) «Maestro» para δεσπότῃ no es la mejor opción en español para un contexto doméstico de posesión/autoridad, donde «Dueño» o «amo» reflejan mejor el sentido de δεσπότης. El resto del versículo es fiel y claro.'
  spanish_quality_summary: El español es fluido y digno. «Por tanto», «si alguien se limpia de estas cosas», «santificado» y «preparado para toda buena obra» funcionan bien. «Vaso» es aceptable, aunque algo concreto; no requiere cambio. «Para honra» suena bíblico y comprensible. La principal mejora de legibilidad y precisión léxica es cambiar «al Maestro» por «al Dueño» en esta metáfora doméstica. También es necesario corregir la ubicación y contenido de las notas para evitar confusión.
  glossary_alignment: 'No hay conflicto con los términos de proyecto como Yahvé, Mesías, etc. Sí hay una cuestión léxica local: δεσπότης no se alinea idealmente con «Maestro» en español neutral, porque «maestro» suele sugerir docente o título honorífico, mientras que el griego aquí apunta al dueño/señor de la casa en la imagen del utensilio. «Dueño» preserva mejor la racionalidad léxica documentada por el inglés («Master/owner» en contexto doméstico). «Santificado» conserva bien ἡγιασμένον.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a los términos equivocados.
    rationale: La nota [a] documenta una alternativa para εἰς τιμήν, no para «Por tanto»; y la nota [b] documenta alternativas para ἡγιασμένον, no para «Maestro». Esto distorsiona el rastro auditado y puede inducir al lector a entender variantes donde no las hay.
  - severity: medium
    issue: «Maestro» no es la mejor traducción de δεσπότῃ en este contexto.
    rationale: En una metáfora de utensilios domésticos, δεσπότης se refiere al dueño/amo de la casa. «Maestro» en español suele evocar a un profesor o un título reverencial, y debilita el matiz de propiedad y autoridad doméstica presente en el griego y en la decisión auditada.
  - severity: low
    issue: La redacción de la nota [a] tiene comillas y prefijo innecesarios.
    rationale: 'La formulación actual «''O: «para honor» o «para uso honorable».''» es tipográficamente torpe. Conviene normalizarla para claridad editorial.'
  revised_spanish_text: Por tanto, si alguien se limpia de estas cosas, será un vaso para honra[a], santificado[b], útil al Dueño, preparado para toda buena obra.
