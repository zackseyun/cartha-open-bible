translation:
  language: es
  text: Por tanto, si alguien se limpia de estas cosas, será un vaso para honra[a], santificado[b], útil al Dueño, preparado para toda buena obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para honor» o «para uso honorable».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hecho santo» o «apartado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν οὖν
  english_pob_choice: Therefore, if
  chosen_spanish: Por tanto, si
  alternatives_spanish:
  - Así que, si
  - Entonces, si
  lexicon: BDAG
  rationale: ἐὰν introduce la condición y οὖν marca la inferencia; «Por tanto, si» conserva ambas relaciones de manera natural en español.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguien
  alternatives_spanish:
  - cualquiera
  - una persona
  lexicon: BDAG
  rationale: τις es indefinido y genérico; «alguien» suena natural en español y mantiene el valor representativo sin forzar género ni plural.
- source_word: ἐκκαθάρῃ
  english_pob_choice: cleanses
  chosen_spanish: se limpia
  alternatives_spanish:
  - se purifica
  - se depura
  lexicon: BDAG
  rationale: El verbo tiene la idea de limpiar a fondo o purgar; en español «se limpia» comunica la acción de apartarse de lo impuro de forma clara y no excesivamente técnica. Mantiene el matiz reflexivo del griego.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: se
  alternatives_spanish:
  - a sí mismo
  - a sí
  lexicon: BDAG
  rationale: El reflexivo griego está integrado en la forma verbal española mediante «se», lo cual evita una repetición artificial y conserva la referencia reflexiva.
- source_word: ἀπὸ τούτων
  english_pob_choice: from these things
  chosen_spanish: de estas cosas
  alternatives_spanish:
  - de estas
  - de tales cosas
  lexicon: BDAG
  rationale: «De estas cosas» reproduce el demonstrativo y conserva la referencia a lo inmediatamente anterior sin precisar más de lo que el contexto permite.
- source_word: ἔσται
  english_pob_choice: he will be
  chosen_spanish: será
  alternatives_spanish:
  - va a ser
  - llegará a ser
  lexicon: BDAG
  rationale: Futuro simple natural en español para el valor predictivo de εἰμί.
- source_word: σκεῦος
  english_pob_choice: a vessel
  chosen_spanish: un vaso
  alternatives_spanish:
  - un vaso/recipiente
  - un utensilio
  lexicon: BDAG
  rationale: En español, «vaso» puede sonar más concreto que «vasija» para el lector general, pero aquí se usa como equivalente de objeto doméstico/recipiente en la metáfora de utensilios. Conserva la imagen de un objeto utilizable sin convertirla en una paráfrasis abstracta.
- source_word: εἰς τιμήν
  english_pob_choice: for honor
  chosen_spanish: para honra
  alternatives_spanish:
  - para honor
  - para uso honorable
  lexicon: BDAG
  rationale: «Honra» es una opción natural y solemne en español bíblico para τιμή, y preserva la oposición implícita con los vasos de deshonra del contexto inmediato. Se evita «uso honorable» porque interpreta el giro más de lo que exige el griego.
- source_word: ἡγιασμένον
  english_pob_choice: sanctified
  chosen_spanish: santificado
  alternatives_spanish:
  - hecho santo
  - consagrado
  - apartado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de ἁγιάζω expresa un estado resultante; «santificado» preserva el registro teológico y la relación con la santidad sin diluir el matiz técnico.
- source_word: εὔχρηστον
  english_pob_choice: useful
  chosen_spanish: útil
  alternatives_spanish:
  - apto
  - provechoso
  - servicial
  lexicon: BDAG
  rationale: «Útil» es el equivalente más directo y claro en español para la idea de algo apto para servicio.
- source_word: τῷ δεσπότῃ
  english_pob_choice: to the Master
  chosen_spanish: al Maestro
  alternatives_spanish:
  - al Dueño
  - al Señor
  lexicon: BDAG
  rationale: δεσπότης denota autoridad de dueño/amo. En español, «Maestro» mantiene el sentido de autoridad relacional en la imagen doméstica y evita sobrecargar la frase con un título más doctrinal o una lectura demasiado literal de «dueño».
- source_word: εἰς πᾶν ἔργον ἀγαθὸν
  english_pob_choice: for every good work
  chosen_spanish: para toda buena obra
  alternatives_spanish:
  - para cada buena obra
  - para toda obra buena
  lexicon: BDAG
  rationale: La construcción paulina se vierte de forma idiomática en español con «toda buena obra», que preserva el alcance distributivo de πᾶν ἔργον ἀγαθόν.
- source_word: ἡτοιμασμένον
  english_pob_choice: prepared
  chosen_spanish: preparado
  alternatives_spanish:
  - listo
  - dispuesto
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica un estado de preparación ya logrado; «preparado» es natural y conserva la idea de disponibilidad resultante.
theological_decisions:
- issue: Valor reflexivo y representativo de τις / ἑαυτόν
  english_pob_reading: anyone cleanses himself ... he will be
  chosen_spanish_reading: si alguien se limpia ... será
  alternative_spanish_readings:
  - si uno se limpia ... será
  - si alguien se purifica ... llegará a ser
  rationale: El griego presenta singular genérico y reflexivo. En español se conserva el carácter general con «alguien» y el reflexivo implícito en «se limpia», sin perder la fuerza personal del enunciado.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: δεσπότης en contexto metafórico de vasija y casa
  english_pob_reading: the Master
  chosen_spanish_reading: el Maestro
  alternative_spanish_readings:
  - el Dueño
  - el Señor
  rationale: El contexto de utensilio/hogar sugiere una relación de autoridad y pertenencia. «Maestro» mantiene una resonancia relacional y reconocible en español, sin forzar una identificación doctrinal explícita más allá de lo que la imagen expresa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 6
- issue: τιμή en contraste con deshonra
  english_pob_reading: for honor
  chosen_spanish_reading: para honra
  alternative_spanish_readings:
  - para honor
  - para uso honorable
  rationale: «Honra» expresa la oposición de valor y reputación presente en el contraste contextual con vasos de deshonra, y suena más natural en español bíblico que una glosa funcional.
  doctrine_reference: DOCTRINE.md §Lexical fidelity and contextual contrast
translation_notes:
  revision_awareness: Conforme al informe de revisión más reciente, no hubo cambios aplicados en la versión fuente inglesa; la presente redacción sigue de cerca el texto griego y conserva las decisiones léxicas ya auditadas.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y público propio de la serie POB.
  - «Yahvé» no aparece en este versículo; no se requiere decisión sobre el tetragrámaton.
  - Se evita «siervo» para δοῦλος porque el versículo no contiene ese término.
  - Se conserva la metáfora doméstica de vasija/uso sin convertirla en una explicación interpretativa.
