translation:
  language: es
  text: Si resistimos con firmeza[a], también reinaremos con él; si lo negamos[b], él también nos negará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perseveramos» o «soportamos con firmeza».
    reason: lexical_alternative
  - marker: b
    text: O «si lo repudiamos»; también «él nos repudiará».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπομένομεν
  english_pob_choice: endure
  chosen_spanish: perseveramos
  alternatives_spanish:
  - resistimos
  - soportamos
  - perseveramos con firmeza
  lexicon: BDAG
  rationale: ὑπομένω expresa permanecer firme bajo prueba o sufrimiento. En español, «perseveramos» conserva la idea de constancia fiel y encaja bien con la forma condicional del dicho, sin sonar tan físico como «soportamos» ni tan técnico como una paráfrasis más explícita.
- source_word: συμβασιλεύσομεν
  english_pob_choice: will reign with him
  chosen_spanish: reinaremos con él
  alternatives_spanish:
  - gobernaremos con él
  - regiremos con él
  lexicon: BDAG
  rationale: El compuesto significa «reinar juntamente con». «Reinaremos con él» expresa de manera natural la co-realeza implícita en el verbo y mantiene la imagen real mejor que «gobernaremos», que en español puede sonar más general.
- source_word: ἀρνησόμεθα
  english_pob_choice: deny him
  chosen_spanish: lo negamos
  alternatives_spanish:
  - lo repudiamos
  - lo desconocemos
  - lo disown in?
  lexicon: BDAG
  rationale: ἀρνέομαι puede significar negar, repudiar o desconocer. «Lo negamos» conserva la repetición léxica con la cláusula siguiente y es el equivalente más directo y natural para el verbo en este contexto.
- source_word: κἀκεῖνος
  english_pob_choice: he also
  chosen_spanish: él también
  alternatives_spanish:
  - también él
  - él, a su vez
  lexicon: BDAG
  rationale: La crasis κἀκεῖνος enfatiza la correspondencia recíproca. «Él también» es idiomático en español y preserva ese paralelismo sin cargar el verso con una construcción más explicativa.
- source_word: ἀρνήσεται ἡμᾶς
  english_pob_choice: will deny us
  chosen_spanish: nos negará
  alternatives_spanish:
  - nos repudiará
  - nos desconocerá
  lexicon: BDAG
  rationale: Se mantiene la misma familia verbal que en la primera cláusula. «Nos negará» reproduce la fuerza del verbo y la repetición retórica del original. En español suena natural y conserva la tensión del texto.
theological_decisions:
- issue: Fuerza de la advertencia en la segunda cláusula condicional
  english_pob_reading: 'Translate the statement straightforwardly as a real warning: ''if we deny him, he also will deny us.'''
  chosen_spanish_reading: 'Traducirla como una advertencia real: «si lo negamos, él también nos negará».'
  alternative_spanish_readings:
  - si lo negamos, él también nos repudiará
  - si lo negamos, él también nos desconocerá
  - si llegáramos a negarlo, él también nos negaría
  rationale: El griego presenta un paralelo condicional equilibrado que debe mantenerse sin suavizarse. La traducción conserva la severidad y la tensión teológica del enunciado sin resolver de antemano si la referencia es a apostasía final, pérdida de recompensa u otra categoría no explicitada por el versículo.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: El borrador sigue el acuerdo alto del audit trail inglés y no introduce revisiones sustantivas. Se conserva la correspondencia verbal entre las dos cláusulas con ἀρνέομαι, y la relación condicional se mantiene sin atenuar la advertencia.
  spanish_consistency_notes:
  - Se usa «él» para referir a Cristo, de acuerdo con el contexto implícito del decir fiel.
  - Se evita «SEÑOR» como sustituto automático porque el texto griego aquí no contiene κύριος.
  - «Negar» se mantiene en ambas cláusulas para reflejar la repetición retórica del original.
  - La puntuación con dos cláusulas condicionales y punto y coma reproduce bien el paralelismo del griego.
