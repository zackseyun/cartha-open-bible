translation:
  language: es
  text: Si somos infieles[a], él permanece fiel[b], porque no puede negarse a sí mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si no creemos»; o «si somos infieles». El verbo griego puede llevar cualquiera de esos sentidos.
    reason: lexical_alternative
  - marker: b
    text: O «confiable». Se retiene «fiel» para preservar el contraste con «infieles».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπιστοῦμεν
  english_pob_choice: are faithless
  chosen_spanish: somos infieles
  alternatives_spanish:
  - si no creemos
  - si somos incrédulos
  - si faltamos a la fe
  lexicon: BDAG
  rationale: ἀπιστέω puede expresar tanto incredulidad como falta de fidelidad. «Infieles» preserva el contraste con πιστός y deja abierta la doble resonancia de incredulidad e infidelidad moral, sin reducir el término a una sola lectura.
- source_word: πιστός
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - leal
  lexicon: BDAG
  rationale: «Fiel» mantiene el paralelismo con ἀπιστοῦμεν y conserva la fuerza relacional y teológica del contraste. «Confiable» sería posible, pero debilita ese juego de palabras.
- source_word: μένει
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - sigue
  - continúa
  - permanece constante
  lexicon: BDAG
  rationale: «Permanece» comunica continuidad estable y corresponde bien al sentido de permanencia duradera del verbo.
- source_word: ἀρνήσασθαι
  english_pob_choice: deny
  chosen_spanish: negarse
  alternatives_spanish:
  - renegarse a
  - desconocerse
  - renunciar a
  lexicon: BDAG
  rationale: En este contexto el verbo expresa la imposibilidad de repudiar o contradecir su propia identidad. «Negarse» en español capta mejor esa relación reflexiva con ἑαυτόν que «negar» a secas.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - a sí
  - a él mismo
  lexicon: BDAG
  rationale: La forma reflexiva española debe preservar el valor de ἑαυτόν referido a Dios/él mismo. «A sí mismo» es la expresión más natural y clara.
- source_word: οὐ δύναται
  english_pob_choice: cannot
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  - no le es posible
  lexicon: BDAG
  rationale: «No puede» expresa incapacidad, no mera falta de voluntad, y reproduce de modo idiomático la fuerza de δύναται.
theological_decisions:
- issue: Alcance de la fidelidad divina frente a la infidelidad humana
  english_pob_reading: The verse states that God's faithfulness persists because he cannot deny his own character; it does not specify in the main text whether this faithfulness is primarily to save, to keep promises, or to judge.
  chosen_spanish_reading: El texto afirma que la fidelidad de Dios permanece porque no puede negarse a sí mismo; no especifica en la redacción principal si esa fidelidad se manifiesta ante todo en salvar, en cumplir sus promesas o también en juzgar.
  alternative_spanish_readings:
  - Dios permanece fiel para salvar a su pueblo pese a su debilidad
  - Dios permanece fiel a su palabra, incluidas las advertencias de juicio contra la apostasía
  rationale: La frase griega afirma la constancia divina sin resolver explícitamente su implicación pastoral o doctrinal. La traducción conserva esa tensión y no la reduce a una sola aplicación confesional.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se requieren cambios respecto al estado de revisión más reciente; el texto sigue el pasaje griego SBLGNT y el audit trail inglés, conservando la tensión entre incredulidad e infidelidad y el contraste con πιστός.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino en el texto fuente; aquí no aparece.
  - Se eligió «infieles» para reflejar el rango semántico de ἀπιστοῦμεν y mantener el paralelismo con «fiel».
  - «Negarse a sí mismo» conserva la fuerza reflexiva del griego y evita introducir una paráfrasis explicativa.
  - La puntuación reproduce la cadencia breve del original con dos miembros coordinados y una cláusula causal final.
