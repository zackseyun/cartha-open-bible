review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico del griego: la condición (''Si...''), el contraste léxico entre ἀπιστοῦμεν y πιστός, la constancia de ''permanece'', y la imposibilidad de que él ''se niegue a sí mismo''. También preserva bien la tensión teológica documentada sin resolver si la fidelidad divina se expresa en salvación, promesa o juicio.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español. Sin embargo, la nota [a] repite la lectura principal ('si somos infieles') como alternativa, cuando la alternativa documentada en inglés es más bien 'si somos infieles / incrédulos / no creemos'. Conviene ajustar la nota para evitar redundancia y para reflejar mejor la ambivalencia léxica de ἀπιστέω.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. 'fiel' para πιστός y 'permanece' para μένει están bien elegidos. 'infieles' preserva adecuadamente el contraste con 'fiel', aunque la nota debe dejar más clara la alternativa de incredulidad. 'no puede negarse a sí mismo' refleja bien ἀρνήσασθαι ἑαυτὸν οὐ δύναται.
  issues:
  - severity: medium
    issue: La nota [a] repite la traducción principal como si fuera alternativa
    rationale: 'El texto principal ya dice ''Si somos infieles''. La nota actual: ''O «si no creemos»; o «si somos infieles»'' no aporta una alternativa real en su segunda opción y no refleja de manera óptima las alternativas auditadas (''disbelieve'' / ''are unfaithful'').'
  - severity: low
    issue: La nota [a] puede expresar mejor la amplitud semántica de ἀπιστέω
    rationale: Para conservar la ambivalencia entre incredulidad y falta de fidelidad, es más claro ofrecer 'si no creemos' o 'si somos incrédulos' junto con la redacción principal, en vez de repetirla.
  revised_spanish_text: Si somos infieles[a], él permanece fiel[b], porque no puede negarse a sí mismo.
  revised_footnotes:
  - marker: a
    text: O «si no creemos»; o «si somos incrédulos». El verbo griego puede expresar incredulidad o infidelidad.
    reason: lexical_alternative
  - marker: b
    text: O «confiable». Se retiene «fiel» para preservar el contraste con «infieles».
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al griego y al razonamiento del POB. Solo se corrige la nota [a] para eliminar una falsa alternativa redundante y reflejar con más precisión el abanico semántico documentado para ἀπιστέω.
