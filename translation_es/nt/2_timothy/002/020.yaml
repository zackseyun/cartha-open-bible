translation:
  language: es
  text: Ahora bien, en una casa grande no hay solamente vasos de oro y de plata, sino también de madera y de barro[a]; unos para honra[b], pero otros para deshonra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Barro» aquí se refiere a objetos de arcilla o alfarería, es decir, de loza o cerámica.
    reason: cultural_note
  - marker: b
    text: O «para uso honorable ... para uso deshonroso». El griego dice más literalmente «para honra ... para deshonra».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν μεγάλῃ δὲ οἰκίᾳ
  english_pob_choice: Now in a large house
  chosen_spanish: Ahora bien, en una casa grande
  alternatives_spanish:
  - Y en una casa grande
  - Ahora, en una casa grande
  lexicon: BDAG
  rationale: μεγάλῃ οἰκίᾳ refiere al tamaño o categoría de la casa; «casa grande» conserva la imagen sin volverla arcaica. «Ahora bien» reproduce el valor discursivo de δέ como transición.
- source_word: σκεύη
  english_pob_choice: vessels
  chosen_spanish: vasos
  alternatives_spanish:
  - vasijas
  - recipientes
  - utensilios
  lexicon: BDAG
  rationale: σκεῦος es un término amplio para objetos/recipientes de uso. En español, «vasos» mantiene bien la imagen doméstica y la amplitud metafórica, sin restringir demasiado el sentido.
- source_word: χρυσᾶ καὶ ἀργυρᾶ
  english_pob_choice: gold and silver
  chosen_spanish: de oro y de plata
  alternatives_spanish:
  - dorados y plateados
  lexicon: BDAG
  rationale: Los adjetivos griegos indican material, no solo color o apariencia. «De oro y de plata» expresa esa composición de manera natural en español.
- source_word: ξύλινα καὶ ὀστράκινα
  english_pob_choice: wooden and earthenware ones
  chosen_spanish: de madera y de barro
  alternatives_spanish:
  - de madera y de loza
  - de madera y de cerámica
  - de madera y de barro cocido
  lexicon: BDAG
  rationale: ὀστράκινα se refiere a objetos de barro cocido o alfarería. «De barro» es claro, natural y suficientemente preciso en español; se conserva la simplicidad del contraste material.
- source_word: καὶ ἃ μὲν ... ἃ δὲ ...
  english_pob_choice: and some are ... but others ...
  chosen_spanish: y unos son ... y otros ...
  alternatives_spanish:
  - y algunos son ... pero otros ...
  - y unos ... y otros ...
  lexicon: BDAG
  rationale: La construcción μέν...δέ marca contraste entre dos grupos. «Unos... y otros...» comunica bien la distribución sin forzar una interpretación funcional no explicitada en el griego.
- source_word: εἰς τιμὴν
  english_pob_choice: for honor
  chosen_spanish: para honra
  alternatives_spanish:
  - para honor
  - para uso honorable
  - para honra y estima
  lexicon: BDAG
  rationale: τιμή conserva aquí un valor abstracto de honor/estatus. «Para honra» mantiene ese campo semántico con tono bíblico natural en español, sin resolver la tensión a una mera función práctica.
- source_word: εἰς ἀτιμίαν
  english_pob_choice: for dishonor
  chosen_spanish: para deshonra
  alternatives_spanish:
  - para deshonor
  - para uso deshonroso
  - para infamia
  lexicon: BDAG
  rationale: ἀτιμία es el antónimo directo de τιμή. «Deshonra» preserva el contraste léxico y el peso abstracto del texto.
theological_decisions:
- issue: 'Cómo rendir τιμή / ἀτιμία: valor abstracto de honor o valor funcional de uso'
  english_pob_reading: Retain the more literal 'for honor ... for dishonor' in the main text
  chosen_spanish_reading: Conservar «para honra ... para deshonra» en el texto principal
  alternative_spanish_readings:
  - para uso honorable ... para uso deshonroso
  - para uso especial ... para uso común
  - para fines nobles ... para fines innobles
  rationale: El griego usa los sustantivos abstractos τιμή y ἀτιμία. Traducirlos literalmente preserva la tensión retórica y teológica del pasaje, en vez de resolverla de inmediato en una explicación utilitaria del hogar.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Coincide con el pasaje auditado de la POB inglesa en el sentido general y en la decisión de conservar el contraste literal honra/deshonra. Se adapta la imagen doméstica al español con léxico natural y se mantiene la tensión semántica de τιμή/ἀτιμία sin convertirla en una glosa funcional en el texto principal.
  spanish_consistency_notes:
  - Se conservó «Yahvé» no aplica en este versículo.
  - Se usó «vasos» como equivalente amplio de σκεύη, coherente con el lenguaje de objetos de uso doméstico.
  - Se evitó «Cristo», «SEÑOR» y otras terminologías no pertinentes al verso.
  - La puntuación y el orden sintáctico siguen un español bíblico moderno y legible.
  - Las notas mantienen alternativas importantes donde el inglés POB también las preserva.
