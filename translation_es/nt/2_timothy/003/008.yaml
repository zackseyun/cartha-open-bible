translation:
  language: es
  text: Ahora, así como Janes y Jambres se opusieron a Moisés[a], así también estos hombres se oponen a la verdad—hombres corrompidos de mente[b], descalificados respecto de la fe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “resistieron a Moisés”... “resisten la verdad”.
    reason: lexical_alternative
  - marker: b
    text: Aquí “la fe” probablemente se refiere a la fe cristiana o al mensaje apostólico, no meramente a la creencia personal.
    reason: cross_reference
lexical_decisions:
- source_word: ὃν τρόπον
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - de la misma manera que
  - tal como
  lexicon: BDAG
  rationale: Expresa la comparación introductoria de manera natural en español y conserva la fuerza correlativa del paralelo sin calcar la construcción griega.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pero
  - Y
  lexicon: BDAG
  rationale: Marca transición discursiva suave, no contraste fuerte. 'Ahora' funciona bien en español al abrir la comparación.
- source_word: Ἰάννης καὶ Ἰαμβρῆς
  english_pob_choice: Jannes and Jambres
  chosen_spanish: Janes y Jambres
  alternatives_spanish:
  - Jannes y Jambres
  lexicon: Transliteración estándar de nombres propios
  rationale: Se conserva la forma tradicional/transliterada de los nombres propios en español, con adaptación ortográfica mínima para fluidez.
- source_word: ἀντέστησαν
  english_pob_choice: opposed
  chosen_spanish: se opusieron
  alternatives_spanish:
  - resistieron
  - se enfrentaron a
  lexicon: BDAG
  rationale: El aoristo indica oposición puntual en el episodio aludido; en español, 'se opusieron' comunica bien la hostilidad activa de manera idiomática.
- source_word: Μωϋσεῖ
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Transliteración estándar de nombre propio
  rationale: Forma española estándar del nombre propio.
- source_word: οὕτως καὶ οὗτοι
  english_pob_choice: so also these men
  chosen_spanish: así también estos
  alternatives_spanish:
  - del mismo modo también estos hombres
  - así estos también
  lexicon: BDAG
  rationale: Mantiene el paralelismo con la cláusula anterior y deja el referente masculino explícito por el contexto sin añadir una palabra innecesaria en la superficie del texto.
- source_word: ἀνθίστανται
  english_pob_choice: oppose
  chosen_spanish: se oponen
  alternatives_spanish:
  - resisten
  - se enfrentan a
  lexicon: BDAG
  rationale: Tiempo presente para una oposición continua. 'Se oponen' reproduce el sentido con naturalidad y conserva el enlace con 'se opusieron'.
- source_word: τῇ ἀληθείᾳ
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad
  - la verdad del evangelio
  lexicon: BDAG
  rationale: Se conserva el artículo y el alcance amplio de la expresión. No se estrecha a 'el evangelio' en el texto principal porque la frase griega queda deliberadamente general, aunque el contexto pastoral apunta a la verdad apostólica.
- source_word: ἄνθρωποι
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - gente
  lexicon: BDAG
  rationale: El plural masculino es el valor morfológico de la palabra y el contexto habla de falsos maestros concretos; 'hombres' preserva esa fuerza sin neutralizarla.
- source_word: κατεφθαρμένοι τὸν νοῦν
  english_pob_choice: corrupted in mind
  chosen_spanish: corrompidos en la mente
  alternatives_spanish:
  - corrompidos en su mente
  - depravados en la mente
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante de corrupción. 'En la mente' conserva la acusación intelectual-moral del griego; se evita 'mente[s]' posesivo en exceso porque el acusativo de respeto no exige una posesión explícita.
- source_word: ἀδόκιμοι
  english_pob_choice: disqualified
  chosen_spanish: descalificados
  alternatives_spanish:
  - reprobados
  - no aprobados
  - incapaces de pasar la prueba
  lexicon: BDAG
  rationale: Reproduce la idea de no haber pasado la prueba o de no ser aprobados. 'Descalificados' es claro en español moderno y mantiene el matiz evaluativo de ἀδόκιμοι.
- source_word: περὶ τὴν πίστιν
  english_pob_choice: regarding the faith
  chosen_spanish: respecto de la fe
  alternatives_spanish:
  - en cuanto a la fe
  - con respecto a la fe
  lexicon: BDAG
  rationale: περί con acusativo indica referencia o esfera. 'La fe' conserva el artículo y, en contexto pastoral, puede abarcar la fe cristiana/apostólica sin cerrarla artificialmente en el texto principal.
theological_decisions:
- issue: Sentido de 'la verdad'
  english_pob_reading: the truth as a broad Pauline reference, likely to the apostolic gospel/Christian message
  chosen_spanish_reading: la verdad como referencia amplia a la verdad apostólica/cristiana sin especificarla en exceso
  alternative_spanish_readings:
  - la verdad en sentido moral general
  - la verdad del evangelio
  rationale: El contexto inmediato trata de oposición a la enseñanza apostólica. La traducción mantiene la amplitud del sintagma griego y deja que el contexto teológico haga el trabajo interpretativo.
  doctrine_reference: Preservar la tensión teológica sin resolverla en paráfrasis.
- issue: Sentido de 'la fe'
  english_pob_reading: the Christian faith or apostolic message, not merely personal belief
  chosen_spanish_reading: la fe como la fe cristiana/apostólica, no solo la confianza subjetiva
  alternative_spanish_readings:
  - fe personal
  - la fe como confianza
  rationale: En las Pastorales, con artículo definido, πίστις suele referirse al cuerpo de la fe cristiana. 'La fe' en español puede cargar ese sentido sin añadir una glosa al texto principal.
  doctrine_reference: Contexto pastoral y uso paulino de ἡ πίστις.
- issue: Tratamiento de ἄνθρωποι
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - personas
  - seres humanos
  rationale: La forma masculina plural corresponde al griego y al grupo concreto de falsos maestros. No se neutraliza la referencia por una razón de exactitud lingüística.
  doctrine_reference: Gender-accurate over gender-neutral.
translation_notes:
  revision_awareness: Se siguió el paquete de fuente y la auditoría inglesa sin cambios relevantes; el borrador español mantiene el paralelismo, el valor aspectual de los verbos y la ambigüedad teológica útil de 'la verdad' y 'la fe'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma de proyecto solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se mantiene 'la fe' con artículo definido para reflejar el uso paulino probable, evitando glosa explicativa en el cuerpo del texto.
  - '''Hombres'' conserva el masculino plural del griego y la referencia a falsos maestros concretos.'
  - Los nombres propios se han transliterado en forma española usual para legibilidad eclesial.
