revisions:
- from: Porque de entre estos son los que se meten en las casas y cautivan a mujercillas[a] cargadas de pecados, llevadas por diversas pasiones.
  to: Porque entre estos están los que se introducen furtivamente en los hogares y cautivan a mujercillas[a] cargadas de pecados[b], llevadas por diversos deseos.
  rationale: Se ajusta «de entre estos son» a «entre estos están» para un español más natural sin perder ἐκ τούτων. Se cambia «se meten en las casas» por «se introducen furtivamente en los hogares» para reflejar mejor el matiz insidioso de ἐνδύνοντες y la decisión documentada de οἰκίας como esfera doméstica. Se mantiene «cautivan» por su valor de cautiverio, pero se conserva la nota ya existente de alternativa más explícita. Se mantiene «mujercillas» y se añade la nota requerida para el diminutivo peyorativo de γυναικάρια. Se añade nota para la alternativa de σεσωρευμένα ἁμαρτίαις. Se reemplaza «diversas pasiones» por «diversos deseos» para alinearse con ἐπιθυμίαις y el audit trail inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:42:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura global del griego: pertenencia al grupo previo (ἐκ τούτων), infiltración doméstica, captura de mujeres vulnerables, condición de estar cargadas de pecados y ser conducidas por deseos diversos. Sin embargo, omite dos alternativas/explicaciones preservadas en el rastro inglés: la nota sobre «little women» para γυναικάρια y la alternativa para σεσωρευμένα ἁμαρτίαις («loaded down with sins»). Además, «casas» pierde el matiz documentado de οἰκίας como esfera doméstica/households, y «pasiones» endurece ἐπιθυμίαις más allá de «desires».'
  spanish_quality_summary: El español es legible y digno, pero puede mejorar en fidelidad y claridad contextual. «Se meten en las casas» suena natural, aunque «los hogares» o «las casas» con matiz relacional puede discutirse; dado el audit trail, conviene reflejar mejor la idea de hogares. «Mujercillas» preserva el diminutivo peyorativo y funciona en español bíblico legible. «Cautivan» es aceptable, pero requiere nota para evitar lectura romántica. «Diversos deseos» es más preciso y menos interpretativo que «diversas pasiones».
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. Las decisiones clave requieren ajuste menor al audit trail: οἰκίας debe alinearse mejor con «households», γυναικάρια debe conservar la nota léxica correspondiente, y ἐπιθυμίαις conviene verterse como «deseos» en vez de «pasiones» para no sobreinterpretar.'
