translation:
  language: es
  text: Porque entre estos están los que se introducen furtivamente en los hogares y cautivan a mujercillas[a] cargadas de pecados[b], llevadas por diversos deseos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego «mujercitas» o «mujeres pequeñas», un diminutivo con matiz peyorativo para mujeres vulnerables en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «abrumadas por pecados».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τούτων
  english_pob_choice: among these
  chosen_spanish: de entre estos
  alternatives_spanish:
  - entre estos
  - de estos
  lexicon: BDAG
  rationale: La expresión señala pertenencia al grupo ya descrito. «De entre estos» conserva la idea de procedencia interna sin volverla mecánica en español.
- source_word: ἐνδύνοντες εἰς τὰς οἰκίας
  english_pob_choice: slip into households
  chosen_spanish: se meten en las casas
  alternatives_spanish:
  - se deslizan en las casas
  - se introducen en los hogares
  lexicon: BDAG
  rationale: El verbo comunica entrada furtiva o insidiosa. «Se meten» conserva el matiz de intrusión de forma natural en español; «casas» mantiene la imagen concreta del texto griego.
- source_word: αἰχμαλωτίζοντες
  english_pob_choice: capture
  chosen_spanish: cautivan
  alternatives_spanish:
  - capturan
  - hacen cautivas
  - toman cautivas
  lexicon: BDAG
  rationale: El verbo implica tomar prisionero. «Cautivan» comunica dominación y cautiverio en un español bíblico claro, sin perder la imagen de captura.
- source_word: γυναικάρια
  english_pob_choice: little women
  chosen_spanish: mujercillas
  alternatives_spanish:
  - mujercitas
  - mujeres pequeñas
  - mujeres débiles
  lexicon: BDAG
  rationale: El diminutivo es despectivo y no se refiere a las mujeres en general. «Mujercillas» preserva el matiz peyorativo y la vulnerabilidad implícita del término.
- source_word: σεσωρευμένα ἁμαρτίαις
  english_pob_choice: burdened with sins
  chosen_spanish: cargadas de pecados
  alternatives_spanish:
  - abrumadas por pecados
  - cargadas con pecados
  - colmadas de pecados
  lexicon: BDAG
  rationale: El participio perfecto pasivo sugiere un estado acumulado y pesado. «Cargadas de pecados» transmite bien esa condición en español, con una imagen clara y directa.
- source_word: ἀγόμενα
  english_pob_choice: led along
  chosen_spanish: llevadas
  alternatives_spanish:
  - llevadas por
  - guiadas por
  - arrastradas por
  lexicon: BDAG
  rationale: El participio pasivo indica ser conducidas o impulsadas por una influencia externa. «Llevadas por» en la frase completa conserva ese matiz sin sobrerrestringirlo.
- source_word: ἐπιθυμίαις ποικίλαις
  english_pob_choice: by various desires
  chosen_spanish: por diversas pasiones
  alternatives_spanish:
  - por diversos deseos
  - por múltiples deseos
  - por varias concupiscencias
  lexicon: BDAG
  rationale: ἐπιθυμία puede ser deseo, anhelo o pasión, y aquí el contexto es moralmente negativo. «Pasiones» comunica mejor el impulso desordenado; «diversas» refleja ποικίλαις.
theological_decisions:
- issue: Alcance del término γυναικάρια
  english_pob_reading: The term is pejorative and refers to a vulnerable subset of women, not women generally.
  chosen_spanish_reading: El término es despectivo y se refiere a un subconjunto vulnerable de mujeres, no a las mujeres en general.
  alternative_spanish_readings:
  - mujeres débiles
  - mujercitas
  - mujeres ingenuas
  rationale: La traducción debe conservar el matiz peyorativo del griego sin convertirlo en una afirmación universal sobre las mujeres. «Mujercillas» mantiene la tensión entre desprecio y vulnerabilidad que el contexto requiere.
  doctrine_reference: Translation philosophy §§1, 4, 6
- issue: Imagen de cautiverio en αἰχμαλωτίζοντες
  english_pob_reading: The verb carries the imagery of seizing captives.
  chosen_spanish_reading: El verbo conserva la imagen de apresar o reducir a cautiverio.
  alternative_spanish_readings:
  - capturan
  - toman cautivas
  - esclavizan
  rationale: El texto usa una imagen de captura real, no solo de influencia psicológica. «Cautivan» permite mantener el campo semántico de cautiverio sin introducir una interpretación más fuerte que la del griego.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión inglesa reciente osciló entre «weak women» y «little women» para reflejar γυναικάρια. La redacción española adopta «mujercillas» para preservar simultáneamente el diminutivo despectivo y la idea de vulnerabilidad, sin suavizar el tono del texto. También se mantuvo la imagen de intrusión doméstica y cautiverio en una forma natural para el español.
  spanish_consistency_notes:
  - Se usó «casas» y no «hogares» para conservar la imagen concreta del griego, coherente con la lectura auditable del inglés POB.
  - Se prefirió «Yahvé» solo cuando corresponda a יהוה; este versículo no lo requiere.
  - Se evitó «Cristo» porque no aparece en el versículo.
  - «Pasiones» se eligió aquí por el matiz moral negativo de ἐπιθυμίαις; en otros contextos ἐπιθυμία puede requerir «deseos» o «anhelos».
