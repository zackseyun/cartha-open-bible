    rationale: El rastro inglés conserva «loaded down with sins» como alternativa. El español debería mantener una nota equivalente, por ejemplo «cargadas hasta abajo de pecados» o «abrumadas por pecados», para respetar el expediente auditado.
  - severity: medium
    issue: «Casas» no sigue la decisión documentada de οἰκίας como «households».
    rationale: El audit trail justifica «households» por el sentido social/doméstico. En español, «hogares» refleja mejor esa esfera que «casas», que puede sonar demasiado física.
  - severity: low
    issue: «Pasiones» sobreinterpreta ἐπιθυμίαις.
    rationale: Aunque posible en contexto moral, la decisión auditada prefirió «desires». «Deseos» es más cercano y deja el matiz negativo al contexto.
