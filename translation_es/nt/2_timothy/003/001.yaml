translation:
  language: es
  text: 'Pero sabe esto: en los últimos días vendrán tiempos difíciles[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tiempos peligrosos» o «tiempos duros». El adjetivo griego puede denotar tiempos difíciles, peligrosos o penosos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esto
  - esta cosa
  lexicon: BDAG
  rationale: El demostrativo neutro introduce la cláusula de contenido con ὅτι; «esto» en español conserva bien la referencia anticipatoria sin añadir sustantivo innecesario.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: «Pero» reproduce el giro suave o de desarrollo que marca δέ, en un español natural y bíblico sin intensificar demasiado la oposición.
- source_word: γίνωσκε
  english_pob_choice: know
  chosen_spanish: debes saber
  alternatives_spanish:
  - sabe
  - conoce
  - ten presente
  lexicon: BDAG
  rationale: 'El imperativo exhortativo se expresa con naturalidad como una orden de atención: «debes saber». Mantiene el valor de conocimiento/conciencia sin sonar rígido.'
- source_word: ὅτι
  english_pob_choice: ':'
  chosen_spanish: que
  alternatives_spanish:
  - ':'
  - pues
  lexicon: BDAG
  rationale: En español, «que» introduce de forma clara el contenido del mandato. No se necesita puntuación fuerte para expresar la subordinación gramatical del original.
- source_word: ἐν ἐσχάταις ἡμέραις
  english_pob_choice: in the last days
  chosen_spanish: en los últimos días
  alternatives_spanish:
  - en los postreros días
  - en los días finales
  lexicon: BDAG
  rationale: «Los últimos días» es la equivalencia más estable y transparente para la expresión escatológica. Conserva el alcance abierto del original sin precisar más de lo que dice el griego.
- source_word: ἐνστήσονται
  english_pob_choice: will come
  chosen_spanish: se levantarán
  alternatives_spanish:
  - vendrán
  - aparecerán
  - se presentarán
  lexicon: BDAG
  rationale: El verbo puede expresar llegada o hacerse presentes; con «se levantarán» se preserva la idea de irrupción o surgimiento de esos tiempos, evitando un futuro demasiado neutro.
- source_word: καιροὶ
  english_pob_choice: times
  chosen_spanish: tiempos
  alternatives_spanish:
  - momentos
  - épocas
  - períodos
  lexicon: BDAG
  rationale: «Tiempos» es el equivalente natural de καιροί en esta construcción y conserva el sentido de períodos o circunstancias determinadas.
- source_word: χαλεποί
  english_pob_choice: difficult
  chosen_spanish: difíciles
  alternatives_spanish:
  - duros
  - peligrosos
  - penosos
  lexicon: BDAG
  rationale: «Difíciles» comunica el amplio rango semántico de χαλεποί en español actual, sin cargar el verso con una sola matización como «peligrosos» o «duros».
theological_decisions:
- issue: Alcance de «los últimos días»
  english_pob_reading: Retain the eschatological phrase 'the last days' without narrowing it to only the period immediately before Christ's return.
  chosen_spanish_reading: Conservar «en los últimos días» sin restringirlo al tramo inmediatamente anterior a la venida final de Cristo.
  alternative_spanish_readings:
  - en el tiempo final
  - en los días postreros como solo la fase inmediatamente previa al fin
  rationale: La frase es teológicamente cargada y admite un marco escatológico más amplio. La traducción mantiene esa tensión y no fuerza una cronología más cerrada que la del griego.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma sistemática.
translation_notes:
  revision_awareness: El repaso previo no indicó cambios necesarios; este borrador sigue de cerca el texto griego y la decisión auditada en inglés de mantener la amplitud semántica de χαλεποί.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera; aquí no aparece.
  - Se mantiene «últimos días» como fórmula escatológica estable.
  - «Difíciles» conserva un registro contemporáneo y no desplaza el matiz de amenaza o dureza, que queda documentado en la nota.
  - La puntuación con dos puntos y la subordinación con «que» reproducen de manera natural la relación del original.
