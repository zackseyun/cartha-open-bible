translation:
  language: es
  text: Toda Escritura[a] es inspirada por Dios y útil para la enseñanza, para la reprensión, para la corrección[b] y para la formación en rectitud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Toda la Escritura es inspirada por Dios y útil». El griego πᾶσα γραφή puede entenderse distributivamente («toda/cada Escritura») o colectivamente («toda la Escritura»).'
    reason: alternative_reading
  - marker: b
    text: 'O: «Toda Escritura inspirada por Dios también es útil para la enseñanza, para la reprensión, para la corrección y para la formación en rectitud». Esta es una lectura gramaticalmente posible del griego, aunque menos probable en el contexto.'
    reason: alternative_reading
  - marker: c
    text: 'O: «justicia». El griego δικαιοσύνη puede referirse a justicia o a rectitud; aquí el sentido es formación moral en una vida recta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα γραφή
  english_pob_choice: Every Scripture
  chosen_spanish: Toda Escritura
  alternatives_spanish:
  - Cada Escritura
  - Toda la Escritura
  lexicon: BDAG
  rationale: En español, «Toda Escritura» preserva mejor el valor colectivo/distributivo posible de πᾶσα γραφή sin forzar una formulación demasiado literal como «Cada Escritura». «Toda la Escritura» es una alternativa natural, pero el griego permite entender la expresión como una afirmación sobre cada instancia de Escritura y también sobre el conjunto.
- source_word: θεόπνευστος
  english_pob_choice: God-breathed
  chosen_spanish: inspirada por Dios
  alternatives_spanish:
  - Dios-soplada
  - soplada por Dios
  lexicon: BDAG
  rationale: «Inspirada por Dios» es la forma más natural y reconocible en español para comunicar el sentido de θεόπνευστος. «Dios-soplada» sería demasiado duro en español, aunque más transparente morfológicamente; se evita por razón de claridad y recepción, sin negar la imagen de origen divino.
- source_word: ὠφέλιμος
  english_pob_choice: profitable
  chosen_spanish: útil
  alternatives_spanish:
  - provechosa
  - beneficiosa
  lexicon: BDAG
  rationale: «Útil» expresa bien el valor práctico y funcional de ὠφέλιμος en español actual. «Provechosa» o «beneficiosa» son posibles, pero «útil» encaja mejor con la serie final de propósitos.
- source_word: πρὸς διδασκαλίαν
  english_pob_choice: for teaching
  chosen_spanish: para enseñar
  alternatives_spanish:
  - para la enseñanza
  - para instrucción
  lexicon: BDAG
  rationale: «Para enseñar» conserva el sentido verbal y resulta natural en español. «Para la enseñanza» sería correcto pero más nominal; «para instrucción» suena algo más abstracto.
- source_word: ἐλεγμόν
  english_pob_choice: reproof
  chosen_spanish: rebatir
  alternatives_spanish:
  - reprensión
  - reproche
  lexicon: BDAG
  rationale: Se opta por «rebatir» para expresar la función de desenmascarar error y contradecirlo en el contexto de enseñanza correctiva. «Reprensión» es una alternativa válida, pero en español puede sonar más disciplinaria que la idea de exposición del error que carga ἐλεγμός. Aquí se preserva la tensión entre reproche y refutación.
- source_word: ἐπανόρθωσιν
  english_pob_choice: correction
  chosen_spanish: corregir
  alternatives_spanish:
  - corrección
  - restaurar
  lexicon: BDAG
  rationale: 'Aunque el sustantivo griego literalmente apunta a «rectificación/restauración», en esta serie de finales es más idiomático en español mantener el paralelismo verbal: «para corregir». Esta opción comunica bien la idea de poner algo derecho otra vez sin perder la fuerza normativa.'
- source_word: παιδείαν τὴν ἐν δικαιοσύνῃ
  english_pob_choice: training in righteousness
  chosen_spanish: para instruir en justicia
  alternatives_spanish:
  - para formar en justicia
  - para disciplina en justicia
  - para instruir en rectitud
  lexicon: BDAG
  rationale: «Instruir» recoge bien παιδεία como formación educativa y disciplinaria. Se elige «justicia» para δικαιοσύνῃ siguiendo el valor léxico principal, aunque en español eclesial «rectitud» también sería posible. La combinación mantiene el sentido de formación moral conforme a lo justo.
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: BDAG
  rationale: Se preserva «justicia» como la equivalencia principal de δικαιοσύνη. «Rectitud» sería una alternativa útil para enfatizar conducta moral, pero el término base se mantiene para no diluir la fuerza semántica ni convertirla en una paráfrasis interpretativa.
theological_decisions:
- issue: Relación sintáctica de θεόπνευστος y ὠφέλιμος con πᾶσα γραφή
  english_pob_reading: 'Both adjectives are taken predicatively: ''Every Scripture is God-breathed and profitable.'''
  chosen_spanish_reading: 'Ambos adjetivos se entienden predicativamente: «Toda Escritura es inspirada por Dios y útil».'
  alternative_spanish_readings:
  - «Toda Escritura inspirada por Dios es útil»
  - «Toda Escritura, si es inspirada por Dios, es útil»
  rationale: Se conserva la lectura predicativa porque es la más natural en la línea del contexto y evita restringir el sujeto a un subconjunto de Escritura. La alternativa atributiva se deja implícitamente abierta por la sintaxis española, pero no se adopta como texto principal para no borrar la tensión documentada en el audit trail.
  doctrine_reference: Preservar la tensión gramatical sin resolverla dogmáticamente; mantener la ambigüedad documentada por el POB inglés.
translation_notes:
  revision_awareness: No hubo cambios en la revisión más reciente del audit trail; se mantiene la lectura principal predicativa y la equivalencia contextual de los términos clave.
  spanish_consistency_notes:
  - Se usa «Escritura» para γραφή con sentido canónico, no como cualquier escrito.
  - Se evita «Cristo» porque el verso no contiene Χριστός ni una fórmula fija equivalente.
  - Se mantiene un registro formal y eclesial, pero con sintaxis natural en español.
  - Se preserva la serie final con paralelismo verbal («para enseñar, para rebatir, para corregir y para instruir»).
