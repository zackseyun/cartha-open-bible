  rationale: Se reubica la nota [b] para que corresponda correctamente a ἐπιστώθης y se mejora la naturalidad de la frase en español con 'llegaste a estar convencido', que expresa bien la convicción resultante sin perder fidelidad al griego ni a la auditoría inglesa.
