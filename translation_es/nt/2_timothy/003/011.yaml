translation:
  language: es
  text: 'las persecuciones, los sufrimientos, como los que me sucedieron en Antioquía, en Iconio, en Listra: ¡qué persecuciones[a] soporté!; y de todas ellas me rescató el Señor[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «qué clase de persecuciones soporté».'
    reason: lexical_alternative
  - marker: b
    text: «El Señor» probablemente se refiere al Señor Jesús, aunque el griego dice solo «el Señor».
    reason: theological_note
lexical_decisions:
- source_word: διωγμοῖς / διωγμούς
  english_pob_choice: persecutions
  chosen_spanish: persecuciones
  alternatives_spanish:
  - persecución
  - hostigamientos
  lexicon: BDAG
  rationale: διωγμός denota persecución hostil por causa de la fe o la misión. 'Persecuciones' conserva con naturalidad ese peso en español y mantiene la fuerza histórica del contexto autobiográfico.
- source_word: παθήμασιν
  english_pob_choice: sufferings
  chosen_spanish: sufrimientos
  alternatives_spanish:
  - aflicciones
  - penalidades
  lexicon: BDAG
  rationale: πάθημα abarca experiencias de sufrimiento en general. 'Sufrimientos' preserva esa amplitud sin reducir el sentido a un solo tipo de aflicción.
- source_word: οἷά μοι ἐγένετο
  english_pob_choice: such as happened to me
  chosen_spanish: como me acontecieron
  alternatives_spanish:
  - como me sucedieron
  - tales como me sucedieron
  lexicon: BDAG
  rationale: La construcción introduce ejemplos de los sufrimientos mencionados. 'Como me acontecieron' refleja ese valor ejemplar en español sin forzar una paráfrasis más libre.
- source_word: ἐν Ἀντιοχείᾳ, ἐν Ἰκονίῳ, ἐν Λύστροις
  english_pob_choice: in Antioch, in Iconium, in Lystra
  chosen_spanish: en Antioquía, en Iconio, en Listra
  alternatives_spanish:
  - en Antioquía, en Icónio, en Listra
  lexicon: N/A
  rationale: Los nombres propios se transliteran en forma reconocible para lectores hispanos, y la repetición de 'en' conserva el ritmo y la enumeración del griego.
- source_word: οἵους διωγμοὺς
  english_pob_choice: what persecutions
  chosen_spanish: qué persecuciones
  alternatives_spanish:
  - qué clase de persecuciones
  - cuáles persecuciones
  lexicon: BDAG
  rationale: La fuerza cualitativa/exclamativa de οἵους se transmite bien con 'qué persecuciones', que comunica intensidad sin ampliar indebidamente el sentido.
- source_word: ὑπήνεγκα
  english_pob_choice: I endured
  chosen_spanish: soporté
  alternatives_spanish:
  - sufrí
  - aguanté
  lexicon: BDAG
  rationale: ὑποφέρω significa llevar bajo carga o soportar. 'Soporté' es natural en español y mantiene el matiz de resistencia bajo presión.
- source_word: ἐκ πάντων
  english_pob_choice: from them all
  chosen_spanish: de todas ellas
  alternatives_spanish:
  - de todas
  - de entre todas ellas
  lexicon: BDAG
  rationale: El antecedente inmediato son las persecuciones y sufrimientos mencionados. 'De todas ellas' evita la literalidad extraña de 'desde todas' y preserva la idea de rescate desde/en medio de esas pruebas.
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: me rescató
  alternatives_spanish:
  - me libró
  - me salvó
  lexicon: BDAG
  rationale: ῥύομαι indica rescatar o librar de peligro. 'Rescató' expresa con viveza la liberación sin cargar el verbo con una lectura soteriológica más amplia que la del contexto.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: κύριος se traduce de forma estándar como 'Señor'. En este contexto paulino probablemente alude al Señor Jesús, pero el texto griego conserva solo el título, así que la versión española también lo deja así.
theological_decisions:
- issue: Referente de 'el Señor'
  english_pob_reading: Render simply as 'the Lord' without specifying 'Jesus' in the text.
  chosen_spanish_reading: Traducir simplemente 'el Señor' sin añadir 'Jesús' en el cuerpo del texto.
  alternative_spanish_readings:
  - el Señor Jesús
  rationale: Aunque en Pablo suele tratarse del Señor Jesús, el griego aquí dice únicamente ὁ κύριος. La traducción conserva esa reserva y no explicita un nombre que el texto no ofrece.
  doctrine_reference: Traducir títulos; transliterar nombres; preservar la tensión teológica cuando el texto no la resuelve explícitamente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del texto fuente inglés, especialmente el ajuste de 'from them all' para expresar con naturalidad el rescate final. Se conservó la secuencia enumerativa y la relación entre persecuciones/sufrimientos y los ejemplos de Antioquía, Iconio y Listra.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' en lugar de una expansión interpretativa para respetar el título del griego.
  - '''Persecuciones'' y ''sufrimientos'' conservan la dupla léxica del original sin fusionarlas.'
  - Los topónimos se dejaron transliterados de forma estándar y uniforme.
  - El verbo 'rescató' se eligió para ἐρρύσατο por su valor de liberación de peligro, en paralelo con el inglés POB.
