review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: participio descriptivo + contraste con δέ + imperativo final. «teniendo una forma de piedad» corresponde adecuadamente a ἔχοντες μόρφωσιν εὐσεβείας, y «negando su poder» preserva el contraste con δύναμιν αὐτῆς. «apártate de ellos» comunica correctamente ἀποτρέπου. Sin embargo, falta preservar en español la alternativa léxica documentada en el audit trail para μόρφωσιν (‘appearance of godliness’), y conviene hacer explícito el referente personal de τούτους con «estas personas» para reflejar mejor el masculino plural y evitar posible ambigüedad de «ellos».'
  spanish_quality_summary: El español es natural y legible, con tono digno y claro. No obstante, «piedad» puede sonar algo más estrecho o eclesiástico que «devoción a Dios» o «vida piadosa», aunque sigue siendo aceptable y bastante tradicional. La frase mejora ligeramente si se evita el enlace inicial «y» después del punto y coma, ya que en español suena más limpio «apártate también de estas personas» o simplemente «apártate de estas personas».
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «piedad» para εὐσέβεια es defendible en este contexto. «poder» preserva correctamente δύναμις en sentido amplio. No aparecen términos sensibles del glosario mayor como Yahvé, Mesías, δοῦλος, etc.
  issues:
  - severity: medium
    issue: Falta una nota al pie para la alternativa léxica de μόρφωσιν
    rationale: El English POB conservó explícitamente la alternativa ‘appearance of godliness’. Dado que el español elige «forma», debe preservarse la alternativa española correspondiente con anclaje en el texto.
  - severity: low
    issue: «de ellos» no explicita el referente personal de τούτους
    rationale: Aunque es comprensible, «estas personas» refleja mejor el demostrativo plural referido a personas y suena más claro en español contemporáneo.
  - severity: low
    issue: La conjunción «y» tras el punto y coma es menos natural en español
    rationale: El καὶ griego puede representarse sin necesidad de calcar la coordinación. En español, después de punto y coma, «apártate de estas personas» suena más idiomático y mantiene la fuerza exhortativa.
  revised_spanish_text: teniendo una forma[a] de piedad, pero negando su poder; apártate de estas personas.
  revised_footnotes:
  - marker: a
    text: O «apariencia de piedad». El término griego puede enfatizar la forma externa o manifestación visible; se eligió «forma» para preservar el contraste con «poder».
    reason: lexical_alternative
  revision_rationale: Se añade la nota léxica requerida para preservar la alternativa documentada en el audit trail de μόρφωσιν. También se ajusta la frase final a «apártate de estas personas» para reflejar con mayor claridad τούτους y mejorar la naturalidad del español sin apartarse del sentido del griego.
