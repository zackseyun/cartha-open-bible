translation:
  language: es
  text: teniendo una forma[a] de piedad, pero negando su poder; apártate de estas personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apariencia de piedad». El término griego puede enfatizar la forma externa o manifestación visible; se eligió «forma» para preservar el contraste con «poder».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχοντες
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - poseyendo
  - manteniendo
  lexicon: BDAG
  rationale: El participio presente pide una forma participial natural en español. «Teniendo» conserva la relación descriptiva con el contexto anterior sin añadir matices ajenos.
- source_word: μόρφωσιν
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - apariencia
  - semblante
  - configuración externa
  lexicon: BDAG
  rationale: «Forma» preserva el contraste con la realidad interna o eficaz de lo que se nombra después con δύναμιν. «Apariencia» sería posible, pero desplaza un poco el énfasis hacia lo meramente visual.
- source_word: εὐσεβείας
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - religión
  - piedad para con Dios
  lexicon: BDAG
  rationale: En español, «piedad» comunica bien la idea de una vida reverente orientada a Dios. Se evita «religión» porque podría sonar más institucional que moral/espiritual en este contexto.
- source_word: τὴν δὲ δύναμιν αὐτῆς
  english_pob_choice: but its power
  chosen_spanish: pero negando su poder
  alternatives_spanish:
  - pero negando el poder de ella
  - sino negando su eficacia
  - pero rechazando su poder
  lexicon: BDAG
  rationale: «Poder» conserva el contraste paulino entre la forma externa y la realidad eficaz de la piedad. «Su» mantiene el referente de εὐσεβείας y evita explicar de más qué clase de poder es.
- source_word: ἠρνημένοι
  english_pob_choice: denying
  chosen_spanish: negando
  alternatives_spanish:
  - habiendo negado
  - habiéndolo negado
  - renegando
  lexicon: BDAG
  rationale: Aunque el griego es participio perfecto, el audit trail inglés optó por «denying» para reflejar la estructura y mantener el paralelo con «having a form». En español, «negando» logra la misma fluidez y conserva el valor aspectual sin sobrecargar la frase.
- source_word: ἀποτρέπου
  english_pob_choice: turn away from these people
  chosen_spanish: apártate de ellos
  alternatives_spanish:
  - aléjate de ellos
  - apártate de estas personas
  - evítalos
  lexicon: BDAG
  rationale: El imperativo medio tiene la idea de apartarse o alejarse de ellos. «Apártate de ellos» preserva la imagen verbal y su fuerza exhortativa en español natural.
theological_decisions:
- issue: Contraste entre forma externa y realidad eficaz de la piedad
  english_pob_reading: Rendered as 'a form of godliness' but 'its power,' preserving the contrast between outward religious shape and the operative reality of true godliness without narrowing 'power' to one doctrinal mechanism.
  chosen_spanish_reading: «una forma de piedad, pero negando su poder» conserva el contraste entre la exterioridad religiosa y la eficacia real de la piedad.
  alternative_spanish_readings:
  - «una apariencia de piedad»
  - «una semblanza de piedad»
  - «una forma de religión»
  rationale: La frase griega distingue entre la μορφή externa y la δύναμις interna/eficaz. «Forma» + «poder» mantiene esa tensión sin reducirla a mero formalismo ni a una sola aplicación doctrinal.
  doctrine_reference: Translation philosophy §3
- issue: Alcance de δύναμις
  english_pob_reading: The English POB preserves 'power' broadly, not limited to miracles, moral transformation, or the Holy Spirit.
  chosen_spanish_reading: «poder» se deja amplio, sin especificar milagros, transformación moral o un mecanismo doctrinal concreto.
  alternative_spanish_readings:
  - «fuerza»
  - «eficacia»
  - «poder espiritual»
  rationale: El griego permite una amplitud semántica que conviene respetar. «Poder» es suficientemente amplio y fiel, mientras que «eficacia» explicaría demasiado y «poder espiritual» estrecharía el sentido.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: He seguido el último estado del audit trail inglés, especialmente la revisión que cambió 'having denied' a 'denying' para reflejar mejor el participio presente y mantener el paralelismo con 'having a form.' La redacción española adopta un presente participial natural («teniendo... negando...») y conserva la fuerza del imperativo final.
  spanish_consistency_notes:
  - Se mantiene «piedad» para εὐσέβεια en coherencia con el tono pastoral de las Pastorales.
  - Se conserva «poder» para δύναμις, sin sustituirlo por «eficacia», para no cerrar el campo semántico del texto.
  - El imperativo se traduce con «apártate», que conserva la dirección reflexiva del verbo griego y la claridad exhortativa en español.
  - No se introduce «Cristo» ni otras terminologías no presentes en el versículo.
  - La puntuación refleja la oposición del griego mediante coma y punto y coma implícitos en la segmentación española.
