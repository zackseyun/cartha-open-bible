- from: teniendo una forma de piedad, pero negando su poder; y apártate de ellos.
  to: teniendo una forma[a] de piedad, pero negando su poder; apártate de estas personas.
  rationale: Se añade la nota léxica requerida para preservar la alternativa documentada en el audit trail de μόρφωσιν. También se ajusta la frase final a «apártate de estas personas» para reflejar con mayor claridad τούτους y mejorar la naturalidad del español sin apartarse del sentido del griego.
