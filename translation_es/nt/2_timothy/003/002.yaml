revisions:
- from: Porque la gente será amante de sí[a], amante del dinero, jactanciosa, arrogante, blasfema[b], desobediente a los padres, desagradecida, impía,
  to: Porque las personas serán amantes de sí mismas[a], amantes del dinero, jactanciosas, arrogantes, calumniosas[b], desobedientes a sus padres, desagradecidas, impías,
  rationale: Se corrige la concordancia al plural para reflejar el sujeto y los calificativos griegos, y se reemplaza «la gente» por «las personas» para mantener alcance genérico con español natural. Se ajusta φίλαυτοι a «amantes de sí mismas» por claridad idiomática y paralelismo con «amantes del dinero». Se cambia βλάσφημοι a «calumniosas» como lectura principal en conformidad con la decisión auditada en inglés, preservando «blasfemas» e «insultantes» en nota. También se hace más idiomático «desobedientes a sus padres».
