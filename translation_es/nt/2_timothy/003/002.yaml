translation:
  language: es
  text: Porque las personas serán amantes de sí mismas[a], amantes del dinero, jactanciosas, arrogantes, calumniosas[b], desobedientes a sus padres, desagradecidas, impías,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amantes de sí mismos». El griego expresa amor desordenado de sí y conserva aquí la cadencia de la lista de vicios.
    reason: lexical_alternative
  - marker: b
    text: O «blasfemas» o «insultantes». El término griego puede referirse a lenguaje que deshonra tanto a personas como a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσονται
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  - habrá
  lexicon: BDAG
  rationale: El futuro de εἰμί en este contexto se expresa naturalmente en español con «será». Mantiene el valor copulativo/existencial sin añadir matices ajenos.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula introduce explicación del contexto anterior; «Porque» conserva la relación causal/explicativa de manera clara y natural en español.
- source_word: οἱ ἄνθρωποι
  english_pob_choice: people
  chosen_spanish: la gente
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: BDAG
  rationale: El griego es genérico, no masculino exclusivo. «La gente» comunica el alcance humano general con buena fluidez en español, sin restringirlo a varones.
- source_word: φίλαυτοι
  english_pob_choice: lovers of self
  chosen_spanish: amante de sí
  alternatives_spanish:
  - amantes de sí mismos
  - egoístas
  lexicon: BDAG
  rationale: El compuesto expresa amor desordenado de sí; «amante de sí» preserva la fuerza formal y el paralelismo de la lista. Se evita «egoístas» por ser más interpretativo.
- source_word: φιλάργυροι
  english_pob_choice: lovers of money
  chosen_spanish: amante del dinero
  alternatives_spanish:
  - amantes del dinero
  - codiciosos
  lexicon: BDAG
  rationale: La idea literal es amor al dinero/plata. «Amante del dinero» mantiene la correspondencia con φίλαυτοι y no reduce el término a un vicio más amplio.
- source_word: ἀλαζόνες
  english_pob_choice: boastful
  chosen_spanish: jactanciosa
  alternatives_spanish:
  - jactanciosos
  - fanfarrones
  lexicon: BDAG
  rationale: El término denota presunción y alarde. «Jactanciosa» reproduce bien el tono de la lista en un español neutral y digno.
- source_word: ὑπερήφανοι
  english_pob_choice: arrogant
  chosen_spanish: arrogante
  alternatives_spanish:
  - altiva
  - orgullosa
  lexicon: BDAG
  rationale: La palabra apunta a soberbia/arrogancia moral. «Arrogante» expresa con precisión ese sentido en español contemporáneo.
- source_word: βλάσφημοι
  english_pob_choice: slanderous
  chosen_spanish: blasfema
  alternatives_spanish:
  - calumniosa
  - difamatoria
  - insultante
  lexicon: BDAG
  rationale: El término griego puede abarcar hablar injuriosamente contra personas o contra Dios. Se conserva «blasfema» para mantener la amplitud semántica y la tensión lexical documentada; el lector puede entender aquí tanto blasfemia como habla injuriosa, según el contexto.
- source_word: γονεῦσιν ἀπειθεῖς
  english_pob_choice: disobedient to parents
  chosen_spanish: desobediente a los padres
  alternatives_spanish:
  - desobedientes a los padres
  - rebeldes a los padres
  lexicon: BDAG
  rationale: La construcción dativa con adjetivo se traduce idiomáticamente como «desobediente a los padres». Mantiene el sentido de falta de sometimiento sin añadir matices no presentes.
- source_word: ἀχάριστοι
  english_pob_choice: ungrateful
  chosen_spanish: desagradecida
  alternatives_spanish:
  - ingrata
  - sin gratitud
  lexicon: BDAG
  rationale: El significado es falta de gratitud; «desagradecida» es claro y natural en español, aunque el griego permita también «ingrata».
- source_word: ἀνόσιοι
  english_pob_choice: unholy
  chosen_spanish: impía
  alternatives_spanish:
  - irreligiosa
  - profana
  - sin reverencia
  lexicon: BDAG
  rationale: El término señala falta de piedad o de reverencia por lo sagrado. «Impía» conserva el peso religioso-moral mejor que una traducción meramente sociológica.
theological_decisions:
- issue: Alcance genérico de οἱ ἄνθρωποι
  english_pob_reading: people
  chosen_spanish_reading: la gente
  alternative_spanish_readings:
  - las personas
  - los seres humanos
  rationale: Se mantiene el referente genérico y no masculino exclusivo. «La gente» comunica que la lista describe a la humanidad en general, conforme al sentido del original y a la lectura auditada en inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de βλάσφημοι en una lista de vicios humanos
  english_pob_reading: slanderous
  chosen_spanish_reading: blasfema
  alternative_spanish_readings:
  - calumniosa
  - difamatoria
  - insultante
  rationale: Aunque el inglés optó por «slanderous» para resaltar el uso relacional, el griego mantiene una ambigüedad real entre blasfemia y habla injuriosa. En español, «blasfema» conserva esa tensión y evita estrechar el término solo a injuria humana.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la última revisión del audit trail inglés; no se registran cambios aplicados. La versión española sigue la misma decisión de mantener la lista viciosa con ritmo paralelo, preservando la tensión semántica de βλάσφημοι sin resolverla de forma reductiva.
  spanish_consistency_notes:
  - Se conservó el paralelismo nominal/adjetival de la lista para reflejar la forma del griego.
  - Se usó lenguaje neutro de registro eclesial, evitando arcaísmos innecesarios.
  - Se mantuvo una sola fila final con coma, acorde con la enumeración incompleta del versículo.
  - «Impía» se eligió por su fuerza religiosa; si se requiriera mayor explicitud, podría anotarse como «sin reverencia», pero no se incorporó al texto principal.
