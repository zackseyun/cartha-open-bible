translation:
  language: es
  text: sin afecto natural, irreconciliables[a], calumniadores[b], sin dominio propio, salvajes, sin amor por lo bueno[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «implacables» o «rompedores de treguas».
    reason: lexical_alternative
  - marker: b
    text: El griego διάβολοι aquí significa «calumniadores» o «calumniosos», no una referencia al Diablo.
    reason: lexical_alternative
  - marker: c
    text: O «que odian lo bueno».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄστοργοι
  english_pob_choice: without natural affection
  chosen_spanish: sin afecto natural
  alternatives_spanish:
  - sin afecto familiar
  - desamorados
  - desnaturalizados
  lexicon: BDAG
  rationale: ἄστοργος expresa ausencia de στοργή, la afección natural esperada especialmente en relaciones familiares o de cercanía. «Sin afecto natural» conserva bien ese valor; en español, «sin afecto familiar» aclara la referencia, pero es más explicativo que el griego. «Desnaturalizados» podría sonar a otra clase de corrupción moral y no a la falta específica de cariño natural.
- source_word: ἄσπονδοι
  english_pob_choice: irreconcilable
  chosen_spanish: irreconciliables
  alternatives_spanish:
  - implacables
  - que no aceptan tregua
  - rompedores de treguas
  lexicon: BDAG
  rationale: El término describe a quienes no entran ni mantienen condiciones de paz. «Irreconciliables» comunica bien la negativa a reconciliarse y evita sugerir principalmente la ruptura de un tratado previo. «Implacables» queda como alternativa cercana; «rompedores de treguas» suena más histórico y menos directo en español moderno.
- source_word: διάβολοι
  english_pob_choice: slanderous
  chosen_spanish: calumniadores
  alternatives_spanish:
  - slanderosos
  - acusadores
  - malhablados
  lexicon: BDAG
  rationale: Aquí διάβολοι funciona como adjetivo de lista viciosa y no como referencia al Diablo. En español, «calumniadores» comunica el sentido de hablar mal de otros con intención dañina, equivalente funcional de «slanderous». «Slanderosos» sería más calcado del inglés, pero menos natural; «acusadores» podría sugerir denuncia legítima más que maledicencia.
- source_word: ἀκρατεῖς
  english_pob_choice: without self-control
  chosen_spanish: sin dominio propio
  alternatives_spanish:
  - sin autocontrol
  - incontinentes
  - desenfrenados
  lexicon: BDAG
  rationale: El término indica falta de dominio sobre deseos e impulsos. «Sin dominio propio» es una fórmula clara y natural en español bíblico contemporáneo; «sin autocontrol» es posible, pero algo más psicológica. «Incontinentes» conserva tradición, pero hoy puede sonar técnico o ambiguo.
- source_word: ἀνήμεροι
  english_pob_choice: savage
  chosen_spanish: salvajes
  alternatives_spanish:
  - brutales
  - feroces
  - tosenos
  lexicon: BDAG
  rationale: ἀνήμερος describe a alguien no domesticado, brutal o feroz. «Salvajes» transmite bien la idea de rudeza e inhumanidad moral en una lista de vicios, con registro claro y breve. «Brutales» y «feroces» son opciones válidas, pero menos compactas o más centradas en violencia momentánea.
- source_word: ἀφιλάγαθοι
  english_pob_choice: without love for what is good
  chosen_spanish: sin amor por lo bueno
  alternatives_spanish:
  - sin amor por el bien
  - que odian lo bueno
  - enemigos de lo bueno
  lexicon: BDAG
  rationale: El compuesto significa literalmente no amar lo bueno. «Sin amor por lo bueno» preserva la fuerza privativa sin convertirla en odio activo, que sería más fuerte de lo que exige el término. «Que odian lo bueno» aparece como alternativa tradicional, pero intensifica el sentido.
theological_decisions:
- issue: Sentido de διάβολοι en la lista de vicios
  english_pob_reading: common adjective meaning 'slanderous' rather than a reference to demons or 'devils'
  chosen_spanish_reading: calumniadores, como rasgo moral de conducta, no como referencia al Diablo
  alternative_spanish_readings:
  - diablos
  - diabólicos
  - malignos
  rationale: La forma plural en esta lista funciona como calificativo ético-social. Traducirla como «diablos» introduciría una lectura ontológica ajena al contexto. «Calumniadores» mantiene el valor de hablar mal de otros de manera dañina y preserva la tensión exegética sin resolverla por la tradición.
  doctrine_reference: Primacía del uso contextual del griego sobre la asociación léxica secundaria con el título «Diablo».
translation_notes:
  revision_awareness: 'Coincide con el control más reciente: no se registraron revisiones aplicadas y el acuerdo de revisión fue alto. La redacción española se ajusta al griego de SBLGNT y al audit trail en inglés, conservando las tensiones léxicas relevantes sin sobreinterpretarlas.'
  spanish_consistency_notes:
  - Se mantiene «sin» para las tres primeras y la última cualidad privativa, conservando el paralelismo del listado.
  - «Irreconciliables» se usa como equivalente principal de ἄσπονδοι, mientras que la nota conserva alternativas legítimas.
  - «Calumniadores» evita una falsa referencia a seres demoníacos y mantiene el valor descriptivo del adjetivo plural.
  - El registro es bíblico contemporáneo, claro y no dependiente de formulaciones tradicionales como «sin afecto natural» o «sin amor para con los buenos» únicamente por costumbre.
