translation:
  language: es
  text: Y de hecho[a], todos los que quieren vivir piadosamente en el Mesías Jesús serán perseguidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Cristo Jesús».
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y además
  - Y, en efecto
  lexicon: BDAG
  rationale: Conserva la conexión coordinante con el contexto anterior sin añadir una matización excesiva; el matiz enfático queda apoyado por δέ y por el adverbio "de hecho".
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno
  lexicon: BDAG
  rationale: Expresa el alcance universal del participio substantivado de manera natural en español.
- source_word: δὲ
  english_pob_choice: indeed
  chosen_spanish: de hecho
  alternatives_spanish:
  - ciertamente
  - pues
  - ahora bien
  lexicon: BDAG
  rationale: En este contexto δέ funciona de manera leve y confirmatoria; "de hecho" comunica ese valor sin volverlo adversativo.
- source_word: οἱ θέλοντες
  english_pob_choice: who want
  chosen_spanish: los que quieren
  alternatives_spanish:
  - los que desean
  - los que están dispuestos
  lexicon: BDAG
  rationale: El participio con artículo forma un sustantivo de personas caracterizadas por su voluntad; "los que quieren" conserva la fuerza volitiva de θέλω con naturalidad.
- source_word: ζῆν
  english_pob_choice: to live
  chosen_spanish: vivir
  alternatives_spanish:
  - vivir su vida
  - seguir viviendo
  lexicon: BDAG
  rationale: Infinitivo complementario de θέλω; "vivir" es la equivalencia directa y clara en español.
- source_word: εὐσεβῶς
  english_pob_choice: godly
  chosen_spanish: piadosamente
  alternatives_spanish:
  - de manera piadosa
  - devotamente
  - en forma piadosa
  lexicon: BDAG
  rationale: El adverbio denota un modo de vida devoto y reverente ante Dios; "piadosamente" conserva el adverbial y evita una paráfrasis más libre.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se mantiene la decisión del POB de traducir Χριστός como título mesiánico cuando funciona con fuerza titular; en español, "Mesías Jesús" conserva esa lectura sin borrar la referencia a Jesús.
- source_word: διωχθήσονται
  english_pob_choice: will be persecuted
  chosen_spanish: serán perseguidos
  alternatives_spanish:
  - sufrirán persecución
  - serán objeto de persecución
  lexicon: BDAG
  rationale: El futuro pasivo de διώκω en sentido hostil se expresa de forma directa con "serán perseguidos", sin suavizar el padecimiento implícito.
theological_decisions:
- issue: Χριστῷ como título mesiánico o forma ya fijada como nombre
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La evidencia auditada favorece leer Χριστός con fuerza titulativa en esta frase. "Mesías" reproduce el contenido semántico del título y mantiene la distinción entre nombre y designación.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Carácter confirmatorio de δέ
  english_pob_reading: indeed
  chosen_spanish_reading: de hecho
  alternative_spanish_readings:
  - ciertamente
  - pues
  rationale: La partícula no introduce una oposición fuerte; se refleja mejor con una confirmación suave que preserve el tono del enunciado.
  doctrine_reference: BDAG on δέ; English POB audit note for confirmatory force
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación del intento anterior: la nota [a] ahora está anclada explícitamente en el texto mediante el marcador correspondiente.'
  spanish_consistency_notes:
  - Se mantiene "Mesías" para Χριστός, en coherencia con el criterio del POB cuando el título es activo.
  - Se traduce el adverbio εὐσεβῶς con una forma española adverbial natural, sin convertirlo en una perífrasis innecesaria.
  - La puntuación refleja la conexión de apertura y el matiz confirmatorio de δέ sin sobrecargar el verso.
