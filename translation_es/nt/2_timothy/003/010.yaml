translation:
  language: es
  text: Pero tú has seguido de cerca mi enseñanza, mi conducta, mi propósito, mi fe[a], mi paciencia, mi amor, mi perseverancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fidelidad». En esta lista, πίστις puede significar tanto fe como fidelidad.
    reason: alternative_reading
lexical_decisions:
- source_word: Σὺ δὲ
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Pero tú, en cambio
  - Y tú
  lexicon: BDAG
  rationale: δέ marca contraste con la descripción anterior; «Pero» conserva la fuerza adversativa, y el pronombre explícito «tú» refleja el énfasis de Σὺ en un español natural.
- source_word: παρηκολούθησάς
  english_pob_choice: have closely followed
  chosen_spanish: has seguido de cerca
  alternatives_spanish:
  - has seguido atentamente
  - has acompañado de cerca
  - has observado de cerca
  lexicon: BDAG
  rationale: παρακολουθέω aquí expresa seguir con atención y cercanía, probablemente en el sentido de observar y adherirse al ejemplo de Pablo. «Has seguido de cerca» conserva esa cercanía sin sonar forzado.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - de mí
  lexicon: BDAG
  rationale: 'El genitivo funciona de manera posesiva con los sustantivos siguientes: «mi enseñanza, mi conducta...».'
- source_word: διδασκαλίᾳ
  english_pob_choice: teaching
  chosen_spanish: enseñanza
  alternatives_spanish:
  - doctrina
  - instrucción
  lexicon: BDAG
  rationale: «Enseñanza» es el equivalente español más natural y fiel para la idea de contenido transmitido; evita un matiz demasiado técnico de «doctrina».
- source_word: ἀγωγῇ
  english_pob_choice: conduct
  chosen_spanish: conducta
  alternatives_spanish:
  - manera de vivir
  - comportamiento
  lexicon: BDAG
  rationale: ἀγωγή se refiere a la manera de vivir o conducta. «Conducta» es breve, clara y adecuada en una lista de virtudes.
- source_word: προθέσει
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - resolución
  - intención
  - plan
  lexicon: BDAG
  rationale: πρόθεσις designa el propósito o intención fija de Pablo; «propósito» es la forma más idiomática y precisa en esta serie.
- source_word: πίστει
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Siguiendo el criterio del proyecto, πίστις se rinde por defecto como «fe». En esta lista de virtudes, también puede sugerir fidelidad; se preserva la tensión con una nota.
- source_word: μακροθυμίᾳ
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - longanimidad paciente
  - sufrida paciencia
  lexicon: BDAG
  rationale: μακροθυμία denota paciencia y longanimidad frente a provocación. «Paciencia» es claro y moderno en español, y mantiene el contraste con ὑπομονή.
- source_word: ἀγάπῃ
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: El término se vierte como «amor», conforme al valor principal de ἀγάπη y al uso consistente del proyecto.
- source_word: ὑπομονῇ
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - endurance
  - constancia
  - resistencia
  lexicon: BDAG
  rationale: ὑπομονή expresa permanecer firme bajo prueba. «Perseverancia» comunica bien esa firmeza sostenida y distingue este término de μακροθυμία, ya traducido por «paciencia».
theological_decisions:
- issue: πίστις en una lista de virtudes paulina
  english_pob_reading: faith, with a footnote noting 'faithfulness' as possible
  chosen_spanish_reading: fe, con nota sobre «fidelidad» como posibilidad contextual
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: En este contexto, πίστις puede referirse tanto a fe como a fidelidad. El texto principal conserva «fe» como lectura por defecto del proyecto, y la nota preserva la alternativa sin resolverla indebidamente.
  doctrine_reference: 'DOCTRINE.md — términos contestados: πίστις → fe; se preservan alternativas en nota cuando el contexto las hace plausibles'
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego y el auditor de POB en inglés; mantiene el contraste de δέ, el valor relacional de παρακολουθέω y la tensión léxica de πίστις, sin añadir explicaciones no sustentadas por la fuente.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino solo cuando aparezca explícitamente en el pasaje; aquí no aplica.
  - Se distinguieron cuidadosamente «paciencia» (μακροθυμία) y «perseverancia» (ὑπομονή) para no colapsar dos virtudes distintas.
  - «Conducta» y «conducta» se mantienen en registro formal y comprensible, evitando un tecnicismo innecesario.
