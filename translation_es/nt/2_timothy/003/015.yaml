translation:
  language: es
  text: y que desde la infancia has conocido los escritos sagrados[a], los cuales pueden hacerte sabio para la salvación por la fe en Mesías Jesús[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las Escrituras sagradas». El griego dice literalmente «los escritos sagrados».
    reason: lexical_alternative
  - marker: b
    text: O «por la fidelidad de Mesías Jesús», aunque aquí «por la fe en Mesías Jesús» es el sentido más natural.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπὸ βρέφους
  english_pob_choice: from infancy
  chosen_spanish: desde la infancia
  alternatives_spanish:
  - desde la niñez
  - desde bebé
  lexicon: BDAG
  rationale: βρέφος designa a un niño muy pequeño, incluso un lactante. «Desde la infancia» conserva bien ese valor fuerte y suena natural en español.
- source_word: ἱερὰ γράμματα
  english_pob_choice: the sacred writings
  chosen_spanish: las sagradas letras
  alternatives_spanish:
  - las Sagradas Escrituras
  - los escritos sagrados
  lexicon: BDAG
  rationale: La expresión griega es literalmente «escritos/letras sagrados». «Las sagradas letras» mantiene de cerca la forma del original y evita imponer de entrada la terminología técnica posterior de «Escrituras».
- source_word: οἶδας
  english_pob_choice: you have known
  chosen_spanish: has conocido
  alternatives_spanish:
  - conoces
  lexicon: BDAG
  rationale: Aunque οἶδα tiene forma perfecta con sentido presente, aquí el valor temporal ligado a «desde la infancia» se expresa con naturalidad en español mediante el pretérito perfecto compuesto.
- source_word: τὰ δυνάμενά
  english_pob_choice: which are able
  chosen_spanish: las cuales pueden
  alternatives_spanish:
  - que son capaces de
  - que pueden
  lexicon: BDAG
  rationale: El participio atributivo modifica a «las sagradas letras». «Las cuales pueden» conserva el antecedente plural femenino y el sentido de capacidad.
- source_word: σε σοφίσαι
  english_pob_choice: to make you wise
  chosen_spanish: hacerte sabio
  alternatives_spanish:
  - instruirte con sabiduría
  - darte sabiduría
  lexicon: BDAG
  rationale: σοφίζω aquí significa hacer sabio o impartir sabiduría. «Hacerte sabio» es directo y fiel al valor verbal.
- source_word: εἰς σωτηρίαν
  english_pob_choice: for salvation
  chosen_spanish: para la salvación
  alternatives_spanish:
  - hacia la salvación
  - para obtener salvación
  lexicon: BDAG
  rationale: εἰς con σωτηρίαν expresa meta o resultado. «Para la salvación» conserva ese sentido final de manera concisa.
- source_word: διὰ πίστεως
  english_pob_choice: through faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - mediante la fe
  - a través de la fe
  lexicon: BDAG
  rationale: πίστις se traduce por «fe» según el valor por defecto del proyecto. «Por la fe» reproduce bien la mediación indicada por διά.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no solo como nombre ya fijado. Por la política del proyecto, se conserva «Mesías» para mantener el valor titular del término.
theological_decisions:
- issue: Χριστός como título o como forma tradicionalizada
  english_pob_reading: in Messiah Jesus
  chosen_spanish_reading: en Mesías Jesús
  alternative_spanish_readings:
  - en Cristo Jesús
  rationale: Se mantiene la traducción titular de Χριστός para no borrar su fuerza semántica. «Mesías» resulta fiel al griego y coherente con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; conservar el sentido de Χριστός como título cuando corresponda'
- issue: πίστις en la construcción διὰ πίστεως τῆς ἐν Χριστῷ Ἰησοῦ
  english_pob_reading: through faith in Messiah Jesus
  chosen_spanish_reading: por la fe en Mesías Jesús
  alternative_spanish_readings:
  - por la fidelidad de Mesías Jesús
  rationale: La lectura más natural aquí es la fe del creyente orientada a Mesías Jesús. Se conserva la alternativa menos probable en nota por si se lee πίστις con un matiz de fidelidad.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones léxicas/teológicas; πίστις puede admitir matiz de fidelidad en algunos contextos'
translation_notes:
  revision_awareness: El auditorio en inglés osciló entre «Christ Jesus» y «Messiah Jesus», pero la corrección de regresión restauró «Messiah Jesus» conforme a la política doctrinal de traducir Χριστός como título. La presente versión sigue esa lectura y conserva el matiz titular en español.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός de manera consistente con la política del proyecto.
  - Se evita «Sagradas Escrituras» en el texto principal para preservar la cercanía al griego, dejando la alternativa en nota.
  - «Por la fe» mantiene una relación instrumental/mediadora natural en español para διά con genitivo.
  - El tiempo verbal «has conocido» refleja el conocimiento adquirido desde la infancia con un resultado vigente.
