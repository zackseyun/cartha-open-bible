revisions:
- from: Pero los hombres malos e impostores irán de mal en peor[a][b], engañando y siendo engañados.
  to: Pero las personas malvadas e impostoras irán de mal en peor[a][b], engañando y siendo engañadas.
  rationale: Se reemplaza «hombres» por «personas» para preservar el valor genérico de ἄνθρωποι conforme al sentido del griego y al rastro auditado del POB. Se ajusta la concordancia a femenino plural («engañadas») para corresponder con «personas». Se conservan «impostoras», «de mal en peor» y la estructura participial, y se afinan las notas para reflejar mejor el matiz literal de προκόψουσιν ἐπὶ τὸ χεῖρον.
  reviewer_model: gpt-5.4
