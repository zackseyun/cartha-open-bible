translation:
  language: es
  text: Pero las personas malvadas e impostoras irán de mal en peor[a][b], engañando y siendo engañadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «avanzarán hacia lo peor».
    reason: lexical_alternative
  - marker: b
    text: O «irán de peor en peor».
    reason: lexical_alternative
lexical_decisions:
- source_word: πονηροὶ
  english_pob_choice: evil
  chosen_spanish: malos
  alternatives_spanish:
  - malvados
  - perversos
  lexicon: BDAG
  rationale: Aquí modifica a ἄνθρωποι y señala corrupción moral. En español, «malos» es natural y mantiene la idea de conducta moralmente dañina sin sonar más fuerte de lo que el contexto exige.
- source_word: ἄνθρωποι
  english_pob_choice: people
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - seres humanos
  lexicon: BDAG
  rationale: El griego plural masculino funciona genéricamente para personas. Sin embargo, en esta construcción fija con adjetivo y sustantivo plural, «hombres malos» conserva la forma compacta del original y el contraste retórico del versículo; no se pretende excluir el valor genérico cuando el contexto lo permite.
- source_word: γόητες
  english_pob_choice: impostors
  chosen_spanish: impostores
  alternatives_spanish:
  - charlatanes
  - embaucadores
  - engañadores
  lexicon: BDAG
  rationale: El término denota fraude y falsedad personal, con posibles matices de hechicería o engaño ritual en otros contextos. «Impostores» reproduce bien la idea de falsarios religiosos o morales sin introducir un matiz ocultista que el contexto inmediato no obliga.
- source_word: προκόψουσιν
  english_pob_choice: will go on
  chosen_spanish: irán
  alternatives_spanish:
  - progresarán
  - avanzarán
  lexicon: BDAG
  rationale: El verbo literalmente indica avance o progreso. En español, «irán» con el complemento «de mal en peor» transmite el movimiento continuo de manera idiomática y preserva el contraste irónico del griego.
- source_word: ἐπὶ τὸ χεῖρον
  english_pob_choice: from bad to worse
  chosen_spanish: de mal en peor
  alternatives_spanish:
  - hacia lo peor
  - a peor
  - hacia lo peor todavía
  lexicon: BDAG
  rationale: La expresión comparativa apunta a un deterioro progresivo. «De mal en peor» es el equivalente español más natural y fiel al sentido idiomático.
- source_word: πλανῶντες
  english_pob_choice: deceiving
  chosen_spanish: engañando
  alternatives_spanish:
  - descarriando
  - extraviando
  lexicon: BDAG
  rationale: El participio presente activo indica una acción continua. «Engañando» es la forma más directa y comprensible en español para el acto de inducir al error.
- source_word: πλανώμενοι
  english_pob_choice: being deceived
  chosen_spanish: siendo engañados
  alternatives_spanish:
  - dejándose engañar
  - extraviándose
  lexicon: BDAG
  rationale: 'El participio presente pasivo debe mantenerse como pasivo para no borrar la tensión del texto: quienes engañan también quedan bajo engaño. «Siendo engañados» conserva esa relación con claridad.'
theological_decisions:
- issue: Valor genérico de ἄνθρωποι sin imponer masculino exclusivo
  english_pob_reading: people
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - personas
  - seres humanos
  rationale: Aunque el griego puede tener valor genérico, la frase completa «hombres malos e impostores» reproduce la fuerza nominal del original y suena natural en español. No se pretende afirmar que solo se trate de varones; el género gramatical sigue el del griego.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Matiz de γόητες entre fraude y posible colorido de hechicería
  english_pob_reading: impostors
  chosen_spanish_reading: impostores
  alternative_spanish_readings:
  - charlatanes
  - embaucadores
  - hechiceros
  rationale: El contexto enfatiza personas fraudulentas que engañan y se engañan, no necesariamente practicantes de magia. «Impostores» preserva el alcance moral y doctrinal sin ampliar indebidamente el referente.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas; la decisión principal aquí fue escoger equivalentes españoles naturales que conservaran el contraste irónico, el matiz de fraude de γόητες y el pasivo de πλανώμενοι.
  spanish_consistency_notes:
  - Se mantiene «impostores» para γόητες, en línea con el audit trail inglés y sin sobrecargar el verso con un matiz ocultista no requerido.
  - Se conserva el pasivo «siendo engañados» para πλανώμενοι, respetando la tensión de que los engañadores también están engañados.
  - La expresión idiomática «de mal en peor» comunica el valor de ἐπὶ τὸ χεῖρον sin calco torpe, a la vez que las notas preservan la lectura literal.
  - Se usa puntuación española y mayúsculas estándar; el verso queda listo para lectura pública en un registro bíblico moderno y digno.
