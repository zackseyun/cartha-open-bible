review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: contraste adversativo («Pero»), corrupción moral («malos»), fraude («impostores»), deterioro progresivo («de mal en peor») y la pareja participial activa/pasiva («engañando y siendo engañados»). Sin embargo, «hombres» no preserva adecuadamente el valor genérico de ἄνθρωποι aquí, donde el sentido es inclusivo y la guía auditada en inglés eligió «people» precisamente para evitar una restricción masculina no presente en el original.'
  spanish_quality_summary: 'El español es claro y natural en casi todo el versículo. La única fricción importante es «los hombres malos e impostores», que suena más restrictivo de lo debido. «Las personas malvadas e impostoras» o una formulación equivalente comunica mejor el sentido genérico y sigue siendo legible. Las notas actuales son comprensibles, pero conviene alinearlas más estrechamente con el rastro auditado: una para el literal de la frase comparativa y otra para la alternativa verbal de προκόψουσιν.'
  glossary_alignment: 'No hay términos del glosario principal en juego salvo el principio de exactitud semántica. «Impostores» está bien alineado con γόητες. «Engañando y siendo engañados» preserva correctamente la voz pasiva de πλανώμενοι. La desviación principal es ἄνθρωποι: debe evitarse «hombres» porque el proyecto favorece una traducción fiel al referente genérico, no al género gramatical solamente.'
  issues:
  - severity: high
    issue: «hombres» para ἄνθρωποι introduce una restricción masculina no exigida por el griego.
    rationale: El original usa un plural genérico para seres humanos, y el rastro POB en inglés documenta explícitamente «people» por esa razón. En español, «hombres» puede leerse como varones, por lo que no preserva con suficiente fidelidad el alcance referencial.
  - severity: low
    issue: La nota literal «irán hacia lo peor» es aceptable pero menos precisa que «avanzarán a lo peor / hacia lo peor» para reflejar προκόψουσιν.
    rationale: El inglés auditado distingue el matiz literal de avance/progreso irónico. Conviene que una nota mantenga más visible ese componente léxico, aunque el texto principal «irán de mal en peor» sea correcto.
  revised_spanish_text: Pero las personas malvadas e impostoras irán de mal en peor[a][b], engañando y siendo engañadas.
  revised_footnotes:
  - marker: a
    text: Literalmente, «avanzarán hacia lo peor».
    reason: lexical_alternative
  - marker: b
    text: O «irán de peor en peor».
    reason: lexical_alternative
