translation:
  language: es
  text: Pero no irán más allá[a], porque su insensatez será evidente para todos[b], como también lo fue la de aquellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no harán más progreso».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, la insensatez de Jannes y Jambres, mencionados en el versículo anterior.
    reason: cross_reference
lexical_decisions:
- source_word: προκόψουσιν
  english_pob_choice: will advance
  chosen_spanish: irán más allá
  alternatives_spanish:
  - progresarán
  - harán más progreso
  lexicon: BDAG
  rationale: προκόπτω conserva la idea de avanzar o hacer progreso; en este contexto negativo, «irán más allá» comunica el avance detenido sin sugerir un progreso positivo ni sonar demasiado técnico en español.
- source_word: ἐπὶ πλεῖον
  english_pob_choice: any further
  chosen_spanish: más allá
  alternatives_spanish:
  - ya no más
  - aún más adelante
  lexicon: BDAG
  rationale: La locución con negación expresa que no avanzarán más. «Más allá» reproduce de manera natural el sentido de límite impuesto por οὐ y evita una perífrasis pesada.
- source_word: ἄνοια
  english_pob_choice: foolishness
  chosen_spanish: insensatez
  alternatives_spanish:
  - necedad
  - falta de entendimiento
  lexicon: BDAG
  rationale: ἄνοια apunta a una falta de entendimiento con tinte moral. «Insensatez» mantiene esa carga y suena más fuerte y más abarcadora que solo «necedad» en este contexto polémico.
- source_word: ἔκδηλος
  english_pob_choice: plain
  chosen_spanish: evidente
  alternatives_spanish:
  - manifiesta
  - clara
  lexicon: BDAG
  rationale: ἔκδηλος significa visible, evidente, manifiesto. «Evidente» expresa bien la cualidad pública y reconocible del término en español contemporáneo.
- source_word: πᾶσιν
  english_pob_choice: to everyone
  chosen_spanish: para todos
  alternatives_spanish:
  - a todos
  - ante todos
  lexicon: BDAG
  rationale: El dativo plural se vierte de forma natural como alcance universal. «Para todos» conserva la idea de visibilidad pública sin añadir un matiz interpretativo innecesario.
- source_word: ὡς καὶ ἡ ἐκείνων ἐγένετο
  english_pob_choice: as that of those men also became
  chosen_spanish: como también lo fue la de aquellos
  alternatives_spanish:
  - como también se hizo la de aquellos
  - como también ocurrió con la de aquellos
  lexicon: BDAG
  rationale: 'La construcción es elíptica: «la de aquellos» explicita en español que se habla de la insensatez/foolishness, y «lo fue» transmite el verbo de estado/llegar a ser sin forzar una paráfrasis. «También» refleja καί.'
theological_decisions:
- issue: Referente de ἐκείνων
  english_pob_reading: '''those men'' refers to the previously mentioned opponents, Jannes and Jambres.'
  chosen_spanish_reading: «aquellos» remite a los opositores mencionados en el versículo anterior, Jannes y Jambres.
  alternative_spanish_readings:
  - «aquellos hombres»
  - una referencia más general a falsos maestros previos
  rationale: El contexto inmediato de 3:8 nombra a Jannes y Jambres; mantener un demostrativo anafórico breve conserva ese enlace sin sobreexplicar en el texto principal.
  doctrine_reference: 2 Timoteo 3:8–9; referencia contextual inmediata
translation_notes:
  revision_awareness: 'Se siguió el auditable English POB: se preservó el valor metafórico de προκόπτω como avance/progreso; se mantuvo la nota cruzada sobre Jannes y Jambres; y se resolvió la elipsis de ἡ ἐκείνων ἐγένετο con una referencia española explícita a «la de aquellos». No hubo revisiones posteriores que alteraran esta decisión.'
  spanish_consistency_notes:
  - Se usa «insensatez» para ἄνοια de forma consistente con su matiz de falta de juicio, evitando suavizarlo a un mero error intelectual.
  - «Aquellos» queda deliberadamente breve para conservar la referencia anafórica del griego y permitir que la nota aclare el antecedente.
  - Se mantiene un registro bíblico moderno y natural, sin recurrir a «SEÑOR» u այլ terminología no pertinente en este versículo.
