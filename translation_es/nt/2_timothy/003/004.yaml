lexical_decisions:
- source_word: προδόται
  english_pob_choice: traitors
  chosen_spanish: traidores
  alternatives_spanish:
  - traidores
  - desleales
  - traicioneros
  lexicon: BDAG
  rationale: προδότης designa a quien traiciona o actúa con perfidia. En una lista de vicios, «traidores» comunica con naturalidad la fuerza moral de la palabra y mantiene el peso de la deslealtad.
- source_word: προπετεῖς
  english_pob_choice: reckless
  chosen_spanish: imprudentes
  alternatives_spanish:
  - imprudentes
  - precipitados
  - arrojados
  lexicon: BDAG
  rationale: El término describe a quienes actúan con precipitación e irreflexión. «Imprudentes» es claro en español contemporáneo y conserva la idea de falta de juicio; «precipitados» queda como alternativa cercana.
- source_word: τετυφωμένοι
  english_pob_choice: puffed up
  chosen_spanish: llenos de orgullo
  alternatives_spanish:
  - orgullosos
  - engreídos
  - hinchados de orgullo
  lexicon: BDAG
  rationale: El participio perfecto pasivo de τυφόομαι sugiere literalmente «haber sido inflados». «Llenos de orgullo» conserva la imagen sin sonar antinatural en español, mientras que «orgullosos» o «engreídos» suavizan la metáfora.
- source_word: φιλήδονοι
  english_pob_choice: lovers of pleasure
  chosen_spanish: amantes de los placeres
  alternatives_spanish:
  - amadores de los placeres
  - amantes del placer
  - placenteros
  lexicon: BDAG
  rationale: El compuesto significa «los que aman el placer». «Amantes de los placeres» reproduce la forma del griego y prepara el contraste con «amantes de Dios».
- source_word: μᾶλλον ἢ
  english_pob_choice: rather than
  chosen_spanish: más que
  alternatives_spanish:
  - más que
  - en lugar de
  - antes que
  lexicon: BDAG
  rationale: La construcción comparativa expresa preferencia y contraste. «Más que» es la forma más natural en español para marcar que el amor por el placer prevalece sobre el amor a Dios.
- source_word: φιλόθεοι
  english_pob_choice: lovers of God
  chosen_spanish: amantes de Dios
  alternatives_spanish:
  - amadores de Dios
  - amantes de Dios
  - amantes de lo divino
  lexicon: BDAG
  rationale: El compuesto significa «los que aman a Dios». «Amantes de Dios» preserva el paralelismo léxico con «amantes de los placeres» y deja explícita la oposición moral del versículo.
theological_decisions:
- issue: Cómo conservar el contraste retórico entre el amor al placer y el amor a Dios sin añadir matices doctrinales extra
  english_pob_reading: Translate the paired compounds as 'lovers of pleasure rather than lovers of God' and retain the metaphor 'puffed up.'
  chosen_spanish_reading: «amantes de los placeres más que amantes de Dios» y «llenos de orgullo»
  alternative_spanish_readings:
  - «amantes del placer en vez de amantes de Dios»
  - «orgullosos» en vez de «llenos de orgullo»
  - «precipitados» en vez de «imprudentes»
  rationale: El versículo es una descripción moral en lista de vicios. La redacción elegida preserva el paralelismo entre los dos compuestos y mantiene el sentido de inflación orgullosa sin convertir la frase en una explicación interpretativa.
  doctrine_reference: Translation philosophy §§5–6
translation_notes:
  revision_awareness: El contexto griego y el audit trail en inglés muestran un verso de lista de vicios con fuerte paralelismo léxico. No hubo revisiones aplicadas en el registro inglés; por eso se mantiene una solución española igualmente breve, paralela y auditable, sin añadir elementos ausentes del texto fuente.
  spanish_consistency_notes:
  - Se usa «Dios» para φιλόθεοι, manteniendo el paralelismo con φιλήδονοι.
  - Se prefirió «imprudentes» sobre «precipitados» porque suena natural en español actual, aunque se conserva la alternativa en nota.
  - Se evitó «siervos» o formulaciones devocionales no presentes en el griego; el verso es una caracterización moral, no una expresión de servicio religioso.
