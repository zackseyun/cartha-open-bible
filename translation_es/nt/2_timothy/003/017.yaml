translation:
  language: es
  text: para que el hombre de Dios[a] sea completo[b], preparado para toda buena obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Expresión masculina singular en griego; probablemente una designación bíblica reconocible. Puede referirse específicamente al ministro de Dios y, a la vez, aplicarse más ampliamente al creyente formado por la Escritura.
    reason: cultural_note
  - marker: b
    text: O «plenamente preparado» o «plenamente equipado». El participio ἐξηρτισμένος lleva la idea de haber sido preparado o provisto a fondo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Expresa de manera natural en español la cláusula final de propósito, conservando el valor telico del griego.
- source_word: ἄρτιος
  english_pob_choice: complete
  chosen_spanish: completo
  alternatives_spanish:
  - capaz
  - idóneo
  - perfecto
  lexicon: BDAG
  rationale: ‘Completo’ comunica la idea de estar plenamente capacitado o preparado sin sugerir impecabilidad moral, que sería excesiva.
- source_word: ὁ τοῦ θεοῦ ἄνθρωπος
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - la persona de Dios
  - el siervo de Dios
  lexicon: BDAG
  rationale: Se conserva la expresión masculina singular del griego y su posible eco como designación bíblica reconocible. ‘Hombre’ evita neutralizar el término base y mantiene la fuerza del sintagma.
- source_word: πρὸς
  english_pob_choice: for
  chosen_spanish: para
  alternatives_spanish:
  - con destino a
  - hacia
  lexicon: BDAG
  rationale: Con acusativo aquí marca aptitud o orientación; ‘para’ es la forma más natural en español.
- source_word: πᾶν ἔργον ἀγαθόν
  english_pob_choice: every good work
  chosen_spanish: toda buena obra
  alternatives_spanish:
  - cada buena obra
  - toda obra buena
  lexicon: BDAG
  rationale: ‘Toda buena obra’ preserva el valor distributivo de πᾶν y mantiene un giro natural en español bíblico contemporáneo.
- source_word: ἐξηρτισμένος
  english_pob_choice: equipped
  chosen_spanish: equipado
  alternatives_spanish:
  - plenamente equipado
  - preparado
  - dotado
  lexicon: BDAG
  rationale: El participio perfecto pasivo comunica haber sido puesto en condición de estar listo o provisto. ‘Equipado’ es conciso e idiomático; el matiz intensivo queda implícito por el contexto.
theological_decisions:
- issue: Alcance de ὁ τοῦ θεοῦ ἄνθρωπος
  english_pob_reading: The man of God is a masculine singular expression in Greek, likely a recognized biblical designation; it can refer specifically to God's minister while also applying more broadly to the believer shaped by Scripture.
  chosen_spanish_reading: el hombre de Dios
  alternative_spanish_readings:
  - la persona de Dios
  - el ministro de Dios
  rationale: Se conserva el masculino singular por fidelidad al griego y porque la expresión funciona como designación bíblica reconocible. No se neutraliza en la línea principal; el posible alcance más amplio queda implícito sin añadirse al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La revisión inglesa más reciente indicó que no hacía falta ningún cambio, y el presente borrador sigue esa lectura sin introducir expansiones interpretativas; la principal decisión es la equivalencia natural en español y la preservación del sintagma masculino singular.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para θεοῦ, sin usar ‘Señor’, porque el texto griego no contiene κύριος.
  - Se traduce el participio perfecto ἐξηρτισμένος con un adjetivo verbal en español (‘equipado’) para conservar el estado resultante.
  - ‘Para que’ reproduce bien la finalidad de ἵνα en español bíblico contemporáneo.
  - No se usa ‘Cristo’ ni terminología cristológica en este versículo.
  - La puntuación y capitalización siguen el uso moderno del español bíblico.
  - Se evita ‘perfecto’ en ἄρτιος para no cargar el verso con una noción de impecabilidad moral no explicitada por el griego.
