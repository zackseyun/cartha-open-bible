  text: ὁ δὲ κύριός μοι παρέστη καὶ ἐνεδυνάμωσέν με, ἵνα δι’ ἐμοῦ τὸ κήρυγμα πληροφορηθῇ καὶ ⸀ἀκούσωσιν πάντα τὰ ἔθνη, καὶ ἐρρύσθην ἐκ στόματος λέοντος.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/017.yaml
  text: But the Lord stood by me and strengthened me[a], so that through me the proclamation might be fully accomplished and all the Gentiles might hear[b], and I was rescued from the lion’s mouth.
  footnotes:
  - marker: a
    text: Or “all the nations.” The Greek ἔθνη can mean either “Gentiles” or “nations”; here it likely refers to the non-Jewish peoples hearing the gospel.
    reason: lexical_alternative
  - marker: b
    text: “From the lion’s mouth” may be a figurative expression for deliverance from deadly danger rather than a reference to a literal lion.
    reason: alternative_reading
