translation:
  language: es
  text: Pero el Señor estuvo a mi lado y me fortaleció, para que por medio de mí la proclamación se cumpliera plenamente y todos los gentiles[a] oyeran, y fui rescatado de la boca del león[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “las naciones”. El griego ἔθνη puede significar tanto “gentiles” como “naciones”; aquí probablemente se refiere a los pueblos no judíos que oirían el evangelio.
    reason: lexical_alternative
  - marker: b
    text: “De la boca del león” puede ser una expresión figurada de liberación de un peligro mortal, más que una referencia a un león literal.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δὲ κύριός
  english_pob_choice: But the Lord
  chosen_spanish: Pero el Señor
  alternatives_spanish:
  - Pero el Maestro
  lexicon: BDAG
  rationale: κύριος se traduce aquí con el valor doctrinal estándar de “Señor”. δὲ se marca con “Pero” para conservar el contraste con el versículo anterior.
- source_word: μοι παρέστη
  english_pob_choice: stood by me
  chosen_spanish: estuvo a mi lado
  alternatives_spanish:
  - se puso a mi lado
  - estuvo conmigo
  lexicon: BDAG
  rationale: παρίστημι expresa presencia de apoyo, no mera ubicación. “Estuvo a mi lado” es natural en español y conserva la idea de ayuda personal.
- source_word: ἐνεδυνάμωσέν με
  english_pob_choice: strengthened me
  chosen_spanish: me fortaleció
  alternatives_spanish:
  - me dio fuerzas
  - me capacitó
  lexicon: BDAG
  rationale: ἐνδυναμόω significa fortalecer o dar poder. “Me fortaleció” es fiel, claro y de registro digno.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce propósito. “Para que” comunica con naturalidad la relación final sin perder el sentido.
- source_word: δι’ ἐμοῦ
  english_pob_choice: through me
  chosen_spanish: por medio de mí
  alternatives_spanish:
  - a través de mí
  lexicon: BDAG
  rationale: διά con genitivo indica mediación o instrumentación. “Por medio de mí” mantiene esa fuerza instrumental en español bíblico contemporáneo.
- source_word: τὸ κήρυγμα
  english_pob_choice: the proclamation
  chosen_spanish: la proclamación
  alternatives_spanish:
  - la predicación
  - el mensaje
  lexicon: BDAG
  rationale: κήρυγμα designa el mensaje proclamado. “La proclamación” conserva mejor el acto y el contenido que “predicación” o “mensaje”.
- source_word: πληροφορηθῇ
  english_pob_choice: might be fully accomplished
  chosen_spanish: fuera plenamente cumplida
  alternatives_spanish:
  - fuera plenamente realizada
  - fuera totalmente cumplida
  - se cumpliera plenamente
  lexicon: BDAG
  rationale: πληροφορέω puede significar cumplir, completar o llevar a término plenamente. En este contexto, “fuera plenamente cumplida” conserva la idea de cumplimiento completo sin estrechar demasiado el matiz.
- source_word: ἀκούσωσιν
  english_pob_choice: might hear
  chosen_spanish: oyeran
  alternatives_spanish:
  - escucharan
  lexicon: BDAG
  rationale: El aoristo subjuntivo tras ἵνα expresa propósito. “Oyeran” reproduce de forma directa la acción de percibir el mensaje.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the Gentiles
  chosen_spanish: todos los gentiles
  alternatives_spanish:
  - todas las naciones
  lexicon: BDAG
  rationale: ἔθνη puede significar “gentiles” o “naciones”. En este contexto paulino misionero, “gentiles” capta mejor el sentido probable; se mantiene la alternativa más amplia en nota.
- source_word: ἐρρύσθην
  english_pob_choice: I was rescued
  chosen_spanish: fui rescatado
  alternatives_spanish:
  - fui librado
  - fui liberado
  lexicon: BDAG
  rationale: ῥύομαι significa rescatar o librar de peligro. “Fui rescatado” es vívido y fiel al valor de salvación en situación de riesgo.
- source_word: ἐκ στόματος λέοντος
  english_pob_choice: from the lion’s mouth
  chosen_spanish: de la boca del león
  alternatives_spanish:
  - de las fauces del león
  lexicon: BDAG
  rationale: La expresión se mantiene literal para preservar su fuerza metafórica y no resolver de antemano si alude a peligro mortal, a un poder hostil o a otra referencia.
theological_decisions:
- issue: Referencia de “el Señor” (κύριος)
  english_pob_reading: Rendered simply as 'the Lord' without specifying further in the text.
  chosen_spanish_reading: Se traduce simplemente “el Señor”, sin identificarlo explícitamente en el texto.
  alternative_spanish_readings:
  - Jesús
  - Dios
  rationale: El contexto permite a muchos lectores entender al Señor como el Cristo resucitado, pero la traducción debe conservar la formulación del texto sin insertar una identificación interpretativa.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Sentido de “de la boca del león”
  english_pob_reading: Kept as a literal expression of rescue from extreme danger.
  chosen_spanish_reading: Se conserva como imagen literal de rescate de un peligro extremo.
  alternative_spanish_readings:
  - como metáfora de Nerón
  - como metáfora de Satanás
  - como referencia a una ejecución literal por bestias
  rationale: La frase admite varias lecturas plausibles y el texto no las resuelve. Mantener la imagen preserva la tensión histórica y teológica en vez de cerrarla prematuramente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el último pase revisado del audit trail inglés, que prefirió “fully accomplished” sobre “fully carried out” para πληροφορηθῇ. En español se refleja con “fuera plenamente cumplida”, una opción natural y suficientemente amplia, sin resolver indebidamente el matiz. También se preserva la tensión interpretativa de “la boca del león” y la ambigüedad de ἔθνη.
  spanish_consistency_notes:
  - Se usa “Señor” para κύριος conforme al uso doctrinal estándar de la serie.
  - Se conserva “gentiles” en el cuerpo del texto y se explicita la alternativa “naciones” en nota, siguiendo el audit trail.
  - 'Se mantiene el paralelismo verbal del griego: apoyo/fortalecimiento, propósito, escucha, rescate.'
  - La puntuación española separa con comas la cláusula de propósito para reflejar la estructura del original.
