translation:
  language: es
  text: y apartarán sus oídos[a] de la verdad[b], y se desviarán hacia los mitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «su oír» o «su audición»; griego «su escuchar / su facultad de oír».
    reason: lexical_alternative
  - marker: b
    text: O «fábulas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀληθείας
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad
  - la verdad apostólica
  lexicon: BDAG
  rationale: ἀλήθεια aquí se conserva como «la verdad» sin ampliarla a «doctrina sana» o «el evangelio», para mantener el alcance del término griego y la tensión teológica documentada por la POB inglesa.
- source_word: ἀκοὴν
  english_pob_choice: their hearing
  chosen_spanish: el oído
  alternatives_spanish:
  - su oído
  - su capacidad de oír
  - su audición
  lexicon: BDAG
  rationale: La idea griega es la facultad de oír o la escucha. En español, «el oído» funciona de forma natural y mantiene la metáfora de desviar la recepción de la verdad; la referencia posesiva queda implícita por el sujeto plural del verbo.
- source_word: ἀποστρέψουσιν
  english_pob_choice: will turn away
  chosen_spanish: apartarán
  alternatives_spanish:
  - volverán aparte
  - desviarán
  - apartarán el oído
  lexicon: BDAG
  rationale: El verbo expresa apartar o desviar. «Apartarán» conserva el movimiento de rechazo/dirección lejos de la verdad con un español fluido y sin añadir matiz de rechazo más fuerte que el texto.
- source_word: μύθους
  english_pob_choice: myths
  chosen_spanish: los mitos
  alternatives_spanish:
  - los mitos
  - las fábulas
  - las historias
  lexicon: BDAG
  rationale: «Mitos» es el equivalente directo y moderno para μῦθος en este contraste con la verdad. Se conserva la dureza del término y la posible carga de relatos inventados o especulativos.
- source_word: ἐκτραπήσονται
  english_pob_choice: turn aside
  chosen_spanish: se volverán hacia
  alternatives_spanish:
  - se desviarán hacia
  - se apartarán hacia
  - se inclinarán hacia
  lexicon: BDAG
  rationale: El verbo tiene la idea de desviarse o apartarse. «Se volverán hacia» comunica bien el movimiento hacia los mitos y mantiene la oposición con «apartarán» en la primera cláusula.
- source_word: ἀπὸ μὲν ... ἐπὶ δὲ
  english_pob_choice: from ... and ... to
  chosen_spanish: de ... hacia ...
  alternatives_spanish:
  - de ... y ... a ...
  - desde ... hacia ...
  lexicon: BDAG
  rationale: La pareja μὲν...δὲ marca contraste direccional. El español queda más natural con «de ... hacia ...», preservando el desplazamiento desde la verdad hacia los mitos.
theological_decisions:
- issue: Alcance de «la verdad»
  english_pob_reading: Rendered as 'the truth' without expanding it to 'sound doctrine' or 'the gospel.'
  chosen_spanish_reading: Se traduce simplemente «la verdad», sin identificarla explícitamente con «la doctrina sana» o «el evangelio».
  alternative_spanish_readings:
  - la doctrina sana
  - la verdad del evangelio
  rationale: El griego usa ἀλήθεια, y el contexto pastoral sugiere verdad apostólica, pero el versículo no especifica más. La traducción conserva esa amplitud y deja la identificación teológica al contexto inmediato.
  doctrine_reference: Preservar la tensión teológica sin resolverla interpretativamente.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que acercó la sintaxis al griego («turn away their hearing from the truth») sin sacrificar la naturalidad. En español se reflejó esa relación como «apartar de la verdad el oído», manteniendo el objeto interno y el contraste direccional.
  spanish_consistency_notes:
  - Se evitó «SEÑOR»/«SEÑORÍO» y otros términos no pertinentes; no hay nombre divino en el versículo.
  - Se prefirió «mitos» como término principal, coherente con la decisión inglesa, y se dejó «fábulas» como alternativa en nota.
  - Se mantuvo el singular de «la verdad» para reflejar el artículo definido griego y el sentido de verdad reconocida en contexto.
