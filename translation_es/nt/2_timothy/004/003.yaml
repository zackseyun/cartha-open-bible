translation:
  language: es
  text: Porque vendrá el tiempo cuando no soportarán la sana enseñanza[a], sino que, conforme a sus propios deseos, amontonarán maestros para sí, teniendo oídos que les pican[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la sana doctrina».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «teniendo oídos que les pican»; la imagen describe el deseo de oír lo que uno quiere oír.
    reason: lexical_alternative
lexical_decisions:
- source_word: καιρὸς
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - un tiempo
  - una temporada
  lexicon: BDAG
  rationale: καιρός señala aquí una ocasión o periodo determinado que está por venir. En español, «el tiempo» comunica de manera natural la llegada de ese momento previsto sin forzar una perífrasis.
- source_word: ὑγιαινούσης διδασκαλίας
  english_pob_choice: sound teaching
  chosen_spanish: la sana enseñanza
  alternatives_spanish:
  - la enseñanza sana
  - la doctrina sana
  lexicon: BDAG
  rationale: El participio ὑγιαινούσης conserva la imagen de salud/lo sano. «Sana enseñanza» reproduce esa metáfora de forma clara y evita imponer el tecnicismo eclesial «doctrina» donde el griego permite un sentido más amplio de enseñanza apostólica.
- source_word: ἀνέξονται
  english_pob_choice: will not put up with
  chosen_spanish: no soportarán
  alternatives_spanish:
  - no tolerarán
  - no aguantarán
  lexicon: BDAG
  rationale: ἀνέχομαι expresa la idea de soportar o tolerar. «No soportarán» es idiomático en español y conserva la negativa de rechazo frente a esa enseñanza.
- source_word: κατὰ τὰς ἰδίας ἐπιθυμίας
  english_pob_choice: according to their own desires
  chosen_spanish: conforme a sus propios deseos
  alternatives_spanish:
  - según sus propios deseos
  - de acuerdo con sus propios deseos
  - conforme a sus propias pasiones
  lexicon: BDAG
  rationale: ἐπιθυμίαι puede abarcar deseos o anhelos desordenados según el contexto. «Conforme a sus propios deseos» mantiene la amplitud semántica sin restringirlo prematuramente a «pasiones» o «lujurias».
- source_word: ἑαυτοῖς
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos mismos
  - en su propio beneficio
  lexicon: BDAG
  rationale: El dativo reflexivo marca beneficio o interés propio. «Para sí» es breve, natural y conserva la referencia reflexiva.
- source_word: ἐπισωρεύσουσιν
  english_pob_choice: will heap up
  chosen_spanish: se amontonarán
  alternatives_spanish:
  - acumularán
  - apilarán
  - juntarán en gran número
  lexicon: BDAG
  rationale: El verbo tiene una fuerza gráfica de acumular en exceso. «Se amontonarán maestros» preserva esa imagen de abundancia desordenada y no diluye el matiz acumulativo.
- source_word: διδασκάλους
  english_pob_choice: teachers
  chosen_spanish: maestros
  alternatives_spanish:
  - maestros instructores
  - docentes
  lexicon: BDAG
  rationale: διδάσκαλος es «maestro/maestros» en sentido general. En español, «maestros» funciona bien y evita convertir el término en un título confesional más estrecho.
- source_word: κνηθόμενοι τὴν ἀκοήν
  english_pob_choice: having itching ears
  chosen_spanish: teniendo oídos que les pican
  alternatives_spanish:
  - con oídos que les pican
  - teniendo oídos cosquillosos
  - con oídos deseosos de oír lo que quieren
  lexicon: BDAG
  rationale: La imagen es idiomática y vívida. «Teniendo oídos que les pican» conserva el tropo corporal del griego. En español moderno suena algo más literal que «oídos con comezón», pero sigue siendo comprensible y mantiene la metáfora.
theological_decisions:
- issue: διδασκαλία en contexto pastoral
  english_pob_reading: sound teaching
  chosen_spanish_reading: sana enseñanza
  alternative_spanish_readings:
  - sana doctrina
  rationale: El pasaje denuncia el rechazo a la instrucción apostólica; sin embargo, el término griego no obliga a un tecnicismo confesional. «Sana enseñanza» refleja el sentido del texto y conserva la accesibilidad del estilo POB.
  doctrine_reference: Translation philosophy §6
- issue: Imagen de κνηθόμενοι τὴν ἀκοήν
  english_pob_reading: having itching ears
  chosen_spanish_reading: teniendo oídos que les pican
  alternative_spanish_readings:
  - con oídos que les pican
  - teniendo oídos con comezón
  rationale: La construcción participial no añade una causalidad explícita, por lo que se mantiene como estado o rasgo descriptivo. La imagen comunica el deseo de escuchar lo que agrada, sin explicitar más de lo que el griego permite.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'La redacción sigue la decisión revisada del audit trail inglés de conservar la construcción participial en lugar de convertirla en causal. También refleja la preferencia por una equivalencia óptima: mantener la metáfora de salud en διδασκαλία y la imagen corporal de «oídos que les pican» sin añadir interpretación no explicitada por el griego.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «sana enseñanza» sobre «sana doctrina» para no imponer un término más técnico que el necesario.
  - «Maestros» se eligió como equivalente general de διδασκάλους, evitando un título eclesiástico más cargado.
  - La puntuación conserva una cadencia de una sola oración con contraste claro entre rechazo y acumulación.
  - La nota [b] preserva la imagen idiomática sin transformar el participio en una causa explícita.
