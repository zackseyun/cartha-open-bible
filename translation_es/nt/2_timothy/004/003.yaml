review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: tiempo venidero, rechazo de la enseñanza sana, selección de maestros según deseos propios, y la imagen de los oídos que pican. Sin embargo, «se amontonarán maestros» cambia el sujeto lógico de ἐπισωρεύσουσιν διδασκάλους: el griego dice que se acumularán maestros para sí, no que ellos mismos se amontonarán. Además, la nota b está anclada correctamente, pero su redacción puede mejorar para reflejar que la imagen idiomática expresa comezón de oír lo que agrada.'
  spanish_quality_summary: El español es claro y bastante natural, pero «se amontonarán maestros» suena impropio en español y puede entenderse como que las personas se amontonan en calidad de maestros. «Amontonarán maestros para sí» o «se amontonarán para sí maestros» corrige el problema. «Teniendo oídos que les pican» es comprensible, aunque algo literal; con nota explicativa funciona aceptablemente dentro del objetivo de conservar la imagen.
  glossary_alignment: No hay términos del glosario mayor en juego. «Sana enseñanza» está bien alineado con la decisión POB frente a «sana doctrina», preservando accesibilidad y la metáfora de salud. «Maestros» para διδασκάλους y «para sí» para ἑαυτοῖς están bien. La principal corrección es sintáctico-semántica en ἐπισωρεύσουσιν.
  issues:
  - severity: high
    issue: «se amontonarán maestros» traduce mal la relación verbal de ἐπισωρεύσουσιν διδασκάλους
    rationale: El verbo tiene por objeto «maestros»; el sujeto implícito acumula maestros para sí. La forma pronominal «se amontonarán» en español desplaza la acción al sujeto mismo y produce una lectura equivocada o torpe.
  - severity: low
    issue: La nota b puede explicitar mejor el valor idiomático de la imagen
    rationale: La redacción actual es aceptable, pero conviene formularla con español más natural y con referencia a «oír lo que se quiere oír», manteniendo la alternativa literal.
  revised_spanish_text: Porque vendrá el tiempo cuando no soportarán la sana enseñanza[a], sino que, conforme a sus propios deseos, amontonarán maestros para sí, teniendo oídos que les pican[b].
  revised_footnotes:
  - marker: a
    text: 'O: «la sana doctrina».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «teniendo oídos que les pican»; la imagen describe el deseo de oír lo que uno quiere oír.
    reason: lexical_alternative
  revision_rationale: Se corrige un problema importante de sentido en «se amontonarán maestros», reemplazándolo por «amontonarán maestros para sí», que respeta la sintaxis y el objeto del griego ἐπισωρεύσουσιν διδασκάλους. Se conserva «sana enseñanza» por fidelidad a la decisión POB y se mantiene la imagen participial «teniendo oídos que les pican» con una nota aclaratoria ligeramente más natural.
