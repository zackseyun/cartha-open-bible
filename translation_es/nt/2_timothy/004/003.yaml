revisions:
- from: Porque vendrá el tiempo cuando no soportarán la sana enseñanza[a], sino que, conforme a sus propios deseos, se amontonarán maestros para sí, teniendo oídos que les pican[b].
  to: Porque vendrá el tiempo cuando no soportarán la sana enseñanza[a], sino que, conforme a sus propios deseos, amontonarán maestros para sí, teniendo oídos que les pican[b].
  rationale: Se corrige un problema importante de sentido en «se amontonarán maestros», reemplazándolo por «amontonarán maestros para sí», que respeta la sintaxis y el objeto del griego ἐπισωρεύσουσιν διδασκάλους. Se conserva «sana enseñanza» por fidelidad a la decisión POB y se mantiene la imagen participial «teniendo oídos que les pican» con una nota aclaratoria ligeramente más natural.
