  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura imperativa y los nombres propios del griego: Ἄσπασαι → «Saluda», Πρίσκαν → «Prisca», Ἀκύλαν → «Aquila». También preserva correctamente la nota sobre «Prisca/Priscila». Sin embargo, τὸν Ὀνησιφόρου οἶκον en el contexto epistolar apunta mejor al conjunto de personas del hogar que a la vivienda; «la casa de Onesíforo» es posible, pero no reproduce tan claramente como el inglés auditado el sentido social de «household».'
  spanish_quality_summary: El español es natural y claro. La única mejora necesaria es sustituir «la casa de Onesíforo» por «la familia de Onesíforo» o «la casa de la familia de Onesíforo»; de esas opciones, «la familia de Onesíforo» comunica con más claridad en español actual que se trata de personas a quienes saludar, no del edificio. El resto del versículo suena bien y mantiene dignidad bíblica.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. La transliteración «Prisca» sigue correctamente la decisión auditada y la nota alternativa está bien formulada. El ajuste requerido es léxico-contextual para οἶκος: conviene priorizar en español el sentido de grupo doméstico/personas sobre «casa» como edificio.'
  issues:
  - severity: medium
    issue: «la casa de Onesíforo» puede sonar a edificio más que al grupo doméstico
    rationale: Aunque «casa de» puede usarse en español para un hogar/familia, en español contemporáneo neutral la lectura más inmediata suele ser física. El griego οἶκος aquí, en una lista de saludos, se refiere más naturalmente a la gente del hogar. La traducción auditada inglesa optó por «household», por lo que conviene una solución española que preserve mejor ese valor social.
