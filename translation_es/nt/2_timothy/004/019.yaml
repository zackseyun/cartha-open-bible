translation:
  language: es
  text: Saluda a Prisca[a] y a Aquila, y a la familia de Onesíforo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Prisca» refleja la forma griega Πρίσκα; en otros pasajes del NT aparece también la forma más familiar «Priscila» (p. ej., Hch 18:2, 18, 26).
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄσπασαι
  english_pob_choice: Greet
  chosen_spanish: Saluda
  alternatives_spanish:
  - Da saludos a
  - Saluda cordialmente a
  lexicon: BDAG
  rationale: El imperativo epistolar Ἄσπασαι pide transmitir saludos. En español, «saluda» comunica de forma natural esa acción sin añadir intensidad no explicitada por el verbo.
- source_word: Πρίσκαν
  english_pob_choice: Prisca
  chosen_spanish: Prisca
  alternatives_spanish:
  - Priscila
  lexicon: BDAG
  rationale: El griego conserva la forma formal Πρίσκα; por fidelidad al texto fuente se mantiene «Prisca». La forma familiar «Priscila» se reserva para pasajes donde el griego o la tradición textual la apoyan.
- source_word: Ἀκύλαν
  english_pob_choice: Aquila
  chosen_spanish: Aquila
  lexicon: BDAG
  rationale: Transliteración directa y estable del nombre propio Ἀκύλας.
- source_word: τὸν Ὀνησιφόρου οἶκον
  english_pob_choice: the household of Onesiphorus
  chosen_spanish: la casa de Onesíforo
  alternatives_spanish:
  - la familia de Onesíforo
  - el hogar de Onesíforo
  lexicon: BDAG
  rationale: οἶκος puede referirse al conjunto doméstico. En una salutación, «la casa de» conserva la amplitud social del término y suena natural en español; «familia» podría restringir el sentido a parientes, y «hogar» desplaza el foco hacia el lugar.
translation_notes:
  revision_awareness: El texto griego coincide con la lectura auditada del POB inglés y no requiere cambios de revisión; se preserva la forma nominal exacta de Πρίσκα y el sentido de οἶκος en saludo epistolar.
  spanish_consistency_notes:
  - Se mantiene «Aquila» sin adaptación adicional, conforme al nombre propio establecido.
  - Se usa «casa de» para οἶκος, una solución breve y natural en español que conserva la referencia al grupo doméstico sin sobreespecificar.
  - La nota al pie conserva la tensión onomástica entre «Prisca» y «Priscila» sin resolverla artificialmente.
