  yaml_path: translation/nt/2_timothy/004/013.yaml
  text: When you come[a], bring the cloak that I left in Troas with Carpus, and the books[b], especially the parchments.
  footnotes:
  - marker: a
    text: Or 'the scrolls' for 'the books'; the Greek term can refer to written rolls or similar written materials.
    reason: lexical_alternative
  - marker: b
    text: Some interpreters understand 'cloak' as a case or wrapper for books, but the usual sense of the Greek word is an outer garment.
    reason: lexical_alternative
