translation:
  language: es
  text: Cuando vengas, trae el manto[a] que dejé en Troas con Carpo, y los libros[b], especialmente los pergaminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos intérpretes entienden «manto» como un estuche o envoltura para libros, pero el sentido usual del término griego es una prenda exterior.
    reason: lexical_alternative
  - marker: b
    text: O «los rollos» para «los libros»; el término griego puede referirse a rollos escritos u otros materiales escritos semejantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: φαιλόνην
  english_pob_choice: cloak
  chosen_spanish: manto
  alternatives_spanish:
  - capa
  - abrigo
  - manto de viaje
  - estuche para libros
  lexicon: BDAG
  rationale: El término griego se refiere normalmente a una prenda exterior. En español, 'manto' comunica de forma natural la idea de una prenda que se lleva encima, sin introducir una lectura funcional ajena al contexto. Se evita 'estuche para libros' porque la evidencia léxica favorece la prenda, aunque se conserva la tensión histórica mediante una nota.
- source_word: ἀπέλιπον
  english_pob_choice: I left
  chosen_spanish: dejé
  alternatives_spanish:
  - dejé allí
  - dejé atrás
  - lo dejé
  lexicon: BDAG
  rationale: El aoristo de ἀπολείπω expresa simplemente que lo dejó en Troas. 'Dejé' es idiomático y fiel; el contexto ya especifica el lugar y la custodia con Carpo.
- source_word: παρὰ Κάρπῳ
  english_pob_choice: with Carpus
  chosen_spanish: con Carpo
  alternatives_spanish:
  - en casa de Carpo
  - junto a Carpo
  - en poder de Carpo
  lexicon: BDAG
  rationale: La preposición παρά con dativo indica cercanía o ubicación con alguien; en este contexto sugiere que el objeto quedó con Carpo o bajo su resguardo. 'Con Carpo' conserva la concisión del texto y la decisión del POB inglés.
- source_word: ἐρχόμενος
  english_pob_choice: When you come
  chosen_spanish: Cuando vengas
  alternatives_spanish:
  - al venir
  - cuando llegues
  - viniendo
  lexicon: BDAG
  rationale: El participio temporal se traduce mejor en español como una cláusula temporal natural. 'Cuando vengas' reproduce la relación temporal con el imperativo sin sonar forzado.
- source_word: φέρε
  english_pob_choice: bring
  chosen_spanish: trae
  alternatives_spanish:
  - lleva
  - tráeme
  lexicon: BDAG
  rationale: El imperativo pide que Timoteo traslade los objetos hacia Pablo; 'trae' es el equivalente más natural en español. 'Lléva' podría sonar menos preciso respecto al punto de llegada implícito.
- source_word: τὰ βιβλία
  english_pob_choice: the books
  chosen_spanish: los libros
  alternatives_spanish:
  - los rollos
  - los escritos
  lexicon: BDAG
  rationale: βιβλία puede referirse a libros o rollos. Se mantiene 'libros' como equivalente amplio y transparente, y se señala la alternativa histórica en nota porque en la antigüedad con frecuencia eran rollos.
- source_word: μάλιστα
  english_pob_choice: especially
  chosen_spanish: especialmente
  alternatives_spanish:
  - sobre todo
  - particularmente
  lexicon: BDAG
  rationale: μάλιστα introduce énfasis sobre el elemento siguiente. 'Especialmente' es la forma más directa y moderna en español.
- source_word: τὰς μεμβράνας
  english_pob_choice: the parchments
  chosen_spanish: los pergaminos
  alternatives_spanish:
  - las membranas
  - los cuadernos de pergamino
  lexicon: BDAG
  rationale: μεμβράνα designa material de escritura de pergamino. 'Pergaminos' es la equivalencia natural en español y evita la traducción literal 'membranas', que sería engañosa en este contexto.
translation_notes:
  revision_awareness: Coincido con el audit trail inglés en traducir φαιλόνην como una prenda exterior, no como un estuche para libros, y en mantener βιβλία como 'libros' con la alternativa histórica 'rollos' en nota. No hay revisiones aplicadas en el expediente inglés, así que la redacción española sigue de cerca esas decisiones auditadas.
  spanish_consistency_notes:
  - Se usó 'manto' para φαιλόνην por ser una prenda exterior natural en español; la nota preserva la tensión con la hipótesis alternativa de recipiente para libros.
  - 'Se mantuvo el orden y el énfasis del original: petición de traer la prenda, luego los libros, y por último la mención enfática de los pergaminos.'
  - '''Pergaminos'' traduce el material de escritura con claridad y evita una falsa equivalencia con ''membranas''.'
