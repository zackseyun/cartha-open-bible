revisions:
- from: Solo Lucas está conmigo. Trae a Marcos contigo[a], porque me es útil para el servicio.
  to: Solo Lucas está conmigo. Recoge a Marcos y tráelo contigo, porque me es útil para el servicio[a].
  rationale: Se ajusta el mandato para reflejar mejor ἀναλαβὼν + ἄγε ('recoge... y tráelo'), se mueve la nota al término pertinente, y se corrige la alternativa léxica para que preserve la opción significativa documentada en la auditoría inglesa.
