translation:
  language: es
  text: Solo Lucas está conmigo. Recoge a Marcos y tráelo contigo, porque me es útil para el servicio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para el ministerio». El griego διακονία puede referirse más ampliamente al servicio, aunque aquí probablemente alude al trabajo relacionado con la obra apostólica.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λουκᾶς
  english_pob_choice: Luke
  chosen_spanish: Lucas
  alternatives_spanish:
  - Lucano
  lexicon: nombre propio
  rationale: Es el nombre propio del compañero de Pablo; en español se translitera como ‘Lucas’. No hay base para traducirlo.
- source_word: μόνος
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente él
  - el único
  lexicon: BDAG
  rationale: ‘Solo’ expresa de modo natural que Lucas es el único compañero presente, conservando la exclusividad del griego χωρίς añadir matiz innecesario.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto conmigo
  - a mi lado
  lexicon: BDAG
  rationale: La preposición μετὰ con genitivo indica compañía; ‘conmigo’ es idiomático y directo en español.
- source_word: Μᾶρκον
  english_pob_choice: Mark
  chosen_spanish: Marcos
  alternatives_spanish:
  - Marco
  lexicon: nombre propio
  rationale: Nombre propio transliterado al uso corriente en español bíblico como ‘Marcos’.
- source_word: ἀναλαβὼν
  english_pob_choice: pick up
  chosen_spanish: trae
  alternatives_spanish:
  - llévate
  - toma
  lexicon: BDAG
  rationale: El participio aoristo previo al imperativo expresa la acción de tomarlo consigo antes de llevarlo; en español, el comando principal ‘trae’ comunica bien el movimiento requerido sin forzar una calca.
- source_word: ἄγε
  english_pob_choice: bring him
  chosen_spanish: trae
  alternatives_spanish:
  - llévalo
  - hazlo venir
  lexicon: BDAG
  rationale: El imperativo de ἄγω aquí pide llevar a Marcos con él. En español el objeto puede omitirse porque está claro por el contexto inmediato.
- source_word: μετὰ σεαυτοῦ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con vosotros
  - junto a ti
  lexicon: BDAG
  rationale: La construcción marca compañía personal; ‘contigo’ conserva la relación directa con Timoteo y es natural en español.
- source_word: εὔχρηστος
  english_pob_choice: useful
  chosen_spanish: útil
  alternatives_spanish:
  - provechoso
  - apto
  lexicon: BDAG
  rationale: ‘Útil’ reproduce con precisión la idea de ser provechoso o de buen uso, sin introducir una evaluación más amplia que la del texto.
- source_word: εἰς διακονίαν
  english_pob_choice: for service
  chosen_spanish: para el servicio
  alternatives_spanish:
  - para el ministerio
  - para la labor
  lexicon: BDAG
  rationale: La revisión inglesa favorece ‘service’ para no estrechar διακονία a un cargo técnico. En español, ‘servicio’ mantiene la amplitud semántica y evita imponer una lectura institucional no explicitada por el griego.
theological_decisions:
- issue: Sentido de διακονία en la valoración de Marcos
  english_pob_reading: service
  chosen_spanish_reading: servicio
  alternative_spanish_readings:
  - ministerio
  - obra de ministerio
  rationale: El contexto pastoral-apostólico permite pensar en trabajo de servicio relacionado con la misión, pero el término griego no exige un sentido técnico de ‘ministerio’. ‘Servicio’ preserva esa amplitud y sigue la revisión auditada de la POB inglesa.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de ‘for ministry’ a ‘for service’ para reflejar más directamente διακονίαν sin estrechar su sentido. La versión española sigue esa última decisión y evita el término más técnico ‘ministerio’ en el texto principal.
  spanish_consistency_notes:
  - 'Se mantuvo la transliteración estándar de nombres propios: Lucas y Marcos.'
  - Se prefirió ‘solo’ para μόνος y ‘conmigo/contigo’ para las relaciones de compañía, en un español natural y fiel.
  - ‘Útil’ conserva la valoración funcional de εὔχρηστος sin añadir connotaciones.
  - ‘Servicio’ se usó como equivalente principal de διακονία para respetar la amplitud semántica documentada en la auditoría inglesa.
  - No se introdujo ‘Cristo’ ni otras formulaciones litúrgicas ajenas al versículo.
