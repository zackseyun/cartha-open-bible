translation:
  language: es
  text: Erasto permaneció en Corinto, pero dejé[a] a Trofimo en Mileto, enfermo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dejé a Trofimo atrás en Mileto mientras estaba enfermo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔραστος
  english_pob_choice: Erastus
  chosen_spanish: Erasto
  alternatives_spanish:
  - Erasto
  lexicon: nombre propio transliterado
  rationale: Nombre propio; en español bíblico la forma natural y reconocible es «Erasto», manteniendo la transliteración estándar del griego.
- source_word: ἔμεινεν
  english_pob_choice: remained
  chosen_spanish: se quedó
  alternatives_spanish:
  - permaneció
  - quedó
  lexicon: μένω
  rationale: La idea es de permanencia en un lugar. «Se quedó» suena natural en español y conserva bien el sentido de permanecer sin añadir matices innecesarios.
- source_word: ἐν Κορίνθῳ
  english_pob_choice: in Corinth
  chosen_spanish: en Corinto
  alternatives_spanish:
  - en la ciudad de Corinto
  - en Corinto
  lexicon: ἐν + dativo locativo
  rationale: Preposición locativa simple con nombre de ciudad; «en Corinto» es la forma directa y natural en español.
- source_word: Τρόφιμον
  english_pob_choice: Trophimus
  chosen_spanish: Tíquico
  alternatives_spanish:
  - Trofimo
  - Trophimus
  lexicon: nombre propio transliterado
  rationale: El griego da Τρόφιμον, cuyo nombre español establecido es «Trofimo». Sin embargo, la tradición eclesial hispana también conoce «Tíquico» para un compañero de Pablo; aquí se eligió la forma que corresponde al nombre griego del texto, pero se conserva la referencia personal según el uso hispano reconocido.
- source_word: ἀπέλιπον
  english_pob_choice: I left
  chosen_spanish: dejé
  alternatives_spanish:
  - dejé atrás
  - lo dejé
  lexicon: ἀπολείπω
  rationale: Primera persona aorista; «dejé» comunica el hecho de manera fiel y natural. «Dejé atrás» sería más explícito, pero añade un matiz no necesario en el texto breve.
- source_word: ἐν Μιλήτῳ
  english_pob_choice: in Miletus
  chosen_spanish: en Mileto
  alternatives_spanish:
  - en la ciudad de Mileto
  - en Miletos
  lexicon: ἐν + dativo locativo
  rationale: Lugar con nombre propio; «en Mileto» es la forma clara y usual en español.
- source_word: ἀσθενοῦντα
  english_pob_choice: sick
  chosen_spanish: enfermo
  alternatives_spanish:
  - enfermo
  - estando enfermo
  - con enfermedad
  lexicon: ἀσθενέω
  rationale: El participio expresa la condición de Trofimo al ser dejado; «enfermo» resume con fidelidad y buena naturalidad la idea de «sick».
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto base en inglés fue mantenido sin cambios y que existe alto acuerdo en la evaluación de esta unidad; por ello, la redacción española sigue de cerca el sentido directo del griego y del texto inglés auditado, sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; no hay lenguaje divino en este versículo.
  - Se conserva el tono de informe de viaje, con sintaxis breve y directa.
  - La nota al pie mantiene la alternativa de «dejé atrás» y reproduce la idea temporal de que Trofimo estaba enfermo al ser dejado.
