  - severity: low
    issue: Registro ligeramente coloquial en «se quedó».
    rationale: «Permaneció» se ajusta mejor al tono bíblico digno y al matiz de μένω en un reporte de viaje, aunque «se quedó» no es infiel.
  revised_spanish_text: Erasto permaneció en Corinto, pero dejé[a] a Trofimo en Mileto, enfermo.
