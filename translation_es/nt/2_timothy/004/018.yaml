- from: El Señor me librará de toda mala obra y me salvará para su reino celestial[a]. A él sea la gloria por los siglos de los siglos[b]. Amén.
  to: El Señor me librará de toda mala obra y me salvará para entrar en su reino celestial[a]. A él sea la gloria por los siglos de los siglos[b]. Amén.
  rationale: Se revisa «para su reino celestial» a «para entrar en su reino celestial» para preservar mejor el sentido de εἰς como ingreso a una meta, sin forzar un calco poco natural en español. Se ajusta la nota a) para normalizar el estilo y conservar la alternativa léxica pertinente. La doxología se mantiene igual por ser fiel, clara y de registro apropiado.
