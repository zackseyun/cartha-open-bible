translation:
  language: es
  text: El Señor me librará de toda mala obra y me salvará para entrar en su reino celestial[a]. A él sea la gloria por los siglos de los siglos[b]. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de toda obra mala». Lit. más de cerca al griego: «me salvará hacia/en su reino celestial».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «por los siglos de los siglos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥύσεταί
  english_pob_choice: will rescue
  chosen_spanish: me librará
  alternatives_spanish:
  - me rescatará
  - me librará de peligro
  - me salvará
  lexicon: BDAG
  rationale: ῥύομαι expresa sacar o librar de una situación amenazante. En español, «librará» comunica con naturalidad esa acción de liberación y mantiene el tono confiado del texto. «Rescatará» sería posible, pero «librará» suena más idiomático en este contexto epistolar y conserva la fuerza de intervención divina.
- source_word: ἀπὸ παντὸς ἔργου πονηροῦ
  english_pob_choice: from every evil deed
  chosen_spanish: de toda mala obra
  alternatives_spanish:
  - de toda obra mala
  - de toda obra malvada
  - de toda mala acción
  lexicon: BDAG
  rationale: ἔργον puede ser «obra» o «acto», y πονηροῦ califica la obra como moralmente mala. «Toda mala obra» conserva la relación adjetival sin forzar una expresión más pesada. Se evita «hecho» porque en español puede sonar menos natural y perder el matiz de obra/acto realizado.
- source_word: σώσει
  english_pob_choice: will save
  chosen_spanish: me salvará
  alternatives_spanish:
  - me preservará
  - me guardará
  - me salvará
  lexicon: BDAG
  rationale: σῴζω aquí mantiene su peso escatológico. «Salvará» reproduce ese valor teológico de salvación y encaja mejor con el paralelo de rescate presente y salvación futura que «preservará» o «guardará».
- source_word: εἰς τὴν βασιλείαν αὐτοῦ τὴν ἐπουράνιον
  english_pob_choice: into his heavenly kingdom
  chosen_spanish: para su reino celestial
  alternatives_spanish:
  - a su reino celestial
  - dentro de su reino celestial
  - hacia su reino celestial
  lexicon: BDAG
  rationale: εἰς normalmente marca dirección o entrada hacia una meta. En español, «para su reino celestial» comunica la orientación final sin sonar tan forzado como un calco con «en/para dentro de». «Celestial» mantiene el sentido de ἐπουράνιος y funciona con naturalidad bíblica en español.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: En este contexto, κύριος se refiere al Señor exaltado y la forma tradicional y clara en español es «el Señor». Se conserva el artículo porque el sujeto es definido y personal.
- source_word: ᾧ ἡ δόξα
  english_pob_choice: To him be the glory
  chosen_spanish: A él sea la gloria
  alternatives_spanish:
  - Para él sea la gloria
  - De él sea la gloria
  - A él pertenece la gloria
  lexicon: BDAG
  rationale: La construcción doxológica se vierte naturalmente con una fórmula de dedicación. «A él sea la gloria» reproduce bien el sentido de ascripción de honra sin convertirlo en una declaración posesiva menos idiomática.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - por siempre y para siempre
  - por los siglos de los siglos
  - por edades de edades
  lexicon: BDAG
  rationale: La expresión griega es literalmente «por los siglos de los siglos». En español, esta fórmula litúrgica es clara, digna y muy cercana al original. Se conserva en vez de una simplificación más general como «para siempre» para no perder la intensidad superlativa.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén
  lexicon: BDAG
  rationale: Se mantiene la transliteración litúrgica tradicional en español.
theological_decisions:
- issue: Relación entre rescate presente y salvación final
  english_pob_reading: The verse distinguishes rescue from evil deeds in the present and final salvation into the heavenly kingdom, without denying Paul's possible martyrdom.
  chosen_spanish_reading: El verso distingue entre la liberación de toda mala obra y la salvación final para el reino celestial, sin convertirlo en una promesa de escape físico inevitable.
  alternative_spanish_readings:
  - El Señor me librará de la muerte física
  - El Señor me librará de todo mal ahora y me salvará después
  rationale: La secuencia de dos verbos, junto con la meta escatológica del reino celestial, sugiere una liberación del mal y una salvación final, no necesariamente una garantía de evitar el martirio. La redacción española conserva esa tensión en vez de resolverla de forma excesiva.
  doctrine_reference: Preservar la tensión teológica sin cerrarla artificialmente.
- issue: Valor de εἰς τὴν βασιλείαν αὐτοῦ
  english_pob_reading: into his heavenly kingdom
  chosen_spanish_reading: para su reino celestial
  alternative_spanish_readings:
  - a su reino celestial
  - en su reino celestial
  rationale: El griego apunta a movimiento/entrada hacia una meta. En español, «para» conserva la orientación final y resulta más natural que un calco rígido, sin negar el sentido direccional del verbo.
  doctrine_reference: Mantener la orientación escatológica del texto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó σώσει εἰς hacia una expresión más directa pero natural. En español se optó por una solución equivalente y idiomática («me salvará para su reino celestial») que conserva la dirección hacia la meta y el peso soteriológico. También se preservó la tensión entre rescate presente y salvación final, sin introducir una promesa de liberación temporal absoluta.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος, de acuerdo con el uso devocional y doctrinal del proyecto.
  - Se eligió «salvará» para σώσει por su fuerza teológica, y «librará» para ῥύσεταί por su valor de rescate/liberación.
  - La fórmula doxológica se resolvió en español con «A él sea la gloria», una forma natural y reverente.
  - Se usó la fórmula litúrgica «por los siglos de los siglos» para reflejar el superlativo temporal del griego.
  - Se evitó «Cristo» porque el término griego aquí es κύριος, no Χριστός.
