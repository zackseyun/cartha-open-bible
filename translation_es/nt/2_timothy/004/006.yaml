translation:
  language: es
  text: Porque ya estoy siendo derramado como libación[a], y el tiempo de mi partida[b] ha llegado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estoy siendo derramado». El verbo griego evoca la imagen de una libación derramada en sacrificio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «salida», «liberación» o «disolución». «Partida» es una forma natural en este contexto para referirse a la muerte.'
    reason: alternative_reading
lexical_decisions:
- source_word: σπένδομαι
  english_pob_choice: am being poured out as a drink offering
  chosen_spanish: estoy siendo derramado como ofrenda
  alternatives_spanish:
  - estoy siendo derramado
  - estoy siendo derramado como libación
  - estoy siendo ofrecido como sacrificio
  lexicon: BDAG
  rationale: Conserva la imagen sacrificial del verbo griego σπένδομαι sin explicitar más de lo que el español requiere. 'Derramado' reproduce la metáfora de la libación; 'como ofrenda' mantiene el valor cultual sin cargar el texto con una explicación interpretativa que no está en el griego.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - ya para este momento
  - ya desde ahora
  lexicon: BDAG
  rationale: '''Ya'' comunica de forma natural la idea de que la acción está en curso y que la situación es inminente.'
- source_word: καιρός
  english_pob_choice: time
  chosen_spanish: tiempo
  alternatives_spanish:
  - momento
  - tiempo señalado
  - momento decisivo
  lexicon: BDAG
  rationale: '''Tiempo'' es la forma más directa y fluida en español. El matiz de ocasión decisiva o señalada queda preservado por el contexto de la frase completa, sin añadir una glosa innecesaria.'
- source_word: ἀναλύσεώς μου
  english_pob_choice: departure
  chosen_spanish: mi partida
  alternatives_spanish:
  - mi salida
  - mi partida de este mundo
  - mi liberación
  lexicon: BDAG
  rationale: '''Partida'' es un equivalente natural y reverente para ἀνάλυσις en este contexto de muerte inminente. Mantiene el valor eufemístico y evita hacer explícito ''muerte'' donde el griego usa un término más velado.'
- source_word: ἐφέστηκεν
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - está cerca
  - ha venido
  - está al llegar
  lexicon: BDAG
  rationale: El perfecto comunica un estado presente resultante de la llegada del momento decisivo. 'Ha llegado' es idiomático y conserva esa fuerza sin sobretraducción.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Y es que
  lexicon: BDAG
  rationale: '''Porque'' mantiene la relación explicativa con el versículo anterior en español natural y claro.'
theological_decisions:
- issue: Imagen sacrificial de la muerte de Pablo
  english_pob_reading: Paul speaks of his impending death with sacrificial imagery ('being poured out as a drink offering') and with the euphemistic term 'departure.'
  chosen_spanish_reading: Pablo describe su muerte inminente con imagen sacrificial ('siendo derramado') y con el eufemismo 'mi partida'.
  alternative_spanish_readings:
  - Pablo habla solo de sufrimiento
  - Pablo dice directamente que va a morir
  rationale: La combinación de σπένδομαι y ἀνάλυσις apunta con fuerza a la muerte cercana, pero el español conserva la imagen y el eufemismo en vez de aplanarlos en una paráfrasis interpretativa. Así se respeta la tensión textual y la audacia metafórica del original.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de revisión fue de alta concordancia y sin objeciones. La presente redacción mantiene esa lectura y la expresa en español con equivalencia óptima y conservando la imaginería sacrificial y el eufemismo de ἀνάλυσις.
  spanish_consistency_notes:
  - Se usa «ya» para ἤδη por naturalidad y porque el matiz temporal queda claro en la construcción completa.
  - Se evita «SEÑOR» u otra adaptación teológica no presente en este versículo.
  - «Partida» se elige como término reverente y comprensible para muerte inminente, sin desplazar la metáfora del griego.
  - La puntuación reproduce la estructura explicativa del original con dos cláusulas coordinadas.
