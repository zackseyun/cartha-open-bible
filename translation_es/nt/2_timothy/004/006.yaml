revisions:
- from: Porque ya estoy siendo derramado como ofrenda[a], y el tiempo de mi partida[b] ha llegado.
  to: Porque ya estoy siendo derramado como libación[a], y el tiempo de mi partida[b] ha llegado.
  rationale: Se reemplaza «como ofrenda» por «como libación» para reflejar con mayor fidelidad la imagen cultual específica de σπένδομαι y alinearse con la decisión léxica auditada del POB inglés («drink offering»). Se conservan «Porque», «ya», «mi partida» y «ha llegado», que representan bien el griego y su tono. La nota a se ajusta para apoyar la nueva redacción principal.
  reviewer_model: gpt-5.4
