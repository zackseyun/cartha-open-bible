- from: Esfuérzate por venir antes del invierno. Eubulo te saluda[a], y también Pudente y Lino y Claudia y todos los hermanos.
  to: Haz todo lo posible por venir antes de invierno. Eubulo te envía saludos, y también Pudens y Lino y Claudia y todos los hermanos[a].
  rationale: Se ajusta Σπούδασον a «Haz todo lo posible» para reflejar mejor la urgencia diligente documentada en el English POB; se cambia «te saluda» por «te envía saludos» para un español epistolar más natural; se normaliza Πούδης como «Pudens» por mejor alineación con el audit trail; y se mantiene la nota inclusiva sobre «hermanos» con anclaje en la frase correspondiente.
