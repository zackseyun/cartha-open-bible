review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: la urgencia de Σπούδασον, la referencia temporal πρὸ χειμῶνος, el infinitivo ἐλθεῖν, el saludo epistolar Ἀσπάζεταί σε y la lista de nombres con οἱ ἀδελφοὶ πάντες. La nota sobre «hermanos» también preserva correctamente la alternativa inclusiva documentada en el English POB.'
  spanish_quality_summary: 'El español es claro y natural. Sin embargo, hay dos detalles mejorables: «antes del invierno» no coincide tan bien con la formulación más directa y natural «antes de invierno»/«antes que llegue el invierno», y sobre todo «Pudente» introduce una latinización/tradicionalización innecesaria frente a la forma más directamente alineada con el audit trail, «Pudens». También conviene preferir «te envía saludos» en contexto epistolar, que suena más idiomático que «te saluda» al reportar saludos por carta.'
  glossary_alignment: No hay términos teológicos sensibles fuera de «hermanos», que está bien resuelto. Los nombres propios deben seguir la política de transliteración de manera consistente; «Eubulo», «Lino» y «Claudia» son aceptables en español, pero «Pudente» se aparta del registro esperado del audit trail sin necesidad contextual suficiente.
  issues:
  - severity: medium
    issue: «Pudente» para Πούδης
    rationale: El English POB documenta «Pudens» como forma elegida. «Pudente» es una adaptación tradicional posible, pero aquí no está justificada por una política española explícita y se aleja innecesariamente del nombre reconocido en estudios bíblicos.
  - severity: low
    issue: «te saluda» en vez de «te envía saludos»
    rationale: Aunque semánticamente válido, ἀσπάζομαι en contexto epistolar suele expresarse de forma más natural en español como «te envía saludos», en línea con la decisión inglesa documentada.
  - severity: low
    issue: «antes del invierno» puede afinarse
    rationale: No es incorrecto, pero «antes de invierno» suena más directo y natural en español bíblico moderno para una referencia estacional general sin artículo enfático.
  revised_spanish_text: Haz todo lo posible por venir antes de invierno. Eubulo te envía saludos, y también Pudens y Lino y Claudia y todos los hermanos[a].
  revised_footnotes:
  - marker: a
    text: O «todos los hermanos y hermanas»; el griego dice «hermanos», pero en este contexto puede referirse al grupo más amplio de creyentes.
    reason: lexical_alternative
