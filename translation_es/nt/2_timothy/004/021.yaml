translation:
  language: es
  text: Haz todo lo posible por venir antes de invierno. Eubulo te envía saludos, y también Pudens y Lino y Claudia y todos los hermanos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los hermanos y hermanas»; el griego dice «hermanos», pero en este contexto puede referirse al grupo más amplio de creyentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σπούδασον
  english_pob_choice: Make every effort
  chosen_spanish: Esfuérzate
  alternatives_spanish:
  - Haz todo lo posible
  - Procura con diligencia
  lexicon: BDAG
  rationale: El imperativo aoristo de σπουδάζω comunica diligencia urgente y empeño. En español, «esfuérzate» conserva la idea de aplicar toda la atención y el empeño necesarios sin sonar demasiado literal o pesado.
- source_word: πρὸ χειμῶνος
  english_pob_choice: before winter
  chosen_spanish: antes del invierno
  alternatives_spanish:
  - antes de que llegue el invierno
  - antes del invierno
  lexicon: BDAG
  rationale: La preposición πρό con genitivo indica anterioridad temporal. «Antes del invierno» es la formulación más natural y fiel en español.
- source_word: ἐλθεῖν
  english_pob_choice: to come
  chosen_spanish: venir
  alternatives_spanish:
  - llegar
  lexicon: BDAG
  rationale: El infinitivo complementa al imperativo y se refiere a la llegada de Timoteo hacia Pablo. «Venir» conserva el movimiento hacia el hablante y es la opción más directa.
- source_word: Ἀσπάζεταί σε
  english_pob_choice: sends greetings to you
  chosen_spanish: te saluda
  alternatives_spanish:
  - te envía saludos
  - te manda saludos
  lexicon: BDAG
  rationale: En contexto epistolar, ἀσπάζομαι se expresa naturalmente como una fórmula de saludo. «Te saluda» mantiene el valor relacional sin recargar la frase.
- source_word: Εὔβουλος
  english_pob_choice: Eubulus
  chosen_spanish: Eubulo
  alternatives_spanish:
  - Eúbulo
  lexicon: transliteración de nombre propio
  rationale: Se translitera el nombre propio al español con ortografía natural y reconocible.
- source_word: Πούδης
  english_pob_choice: Pudens
  chosen_spanish: Pudente
  alternatives_spanish:
  - Pudens
  lexicon: transliteración de nombre propio
  rationale: El nombre se adapta a la forma tradicional en español, «Pudente», que refleja el antropónimo latino subyacente y es más inteligible que una transliteración más rígida.
- source_word: Λίνος
  english_pob_choice: Linus
  chosen_spanish: Lino
  alternatives_spanish:
  - Linus
  lexicon: transliteración de nombre propio
  rationale: El nombre propio se vierte en su forma usual española, «Lino».
- source_word: Κλαυδία
  english_pob_choice: Claudia
  chosen_spanish: Claudia
  alternatives_spanish:
  - Claudia
  lexicon: transliteración de nombre propio
  rationale: El nombre ya coincide con la forma estándar en español.
- source_word: οἱ ἀδελφοὶ πάντες
  english_pob_choice: all the brothers
  chosen_spanish: todos los hermanos
  alternatives_spanish:
  - todos los hermanos y hermanas
  - todos los creyentes
  lexicon: BDAG
  rationale: El griego usa el plural masculino ἀδελφοί. Se conserva «hermanos» en el texto principal por fidelidad gramatical y por la política de exactitud de género; la posible referencia a un grupo creyente más amplio queda preservada como alternativa.
theological_decisions:
- issue: Alcance de ἀδελφοί en el saludo final
  english_pob_reading: all the brothers
  chosen_spanish_reading: todos los hermanos
  alternative_spanish_readings:
  - todos los hermanos y hermanas
  - todos los creyentes
  rationale: El texto griego presenta el masculino plural ἀδελφοί. La lectura principal mantiene esa forma sin neutralizarla, para respetar la forma del original. La posibilidad de que el grupo incluya a la comunidad creyente más amplia se deja abierta en la nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'La versión inglesa POB y el control de revisión posterior coinciden en no requerir cambios: la solución mantiene la urgencia de Σπούδασον, el valor epistolar de Ἀσπάζεταί σε y la tensión lexical de οἱ ἀδελφοὶ πάντες sin sobreinterpretarla.'
  spanish_consistency_notes:
  - Se mantiene un español moderno y digno, sin calcos innecesarios.
  - Los nombres propios se presentan en formas españolas reconocibles.
  - La nota al pie preserva la alternativa inclusiva sin desplazar la lectura gramatical principal del griego.
