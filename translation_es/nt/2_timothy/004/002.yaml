translation:
  language: es
  text: Predica la palabra; estate preparado[a] en tiempo oportuno y no oportuno; reprende, reprende severamente, exhorta[c][b], con toda paciencia y enseñanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «actúa con urgencia» o «mantente dispuesto». El imperativo griego puede llevar la idea de estar preparado, presente o insistiendo en el asunto.
    reason: lexical_alternative
  - marker: b
    text: O «ya sea en tiempo favorable o desfavorable».
    reason: lexical_alternative
  - marker: c
    text: O «anima» o «urge» para «exhorta».
    reason: lexical_alternative
lexical_decisions:
- source_word: κήρυξον
  english_pob_choice: Preach
  chosen_spanish: Predica
  alternatives_spanish:
  - Proclama
  - Heraldiza
  lexicon: BDAG
  rationale: κήρυξον es el imperativo de κηρύσσω y denota anuncio público y autorizado. «Predica» conserva el tono ministerial y la fuerza proclamadora que el POB inglés captó con «Preach».
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la Palabra
  lexicon: BDAG
  rationale: λόγος aquí se refiere de manera natural al mensaje apostólico que ha de ser proclamado. «La palabra» preserva la amplitud del griego y evita restringir innecesariamente el sentido.
- source_word: ἐπίστηθι
  english_pob_choice: be ready
  chosen_spanish: mantente listo
  alternatives_spanish:
  - estate presente
  - permanece atento
  - sé urgente
  lexicon: BDAG
  rationale: El verbo puede implicar estar presente, preparado o presto para actuar. «Mantente listo» transmite de forma natural la idea de disponibilidad continua sin perder la fuerza imperativa.
- source_word: εὐκαίρως ἀκαίρως
  english_pob_choice: in season and out of season
  chosen_spanish: en tiempo oportuno y no oportuno
  alternatives_spanish:
  - en momento favorable y desfavorable
  - cuando convenga y cuando no convenga
  lexicon: BDAG
  rationale: La pareja adverbial expresa oportunidad y falta de oportunidad. «En tiempo oportuno y no oportuno» conserva la antítesis retórica del griego y su sentido idiomático.
- source_word: ἔλεγξον
  english_pob_choice: reprove
  chosen_spanish: reprende
  alternatives_spanish:
  - corrige
  - reprocha
  - convénce
  lexicon: BDAG
  rationale: ἐλέγχω puede abarcar exponer la falta y corregirla. En español, «reprende» mantiene la fuerza correctiva sin limitar el verbo al solo sentido de «convencer».
- source_word: ἐπιτίμησον
  english_pob_choice: rebuke
  chosen_spanish: amonesta
  alternatives_spanish:
  - reprende severamente
  - censura
  - increpa
  lexicon: BDAG
  rationale: ἐπιτιμάω es un mandato correctivo más fuerte. «Amonesta» es adecuado y natural en español, aunque algo menos áspero que «reprende severamente»; se mantiene la serie de imperativos disciplinarios sin sobrecargarla con un calco demasiado duro.
- source_word: παρακάλεσον
  english_pob_choice: exhort
  chosen_spanish: exhorta
  alternatives_spanish:
  - anima
  - urge
  - consuela
  lexicon: BDAG
  rationale: παρακαλέω puede significar exhortar, animar o urgir según el contexto. Aquí, junto con reprender y amonestar, «exhorta» reproduce bien la urgencia pastoral del encargo.
- source_word: ἐν πάσῃ μακροθυμίᾳ
  english_pob_choice: with all patience
  chosen_spanish: con toda paciencia
  alternatives_spanish:
  - con toda longanimidad
  - con plena paciencia
  lexicon: BDAG
  rationale: μακροθυμία señala paciencia perseverante y tolerante hacia las personas. «Con toda paciencia» es claro, natural y reproduce el alcance total de πάσῃ.
- source_word: διδαχῇ
  english_pob_choice: teaching
  chosen_spanish: enseñanza
  alternatives_spanish:
  - doctrina
  - instrucción
  lexicon: BDAG
  rationale: διδαχή alude al acto y contenido de enseñar. «Enseñanza» es una forma amplia y natural en español, compatible con el tono pastoral y doctrinal del versículo.
theological_decisions:
- issue: Alcance de λόγος
  english_pob_reading: Rendered as 'the word' without expanding to 'the gospel' or 'Scripture' in the main text.
  chosen_spanish_reading: Se mantiene «la palabra» sin expandir a «el evangelio» ni «las Escrituras».
  alternative_spanish_readings:
  - el mensaje
  - el evangelio
  - las Escrituras
  rationale: El contexto inmediato sostiene la proclamación apostólica, pero el sustantivo griego no restringe explícitamente el referente. Mantener «la palabra» preserva la amplitud del texto y respeta la tensión documental del POB.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Secuencia de corrección pastoral
  english_pob_reading: reprove, rebuke, exhort
  chosen_spanish_reading: reprende, amonesta, exhorta
  alternative_spanish_readings:
  - corrige, reprende, anima
  - reprende, censura, exhorta
  rationale: 'La triple serie conserva el movimiento del original: corrección, reprensión más fuerte y exhortación. Se evita suavizarla demasiado o colapsar los matices entre los tres mandatos.'
  doctrine_reference: Lexical force and pastoral discipline in the translation of imperatives.
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego y el POB inglés auditado, sin cambios revisionales conocidos en el pasaje; se mantiene la serie imperativa y la cláusula final de manera transparente.
  spanish_consistency_notes:
  - Se usa «la palabra» para λόγος, en línea con el POB inglés.
  - Se preserva la tríada correctiva con verbos distinguibles en español.
  - «Con toda paciencia y enseñanza» mantiene la estructura instrumental final del griego.
  - Las notas a pie distinguen alternativas léxicas reales y no repiten marcador.
