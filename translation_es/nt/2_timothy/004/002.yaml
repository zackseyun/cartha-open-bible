revisions:
- from: Predica la palabra[a]; mantente listo en tiempo oportuno y no oportuno; reprende, amonesta, exhorta[c][b], con toda paciencia y enseñanza.
  to: Predica la palabra; estate preparado[a] en tiempo oportuno y no oportuno; reprende, reprende severamente, exhorta[c][b], con toda paciencia y enseñanza.
  rationale: Se ajusta ἐπίστηθι a «estate preparado» para un español más natural y más cercano al sentido de estar listo/presente para actuar. Se fortalece ἐπιτίμησον como «reprende severamente» para preservar la distinción con ἔλεγξον. Se corrige la nota alternativa de ἐπίστηθι para evitar una formulación no idiomática. Se elimina la nota [a] de «la palabra» porque en el expediente inglés esa nota corresponde a ἐπίστηθι, no a λόγος; los marcadores deben anclarse al elemento pertinente del texto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:02:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura imperativa del griego y preserva correctamente «la palabra», «exhorta» y «con toda paciencia y enseñanza». Sin embargo, dos elecciones debilitan matices importantes del original y del rastro de auditoría inglés: «mantente listo» suena algo coloquial para ἐπίστηθι y no recoge tan bien la idea de estar preparado/presente con urgencia; y «amonesta» para ἐπιτίμησον suaviza el mandato más fuerte que sigue a ἔλεγξον, reduciendo la distinción entre los dos verbos correctivos.'
  spanish_quality_summary: El español es generalmente claro y legible, pero puede afinarse para sonar más natural y digno en registro eclesial amplio. «Estate preparado» funciona mejor que «mantente listo», y «reprende severamente» expresa con más fidelidad la intensificación de ἐπιτίμησον sin caer en dureza artificial. También conviene corregir la nota a de «hazte urgente», que no es idiomático en español.
  glossary_alignment: No hay conflicto con los términos base del proyecto. «La palabra» mantiene la decisión teológica documentada para λόγος. «Exhorta» conserva bien παρακάλεσον. Las mejoras propuestas buscan alinear mejor la fuerza léxica de ἐπίστηθι y ἐπιτίμησον con la auditoría inglesa y con un español más natural.
  issues:
  - severity: medium
    issue: «mantente listo» para ἐπίστηθι
    rationale: Aunque comunica disponibilidad, suena algo coloquial y menos digno que el tono del encargo pastoral. «Estate preparado» o similar transmite mejor la idea de estar listo/presente para actuar.
  - severity: medium
    issue: «amonesta» para ἐπιτίμησον
    rationale: Atenúa el valor más fuerte de ἐπιτίμησον frente a ἔλεγξον. El original distingue entre una corrección/reconvención y una reprensión más tajante; conviene reflejar ese incremento.
  - severity: low
    issue: 'Nota [a]: «hazte urgente»'
    rationale: No es una alternativa idiomática en español. Si se preserva la alternativa inglesa «be urgent», debe expresarse de forma natural, por ejemplo «actúa con urgencia» o «sé insistente».
