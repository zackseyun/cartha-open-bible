translation:
  language: es
  text: El Señor esté con tu espíritu[a]. La gracia sea con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego pasa del singular ('tu espíritu') al plural ('ustedes'); por eso la primera bendición es personal y la segunda se amplía a un grupo.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Amo
  - el Maestro
  lexicon: BDAG
  rationale: Conservo el título reverencial 'el Señor', que es el equivalente natural en español para κύριος en una bendición paulina. Evita una traducción mecánica y mantiene la lectura cristológica habitual del cierre epistolar.
- source_word: μετά
  english_pob_choice: be with
  chosen_spanish: esté con
  alternatives_spanish:
  - sea con
  - permanezca con
  lexicon: BDAG
  rationale: El griego expresa una fórmula de bendición sin verbo explícito; en español se requiere uno. 'Esté con' reproduce bien el sentido benedictorio de presencia acompañante sin añadir contenido ajeno.
- source_word: πνεύματός
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  - vida interior
  - ánimo
  lexicon: BDAG
  rationale: Mantengo 'espíritu' en minúscula porque el posesivo singular 'tu' apunta al espíritu humano de Timoteo, no de manera directa al Espíritu Santo. Esto preserva la tensión léxica del griego y la decisión auditada en inglés.
- source_word: σου
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - su
  lexicon: BDAG
  rationale: Conservo el singular para reflejar que la primera cláusula se dirige específicamente a Timoteo.
- source_word: χάρις
  english_pob_choice: Grace
  chosen_spanish: la gracia
  alternatives_spanish:
  - favor
  - la benevolencia
  lexicon: BDAG
  rationale: '''Gracia'' es la fórmula paulina normal y la opción más fiel al peso teológico del término. ''Favor'' sería posible, pero en español debilita la fuerza litúrgica de la despedida.'
- source_word: ὑμῶν
  english_pob_choice: you all
  chosen_spanish: ustedes
  alternatives_spanish:
  - todos ustedes
  - vosotros
  lexicon: BDAG
  rationale: Expreso el plural para hacer visible el cambio del singular al plural en el griego. 'Ustedes' comunica esa amplitud en español neutral y mantiene la bendición extendida a un grupo más amplio que Timoteo.
theological_decisions:
- issue: Referente de 'el Señor'
  english_pob_reading: A reference to the Lord Jesus in a Pauline closing benediction.
  chosen_spanish_reading: Una referencia al Señor Jesús en la bendición final paulina.
  alternative_spanish_readings:
  - Una referencia general a Dios
  rationale: En las despedidas paulinas, 'el Señor' suele referirse a Jesús. Conservar 'el Señor' evita sobreespecificar donde el griego no lo hace, pero permite la lectura cristológica propia del contexto.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Cambio de número entre las dos cláusulas
  english_pob_reading: The first clause addresses Timothy individually; the second extends grace to a plural group.
  chosen_spanish_reading: La primera cláusula se dirige a Timoteo en singular; la segunda extiende la gracia a un grupo plural.
  alternative_spanish_readings:
  - Hacer ambas cláusulas sonar como si se dirigieran solo a Timoteo
  rationale: El griego distingue claramente σου y ὑμῶν. En español conviene conservar esa diferencia, aunque de forma idiomática, porque forma parte del sentido literario y del alcance de la bendición.
  doctrine_reference: DOCTRINE.md Number and address in salutations/benedictions
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del expediente: no se registran revisiones aplicadas y el cotejo final indica alta concordancia, sin cambios necesarios.'
  spanish_consistency_notes:
  - Usé 'el Señor' y no 'SEÑOR' para mantener el nombre/título legible en español, conforme al criterio del proyecto para κύριος en este contexto.
  - Conservé 'gracia' como fórmula paulina fija y no la reduje a 'favor'.
  - La nota al pie marca el cambio de número para preservar la tensión gramatical del griego en una forma natural para el lector hispanohablante.
