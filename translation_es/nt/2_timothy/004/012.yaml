lexical_decisions:
- source_word: Τυχικὸν
  english_pob_choice: Tychicus
  chosen_spanish: Tíquico
  alternatives_spanish:
  - Tychicus
  lexicon: BDAG
  rationale: Nombre propio transliterado al español con la forma habitual y naturalizada 'Tíquico', que conserva la referencia al personaje sin traducirlo.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ puede marcar transición suave o contraste leve. 'Pero' mantiene la relación discursiva sin forzar una oposición fuerte y funciona con naturalidad en español.
- source_word: ἀπέστειλα
  english_pob_choice: I sent
  chosen_spanish: envié
  alternatives_spanish:
  - mandé
  - he enviado
  lexicon: BDAG
  rationale: El aoristo activo indica una acción pasada completa; 'envié' reproduce bien ese valor en español. 'Mandé' es posible pero menos neutral; 'he enviado' introduciría un matiz aspectual no necesario.
- source_word: εἰς
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: BDAG
  rationale: Con un nombre de ciudad, εἰς expresa destino; 'a' es la forma más natural y precisa en español.
- source_word: Ἔφεσον
  english_pob_choice: Ephesus
  chosen_spanish: Éfeso
  alternatives_spanish:
  - Efeso
  lexicon: BDAG
  rationale: Topónimo estándar en español. Se conserva la forma tradicional y ampliamente reconocible 'Éfeso'.
