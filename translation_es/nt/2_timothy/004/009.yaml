translation:
  language: es
  text: Haz todo lo posible por venir a mí pronto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sé diligente en venir a mí pronto» o «Esfuérzate por venir a mí pronto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σπούδασον
  english_pob_choice: Make every effort
  chosen_spanish: Procura
  alternatives_spanish:
  - Esfuérzate
  - Haz todo lo posible
  - Ten empeño
  lexicon: BDAG
  rationale: El imperativo aoristo de σπουδάζω expresa diligencia, empeño y esfuerzo intencional, no solo prisa. En español, «procura» comunica bien la exhortación a poner empeño sin borrar la urgencia que se completa con ταχέως.
- source_word: ἐλθεῖν
  english_pob_choice: to come
  chosen_spanish: venir
  alternatives_spanish:
  - ir
  - llegar
  lexicon: BDAG
  rationale: Con πρός με, el movimiento es hacia la persona que habla; en español natural, «venir a mí» reproduce mejor la deixis que «ir».
- source_word: πρός με
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  lexicon: BDAG
  rationale: La construcción con πρός + acusativo indica movimiento hacia una persona. «A mí» es la forma más natural en español con «venir».
- source_word: ταχέως
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - sin demora
  - enseguida
  lexicon: BDAG
  rationale: El adverbio puede expresar rapidez o inmediatez. En español, «pronto» preserva la urgencia temporal sin sonar redundante junto con «procura».
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; este borrador conserva esa línea y mantiene la distinción entre el imperativo de diligencia (σπούδασον) y la urgencia temporal (ταχέως).
  spanish_consistency_notes:
  - Se evitó traducir σπουδάζω como una simple prisa para no fusionarlo con ταχέως.
  - «Venir a mí» conserva la dirección personal del griego πρός με.
  - Se usó un español neutro y publicable, sin calco rígido, manteniendo el valor exhortativo del original.
