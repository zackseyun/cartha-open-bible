translation:
  language: es
  text: Tú también debes guardarte de él[a], porque se opuso con mucha fuerza a nuestras palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestro mensaje» o «nuestra enseñanza». El griego dice «nuestras palabras».
    reason: lexical_alternative
lexical_decisions:
- source_word: φυλάσσου
  english_pob_choice: must beware of
  chosen_spanish: debes guardarte de
  alternatives_spanish:
  - debes estar en guardia contra
  - debes cuidarte de
  - debes precaverte de
  lexicon: BDAG
  rationale: El imperativo presente medio pide cautela continua respecto de Alejandro. «Guardarte de» expresa bien la vigilancia personal y suena natural en español moderno; «debes» refleja la fuerza imperativa dirigida a Timoteo.
- source_word: λίαν
  english_pob_choice: strongly
  chosen_spanish: mucho
  alternatives_spanish:
  - fuertemente
  - grandemente
  - severamente
  lexicon: BDAG
  rationale: λίαν intensifica el verbo siguiente. En español, «se opuso mucho» transmite de forma natural la intensidad del rechazo sin volver la frase forzada.
- source_word: ἀντέστη
  english_pob_choice: opposed
  chosen_spanish: se opuso
  alternatives_spanish:
  - resistió
  - se enfrentó
  - se puso en contra
  lexicon: BDAG
  rationale: El aoristo de ἀνθίστημι indica ponerse en contra o resistir. «Se opuso» es claro, idiomático y mantiene la relación con el objeto dativo «a nuestras palabras».
- source_word: τοῖς ἡμετέροις λόγοις
  english_pob_choice: our words
  chosen_spanish: nuestras palabras
  alternatives_spanish:
  - nuestro mensaje
  - nuestra enseñanza
  - lo que dijimos
  lexicon: BDAG
  rationale: λόγοις aquí se refiere de manera más natural a las palabras dichas por Pablo y sus compañeros. «Nuestras palabras» conserva la cercanía al griego y mantiene abierta la tensión sobre si se trata de testimonio, enseñanza o defensa formal.
- source_word: ὃν
  english_pob_choice: him
  chosen_spanish: de él
  alternatives_spanish:
  - a ese hombre
  - a él
  lexicon: BDAG
  rationale: El relativo se refiere a Alejandro del versículo anterior. En español, con «guardarte de», el complemento adecuado es «de él»; comunica el mismo referente personal sin recargar la frase.
- source_word: καὶ σὺ
  english_pob_choice: You also
  chosen_spanish: Tú también
  alternatives_spanish:
  - Y tú también
  - Tú, además
  - También tú
  lexicon: BDAG
  rationale: La combinación καὶ σὺ enfatiza a Timoteo además del aviso previo. «Tú también» preserva ese énfasis de forma natural en español.
theological_decisions:
- issue: Alcance de «nuestras palabras»
  english_pob_reading: Paul refers to words spoken by himself and his associates, likely apostolic testimony or teaching, without specifying a formal technical category.
  chosen_spanish_reading: Pablo se refiere a las palabras dichas por él y sus compañeros, probablemente testimonio o enseñanza apostólica, sin precisar una categoría técnica.
  alternative_spanish_readings:
  - nuestro mensaje
  - nuestra enseñanza doctrinal
  - nuestra defensa legal
  rationale: El griego no obliga a decidir si la oposición ocurrió en un contexto judicial, misionero o doctrinal. «Nuestras palabras» conserva esa amplitud y evita cerrar indebidamente el sentido.
  doctrine_reference: Preservar la tensión interpretativa en vez de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto sigue en alto acuerdo con la evaluación de control, y no se requieren ajustes respecto del expediente inglés.
  spanish_consistency_notes:
  - Se mantuvo «Y tú también» como énfasis natural del griego καὶ σὺ.
  - Se prefirió «guardarte de» por fluidez española y cercanía semántica con el mandato de cautela continua.
  - Se conservó «nuestras palabras» para no expandir prematuramente el alcance de λόγοι a «mensaje» o «enseñanza».
