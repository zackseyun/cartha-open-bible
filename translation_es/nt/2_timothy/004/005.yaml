base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/005.yaml
  text: But as for you[a], keep a clear head in all things, endure hardship, do the work of an evangelist[c][b], fully carry out your ministry.
  footnotes:
  - marker: a
    text: Or 'be sober-minded,' 'be clear-minded,' or 'be sober.' The Greek verb νῆφε literally means "be sober [from wine]" but is always used figuratively in the NT for mental clarity, self-possession, and steadiness under pressure.
    reason: lexical_alternative
  - marker: b
    text: Or 'suffer hardship.'
    reason: lexical_alternative
  - marker: c
    text: Or 'fulfill your ministry.' The Greek verb carries the sense of bringing it to full completion.
    reason: lexical_alternative
