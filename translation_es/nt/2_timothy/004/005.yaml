translation:
  language: es
  text: Pero tú[a], mantén la cabeza clara en todo, soporta las dificultades[b], haz la obra de un evangelista, cumple plenamente tu ministerio[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sé sobrio de mente», «mantente con la mente clara» o «sé sobrio». El verbo griego νῆφε significa literalmente «ser sobrio [respecto del vino]», pero en el Nuevo Testamento siempre se usa de manera figurada para la claridad mental, el dominio propio y la firmeza bajo presión.
    reason: lexical_alternative
  - marker: b
    text: O «sufre dificultades».
    reason: lexical_alternative
  - marker: c
    text: O «cumple tu ministerio» o «llévalo a su plena realización». El verbo lleva la idea de completarlo del todo.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ δὲ
  english_pob_choice: But as for you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Pero en cuanto a ti
  - Tú, sin embargo
  lexicon: BDAG
  rationale: El pronombre es enfático y δέ marca contraste con lo anterior. «Pero tú» conserva el contraste y la interpelación personal en un español natural y sobrio.
- source_word: νῆφε
  english_pob_choice: keep a clear head
  chosen_spanish: mantente sobrio
  alternatives_spanish:
  - mantente con la mente clara
  - sé sobrio de mente
  - mantente despejado
  lexicon: BDAG
  rationale: En el NT νήφω se usa figuradamente, con la idea de claridad mental, autocontrol y firmeza bajo presión. En español, «mantente sobrio» preserva la fuerza léxica básica y la resonancia figurada, mientras que las alternativas explicitan más la claridad mental.
- source_word: ἐν πᾶσιν
  english_pob_choice: in all things
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en todo momento
  lexicon: BDAG
  rationale: La expresión modifica de manera amplia el mandato anterior y expresa totalidad. «En todo» es la forma más natural y abarcadora en español, sin restringir indebidamente el alcance.
- source_word: κακοπάθησον
  english_pob_choice: endure hardship
  chosen_spanish: soporta las dificultades
  alternatives_spanish:
  - sufre penalidades
  - aguanta el sufrimiento
  lexicon: BDAG
  rationale: El imperativo aoristo llama a aceptar y perseverar en el sufrimiento. «Soporta las dificultades» comunica tanto la prueba como la perseverancia; «sufre» puede sonar más descriptivo que exhortativo.
- source_word: ἔργον ποίησον
  english_pob_choice: do the work
  chosen_spanish: haz la obra
  alternatives_spanish:
  - haz el trabajo
  - cumple la tarea
  lexicon: BDAG
  rationale: La combinación es idiomática. «Haz la obra» suena natural en español bíblico contemporáneo y mantiene la fuerza imperativa sin sobrecargar el texto.
- source_word: εὐαγγελιστοῦ
  english_pob_choice: of an evangelist
  chosen_spanish: de un evangelista
  alternatives_spanish:
  - de un mensajero del evangelio
  - de uno que proclama buenas noticias
  lexicon: BDAG
  rationale: El sustantivo designa a quien anuncia el evangelio. «Evangelista» es el equivalente establecido y claro en español, y respeta el oficio/función sin parafrasear.
- source_word: τὴν διακονίαν σου
  english_pob_choice: your ministry
  chosen_spanish: tu ministerio
  alternatives_spanish:
  - tu servicio
  - tu labor de servicio
  lexicon: BDAG
  rationale: En este contexto pastoral y vocacional, «ministerio» recoge mejor la responsabilidad encomendada a Timoteo que el más general «servicio».
- source_word: πληροφόρησον
  english_pob_choice: fully carry out
  chosen_spanish: cumple plenamente
  alternatives_spanish:
  - lleva a cabo por completo
  - realiza plenamente
  - cumple del todo
  lexicon: BDAG
  rationale: El verbo expresa llevar algo a plena realización o completarlo por entero. «Cumple plenamente» conserva esa idea de plenitud y realización total, de forma natural en español.
theological_decisions:
- issue: Alcance exhortativo de νῆφε
  english_pob_reading: keep a clear head; figurative mental sobriety rather than literal abstinence from wine
  chosen_spanish_reading: mantente sobrio, entendido como claridad y firmeza mental
  alternative_spanish_readings:
  - mantente con la mente clara
  - sé sobrio de mente
  rationale: El verbo es figurado en el NT. La redacción española no debe reducirse a abstinencia alcohólica, sino transmitir sobriedad mental, vigilancia y estabilidad pastoral.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Naturaleza de διακονία
  english_pob_reading: your ministry rather than the broader service
  chosen_spanish_reading: tu ministerio
  alternative_spanish_readings:
  - tu servicio
  rationale: El contexto inmediato trata del encargo pastoral y del trabajo de anuncio del evangelio; por eso «ministerio» expresa mejor la función encomendada sin volverla denominacional.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente más reciente; el texto inglés quedó sin cambios tras la última pasada y con alto grado de acuerdo entre revisores.
  spanish_consistency_notes:
  - 'Se preservó el contraste enfático de σὺ δὲ con una apertura breve y natural: «Pero tú».'
  - Se mantuvo el valor figurado de νῆφε y se señaló explícitamente en la nota la posibilidad de otras soluciones españolas.
  - «Evangelista» se conserva como término funcional establecido, sin sustituirlo por una paráfrasis más larga.
  - «Ministerio» se eligió por el contexto pastoral del pasaje y se mantuvo coherente con el valor de διακονία en este tipo de encargo.
