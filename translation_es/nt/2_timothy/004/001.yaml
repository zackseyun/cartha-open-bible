translation:
  language: es
  text: 'Te encarezco solemnemente delante de Dios y del Mesías Jesús, que está para juzgar a los vivos y a los muertos[a], y por su aparición y su reino[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que juzgará a los vivos y a los muertos».'
    reason: lexical_alternative
  - marker: b
    text: 'O posiblemente: «y su aparición y su reino», dejando más implícita en español la relación sintáctica del griego.'
    reason: alternative_reading
lexical_decisions:
- source_word: Διαμαρτύρομαι
  english_pob_choice: I solemnly charge you
  chosen_spanish: Te encarezco solemnemente
  alternatives_spanish:
  - Te testifico solemnemente
  - Te exhorto solemnemente
  - Te ordeno solemnemente
  lexicon: BDAG
  rationale: En este contexto de comisión pastoral, el verbo expresa una apelación formal y solemne; «encarezco solemnemente» comunica mejor esa fuerza que un mero «testifico».
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: BDAG
  rationale: «Delante de» conserva la idea de estar en la presencia y bajo la mirada de Dios y de Jesucristo, con español natural.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Equivalente directo y estándar en español.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Mesías Jesús
  - Cristo Jesús
  lexicon: BDAG
  rationale: Aunque la pauta general favorece «Mesías» para Χριστός como título, en esta fórmula fija y reverencial el orden y la combinación «Jesucristo» suenan más naturales en español y mantienen la referencia titular sin forzar una construcción poco idiomática.
- source_word: τοῦ μέλλοντος κρίνειν
  english_pob_choice: who is about to judge
  chosen_spanish: que está para juzgar
  alternatives_spanish:
  - que va a juzgar
  - que juzgará
  lexicon: BDAG
  rationale: «Está para juzgar» conserva la cercanía/especial expectativa de μέλλω sin reducirlo a un futuro plano.
- source_word: ζῶντας καὶ νεκρούς
  english_pob_choice: the living and the dead
  chosen_spanish: a vivos y muertos
  alternatives_spanish:
  - a los vivos y a los muertos
  - a los que viven y a los que han muerto
  lexicon: BDAG
  rationale: Es una fórmula española natural y compacta que preserva el alcance universal del juicio.
- source_word: ἐπιφάνειαν
  english_pob_choice: appearing
  chosen_spanish: manifestación
  alternatives_spanish:
  - aparición
  - venida
  lexicon: BDAG
  rationale: «Manifestación» refleja la visibilidad pública de ἐπιφάνεια y evita una lectura demasiado interpretativa de «venida».
- source_word: βασιλείαν
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - gobierno real
  lexicon: BDAG
  rationale: «Reino» es la opción estándar y conserva la pareja escatológica con «manifestación».
- source_word: καὶ τὴν ἐπιφάνειαν αὐτοῦ καὶ τὴν βασιλείαν αὐτοῦ
  english_pob_choice: and by his appearing and his kingdom
  chosen_spanish: y por su manifestación y su reino
  alternatives_spanish:
  - y en vista de su manifestación y su reino
  - y su manifestación y su reino
  lexicon: BDAG
  rationale: La construcción española «por» reproduce bien la función adverbial/instrumental de la cláusula en una formulación solemne, sin añadir elementos no requeridos por el griego.
theological_decisions:
- issue: Título Χριστός en 2 Timoteo 4:1
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Mesías Jesús
  - Cristo Jesús
  rationale: Se opta por «Jesucristo» por fluidez y registro eclesial amplio en español, manteniendo el referente cristológico del título sin introducir una forma poco idiomática en esta salutación solemne.
  doctrine_reference: 'DOCTRINE.md: preserve intelligibility in the receptor language while maintaining the titular force of Χριστός.'
- issue: Fuerza temporal de μέλλω en la cláusula de juicio
  english_pob_reading: who is about to judge
  chosen_spanish_reading: que está para juzgar
  alternative_spanish_readings:
  - que va a juzgar
  - que juzgará
  rationale: La redacción conserva la proximidad/expectativa del original sin convertirla en un futuro indiferenciado.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it.'
- issue: Relación sintáctica de «y por su manifestación y su reino»
  english_pob_reading: and by his appearing and his kingdom
  chosen_spanish_reading: y por su manifestación y su reino
  alternative_spanish_readings:
  - y su manifestación y su reino
  - y en vista de su manifestación y su reino
  rationale: Se mantiene la ambigüedad funcional del griego respecto de cómo se enlazan estos acusativos con la amonestación solemne, sin cerrar la lectura más de lo necesario.
  doctrine_reference: 'DOCTRINE.md: preserve meaningful ambiguity where the source leaves it open.'
translation_notes:
  revision_awareness: La redacción respeta la revisión que restauró «Messiah Jesus» en el audit trail inglés y evita la sustitución por «Cristo» como forma neutralizada. En español se eligió «Jesucristo» por naturalidad idiomática, pero se documenta la alternativa titulada «Mesías Jesús» en nota, y se conserva la tensión sintáctica de la segunda cláusula mediante «por su manifestación y su reino».
  spanish_consistency_notes:
  - Se mantiene un registro solemne y epistolar acorde con una carga apostólica.
  - «A vivos y muertos» reproduce la fórmula esjatológica de forma natural en español.
  - No se usa «SEÑOR» para YHWH porque el versículo no contiene el Tetragrámaton ni una cita directa que lo requiera.
  - Se evita traducir mecánicamente desde el inglés donde el español pide una construcción más idiomática, pero sin añadir interpretación extra.
