translation:
  language: es
  text: Desde ahora me está reservada la corona de rectitud[a], la cual me otorgará el Señor en aquel día, el juez justo; y no solo a mí, sino también a todos los que han amado su aparición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la corona de justicia». El término griego puede significar «rectitud» o, en algunos contextos, «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: λοιπὸν
  english_pob_choice: From now on
  chosen_spanish: Por lo demás
  alternatives_spanish:
  - Desde ahora
  - En adelante
  - Finalmente
  lexicon: BDAG
  rationale: En este contexto, μετά la afirmación de haber terminado la carrera, la frase introduce lo que queda para Pablo. «Por lo demás» transmite ese giro sin sonar forzado en español y mantiene un valor temporal/discursivo cercano al griego.
- source_word: ἀπόκειταί
  english_pob_choice: is laid up
  chosen_spanish: me está guardada
  alternatives_spanish:
  - me está reservada
  - me está almacenada
  - me aguarda
  lexicon: BDAG
  rationale: La forma pasiva sugiere algo depositado y reservado para uso futuro. «Me está guardada» conserva la imagen de algo apartado para él y la noción de estado presente.
- source_word: ὁ τῆς δικαιοσύνης στέφανος
  english_pob_choice: the crown of righteousness
  chosen_spanish: la corona de justicia
  alternatives_spanish:
  - la corona de rectitud
  - la corona justa
  - la corona que consiste en justicia
  lexicon: BDAG
  rationale: Se conserva la construcción genitiva sin resolverla de manera explicativa. «Justicia» sigue el valor semántico de δικαιοσύνη y mantiene la tensión interpretativa documentada por el audit trail.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia / rectitud
  lexicon: BDAG
  rationale: En este versículo, el español «justicia» permite conservar la amplitud del genitivo griego. Se evita imponer «rectitud» como única opción, aunque sigue siendo una alternativa válida en ciertos contextos.
- source_word: ἀποδώσει
  english_pob_choice: will award
  chosen_spanish: me dará
  alternatives_spanish:
  - me otorgará
  - me recompensará
  - me rendirá
  lexicon: BDAG
  rationale: En español, «me dará» es natural y suficientemente amplio para el matiz de conceder algo debido. Se evita «recompensará» para no cargar de más la idea de retribución y mantener la imagen de entrega futura.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  - el Dueño
  lexicon: BDAG
  rationale: Se conserva el título cristológico estándar de la tradición bíblica en español. Aquí el referente es Cristo como juez escatológico, pero el texto no necesita explicitarlo más allá de «el Señor».
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - en ese día
  lexicon: BDAG
  rationale: «En aquel día» reproduce con dignidad la referencia escatológica y mantiene el deixis distante del griego mejor que una formulación más coloquial.
- source_word: ὁ δίκαιος κριτής
  english_pob_choice: the righteous judge
  chosen_spanish: el juez justo
  alternatives_spanish:
  - el juez recto
  - el juez recto y justo
  lexicon: BDAG
  rationale: «Justo» es el adjetivo más natural en español para δίκαιος en esta identificación del Señor. Se mantiene el sentido judicial sin introducir una paráfrasis doctrinal más amplia.
- source_word: πᾶσιν τοῖς ἠγαπηκόσι
  english_pob_choice: to all who have loved
  chosen_spanish: a todos los que han amado
  alternatives_spanish:
  - a todos los que aman
  - a todos los que han puesto su amor en
  lexicon: BDAG
  rationale: El perfecto participial se refleja con «han amado», que preserva el matiz de una disposición establecida y vigente. Se evita un simple presente que debilitaría ese aspecto.
- source_word: ἐπιφάνειαν
  english_pob_choice: appearing
  chosen_spanish: manifestación
  alternatives_spanish:
  - aparición
  - venida
  - manifestación gloriosa
  lexicon: BDAG
  rationale: «Manifestación» conserva el valor epifánico del término sin reducirlo a una mera «venida». Dado el lenguaje pastoral y escatológico del contexto, este término español permite mantener la densidad teológica.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - del Señor
  lexicon: BDAG
  rationale: El posesivo español remite naturalmente al Señor mencionado antes y sigue el flujo del griego. No se explicita «del Señor» para evitar sobrecargar la frase.
theological_decisions:
- issue: Sentido de «la corona de justicia»
  english_pob_reading: 'The genitive is intentionally left open: a crown of righteousness / justice, or a crown associated with vindication and reward.'
  chosen_spanish_reading: Se conserva «la corona de justicia» sin cerrar la relación genitiva.
  alternative_spanish_readings:
  - la corona de rectitud
  - la corona dada por justicia
  - la corona de vindicación
  rationale: El griego permite más de una lectura, y la traducción debe preservar esa amplitud en vez de resolverla artificialmente. El español elegido mantiene la tensión interpretativa del original y del texto base en inglés.
  doctrine_reference: 'Translation philosophy §3; terminología en disputa: δικαιοσύνη'
- issue: Identidad de «el Señor»
  english_pob_reading: Understood as the Lord Jesus, who judges and whose appearing believers love.
  chosen_spanish_reading: Se mantiene «el Señor» con referencia implícita a Cristo.
  alternative_spanish_readings:
  - el Señor Jesús
  - Cristo el Señor
  rationale: El contexto apunta a Cristo como juez escatológico y objeto del amor de los creyentes, pero el texto griego y la política de traducción piden no expandir más de lo que dice el versículo. «El Señor» conserva la referencia sin paráfrasis.
  doctrine_reference: 'Affirmations; terminología en disputa: κύριος'
- issue: Valor de ἐπιφάνεια
  english_pob_reading: Rendered as 'appearing' to preserve the epiphanic nuance without collapsing it into 'coming'.
  chosen_spanish_reading: Se traduce como «manifestación» para mantener el matiz epifánico.
  alternative_spanish_readings:
  - aparición
  - venida
  - manifestación gloriosa
  rationale: En español, «manifestación» comunica mejor la idea de una presencia revelada y gloriosa que un simple «venida». A la vez, evita agregar contenido no explícito como «gloriosa» en el texto principal.
  doctrine_reference: 'Contested terms: ἐπιφάνεια'
translation_notes:
  revision_awareness: 'El texto inglés auditado quedó sin cambios en la última revisión; no hubo revisiones aplicadas. La versión española sigue el mismo equilibrio: conserva la ambigüedad de δικαιοσύνη, mantiene la referencia escatológica de ἐκείνῃ τῇ ἡμέρᾳ y traduce ἐπιφάνεια con un término que preserve su densidad teológica.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino en el original; aquí no aparece, por lo que corresponde «el Señor».
  - Se mantiene «justicia» para δικαιοσύνη en la línea del POB inglés, con nota alternativa para «rectitud».
  - «Manifestación» se emplea de forma coherente con el valor epifánico de ἐπιφάνεια en este contexto.
  - 'La puntuación con punto y coma conserva la estructura del griego: afirmación principal, cláusula relativa, y remate explicativo con contraste final.'
