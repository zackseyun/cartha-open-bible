translation:
  language: es
  text: He peleado la buena batalla, he terminado la carrera, he guardado la fe[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he guardado la fidelidad» o «he permanecido fiel». τὴν πίστιν puede referirse a «la fe» como el depósito cristiano, o incluir el matiz de fidelidad personal mantenida.'
    reason: alternative_reading
lexical_decisions:
- source_word: καλὸν ἀγῶνα
  english_pob_choice: the good fight
  chosen_spanish: la buena pelea
  alternatives_spanish:
  - la buena lucha
  - la noble contienda
  - el buen combate
  lexicon: BDAG
  rationale: ἀγών designa una lucha, contienda o combate; en español, "pelea" comunica con naturalidad el valor agonístico del verbo y mantiene la fuerza tradicional de la expresión. καλός se vierte como "buena" para preservar el paralelismo con el inglés POB y el adjetivo cualitativo del griego, sin forzar un matiz moral distinto del fuente.
- source_word: ἠγώνισμαι
  english_pob_choice: I have fought
  chosen_spanish: he peleado
  alternatives_spanish:
  - he luchado
  - he combatido
  - he contendido
  lexicon: BDAG
  rationale: El perfecto de ἀγωνίζομαι expresa una acción concluida con vigencia presente. En español, "he peleado" mantiene el pretérito perfecto compuesto y el valor de acción ya cumplida, dentro de la misma estructura triádica del versículo.
- source_word: δρόμον
  english_pob_choice: the race
  chosen_spanish: la carrera
  alternatives_spanish:
  - el recorrido
  - el curso
  - la pista
  lexicon: BDAG
  rationale: δρόμος se refiere literalmente a una carrera o recorrido para correr. "Carrera" es la equivalencia idiomática más clara en español y conserva la metáfora atlética presente en el griego y en la tradición de traducción de este pasaje.
- source_word: τετέλεκα
  english_pob_choice: I have finished
  chosen_spanish: he terminado
  alternatives_spanish:
  - he completado
  - he llevado a término
  - he concluido
  lexicon: BDAG
  rationale: El perfecto de τελέω indica haber llevado algo a su meta o fin. "He terminado" es natural en español y conserva el sentido de acción completada con resultado permanente.
- source_word: τὴν πίστιν
  english_pob_choice: the faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fidelidad
  - la confianza
  - la fe cristiana
  lexicon: BDAG
  rationale: La base léxica πίστις se vierte por defecto como "fe". En este contexto, la presencia del artículo permite oír tanto la fe como el conjunto de la fe cristiana; el español "la fe" mantiene esa amplitud sin resolver en exceso la tensión semántica documentada por el POB inglés.
- source_word: τετήρηκα
  english_pob_choice: I have kept
  chosen_spanish: he guardado
  alternatives_spanish:
  - he mantenido
  - he preservado
  - he conservado
  lexicon: BDAG
  rationale: τηρέω puede significar guardar, custodiar o preservar. "He guardado" conserva la ambigüedad útil entre mantener fielmente y custodiar/proteger, y permite resonar con la lectura alternativa de fidelidad personal sin descartarla.
theological_decisions:
- issue: Sentido de τὴν πίστιν
  english_pob_reading: the faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la fidelidad
  - la fe cristiana
  - mantener la fe
  rationale: El texto inglés conserva "the faith" y nota la posibilidad de entender fe/fidelidad. En español, "la fe" preserva la lectura principal y deja abierta la tensión entre contenido doctrinal y perseverancia personal, sin sobreexplicar ni decidirla en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation philosophy §3'
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y no introdujo cambios; se mantuvo la solución del POB inglés para el triplete verbal en perfecto y la nota sobre πίστις, ajustando solo la formulación al español con equivalencia natural.
  spanish_consistency_notes:
  - Se mantuvo el pretérito perfecto compuesto en los tres miembros para reflejar el perfecto griego y la cadencia retórica del verso.
  - Se preservó la nota de ambigüedad de πίστις en una forma española equivalente, sin reemplazar «fe» por una paráfrasis doctrinalmente más cerrada.
  - La metáfora atlética/martial se conservó con un registro bíblico claro y contemporáneo, evitando calcos excesivamente literales.
