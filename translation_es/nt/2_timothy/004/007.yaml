  glossary_alignment: No hay conflicto con los términos doctrinales principales del proyecto. πίστις se maneja bien como «la fe» con alternativa de fidelidad en nota. No intervienen Yahvé, Mesías, δοῦλος, etc. La revisión propuesta ajusta estilo y fidelidad idiomática sin apartarse del razonamiento léxico documentado.
