translation:
  language: es
  text: En mi primera defensa[a], nadie estuvo a mi lado[b], sino que todos me abandonaron. Que no les sea contado en su contra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En mi primera audiencia» o «En mi primera defensa legal».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «nadie llegó a estar presente conmigo»; el sentido es que nadie apareció para apoyar a Pablo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Que no les sea cargado en cuenta».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπολογίᾳ
  english_pob_choice: defense
  chosen_spanish: defensa
  alternatives_spanish:
  - audiencia
  - defensa legal
  - alegato
  lexicon: BDAG
  rationale: En este contexto forense, ἀπολογία se refiere a una defensa formal ante autoridades. «Defensa» conserva el sentido judicial y suena natural en español moderno.
- source_word: πρώτῃ
  english_pob_choice: first
  chosen_spanish: primera
  alternatives_spanish:
  - primera ocasión
  - inicial
  - anterior
  lexicon: BDAG
  rationale: El adjetivo señala la primera instancia o etapa de la defensa de Pablo. «Primera» es la equivalencia más directa y clara.
- source_word: παρεγένετο
  english_pob_choice: stood with me
  chosen_spanish: se presentó conmigo
  alternatives_spanish:
  - vino a apoyarme
  - estuvo presente conmigo
  - compareció conmigo
  lexicon: BDAG
  rationale: El verbo literalmente indica 'llegó a estar presente'; en este contexto expresa que nadie acudió en apoyo de Pablo. «Se presentó conmigo» mantiene la idea de comparecer/presentarse en su favor sin forzar un modismo demasiado interpretativo.
- source_word: οὐδείς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: Indefinido negativo directo; «nadie» es la forma natural en español.
- source_word: ἐγκατέλιπον
  english_pob_choice: deserted
  chosen_spanish: abandonaron
  alternatives_spanish:
  - desampararon
  - dejaron solo
  - desertaron
  lexicon: BDAG
  rationale: El verbo expresa dejar a alguien en una situación difícil. «Abandonaron» comunica esa falta de apoyo con tono claro y natural; se preserva la carga relacional del contexto.
- source_word: λογισθείη
  english_pob_choice: be counted against
  chosen_spanish: les sea tomado en cuenta
  alternatives_spanish:
  - les sea cargado
  - les sea imputado
  - les sea contado en contra
  lexicon: BDAG
  rationale: El optativo pasivo expresa un deseo/oración para que su falta no se les atribuya como culpa. «Les sea tomado en cuenta» conserva la metáfora contable/judicial y el matiz de no imputación.
theological_decisions:
- issue: 'Matiz de la última cláusula: petición, deseo o permisividad'
  english_pob_reading: 'Prayer-like wish for non-imputation: ''May it not be counted against them.'''
  chosen_spanish_reading: 'Una petición oracional: «¡Que no les sea tomado en cuenta!»'
  alternative_spanish_readings:
  - «No se les tome en cuenta»
  - «Que no se les cargue en cuenta»
  - «Que no se les impute»
  rationale: El aoristo pasivo optativo con μή expresa un deseo u oración, no solo una afirmación. El español opta por una formulación benedictiva que preserve ese tono, sin resolver demasiado la tensión moral de la frase.
  doctrine_reference: Preservar la tensión teológica en lugar de suavizarla; lenguaje de perdón/no imputación.
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el pasaje base; el borrador sigue el estado auditado más reciente, con acuerdo alto y sin cambios requeridos.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» sin intervención porque el versículo no contiene el nombre divino ni un título explícito.
  - Se evita «SEÑOR» o lenguaje eclesiástico más tradicional donde el griego no lo exige.
  - La cláusula final conserva el matiz de no imputación en vez de una simple disculpa general.
  - «Se presentó conmigo» se eligió para reflejar la presencia solidaria implícita en παρεγένετο sin perder naturalidad en español.
