    rationale: El POB inglés da para ἐγκατέλιπον la alternativa «abandoned/forsook»; «me dejaron solo» no es la alternativa auditada y suaviza/cambia el matiz.
  - severity: medium
    issue: Se añadió una nota d no necesaria y se desplazó ahí la alternativa correcta de λογισθείη.
