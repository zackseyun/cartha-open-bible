translation:
  language: es
  text: Alejandro el [a]cobrero me hizo muchos males[b]; el Señor le pagará según sus obras[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'Alejandro el trabajador del cobre'.
    reason: lexical_alternative
  - marker: b
    text: O, 'me causó mucho daño'.
    reason: lexical_alternative
  - marker: c
    text: 'Algunos manuscritos leen: ''Que el Señor le pague según sus obras''.'
    reason: textual_variant
lexical_decisions:
- source_word: Ἀλέξανδρος ὁ χαλκεὺς
  english_pob_choice: Alexander the coppersmith
  chosen_spanish: Alejandro el calderero
  alternatives_spanish:
  - Alejandro el coppersmith
  - Alejandro el trabajador del metal
  - Alejandro el broncista
  lexicon: BDAG; audit trail for χαλκεύς
  rationale: χαλκεύς designa un artesano del metal; la revisión inglesa optó por 'coppersmith' por precisión lexical. En español, 'calderero' comunica de forma natural esa ocupación artesanal vinculada al trabajo del metal, sin depender de un calco poco idiomático como 'coppersmith'. Se conserva el nombre propio como 'Alejandro'.
- source_word: πολλά μοι κακὰ ἐνεδείξατο
  english_pob_choice: showed me many evils
  chosen_spanish: me hizo muchos males
  alternatives_spanish:
  - me hizo muchas cosas malas
  - me causó mucho daño
  - me mostró muchos males
  lexicon: BDAG; audit trail for κακά and ἐνεδείξατο
  rationale: La expresión griega es literalmente 'me mostró muchas cosas malas', pero el contexto pide un sentido de daño/reproche. 'Me hizo muchos males' conserva el peso de κακά sin suavizarlo demasiado y suena más natural en español que una traducción demasiado literal de 'mostró'. Se evita 'daño' como principal porque atenúa el valor moral de κακά.
- source_word: ἀποδώσει
  english_pob_choice: will repay
  chosen_spanish: le pagará
  alternatives_spanish:
  - le recompensará
  - le retribuirá
  - le pagará de vuelta
  lexicon: BDAG; audit trail for ἀποδίδωμι
  rationale: ἀποδώσει expresa retribución. En español, 'le pagará' transmite bien la idea de devolver/retribuir y es idiomático; 'recompensará' podría sonar demasiado positivo en este contexto judicial. Se mantiene el valor de retribución sin sobreexplicar.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Dios
  - Yahvé
  lexicon: BDAG; project terminology for κύριος
  rationale: En este versículo κύριος es el título divino definido. Aunque el proyecto normalmente usa 'Yahvé' para יהוה, aquí el griego cita 'ὁ κύριος' y la forma tradicional y transparente en español es 'el Señor'. Se preserva la definitud del artículo griego.
- source_word: κατὰ τὰ ἔργα αὐτοῦ
  english_pob_choice: according to his works
  chosen_spanish: según sus obras
  alternatives_spanish:
  - conforme a sus obras
  - según lo que ha hecho
  - de acuerdo con sus hechos
  lexicon: BDAG; audit trail for standard recompense formula
  rationale: '''Según sus obras'' es la equivalencia más directa y reconocible de la fórmula de retribución. Mantiene la transparencia lexical y la carga judicial del pasaje mejor que una paráfrasis más explícita.'
theological_decisions:
- issue: 'Tono de retribución divina: declaración futura o deseo imprecatorio'
  english_pob_reading: the Lord will repay him
  chosen_spanish_reading: el Señor le pagará
  alternative_spanish_readings:
  - ¡que el Señor le pague!
  - el Señor lo pagará
  rationale: El futuro griego ἀποδώσει es indicativo, no un deseo. Por eso la traducción principal presenta una declaración de juicio/retribución, no una imprecación. Se evita transformar el versículo en una oración optativa, aunque se reconoce que algunos testigos textuales y lecturas tradicionales lo entienden así.
  doctrine_reference: Priorizar la forma verbal del griego; preservar la tensión textual sin resolverla homiléticamente.
- issue: Valor moral de κακά frente a un simple daño físico o personal
  english_pob_reading: many evils
  chosen_spanish_reading: muchos males
  alternative_spanish_readings:
  - mucho daño
  - muchas cosas malas
  rationale: '''Males'' conserva mejor la fuerza moral de κακά que una reducción a ''daño''. La frase no especifica el tipo exacto de mal, y la traducción debe mantener esa amplitud semántica.'
  doctrine_reference: Léxico moral y relacional del texto; no reducir el alcance de κακά sin necesidad textual.
translation_notes:
  revision_awareness: 'El borrador sigue el texto griego SBLGNT y toma como contexto auditado la revisión inglesa más reciente, que prefirió ''coppersmith'' sobre ''metalworker'' y mantuvo el futuro indicativo ''will repay''. En español se busca una equivalencia óptima: se conserva la retribución futura, se mantiene la fórmula ''según sus obras'' y se ofrece una nota para la variante textual optativa.'
  spanish_consistency_notes:
  - Se usa 'el Señor' para κύριος en concordancia con el griego definido y la convención española del proyecto en este caso.
  - Se evitó 'Cristo' porque el texto griego no lo contiene.
  - Se prefirió 'males' para preservar la fuerza moral de κακά; la nota ofrece una alternativa más idiomática.
  - La nota de nombre alternativo preserva la posibilidad de traducir χαλκεύς de modo más literal en otras tradiciones, pero el texto principal privilegia una forma española natural.
