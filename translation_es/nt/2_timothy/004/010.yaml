translation:
  language: es
  text: Pues Demas me abandonó, por haber amado la era presente[a], y se fue a Tesalónica; Crescente a Galacia, Tito a Dalmacia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este presente mundo» o «el mundo presente». El griego se refiere más literalmente a la era o edad presente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγκατέλιπεν
  english_pob_choice: deserted
  chosen_spanish: abandonó
  alternatives_spanish:
  - desertó
  - me dejó
  lexicon: BDAG
  rationale: En español, «abandonó» comunica de manera natural la gravedad de dejar a Pablo en la necesidad, sin sonar tan técnico como «desertó» ni tan débil como «me dejó». Mantiene la carga negativa del verbo griego sin afirmar más de lo que el verso dice.
- source_word: ἀγαπήσας
  english_pob_choice: having loved
  chosen_spanish: amando
  alternatives_spanish:
  - después de amar
  - porque amó
  lexicon: BDAG
  rationale: El participio aoristo se refleja con una forma participial en español para conservar la relación entre el amor de Demas y su abandono. «Amando» mantiene la conexión verbal, aunque el valor causal quede implícito más que explicitado.
- source_word: τὸν νῦν αἰῶνα
  english_pob_choice: the present age
  chosen_spanish: este presente siglo
  alternatives_spanish:
  - la era presente
  - este mundo presente
  lexicon: BDAG
  rationale: «Siglo» permite conservar el sentido temporal-ético de αἰών y evita reducirlo a «mundo» en sentido físico. «Este presente siglo» suena un poco más formal, pero es fiel al matiz de la expresión griega y al cariz paulino del contraste.
- source_word: ἐπορεύθη
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - fue
  - partió
  lexicon: BDAG
  rationale: «Se fue» es la forma más natural en español para la simple idea de movimiento hacia un destino. No añade matiz interpretativo y funciona bien en la enumeración de destinos que sigue.
- source_word: Θεσσαλονίκην
  english_pob_choice: Thessalonica
  chosen_spanish: Tesalónica
  alternatives_spanish:
  - Tessalónica
  lexicon: nombre propio geográfico
  rationale: «Tesalónica» es la transliteración española estándar del topónimo griego y la forma más reconocible en español bíblico.
- source_word: Κρήσκης
  english_pob_choice: Crescens
  chosen_spanish: Crescente
  alternatives_spanish:
  - Crescens
  lexicon: nombre propio personal
  rationale: Se usa «Crescente» como forma española tradicional y legible del nombre propio, sin alterar la identidad referencial del personaje.
- source_word: Γαλατίαν
  english_pob_choice: Galatia
  chosen_spanish: Galacia
  alternatives_spanish:
  - Galatia
  lexicon: nombre propio geográfico
  rationale: «Galacia» es la forma española establecida del nombre de la región y corresponde al término griego sin necesidad de transliteración más dura.
- source_word: Τίτος
  english_pob_choice: Titus
  chosen_spanish: Tito
  alternatives_spanish:
  - Titus
  lexicon: nombre propio personal
  rationale: «Tito» es la forma española normal del nombre y la opción más natural para un texto bíblico en español.
- source_word: Δαλματίαν
  english_pob_choice: Dalmatia
  chosen_spanish: Dalmacia
  alternatives_spanish:
  - Dalmatia
  lexicon: nombre propio geográfico
  rationale: «Dalmacia» es la adaptación española estándar del topónimo y mantiene la claridad para lectores hispanohablantes.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - En efecto
  lexicon: BDAG
  rationale: «Pues» reproduce bien la función conectiva de γάρ en español y enlaza con lo anterior de forma fluida. Es menos rígido que «porque» y más natural en este contexto narrativo-expositivo.
theological_decisions:
- issue: Cómo reflejar la intensidad moral de la partida de Demas sin afirmar explícitamente apostasía
  english_pob_reading: Rendered as 'deserted me' without explicitly stating that Demas abandoned the faith.
  chosen_spanish_reading: «me abandonó» expresa la gravedad de la acción, pero no declara que Demas haya apostatado.
  alternative_spanish_readings:
  - «me desertó»
  - una versión que sugiera abiertamente apostasía
  rationale: El griego afirma que Demas dejó a Pablo porque amó el presente siglo; no dice de forma directa que haya renunciado a la fe. La traducción conserva la tensión moral del pasaje sin sobreinterpretarlo.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de control fue alto y estable, por lo que se mantiene la solución semántica y sintáctica del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» y otros términos de referencia estándar, aunque este versículo no los contenga.
  - «Siglo» se usa aquí por su valor temporal-ético, no como equivalente de «mundo» físico.
  - Los nombres propios se adaptan a las formas españolas usuales para máxima legibilidad bíblica.
