- from: Pues Demas me abandonó[a], amando este presente siglo, y se fue a Tesalónica; Crescente a Galacia, Tito a Dalmacia.
  to: Pues Demas me abandonó, por haber amado la era presente[a], y se fue a Tesalónica; Crescente a Galacia, Tito a Dalmacia.
  rationale: Se mantiene «me abandonó» como opción española natural y suficientemente fuerte para ἐγκατέλιπεν, sin sobreinterpretar apostasía. Se corrige ἀγαπήσας con «por haber amado», que refleja mejor la relación causal/antecedente del participio aoristo y suena natural en español. Se sustituye «este presente siglo» por «la era presente» para conservar mejor el matiz de αἰών sin rigidez innecesaria, dejando «mundo presente» como alternativa en nota. No se requiere adjudicación adicional.
