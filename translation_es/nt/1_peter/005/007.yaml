translation:
  language: es
  text: echando[a][b] toda su ansiedad sobre él[c], porque él se preocupa por ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arrojando». El participio griego ἐπιρίψαντες mantiene la idea de echar o depositar una carga sobre otro.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «habiendo echado» o «echando sobre él».
    reason: lexical_alternative
  - marker: c
    text: Es decir, Dios, por el contexto inmediato (v. 6).
    reason: cross_reference
lexical_decisions:
- source_word: πᾶσαν
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - toda la
  - cada
  lexicon: BDAG
  rationale: El adjetivo πᾶσαν modifica a μέριμναν con fuerza de totalidad; en español, «toda» comunica de manera natural la amplitud total sin volver la frase pesada.
- source_word: μέριμναν
  english_pob_choice: anxiety
  chosen_spanish: ansiedad
  alternatives_spanish:
  - preocupación
  - cuidado
  - inquietud
  lexicon: BDAG
  rationale: En este contexto la palabra apunta a una carga interna de preocupación angustiosa. «Ansiedad» preserva esa fuerza más claramente que «cuidado», que en español suele sonar neutral o positivo.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - de ustedes
  - vuestra
  lexicon: BDAG
  rationale: El genitivo plural posesivo se adapta en español a «su» por concordancia con el sustantivo singular «ansiedad»; el sentido plural queda claro por el contexto y por «ustedes» más adelante.
- source_word: ἐπιρίψαντες
  english_pob_choice: casting
  chosen_spanish: echando
  alternatives_spanish:
  - arrojando
  - habiendo echado
  - echen
  lexicon: BDAG
  rationale: El participio aoristo activo conserva la idea de acción de depositar o echar sobre otro. «Echando» suena natural en español y mantiene el valor participial exhortativo sin volverlo excesivamente literal.
- source_word: ἐπ’ αὐτόν
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - encima de él
  lexicon: BDAG
  rationale: La preposición ἐπί con acusativo expresa movimiento hacia encima de alguien/algo. «Sobre él» conserva la imagen de transferir la carga a otra persona.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Introduce la razón de la exhortación; «porque» es la equivalencia más clara y natural en español actual.
- source_word: μέλει
  english_pob_choice: he cares
  chosen_spanish: cuida
  alternatives_spanish:
  - se preocupa por
  - le importa
  - tiene cuidado de
  lexicon: BDAG
  rationale: El verbo impersonal/personal expresa interés activo y atención hacia alguien. «Cuida» mantiene una relación de atención personal y encaja bien con la construcción que sigue.
- source_word: περὶ ὑμῶν
  english_pob_choice: for you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - por ustedes
  - acerca de ustedes
  - sobre ustedes
  lexicon: BDAG
  rationale: Con μέλει, περί + genitivo expresa preocupación orientada a las personas referidas. En español, «cuida de ustedes» comunica esa preocupación benevolente sin sugerir solo provisión material.
theological_decisions:
- issue: Referente de αὐτόν / αὐτῷ
  english_pob_reading: him = God from the immediate context (v. 6)
  chosen_spanish_reading: él = Dios, según el contexto inmediato
  alternative_spanish_readings:
  - él = el Señor, implícito por el contexto
  - él = aquel a quien se acaba de referir el autor
  rationale: El contexto inmediato de 1 Pedro 5:6 habla de Dios, así que el pronombre debe leerse como referencia a Dios sin forzar una explicitación innecesaria en el texto principal. El pronombre español conserva la misma sobriedad referencial.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue el patrón revisado del POB inglés en que el cierre se expresa como una relación personal de cuidado («he cares for you») y no con una formulación menos idiomática. Se preserva también la fuerza del participio de acción continua/coordinarte y la metáfora de cargar sobre otro.
  spanish_consistency_notes:
  - Se usó «ansiedad» para μέριμνα, en consonancia con la decisión auditada del POB inglés.
  - Se mantuvo el referente divino en pronombre («él») sin sustituirlo por una explicitación doctrinal dentro del texto principal.
  - Se prefirió «cuida de ustedes» como equivalente idiomático de μέλει περὶ ὑμῶν, evitando un calco rígido que sonaría menos natural en español.
  - La puntuación conserva la relación causal con coma antes de «porque», siguiendo la sintaxis del original.
