translation:
  language: es
  text: Salúdense unos a otros con un beso de amor. Paz a todos ustedes que están en Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más tradicional, «que están en Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Salúdense
  alternatives_spanish:
  - Gretense
  - Saluden unos a otros
  lexicon: BDAG
  rationale: El aoristo medio imperativo plural comunica una acción recíproca dentro de la comunidad. En español, «salúdense» expresa de forma natural la salutación mutua sin perder el carácter imperativo epistolar.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - el uno al otro
  - entre ustedes
  lexicon: BDAG
  rationale: El pronombre recíproco exige una acción mutua. «Unos a otros» es claro, natural y mantiene la reciprocidad comunitaria.
- source_word: ἐν φιλήματι ἀγάπης
  english_pob_choice: with a kiss of love
  chosen_spanish: con beso de amor
  alternatives_spanish:
  - con un beso de amor
  - con beso amoroso
  - con un beso afectuoso
  lexicon: BDAG
  rationale: La preposición ἐν se vierte idiomáticamente como «con» para indicar modo o acompañamiento. «Beso de amor» conserva de manera transparente el vínculo léxico con ἀγάπη, evitando suavizarlo a «afectuoso» y sin introducir una paráfrasis mayor.
- source_word: εἰρήνη
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - Que la paz sea
  - Paz sea
  lexicon: BDAG
  rationale: La forma nominal funciona como bendición breve. «Paz» mantiene la concisión y el valor epistolar del saludo final.
- source_word: ὑμῖν πᾶσιν
  english_pob_choice: to all of you
  chosen_spanish: a todos ustedes
  alternatives_spanish:
  - para todos ustedes
  - a ustedes todos
  lexicon: BDAG
  rationale: El dativo plural expresa los destinatarios de la bendición. «A todos ustedes» es natural en español contemporáneo y preserva la amplitud inclusiva.
- source_word: τοῖς ἐν Χριστῷ
  english_pob_choice: who are in Messiah
  chosen_spanish: que están en Mesías
  alternatives_spanish:
  - que están en Cristo
  - los que están en Mesías
  lexicon: BDAG
  rationale: Se conserva el título como «Mesías» conforme a la política de la obra para Χριστός cuando funciona como título. En español, una cláusula relativa explícita resulta más clara que un calco nominal, y «están en» reproduce bien la unión/situación denotada por ἐν.
theological_decisions:
- issue: Renderizado de Χριστῷ al final de la bendición
  english_pob_reading: who are in Messiah, with Christ preserved as a traditional alternative in the footnote
  chosen_spanish_reading: que están en Mesías
  alternative_spanish_readings:
  - que están en Cristo
  - en Cristo
  rationale: Se mantiene el título «Mesías» porque el griego Χριστός aquí funciona como designación titulada del Ungido, no como nombre propio. La alternativa tradicional «Cristo» queda preservada en nota para reconocer la familiaridad eclesial sin abandonar la política terminológica de la obra.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; reservación de formas tradicionales en nota cuando corresponda'
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión que osciló entre «Christ» y «Messiah», quedando restaurado «Messiah» por coherencia doctrinal. La presente versión sigue ese estado más reciente y lo adapta al español con «Mesías», manteniendo en nota la forma tradicional «Cristo».
  spanish_consistency_notes:
  - Se mantiene la distinción entre el título «Mesías» en el texto principal y la forma tradicional «Cristo» en nota.
  - «Beso de amor» conserva la fuerza léxica de ἀγάπη sin suavizarla.
  - La bendición final se traduce con brevedad litúrgica, sin añadir verbos auxiliares inexistentes en el griego.
