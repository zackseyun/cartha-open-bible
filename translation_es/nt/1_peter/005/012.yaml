translation:
  language: es
  text: Por medio de Silvano, el hermano fiel, como lo considero, les he escrito brevemente[a], exhortando y dando testimonio de que esta es la verdadera gracia de Dios[b]. Permanezcan firmes en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les he escrito en pocas palabras».'
    reason: lexical_alternative
  - marker: b
    text: 'Algunos manuscritos leen: «en la cual están» en lugar de «Permanezcan firmes en ella».'
    reason: textual_variant
lexical_decisions:
- source_word: Διὰ Σιλουανοῦ
  english_pob_choice: Through Silvanus
  chosen_spanish: Por medio de Silvano
  alternatives_spanish:
  - Por Silvano
  - Mediante Silvano
  lexicon: BDAG
  rationale: διά con genitivo suele expresar medio o agencia. «Por medio de» comunica naturalmente la función instrumental sin sobrecargarla, y conserva la posibilidad de que Silvano haya servido como portador o amanuense sin especificarlo más allá de la evidencia.
- source_word: Σιλουανοῦ
  english_pob_choice: Silvanus
  chosen_spanish: Silvano
  alternatives_spanish:
  - Silas
  lexicon: BDAG
  rationale: El nombre se translitera al español según su forma griega. «Silvano» refleja Σιλουανός directamente; «Silas» es un nombre relacionado pero no es la forma presente en este versículo.
- source_word: τοῦ πιστοῦ ἀδελφοῦ
  english_pob_choice: the faithful brother
  chosen_spanish: el hermano fiel
  alternatives_spanish:
  - el hermano digno de confianza
  - nuestro hermano fiel
  lexicon: BDAG
  rationale: πιστός puede significar «fiel» o «digno de confianza». Aquí «fiel» conserva el tono de recomendación y suena natural en español. ἀδελφός se traduce «hermano» porque se refiere a un colaborador masculino específico.
- source_word: ὡς λογίζομαι
  english_pob_choice: as I regard him
  chosen_spanish: como lo considero
  alternatives_spanish:
  - como lo juzgo
  - en mi opinión
  lexicon: BDAG
  rationale: λογίζομαι expresa la estimación personal de Pedro. «Como lo considero» mantiene el carácter parentético y modesto de la observación, sin volverla más fuerte de lo que el griego sugiere.
- source_word: δι’ ὀλίγων
  english_pob_choice: briefly
  chosen_spanish: brevemente
  alternatives_spanish:
  - en pocas palabras
  - con pocas palabras
  lexicon: BDAG
  rationale: La expresión idiomática significa escribir de forma concisa. «Brevemente» es la forma más natural y fiel en español contemporáneo.
- source_word: ἔγραψα
  english_pob_choice: I have written
  chosen_spanish: les he escrito
  alternatives_spanish:
  - les escribí
  lexicon: BDAG
  rationale: El aoristo epistolar puede verterse naturalmente en español como pretérito perfecto desde la perspectiva de los destinatarios. «Les he escrito» conserva el valor de carta ya enviada y suena bien en el cierre epistolar.
- source_word: παρακαλῶν
  english_pob_choice: exhorting
  chosen_spanish: exhortando
  alternatives_spanish:
  - animando
  - rogándoles
  lexicon: BDAG
  rationale: En este contexto parenético, παρακαλέω tiene fuerza exhortativa. «Exhortando» preserva la seriedad moral del llamado mejor que opciones más suaves.
- source_word: ἐπιμαρτυρῶν
  english_pob_choice: testifying
  chosen_spanish: testificando
  alternatives_spanish:
  - dando testimonio
  - afirmando solemnemente
  lexicon: BDAG
  rationale: El participio añade confirmación solemne. «Testificando» mantiene el peso testimonial de la afirmación y su relación con el contenido precedente.
- source_word: ταύτην εἶναι ἀληθῆ χάριν τοῦ θεοῦ
  english_pob_choice: that this is the true grace of God
  chosen_spanish: que esta es la verdadera gracia de Dios
  alternatives_spanish:
  - que esta es la gracia verdadera de Dios
  - que esta es la auténtica gracia de Dios
  lexicon: BDAG
  rationale: «Gracia» es la traducción estable de χάρις en este contexto. «Verdadera gracia de Dios» conserva la estructura del predicado y evita resolver más de lo que el texto dice sobre el alcance de «esta».
- source_word: εἰς ἣν στῆτε
  english_pob_choice: Stand firm in it
  chosen_spanish: Permanezcan firmes en ella
  alternatives_spanish:
  - Estén firmes en ella
  - Manténganse firmes en ella
  lexicon: BDAG
  rationale: El imperativo aoristo llama a una permanencia resuelta. «Permanezcan firmes» expresa bien la exhortación a mantenerse estables dentro de la esfera de la gracia, y «en ella» refiere naturalmente a «gracia».
theological_decisions:
- issue: Referencia de «esta» en «esta es la verdadera gracia de Dios»
  english_pob_reading: ‘This’ refers to the message/content of Peter's letter and apostolic exhortation as embodying or attesting God's true grace.
  chosen_spanish_reading: «Esta» se entiende como el contenido de la carta y la exhortación apostólica, sin restringirlo más allá de lo que el texto permite.
  alternative_spanish_readings:
  - «Esta» se refiere más estrechamente a la experiencia actual de gracia de los lectores
  - «Esta» se refiere específicamente al mensaje del evangelio transmitido por medio de Silvano
  rationale: El contexto inmediato de escribir, exhortar y testificar favorece tomar «esta» como la sustancia de lo escrito por Pedro. La traducción conserva la amplitud de referencia sin imponer una precisión dogmática que el versículo no exige.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma artificial.
- issue: Fuerza del imperativo final στῆτε
  english_pob_reading: 'Imperative: Peter commands the readers to remain steadfast in God''s grace.'
  chosen_spanish_reading: 'Imperativo: Pedro manda a los lectores permanecer firmes en la gracia de Dios.'
  alternative_spanish_readings:
  - 'Lectura indicativa variante: «ustedes están»'
  - «Permanezcan» como exhortación menos enfática
  rationale: El texto crítico dado presenta στῆτε como imperativo, y el cierre funciona naturalmente como exhortación final. Se mantiene esa fuerza en español y se deja a salvo la variante textual conocida en la nota.
  doctrine_reference: Seguir el texto crítico principal, sin ocultar la variante manuscrita.
translation_notes:
  revision_awareness: La redacción española sigue el texto crítico SBLGNT y conserva la estructura del cierre epistolar. Se tuvo en cuenta la revisión del audit trail que solo ajustó la puntuación inglesa alrededor de la frase parentética, sin alterar el sentido; por eso se mantuvo en español la misma relación sintáctica con comas implícitas en la prosodia natural. También se preservó la alternativa textual final en nota, como en el registro inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino explícito; aquí no corresponde.
  - Se usa «gracia» para χάρις por consistencia con el léxico del Nuevo Testamento.
  - Se eligió «Silvano» como transliteración coherente con la forma griega, no «Silas».
  - «Permanezcan firmes» comunica mejor la perseverancia exhortada que un calco rígido.
  - 'Las notas usan marcadores únicos y anclados en el texto: [a] en «Por medio de Silvano» y [b] en «Dios».'
