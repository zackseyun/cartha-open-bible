base_translation:
  language: en
  yaml_path: translation/nt/1_peter/005/005.yaml
  text: Likewise[a], you younger men, submit yourselves to the elders. And all of you, clothe yourselves with humility toward one another, because God opposes the proud[c][b], but gives grace to the humble.
  footnotes:
  - marker: a
    text: Or 'you who are younger.' The Greek is masculine plural ('younger men'), though some take it more generally as the younger members of the congregation.
    reason: lexical_alternative
  - marker: b
    text: Or 'tie on humility.' The Greek verb evokes putting on or fastening a garment, likely intensifying the image of deliberately wearing humility.
    reason: lexical_alternative
  - marker: c
    text: Quotation/allusion to Proverbs 3:34 (LXX).
    reason: cross_reference
