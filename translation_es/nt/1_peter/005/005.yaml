translation:
  language: es
  text: Igualmente[a], ustedes, los más jóvenes, sométanse a los ancianos. Y todos ustedes, revístanse[b] de humildad en su trato unos con otros, porque Dios se opone a los soberbios[c], pero da gracia a los humildes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ustedes, los que son más jóvenes». El griego es masculino plural; en el contexto puede referirse específicamente a los varones más jóvenes, aunque algunos lo entienden de manera más amplia como los miembros más jóvenes de la congregación.'
    reason: alternative_reading
  - marker: b
    text: 'O: «átense la humildad» o «pónganse la humildad». El verbo griego sugiere ponerse o ceñirse una prenda, intensificando la imagen de adoptar deliberadamente la humildad.'
    reason: lexical_alternative
  - marker: c
    text: Alusión o cita de Proverbios 3:34 (LXX).
    reason: cross_reference
lexical_decisions:
- source_word: ὁμοίως
  english_pob_choice: Likewise
  chosen_spanish: Igualmente
  alternatives_spanish:
  - De la misma manera
  - Asimismo
  lexicon: BDAG
  rationale: Marca de enlace discursivo con la exhortación anterior. «Igualmente» mantiene la función conectiva de modo natural y conciso en español.
- source_word: νεώτεροι
  english_pob_choice: you younger men
  chosen_spanish: ustedes, los más jóvenes
  alternatives_spanish:
  - ustedes, los jóvenes
  - los jóvenes varones
  lexicon: BDAG
  rationale: El griego usa vocativo masculino plural; en español, «los más jóvenes» conserva la referencia generacional sin sonar artificial. Mantiene la tensión entre la forma masculina del original y la aplicación congregacional amplia sugerida por el contexto.
- source_word: ὑποτάγητε
  english_pob_choice: submit yourselves
  chosen_spanish: sométanse
  alternatives_spanish:
  - sométanse ustedes
  - pónganse bajo la autoridad
  lexicon: BDAG
  rationale: El imperativo de ὑποτάσσω en exhortación paraenética se expresa de forma natural con «sométanse». Conserva la idea de sujeción/orden voluntario sin forzar una paráfrasis.
- source_word: πρεσβυτέροις
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los presbíteros
  - los dirigentes
  lexicon: BDAG
  rationale: En el contexto inmediato de 1 Pedro 5:1–4, el término designa a los ancianos de la comunidad, no simplemente a personas de más edad. «Ancianos» es la forma bíblica clara y transparente en español.
- source_word: πάντες
  english_pob_choice: all of you
  chosen_spanish: todos
  alternatives_spanish:
  - todos ustedes
  - todos y cada uno
  lexicon: BDAG
  rationale: Amplía la exhortación a toda la comunidad. «Todos» es breve y natural; en contexto español, la fuerza inclusiva ya queda clara por la oración entera.
- source_word: ἀλλήλοις
  english_pob_choice: toward one another
  chosen_spanish: unos con otros
  alternatives_spanish:
  - entre sí
  - unos a otros
  lexicon: BDAG
  rationale: El dativo recíproco expresa relación mutua. «Unos con otros» comunica bien la orientación comunitaria y evita la rigidez de una construcción demasiado literal.
- source_word: ταπεινοφροσύνην
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - humilde mente
  - bajo ánimo
  lexicon: BDAG
  rationale: Es el equivalente español más claro y fiel para la virtud señalada. Aunque el compuesto griego sugiere una disposición mental, «humildad» preserva el valor ético central sin perder naturalidad.
- source_word: ἐγκομβώσασθε
  english_pob_choice: clothe yourselves with
  chosen_spanish: revístanse de
  alternatives_spanish:
  - átese[n] la humildad
  - pónganse la humildad
  lexicon: BDAG
  rationale: El verbo evoca ponerse o amarrarse una prenda; «revístanse de» conserva la imagen vestimentaria en español de manera elegante y comprensible. La alternativa más literal sería posible, pero menos fluida.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la base causal y escritural de la exhortación. «Porque» es la conexión más natural en español contemporáneo.
- source_word: Ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mismo
  lexicon: BDAG
  rationale: Sujeto simple; no requiere expansión.
- source_word: ὑπερηφάνοις
  english_pob_choice: the proud
  chosen_spanish: a los soberbios
  alternatives_spanish:
  - a los orgullosos
  - a los arrogantes
  lexicon: BDAG
  rationale: El adjetivo sustantivado describe a quienes se exaltan a sí mismos. «Soberbios» preserva el tono bíblico y la oposición moral sin perder inteligibilidad.
- source_word: ἀντιτάσσεται
  english_pob_choice: opposes
  chosen_spanish: se opone
  alternatives_spanish:
  - resiste
  - se enfrenta a
  lexicon: BDAG
  rationale: El verbo expresa ponerse en contra. «Se opone» es claro en español y conserva la fuerza relacional y adversativa del original.
- source_word: ταπεινοῖς
  english_pob_choice: the humble
  chosen_spanish: a los humildes
  alternatives_spanish:
  - a los mansos
  - a los abatidos
  lexicon: BDAG
  rationale: Mantiene el paralelismo con «los soberbios» y reproduce el contraste de adjetivos sustantivados. «Humildes» es la correspondencia más directa y estable.
- source_word: δίδωσιν χάριν
  english_pob_choice: gives grace
  chosen_spanish: da gracia
  alternatives_spanish:
  - concede gracia
  - les da favor
  lexicon: BDAG
  rationale: «Gracia» conserva la terminología teológica canónica y la resonancia de la cita/proverbio. «Favor» sería una posibilidad semántica, pero debilita la continuidad terminológica del texto bíblico.
theological_decisions:
- issue: Alcance de νεώτεροι frente a la exhortación universal de πάντες
  english_pob_reading: you younger men ... all of you ...
  chosen_spanish_reading: ustedes, los más jóvenes ... todos
  alternative_spanish_readings:
  - ustedes, los jóvenes ... todos ustedes
  - los jóvenes varones ... todos
  rationale: 'Se conserva la tensión del griego: el primer mandato se dirige al grupo más joven, mientras que la instrucción sobre humildad se extiende a todos. En español, «los más jóvenes» preserva la referencia generacional sin borrar la distinción del original.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Referencia de πρεσβυτέροις
  english_pob_reading: the elders
  chosen_spanish_reading: los ancianos
  alternative_spanish_readings:
  - los presbíteros
  - los mayores
  rationale: El contexto literario inmediato de 1 Pedro 5:1–4 habla de los ancianos de la iglesia; por eso se traduce con el término eclesial reconocido en español. «Los mayores» reduciría la precisión contextual.
  doctrine_reference: Contexto inmediato de 1 Pedro 5:1–4
- issue: Cita o alusión a Proverbios 3:34 (LXX)
  english_pob_reading: Quotation/allusion to Proverbs 3:34 (LXX).
  chosen_spanish_reading: Mantener la frase como alusión/cita implícita en el flujo del versículo, sin marcarla en el texto principal.
  alternative_spanish_readings:
  - cita explícita de Proverbios 3:34
  - alusión bíblica sin nota
  rationale: El griego reproduce la formulación sapiencial conocida; en español conviene conservar la fluidez del versículo principal y señalar la relación intertextual en nota, sin añadir texto ajeno al flujo.
  doctrine_reference: Proverbios 3:34 / LXX
- issue: Imagen de ἐγκομβώσασθε
  english_pob_reading: clothe yourselves with / tie on humility
  chosen_spanish_reading: revístanse de humildad
  alternative_spanish_readings:
  - átense la humildad
  - pónganse humildad
  rationale: La metáfora de vestirse es parte del efecto retórico. «Revístanse de» comunica la imagen con claridad y evita una literalidad extraña que podría oscurecer el exhorto.
  doctrine_reference: Metáfora de vestidura en exhortación ética
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto griego SBLGNT y del audit trail inglés. La versión española conserva la estructura exhortativa, la distinción entre el grupo de los más jóvenes y la exhortación a todos, la metáfora de vestidura en ἐγκομβώσασθε, y la formulación proverbial sobre los soberbios y los humildes. No se detectaron revisiones ulteriores aplicadas al pasaje en el expediente inglés, por lo que esta redacción sigue de cerca el estado más reciente aprobado.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y «gracia» para χάριν, en continuidad con la terminología teológica del proyecto.
  - Se usó «ancianos» para πρεσβυτέροις por el contexto eclesial inmediato.
  - La nota [a] conserva la alternativa de lectura por el matiz masculino plural del griego.
  - La nota [b] preserva la imagen verbal de vestirse/ceñirse, sin reemplazarla por una simple abstracción.
  - La nota [c] registra la alusión a Proverbios 3:34 sin interrumpir el flujo del versículo principal.
