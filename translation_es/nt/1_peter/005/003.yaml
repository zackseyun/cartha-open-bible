  source_alignment_summary: El borrador capta bien la estructura contrastiva de μηδ’ ὡς … ἀλλὰ y la idea de autoridad abusiva en κατακυριεύοντες. Sin embargo, «los lotes» en el texto principal suena opaco y poco natural en español eclesial contemporáneo, y no comunica con suficiente claridad el sentido contextual de τῶν κλήρων como las porciones del rebaño asignadas al cuidado de los ancianos. Además, «ejemplos del rebaño» se entiende más naturalmente como ejemplos que pertenecen al rebaño, cuando el griego τύποι γινόμενοι τοῦ ποιμνίου significa ejemplos para el rebaño.
  spanish_quality_summary: 'La redacción es mayormente digna y moderna, pero «los que dominan con dureza» resulta algo pesada frente al participio griego, y «los lotes» introduce una rareza innecesaria. La frase final debe ajustarse a un español más natural y fiel: «ejemplos para el rebaño».'
  glossary_alignment: 'No hay conflicto con la terminología de proyecto. La decisión principal es léxica/contextual: τῶν κλήρων debe reflejar mayordomía pastoral sin sonar como propiedad ni quedar críptico. Conviene conservar la alternativa literal en nota, no en el texto principal.'
  issues:
  - severity: high
    issue: «los lotes» en el texto principal es demasiado literal y poco claro para τῶν κλήρων
    rationale: Aunque el griego literalmente habla de «lotes/porciones», en este contexto pastoral se refiere a las porciones del rebaño asignadas al cuidado de los ancianos. El inglés auditado optó por una expresión contextual en el texto principal y dejó la literalidad en nota. En español, «los lotes» suena material o administrativo, no pastoral.
  - severity: high
    issue: «ejemplos del rebaño» no refleja bien la relación de τοῦ ποιμνίου con τύποι
    rationale: La construcción se entiende mejor como «ejemplos para el rebaño», es decir, modelos a imitar por la comunidad. «Del rebaño» puede sugerir pertenencia o origen, no dirección ejemplar.
  - severity: medium
    issue: «los que dominan con dureza» es una expansión menos directa del participio κατακυριεύοντες
    rationale: Una forma como «dominando con dureza» o «enseñoreándose» preserva mejor el valor participial. Para español natural y claro, «dominando con dureza» comunica bien el abuso de autoridad sin tono arcaico.
  revised_spanish_text: ni dominando con dureza sobre los que les han sido asignados[a] a su cuidado, sino haciéndose ejemplos para el rebaño.
