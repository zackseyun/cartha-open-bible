translation:
  language: es
  text: ni dominando con dureza sobre los que les han sido asignados[a] a su cuidado, sino haciéndose ejemplos para el rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre los lotes». El griego dice literalmente «los lotes» o «las porciones asignadas»; en este contexto pastoral, se refiere a la porción del rebaño de Dios encomendada al cuidado de cada anciano.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδ’ ὡς
  english_pob_choice: not
  chosen_spanish: ni como
  alternatives_spanish:
  - 'no'
  - ni como si
  lexicon: BDAG
  rationale: El griego continúa la negación del versículo anterior y presenta una manera prohibida de ejercer el ministerio. En español, «ni como» conserva bien la coordinación negativa y la idea de conducta excluida sin forzar una subordinación innecesaria.
- source_word: κατακυριεύοντες
  english_pob_choice: domineering over
  chosen_spanish: los que dominan con dureza sobre
  alternatives_spanish:
  - los que se enseñorean de
  - los que mandan autoritariamente sobre
  - los que ejercen dominio abusivo sobre
  lexicon: BDAG
  rationale: El verbo expresa ejercer señorío de forma opresiva o abusiva, no simple autoridad legítima. «Dominar con dureza» comunica esa fuerza de manera natural en español y evita una traducción demasiado eclesiástica o suavizada.
- source_word: τῶν κλήρων
  english_pob_choice: those allotted to your care
  chosen_spanish: los lotes
  alternatives_spanish:
  - las porciones
  - las asignaciones
  - los allotamientos
  lexicon: BDAG
  rationale: El sustantivo significa literalmente «suertes/lotes/asignaciones». Conservar «lotes» mantiene visible la metáfora textual, dejando la relación pastoral implícita en el contexto, como en el audit trail inglés.
- source_word: τύποι
  english_pob_choice: examples
  chosen_spanish: ejemplos
  alternatives_spanish:
  - modelos
  - patrones
  lexicon: BDAG
  rationale: Aquí τύποι designa figuras o ejemplos para imitar. «Ejemplos» es la equivalencia más clara y idiomática en español.
- source_word: γινόμενοι
  english_pob_choice: becoming
  chosen_spanish: haciéndose
  alternatives_spanish:
  - siendo
  - llegando a ser
  lexicon: BDAG
  rationale: El participio verbal expresa un proceso asumido en la práctica. «Haciéndose» preserva ese matiz dinámico mejor que un mero «siendo».
- source_word: τοῦ ποιμνίου
  english_pob_choice: the flock
  chosen_spanish: del rebaño
  alternatives_spanish:
  - de la grey
  - del pequeño rebaño
  lexicon: BDAG
  rationale: La metáfora pastoral del pueblo bajo cuidado se expresa de forma natural con «rebaño». «Grey» sería posible, pero «rebaño» es más transparente para lectores contemporáneos y conserva la imagen ovina.
theological_decisions:
- issue: Sentido de τῶν κλήρων en el contexto de liderazgo de la iglesia
  english_pob_reading: refers to believers assigned to the elders' care, not possessions owned by the elders
  chosen_spanish_reading: mantiene la imagen de «los lotes» para no borrar la metáfora de asignación, sin convertirla en propiedad de los dirigentes
  alternative_spanish_readings:
  - los que están a su cargo
  - las porciones que les han sido asignadas
  - los fieles confiados a su cuidado
  rationale: El contexto pastoral indica administración y cuidado, no posesión. En vez de traducir de inmediato el sentido interpretado, se conserva la metáfora básica para que el texto español siga siendo auditables y no oculte la tensión léxica que el inglés POB también señala.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Fuerza de κατακυριεύοντες respecto de la autoridad pastoral
  english_pob_reading: prohibits oppressive or overbearing exercise of authority, not all exercise of authority
  chosen_spanish_reading: prohíbe un ejercicio autoritario y opresivo, no toda forma de autoridad pastoral
  alternative_spanish_readings:
  - prohíbe mandar con abuso
  - prohíbe dominar tiránicamente
  - prohíbe ejercer dominio sobre
  rationale: La contraposición con «haciéndose ejemplos» muestra que el problema es el abuso de autoridad, no el liderazgo en sí. La formulación española debe preservar esa distinción doctrinal y práctica.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió acercarse más a τῶν κλήρων con «those allotted to your care». En español, se optó por conservar la metáfora explícita de «los lotes» en el texto principal y aclararla en nota, para no perder la transparencia del término griego ni convertirlo prematuramente en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantuvo «rebaño» para ποιμνίου, coherente con la metáfora pastoral del griego.
  - Se evitó «señoreando» porque en español puede sonar más tradicional que preciso para el matiz abusivo del verbo.
  - Se preservó la tensión entre metáfora literal y sentido contextual mediante nota, en línea con la transparencia del proyecto.
