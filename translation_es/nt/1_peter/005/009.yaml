review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del griego: mandato de resistir al diablo, modo de esa resistencia (''firmes en la fe''), y base cognitiva (''sabiendo...''). También mantiene bien ''los mismos sufrimientos'' y ''en el mundo''. Sin embargo, ''se están viviendo por su fraternidad'' no refleja bien la sintaxis ni suena natural: el agente/paciente queda mal expresado en español, donde corresponde algo como ''los está experimentando/sufriendo su hermandad''. Además, la nota [a] no preserva la alternativa inglesa; en vez de dar una alternativa léxica puntual, repite casi todo el versículo.'
  spanish_quality_summary: La frase general es legible, pero 'por su fraternidad' es poco idiomática y puede sonar forzada. 'Fraternidad' es posible, pero en español bíblico general 'hermandad' suele ser más natural para ἀδελφότης y conserva mejor el matiz colectivo familiar. La puntuación y registro son adecuados. Conviene también ajustar la nota alternativa para que sea realmente una alternativa léxica útil.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. 'Fe' está bien. La elección de 'fraternidad' no es errónea, pero 'hermandad' alinea mejor el valor colectivo de ἀδελφότης en español eclesial. La decisión sobre ἐπιτελεῖσθαι debe expresarse en español con un verbo natural; 'están siendo experimentados' o 'los experimenta' comunica mejor el sentido documentado que 'se están viviendo por'.
  issues:
  - severity: medium
    issue: 'Construcción no natural: ''se están viviendo por su fraternidad'''
    rationale: Aunque intenta reflejar una pasiva/medio valorada, en español esa construcción con 'por' resulta torpe y semánticamente confusa. El griego comunica que esos sufrimientos los experimenta la comunidad creyente.
  - severity: medium
    issue: '''Fraternidad'' suena menos natural que ''hermandad'' en este contexto'
    rationale: Ambas pueden funcionar, pero 'hermandad' es más idiomática para una comunidad de creyentes y preserva el sustantivo colectivo sin paráfrasis innecesaria.
  - severity: low
    issue: La nota [a] no corresponde a una alternativa léxica puntual
    rationale: La nota inglesa ofrece una alternativa para 'brotherhood'; la nota española repite casi el versículo entero, lo que dificulta su utilidad y rompe la lógica de las notas.
  revised_spanish_text: Resístanle, firmes en la fe[a], sabiendo que los mismos sufrimientos los experimenta su hermandad[b] en el mundo.
  revised_footnotes:
  - marker: a
    text: O 'firmes por la fe' o 'firmes en la fe cristiana'.
    reason: theological_note
  - marker: b
    text: O 'su familia de creyentes en el mundo'. 'Hermandad' aquí designa a toda la comunidad de creyentes, no solo a los varones.
    reason: lexical_alternative_and_cultural_note
  revision_rationale: Se corrigió la parte final para reflejar de manera natural y fiel que la comunidad creyente experimenta esos sufrimientos. Se cambió 'fraternidad' por 'hermandad' por mayor naturalidad eclesial en español, sin perder el valor colectivo de ἀδελφότης. También se rehízo el sistema de notas para que correspondan a alternativas reales y a la aclaración inclusiva documentada en la auditoría inglesa.
