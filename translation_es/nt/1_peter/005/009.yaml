translation:
  language: es
  text: Resístanle, firmes en la fe[a], sabiendo que los mismos sufrimientos los experimenta su hermandad[b] en el mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'firmes por la fe' o 'firmes en la fe cristiana'.
    reason: theological_note
  - marker: b
    text: O 'su familia de creyentes en el mundo'. 'Hermandad' aquí designa a toda la comunidad de creyentes, no solo a los varones.
    reason: lexical_alternative_and_cultural_note
lexical_decisions:
- source_word: ᾧ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - al diablo
  lexicon: BDAG
  rationale: El relativo dativo remite al diablo del v. 8; en español, el clítico de complemento indirecto en 'Resístanle' mantiene la referencia sin añadir una glosa interpretativa en el texto principal.
- source_word: ἀντίστητε
  english_pob_choice: Resist
  chosen_spanish: Resístanle
  alternatives_spanish:
  - Opońganse a él
  - Háganle frente
  lexicon: BDAG
  rationale: El imperativo aoristo pide oposición decisiva. 'Resístanle' conserva la fuerza del mandato y suena natural y solemne en español bíblico actual.
- source_word: στερεοὶ
  english_pob_choice: firm
  chosen_spanish: firmes
  alternatives_spanish:
  - estables
  - fuertes
  - firmes y constantes
  lexicon: BDAG
  rationale: Como adjetivo predicativo del modo de resistir, 'firmes' comunica estabilidad y resolución sin recargar la frase.
- source_word: τῇ πίστει
  english_pob_choice: in the faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - en la fe cristiana
  - por la fe
  - firmes en la fe
  lexicon: BDAG
  rationale: La construcción con artículo apunta al ámbito de la fe cristiana como realidad compartida y definida. 'En la fe' preserva la forma breve y deja abierta la tensión entre fe subjetiva y fe objetiva, sin forzarla.
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - pues saben
  - porque saben
  lexicon: BDAG
  rationale: El participio expresa base o acompañamiento del mandato. 'Sabiendo' reproduce esa relación de manera natural en español.
- source_word: τὰ αὐτὰ τῶν παθημάτων
  english_pob_choice: the same sufferings
  chosen_spanish: los mismos sufrimientos
  alternatives_spanish:
  - los mismos padecimientos
  - las mismas pruebas sufridas
  lexicon: BDAG
  rationale: Se mantiene la correspondencia directa con τὰ αὐτὰ τῶν παθημάτων. 'Sufrimientos' es transparente y suficientemente amplio para el contexto de persecución y prueba.
- source_word: παθημάτων
  english_pob_choice: sufferings
  chosen_spanish: sufrimientos
  alternatives_spanish:
  - padecimientos
  - aflicciones
  - penalidades
  lexicon: BDAG
  rationale: '''Sufrimientos'' es el equivalente más claro y natural en español para πάθημα en este contexto.'
- source_word: ἀδελφότητι
  english_pob_choice: brotherhood
  chosen_spanish: fraternidad
  alternatives_spanish:
  - hermandad
  - la comunidad de los creyentes
  - los hermanos y hermanas
  lexicon: BDAG
  rationale: El sustantivo colectivo designa a la comunidad de creyentes como familia. 'Fraternidad' conserva el valor colectivo y evita un giro explicativo excesivo en el texto principal; la nota aclara que incluye a toda la comunidad, no solo varones.
- source_word: ἐν τῷ κόσμῳ
  english_pob_choice: in the world
  chosen_spanish: en el mundo
  alternatives_spanish:
  - por todo el mundo
  - en la tierra
  lexicon: BDAG
  rationale: La frase preposicional se traduce de forma directa y estándar; 'mundo' conserva el alcance espacial y existencial del término κόσμος.
- source_word: ἐπιτελεῖσθαι
  english_pob_choice: are being experienced
  chosen_spanish: se están viviendo
  alternatives_spanish:
  - se están experimentando
  - se están llevando a cabo
  - están siendo cumplidos
  lexicon: BDAG
  rationale: 'El infinitivo pasivo presenta una dificultad semántica: los sufrimientos ''se llevan a cabo'' o ''se cumplen'', pero en español esa formulación resulta extraña con ''sufrimientos''. ''Se están viviendo'' expresa con naturalidad que tales sufrimientos están siendo atravesados por la comunidad, sin borrar la idea de acontecimiento real y presente.'
theological_decisions:
- issue: Alcance de τῇ πίστει
  english_pob_reading: objective Christian faith/steadfast faith commitment expressed as 'the faith'
  chosen_spanish_reading: la fe como ámbito y contenido compartido de la perseverancia cristiana
  alternative_spanish_readings:
  - la fe subjetiva como confianza
  - la fe cristiana explícita
  rationale: El artículo sugiere más que una mera disposición interior; puede referirse al cuerpo de la fe o al compromiso sostenido con ella. 'En la fe' conserva esa ambigüedad sin resolverla en exceso.
  doctrine_reference: 'DOCTRINE.md: πίστις suele traducirse ''fe''; preservar tensiones donde el contexto no obliga a decidir entre fe subjetiva y contenido de la fe.'
- issue: Sentido de ἀδελφότητι
  english_pob_reading: brotherhood refers to the whole community of fellow believers, not only males
  chosen_spanish_reading: fraternidad como comunidad completa de creyentes
  alternative_spanish_readings:
  - hermandad
  - comunidad de creyentes
  - familia de creyentes
  rationale: El término griego es colectivo y familiar. 'Fraternidad' permite un sustantivo colectivo en español; la aclaración evita una lectura exclusivamente masculina sin sustituir el término por una paráfrasis más larga en el texto principal.
  doctrine_reference: 'DOCTRINE.md: mantener precisión léxica con explicación cuando el término colectivo puede sonar masculino en español.'
translation_notes:
  revision_awareness: 'El audit trail inglés pasó de ''are being accomplished'' a ''are being experienced'' para evitar una construcción demasiado áspera y mantener la naturalidad. En español, ''se están viviendo'' sigue esa misma intención: conserva el presente pasivo/medio y el carácter actual de los sufrimientos, sin imponer una lectura de ''cumplimiento'' que sería demasiado técnica en esta frase.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé/Cristo/Mesías no aplicables en este versículo; no se introdujo vocabulario doctrinal ajeno al pasaje.
  - '''Fe'' se traduce con el sustantivo normal del proyecto y no con ''creencia'' o ''confianza'' para no diluir el valor comunitario del artículo.'
  - '''Fraternidad'' se eligió por su valor colectivo; la nota evita que se entienda como un grupo solo masculino.'
  - La puntuación y el imperativo plural de cortesía/comunidad ('Resístanle') ajustan el mandato a un español bíblico contemporáneo y reverente.
