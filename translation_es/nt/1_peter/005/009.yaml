revisions:
- from: Resístanle[a], firmes en la fe[b], sabiendo que los mismos sufrimientos se están viviendo por su fraternidad[c] en el mundo.
  to: Resístanle, firmes en la fe[a], sabiendo que los mismos sufrimientos los experimenta su hermandad[b] en el mundo.
  rationale: Se corrigió la parte final para reflejar de manera natural y fiel que la comunidad creyente experimenta esos sufrimientos. Se cambió 'fraternidad' por 'hermandad' por mayor naturalidad eclesial en español, sin perder el valor colectivo de ἀδελφότης. También se rehízo el sistema de notas para que correspondan a alternativas reales y a la aclaración inclusiva documentada en la auditoría inglesa.
