translation:
  language: es
  text: Y el Dios de toda gracia[a], que los llamó a su gloria eterna en Mesías, después de haber padecido por un poco de tiempo, él mismo los restaurará[b], los afirmará, los fortalecerá y los fundará[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Cristo». El griego Χριστός puede traducirse «Mesías» o, en el uso tradicional, «Cristo».
    reason: alternative_reading
  - marker: b
    text: O «perfeccionará» o «los dejará completos». El verbo incluye el sentido de restaurar algo a su condición correcta.
    reason: lexical_alternative
  - marker: c
    text: O «los cimentará» o «los pondrá sobre un fundamento firme». El griego usa imaginería de fundamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάσης χάριτος
  english_pob_choice: of all grace
  chosen_spanish: de toda gracia
  alternatives_spanish:
  - de toda la gracia
  - de cada gracia
  lexicon: BDAG
  rationale: La construcción genitiva expresa plenitud/completitud; «de toda gracia» comunica el alcance total sin añadir una especificación ajena al griego. Mantiene el valor comprehensivo de la frase inicial.
- source_word: ὁ καλέσας ὑμᾶς
  english_pob_choice: who called you
  chosen_spanish: que los llamó
  alternatives_spanish:
  - que los ha llamado
  - quien los llamó
  lexicon: BDAG
  rationale: El aoristo participial se vierte naturalmente con una relativa simple en español. «Los llamó» preserva la referencia pasada sin forzar una lectura aspectual adicional.
- source_word: εἰς τὴν αἰώνιον αὐτοῦ δόξαν
  english_pob_choice: to his eternal glory
  chosen_spanish: a su gloria eterna
  alternatives_spanish:
  - hacia su gloria eterna
  - a su gloria perpetua
  lexicon: BDAG
  rationale: «A» reproduce de modo natural la dirección de εἰς en español y evita una imagen demasiado rígida. «Eterna» conserva αἰώνιον sin suavizar su fuerza durativa.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Se mantiene la decisión terminológica del POB de traducir el título Χριστός como «Mesías» cuando funciona como título y no como mero nombre fijo. «En Mesías» conserva el matiz mesiánico y el valor confesional del término.
- source_word: ὀλίγον παθόντας
  english_pob_choice: after you have suffered a little while
  chosen_spanish: después de haber padecido un poco de tiempo
  alternatives_spanish:
  - después de sufrir un poco
  - tras padecer brevemente
  lexicon: BDAG
  rationale: La frase temporal expresa duración limitada previa a la acción divina. «Padecido» conserva el tono más fuerte de πάσχω frente a un simple «sufrir», y «un poco de tiempo» refleja bien la medida temporal.
- source_word: αὐτὸς
  english_pob_choice: will himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él personalmente
  - él por sí mismo
  lexicon: BDAG
  rationale: El pronombre es enfático; español lo expresa con «él mismo» colocado antes del verbo para conservar la prominencia de la acción divina directa.
- source_word: καταρτίσει
  english_pob_choice: restore
  chosen_spanish: restaurará
  alternatives_spanish:
  - perfeccionará
  - dejará completo
  - reparará
  lexicon: BDAG
  rationale: El verbo incluye la idea de poner en buen estado o restaurar algo dañado. «Restaurará» comunica mejor esa reparación contextual que el arcaísmo «perfeccionará», aunque se conserva la posibilidad semántica de completamiento.
- source_word: στηρίξει
  english_pob_choice: establish
  chosen_spanish: afirmará
  alternatives_spanish:
  - establecerá
  - fortalecerá en la fe
  - hará firme
  lexicon: BDAG
  rationale: «Afirmará» refleja la idea de hacer firme y estable sin duplicar de manera excesiva «establecerá» o «fortalecerá». En español bíblico conserva bien la noción de firmeza.
- source_word: σθενώσει
  english_pob_choice: strengthen
  chosen_spanish: los fortalecerá
  alternatives_spanish:
  - los hará fuertes
  - los robustecerá
  lexicon: BDAG
  rationale: Es el equivalente directo y natural en español; preserva la progresión de verbos futuros. Se conserva la fuerza semántica sin introducir un registro anticuado.
- source_word: θεμελιώσει
  english_pob_choice: ground
  chosen_spanish: los establecerá
  alternatives_spanish:
  - los fundará
  - los pondrá sobre fundamento firme
  lexicon: BDAG
  rationale: El verbo usa imaginería de fundamento. «Establecerá» es idiomático en español y comunica firmeza; aunque pierde parte de la metáfora explícita, evita redundancia pesada con «afirmará».
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: in Messiah
  chosen_spanish_reading: en Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: Se sigue la política del POB de traducir el título cuando su función es titulación mesiánica. Esto preserva la carga histórica y teológica del término sin convertirlo en un mero nombre propio.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Secuencia sufrimiento limitado → acción restauradora de Dios
  english_pob_reading: after you have suffered a little while, will himself restore...
  chosen_spanish_reading: después de haber padecido un poco de tiempo, él mismo los restaurará...
  alternative_spanish_readings:
  - cuando hayan padecido un poco de tiempo, él mismo los restaurará...
  - tras padecer un poco, él mismo los restaurará...
  rationale: 'La frase mantiene la relación temporal abierta del participio griego sin resolverla en un sistema doctrinal sobre el sufrimiento. Se conserva la tensión: el padecimiento es real, pero limitado, y la acción restauradora depende de Dios.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se incorporó la revisión registrada en el audit trail: εἰς se volvió más naturalmente «a su gloria eterna» (aquí mantenido como «a su gloria eterna»). También se preservó la decisión revisada de traducir Χριστός como «Mesías» según la política de títulos del POB. No se introdujeron cambios doctrinales adicionales más allá de las opciones ya auditadas.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «gracia» para χάρις.
  - Se usa «Mesías» consistentemente para Χριστός en el texto principal, con nota de alternativa tradicional.
  - Los cuatro verbos finales se distinguen en español para reflejar la acumulación retórica del griego, aunque dos de ellos se acercan semánticamente; las notas preservan alternativas legítimas.
  - «Él mismo» conserva el énfasis del pronombre αὐτός.
  - El pasaje queda en un registro bíblico moderno y digno, sin calco excesivo ni arcaísmo innecesario.
