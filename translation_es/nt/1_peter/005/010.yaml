    rationale: El griego usa imaginería de fundamento. Como στηρίξει ya está vertido como «los afirmará», «los establecerá» reduce la distinción semántica entre los verbos y pierde la metáfora de base/fundamento preservada en la auditoría inglesa.
  - severity: low
