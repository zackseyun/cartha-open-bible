  text: ὁ δὲ θεὸς πάσης χάριτος, ὁ καλέσας ὑμᾶς εἰς τὴν αἰώνιον αὐτοῦ δόξαν ἐν ⸀Χριστῷ, ὀλίγον παθόντας αὐτὸς ⸀καταρτίσει, στηρίξει, σθενώσει, ⸀θεμελιώσει.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/005/010.yaml
  text: And the God of all grace[a], who called you to his eternal glory in Messiah, after you have suffered a little while, will himself restore, establish, strengthen[c][b], and ground you.
  footnotes:
  - marker: a
    text: Or 'in Christ.' The Greek title Χριστός can be rendered 'Messiah' or, in traditional English, 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'will perfect' or 'will make complete.' The verb includes the sense of restoring something to proper condition.
    reason: lexical_alternative
  - marker: c
    text: Or 'will found you' or 'will set you on a firm foundation.' The Greek uses foundation imagery.
    reason: lexical_alternative
