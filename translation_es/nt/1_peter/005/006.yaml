translation:
  language: es
  text: Humíllense[a], por tanto, bajo la poderosa mano de Dios, para que él los exalte a su debido tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Sean humillados ... para que él los exalte a su debido tiempo». El imperativo griego es pasivo en la forma, aunque aquí suele entenderse con sentido reflexivo: «humíllense».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταπεινώθητε
  english_pob_choice: Humble yourselves
  chosen_spanish: Humíllense
  alternatives_spanish:
  - Sean humillados
  lexicon: BDAG
  rationale: 'El imperativo aoristo pasivo conserva en español una fuerza exhortativa mejor con un reflexivo de valor medio/pasivo: «humíllense». «Sean humillados» refleja la pasividad formal, pero suena más marcado y menos natural en la exhortación. La decisión mantiene la tensión entre la responsabilidad humana y la acción divina sin borrar la forma pasiva del griego.'
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: Introduce conclusión lógica respecto del contexto inmediato. «Por tanto» preserva mejor la relación inferencial que una coordinación más coloquial.
- source_word: ὑπὸ τὴν κραταιὰν χεῖρα
  english_pob_choice: under the mighty hand
  chosen_spanish: bajo la poderosa mano
  alternatives_spanish:
  - bajo la mano poderosa
  - bajo la mano fuerte
  lexicon: BDAG
  rationale: «Poderosa mano» conserva el valor metafórico bíblico de la expresión y su resonancia de poder soberano. «Poderosa» comunica bien κραταιὰν sin volverse rígido; «mano fuerte» es posible, pero pierde algo del eco de fuerza majestuosa del griego y del uso bíblico del motivo.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  lexicon: BDAG
  rationale: Genitivo posesivo directo y sin ambigüedad. Se mantiene la referencia explícita a Dios como agente de la acción soberana.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce propósito/resultando. «Para que» es natural en español y preserva el sentido telógico del griego.
- source_word: ὑμᾶς ὑψώσῃ
  english_pob_choice: he may exalt you
  chosen_spanish: él los exalte
  alternatives_spanish:
  - él los levante
  - él los eleve
  lexicon: BDAG
  rationale: «Exaltar» conserva el sentido de ὑψόω como levantar a honor/vindicación, no solo elevar físicamente. Se mantiene el sujeto implícito explícito en español («él») porque depende de Dios en el contexto anterior.
- source_word: ἐν καιρῷ
  english_pob_choice: at the proper time
  chosen_spanish: a su debido tiempo
  alternatives_spanish:
  - en el tiempo oportuno
  - en el momento debido
  lexicon: BDAG
  rationale: καιρός apunta a un tiempo oportuno/adecuado, no simplemente cronológico. «A su debido tiempo» transmite bien la idea de oportunidad fijada por Dios y es idiomático en español.
theological_decisions:
- issue: Forma pasiva exhortativa de Ταπεινώθητε
  english_pob_reading: The command is rendered reflexively as 'Humble yourselves' while retaining the following phrase 'under the mighty hand of God' to show that humility is exercised in submission to God's power.
  chosen_spanish_reading: 'El mandato se expresa con valor reflexivo: «Humíllense», dejando explícito que la humillación ocurre «bajo la poderosa mano de Dios».'
  alternative_spanish_readings:
  - Sean humillados
  rationale: El español necesita decidir entre una pasiva formal y una exhortación reflexiva. Se opta por la reflexiva porque suena natural y conserva el llamado a una respuesta personal sin separar la humildad de la soberanía divina. No se elimina la tensión entre la responsabilidad humana y la acción de Dios, porque el contexto de la frase siguiente mantiene a Dios como quien finalmente exalta.
  doctrine_reference: Translation philosophy §3 (preservar la tensión en vez de resolverla)
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente griego y el audit trail inglés, sin cambios respecto de la última pasada indicada. Se conserva la alternancia entre la forma pasiva griega y la lectura exhortativa reflexiva en español, tal como exige el registro POB.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ, conforme al estándar del proyecto y sin necesidad de nota adicional.
  - Se evita «SEÑOR» o una paráfrasis devocional para κραταιὰν χεῖρα; la metáfora queda como imagen concreta y bíblica.
  - «Exalte» se mantiene para ὑψώσῃ por su valor de vindicación/honor, no de simple elevación física.
  - «A su debido tiempo» refleja mejor καιρῷ que un temporal genérico.
  - La puntuación respeta una sola oración con coma tras «por tanto» y otra antes de la cláusula final de propósito.
