lexical_decisions:
- source_word: αὐτῷ
  english_pob_choice: To him
  chosen_spanish: A él
  alternatives_spanish:
  - Para él
  - A él mismo
  lexicon: BDAG
  rationale: El dativo funciona aquí como destinatario de la doxología; en español, «A él» reproduce de manera natural y fiel el valor direccional/dativo sin añadir interpretación posesiva.
- source_word: κράτος
  english_pob_choice: dominion
  chosen_spanish: dominio
  alternatives_spanish:
  - poder
  - señorío
  - fuerza
  lexicon: BDAG
  rationale: En este contexto doxológico, κράτος expresa poder soberano ejercido en gobierno; «dominio» comunica mejor esa idea que un simple «poder» o «fuerza».
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - por siempre y para siempre
  - por los siglos eternos
  lexicon: BDAG
  rationale: La expresión griega es una fórmula idiomática de duración interminable. «Por los siglos de los siglos» conserva la fuerza enfática y es plenamente natural en español bíblico sin perder el valor de eternidad.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén
  lexicon: BDAG
  rationale: Se mantiene la transliteración tradicional, que en español conserva el valor litúrgico y afirmativo del cierre.
theological_decisions:
- issue: Predicado implícito en la doxología
  english_pob_reading: To him be the dominion
  chosen_spanish_reading: A él sea el dominio
  alternative_spanish_readings:
  - A él pertenece el dominio
  - Suya es la dominación
  rationale: El griego es verbless; el español requiere verbo. «Sea» preserva el tono optativo/doxológico sin convertir la frase en una afirmación posesiva más interpretativa.
  doctrine_reference: Traducir la doxología sin añadir más determinación que la que el griego exige; mantener el carácter de alabanza.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece anclado en el texto principal, y la nota se mantiene como alternativa lexical alineada con el audit trail inglés.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» como sustituto del referente divino; el versículo se limita al pronombre «él», coherente con el griego.
  - Se prefirió «dominio» para κράτος en armonía con la decisión inglesa de doxología y para evitar reducir la idea a fuerza abstracta.
  - La fórmula «por los siglos de los siglos» conserva el sentido intensivo de la expresión semítica/grecobíblica y es idiomática en español eclesial contemporáneo.
