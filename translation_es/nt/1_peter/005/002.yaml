translation:
  language: es
  text: Pastoreen el rebaño de Dios entre ustedes, ejerciendo la supervisión no por fuerza, sino voluntariamente, conforme a Dios[a]; no por ganancia deshonrosa, sino con buena disposición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según Dios» / «como Dios quiere».
    reason: alternative_reading
lexical_decisions:
- source_word: ποιμάνατε
  english_pob_choice: Shepherd
  chosen_spanish: Pastoreen
  alternatives_spanish:
  - Apacienten
  - Pastoreen como pastores
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción pastoral concreta. 'Pastoreen' conserva la metáfora de pastor/rebaño mejor que una forma más genérica como 'apacienten' y evita convertir el verbo en un título eclesiástico técnico.
- source_word: τὸ ἐν ὑμῖν ποίμνιον τοῦ θεοῦ
  english_pob_choice: the flock of God among you
  chosen_spanish: el rebaño de Dios entre ustedes
  alternatives_spanish:
  - el rebaño de Dios que está entre ustedes
  - el rebaño de Dios en medio de ustedes
  lexicon: BDAG
  rationale: ποίμνιον es 'rebaño'. 'Entre ustedes' conserva el valor relacional/local de ἐν ὑμῖν sin sugerir posesión por parte de los destinatarios. 'De Dios' mantiene explícita la propiedad divina.
- source_word: ἐπισκοποῦντες
  english_pob_choice: exercising oversight
  chosen_spanish: ejerciendo la supervisión
  alternatives_spanish:
  - supervisando
  - velando sobre
  lexicon: BDAG
  rationale: El participio describe cómo se realiza el pastoreo. 'Ejerciendo la supervisión' preserva la idea de cuidado/administración sin trasladar automáticamente un cargo eclesiástico posterior al texto.
- source_word: μὴ ἀναγκαστῶς
  english_pob_choice: not under compulsion
  chosen_spanish: no por fuerza
  alternatives_spanish:
  - no por compulsión
  - no por obligación
  lexicon: BDAG
  rationale: '''ἀναγκαστῶς'' expresa actuar por coerción o necesidad impuesta. ''No por fuerza'' es natural en español y mantiene el contraste con la disposición voluntaria.'
- source_word: ἀλλὰ ἑκουσίως
  english_pob_choice: but willingly
  chosen_spanish: sino voluntariamente
  alternatives_spanish:
  - sino de buena voluntad
  - sino de su propia voluntad
  lexicon: BDAG
  rationale: '''ἑκουσίως'' marca la disposición libre y voluntaria en contraste con la coerción. ''Voluntariamente'' es preciso y claro en español contemporáneo.'
- source_word: κατὰ θεόν
  english_pob_choice: according to God
  chosen_spanish: conforme a Dios
  alternatives_spanish:
  - según Dios
  - de acuerdo con Dios
  - como Dios quiere
  lexicon: BDAG
  rationale: La frase es semánticamente compacta. 'Conforme a Dios' conserva la literalidad y deja abierta la tensión interpretativa entre norma, modo y voluntad divina, sin resolverla prematuramente.
- source_word: μηδὲ αἰσχροκερδῶς
  english_pob_choice: nor for shameful gain
  chosen_spanish: no por ganancia deshonrosa
  alternatives_spanish:
  - no por ganancia vergonzosa
  - no por lucro vergonzoso
  - no por lucro deshonesto
  lexicon: BDAG
  rationale: αἰσχροκερδῶς se refiere a una búsqueda de ganancia moralmente vergonzosa o ruin. 'Ganancia deshonrosa' conserva el matiz ético sin sonar forzado.
- source_word: ἀλλὰ προθύμως
  english_pob_choice: but eagerly
  chosen_spanish: sino con prontitud
  alternatives_spanish:
  - sino con entusiasmo
  - sino con diligencia
  - sino con buena disposición
  lexicon: BDAG
  rationale: προθύμως incluye prontitud, disposición y energía. 'Con prontitud' distingue mejor esta idea de la mera voluntariedad anterior y mantiene el contraste con la motivación mercenaria.
theological_decisions:
- issue: Cómo reflejar ἐπισκοποῦντες sin imponer un oficio eclesiástico posterior
  english_pob_reading: Rendered descriptively as 'exercising oversight' rather than as an office label such as 'serving as bishops.'
  chosen_spanish_reading: Se traduce de modo descriptivo como 'ejerciendo la supervisión', no como un título eclesiástico fijo.
  alternative_spanish_readings:
  - sirviendo como obispos
  - cumpliendo el oficio de obispo
  rationale: El contexto describe una función pastoral de cuidado y vigilancia sobre el rebaño. Traducirlo como título oficial introduciría una estructura eclesial posterior que el texto no exige.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Cómo entender y traducir κατὰ θεόν
  english_pob_reading: Kept as 'according to God' in the main text, with a clarifying alternative in a footnote.
  chosen_spanish_reading: Se conserva como 'conforme a Dios' en el texto principal, dejando abierta su densidad semántica.
  alternative_spanish_readings:
  - según la voluntad de Dios
  - como Dios quiere
  - de acuerdo con Dios
  rationale: La expresión es comprimida y admite más de una lectura legítima. Mantenerla literal preserva la tensión del pasaje y evita fijar prematuramente una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail inglés, sin cambios de revisión pendientes; se preservan tanto la metáfora pastoral como la tensión interpretativa de κατὰ θεόν.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ/θεόν, conforme al estándar del proyecto.
  - Se usa 'rebaño' para ποίμνιον por ser la metáfora más directa y natural en español.
  - '''Pastoreen'' conserva la imagen verbal sin convertirla en el sustantivo ''pastor''.'
  - '''Voluntariamente'' y ''con prontitud'' distinguen bien las dos adverbiales del verso.'
  - No se introduce 'Cristo' ni terminología eclesiástica no requerida por el texto.
