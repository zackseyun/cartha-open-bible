translation:
  language: es
  text: Y cuando se revele el Pastor principal[a], recibirán la corona[b] inmarcesible de gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘aparezca’ para ‘se revele’.
    reason: alternative_reading
  - marker: b
    text: El griego para ‘corona’ puede referirse a una guirnalda de victoria otorgada como premio de honor, no específicamente a una corona real.
    reason: lexical_alternative
lexical_decisions:
- source_word: φανερωθέντος
  english_pob_choice: when ... is revealed
  chosen_spanish: cuando se revele
  alternatives_spanish:
  - cuando aparezca
  - cuando sea manifestado
  lexicon: BDAG
  rationale: El participio aoristo pasivo en genitivo absoluto expresa una acción temporal futura; en español, una subordinada temporal con subjuntivo mantiene el valor pasivo y la idea de manifestación. 'Se revele' conserva mejor el matiz de revelación que 'aparezca', sin perder naturalidad.
- source_word: ἀρχιποίμενος
  english_pob_choice: Chief Shepherd
  chosen_spanish: Supremo Pastor
  alternatives_spanish:
  - Pastor principal
  - Jefe de los pastores
  - Pastor supremo
  lexicon: BDAG
  rationale: El compuesto designa al pastor principal o supremo. 'Supremo Pastor' comunica el valor titular y la relación jerárquica con los pastores sin sonar artificioso en español. Se capitaliza por tratarse de un título cristológico.
- source_word: κομιεῖσθε
  english_pob_choice: you will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - obtendrán
  - les será dado
  lexicon: BDAG
  rationale: El futuro medio expresa la recepción de lo que se concede como premio. 'Recibirán' es el equivalente español más natural y conserva la iniciativa del sujeto en la recepción.
- source_word: ἀμαράντινον
  english_pob_choice: unfading
  chosen_spanish: inmarcesible
  alternatives_spanish:
  - incorruptible
  - que no se marchita
  - imperecedera
  lexicon: BDAG
  rationale: El adjetivo indica algo que no pierde frescura ni se marchita. 'Inmarcesible' es preciso, elegante y bíblico en español; mantiene la imagen de algo que no se desvanece, sin intensificar indebidamente a 'incorruptible'.
- source_word: τῆς δόξης
  english_pob_choice: of glory
  chosen_spanish: de gloria
  alternatives_spanish:
  - gloriosa
  - de la gloria
  lexicon: BDAG
  rationale: El genitivo se conserva de forma directa como complemento nominal. 'De gloria' mantiene la densidad metafórica del texto y evita una paráfrasis adjetival.
- source_word: στέφανον
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - corona de victoria
  - guirnalda
  - laurea
  lexicon: BDAG
  rationale: Aunque στέφανος puede referirse a una guirnalda o corona de premio, 'corona' es la opción más clara y litúrgicamente inteligible en español. La nota aclara que el término puede aludir a una corona de honor/victoria, no necesariamente a una diadema real.
theological_decisions:
- issue: Identidad del 'Supremo Pastor'
  english_pob_reading: A christological title referring to Jesus
  chosen_spanish_reading: Título cristológico que se refiere a Jesús
  alternative_spanish_readings:
  - un título honorífico general
  - el pastor principal de la comunidad
  rationale: El contexto de pastoreo y revelación escatológica apunta a Jesús como referente del título. La capitalización ayuda a marcar su uso titular sin añadir explicación doctrinal en el cuerpo del versículo.
  doctrine_reference: Credo Niceno; Calcedonia
- issue: Lenguaje de revelación escatológica
  english_pob_reading: is revealed
  chosen_spanish_reading: se revele
  alternative_spanish_readings:
  - aparezca
  - sea manifestado
  rationale: La forma pasiva mantiene el tema de la manifestación/revelación y deja abierto el modo exacto del acontecimiento, sin reducirlo a una simple 'aparición'.
  doctrine_reference: Filosofía de traducción §3
- issue: Sentido de στέφανος
  english_pob_reading: a victor's wreath awarded as a prize of honor, not specifically a royal crown
  chosen_spanish_reading: corona de honor/victoria
  alternative_spanish_readings:
  - guirnalda de victoria
  - corona real
  rationale: En español, 'corona' es el término más idiomático; la nota preserva el matiz de premio honorífico y evita identificarlo indebidamente con una corona real.
  doctrine_reference: BDAG; uso léxico contextual
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] en el texto español. La redacción mantiene el valor pasivo de φανερωθέντος, el título cristológico de ἀρχιποίμενος y el matiz honorífico de στέφανος sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usó 'Supremo Pastor' como equivalente natural y transparente de 'Chief Shepherd', evitando 'archipastor' por opacidad.
  - Se prefirió 'inmarcesible' para ἀμαράντινον por su precisión y registro bíblico en español.
  - Se mantuvo 'corona' con nota explicativa para preservar inteligibilidad y el matiz de premio de honor.
  - La puntuación y el orden siguen un estilo bíblico moderno, sin calco servil del inglés.
