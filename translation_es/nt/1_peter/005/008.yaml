review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: dos imperativos iniciales, identificación del enemigo como ''su adversario, el diablo'', la comparación con un león rugiente y la acción de buscar para devorar. Sin embargo, hay dos puntos mejorables para mayor fidelidad al texto fuente y al rastro POB: (1) τινα se expresa mejor como ''a alguien'' que como ''a quién'', ya que el griego tiene un indefinido de persona, no una construcción interrogativa relativa; (2) ὡς λέων ὠρυόμενος suena más natural y pleno en español con artículo indefinido: ''como un león rugiente''.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. 'Manténganse alertas' y 'su adversario, el diablo' funcionan bien. No obstante, 'anda como león rugiente' suena algo recortado en español, y 'buscando a quién devorar' resulta menos natural y menos preciso que 'buscando a alguien para devorar' o 'buscando a alguien a quien devorar'. También conviene alinear la nota a con la opción realmente marcada en el texto.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'El diablo' para διάβολος y 'adversario' para ἀντίδικος están bien. La decisión 'Sean sobrios' para νήψατε es defendible en español bíblico moderno, especialmente con nota aclaratoria, aunque la nota debe presentar primero la alternativa correspondiente a la elección inglesa auditada ('sobrios de mente') en vez de hacerla parecer secundaria sin conexión clara con el anclaje.
  issues:
  - severity: medium
    issue: τινα está traducido como 'a quién'
    rationale: El griego usa un pronombre indefinido singular ('alguien'), no una expresión interrogativa/relativa. 'Buscando a quién devorar' existe en español, pero aquí introduce un matiz menos directo que el original.
  - severity: medium
    issue: Falta de artículo en 'como león rugiente'
    rationale: Aunque no es imposible, en español natural la comparación se lee mejor como 'como un león rugiente'. Esto preserva la viveza de ὡς λέων ὠρυόμενος sin sonar elíptico.
  - severity: low
    issue: La nota [a] no está del todo alineada con la formulación principal elegida
    rationale: El texto principal dice 'Sean sobrios', pero la nota empieza con una alternativa ('Sean sobrios de mente') sin dejar claro que esta explicita el matiz de la opción principal. Conviene afinarla para coherencia lexical.
  revised_spanish_text: Sean sobrios[a]; manténganse alertas. Su adversario, el diablo, anda como un león rugiente[b], buscando a alguien para devorar.
  revised_footnotes:
  - marker: a
    text: O 'Sean sobrios de mente'. El verbo griego νήφω es figurado aquí; literalmente puede aludir a la sobriedad frente al vino, pero en el Nuevo Testamento su uso apunta a la lucidez y al autocontrol en medio del peligro espiritual. 'Sean sobrios' conserva un registro breve y bíblico en español.
    reason: lexical_alternative
  - marker: b
    text: O 'merodea'. El verbo griego es más literalmente 'anda' o 'camina alrededor', pero la imagen del león sugiere naturalmente la idea de acechar.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'a quién' a 'a alguien' para reflejar mejor el indefinido griego τινα, y se añade 'un' en 'como un león rugiente' para una comparación más natural en español. También se afina la nota [a] para alinearla mejor con la elección principal 'Sean sobrios'.
