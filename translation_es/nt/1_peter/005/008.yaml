  text: νήψατε, γρηγορήσατε. ὁ ἀντίδικος ὑμῶν διάβολος ὡς λέων ὠρυόμενος περιπατεῖ ζητῶν ⸀τινα ⸀καταπιεῖν·
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/005/008.yaml
  text: Be sober-minded[a]; stay alert. Your adversary, the devil, walks around like a roaring lion[b], seeking someone to devour.
  footnotes:
  - marker: a
    text: Or 'Be sober-minded' (traditional) or 'Be sober.' The Greek verb νήψατε literally means "be sober [from wine]," but every NT use of νήφω is figurative — here the sense is mental clarity and self-possession under spiritual attack, not abstinence from drink. "Clear-minded" preserves the actual force and keeps the rendering distinct from the paired γρηγορήσατε ("stay alert").
    reason: lexical_alternative
  - marker: b
    text: Or 'prowls around.' The Greek verb is more literally 'walks around' or 'goes about,' but the lion imagery naturally suggests prowling.
    reason: lexical_alternative
