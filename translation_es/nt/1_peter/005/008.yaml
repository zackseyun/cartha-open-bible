revisions:
- from: Sean sobrios[a]; manténganse alertas. Su adversario, el diablo, anda como león rugiente[b], buscando a quién devorar.
  to: Sean sobrios[a]; manténganse alertas. Su adversario, el diablo, anda como un león rugiente[b], buscando a alguien para devorar.
  rationale: Se ajusta 'a quién' a 'a alguien' para reflejar mejor el indefinido griego τινα, y se añade 'un' en 'como un león rugiente' para una comparación más natural en español. También se afina la nota [a] para alinearla mejor con la elección principal 'Sean sobrios'.
  reviewer_model: gpt-5.4
