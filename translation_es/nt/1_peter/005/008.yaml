translation:
  language: es
  text: Sean sobrios[a]; manténganse alertas. Su adversario, el diablo, anda como un león rugiente[b], buscando a alguien para devorar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Sean sobrios de mente'. El verbo griego νήφω es figurado aquí; literalmente puede aludir a la sobriedad frente al vino, pero en el Nuevo Testamento su uso apunta a la lucidez y al autocontrol en medio del peligro espiritual. 'Sean sobrios' conserva un registro breve y bíblico en español.
    reason: lexical_alternative
  - marker: b
    text: O 'merodea'. El verbo griego es más literalmente 'anda' o 'camina alrededor', pero la imagen del león sugiere naturalmente la idea de acechar.
    reason: lexical_alternative
lexical_decisions:
- source_word: νήψατε
  english_pob_choice: Be sober-minded
  chosen_spanish: Sean sobrios
  alternatives_spanish:
  - Mantengan la mente clara
  - Sean sobrios de mente
  - Tengan dominio propio
  lexicon: BDAG
  rationale: El verbo νήφω es figurado en todo el NT; aquí no se trata principalmente de abstinencia de alcohol, sino de lucidez y autocontrol frente al ataque espiritual. En español, 'sean sobrios' conserva la fuerza verbal y suena digno y natural, aunque puede rozar la idea tradicional de sobriedad física; por eso la nota preserva la alternativa de 'mente clara' para explicitar el matiz contextual.
- source_word: γρηγορήσατε
  english_pob_choice: stay alert
  chosen_spanish: manténganse alertas
  alternatives_spanish:
  - estén vigilantes
  - manténganse despiertos
  - velen
  lexicon: BDAG
  rationale: El imperativo complementa a νήψατε con la idea de vigilancia despierta. 'Manténganse alertas' es natural en español moderno y conserva el valor continuo y práctico del mandato sin volverlo arcaico.
- source_word: ἀντίδικος
  english_pob_choice: adversary
  chosen_spanish: adversario
  alternatives_spanish:
  - oponente
  - acusador
  lexicon: BDAG
  rationale: El término puede tener matiz jurídico, pero aquí designa de modo amplio a quien se opone hostilmente a los creyentes. 'Adversario' conserva esa hostilidad y deja abierto el matiz legal sin sobreespecificarlo.
- source_word: διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el calumniador
  lexicon: BDAG
  rationale: Aquí el referente es el ser personal maligno, no un simple calumniador genérico. 'El diablo' es la designación idiomática y bíblica más clara en español y refleja el uso neotestamentario.
- source_word: ὡς λέων ὠρυόμενος
  english_pob_choice: like a roaring lion
  chosen_spanish: como león rugiente
  alternatives_spanish:
  - como un león que ruge
  - como león que ruge
  lexicon: BDAG
  rationale: La comparación es vívida y directa. 'León rugiente' conserva la imagen predatoria y suena natural en español, manteniendo el impacto del participio de ruido amenazante.
- source_word: περιπατεῖ
  english_pob_choice: walks around
  chosen_spanish: anda
  alternatives_spanish:
  - anda dando vueltas
  - camina alrededor
  - merodea
  lexicon: BDAG
  rationale: El verbo básico significa 'andar' o 'caminar'. 'Anda' preserva con transparencia el valor léxico, mientras que 'anda dando vueltas' o 'merodea' serían más interpretativos; la imagen del león ya aporta la sensación de amenaza.
- source_word: ζητῶν
  english_pob_choice: seeking
  chosen_spanish: buscando
  alternatives_spanish:
  - tratando de hallar
  - en busca de
  lexicon: BDAG
  rationale: El participio expresa acción concomitante y finalidad. 'Buscando' es breve, natural y mantiene el sentido activo de caza/pesquisa.
- source_word: τινα
  english_pob_choice: someone
  chosen_spanish: a quién
  alternatives_spanish:
  - a alguien
  - a cualquiera
  lexicon: BDAG
  rationale: El pronombre indefinido es singular y abierto. En español, 'a quién' conserva la indeterminación y funciona bien dentro de la estructura de infinitivo dependiente de 'buscando'.
- source_word: καταπιεῖν
  english_pob_choice: to devour
  chosen_spanish: devorar
  alternatives_spanish:
  - tragarse
  - engullir
  - consumir
  lexicon: BDAG
  rationale: En la metáfora del león, 'devorar' reproduce con naturalidad la fuerza depredadora de καταπίνω ('tragar, engullir'). Es la opción española más idiomática y mantiene la violencia de la imagen.
theological_decisions:
- issue: 'Cómo rendir διάβολος: nombre personal o sustantivo común'
  english_pob_reading: the devil
  chosen_spanish_reading: el diablo
  alternative_spanish_readings:
  - el calumniador
  rationale: El contexto presenta a un enemigo personal y no solo a un agente de calumnia. 'El diablo' comunica esa identificación de manera estándar en la lectura cristiana y no añade doctrina ajena al texto.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Cuánta amenaza expresar en περιπατεῖ dentro de la imagen del león
  english_pob_reading: walks around
  chosen_spanish_reading: anda
  alternative_spanish_readings:
  - merodea
  - anda rondando
  rationale: La equivalencia óptima favorece una traducción transparente del verbo ordinario. La amenaza queda reforzada por la imagen del león rugiente y por el contexto de vigilancia espiritual; 'merodea' sería más interpretativo.
  doctrine_reference: Translation philosophy §1; §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente movió 'Be clear-minded' a 'Be sober-minded' para acercarse más a νήψατε. Para el español, se preservó un equivalente sobrio y bíblico ('Sean sobrios') sin perder la explicación contextual de que el verbo es figurado y no exige una referencia literal a la bebida. El resto del versículo sigue el mismo perfil de equivalencia óptima del audit trail.
  spanish_consistency_notes:
  - Se mantuvo 'el diablo' para διάβολος por coherencia con el uso neotestamentario y con el audit trail inglés.
  - Se usó 'adversario' para ἀντίδικος, no 'acusador', para no estrechar indebidamente el sentido.
  - Se evitó 'Cristo' y terminología eclesiástica innecesaria; no aparece lenguaje de tradición que oscurezca el griego.
  - '''Sean sobrios'' conserva la tensión entre sobriedad literal y figurada; la nota la aclara sin borrar el posible eco tradicional.'
  - '''Anda'' reproduce el verbo básico περιπατεῖ con transparencia; la nota ofrece la alternativa interpretativa ''merodea''.'
