translation:
  language: es
  text: 'Por tanto, exhorto a los ancianos entre ustedes, como coanciano con ustedes y testigo de los sufrimientos del Mesías[a], y también participante[b] de la gloria que ha de ser revelada:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''de Cristo''. Χριστός puede traducirse como ''Mesías'' o, de manera más tradicional, ''Cristo''.'
    reason: alternative_reading
  - marker: b
    text: 'O: ''partícipe''. También puede entenderse: ''de la gloria que va a ser revelada''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρεσβυτέρους
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los presbíteros
  - los líderes de la iglesia
  lexicon: BDAG
  rationale: En este contexto eclesial, πρεσβύτερος designa una función/ministerio y no solo edad biológica. 'Ancianos' es el equivalente natural en español y preserva el sentido de oficio sin imponer una terminología denominacional posterior.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca la transición inferencial desde lo anterior. 'Por tanto' conserva con claridad la conexión lógica y el tono exhortativo.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - entre ustedes mismos
  lexicon: BDAG
  rationale: La frase tiene un sentido relacional y comunitario; 'entre ustedes' suena natural en español y comunica bien la proximidad del hablante al grupo.
- source_word: παρακαλῶ
  english_pob_choice: I exhort
  chosen_spanish: exhorto
  alternatives_spanish:
  - ruego
  - les exhorto
  lexicon: BDAG
  rationale: Aquí el verbo expresa una súplica pastoral seria y exhortativa, no una simple petición. 'Exhorto' conserva esa fuerza para el lector español.
- source_word: συμπρεσβύτερος
  english_pob_choice: a fellow elder
  chosen_spanish: anciano junto con ustedes
  alternatives_spanish:
  - compañero de ancianato
  - co-anciano
  lexicon: BDAG
  rationale: El compuesto afirma que el hablante comparte el mismo estatus de anciano. En español, 'anciano junto con ustedes' mantiene la idea de colegialidad; 'co-anciano' sería demasiado técnico o poco natural.
- source_word: μάρτυς
  english_pob_choice: a witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testigo ocular
  - mártir
  lexicon: BDAG
  rationale: El contexto inmediato es de testimonio sobre los sufrimientos de Jesús/Mesías, no del sentido técnico de 'mártir'. 'Testigo' es la equivalencia directa y clara.
- source_word: τῶν τοῦ Χριστοῦ παθημάτων
  english_pob_choice: of the sufferings of the Messiah
  chosen_spanish: de los sufrimientos del Mesías
  alternatives_spanish:
  - de los sufrimientos de Cristo
  - de los padecimientos del Mesías
  lexicon: BDAG
  rationale: Se mantiene el sentido titular de Χριστός como 'Mesías', conforme al criterio del proyecto, y 'sufrimientos' refleja bien παθήματα en español contemporáneo.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como mero nombre propio. 'Mesías' preserva su valor semántico y sigue la preferencia del proyecto.
- source_word: κοινωνός
  english_pob_choice: a sharer
  chosen_spanish: participante
  alternatives_spanish:
  - partícipe
  - compañero
  lexicon: BDAG
  rationale: κοινωνός denota alguien que comparte o participa en algo. 'Participante' es más natural en español en este contexto escatológico y evita ambigüedad comercial.
- source_word: τῆς μελλούσης ἀποκαλύπτεσθαι δόξης
  english_pob_choice: in the glory that is about to be revealed
  chosen_spanish: de la gloria que ha de ser revelada
  alternatives_spanish:
  - de la gloria que va a ser revelada
  - de la gloria que está por ser revelada
  lexicon: BDAG
  rationale: La construcción expresa una gloria futura con matiz de inminencia. 'Ha de ser revelada' es idiomático en español y conserva el sentido de futuro pasivo sin endurecer el timing escatológico.
theological_decisions:
- issue: Traducción de Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Siguiendo la política del proyecto, se traduce Χριστός como 'Mesías' cuando funciona como título. Esto evita ocultar el sentido histórico-bíblico del término y mantiene la distinción entre título y nombre de uso litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah'' where title; Translation philosophy §2'
- issue: Fuerza de μελλούσης ἀποκαλύπτεσθαι
  english_pob_reading: about to be revealed
  chosen_spanish_reading: ha de ser revelada
  alternative_spanish_readings:
  - va a ser revelada
  - está por ser revelada
  rationale: El griego expresa una revelación futura con expectativa viva. 'Ha de ser revelada' conserva el sentido de futuro sin resolver ni suavizar la tensión escatológica del texto.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3 (preserve tension rather than resolve it)'
translation_notes:
  revision_awareness: Se siguió el pasaje griego de SBLGNT y el auditorial inglés de la POB. La revisión más reciente no introdujo cambios; el borrador español mantiene la misma lectura de Χριστός como 'Mesías', la misma inferencia lógica de οὖν y la misma expectativa futura de la gloria revelada, ajustando solo la formulación natural del español.
  spanish_consistency_notes:
  - Se mantuvo la terminología del proyecto para Χριστός como 'Mesías' y no 'Cristo' en el cuerpo principal.
  - '''Ancianos'' se usa para πρεσβυτέρους en coherencia con el valor eclesial del término.'
  - '''Exhorto'' preserva el tono pastoral fuerte de παρακαλῶ.'
  - La puntuación con dos puntos al final sigue el flujo incompleto del versículo, que continúa en el siguiente contexto.
