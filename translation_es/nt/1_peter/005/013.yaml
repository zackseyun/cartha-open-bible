translation:
  language: es
  text: La que está en Babilonia[a], elegida juntamente con ustedes, les saluda, y también Marcos, mi hijo[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «La iglesia en Babilonia, elegida juntamente con ustedes». El griego tiene una expresión femenina singular con un sustantivo implícito.'
    reason: alternative_reading
  - marker: b
    text: «Babilonia» puede ser una referencia simbólica a Roma en el uso cristiano primitivo; el texto mismo dice «Babilonia».
    reason: cultural_note
  - marker: c
    text: «Mi hijo» probablemente expresa una relación espiritual más que biológica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάζεται
  english_pob_choice: greets
  chosen_spanish: les saluda
  alternatives_spanish:
  - los saluda
  - les envía saludos
  lexicon: BDAG
  rationale: ἀσπάζομαι expresa el saludo epistolar; en español, «les saluda» suena natural, breve y fiel al acto comunicativo sin añadir énfasis innecesario.
- source_word: ἡ ... συνεκλεκτὴ
  english_pob_choice: She who is ... chosen together with you
  chosen_spanish: la
  alternatives_spanish:
  - la que está ... elegida juntamente con ustedes
  - la iglesia que está ... elegida juntamente con ustedes
  lexicon: BDAG
  rationale: El griego presenta un femenino singular con artículo y adjetivo, sin sustantivo expreso. En español, conviene mantener ese referente implícito con «la», preservando la ambigüedad visible del texto fuente.
- source_word: ἐν Βαβυλῶνι
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - en Roma
  lexicon: BDAG
  rationale: El texto griego dice «Babilonia»; se conserva el topónimo en el cuerpo principal y no se resuelve la identificación simbólica dentro de la traducción.
- source_word: συνεκλεκτὴ
  english_pob_choice: chosen together with you
  chosen_spanish: elegida juntamente con ustedes
  alternatives_spanish:
  - co-elegida
  - elegida junto con ustedes
  lexicon: BDAG
  rationale: El adjetivo comunica elección compartida con otros. «Elegida juntamente con ustedes» reproduce bien la fuerza relacional y comunitaria en español sin sonar artificial.
- source_word: Μᾶρκος
  english_pob_choice: Mark
  chosen_spanish: Marcos
  lexicon: BDAG
  rationale: Transliteración estándar al español del nombre propio Μᾶρκος.
- source_word: ὁ υἱός μου
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo espiritual
  - mi querido hijo
  lexicon: BDAG
  rationale: υἱός significa «hijo». Aunque la relación probablemente sea espiritual, el griego no la explicita; por eso se conserva la expresión literal y se deja el matiz interpretativo para nota.
theological_decisions:
- issue: Identidad de la «la ... συνεκλεκτὴ» femenina singular
  english_pob_reading: 'An unnamed feminine referent is left implicit in the main text: ''She who is ... chosen together with you.'''
  chosen_spanish_reading: 'Se deja implícito un referente femenino singular en el cuerpo principal: «la ... elegida juntamente con ustedes».'
  alternative_spanish_readings:
  - la iglesia en Babilonia
  - la esposa de Pedro u otra mujer cristiana
  rationale: La gramática griega no nombra explícitamente el referente. La versión española conserva esa tensión en lugar de suplir «iglesia» dentro del texto principal.
  doctrine_reference: 'Principio de la POB: preservar la tensión textual y no resolver interpretaciones debatidas sin base explícita.'
- issue: Sentido de Babilonia
  english_pob_reading: Retain 'Babylon' in the main text.
  chosen_spanish_reading: Se retiene «Babilonia» en el cuerpo principal.
  alternative_spanish_readings:
  - referencia simbólica a Roma
  - Babilonia mesopotámica literal
  rationale: El griego nombra Babilonia directamente. La identificación simbólica con Roma, si se adopta, corresponde a nota explicativa y no a la línea principal.
  doctrine_reference: Primacía del texto fuente y mantenimiento de ambigüedad legítima.
- issue: Alcance de «mi hijo» respecto de Marcos
  english_pob_reading: Keep the literal familial language in the main text.
  chosen_spanish_reading: Se conserva «mi hijo» en el cuerpo principal.
  alternative_spanish_readings:
  - mi hijo espiritual
  - mi hijo amado
  rationale: Aunque probablemente expresa relación espiritual, el griego no lo marca de forma explícita. La traducción no debe añadir una glosa interpretativa al texto principal.
  doctrine_reference: No paraphrase beyond what the source text warrants.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura auditada del POB en inglés: mantiene el femenino singular implícito, conserva «Babilonia» sin resolver la identificación simbólica en el texto principal y deja «mi hijo» literal, con notas para los matices interpretativos. No se reportan revisiones aplicadas en el expediente fuente.'
  spanish_consistency_notes:
  - Se usa «Babilonia» y no «Roma» en el texto principal, conforme al principio de no interpretar dentro de la traducción.
  - Se mantiene el tratamiento de segunda persona plural «ustedes» para coherencia de registro latinoamericano.
  - La nota sobre Marcos conserva el matiz espiritual sin sustituir la forma literal del texto.
  - Se evitó «Señor» o terminología no pertinente; aquí no aparece vocabulario divino directo.
