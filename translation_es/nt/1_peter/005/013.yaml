revisions:
- from: Les saluda la[a] que está en Babilonia, elegida juntamente con ustedes, y también Marcos, mi hijo[c][b].
  to: La que está en Babilonia[a], elegida juntamente con ustedes, les saluda, y también Marcos, mi hijo[c][b].
  rationale: 'La revisión hace un ajuste mínimo pero importante de legibilidad: convierte la secuencia forzada «la ... que» en la expresión española natural «La que ...», conservando al mismo tiempo la ambigüedad deliberada del griego y todas las decisiones léxicas y teológicas documentadas por la POB. También reubica el marcador [a] para no romper la expresión relativa en español.'
