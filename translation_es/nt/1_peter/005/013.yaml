review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego y sigue de cerca la auditoría inglesa: mantiene «Babilonia», conserva «mi hijo» literalmente y preserva en nota la lectura alternativa «la iglesia». Sin embargo, la solución principal «la[a] que está en Babilonia» no es la mejor realización española del femenino elíptico; «la que» sin antecedente expreso suena incompleto o forzado. El griego ἡ ... συνεκλεκτὴ exige una forma legible que aún deje implícito el sustantivo.'
  spanish_quality_summary: La frase es mayormente clara, pero «Les saluda la[a] que está en Babilonia» resulta poco natural en español neutral y puede sentirse gramaticalmente trabada. Una reparación mínima a «La que está en Babilonia[a], elegida juntamente con ustedes, les saluda» preserva mejor la ambigüedad y mejora la fluidez. El resto del versículo es natural y digno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Babilonia», «Marcos» y «mi hijo» están bien. «Elegida juntamente con ustedes» es aceptable y fiel al valor de συνεκλεκτὴ. No intervienen términos sensibles como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: La formulación «la[a] que está en Babilonia» es poco natural en español
    rationale: Aunque intenta preservar el femenino singular implícito, en español «la que» funciona mejor como unidad completa. Separar «la» con nota y luego continuar «que está...» produce una lectura trabada y menos idiomática que la opción revisada.
  - severity: low
    issue: La colocación de la nota [a] interrumpe una expresión española fija
    rationale: La nota anclada solo en «la» dificulta leer «la que» como una sola expresión relativa. Anclarla después de «Babilonia» o sobre toda la frase mejora la legibilidad sin perder el vínculo con la nota alternativa sobre «la iglesia en Babilonia».
  revised_spanish_text: La que está en Babilonia[a], elegida juntamente con ustedes, les saluda, y también Marcos, mi hijo[c][b].
  revised_footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «La iglesia en Babilonia, elegida juntamente con ustedes». El griego tiene una expresión femenina singular con un sustantivo implícito.'
    reason: alternative_reading
  - marker: b
    text: «Babilonia» puede ser una referencia simbólica a Roma en el uso cristiano primitivo; el texto mismo dice «Babilonia».
    reason: cultural_note
  - marker: c
    text: «Mi hijo» probablemente expresa una relación espiritual más que biológica.
    reason: lexical_alternative
  revision_rationale: 'La revisión hace un ajuste mínimo pero importante de legibilidad: convierte la secuencia forzada «la ... que» en la expresión española natural «La que ...», conservando al mismo tiempo la ambigüedad deliberada del griego y todas las decisiones léxicas y teológicas documentadas por la POB. También reubica el marcador [a] para no romper la expresión relativa en español.'
