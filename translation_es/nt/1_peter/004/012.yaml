translation:
  language: es
  text: Amados[a], no se sorprendan de la prueba ardiente[b] que está ocurriendo entre ustedes para probarlos, como si les estuviera pasando algo extraño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Amados» conserva el tono afectuoso del vocativo griego Ἀγαπητοί y su conexión léxica con el amor.
    reason: lexical_alternative
  - marker: b
    text: «Prueba ardiente» mantiene la imagen de fuego de πυρώσει. También podría traducirse «ardiente prueba» o «prueba de fuego»; el sentido es el de una prueba que los pone a prueba, no una tentación al pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπητοί
  english_pob_choice: Beloved
  chosen_spanish: Amados
  alternatives_spanish:
  - Queridos
  - Amados/as
  - Amados y amadas
  lexicon: BDAG
  rationale: Vocativo plural de afecto pastoral. «Amados» conserva la cercanía y el vínculo con ἀγάπη sin volverlo demasiado informal. Se evita «Queridos» porque debilita la resonancia lexical y espiritual del término.
- source_word: ξενίζεσθε
  english_pob_choice: do not be surprised
  chosen_spanish: no se sorprendan
  alternatives_spanish:
  - no les parezca extraño
  - no se asombren
  - no piensen que es algo extraño
  lexicon: BDAG
  rationale: El verbo puede expresar sorpresa o considerar algo extraño. En este contexto, el matiz es no reaccionar como si la prueba fuera inesperada o ajena. «No se sorprendan» es natural en español y mantiene esa fuerza.
- source_word: πυρώσει
  english_pob_choice: fiery trial
  chosen_spanish: prueba ardiente
  alternatives_spanish:
  - prueba de fuego
  - ardiente prueba
  - ardor de prueba
  lexicon: BDAG
  rationale: La imagen literal es de fuego/quemadura, pero aquí funciona metafóricamente para sufrimiento intenso. «Prueba ardiente» conserva la imaginería sin sonar forzada. Se evita borrar el elemento de fuego.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en ustedes
  - en medio de ustedes
  - en su medio
  lexicon: BDAG
  rationale: La referencia es comunitaria y corporativa, no meramente interna. «Entre ustedes» refleja bien la idea de una prueba que está presente en la comunidad.
- source_word: πρὸς πειρασμὸν
  english_pob_choice: to test you
  chosen_spanish: para probarlos
  alternatives_spanish:
  - para testearlos
  - para su prueba
  - para tentarlos
  lexicon: BDAG
  rationale: En este contexto πειρασμός apunta a prueba/probación, no a tentación moral. «Probarlos» expresa la finalidad del sufrimiento y conserva la tensión lexical entre prueba y tentación sin imponer esta última.
- source_word: γινομένῃ
  english_pob_choice: that is happening
  chosen_spanish: que está ocurriendo
  alternatives_spanish:
  - que está sucediendo
  - que acontece
  - que se está dando
  lexicon: BDAG
  rationale: Participio presente que indica proceso en curso. «Está ocurriendo» es idiomático y mantiene el aspecto continuo.
- source_word: ὡς ξένου
  english_pob_choice: as though something strange
  chosen_spanish: como si fuera algo extraño
  alternatives_spanish:
  - como si fuera algo ajeno
  - como si fuera algo insólito
  - como si fuera algo foráneo
  lexicon: BDAG
  rationale: ξένος puede ser extraño, ajeno o extraño/foráneo. «Algo extraño» conserva la conexión verbal con ξενίζεσθε y evita una paráfrasis excesiva.
- source_word: συμβαίνοντος
  english_pob_choice: were happening
  chosen_spanish: les estuviera sucediendo
  alternatives_spanish:
  - les estuviera ocurriendo
  - les aconteciera
  - les pasara
  lexicon: BDAG
  rationale: El participio indica un evento que acontece a alguien. «Les estuviera sucediendo» es natural en español y encaja con la cláusula comparativa introducida por ὡς.
theological_decisions:
- issue: Sentido de πειρασμός en el contexto
  english_pob_reading: testing/trial rather than temptation to sin
  chosen_spanish_reading: prueba/probación más que tentación al pecado
  alternative_spanish_readings:
  - tentación
  - prueba
  - aflicción
  rationale: El contexto inmediato es sufrimiento y hostilidad, no incitación al mal. Por eso se traduce con lenguaje de prueba, manteniendo la posibilidad semántica de la palabra sin falsear el sentido contextual.
  doctrine_reference: 'Translation philosophy: conservar la tensión léxica cuando el contexto no obliga a una sola opción; aquí el contexto sí favorece claramente la idea de prueba.'
translation_notes:
  revision_awareness: Se siguió el audit trail inglés y el griego SBLGNT, preservando el juego entre ξενίζεσθε / ξένου y la ambigüedad contextual de πειρασμός, pero resolviéndola a favor de «prueba» por el contexto de sufrimiento. No hubo revisiones aplicadas en el pass más reciente.
  spanish_consistency_notes:
  - Se usa «Amados» como vocativo pastoral estándar, coherente con el tratamiento de Ἀγαπητοί.
  - Se evita «Cristo»/«SEÑOR» porque no aparecen en este versículo.
  - «Prueba» traduce πειρασμός en sentido de probación, no de tentación moral.
  - Se mantiene la imaginería del fuego sin volverla excesivamente interpretativa.
  - «Entre ustedes» expresa la localización comunitaria de ἐν ὑμῖν.
