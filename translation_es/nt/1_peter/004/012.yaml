  spanish_quality_summary: 'El español es claro, natural y eclesialmente legible. La frase «prueba ardiente» funciona, pero «ardiente» pospuesto suena algo menos idiomático que «ardiente prueba» o «prueba de fuego»; aun así es aceptable. El ajuste más útil es hacer la cláusula final más paralela y fluida: «como si les estuviera pasando algo extraño». También conviene simplificar la nota de πυρώσει para incluir la alternativa ya documentada en inglés: «arduo/ardiente ordeal» en español como «ardiente prueba» o «prueba de fuego».'
