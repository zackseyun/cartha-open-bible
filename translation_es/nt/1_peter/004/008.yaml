revisions:
- from: Por encima de todo[a], mantengan un amor ferviente[b] unos por otros[c], porque el amor cubre una multitud de pecados.
  to: Ante todo[a], mantengan un amor ferviente[b] unos por otros[c], porque el amor cubre[d] una multitud de pecados.
  rationale: Se propone una revisión menor para mejorar la naturalidad de πρὸ πάντων con «Ante todo» y, sobre todo, para restaurar la nota importante sobre el eco de Proverbios 10:12 y el valor interpretativo de «cubre», presente en el POB inglés. También se suaviza la nota del participio para que suene más natural en español.
