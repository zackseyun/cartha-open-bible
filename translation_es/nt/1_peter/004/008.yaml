    rationale: El English POB incluyó explícitamente una nota de referencia cruzada/interpretativa para καλύπτει. Dado que la decisión teológica fue mantener la tensión interpretativa, omitir esa nota en español pierde parte del rastro de auditoría y de la justificación exegética.
  - severity: low
    issue: «Por encima de todo» es menos idiomático que alternativas más naturales.
    rationale: Aunque fiel, «Ante todo» o «Sobre todo» suele sonar más natural y conciso para πρὸ πάντων en español bíblico actual. No es un error, pero admite una mejora de estilo.
  - severity: low
    issue: La nota c suena algo forzada en español.
    rationale: «Manteniendo amor ferviente unos por otros» reproduce demasiado de cerca el inglés auditado y resulta menos natural. Puede conservar la idea participial con una formulación española más fluida.
  revised_spanish_text: Ante todo[a], mantengan un amor ferviente[b] unos por otros[c], porque el amor cubre[d] una multitud de pecados.
