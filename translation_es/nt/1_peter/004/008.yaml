translation:
  language: es
  text: Ante todo[a], mantengan un amor ferviente[b] unos por otros[c], porque el amor cubre[d] una multitud de pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por encima de todo».
    reason: alternative_reading
  - marker: b
    text: O «ardiente» o «intenso» amor.
    reason: lexical_alternative
  - marker: c
    text: O «teniendo amor ferviente unos por otros».
    reason: previous_rendering
  - marker: d
    text: La expresión evoca Proverbios 10:12; «cubre» también puede entenderse como «pasa por alto» u «oculta» en el sentido de no avivar ofensas.
    reason: cross_reference
lexical_decisions:
- source_word: πρὸ πάντων
  english_pob_choice: Above all
  chosen_spanish: Por encima de todo
  alternatives_spanish:
  - Ante todo
  - Sobre todo
  lexicon: BDAG
  rationale: Expresa prioridad suprema de manera natural en español y conserva el valor exhortativo del giro idiomático, sin reducirlo a una mera secuencia temporal.
- source_word: εἰς ἑαυτοὺς
  english_pob_choice: for one another
  chosen_spanish: unos por otros
  alternatives_spanish:
  - entre ustedes
  - mutuamente
  lexicon: BDAG
  rationale: El reflexivo en contexto comunitario apunta a reciprocidad; «unos por otros» comunica bien la acción mutua y evita una literalidad extraña en español.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: Se mantiene el equivalente básico y natural de ἀγάπη en este contexto exhortativo. «Caridad» introduciría un matiz menos directo y menos general en español actual.
- source_word: ἐκτενῆ
  english_pob_choice: fervent
  chosen_spanish: ferviente
  alternatives_spanish:
  - ardiente
  - constante
  - intenso
  lexicon: BDAG
  rationale: Conserva la idea de intensidad y esfuerzo sostenido. «Ferviente» es digno, claro y cercano al matiz de estar estirado/extendido con empeño.
- source_word: ἔχοντες
  english_pob_choice: maintain
  chosen_spanish: mantengan
  alternatives_spanish:
  - teniendo
  - conserven
  lexicon: BDAG
  rationale: El participio funciona con fuerza exhortativa en el contexto; en español, un imperativo implícito es más natural y refleja mejor el valor de continuación de la exhortación.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la exhortación con una causalidad clara y moderna.
- source_word: καλύπτει
  english_pob_choice: covers
  chosen_spanish: cubre
  alternatives_spanish:
  - encubre
  - oculta
  - pasa por alto
  lexicon: BDAG
  rationale: «Cubre» mantiene la metáfora verbal de la tradición griega y no decide de antemano si el sentido es ocultar, pasar por alto o extender perdón.
- source_word: πλῆθος
  english_pob_choice: a multitude
  chosen_spanish: una multitud
  alternatives_spanish:
  - muchos
  - una gran cantidad
  lexicon: BDAG
  rationale: Preserva el sustantivo colectivo y su peso retórico, en vez de reducirlo a un adjetivo cuantitativo más débil.
- source_word: ἁμαρτιῶν
  english_pob_choice: of sins
  chosen_spanish: de pecados
  alternatives_spanish:
  - de faltas
  - de ofensas
  lexicon: BDAG
  rationale: «Pecados» corresponde de manera directa al genitivo plural y conserva el alcance moral y teológico del término.
theological_decisions:
- issue: Sentido de «el amor cubre una multitud de pecados»
  english_pob_reading: Retain the metaphor 'covers' without specifying whether the sins are those committed by others against believers or sins within the community more broadly.
  chosen_spanish_reading: Conservar la metáfora «cubre» sin precisar si se trata de pecados contra otros, faltas comunitarias o una idea general de perdón.
  alternative_spanish_readings:
  - el amor perdona muchos pecados
  - el amor pasa por alto muchas ofensas
  - el amor oculta muchas faltas
  rationale: El griego, como el inglés POB, permite varias lecturas relacionadas. Mantener «cubre» preserva la tensión teológica y el eco proverbial sin imponer una interpretación doctrinal única.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el ajuste final del inglés POB que hizo más natural la estructura exhortativa con un verbo finito («maintain»). En español, se resolvió de forma equivalente con «mantengan», conservando el valor imperatival del participio y el tono de prioridad de «Above all».
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay aquí representación del nombre divino.
  - Se usa «amor» como equivalente estándar de ἀγάπη, en línea con el proyecto.
  - Se conserva «cubre» para no resolver el matiz proverbial de καλύπτει.
  - La puntuación reproduce una cláusula principal exhortativa seguida de la causal introducida por «porque».
