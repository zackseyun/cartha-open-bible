revisions:
- from: Por tanto[a], puesto que el Mesías sufrió en la carne[b], también ustedes ármense con la misma intención, porque el que ha sufrido en la carne ha cesado del pecado[c].
  to: Por tanto[a], puesto que el Mesías sufrió en la carne[b], también ustedes ármense con la misma manera de pensar, porque el que ha sufrido en la carne ha cesado de pecar[c][d].
  rationale: Se ajusta ἔννοιαν a «la misma manera de pensar» para reflejar mejor la disposición mental exhortada. Se cambia «ha cesado del pecado» por «ha cesado de pecar» para lograr un español natural y claro, añadiendo una nota que preserva el literal griego y su posible fuerza teológica. El resto del versículo se mantiene porque ya representa bien el origen y la línea léxica del POB.
