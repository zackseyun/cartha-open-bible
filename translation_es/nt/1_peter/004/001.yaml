translation:
  language: es
  text: Por tanto[a], puesto que el Mesías sufrió en la carne[b], también ustedes ármense con la misma manera de pensar, porque el que ha sufrido en la carne ha cesado de pecar[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Así que». El griego οὖν marca una inferencia; se eligió «Por tanto» por ser la opción más natural en este contexto.
    reason: lexical_alternative
  - marker: b
    text: «En la carne» traduce literalmente σάρξ aquí y se refiere a la existencia corporal humana; no necesariamente a la «naturaleza pecaminosa».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «ha cesado del pecado». En español se expresó como «ha cesado de pecar» para mantener el sentido con mayor naturalidad, sin negar el posible matiz de ruptura con el pecado como esfera o poder.
    reason: lexical_alternative
  - marker: d
    text: La cláusula «el que ha sufrido en la carne ha cesado de pecar» es debatida. Puede referirse específicamente al Mesías, a los creyentes que comparten su patrón, o a un principio general de ruptura decisiva con el pecado.
    reason: alternative_reading
lexical_decisions:
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: El contexto exige el sentido titular de Χριστός. Se conserva «Mesías», siguiendo el valor de título preferido por el POB en inglés, en vez de la forma litúrgica «Cristo».
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca inferencia lógica desde el contexto previo. «Por tanto» mantiene el vínculo argumentativo con un registro natural y sobrio en español.
- source_word: παθόντος
  english_pob_choice: suffered
  chosen_spanish: sufrió
  alternatives_spanish:
  - habiendo sufrido
  lexicon: BDAG
  rationale: El participio aoristo se vierte con una subordinada causal-temporal fluida en español. «Sufrió» preserva la acción simple sin recargar la frase.
- source_word: σαρκὶ
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en el cuerpo
  - en su carne
  lexicon: BDAG
  rationale: Se mantiene la expresión literal porque el POB la conserva para σάρξ en este contexto. En español «carne» retiene la referencia a la existencia corporal sin introducir «naturaleza pecaminosa».
- source_word: ἔννοιαν
  english_pob_choice: mindset
  chosen_spanish: intención
  alternatives_spanish:
  - pensamiento
  - modo de pensar
  - resolución
  lexicon: BDAG
  rationale: «ἔννοια» aquí apunta a la disposición mental o propósito. «Intención» comunica bien la noción de orientación interior en español sin sonar demasiado técnica.
- source_word: ὁπλίσασθε
  english_pob_choice: arm yourselves
  chosen_spanish: ármense
  alternatives_spanish:
  - equípense
  - prepárense
  lexicon: BDAG
  rationale: Se conserva la metáfora militar y la fuerza imperativa. «Ármense» reproduce mejor el impacto figurado que una traducción más neutral.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la exhortación. «Porque» expresa con claridad la relación causal en el flujo del versículo.
- source_word: ὁ παθὼν
  english_pob_choice: the one who has suffered
  chosen_spanish: el que ha sufrido
  alternatives_spanish:
  - quien ha sufrido
  - el que sufrió
  lexicon: BDAG
  rationale: El participio sustantivado se vierte de manera general y natural. «El que ha sufrido» conserva el valor genérico sin especificar indebidamente el referente.
- source_word: πέπαυται
  english_pob_choice: has ceased
  chosen_spanish: ha cesado
  alternatives_spanish:
  - ha terminado
  - ha dejado
  lexicon: BDAG
  rationale: El perfecto de παύω expresa un estado resultante. «Ha cesado» reproduce con dignidad ese valor de cese efectivo.
- source_word: ἁμαρτίας
  english_pob_choice: from sin
  chosen_spanish: del pecado
  alternatives_spanish:
  - del pecar
  - de pecado
  lexicon: BDAG
  rationale: 'Tras παύω, el genitivo comunica separación: «cesado del pecado». Se usa singular para reflejar el griego y mantener el sentido de pecado como esfera o poder.'
theological_decisions:
- issue: Referente y alcance de «el que ha sufrido en la carne ha cesado del pecado»
  english_pob_reading: The statement is kept broad and text-level, without deciding whether it refers exclusively to the Messiah, to believers sharing his pattern, or to a general principle of decisive break with sin.
  chosen_spanish_reading: Se mantiene la formulación textual abierta, sin identificar de manera exclusiva al referente ni aclarar el mecanismo teológico del cese.
  alternative_spanish_readings:
  - Se refiere específicamente al Mesías y a su relación concluida con el pecado.
  - Se refiere a los creyentes que, al participar de su sufrimiento, rompen con el dominio del pecado.
  - 'Expresa un principio general: el sufrimiento marca una ruptura decisiva con el pecado.'
  rationale: El griego es comprimido y debatido; añadir una precisión interpretativa en el texto español iría más allá de lo atestiguado. Se conserva la tensión exegética con una redacción que sigue siendo publicable y fiel.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el estado indicado es unchanged, con alta concordancia y solo observaciones menores. Por eso se mantiene una solución española conservadora, alineada con el audit trail inglés.'
  spanish_consistency_notes:
  - Se conserva «Mesías» como traducción titular de Χριστός, en coherencia con el POB en inglés y con el estándar del proyecto.
  - Se mantiene «carne» para σάρξ en sentido literal, evitando «naturaleza pecaminosa» porque el contexto y el audit trail inglés no lo exigen.
  - Se preserva la fuerza metafórica de «armarse» para ὁπλίσασθε.
  - La frase final conserva la ambigüedad interpretativa documentada en el POB inglés, sin resolverla en el cuerpo del texto.
