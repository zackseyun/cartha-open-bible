  text: Χριστοῦ οὖν ⸀παθόντος σαρκὶ καὶ ὑμεῖς τὴν αὐτὴν ἔννοιαν ὁπλίσασθε, ὅτι ὁ ⸀παθὼν σαρκὶ πέπαυται ⸀ἁμαρτίας,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/001.yaml
  text: Therefore[a], since the Messiah suffered in the flesh, you also arm yourselves with the same mindset, because the one who has suffered in the flesh has ceased from sin[c][b],
  footnotes:
  - marker: a
    text: Or 'Christ' for 'the Messiah' (Greek Christos). The title sense is retained here.
    reason: lexical_alternative
  - marker: b
    text: '''In the flesh'' renders Greek sarx literally here, referring to bodily human existence, not necessarily to ''sinful nature.'''
    reason: lexical_alternative
  - marker: c
    text: The clause 'the one who has suffered in the flesh has ceased from sin' is debated. It may refer specifically to the Messiah, to believers sharing his pattern, or to a general principle of a decisive break with sin.
    reason: alternative_reading
