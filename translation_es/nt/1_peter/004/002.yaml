translation:
  language: es
  text: para que ya no viva el resto de su tiempo en la carne[a], conforme a deseos humanos, sino conforme a la voluntad de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el tiempo restante en el cuerpo». La frase griega «en la carne» aquí se refiere a la vida terrenal encarnada, no necesariamente a la «naturaleza pecaminosa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τὸ
  english_pob_choice: so as to
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de
  lexicon: BDAG
  rationale: La construcción con infinitivo articular expresa finalidad; en español, «para que» transmite bien el propósito sin forzar una estructura demasiado literal.
- source_word: μηκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - nunca más
  lexicon: BDAG
  rationale: «Ya no» expresa con naturalidad la cesación de una conducta previa y conserva el valor aspectual de cambio de patrón.
- source_word: ἀνθρώπων ἐπιθυμίαις
  english_pob_choice: human desires
  chosen_spanish: las pasiones humanas
  alternatives_spanish:
  - los deseos humanos
  - las concupiscencias humanas
  lexicon: BDAG
  rationale: El sustantivo ἐπιθυμίαις puede abarcar deseos intensos; «pasiones» comunica mejor la fuerza moral del contraste con la voluntad de Dios. «Humanas» mantiene el genitivo genérico sin restringirlo a varones. Se evita «concupiscencias» por ser más técnico y menos natural en español actual.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: En español, después de una negación, «sino» reproduce mejor el contraste fuerte entre dos orientaciones de vida.
- source_word: θελήματι θεοῦ
  english_pob_choice: for the will of God
  chosen_spanish: conforme a la voluntad de Dios
  alternatives_spanish:
  - para la voluntad de Dios
  - según la voluntad de Dios
  lexicon: BDAG
  rationale: El dativo con contraste funciona como norma u orientación de vida. «Conforme a» comunica la idea de vivir regulados por la voluntad divina y suena más natural que un literal «para» en español.
- source_word: τὸν ἐπίλοιπον ... χρόνον
  english_pob_choice: the rest of his time
  chosen_spanish: el tiempo que les resta
  alternatives_spanish:
  - el resto de su tiempo
  - el tiempo restante
  lexicon: BDAG
  rationale: La frase griega significa el tiempo restante de vida. Opté por una formulación idiomática en plural impersonal «les resta» por el giro exhortativo de la oración en español; mantiene el sentido de duración restante sin añadir precisión inexistente en el griego.
- source_word: ἐν σαρκὶ
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en el cuerpo
  - en la vida corporal
  lexicon: BDAG
  rationale: Se conserva «carne» para respetar el término paulino/petrino y la tensión lexical documentada. En este contexto se refiere a la existencia terrenal encarnada, no a una «naturaleza pecaminosa».
- source_word: βιῶσαι
  english_pob_choice: to live
  chosen_spanish: vivan
  alternatives_spanish:
  - pasen
  - lleven
  lexicon: BDAG
  rationale: El infinitivo de propósito se vierte con un verbo personal en subjuntivo para una frase española natural. «Vivan» expresa de modo claro el vivir/conducir la vida.
theological_decisions:
- issue: Sentido de σάρξ en ἐν σαρκὶ
  english_pob_reading: embodied earthly life ('in the flesh')
  chosen_spanish_reading: existencia terrenal encarnada ('en la carne')
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - en el cuerpo
  rationale: El contexto inmediato habla del tiempo restante de vida y del abandono de deseos humanos; la expresión, sin embargo, no nombra aquí una cualidad moral interna, sino la vida mortal y encarnada. Por eso se conserva «en la carne» con una nota que aclare que no equivale necesariamente a «naturaleza pecaminosa».
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
translation_notes:
  revision_awareness: El texto inglés POB y la evaluación posterior muestran alta concordancia y sin cambios sustantivos; la principal decisión española es cómo naturalizar la finalidad de εἰς τὸ y cómo preservar la tensión semántica de σάρξ sin confundirla con «naturaleza pecaminosa».
  spanish_consistency_notes:
  - Se mantuvo «carne» para σάρξ, conforme al criterio terminológico del proyecto.
  - «Conforme a la voluntad de Dios» evita la tentación de usar una fórmula eclesiástica más rígida que no refleja mejor el dativo griego.
  - No se añadió ninguna connotación de «pecado» a ἐν σαρκὶ, en línea con la nota auditada en inglés.
