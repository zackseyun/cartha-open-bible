    rationale: El texto griego no marca plural aquí, y el inglés POB justificó 'his' por la fuerza individual arrastrada del contexto previo. 'Vivan... les resta' diluye esa referencia y altera la perspectiva del original auditado.
  - severity: medium
    issue: '''Pasiones humanas'' sobreinterpreta ἐπιθυμίαις'
    rationale: El rastro léxico inglés eligió 'desires' precisamente por ser más amplio que 'lusts' o términos más cargados. 'Pasiones' en español añade intensidad moral no exigida por el término y estrecha innecesariamente el sentido.
  - severity: low
    issue: La nota al pie es fiel pero puede pulirse estilísticamente
    rationale: '''Vida terrenal encarnada'' suena algo técnica; ''vida terrenal en el cuerpo'' o mantener el texto heredado es más claro para lectura eclesial. No obstante, el contenido doctrinal de la nota es correcto.'
