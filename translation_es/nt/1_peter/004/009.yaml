lexical_decisions:
- source_word: φιλόξενοι
  english_pob_choice: Be hospitable
  chosen_spanish: Sean hospitalarios
  alternatives_spanish:
  - Sean acogedores
  - Practiquen la hospitalidad
  lexicon: BDAG
  rationale: El adjetivo griego funciona con fuerza exhortativa; en español, un imperativo copulativo con el adjetivo conserva ese valor y suena natural. 'Sean hospitalarios' mantiene la cualidad exigida por el texto sin convertirla en una paráfrasis excesiva.
- source_word: εἰς ἀλλήλους
  english_pob_choice: to one another
  chosen_spanish: unos con otros
  alternatives_spanish:
  - los unos a los otros
  - entre ustedes
  lexicon: BDAG
  rationale: La relación es recíproca dentro de la comunidad. 'Unos con otros' expresa bien la mutualidad en español y evita una calca demasiado rígida de 'a uno otro' o formulaciones menos fluidas.
- source_word: ἄνευ
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - sin ninguna
  - libres de
  lexicon: BDAG
  rationale: '''Sin'' es la correspondencia normal y directa en español para la ausencia de la cualidad indicada.'
- source_word: γογγυσμοῦ
  english_pob_choice: grumbling
  chosen_spanish: murmuración
  alternatives_spanish:
  - queja
  - murmullos
  - reclamo
  lexicon: BDAG
  rationale: '''Murmuración'' conserva el matiz de descontento expresado en voz baja o con reserva, y resulta más cercano al campo semántico bíblico que ''queja'', que es más general. En este contexto comunitario evita la pérdida de fuerza de ''grumbling''.'
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; la versión española sigue esa lectura estable, trasladando la exhortación imperativa del adjetivo griego y la restricción final sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se conserva un tono breve y exhortativo, acorde con la sintaxis del griego.
  - Se evita 'murmurando' porque el sustantivo griego apunta a la actitud o manifestación de descontento, no al modo verbal.
  - La nota ofrece alternativas españolas donde el inglés POB preservó una alternativa léxica ('complaining'/'murmuring').
