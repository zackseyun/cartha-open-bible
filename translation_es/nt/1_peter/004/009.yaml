revisions:
- from: Sean hospitalarios unos con otros, sin murmuración[a].
  to: Sean hospitalarios unos con otros, sin quejarse[a].
  rationale: Se mantiene la estructura exhortativa y recíproca del griego, pero se reemplaza «sin murmuración» por «sin quejarse» para lograr un español más natural y una representación más clara del matiz de γογγυσμοῦ. La nota preserva alternativas válidas, incluyendo la opción más tradicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:38:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del griego: una exhortación imperatival a la hospitalidad recíproca y la ausencia de γογγυσμός. Sin embargo, «sin murmuración» suena menos natural en español contemporáneo y además no refleja tan bien el matiz comunitario de queja/disgusto contenido en γογγυσμοῦ como «sin quejarse» o «sin quejas».'
  spanish_quality_summary: «Sean hospitalarios unos con otros» es fiel y legible. El problema principal es la cola preposicional «sin murmuración», que resulta algo rígida y poco idiomática en español eclesial actual. Una formulación verbal como «sin quejarse» mejora la naturalidad sin perder fuerza. La nota también conviene ajustarla para no ofrecer como alternativa exactamente el término menos natural que se corrige en el texto principal.
  glossary_alignment: No hay términos del glosario doctrinal principal implicados. La decisión sobre φιλόξενοι como «Sean hospitalarios» está bien. Para γογγυσμοῦ, el proyecto inglés privilegia «grumbling» con alternativa «complaining»; en español, «quejarse» transmite mejor ese valor que «murmuración», aunque esta puede quedar como alternativa más tradicional en nota.
  issues:
  - severity: medium
    issue: «sin murmuración» es poco idiomático en español actual
    rationale: Aunque comprensible, suena nominal y acartonado. El griego permite una expresión más natural en español como «sin quejarse», que comunica mejor la exhortación práctica.
  - severity: low
    issue: La nota alternativa repite una opción menos natural que el texto principal
    rationale: Si el texto principal se mejora a «sin quejarse», la nota debe conservar alternativas significativas, por ejemplo «sin quejas» o «sin murmuración», en ese orden.
  revised_spanish_text: Sean hospitalarios unos con otros, sin quejarse[a].
  revised_footnotes:
  - marker: a
    text: 'O: «sin quejas» o «sin murmuración».'
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura exhortativa y recíproca del griego, pero se reemplaza «sin murmuración» por «sin quejarse» para lograr un español más natural y una representación más clara del matiz de γογγυσμοῦ. La nota preserva alternativas válidas, incluyendo la opción más tradicional.
