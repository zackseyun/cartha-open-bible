  text: εἰς τοῦτο γὰρ καὶ νεκροῖς εὐηγγελίσθη ἵνα κριθῶσι μὲν κατὰ ἀνθρώπους σαρκὶ ζῶσι δὲ κατὰ θεὸν πνεύματι.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/006.yaml
  text: 'For this is why the gospel was also proclaimed to the dead: so that[a], though judged according to men in the flesh[b], they might live according to God in the spirit.'
  footnotes:
  - marker: a
    text: Or 'according to people' / 'according to human standards.' The Greek says 'according to men,' using a representative human term in contrast with 'according to God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in spirit.' The phrase may denote the sphere of spiritual life, in contrast with 'in the flesh'; some understand it more specifically as life by the Spirit.
    reason: alternative_reading
