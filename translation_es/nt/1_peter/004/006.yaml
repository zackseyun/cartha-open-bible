translation:
  language: es
  text: 'Porque por esto también se anunció el evangelio a los muertos: para que, aunque fueran juzgados conforme a los hombres en la carne[a], vivan conforme a Dios en el espíritu[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según las personas» / «según criterios humanos». El griego dice «según los hombres», usando un término humano representativo en contraste con «según Dios».
    reason: lexical_alternative
  - marker: b
    text: O «en espíritu». La expresión puede indicar la esfera de la vida espiritual, en contraste con «en la carne»; algunos la entienden más específicamente como vida por el Espíritu.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰς τοῦτο
  english_pob_choice: For this is why
  chosen_spanish: Porque para esto
  alternatives_spanish:
  - Porque por esta razón
  - Porque para este fin
  lexicon: BDAG
  rationale: La expresión introduce una explicación causal del enunciado previo. «Porque para esto» conserva la fuerza explicativa de εἰς τοῦτο sin añadir más interpretación de la necesaria.
- source_word: νεκροῖς
  english_pob_choice: to the dead
  chosen_spanish: a los muertos
  alternatives_spanish:
  - a los muertos
  - a los que están muertos
  lexicon: BDAG
  rationale: El dativo sustantivado se vierte de modo natural como «a los muertos», manteniendo la referencia amplia sin precisar innecesariamente si se trata de muertos físicos o de otra clase de muerte.
- source_word: εὐηγγελίσθη
  english_pob_choice: was ... proclaimed
  chosen_spanish: se anunció el evangelio
  alternatives_spanish:
  - se predicó
  - fue proclamado el evangelio
  - se anunció la buena noticia
  lexicon: BDAG
  rationale: El pasivo de εὐαγγελίζω pide una formulación que conserve el contenido del evangelio. «Se anunció el evangelio» hace explícito el objeto cognado implícito y mantiene un registro sobrio.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Conjunción final estándar en español, adecuada para el propósito expresado en la cláusula.
- source_word: κριθῶσι
  english_pob_choice: though judged
  chosen_spanish: aunque fueran juzgados
  alternatives_spanish:
  - para que fueran juzgados
  - habiendo sido juzgados
  lexicon: BDAG
  rationale: La forma pasiva subjuntiva dentro del contraste μὲν...δὲ puede sonar naturalmente concesiva en español. «Aunque fueran juzgados» preserva la tensión sin resolverla en una sola lectura.
- source_word: κατὰ ἀνθρώπους
  english_pob_choice: according to men
  chosen_spanish: conforme a los hombres
  alternatives_spanish:
  - según los hombres
  - según criterios humanos
  - conforme a la gente
  lexicon: BDAG
  rationale: «Conforme a los hombres» mantiene el contraste literal con «conforme a Dios» y conserva la referencia representativa del término griego, sin neutralizar de entrada la tensión antropológica.
- source_word: σαρκὶ
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en la carne
  - en el cuerpo
  - con respecto a la carne
  lexicon: BDAG
  rationale: Se conserva «carne» por la carga léxica de σάρξ y por la oposición paralela con πνεύματι. «En la carne» es la forma más directa y auditivamente reconocible en español bíblico sin convertirla en «naturaleza humana».
- source_word: ζῶσι
  english_pob_choice: they might live
  chosen_spanish: vivan
  alternatives_spanish:
  - puedan vivir
  - vivieran
  lexicon: BDAG
  rationale: El subjuntivo presente en la finalidad se expresa de forma natural como «vivan», manteniendo el resultado buscado.
- source_word: κατὰ θεὸν
  english_pob_choice: according to God
  chosen_spanish: conforme a Dios
  alternatives_spanish:
  - según Dios
  - según el criterio de Dios
  - de acuerdo con Dios
  lexicon: BDAG
  rationale: Se preserva el paralelismo con κατὰ ἀνθρώπους y el contraste de estándar o perspectiva sin forzar una explicación doctrinal adicional.
- source_word: πνεύματι
  english_pob_choice: in the spirit
  chosen_spanish: en el espíritu
  alternatives_spanish:
  - en espíritu
  - por el Espíritu
  lexicon: BDAG
  rationale: El dativo de esfera se traduce con «en el espíritu». Se mantiene en minúscula porque el texto no identifica explícitamente al Espíritu Santo; así se conserva la ambigüedad histórica del pasaje.
theological_decisions:
- issue: Identidad de «los muertos»
  english_pob_reading: Rendered neutrally as 'the dead' without specifying whether they were spiritually dead when preached to or physically dead at the time of proclamation.
  chosen_spanish_reading: Se traduce neutralmente «a los muertos» sin especificar si eran muertos físicamente o muertos espiritualmente.
  alternative_spanish_readings:
  - a los que ahora están muertos
  - a los espiritualmente muertos
  - a los muertos en relación con la proclamación de Cristo
  rationale: El pasaje es interpretativamente disputado y el griego no obliga a una explicación única. La versión española conserva la formulación amplia para no cerrar el sentido que el texto deja abierto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Fuerza del paralelismo «juzgados... vivan»
  english_pob_reading: Maintained the antithetical parallel without defining whether 'judged' refers to human condemnation, physical death, or divine judgment experienced in the human sphere.
  chosen_spanish_reading: Se mantiene el contraste antitético sin definir si «juzgados» alude a condena humana, muerte física o juicio divino en el ámbito humano.
  alternative_spanish_readings:
  - juzgados por los hombres en vida corporal
  - condenados a muerte física como todos los humanos
  - juzgados en la carne por Dios pero viviendo espiritualmente
  rationale: La sintaxis griega admite varias lecturas próximas. La traducción conserva la relación entre las dos cláusulas sin imponer una interpretación dogmática no explícita en el texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El texto español sigue de cerca el sentido y las decisiones del audit trail inglés, especialmente la conservación de la ambigüedad sobre «los muertos», el paralelismo contrastivo entre «conforme a los hombres» y «conforme a Dios», y la distinción entre «en la carne» y «en el espíritu». No se detectaron revisiones posteriores que exigieran ajustes.
  spanish_consistency_notes:
  - Se mantuvo «carne» para σάρξ y «espíritu» para πνεύματι, respetando el contraste léxico del pasaje.
  - Se usó «a los muertos» como equivalente sustantivado natural del dativo plural.
  - Se preservó el paralelismo con «conforme a los hombres / conforme a Dios» para no diluir la antítesis.
  - El estilo es bíblico contemporáneo, formal y publicable, sin recurrir a formulaciones eclesiásticas que alteren el matiz del original.
