translation:
  language: es
  text: Pero el fin de todas las cosas se ha acercado[a]. Por tanto, sean sensatos[b] y sobrios[c] para las oraciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «está cerca». El verbo griego en perfecto puede traducirse más formalmente como «se ha acercado» o más idiomáticamente como «está cerca».
    reason: lexical_alternative
  - marker: b
    text: O «tengan dominio propio» o «sean de juicio sano». El mandato enfatiza sensatez y juicio disciplinado.
    reason: lexical_alternative
  - marker: c
    text: O «sean sobrios de mente». Aquí «sobrios» se usa en sentido figurado, con la idea de vigilancia y alerta espiritual, no solo de abstinencia de alcohol.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντων
  english_pob_choice: of all things
  chosen_spanish: de todas las cosas
  alternatives_spanish:
  - de todo
  - de todo lo demás
  lexicon: BDAG
  rationale: 'El genitivo plural con τέλος forma una expresión escatológica natural: ''el fin de todas las cosas''. En español, ''de todas las cosas'' conserva esa amplitud sin forzar el sentido.'
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: δέ marca transición discursiva con matiz de contraste. 'Pero' mantiene esa vuelta lógica y la urgencia del contexto.
- source_word: τὸ τέλος
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - el término
  - la consumación
  - el desenlace
  lexicon: BDAG
  rationale: En este contexto escatológico, τέλος se entiende mejor como 'fin'. 'El fin' es la forma española más directa y natural.
- source_word: ἤγγικεν
  english_pob_choice: has drawn near
  chosen_spanish: se ha acercado
  alternatives_spanish:
  - está cerca
  - ha llegado cerca
  lexicon: BDAG
  rationale: El perfecto expresa un estado presente resultante de la aproximación. 'Se ha acercado' conserva ese valor de cercanía lograda sin sonar forzado en español.
- source_word: σωφρονήσατε
  english_pob_choice: be self-controlled
  chosen_spanish: sean sobrios
  alternatives_spanish:
  - tengan dominio propio
  - sean de juicio sano
  - actúen con sensatez
  lexicon: BDAG
  rationale: El imperativo apunta a dominio disciplinado del juicio y de la conducta. 'Sean sobrios' puede abarcar esa idea en español bíblico contemporáneo, aunque no debe leerse solo como abstinencia de alcohol; por eso se complementa con 'de mente alerta'.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Expresa inferencia explícita. 'Por tanto' reproduce con claridad la conclusión lógica.
- source_word: νήψατε
  english_pob_choice: be sober-minded
  chosen_spanish: de mente alerta
  alternatives_spanish:
  - sean sobrios de mente
  - estén despiertos
  - tengan sobriedad mental
  lexicon: BDAG
  rationale: νήφω es figurado en el NT y aquí se enlaza con la vigilancia para la oración. Para evitar una ambigüedad moderna de 'sobrio' centrada solo en alcohol, 'de mente alerta' comunica vigilancia, claridad y prontitud espiritual.
- source_word: εἰς προσευχάς
  english_pob_choice: for prayers
  chosen_spanish: para las oraciones
  alternatives_spanish:
  - para la oración
  - con miras a las oraciones
  lexicon: BDAG
  rationale: εἰς aquí expresa finalidad. El plural προσευχάς se conserva como 'las oraciones', sugiriendo actos de oración concretos y repetidos, no solo la idea abstracta de orar.
theological_decisions:
- issue: Alcance escatológico de 'el fin de todas las cosas'
  english_pob_reading: Retained as a straightforward eschatological statement without specifying a detailed timeline or system.
  chosen_spanish_reading: 'Se mantiene como una afirmación escatológica directa: ''el fin de todas las cosas se ha acercado''.'
  alternative_spanish_readings:
  - el propósito de todas las cosas se ha acercado
  - la consumación de todas las cosas se ha acercado
  rationale: La frase suena a anuncio real del acercamiento del fin y fundamenta la exhortación ética. La traducción no introduce cronología ni sistema doctrinal específicos.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Relación entre σωφρονήσατε y νήψατε
  english_pob_reading: The two imperatives emphasize clear judgment and spiritual alertness.
  chosen_spanish_reading: '''Sean sobrios y de mente alerta'' mantiene dos imperativos coordinados: uno de disciplina del comportamiento/juicio y otro de vigilancia mental y espiritual.'
  alternative_spanish_readings:
  - sean de juicio sano y estén despiertos
  - tengan dominio propio y sean sobrios de mente
  rationale: El griego presenta dos mandatos relacionados pero no idénticos. Conviene conservar ambos para no aplanar la fuerza exhortativa ni borrar la tensión semántica entre autodominio y vigilancia.
  doctrine_reference: Affirmations; lexical notes on figurative sobriety
- issue: Finalidad de las oraciones
  english_pob_reading: for prayers
  chosen_spanish_reading: '''para las oraciones'' conserva la idea de finalidad y el plural concreto del sustantivo.'
  alternative_spanish_readings:
  - para la oración
  - con vistas a la oración
  rationale: El plural en español ayuda a reflejar la pluralidad/iteración del término griego y la orientación práctica del pasaje hacia una vida marcada por la oración.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El contexto inglés pasó de 'clear-minded' a 'sober-minded' para νήψατε en la última revisión, buscando un tono más formal sin perder naturalidad. En español se tomó una solución que preserva la sobriedad mental sin reducirla a la abstinencia ni duplicar innecesariamente la idea de autocontrol.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca explícitamente aquí, sino como norma general del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - '''Mesías'' no aplica en este versículo.'
  - Se evitó 'SEÑOR' como sustituto reverencial porque el texto no lo requiere.
  - '''Oraciones'' mantiene el plural de προσευχάς y su posible matiz distributivo.'
  - La construcción 'de mente alerta' funciona como complemento coordinado a 'sobrios' para reflejar dos imperativos del griego sin sonar artificiosa.
