translation:
  language: es
  text: Porque basta con el tiempo ya pasado para haber hecho la voluntad de los gentiles, habiendo andado en sensualidad[a], malos deseos, borracheras, juergas, fiestas de beber[b], e idolatrías ilícitas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desenfrenos» para ἀσελγείαις, subrayando el exceso desvergonzado.
    reason: lexical_alternative
  - marker: b
    text: O «borracheras» para πότοις.
    reason: lexical_alternative
  - marker: c
    text: O «idolatrías abominables» para ἀθεμίτοις εἰδωλολατρίαις.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρκετὸς γὰρ ὁ παρεληλυθὼς χρόνος
  english_pob_choice: For the time that has passed is sufficient
  chosen_spanish: Porque suficiente es el tiempo pasado
  alternatives_spanish:
  - Porque el tiempo ya pasado es suficiente
  - Pues basta el tiempo transcurrido
  lexicon: BDAG
  rationale: ἀρκετός expresa suficiencia; γάρ introduce explicación. En español, invertir el orden con "suficiente es" da un tono natural y mantiene el énfasis en la suficiencia del tiempo ya transcurrido.
- source_word: τὸ βούλημα τῶν ἐθνῶν
  english_pob_choice: the will of the Gentiles
  chosen_spanish: la voluntad de los gentiles
  alternatives_spanish:
  - el deseo de los gentiles
  - la intención de los gentiles
  lexicon: BDAG
  rationale: βούλημα puede ser voluntad, deseo o intención. Siguiendo el contexto de contraste moral, "voluntad" conserva mejor el peso deliberado del término que un simple "deseo". ἐθνῶν aquí se refiere a gentiles/no judíos, no a "naciones" en sentido geopolítico.
- source_word: κατειργάσθαι
  english_pob_choice: to have carried out
  chosen_spanish: haber hecho
  alternatives_spanish:
  - haber llevado a cabo
  - haber practicado
  lexicon: BDAG
  rationale: El infinitivo perfecto señala acción ya realizada respecto del tiempo pasado. En español, "haber hecho" expresa de modo natural el sentido de practicar o ejecutar esa voluntad sin añadir más de lo que permite el griego.
- source_word: πεπορευμένους
  english_pob_choice: having walked
  chosen_spanish: habiendo andado
  alternatives_spanish:
  - habiendo vivido
  - habiendo conducido su vida
  lexicon: BDAG
  rationale: πορεύομαι en listas morales suele funcionar como metáfora de conducta o manera de vivir. "Habiendo andado" conserva la imagen bíblica de caminar y suena natural en español.
- source_word: ἐν ἀσελγείαις
  english_pob_choice: in sensuality/sensualities
  chosen_spanish: en sensualidad
  alternatives_spanish:
  - en desenfreno
  - en libertinaje
  lexicon: BDAG
  rationale: ἀσέλγεια denota conducta desvergonzada y excesiva, a menudo con matiz sexual. "Sensualidad" mantiene el campo semántico usado por el POB inglés, aunque en español puede abarcar mejor la idea de exceso moral que un equivalente demasiado técnico.
- source_word: ἐπιθυμίαις
  english_pob_choice: lusts
  chosen_spanish: pasiones
  alternatives_spanish:
  - deseos
  - apetitos
  lexicon: BDAG
  rationale: En este vicio-listado, ἐπιθυμία es claramente negativa. "Pasiones" comunica el impulso desordenado sin forzar un registro demasiado estrecho como "lujurias" en un contexto que incluye varios tipos de deseo desordenado.
- source_word: οἰνοφλυγίαις
  english_pob_choice: drunkenness
  chosen_spanish: borracheras
  alternatives_spanish:
  - embriagueces
  - ebriedades
  lexicon: BDAG
  rationale: El término raro designa exceso en el beber y embriaguez reiterada. "Borracheras" es la opción más natural y comunica bien el comportamiento repetido que el plural sugiere.
- source_word: κώμοις
  english_pob_choice: carousing
  chosen_spanish: orgías
  alternatives_spanish:
  - revelerías
  - juergas
  lexicon: BDAG
  rationale: κῶμος se refiere a jolgorio festivo y desordenado, frecuentemente ligado al alcohol y al exceso moral. "Orgías" en español puede cubrir esa idea de desenfreno colectivo, aunque es más fuerte que "juerga"; se usa por su fuerza descriptiva.
- source_word: πότοις
  english_pob_choice: drinking parties
  chosen_spanish: banquetes de bebida
  alternatives_spanish:
  - fiestas de bebida
  - convites de bebida
  lexicon: BDAG
  rationale: πότος designa ocasión o reunión para beber. "Banquetes de bebida" conserva el sentido de una reunión centrada en el beber, sin reducirlo solo a una acción individual.
- source_word: ἀθεμίτοις εἰδωλολατρίαις
  english_pob_choice: lawless idolatries
  chosen_spanish: idolatrías ilícitas
  alternatives_spanish:
  - idolatrías impías
  - idolatrías prohibidas
  lexicon: BDAG
  rationale: ἀθέμιτος significa no permitido, ilícito, contrario a la norma. "Ilícitas" preserva la fuerza objetiva de transgresión que el inglés POB quiso mantener con "lawless", sin depender de un matiz meramente emocional.
theological_decisions:
- issue: Sentido de ἐθνῶν
  english_pob_reading: Gentiles
  chosen_spanish_reading: gentiles
  alternative_spanish_readings:
  - naciones
  - paganos
  rationale: En 1 Pedro, el contraste es con el comportamiento de los no judíos en el entorno social de los lectores. "Gentiles" es preciso y corresponde al uso bíblico corriente; "paganos" interpreta más de lo que el término exige; "naciones" es demasiado amplio.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza moral de ἀθεμίτοις εἰδωλολατρίαις
  english_pob_reading: lawless idolatries
  chosen_spanish_reading: idolatrías ilícitas
  alternative_spanish_readings:
  - idolatrías abominables
  - idolatrías prohibidas
  rationale: El griego acusa esas prácticas como contrarias a lo permitido, no solo como repugnantes. "Ilícitas" conserva el carácter objetivo de violación moral/jurídica sin aumentar el tono más allá del texto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa, que prefirió una sintaxis más natural y precisó el valor de ἀρκετός, βούλημα y los sustantivos de la lista viciosa. En español se mantuvo esa misma lectura, pero con ajustes idiomáticos propios: ''suficiente'' para ἀρκετός, ''voluntad'' para βούλημα, y equivalentes naturales para las conductas viciosas sin perder el paralelismo del original.'
  spanish_consistency_notes:
  - Se mantuvo 'gentiles' para ἐθνῶν, conforme al uso bíblico contextual.
  - Se usó 'idolatrías' en plural para reflejar la pluralidad del griego.
  - La lista de vicios conserva una cadencia enumerativa y un nivel de registro digno, apto para lectura pública.
  - Se evitó traducir mecánicamente las formas plurales griegas cuando el español suena más natural en singular, excepto donde el plural aporta claridad retórica.
