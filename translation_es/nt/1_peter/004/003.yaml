  text: ἀρκετὸς ⸀γὰρ ὁ παρεληλυθὼς ⸀χρόνος τὸ ⸀βούλημα τῶν ἐθνῶν ⸀κατειργάσθαι, πεπορευμένους ἐν ἀσελγείαις, ἐπιθυμίαις, οἰνοφλυγίαις, κώμοις, πότοις, καὶ ἀθεμίτοις εἰδωλολατρίαις.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/003.yaml
  text: For the time that has passed is sufficient for carrying out the desire of the Gentiles[a], having walked in sensuality, lusts, drunkenness, carousing, drinking parties[c][b], and lawless idolatries.
  footnotes:
