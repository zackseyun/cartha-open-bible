translation:
  language: es
  text: Pero si como cristiano, no se avergüence; más bien, glorifique a Dios en este nombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en esta cuestión», «por este nombre» o «a causa de este nombre». El griego dice más literalmente «en este nombre», probablemente refiriéndose al nombre «cristiano».
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Pero si en verdad
  - Y si
  lexicon: BDAG
  rationale: La combinación mantiene la fuerza condicional con matiz de contraste de δέ. En español, «Pero si» suena natural y conserva la transición desde la cláusula anterior sin añadir contenido.
- source_word: ὡς Χριστιανός
  english_pob_choice: as a Christian
  chosen_spanish: como cristiano
  alternatives_spanish:
  - como uno llamado cristiano
  - como seguidor del Mesías
  lexicon: BDAG
  rationale: Χριστιανός funciona aquí como designación ya lexicalizada; por eso se conserva el término usual «cristiano» en lugar de forzar una paráfrasis más explicativa o sustituirlo por «mesianista».
- source_word: μὴ αἰσχυνέσθω
  english_pob_choice: let him not be ashamed
  chosen_spanish: no se avergüence
  alternatives_spanish:
  - que no se avergüence
  - no debe avergonzarse
  lexicon: BDAG
  rationale: 'El imperativo exhortativo de tercera persona se expresa de forma natural en español con subjuntivo exhortativo: «no se avergüence». Conserva la fuerza de mandato sin sonar pesado.'
- source_word: δοξαζέτω δὲ τὸν θεόν
  english_pob_choice: but let him glorify God
  chosen_spanish: más bien, glorifique a Dios
  alternatives_spanish:
  - sino que glorifique a Dios
  - pero glorifique a Dios
  lexicon: BDAG
  rationale: «Glorifique» refleja bien δοξαζέτω en un contexto dirigido a Dios. «Más bien» recoge el contraste práctico entre avergonzarse y honrar a Dios, manteniendo el valor adversativo de δέ.
- source_word: ἐν τῷ ὀνόματι τούτῳ
  english_pob_choice: in this name
  chosen_spanish: en este nombre
  alternatives_spanish:
  - por este nombre
  - a causa de este nombre
  - en esta cuestión
  lexicon: BDAG
  rationale: Se conserva el sustantivo «nombre» para reflejar el vínculo inmediato con Χριστιανός y no disolver la referencia nominal en una explicación más abstracta. En español, «en este nombre» es gramatical y preserva la ambigüedad significativa del griego.
theological_decisions:
- issue: Referencia de «este nombre»
  english_pob_reading: The phrase refers to the name/designation 'Christian.'
  chosen_spanish_reading: La frase se refiere al nombre/designación «cristiano».
  alternative_spanish_readings:
  - La frase significa «en esta cuestión» o «en esta circunstancia».
  - La frase significa «por llevar este nombre».
  rationale: El antecedente inmediato es Χριστιανός, y ὄνομα apunta de manera natural al nombre o designación. Mantener «nombre» conserva la conexión textual y deja abierta la carga social y confesional del sufrimiento por llevar ese nombre.
  doctrine_reference: 'Principio de la traducción POB: preservar la tensión textual y no resolver prematuramente ambigüedades semánticas'
translation_notes:
  revision_awareness: El pasaje ya cuenta con una revisión reciente sin cambios en el flujo inglés. En español, la única decisión sensible era cómo reflejar ἐν τῷ ὀνόματι τούτῳ sin perder la referencia al nombre «cristiano»; se optó por mantener la literalidad funcional con una nota explicativa.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al estándar del proyecto.
  - Se conserva «cristiano» como designación establecida, no como título cristológico a traducir por «Mesías».
  - Se evita «señor» u otras fórmulas tradicionales no presentes en el texto griego.
  - La puntuación separa con punto y coma la exhortación negativa y la positiva para reflejar bien la contraposición del griego.
