translation:
  language: es
  text: Por lo tanto, también los que sufren conforme a la voluntad de Dios encomienden sus almas[a] a un Creador fiel, haciendo el bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus vidas' o 'a sí mismos'; la palabra griega puede referirse al alma, la vida o la persona misma.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: Therefore
  chosen_spanish: Por lo tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: Marca una conclusión inferencial a partir del argumento previo. 'Por lo tanto' conserva bien la fuerza lógica y suena natural en español bíblico contemporáneo.
- source_word: οἱ πάσχοντες
  english_pob_choice: those who suffer
  chosen_spanish: los que sufren
  alternatives_spanish:
  - los que están sufriendo
  - los sufrientes
  lexicon: BDAG
  rationale: El participio presente sustantivado designa una clase de personas caracterizadas por el sufrimiento. 'Los que sufren' reproduce esa referencia genérica sin recargar el estilo.
- source_word: κατὰ τὸ θέλημα τοῦ θεοῦ
  english_pob_choice: according to the will of God
  chosen_spanish: conforme a la voluntad de Dios
  alternatives_spanish:
  - según la voluntad de Dios
  - de acuerdo con la voluntad de Dios
  lexicon: BDAG
  rationale: κατά con acusativo expresa conformidad o acuerdo. 'Conforme a' mantiene esa relación sin especificar mecánicamente si implica permiso, designio u otra elaboración teológica.
- source_word: πιστῷ κτίστῃ
  english_pob_choice: to a faithful Creator
  chosen_spanish: a un Creador fiel
  alternatives_spanish:
  - al Creador fiel
  - a un Creador digno de confianza
  lexicon: BDAG
  rationale: El dativo funciona como destinatario del encargo. 'Creador' es la traducción natural de κτίστης; 'fiel' conserva la idea de fiabilidad y lealtad de πιστός.
- source_word: παρατιθέσθωσαν
  english_pob_choice: entrust
  chosen_spanish: encomienden
  alternatives_spanish:
  - confíen
  - dejen en manos de
  lexicon: BDAG
  rationale: El imperativo medio implica poner algo bajo la custodia de otro. 'Encomienden' comunica la idea de confiar y entregar a cuidado ajeno en español formal y claro.
- source_word: τὰς ψυχὰς αὐτῶν
  english_pob_choice: their souls
  chosen_spanish: sus almas
  alternatives_spanish:
  - sus vidas
  - a sí mismos
  lexicon: BDAG
  rationale: ψυχή puede significar 'alma', 'vida' o 'ser'. 'Almas' conserva la forma léxica y la resonancia teológica, mientras que la alternativa amplia queda señalada en nota.
- source_word: ἐν ἀγαθοποιΐᾳ
  english_pob_choice: in doing good
  chosen_spanish: haciendo el bien
  alternatives_spanish:
  - en hacer el bien
  - en la práctica del bien
  lexicon: BDAG
  rationale: La frase preposicional expresa la manera o circunstancia acompañante del encargo. 'Haciendo el bien' es idiomático en español y mantiene el matiz de acción continua.
theological_decisions:
- issue: Relación del sufrimiento con la voluntad de Dios
  english_pob_reading: according to the will of God
  chosen_spanish_reading: conforme a la voluntad de Dios
  alternative_spanish_readings:
  - según la voluntad de Dios
  - por la voluntad de Dios
  rationale: El griego afirma la relación 'según/conforme a' la voluntad de Dios, pero no especifica el mecanismo teológico del sufrimiento. La traducción conserva esa tensión sin resolverla.
  doctrine_reference: 'Principio de la POB: preservar la tensión teológica en vez de explicarla por adelantado.'
- issue: Sentido de ψυχή en este contexto
  english_pob_reading: their souls
  chosen_spanish_reading: sus almas
  alternative_spanish_readings:
  - sus vidas
  - sus seres
  rationale: '''Almas'' preserva el término y su peso teológico. La nota permite al lector ver que el vocablo también puede abarcar ''vida'' o ''ser'', sin borrar esa amplitud semántica.'
  doctrine_reference: Principio de consistencia léxica con alternativas documentadas.
translation_notes:
  revision_awareness: La revisión más reciente en el audit trail cambió 'while doing good' por 'in doing good' para reflejar con más precisión ἐν ἀγαθοποιΐᾳ. En español se optó por 'haciendo el bien', que conserva la idea de acompañamiento/mecanismo de la acción sin introducir una estructura forzada.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en otros pasajes; aquí aparece θεός y se traduce como 'Dios', conforme al uso estándar del proyecto.
  - Se conserva 'Creador' para κτίστης, sin sustituirlo por una formulación más interpretativa.
  - '''Almas'' se usa aquí con apoyo de nota para no aplanar ψυχή a ''vidas'' ni perder la amplitud semántica.'
  - La puntuación y el orden buscan naturalidad en español sin debilitar la inferencia inicial de ὥστε.
