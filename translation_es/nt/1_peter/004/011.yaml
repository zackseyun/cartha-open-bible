base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/011.yaml
  text: If anyone speaks[a], let it be as the utterances of God; if anyone serves, let it be from the strength that God supplies, so that in everything God may be glorified through Jesus Messiah, to whom belong the glory and the dominion forever and ever[e][d][c][b]. Amen.
  footnotes:
  - marker: a
    text: Or 'oracles of God.' The Greek λόγια carries the sense of divine utterances.
    reason: lexical_alternative
  - marker: b
    text: Greek 'through Jesus Christ'; rendered 'Jesus Messiah' here because Χριστός functions as a title.
    reason: lexical_alternative
  - marker: c
    text: The pronoun 'to whom' most naturally refers to Jesus Messiah, though some understand the doxology as referring to God the Father in light of the preceding clause.
    reason: alternative_reading
  - marker: d
    text: Literally 'to the ages of ages.'
    reason: lexical_alternative
  - marker: e
    text: Or 'let it be as from the strength'.
    reason: previous_rendering
