translation:
  language: es
  text: Si alguno habla, que sea como los oráculos[a] de Dios; si alguno sirve, que sea de la fuerza[b] que Dios provee, para que en todo Dios sea glorificado por medio de Jesús Mesías[c], a quien pertenecen la gloria y el dominio por los siglos de los siglos[d][e]. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las palabras de Dios». El griego λόγια expresa dichos divinos o palabras solemnes de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «desde la fuerza». La preposición griega indica origen o fuente de la capacidad.
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «por medio de Jesucristo». Se mantiene «Mesías» aquí porque Χριστός funciona como título.'
    reason: lexical_alternative
  - marker: d
    text: El pronombre «a quien» se entiende más naturalmente como referido a Jesús Mesías, aunque algunos entienden que la doxología se refiere a Dios por la cláusula precedente.
    reason: alternative_reading
  - marker: e
    text: 'Literalmente: «por los siglos de los siglos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλεῖ
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - habla
  - dice
  lexicon: BDAG
  rationale: El verbo griego es amplio y puede referirse a hablar en general, no solo a predicar. «Habla» conserva esa amplitud en español y funciona bien en una construcción condicional exhortativa.
- source_word: λόγια
  english_pob_choice: utterances
  chosen_spanish: las palabras
  alternatives_spanish:
  - los oráculos
  - las declaraciones
  lexicon: BDAG
  rationale: El término puede expresar dichos divinos oacles. En español, «palabras» es natural y suficientemente amplio; la tensión entre una traducción más literal y una más idiomática queda preservada mediante la nota textual/lexical.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - de Dios mismo
  lexicon: BDAG
  rationale: 'El genitivo expresa pertenencia y cualidad: no solo palabras acerca de Dios, sino palabras con carácter divino. «De Dios» mantiene esa relación sin exagerar el matiz de origen.'
- source_word: διακονεῖ
  english_pob_choice: serves
  chosen_spanish: sirve
  alternatives_spanish:
  - ministra
  - atiende
  lexicon: BDAG
  rationale: El verbo abarca servicio ministerial en sentido general. «Sirve» es el equivalente más natural y no restringe el ámbito a un cargo eclesiástico formal.
- source_word: ἐξ ἰσχύος
  english_pob_choice: from the strength
  chosen_spanish: de la fuerza
  alternatives_spanish:
  - de la fortaleza
  - desde la fuerza
  lexicon: BDAG
  rationale: La preposición marca origen o fuente. «De la fuerza» comunica que la capacidad procede de Dios. Se evita «con» porque suavizaría indebidamente el sentido de procedencia.
- source_word: ἧς χορηγεῖ ὁ θεός
  english_pob_choice: that God supplies
  chosen_spanish: que Dios provee
  alternatives_spanish:
  - que Dios suministra
  - que Dios concede
  lexicon: BDAG
  rationale: χορηγέω implica abastecer o proveer con generosidad. «Provee» es natural en español y mantiene la idea de suministro activo de parte de Dios.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: La partícula introduce finalidad. «Para que» es la forma más directa y clara en español para expresar el propósito del enunciado.
- source_word: ἐν πᾶσιν
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en todo esto
  lexicon: BDAG
  rationale: La expresión es global y abarcadora. «En todo» transmite la totalidad con naturalidad en español y encaja con el tono exhortativo del pasaje.
- source_word: δοξάζηται
  english_pob_choice: may be glorified
  chosen_spanish: sea glorificado
  alternatives_spanish:
  - pueda ser glorificado
  - sea exaltado
  lexicon: BDAG
  rationale: El subjuntivo pasivo con ἵνα expresa propósito. «Sea glorificado» conserva la pasividad y el valor teleológico sin añadir modalidad innecesaria.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: through Jesus Messiah
  chosen_spanish: por medio de Jesús Mesías
  alternatives_spanish:
  - por medio de Jesús Cristo
  - a través de Jesús Mesías
  lexicon: BDAG
  rationale: 'Se mantiene el criterio del proyecto para Χριστός como título: «Mesías». «Por medio de» expresa mediación de forma natural en español y refleja bien διὰ con genitivo.'
- source_word: ᾧ
  english_pob_choice: to whom belong
  chosen_spanish: a quien pertenecen
  alternatives_spanish:
  - de quien son
  - a quien es
  lexicon: BDAG
  rationale: La dativo relativo en una doxología se rinde de manera idiomática con posesión/ascripción. «A quien pertenecen» comunica bien la atribución de gloria y dominio.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  - la alabanza
  lexicon: BDAG
  rationale: En contextos doxológicos, δόξα debe mantenerse como «gloria», porque conserva el registro teológico y litúrgico del texto.
- source_word: κράτος
  english_pob_choice: dominion
  chosen_spanish: el dominio
  alternatives_spanish:
  - el poder
  - la soberanía
  lexicon: BDAG
  rationale: En la doxología, κράτος se refiere a poder gobernante o dominio. «Dominio» preserva ese matiz mejor que un simple «poder».
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - por siempre y para siempre
  - por toda la eternidad
  lexicon: BDAG
  rationale: La fórmula idiomática tradicional en español comunica bien la duración sin fin y conserva el tono solemne del cierre litúrgico.
theological_decisions:
- issue: Referente de ᾧ en la doxología final
  english_pob_reading: The nearest antecedent is Jesus Messiah, though some understand the doxology as referring to God the Father in light of the preceding clause.
  chosen_spanish_reading: La frase se vierte de modo que el relativo «a quien» siga naturalmente a «Jesús Mesías», sin excluir que la alabanza final esté inseparablemente unida a Dios, quien es el sujeto del propósito previo.
  alternative_spanish_readings:
  - La doxología se refiere a Dios Padre
  - La doxología abarca a Dios actuando por medio de Jesús Mesías
  rationale: La sintaxis favorece el antecedente inmediato, pero el contexto inmediato también afirma que Dios sea glorificado por medio de Jesús Mesías. La traducción mantiene esa proximidad sintáctica y deja constancia de la lectura alternativa sin resolverla dogmáticamente.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Valor de λόγια en el primer miembro
  english_pob_reading: Or 'oracles of God.' The Greek λόγια carries the sense of divine utterances.
  chosen_spanish_reading: Se traduce «las palabras de Dios», dejando abierta la opción de una formulación más fuerte como «oráculos» en nota.
  alternative_spanish_readings:
  - los oráculos de Dios
  - las declaraciones de Dios
  rationale: En español, «oráculos» es fiel pero más técnico y menos natural. «Palabras de Dios» comunica el sentido sin borrar la posible elevación del término griego, que se preserva en la nota.
  doctrine_reference: Translation philosophy §6
- issue: Relación entre λαλεί y el impersonal exhortativo
  english_pob_reading: The verse is rendered exhortationally with an implied 'let it be' in English.
  chosen_spanish_reading: Se usa «que sea» para reproducir la fuerza exhortativa del griego.
  alternative_spanish_readings:
  - si alguno habla, como las palabras de Dios
  - si alguno habla, hable como las palabras de Dios
  rationale: El griego presenta una construcción elíptica. En español, el subjuntivo exhortativo «que sea» expresa bien la norma implícita sin añadir contenido ajeno.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'El contexto inglés muestra una historia editorial relevante: la formulación pasó por una revisión que intentó hacer más natural el cierre cristológico, pero se revirtió para restaurar «Messiah» por política terminológica. Además, el pasaje tuvo un ajuste estilístico en la segunda cláusula para evitar una calca de ''as from''. La presente versión española sigue esa intención: conserva el título «Mesías», evita una construcción rígida en la cláusula de servicio y mantiene visible la posible lectura alternativa de λόγια mediante nota.'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός en coherencia con la norma del proyecto y con el estatus titulativo del término en este contexto.
  - Se mantiene «Dios» para θεός, sin usar una máscara litúrgica.
  - «Dominio» se eligió para κράτος por su tono doxológico y de realeza.
  - «Por los siglos de los siglos» conserva la fórmula solemne y tradicional en español.
  - Las notas se limitan a alternativas realmente relevantes para la sintaxis y el léxico del versículo.
