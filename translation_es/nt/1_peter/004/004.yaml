translation:
  language: es
  text: En esto[a], se sorprenden de que ustedes no corran con ellos al mismo torrente de libertinaje[b], hablando mal de ustedes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "les parece extraño" o "quedan asombrados".'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: "al mismo derramamiento/desbordamiento de libertinaje".'
    reason: lexical_alternative
  - marker: c
    text: 'O: "injuriándolos" o "hablándoles abusivamente".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: In this
  chosen_spanish: En esto
  alternatives_spanish:
  - Por esto
  - En lo cual
  lexicon: BDAG
  rationale: La expresión retoma la situación o esfera de vida anterior y la presenta de manera breve y natural en español. 'En esto' conserva el vínculo anafórico sin volverlo pesado; 'por esto' introduciría una causalidad más explícita de la que exige el griego.
- source_word: ξενίζονται
  english_pob_choice: they are surprised
  chosen_spanish: se sorprenden
  alternatives_spanish:
  - les parece extraño
  - se extrañan
  - quedan asombrados
  lexicon: BDAG
  rationale: El verbo puede expresar extrañeza o sorpresa ante algo ajeno. 'Se sorprenden' es claro, actual y mantiene el matiz de encontrar inusual la conducta cristiana sin cargarlo demasiado hacia 'asombrarse'.
- source_word: μὴ συντρεχόντων ὑμῶν
  english_pob_choice: that you do not run with them
  chosen_spanish: de que ustedes no corran con ellos
  alternatives_spanish:
  - de que no vayan con ellos
  - de que no se unan a ellos al correr
  - por no correr con ellos
  lexicon: BDAG
  rationale: '''Correr con ellos'' conserva la imagen de participación compartida que trae συντρέχω. La construcción con ''de que'' expresa con naturalidad el contenido de la sorpresa; ''ir con ellos'' suavizaría la metáfora.'
- source_word: εἰς τὴν αὐτὴν τῆς ἀσωτίας ἀνάχυσιν
  english_pob_choice: into the same flood of debauchery
  chosen_spanish: hacia el mismo torrente de libertinaje
  alternatives_spanish:
  - al mismo derramamiento de libertinaje
  - hacia el mismo desbordamiento de desenfreno
  - al mismo torrente de disolución
  lexicon: BDAG
  rationale: ἀνάχυσις conserva la imagen de derramamiento/flujo excesivo; 'torrente' expresa bien ese movimiento desbordado en español. 'Libertinaje' comunica la fuerza moral de ἀσωτία con un registro claro y comprensible; se evita 'disolución' por su posible ambigüedad moderna.
- source_word: βλασφημοῦντες
  english_pob_choice: slandering you
  chosen_spanish: difamándolos
  alternatives_spanish:
  - hablando mal de ustedes
  - ultrajándolos
  - injuriándolos
  lexicon: BDAG
  rationale: En este contexto el daño verbal va dirigido a los creyentes, no a Dios; por eso el sentido es de hablar mal, calumniar o difamar. 'Difamándolos' mantiene el valor hostil y participial del griego. Se eligió una forma impersonal/participial para reflejar que el participio acompaña la acción principal.
theological_decisions:
- issue: Sentido de βλασφημοῦντες en un contexto de hostilidad humana
  english_pob_reading: human-directed slander/reviling rather than blasphemy against God
  chosen_spanish_reading: difamación / hablar mal de los creyentes, no 'blasfemar' en sentido estricto contra Dios
  alternative_spanish_readings:
  - blasfemándolos
  - revitándolos
  - hablando abusivamente de ustedes
  rationale: En español, 'blasfemar' suele reservarse para ofensas contra Dios y podría desviar el sentido del contexto inmediato. Aquí el texto describe la reacción hostil de quienes se extrañan de la conducta distinta de los creyentes; por eso 'difamándolos' comunica mejor la agresión verbal interpersonal.
  doctrine_reference: 1 Pedro 4:4; coherencia con el uso contextual de βλασφημέω en discurso contra personas
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del POB inglés al mantener el participio final como acción acompañante y no como cláusula finita separada. También conserva la progresión del sentido: sorpresa ante la no participación, movimiento hacia una esfera de exceso, y hostilidad verbal final.'
  spanish_consistency_notes:
  - Se mantuvo 'libertinaje' para ἀσωτία por su peso moral y legibilidad contemporánea.
  - '''En esto'' preserva la referencia anafórica corta del relativo griego.'
  - Se optó por una forma participial española ('difamándolos') para reflejar βλασφημοῦντες como acción concurrente.
  - No se introdujo 'blasfemar' en el texto principal para evitar una lectura teológicamente desplazada en español.
