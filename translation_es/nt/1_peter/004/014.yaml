translation:
  language: es
  text: Si son insultados en el nombre del Mesías[a], ustedes son bienaventurados, porque el Espíritu de gloria y de Dios[b] reposa sobre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: “Cristo”; aquí se traduce “Mesías” porque Χριστός funciona como título.'
    reason: lexical_alternative
  - marker: b
    text: O, “el Espíritu glorioso de Dios”; alternativamente, “el Espíritu de gloria, es decir, el Espíritu de Dios”.
    reason: alternative_reading
lexical_decisions:
- source_word: ὀνειδίζεσθε
  english_pob_choice: are insulted
  chosen_spanish: son insultados
  alternatives_spanish:
  - son reprochados
  - son vituperados
  lexicon: BDAG
  rationale: El presente pasivo comunica que reciben afrenta verbal o deshonra; “son insultados” conserva el sentido social de vergüenza sin sonar arcaico.
- source_word: ἐν ὀνόματι Χριστοῦ
  english_pob_choice: in the name of the Messiah
  chosen_spanish: en el nombre de Mesías
  alternatives_spanish:
  - por el nombre de Mesías
  - a causa del Mesías
  - en el nombre de Cristo
  lexicon: BDAG
  rationale: La expresión marca asociación o padecimiento por la identidad y autoridad del portador del nombre. “En el nombre de Mesías” sigue de cerca el griego y preserva el valor titular de Χριστός.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no solo como nombre propio. En español, “Mesías” conserva ese valor titular y evita una simple transliteración eclesiástica.
- source_word: μακάριοι
  english_pob_choice: blessed
  chosen_spanish: bienaventurados
  alternatives_spanish:
  - bendecidos
  - felices
  lexicon: BDAG
  rationale: En una dicha de tipo beatitud, “bienaventurados” expresa mejor la carga bíblica y teológica que “felices”, que sería demasiado subjetivo.
- source_word: τὸ τῆς δόξης καὶ τὸ τοῦ θεοῦ πνεῦμα
  english_pob_choice: the Spirit of glory and of God
  chosen_spanish: el Espíritu de gloria y de Dios
  alternatives_spanish:
  - el Espíritu glorioso de Dios
  - el Espíritu de gloria, es decir, el Espíritu de Dios
  lexicon: BDAG
  rationale: La sintaxis griega es compacta y deja abierta la relación entre “de gloria” y “de Dios”. La traducción mantiene visible esa tensión sin resolverla en paráfrasis.
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  lexicon: BDAG
  rationale: “Gloria” es la equivalencia teológica estándar en español y preserva la resonancia bíblica del término.
- source_word: ἀναπαύεται
  english_pob_choice: rests upon
  chosen_spanish: reposa sobre
  alternatives_spanish:
  - descansa sobre
  - permanece sobre
  lexicon: BDAG
  rationale: “Reposa sobre” expresa bien el sentido de asentarse o descansar y reproduce de manera natural la imagen del Espíritu sobre los creyentes.
theological_decisions:
- issue: Cómo presentar Χριστοῦ en español
  english_pob_reading: the Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene el valor titular de Χριστός, como exige el criterio de traducir el título cuando el contexto lo favorece. Esto conserva la referencia mesiánica explícita del texto.
  doctrine_reference: POB terminology guidance on Χριστός / Messiah language
- issue: Cómo entender τὸ τῆς δόξης καὶ τὸ τοῦ θεοῦ πνεῦμα
  english_pob_reading: the Spirit of glory and of God
  chosen_spanish_reading: el Espíritu de gloria y de Dios
  alternative_spanish_readings:
  - el Espíritu glorioso de Dios
  - el Espíritu de gloria, es decir, el Espíritu de Dios
  rationale: La frase griega puede leerse como genitivos coordinados o como una aclaración apposicional. La versión española conserva la ambigüedad y no la aplana con una explicación interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Elección de bienaventurado frente a bendecido o feliz
  english_pob_reading: blessed
  chosen_spanish_reading: bienaventurados
  alternative_spanish_readings:
  - bendecidos
  - felices
  rationale: En un contexto de bienaventuranza y recompensa divina, “bienaventurados” refleja mejor la solemnidad bíblica que “felices”, que debilita el peso teológico.
  doctrine_reference: Beatitude-style blessing language in canonical usage
translation_notes:
  revision_awareness: La redacción sigue la última restauración auditada que devolvió “Mesías” para Χριστοῦ tras una revisión regresiva que había cambiado indebidamente el título a “Cristo”. Se preserva también la decisión de no resolver la construcción de “el Espíritu de gloria y de Dios”, manteniendo su tensión sintáctica y teológica visible en español.
  spanish_consistency_notes:
  - Se mantiene “Mesías” para Χριστοῦ de forma consistente con la política POB y con la revisión restaurada.
  - “Espíritu” va en mayúscula porque se refiere al Espíritu divino en este contexto.
  - “Bienaventurados” conserva el registro de dicha declarativa, no un mero estado emocional.
  - “Reposa sobre ustedes” refleja el ἐφ’ ὑμᾶς sin introducir elementos ajenos al texto.
