translation:
  language: es
  text: Porque es tiempo de que el juicio comience desde la familia[a] de Dios; y si comienza primero desde nosotros, ¿cuál será el fin[b] de los que desobedecen[c] al evangelio de Dios?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «la casa de Dios». El griego οἶκος puede significar «casa» o «familia/hogar»; aquí probablemente se refiere al pueblo de Dios como su familia.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «resultado» o «desenlace». El griego τέλος puede significar «fin», «resultado» o «desenlace».'
    reason: lexical_alternative
  - marker: c
    text: 'También: «los que rehúsan creer». El verbo griego puede implicar desobediencia y también incredulidad en respuesta al evangelio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ καιρὸς
  english_pob_choice: it is time
  chosen_spanish: es tiempo
  alternatives_spanish:
  - ha llegado el tiempo
  - es el momento
  lexicon: BDAG
  rationale: καιρός señala un momento oportuno o señalado, no solo tiempo cronológico. «Es tiempo» suena natural en español y conserva la idea de una coyuntura fijada por Dios.
- source_word: τὸ κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - condena
  - sentencia
  lexicon: BDAG
  rationale: '«Juicio» mantiene el alcance amplio del griego, sin reducirlo a condena. Así se preserva la tensión teológica: un obrar judicial de Dios que empieza con su propio pueblo.'
- source_word: ἀπὸ τοῦ οἴκου τοῦ θεοῦ
  english_pob_choice: from the household of God
  chosen_spanish: desde la casa de Dios
  alternatives_spanish:
  - desde la familia de Dios
  - desde la casa/household de Dios
  lexicon: BDAG
  rationale: οἶκος puede significar «casa» o «casa/hogar en sentido de familia». En español, «casa de Dios» mantiene la metáfora y deja abierto el sentido comunitario; «desde» conserva ἀπό. Se evita imponer «familia» para no sobreexplicitar el referente.
- source_word: ἡμῶν
  english_pob_choice: us
  chosen_spanish: nosotros
  alternatives_spanish:
  - de nosotros
  - a nosotros
  lexicon: BDAG
  rationale: «Desde nosotros» quedó implícito en la cláusula anterior; «nosotros» en español hace fluida la referencia y conserva el contraste inclusivo con la casa de Dios.
- source_word: τέλος
  english_pob_choice: outcome
  chosen_spanish: fin
  alternatives_spanish:
  - resultado
  - desenlace
  lexicon: BDAG
  rationale: τέλος puede significar fin, resultado u outcome. Aquí «fin» es breve, natural y compatible con el contraste retórico; en español no obliga a un sentido meramente temporal.
- source_word: ἀπειθούντων
  english_pob_choice: those who disobey
  chosen_spanish: los que desobedecen
  alternatives_spanish:
  - los que rehúsan creer
  - los incrédulos
  - los desobedientes
  lexicon: BDAG
  rationale: El participio puede abarcar desobediencia e incredulidad frente al evangelio. «Los que desobedecen» conserva la fuerza verbal y la relación moral con el evangelio sin cerrar el matiz de incredulidad.
- source_word: τῷ τοῦ θεοῦ εὐαγγελίῳ
  english_pob_choice: the gospel of God
  chosen_spanish: al evangelio de Dios
  alternatives_spanish:
  - al evangelio que viene de Dios
  - a las buenas noticias de Dios
  lexicon: BDAG
  rationale: 'El genitivo es posesivo/origen: el evangelio pertenece a Dios o procede de él. «Evangelio de Dios» es idiomático en español bíblico y fiel al peso formal de la frase.'
theological_decisions:
- issue: Alcance de κρίμα respecto del pueblo de Dios
  english_pob_reading: Rendered as 'judgment' without specifying condemnation, allowing the text's tension that God's purifying/judicial dealing begins with his own people.
  chosen_spanish_reading: Traducido como «juicio», sin precisar «condena», para dejar abierta la tensión entre evaluación/juzgamiento de Dios y castigo final.
  alternative_spanish_readings:
  - condena
  - disciplina
  rationale: El contexto contrasta el comienzo del juicio en la casa de Dios con el fin de quienes desobedecen el evangelio. «Juicio» preserva la seriedad judicial sin resolver indebidamente la tensión entre purificación y condenación.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Referente de «casa de Dios»
  english_pob_reading: Understood as God's people rather than a temple building.
  chosen_spanish_reading: Entendida como el pueblo de Dios en sentido corporativo, no como un edificio.
  alternative_spanish_readings:
  - templo de Dios
  - casa de Dios como estructura cultual
  rationale: En 1 Pedro el pueblo creyente es descrito como casa de Dios; además, «desde nosotros» confirma un referente personal/comunitario. La traducción conserva «casa» sin fijarlo en una construcción material.
  doctrine_reference: Contextual ecclesiology in 1 Peter 2:5 and 4:17.
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios. Esta versión sigue esa lectura estable, manteniendo las ambigüedades léxicas relevantes de κρίμα, οἶκος, τέλος y ἀπειθέω sin forzarlas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «evangelio de Dios» para εὐαγγέλιον con genitivo posesivo/origen.
  - Se usa «casa de Dios» para οἶκος, con nota que preserva la alternativa comunitaria sin imponerla en el texto principal.
  - «Juicio» conserva el peso judicial de κρίμα y evita la reducción a «condena».
  - «Los que desobedecen» reproduce la fuerza verbal de ἀπειθούντων y deja abierto el matiz de incredulidad.
  - Se prefiere «fin» para τέλος por su naturalidad en español, con nota sobre resultados posibles.
