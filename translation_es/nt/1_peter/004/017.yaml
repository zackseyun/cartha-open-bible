  text: ὅτι ὁ καιρὸς τοῦ ἄρξασθαι τὸ κρίμα ἀπὸ τοῦ οἴκου τοῦ θεοῦ· εἰ δὲ πρῶτον ἀφ’ ἡμῶν, τί τὸ τέλος τῶν ἀπειθούντων τῷ τοῦ θεοῦ εὐαγγελίῳ;
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/017.yaml
  text: For it is time for judgment to begin from the household of God[a]; and if it begins first from us[c][b], what will be the outcome for those who disobey the gospel of God?
  footnotes:
  - marker: a
    text: Or 'the house of God.' The Greek οἶκος can mean either 'house' or 'household'; here it likely refers to God's people as his household.
    reason: lexical_alternative
  - marker: b
    text: Or 'what will be the end.' The Greek τέλος can mean 'end,' 'outcome,' or 'result.'
    reason: lexical_alternative
  - marker: c
    text: '''Those who disobey'' may also be rendered ''those who refuse to believe,'' since the Greek verb can denote both disobedience and unbelief in response to the gospel.'
    reason: lexical_alternative
