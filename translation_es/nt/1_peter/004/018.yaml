translation:
  language: es
  text: Y si el justo apenas es salvado[a], ¿dónde aparecerán el impío y el pecador?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Apenas» también puede entenderse como «con dificultad» o «difícilmente». La idea no es que la salvación del justo sea dudosa, sino que acontece en medio de una prueba severa.
    reason: lexical_alternative
  - marker: b
    text: 'Otra posibilidad es: «¿dónde serán hallados el impío y el pecador?». El verbo griego puede expresar aparecer o ser visto/encontrado, y la pregunta conserva su fuerza retórica.'
    reason: alternative_reading
lexical_decisions:
- source_word: δίκαιος
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el justo creyente
  - el recto
  lexicon: BDAG
  rationale: El adjetivo sustantivado singular con artículo se refleja de manera compacta como un singular representativo. «El justo» conserva la fuerza proverbial sin expandir indebidamente el sentido.
- source_word: μόλις
  english_pob_choice: scarcely
  chosen_spanish: apenas
  alternatives_spanish:
  - con dificultad
  - con mucho trabajo
  - difícilmente
  lexicon: BDAG
  rationale: «Apenas» comunica bien la idea de dificultad o estrechez del rescate en español contemporáneo, manteniendo la tensión del dicho sin sugerir duda sobre la salvación final.
- source_word: σῴζεται
  english_pob_choice: is saved
  chosen_spanish: es salvado
  alternatives_spanish:
  - está siendo salvado
  - llega a ser salvado
  - se salva
  lexicon: BDAG
  rationale: Se conserva la pasiva verbal de manera directa. «Es salvado» mantiene la correspondencia formal con el griego y evita suavizar el verbo hacia una expresión más general.
- source_word: ἀσεβής
  english_pob_choice: the ungodly
  chosen_spanish: el impío
  alternatives_spanish:
  - el irreverente
  - el que no teme a Dios
  lexicon: BDAG
  rationale: «Impío» es la forma más natural y tradicional para el campo semántico de ἀσεβής en español bíblico, con el sentido moral-religioso de quien no reverencia a Dios.
- source_word: ἁμαρτωλός
  english_pob_choice: the sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - el hombre pecador
  - el que peca
  lexicon: BDAG
  rationale: «Pecador» preserva la distinción del segundo calificativo sin fusionarlo con ἀσεβής. Mantiene el paralelismo de dos descriptores coordinados.
- source_word: ποῦ
  english_pob_choice: where
  chosen_spanish: ¿dónde
  alternatives_spanish:
  - ¿en qué lugar
  lexicon: BDAG
  rationale: Interrogativo directo y natural en español, con el mismo valor retórico del griego.
- source_word: φανεῖται
  english_pob_choice: will appear
  chosen_spanish: se presentarán
  alternatives_spanish:
  - aparecerán
  - serán hallados
  - se mostrarán
  lexicon: BDAG
  rationale: «Se presentarán» refleja el valor de manifestación/aparición con un español idiomático en una pregunta retórica. Aunque el verbo griego es singular, en español se puede dejar el sujeto compuesto con verbo en plural para naturalidad; no obstante, la forma elegida aquí busca fluidez estilística.
theological_decisions:
- issue: La dificultad de la salvación del justo
  english_pob_reading: The verse speaks of the difficulty or severity attending the righteous person's salvation in the context of suffering/judgment, not uncertainty about whether the righteous will finally be saved.
  chosen_spanish_reading: El versículo afirma que la salvación del justo ocurre apenas, es decir, con gran dificultad o estrechez, en el marco del sufrimiento y el juicio; no dice que la salvación sea incierta.
  alternative_spanish_readings:
  - El justo apenas alcanza la salvación final.
  - El justo se salva con dudas o de manera precaria.
  rationale: «Apenas» y «es salvado» preservan la tensión del original y evitan convertir el texto en una afirmación doctrinal de inseguridad salvífica. La formulación mantiene la severidad del contexto sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica sin suavizarla ni exagerarla.
- issue: Singular representativo con sujeto compuesto final
  english_pob_reading: Use 'the righteous' as a generic singular rather than expanding to a plural or gender-neutral paraphrase.
  chosen_spanish_reading: Se mantiene el singular representativo en «el justo», y el par final se deja como dos descriptores coordinados para conservar el paralelismo del griego.
  alternative_spanish_readings:
  - los justos
  - la persona justa
  rationale: El griego usa un singular con valor representativo y luego un sujeto compuesto. La traducción conserva esa estructura sin convertirla en plural generalizante.
  doctrine_reference: Precisión gramatical y fidelidad al paralelismo retórico.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente los marcadores de nota en el texto traducido. También se mantuvo la distinción entre ἀσεβής y ἁμαρτωλός, y se evitó suavizar μόλις y σῴζεται más allá de lo que el contexto permite.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exigiría explícitamente; este versículo no contiene el nombre divino.
  - Se prefirió «impío» para ἀσεβής y «pecador» para ἁμαρτωλός, manteniendo la distinción léxica.
  - 'La pregunta retórica se conservó con puntuación española: «¿…?».'
  - Se evitó una paráfrasis doctrinalmente cerrada de μόλις σῴζεται; las notas mantienen la alternativa lexical y el matiz teológico.
