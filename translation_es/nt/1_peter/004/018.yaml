revisions:
- from: Y si el justo apenas es salvado[a][b], ¿dónde se presentarán el impío y el pecador?[c]
  to: Y si el justo apenas es salvado[a], ¿dónde aparecerán el impío y el pecador?[b]
  rationale: Se reemplaza «se presentarán» por «aparecerán» para reflejar con mayor precisión φανεῖται y evitar un matiz de comparecencia voluntaria. Se elimina la nota metalingüística sobre la pasiva de «es salvado» porque no aporta una alternativa textual relevante y no está respaldada por el aparato inglés. Se conservan «el justo», «el impío» y «el pecador», y se mantiene la aclaración necesaria sobre «apenas».
