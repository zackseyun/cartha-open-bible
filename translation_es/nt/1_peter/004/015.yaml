translation:
  language: es
  text: Porque que ninguno de ustedes sufra como homicida o ladrón o malhechor o como entremetido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «metido en asuntos ajenos»; más literalmente, «uno que supervisa los asuntos de otro», es decir, alguien que se entromete en lo que no le corresponde.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ γάρ
  english_pob_choice: For let ... not
  chosen_spanish: Porque no
  alternatives_spanish:
  - Pues no
  - Porque, que no
  lexicon: BDAG
  rationale: γάρ conserva la conexión explicativa con el contexto anterior y se rinde naturalmente como «Porque». La prohibición se expresa de manera idiomática en español con «no sufra», sin añadir elementos que el griego no explicita.
- source_word: τις ὑμῶν
  english_pob_choice: none of you
  chosen_spanish: ninguno de ustedes
  alternatives_spanish:
  - ninguno de vosotros
  - nadie de ustedes
  lexicon: BDAG
  rationale: Bajo la negación, la combinación de un indefinido con genitivo partitivo se expresa con naturalidad como «ninguno de ustedes», manteniendo el valor distributivo sin forzar una estructura más literal pero menos idiomática.
- source_word: πασχέτω
  english_pob_choice: suffer
  chosen_spanish: sufra
  alternatives_spanish:
  - padezca
  - sea hecho sufrir
  lexicon: BDAG
  rationale: πάσχω significa de forma amplia «sufrir» o «padecer». «Sufra» es directo, natural y conserva la amplitud del término sin especificar indebidamente sufrimiento punitivo.
- source_word: φονεύς
  english_pob_choice: murderer
  chosen_spanish: homicida
  alternatives_spanish:
  - asesino
  - murderer
  lexicon: BDAG
  rationale: El griego nombra al que comete homicidio. «Homicida» es preciso y de registro digno; «asesino» puede sonar más fuerte en español y «murderer» no corresponde al idioma meta.
- source_word: κλέπτης
  english_pob_choice: thief
  chosen_spanish: ladrón
  alternatives_spanish:
  - robo
  - salteador
  lexicon: BDAG
  rationale: κλέπτης es el término estándar para «thief». «Ladrón» es el equivalente natural y fiel en español.
- source_word: κακοποιός
  english_pob_choice: evildoer
  chosen_spanish: malhechor
  alternatives_spanish:
  - hacedor del mal
  - malvado
  lexicon: BDAG
  rationale: κακοποιός designa a quien hace mal de manera general. «Malhechor» preserva esa amplitud y mantiene el tono moral del listado de vicios.
- source_word: ἀλλοτριεπίσκοπος
  english_pob_choice: a meddler
  chosen_spanish: entremetido
  alternatives_spanish:
  - metido en asuntos ajenos
  - curioso entrometido
  - busybody
  lexicon: BDAG
  rationale: El compuesto es raro y alude a una intromisión en asuntos ajenos. «Entremetido» comunica bien esa idea en español sin introducir una explicación más extensa que la revisión inglesa reciente evitó para no ampliar el término más allá de lo justificado.
theological_decisions:
- issue: Valor del listado de vicios y la comparación introducida por ὡς
  english_pob_reading: as a murderer or a thief or an evildoer or as a meddler
  chosen_spanish_reading: como homicida, o ladrón, o malhechor, o como entremetido
  alternative_spanish_readings:
  - como si fuera homicida...
  - por ser homicida...
  rationale: El texto presenta un paralelo de comparación bajo el cual alguien sufriría. «Como» conserva la estructura del griego y evita convertir la frase en una explicación causal más fuerte de la que el texto da.
  doctrine_reference: 1 Pedro 4:15; lectura sintáctica de ὡς en listas comparativas
- issue: Sentido de ἀλλοτριεπίσκοπος sin sobrecarga eclesiástica
  english_pob_reading: a meddler
  chosen_spanish_reading: entremetido
  alternative_spanish_readings:
  - busybody
  - fisgón
  - interferente
  rationale: El compuesto contiene el elemento de «vigilar/inspeccionar», pero en contexto funciona negativamente como intromisión en asuntos ajenos. «Entremetido» preserva la fuerza del reproche sin importar al español un matiz eclesiástico de «obispo» que no está en la intención del pasaje.
  doctrine_reference: BDAG; principio de evitar sobreinterpretar el elemento -ἐπίσκοπος
translation_notes:
  revision_awareness: La redacción inglesa más reciente redujo «a meddler in other people's affairs» a «a meddler» para evitar ampliación interpretativa. En español se siguió esa misma cautela al usar «entremetido», un término breve que comunica la intromisión sin expandir el matiz del compuesto.
  spanish_consistency_notes:
  - Se mantuvo «como» para ὡς en cada miembro del paralelo, preservando la cadencia y la comparación del griego.
  - 'Se eligieron sustantivos de vicio de registro bíblico pero comprensible: «homicida», «ladrón», «malhechor», «entremetido».'
  - No se introdujo «Cristo», «SEÑOR» ni otra terminología no presente en el versículo.
  - La nota al pie recoge la alternativa semántica relevante sin reemplazar el término principal del texto.
