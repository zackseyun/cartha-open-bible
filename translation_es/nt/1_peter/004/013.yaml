    unchanged: false
    changes_summary: 'Replaced ''the Messiah'' with ''Christ'' to reflect the Greek proper title more naturally in this epistle, and revised the final phrase from ''rejoice, exulting'' to ''rejoice with exultation'' for more natural formal English while preserving both χαρῆτε and ἀγαλλιώμενοι. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Pero en la medida en que participan de los sufrimientos de Mesías[a], alégrense, para que también en la revelación[b] de su gloria se alegren con júbilo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los sufrimientos de Cristo’. Se mantiene ‘Mesías’ porque Χριστός aquí funciona como título.
    reason: alternative_reading
  - marker: b
    text: O ‘manifestación’ o ‘desvelamiento’. La forma griega puede expresarse con estas alternativas, aunque ‘revelación’ preserva mejor el sustantivo del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὸ
  english_pob_choice: insofar as
  chosen_spanish: en la medida en que
  alternatives_spanish:
  - según
  - hasta el punto en que
  lexicon: BDAG
  rationale: Expresa con naturalidad el valor proporcional de la cláusula y conserva la idea de grado, no solo de tiempo o comparación.
- source_word: κοινωνεῖτε
  english_pob_choice: you share in
  chosen_spanish: participan de
  alternatives_spanish:
  - tienen parte en
  - son copartícipes de
  lexicon: BDAG
  rationale: ‘Participan de’ comunica participación real en algo sufrido, sin reducirlo a simpatía emocional ni volverlo demasiado técnico.
- source_word: τοῖς τοῦ Χριστοῦ παθήμασιν
  english_pob_choice: the sufferings of Messiah
  chosen_spanish: los sufrimientos de Mesías
  alternatives_spanish:
  - los sufrimientos de Cristo
  - los padecimientos del Mesías
  lexicon: BDAG
  rationale: Se mantiene el título Χριστός como ‘Mesías’, siguiendo la preferencia del proyecto para el valor titulado del término. ‘Sufrimientos’ conserva el sentido de πάθημα sin suavizarlo.
- source_word: χαίρετε
  english_pob_choice: rejoice
  chosen_spanish: alégrense
  alternatives_spanish:
  - regocíjense
  - gócense
  lexicon: BDAG
  rationale: Es un imperativo natural en español bíblico contemporáneo y preserva la llamada a una alegría activa y visible.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Marca de forma clara la relación de propósito/resultados entre el sufrimiento compartido y el futuro gozo.
- source_word: ἀποκαλύψει
  english_pob_choice: revelation
  chosen_spanish: revelación
  alternatives_spanish:
  - manifestación
  - desvelamiento
  - aparición
  lexicon: BDAG
  rationale: Mantiene la forma nominal del griego y funciona bien en español para la disclosure futura de la gloria.
- source_word: δόξης αὐτοῦ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - la gloria que le pertenece
  - la gloria de él
  lexicon: BDAG
  rationale: Traducción posesiva directa y idiomática; no añade explicaciones que el verso no explicita.
- source_word: χαρῆτε
  english_pob_choice: you may also rejoice
  chosen_spanish: se alegren
  alternatives_spanish:
  - también se regocijen
  - puedan alegrarse también
  lexicon: BDAG
  rationale: Conserva el segundo verbo de alegría en subjuntivo y mantiene la coherencia léxica con χαίρετε dentro de un español fluido.
- source_word: ἀγαλλιώμενοι
  english_pob_choice: with exultation
  chosen_spanish: con júbilo
  alternatives_spanish:
  - exultando
  - rebosando de gozo
  lexicon: BDAG
  rationale: ‘Con júbilo’ reproduce el matiz intensificado sin volver la frase pesada ni perder el tono celebrativo del participio.
theological_decisions:
- issue: Cómo renderizar Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se conserva el valor titular del término y su trasfondo mesiánico. No se adopta ‘Cristo’ como forma fija porque el proyecto privilegia ‘Mesías’ cuando Χριστός funciona como título.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2; Contested terms table for Χριστός'
- issue: Naturaleza de la participación en los sufrimientos
  english_pob_reading: share in the sufferings of Messiah
  chosen_spanish_reading: participan de los sufrimientos de Mesías
  alternative_spanish_readings:
  - comparten los sufrimientos de Mesías
  - participan en los sufrimientos de Mesías
  rationale: El griego expresa participación en sufrimientos asociados con el Mesías. La redacción mantiene esa relación sin explicarla doctrinalmente en exceso, preservando la tensión entre sufrimiento presente y gozo futuro.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Relación entre el gozo presente y el futuro
  english_pob_reading: rejoice ... so that ... you may also rejoice with exultation
  chosen_spanish_reading: alégrense ... para que también ... se alegren con júbilo
  alternative_spanish_readings:
  - regocíjense ... para que también ... regocíjense con júbilo
  - alégrense ... para que también ... exulten
  rationale: La doble reiteración de χαίρω se preserva con dos formas de ‘alegrarse’, y ἀγαλλιώμενοι queda como intensificación del gozo futuro, no como un verbo distinto desligado del primero.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical correspondence where rhetorically significant'
translation_notes:
  revision_awareness: El texto sigue la revisión final del expediente al tratar Χριστός como título, pero ajusta el término a la convención española del proyecto (‘Mesías’). También conserva la doble referencia al gozo de χαίρω/ἀγαλλιάω mediante ‘alégrense’ y ‘con júbilo’, evitando diluir el participio final. La cláusula ἵνα se traduce con un giro natural de propósito (‘para que’), y se mantiene la tensión participativa del sufrimiento sin añadir una explicación soteriológica explícita.
  spanish_consistency_notes:
  - Se usa ‘Mesías’ para Χριστός en el texto principal, conforme al estándar del proyecto.
  - Se distingue entre la alegría exhortada ahora (‘alégrense’) y la alegría futura intensificada (‘con júbilo’).
  - ‘Revelación’ se mantiene para ἀποκάλυψις, en coherencia con el sustantivo nominal griego.
  - No se introduce ‘SEÑOR’ ni otra sustitución devocional, ya que el verso no contiene el Tetragrámaton ni κύριος aplicado aquí al nombre divino.
