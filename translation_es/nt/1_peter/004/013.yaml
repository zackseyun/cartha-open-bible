  text: ἀλλὰ καθὸ κοινωνεῖτε τοῖς τοῦ Χριστοῦ παθήμασιν χαίρετε, ἵνα καὶ ἐν τῇ ἀποκαλύψει τῆς δόξης αὐτοῦ χαρῆτε ἀγαλλιώμενοι.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/013.yaml
  text: But insofar as you share in the sufferings of Messiah[a], rejoice[b], so that at the revelation of his glory you may also rejoice with exultation.
  footnotes:
  - marker: a
    text: Or 'Christ's sufferings.' The Greek title Χριστός is rendered 'Messiah' here because it functions as a title.
    reason: alternative_reading
  - marker: b
    text: Or 'at the unveiling of his glory.'
    reason: lexical_alternative
