revisions:
- from: Como cada uno ha recibido un don[a], sírvanlo unos a otros como buenos administradores de la multiforme gracia de Dios.
  to: Como cada uno ha recibido un don, úsenlo para servirse[a] unos a otros como buenos mayordomos de la variada gracia de Dios.
  rationale: Se reemplaza ‘sírvanlo unos a otros’ por ‘úsenlo para servirse unos a otros’ para reflejar con naturalidad el sentido de αὐτὸ διακονοῦντες εἰς ἑαυτούς. Se corrige la nota para preservar alternativas reales de εἰς ἑαυτούς. También se ajusta ‘administradores’ a ‘mayordomos’ para representar mejor οἰκονόμοι y ‘multiforme’ a ‘variada’ por mayor naturalidad y mejor alineación con el inglés auditado.
  reviewer_model: gpt-5.4
