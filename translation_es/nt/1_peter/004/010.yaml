translation:
  language: es
  text: Como cada uno ha recibido un don, úsenlo para servirse[a] unos a otros como buenos mayordomos de la variada gracia de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “entre ustedes”, “para el bien de los demás” o “unos a otros”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada uno de ustedes
  - todo el que
  lexicon: BDAG
  rationale: Mantiene el valor distributivo singular de ἕκαστος de manera natural en español y conserva el énfasis en la responsabilidad individual.
- source_word: ἔλαβεν
  english_pob_choice: has received
  chosen_spanish: ha recibido
  alternatives_spanish:
  - recibió
  - le fue dado
  lexicon: BDAG
  rationale: El perfecto español expresa un hecho ya ocurrido con relevancia presente, en paralelo con el inglés y sin añadir explícitamente el dador.
- source_word: χάρισμα
  english_pob_choice: gift
  chosen_spanish: don
  alternatives_spanish:
  - regalo
  - don espiritual
  lexicon: BDAG
  rationale: ‘Don’ en español conserva la amplitud de χάρισμα como regalo concedido por gracia, sin estrecharlo innecesariamente a la categoría técnica de ‘don espiritual’.
- source_word: εἰς ἑαυτοὺς
  english_pob_choice: among yourselves
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre ustedes
  - para con los demás
  lexicon: BDAG
  rationale: La construcción reflexiva plural apunta a la comunidad creyente como esfera y beneficiaria del servicio; ‘unos a otros’ comunica esa reciprocidad de forma natural en español.
- source_word: αὐτὸ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - ese don
  - él
  lexicon: BDAG
  rationale: El pronombre retoma directamente a χάρισμα; ‘lo’ es la referencia pronominal más simple y fluida en español.
- source_word: διακονοῦντες
  english_pob_choice: serving
  chosen_spanish: sirvan
  alternatives_spanish:
  - sirviendo
  - ministren
  lexicon: BDAG
  rationale: El participio presente tiene fuerza exhortativa en el contexto; en español, el imperativo plural ‘sirvan’ transmite con naturalidad la instrucción. Se evita ‘ministren’ por su tono eclesiástico más estrecho.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - cual
  lexicon: BDAG
  rationale: 'Introduce la manera o condición bajo la cual deben servir: en calidad de buenos administradores.'
- source_word: καλοὶ
  english_pob_choice: good
  chosen_spanish: buenos
  alternatives_spanish:
  - fieles
  - excelentes
  lexicon: BDAG
  rationale: ‘Buenos’ es la equivalencia directa y natural para καλοί en este contexto, sin cargar la frase con una interpretación de fidelidad que el adjetivo no exige por sí solo.
- source_word: οἰκονόμοι
  english_pob_choice: stewards
  chosen_spanish: administradores
  alternatives_spanish:
  - mayordomos
  - encargados de casa
  lexicon: BDAG
  rationale: Aunque ‘mayordomos’ es posible, ‘administradores’ comunica hoy con claridad la idea de personas encargadas de bienes ajenos; evita la connotación doméstica más estrecha de ‘stewards’ en ciertas variedades del español.
- source_word: ποικίλης
  english_pob_choice: varied
  chosen_spanish: multiforme
  alternatives_spanish:
  - variada
  - diversa
  lexicon: BDAG
  rationale: ‘Multiforme’ conserva la idea de diversidad real de manifestaciones de la gracia y sigue una tradición bíblica española bien asentada, sin reducirla a mera variedad externa.
- source_word: χάριτος θεοῦ
  english_pob_choice: of God’s varied grace
  chosen_spanish: de la multiforme gracia de Dios
  alternatives_spanish:
  - de la variada gracia de Dios
  - de la gracia variada de Dios
  lexicon: BDAG
  rationale: 'Se mantiene el genitivo posesivo: la gracia pertenece a Dios. El orden español es natural y conserva el matiz de diversidad de esa gracia.'
theological_decisions:
- issue: 'Alcance de χάρισμα: don general o don espiritual técnico'
  english_pob_reading: gift
  chosen_spanish_reading: don
  alternative_spanish_readings:
  - don espiritual
  - regalo
  rationale: La palabra griega es amplia y no obliga a la etiqueta técnica ‘don espiritual’. ‘Don’ preserva la amplitud lexical y deja que el contexto eclesial determine la aplicación.
  doctrine_reference: Principio de primacía del texto original y preservación de la amplitud lexical.
- issue: 'Fuerza de εἰς ἑαυτούς: dirección del servicio'
  english_pob_reading: use it in serving one another
  chosen_spanish_reading: sírvanlo unos a otros
  alternative_spanish_readings:
  - úsenlo sirviendo entre ustedes
  - sírvanlo para el bien de los demás
  rationale: La lectura inglesa revisada enfatiza el servicio mutuo. En español, ‘unos a otros’ expresa esa reciprocidad de forma clara sin oscurecer la dirección comunitaria del original.
  doctrine_reference: Equivalencia óptima con preservación de la tensión comunitaria.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB, que pasó de una formulación más literal (“serving it among yourselves”) a otra más natural (“use it in serving one another”). La versión española refleja esa misma decisión, manteniendo el referente del don y la reciprocidad comunitaria del servicio.
  spanish_consistency_notes:
  - Se usa ‘don’ para χάρισμα, consistente con el valor amplio de regalo concedido por gracia.
  - Se evita ‘SEÑOR’ porque el versículo no contiene κύριος ni alusión directa al nombre divino.
  - Se mantiene ‘Dios’ como traducción de θεοῦ y se conserva el posesivo explícito en español.
  - ‘Multiforme’ se eligió por claridad y tradición bíblica, sin perder el matiz de ποικίλης.
  - El pronombre enclítico ‘lo’ conserva la referencia al ‘don’ sin añadir contenido interpretativo.
