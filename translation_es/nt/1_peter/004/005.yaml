  to: Ellos rendirán cuenta al que está preparado para juzgar a los vivos y a los muertos[a].
  rationale: Se hace una reparación menor para mejorar el registro y la naturalidad del español sin alterar el sentido ni la decisión teológica del original auditado. 'Está preparado' comunica mejor la prontitud judicial del participio griego en un español bíblico digno, mientras la nota conserva 'está listo' como alternativa y mantiene la explicación del literal griego.
