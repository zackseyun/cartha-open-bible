translation:
  language: es
  text: Ellos rendirán cuenta al que está preparado para juzgar a los vivos y a los muertos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «está listo para juzgar». La expresión griega, en sentido literal, describe a uno que «tiene prontitud para juzgar».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἳ
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - quienes
  - los cuales
  lexicon: BDAG
  rationale: El pronombre relativo remite a los mencionados en el versículo anterior. En español, iniciar con 'Ellos' conserva la referencia clara y suena natural en una frase judicial.
- source_word: ἀποδώσουσιν λόγον
  english_pob_choice: will give an account
  chosen_spanish: rendirán cuenta
  alternatives_spanish:
  - darán cuenta
  - presentarán cuenta
  lexicon: BDAG
  rationale: La expresión idiomática griega significa dar cuenta o responder de uno mismo. 'Rendirán cuenta' conserva el sentido forense/judicial y es idiomático en español.
- source_word: τῷ
  english_pob_choice: to the one
  chosen_spanish: al que
  alternatives_spanish:
  - al uno que
  - a quien
  lexicon: BDAG
  rationale: El artículo con el participio funciona sustantivamente. 'Al que' mantiene la construcción abierta del griego sin nombrar todavía al referente.
- source_word: ἑτοίμως
  english_pob_choice: ready
  chosen_spanish: listo
  alternatives_spanish:
  - preparado
  - dispuesto
  lexicon: BDAG
  rationale: El adverbio comunica prontitud o disposición. 'Listo' es natural en español y comunica la idea de disponibilidad inmediata para juzgar.
- source_word: ἔχοντι κρῖναι
  english_pob_choice: stands ready to judge
  chosen_spanish: está listo para juzgar
  alternatives_spanish:
  - está preparado para juzgar
  - tiene prontitud para juzgar
  lexicon: BDAG
  rationale: Literalmente, la frase describe a alguien que tiene disposición para juzgar. 'Está listo para juzgar' preserva la idea de preparación presente sin volverla rígida.
- source_word: ζῶντας καὶ νεκρούς
  english_pob_choice: the living and the dead
  chosen_spanish: a los vivos y a los muertos
  alternatives_spanish:
  - a los que viven y a los que han muerto
  - a vivos y muertos
  lexicon: BDAG
  rationale: La expresión es fórmula escatológica convencional. 'A los vivos y a los muertos' conserva el paralelismo y la amplitud del alcance del juicio.
theological_decisions:
- issue: Identidad del que juzga
  english_pob_reading: Kept as 'the one' rather than explicitly naming God or Messiah/Christ in the main text.
  chosen_spanish_reading: Se mantuvo 'al que' sin identificarlo explícitamente como Dios ni como Mesías/Cristo en el texto principal.
  alternative_spanish_readings:
  - a Dios que está listo para juzgar
  - al Mesías que está listo para juzgar
  - a Cristo que está listo para juzgar
  rationale: El griego no nombra explícitamente al juez aquí. Para preservar la tensión teológica del pasaje y seguir el rastro auditado de POB, la traducción conserva la expresión sustantivada abierta.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en la revisión más reciente. La presente versión española sigue de cerca las decisiones léxicas y teológicas ya verificadas, sin añadir identificación explícita del juez.
  spanish_consistency_notes:
  - Se prefirió 'rendirán cuenta' por su valor forense y su naturalidad en español.
  - Se evitó 'SEÑOR' o una identificación explícita del juez, porque el griego mantiene una referencia participial abierta.
  - Se usó 'vivos y muertos' como fórmula escatológica estable y transparente.
  - La nota al pie conserva la alternativa verbal que refleja más literalmente la construcción griega de 'tener prontitud para juzgar'.
