revisions:
- from: indagando acerca de qué persona o qué tiempo el Espíritu de Mesías que estaba en ellos daba a entender[a], al testificar de antemano los padecimientos para Mesías y las glorias después de estas cosas.
  to: indagando acerca de qué persona o qué tiempo el Espíritu del Mesías en ellos daba a entender[a], al testificar de antemano los padecimientos relativos al Mesías y las glorias después de estas cosas.
  rationale: 'Se hicieron ajustes menores pero necesarios para fidelidad idiomática y precisión: «del Mesías» en lugar de «de Mesías» por español natural; «en ellos» integrado sin subordinación pesada; y «padecimientos relativos al Mesías» en lugar de «para Mesías» para preservar la ambigüedad de εἰς sin crear una frase extraña en español. La nota alternativa tradicional se conserva tal como corresponde.'
