translation:
  language: es
  text: indagando acerca de qué persona o qué tiempo el Espíritu del Mesías en ellos daba a entender[a], al testificar de antemano los padecimientos relativos al Mesías y las glorias después de estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los padecimientos del Mesías».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐραυνῶντες
  english_pob_choice: inquiring
  chosen_spanish: indagando
  alternatives_spanish:
  - inquirendo
  - investigando
  lexicon: BDAG
  rationale: El participio expresa una búsqueda activa y continuada. «Indagando» conserva el matiz de examen o averiguación sin sonar rígido en español.
- source_word: εἰς τίνα ἢ ποῖον καιρόν
  english_pob_choice: into what person or what time
  chosen_spanish: acerca de qué persona o qué tiempo
  alternatives_spanish:
  - sobre qué persona o qué tiempo
  - en cuanto a qué persona o qué tiempo
  lexicon: BDAG
  rationale: La expresión griega combina una pregunta personal y otra temporal. «Acerca de» mantiene el movimiento de la indagación y evita forzar la sintaxis española.
- source_word: ἐδήλου
  english_pob_choice: was indicating
  chosen_spanish: daba a entender
  alternatives_spanish:
  - indicaba
  - estaba indicando
  - manifestaba
  lexicon: BDAG
  rationale: El imperfecto sugiere una acción de señalamiento en curso. «Daba a entender» reproduce bien el valor de indicar sin sonar demasiado técnico.
- source_word: τὸ ἐν αὐτοῖς πνεῦμα Χριστοῦ
  english_pob_choice: the Spirit of the Messiah in them
  chosen_spanish: el Espíritu de Mesías que estaba en ellos
  alternatives_spanish:
  - el Espíritu del Mesías que estaba en ellos
  - el Espíritu de Cristo que estaba en ellos
  lexicon: BDAG
  rationale: Se conserva la referencia al Espíritu relacionado con Mesías y su presencia «en ellos». En español, «Espíritu de Mesías» resulta menos natural que «Espíritu del Mesías», pero se mantiene la terminología del proyecto sin sustituirla por «Cristo».
- source_word: προμαρτυρόμενον
  english_pob_choice: as it testified beforehand
  chosen_spanish: al testificar de antemano
  alternatives_spanish:
  - dando testimonio de antemano
  - testificando previamente
  lexicon: BDAG
  rationale: La forma participial explica cómo daba a entender. «Al testificar de antemano» conserva el valor de testimonio previo y la relación temporal del prefijo προ-.
- source_word: τὰ εἰς Χριστὸν παθήματα
  english_pob_choice: the sufferings for Messiah
  chosen_spanish: los padecimientos para Mesías
  alternatives_spanish:
  - los padecimientos del Mesías
  - los sufrimientos del Mesías
  - los padecimientos acerca de Mesías
  lexicon: BDAG
  rationale: Se mantiene la fuerza de εἰς con una construcción relacional que no reduce automáticamente la frase a posesión. «Padecimientos» refleja bien παθήματα y conserva el tono bíblico.
- source_word: Χριστόν
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Según el criterio del proyecto, Χριστός como título se traduce «Mesías».
- source_word: τὰς μετὰ ταῦτα δόξας
  english_pob_choice: the glories after these things
  chosen_spanish: las glorias después de estas cosas
  alternatives_spanish:
  - las glorias posteriores
  - las glorias que vendrían después
  lexicon: BDAG
  rationale: La pluralidad de δόξας y la referencia temporal se conservan con una formulación directa y transparente.
theological_decisions:
- issue: Relación del Espíritu con Mesías en los profetas
  english_pob_reading: Retain the direct wording 'the Spirit of the Messiah in them' without paraphrastic reduction.
  chosen_spanish_reading: Mantener «el Espíritu de Mesías que estaba en ellos» sin explicarlo como una simple inspiración profética.
  alternative_spanish_readings:
  - el Espíritu profético que hablaba de Mesías
  - el Espíritu dado por Mesías
  rationale: El texto presenta al Espíritu como activo en los profetas. La traducción conserva esa relación directa y no la aplana en una paráfrasis menos precisa.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Sentido de εἰς en τὰ εἰς Χριστὸν παθήματα
  english_pob_reading: Render as 'the sufferings destined for the Messiah' in the main text, while preserving 'the sufferings of the Messiah' in a footnote.
  chosen_spanish_reading: 'Traducir con una relación preposicional abierta: «los padecimientos para Mesías», dejando posible la lectura tradicional en nota.'
  alternative_spanish_readings:
  - los padecimientos del Mesías
  - los padecimientos del Mesías destinados
  rationale: La construcción es ambigua y no conviene cerrarla indebidamente. La opción principal preserva la relación marcada por εἰς; la nota mantiene la alternativa más conocida.
  doctrine_reference: Translation philosophy §3; Contested terms table for Χριστός
translation_notes:
  revision_awareness: 'He tomado en cuenta las dos rondas de revisión señaladas en el contexto inglés: una que tendió a uniformar Χριστός como «Cristo» y otra que restauró «Mesías». También observé que la revisión final retiró «destined for» por no estar explícito; por eso la versión española evita esa especificación y conserva una relación preposicional más abierta.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός en coherencia con el criterio doctrinal del proyecto.
  - Se conserva la pluralidad de «glorias» como en el griego.
  - «Padecimientos» se usa para παθήματα por su registro bíblico y por su cercanía semántica.
  - La nota permite la lectura alternativa tradicional sin borrar la ambigüedad del sintagma εἰς Χριστόν παθήματα.
