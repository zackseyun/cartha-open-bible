translation:
  language: es
  text: porque toda carne es como la hierba[a], y toda su gloria es como la flor de la hierba; la hierba se secó, y la flor cayó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la humanidad». El griego dice literalmente «toda carne», eco de Isaías 40:6, y subraya la mortalidad humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Introduce la base causal de la cita bíblica de manera natural en español y conserva el valor explicativo de la conjunción griega.
- source_word: πᾶσα σὰρξ
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda humanidad
  - toda persona
  lexicon: BDAG
  rationale: Se conserva el sentido literal de σάρξ como 'carne' en una cita sobre la fragilidad y mortalidad humanas. 'Carne' mantiene el eco intertextual de Isaías 40:6 y evita suavizar la metáfora.
- source_word: ὡς χόρτος
  english_pob_choice: is like grass
  chosen_spanish: es como la hierba
  alternatives_spanish:
  - es como el pasto
  - es como la vegetación
  lexicon: BDAG
  rationale: '''Hierba'' comunica bien el referente vegetal y sugiere transitoriedad en español bíblico contemporáneo, sin perder el valor comparativo de ὡς.'
- source_word: πᾶσα δόξα αὐτῆς
  english_pob_choice: all its glory
  chosen_spanish: toda su gloria
  alternatives_spanish:
  - todo su esplendor
  - toda su honra
  lexicon: BDAG
  rationale: '''Gloria'' conserva la conexión léxica bíblica de δόξα. El posesivo femenino singular ''su'' sigue al singular colectivo ''carne'' y reproduce el referente del griego.'
- source_word: ὡς ἄνθος χόρτου
  english_pob_choice: is like the flower of grass
  chosen_spanish: es como la flor de la hierba
  alternatives_spanish:
  - es como la flor del pasto
  - es como la flor del campo
  lexicon: BDAG
  rationale: La construcción genitiva se vierte de forma natural en español y conserva la imagen de una flor ligada a la hierba, como en el texto griego y su trasfondo de Isaías.
- source_word: ἐξηράνθη
  english_pob_choice: withered
  chosen_spanish: se secó
  alternatives_spanish:
  - se marchitó
  - se secó por completo
  lexicon: BDAG
  rationale: El verbo describe el secarse de la hierba. 'Se secó' es claro y natural en español, y mantiene la imagen de desecación sin añadir intensidad no expresada.
- source_word: ἐξέπεσεν
  english_pob_choice: fell off
  chosen_spanish: se cayó
  alternatives_spanish:
  - cayó
  - se desprendió
  lexicon: BDAG
  rationale: La acción final expresa la caída de la flor; 'se cayó' es una forma simple y comprensible en español. Aunque 'se desprendió' haría más explícita la imagen, el griego permite una formulación breve.
theological_decisions:
- issue: Traducción de σάρξ en una cita sobre mortalidad humana
  english_pob_reading: all flesh
  chosen_spanish_reading: toda carne
  alternative_spanish_readings:
  - toda humanidad
  - toda persona
  rationale: 'El contexto no es moral sino existencial: la precariedad de la vida humana. Por eso se mantiene ''carne'' y no se reemplaza por una expresión interpretativa. Así se preserva tanto la fuerza del término como el eco de Isaías 40:6.'
  doctrine_reference: 'DOCTRINE.md: Contestación de términos para σάρξ; filosofía de traducción sobre usos literales y metafóricos'
- issue: Posesivo de δόξα referido a un sustantivo colectivo singular
  english_pob_reading: all its glory
  chosen_spanish_reading: toda su gloria
  alternative_spanish_readings:
  - toda la gloria de ella
  - toda la gloria humana
  rationale: El griego usa αὐτῆς con σάρξ en singular colectivo. El español conserva ese referente con 'su', evitando disolver la relación sintáctica y semántica del original.
  doctrine_reference: BDAG sobre δόξα; observación gramatical del griego en el texto base
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del texto fuente en inglés que unificó la cita con punto y coma en lugar de punto, para reflejar mejor la continuidad del pasaje. En español se mantuvo la misma estructura con punto y coma, sin añadir cambios léxicos innecesarios.
  spanish_consistency_notes:
  - Se conservó 'carne' como traducción de σάρξ, no 'naturaleza humana' ni 'humanidad', para mantener el valor literal y el eco intertextual.
  - Se eligió 'gloria' para δόξα, conforme al valor bíblico del término y al audit trail en inglés.
  - La puntuación reproduce una sola sentencia con punto y coma, siguiendo la revisión aprobada del texto fuente.
  - El estilo busca ser moderno y reverente, sin arcaísmos innecesarios ni paráfrasis amplificadas.
