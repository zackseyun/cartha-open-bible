translation:
  language: es
  text: Habiendo purificado[a] sus propias almas por la obediencia a la verdad, para un amor fraternal[b] sincero, ámense unos a otros con fervor de corazón[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘habiendo limpiado’.
    reason: lexical_alternative
  - marker: b
    text: Es decir, amor de familia entre creyentes; el término incluye a hermanas y hermanos.
    reason: theological_note
  - marker: c
    text: Algunos manuscritos leen ‘de un corazón puro’.
    reason: textual_variant
lexical_decisions:
- source_word: ἡγνικότες
  english_pob_choice: having purified
  chosen_spanish: Habiendo purificado
  alternatives_spanish:
  - habiendo limpiado
  - ya que han purificado
  lexicon: BDAG
  rationale: El participio perfecto expresa una acción completada con efecto continuo previa al imperativo principal. "Habiendo purificado" conserva esa relación participial en español sin forzar causalidad adicional.
- source_word: ψυχὰς
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - seres
  lexicon: BDAG
  rationale: '"Almas" es el equivalente léxico directo y mantiene la referencia a la vida interior y a la persona en su interioridad, sin reducir el término a mera emoción o conducta externa.'
- source_word: ἐν τῇ ὑπακοῇ τῆς ἀληθείας
  english_pob_choice: by obedience to the truth
  chosen_spanish: por la obediencia a la verdad
  alternatives_spanish:
  - en obediencia a la verdad
  lexicon: BDAG
  rationale: La preposición con dativo puede expresar medio o esfera. "Por la obediencia a la verdad" comunica en español el valor instrumental de manera natural y mantiene el enlace con la verdad del evangelio.
- source_word: ἀληθείας
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  lexicon: BDAG
  rationale: Se conserva el artículo porque está presente en griego. En este contexto apunta a la verdad cristiana concreta, no solo a la verdad abstracta.
- source_word: εἰς φιλαδελφίαν ἀνυπόκριτον
  english_pob_choice: for sincere brotherly love
  chosen_spanish: para un amor fraternal sincero
  alternatives_spanish:
  - para un amor entre hermanos sin hipocresía
  - para un amor de hermanos y hermanas sincero
  lexicon: BDAG
  rationale: '"Filadelfía" se expresa como "amor fraternal" para conservar el parentesco léxico con el término griego y distinguirlo del verbo siguiente para "amar". "Sincero" comunica de forma idiomática el sentido de "sin hipocresía".'
- source_word: φιλαδελφίαν
  english_pob_choice: brotherly love
  chosen_spanish: amor fraternal
  alternatives_spanish:
  - amor entre hermanos
  - amor de hermanos y hermanas
  lexicon: BDAG
  rationale: El término denota amor de familia/hermanos. "Amor fraternal" preserva la forma léxica y la distinción con ἀγαπάω. La amplitud inclusiva se puede indicar en nota sin perder la huella del término.
- source_word: ἐκ καρδίας
  english_pob_choice: from the heart
  chosen_spanish: desde el corazón
  alternatives_spanish:
  - de corazón
  - con todo el corazón
  lexicon: BDAG
  rationale: La preposición expresa origen o procedencia. "Desde el corazón" conserva con naturalidad ese matiz y mantiene el texto base sin introducir el adjetivo de la variante textual.
- source_word: ἀγαπήσατε
  english_pob_choice: love
  chosen_spanish: ámense
  alternatives_spanish:
  - ámense unos a otros
  - amen
  lexicon: BDAG
  rationale: El imperativo aoristo exhorta a una acción decidida. En español, la forma reflexiva recíproca expresa con claridad el objeto mutuo de ἀλλήλους sin perder el tono exhortativo.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - mutuamente
  lexicon: BDAG
  rationale: '"Unos a otros" es la equivalencia recíproca natural en español y funciona bien en el estilo exhortativo elevado de la carta.'
- source_word: ἐκτενῶς
  english_pob_choice: earnestly
  chosen_spanish: con fervor
  alternatives_spanish:
  - ardientemente
  - con empeño
  lexicon: BDAG
  rationale: El adverbio expresa intensidad y persistencia. "Con fervor" es una solución digna y comprensible en español, más natural que una calca literal y suficientemente fuerte para el mandato.
theological_decisions:
- issue: Distinción entre φιλαδελφία y ἀγαπάω en el mismo versículo
  english_pob_reading: Render φιλαδελφία as 'brotherly love' and ἀγαπήσατε as 'love' to preserve the rhetorical progression from familial affection to the broader imperative of love.
  chosen_spanish_reading: Traducir φιλαδελφία como "amor fraternal" y ἀγαπήσατε como "ámense" para conservar la progresión retórica entre el amor familiar de creyentes y el mandato general de amarse mutuamente.
  alternative_spanish_readings:
  - traducir ambos con "amor"
  - usar "caridad" para ἀγαπάω
  rationale: El griego usa dos términos afines pero distintos. Mantener esa diferencia ayuda a reflejar la textura del texto sin imponer una separación doctrinal mayor que la que el versículo afirma.
  doctrine_reference: 'Translation philosophy #5 (consistency of key terms) and Contested terms table for ἀγάπη → love'
- issue: Alcance de φιλαδελφία en relación con el lenguaje inclusivo
  english_pob_reading: Keep 'brotherly love' in the main text, with an explanatory footnote that the term refers to familial love among fellow believers, including sisters.
  chosen_spanish_reading: Usar "amor fraternal" en el texto principal y explicitar en nota que se trata del amor de familia entre creyentes, incluyendo a las hermanas.
  alternative_spanish_readings:
  - amor entre creyentes
  - amor de hermanos y hermanas
  rationale: El campo léxico es específicamente familiar/sororal-fraternal. "Amor fraternal" preserva el dato del original; la inclusividad se aclara sin borrar la forma léxica.
  doctrine_reference: 'Translation philosophy #4 (gender-accurate over gender-neutral)'
- issue: Variante textual después de ἐκ καρδίας
  english_pob_reading: Translate the SBLGNT text 'from the heart' without adding 'pure.'
  chosen_spanish_reading: Traducir "desde el corazón" sin añadir "puro" al cuerpo principal.
  alternative_spanish_readings:
  - desde un corazón puro
  - de un corazón puro
  rationale: La lectura base proporcionada es ἐκ καρδίας. La variante con "puro" debe quedar documentada, pero no incorporarse al texto principal contra la base textual indicada.
  doctrine_reference: Textual criticism / SBLGNT base text
translation_notes:
  revision_awareness: Se revisó la lectura base SBLGNT y el audit trail inglés; no se adoptó la variante textual con ‘puro’ en el cuerpo principal. La relación participio–imperativo y la distinción entre φιλαδελφία y ἀγαπάω se preservaron en español.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantuvo "amor fraternal" para φιλαδελφία y "ámense" para ἀγαπάω, evitando neutralizar la distinción léxica.
  - '"Desde el corazón" reproduce ἐκ καρδίας sin importar la variante textual minoritaria al texto principal.'
  - La puntuación y el registro buscan ser publicables y litúrgicamente legibles en español neutro latinoamericano.
