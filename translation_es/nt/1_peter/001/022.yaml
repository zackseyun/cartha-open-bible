  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección 'amor fraternal' para φιλαδελφία y 'ámense' para ἀγαπήσατε está alineada con la justificación léxica y teológica auditada. Las notas también preservan la alternativa léxica y la variante textual de forma adecuada.
