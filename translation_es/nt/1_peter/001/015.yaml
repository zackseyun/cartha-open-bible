translation:
  language: es
  text: Pero, así como el que los llamó es santo, también ustedes sean santos en toda su conducta[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en toda su manera de vivir». El término griego puede referirse al conjunto de la vida y la conducta habitual.
    reason: lexical_alternative
  - marker: b
    text: O «lleguen a ser santos». El imperativo griego puede destacar el entrar en este estado o manifestarlo, aunque «sean santos» es la exhortación más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: Aquí introduce contraste con la conducta anterior; en español, «sino» conserva bien el giro exhortativo contrastivo sin sonar excesivamente pesado.
- source_word: κατὰ
  english_pob_choice: as
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  lexicon: BDAG
  rationale: Con acusativo y referente personal, expresa correspondencia o conformidad. «Conforme a» comunica esa idea con naturalidad y mantiene el matiz de patrón de referencia.
- source_word: τὸν καλέσαντα ὑμᾶς
  english_pob_choice: who called you
  chosen_spanish: el Santo que los llamó
  alternatives_spanish:
  - el que los llamó
  - quien los llamó
  lexicon: BDAG
  rationale: El participio articular funciona como sustantivo. En español, «el Santo que los llamó» preserva el referente personal y conecta con el predicado siguiente; «que los llamó» refleja bien la cláusula relativa.
- source_word: ἅγιον
  english_pob_choice: the Holy One
  chosen_spanish: el Santo
  alternatives_spanish:
  - el Uno Santo
  - el que es santo
  lexicon: BDAG
  rationale: El adjetivo predicativo modifica al referente del participio. «El Santo» conserva la referencia a Dios y el peso teológico del título sin necesitar expansión explicativa.
- source_word: καὶ αὐτοὶ
  english_pob_choice: you yourselves also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - ustedes mismos también
  - también ustedes
  lexicon: BDAG
  rationale: El griego es enfático; en español, el énfasis puede quedar implícito por el contexto y el verbo imperativo. «Ustedes también» conserva la relación de correspondencia sin sobrecargar la frase.
- source_word: ἅγιοι
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - santos/consagrados
  - sagrados
  lexicon: BDAG
  rationale: Para mantener la repetición léxica con ἅγιον y el valor moral/covenantal del término en este llamado, «santos» es el equivalente más natural y eclesialmente inteligible en español.
- source_word: ἐν πάσῃ ἀναστροφῇ
  english_pob_choice: in all your conduct
  chosen_spanish: en toda su conducta
  alternatives_spanish:
  - en toda su manera de vivir
  - en todo su estilo de vida
  lexicon: BDAG
  rationale: ἀναστροφή denota manera de vivir o conducta. «Conducta» es breve, clara y moralmente precisa; «toda» refleja πάσῃ y el posesivo implícito se naturaliza en español.
- source_word: γενήθητε
  english_pob_choice: be
  chosen_spanish: sean
  alternatives_spanish:
  - lleguen a ser
  - háganse
  lexicon: BDAG
  rationale: El aoristo imperativo de γίνομαι puede tener fuerza ingresiva o resultativa. En español, «sean» expresa la exhortación de forma natural; «lleguen a ser» sería posible, pero suena más interpretativo.
theological_decisions:
- issue: Correspondencia entre la santidad del que llama y la santidad exigida a los creyentes
  english_pob_reading: the Holy One who called you is holy ... you yourselves also be holy
  chosen_spanish_reading: el Santo que los llamó ... ustedes también sean santos
  alternative_spanish_readings:
  - el que los llamó es santo ... ustedes también sean santos
  - el Santo que los llamó ... ustedes también sean consagrados
  rationale: El griego une el carácter del que llama con la identidad exigida a los llamados. Mantener «el Santo» y repetir «santos» preserva esa correspondencia sin añadir paráfrasis doctrinales.
  doctrine_reference: 1 Pedro 1:15; Levítico 19:2
- issue: Fuerza del imperativo γίνομαι en este contexto
  english_pob_reading: be holy
  chosen_spanish_reading: sean santos
  alternative_spanish_readings:
  - lleguen a ser santos
  - háganse santos
  rationale: La exhortación apunta a la condición visible y práctica de los creyentes en su conducta. «Sean santos» es idiomático en español y no impone una lectura procesual más fuerte de la que el texto exige.
  doctrine_reference: 1 Pedro 1:15; 1 Pedro 1:16
translation_notes:
  revision_awareness: La revisión inglesa más reciente agregó explícitamente «is holy» para hacer completa la comparación. Por eso el español nombra directamente al referente como «el Santo» y conserva una estructura que une su santidad con la de los creyentes sin depender de una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el tetragrámaton; aquí no aplica porque el texto griego usa el título «el Santo».
  - Se evita «señor» o «SEÑOR» porque el referente inmediato es el adjetivo sustantivado «el Santo», no κύριος.
  - Se conserva «santos» para ἅγιοι y «Santo» para ἅγιον, preservando la repetición léxica del original.
  - «Conducta» traduce ἀναστροφή con un registro neutral y moralmente claro, sin limitarlo a actos aislados.
