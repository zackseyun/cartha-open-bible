    rationale: 'El griego y la revisión inglesa auditada hacen explícita la comparación: «the Holy One who called you is holy». El borrador español solo dice «conforme al Santo que los llamó», lo cual atenúa y parcialmente omite el predicado ἅγιον aplicado al llamador.'
  - severity: medium
    issue: «sino» no es la adversativa más natural en esta formulación española
    rationale: Aunque ἀλλὰ marca contraste, en español «sino» suele esperar una negación correlativa más estrecha. «Pero» o «más bien» funciona mejor aquí, especialmente al comienzo de una exhortación completa.
  - severity: low
    issue: Se pierde el matiz enfático de καὶ αὐτοὶ
    rationale: «Ustedes también» es aceptable, pero «también ustedes» refleja un poco mejor la colocación enfática sin sonar forzado. No es un error mayor, solo una mejora posible.
