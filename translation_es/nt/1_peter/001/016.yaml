translation:
  language: es
  text: 'porque está escrito[a]: «Serán santos, porque yo soy santo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más directamente como mandato: «Sean santos». El griego sigue la formulación de la cita bíblica con una forma futura: «serán santos».'
    reason: alternative_reading
lexical_decisions:
- source_word: διότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la base causal de la exhortación anterior. «Porque» es natural en español moderno y conserva el valor causal.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  lexicon: BDAG
  rationale: La fórmula perfecta pasiva funciona como introducción estable de cita bíblica. «Está escrito» conserva el sentido idiomático y la autoridad perdurable del texto citado.
- source_word: Ἅγιοι
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - santos y consagrados
  - apartados
  lexicon: BDAG
  rationale: En español, «santo» puede funcionar como equivalente más natural y teológicamente sobrio de ἅγιος en este contexto ético y covenantal. «Apartados» captura un matiz, pero es demasiado estrecho para la cita que exige semejanza moral a Dios.
- source_word: ἔσεσθε
  english_pob_choice: you shall be
  chosen_spanish: Sean
  alternatives_spanish:
  - Serán
  - Sean ustedes
  lexicon: BDAG
  rationale: El futuro griego en la cita de Levítico tiene fuerza exhortativa/mandativa. En español, el subjuntivo exhortativo «Sean» preserva esa fuerza sin sonar forzado, aunque no reproduce la forma futura de manera literal.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: BDAG
  rationale: Se mantiene el pronombre explícito porque pertenece a la autoafirmación enfática de la cita divina.
- source_word: ἅγιος
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - apartado
  lexicon: BDAG
  rationale: Se traduce de modo consistente con el adjetivo anterior. La cita fundamenta la santidad del creyente en la santidad propia de Dios, por lo que conviene conservar el mismo campo léxico.
theological_decisions:
- issue: Fuerza del futuro ἔσεσθε en la cita de santidad
  english_pob_reading: You shall be holy
  chosen_spanish_reading: Sean santos
  alternative_spanish_readings:
  - Serán santos
  - Debéis ser santos
  rationale: El griego cita el texto bíblico en futuro, pero ese futuro puede funcionar con tono mandativo. En español, el subjuntivo exhortativo expresa mejor esa fuerza normativa que un simple futuro predictivo, sin convertir la cita en paráfrasis.
  doctrine_reference: Principio de equivalencia óptima; mantener la tensión entre cita literal e imperativo implícito.
- issue: Relación causal entre la cita y el fundamento divino
  english_pob_reading: because I am holy
  chosen_spanish_reading: porque yo soy santo
  alternative_spanish_readings:
  - pues yo soy santo
  - porque soy santo
  rationale: La causalidad queda clara y la primera persona enfática se conserva. No se atenúa la referencia a la santidad divina como fundamento del llamado ético.
  doctrine_reference: Santidad de Dios como fundamento de la santidad del pueblo (cf. Levítico 19:2).
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se conservó la fórmula de cita bíblica, la causalidad de διότι y la tensión interpretativa del futuro ἔσεσθε. En español, el futuro exhortativo se resolvió con subjuntivo exhortativo («Sean santos») para que la lectura sea natural y a la vez fiel a la función de la cita.'
  spanish_consistency_notes:
  - Se mantuvo «santo» de manera uniforme para ἅγιος en ambos usos del versículo.
  - Se evitó «SEÑOR» o sustitutos reverenciales porque el texto griego no contiene κύριος aquí.
  - La puntuación con dos puntos después de «está escrito» introduce adecuadamente la cita directa en español.
