review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la estructura causal («porque está escrito») y la razón teológica («porque yo soy santo»), pero no preserva de manera suficiente la decisión auditada del POB sobre ἔσεσθε. El griego usa futuro («seréis/serán» en sentido de cita legal-exhortativa), y el English POB decidió mantener esa forma con ‘You shall be holy’, dejando ‘Be holy’ solo en nota. El español principal «Sean santos» traslada bien la fuerza imperativa, pero invierte la prioridad documentada al poner en el texto la alternativa y relegar el futuro a la nota.
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «Está escrito» y «porque yo soy santo» suenan bien. La mejora necesaria es principalmente de fidelidad intertextual y de alineación con la filosofía del proyecto, no de fluidez. «Serán santos» funciona en español bíblico moderno; mejor aún, «Ustedes serán santos» sería más explícito pero menos litúrgico. «Serán santos» basta y conserva la dignidad de la cita.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Santos» para ἅγιοι/ἅγιος es correcto en este contexto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La única desalineación importante es metodológica: el proyecto pide preservar la forma futura cuando el POB la conserva por razón teológica e intertextual.'
  issues:
  - severity: high
    issue: La cláusula principal traduce ἔσεσθε como «Sean» en vez de un futuro.
    rationale: El English POB documenta explícitamente que debe preservarse la forma futura de la cita («You shall be holy») y dejar la lectura imperativa como alternativa en nota. «Sean santos» cambia esa prioridad interpretativa.
  - severity: medium
    issue: La nota al pie presenta «serán santos» como alternativa, cuando debería ser la forma principal.
    rationale: La documentación auditada trata la lectura imperativa como alternativa secundaria. En español, la nota debe reflejar esa misma jerarquía para no alterar la decisión exegética del registro.
  revised_spanish_text: 'porque está escrito[a]: «Serán santos, porque yo soy santo».'
