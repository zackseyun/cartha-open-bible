review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: condición con «si», Dios como Padre y juez imparcial, criterio «según la obra de cada uno», exhortación a vivir «con temor» durante el tiempo presente. Sin embargo, dos elecciones no preservan del todo la fuerza y la naturalidad del original ni del rastro POB: «invocan como Padre» suena menos natural que una formulación con «llaman Padre» o «invocan como Padre al que…», y la nota a [a] repite esencialmente el texto en vez de dar la alternativa inglesa documentada. Más importante, «permanencia» debilita el matiz de παροικία como residencia extranjera/temporal, central en 1 Pedro.'
  spanish_quality_summary: 'El español es generalmente claro, pero mezcla registros: «invocan» con «conducíos» y «vuestra» produce una dicción algo irregular. «Conducíos» es aceptable, pero «permanencia» resulta abstracto y poco idiomático para un contexto de extranjería o residencia temporal. «Tiempo de vuestra estancia» fluye mejor y conserva mejor el sentido. También conviene reparar la nota [a] para que realmente ofrezca una alternativa.'
  glossary_alignment: 'No hay conflictos con los términos doctrinales principales del proyecto. «Padre», «temor» y el sentido de juicio imparcial están bien manejados. El punto clave es παροικία: el borrador no conserva suficientemente la noción de estancia como forasteros/residentes temporales que el inglés POB documenta con «sojourn».'
  issues:
  - severity: medium
    issue: «permanencia» para παροικίας
    rationale: «Permanencia» comunica duración, pero no el matiz de residencia como extranjero o transeúnte. El inglés POB y la evidencia léxica destacan «sojourn/exile/temporary residence», por lo que en español conviene algo como «estancia» o «vida como forasteros».
  - severity: medium
    issue: Nota [a] no ofrece una alternativa real
    rationale: La nota dice «O “invocan como Padre”», que esencialmente repite el texto principal y no corresponde a la alternativa auditada «call on as Father». Debe ofrecer una variante española genuina, por ejemplo «O “invocan al Padre”».
  - severity: low
    issue: «invocan como Padre» es algo rígido
    rationale: Es defendible, pero en español bíblico natural suena más directo «llaman Padre» o, manteniendo la fuerza cultual, «invocan como Padre». Dado que la elección es posible, basta una reparación menor del entorno para mejorar la naturalidad general.
  revised_spanish_text: Y si invocan como Padre[a] al que juzga imparcialmente según la obra de cada uno, conducíos con temor[b] durante el tiempo de vuestra estancia[c].
  revised_footnotes:
  - marker: a
    text: O «invocan al Padre».
    reason: lexical_alternative
  - marker: b
    text: O «con reverencia» o «con reverente temor».
    reason: lexical_alternative
  - marker: c
    text: O «durante el tiempo de vuestra estancia como forasteros». El término griego puede denotar vida como extranjero o residente temporal.
    reason: lexical_alternative
  revision_rationale: Se conserva la mayor parte del borrador, pero se corrige «permanencia» a «estancia» para reflejar mejor παροικία, y se repara la nota [a] para que sí preserve la alternativa léxica auditada. El resultado mantiene el sentido fuente, la tensión teológica de «temor» y una lectura española más natural.
