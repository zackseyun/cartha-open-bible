translation:
  language: es
  text: Y si invocan como Padre[a] al que juzga imparcialmente según la obra de cada uno, conducíos con temor[b] durante el tiempo de vuestra estancia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «invocan al Padre».
    reason: lexical_alternative
  - marker: b
    text: O «con reverencia» o «con reverente temor».
    reason: lexical_alternative
  - marker: c
    text: O «durante el tiempo de vuestra estancia como forasteros». El término griego puede denotar vida como extranjero o residente temporal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικαλεῖσθε
  english_pob_choice: call as
  chosen_spanish: invocan como
  alternatives_spanish:
  - invocan
  - llaman como
  - claman a como
  lexicon: BDAG
  rationale: El verbo medio aquí expresa dirigirse a Dios con el título de Padre. «Invocan como» conserva la acción de dirigirse a Dios y la estructura predicativa de πατέρα, sin volverla torpe en español.
- source_word: πατέρα
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - un padre
  lexicon: BDAG
  rationale: 'El acusativo sin artículo funciona como predicativo: se nombra a Dios como Padre. En español, «Padre» capitalizado expresa correctamente ese referente divino.'
- source_word: ἀπροσωπολήμπτως
  english_pob_choice: impartially
  chosen_spanish: imparcialmente
  alternatives_spanish:
  - sin hacer acepción de personas
  - sin parcialidad
  lexicon: BDAG
  rationale: El adverbio señala que Dios juzga sin favorecer apariencias o estatus. «Imparcialmente» es natural y fiel; «sin hacer acepción de personas» sería más tradicional pero menos directo como adverbio.
- source_word: κρίνοντα
  english_pob_choice: judges
  chosen_spanish: juzga
  alternatives_spanish:
  - juzgando
  - es el que juzga
  lexicon: BDAG
  rationale: El participio presente describe a Dios en función sustantiva. En español, el verbo finito «juzga» en la relativa suena natural y mantiene la idea de acción continua.
- source_word: κατὰ τὸ ἑκάστου ἔργον
  english_pob_choice: according to each person's work
  chosen_spanish: según la obra de cada uno
  alternatives_spanish:
  - según la obra de cada persona
  - conforme a la obra de cada uno
  lexicon: BDAG
  rationale: La preposición con acusativo expresa norma o criterio. «La obra de cada uno» conserva el singular colectivo de ἔργον sin forzar una lectura doctrinal sobre meritorios o méritos.
- source_word: ἐν φόβῳ
  english_pob_choice: in fear
  chosen_spanish: con temor
  alternatives_spanish:
  - en temor
  - con reverencia
  - con reverente temor
  lexicon: BDAG
  rationale: φόβος puede abarcar temor, reverencia o temor reverente. «Con temor» preserva la tensión teológica del texto en vez de resolverla prematuramente en «reverencia».
- source_word: παροικίας
  english_pob_choice: sojourn
  chosen_spanish: permanencia
  alternatives_spanish:
  - estancia forastera
  - destierro
  - peregrinación
  lexicon: BDAG
  rationale: El término puede referirse a vida como extranjero o residente temporal. «Permanencia» comunica duración temporal en español; la nota mantiene abierta la alternativa de «estancia forastera» o «destierro» según contexto.
- source_word: ἀναστράφητε
  english_pob_choice: conduct yourselves
  chosen_spanish: conducíos
  alternatives_spanish:
  - portaos
  - vivid
  - comportaos
  lexicon: BDAG
  rationale: El imperativo aoristo de ἀναστρέφω suele referirse a la conducta de vida. «Conducíos» es fiel, formal y adecuado para registro bíblico sin sonar arcaizante.
theological_decisions:
- issue: φόβος ante Dios como Padre y Juez
  english_pob_reading: Retain 'fear' in the main text
  chosen_spanish_reading: Retener «temor» en el texto principal
  alternative_spanish_readings:
  - reverencia
  - temor reverente
  - reverente temor
  rationale: La frase une la intimidad de llamar a Dios Padre con su juicio imparcial. Traducir con «temor» conserva esa tensión moral y relacional; suavizarlo a «reverencia» reduciría la fuerza exhortativa del pasaje.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica.'
- issue: Juicio según la obra de cada uno
  english_pob_reading: Translate straightforwardly as 'according to each person's work' without importing a doctrinal system
  chosen_spanish_reading: 'Traducir de forma directa: «según la obra de cada uno»'
  alternative_spanish_readings:
  - según sus obras
  - conforme a las obras de cada uno
  - según el obrar de cada uno
  rationale: El griego formula un criterio de juicio sin desarrollar aquí un sistema doctrinal completo. La traducción debe mantener esa formulación abierta y no introducir precisiones ajenas al texto.
  doctrine_reference: 'Affirmations + Translation philosophy: no imponer un marco denominacional.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de SBLGNT y el trazo auditado de la POB en inglés. Se mantuvieron las tensiones léxicas documentadas: φόβος no se resolvió únicamente como «reverencia», παροικία quedó como un término de permanencia temporal con nota alternativa, y el juicio imparcial según la obra de cada uno se tradujo sin expandirlo doctrinalmente. No hubo cambios relevantes respecto del último pase de revisión en inglés, por lo que el español refleja un ajuste directo y estable a partir de la misma base auditada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; aquí no aparece.
  - Se eligió «Padre» con mayúscula por referencia a Dios.
  - «Conducíos» mantiene el tono bíblico y la forma imperativa plural.
  - Las notas a, b y c corresponden exactamente a los marcadores en el texto principal.
