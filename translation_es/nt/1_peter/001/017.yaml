revisions:
- from: Y si invocan como Padre[a] al que juzga imparcialmente según la obra de cada uno, conducíos con temor[b] durante el tiempo de vuestra permanencia[c].
  to: Y si invocan como Padre[a] al que juzga imparcialmente según la obra de cada uno, conducíos con temor[b] durante el tiempo de vuestra estancia[c].
  rationale: Se conserva la mayor parte del borrador, pero se corrige «permanencia» a «estancia» para reflejar mejor παροικία, y se repara la nota [a] para que sí preserve la alternativa léxica auditada. El resultado mantiene el sentido fuente, la tensión teológica de «temor» y una lectura española más natural.
  reviewer_model: gpt-5.4
