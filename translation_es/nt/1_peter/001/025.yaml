translation:
  language: es
  text: Pero la palabra del Señor permanece para siempre.[a] Y esta es la palabra que les fue anunciada como buenas noticias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que fue predicada como buenas noticias a ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥῆμα
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - decir
  lexicon: BDAG
  rationale: ῥῆμα puede denotar una palabra dicha, dicho o mensaje. 'Palabra' conserva la repetición del texto y mantiene el eco intertextual de Isaías 40:8 en el contexto inmediato, sin volver la frase artificial en español.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Maestro
  lexicon: BDAG
  rationale: El griego κύριος aquí funciona como título divino en la cita bíblica y en la aplicación apostólica. 'Señor' reproduce ese valor reverencial; se evita 'Yahvé' en esta cláusula porque el texto griego cita κύριος y la formulación española del versículo mantiene el lenguaje del NT y de la cita.
- source_word: μένει
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - permanece firme
  - subsiste
  - queda
  lexicon: BDAG
  rationale: μένω expresa continuidad duradera. 'Permanece' comunica bien la permanencia sin añadir matices no presentes en el griego.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: BDAG
  rationale: La locución idiomática indica duración sin fin. 'Para siempre' es la equivalencia natural y clara en español moderno.
- source_word: τὸ εὐαγγελισθὲν
  english_pob_choice: that was proclaimed as good news
  chosen_spanish: que fue proclamada como buenas noticias
  alternatives_spanish:
  - que fue anunciada como evangelio
  - que fue predicada como evangelio
  - que les fue anunciada como buenas noticias
  lexicon: BDAG
  rationale: El participio de εὐαγγελίζω conserva el sentido verbal de anunciar buenas noticias. 'Fue proclamada como buenas noticias' evita imponer el sustantivo 'evangelio' como si fuera una glosa automática y hace explícito el valor de la acción proclamadora. Se mantiene la referencia al mensaje, no a una mera predicación genérica.
- source_word: εἰς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - hacia ustedes
  lexicon: BDAG
  rationale: Con εὐαγγελίζω, εἰς + acusativo señala dirección hacia los oyentes. 'Para ustedes' comunica naturalmente en español la destinación del anuncio; 'a ustedes' también sería posible, pero 'para' refleja mejor el beneficio y la orientación del mensaje sin sobreexplicar.
theological_decisions:
- issue: La relación entre la cita de Isaías y la aplicación apostólica al evangelio
  english_pob_reading: Retain 'the word of the Lord' in the citation and identify it in the second clause as the gospel message proclaimed to the readers.
  chosen_spanish_reading: Mantener 'la palabra del Señor' en la cita y luego identificarla como la palabra proclamada como buenas noticias a los lectores.
  alternative_spanish_readings:
  - '''el mensaje del Señor'' en toda la frase'
  - fusionar ambas cláusulas como una sola referencia al evangelio
  rationale: 'La estructura del versículo conserva una tensión interpretativa: primero cita la permanencia de la palabra de Yahvé/Señor, y luego aplica esa palabra al anuncio del evangelio a los destinatarios. La traducción mantiene esa relación sin aplanarla en una paráfrasis explicativa.'
  doctrine_reference: 1 Pedro 1:25; Isaías 40:8; principios de correspondencia textual y continuidad canónica
- issue: Cómo rendir εὐαγγελισθὲν sin borrar la fuerza verbal
  english_pob_reading: Translate with explicit 'good news' language rather than the noun 'gospel' alone.
  chosen_spanish_reading: Usar 'fue proclamada como buenas noticias' en vez de un sustantivo eclesiástico aislado.
  alternative_spanish_readings:
  - '''fue predicada como el evangelio'''
  - '''les fue anunciada como evangelio'''
  rationale: La forma verbal de εὐαγγελίζω exige que el español conserve la acción de anunciar buenas noticias. 'Buenas noticias' hace visible el contenido del evangelio sin sustituir el verbo por un tecnicismo que podría ocultar la dinámica del original.
  doctrine_reference: Lexicografía de εὐαγγελίζω; coherencia con el uso neotestamentario de la proclamación del evangelio
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que solo capitalizó 'But' al inicio de la oración y no alteró el sentido. La redacción española conserva la estructura de dos cláusulas y la fuerza verbal de εὐαγγελίζω.
  spanish_consistency_notes:
  - Se mantuvo 'palabra' de manera uniforme para ῥῆμα en ambas cláusulas.
  - Se prefirió 'Señor' como equivalente de κύριος conforme al uso del NT y al contexto de la cita.
  - '''Buenas noticias'' se usó para reflejar el valor verbal de εὐαγγελίζω sin convertirlo en una glosa doctrinal rígida.'
  - El verbo principal se tradujo en presente ('permanece') para reflejar la duratividad del original griego.
