  to: Por tanto, habiendo ceñido[a] los lomos de la mente de ustedes, estando plenamente sobrios[b], pongan su esperanza por completo en la gracia que se les trae[c] en la revelación de Jesús Mesías[d].
  rationale: Se corrige la incoherencia de número/persona, se mejora la naturalidad del español sin perder la metáfora ni el participio, y se afina la nota sobre νήφω para reflejar mejor su sentido figurado mental documentado en el audit trail. Se conserva «Jesús Mesías» conforme a la política del proyecto.
