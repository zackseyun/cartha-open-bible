translation:
  language: es
  text: Por tanto, habiendo ceñido[a] los lomos de la mente de ustedes, estando plenamente sobrios[b], pongan su esperanza por completo en la gracia que se les trae[c] en la revelación de Jesús Mesías[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «habiendo ceñido los lomos de la mente de ustedes»; es decir, preparando su mente para la acción.
    reason: lexical_alternative
  - marker: b
    text: 'O «estando plenamente claros de mente». El adverbio puede entenderse con «estando plenamente sobrios» o con la exhortación principal: «pongan por completo su esperanza».'
    reason: alternative_reading
  - marker: c
    text: O «la gracia que se les traerá». El participio presente puede oírse como una acción en curso o como una referencia futura en sentido escatológico.
    reason: alternative_reading
  - marker: d
    text: Aquí se traduce Χριστός como «Mesías» porque funciona como título.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Marca una conclusión inferencial a partir del contexto previo. «Por tanto» conserva ese valor formal y es natural en español bíblico contemporáneo.
- source_word: ἀναζωσάμενοι
  english_pob_choice: with ... girded up / having girded up
  chosen_spanish: habiendo ceñido
  alternatives_spanish:
  - habiendo ajustado
  - teniendo ceñidos
  lexicon: BDAG
  rationale: El verbo conserva la imagen de ceñirse para la acción. «Habiendo ceñido» reproduce el participio aoristo y mantiene el campo metafórico sin volverlo mera paráfrasis.
- source_word: τὰς ὀσφύας τῆς διανοίας ὑμῶν
  english_pob_choice: the loins of your mind
  chosen_spanish: los lomos de su mente
  alternatives_spanish:
  - la cintura de su mente
  - su mente preparada para la acción
  lexicon: BDAG
  rationale: Se preserva la metáfora corporal/mental del griego. «Lomos» mantiene la imagen fuerte; «mente» traduce διανοίας. Se evita sustituir la metáfora por una explicación en el texto principal.
- source_word: νήφοντες τελείως
  english_pob_choice: being fully sober / being fully clear-minded
  chosen_spanish: siendo plenamente sobrios
  alternatives_spanish:
  - manteniéndose plenamente alertas
  - siendo completamente sobrios en mente
  lexicon: BDAG
  rationale: νήφω tiene en el NT un uso figurado de sobriedad mental o vigilancia. «Plenamente sobrios» conserva la sobriedad figurada y el adverbio τελείως como intensidad/completitud.
- source_word: ἐλπίσατε
  english_pob_choice: set your hope
  chosen_spanish: pongan su esperanza
  alternatives_spanish:
  - fijen su esperanza
  - esperen
  lexicon: BDAG
  rationale: El imperativo aoristo expresa una orientación decidida. «Pongan su esperanza» comunica ese acto volitivo de manera clara y fiel en español.
- source_word: τὴν φερομένην ὑμῖν χάριν
  english_pob_choice: the grace being brought to you
  chosen_spanish: la gracia que se les está trayendo
  alternatives_spanish:
  - la gracia que les será dada
  - la gracia que viene hacia ustedes
  lexicon: BDAG
  rationale: Se conserva el participio pasivo presente con una construcción dinámica en español. «Se les está trayendo» refleja la forma verbal y mantiene la orientación futura/escatológica sin colapsarla en un simple futuro.
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - don gratuito
  lexicon: BDAG
  rationale: «Gracia» es el equivalente teológico y léxico estándar en este contexto petrino.
- source_word: ἐν ἀποκαλύψει
  english_pob_choice: at the revelation
  chosen_spanish: en la revelación
  alternatives_spanish:
  - al revelarse
  - cuando se revele
  lexicon: BDAG
  rationale: La preposición ἐν puede marcar esfera o tiempo; aquí se conserva «en» para reflejar la estructura griega y la relación con el evento revelatorio.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Χριστός se rinde como «Mesías» cuando funciona como título. Se preserva el valor cristológico/titular que el audit trail inglés documenta, evitando reducirlo a un nombre fijo.
theological_decisions:
- issue: Preservación de la metáfora de preparación mental
  english_pob_reading: Retain the metaphor 'the loins of your mind girded up' with an idiomatic alternative in a footnote.
  chosen_spanish_reading: Habiendo ceñido los lomos de su mente
  alternative_spanish_readings:
  - Preparando su mente para la acción
  - Teniendo la mente lista para actuar
  rationale: Se mantiene la imagen bíblica fuerte del griego, porque el texto la usa de forma deliberada. En español puede sonar inusual, pero sigue siendo inteligible y evita borrar la tensión metafórica documentada en el audit trail.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Valor figurado de νήφω
  english_pob_reading: being fully clear-minded / fully sober
  chosen_spanish_reading: siendo plenamente sobrios
  alternative_spanish_readings:
  - siendo plenamente claros de mente
  - manteniéndose vigilantes
  rationale: En el NT νήφω es figurado; en este contexto está ligado a la metáfora mental previa. «Sobrios» conserva el lexema tradicional y la idea de autocontrol/alerta sin limitarlo al alcohol.
  doctrine_reference: BDAG; translation philosophy §§1, 6
- issue: Rendición de Χριστός
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: El audit trail inglés documenta que Χριστός funciona como título y no solo como nombre fijo. «Mesías» preserva esa función titular en español y evita ocultar el sentido original.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός'
translation_notes:
  revision_awareness: 'El audit trail inglés conserva la metáfora de «girded up the loins of your mind», debate la ubicación de τελείως con νήφοντες o con ἐλπίσατε, y restituye «Messiah» para Χριστός tras una revisión que había cambiado indebidamente a «Christ». La presente versión española sigue esa línea: mantiene la metáfora principal, refleja la sobriedad figurada con «plenamente sobrios», conserva el aspecto participial de la gracia y traduce Χριστός como «Mesías» en concordancia con la política doctrinal documentada.'
  spanish_consistency_notes:
  - Se usa «gracia» de forma consistente para χάρις.
  - Se preserva «Mesías» para Χριστός en el texto principal.
  - La puntuación respeta la estructura de participios y del imperativo final.
  - «Su mente» se entiende como genérico plural contextual; no introduce una lectura individualizante.
  - El texto principal evita explicaciones extensas, reservándolas para las notas.
