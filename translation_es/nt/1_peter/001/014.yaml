translation:
  language: es
  text: como hijos de la obediencia[a], no se amolden a los deseos que antes tenían en su ignorancia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hijos obedientes». El griego dice literalmente: «hijos de obediencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - al modo de
  lexicon: BDAG
  rationale: En español, 'como' expresa de manera natural la relación de modo/identidad que introduce la exhortación, sin endurecer la frase ni añadir una comparación ajena al contexto.
- source_word: τέκνα ὑπακοῆς
  english_pob_choice: children of obedience
  chosen_spanish: hijos de la obediencia
  alternatives_spanish:
  - hijos obedientes
  - hijos de obediencia
  lexicon: BDAG
  rationale: Se conserva la construcción genitiva literal para mantener la fuerza identitaria del griego. 'Hijos de la obediencia' suena más fiel a la estructura original; 'hijos obedientes' suaviza la forma pero pierde parte del énfasis relacional.
- source_word: μὴ συσχηματιζόμενοι
  english_pob_choice: not conforming yourselves
  chosen_spanish: no conformándose
  alternatives_spanish:
  - no se amolden
  - no tomando la forma
  - no conformándoos
  lexicon: BDAG
  rationale: El participio medio/pasivo exhortativo se vierte con un gerundio negativo natural en español. 'No conformándose' conserva la idea de no adoptar un molde externo sin introducir un verbo más interpretativo.
- source_word: ταῖς ... ἐπιθυμίαις
  english_pob_choice: to the desires
  chosen_spanish: a los deseos
  alternatives_spanish:
  - a las pasiones
  - a las codicias
  - a los anhelos
  lexicon: BDAG
  rationale: '''Deseos'' sigue la decisión inglesa de no estrechar el campo semántico a ''lujurias''. En español, ''pasiones'' o ''codicias'' serían más marcadas; ''deseos'' mantiene amplitud y permite que el contexto moral la delimite.'
- source_word: πρότερον
  english_pob_choice: formerly had
  chosen_spanish: antes teníais
  alternatives_spanish:
  - anteriormente teníais
  - que antes os dominaban
  - que antes poseíais
  lexicon: BDAG
  rationale: El adverbio se integra de forma idiomática en español con 'antes teníais', dejando claro que esos deseos pertenecen a la vida previa de los destinatarios. Se evita sobreexplicar con un verbo de dominio que el texto no dice explícitamente.
- source_word: ἐν τῇ ἀγνοίᾳ ὑμῶν
  english_pob_choice: in your ignorance
  chosen_spanish: en vuestra ignorancia
  alternatives_spanish:
  - durante vuestra ignorancia
  - cuando erais ignorantes
  - en su ignorancia
  lexicon: BDAG
  rationale: '''Ignorancia'' conserva la referencia al estado previo de falta de conocimiento verdadero. ''Vuestra'' mantiene el valor de segunda persona plural del original y hace explícita la relación con los lectores.'
theological_decisions:
- issue: Cómo reflejar la expresión identitaria τέκνα ὑπακοῆς sin suavizarla a mero adjetivo
  english_pob_reading: children of obedience
  chosen_spanish_reading: hijos de la obediencia
  alternative_spanish_readings:
  - hijos obedientes
  - obedientes hijos
  rationale: 'Se preserva la fuerza del genitivo como etiqueta identitaria, no solo como cualidad. Esto mantiene la tensión retórica del texto: los creyentes son definidos por la obediencia como esfera o pertenencia, no únicamente descritos como personas obedientes.'
  doctrine_reference: 1 Pedro 1:14; principio de equivalencia óptima y preservación de la estructura fuente.
- issue: Cómo traducir συσχηματιζόμενοι sin perder la responsabilidad moral activa del lector
  english_pob_reading: not conforming yourselves
  chosen_spanish_reading: no conformándose
  alternative_spanish_readings:
  - no siendo conformados
  - no os conforméis
  rationale: La forma elegida expresa una prohibición continua y mantiene la dimensión reflexiva/participativa del participio en contexto paraenético. 'No os conforméis' suena más imperativo y menos participial; 'no siendo conformados' puede sonar demasiado pasivo.
  doctrine_reference: 1 Pedro 1:14; exhortación ética en forma participial.
translation_notes:
  revision_awareness: Se cotejó el griego SBLGNT con la traducción inglesa auditada. No se detectaron revisiones textuales relevantes en el expediente; se mantuvo la preferencia por una equivalencia óptima que preserve la construcción fuente y la exhortación moral del versículo.
  spanish_consistency_notes:
  - Se usa 'obediencia' para τέκνα ὑπακοῆς, siguiendo la decisión inglesa de mantener la estructura genitiva.
  - Se usa 'deseos' para ἐπιθυμίαι, evitando 'lujurias' por estrechez semántica innecesaria.
  - Se conserva 'ignorancia' como término ético-teológico para ἀγνοία.
  - La puntuación y el registro buscan ser naturales en español bíblico contemporáneo sin caer en paráfrasis.
