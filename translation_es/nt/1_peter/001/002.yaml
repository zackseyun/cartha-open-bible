    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:35:48Z'
    unchanged: false
    changes_summary: 'Changed ''Jesus Messiah'' to ''Jesus Christ'' for standard formal register and consistency with the Greek name-title; adjusted ''the sprinkling of the blood'' to ''sprinkling with the blood'' for more natural English while preserving the sense of ῥαντισμός αἵματος. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'según la presciencia de Dios Padre, en la santificación del Espíritu, para obediencia y rociamiento[a] con la sangre de Jesús Mesías[b]: gracia a ustedes y paz les sean multiplicadas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Rociamiento» conserva el sustantivo ritual ῥαντισμός. También podría traducirse «aspersión», pero esta opción mantiene con más transparencia la imagen del acto de rociar con sangre.
    reason: lexical_alternative
  - marker: b
    text: «Mesías» traduce Χριστός como título. La alternativa «Cristo» es posible en español, pero aquí se mantiene el valor titular que el proyecto asocia al término griego.
    reason: alternative_reading
lexical_decisions:
- source_word: κατὰ πρόγνωσιν
  english_pob_choice: according to the foreknowledge
  chosen_spanish: según el conocimiento previo
  alternatives_spanish:
  - de acuerdo con el conocimiento previo
  - conforme al conocimiento previo
  lexicon: BDAG
  rationale: κατά con acusativo expresa norma o conformidad; πρόγνωσις se puede verter como «conocimiento previo» para mantener la fuerza léxica sin resolver de antemano la discusión teológica sobre si implica solo presciencia o también elección.
- source_word: θεοῦ πατρός
  english_pob_choice: of God the Father
  chosen_spanish: de Dios Padre
  alternatives_spanish:
  - de Dios, el Padre
  - de Dios el Padre
  lexicon: BDAG
  rationale: La construcción genitiva identifica al sujeto del conocimiento previo. «Dios Padre» es natural en español y conserva el valor apposicional.
- source_word: ἐν ἁγιασμῷ πνεύματος
  english_pob_choice: in the sanctification of the Spirit
  chosen_spanish: en la santificación del Espíritu
  alternatives_spanish:
  - por la santificación del Espíritu
  - en santificación por el Espíritu
  lexicon: BDAG
  rationale: ἁγιασμός es el término técnico «santificación». El genitivo πνεύματος se entiende aquí como el Espíritu Santo; el español conserva esa relación con «del Espíritu» sin añadir interpretaciones causales no explicitadas por el griego.
- source_word: εἰς ὑπακοὴν
  english_pob_choice: for obedience
  chosen_spanish: para obediencia
  alternatives_spanish:
  - para la obediencia
  - con el fin de obediencia
  lexicon: BDAG
  rationale: εἰς marca finalidad. «Para obediencia» es breve y transparente; aunque pueda sonar nominal, reproduce bien el propósito del texto.
- source_word: καὶ ῥαντισμὸν αἵματος
  english_pob_choice: and sprinkling with the blood
  chosen_spanish: y rociamiento con la sangre
  alternatives_spanish:
  - y aspersión con la sangre
  - y rociar con la sangre
  lexicon: BDAG
  rationale: ῥαντισμός significa «rociamiento/aspersión». «Rociamiento» mantiene la imagen ritual y evita nivelarla demasiado con una paráfrasis; «con la sangre» conserva la construcción de medio/instrumento del griego.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: de Jesús Mesías
  alternatives_spanish:
  - de Jesucristo
  - de Jesús Cristo
  lexicon: BDAG
  rationale: Se mantiene «Mesías» para Χριστός conforme al criterio del proyecto cuando funciona como título. En español, el orden «Jesús Mesías» es comprensible y preserva el carácter titular; se evita «Cristo» como forma litúrgica por no ser la opción primaria aquí.
- source_word: χάρις ὑμῖν καὶ εἰρήνη πληθυνθείη
  english_pob_choice: Grace to you and peace be multiplied
  chosen_spanish: gracia y paz os sean multiplicadas
  alternatives_spanish:
  - gracia a vosotros y paz sean multiplicadas
  - que gracia y paz os sean multiplicadas
  lexicon: BDAG
  rationale: El saludo epistolar se vierte de forma natural en español manteniendo el optativo de deseo. «Sean multiplicadas» conserva πληθυνθείη sin suavizarlo a un mero «abunden».
theological_decisions:
- issue: Sentido de πρόγνωσις en relación con la elección
  english_pob_reading: Rendered neutrally as 'foreknowledge' without expanding to 'foreordaining love' or reducing to mere foresight.
  chosen_spanish_reading: Se vierte de manera neutral como «conocimiento previo» y no como «predestinación» ni como simple curiosidad anticipada.
  alternative_spanish_readings:
  - presciencia
  - predestinación
  - amor previo que elige
  rationale: El griego permite una discusión teológica real; la traducción debe conservar esa tensión sin cerrarla. «Conocimiento previo» deja abierta la cuestión entre presciencia y elección.
  doctrine_reference: Translation philosophy §3
- issue: Referente de πνεύματος
  english_pob_reading: Capitalized as 'the Spirit' to indicate the Holy Spirit.
  chosen_spanish_reading: Se entiende como el Espíritu Santo, explicitado en la capitalización de «Espíritu».
  alternative_spanish_readings:
  - espíritu
  - espíritu humano
  rationale: La estructura triádica del versículo favorece la referencia al Espíritu Santo. En español, la mayúscula comunica esa lectura sin añadir palabras al texto base.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Valor de Χριστοῦ
  english_pob_reading: Translated as the title 'Messiah' rather than retained as the name-like 'Christ.'
  chosen_spanish_reading: Se traduce como «Mesías» para conservar el valor titular de Χριστός.
  alternative_spanish_readings:
  - Cristo
  - el Cristo
  rationale: El término en este contexto funciona como título y no solo como nombre fijo. «Mesías» evita perder el sentido titular que el proyecto desea preservar.
  doctrine_reference: 'Contested terms table: Χριστός'
- issue: Imagen de ῥαντισμός αἵματος
  english_pob_reading: Likely echoes Old Testament covenant and purification imagery, especially Exodus 24:8.
  chosen_spanish_reading: «Rociamiento con la sangre» conserva la imagen ritual y su eco veterotestamentario.
  alternative_spanish_readings:
  - aspersión con la sangre
  - sprinkling with the blood
  rationale: La frase puede aludir a la sangre del pacto y a la purificación. Traducirla demasiado libremente borraría la alusión; mantener el lenguaje ritual deja visible la conexión bíblica.
  doctrine_reference: Éxodo 24:8; Hebreos 9:19-22
translation_notes:
  revision_awareness: El audit trail inglés mostró una oscilación entre «Jesus Messiah» y «Jesus Christ», además de un ajuste en la frase final para mayor naturalidad. Esta versión española sigue la decisión restaurada del proyecto de traducir Χριστός como «Mesías» y conserva la metáfora ritual de ῥαντισμός αἵματος sin reducirla a una paráfrasis más explicativa.
  spanish_consistency_notes:
  - Se mantiene «Dios Padre» como unidad apposicional natural en español.
  - «Espíritu» va con mayúscula por el referente trinitario del contexto.
  - No se usa «SEÑOR» para YHWH porque el versículo no contiene el nombre divino.
  - Se conserva el tono epistolar formal con «gracia y paz» y el optativo «sean multiplicadas».
