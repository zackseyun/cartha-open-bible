source:
  edition: SBLGNT
  text: κατὰ πρόγνωσιν θεοῦ πατρός, ἐν ἁγιασμῷ πνεύματος, εἰς ὑπακοὴν καὶ ῥαντισμὸν αἵματος Ἰησοῦ Χριστοῦ· χάρις ὑμῖν καὶ εἰρήνη πληθυνθείη.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/002.yaml
  text: 'according to the foreknowledge of God the Father[a], in the sanctification of the Spirit[c][b], for obedience and sprinkling with the blood of Jesus Messiah: Grace to you and peace be multiplied.'
  footnotes:
  - marker: a
    text: Or "Jesus Christ." The Greek title Χριστός can function in a name-like way in some contexts; here it is rendered "Messiah" to preserve its titular sense.
    reason: alternative_reading
  - marker: b
    text: '"Foreknowledge" translates πρόγνωσις. Interpreters differ on whether this emphasizes God''s prior knowledge, his prior choice, or both.'
    reason: lexical_alternative
  - marker: c
    text: The phrase "sprinkling of the blood" likely echoes Old Testament covenant and purification imagery, especially Exodus 24:8.
    reason: cross_reference
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
