review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura triádica del griego y conserva adecuadamente términos importantes como «santificación», «Espíritu» y «Mesías». Sin embargo, «conocimiento previo» debilita la correspondencia léxica con πρόγνωσις frente a la opción teológicamente más estable y transparente «presciencia». Además, el saludo final omite el dativo explícito ὑμῖν («a vosotros/ustedes»), y «os» no encaja con el objetivo de español neutral latinoamericano.
  spanish_quality_summary: 'El texto es mayormente claro, pero mezcla registro peninsular («os») con un objetivo de español neutral latinoamericano. «Rociamiento» es comprensible, aunque menos natural y eclesialmente reconocible que «aspersión»; aun así puede mantenerse si se justifica. Conviene ajustar el saludo para que suene natural y completo en español amplio: «gracia a ustedes y paz les sean multiplicadas».'
  glossary_alignment: 'Alineación parcial con el glosario del proyecto: «Mesías» para Χριστός está bien; «Espíritu» capitalizado también. No hay conflicto con Yahvé u otros términos por no aparecer aquí. La principal desalineación es «conocimiento previo» frente al inglés auditado «foreknowledge», que en español bíblico-teológico se representa mejor como «presciencia» para preservar el término técnico sin paráfrasis.'
  issues:
  - severity: medium
    issue: «conocimiento previo» para πρόγνωσις
    rationale: Aunque semánticamente posible, es más parafrástico que el término griego y menos fiel al rastro auditado, que busca preservar la tensión teológica con un sustantivo técnico. «Presciencia» o «conocimiento anticipado» serían más cercanos; «presciencia» es el equivalente teológico más establecido.
  - severity: medium
    issue: Uso de «os» en un texto orientado a español neutral latinoamericano
    rationale: El registro peninsular contradice la guía de estilo del proyecto. Debe sustituirse por «a ustedes / les» o una formulación igualmente neutral.
  - severity: medium
    issue: Omisión explícita de ὑμῖν en el saludo final
    rationale: '«gracia y paz os sean multiplicadas» comunica destinatario, pero en la revisión a español neutral conviene conservar explícitamente «a ustedes», ya que el griego sí incluye el dativo y el inglés auditado lo mantiene: «Grace to you and peace...».'
  - severity: low
    issue: Nota c innecesaria tras reformular el saludo
    rationale: Si se corrige el final a una forma neutral, no hace falta mantener una nota específica sobre «os sean multiplicadas»; basta dejar el optativo reflejado en el texto principal.
