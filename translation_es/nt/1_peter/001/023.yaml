translation:
  language: es
  text: habiendo nacido de nuevo[a], no de semilla perecedera, sino imperecedera, por la palabra viva y permanente de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la palabra del Dios vivo y permanente». Los participios griegos pueden entenderse con «palabra» o con «Dios», aunque el contexto favorece que modifiquen «palabra».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναγεγεννημένοι
  english_pob_choice: having been born again
  chosen_spanish: habiendo sido hechos nacer de nuevo
  alternatives_spanish:
  - habiendo nacido de nuevo
  - siendo regenerados
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa una acción completada con efecto vigente; en español, «habiendo sido hechos nacer de nuevo» conserva el pasivo y el resultado continuo sin convertir el giro en una paráfrasis doctrinal. «Regenerados» sería posible, pero menos transparente para el lector común.
- source_word: σπορᾶς
  english_pob_choice: seed
  chosen_spanish: semilla
  alternatives_spanish:
  - simiente
  - semilla de siembra
  lexicon: BDAG
  rationale: En el contraste metafórico con «perecedera/imperecedera», «semilla» es el equivalente natural y más claro en español. «Simiente» es tradicional, pero hoy suena más marcada o arcaizante.
- source_word: φθαρτῆς
  english_pob_choice: perishable
  chosen_spanish: perecedera
  alternatives_spanish:
  - corruptible
  - que se corrompe
  lexicon: BDAG
  rationale: «Perecedera» transmite bien la idea de algo destinado a pasar o deteriorarse y mantiene el contraste directo con «imperecedera». «Corruptible» es más técnico y menos natural en español moderno.
- source_word: ἀφθάρτου
  english_pob_choice: imperishable
  chosen_spanish: imperecedera
  alternatives_spanish:
  - incorruptible
  - que no perece
  lexicon: BDAG
  rationale: Se conserva el contraste léxico con φθαρτῆς mediante el par perecedera/imperecedera. «Incorruptible» es válido, pero puede sonar más tradicional y menos paralelo en ritmo.
- source_word: διὰ
  english_pob_choice: through
  chosen_spanish: por
  alternatives_spanish:
  - mediante
  - a través de
  lexicon: BDAG
  rationale: Con genitivo, διά expresa medio o instrumento. «Por» es la forma más natural y concisa en español, sin perder el sentido instrumental.
- source_word: λόγου
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - verbo
  lexicon: BDAG
  rationale: «Palabra» preserva el sentido léxico directo de λόγος y resulta idiomático en la expresión «la palabra de Dios». «Mensaje» sería más interpretativo.
- source_word: ζῶντος
  english_pob_choice: living
  chosen_spanish: viva
  alternatives_spanish:
  - vivo
  - viviente
  lexicon: BDAG
  rationale: Como participio adjetival, «viva» funciona naturalmente con «palabra» y mantiene el matiz de vida activa. «Vivo» sería gramaticalmente posible, pero menos idiomático aquí.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - de parte de Dios
  lexicon: BDAG
  rationale: 'El genitivo se entiende de modo directo como pertenencia o relación: «palabra de Dios». No se fuerza una explicación de origen que el texto no exige.'
- source_word: μένοντος
  english_pob_choice: abiding
  chosen_spanish: permanente
  alternatives_spanish:
  - que permanece
  - duradera
  lexicon: BDAG
  rationale: «Permanente» comunica la idea de continuidad y estabilidad en un español natural, y mantiene el vínculo con la discusión del texto sobre el carácter perdurable de la palabra. «Que permanece» sería más literal, pero menos fluido en la frase.
theological_decisions:
- issue: Si «viva» y «permanente» califican a «palabra» o a «Dios»
  english_pob_reading: 'Both participles modify ''word'': ''the living and abiding word of God'''
  chosen_spanish_reading: 'Ambos participios califican a «palabra»: «la palabra viva de Dios y permanente»'
  alternative_spanish_readings:
  - «la palabra del Dios vivo y permanente»
  - «la palabra del Dios vivo y que permanece»
  rationale: La concordancia gramatical favorece que ζῶντος y μένοντος concuerden con λόγου, no con θεοῦ. Por eso el texto principal deja «viva» y «permanente» pegados a «palabra». La alternativa se conserva porque en español la secuencia «de Dios y permanente» puede percibirse como ambigua sin puntuación adicional; el sentido alterno no se descarta por completo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión textual cuando existe ambigüedad real, sin resolverla de manera excesiva.'
translation_notes:
  revision_awareness: El testimonio griego y el audit trail inglés están en alta concordancia; no se detectaron revisiones materiales recientes que alteren la decisión principal. La redacción española sigue la lectura preferida por la gramática, manteniendo abierta la alternativa sintáctica documentada en el pie.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ, según el estándar del proyecto.
  - Se usa «palabra» para λόγος, no «mensaje», para conservar el vínculo intertextual con 1 Pedro 1:25.
  - Se conserva el par semántico perecedera/imperecedera para φθαρτῆς/ἀφθάρτου.
  - El pie de nota marca la ambigüedad real sobre el alcance de «viva» y «permanente» en español, sin imponer una resolución dogmática.
