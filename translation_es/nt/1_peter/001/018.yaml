review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: participio adverbial («sabiendo»), redención/rescate, separación «de» una antigua manera de vivir, y la negación del medio («no con cosas…»). Sin embargo, no preserva con suficiente fidelidad la segunda persona plural de ὑμῶν/ἐλυτρώθητε, porque cambia a «su/sus» en lugar de «su/ sus» correspondiente a ustedes o mejor «vuestra/sus» según registro; además la nota de persona verbal es innecesaria y editorialmente intrusiva. También conviene ajustar «corruptibles» a «perecederas», que representa mejor φθαρτοῖς en español actual y sigue más de cerca la decisión inglesa «perishable things».'
  spanish_quality_summary: El texto es comprensible, pero «fuiste[n] rescatados» con nota metalingüística rompe la lectura bíblica natural. «Rescatados» es defendible, aunque «redimidos» también sería válido; la opción actual mantiene bien la imagen de rescate. «Manera de vivir» suena natural. «Heredada de sus padres» es aceptable, pero debe concordar con el tratamiento de segunda persona plural del conjunto. La revisión propuesta mejora naturalidad, coherencia pronominal y legibilidad eclesial.
  glossary_alignment: No hay conflicto con términos troncales del proyecto como Yahvé, Mesías, Espíritu, etc. En cuanto a λυτρόομαι, «rescatados» es compatible con la documentación inglesa que permite «ransomed» como alternativa; no exige cambio. Para φθαρτοῖς, «perecederas» alinea mejor con el campo semántico documentado. Para πατροπαραδότου, se conserva explícitamente «padres» y se mantiene una nota con alternativa más amplia («antepasados») según la auditoría inglesa.
  issues:
  - severity: high
    issue: Incoherencia de persona gramatical en «fuiste[n]… de su… de sus padres»
    rationale: El griego está en segunda persona plural. El borrador mezcla una forma verbal marcada editorialmente con pronombres de tercera persona, lo que distorsiona la referencia y produce español poco natural.
  - severity: medium
    issue: Nota editorial [n] innecesaria y no motivada por el texto fuente
    rationale: La nota no preserva una variante textual ni una ambigüedad léxica del original; solo expone una vacilación editorial de estilo. Esto no debe ir en notas de traducción del versículo.
  - severity: medium
    issue: «Corruptibles» suena menos natural y menos preciso aquí que «perecederas»
    rationale: φθαρτοῖς en este contexto contrasta con lo no perecedero y con metales valiosos; «perecederas» comunica mejor transitoriedad/decadencia en español contemporáneo.
  - severity: low
    issue: Falta una nota para la alternativa de πατροπαραδότου preservada en la auditoría inglesa
    rationale: El inglés conserva la alternativa «inherited from your ancestors». En español conviene mantener esa alternativa en nota, especialmente porque «padres» puede entenderse estrictamente como progenitores inmediatos.
  revised_spanish_text: sabiendo que ustedes fueron rescatados de su vana manera de vivir, heredada de sus padres[a], no con cosas perecederas, como plata u oro,
  revised_footnotes:
