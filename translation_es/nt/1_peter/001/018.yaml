translation:
  language: es
  text: sabiendo que ustedes fueron rescatados de su vana manera de vivir, heredada de sus padres[a], no con cosas perecederas, como plata u oro,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «heredada de sus antepasados». Literalmente, «transmitida por sus padres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - conociendo
  - sabiendo que
  lexicon: BDAG
  rationale: El participio perfecto de οἶδα funciona aquí de manera adverbial, enlazando la afirmación con el mandato previo. «Sabiendo» conserva esa relación participial y suena natural en español contemporáneo.
- source_word: ἐλυτρώθητε
  english_pob_choice: you were redeemed
  chosen_spanish: fuiste[n] rescatados
  alternatives_spanish:
  - fueron redimidos
  - fueron liberados mediante rescate
  lexicon: BDAG
  rationale: λυτρόομαι expresa liberación mediante precio/rescate. «Rescatados» comunica bien el valor de rescate sin perder la referencia a pago; además permite mantener la tensión léxica que el contexto refuerza con plata y oro.
- source_word: φθαρτοῖς
  english_pob_choice: perishable things
  chosen_spanish: cosas corruptibles
  alternatives_spanish:
  - cosas perecederas
  - cosas sujetas a corrupción
  lexicon: BDAG
  rationale: El adjetivo se usa sustantivado y contrasta con el valor no perecedero implícito del rescate. «Corruptibles» reproduce mejor la idea de lo que se descompone o se corrompe, sin modernizar en exceso el campo semántico.
- source_word: ἀργυρίῳ ἢ χρυσίῳ
  english_pob_choice: such as silver or gold
  chosen_spanish: la plata o el oro
  alternatives_spanish:
  - plata u oro
  - con plata o con oro
  lexicon: BDAG
  rationale: Los dativos funcionan como ejemplos del medio de rescate. En español, la enumeración directa «la plata o el oro» es clara y conserva la oposición de metales preciosos sin forzar una glosa explicativa en el cuerpo del texto.
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - fuera de
  lexicon: BDAG
  rationale: 'La preposición marca separación/origen: rescate fuera de una forma anterior de vida. «De» es la forma española más natural y suficientemente precisa aquí.'
- source_word: ματαίας
  english_pob_choice: futile
  chosen_spanish: vana
  alternatives_spanish:
  - fútil
  - vacía
  - inútil
  lexicon: BDAG
  rationale: μάταιος expresa vaciedad, inutilidad y falta de resultado. «Vana» preserva bien la carga moral y existencial del término en un registro bíblico sobrio.
- source_word: ἀναστροφῆς
  english_pob_choice: way of life
  chosen_spanish: manera de vivir
  alternatives_spanish:
  - conducta
  - modo de vida
  lexicon: BDAG
  rationale: En 1 Pedro, ἀναστροφή suele referirse al comportamiento o estilo de vida. «Manera de vivir» es idiomática y suficientemente amplia para incluir conducta concreta y patrón de vida.
- source_word: πατροπαραδότου
  english_pob_choice: handed down from your fathers
  chosen_spanish: heredada de sus padres
  alternatives_spanish:
  - transmitida por sus padres
  - heredada de sus antepasados
  lexicon: BDAG
  rationale: El adjetivo significa literalmente «entregado/trasmitido por los padres». «Heredada de sus padres» conserva el lenguaje paterno explícito y comunica el sentido de tradición recibida, manteniendo la tensión entre literalidad y naturalidad.
theological_decisions:
- issue: Imagen de redención/rescate
  english_pob_reading: redeemed
  chosen_spanish_reading: rescatados
  alternative_spanish_readings:
  - redimidos
  - comprados mediante rescate
  rationale: El verbo griego apunta a liberación mediante pago. «Rescatados» expresa esa fuerza sin fijar aún el mecanismo doctrinal; el contraste con metales preciosos mantiene el trasfondo de precio de rescate.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Referencia paternal de la tradición recibida
  english_pob_reading: from your fathers
  chosen_spanish_reading: de sus padres
  alternative_spanish_readings:
  - de sus antepasados
  rationale: El griego dice explícitamente «de los padres». Se mantiene el lenguaje paternal en lugar de neutralizarlo, porque la traducción debe reflejar la forma original y no borrar el rasgo heredado documentado.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión auditada indica high_agreement y sin cambios necesarios; este borrador sigue de cerca el análisis léxico ya aprobado, manteniendo la tensión entre redención por rescate y la imagen de cosas corruptibles, y preservando la referencia paternal de πατροπαραδότου.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque el verso no contiene Χριστός.
  - Se usa «rescatados» para preservar el matiz de λυτρόομαι sin sobreexplicar el mecanismo.
  - Se conserva el lenguaje de «padres» por fidelidad al griego y por coherencia con la política de traducción documentada.
