    text: 'O: «heredada de sus antepasados». Literalmente, «transmitida por sus padres».'
    reason: lexical_alternative
  revision_rationale: Se elimina la nota editorial de persona, se restablece una referencia consistente en segunda persona plural con español natural, se ajusta φθαρτοῖς a «perecederas» por claridad y fidelidad semántica, y se conserva en nota la alternativa más amplia para πατροπαραδότου documentada por la auditoría inglesa. «Rescatados» se mantiene como opción válida para la imaginería de λυτρόομαι.
