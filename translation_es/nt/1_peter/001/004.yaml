translation:
  language: es
  text: para una herencia imperecedera e inmaculada e inmarcesible, reservada en los cielos[a] para ustedes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el cielo». El griego usa el plural «los cielos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κληρονομίαν
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  - herencia
  lexicon: BDAG
  rationale: «Herencia» comunica con claridad la idea de un bien recibido por designación familiar y mantiene el sentido escatológico del término sin cargarlo de arcaísmo. «Heredad» sería posible, pero en español bíblico moderno suena más marcado y menos natural.
- source_word: ἄφθαρτον
  english_pob_choice: imperishable
  chosen_spanish: imperecedera
  alternatives_spanish:
  - incorruptible
  - imperecedera
  - incaduca
  lexicon: BDAG
  rationale: «Imperecedera» expresa bien la ausencia de desgaste, ruina o destrucción y resulta idiomática en español actual. Evita el tono más técnico o eclesiástico de «incorruptible».
- source_word: ἀμίαντον
  english_pob_choice: undefiled
  chosen_spanish: inmaculada
  alternatives_spanish:
  - sin mancha
  - sin contaminación
  - inmaculada
  lexicon: BDAG
  rationale: El término griego tiene una fuerza moral/cultual de pureza no contaminada. «Inmaculada» es un equivalente digno y claro en español; «sin mancha» también es posible, pero «inmaculada» mantiene mejor el registro literario.
- source_word: ἀμάραντον
  english_pob_choice: unfading
  chosen_spanish: inmarcesible
  alternatives_spanish:
  - que no se marchita
  - imperecedera
  - inmarcesible
  lexicon: BDAG
  rationale: «Inmarcesible» conserva la imagen de algo que no pierde su frescura o belleza, muy cercana al matiz floral del griego. Aunque es un poco más literaria, aquí comunica con precisión y no depende de paráfrasis.
- source_word: τετηρημένην
  english_pob_choice: kept
  chosen_spanish: reservada
  alternatives_spanish:
  - guardada
  - preservada
  - reservada
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo indica un estado resultante: la herencia ya está guardada para permanecer así. «Reservada» funciona bien en español y refleja tanto la conservación como la destinación a los creyentes; «guardada» también sería válida, pero menos precisa en este contexto.'
- source_word: ἐν οὐρανοῖς
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: BDAG
  rationale: Se conserva el plural griego con «los cielos», tal como el POB inglés optó por «the heavens». «En el cielo» sería más idiomático en singular, pero perdería la marca formal del texto fuente.
- source_word: εἰς ὑμᾶς
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - para ustedes
  - para ustedes mismos
  lexicon: BDAG
  rationale: Aquí εἰς expresa orientación hacia los destinatarios. «Para ustedes» es natural en español latinoamericano y reproduce bien la relación de destino/beneficio sin sobreinterpretar.
theological_decisions:
- issue: Plural de 'los cielos' en ἐν οὐρανοῖς
  english_pob_reading: in the heavens
  chosen_spanish_reading: en los cielos
  alternative_spanish_readings:
  - en el cielo
  rationale: No hay una diferencia doctrinal obligatoria, pero sí una decisión de transparencia textual. Se preserva el plural del griego, en línea con el criterio del POB inglés de no normalizarlo al singular tradicional.
  doctrine_reference: Translation philosophy §1
- issue: Sentido de la herencia como realidad futura ya guardada
  english_pob_reading: kept in the heavens for you
  chosen_spanish_reading: reservada en los cielos para ustedes
  alternative_spanish_readings:
  - guardada en los cielos para ustedes
  - preservada en los cielos para ustedes
  rationale: El participio perfecto pasivo sugiere una realidad establecida y vigente. «Reservada» expresa tanto la custodia como la asignación a los destinatarios, sin debilitar el valor escatológico del versículo.
  doctrine_reference: Aspecto verbal griego; cf. 1 Pe 1:3-5
- issue: Término de pureza cultual/moral en ἀμίαντον
  english_pob_reading: undefiled
  chosen_spanish_reading: inmaculada
  alternative_spanish_readings:
  - sin mancha
  - sin contaminación
  rationale: Se mantiene la tensión entre pureza moral y ritual sin reducir el término a una sola categoría. «Inmaculada» ofrece un equilibrio reconocible en español, sin cargarlo con una referencia doctrinal ajena al pasaje.
  doctrine_reference: Lexical semantics of ἀμίαντος
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «to» sobre «into» para εἰς en este contexto; por eso en español se optó por «para» como orientación/destino, no por una preposición más marcada de movimiento. También se conservó el plural de «los cielos», siguiendo la decisión auditada del POB de preservar la forma griega.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y sobrio, sin sustituir el campo semántico de pureza por una paráfrasis explicativa.
  - Se evita el singular tradicional «cielo» porque el POB inglés documenta expresamente el plural griego.
  - 'La secuencia de adjetivos conserva paralelismo y acumulación retórica: imperecedera, inmaculada e inmarcesible.'
  - «Para ustedes» se usa por claridad latinoamericana; no implica pérdida del sentido de destino u orientación del griego.
