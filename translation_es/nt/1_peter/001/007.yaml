  - severity: medium
    issue: '''sea hallada para'' es poco idiomático en español.'
    rationale: Aunque intenta conservar el pasivo de εὑρεθῇ, en español suena rígido y oscuro. 'sea hallada en alabanza, gloria y honor' o 'resulte en' comunican mejor el sentido sin cerrar la ambigüedad teológica.
  - severity: low
    issue: Registro pronominal inconsistente con español neutral latinoamericano.
    rationale: El borrador usa 'vuestra', más peninsular/tradicional. 'su fe' encaja mejor con el estilo meta indicado sin pérdida de dignidad.
