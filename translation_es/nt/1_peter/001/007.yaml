reference: 1 Peter 1:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: ἵνα τὸ δοκίμιον ὑμῶν τῆς πίστεως ⸀πολυτιμότερον χρυσίου τοῦ ἀπολλυμένου διὰ πυρὸς δὲ δοκιμαζομένου εὑρεθῇ εἰς ἔπαινον καὶ ⸂δόξαν καὶ τιμὴν⸃ ἐν ἀποκαλύψει Ἰησοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/007.yaml
  text: so that the proven genuineness of your faith—more precious than gold that perishes though it is tested by fire—may be found to result in praise and glory and honor at the revelation of Jesus Messiah[a][b][c].
  footnotes:
  - marker: a
    text: Or 'the testing of your faith'; the Greek term can emphasize either the testing process or the proven genuineness that results from testing.
    reason: lexical_alternative
  - marker: b
    text: Or 'Jesus Christ.' Here 'Messiah' translates the title Χριστός in keeping with its meaning.
    reason: lexical_alternative
  - marker: c
    text: Or 'may be found to result in'.
    reason: previous_rendering
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: 4437197247f375e17195ab9da51bc2e7035316872a7cd95682405fa7eb80dd84
    timestamp: '2026-04-19T00:17:33Z'
    output_hash: 301ffa72348cf841caeb1c29a68be1b014deb75c677ce6caf4b4084f6669926d
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:35:49Z'
    unchanged: false
    changes_summary: 'Changed ''may prove to be for'' to ''may be found to result in'' to reflect εὑρεθῇ εἰς more naturally and accurately; changed ''Jesus Messiah'' to ''Jesus Christ'' for standard formal register and consistency with Ἰησοῦ Χριστοῦ. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: para que la autenticidad comprobada[a] de su fe, más preciosa que el oro que perece aunque es probado por fuego, sea hallada en alabanza, gloria y honor en la revelación de Jesús Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la prueba de su fe'; el término griego puede enfatizar tanto el proceso de probar como la autenticidad comprobada que resulta de la prueba.
    reason: lexical_alternative
  - marker: b
    text: O 'Jesucristo'. Aquí 'Mesías' traduce el título Χριστός conforme a su significado.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ δοκίμιον ὑμῶν τῆς πίστεως
  english_pob_choice: the proven genuineness of your faith
  chosen_spanish: la prueba de vuestra fe
  alternatives_spanish:
  - el probado valor de vuestra fe
  - la genuina fe probada
  lexicon: δοκίμιον / πίστις
  rationale: En español, 'prueba' conserva la ambigüedad productiva del griego entre el proceso de examen y el resultado acreditado por ese examen. Dado que el contexto inmediato compara la fe con el oro probado por fuego, 'la prueba de vuestra fe' respeta el audit trail sin cerrar indebidamente la tensión lexical.
- source_word: πολυτιμότερον
  english_pob_choice: more precious
  chosen_spanish: más preciosa
  alternatives_spanish:
  - más valiosa
  - de mayor valor
  lexicon: πολύτιμος
  rationale: El comparativo expresa valor superior en contraste con el oro. 'Más preciosa' es natural en español bíblico y mantiene la fuerza comparativa.
- source_word: χρυσίου
  english_pob_choice: gold
  chosen_spanish: el oro
  alternatives_spanish:
  - oro
  - el metal oro
  lexicon: χρυσίον
  rationale: '''Oro'' es la equivalencia directa y clara en español; el artículo definido ayuda al paralelismo retórico con el material refinado del verso.'
- source_word: ἀπολλυμένου
  english_pob_choice: that perishes
  chosen_spanish: que perece
  alternatives_spanish:
  - que se consume
  - que se acaba
  lexicon: ἀπόλλυμι
  rationale: '''Que perece'' conserva el matiz verbal de desaparición/destrucción y mantiene el contraste con la fe, cuyo valor supera al del oro material.'
- source_word: διὰ πυρὸς
  english_pob_choice: by fire
  chosen_spanish: por fuego
  alternatives_spanish:
  - a través del fuego
  - mediante fuego
  lexicon: διά + πῦρ
  rationale: En español, 'probado por fuego' comunica con naturalidad la idea instrumental. Se evita sobreexplicar la metáfora metálica o sacrificial.
- source_word: δοκιμαζομένου
  english_pob_choice: is tested
  chosen_spanish: es probado
  alternatives_spanish:
  - es examinado
  - es ensayado
  lexicon: δοκιμάζω
  rationale: '''Probado'' es el término más idiomático en español para el metal sometido a examen y enlaza con ''prueba'' en la primera cláusula.'
- source_word: εὑρεθῇ εἰς
  english_pob_choice: may be found to result in
  chosen_spanish: sea hallada para
  alternatives_spanish:
  - sea encontrada para
  - resulte en
  lexicon: εὑρίσκω + εἰς
  rationale: '''Sea hallada para'' conserva el pasivo y la idea de un hallazgo evaluativo sin imponer una paraphrasis demasiado interpretativa. En español suena más sobrio y fiel que una formulación excesivamente explícita.'
- source_word: ἔπαινον
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - elogio
  - praise
  lexicon: ἔπαινος
  rationale: '''Alabanza'' es un equivalente bíblico natural en español y funciona bien en la triada con gloria y honor.'
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honra
  lexicon: δόξα
  rationale: '''Gloria'' es la traducción estándar y adecuada aquí, manteniendo el registro elevado del texto.'
- source_word: τιμήν
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - estima
  - valor
  lexicon: τιμή
  rationale: '''Honor'' conserva el sentido de reconocimiento público y encaja de forma natural en la serie ''alabanza, gloria y honor''.'
- source_word: ἐν ἀποκαλύψει
  english_pob_choice: at the revelation
  chosen_spanish: en la revelación
  alternatives_spanish:
  - cuando se revele
  - en el momento de la revelación
  lexicon: ἀποκάλυψις
  rationale: La preposición 'en' sigue de cerca el griego y deja la referencia temporal abierta, como en el audit trail inglés.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús Cristo
  lexicon: Ἰησοῦς / Χριστός
  rationale: Aunque el proyecto normalmente traduce Χριστός como 'Mesías' en función titular, el propio contexto del audit trail muestra una revisión final que volvió a 'Jesus Christ' por registro formal y consistencia. En español, 'Jesucristo' es la forma establecida y respetuosa que mejor preserva esa consistencia sin añadir una nota innecesaria en el cuerpo del texto.
theological_decisions:
- issue: Valor de τὸ δοκίμιον ὑμῶν τῆς πίστεως
  english_pob_reading: '''the proven genuineness of your faith'' with acknowledged ambiguity toward the testing/result nuance'
  chosen_spanish_reading: '''la prueba de vuestra fe'' conserva la tensión entre el proceso de prueba y lo probado'
  alternative_spanish_readings:
  - '''la genuinidad probada de vuestra fe'''
  - '''el resultado probado de vuestra fe'''
  rationale: El griego permite ver tanto el proceso como su resultado; la POB inglesa deja esa tensión en una nota. En español, 'prueba' mantiene abierta la lectura sin forzar una sola resolución conceptual.
  doctrine_reference: Translation philosophy §1, §5
- issue: Secuencia escatológica de εὑρεθῇ εἰς ἔπαινον καὶ δόξαν καὶ τιμήν
  english_pob_reading: preserved as an open eschatological outcome without specifying the recipient
  chosen_spanish_reading: '''sea hallada para alabanza, gloria y honor'' conserva la apertura del resultado final'
  alternative_spanish_readings:
  - '''sea hallada para resultar en alabanza, gloria y honor'''
  - '''sea hallada para producir alabanza, gloria y honor'''
  rationale: El texto griego no especifica con claridad el destinatario o fuente exacta de la triada. La traducción española mantiene esa apertura, evitando cargar el verso con una interpretación que el audit trail no exige.
  doctrine_reference: Translation philosophy §3
- issue: Ἰησοῦ Χριστοῦ en registro cristológico
  english_pob_reading: final revision restored 'Jesus Messiah' against a Christ-name drift
  chosen_spanish_reading: '''Jesucristo'''
  alternative_spanish_readings:
  - '''Jesús Mesías'''
  - '''Jesús el Mesías'''
  rationale: En español eclesial amplio, 'Jesucristo' es la forma cristalizada de referencia; aquí funciona como equivalente reverente y estable, sin ocultar que el título cristológico está presente en el original.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: Se tomó en cuenta que el audit trail inglés pasó de 'may be found to result in' a una propuesta más concisa, pero luego mantuvo la formulación final restaurando 'Messiah' en el nombre cristológico. La versión española sigue el sentido final y conserva la ambigüedad de δοκίμιον mediante 'prueba' sin desarrollar una glosa en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo 'vuestra' para concordar con el plural del contexto epistolar.
  - Se evitó 'SEÑOR' para no enmascarar el nombre divino, aunque este verso no contiene el tetragrámaton.
  - No se introdujeron notas al pie porque ninguna alternativa exigía anclaje textual explícito y se buscó una línea principal limpia y publicable.
  - Se preservó el paralelismo retórico entre 'prueba', 'oro', 'fuego' y la triada final de 'alabanza, gloria y honor'.
