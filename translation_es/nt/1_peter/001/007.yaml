  to: para que la autenticidad comprobada[a] de su fe, más preciosa que el oro que perece aunque es probado por fuego, sea hallada en alabanza, gloria y honor en la revelación de Jesús Mesías[b].
  rationale: 'La revisión alinea el español con la evidencia griega y con el audit trail inglés en dos puntos clave: (1) expresa el sentido preferido de δοκίμιον como resultado de la prueba (''autenticidad comprobada''), preservando en nota la alternativa procesual; y (2) restituye ''Mesías'' para Χριστός según la política terminológica del proyecto y la revisión final documentada. También mejora la naturalidad del español con ''su fe'' y con una formulación más idiomática para εὑρεθῇ εἰς.'
