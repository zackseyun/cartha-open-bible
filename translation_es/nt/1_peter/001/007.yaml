    issue: '''Jesucristo'' traduce Ἰησοῦ Χριστοῦ contra la política del proyecto.'
    rationale: El audit trail final restauró 'Jesus Messiah' explícitamente y la norma del proyecto pide traducir Χριστός como título cuando conserva fuerza titular. 'Jesucristo' neutraliza esa decisión documentada.
  - severity: high
    issue: '''la prueba de vuestra fe'' no sigue la decisión léxica principal para δοκίμιον.'
