  glossary_alignment: No hay conflicto con la terminología del proyecto. «fe», «salvación» y «almas» concuerdan con las decisiones POB. No aplica ninguna excepción de Yahvé/Mesías/etc. La revisión propuesta conserva la opción principal «almas» y las alternativas «vidas/personas» en nota, como en el audit trail inglés.
