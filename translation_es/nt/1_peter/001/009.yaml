translation:
  language: es
  text: recibiendo el resultado[a] de la fe de ustedes, la salvación de sus almas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el fin», «la meta» o «el resultado» de la fe de ustedes.
    reason: lexical_alternative
  - marker: b
    text: O «la salvación de sus vidas» o «la salvación de sus personas». La palabra griega puede significar «almas», «vidas» o «personas» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: κομιζόμενοι
  english_pob_choice: as you receive
  chosen_spanish: recibiendo
  alternatives_spanish:
  - mientras reciben
  - al recibir
  - obteniendo
  lexicon: BDAG
  rationale: El participio presente se vierte de manera participial para mantener el sentido de proceso y conexión con el contexto anterior. «Recibiendo» conserva la idea de entrar en posesión de lo prometido sin forzar una voz verbal explícita que el español no necesita aquí.
- source_word: τέλος
  english_pob_choice: outcome
  chosen_spanish: resultado
  alternatives_spanish:
  - fin
  - meta
  - resultado final
  lexicon: BDAG
  rationale: «Resultado» comunica bien el valor de término alcanzado o efecto realizado que el contexto pide. «Fin» podría sonar solo temporal; «meta» resaltaría demasiado la intención; «resultado final» añade énfasis no exigido por el griego.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Se conserva el valor normal de πίστις como «fe». En este contexto el genitivo «de su fe» se entiende naturalmente como la fe de los destinatarios, sin necesidad de reinterpretarlo como «fidelidad».
- source_word: σωτηρίαν
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescates
  lexicon: BDAG
  rationale: «Salvación» es la equivalencia natural y teológicamente continua en esta carta. «Liberación» sería posible, pero debilitaría la amplitud escatológica y pastoral del término.
- source_word: ψυχῶν
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - personas
  lexicon: BDAG
  rationale: Se mantiene «almas» como el paralelo más directo de ψυχῶν y como lectura tradicional inteligible en español. Las alternativas siguen siendo semánticamente posibles, pero el texto no obliga a resolver la cuestión antropológica a favor de «vidas» o «personas».
theological_decisions:
- issue: Cómo entender τέλος en relación con la fe
  english_pob_reading: outcome of your faith
  chosen_spanish_reading: resultado de su fe
  alternative_spanish_readings:
  - fin de su fe
  - meta de su fe
  - resultado final de su fe
  rationale: La redacción preserva la ambigüedad útil del griego entre término, meta y resultado, pero el contexto favorece el sentido de fruto consumado de la fe. «Resultado» evita reducir τέλος a simple final cronológico o a una meta meramente intencional.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Cómo traducir ψυχῶν sin imponer una antropología cerrada
  english_pob_reading: the salvation of your souls
  chosen_spanish_reading: la salvación de sus almas
  alternative_spanish_readings:
  - la salvación de sus vidas
  - la salvación de sus personas
  rationale: «Almas» reproduce con fidelidad el léxico del original y mantiene la tensión teológica sin convertir el texto en una afirmación técnica sobre la separación cuerpo-alma. Las alternativas se reconocen como posibles según contexto, pero no se imponen en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El cotejo más reciente indica concordancia alta y sin cambios sustanciales; esta versión mantiene la lectura principal del inglés POB y ajusta el español para ser natural, sin diluir la tensión lexical de τέλος y ψυχαί.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y contemporáneo.
  - «Fe», «salvación» y «almas» siguen la terminología POB y la semántica del griego.
  - No se introduce una equivalencia doctrinal adicional para ψυχῶν; se preserva la ambigüedad con nota.
  - La construcción participial en español conserva la relación sintáctica con el contexto inmediato.
