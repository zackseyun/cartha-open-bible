  text: οἷς ἀπεκαλύφθη ὅτι οὐχ ἑαυτοῖς ὑμῖν δὲ διηκόνουν αὐτά, ἃ νῦν ἀνηγγέλη ὑμῖν διὰ τῶν εὐαγγελισαμένων ⸀ὑμᾶς πνεύματι ἁγίῳ ἀποσταλέντι ἀπ’ οὐρανοῦ, εἰς ἃ ἐπιθυμοῦσιν ἄγγελοι παρακύψαι.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/012.yaml
  text: To them it was revealed that they were serving not themselves but you in these things[c][b][a], which now have been announced to you through those who preached the good news to you by the Holy Spirit sent from heaven—things into which angels long to look.
  footnotes:
  - marker: a
    text: Or 'not for themselves but for you'; the Greek dative marks the beneficiaries of the prophets' service.
    reason: lexical_alternative
  - marker: b
    text: Or 'through those who proclaimed the gospel to you.' The Greek uses the verb 'to announce good news.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'to look' can also be rendered 'to peer into' or 'to stoop and look into,' expressing eager, intent observation.
    reason: lexical_alternative
