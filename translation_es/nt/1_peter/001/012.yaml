translation:
  language: es
  text: A ellos se les reveló que no se servían a sí mismos, sino a ustedes, en estas cosas[a], que ahora se les han anunciado[b] por medio de quienes les proclamaron las buenas noticias por el Espíritu Santo enviado desde el cielo, cosas que los ángeles anhelan mirar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa de sentido: «no para sí mismos sino para ustedes»; el dativo señala a los beneficiarios del servicio profético.'
    reason: lexical_alternative
  - marker: b
    text: O «por medio de quienes les proclamaron el evangelio». El griego usa el verbo «anunciar buenas noticias».
    reason: lexical_alternative
  - marker: c
    text: El verbo puede implicar «mirar con atención», «asomarse para mirar» o «inclinarse para mirar», expresando una observación intensa y anhelante.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷς
  english_pob_choice: To them
  chosen_spanish: A ellos
  alternatives_spanish:
  - a quienes
  lexicon: BDAG
  rationale: El dativo relativo apunta a los profetas del contexto anterior. En español, 'A ellos' conserva el valor indirecto de destino/beneficio y suena natural al iniciar la cláusula.
- source_word: ἀπεκαλύφθη
  english_pob_choice: it was revealed
  chosen_spanish: se les reveló
  alternatives_spanish:
  - les fue revelado
  - se les dio a conocer
  lexicon: BDAG
  rationale: El aoristo pasivo conserva la acción puntual de revelación sin explicitar agente. 'Se les reveló' mantiene el registro teológico y la pasiva impersonal natural en español.
- source_word: οὐχ ἑαυτοῖς ὑμῖν δὲ
  english_pob_choice: not themselves but you
  chosen_spanish: no se estaban ministrando a sí mismos, sino a ustedes
  alternatives_spanish:
  - no para sí mismos sino para ustedes
  - no se servían a sí mismos, sino a ustedes
  lexicon: BDAG
  rationale: El contraste dativo expresa beneficiarios. 'Ministrando' preserva el campo de διακονέω y el carácter de servicio continuo; 'a sí mismos / a ustedes' hace explícito el contraste de beneficio.
- source_word: διηκόνουν
  english_pob_choice: were serving
  chosen_spanish: se estaban ministrando
  alternatives_spanish:
  - estaban sirviendo
  - estaban prestando servicio
  lexicon: BDAG
  rationale: El imperfecto marca acción continua en el pasado. 'Se estaban ministrando' es menos común que 'servían', pero conserva mejor el matiz de διακονέω en un contexto de ministerio profético sin perder la idea de servicio.
- source_word: αὐτά
  english_pob_choice: these things
  chosen_spanish: en estas cosas
  alternatives_spanish:
  - en estos asuntos
  - en estas realidades
  lexicon: BDAG
  rationale: El pronombre neutro plural refiere a las realidades proféticas mencionadas. 'Estas cosas' es la opción más directa y fiel; el español exige una explicitación para evitar ambigüedad.
- source_word: ἃ νῦν ἀνηγγέλη
  english_pob_choice: which now have been announced
  chosen_spanish: las cuales ahora se les han anunciado
  alternatives_spanish:
  - las cuales ahora se les han proclamado
  - las cuales ahora se les han dado a conocer
  lexicon: BDAG
  rationale: El aoristo pasivo con νῦν se vierte naturalmente con presente perfecto en español para conectar anuncio pasado y relevancia presente. 'Anunciado' sigue de cerca ἀναγγέλλω sin forzar un término más técnico.
- source_word: διὰ τῶν εὐαγγελισαμένων ὑμᾶς
  english_pob_choice: through those who preached the good news to you
  chosen_spanish: por medio de quienes les proclamaron el evangelio
  alternatives_spanish:
  - por medio de quienes les anunciaron el evangelio
  - por medio de los que les predicaron el evangelio
  lexicon: BDAG
  rationale: El participio de εὐαγγελίζω expresa la acción de anunciar buenas nuevas. 'Proclamaron el evangelio' conserva la fuerza verbal y permite un español eclesial claro; se evita depender solo de 'predicaron' para no oscurecer el sentido de 'buenas noticias'.
- source_word: πνεύματι ἁγίῳ
  english_pob_choice: by the Holy Spirit
  chosen_spanish: por el Espíritu Santo
  alternatives_spanish:
  - en el Espíritu Santo
  - mediante el Espíritu Santo
  lexicon: BDAG
  rationale: 'El dativo es instrumental: el medio por el cual se anuncia el evangelio. ''Por el Espíritu Santo'' es idiomático en español y conserva la agencia divina personal.'
- source_word: ἀποσταλέντι ἀπ’ οὐρανοῦ
  english_pob_choice: sent from heaven
  chosen_spanish: enviado desde el cielo
  alternatives_spanish:
  - mandado desde el cielo
  - enviado del cielo
  lexicon: BDAG
  rationale: El participio pasivo subraya misión y procedencia celestial. 'Desde el cielo' mantiene el origen con naturalidad en español y evita una literalidad rígida de 'del cielo' cuando el giro idiomático fluye mejor.
- source_word: εἰς ἃ
  english_pob_choice: things into which
  chosen_spanish: cosas en las cuales
  alternatives_spanish:
  - cosas en las que
  - en las cuales
  lexicon: BDAG
  rationale: La preposición εἰς tiene valor direccional; 'en las cuales' conserva la imagen de penetrar/dirigir la mirada dentro de esas realidades. Se mantiene el antecedente explícito para mayor claridad.
- source_word: ἐπιθυμοῦσιν
  english_pob_choice: long
  chosen_spanish: anhelan
  alternatives_spanish:
  - desean
  - ardientemente desean
  lexicon: BDAG
  rationale: El presente expresa deseo continuo e intenso. 'Anhelan' comunica una aspiración intensa sin añadir connotaciones excesivamente emocionales.
- source_word: ἄγγελοι
  english_pob_choice: angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - ángeles
  lexicon: BDAG
  rationale: En este contexto celestial el referente es inequívocamente angélico. El artículo definido español ayuda a sonar natural y a individualizar el grupo.
- source_word: παρακύψαι
  english_pob_choice: to look
  chosen_spanish: mirar
  alternatives_spanish:
  - asomarse a mirar
  - inclinarse para mirar
  lexicon: BDAG
  rationale: El infinitivo implica mirar con atención o inclinarse para observar. En el texto principal, 'mirar' es claro y sobrio; el matiz de inclinarse/curiosear se preserva en la nota.
theological_decisions:
- issue: Identidad del agente en πνεύματι ἁγίῳ
  english_pob_reading: the Holy Spirit as the divine agent in gospel proclamation
  chosen_spanish_reading: el Espíritu Santo como agente divino del anuncio del evangelio
  alternative_spanish_readings:
  - espíritu santo en sentido impersonal
  - espíritu santo como disposición espiritual
  rationale: El contexto petrino y la construcción instrumental apuntan al Espíritu Santo personal. La mayúscula y la formulación 'por el Espíritu Santo' preservan la lectura trinitaria sin añadir contenido ajeno al texto.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); filosofía de traducción §1, §6
- issue: Relación entre el ministerio profético y el anuncio apostólico
  english_pob_reading: the prophets served later believers by speaking of realities now announced in the gospel
  chosen_spanish_reading: los profetas sirvieron a los creyentes posteriores al hablar de realidades que ahora se anuncian en el evangelio
  alternative_spanish_readings:
  - los profetas sirvieron solo a su propia generación
  - los profetas se referían únicamente a sí mismos
  rationale: 'El contraste ''no a sí mismos, sino a ustedes'' debe quedar visible: el servicio profético tenía un alcance que culmina en los receptores del evangelio. La traducción conserva esa continuidad salvífica sin diluir la diferencia histórica.'
  doctrine_reference: Filosofía de traducción §3
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios; por eso esta versión sigue de cerca el paquete fuente y mantiene las decisiones auditadas sobre revelación, servicio, anuncio, Espíritu Santo y la imagen final de los ángeles.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por norma editorial, pero este versículo no contiene el nombre divino.
  - Se usa 'Espíritu Santo' con mayúsculas por referencia personal divina en contexto.
  - Se evita 'SEÑOR' porque no aparece κύριος en el texto base.
  - 'Se conserva un registro eclesial sobrio: ''evangelio'', ''anunciado'', ''sirvieron/ministrando'' sin pasar a paráfrasis libres.'
  - La nota sobre παρακύψαι preserva la tensión entre 'mirar' y 'mirar con atención' sin sobretraducir el texto principal.
