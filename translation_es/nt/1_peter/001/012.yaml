    reason: lexical_alternative
  - marker: c
    text: El verbo puede implicar «mirar con atención», «asomarse para mirar» o «inclinarse para mirar», expresando una observación intensa y anhelante.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la construcción principal para reflejar con fidelidad y naturalidad el sentido beneficiario de los dativos en οὐχ ἑαυτοῖς ὑμῖν δὲ διηκόνουν: ''no se servían a sí mismos, sino a ustedes''. También se simplifica la sintaxis relativa y se ajusta εὐαγγελισαμένων a una forma verbal más transparente en español (''proclamaron las buenas noticias''), en consonancia con la justificación del POB inglés. Se mantienen las notas léxicas relevantes y se mejora su formulación.'
