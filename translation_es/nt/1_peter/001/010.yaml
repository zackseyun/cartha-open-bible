translation:
  language: es
  text: Acerca de esta salvación, los profetas que profetizaron acerca de la gracia para ustedes[a] buscaron e investigaron cuidadosamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la gracia que había de venir a ustedes». El matiz de futuro se infiere del contexto más amplio, pero no se expresa de manera explícita en este versículo.'
    reason: alternative_reading
lexical_decisions:
- source_word: Περὶ ἧς σωτηρίας
  english_pob_choice: Concerning this salvation
  chosen_spanish: Acerca de esta salvación
  alternatives_spanish:
  - Respecto de esta salvación
  - Concerning this salvation (calco no idiomático)
  lexicon: BDAG
  rationale: περί con genitivo introduce el tema; en español, «acerca de» comunica naturalmente el sentido tópico de «concerning/about». «Esta salvación» conserva la referencia anafórica al contexto previo sin volverlo más oscuro.
- source_word: σωτηρίας
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: BDAG
  rationale: «Salvación» reproduce el peso teológico habitual de σωτηρία en este contexto petrino y mantiene la continuidad doctrinal del pasaje.
- source_word: ἐξεζήτησαν
  english_pob_choice: searched
  chosen_spanish: buscaron
  alternatives_spanish:
  - investigaron
  - indagaron con diligencia
  lexicon: BDAG
  rationale: El verbo expresa una búsqueda intensa. «Buscaron» es natural en español y permite que el segundo verbo aporte la intensificación sin redundancia pesada.
- source_word: ἐξηραύνησαν
  english_pob_choice: investigated carefully
  chosen_spanish: investigaron cuidadosamente
  alternatives_spanish:
  - examinaron cuidadosamente
  - indagaron cuidadosamente
  lexicon: BDAG
  rationale: ἐξεραυνάω añade la idea de pesquisa minuciosa. «Investigaron cuidadosamente» distingue el segundo verbo del primero y preserva la intensificación retórica.
- source_word: προφῆται
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - profetas
  lexicon: BDAG
  rationale: Aunque el griego no lleva artículo en esa posición, la cláusula participial siguiente identifica a un grupo específico; en español, «los profetas» suena natural y refleja ese carácter definido.
- source_word: οἱ περὶ τῆς εἰς ὑμᾶς χάριτος προφητεύσαντες
  english_pob_choice: who prophesied about the grace for you
  chosen_spanish: que profetizaron acerca de la gracia para ustedes
  alternatives_spanish:
  - que profetizaron acerca de la gracia hacia ustedes
  - que profetizaron sobre la gracia que habría de venir a ustedes
  lexicon: BDAG
  rationale: La frase participial funciona atributivamente. «Acerca de la gracia para ustedes» conserva περί como contenido de la profecía y εἰς ὑμᾶς como relación benéfica/direccional sin añadir más de lo que el griego dice explícitamente.
- source_word: χάριτος
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: «Gracia» es la traducción más fiel y teológicamente consistente aquí; «favor» aclararía matiz, pero debilitaría la red conceptual del pasaje.
- source_word: εἰς ὑμᾶς
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - hacia ustedes
  lexicon: BDAG
  rationale: εἰς con personas puede expresar dirección o beneficio. «Para ustedes» comunica bien el beneficio previsto y suena idiomático en español sin sobreinterpretar el movimiento.
theological_decisions:
- issue: Si explicitar en el texto principal una orientación futura de «la gracia para ustedes»
  english_pob_reading: Keep 'the grace for you' in the main text; future sense is only inferred from context
  chosen_spanish_reading: Mantener «la gracia para ustedes» en el texto principal, sin añadir «que habría de venir»
  alternative_spanish_readings:
  - la gracia que habría de venir a ustedes
  - la gracia futura para ustedes
  rationale: El griego de este versículo no dice explícitamente que la gracia sea futura; esa orientación se infiere del contexto más amplio. Para no introducir material no expresado, el texto principal conserva la formulación directa, y la lectura alternativa queda implícitamente respetada en la elección más sobria.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión interpretativa cuando el griego no la resuelve de forma explícita.
translation_notes:
  revision_awareness: La redacción española sigue el último estado revisado del audit trail inglés en cuanto a conservar ambos verbos coordinados y el grupo atributivo «los profetas que profetizaron acerca de la gracia para ustedes», evitando la reordenación inglesa anterior que hacía la oración más pesada. También respeta la decisión revisada de mantener el sentido de «grace for you» sin expandirlo en el cuerpo principal.
  spanish_consistency_notes:
  - Se usa «gracia» de manera consistente para χάρις, conforme a la terminología doctrinal del proyecto.
  - Se usa «salvación» para σωτηρία, manteniendo continuidad teológica con el contexto inmediato.
  - Se emplea «para ustedes» como equivalente natural de εἰς ὑμᾶς, sin convertirlo en una paráfrasis interpretativa.
  - Se evita «SEÑOR» u այլ terminología de máscara; no aplica aquí, pero la redacción mantiene transparencia léxica.
  - La puntuación con coma y frase relativa reproduce con claridad la estructura del griego sin forzar un calco sintáctico.
