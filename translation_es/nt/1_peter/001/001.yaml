    reason: cultural_note
lexical_decisions:
- source_word: Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Piedra
  - Petro
  lexicon: BDAG
  rationale: Nombre propio transliterado/adaptado al uso español estándar; ‘Pedro’ es la forma canónica y comunicativamente natural en español para Πέτρος.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - mensajero
  - enviado
  lexicon: BDAG
  rationale: Conserva el valor titulativo y eclesial del término en la autodesignación epistolar. ‘Apóstol’ reproduce mejor la autoridad formal que ‘mensajero’ o ‘enviado’.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah / Jesus Christ
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús Cristo
  lexicon: BDAG
  rationale: En español, la forma compuesta ‘Jesucristo’ es la manera idiomática y ampliamente inteligible de rendir el nombre-título. Mantiene la referencia personal a Jesús y la carga titulativa de Χριστός sin forzar una perífrasis menos natural.
- source_word: ἐκλεκτοῖς
  english_pob_choice: chosen
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - electos
  lexicon: BDAG
  rationale: ‘Escogidos’ conserva el sentido de selección divina sin introducir el registro más técnico o doctrinalmente cargado de ‘electos’. Responde bien al contexto del saludo.
- source_word: παρεπιδήμοις
  english_pob_choice: sojourners / resident aliens / exiles
  chosen_spanish: forasteros
  alternatives_spanish:
  - peregrinos
  - extranjeros
  - residentes temporales
  lexicon: BDAG
  rationale: ‘Forasteros’ expresa la condición de no pertenencia y de residencia fuera del hogar propio sin volverse demasiado técnico ni redundante con ‘dispersión’. Mantiene la tensión social del término griego.
- source_word: διασπορᾶς
  english_pob_choice: of the dispersion
  chosen_spanish: de la dispersión
  alternatives_spanish:
  - de la Diáspora
  - de los dispersos
  lexicon: BDAG
  rationale: Se conserva el sustantivo abstracto ‘dispersión’ para reflejar la forma genitiva del griego y la resonancia histórica y teológica del término. Se evita capitalizarlo para no sobreespecificar una etiqueta que el griego no exige en sí mismo.
- source_word: Πόντου, Γαλατίας, Καππαδοκίας, Ἀσίας, καὶ Βιθυνίας
  english_pob_choice: in Pontus, Galatia, Cappadocia, Asia, and Bithynia
  chosen_spanish: Ponto, Galacia, Capadocia, Asia y Bitinia
  alternatives_spanish:
  - en el Ponto, en Galacia, en Capadocia, en Asia y en Bitinia
  lexicon: BDAG
  rationale: Se conservan los nombres geográficos en su forma española habitual. La relación locativa ya queda suficientemente clara en la estructura de la frase; no hace falta repetir ‘en’ antes de cada región.
theological_decisions:
- issue: Relación entre ἐκλεκτοῖς y la identidad de los destinatarios
  english_pob_reading: chosen
  chosen_spanish_reading: escogidos
  alternative_spanish_readings:
  - electos
  - elegidos
  rationale: ‘Escogidos’ mantiene la afirmación de elección divina sin encerrar el texto en un tecnicismo doctrinal más fuerte de lo que la sintaxis exige. Preserva la afirmación bíblica y el tono pastoral del saludo.
  doctrine_reference: Elección divina; 1 Pedro 1:1; afirmaciones de la traducción POB sobre precisión sin sobre-sistematización
- issue: Sentido de παρεπιδήμοις διασπορᾶς
  english_pob_reading: sojourners of the dispersion
  chosen_spanish_reading: forasteros de la dispersión
  alternative_spanish_readings:
  - peregrinos de la dispersión
  - exiliados de la dispersión
  rationale: 'La combinación conserva la doble tensión del texto: estatus de no pertenencia/residencia fuera del hogar y pertenencia a un pueblo disperso. ‘Forasteros’ evita la redundancia que produciría ‘exiliados’ junto con ‘dispersión’, pero sigue reflejando marginalidad y desplazamiento.'
  doctrine_reference: Identidad del pueblo de Dios en la diáspora; 1 Pedro 1:1; nota cultural sobre la resonancia de ‘dispersión'
- issue: Tratamiento de Χριστός
  english_pob_reading: Messiah / Christ
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús el Cristo
  rationale: En español, ‘Jesucristo’ es la forma más natural y reconocible para el sintagma nominal del saludo, a la vez que conserva la identificación cristológica. No se pierde el valor titular porque el compuesto ya funciona como nombre confesional establecido.
  doctrine_reference: Cristología; transliteración y uso eclesial del nombre-título de Jesús
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: el audit trail inglés muestra oscilación entre ‘Jesus Messiah’ y ‘Jesus Christ’, con restauración de ‘Messiah’ por política de términos; en español, sin embargo, la forma editorial más natural y reconocible para Ἰησοῦ Χριστοῦ es ‘Jesucristo’, por lo que se adopta una solución idiomática que no borra el valor titular del griego. También se consideró la tensión entre παρεπιδήμοις y διασπορᾶς, evitando una duplicación semántica demasiado pesada en español.'
  spanish_consistency_notes:
  - Se mantiene ‘escogidos’ para ἐκλεκτοῖς en consonancia con el español bíblico contemporáneo y con el principio POB de evitar tecnicismos innecesarios.
  - ‘Forasteros’ se usa para παρεπιδήμοις como equivalente natural de outsider/resident-alien sin convertir el saludo en un calco rígido.
  - ‘De la dispersión’ conserva la resonancia de διασπορά sin capitalización interpretativa.
  - Los topónimos se presentan en la forma española convencional y sin notas doctrinales, porque aquí el interés es geográfico.
  - Las notas al pie distinguen alternativas léxicas reales de observaciones culturales, manteniendo trazabilidad con el audit trail inglés.
