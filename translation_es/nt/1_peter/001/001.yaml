translation:
  language: es
  text: Pedro[a], apóstol de Jesús Mesías[c], a los escogidos forasteros[b] de la dispersión[d], en Ponto, Galacia, Capadocia, Asia y Bitinia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los elegidos’.
    reason: lexical_alternative
  - marker: b
    text: O ‘peregrinos’ o ‘residentes temporales’.
    reason: lexical_alternative
  - marker: c
    text: O ‘Jesucristo’.
    reason: alternative_reading
  - marker: d
