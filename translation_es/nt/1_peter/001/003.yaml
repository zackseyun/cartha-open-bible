  to: ¡Bendito sea el Dios y Padre de nuestro Señor Jesús Mesías[a], que, según su gran misericordia, nos ha hecho nacer de nuevo[b] para una esperanza viva, por la resurrección de Jesús Mesías[a] de entre los muertos!
  rationale: Se corrige la traducción de Χριστός para ajustarla al sentido titular del griego, a la decisión inglesa auditada («Messiah») y a la política terminológica del proyecto en español («Mesías» por defecto). Se mantiene el resto del versículo porque representa bien el sentido fuente y suena natural en español. La nota [a] se invierte para reflejar correctamente la lectura principal y la alternativa tradicional.
