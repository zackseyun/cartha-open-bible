source:
  edition: SBLGNT
  text: Εὐλογητὸς ὁ θεὸς καὶ πατὴρ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, ὁ κατὰ τὸ πολὺ αὐτοῦ ἔλεος ἀναγεννήσας ἡμᾶς εἰς ἐλπίδα ζῶσαν δι’ ἀναστάσεως Ἰησοῦ Χριστοῦ ἐκ νεκρῶν,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/003.yaml
  text: Blessed be the God and Father of our Lord Jesus Messiah[a], who according to his great mercy has caused us to be born again to a living hope through the resurrection of Jesus Messiah from the dead[b],
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its titular sense.
    reason: alternative_reading
  - marker: b
    text: Or 'has given us new birth.' The Greek verb keeps the imagery of being begotten or born again.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: c3cd1e4a01a84c9b13ecdf5d36539fef00c6ce5713bcfea19c8dee4e73476278
    timestamp: '2026-04-19T00:16:30Z'
    output_hash: bf23a5b5f0c890bae67eafaf5560136fd69d9a1e3f1fc73d85aea908352d56b1
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:35:50Z'
    unchanged: false
    changes_summary: 'Replaced ''Messiah'' with ''Christ'' for natural rendering of the proper name/title in this context and consistency within formal Bible English; changed ''into a living hope'' to ''to a living hope'' to more directly reflect εἰς with ἀναγεννήσας in standard English Bible style. All source elements are retained. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: ¡Bendito sea el Dios y Padre de nuestro Señor Jesús Mesías[a], que, según su gran misericordia, nos ha hecho nacer de nuevo[b] para una esperanza viva, por la resurrección de Jesús Mesías[a] de entre los muertos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesucristo». El griego Χριστός conserva aquí su valor de título; por eso se traduce «Mesías» en el texto principal.
    reason: alternative_reading
  - marker: b
    text: O «nos ha dado nuevo nacimiento». El verbo griego conserva la imagen de engendrar o nacer de nuevo y destaca la acción de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐλογητὸς
  english_pob_choice: Blessed be
  chosen_spanish: ¡Bendito sea!
  alternatives_spanish:
  - ¡Alabado sea!
  - ¡Sea bendito!
  lexicon: BDAG
  rationale: Es una exclamación doxológica en forma predicativa; en español, «¡Bendito sea!» conserva bien el valor de bendición/alabanza sin sonar mecánico.
- source_word: θεὸς καὶ πατὴρ
  english_pob_choice: the God and Father
  chosen_spanish: el Dios y Padre
  alternatives_spanish:
  - el Dios y el Padre
  lexicon: BDAG
  rationale: La estructura con un solo artículo en griego se refleja naturalmente en español con «el Dios y Padre», conservando la relación estrecha de ambos sustantivos.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  lexicon: BDAG
  rationale: Aquí κύριος es un título cristológico; «Señor» es la forma natural y reverente en español para este uso.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Aunque el POB inglés preserva el valor titular de Χριστός con «Messiah», en español bíblico «Jesucristo» funciona como forma estable, reverente y ampliamente inteligible; «Mesías» sería posible, pero suena menos natural en esta fórmula fija de saludo/doctrina.
- source_word: κατὰ τὸ πολὺ αὐτοῦ ἔλεος
  english_pob_choice: according to his great mercy
  chosen_spanish: según su gran misericordia
  alternatives_spanish:
  - de acuerdo con su gran misericordia
  - por su gran misericordia
  lexicon: BDAG
  rationale: «κατά» con acusativo expresa medida o norma; «según» preserva esa relación sin volverla causal. «Gran misericordia» mantiene el valor de πολὺ sin exagerarlo.
- source_word: ἀναγεννήσας
  english_pob_choice: has caused us to be born again
  chosen_spanish: nos ha hecho nacer de nuevo
  alternatives_spanish:
  - nos ha engendrado de nuevo
  - nos ha dado nuevo nacimiento
  lexicon: BDAG
  rationale: El verbo conserva la imagen de nacimiento y la agencia divina. «Nos ha hecho nacer de nuevo» es idiomático en español y evita una paráfrasis demasiado abstracta.
- source_word: εἰς ἐλπίδα ζῶσαν
  english_pob_choice: to a living hope
  chosen_spanish: para una esperanza viva
  alternatives_spanish:
  - a una esperanza viva
  - hacia una esperanza viva
  lexicon: BDAG
  rationale: «εἰς» expresa meta o resultado; «para» comunica bien ese propósito/resultado en español. «Esperanza viva» reproduce directamente la metáfora de ζῶσαν.
- source_word: δι’ ἀναστάσεως
  english_pob_choice: through the resurrection
  chosen_spanish: por la resurrección
  alternatives_spanish:
  - mediante la resurrección
  - a través de la resurrección
  lexicon: BDAG
  rationale: «διά» con genitivo indica medio/instrumento. «Por la resurrección» es natural en español y mantiene el valor causal-instrumental.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: La fórmula idiomática de resurrección en español suele ser «de entre los muertos», que transmite con claridad la salida del ámbito de los muertos.
theological_decisions:
- issue: Χριστός en un contexto titular y su traducción al español
  english_pob_reading: Messiah
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús el Mesías
  - Jesús Cristo
  rationale: El POB inglés subraya el sentido titular de Χριστός. En español, sin embargo, «Jesucristo» es la forma eclesial estándar y más transparente para el lector; «Mesías» preservaría más explícitamente el título, pero rompería la fluidez litúrgica y la identificación inmediata del nombre.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve intelligibility without erasing source meaning'
- issue: Agencia divina en ἀναγεννήσας
  english_pob_reading: has caused us to be born again
  chosen_spanish_reading: nos ha hecho nacer de nuevo
  alternative_spanish_readings:
  - nos ha engendrado de nuevo
  - nos ha dado nuevo nacimiento
  rationale: La frase mantiene a Dios como sujeto activo del nuevo nacimiento, sin diluir la iniciativa divina. «Hecho nacer de nuevo» conserva la imagen y evita resolver artificialmente la tensión entre metáfora de nacimiento y agencia divina.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: El POB inglés pasó por una revisión que osciló entre «Messiah» y «Christ», pero la fijación final volvió a «Messiah». Para el español, se conservó el nombre compuesto eclesial «Jesucristo» como forma estable y reconocible, sin perder el sentido titular de Χριστός. También se atendió a la revisión de εἰς, optando por «para» como equivalente natural de meta/resultado, y a la nota léxica sobre ἀναγεννάω para mantener la imagen de nuevo nacimiento.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «Señor» para κύριος, con mayúsculas reverentes según el contexto.
  - Se mantiene «Jesucristo» como forma continua del nombre-título; no se alterna con «Cristo» o «Mesías» dentro de la línea principal.
  - «Misericordia» traduce ἔλεος de forma estándar y consistente con el registro bíblico.
  - La estructura doxológica inicial se conserva con exclamación y orden natural en español.
  - «De entre los muertos» se eligió por ser la fórmula más idiomática para la resurrección en español, sin alterar el contenido de ἐκ νεκρῶν.
