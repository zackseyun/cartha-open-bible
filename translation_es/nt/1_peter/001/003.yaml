  glossary_alignment: Alineación parcial. «Señor», «Dios», «misericordia», «esperanza viva» y «de entre los muertos» están bien. Pero Χριστός debería rendirse como «Mesías» según la preferencia del proyecto y la decisión léxica inglesa auditada. No hay base suficiente aquí para la excepción a «Cristo/Jesucristo».
