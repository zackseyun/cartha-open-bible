translation:
  language: es
  text: Aunque no lo han visto, lo aman. Aunque ahora no lo ven, creyendo en él, se alegran con gozo inefable y glorioso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con gozo lleno de gloria» o «con gozo glorificado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - él
  lexicon: BDAG
  rationale: El pronombre relativo se refiere a Jesús en el contexto previo; en español, el objeto directo masculino animado se expresa naturalmente con 'lo'. 'A él' sería posible, pero menos fluido en esta construcción.
- source_word: ἰδόντες
  english_pob_choice: have not seen
  chosen_spanish: no lo han visto
  alternatives_spanish:
  - no lo vieron
  - sin haberlo visto
  lexicon: BDAG
  rationale: El participio aoristo expresa una experiencia pasada no realizada con relevancia presente. 'No lo han visto' comunica bien esa relación temporal en español actual.
- source_word: ἀγαπᾶτε
  english_pob_choice: you love
  chosen_spanish: lo aman
  alternatives_spanish:
  - lo aman ahora
  - aman a él
  lexicon: BDAG
  rationale: El presente de ἀγαπάω se traduce con el presente simple 'aman'. Se mantiene la referencia directa a Cristo mediante 'lo'.
- source_word: εἰς ὃν
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - creyendo en él
  - hacia él
  lexicon: BDAG
  rationale: Con πιστεύοντες εἰς ὃν, el valor idiomático es de confianza/fe dirigida a la persona. 'En él' es la forma española natural y transparente.
- source_word: ἄρτι
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por ahora
  - en este momento
  lexicon: BDAG
  rationale: Adverbio temporal que contrasta con la falta de visión presente frente a la futura. 'Ahora' es la opción más directa y natural.
- source_word: ὁρῶντες
  english_pob_choice: do not now see
  chosen_spanish: no lo ven
  alternatives_spanish:
  - no están viendo
  - no lo están viendo ahora
  lexicon: BDAG
  rationale: El participio presente se vierte como una cláusula finita en español para evitar rigidez. El sentido continuo queda suficientemente expresado por el contexto y 'ahora'.
- source_word: πιστεύοντες
  english_pob_choice: believing in him
  chosen_spanish: creyendo en él
  alternatives_spanish:
  - confiando en él
  - teniendo fe en él
  lexicon: BDAG; Louw-Nida
  rationale: Se conserva el participio presente y la dirección de la fe con 'creyendo en él'. 'Confiando' es posible, pero 'creyendo' refleja mejor el verbo del texto.
- source_word: δὲ
  english_pob_choice: yet
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - sin embargo
  lexicon: BDAG
  rationale: La partícula introduce contraste entre no ver y, aun así, creer y alegrarse. 'Pero' comunica ese giro con naturalidad en español.
- source_word: ἀγαλλιᾶσθε
  english_pob_choice: you rejoice
  chosen_spanish: se alegran
  alternatives_spanish:
  - exultan
  - se regocijan
  lexicon: BDAG
  rationale: El verbo indica júbilo intenso. 'Se alegran' es más natural en español; el matiz intensivo queda reforzado por la descripción del gozo.
- source_word: χαρᾷ
  english_pob_choice: with ... joy
  chosen_spanish: con gozo
  alternatives_spanish:
  - con alegría
  - en gozo
  lexicon: BDAG
  rationale: El dativo de modo se expresa idiomáticamente con 'con'. 'Gozo' conserva un registro bíblico claro sin depender de una fórmula arcaica.
- source_word: ἀνεκλαλήτῳ
  english_pob_choice: inexpressible
  chosen_spanish: inefable
  alternatives_spanish:
  - inexpresable
  - indecible
  lexicon: BDAG
  rationale: '''Inefable'' transmite con precisión la idea de algo que no puede expresarse con palabras y mantiene un tono digno y bíblico.'
- source_word: δεδοξασμένῃ
  english_pob_choice: glorious
  chosen_spanish: glorificado
  alternatives_spanish:
  - glorioso
  - lleno de gloria
  lexicon: BDAG
  rationale: Se preserva el valor verbal de participio perfecto pasivo con 'glorificado', siguiendo la sensibilidad auditada de la POB por no aplanar la forma. Aunque 'glorioso' suena más natural, se conserva la tensión formal del original.
theological_decisions:
- issue: Relación de πιστεύοντες εἰς ὃν
  english_pob_reading: believing in him
  chosen_spanish_reading: creyendo en él
  alternative_spanish_readings:
  - confiando en él
  - teniendo fe en él
  rationale: La construcción expresa fe personal dirigida a Cristo. 'Creyendo en él' conserva el verbo y la dirección de la fe sin introducir un matiz doctrinal ajeno al texto.
  doctrine_reference: 'DOCTRINE.md: πίστις / πιστεύω family; translation philosophy #3'
- issue: Rendering of δεδοξασμένῃ χαρᾷ
  english_pob_reading: glorious joy
  chosen_spanish_reading: gozo glorificado
  alternative_spanish_readings:
  - gozo glorioso
  - gozo lleno de gloria
  rationale: La forma participial perfecta pasiva merece una traducción que no la reduzca a mero adjetivo. 'Glorificado' preserva mejor la señal verbal; en el flujo español, queda unido al sintagma de gozo para no oscurecer el sentido.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 and #6'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió 'glorified joy' por 'glorious joy' por naturalidad. En español se decidió mantener la tensión del participio perfecto con 'glorificado', pero se añadió una nota alternativa para reflejar la posibilidad más fluida 'glorioso' o 'lleno de gloria'.
  spanish_consistency_notes:
  - Se mantuvo 'él' para el referente cristológico de manera uniforme en toda la frase.
  - '''Gozo'' se usó consistentemente para χαρά, en línea con el registro bíblico y la transparencia léxica.'
  - Se evitó 'SEÑOR' porque el versículo no contiene el Tetragrámaton ni una cita directa que lo exija.
  - La nota [a] está anclada en el texto y coincide exactamente con la alternativa registrada en la tradición auditada.
