revisions:
- from: Aunque no lo han visto[a], lo aman. Aunque ahora no lo ven, creyendo en él, se alegran con gozo inefable y glorificado.
  to: Aunque no lo han visto, lo aman. Aunque ahora no lo ven, creyendo en él, se alegran con gozo inefable y glorioso[a].
  rationale: Se cambia 'glorificado' por 'glorioso' para reflejar mejor δεδοξασμένῃ en español natural y alinearse con la revisión auditada del inglés POB. Se mueve la nota al término en cuestión, ya que la alternativa léxica pertenece al final del versículo y no a 'han visto'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:17:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura concesiva del griego: no haber visto y aun así amar, no ver ahora y aun así creer y regocijarse. También conserva adecuadamente ''creyendo en él'' para πιστεύοντες εἰς ὃν y ''con gozo inefable'' para χαρᾷ ἀνεκλαλήτῳ. Sin embargo, falla en el cierre al traducir δεδοξασμένῃ como ''glorificado'', cuando el propio rastro auditado en inglés ya revisó esa opción a ''glorious joy'' por naturalidad contextual. En español, ''gozo glorificado'' suena impropio y menos fiel al sentido idiomático del conjunto.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero necesita una reparación pequeña y significativa: ''gozo glorificado'' resulta poco natural y opaco para lectores hispanos. ''Gozo glorioso'' o ''gozo lleno de gloria'' comunican mejor el sentido sin perder el matiz elevado. También conviene alinear la nota con el texto revisado.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Lo aman', 'creyendo en él', 'gozo' e 'inefable' son adecuados. La única desalineación relevante es mantener 'glorificado' pese a que la auditoría POB ya prefirió el equivalente adjetival 'glorious' en esta unidad; en español debe reflejarse como 'glorioso' en el texto principal, con 'lleno de gloria' preservado en nota como alternativa.
  issues:
  - severity: medium
    issue: '''glorificado'' en ''gozo inefable y glorificado'''
    rationale: Aunque intenta reflejar la forma participial de δεδοξασμένῃ, en español esta expresión es poco natural y puede sugerir que el gozo fue objeto de una glorificación externa, en vez de describirlo como caracterizado por gloria. La revisión auditada en inglés ya resolvió este mismo punto hacia una forma adjetival más idiomática.
  - severity: low
    issue: Nota al pie desalineada con la mejor redacción española
    rationale: Si el texto principal usa 'glorioso', la nota debe conservar como alternativas 'lleno de gloria' y, si se desea, 'glorificado', pero no dejar una nota que suene como corrección del texto principal en vez de alternativa léxica.
  revised_spanish_text: Aunque no lo han visto, lo aman. Aunque ahora no lo ven, creyendo en él, se alegran con gozo inefable y glorioso[a].
  revised_footnotes:
  - marker: a
    text: 'O: «con gozo lleno de gloria» o «con gozo glorificado».'
    reason: lexical_alternative
  revision_rationale: Se cambia 'glorificado' por 'glorioso' para reflejar mejor δεδοξασμένῃ en español natural y alinearse con la revisión auditada del inglés POB. Se mueve la nota al término en cuestión, ya que la alternativa léxica pertenece al final del versículo y no a 'han visto'.
