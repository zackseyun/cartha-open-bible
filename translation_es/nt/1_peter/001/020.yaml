translation:
  language: es
  text: Él fue conocido de antemano[a] antes de la fundación del mundo, pero fue revelado al final de los tiempos[b] en favor de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fue escogido de antemano'; el griego dice 'fue conocido de antemano', lo cual puede implicar propósito divino, pero no exige esa interpretación más fuerte en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O 'en estos últimos tiempos'.
    reason: alternative_reading
lexical_decisions:
- source_word: προεγνωσμένου
  english_pob_choice: was foreknown
  chosen_spanish: fue conocido de antemano
  alternatives_spanish:
  - fue previsto de antemano
  - fue escogido de antemano
  lexicon: BDAG
  rationale: El griego expresa una relación previa de conocimiento respecto del Mesías. En español, 'fue conocido de antemano' preserva el sentido léxico sin convertirlo en 'escogido' en el texto principal. 'Previsto de antemano' suena posible pero menos personal; 'escogido de antemano' introduce una interpretación que el participio no exige.
- source_word: πρὸ καταβολῆς κόσμου
  english_pob_choice: before the foundation of the world
  chosen_spanish: antes de la fundación del mundo
  alternatives_spanish:
  - antes de la creación del mundo
  - antes de que existiera el mundo
  lexicon: BDAG
  rationale: La expresión es una locución idiomática estable y solemne. 'Antes de la fundación del mundo' reproduce bien la fuerza temporal y la formulación bíblica tradicional sin perder claridad en español.
- source_word: φανερωθέντος
  english_pob_choice: was revealed
  chosen_spanish: fue revelado
  alternatives_spanish:
  - fue manifestado
  - apareció
  lexicon: BDAG
  rationale: El participio pasivo señala que algo fue dado a conocer públicamente. 'Fue revelado' conserva ese valor y suena natural en español moderno. 'Fue manifestado' es más técnico; 'apareció' puede suavizar demasiado el matiz pasivo.
- source_word: ἐπ’ ἐσχάτου τῶν χρόνων
  english_pob_choice: at the end of the times
  chosen_spanish: al final de los tiempos
  alternatives_spanish:
  - en estos últimos tiempos
  - en el último de los tiempos
  lexicon: BDAG
  rationale: '''Al final de los tiempos'' transmite bien la fuerza escatológica y mantiene la reserva del griego, sin añadir el matiz deíctico de ''estos'' que no está explícito. La opción literal ''en el último de los tiempos'' suena menos natural en español.'
- source_word: δι’ ὑμᾶς
  english_pob_choice: for your sake
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - para ustedes
  - en favor de ustedes
  lexicon: BDAG
  rationale: La preposición aquí expresa beneficio o finalidad. 'Por causa de ustedes' hace explícita esa relación sin reducirla a un simple 'para ustedes', que puede sonar demasiado neutral. También conserva el tono explicativo del contexto.
theological_decisions:
- issue: Relación entre προεγνωσμένου y la idea de elección divina
  english_pob_reading: Retain 'foreknown' in the main text rather than interpretively rendering 'chosen beforehand.'
  chosen_spanish_reading: Mantener 'conocido de antemano' en el texto principal, sin convertirlo en 'escogido de antemano'.
  alternative_spanish_readings:
  - escogido de antemano
  - destinado de antemano
  rationale: El participio griego permite oír la tensión entre conocimiento previo y propósito divino, pero no obliga a resolverla en favor de una terminología electiva más fuerte. La redacción escogida conserva esa tensión y evita importar una conclusión doctrinal que el verso no formula explícitamente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Fuerza temporal de ἐπ’ ἐσχάτου τῶν χρόνων
  english_pob_reading: Render as 'at the end of the times' rather than a more interpretive 'in these last times.'
  chosen_spanish_reading: Traducir 'al final de los tiempos' y no 'en estos últimos tiempos'.
  alternative_spanish_readings:
  - en estos últimos tiempos
  - en el último de los tiempos
  rationale: El griego marca una época escatológica, pero no añade el demostrativo 'estos'. La opción elegida conserva el marco temporal y evita una intensificación interpretativa no presente en el texto.
  doctrine_reference: Translation philosophy §1 and §3
translation_notes:
  revision_awareness: 'El texto griego y el audit trail en inglés muestran un enfoque estable: conservar el valor de προεγνωσμένου como ''foreknown'' y mantener la frase escatológica sin añadir ''these''. La versión española sigue esa misma línea, con ajuste natural de sintaxis al español y sin ampliar el alcance teológico del participio.'
  spanish_consistency_notes:
  - Se usó 'conocido de antemano' para mantener la relación semántica con προγινώσκω sin imponer 'escogido'.
  - Se prefirió 'al final de los tiempos' por naturalidad y fidelidad al orden temporal del griego.
  - '''Por causa de ustedes'' comunica beneficio/finalidad de manera más explícita que un simple ''para ustedes''.'
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes, ya que el verso no contiene el nombre divino.
