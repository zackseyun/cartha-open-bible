translation:
  language: es
  text: En esto se regocijan, aunque ahora, por un poco, si es necesario, hayan sido entristecidos por diversas pruebas[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tentaciones»; el término griego también puede significar «pruebas» o «tentaciones» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: In this
  chosen_spanish: En esto
  alternatives_spanish:
  - En lo cual
  - En lo que
  - A causa de esto
  lexicon: BDAG
  rationale: La frase griega señala la esfera o base de la alegría, retomando el contexto previo. «En esto» conserva esa relación sin volverla torpemente literal como «en lo cual».
- source_word: ἀγαλλιᾶσθε
  english_pob_choice: you rejoice
  chosen_spanish: se alegran
  alternatives_spanish:
  - se regocijan
  - exultan
  - se alegran muchísimo
  lexicon: BDAG
  rationale: El verbo expresa una alegría intensa. En español, «se alegran» es claro y natural; el contexto y la nota pueden preservar la intensidad sin sobrecargar el texto principal.
- source_word: ὀλίγον ἄρτι
  english_pob_choice: now for a little while
  chosen_spanish: ahora, por un poco de tiempo
  alternatives_spanish:
  - por un poco de tiempo ahora
  - por breve tiempo, ahora
  - en este momento, por un poco de tiempo
  lexicon: BDAG
  rationale: 'La colocación mantiene los dos matices: tiempo presente («ahora») y duración breve («por un poco de tiempo»), con orden natural en español.'
- source_word: εἰ δέον
  english_pob_choice: if necessary
  chosen_spanish: si es necesario
  alternatives_spanish:
  - si hace falta
  - si fuera necesario
  - si ello es necesario
  lexicon: BDAG
  rationale: «Si es necesario» reproduce con precisión la condición de necesidad sin añadir interpretación teológica ni suavizar el valor de δέον.
- source_word: λυπηθέντες
  english_pob_choice: you have been grieved
  chosen_spanish: hayan sido afligidos
  alternatives_spanish:
  - hayan sido entristecidos
  - hayan sufrido tristeza
  - hayan quedado afligidos
  lexicon: BDAG
  rationale: El participio pasivo indica haber experimentado aflicción o dolor. «Afligidos» conserva el peso emocional y suena más natural que una calca como «entristecidos» en este contexto de sufrimiento.
- source_word: ἐν ποικίλοις πειρασμοῖς
  english_pob_choice: by various trials
  chosen_spanish: por diversas pruebas
  alternatives_spanish:
  - en diversas pruebas
  - por diversas tribulaciones
  - por diversas tentaciones
  lexicon: BDAG
  rationale: «Πειρασμοῖς» puede significar pruebas, pruebas de fe, o tentaciones según el contexto. Aquí el marco inmediato de sufrimiento favorece «pruebas»; «por» comunica bien la circunstancia o medio por el cual fueron afligidos. «Tentaciones» se reserva como posibilidad léxica, pero no como lectura principal.
theological_decisions:
- issue: Sentido de πειρασμοῖς en un contexto de sufrimiento y prueba de la fe
  english_pob_reading: trials
  chosen_spanish_reading: pruebas
  alternative_spanish_readings:
  - tentaciones
  - pruebas de fe
  - tribulaciones
  rationale: El contexto cercano habla de dolor presente y, en el versículo siguiente, de la prueba de la fe. «Pruebas» mantiene la tensión teológica entre sufrimiento y evaluación/probación sin reducir el término a tentación moral.
  doctrine_reference: Translation philosophy §3; preservar la tensión teológica en vez de resolverla
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y el audit trail inglés: mantiene el valor de esfera de ἐν ᾧ, la intensidad de ἀγαλλιᾶσθε sin sobrerrepresentarla, la doble temporalidad de ὀλίγον ἄρτι, la contingencia de εἰ δέον, el pasivo de λυπηθέντες y la ambigüedad controlada de πειρασμοῖς con una nota léxica.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se prefirió «pruebas» para πειρασμοῖς por el contexto inmediato de sufrimiento, evitando «tentaciones» como lectura principal.
  - La puntuación conserva el encadenamiento participial del griego sin hacerlo rígidamente literal.
  - «Se alegran» mantiene un registro sobrio y bíblico, apto para lectura pública.
