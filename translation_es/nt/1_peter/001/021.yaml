translation:
  language: es
  text: quienes por medio de él son creyentes en Dios[a], que lo resucitó de entre los muertos y le dio gloria, de manera que su fe y esperanza están en Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fieles»; la frase aquí probablemente significa los que creen en Dios por medio de Cristo.
    reason: lexical_alternative
  - marker: b
    text: O «con el resultado de que su fe y esperanza están en Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - a través de él
  - por él
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o agencia. «Por medio de él» conserva la mediación de Cristo y suena natural en español sin debilitar la relación causal/mediadora.
- source_word: πιστούς
  english_pob_choice: believers
  chosen_spanish: creyentes
  alternatives_spanish:
  - fieles
  - los que creen
  lexicon: BDAG
  rationale: En este contexto, con εἰς θεόν, el sentido es el de personas que creen en Dios. «Creyentes» comunica esa identidad de manera natural; «fieles» podría desplazar el matiz hacia lealtad general.
- source_word: εἰς θεόν
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - hacia Dios
  - para con Dios
  lexicon: BDAG
  rationale: Aquí εἰς marca el objeto/dirección de la fe; en español la forma idiomática es «creer en Dios». Mantiene el paralelismo con fe y esperanza dirigidas a Dios.
- source_word: τὸν ἐγείραντα αὐτὸν ἐκ νεκρῶν
  english_pob_choice: who raised him from the dead
  chosen_spanish: que lo resucitó de entre los muertos
  alternatives_spanish:
  - que lo levantó de los muertos
  - que lo despertó de entre los muertos
  lexicon: BDAG
  rationale: La fórmula es el modismo habitual de resurrección. «Resucitó de entre los muertos» es claro, fiel y idiomático en español bíblico contemporáneo.
- source_word: δόξαν αὐτῷ δόντα
  english_pob_choice: and gave him glory
  chosen_spanish: y le dio gloria
  alternatives_spanish:
  - y le concedió gloria
  - y le otorgó gloria
  lexicon: BDAG
  rationale: La acción divina de conferir gloria a Cristo se expresa de manera directa con «dio gloria». Es breve y mantiene el paralelismo con «resucitó».
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de manera que
  alternatives_spanish:
  - así que
  - con el resultado de que
  lexicon: BDAG
  rationale: La cláusula expresa resultado. «De manera que» preserva la conexión lógica sin forzar una lectura exclusivamente final o puramente consecutiva.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - creencia
  lexicon: BDAG
  rationale: El sustantivo πίστις se traduce normalmente como «fe» en este contexto. Conserva el término teológico básico y el paralelismo con «esperanza».
- source_word: ἐλπίδα
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - confianza expectante
  - expectativa
  lexicon: BDAG
  rationale: «Esperanza» es el equivalente natural de ἐλπίς en español bíblico y mantiene el par fe-esperanza del texto.
- source_word: εἶναι εἰς θεόν
  english_pob_choice: are in God
  chosen_spanish: estén en Dios
  alternatives_spanish:
  - sean en Dios
  - queden en Dios
  lexicon: BDAG
  rationale: El infinitivo con ὥστε expresa el estado resultante. «Estén en Dios» funciona bien en español para la relación de fe y esperanza dirigidas a Dios, conservando el eco de εἰς θεόν.
theological_decisions:
- issue: Sentido de πιστούς
  english_pob_reading: '''believers'' referring to those who believe in God through Christ'
  chosen_spanish_reading: '''creyentes'' referidos a quienes creen en Dios por medio de Cristo'
  alternative_spanish_readings:
  - '''fieles'''
  - '''los que creen'''
  rationale: La construcción con εἰς θεόν favorece el sentido de fe/creencia, no solo fidelidad ética. «Creyentes» evita añadir una connotación de obediencia meritoria que el texto no exige.
  doctrine_reference: 'Translation philosophy §3; Contested terms: πίστις'
- issue: Relación de Cristo con el acceso a Dios
  english_pob_reading: '''through him'' indicates mediated access/belief in God through Christ'
  chosen_spanish_reading: '''por medio de él'' indica acceso mediado a Dios por Cristo'
  alternative_spanish_readings:
  - '''a través de él'''
  - '''por él'''
  rationale: La preposición griega indica mediación. «Por medio de él» mantiene la teología del acceso mediado sin introducir formulaciones doctrinales ajenas al versículo.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Fuerza de la cláusula con ὥστε
  english_pob_reading: '''so that your faith and hope are in God'''
  chosen_spanish_reading: '''de manera que vuestra fe y esperanza estén en Dios'''
  alternative_spanish_readings:
  - '''así que vuestra fe y esperanza están en Dios'''
  - '''con el resultado de que vuestra fe y esperanza estén en Dios'''
  rationale: La cláusula puede expresar resultado derivado de la acción de Dios en Cristo. «De manera que» conserva esa lógica sin precisar más de lo que el griego requiere.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Sin cambios respecto del último repaso revisado: el sentido y la puntuación se mantienen estables conforme al control de revisión más reciente.'
  spanish_consistency_notes:
  - Se ha mantenido «Dios» para θεός y «fe/esperanza» para πίστις/ἐλπίς, en línea con el criterio terminológico del proyecto.
  - «Por medio de él» conserva la mediación de Cristo sin sustituirla por un calco demasiado rígido.
  - La forma verbal «estén» refleja el resultado del infinitivo griego y evita convertir la cláusula final en una afirmación demasiado estática.
