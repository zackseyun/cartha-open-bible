lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  lexicon: BDAG
  rationale: El contexto inmediato contrasta fuertemente con la negación anterior; en español, «sino» expresa mejor la corrección contrastiva que «pero».
- source_word: τιμίῳ
  english_pob_choice: precious
  chosen_spanish: preciosa
  alternatives_spanish:
  - valiosa
  - costosa
  lexicon: BDAG
  rationale: «Preciosa» conserva el valor elevado y el tono reverente de la frase, y es una colocación natural con «sangre» en español.
- source_word: αἵματι
  english_pob_choice: blood
  chosen_spanish: sangre
  lexicon: BDAG
  rationale: Se mantiene el sustantivo concreto «sangre», sin sustituirlo por una paráfrasis teológica.
- source_word: ὡς ἀμνοῦ
  english_pob_choice: like that of a lamb
  chosen_spanish: como de un cordero
  alternatives_spanish:
  - como la de un cordero
  - igual que la de un cordero
  lexicon: BDAG
  rationale: La comparación se formula de modo que en español quede claro que modifica «sangre», no que el Mesías sea literalmente un cordero en sentido biológico o descriptivo simple.
- source_word: ἀμώμου
  english_pob_choice: without blemish
  chosen_spanish: sin mancha
  alternatives_spanish:
  - sin defecto
  - sin tacha
  lexicon: BDAG
  rationale: «Sin mancha» refleja bien el lenguaje sacrificial y la aceptabilidad cultual, con un equivalente natural en español bíblico contemporáneo.
- source_word: ἀσπίλου
  english_pob_choice: without spot
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  lexicon: BDAG
  rationale: Se distingue del término anterior para conservar el paralelismo de dos descriptores diferentes. «Sin defecto» comunica bien la idea de integridad/ausencia de falla, sin fusionarlo con «sin mancha».
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se traduce el título con su equivalente transparente en español, preservando el valor semántico de Χριστός como título y no como simple nombre propio.
theological_decisions:
- issue: Renderización de Χριστοῦ como título mesiánico
  english_pob_reading: Messiah, not Christ, to preserve the title's meaning transparently
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La guía POB favorece «Mesías» cuando Χριστός funciona como título. En este versículo la forma genitiva mantiene ese sentido titular en un contexto sacrificial-mesiánico, por lo que «Mesías» es la opción más transparente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός / Christos | Default Spanish: Mesías (where title; Cristo where name-like)'
- issue: Relación entre el sustantivo «sangre» y la comparación con el cordero
  english_pob_reading: like that of a lamb without blemish and without spot
  chosen_spanish_reading: como de un cordero sin mancha y sin defecto
  alternative_spanish_readings:
  - como un cordero sin mancha y sin defecto
  - como la de un cordero sin mancha y sin defecto
  rationale: La construcción española evita ambigüedad y conserva la comparación aplicada a la sangre, que remite a la imagen sacrificial del texto sin explicitar más de lo que la forma griega exige.
  doctrine_reference: 'DOCTRINE.md: Preserve sacrificial imagery and lexical force without over-paraphrase'
translation_notes:
  revision_awareness: El texto sigue la última restauración del expediente inglés, que revirtió «Christ» a «Messiah» para Χριστοῦ. La versión española adopta «Mesías» de acuerdo con esa decisión y con la política terminológica del proyecto. También conserva el paralelismo sacrificial con dos descriptores distintos para ἀμώμου y ἀσπίλου.
  spanish_consistency_notes:
  - Se mantiene «Mesías» como equivalente regular de Χριστός cuando funciona como título.
  - Se preserva la diferencia entre «sin mancha» y «sin defecto» para no aplanar el paralelismo griego.
  - La comparación se formula de modo natural en español sin perder la referencia al valor sacrificial de la sangre.
