translation:
  language: es
  text: sino con la sangre preciosa del Mesías[a], como la de un cordero sin mancha y sin defecto,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cristo». El griego Χριστοῦ puede traducirse «Cristo» en una formulación más tradicional, pero «Mesías» hace más transparente aquí el sentido del título.'
