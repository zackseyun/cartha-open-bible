translation:
  language: es
  text: al observar su conducta pura con temor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con reverencia». La frase griega «en temor» puede denotar temor reverente delante de Dios, expresado en una conducta pura.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποπτεύσαντες
  english_pob_choice: when they observe
  chosen_spanish: al observar
  alternatives_spanish:
  - cuando observen
  - después de observar
  - habiendo observado
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción de observación atenta. En español, «al observar» conserva la relación temporal/condicional de la construcción sin sonar forzado, y mantiene la idea de observación directa o cuidadosa.
- source_word: ἁγνὴν
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - casta
  - limpia
  - íntegra
  lexicon: BDAG
  rationale: «Pura» es la equivalencia más amplia y natural en español para ἁγνός en este contexto moral. Evita restringir el sentido solo a castidad sexual, aunque no excluye esa idea si el contexto la sugiere.
- source_word: ἀναστροφὴν
  english_pob_choice: conduct
  chosen_spanish: conducta
  alternatives_spanish:
  - manera de vivir
  - comportamiento
  - modo de vida
  lexicon: BDAG
  rationale: «Conducta» comunica bien ἀναστροφή como conducta visible y patrón de vida. Es claro, idiomático y suficientemente amplio para el énfasis ético del verso.
- source_word: ἐν φόβῳ
  english_pob_choice: with fear
  chosen_spanish: con temor
  alternatives_spanish:
  - con reverencia
  - en reverencia
  - con temor reverente
  lexicon: BDAG
  rationale: «Temor» conserva el valor léxico básico de φόβος y no borra la tensión interpretativa entre miedo, reverencia o respeto. En español, «con temor» suena natural unido a «conducta» y permite que el lector perciba la posible reverencia a Dios sin resolverla de antemano.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - de ustedes
  - vuestra
  lexicon: BDAG
  rationale: El posesivo plural en español estándar se expresa con «su» para un destinatario plural, manteniendo naturalidad y claridad. El contexto ya identifica que se trata de la conducta de los destinatarios.
theological_decisions:
- issue: Sentido de φόβος en ἐν φόβῳ
  english_pob_reading: Retain the more literal 'with fear' in the main text, allowing readers to hear the likely sense of reverent fear before God without over-resolving the referent.
  chosen_spanish_reading: Mantener «con temor» en el texto principal, sin decidir si el matiz es miedo, reverencia o temor reverente.
  alternative_spanish_readings:
  - con reverencia
  - con temor reverente
  - en reverencia hacia Dios
  - con respeto
  rationale: La frase griega usa φόβος, no un término inequívoco de respeto. Traducirlo como «con temor» preserva la tensión semántica y deja abierta la posibilidad de reverencia delante de Dios, tal como indica el audit trail en inglés.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La base inglesa fue revisada de «in fear» a «with fear» para reflejar más naturalmente en inglés la relación de la frase preposicional con «conduct». En español, se mantuvo la ambigüedad deliberada con «con temor», que es idiomático y respeta la misma tensión interpretativa.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o una paráfrasis devocional, porque el pasaje no contiene el nombre divino ni exige una resolución confesional añadida.
  - «Pura» conserva la amplitud moral del adjetivo griego y no limita indebidamente el verso a pureza sexual.
  - La sintaxis «al observar... con temor» sigue de cerca la función del participio sin caer en una traducción mecánica.
