  to: al observar su conducta pura con temor[a].
  rationale: 'Se corrige una cuestión menor pero importante de legibilidad y de fidelidad formal al aparato: se elimina la coma que separaba indebidamente «con temor» y se mueve la nota al pie al término que realmente comenta. Así se preserva mejor la relación de ἐν φόβῳ con la conducta y se evita confusión para el lector español.'
