translation:
  language: es
  text: Porque también el Mesías[a] padeció una sola vez por los pecados, el justo por los injustos, para acercarlos a Dios, habiendo sido puesto a muerte en la carne, pero vivificado en el espíritu[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «murió» en lugar de «padeció».
    reason: textual_variant
  - marker: b
    text: O «por medio del Espíritu». El griego puede referirse ya sea a la esfera o aspecto del espíritu, ya sea a la agencia del Espíritu Santo.
    reason: alternative_reading
lexical_decisions:
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular y mesiánico de Χριστός, siguiendo la decisión POB de usar 'Messiah' en inglés. En español, 'Mesías' comunica ese mismo título con naturalidad y sin convertirlo en un nombre fijo eclesiástico.
- source_word: ἅπαξ
  english_pob_choice: once
  chosen_spanish: una sola vez
  alternatives_spanish:
  - una vez
  - de una vez para siempre
  lexicon: BDAG
  rationale: '''Una sola vez'' mantiene el valor adverbial simple de ἅπαξ y, como en el inglés POB, evita añadir explícitamente la idea de ''para siempre'', que sería una inferencia teológica legítima pero no obligatoria en la forma breve del griego.'
- source_word: περὶ ἁμαρτιῶν
  english_pob_choice: for sins
  chosen_spanish: por los pecados
  alternatives_spanish:
  - acerca de los pecados
  - por causa de los pecados
  lexicon: BDAG
  rationale: En este contexto sacrificial/redentor, περί con genitivo puede expresar finalidad o referencia con sentido de beneficio/expiación. 'Por los pecados' reproduce bien esa fuerza y mantiene la concisión del original.
- source_word: ἔπαθεν
  english_pob_choice: suffered
  chosen_spanish: padeció
  alternatives_spanish:
  - sufrió
  - murió
  lexicon: BDAG
  rationale: '''Padeció'' conserva el sentido de sufrir y permite distinguirlo de ''murió'', siguiendo la lectura principal del texto griego (ἔπαθεν) y la nota textual del inglés POB sobre la variante ''died''.'
- source_word: δίκαιος
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el inocente
  lexicon: BDAG
  rationale: Como adjetivo sustantivado en contraste con 'los injustos', 'el justo' mantiene la oposición moral/judicial del griego y es una equivalencia natural en español bíblico sin perder precisión.
- source_word: ὑπὲρ ἀδίκων
  english_pob_choice: for the unrighteous
  chosen_spanish: por los injustos
  alternatives_spanish:
  - en favor de los injustos
  - en lugar de los injustos
  lexicon: BDAG
  rationale: ὑπέρ expresa aquí beneficio, representación o sustitución. 'Por los injustos' conserva esa amplitud sin cerrar el sentido a una sola formulación doctrinal, como también hace el inglés POB.
- source_word: προσαγάγῃ
  english_pob_choice: might bring
  chosen_spanish: llevarlos
  alternatives_spanish:
  - presentarlos
  - acercarlos
  lexicon: BDAG
  rationale: El verbo puede significar introducir ante alguien o llevar a la presencia de alguien. 'Llevarlos a Dios' es idiomático en español y preserva la idea de acceso relacional sin sobrecargar la frase.
- source_word: θεῷ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: Se mantiene 'Dios' como designación directa y clara del destinatario del acceso. La preposición queda expresada en la construcción verbal española 'llevarlos a Dios'.
- source_word: θανατωθεὶς
  english_pob_choice: having been put to death
  chosen_spanish: muerto
  alternatives_spanish:
  - habiendo sido puesto a muerte
  - ejecutado
  lexicon: BDAG
  rationale: En español, 'muerto en la carne' comunica de manera natural el participio pasivo en este paralelismo. Aunque es menos analítico que la forma inglesa, conserva el contraste del pasaje sin sonar artificial.
- source_word: σαρκὶ
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en el cuerpo
  - con respecto a la carne
  lexicon: BDAG
  rationale: Se conserva 'carne' para no diluir la tensión teológica y lexical de σάρξ. Aquí el término apunta a la esfera de la existencia corporal/mortal, no a 'naturaleza humana' en sentido interpretativo.
- source_word: ζῳοποιηθεὶς
  english_pob_choice: made alive
  chosen_spanish: vivificado
  alternatives_spanish:
  - hecho vivo
  - dado vida
  lexicon: BDAG
  rationale: '''Vivificado'' refleja directamente el pasivo de ζῳοποιέω y mantiene un registro bíblico digno. En español litúrgico y académico es claro y preciso.'
- source_word: πνεύματι
  english_pob_choice: in the spirit
  chosen_spanish: en el espíritu
  alternatives_spanish:
  - por el Espíritu
  - en Espíritu
  lexicon: BDAG
  rationale: Se conserva la ambigüedad del dativo para no resolver en el texto principal si se trata de esfera/aspecto espiritual o de la agencia del Espíritu Santo. 'En el espíritu' sigue la línea del inglés POB y deja abierta la tensión del griego.
theological_decisions:
- issue: Contraste final entre carne y espíritu
  english_pob_reading: Rendered as 'in the flesh ... in the spirit' to preserve the parallel datives as spheres/aspects rather than explicitly identifying 'Spirit' as the Holy Spirit in the main text.
  chosen_spanish_reading: '''muerto en la carne, pero vivificado en el espíritu'' mantiene el paralelismo y la ambigüedad del original.'
  alternative_spanish_readings:
  - '''muerto en el cuerpo, pero vivificado por el Espíritu'''
  - '''muerto en la carne, pero vivificado en el Espíritu Santo'''
  rationale: El griego permite una lectura de esfera/aspecto y también una lectura agentiva. La traducción principal no debe resolver la ambigüedad que el texto deja abierta; por eso se preserva 'en el espíritu' y no se capitaliza ni se explicita la agencia del Espíritu Santo en el cuerpo del verso.
  doctrine_reference: Translation philosophy §3; Contested terms table for σάρξ
- issue: Valor redentor de 'el justo por los injustos'
  english_pob_reading: Retained the representative/substitutionary wording 'the righteous for the unrighteous' without expanding it into a fuller atonement theory.
  chosen_spanish_reading: '''el justo por los injustos'' conserva la formulación representativa/substitutiva sin ampliarla.'
  alternative_spanish_readings:
  - '''el inocente en lugar de los culpables'''
  - '''el justo en favor de los injustos'''
  rationale: El verso afirma claramente un beneficio o sustitución en favor de otros, pero la traducción no debe introducir una teoría más desarrollada que la que expresan las palabras griegas. La formulación elegida es fiel y teológicamente sobria.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
- issue: Texto variante en ἔπαθεν frente a 'murió'
  english_pob_reading: The attested SBLGNT reading is 'suffered'; a footnote notes the manuscript variant 'died'.
  chosen_spanish_reading: El texto principal dice 'padeció', con nota sobre la variante textual que lee 'murió'.
  alternative_spanish_readings:
  - '''murió'''
  - '''sufrió'''
  rationale: La lectura base del griego es ἔπαθεν ('padeció/sufrió'), no ἀπέθανεν ('murió'). La nota textual preserva la variante conocida sin desplazar la lectura principal del versículo.
  doctrine_reference: Textual criticism note in the English POB audit trail
translation_notes:
  revision_awareness: El texto español sigue la revisión restaurada que volvió a colocar Χριστός como 'Messiah' en el POB inglés, por lo que en español se conserva 'el Mesías' y no 'Cristo'. También se refleja la decisión final de mantener ἔπαθεν como sufrimiento/padecimiento en la línea principal, con nota textual sobre la variante 'murió'.
  spanish_consistency_notes:
  - Se usa 'Mesías' para Χριστός, coherente con el valor titular y con la política POB; no se emplea 'Cristo' como forma base.
  - Se mantiene 'carne' para σάρξ y 'espíritu' en minúscula para πνεύματι, preservando la ambigüedad del original.
  - '''Dios'' se traduce sin perífrasis adicional; la relación de acceso queda expresada por ''llevarlos a''.'
  - 'La puntuación reproduce el paralelismo y la pausa del griego: primera cláusula causal, contraste central y cláusula final resultativa.'
