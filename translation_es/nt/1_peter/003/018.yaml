revisions:
- from: Porque también el Mesías[a] padeció una sola vez por los pecados, el justo por los injustos, para llevarlos a Dios[b]; muerto en la carne, pero vivificado en el espíritu.
  to: Porque también el Mesías[a] padeció una sola vez por los pecados, el justo por los injustos, para acercarlos a Dios, habiendo sido puesto a muerte en la carne, pero vivificado en el espíritu[b].
  rationale: Se corrigió «llevarlos» a «acercarlos» para reflejar de manera natural y fiel el sentido de προσαγάγῃ con objeto de segunda persona plural sin crear ambigüedad pronominal en español. Se revisó «muerto» a «habiendo sido puesto a muerte» para conservar mejor la voz pasiva de θανατωθεὶς. También se movió la nota [b] para anclarla a «espíritu», que es el término cuya ambigüedad explica la nota.
