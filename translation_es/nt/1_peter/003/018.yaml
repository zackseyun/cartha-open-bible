base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/018.yaml
  text: For Messiah also suffered once for sins[a], the righteous for the unrighteous, so that he might bring you to God[b], having been put to death in the flesh but made alive in the spirit.
  footnotes:
  - marker: a
    text: Some manuscripts read 'died' instead of 'suffered.'
    reason: textual_variant
  - marker: b
    text: Or 'made alive by the Spirit.' The Greek may refer either to the sphere/aspect of spirit or to the agency of the Holy Spirit.
    reason: alternative_reading
