lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Se conserva el conectivo discursivo simple del griego. «Y» mantiene el enlace con la exhortación anterior sin añadir matiz adversativo o temporal que el texto no exige.
- source_word: τίς ὁ κακώσων
  english_pob_choice: who will harm
  chosen_spanish: quién será el que os haga daño
  alternatives_spanish:
  - quién os hará daño
  - quién será el que os perjudique
  - quién os maltratará
  lexicon: BDAG
  rationale: El participio futuro con artículo funciona de modo sustantivado; en español se reproduce de forma natural con una construcción relativa futura. «Haga daño» conserva el sentido amplio de causar perjuicio o maltrato sin estrecharlo demasiado.
- source_word: κακώσων
  english_pob_choice: harm
  chosen_spanish: haga daño
  alternatives_spanish:
  - perjudique
  - maltrate
  - lastime
  lexicon: BDAG
  rationale: «Daño» expresa bien el alcance general de κακόω, que puede abarcar injuriar, perjudicar o maltratar. En este contexto la formulación amplia es más fiel que una opción demasiado específica.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - en caso de que
  - con tal de que
  lexicon: BDAG
  rationale: La cláusula condicional con subjuntivo se vierte con el condicional normal «si», que comunica con claridad la relación lógica del pasaje.
- source_word: τοῦ ἀγαθοῦ
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo que es bueno
  - el bien moral
  lexicon: BDAG
  rationale: El genitivo neutro con ζηλωταί se entiende como el objeto de celo. «Lo bueno» es una solución natural en español y mantiene el valor abstracto sin volverlo demasiado conceptual.
- source_word: ζηλωταὶ
  english_pob_choice: zealous for
  chosen_spanish: celosos por
  alternatives_spanish:
  - entusiastas por
  - ardientes por
  - deseosos de
  lexicon: BDAG
  rationale: Se preserva el sustantivo de calidad con la preposición «por», reflejando la idea de ser celosos o fervorosos respecto de algo. «Celosos» mantiene la fuerza lexical sin forzar una perífrasis interpretativa.
- source_word: γένησθε
  english_pob_choice: you become
  chosen_spanish: llegáis a ser
  alternatives_spanish:
  - lleguéis a ser
  - os volváis
  - llegan a ser
  lexicon: BDAG
  rationale: El aoristo subjuntivo de γίνομαι expresa ingreso en un estado; «llegar a ser» reproduce bien ese matiz. Se usa «llegáis» en el tono exhortativo general de la dirección plural dirigida a los lectores.
theological_decisions:
- issue: Fuerza de la pregunta retórica frente al sufrimiento por hacer el bien
  english_pob_reading: 'A general rhetorical assurance: believers are not presented as immune from suffering; the question frames the normal expectation of no real harm in the ultimate sense, without overstating an absolute promise.'
  chosen_spanish_reading: 'Una pregunta retórica de ánimo: no se convierte en una promesa absoluta de inmunidad al sufrimiento, sino que mantiene la fuerza general de la exhortación.'
  alternative_spanish_readings:
  - Una promesa absoluta de que nadie podrá hacerles daño
  - Una declaración de que el creyente nunca sufrirá ningún mal
  rationale: El contexto inmediato reconoce que puede haber sufrimiento por hacer el bien. La traducción conserva la forma interrogativa y evita convertirla en una garantía doctrinal más fuerte de lo que el pasaje afirma.
  doctrine_reference: Preservar la tensión teológica del texto en su contexto inmediato.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios adicionales respecto del sentido base auditado en inglés; la versión española conserva la estructura retórica, el valor condicional y la tensión teológica del versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente exige el nombre divino; aquí no aparece ningún término correspondiente.
  - Se mantiene el registro bíblico moderno y digno, evitando calcos innecesarios.
  - Se conserva el plural de segunda persona con «os» para reflejar el destinatario comunitario.
  - No se sustituye «celosos» por una paráfrasis más débil, porque el campo semántico de ζηλωταί requiere fuerza afectiva.
  - La nota al pie preserva la alternativa léxica documentada en el POB inglés con equivalente natural en español.
