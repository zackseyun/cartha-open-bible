  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: «Porque» para γάρ, «de esta manera» para οὕτως, referencia temporal pasada para ποτε, «las santas mujeres» para αἱ ἅγιαι γυναῖκες, esperanza en Dios, auto-adorno, y el participio de sumisión limitado a «sus propios» esposos/maridos. Sin embargo, «esperaban en Dios» suena menos natural en español bíblico actual que «ponían su esperanza en Dios», y la nota alternativa actual no corresponde bien al inglés auditado ni al mejor español.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene dos detalles mejorables: la colocación de comas alrededor de «en otro tiempo también» hace la frase algo trabada, y «maridos» puede sonar más coloquial o restringido que «esposos» en un registro eclesial amplio. Además, la nota al pie tiene comillas y puntuación poco naturales (''O: «...».'').'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» es correcto para θεόν. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión sobre ἀνήρ puede expresarse mejor como «esposos» sin perder fidelidad contextual, y se mantiene adecuadamente «sus propios» para ἰδίοις.
  issues:
  - severity: medium
    issue: «que esperaban en Dios» es poco idiomático en español aquí
    rationale: Aunque calca de cerca el inglés POB, en español bíblico natural ἐλπίζουσαι εἰς θεόν se expresa mejor como «que ponían su esperanza en Dios» o «que tenían su esperanza en Dios». Esto preserva el sentido de esperanza orientada hacia Dios y mejora la legibilidad.
  - severity: low
    issue: Puntuación algo pesada en «de esta manera, en otro tiempo también,»
    rationale: Las dos comas interrumpen innecesariamente el flujo. «Porque así también, en otro tiempo...» o «Porque de esta manera también, en otro tiempo...» suena más fluido.
  - severity: low
    issue: La nota al pie necesita normalización de estilo
    rationale: 'La forma «''O: «...».»'' no sigue un estilo limpio. Debe presentarse sin comillas sobrantes y con redacción natural.'
  revised_spanish_text: Porque así también, en otro tiempo, las santas mujeres que ponían su esperanza en Dios se adornaban[a], sometiéndose a sus propios esposos.
  revised_footnotes:
  - marker: a
    text: 'O: «que esperaban en Dios».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la redacción para lograr un español más natural y eclesialmente legible sin apartarse del griego ni del rastro de auditoría inglés. «Así también, en otro tiempo» refleja bien οὕτως... ποτε καὶ con mejor fluidez; «ponían su esperanza en Dios» expresa con mayor naturalidad ἐλπίζουσαι εἰς θεόν; «esposos» mantiene el sentido de ἀνδράσιν en contexto matrimonial y suena más neutral que «maridos». La nota al pie conserva la alternativa más literal documentada por el inglés POB.
