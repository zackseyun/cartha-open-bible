translation:
  language: es
  text: Porque así también, en otro tiempo, las santas mujeres que ponían su esperanza en Dios se adornaban[a], sometiéndose a sus propios esposos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que esperaban en Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - de este modo
  lexicon: BDAG
  rationale: El adverbio retoma la manera descrita en el contexto inmediato. «De esta manera» conserva ese valor de referencia y suena natural en español contemporáneo.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la base explicativa de la exhortación anterior. «Porque» expresa con claridad esa relación causal o explicativa en español.
- source_word: ποτε
  english_pob_choice: formerly
  chosen_spanish: en otro tiempo
  alternatives_spanish:
  - antes
  - antiguamente
  lexicon: BDAG
  rationale: Se refiere a mujeres de generaciones pasadas. «En otro tiempo» mantiene el sentido histórico sin sonar arcaico.
- source_word: αἱ ἅγιαι γυναῖκες
  english_pob_choice: the holy women
  chosen_spanish: las santas mujeres
  alternatives_spanish:
  - las mujeres santas
  - las mujeres piadosas
  lexicon: BDAG
  rationale: Se conserva ἅγιος como «santas», sin debilitarlo a «piadosas». El artículo y el adjetivo se mantienen con naturalidad en español.
- source_word: αἱ ἐλπίζουσαι εἰς θεὸν
  english_pob_choice: who hoped in God
  chosen_spanish: que esperaban en Dios
  alternatives_spanish:
  - que habían puesto su esperanza en Dios
  - que confiaban en Dios
  lexicon: BDAG
  rationale: La forma participial describe a estas mujeres por su actitud habitual. «Esperaban en Dios» preserva el verbo de esperanza y la preposición directa, sin añadir una paráfrasis excesiva.
- source_word: ἐκόσμουν ἑαυτάς
  english_pob_choice: adorned themselves
  chosen_spanish: se adornaban
  alternatives_spanish:
  - se embellecían
  - se engalanaban
  lexicon: BDAG
  rationale: κοσμέω aquí apunta a adornarse, en conexión con el tema inmediato del adorno verdadero. «Se adornaban» preserva el campo léxico y su tono sobrio.
- source_word: ὑποτασσόμεναι
  english_pob_choice: submitting
  chosen_spanish: sometiéndose
  alternatives_spanish:
  - sujetándose
  - subordinándose
  lexicon: BDAG
  rationale: El participio expresa el modo en que se adornaban. «Sometiéndose» comunica la acción subordinada con claridad; «sujetándose» es posible, pero menos natural en este contexto.
- source_word: τοῖς ἰδίοις ἀνδράσιν
  english_pob_choice: to their own husbands
  chosen_spanish: a sus propios maridos
  alternatives_spanish:
  - a sus propios esposos
  - a sus propios hombres
  lexicon: BDAG
  rationale: ἀνήρ en este contexto doméstico significa «marido». Se conserva «propios» porque el griego lo expresa explícitamente y limita el alcance relacional.
theological_decisions:
- issue: Alcance de la sumisión en el matrimonio
  english_pob_reading: submitting to their own husbands
  chosen_spanish_reading: sometiéndose a sus propios maridos
  alternative_spanish_readings:
  - sujetas a sus maridos
  - subordinándose a sus maridos
  rationale: La frase describe el comportamiento de las mujeres ejemplares mencionadas en el versículo. Se mantiene la relación matrimonial concreta sin ampliar el enunciado a una tesis general sobre todas las relaciones entre hombres y mujeres.
  doctrine_reference: 1 Pedro 3:5; filosofía de traducción POB sobre equivalencia óptima y alcance contextual
- issue: Valor de la esperanza en Dios
  english_pob_reading: who hoped in God
  chosen_spanish_reading: que esperaban en Dios
  alternative_spanish_readings:
  - que pusieron su esperanza en Dios
  - que confiaban en Dios
  rationale: El participio griego caracteriza a las mujeres por su dependencia esperanzada de Dios. «Esperaban en Dios» conserva esa tensión entre confianza perseverante y orientación de la esperanza, sin convertirla en una explicación interpretativa más fuerte.
  doctrine_reference: BDAG sobre ἐλπίζω; contexto inmediato de 1 Pedro 3
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión inglesa reciente movió «also» a una posición más natural y eliminó el artículo antes de «holy women». En español, «también» queda integrado en la secuencia «en otro tiempo también» para reflejar ese valor aditivo sin sobrecargar la frase, y no se introduce un artículo adicional innecesario.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo usa θεός y por eso se traduce «Dios».
  - 'Se conserva un estilo formal y readable, evitando calcos rígidos; aun así, se preservan los elementos léxicos clave: santas, esperaban, se adornaban, sometiéndose.'
  - No se usa «Cristo», «SEÑOR» ni otras sustituciones ajenas al griego de este versículo.
  - La nota textual alternativa se vincula al participio ἐλπίζουσαι y no altera el texto principal.
