translation:
  language: es
  text: Asimismo, ustedes, maridos, convivan con sus esposas con entendimiento[a], otorgando honor a la mujer[b] como a un vaso más débil, como también a coherederas[c] de la gracia de la vida, para que sus oraciones no sean estorbadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con conocimiento'.
    reason: lexical_alternative
  - marker: b
    text: '''Vaso más débil'' conserva la metáfora del griego y probablemente alude a una vulnerabilidad relativa física o social, no a una menor dignidad. La frase siguiente afirma que ellas son también coherederas de la gracia de la vida.'
    reason: theological_note
  - marker: c
    text: O 'herederas juntamente de la gracia de la vida'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ ἄνδρες
  english_pob_choice: husbands
  chosen_spanish: maridos
  alternatives_spanish:
  - hombres
  lexicon: BDAG
  rationale: En el contexto doméstico de 1 Pedro 3:1-7, ἄνδρες se refiere de manera natural a los esposos, no a los hombres en general. 'Maridos' comunica la relación marital de forma directa en español.
- source_word: ὁμοίως
  english_pob_choice: Likewise
  chosen_spanish: Asimismo
  alternatives_spanish:
  - Igualmente
  - De la misma manera
  lexicon: BDAG
  rationale: Mantiene la conexión discursiva con la exhortación previa sin cargar una interpretación adicional.
- source_word: συνοικοῦντες
  english_pob_choice: living together with your wives
  chosen_spanish: convivan con sus esposas
  alternatives_spanish:
  - vivan con sus esposas
  - habiten con sus esposas
  lexicon: BDAG
  rationale: El participio describe la vida matrimonial compartida. 'Convivan' es natural en español y conserva la idea de compartir la vida conyugal.
- source_word: κατὰ γνῶσιν
  english_pob_choice: according to knowledge
  chosen_spanish: con entendimiento
  alternatives_spanish:
  - según conocimiento
  - de manera entendida
  lexicon: BDAG
  rationale: La expresión griega admite la idea de actuar con conocimiento o discernimiento. En español, 'con entendimiento' comunica esa pauta práctica de modo claro y natural, como alternativa equivalente a la traducción más formal 'según conocimiento'.
- source_word: ἀσθενεστέρῳ
  english_pob_choice: weaker
  chosen_spanish: más débil
  alternatives_spanish:
  - más vulnerable
  - más frágil
  lexicon: BDAG
  rationale: Se conserva el comparativo sin especificar más de lo que dice el texto. 'Más débil' mantiene la tensión del original sin resolverla en una sola explicación moderna.
- source_word: σκεύει
  english_pob_choice: vessel
  chosen_spanish: vaso
  alternatives_spanish:
  - vasija
  - instrumento
  lexicon: BDAG
  rationale: '''Vaso'' es una forma válida en español bíblico para mantener la metáfora de recipiente/vasija sin explicarla en exceso. Conserva el efecto figurado del griego.'
- source_word: τῷ γυναικείῳ
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la femenina
  - la esposa
  lexicon: BDAG
  rationale: El adjetivo sustantivado se refiere a la mujer como tal. 'La mujer' es idiomático y fiel; 'la esposa' interpretaría más de lo que el griego dice explícitamente.
- source_word: ἀπονέμοντες τιμήν
  english_pob_choice: assigning honor
  chosen_spanish: dando honor
  alternatives_spanish:
  - otorgando honor
  - asignando honor
  lexicon: BDAG
  rationale: ἀπονέμω implica dar lo debido. 'Dando honor' suena natural en español y preserva la idea de conceder el honor que corresponde.
- source_word: συγκληρονόμοις
  english_pob_choice: fellow heirs
  chosen_spanish: coherederas
  alternatives_spanish:
  - coherederos
  - herederas juntamente
  lexicon: BDAG
  rationale: El contexto inmediato se refiere a las esposas, por eso el femenino plural es apropiado en español. 'Coherederas' expresa la participación compartida en la herencia.
- source_word: χάριτος ζωῆς
  english_pob_choice: the grace of life
  chosen_spanish: de la gracia de la vida
  alternatives_spanish:
  - de la gracia vital
  - de la vida como gracia
  lexicon: BDAG
  rationale: Se mantiene la construcción genitiva con mínima interpretación, como en el inglés POB, para no estrechar el sentido de χάρις ζωῆς.
- source_word: ἐγκόπτεσθαι
  english_pob_choice: be hindered
  chosen_spanish: sean estorbadas
  alternatives_spanish:
  - sean impedidas
  - sean obstaculizadas
  lexicon: BDAG
  rationale: El pasivo comunica impedimento real para la oración. 'Estorbadas' es claro, bíblico y natural en español.
- source_word: προσευχὰς
  english_pob_choice: prayers
  chosen_spanish: oraciones
  alternatives_spanish:
  - plegarias
  - oraciones y súplicas
  lexicon: BDAG
  rationale: '''Oraciones'' es el equivalente directo y comprensible. Se preserva el plural como en el griego.'
theological_decisions:
- issue: Sentido de 'más débil vaso'
  english_pob_reading: Weaker vessel is a metaphor that likely refers to relative physical or social vulnerability, not lesser worth.
  chosen_spanish_reading: Se conserva la metáfora de 'un vaso más débil' sin explicarla dentro del texto principal.
  alternative_spanish_readings:
  - un vaso más vulnerable
  - una vasija más frágil
  - un recipiente más débil
  rationale: La frase griega mantiene una tensión que no debe resolverse en la traducción principal. El texto debe reflejar la metáfora y dejar que el lector vea que la dignidad de la mujer no queda negada por el comparativo, especialmente porque el mismo versículo la presenta como coheredera.
  doctrine_reference: Translation philosophy §3; affirmations on preserving lexical/theological tension.
- issue: Herencia compartida de la mujer
  english_pob_reading: wives are also fellow heirs of the grace of life
  chosen_spanish_reading: las esposas son también coherederas de la gracia de la vida
  alternative_spanish_readings:
  - las esposas son coherederas de la gracia de la vida
  - ellas también participan de la gracia de la vida
  rationale: El griego afirma explícitamente una herencia compartida. El femenino plural en español hace visible que el destinatario inmediato son las esposas, sin excluir la universalidad teológica de la afirmación dentro del contexto matrimonial.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3.
translation_notes:
  revision_awareness: El inglés POB revisó 'since they are also' a 'as also' para no añadir causalidad al ὡς καί; por eso el español evita 'porque' o 'ya que' y mantiene 'y como también'. También se ha atendido la decisión léxica de conservar la metáfora sin explicarla en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; este versículo no lo exige.
  - '''Maridos'' es coherente con el contexto doméstico de 1 Pedro 3:1-7.'
  - '''Coherederas'' armoniza con el referente femenino inmediato de ''esposas''.'
  - Se mantiene el plural 'oraciones' para reflejar τὰς προσευχὰς ὑμῶν.
