  text: Οἱ ἄνδρες ὁμοίως συνοικοῦντες κατὰ γνῶσιν, ὡς ἀσθενεστέρῳ σκεύει τῷ γυναικείῳ ἀπονέμοντες τιμήν, ὡς καὶ ⸀συγκληρονόμοις χάριτος ζωῆς, εἰς τὸ μὴ ἐγκόπτεσθαι τὰς προσευχὰς ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/007.yaml
  text: Likewise[a], husbands, living together with your wives according to knowledge, assigning honor to the woman as to a weaker vessel, as also fellow heirs of the grace of life[c][b], so that your prayers may not be hindered.
  footnotes:
  - marker: a
    text: Or 'with understanding.'
    reason: lexical_alternative
  - marker: b
    text: '''Weaker vessel'' is a metaphor that likely refers to relative physical or social vulnerability, not lesser worth; the next phrase affirms wives as ''also fellow heirs of the grace of life.'''
    reason: cultural_note
  - marker: c
    text: Or 'co-heirs of the grace of life.'
    reason: lexical_alternative
