review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: ἄνδρες como ''maridos'', συνοικοῦντες como convivencia matrimonial, la metáfora ''vaso más débil'', la afirmación de herencia compartida, y el propósito de que las oraciones no sean impedidas. Sin embargo, ''y como también coherederas'' queda gramaticalmente truncado en español y no expresa con claridad la relación de ὡς καὶ συγκληρονόμοις. Además, el inglés auditado preserva una nota léxica para ''fellow heirs / co-heirs'' que no fue trasladada al español.'
  spanish_quality_summary: El español es mayormente claro y digno, pero hay un problema de sintaxis importante en 'y como también coherederas de la gracia de la vida', que suena incompleto y poco natural. También conviene alinear mejor 'dando honor' con el matiz de ἀπονέμοντες τιμήν mediante 'otorgando honor'. 'Convivan' funciona, aunque 'vivan con sus esposas' sería más llano; no es necesario cambiarlo. Las notas están bien planteadas, pero falta la alternativa léxica sobre 'coherederas'.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Maridos', 'gracia', 'vida', y 'oraciones' están bien. 'Vaso' preserva la metáfora documentada. La decisión de usar 'coherederas' es válida en contexto, pero debe expresarse en español de manera sintácticamente completa y con nota alternativa correspondiente al audit trail inglés.
  issues:
  - severity: high
    issue: Sintaxis defectuosa en 'y como también coherederas de la gracia de la vida'
    rationale: 'El griego ὡς καὶ συγκληρονόμοις depende de la acción de honrar: ''otorgando honor ... como también a coherederas...''. El borrador español deja la frase sin complemento claro, lo que afecta fidelidad y legibilidad.'
  - severity: medium
    issue: Falta la nota léxica correspondiente a 'fellow heirs / co-heirs'
    rationale: El audit trail inglés conserva una alternativa explícita para συγκληρονόμοις. El español debería reflejar esa alternativa, especialmente porque 'coherederas' admite la variante más explicativa 'herederas juntamente' o similar.
  - severity: low
    issue: '''Dando honor'' podría reflejar mejor ἀπονέμοντες con ''otorgando honor'''
    rationale: No es un error, pero 'otorgando' o 'mostrando' comunica mejor la idea de conceder lo debido, y mejora la fluidez junto con la corrección sintáctica del resto de la frase.
  revised_spanish_text: Asimismo, ustedes, maridos, convivan con sus esposas con entendimiento[a], otorgando honor a la mujer[b] como a un vaso más débil, como también a coherederas[c] de la gracia de la vida, para que sus oraciones no sean estorbadas.
  revised_footnotes:
