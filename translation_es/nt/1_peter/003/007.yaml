revisions:
- from: Asimismo, ustedes, maridos, convivan con sus esposas con entendimiento[a], dando honor a la mujer[b] como a un vaso más débil, y como también coherederas de la gracia de la vida, para que sus oraciones no sean estorbadas.
  to: Asimismo, ustedes, maridos, convivan con sus esposas con entendimiento[a], otorgando honor a la mujer[b] como a un vaso más débil, como también a coherederas[c] de la gracia de la vida, para que sus oraciones no sean estorbadas.
  rationale: La revisión corrige la sintaxis para que 'como también a coherederas' dependa claramente de 'otorgando honor', reflejando mejor ὡς καὶ συγκληρονόμοις sin introducir causalidad. También añade la nota léxica faltante para συγκληρονόμοις y mejora levemente el matiz de ἀπονέμοντες con 'otorgando honor'.
