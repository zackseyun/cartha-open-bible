translation:
  language: es
  text: Pero que se aparte del mal y haga el bien[a]; que busque la paz y la persiga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que uno se aparte del mal y haga el bien; que uno busque la paz y la persiga». El griego usa una forma masculina singular con fuerza representativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλινάτω
  english_pob_choice: let him turn away
  chosen_spanish: que se aparte
  alternatives_spanish:
  - que se desvíe
  - que se aparte de
  lexicon: BDAG
  rationale: ἐκκλίνω expresa una acción de apartarse o desviarse de una dirección; en español, «apartarse» comunica bien ese movimiento decisivo y evita una expresión demasiado literal y pesada.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce continuidad con leve contraste; «Pero» conserva el matiz adversativo y suena natural al inicio de la exhortación.
- source_word: ἀπὸ κακοῦ
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de lo malo
  - de la maldad
  lexicon: BDAG
  rationale: κακοῦ aquí tiene sentido moral, no de desgracia o daño físico. «Del mal» es breve, claro y fiel al contraste ético con el bien.
- source_word: ποιησάτω ἀγαθόν
  english_pob_choice: do good
  chosen_spanish: haga el bien
  alternatives_spanish:
  - practique el bien
  - haga lo bueno
  lexicon: BDAG
  rationale: La expresión griega es una fórmula ética directa. «Haga el bien» es idiomática en español y preserva la acción moral concreta del verbo.
- source_word: ζητησάτω
  english_pob_choice: let him seek
  chosen_spanish: que busque
  alternatives_spanish:
  - que procure
  - que persiga
  lexicon: BDAG
  rationale: ζητέω puede significar buscar o procurar. Aquí «buscar» conserva la progresión retórica antes de διώκω y evita fusionar ambos verbos.
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - paz
  - la reconciliación
  lexicon: BDAG
  rationale: εἰρήνη abarca paz en sentido amplio; el artículo definido «la paz» funciona naturalmente en español y mantiene la referencia concreta del texto.
- source_word: διωξάτω αὐτήν
  english_pob_choice: and pursue it
  chosen_spanish: y la siga
  alternatives_spanish:
  - y la persiga
  - y la procure
  lexicon: BDAG
  rationale: διώκω puede ser «perseguir» con fuerza, pero aplicado a «la paz» en español «seguirla» expresa la idea de perseguir en sentido positivo sin sugerir hostilidad. Dado que el antecedente es femenino, «la» evita ambigüedad.
- source_word: 3rd person singular imperatives across the verse
  english_pob_choice: let him ...
  chosen_spanish: que ...
  alternatives_spanish:
  - que él ...
  - que uno ...
  lexicon: Greek grammar
  rationale: Los imperativos de tercera persona singular en griego se expresan naturalmente en español con «que + subjuntivo». Así se conserva el valor exhortativo y la forma representativa sin forzar un «él» explícito.
theological_decisions:
- issue: Fuerza representativa masculina de los imperativos
  english_pob_reading: Use 'let him' in the main text
  chosen_spanish_reading: Usar «que ...» en vez de un pronombre masculino explícito
  alternative_spanish_readings:
  - que él ...
  - que uno ...
  - que todos ...
  rationale: El griego usa una forma singular masculina con valor representativo. En español, la construcción exhortativa con subjuntivo mantiene el carácter general del mandato sin introducir un masculino que suene innecesariamente marcado.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: 'El texto inglés POB no requiere revisión sustancial: mantiene bien la progresión verbal y el sentido ético. La principal adaptación al español fue resolver la tercera persona singular imperativa con una exhortación natural en subjuntivo, preservando el valor representativo del singular griego.'
  spanish_consistency_notes:
  - Se mantiene «mal» y «bien» para el contraste moral explícito del griego.
  - «Buscar» y «seguir» conservan la progresión de ζητέω y διώκω sin colapsar ambos verbos en una sola idea.
  - La nota al pie conserva la alternativa singular representativa del inglés POB, adaptada a un español natural.
