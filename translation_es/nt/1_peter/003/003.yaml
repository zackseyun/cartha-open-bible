translation:
  language: es
  text: 'Que su adorno no sea el exterior[a]: trenzado del cabello, uso de joyas de oro o el ponerse ropa—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que su adorno no sea meramente exterior: trenzas del cabello, joyas de oro o ropa». El punto de Pedro es la prioridad del carácter interior sobre la exhibición externa, no una prohibición general del arreglo personal o del vestido.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὧν
  english_pob_choice: your
  chosen_spanish: vuestro
  alternatives_spanish:
  - de ustedes
  - de vosotros
  - cuya
  lexicon: BDAG
  rationale: El pronombre relativo en genitivo plural se refiere a las mujeres/esposas del contexto previo. En español, el posesivo «vuestro» comunica de modo natural esa referencia posesiva sin forzar una construcción relativa pesada.
- source_word: ἔστω οὐχ
  english_pob_choice: Do not let ... be
  chosen_spanish: No sea
  alternatives_spanish:
  - No permitáis que sea
  - No debe ser
  lexicon: BDAG
  rationale: La forma imperativa con negación se expresa en español de manera sobria con «No sea», manteniendo el tono exhortativo y evitando una paráfrasis excesiva.
- source_word: ὁ ἔξωθεν ... κόσμος
  english_pob_choice: the outward ... adornment
  chosen_spanish: el exterior ... adorno
  alternatives_spanish:
  - el adorno exterior
  - el adorno externo
  - la apariencia exterior
  lexicon: BDAG
  rationale: κόσμος aquí significa «adorno», no «mundo». «Exterior» conserva el contraste con la interioridad del siguiente versículo y mantiene la fuerza adverbial de ἔξωθεν.
- source_word: ἐμπλοκῆς τριχῶν
  english_pob_choice: braiding of hair
  chosen_spanish: trenzado del cabello
  alternatives_spanish:
  - trenzas del cabello
  - peinado trenzado
  - entrelazado del cabello
  lexicon: BDAG
  rationale: La construcción nominal griega apunta al acto de trenzar. «Trenzado del cabello» conserva ese matiz verbal y suena natural en español contemporáneo.
- source_word: περιθέσεως χρυσίων
  english_pob_choice: wearing of gold jewelry
  chosen_spanish: uso de joyas de oro
  alternatives_spanish:
  - puesta de adornos de oro
  - llevar joyas de oro
  - uso de oro
  lexicon: BDAG
  rationale: περίθεσις denota poner/colocar encima; χρυσίων se refiere probablemente a piezas de oro u ornamentos. «Uso de joyas de oro» comunica con claridad la idea de adornarse con oro sin estrecharla innecesariamente.
- source_word: ἐνδύσεως ἱματίων
  english_pob_choice: putting on of clothing
  chosen_spanish: vestido de ropa
  alternatives_spanish:
  - puesta de ropa
  - uso de prendas
  - vestirse con ropa
  lexicon: BDAG
  rationale: Se conserva la serie paralela de sustantivos de acción. «Vestido de ropa» mantiene el carácter formal del griego y evita introducir una prohibición absoluta de vestir.
theological_decisions:
- issue: Si el versículo prohíbe absolutamente el peinado, las joyas y la ropa, o si subordina el adorno exterior al carácter interior
  english_pob_reading: Comparative/subordinating sense preserved by wording that focuses on what their adornment is not to be centered on
  chosen_spanish_reading: 'Sentido comparativo/subordinador preservado: el énfasis recae en que el adorno no sea exteriormente centrado'
  alternative_spanish_readings:
  - Prohibición absoluta de trenzas, joyas y ropa
  - Mandato de eliminar todo adorno externo
  rationale: El contexto inmediato de 1 Pedro 3:4 contrasta el adorno exterior con «el hombre interior del corazón». Por eso, el español debe conservar la tensión sin convertir el texto en una prohibición total de peinarse o vestirse.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma reductiva
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente griego y el rastro auditado en inglés, pero adapta la sintaxis al español para mantener el imperativo exhortativo y la lista de adornos sin caer en calco mecánico. Se preserva la tensión interpretativa documentada en el contexto inglés.
  spanish_consistency_notes:
  - Se usa «adorno» para κόσμος en sentido de ornamento, no de «mundo».
  - Se usa «vuestro» para reflejar el genitivo plural del antecedente contextual.
  - «No sea» conserva la prohibición exhortativa sin añadir doctrina ajena al versículo.
  - La nota al pie mantiene la alternativa interpretativa sobre el alcance de la prohibición.
