review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: un imperativo negativo sobre el adorno, seguido de una lista de formas externas de arreglo. También preserva bien el sentido comparativo/subordinador documentado en el POB inglés, no como prohibición absoluta. Sin embargo, dos elecciones españolas debilitan la fidelidad expresiva: «vuestro» no encaja con el objetivo de español neutral latinoamericano, y «vestido de ropa» no representa bien ἐνδύσεως ἱματίων ni suena natural en español.'
  spanish_quality_summary: La frase es generalmente comprensible, pero «vuestro» suena peninsular y «vestido de ropa» es poco idiomático y torpe. Además, «el exterior» funciona, pero «lo exterior» o reordenar a «el adorno exterior» sería más natural; aun así, puede conservarse la estructura cercana al griego con una mejora mínima. La nota al pie es útil y coherente.
  glossary_alignment: No hay términos del glosario mayor directamente en juego. La principal alineación estilística requerida es español neutral eclesial legible; por eso conviene reemplazar «vuestro» por «su». «Adorno» para κόσμος es correcto; «trenzado del cabello» y «joyas de oro» son adecuados. Para ἐνδύσεως ἱματίων, «ponerse ropa» sería demasiado verbal, pero «vestirse con ropa» o mejor «el ponerse vestidos»/«el ponerse ropa» debe equilibrar fidelidad y naturalidad. Aquí «el ponerse ropa» mantiene el sustantivo de acción y evita la rareza del borrador.
  issues:
  - severity: medium
    issue: Uso de «vuestro» en lugar de una forma neutral panhispánica
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. «Vuestro» es correcto pero marcadamente peninsular; «su» encaja mejor con el registro objetivo sin pérdida semántica.
  - severity: high
    issue: «Vestido de ropa» es antinatural y no refleja bien ἐνδύσεως ἱματίων
    rationale: La expresión no suena idiomática en español y puede confundirse con «vestido» como prenda. El griego se refiere al acto de ponerse ropa/vestidos como forma externa de adorno. Se requiere una reparación clara.
  - severity: low
    issue: La nota alternativa dice «ropa fina», matiz no explícito en el griego
    rationale: ἱμάτια significa ropa/vestidos, no necesariamente ropa fina. Aunque la nota busca explicar la idea de exhibición externa, añadir «fina» puede sobreinterpretar. Conviene eliminar ese matiz.
  revised_spanish_text: 'Que su adorno no sea el exterior[a]: trenzado del cabello, uso de joyas de oro o el ponerse ropa—'
  revised_footnotes:
  - marker: a
    text: 'O: «que su adorno no sea meramente exterior: trenzas del cabello, joyas de oro o ropa». El punto de Pedro es la prioridad del carácter interior sobre la exhibición externa, no una prohibición general del arreglo personal o del vestido.'
    reason: alternative_reading
  revision_rationale: 'Se hicieron reparaciones menores pero necesarias para fidelidad y naturalidad: «su» sustituye a «vuestro» para ajustarse al español neutral solicitado; «el ponerse ropa» reemplaza la frase poco idiomática «vestido de ropa» y representa mejor el sustantivo de acción griego; y la nota se corrigió para no introducir el matiz no atestiguado de «ropa fina». Se mantuvo el enfoque comparativo del versículo y la estructura de lista de adornos externos.'
