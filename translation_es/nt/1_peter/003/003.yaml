revisions:
- from: 'No sea vuestro adorno el exterior[a]: trenzado del cabello, uso de joyas de oro o vestido de ropa—'
  to: 'Que su adorno no sea el exterior[a]: trenzado del cabello, uso de joyas de oro o el ponerse ropa—'
  rationale: 'Se hicieron reparaciones menores pero necesarias para fidelidad y naturalidad: «su» sustituye a «vuestro» para ajustarse al español neutral solicitado; «el ponerse ropa» reemplaza la frase poco idiomática «vestido de ropa» y representa mejor el sustantivo de acción griego; y la nota se corrigió para no introducir el matiz no atestiguado de «ropa fina». Se mantuvo el enfoque comparativo del versículo y la estructura de lista de adornos externos.'
