translation:
  language: es
  text: Porque es mejor sufrir por hacer el bien[a], si la voluntad de Dios así lo quisiera[b], que por hacer el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por hacer el bien ... que por hacer el mal». Los participios pueden entenderse con sentido causal («por») o, de modo más general, como descripción de la circunstancia.'
    reason: lexical_alternative
  - marker: b
    text: 'El griego dice literalmente algo como: «si la voluntad de Dios quisiera eso», con una repetición enfática de la idea de «voluntad/querer». En español se conserva el sentido sin reproducir la expresión de manera rígida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρεῖττον
  english_pob_choice: better
  chosen_spanish: es mejor
  alternatives_spanish:
  - es preferible
  - es superior
  lexicon: BDAG
  rationale: El adjetivo comparativo funciona predicativamente de modo impersonal; en español natural se expresa con «es mejor». Conserva el valor comparativo sin añadir énfasis interpretativo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón o explicación de la exhortación previa. «Porque» comunica con claridad la relación lógica en español contemporáneo.
- source_word: ἀγαθοποιοῦντας
  english_pob_choice: for doing good
  chosen_spanish: por hacer el bien
  alternatives_spanish:
  - haciendo el bien
  - por hacer lo bueno
  lexicon: BDAG
  rationale: El participio presente se traduce de forma circunstancial/causal en español. «Por hacer el bien» conserva la fuerza de la acción y refleja la alternativa causal que el POB inglés dejó abierta.
- source_word: εἰ θέλοι
  english_pob_choice: if ... should so will it
  chosen_spanish: si así lo quisiera
  alternatives_spanish:
  - si así lo quiere
  - si así lo quisiera la voluntad de Dios
  lexicon: BDAG
  rationale: El optativo con εἰ expresa condición potencial o hipotética. «Si así lo quisiera» reproduce esa matización mejor que un presente llano. Se integra con «la voluntad de Dios» para mantener el eco verbal sin sonar forzado en español.
- source_word: τὸ θέλημα τοῦ θεοῦ
  english_pob_choice: the will of God
  chosen_spanish: la voluntad de Dios
  alternatives_spanish:
  - el querer de Dios
  - el deseo de Dios
  lexicon: BDAG
  rationale: Construcción genitiva directa y solemne. «La voluntad de Dios» preserva la forma y la reverencia del sintagma; «querer» haría más explícito el eco verbal, pero suena menos natural aquí.
- source_word: πάσχειν
  english_pob_choice: to suffer
  chosen_spanish: sufrir
  alternatives_spanish:
  - padecer
  - tener que sufrir
  lexicon: BDAG
  rationale: Infinitivo complementario de κρεῖττον. «Sufrir» es directo y claro en español moderno; «padecer» sería posible, pero aquí no aporta una distinción necesaria.
- source_word: ἢ
  english_pob_choice: than
  chosen_spanish: que
  alternatives_spanish:
  - más que
  - antes que
  lexicon: BDAG
  rationale: Con κρεῖττον, el comparativo en español se expresa naturalmente con «que». Evita una construcción pesada y mantiene el contraste.
- source_word: κακοποιοῦντας
  english_pob_choice: for doing evil
  chosen_spanish: por hacer el mal
  alternatives_spanish:
  - haciendo el mal
  - por practicar el mal
  lexicon: BDAG
  rationale: Se conserva el paralelismo con ἀγαθοποιοῦντας. «El mal» funciona como equivalente natural de κακοποιοῦντας en este contexto, sin suavizar la antítesis.
theological_decisions:
- issue: Relación del sufrimiento con la voluntad divina
  english_pob_reading: The verse states that suffering may occur within God's will, especially in the case of suffering while doing good, without specifying a full doctrine of causation or divine approval of evil acts.
  chosen_spanish_reading: El versículo afirma que el sufrimiento puede darse dentro de la voluntad de Dios, especialmente cuando se sufre por hacer el bien, sin resolver si la voluntad divina implica decreto, permiso o ambas cosas en este caso.
  alternative_spanish_readings:
  - Dios decreta activamente cada sufrimiento
  - Dios solo permite el sufrimiento y no actúa en él
  rationale: 'La forma condicional del griego no obliga a cerrar el debate teológico. La redacción española conserva la tensión: el texto vincula el sufrimiento con la voluntad de Dios, pero no extrapola una teoría completa sobre causalidad divina.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «for doing good» y mantuvo la repetición enfática del verbo relacionado con la voluntad. En español, la repetición literal («si la voluntad de Dios quisiera») resultaría poco natural; por eso se preserva el eco semántico con una formulación idiomática.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ en coherencia con el criterio del proyecto.
  - Se usa «hacer el bien / hacer el mal» como equivalentes naturales del contraste verbal, sin introducir vocabulario moral más técnico que el griego no exige.
  - «Sufrir» se conserva como infinitivo simple, en paralelo con la construcción comparativa.
  - No se introduce «Cristo», «Señor» ni terminología eclesial ajena al versículo.
