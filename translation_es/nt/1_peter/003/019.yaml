translation:
  language: es
  text: en el cual[a] también fue y proclamó[b] a los espíritus en prisión[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en quien»; alternativamente, «por medio del cual». El griego puede entenderse de más de una manera respecto de su relación con la cláusula anterior.
    reason: alternative_reading
  - marker: b
    text: O «predicó». El verbo indica una proclamación, pero el texto no especifica aquí el contenido exacto del mensaje.
    reason: lexical_alternative
  - marker: c
    text: La identidad de «los espíritus en prisión» es debatida; entre las posibilidades están humanos muertos o seres angélicos caídos.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: in which
  chosen_spanish: en lo cual
  alternatives_spanish:
  - en quien
  - por lo cual
  lexicon: BDAG
  rationale: El relativo griego está en neutro dativo singular y, como en el inglés POB, conviene mantener la referencia abierta al antecedente inmediato sin resolverla. «En lo cual» conserva la forma neutra y la ambigüedad sintáctica. «En quien» personalizaría demasiado el referente; «por lo cual» sugiere instrumentalidad con más fuerza que la que exige el griego.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - aun
  lexicon: BDAG
  rationale: La partícula añade una acción más conectada con la cláusula anterior. «También» reproduce bien el valor aditivo en español.
- source_word: τοῖς ... πνεύμασιν
  english_pob_choice: to the spirits
  chosen_spanish: a los espíritus
  alternatives_spanish:
  - a los seres espirituales
  - a las almas
  lexicon: BDAG
  rationale: πνεύμασιν se traduce de manera más directa por «espíritus». «Almas» introduciría otro término griego; «seres espirituales» interpreta más de lo que el texto dice. La forma simple preserva la ambigüedad.
- source_word: ἐν φυλακῇ
  english_pob_choice: in prison
  chosen_spanish: en prisión
  alternatives_spanish:
  - en custodia
  - en cautiverio
  lexicon: BDAG
  rationale: φυλακή puede referirse a un lugar de custodia o encierro. «En prisión» / «en prisión» es la equivalencia más natural y clara en español; aquí se prefirió «en prisión» en el texto y «en prisión» se explica como término equivalente a φυλακή.
- source_word: πορευθεὶς
  english_pob_choice: he went
  chosen_spanish: fue
  alternatives_spanish:
  - habiendo ido
  - después de ir
  lexicon: BDAG
  rationale: El participio aoristo suele poder verterse con un verbo finito en español natural cuando acompaña al verbo principal. «Fue» mantiene la idea de movimiento sin forzar una secuencia temporal más explícita que la del griego.
- source_word: ἐκήρυξεν
  english_pob_choice: proclaimed
  chosen_spanish: proclamó
  alternatives_spanish:
  - predicó
  - anunció
  - heraldó
  lexicon: BDAG
  rationale: κηρύσσω significa hacer una proclamación pública como heraldo. «Proclamó» conserva ese sentido amplio y evita cargar el verbo con el matiz evangelístico específico que «predicó» podría sugerir en español.
theological_decisions:
- issue: Referente de ἐν ᾧ
  english_pob_reading: Rendered neutrally as 'in which,' likely referring to the preceding 'spirit' sphere/state, without resolving the full interpretive debate.
  chosen_spanish_reading: Se vierte de modo neutral como «en lo cual», dejando abierta la referencia al antecedente inmediato y sin decidir si apunta a Cristo, al Espíritu o a la esfera mencionada antes.
  alternative_spanish_readings:
  - en quien
  - por lo cual
  rationale: El pasaje es sintáctica y teológicamente discutido. La traducción conserva el neutro griego y evita cerrar la ambigüedad con una interpretación doctrinal específica sobre el modo de la proclamación.
  doctrine_reference: Principio POB de preservar la tensión teológica cuando el texto no la resuelve.
- issue: Identidad de 'the spirits in prison'
  english_pob_reading: Left unspecified in the main text as 'the spirits in prison'.
  chosen_spanish_reading: Se deja simplemente como «los espíritus en prisión».
  alternative_spanish_readings:
  - humanos muertos de la generación de Noé
  - seres angélicos caídos
  - una clase más amplia de espíritus encarcelados
  rationale: La frase griega no identifica con suficiente precisión a esos espíritus como para estrechar el referente en la traducción. La versión española debe mantener esa amplitud y no decidir el debate dentro del texto principal.
  doctrine_reference: Principio POB de no resolver en traducción lo que el pasaje deja abierto.
- issue: Naturaleza del mensaje en ἐκήρυξεν
  english_pob_reading: Rendered 'proclaimed' rather than 'preached.'
  chosen_spanish_reading: Se usa «proclamó» y no «predicó».
  alternative_spanish_readings:
  - predicó el evangelio
  - anunció juicio
  - heraldó victoria
  rationale: El verbo denota proclamación pública, pero no especifica si el contenido fue evangelístico, judicial o triunfal. «Proclamó» preserva esa apertura mejor que «predicó», que en español puede sugerir de inmediato predicación evangelística.
  doctrine_reference: Principio POB de primacía del original y de preservar ambigüedades reales.
translation_notes:
  revision_awareness: La comparación con el auditorio inglés muestra alta concordancia y sin cambios sustanciales; la redacción española sigue esa misma decisión de mantener la ambigüedad sintáctica y teológica del versículo.
  spanish_consistency_notes:
  - Se mantuvo «espíritus» para πνεύμασιν, sin ampliar a «seres espirituales» en el texto principal.
  - «En lo cual» conserva la abertura de ἐν ᾧ y evita resolver el referente.
  - «Proclamó» refleja κηρύσσω con la misma amplitud semántica que el inglés POB «proclaimed».
  - Se usó «en prisión» como equivalente idiomático de φυλακῇ, con estilo claro y bíblicamente natural.
