translation:
  language: es
  text: Por lo demás, todos ustedes, sean de un mismo sentir, compasivos, fraternales[a], de tierno corazón, humildes de mente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con amor fraternal»; el griego usa lenguaje de hermanos/hermanas para la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen «corteses» o «amables» en lugar de «humildes de mente».
    reason: textual_variant
lexical_decisions:
- source_word: Τὸ δὲ τέλος
  english_pob_choice: Finally
  chosen_spanish: Por lo demás
  alternatives_spanish:
  - Finalmente
  - Por último
  - En fin
  lexicon: BDAG
  rationale: La expresión funciona como marcador discursivo de cierre y transición exhortativa. «Por lo demás» suena natural en español bíblico moderno y conserva el valor de conclusión sin volver mecánica la frase.
- source_word: πάντες
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - ustedes todos
  - todos vosotros
  lexicon: BDAG
  rationale: La forma griega tiene fuerza apelativa hacia la audiencia completa. «Todos ustedes» hace explícito el destinatario colectivo en español latinoamericano natural.
- source_word: ὁμόφρονες
  english_pob_choice: like-minded
  chosen_spanish: sean de un mismo sentir
  alternatives_spanish:
  - sean de una misma mente
  - sean armoniosos
  - piensen igual
  lexicon: BDAG
  rationale: La idea central es unidad de disposición o de mente. «De un mismo sentir» transmite ese sentido en español digno y fluido, sin reducirlo a simple conformidad externa.
- source_word: συμπαθεῖς
  english_pob_choice: sympathetic
  chosen_spanish: compasivos
  alternatives_spanish:
  - comprensivos
  - solidarios
  - empáticos
  lexicon: BDAG
  rationale: El término expresa compartir el padecimiento o sentir del otro. «Compasivos» comunica bien esa participación afectiva sin sobrecargar el verso con una paráfrasis moderna.
- source_word: φιλάδελφοι
  english_pob_choice: loving as brothers
  chosen_spanish: amándose como hermanos
  alternatives_spanish:
  - con amor fraternal
  - amándose como hermanos y hermanas
  - con afecto fraternal
  lexicon: BDAG
  rationale: El griego usa lenguaje de familia/siblings para la comunidad creyente. «Amándose como hermanos» preserva la imagen fraterna de manera inteligible en español; se mantiene el matiz comunitario sin neutralizar el campo lexical.
- source_word: εὔσπλαγχνοι
  english_pob_choice: tenderhearted
  chosen_spanish: de tierno corazón
  alternatives_spanish:
  - tiernamente compasivos
  - misericordiosos
  - de corazón tierno
  lexicon: BDAG
  rationale: El término apunta a una compasión interna, profunda. «De tierno corazón» es idiomático en español y conserva la calidez afectiva del compuesto griego.
- source_word: ταπεινόφρονες
  english_pob_choice: humble-minded
  chosen_spanish: humildes
  alternatives_spanish:
  - humildes de mente
  - de actitud humilde
  - humilde-minded
  lexicon: BDAG
  rationale: La lectura SBLGNT expresa humildad de mente/actitud. En español, «humildes» comunica el rasgo con naturalidad; la precisión de la disposición interior queda implícita en el conjunto de la lista exhortativa.
theological_decisions:
- issue: Lenguaje de familia en φιλάδελφοι
  english_pob_reading: loving as brothers
  chosen_spanish_reading: amándose como hermanos
  alternative_spanish_readings:
  - con amor fraternal
  - amándose como hermanos y hermanas
  rationale: Se conserva la imaginería familiar del original griego, que en el contexto de la comunidad creyente funciona de modo inclusivo por representación. Se evita una expansión explícita que vaya más allá del texto base, aunque podría entenderse como incluido el conjunto de la comunidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Lectura textual del adjetivo final
  english_pob_reading: humble-minded
  chosen_spanish_reading: humildes
  alternative_spanish_readings:
  - corteses
  - amables
  - amigables
  rationale: El texto fuente SBLGNT lee ταπεινόφρονες, no la variante que da «courteous/friendly». Por eso el español sigue la lectura de humildad y no sustituye el sentido por una variante textual distinta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio necesario; esta propuesta mantiene esa lectura estable, ajustando el español a un registro natural sin perder las decisiones léxicas y textuales auditadas.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este versículo, por no aparecer ninguna referencia divina directa.
  - «Todos ustedes» conserva la apelación colectiva del nominativo plural griego.
  - La secuencia de virtudes se presenta en forma fluida y paralela, con puntuación española estándar.
  - La nota de variante textual se vincula solo al último adjetivo, conforme al aparato auditado.
