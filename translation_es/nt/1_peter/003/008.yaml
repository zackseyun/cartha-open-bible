review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura exhortativa y el sentido general del griego: marcador conclusivo, apelación colectiva y la serie de cinco adjetivos. Sin embargo, dos elecciones se alejan parcialmente de la forma y matiz del texto fuente y del rastro POB en inglés: «amándose como hermanos» introduce un participio reflexivo no presente en el griego adjetival, y «humildes» atenúa el componente mental/disposicional de ταπεινόφρονες que el POB inglés preserva como ‘humble-minded’.'
  spanish_quality_summary: 'El español es claro, natural y eclesialmente legible. No obstante, una ligera revisión mejora la correspondencia formal y la fluidez de la lista: «fraternales» encaja mejor como adjetivo coordinado con los demás, y «humildes de mente» preserva con más precisión el compuesto griego sin sonar forzado.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones clave aquí son estilísticas y léxicas. Se debe mantener la nota sobre el lenguaje de hermanos/hermanas y la nota textual sobre la variante ‘corteses/amables’.
  issues:
  - severity: medium
    issue: «amándose como hermanos» cambia un adjetivo en una forma verbal reflexiva
    rationale: φιλάδελφοι es un adjetivo coordinado con los demás rasgos de la lista. «Amándose como hermanos» comunica una idea cercana, pero introduce una acción recíproca explícita que no está en la forma griega y rompe ligeramente el paralelismo con los demás adjetivos.
  - severity: medium
    issue: «humildes» pierde el matiz de mente/actitud de ταπεινόφρονες
    rationale: El compuesto griego y la decisión inglesa documentada enfatizan la humildad de disposición mental. «Humildes» no es incorrecto, pero sí menos preciso que una formulación como «humildes de mente» o «de actitud humilde».
  - severity: low
    issue: La nota [a] ya no encaja idealmente si se cambia a un adjetivo
    rationale: Si el texto principal se ajusta a «fraternales», la alternativa de la nota debe armonizarse con esa forma y seguir explicando el lenguaje inclusivo de familia en el griego.
  revised_spanish_text: Por lo demás, todos ustedes, sean de un mismo sentir, compasivos, fraternales[a], de tierno corazón, humildes de mente[b].
  revised_footnotes:
  - marker: a
    text: O «con amor fraternal»; el griego usa lenguaje de hermanos/hermanas para la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen «corteses» o «amables» en lugar de «humildes de mente».
    reason: textual_variant
  revision_rationale: 'La revisión conserva el sentido del borrador pero mejora la fidelidad al griego y al rastro POB: se mantiene la serie de adjetivos con «fraternales» para φιλάδελφοι, y se explicita el matiz disposicional de ταπεινόφρονες con «humildes de mente». Las notas se preservan con ajustes mínimos para corresponder exactamente al texto revisado.'
