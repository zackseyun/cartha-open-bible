translation:
  language: es
  text: los que en otro tiempo fueron desobedientes, cuando la paciencia de Dios estaba esperando en los días de Noé, mientras se preparaba el arca, en la que entraron unos pocos —es decir[a], ocho personas[b]— y fueron llevados a salvo a través del agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esto es» o «a saber».
    reason: lexical_alternative
  - marker: b
    text: O «ocho almas». O «fueron salvados a través del agua».
    reason: lexical_alternative_and_alternative_reading
lexical_decisions:
- source_word: ἀπειθήσασίν
  english_pob_choice: were disobedient
  chosen_spanish: fueron desobedientes
  alternatives_spanish:
  - no obedecieron
  - eran desobedientes
  lexicon: BDAG
  rationale: El participio aoristo de ἀπειθέω expresa desobediencia o negativa a obedecer. «Fueron desobedientes» conserva ese valor moral y relacional sin reducirlo a simple incredulidad intelectual.
- source_word: ποτε
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - antes de eso
  - en otro tiempo
  lexicon: BDAG
  rationale: Aquí señala un tiempo pasado respecto del discurso. «Antes» funciona naturalmente en español y mantiene la referencia temporal sin añadir énfasis excesivo.
- source_word: ἀπεξεδέχετο
  english_pob_choice: was waiting
  chosen_spanish: estaba esperando
  alternatives_spanish:
  - esperaba
  - estaba aguardando
  lexicon: BDAG
  rationale: El imperfecto medio comunica una espera continua. «Estaba esperando» preserva esa idea progresiva en español y evita introducir una formulación más interpretativa.
- source_word: μακροθυμία
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - tolerancia
  lexicon: BDAG
  rationale: «Paciencia» es el equivalente más claro y natural en español. Mantiene la idea del retraso compasivo de Dios sin recurrir a un término más técnico o menos común.
- source_word: κατασκευαζομένης
  english_pob_choice: was being prepared
  chosen_spanish: se preparaba
  alternatives_spanish:
  - se estaba construyendo
  - se estaba edificando
  lexicon: BDAG
  rationale: El participio indica un proceso en curso de preparación. «Se preparaba» conserva la pasividad y la progresión, y no obliga a especificar si el énfasis es construcción material o preparación general.
- source_word: κιβωτοῦ
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca de Noé
  - la nave
  lexicon: BDAG
  rationale: En el contexto de Noé, «arca» es el término establecido y preciso; «arca de Noé» puede usarse en nota o contexto explicativo, pero el sustantivo solo basta aquí.
- source_word: εἰς ἣν
  english_pob_choice: into which
  chosen_spanish: en la cual
  alternatives_spanish:
  - a la cual
  - dentro de la cual
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir entrada, en español «en la cual» resulta más fluido y conserva la referencia al interior del arca sin forzar una literalidad poco natural. La alternativa «a la cual» sería más marcada y menos idiomática.
- source_word: ὀλίγοι
  english_pob_choice: a few
  chosen_spanish: unos pocos
  alternatives_spanish:
  - pocos
  - algunos
  lexicon: BDAG
  rationale: «Unos pocos» expresa bien el número reducido sin sonar abrupto. Mantiene el contraste con la multitud desobediente y se ajusta al registro narrativo.
- source_word: ψυχαί
  english_pob_choice: persons
  chosen_spanish: personas
  alternatives_spanish:
  - almas
  - vidas
  lexicon: BDAG
  rationale: Aquí ψυχή cuenta seres humanos concretos. «Personas» comunica claramente el referente y evita que el lector piense en una afirmación técnica sobre el alma.
- source_word: διεσώθησαν
  english_pob_choice: were brought safely
  chosen_spanish: fueron llevados a salvo
  alternatives_spanish:
  - fueron salvos
  - fueron preservados
  lexicon: BDAG
  rationale: διασῴζω subraya ser sacado a salvo de un peligro. «Fueron llevados a salvo» conserva esa preservación concreta mejor que «fueron salvos», que en español puede sonar más doctrinal que narrativo.
- source_word: δι’ ὕδατος
  english_pob_choice: through water
  chosen_spanish: por medio del agua
  alternatives_spanish:
  - a través del agua
  - por el agua
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o través de. «Por medio del agua» es claro en español y mantiene la idea instrumental sin añadir una imagen distinta.
theological_decisions:
- issue: Cómo traducir διεσώθησαν sin borrar la tensión entre preservación histórica y resonancia salvífica
  english_pob_reading: were brought safely through water
  chosen_spanish_reading: fueron llevados a salvo por medio del agua
  alternative_spanish_readings:
  - fueron salvados por medio del agua
  - fueron preservados por medio del agua
  rationale: La forma elegida mantiene el evento concreto del diluvio como preservación física. «Fueron salvados» queda menos específico y puede cargar demasiado el verbo con una lectura soteriológica; aun así, esa posibilidad interpretativa permanece en el trasfondo del texto y no se suprime doctrinalmente.
  doctrine_reference: Principio POB de no resolver prematuramente la tensión textual entre preservación narrativa y resonancia teológica
- issue: Si ψυχαί debe reflejarse como «personas» o «almas»
  english_pob_reading: persons
  chosen_spanish_reading: personas
  alternative_spanish_readings:
  - almas
  rationale: El contexto enumera seres humanos que sobrevivieron en el arca. «Personas» evita introducir una antropología implícita que el griego aquí no está desarrollando. «Almas» puede mantenerse como eco literal, pero es menos claro para el lector actual.
  doctrine_reference: Principio POB de claridad contemporánea sin perder el sentido léxico básico
translation_notes:
  revision_awareness: 'Se revisó el tramo final para mantener la tensión entre διασῴζω como preservación concreta y la posible resonancia soteriológica, en línea con el audit trail inglés. No se adoptó una traducción mecánica del inglés: «por medio del agua» y «fueron llevados a salvo» buscan reflejar directamente el griego y su flujo sintáctico.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma del proyecto solo cuando el texto lo requiera; aquí aparece θεός y se traduce «Dios».
  - Se usó «arca» para κιβωτός conforme al contexto de Noé.
  - «Paciencia» se mantuvo como equivalente natural de μακροθυμία, coherente con el estilo del proyecto.
  - «Personas» traduce ψυχαί para evitar una lectura antropológica ajena al contexto inmediato.
