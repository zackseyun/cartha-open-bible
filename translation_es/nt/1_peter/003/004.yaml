  to: sino la persona oculta del corazón[a], en la belleza incorruptible[b] de un espíritu manso y apacible[c], que es muy precioso delante de Dios.
  rationale: Se revisa para mejorar fidelidad al análisis lexical de la POB y la naturalidad del español. «Persona» expresa mejor ἄνθρωπος que «ser»; «belleza incorruptible» refleja la elipsis contextual ya documentada en la auditoría inglesa; y «apacible» comunica mejor ἡσύχιος en español contemporáneo. Además, se corrige el formato de anclaje de notas al requerido por el proyecto.
