  text: ἀλλ’ ὁ κρυπτὸς τῆς καρδίας ἄνθρωπος ἐν τῷ ἀφθάρτῳ τοῦ ⸂πραέως καὶ ἡσυχίου⸃ πνεύματος, ὅ ἐστιν ἐνώπιον τοῦ θεοῦ πολυτελές.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/004.yaml
  text: but the hidden person of the heart[a], in the imperishable beauty of a gentle and quiet spirit[c][b], which is very precious before God.
  footnotes:
  - marker: a
    text: Or 'the hidden man of the heart.' The Greek ἄνθρωπος can mean 'man' or more generally 'person/human being'; here it refers to the inward self.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the imperishable of a gentle and quiet spirit'; 'beauty' is supplied in English from the contrast with outward adornment in the previous verse.
    reason: lexical_alternative
  - marker: c
    text: '''Quiet'' refers to a calm, peaceable disposition, not necessarily to silence.'
    reason: lexical_alternative
