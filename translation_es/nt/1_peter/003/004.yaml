translation:
  language: es
  text: sino la persona oculta del corazón[a], en la belleza incorruptible[b] de un espíritu manso y apacible[c], que es muy precioso delante de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el hombre oculto del corazón». El griego ἄνθρωπος puede significar «hombre» o, más generalmente, «persona/ser humano»; aquí se refiere al yo interior.
    reason: lexical_alternative
  - marker: b
    text: Lit. «en lo incorruptible de un espíritu manso y apacible»; «belleza» se suple en español por el contraste con el adorno exterior del versículo anterior.
    reason: lexical_alternative
  - marker: c
    text: «Apacible» se refiere a una disposición calma y pacífica, no necesariamente al silencio.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρυπτὸς τῆς καρδίας ἄνθρωπος
  english_pob_choice: the hidden person of the heart
  chosen_spanish: el ser oculto del corazón
  alternatives_spanish:
  - la persona oculta del corazón
  - el hombre oculto del corazón
  - el ser interior del corazón
  lexicon: BDAG
  rationale: ἄνθρωπος aquí es genérico y se refiere al yo interior, no a varón. En español, "ser" preserva esa referencia humana amplia sin imponer masculino específico. "Oculto" refleja κρυπτός de manera directa; "del corazón" mantiene el genitivo como sede interior de la vida humana.
- source_word: ἐν τῷ ἀφθάρτῳ
  english_pob_choice: in the imperishable beauty
  chosen_spanish: en la incorruptibilidad
  alternatives_spanish:
  - en lo incorruptible
  - en la belleza incorruptible
  - con la incorruptibilidad
  lexicon: BDAG
  rationale: El griego es elíptico y no expresa explícitamente un sustantivo equivalente a "beauty". En español, "incorruptibilidad" conserva el núcleo de ἀφθάρτῳ y puede funcionar como sustantivo; la ambigüedad se deja visible en nota, en vez de forzar una paráfrasis interpretativa en el texto principal.
- source_word: πραέως
  english_pob_choice: gentle
  chosen_spanish: manso
  alternatives_spanish:
  - amable
  - suave
  - humilde
  lexicon: BDAG
  rationale: '"Manso" es el equivalente español más cercano y bíblicamente estable para πραΰς. Conserva la virtud de apacibilidad/benignidad sin pasar a una idea de debilidad o mera amabilidad social.'
- source_word: ἡσυχίου
  english_pob_choice: quiet
  chosen_spanish: quieto
  alternatives_spanish:
  - tranquilo
  - apacible
  - silencioso
  lexicon: BDAG
  rationale: '"Quieto" mantiene la correspondencia más directa con ἡσύχιος. En este contexto describe una disposición serena y no perturbadora, no necesariamente el silencio físico; por eso se conserva el matiz de calma interior.'
- source_word: πνεύματος
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - disposición
  - ánimo
  - carácter
  lexicon: BDAG
  rationale: '"Espíritu" refleja el vocabulario del texto y mantiene la antropología bíblica. "Disposición" sería más explicativo, pero suavizaría la forma concreta del griego.'
- source_word: ὅ ἐστιν
  english_pob_choice: which is
  chosen_spanish: que es
  alternatives_spanish:
  - el cual es
  - lo cual es
  lexicon: BDAG
  rationale: El relativo ὅ remite al complejo anterior como conjunto. "Que es" preserva la relación sintáctica de forma natural en español.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - a los ojos de Dios
  - en la presencia de Dios
  lexicon: BDAG
  rationale: '"Delante de Dios" expresa bien la valoración divina y es natural en español bíblico contemporáneo. Evita cargar la frase con matices más explicativos que el griego no exige.'
- source_word: πολυτελές
  english_pob_choice: very precious
  chosen_spanish: muy precioso
  alternatives_spanish:
  - de gran valor
  - precioso
  - de mucho precio
  lexicon: BDAG
  rationale: πολυτελής denota gran valor o costoso precio. "Muy precioso" comunica la intensificación de modo claro y mantiene el contraste con los adornos exteriores del contexto inmediato.
theological_decisions:
- issue: Alcance humano de ἄνθρωπος en un contexto dirigido a mujeres
  english_pob_reading: Render ἄνθρωπος as 'person' rather than 'man' in 'the hidden person of the heart.'
  chosen_spanish_reading: Renderizar ἄνθρωπος como "ser" y no como "hombre" en "el ser oculto del corazón".
  alternative_spanish_readings:
  - el hombre oculto del corazón
  - la persona oculta del corazón
  rationale: El término griego es genérico y apunta al yo interior. "Hombre" en español puede sonar masculino y desorientar en un pasaje dirigido a mujeres; "ser" conserva la referencia antropológica sin introducir una lectura de sexo no presente en el original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Término elíptico en ἐν τῷ ἀφθάρτῳ
  english_pob_reading: 'Supply ''beauty'' in English: ''in the imperishable beauty of a gentle and quiet spirit.'''
  chosen_spanish_reading: No suplir "belleza" en el texto principal; dejar visible la elipsis con "en la incorruptibilidad de un espíritu manso y quieto".
  alternative_spanish_readings:
  - en la belleza incorruptible de un espíritu manso y quieto
  - con la incorruptibilidad de un espíritu manso y quieto
  rationale: El contexto sí sugiere un contraste con el adorno exterior, pero el griego no menciona explícitamente "belleza". En español, poner "incorruptibilidad" conserva la tensión textual y evita resolver interpretativamente una elipsis en el cuerpo del versículo; la nota puede explicar la alternativa legítima.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 6
- issue: Matiz de ἡσυχίου
  english_pob_reading: Quiet refers to a calm, peaceable disposition, not necessarily to silence.
  chosen_spanish_reading: '"Quieto" se entiende como una disposición serena y apacible, no como imposición de silencio.'
  alternative_spanish_readings:
  - tranquilo
  - apacible
  - silencioso
  rationale: La elección conserva el valor de calma no disruptiva y evita reducir el término a ausencia de habla. Esto mantiene el énfasis ético del texto sin añadir una restricción que el griego no exige.
  doctrine_reference: Comentario lexical sobre ἡσύχιος
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés y no hubo revisiones posteriores relevantes; el último control indicó alta concordancia y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene "Dios" para θεοῦ y no se introduce una convención litúrgica de sustitución.
  - Se preserva la distinción entre "manso" y "quieto" para reflejar los dos adjetivos griegos.
  - '"Incorruptibilidad" se usa como solución española para la elipsis de ἀφθάρτῳ, con la alternativa explicada en nota.'
  - La puntuación y el orden son naturales en español sin perder la estructura contrastiva del griego.
