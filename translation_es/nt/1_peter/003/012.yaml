translation:
  language: es
  text: Porque[a] los ojos de Yahvé están sobre los justos, y sus oídos están atentos a la súplica de ellos[b]; pero el rostro de Yahvé está contra los que hacen lo malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pues».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sus oídos hacia su súplica»; la traducción explicita la idea de atención.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí introduce la base escritural de la exhortación anterior; en español, «Porque» conserva bien el valor causal o de fundamento que el inglés POB expresó con «For».
- source_word: ὀφθαλμοὶ κυρίου
  english_pob_choice: the eyes of the Lord
  chosen_spanish: los ojos de Yahvé
  alternatives_spanish:
  - los ojos del Señor
  lexicon: BDAG
  rationale: Se conserva la imagen antropomórfica de forma directa. Se usa «Yahvé» según el criterio terminológico del proyecto para el nombre divino, en vez de ocultarlo con «Señor».
- source_word: ἐπὶ δικαίους
  english_pob_choice: are on the righteous
  chosen_spanish: están sobre los justos
  alternatives_spanish:
  - están hacia los justos
  - están sobre los rectos
  lexicon: BDAG
  rationale: La preposición ἐπί con acusativo expresa dirección o atención. «Están sobre» es natural en español y preserva la idea de mirada atenta; «los justos» conserva el sustantivo plural implícito en el adjetivo griego.
- source_word: ὦτα αὐτοῦ
  english_pob_choice: his ears
  chosen_spanish: sus oídos
  alternatives_spanish:
  - sus orejas
  lexicon: BDAG
  rationale: Se mantiene el paralelismo anatómico del original. «Oídos» es la opción más digna y bíblicamente clara en español.
- source_word: εἰς δέησιν αὐτῶν
  english_pob_choice: are open to their prayer
  chosen_spanish: están atentos a su súplica
  alternatives_spanish:
  - están abiertos a su oración
  - atienden su plegaria
  lexicon: BDAG
  rationale: El griego es elíptico («sus oídos hacia su súplica»). En español conviene explicitar la idea de atención sin perder la literalidad básica. «Súplica» conserva el matiz de petición intensa de δέησις, más preciso que un «oración» genérico.
- source_word: πρόσωπον δὲ κυρίου
  english_pob_choice: but the face of the Lord
  chosen_spanish: pero el rostro de Yahvé
  alternatives_spanish:
  - pero el semblante de Yahvé
  - pero la faz de Yahvé
  lexicon: BDAG
  rationale: Se conserva la imagen de «face/rostro» para no suavizar la fuerza del hebraísmo y su tensión teológica. «Rostro» es natural en español contemporáneo sin perder el valor figurado.
- source_word: ἐπὶ ποιοῦντας κακά
  english_pob_choice: is against those who do evil
  chosen_spanish: está contra los que hacen lo malo
  alternatives_spanish:
  - está contra los malhechores
  - está contra quienes obran mal
  lexicon: BDAG
  rationale: ἐπί con acusativo aquí tiene sentido hostil; «está contra» refleja bien esa oposición. ποιοῦντας κακά se vierte con una construcción participial natural en español, manteniendo el carácter verbal de «hacer lo malo» en vez de reducirlo solo a un sustantivo.
theological_decisions:
- issue: Lenguaje antropomórfico de ojos, oídos y rostro de Dios
  english_pob_reading: Preserve the imagery directly in translation
  chosen_spanish_reading: Conservar directamente la imaginería de ojos, oídos y rostro
  alternative_spanish_readings:
  - Parafrasear como «el Señor cuida de... y escucha a...»
  - Suavizar el rostro como mera disposición
  rationale: La metáfora es intencional y procede del trasfondo salmódico citado por el pasaje. Mantenerla preserva la fuerza literaria y teológica del texto, sin resolver artificialmente la tensión entre lenguaje humano y referencia divina.
  doctrine_reference: Poética bíblica y antropomorfismo reverente; prioridad del texto fuente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego y coincide con la decisión del POB inglés de preservar la imaginería antropomórfica y de explicitar en español la elipsis de εἰς δέησιν αὐτῶν mediante una formulación idiomática de atención.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el Tetragrámaton, manteniendo coherencia con otros pasajes del corpus.
  - «Justos» traduce el adjetivo sustantivado δικαίους sin añadir matices doctrinales ajenos al contexto.
  - «Súplica» mantiene el peso de δέησις mejor que «oración» en este verso, por tratarse de una petición ferviente.
  - Se conserva la oposición final con «está contra» para reflejar el valor adversativo de ἐπὶ con acusativo.
