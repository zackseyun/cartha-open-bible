review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del griego: el mandato principal, la ubicación interior «en sus corazones», la disposición constante y la explicación de la esperanza. También preserva correctamente «Mesías» para Χριστός y «Señor» para κύριος. Sin embargo, «a Mesías» omite el artículo exigido en español ante el título usado como designación personal, y «ante todo el que les pida razón» no refleja con suficiente naturalidad ni precisión el dativo de destinatario con πρὸς ἀπολογίαν παντὶ τῷ αἰτοῦντι ὑμᾶς λόγον. Además, la nota b introduce una alternativa interpretativa innecesaria y menos fiel al motivo de la nota inglesa, que trataba la opción «Cristo»/«Mesías».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene dos tropiezos de naturalidad importante: «santifiquen a Mesías» suena gramaticalmente incompleto, y «para una defensa ante todo el que...» resulta rígido; en español bíblico natural es mejor «preparados siempre para presentar defensa ante cualquiera que les pida razón...» o similar. La redacción revisada mantiene cercanía al griego sin calco torpe.'
  glossary_alignment: Buen alineamiento con la terminología del proyecto en «Mesías», «Señor», «corazones» y «esperanza». La principal corrección es formalizar «al Mesías». También conviene conservar una nota sobre la alternativa «Cristo como Señor», en línea con el expediente inglés, en vez de una nota nueva sobre «en ustedes» que no responde al punto teológico/lexical documentado.
  issues:
  - severity: medium
    issue: Falta el artículo en «a Mesías».
    rationale: 'En español, el título sustantivado requiere artículo: «al Mesías». Sin él, la frase suena defectuosa y menos digna.'
  - severity: medium
    issue: «Ante todo el que les pida razón» es una construcción poco natural para el sentido de destinatario.
    rationale: El griego apunta a estar listos para defenderse o dar explicación a cualquiera que pregunte. «Ante» puede sonar como mera presencia delante de alguien, no como destinatario de la defensa.
  - severity: medium
    issue: La nota b no sigue la razón documentada en el POB inglés.
    rationale: La nota inglesa preserva la alternativa de traducción de Χριστός como «Christ/Christ as Lord», no una discusión sobre «hope in you». La nota española debería reflejar ese expediente auditado.
  revised_spanish_text: Pero santifiquen al Mesías como Señor[a] en sus corazones, siempre preparados para presentar defensa a cualquiera que les pida razón de la esperanza que hay en ustedes[b],
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «santifiquen al Mesías como Señor en sus corazones».'
    reason: lexical_alternative
  - marker: b
    text: Algunas versiones traducen «Cristo como Señor»; aquí Χριστός se vierte como «Mesías» para conservar su sentido de título.
    reason: alternative_reading
  revision_rationale: Se corrige «a Mesías» a «al Mesías» por gramática y registro natural; se ajusta «ante todo el que...» a «a cualquiera que...» para reflejar mejor el destinatario de la defensa en español idiomático; y se reemplaza la nota b por una que sí sigue la decisión auditada sobre «Mesías» frente a «Cristo». «Presentar defensa» conserva bien el matiz de ἀπολογία y suena más natural que «para una defensa» en este contexto.
