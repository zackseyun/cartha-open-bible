  text: κύριον δὲ τὸν ⸀Χριστὸν ἁγιάσατε ἐν ταῖς καρδίαις ὑμῶν, ⸀ἕτοιμοι ἀεὶ πρὸς ἀπολογίαν παντὶ τῷ αἰτοῦντι ὑμᾶς λόγον περὶ τῆς ἐν ὑμῖν ἐλπίδος,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/015.yaml
  text: But regard Messiah the Lord as holy in your hearts[a], always ready for a defense to everyone who asks you for a reason concerning the hope that is in you[b],
