translation:
  language: es
  text: Pero santifiquen al Mesías como Señor[a] en sus corazones, siempre preparados para presentar defensa a cualquiera que les pida razón de la esperanza que hay en ustedes[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «santifiquen al Mesías como Señor en sus corazones».'
    reason: lexical_alternative
  - marker: b
    text: Algunas versiones traducen «Cristo como Señor»; aquí Χριστός se vierte como «Mesías» para conservar su sentido de título.
    reason: alternative_reading
lexical_decisions:
- source_word: κύριον ... Χριστὸν
  english_pob_choice: the Messiah as Lord
  chosen_spanish: Mesías como Señor
  alternatives_spanish:
  - Cristo como Señor
  - el Señor Mesías
  lexicon: BDAG
  rationale: 'La construcción se entiende junto con ἁγιάσατε: se trata de reconocer y honrar al Mesías como Señor. En español, «Mesías» conserva el valor titular de Χριστός según la norma del proyecto, y «Señor» traduce κύριος sin ocultar la identificación cristológica.'
- source_word: ἁγιάσατε
  english_pob_choice: regard ... as Lord
  chosen_spanish: santifiquen
  alternatives_spanish:
  - consideren santo
  - apártenlo como santo
  lexicon: BDAG
  rationale: El verbo significa literalmente «santificar» o «tratar como santo». En español conviene mantener el verbo fuerte de consagración/reverencia, porque el contexto habla de la actitud interior hacia el Mesías; la frase completa aclara que no implica hacerlo santo por acción humana, sino reconocerlo como tal.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  english_pob_choice: in your hearts
  chosen_spanish: en sus corazones
  alternatives_spanish:
  - en su corazón
  - en lo íntimo de ustedes
  lexicon: BDAG
  rationale: La expresión preserva el sentido interior de καρδία como centro personal, con un castellano natural y sobrio.
- source_word: ἕτοιμοι ἀεὶ
  english_pob_choice: always ready
  chosen_spanish: siempre preparados
  alternatives_spanish:
  - siempre listos
  - preparados en todo momento
  lexicon: BDAG
  rationale: La combinación adjetivo + adverbio se traduce de forma directa y natural, manteniendo tanto la disposición permanente como el matiz de preparación previa.
- source_word: πρὸς ἀπολογίαν
  english_pob_choice: for a defense
  chosen_spanish: para una defensa
  alternatives_spanish:
  - para dar defensa
  - para responder
  lexicon: BDAG
  rationale: ἀπολογία conserva un matiz forense/apologético de defensa o respuesta razonada. «Para una defensa» mantiene ese campo semántico sin volver la frase artificial.
- source_word: παντὶ τῷ αἰτοῦντι ὑμᾶς
  english_pob_choice: everyone who asks you
  chosen_spanish: ante todo el que les pida
  alternatives_spanish:
  - a toda persona que les pida
  - a cualquiera que les pregunte
  lexicon: BDAG
  rationale: La forma participial expresa a «todo el que pide/pregunta». En español, «ante todo el que les pida» fluye bien y conserva el distributivo universal.
- source_word: λόγον
  english_pob_choice: a reason
  chosen_spanish: razón
  alternatives_spanish:
  - explicación
  - respuesta
  lexicon: BDAG
  rationale: En este contexto λόγος es una explicación razonada o motivo. «Razón» es breve, fiel y natural en español; mantiene la relación con ἀπολογία.
- source_word: περὶ τῆς ἐν ὑμῖν ἐλπίδος
  english_pob_choice: concerning the hope that is in you
  chosen_spanish: de la esperanza que hay en ustedes
  alternatives_spanish:
  - acerca de la esperanza que está en ustedes
  - de la esperanza en ustedes
  lexicon: BDAG
  rationale: La preposición περί pide aquí una referencia temática. «Que hay en ustedes» preserva el sentido de ἐν ὑμῖν sin sonar forzado y mantiene la interioridad de la esperanza.
theological_decisions:
- issue: Traducción de Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: 'Se sigue la norma doctrinal del proyecto: cuando Χριστός funciona como título, se traduce «Mesías». En este versículo el artículo y la construcción confesional favorecen claramente el valor titular.'
  doctrine_reference: 'DOCTRINE.md: traducir títulos; Χριστός como «Mesías»'
- issue: Sentido de ἁγιάσατε con un complemento personal
  english_pob_reading: regard ... as holy / as Lord
  chosen_spanish_reading: santifiquen a Mesías como Señor
  alternative_spanish_readings:
  - santifiquen al Mesías como Señor y santo
  - reconozcan al Mesías como Señor
  rationale: El griego no sugiere que los creyentes vuelvan santo al Mesías, sino que lo aparten/reconozcan como santo en el ámbito interior. «Santifiquen» preserva el verbo fuerte del original; la coordinación con «como Señor» y el contexto aclaran el sentido reverencial.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; evitar importar una idea causal indebida'
translation_notes:
  revision_awareness: 'La redacción toma en cuenta el audit trail inglés: conserva la preferencia por Χριστός → Mesías, evita la sustitución regresiva por «Cristo», y refleja la revisión que prefirió la construcción más cercana con «para una defensa». También se mantiene la tensión léxica de ἁγιάσατε mediante «santifiquen», explicada en nota para no suavizarla en exceso.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme a la terminología POB en español.
  - «Señor» traduce κύριος sin máscara litúrgica; no se usa «SEÑOR».
  - «Defensa» conserva el matiz apologético/legal de ἀπολογία.
  - «Razón» traduce λόγον como explicación razonada, no como simple «palabra».
  - 'La frase final conserva la preposición temática con una construcción natural en español: «de la esperanza que hay en ustedes».'
