review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Ὁμοίως = «Igualmente», γυναῖκες... τοῖς ἰδίοις ἀνδράσιν = «las esposas... a sus propios maridos», ἀπειθοῦσιν τῷ λόγῳ = «desobedecen la palabra», y κερδηθήσονται = «sean ganados». También conserva adecuadamente la nota alternativa sobre «mensaje». Sin embargo, dos giros españoles no preservan bien la naturalidad ni del todo la fuerza del original: «sin palabra» suena poco idiomático en español bíblico actual, y «mediante la conducta de sus esposas» repite «esposas» de manera torpe donde el español permite una referencia más fluida. Además, «sean ganados» es menos natural que «sean ganados para Dios» o «sean ganados», pero la expansión «para Dios» no está en el texto; por eso conviene mantener «sean ganados» pero mejorar el entorno sintáctico.'
  spanish_quality_summary: El español es claro y mayormente fiel, con tono digno y moderno. No obstante, «sin palabra» resulta forzado; «sin una palabra» conserva el contraste retórico con λόγος y suena mucho más natural. También conviene ajustar «mediante» a «por» y «sus esposas» a «la conducta de sus esposas» o mejor «la conducta de ellas»; pero como el antecedente son los maridos incrédulos, la forma más natural y precisa es «por la conducta de sus esposas».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «La palabra» respeta λόγος; «esposas/maridos» encaja con el contexto; «estando sujetas» mantiene la cautela teológica de ὑποτασσόμεναι. La nota léxica sobre ἀπειθοῦσιν está bien preservada. La única excepción recomendada es estilística: «sin una palabra» en lugar de «sin palabra», sin afectar la decisión léxica.'
  issues:
  - severity: medium
    issue: «sin palabra» es poco idiomático en español
    rationale: Aunque reproduce literalmente ἄνευ λόγου, en español suena truncado. «Sin una palabra» conserva el singular y el contraste retórico con «la palabra», pero mejora claramente la legibilidad.
  - severity: low
    issue: «mediante la conducta de sus esposas» suena algo pesado
    rationale: «Mediante» es correcto, pero «por la conducta de sus esposas» fluye mejor en español bíblico natural sin perder el valor instrumental de διά.
  revised_spanish_text: Igualmente[a], las esposas, estando sujetas a sus propios maridos, para que, aun si algunos desobedecen la palabra, sean ganados sin una palabra por la conducta de sus esposas,
  revised_footnotes:
  - marker: a
    text: 'O: «no obedecen al mensaje»; es decir, están rechazando la palabra del evangelio.'
    reason: lexical_alternative
  revision_rationale: Se hacen ajustes menores de estilo para lograr un español más natural y eclesialmente legible, sin alterar las decisiones léxicas principales del griego ni la nota teológica del POB. «Sin una palabra» mejora la idiomaticidad conservando el singular de λόγος y su contraste interno; «por la conducta» suena más natural que «mediante la conducta» en este contexto.
