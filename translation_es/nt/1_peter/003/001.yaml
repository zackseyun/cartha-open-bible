revisions:
- from: Igualmente[a], las esposas, estando sujetas a sus propios maridos, para que, aun si algunos desobedecen la palabra, sean ganados sin palabra mediante la conducta de sus esposas,
  to: Igualmente[a], las esposas, estando sujetas a sus propios maridos, para que, aun si algunos desobedecen la palabra, sean ganados sin una palabra por la conducta de sus esposas,
  rationale: Se hacen ajustes menores de estilo para lograr un español más natural y eclesialmente legible, sin alterar las decisiones léxicas principales del griego ni la nota teológica del POB. «Sin una palabra» mejora la idiomaticidad conservando el singular de λόγος y su contraste interno; «por la conducta» suena más natural que «mediante la conducta» en este contexto.
  reviewer_model: gpt-5.4
