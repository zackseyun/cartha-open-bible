translation:
  language: es
  text: Igualmente[a], las esposas, estando sujetas a sus propios maridos, para que, aun si algunos desobedecen la palabra, sean ganados sin una palabra por la conducta de sus esposas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no obedecen al mensaje»; es decir, están rechazando la palabra del evangelio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁμοίως
  english_pob_choice: Likewise
  chosen_spanish: Igualmente
  alternatives_spanish:
  - De la misma manera
  - Asimismo
  lexicon: BDAG
  rationale: Conserva la conexión discursiva con la instrucción anterior y su valor paraenético, con un adverbio natural en español.
- source_word: γυναῖκες
  english_pob_choice: wives
  chosen_spanish: las esposas
  alternatives_spanish:
  - las mujeres
  lexicon: BDAG
  rationale: El contexto inmediato con 'a sus propios maridos' exige el sentido relacional de 'esposas', no el genérico 'mujeres'.
- source_word: ὑποτασσόμεναι
  english_pob_choice: being subject to
  chosen_spanish: estando sujetas
  alternatives_spanish:
  - sometiéndose
  - siendo sujetas
  lexicon: BDAG
  rationale: La forma participial expresa una relación de orden o sujeción; 'estando sujetas' preserva el matiz sin introducir una obediencia absoluta que el verbo no exige por sí mismo.
- source_word: τοῖς ἰδίοις ἀνδράσιν
  english_pob_choice: to your own husbands
  chosen_spanish: a sus propios maridos
  alternatives_spanish:
  - a sus propios hombres
  lexicon: BDAG
  rationale: ἀνήρ aquí es 'marido' por el contexto doméstico; 'sus propios' conserva el énfasis en la relación particular.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce finalidad/resultados; 'para que' es claro y natural en español.
- source_word: καὶ εἴ τινες
  english_pob_choice: even if some
  chosen_spanish: aun si algunos
  alternatives_spanish:
  - aunque algunos
  - y si algunos
  lexicon: BDAG
  rationale: La combinación tiene fuerza concesiva; 'aun si algunos' refleja bien esa posibilidad sin endurecer el alcance.
- source_word: ἀπειθοῦσιν τῷ λόγῳ
  english_pob_choice: are disobeying the word
  chosen_spanish: desobedecen la palabra
  alternatives_spanish:
  - no obedecen al mensaje
  - rechazan la palabra
  lexicon: BDAG
  rationale: Mantiene la tensión léxica entre desobediencia e incredulidad. 'La palabra' preserva el eco bíblico de λόγος, con posible referencia al mensaje del evangelio.
- source_word: λόγῳ
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  lexicon: BDAG
  rationale: '''La palabra'' es la equivalencia más directa y conserva el término griego sin reducirlo interpretativamente.'
- source_word: διὰ τῆς τῶν γυναικῶν ἀναστροφῆς
  english_pob_choice: through the conduct of their wives
  chosen_spanish: mediante la conducta de sus esposas
  alternatives_spanish:
  - por la manera de vivir de sus esposas
  - a través del comportamiento de las esposas
  lexicon: BDAG
  rationale: ἀναστροφή en 1 Pedro suele significar conducta o manera de vivir; 'conducta' es una opción sobria y precisa. 'Mediante' traduce bien διά con genitivo en este marco causal/instrumental.
- source_word: ἄνευ λόγου
  english_pob_choice: without a word
  chosen_spanish: sin palabra
  alternatives_spanish:
  - sin hablar
  - sin palabras
  lexicon: BDAG
  rationale: Preserva la repetición de λόγος/λόγῳ en el versículo y el contraste retórico entre la 'palabra' desobedecida y la ausencia de 'palabra' en la conducta; aunque algo más literal, comunica el paralelismo del griego.
- source_word: κερδηθήσονται
  english_pob_choice: they may be won
  chosen_spanish: sean ganados
  alternatives_spanish:
  - sean conquistados
  - sean ganados para
  lexicon: BDAG
  rationale: El pasivo futuro de κερδαίνω en este contexto relacional y evangelístico puede expresar 'ganar' a alguien; 'sean ganados' conserva la imagen sin expandirla.
theological_decisions:
- issue: Sentido de ὑποτασσόμεναι en la instrucción doméstica
  english_pob_reading: Render as 'being subject to' without importing stronger notions such as absolute obedience or inferiority.
  chosen_spanish_reading: Traducir como 'estando sujetas' sin convertirlo en 'obedeciendo' ni en una afirmación de inferioridad ontológica.
  alternative_spanish_readings:
  - sometiéndose
  - obedeciendo
  rationale: El griego expresa una relación de orden dentro del marco doméstico, pero no usa un verbo de obediencia absoluta. La redacción española mantiene esa tensión y evita sobreinterpretar el texto.
  doctrine_reference: 'Filosofía de traducción: preservar la tensión teológica en lugar de resolverla.'
- issue: Sentido de ἀπειθοῦσιν τῷ λόγῳ
  english_pob_reading: Translate as 'are disobeying the word' while preserving the gospel-belief sense in a footnote.
  chosen_spanish_reading: Traducir como 'desobedecen la palabra' y dejar abierta la posibilidad de que se trate del mensaje del evangelio.
  alternative_spanish_readings:
  - no creen al mensaje
  - rechazan obedecer al evangelio
  rationale: ἀπειθέω puede abarcar desobediencia e incredulidad. 'Desobedecen la palabra' retiene el vínculo léxico con la palabra proclamada, sin borrar la dimensión de rechazo a la fe.
  doctrine_reference: 'Filosofía de traducción: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'La traducción sigue el último pase revisado del contexto inglés, que quedó sin cambios, y conserva sus decisiones clave: vínculo discursivo de Ὁμοίως, lectura relacional de γυναῖκες/ἀνδράσιν, valor concesivo de καὶ εἴ τινες, y tensión léxica de ἀπειθοῦσιν τῷ λόγῳ. Se ajustó el español para mayor naturalidad manteniendo la correspondencia semántica y el contraste retórico ''palabra / sin palabra''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - '''Palabra'' traduce λόγος de manera consistente con el auditoría inglesa y sin forzar una paráfrasis.'
  - '''Esposas'' y ''maridos'' se mantienen por el contexto relacional inmediato.'
  - La construcción final 'sean ganados sin palabra' conserva la fuerza pasiva del futuro griego y la repetición léxica del original.
