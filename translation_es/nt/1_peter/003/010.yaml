review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: sujeto genérico singular, infinitivos «amar la vida» y «ver días buenos», y la doble exhortación sobre lengua y labios. Sin embargo, «sus labios de hablar engaño» no suena natural en español y no expresa con suficiente claridad la construcción de prevención/restricción del articular infinitivo τοῦ μὴ λαλῆσαι. La idea es refrenar los labios para no hablar engaño, o apartarlos de hablar engaño.'
  spanish_quality_summary: El texto es en general claro y digno, pero requiere una reparación menor de fluidez y sintaxis. «Que refrene su lengua del mal» es aceptable, aunque «del mal» puede sonar algo duro; no obstante, conserva bien la amplitud de ἀπὸ κακοῦ. El problema principal es «sus labios de hablar engaño», que resulta poco idiomático. «Sus labios para que no hablen engaño» o «sus labios de hablar engaño»; la primera es mucho más natural y fiel al sentido.
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen Yahvé, Mesías/Cristo, espíritu, esclavo, etc. «Engaño» para δόλος concuerda con la decisión léxica auditada; conviene preservar la alternativa «dolo/astucia/guile» en nota, como hizo el inglés con «guile».
  issues:
  - severity: medium
    issue: 'Construcción no idiomática: «sus labios de hablar engaño»'
    rationale: El griego τοῦ μὴ λαλῆσαι δόλον expresa prevención o propósito negativo tras el verbo de restricción. En español, «de hablar» aquí suena forzado; «para que no hablen engaño» comunica con claridad el valor sintáctico.
  - severity: low
    issue: Falta la nota léxica sobre δόλος
    rationale: El inglés conserva una alternativa significativa («guile»). Aunque «engaño» funciona bien en el texto principal, conviene mantener una nota breve con alternativas léxicas relevantes.
