translation:
  language: es
  text: Porque el que quiere amar la vida y ver días buenos, que refrene su lengua del mal y sus labios para que no hablen engaño[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dolo» o «astucia engañosa». El sustantivo griego puede denotar engaño, dolo o astucia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ... θέλων
  english_pob_choice: the one who wants
  chosen_spanish: el que quiere
  alternatives_spanish:
  - quien quiere
  - el que desea
  lexicon: BDAG
  rationale: La construcción con artículo y participio presente funciona de manera sustantiva y general. «El que quiere» conserva el valor representativo y el singular sin forzar un masculino específico ni una paráfrasis más libre.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la base o explicación del mandato anterior. «Porque» es una conexión natural y clara en español, manteniendo la relación causal o explicativa del griego.
- source_word: ζωὴν ἀγαπᾶν
  english_pob_choice: to love life
  chosen_spanish: amar la vida
  alternatives_spanish:
  - querer la vida
  - apreciar la vida
  lexicon: BDAG
  rationale: La expresión verbal es directa. «Amar la vida» reproduce con fidelidad el infinitivo griego y suena natural en español sin añadir matices no presentes.
- source_word: ἰδεῖν ἡμέρας ἀγαθὰς
  english_pob_choice: and see good days
  chosen_spanish: ver días buenos
  alternatives_spanish:
  - experimentar días buenos
  - ver días agradables
  lexicon: BDAG
  rationale: Se conserva el verbo «ver» como en el griego, y «días buenos» refleja ἀγαθάς de manera amplia, sin restringirlo a prosperidad material.
- source_word: παυσάτω
  english_pob_choice: must keep
  chosen_spanish: que refrene
  alternatives_spanish:
  - que detenga
  - que cese
  lexicon: BDAG
  rationale: El aoristo imperativo expresa una orden de detener o contener la conducta. «Que refrene» comunica bien la fuerza exhortativa en español y encaja con los objetos corporales que siguen.
- source_word: τὴν γλῶσσαν ἀπὸ κακοῦ
  english_pob_choice: his tongue from evil
  chosen_spanish: su lengua del mal
  alternatives_spanish:
  - su lengua de lo malo
  - su lengua de lo perverso
  lexicon: BDAG
  rationale: «Lengua» conserva la imagen concreta. «Del mal» mantiene la amplitud semántica de κακοῦ y su conexión con el trasfondo salmódico, sin estrecharlo indebidamente.
- source_word: χείλη
  english_pob_choice: his lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - los labios
  - su boca
  lexicon: BDAG
  rationale: Se mantiene el plural corporal del griego. En español, «sus labios» es natural y preserva la imagen de la expresión verbal.
- source_word: τοῦ μὴ λαλῆσαι δόλον
  english_pob_choice: from speaking deceit
  chosen_spanish: de hablar engaño
  alternatives_spanish:
  - de hablar dolo
  - de hablar astucia
  - de hablar falsedad
  lexicon: BDAG
  rationale: El infinitivo articular con μή expresa evitación o propósito negativo. «Hablar engaño» conserva la idea de discurso falseado sin introducir una lectura más estrecha que «guile» o más abstracta que «deceit».
theological_decisions:
- issue: Género gramatical y alcance representativo del sujeto
  english_pob_reading: Use 'the one who' in the subject, but idiomatic singular possessives for the generic person.
  chosen_spanish_reading: 'Usar una forma genérica singular: «el que quiere», sin masculinizar el sentido más allá de la gramática española.'
  alternative_spanish_readings:
  - «quien quiera»
  - «el hombre que quiere»
  rationale: El griego presenta un sujeto singular representativo. En español, «el que» transmite bien ese valor sin hacer explícito un varón individual.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Fuerza exhortativa de παυσάτω
  english_pob_reading: must keep ... from
  chosen_spanish_reading: que refrene su lengua y sus labios
  alternative_spanish_readings:
  - debe contener su lengua
  - que deje de usar su lengua
  rationale: El mandato no describe mera capacidad, sino una acción moral de contención. «Que refrene» comunica la exigencia ética con naturalidad en español.
  doctrine_reference: Gramática del imperativo exhortativo en contexto sapiencial y paraenético
- issue: δόλος como término de engaño deliberado
  english_pob_reading: deceit
  chosen_spanish_reading: engaño
  alternative_spanish_readings:
  - dolo
  - astucia
  - fraude
  rationale: «Engaño» es claro y abarca el campo semántico amplio del sustantivo griego. No elimina la tensión lexical entre «deceit», «treachery» y «guile», pero evita arcaísmos opacos en el texto principal.
  doctrine_reference: BDAG / uso semántico de δόλος
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier nota al pie no anclada; el texto principal ahora no contiene marcadores de nota, por lo que no se incluyen footnotes. Se mantuvo la lectura auditada del inglés POB y se ajustó la formulación española para mayor naturalidad sin perder la sintaxis y el sentido del griego.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque no aparece en el verso.
  - 'Se mantuvo la imagen corporal concreta: lengua / labios.'
  - «Engaño» se prefirió como equivalente amplio de δόλος, sin introducir un matiz doctrinal adicional.
  - No se añadieron posesivos explícitos porque el español permite una formulación natural con artículo y posesivo implícito en el mandato.
