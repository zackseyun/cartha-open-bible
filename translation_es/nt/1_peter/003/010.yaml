revisions:
- from: Porque el que quiere amar la vida y ver días buenos, que refrene su lengua del mal y sus labios de hablar engaño.
  to: Porque el que quiere amar la vida y ver días buenos, que refrene su lengua del mal y sus labios para que no hablen engaño[a].
