translation:
  language: es
  text: no devolviendo mal por mal ni insulto por insulto[a], sino, al contrario,[b] bendiciendo, porque para esto[c] fuisteis llamados, para que heredéis una bendición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «injuria por injuria». El término griego puede abarcar habla abusiva, ofensiva o insultante.
    reason: lexical_alternative
  - marker: b
    text: 'O «sino más bien». La expresión griega marca un contraste fuerte: «al contrario».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, llamados por Dios a responder al maltrato con bendición en lugar de represalia.
    reason: cross_reference
lexical_decisions:
- source_word: ἀποδιδόντες
  english_pob_choice: repaying
  chosen_spanish: devolviendo
  alternatives_spanish:
  - pagando de vuelta
  - retribuyendo
  lexicon: BDAG
  rationale: El participio con μή expresa una acción de respuesta/retribución; «devolviendo» comunica bien la reciprocidad sin sonar mecánico. «Pagando de vuelta» sería más explicativo, pero menos sobrio.
- source_word: κακὸν ἀντὶ κακοῦ
  english_pob_choice: evil for evil
  chosen_spanish: mal por mal
  alternatives_spanish:
  - daño por daño
  - maldad por maldad
  lexicon: BDAG
  rationale: «Mal» mantiene el alcance moral de κακός y funciona naturalmente con la construcción de reciprocidad de ἀντί. «Daño» estrecha demasiado el sentido; «maldad» suena más abstracto de lo necesario.
- source_word: λοιδορίαν ἀντὶ λοιδορίας
  english_pob_choice: insult for insult
  chosen_spanish: insulto por insulto
  alternatives_spanish:
  - injuria por injuria
  - ultraje por ultraje
  lexicon: BDAG
  rationale: La opción inglesa evita un término demasiado arcaico y capta el paralelismo retaliatorio. En español, «insulto» es claro y refleja bien el matiz de discurso ofensivo o denigrante.
- source_word: τοὐναντίον δὲ
  english_pob_choice: but on the contrary
  chosen_spanish: sino al contrario
  alternatives_spanish:
  - sino más bien
  - sino todo lo contrario
  lexicon: BDAG
  rationale: La expresión marca un giro fuerte y enfático; «sino al contrario» preserva ese contraste con naturalidad en español. «Sino más bien» sería posible, pero menos enfático.
- source_word: εὐλογοῦντες
  english_pob_choice: blessing
  chosen_spanish: bendiciendo
  alternatives_spanish:
  - diciendo bendición
  - hablando bendición
  lexicon: BDAG
  rationale: El participio exhortativo se traduce de forma verbal directa en español. «Bendiciendo» mantiene la brevedad del griego y permite tanto la idea de hablar bien como la de invocar el favor de Dios, sin añadir un objeto explícito que el texto no da.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la base causal de la exhortación; «porque» es la forma más clara y directa en español.
- source_word: εἰς τοῦτο ἐκλήθητε
  english_pob_choice: you were called to this
  chosen_spanish: para esto fuisteis llamados
  alternatives_spanish:
  - a esto fuisteis llamados
  - fuisteis llamados para esto
  lexicon: BDAG
  rationale: «Para esto» comunica bien la orientación del llamado y su finalidad ética. El pasivo conserva implícito el llamado de Dios sin sobreexplicarlo.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce el propósito o resultado previsto; «para que» es natural y fiel al valor final de ἵνα.
- source_word: εὐλογίαν
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - bendición
  - una gracia
  lexicon: BDAG
  rationale: El sustantivo anarthro en griego se vierte naturalmente con artículo indefinido en español. «Una bendición» suena idiomático y conserva la concreción del texto.
- source_word: κληρονομήσητε
  english_pob_choice: might inherit
  chosen_spanish: heredéis
  alternatives_spanish:
  - heredéis como herencia
  - recibáis en herencia
  lexicon: BDAG
  rationale: «Heredéis» conserva el matiz de recibir como herederos, importante en el lenguaje bíblico. En español, el subjuntivo presente encaja bien con ἵνα.
theological_decisions:
- issue: Alcance de εἰς τοῦτο ἐκλήθητε
  english_pob_reading: The clause refers to believers being called by God to the countercultural practice of blessing in response to mistreatment, with the purpose that they inherit blessing.
  chosen_spanish_reading: La frase se entiende como el llamado de Dios a responder al maltrato con bendición, no con represalia, en continuidad con la exhortación inmediata.
  alternative_spanish_readings:
  - El llamado se refiere de forma más general a toda la vida cristiana de sufrimiento y no represalia.
  rationale: El contexto cercano favorece unir «para esto» con la instrucción anterior, pero el español no debe cerrar más de lo que el griego afirma. La redacción deja el vínculo claro sin hacer la referencia excesivamente estrecha.
  doctrine_reference: Conservar la tensión contextual sin sobreespecificar el alcance del llamado.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios respecto del acuerdo alto del borrador anterior; se mantiene la decisión de conservar el contraste fuerte de τοὐναντίον δὲ, el valor causal de ὅτι y el matiz de herencia en κληρονομήσητε.
  spanish_consistency_notes:
  - Se mantiene «bendición» para εὐλογία / εὐλογοῦντες y no se introduce «Cristo» ni «Señor» porque el versículo no contiene esos términos.
  - «Mal por mal» conserva la simetría retórica del griego mejor que expresiones más explicativas.
  - «Heredéis» respeta el lenguaje de herencia sin reemplazarlo por un verbo más general como «recibáis».
