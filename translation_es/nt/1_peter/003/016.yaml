review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura principal: πραΰτητος/φόβου → «mansedumbre y temor», συνείδησιν ἔχοντες ἀγαθήν → «teniendo buena conciencia», καταισχυνθῶσιν → «sean avergonzados», ἀναστροφήν → «conducta», y ἐν Χριστῷ conforme a la política del proyecto → «en el Mesías». Sin embargo, hay varios puntos que conviene ajustar para mayor fidelidad idiomática y coherencia con el expediente POB: (1) «sino» queda algo incompleto sin repetir el verbo implícito de v.15; en español bíblico fluye mejor «sino háganlo con…»; (2) «sois difamados» y «vuestra» introducen voseo peninsular, fuera del objetivo latinoamericano neutral; (3) la nota c usa «malhablados», que en español significa ‘grosero’ o ‘que habla mal’, no ‘hablado mal de’; (4) «ultrajan vuestra buena conducta» es comprensible, pero «insultan» o «injurian» suena más natural con un complemento de personas/conducta en español actual.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero mezcla registro bíblico con formas no neutrales para América Latina («sois», «vuestra»). También hay una leve rigidez en «en aquello en que», que puede simplificarse a «en aquello por lo que» o mantenerse con una forma más natural alrededor. La nota c contiene una formulación española incorrecta/ambigua. Con ajustes menores, la traducción queda fiel y mucho más natural para el público meta.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: Χριστός → «Mesías» en texto principal con nota a «Cristo»; φόβος → «temor» preservando la tensión; ἀναστροφή → «conducta». No hay conflictos doctrinales graves. La principal mejora es de español meta y de selección léxica/idiomática en algunos detalles.'
  issues:
  - severity: medium
    issue: Uso de «sois» y «vuestra»
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. Las formas de segunda persona plural peninsular suenan marcadamente regionales y reducen naturalidad.
  - severity: medium
    issue: Nota c con «malhablados»
    rationale: «Malhablado» en español suele significar ‘que dice malas palabras’ o ‘que habla mal’, no ‘de quien se habla mal’. La alternativa propuesta no comunica correctamente καταλαλεῖσθε.
  - severity: low
    issue: «sino con mansedumbre y temor» sin verbo explícito
    rationale: Aunque depende de v.15, en español una elipsis tan corta puede sonar abrupta. Añadir «háganlo» explicita la relación exhortativa sin apartarse del sentido.
  - severity: low
    issue: «ultrajan vuestra buena conducta» algo rígido
    rationale: «Ultrajar» es posible, pero con «conducta» suena menos natural que «insultan» o «injurian». Dado ἐπηρεάζοντες, una forma verbal más idiomática mejora legibilidad sin pérdida semántica.
