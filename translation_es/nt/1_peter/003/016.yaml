translation:
  language: es
  text: sino háganlo con mansedumbre y temor[a], teniendo buena conciencia, para que, en aquello por lo que son difamados[c], sean avergonzados los que insultan su buena conducta en el Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con reverencia» o «con respeto».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «en el Mesías»; tradicionalmente, «en Cristo».'
    reason: alternative_reading
  - marker: c
    text: 'O: «en el asunto en que se habla mal de ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πραΰτητος
  english_pob_choice: gentleness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - gentileza
  - amabilidad
  lexicon: BDAG
  rationale: πραΰτης expresa una actitud suave, no agresiva y humilde. En español, 'mansedumbre' conserva mejor la cualidad ética y bíblica del término que 'gentileza', que puede sonar demasiado social o decorativo.
- source_word: φόβου
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - reverencia
  - respeto
  lexicon: BDAG
  rationale: φόβος puede abarcar temor, reverencia o respeto. 'Temor' preserva la tensión interpretativa del original sin fijar de antemano si el enfoque es temor de Dios, seriedad reverente o actitud respetuosa.
- source_word: συνείδησιν ἔχοντες ἀγαθήν
  english_pob_choice: having a good conscience
  chosen_spanish: teniendo buena conciencia
  alternatives_spanish:
  - manteniendo buena conciencia
  lexicon: BDAG
  rationale: La construcción participial se rinde con una forma natural en español que conserva la circunstancia acompañante. 'Buena conciencia' reproduce el valor moral y la repetición léxica de ἀγαθός.
- source_word: ἐν ᾧ
  english_pob_choice: in what
  chosen_spanish: en aquello en que
  alternatives_spanish:
  - en lo cual
  - en el asunto en que
  - en aquello por lo cual
  lexicon: BDAG
  rationale: La frase relativa es comprimida y abierta. 'En aquello en que' mantiene el referente indefinido del ámbito o asunto en que los creyentes son malhablados, sin cerrarlo demasiado.
- source_word: καταλαλεῖσθε
  english_pob_choice: you are slandered
  chosen_spanish: sois difamados
  alternatives_spanish:
  - sois calumniados
  - se habla mal de vosotros
  lexicon: BDAG
  rationale: καταλαλέω indica hablar contra alguien de manera hostil o difamatoria. 'Difamados' conserva la fuerza adversa y es apto en español bíblico moderno.
- source_word: καταισχυνθῶσιν
  english_pob_choice: may be put to shame
  chosen_spanish: sean avergonzados
  alternatives_spanish:
  - queden avergonzados
  - sean puestos en vergüenza
  lexicon: BDAG
  rationale: El subjuntivo pasivo final expresa resultado o propósito. 'Sean avergonzados' respeta la pasiva y la idea de vergüenza pública sin ampliar el sentido.
- source_word: ἐπηρεάζοντες
  english_pob_choice: those who abuse
  chosen_spanish: los que ultrajan
  alternatives_spanish:
  - los que insultan
  - los que maltratan
  - los que injurian
  lexicon: BDAG
  rationale: ἐπηρεάζω puede significar insultar, maltratar o tratar con hostilidad. 'Ultrajan' recoge el carácter violento y ofensivo de la acción, con buena naturalidad en español.
- source_word: ἀναστροφήν
  english_pob_choice: conduct
  chosen_spanish: conducta
  alternatives_spanish:
  - manera de vivir
  - comportamiento
  lexicon: BDAG
  rationale: ἀναστροφή se refiere al modo de vida o conducta. 'Conducta' es breve, clara y conserva el énfasis ético del pasaje.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Siguiendo la política del proyecto, Χριστός se traduce normalmente como 'Mesías' cuando funciona como título. Aquí el sintagma ἐν Χριστῷ conserva ese valor titular, por lo que 'el Mesías' es la opción de base.
theological_decisions:
- issue: Valor de φόβου en la exhortación
  english_pob_reading: Retain the broader term 'fear' in the main text without specifying its object.
  chosen_spanish_reading: Conservar 'temor' sin aclarar su objeto.
  alternative_spanish_readings:
  - reverencia
  - respeto
  - temor de Dios
  rationale: El contexto inmediato no precisa el objeto de φόβος. Mantener 'temor' preserva la apertura interpretativa y evita resolver prematuramente una tensión que el texto no explicita.
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica cuando el contexto no la resuelve.'
- issue: Traducción de Χριστῷ
  english_pob_reading: Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se conserva el valor titular de Χριστός según la política terminológica del proyecto. La forma tradicional 'Cristo' queda como alternativa válida, pero no como forma principal del texto.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías (como título).'
translation_notes:
  revision_awareness: El texto sigue la decisión revisada de mantener Χριστός como «Mesías» en este versículo, aunque una pasada de revisión propuso «Cristo» por consistencia interna. También se refleja el ajuste más preciso de ἐπηρεάζοντες como hostilidad verbal/ofensiva más que simple «abuso», optando por «ultrajan» para conservar intensidad sin desdibujar el matiz.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός, conforme a la política terminológica del proyecto y la corrección de regresión documentada.
  - Se mantiene «temor» en vez de resolverlo como «reverencia» o «respeto», para no eliminar la ambigüedad del original.
  - «Difamados» y «ultrajan» distinguen entre la acción de hablar mal contra los creyentes y la agresión más amplia de los agresores.
  - «Conducta» reproduce el valor ético de ἀναστροφή sin redundancia innecesaria.
