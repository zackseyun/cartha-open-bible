  to: sino háganlo con mansedumbre y temor[a], teniendo buena conciencia, para que, en aquello por lo que son difamados[c], sean avergonzados los que insultan su buena conducta en el Mesías[b].
  rationale: Se ajustó el texto para español neutro latinoamericano («son», «su»), se explicitó el verbo exhortativo implícito para mejor fluidez («háganlo»), se hizo más natural la frase relativa («en aquello por lo que»), se sustituyó «ultrajan» por «insultan» por mayor naturalidad en español actual, y se corrigió la nota c porque «malhablados» era semánticamente inadecuado. Se mantiene «mansedumbre», «temor» y «Mesías» por fidelidad al expediente y a la política terminológica.
