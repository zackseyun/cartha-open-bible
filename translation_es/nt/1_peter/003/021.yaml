  text: ὃ ⸂καὶ ὑμᾶς ἀντίτυπον νῦν⸃ σῴζει βάπτισμα, οὐ σαρκὸς ἀπόθεσις ῥύπου ἀλλὰ συνειδήσεως ἀγαθῆς ἐπερώτημα εἰς θεόν, δι’ ἀναστάσεως Ἰησοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/021.yaml
  text: Corresponding to that[a], baptism now also saves you—not the removal of dirt from the flesh, but an appeal to God for a good conscience—through the resurrection of Jesus Messiah,
  footnotes:
