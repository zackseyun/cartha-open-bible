translation:
  language: es
  text: En correspondencia con eso[a], el bautismo ahora también los salva —no la eliminación de la suciedad de la carne, sino una petición a Dios[b] para una buena conciencia— por medio de la resurrección de Jesús Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como antitipo». El término griego indica una relación de correspondencia tipológica con lo anterior.
    reason: alternative_reading
  - marker: b
    text: O «compromiso», «promesa» o «respuesta». El término griego ἐπερώτημα puede entenderse como una petición dirigida a Dios o, en otra lectura, como un compromiso/respuesta en el marco bautismal.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀντίτυπον
  english_pob_choice: Corresponding to that
  chosen_spanish: Correspondiendo a eso
  alternatives_spanish:
  - como correspondencia a aquello
  - en correspondencia con eso
  lexicon: BDAG
  rationale: El término apunta a una relación tipológica con lo anterior; «Correspondiendo a eso» conserva esa conexión sin introducir tecnicismos como «antitipo».
- source_word: σῴζει
  english_pob_choice: saves
  chosen_spanish: salva
  alternatives_spanish:
  - está salvando
  - rescata
  lexicon: BDAG
  rationale: El presente indicativo debe mantenerse directo; «salva» preserva la afirmación fuerte del texto y deja que las cláusulas siguientes la delimiten.
- source_word: βάπτισμα
  english_pob_choice: baptism
  chosen_spanish: el bautismo
  alternatives_spanish:
  - el lavamiento
  lexicon: BDAG
  rationale: El término estándar en español es «bautismo»; no conviene sustituirlo por «lavamiento» porque el versículo precisamente lo distingue de una limpieza externa.
- source_word: σαρκὸς
  english_pob_choice: flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - el cuerpo
  lexicon: BDAG
  rationale: Se conserva el valor literal de σάρξ como «carne», en contraste con la suciedad física; «cuerpo» suavizaría la tensión lexical.
- source_word: ἀπόθεσις ῥύπου
  english_pob_choice: the removal of dirt
  chosen_spanish: la eliminación de la suciedad
  alternatives_spanish:
  - el quitar la mugre
  - el lavamiento de la suciedad
  lexicon: BDAG
  rationale: La frase describe una limpieza material. «La eliminación de la suciedad» es idiomática y mantiene el contraste con el sentido salvífico del bautismo.
- source_word: συνειδήσεως ἀγαθῆς
  english_pob_choice: for a good conscience
  chosen_spanish: para una buena conciencia
  alternatives_spanish:
  - de una buena conciencia
  - desde una buena conciencia
  lexicon: BDAG
  rationale: La revisión inglesa favorece «for a good conscience»; en español, «para una buena conciencia» conserva la dirección hacia el bien moral y la finalidad implícita sin forzar la sintaxis.
- source_word: ἐπερώτημα
  english_pob_choice: an appeal
  chosen_spanish: una apelación
  alternatives_spanish:
  - una súplica
  - un compromiso
  - una respuesta
  lexicon: BDAG
  rationale: Es un término discutido; «apelación» refleja bien la idea de dirigir un ruego o llamado a Dios. Se conserva la ambigüedad con apoyo de nota para no cerrar indebidamente el sentido.
- source_word: εἰς θεόν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  - ante Dios
  lexicon: BDAG
  rationale: La preposición expresa dirección; «a Dios» es la forma más natural y fiel en español.
- source_word: δι’ ἀναστάσεως
  english_pob_choice: through the resurrection
  chosen_spanish: por medio de la resurrección
  alternatives_spanish:
  - a través de la resurrección
  - mediante la resurrección
  lexicon: BDAG
  rationale: διά con genitivo expresa medio/instrumento; «por medio de» es claro y preciso en español bíblico contemporáneo.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se conserva «Mesías» porque λειτουργa como título y el POB inglés también opta por esta forma; en español resulta más transparente que «Cristo» para este contexto confesional.
theological_decisions:
- issue: Relación del bautismo con la salvación
  english_pob_reading: Retain the direct statement 'baptism now also saves you' and let Peter's own qualification define the sense.
  chosen_spanish_reading: Mantener «el bautismo ahora también los salva» y dejar que las cláusulas explicativas delimiten el alcance.
  alternative_spanish_readings:
  - «el bautismo simboliza la salvación»
  - «el bautismo representa la salvación»
  - «el bautismo ahora también os ayuda a salvaros»
  rationale: El texto atribuye al bautismo una acción salvífica directa; atenuarlo borraría una tensión deliberada. La traducción conserva esa fuerza y respeta la aclaración interna del versículo.
  doctrine_reference: Translation philosophy §3
- issue: Sentido de ἐπερώτημα en contexto bautismal
  english_pob_reading: Render ἐπερώτημα as 'appeal' in the main text, with 'pledge' preserved in a footnote.
  chosen_spanish_reading: Traducir ἐπερώτημα como «apelación» en el texto principal, con «compromiso» preservado como alternativa en nota.
  alternative_spanish_readings:
  - compromiso
  - promesa
  - petición
  - respuesta
  rationale: El término es debatido; «apelación» armoniza con εἰς θεόν y evita imponer una teología bautismal más específica de la que el griego exige. La nota mantiene visible la alternativa importante.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que ajustó la frase equivalente a ἐπερώτημα εἰς θεόν hacia «for a good conscience». Por eso la versión española usa «para una buena conciencia» y no una construcción más distante como «de una buena conciencia». También se preservó la decisión de mantener en el texto principal una traducción directa de la afirmación sobre la salvación del bautismo, sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Mesías» de manera consistente para Χριστός cuando funciona como título.
  - Se conserva «carne» para σάρξ por consistencia con el contraste físico del versículo.
  - 'El orden y la puntuación buscan reproducir la progresión retórica: afirmación principal, negación correctiva y clausura instrumental.'
  - Se evita «SEÑOR» o «Cristo» donde el audit trail favorece una traducción más transparente de los términos originales.
