translation:
  language: es
  text: Pero aun si llegaran a sufrir por causa de la rectitud, son bienaventurados. Y no teman su temor[a], ni se turben,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que ellos temen» o «el temor de ellos». La frase griega es intencionalmente ambigua y sigue de cerca la redacción de Isaías 8:12, por lo que se conserva esa ambigüedad en el texto principal.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλ’ εἰ καὶ
  english_pob_choice: But even if
  chosen_spanish: Pero aun si
  alternatives_spanish:
  - Y aun si
  - Sin embargo, aun si
  lexicon: BDAG
  rationale: La combinación introduce una concesión con contraste respecto del contexto anterior. «Pero aun si» conserva ese matiz adversativo-concesivo con naturalidad en español.
- source_word: πάσχοιτε
  english_pob_choice: you should suffer
  chosen_spanish: padecéis
  alternatives_spanish:
  - sufrís
  - pudierais padecer
  lexicon: BDAG
  rationale: El optativo potencial en una condicional concesiva expresa una posibilidad real. «Padecéis» mantiene la relación con el sufrimiento sin volver la frase demasiado perifrástica; en estilo bíblico español suena solemne y directo.
- source_word: διὰ δικαιοσύνην
  english_pob_choice: for righteousness
  chosen_spanish: por causa de la justicia
  alternatives_spanish:
  - por justicia
  - a causa de la justicia
  - por causa de la rectitud
  lexicon: BDAG
  rationale: «δικαιοσύνη» se rinde aquí como «justicia» por el valor moral y bíblico del término, y «por causa de» expresa bien la idea causal de διά con acusativo. «Rectitud» es posible, pero menos natural en este contexto.
- source_word: μακάριοι
  english_pob_choice: you are blessed
  chosen_spanish: bienaventurados sois
  alternatives_spanish:
  - sois benditos
  - felices sois
  lexicon: BDAG
  rationale: La frase predicativa en segunda persona plural requiere suplir el verbo en español. «Bienaventurados sois» conserva la resonancia bíblica de μακάριοι y mantiene el tono declarativo del original.
- source_word: τὸν δὲ φόβον αὐτῶν
  english_pob_choice: what they fear
  chosen_spanish: lo que ellos temen
  alternatives_spanish:
  - su temor
  - el temor de ellos
  - lo que temen
  lexicon: BDAG
  rationale: La frase es deliberadamente ambigua y eco de Isaías 8:12. «Lo que ellos temen» preserva la ambigüedad mejor que «su temor» y refleja la revisión inglesa que prefirió la lectura más natural sin perder el vínculo intertextual.
- source_word: μὴ φοβηθῆτε
  english_pob_choice: do not fear
  chosen_spanish: no temáis
  alternatives_spanish:
  - no tengáis miedo
  - no os asustéis
  lexicon: BDAG
  rationale: La prohibición mantiene la repetición léxica de φόβος/φοβέομαι. «No temáis» es más sobrio y más cercano al eco escritural que «no tengáis miedo».
- source_word: μηδὲ ταραχθῆτε
  english_pob_choice: nor be troubled
  chosen_spanish: ni os turbéis
  alternatives_spanish:
  - ni os inquietéis
  - ni os alarméis
  lexicon: BDAG
  rationale: ταράσσω indica agitación o perturbación interior. «Os turbéis» comunica bien esa alteración interna y guarda una cadencia bíblica sobria en español.
theological_decisions:
- issue: δικαιοσύνη en un contexto de sufrimiento
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - hacer lo correcto
  rationale: En español «justicia» es la opción más fiel al campo semántico bíblico de δικαιοσύνη y permite abarcar tanto rectitud moral como fidelidad a lo debido. El contexto de 1 Pedro 3:14 habla de sufrimiento por una conducta aprobada por Dios, no de justicia social en sentido moderno restringido.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness'
- issue: Ambigüedad de τὸν ... φόβον αὐτῶν
  english_pob_reading: what they fear
  chosen_spanish_reading: lo que ellos temen
  alternative_spanish_readings:
  - su temor
  - el temor de ellos
  - el miedo que ellos inspiran
  rationale: 'La redacción conserva la ambigüedad presente en el griego y el eco de Isaías 8:12. En lugar de resolverla, la frase española mantiene el doble posible sentido: el objeto de su temor o el temor que ellos tienen/propagan.'
  doctrine_reference: Isaiah 8:12 LXX; 1 Peter 3:14 intertextual echo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió la lectura natural y contextual de τὸν ... φόβον αὐτῶν como «what they fear» en vez de la literalidad más dura «their fear». La versión española adopta una solución equivalente («lo que ellos temen») sin perder la ambigüedad señalada en la nota.
  spanish_consistency_notes:
  - Se conserva el paralelismo léxico de φόβος/φοβέομαι con «temen / no temáis».
  - «Bienaventurados sois» mantiene registro bíblico sin forzar un calco del inglés.
  - Se prefirió «justicia» sobre «rectitud» por consistencia con la terminología POB y el valor doctrinal del término.
  - La puntuación sigue el tono exhortativo y la cadencia del texto griego, con la cláusula final separada por coma.
