revisions:
- from: Pero aun si padecéis por causa de la justicia, bienaventurados sois.[a] Y no temáis lo que ellos temen, ni os turbéis,
  to: Pero aun si llegaran a sufrir por causa de la rectitud, son bienaventurados. Y no teman su temor[a], ni se turben,
  rationale: Se corrige el verbo para reflejar el matiz potencial del optativo griego («llegaran a sufrir»), se ajusta δικαιοσύνη a «rectitud» para preservar mejor el sentido moral-teológico documentado, y se restaura en el texto principal la ambigüedad de τὸν ... φόβον αὐτῶν con «su temor», de modo que la nota al pie vuelva a ser exacta. También se moderniza levemente el registro al español neutro latinoamericano sin perder solemnidad bíblica.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura concesiva, la bendición declarativa y las dos prohibiciones. Sin embargo, no preserva de forma suficientemente fiel el matiz potencial de πάσχοιτε: «padecéis» suena más presente/indicativo que condicional-potencial. También hay una inconsistencia entre la nota al pie y el texto principal: la nota afirma que se conserva la ambigüedad en el texto principal, pero «lo que ellos temen» selecciona una de las posibilidades en vez de preservar la ambigüedad de τὸν ... φόβον αὐτῶν.'
  spanish_quality_summary: El español es legible pero mezcla un registro arcaizante peninsular («padecéis», «sois», «temáis», «os turbéis») con el objetivo de español neutro latinoamericano y con la instrucción de evitar phrasing demasiado de Reina-Valera cuando no sea necesario. «Bienaventurados» es aceptable por resonancia bíblica, pero la oración mejora en naturalidad y fidelidad con una forma potencial como «llegaran a sufrir» o «sufrieran».
  glossary_alignment: 'Hay desalineación parcial con el criterio documentado de δικαιοσύνη: el proyecto favorece «justicia/rectitud» por contexto, pero aquí la base inglesa y la decisión doctrinal priorizan «righteousness», por lo que en español «rectitud» expresa mejor el sentido moral-teológico y evita la lectura moderna de «justicia» como justicia social. La elección «lo que ellos temen» sigue la revisión inglesa, pero en español conviene explicitar que ya no se conserva la ambigüedad en el texto principal; o bien restaurar la ambigüedad con «su temor».'
  issues:
  - severity: high
    issue: «padecéis» no refleja bien el optativo potencial πάσχοιτε
    rationale: 'El griego con εἰ καὶ + optativo expresa una posibilidad real: «aunque llegaran a sufrir» / «aunque sufran». «Padecéis» se oye como presente factual y debilita el matiz condicional.'
  - severity: high
    issue: La nota al pie contradice el texto principal respecto a la ambigüedad de τὸν ... φόβον αὐτῶν
    rationale: «Lo que ellos temen» resuelve la ambigüedad hacia una lectura concreta, mientras la nota dice que la ambigüedad se conserva en el texto principal. Eso debe corregirse en el texto o en la nota.
  - severity: medium
    issue: «por causa de la justicia» puede sonar más social/jurídico que moral-teológico en este contexto
    rationale: Según la decisión doctrinal inglesa, aquí δικαιοσύνη apunta a la rectitud ante Dios y en la conducta. «Por causa de la rectitud» o «por rectitud» comunica mejor ese sentido en español.
  - severity: low
    issue: Registro demasiado arcaizante para el objetivo de español neutro moderno
    rationale: Formas como «sois», «temáis», «os turbéis» son comprensibles pero menos naturales para un lector latinoamericano general. No es un error grave, pero puede ajustarse sin perder dignidad.
