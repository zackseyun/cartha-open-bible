translation:
  language: es
  text: como Sara obedeció a Abraham, llamándolo señor[a]. Ustedes han llegado a ser hijas de Sara si hacen el bien y no temen ninguna intimidación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cualquier terror’ o ‘cualquier cosa aterradora’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: BDAG
  rationale: Introduzco la comparación de manera natural en español con 'como', que conserva la fuerza comparativa sin sobrecargar la frase. 'Tal como' sería más explícito, pero menos ágil.
- source_word: ὑπήκουσεν
  english_pob_choice: obeyed
  chosen_spanish: obedeció
  alternatives_spanish:
  - se sometió a
  - escuchó
  lexicon: BDAG
  rationale: El verbo ὑπακούω significa obedecer/atender. 'Obedeció' reproduce el sentido directo y no atenúa la fuerza del mandato implícito. 'Se sometió a' podría sonar más interpretativo en español.
- source_word: κύριον
  english_pob_choice: lord
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - dueño
  lexicon: BDAG
  rationale: Aquí κύριος no funciona como título divino, sino como tratamiento respetuoso de Sara hacia Abraham. 'Señor' en minúscula conserva ese valor léxico y la dignidad del trato. 'Amo' o 'dueño' endurecerían indebidamente el matiz doméstico.
- source_word: καλοῦσα
  english_pob_choice: calling
  chosen_spanish: llamándolo
  alternatives_spanish:
  - al llamarlo
  - al decirle
  lexicon: BDAG
  rationale: El participio expresa la manera en que se manifestó la obediencia de Sara. 'Llamándolo' mantiene la relación verbal con el habla y suena natural en español. 'Al decirle' explicaría más, pero pierde la correspondencia léxica con καλέω.
- source_word: ἧς
  english_pob_choice: her
  chosen_spanish: suyos
  alternatives_spanish:
  - de ella
  - de Sara
  lexicon: BDAG
  rationale: El genitivo relativo apunta a Sara como referente. En español, 'hijos suyos' comunica con naturalidad la relación filial y evita una construcción pesada. 'De ella' sería posible, pero menos fluido.
- source_word: ἐγενήθητε
  english_pob_choice: have become
  chosen_spanish: han venido a ser
  alternatives_spanish:
  - han llegado a ser
  - se han hecho
  lexicon: BDAG
  rationale: El aoristo de γίνομαι expresa la entrada en un nuevo estado. 'Han venido a ser' conserva el valor resultativo y resulta claro en español. 'Son' nivelaría demasiado el matiz de cambio.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  lexicon: BDAG
  rationale: En este contexto figurado, 'hijos' es la forma más natural y conserva la imagen de pertenencia familiar. 'Descendientes' sería más técnico y menos directo.
- source_word: ἀγαθοποιοῦσαι
  english_pob_choice: if you do good
  chosen_spanish: si hacen el bien
  alternatives_spanish:
  - mientras hacen el bien
  - al hacer el bien
  lexicon: BDAG
  rationale: El participio expresa la manera/condición en que se reconoce a las lectoras como hijas de Sara. En español, 'si hacen el bien' comunica la fuerza condicional que la audit trail inglesa decidió explicitar. 'Mientras' o 'al' debilitarían esa relación.
- source_word: μὴ φοβούμεναι
  english_pob_choice: do not fear
  chosen_spanish: no temen
  alternatives_spanish:
  - no tengan miedo
  - no estén atemorizadas
  lexicon: BDAG
  rationale: El participio presente coordinado con ἀγαθοποιοῦσαι pide una expresión verbal natural. 'No temen' conserva el sentido continuo de una disposición; 'no tengan miedo' sería igualmente posible, pero menos paralela al resto de la cláusula.
- source_word: μηδεμίαν πτόησιν
  english_pob_choice: any intimidation
  chosen_spanish: ninguna intimidación
  alternatives_spanish:
  - ningún terror
  - nada que las asuste
  lexicon: BDAG
  rationale: πτόησις puede significar terror, sobresalto o intimidación. Dado el contexto exhortativo, 'intimidación' captura bien la presión externa implícita y evita reducir el término sólo a emoción interna. 'Terror' queda como alternativa literal válida.
theological_decisions:
- issue: Relación de Sara con el modelo para las mujeres cristianas
  english_pob_reading: Sarah is presented as an example of respectful conduct without expanding the verse into a broader doctrinal claim; 'obeyed' is retained as the plain sense.
  chosen_spanish_reading: Sara aparece como ejemplo de conducta respetuosa, sin convertir el versículo en una tesis general sobre el matrimonio más allá de lo que dice el texto.
  alternative_spanish_readings:
  - Sara es presentada como un modelo de sumisión con lenguaje más fuerte.
  - Sara es reducida a un ejemplo cultural sin peso normativo.
  rationale: La traducción mantiene el valor llano de ὑπήκουσεν sin exagerarlo ni suavizarlo por sensibilidad contemporánea. A la vez, evita convertir el pasaje en una formulación doctrinal más amplia que la del propio versículo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Fuerza condicional de los participios finales
  english_pob_reading: Expressed as a condition with 'if you do good and do not fear any intimidation.'
  chosen_spanish_reading: La condición se expresa con 'si hacen el bien y no temen ninguna intimidación'.
  alternative_spanish_readings:
  - '''al hacer el bien y no temer ninguna intimidación'' como descripción de modo'
  - '''mientras hacen el bien y no temen...'' como sentido circunstancial'
  rationale: En español hace falta explicitar la relación de los participios con la cláusula principal. La forma condicional preserva la tensión exhortativa del contexto y sigue de cerca la solución auditada en inglés.
  doctrine_reference: Translation philosophy §3
- issue: κύριον aplicado a Abraham
  english_pob_reading: lowercase 'lord' preserves the lexical sense without implying deity
  chosen_spanish_reading: '''señor'' en minúscula preserva el valor respetuoso y no divino del término'
  alternative_spanish_readings:
  - '''amo'' con matiz más fuerte'
  - '''dueño'' con matiz posesivo'
  rationale: En el uso de Sara respecto de Abraham, κύριος no es un título para Dios. 'Señor' en minúscula mantiene la deferencia sin introducir una lectura teológica ajena al contexto.
  doctrine_reference: BDAG; Génesis 18:12
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador español sigue de cerca la solución inglesa auditada, especialmente en la fuerza comparativa de ὡς, el valor respetuoso de κύριον, el matiz resultativo de ἐγενήθητε y la explicitación condicional de los participios finales.
  spanish_consistency_notes:
  - Usé 'Yahvé' no aplica aquí porque el versículo no contiene el nombre divino.
  - Mantengo 'señor' en minúscula para κύριον, evitando cualquier impresión de título divino.
  - '''Hijos'' conserva el lenguaje familiar figurado de τέκνα mejor que ''descendientes''.'
  - '''Intimidación'' refleja bien πτόησις en el contexto de presión externa, pero la nota preserva alternativas más literales.'
