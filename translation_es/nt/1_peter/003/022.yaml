translation:
  language: es
  text: el que está a la diestra de Dios[a], habiendo ido al cielo, con ángeles, autoridades y poderes sometidos a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al interior del cielo». El griego dice más literalmente «hacia dentro del cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅς
  english_pob_choice: who
  chosen_spanish: el que
  alternatives_spanish:
  - quien
  - el cual
  lexicon: BDAG
  rationale: El relativo apunta a Jesús Mesías del versículo anterior. En español, «el que» mantiene la referencia anafórica con naturalidad y sin añadir énfasis innecesario.
- source_word: ἐν δεξιᾷ θεοῦ
  english_pob_choice: at the right hand of God
  chosen_spanish: a la diestra de Yahvé
  alternatives_spanish:
  - a la derecha de Dios
  - a la diestra de Dios
  lexicon: BDAG
  rationale: La expresión conserva el modismo de exaltación y honor. Se usa «Yahvé» según la convención de la POB para el nombre divino, y «diestra» preserva el matiz bíblico y solemne del giro.
- source_word: πορευθεὶς
  english_pob_choice: having gone
  chosen_spanish: habiendo ido
  alternatives_spanish:
  - después de ir
  - habiendo procedido
  lexicon: BDAG
  rationale: El participio aoristo señala acción anterior respecto del verbo principal. «Habiendo ido» conserva esa relación verbal sin convertirla en una paráfrasis.
- source_word: εἰς οὐρανόν
  english_pob_choice: into heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - hacia el cielo
  - al cielo celestial
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «hacia/en» el movimiento «into heaven», en español «al cielo» comunica con claridad la dirección del movimiento y sigue siendo fiel al valor direccional del preposición εἰς.
- source_word: ὑποταγέντων
  english_pob_choice: subjected
  chosen_spanish: sometidos
  alternatives_spanish:
  - sujetos
  - subordinados
  lexicon: BDAG
  rationale: El participio pasivo expresa una subordinación ya realizada. «Sometidos» reproduce bien la fuerza de ὑποτάσσω en una lista de poderes cósmicos sin perder la relación de pasividad.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - bajo él
  - para él
  lexicon: BDAG
  rationale: El dativo indica el destinatario de la sumisión. «A él» es la forma más directa y mantiene la referencia a Cristo sin sobreinterpretar la relación.
- source_word: ἀγγέλων
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: En este contexto de exaltación y poderes celestiales, «ángeles» es el sentido evidente y evita una lectura humana de «mensajeros».
- source_word: ἐξουσιῶν
  english_pob_choice: authorities
  chosen_spanish: autoridades
  alternatives_spanish:
  - gobiernos
  - poderes
  lexicon: BDAG
  rationale: «Autoridades» distingue este término del siguiente y conserva la secuencia de rangos o potestades sin fundirla con una sola categoría genérica.
- source_word: δυνάμεων
  english_pob_choice: powers
  chosen_spanish: poderes
  alternatives_spanish:
  - fuerzas
  - potencias
  lexicon: BDAG
  rationale: «Poderes» mantiene la tercera pieza de la lista y refleja el campo semántico cósmico del término en plural, con un registro claro y bíblico.
theological_decisions:
- issue: Identidad y función de la expresión «a la diestra de Yahvé»
  english_pob_reading: Retain the spatial-relational biblical idiom 'at the right hand of God' without reducing it to a mere metaphor for honor.
  chosen_spanish_reading: Conservar el modismo «a la diestra de Yahvé» como expresión de exaltación y autoridad, sin reducirlo a una paráfrasis explicativa.
  alternative_spanish_readings:
  - en el lugar de mayor honor junto a Dios
  - a la derecha de Dios como metáfora de honor
  rationale: El texto apostólico usa un idioma bíblico cargado teológicamente. Mantener el giro protege su fuerza cristológica y evita interpretar en vez de traducir.
  doctrine_reference: Credo niceno; filosofía de traducción §1, §3
- issue: Naturaleza de «ángeles y autoridades y poderes»
  english_pob_reading: Render as a broad hierarchy of heavenly/cosmic beings and powers subjected to Christ, without specifying whether all are good, evil, or mixed.
  chosen_spanish_reading: Traducir la tríada como una gama amplia de seres y potestades celestiales/cósmicas sometidos a Cristo, sin precisar si son buenos, malos o mixtos.
  alternative_spanish_readings:
  - solo ángeles buenos
  - potestades hostiles específicamente
  rationale: La lista griega no clasifica moralmente a estos seres. Conservar la amplitud evita añadir un sistema interpretativo que el versículo no declara.
  doctrine_reference: Filosofía de traducción §3
translation_notes:
  revision_awareness: La revisión inglesa reciente simplificó la última frase de 'having been subjected' a 'subjected' para sonar más natural sin alterar el sentido; por eso el español usa «sometidos», que preserva el estado resultante de la sumisión y suena natural en un sintagma participial.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología estándar de la serie POB para el nombre divino.
  - Se conserva la tríada «ángeles, autoridades y poderes» sin armonizarla con terminología eclesiástica posterior.
  - «A la diestra» se eligió por su valor idiomático y solemnidad bíblica en español.
  - La nota de pie distingue la alternativa direccional de εἰς οὐρανόν sin desplazar el texto principal.
