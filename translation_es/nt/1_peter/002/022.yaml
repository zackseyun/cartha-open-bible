translation:
  language: es
  text: quien no cometió pecado[a], ni se halló engaño[b] en su boca[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Pecado» traduce ἁμαρτία como término general; el singular conserva el valor de categoría: no cometió pecado en absoluto.'
    reason: lexical_alternative
  - marker: b
    text: O «doblez»; el término griego denota engaño, fraude o traición.
    reason: lexical_alternative
  - marker: c
    text: Esta redacción conserva el eco de Isaías 53:9.
    reason: cross_reference
lexical_decisions:
- source_word: ὃς
  english_pob_choice: who
  chosen_spanish: quien
  alternatives_spanish:
  - el que
  - aquel que
  lexicon: BDAG
  rationale: El relativo griego se refiere a Cristo en el contexto inmediato. «Quien» mantiene la conexión relativa de forma natural en español sin añadir énfasis ajeno al texto.
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecado alguno
  - ningún pecado
  lexicon: BDAG
  rationale: ἁμαρτία es el término usual para «pecado». En español, con la negación verbal, «no cometió pecado» comunica bien la ausencia total de pecado sin forzar una paráfrasis.
- source_word: οὐκ ἐποίησεν
  english_pob_choice: committed no
  chosen_spanish: no cometió
  alternatives_spanish:
  - no hizo
  - no practicó
  lexicon: BDAG
  rationale: Aunque ποιέω significa literalmente «hacer», con ἁμαρτίαν la construcción es idiomática para «cometer pecado». «No cometió» preserva ese sentido natural y exacto.
- source_word: οὐδὲ
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - y no
  - ni tampoco
  lexicon: BDAG
  rationale: «Ni» reproduce la coordinación negativa con fluidez en español y mantiene la segunda cláusula unida a la primera sin perder la fuerza de la negación.
- source_word: εὑρέθη
  english_pob_choice: was found
  chosen_spanish: se halló
  alternatives_spanish:
  - fue hallado
  - se encontró
  lexicon: BDAG
  rationale: El pasivo aoristo de εὑρίσκω se puede expresar naturalmente con «se halló». Conserva la pasividad y la idea de que, al examinarlo, no apareció engaño.
- source_word: δόλος
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - fraude
  - astucia
  - doblez
  lexicon: BDAG
  rationale: El término griego abarca engaño, fraude o traición. «Engaño» es un equivalente claro y digno en español; mantiene la tensión léxica sin estrecharla demasiado. «Fraude» o «doblez» serían más específicos, y «astucia» podría desviar el sentido.
- source_word: ἐν τῷ στόματι αὐτοῦ
  english_pob_choice: in his mouth
  chosen_spanish: en su boca
  alternatives_spanish:
  - en sus labios
  lexicon: BDAG
  rationale: La imagen corporal se conserva con «en su boca», que es fiel al griego y también evoca con naturalidad el eco de Isaías 53:9.
theological_decisions:
- issue: Eco intertextual de Isaías 53:9 en la descripción de Jesús
  english_pob_reading: Retain wording close to the Greek with 'committed no sin' and 'deceit found in his mouth' to preserve the Isaianic resonance without expanding the claim beyond the text.
  chosen_spanish_reading: 'Mantener una formulación cercana al griego: «no cometió pecado, ni se halló engaño en su boca».'
  alternative_spanish_readings:
  - «nunca pecó, ni habló con engaño»
  - «no hizo pecado alguno, ni hubo engaño en su boca»
  rationale: La frase española conserva la alusión bíblica sin explicarla ni ampliarla. «Se halló» y «en su boca» mantienen el tono escritural y la resonancia con Isaías, mientras que alternativas más explicativas tendrían mayor paráfrasis.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Sin revisiones previas aplicadas en el paquete de origen; el último pase de revisión quedó sin cambios y con acuerdo alto, por lo que este borrador mantiene el mismo sentido base con una formulación española natural y fiel.
  spanish_consistency_notes:
  - 'Se preserva la negación coordinada de dos cláusulas: «no cometió pecado, ni se halló engaño en su boca».'
  - Se evita sustituir el lenguaje de «engaño» por un término más tradicional pero menos preciso como «astucia».
  - La imagen de «boca» se conserva en vez de suavizarla a «labios», para respetar el paralelo con la alusión veterotestamentaria.
  - El sujeto relativo «quien» deja claro que la referencia es a Cristo sin añadir un nombre propio que el verso no repite.
