    issue: '''Fueron destinados'' sobredetermina ἐτέθησαν'
    rationale: El POB inglés eligió 'appointed' precisamente para evitar una formulación más cargada como 'destined'. En español, 'destinados' suena más fuerte y más predeterminista de lo necesario. 'Fueron designados' mantiene el pasivo y la implicación divina sin forzar una lectura teológica más dura.
  - severity: low
