  text: καὶ λίθος προσκόμματος καὶ πέτρα σκανδάλου· οἳ προσκόπτουσιν τῷ λόγῳ ἀπειθοῦντες· εἰς ὃ καὶ ἐτέθησαν.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/008.yaml
  text: and[a], “a stone of stumbling and a rock of offense.” They stumble because they disobey the word[c][b], to which they were also appointed.
  footnotes:
  - marker: a
    text: Or 'a rock of stumbling.' The Greek σκάνδαλον can denote a cause of offense or a cause of falling.
    reason: lexical_alternative
  - marker: b
    text: Or 'They stumble at the word, being disobedient.' The Greek participle may be rendered more literally as 'being disobedient.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for which they were also appointed' or 'to which they were also appointed.' The clause is syntactically compressed, and interpreters differ on whether the appointment refers to their stumbling, their disobedience, or the resulting judgment.
    reason: alternative_reading
