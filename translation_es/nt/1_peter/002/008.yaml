revisions:
- from: y[a], “una piedra de tropiezo y una roca de escándalo”. Tropiezan porque desobedecen la palabra[b][c], a la cual también fueron destinados.
  to: y[a], «una piedra de tropiezo y una roca de escándalo». Tropiezan porque desobedecen la palabra[b], a la cual también fueron designados[c].
  rationale: Se revisa ἐτέθησαν de 'fueron destinados' a 'fueron designados' para seguir más de cerca la decisión léxica y teológica del POB inglés, que procura preservar la tensión del texto sin endurecerla innecesariamente. También se corrige la nota c para ofrecer alternativas reales y explicar mejor la ambigüedad del relativo. Se mantienen las metáforas principales y la estructura del versículo, con puntuación española y comillas angulares.
