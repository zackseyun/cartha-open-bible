translation:
  language: es
  text: y[a], «una piedra de tropiezo y una roca de escándalo». Tropiezan porque desobedecen la palabra[b], a la cual también fueron designados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una roca de tropiezo». El griego σκάνδαλον puede denotar una causa de ofensa o una causa de caída.
    reason: lexical_alternative
  - marker: b
    text: O «tropiezan en la palabra, siendo desobedientes». El participio griego puede verterse más literalmente como «siendo desobedientes».
    reason: lexical_alternative
  - marker: c
    text: O «para lo cual también fueron designados» o «a esto también fueron designados». La cláusula es sintácticamente comprimida, y los intérpretes difieren sobre si la designación se refiere al tropiezo, a la desobediencia o al juicio resultante.
    reason: alternative_reading
lexical_decisions:
- source_word: λίθος προσκόμματος
  english_pob_choice: a stone of stumbling
  chosen_spanish: una piedra de tropiezo
  alternatives_spanish:
  - una piedra de escándalo
  - una piedra que hace tropezar
  lexicon: BDAG
  rationale: Conservo la imagen concreta y el genitivo de relación de forma natural en español; 'tropiezo' mantiene el campo semántico de stumbling sin volver la frase pesada.
- source_word: πέτρα σκανδάλου
  english_pob_choice: a rock of offense
  chosen_spanish: una roca de escándalo
  alternatives_spanish:
  - una roca de tropiezo
  - una roca de ofensa
  lexicon: BDAG
  rationale: '''Escándalo'' reproduce bien el valor de σκάνδαλον como causa de caída/ofensa y mantiene la distinción metafórica respecto de ''piedra de tropiezo''.'
- source_word: προσκόπτουσιν
  english_pob_choice: they stumble
  chosen_spanish: tropiezan
  alternatives_spanish:
  - chocan
  - se detienen al tropezar
  lexicon: BDAG
  rationale: '''Tropiezan'' es la forma más natural en español y conserva la continuidad con la imagen de piedra/tropiezo del primer hemistiquio.'
- source_word: τῷ λόγῳ
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra proclamada
  lexicon: BDAG
  rationale: '''La palabra'' preserva el enlace léxico con el texto anterior y el uso bíblico habitual de λόγος sin ampliar innecesariamente el sentido.'
- source_word: ἀπειθοῦντες
  english_pob_choice: because they disobey
  chosen_spanish: porque desobedecen
  alternatives_spanish:
  - siendo desobedientes
  - porque rehúsan creer
  lexicon: BDAG
  rationale: La construcción causal en español expresa bien la relación con el tropiezo. 'Desobedecen' conserva la fuerza moral-volitiva de ἀπειθέω sin reducirla solo a incredulidad intelectual.
- source_word: εἰς ὃ
  english_pob_choice: to which
  chosen_spanish: a la cual
  alternatives_spanish:
  - para lo cual
  - a esto
  lexicon: BDAG
  rationale: La referencia queda vinculada de manera directa y sobria a la cláusula anterior, como en la revisión inglesa, sin forzar el alcance exacto del pronombre relativo.
- source_word: ἐτέθησαν
  english_pob_choice: they were also appointed
  chosen_spanish: fueron destinados
  alternatives_spanish:
  - fueron puestos
  - fueron asignados
  lexicon: BDAG
  rationale: '''Destinados'' comunica bien el pasivo de τίθημι en este contexto y preserva la implicación de designio sin sobreexplicar la teología del pasaje.'
theological_decisions:
- issue: Alcance de la destinación en εἰς ὃ καὶ ἐτέθησαν
  english_pob_reading: They were also appointed 'to which,' leaving the referent somewhat open and most naturally tied to their stumbling/disobedience in relation to the word.
  chosen_spanish_reading: fueron destinados 'a la cual', manteniendo abierto el referente inmediato y la relación con el tropiezo/desobediencia ante la palabra.
  alternative_spanish_readings:
  - fueron destinados a tropezar
  - fueron destinados a desobedecer
  - fueron destinados al juicio resultante
  rationale: El griego permite más de una resolución del alcance de la cláusula. La redacción conserva la tensión entre responsabilidad humana y designio divino sin resolverla de manera interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó el 'and' antes de 'to which' y aclaró εἰς ὃ como una relación directa con lo precedente. Esta versión española sigue esa línea con 'a la cual', evitando un añadido coordinante y manteniendo la ambigüedad controlada del pasaje.
  spanish_consistency_notes:
  - He usado 'palabra' para λόγος, en continuidad con el contexto petrino y con el uso del audit trail.
  - He mantenido 'tropiezo' / 'escándalo' para conservar la distinción metafórica de λίθος προσκόμματος y πέτρα σκανδάλου.
  - He preferido 'destinados' como equivalente del pasivo de τίθημι para no fijar innecesariamente la discusión doctrinal.
  - He evitado 'Cristo/Mesías' porque el verso no contiene Χριστός ni un título mesiánico explícito.
