translation:
  language: es
  text: Sométanse a toda institución humana por causa del Señor[a], ya sea a un rey como a uno que tiene autoridad[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda creación humana»; el contexto de los siguientes ejemplos —rey y gobernadores— muestra que aquí se trata de instituciones o autoridades cívicas humanas.
    reason: lexical_alternative
  - marker: b
    text: O «como supremo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑποτάγητε
  english_pob_choice: Submit yourselves
  chosen_spanish: Sométanse
  alternatives_spanish:
  - Sométanse ustedes
  - Pónganse bajo sujeción
  lexicon: BDAG
  rationale: El imperativo exhortativo pide una forma natural en español. «Sométanse» conserva el sentido de sujeción voluntaria y evita una paráfrasis excesiva.
- source_word: πάσῃ
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - toda una
  lexicon: BDAG
  rationale: Con κτίσει en singular dativo, «toda» expresa mejor el valor distributivo que un plural genérico.
- source_word: ἀνθρωπίνῃ
  english_pob_choice: human
  chosen_spanish: humana
  alternatives_spanish:
  - hecha por los hombres
  - de los hombres
  lexicon: BDAG
  rationale: «Humana» reproduce de modo conciso que la institución pertenece al orden social humano.
- source_word: κτίσει
  english_pob_choice: institution
  chosen_spanish: institución
  alternatives_spanish:
  - creación
  - criatura
  - ordenanza
  - autoridad
  lexicon: BDAG
  rationale: En este contexto, con la aclaración inmediata sobre rey y gobernantes, «institución» comunica mejor una estructura cívica ordenada por humanos. «Creación» o «criatura» sonarían engañosas en español.
- source_word: διὰ τὸν κύριον
  english_pob_choice: for the Lord’s sake
  chosen_spanish: por causa del Señor
  alternatives_spanish:
  - por el Señor
  - por amor al Señor
  - a causa del Señor
  lexicon: BDAG
  rationale: La preposición con acusativo expresa motivo o razón. «Por causa del Señor» mantiene esa motivación sin forzar una fórmula menos natural.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el título cristiano «Señor», conforme al uso del término en el contexto petrino y al valor confesional del texto.
- source_word: εἴτε
  english_pob_choice: whether
  chosen_spanish: ya sea
  alternatives_spanish:
  - sea que
  - ya sea que
  lexicon: BDAG
  rationale: Introduce la primera rama de la construcción disyuntiva. «Ya sea» es la correspondencia más fluida en español.
- source_word: βασιλεῖ
  english_pob_choice: a king
  chosen_spanish: al rey
  alternatives_spanish:
  - a un rey
  - al monarca
  lexicon: BDAG
  rationale: Aunque el griego es más general, en español «rey» es la equivalencia natural de βασιλεύς; el artículo definido sigue bien el esquema contextual de autoridad civil.
- source_word: ὡς ὑπερέχοντι
  english_pob_choice: as one in authority
  chosen_spanish: como a uno que tiene autoridad
  alternatives_spanish:
  - como al que está por encima
  - como a uno que es supremo
  - como a uno superior
  lexicon: BDAG
  rationale: «ὑπερέχοντι» señala superioridad o posición preeminente. «Que tiene autoridad» comunica funcionalmente esa idea en español sin endurecerla hacia una absolutización de «supremo».
theological_decisions:
- issue: Alcance de κτίσις en contexto cívico
  english_pob_reading: Rendered as 'human institution' rather than 'ordinance of man' or 'human creature.'
  chosen_spanish_reading: «institución humana»
  alternative_spanish_readings:
  - «toda ordenanza humana»
  - «toda criatura humana»
  - «toda creación humana»
  rationale: La secuencia siguiente, con el rey, confirma que el referente es la esfera cívica y no individuos aislados ni la creación en general. «Institución» conserva la idea de orden social sin cargar el texto con una fórmula legalista que el griego no exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia de κύριον
  english_pob_reading: Left as 'Lord' without specifying 'Jesus' or 'God.'
  chosen_spanish_reading: «el Señor»
  alternative_spanish_readings:
  - «Jesús»
  - «Dios»
  rationale: El griego solo dice «el Señor». Mantener ese título evita añadir una precisión no explícita y conserva la amplitud teológica del enunciado.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del griego SBLGNT y del audit trail inglés. Se mantuvo el valor exhortativo de Ὑποτάγητε, se tradujo κτίσει como «institución» por el contexto inmediato de autoridad cívica, y se conservó κύριον como «Señor» sin especificación adicional. No hubo cambios de revisión posteriores en el material de referencia.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento reverente de «Señor» acorde con la terminología POB para κύριος.
  - Se evitó «SEÑOR» en mayúsculas como convención de ocultamiento; el texto usa el título normal «Señor».
  - «Institución» se emplea aquí en sentido cívico-social, no como simple 'creación'.
  - La construcción española conserva la disyunción iniciada por εἴτε y queda lista para continuar en el versículo siguiente.
