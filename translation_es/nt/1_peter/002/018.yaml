translation:
  language: es
  text: Esclavos domésticos[a], sométanse a sus amos con todo respeto[b], no solo a los buenos y gentiles, sino también a los torcidos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sirvientes de la casa». El griego οἰκέται se refiere específicamente a dependientes domésticos dentro de un hogar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con todo temor»; aquí el sentido es de deferencia respetuosa.
    reason: lexical_alternative
  - marker: c
    text: O «ásperos» o «injustos». El griego literalmente significa «torcidos» o «retorcidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκέται
  english_pob_choice: household servants
  chosen_spanish: siervos domésticos
  alternatives_spanish:
  - esclavos domésticos
  - sirvientes
  lexicon: BDAG
  rationale: οἰκέτης se refiere específicamente a dependientes domésticos dentro de una casa. «Siervos domésticos» conserva el ámbito doméstico y el estatus subordinado sin borrar la relación de dependencia. «Esclavos domésticos» sería posible, pero en español puede sonar más fuerte que la decisión inglesa auditada; «sirvientes» suaviza demasiado la fuerza social del término.
- source_word: ὑποτασσόμενοι
  english_pob_choice: submit yourselves
  chosen_spanish: sométanse
  alternatives_spanish:
  - estén sujetos
  - sujétense
  lexicon: BDAG
  rationale: El participio tiene valor exhortativo en el contexto. «Sométanse» reproduce bien la fuerza imperativa y el tono parenético. «Estén sujetos» es viable, pero menos natural en español actual; «sujétense» suena más marcado o reflexivo que el contexto requiere.
- source_word: ἐν παντὶ φόβῳ
  english_pob_choice: with all respect
  chosen_spanish: con todo respeto
  alternatives_spanish:
  - con todo temor
  - con toda reverencia
  lexicon: BDAG
  rationale: φόβος puede significar temor, reverencia o respeto según el contexto. Aquí el sentido no parece ser terror emocional, sino una actitud de deferencia. «Con todo respeto» comunica ese valor en español claro y digno; «con todo temor» podría malentenderse como miedo servil.
- source_word: δεσπόταις
  english_pob_choice: masters
  chosen_spanish: amos
  alternatives_spanish:
  - señores
  - dueños
  lexicon: BDAG
  rationale: δεσπότης designa a quien ejerce autoridad sobre dependientes domésticos. «Amo» es el equivalente español más directo para la relación social del texto. «Señores» puede confundirse con tratamiento honorífico o con κύριος; «dueños» reduce el matiz relacional a mera propiedad.
- source_word: ἀγαθοῖς
  english_pob_choice: good
  chosen_spanish: buenos
  alternatives_spanish:
  - bondadosos
  - benignos
  lexicon: BDAG
  rationale: ἀγαθός significa ampliamente «bueno». En español, «buenos» mantiene la evaluación moral simple y empareja de forma natural con el segundo adjetivo. «Bondadosos» y «benignos» estrechan demasiado el campo semántico.
- source_word: ἐπιεικέσιν
  english_pob_choice: gentle
  chosen_spanish: mansos
  alternatives_spanish:
  - amables
  - considerados
  - moderados
  lexicon: BDAG
  rationale: ἐπιεικής expresa gentileza, consideración o razonabilidad. «Mansos» funciona bien en español eclesiástico como cualidad de trato no violento ni áspero; además equilibra «buenos» y contrasta con «torcidos». «Amables» o «considerados» son posibles, pero menos compactos y menos cercanos al registro bíblico.
- source_word: σκολιοῖς
  english_pob_choice: crooked
  chosen_spanish: torcidos
  alternatives_spanish:
  - ásperos
  - injustos
  - perversos
  lexicon: BDAG
  rationale: σκολιός significa literalmente «torcido» o «curvo» y puede describir personas moralmente retorcidas o injustas. «Torcidos» preserva la metáfora y la ambigüedad controlada del original. Se evitan opciones como «ásperos» o «injustos» porque estrechan indebidamente el término; «perversos» añade una carga moral más fuerte que la del griego literal.
theological_decisions:
- issue: Cómo reflejar la clase doméstica específica sin suavizar ni sobrerrepresentar la condición social
  english_pob_reading: Use 'household servants' for οἰκέται and 'masters' for δεσπόταις
  chosen_spanish_reading: Usar «siervos domésticos» y «amos»
  alternative_spanish_readings:
  - esclavos domésticos ... amos
  - sirvientes ... amos
  rationale: El versículo se dirige a un grupo doméstico dependiente concreto. «Siervos domésticos» conserva la referencia al ámbito de la casa y la subordinación real, sin reemplazar el término por uno más general ni introducir una paráfrasis menos precisa. «Amos» refleja con naturalidad δεσπόταις en esta relación social.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5; tabla de términos conflictivos sobre δοῦλος según contexto
- issue: Si φόβος debe traducirse como temor literal o con un equivalente contextual
  english_pob_reading: Render ἐν παντὶ φόβῳ as 'with all respect'
  chosen_spanish_reading: Traducir ἐν παντὶ φόβῳ como «con todo respeto»
  alternative_spanish_readings:
  - con todo temor
  - con toda reverencia
  rationale: El contexto exhorta a una postura de deferencia obediente, no necesariamente a miedo emocional. «Con todo respeto» preserva el efecto ético y evita sugerir que el apóstol ordena un temor servil como tal. La opción mantiene la tensión semántica señalada en el audit trail inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El borrador sigue la revisión auditada que prefirió una forma imperativa natural para ὑποτασσόμενοι; por eso se usa «sométanse» en vez de una forma participial más pesada. También se conserva la decisión de no suavizar φόβος a un simple «temor», sino rendir su fuerza contextual como respeto/deferencia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, aunque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se usa «amos» para δεσπόταις, en coherencia con el registro social del texto y con la diferenciación respecto de δοῦλος, que en este versículo no aparece.
  - «Torcidos» conserva la metáfora literal de σκολιός y deja abierta la evaluación moral implícita sin cerrarla por adelantado.
