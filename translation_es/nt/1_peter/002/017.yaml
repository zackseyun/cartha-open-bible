translation:
  language: es
  text: Honren a todos, amen a la hermandad, teman a Dios, honren al rey[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el emperador»; la palabra griega es «rey», pero en el contexto romano de Pedro probablemente se refiere al emperador.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντας
  english_pob_choice: everyone
  chosen_spanish: a todos
  alternatives_spanish:
  - a toda persona
  - a todos los demás
  lexicon: BDAG
  rationale: El acusativo plural de πᾶς funciona aquí de manera sustantivada y con alcance universal. «A todos» es natural en español, breve y fiel al sentido inclusivo sin añadir matices innecesarios.
- source_word: τιμήσατε
  english_pob_choice: honor
  chosen_spanish: honren
  alternatives_spanish:
  - muestren honor a
  - respeten
  lexicon: BDAG
  rationale: El aoristo imperativo de τιμάω pide una acción puntual o global de honrar. «Honren» conserva la fuerza lexical y mantiene el vínculo con el segundo τιμᾶτε de la misma cláusula.
- source_word: ἀδελφότητα
  english_pob_choice: the brotherhood
  chosen_spanish: la hermandad
  alternatives_spanish:
  - la fraternidad
  - la comunidad de creyentes
  - la hermandad de creyentes
  lexicon: BDAG
  rationale: ἀδελφότης nombra la comunidad de hermanos en la fe. «Hermandad» es una equivalencia directa y comprensible en español; preserva el rasgo familiar del término sin neutralizarlo con una paráfrasis más larga.
- source_word: ἀγαπᾶτε
  english_pob_choice: love
  chosen_spanish: amen
  alternatives_spanish:
  - sigan amando
  - muestren amor a
  lexicon: BDAG
  rationale: El presente imperativo de ἀγαπάω se vierte con el imperativo simple «amen», que en español comunica bien la exhortación continua sin forzar un aspecto verbal explícito.
- source_word: θεὸν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: El objeto directo de φοβεῖσθε es θεός; en español la preposición «a» es necesaria con objeto personal definido. Se mantiene el nombre usual «Dios».
- source_word: φοβεῖσθε
  english_pob_choice: fear
  chosen_spanish: teman
  alternatives_spanish:
  - reverencien
  - tengan temor de
  lexicon: BDAG
  rationale: φοβέομαι expresa temor/reverencia, pero la lectura de POB preserva el verbo fuerte «fear». «Teman» mantiene esa tensión teológica mejor que «reverencien», que suavizaría el contraste con el honor debido al rey.
- source_word: βασιλέα
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al emperador
  lexicon: BDAG
  rationale: βασιλεύς significa literalmente «rey». Aunque en el contexto romano pueda aludir al emperador, la traducción principal conserva el término griego básico y deja la posible identificación histórica para nota.
- source_word: τιμᾶτε
  english_pob_choice: honor
  chosen_spanish: honren
  alternatives_spanish:
  - muestren honor a
  - respeten
  lexicon: BDAG
  rationale: Se traduce igual que τιμήσατε para conservar el paralelismo léxico del griego. «Honren» es natural y mantiene la relación entre los dos mandatos de τιμάω.
theological_decisions:
- issue: Diferencia entre la respuesta debida a Dios y la debida al gobernante civil
  english_pob_reading: Render φοβεῖσθε as 'fear' and τιμάω as 'honor,' preserving the stronger response for God and the lesser response for the king.
  chosen_spanish_reading: Conservar «teman» para Dios y «honren» para el rey, manteniendo la distinción de intensidad y evitando suavizar el mandato dirigido a Dios.
  alternative_spanish_readings:
  - «reverencien» para Dios y «respeten» para el rey
  - «tengan temor de Dios» y «den honor al rey»
  rationale: 'El verso contrasta cuatro deberes: honrar a todos, amar a la hermandad, temer a Dios y honrar al rey. La versión española debe preservar esa jerarquía sin resolverla en una formulación más débil o más interpretativa.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y el griego SBLGNT, sin cambios revisionales aplicados en el antecedente. Se preserva el paralelismo léxico de τιμάω y la tensión entre «teman» y «honren».
  spanish_consistency_notes:
  - Se usa «hermandad» para ἀδελφότης, en línea con el sentido corporativo de la comunidad creyente.
  - Se conserva «teman» para φοβεῖσθε para no diluir el contraste con el honor debido al rey.
  - Se mantiene «honren» para ambas formas de τιμάω para reflejar el paralelismo del griego.
  - 'El artículo y la preposición en español se ajustan a la sintaxis natural: «a todos», «a Dios», «al rey».'
