translation:
  language: es
  text: 'Porque esto es gracia: si alguien, por conciencia de Dios[a][b], soporta aflicciones mientras sufre injustamente.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por ser consciente de Dios»; «estando consciente de Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por conciencia ante Dios». La expresión también puede entenderse como una conciencia orientada hacia Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - un acto grato
  - algo encomiable
  - favor
  lexicon: BDAG
  rationale: En este contexto, χάρις funciona como predicado evaluativo. «Gracia» conserva el vínculo léxico con el uso petrino y neotestamentario, y deja abierta la tensión semántica entre algo grato, favorable o digno de aprobación. «Algo encomiable» o «favor» explican mejor el efecto, pero pierden la conexión directa con el término original.
- source_word: διὰ συνείδησιν θεοῦ
  english_pob_choice: because of consciousness of God
  chosen_spanish: por conciencia de Dios
  alternatives_spanish:
  - por ser consciente de Dios
  - por conciencia ante Dios
  - porque está consciente de Dios
  lexicon: BDAG
  rationale: La expresión es compacta y ambigua. «Conciencia de Dios» mantiene la fuerza de συνείδησις sin reducirla de inmediato a una sola paráfrasis moral. La opción «por conciencia ante Dios» explicita la dirección referencial, pero añade una interpretación más marcada. «Por ser consciente de Dios» es natural, aunque menos sustantiva y menos cercana a la forma del griego.
- source_word: ὑποφέρει
  english_pob_choice: endures
  chosen_spanish: soporta
  alternatives_spanish:
  - aguanta
  - resiste
  - persevera bajo
  lexicon: BDAG
  rationale: Aquí ὑποφέρω expresa aguante paciente bajo aflicción. «Soporta» es claro, natural y conserva el matiz de resistencia ante la carga. «Persevera bajo» o «aguanta» son posibles, pero suenan más marcados o menos fluidos en español.
- source_word: λύπας
  english_pob_choice: sorrows
  chosen_spanish: tristezas
  alternatives_spanish:
  - dolores
  - penas
  - aflicciones
  lexicon: BDAG
  rationale: λύπαι denota experiencias de dolor o aflicción. «Tristezas» comunica bien el sufrimiento interior y externo sin estrechar el sentido a dolor físico. «Penas» y «aflicciones» también son viables, pero «tristezas» resulta más natural y mantiene amplitud semántica.
- source_word: πάσχων ἀδίκως
  english_pob_choice: while suffering unjustly
  chosen_spanish: mientras sufre injustamente
  alternatives_spanish:
  - mientras padece injustamente
  - aunque sufre injustamente
  - sufriendo injustamente
  lexicon: BDAG
  rationale: El participio con el adverbio indica circunstancia o modo. «Mientras sufre injustamente» reproduce esa relación de manera clara y directa. «Padece injustamente» es más formal, pero menos natural; «sufriendo injustamente» suena más pesado en español.
- source_word: τις
  english_pob_choice: someone
  chosen_spanish: alguien
  alternatives_spanish:
  - una persona
  - cualquiera
  lexicon: BDAG
  rationale: τις es un indefinido singular. «Alguien» preserva la generalidad sin cargar el texto con un referente masculino o demasiado abstracto.
- source_word: τοῦτο γὰρ
  english_pob_choice: For this
  chosen_spanish: Porque esto
  alternatives_spanish:
  - Pues esto
  - Porque esto es
  lexicon: BDAG
  rationale: τοῦτο señala la afirmación siguiente como base de la evaluación, y γάρ introduce explicación. «Porque esto» conserva esa relación discursiva de forma breve y natural en español.
theological_decisions:
- issue: Valor de χάρις en el contexto
  english_pob_reading: Rendered as 'grace' rather than an interpretive paraphrase like 'commendable' or 'finds favor with God.'
  chosen_spanish_reading: Se traduce como «gracia», no como «loable» ni «encuentra favor con Dios».
  alternative_spanish_readings:
  - Esto es loable
  - Esto es un favor
  - Esto encuentra favor con Dios
  rationale: El griego no dice explícitamente «con Dios» en esta cláusula, ni obliga a convertir la frase en una paráfrasis explicativa. «Gracia» preserva la tensión lexical y permite que el lector perciba el eco teológico de algo aprobado o favorable, sin resolverlo prematuramente.
  doctrine_reference: Principios de traducción §1, §3, §6
- issue: Sentido de συνείδησις θεοῦ
  english_pob_reading: 'Objective/reference sense: awareness of God, expressed as ''consciousness of God.'''
  chosen_spanish_reading: Sentido de conciencia orientada a Dios, expresado como «conciencia de Dios».
  alternative_spanish_readings:
  - conciencia ante Dios
  - ser consciente de Dios
  - conciencia hacia Dios
  rationale: La expresión debe conservar la ambigüedad productiva entre conciencia moral y conciencia dirigida a Dios. «Conciencia de Dios» retiene esa tensión sin cerrarla en una sola lectura; «ante Dios» aclara la orientación, pero interpreta más de lo que el verso dice explícitamente.
  doctrine_reference: Principios de traducción §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que reordenó la frase causal para evitar ambigüedad y mantener explícita la relación entre la conciencia de Dios y el acto de soportar. En español se reflejó esa relación al colocar «por conciencia de Dios» antes del verbo principal.
  spanish_consistency_notes:
  - Se mantuvo «gracia» para χάρις, siguiendo la decisión terminológica documentada.
  - Se conservó «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se evitó «Señor» o un equivalente masking para el nombre divino, porque este versículo no lo requiere.
  - Se eligió una formulación natural en español sin perder la ambigüedad de συνείδησις θεοῦ.
