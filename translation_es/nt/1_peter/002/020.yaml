translation:
  language: es
  text: Porque ¿qué mérito hay si, cuando pecan y son golpeados, ustedes lo soportan? Pero si, cuando hacen el bien y padecen, lo soportan, esto es gracia con Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esto encuentra favor con Dios» o «esto es encomiable delante de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κλέος
  english_pob_choice: credit
  chosen_spanish: honor
  alternatives_spanish:
  - crédito
  - elogio
  - renombre
  lexicon: BDAG
  rationale: En español, «crédito» en este contexto resulta menos natural y puede sonar comercial; «honor» comunica la idea de reconocimiento o mérito concedido por la conducta, aunque no agota toda la gama de κλέος. Se conserva así la pregunta retórica sobre qué clase de aprobación merece la resistencia ante un castigo debido.
- source_word: ἁμαρτάνοντες
  english_pob_choice: you sin
  chosen_spanish: pecan
  alternatives_spanish:
  - están pecando
  - hacen mal
  lexicon: BDAG
  rationale: El participio señala cometer pecado, no solo un error general. «Pecan» mantiene la fuerza moral y la correspondencia directa con el verbo griego.
- source_word: κολαφιζόμενοι
  english_pob_choice: you are beaten
  chosen_spanish: son golpeados
  alternatives_spanish:
  - son golpeados con el puño
  - son abofeteados
  - son maltratados
  lexicon: BDAG
  rationale: El verbo alude a ser golpeado físicamente. «Son golpeados» es claro y natural en español; las opciones más literales o más idiomáticas estrechan o desplazan el matiz sin necesidad.
- source_word: ὑπομενεῖτε
  english_pob_choice: you endure
  chosen_spanish: lo soportan
  alternatives_spanish:
  - perseveran
  - resisten
  - aguantan
  lexicon: BDAG
  rationale: «Soportan» conserva la idea de mantenerse firmes bajo aflicción, sin importar un matiz excesivamente heroico o religioso. Se repite en ambas cláusulas para preservar la repetición del griego.
- source_word: ἀγαθοποιοῦντες
  english_pob_choice: doing good
  chosen_spanish: hacen el bien
  alternatives_spanish:
  - practican el bien
  - obran bien
  - hacen lo bueno
  lexicon: BDAG
  rationale: La expresión griega es amplia, pero en español «hacer el bien» es la forma más directa y natural para acciones beneficiosas o correctas.
- source_word: πάσχοντες
  english_pob_choice: suffering
  chosen_spanish: padecen
  alternatives_spanish:
  - sufren
  - son afligidos
  - experimentan sufrimiento
  lexicon: BDAG
  rationale: «Padecen» comunica sufrimiento padecido, con un registro sobrio y bíblico, y evita que la frase suene excesivamente general.
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - aprobación
  - mérito
  lexicon: BDAG
  rationale: Se mantiene «gracia» porque el término tiene peso teológico y POB lo retiene en inglés. A la vez, en contexto el sentido incluye aceptación o favor divino; por eso la formulación se completa con la referencia relacional que sigue.
- source_word: παρὰ θεῷ
  english_pob_choice: with God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - con Dios
  - ante Dios
  - en la estimación de Dios
  lexicon: BDAG
  rationale: La preposición con dativo expresa relación o juicio divino. «Delante de Dios» conserva la idea de estar en su presencia o evaluación, y funciona bien en español bíblico contemporáneo.
theological_decisions:
- issue: Valor de χάρις en la clausura del versículo
  english_pob_reading: The English POB preserves 'grace' while footnoting 'favor with God' / 'commendable before God.'
  chosen_spanish_reading: Se traduce «gracia» en el texto principal y se anota que también puede entenderse como favor o algo encomiable delante de Dios.
  alternative_spanish_readings:
  - favor de Dios
  - algo encomiable delante de Dios
  rationale: La frase no debe despojarse de su carga teológica, pero el contexto apunta a aprobación divina. Mantener «gracia» preserva la transparencia lexical; la nota evita resolver en exceso la ambigüedad semántica.
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió construcciones más naturales y cambió la relación espacial de παρὰ θεῷ a 'with God'. En español se optó por «delante de Dios», que comunica la misma idea relacional sin forzar una colocación menos idiomática. También se mantuvo la repetición de ὑπομενεῖτε con el mismo verbo («soportan») para reflejar el paralelismo del griego.
  spanish_consistency_notes:
  - Se conserva una distinción entre pecado, violencia física, sufrimiento y perseverancia, sin fusionar los participios.
  - «Gracia» se mantiene como término principal para χάρις, con nota explicativa sobre el sentido contextual de favor/aprobación.
  - Se usa un registro bíblico contemporáneo, evitando arcaísmos innecesarios y sin perder la gravedad retórica del versículo.
