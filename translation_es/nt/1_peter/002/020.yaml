  text: ποῖον γὰρ κλέος εἰ ἁμαρτάνοντες καὶ κολαφιζόμενοι ὑπομενεῖτε; ἀλλ’ εἰ ἀγαθοποιοῦντες καὶ πάσχοντες ὑπομενεῖτε, τοῦτο χάρις παρὰ θεῷ.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/020.yaml
  text: For what credit is it if[a], when you sin and are beaten, you endure? But if, when you do good and suffer, you endure, this is grace with God.
