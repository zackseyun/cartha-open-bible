translation:
  language: es
  text: Él mismo llevó nuestros pecados en su cuerpo sobre el árbol[a], para que, habiendo muerto a los pecados, vivamos para la justicia[c][b]. Por su herida ustedes fueron sanados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sobre la cruz'; el griego dice 'sobre el árbol', preservando ξύλον y probablemente aludiendo a Deuteronomio 21:23.
    reason: alternative_reading
  - marker: b
    text: O 'por su azote' o 'por su contusión'; el sustantivo singular recuerda Isaías 53:5.
    reason: lexical_alternative
  - marker: c
    text: La sanidad aquí se expresa en sentido amplio; en el contexto se vincula con los pecados y la justicia, sin limitarse ni a la curación física ni a la espiritual.
    reason: cross_reference
lexical_decisions:
- source_word: ἀνήνεγκεν
  english_pob_choice: bore
  chosen_spanish: llevó
  alternatives_spanish:
  - soportó
  - cargó con
  - ofreció
  lexicon: BDAG
  rationale: En este contexto sacrificial y con el objeto directo 'nuestros pecados', 'llevó' comunica la carga real de los pecados sin añadir una formulación técnica ajena al texto. En español, 'soportó' puede sonar más abstracto, y 'cargó con' es posible pero algo más explicativo.
- source_word: ἐν τῷ σώματι αὐτοῦ
  english_pob_choice: in his body
  chosen_spanish: en su cuerpo
  alternatives_spanish:
  - en su propio cuerpo
  lexicon: BDAG
  rationale: La frase se rinde de manera directa para conservar la concreción corporal del sufrimiento. 'Su propio cuerpo' es válida, pero 'en su cuerpo' ya transmite con claridad la referencia personal sin sobrecargar el español.
- source_word: ἐπὶ τὸ ξύλον
  english_pob_choice: on the tree
  chosen_spanish: sobre el árbol
  alternatives_spanish:
  - sobre la madera
  - sobre la cruz
  lexicon: BDAG
  rationale: Se conserva el valor literal de ξύλον como 'árbol', evitando sustituirlo por 'cruz' en el texto principal. 'Sobre el árbol' mantiene la forma de la fuente y su eco escritural, aunque en español suene más marcado que 'sobre la cruz'.
- source_word: ταῖς ἁμαρτίαις ἀπογενόμενοι
  english_pob_choice: having died to sins
  chosen_spanish: habiendo muerto a los pecados
  alternatives_spanish:
  - habiendo cesado de los pecados
  - habiendo quedado separados de los pecados
  lexicon: BDAG
  rationale: La construcción expresa una ruptura decisiva con el pecado. 'Habiendo muerto a los pecados' es idiomática y conserva el plural griego; 'muerto al pecado' sería más tradicional, pero aquí se preserva el plural de la fuente.
- source_word: τῇ δικαιοσύνῃ
  english_pob_choice: to righteousness
  chosen_spanish: para la justicia
  alternatives_spanish:
  - para la rectitud
  - a la justicia
  lexicon: BDAG
  rationale: Aunque 'rectitud' puede funcionar, 'justicia' es el término más natural y fiel al campo semántico de δικαιοσύνη en este contexto ético. 'Para la justicia' refleja bien la dirección de la vida que el texto expresa.
- source_word: μώλωπι
  english_pob_choice: wound
  chosen_spanish: herida
  alternatives_spanish:
  - golpe
  - moretón
  - llaga
  lexicon: BDAG
  rationale: '''Herida'' es la opción natural en español y conserva el singular. Evita tanto la arcaización de ''azote/llaga'' como una reducción demasiado física o coloquial.'
- source_word: ἰάθητε
  english_pob_choice: you were healed
  chosen_spanish: fueron sanados
  alternatives_spanish:
  - fueron curados
  - recibieron sanidad
  lexicon: BDAG
  rationale: '''Fueron sanados'' mantiene el pasivo y la amplitud del término sin reducirlo a una curación exclusivamente física. ''Recibieron sanidad'' sería más interpretativo y menos directo.'
- source_word: αὐτὸς
  english_pob_choice: himself
  chosen_spanish: Él mismo
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: 'El pronombre enfático se expresa de forma natural al inicio de la cláusula: ''Él mismo''. Así se conserva el énfasis del griego y la fluidez del español.'
theological_decisions:
- issue: Alcance de la sanidad final
  english_pob_reading: Retain 'you were healed' without specifying physical-only or spiritual-only healing.
  chosen_spanish_reading: Conservar 'fueron sanados' sin limitar la sanidad a lo físico o a lo espiritual.
  alternative_spanish_readings:
  - fueron curados físicamente
  - recibieron sanidad espiritual
  - fueron restaurados integralmente
  rationale: El contexto inmediato habla de pecados, justicia y la obra de Cristo, por lo que la sanidad está vinculada a la salvación; aun así, el texto no reduce la expresión a una sola dimensión. Mantener la amplitud evita resolver una tensión que el versículo deja abierta.
  doctrine_reference: Preservar la tensión teológica sin cerrar el sentido más allá del texto.
- issue: Rendering of ξύλον
  english_pob_reading: Use 'tree' rather than 'cross' in the main text.
  chosen_spanish_reading: Usar 'árbol' en el texto principal y no 'cruz'.
  alternative_spanish_readings:
  - cruz
  - madero
  rationale: La fuente griega dice ξύλον, no σταυρός. 'Árbol' preserva la forma original y su posible eco de Deuteronomio 21:23, mientras que 'cruz' explicita más de lo que el griego dice directamente.
  doctrine_reference: Primacía del lenguaje original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto quedó confirmado como estable, con alta concordancia entre evaluaciones.
  spanish_consistency_notes:
  - Se mantiene 'justicia' para δικαιοσύνη, conforme al valor ético del pasaje.
  - Se conserva 'árbol' para ξύλον, evitando la sustitución interpretativa por 'cruz' en el texto principal.
  - Se usa el plural 'pecados' en la cláusula causal para reflejar el plural griego.
  - La nota sobre sanidad preserva la amplitud semántica sin cerrar el alcance del verbo.
  - El énfasis de αὐτός se expresa con 'Él mismo' en posición inicial para naturalidad en español.
