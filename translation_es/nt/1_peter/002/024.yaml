  text: ὃς τὰς ἁμαρτίας ἡμῶν αὐτὸς ἀνήνεγκεν ἐν τῷ σώματι αὐτοῦ ἐπὶ τὸ ξύλον, ἵνα ταῖς ἁμαρτίαις ἀπογενόμενοι τῇ δικαιοσύνῃ ζήσωμεν· οὗ τῷ ⸀μώλωπι ἰάθητε.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/024.yaml
  text: He himself bore our sins in his body on the tree[a], so that, having died to sins, we might live to righteousness[c][b]. By his wound you were healed.
  footnotes:
  - marker: a
    text: Or 'on the cross'; Greek 'on the tree,' preserving the wording of ξύλον and likely echoing Deuteronomy 21:23.
    reason: alternative_reading
  - marker: b
    text: Or 'By his stripe' or 'By his bruise'; the singular noun echoes Isaiah 53:5.
    reason: lexical_alternative
  - marker: c
    text: The healing here is expressed broadly; in context it is tied to sins and righteousness, without limiting the sense to either physical or spiritual healing alone.
    reason: cross_reference
