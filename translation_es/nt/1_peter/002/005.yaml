translation:
  language: es
  text: Ustedes mismos también, como piedras vivas[a], están siendo edificados como casa espiritual, para ser[b] un sacerdocio santo, para ofrecer sacrificios espirituales aceptables a Dios por medio de Jesús Mesías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como piedras vivas».
    reason: lexical_alternative
  - marker: b
    text: O «para un sacerdocio santo»; el griego puede expresar meta o resultado.
    reason: alternative_reading
  - marker: c
    text: 'Griego: «Jesús Cristo»; aquí se traduce «Mesías» porque Χριστός funciona como título.'
    reason: theological_note
lexical_decisions:
- source_word: καὶ αὐτοὶ
  english_pob_choice: you yourselves also
  chosen_spanish: Ustedes mismos también
  alternatives_spanish:
  - también ustedes
  - ustedes también mismos
  lexicon: BDAG
  rationale: Conserva el énfasis del pronombre αὐτοὶ y el valor aditivo de καί. En español, “ustedes mismos también” suena natural y mantiene la fuerza enfática sin perder la inclusión del lector plural.
- source_word: ὡς λίθοι ζῶντες
  english_pob_choice: as living stones
  chosen_spanish: como piedras vivas
  alternatives_spanish:
  - como piedras vivientes
  - cual piedras vivas
  lexicon: BDAG
  rationale: “Como” reproduce la comparación de ὡς. “Piedras vivas” mantiene la imagen y el contraste retórico con las piedras inertes; “vivas” es más natural que un calco más pesado.
- source_word: οἰκοδομεῖσθε
  english_pob_choice: are being built up
  chosen_spanish: están siendo edificados
  alternatives_spanish:
  - son edificados
  - están siendo construidos
  lexicon: BDAG
  rationale: El presente pasivo indica acción continua recibida por los creyentes. “Están siendo edificados” conserva la pasiva y el progreso, y “edificados” mantiene el lenguaje bíblico de construcción sin añadir agente explícito.
- source_word: οἶκος πνευματικὸς
  english_pob_choice: a spiritual house
  chosen_spanish: casa espiritual
  alternatives_spanish:
  - una casa espiritual
  - un hogar espiritual
  lexicon: BDAG
  rationale: “Casa espiritual” sigue de cerca el sustantivo oἶκος y el adjetivo πνευματικός. Omitir el artículo indefinido tras “como” hace la frase más fluida en español sin cambiar el sentido.
- source_word: εἰς ἱεράτευμα ἅγιον
  english_pob_choice: into a holy priesthood
  chosen_spanish: para ser un sacerdocio santo
  alternatives_spanish:
  - para un sacerdocio santo
  - hacia un sacerdocio santo
  lexicon: BDAG
  rationale: εἰς puede expresar meta o resultado. En español, “para ser” comunica bien ese propósito/resultante y evita una construcción dura con “en/into”. “Sacerdocio” preserva el sentido corporativo de ἱεράτευμα, no simplemente sacerdotes individuales.
- source_word: ἀνενέγκαι
  english_pob_choice: to offer
  chosen_spanish: para ofrecer
  alternatives_spanish:
  - para presentar
  - para llevar
  lexicon: BDAG
  rationale: En contexto sacrificial, ἀναφέρω significa ofrecer. “Para ofrecer” es la forma más natural y precisa en español para el aoristo infinitivo de propósito.
- source_word: πνευματικὰς θυσίας
  english_pob_choice: spiritual sacrifices
  chosen_spanish: sacrificios espirituales
  alternatives_spanish:
  - ofrendas espirituales
  - sacrificios del Espíritu
  lexicon: BDAG
  rationale: La traducción directa preserva la imagen cultual sin especificar más de lo que el texto dice. “Espirituales” mantiene el adjetivo πνευματικός y sugiere la esfera/qualidad espiritual de las ofrendas.
- source_word: εὐπροσδέκτους θεῷ
  english_pob_choice: acceptable to God
  chosen_spanish: agradables a Dios
  alternatives_spanish:
  - aceptables a Dios
  - bien recibidos por Dios
  lexicon: BDAG
  rationale: “Agradables a Dios” es una equivalencia natural en español para el lenguaje de aceptación sacrificial. Aunque “aceptables” es literal, “agradables” comunica mejor la idea cultual de aceptación sin perder fidelidad.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: through Jesus Messiah
  chosen_spanish: por medio de Jesús Mesías
  alternatives_spanish:
  - por medio de Jesús Cristo
  - a través de Jesús Mesías
  lexicon: BDAG
  rationale: διά con genitivo indica mediación o medio. Se conserva “Mesías” porque Χριστός funciona aquí como título, conforme al criterio del proyecto; “por medio de” expresa bien la mediación en español.
theological_decisions:
- issue: Traducción de Χριστοῦ como título mesiánico
  english_pob_reading: through Jesus Messiah
  chosen_spanish_reading: por medio de Jesús Mesías
  alternative_spanish_readings:
  - por medio de Jesús Cristo
  rationale: El contexto presenta Χριστός como título, no como mero apellido devocional. Traducirlo como “Mesías” conserva la referencia mesiánica y sigue la política del proyecto sin alterar la cristología.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Mesías (where title; Cristo where name-like)'
- issue: Relación entre οἶκος πνευματικός y εἰς ἱεράτευμα ἅγιον
  english_pob_reading: as a spiritual house, into a holy priesthood
  chosen_spanish_reading: como casa espiritual, para ser un sacerdocio santo
  alternative_spanish_readings:
  - como casa espiritual hacia un sacerdocio santo
  - como casa espiritual, en un sacerdocio santo
  rationale: El griego permite entender εἰς como meta/resultado. El español “para ser” mantiene esa relación sin forzar una secuencia ontológica rígida entre dos imágenes paralelas; preserva la tensión entre identidad y propósito.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Agencia en οἰκοδομεῖσθε
  english_pob_reading: are being built up
  chosen_spanish_reading: están siendo edificados
  alternative_spanish_readings:
  - son edificados
  - se están edificando
  rationale: La forma pasiva se conserva para no atribuir al sujeto una autoedificación. La frase deja implícito el agente divino, como en el griego, y respeta la acción recibida por la comunidad.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto español sigue la última revisión del audit trail en los puntos clave: conserva la pasiva de οἰκοδομεῖσθε, refleja εἰς con una meta/resultante natural en español, y restaura Χριστός como Mesías según la política doctrinal del proyecto. También evita resolver de forma excesiva la relación entre “casa espiritual” y “sacerdocio santo”, manteniendo el matiz de propósito del griego.'
  spanish_consistency_notes:
  - Se usa “Dios” para θεῷ, de acuerdo con el estándar del proyecto.
  - Se mantiene “Mesías” para Χριστός cuando funciona como título en la fórmula cristológica.
  - “Sacerdocio santo” conserva el valor colectivo de ἱεράτευμα.
  - La pasiva “están siendo edificados” evita sugerir una acción meramente reflexiva del sujeto.
  - El registro es moderno y reverente, apto para lectura eclesial amplia.
