translation:
  language: es
  text: Pues para esto fueron llamados, ya que el Mesías también sufrió por ustedes, dejándoles un ejemplo[a] para que sigan sus pasos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un patrón» o «una copia para trazar»; el término griego alude a un modelo puesto delante de aprendices para copiarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τοῦτο
  english_pob_choice: to this
  chosen_spanish: para esto
  alternatives_spanish:
  - a esto
  - para este propósito
  lexicon: BDAG
  rationale: La expresión apunta al fin o propósito de la llamada anterior al sufrimiento injusto. En español, «para esto» comunica con naturalidad el valor final sin perder la referencia deíctica al contexto inmediato.
- source_word: ἐκλήθητε
  english_pob_choice: you were called
  chosen_spanish: fueron llamados
  alternatives_spanish:
  - han sido llamados
  - fueron convocados
  lexicon: BDAG
  rationale: El pasivo de καλέω en contexto teológico conserva la idea de una llamada divina. «Fueron llamados» mantiene ese sentido y suena sobrio en español bíblico contemporáneo.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: ya que
  alternatives_spanish:
  - porque
  - pues
  lexicon: BDAG
  rationale: Introduce la base o explicación de la llamada. «Ya que» expresa bien la relación causal en un registro natural y evita una repetición pesada de «porque» al inicio de la frase.
- source_word: Χριστὸς
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός como «Mesías», de acuerdo con la política terminológica del proyecto. Aquí funciona como título y no como nombre fijo litúrgico.
- source_word: ἔπαθεν
  english_pob_choice: suffered
  chosen_spanish: sufrió
  alternatives_spanish:
  - padeció
  - sufrió el dolor
  lexicon: BDAG
  rationale: El aoristo de πάσχω se traduce de forma directa como «sufrió». No se amplía el contenido del padecimiento, pues el versículo no especifica su forma.
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - a favor de ustedes
  - en lugar de ustedes
  - por su bien
  lexicon: BDAG
  rationale: ὑπέρ con genitivo expresa aquí un sufrimiento en beneficio de los lectores, con posible resonancia sustitutiva. «Por ustedes» mantiene amplitud semántica sin cerrar el sentido a una fórmula doctrinal más estrecha.
- source_word: ὑμῖν ὑπολιμπάνων
  english_pob_choice: leaving you
  chosen_spanish: dejándoles
  alternatives_spanish:
  - dejando para ustedes
  - dejándoles a ustedes
  lexicon: BDAG
  rationale: El participio modifica al Mesías y presenta lo que queda para los destinatarios. «Dejándoles» es idiomático y conserva la idea de algo provisto o dejado como modelo.
- source_word: ὑπογραμμὸν
  english_pob_choice: an example
  chosen_spanish: un ejemplo[a]
  alternatives_spanish:
  - un patrón
  - un modelo
  - una copia para trazar
  lexicon: BDAG
  rationale: Se opta por «ejemplo» en el texto principal por claridad y fluidez. La nota preserva la imagen pedagógica concreta del término, que puede aludir a un modelo de escritura para trazar.
- source_word: ἵνα ἐπακολουθήσητε
  english_pob_choice: so that you might follow
  chosen_spanish: para que sigan
  alternatives_spanish:
  - a fin de que sigan
  - para que sigan de cerca
  lexicon: BDAG
  rationale: La cláusula de propósito se expresa naturalmente con «para que». El subjuntivo español trasmite el sentido final sin forzar una calca del subjuntivo griego.
- source_word: τοῖς ἴχνεσιν αὐτοῦ
  english_pob_choice: in his steps
  chosen_spanish: sus huellas
  alternatives_spanish:
  - sus pasos
  - sus pisadas
  - su camino
  lexicon: BDAG
  rationale: La metáfora de ἴχνος se conserva mejor con «huellas», que sugiere seguir el rastro o la trayectoria de otro. «Sus pasos» sería igualmente posible, pero «huellas» mantiene la imagen con más viveza.
theological_decisions:
- issue: Sentido de Χριστός como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene el valor titulativo y cristológico de Χριστός conforme a la política del proyecto. En este versículo, el énfasis recae en Jesús como el Ungido que sufre y sirve de modelo.
  doctrine_reference: Terminología cristológica del proyecto POB
- issue: Alcance de ὑπὲρ ὑμῶν
  english_pob_reading: for you with representative/benefactive breadth preserved
  chosen_spanish_reading: por ustedes con amplitud benefactiva y posible resonancia sustitutiva
  alternative_spanish_readings:
  - a favor de ustedes
  - en lugar de ustedes
  - por su bien
  rationale: Se preserva la tensión teológica del original sin resolverla de antemano. La frase puede sugerir beneficio y representación, pero el versículo inmediato subraya también el ejemplo a seguir.
  doctrine_reference: Preservar la tensión teológica en el sufrimiento vicario/benefactivo
- issue: Función de ὑπογραμμὸν en el contexto
  english_pob_reading: an example / a pattern / a copybook
  chosen_spanish_reading: un ejemplo con nota sobre el patrón trazado
  alternative_spanish_readings:
  - un patrón
  - un modelo
  - una copia para trazar
  rationale: El texto principal debe ser claro para lectores modernos, pero la nota conserva la posible imagen escolar de un modelo para copiar. Así no se pierde el matiz lexical documentado.
  doctrine_reference: Valor pedagógico del discipulado por imitación
translation_notes:
  revision_awareness: 'El texto sigue el consenso alto del expediente y respeta las revisiones registradas: se mantiene Χριστός como «el Mesías» conforme a la política doctrinal del proyecto, y se conserva la amplitud de ὑπὲρ ὑμῶν sin forzar una formulación atonemática más estrecha. La nota sobre ὑπογραμμὸν recoge el matiz pedagógico destacado en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; no aparece en este versículo.
  - «Mesías» se emplea para Χριστός como término titular, en coherencia con el proyecto.
  - «por ustedes» mantiene una traducción amplia de ὑπὲρ sin cerrar el sentido.
  - «huellas» conserva la metáfora de seguimiento y evita una paráfrasis demasiado general.
