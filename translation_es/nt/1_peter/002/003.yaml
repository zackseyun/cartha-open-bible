translation:
  language: es
  text: si en verdad han probado que el Señor es bueno[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «puesto que han probado». El griego usa una forma condicional que puede asumir la condición como verdadera.'
    reason: alternative_reading
  - marker: b
    text: «Bueno» también puede traducirse como «benigno» o «bondadoso». La expresión evoca Salmo 34:8.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  english_pob_choice: if indeed
  chosen_spanish: si en verdad
  alternatives_spanish:
  - si
  - puesto que
  lexicon: BDAG
  rationale: Conserva la forma condicional del griego y, como en el inglés auditado, añade un matiz de certeza retórica con «en verdad» sin convertir la cláusula en una afirmación plana.
- source_word: ἐγεύσασθε
  english_pob_choice: you have tasted
  chosen_spanish: han gustado
  alternatives_spanish:
  - han probado
  - han experimentado
  lexicon: BDAG
  rationale: «Gustar» preserva la imagen literal de la metáfora de sabor presente en el verbo; el perfecto compuesto en español comunica una experiencia pasada con relevancia actual.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cómo
  - porque
  lexicon: BDAG
  rationale: «Que» refleja de manera directa la sintaxis del contenido introducido por ὅτι, sin forzar una reformulación idiomática.
- source_word: χρηστὸς
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - amable
  - benigno
  - gracioso
  lexicon: BDAG
  rationale: «Bueno» mantiene el campo semántico amplio de χρηστός y conserva la resonancia intertextual con el eco de Salmo 34:8, sin estrechar indebidamente el sentido a «amable» o «benigno».
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: BDAG
  rationale: Aunque el texto griego dice κύριος, el eco de Salmo 34:8 apunta al nombre divino; por la norma del proyecto se usa «Yahvé» en el texto principal. Esto preserva la referencia bíblica al nombre divino y evita el enmascaramiento por «Señor».
theological_decisions:
- issue: Valor condicional de εἰ
  english_pob_reading: 'A real conditional retained in the main text: ''if indeed you have tasted'''
  chosen_spanish_reading: 'Se conserva una condicional real: «si en verdad han gustado».'
  alternative_spanish_readings:
  - puesto que han gustado
  - ya que han gustado
  rationale: El griego mantiene εἰ; por eso el español debe conservar la estructura condicional en lugar de resolverla como causal. «En verdad» comunica el matiz retórico de certeza esperado por el contexto.
  doctrine_reference: Preservar la tensión retórica del texto sin neutralizarla.
- issue: Referente de κύριος y eco de Salmo 34:8
  english_pob_reading: Render simply as 'the Lord' without specifying 'Christ' in the text
  chosen_spanish_reading: Se traduce con «Yahvé» para reflejar el eco del Salmo y la convención del proyecto para el nombre divino.
  alternative_spanish_readings:
  - el Señor
  - el Señor (Yahvé)
  rationale: El contexto de 1 Pedro 2:3 hace eco de Salmo 34:8, donde el término corresponde al nombre divino. Dado el mandato terminológico del proyecto, «Yahvé» es la opción más transparente y auditable; aun así, se conserva la tensión intertextual sin añadir una glosa cristológica en el texto principal.
  doctrine_reference: YHWH -> Yahvé; preservar resonancia canónica e intertextual.
translation_notes:
  revision_awareness: 'Se siguió el informe auditado en inglés: se conservó la fuerza condicional de εἰ, el valor metafórico de γεύομαι, el contenido introducido por ὅτι y la alusión a Salmo 34:8. La única adaptación decisiva fue el tratamiento de κύριος como «Yahvé» en español, conforme a la norma terminológica del proyecto para el nombre divino y al eco explícito del Salmo.'
  spanish_consistency_notes:
  - Se evitó «Señor» en el texto principal por la convención del proyecto para יהוה/YHWH.
  - Se mantuvo un español natural con perfecto compuesto («han gustado») para la experiencia pasada con relevancia presente.
  - Las notas preservan la alternativa condicional/causal y el posible matiz léxico de χρηστός sin borrar la tensión semántica.
