- from: si en verdad han gustado que Yahvé es bueno[a][b].
  to: si en verdad han probado que el Señor es bueno[a][b].
  rationale: Se corrige «Yahvé» a «el Señor» porque la fuente inmediata es κύριος y la auditoría inglesa documenta que debe preservarse esa forma para mantener tanto el eco de Salmo 34:8 como la posible referencia a Cristo sin resolverla. Se mejora la naturalidad española cambiando «han gustado que» por «han probado que», que conserva la imagen de degustar/experimentar y suena idiomático. Se ajusta la nota léxica para alternativas más precisas de χρηστός.
