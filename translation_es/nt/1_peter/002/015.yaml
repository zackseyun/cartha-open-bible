translation:
  language: es
  text: 'Porque esta es la voluntad de Dios: que, haciendo el bien, hagan callar la ignorancia de las personas necias[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «poner bozal a la ignorancia de las personas necias». El verbo es literalmente «poner bozal», usado aquí en sentido metafórico para detener una palabra hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: ὅτι introduce la razón de la exhortación anterior; en español, «Porque» comunica mejor el valor causal que un simple marcador de contenido.
- source_word: οὕτως ἐστὶν τὸ θέλημα τοῦ θεοῦ
  english_pob_choice: this is the will of God
  chosen_spanish: esta es la voluntad de Dios
  alternatives_spanish:
  - así es la voluntad de Dios
  - tal es la voluntad de Dios
  lexicon: BDAG
  rationale: El conjunto expresa una afirmación identificativa y natural en español. «Esta es» conserva la fuerza deíctica que el inglés POB resolvió con «this is».
- source_word: θέλημα
  english_pob_choice: will
  chosen_spanish: voluntad
  alternatives_spanish:
  - deseo
  - propósito
  lexicon: BDAG
  rationale: «Voluntad» es el equivalente directo y más transparente para θέλημα en este contexto de intención divina.
- source_word: ἀγαθοποιοῦντας
  english_pob_choice: by doing good
  chosen_spanish: haciendo el bien
  alternatives_spanish:
  - por hacer el bien
  - al hacer el bien
  - mientras hacen el bien
  lexicon: BDAG
  rationale: El participio presente funciona como medio o manera para φιμοῦν. «Haciendo el bien» fluye con naturalidad y preserva la relación instrumental.
- source_word: φιμοῦν
  english_pob_choice: to silence
  chosen_spanish: hagan callar
  alternatives_spanish:
  - silencien
  - amordacen
  - les pongan bozal
  lexicon: BDAG
  rationale: El verbo griego es literalmente «poner bozal/muzzle», pero la imagen es metafórica. En español, «hacer callar» conserva el efecto sin sonar forzado; «amordacen» sería demasiado gráfico y «silencien» más abstracto.
- source_word: τὴν ... ἀγνωσίαν
  english_pob_choice: the ignorance
  chosen_spanish: la ignorancia
  alternatives_spanish:
  - la falta de conocimiento
  lexicon: BDAG
  rationale: ἀγνωσία denota ignorancia o falta de conocimiento; «ignorancia» es la forma más directa y mantenida por el POB inglés.
- source_word: ἀφρόνων ἀνθρώπων
  english_pob_choice: foolish people
  chosen_spanish: de los hombres necios
  alternatives_spanish:
  - de las personas necias
  - de la gente necia
  - de los hombres insensatos
  lexicon: BDAG
  rationale: ἄφρων significa «necio/insensato». Aquí opto por «hombres» siguiendo la forma gramatical masculina plural del griego y manteniendo el peso antropológico del enunciado; «personas» sería una actualización interpretativa más allá del texto.
theological_decisions:
- issue: Valor causal de ὅτι al inicio
  english_pob_reading: For this is the will of God
  chosen_spanish_reading: Porque esta es la voluntad de Dios
  alternative_spanish_readings:
  - Pues esta es la voluntad de Dios
  - Ya que esta es la voluntad de Dios
  rationale: La conexión con el mandato anterior es causal/explanatoria. «Porque» mantiene esa relación de fundamento sin convertirla en una mera cita introductoria.
  doctrine_reference: Relación exhortación-fundamento en el contexto inmediato de 1 Pedro 2
- issue: Metáfora de φιμόω
  english_pob_reading: silence / to muzzle
  chosen_spanish_reading: hacer callar
  alternative_spanish_readings:
  - silenciar
  - amordazar
  rationale: El inglés POB preserva la nota de una alternativa literal («to muzzle»), pero en el texto principal traduce el efecto comunicativo. En español, «hacer callar» comunica bien la metáfora sin perder la idea de refrenar hostilidad verbal.
  doctrine_reference: Uso metafórico de lenguaje corporal para el cese de oposición verbal
- issue: Género en ἀφρόνων ἀνθρώπων
  english_pob_reading: foolish people
  chosen_spanish_reading: los hombres necios
  alternative_spanish_readings:
  - las personas necias
  - la gente necia
  rationale: El griego usa ἀνθρώπων en masculino genérico; aun así, en español «hombres» puede reflejar la forma gramatical y el sabor colectivo del original. Reconozco la alternativa inclusiva, pero aquí elijo una correspondencia más formal con el morfema griego.
  doctrine_reference: Correspondencia morfológica y política de género de la traducción
translation_notes:
  revision_awareness: El inglés POB revisó la construcción para reflejar mejor el infinitivo griego y su valor de finalidad/resultado. En español se optó por una estructura finita natural («que, haciendo el bien, hagan callar») que conserva el vínculo entre medio y resultado sin perder la fuerza imperativa implícita.
  spanish_consistency_notes:
  - Se mantiene «voluntad de Dios» para θέλημα, coherente con el léxico bíblico del proyecto.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton ni κύριος.
  - Se conserva «ignorancia» para ἀγνωσία como término directo y transparente.
  - La nota al pie preserva la alternativa literal de φιμόω, siguiendo el audit trail inglés.
