base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/007.yaml
  text: Therefore[a], for you who believe is the honor, but for those who do not believe[c][b], “The stone that the builders rejected—this one has become the head of the corner.”
  footnotes:
