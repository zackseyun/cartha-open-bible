    text: Or 'the preciousness is for you who believe,' that is, the stone is precious to believers.
    reason: alternative_reading
  - marker: b
    text: Or 'those who disobey'; the verb can carry the sense of refusing belief and so acting in disobedience.
    reason: lexical_alternative
  - marker: c
    text: Traditionally, 'the cornerstone' or 'the chief cornerstone.'
    reason: lexical_alternative
