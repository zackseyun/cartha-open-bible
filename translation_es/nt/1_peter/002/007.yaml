translation:
  language: es
  text: Por tanto, para ustedes que creen es el honor[a]; pero para los que no creen[b], «La piedra que desecharon los constructores, esta ha venido a ser la cabeza del ángulo[c]».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la preciosidad es para ustedes que creen»; es decir, la piedra es preciosa para los creyentes.'
    reason: alternative_reading
  - marker: b
    text: 'O: «los que desobedecen»; el verbo también puede llevar la idea de negarse a creer y, por eso, actuar en desobediencia.'
    reason: lexical_alternative
  - marker: c
    text: 'Tradicionalmente: «la piedra angular» o «la piedra principal del ángulo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τιμή
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - valor
  - preciosidad
  lexicon: BDAG
  rationale: τιμή puede significar honor, valor o preciosidad. Aquí, como en el audit trail inglés, el contraste con los que no creen favorece entender que el honor pertenece a los creyentes. «Honor» conserva la forma breve de la cláusula griega sin cargarla prematuramente con una sola lectura interpretativa de la piedra.
- source_word: τοῖς πιστεύουσιν
  english_pob_choice: for you who believe
  chosen_spanish: para ustedes que creen
  alternatives_spanish:
  - a ustedes que creen
  - para los creyentes
  lexicon: BDAG
  rationale: El participio con artículo se dirige a los destinatarios de manera personal. «Para ustedes que creen» mantiene el valor directo del dativo y el matiz participial de la fe presente.
- source_word: ἀπιστοῦσιν
  english_pob_choice: those who do not believe
  chosen_spanish: los que no creen
  alternatives_spanish:
  - los incrédulos
  - los que desobedecen
  lexicon: BDAG
  rationale: En este contraste inmediato con πιστεύουσιν, el sentido más claro es la falta de fe. Se preserva «los que no creen» en el texto principal, dejando la posible relación con desobediencia para nota.
- source_word: λίθος
  english_pob_choice: stone
  chosen_spanish: piedra
  alternatives_spanish:
  - piedra angular
  - roca
  lexicon: BDAG
  rationale: «Piedra» es la traducción natural y conserva la imagen del pasaje y la cita del Salmo. En español, «piedra» funciona bien en el marco de la metáfora de edificación.
- source_word: ἀπεδοκίμασαν
  english_pob_choice: rejected
  chosen_spanish: desecharon
  alternatives_spanish:
  - rechazaron
  - desaprobaron
  lexicon: BDAG
  rationale: El verbo expresa rechazar después de examinar. «Desecharon» reproduce bien la fuerza del rechazo en la cita, y armoniza con el tono de una piedra considerada inútil por los constructores.
- source_word: οἰκοδομοῦντες
  english_pob_choice: builders
  chosen_spanish: los edificadores
  alternatives_spanish:
  - los constructores
  - los que edifican
  lexicon: BDAG
  rationale: El participio sustantivado se refiere a quienes construyen. «Edificadores» conserva el paralelismo bíblico y suena natural en español bíblico contemporáneo.
- source_word: κεφαλὴν γωνίας
  english_pob_choice: the head of the corner
  chosen_spanish: la cabeza del ángulo
  alternatives_spanish:
  - la piedra angular
  - la piedra principal del ángulo
  lexicon: BDAG
  rationale: Se mantiene la literalidad de la expresión griega para no aplanar la metáfora arquitectónica. «Cabeza del ángulo» preserva la transparencia del texto fuente; la lectura interpretativa tradicional queda recogida en nota.
theological_decisions:
- issue: Sentido de ἡ τιμή en relación con los creyentes y la piedra
  english_pob_reading: The clause means that honor belongs to believers, in contrast to the shame of unbelief.
  chosen_spanish_reading: La cláusula indica que el honor es para los creyentes, en contraste con la incredulidad.
  alternative_spanish_readings:
  - La piedra es preciosa para ustedes que creen.
  - El valor está para ustedes que creen.
  rationale: La sintaxis griega ὑμῖν ... ἡ τιμή favorece una afirmación de honor para los creyentes. Esa lectura concuerda con el contraste del contexto y evita resolver la tensión con la idea, también posible por el contexto previo, de que la piedra es preciosa para los creyentes.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Renderización de κεφαλὴ γωνίας
  english_pob_reading: A transparent rendering of the metaphor is kept in the main text.
  chosen_spanish_reading: 'Se conserva la metáfora de forma transparente: «la cabeza del ángulo».'
  alternative_spanish_readings:
  - la piedra angular
  - la piedra principal del ángulo
  rationale: La expresión es cristológicamente significativa, pero el texto griego es literal. Mantener la metáfora evita sustituirla por una equivalencia interpretativa en el cuerpo principal; la forma tradicional queda como alternativa para el lector.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'La formulación sigue de cerca el último estado revisado del POB en inglés: se conserva la estructura contrastiva con una coma antes de la cita, se mantiene la literalidad de «head of the corner» en el texto principal y se refleja la decisión auditada de no resolver en el cuerpo principal la posible tensión entre «honor» y «preciosidad».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se prefirió «creen / no creen» para mantener el contraste verbal directo de πιστεύουσιν / ἀπιστοῦσιν.
  - «Edificadores» y «cabeza del ángulo» preservan el vocabulario de la metáfora de construcción sin introducir una equivalencia tradicional en el texto principal.
  - Las comillas angulares se emplean para la cita bíblica conforme al uso editorial en español.
