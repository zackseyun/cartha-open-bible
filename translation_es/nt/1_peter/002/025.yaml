translation:
  language: es
  text: Porque ustedes eran como ovejas extraviadas[a], pero ahora han vuelto[b] al Pastor y Cuidador[c] de sus almas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'descarriadas' o 'andando errantes'; el griego también puede tener matiz de 'siendo llevadas por mal camino'.
    reason: lexical_alternative
  - marker: b
    text: 'O ''han regresado'' o ''se han vuelto''; la forma griega también puede entenderse con matiz pasivo: ''fueron hechas volver''.'
    reason: alternative_reading
  - marker: c
    text: O 'Guardián'; tradicionalmente, 'Obispo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦτε γὰρ
  english_pob_choice: For you were
  chosen_spanish: Porque ustedes eran
  alternatives_spanish:
  - pues ustedes eran
  - porque ustedes habían sido
  lexicon: BDAG
  rationale: γάρ expresa la conexión causal o explicativa con lo anterior; en español, 'Porque' comunica bien esa relación. El imperfecto ἦτε describe una condición pasada continua, por eso 'eran' es natural y fiel.
- source_word: ὡς πρόβατα
  english_pob_choice: like sheep
  chosen_spanish: como ovejas
  alternatives_spanish:
  - igual que ovejas
  - como un rebaño
  lexicon: BDAG
  rationale: ὡς introduce comparación, y πρόβατα es plural. 'Como ovejas' conserva la imagen pastoral de manera clara y directa en español.
- source_word: πλανώμενοι
  english_pob_choice: going astray
  chosen_spanish: extraviadas
  alternatives_spanish:
  - andando errantes
  - descarriadas
  - siendo llevadas astray
  lexicon: BDAG
  rationale: El participio de πλανάω puede ser intransitivo o con matiz pasivo. 'Extraviadas' mantiene la ambigüedad entre vagar y ser desviadas, sin forzar una sola voz, y suena natural aplicado a la imagen de ovejas.
- source_word: ἀλλὰ ἐπεστράφητε νῦν
  english_pob_choice: but now you have returned
  chosen_spanish: pero ahora han vuelto
  alternatives_spanish:
  - pero ahora se han vuelto
  - pero ahora fueron vueltas
  - pero ahora han regresado
  lexicon: BDAG
  rationale: ἀλλά marca fuerte contraste. ἐπεστράφητε puede entenderse de forma intransitiva o con pasiva semántica; 'han vuelto' comunica el cambio consumado y evita sobreexplicar la agencia.
- source_word: ἐπὶ τὸν ποιμένα
  english_pob_choice: to the Shepherd
  chosen_spanish: al Pastor
  alternatives_spanish:
  - al Pastor
  - al que pastorea
  lexicon: BDAG
  rationale: ποιμήν significa 'pastor' o 'pastor de ovejas'; en español bíblico contemporáneo, 'Pastor' es el equivalente más transparente y natural para el título cristológico aquí.
- source_word: καὶ ἐπίσκοπον
  english_pob_choice: and Overseer
  chosen_spanish: y Supervisor
  alternatives_spanish:
  - y Supervisor
  - y Guardián
  - y Obispo
  lexicon: BDAG
  rationale: ἐπίσκοπος designa a quien vigila y cuida. 'Supervisor' conserva el sentido de supervisión/vigilancia con lenguaje claro y no arrastra de por sí la carga eclesiástica posterior de 'Obispo'.
- source_word: τῶν ψυχῶν ὑμῶν
  english_pob_choice: of your souls
  chosen_spanish: de sus almas
  alternatives_spanish:
  - de sus almas
  - de sus vidas
  - de ustedes
  lexicon: BDAG
  rationale: ψυχή puede significar alma, vida o persona. 'Almas' preserva el sentido tradicional y léxico en un contexto de cuidado espiritual; 'sus' se usa para concordar con 'ustedes' en registro de respeto plural.
theological_decisions:
- issue: Título cristológico doble aplicado a Cristo
  english_pob_reading: Shepherd and Overseer
  chosen_spanish_reading: Pastor y Supervisor
  alternative_spanish_readings:
  - Pastor y Guardián
  - Pastor y Obispo
  rationale: El texto aplica ambos títulos a Cristo. 'Pastor' retiene la metáfora pastoral; 'Supervisor' expresa el contenido de ἐπίσκοπος sin trasladar automáticamente la institución eclesiástica posterior de 'Obispo'.
  doctrine_reference: Affirmations; Translation philosophy §§1, 5, 6
- issue: Ambigüedad de voz en ἐπεστράφητε
  english_pob_reading: you have returned / you were turned back
  chosen_spanish_reading: han vuelto
  alternative_spanish_readings:
  - fueron vueltas
  - fueron devueltas
  - han regresado
  rationale: La forma griega admite lectura intransitiva o pasiva. 'Han vuelto' preserva el resultado sin resolver indebidamente si el énfasis recae en la acción divina, en la respuesta humana o en ambas.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El pasaje inglés fue revisado recientemente sin cambios. La redacción española sigue el mismo consenso auditado: mantiene la imagen pastoral, conserva la ambigüedad de πλανώμενοι y ἐπεστράφητε, y evita cargar ἐπίσκοπος con la noción eclesiástica posterior de ''obispo''.'
  spanish_consistency_notes:
  - Se usa 'Pastor' como título cristológico, coherente con el sentido de ποιμήν y con la capitalización del referente en el contexto.
  - '''Supervisor'' se mantiene para ἐπίσκοπος para evitar el anacronismo denominacional de ''Obispo''.'
  - '''Almas'' traduce ψυχῶν para preservar el valor léxico y espiritual del texto.'
  - La comparación 'como ovejas' y el participio 'extraviadas' conservan la metáfora sin añadir interpretación excesiva.
