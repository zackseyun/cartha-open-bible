review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: estado previo comparado con ovejas, contraste con el retorno presente, y los dos títulos cristológicos aplicados a Cristo. Sin embargo, algunos detalles necesitan ajuste para mayor fidelidad y naturalidad: la colocación y segmentación de las notas en ''ovejas [a]extraviadas[b]'' es torpe; la alternativa ''siendo desviadas'' no reproduce bien el matiz de πλανώμενοι; y ''Supervisor'' para ἐπίσκοπον suena administrativo en español y debilita el valor pastoral/cuidador del título.'
  spanish_quality_summary: El texto es legible, pero puede mejorarse en fluidez y dignidad eclesial. 'Porque ustedes eran como ovejas extraviadas' es natural; 'han vuelto' también. El punto más débil es 'Supervisor', que en español contemporáneo se oye burocrático más que pastoral. Además, la nota c contiene comillas mal formateadas y 'fueron vueltas' no es español natural. Conviene unificar el anclaje de nota sobre 'extraviadas' y ofrecer alternativas más idiomáticas.
  glossary_alignment: 'No hay conflicto con los términos globales principales del proyecto. ''Pastor'' para ποιμένα y ''almas'' para ψυχῶν son adecuados. La excepción relevante es ἐπίσκοπον: aunque el inglés eligió ''Overseer'', en español ''Supervisor'' no es el equivalente más fiel ni más eclesialmente legible; ''cuidador'' o ''guardián'' transmiten mejor la función sin importar el oficio posterior de ''obispo''. Aquí ''Cuidador'' preserva mejor el paralelismo pastoral con ''Pastor''.'
  issues:
  - severity: medium
    issue: '''Supervisor'' para ἐπίσκοπον suena demasiado administrativo.'
    rationale: Aunque intenta evitar 'Obispo', en español 'Supervisor' evoca gestión institucional y no cuidado vigilante de las almas. El contexto con 'Pastor' pide un término más relacional y pastoral.
  - severity: medium
    issue: Las notas sobre πλανώμενοι están mal ancladas y una alternativa es poco natural.
    rationale: La secuencia 'ovejas [a]extraviadas[b]' reparte notas de modo confuso. Además, 'siendo desviadas' no es una buena alternativa idiomática para ovejas; mejor 'descarriadas' o 'siendo llevadas por mal camino' si se quiere reflejar matiz pasivo.
