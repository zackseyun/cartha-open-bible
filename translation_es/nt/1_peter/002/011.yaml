revisions:
- from: Amados[a], les ruego como forasteros y exiliados que se abstengan de los deseos carnales[b], los cuales combaten contra el alma[c].
  to: Amados, les ruego como residentes extranjeros[a] y exiliados que se abstengan de los deseos carnales[b], los cuales combaten contra el alma[c].
  rationale: La revisión corrige la ubicación y el contenido de la nota [a] para alinearla con la auditoría inglesa y con el par griego παροίκους/παρεπιδήμους. También ajusta «forasteros» a «residentes extranjeros» para reflejar mejor el matiz léxico de πάροικος como residente no nativo. Se conservan «deseos carnales» y «alma» por fidelidad a σάρξ/ψυχή y al razonamiento teológico documentado.
