    text: Or 'foreigners' and 'temporary residents.' The paired terms emphasize that believers do not fully belong to the present age or society.
    reason: lexical_alternative
  - marker: b
    text: '''Fleshly desires'' could also be rendered ''desires of the flesh'' or, more interpretively, ''sinful desires.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'against the life' or 'against the self.'
    reason: lexical_alternative
