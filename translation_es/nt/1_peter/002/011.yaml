translation:
  language: es
  text: Amados, les ruego como residentes extranjeros[a] y exiliados que se abstengan de los deseos carnales[b], los cuales combaten contra el alma[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forasteros» y «residentes temporales». Los dos términos emparejados enfatizan que los creyentes no pertenecen plenamente a la era o sociedad presente.
    reason: lexical_alternative
  - marker: b
    text: O «deseos de la carne» o, de manera más interpretativa, «deseos pecaminosos».
    reason: lexical_alternative
  - marker: c
    text: O «contra la vida» o «contra el ser interior».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπητοί
  english_pob_choice: Beloved
  chosen_spanish: Amados
  alternatives_spanish:
  - Queridos
  - Amados queridos
  lexicon: BDAG
  rationale: El vocativo plural expresa afecto y cercanía pastoral. «Amados» conserva ese tono y la conexión léxica con ἀγαπάω/ἀγάπη, sin añadir una relación de amistad que el griego no explicita.
- source_word: παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: les ruego
  alternatives_spanish:
  - les exhorto
  - les insto
  lexicon: BDAG
  rationale: El verbo aquí introduce una exhortación seria. «Les ruego» comunica el tono pastoral y persuasivo con naturalidad en español, sin endurecer el registro en un tecnicismo como «exhorto».
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - siendo
  - en calidad de
  lexicon: BDAG
  rationale: La partícula marca la manera/identidad en que se describe a los destinatarios. «Como» reproduce esa relación sin introducir una causalidad que no está explícita.
- source_word: παροίκους
  english_pob_choice: sojourners
  chosen_spanish: forasteros
  alternatives_spanish:
  - residentes temporales
  - peregrinos
  lexicon: BDAG
  rationale: πάροικος señala a quien vive en un lugar que no es su patria, con sentido de residencia no nativa. «Forasteros» comunica bien la condición de no pertenencia local; «peregrinos» podría sonar más devocional que léxica.
- source_word: παρεπιδήμους
  english_pob_choice: exiles
  chosen_spanish: exiliados
  alternatives_spanish:
  - residentes temporales
  - extranjeros
  lexicon: BDAG
  rationale: El par con παροίκους intensifica la condición de ajenidad. «Exiliados» mantiene el peso social y teológico de no pertenecer plenamente al presente orden, y distingue el segundo término del primero.
- source_word: ἀπέχεσθαι
  english_pob_choice: to abstain
  chosen_spanish: que se abstengan
  alternatives_spanish:
  - que se aparten de
  - que se refrenen de
  lexicon: BDAG
  rationale: El infinitivo expresa una llamada continua a mantenerse alejados de algo. «Que se abstengan» es idiomático en español y conserva la fuerza moral de la exhortación.
- source_word: σαρκικῶν
  english_pob_choice: fleshly
  chosen_spanish: carnales
  alternatives_spanish:
  - de la carne
  - mundanos
  lexicon: BDAG
  rationale: El adjetivo deriva de σάρξ. «Carnales» preserva el vínculo léxico con «carne» y es claro en español sin resolver de antemano la tensión doctrinal hacia «naturaleza pecaminosa».
- source_word: ἐπιθυμιῶν
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - pasiones
  - ansias
  lexicon: BDAG
  rationale: En contexto moral, ἐπιθυμία puede abarcar deseo en sentido negativo. «Deseos» es fiel y suficientemente amplio; «pasiones» sería más interpretativo y menos directo.
- source_word: αἵτινες
  english_pob_choice: which
  chosen_spanish: los cuales
  alternatives_spanish:
  - que
  - las cuales
  lexicon: BDAG
  rationale: El relativo introduce una cláusula explicativa sobre los deseos. «Los cuales» conserva la referencia al antecedente plural con naturalidad en español.
- source_word: στρατεύονται
  english_pob_choice: wage war
  chosen_spanish: combaten
  alternatives_spanish:
  - hacen guerra
  - libran guerra
  lexicon: BDAG
  rationale: La imagen es militar. «Combaten» reproduce la agresividad del verbo en un español claro y no recargado; «libran guerra» sería más enfático, pero menos conciso.
- source_word: κατὰ τῆς ψυχῆς
  english_pob_choice: against the soul
  chosen_spanish: contra el alma
  alternatives_spanish:
  - contra la vida
  - contra el ser interior
  lexicon: BDAG
  rationale: ψυχή aquí designa la vida interior/persona, no simplemente la vida biológica. «Alma» preserva el peso antropológico tradicional y la tensión del término sin reducirlo a psicología moderna.
theological_decisions:
- issue: Rendering of σάρξ-family language in a moral warning
  english_pob_reading: fleshly desires
  chosen_spanish_reading: deseos carnales
  alternative_spanish_readings:
  - deseos de la carne
  - deseos pecaminosos
  rationale: La base griega conserva la metáfora de la carne. «Carnales» mantiene esa imagen y evita cerrar el sentido a una paráfrasis doctrinal como «pecaminosos», que resolvería la tensión del texto en vez de preservarla.
  doctrine_reference: 'DOCTRINE.md contested term: σάρξ'
- issue: Sense of ψυχή in the conflict metaphor
  english_pob_reading: the soul
  chosen_spanish_reading: el alma
  alternative_spanish_readings:
  - la vida
  - el ser interior
  rationale: La frase presenta a los deseos como enemigos de la dimensión más profunda de la persona. «Alma» conserva el alcance antropológico y la resonancia bíblica del término sin especificar más de lo que el texto afirma.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del último repaso y no introduce cambios sustantivos respecto del estado revisado. Se mantienen las decisiones clave: el par léxico de outsider status, la metáfora de la carne y el sentido antropológico de ψυχή.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «carnales» para σάρξ en coherencia con el criterio de preservar la metáfora sin convertirla en paráfrasis doctrinal.
  - «Alma» conserva la correspondencia con ψυχή y no se reemplaza por «vida» en el texto principal, aunque esa alternativa se documenta en nota.
  - Se evita traducir el par de términos de extranjería con dos sinónimos demasiado cercanos; «forasteros» y «exiliados» distinguen el matiz de cada palabra griega.
