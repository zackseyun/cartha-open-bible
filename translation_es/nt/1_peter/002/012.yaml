translation:
  language: es
  text: Mantengan una conducta honorable[a] entre los gentiles, para que, aunque los calumnien como malhechores, al observar sus buenas obras glorifiquen a Dios en el día de la visitación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "entre las naciones".
    reason: lexical_alternative
  - marker: c
    text: '"Visitación" puede referirse a un tiempo en que Dios visita a las personas, ya sea para misericordia o para juicio.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναστροφή
  english_pob_choice: conduct
  chosen_spanish: conducta
  alternatives_spanish:
  - manera de vivir
  - comportamiento
  lexicon: BDAG
  rationale: En 1 Pedro el término apunta al modo de vida visible y continuo, no solo a actos aislados. "Conducta" conserva ese sentido ético con naturalidad en español.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the Gentiles
  chosen_spanish: entre los gentiles
  alternatives_spanish:
  - entre las naciones
  - entre los paganos
  lexicon: BDAG
  rationale: El contraste en el contexto es con los pueblos no pertenecientes al pueblo creyente. "Gentiles" es directo y fiel; "paganos" introduce una carga pejorativa no exigida por el griego.
- source_word: ἔχοντες καλήν
  english_pob_choice: Keep ... honorable
  chosen_spanish: Mantengan ... honorable
  alternatives_spanish:
  - Tengan ... buena
  - Conserven ... excelente
  lexicon: BDAG
  rationale: El participio funciona exhortativamente; en español se expresa de forma natural como mandato. καλός aquí tiene un matiz moral y estético de honorabilidad, más fuerte que solo "buena".
- source_word: καταλαλοῦσιν
  english_pob_choice: they slander
  chosen_spanish: los calumnien
  alternatives_spanish:
  - hablen contra ustedes
  - los difamen
  lexicon: BDAG
  rationale: El verbo denota hablar hostilmente y con daño reputacional. "Calumnien" comunica bien la fuerza ofensiva del término en español.
- source_word: κακοποιῶν
  english_pob_choice: evildoers
  chosen_spanish: hacedores de mal
  alternatives_spanish:
  - malhechores
  - malvados
  lexicon: BDAG
  rationale: La expresión griega caracteriza a quienes hacen el mal. "Hacedores de mal" mantiene la fuerza léxica sin reducirla a una categoría legal o moral más amplia de lo necesario.
- source_word: ἐποπτεύοντες
  english_pob_choice: by observing
  chosen_spanish: al observar
  alternatives_spanish:
  - observando
  - al ver
  lexicon: BDAG
  rationale: El participio indica observación atenta y funciona como medio. "Al observar" reproduce esa relación causal/medial de modo natural.
- source_word: καλῶν ἔργων
  english_pob_choice: good works
  chosen_spanish: buenas obras
  alternatives_spanish:
  - buenas acciones
  - obras buenas
  lexicon: BDAG
  rationale: La expresión ética es estándar; "buenas obras" en español conserva el registro bíblico sin sonar rígido.
- source_word: δοξάσωσι τὸν θεόν
  english_pob_choice: they may glorify God
  chosen_spanish: glorifiquen a Dios
  alternatives_spanish:
  - den gloria a Dios
  - ensalcen a Dios
  lexicon: BDAG
  rationale: El aoristo subjuntivo en cláusula de propósito se vierte naturalmente como finalidad. "Glorifiquen a Dios" es fiel y estilísticamente claro.
- source_word: ἐν ἡμέρᾳ ἐπισκοπῆς
  english_pob_choice: on the day of visitation
  chosen_spanish: en el día de la visitación
  alternatives_spanish:
  - en el día de visita
  - en el día en que Dios visita
  lexicon: BDAG
  rationale: Se conserva la expresión tradicional y, a la vez, suficientemente literal. "Visitación" preserva la ambigüedad bíblica sobre si la visita divina es para misericordia, juicio o ambas cosas.
- source_word: ἐν ᾧ
  english_pob_choice: though
  chosen_spanish: aunque
  alternatives_spanish:
  - mientras
  - en lo cual
  lexicon: BDAG
  rationale: 'El contexto muestra oposición concesiva: las calumnias ocurren mientras su conducta sigue siendo visible por sus buenas obras. "Aunque" reproduce bien el sentido reconocido en la revisión inglesa.'
theological_decisions:
- issue: Sentido de ἐπισκοπή / "day of visitation"
  english_pob_reading: Retain the broader phrase 'the day of visitation' without specifying whether the visitation is primarily for judgment, salvation, or conversion.
  chosen_spanish_reading: Mantener "el día de la visitación" sin precisar si se trata principalmente de juicio, misericordia o conversión.
  alternative_spanish_readings:
  - el día del juicio
  - el día en que Dios los visita para salvarlos
  - el día en que Dios visita para juzgar
  rationale: 'El texto permite una tensión deliberada: la visitación divina puede ser de misericordia o de juicio. La traducción no debe cerrar esa ambigüedad.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió ἐν ᾧ: en este contexto no conviene traducirlo literalmente como relación espacial o "en lo cual", sino con una concesiva natural en español, de modo que "aunque" refleja mejor la fuerza contextual de la cláusula sin perder el nexo con las calumnias y la observación de las buenas obras.'
  spanish_consistency_notes:
  - Se mantuvo "gentiles" para ἔθνη, en línea con el POB inglés y con el contraste étnico del pasaje.
  - Se prefirió "visitación" sobre paráfrasis explicativas para preservar la tensión teológica documentada.
  - '"Buenas obras" se conservó como expresión ética estable; no se cambió a "buenos actos" o "buenas acciones" para no debilitar su resonancia bíblica.'
  - 'El mandato inicial en plural se formuló como exhortación directa en español: "Mantengan".'
