  text: τὴν ἀναστροφὴν ὑμῶν ⸂ἐν τοῖς ἔθνεσιν ἔχοντες καλήν⸃, ἵνα, ἐν ᾧ καταλαλοῦσιν ὑμῶν ὡς κακοποιῶν, ἐκ τῶν καλῶν ἔργων ⸀ἐποπτεύοντες δοξάσωσι τὸν θεὸν ἐν ἡμέρᾳ ἐπισκοπῆς.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/012.yaml
  text: Keep your conduct among the Gentiles honorable[a], so that, though they slander you as evildoers[c][b], by observing your good works they may glorify God on the day of visitation.
  footnotes:
