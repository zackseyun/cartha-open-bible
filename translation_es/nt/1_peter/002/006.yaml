translation:
  language: es
  text: 'Porque así dice la Escritura[a]: «He aquí, pongo en Sion una piedra angular escogida y preciosa[b], y el que cree en él no será jamás avergonzado[c][d]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «está en la Escritura» o «la Escritura dice». El giro griego dice, literalmente, «contiene en Escritura».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una piedra angular escogida y honrada». El término griego puede denotar alto valor además de honor.'
    reason: lexical_alternative
  - marker: c
    text: Algunas traducciones ponen «en ella» porque la cita habla de una piedra; aquí «en él» refleja la aplicación cristológica de Pedro en el contexto circundante.
    reason: alternative_reading
  - marker: d
    text: 'O: «de ningún modo será avergonzado». La construcción griega es fuertemente enfática.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la cita como fundamento explicativo de la afirmación anterior. En español, 'Porque' conserva bien ese valor causal-explicativo sin sonar forzado.
- source_word: περιέχει ἐν γραφῇ
  english_pob_choice: it stands in Scripture
  chosen_spanish: está escrito en la Escritura
  alternatives_spanish:
  - está contenido en la Escritura
  - la Escritura dice
  lexicon: BDAG
  rationale: El giro griego es idiomático y remite a la autoridad escritural. 'Está escrito en la Escritura' es natural en español y preserva la referencia al texto sagrado sin perder la idea de que la cita está atestiguada allí.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: BDAG
  rationale: '''He aquí'' reproduce el tono profético y solemne del imperativo de atención. Es más adecuado que una forma coloquial como ''Mira''.'
- source_word: τίθημι
  english_pob_choice: I lay
  chosen_spanish: pongo
  alternatives_spanish:
  - coloco
  - establezco
  lexicon: BDAG
  rationale: En la metáfora de construcción, 'pongo' mantiene la imagen de establecer una piedra sin sonar arcaico. 'Pongo' también evita un calco pesado de 'lay'.
- source_word: ἐν Σιὼν
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - sobre Sion
  lexicon: BDAG
  rationale: La preposición expresa ubicación dentro del marco profético. 'En Sion' conserva la imagen espacial del texto griego.
- source_word: λίθον ἀκρογωνιαῖον
  english_pob_choice: cornerstone
  chosen_spanish: piedra angular
  alternatives_spanish:
  - piedra de esquina
  - piedra principal
  lexicon: BDAG
  rationale: '''Piedra angular'' es el equivalente establecido y claro en español para λίθον ἀκρογωνιαῖον. Mantiene la fuerza arquitectónica de la metáfora sin introducir una interpretación adicional.'
- source_word: ἐκλεκτὸν
  english_pob_choice: chosen
  chosen_spanish: escogida
  alternatives_spanish:
  - elegida
  - seleccionada
  lexicon: BDAG
  rationale: '''Escogida'' es natural en español bíblico y conserva el sentido de selección divina sin cargar el término con tecnicismos teológicos innecesarios.'
- source_word: ἔντιμον
  english_pob_choice: honored
  chosen_spanish: honrosa
  alternatives_spanish:
  - preciosa
  - valiosa
  - honrada
  lexicon: BDAG
  rationale: '''Honrosa'' mantiene el campo semántico del honor destacado por el contexto inmediato. Se evita ''preciosa'' para no desplazar el matiz hacia valor sentimental o monetario.'
- source_word: ὁ πιστεύων ἐπ’ αὐτῷ
  english_pob_choice: the one who believes in him
  chosen_spanish: el que cree en él
  alternatives_spanish:
  - el que confía en él
  - quien cree en él
  lexicon: BDAG
  rationale: '''El que cree en él'' es fiel al participio sustantivado y al verbo πιστεύω. Se conserva la aplicación personal de αὐτῷ siguiendo la lectura cristológica del contexto inmediato, como en el audit trail en inglés.'
- source_word: οὐ μὴ καταισχυνθῇ
  english_pob_choice: will certainly not be put to shame
  chosen_spanish: no será avergonzado
  alternatives_spanish:
  - no quedará avergonzado
  - nunca será avergonzado
  lexicon: BDAG
  rationale: La construcción negativa enfática se expresa de forma natural con 'no será avergonzado'. Aunque no replica explícitamente 'certamente' en el texto, el doble negativo griego queda bien reflejado por la seguridad absoluta de la frase en contexto.
theological_decisions:
- issue: Referencia personal de αὐτῷ en la cita de Isaías aplicada por Pedro
  english_pob_reading: rendered personally as 'him'
  chosen_spanish_reading: ‘en él’ / ‘a él’ se entiende personalmente, no como ‘ello’
  alternative_spanish_readings:
  - en la piedra
  - en ella
  rationale: El contexto de 1 Pedro 2:4–8 aplica la piedra a Cristo de manera explícita. Por eso se mantiene una referencia personal en español ('él'), siguiendo la lectura cristológica documentada en el audit trail inglés y sin borrar la imagen de la piedra.
  doctrine_reference: 1 Pedro 2:4–8; lectura cristológica del pasaje
- issue: Intensidad de la negación en οὐ μὴ καταισχυνθῇ
  english_pob_reading: will certainly not be put to shame
  chosen_spanish_reading: no será avergonzado
  alternative_spanish_readings:
  - ciertamente no será avergonzado
  - jamás será avergonzado
  rationale: Aunque el griego es enfático, en español la formulación breve 'no será avergonzado' comunica de manera digna y segura la imposibilidad de la vergüenza prometida. La fuerza enfática queda asegurada por el contexto y puede desarrollarse en nota si se requiere.
  doctrine_reference: Gramática de la negación enfática en griego; BDAG
- issue: Correspondencia de ἔντιμον
  english_pob_reading: honored
  chosen_spanish_reading: honrosa
  alternative_spanish_readings:
  - honrada
  - preciosa
  rationale: Se privilegia el matiz de honor, presente en el inglés POB y en el contexto temático de 2:7. 'Honrosa' evita reducir el término a valor material y preserva la dignidad atribuida a la piedra.
  doctrine_reference: Contexto inmediato de 1 Pedro 2:7
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión desde una formulación más literal ('it is contained in Scripture') hacia 'it stands in Scripture' por naturalidad idiomática. En español se optó por 'está escrito en la Escritura', que conserva la autoridad escritural y suena natural. También se decidió en inglés unir 'chosen and honored' de modo claro; en español se reflejan ambos adjetivos con 'escogida y honrosa'.
  spanish_consistency_notes:
  - Se mantiene 'Sion' sin tilde para la forma bíblica habitual en español.
  - Se usa 'piedra angular' como equivalente estable de λίθον ἀκρογωνιαῖον.
  - Se conserva la referencia personal 'él' para αὐτῷ siguiendo la aplicación de Pedro a Cristo.
  - No se introduce 'Cristo' en el texto porque el versículo cita la imagen de la piedra; la cristología queda inferida por el contexto inmediato.
  - La negación enfática del griego se conserva con una frase natural y solemne en español.
