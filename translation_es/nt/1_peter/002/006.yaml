    text: 'O: «está en la Escritura» o «la Escritura dice». El giro griego dice, literalmente, «contiene en Escritura».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una piedra angular escogida y honrada». El término griego puede denotar alto valor además de honor.'
    reason: lexical_alternative
