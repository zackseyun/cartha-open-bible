    text: Algunas traducciones ponen «en ella» porque la cita habla de una piedra; aquí «en él» refleja la aplicación cristológica de Pedro en el contexto circundante.
    reason: alternative_reading
  - marker: d
    text: 'O: «de ningún modo será avergonzado». La construcción griega es fuertemente enfática.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la introducción para evitar la redundancia de «está escrito en la Escritura» y acercarse mejor al giro idiomático griego. Se reemplaza «honrosa» por «preciosa», que en español es mucho más natural para modificar «piedra angular» y sigue siendo una opción documentada en la auditoría; la nota preserva la alternativa «honrada/honrada» en sentido de honor. También se fortalece la negación con «jamás» para reflejar mejor οὐ μὴ.
