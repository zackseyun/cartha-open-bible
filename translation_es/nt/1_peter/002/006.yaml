revisions:
- from: 'Porque en la Escritura[a] está escrito: “He aquí, pongo en Sion una piedra angular escogida y honrosa, y el que cree en él no será avergonzado[b][c][d].”'
  to: 'Porque así dice la Escritura[a]: «He aquí, pongo en Sion una piedra angular escogida y preciosa[b], y el que cree en él no será jamás avergonzado[c][d]»'
  rationale: Se ajusta la introducción para evitar la redundancia de «está escrito en la Escritura» y acercarse mejor al giro idiomático griego. Se reemplaza «honrosa» por «preciosa», que en español es mucho más natural para modificar «piedra angular» y sigue siendo una opción documentada en la auditoría; la nota preserva la alternativa «honrada/honrada» en sentido de honor. También se fortalece la negación con «jamás» para reflejar mejor οὐ μὴ.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y sentido general del griego: cita escritural introductoria, piedra angular escogida/honrada, aplicación personal de «en él», y promesa de no ser avergonzado. Sin embargo, hay dos ajustes importantes: (1) «está escrito en la Escritura» añade «escrito», que no corresponde directamente a περιέχει ἐν γραφῇ y además suena redundante; una forma como «así dice la Escritura» o «está en la Escritura» transmite mejor el giro idiomático. (2) «honrosa» aplicado a «piedra angular» en español suena poco natural; «honrada» tampoco es ideal. En este contexto «preciosa» o una reformulación con «de gran honor/valor» sería más idiomática. También conviene reflejar mejor el énfasis de οὐ μὴ con «jamás» o «de ningún modo».'
  spanish_quality_summary: 'El español es claro y digno, pero presenta leves rigideces: «está escrito en la Escritura» es formulaico y redundante, y «piedra angular ... honrosa» no suena natural en español eclesial general. «He aquí» y «el que cree en él» funcionan bien. La frase final mejora en naturalidad y fuerza con «jamás será avergonzado».'
  glossary_alignment: 'No hay conflicto con los glosarios principales del proyecto. «Sion», «Jesús» no aparece, y la decisión cristológica de «en él» está bien alineada con el audit trail. La principal desviación es semántico-estilística: ἔντιμον se documentó con matiz de honor, pero en español «honrosa» no preserva bien ese valor idiomáticamente; se justifica usar «preciosa» con nota, ya que el inglés POB ya preservó esa alternativa y en español resulta más natural.'
  issues:
  - severity: medium
    issue: «está escrito en la Escritura» para περιέχει ἐν γραφῇ
    rationale: El griego no dice literalmente «está escrito»; el giro es más bien «está/consta en la Escritura» o «dice la Escritura». La redacción actual añade una formulación tradicional pero menos ceñida y más redundante.
  - severity: medium
    issue: «honrosa» para ἔντιμον
    rationale: Aunque busca preservar el matiz de honor, «una piedra angular honrosa» suena poco idiomático en español. Puede distraer al lector y no comunica bien el valor/honor del término. «Preciosa» es más natural y ya está respaldada como alternativa en la auditoría inglesa.
  - severity: low
    issue: Fuerza enfática insuficiente en «no será avergonzado»
    rationale: οὐ μὴ καταισχυνθῇ es enfático. La nota lo menciona, pero el texto español puede reflejarlo mejor con «jamás será avergonzado» sin perder dignidad ni claridad.
  revised_spanish_text: 'Porque así dice la Escritura[a]: «He aquí, pongo en Sion una piedra angular escogida y preciosa[b], y el que cree en él no será jamás avergonzado[c][d]»'
  revised_footnotes:
