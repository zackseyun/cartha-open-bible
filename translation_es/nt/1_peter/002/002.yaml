translation:
  language: es
  text: Como niños recién nacidos, anhelen la leche pura y racional[a], para que por ella crezcan hacia la salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la leche pura y razonable'. El adjetivo griego puede expresar lo que pertenece a la razón o a la vida interior; aquí probablemente alude al alimento espiritual, no a leche literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: Like
  chosen_spanish: Como
  alternatives_spanish:
  - Tal como
  - Así como
  lexicon: BDAG
  rationale: Introduce una comparación, no una identidad. En español, 'como' expresa de manera natural la similitud del símil sin añadir carga interpretativa.
- source_word: ἀρτιγέννητα βρέφη
  english_pob_choice: newborn infants
  chosen_spanish: recién nacidos
  alternatives_spanish:
  - infantes recién nacidos
  - bebés recién nacidos
  lexicon: BDAG
  rationale: La imagen describe a quienes acaban de nacer. 'Recién nacidos' conserva la fuerza temporal de ἀρτιγέννητα y resulta más fluido en español; el sustantivo implícito sigue siendo el de infantes del símil.
- source_word: τὸ λογικὸν
  english_pob_choice: rational
  chosen_spanish: racional
  alternatives_spanish:
  - espiritual
  - razonable
  lexicon: BDAG
  rationale: El audit trail inglés revisó 'spiritual' a 'rational' para reflejar más directamente λογικόν. En español, 'racional' preserva la tensión interpretativa y evita expandir el sentido a 'espiritual' sin base explícita.
- source_word: ἄδολον
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - sin adulterar
  - incólume
  lexicon: BDAG
  rationale: El adjetivo indica ausencia de mezcla engañosa o adulteración. 'Pura' es idiomática con 'leche' y conserva la cualidad de limpieza/no adulteración.
- source_word: γάλα
  english_pob_choice: milk
  chosen_spanish: leche
  alternatives_spanish:
  - leche nutritiva
  - leche espiritual
  lexicon: BDAG
  rationale: Se mantiene la metáfora de alimento para crecimiento. 'Leche' es el equivalente directo y natural en español.
- source_word: ἐπιποθήσατε
  english_pob_choice: long for
  chosen_spanish: anhelen
  alternatives_spanish:
  - deseen con ardor
  - sientan un fuerte deseo por
  lexicon: BDAG
  rationale: El imperativo aoristo exige un deseo intenso. 'Anhelen' comunica deseo ferviente de forma digna y natural en español.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Marca propósito/resultados. 'Para que' es la forma más natural en español para introducir la cláusula final.
- source_word: ἐν αὐτῷ
  english_pob_choice: by it
  chosen_spanish: por ella
  alternatives_spanish:
  - en ella
  - mediante ella
  lexicon: BDAG
  rationale: El pronombre remite a la leche (femenino en español). 'Por ella' comunica medio/instrumento de manera fluida y se ajusta al valor del griego según el audit trail inglés.
- source_word: αὐξηθῆτε
  english_pob_choice: you may grow
  chosen_spanish: crezcan
  alternatives_spanish:
  - se desarrollen
  - crezcan más
  lexicon: BDAG
  rationale: El verbo expresa crecimiento real, no meramente interior. 'Crezcan' es el equivalente más claro y natural; el subjuntivo mantiene la finalidad de la cláusula.
- source_word: εἰς σωτηρίαν
  english_pob_choice: into salvation
  chosen_spanish: para salvación
  alternatives_spanish:
  - hacia salvación
  - hasta salvación
  lexicon: BDAG
  rationale: '''Para salvación'' conserva la idea de finalidad/resulto sin forzar un calco poco natural como ''hacia salvación''. Aun así, mantiene la tensión direccional del griego hacia la consumación de la salvación.'
theological_decisions:
- issue: λ oγικόν / naturaleza de la leche
  english_pob_reading: Rendered 'rational' in the main text; alternative 'spiritual' preserved in earlier audit context
  chosen_spanish_reading: racional
  alternative_spanish_readings:
  - espiritual
  - razonable
  rationale: La evidencia auditada favorece mantener el matiz de λογικός como 'racional' o 'razonable' más que interpretarlo como 'espiritual'. En español, 'racional' conserva la ambigüedad productiva entre lo relacionado con la mente/la razón y lo que pertenece al interior del ser, sin resolver la tensión prematuramente.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: εἰς σωτηρίαν / dirección hacia la salvación
  english_pob_reading: Retained directional language without softening it to a purely present or purely future doctrinal formula
  chosen_spanish_reading: para salvación
  alternative_spanish_readings:
  - en salvación
  - hasta salvación
  rationale: La expresión griega conserva movimiento hacia la salvación. 'Para salvación' evita fijar la frase en una sola etapa doctrinal y mantiene la orientación teleológica del texto.
  doctrine_reference: Affirmations paragraph on not advocating denominational distinctives unless the Greek unambiguously supports one reading
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego SBLGNT y toma como contexto auditado la revisión inglesa más reciente, que prefirió 'rational' a 'spiritual' para λογικόν. Se conservó la metáfora del alimento y la dirección de εἰς σωτηρίαν sin convertirla en una fórmula doctrinal cerrada.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Leche'' se dejó literal para preservar la imagen metafórica del texto.'
  - '''Racional'' se mantuvo en el texto principal para reflejar el cambio auditado desde ''spiritual'' en el inglés POB.'
  - El sujeto implícito del símil se expresa como 'recién nacidos' para mantener naturalidad y evitar añadir palabras innecesarias.
