translation:
  language: es
  text: o a los gobernadores[a], como enviados por él para el castigo de los que hacen el mal y para la alabanza de los que hacen el bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por él», refiriéndose al rey/emperador mencionado en el versículo anterior; algunos entienden «por medio de él» en el sentido más amplio del ordenamiento de la autoridad por Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: ἡγεμόσιν
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - gobernantes
  - gobernadores provinciales
  lexicon: BDAG
  rationale: En este contexto civil, ἡγεμών designa una autoridad gubernativa. «Gobernadores» conserva el valor oficial sin especificar más de lo que el griego exige.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - como si fueran
  - en cuanto
  lexicon: BDAG
  rationale: Aquí introduce la caracterización de los gobernadores en relación con el rey/ emperador del versículo anterior. «Como» reproduce esa relación de manera natural en español.
- source_word: δι’ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - por medio de él
  - a través de él
  lexicon: BDAG
  rationale: La preposición διά con genitivo expresa agencia o medio. En español, «por él» comunica que los gobernadores actúan como enviados bajo la mediación o autoridad del antecedente inmediato, sin cerrar la tensión contextual sobre si el referente último es el rey o, en sentido más amplio, Dios.
- source_word: πεμπομένοις
  english_pob_choice: sent
  chosen_spanish: enviados
  alternatives_spanish:
  - mandados
  - comisionados
  lexicon: BDAG
  rationale: El participio describe autoridades delegadas. «Enviados» es natural y conserva la idea de misión/delegación sin añadir fuerza interpretativa excesiva.
- source_word: ἐκδίκησιν
  english_pob_choice: the punishment
  chosen_spanish: el castigo
  alternatives_spanish:
  - la venganza
  - la ejecución de justicia
  lexicon: BDAG
  rationale: En un marco gubernamental, ἐκδίκησις apunta a sanción o castigo judicial. «Castigo» preserva esa función pública mejor que «venganza», que en español sugiere un matiz más personal.
- source_word: κακοποιῶν
  english_pob_choice: evildoers
  chosen_spanish: de los que hacen el mal
  alternatives_spanish:
  - de los malhechores
  - de los malvados
  lexicon: BDAG
  rationale: El genitivo califica a personas caracterizadas por hacer el mal. «Los que hacen el mal» mantiene el sentido verbal y evita cerrar el término en una etiqueta más dura de lo necesario.
- source_word: ἔπαινον
  english_pob_choice: the praise
  chosen_spanish: la alabanza
  alternatives_spanish:
  - el reconocimiento
  - el elogio
  lexicon: BDAG
  rationale: El sustantivo equilibra «castigo» en la construcción final. «Alabanza» reproduce bien el paralelo con el texto griego y es idiomática en español bíblico actual.
- source_word: ἀγαθοποιῶν
  english_pob_choice: those who do good
  chosen_spanish: de los que hacen el bien
  alternatives_spanish:
  - de los hacedores del bien
  - de los que obran bien
  lexicon: BDAG
  rationale: La forma griega describe a personas por su conducta. «Los que hacen el bien» conserva la estructura activa y el paralelismo con «los que hacen el mal».
- source_word: εἴτε
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - ya sea
  - sea que
  lexicon: BDAG
  rationale: Continúa la alternativa iniciada en el versículo previo. «O» funciona naturalmente como continuación coordinante en español.
theological_decisions:
- issue: Referencia de δι’ αὐτοῦ
  english_pob_reading: the governors are sent by him, referring to the king/emperor mentioned in the previous verse; some understand the phrase more broadly of God’s ordering of authority
  chosen_spanish_reading: los gobernadores son enviados por él, entendiendo de manera inmediata al rey/emperador del versículo anterior, sin excluir en nota una lectura más amplia de la ordenación de la autoridad por Dios
  alternative_spanish_readings:
  - enviados por el rey/emperador
  - enviados por Dios
  - enviados a través de él
  rationale: La cercanía del antecedente favorece el referente del rey/emperador de 1 Pedro 2:13. A la vez, la forma española «por él» conserva la tensión interpretativa que el audit trail documenta, en lugar de resolverla de modo prematuro.
  doctrine_reference: Preservar la tensión exegética documentada; primacía del texto fuente y del contexto inmediato.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió una expresión más natural para δι’ αὐτοῦ con πεμπομένοις. En español se optó por «por él» para mantener esa naturalidad y, a la vez, conservar la ambigüedad contextual documentada por la nota inglesa.
  spanish_consistency_notes:
  - Se mantuvo «gobernadores» para ἡγεμόσιν, coherente con el registro civil del pasaje.
  - Se tradujo ἐκδίκησιν como «castigo» por el marco judicial del contexto, no como «venganza».
  - Se preservó el paralelismo final «los que hacen el mal / los que hacen el bien» para reflejar la estructura del griego.
  - Se evitó «SEÑOR» como máscara; el referente de la nota se dejó explícito en la nota de pie de página.
  - Se mantuvo el estilo bíblico moderno y readable, sin calco excesivo ni archaismos innecesarios.
