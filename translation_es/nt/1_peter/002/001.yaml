review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el audit trail inglés en la estructura inferencial («Por tanto»), el valor adverbial-preparatorio del participio («habiendo dejado») y la conservación de los plurales («hipocresías», «envidias»). Sin embargo, la nota al pie está anclada al término equivocado: el inglés conserva una nota léxica sobre Ἀποθέμενοι, pero en español se colocó sobre «difamaciones» en vez de sobre «habiendo dejado». Además, falta la nota léxica correspondiente a καταλαλιάς que sí está en el English POB y conviene preservarla en español.'
  spanish_quality_summary: El español es claro y digno, pero la puntuación con comas antes de cada conjunción suena algo pesada y calcada. También «difamaciones» es comprensible, pero en español puede sonar más técnico/jurídico que el campo amplio de καταλαλιάς; «maledicencias» o «hablar mal» captan mejor el sentido de hablar contra otros. Para mantener registro bíblico claro y natural, conviene ajustar puntuación y léxico final.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «malicia», «engaño», «hipocresías» y «envidias» están alineadas con el audit trail. La principal corrección léxica es preferir «maledicencias» para καταλαλιάς y alinear las notas con las decisiones inglesas documentadas.
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada a «difamaciones» pero su contenido explica Ἀποθέμενοι.
    rationale: Esto descoordina texto y nota y no preserva fielmente el audit trail. La marca debe ir junto a «habiendo dejado» o frase equivalente.
  - severity: high
    issue: Falta la nota léxica correspondiente a καταλαλιάς presente en el English POB.
    rationale: El English POB documenta una alternativa significativa («all evil speaking»). En español debe preservarse una nota equivalente, especialmente porque el término escogido puede generar estrechamiento semántico.
  - severity: medium
    issue: «Difamaciones» estrecha y juridifica innecesariamente καταλαλιάς.
    rationale: El griego abarca hablar contra otros de forma dañina en sentido amplio, no solo difamación en sentido técnico. «Maledicencias» refleja mejor el campo semántico y el tono de lista ética.
  - severity: low
    issue: La puntuación con comas antes de cada «y/e» suena poco natural en español moderno.
    rationale: No afecta el sentido fuente, pero una enumeración sin esas comas mejora la legibilidad y evita un calco innecesario del inglés.
