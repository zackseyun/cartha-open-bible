translation:
  language: es
  text: Por tanto, habiendo dejado[a] toda malicia y todo engaño e hipocresías y envidias y todas las maledicencias[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo apartado». El participio griego también puede expresarse de manera más formal como «apartando» o «dejando a un lado».
    reason: lexical_alternative
  - marker: b
    text: O «toda manera de hablar mal». El griego se refiere de manera amplia a hablar contra otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποθέμενοι
  english_pob_choice: having put away
  chosen_spanish: habiendo dejado
  alternatives_spanish:
  - habiendo apartado
  - habiendo desechado
  - dejando
  lexicon: BDAG
  rationale: El participio aoristo medio expresa una acción previa y preparatoria respecto de la exhortación siguiente. «Habiendo dejado» conserva ese valor aspectual y suena natural en español; «dejando» podría sonar más simultáneo o menos completo, y «habiendo apartado» es menos idiomático aquí.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca inferencia lógica desde el contexto anterior. «Por tanto» comunica bien la relación discursiva sin sonar excesivamente coloquial.
- source_word: πᾶσαν κακίαν
  english_pob_choice: all malice
  chosen_spanish: toda malicia
  alternatives_spanish:
  - toda maldad
  - toda perversidad
  - todo mal
  lexicon: BDAG
  rationale: κακία en esta lista de vicios apunta a mala intención o mala disposición hacia otros. «Malicia» conserva esa fuerza interpersonal mejor que un término más general como «maldad».
- source_word: πάντα δόλον
  english_pob_choice: all deceit
  chosen_spanish: todo engaño
  alternatives_spanish:
  - toda astucia
  - toda treta
  - todo dolo
  lexicon: BDAG
  rationale: δόλος denota engaño, astucia o fraude. «Engaño» es claro y actual en español; «dolo» es más técnico y menos transparente para lectura pública.
- source_word: ὑποκρίσεις
  english_pob_choice: hypocrisies
  chosen_spanish: hipocresías
  alternatives_spanish:
  - hipocresía
  - simulaciones
  - apariencias
  lexicon: BDAG
  rationale: El plural griego se conserva en español para reflejar la serie de vicios y la posibilidad de múltiples formas de hipocresía, como en el inglés auditado.
- source_word: φθόνους
  english_pob_choice: envies
  chosen_spanish: envidias
  alternatives_spanish:
  - envidia
  - celos
  - rencores
  lexicon: BDAG
  rationale: El plural también está explícito en griego. «Envidias» mantiene la estructura enumerativa y la concreción de actos o brotes de envidia.
- source_word: πάσας καταλαλιάς
  english_pob_choice: all slanders
  chosen_spanish: todas las difamaciones
  alternatives_spanish:
  - todas las calumnias
  - todo mal hablar
  - todas las habladurías
  lexicon: BDAG
  rationale: καταλαλιά abarca hablar contra otros de modo despectivo o dañino. «Difamaciones» recoge ese campo semántico amplio; «calumnias» puede estrecharse demasiado a la falsedad jurídica, mientras que «habladurías» pierde fuerza.
theological_decisions:
- issue: Valor moral de la lista de vicios
  english_pob_reading: Translate each vice concretely without expanding into doctrinal paraphrase.
  chosen_spanish_reading: Traducir cada vicio de manera concreta, sin ampliar el verso a una paráfrasis doctrinal.
  alternative_spanish_readings:
  - Reformular la lista como una exhortación más general sobre el comportamiento cristiano
  - Suavizar los términos con expresiones menos directas
  rationale: El versículo es una exhortación ética encadenada al contexto inmediato. La traducción debe conservar la concreción de la lista de vicios sin añadir explicaciones que el texto no da.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Sopesar el matiz colectivo del plural griego
  english_pob_reading: The plural forms are retained in English to reflect repeated or varied acts/forms of hypocrisy, envies, and slanders.
  chosen_spanish_reading: Conservar plurales en hipocresías, envidias y difamaciones para reflejar la enumeración griega.
  alternative_spanish_readings:
  - Singularizar hipocresía, envidia y difamación
  - Usar formas genéricas en singular para mayor fluidez
  rationale: Los plurales del griego no son accidentales; forman parte del ritmo y de la intensificación de la lista. Mantenerlos en español ayuda a preservar esa estructura observada en el audit trail inglés.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El audit trail inglés se mantiene en acuerdo alto y no muestra revisiones sustantivas. Para el español se siguió la misma decisión de equivalencia óptima: se conservó el valor preparatorio del participio inicial, la relación inferencial de οὖν y la lista concreta de vicios sin expandir el sentido más allá del griego.'
  spanish_consistency_notes:
  - Se mantuvo un registro digno y moderno, sin calcos innecesarios.
  - Se conservaron los plurales donde el griego los hace explícitos.
  - «Yahvé» no aparece porque el versículo no contiene el nombre divino ni una cita directa del Tetragrámaton.
  - No se introdujo terminología eclesiástica tradicional que alterara el valor léxico del pasaje.
