translation:
  language: es
  text: como personas libres[a], y no usando la libertad como encubrimiento[b] del mal, sino como esclavos[c] de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gente libre» o «los libres». Se elige «personas libres» para conservar el sentido colectivo del plural griego sin marcar género masculino.
    reason: lexical_alternative
  - marker: b
    text: O «pretexto» o «cobertura». «Encubrimiento» mantiene la imagen concreta de algo que cubre u oculta el mal y suena más natural en español en este contexto.
    reason: lexical_alternative
  - marker: c
    text: O «siervos». Se prefiere «esclavos» para conservar el contraste más fuerte con «personas libres» y la tensión teológica del texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεύθεροι
  english_pob_choice: free people
  chosen_spanish: personas libres
  alternatives_spanish:
  - gente libre
  - los libres
  - seres libres
  lexicon: BDAG
  rationale: El adjetivo está en plural y describe colectivamente a los destinatarios. «Personas libres» conserva el sentido social y jurídico de libertad sin introducir una forma masculina innecesaria en español.
- source_word: ἐπικάλυμμα
  english_pob_choice: cover
  chosen_spanish: cobertura
  alternatives_spanish:
  - cobertura
  - cobertura usada como pretexto
  - velo
  - cubierta
  lexicon: BDAG
  rationale: El término griego denota algo que cubre o encubre. «Cobertura» mantiene la imagen concreta y suena natural en español; «pretexto» explicaría el sentido pero perdería la metáfora.
- source_word: ἔχοντες ... τὴν ἐλευθερίαν
  english_pob_choice: using freedom
  chosen_spanish: usan la libertad
  alternatives_spanish:
  - tienen la libertad como
  - emplean la libertad
  - hacen de la libertad
  lexicon: BDAG
  rationale: 'La construcción participial expresa una función instrumental: libertad puesta al servicio de encubrir algo. «Usan la libertad» reproduce esa fuerza sin sonar forzado en español.'
- source_word: κακίας
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - la perversidad
  - el mal moral
  lexicon: BDAG
  rationale: Aquí κακία tiene un alcance general de maldad o mal moral. «El mal» es la forma más amplia y natural en español, y evita restringir indebidamente el sentido a «maldad» en un matiz demasiado estrecho.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  - servidores
  lexicon: BDAG
  rationale: Se conserva «esclavos» porque el contraste con «personas libres» es retórico y teológico. Suavizarlo con «siervos» diluiría la antítesis que el texto enfatiza.
- source_word: θεοῦ δοῦλοι
  english_pob_choice: slaves of God
  chosen_spanish: esclavos de Dios
  alternatives_spanish:
  - siervos de Dios
  - propiedad de Dios
  - pertenecientes a Dios como esclavos
  lexicon: BDAG
  rationale: 'El genitivo señala pertenencia relacional: quienes pertenecen a Dios como esclavos. «Esclavos de Dios» preserva esa relación y la paradoja entre libertad humana y total pertenencia a Dios.'
theological_decisions:
- issue: Contraste entre libertad cristiana y esclavitud a Dios
  english_pob_reading: slaves of God
  chosen_spanish_reading: esclavos de Dios
  alternative_spanish_readings:
  - siervos de Dios
  - servidores de Dios
  rationale: La tensión del versículo depende de oponer la libertad social a una pertenencia total a Dios. Mantener «esclavos» conserva el choque retórico y evita suavizar la afirmación doctrinal.
  doctrine_reference: 'DOCTRINE.md: contested terms for δοῦλος; translation philosophy on preserving strong contrasts'
translation_notes:
  revision_awareness: Se revisó el texto con base en el SBLGNT y en el audit trail en inglés. La traducción inglesa final fue revisada y quedó sin cambios; la versión española sigue esa lectura, pero adapta con naturalidad idiomática el participio griego y preserva la fuerza lexical de δοῦλοι y del contraste libertad/esclavitud.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ y no se introdujo «Señor», porque el texto griego usa θεοῦ explícitamente.
  - Se evitó «Cristo» y otras sustituciones no presentes en el versículo.
  - La expresión «personas libres» conserva el plural colectivo y evita sesgo masculino.
  - «Esclavos de Dios» se mantiene de forma consistente en el texto y en las notas para preservar la tensión semántica del pasaje.
