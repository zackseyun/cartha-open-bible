review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido global del griego: contraste enfático («Pero ustedes»), los cuatro títulos corporativos, la finalidad («para que»), la proclamación de las ἀρεταί, y el movimiento de salida de las tinieblas a la luz. Sin embargo, hay dos desajustes importantes con la evidencia fuente y con el rastro POB: (1) γένος ἐκλεκτόν se documentó en inglés como «a chosen people», con nota para «race»; el español principal «linaje escogido» inclina el sentido hacia ascendencia/estirpe más que pueblo corporativo. (2) λαὸς εἰς περιποίησιν quedó en un español poco natural («pueblo para posesión») y además no sigue la decisión POB de explicitar el poseedor por claridad contextual. También la nota [b] está anclada en la frase equivocada: las alternativas «alabanzas / poderosos hechos» pertenecen a «las excelencias», no a «posesión».'
  spanish_quality_summary: El texto es mayormente digno y legible, pero «pueblo para posesión» suena antinatural en español bíblico actual. «Linaje escogido» es posible, pero menos claro que «pueblo escogido» para una audiencia amplia y puede sugerir genealogía más que identidad corporativa del pueblo de Dios. «Anuncien» funciona, aunque «proclamen» también sería fuerte; no requiere cambio. La sintaxis general es buena.
  glossary_alignment: 'No hay conflicto con términos troncales del glosario (Mesías/Cristo, Yahvé, etc.). Las decisiones principales a ajustar son internas al versículo: preferir «pueblo escogido» para γένος ἐκλεκτόν en línea con la racionalidad POB, y expresar λαὸς εἰς περιποίησιν de forma idiomática y contextual, aquí «pueblo para su posesión». También debe corregirse la colocación de la nota léxica sobre ἀρετάς.'
  issues:
  - severity: high
    issue: γένος ἐκλεκτόν traducido como «linaje escogido» en vez de reflejar la elección POB «chosen people».
    rationale: Aunque γένος puede incluir «linaje», el rastro auditado explica que se eligió «people» para evitar sobretonos étnicos y preservar el sentido corporativo. En español, «linaje» resalta ascendencia/genealogía más que comunidad pactual amplia; «pueblo escogido» comunica mejor el sentido y la intención documentada.
  - severity: high
    issue: λαὸς εἰς περιποίησιν traducido como «pueblo para posesión».
    rationale: La frase es poco natural en español y oscurece el sentido de pertenencia especial. El POB inglés explicitó legítimamente el poseedor por claridad contextual; en español «pueblo para su posesión» o «pueblo que le pertenece» es mucho más fiel y legible.
  - severity: high
    issue: La nota [b] está anclada a «posesión» pero su contenido corresponde a τὰς ἀρετὰς («excelencias»).
    rationale: Las alternativas «alabanzas» y «poderosos hechos» son opciones léxicas para ἀρετάς, no para περιποίησις. Debe moverse el marcador al término «excelencias» para mantener integridad crítica y utilidad del aparato.
  - severity: low
    issue: La nota sobre γένος enumera «linaje» como texto principal y menciona «stock», término poco idiomático en español.
    rationale: 'Conviene reformular la nota en español natural y alinearla con la razón documentada: evitar connotaciones étnicas modernas de «raza» sin perder el sentido corporativo.'
