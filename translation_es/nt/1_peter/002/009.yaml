translation:
  language: es
  text: Pero ustedes son pueblo escogido[a], sacerdocio real, nación santa, pueblo para su posesión, para que proclamen las excelencias[b] de Aquel que los llamó de las tinieblas a su luz maravillosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «linaje escogido» o «raza escogida». El término griego puede denotar pueblo, linaje o raza; «pueblo escogido» se usa aquí para evitar connotaciones étnicas modernas engañosas y conservar el sentido corporativo.
    reason: lexical_alternative
  - marker: b
    text: O «las alabanzas» o «los poderosos hechos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς δὲ
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Pero vosotros
  - Y ustedes
  lexicon: SBLGNT; BDAG
  rationale: δὲ marca contraste, y Ὑμεῖς es enfático. «Pero ustedes» conserva la oposición retórica y el señalamiento directo en un español natural y ampliamente inteligible.
- source_word: γένος ἐκλεκτόν
  english_pob_choice: a chosen people
  chosen_spanish: linaje escogido
  alternatives_spanish:
  - pueblo escogido
  - raza escogida
  lexicon: BDAG
  rationale: γένος puede significar linaje, stock, pueblo o raza. En español, «linaje» mantiene la idea de pertenencia corporativa y de origen común sin cargar el texto con el peso moderno de «raza»; la nota preserva la alternativa textual/lexicala de «pueblo» y «raza».
- source_word: βασίλειον ἱεράτευμα
  english_pob_choice: a royal priesthood
  chosen_spanish: sacerdocio real
  alternatives_spanish:
  - sacerdocio regio
  - un reino de sacerdotes
  lexicon: BDAG
  rationale: La expresión es nominal y compacta. «Sacerdocio real» reproduce de forma natural la relación entre lo real y lo sacerdotal sin reinterpretarla como «reino de sacerdotes», que se acerca más a la formulación de Éxodo/LXX que a la construcción griega aquí.
- source_word: ἔθνος ἅγιον
  english_pob_choice: a holy nation
  chosen_spanish: nación santa
  alternatives_spanish:
  - nación consagrada
  lexicon: BDAG
  rationale: «Santa» conserva mejor el valor de pertenencia a Dios y de distinción pactal que una explicación como «consagrada», aunque esta última es posible en contexto.
- source_word: λαὸς εἰς περιποίησιν
  english_pob_choice: a people for his own possession
  chosen_spanish: pueblo para posesión
  alternatives_spanish:
  - pueblo para ser de propiedad de él
  - pueblo que le pertenece
  - pueblo adquirido
  lexicon: BDAG
  rationale: περιποίησις aquí expresa posesión/adquisición, la idea de pertenecer de manera especial. «Pueblo para posesión» mantiene la fuerza nominal del griego y deja la relación posesiva implícita, como en el original; la nota marca la opción inglesa de explicitar el poseedor.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce propósito. «Para que» es la equivalencia más directa y natural en español.
- source_word: τὰς ἀρετὰς
  english_pob_choice: the excellencies
  chosen_spanish: las excelencias
  alternatives_spanish:
  - las virtudes
  - las alabanzas
  - las maravillas
  lexicon: BDAG
  rationale: ἀρετή puede abarcar excelencia, virtud o cualidad digna de alabanza. «Excelencias» conserva esa amplitud y permite incluir tanto el carácter como las obras de Dios; la nota preserva la alternativa de «alabanzas» que el inglés documenta.
- source_word: ἐξαγγείλητε
  english_pob_choice: you may proclaim
  chosen_spanish: anuncien
  alternatives_spanish:
  - proclamen
  - declaren
  - publiquen
  lexicon: BDAG
  rationale: El subjuntivo aoristo expresa finalidad. «Anuncien» transmite la proclamación pública de manera clara y digna; «proclamen» también es viable, pero «anuncien» suena menos cargado de registro técnico en español.
- source_word: τοῦ ἐκ σκότους ὑμᾶς καλέσαντος
  english_pob_choice: of the one who called you out of darkness
  chosen_spanish: de Aquel que los llamó de las tinieblas
  alternatives_spanish:
  - de quien los llamó de la oscuridad
  - del que los llamó fuera de las tinieblas
  lexicon: BDAG
  rationale: La estructura participial identifica a Dios por su acto. «Aquel que» mantiene la referencia personal elevada del texto; «tinieblas» conserva la metáfora bíblica clásica de ἐκ σκότους sin suavizarla a una mera abstracción.
- source_word: εἰς τὸ θαυμαστὸν αὐτοῦ φῶς
  english_pob_choice: into his marvelous light
  chosen_spanish: a su luz maravillosa
  alternatives_spanish:
  - a su luz admirable
  - a su luz asombrosa
  lexicon: BDAG
  rationale: εἰς aquí expresa dirección/meta. En español, «a su luz maravillosa» fluye de manera natural y conserva el matiz de maravilla/asombro de θαυμαστός; la preposición «a» funciona idiomáticamente con verbos de movimiento implícito como «llamar».
theological_decisions:
- issue: Títulos corporativos de Israel aplicados a la comunidad creyente
  english_pob_reading: Retain the OT-derived collective descriptors in direct form ('chosen people,' 'royal priesthood,' 'holy nation') without softening them into mere metaphor.
  chosen_spanish_reading: 'Mantener los títulos colectivos en forma directa: «linaje escogido», «sacerdocio real», «nación santa».'
  alternative_spanish_readings:
  - Reformularlos de modo más abstracto para evitar la fuerza intertextual
  - Añadir explicaciones interpretativas dentro del texto
  rationale: El versículo aplica intencionalmente lenguaje pactal de Israel a la audiencia de Pedro. La traducción debe preservar esa fuerza teológica e intertextual sin atenuarla ni expandirla innecesariamente.
  doctrine_reference: Affirmations; 1 Pedro 2:9; Éxodo 19:6
- issue: Posesión implícita en περιποίησις
  english_pob_reading: Make the possessive referent explicit with 'his' in English.
  chosen_spanish_reading: Dejar «pueblo para posesión» sin explicitar el poseedor en el cuerpo del texto.
  alternative_spanish_readings:
  - pueblo para su posesión
  - pueblo que le pertenece
  rationale: El griego de la frase no repite un posesivo explícito equivalente en esta construcción; por eso el español puede conservar la misma sobriedad sintáctica. La relación con Dios se entiende por el contexto inmediato, y la nota registra la alternativa explicativa.
  doctrine_reference: Traducción de περιποίησις; coherencia con el griego
- issue: Valor de τὰς ἀρετὰς
  english_pob_reading: '''the excellencies'' with footnoted alternatives ''the praises'' or ''the mighty deeds''.'
  chosen_spanish_reading: «las excelencias» en el texto principal, con nota sobre «las alabanzas» y «los poderosos hechos».
  alternative_spanish_readings:
  - las alabanzas
  - los poderosos hechos
  - las virtudes
  rationale: La frase puede abarcar tanto las cualidades dignas de alabanza como sus acciones poderosas. «Excelencias» mantiene la amplitud semántica sin reducirla a una sola dimensión.
  doctrine_reference: BDAG; 1 Pedro 2:9
translation_notes:
  revision_awareness: 'Coincide con el contexto de revisión más reciente: no hubo cambios aplicados en la pasada revisión, y la lectura griega sigue alta en concordancia con la solución inglesa auditada. La propuesta española mantiene esa misma línea, con decisiones lexicales explicadas y sin introducir reinterpretaciones nuevas.'
  spanish_consistency_notes:
  - Se conserva el contraste inicial de δὲ con «Pero» y la dirección final de εἰς con «a».
  - «Tinieblas» y «luz maravillosa» sostienen la imaginería bíblica sin domesticación.
  - «Excelencias» evita estrechar ἀρετὰς a una sola opción y la nota preserva la alternativa documentada.
  - Se evita la sustitución automática de terminología pactal por lenguaje eclesial más tradicional cuando el griego pide una equivalencia más directa.
