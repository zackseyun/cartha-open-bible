translation:
  language: es
  text: quien[a], cuando era insultado, no insultaba en respuesta; cuando sufría, no amenazaba, sino que se encomendaba[b] al que juzga con justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando era vituperado, no vituperaba en respuesta».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sino que seguía encomendándose al que juzga rectamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λοιδορούμενος
  english_pob_choice: when he was insulted
  chosen_spanish: cuando era insultado
  alternatives_spanish:
  - cuando era vituperado
  - cuando era maldecido
  lexicon: BDAG
  rationale: El participio pasivo expresa que recibía injurias verbales. «Insultado» es claro y natural en español moderno, y conserva el sentido de abuso verbal sin volver demasiado técnico el registro.
- source_word: ἀντελοιδόρει
  english_pob_choice: did not insult in return
  chosen_spanish: no insultaba en respuesta
  alternatives_spanish:
  - no devolvía insulto por insulto
  - no vituperaba en respuesta
  lexicon: BDAG
  rationale: El imperfecto sugiere una acción repetida o característica en el pasado; «no insultaba en respuesta» comunica bien la reciprocidad negada por ἀντί- y mantiene fluidez en español.
- source_word: πάσχων
  english_pob_choice: when he suffered
  chosen_spanish: cuando sufría
  alternatives_spanish:
  - mientras sufría
  - sufriendo
  lexicon: BDAG
  rationale: El participio presente puede funcionar circunstancialmente. En español, «cuando sufría» conserva la relación temporal paralela con la cláusula anterior y suena más natural que una simple forma absoluta.
- source_word: ἠπείλει
  english_pob_choice: he did not threaten
  chosen_spanish: no amenazaba
  alternatives_spanish:
  - no hacía amenazas
  - no amenazaba con nada
  lexicon: BDAG
  rationale: El verbo se refiere a proferir amenazas. El imperfecto en español se refleja mejor con «no amenazaba», que conserva el aspecto imperfectivo y la idea de conducta sostenida.
- source_word: παρεδίδου
  english_pob_choice: kept entrusting himself
  chosen_spanish: se encomendaba
  alternatives_spanish:
  - seguía encomendándose
  - seguía confiándose
  lexicon: BDAG
  rationale: El imperfecto aquí expresa una entrega continua. En español, «se encomendaba» es una forma natural y fiel para un acto de confiarse/ponerse en manos de otro, sin añadir más de lo que el texto dice.
- source_word: τῷ κρίνοντι δικαίως
  english_pob_choice: to the one who judges justly
  chosen_spanish: al que juzga con justicia
  alternatives_spanish:
  - al que juzga rectamente
  - al que juzga justamente
  lexicon: BDAG
  rationale: La construcción articular participial describe a Dios de manera relacional, no como título fijo. «Al que juzga con justicia» preserva esa descripción y el adverbio δικαίως sin forzar una formulación más rígida.
- source_word: ὃς
  english_pob_choice: who
  chosen_spanish: quien
  alternatives_spanish:
  - el cual
  - que
  lexicon: BDAG
  rationale: El relativo introduce la continuación del referente de Cristo desde el versículo anterior. «Quien» suena natural al inicio de la cláusula y mantiene la referencia personal.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - y
  lexicon: BDAG
  rationale: En esta coordinación, la fuerza contrastiva se expresa mejor con una construcción adversativa que conecte la negativa previa con la acción positiva de encomendarse. «Sino que» funciona bien tras la negación y refleja el contraste del griego.
theological_decisions:
- issue: Referente de «al que juzga con justicia»
  english_pob_reading: God the Father is the implied referent, expressed descriptively rather than by explicit title.
  chosen_spanish_reading: Dios es el referente implícito, expresado descriptivamente y sin añadir un título más específico.
  alternative_spanish_readings:
  - una referencia general a Dios sin precisar persona
  - el Juez justo como título
  rationale: El griego presenta un participio articular descriptivo. En español conviene mantener la misma apertura, sin concretar más de lo que el texto afirma ni borrar la referencia a Dios como juez recto.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene una equivalencia óptima con notas alternativas para λοιδορούμενος/ἀντελοιδόρει y παρεδίδου/τῷ κρίνοντι δικαίως. La presente redacción española sigue ese mismo patrón, conservando el paralelismo temporal y el contraste, con una formulación natural en español y sin introducir títulos teológicos no explicitados por el griego.
  spanish_consistency_notes:
  - Se usa «insultado/insultaba» para conservar el campo semántico verbal de λοιδορέω sin sobrecargar con un arcaísmo.
  - «Se encomendaba» refleja el imperfecto de continuidad de παρεδίδου; no se traduce como una acción puntual.
  - Se evita «SEÑOR» o cualquier título equivalente, porque τῷ κρίνοντι δικαίως es descriptivo y no nominal.
  - Se mantiene «con justicia» para δικαίως, siguiendo la claridad del adverbio griego.
  - La estructura con «sino que» preserva el contraste entre la negativa y la entrega confiada.
