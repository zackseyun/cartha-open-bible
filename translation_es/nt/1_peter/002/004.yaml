translation:
  language: es
  text: A medida que se acercan a él[a], piedra viviente, rechazada por los hombres[b], pero elegida y preciosa delante de Dios,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a quien, acercándose» o «mientras se acercan a él».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «por los hombres»; es decir, por seres humanos o personas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρὸς ὃν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - para él
  lexicon: BDAG
  rationale: La preposición πρός con pronombre personal expresa dirección o acercamiento; en español, «a él» comunica de forma natural la orientación hacia la persona referida sin perder el sentido direccional.
- source_word: προσερχόμενοι
  english_pob_choice: as you come
  chosen_spanish: al acercarse
  alternatives_spanish:
  - mientras se acercan
  - cuando se acercan
  lexicon: BDAG
  rationale: El participio presente mantiene una acción continua vinculada a los lectores. «Al acercarse» conserva el valor aspectual y suena natural en español en una construcción temporal/participial.
- source_word: λίθον
  english_pob_choice: stone
  chosen_spanish: piedra
  alternatives_spanish:
  - piedra de construcción
  - bloque de piedra
  lexicon: BDAG
  rationale: λίθος designa una piedra, y en el contexto de la imagen edificatoria «piedra» mantiene la metáfora sin sobreespecificarla.
- source_word: ζῶντα
  english_pob_choice: living
  chosen_spanish: viviente
  alternatives_spanish:
  - viva
  - vivo
  lexicon: BDAG
  rationale: «Viviente» conserva el contraste paradójico de la imagen y funciona bien como adjetivo de «piedra» en un registro bíblico claro y actual.
- source_word: ὑπὸ ἀνθρώπων
  english_pob_choice: by men
  chosen_spanish: por los hombres
  alternatives_spanish:
  - por la gente
  - por los seres humanos
  lexicon: BDAG
  rationale: El griego usa plural masculino y contrapone juicio humano con juicio divino. «Los hombres» preserva la forma y la fuerza retórica; la posibilidad inclusiva puede explicitarse aparte si se desea.
- source_word: ἀποδεδοκιμασμένον
  english_pob_choice: rejected
  chosen_spanish: rechazada
  alternatives_spanish:
  - desaprobada
  - descartada tras ser probada
  lexicon: BDAG
  rationale: El participio perfecto pasivo comunica una evaluación previa que terminó en rechazo. «Rechazada» es la traducción más natural y concisa; el matiz de examen previo queda implícito.
- source_word: παρὰ δὲ θεῷ
  english_pob_choice: in the sight of God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - a juicio de Dios
  lexicon: BDAG
  rationale: παρά con dativo expresa relación o evaluación. «Delante de Dios» reproduce bien la idea de estar en la esfera de su valoración, con un español bíblico inteligible.
- source_word: ἐκλεκτὸν
  english_pob_choice: chosen
  chosen_spanish: elegida
  alternatives_spanish:
  - escogida
  - elegido
  lexicon: BDAG
  rationale: ἐκλεκτός remite a selección divina. «Elegida» fluye naturalmente con «piedra» en español y conserva el sentido de elección.
- source_word: ἔντιμον
  english_pob_choice: precious
  chosen_spanish: preciosa
  alternatives_spanish:
  - honrada
  - de gran valor
  lexicon: BDAG
  rationale: ἔντιμος expresa alto valor y honor. «Preciosa» mantiene la imagen de la piedra y comunica valor estimado sin recurrir a un tecnicismo.
theological_decisions:
- issue: Referente implícito de «él» y la metáfora de la piedra
  english_pob_reading: The verse refers to the Lord Jesus/Messiah as the living stone.
  chosen_spanish_reading: El versículo alude a Jesús/Mesías como la piedra viviente.
  alternative_spanish_readings:
  - el Señor Jesús
  - el Cristo
  rationale: El contexto inmediato y el encadenamiento de textos de piedra en 1 Pedro identifican el referente como Cristo. El pronombre se conserva sin añadir el nombre en el texto principal, pero la nota puede orientar al lector.
  doctrine_reference: Credo Niceno; filosofía de traducción del POB
- issue: Valor de ἀνθρώπων
  english_pob_reading: '''men'' in the main text, with inclusive alternative preserved in a footnote.'
  chosen_spanish_reading: «los hombres» en el texto principal, con alternativa inclusiva en nota.
  alternative_spanish_readings:
  - «las personas»
  - «los seres humanos»
  rationale: La forma griega es masculina plural y el POB privilegia la correspondencia con la forma fuente. En español, la nota puede aclarar que se trata de seres humanos en general sin borrar la forma del original.
  doctrine_reference: Filosofía de traducción del POB §4
translation_notes:
  revision_awareness: El borrador sigue el acuerdo alto del auditor y no introduce cambios de sentido respecto del texto griego ni del rastro de decisiones inglés. Se conservan la metáfora de la piedra, el contraste humano/divino y el matiz de elección y honor sin suavizarlos.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando aparece el nombre divino; aquí no aplica.
  - «Mesías» no aparece en el texto porque el versículo no lo nombra explícitamente; el referente queda implícito en la nota teológica.
  - 'Se mantiene un registro bíblico contemporáneo: «piedra viviente», «rechazada», «elegida», «preciosa».'
  - Las notas distinguen entre alternativa sintáctica («a él» / «hacia él») y aclaración semántica de ἀνθρώπων.
