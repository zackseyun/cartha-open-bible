translation:
  language: es
  text: ustedes que en otro tiempo no eran pueblo[a], pero ahora son pueblo de Dios; ustedes que no habían recibido misericordia[b], pero ahora han recibido misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pedro evoca Oseas 1:9-10; 2:23 y aplica a sus lectores el lenguaje de restauración de Israel en su identidad presente como pueblo de Dios.
    reason: cross_reference
  - marker: b
    text: 'O también: «ustedes que no se les había mostrado misericordia, pero ahora se les ha mostrado misericordia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵ
  english_pob_choice: you who
  chosen_spanish: ustedes que
  alternatives_spanish:
  - quienes
  - los que
  lexicon: BDAG
  rationale: El relativo nominativo plural retoma a los destinatarios del contexto previo. «Ustedes que» conserva la referencia discursiva y suena natural en español sin añadir contenido ajeno al griego.
- source_word: ποτε
  english_pob_choice: once
  chosen_spanish: en otro tiempo
  alternatives_spanish:
  - antes
  - una vez
  lexicon: BDAG
  rationale: Marca contraste temporal con νῦν («ahora»). «En otro tiempo» es claro y digno en español, y preserva el valor de estado anterior.
- source_word: λαὸς
  english_pob_choice: a people / God's people
  chosen_spanish: pueblo
  alternatives_spanish:
  - un pueblo
  - gente
  - nación
  lexicon: BDAG
  rationale: Aquí λαός tiene sentido corporativo y de identidad de pacto. En la primera cláusula, «no eran pueblo» mantiene la negación del estado corporativo sin forzar una expansión interpretativa; en la segunda, «pueblo de Dios» expresa de manera natural el genitivo posesivo.
- source_word: θεοῦ
  english_pob_choice: God's
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - perteneciente a Dios
  lexicon: BDAG
  rationale: El genitivo es posesivo/covenantal. «De Dios» es la forma más natural y fiel en español.
- source_word: οὐκ ἠλεημένοι
  english_pob_choice: had not received mercy
  chosen_spanish: no habían recibido misericordia
  alternatives_spanish:
  - no se les había mostrado misericordia
  - no habían sido objeto de misericordia
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe un estado previo no beneficiado por misericordia. «No habían recibido misericordia» comunica bien ese estado resultante y mantiene la correspondencia léxica con la segunda mitad.
- source_word: ἐλεηθέντες
  english_pob_choice: have received mercy
  chosen_spanish: han recibido misericordia
  alternatives_spanish:
  - han sido objeto de misericordia
  - se les ha mostrado misericordia
  lexicon: BDAG
  rationale: El aoristo pasivo participial contrasta con el estado previo. «Han recibido misericordia» expresa en español el resultado presente de la acción misericordiosa de Dios con buena continuidad verbal.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - mas
  - y
  lexicon: BDAG
  rationale: La partícula introduce contraste fuerte entre el estado anterior y el actual. «Pero» es la opción más clara y natural en español.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este tiempo
  - actualmente
  lexicon: BDAG
  rationale: Indica el presente de contraste con el pasado señalado por ποτε. «Ahora» es directo e idiomático.
theological_decisions:
- issue: Alusión a Oseas y lenguaje de restauración del pacto
  english_pob_reading: Preserve the corporate covenant reversal without importing a narrower ethnic or denominational claim.
  chosen_spanish_reading: Conservar la reversión corporativa del pacto, manteniendo la oposición entre el estado previo y la pertenencia actual al pueblo de Dios, sin estrecharla a un grupo étnico o confesional más reducido de lo que el texto dice.
  alternative_spanish_readings:
  - 'Traducir de forma más literal: «no pueblo ... pueblo de Dios»'
  - Reformular explícitamente ambos miembros como «no eran pueblo de Dios ... ahora son pueblo de Dios»
  rationale: 'El griego dice primero «no pueblo» y luego «pueblo de Dios». La versión española mantiene esa tensión: la primera cláusula conserva la forma breve del original y la segunda explicita la pertenencia a Dios. Así se deja oír el trasfondo de Oseas sin borrar la diferencia textual entre las dos mitades.'
  doctrine_reference: Philosophy items 1, 3, and 5
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado del texto fuente inglés: no se registraron cambios aplicados y el control cruzado informó alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo «pueblo de Dios» como término de pacto, coherente con el inglés auditado.
  - Se preservó la alternancia temporal pasado/ahora con «en otro tiempo» y «ahora».
  - Se evitó «SEÑOR» porque el texto fuente no contiene el nombre divino; el genitivo θεοῦ se traduce directamente como «de Dios».
  - Se conservó la repetición de «misericordia» para reflejar la unidad léxica del pasaje.
