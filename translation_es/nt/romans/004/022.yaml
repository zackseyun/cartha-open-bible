lexical_decisions:
- source_word: διό
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la relación inferencial con el contexto anterior, manteniendo el valor lógico de conclusión sin sonar rígido.
- source_word: ἐλογίσθη
  english_pob_choice: was counted
  chosen_spanish: le fue contado
  alternatives_spanish:
  - le fue acreditado
  - fue considerado
  - le fue calculado
  lexicon: BDAG
  rationale: Conserva la pasiva y la imagen de imputación/registro presente en el verbo griego, evitando sustituirla por una paráfrasis interpretativa.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: BDAG
  rationale: El dativo personal se expresa de forma natural con el clítico indirecto en español; el referente sigue siendo Abraham en el contexto inmediato.
- source_word: εἰς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - en
  - para
  lexicon: BDAG
  rationale: En la construcción ἐλογίσθη ... εἰς δικαιοσύνην, «como» comunica mejor el resultado o estatuto asignado en español actual que un calco más duro.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia justificadora
  lexicon: BDAG
  rationale: Aquí se mantiene la alternativa semántica documentada por el propio audit trail en una nota, porque el término puede abarcar tanto «righteousness» como «justice»; en español, «justicia» conserva esa tensión mejor que una glosa doctrinal cerrada.
theological_decisions:
- issue: Conservar el lenguaje paulino de imputación/cómputo sin añadir explicación doctrinal ajena al versículo
  english_pob_reading: was counted to him as righteousness
  chosen_spanish_reading: le fue contado como justicia
  alternative_spanish_readings:
  - le fue acreditado como justicia
  - le fue considerado como justicia
  - le fue contado como rectitud
  rationale: La formulación española mantiene la metáfora contable y la voz pasiva del texto, sin resolver la relación teológica entre fe, cuenta e identidad con términos interpretativos no presentes explícitamente en el griego.
  doctrine_reference: Preservar la tensión teológica documentada; consistencia terminológica en Romanos 4.
translation_notes:
  revision_awareness: El texto base inglés ya había fijado la estructura inferencial, la pasiva contable y la alternativa semántica de δικαιοσύνη; no se registraron revisiones posteriores que alteren esas decisiones.
  spanish_consistency_notes:
  - Se prefirió «justicia» para δικαιοσύνη por la terminología paulina y para conservar la alternativa semántica documentada.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes porque el versículo no contiene el nombre divino ni una cita directa de κύριος.
  - La pasiva española «le fue contado» conserva el valor de ἐλογίσθη sin convertirlo en una construcción activa interpretativa.
