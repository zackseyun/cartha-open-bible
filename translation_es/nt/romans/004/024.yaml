  to: pero también por nosotros[a], a quienes se les acreditará[b]—a nosotros que creemos en el que levantó a Jesús, nuestro Señor, de entre los muertos.
  rationale: Se corrige la discordancia plural («se les») y se sustituye «contará» por «acreditará» para reflejar mejor λογίζεσθαι dentro del argumento contable/forense de Romanos 4. Se mantienen la elipsis del objeto implícito y las demás decisiones acertadas del borrador.
