translation:
  language: es
  text: pero también por nosotros[a], a quienes se les acreditará[b]—a nosotros que creemos en el que levantó a Jesús, nuestro Señor, de entre los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para nosotros», o «a causa de nosotros».
    reason: lexical_alternative
  - marker: b
    text: O «se les contará», «se les reputará» o «se les computará».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ
  english_pob_choice: but also
  chosen_spanish: pero también
  alternatives_spanish:
  - sino también
  - mas también
  lexicon: BDAG
  rationale: Conserva el valor adversativo y aditivo a la vez. En español, «pero también» comunica con naturalidad la continuidad con el argumento anterior sin perder el contraste.
- source_word: δι’ ἡμᾶς
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - para nosotros
  - a causa de nosotros
  lexicon: BDAG
  rationale: διά con acusativo puede expresar referencia o relación de beneficio/interés. «Por nosotros» mantiene esa orientación y resulta idiomático en español, sin forzar una causalidad que el contexto no exige.
- source_word: οἷς
  english_pob_choice: to whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - para quienes
  lexicon: BDAG
  rationale: El dativo relativo se vierte naturalmente con «a quienes» en español, manteniendo la relación con el pasivo de λογίζομαι.
- source_word: μέλλει λογίζεσθαι
  english_pob_choice: it will be credited
  chosen_spanish: se le contará
  alternatives_spanish:
  - se le acreditará
  - se le reputará
  - se le computará
  lexicon: BDAG
  rationale: «Contar» preserva el campo semántico de cálculo/registro de λογίζομαι y permite una construcción impersonal fluida en español. «Se le» conserva el objeto implícito del contexto inmediato sin añadirlo de forma explícita.
- source_word: τοῖς πιστεύουσιν
  english_pob_choice: to us who believe
  chosen_spanish: a nosotros que creemos
  alternatives_spanish:
  - a los que creen
  - a quienes creen
  lexicon: BDAG
  rationale: La construcción articular con participio identifica al grupo en vista. «A nosotros que creemos» mantiene el enlace con «por nosotros» y refleja el sentido inclusivo que el contexto paulino ya había establecido.
- source_word: πιστεύουσιν ἐπὶ
  english_pob_choice: believe in
  chosen_spanish: creemos en
  alternatives_spanish:
  - confiamos en
  - creemos sobre
  lexicon: BDAG
  rationale: «Creer en» expresa de manera natural la orientación de πίστευω con ἐπί + acusativo hacia una persona. «Confiamos en» es posible, pero «creemos en» sigue más de cerca la formulación del texto y el tono paulino.
- source_word: τὸν ἐγείραντα
  english_pob_choice: the one who raised
  chosen_spanish: el que levantó
  alternatives_spanish:
  - el que resucitó
  - el que hizo levantar
  lexicon: BDAG
  rationale: El participio aoristo activo funciona sustantivamente para referirse a Dios por su acción. «Levantó» reproduce de forma sobria el acto de resucitar; en español «resucitó» sería posible, pero «levantó» deja más visible la metáfora verbal del griego.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - Jesús
  lexicon: standard transliteration
  rationale: Nombre propio estándar en español, con la preposición requerida por la sintaxis.
- source_word: τὸν κύριον ἡμῶν
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - el Señor nuestro
  lexicon: BDAG
  rationale: Se conserva «Señor» como equivalente de κύριος en este título cristológico ya fijado por el uso del Nuevo Testamento en español. La posesión se expresa de forma natural con «nuestro».
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: «De entre los muertos» es una fórmula idiomática en español bíblico que conserva la imagen de resurrección y evita ambigüedad. Mantiene mejor el plural sustantivado del griego que una simple preposición de origen.
theological_decisions:
- issue: Objeto implícito de λογίζεσθαι / marco de justificación
  english_pob_reading: 'Included ''it'' in English: ''to whom it will be credited'''
  chosen_spanish_reading: «se le contará» sin añadir un objeto explícito
  alternative_spanish_readings:
  - se le contará la justicia
  - se le acreditará
  rationale: El griego omite el objeto porque se sobreentiende del contexto inmediato. En español también puede conservarse esa elipsis con claridad mediante una construcción pronominal. Añadir «la justicia» resolvería la referencia, pero iría más allá de la forma de este verso y reduciría la tensión retórica del pasaje dentro del argumento de Romanos 4.
  doctrine_reference: Romanos 4; justificación/contabilización imputada en el contexto paulino
- issue: Relación de πίστευω con ἐπί + acusativo
  english_pob_reading: Or 'trust in.'
  chosen_spanish_reading: «creemos en»
  alternative_spanish_readings:
  - confiamos en
  - creemos sobre
  rationale: La frase griega expresa fe dirigida hacia una persona. «Creer en» transmite esa dirección sin introducir una dicotomía artificial entre creer y confiar; en español, «confiar en» sería válido, pero alteraría levemente el registro y la correspondencia con la forma verbal elegida para el verso.
  doctrine_reference: Fe salvadora dirigida a Dios que resucitó a Jesús
- issue: Título cristológico κύριος
  english_pob_reading: our Lord
  chosen_spanish_reading: «nuestro Señor»
  alternative_spanish_readings:
  - «el Señor nuestro»
  - «nuestro Dueño»
  rationale: Se mantiene la terminología cristológica estándar y reverente de «Señor», ya que el texto aplica el título a Jesús. «Dueño» sería demasiado extraño y no responde al uso bíblico español; «Señor» conserva la carga litúrgica sin perder fidelidad.
  doctrine_reference: Cristología del Nuevo Testamento
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail; la presente versión sigue el texto griego SBLGNT y mantiene la lectura de alta concordancia del control cruzado, resolviendo en español la elipsis de λογίζεσθαι sin explicitar el objeto.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que obligue a aplicarlo.
  - Se usó «Señor» para κύριος conforme al tratamiento cristológico ya fijado en el contexto del NT español del proyecto.
  - Se prefirió una construcción impersonal con «se le contará» para respetar la elipsis del griego y la contabilidad metafórica de Romanos 4.
