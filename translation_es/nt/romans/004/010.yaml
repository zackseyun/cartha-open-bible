translation:
  language: es
  text: ¿Cómo, pues, le fue contado[a]? ¿Mientras estaba circuncidado, o incircunciso? No mientras estaba circuncidado, sino incircunciso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le fue acreditado» o «le fue computado» para «le fue contado».
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  english_pob_choice: How
  chosen_spanish: Cómo
  alternatives_spanish:
  - De qué manera
  - Cómo fue
  lexicon: BDAG
  rationale: El adverbio interrogativo pide una pregunta natural en español. «Cómo» conserva la fuerza y la concisión del griego sin añadir explicación.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: Aquí λειτουργa como partícula inferencial/resuntiva. «Pues» suena natural en español bíblico moderno y mantiene el hilo argumentativo.
- source_word: ἐλογίσθη
  english_pob_choice: was counted
  chosen_spanish: le fue contado
  alternatives_spanish:
  - le fue acreditado
  - le fue considerado
  lexicon: BDAG
  rationale: El pasivo de λογίζομαι en Romanos 4 apunta a que algo es contado/atribuido a Abraham. «Le fue contado» conserva la imagen de conteo y evita decidir prematuramente por un matiz contable o financiero.
- source_word: ἐν περιτομῇ ὄντι
  english_pob_choice: while he was circumcised
  chosen_spanish: estando en la circuncisión
  alternatives_spanish:
  - cuando estaba circuncidado
  - siendo aún en la circuncisión
  lexicon: BDAG
  rationale: El griego usa el sustantivo «circuncisión» con participio. En español, la forma nominal «estando en la circuncisión» preserva más de cerca la estructura y el contraste retórico con el siguiente miembro.
- source_word: ἀκροβυστίᾳ
  english_pob_choice: uncircumcised
  chosen_spanish: la incircuncisión
  alternatives_spanish:
  - incircunciso
  - la condición de incircunciso
  lexicon: BDAG
  rationale: Aquí el griego usa el sustantivo para el estado opuesto. «La incircuncisión» conserva el paralelismo con «la circuncisión» y mantiene la oposición conceptual del texto.
- source_word: οὐκ ... ἀλλ’
  english_pob_choice: Not ... but ...
  chosen_spanish: No ... sino ...
  alternatives_spanish:
  - No ... pero ...
  lexicon: BDAG
  rationale: La construcción adversativa enfática se expresa con «No ... sino ...», que reproduce mejor la corrección tajante del griego que «pero».
translation_notes:
  revision_awareness: 'Se siguió de cerca el griego SBLGNT y el audit trail inglés: se mantuvo la pregunta retórica, el valor inferencial de οὖν y el contraste enfático de οὐκ ... ἀλλ’. La principal decisión fue conservar la estructura nominal de «circuncisión/incircuncisión» para reflejar el paralelismo del texto, en lugar de pasar de inmediato a adjetivos como «circuncidado/incircunciso».'
  spanish_consistency_notes:
  - Se emplea «circuncisión/incircuncisión» de manera consistente para conservar el juego de paralelismo del griego.
  - «Le fue contado» mantiene la ambigüedad deliberada de λογίζομαι documentada por el POB inglés.
