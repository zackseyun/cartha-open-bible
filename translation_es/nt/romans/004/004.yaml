translation:
  language: es
  text: Ahora bien, al que trabaja[a], el salario no se le cuenta como un regalo[b], sino como una obligación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al trabajador» o «al que está trabajando»; el participio griego tiene valor sustantivo.
    reason: lexical_alternative
  - marker: b
    text: Lit. «según gracia»; o «como gracia». Al final del versículo, o «como deuda» o «como lo debido».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐργαζομένῳ
  english_pob_choice: the one who works
  chosen_spanish: al que trabaja
  alternatives_spanish:
  - al trabajador
  - al que está trabajando
  lexicon: BDAG
  rationale: El participio presente con artículo funciona de manera sustantiva y expresa una persona caracterizada por trabajar. En español, «al que trabaja» conserva bien ese valor general y suena natural sin reducirlo a un oficio fijo.
- source_word: μισθὸς
  english_pob_choice: wages
  chosen_spanish: el salario
  alternatives_spanish:
  - la paga
  - la recompensa
  lexicon: BDAG
  rationale: En este contexto de pago por trabajo, «salario» comunica de forma clara la idea de remuneración merecida. «Recompensa» sería más amplio y menos preciso aquí.
- source_word: λογίζεται
  english_pob_choice: are credited
  chosen_spanish: se le cuenta
  alternatives_spanish:
  - se le acredita
  - se le considera
  - se le computa
  lexicon: BDAG
  rationale: La imagen de contabilidad/registro se mantiene bien con «se le cuenta». Es una solución natural en español para el verbo paulino de calcular o imputar en cuenta.
- source_word: κατὰ χάριν
  english_pob_choice: as a gift
  chosen_spanish: como gracia
  alternatives_spanish:
  - como un regalo
  - según gracia
  - como don
  lexicon: BDAG
  rationale: Aunque el inglés POB optó por explicitar la idea como «a gift», el griego dice literalmente «según gracia». En español, «como gracia» preserva mejor la tensión léxica entre gracia y deuda, sin borrar el trasfondo teológico de χάρις.
- source_word: ὀφείλημα
  english_pob_choice: obligation
  chosen_spanish: deuda
  alternatives_spanish:
  - obligación
  - lo debido
  - lo que se debe
  lexicon: BDAG
  rationale: El término señala algo debido u ოwed. «Deuda» reproduce con fuerza el contraste con «gracia» y es la alternativa más directa y transparente en español.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Pues
  - Y
  - Pero
  lexicon: BDAG
  rationale: «Ahora bien» marca la transición argumentativa con un matiz discursivo natural en español, sin exagerar el valor adversativo.
theological_decisions:
- issue: Cómo rendir κατὰ χάριν sin borrar la tensión entre gracia y deuda
  english_pob_reading: Translate κατὰ χάριν as 'as a gift' rather than 'according to grace.'
  chosen_spanish_reading: Traducir κατὰ χάριν como «como gracia», manteniendo el contraste con «deuda».
  alternative_spanish_readings:
  - como un regalo
  - según gracia
  - por gracia
  rationale: El contraste paulino aquí no solo enfrenta pago merecido con obsequio, sino mérito con gracia. «Como gracia» conserva el término clave del original y deja visible la tensión teológica, mientras que «como un regalo» aclara el sentido pero desplaza el léxico del griego.
  doctrine_reference: Romanos 4:4; contraste paulino entre salario debido y gracia no debida.
translation_notes:
  revision_awareness: 'Se siguió de cerca el griego SBLGNT y el auditorio inglés de POB, pero se ajustó una decisión clave: en lugar de explicitar κατὰ χάριν como «a gift», el español conserva «como gracia» para no perder el término teológico y la tensión léxica del texto. Se mantuvo el contraste con ὀφείλημα mediante «deuda».'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general solo cuando corresponda; este versículo no lo requiere.
  - 'Se prefirió una formulación natural en español que conserve el paralelismo: salario / gracia / deuda.'
  - La puntuación sigue la lógica del original y del español moderno, con dos comas para marcar la estructura contrastiva.
