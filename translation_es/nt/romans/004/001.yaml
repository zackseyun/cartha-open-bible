translation:
  language: es
  text: ¿Qué diremos, pues, que Abraham[a], nuestro antepasado según la carne[c][b], ha encontrado?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más idiomáticamente, «nuestro antepasado físico».
    reason: lexical_alternative
  - marker: b
    text: Algunos entienden que «según la carne» modifica «ha encontrado»; es decir, qué encontró Abraham por medios humanos o desde un punto de vista meramente humano.
    reason: alternative_reading
  - marker: c
    text: O «Abraham, nuestro antepasado según la carne, ha encontrado».
    reason: previous_rendering
lexical_decisions:
- source_word: Τί οὖν ἐροῦμεν
  english_pob_choice: What then shall we say
  chosen_spanish: ¿Qué, pues, diremos?
  alternatives_spanish:
  - ¿Qué, pues, diremos nosotros?
  - ¿Qué diremos entonces?
  lexicon: BDAG
  rationale: Conserva la transición retórica paulina y el valor deliberativo de la pregunta sin volverla artificiosamente literal.
- source_word: εὑρηκέναι
  english_pob_choice: has found
  chosen_spanish: ha hallado
  alternatives_spanish:
  - ha encontrado
  - ha descubierto
  lexicon: BDAG
  rationale: El perfecto infinitivo pide un perfecto en español; 'ha hallado' mantiene con buena dignidad el sentido de resultado alcanzado por Abraham. 'Ha encontrado' también es posible, pero 'hallado' suena más bíblico y sobrio.
- source_word: προπάτορα
  english_pob_choice: forefather
  chosen_spanish: antepasado
  alternatives_spanish:
  - progenitor
  - patriarca
  lexicon: BDAG
  rationale: '''Antepasado'' comunica bien la referencia ancestral de Abraham en español actual. Se evita ''patriarca'' por ser más interpretativo y por no reproducir con la misma neutralidad el parentesco ancestral del término griego.'
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - de nosotros
  lexicon: BDAG
  rationale: Se conserva la identificación compartida de Pablo con sus interlocutores y con Abraham, como en el texto griego y la versión inglesa auditada.
- source_word: κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - según la descendencia humana
  - en cuanto a la carne
  lexicon: BDAG
  rationale: Se mantiene la frase paulina más directa, pues aquí σάρξ se refiere a la relación corporal/ancestral, no a la 'naturaleza pecaminosa'. La lectura primaria une la expresión con 'nuestro antepasado'.
theological_decisions:
- issue: Ámbito de κατὰ σάρκα
  english_pob_reading: It modifies Abraham as 'our forefather according to the flesh,' referring to physical descent/ancestry.
  chosen_spanish_reading: '''según la carne'' modifica a Abraham: ''nuestro antepasado según la carne''.'
  alternative_spanish_readings:
  - '''¿Qué, pues, diremos que Abraham ha hallado según la carne?'''
  - '''¿Qué, pues, diremos que Abraham ha hallado por medios humanos?'''
  rationale: La sintaxis española permite mantener la misma ambigüedad que el griego resuelve por el contexto. La lectura principal preserva la referencia a descendencia física/ancestral, mientras que la alternativa de que la frase modifique 'ha hallado' queda documentada sin imponerla en el texto principal.
  doctrine_reference: Romanos 4; tensión lexical preservada sin resolver artificialmente la ambigüedad.
translation_notes:
  revision_awareness: 'El texto español sigue el consenso alto del audit trail inglés: conserva la pregunta retórica de apertura, el perfecto de εὑρηκέναι, la relación ancestral de προπάτωρ y la frase paulina κατὰ σάρκα. Se evita una traducción mecánica desde el inglés cuando el español exige reordenamiento natural, pero se mantiene la ambigüedad controlada sobre el alcance de ''según la carne''.'
  spanish_consistency_notes:
  - Se usó 'antepasado' para προπάτωρ en vez de 'padre' o 'patriarca' para conservar el valor genealógico sin sobrecargar el término.
  - '''Según la carne'' se mantiene como frase paulina estable; no se sustituye por ''según la descendencia'' en el texto principal para no perder la tensión lexical documentada.'
  - La puntuación con comas permite un registro formal y legible en español, equivalente al ajuste de claridad observado en la revisión inglesa.
