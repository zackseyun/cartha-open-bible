translation:
  language: es
  text: ¿Qué dice, pues, la Escritura? Abraham creyó a Dios[a], y le fue contado como rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «creyó en Dios». El griego aquí expresa más precisamente creer a Dios, es decir, aceptar como verdadero lo que Dios dijo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como justicia». En este contexto, δικαιοσύνη también puede traducirse «justicia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: γραφή
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - la escritura
  - las Escrituras
  lexicon: BDAG
  rationale: En Romanos, ἡ γραφή se refiere de manera idiomática al texto sagrado citado por Pablo. «La Escritura» conserva ese valor técnico y coincide con el uso bíblico español más claro.
- source_word: Ἐπίστευσεν
  english_pob_choice: believed
  chosen_spanish: creyó
  alternatives_spanish:
  - tuvo fe en
  - confió en
  lexicon: BDAG
  rationale: El aoristo de πιστεύω aquí se expresa de forma natural y fiel con «creyó». Mantiene la simplicidad del enunciado y evita una expansión interpretativa.
- source_word: τῷ θεῷ
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - en Dios
  - Dios
  lexicon: BDAG
  rationale: En esta construcción, el dativo con πιστεύω comunica el objeto de la fe/creencia. En español, «creyó a Dios» reproduce con precisión el sentido de creer lo que Dios dijo, mientras que «en Dios» sería menos exacto aquí.
- source_word: ἐλογίσθη
  english_pob_choice: was counted
  chosen_spanish: le fue contado
  alternatives_spanish:
  - le fue reputado
  - le fue acreditado
  lexicon: BDAG
  rationale: La pasiva de λογίζομαι se conserva con una forma pasiva española natural. «Le fue contado» es clara y mantiene la fuerza declarativa sin cargar el texto con tecnicismos bancarios o arcaísmos.
- source_word: εἰς δικαιοσύνην
  english_pob_choice: as righteousness
  chosen_spanish: como justicia
  alternatives_spanish:
  - como rectitud
  - para justicia
  lexicon: BDAG
  rationale: Siguiendo el valor léxico de δικαιοσύνη y la decisión inglesa documentada, se traduce como «justicia». En español, «justicia» puede sonar más amplio que «justicia punitiva»; aquí se conserva la tensión paulina entre veredicto y rectitud declarada.
theological_decisions:
- issue: Renderización de δικαιοσύνη en un contexto paulino de justificación
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: Aunque el inglés POB prefirió «righteousness» en el texto principal y dejó «justice» como alternativa léxica, en español «justicia» es la correspondencia más directa de δικαιοσύνη y permite mantener la misma tensión semántica entre declaración legal y cualidad recta. Se evita sustituirla por una paráfrasis doctrinal más explícita.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; la presente redacción mantiene esa estabilidad y ajusta el español para expresar con naturalidad la construcción griega del dativo con πιστεύω y la pasiva de λογίζομαι.
  spanish_consistency_notes:
  - Se mantiene «la Escritura» como término técnico para ἡ γραφή, en coherencia con el valor paulino del texto citado.
  - Se usa «creyó a Dios» para reflejar el objeto dativo de πιστεύω sin introducir «en Dios», que sería una normalización menos precisa.
  - «Le fue contado» conserva la pasiva del griego y evita una reformulación activa.
  - Se traduce δικαιοσύνη como «justicia» para respetar el término contestado y la decisión léxica documentada, dejando «rectitud» como alternativa en nota.
