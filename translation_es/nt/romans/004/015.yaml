translation:
  language: es
  text: Porque la ley[a] produce ira, pero donde no hay ley[b], tampoco hay transgresión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la Ley produce ira».
    reason: alternative_reading
  - marker: b
    text: O «tampoco hay violación».
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: «ley» conserva el alcance amplio del término paulino sin restringirlo de entrada solo a la Ley mosaica. En español, el artículo definido puede quedar implícito en el contexto sin convertirlo en una formulación más técnica de lo necesario.
- source_word: ὀργή
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - enojo
  lexicon: BDAG
  rationale: «ira» comunica mejor el peso judicial y teológico del término que «enojo», y evita una lectura meramente emocional. En este contexto, la frase apunta a un efecto serio y no solo a una reacción humana.
- source_word: κατεργάζεται
  english_pob_choice: produces
  chosen_spanish: produce
  alternatives_spanish:
  - origina
  - obra
  - genera
  lexicon: BDAG
  rationale: '«produce» es natural en español moderno y conserva la idea causativa del verbo: la ley trae como resultado la ira. Otras opciones son posibles, pero esta mantiene claridad sin añadir matices no presentes.'
- source_word: οὗ δὲ
  english_pob_choice: but where
  chosen_spanish: pero donde
  alternatives_spanish:
  - y donde
  - ahora bien, donde
  lexicon: BDAG
  rationale: «pero donde» refleja el leve contraste de δέ y la construcción locativa-relativa. Mantiene la relación lógica con la primera cláusula sin forzar un cambio de tono.
- source_word: παράβασις
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - violación
  - trespaso
  lexicon: BDAG
  rationale: «transgresión» preserva la idea de quebrantar un límite o mandamiento conocido. «Violación» sería posible, pero en español puede sonar más jurídico o ambiguo; «transgresión» es más transparente para el argumento paulino.
theological_decisions:
- issue: Alcance de νόμος en la argumentación de Pablo
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - la Ley
  rationale: 'Se mantiene el sentido amplio de «ley» para no restringir prematuramente la afirmación solo a la Ley mosaica, aunque ese trasfondo sigue siendo relevante en Romanos. Esto conserva la fuerza general del argumento: donde no hay ley, no puede imputarse transgresión en el mismo sentido.'
  doctrine_reference: Romanos 4:13-16; Romanos 5:13
- issue: Relación entre ausencia de ley y ausencia de transgresión
  english_pob_reading: neither is there transgression
  chosen_spanish_reading: tampoco hay transgresión
  alternative_spanish_readings:
  - ni hay transgresión
  - no existe transgresión
  rationale: '«tampoco hay transgresión» refleja el paralelismo negativo del griego sin sobreexplicar la conclusión. Conserva la tensión del argumento: la transgresión supone una norma previa.'
  doctrine_reference: Romanos 3:20; Romanos 7:7
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas recientes; por eso la redacción española se alinea estrechamente con las decisiones léxicas y teológicas ya validadas, sin introducir novedades interpretativas.
  spanish_consistency_notes:
  - Se usa «ley» de manera consistente con el valor amplio de νόμος en Romanos.
  - Se usa «ira» para ὀργή, manteniendo el registro teológico en lugar de una emoción cotidiana.
  - Se mantiene «transgresión» para παράβασις, coherente con el carácter de quebranto de un límite o mandato.
  - La puntuación reproduce el contraste fuerte entre cláusulas con una coma antes de «pero» y otra antes de la cláusula final.
