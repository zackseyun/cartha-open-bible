  - severity: medium
    issue: «con esperanza» debilita el paralelismo de ἐπ’ ἐλπίδι
    rationale: El griego contrapone dos expresiones casi espejadas. «En esperanza» suena algo marcado, pero en este contexto preserva mejor la tensión retórica documentada por el POB inglés («against hope, believed in hope»).
  - severity: low
