translation:
  language: es
  text: 'quien[a], contra esperanza, en esperanza creyó, para llegar a ser padre de muchas naciones[c][b], conforme a lo que había sido dicho: «Así será tu descendencia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «más allá de la esperanza» o «contra la esperanza».'
    reason: lexical_alternative
  - marker: b
    text: O «tu semilla», preservando la imagen singular-colectiva del griego.
    reason: lexical_alternative
  - marker: c
    text: Cita de Génesis 15:5; comparar Génesis 17:5.
    reason: cross_reference
lexical_decisions:
- source_word: παρ’ ἐλπίδα
  english_pob_choice: against hope
  chosen_spanish: contra toda esperanza
  alternatives_spanish:
  - más allá de la esperanza
  - contra esperanza
  lexicon: BDAG
  rationale: La preposición παρά con acusativo expresa oposición o choque con lo esperable. «Contra toda esperanza» conserva la paradoja de forma natural en español y comunica el contraste con la frase siguiente.
- source_word: ἐπ’ ἐλπίδι
  english_pob_choice: in hope
  chosen_spanish: con esperanza
  alternatives_spanish:
  - en esperanza
  - sobre la base de la esperanza
  lexicon: BDAG
  rationale: El giro balancea la expresión anterior y señala la esfera o condición en la que creyó. «Con esperanza» es idiomático en español y mantiene la tensión retórica del contraste.
- source_word: ἐπίστευσεν
  english_pob_choice: believed
  chosen_spanish: creyó
  alternatives_spanish:
  - tuvo fe
  - confió
  lexicon: BDAG
  rationale: El aoristo de πιστεύω se traduce de manera directa con «creyó», preservando la correspondencia verbal y evitando una expansión interpretativa.
- source_word: εἰς τὸ γενέσθαι αὐτὸν
  english_pob_choice: so that he might become
  chosen_spanish: para llegar a ser
  alternatives_spanish:
  - para que llegara a ser
  - con el fin de que llegara a ser
  lexicon: BDAG
  rationale: La construcción εἰς τό + infinitivo expresa propósito o resultado. «Para llegar a ser» recoge ese valor prospectivo de forma fluida y fiel al encadenamiento lógico del texto.
- source_word: πατέρα πολλῶν ἐθνῶν
  english_pob_choice: the father of many nations
  chosen_spanish: padre de muchas naciones
  alternatives_spanish:
  - un padre de muchas naciones
  - padre de muchos pueblos
  lexicon: BDAG
  rationale: Aunque el griego no tiene artículo, el español puede omitirlo de modo natural. «Naciones» preserva el eco de Génesis y evita reducir ἔθνη a «gentiles», que estrecharía indebidamente el alcance del pasaje.
- source_word: κατὰ τὸ εἰρημένον
  english_pob_choice: according to what had been spoken
  chosen_spanish: conforme a lo que había sido dicho
  alternatives_spanish:
  - según lo que había sido dicho
  - como estaba dicho
  lexicon: BDAG
  rationale: El participio perfecto pasivo remite a una palabra previa con vigencia continuada. «Conforme a lo que había sido dicho» mantiene el tono escritural y la referencia a una declaración ya establecida.
- source_word: Οὕτως ἔσται
  english_pob_choice: So shall ... be
  chosen_spanish: Así será
  alternatives_spanish:
  - De ese modo será
  - Así llegará a ser
  lexicon: BDAG
  rationale: La cita bíblica pide una cadencia solemne. «Así será» conserva el tono formular y la fuerza profética sin volver el español artificial.
- source_word: τὸ σπέρμα σου
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu semilla
  - tu linaje
  - tu descendencia, tu simiente
  lexicon: BDAG
  rationale: «Descendencia» es la opción más natural y transparente en español para el sentido colectivo-singular de σπέρμα en esta cita. La alternativa «semilla» es más literal, pero en español suele sonar más marcada o técnica; por eso no se adopta en el texto principal.
theological_decisions:
- issue: Alcance de ἔθνη en la promesa abrahámica
  english_pob_reading: Rendered ἐθνῶν as “nations” rather than “Gentiles.”
  chosen_spanish_reading: Traducir ἐθνῶν como «naciones», no como «gentiles».
  alternative_spanish_readings:
  - gentiles
  - pueblos
  rationale: En Romanos 4:18 Pablo cita el lenguaje de Génesis, donde la promesa se formula en clave de pueblos/naciones. «Gentiles» introduciría demasiado pronto la oposición judíos-gentiles y estrecharía el trasfondo veterotestamentario del pasaje.
  doctrine_reference: Génesis 15:5; Génesis 17:5; Romanos 4:13-18
translation_notes:
  revision_awareness: 'El texto griego y el expediente auditado en inglés muestran un consenso alto y sin revisiones aplicadas. La traducción española sigue esa línea estable, manteniendo las tensiones léxicas relevantes: la paradoja de esperanza/contra esperanza, el valor prospectivo de εἰς τό + infinitivo, el alcance covenantal de ἔθνη y la imagen colectiva de σπέρμα.'
  spanish_consistency_notes:
  - Se mantiene «naciones» para ἔθνη, coherente con el uso del AT en la cita y con el expediente inglés.
  - Se conserva un registro bíblico sobrio con «Así será» y «conforme a lo que había sido dicho».
  - «Descendencia» se usa como equivalente principal de σπέρμα para claridad natural en español, mientras la nota preserva la alternativa más literal.
  - No se introduce «Mesías», «SEÑOR» ni otras sustituciones no requeridas por este versículo.
