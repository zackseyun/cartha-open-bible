revisions:
- from: 'quien[a], contra toda esperanza, creyó con esperanza, para llegar a ser padre de muchas naciones[c][b], conforme a lo que había sido dicho: «Así será tu descendencia».'
  to: 'quien[a], contra esperanza, en esperanza creyó, para llegar a ser padre de muchas naciones[c][b], conforme a lo que había sido dicho: «Así será tu descendencia».'
  rationale: Se corrige «contra toda esperanza» a «contra esperanza» para evitar una intensificación no presente en el griego, y «con esperanza» a «en esperanza» para conservar mejor el paralelismo retórico de παρ’ ἐλπίδα / ἐπ’ ἐλπίδι, en línea con el rastro auditado del POB inglés. El resto del texto y las notas se mantienen sustancialmente iguales, con un leve ajuste en la nota a para reflejar la alternativa más literal «contra la esperanza».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:10:38Z'
