translation:
  language: es
  text: Pero al que no trabaja, sino que cree[a] en el que justifica[b] al impío, su fe le es contada[c] por justicia[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'confía en'.
    reason: lexical_alternative
  - marker: b
    text: O 'declara justo'.
    reason: lexical_alternative
  - marker: c
    text: O 'acreditada' o 'tenida por'.
    reason: lexical_alternative
  - marker: d
    text: O 'rectitud'; en contextos paulinos, δικαιοσύνη también puede traducirse 'justicia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ ... μὴ ἐργαζομένῳ
  english_pob_choice: the one not working
  chosen_spanish: al que no trabaja
  alternatives_spanish:
  - al que no obra
  - al no trabajador
  lexicon: BDAG
  rationale: La construcción participial sustantivada se conserva de forma natural en español con 'al que no trabaja', que mantiene el contraste con 'cree' sin convertirlo en una condena general del trabajo.
- source_word: πιστεύοντι δὲ ἐπὶ
  english_pob_choice: but believing in
  chosen_spanish: sino que cree en
  alternatives_spanish:
  - sino que confía en
  - sino creyendo en
  lexicon: BDAG
  rationale: '''Creer en'' reproduce de manera clara y contemporánea la relación de dependencia/adhesión del griego con ἐπί; se evita un calco rígido y se preserva la oposición con ''no trabaja''.'
- source_word: τὸν δικαιοῦντα
  english_pob_choice: the one who justifies
  chosen_spanish: el que justifica
  alternatives_spanish:
  - el que declara justo
  - el que cuenta como justo
  lexicon: BDAG
  rationale: '''Justifica'' mantiene la fuerza técnica paulina de δικαιόω y su vínculo léxico con δικαιοσύνη, sin resolver la tensión forense con una paráfrasis explicativa.'
- source_word: τὸν ἀσεβῆ
  english_pob_choice: the ungodly
  chosen_spanish: al impío
  alternatives_spanish:
  - al irreverente
  - al malvado
  lexicon: BDAG
  rationale: '''Impío'' es el equivalente más compacto y tradicional para ἀσεβής, conservando el matiz de irreverencia hacia Dios mejor que ''malvado''.'
- source_word: λογίζεται
  english_pob_choice: is counted
  chosen_spanish: es contada
  alternatives_spanish:
  - es acreditada
  - es tenida por
  lexicon: BDAG
  rationale: '''Es contada'' reproduce bien el lenguaje de cómputo/imputación de λογίζομαι y conserva el paralelismo con la nota inglesa ''counted/credited/reckoned''.'
- source_word: ἡ πίστις αὐτοῦ
  english_pob_choice: his faith
  chosen_spanish: su fe
  alternatives_spanish:
  - su confianza
  - su fidelidad
  lexicon: BDAG
  rationale: Se mantiene 'fe' como término principal del grupo πίστις, en consonancia con el valor doctrinal y lexical del pasaje; 'fidelidad' no se elige porque aquí el contraste inmediato es con obras y con creer.
- source_word: εἰς δικαιοσύνην
  english_pob_choice: as righteousness
  chosen_spanish: como justicia
  alternatives_spanish:
  - como rectitud
  - para justicia
  lexicon: BDAG
  rationale: '''Como justicia'' expresa de forma directa el valor resultativo de εἰς en la fórmula de cómputo y preserva la alternativa teológica de δικαιοσύνη sin ocultarla tras una tradición eclesiástica fija.'
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: BDAG
  rationale: En este contexto paulino se opta por 'justicia' para mantener la polisemia controlada de δικαιοσύνη; 'rectitud' queda como alternativa semántica sin desplazar el término principal.
theological_decisions:
- issue: δικαιόω en un contexto paulino doctrinalmente cargado
  english_pob_reading: the one who justifies
  chosen_spanish_reading: el que justifica
  alternative_spanish_readings:
  - el que declara justo
  - el que cuenta como justo
  rationale: Se preserva el valor forense y teológico del verbo sin resolverlo en una formulación confesional cerrada. 'Justifica' mantiene la tensión entre declarar y considerar justo, coherente con la estrategia del POB inglés.
  doctrine_reference: Conservar la tensión lexical y teológica; no simplificar el término técnico.
- issue: πίστις/πιστεύω como campo léxico central
  english_pob_reading: faith / believing
  chosen_spanish_reading: fe / cree
  alternative_spanish_readings:
  - confianza / confía
  - fidelidad / es fiel
  rationale: El texto contrapone no trabajar con creer, por lo que 'fe' y 'cree' son las opciones más fieles al argumento. 'Confianza' queda disponible como alternativa, pero no sustituye el término doctrinal principal.
  doctrine_reference: 'Término contestado: mantener el eje fe/creer y conservar alternativas donde ayudan a la lectura.'
- issue: δικαιοσύνη como término paulino con posible alcance de 'justicia'
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justificación
  rationale: '''Justicia'' permite reflejar la amplitud del término griego y evita imponer de antemano una sola lectura dogmática. El lector hispano conserva así la tensión entre justicia y rectitud en el argumento paulino.'
  doctrine_reference: Preservar la amplitud semántica de δικαιοσύνη en contexto paulino.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca explícitamente en el texto español: [a], [b], [c] y [d]. La redacción mantiene la relación griega entre el participio sustantivado, πιστεύω con ἐπί, δικαιόω, λογίζομαι y δικαιοσύνη, sin depender mecánicamente del inglés.'
  spanish_consistency_notes:
  - Se mantiene 'fe' para πίστις y 'cree' para πιστεύω, evitando alternar innecesariamente con 'confianza' o 'fidelidad' en el cuerpo principal.
  - '''Impío'' se usa de forma consistente para ἀσεβής, por su precisión semántica y su uso bíblico reconocible.'
  - '''Justicia'' traduce δικαιοσύνη en el texto principal; la nota conserva la alternativa ''rectitud'' sin desplazar el término principal.'
  - Los marcadores de nota están anclados exactamente en las palabras correspondientes del texto español y no se reutilizan.
