translation:
  language: es
  text: Bienaventurado el hombre[a] a quien el Señor jamás[b] le contará pecado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la persona»; «el hombre» aquí tiene un sentido representativo, no exclusivo de varón.
    reason: lexical_alternative
  - marker: b
    text: O «ciertamente no»; la negación griega es enfática.
    reason: lexical_alternative
  - marker: c
    text: O «le imputará pecado», o «contará el pecado contra él».
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: ¡Bienaventurado!
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: BDAG
  rationale: '"Bienaventurado" conserva el peso bíblico-covenantal de la fórmula de bendición y suena natural en español bíblico sin reducir el sentido a un estado emocional subjetivo.'
- source_word: ἀνήρ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - uno
  lexicon: BDAG
  rationale: Se mantiene el sustantivo singular masculino con valor representativo, como en el griego y en la auditoría inglesa. En español, "el hombre" puede funcionar de modo genérico en este registro, y la nota aclara que no excluye a las mujeres.
- source_word: οὗ
  english_pob_choice: against whom
  chosen_spanish: a quien
  alternatives_spanish:
  - contra quien
  - de quien
  lexicon: BDAG
  rationale: El genitivo relativo se expresa de forma idiomática en español mediante "a quien" en relación con el verbo de imputación/atribución, evitando una literalidad áspera sin perder la relación personal implicada.
- source_word: οὐ μὴ
  english_pob_choice: will never
  chosen_spanish: jamás
  alternatives_spanish:
  - ciertamente no
  - de ningún modo
  lexicon: BDAG
  rationale: '"Jamás" comunica bien la negación enfática del doble negativo con subjuntivo, con fuerza natural en español actual.'
- source_word: λογίσηται
  english_pob_choice: count
  chosen_spanish: tomará en cuenta
  alternatives_spanish:
  - contará
  - imputará
  - considerará
  lexicon: BDAG
  rationale: '"Tomará en cuenta" transmite la idea contable/forense de considerar o cargar una cuenta, pero en un español claro y menos técnico que "imputará". Mantiene la metáfora de cómputo que el contexto de Romanos 4 desarrolla.'
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Amo
  lexicon: BDAG
  rationale: Se traduce "Señor" por la convención del texto bíblico en este contexto de cita escritural. Aunque el proyecto suele usar "Yahvé" para el nombre divino, aquí el griego presenta κύριος en una formulación citacional y la forma española estándar preserva el eco bíblico sin forzar una identificación explícita en el cuerpo del verso.
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - pecado
  lexicon: BDAG
  rationale: Se conserva el singular con artículo en español para hacer natural la expresión, sin convertirla en una generalización distinta. "El pecado" mantiene el valor categorial del singular griego en este enunciado.
theological_decisions:
- issue: Alcance representativo de ἀνήρ
  english_pob_reading: Retain 'man' in the main text with generic force.
  chosen_spanish_reading: Mantener "el hombre" en el texto principal con fuerza representativa genérica.
  alternative_spanish_readings:
  - la persona
  - uno
  rationale: La forma masculina singular del griego tiene fuerza representativa; en español, "el hombre" puede conservar ese rasgo sin implicar exclusión sexual. La nota de pie explicita el sentido genérico para evitar una lectura restringida.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Imputación del pecado
  english_pob_reading: will never count sin / will certainly not count sin against him
  chosen_spanish_reading: jamás le tomará en cuenta el pecado
  alternative_spanish_readings:
  - jamás contará el pecado contra él
  - jamás le imputará pecado
  rationale: '"Tomar en cuenta" comunica la idea de contabilizar o atribuir culpa sin sobrecargar el verso con terminología técnica. El complemento "le" y el sustantivo singular preservan la dirección de la acción y la tensión forense del contexto paulino.'
  doctrine_reference: Romanos 4; lenguaje de imputación/contabilidad
- issue: Referencia al nombre divino en la cita
  english_pob_reading: Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el proyecto usa "Yahvé" para יהוה, en esta cita el contexto griego presenta κύριος como forma de la Escritura citada. "El Señor" conserva la textura de cita bíblica y evita introducir una decisión de identificación que el verso, por sí solo, no explicita.
  doctrine_reference: Convención del NT para κύριος en citas del AT
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el texto griego de Romanos 4:8 y el audit trail inglés: conserva el tono de bendición, la singularidad representativa de ἀνήρ, la negación enfática de οὐ μὴ y la metáfora contable de λογίζομαι. Se optó por una formulación española natural pero suficientemente cercana al valor forense del pasaje, sin introducir una paráfrasis expansiva ni perder la tensión lexical documentada.'
  spanish_consistency_notes:
  - Se mantiene "Señor" en esta cita por coherencia con el griego κύριος en contexto escritural.
  - '"Bienaventurado" encaja con el registro bíblico tradicional y evita un giro meramente afectivo.'
  - '"Tomará en cuenta" conserva mejor el registro contable que "perdonará" o "olvidará", que desplazarían el matiz del verbo griego.'
  - El artículo en "el pecado" refleja el singular griego y su valor categorial.
  - Las notas usan marcas únicas y aparecen ancladas exactamente en el texto principal.
