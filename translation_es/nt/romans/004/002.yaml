translation:
  language: es
  text: Porque si Abraham fue justificado[a] por obras, tiene de qué jactarse[b]; pero no delante de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue declarado justo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tiene motivo para jactarse».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pues si
  - Porque, si
  lexicon: γάρ / εἰ
  rationale: Conserva la conexión argumentativa de γάρ con el contexto previo mediante «porque» y mantiene la condición introducida por εἰ con «si». La puntuación ayuda a que el giro suene natural en español sin perder la lógica paulina.
- source_word: Ἀβραὰμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrahán
  lexicon: Ἀβραάμ
  rationale: Se conserva el nombre bíblico más extendido en español y plenamente reconocible para lectores de iglesia.
- source_word: ἐξ ἔργων
  english_pob_choice: by works
  chosen_spanish: por obras
  alternatives_spanish:
  - a partir de obras
  - sobre la base de obras
  lexicon: ἐκ
  rationale: «Por obras» comunica de forma natural la idea de base o medio de justificación. Aunque «a partir de» o «sobre la base de» son posibles, resultan más pesadas en español.
- source_word: ἐδικαιώθη
  english_pob_choice: was justified
  chosen_spanish: fue justificado
  alternatives_spanish:
  - fue declarado justo
  - fue declarado recto
  lexicon: δικαιόω
  rationale: «Fue justificado» sigue la formulación paulina estándar y conserva la tensión doctrinal del verbo sin explicarla de más. Las alternativas interpretativas quedan implícitas como posibles lecturas del término.
- source_word: ἔχει καύχημα
  english_pob_choice: he has a boast
  chosen_spanish: tiene de qué jactarse
  alternatives_spanish:
  - tiene una jactancia
  - tiene motivo para jactarse
  - tiene algo de qué gloriarse
  lexicon: καύχημα
  rationale: En español, «tiene de qué jactarse» expresa bien la idea de tener motivo o base para presumir/vanagloriarse, con naturalidad y sin perder el sentido nominal de καύχημα.
- source_word: ἀλλ’ οὐ πρὸς θεόν
  english_pob_choice: but not before God
  chosen_spanish: pero no delante de Dios
  alternatives_spanish:
  - pero no en la presencia de Dios
  - pero no con respecto a Dios
  lexicon: πρός + θεός
  rationale: «Delante de Dios» reproduce fielmente el contraste entre la valoración humana y la evaluación divina. «No con respecto a Dios» sería más literal, pero menos idiomático en español.
theological_decisions:
- issue: 'Justificación: posible traducción explicativa del pasivo δικαιόω'
  english_pob_reading: 'was justified / Or: was declared righteous'
  chosen_spanish_reading: fue justificado
  alternative_spanish_readings:
  - fue declarado justo
  - fue declarado recto
  rationale: Se mantiene el término teológico tradicional «justificado» para no resolver la tensión interpretativa en el cuerpo del texto. Las opciones explicativas se reconocen como válidas, pero no se imponen como glosa principal.
  doctrine_reference: Preservar la tensión exegética sobre la justificación sin obras.
- issue: El alcance de la jactancia frente a Dios
  english_pob_reading: he has a boast—but not before God
  chosen_spanish_reading: tiene de qué jactarse; pero no delante de Dios
  alternative_spanish_readings:
  - tiene motivo para jactarse; pero no delante de Dios
  - tiene algo de qué gloriarse; pero no delante de Dios
  rationale: La cláusula final conserva el contraste entre una jactancia válida en cierto plano hipotético y su negación delante de Dios. No se suaviza ni se amplía el argumento de Pablo.
  doctrine_reference: Humillación humana ante el juicio y la gracia de Dios.
translation_notes:
  revision_awareness: La versión inglesa revisada quedó estable sin cambios; la redacción española sigue esa línea y conserva sus equivalentes léxicos y su tensión teológica sin añadir interpretación extratextual.
  spanish_consistency_notes:
  - Se mantuvo «justificado» como término técnico paulino coherente con el proyecto, en lugar de sustituirlo por una paráfrasis doctrinal.
  - Se eligió «delante de Dios» para reproducir de forma natural la fuerza relacional/judicial de πρὸς θεόν.
  - 'El orden y la puntuación reflejan el contraste del griego: condición, consecuencia, oposición final.'
  - No se usó «Cristo» ni terminología de YHWH en este versículo; no aplica decisión terminológica adicional.
