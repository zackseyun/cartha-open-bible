translation:
  language: es
  text: Porque si los que son de la ley son herederos, la fe ha sido vaciada y la promesa ha sido anulada.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ ἐκ νόμου
  english_pob_choice: those who are of the law
  chosen_spanish: los que son de la ley
  alternatives_spanish:
  - los de la ley
  - los que provienen de la ley
  - los que están bajo la ley
  lexicon: BDAG
  rationale: Conserva la expresión paulina compacta y relacional sin convertirla en una paráfrasis interpretativa sobre mera observancia. En español, «los que son de la ley» representa bien la frase sustantivada con sentido de pertenencia o definición por la ley.
- source_word: κληρονόμοι
  english_pob_choice: heirs
  chosen_spanish: herederos
  alternatives_spanish:
  - herederos legítimos
  lexicon: BDAG
  rationale: «Herederos» es el equivalente natural y directo en español para el contexto de herencia y promesa. Mantiene el lenguaje covenantal sin añadir matices no presentes en el griego.
- source_word: κεκένωται
  english_pob_choice: has been emptied
  chosen_spanish: ha sido vaciada
  alternatives_spanish:
  - ha sido vaciada de contenido
  - ha sido vaciada de fuerza
  - ha sido hecha vacía
  lexicon: BDAG
  rationale: El perfecto pasivo comunica un estado resultante. «Ha sido vaciada» preserva la metáfora de vaciamiento y sugiere pérdida de contenido o eficacia sin sobretraducirla.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fidelidad
  - la confianza
  lexicon: BDAG
  rationale: En Romanos 4 el contraste es entre ley y fe como principio de herencia; «fe» es la opción principal del POB inglés y la más clara en español. Se conservan alternativas semánticas por la tensión documental del término.
- source_word: κατήργηται
  english_pob_choice: has been nullified
  chosen_spanish: ha sido anulada
  alternatives_spanish:
  - ha sido invalidada
  - ha sido hecha ineficaz
  - ha sido abolida
  lexicon: BDAG
  rationale: «Anulada» expresa bien el sentido de quedar sin efecto o eficacia, sin cargar el verbo con la idea más fuerte de destrucción total. Es una equivalencia natural en español para el pasivo perfecto.
- source_word: ἐπαγγελία
  english_pob_choice: the promise
  chosen_spanish: la promesa
  alternatives_spanish:
  - la promesa específica
  - la promesa del pacto
  lexicon: BDAG
  rationale: El artículo definido conserva la referencia a una promesa concreta en el argumento de Pablo. «La promesa» es la forma más idiomática y fiel en español.
theological_decisions:
- issue: πίστις en contraste con νόμος
  english_pob_reading: faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la fidelidad
  - la confianza
  rationale: La doctrina POB para πίστις favorece «fe» en este pasaje porque el argumento de Romanos 4 contrapone herencia por ley y por fe. Mantener «fe» preserva la línea argumental sin introducir una lectura de fidelidad que el contexto inmediato no exige.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις → faith; alternatives preserved where contested'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail inglés, incorporando la revisión que aclaró la frase sustantivada con «who are». En español se resolvió con «los que son de la ley», una solución natural y fiel que evita una traducción mecánica pero conserva la estructura argumental.
  spanish_consistency_notes:
  - Se mantuvo la terminología POB «fe» para πίστις, coherente con el tratamiento doctrinal del proyecto.
  - Se evitó «SEÑOR» o términos eclesiásticos no presentes en el versículo.
  - «Anulada» y «vaciada» reflejan el pasivo perfecto griego sin intensificar indebidamente el alcance semántico.
  - La sintaxis española busca claridad pública y lectura litúrgica sin alejarse del orden lógico del original.
