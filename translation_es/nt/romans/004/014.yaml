    issue: Ligera pesadez estilística en «los que son de la ley son herederos»
    rationale: La secuencia repetida con «son» puede sentirse menos fluida en español, pero no compromete fidelidad ni claridad, y evita sobreinterpretar οἱ ἐκ νόμου.
