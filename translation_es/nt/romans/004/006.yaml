revisions:
- from: Así también David dice de la dicha del hombre[a] a quien Dios le cuenta[b] justicia[c], aparte de las obras.
  to: Así como también David habla de la bienaventuranza del hombre[a] a quien Dios acredita[b] justicia[c] aparte de las obras.
  rationale: Se ajusta καθάπερ a «Así como también» para reflejar mejor la comparación aditiva del griego. Se reemplaza «la dicha» por «la bienaventuranza» para preservar el valor abstracto de μακαρισμός en registro bíblico natural. Se corrige «le cuenta justicia» a «acredita justicia», que comunica mejor λογίζεται δικαιοσύνην en español y evita una construcción poco idiomática. Se actualiza la nota correspondiente para ofrecer alternativas españolas más naturales y fieles.
