  glossary_alignment: «Dios» y «justicia» están bien alineados con las pautas del proyecto. La nota sobre «hombre/persona» está bien preservada. Conviene ajustar la nota de λογίζεται para priorizar una opción española más natural como «acredita» o «toma en cuenta», ya que «le considera» no expresa bien el complemento «justicia».
