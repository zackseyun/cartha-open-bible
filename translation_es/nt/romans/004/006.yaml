translation:
  language: es
  text: Así como también David habla de la bienaventuranza del hombre[a] a quien Dios acredita[b] justicia[c] aparte de las obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la persona»; el griego dice «el hombre», usado aquí en sentido representativo.
    reason: lexical_alternative
  - marker: b
    text: O «cuenta», «imputa» o «toma en cuenta» justicia.
    reason: lexical_alternative
  - marker: c
    text: O «rectitud» para «justicia».
    reason: alternative_reading
lexical_decisions:
- source_word: καθάπερ
  english_pob_choice: Just as
  chosen_spanish: Así también
  alternatives_spanish:
  - Justo como
  - De la misma manera
  lexicon: BDAG
  rationale: La comparación con el argumento anterior se expresa de forma natural en español con «Así también», conservando el valor comparativo e introductorio sin sonar forzado.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: BDAG
  rationale: Aquí καί añade a David como testigo adicional; «también» reproduce bien ese valor aditivo.
- source_word: λέγει
  english_pob_choice: speaks
  chosen_spanish: dice
  alternatives_spanish:
  - habla
  - declara
  lexicon: BDAG
  rationale: En una fórmula de cita bíblica, «dice» es la forma más directa y fiel al presente histórico del griego, sin perder naturalidad en español.
- source_word: μακαρισμός
  english_pob_choice: blessedness
  chosen_spanish: la dicha
  alternatives_spanish:
  - la bienaventuranza
  - la bendición
  lexicon: BDAG
  rationale: El sustantivo designa el estado de ser bendecido o feliz; «la dicha» comunica bien el sentido abstracto en español contemporáneo. «Bienaventuranza» sería posible, pero más marcado litúrgicamente.
- source_word: ἀνθρώπου
  english_pob_choice: the man
  chosen_spanish: del hombre
  alternatives_spanish:
  - de la persona
  - del ser humano
  lexicon: BDAG
  rationale: Se conserva el singular masculino del griego con fuerza representativa. «Del hombre» mantiene la forma del texto fuente y el alcance general del dicho.
- source_word: λογίζεται
  english_pob_choice: credits
  chosen_spanish: le cuenta
  alternatives_spanish:
  - le considera
  - le imputa
  - le acredita
  lexicon: BDAG
  rationale: El verbo conserva la metáfora contable/judicial del griego. «Le cuenta» es menos técnico que «imputa» y puede sonar más natural; al mismo tiempo preserva la idea de atribuir o contabilizar justicia.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: BDAG
  rationale: En este pasaje paulino, «justicia» preserva el campo semántico y la tensión doctrinal que el proyecto mantiene abierta. «Rectitud» es una alternativa válida, pero menos habitual aquí.
- source_word: χωρὶς ἔργων
  english_pob_choice: apart from works
  chosen_spanish: aparte de las obras
  alternatives_spanish:
  - sin obras
  - fuera de las obras
  lexicon: BDAG
  rationale: «Aparte de» expresa bien la exclusión de las obras como base de la atribución divina. «Sin obras» es posible, pero puede sonar más absoluto de lo que la construcción comparativa pretende.
theological_decisions:
- issue: Lenguaje masculino singular en ἀνθρώπου
  english_pob_reading: the man
  chosen_spanish_reading: del hombre
  alternative_spanish_readings:
  - de la persona
  - del ser humano
  rationale: Se conserva el masculino singular del griego como forma representativa, sin restringir el alcance a varones concretos. Esto sigue la política de precisión del proyecto y evita neutralizar indebidamente la referencia textual.
  doctrine_reference: Translation philosophy §4
- issue: δικαιοσύνη como término paulino
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: En Romanos, δικαιοσύνη mantiene una carga forense y teológica importante. «Justicia» preserva mejor esa tensión que una paráfrasis explicativa, y deja abierta la gama semántica que el audit trail reconoce.
  doctrine_reference: 'Contested terms table: δικαιοσύνη'
- issue: λογίζεται como metáfora contable/judicial
  english_pob_reading: credits
  chosen_spanish_reading: le cuenta
  alternative_spanish_readings:
  - le considera
  - le imputa
  - le acredita
  rationale: La elección conserva la noción de atribución o cómputo sin introducir terminología doctrinal más pesada de la necesaria. «Le cuenta» funciona como equivalente idiomático de una asignación contable/judicial.
  doctrine_reference: BDAG; translation philosophy
translation_notes:
  revision_awareness: El borrador sigue el estado más reciente del audit trail, que marca agreement alto y no registra revisiones aplicadas ni cambios pendientes. No se introdujeron ajustes adicionales respecto del consenso inglés; solo se trasladaron al español las decisiones léxicas y teológicas ya justificadas.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y publicable, evitando calcos innecesarios como «bienaventuranza» si no aporta claridad adicional.
  - Se preservó la estructura comparativa del griego con «Así también» para reflejar la conexión con el argumento anterior.
  - Se eligió «le cuenta» para conservar la metáfora de atribución sin sobrecargar el verso con jerga técnica.
  - Se usó «justicia» como término principal para δικαιοσύνη, dejando «rectitud» en nota como alternativa semántica.
  - Se conservó el masculino singular de «hombre» por fidelidad al texto fuente y su sentido representativo.
