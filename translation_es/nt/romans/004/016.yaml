    reason: lexical_alternative
  revision_rationale: La revisión corrige el anclaje de las notas para que correspondan a los términos fuente pertinentes, mejora la naturalidad del español en el doble grupo colectivo mediante plural idiomático, y conserva el sentido y la tensión teológica del griego y del audit trail inglés. También se limpia la nota española eliminando el anglicismo innecesario.
