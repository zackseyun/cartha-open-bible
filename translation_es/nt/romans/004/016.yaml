review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura lógica del griego: inferencia (Διὰ τοῦτο), base en la fe, propósito conforme a la gracia, y resultado de una promesa firme para toda la descendencia. También preserva adecuadamente «descendencia» para σπέρματι y «padre de todos nosotros» para πατὴρ πάντων ἡμῶν. Sin embargo, el español actual presenta dos desajustes importantes con el rastro POB: los marcadores/notas están mal anclados respecto de las palabras fuente, y la expresión «para la que es de la ley / de la fe de Abraham» resulta demasiado forzada y poco natural en español, aun si intenta reflejar el singular colectivo griego.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «la que es de la ley» y «la que es de la fe de Abraham» suenan antinaturales y opacas en español eclesial contemporáneo. Una forma plural colectiva como «los que son de la ley» / «los que son de la fe de Abraham» comunica mejor el referente sin perder el sentido. Además, la puntuación con dos puntos antes de la aclaración adversativa no es la mejor opción aquí; la raya reproduce mejor la relación discursiva del original y del POB inglés.
  glossary_alignment: Alinea bien con el glosario del proyecto en «fe», «gracia», «promesa» y «descendencia». No hay conflicto con terminología teológica principal. La revisión propuesta mantiene «fe» para πίστις y «descendencia» para σπέρμα, pero corrige las notas para que la nota sobre «σπέρμα» ancle en «descendencia» y la nota sobre «fe» ancle en «fe».
  issues:
  - severity: high
    issue: Los marcadores de notas están asignados a palabras equivocadas.
    rationale: La nota a habla de σπέρμα pero está anclada en «fe»; la nota c habla de «fe» pero está anclada en «todos nosotros». Esto rompe la trazabilidad léxica exigida por el proyecto.
  - severity: medium
    issue: «La que es de la ley / la que es de la fe de Abraham» suena poco natural y ambiguo en español.
    rationale: Aunque intenta conservar el singular colectivo griego, en español produce una construcción áspera y de referencia poco clara. El propio audit trail inglés permite una formulación más natural para comunicar el referente colectivo.
  - severity: low
    issue: La nota a mezcla español e inglés con «offspring».
    rationale: En una nota española debe evitarse el préstamo innecesario cuando «descendencia» o «descendientes» expresan bien la alternativa.
  - severity: low
    issue: Los dos puntos antes de «no solamente...» no son la mejor puntuación discursiva.
    rationale: Una raya encaja mejor con la explicación/aposición adversativa y sigue más de cerca el ritmo del texto base y del POB inglés.
  revised_spanish_text: Por esta razón es por fe[c], para que sea conforme a la gracia, a fin de que la promesa sea firme para toda la descendencia[a]—no solamente para los que son de la ley, sino también para los que son de la fe de Abraham, quien es padre de todos nosotros[b].
  revised_footnotes:
