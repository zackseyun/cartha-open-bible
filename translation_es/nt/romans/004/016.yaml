translation:
  language: es
  text: Por esta razón es por fe[c], para que sea conforme a la gracia, a fin de que la promesa sea firme para toda la descendencia[a]—no solamente para los que son de la ley, sino también para los que son de la fe de Abraham, quien es padre de todos nosotros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego «simiente»; aquí se usa colectivamente para la descendencia o los descendientes de Abraham.
    reason: lexical_alternative
  - marker: b
    text: O «no solamente para el que es de la ley, sino también para el que es de la fe de Abraham».
    reason: alternative_reading
  - marker: c
    text: «Fe» también puede entenderse como «confianza»; «fidelidad» es menos probable en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Debido a esto
  lexicon: BDAG
  rationale: Expresa bien la fuerza inferencial de la frase en español natural, manteniendo la relación lógica con el contexto anterior sin añadir interpretación.
- source_word: ἐκ πίστεως
  english_pob_choice: by faith
  chosen_spanish: es por fe
  alternatives_spanish:
  - proviene de la fe
  - es mediante la fe
  lexicon: BDAG
  rationale: La preposición con πίστεως indica base o medio; 'es por fe' conserva esa idea de manera idiomática y breve en español.
- source_word: ἵνα κατὰ χάριν
  english_pob_choice: so that it may be according to grace
  chosen_spanish: para que sea conforme a la gracia
  alternatives_spanish:
  - para que sea según la gracia
  - para que repose en gracia
  lexicon: BDAG
  rationale: '''Conforme a la gracia'' mantiene la relación de norma o correspondencia de κατά con χάριν, sin suavizarla a un mero ''favor''.'
- source_word: βεβαίαν
  english_pob_choice: certain
  chosen_spanish: firme
  alternatives_spanish:
  - segura
  - cierta
  lexicon: BDAG
  rationale: '''Firme'' comunica bien la idea de solidez y confiabilidad de la promesa en español bíblico actual, evitando la posible ambigüedad de ''cierta''.'
- source_word: ἐπαγγελίαν
  english_pob_choice: promise
  chosen_spanish: promesa
  lexicon: BDAG
  rationale: La equivalencia es directa y adecuada para el lenguaje pactal paulino.
- source_word: σπέρματι
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - descendientes
  lexicon: BDAG
  rationale: Aunque literalmente puede ser 'semilla', aquí el sentido es colectivo; 'descendencia' preserva esa referencia colectiva de modo claro en español.
- source_word: οὐ τῷ ἐκ τοῦ νόμου μόνον
  english_pob_choice: not only to those from the law
  chosen_spanish: no solamente para la que es de la ley
  alternatives_spanish:
  - no solamente para los de la ley
  - no solamente para quienes son de la ley
  lexicon: BDAG
  rationale: El griego usa singular colectivo; el español puede mantenerlo con 'la que es de la ley' para reflejar la forma y la referencia sin perder claridad.
- source_word: τῷ ἐκ πίστεως Ἀβραάμ
  english_pob_choice: to those of the faith of Abraham
  chosen_spanish: para la que es de la fe de Abraham
  alternatives_spanish:
  - para los de la fe de Abraham
  - para quienes son de la fe de Abraham
  lexicon: BDAG
  rationale: Se conserva la compresión del griego y la vinculación con Abraham sin expandir el sentido más allá del texto; la forma singular colectiva sigue el paralelismo del segmento anterior.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: '''Fe'' es la decisión habitual del proyecto para πίστις y encaja con el contraste paulino entre ley y fe; ''confianza'' es posible pero menos consistente aquí.'
- source_word: πατὴρ πάντων ἡμῶν
  english_pob_choice: the father of us all
  chosen_spanish: padre de todos nosotros
  alternatives_spanish:
  - padre de todos
  - padre de todos nosotros
  lexicon: BDAG
  rationale: Conserva el vínculo familiar y representativo de Abraham con todos los creyentes, con un español natural y solemne.
theological_decisions:
- issue: Cómo reflejar la relación entre fe y gracia sin resolverla demasiado ni debilitarla.
  english_pob_reading: so that it may be according to grace
  chosen_spanish_reading: para que sea conforme a la gracia
  alternative_spanish_readings:
  - para que sea según la gracia
  - para que resulte de gracia
  rationale: La formulación mantiene la tensión paulina entre fe y gracia como base de la promesa, sin convertirla en una paráfrasis interpretativa.
  doctrine_reference: Romanos 4:16; justificación por fe y conforme a gracia.
- issue: Cómo traducir el doble grupo del versículo sin borrar el paralelismo singular del griego.
  english_pob_reading: not only to those from the law, but also to those of the faith of Abraham
  chosen_spanish_reading: no solamente para la que es de la ley, sino también para la que es de la fe de Abraham
  alternative_spanish_readings:
  - no solamente para los de la ley, sino también para los de la fe de Abraham
  - no solamente para quienes son de la ley, sino también para quienes son de la fe de Abraham
  rationale: El griego presenta un singular colectivo en ambos miembros; el español mantiene esa forma para respetar la estructura y la tensión textual, aunque suene menos explicativo que un plural.
  doctrine_reference: Romanos 4:16; alcance de la promesa y descendencia de Abraham.
- issue: Si 'σπέρματι' debe sonar como 'simiente' o como un colectivo humano.
  english_pob_reading: offspring
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - simiente
  - descendientes
  rationale: '''Descendencia'' comunica el valor colectivo que el propio audit trail inglés ya señaló y evita una literalidad biológica innecesaria en español.'
  doctrine_reference: Romanos 4:16; descendencia de Abraham como colectivo pactal.
translation_notes:
  revision_awareness: El texto sigue de cerca la última revisión inglesa auditada, que ajustó la segunda cláusula para reflejar más literalmente el griego («those of the faith of Abraham») sin ampliar el sentido. En español se conservó esa economía sintáctica y el paralelismo singular colectivo, mientras se naturalizó la frase inicial y el valor de χάριν y βεβαίαν para lectura pública.
  spanish_consistency_notes:
  - Se mantuvo 'fe' para πίστις conforme al estándar del proyecto.
  - Se tradujo χάρις como 'gracia' y no como 'favor' para preservar el lenguaje paulino.
  - Se eligió 'descendencia' para σπέρμα con nota explicativa, en línea con el tratamiento inglés de 'offspring'.
  - Se preservó 'Abraham' sin adaptar a 'Abrahán' para consistencia con el proyecto y con la forma más reconocible en español bíblico contemporáneo.
