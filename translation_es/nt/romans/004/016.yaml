  text: Διὰ τοῦτο ἐκ πίστεως, ἵνα κατὰ χάριν, εἰς τὸ εἶναι βεβαίαν τὴν ἐπαγγελίαν παντὶ τῷ σπέρματι, οὐ τῷ ἐκ τοῦ νόμου μόνον ἀλλὰ καὶ τῷ ἐκ πίστεως Ἀβραάμ (ὅς ἐστιν πατὴρ πάντων ἡμῶν,
base_translation:
  language: en
  yaml_path: translation/nt/romans/004/016.yaml
  text: For this reason it is by faith[a], so that it may be according to grace, in order that the promise may be certain to all the offspring—not only to those from the law, but also to those of the faith of Abraham, who is the father of us all[c][b],
