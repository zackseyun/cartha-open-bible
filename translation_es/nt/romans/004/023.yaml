lexical_decisions:
- source_word: Οὐκ ἐγράφη δὲ
  english_pob_choice: Now it was not written
  chosen_spanish: No se escribió, pues,
  alternatives_spanish:
  - Ahora bien, no se escribió
  - Pero no se escribió
  lexicon: SBLGNT; BDAG (δέ, γράφω)
  rationale: Se mantiene la transición discursiva de δέ con 'pues', que en español introduce continuidad argumentativa sin volver la frase demasiado abrupta. El pasivo impersonal 'se escribió' conserva el carácter textual/escriturario del verbo.
- source_word: δι’ αὐτὸν μόνον
  english_pob_choice: for his sake alone
  chosen_spanish: solo por él
  alternatives_spanish:
  - solo para él
  - solo por su causa
  lexicon: SBLGNT; BDAG (διά + acusativo)
  rationale: '''Por él'' conserva el valor explicativo/causal de διά con acusativo y suena natural en español. ''Solo'' reproduce el énfasis exclusivista del griego, sin añadir matices ajenos.'
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: sino también para nosotros, a quienes
  alternatives_spanish:
  - que
  - a saber, que
  lexicon: SBLGNT; BDAG (ὅτι)
  rationale: En este contexto, el contenido introducido por ὅτι queda mejor integrado en español como continuidad de la cláusula anterior. El giro resultante evita una subordinación torpe y mantiene la relación de contenido implícita en el griego.
- source_word: ἐλογίσθη
  english_pob_choice: was credited
  chosen_spanish: se le contará
  alternatives_spanish:
  - se le considerará
  - se le computará
  - se le contará como
  lexicon: SBLGNT; BDAG / Louw-Nida (λογίζομαι)
  rationale: '''Contará'' en futuro pasivo refleja bien la fuerza de λογίζομαι en contexto de imputación/cómputo, y permite conservar la tensión entre ''contar'', ''considerar'' y ''acreditar'' que el POB inglés documenta. Aquí se opta por una forma española natural que no pierde el peso forense-contable del verbo.'
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: se le
  alternatives_spanish:
  - a él
  - para él
  lexicon: SBLGNT; BDAG (αὐτός, dativo)
  rationale: El dativo queda bien representado por el clítico dativo en español. Esto mantiene la relación directa con el verbo pasivo y evita una repetición pesada de 'a él'.
theological_decisions:
- issue: λογίζομαι en contexto paulino de imputación/justificación
  english_pob_reading: credited; counted; reckoned
  chosen_spanish_reading: se le contará
  alternative_spanish_readings:
  - se le considerará
  - se le acreditará
  - se le contará como justicia
  rationale: La traducción conserva la ambigüedad productiva del verbo sin resolverla excesivamente. En Romanos 4 el verbo participa del argumento sobre la cuenta/imputación de justicia a Abraham; por eso se evita una paráfrasis doctrinal cerrada y se mantiene un término compatible con la lectura contable-jurídica del texto.
  doctrine_reference: Romanos 4; imputación/atribución de justicia sin sobreexplicación doctrinal
translation_notes:
  revision_awareness: 'Se siguió el pasaje griego directamente y se alineó con el audit trail inglés: δέ como transición discursiva, διά + acusativo como causa/explanación, y λογίζομαι como verbo de cómputo/imputación. No hubo revisiones adicionales en el contexto inglés, así que no se introducen cambios textuales más allá de la adaptación natural al español.'
  spanish_consistency_notes:
  - Se usa 'se escribió' para conservar el pasivo textual sin forzar sujeto explícito.
  - Se evita 'Cristo'/'Mesías' porque no aparecen en este versículo.
  - Se mantiene un registro bíblico moderno y digno, con sintaxis natural para el español.
  - La nota léxica conserva alternativas relevantes sin resolver artificialmente la tensión semántica de λογίζομαι.
