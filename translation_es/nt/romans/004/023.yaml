  rationale: Se elimina la intrusión de contenido del v. 24, se restituye el valor de ὅτι como cláusula de contenido y se corrige ἐλογίσθη a pasado pasivo. 'Le fue contado' preserva bien la fuerza de λογίζομαι en Romanos 4 y sigue siendo natural en español. La nota mantiene alternativas léxicas útiles sin sobreinterpretar el texto.
