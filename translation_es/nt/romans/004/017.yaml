revisions:
- from: 'tal como está escrito[a]: «Te he puesto por padre de muchas naciones»; delante de Dios, en quien él creyó[b], que da vida a los muertos y llama las cosas que no son como si fueran.'
  to: 'tal como está escrito[a]: «Te he puesto por padre de muchas naciones»—en presencia del Dios en quien él creyó[b], que da vida a los muertos y llama a las cosas que no son como si fueran.'
  rationale: 'Se hacen ajustes menores de estilo y fidelidad sintáctica: se reemplaza el punto y coma por una raya para conservar la continuidad de la oración; se afina «delante de Dios» a «en presencia del Dios» para reflejar mejor κατέναντι con el genitivo; y se añade la preposición en «llama a las cosas» para mejorar la naturalidad del español sin cambiar la decisión teológica del texto principal.'
