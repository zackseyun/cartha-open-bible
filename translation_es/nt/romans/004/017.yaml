translation:
  language: es
  text: 'tal como está escrito[a]: «Te he puesto por padre de muchas naciones»—en presencia del Dios en quien él creyó[b], que da vida a los muertos y llama a las cosas que no son como si fueran.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «llama a la existencia las cosas que no existen».'
    reason: alternative_reading
  - marker: b
    text: «Naciones» aquí también puede entenderse como «gentiles», pero en esta cita de Génesis es más probable el sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς γέγραπται
  english_pob_choice: as it is written
  chosen_spanish: tal como está escrito
  alternatives_spanish:
  - como está escrito
  - tal como se ha escrito
  lexicon: γράφω
  rationale: La fórmula cita un texto ya establecido y el perfecto pasivo conserva la vigencia de la Escritura; «tal como está escrito» es natural en español y mantiene ese valor sin sobreexplicar.
- source_word: Πατέρα πολλῶν ἐθνῶν
  english_pob_choice: the father of many nations
  chosen_spanish: padre de muchas naciones
  alternatives_spanish:
  - el padre de muchas naciones
  - padre de muchos pueblos
  lexicon: πατήρ
  rationale: El griego usa el sintagma de la promesa de Génesis; en español, la omisión del artículo dentro de la cita resulta idiomática y conserva la forma proverbial. «Naciones» preserva el alcance amplio de ἐθνῶν.
- source_word: τέθεικά σε
  english_pob_choice: I have made you
  chosen_spanish: te he puesto
  alternatives_spanish:
  - te he hecho
  - te he establecido
  lexicon: τίθημι
  rationale: Aunque el inglés POB eligió «have made», el griego τέθεικά, de τίθημι, admite bien «poner/establecer»; en la cita bíblica española, «te he puesto por padre» suena fiel y natural, sin perder la idea de designación estable.
- source_word: κατέναντι
  english_pob_choice: in the presence of
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: κατέναντι
  rationale: «Delante de» reproduce la relación espacial/personal del término sin sonar forzado; en español bíblico mantiene la idea de estar frente a Dios.
- source_word: οὗ ἐπίστευσεν
  english_pob_choice: in whom he believed
  chosen_spanish: en quien él creyó
  alternatives_spanish:
  - a quien creyó
  - en quien creyó
  lexicon: πιστεύω
  rationale: El verbo πιστεύω con persona requiere en español la preposición «en» para la confianza dirigida a Dios; el pronombre explícito ayuda a la claridad y conserva el referente abrahámico.
- source_word: θεοῦ τοῦ ζῳοποιοῦντος τοὺς νεκρούς
  english_pob_choice: who gives life to the dead
  chosen_spanish: Dios, que da vida a los muertos
  alternatives_spanish:
  - el Dios que da vida a los muertos
  - Dios, que vivifica a los muertos
  lexicon: ζῳοποιέω
  rationale: «Da vida» es una equivalencia clara y digna para el participio; mantiene el rasgo caracterizador de Dios y su poder vivificante sin arcaísmo.
- source_word: καλοῦντος τὰ μὴ ὄντα ὡς ὄντα
  english_pob_choice: calls the things that are not as though they were
  chosen_spanish: llama las cosas que no son como si fueran
  alternatives_spanish:
  - llama a las cosas que no son como si fueran
  - llama a la existencia las cosas que no son
  lexicon: καλέω
  rationale: La forma principal conserva la tensión interpretativa del griego, igual que el inglés POB; «como si fueran» evita resolver prematuramente la frase en una paráfrasis más explícita.
theological_decisions:
- issue: Si la última cláusula debe explicitar creación ex nihilo o conservar su formulación comprimida.
  english_pob_reading: calls the things that are not as though they were
  chosen_spanish_reading: llama las cosas que no son como si fueran
  alternative_spanish_readings:
  - llama a la existencia las cosas que no son
  - hace existir las cosas que no existen
  rationale: El griego permite una implicación de poder creador, pero la frase permanece abreviada. La redacción española conserva esa tensión y deja abierta la lectura interpretativa, como en el POB inglés.
  doctrine_reference: Preservar la tensión teológica sin cerrarla en una sola paráfrasis.
- issue: Alcance de ἐθνῶν en la cita de Génesis.
  english_pob_reading: many nations
  chosen_spanish_reading: muchas naciones
  alternative_spanish_readings:
  - muchos gentiles
  - muchos pueblos
  rationale: En este contexto de la cita de Génesis, «naciones» comunica mejor el sentido amplio y evita restringir innecesariamente el término a la oposición técnica «judíos/gentiles».
  doctrine_reference: Romanos 4 y Génesis 17 en su sentido de promesa a las naciones.
translation_notes:
  revision_awareness: Se revisó la formulación para mantener la cita de Génesis con fluidez natural en español y, al mismo tiempo, conservar el cierre del versículo en una forma que no resuelva indebidamente la ambigüedad teológica del griego. La decisión sobre «te he puesto» responde directamente al verbo griego τίθημι y no solo al inglés auditado.
  spanish_consistency_notes:
  - Se conserva «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se mantiene «naciones» para ἐθνῶν en la cita de Abraham, con nota sobre la posible lectura «gentiles».
  - La cláusula final usa «llama» y no una expansión interpretativa en el texto principal para preservar la tensión del original.
  - Se evita «SEÑOR» porque el texto griego aquí dice θεοῦ, no κύριος.
