    rationale: Aunque refleja más literalmente οὐκ ἐκ περιτομῆς μόνον, no comunica con claridad el sentido que el POB auditó como “not merely circumcised”. Puede leerse como procedencia, partido o pertenencia institucional, no como la condición externa de circuncisión contrastada con la fe.
