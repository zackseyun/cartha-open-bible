  rationale: 'La revisión mantiene la decisión auditada de conservar “padre de la circuncisión”, pero corrige dos puntos clave para un español más fiel y natural: (1) reemplaza “no son solo de la circuncisión” por “no son meramente circuncisos”, que expresa con claridad la restricción semántica que el inglés POB documentó; y (2) cambia “andan en los pasos” por “siguen las huellas”, que representa mejor la imagen de ἴχνεσιν en español. También se corrige la nota [a], que antes repetía sin valor añadido el texto principal.'
