translation:
  language: es
  text: y padre de la circuncisión[a] para los que no son meramente circuncisos[b], sino también para los que siguen[c] las huellas[d] de la fe que tuvo nuestro padre Abraham cuando era incircunciso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, contextualmente, “padre de los circuncisos”.
    reason: lexical_alternative
  - marker: b
    text: Lit. “no de circuncisión solamente”.
    reason: lexical_alternative
  - marker: c
    text: O “andan”.
    reason: lexical_alternative
  - marker: d
    text: Lit. “en las huellas de la fe”.
    reason: lexical_alternative
lexical_decisions:
- source_word: πατέρα περιτομῆς
  english_pob_choice: the father of circumcision
  chosen_spanish: padre de la circuncisión
  alternatives_spanish:
  - padre de los circuncisos
  - padre de la circuncisión ritual
  lexicon: BDAG
  rationale: Conservo la construcción más cercana al griego, que en el contexto apunta a Abraham como padre relacionado con la circuncisión/circuncisos. En español, “padre de la circuncisión” mantiene la tensión entre la forma abstracta del genitivo y el referente comunitario.
- source_word: οὐκ ἐκ περιτομῆς μόνον
  english_pob_choice: not merely circumcised
  chosen_spanish: no son solo de la circuncisión
  alternatives_spanish:
  - no son solamente circuncisos
  - no proceden solo de la circuncisión
  lexicon: BDAG
  rationale: La frase griega significa literalmente “no de circuncisión solamente”. En español, “no son solo de la circuncisión” conserva la restricción de pertenencia sin borrar el matiz más literal del original.
- source_word: στοιχοῦσιν
  english_pob_choice: walk
  chosen_spanish: andan
  alternatives_spanish:
  - caminan
  - viven conforme a
  lexicon: BDAG
  rationale: “Andar” reproduce bien el idiomático bíblico de conducta continua sin sonar demasiado técnico. Mantiene la imagen de la marcha ordenada implícita en στοιχέω.
- source_word: τοῖς ἴχνεσιν
  english_pob_choice: in the footsteps
  chosen_spanish: en los pasos
  alternatives_spanish:
  - siguiendo las huellas
  - en las huellas
  lexicon: BDAG
  rationale: Aunque “huellas” sería más pictórico, “pasos” suena más natural en español y conserva la imagen de seguir un patrón previo. La preposición “en” refleja bien la construcción del griego y de la tradición de “in the footsteps”.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: El contexto argumenta la fe de Abraham como respuesta creyente. “Fe” es la equivalencia más directa y adecuada para la fuerza doctrinal del pasaje.
- source_word: ἐν ἀκροβυστίᾳ
  english_pob_choice: while uncircumcised
  chosen_spanish: cuando era incircunciso
  alternatives_spanish:
  - en incircuncisión
  - siendo incircunciso
  lexicon: BDAG
  rationale: El griego expresa el estado de Abraham en ese período. “Cuando era incircunciso” traduce temporalmente el valor contextual sin perder la referencia al estado anterior a la circuncisión.
- source_word: τοῦ πατρὸς ἡμῶν Ἀβραάμ
  english_pob_choice: our father Abraham
  chosen_spanish: nuestro padre Abraham
  alternatives_spanish:
  - Abraham, nuestro padre
  - nuestro antepasado Abraham
  lexicon: BDAG
  rationale: Mantengo la fórmula comunitaria “nuestro padre Abraham”, que es importante para el argumento paulino y su identificación de Abraham como antepasado de los creyentes.
theological_decisions:
- issue: Alcance de la paternidad de Abraham entre los circuncisos
  english_pob_reading: The verse restricts Abraham's fatherhood among the circumcised to those who are not merely circumcised outwardly but also imitate Abraham's faith.
  chosen_spanish_reading: El versículo restringe la paternidad de Abraham entre los circuncisos a los que no solo pertenecen exteriormente a la circuncisión, sino que además andan en la fe de Abraham.
  alternative_spanish_readings:
  - Abraham es padre de todos los circuncisos sin restricción
  - Abraham es padre de la circuncisión en sentido general
  rationale: 'La sintaxis del griego vincula la paternidad con un grupo definido por dos marcas: no solo circuncisión externa, sino también el seguimiento de la fe de Abraham. La traducción preserva esa restricción sin explicitar más allá de lo que el texto dice.'
  doctrine_reference: Romanos 4:11-12; cf. Gálatas 3:7
- issue: Relación entre la fe de Abraham y su estado de incircuncisión
  english_pob_reading: Abraham had faith while uncircumcised.
  chosen_spanish_reading: Abraham tuvo fe cuando era incircunciso.
  alternative_spanish_readings:
  - la fe de Abraham en su incircuncisión
  - Abraham creyó estando incircunciso
  rationale: El texto enfatiza el momento previo a la circuncisión. “Cuando era incircunciso” conserva el contraste temporal y argumental del pasaje.
  doctrine_reference: Romanos 4:10-11
translation_notes:
  revision_awareness: La redacción sigue la última versión inglesa auditada, que optó por “the father of circumcision” para evitar la repetición de “circumcised”. En español se conserva esa solución literal en la frase principal, pero se anota la alternativa más interpretativa. También se mantiene la distinción entre la pertenencia a la circuncisión y el acto de andar según la fe de Abraham.
  spanish_consistency_notes:
  - Se usa “circuncisión” como abstracto en la frase principal, con nota para la lectura más referencial a los circuncisos.
  - Se usa “fe” y no “fidelidad”, siguiendo el valor argumental de πίστις en Romanos 4.
  - “Incircunciso” se emplea como adjetivo de estado para mantener el contraste temporal del griego.
  - La puntuación refleja una sola oración coordinada con contraste explícito entre “no solo... sino que también...” .
