translation:
  language: es
  text: Y sin debilitarse en la fe, consideró su propio cuerpo como ya muerto[a] —pues tenía como cien años— y lo muerto que estaba el vientre de Sara[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra tradición textual lee: «no consideró su propio cuerpo, que ya estaba como muerto».'
    reason: textual_variant
  - marker: b
    text: 'O: «esterilidad» para «lo muerto que estaba».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσθενήσας
  english_pob_choice: without weakening
  chosen_spanish: sin debilitarse
  alternatives_spanish:
  - sin flaquear
  - sin desanimarse
  - sin debilitarse en su fe
  lexicon: BDAG
  rationale: El aoristo participial expresa la idea de no llegar a perder fuerzas. «Sin debilitarse» conserva la noción de debilitamiento sin volverla una mera afirmación estática.
- source_word: πίστει
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la confianza
  - la fidelidad
  lexicon: BDAG
  rationale: En este contexto πίστις se refiere a la confianza confiada en la promesa de Dios. «La fe» es el equivalente más natural y doctrinalmente consistente en español.
- source_word: κατενόησεν
  english_pob_choice: he considered
  chosen_spanish: consideró
  alternatives_spanish:
  - observó
  - tomó en cuenta
  - reflexionó sobre
  lexicon: BDAG
  rationale: El verbo comunica una toma de conciencia deliberada y realista. «Consideró» reproduce bien ese acto mental sin exagerarlo.
- source_word: νενεκρωμένον
  english_pob_choice: as good as dead
  chosen_spanish: ya muerto
  alternatives_spanish:
  - como muerto
  - como si estuviera muerto
  - muerto en cuanto a la procreación
  lexicon: BDAG
  rationale: El participio perfecto describe un estado de muerte efectiva respecto a la capacidad reproductiva. «Ya muerto» mantiene la fuerza de la imagen y evita suavizarla a «estéril» o «infecundo».
- source_word: ἑκατονταετής που ὑπάρχων
  english_pob_choice: since he was about a hundred years old
  chosen_spanish: siendo como de cien años
  alternatives_spanish:
  - como de cien años de edad
  - puesto que tenía como cien años
  - siendo de aproximadamente cien años
  lexicon: BDAG
  rationale: πού suaviza la cifra, por eso «como de cien años». La forma participial queda bien en español con «siendo» y mantiene la explicación temporal.
- source_word: νέκρωσιν
  english_pob_choice: deadness
  chosen_spanish: la muerte
  alternatives_spanish:
  - la muerte
  - la muerte aparente
  - la esterilidad
  lexicon: BDAG
  rationale: El sustantivo comparte la raíz de muerte con el participio anterior y conviene conservar esa repetición. «La muerte» preserva la imagen, aunque en español suene más fuerte que una glosa interpretativa como «esterilidad».
- source_word: μήτρας Σάρρας
  english_pob_choice: Sarah’s womb
  chosen_spanish: del vientre de Sara
  alternatives_spanish:
  - del vientre de Sara
  - del seno de Sara
  - de la matriz de Sara
  lexicon: BDAG
  rationale: «Vientre» es una manera natural y bíblicamente comprensible de expresar μήτρα sin perder el referente corporal. Se evita «útero» por sonar demasiado técnico para este registro.
theological_decisions:
- issue: Cómo conservar la tensión del lenguaje de muerte reproductiva sin resolverla en una glosa médica
  english_pob_reading: 'Retain explicit death-language in both clauses: ''as good as dead'' and ''the deadness of Sarah’s womb'''
  chosen_spanish_reading: 'Conservar el lenguaje explícito de muerte: «ya muerto» y «la muerte del vientre de Sara»'
  alternative_spanish_readings:
  - «estéril» / «esterilidad»
  - «infecundo» / «infecundidad»
  - «como muerto»
  rationale: Pablo empareja el cuerpo de Abraham con el vientre de Sara mediante vocabulario de muerte. Mantener esa repetición en español preserva la tensión retórica y teológica del pasaje, en vez de aclararla demasiado.
  doctrine_reference: Romanos 4:19; énfasis paulino en la imposibilidad humana vencida por la promesa de Dios.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego SBLGNT y el auditable enfoque óptimo de la POB en inglés: mantiene el paralelo de muerte entre el cuerpo de Abraham y el vientre de Sara, pero lo expresa con español natural y publicable. No se siguió mecánicamente la redacción inglesa; se priorizó la evidencia del griego y la consistencia terminológica.'
  spanish_consistency_notes:
  - Se usa «fe» para πίστις, coherente con el estándar del proyecto.
  - Se conserva el campo semántico de muerte en νενεκρωμένον / νέκρωσιν para no suavizar la imagen paulina.
  - «Vientre» se eligió por claridad y naturalidad en español bíblico contemporáneo.
  - La nota textual se ancla en el segmento afectado por la variante, y la nota léxica en «muerte».
