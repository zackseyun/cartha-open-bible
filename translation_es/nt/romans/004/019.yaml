    reason: lexical_alternative
  revision_rationale: La revisión mantiene el paralelismo de muerte exigido por el griego y por la decisión teológica del POB, pero mejora la naturalidad del español. «Como ya muerto» refleja mejor νενεκρωμένον que «ya muerto», evitando una literalidad demasiado absoluta. «Lo muerto que estaba el vientre de Sara» conserva el lenguaje de muerte de νέκρωσιν sin el giro poco idiomático «la muerte del vientre». También se reubica la nota textual al lugar que realmente comenta.
