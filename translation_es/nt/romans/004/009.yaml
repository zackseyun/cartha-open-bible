translation:
  language: es
  text: '¿Es esta bendición, entonces, para los de la circuncisión, o también para los de la incircuncisión? Porque decimos: «La fe le fue contada a Abraham como justicia[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: μακαρισμός
  english_pob_choice: blessing
  chosen_spanish: bienaventuranza
  alternatives_spanish:
  - bendición
  lexicon: BDAG
  rationale: En este contexto Pablo retoma el estado bienaventurado proclamado en 4:6–8. «Bienaventuranza» comunica ese resultado de manera natural en español y conserva el matiz de felicidad/estado favorecido sin reducirlo de inmediato a una mera fórmula litúrgica.
- source_word: περιτομή
  english_pob_choice: the circumcised
  chosen_spanish: los de la circuncisión
  alternatives_spanish:
  - los circuncisos
  - circuncisión
  lexicon: BDAG
  rationale: El sustantivo funciona metonímicamente para el grupo identificado por la circuncisión. «Los de la circuncisión» expresa con claridad el referente colectivo en español, manteniendo el contraste paulino con el otro grupo.
- source_word: ἀκροβυστία
  english_pob_choice: the uncircumcised
  chosen_spanish: los de la incircuncisión
  alternatives_spanish:
  - los incircuncisos
  - incircuncisión
  lexicon: BDAG
  rationale: También aquí el término designa al grupo opuesto por metonimia. «Los de la incircuncisión» preserva la simetría con «los de la circuncisión» y evita una traducción demasiado técnica o poco natural en español.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la confianza
  - la fidelidad
  lexicon: BDAG
  rationale: La guía doctrinal toma «fe» como el equivalente por defecto de πίστις. En la cita de Génesis usada por Pablo, ese es el sentido más directo y el que mejor sostiene el argumento del pasaje.
- source_word: Ἐλογίσθη
  english_pob_choice: was counted
  chosen_spanish: le fue contada
  alternatives_spanish:
  - le fue considerada
  - le fue acreditada
  - le fue imputada
  lexicon: BDAG
  rationale: «Le fue contada» conserva el valor contable/de cómputo de λογίζομαι y evita resolver por adelantado la cuestión teológica de «imputación» con un tecnicismo innecesario.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: BDAG
  rationale: Aquí se preserva la alternativa lexical que el POB inglés deja abierta en nota. En español, «justicia» puede sonar más directa que «justificación» y mantiene la ambigüedad productiva entre un valor forense/legal y una cualidad recta.
- source_word: εἰς δικαιοσύνην
  english_pob_choice: as righteousness
  chosen_spanish: como justicia
  alternatives_spanish:
  - para justicia
  - para rectitud
  lexicon: BDAG
  rationale: La construcción idiomática se vierte con «como» para reflejar el valor relacional del griego y el uso establecido en el argumento de Pablo. Así se evita sobreexplicar la frase y se conserva la tensión del texto fuente.
theological_decisions:
- issue: Relación entre fe y justicia en la cita de Génesis aplicada por Pablo
  english_pob_reading: Faith was counted to Abraham as righteousness.
  chosen_spanish_reading: La fe le fue contada a Abraham como justicia.
  alternative_spanish_readings:
  - La fe le fue acreditada a Abraham como justicia.
  - La fe le fue contada a Abraham para justicia.
  rationale: 'El verso no exige ampliar la frase con una explicación doctrinal posterior. Se conserva la formulación breve y la tensión interpretativa: el texto afirma un cómputo o asignación de la fe en relación con la justicia, sin resolver de antemano el debate terminológico.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla; cf. argumento paulino en Romanos 4.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés. No hay revisiones posteriores que alteren la decisión central; se mantiene la equivalencia óptima con atención a los valores metonímicos de los sustantivos y a la ambigüedad lexical de δικαιοσύνη.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponde al nombre divino; este versículo no lo contiene.
  - Se evita «Cristo» porque no aparece en el texto.
  - Se mantiene «fe» para πίστις y no «confianza» o «fidelidad», para alinearse con el uso paulino básico del pasaje.
  - La nota a pie de página preserva la alternativa lexical de δικαιοσύνη sin desplazar la lectura principal.
  - «Los de la circuncisión / incircuncisión» mantiene la función colectiva de los sustantivos griegos mejor que una traducción abstracta y conserva el paralelismo.
