  glossary_alignment: No hay conflicto con los términos doctrinales principales del proyecto. La decisión «justicia» para δικαιοσύνη es aceptable si se conserva la alternativa «rectitud» o se refleja adecuadamente la nota inglesa; pero dado el rastro de auditoría inglés, la nota debe señalar la alternativa al término de δικαιοσύνη. «Bienaventuranza» no infringe el glosario, aunque «bendición» alinearía mejor con el POB inglés.
