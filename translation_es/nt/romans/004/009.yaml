  to: '¿Es esta bendición, entonces, para los de la circuncisión, o también para los de la incircuncisión? Porque decimos: «La fe le fue contada a Abraham como justicia[a]».'
  rationale: 'Se corrige un error material en la ubicación de la nota: la alternativa léxica pertenece a δικαιοσύνη, no a μακαρισμός. Además, se ajusta «bienaventuranza» a «bendición» para alinearse mejor con la decisión principal del POB inglés y con un español más natural, sin alterar el sentido del texto. Se conserva la estructura general y la formulación «le fue contada ... como justicia» por su fidelidad al griego y a la decisión teológica auditada.'
