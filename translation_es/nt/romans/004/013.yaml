translation:
  language: es
  text: Pues la promesa a Abraham y a su descendencia[a], de que él sería heredero del mundo, no fue por medio de la ley, sino por medio de la justicia de la fe[b][c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «simiente». El griego está en singular, pero puede funcionar colectivamente: «descendencia» o «descendientes».'
    reason: lexical_alternative
  - marker: b
    text: O «por la justicia que viene de la fe» o «por la justicia basada en la fe».
    reason: alternative_reading
  - marker: c
    text: «Justicia» también puede traducirse «rectitud» en este contexto paulino.
    reason: lexical_alternative
  - marker: d
    text: «Fe» también puede rendirse «fidelidad» o «confianza» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαγγελία
  english_pob_choice: promise
  chosen_spanish: promesa
  alternatives_spanish:
  - promesa divina
  - pledge
  lexicon: BDAG
  rationale: En Pablo, ἐπαγγελία tiene sentido de promesa de Dios en contexto pactal. «Promesa» es natural en español y conserva ese valor sin añadir explicación innecesaria.
- source_word: σπέρματι
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - descendencia
  - descendientes
  lexicon: BDAG
  rationale: El griego usa un singular con fuerza colectiva. «Descendencia» transmite bien esa colectividad en español y evita el calco problemático de «simiente».
- source_word: κληρονόμον ... κόσμου
  english_pob_choice: heir of the world
  chosen_spanish: heredero del mundo
  alternatives_spanish:
  - heredero del mundo
  - inheredero del mundo
  lexicon: BDAG
  rationale: «Heredero» conserva el lenguaje de herencia y patrimonio. «Del mundo» mantiene el alcance amplio de κόσμος sin restringirlo.
- source_word: διὰ νόμου
  english_pob_choice: through the law
  chosen_spanish: por medio de la ley
  alternatives_spanish:
  - por la ley
  - mediante la ley
  lexicon: BDAG
  rationale: «Por medio de» expresa con claridad la mediación causal/instrumental de διά en este contraste paulino y suena natural en español.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: BDAG
  rationale: En este contexto, δικαιοσύνη puede leerse como «justicia» o «rectitud». Opto por «justicia» porque en español comunica mejor la fuerza paulina y deja abierta la relación exacta con la fe.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fe
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: «Fe» es la equivalencia principal y más reconocible en español. Mantiene la forma breve del genitivo griego sin resolverlo interpretativamente.
- source_word: διὰ δικαιοσύνης πίστεως
  english_pob_choice: through the righteousness of faith
  chosen_spanish: por medio de la justicia de la fe
  alternatives_spanish:
  - por medio de la justicia que proviene de la fe
  - por medio de la justicia basada en la fe
  - por medio de la justicia por la fe
  lexicon: BDAG
  rationale: La construcción griega es compacta y permite varias relaciones genitivas. «La justicia de la fe» conserva esa tensión sin paraphrasear más de lo que el texto dice.
theological_decisions:
- issue: Relación entre δικαιοσύνης y πίστεως
  english_pob_reading: Rendered literally as 'the righteousness of faith' rather than resolving it to an explicitly interpretive paraphrase.
  chosen_spanish_reading: «la justicia de la fe» mantiene la formulación breve y no decide de antemano si se trata de justicia que proviene de la fe, justicia caracterizada por la fe, o una justicia vinculada a la fe.
  alternative_spanish_readings:
  - la justicia que proviene de la fe
  - la justicia basada en la fe
  - la justicia por la fe
  rationale: El texto griego permite más de una relación genitiva. En una traducción de la POB conviene preservar esa tensión y no imponer una paráfrasis doctrinalmente más cerrada que el original.
  doctrine_reference: Preservar la tensión teológica del genitivo sin resolverla excesivamente.
translation_notes:
  revision_awareness: Se revisó el cierre para conservar la concisión del griego y la tensión del genitivo δικαιοσύνης πίστεως, siguiendo el audit trail inglés que prefirió una formulación literal sin resolver interpretativamente la relación entre «justicia» y «fe».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera; aquí no aparece.
  - Se mantiene «ley» para νόμος siguiendo el contexto paulino y la audit trail inglesa.
  - Se evita «Cristo»/«Mesías» porque el versículo no contiene Χριστός.
  - Se conserva la correspondencia colectiva-singular de σπέρμα mediante «descendencia».
  - Se respeta la terminología POB de «justicia» para δικαιοσύνη, dejando nota de la alternativa «rectitud».
