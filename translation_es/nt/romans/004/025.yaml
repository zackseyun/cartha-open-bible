translation:
  language: es
  text: el cual fue entregado por causa de nuestras transgresiones y fue resucitado para nuestra justificación[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a causa de nuestra justificación».'
    reason: alternative_reading
  - marker: b
    text: «Justificación» también puede expresarse como «absolución» o «declaración de justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεδόθη
  english_pob_choice: was handed over
  chosen_spanish: fue entregado
  alternatives_spanish:
  - fue entregado en manos de
  - fue dado
  - fue entregado a
  lexicon: BDAG
  rationale: El pasivo se conserva en español con una forma natural y digna. «Entregado» refleja bien παραδίδωμι y mantiene la posible fuerza de pasivo divino sin forzar un calco más pesado como «fue entregado en manos de».
- source_word: διὰ τὰ παραπτώματα ἡμῶν
  english_pob_choice: because of our trespasses
  chosen_spanish: por causa de nuestras transgresiones
  alternatives_spanish:
  - a causa de nuestros tropiezos
  - por nuestros pecados
  - por causa de nuestras faltas
  lexicon: BDAG
  rationale: Con διά + acusativo, la lectura causal está bien sustentada. «Por causa de» expresa esa causalidad de modo claro. «Transgresiones» aproxima παραπτώματα con un matiz de falla moral más concreto que «pecados».
- source_word: παραπτώματα
  english_pob_choice: trespasses
  chosen_spanish: transgresiones
  alternatives_spanish:
  - faltas
  - pecados
  - tropiezos
  lexicon: BDAG
  rationale: «Transgresiones» comunica una acción de desvío o infracción y evita diluir el término en el más general «pecados». Conserva el peso moral del plural griego.
- source_word: ἠγέρθη
  english_pob_choice: was raised
  chosen_spanish: fue resucitado
  alternatives_spanish:
  - fue levantado
  - fue resucitado de entre los muertos
  lexicon: BDAG
  rationale: En español bíblico, «resucitado» es la forma más natural y fiel al pasivo de ἐγείρω en este contexto. «Fue levantado» suena menos explícito para el lector general y puede perder la referencia a la resurrección.
- source_word: διὰ τὴν δικαίωσιν ἡμῶν
  english_pob_choice: for our justification
  chosen_spanish: para nuestra justificación
  alternatives_spanish:
  - a causa de nuestra justificación
  - por nuestra justificación
  - para nuestro veredicto favorable
  lexicon: BDAG
  rationale: La preposición con acusativo admite una relación de propósito/resultando. «Para nuestra justificación» conserva la lectura principal del POB inglés y el encaje paulino, sin excluir la alternativa causal documentada.
- source_word: δικαίωσιν
  english_pob_choice: justification
  chosen_spanish: justificación
  alternatives_spanish:
  - acquittal
  - declaración de justicia
  - vindicación
  lexicon: BDAG
  rationale: «Justificación» es el equivalente paulino estándar en español y preserva la fuerza jurídico-salvífica del sustantivo. Otras opciones aclaran matices, pero no son necesarias en el texto principal.
theological_decisions:
- issue: 'Sentido de διὰ τὴν δικαίωσιν ἡμῶν: finalidad/resultado o causalidad'
  english_pob_reading: for our justification
  chosen_spanish_reading: para nuestra justificación
  alternative_spanish_readings:
  - a causa de nuestra justificación
  - por nuestra justificación
  rationale: 'Se conserva la lectura prospectiva principal del POB inglés, coherente con el argumento paulino: la resurrección de Jesús se relaciona con la obtención y manifestación de nuestra justificación. La lectura causal sigue siendo gramaticalmente posible y se registra como alternativa.'
  doctrine_reference: Romanos 4:25; doctrina paulina de la justificación
translation_notes:
  revision_awareness: Coincide con el pasaje base y con el audit trail inglés; no se registran revisiones posteriores. Se mantiene la ambigüedad gramatical de διά + acusativo en la segunda cláusula mediante nota, sin debilitar la lectura principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece.
  - Se conserva «justificación» como término paulino técnico y no se sustituye por un lenguaje más devocional.
  - «Resucitado» expresa mejor ἠγέρθη que un calco literal en español, manteniendo la pasiva griega.
  - «Transgresiones» sigue el valor de παραπτώματα sin ampliar indebidamente a un concepto más general.
