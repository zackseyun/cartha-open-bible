translation:
  language: es
  text: Pero respecto a la promesa de Dios[a], no vaciló en incredulidad, sino que fue fortalecido en la fe[b], dando gloria a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no dudó por incredulidad».
    reason: lexical_alternative
  - marker: b
    text: O «fue fortalecido por la fe».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς δὲ
  english_pob_choice: Yet regarding
  chosen_spanish: Pero respecto a
  alternatives_spanish:
  - Y con respecto a
  - Sin embargo, acerca de
  lexicon: BDAG
  rationale: εἰς con acusativo tiene aquí valor referencial, no direccional; por eso conviene una construcción española de relación o referencia. δέ aporta transición con leve contraste, que en español se expresa bien con «Pero» al continuar el hilo argumental.
- source_word: ἐπαγγελίαν
  english_pob_choice: promise
  chosen_spanish: promesa
  alternatives_spanish:
  - prometido
  lexicon: BDAG
  rationale: En el contexto paulino se trata de la promesa hecha por Dios a Abraham; «promesa» es el equivalente natural y preciso en español, sin diluir el contenido pactal del término.
- source_word: διεκρίθη
  english_pob_choice: did not waver
  chosen_spanish: no vaciló
  alternatives_spanish:
  - no dudó
  - no titubeó
  lexicon: BDAG
  rationale: El verbo expresa una oscilación o vacilación interior más que una mera duda intelectual. «No vaciló» conserva esa tensión sin reducirla a incertidumbre mental simple.
- source_word: τῇ ἀπιστίᾳ
  english_pob_choice: in unbelief
  chosen_spanish: por incredulidad
  alternatives_spanish:
  - en incredulidad
  - a causa de incredulidad
  lexicon: BDAG
  rationale: La dative se puede entender como esfera o medio asociado; en español, «por incredulidad» comunica la relación causal/ambiental sin perder el contraste con «en la fe» del miembro siguiente.
- source_word: ἐνεδυναμώθη
  english_pob_choice: was strengthened
  chosen_spanish: fue fortalecido
  alternatives_spanish:
  - se fortaleció
  - fue robustecido
  lexicon: BDAG
  rationale: La pasiva se expresa de forma directa con «fue fortalecido», manteniendo la pasividad verbal y el paralelismo con la negación anterior.
- source_word: τῇ πίστει
  english_pob_choice: in faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - por la fe
  lexicon: BDAG
  rationale: «Fe» es el equivalente normal de πίστις; el dativo se rinde como ámbito con «en la fe» para conservar el contraste con «por incredulidad».
- source_word: δοὺς δόξαν τῷ θεῷ
  english_pob_choice: giving glory to God
  chosen_spanish: dando gloria a Dios
  alternatives_spanish:
  - y dio gloria a Dios
  - al dar gloria a Dios
  lexicon: BDAG
  rationale: El participio aoristo se vierte con gerundio para mantener la secuencia de acciones y la fluidez del original. «Gloria» es la equivalencia estándar de δόξα en este contexto.
theological_decisions:
- issue: ¿Conviene traducir la negativa como simple duda o como una vacilación más amplia ante la promesa?
  english_pob_reading: did not waver in unbelief
  chosen_spanish_reading: no vaciló por incredulidad
  alternative_spanish_readings:
  - no dudó por incredulidad
  - no vaciló en incredulidad
  rationale: Se preserva la amplitud de διακρίνω como vacilación interna, no solo duda cognitiva. Así se mantiene el contraste retórico con ser fortalecido en la fe, sin resolver la tensión teológica del texto.
  doctrine_reference: Preservar la tensión teológica sin reducirla a mera incertidumbre intelectual.
translation_notes:
  revision_awareness: El contexto inglés revisado mantiene la lectura de alta concordancia sin cambios sustanciales; la versión española conserva esa misma decisión interpretativa, especialmente en la fuerza de διεκρίθη y el paralelismo entre incredulidad y fe.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ/θεῷ conforme al estándar del proyecto.
  - Se usó «fe» para πίστις y «gloria» para δόξα, con sintaxis española natural.
  - Se evitó «SEÑOR» porque el versículo no contiene κύριος ni alusión directa al nombre divino.
  - La expresión «en la fe» preserva el paralelismo con «por incredulidad» sin borrar el contraste semántico.
  - Los marcadores de nota al pie aparecen solo donde hay alternativa lexical real en español.
