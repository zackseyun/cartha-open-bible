review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: mantiene la bienaventuranza, el paralelismo entre ἀνομίαι y ἁμαρτίαι, y la metáfora de «cubrir». Sin embargo, hay un problema de forma y naturalidad en español: falta el cierre de la exclamación inicial y la construcción «aquellos a quienes fueron perdonadas...» suena menos natural que una relativa posesiva directa, más cercana al griego ὧν (''cuyas'').'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero requiere una reparación menor de puntuación y fluidez. «Bienaventurados» funciona bien; «transgresiones de la ley» comunica ἀνομίαι con claridad, aunque es algo más largo que el original. «Fueron cubiertos» concuerda con «pecados» en masculino plural. La frase mejora notablemente con «cuyas ... fueron perdonadas».
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. Se preserva la distinción entre ἀνομίαι y ἁμαρτίαι, en línea con el audit trail inglés. La nota alternativa sobre Μακάριοι puede mantenerse como «dichosos».
  issues:
  - severity: medium
    issue: Falta el signo de cierre de exclamación
    rationale: En español debe escribirse «¡ ... !». El borrador abre con «¡Bienaventurados» pero no cierra la exclamación.
  - severity: medium
    issue: 'Construcción poco natural: «aquellos a quienes fueron perdonadas...»'
    rationale: Aunque comprensible, suena forzada en español. El griego usa ὧν dos veces con valor posesivo/relacional; «cuyas transgresiones de la ley fueron perdonadas, y cuyos pecados fueron cubiertos» es más natural y más directo.
  revised_spanish_text: ¡Bienaventurados[a] aquellos cuyas transgresiones de la ley fueron perdonadas, y cuyos pecados fueron cubiertos!
  revised_footnotes:
  - marker: a
    text: O «dichosos».
    reason: lexical_alternative
