translation:
  language: es
  text: ¡Bienaventurados[a] aquellos cuyas transgresiones de la ley fueron perdonadas, y cuyos pecados fueron cubiertos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dichosos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: BDAG
  rationale: Conserva el sentido declarativo de bendición divina y su tono salmódico, mejor que un equivalente meramente emocional como «felices».
- source_word: ἀφέθησαν
  english_pob_choice: have been forgiven
  chosen_spanish: fueron perdonadas
  alternatives_spanish:
  - han sido perdonadas
  - fueron remitidas
  lexicon: BDAG
  rationale: El pasivo aoristo expresa una acción completa; en español, el pretérito perfecto simple suena natural y mantiene la idea de perdón/remisión sin añadir matices.
- source_word: ἀνομίαι
  english_pob_choice: lawless deeds
  chosen_spanish: las transgresiones de la ley
  alternatives_spanish:
  - las obras sin ley
  - las iniquidades
  lexicon: BDAG
  rationale: «ἀνομία» señala la condición o actos de violar la ley; «transgresiones de la ley» preserva ese forcejeo semántico con claridad en español, evitando un término tradicional menos transparente.
- source_word: ἐπεκαλύφθησαν
  english_pob_choice: have been covered
  chosen_spanish: fueron cubiertos
  alternatives_spanish:
  - han sido cubiertos
  - fueron ocultados
  lexicon: BDAG
  rationale: Se mantiene la metáfora de «cubrir», que refleja la cita del Salmo y no la interpreta ni la suaviza.
- source_word: ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - actos pecaminosos
  lexicon: BDAG
  rationale: Es el equivalente más directo y transparente para ἁμαρτίαι en español bíblico contemporáneo.
theological_decisions:
- issue: Paralelismo entre ἀνομίαι y ἁμαρτίαι
  english_pob_reading: Render both terms distinctly in English
  chosen_spanish_reading: 'Traducir ambos términos de manera distinta: «transgresiones de la ley» y «pecados»'
  alternative_spanish_readings:
  - Usar el mismo término genérico para ambos, como «pecados»
  - Usar dos sinónimos tradicionales sin diferenciar
  rationale: Pablo conserva el paralelismo poético del Salmo, pero no idéntica la semántica de ambos miembros. La traducción mantiene esa distinción sin forzar una separación doctrinal más fuerte que la del texto.
  doctrine_reference: Preservar la tensión teológica y poética del texto; cf. Salmo 32:1 y Romanos 4:7.
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego SBLGNT y el rastro inglés auditado; no se registran revisiones aplicadas en la pasada más reciente, y la traducción española conserva esa lectura estable.
  spanish_consistency_notes:
  - Se usa «Bienaventurados» como fórmula bíblica solemne, pero se evita «SEÑOR» u այլ máscara innecesaria porque no aparece el nombre divino en este versículo.
  - Se preserva la metáfora de «cubiertos» para no desactivar la alusión al Salmo citado por Pablo.
  - Se distingue entre el campo semántico de «transgresiones de la ley» y «pecados», siguiendo la decisión inglesa de mantener ambos términos separados.
