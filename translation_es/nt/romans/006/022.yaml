revisions:
- from: Pero ahora[a], liberados de la esclavitud del pecado y hechos esclavos de Dios[b], tenéis vuestro fruto para santificación, y el fin[c], vida eterna.
  to: Pero ahora, liberados del pecado y hechos esclavos de Dios[b], tienen su fruto para santificación[a], y el fin[c], vida eterna.
  rationale: 'Se corrigió la sobreinterpretación de ἀπὸ τῆς ἁμαρτίας eliminando ''la esclavitud'', se sustituyó ''tenéis'' por ''tienen'' para un español más neutral, y se alinearon las notas con las alternativas reales del expediente inglés: ''santidad'' para ἁγιασμός, una alternativa no duplicativa para δουλωθέντες, y ''el resultado final'' para τέλος.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:11:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y del rastro POB en casi todo: mantiene el contraste νυνὶ δέ, conserva la imagen fuerte de esclavitud con δουλωθέντες, retiene καρπός como ''fruto'', ἁγιασμός como ''santificación'' y τέλος como ''fin''. Sin embargo, ''liberados de la esclavitud del pecado'' no refleja con suficiente precisión ἀπὸ τῆς ἁμαρτίας, que dice ''del pecado'' y no introduce explícitamente ''esclavitud''. Además, la nota [b] repite el texto principal en vez de preservar la alternativa documentada por el inglés.'
  spanish_quality_summary: El español es claro y digno, pero 'tenéis' se inclina al registro peninsular y no encaja del todo con el objetivo de español neutral latinoamericano; 'tienen' funciona mejor aquí. También conviene ajustar la nota [a], porque el inglés preserva una alternativa de 'holiness', no 'resulting in sanctification'. El resto es legible y teológicamente adecuado.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: θεῷ -> ''Dios''; δουλωθέντες -> ''hechos esclavos'' mantiene la fuerza de ''enslaved''; ἁγιασμόν -> ''santificación'' es correcto en el texto principal. La principal desviación es expandir ἁμαρτίας a ''la esclavitud del pecado'', lo cual interpreta más de lo que el texto fuente dice.'
  issues:
  - severity: medium
    issue: Se añade 'la esclavitud' en 'liberados de la esclavitud del pecado'.
    rationale: El griego dice simplemente 'liberados del pecado'. Aunque Romanos 6 desarrolla el dominio del pecado, esa expansión no está en esta cláusula y sobretraduce el texto fuente.
  - severity: medium
    issue: Uso de 'tenéis' en lugar de una forma más neutral latinoamericana.
    rationale: El proyecto pide español neutral latinoamericano/broadly church-readable. 'Tienen' o 'ustedes tienen' suena más panhispánico para este registro.
  - severity: high
    issue: La nota [b] repite exactamente el texto principal.
    rationale: La nota debe preservar una alternativa significativa del expediente inglés. Aquí debería reflejar la otra formulación viable, p. ej. 'esclavizados para Dios' o similar, no duplicar el texto principal.
  - severity: medium
    issue: La nota [a] no corresponde a la alternativa documentada en inglés.
    rationale: El expediente inglés conserva como alternativa 'holiness', no una reformulación aspectual como 'resultando en santificación'. En español debe preservarse una alternativa como 'santidad'.
  - severity: low
    issue: La nota [c] invierte la relación principal/alternativa de τέλος.
    rationale: Si el texto principal dice 'el fin', la nota debe ofrecer la alternativa 'el resultado final' o 'el desenlace'; eso está cerca, pero conviene formularla como alternativa léxica clara y no como sustitución interpretativa excesiva.
  revised_spanish_text: Pero ahora, liberados del pecado y hechos esclavos de Dios[b], tienen su fruto para santificación[a], y el fin[c], vida eterna.
  revised_footnotes:
  - marker: a
    text: O 'santidad'.
    reason: lexical_alternative
  - marker: b
    text: O 'esclavizados para Dios'.
    reason: lexical_alternative
  - marker: c
    text: O 'el resultado final'.
    reason: lexical_alternative
  revision_rationale: 'Se corrigió la sobreinterpretación de ἀπὸ τῆς ἁμαρτίας eliminando ''la esclavitud'', se sustituyó ''tenéis'' por ''tienen'' para un español más neutral, y se alinearon las notas con las alternativas reales del expediente inglés: ''santidad'' para ἁγιασμός, una alternativa no duplicativa para δουλωθέντες, y ''el resultado final'' para τέλος.'
