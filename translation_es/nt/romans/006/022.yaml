translation:
  language: es
  text: Pero ahora, liberados del pecado y hechos esclavos de Dios[b], tienen su fruto para santificación[a], y el fin[c], vida eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'santidad'.
    reason: lexical_alternative
  - marker: b
    text: O 'esclavizados para Dios'.
    reason: lexical_alternative
  - marker: c
    text: O 'el resultado final'.
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δέ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Ahora bien
  - Mas ahora
  lexicon: νυνί; δέ
  rationale: Mantiene el giro contrastivo fuerte del contexto inmediato y suena natural en español contemporáneo sin perder la transición argumentativa.
- source_word: ἐλευθερωθέντες ἀπὸ τῆς ἁμαρτίας
  english_pob_choice: having been freed from sin
  chosen_spanish: liberados de la esclavitud del pecado
  alternatives_spanish:
  - habiendo sido liberados del pecado
  - puestos en libertad del pecado
  lexicon: ἐλευθερόω; ἁμαρτία
  rationale: Conserva la idea de liberación recibida, y explicita la fuerza de ἁμαρτίας en Romanos 6 como dominio/esclavitud del pecado, no solo un acto aislado de perdón.
- source_word: δουλωθέντες δὲ τῷ θεῷ
  english_pob_choice: and enslaved to God
  chosen_spanish: y hechos esclavos de Dios
  alternatives_spanish:
  - y sometidos a Dios
  - y puestos al servicio de Dios
  lexicon: δουλόω; θεός
  rationale: Preserva la metáfora fuerte de δουλόω que la POB inglesa mantiene con 'enslaved'; 'hechos esclavos' refleja mejor la relación de pertenencia y señorío que un término más suave.
- source_word: ἔχετε τὸν καρπὸν ὑμῶν
  english_pob_choice: you have your fruit
  chosen_spanish: tenéis vuestro fruto
  alternatives_spanish:
  - tenéis vuestro fruto
  - poseéis vuestro fruto
  lexicon: καρπός; ἔχω
  rationale: Respeta la metáfora agrícola y la construcción directa del griego sin convertirla en paráfrasis explicativa.
- source_word: εἰς ἁγιασμόν
  english_pob_choice: unto sanctification
  chosen_spanish: para santificación
  alternatives_spanish:
  - hacia santificación
  - con miras a santificación
  lexicon: ἁγιασμός
  rationale: '''Santificación'' conserva el término teológico; ''para'' refleja adecuadamente εἰς como dirección o resultado. En español, ''para santificación'' comunica bien el movimiento sin sonar forzado.'
- source_word: τὸ δὲ τέλος
  english_pob_choice: and the end
  chosen_spanish: y el fin
  alternatives_spanish:
  - y el final
  - y el resultado final
  lexicon: τέλος
  rationale: '''Fin'' mantiene la correspondencia más cercana con τέλος y conserva la ambigüedad útil entre término y desenlace/resultante, que la POB inglesa también preserva.'
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida eterna
  - vida perdurable
  lexicon: ζωή; αἰώνιος
  rationale: Es la traducción natural y doctrinalmente estable en español, manteniendo el valor escatológico del sintagma.
theological_decisions:
- issue: Metáfora de esclavitud aplicada a Dios
  english_pob_reading: Retain the strong metaphor with 'enslaved to God.'
  chosen_spanish_reading: Mantener la imagen fuerte con 'hechos esclavos de Dios'.
  alternative_spanish_readings:
  - sometidos a Dios
  - dedicados a Dios
  - al servicio de Dios
  rationale: Romanos 6 contrasta deliberadamente la esclavitud previa al pecado con la nueva pertenencia a Dios; suavizar la imagen borraría parte de la fuerza del argumento paulino.
  doctrine_reference: 'Contested terms: δοῦλος / slave vs. servant; mantener ''esclavo'' cuando la carga semántica es central'
- issue: ἁγιασμός
  english_pob_reading: Use 'sanctification' in the main text.
  chosen_spanish_reading: Usar 'santificación' en el texto principal.
  alternative_spanish_readings:
  - santidad
  - consagración
  rationale: '''Santificación'' reproduce mejor el valor procesual/resultativo del término en este contexto y evita resolver prematuramente la tensión entre proceso y estado.'
  doctrine_reference: Preservar la tensión léxica y teológica; alternativas documentadas se mantienen como posibles lecturas
- issue: τέλος
  english_pob_reading: the end
  chosen_spanish_reading: el fin
  alternative_spanish_readings:
  - el final
  - el desenlace
  rationale: '''Fin'' conserva la correspondencia léxica estrecha con τέλος y deja abierta la posibilidad de entender tanto término como resultado final.'
  doctrine_reference: Lexical correspondence to τέλος; evitar sobreexplicar el alcance semántico
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para acercar εἰς a 'unto' y τέλος a 'the end'. La redacción española sigue esa decisión conservando la relación direccional ('para') y la equivalencia lexical ('el fin'), sin borrar la tensión entre proceso y resultado en ἁγιασμός.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para τῷ θεῷ conforme al estándar del proyecto.
  - Se usa 'esclavos' y no 'siervos' porque el pasaje explota conscientemente el contraste esclavitud/liberación.
  - '''Santificación'' se conserva como término teológico principal; la nota permite la lectura alternativa sin desplazar el texto principal.'
  - La puntuación reproduce una lectura fluida y publicable en español, con comas que reflejan las pausas del griego.
