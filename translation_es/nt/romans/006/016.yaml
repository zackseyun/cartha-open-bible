translation:
  language: es
  text: ¿No saben que, si se presentan a ustedes mismos como esclavos para obedecer, son esclavos de aquel a quien obedecen, ya sea del pecado, que conduce a la muerte, o de la obediencia, que conduce a la rectitud[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, justicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: παριστάνετε
  english_pob_choice: present yourselves
  chosen_spanish: se presentan a ustedes mismos
  alternatives_spanish:
  - se ofrecen a sí mismos
  - se ponen a disposición
  lexicon: BDAG
  rationale: 'La imagen es concreta: colocarse a disposición de otro. En español, «se presentan a ustedes mismos» conserva esa acción voluntaria y resulta natural; «se ofrecen» es posible, pero puede sonar más interpretativo.'
- source_word: δούλους / δοῦλοί
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: BDAG
  rationale: El término griego enfatiza pertenencia y sujeción real. «Esclavos» mantiene esa fuerza lexical; «siervos» suavizaría indebidamente el contraste paulino.
- source_word: εἰς ὑπακοήν
  english_pob_choice: for obedience
  chosen_spanish: para obediencia
  alternatives_spanish:
  - con miras a obediencia
  - para obedecer
  lexicon: BDAG
  rationale: La preposición expresa dirección/propósito. «Para obediencia» conserva el sustantivo ὑπακοή y la simetría con el segundo miembro del verso.
- source_word: ᾧ ὑπακούετε
  english_pob_choice: the one whom you obey
  chosen_spanish: aquel a quien obedecen
  alternatives_spanish:
  - lo que obedecen
  - el dueño a quien obedecen
  lexicon: BDAG
  rationale: El relativo dativo es personal en el contexto. «Aquel a quien obedecen» explicita la relación sin añadir un sustantivo inexistente en el griego.
- source_word: ἁμαρτίας
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - el pecado
  - la culpa
  lexicon: BDAG
  rationale: En español, «pecado» comunica el término abstracto griego de forma directa. La personificación se sostiene por la metáfora de esclavitud, sin necesidad de explicitar un poder adicional.
- source_word: εἰς θάνατον
  english_pob_choice: leading to death
  chosen_spanish: para muerte
  alternatives_spanish:
  - que conduce a muerte
  - con resultado de muerte
  lexicon: BDAG
  rationale: «Para muerte» reproduce la brevedad y la direccionalidad de εἰς. Aunque «que conduce a muerte» sería más explícito, la forma breve es fiel y bíblica en español.
- source_word: ὑπακοῆς
  english_pob_choice: obedience
  chosen_spanish: obediencia
  alternatives_spanish:
  - obedecer
  - respuesta obediente
  lexicon: BDAG
  rationale: Se preserva el sustantivo para mantener el paralelismo del verso y el contraste con ἁμαρτίας.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: BDAG
  rationale: Aunque el texto griego admite un amplio campo semántico, el audit trail inglés dejó «justice» como alternativa lexical y la consigna del proyecto pide preservar esa tensión en nota. En español, «justicia» encaja de forma natural y conserva la alternativa teológica/lexical.
theological_decisions:
- issue: δικαιοσύνη en contraste paulino
  english_pob_reading: 'righteousness, with lexical footnote: Or, justice.'
  chosen_spanish_reading: 'justicia, con nota: o, rectitud.'
  alternative_spanish_readings:
  - rectitud
  - justificación
  rationale: 'El contexto inmediato contrasta dos esclavitudes y sus resultados: muerte frente a justicia. «Justicia» permite mantener la alternativa documentada por el POB inglés y evita cerrar prematuramente el matiz paulino. Se añade «rectitud» como alternativa española viable para el campo moral/legal sin imponer una sola lectura.'
  doctrine_reference: 'DOCTRINE.md contested terms: δικαιοσύνη → righteousness / justice; preserve lexical tension in notes'
- issue: Personificación de pecado y obediencia
  english_pob_reading: sin leading to death; obedience leading to righteousness
  chosen_spanish_reading: del pecado para muerte; de la obediencia para justicia
  alternative_spanish_readings:
  - del pecado que conduce a muerte
  - de la obediencia que conduce a justicia
  rationale: El griego mantiene sustantivos abstractos y la personificación la aporta el contexto de esclavitud. La traducción española conserva esa forma para no diluir el paralelismo ni introducir una explicación que el texto no formula explícitamente.
  doctrine_reference: Romanos 6:16; personificación paulina del pecado en el contexto de esclavitud
translation_notes:
  revision_awareness: No hubo cambios necesarios en la última pasada de revisión; el borrador coincide con la decisión auditada más reciente y conserva la alternativa documentada para δικαιοσύνη en nota.
  spanish_consistency_notes:
  - Se mantiene «esclavos» para δοῦλος, en línea con la terminología POB y la fuerza lexical del pasaje.
  - Se conserva el paralelismo entre «pecado» y «obediencia» como esferas contrapuestas, sin explicitar más de lo que el griego dice.
  - La nota sobre δικαιοσύνη preserva la tensión lexical documentada por el POB inglés entre «justicia» y «righteousness».
