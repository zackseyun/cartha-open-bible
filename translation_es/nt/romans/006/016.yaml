    issue: δικαιοσύνη fue traducido como ‘justicia’ en el texto principal
    rationale: El audit trail inglés decidió ‘righteousness’ en el texto principal y ‘justice’ en nota por el contraste paulino moral-teológico. El español debe preservar esa decisión; ‘rectitud’ funciona mejor como equivalente principal aquí.
  - severity: high
    issue: La nota [a] está colocada en ‘obediencia’ pero su contenido corresponde a δικαιοσύνη
    rationale: La nota dice ‘O, rectitud’, que no es alternativa de ὑπακοή sino de δικαιοσύνη. Esto crea un error de anclaje y de sentido.
  - severity: medium
