    rationale: Aunque es formalmente cercano al griego, en español eclesial actual ‘para obedecer’ suena más claro y mantiene el sentido de propósito.
  - severity: medium
    issue: ‘para muerte’ resulta rígido
    rationale: El griego εἰς θάνατον expresa resultado/dirección. ‘Que conduce a la muerte’ o ‘que lleva a la muerte’ comunica mejor ese valor en español natural.
  revised_spanish_text: ¿No saben que, si se presentan a ustedes mismos como esclavos para obedecer, son esclavos de aquel a quien obedecen, ya sea del pecado, que conduce a la muerte, o de la obediencia, que conduce a la rectitud[a]?
