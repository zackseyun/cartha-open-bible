  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: «Dios», «Jesús», «Mesías» y la preservación de «en». No hay conflicto con Yahvé ni otros términos sensibles. La elección «Mesías» en vez de «Cristo» está bien justificada aquí.'
