translation:
  language: es
  text: Así también ustedes, considérense[a] muertos al pecado, pero vivos[b] para Dios en Mesías Jesús[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuéntense» o «ténganse por» muertos al pecado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «viviendo para Dios».'
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «en Cristo Jesús»; se traduce «Mesías» para conservar el valor titular de Χριστός.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ
  english_pob_choice: So also
  chosen_spanish: Así también
  alternatives_spanish:
  - De este modo también
  - Así mismo
  lexicon: n/a
  rationale: Mantiene la conexión inferencial con el argumento anterior y suena natural en español sin añadir contenido.
- source_word: λογίζεσθε
  english_pob_choice: consider
  chosen_spanish: considérense[a]
  alternatives_spanish:
  - cuéntense
  - recuérdense
  - ténganse por
  lexicon: BDAG
  rationale: «Considerar» en español moderno es claro, pero «tenerse por» o «contarse» puede reflejar mejor la fuerza de cálculo/reckoning del verbo; por eso se conserva la alternativa en nota.
- source_word: ἑαυτοὺς
  english_pob_choice: yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - a ustedes mismos
  - a sí mismos
  lexicon: n/a
  rationale: La reflexividad queda explícita en el verbo pronominal español; el sujeto enfático «ustedes» conserva la marca directa del griego.
- source_word: νεκροὺς μὲν τῇ ἁμαρτίᾳ
  english_pob_choice: dead to sin
  chosen_spanish: muertos al pecado
  alternatives_spanish:
  - muertos respecto al pecado
  - muertos en cuanto al pecado
  lexicon: BDAG
  rationale: «Muertos al pecado» es la equivalencia idiomática más natural y fiel para la relación dativa; mantiene el contraste con la cláusula siguiente.
- source_word: ζῶντας δὲ τῷ θεῷ
  english_pob_choice: alive to God
  chosen_spanish: vivos para Dios
  alternatives_spanish:
  - viviendo para Dios
  - vivos a Dios
  lexicon: BDAG
  rationale: «Vivos para Dios» conserva el paralelismo con «muertos al pecado» y expresa la relación de orientación sin volverla demasiado interpretativa.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús[c]
  alternatives_spanish:
  - en Cristo Jesús
  - en el Mesías Jesús
  lexicon: n/a
  rationale: Se mantiene el valor locativo/esférico de ἐν. «Mesías» sigue la preferencia terminológica del proyecto para Χριστός cuando funciona como título, evitando borrar ese matiz.
theological_decisions:
- issue: Χριστός como título frente a nombre litúrgico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Aquí Χριστός conserva fuerza titulativa dentro del lenguaje paulino; traducirlo como «Mesías» hace visible ese valor sin perder la referencia a Jesús.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías (where title; Cristo where name-like)'
- issue: Relación de ἐν Χριστῷ Ἰησοῦ
  english_pob_reading: in Messiah Jesus
  chosen_spanish_reading: en Mesías Jesús
  alternative_spanish_readings:
  - por Mesías Jesús
  - unidos a Mesías Jesús
  rationale: Se preserva «en» para no resolver prematuramente la unión/sfera paulina; el texto deja la relación abierta como en el griego.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Valor del contraste μέν ... δέ
  english_pob_reading: dead to sin but alive to God
  chosen_spanish_reading: muertos al pecado, pero vivos para Dios
  alternative_spanish_readings:
  - muertos al pecado y vivos para Dios
  - muertos al pecado; vivos para Dios
  rationale: «Pero» transmite el contraste explícito entre las dos condiciones, sin necesidad de intensificarlo más allá del griego.
  doctrine_reference: Syntactic contrast preserved
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustantivos; el borrador mantiene las decisiones auditadas sobre λογίζεσθε, ζῶντας y Χριστός, y conserva el contraste μέν ... δέ con una solución española natural.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de Χριστός como «Mesías» cuando funciona como título, conforme al criterio del proyecto.
  - «Muertos al pecado / vivos para Dios» conserva el paralelismo paulino sin sobreexplicar la relación dativa.
  - El reflexivo de λογίζεσθε queda expresado en la forma pronominal «considérense»; la nota preserva la alternativa más cercana a «reckon».
