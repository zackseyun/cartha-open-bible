translation:
  language: es
  text: ¿Qué fruto, pues, teníais entonces de aquellas cosas por las que ahora os avergonzáis? Porque el fin de esas cosas es muerte[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «resultado» para «fin».
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνα
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - qué clase de
  - cuál
  lexicon: BDAG
  rationale: En una pregunta retórica, «qué» es natural en español y conserva la fuerza de indagar por la naturaleza del resultado.
- source_word: καρπὸν
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - beneficio
  - resultado
  lexicon: BDAG
  rationale: «Fruto» preserva la metáfora paulina de lo producido por una vida o conducta, sin reducirla a un término abstracto.
- source_word: εἴχετε
  english_pob_choice: did you have
  chosen_spanish: teníais
  alternatives_spanish:
  - tuvisteis
  - estabais teniendo
  lexicon: BDAG
  rationale: El imperfecto expresa una condición habitual o continua en el pasado; «teníais» mantiene mejor esa continuidad que un pasado puntual.
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - antes
  - en aquel tiempo
  lexicon: BDAG
  rationale: «Entonces» conserva el contraste temporal con «ahora» de forma clara y natural en español.
- source_word: ἐφ’ οἷς
  english_pob_choice: from the things of which
  chosen_spanish: de aquellas cosas de las cuales
  alternatives_spanish:
  - por las cuales
  - en las cuales
  lexicon: BDAG
  rationale: La construcción relativa en español requiere explicitar el antecedente implícito; «de aquellas cosas de las cuales» refleja la idea de proceder o derivarse de esas prácticas.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - actualmente
  lexicon: BDAG
  rationale: «Ahora» mantiene el contraste directo con «entonces» y la sencillez del original.
- source_word: ἐπαισχύνεσθε
  english_pob_choice: are ashamed
  chosen_spanish: os avergonzáis
  alternatives_spanish:
  - sentís vergüenza
  - os sentís avergonzados
  lexicon: BDAG
  rationale: «Avergonzarse» expresa la vergüenza moral del contexto mejor que «embarazarse», que sería demasiado débil.
- source_word: τέλος
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - resultado
  - final
  lexicon: BDAG
  rationale: «Fin» conserva tanto la idea de término como la de desenlace; la nota permite la alternativa interpretativa «resultado» sin borrar la tensión semántica.
- source_word: ἐκείνων
  english_pob_choice: those things
  chosen_spanish: de ellas
  alternatives_spanish:
  - de aquellas cosas
  - de esos actos
  lexicon: BDAG
  rationale: Dado que el antecedente inmediato ya es femenino plural («cosas»), «de ellas» es una forma natural y compacta en español, sin perder la referencia.
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - muerte espiritual
  - perecimiento
  lexicon: BDAG
  rationale: «Muerte» es la equivalencia directa y conserva la gravedad teológica del término sin explicar más de lo que el texto dice.
theological_decisions:
- issue: Cómo rendir τέλος sin cerrar la ambigüedad entre terminus y consecuencia
  english_pob_reading: end
  chosen_spanish_reading: fin
  alternative_spanish_readings:
  - resultado
  - desenlace
  rationale: «Fin» mantiene la idea de término/culminación y deja abierta la fuerza consecuencial del contexto, de modo semejante a la decisión inglesa de conservar «end» y notar «outcome» como alternativa.
  doctrine_reference: Mantener la tensión léxica del texto sin interpretarla de forma excesiva.
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego SBLGNT y el hilo auditado del POB inglés, especialmente en la metáfora de «fruto», el contraste «entonces/ahora» y la decisión de preservar τέλος como «fin» con alternativa interpretativa en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo requiere.
  - Se conserva el registro bíblico claro y contemporáneo, evitando «señales» de estilo eclesiástico innecesarias.
  - La nota sobre τέλος replica la alternativa semántica documentada en el audit trail inglés sin sobreexplicar el verso.
