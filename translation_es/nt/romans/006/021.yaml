  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego y sigue de cerca la auditoría inglesa: conserva la pregunta retórica, la metáfora de «fruto», el contraste temporal «entonces/ahora» y la cláusula final sobre el «fin» que es muerte. Sin embargo, la secuencia «de aquellas cosas de las cuales» suena pesada y menos natural que una formulación española más clara que todavía preserve el valor de ἐφ’ οἷς como procedencia/relación con esas prácticas.'
  spanish_quality_summary: El texto es comprensible y doctrinalmente fiel, pero tiene una rigidez innecesaria en «de aquellas cosas de las cuales», que afecta la legibilidad. Una leve reparación mejora la naturalidad sin perder precisión. El resto del versículo está bien en registro, puntuación y tono eclesial moderno.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Fruto», «fin» y «muerte» están bien elegidos. La nota léxica para τέλος = «fin / resultado» está correctamente preservada.
