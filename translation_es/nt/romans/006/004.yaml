    changes_summary: 'Changed ''the Messiah'' to ''Christ'' for more natural English and better consistency with standard rendering of Χριστός in this context; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Por lo tanto, fuimos sepultados con él por medio del bautismo[a] para muerte, para que, así como el Mesías fue resucitado de entre los muertos por la gloria del Padre, así también nosotros andemos en novedad de vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el bautismo»; la preposición griega permite un matiz instrumental que no determina por sí sola una doctrina sacramental específica.'
    reason: theological_note
lexical_decisions:
- source_word: συνετάφημεν
  english_pob_choice: we were buried with
  chosen_spanish: fuimos sepultados con él
  alternatives_spanish:
  - fuimos enterrados con él
  - fuimos sepultados juntamente con él
  lexicon: BDAG
  rationale: El aoristo pasivo expresa una acción pasada completada; en español, «fuimos sepultados» conserva bien esa forma y el matiz de unión se expresa naturalmente con «con él» sin forzar un compuesto artificial.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por lo tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca inferencia lógica a partir del argumento previo. «Por lo tanto» es claro, solemne y fiel al valor conclusivo de οὖν.
- source_word: διὰ τοῦ βαπτίσματος
  english_pob_choice: through baptism
  chosen_spanish: por medio del bautismo
  alternatives_spanish:
  - a través del bautismo
  - mediante el bautismo
  lexicon: BDAG
  rationale: διά con genitivo es instrumental aquí; «por medio de» conserva la idea de medio/instrumento sin convertirla en una afirmación doctrinal adicional sobre el rito.
- source_word: εἰς τὸν θάνατον
  english_pob_choice: into death
  chosen_spanish: en muerte
  alternatives_spanish:
  - hacia la muerte
  - hasta la muerte
  lexicon: BDAG
  rationale: La dirección de εἰς puede sonar extraña en español literal. «En muerte» conserva la incorporación al ámbito de la muerte de Cristo con menos aspereza que una calca, aunque sigue dejando visible la tensión del original.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad de forma natural en español y preserva el valor telico del subjuntivo que sigue.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός como «Mesías», de acuerdo con la política del proyecto y con la fuerza semántica del término en este contexto.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: «De entre los muertos» reproduce con naturalidad la imagen de resurrección desde el ámbito de los muertos, evitando una formulación demasiado plana.
- source_word: διὰ τῆς δόξης τοῦ πατρός
  english_pob_choice: through the glory of the Father
  chosen_spanish: por la gloria del Padre
  alternatives_spanish:
  - por medio de la gloria del Padre
  - a través de la gloria del Padre
  lexicon: BDAG
  rationale: Se conserva la relación instrumental de διά y el sustantivo «gloria» sin sustituirlo por una paráfrasis como «poder».
- source_word: περιπατήσωμεν
  english_pob_choice: we might walk
  chosen_spanish: andemos
  alternatives_spanish:
  - caminemos
  - vivamos
  lexicon: BDAG
  rationale: El verbo griego es metafórico; en español, «andemos» mantiene la imagen bíblica del andar como conducta de vida, sin borrar la metáfora con un simple «vivamos».
- source_word: ἐν καινότητι ζωῆς
  english_pob_choice: in newness of life
  chosen_spanish: en novedad de vida
  alternatives_spanish:
  - en una vida nueva
  - en la novedad de la vida
  lexicon: BDAG
  rationale: «Novedad de vida» preserva la formulación abstracta y densa del griego. Es más exacta que «una vida nueva», que suaviza la construcción y pierde parte del tono paulino.
theological_decisions:
- issue: Cómo reflejar Χριστός sin borrar su fuerza titular ni imponer el nombre litúrgico tradicional
  english_pob_reading: Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La traducción mantiene la lectura titular de Χριστός y sigue la convención del proyecto de traducirlo como «Mesías» cuando no funciona simplemente como nombre propio. En español es comprensible y transparente.
  doctrine_reference: DOCTRINE.md / política de Χριστός → Mesías
- issue: Cómo traducir διὰ τοῦ βαπτίσματος sin resolver la relación entre bautismo y unión con Cristo
  english_pob_reading: through baptism
  chosen_spanish_reading: por medio del bautismo
  alternative_spanish_readings:
  - por el bautismo
  - mediante el bautismo
  rationale: La frase conserva la instrumentalidad del griego sin convertirla en una afirmación sacramental más fuerte de lo que el texto exige. Así se preserva la tensión interpretativa documentada.
  doctrine_reference: Preservar la tensión teológica en vez de cerrarla
- issue: Cómo expresar εἰς τὸν θάνατον sin perder la idea de incorporación al ámbito de la muerte
  english_pob_reading: into death
  chosen_spanish_reading: en muerte
  alternative_spanish_readings:
  - hacia la muerte
  - hasta la muerte
  rationale: Aunque menos idiomática, esta opción conserva el efecto de entrada/incorporación del original. No se sustituye por una paráfrasis que borre la fuerza direccional de εἰς.
  doctrine_reference: Semántica preposicional del griego koiné
translation_notes:
  revision_awareness: 'El texto español sigue el estado más estable del audit trail: Χριστός se mantiene como título («el Mesías») conforme a la política del proyecto; se conserva la instrumentación de διὰ con una expresión española natural; y se respeta la tensión de εἰς τὸν θάνατον sin resolverla hacia una interpretación doctrinal cerrada. No se adoptaron las fluctuaciones de la revisión inglesa entre «Christ» y «Messiah» más allá de la decisión estable de traducir Χριστός como «Mesías».'
  spanish_consistency_notes:
  - Se usó «Por lo tanto» para οὖν, consistente con una inferencia argumentativa clara.
  - «Fuimos sepultados con él» mantiene la unión con Cristo sin introducir una construcción ajena al español.
  - «Novedad de vida» preserva la densidad paulina y evita una paráfrasis excesivamente lisa.
  - La nota al pie se ancla en «en muerte[a]» para señalar la alternativa instrumental sin alterar el cuerpo del texto.
