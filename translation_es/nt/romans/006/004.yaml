source:
  edition: SBLGNT
  text: συνετάφημεν οὖν αὐτῷ διὰ τοῦ βαπτίσματος εἰς τὸν θάνατον, ἵνα ὥσπερ ἠγέρθη Χριστὸς ἐκ νεκρῶν διὰ τῆς δόξης τοῦ πατρός, οὕτως καὶ ἡμεῖς ἐν καινότητι ζωῆς περιπατήσωμεν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/006/004.yaml
  text: Therefore we were buried with him through baptism into death[a], so that just as Messiah was raised from the dead through the glory of the Father, so also we might walk in newness of life.
