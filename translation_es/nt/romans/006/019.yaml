revisions:
- from: Hablo en términos humanos[a] a causa de la debilidad de su carne[b]. Porque así como presentaron sus miembros como esclavos a la impureza y a la iniquidad, para iniquidad, así ahora presenten sus miembros como esclavos a la justicia, para santificación.
  to: Hablo en términos humanos a causa de la debilidad de su carne[a]. Porque así como presentaron sus miembros como esclavos a la impureza y a la iniquidad, que lleva a la iniquidad, así ahora presenten sus miembros como esclavos a la justicia[b], para santificación.
  rationale: 'La revisión corrige el problema principal de fidelidad editorial: reasigna las notas a los términos realmente documentados en el rastro POB, elimina una nota redundante e introduce la nota necesaria en «justicia». También mejora la naturalidad y el valor resultativo de εἰς τὴν ἀνομίαν con «que lleva a la iniquidad», sin reescribir excesivamente el verso. Se conserva «carne» y «esclavos» por fidelidad al griego y a la política terminológica del proyecto. Se mantiene «justicia» como texto principal por naturalidad en español, con alternativa «rectitud» en nota para reflejar la gama semántica relevante en contexto paulino.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:10:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del griego: el contraste entre conducta pasada y mandato presente, el paralelismo de παρεστήσατε / παραστήσατε, la imagen de esclavitud, y el movimiento hacia ἁγιασμός. También mantiene correctamente «carne» para σάρξ con nota explicativa. Sin embargo, hay dos desajustes importantes con el rastro POB y con el griego: (1) las notas a y b quedaron invertidas respecto de sus anclajes y contenidos; la nota [a] no debe ofrecer como alternativa el mismo texto principal, y la alternativa documentada en inglés para δικαιοσύνη («justice») no fue preservada donde corresponde; (2) «iniquidad» para ἀνομία pierde el matiz más específico de «falta de ley / ilegalidad / desafuero» y debilita la repetición retórica de lawlessness, aunque no llega a ser inadmisible. Además, «para iniquidad» suena algo duro en español; conviene hacer explícito el sentido resultativo de εἰς.'
  spanish_quality_summary: 'El español es claro y eclesialmente legible, con buen registro moderno-digno. «Hablo en términos humanos» y «debilidad de su carne» funcionan bien. No obstante, «para iniquidad» suena menos natural que una formulación como «que lleva a más iniquidad» o, mejor aún con mejor alineación léxica, «que lleva al desenfreno»/«a la ilegalidad» según la elección léxica. También hay un problema formal serio de notas: los marcadores no corresponden a los contenidos y eso confunde al lector.'
  glossary_alignment: 'Alineación parcial. Se respeta bien σάρξ -> «carne» y δοῦλος -> «esclavos». Pero δικαιοσύνη, según el rastro POB, debía reflejar el valor principal equivalente a «righteousness»; en español aquí conviene «justicia», pero entonces debe preservarse «rectitud» como alternativa si se desea, o mejor documentar que el inglés conservó «justice» como alternativa desde su propia base. Más importante, ἀνομία queda mejor como «desenfreno» o «ilegalidad/falta de ley» según contexto; «iniquidad» es tradicional pero menos preciso para la repetición léxica del griego. Se recomienda «desenfreno» menos, porque ἀκαθαρσία ya cubre lo moral-impuro; por eso «ilegalidad» tampoco suena idiomática. La opción más fiel y legible aquí es «maldad sin ley» no; mejor mantener una solución simple: «rebeldía contra la ley» sería demasiado interpretativa. Por equilibrio de fidelidad y legibilidad, la revisión retiene «iniquidad» pero mejora la cláusula resultativa y corrige las notas.'
  issues:
  - severity: high
    issue: Las notas al pie están mal asignadas y no preservan la documentación inglesa.
    rationale: En el inglés, una nota corresponde a «flesh» y otra a «righteousness/justice». En el borrador español, [a] se ancla a «términos humanos» con una falsa alternativa idéntica al texto principal, mientras [b] va en «carne». Falta una nota en «justicia» para preservar la alternativa documentada.
  - severity: medium
    issue: «Para iniquidad» es demasiado literal y poco natural para εἰς τὴν ἀνομίαν.
    rationale: El griego expresa resultado/progresión. El rastro POB inglés lo hace explícito con «leading to lawlessness». En español conviene una formulación más natural como «que lleva a la iniquidad» o «que lleva a más iniquidad».
  - severity: medium
    issue: «Iniquidad» para ἀνομία no refleja del todo el matiz léxico de «lawlessness».
    rationale: Aunque es una opción bíblicamente reconocible, «iniquidad» enfatiza maldad general más que falta de ley. No obstante, por legibilidad eclesial puede tolerarse si se conserva la repetición y se mejora el sentido progresivo.
  revised_spanish_text: Hablo en términos humanos a causa de la debilidad de su carne[a]. Porque así como presentaron sus miembros como esclavos a la impureza y a la iniquidad, que lleva a la iniquidad, así ahora presenten sus miembros como esclavos a la justicia[b], para santificación.
  revised_footnotes:
