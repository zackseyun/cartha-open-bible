translation:
  language: es
  text: Hablo en términos humanos a causa de la debilidad de su carne[a]. Porque así como presentaron sus miembros como esclavos a la impureza y a la iniquidad, que lleva a la iniquidad, así ahora presenten sus miembros como esclavos a la justicia[b], para santificación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Carne» también puede entenderse, de manera más interpretativa, como «naturaleza pecaminosa», aunque el griego deja la expresión más amplia.
    reason: lexical_alternative
  - marker: b
    text: O «rectitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθρώπινον λέγω
  english_pob_choice: I am speaking in human terms
  chosen_spanish: Hablo en términos humanos
  alternatives_spanish:
  - Les hablo en términos humanos
  - Estoy hablando en términos humanos
  - Hablo humanamente
  lexicon: BDAG
  rationale: La expresión griega es idiomática y señala acomodación al entendimiento humano ordinario. «En términos humanos» conserva ese valor sin volverlo una paráfrasis excesiva. «Hablo» mantiene la forma directa y breve del griego.
- source_word: ἀσθένειαν
  english_pob_choice: weakness
  chosen_spanish: debilidad
  alternatives_spanish:
  - fragilidad
  - debilidad humana
  lexicon: BDAG
  rationale: «Debilidad» refleja bien el sentido amplio de ἀσθένεια y funciona naturalmente en español. «Fragilidad» es posible, pero sugiere con más fuerza precariedad física. Se evita estrechar el sentido.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza pecaminosa
  - naturaleza humana caída
  lexicon: BDAG
  rationale: Se conserva «carne» para mantener la amplitud del término paulino. La POB en inglés documenta que «sinful nature» es una alternativa interpretativa, pero el griego aquí no obliga a esa restricción. «Carne» deja visible la tensión teológica.
- source_word: παρεστήσατε / παραστήσατε
  english_pob_choice: presented / present
  chosen_spanish: presentaron / presenten
  alternatives_spanish:
  - ofrecieron / ofrezcan
  - entregaron / entreguen
  - pusieron / pongan
  lexicon: BDAG
  rationale: «Presentar» reproduce bien el paralelismo verbal del verso y la relación entre pasado y mandato actual. «Ofrecer» o «entregar» son posibles, pero debilitan el enlace léxico con el original.
- source_word: μέλη
  english_pob_choice: members
  chosen_spanish: miembros
  alternatives_spanish:
  - partes del cuerpo
  - miembros corporales
  lexicon: BDAG
  rationale: «Miembros» es el equivalente español natural y tradicional para el uso paulino metafórico de μέλη. Mantiene la referencia corporal sin explicitarla en exceso.
- source_word: δοῦλα
  english_pob_choice: slaves
  chosen_spanish: como esclavos
  alternatives_spanish:
  - como siervos
  - como servidores
  lexicon: BDAG
  rationale: Se conserva «esclavos» porque la imagen de servidumbre forzada es central en Romanos 6. «Siervos» suavizaría indebidamente la fuerza léxica del texto.
- source_word: ἀκαθαρσίᾳ
  english_pob_choice: impurity
  chosen_spanish: la impureza
  alternatives_spanish:
  - la inmundicia
  - la suciedad ritual/moral
  lexicon: BDAG
  rationale: «Impureza» es transparente y moderna en español, y corresponde al sentido moral del término. «Inmundicia» es posible, pero suena más arcaica o más material.
- source_word: ἀνομίᾳ / ἀνομίαν
  english_pob_choice: lawlessness / lawlessness
  chosen_spanish: la iniquidad / iniquidad
  alternatives_spanish:
  - la anomia / anomia
  - la ilegalidad / ilegalidad
  - la falta de ley / falta de ley
  lexicon: BDAG
  rationale: En español bíblico, «iniquidad» comunica el campo de ἀνομία sin sonar técnico. «Anomia» sería demasiado especializada y «ilegalidad» suena estrechamente jurídico. Se conserva la repetición léxica en ambas ocurrencias.
- source_word: εἰς τὴν ἀνομίαν
  english_pob_choice: leading to lawlessness
  chosen_spanish: para iniquidad
  alternatives_spanish:
  - con resultado de iniquidad
  - hacia iniquidad
  - para más iniquidad
  lexicon: BDAG
  rationale: La preposición εἰς aquí expresa dirección o resultado. «Para iniquidad» es breve y conserva la progresión del verso, aunque en español requiere una lectura un poco más inferida que el inglés «leading to».
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia de Dios
  lexicon: BDAG
  rationale: Se adopta «justicia» porque el español permite una equivalencia clara y porque la POB inglesa preserva la alternativa «justice» como nota léxica. En este contexto de contraste ético, «justicia» funciona bien y evita importar una lectura más devocional de «rectitud».
- source_word: ἁγιασμόν
  english_pob_choice: sanctification
  chosen_spanish: santificación
  alternatives_spanish:
  - santidad
  - consagración
  lexicon: BDAG
  rationale: «Santificación» comunica el proceso o resultado del verbo implícito en el argumento de Pablo. «Santidad» podría sonar más estática; «consagración» desplaza el énfasis hacia dedicación.
theological_decisions:
- issue: Sentido de σάρξ en «la debilidad de su carne»
  english_pob_reading: Flesh, with a footnoted possibility of sinful nature
  chosen_spanish_reading: carne, con nota sobre posible sentido más interpretativo
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - naturaleza humana caída
  rationale: Se mantiene «carne» en el texto principal para no cerrar prematuramente la amplitud paulina. La alternativa «naturaleza pecaminosa» existe, pero interpreta más de lo que el griego exige aquí. La nota preserva la tensión entre corporeidad humana y condición moral.
  doctrine_reference: 'DOCTRINE.md: σάρξ sarx | flesh (literal) / sinful nature (metaphorical) | Context-dependent; per-verse documented'
- issue: Elección entre δικαιοσύνη y justicia/rectitud
  english_pob_reading: righteousness, with a footnoted alternative justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia de Dios
  rationale: El contraste con ἀκαθαρσία y ἀνομία favorece una traducción ética general como «justicia». Se conserva la posibilidad de «rectitud» como matiz, pero no se impone en el texto principal porque «justicia» es más natural y mantiene la terminología doctrinal disponible.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη dikaiosynē | righteousness | justice | Both renderings preserved in footnotes for Pauline passages'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego SBLGNT y el rastro de auditoría en inglés de la POB. No se introdujeron cambios sustantivos respecto del sentido ya documentado: se conserva la imagen de esclavitud, la repetición de ἀνομία, la amplitud de σάρξ y la preferencia por δικαιοσύνη como «justicia» en español, con notas para las alternativas relevantes.'
  spanish_consistency_notes:
  - Se mantuvo «carne» en vez de «naturaleza pecaminosa» para no resolver interpretativamente σάρξ.
  - Se usó «esclavos» para δοῦλα, en coherencia con la fuerza léxica del pasaje.
  - Se preservó la repetición de «iniquidad» para ἀνομία / ἀνομίαν.
  - Se eligió «santificación» para ἁγιασμόν como término paulino procesual.
  - Se evitó «SEÑOR» y otras sustituciones no presentes en este verso.
