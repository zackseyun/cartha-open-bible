translation:
  language: es
  text: sabiendo esto[a], que nuestro viejo hombre fue crucificado con él, para que el cuerpo del pecado[b] quede sin poder, de modo que ya no seamos esclavos del pecado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conociendo esto»; o «al saber esto».'
    reason: alternative_reading
  - marker: b
    text: 'O: «sea dejado sin efecto», «sea hecho inoperante» o «sea abolido».'
    reason: alternative_reading
  - marker: c
    text: 'O: «para que ya no sirvamos al pecado».'
    reason: alternative_reading
lexical_decisions:
- source_word: γινώσκοντες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - conociendo
  - al saber esto
  lexicon: BDAG
  rationale: El participio expresa una base de conocimiento que enlaza con el argumento anterior; en español, «sabiendo» conserva bien ese valor conectivo sin convertirlo en una oración causal más explicativa de lo que permite el griego.
- source_word: ὁ παλαιὸς ἡμῶν ἄνθρωπος
  english_pob_choice: our old self
  chosen_spanish: nuestro viejo hombre
  alternatives_spanish:
  - nuestro viejo yo
  - nuestro antiguo ser
  lexicon: BDAG
  rationale: La expresión paulina es un idiomático antropológico y el griego mantiene forma masculina singular. «Viejo hombre» preserva mejor la textura del original y la tensión teológica, aunque suene menos idiomático que «viejo yo».
- source_word: συνεσταυρώθη
  english_pob_choice: was crucified with him
  chosen_spanish: fue crucificado con él
  alternatives_spanish:
  - fue co-crucificado con él
  - fue crucificado juntamente con él
  lexicon: BDAG
  rationale: El prefijo συν- exige que la crucifixión compartida sea explícita. «Con él» comunica de manera natural la unión con el Mesías sin imponer un tecnicismo innecesario.
- source_word: καταργηθῇ
  english_pob_choice: might be rendered powerless
  chosen_spanish: sea anulado
  alternatives_spanish:
  - sea dejado sin efecto
  - sea hecho inoperante
  - sea abolido
  lexicon: BDAG
  rationale: En Pablo, καταργέω suele implicar quedar sin eficacia activa. «Sea anulado» mantiene la idea de quedar invalidado o sin operatividad, sin afirmar una destrucción ontológica que el texto no exige.
- source_word: τὸ σῶμα τῆς ἁμαρτίας
  english_pob_choice: the body of sin
  chosen_spanish: el cuerpo del pecado
  alternatives_spanish:
  - el cuerpo dominado por el pecado
  - el cuerpo pecaminoso
  lexicon: BDAG
  rationale: Se conserva la construcción genitiva compacta del griego. «El cuerpo del pecado» deja abierta la relación exacta entre cuerpo y pecado, tal como hace el original.
- source_word: δουλεύειν
  english_pob_choice: to be enslaved / serve
  chosen_spanish: seamos esclavos
  alternatives_spanish:
  - sirvamos
  - estemos sujetos como esclavos
  lexicon: BDAG
  rationale: δουλεύω conserva la fuerza de esclavitud/servicio bajo señorío. Dado el uso paulino y el énfasis doctrinal del POB, «esclavos» preserva mejor la imagen fuerte que «sirvamos».
theological_decisions:
- issue: Sentido de ὁ παλαιὸς ἡμῶν ἄνθρωπος en español
  english_pob_reading: our old self
  chosen_spanish_reading: nuestro viejo hombre
  alternative_spanish_readings:
  - nuestro viejo yo
  rationale: El griego es formalmente masculino singular y funciona como una categoría teológica de la antigua condición adámica. En español, «viejo hombre» retiene esa forma y la tensión del original; la alternativa más idiomática se deja implícita por la elección de «viejo».
  doctrine_reference: Tensión lexical y antropológica preservada; primacía del original sobre la neutralización idiomática.
- issue: Fuerza de καταργηθῇ respecto al cuerpo del pecado
  english_pob_reading: might be rendered powerless
  chosen_spanish_reading: sea anulado
  alternative_spanish_readings:
  - sea dejado sin efecto
  - sea hecho inoperante
  - sea destruido
  rationale: El texto habla del quebrantamiento de la eficacia del pecado por la unión con la crucifixión del Mesías. «Sea anulado» expresa esa inoperancia sin exagerar hasta una aniquilación física o metafísica.
  doctrine_reference: Primacía del griego sobre una lectura dogmáticamente intensificada; mantener la tensión textual.
- issue: δουλεύειν ἡμᾶς τῇ ἁμαρτίᾳ y su imagen de esclavitud
  english_pob_reading: so that we should no longer be enslaved to sin
  chosen_spanish_reading: a fin de que ya no seamos esclavos del pecado
  alternative_spanish_readings:
  - para que ya no sirvamos al pecado
  - a fin de que ya no estemos sujetos al pecado
  rationale: La relación con el pecado es de esclavitud, no solo de servicio genérico. «Esclavos» conserva el peso semántico del verbo y la imagen paulina con claridad en español.
  doctrine_reference: Terminología de esclavitud preservada por fuerza léxica; coherencia con la teología paulina del dominio del pecado.
translation_notes:
  revision_awareness: El contexto inglés más reciente cambió de «old man» a «old self» para mayor naturalidad, pero la evidencia griega sigue siendo ὁ παλαιὸς ἡμῶν ἄνθρωπος; por eso el español conserva la imagen más cercana al original («nuestro viejo hombre») y refleja las alternativas idiomáticas en nota. También se mantuvo la lectura funcional de καταργηθῇ y la terminología fuerte de δουλεύω como esclavitud, en línea con el audit trail.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» según contexto; este versículo no contiene nombres divinos directos.
  - «Pecado» se traduce consistentemente como ἁμαρτία.
  - Se preservó la construcción paralela de dos propósitos/resultado con «para que / a fin de que».
  - Se eligió «esclavos» para reflejar la fuerza de δουλεύω, coherente con el tratamiento POB de la esclavitud espiritual.
