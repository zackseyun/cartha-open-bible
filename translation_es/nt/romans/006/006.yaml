    issue: «sea anulado» debilita o desplaza el matiz principal de καταργηθῇ
    rationale: El expediente inglés fija como lectura principal «might be rendered powerless», no «abolished/nullified». En español, «anulado» suena más a cancelación o nulidad que a pérdida de poder operativo. «quede sin poder» preserva mejor la decisión léxica y teológica documentada.
  - severity: low
    issue: La relación entre las dos cláusulas finales puede sonar algo mecánica con «para que ... a fin de que»
    rationale: El griego tiene ἵνα seguido de un infinitivo articular de resultado/propósito. En español, variar la segunda conexión a «de modo que» mejora la fluidez sin perder el valor argumental.
