review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del griego: una repudiación enfática seguida de la afirmación de que los creyentes murieron al pecado y, por tanto, no pueden seguir viviendo en él. Sin embargo, la combinación «¿cómo viviremos todavía en él?» suena más predictiva que retórica en español y no refleja tan bien el valor de incredulidad de πῶς ἔτι con el futuro retórico. También «hemos muerto» es defendible, pero aquí «morimos»/«murimos» no es adecuado; una forma más natural y directa para el argumento paulino en español es «morimos al pecado» o mejor aún con perífrasis modal en la segunda cláusula.'
  spanish_quality_summary: 'El español es claro y digno, pero la segunda pregunta se beneficia de una formulación más idiomática: «¿cómo podemos todavía vivir en él?» o «¿cómo seguiremos viviendo en él?». La opción actual «¿cómo viviremos todavía en él?» resulta algo rígida. Además, en las alternativas léxicas aparece «murimos», forma incorrecta en español estándar.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «pecado», «vivir», y el pronombre «él» están bien. La nota léxica para μὴ γένοιτο es adecuada y preserva la alternativa documentada en inglés.
  issues:
  - severity: medium
    issue: La pregunta retórica «¿cómo viviremos todavía en él?» suena poco natural en español y debilita la incredulidad de πῶς ἔτι.
    rationale: El futuro indicativo griego aquí es retórico; en español, una perífrasis modal como «¿cómo podemos todavía vivir en él?» comunica mejor la imposibilidad implícita sin perder fidelidad.
  - severity: low
    issue: «hemos muerto» es posible, pero no es la opción más directa para este contexto argumentativo.
    rationale: El inglés auditado prefirió «died» por la sencillez del aoristo; en español bíblico moderno «morimos al pecado» suena más conciso y mantiene la ruptura decisiva sin añadir matiz aspectual innecesario.
  - severity: low
    issue: La alternativa léxica «murimos» en las decisiones es una forma incorrecta.
    rationale: La forma correcta es «morimos». Aunque esto está en metadatos y no en el texto principal, conviene corregirlo en revisión editorial.
  revised_spanish_text: ¡De ninguna manera![a] Nosotros, que morimos al pecado, ¿cómo podemos todavía vivir en él?
  revised_footnotes:
