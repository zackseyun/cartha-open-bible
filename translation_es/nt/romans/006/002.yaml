translation:
  language: es
  text: ¡De ninguna manera![a] Nosotros, que morimos al pecado, ¿cómo podemos todavía vivir en él?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Que eso no suceda!»; expresión fuerte de repudio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ γένοιτο
  english_pob_choice: Absolutely not!
  chosen_spanish: ¡De ninguna manera!
  alternatives_spanish:
  - ¡Absolutamente no!
  - ¡Jamás!
  - ¡Que eso no suceda!
  lexicon: BDAG
  rationale: La expresión griega es una fuerte repulsa idiomática en Pablo. «¡De ninguna manera!» comunica rechazo enfático y suena natural en español moderno, sin volverla rígida ni suavizarla demasiado.
- source_word: οἵτινες
  english_pob_choice: We who
  chosen_spanish: Nosotros, que
  alternatives_spanish:
  - Los que
  - Nosotros que
  lexicon: BDAG
  rationale: Conserva la identificación inclusiva en primera persona y la fuerza relativa del griego. La coma ayuda a reflejar la función explicativa de la cláusula relativa en español.
- source_word: ἀπεθάνομεν
  english_pob_choice: died
  chosen_spanish: hemos muerto
  alternatives_spanish:
  - morimos
  - murimos
  lexicon: BDAG
  rationale: Aunque el aoristo puede leerse como pasado puntual, en español «hemos muerto» expresa bien una acción decisiva con resultado vigente, sin perder la ruptura con el pecado que el contexto presupone.
- source_word: τῇ ἁμαρτίᾳ
  english_pob_choice: to sin
  chosen_spanish: al pecado
  alternatives_spanish:
  - a la pecaminosidad
  - respecto al pecado
  lexicon: BDAG
  rationale: El dativo con ἀποθνῄσκω indica relación o esfera. «Al pecado» es la forma más natural y fiel en español para expresar esa relación sin sobreexplicar la metáfora.
- source_word: πῶς ἔτι
  english_pob_choice: how can we still
  chosen_spanish: ¿cómo viviremos todavía
  alternatives_spanish:
  - ¿cómo podremos seguir viviendo
  - ¿cómo seguiremos viviendo
  lexicon: BDAG
  rationale: La pregunta retórica expresa incredulidad ante una continuación. «Todavía» conserva ἔτι y mantiene la fuerza temporal de la frase.
- source_word: ζήσομεν
  english_pob_choice: live
  chosen_spanish: viviremos
  alternatives_spanish:
  - seguiremos viviendo
  - hemos de vivir
  lexicon: BDAG
  rationale: El futuro griego funciona retóricamente. «Viviremos» preserva la simplicidad verbal y suena natural tras la pregunta en español.
- source_word: ἐν αὐτῇ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - en ello
  - en eso
  - en él mismo
  lexicon: BDAG
  rationale: El referente es «el pecado», entendido aquí como esfera o dominio personificado. En español, el pronombre masculino concuerda con «pecado» y conserva la referencia sin repetir el sustantivo.
theological_decisions:
- issue: Cómo expresar la muerte al pecado sin explicarla excesivamente como cambio moral interior
  english_pob_reading: The wording 'died to sin' is preserved as a decisive relational break, without paraphrasing it into explanation.
  chosen_spanish_reading: «Hemos muerto al pecado» se conserva como ruptura decisiva de relación o dominio, no como mera mejoría moral.
  alternative_spanish_readings:
  - Nos hemos vuelto insensibles al pecado
  - Nos hemos apartado del pecado
  rationale: 'La formulación mantiene la metáfora paulina y su tensión teológica: una muerte respecto al pecado que fundamenta la imposibilidad de seguir viviendo bajo su esfera. Evita resolver el sentido en una sola interpretación doctrinal.'
  doctrine_reference: Preservar la tensión teológica, no explicitarla en exceso.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente griego y la auditoría inglesa POB. No se introdujeron cambios respecto del sentido central: se preservó la repulsión idiomática de μὴ γένοιτο, la relación de muerte respecto al pecado y la pregunta retórica con ἔτι y el futuro de ζήσομεν.'
  spanish_consistency_notes:
  - Se mantiene «pecado» de forma consistente para ἁμαρτία.
  - Se usa «al pecado» y «en él» para conservar la esfera/dominio personificado sin repetir innecesariamente el sustantivo.
  - Se prefirió un registro bíblico claro y moderno, con puntuación que refleje la ruptura retórica del griego.
