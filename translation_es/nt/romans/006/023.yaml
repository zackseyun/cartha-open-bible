translation:
  language: es
  text: Porque la paga[a] del pecado es muerte, pero el don[b] de Dios es vida eterna en Mesías Jesús nuestro Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salario».
    reason: lexical_alternative
  - marker: b
    text: O «don de gracia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀψώνια
  english_pob_choice: wages
  chosen_spanish: paga
  alternatives_spanish:
  - salario
  - recompensa
  lexicon: BDAG
  rationale: En español, «paga» conserva la idea de pago debido por un trabajo o servicio, manteniendo el contraste entre lo que se gana y lo que se recibe gratuitamente. «Salario» suena más laboral y moderno, pero puede estrechar la imagen; «recompensa» suaviza demasiado el matiz de remuneración.
- source_word: ἁμαρτίας
  english_pob_choice: of sin
  chosen_spanish: del pecado
  alternatives_spanish:
  - de pecado
  - procedente del pecado
  lexicon: BDAG
  rationale: 'El genitivo expresa relación posesiva o atributiva: la paga perteneciente al pecado. «Del pecado» es la forma más natural en español y preserva la concisión del griego.'
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - muerte física
  - muerte
  lexicon: BDAG
  rationale: «Muerte» reproduce de manera directa el término griego sin especificar más de lo que el texto dice. La frase mantiene el peso teológico y deja abierta la amplitud de sentido.
- source_word: χάρισμα
  english_pob_choice: gift
  chosen_spanish: don
  alternatives_spanish:
  - regalo
  - don gratuito
  - don de gracia
  lexicon: BDAG
  rationale: «Don» en español comunica un regalo concedido por favor, más solemne y bíblico que «regalo». El POB inglés conserva «gift» para mantener el contraste con «wages»; «don» mantiene ese contraste sin volverlo demasiado coloquial.
- source_word: ζωὴ αἰώνιος
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida perdurable
  - vida eterna
  lexicon: BDAG
  rationale: La expresión está bien establecida en español bíblico y es la forma más clara y fiel para el lector actual.
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - por medio de
  - unidos a
  lexicon: BDAG
  rationale: Se conserva «en» para mantener la esfera o unión con Cristo, sin reducirla a un sentido instrumental. La decisión sigue la tensión teológica documentada en el POB inglés.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  - Ungido
  lexicon: BDAG
  rationale: Se traduce el título como «Mesías» conforme a la política del proyecto para Χριστός cuando funciona como título. «Cristo» queda como alternativa idiomática, pero aquí se preserva la carga titulativa y la coherencia doctrinal del POB.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar y directo.
- source_word: κύριῳ ἡμῶν
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - nuestro Dueño
  - nuestro Amo
  lexicon: BDAG
  rationale: «Señor» es la equivalencia natural y reverente para κύριος en este cierre confesional. «Amo» o «Dueño» no convienen al registro cristiano ni al uso litúrgico de la frase.
theological_decisions:
- issue: 'ἐν Χριστῷ Ἰησοῦ: unión/sfera o medio'
  english_pob_reading: Rendered 'in Messiah Jesus'
  chosen_spanish_reading: «en Mesías Jesús»
  alternative_spanish_readings:
  - por Mesías Jesús
  - mediante Mesías Jesús
  - unidos a Mesías Jesús
  rationale: Se mantiene «en» porque el griego expresa con naturalidad esfera o unión con Cristo, y el POB inglés ya documenta que no debe estrecharse a una causalidad instrumental. La traducción conserva la tensión paulina sin explicarla en exceso.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Χριστός como título, no como nombre fijo
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El texto griego usa el título Χριστός; traducirlo como «Mesías» mantiene la fuerza semántica y evita importar por costumbre una forma eclesiástica menos transparente. Se conserva el valor titulativo en el nombre compuesto «Mesías Jesús».
  doctrine_reference: Política POB sobre Χριστός / Messiah language.
- issue: χάρισμα y el matiz de gracia
  english_pob_reading: gift
  chosen_spanish_reading: don
  alternative_spanish_readings:
  - don de gracia
  - regalo
  rationale: χάρισμα contiene la idea de un don otorgado por gracia. «Don» mantiene el contraste con la paga del pecado y evita añadir una redundancia que el griego no exige. La alternativa «don de gracia» sería explicativa, pero no necesaria en el texto principal.
  doctrine_reference: Mantener el contraste paulino entre merecido y concedido.
translation_notes:
  revision_awareness: El audit trail inglés pasó por una oscilación entre «Messiah Jesus» y «Christ Jesus», con una corrección regresiva que restableció «Messiah» por política doctrinal. La traducción española sigue la lectura restaurada y, a diferencia del texto inglés final, explicita el título con «Mesías» para reflejar con mayor transparencia Χριστός. También se preserva la decisión de no convertir ἐν en una expresión meramente instrumental.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός según la terminología por defecto del proyecto.
  - «Señor» se usa para κύριος en un cierre confesional estándar.
  - «Don» se eligió para χάρισμα por naturalidad y contraste con «paga», sin perder el matiz de gracia.
  - La puntuación y el orden favorecen la lectura pública en español sin añadir interpretación no sustentada.
