translation:
  language: es
  text: sabiendo que el Mesías[a], habiendo sido resucitado de entre los muertos, ya no muere; la muerte ya no domina sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - puesto que sabemos
  - porque sabemos
  lexicon: BDAG
  rationale: El participio introduce el conocimiento compartido que fundamenta la afirmación. «Sabiendo» conserva la forma participial y mantiene la relación lógica sin explicitar indebidamente una conjunción causal.
- source_word: Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no solo como nombre fijo. Por eso se traduce «Mesías», siguiendo el principio de conservar el valor titular y el sentido doctrinal del término.
- source_word: ἐγερθεὶς
  english_pob_choice: having been raised
  chosen_spanish: habiendo sido resucitado
  alternatives_spanish:
  - resucitado
  - siendo resucitado
  lexicon: BDAG
  rationale: El participio aoristo pasivo se vierte con una construcción que preserve el pasivo y la anterioridad relativa respecto de «ya no muere». En español, «habiendo sido resucitado» es claro y fiel.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - de entre los muertos
  lexicon: BDAG
  rationale: La expresión idiomática española más natural y precisa para la resurrección es «de entre los muertos», que conserva la idea de salida desde el conjunto de los muertos.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - ya no
  lexicon: BDAG
  rationale: «Ya no» comunica con naturalidad la cesación definitiva de la condición expresada por el verbo, y funciona bien en ambas ocurrencias del versículo.
- source_word: ἀποθνῄσκει
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - está muriendo
  lexicon: BDAG
  rationale: El presente simple en español expresa adecuadamente que Cristo ya no está sujeto a la muerte como realidad continua.
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: BDAG
  rationale: Se conserva el sustantivo como sujeto personificado del verbo, con artículo definido para que suene natural en español sin perder la personificación paulina.
- source_word: κυριεύει
  english_pob_choice: rules over
  chosen_spanish: se enseñorea de
  alternatives_spanish:
  - domina sobre
  - rige sobre
  - tiene dominio sobre
  lexicon: BDAG
  rationale: Aunque el audit trail inglés opta por «rules over», el verbo griego expresa dominación/señorío. «Se enseñorea de» preserva mejor esa fuerza semántica y la imagen de poder ejercido por la muerte.
theological_decisions:
- issue: Título cristológico Χριστός en contexto paulino
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La lectura inglesa trata Χριστός como título significativo. En español, «Mesías» transmite esa función titular con mayor transparencia que el uso eclesial fijo de «Cristo».
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesiah/Mesías when title; Christ/Cristo where name-like'
- issue: Dominio de la muerte sobre Cristo resucitado
  english_pob_reading: death no longer rules over him
  chosen_spanish_reading: la muerte ya no se enseñorea de él
  alternative_spanish_readings:
  - la muerte ya no domina sobre él
  - la muerte ya no tiene dominio sobre él
  rationale: El griego usa κυριεύω, verbo de señorío/dominio. «Se enseñorea de» conserva esa carga teológica y relacional mejor que una formulación más genérica.
  doctrine_reference: BDAG κυριεύω; Romanos 6:9
translation_notes:
  revision_awareness: 'Concordamos con la revisión más reciente: no se requieren cambios sustantivos respecto del sentido del original. La decisión principal es mantener «Mesías» y reforzar el matiz de dominio de κυριεύει con «se enseñorea de», sin alterar el contenido recibido ni añadir explicación ajena al versículo.'
  spanish_consistency_notes:
  - 'Se mantiene la terminología POB: «Mesías» para Χριστός como título, «resucitado» para ἐγερθεὶς, y una expresión fuerte para κυριεύει que preserve dominación.'
  - El español es neutro y publicable para lectura eclesial amplia, con puntuación acorde al uso moderno.
  - No se suaviza la personificación de «la muerte», que permanece como sujeto activo en la segunda cláusula.
