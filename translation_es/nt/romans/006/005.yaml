review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del griego: condición introducida por εἰ γάρ, unión/participación con Cristo mediante σύμφυτοι, el matiz de ὁμοίωμα como «semejanza», y la elipsis de la segunda cláusula. Sin embargo, «hemos sido unidos» debilita el valor aspectual y léxico de γεγόναμεν + σύμφυτοι, porque suena pasivo y menos cercano a «hemos llegado a estar/ser». Además, «lo seremos» hace referencia poco natural en español y oscurece el predicado elíptico que el inglés POB explicitó con razón.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para sonar más natural y fiel a la vez. «Hemos llegado a estar unidos con él» o «hemos llegado a ser unidos con él» reflejaría mejor el perfecto; aun más natural es repetir el predicado en la segunda mitad. «Lo seremos» es comprensible, pero algo rígido y menos idiomático en registro bíblico claro. La puntuación y el registro general son adecuados.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. «Semejanza» es apropiado para ὁμοίωμα; «resurrección» y «muerte» están bien. La decisión sobre σύμφυτοι debe seguir la justificación auditada: mejor una expresión relacional clara que preserve la participación real. En español, esto se logra mejor con «hemos llegado a estar unidos con él» / «también estaremos unidos con él» que con el pasivo «hemos sido unidos».'
  issues:
  - severity: medium
    issue: «hemos sido unidos con él» para γεγόναμεν σύμφυτοι
    rationale: 'El griego expresa un estado resultante: «hemos llegado a ser / hemos llegado a estar unidos». La formulación actual suena pasiva y desplaza el foco desde el resultado presente al evento de haber sido unidos.'
  - severity: medium
    issue: «lo seremos» para ἐσόμεθα
    rationale: Aunque intenta conservar la elipsis, en español el pronombre «lo» resulta menos natural y menos claro que repetir el predicado implícito. El inglés POB ya documentó que conviene explicitar «united with him» para claridad.
  - severity: low
    issue: Nota b podría sonar demasiado literal con «de la resurrección» sin marcar que es una representación formal del griego
    rationale: La nota es básicamente correcta, pero conviene mantenerla como explicación de la elipsis, no como una lectura española natural del texto.
  revised_spanish_text: Porque si hemos llegado a estar unidos con él en la semejanza de su muerte[a], ciertamente también estaremos unidos con él en la semejanza de su resurrección[b].
