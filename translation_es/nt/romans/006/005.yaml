translation:
  language: es
  text: Porque si hemos llegado a estar unidos con él en la semejanza de su muerte[a], ciertamente también estaremos unidos con él en la semejanza de su resurrección[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «crecidos juntamente con él».'
    reason: lexical_alternative
  - marker: b
    text: 'El griego dice literalmente: «también seremos de la resurrección»; aquí se sobreentiende «unidos con él» desde la primera cláusula.'
    reason: alternative_reading
lexical_decisions:
- source_word: σύμφυτοι
  english_pob_choice: united with him
  chosen_spanish: unidos con él
  alternatives_spanish:
  - crecidos juntamente con él
  - unidos con él orgánicamente
  lexicon: BDAG
  rationale: El adjetivo expresa una unión real y compartida; en español, «unidos con él» comunica esa participación sin volverla demasiado técnica. «Crecidos juntamente con él» conserva más literalmente la imagen orgánica, pero suena menos natural en este contexto.
- source_word: γεγόναμεν
  english_pob_choice: have become
  chosen_spanish: hemos sido
  alternatives_spanish:
  - hemos llegado a ser
  - hemos quedado
  lexicon: BDAG
  rationale: El perfecto señala una condición ya lograda con efecto presente. «Hemos sido» funciona bien en español para introducir el estado resultante de unión; «hemos llegado a ser» sería más explícito, pero algo más explicativo que el griego.
- source_word: τῷ ὁμοιώματι
  english_pob_choice: in the likeness
  chosen_spanish: en la semejanza
  alternatives_spanish:
  - en la forma
  - en el parecido
  lexicon: BDAG
  rationale: «Semejanza» conserva el valor relacional del dativo sin reducir el término a mera apariencia. «En la forma» podría sonar más técnico, pero aquí «semejanza» sigue de cerca el paralelo del texto y es comprensible en español.
- source_word: τοῦ θανάτου αὐτοῦ
  english_pob_choice: of his death
  chosen_spanish: de su muerte
  alternatives_spanish:
  - de la muerte de él
  lexicon: BDAG
  rationale: Es una construcción genitiva directa y no requiere expansión. «De su muerte» es la forma natural y fiel en español.
- source_word: ἀλλὰ καὶ
  english_pob_choice: we will certainly also
  chosen_spanish: ciertamente también
  alternatives_spanish:
  - también ciertamente
  - además también
  lexicon: BDAG
  rationale: En español no hace falta repetir el sujeto para mantener el énfasis. «Ciertamente también» conserva la fuerza ascendente de la segunda cláusula sin sobrecargar la frase.
- source_word: τῆς ἀναστάσεως
  english_pob_choice: in the likeness of his resurrection
  chosen_spanish: en la semejanza de su resurrección
  alternatives_spanish:
  - de la resurrección
  - en la resurrección
  lexicon: BDAG
  rationale: Se mantiene la estructura paralela con la primera cláusula y se evita añadir una explicación que el griego no expresa explícitamente. El español puede omitir el posesivo «su» sin romper la referencia a Cristo, pero aquí se conserva por claridad y paralelismo.
- source_word: ἐσόμεθα
  english_pob_choice: we will be united with him
  chosen_spanish: lo seremos
  alternatives_spanish:
  - seremos unidos con él
  - seremos
  lexicon: BDAG
  rationale: El verbo griego es simplemente «seremos», pero depende del predicado implícito de la primera cláusula. En español, «lo seremos» retoma esa unión sin repetir de forma pesada toda la expresión. «Seremos unidos con él» explicita más el sentido, pero hace menos visible elipsis del original.
theological_decisions:
- issue: Cómo traducir la unión con Cristo sin resolver la tensión entre participación real y «semejanza»
  english_pob_reading: Kept the wording at 'united with him in the likeness of his death ... in the likeness of his resurrection' without importing a narrower doctrinal explanation.
  chosen_spanish_reading: Se conserva la idea de unión real («unidos con él») junto con «semejanza», sin convertir el versículo en una explicación sacramental o meramente metafórica.
  alternative_spanish_readings:
  - unidos a la imagen de su muerte ... a la imagen de su resurrección
  - crecidos juntamente con él en su muerte ... en su resurrección
  rationale: El texto afirma una participación auténtica, pero también limita esa participación con ὁμοίωμα / «semejanza». La traducción mantiene ambas cosas sin resolver el modo exacto de la unión.
  doctrine_reference: Preservar la tensión teológica del pasaje; no armonizarla de antemano con una sola lectura doctrinal.
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del audit trail: no se registran revisiones aplicadas y el pase final indicó que no eran necesarios cambios. Se conserva la fuerza del paralelismo entre muerte y resurrección, junto con la elipsis del verbo final y el valor relacional de σύμφυτοι.'
  spanish_consistency_notes:
  - Se usa «unidos con él» para σύμφυτοι, coherente con la decisión auditada del inglés, pero en español se mantiene una opción fluida y no excesivamente técnica.
  - «Semejanza» traduce ὁμοίωμα de manera consistente con el paralelismo del versículo y evita sustituirlo por «forma» sin justificación textual.
  - 'La nota [b] conserva la elipsis reconocida en el inglés POB: el segundo miembro depende de la unión expresada en la primera cláusula.'
  - Se mantiene «resurrección» sin añadir calificativos; el texto griego no introduce una especificación doctrinal adicional.
