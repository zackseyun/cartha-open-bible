revisions:
- from: Porque si hemos sido unidos con él en la semejanza de su muerte[b][a], ciertamente también lo seremos en la semejanza de su resurrección.
  to: Porque si hemos llegado a estar unidos con él en la semejanza de su muerte[a], ciertamente también estaremos unidos con él en la semejanza de su resurrección[b].
  rationale: Se ajusta γεγόναμεν para reflejar mejor el perfecto resultativo sin introducir voz pasiva innecesaria, y se explicita el predicado en la segunda cláusula para evitar el español poco natural de «lo seremos», en línea con la rationale del inglés POB sobre la elipsis. También se reubican las notas para que el marcador de alternativa léxica ancle mejor en la primera cláusula y la nota de lectura literal quede en la segunda, donde corresponde a ἐσόμεθα y la elipsis de τῆς ἀναστάσεως.
  reviewer_model: gpt-5.4
