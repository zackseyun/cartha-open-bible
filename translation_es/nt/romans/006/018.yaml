translation:
  language: es
  text: Y habiendo sido liberados del pecado, fueron hechos esclavos de la justicia[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia».
    reason: lexical_alternative
  - marker: b
    text: Lit. «fueron esclavizados a la justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλευθερωθέντες
  english_pob_choice: having been freed
  chosen_spanish: habiendo sido liberados
  alternatives_spanish:
  - habiendo sido libertados
  - después de haber sido puestos en libertad
  lexicon: BDAG
  rationale: El participio aoristo pasivo expresa una acción recibida y completada. «Liberados» comunica bien la idea de ser puestos en libertad sin perder el matiz pasivo; se mantiene el estado resultante en español natural.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ enlaza el argumento de forma suave. «Y» reproduce esa conexión discursiva sin añadir contraste que el contexto inmediato no exige.
- source_word: ἁμαρτίας
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - el pecado
  lexicon: BDAG
  rationale: En Pablo, ἁμαρτία suele funcionar como poder dominador personificado. «El pecado» preserva ese valor abstracto y personalizante mejor que una formulación más moralizante o concreta.
- source_word: ἐδουλώθητε
  english_pob_choice: you were enslaved
  chosen_spanish: fueron esclavizados
  alternatives_spanish:
  - fueron hechos esclavos
  - quedaron esclavizados
  lexicon: BDAG
  rationale: El verbo δουλόω exige conservar la metáfora de esclavitud, que es central en Romanos 6. «Esclavizados» retiene la fuerza del cambio de dominio sin suavizarla a «servir».
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia de Dios
  lexicon: BDAG
  rationale: El inglés POB preserva la alternativa «justice»; en español, «justicia» es la opción natural y mantiene la amplitud forense/covenantal de δικαιοσύνη. Se evita «rectitud» por ser más restrictivo en este contexto paulino.
theological_decisions:
- issue: Metáfora de esclavitud aplicada al cambio de señorío
  english_pob_reading: you were enslaved to righteousness
  chosen_spanish_reading: fueron esclavizados a la justicia
  alternative_spanish_readings:
  - fueron hechos esclavos de la justicia
  - se hicieron siervos de la justicia
  rationale: La imagen de transferencia de dominio es estructural en Romanos 6 y no debe diluirse. «Esclavizados» conserva el peso teológico del contraste con el pecado y evita rebajar la metáfora a mera obediencia voluntaria.
  doctrine_reference: 'Contested terms: δοῦλος — usar «esclavo» cuando la condición vinculada es el sentido saliente.'
- issue: δικαιοσύνη con posible matiz de justicia frente a rectitud
  english_pob_reading: Or “justice.”
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - la rectitud
  - la justicia divina
  rationale: Se preserva la ambigüedad funcional que el inglés POB anotó como alternativa. «Justicia» es la mejor opción base en español y deja espacio al trasfondo forense y relacional de Pablo.
  doctrine_reference: 'Romanos paulino: δικαιοσύνη admite fuerza legal/covenantal además de cualidad moral.'
translation_notes:
  revision_awareness: El borrador sigue el estado de alta concordancia del audit trail inglés; no hay revisiones aplicadas en la última pasada y se mantiene la lectura central de libertad desde el pecado y esclavitud a la justicia.
  spanish_consistency_notes:
  - Se conserva el par conceptual liberados/esclavizados para reflejar el contraste del verso.
  - Se eligió «justicia» como término principal para δικαιοσύνη, con nota de alternativa semántica.
  - La voz pasiva en español mantiene el foco en la acción recibida por los destinatarios, como en el griego.
