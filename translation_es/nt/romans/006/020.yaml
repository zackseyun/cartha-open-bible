translation:
  language: es
  text: Porque cuando ustedes eran esclavos del pecado, eran libres en cuanto a la justicia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: La fuerza léxica de δοῦλος en Romanos 6 es de pertenencia y dominio, no de simple servicio. «Esclavos» conserva esa tensión y sigue la elección auditada del POB en inglés.
- source_word: ἁμαρτίας
  english_pob_choice: of sin
  chosen_spanish: del pecado
  alternatives_spanish:
  - al pecado
  - del error
  lexicon: BDAG
  rationale: 'El genitivo se entiende naturalmente como relación de pertenencia o dominio: «esclavos del pecado» comunica que el pecado era su amo o esfera de su esclavitud.'
- source_word: ἐλεύθεροι
  english_pob_choice: free
  chosen_spanish: libres
  alternatives_spanish:
  - desligados
  - independientes
  lexicon: BDAG
  rationale: '«Libres» conserva el contraste irónico de Pablo: la esclavitud al pecado implicaba una falsa libertad respecto de la justicia.'
- source_word: τῇ δικαιοσύνῃ
  english_pob_choice: in regard to righteousness
  chosen_spanish: en cuanto a la justicia
  alternatives_spanish:
  - con respecto a la justicia
  - respecto de la justicia
  - de la justicia
  lexicon: BDAG
  rationale: El dativo expresa referencia o respectividad, no oposición ni separación simple. «En cuanto a» mantiene esa relación sin sugerir que la justicia fuera una opresión.
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: BDAG
  rationale: En este contexto paulino, «justicia» es una forma natural y fiel en español; la alternativa «rectitud» podría sonar menos idiomática aquí. El POB inglés preservó la alternativa «justice», por lo que el español usa «justicia» como base.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: «Porque» expresa bien la conexión explicativa y suena natural al inicio de la oración en español.
theological_decisions:
- issue: Cómo expresar la relación con la justicia sin borrar la ironía paulina
  english_pob_reading: you were free in regard to righteousness
  chosen_spanish_reading: eran libres en cuanto a la justicia
  alternative_spanish_readings:
  - eran libres de la justicia
  - no tenían nada que ver con la justicia
  rationale: 'La lectura elegida conserva la tensión del griego y del POB: no significa que la justicia los liberara, sino que estaban libres respecto de ella, fuera de su ámbito de lealtad.'
  doctrine_reference: Preservar la tensión teológica y retórica del pasaje sin resolverla prematuramente.
translation_notes:
  revision_awareness: Coincide con el tramo más reciente del audit trail en sentido y decisión principal. Se mantiene la equivalencia óptima del POB inglés y la misma distinción entre esclavitud al pecado y libertad respecto de la justicia, con ajuste natural al español.
  spanish_consistency_notes:
  - Se usa «esclavos» para δοῦλοι, conforme al criterio POB de preservar la fuerza social y teológica del término.
  - Se evita «SEÑOR» o formulaciones de máscara porque el verso no contiene el nombre divino ni κύριος.
  - «Justicia» se conserva como término principal; la nota ofrece «rectitud» como alternativa semántica, paralela a la nota inglesa sobre “justice/ righteousness”.
  - La construcción «en cuanto a» reproduce la respectividad del dativo sin introducir una idea de separación absoluta.
