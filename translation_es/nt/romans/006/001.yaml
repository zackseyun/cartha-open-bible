review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura retórica del griego y conserva adecuadamente el sentido de ἵνα ... πλεονάσῃ con «para que ... aumente». También preserva las alternativas léxicas documentadas en el rastro inglés. Sin embargo, «perseverar en el pecado» suena menos natural y ligeramente más marcado en español que el valor básico de ἐπιμένω aquí; «seguir en el pecado» o «continuar en el pecado» refleja mejor la deliberación sobre una conducta continuada.
  spanish_quality_summary: El español es claro y eclesialmente legible, pero «perseverar en el pecado» introduce una colocación algo dura y menos idiomática. «Seguir en el pecado» mejora la naturalidad sin perder fuerza. La puntuación y el registro son adecuados. Las notas son correctas y útiles.
  glossary_alignment: '«gracia» alinea bien con χάρις. No hay términos del glosario mayor en conflicto. La excepción relevante es ἐπιμένω: conviene evitar «perseverar» como término principal aquí porque en español suele tener connotación positiva o de firmeza encomiable; «seguir» o «continuar» preserva mejor el matiz contextual negativo. «Persistir» funciona bien como alternativa en nota.'
  issues:
  - severity: medium
    issue: «perseverar en el pecado» como traducción principal de ἐπιμένωμεν
    rationale: Aunque semánticamente posible, en español «perseverar» suele sonar más valorativo o menos idiomático en este contexto. El rastro inglés prioriza «continue», con «persist» como alternativa; «seguir» o «continuar» representa mejor el sentido básico y la naturalidad española.
  - severity: low
    issue: Alternativa principal inglesa «continue» no queda reflejada en la principal española
    rationale: La nota incluye «persistir», pero la traducción base debería corresponder más de cerca al audit trail salvo razón fuerte en contra. Aquí no parece haber razón suficiente para alejarse hacia «perseverar».
