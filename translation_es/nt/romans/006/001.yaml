translation:
  language: es
  text: ¿Qué diremos entonces? ¿Debemos seguir en el pecado, para que la gracia aumente?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Debemos persistir en el pecado ... ?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que la gracia abunde.»'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί οὖν
  english_pob_choice: What then
  chosen_spanish: ¿Qué diremos entonces?
  alternatives_spanish:
  - ¿Qué, pues, diremos?
  - Entonces, ¿qué diremos?
  lexicon: τίς; οὖν
  rationale: Mantiene la transición inferencial de Pablo y su tono retórico en un español natural. «Entonces» preserva bien el valor de οὖν sin volver la frase rígida.
- source_word: ἐροῦμεν
  english_pob_choice: shall we say
  chosen_spanish: ¿Qué diremos?
  alternatives_spanish:
  - ¿Qué diremos nosotros?
  - ¿Qué hemos de decir?
  lexicon: λέγω
  rationale: El futuro deliberativo en una pregunta retórica se expresa con naturalidad en español con «diremos». Conserva el valor de deliberación sin sobrecargar la frase.
- source_word: ἐπιμένωμεν
  english_pob_choice: should we continue
  chosen_spanish: ¿Debemos perseverar
  alternatives_spanish:
  - ¿Debemos continuar
  - ¿Debemos persistir
  lexicon: ἐπιμένω
  rationale: «Perseverar» refleja mejor la idea de permanecer con insistencia en una conducta que un simple continuar. Se preserva la fuerza de la acción sostenida y la alternativa inglesa «persist in sin».
- source_word: τῇ ἁμαρτίᾳ
  english_pob_choice: in sin
  chosen_spanish: en el pecado
  alternatives_spanish:
  - en pecado
  - en la práctica del pecado
  lexicon: ἁμαρτία
  rationale: El dativo con ἐπιμένω expresa permanecer en la esfera o práctica del pecado; en español, «en el pecado» comunica esa esfera de manera clara y fiel. Se evita una paráfrasis excesiva.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: ἵνα
  rationale: Conserva la relación de propósito o resultado que Pablo enuncia, de forma idiomática en español.
- source_word: ἡ χάρις
  english_pob_choice: grace
  chosen_spanish: la gracia
  alternatives_spanish:
  - la gracia de Dios
  - el favor de Dios
  lexicon: χάρις
  rationale: Se mantiene el término teológico estándar «gracia», que aquí alude a la gracia divina en el argumento paulino. No se explicita «de Dios» porque el contexto inmediato ya lo sostiene.
- source_word: πλεονάσῃ
  english_pob_choice: may increase
  chosen_spanish: aumente
  alternatives_spanish:
  - abunde
  - se multiplique
  lexicon: πλεονάζω
  rationale: «Aumente» expresa con claridad el aumento de cantidad o alcance. Se conserva la alternativa tradicional «abunde» en nota para reflejar la posibilidad semántica del verbo.
theological_decisions:
- issue: 'Tono de la pregunta retórica: permiso, exhortación u oposición a una mala inferencia'
  english_pob_reading: 'A deliberative moral question: ''Should we continue in sin'''
  chosen_spanish_reading: 'Una pregunta deliberativa y moral: «¿Debemos perseverar en el pecado?»'
  alternative_spanish_readings:
  - ¿Debemos seguir en el pecado?
  - ¿Hemos de perseverar en el pecado?
  rationale: La construcción griega plantea una inferencia a evaluar, no una simple predicción. «Debemos» conserva el carácter deliberativo y moral sin suavizar la fuerza de la pregunta de Pablo.
  doctrine_reference: Romanos 6:1; mantener la tensión retórica sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'El pasaje coincide de forma alta con el audit trail inglés: se conservan la pregunta deliberativa, la esfera del pecado y el propósito final con la gracia. No se registran revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se mantiene «gracia» para χάρις, en coherencia con el uso paulino y con el estándar POB.
  - Se traduce ἁμαρτία con «pecado» en la esfera ética, sin convertirla en una abstracción distinta.
  - Se usa «perseverar» como opción española que recoge la idea de permanecer en una conducta con insistencia, alineada con la alternativa inglesa «persist in sin».
