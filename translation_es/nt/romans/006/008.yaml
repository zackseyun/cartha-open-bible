translation:
  language: es
  text: Ahora bien, si morimos con el Mesías[a], creemos que también viviremos con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Cristo»: griego «Χριστῷ» (Christō).'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: Now if
  chosen_spanish: Ahora bien, si
  alternatives_spanish:
  - Y si
  - Pero si
  lexicon: BDAG
  rationale: εἰ introduce la condición y δέ marca la transición del argumento; «Ahora bien, si» expresa esa progresión de manera natural en español sin perder el matiz inferencial.
- source_word: ἀπεθάνομεν
  english_pob_choice: we died
  chosen_spanish: morimos
  alternatives_spanish:
  - hemos muerto
  - murimos
  lexicon: BDAG
  rationale: El aoristo expresa la co-muerte ya considerada en el argumento; en español «morimos» comunica bien el hecho pasado/constativo sin forzar una forma compuesta menos natural aquí.
- source_word: σὺν Χριστῷ
  english_pob_choice: with the Messiah
  chosen_spanish: con el Mesías
  alternatives_spanish:
  - con Cristo
  lexicon: BDAG
  rationale: σύν expresa asociación o unión, por lo que «con» es directo. Χριστῷ funciona aquí como título, y se traduce «Mesías» conforme al criterio del proyecto para el uso titular.
- source_word: πιστεύομεν
  english_pob_choice: we believe
  chosen_spanish: creemos
  alternatives_spanish:
  - confiamos
  lexicon: BDAG
  rationale: «Creemos» es la equivalencia más directa y clara para πιστεύομεν en esta declaración de convicción.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Introduce el contenido de la creencia; «que» conserva la estructura de manera transparente.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - también,
  lexicon: BDAG
  rationale: Aquí añade la realidad correspondiente a la co-muerte previa; «también» reproduce bien ese paralelismo.
- source_word: συζήσομεν
  english_pob_choice: we will also live
  chosen_spanish: viviremos
  alternatives_spanish:
  - viviremos juntos
  - compartiremos vida
  lexicon: BDAG
  rationale: El verbo compuesto significa vivir con/junto con. En español, «viviremos» deja que el complemento siguiente exprese la compañía sin sonar forzado.
- source_word: αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  - con él también
  lexicon: BDAG
  rationale: Aunque formalmente es dativo, con συζάω el sentido natural es de compañía; «con él» lo expresa de modo idiomático en español.
theological_decisions:
- issue: Renderizar Χριστῷ como título
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El contexto habla de unión con Jesús en su identidad mesiánica; traducir Χριστῷ como «Mesías» preserva el valor titular señalado por el POB en inglés y evita convertirlo sin necesidad en nombre litúrgico.
  doctrine_reference: DOCTRINE.md Contested terms / Translate titles; transliterate names
- issue: Naturaleza de la vida futura en συζήσομεν αὐτῷ
  english_pob_reading: we will also live with him
  chosen_spanish_reading: también viviremos con él
  alternative_spanish_readings:
  - también viviremos otra vez con él
  - también compartiremos vida con él
  rationale: La traducción mantiene la amplitud de la afirmación paulina sin especificar más de lo que el griego dice; así se conserva la tensión teológica y el alcance del texto.
  doctrine_reference: DOCTRINE.md Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del audit trail, que restauró «Mesías» para Χριστός/Χριστῷ conforme a la política del proyecto, después de una revisión que había cambiado indebidamente el término a «Cristo».
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστῷ, en coherencia con la terminología doctrinal del proyecto.
  - Se evitó «SEÑOR» u otras equivalencias no presentes en el texto fuente.
  - «con él» se conserva en minúsculas por tratarse de un pronombre referencial común, no de un título.
