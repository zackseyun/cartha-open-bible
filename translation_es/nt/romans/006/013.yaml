translation:
  language: es
  text: Y no presenten sus miembros al pecado como armas de injusticia[a], sino preséntense ustedes mismos a Dios como vivos de entre los muertos, y sus miembros a Dios como armas de justicia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrumentos» de justicia / injusticia.
    reason: lexical_alternative
  - marker: b
    text: O «rectitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: παριστάνετε / παραστήσατε
  english_pob_choice: present
  chosen_spanish: presenten / preséntense
  alternatives_spanish:
  - ofrezcan / ofrécanse
  - entreguen / entréguense
  lexicon: BDAG
  rationale: «Presentar» conserva el verbo repetido en ambos mandatos y refleja bien la idea de poner algo o a alguien a disposición de otro, sin añadir una paráfrasis de servicio que el griego no dice explícitamente.
- source_word: μέλη
  english_pob_choice: members
  chosen_spanish: miembros
  alternatives_spanish:
  - partes del cuerpo
  - miembros del cuerpo
  lexicon: BDAG
  rationale: «Miembros» reproduce el uso paulino habitual para las partes del cuerpo implicadas moralmente, y mantiene la correspondencia con el inglés POB y con el paralelismo del versículo.
- source_word: ὅπλα
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - instrumentos
  - utensilios
  lexicon: BDAG
  rationale: «Armas» preserva la imagen de combate del texto y funciona naturalmente en español; «instrumentos» sería más amplio, pero debilita la fuerza metafórica.
- source_word: ἀδικίας
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - injusticia moral
  - maldad
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por «unrighteousness», en español «injusticia» comunica mejor el contraste moral sin sonar forzado. Mantiene el paralelismo con «justicia» en la segunda mitad y sigue siendo compatible con el campo semántico de ἀδικία.
- source_word: ἁμαρτίᾳ
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - el pecado
  lexicon: BDAG
  rationale: «Pecado» es el equivalente natural y directo en español para ἁμαρτία en este contexto personificado. El dativo se conserva con la preposición «para» para reflejar la dirección implícita del acto.
- source_word: ὡσεὶ ἐκ νεκρῶν ζῶντας
  english_pob_choice: as alive from the dead
  chosen_spanish: como vivos de entre los muertos
  alternatives_spanish:
  - como vivos salidos de entre los muertos
  - como quienes viven de entre los muertos
  lexicon: BDAG
  rationale: La frase busca conservar la fuerza comparativa de ὡσεὶ y la imagen de resurrección sin sobreexplicar. «De entre los muertos» suena natural en español bíblico y mantiene la oposición vida/muerte.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: BDAG
  rationale: En este versículo, «justicia» conserva el paralelismo con «injusticia» y refleja bien el contraste ético del pasaje. Se mantiene la alternativa «rectitud» como posibilidad semántica, aunque no se usa en el texto principal.
theological_decisions:
- issue: Relación de lealtad entre pecado y Dios
  english_pob_reading: The verse is rendered with direct dative relationships (“to sin,” “to God”) without expanding them into interpretive paraphrases such as “in service to.”
  chosen_spanish_reading: 'La versión mantiene relaciones directas de dirección y pertenencia: «para el pecado» y «a Dios», sin expandirlas a fórmulas interpretativas como «al servicio de».'
  alternative_spanish_readings:
  - en servicio del pecado / en servicio de Dios
  - al pecado / a Dios
  rationale: El griego comunica una orientación de la acción hacia dos señores rivales, y el español conserva esa tensión sin añadir vocabulario que no esté en el texto. La preposición «para» en la primera cláusula expresa el destino indebido de los miembros, mientras «a Dios» preserva la entrega positiva del segundo mandato.
  doctrine_reference: Romanos 6:13; comparación con el marco de esclavitud al pecado y obediencia a Dios en Romanos 6:12-14
translation_notes:
  revision_awareness: El inglés POB revisó la cláusula de ὡσεὶ ἐκ νεκρῶν ζῶντας para eliminar «those» y acercarse más al griego. La redacción española sigue esa revisión con «como vivos de entre los muertos», sin agregar un sustantivo explicativo equivalente a «those» y manteniendo la concisión formal.
  spanish_consistency_notes:
  - Se conserva el paralelismo léxico entre «injusticia» y «justicia» para reflejar ἀδικίας / δικαιοσύνης.
  - «Presenten / preséntense» reproduce el mandato doble del griego y mantiene la repetición retórica.
  - La traducción evita «ofrecer» por ser menos precisa que «presentar» para el valor del verbo en este contexto.
  - La nota a pie sobre «instrumentos» se aplica únicamente a ὅπλα y no altera el texto principal.
