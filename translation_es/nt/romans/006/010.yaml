revisions:
- from: Porque la muerte que murió[a], al pecado murió una vez para siempre; pero la vida que vive, la vive para Dios.
  to: Porque la muerte que murió[a], murió al pecado una vez para siempre; pero la vida que vive, la vive para Dios.
  rationale: Se conserva el paralelismo formal del original y del POB inglés, junto con la nota alternativa teológicamente importante. La única reparación necesaria es reordenar 'al pecado murió' a 'murió al pecado', que es mucho más natural en español y expresa mejor la relación del dativo sin alterar el sentido. No hace falta adjudicación especial.
