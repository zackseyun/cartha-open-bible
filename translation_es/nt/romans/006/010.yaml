review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura griega y el paralelismo de ὃ...ἀπέθανεν / ὃ δὲ ζῇ. Mantiene correctamente el valor explicativo de γάρ, el pasado simple de ἀπέθανεν y el sentido definitivo de ἐφάπαξ. También preserva adecuadamente la nota alternativa sobre τῇ ἁμαρτίᾳ. Sin embargo, la combinación 'al pecado' / 'para Dios' no reproduce de manera suficientemente natural ni equilibrada en español la antítesis del dativo griego; conviene ajustar ambas expresiones para mayor fidelidad semántica y legibilidad.
  spanish_quality_summary: El texto es claro y digno, pero 'la muerte que murió' y 'la vida que vive' suenan algo literales, aunque todavía aceptables por el paralelismo paulino. El problema principal de legibilidad está en 'al pecado murió' y, sobre todo, 'la vive para Dios', que en español bíblico natural suena menos idiomático que 'murió al pecado' / 'vive para Dios' o una solución paralela con 'respecto'. Se requiere una reparación pequeña para mejorar naturalidad sin perder forma.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεῷ se traduce correctamente como ''Dios''. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La decisión principal es sintáctico-lexical: para τῇ ἁμαρτίᾳ y τῷ θεῷ, el español debe preservar mejor la relación/orientación contrastiva. ''Murió al pecado'' es una fórmula estable y comprensible; ''vive para Dios'' sigue siendo natural. La nota alternativa debe conservar ''por el pecado'' y ''con respecto al pecado''.'
  issues:
  - severity: medium
    issue: Desequilibrio y leve extrañeza en 'al pecado murió ... para Dios'
    rationale: El griego usa dativo en ambos miembros para marcar relación/orientación contrastiva. En español, 'murió al pecado' es idiomático, pero 'vive para Dios' cambia de régimen y debilita el paralelismo. Reordenar el primer miembro mejora claridad y evita tropiezo sintáctico.
  - severity: low
    issue: Literalidad algo rígida en 'la muerte que murió' / 'la vida que vive'
    rationale: Es defendible por el audit trail y el paralelismo del original, así que no exige reescritura mayor. Puede mantenerse si se corrige la sintaxis circundante.
  revised_spanish_text: Porque la muerte que murió[a], murió al pecado una vez para siempre; pero la vida que vive, la vive para Dios.
  revised_footnotes:
  - marker: a
    text: 'O: «murió por el pecado» o «murió con respecto al pecado».'
    reason: alternative_reading
  revision_rationale: Se conserva el paralelismo formal del original y del POB inglés, junto con la nota alternativa teológicamente importante. La única reparación necesaria es reordenar 'al pecado murió' a 'murió al pecado', que es mucho más natural en español y expresa mejor la relación del dativo sin alterar el sentido. No hace falta adjudicación especial.
