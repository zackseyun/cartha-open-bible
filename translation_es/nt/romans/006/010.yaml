translation:
  language: es
  text: Porque la muerte que murió[a], murió al pecado una vez para siempre; pero la vida que vive, la vive para Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «murió por el pecado» o «murió con respecto al pecado».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὃ
  english_pob_choice: the death he died
  chosen_spanish: la muerte que murió
  alternatives_spanish:
  - lo que murió
  - la muerte que él murió
  lexicon: BDAG
  rationale: El relativo neutro funciona de modo idiomático con el verbo repetido y apunta al hecho/materia de su morir. En español, 'la muerte que murió' conserva esa estructura y el paralelismo sin añadir explicación interpretativa.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación de la afirmación anterior; 'Porque' mantiene esa conexión lógica con naturalidad en español.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - ha muerto
  lexicon: BDAG
  rationale: El aoristo se expresa mejor con pasado simple; 'murió' comunica el acto completo y histórico.
- source_word: τῇ ἁμαρτίᾳ
  english_pob_choice: to sin
  chosen_spanish: al pecado
  alternatives_spanish:
  - para el pecado
  - con respecto al pecado
  lexicon: BDAG
  rationale: El dativo expresa relación/orientación. 'Al pecado' preserva bien el contraste de Pablo con 'para Dios' y evita sugerir pecado personal en Cristo, manteniendo la tensión teológica del texto.
- source_word: ἐφάπαξ
  english_pob_choice: once for all
  chosen_spanish: una vez para siempre
  alternatives_spanish:
  - una vez
  - de una vez y para siempre
  lexicon: BDAG
  rationale: '''Una vez para siempre'' comunica el valor de acto único, irrepetible y definitivo, con registro natural y solemne en español.'
- source_word: ὃ δὲ ζῇ
  english_pob_choice: but the life he lives
  chosen_spanish: pero la vida que vive
  alternatives_spanish:
  - pero lo que vive
  - pero en cuanto vive
  lexicon: BDAG
  rationale: Se conserva el paralelismo con la primera cláusula y la construcción resulta natural en español.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora bien
  lexicon: BDAG
  rationale: Marca contraste con la cláusula anterior; 'pero' reproduce mejor ese giro discursivo.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: para Dios
  alternatives_spanish:
  - a Dios
  - con referencia a Dios
  lexicon: BDAG
  rationale: El dativo expresa dirección/orientación. 'Para Dios' equilibra 'al pecado' en la primera mitad y conserva la idea de una vida enteramente orientada a Dios.
theological_decisions:
- issue: Cómo traducir τῇ ἁμαρτίᾳ sin insinuar que Cristo fue personalmente pecador
  english_pob_reading: to sin
  chosen_spanish_reading: al pecado
  alternative_spanish_readings:
  - para el pecado
  - con respecto al pecado
  rationale: La frase describe la relación de la muerte de Cristo con la esfera y la exigencia del pecado, no una culpa personal. 'Al pecado' mantiene la antítesis con 'para Dios' y evita resolver la tensión con una paráfrasis explicativa.
  doctrine_reference: Preservar la tensión teológica del texto sin introducir pecado personal en Cristo.
translation_notes:
  revision_awareness: El texto base inglés ya había resuelto el relativo neutro como 'the death he died' y mantenía la nota alternativa sobre τῇ ἁμαρτίᾳ. La presente versión corrige la forma española para anclar la nota [a] en el sintagma correspondiente y conservar la misma decisión exegética sin mecanicismo.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y no se introduce 'Señor'.
  - Se conserva el paralelismo 'al pecado' / 'para Dios' como rasgo interpretativo central.
  - '''Una vez para siempre'' refleja la irrepetibilidad del acto, no solo su temporalidad.'
  - La nota [a] está anclada en 'al pecado' para corresponder a la ambigüedad del dativo.
