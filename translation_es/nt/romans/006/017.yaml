translation:
  language: es
  text: Pero gracias a Dios porque, aunque erais esclavos del pecado, obedecisteis de corazón a aquel modelo[a] de enseñanza al cual[b] fuisteis entregados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la forma de enseñanza» o «la norma de enseñanza».
    reason: lexical_alternative
  - marker: b
    text: O «en lo cual fuisteis entregados».
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  english_pob_choice: thanks be
  chosen_spanish: gracias
  alternatives_spanish:
  - acción de gracias
  - gracias sean dadas
  lexicon: BDAG
  rationale: En la construcción χάρις δὲ τῷ θεῷ, el sentido es una expresión de gratitud dirigida a Dios, no la cualidad teológica de 'gracia'. En español, 'gracias a Dios' comunica con naturalidad ese tono doxológico sin perder el valor de acción de gracias del original.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: BDAG
  rationale: El pasaje mantiene la metáfora de sometimiento y pertenencia. 'Esclavos' preserva la fuerza del contraste paulino entre esclavitud al pecado y obediencia a Dios, acorde con el valor lexical saliente del término.
- source_word: ἁμαρτίας
  english_pob_choice: of sin
  chosen_spanish: del pecado
  alternatives_spanish:
  - al pecado
  - pertenecientes al pecado
  lexicon: BDAG
  rationale: 'El genitivo expresa dominio o pertenencia: esclavos bajo el señorío del pecado. ''Del pecado'' conserva esa relación de sujeción de modo directo y natural en español.'
- source_word: ὑπηκούσατε
  english_pob_choice: obeyed
  chosen_spanish: obedecisteis
  alternatives_spanish:
  - llegasteis a obedecer
  - os hicisteis obedientes
  lexicon: BDAG
  rationale: El aoristo indica obediencia efectiva, no mera escucha. 'Obedecisteis' reproduce con claridad el sentido ético del verbo.
- source_word: ἐκ καρδίας
  english_pob_choice: from the heart
  chosen_spanish: de corazón
  alternatives_spanish:
  - desde el corazón
  - con todo el corazón
  lexicon: BDAG
  rationale: La metáfora de καρδία se conserva de forma idiomática. 'De corazón' expresa sinceridad e interioridad sin sonar forzado en español.
- source_word: τύπον διδαχῆς
  english_pob_choice: the pattern of teaching
  chosen_spanish: modelo de enseñanza
  alternatives_spanish:
  - forma de enseñanza
  - norma de enseñanza
  - patrón de enseñanza
  lexicon: BDAG
  rationale: τύπος puede abarcar patrón, forma o modelo. 'Modelo de enseñanza' suena natural en español y mantiene la idea de una pauta doctrinal recibida; las alternativas preservan el rango semántico documentado.
- source_word: παρεδόθητε
  english_pob_choice: were handed over
  chosen_spanish: fuisteis entregados
  alternatives_spanish:
  - fuisteis puestos bajo
  - fuisteis confiados
  lexicon: BDAG
  rationale: El pasivo se conserva. 'Entregados' mantiene la imagen de transferencia o asignación a una norma de enseñanza, sin activar indebidamente el sujeto.
- source_word: εἰς ὃν
  english_pob_choice: to which
  chosen_spanish: al cual
  alternatives_spanish:
  - en el cual
  - dentro del cual
  lexicon: BDAG
  rationale: Con 'entregados' en español, la relación direccional se expresa mejor con 'al cual'. 'En el cual' sería una posible alternativa si se optara por una imagen más interna, pero aquí resulta menos natural.
theological_decisions:
- issue: Cómo traducir χάρις δὲ τῷ θεῷ en un contexto de doxología breve
  english_pob_reading: But thanks be to God
  chosen_spanish_reading: Pero gracias a Dios
  alternative_spanish_readings:
  - Pero acción de gracias a Dios
  - Mas gracias sean dadas a Dios
  rationale: El griego funciona como una exclamación de gratitud dirigida a Dios. En español, la forma breve y pública 'Pero gracias a Dios' mantiene el tono exclamativo sin convertir χάρις en 'gracia' abstracta.
  doctrine_reference: χάρις en fórmulas doxológicas; distinguir entre gracia como favor divino y gratitud como respuesta humana.
- issue: Si δοῦλοι debe suavizarse como 'siervos' o mantenerse como 'esclavos'
  english_pob_reading: slaves of sin
  chosen_spanish_reading: esclavos del pecado
  alternative_spanish_readings:
  - siervos del pecado
  - servidores del pecado
  rationale: Romanos 6 desarrolla deliberadamente la metáfora de esclavitud para contrastarla con la obediencia a la enseñanza recibida. 'Esclavos' preserva esa tensión teológica y evita diluir el dominio del pecado.
  doctrine_reference: δοῦλος → esclavo cuando el vínculo de dominio es central.
- issue: Cómo reflejar el pasivo de παρεδόθητε sin convertirlo en una acción demasiado activa o interpretativa
  english_pob_reading: to which you were handed over
  chosen_spanish_reading: al cual fuisteis entregados
  alternative_spanish_readings:
  - al cual fuisteis entregados a sí
  - en el cual fuisteis incorporados
  rationale: El pasivo sugiere que los creyentes fueron transferidos a una norma o marco de enseñanza. 'Fuisteis entregados' conserva la pasividad y la imagen de recepción impuesta o providencial.
  doctrine_reference: Respetar la diatesis pasiva y la imagen de transferencia textual.
translation_notes:
  revision_awareness: Concordancia alta con el texto griego y con el audit trail inglés. Se mantuvo la imagen de esclavitud para δοῦλοι, la gratitud dirigida a Dios para χάρις δὲ τῷ θεῷ, y el pasivo de παρεδόθητε. La principal decisión estilística fue hacer el griego idiomático en español con 'gracias a Dios' y 'modelo de enseñanza', sin perder las alternativas documentadas.
  spanish_consistency_notes:
  - Se usó 'esclavos' de manera consistente con la política terminológica del proyecto cuando el vínculo de dominio es central.
  - '''De corazón'' conserva la metáfora de καρδία sin arcaísmo.'
  - '''Modelo de enseñanza'' mantiene la amplitud semántica de τύπος + διδαχή y deja visibles las alternativas en nota.'
  - El orden de la cláusula principal busca claridad en español sin añadir contenido interpretativo.
