  glossary_alignment: «pecado», «la ley» y «gracia» están alineados con la terminología del proyecto. No hay conflicto con glosario mayor. El cambio sugerido de «se enseñoreará de» a «tendrá dominio sobre» mantiene la decisión léxica documentada para κυριεύσει y mejora la legibilidad en español neutral.
