translation:
  language: es
  text: Porque el pecado no tendrá dominio[a] sobre ustedes, pues no están bajo la ley[b], sino bajo la gracia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se enseñoreará de ustedes».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «bajo ley», un modismo que significa bajo la autoridad o el régimen de la ley.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - el pecado
  lexicon: BDAG
  rationale: En español, "pecado" conserva el sustantivo abstracto y la personificación de una fuerza que domina, sin requerir mayúscula interpretativa. "Pecado" es la equivalencia más natural y clara para el uso paulino de ἁμαρτία.
- source_word: κυριεύσει
  english_pob_choice: will rule over
  chosen_spanish: se enseñoreará de
  alternatives_spanish:
  - dominará sobre
  - reinará sobre
  - tendrá dominio sobre
  lexicon: BDAG
  rationale: El verbo expresa ejercer señorío o dominio. "Se enseñoreará de" preserva bien en español la imagen de autoridad personal o de dominio sobre alguien, sin perder la fuerza de la personificación.
- source_word: ὑμῶν
  english_pob_choice: you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - sobre ustedes
  - de vosotros
  lexicon: 'Morphology: genitive plural of σύ'
  rationale: El genitivo tras el verbo de dominio se expresa con naturalidad en español como "de ustedes"; mantiene el complemento de la acción dominadora sin forzar una estructura menos idiomática.
- source_word: ὑπὸ νόμον
  english_pob_choice: under the law
  chosen_spanish: bajo la ley
  alternatives_spanish:
  - bajo ley
  - bajo la ley mosaica
  - bajo la autoridad de la ley
  lexicon: BDAG
  rationale: Se conserva la fórmula paulina idiomática con "bajo la ley". Aunque el griego no lleva artículo, el español normalmente lo requiere y aquí el sentido más natural en Romanos es el régimen o autoridad de la ley.
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: BDAG
  rationale: '"Gracia" es el equivalente teológico asentado en Pablo y comunica mejor el contraste con "ley" que "favor", que sería más débil en este contexto.'
theological_decisions:
- issue: La personificación del pecado como poder gobernante
  english_pob_reading: Keep 'sin' lowercase and render the verb as 'will not rule over you.'
  chosen_spanish_reading: 'Mantener "pecado" en minúscula y usar un verbo de dominio: "no se enseñoreará de ustedes".'
  alternative_spanish_readings:
  - el Pecado no se enseñoreará de ustedes
  - el pecado no tendrá dominio sobre ustedes
  - el pecado no reinará sobre ustedes
  rationale: El griego personifica ἁμαρτία como una potencia que gobierna, pero no exige mayúscula. La traducción conserva esa tensión teológica sin resolverla artificialmente ni añadir una categoría doctrinal extra.
  doctrine_reference: Preservar la personificación paulina del pecado como poder sin sobreinterpretarla.
- issue: Sentido de ὑπὸ νόμον en el contraste ley/gracia
  english_pob_reading: Lit. 'under law,' an idiom meaning under the law's authority or regime.
  chosen_spanish_reading: '"Bajo la ley" como fórmula idiomática de estar bajo su régimen o autoridad.'
  alternative_spanish_readings:
  - bajo ley
  - bajo la autoridad de la ley
  - bajo el régimen de la ley
  rationale: El español necesita el artículo para sonar natural, pero la nota doctrinal/lexical debe conservar que no se trata solo de ubicación sino de régimen o autoridad. En Romanos, la oposición es entre dos órdenes de pertenencia.
  doctrine_reference: Romanos 6:14; relación paulina entre ley y gracia.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el contexto fuente; la propuesta sigue el texto griego y el trazado léxico/auditivo inglés con equivalencia óptima en español.
  spanish_consistency_notes:
  - Se mantuvo el contraste paulino "ley/gracia" con terminología estable y auditable.
  - '"Pecado" se dejó en minúscula para conservar la personificación sin convertirla en un nombre propio.'
  - La nota sobre "bajo la ley" explica el modismo griego sin alterar el texto principal.
  - El pronombre plural de cortesía/naturalidad se resolvió con "ustedes", adecuado para español latinoamericano amplio.
