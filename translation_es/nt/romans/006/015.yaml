translation:
  language: es
  text: ¿Entonces qué? ¿Pecaremos porque no estamos bajo la ley sino bajo la gracia? ¡De ninguna manera![a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Vamos a pecar?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί οὖν
  english_pob_choice: What then?
  chosen_spanish: ¿Entonces qué?
  alternatives_spanish:
  - ¿Qué entonces?
  - ¿Qué pues?
  lexicon: BDAG
  rationale: Expresa la transición inferencial de Pablo de forma natural en español sin añadir palabras ausentes del griego. 'Entonces qué' conserva la fuerza retórica breve del original.
- source_word: ἁμαρτήσωμεν
  english_pob_choice: Should we sin
  chosen_spanish: Pecaremos
  alternatives_spanish:
  - ¿Pecaremos?
  - ¿Debemos pecar?
  lexicon: BDAG
  rationale: El subjuntivo deliberativo se vierte de modo idiomático como una pregunta retórica en futuro/volitivo español. 'Pecaremos' comunica la propuesta cuestionada sin volverla mecánica ni demasiado explicativa.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Introduce la razón propuesta para pecar; 'porque' es la equivalencia más natural y directa en español.
- source_word: ὑπὸ νόμον
  english_pob_choice: under law
  chosen_spanish: bajo la ley
  alternatives_spanish:
  - bajo ley
  - sujetos a la ley
  lexicon: BDAG
  rationale: Se mantiene la relación de esfera o sujeción expresada por ὑπό. 'La ley' conserva el contraste paulino amplio sin precisar indebidamente el referente en el texto principal.
- source_word: ὑπὸ χάριν
  english_pob_choice: under grace
  chosen_spanish: bajo la gracia
  alternatives_spanish:
  - bajo favor
  - sujetos a la gracia
  lexicon: BDAG
  rationale: '''Gracia'' es la traducción estable de χάρις en este contraste teológico. Se conserva el paralelismo con ''bajo la ley'' y la tensión doctrinal del pasaje.'
- source_word: μὴ γένοιτο
  english_pob_choice: May it never be!
  chosen_spanish: ¡De ninguna manera!
  alternatives_spanish:
  - ¡Jamás!
  - ¡En ninguna manera!
  lexicon: BDAG
  rationale: Reproduce la fuerte repulsa idiomática del griego de forma natural y solemne en español. Evita una versión demasiado literal que sonaría forzada.
theological_decisions:
- issue: Alcance de νόμος en el contraste de Pablo
  english_pob_reading: Render generically as 'law' rather than specifying 'the law' or 'the Mosaic law' in the main text.
  chosen_spanish_reading: Traducir como 'la ley' sin especificar 'la Ley mosaica' en el cuerpo del versículo.
  alternative_spanish_readings:
  - la ley
  - la Ley de Moisés
  - la ley mosaica
  rationale: El griego no lleva artículo y el contexto inmediato pide preservar el contraste sin cerrarlo interpretativamente. 'La ley' mantiene la expresión paulina y deja el alcance teológico para la exégesis.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: Se corrigió el fallo previo eliminando notas sin anclaje y dejando un solo marcador [a] exactamente en la palabra correspondiente del texto español.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo 'bajo la ley / bajo la gracia' para reflejar ὑπό + acusativo.
  - Se evitó 'la ley' como máscara interpretativa mayor que la necesaria; no se añadió 'de Moisés'.
  - Se usó 'pecaremos' como pregunta retórica para reflejar el subjuntivo deliberativo sin sonar artificial en español.
