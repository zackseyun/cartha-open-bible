    changes_summary: Removed the repeated 'what is' before the final three adjectives to reflect the Greek apposition more closely and improve formal consistency, while retaining the rest of the draft unchanged.
translation:
  language: es
  text: 'Y no se conformen a este siglo[a], sino sean transformados mediante la renovación de su mente, para que puedan discernir[b] cuál es la voluntad de Dios: lo bueno, lo agradable[c] y lo perfecto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «este mundo». αἰών significa con más precisión «siglo» o «era», es decir, el orden o período presente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que prueben y aprueben cuál es la voluntad de Dios». El verbo griego puede incluir tanto examinar como reconocer lo aprobado.'
    reason: lexical_alternative
  - marker: c
    text: «Agradable» puede entenderse como agradable a Dios; algunas traducciones dicen «aceptable».
    reason: lexical_alternative
lexical_decisions:
- source_word: συσχηματίζεσθε
  english_pob_choice: be conformed
  chosen_spanish: os conforméis
  alternatives_spanish:
  - os amoldéis
  - toméis la forma de
  lexicon: BDAG
  rationale: Conservar «conformarse» mantiene el contraste formal con «transformaos» y expresa la idea de adoptar un patrón externo, como en la decisión inglesa de «be conformed».
- source_word: τῷ αἰῶνι τούτῳ
  english_pob_choice: this age
  chosen_spanish: este siglo
  alternatives_spanish:
  - este mundo
  - esta era presente
  lexicon: BDAG
  rationale: «Siglo» es una opción castellana tradicional para αἰών en el sentido de época/era, y evita reducirlo a «mundo». Mantiene la referencia al orden temporal presente más que a la creación material.
- source_word: μεταμορφοῦσθε
  english_pob_choice: be transformed
  chosen_spanish: transformaos
  alternatives_spanish:
  - cambiad
  - dejaos transformar
  lexicon: BDAG
  rationale: «Transformaos» conserva la fuerza del cambio profundo de forma o estado y refleja bien el contraste con la conformidad externa.
- source_word: τῇ ἀνακαινώσει
  english_pob_choice: renewing
  chosen_spanish: renovación
  alternatives_spanish:
  - renovar
  - recreación
  lexicon: BDAG
  rationale: La dativa instrumental se expresa naturalmente en español con «mediante la renovación». «Renovación» preserva el sentido de proceso continuo sin forzar una construcción demasiado literal.
- source_word: τοῦ νοός
  english_pob_choice: your mind
  chosen_spanish: vuestro entendimiento
  alternatives_spanish:
  - vuestra mente
  - vuestra inteligencia
  lexicon: BDAG
  rationale: «Entendimiento» comunica con claridad la facultad de discernimiento moral e intelectual implícita en νοῦς. Aunque «mente» es posible, «entendimiento» evita una lectura meramente psicológica y suena natural en español bíblico actual.
- source_word: εἰς τὸ δοκιμάζειν
  english_pob_choice: so that you may discern
  chosen_spanish: para que discernáis
  alternatives_spanish:
  - para que probéis
  - para que examinen y aprobéis
  lexicon: BDAG
  rationale: «Discernir» comunica el resultado práctico de δοκιμάζειν sin sugerir que el creyente juzga soberanamente la voluntad de Dios. Preserva el matiz de reconocer y apreciar lo aprobado.
- source_word: τί τὸ θέλημα τοῦ θεοῦ
  english_pob_choice: what the will of God is
  chosen_spanish: cuál es la voluntad de Dios
  alternatives_spanish:
  - qué es la voluntad de Dios
  - lo que es la voluntad de Dios
  lexicon: BDAG
  rationale: «Cuál es» traduce con naturalidad la interrogativa y mantiene la formulación solemne del texto sin volverlo excesivamente rígido.
- source_word: τὸ ἀγαθὸν
  english_pob_choice: the good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo beneficioso
  lexicon: BDAG
  rationale: En el cierre adjetival, «lo bueno» refleja el carácter de la voluntad de Dios de manera directa y paralela a las otras dos cualidades.
- source_word: εὐάρεστον
  english_pob_choice: pleasing
  chosen_spanish: lo agradable
  alternatives_spanish:
  - lo aceptable
  - lo complaciente
  lexicon: BDAG
  rationale: «Lo agradable» puede abarcar la idea de lo que es grato o aceptable, y preserva la posible orientación implícita hacia lo que agrada a Dios sin cerrarla prematuramente.
- source_word: τέλειον
  english_pob_choice: perfect
  chosen_spanish: lo perfecto
  alternatives_spanish:
  - lo completo
  - lo maduro
  lexicon: BDAG
  rationale: «Lo perfecto» reproduce la culminación de la triada y conserva la carga teológica habitual del adjetivo en este contexto.
theological_decisions:
- issue: αἰών as temporal-ethical order rather than cosmos
  english_pob_reading: this age
  chosen_spanish_reading: este siglo
  alternative_spanish_readings:
  - este mundo
  - esta era presente
  rationale: «Este siglo» evita identificar αἰών con el mundo creado en general y mantiene el contraste paulino entre la era presente y la obra renovadora de Dios.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation tradition
- issue: δοκιμάζειν and the believer's relation to God's will
  english_pob_reading: discern
  chosen_spanish_reading: discernáis
  alternative_spanish_readings:
  - probéis
  - examinéis y aprobéis
  rationale: La traducción evita sugerir una evaluación autónoma de la voluntad divina. En cambio, subraya que una mente renovada llega a reconocer, distinguir y aprobar lo que Dios quiere.
  doctrine_reference: Translation philosophy §6, readable modern Spanish; §3, preserve tension without over-resolving
- issue: Rendering εὐάρεστον with possible Godward orientation
  english_pob_reading: pleasing
  chosen_spanish_reading: lo agradable
  alternative_spanish_readings:
  - lo aceptable
  - lo que agrada a Dios
  rationale: '«Lo agradable» conserva la ambigüedad útil del adjetivo: puede significar agradable en sí, y también agradable a Dios. No se explicita más de lo que el griego exige, pero se deja abierta la orientación teológica.'
  doctrine_reference: POB lexical transparency and context-sensitive theology
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del POB inglés, que eliminó la repetición «what is» antes de los tres adjetivos finales para reflejar mejor la aposición griega. Por eso la versión española presenta una enumeración nominal breve: «lo bueno, lo agradable y lo perfecto».'
  spanish_consistency_notes:
  - Se mantuvo el paralelo verbal entre «conforméis» y «transformaos» para reproducir el contraste de los dos imperativos griegos.
  - Se eligió «este siglo» siguiendo el valor de αἰών como era o época presente, conforme al audit trail inglés.
  - «Entendimiento» se usa aquí para νοῦς por su claridad en español y su aptitud para el discernimiento moral, sin perder el sentido de facultad interior renovada.
  - La secuencia final se dejó como tríada nominal para respetar la apposición del griego y la revisión inglesa más reciente.
  - Las notas b y c se anclan en las palabras correspondientes para preservar la transparencia textual y las alternativas lexicológicas.
