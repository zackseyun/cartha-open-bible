review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del griego: prohibición de conformarse, mandato de transformación por la renovación de la mente, y propósito de discernir la voluntad de Dios como buena, agradable y perfecta. Sin embargo, hay dos desajustes importantes con el audit trail y con la naturalidad del español meta: «transformaos» no refleja bien el valor pasivo/medio de μεταμορφοῦσθε, y «vuestro/vos conforméis/discernáis» no sigue el estilo español latinoamericano neutral solicitado.'
  spanish_quality_summary: El texto es claro, pero mezcla un registro peninsular/tradicional («os conforméis», «transformaos», «vuestro», «discernáis») con un proyecto que pide español neutral latinoamericano y ampliamente legible en iglesia. Además, «transformaos» suena a acción autónoma más que a transformación recibida; «sean transformados» o «déjense transformar» expresa mejor el griego y suena más natural. «Mente» es más natural y ampliamente comprensible que «entendimiento» aquí.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto (Dios, etc.). La decisión «este siglo» es defendible por αἰών, aunque en español actual puede sonar menos natural que «esta era»; no exige cambio porque el pie ya explica la alternativa «este mundo» y la rationale documenta bien el matiz temporal. La principal cuestión de alineación es más sintáctica y de estilo meta que de glosario.
  issues:
  - severity: high
    issue: «transformaos» no representa adecuadamente μεταμορφοῦσθε
    rationale: El griego es imperativo presente pasivo/medio; el contraste con «no se conformen» pide una formulación de transformación recibida, no principalmente autocausada. «Sean transformados» o «déjense transformar» preserva mejor la fuerza verbal y el contraste con la conformidad externa.
  - severity: high
    issue: Registro pronominal peninsular en vez de español neutral latinoamericano
    rationale: Formas como «os conforméis», «transformaos», «vuestro» y «discernáis» chocan con la guía de estilo del proyecto, que pide español neutral latinoamericano / ampliamente legible en iglesia. Debe regularizarse a «no se conformen… sean transformados… su mente… puedan discernir».
  - severity: medium
    issue: «entendimiento» es menos natural y más marcado que «mente» para νοῦς
    rationale: Aunque semánticamente posible, «mente» refleja mejor la decisión inglesa documentada y es el equivalente más natural y ampliamente entendible para la facultad de discernimiento moral/espiritual en este contexto.
  - severity: low
    issue: La nota sobre αἰών con «siglo» puede sonar algo rígida en español actual
    rationale: No es incorrecto, pero «era» suele comunicar mejor el matiz temporal-ético. Aun así, como el texto principal puede conservar «siglo» y la nota ya menciona «era», esto no requiere adjudicación mayor.
  revised_spanish_text: 'Y no se conformen a este siglo[a], sino sean transformados mediante la renovación de su mente, para que puedan discernir[b] cuál es la voluntad de Dios: lo bueno, lo agradable[c] y lo perfecto.'
