  rationale: La revisión corrige el valor verbal de μεταμορφοῦσθε con «sean transformados», adapta todo el versículo al español neutral latinoamericano («se conformen», «su mente», «puedan discernir») y mejora la naturalidad de νοῦς con «mente». También se eliminaron los marcadores de notas mal ubicados sobre «mente», dejando cada nota anclada en la palabra o frase pertinente del texto.
