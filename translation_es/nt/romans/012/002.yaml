source:
  edition: SBLGNT
  text: καὶ μὴ ⸀συσχηματίζεσθε τῷ αἰῶνι τούτῳ, ἀλλὰ ⸀μεταμορφοῦσθε τῇ ἀνακαινώσει τοῦ ⸀νοός, εἰς τὸ δοκιμάζειν ὑμᾶς τί τὸ θέλημα τοῦ θεοῦ, τὸ ἀγαθὸν καὶ εὐάρεστον καὶ τέλειον.
base_translation:
  language: en
  yaml_path: translation/nt/romans/012/002.yaml
  text: And do not be conformed to this age[a], but be transformed by the renewing of your mind[c][b], so that you may discern what the will of God is—the good and pleasing and perfect.
  footnotes:
  - marker: a
    text: 'Or: “this world.” Greek αἰών more precisely means “age,” referring to the present order or era.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: “so that you may test and approve what the will of God is.” The Greek verb can include both testing and recognizing what is approved.'
    reason: lexical_alternative
  - marker: c
    text: “Pleasing” may mean pleasing to God; some translate “acceptable.”
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
