translation:
  language: es
  text: regocijándose en la esperanza, soportando con firmeza la aflicción[a], persistiendo en la oración[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "tribulación"; el término denota presión severa, angustia o aflicción.
    reason: lexical_alternative
  - marker: b
    text: O "dedicándose constantemente a la oración"; el término enfatiza una devoción perseverante, no solo persistencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπίδι
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - la esperanza
  lexicon: BDAG
  rationale: 'El dativo con artículo expresa la esfera o ámbito de la acción: ''en la esperanza''. En español, ''esperanza'' es el equivalente natural y claro; se evita una forma más pesada como ''en la esperanza'' si la cadencia de la serie ya comunica el ámbito, pero aquí se conserva la preposición para reflejar la construcción.'
- source_word: χαίροντες
  english_pob_choice: rejoicing
  chosen_spanish: regocíjense
  alternatives_spanish:
  - regocijándose
  - alégrense
  lexicon: BDAG
  rationale: Aunque el griego usa participio, la serie exhortativa en español fluye mejor con imperativos coordinados. 'Regocíjense' mantiene el valor de gozo activo y evita una perífrasis más larga; 'alégrense' también es posible, pero 'regocijarse' preserva mejor la intensidad de χαίρω.
- source_word: θλίψει
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - angustia
  - tribulación/aflicción
  lexicon: BDAG
  rationale: θλῖψις denota presión, aflicción o angustia. 'Aflicción' conserva el peso del sufrimiento sin cargar el término con un matiz eclesiástico más tradicional como 'tribulación'. Se mantiene la opción preferida del audit trail inglés.
- source_word: ὑπομένοντες
  english_pob_choice: enduring
  chosen_spanish: perseveren
  alternatives_spanish:
  - sigan soportando
  - permanezcan firmes
  - soporten
  lexicon: BDAG
  rationale: ὑπομένω implica resistencia sostenida bajo prueba. 'Perseveren' transmite continuidad y firmeza mejor que un simple 'soporten'; además, armoniza bien con la serie exhortativa de la frase.
- source_word: προσευχῇ
  english_pob_choice: prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - oración
  - en oración
  lexicon: BDAG
  rationale: El sustantivo es oración en sentido general. La forma 'en la oración' reproduce bien el dativo de esfera; aquí se opta por 'en la oración' en la idea, aunque la redacción final la integra con un verbo de persistencia para evitar un calco rígido.
- source_word: προσκαρτεροῦντες
  english_pob_choice: persisting
  chosen_spanish: persistan
  alternatives_spanish:
  - se mantengan constantes
  - se dediquen
  - se entreguen con constancia
  lexicon: BDAG
  rationale: προσκαρτερέω significa continuar firme y constantemente en algo, con idea de dedicación perseverante. 'Persistan' conserva esa constancia sin añadir el reflexivo 'se dediquen' como lectura obligatoria; así se mantiene la paralela exhortativa del verso.
translation_notes:
  revision_awareness: El texto griego presenta una serie de participios presentes coordinados. La redacción española adopta imperativos de exhortación para lograr naturalidad y legibilidad, sin perder el sentido aspectual de acciones continuas y disposicionales que el audit trail inglés preserva con participios en -ing.
  spanish_consistency_notes:
  - Se mantiene un registro neutral y bíblico, sin recurrir a formas arcaizantes innecesarias.
  - '''Aflicción'' se usa para θλῖψις siguiendo el criterio del audit trail inglés; no se reemplaza por ''tribulación'' en el texto principal.'
  - La serie verbal se uniforma con tres imperativos de segunda persona del plural para reflejar la exhortación comunitaria implícita en el griego.
  - No se introducen notas de pie porque el versículo es breve y la alternativa lexical principal puede explicarse en el registro de decisiones.
