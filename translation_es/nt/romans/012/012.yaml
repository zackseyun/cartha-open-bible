  verdict: revise
  source_alignment_summary: 'El borrador comunica bien el sentido básico del griego, pero se aparta innecesariamente del perfil participial y del audit trail inglés al convertir toda la serie en imperativos finitos. Además, faltan las notas de alternativa léxica preservadas en el POB inglés, y están invertidas en el audit trail: la nota sobre ''devoting yourselves to prayer'' corresponde a προσκαρτεροῦντες y la de ''tribulation'' a θλίψει. El sentido central de ἐλπίδι, θλίψει, ὑπομένοντες y προσκαρτεροῦντες sí está mayormente bien reflejado.'
  spanish_quality_summary: El español es claro y natural, pero 'Regocíjense... perseveren... persistan...' suena más exhortativo-imperativo que descriptivo/parenético, y pierde la compacta simetría del original. Una versión con participios o gerundios coordinados suena natural en español bíblico moderno y preserva mejor la forma fuente. 'Regocijándose en la esperanza, soportando con firmeza la aflicción, persistiendo en la oración' mantiene claridad y paralelismo.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Esperanza', 'aflicción' y 'oración' son adecuadas. Para ὑπομένοντες, 'soportando con firmeza' o 'perseverando' son posibles; aquí conviene una forma que retenga mejor la idea de resistencia bajo presión. Para προσκαρτεροῦντες, 'persistiendo' está bien, con nota alternativa 'dedicándose constantemente' o 'manteniéndose dedicados'.
  issues:
