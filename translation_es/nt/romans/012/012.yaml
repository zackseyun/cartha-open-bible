    issue: La serie participial griega fue convertida en imperativos finitos.
    rationale: χαίροντες / ὑπομένοντες / προσκαρτεροῦντες son participios presentes coordinados. Aunque el español puede suavizar estructura, aquí sí es posible conservar la forma y el aspecto continuo sin sonar antinatural.
  - severity: medium
    issue: Faltan las notas de alternativa léxica preservadas por el audit trail inglés.
    rationale: El POB inglés documenta alternativas significativas para θλίψει y προσκαρτεροῦντες; la revisión española debe preservarlas cuando son pertinentes.
  - severity: low
    issue: La documentación de notas en el material inglés parece cruzada respecto de los marcadores.
    rationale: La nota marcada como a habla de προσκαρτεροῦντες y la marcada como b de θλίψει, aunque en el texto inglés [a] sigue a 'hope' y [b] a 'prayer'. La revisión debe corregir conceptualmente esa asignación en español en lugar de reproducir el cruce.
