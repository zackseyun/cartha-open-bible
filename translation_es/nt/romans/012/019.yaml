    text: 'Redacción tradicional: «Mía es la venganza; yo pagaré».'
    reason: alternative_reading
  revision_rationale: Se reubicó la nota [a] junto a «la ira», que es el segmento al que realmente comenta; se aligeró el mandato inicial para un español más natural sin pérdida semántica; y se cambió «el Señor» por «Yahvé» para alinearlo con la política del proyecto sobre κύριος en citas que remiten al nombre divino. Se conserva «yo pagaré» por su uso bíblico establecido y porque refleja suficientemente la retribución de ἀνταποδώσω en este contexto.
