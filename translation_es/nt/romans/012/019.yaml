revisions:
- from: 'No se venguen ustedes mismos[a], amados, sino den lugar a la ira, porque está escrito: «Mía es la venganza; yo pagaré[b], dice el Señor».'
  to: 'No se venguen ustedes, amados, sino den lugar a la ira[a], porque está escrito: «Mía es la venganza; yo pagaré[b], dice Yahvé».'
  rationale: Se reubicó la nota [a] junto a «la ira», que es el segmento al que realmente comenta; se aligeró el mandato inicial para un español más natural sin pérdida semántica; y se cambió «el Señor» por «Yahvé» para alinearlo con la política del proyecto sobre κύριος en citas que remiten al nombre divino. Se conserva «yo pagaré» por su uso bíblico establecido y porque refleja suficientemente la retribución de ἀνταποδώσω en este contexto.
