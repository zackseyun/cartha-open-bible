translation:
  language: es
  text: 'No se venguen ustedes, amados, sino den lugar a la ira[a], porque está escrito: «Mía es la venganza; yo pagaré[b], dice Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dejen lugar a la ira»; probablemente se refiere a la ira de Dios, a la luz de la cita siguiente.
    reason: lexical_alternative
  - marker: b
    text: 'Redacción tradicional: «Mía es la venganza; yo pagaré».'
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ ἑαυτοὺς ἐκδικοῦντες
  english_pob_choice: Do not avenge yourselves
  chosen_spanish: No se venguen ustedes mismos
  alternatives_spanish:
  - No tomen venganza ustedes mismos
  - No se vindiquen ustedes mismos
  lexicon: BDAG
  rationale: El participio presente con μή funciona de modo imperativo en el contexto. «Vengarse» conserva la fuerza reflexiva de ἑαυτούς con ἐκδικέω y suena natural en español bíblico moderno. «Tomar venganza» es posible, pero algo más explicativo; «vindicar(se)» debilita la fuerza punitiva del verbo.
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados hermanos
  - queridos
  lexicon: BDAG
  rationale: «Amados» preserva el vocativo afectuoso y su tono eclesial sin reducirlo a un simple trato coloquial. Mantiene la calidez relacional del griego y permite una lectura sobria y directa.
- source_word: ἀλλὰ δότε τόπον
  english_pob_choice: but give place
  chosen_spanish: sino den lugar
  alternatives_spanish:
  - sino dejen lugar
  - sino hagan espacio
  lexicon: BDAG
  rationale: El modismo literalmente significa «dar lugar/espacio». «Den lugar» conserva la metáfora y permite que el complemento siguiente precise a qué se cede. «Dejen lugar» o «hagan espacio» interpretan más el modismo.
- source_word: τῇ ὀργῇ
  english_pob_choice: to wrath
  chosen_spanish: a la ira
  alternatives_spanish:
  - a la cólera
  - a la ira de Dios
  lexicon: BDAG
  rationale: La frase es elíptica en griego. «Ira» es la forma más natural y sobria en español para ὀργή. No se añade «de Dios» al texto principal, porque el griego no lo expresa de manera explícita, aunque el contexto inmediato sugiere ese referente.
- source_word: γέγραπται γάρ
  english_pob_choice: for it is written
  chosen_spanish: porque está escrito
  alternatives_spanish:
  - pues está escrito
  - porque se ha escrito
  lexicon: BDAG
  rationale: Es la fórmula habitual de introducción de una cita bíblica. «Está escrito» es la equivalencia natural y digna en español, sin forzar el aspecto verbal más allá del valor formular.
- source_word: Ἐμοὶ ἐκδίκησις
  english_pob_choice: Vengeance is mine
  chosen_spanish: Mía es la venganza
  alternatives_spanish:
  - La venganza es mía
  - La venganza me pertenece
  lexicon: BDAG
  rationale: El dativo con sustantivo expresa posesión o pertenencia. «Mía es la venganza» refleja con fidelidad la construcción y conserva la forma tradicional de la cita, que el audit trail inglés corrigió hacia una versión más directa de esa misma idea.
- source_word: ἐγὼ ἀνταποδώσω
  english_pob_choice: I will repay
  chosen_spanish: yo pagaré
  alternatives_spanish:
  - yo recompensaré
  - yo devolveré
  lexicon: BDAG
  rationale: «Pagaré» comunica con claridad la idea de retribución judicial de ἀνταποδίδωμι en este contexto. Aunque «recompensaré» es posible, «pagaré» suena más breve y mantiene la solemnidad de la cita.
- source_word: λέγει κύριος
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice el Señor Yahvé
  - dice el Señor
  lexicon: BDAG
  rationale: En la cita bíblica, κύριος se vierte de manera idiomática como «el Señor». Aunque el proyecto prefiere «Yahvé» para el nombre divino en el texto principal, aquí la fórmula de cita reproduce la forma estable y reconocible de la voz oracular; no hay una cita explícita del Tetragrámaton en el griego de este verso.
theological_decisions:
- issue: Referencia de «la ira» en τῇ ὀργῇ
  english_pob_reading: Likely meaning God’s wrath in light of the following quotation, but the main text preserves the shorter phrase.
  chosen_spanish_reading: La traducción mantiene «la ira» sin explicitar «de Dios» en el texto principal.
  alternative_spanish_readings:
  - la ira de Dios
  - la cólera divina
  rationale: La cita siguiente de Deuteronomio 32:35 apunta a la prerrogativa judicial de Dios, por lo que el sentido más probable es la ira divina. Sin embargo, el griego no lo dice de forma explícita; por eso la traducción conserva la ambigüedad léxica y la deja para una nota.
  doctrine_reference: Preservar la tensión léxica y contextual sin resolverla prematuramente.
translation_notes:
  revision_awareness: La versión inglesa revisó la cita a «Vengeance is mine; I will repay», más directa e idiomática que «belongs to me». En español se adoptó la construcción posesiva natural de la cita («Mía es la venganza») y se mantuvo «yo pagaré» para reflejar ἀνταποδώσω con solemnidad y concisión. No se añadió «de Dios» al cuerpo principal por respeto a la elipsis del griego, aunque la nota aclara el sentido contextual probable.
  spanish_consistency_notes:
  - Se usa «amados» para el vocativo afectuoso, en continuidad con el tono pastoral del texto.
  - Se evita «SEÑOR» como máscara en el cuerpo principal y se conserva «el Señor» en la fórmula de cita oracular.
  - «Ira» traduce ὀργή sin especificar el sujeto, porque el contexto lo sugiere pero no lo enuncia.
  - La puntuación mantiene la cita bíblica con comillas españolas y el orden lógico del argumento paulino.
