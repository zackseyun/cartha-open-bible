translation:
  language: es
  text: si exhortando[a], en exhortación; el que comparte[b], con generosidad[c]; el que dirige[d], con diligencia[e]; el que muestra misericordia, con alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'animando … en ánimo'. El par griego παρακαλέω / παράκλησις puede abarcar tanto exhortar como animar.
    reason: lexical_alternative
  - marker: b
    text: O 'el que da' o 'el que contribuye'.
    reason: lexical_alternative
  - marker: c
    text: O 'con sinceridad' o 'con sencillez'. El griego ἁπλότης puede indicar sencillez/singularidad o generosidad, según el contexto.
    reason: lexical_alternative
  - marker: d
    text: O 'el que gobierna' o 'el que preside'.
    reason: lexical_alternative
  - marker: e
    text: O 'con celo' o 'con empeño'.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴτε
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si es que
  - sea que
  lexicon: BDAG
  rationale: El griego continúa una serie elíptica; en español, 'si' conserva la estructura breve y aditiva de la lista sin forzar una subordinación más pesada.
- source_word: ὁ παρακαλῶν
  english_pob_choice: exhorting
  chosen_spanish: exhortando
  alternatives_spanish:
  - animando
  - aconsejando
  - el que exhorta
  lexicon: BDAG
  rationale: '''Exhortando'' mantiene el valor verbal y la correspondencia con el sustantivo cognado siguiente, παρακλήσει, sin perder el matiz de impulso/ánimo activo.'
- source_word: ἐν τῇ παρακλήσει
  english_pob_choice: in exhortation
  chosen_spanish: en exhortación
  alternatives_spanish:
  - en ánimo
  - con exhortación
  - con ánimo
  lexicon: BDAG
  rationale: Se conserva el vínculo cognado con παρακαλῶν. 'En exhortación' es compacto, formal y refleja la construcción preposicional del griego.
- source_word: ὁ μεταδιδοὺς
  english_pob_choice: the one who shares
  chosen_spanish: el que comparte
  alternatives_spanish:
  - el que da
  - el que contribuye
  lexicon: BDAG
  rationale: '''Comparte'' comunica el sentido distributivo de μεταδίδωμι desde recursos propios y suena natural en español sin perder la idea de dar de lo propio.'
- source_word: ἐν ἁπλότητι
  english_pob_choice: with generosity
  chosen_spanish: con generosidad
  alternatives_spanish:
  - con sinceridad
  - con simplicidad
  - con sencillez
  lexicon: BDAG
  rationale: En el contexto de compartir bienes o recursos, 'generosidad' expresa mejor el sentido contextual probable de ἁπλότης; se preserva la alternativa semántica en la nota.
- source_word: ὁ προϊστάμενος
  english_pob_choice: the one who leads
  chosen_spanish: el que lidera
  alternatives_spanish:
  - el que gobierna
  - el que preside
  - el que dirige
  lexicon: BDAG
  rationale: '''Lidera'' mantiene el sentido general de ejercer dirección/encabezamiento sin convertir la frase en un tecnicismo eclesial.'
- source_word: ἐν σπουδῇ
  english_pob_choice: with diligence
  chosen_spanish: con diligencia
  alternatives_spanish:
  - con celo
  - con empeño
  - con seriedad
  lexicon: BDAG
  rationale: '''Con diligencia'' es la equivalencia más directa y natural para σπουδή en este contexto de liderazgo responsable y aplicado.'
- source_word: ὁ ἐλεῶν
  english_pob_choice: the one who shows mercy
  chosen_spanish: el que muestra misericordia
  alternatives_spanish:
  - el que tiene misericordia
  - el que es misericordioso
  lexicon: BDAG
  rationale: Se conserva el carácter activo del participio. 'Misericordia' es el término bíblico estable en español y mantiene la relación con la acción de compadecerse/ayudar.
- source_word: ἐν ἱλαρότητι
  english_pob_choice: with cheerfulness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - con alegría de corazón
  - con buen ánimo
  lexicon: BDAG
  rationale: '''Alegría'' traduce de forma clara y digna ἱλαρότης; aunque ''alegre'' o ''con buen ánimo'' también son posibles, aquí ''con alegría'' conserva naturalidad y amplitud semántica.'
theological_decisions:
- issue: Scope of προϊστάμενος
  english_pob_reading: rendered generally as 'the one who leads' rather than as a technical church office
  chosen_spanish_reading: el que lidera, sin precisar un cargo eclesial técnico
  alternative_spanish_readings:
  - el que gobierna
  - el que preside
  - el que administra
  rationale: La serie enumera funciones o dones en forma participial y no nombra un oficio específico. 'Lidera' evita imponer una lectura denominacional y mantiene la amplitud del texto.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Sense of ἁπλότης in giving
  english_pob_reading: material/resource generosity
  chosen_spanish_reading: generosidad en el compartir de recursos
  alternative_spanish_readings:
  - sinceridad
  - simplicidad
  - sencillez
  rationale: El contexto inmediato de 'el que comparte' favorece el sentido de liberalidad/generosidad. Se conserva la tensión lexical porque ἁπλότης también puede implicar sencillez o sinceridad.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta versión adapta el español para lectura pública y corrige el anclaje de todas las notas al texto.
  spanish_consistency_notes:
  - Se mantuvo una serie breve y paralela de participios para reflejar el griego.
  - Se conservó 'generosidad' para ἁπλότης por el contexto de compartir recursos, dejando nota de alternativas semánticas.
  - '''Lidera'' se usó como término general, no técnico, para evitar importar una estructura eclesial no explicitada.'
  - Las notas a pie están todas ancladas en el texto mediante marcadores visibles y únicos.
