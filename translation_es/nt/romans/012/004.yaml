translation:
  language: es
  text: Pues, así como en un solo cuerpo tenemos muchos miembros[a], pero no todos los miembros tienen la misma función[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "muchas partes" para "muchos miembros".
    reason: lexical_alternative
  - marker: b
    text: O "la misma actividad". El término griego puede denotar actividad o función; aquí "función" encaja mejor con la metáfora del cuerpo y el contexto de roles distintos.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - de la misma manera que
  lexicon: BDAG
  rationale: Conserva la fuerza comparativa del griego sin sonar forzado en español; introduce una analogía que se completa en el versículo siguiente.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí marca conexión explicativa con el contexto previo; 'porque' comunica bien esa relación causal/explicativa en español bíblico moderno.
- source_word: ἐν ἑνὶ σώματι
  english_pob_choice: in one body
  chosen_spanish: en un solo cuerpo
  alternatives_spanish:
  - en un cuerpo
  - dentro de un solo cuerpo
  lexicon: BDAG
  rationale: '''Un solo cuerpo'' preserva la singularidad enfática del griego y mantiene el valor metafórico sin añadir todavía una identificación explícita con la iglesia.'
- source_word: πολλὰ μέλη
  english_pob_choice: many members
  chosen_spanish: muchos miembros
  alternatives_spanish:
  - muchas partes
  - muchos componentes
  lexicon: BDAG
  rationale: '''Miembros'' mantiene el lenguaje habitual de la metáfora paulina del cuerpo y la referencia orgánica/corporativa; ''partes'' es posible pero menos preciso para este pasaje.'
- source_word: ἔχομεν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - hay para nosotros
  - contamos con
  lexicon: BDAG
  rationale: Verbo directo y natural para el presente indicativo; conserva la primera persona plural del texto.
- source_word: τὰ δὲ μέλη πάντα
  english_pob_choice: but the members do not all
  chosen_spanish: pero no todos los miembros
  alternatives_spanish:
  - pero los miembros no todos
  - y no todos los miembros
  lexicon: BDAG
  rationale: En español, la negación con 'no todos' expresa con claridad el alcance distributivo que el griego comunica con δέ + πάντα + negación.
- source_word: οὐ τὴν αὐτὴν ἔχει πρᾶξιν
  english_pob_choice: do not all have the same function
  chosen_spanish: tienen la misma función
  alternatives_spanish:
  - tienen la misma actividad
  - tienen la misma práctica
  - tienen el mismo papel
  lexicon: BDAG
  rationale: '''Función'' es el equivalente más natural para πρᾶξις en la metáfora del cuerpo y conserva la idea de distintas labores/roles sin sobrecargar el texto; la negación ya quedó expresada con ''no todos''.'
theological_decisions:
- issue: Alcance del cuerpo metafórico
  english_pob_reading: Render the metaphor plainly as 'one body' and 'many members' without making the church referent explicit in this verse.
  chosen_spanish_reading: Traducir de modo llano 'un solo cuerpo' y 'muchos miembros' sin explicitar en el texto principal que se trata de la iglesia.
  alternative_spanish_readings:
  - '''un solo cuerpo, la iglesia'''
  - '''un cuerpo, es decir, la iglesia'''
  rationale: El versículo presenta la analogía; el referente eclesial se desarrollará en el contexto inmediato. Mantener la metáfora sin glosa evita añadir interpretación no dicha aquí.
  doctrine_reference: 'Translation philosophy: Preserve the source text''s plain sense and progression without importing explanatory material into the main text.'
translation_notes:
  revision_awareness: El texto español sigue de cerca el audit trail inglés y el griego SBLGNT; no se detectaron revisiones posteriores que alteraran la lectura base. Se mantuvo la comparación introductoria y la negación distributiva con una formulación idiomática en español.
  spanish_consistency_notes:
  - Se usó 'miembros' para μέλη en coherencia con la metáfora paulina del cuerpo.
  - Se tradujo πρᾶξις como 'función' para preservar la distinción de roles sin tecnicismo innecesario.
  - Se conservó la primera persona plural ('tenemos') y la negación distributiva ('no todos') para reflejar el griego con naturalidad.
  - No se introdujo 'Cristo', 'iglesia' ni una explicación doctrinal en el texto principal, conforme al contexto del versículo.
