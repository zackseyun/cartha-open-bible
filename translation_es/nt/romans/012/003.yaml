  text: Λέγω γὰρ διὰ τῆς χάριτος τῆς δοθείσης μοι παντὶ τῷ ὄντι ἐν ὑμῖν μὴ ὑπερφρονεῖν παρ’ ὃ δεῖ φρονεῖν, ἀλλὰ φρονεῖν εἰς τὸ σωφρονεῖν, ἑκάστῳ ὡς ὁ θεὸς ἐμέρισεν μέτρον πίστεως.
base_translation:
  language: en
  yaml_path: translation/nt/romans/012/003.yaml
  text: For by the grace given to me I say to everyone among you not to think more highly than he ought to think[a], but to think with sound judgment[b], as God has apportioned to each a measure of faith.
  footnotes:
