translation:
  language: es
  text: Porque por la gracia que me ha sido dada digo a cada uno de ustedes que no piense más alto de lo que debe pensar[a], sino que piense con sensatez, según Dios repartió a cada uno una medida de fe[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no piense más de lo debido»; también: «sino que piense de modo que sea sobrio de mente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la medida de fe»; posiblemente también «una medida de fidelidad» o «de confianza». La frase griega puede referirse a una medida dada por Dios relacionada con la fe sin precisar exactamente el matiz.'
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τῆς χάριτος τῆς δοθείσης μοι
  english_pob_choice: by the grace given to me
  chosen_spanish: por la gracia que me ha sido dada
  alternatives_spanish:
  - por medio de la gracia que me ha sido dada
  - por la gracia dada a mí
  lexicon: BDAG
  rationale: διά con genitivo expresa aquí medio o base; en español, 'por la gracia que me ha sido dada' comunica con naturalidad la comisión recibida sin agregar contenido ajeno al griego.
- source_word: παντὶ τῷ ὄντι ἐν ὑμῖν
  english_pob_choice: to everyone among you
  chosen_spanish: a todo el que está entre ustedes
  alternatives_spanish:
  - a cada uno de ustedes
  - a todos los que están entre ustedes
  lexicon: BDAG
  rationale: La construcción distributiva se entiende mejor en español como referencia a cada persona dentro de la comunidad; 'entre ustedes' conserva el matiz de pertenencia al grupo.
- source_word: μὴ ὑπερφρονεῖν
  english_pob_choice: not to think more highly
  chosen_spanish: que no piense de sí mismo más de lo que debe pensar
  alternatives_spanish:
  - que no piense demasiado alto de sí
  - que no sea arrogante
  lexicon: BDAG
  rationale: ὑπερφρονέω conserva el campo de 'pensar demasiado alto'; la redacción española mantiene el juego con φρονεῖν sin perder naturalidad.
- source_word: παρ’ ὃ δεῖ φρονεῖν
  english_pob_choice: than he ought to think
  chosen_spanish: más de lo que debe pensar
  alternatives_spanish:
  - más allá de lo que debe pensar
  - más de lo necesario pensar
  lexicon: BDAG
  rationale: La frase fija un límite apropiado para la autoevaluación; 'más de lo que debe pensar' expresa la comparación de manera idiomática en español.
- source_word: ἀλλὰ φρονεῖν εἰς τὸ σωφρονεῖν
  english_pob_choice: but to think with sound judgment
  chosen_spanish: sino que piense para tener sano juicio
  alternatives_spanish:
  - sino que piense con juicio sano
  - sino que piense para ser sobrio de mente
  lexicon: BDAG
  rationale: Se conserva el contraste y el juego φρονέω/σωφρονέω con una expresión española clara; 'sano juicio' transmite la idea de sensatez sobria sin oscurecer el argumento.
- source_word: ἑκάστῳ
  english_pob_choice: to each
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada uno de ellos
  - a cada persona
  lexicon: BDAG
  rationale: Dativo distributivo normal en español; 'a cada uno' es conciso y preserva la aplicación individual.
- source_word: ἐμέρισεν
  english_pob_choice: has apportioned
  chosen_spanish: repartió
  alternatives_spanish:
  - ha repartido
  - ha asignado
  - ha distribuido
  lexicon: BDAG
  rationale: μερίζω indica dividir/distribuir/aportar; 'repartió' comunica la acción divina de asignar medidas de manera clara en español, manteniendo el carácter distributivo.
- source_word: μέτρον πίστεως
  english_pob_choice: a measure of faith
  chosen_spanish: la medida de fe
  alternatives_spanish:
  - una medida de fe
  - la medida de la fe
  - una medida de confianza
  lexicon: BDAG
  rationale: Se mantiene la ambigüedad del sintagma y su posible valor técnico sin resolverlo más de lo que hace el griego. En español, 'la medida de fe' preserva el paralelo con la porción repartida por Dios.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: Siguiendo el valor por defecto de πίστις en este proyecto, se traduce 'fe' y se conserva la amplitud semántica que el contexto no delimita del todo.
theological_decisions:
- issue: Sentido de μέτρον πίστεως
  english_pob_reading: Retain the broad phrase 'a measure of faith' without specifying whether it means saving faith, capacity for ministry, or a standard/norm of faith.
  chosen_spanish_reading: Conservar 'la medida de fe' sin precisar si se trata de fe salvadora, capacidad para el servicio o una norma de fe.
  alternative_spanish_readings:
  - una medida de confianza
  - la medida de la fe como norma
  - una capacidad dada por Dios para el servicio
  rationale: El contexto inmediato pasa a los dones y funciones en 12:4–8, pero la frase griega no obliga a una sola interpretación. La traducción española mantiene esa tensión en vez de resolverla doctrinalmente.
  doctrine_reference: Preservar la tensión teológica sin resolverla; πίστις se rinde por defecto como 'fe'.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó 'of himself' por no estar explícito en el griego; en español, la referencia reflexiva sí es necesaria para expresar naturalmente la misma idea distributiva del infinitivo genérico masculino sin añadir un sujeto distinto. Se mantuvo el resto del sentido y la ambigüedad de 'a measure of faith'.
  spanish_consistency_notes:
  - Se usa 'fe' para πίστις conforme al criterio del proyecto.
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; en este versículo no aplica.
  - Se conserva 'sano juicio' como equivalente sobrio y contemporáneo de σωφρονεῖν.
  - '''A todo el que está entre ustedes'' reproduce el alcance distributivo de παντὶ τῷ ὄντι ἐν ὑμῖν sin volverlo más abstracto.'
