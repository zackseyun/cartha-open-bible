translation:
  language: es
  text: No sean perezosos en su empeño; manténganse fervientes en espíritu[a]; sirvan al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el Espíritu», si πνεύματι se entiende como referencia al Espíritu Santo y no al espíritu del creyente.
    reason: alternative_reading
lexical_decisions:
- source_word: σπουδῇ
  english_pob_choice: zeal
  chosen_spanish: celo
  alternatives_spanish:
  - diligencia
  - ardor
  - empeño
  lexicon: BDAG
  rationale: En este contexto exhortativo, σπουδῇ expresa la actitud de entrega y empeño con que se debe obrar. 'Celo' conserva mejor en español la fuerza ética del término y su enlace natural con 'perezosos', sin forzar la construcción 'perezosos en diligencia'.
- source_word: ὀκνηροί
  english_pob_choice: lazy
  chosen_spanish: perezosos
  alternatives_spanish:
  - lentos
  - indolentes
  - holgazanes
  lexicon: BDAG
  rationale: El adjetivo contrasta con la prontitud y el ardor de la exhortación. 'Perezosos' es claro, natural y comunica bien la idea de falta de disposición o de energía.
- source_word: πνεύματι
  english_pob_choice: spirit / the Spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - el Espíritu
  - vuestro espíritu
  - el Espíritu Santo
  lexicon: BDAG
  rationale: El dativo anartro puede referirse al espíritu humano o al Espíritu Santo. 'Espíritu' sin artículo mantiene abierta la tensión textual y permite la lectura preferida del contexto inmediato, sin cerrar la alternativa documentada.
- source_word: ζέοντες
  english_pob_choice: be fervent
  chosen_spanish: estén fervientes
  alternatives_spanish:
  - arden
  - hierven
  - sean fervorosos
  lexicon: BDAG
  rationale: La imagen literal es de 'hervir', pero en español 'estar fervientes' conserva el valor metafórico de ardor intenso con buena fluidez idiomática.
- source_word: κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  - dueño
  - maestro
  lexicon: BDAG
  rationale: Se mantiene el título cristológico tradicionalmente entendible en español como 'el Señor'. Aquí no hace falta sustituirlo por otra denominación, pues el contexto paulino lo identifica naturalmente.
- source_word: δουλεύοντες
  english_pob_choice: serve
  chosen_spanish: sirvan
  alternatives_spanish:
  - sean esclavos de
  - sirvan como esclavos a
  - estén al servicio de
  lexicon: BDAG
  rationale: Aunque el verbo tiene la fuerza de esclavitud, en esta construcción con dativo de destinatario la equivalencia española más natural y fiel al flujo exhortativo es 'sirvan'. En este caso, una traducción con 'esclavos' sonaría forzada y desplazaría el énfasis de la amonestación.
theological_decisions:
- issue: Referente de πνεύματι
  english_pob_reading: human spirit / inward disposition, with Holy Spirit as preserved alternative
  chosen_spanish_reading: espíritu humano / disposición interior, con alternativa del Espíritu Santo mantenida abierta
  alternative_spanish_readings:
  - el Espíritu Santo
  - su espíritu
  rationale: El paralelo de exhortaciones éticas favorece leer πνεύματι como la disposición interior del creyente. Sin embargo, el griego no señala explícitamente el referente y la lectura del Espíritu Santo existe en la tradición interpretativa; por eso la traducción conserva la ambigüedad en vez de resolverla dogmáticamente.
  doctrine_reference: Preservar la tensión interpretativa documentada.
translation_notes:
  revision_awareness: La pauta inglesa revisó una propuesta anterior de 'diligence' a 'zeal' para σπουδῇ, evitando una frase poco natural. La presente versión sigue esa decisión semántica, pero la expresa con 'celo' en español, que mantiene el valor exhortativo y la relación con 'perezosos'.
  spanish_consistency_notes:
  - Se mantiene 'el Señor' para κύριος, en coherencia con la terminología habitual del proyecto cuando no hay razón contextual para otra opción.
  - Se usa 'espíritu' sin mayúscula en el texto principal para no decidir prematuramente entre espíritu humano y Espíritu Santo.
  - La construcción 'sirvan al Señor' conserva la fluidez del mandato sin perder el trasfondo de δουλεύω.
