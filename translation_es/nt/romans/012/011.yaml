  - severity: low
    issue: '''Estén fervientes'' suena menos natural que otras opciones españolas.'
    rationale: Para ζέοντες, una formulación como 'manténganse fervientes' o 'sean fervorosos' comunica mejor el valor exhortativo continuo sin perder fuerza metafórica.
