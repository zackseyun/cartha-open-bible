translation:
  language: es
  text: Si es posible[a], en cuanto dependa de ustedes, vivan en paz con todas las personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si es posible, por su parte, vivan en paz con todas las personas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δυνατόν
  english_pob_choice: If possible
  chosen_spanish: Si es posible
  alternatives_spanish:
  - Si fuera posible
  - En la medida de lo posible
  lexicon: BDAG
  rationale: La frase introduce una condición realista, no una obligación absoluta. «Si es posible» es natural en español y conserva la cualificación de contingencia.
- source_word: τὸ ἐξ ὑμῶν
  english_pob_choice: as far as it depends on you
  chosen_spanish: en cuanto dependa de ustedes
  alternatives_spanish:
  - por su parte
  - hasta donde dependa de ustedes
  - en lo que a ustedes toca
  lexicon: BDAG
  rationale: La construcción idiomática señala lo que está dentro de la responsabilidad o capacidad de los lectores. «En cuanto dependa de ustedes» expresa bien esa limitación sin perder el sentido de responsabilidad personal.
- source_word: μετὰ πάντων ἀνθρώπων
  english_pob_choice: with all people
  chosen_spanish: con todas las personas
  alternatives_spanish:
  - con todos
  - con toda la gente
  - con todos los hombres
  lexicon: BDAG
  rationale: ἄνθρωποι aquí es genérico para seres humanos. «Todas las personas» mantiene esa referencia inclusiva y evita una lectura restringida a varones.
- source_word: εἰρηνεύοντες
  english_pob_choice: live at peace
  chosen_spanish: vivan en paz
  alternatives_spanish:
  - estén en paz
  - vivan pacíficamente
  - mantengan la paz
  lexicon: BDAG
  rationale: El participio presente funciona con valor exhortativo y describe una conducta continua. «Vivan en paz» comunica un modo de vida sostenido y suena más natural que una traducción participial rígida.
theological_decisions:
- issue: Alcance y limitación de la exhortación a la paz
  english_pob_reading: Paul commands believers to pursue peace universally, while explicitly limiting their responsibility to what is genuinely within their control.
  chosen_spanish_reading: Pablo exhorta a buscar la paz con todas las personas, pero limita la responsabilidad a lo que realmente depende de los creyentes.
  alternative_spanish_readings:
  - Pablo ordena la paz sin matices
  - Pablo enseña que la paz debe lograrse siempre si el creyente obra correctamente
  rationale: Las dos cualificaciones del versículo, «si es posible» y «en cuanto dependa de ustedes», impiden convertir la exhortación en una garantía absoluta de paz. La traducción conserva tanto el alcance universal como la limitación realista.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No hubo cambios recientes que afecten este versículo; el acuerdo de revisión fue alto y estable, por lo que la redacción conserva la lectura fuente con equivalencia óptima.
  spanish_consistency_notes:
  - Se usa «personas» para ἀνθρώπων por coherencia con el valor genérico humano del griego.
  - Se mantiene «paz» como sustantivo central y «vivan» para reflejar el participio exhortativo en un español natural.
  - Se evita «hombres» para no introducir una restricción de género ausente en el texto fuente.
