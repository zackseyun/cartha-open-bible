translation:
  language: es
  text: 'Pero teniendo dones que difieren según la gracia que nos ha sido dada: si profecía[a], en proporción a la fe;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en proporción a la fe de uno»; alternativamente, «en conformidad con la fe». La frase griega puede referirse tanto a la medida de fe dada al que habla como a la conformidad con el contenido de la fe cristiana.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔχοντες
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - siendo que tenemos
  - y teniendo
  lexicon: BDAG
  rationale: El participio presente plural se conserva como construcción participial en español. «Teniendo» mantiene el flujo exhortativo sin convertirlo en una afirmación más pesada o explicativa.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Marca transición suave desde el argumento anterior. «Pero» refleja bien ese giro de enlace y es natural en español bíblico contemporáneo.
- source_word: χαρίσματα
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - carismas
  lexicon: BDAG
  rationale: En contexto paulino, «dones» comunica con claridad el sentido de χαρίσματα sin tecnicismo innecesario. «Carismas» sería más literal, pero menos transparente para lectura pública.
- source_word: κατὰ τὴν χάριν τὴν δοθεῖσαν ἡμῖν
  english_pob_choice: according to the grace given to us
  chosen_spanish: según la gracia que nos ha sido dada
  alternatives_spanish:
  - de acuerdo con la gracia dada a nosotros
  - conforme a la gracia que nos fue dada
  lexicon: BDAG
  rationale: κατά expresa correspondencia o medida; «según» lo transmite de forma natural. «La gracia que nos ha sido dada» conserva el matiz de don divino de χάρις y el pasivo de δοθεῖσαν sin forzar el orden español.
- source_word: διάφορα
  english_pob_choice: that differ
  chosen_spanish: que difieren
  alternatives_spanish:
  - diferentes
  - varios
  lexicon: BDAG
  rationale: El adjetivo predicativo modifica «dones». «Que difieren» preserva la relación verbal implícita y la diversidad entre los dones.
- source_word: εἴτε
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - sea que
  - ya sea
  lexicon: BDAG
  rationale: Introduce el primer elemento de una enumeración elíptica. «Si» es breve y reproduce bien la forma abierta del griego.
- source_word: προφητείαν
  english_pob_choice: prophecy
  chosen_spanish: profecía
  alternatives_spanish:
  - don de profecía
  - mensaje profético
  lexicon: BDAG
  rationale: La traducción directa «profecía» conserva el término reconocido y el posible sentido funcional del don sin expandirlo innecesariamente.
- source_word: κατὰ τὴν ἀναλογίαν
  english_pob_choice: in proportion to
  chosen_spanish: en proporción a
  alternatives_spanish:
  - según
  - conforme a
  lexicon: BDAG
  rationale: ἀναλογία expresa proporción o correspondencia. «En proporción a» es la equivalencia más cercana y no impone una interpretación doctrinal cerrada.
- source_word: τῆς πίστεως
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fe de uno
  - la fe cristiana
  lexicon: BDAG
  rationale: Se conserva «la fe» como traducción amplia de πίστις. En este pasaje, la frase admite más de una lectura; la forma española mantiene esa apertura.
theological_decisions:
- issue: Sentido de κατὰ τὴν ἀναλογίαν τῆς πίστεως
  english_pob_reading: in proportion to faith, with the Greek phrase left open to either the prophet’s measure of faith or conformity with the faith
  chosen_spanish_reading: en proporción a la fe, dejando abierta la posibilidad de que se trate de la medida de fe del hablante o de la concordancia con la fe
  alternative_spanish_readings:
  - en proporción a la fe de cada uno
  - en conformidad con la fe
  rationale: La frase es genuinamente ambigua en griego. La versión principal mantiene la apertura interpretativa en vez de resolverla; la nota recoge las dos posibilidades principales para no borrar la tensión exegética.
  doctrine_reference: Translation philosophy §3; πίστις como término disputado en contextos paulinos
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el pasaje base; la redacción española sigue el texto griego y el trazado de auditoría inglés sin cambios sustantivos adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Fe» se conserva para πίστις en la línea terminológica del proyecto; la ambigüedad interpretativa se preserva en nota.
  - «Dones» se prefiere a «carismas» por claridad pública, sin perder el vínculo con χαρίσματα.
  - La puntuación con dos puntos reproduce la apertura enumerativa del griego y del audit trail inglés.
