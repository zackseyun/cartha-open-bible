revisions:
- from: Así que les ruego[a], hermanos, por las misericordias de Dios, que presenten sus cuerpos como sacrificio vivo[b], santo y agradable a Dios—su culto razonable[c].
  to: 'Por lo tanto, les ruego[a], hermanos, por las misericordias de Dios, que presenten sus cuerpos como sacrificio vivo, santo y agradable a Dios: su adoración razonable[b].'
  rationale: Se ajusta οὖν a «Por lo tanto» para reflejar mejor la inferencia paulina en un registro más digno; se cambia «culto razonable» por «adoración razonable» para una expresión española más natural y más alineada con el English POB («worship»), manteniendo las alternativas debatidas en nota. Se elimina la nota sobre «viviente» por ser una variante estilística menor sin base suficiente en la auditoría.
