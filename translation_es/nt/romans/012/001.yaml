translation:
  language: es
  text: 'Por lo tanto, les ruego[a], hermanos, por las misericordias de Dios, que presenten sus cuerpos como sacrificio vivo, santo y agradable a Dios: su adoración razonable[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice literalmente «hermanos» y a menudo usa la forma masculina para dirigirse a un grupo mixto.
    reason: alternative_reading
  - marker: b
    text: O «su culto espiritual» o «su servicio racional»; la expresión griega puede abarcar sentidos de razonable, racional o espiritual, así como de servicio rendido a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: les ruego
  alternatives_spanish:
  - les exhorto
  - les suplico
  - les insto
  lexicon: BDAG
  rationale: παρακαλέω expresa una exhortación apostólica ferviente. En español, «les ruego» conserva el tono fuerte y personal sin sonar arcaico; «les insto» sería posible, pero menos natural en este registro.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Así que
  alternatives_spanish:
  - Por lo tanto
  - Entonces
  - Por consiguiente
  lexicon: BDAG
  rationale: οὖν introduce inferencia desde el argumento previo. «Así que» comunica la conexión lógica con naturalidad en español actual, sin perder el valor inferencial.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  - santos
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural del original como vocativo colectivo. En español, «hermanos» puede abarcar una comunidad mixta; la posible lectura inclusiva queda implícita sin reemplazar la forma fuente.
- source_word: διὰ τῶν οἰκτιρμῶν τοῦ θεοῦ
  english_pob_choice: by the mercies of God
  chosen_spanish: por las misericordias de Dios
  alternatives_spanish:
  - a causa de las misericordias de Dios
  - en vista de las misericordias de Dios
  - mediante las misericordias de Dios
  lexicon: BDAG
  rationale: διά con genitivo expresa base o medio; aquí funciona como apelación fundada en la misericordia divina. «Por las misericordias de Dios» reproduce bien la pluralidad de οἰκτιρμῶν y la relación causal/basada en.
- source_word: παραστῆσαι
  english_pob_choice: to present
  chosen_spanish: que presenten
  alternatives_spanish:
  - que ofrezcan
  - que pongan a disposición
  - que entreguen
  lexicon: BDAG
  rationale: παρίστημι en contexto sacrificial/ético significa «presentar» u «ofrecer». «Presenten» mantiene la imagen cultual y la cercanía al uso paulino sin desplazar el matiz sacrificial hacia un verbo más interpretativo.
- source_word: τὰ σώματα ὑμῶν
  english_pob_choice: your bodies
  chosen_spanish: sus cuerpos
  alternatives_spanish:
  - sus cuerpos y vidas
  - ustedes mismos
  - su ser corporal
  lexicon: BDAG
  rationale: σώματα es literalmente «cuerpos» y debe conservarse. En español, el posesivo plural de cortesía/comunidad «sus» funciona naturalmente para la audiencia plural y mantiene la concreción del término.
- source_word: θυσίαν ζῶσαν
  english_pob_choice: as a living sacrifice
  chosen_spanish: como sacrificio vivo
  alternatives_spanish:
  - como un sacrificio viviente
  - como sacrificio que vive
  lexicon: BDAG
  rationale: La frase acusativa se entiende de modo apposicional tras «presenten». «Sacrificio vivo» preserva la paradoja paulina y evita una paráfrasis explicativa.
- source_word: ἁγίαν
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - consagrado
  - apartado para Dios
  lexicon: BDAG
  rationale: ἅγιος describe algo dedicado a Dios. «Santo» es la equivalencia usual y teológicamente fuerte en español; las alternativas explicitan el matiz cultual, pero serían más interpretativas.
- source_word: εὐάρεστον τῷ θεῷ
  english_pob_choice: pleasing to God
  chosen_spanish: agradable a Dios
  alternatives_spanish:
  - placentero a Dios
  - aceptable a Dios
  - bien agradable a Dios
  lexicon: BDAG
  rationale: εὐάρεστος significa lo que agrada o es aceptable para Dios. «Agradable a Dios» es natural y fiel; «aceptable» también sería posible, pero puede sonar más jurídico que relacional.
- source_word: λογικὴν
  english_pob_choice: reasonable
  chosen_spanish: razonable
  alternatives_spanish:
  - racional
  - espiritual
  - conforme a la razón
  lexicon: BDAG
  rationale: 'λογικός es debatido: puede sugerir racional, razonable o incluso espiritual. «Razonable» conserva la ambigüedad productiva del original sin resolverla prematuramente ni inclinarla demasiado hacia «espiritual».'
- source_word: λατρείαν
  english_pob_choice: worship
  chosen_spanish: culto
  alternatives_spanish:
  - servicio
  - adoración
  - servicio sagrado
  lexicon: BDAG
  rationale: λατρεία remite al servicio cultual rendido a Dios. «Culto» comunica mejor el matiz de servicio sagrado que «adoración» en este contexto, y evita reducirlo sólo a una actitud interior.
theological_decisions:
- issue: Vocativo masculino plural en una comunidad mixta
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanas y hermanos
  rationale: Se conserva la forma fuente masculina plural como vocativo representativo. En español, «hermanos» puede dirigirse naturalmente a una asamblea mixta; una expansión inclusiva en el texto principal sería más interpretativa que el original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: λογικὴν λατρείαν como expresión interpretivamente disputada
  english_pob_reading: your reasonable worship
  chosen_spanish_reading: su culto razonable
  alternative_spanish_readings:
  - su culto espiritual
  - su servicio racional
  - su adoración razonable
  rationale: Se mantiene la tensión del original entre razón, adecuación y posible sentido espiritual. «Culto razonable» conserva la ambigüedad sin absorberla en una sola lectura; las alternativas se dejan abiertas porque el griego admite más de un matiz legítimo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente sin cambios sustantivos: se conserva la estructura inferencial de οὖν, el lenguaje sacrificial de presenten sus cuerpos, y la ambigüedad de λογικὴν λατρείαν mediante una traducción principal breve y notas de alternativa.'
  spanish_consistency_notes:
  - Se usó «Dios» para θεός, conforme al criterio del proyecto.
  - Se mantuvo «sacrificio» y «culto» para preservar el registro cultual de θυσία y λατρεία.
  - Se evitó sustituir «hermanos» por una formulación inclusiva en el texto principal, dejando la aclaración en nota.
  - La puntuación con raya final preserva el cierre apposicional del original griego.
