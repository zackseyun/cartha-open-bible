translation:
  language: es
  text: No paguen a nadie mal por mal[a], sino procuren lo bueno ante todas las personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo honorable' o 'lo noble'.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδενὶ
  english_pob_choice: no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - a ninguna persona
  - a nadie ninguno
  lexicon: BDAG
  rationale: 'El dativo con ἀποδιδόντες expresa el destinatario de la acción: ''a nadie''. En español, ''a nadie'' comunica de forma natural el alcance universal sin forzar una estructura más pesada.'
- source_word: κακὸν
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - daño
  - malvado
  lexicon: BDAG
  rationale: En la expresión recíproca, 'mal' conserva la fuerza moral de κακός y suena natural en español. 'Daño' estrecharía el sentido hacia perjuicio físico o material.
- source_word: ἀντὶ κακοῦ
  english_pob_choice: for evil
  chosen_spanish: por mal
  alternatives_spanish:
  - en lugar de mal
  - a cambio de mal
  - por maldad
  lexicon: BDAG
  rationale: La preposición ἀντί aquí tiene valor de intercambio/represalia. 'Por mal' reproduce bien la relación recíproca en español y mantiene la brevedad del paralelismo.
- source_word: ἀποδιδόντες
  english_pob_choice: Repaying
  chosen_spanish: devolviendo
  alternatives_spanish:
  - retribuyendo
  - pagando
  - retribuyendo de nuevo
  lexicon: BDAG
  rationale: El participio tiene fuerza exhortativa en el contexto. 'Devolviendo' comunica la idea de responder con una devolución equivalente; sin embargo, en la formulación final se mantiene la imagen de no dar respuesta de represalia, por eso se integra en una construcción negativa más natural en español.
- source_word: προνοούμενοι
  english_pob_choice: taking thought
  chosen_spanish: procurando
  alternatives_spanish:
  - pensando de antemano
  - cuidando
  - considerando con antelación
  lexicon: BDAG
  rationale: '''Procurando'' capta la idea de atender deliberadamente a algo con intención y cuidado. En español fluye mejor que una calca como ''tomando pensamiento'' y preserva el matiz de acción intencional y continua.'
- source_word: καλὰ
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - lo honorable
  - lo noble
  - las cosas buenas
  lexicon: BDAG
  rationale: καλά puede significar 'buenas cosas', 'honorable' o 'noble'. 'Lo bueno' conserva la amplitud ética sin restringirlo solo a respetabilidad social. La ambigüedad honorífica se preserva implícitamente.
- source_word: ἐνώπιον πάντων ἀνθρώπων
  english_pob_choice: in the sight of all people
  chosen_spanish: delante de todos los hombres
  alternatives_spanish:
  - a la vista de todas las personas
  - en presencia de todos
  - ante toda la gente
  lexicon: BDAG
  rationale: La frase señala publicidad y visibilidad social. 'Delante de todos los hombres' sigue de cerca el alcance del griego; 'todos los hombres' se mantiene aquí porque reproduce el genérico ανθρώπων y la forma tradicional resulta clara en contexto, aunque la alternativa con 'personas' también sería válida en español moderno.
theological_decisions:
- issue: Nuance ética de καλά en un contexto público
  english_pob_reading: what is good
  chosen_spanish_reading: lo bueno
  alternative_spanish_readings:
  - lo honorable
  - lo noble
  rationale: La exhortación combina bondad moral y conducta públicamente visible. 'Lo bueno' evita reducir el mandato a mera respetabilidad externa, mientras que 'lo honorable' y 'lo noble' siguen siendo lecturas posibles y se mantienen como alternativas semánticas.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, especialmente la decisión de mantener el valor moral amplio de κακός/καλά y la conexión exhortativa de los participios. En español, se optó por una redacción natural y publicable sin perder la fuerza de la reprensión contra la represalia.
  spanish_consistency_notes:
  - Se mantiene la distinción entre mal moral y simple daño físico al traducir κακὸν/κακοῦ.
  - '''Lo bueno'' conserva la amplitud de καλὰ; la nota recoge la alternativa ''lo honorable''/''lo noble''.'
  - '''Delante de todos los hombres'' refleja la visibilidad pública del griego ἐνώπιον πάντων ἀνθρώπων.'
  - La forma participial se integró con una construcción fluida en español, preservando el valor exhortativo.
