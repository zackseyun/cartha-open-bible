translation:
  language: es
  text: Bendigan a quienes los persiguen[a]; bendigan y no maldigan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a quienes van tras ustedes». El verbo griego puede significar «perseguir» o «ir tras», pero aquí probablemente se refiere a persecución hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Bendecid
  - Pronuncien bendición sobre
  lexicon: BDAG
  rationale: Imperativo plural de εὐλογέω. En español, «bendigan» conserva el mandato verbal y el sentido religioso/ético de procurar bien al otro. Se mantiene la repetición del verbo para reflejar el énfasis del griego y del POB en inglés.
- source_word: τοὺς διώκοντας
  english_pob_choice: those who persecute you
  chosen_spanish: a los que los persiguen
  alternatives_spanish:
  - a sus perseguidores
  - a los que los acosan
  lexicon: BDAG
  rationale: 'El participio con artículo funciona sustantivamente: «los que persiguen». En este contexto, el sentido de persecución hostil es el más probable; en español, «persiguen» comunica con naturalidad esa hostilidad sin añadir una glosa excesiva. El objeto implícito «los» se explicita para claridad idiomática.'
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - e
  lexicon: BDAG
  rationale: Conector simple que une el mandato positivo repetido con la prohibición negativa. «Y» preserva la parataxis directa del griego.
- source_word: μὴ καταρᾶσθε
  english_pob_choice: do not curse
  chosen_spanish: no maldigan
  alternatives_spanish:
  - no maldigan jamás
  - no pronuncien maldiciones
  lexicon: BDAG
  rationale: El imperativo con μή expresa prohibición. «No maldigan» es breve, natural y mantiene el contraste con «bendigan». «Maldigan» conserva mejor el paralelo verbal en español que una expansión interpretativa.
theological_decisions:
- issue: Alcance de διώκω en el contexto
  english_pob_reading: Rendered as hostile persecution rather than mere pursuit
  chosen_spanish_reading: «persiguen» como persecución hostil, no simple seguimiento
  alternative_spanish_readings:
  - «siguen»
  - «van tras»
  rationale: Aunque διώκω puede significar «perseguir» en sentido neutro de seguimiento, en Romanos 12 el contraste con bendecir y no maldecir favorece la hostilidad. «Persiguen» conserva esa fuerza sin sobreexplicar en el texto principal.
  doctrine_reference: Principio de primacía del original y del sentido contextual; mantener la tensión léxica observada en el POB inglés.
translation_notes:
  revision_awareness: 'El pasaje coincide con el control más reciente: no hubo cambios necesarios y la concordancia con el auditor inglés es alta. La redacción española mantiene la repetición imperativa y la oposición bendecir/maldición sin suavizar la tensión léxica de διώκω.'
  spanish_consistency_notes:
  - Se usa «bendigan» para εὐλογεῖτε y se repite en ambas cláusulas, como en el griego.
  - Se evita «SEÑOR» u otra sustitución innecesaria, porque este versículo no contiene el nombre divino.
  - Se elige «maldigan» en lugar de una perífrasis más larga para conservar el paralelismo con «bendigan».
