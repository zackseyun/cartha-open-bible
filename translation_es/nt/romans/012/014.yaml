- from: Bendigan a los que los persiguen[a]; bendigan y no maldigan.
  to: Bendigan a quienes los persiguen[a]; bendigan y no maldigan.
  rationale: Se mantiene el sentido del original y del POB inglés, pero se mejora la naturalidad con «a quienes». La nota se corrige para reflejar con mayor fidelidad la alternativa léxica de διώκω sin introducir el matiz menos adecuado de «seguir».
