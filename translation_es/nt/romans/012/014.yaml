review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: mantiene la repetición de «bendigan», el participio sustantivado para los perseguidores y la prohibición final de maldecir. También conserva adecuadamente la nota de alternativa léxica para διώκω.'
  spanish_quality_summary: La frase principal es clara y natural. Sin embargo, la nota al pie introduce «a los que los siguen», que en español suena más a seguimiento personal que a la alternativa más precisa «a los que los persiguen / a los que van tras ustedes». Además, conviene ajustar el pronombre de segunda persona para mayor naturalidad panhispánica y coherencia con el sentido implícito del griego.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Bendigan» / «maldigan» reproduce bien εὐλογεῖτε / καταρᾶσθε. «Persiguen» es correcto para διώκω en este contexto. Se recomienda «ustedes» en lugar de «los» como objeto explícito por claridad idiomática neutral latinoamericana.
  issues:
  - severity: medium
    issue: Pronombre objeto «los» en «a los que los persiguen»
    rationale: Aunque es comprensible, «los» puede sonar menos natural o más ambiguo en español latinoamericano general. «A los que los persiguen» funciona, pero «a los que los persiguen a ustedes» sería pesado; mejor «a quienes los persiguen» o «a los que los persiguen» con ajuste en la nota. Dado el contexto exhortativo, «a quienes los persiguen» fluye mejor.
  - severity: medium
    issue: Alternativa de la nota «a los que los siguen»
    rationale: El inglés auditado dice «those pursuing you», no «those following you». «Siguen» desplaza el campo semántico hacia seguir/acompañar más que perseguir/ir tras, y puede debilitar la rationale léxica documentada.
  revised_spanish_text: Bendigan a quienes los persiguen[a]; bendigan y no maldigan.
  revised_footnotes:
  - marker: a
    text: O «a quienes van tras ustedes». El verbo griego puede significar «perseguir» o «ir tras», pero aquí probablemente se refiere a persecución hostil.
    reason: lexical_alternative
  revision_rationale: Se mantiene el sentido del original y del POB inglés, pero se mejora la naturalidad con «a quienes». La nota se corrige para reflejar con mayor fidelidad la alternativa léxica de διώκω sin introducir el matiz menos adecuado de «seguir».
