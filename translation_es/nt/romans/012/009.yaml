translation:
  language: es
  text: Que el amor sea sin hipocresía[a]. Aborrezcan lo malo; aférrense a lo bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que el amor sea sincero». El griego dice literalmente: «Amor sin hipocresía».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: Se mantiene el término general y natural para ἀγάπη en este contexto exhortativo. "Amor" comunica con claridad la virtud cristiana requerida, sin introducir un matiz eclesiástico más estrecho que "caridad".
- source_word: ἀνυπόκριτος
  english_pob_choice: without hypocrisy
  chosen_spanish: sin hipocresía
  alternatives_spanish:
  - sincero
  - genuino
  - sin fingimiento
  lexicon: BDAG
  rationale: La expresión española conserva la imagen concreta de ausencia de actuación fingida y sigue de cerca la fuerza del griego. "Sincero" es posible, pero suaviza un poco el valor moral explícito del término.
- source_word: ἀποστυγοῦντες
  english_pob_choice: abhor
  chosen_spanish: aborrezcan
  alternatives_spanish:
  - detesten
  - aborrezcan intensamente
  - huyan de
  lexicon: BDAG
  rationale: El verbo griego expresa una aversión muy fuerte. "Aborrecer" reproduce mejor esa intensidad en español bíblico y moderno que opciones más débiles como "rechazar" o más explicativas como "odiar".
- source_word: τὸ πονηρόν
  english_pob_choice: what is evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - lo evil
  - el mal
  - lo perverso
  lexicon: BDAG
  rationale: El neutro sustantivado se vierte con naturalidad como un sustantivo abstracto en español. "Lo malo" conserva la amplitud moral del griego y mantiene el paralelo con "lo bueno".
- source_word: κολλώμενοι
  english_pob_choice: cling to
  chosen_spanish: aférrense a
  alternatives_spanish:
  - péguense a
  - abrácense a
  - adhiéranse a
  lexicon: BDAG
  rationale: El verbo indica adhesión estrecha y persistente. "Aférrense a" transmite bien la fuerza de apego y dependencia que exige el contexto, con un español natural y exhortativo.
- source_word: τῷ ἀγαθῷ
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo recto
  - lo beneficioso
  lexicon: BDAG
  rationale: 'Al igual que con τὸ πονηρόν, el neutro sustantivado se expresa mejor en español como una abstracción: "lo bueno". Así se conserva el paralelismo antitético del versículo.'
theological_decisions:
- issue: Force exhortativa de la cláusula nominal y de los participios
  english_pob_reading: 'Render the verse as a series of exhortations: ''Let love be ... Abhor ... cling ...'''
  chosen_spanish_reading: 'Hacer de todo el versículo una serie de exhortaciones: ''El amor sea ... Aborrezcan ... aférrense ...'''
  alternative_spanish_readings:
  - Amor sin hipocresía, aborreciendo lo malo y aferrándose a lo bueno
  - Que el amor sea sin hipocresía; aborrezcan lo malo y aférrense a lo bueno
  rationale: El griego comienza con una cláusula nominal y continúa con participios, pero en Romanos 12 la secuencia funciona parenéticamente. En español, explicitar la fuerza exhortativa produce una lectura clara y fiel al impulso del pasaje, sin perder la estructura básica del original.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'El texto se ajusta al pasaje griego breve y coincide con la revisión inglesa vigente: no se registran cambios aplicados en la auditoría reciente, y la solución española conserva el tono exhortativo y el paralelismo antitético del original.'
  spanish_consistency_notes:
  - Se usa "amor" para ἀγάπη, conforme al uso estable del proyecto y al registro natural del español.
  - Se conserva el contraste formal "lo malo / lo bueno" para reflejar los neutros sustantivados τὸ πονηρόν y τῷ ἀγαθῷ.
  - La traducción opta por verbos en imperativo plural para reproducir la fuerza exhortativa contextual de los participios griegos.
  - Se evita "Cristo" u otra terminología no presente en el versículo.
  - 'La nota al pie mantiene la alternativa interpretativa documentada por la auditoría inglesa: "sincero" frente a la traducción más literal de la imagen griega.'
