review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: apoyo a las necesidades de los santos y exhortación activa a la hospitalidad. Sin embargo, «compartiendo con las necesidades» no refleja bien la construcción ταῖς χρείαις… κοινωνοῦντες; en español suena poco idiomática y semánticamente desviada. El sentido es participar en atender o suplir esas necesidades, no ''compartir con'' las necesidades mismas. Además, «buscando la hospitalidad» es entendible, pero «practicando» debilitaría el griego; conviene una opción como «procurando» que conserve mejor el matiz activo de διώκοντες sin sonar extraña.'
  spanish_quality_summary: La frase actual es comprensible, pero «compartiendo con las necesidades» es antinatural en español y afecta la legibilidad. «Procurando la hospitalidad» fluye mejor que «buscando la hospitalidad» en registro bíblico moderno y mantiene dignidad e inteligibilidad. Las notas están casi bien, pero la nota a debe corresponder a una formulación principal revisada y su razón debería seguir siendo léxica/alternativa.
  glossary_alignment: '«santos» alinea bien con ἁγίων y la decisión paulina documentada. «hospitalidad» preserva correctamente φιλοξενίαν, con nota útil sobre acoger a extraños. No hay términos del glosario mayor en conflicto. El principal ajuste léxico necesario es κοινωνοῦντες: mejor «participando en las necesidades» o «compartiendo para las necesidades»; la opción más natural y fiel aquí es «participando en las necesidades», con nota alternativa «contribuyendo a».'
  issues:
  - severity: high
    issue: «compartiendo con las necesidades» no es una construcción española natural ni refleja bien κοινωνοῦντες + dativo.
    rationale: El griego expresa participación activa en atender las necesidades de los santos. En español, 'compartir con las necesidades' sugiere relación con las necesidades como interlocutor o compañía, no participación en su alivio.
  - severity: medium
    issue: «buscando la hospitalidad» es menos preciso que una opción que conserve mejor el matiz de διώκοντες.
    rationale: διώκοντες tiene fuerza de perseguir/procurar activamente. «Buscando» es aceptable, pero «procurando» suena más natural en exhortación ética y mantiene mejor la intencionalidad.
  - severity: low
    issue: La nota a podría ajustarse para encajar mejor con la formulación española principal revisada.
    rationale: Si el texto principal cambia a «participando en las necesidades», la alternativa «contribuyendo a las necesidades» queda más claramente como una opción léxica contextual.
  revised_spanish_text: participando en las necesidades de los santos[a], procurando[b] la hospitalidad.
  revised_footnotes:
