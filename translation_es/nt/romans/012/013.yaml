translation:
  language: es
  text: participando en las necesidades de los santos[a], procurando[b] la hospitalidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contribuyendo a las necesidades de los santos».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «la hospitalidad»; el término griego puede llevar el sentido de acoger a extraños.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χρείαις
  english_pob_choice: needs
  chosen_spanish: necesidades
  alternatives_spanish:
  - necesidades prácticas
  - apremios
  lexicon: BDAG
  rationale: χρεία se refiere aquí a necesidades concretas o prácticas. «Necesidades» es natural en español y conserva la amplitud del término sin restringirlo indebidamente a ayuda económica.
- source_word: ἁγίων
  english_pob_choice: saints
  chosen_spanish: santos
  alternatives_spanish:
  - los santos
  - personas santas
  - el pueblo santo de Dios
  lexicon: BDAG
  rationale: En Pablo, ἅγιοι designa a los creyentes como el pueblo apartado para Dios. «Santos» preserva el término técnico paulino; en español puede leerse corporativamente sin remitir a la categoría eclesiástica posterior.
- source_word: κοινωνοῦντες
  english_pob_choice: sharing in
  chosen_spanish: compartiendo con
  alternatives_spanish:
  - participando en
  - contribuyendo a
  - tomando parte en
  lexicon: BDAG
  rationale: κοινωνέω puede significar compartir, participar o contribuir. «Compartiendo con» conserva la idea de comunión/participación y permite la relación con «las necesidades» sin volverlo excesivamente financiero.
- source_word: φιλοξενίαν
  english_pob_choice: hospitality
  chosen_spanish: la hospitalidad
  alternatives_spanish:
  - amor por los extraños
  - acogida a los extraños
  - recibir con hospitalidad
  lexicon: BDAG
  rationale: El término griego literalmente alude al amor por los extraños, pero «hospitalidad» es la equivalencia idiomática más clara en español. Se conserva el artículo para reflejar la forma nominal del griego.
- source_word: διώκοντες
  english_pob_choice: pursuing
  chosen_spanish: buscando
  alternatives_spanish:
  - persiguiendo
  - procurando
  - anhelando
  lexicon: BDAG
  rationale: διώκω significa perseguir, buscar con empeño o esforzarse por obtener. «Buscando» comunica la iniciativa activa y es más natural en español actual que «persiguiendo» en este contexto exhortativo.
theological_decisions:
- issue: Sentido de «los santos»
  english_pob_reading: believers / the holy people of God
  chosen_spanish_reading: los creyentes, el pueblo santo de Dios
  alternative_spanish_readings:
  - santos canonizados en sentido posterior
  - los fieles
  rationale: La lectura paulina de ἁγίων es corporativa y eclesial, no una referencia a una clase restringida de canonizados. La traducción mantiene «santos» para conservar el eco léxico, con lectura teológica comunitaria implícita.
  doctrine_reference: Romanos 12:13; afirmaciones doctrinales sobre el pueblo de Dios
- issue: Matiz de φιλοξενίαν
  english_pob_reading: the hospitality; can carry the sense of welcoming strangers
  chosen_spanish_reading: la hospitalidad, con posible matiz de acogida al extraño
  alternative_spanish_readings:
  - la acogida a los extraños
  - la hospitalidad hacia desconocidos
  rationale: El griego incluye una referencia etimológica al extraño (ξένος). «Hospitalidad» es la traducción principal; el matiz de acogida a extraños se preserva en la nota para no perder la tensión lexical.
  doctrine_reference: Romanos 12:13; nota léxica sobre φιλοξενία
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el pasaje griego y el audit trail en inglés. Se mantiene la ambigüedad útil de κοινωνοῦντες entre compartir y contribuir, y se conserva φιλοξενίαν como «hospitalidad» con nota explicativa sobre su posible matiz de acogida a extraños. No se requieren revisiones respecto del último pase: el texto inglés y la evaluación de alta concordancia no sugieren cambios sustantivos.'
  spanish_consistency_notes:
  - Se usa «santos» como término paulino estable, coherente con la terminología del proyecto.
  - «Necesidades» mantiene el plural abstracto concreto del griego y su tono exhortativo.
  - La construcción «compartiendo con» evita reducir κοινωνοῦντες a simple limosna, pero sigue siendo natural en español.
  - «La hospitalidad» conserva el valor nominal y la posibilidad de una nota etimológica sin sobretraducción.
