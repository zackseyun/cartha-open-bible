revisions:
- from: compartiendo con las necesidades de los santos[a], buscando[b] la hospitalidad.
  to: participando en las necesidades de los santos[a], procurando[b] la hospitalidad.
  rationale: Se revisa «compartiendo con» a «participando en» para representar de manera fiel e idiomática κοινωνοῦντες con dativo, preservando la idea de participación activa en suplir necesidades. Se cambia «buscando» por «procurando» para reflejar mejor la fuerza exhortativa de διώκοντες sin caer en una literalidad extraña como «persiguiendo». Se conservan «santos» y «hospitalidad» por fidelidad léxica y teológica al audit trail.
  reviewer_model: gpt-5.4
