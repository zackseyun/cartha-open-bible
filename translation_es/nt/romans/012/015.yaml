translation:
  language: es
  text: Alégrense con los que se alegran[a]; lloren con los que lloran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más formal, «Estén alegres con los que están alegres; lloren con los que están llorando».
    reason: lexical_alternative
lexical_decisions:
- source_word: χαίρειν
  english_pob_choice: Rejoice
  chosen_spanish: Alegraos
  alternatives_spanish:
  - Gozaos
  - Regocijaos
  lexicon: BDAG
  rationale: El infinitivo presente funciona con fuerza imperativa en este contexto exhortativo. En español, el imperativo plural comunica mejor esa exhortación. 'Alegraos' conserva el campo semántico de χαίρω y suena natural y digno en español contemporáneo.
- source_word: μετὰ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - entre
  - junto con
  lexicon: BDAG
  rationale: Con genitivo, μετά expresa asociación o compañía. 'Con' es la equivalencia natural y precisa en español para esta relación de acompañamiento.
- source_word: χαιρόντων
  english_pob_choice: those who rejoice
  chosen_spanish: los que se alegran
  alternatives_spanish:
  - los que están alegres
  - los que se regocijan
  lexicon: BDAG
  rationale: El participio presente genitivo plural funciona sustantivamente después de μετά. 'Los que se alegran' mantiene el sentido verbal y el paralelismo con la segunda mitad del versículo sin volverlo rígido.
- source_word: κλαίειν
  english_pob_choice: weep
  chosen_spanish: llorad
  alternatives_spanish:
  - plañid
  - lamentaos
  lexicon: BDAG
  rationale: El infinitivo presente también tiene fuerza imperativa. 'Llorad' reproduce el valor de κλαίω como derramar lágrimas o llorar en duelo, y empareja bien con 'Alegraos' en estilo y ritmo.
- source_word: κλαιόντων
  english_pob_choice: those who weep
  chosen_spanish: los que lloran
  alternatives_spanish:
  - los que están llorando
  - los que se lamentan
  lexicon: BDAG
  rationale: El participio presente genitivo plural se vierte naturalmente como 'los que lloran'. Esta opción preserva la paralelidad con 'los que se alegran' y no introduce una intensificación que el griego no exige.
theological_decisions:
- issue: Fuerza exhortativa de los infinitivos
  english_pob_reading: Render both infinitives as English imperatives ('Rejoice...; weep...')
  chosen_spanish_reading: Traducir ambos infinitivos como imperativos españoles ('Alegraos...; llorad...')
  alternative_spanish_readings:
  - Alegraos con los que se alegran; llorar con los que lloran
  - Alegraos con los que se alegran; para llorar con los que lloran
  rationale: Aunque el griego usa infinitivos, aquí funcionan como instrucciones dentro de una serie paraenética. El imperativo plural en español transmite con naturalidad esa función exhortativa sin añadir contenido doctrinal ni suavizar la fuerza del mandato.
  doctrine_reference: Romanos 12:9–21; filosofía de equivalencia óptima; exhortación ética comunitaria
- issue: Registro emocional del segundo verbo
  english_pob_reading: weep
  chosen_spanish_reading: llorad / lloran
  alternative_spanish_readings:
  - lamentaos / se lamentan
  - plañid / plañen
  rationale: '''Llorar'' conserva el valor afectivo y audible de κλαίω mejor que ''lamentar'', que en español puede sonar más abstracto. Además, mantiene el paralelismo léxico con la primera cláusula y evita un cambio de registro innecesario.'
  doctrine_reference: BDAG para κλαίω; coherencia estilística y semántica
- issue: Compasión solidaria como norma cristiana
  english_pob_reading: Rejoice with those who rejoice; weep with those who weep
  chosen_spanish_reading: Alegraos con los que se alegran; llorad con los que lloran
  alternative_spanish_readings:
  - Gozaos con los que gozan; llorad con los que lloran
  - Regocijaos con los que se regocijan; llorad con los que lloran
  rationale: La formulación elegida conserva la simetría y la solidaridad comunitaria del texto griego. No se requiere intensificar ni moralizar el verso más allá de su exhortación directa.
  doctrine_reference: Ética del cuerpo de Cristo en Romanos 12
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran alta concordancia y ninguna revisión aplicada. La versión española sigue esa misma lectura estable: infinitivos exhortativos vertidos como imperativos, y participios plurales sustantivados traducidos con paralelismo natural en español.'
  spanish_consistency_notes:
  - Se prefirió 'Alegraos' y 'llorad' para conservar el valor exhortativo directo del griego en este contexto paraenético.
  - Se evitó 'Cristo'/'Mesías' y otras terminologías no presentes en el versículo.
  - '''Con'' traduce μετά con genitivo por asociación/compañía, no por mera ubicación.'
  - La nota a pie de página ofrece una alternativa más formal sin alterar el sentido base.
