review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del audit trail inglés: armonía mutua, rechazo de lo elevado, asociación con los humildes, y advertencia contra la autosabiduría. Sin embargo, dos elecciones españolas no son las más fieles ni naturales. «Acompáñense con» no suena idiomático en español bíblico actual y debilita el valor de asociación/identificación de συναπαγόμενοι. Además, la nota [a] está anclada en «unos para con otros», pero su contenido explica la cláusula «μὴ τὰ ὑψηλὰ φρονοῦντες»; el anclaje debe moverse al segmento correspondiente.'
  spanish_quality_summary: El texto es generalmente legible y digno, pero «acompáñense con los humildes» resulta poco natural; «asóciense con los humildes» lee mejor y refleja mejor la revisión inglesa documentada. «Tengan el mismo sentir unos para con otros» es aceptable, aunque algo tradicional; funciona bien en un registro eclesial amplio. «No pongan su mira en las cosas altas» y «No se vuelvan sabios ante sus propios ojos» son claros y fieles.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones clave concuerdan en general con el audit trail: «el mismo sentir», «las cosas altas», «los humildes», «no se vuelvan», «sabios ante sus propios ojos». La principal corrección es léxica/estilística en συναπαγόμενοι -> «asóciense con», en línea con la revisión aprobada del inglés.'
  issues:
