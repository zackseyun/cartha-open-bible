translation:
  language: es
  text: Tengan el mismo sentir unos para con otros; no pongan su mira en las cosas altas[a], sino asóciense con los humildes[b]. No se vuelvan sabios ante sus propios ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no aspiren a cosas elevadas» o «no sean altivos».
    reason: lexical_alternative
  - marker: b
    text: O «asóciense con lo humilde»; el griego puede referirse tanto a personas humildes como a cosas humildes.
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ αὐτὸ ... φρονοῦντες
  english_pob_choice: Be of the same mind
  chosen_spanish: Tengan el mismo sentir
  alternatives_spanish:
  - Piensen lo mismo
  - Tengan la misma manera de pensar
  lexicon: BDAG
  rationale: La expresión griega indica una disposición compartida y armonía relacional, más que simple coincidencia intelectual. «Tengan el mismo sentir» conserva el valor exhortativo y comunitario en un español natural y bíblico.
- source_word: εἰς ἀλλήλους
  english_pob_choice: toward one another
  chosen_spanish: unos para con otros
  alternatives_spanish:
  - entre sí
  - unos con otros
  lexicon: BDAG
  rationale: La preposición con ἀλλήλους apunta a la orientación interpersonal dentro de la comunidad. «Unos para con otros» expresa bien esa dirección relacional sin sonar forzado.
- source_word: μὴ τὰ ὑψηλὰ φρονοῦντες
  english_pob_choice: do not set your mind on high things
  chosen_spanish: no pongan su mira en las cosas altas
  alternatives_spanish:
  - no sean altivos
  - no aspiren a cosas elevadas
  - no tengan en mente cosas altas
  lexicon: BDAG
  rationale: La frase griega es literalmente «no pensando las cosas altas» y puede aludir tanto a orgullo como a aspiración a estatus elevado. «No pongan su mira en las cosas altas» conserva la imagen y deja abierta esa tensión.
- source_word: τοῖς ταπεινοῖς
  english_pob_choice: the lowly
  chosen_spanish: con los humildes
  alternatives_spanish:
  - con los de condición humilde
  - con los bajos
  - con los pobres
  lexicon: BDAG
  rationale: El adjetivo en dativo plural puede referirse a personas humildes/ de baja condición; la traducción española opta por «los humildes» para mantener la ambigüedad entre personas y condición, como hace el audit trail inglés con «the lowly».
- source_word: συναπαγόμενοι
  english_pob_choice: associate with the lowly
  chosen_spanish: acompáñense con
  alternatives_spanish:
  - asóciense con
  - váyanse con
  - déjense llevar con
  lexicon: BDAG
  rationale: El verbo sugiere ir o ser llevados junto con otros. En este contexto, «acompáñense con» comunica la idea de asociación y cercanía de manera natural en español, sin perder el matiz de identificación con los humildes.
- source_word: μὴ γίνεσθε
  english_pob_choice: Do not become
  chosen_spanish: No se vuelvan
  alternatives_spanish:
  - No sean
  - No lleguen a ser
  lexicon: BDAG
  rationale: 'γίνομαι tiene un valor ingresivo/procesual: no es solo un estado, sino el llegar a adoptar esa postura. «No se vuelvan» preserva ese movimiento.'
- source_word: φρόνιμοι παρ’ ἑαυτοῖς
  english_pob_choice: wise in your own sight
  chosen_spanish: sabios ante sus propios ojos
  alternatives_spanish:
  - sabios a su propio juicio
  - sabios en su propia opinión
  - sabios para sí mismos
  lexicon: BDAG
  rationale: La locución expresa autosuficiencia y autoconfianza engañosa. «Ante sus propios ojos» reproduce el idiomático valor de evaluación interna, cercano al inglés auditado y al giro griego.
theological_decisions:
- issue: Tensión entre orgullo interior y aspiración social/elevada en τὰ ὑψηλά / τοῖς ταπεινοῖς
  english_pob_reading: 'The translation preserves Paul''s exhortation broadly: not to orient oneself toward what is socially or pridefully elevated, but to identify with the lowly.'
  chosen_spanish_reading: 'La traducción mantiene la exhortación en sentido amplio: no orientarse hacia lo social o vanidosamente elevado, sino identificarse con los humildes.'
  alternative_spanish_readings:
  - No ser altivos, sino asociarse con los humildes
  - No aspirar a cosas elevadas, sino dedicarse a tareas humildes
  rationale: El griego permite un enfoque de actitud y también de estatus social. La redacción española conserva esa tensión en vez de cerrarla a una sola opción interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail inglés, que prefirió una formulación más natural para συναπαγόμενοι, pasando de una imagen de «ser llevados» a una de asociación. La versión española refleja esa corrección con «acompáñense con». También se preservó la amplitud semántica de τὰ ὑψηλά y τοῖς ταπεινοῖς, sin reducir el versículo a una sola interpretación moral o social.
  spanish_consistency_notes:
  - Se usó «humildes» para mantener la amplitud de τοῖς ταπεινοῖς y alinearlo con el valor de «the lowly» del POB inglés.
  - Se evitó «Cristo» u otra terminología no pertinente; el registro se mantuvo sobrio y comunitario.
  - Se eligió «No se vuelvan» para reflejar el carácter procesual de γίνομαι, siguiendo la lógica del audit trail inglés.
  - Se mantuvo una sintaxis clara y publicable en español, sin eliminar la tensión entre orgullo, estatus y humildad presente en el griego.
