    issue: «Acompáñense con» no es la mejor representación de συναπαγόμενοι.
    rationale: Aunque intenta expresar cercanía, en español actual suena poco idiomático y menos preciso que «asóciense con», que además coincide con la revisión inglesa final documentada para este contexto.
  - severity: medium
