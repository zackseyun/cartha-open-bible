    rationale: La nota explica alternativas para «μὴ τὰ ὑψηλὰ φρονοῦντες» («no aspiren a cosas elevadas» / «no sean altivos»), no para «Tengan el mismo sentir unos para con otros». Debe colocarse junto a «las cosas altas» o a toda esa cláusula.
  - severity: low
