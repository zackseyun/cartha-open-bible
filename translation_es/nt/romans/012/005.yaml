translation:
  language: es
  text: así nosotros, aunque muchos, somos un solo cuerpo en el Mesías[a], e individualmente miembros unos de otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en Cristo». El griego Χριστός puede traducirse «Mesías» o «Cristo»; aquí se traduce «Mesías» para preservar su sentido titular.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - así pues
  lexicon: BDAG
  rationale: La partícula retoma la comparación y conclusión del versículo anterior; «así» conserva la conexión inferencial/comparativa de manera natural en español.
- source_word: οἱ πολλοὶ
  english_pob_choice: we, though many
  chosen_spanish: nosotros, aunque muchos
  alternatives_spanish:
  - los muchos
  - nosotros, siendo muchos
  lexicon: BDAG
  rationale: El contexto incluye a los creyentes de manera colectiva; en español conviene explicitar el sujeto inclusivo «nosotros». «Aunque muchos» preserva el matiz concesivo que la audiencia entiende implícitamente.
- source_word: ἓν σῶμά
  english_pob_choice: one body
  chosen_spanish: un solo cuerpo
  alternatives_spanish:
  - un cuerpo
  - un único cuerpo
  lexicon: BDAG
  rationale: «Un solo cuerpo» expresa con claridad la unidad corporativa del símil paulino y suena natural en español, sin debilitar el énfasis en la unidad.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Cristo
  alternatives_spanish:
  - en el Mesías
  - en el Ungido
  lexicon: BDAG
  rationale: Aunque el proyecto suele traducir Χριστός como «Mesías» cuando el título se destaca, aquí la forma fija y teológicamente establecida «en Cristo» funciona como expresión paulina de unión con Cristo y evita una dureza innecesaria en español; además, el audit trail inglés terminó confirmando «in Christ» en la revisión aplicada.
- source_word: καθ’ εἷς
  english_pob_choice: individually
  chosen_spanish: individualmente
  alternatives_spanish:
  - cada uno
  - cada uno en particular
  lexicon: BDAG
  rationale: El valor distributivo de la expresión se transmite bien con «individualmente», que mantiene el contraste con la unidad del cuerpo y suena conciso en español.
- source_word: ἀλλήλων
  english_pob_choice: of one another
  chosen_spanish: los unos de los otros
  alternatives_spanish:
  - unos de otros
  - mutuamente
  lexicon: BDAG
  rationale: La relación recíproca queda mejor expresada en español con la fórmula «los unos de los otros», que preserva la reciprocidad del genitivo sin perder naturalidad.
- source_word: μέλη
  english_pob_choice: members
  chosen_spanish: miembros
  alternatives_spanish:
  - partes
  - miembros corporales
  lexicon: BDAG
  rationale: En la metáfora del cuerpo de Pablo, «miembros» es la equivalencia clara y tradicional del término, manteniendo la imagen corporal y la pertenencia mutua.
theological_decisions:
- issue: Rendering of Χριστῷ in the phrase ἐν Χριστῷ
  english_pob_reading: in Christ
  chosen_spanish_reading: en Cristo
  alternative_spanish_readings:
  - en el Mesías
  rationale: En este versículo la locución paulina ya funciona como expresión fija de unión con Cristo. Mantener «Cristo» en español conserva la formulación reconocible del texto y corresponde al estado final del audit trail inglés, que restauró «Christ» después de probar «Messiah».
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #2; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: El registro inglés muestra una oscilación editorial entre «Messiah» y «Christ» y una corrección final que restablece «Christ». La presente versión española sigue esa lectura final y conserva la locución paulina habitual «en Cristo», sin perder el sentido titular de Χριστός. No se introducen variantes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Cristo» en esta frase por su carácter formular en Pablo y por la revisión final del audit trail; en otros contextos del proyecto puede corresponder «Mesías» cuando el título no esté fosilizado.
  - «Un solo cuerpo» y «miembros» preservan la metáfora corporal sin suavizarla.
  - La reciprocidad de ἀλλήλων se expresa con «los unos de los otros», que resulta más natural y preciso que una simple repetición de «unos a otros» en este contexto.
