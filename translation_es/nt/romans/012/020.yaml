translation:
  language: es
  text: Pero si tu enemigo tiene hambre, aliméntalo; si tiene sed, dale de beber; pues al hacer esto amontonarás brasas de fuego[a] sobre su cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carbones de fuego». La imagen se conserva sin decidir en el texto principal si apunta a vergüenza que lleva al arrepentimiento, convicción moral dolorosa o juicio inminente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ ἐὰν
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Mas si
  - Pero cuando
  lexicon: BDAG
  rationale: ἀλλά marca contraste con la prohibición anterior, y ἐάν introduce una condición. «Pero si» conserva ese valor adversativo de manera natural en español.
- source_word: πεινᾷ
  english_pob_choice: is hungry
  chosen_spanish: tiene hambre
  alternatives_spanish:
  - está hambriento
  - hambrea
  lexicon: BDAG
  rationale: En español actual, «tiene hambre» comunica con claridad el estado de necesidad sin sonar forzado; mantiene el sentido idiomático del condicional.
- source_word: ὁ ἐχθρός σου
  english_pob_choice: your enemy
  chosen_spanish: tu enemigo
  alternatives_spanish:
  - el enemigo tuyo
  - el enemigo de ti
  lexicon: BDAG
  rationale: La construcción singular posesiva se vierte naturalmente como «tu enemigo», preservando el singular y el matiz personal.
- source_word: ψώμιζε
  english_pob_choice: feed him
  chosen_spanish: aliméntalo
  alternatives_spanish:
  - dale de comer
  - dale alimento
  lexicon: BDAG
  rationale: El verbo implica dar alimento; «aliméntalo» es breve, claro y suficientemente concreto para el mandato.
- source_word: διψᾷ
  english_pob_choice: is thirsty
  chosen_spanish: tiene sed
  alternatives_spanish:
  - está sediento
  - sedienta
  lexicon: BDAG
  rationale: Como con πεινᾷ, «tiene sed» es la forma más natural y idiomática en español.
- source_word: πότιζε
  english_pob_choice: give him something to drink
  chosen_spanish: dale de beber
  alternatives_spanish:
  - dále bebida
  - dale agua
  lexicon: BDAG
  rationale: ποτίζω significa dar de beber; «dale de beber» conserva la acción sin precisar indebidamente el tipo de bebida.
- source_word: ἄνθρακας πυρὸς
  english_pob_choice: burning coals
  chosen_spanish: brasas de fuego
  alternatives_spanish:
  - carbones encendidos
  - carbones de fuego
  lexicon: BDAG
  rationale: La imagen literal es «carbones/brasas de fuego». «Brasas de fuego» mantiene el valor metafórico y evita una expresión demasiado técnica o arcaica; se deja la metáfora intacta.
- source_word: σωρεύσεις
  english_pob_choice: you will heap
  chosen_spanish: amontonarás
  alternatives_spanish:
  - apilarás
  - acumularás
  lexicon: BDAG
  rationale: El futuro activo expresa una acción de acumular sobre la cabeza; «amontonarás» comunica bien la imagen de apilamiento metafórico en español.
- source_word: ἐπὶ τὴν κεφαλὴν αὐτοῦ
  english_pob_choice: on his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - encima de su cabeza
  - en su cabeza
  lexicon: BDAG
  rationale: «Sobre su cabeza» reproduce la preposición y conserva la concreción de la imagen.
theological_decisions:
- issue: Sentido de «brasas de fuego» sobre la cabeza
  english_pob_reading: Retain the metaphor without interpreting it in the main text.
  chosen_spanish_reading: Mantener la metáfora sin resolver en el texto principal si alude a vergüenza, arrepentimiento, convicción moral o juicio.
  alternative_spanish_readings:
  - imagen de vergüenza que conduce al arrepentimiento
  - imagen de juicio divino sobre el enemigo
  - imagen de convicción moral dolorosa
  rationale: La expresión es metafórica y discutida. La versión española conserva la imagen sin explicarla en el cuerpo del texto para no borrar la tensión interpretativa documentada.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no hay cambios pendientes relevantes en el texto fuente ni en la lectura inglesa auditada; se mantiene la metáfora y la equivalencia óptima sin reinterpretación doctrinal.'
  spanish_consistency_notes:
  - Se usa «tú/tu» de forma consistente con el singular del griego.
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - Se conserva el imperativo directo en segunda persona singular, coherente con el tono exhortativo del pasaje.
  - «Brasas de fuego» mantiene la imagen sin sustituirla por una explicación interpretativa en el texto principal.
