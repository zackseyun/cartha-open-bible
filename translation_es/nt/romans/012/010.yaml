translation:
  language: es
  text: Ténganse amor fraternal[a]; sean afectuosos unos con otros; en cuanto al honor, dense preferencia unos a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "amor de hermanos".'
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλαδελφίᾳ
  english_pob_choice: brotherly love
  chosen_spanish: amor fraternal
  alternatives_spanish:
  - amor entre hermanos
  - amor de familia
  - amor por los hermanos en la fe
  lexicon: BDAG
  rationale: El sustantivo expresa amor propio de vínculos de hermandad o familia. 'Amor fraternal' conserva bien esa imagen relacional y suena natural en español bíblico sin volverlo genérico.
- source_word: εἰς ἀλλήλους
  english_pob_choice: toward one another
  chosen_spanish: unos con otros
  alternatives_spanish:
  - entre sí
  - los unos a los otros
  - mutuamente
  lexicon: BDAG
  rationale: La expresión marca reciprocidad y dirección relacional. 'Unos con otros' es idiomático en español y transmite la relación mutua sin sobrecargar la frase.
- source_word: φιλόστοργοι
  english_pob_choice: be affectionate
  chosen_spanish: sean afectuosos
  alternatives_spanish:
  - sean tiernos
  - sean entrañables
  - sean llenos de cariño
  lexicon: BDAG
  rationale: El adjetivo apunta a afecto cálido, de tipo familiar. 'Afectuosos' preserva esa calidez de manera clara y sobria; evita suavizarlo demasiado con solo 'devotos'.
- source_word: τιμῇ
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - estima
  - respeto
  - valor
  lexicon: BDAG
  rationale: '''Honor'' es la equivalencia más directa para τιμή en este contexto ético y conserva el peso social y moral del término griego.'
- source_word: προηγούμενοι
  english_pob_choice: give preference to / take the lead in honoring
  chosen_spanish: dénse preferencia
  alternatives_spanish:
  - tomen la iniciativa en honrarse
  - se adelanten en honrarse
  - prefiéranse unos a otros
  lexicon: BDAG
  rationale: El participio puede comunicar tomar la iniciativa o dar preferencia. En español, 'dénse preferencia' recoge esa idea de manera natural y deja abierta la dimensión competitiva-benéfica de honrar al otro.
theological_decisions:
- issue: Tono de afecto familiar en la exhortación
  english_pob_reading: The verse preserves family-affection language ('brotherly love,' 'be affectionate') rather than generalizing it.
  chosen_spanish_reading: Se conserva el lenguaje de familia con 'amor fraternal' y 'afectuosos'.
  alternative_spanish_readings:
  - amor mutuo / sean amables
  - amor entre creyentes / sean atentos
  rationale: El griego usa dos términos de afecto familiar en serie. La traducción mantiene esa textura para no diluir la fuerza de la imagen comunitaria.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Sentido de προηγούμενοι en relación con el honor
  english_pob_reading: The English audit preserves the alternative 'give preference to one another' and notes the sense of taking the lead in honoring one another.
  chosen_spanish_reading: La traducción principal usa 'dénse preferencia unos a otros', que refleja la iniciativa en el honor mutuo.
  alternative_spanish_readings:
  - háganse pasar adelante unos a otros en honor
  - tomen la delantera en honrarse unos a otros
  - sobresálganse en honrar a los demás
  rationale: El griego admite el matiz de iniciativa o preferencia recíproca. En español conviene una formulación que no cierre la ambigüedad, pero que sí exprese el impulso activo de poner al otro por delante.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés, pero adapta la segunda cláusula al español natural: el inglés revisó la idea hacia ''give preference to one another'', y aquí se refleja con ''dénse preferencia unos a otros'', manteniendo también la posibilidad semántica de iniciativa en el honor.'
  spanish_consistency_notes:
  - Se mantuvo 'amor fraternal' para φιλαδελφίᾳ y no 'amor entre creyentes' para conservar la imagen familiar.
  - '''Afectuosos'' traduce el matiz cálido de φιλόστοργοι sin volverlo solo administrativo o devocional.'
  - '''Honor'' se conservó como término técnico-ético coherente con el uso bíblico de τιμή.'
  - La forma reflexiva 'dénse' ayuda a expresar reciprocidad y evita un tono demasiado imperativo directo.
