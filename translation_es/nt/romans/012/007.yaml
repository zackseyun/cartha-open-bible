translation:
  language: es
  text: si servicio[a], en el servicio; si el que enseña, en la enseñanza[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ministerio». El griego διακονία puede significar «servicio» o «ministerio», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «el maestro».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴτε
  english_pob_choice: if
  chosen_spanish: si es
  alternatives_spanish:
  - si
  - sea que
  lexicon: BDAG
  rationale: En esta construcción el griego introduce miembros paralelos de una lista funcional. En español, «si es» conserva la concisión condicional sin volver la frase pesada o demasiado formal.
- source_word: διακονίαν
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - ministerio
  - servir
  lexicon: BDAG
  rationale: «Servicio» preserva la amplitud semántica de διακονία sin forzar un sentido eclesiástico técnico. En este contexto, la repetición con el sustantivo siguiente se entiende naturalmente en español.
- source_word: ἐν τῇ διακονίᾳ
  english_pob_choice: in service
  chosen_spanish: en servicio
  alternatives_spanish:
  - en ministerio
  - sirviendo
  lexicon: BDAG
  rationale: La repetición del sustantivo con ἐν tiene fuerza idiomática y exhortativa. «En servicio» reproduce esa brevedad y mantiene el paralelismo con la primera mención.
- source_word: ὁ διδάσκων
  english_pob_choice: the one teaching
  chosen_spanish: el que enseña
  alternatives_spanish:
  - el maestro
  - quien enseña
  lexicon: BDAG
  rationale: El participio sustantivado conserva mejor el aspecto funcional/activo que un título fijo. «El que enseña» refleja esa forma sin institucionalizarla como oficio.
- source_word: διδασκαλίᾳ
  english_pob_choice: teaching
  chosen_spanish: enseñanza
  alternatives_spanish:
  - instrucción
  - doctrina
  lexicon: BDAG
  rationale: «Enseñanza» es la forma más natural y directa en español para la actividad denotada por διδασκαλία aquí. «Doctrina» sería más técnico y podría estrechar indebidamente el sentido.
theological_decisions:
- issue: Si διακονία debe sonar como ministerio eclesial o como servicio general
  english_pob_reading: service
  chosen_spanish_reading: servicio
  alternative_spanish_readings:
  - ministerio
  rationale: La lista de dones/funciones requiere un término amplio que no introduzca una estructura eclesiástica específica que el griego no exige. «Servicio» mantiene la apertura semántica que la nota inglesa quiso preservar.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Si ὁ διδάσκων debe convertirse en un título de cargo
  english_pob_reading: the one teaching
  chosen_spanish_reading: el que enseña
  alternative_spanish_readings:
  - el maestro
  rationale: El participio griego enfatiza a la persona en la acción de enseñar. La versión española conserva ese énfasis y evita leer un título institucional donde el texto presenta una función.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El pasaje coincide con el estado más reciente del expediente en que no se requirieron cambios; la redacción española sigue el mismo criterio de paralelismo breve y las mismas decisiones léxicas principales del audit trail inglés, ajustadas a una formulación natural en español.
  spanish_consistency_notes:
  - Se mantuvo la repetición de «en servicio» para reflejar la estructura paralela del griego.
  - Se evitó «ministerio» como elección principal para no fijar un sentido eclesiástico más estrecho que el contexto no obliga a leer.
  - «El que enseña» conserva mejor que «el maestro» la fuerza del participio sustantivado.
  - Se eligió «enseñanza» para διδασκαλία por claridad y naturalidad en español, sin tecnicismo innecesario.
