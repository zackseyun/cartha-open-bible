translation:
  language: es
  text: Saluden a María[a], que ha trabajado muy duro por ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «por nosotros» o «entre ustedes» en lugar de «por ustedes».
    reason: textual_variant
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Dense saludos a
  - Reciban con saludo a
  lexicon: BDAG
  rationale: El imperativo aoristo medio plural se usa aquí epistolarmente para transmitir saludos. En español, «saluden» conserva la función exhortativa breve y natural sin expandir innecesariamente el sentido.
- source_word: Μαριάμ
  english_pob_choice: Mary
  chosen_spanish: María
  alternatives_spanish:
  - Mariam
  lexicon: BDAG
  rationale: El nombre propio se vierte con la forma española convencional «María», que corresponde al uso establecido de Μαριάμ y resulta más inteligible para el lector hispanohablante.
- source_word: ἥτις
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  - quien
  lexicon: BDAG
  rationale: La relativa introduce una cláusula descriptiva sobre María. En español, «que» expresa de modo natural la relación sin forzar una matización adicional que el contexto no exige de forma explícita.
- source_word: πολλὰ ἐκοπίασεν
  english_pob_choice: has worked very hard
  chosen_spanish: ha trabajado mucho
  alternatives_spanish:
  - ha trabajado duramente
  - ha laborado mucho
  - se ha esforzado mucho
  lexicon: BDAG
  rationale: πολλὰ intensifica el verbo κοπιάω, que denota trabajo fatigoso o esforzado. «Ha trabajado mucho» conserva la idea de labor intensa de manera idiomática en español; el adverbio «mucho» refleja la intensidad sin cargar el texto con un calco rígido.
- source_word: εἰς ὑμᾶς
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - para ustedes
  - en favor de ustedes
  - entre ustedes
  lexicon: BDAG
  rationale: La preposición εἰς con personas puede indicar dirección o beneficio. Dado el contexto de servicio, «por ustedes» comunica bien el beneficio en favor de los destinatarios y evita ambigüedad de destino físico. Como la lectura base del griego es textual, no se impone una glosa explicativa en el texto principal.
theological_decisions:
- issue: Valor de εἰς ὑμᾶς en la frase final
  english_pob_reading: for you
  chosen_spanish_reading: por ustedes
  alternative_spanish_readings:
  - para ustedes
  - entre ustedes
  - por nosotros
  rationale: Se sigue el texto griego proporcionado (εἰς ὑμᾶς) y se expresa su sentido de beneficio/dirección hacia los destinatarios. La variante «por nosotros» queda reconocida como alternativa textual en la nota, pero no se incorpora al cuerpo principal porque no corresponde al texto base entregado.
  doctrine_reference: Primacía del original y preservación de variantes textuales significativas
- issue: Tono exhortativo de ἀσπάσασθε en una salutación
  english_pob_reading: Greet Mary
  chosen_spanish_reading: Saluden a María
  alternative_spanish_readings:
  - Dense saludos a María
  - Reciban con saludo a María
  rationale: En el género epistolar, el imperativo no pide una acción física de encuentro, sino transmitir saludos. «Saluden a María» mantiene ese valor comunicativo con naturalidad en español y sin sobrerinterpretar el verbo.
  doctrine_reference: Convenciones epistolares del Nuevo Testamento y claridad idiomática
translation_notes:
  revision_awareness: 'Se mantuvo la lectura base del griego SBLGNT provisto y el tratamiento auditado del inglés POB: saludo epistolar breve, nombre propio en forma española convencional, relativa descriptiva simple e intensidad de κοπιάω expresada idiomáticamente. No se introdujeron cambios respecto al contenido fuente; solo se ajustó la formulación para el español natural y la nota textual para reflejar la variante documentada.'
  spanish_consistency_notes:
  - Se usó «María» como forma española estándar de Μαριάμ, coherente con la práctica bíblica hispanohablante y con el criterio de transliteración convencional.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que el versículo no contiene vocabulario divino.
  - «Por ustedes» refleja el beneficio hacia los destinatarios y mantiene la transparencia respecto a la base griega; la nota a pie de página preserva la variante textual documentada.
  - El registro es sobrio y apto para lectura pública, sin arcaísmos innecesarios.
