review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: una exhortación pastoral a identificar a quienes causan divisiones y tropiezos contrarios a la enseñanza recibida, y a apartarse de ellos. Se preservan adecuadamente Παρακαλῶ, ἀδελφοί, διχοστασίας, διδαχήν, ἐμάθετε y ἐκκλίνετε ἀπ’ αὐτῶν. La principal desviación está en el anclaje de la nota [a]: se coloca sobre «ruego» pero su contenido corresponde a «hermanos». Además, «tropiezos» es aceptable, pero el inglés POB preserva explícitamente la imagen de ‘stumbling blocks’; en español conviene mantenerla más claramente en el texto principal.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. Sin embargo, la colocación errónea de la nota [a] afecta la presentación. También «vigilen a» puede sonar levemente ambiguo entre ‘supervisar’ y ‘estar en guardia contra’; «estén atentos a» o «vigilen a» ambos funcionan, pero no exigen corrección. La mejora principal de calidad y fidelidad es cambiar «tropiezos» por «piedras de tropiezo», que comunica mejor la metáfora causal del griego sin necesidad de nota explicativa adicional.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Hermanos» sigue la política documentada para ἀδελφοί con nota inclusiva. «Enseñanza» para διδαχή y «aléjense de ellos» para ἐκκλίνετε están bien alineados. La revisión propuesta fortalece la correspondencia con σκάνδαλα como ‘piedras de tropiezo’.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «ruego» pero explica «hermanos».
    rationale: Los marcadores de nota deben aparecer exactamente en la palabra o frase pertinente. Aquí la nota trata el vocativo ἀδελφοί, no Παρακαλῶ.
  - severity: medium
    issue: «Tropiezos» debilita la imagen de σκάνδαλα como causa de caída.
    rationale: El POB inglés escogió ‘stumbling blocks’ precisamente para preservar la metáfora. En español, «piedras de tropiezo» la conserva con más precisión que «tropiezos», que puede referirse al acto o resultado de tropezar.
  - severity: low
    issue: La nota [b] se vuelve innecesaria si el texto principal ya dice «piedras de tropiezo».
    rationale: La nota actual solo explica una imagen que puede expresarse directamente en el texto principal con buena naturalidad.
  revised_spanish_text: Ahora les ruego, hermanos[a], que vigilen a los que causan divisiones y piedras de tropiezo contra la enseñanza que ustedes aprendieron, y aléjense de ellos.
  revised_footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y probablemente se dirige a toda la congregación.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota inclusiva al término correcto («hermanos») para cumplir la disciplina de anclaje de notas. Se sustituye «tropiezos» por «piedras de tropiezo» para preservar mejor la metáfora de σκάνδαλα, en línea con la decisión léxica documentada del POB inglés. Se elimina la nota [b] porque ya no aporta información necesaria una vez que la imagen queda en el texto principal.
