translation:
  language: es
  text: Ahora les ruego, hermanos[a], que vigilen a los que causan divisiones y piedras de tropiezo contra la enseñanza que ustedes aprendieron, y aléjense de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y probablemente se dirige a toda la congregación.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: les ruego
  alternatives_spanish:
  - les exhorto
  - les insto
  lexicon: BDAG
  rationale: παρακαλέω expresa una apelación pastoral intensa. «Les ruego» comunica bien esa súplica urgente en español sin sonar forzado ni excesivamente técnico.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - amados hermanos
  lexicon: BDAG
  rationale: Se mantiene el vocativo masculino plural como en el griego. En este contexto paulino, «hermanos» puede dirigirse a toda la congregación; la posible inclusión de mujeres se explica en nota, no en el texto principal.
- source_word: σκοπεῖν
  english_pob_choice: to watch out for
  chosen_spanish: que vigilen
  alternatives_spanish:
  - que estén atentos a
  - que observen cuidadosamente
  lexicon: BDAG
  rationale: El infinitivo con valor de exhortación pide una idea de atención alerta. «Vigilen» transmite bien la advertencia y la cautela frente a esas personas.
- source_word: διχοστασίας
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - disensiones
  - facciones
  lexicon: BDAG
  rationale: «Divisiones» es la equivalencia más natural y clara en español para conflictos que fragmentan a la comunidad.
- source_word: σκάνδαλα
  english_pob_choice: stumbling blocks
  chosen_spanish: tropiezos
  alternatives_spanish:
  - piedras de tropiezo
  - escándalos
  lexicon: BDAG
  rationale: Aunque la imagen literal es la de un obstáculo que hace caer, en español «tropiezos» conserva la metáfora sin sonar demasiado pesado. «Piedras de tropiezo» es posible, pero más largo.
- source_word: παρὰ τὴν διδαχήν
  english_pob_choice: contrary to the teaching
  chosen_spanish: contra la enseñanza
  alternatives_spanish:
  - en contra de la enseñanza
  - contrariamente a la enseñanza
  lexicon: BDAG
  rationale: La preposición παρά con acusativo indica oposición o desviación respecto de la norma recibida. «Contra la enseñanza» es natural y conserva esa oposición.
- source_word: διδαχήν
  english_pob_choice: the teaching
  chosen_spanish: la enseñanza
  alternatives_spanish:
  - la doctrina
  - la instrucción
  lexicon: BDAG
  rationale: «Enseñanza» refleja bien la instrucción apostólica recibida y evita un término más técnico como «doctrina» que en español puede sonar más eclesiástico que el griego aquí.
- source_word: ἐμάθετε
  english_pob_choice: you learned
  chosen_spanish: ustedes aprendieron
  alternatives_spanish:
  - ustedes recibieron
  - les fue enseñada
  lexicon: BDAG
  rationale: El aoristo señala una instrucción ya recibida. «Aprendieron» es directo y fiel al sentido básico de μανθάνω.
- source_word: ποιοῦντας
  english_pob_choice: who cause
  chosen_spanish: que causan
  alternatives_spanish:
  - que producen
  - que están haciendo
  lexicon: BDAG
  rationale: El participio en contexto describe a personas que generan divisiones y tropiezos. En español, una relativa explícita con «causan» expresa bien esa agencia.
- source_word: ἐκκλίνετε ἀπ’ αὐτῶν
  english_pob_choice: turn away from them
  chosen_spanish: aléjense de ellos
  alternatives_spanish:
  - apártense de ellos
  - evítenlos
  lexicon: BDAG
  rationale: ἐκκλίνω sugiere apartarse o desviarse de alguien. «Aléjense de ellos» conserva la idea direccional y suena natural en español contemporáneo.
theological_decisions:
- issue: Alcance del vocativo ἀδελφοί en una congregación mixta
  english_pob_reading: Retain 'brothers' in the main text and note likely mixed-gender reference in a footnote.
  chosen_spanish_reading: Mantener «hermanos» en el texto principal y anotar que probablemente abarca a toda la congregación.
  alternative_spanish_readings:
  - hermanos y hermanas
  - amigos
  rationale: Se preserva la forma masculina plural del original y la política de precisión de género. La posible referencia inclusiva se explica en nota sin alterar el texto base.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran un acuerdo alto y sin revisiones aplicadas. La versión española sigue de cerca las decisiones léxicas del POB inglés, manteniendo la advertencia pastoral, la imagen de tropiezo y la orden de apartarse, con una nota de alcance inclusivo para ἀδελφοί.
  spanish_consistency_notes:
  - Se mantiene «enseñanza» para διδαχή en lugar de «doctrina», en coherencia con un español claro y con el audit trail inglés.
  - Se conserva el vocativo «hermanos» y la posible inclusión congregacional queda en nota, siguiendo la política de precisión de género.
  - «Aléjense de ellos» respeta el imperativo plural y la dirección de ἐκκλίνω sin introducir una paráfrasis mayor.
  - Se evita «Cristo/SEÑOR» porque el versículo no contiene cristología ni el nombre divino.
