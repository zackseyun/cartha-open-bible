revisions:
- from: Ahora les ruego[a], hermanos, que vigilen a los que causan divisiones y tropiezos[b] contra la enseñanza que ustedes aprendieron, y aléjense de ellos.
  to: Ahora les ruego, hermanos[a], que vigilen a los que causan divisiones y piedras de tropiezo contra la enseñanza que ustedes aprendieron, y aléjense de ellos.
  rationale: Se reubica la nota inclusiva al término correcto («hermanos») para cumplir la disciplina de anclaje de notas. Se sustituye «tropiezos» por «piedras de tropiezo» para preservar mejor la metáfora de σκάνδαλα, en línea con la decisión léxica documentada del POB inglés. Se elimina la nota [b] porque ya no aporta información necesaria una vez que la imagen queda en el texto principal.
