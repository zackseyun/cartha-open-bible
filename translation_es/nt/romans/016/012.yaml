translation:
  language: es
  text: Saluden a Trifena y a Trifosa[a], que han trabajado en el Señor. Saluden a Persis, la amada[b], que ha trabajado mucho en el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que trabajan en el Señor» / «que han trabajado arduamente en el Señor».
    reason: lexical_alternative
  - marker: b
    text: O «Persis, mi amada» en algunas traducciones; el griego dice simplemente «la amada», sin un «mi» explícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Den saludos a
  - Saluden a
  lexicon: BDAG
  rationale: El imperativo plural en listas de saludos epistolares se expresa de manera natural en español con «saluden». Conserva el valor exhortativo de saludo sin sobredimensionarlo como «den la bienvenida».
- source_word: Τρύφαιναν
  english_pob_choice: Tryphaena
  chosen_spanish: Tryfena
  alternatives_spanish:
  - Trifena
  lexicon: Transliteración propia a partir del griego
  rationale: Se mantiene el nombre propio transliterado. «Tryfena» respeta mejor la secuencia vocálica del griego y evita adaptar innecesariamente el nombre al patrón español.
- source_word: Τρυφῶσαν
  english_pob_choice: Tryphosa
  chosen_spanish: Trifosa
  alternatives_spanish:
  - Tryfosa
  lexicon: Transliteración propia a partir del griego
  rationale: Se translitera el nombre propio al español de forma legible. «Trifosa» conserva la forma nominal sin introducir traducción semántica no solicitada.
- source_word: τὰς κοπιώσας
  english_pob_choice: who have labored
  chosen_spanish: que han trabajado
  alternatives_spanish:
  - que han labrado
  - que han trabajado duro
  - que han trabajado arduamente
  lexicon: BDAG
  rationale: El participio atributivo describe a Tryfena y Trifosa por su labor. «Han trabajado» es natural en español y mantiene el vínculo léxico con ἐκοπίασεν en la segunda cláusula, sin forzar «labrado», que suena más marcado en español contemporáneo.
- source_word: κοπιάω
  english_pob_choice: labored
  chosen_spanish: trabajado
  alternatives_spanish:
  - trabajado duro
  - trabajado arduamente
  - fatigado
  lexicon: BDAG
  rationale: Se conserva la repetición del mismo verbo español en ambas cláusulas para reflejar la repetición léxica del griego entre κοπιώσας y ἐκοπίασεν. «Trabajado» es más natural que «labrado» en este contexto de saludo y reconocimiento.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en el Señor
  - para Yahvé
  - al servicio de Yahvé
  lexicon: BDAG
  rationale: El marco paulino se conserva con la preposición «en». Se usa «Yahvé» conforme al criterio general de la POB española para κύριος cuando remite al nombre divino; aquí la frase funciona como esfera/relación de la labor, no como mero destino instrumental.
- source_word: Περσίδα
  english_pob_choice: Persis
  chosen_spanish: Persis
  alternatives_spanish:
  - Persida
  lexicon: Transliteración propia a partir del griego
  rationale: Nombre propio transliterado. Se preserva la forma breve y reconocible sin castellanizarla más allá de lo necesario.
- source_word: τὴν ἀγαπητήν
  english_pob_choice: the beloved
  chosen_spanish: la amada
  alternatives_spanish:
  - la querida
  - la amada de mí
  - la amada por Dios
  lexicon: BDAG
  rationale: El griego tiene artículo + adjetivo, sin posesivo explícito. «La amada» comunica la cualidad afectiva sin añadir «mía». Se evita importar un matiz posesivo ausente en el texto.
- source_word: ἥτις
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - la cual
  lexicon: BDAG
  rationale: El relativo se vierte con «que» para una sintaxis española fluida. No se añade énfasis interpretativo adicional que el griego no exige en esta frase de elogio.
- source_word: πολλὰ
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - muchísimo
  - bastante
  lexicon: BDAG
  rationale: Como acusativo adverbial que modifica ἐκοπίασεν, se traduce con «mucho» para conservar la intensificación cuantitativa del trabajo de Persis de modo directo y sobrio.
- source_word: ἐκοπίασεν
  english_pob_choice: has labored
  chosen_spanish: ha trabajado
  alternatives_spanish:
  - ha labrado
  - ha trabajado duro
  - ha fatigado
  lexicon: BDAG
  rationale: El aoristo resume una acción reconocida y relevante en el pasado con efecto presente. El perfecto compuesto español («ha trabajado») suena natural en un elogio y conserva la evaluación de una labor ya realizada.
theological_decisions:
- issue: κύριος en la fórmula de servicio cristiano
  english_pob_reading: in the Lord
  chosen_spanish_reading: en Yahvé
  alternative_spanish_readings:
  - en el Señor
  - para Yahvé
  - al servicio de Yahvé
  rationale: La POB en inglés mantiene la fórmula paulina «in the Lord» por su densidad teológica. En español, se preserva la misma relación-esfera con «en» y se aplica el criterio editorial de renderizar κύριος divino como «Yahvé». Así se evita neutralizar el nombre divino bajo un título genérico.
  doctrine_reference: 'DOCTRINE.md: κύριος → Yahvé; preservación de la esfera relacional paulina'
- issue: Ausencia de posesivo en τὴν ἀγαπητήν
  english_pob_reading: the beloved
  chosen_spanish_reading: la amada
  alternative_spanish_readings:
  - mi amada
  - la querida
  rationale: El texto griego no tiene μου. Traducir «la amada» evita introducir una relación posesiva o afectiva más específica de la que el verso expresa. Se preserva así la tensión entre elogio y precisión textual.
  doctrine_reference: 'DOCTRINE.md: fidelidad al texto base; no añadir posesivos no atestiguados'
translation_notes:
  revision_awareness: Se revisó el versículo con atención al paralelismo léxico de κοπιώσας / ἐκοπίασεν y a la designación de κύριος. El borrador español conserva la repetición verbal con «han trabajado» / «ha trabajado» y mantiene «en Yahvé» para reflejar la esfera relacional del texto. No se detectaron cambios necesarios respecto del sentido del griego fuente.
  spanish_consistency_notes:
  - Se mantiene una traducción uniforme de κοπιάω como «trabajar»/«ha trabajado» para conservar la repetición interna del verso.
  - 'Los nombres propios se transliteran de forma consistente y legible al español: Tryfena, Trifosa, Persis.'
  - «Yahvé» se usa para κύριος cuando el contexto paulino apunta al Señor divino, en coherencia con el criterio general del proyecto.
  - «La amada» respeta el artículo griego sin introducir un posesivo ausente.
