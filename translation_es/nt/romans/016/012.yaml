revisions:
- from: Saluden a Tryfena y a Trifosa[a], que han trabajado en Yahvé. Saluden a Persis, la amada[b], que ha trabajado mucho en Yahvé.
  to: Saluden a Trifena y a Trifosa[a], que han trabajado en el Señor. Saluden a Persis, la amada[b], que ha trabajado mucho en el Señor.
  rationale: Se corrige «en Yahvé» a «en el Señor» para reflejar fielmente la fórmula paulina ἐν κυρίῳ en este contexto cristológico. Se unifica la transliteración de los nombres en formas españolas más consistentes y legibles. Se actualizan las notas para que coincidan con el texto corregido y con el rastro de auditoría inglés.
