review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y preserva la repetición de κοπιάω con «trabajado». También mantiene correctamente «la amada» sin añadir un posesivo. Sin embargo, falla en un punto importante de alineación con el sentido paulino y con el rastro de auditoría en inglés: ἐν κυρίῳ aquí debe traducirse «en el Señor», no «en Yahvé». En Romanos, κύριος en esta fórmula cristológica paulina se refiere al Señor Jesús, y el inglés POB documenta explícitamente «in the Lord».'
  spanish_quality_summary: El español es claro y legible. «Saluden a…» funciona bien en una lista epistolar. Hay una inconsistencia de transliteración entre «Tryfena» y «Trifosa»; conviene unificar con formas más naturales para lectores hispanos. Además, las notas al pie repiten el error de «en Yahvé».
  glossary_alignment: 'Se alinea bien con varias decisiones del proyecto: nombres transliterados, «la amada» por τὴν ἀγαπητήν, y repetición léxica para κοπιάω. Pero no se alinea con la excepción contextual requerida para κύριος: aunque el valor por defecto del proyecto favorece «Yahvé» cuando hay referencia al nombre divino, aquí la fórmula paulina ἐν κυρίῳ debe conservarse como «en el Señor».'
  issues:
  - severity: high
    issue: «ἐν κυρίῳ» se tradujo «en Yahvé».
    rationale: En este contexto paulino la expresión fija «en el Señor» se refiere al Señor Cristo, no al nombre divino Yahvé. Traducir «en Yahvé» altera el referente y rompe la decisión lexical/theológica documentada en la auditoría inglesa.
  - severity: medium
    issue: Inconsistencia en la transliteración de Τρύφαιναν / Τρυφῶσαν.
    rationale: El borrador mezcla «Tryfena» y «Trifosa». Conviene uniformar el criterio. En español eclesial legible, «Trifena» y «Trifosa» son naturales y consistentes.
  - severity: low
    issue: Las notas alternativas de [a] conservan «en Yahvé».
    rationale: Deben ajustarse para no perpetuar el mismo error contextual en las alternativas léxicas.
  revised_spanish_text: Saluden a Trifena y a Trifosa[a], que han trabajado en el Señor. Saluden a Persis, la amada[b], que ha trabajado mucho en el Señor.
  revised_footnotes:
  - marker: a
    text: O «que trabajan en el Señor» / «que han trabajado arduamente en el Señor».
    reason: lexical_alternative
  - marker: b
    text: O «Persis, mi amada» en algunas traducciones; el griego dice simplemente «la amada», sin un «mi» explícito.
    reason: lexical_alternative
