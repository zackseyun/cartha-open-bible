translation:
  language: es
  text: al único Dios sabio[a], por medio de Jesús Mesías, a quien sea la gloria para siempre. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo concluye la doxología final (Romanos 16:25–27). Como se señaló en Romanos 16:25, la ubicación y la inclusión de esta doxología varían considerablemente entre los manuscritos antiguos, aunque aquí se conserva en la tradición mayoritaria bizantina.
    reason: textual_critical
lexical_decisions:
- source_word: μόνῳ
  english_pob_choice: only
  chosen_spanish: único
  alternatives_spanish:
  - solo
  - solamente
  lexicon: BDAG
  rationale: El dativo adjetival en μόνῳ σοφῷ θεῷ expresa exclusividad; en español, 'único' comunica mejor esa cualidad sin volver la frase artificiosa. 'Solo' podría leerse como adverbio y crear ambigüedad.
- source_word: σοφῷ
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - sabio y prudente
  - de sabiduría
  lexicon: BDAG
  rationale: '''Sabio'' es la equivalencia natural y fiel para σοφός en este elogio doxológico; conserva el valor atributivo del griego.'
- source_word: θεῷ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: BDAG
  rationale: θεῷ se traduce de forma directa como 'Dios'; el artículo español no es necesario aquí porque el vocativo/dativo ya queda claro por la estructura.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: through Jesus Messiah
  chosen_spanish: por medio de Jesús Mesías
  alternatives_spanish:
  - por Jesús Mesías
  - a través de Jesús Mesías
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación; 'por medio de' mantiene esa relación con claridad. Se conserva 'Mesías' para Χριστός, conforme a la decisión editorial del POB en este pasaje.
- source_word: ᾧ
  english_pob_choice: to whom
  chosen_spanish: a quien
  alternatives_spanish:
  - a Él
  - al cual
  lexicon: BDAG
  rationale: El relativo dativo mantiene la ambigüedad sintáctica del griego respecto del antecedente. 'A quien' preserva esa apertura sin forzar una resolución interpretativa.
- source_word: ἡ δόξα
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - la honra
  - la gloria y honra
  lexicon: BDAG
  rationale: δόξα en doxologías se traduce naturalmente como 'gloria'; es el equivalente más directo y litúrgicamente reconocible en español.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por toda la eternidad
  lexicon: BDAG
  rationale: La expresión idiomática 'εἰς τοὺς αἰῶνας' literalmente significa 'a/para los siglos'; 'por los siglos' conserva la imagen temporal del griego mejor que una paráfrasis más abstracta.
theological_decisions:
- issue: 'Destino del relativo dativo ᾧ: ¿Dios Padre, Jesús Mesías, o ambos por referencia remota?'
  english_pob_reading: to whom be the glory forever
  chosen_spanish_reading: a quien sea la gloria por los siglos
  alternative_spanish_readings:
  - a Él sea la gloria por los siglos
  - al cual sea la gloria por los siglos
  rationale: Como el griego deja una ambigüedad real de antecedente, la traducción debe conservarla. 'A quien' reproduce la forma abierta del texto sin resolverla dogmáticamente en español.
  doctrine_reference: Gramática del relativo dativo en doxología; evitar resolución no justificada por el texto.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó una nota marcada y fijó 'Jesus Messiah' como decisión editorial estable. En español no se añade nota textual porque el paquete recibido no contiene marca de variante anclada en el versículo y la redacción puede mantenerse limpia sin perder datos críticos.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός conforme a la política del proyecto y al contexto del versículo.
  - Se evita 'SEÑOR' porque el texto griego usa θεῷ, no κύριος.
  - La doxología se vierte con español natural y reverente, sin expandir el sentido más allá del griego.
