  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Gayo saluda como anfitrión de Pablo y de toda la iglesia; Erasto es un funcionario cívico; Cuarto es identificado como «el hermano». Sin embargo, hay un problema de anclaje de nota: la nota [a] está puesta sobre «Gayo», pero la variante léxica documentada corresponde a «el tesorero de la ciudad» / «administrador de la ciudad».'
  spanish_quality_summary: El español es generalmente claro, pero «hospedador» suena menos natural y menos ampliamente eclesial que «anfitrión» en español actual. Además, el uso de «Os saluda» es comprensible pero menos neutral latinoamericano; aun así, no es incorrecto. La reparación principal necesaria es mover la nota al lugar correcto y mejorar la naturalidad de «hospedador».
  glossary_alignment: No hay conflicto con la terminología doctrinal del proyecto. «Iglesia», «el hermano» y «tesorero de la ciudad» están alineados con el expediente inglés. La mejor opción española para ξένος aquí es «anfitrión» por naturalidad y claridad, aunque «hospedador» no es imposible.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «Gayo» en vez de en «tesorero de la ciudad».
    rationale: La nota explica una alternativa para οἰκονόμος τῆς πόλεως («administrador de la ciudad»), no para Γάϊος. Según las reglas del proyecto, el marcador debe aparecer exactamente en la palabra o frase relevante.
  - severity: medium
    issue: «Hospedador» es poco natural en español bíblico moderno general.
    rationale: Aunque semánticamente posible, «anfitrión» comunica mejor la idea de ξένος como quien hospeda, con mejor legibilidad para lectores hispanohablantes amplios.
