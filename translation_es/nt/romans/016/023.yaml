translation:
  language: es
  text: Os saluda Gayo, mi anfitrión y anfitrión de toda la iglesia. Os saluda Erasto, el tesorero de la ciudad[a], y Cuarto, el hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el administrador de la ciudad». El término griego puede denotar más ampliamente un funcionario cívico, aunque «tesorero» encaja bien con el cargo municipal probable aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάζεται
  english_pob_choice: greets
  chosen_spanish: os saluda
  alternatives_spanish:
  - os envía saludos
  - os saluda cordialmente
  lexicon: BDAG
  rationale: En saludos paulinos, ἀσπάζεται expresa una fórmula directa de saludo personal. «Os saluda» conserva la naturalidad en español y reproduce el valor epistolar sin añadir intensidad no explicitada por el griego.
- source_word: ξένος
  english_pob_choice: host
  chosen_spanish: hospedador
  alternatives_spanish:
  - anfitrión
  - host
  lexicon: BDAG
  rationale: En este contexto, ξένος describe a quien recibe y aloja a otros. «Hospedador» comunica con claridad la función de hospitalidad sin perder la relación semántica con la acogida; se evita «anfitrión» por su posible matiz social más amplio y menos preciso.
- source_word: ὅλης τῆς ἐκκλησίας
  english_pob_choice: the whole church
  chosen_spanish: toda la iglesia
  alternatives_spanish:
  - toda la congregación
  - toda la asamblea
  lexicon: BDAG
  rationale: ἐκκλησία aquí designa la comunidad cristiana reunida. «Iglesia» es el equivalente natural en español y «toda» preserva el alcance de ὅλης, mostrando la amplitud de la hospitalidad de Gayo.
- source_word: οἰκονόμος τῆς πόλεως
  english_pob_choice: the city treasurer
  chosen_spanish: el tesorero de la ciudad
  alternatives_spanish:
  - el administrador de la ciudad
  - el mayordomo de la ciudad
  lexicon: BDAG
  rationale: οἰκονόμος puede referirse a un administrador o mayordomo, pero en un marco cívico la opción más probable y transparente es un cargo municipal de gestión financiera. «Tesorero» sigue de cerca la decisión inglesa y es claro para el lector español.
- source_word: ἀδελφός
  english_pob_choice: the brother
  chosen_spanish: el hermano
  alternatives_spanish:
  - nuestro hermano
  - un hermano
  lexicon: BDAG
  rationale: El griego tiene artículo y no añade posesivo. «El hermano» preserva la forma del texto y mantiene la referencia a Cuarto como miembro masculino individual de la comunidad cristiana, sin expandir el sentido a «nuestro».
theological_decisions:
- issue: Ἐκκλησία en un saludo final
  english_pob_reading: church
  chosen_spanish_reading: iglesia
  alternative_spanish_readings:
  - asamblea
  - congregación
  rationale: Aunque ἐκκλησία puede traducirse literalmente como «asamblea», en Pablo normalmente designa la comunidad cristiana. «Iglesia» es fiel, natural y no introduce una interpretación eclesiológica ajena al pasaje.
  doctrine_reference: Consistencia terminológica en el NT; traducción readable moderna.
- issue: Tratamiento de ἀδελφός con referente masculino singular
  english_pob_reading: the brother
  chosen_spanish_reading: el hermano
  alternative_spanish_readings:
  - nuestro hermano
  - un hermano
  rationale: La lectura en español conserva el masculino singular del griego y evita neutralizar o ampliar la referencia. Esto sigue la política de exactitud de género cuando el texto identifica a un individuo masculino.
  doctrine_reference: Gender-accurate over gender-neutral.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no cambió el contenido; se mantiene la misma lectura base. En español se resolvió ξένος con una opción más idiomática («hospedador») y οἰκονόμος con el equivalente más transparente («tesorero»), sin alterar las relaciones de sentido del original.
  spanish_consistency_notes:
  - Se mantiene «Iglesia» para ἐκκλησία en coherencia con el uso paulino habitual.
  - Se conserva el artículo en «el hermano» para reflejar el griego sin añadir posesivo.
  - No se introdujo «Cristo» ni terminología litúrgica innecesaria.
  - 'La puntuación separa los saludos como en el griego: dos enunciados sucesivos con nombres propios y cargos descriptivos.'
