translation:
  language: es
  text: Saluden a Filólogo y Julia[a], a Nereo y a su hermana, a Olimpas y a todos los santos que están con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «Julias», si el nombre se toma como masculino; la forma griega suele entenderse como el nombre femenino «Julia».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Den saludos a
  - Saluden a
  lexicon: BDAG
  rationale: El imperativo plural de cortesía epistolar pide un verbo natural en español. «Saluden» conserva el valor de saludo dirigido a varios destinatarios sin sonar rígido ni expandido más allá del original.
- source_word: Φιλόλογον
  english_pob_choice: Philologus
  chosen_spanish: Filólogo
  alternatives_spanish:
  - Filologos
  lexicon: Nombre propio transliterado
  rationale: Se conserva el nombre propio en forma española habitual, ajustando la transliteración griega al uso ortográfico hispano sin alterar la identidad del nombre.
- source_word: Ἰουλίαν
  english_pob_choice: Julia
  chosen_spanish: Julia
  alternatives_spanish:
  - Julias
  lexicon: Nombre propio transliterado
  rationale: La forma griega se entiende de manera más natural como el nombre femenino Julia. Se mantiene la alternativa histórica «Julias» en nota porque la tradición de traducción la ha discutido.
- source_word: Νηρέα
  english_pob_choice: Nereus
  chosen_spanish: Nereo
  alternatives_spanish:
  - Nereo
  lexicon: Nombre propio transliterado
  rationale: Se adapta al equivalente español corriente del nombre propio, manteniendo la referencia personal sin necesidad de calco extranjero en la forma final.
- source_word: τὴν ἀδελφὴν αὐτοῦ
  english_pob_choice: his sister
  chosen_spanish: a su hermana
  alternatives_spanish:
  - a la hermana de él
  - a la hermana suya
  lexicon: BDAG
  rationale: La relación de posesión se expresa de modo natural en español con «su hermana». Se conserva el referente a Nereo sin sobreexplicarlo.
- source_word: Ὀλυμπᾶν
  english_pob_choice: Olympas
  chosen_spanish: Olimpas
  alternatives_spanish:
  - Olimpás
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre propio con ortografía española corriente, conservando su forma personal y evitando una latinización innecesaria.
- source_word: τοὺς σὺν αὐτοῖς
  english_pob_choice: with them
  chosen_spanish: que están con ellos
  alternatives_spanish:
  - con ellos
  - en compañía de ellos
  lexicon: BDAG
  rationale: En español, «que están con ellos» reproduce de forma clara la relación de asociación del griego σύν con dativo, manteniendo el sentido relacional sin dureza literal.
- source_word: πάντας ἁγίους
  english_pob_choice: all the saints
  chosen_spanish: a todos los santos
  alternatives_spanish:
  - a todos los santos de Dios
  - a todos los creyentes
  lexicon: BDAG
  rationale: «Santos» conserva el uso paulino establecido para los creyentes, y evita sustituirlo por una paráfrasis que diluya el término técnico eclesial del original.
theological_decisions:
- issue: Sentido de ἅγιοι en una lista de saludos paulina
  english_pob_reading: saints
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los santos de Dios
  - los creyentes
  rationale: En este contexto el término designa a los creyentes, no a una categoría posterior de canonización. «Los santos» mantiene la designación paulina común y la referencia eclesial directa.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Posible lectura alternativa del nombre Ἰουλίαν
  english_pob_reading: Julia
  chosen_spanish_reading: Julia
  alternative_spanish_readings:
  - Julias
  rationale: La lectura femenina es la más natural en la forma griega y en el contexto de saludos personales. Se conserva la alternativa en nota para no ocultar la tensión onomástica documentada.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: El paquete fuente muestra acuerdo alto y no registra revisiones aplicadas; por eso el borrador español sigue de cerca la lectura principal auditada, conservando únicamente la nota onomástica que el POB inglés ya documenta para Ἰουλίαν.
  spanish_consistency_notes:
  - Se usa «Filólogo», «Nereo» y «Olimpas» con adaptación ortográfica española uniforme de nombres propios.
  - Se mantiene «santos» para ἅγιοι por coherencia con el uso paulino y con la decisión inglesa auditada.
  - La cláusula relativa «que están con ellos» conserva en español la relación de asociación del griego σύν con dativo sin añadir elementos no presentes en el texto.
