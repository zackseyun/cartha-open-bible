translation:
  language: es
  text: Saluden a Prisca[a] y a Aquila, mis colaboradores en Mesías Jesús[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Priscila es la forma más familiar usada en otras partes para la misma persona; aquí el griego tiene la forma formal Prisca.
    reason: alternative_reading
  - marker: b
    text: O «en Cristo Jesús».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Dense saludos a
  - Saluden a
  lexicon: BDAG
  rationale: El imperativo plural de saludo epistolar se expresa con naturalidad en español con «Saluden a». Mantiene el valor de instrucción breve y directa sin añadir contenido.
- source_word: Πρίσκαν
  english_pob_choice: Prisca
  chosen_spanish: Priscila
  alternatives_spanish:
  - Prisca
  lexicon: BDAG
  rationale: Aunque el griego presenta la forma formal Πρίσκα/Πρίσκαν, en español la forma más reconocible y eclesialmente inteligible es «Priscila». La nota conserva la forma formal fuente para transparencia.
- source_word: Ἀκύλαν
  english_pob_choice: Aquila
  chosen_spanish: Aquila
  alternatives_spanish:
  - Áquila
  lexicon: BDAG
  rationale: Transliteración directa del nombre propio Ἀκύλας, manteniendo la forma estable y transparente en español.
- source_word: συνεργούς
  english_pob_choice: fellow workers
  chosen_spanish: colaboradores
  alternatives_spanish:
  - compañeros de obra
  - cooperadores
  - compañeros de trabajo
  lexicon: BDAG
  rationale: «Colaboradores» reproduce bien la idea de trabajar junto con alguien en una misión compartida y suena natural en español bíblico moderno. Evita el matiz más mecánico o demasiado técnico de otras opciones.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mis
  alternatives_spanish:
  - mis
  lexicon: BDAG
  rationale: El posesivo de primera persona plural concuerda con el sustantivo plural y expresa la relación personal de Pablo con ellos.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: 'Se conserva la decisión POB de traducir Χριστός como «Mesías» cuando funciona titularmente. La preposición expresa esfera o relación: su trabajo es «en» Mesías Jesús. Se mantiene la alternativa tradicional en nota para transparencia.'
theological_decisions:
- issue: Renderización de Χριστῷ en ἐν Χριστῷ Ἰησοῦ
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La línea editorial pide traducir el título Χριστός como «Mesías» cuando conserva su fuerza titular. Aquí el sintagma señala la esfera cristológica del ministerio, no un nombre fijo ya fosilizado; por eso «Mesías Jesús» refleja mejor el sentido sin perder legibilidad.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: El texto sigue la última restauración doctrinal que devuelve Χριστός a «Mesías»; se evita la sustitución regresiva por «Cristo» y se conserva la relación epistolar del imperativo de saludo. Se corrigió la validación anterior anclando todas las notas con sus marcas dentro del texto.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y claro, sin arcaísmos innecesarios.
  - «Colaboradores» funciona bien para συνεργούς sin introducir una carga semántica ajena.
  - Las notas están todas ancladas en el texto principal y no se dejan notas sueltas.
