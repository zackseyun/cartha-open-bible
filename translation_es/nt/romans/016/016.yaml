translation:
  language: es
  text: Salúdense unos a otros con un beso santo[b]. Todas las iglesias del Mesías[a] los saludan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de Cristo».'
    reason: alternative_reading
  - marker: b
    text: El «beso santo» era un saludo culturalmente reconocido que expresaba afecto santo y comunión entre los creyentes.
    reason: cultural_note
lexical_decisions:
- source_word: Ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Salúdense
  alternatives_spanish:
  - Saluden
  - Dense un saludo
  lexicon: BDAG
  rationale: El imperativo medio plural de ἀσπάζομαι funciona aquí como fórmula exhortativa de saludo. En español, el reflexivo recíproco 'salúdense' expresa bien la reciprocidad de ἀλλήλους y suena natural en registro bíblico contemporáneo.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - los unos a los otros
  lexicon: BDAG
  rationale: El pronombre recíproco exige marcar la acción mutua. 'Unos a otros' es claro, natural y mantiene la reciprocidad sin sobrecargar el estilo.
- source_word: ἐν φιλήματι ἁγίῳ
  english_pob_choice: with a holy kiss
  chosen_spanish: con un beso santo
  alternatives_spanish:
  - con un beso sagrado
  - en un beso santo
  lexicon: BDAG
  rationale: ἐν con dativo tiene valor instrumental/relacional; por eso 'con' es la equivalencia natural en español. φίλημα es 'beso', y ἅγιος se conserva como 'santo' para respetar la consagración distintiva del saludo cristiano.
- source_word: Ἀσπάζονται
  english_pob_choice: greet
  chosen_spanish: saludan
  alternatives_spanish:
  - os saludan
  - les saludan
  lexicon: BDAG
  rationale: En contexto epistolar, ἀσπάζομαι al final de carta se vierte naturalmente como 'saludar'. 'Saludan' conserva la sencillez del griego y evita introducir un matiz más formal que el original.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - os
  lexicon: BDAG
  rationale: El pronombre plural de segunda persona se expresa en español con objeto directo plural en un registro amplio y natural. Dado el uso de 'ustedes' en gran parte del español bíblico contemporáneo, 'los' mantiene concisión; el contexto epistolar hace inequívoco el referente.
- source_word: αἱ ἐκκλησίαι πᾶσαι
  english_pob_choice: All the churches
  chosen_spanish: Todas las iglesias
  alternatives_spanish:
  - Todas las congregaciones
  - Las iglesias, todas ellas
  lexicon: BDAG
  rationale: ἐκκλησίαι se traduce por 'iglesias' en sentido de comunidades cristianas locales. El artículo con πᾶσαι refuerza la totalidad colectiva, bien reflejada por 'todas'.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: de Cristo
  alternatives_spanish:
  - del Mesías
  lexicon: BDAG
  rationale: Aunque la guía del proyecto prefiere 'Mesías' cuando Χριστός funciona claramente como título, aquí la propia auditoría inglesa muestra una revisión final que volvió a 'Christ' por naturalidad epistolar y consistencia de uso. En español, 'Cristo' es la forma eclesial estable y más idiomática en esta construcción posesiva, sin perder la referencia titular.
theological_decisions:
- issue: Rendering of Χριστοῦ in the closing formula
  english_pob_reading: All the churches of Messiah greet you / revised to All the churches of Christ greet you
  chosen_spanish_reading: Todas las iglesias de Cristo los saludan
  alternative_spanish_readings:
  - Todas las iglesias del Mesías los saludan
  rationale: La tensión documentada entre 'Mesiah' y 'Christ' se conserva en la decisión española. Dado que la revisión final del audit trail reinstala 'Christ' por naturalidad epistolar, y que en español la forma titulativa tradicional 'Cristo' es idiomática en este saludo final, se adopta 'Cristo' sin ocultar la alternativa 'Mesías'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Mesías (where title; Cristo where name-like / established ecclesial usage)'
translation_notes:
  revision_awareness: 'El expediente inglés presenta una oscilación documentada en τοῦ Χριστοῦ: una decisión inicial por ''Messiah/Mesiah'', una revisión que cambió a ''Christ'', y una corrección regresiva que restauró ''Messiah''. La versión española sigue esa tensión, pero opta por ''Cristo'' en el texto principal por naturalidad idiomática y por la revisión final del audit trail, dejando ''Mesías'' como alternativa explícita en nota.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento plural de la segunda persona por el contexto de carta comunitaria.
  - '''Salúdense'' y ''los saludan'' conservan el tono epistolar breve y formular.'
  - '''Iglesias'' se usa para comunidades cristianas locales, no para un edificio.'
  - No se introduce 'SEÑOR' para el término griego correspondiente porque aquí no aparece κύριος.
  - La nota alternativa sobre 'Mesías' preserva la tensión terminológica documentada sin imponerla en el texto principal.
