translation:
  language: es
  text: y[a] ahora ha sido revelado, y por medio de las Escrituras proféticas dado a conocer a todas las naciones, conforme al mandato del Dios eterno, para la obediencia de la fe,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo continúa la doxología final (Romanos 16:25–27). Véase la nota sobre Romanos 16:25 respecto de su ubicación y la evidencia manuscrita.
    reason: textual_critical
lexical_decisions:
- source_word: φανερωθέντος
  english_pob_choice: revealed
  chosen_spanish: ha sido revelado
  alternatives_spanish:
  - ha sido manifestado
  - ha sido dado a conocer
  lexicon: BDAG
  rationale: El participio apunta a la acción divina de sacar a la luz lo que estaba oculto; en español, «ha sido revelado» conserva bien ese valor pasivo y resultativo sin perder la referencia al misterio del contexto inmediato.
- source_word: γραφή
  english_pob_choice: Scriptures
  chosen_spanish: Escrituras
  alternatives_spanish:
  - escritos
  lexicon: BDAG
  rationale: Con el modificador «proféticas», el plural se refiere de manera natural a las Escrituras sagradas, no simplemente a escritos comunes. «Escrituras» mantiene esa referencia bíblica establecida.
- source_word: ἐπιταγή
  english_pob_choice: command
  chosen_spanish: mandato
  alternatives_spanish:
  - orden
  - decreto
  lexicon: BDAG
  rationale: En español, «mandato» comunica una directiva autoritativa de Dios con un registro digno y claro. Preserva la fuerza de una disposición superior sin sonar excesivamente jurídica.
- source_word: ὑπακοή
  english_pob_choice: obedience
  chosen_spanish: obediencia
  alternatives_spanish:
  - sumisión
  lexicon: BDAG
  rationale: La expresión fija «obediencia de la fe» debe mantenerse en español para conservar el eco de Romanos 1:5 y la fuerza relacional entre fe y obediencia.
- source_word: ἔθνος
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - gentiles
  lexicon: BDAG
  rationale: Aquí «naciones» reproduce la amplitud universal del anuncio y sigue la decisión auditada en inglés de no limitar innecesariamente el alcance a un contraste étnico más técnico.
theological_decisions:
- issue: Sintaxis del participio inicial y su relación con el v. 25
  english_pob_reading: This verse is a continuation of the closing doxology (Romans 16:25–27).
  chosen_spanish_reading: pero[a] ahora ha sido revelado
  alternative_spanish_readings:
  - pero ahora se ha revelado
  - y ahora ha sido revelado
  rationale: El texto griego enlaza este versículo con la doxología precedente mediante un participio. En español, una apertura con «pero» refleja el giro del contexto anterior y deja visible que este versículo continúa la misma unidad final.
  doctrine_reference: Romanos 16:25–27; continuidad de la doxología final
- issue: «Obediencia de fe» como fórmula programática
  english_pob_reading: to bring about the obedience of faith
  chosen_spanish_reading: para producir la obediencia de la fe
  alternative_spanish_readings:
  - para llevar a la obediencia de la fe
  - para promover la obediencia de la fe
  rationale: Se conserva la fórmula paulina con su posible tensión entre obediencia y fe, sin suavizarla. «Producir» refleja el efecto o resultado de la revelación y del anuncio, acorde con el valor final del participio y la intención del contexto.
  doctrine_reference: Romanos 1:5; 16:26
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantiene sin cambios en la revisión más reciente; no se registraron modificaciones aplicadas. La redacción española sigue de cerca esa lectura estable, conservando el marco doxológico y las decisiones léxicas clave: revelación, Escrituras proféticas, mandato, obediencia de la fe y naciones.'
  spanish_consistency_notes:
  - Se usó «Dios eterno» para μέλλον; no aparece necesidad de nota distintiva adicional porque el texto griego aquí dice «τοῦ αἰωνίου θεοῦ», mejor entendido como «Dios eterno».
  - Se mantuvo «obediencia de la fe» como eco intencional de Romanos 1:5.
  - «Naciones» se eligió en lugar de «gentiles» para conservar el alcance universal del anuncio en esta doxología.
