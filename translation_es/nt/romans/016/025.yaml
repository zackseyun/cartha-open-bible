translation:
  language: es
  text: Y ahora[a] al que puede fortalecerlos conforme a mi evangelio y la proclamación de Jesús Mesías, conforme a la revelación del misterio guardado en silencio por largos siglos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los vv. 25–27 forman una doxología final que aparece en distintas ubicaciones en los manuscritos antiguos. Se encuentra al final del cap. 14 en la tradición bizantina mayoritaria, después del cap. 15 en el papiro más antiguo que se conserva, y aquí al final del cap. 16 en importantes manuscritos del siglo IV y en la tradición latina. Algunos manuscritos la incluyen en más de un lugar, y unos pocos la omiten por completo. La mayoría de las traducciones modernas la conservan aquí como conclusión de la carta de Pablo.
    reason: textual_critical
lexical_decisions:
- source_word: στηρίξαι
  english_pob_choice: strengthen
  chosen_spanish: fortalecerlos
  alternatives_spanish:
  - afirmarlos
  - establecerlos
  lexicon: BDAG
  rationale: El verbo griego expresa la acción de hacer firmes o robustos a los creyentes. En español, «fortalecer» comunica bien esa idea de sostén y firmeza espiritual sin sonar técnico o arcaico. «Afirmarlos» es posible, pero «fortalecerlos» conserva mejor la imagen de apoyo activo.
- source_word: τὸ εὐαγγέλιόν μου
  english_pob_choice: my gospel
  chosen_spanish: mi evangelio
  alternatives_spanish:
  - mi buena noticia
  lexicon: BDAG
  rationale: El posesivo debe mantenerse porque el texto subraya la relación apostólica de Pablo con el mensaje que predica. «Evangelio» es el término natural y fiel en español para εὐαγγέλιον; «buena noticia» sería válido, pero menos adecuado en este contexto literario y eclesial.
- source_word: τὸ κήρυγμα
  english_pob_choice: the preaching
  chosen_spanish: la proclamación
  alternatives_spanish:
  - la predicación
  - el anuncio
  lexicon: BDAG
  rationale: κήρυγμα designa el contenido o acto proclamado públicamente. «Proclamación» conserva el sentido formal de anuncio autorizado; «predicación» también sería posible, pero puede sonar más eclesiástica y menos precisa respecto del acto de anunciar.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús el Mesías
  lexicon: BDAG / POB policy on Χριστός
  rationale: Aunque la política general favorece «Mesías» para Χριστός, en español la forma establecida «Jesucristo» funciona aquí como nombre-título unificado y evita una expresión demasiado marcada o menos natural en esta fórmula fija. La relación con «Cristo» como título queda reconocible en uso eclesial común.
- source_word: μυστηρίου
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  lexicon: BDAG
  rationale: «Misterio» es el equivalente directo y tradicional para μυστήριον en este contexto paulino. Mantiene la tensión entre algo oculto y luego revelado, que el versículo desarrolla inmediatamente.
- source_word: σεσιγημένου
  english_pob_choice: kept secret
  chosen_spanish: guardado en silencio
  alternatives_spanish:
  - mantenido en secreto
  - callado
  lexicon: BDAG
  rationale: El participio perfecto pasivo subraya que el misterio estuvo silenciado durante un tiempo prolongado. «Guardado en silencio» conserva la idea de una reserva activa sin reducirla simplemente a ocultamiento, y evita oscurecer el matiz verbal.
- source_word: χρόνοις αἰωνίοις
  english_pob_choice: for long ages
  chosen_spanish: por largos siglos
  alternatives_spanish:
  - por edades eternas
  - desde tiempos remotos
  lexicon: BDAG
  rationale: La expresión idiomática se refiere a una extensión enorme de tiempo pasado, no a «eternidad» en sentido filosófico. «Por largos siglos» transmite adecuadamente esa duración vasta y pasada en español natural.
theological_decisions:
- issue: Ubicación textual de la doxología
  english_pob_reading: Verses 25–27 form a closing doxology that appears in different locations across ancient manuscripts. Most modern translations retain it here at the end of Romans.
  chosen_spanish_reading: Se mantiene la doxología aquí, al final de Romanos 16, como cierre de la carta.
  alternative_spanish_readings:
  - Colocarla al final de Romanos 14
  - Omitirla por completo
  rationale: La evidencia crítica citada en el POB inglés favorece conservar el pasaje en este lugar en la tradición mayoritaria tardía y en manuscritos importantes. La traducción española debe reflejar esa decisión textual y no resolverla en nota del cuerpo principal.
  doctrine_reference: Crítica textual del NT / tradición manuscrita
- issue: Relación entre Jesús y Χριστός
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús el Mesías
  rationale: El griego usa el título cristológico Χριστός. En español, el nombre compuesto «Jesucristo» es la forma litúrgica y bíblica más establecida; aquí se conserva por inteligibilidad pública, aun cuando el audit trail inglés haya preferido «Messiah» para señalar el valor titular de Χριστός.
  doctrine_reference: Cristología / onomástica cristiana
- issue: Naturaleza del misterio
  english_pob_reading: the mystery kept secret for long ages
  chosen_spanish_reading: el misterio guardado en silencio por largos siglos
  alternative_spanish_readings:
  - el misterio mantenido en secreto por largos siglos
  - el misterio callado por largos siglos
  rationale: El texto no niega la existencia del misterio, sino su ocultamiento temporal. «Guardado en silencio» preserva el matiz pasivo y temporal sin sugerir que el contenido fuera inexistente o irrelevante antes de la revelación.
  doctrine_reference: Revelación progresiva / misterio paulino
translation_notes:
  revision_awareness: La base inglesa revisada cambió «Jesus Christ» a «Jesus Messiah» para reflejar la política del POB sobre Χριστός. En español se ha conservado la inteligibilidad pública mediante «Jesucristo», explicitando en decisión léxica y nota que el griego subyace a un título cristológico, no a un mero apellido devocional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Misterio» se conserva de forma consistente para μυστήριον, sin sustituirlo por un sinónimo que borre la terminología paulina.
  - «Guardar en silencio» evita confundir el verbo con mera ocultación material y conserva el matiz de silencio/revelación.
  - La puntuación reproduce el arranque adverbial con «Y ahora» para reflejar el valor discursivo de Τῷ δὲ sin rigidez literal.
