translation:
  language: es
  text: Porque su obediencia ha llegado a todos[a]. Por eso me alegro por ustedes[b], pero quiero que sean sabios en lo bueno e inocentes[c] en lo malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se ha hecho conocida por todos». El griego dice literalmente: «su obediencia ha llegado a todos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me gozo por ustedes». También puede entenderse: «me alegro a causa de ustedes».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «puros» o «sin engaño» respecto de lo malo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπακοή
  english_pob_choice: obedience
  chosen_spanish: obediencia
  alternatives_spanish:
  - sumisión
  - escucha obediente
  lexicon: BDAG
  rationale: En Pablo, ὑπακοή designa la respuesta obediente, no solo el acto de oír. «Obediencia» conserva ese valor moral y relacional en español.
- source_word: εἰς πάντας
  english_pob_choice: has reached everyone
  chosen_spanish: ha llegado a todos
  alternatives_spanish:
  - se ha hecho conocida entre todos
  - ha llegado a todos los hombres
  lexicon: BDAG
  rationale: El verbo ἀφικνέομαι expresa llegada o alcance. En español, «ha llegado a todos» conserva la imagen de difusión amplia sin volverla innecesariamente interpretativa.
- source_word: ἀφίκετο
  english_pob_choice: has reached
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha arribado
  - ha alcanzado
  lexicon: BDAG
  rationale: El aoristo de ἀφικνέομαι tiene sentido básico de llegar/alcanzar. «Ha llegado» es natural y preserva la metáfora del texto griego.
- source_word: ἐφ’ ὑμῖν
  english_pob_choice: over you
  chosen_spanish: en vosotros
  alternatives_spanish:
  - a causa de vosotros
  - por vosotros
  lexicon: BDAG
  rationale: Con χαίρω, ἐπί con dativo puede señalar motivo u ocasión del gozo. «En vosotros» refleja bien el español idiomático y evita una construcción poco natural como «sobre vosotros».
- source_word: χαίρω
  english_pob_choice: I rejoice
  chosen_spanish: me gozo
  alternatives_spanish:
  - me alegro
  - me regocijo
  lexicon: BDAG
  rationale: «Me gozo» mantiene un tono elevado y verbal, cercano al valor de χαίρω, sin perder claridad en español. «Me alegro» sería más llano, pero menos solemne.
- source_word: σοφοὺς
  english_pob_choice: wise
  chosen_spanish: sabios
  alternatives_spanish:
  - prudentes
  - astutos
  lexicon: BDAG
  rationale: El adjetivo indica sabiduría práctica y discernimiento. «Sabios» es la correspondencia más directa y fiel en este contexto exhortativo.
- source_word: εἰς τὸ ἀγαθόν
  english_pob_choice: in what is good
  chosen_spanish: en lo bueno
  alternatives_spanish:
  - en el bien
  - respecto de lo bueno
  lexicon: BDAG
  rationale: La frase marca la esfera o ámbito del discernimiento. «En lo bueno» sigue la revisión inglesa más idiomática y funciona con naturalidad en español.
- source_word: ἀκεραίους
  english_pob_choice: innocent
  chosen_spanish: sin mezcla
  alternatives_spanish:
  - inocentes
  - puros
  - sin malicia
  lexicon: BDAG
  rationale: El término puede significar puro, guileless, unmixed. «Sin mezcla» intenta conservar la idea de no estar contaminados o mezclados con el mal, sin reducirlo a ingenuidad o simple inocencia psicológica.
- source_word: εἰς τὸ κακόν
  english_pob_choice: in what is evil
  chosen_spanish: en lo malo
  alternatives_spanish:
  - respecto de lo malo
  - ante el mal
  lexicon: BDAG
  rationale: Paralelo a εἰς τὸ ἀγαθόν, indica la esfera del mal respecto de la cual deben permanecer ἀκέραιοι. «En lo malo» mantiene el paralelismo y es idiomático.
theological_decisions:
- issue: Alcance de πάντας
  english_pob_reading: Rendered rhetorically as 'everyone' rather than an absolute universal claim.
  chosen_spanish_reading: Se traduce retóricamente como «a todos», sin convertirlo en una afirmación matemáticamente absoluta.
  alternative_spanish_readings:
  - a todo el mundo
  - a todos los creyentes
  rationale: El elogio de Pablo comunica amplia notoriedad de la obediencia de los romanos. «A todos» conserva esa amplitud retórica sin estrechar el sentido ni sobreexplicarlo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Contraste moral entre σοφοὺς...ἀκεραίους
  english_pob_reading: Preserved the contrast as discernment in good and innocence regarding evil, without importing a doctrine of ignorance or naivety.
  chosen_spanish_reading: Se mantiene el contraste entre discernimiento en lo bueno y una pureza/no mezcla frente a lo malo.
  alternative_spanish_readings:
  - sabios en lo bueno y simples en lo malo
  - prudentes en lo bueno y puros en lo malo
  rationale: La exhortación pide madurez moral y ausencia de contaminación por el mal. «Sin mezcla» evita presentar ἀκέραιος como simple ingenuidad y preserva la tensión ética del pasaje.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió «in what is good / evil» por ser más natural que «as to what is good / evil». En español se reflejó con «en lo bueno» y «en lo malo», manteniendo el paralelismo y el registro formal.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «obediencia» para ὑπακοή, siguiendo la decisión léxica auditada.
  - Se evitó «inocentes» como traducción principal de ἀκεραίους para no perder la posible idea de integridad no mezclada con el mal.
  - 'El orden y la puntuación reflejan las dos cláusulas exhortativas del griego: sabiduría orientada al bien e integridad orientada frente al mal.'
