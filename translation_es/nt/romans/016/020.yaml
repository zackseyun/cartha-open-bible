translation:
  language: es
  text: Y el Dios de paz aplastará pronto a Satanás bajo sus pies. La gracia de nuestro Señor Jesús Mesías[a] sea con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δὲ θεὸς τῆς εἰρήνης
  english_pob_choice: the God of peace
  chosen_spanish: el Dios de paz
  alternatives_spanish:
  - el Dios que da paz
  - el Dios de la paz
  lexicon: BDAG
  rationale: Conservo el título paulino de manera natural en español. «Dios de paz» reproduce el genitivo caracterizador sin expandirlo a una paráfrasis explicativa.
- source_word: συντρίψει
  english_pob_choice: will ... crush
  chosen_spanish: aplastará
  alternatives_spanish:
  - quebrará
  - desmenuzará
  lexicon: BDAG
  rationale: «Aplastar» comunica con claridad la derrota violenta y decisiva del verbo futuro, y encaja bien con la imagen de sometimiento bajo los pies.
- source_word: τὸν Σατανᾶν
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - el Adversario
  lexicon: BDAG
  rationale: Se conserva el nombre propio transliterado, como en el texto griego y en el uso neotestamentario corriente; «el Adversario» añadiría una glosa interpretativa.
- source_word: ὑπὸ τοὺς πόδας ὑμῶν
  english_pob_choice: under your feet
  chosen_spanish: bajo sus pies
  alternatives_spanish:
  - debajo de sus pies
  - bajo vuestros pies
  lexicon: BDAG
  rationale: En español, el pronombre posesivo plural de segunda persona puede sonar más natural como «sus» en un registro bíblico amplio; el contexto sigue marcando que se trata de los creyentes destinatarios. La imagen de victoria/subyugación se conserva con «bajo».
- source_word: ἐν τάχει
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - en breve
  - rápidamente
  lexicon: BDAG
  rationale: «Pronto» expresa cercanía temporal, que es el sentido principal aquí. Evita el matiz de modo que podría sugerir «rápidamente».
- source_word: ἡ χάρις
  english_pob_choice: The grace
  chosen_spanish: La gracia
  alternatives_spanish:
  - La gracia inmerecida
  lexicon: BDAG
  rationale: Se mantiene el término técnico paulino «gracia» sin sustituirlo por un equivalente explicativo que diluya su valor teológico.
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: of our Lord
  chosen_spanish: de nuestro Señor
  alternatives_spanish:
  - de nuestro Dueño
  - de nuestro Amo
  lexicon: BDAG
  rationale: «Señor» conserva el valor cristológico habitual de κύριος en una fórmula de bendición, con el registro digno que exige el contexto.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús Cristo
  lexicon: BDAG
  rationale: Dado el criterio POB de traducir Χριστός como «Mesías» cuando funciona titulativamente, se preserva esa fuerza en español. Se evita «Jesucristo» porque vuelve más nominal una expresión todavía titulativa.
- source_word: μεθ’ ὑμῶν
  english_pob_choice: be with you
  chosen_spanish: sea con ustedes
  alternatives_spanish:
  - esté con ustedes
  - esté con vosotros
  lexicon: BDAG
  rationale: La bendición final en español requiere un verbo copulativo explícito. «Sea con ustedes» conserva el tono optativo/benedictorio del griego y el plural de destinatarios.
theological_decisions:
- issue: Traducción de Χριστός en la bendición final
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El contexto sigue siendo titulativo y no meramente parte de un nombre fijo. Por eso «Mesías» expresa mejor el valor del término según el criterio doctrinal del POB; «Cristo» queda como alternativa tradicional reconocible.
  doctrine_reference: 'DOCTRINE.md: términos discutidos — Χριστός / Christos | Mesías cuando es título; Cristo cuando es nombre-like'
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la última pasada de revisión: no se detectaron cambios de fondo necesarios; el único punto sensible es mantener la elección titulativa de Χριστός con «Mesías» y registrar la alternativa tradicional en nota.'
  spanish_consistency_notes:
  - Se mantiene «Dios de paz» como título paulino estable.
  - «Satanás» se conserva como nombre propio y no como glosa interpretativa.
  - El posesivo plural «sus» respeta el destinatario colectivo; el referente es «ustedes» en la segunda mitad de la frase.
  - La fórmula benedictoria final se ha adaptado al español con un verbo explícito («sea») sin alterar el valor oracional del griego.
