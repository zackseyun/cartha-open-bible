translation:
  language: es
  text: Saluden a Rufo[a], el escogido en el Señor, y a su madre y a la mía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el elegido en el Señor». El adjetivo griego también puede sugerir «escogido» o «destacado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Saludad
  - Den saludos a
  - Saluden a
  lexicon: BDAG
  rationale: El imperativo plural de ἀσπάζομαι pide una fórmula de saludo. En español, «saluden» conserva la fuerza directa y natural de la exhortación paulina sin volverla demasiado formal ni demasiado coloquial.
- source_word: Ῥοῦφον
  english_pob_choice: Rufus
  chosen_spanish: Rufus
  alternatives_spanish:
  - Rufo
  lexicon: Convención onomástica
  rationale: Se translitera el nombre propio conforme al uso habitual en español bíblico, sin castellanizarlo innecesariamente.
- source_word: τὸν ἐκλεκτὸν
  english_pob_choice: the chosen one
  chosen_spanish: el escogido
  alternatives_spanish:
  - el elegido
  - el electo
  - el escogido
  lexicon: BDAG
  rationale: ἐκλεκτός puede significar «escogido/elegido» y también llevar una resonancia teológica de elección. «El escogido» mantiene esa ambigüedad útil en español y refleja bien el artículo con el adjetivo sustantivado.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en el Señor Jesús
  - por el Señor
  lexicon: BDAG
  rationale: La preposición ἐν expresa relación o esfera. «En el Señor» conserva esa relación sin especificar más de lo que el griego da, y sigue el equivalente funcional más natural en español.
- source_word: μητέρα αὐτοῦ καὶ ἐμοῦ
  english_pob_choice: his mother and mine
  chosen_spanish: su madre y la mía
  alternatives_spanish:
  - su madre y mi madre
  - su madre, y la madre mía
  - su madre, que también es madre para mí
  lexicon: BDAG
  rationale: El griego es elíptico y afectivo. «Su madre y la mía» preserva el paralelismo breve y la relación personal sin explicar de más ni borrar la intimidad del giro.
theological_decisions:
- issue: Sentido de τὸν ἐκλεκτὸν ἐν κυρίῳ
  english_pob_reading: Rufus is described as 'chosen in the Lord,' preserving either election language or a broader sense of distinguished status.
  chosen_spanish_reading: Rufus es presentado como «el escogido en el Señor», manteniendo la posible resonancia de elección divina sin decidirla de manera más técnica.
  alternative_spanish_readings:
  - el elegido en el Señor
  - el electo en el Señor
  - el selecto en el Señor
  rationale: La frase permite tanto una lectura de elección como una de distinción sobresaliente. «Escogido» conserva la tensión teológica que el texto y la POB inglesa dejan abierta.
  doctrine_reference: Preservar la tensión lexical y teológica; no resolverla hacia un sistema doctrinal cerrado.
- issue: Relación entre 'su madre y la mía'
  english_pob_reading: Paul refers to Rufus's mother as his own in an affectionate relational sense.
  chosen_spanish_reading: «Su madre y la mía» mantiene la expresión afectiva y relacional, no una afirmación biológica literal.
  alternative_spanish_readings:
  - su madre y mi madre
  - su madre, que también es madre para mí
  rationale: El contexto epistolar favorece una relación de cariño y cuidado cristiano. La redacción conserva la forma breve del original para que la inferencia relacional quede disponible al lector.
  doctrine_reference: Énfasis en la fraternidad cristiana y el lenguaje de familia espiritual.
translation_notes:
  revision_awareness: 'La edición inglesa más reciente cambió de ''chosen in the Lord'' a ''the chosen one in the Lord'' para reflejar más de cerca τὸν ἐκλεκτόν, y retiró el guion en ''his mother and mine'' para un tono más formal. La versión española sigue esa revisión con «el escogido» y conserva una construcción breve y directa: «su madre y la mía».'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al criterio del proyecto, sin sustituirlo por «Yahvé» aquí, porque el texto griego no contiene el nombre divino y la frase funciona como título cristológico relacional.
  - «Escogido» evita el tecnicismo de «electo» y también evita reducir el término a mero elogio social; conserva la ambigüedad útil de elección/distinción.
  - La puntuación con comas mantiene el paralelismo del saludo final de Pablo en un español claro y publicable.
