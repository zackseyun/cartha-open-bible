  text: οἱ γὰρ τοιοῦτοι τῷ κυρίῳ ⸀ἡμῶν Χριστῷ οὐ δουλεύουσιν ἀλλὰ τῇ ἑαυτῶν κοιλίᾳ, καὶ διὰ τῆς χρηστολογίας καὶ εὐλογίας ἐξαπατῶσι τὰς καρδίας τῶν ἀκάκων.
base_translation:
  language: en
  yaml_path: translation/nt/romans/016/018.yaml
  text: For such people do not serve our Lord Messiah[a], but their own belly[c][b], and by smooth talk and flattery they deceive the hearts of the unsuspecting.
  footnotes:
  - marker: a
    text: Or, 'our Lord Christ.'
    reason: alternative_reading
  - marker: b
    text: Literally, 'their own belly,' a vivid image for self-indulgent desire.
    reason: lexical_alternative
  - marker: c
    text: Or, 'the innocent' or 'the guileless.'
    reason: lexical_alternative
