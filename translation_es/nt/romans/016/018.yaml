    issue: La traducción principal de τῶν ἀκάκων como «los inocentes» no refleja con suficiente precisión la elección auditada «the unsuspecting».
    rationale: En contexto de engaño, ἄκακος aquí enfatiza vulnerabilidad por falta de sospecha o astucia. «Inocentes» en español puede leerse principalmente como inocencia moral, mientras que «incautos» o similar comunica mejor la susceptibilidad al engaño.
  - severity: medium
    issue: Los marcadores de notas [b] y [c] están cruzados respecto de las palabras ancladas en el texto.
    rationale: En el texto, [b] aparece tras «vientre» y [c] tras «inocentes», pero la nota b explica «vientre» y la c explica ἀκάκων. El requerimiento exige que el marcador exacto aparezca en el lugar correspondiente; el orden debe ser único y consistente dentro del registro.
