translation:
  language: es
  text: Porque tales personas no sirven a nuestro Señor Mesías[a], sino a su propio vientre[b]; y con palabras suaves y lisonjas engañan los corazones de los incautos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «nuestro Señor Cristo».
    reason: alternative_reading
  - marker: b
    text: Literalmente, «su propio vientre», una imagen viva de deseos egoístas y autoindulgentes.
    reason: lexical_alternative
  - marker: c
    text: O, «de los inocentes», «de los desprevenidos» o «de los sencillos».
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιοῦτοι
  english_pob_choice: such people
  chosen_spanish: tales personas
  alternatives_spanish:
  - tales hombres
  - tales seres
  lexicon: BDAG
  rationale: El demostrativo retoma a los divisores del versículo anterior. «Tales personas» suena natural en español y conserva la referencia anafórica sin un masculino innecesario.
- source_word: τῷ κυρίῳ ἡμῶν Χριστῷ
  english_pob_choice: our Lord Messiah
  chosen_spanish: nuestro Señor Mesías
  alternatives_spanish:
  - nuestro Señor Cristo
  - nuestro Señor Jesucristo
  lexicon: BDAG
  rationale: Se conserva «Señor» para κύριος y se traduce Χριστός como título, «Mesías», conforme al criterio terminológico del proyecto. No se añade «Jesús» porque no aparece en el griego.
- source_word: δουλεύουσιν
  english_pob_choice: serve
  chosen_spanish: sirven
  alternatives_spanish:
  - son esclavos de
  - rinden servicio a
  lexicon: BDAG
  rationale: En este contraste verbal, «servir» comunica con naturalidad la idea de estar al servicio de alguien. La imagen esclavista implícita no domina la frase en español, pero queda compatible con el verbo.
- source_word: κοιλίᾳ
  english_pob_choice: belly
  chosen_spanish: vientre
  alternatives_spanish:
  - estómago
  - apetito
  lexicon: BDAG
  rationale: «Vientre» conserva la imagen corporal concreta y resulta más idiomático y digno en español que «barriga»; «apetito» interpretaría demasiado la metáfora.
- source_word: χρηστολογίας
  english_pob_choice: smooth talk
  chosen_spanish: palabras suaves
  alternatives_spanish:
  - habla persuasiva
  - palabras halagüeñas
  lexicon: BDAG
  rationale: El término apunta a discurso agradable e ingratiador. «Palabras suaves» mantiene el efecto de lenguaje seductor sin volverse excesivamente moderno o coloquial.
- source_word: εὐλογίας
  english_pob_choice: flattery
  chosen_spanish: lisonjas
  alternatives_spanish:
  - adulación
  - elogios
  lexicon: BDAG
  rationale: Aquí εὐλογία no significa «bendición» sino habla halagadora. «Lisonjas» conserva el matiz manipulador y encaja con el paralelo con χρηστολογία.
- source_word: ἐξαπατῶσι
  english_pob_choice: deceive
  chosen_spanish: engañan
  alternatives_spanish:
  - seducen
  - desvían
  lexicon: BDAG
  rationale: El verbo intensifica el engaño, pero en español «engañan» comunica directamente el efecto sin recargar la sintaxis.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - mentes
  - interior
  lexicon: BDAG
  rationale: Se conserva la antropología bíblica tradicional de «corazones», que en español sigue abarcando la interioridad completa.
- source_word: τῶν ἀκάκων
  english_pob_choice: the unsuspecting
  chosen_spanish: de los inocentes
  alternatives_spanish:
  - de los ingenuos
  - de los incautos
  - de los sencillos
  lexicon: BDAG
  rationale: Ἄκακος admite «inocente», «incauto», «ingenuo» o «simple/sencillo» según contexto. Dado el contexto de engaño, «inocentes» mantiene la vulnerabilidad sin imputar culpa. Se preserva así la ambigüedad entre inocencia moral y falta de astucia que el inglés POB también dejó abierta.
theological_decisions:
- issue: Cómo verter Χριστός en una fórmula de señorío
  english_pob_reading: our Lord Messiah
  chosen_spanish_reading: nuestro Señor Mesías
  alternative_spanish_readings:
  - nuestro Señor Cristo
  - nuestro Señor Jesucristo
  rationale: 'Se sigue la política terminológica del proyecto: Χριστός se traduce como título («Mesías») cuando no hay razón de fijación litúrgica como nombre propio. Esto evita importar una forma tradicional por inercia y conserva la tensión título/nombre que el texto presenta.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; contested terms table for Χριστός'
translation_notes:
  revision_awareness: 'El borrador sigue la última restauración del audit trail: Χριστός vuelve a leerse como título traducible («Mesías») en vez de como forma fija «Cristo». También conserva la imagen corporal de κοιλία y el matiz halagador de χρηστολογία/εὐλογία sin neutralizarlo.'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος y «Mesías» para Χριστός según la terminología base del proyecto.
  - Se evitó «bendición» para εὐλογία porque aquí el contexto es de adulación, no de bendecir.
  - «Vientre» preserva la metáfora concreta mejor que una abstracción como «apetito».
  - Se usó «corazones» para καρδίας para mantener el lenguaje bíblico antropológico en español.
