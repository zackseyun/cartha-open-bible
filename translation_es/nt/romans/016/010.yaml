lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Den saludos a
  - Saluden a
  lexicon: BDAG
  rationale: Es un imperativo plural de cortesía y saludo. «Saluden» mantiene la brevedad y el tono epistolar natural en español, sin añadir matices de acogida que no están en el griego.
- source_word: Ἀπελλῆν
  english_pob_choice: Apelles
  chosen_spanish: Apeles
  alternatives_spanish:
  - Apelles
  lexicon: Convención transliterada al español
  rationale: Se adapta el nombre propio a la forma española habitual «Apeles», conservando la identidad del nombre sin forzar una grafía anglicada.
- source_word: τὸν δόκιμον
  english_pob_choice: the approved one
  chosen_spanish: el aprobado
  alternatives_spanish:
  - el probado
  - el aprobado y comprobado
  - el hombre aprobado
  lexicon: BDAG
  rationale: δόκιμος tiene la idea de haber sido probado y resultar aprobado. «El aprobado» preserva la fuerza substantiva del adjetivo con concisión. Se evita «el hombre aprobado» por añadir un sustantivo no presente; «el probado» puede sonar menos claramente evaluativo en español.
- source_word: ἐν Χριστῷ
  english_pob_choice: in the Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός como «Mesías», conforme al criterio del proyecto. «En» conserva la expresión paulina de esfera/unión. La alternativa tradicional «en Cristo» queda como posible lectura familiar, pero no se adopta en el texto principal.
- source_word: τοὺς ἐκ τῶν Ἀριστοβούλου
  english_pob_choice: those of the household of Aristobulus
  chosen_spanish: los de la casa de Aristóbulo
  alternatives_spanish:
  - los de la casa de Aristóbulo
  - los pertenecientes a Aristóbulo
  lexicon: BDAG
  rationale: La expresión apunta probablemente a personas asociadas con su casa o conjunto doméstico. «Los de la casa de Aristóbulo» es idiomático en español y conserva la referencia relacional sin sobreespecificar más allá del griego.
theological_decisions:
- issue: Tratamiento de Χριστός en ἐν Χριστῷ
  english_pob_reading: in the Messiah
  chosen_spanish_reading: en el Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: Se sigue el principio editorial de traducir Χριστός como título cuando está en juego su sentido mesiánico. En esta fórmula paulina, la relación/sfera «en el Mesías» mantiene la carga teológica sin ocultar el título detrás de una forma tradicional.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Valor de δόκιμος como cualidad aprobada tras prueba
  english_pob_reading: the approved one
  chosen_spanish_reading: el aprobado
  alternative_spanish_readings:
  - el probado
  - el probado y aprobado
  rationale: No se atenúa la evaluación positiva ni se convierte en simple elogio genérico. «El aprobado» conserva la idea de alguien reconocido como genuino, con la tensión implícita de haber pasado prueba.
  doctrine_reference: BDAG δόκιμος
translation_notes:
  revision_awareness: El inglés POB pasó por una oscilación entre «in Christ» y «in Messiah», con corrección final hacia «in Messiah» por política terminológica. En español se adopta de forma consistente «en el Mesías», siguiendo el criterio del proyecto y manteniendo la distinción titular sin depender de la forma tradicional.
  spanish_consistency_notes:
  - Se mantiene el saludo repetido con el mismo verbo en ambas cláusulas para reflejar la estructura del griego.
  - «Casa de Aristóbulo» evita ampliar el sentido a una explicación sociológica no explicitada por el texto.
  - El nombre propio se unifica en forma española, pero en la nota se preserva la referencia al nombre griego/inglés para trazabilidad.
