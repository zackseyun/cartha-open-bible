translation:
  language: es
  text: Saluden a Apeles, el probado y aprobado en el Mesías[a]. Saluden a los de la casa de Aristóbulo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «en Cristo».
