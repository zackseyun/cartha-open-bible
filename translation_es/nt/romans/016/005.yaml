- from: Saluden también a la iglesia que se reúne en su casa[a]. Saluden a Epeneto, mi amado, que es las primicias de Asia[b] para el Mesías[c].
  to: Saluden también a la iglesia que se reúne en su casa[a]. Saluden a Epeneto, mi amado, quien es primicias de Asia[b] para el Mesías[c].
  rationale: Se corrige la frase nominal para un español gramatical y natural sin perder la metáfora de ἀπαρχή; se ajusta la nota [a] para reflejar la verdadera alternativa documentada; y se alinea la nota [c] con la terminología del proyecto usando «Mesías».
