translation:
  language: es
  text: Saluden también a la iglesia que se reúne en su casa[a]. Saluden a Epeneto, mi amado, quien es primicias de Asia[b] para el Mesías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la iglesia en su casa».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, la provincia romana de Asia, no el continente moderno.
    reason: cultural_note
  - marker: c
    text: 'O: «quien fue el primer convertido en Asia para el Mesías».'
    reason: alternative_reading
lexical_decisions:
- source_word: κατ’ οἶκον αὐτῶν ἐκκλησίαν
  english_pob_choice: the church in their house
  chosen_spanish: la iglesia que se reúne en su casa
  alternatives_spanish:
  - la iglesia en su casa
  - la iglesia de su casa
  - la iglesia doméstica
  lexicon: BDAG
  rationale: La expresión griega puede referirse a la asamblea asociada con la casa o que se reúne allí. En español, «la iglesia que se reúne en su casa» conserva la relación con la casa y hace explícita la idea de reunión sin volverla rígidamente literal.
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Den saludos a
  - Saluden a
  lexicon: BDAG
  rationale: En listas epistolares, el imperativo funciona naturalmente como fórmula de saludo. «Saluden» es claro, idiomático y mantiene el plural exhortativo.
- source_word: Ἐπαίνετον
  english_pob_choice: Epaenetus
  chosen_spanish: Epeneto
  alternatives_spanish:
  - Epaeneto
  - Epenetus
  lexicon: Convención onomástica española
  rationale: Se translitera el nombre propio de forma transparente y readable en español. «Epeneto» evita la grafía excesivamente helenizante y sigue la práctica habitual en castellano bíblico.
- source_word: ἀγαπητόν μου
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado por mí
  - el que amo
  - mi querido
  lexicon: BDAG
  rationale: «Amado» refleja con dignidad ἀγαπητός y conserva el tono afectivo de Pablo. «Mi amado» suena natural en español y evita diluir la fuerza afectiva en un simple «querido».
- source_word: ἀπαρχὴ
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - el primer fruto
  - el primero en convertirse
  - el primer creyente
  lexicon: BDAG
  rationale: «Primicias» reproduce el campo metafórico y sacrificial de ἀπαρχή. En español, el plural es la forma establecida para esta imagen bíblica y preserva mejor el eco teológico que una glosa como «primer creyente».
- source_word: τῆς Ἀσίας
  english_pob_choice: of Asia
  chosen_spanish: de Asia
  alternatives_spanish:
  - de la provincia de Asia
  - en Asia
  lexicon: BDAG
  rationale: El genitivo se traduce de manera directa como «de Asia». La aclaración histórica de que se trata de la provincia romana, no del continente moderno, se conserva mejor en nota.
- source_word: εἰς Χριστόν
  english_pob_choice: for Messiah
  chosen_spanish: para el Mesías
  alternatives_spanish:
  - para Cristo
  - con referencia al Mesías
  - en relación con el Mesías
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como nombre fijo; por eso se usa «Mesías» según el criterio del proyecto. «Para el Mesías» mantiene el sentido relacional/meta de εἰς sin sobreinterpretar la construcción.
theological_decisions:
- issue: Rendering Χριστός as title
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El contexto trata Χριστός como título mesiánico. En español, «Mesías» preserva el valor semántico del título y sigue la pauta del proyecto de no sustituirlo por el uso eclesiástico convencional de «Cristo» cuando el título está en foco.
  doctrine_reference: 'DOCTRINE.md: Χριστός default rendering'
- issue: Meaning of ἀπαρχὴ τῆς Ἀσίας εἰς Χριστόν
  english_pob_reading: who is the firstfruits of Asia for the Messiah
  chosen_spanish_reading: que es las primicias de Asia para el Mesías
  alternative_spanish_readings:
  - que fue el primer convertido en Asia para Cristo
  - que es el primero de Asia para el Mesías
  - que es las primicias de la provincia de Asia para el Mesías
  rationale: Se conserva la metáfora de «primicias» en lugar de resolverla del todo como «primer convertido». La construcción resulta algo idiomática, pero el texto debe preservar la tensión interpretativa sin borrar la imagen paulina.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto base inglés pasó por una revisión que osciló entre «Christ» y «Messiah» en εἰς Χριστόν; la corrección final restableció «Messiah». También hubo una revisión del giro de «the church in their house» sin alterar el sentido sustancial. La versión española refleja la lectura final con «Mesías» y conserva la metáfora de «primicias» para mantener la tensión exegética.
  spanish_consistency_notes:
  - Se usó «Mesías» para Χριστός como título, en coherencia con la política del proyecto.
  - Se eligió «primicias» para ἀπαρχή, manteniendo la imagen bíblica y evitando una glosa interpretativa en el cuerpo principal.
  - «Asia» se dejó sin expansión en el texto principal; la aclaración histórica queda en nota.
  - La fórmula de saludo se expresó con «Saluden», natural en español epistolar y fiel al plural imperativo griego.
