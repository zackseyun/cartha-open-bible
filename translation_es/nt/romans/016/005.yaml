review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura general: saludar a la iglesia en la casa de ellos, saludar a Epeneto y conservar la metáfora de «primicias» con «Mesías». Sin embargo, hay un error gramatical importante en «que es las primicias», y la nota [a] no preserva la alternativa del English POB porque repite el texto principal en lugar de dar la opción más literal «la iglesia en su casa».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero necesita ajuste menor para naturalidad y precisión. «que es las primicias» debe ser «que es las primicias» no es gramatical; en español natural y fiel aquí conviene «que es las primicias»? Mejor «quien es las primicias» sigue mal; la solución idiomática y fiel es «que es las primicias» -> «quien es las primicias» no corrige concordancia. Lo correcto es recast: «quien es las primicias de Asia para el Mesías» o mejor «quien es primicias de Asia para el Mesías». También la nota [c] debe alinearse con el inglés y la terminología del proyecto usando «Mesías», no «Cristo».'
  glossary_alignment: Bien en «Mesías» para Χριστόν y en evitar «Cristo» en el texto principal. «Iglesia» y «primicias» concuerdan con la pauta del proyecto. La única desalineación terminológica relevante está en la nota [c], que vuelve a «Cristo» sin razón documentada.
  issues:
  - severity: high
    issue: Error gramatical en «que es las primicias»
    rationale: La construcción con artículo plural como atributo de «es» suena incorrecta en español en este contexto. Debe reformularse a una expresión idiomática fiel, p. ej. «quien es primicias de Asia para el Mesías».
  - severity: medium
    issue: La nota [a] repite el texto principal en vez de dar la alternativa documentada
    rationale: El English POB tiene texto principal «the church in their house» y nota alternativa «the church that meets in their house». En español el texto principal usa la opción interpretativa «la iglesia que se reúne en su casa», así que la nota debe conservar la alternativa más literal, no duplicar el principal.
  - severity: medium
    issue: La nota [c] usa «Cristo» en vez de «Mesías»
    rationale: El proyecto pide «Mesías» cuando Χριστός funciona como título, y el English POB restauró explícitamente Messiah en este versículo. La nota alternativa debe respetar esa decisión salvo razón contextual, que aquí no existe.
  revised_spanish_text: Saluden también a la iglesia que se reúne en su casa[a]. Saluden a Epeneto, mi amado, quien es primicias de Asia[b] para el Mesías[c].
  revised_footnotes:
  - marker: a
    text: 'O: «la iglesia en su casa».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, la provincia romana de Asia, no el continente moderno.
    reason: cultural_note
  - marker: c
    text: 'O: «quien fue el primer convertido en Asia para el Mesías».'
    reason: alternative_reading
  revision_rationale: Se corrige la frase nominal para un español gramatical y natural sin perder la metáfora de ἀπαρχή; se ajusta la nota [a] para reflejar la verdadera alternativa documentada; y se alinea la nota [c] con la terminología del proyecto usando «Mesías».
