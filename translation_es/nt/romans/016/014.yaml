translation:
  language: es
  text: Saluden a Asíncrito, Flegonte, Hermes, Patrobas, Hermas, y a los hermanos[a] que están con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hermanos con ellos». La frase probablemente se refiere a creyentes asociados con estos hombres.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Den saludos a
  - Saluden a
  lexicon: BDAG
  rationale: El imperativo aoristo medio plural funciona aquí como fórmula epistolar de saludo. En español, «saluden» reproduce bien la acción breve y natural del contexto, sin volverla más pesada con una perífrasis.
- source_word: Ἀσύγκριτον
  english_pob_choice: Asyncritus
  chosen_spanish: Asíncrito
  alternatives_spanish:
  - Asíncrito
  lexicon: nombre propio
  rationale: Nombre propio transliterado al uso español, manteniendo la referencia personal sin intentar traducirlo.
- source_word: Φλέγοντα
  english_pob_choice: Phlegon
  chosen_spanish: Flegonte
  alternatives_spanish:
  - Flegón
  - Phlegón
  lexicon: nombre propio
  rationale: Nombre propio transliterado a la forma más natural en español, conservando la identidad del personaje en la lista de saludos.
- source_word: Ἑρμῆν
  english_pob_choice: Hermes
  chosen_spanish: Hermes
  alternatives_spanish:
  - Hermés
  lexicon: nombre propio
  rationale: Nombre propio transliterado. Se conserva la forma tradicional reconocible en español, sin sugerir aquí al dios mitológico, ya que el contexto es una salutación a una persona.
- source_word: Πατροβᾶν
  english_pob_choice: Patrobas
  chosen_spanish: Patrobas
  alternatives_spanish:
  - Patrobas
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera estándar para español.
- source_word: Ἑρμᾶν
  english_pob_choice: Hermas
  chosen_spanish: Hermas
  alternatives_spanish:
  - Herma
  lexicon: nombre propio
  rationale: Nombre propio transliterado. Se distingue claramente de «Hermes» en la lista, como en el griego y en el inglés POB.
- source_word: τοὺς σὺν αὐτοῖς ἀδελφούς
  english_pob_choice: the brothers with them
  chosen_spanish: los hermanos que están con ellos
  alternatives_spanish:
  - los hermanos con ellos
  - los hermanos que están junto a ellos
  lexicon: BDAG
  rationale: Se conserva el masculino plural «hermanos», tal como el audit trail inglés, porque el griego es explícitamente masculino plural y la frase es breve y formularia. «Que están con ellos» expresa con naturalidad σὺν αὐτοῖς en español.
theological_decisions:
- issue: Alcance de ἀδελφούς en un saludo comunitario
  english_pob_reading: brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: El griego usa un plural masculino explícito. La versión española mantiene esa forma para no ampliar indebidamente el referente, siguiendo la política de precisión de género del proyecto y el razonamiento del POB inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Posible ambigüedad de «Hermes» frente al nombre de una deidad griega
  english_pob_reading: Hermes is clearly a personal name in a greeting list
  chosen_spanish_reading: Hermes como nombre personal
  alternative_spanish_readings:
  - Hermes como referencia cultural ambigua
  - Hermes el dios
  rationale: El contexto de saludos personales desambigua el término. No se añade explicación en el texto principal porque la lista epistolar ya lo deja claro; se conserva la simpleza del original.
  doctrine_reference: Contexto epistolar de Romanos 16
translation_notes:
  revision_awareness: 'El pasaje coincide con el último pase revisado y con el resumen de control cruzado: no se registraron cambios necesarios, por lo que se mantiene la solución estable del texto fuente y su lectura de la frase final como grupo asociado de creyentes.'
  spanish_consistency_notes:
  - Se mantiene el plural masculino «hermanos» en coherencia con la política POB y con el griego ἀδελφούς.
  - Los nombres propios se transliteran al español de manera estable y reconocible, sin forzar traducciones semánticas.
  - Se usa «Saluden» como imperativo natural de saludo epistolar en español, equivalente funcional de ἀσπάσασθε.
