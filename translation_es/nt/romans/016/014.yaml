    rationale: Aunque no es incorrecta, en español una enumeración de nombres tras «Saluden a» suele fluir mejor sin repetir la preposición antes de cada elemento.
  - severity: low
    issue: La nota al pie no ofrece una alternativa real distinta
    rationale: El texto principal dice «los hermanos que están con ellos», y la nota repite exactamente esa misma redacción tras «O». Conviene que la nota preserve la alternativa documentada en el audit trail, por ejemplo «los hermanos con ellos» o una formulación equivalente realmente alternativa.
