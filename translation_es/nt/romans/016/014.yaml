    rationale: La nota [a] trata la frase τοὺς σὺν αὐτοῖς ἀδελφούς («los hermanos ... con ellos»), no el nombre «Asíncrito». Según las instrucciones, el marcador debe aparecer exactamente en la palabra o frase relevante.
  - severity: low
