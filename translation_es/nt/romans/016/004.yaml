translation:
  language: es
  text: los cuales expusieron sus propios cuellos por mi vida[a], a quienes no solo yo doy gracias, sino también todas las iglesias de los gentiles[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su propio cuello'. El griego tiene el singular 'cuello' en una expresión idiomática para exponerse a peligro mortal.
    reason: lexical_alternative
  - marker: b
    text: O 'todas las iglesias de las naciones'.
    reason: alternative_reading
lexical_decisions:
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: los cuales
  alternatives_spanish:
  - quienes
  - los que
  lexicon: BDAG
  rationale: Mantiene el valor descriptivo del relativo y su enlace con el antecedente, con un tono natural en español bíblico contemporáneo.
- source_word: ὑπὲρ τῆς ψυχῆς μου
  english_pob_choice: for my life
  chosen_spanish: por mi vida
  alternatives_spanish:
  - por mi alma
  - en favor de mi vida
  lexicon: BDAG
  rationale: ψυχή aquí señala la vida concreta de Pablo en un contexto de peligro mortal; 'por mi vida' conserva ese sentido sin convertirlo en 'alma' en sentido antropológico.
- source_word: τὸν ἑαυτῶν τράχηλον
  english_pob_choice: their own neck
  chosen_spanish: sus propios cuellos
  alternatives_spanish:
  - su propio cuello
  - sus propios cuellos
  lexicon: BDAG
  rationale: El griego usa el singular τράχηλον con valor idiomático, pero el antecedente plural y la revisión inglesa favorecen reflejar el plural en español para una lectura más clara, sin perder la imagen corporal del peligro.
- source_word: ὑπέθηκαν
  english_pob_choice: laid down
  chosen_spanish: pusieron en peligro
  alternatives_spanish:
  - expusieron
  - arriesgaron
  lexicon: BDAG
  rationale: En la expresión idiomática el verbo comunica exponerse a un riesgo mortal. En español, 'poner en peligro' comunica esa fuerza con naturalidad; 'arriesgaron' sería más interpretativo.
- source_word: οἷς
  english_pob_choice: to whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - a los cuales
  lexicon: BDAG
  rationale: El dativo con εὐχαριστῶ se expresa naturalmente con 'a quienes' en español.
- source_word: οὐκ ἐγὼ μόνος εὐχαριστῶ ἀλλὰ καὶ
  english_pob_choice: not only I give thanks, but also
  chosen_spanish: no solo yo doy gracias, sino también
  alternatives_spanish:
  - no soy yo solo el que da gracias, sino también
  - no solo yo estoy agradecido, sino también
  lexicon: BDAG
  rationale: Conserva el contraste enfático entre Pablo y el resto de las iglesias, manteniendo el verbo de acción 'dar gracias' como en el griego.
- source_word: πᾶσαι αἱ ἐκκλησίαι
  english_pob_choice: all the churches
  chosen_spanish: todas las iglesias
  alternatives_spanish:
  - todas las congregaciones
  - todas las asambleas
  lexicon: BDAG
  rationale: '''Iglesias'' es la correspondencia normal y transparente para ἐκκλησίαι en este contexto eclesial plural.'
- source_word: τῶν ἐθνῶν
  english_pob_choice: of the Gentiles
  chosen_spanish: de los gentiles
  alternatives_spanish:
  - de las naciones
  lexicon: BDAG
  rationale: En el uso paulino ἔθνη suele referirse a los no judíos; 'gentiles' preserva mejor esa distinción que 'naciones'.
theological_decisions:
- issue: Sentido de ψυχή en el contexto de riesgo mortal
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  rationale: El contexto es el de una acción sacrificial que expone a peligro real; por eso 'vida' es la lectura más fiel y evita una antropología más abstracta que el texto no exige.
  doctrine_reference: Primacía del contexto léxico sobre la tradición de traducción
- issue: Identidad de las iglesias de los gentiles
  english_pob_reading: all the churches of the Gentiles
  chosen_spanish_reading: todas las iglesias de los gentiles
  alternative_spanish_readings:
  - todas las iglesias de las naciones
  rationale: Pablo suele usar ἔθνη para designar a los no judíos. La lectura con 'gentiles' conserva el contraste judíos/gentiles presente en Romanos.
  doctrine_reference: Uso paulino de ἔθνη y coherencia canónica
translation_notes:
  revision_awareness: La base inglesa revisada cambió de 'neck' a 'necks' para reflejar mejor el plural del referente, aunque el griego conserva el singular idiomático. La redacción española sigue esa decisión revisada y, al mismo tiempo, mantiene la posibilidad literal del singular en la nota.
  spanish_consistency_notes:
  - Se mantiene 'gentiles' para ἔθνη en coherencia con el léxico paulino y con el tratamiento POB del contraste étnico-teológico.
  - Se conserva el registro sobrio y eclesial de 'dar gracias' frente a una paráfrasis más libre.
  - Se evita 'alma' como traducción principal de ψυχή porque en este pasaje el referente es la vida de Pablo en peligro.
