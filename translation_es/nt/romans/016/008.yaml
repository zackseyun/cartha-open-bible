translation:
  language: es
  text: Saluden a Ampliato[a], mi querido en el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma del nombre griego también puede representarse como «Amplias»; la lectura de SBLGNT aquí apoya «Ampliato».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Dense saludos a
  - Saluden a
  lexicon: BDAG
  rationale: El imperativo aoristo medio plural funciona aquí como fórmula epistolar de saludo. En español, "saluden" transmite la misma acción breve y directa sin recargar el texto.
- source_word: Ἀμπλιᾶτον
  english_pob_choice: Ampliatus
  chosen_spanish: Ampliato
  alternatives_spanish:
  - Amplias
  lexicon: BDAG
  rationale: Se translitera el nombre propio según la forma apoyada por el texto SBLGNT. La nota conserva la alternativa documentada "Amplias" como variante de forma de nombre.
- source_word: ἀγαπητόν μου
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado
  - mi querido
  - el que amo
  lexicon: BDAG
  rationale: '"Amado" conserva el valor relacional afectivo de ἀγαπητός con naturalidad en español. Se evita "querido" por ser menos preciso en registro eclesial y "el que amo" por ser más explicativo que el griego.'
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en el Señor Jesús
  - en Señor
  lexicon: BDAG
  rationale: El giro paulino se mantiene como expresión de esfera/relación cristiana. Aunque el proyecto usa "Yahvé" para el nombre divino, aquí κύριος en contexto cristológico-paulino se traduce de forma estable como "Señor", tal como en el audit trail inglés.
theological_decisions:
- issue: Relación entre el cariño de Pablo y la frase ἐν κυρίῳ
  english_pob_reading: 'Paul identifies Ampliatus as ''my beloved'' specifically within the sphere of Christian fellowship: ''my beloved in the Lord.'''
  chosen_spanish_reading: 'Pablo presenta a Ampliato como "mi amado" dentro de la esfera de comunión cristiana: "en el Señor".'
  alternative_spanish_readings:
  - mi querido amigo sin matiz teológico
  - mi amado, y además él está en el Señor
  rationale: La sintaxis del griego une de manera natural el calificativo y la frase preposicional al nombre. Mantener "en el Señor" conserva el matiz teológico de pertenencia y comunión sin convertirlo en simple afecto privado.
  doctrine_reference: 'Translation philosophy §§2, 3, 6; contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura SBLGNT indicada en el paquete fuente y mantiene sin cambios relevantes la decisión auditada del POB inglés: nombre propio transliterado como Ampliatus/Ampliato y la expresión fija «in the Lord» → «en el Señor».'
  spanish_consistency_notes:
  - Se mantiene un registro breve y epistolar, adecuado para una línea de salutación.
  - No se introduce «Cristo» ni «Jesús» porque el griego solo dice κύριος y el audit trail inglés conserva «the Lord».
  - La nota de variante del nombre se ancla directamente en el nombre propio para preservar la transparencia textual.
