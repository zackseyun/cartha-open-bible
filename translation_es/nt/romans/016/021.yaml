translation:
  language: es
  text: Timoteo, mi colaborador, les envía saludos; y también Lucio, Jasón y Sosípater, mis compatriotas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis parientes» o «mis correligionarios judíos». El término griego puede referirse a familiares o a una relación de parentesco o identidad étnica más amplia.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάζεται
  english_pob_choice: greets
  chosen_spanish: les envía saludos
  alternatives_spanish:
  - los saluda
  - les saluda
  - les envía un saludo
  lexicon: BDAG
  rationale: En el contexto epistolar, ἀσπάζομαι expresa un saludo dirigido a los destinatarios. En español, «les envía saludos» reproduce con naturalidad ese valor sin añadir intensificación no marcada por el griego.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - los
  - a ustedes
  lexicon: BDAG
  rationale: El pronombre es plural y objeto directo/indirecto de la fórmula de saludo dirigida a la comunidad romana. «Les» mantiene la referencia colectiva de manera natural en español.
- source_word: συνεργός
  english_pob_choice: fellow worker
  chosen_spanish: colaborador
  alternatives_spanish:
  - compañero de trabajo
  - cooperador
  - co-trabajador
  lexicon: BDAG
  rationale: «Colaborador» comunica la idea de labor conjunta en un registro más natural para el español bíblico actual. Conserva el sentido de cooperación ministerial sin sonar demasiado técnico o corporativo.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - mío
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa de modo directo con «mi», que enlaza a Timoteo con Pablo como su colaborador.
- source_word: Λούκιος
  english_pob_choice: Lucius
  chosen_spanish: Lucio
  alternatives_spanish:
  - Lucas
  lexicon: BDAG
  rationale: 'El nombre propio se translitera según el uso español habitual: «Lucio».'
- source_word: Ἰάσων
  english_pob_choice: Jason
  chosen_spanish: Jasón
  alternatives_spanish:
  - Jason
  lexicon: BDAG
  rationale: La forma española estándar del nombre es «Jasón».
- source_word: Σωσίπατρος
  english_pob_choice: Sosipater
  chosen_spanish: Sosípater
  alternatives_spanish:
  - Sópater
  lexicon: BDAG
  rationale: La forma griega de este versículo es Σωσίπατρος, por lo que la transliteración directa en español es «Sosípater». Se conserva así la forma más cercana al testimonio del texto.
- source_word: συγγενεῖς
  english_pob_choice: kinsmen
  chosen_spanish: parientes
  alternatives_spanish:
  - familiares
  - consanguíneos
  - paisanos
  lexicon: BDAG
  rationale: συγγενής puede referirse a parientes de sangre o a una relación de parentesco/solidaridad más amplia. «Parientes» preserva esa amplitud mejor que una opción más cerrada, y no fuerza una lectura etnológica que el versículo no especifica.
theological_decisions:
- issue: Alcance de συγγενεῖς μου
  english_pob_reading: my kinsmen
  chosen_spanish_reading: mis parientes
  alternative_spanish_readings:
  - mis familiares
  - mis compatriotas judíos
  rationale: El texto no aclara si Pablo habla de parentesco familiar o de una relación étnico-judía más amplia. «Mis parientes» mantiene abierta la ambigüedad, como hace la traducción inglesa auditada con «kinsmen», sin resolverla doctrinal o históricamente.
  doctrine_reference: Preservar la tensión lexical sin sobreinterpretarla.
translation_notes:
  revision_awareness: El texto inglés auditado no muestra cambios recientes; la lectura española sigue de cerca el griego y preserva la ambigüedad documentada en συγγενεῖς sin introducir una interpretación restrictiva.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el original lo exige; este versículo no contiene el nombre divino.
  - Se transliteran los nombres propios conforme al uso español habitual y al soporte griego del pasaje.
  - «Colaborador» evita el calco rígido de «fellow worker» y resulta natural en español sin perder el sentido de cooperación ministerial.
  - La nota al pie se ancla en «parientes[a]» porque allí se concentra la alternativa lexical relevante.
