translation:
  language: es
  text: para que la[a] reciban en el Señor, de un modo digno de los santos, y la[b] ayuden en cualquier asunto que necesite de ustedes; porque ella misma ha llegado a ser benefactora[c] de muchos, y también de mí mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acojan»; el verbo griego puede significar recibir favorablemente o acoger.
    reason: lexical_alternative
  - marker: b
    text: O «asistan»; παραστῆτε puede expresar ayuda práctica o apoyo concreto.
    reason: lexical_alternative
  - marker: c
    text: O «patrona» o «protectora»; προστάτις señala a una mujer que ha brindado respaldo o patronazgo a otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδέξησθε
  english_pob_choice: welcome
  chosen_spanish: reciban
  alternatives_spanish:
  - acojan
  - den la bienvenida
  - acepten
  lexicon: BDAG
  rationale: En este contexto, προσδέξησθε implica recibir favorablemente a una creyente dentro de la comunión. «Reciban» conserva el sentido de acogida sin sonar forzado en español; «den la bienvenida» es posible, pero resulta más explicativo que el griego.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - como pertenecientes al Señor
  - como hermanos en el Señor
  lexicon: BDAG
  rationale: La locución paulina se mantiene de manera directa. «En el Señor» es idiomática, transparente y conserva la relación de esfera/comunión cristiana del original.
- source_word: ἀξίως τῶν ἁγίων
  english_pob_choice: in a manner worthy of the saints
  chosen_spanish: de un modo digno de los santos
  alternatives_spanish:
  - como conviene a los santos
  - dignamente, como santos
  lexicon: BDAG
  rationale: «Digno de» reproduce con naturalidad el valor adverbial de ἀξίως. «Los santos» conserva el uso paulino para los creyentes, en vez de sustituirlo por una paráfrasis más genérica.
- source_word: παραστῆτε αὐτῇ
  english_pob_choice: assist her
  chosen_spanish: la ayuden
  alternatives_spanish:
  - la asistan
  - la apoyen
  - estén junto a ella
  lexicon: BDAG
  rationale: El contexto pide ayuda concreta o apoyo práctico; por eso «la ayuden» comunica el sentido sin perder la amplitud del verbo. Se evita «estén junto a ella» por ser más literal pero menos claro en español.
- source_word: ἐν ᾧ ἂν ὑμῶν χρῄζῃ πράγματι
  english_pob_choice: in whatever matter she may need from you
  chosen_spanish: en cualquier asunto que necesite de ustedes
  alternatives_spanish:
  - en lo que ella necesite de ustedes
  - en cualquier cosa que requiera de ustedes
  - en cualquier asunto de que tenga necesidad de ustedes
  lexicon: BDAG
  rationale: «Asunto» cubre el valor amplio de πρᾶγμα y evita restringirlo a un tipo específico de ayuda. La construcción «necesite de ustedes» refleja el genitivo ὑμῶν y su dependencia práctica.
- source_word: προστάτις
  english_pob_choice: patron
  chosen_spanish: protectora
  alternatives_spanish:
  - patrona
  - benefactora
  - apoyadora
  lexicon: BDAG
  rationale: En español, «patrona» puede sonar excesivamente técnico o ambiguo, y «benefactora» expresa ayuda pero no el matiz de amparo/respaldar. «Protectora» conserva la idea de alguien que se pone al frente en apoyo de otros, aunque implica una decisión de claridad frente al trasfondo social del término griego.
- source_word: πολλῶν
  english_pob_choice: many
  chosen_spanish: de muchos
  alternatives_spanish:
  - de muchísimos
  - de muchas personas
  lexicon: BDAG
  rationale: Se conserva la indefinición del genitivo plural. «De muchos» es breve y fiel, sin añadir «personas» que no aparece en el griego.
- source_word: ἐγενήθη
  english_pob_choice: has become
  chosen_spanish: ha venido a ser
  alternatives_spanish:
  - se hizo
  - se convirtió en
  - llegó a ser
  lexicon: BDAG
  rationale: El aoristo se puede verter con valor resultativo. «Ha venido a ser» comunica una condición ya establecida y mantiene un tono formal adecuado.
- source_word: ἐμοῦ αὐτοῦ
  english_pob_choice: of myself as well
  chosen_spanish: también mía
  alternatives_spanish:
  - de mí mismo también
  - aun de mí
  - incluso mía
  lexicon: BDAG
  rationale: El énfasis del pronombre se refleja con «también mía», que en español suena natural dentro de la frase final. Aunque no reproduce palabra por palabra la duplicación enfática, sí conserva la fuerza aditiva y personal del cierre.
theological_decisions:
- issue: Cómo expresar la relación comunitaria con Phoebe sin reducirla a mera cortesía
  english_pob_reading: welcome her in the Lord
  chosen_spanish_reading: reciban en el Señor
  alternative_spanish_readings:
  - acojan en el Señor
  - den la bienvenida en el Señor
  rationale: La expresión mantiene que la recepción de Febe ocurre dentro del ámbito del Señor, no solo como etiqueta social. «Reciban» evita tanto la frialdad de «acepten» como una expansión innecesaria.
  doctrine_reference: Romanos 16:1-2; pragmática paulina de comunión en Cristo
- issue: El valor social y ministerial de προστάτις aplicado a Febe
  english_pob_reading: patron
  chosen_spanish_reading: protectora
  alternative_spanish_readings:
  - benefactora
  - patrona
  - apoyadora
  rationale: El griego sugiere una mujer que ha ejercido apoyo efectivo y reconocido sobre muchos. En español, «protectora» preserva la iniciativa y el respaldo personal sin imponer un título eclesiástico posterior; a la vez, evita minimizar su rol con una palabra demasiado genérica.
  doctrine_reference: Romanos 16:1-2; lectura sociohistórica del término προστάτις
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, especialmente la preferencia por «assist her» frente a «stand by her». En español se optó por «la ayuden», que expresa asistencia concreta con naturalidad. También se mantuvo la estructura final con el énfasis personal de ἐμοῦ αὐτοῦ mediante «también mía», aunque el español no reproduce literalmente la duplicación enfática del griego.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en esta locución paulina fija.
  - Se conserva «santos» para ἁγίων en sentido de creyentes consagrados.
  - Se evita «Cristo» porque el texto no usa Χριστός.
  - Se evita «siervo» o «sirviente» para verbos de apoyo; el contexto requiere ayuda práctica.
  - Se eligió un registro digno y claro, sin arcaísmos de tradición confesional cuando el español moderno resulta más fiel.
