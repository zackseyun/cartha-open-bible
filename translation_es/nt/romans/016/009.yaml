lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Den saludos a
  - Saluden a
  lexicon: BDAG
  rationale: El imperativo plural de ἀσπάζομαι en listas de saludos se expresa naturalmente en español con «saluden». Conserva el tono breve y epistolar del mandato sin sonar forzado.
- source_word: Οὐρβανὸν
  english_pob_choice: Urbanus
  chosen_spanish: Urbano
  alternatives_spanish:
  - Urbanus
  lexicon: BDAG
  rationale: El nombre griego reproduce un nombre latino; en español bíblico es más natural adaptar la forma al patrón usual de nombres propios, sin perder la identificación histórica.
- source_word: συνεργὸν
  english_pob_choice: fellow worker
  chosen_spanish: colaborador
  alternatives_spanish:
  - compañero de obra
  - cooperador
  lexicon: BDAG
  rationale: συνεργός denota a alguien que trabaja junto con otro. «Colaborador» comunica bien la cooperación ministerial en español moderno y mantiene dignidad de registro.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - de nosotros
  lexicon: BDAG
  rationale: El genitivo posesivo se vierte idiomáticamente como «nuestro», indicando participación compartida en la obra.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Se conserva la decisión terminológica del POB de rendir Χριστός como «Mesías» cuando funciona como título, no como nombre litúrgico fijo. Aquí expresa la esfera/relación de pertenencia en lenguaje titular.
- source_word: Στάχυν
  english_pob_choice: Stachys
  chosen_spanish: Stachis
  alternatives_spanish:
  - Stachys
  lexicon: BDAG
  rationale: Nombre propio transliterado al español con adaptación gráfica mínima para lectura natural, manteniendo la referencia al mismo nombre griego.
- source_word: ἀγαπητόν μου
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi querido
  - el amado mío
  lexicon: BDAG
  rationale: ἀγαπητός en apposición personal puede expresarse como «amado» o «querido». «Mi amado» preserva la calidez del vínculo y la correspondencia semántica con el campo de ἀγαπάω/ἀγάπη.
theological_decisions:
- issue: Renderización de Χριστός en ἐν Χριστῷ
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene la política del POB de usar «Mesías» cuando Χριστός conserva fuerza titular. Aunque «Cristo» es común en español eclesial, aquí la opción titular es más transparente y coherente con el criterio auditado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός *Christos*'
translation_notes:
  revision_awareness: El audit trail en inglés muestra una oscilación editorial entre «Messiah» y «Christ» para ἐν Χριστῷ, con restauración final de «Messiah» por coherencia doctrinal. La traducción española sigue la lectura final auditada y conserva la ambigüedad útil mediante nota, sin borrar la tensión terminológica.
  spanish_consistency_notes:
  - Se mantiene un registro epistolar breve y directo, propio de una lista de saludos.
  - Los nombres propios se transliteran con adaptación habitual al español cuando mejora la lectura.
  - «Mesías» se reserva para Χριστός en su valor titular, conforme al criterio del POB.
  - «Mi amado» conserva la afectividad del original sin añadir matices no presentes en el griego.
