    text: 'Junia: alternativamente, «Junias», un nombre masculino; la lectura femenina es más probable por la forma griega y por el uso histórico.'
    reason: alternative_reading
  - marker: b
    text: O «sobresalientes entre los apóstoles»; la expresión también puede entenderse como «bien conocidos por los apóstoles».
    reason: lexical_alternative
  revision_rationale: 'Se mantiene todo el borrador salvo la cláusula final. Se cambia «estuvieron en el Mesías» por «llegaron a estar en el Mesías» para reflejar mejor γέγοναν ἐν Χριστῷ: una condición alcanzada antes que Pablo, no meramente un estado pasado ya terminado.'
