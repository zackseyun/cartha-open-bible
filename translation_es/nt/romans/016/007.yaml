  text: ἀσπάσασθε Ἀνδρόνικον καὶ ⸀Ἰουνίαν τοὺς συγγενεῖς μου καὶ συναιχμαλώτους μου, οἵτινές εἰσιν ἐπίσημοι ἐν τοῖς ἀποστόλοις, οἳ καὶ πρὸ ἐμοῦ ⸀γέγοναν ἐν Χριστῷ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/016/007.yaml
  text: Greet Andronicus and Junia[a], my kinsmen and my fellow prisoners. They are notable among the apostles[b], and they were in Messiah before me.
  footnotes:
  - marker: a
    text: 'Junia: alternatively, ''Junias,'' a masculine name; the feminine reading is more likely from the Greek form and historical usage.'
    reason: alternative_reading
  - marker: b
    text: Or 'outstanding among the apostles'; the phrase may also be understood as 'well known to the apostles.'
    reason: lexical_alternative
