translation:
  language: es
  text: Saluden a Andrónico y a Junia[a], mis parientes y mis compañeros de prisión. Son notables entre los apóstoles[b], y llegaron a estar en el Mesías antes que yo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Junia: alternativamente, «Junias», un nombre masculino; la lectura femenina es más probable por la forma griega y por el uso histórico.'
    reason: alternative_reading
  - marker: b
    text: O «sobresalientes entre los apóstoles»; la expresión también puede entenderse como «bien conocidos por los apóstoles».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Den saludos a
  - Saluden a
  lexicon: BDAG
  rationale: El imperativo epistolar pide expresar un saludo dirigido. «Saluden a» es natural en español y conserva el valor directo del mandato sin sobrecargarlo.
- source_word: Ἀνδρόνικον
  english_pob_choice: Andronicus
  chosen_spanish: Andrónico
  lexicon: Convención onomástica estándar
  rationale: Nombre propio transliterado al español de forma habitual y reconocible.
- source_word: Ἰουνίαν
  english_pob_choice: Junia
  chosen_spanish: Junia
  alternatives_spanish:
  - Junias
  lexicon: BDAG
  rationale: La forma griega se entiende de manera más natural como el nombre femenino Junia. Se conserva la alternativa masculina en nota por la discusión histórica existente.
- source_word: συγγενεῖς μου
  english_pob_choice: my kinsmen
  chosen_spanish: mis parientes
  alternatives_spanish:
  - mis familiares
  - mis compatriotas
  - mis parientes de sangre
  lexicon: BDAG
  rationale: «Parientes» mantiene el rango semántico posible de συγγενεῖς sin forzar la referencia a «familiares» en sentido estrecho ni a «judíos» como interpretación más específica de lo que el texto prueba.
- source_word: συναιχμαλώτους μου
  english_pob_choice: my fellow prisoners
  chosen_spanish: mis compañeros de prisión
  alternatives_spanish:
  - mis compañeros de cautiverio
  - mis co-presos
  lexicon: BDAG
  rationale: El compuesto expresa personas que comparten el cautiverio. «Compañeros de prisión» es claro en español y preserva el sentido concreto.
- source_word: ἐπίσημοι
  english_pob_choice: notable
  chosen_spanish: notables
  alternatives_spanish:
  - distinguido
  - célebre
  - sobresalientes
  - bien conocidos
  lexicon: BDAG
  rationale: «Notables» refleja bien el valor de prestigio o prominencia. Se evita decidir demasiado pronto entre «renombrados» o «bien conocidos».
- source_word: ἐν τοῖς ἀποστόλοις
  english_pob_choice: among the apostles
  chosen_spanish: entre los apóstoles
  alternatives_spanish:
  - entre los apóstoles
  - para los apóstoles
  - ante los apóstoles
  lexicon: BDAG
  rationale: '«Entre los apóstoles» reproduce la lectura más directa de la preposición y mantiene abierta la tensión: puede señalar pertenencia al círculo apostólico o reconocimiento dentro de él.'
- source_word: πρὸ ἐμοῦ
  english_pob_choice: before me
  chosen_spanish: antes que yo
  alternatives_spanish:
  - antes de mí
  - con anterioridad a mí
  lexicon: BDAG
  rationale: Expresa prioridad temporal de manera natural y clara en español.
- source_word: γέγοναν ἐν Χριστῷ
  english_pob_choice: they were in Messiah
  chosen_spanish: estuvieron en el Mesías
  alternatives_spanish:
  - están en el Mesías
  - vinieron a estar en el Mesías
  - llegaron a estar en el Mesías
  lexicon: BDAG
  rationale: Se conserva «Mesías» para Χριστός conforme a la guía doctrinal del proyecto. El perfecto de γίνομαι sugiere un estado alcanzado que precede a Pablo; «estuvieron en el Mesías» comunica esa anterioridad sin convertirlo en una paráfrasis sobre conversión.
theological_decisions:
- issue: Identidad y género de Ἰουνίαν
  english_pob_reading: Junia is rendered as a feminine personal name.
  chosen_spanish_reading: Junia se traduce como nombre femenino.
  alternative_spanish_readings:
  - Junias como nombre masculino
  rationale: La forma griega favorece la lectura femenina. Mantener Junia sigue la prioridad del texto original y deja constancia de la alternativa histórica en nota.
  doctrine_reference: Translation philosophy §1–§3
- issue: Alcance de ἐπίσημοι ἐν τοῖς ἀποστόλοις
  english_pob_reading: Notable among the apostles, with a footnote allowing 'outstanding among the apostles' or 'well known to the apostles'.
  chosen_spanish_reading: «Notables entre los apóstoles» con nota alternativa.
  alternative_spanish_readings:
  - sobresalientes entre los apóstoles
  - bien conocidos por los apóstoles
  rationale: La frase es genuinamente ambigua. «Notables entre los apóstoles» conserva la fuerza descriptiva sin cerrar innecesariamente la cuestión de si se los incluye en el grupo apostólico o si solo gozan de reconocimiento entre ellos.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'He seguido el estado de revisión más reciente y su corrección: se restablece «Mesías» para Χριστός, conforme a la política doctrinal del proyecto. También se conserva la tensión interpretativa de ἐπίσημοι ἐν τοῖς ἀποστόλοις sin resolverla en exceso.'
  spanish_consistency_notes:
  - Uso «Mesías» para Χριστός, coherente con la guía del proyecto y la revisión posterior que revirtió «Cristo» en este versículo.
  - «Junia» se mantiene como nombre femenino en el texto principal, con la alternativa masculina solo en nota.
  - «Entre los apóstoles» preserva la ambigüedad del griego y se complementa con una nota que explicita la alternativa semántica.
  - «Compañeros de prisión» traduce el compuesto con naturalidad sin perder la referencia concreta al cautiverio.
