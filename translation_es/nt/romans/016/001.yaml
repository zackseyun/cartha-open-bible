translation:
  language: es
  text: Ahora les presento a Febe[a], nuestra hermana, quien también es servidora de la iglesia en Cencreas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diácono» o «ministra» de la iglesia en Cencreas. El término griego diakonos puede referirse tanto a un cargo ministerial reconocido como, de manera más general, a una persona que sirve.
    reason: alternative_reading
lexical_decisions:
- source_word: Συνίστημι
  english_pob_choice: I commend
  chosen_spanish: les recomiendo
  alternatives_spanish:
  - les encomiendo
  - les presento
  lexicon: BDAG
  rationale: En contexto epistolar, συνίστημι introduce favorablemente a una persona ante los destinatarios. «Les recomiendo» expresa bien la función de presentación/aprobación en español actual sin perder el matiz relacional.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pues
  lexicon: BDAG
  rationale: δέ marca transición suave. «Ahora» suena natural en español y conserva el cambio discursivo sin forzar contraste.
- source_word: Φοίβην
  english_pob_choice: Phoebe
  chosen_spanish: Febe
  alternatives_spanish:
  - Fébe
  lexicon: conventional transliteration
  rationale: El nombre propio se adapta a la forma española usual «Febe», manteniendo la identificación personal sin explicar el nombre.
- source_word: τὴν ἀδελφὴν ἡμῶν
  english_pob_choice: our sister
  chosen_spanish: nuestra hermana
  alternatives_spanish:
  - hermana en la fe
  - nuestra hermana en la fe
  lexicon: BDAG
  rationale: ἀδελφή con ἡμῶν en Pablo señala una hermana creyente. «Nuestra hermana» reproduce la relación familiar de la comunidad sin añadir glosa al texto principal.
- source_word: οὖσαν καὶ
  english_pob_choice: who is also
  chosen_spanish: que también es
  alternatives_spanish:
  - siendo también
  - y que es también
  lexicon: BDAG
  rationale: El participio añade información identificadora. «Que también es» conserva el valor aditivo de καί y fluye de manera natural en español.
- source_word: διάκονον
  english_pob_choice: a deacon
  chosen_spanish: diaconisa
  alternatives_spanish:
  - servidora
  - ministra
  - diácono
  lexicon: BDAG
  rationale: El término διάκονος puede referirse a un servidor general o a un cargo eclesial reconocido. Dado que el griego lo aplica a una mujer y el castellano requiere concordancia natural, «diaconisa» comunica la posible función ministerial sin borrar la discusión lexical. La alternativa de «servidora» queda implícita en la nota.
- source_word: τῆς ἐκκλησίας
  english_pob_choice: of the church
  chosen_spanish: de la iglesia
  alternatives_spanish:
  - de la asamblea
  lexicon: BDAG
  rationale: ἐκκλησία se refiere normalmente a la comunidad cristiana. «Iglesia» es la equivalencia clara y estándar en este contexto.
- source_word: τῆς ἐν Κεγχρεαῖς
  english_pob_choice: in Cenchreae
  chosen_spanish: en Cencrea
  alternatives_spanish:
  - en Céncreas
  lexicon: BDAG
  rationale: El topónimo Κεγχρεαί se translitera como «Cencrea» en español bíblico común. La preposición se conserva de forma directa.
theological_decisions:
- issue: Cómo reflejar διάκονον sin borrar la tensión entre cargo ministerial y servicio general
  english_pob_reading: a deacon, with alternatives a servant or a minister preserved in a footnote
  chosen_spanish_reading: diaconisa
  alternative_spanish_readings:
  - servidora
  - ministra
  - diácono
  rationale: El audit trail inglés deja abierta la ambigüedad de διάκονος, pero favorece un sentido de rol eclesial. En español, «diaconisa» mantiene esa posibilidad y además ajusta naturalmente el género de Febe. La nota conserva la alternativa de servicio general, para no cerrar indebidamente la discusión.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Si traducir ἐκκλησία como una institución formal o como la congregación local
  english_pob_reading: of the church in Cenchreae
  chosen_spanish_reading: de la iglesia en Cencrea
  alternative_spanish_readings:
  - de la congregación en Cencrea
  - de la asamblea en Cencrea
  rationale: El contexto local y la práctica paulina favorecen una comunidad concreta. «Iglesia» mantiene la referencia eclesial sin introducir una estructura denominacional posterior.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés se mantuvieron estables en la última revisión; no hubo cambios en la decisión sobre συνίστημι, δέ o διάκονον. La versión española sigue ese mismo análisis, adaptando solo la forma natural del español y la concordancia de género.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «iglesia» por coherencia con el audit trail y el uso paulino, sin añadir mayúsculas teológicas innecesarias.
  - Se usó «Febe» como transliteración española estable y «Cencrea» para el topónimo usual en español bíblico.
  - La nota conserva la tensión lexical de διάκονος en lugar de resolverla de manera dogmática.
