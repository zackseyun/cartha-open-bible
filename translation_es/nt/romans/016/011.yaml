translation:
  language: es
  text: Saluden a Herodión, mi pariente[a]. Saluden a los de Narciso[b], los que están en el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi pariente» o «mi compatriota judío»; el término griego puede referirse a un pariente de sangre o a un miembro del pueblo de Pablo.'
    reason: lexical_alternative
  - marker: b
    text: Probablemente se refiere a personas de la casa o del patrimonio de Narciso que eran creyentes.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Den saludos a
  - Saluden a
  lexicon: BDAG
  rationale: En saludos epistolares, ἀσπάζομαι funciona como fórmula de saludo. «Saluden» es natural en español contemporáneo y conserva el carácter directo del imperativo plural. «Den saludos a» suena más perifrástico y menos ágil.
- source_word: Ἡρῳδίωνα
  english_pob_choice: Herodion
  chosen_spanish: Herodión
  alternatives_spanish:
  - Herodion
  lexicon: Convención transliterativa
  rationale: Se conserva el nombre propio por transliteración. «Herodión» adapta la acentuación al español y sigue siendo transparente para el lector.
- source_word: συγγενῆ μου
  english_pob_choice: my kinsman
  chosen_spanish: mi pariente
  alternatives_spanish:
  - mi kinsman
  - mi familiar
  - mi compatriota
  lexicon: BDAG
  rationale: En español, «kinsman» no es idiomático. «Pariente» conserva la amplitud semántica de συγγενής sin decidir entre parentesco de sangre y pertenencia étnica. «Familiar» puede sonar más vago; «compatriota» resuelve demasiado en favor del sentido étnico.
- source_word: τοὺς ἐκ τῶν Ναρκίσσου
  english_pob_choice: those of Narcissus
  chosen_spanish: los de Narciso
  alternatives_spanish:
  - los que son de Narciso
  - los de la casa de Narciso
  - los de la familia de Narciso
  lexicon: BDAG
  rationale: La expresión griega marca asociación con Narciso, pero no dice explícitamente «casa» o «hogar». «Los de Narciso» preserva la ambigüedad del original y suena natural en español. Se evita explicitar la relación como doméstica en el texto principal.
- source_word: τοὺς ὄντας ἐν κυρίῳ
  english_pob_choice: who are in the Lord
  chosen_spanish: los que están en el Señor
  alternatives_spanish:
  - los que están en el Señor
  - los que pertenecen al Señor
  - los creyentes en el Señor
  lexicon: BDAG
  rationale: Se conserva la locución paulina «en el Señor», que en español eclesial es clara y mantiene la fuerza relacional del griego. «Pertenecen al Señor» o «creyentes» explicitan más de lo que el texto dice.
- source_word: κυρίῳ
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor
  - Dueño
  lexicon: BDAG
  rationale: En la expresión paulina, κύριος debe leerse como título cristiano reverente. «Señor» mantiene el valor confesional sin introducir una paráfrasis como «Dueño».
theological_decisions:
- issue: Alcance de συγγενής en Romanos 16:11
  english_pob_reading: Rendered broadly as 'my kinsman' rather than specifying either blood relative or fellow Jew.
  chosen_spanish_reading: «mi pariente» deja abierto si se trata de un pariente de sangre o de un compatriota judío.
  alternative_spanish_readings:
  - mi familiar
  - mi compatriota
  rationale: El griego admite ambas posibilidades y el contexto no obliga a cerrarlas. La traducción evita resolver la tensión y conserva la amplitud del término.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
- issue: Identidad de «los de Narciso»
  english_pob_reading: Rendered as 'those of Narcissus' without adding 'household' to the main text.
  chosen_spanish_reading: «los de Narciso» sin añadir «casa» o «hogar» en el texto principal.
  alternative_spanish_readings:
  - los de la casa de Narciso
  - los de la familia de Narciso
  rationale: El genitivo griego indica asociación con Narciso, pero no introduce explícitamente el sustantivo «casa». El texto español principal conserva esa reserva y no importan detalles que el griego no formula de manera directa.
  doctrine_reference: Original-language primacy; Never paraphrase beyond what the source text warrants.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios sustanciales; se mantiene la solución óptima ya acordada entre el texto griego y el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en la fórmula paulina «en el Señor».
  - Se evita «Cristo» porque el versículo no usa Χριστός ni una fórmula cristológica equivalente.
  - Se conserva la ambigüedad de συγγενῆ sin forzar parentesco biológico.
  - Se evita introducir «casa» en el texto principal para τοὺς ἐκ τῶν Ναρκίσσου, aunque se explicita la posibilidad en nota.
