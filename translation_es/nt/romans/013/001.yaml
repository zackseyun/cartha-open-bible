revisions:
- from: Que toda persona[a] esté sujeta a las autoridades superiores, porque no hay autoridad sino de parte de Dios[b]; y las que existen han sido establecidas por Dios.
  to: Que toda persona[a] esté sujeta a las autoridades superiores, porque no hay autoridad sino de parte de Dios; y las que existen han sido ordenadas[b] por Dios.
  rationale: Se conserva la estructura y legibilidad del borrador, pero se mueve la nota [b] al verbo final para que corresponda al campo semántico de τεταγμέναι y a la auditoría inglesa. También se cambia 'establecidas' por 'ordenadas', que refleja mejor el matiz de disposición/ordenamiento divino sin implicar aprobación moral total. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:11:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido global del griego: mandato universal, referencia a autoridades civiles en posición superior, procedencia divina de la autoridad y ordenamiento divino de las autoridades existentes. Sin embargo, dos decisiones requieren ajuste: la nota [b] está mal anclada semánticamente porque las alternativas ''por Dios'' y ''de Dios'' corresponden mejor a la cláusula final ''han sido ... por Dios'' que a ''de parte de Dios''; y ''establecidas'' es aceptable pero ''ordenadas'' o ''instituidas'' refleja mejor τεταγμέναι según la evidencia y el rastro POB.'
  spanish_quality_summary: El español es claro y digno. 'Que toda persona esté sujeta...' suena natural y eclesialmente legible. 'Autoridades superiores' funciona, aunque 'autoridades gobernantes' también sería posible. La principal mejora es alinear mejor la nota y afinar el verbo final para reflejar el matiz de ordenamiento divino.
  glossary_alignment: 'No hay conflicto con los términos de proyecto: θεοῦ se traduce correctamente como ''Dios''; no aparecen Yahvé, Mesías, esclavo, etc. La elección ''toda persona'' para Πᾶσα ψυχὴ está bien justificada. ''Autoridades superiores'' permanece dentro del margen documentado por la nota inglesa.'
  issues:
  - severity: medium
    issue: La nota [b] no corresponde bien al segmento anclado en el texto.
    rationale: En el POB inglés la nota b recoge alternativas para el lenguaje de ordenamiento divino ('have been instituted/ordered by God'), no para 'from God' en la cláusula media. En español, anclar [b] a 'Dios' en 'de parte de Dios' con alternativas 'por Dios' o 'de Dios' desdibuja la distinción entre procedencia y designación.
  - severity: medium
    issue: '''Han sido establecidas'' atenúa el matiz de τεταγμέναι.'
    rationale: Aunque es una opción posible, τάσσω en perfecto pasivo aquí apunta a haber sido ordenadas/dispuestas/instituidas. 'Establecidas' puede sonar más genérico y menos ligado al ordenamiento que el rastro léxico inglés quiso preservar.
  - severity: low
    issue: Una alternativa española listada contiene un error tipográfico/léxico ajeno al español.
    rationale: En las decisiones léxicas aparece 'han sido नियुक्तadas', que no es español. Aunque no está en el texto principal, conviene corregirlo en revisión editorial.
  revised_spanish_text: Que toda persona[a] esté sujeta a las autoridades superiores, porque no hay autoridad sino de parte de Dios; y las que existen han sido ordenadas[b] por Dios.
  revised_footnotes:
  - marker: a
    text: O “toda alma” o “todos”.
    reason: lexical_alternative
  - marker: b
    text: O “instituidas” o “establecidas”.
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y legibilidad del borrador, pero se mueve la nota [b] al verbo final para que corresponda al campo semántico de τεταγμέναι y a la auditoría inglesa. También se cambia 'establecidas' por 'ordenadas', que refleja mejor el matiz de disposición/ordenamiento divino sin implicar aprobación moral total. No se requiere adjudicación adicional.
