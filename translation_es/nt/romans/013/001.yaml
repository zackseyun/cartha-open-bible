translation:
  language: es
  text: Que toda persona[a] esté sujeta a las autoridades superiores, porque no hay autoridad sino de parte de Dios; y las que existen han sido ordenadas[b] por Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “toda alma” o “todos”.
    reason: lexical_alternative
  - marker: b
    text: O “instituidas” o “establecidas”.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶσα ψυχὴ
  english_pob_choice: every person
  chosen_spanish: toda persona
  alternatives_spanish:
  - toda alma
  - todos
  lexicon: BDAG
  rationale: El griego dice literalmente “toda alma”, pero en este contexto idiomático se refiere a cada persona. “Toda persona” conserva el valor distributivo de πᾶσα ψυχὴ sin introducir una antropología técnica que el pasaje no exige.
- source_word: ἐξουσίαις ὑπερεχούσαις
  english_pob_choice: governing authorities
  chosen_spanish: las autoridades superiores
  alternatives_spanish:
  - las autoridades gobernantes
  - las autoridades superiores en rango
  - las autoridades que gobiernan
  lexicon: BDAG
  rationale: ἐξουσία apunta a autoridad ejercida o delegada, y ὑπερέχω califica esa autoridad como superior en posición. “Autoridades superiores” conserva esa relación de jerarquía sin perder la referencia concreta a autoridades civiles.
- source_word: ὑποτασσέσθω
  english_pob_choice: be subject
  chosen_spanish: esté sujeta
  alternatives_spanish:
  - se someta
  - esté subordinada
  lexicon: BDAG
  rationale: La forma imperativa pasiva/media expresa sujeción ordenada. “Esté sujeta” comunica bien esa idea en español y evita sobrecargar el verbo con matices más fuertes de los que el griego exige.
- source_word: ὑπό θεοῦ
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - por Dios
  - de Dios
  lexicon: BDAG
  rationale: En esta construcción, ὑπό expresa origen o procedencia. “De parte de Dios” mantiene claramente la fuente divina de la autoridad sin convertir la frase en una afirmación más específica de la que el griego pide.
- source_word: τεταγμέναι
  english_pob_choice: have been appointed
  chosen_spanish: han sido establecidas
  alternatives_spanish:
  - han sido नियुक्तadas
  - han sido ordenadas
  - han sido instituidas
  lexicon: BDAG
  rationale: El perfecto pasivo de τάσσω indica un estado resultante de haber sido ordenadas por Dios. “Han sido establecidas” suena natural en español y conserva la idea de disposición/ordenamiento divino sin cerrar la tensión entre orden providencial y aprobación moral.
theological_decisions:
- issue: Relación entre autoridad civil y aprobación divina
  english_pob_reading: The verse affirms that governing authorities derive their authority from God and that existing authorities stand in a divinely ordered relation, without expanding this into an unconditional endorsement of every act of every ruler.
  chosen_spanish_reading: El versículo afirma que las autoridades reciben su autoridad de Dios y que las que existen están en una relación de orden establecida por Dios, sin convertir eso en una aprobación incondicional de todo lo que haga cada gobernante.
  alternative_spanish_readings:
  - una aprobación de todo régimen o acción gubernamental
  - una afirmación solo abstracta sobre la autoridad en general
  rationale: El texto griego habla concretamente de autoridades reales y de las que existen como ordenadas por Dios. “Han sido establecidas” preserva ese dato sin forzar una conclusión teológica más amplia que el versículo no enuncia.
  doctrine_reference: Preservar la tensión teológica del pasaje
- issue: Alcance de ψυχὴ en el contexto
  english_pob_reading: every person
  chosen_spanish_reading: toda persona
  alternative_spanish_readings:
  - toda alma
  - cada uno
  rationale: Aunque la equivalencia literal sería “alma”, en español eso podría sonar a un tecnicismo innecesario o a una resonancia devocional ajena al argumento paulino. “Toda persona” comunica con claridad el sentido distributivo.
  doctrine_reference: Evitar una antropología importada por la traducción
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el rastro auditado en inglés POB; no se requieren revisiones adicionales respecto del último pase, que fue marcado como sin cambios y con alta concordancia.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero aquí el texto dice θεοῦ y no requiere el nombre divino.
  - Se conserva “autoridades” para ἐξουσία en sentido civil, evitando “poderes” por ser menos preciso en este contexto.
  - Se usa “establecidas” para τεταγμέναι, siguiendo la idea de ordenamiento/colocación divina sin añadir lenguaje eclesiástico.
  - La puntuación y el orden sintáctico buscan una lectura natural en español sin alejarse del paralelismo del griego.
