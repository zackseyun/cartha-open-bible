translation:
  language: es
  text: Por tanto, es necesario someterse, no solo por causa de la ira[a], sino también por causa de la conciencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a causa del castigo»; el griego dice «por causa de la ira», lo cual puede referirse ya sea a la acción punitiva del gobernante o, más ampliamente, a la ira divina obrando por medio de la autoridad civil.
    reason: alternative_reading
  - marker: b
    text: O «estar sujeto».
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Conecta inferencialmente con el argumento precedente sobre las autoridades. «Por tanto» preserva la relación lógica con tono digno y natural en español.
- source_word: ἀνάγκη
  english_pob_choice: it is necessary
  chosen_spanish: es necesario
  alternatives_spanish:
  - hay necesidad de
  - uno debe
  lexicon: BDAG
  rationale: La construcción impersonal expresa la necesidad sin añadir sujetos explícitos que el griego no presenta.
- source_word: ὑποτάσσεσθαι
  english_pob_choice: to submit
  chosen_spanish: someterse
  alternatives_spanish:
  - estar sujeto
  - sujetarse
  lexicon: BDAG
  rationale: «Someterse» comunica la respuesta relacional exigida por el contexto. Evita la rigidez de «estar sujeto» y conserva el matiz de respuesta voluntaria que el inglés auditado preserva con «submit».
- source_word: οὐ μόνον
  english_pob_choice: not only
  chosen_spanish: no solo
  alternatives_spanish:
  - no solamente
  lexicon: BDAG
  rationale: Equivale de manera directa a la correlación con ἀλλὰ καί y suena natural en español contemporáneo.
- source_word: διὰ τὴν ὀργὴν
  english_pob_choice: because of wrath
  chosen_spanish: por causa de la ira
  alternatives_spanish:
  - a causa de la ira
  - por motivo de la ira
  lexicon: BDAG
  rationale: '«Ira» mantiene el valor léxico de ὀργή y deja abierta la tensión documentada por el audit trail: puede aludir al castigo del gobernante o, más ampliamente, a la ira divina que opera mediante la autoridad civil. «Por causa de» refleja con naturalidad διά con acusativo.'
- source_word: ἀλλὰ καὶ
  english_pob_choice: but also
  chosen_spanish: sino también
  alternatives_spanish:
  - pero también
  - más también
  lexicon: BDAG
  rationale: En español, la correlación negativa requiere «no solo... sino también...»; expresa con precisión la estructura adversativa-aditiva del griego.
- source_word: διὰ τὴν συνείδησιν
  english_pob_choice: because of conscience
  chosen_spanish: por causa de la conciencia
  alternatives_spanish:
  - a causa de la conciencia
  - por razón de la conciencia
  lexicon: BDAG
  rationale: «Conciencia» traduce συνείδησις de forma estándar y clara. «Por causa de» mantiene el sentido causal/motivacional de διά con acusativo, como en el inglés auditado.
theological_decisions:
- issue: Referente de ὀργή (ira)
  english_pob_reading: Rendered simply as 'wrath' without specifying whether it is divine wrath or the magistrate's punitive wrath.
  chosen_spanish_reading: «ira» sin especificar si se trata de la ira del gobernante o de la ira de Dios
  alternative_spanish_readings:
  - ira de Dios
  - castigo del gobernante
  - pena
  rationale: El texto griego no aclara el referente; la traducción conserva la ambigüedad documentada por el audit trail, evitando resolver una tensión teológica que el contexto permite de más de una manera.
  doctrine_reference: 'POB translation philosophy: preserve theological tension rather than resolve it.'
- issue: Fuerza de ὑποτάσσεσθαι en relación con las autoridades
  english_pob_reading: submit
  chosen_spanish_reading: someterse
  alternative_spanish_readings:
  - estar sujeto
  - sujetarse
  rationale: «Someterse» expresa la postura requerida ante las autoridades sin introducir una obediencia absoluta no afirmada explícitamente por el versículo. Mantiene la equivalencia óptima con el audit trail inglés.
  doctrine_reference: 'POB translation philosophy: optimal-equivalence; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés de la POB. No se registran revisiones posteriores que requieran ajustar la redacción; se conserva la ambigüedad de ὀργή y la fuerza relacional de ὑποτάσσεσθαι.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino explícito; este versículo no lo contiene.
  - «Conciencia» mantiene el valor estándar de συνείδησις sin ampliarlo a «criterio moral» u otra paráfrasis.
  - La construcción «no solo... sino también...» reproduce la correlación griega con naturalidad en español.
  - «Ira» se conserva sin especificar su referente para no eliminar la tensión interpretativa documentada.
