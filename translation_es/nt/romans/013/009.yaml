translation:
  language: es
  text: 'Porque esto: «No cometerás adulterio, no asesinarás[a], no robarás, no codiciarás», y si hay algún otro mandamiento, se resume en esta palabra[b]: «Amarás a tu prójimo como a ti mismo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma tradicional «No matarás» es más amplia; el verbo griego se refiere más precisamente al homicidio ilícito, por eso aquí se traduce «No asesinarás».
    reason: lexical_alternative
  - marker: b
    text: O «se resume en esta declaración». El término griego puede significar «palabra», «declaración» o «dicho» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ γάρ
  english_pob_choice: For this
  chosen_spanish: Porque esto
  alternatives_spanish:
  - Porque
  - Pues esto
  - Para esto
  lexicon: BDAG
  rationale: El artículo neutro con γάρ introduce el contenido al que se refiere la frase precedente. «Porque esto» mantiene el valor explicativo y la referencia inmediata a los mandamientos citados, con español natural.
- source_word: μοιχεύσεις
  english_pob_choice: you shall not commit adultery
  chosen_spanish: No cometerás adulterio
  alternatives_spanish:
  - No adulterarás
  - No cometerás adulterio
  lexicon: BDAG
  rationale: La cita funciona como formulación normativa del mandamiento. «No cometerás adulterio» preserva la forma bíblica tradicional sin perder precisión léxica.
- source_word: φονεύσεις
  english_pob_choice: you shall not murder
  chosen_spanish: No matarás
  alternatives_spanish:
  - No asesinarás
  - No matarás
  lexicon: BDAG
  rationale: φονεύω se refiere a matar homicidamente, no a cualquier forma de matar. En español, «matarás» mantiene la cita decalogal y deja la precisión de sentido indicada en la nota.
- source_word: κλέψεις
  english_pob_choice: you shall not steal
  chosen_spanish: No robarás
  alternatives_spanish:
  - No hurtarás
  - No robarás
  lexicon: BDAG
  rationale: «No robarás» es la forma natural y fiel en español para κλέπτω en este contexto legal.
- source_word: ἐπιθυμήσεις
  english_pob_choice: you shall not covet
  chosen_spanish: No codiciarás
  alternatives_spanish:
  - No desearás desordenadamente
  - No codiciarás
  lexicon: BDAG
  rationale: En el contexto del Decálogo, ἐπιθυμέω apunta al deseo codicioso; «codiciarás» es el equivalente bíblico preciso y reconocible.
- source_word: εἴ τις ἑτέρα ἐντολή
  english_pob_choice: if there is any other commandment
  chosen_spanish: si hay cualquier otro mandamiento
  alternatives_spanish:
  - si existe algún otro mandamiento
  - si hay cualquier otro mandamiento
  lexicon: BDAG
  rationale: La frase amplía el alcance más allá de las prohibiciones enumeradas. «Hay cualquier otro mandamiento» conserva la fuerza indefinida de τις y el valor de ἑτέρα como «otro».
- source_word: ἀνακεφαλαιοῦται
  english_pob_choice: it is summed up
  chosen_spanish: se resume
  alternatives_spanish:
  - se compendia
  - se recapitula
  lexicon: BDAG
  rationale: El verbo significa reunir bajo una sola cabeza o resumir. «Se resume» comunica bien la idea en español moderno sin perder la noción de síntesis.
- source_word: ἐν τῷ λόγῳ τούτῳ
  english_pob_choice: in this word
  chosen_spanish: en esta palabra
  alternatives_spanish:
  - en esta palabra
  - en esta declaración
  - en este dicho
  lexicon: BDAG
  rationale: λόγος puede designar una formulación verbal, declaración o dicho. «Palabra» sigue de cerca el griego y mantiene el tono bíblico; en español sugiere adecuadamente una formulación resumidora.
- source_word: Ἀγαπήσεις
  english_pob_choice: You shall love
  chosen_spanish: Amarás
  alternatives_spanish:
  - Amarás
  - Tienes que amar
  lexicon: BDAG
  rationale: La forma futura funciona como imperativo citando Escritura. «Amarás» conserva el tono de mandato y la cadencia del texto citado.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - prójimo
  - vecino
  lexicon: BDAG
  rationale: En esta cita de Levítico, πλησίον corresponde al término bíblico «prójimo» en español, que preserva la conexión intertextual y el sentido relacional.
- source_word: ὡς σεαυτόν
  english_pob_choice: as yourself
  chosen_spanish: como a ti mismo
  alternatives_spanish:
  - como a ti mismo
  - como uno mismo
  lexicon: BDAG
  rationale: La comparación reflexiva es breve en griego; en español, «como a ti mismo» es la expresión natural y fiel.
theological_decisions:
- issue: Forma normativa de las citas del Decálogo
  english_pob_reading: Traditional covenantal command form ('You shall not ...')
  chosen_spanish_reading: Forma normativa bíblica ('No ...rás')
  alternative_spanish_readings:
  - Imperativo directo ('No ...')
  - Formulación literal futura ('No ...rás')
  rationale: El griego cita los mandamientos en futuro indicativo con valor imperatival. En español, la forma tradicional «No matarás / No robarás / No codiciarás» conserva la intertextualidad con el Decálogo y su autoridad normativa.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable modern Spanish with preserved theological weight'
- issue: Alcance de λόγος en la cláusula de resumen
  english_pob_reading: ‘word’ meaning a summarizing statement/principle
  chosen_spanish_reading: ‘palabra’ con sentido de formulación resumidora
  alternative_spanish_readings:
  - ‘declaración’
  - ‘dicho’
  - ‘mensaje’
  rationale: Pablo no se refiere a una sola unidad léxica, sino a la formulación que sintetiza el conjunto. «Palabra» conserva la correspondencia con λόγος, mientras el contexto aclara que se trata de una síntesis del mandamiento.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than over-interpret'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y armoniza con el rastro auditado en inglés POB. Se preservó la forma normativa de las citas, la amplitud de ‘cualquier otro mandamiento’ y la ambigüedad controlada de λόγος como ‘palabra/declaración’. No hubo revisiones posteriores relevantes en el pasaje fuente, y el último pase de revisión indicó estabilidad textual.
  spanish_consistency_notes:
  - Se usó «prójimo» para mantener la intertextualidad bíblica de Levítico y la tradición semántica en español.
  - Se conservó «No matarás» en el texto principal, con nota aclaratoria para no diluir la precisión de φονεύω.
  - Se prefirió «se resume» como equivalente idiomático de ἀνακεφαλαιοῦται, sin introducir una paráfrasis más interpretativa.
  - Se mantuvo «palabra» para λόγος por fidelidad al griego, con nota sobre sus posibles equivalentes.
  - La puntuación en español mantiene comillas para la cita directa y una cadencia reverente pero moderna.
