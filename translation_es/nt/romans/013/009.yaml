revisions:
- from: 'Porque esto: «No cometerás adulterio[a], no matarás[b], no robarás, no codiciarás», y si hay cualquier otro mandamiento, se resume en esta palabra: «Amarás a tu prójimo como a ti mismo».'
  to: 'Porque esto: «No cometerás adulterio, no asesinarás[a], no robarás, no codiciarás», y si hay algún otro mandamiento, se resume en esta palabra[b]: «Amarás a tu prójimo como a ti mismo».'
