  text: τὸ γάρ· Οὐ μοιχεύσεις, Οὐ φονεύσεις, Οὐ κλέψεις, Οὐκ ἐπιθυμήσεις, καὶ εἴ τις ἑτέρα ἐντολή, ἐν ⸂τῷ λόγῳ τούτῳ⸃ ἀνακεφαλαιοῦται, ⸂ἐν τῷ⸃· Ἀγαπήσεις τὸν πλησίον σου ὡς σεαυτόν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/009.yaml
  text: 'For this: “You shall not commit adultery[a], you shall not murder, you shall not steal, you shall not covet,” and if there is any other commandment[b], it is summed up in this word: “You shall love your neighbor as yourself.”'
  footnotes:
  - marker: a
    text: Or 'it is summed up in this statement.' The Greek word can mean 'word,' 'statement,' or 'saying' in context.
    reason: lexical_alternative
  - marker: b
    text: '''You shall not murder'' is more precise than the traditional ''You shall not kill,'' since the Greek verb refers to unlawful killing.'
    reason: lexical_alternative
