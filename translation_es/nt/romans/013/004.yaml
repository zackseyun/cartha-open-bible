translation:
  language: es
  text: Porque es servidor de Dios para tu bien. Pero si haces lo malo, teme, porque no lleva la espada en vano[a]. Porque es servidor de Dios[b], un vengador que trae ira sobre el que practica lo malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para nada' para 'en vano'.
    reason: lexical_alternative
  - marker: b
    text: O 'para ejecutar ira sobre el que hace lo malo'.
    reason: alternative_reading
lexical_decisions:
- source_word: διάκονός
  english_pob_choice: servant
  chosen_spanish: servidor
  alternatives_spanish:
  - siervo
  - ministro
  lexicon: BDAG
  rationale: διάκονος denota a alguien que cumple una comisión o presta servicio. En español, 'servidor' comunica bien la función de servicio/encargo en un contexto civil y evita tanto el estrechamiento eclesiástico de 'ministro' como la carga más esclavista de 'siervo'.
- source_word: σοὶ
  english_pob_choice: for your good
  chosen_spanish: para tu bien
  alternatives_spanish:
  - para tu provecho
  - a tu favor
  lexicon: BDAG
  rationale: El dativo con εἰς τὸ ἀγαθόν expresa beneficio. 'Para tu bien' es idiomático en español y conserva la idea de ventaja o beneficio, no solo dirección espacial o relacional.
- source_word: εἰς τὸ ἀγαθόν
  english_pob_choice: for your good
  chosen_spanish: para tu bien
  alternatives_spanish:
  - para el bien
  - para lo bueno
  lexicon: BDAG
  rationale: La frase señala propósito/resultado beneficioso. Unirla con σοὶ en 'para tu bien' refleja ese sentido de beneficio sin perder naturalidad.
- source_word: τὸ κακὸν ποιῇς
  english_pob_choice: you do what is evil
  chosen_spanish: haces lo malo
  alternatives_spanish:
  - haces el mal
  - practicas lo malo
  lexicon: BDAG
  rationale: Aquí κακόν es mal moral. 'Haces lo malo' es claro y directo en español; mantiene el valor ético sin añadir una paráfrasis más explicativa que la fuente.
- source_word: φοβοῦ
  english_pob_choice: be afraid
  chosen_spanish: teme
  alternatives_spanish:
  - ten miedo
  - sé temeroso
  lexicon: BDAG
  rationale: El imperativo medio/pasivo expresa miedo ante la función punitiva de la autoridad. 'Teme' es breve, bíblico y natural en español, sin cargarlo innecesariamente con una expansión interpretativa.
- source_word: εἰκῇ
  english_pob_choice: for nothing
  chosen_spanish: en vano
  alternatives_spanish:
  - sin motivo
  - sin propósito
  lexicon: BDAG
  rationale: El adverbio significa 'sin propósito' o 'en vano'. 'En vano' es la equivalencia más asentada en español bíblico y conserva bien la idea de que la espada no se porta sin intención real.
- source_word: μάχαιραν
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - arma
  - cuchillo
  lexicon: BDAG
  rationale: μάχαιρα designa una espada/daga. 'Espada' preserva la imagen concreta y el peso judicial-simbólico del texto.
- source_word: φορεῖ
  english_pob_choice: bear
  chosen_spanish: lleva
  alternatives_spanish:
  - porta
  - trae
  lexicon: BDAG
  rationale: Con μάχαιρα, φορέω implica portar de manera habitual. 'Lleva' es la opción más natural en español y mantiene la idea de portar la espada como signo de autoridad.
- source_word: ἔκδικος
  english_pob_choice: an avenger
  chosen_spanish: vengador
  alternatives_spanish:
  - ejecutor de justicia
  - agente de venganza
  lexicon: BDAG
  rationale: ἔκδικος nombra a quien ejecuta retribución/justicia. 'Vengador' conserva el matiz retributivo de forma concisa, sin suavizarlo.
- source_word: εἰς ὀργὴν
  english_pob_choice: for wrath
  chosen_spanish: para ira
  alternatives_spanish:
  - para indignación
  - para castigo
  lexicon: BDAG
  rationale: La frase expresa finalidad/resultado en relación con ὀργή. 'Para ira' mantiene la cercanía al griego y deja abierta la tensión teológica respecto de si se trata de la ira de Dios mediada por la autoridad.
- source_word: τῷ τὸ κακὸν πράσσοντι
  english_pob_choice: against the one who practices evil
  chosen_spanish: contra el que practica lo malo
  alternatives_spanish:
  - contra el que hace lo malo
  - contra el malhechor
  lexicon: BDAG
  rationale: El participio sustantivado describe a la persona caracterizada por practicar el mal. 'Practica lo malo' conserva la idea durativa/habitual mejor que un sustantivo más compacto.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: γάρ explica la razón. 'Porque' enlaza con fluidez el argumento en español y mantiene la función explicativa de la conjunción.
theological_decisions:
- issue: Relación de la función punitiva de la autoridad con la ira divina
  english_pob_reading: Render εἰς ὀργὴν as 'for wrath' without specifying 'God's wrath' in the main text.
  chosen_spanish_reading: Traducir εἰς ὀργὴν como 'para ira' sin explicitar 'ira de Dios' en el texto principal.
  alternative_spanish_readings:
  - para la ira de Dios
  - para castigo
  - para la ira
  rationale: El contexto sugiere que la autoridad actúa como agente de Dios, pero la frase griega es breve y no repite 'de Dios'. Mantener 'para ira' conserva la tensión teológica y evita resolverla con una explicitación que el griego no exige de forma directa.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla en la traducción principal.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: se conserva el sentido final de ἔκδικος εἰς ὀργὴν τῷ τὸ κακὸν πράσσοντι como una cláusula natural en español con ''vengador para ira contra el que practica lo malo'', evitando tanto la paráfrasis excesiva como una calca rígida. También se mantuvo la relación explicativa de γάρ con ''porque''.'
  spanish_consistency_notes:
  - Se usa 'servidor' para διάκονος en coherencia con el valor funcional/civil del contexto.
  - Se usa 'espada' para μάχαιρα para conservar la imagen concreta y judicial.
  - Se usa 'ira' para ὀργή sin especificar el sujeto en el cuerpo del texto, preservando la ambigüedad teológica documentada.
  - Se usa 'teme' como imperativo breve y solemne, adecuado al registro bíblico en español.
