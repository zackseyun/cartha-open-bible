  text: θεοῦ γὰρ διάκονός ἐστιν σοὶ εἰς τὸ ἀγαθόν. ἐὰν δὲ τὸ κακὸν ποιῇς, φοβοῦ· οὐ γὰρ εἰκῇ τὴν μάχαιραν φορεῖ· θεοῦ γὰρ διάκονός ἐστιν, ἔκδικος εἰς ὀργὴν τῷ τὸ κακὸν πράσσοντι.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/004.yaml
  text: For it is God’s servant for your good[a]. But if you do what is evil, be afraid, for it does not bear the sword for nothing. For it is God’s servant[b], an avenger who brings wrath on the one who practices evil.
