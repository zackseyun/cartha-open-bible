review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del griego: la autoridad es presentada dos veces como διάκονος θεοῦ, se mantiene la advertencia condicional, la imagen concreta de la espada, y la idea retributiva contra quien practica el mal. Sin embargo, la cláusula final ''vengador para ira contra el que practica lo malo'' no representa un español natural ni refleja adecuadamente la mejora ya documentada en la auditoría inglesa para ἔκδικος εἰς ὀργὴν. El español debe expresar mejor la relación entre ''vengador'' y ''ira'' sin endurecerla en una construcción torpe.'
  spanish_quality_summary: 'La mayor parte del versículo es clara y digna. ''Servidor de Dios'', ''para tu bien'', ''teme'' y ''no lleva la espada en vano'' son aceptables. El problema principal es de legibilidad y naturalidad en la última frase: ''vengador para ira contra...'' suena calcado e impropio en español bíblico moderno. También la nota [a] está mal anclada: comenta ''para nada''/''en vano'', pero el marcador aparece junto a ''Dios'' en vez de junto a la frase relevante.'
  glossary_alignment: 'La terminología principal está alineada con el proyecto: θεοῦ -> ''Dios''; διάκονος -> ''servidor'' es defendible en contexto cívico; μάχαιρα -> ''espada''; ἔκδικος -> ''vengador''. No hay conflicto con términos sensibles del glosario. La excepción necesaria es estilística: mantener ''vengador'' pero reformular εἰς ὀργὴν como ''que trae ira sobre'' para fidelidad idiomática al razonamiento documentado por el POB.'
  issues:
  - severity: medium
    issue: La construcción 'vengador para ira contra el que practica lo malo' es poco natural y semánticamente rígida.
    rationale: Aunque intenta seguir de cerca εἰς ὀργὴν, el español resultante no comunica bien la función del gobernante como agente retributivo. La auditoría inglesa ya resolvió esta misma aspereza con una reformulación más natural.
  - severity: medium
    issue: La nota [a] está anclada en el lugar incorrecto.
    rationale: La nota trata la alternativa para εἰκῇ ('en vano'/'para nada'), pero el marcador aparece después de 'Dios' en la primera cláusula. Esto incumple la disciplina de anclaje de notas.
  revised_spanish_text: Porque es servidor de Dios para tu bien. Pero si haces lo malo, teme, porque no lleva la espada en vano[a]. Porque es servidor de Dios[b], un vengador que trae ira sobre el que practica lo malo.
  revised_footnotes:
  - marker: a
    text: O 'para nada' para 'en vano'.
    reason: lexical_alternative
  - marker: b
    text: O 'para ejecutar ira sobre el que hace lo malo'.
    reason: alternative_reading
  revision_rationale: 'Se movió la nota [a] al lugar correcto, junto a ''en vano'', y se reformuló la cláusula final para producir un español natural y fiel al griego y a la decisión ya documentada en inglés: ἔκδικος se mantiene como ''vengador'' y εἰς ὀργὴν se expresa como ''que trae ira sobre'', sin añadir explícitamente ''de Dios''.'
