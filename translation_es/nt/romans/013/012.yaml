translation:
  language: es
  text: La noche va muy avanzada[a]; el día se ha acercado. Por tanto, desechemos las obras de las tinieblas y revistámonos de la armadura de la luz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘la noche ha avanzado’. El verbo griego presenta la noche como algo que ha seguido su curso, es decir, como largamente transcurrida.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘las armas de la luz’.'
    reason: alternative_reading
lexical_decisions:
- source_word: νὺξ
  english_pob_choice: night
  chosen_spanish: noche
  alternatives_spanish:
  - tinieblas
  - oscuridad
  lexicon: BDAG
  rationale: Conservo el contraste temporal literal con ‘día’. ‘Tinieblas’ aparece después en la frase moral, de modo que aquí ‘noche’ mantiene la imagen sin fusionarla prematuramente con la dimensión ética.
- source_word: προέκοψεν
  english_pob_choice: is far gone
  chosen_spanish: va muy avanzada
  alternatives_spanish:
  - ha avanzado
  - está muy avanzada
  - va muy lejos
  lexicon: BDAG
  rationale: El verbo griego sugiere que la noche ha progresado y está ampliamente transcurrida. ‘Va muy avanzada’ comunica bien ese estado en español sin perder la imagen de avance temporal.
- source_word: ἡμέρα
  english_pob_choice: day
  chosen_spanish: el día
  alternatives_spanish:
  - la luz del día
  - la jornada
  lexicon: BDAG
  rationale: Mantengo el sustantivo simple para preservar el paralelismo con ‘noche’ y el valor temporal/escatológico del contraste.
- source_word: ἤγγικεν
  english_pob_choice: has drawn near
  chosen_spanish: se ha acercado
  alternatives_spanish:
  - está cerca
  - ha llegado cerca
  lexicon: BDAG
  rationale: El perfecto griego señala un estado presente resultante de un acercamiento ya realizado. ‘Se ha acercado’ conserva mejor ese matiz que un simple ‘está cerca’.
- source_word: ἀποβαλώμεθα
  english_pob_choice: let us cast off
  chosen_spanish: desechemos
  alternatives_spanish:
  - quitémonos
  - arrojemos lejos
  lexicon: BDAG
  rationale: En español, ‘desechar’ expresa bien la acción de quitarse algo como ropa o carga moral. Aunque pierde algo de la imagen física de ‘cast off’, aquí suena natural y conserva el valor exhortativo.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - acciones
  - hechos
  lexicon: BDAG
  rationale: ‘Obras’ es el equivalente más estable para el uso paulino y reproduce la terminología conocida sin trivializarla como mera conducta aislada.
- source_word: σκότους
  english_pob_choice: darkness
  chosen_spanish: las tinieblas
  alternatives_spanish:
  - la oscuridad
  - las sombras
  lexicon: BDAG
  rationale: Dado que la expresión funciona como genitivo metafórico de oposición ética, ‘tinieblas’ conserva mejor el tono bíblico y la fuerza moral que ‘oscuridad’.
- source_word: ἐνδυσώμεθα
  english_pob_choice: put on
  chosen_spanish: revistámonos
  alternatives_spanish:
  - vistámonos
  - pongámonos
  lexicon: BDAG
  rationale: El verbo mantiene la metáfora de vestirse. ‘Revistámonos’ es más solemne y refleja bien la acción deliberada de asumir una nueva condición, en paralelo con ‘desechemos’.
- source_word: ὅπλα
  english_pob_choice: armor
  chosen_spanish: las armas
  alternatives_spanish:
  - la armadura
  - los instrumentos
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por ‘armor’, el griego ὅπλα puede significar ‘armas’ y la construcción con ‘revístanse’ admite mejor en español un complemento plural concreto. Además, el propio POB preservó ‘weapons’ como alternativa, así que ‘las armas’ mantiene la tensión lexical sin forzar una imagen de vestimenta demasiado cerrada.
- source_word: φωτός
  english_pob_choice: light
  chosen_spanish: de la luz
  alternatives_spanish:
  - luminosas
  - de la claridad
  lexicon: BDAG
  rationale: Conservo el genitivo metafórico de origen o pertenencia. ‘De la luz’ es claro y reproduce el contraste con ‘tinieblas’ sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Metáfora escatológica y ética de noche/día
  english_pob_reading: Retained the temporal imagery literally while allowing its moral and salvation-historical force to remain implicit.
  chosen_spanish_reading: Se conserva la imagen temporal de noche y día, dejando implícita su fuerza moral y escatológica.
  alternative_spanish_readings:
  - ‘Este tiempo oscuro está casi terminado; el nuevo día está cerca’
  - ‘La era de las tinieblas ha pasado’
  rationale: Evito convertir la metáfora en paráfrasis explicativa. La tensión entre tiempo y ética está en el texto y debe permanecer visible en español.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Sentido de ὅπλα τοῦ φωτός
  english_pob_reading: Rendered as 'the armor of light' in the main text, while preserving 'weapons of light' as an alternative.
  chosen_spanish_reading: ‘las armas de la luz’ como lectura principal, con la posibilidad de entender también una imagen de armadura implícita por el contexto exhortativo.
  alternative_spanish_readings:
  - ‘la armadura de la luz’
  - ‘las armas luminosas’
  rationale: En español, ὅπλα se rinde de forma más directa y auditable como ‘armas’. La metáfora de vestirse sigue funcionando porque el verbo ‘revistámonos’ ya marca el campo imaginal; no es necesario cerrar el término a ‘armadura’ si el griego permite la amplitud semántica.
  doctrine_reference: Translation philosophy §5 Consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente griego y el auditable inglés de POB. Se preservan las notas alternativas relevantes: el matiz de προέκοψεν (‘va muy avanzada’ / ‘ha avanzado’) y la opción semántica de ὅπλα (‘armas’ frente a ‘armadura’). No se registran revisiones previas aplicadas en el paquete actual.'
  spanish_consistency_notes:
  - Se mantiene ‘Dios’/‘Yahvé’ fuera de este versículo porque no aparecen en el texto.
  - Se conserva el paralelismo léxico noche/día y tinieblas/luz sin mezclar los campos semánticos.
  - ‘Revistámonos’ respeta la metáfora corporal y encaja con el paralelismo exhortativo del versículo.
  - Se usa ‘las tinieblas’ por su tono bíblico y por corresponder al genitivo de oscuridad moral sin sobreexplicarlo.
