translation:
  language: es
  text: Por esta razón también ustedes pagan impuestos[a], pues ellos son ministros de Dios[b], dedicándose a esto mismo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por esta misma razón también ustedes pagan impuestos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «servidores de Dios» o «funcionarios públicos de Dios». El griego λειτουργοί denota a quienes ejercen un servicio oficial.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para este mismo fin», subrayando su atención continua al deber civil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: because of this / for this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Debido a esto
  - Por esto
  lexicon: BDAG
  rationale: La expresión retoma el argumento anterior y en español la fórmula natural y transparente es «Por esta razón». Conserva el valor causal de διά con el acusativo sin sonar mecánica.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: Aquí γάρ introduce explicación. «Pues» mantiene el enlace argumentativo paulino y suena fluido en español bíblico contemporáneo.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  lexicon: BDAG
  rationale: El valor aditivo se conserva con «también», indicando que el pago de impuestos es una consecuencia adicional de la exhortación previa.
- source_word: φόρους
  english_pob_choice: taxes
  chosen_spanish: impuestos
  alternatives_spanish:
  - tributos
  - contribuciones
  lexicon: BDAG
  rationale: En este contexto civil, «impuestos» es la equivalencia más clara y natural en español moderno. «Tributos» sería posible, pero menos inmediato para el lector general.
- source_word: τελεῖτε
  english_pob_choice: pay
  chosen_spanish: pagan
  alternatives_spanish:
  - pagan en pleno
  - satisfacen
  lexicon: BDAG
  rationale: Con φόρους, τελέω expresa el cumplimiento de una obligación. «Pagan» comunica de manera directa y fiel la idea de satisfacer el deber fiscal.
- source_word: λειτουργοὶ
  english_pob_choice: ministers
  chosen_spanish: ministros
  alternatives_spanish:
  - servidores
  - funcionarios
  lexicon: BDAG
  rationale: «Ministros» conserva el registro formal y el matiz de servicio oficial que la POB inglesa quiso retener. «Funcionarios» sería demasiado administrativo y «servidores» pierde dignidad y especificidad.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - para Dios
  lexicon: BDAG
  rationale: 'El genitivo se mantiene de forma directa: son ministros «de Dios». Esta redacción preserva la relación sin añadir explicaciones que el texto no ofrece.'
- source_word: εἰς αὐτὸ τοῦτο
  english_pob_choice: to this very thing
  chosen_spanish: a esto mismo
  alternatives_spanish:
  - para este mismo fin
  - para esta misma tarea
  lexicon: BDAG
  rationale: La frase intensifica el enfoque en una tarea concreta. «A esto mismo» conserva la fuerza de εἰς + acusativo y su referencia enfática, con naturalidad en español.
- source_word: προσκαρτεροῦντες
  english_pob_choice: devoting themselves
  chosen_spanish: dedicados
  alternatives_spanish:
  - entregados
  - persistiendo en
  lexicon: BDAG
  rationale: El participio expresa atención constante y empeño sostenido. «Dedicados» resume bien esa perseverancia funcional sin sobrecargar la frase en español.
theological_decisions:
- issue: Cómo renderizar λειτουργοὶ θεοῦ aplicado a autoridades civiles
  english_pob_reading: ministers of God
  chosen_spanish_reading: ministros de Dios
  alternative_spanish_readings:
  - servidores de Dios
  - funcionarios de Dios
  rationale: La formulación mantiene la afirmación paulina de una función derivada bajo el orden de Dios, sin sugerir que toda acción del gobierno sea moralmente aprobada. «Ministros» conserva la dignidad del oficio y el paralelo formal con el griego.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Relación entre el pago de impuestos y la razón causal anterior
  english_pob_reading: For because of this you also pay taxes
  chosen_spanish_reading: Por esta razón también ustedes pagan impuestos
  alternative_spanish_readings:
  - Por esto también pagan impuestos
  - Por esa razón ustedes también pagan impuestos
  rationale: La coordinación causal conserva el enlace con la enseñanza anterior sobre sujeción a la autoridad. La opción escogida evita ambigüedad y mantiene el impulso argumentativo del versículo.
  doctrine_reference: Translation philosophy §§1, 2, 5
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto con el texto griego y con la revisión más reciente del POB inglés, que ajustó la frase a «ministers of God» para un registro más formal y cercano a λειτουργοὶ θεοῦ. La versión española conserva ese mismo equilibrio entre formalidad, claridad y fidelidad léxica.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ sin añadir artículos posesivos que no están en el griego.
  - Se eligió «impuestos» como equivalente natural de φόρους, en línea con el valor fiscal del término en el contexto romano.
  - «Ministros» reproduce el registro elevado de λειτουργοί mejor que «siervos» en este pasaje.
  - No se usó «Mesías» ni términos cristológicos ajenos al versículo.
  - El participio final se volvió un adjetivo verbal («dedicados») para evitar un calco forzado y conservar la idea de atención continua.
