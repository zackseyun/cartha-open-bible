- from: Porque los gobernantes no son un terror para la buena conducta[a], sino para la mala. Pero si no quieres temer a la autoridad[b], haz lo bueno, y tendrás alabanza de ella[c].
  to: Porque los gobernantes no son un terror para la buena conducta[a], sino para la mala conducta. Pero si no quieres temer a la autoridad[b], haz lo bueno, y recibirás aprobación de ella[c].
  rationale: 'Se hicieron reparaciones menores para mejorar la fidelidad funcional y la naturalidad del español: “la mala conducta” explicita una elipsis que en español sonaba torpe; “recibirás aprobación” comunica mejor ἔπαινος en contexto cívico; y la nota alternativa de la pregunta se ajustó para reflejar con más precisión la estructura griega documentada en el POB inglés.'
