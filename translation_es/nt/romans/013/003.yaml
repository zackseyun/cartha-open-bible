translation:
  language: es
  text: Porque los gobernantes no son un terror para la buena conducta[a], sino para la mala conducta. Pero si no quieres temer a la autoridad[b], haz lo bueno, y recibirás aprobación de ella[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “para una buena obra ... para el mal”. El griego contrasta lo bueno con lo malo en un sentido ético general.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “¿Deseas no temer a la autoridad?”'
    reason: lexical_alternative
  - marker: c
    text: Es decir, de la autoridad gobernante.
    reason: cross_reference
lexical_decisions:
- source_word: ἄρχοντες
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - autoridades
  - regentes
  - magistrados
  lexicon: BDAG
  rationale: ἄρχοντες nombra a quienes gobiernan o ejercen autoridad. En español, “gobernantes” comunica bien la función política sin estrecharlo demasiado a un cargo específico.
- source_word: φόβος
  english_pob_choice: a terror
  chosen_spanish: un terror
  alternatives_spanish:
  - un temor
  - algo que temer
  - un motivo de temor
  lexicon: BDAG
  rationale: Como predicado nominal, la idea es que los gobernantes no son objeto o causa de temor para la buena conducta. “Un terror” conserva la fuerza concreta del giro, aunque en español suene ligeramente más marcado; se usa porque refleja bien la función del sustantivo.
- source_word: τῷ ἀγαθῷ ἔργῳ
  english_pob_choice: to good conduct
  chosen_spanish: para la buena conducta
  alternatives_spanish:
  - para una buena obra
  - para una buena acción
  - para el buen obrar
  lexicon: BDAG
  rationale: La construcción es ética y general, no meramente una obra aislada. “Buena conducta” expresa mejor el sentido general del comportamiento correcto que una sola acción puntual.
- source_word: τῷ κακῷ
  english_pob_choice: to bad
  chosen_spanish: para la mala
  alternatives_spanish:
  - para el mal
  - para la mala conducta
  - para lo malo
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente y se contrasta con “la buena conducta”. “La mala” mantiene la brevedad y la antítesis del griego; el referente conductual queda sugerido por el contexto inmediato.
- source_word: θέλεις δὲ μὴ φοβεῖσθαι
  english_pob_choice: But if you do not want to fear
  chosen_spanish: Pero si no quieres temer
  alternatives_spanish:
  - Pero si no deseas temer
  - Pero si no quieres sentir temor
  - Pero si no quieres tener miedo
  lexicon: BDAG
  rationale: La cláusula interrogativa/condicional se vuelve en español una condición natural, como en la revisión inglesa final. “No quieres temer” conserva la estructura volitiva del verbo θέλω con infinitivo.
- source_word: τὴν ἐξουσίαν
  english_pob_choice: the authority
  chosen_spanish: a la autoridad
  alternatives_spanish:
  - a la autoridad gobernante
  - al poder
  - a la autoridad civil
  lexicon: BDAG
  rationale: ἐξουσία aquí se refiere a la autoridad gobernante en singular. “La autoridad” es la forma más directa y transparente en español; el complemento con a marca el régimen verbal de temer.
- source_word: τὸ ἀγαθὸν ποίει
  english_pob_choice: Do what is good
  chosen_spanish: haz lo bueno
  alternatives_spanish:
  - haz el bien
  - practica lo bueno
  - obra bien
  lexicon: BDAG
  rationale: El adjetivo con artículo funciona sustantivamente. “Haz lo bueno” es idiomático y conserva la categoría moral general sin reducirla a un acto aislado.
- source_word: ἕξεις ἔπαινον
  english_pob_choice: you will have praise
  chosen_spanish: tendrás alabanza
  alternatives_spanish:
  - recibirás alabanza
  - obtendrás elogio
  - tendrás aprobación
  lexicon: BDAG
  rationale: ἕξεις se rinde con “tendrás”, manteniendo cercanía con el griego. “Alabanza” reproduce el sentido básico de ἔπαινος, aunque en español puede sonar más literario que “aprobación”; se preserva porque el término no exige suavización.
- source_word: ἐξ αὐτῆς
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de la autoridad
  - de parte de ella
  - por ella
  lexicon: BDAG
  rationale: El antecedente es ἐξουσία, femenino singular. “De ella” conserva la referencia pronominal y evita sobreexplicitar el sujeto; funciona bien en español para una autoridad institucional.
theological_decisions:
- issue: Alcance de la afirmación sobre los gobernantes
  english_pob_reading: Render the statement descriptively about the normal function of governing authorities without importing an absolute theological endorsement of every ruler's behavior.
  chosen_spanish_reading: Presentar la afirmación como una descripción de la función normal de la autoridad gobernante, sin convertirla en un aval absoluto de toda conducta de los gobernantes.
  alternative_spanish_readings:
  - Tratarla como una afirmación universal absoluta de que todo gobernante siempre premia el bien y castiga el mal
  - Leerla con ironía o subversión implícita
  rationale: El versículo habla de la función propia/esperable de la autoridad en el argumento de Pablo. La traducción no debe exagerar la afirmación ni introducir ironía que no esté señalada por el texto.
  doctrine_reference: 'Principio de traducción: preservar la tensión teológica sin resolverla artificialmente.'
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que convirtió la pregunta en una cláusula condicional natural (“si no quieres temer…”). También se mantuvo la tensión léxica de ἔπαινος como “alabanza” y de φόβος como un sustantivo concreto, no como una abstracción.
  spanish_consistency_notes:
  - Se usó “Yahvé” como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió “gobernantes” para ἄρχοντες y “autoridad” para ἐξουσία, manteniendo el campo semántico político del pasaje.
  - Se mantuvo la oposición ética “buena/mala” sin convertirla en terminología técnica más fuerte que la del griego.
  - La estructura condicional en español busca naturalidad sin perder la forma volitiva del original.
