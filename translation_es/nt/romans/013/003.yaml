source:
  edition: SBLGNT
  text: οἱ γὰρ ἄρχοντες οὐκ εἰσὶν φόβος ⸂τῷ ἀγαθῷ ἔργῳ⸃ ἀλλὰ ⸂τῷ κακῷ⸃. θέλεις δὲ μὴ φοβεῖσθαι τὴν ἐξουσίαν; τὸ ἀγαθὸν ποίει, καὶ ἕξεις ἔπαινον ἐξ αὐτῆς·
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/003.yaml
  text: For rulers are not a terror to good conduct[a], but to bad. But if you do not want to fear the authority, do what is good[c][b], and you will have praise from it.
  footnotes:
  - marker: a
    text: Or 'to a good deed ... to wrongdoing.' The Greek contrasts what is good with what is bad in a general ethical sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'Do you wish not to fear the authority?'
    reason: lexical_alternative
  - marker: c
    text: That is, from the governing authority.
    reason: cross_reference
