translation:
  language: es
  text: Y hagan esto[a], conociendo el tiempo, que ya es hora de que ustedes despierten del sueño, porque ahora nuestra salvación está más cerca que cuando creímos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «nos» en lugar de «ustedes» en «ya es hora de que ustedes despierten del sueño».
    reason: textual_variant
  - marker: b
    text: O «que cuando creímos por primera vez». El griego dice simplemente «cuando creímos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ τοῦτο
  english_pob_choice: And do this
  chosen_spanish: Y hagan esto
  alternatives_spanish:
  - Y esto
  - Y hagan también esto
  lexicon: BDAG
  rationale: El contexto exige fuerza exhortativa y una referencia anafórica a las exhortaciones previas. En español, «Y hagan esto» comunica esa continuidad y el valor imperativo implícito sin añadir contenido ajeno al griego.
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: conociendo
  alternatives_spanish:
  - sabiendo
  - porque conocen
  lexicon: BDAG
  rationale: El participio se conserva como construcción participial en español. «Conociendo» mantiene la relación causal/explicativa sin convertirla de manera explícita en una subordinada causal.
- source_word: τὸν καιρόν
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - la ocasión
  - el momento decisivo
  lexicon: BDAG
  rationale: Aquí καιρός apunta al tiempo oportuno o decisivo. «El tiempo» es natural en español y suficientemente amplio para conservar esa fuerza sin sobreespecificar.
- source_word: ὥρα
  english_pob_choice: the hour
  chosen_spanish: es la hora
  alternatives_spanish:
  - ha llegado la hora
  - ya es tiempo
  lexicon: BDAG
  rationale: La imagen nominal de ὥρα se conserva con «la hora», que transmite urgencia. Se evita reemplazarla por una paráfrasis más libre que debilitaría la inmediatez del griego.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya desde ahora
  - ya mismo
  lexicon: BDAG
  rationale: «Ya» reproduce la intensidad temporal de ἤδη de forma breve y natural en español.
- source_word: ὑμᾶς
  english_pob_choice: for you
  chosen_spanish: despertar[b]
  alternatives_spanish:
  - despertarse
  - que ustedes despierten
  lexicon: BDAG
  rationale: El texto base griego en SBLGNT lee ὑμᾶς, por lo que el destinatario es plural de segunda persona. En español, el sujeto está implícito en «hagan» y «despertar», manteniendo la referencia a ustedes sin forzar una construcción pesada.
- source_word: ἐξ ὕπνου ἐγερθῆναι
  english_pob_choice: to awaken from sleep
  chosen_spanish: despertar[b] del sueño
  alternatives_spanish:
  - despertarse del sueño
  - levantarse del sueño
  lexicon: BDAG
  rationale: «Despertar del sueño» conserva la metáfora de salir de un estado de sueño. «Del sueño» expresa bien ἐξ ὕπνου y mantiene un español claro y digno.
- source_word: νῦν γὰρ
  english_pob_choice: for now
  chosen_spanish: porque ahora
  alternatives_spanish:
  - pues ahora
  - porque ya
  lexicon: BDAG
  rationale: γάρ introduce la razón, y νῦν sitúa el argumento en el presente. «Porque ahora» hace explícita esa relación causal en español sin perder el énfasis temporal.
- source_word: ἐγγύτερον
  english_pob_choice: nearer
  chosen_spanish: más cerca
  alternatives_spanish:
  - más próxima
  - más cercana
  lexicon: BDAG
  rationale: El comparativo se traduce de manera natural con «más cerca», muy idiomático en español y fiel al valor comparativo de ἐγγύτερον.
- source_word: ἡ σωτηρία
  english_pob_choice: our salvation
  chosen_spanish: nuestra salvación
  alternatives_spanish:
  - nuestra liberación
  - la salvación de nosotros
  lexicon: BDAG
  rationale: Se conserva «salvación» como término paulino sin reducirlo a una sola etapa doctrinal. El posesivo plural «nuestra» sigue el griego y mantiene la dimensión comunitaria.
- source_word: ἢ ὅτε ἐπιστεύσαμεν
  english_pob_choice: than when we believed
  chosen_spanish: que cuando creímos
  alternatives_spanish:
  - que cuando llegamos a creer
  - que cuando por primera vez creímos
  lexicon: BDAG
  rationale: El griego dice simplemente «cuando creímos», sin agregar «por primera vez». «Que cuando creímos» reproduce el comparativo y evita introducir una precisión no explicitada por el texto.
theological_decisions:
- issue: La salvación como realidad ya cercana pero todavía futura
  english_pob_reading: Retain 'our salvation' without narrowing it, allowing Paul's eschatological already/not-yet tension to stand.
  chosen_spanish_reading: Mantener «nuestra salvación» sin restringirla, dejando en pie la tensión escatológica entre lo ya presente y lo todavía venidero.
  alternative_spanish_readings:
  - nuestra salvación final
  - nuestra liberación definitiva
  - la plena realización de nuestra salvación
  rationale: El verso no especifica una sola fase de la salvación; la presenta como algo que se acerca. La traducción debe conservar esa tensión y no resolverla prematuramente.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Dirección exhortativa del imperativo implícito
  english_pob_reading: '''And do this'' reflects the contextual imperative force of τοῦτο.'
  chosen_spanish_reading: «Y hagan esto» refleja la exhortación implícita del contexto inmediato.
  alternative_spanish_readings:
  - Y esto
  - Y continúen con esto
  rationale: El griego enlaza con las exhortaciones previas. En español, un verbo en imperativo plural suena natural y comunica mejor la fuerza exhortativa que una elipsis demasiado seca.
  doctrine_reference: Discourse and syntax of exhortation in Romans 13
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego SBLGNT y el punto de auditoría en inglés. Se preserva la variante textual de ὑμᾶς con una nota en [a], y se evita añadir «por primera vez» en ἐπιστεύσαμεν, tal como indica el audit trail. También se ajustó el orden para que la sintaxis española fluya con dignidad y claridad.
  spanish_consistency_notes:
  - Se usa «salvación» para σωτηρία, manteniendo el término paulino sin concretarlo doctrinalmente.
  - Se conserva el tono exhortativo con un imperativo plural natural en español.
  - Se mantiene el comparativo «más cerca» para ἐγγύτερον y la temporalidad de «ya» para ἤδη.
  - Los corchetes de notas aparecen exactamente en el texto base donde corresponden.
