  text: Καὶ τοῦτο εἰδότες τὸν καιρόν, ὅτι ὥρα ⸂ἤδη ὑμᾶς⸃ ἐξ ὕπνου ἐγερθῆναι, νῦν γὰρ ἐγγύτερον ἡμῶν ἡ σωτηρία ἢ ὅτε ἐπιστεύσαμεν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/011.yaml
  text: And do this[a], knowing the time, that it is already the hour for you to awaken from sleep[b], for now our salvation is nearer than when we believed.
  footnotes:
  - marker: a
    text: Some manuscripts read 'us' instead of 'you' in 'it is already the hour for you to wake from sleep.'
    reason: textual_variant
  - marker: b
    text: Or 'than when we first believed.' The Greek simply says 'when we believed.'
    reason: lexical_alternative
