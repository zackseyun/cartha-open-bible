revisions:
- from: Andemos de manera correcta[a], como en el día, no en orgías y borracheras, no en inmoralidad sexual y sensualidad, no en contiendas y celos[b].
  to: Andemos decentemente[a], como en el día, no en juergas y borracheras, no en inmoralidad sexual y sensualidad, no en contiendas y celos[b].
  rationale: La revisión es pequeña pero necesaria para alinearse mejor con el griego y con la rationale del POB. 'Decentemente' expresa mejor εὐσχημόνως en este contexto exhortativo y suena más natural que 'de manera correcta'. 'Juergas' evita la connotación sexual moderna de 'orgías' y conserva el sentido de κώμοις como fiestas desenfrenadas asociadas con bebida. Se mantienen el resto de las decisiones del borrador y la nota semántica sobre ζήλῳ.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:10:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura exhortativa y la mayor parte de los pares de vicios del griego. 'Andemos', 'como en el día', 'inmoralidad sexual', 'sensualidad', 'contiendas' y 'celos' preservan adecuadamente el sentido general y las decisiones del POB. Sin embargo, 'orgías' para κώμοις no sigue fielmente la rationale auditada, que evitó 'orgies' por su estrechamiento sexual en uso moderno; en español 'orgías' también puede inducir ese malentendido. Además, 'de manera correcta' suena más débil y menos idiomático que el valor de εὐσχημόνως en este contexto ético.
  spanish_quality_summary: El español es legible, pero una pequeña revisión lo vuelve más natural y más alineado con el tono bíblico digno. 'Andemos decentemente' es más conciso, idiomático y paralelo al registro paulino que 'Andemos de manera correcta'. Sustituir 'orgías' por 'juergas' evita una connotación sexual innecesaria y mantiene el sentido de fiestas desenfrenadas asociado a κώμοις.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto (no aparecen Yahvé, Mesías, etc.). Las decisiones clave quedan bien alineadas salvo κώμοις, donde conviene evitar 'orgías' por la misma razón documentada en inglés. La nota de 'envidia' para ζήλῳ está bien preservada. La alternativa para εὐσχημόνως debe actualizarse para corresponder al texto revisado.
  issues:
  - severity: medium
    issue: κώμοις traducido como 'orgías'
    rationale: La auditoría inglesa rechazó 'orgies' porque en uso moderno estrecha el sentido hacia exceso sexual. En español 'orgías' produce la misma ambigüedad y puede duplicar indebidamente el siguiente par sexual ('inmoralidad sexual y sensualidad'). 'Juergas' o 'parrandas desenfrenadas' preserva mejor el sentido de fiestas licenciosas/carousing.
  - severity: low
    issue: εὐσχημόνως traducido como 'de manera correcta'
    rationale: Aunque no es incorrecto, resulta algo plano y poco idiomático para una exhortación breve. 'Decentemente' o 'con decoro' representa mejor la respetabilidad/conducta apropiada del término y suena más natural en la frase paulina.
  - severity: low
    issue: La nota [a] no quedaría ajustada si se mejora el término principal
    rationale: Si el texto principal pasa a 'decentemente', la nota debe ofrecer una alternativa real distinta, por ejemplo 'como es debido' o 'con decoro', y seguir anclada al mismo lugar.
  revised_spanish_text: Andemos decentemente[a], como en el día, no en juergas y borracheras, no en inmoralidad sexual y sensualidad, no en contiendas y celos[b].
  revised_footnotes:
