    text: O «como es debido» para «decentemente».
    reason: lexical_alternative
  - marker: b
    text: O «envidia» para «celos»; el término griego puede denotar ambos, pero aquí lleva un sentido negativo en la lista de vicios.
    reason: lexical_alternative
  revision_rationale: La revisión es pequeña pero necesaria para alinearse mejor con el griego y con la rationale del POB. 'Decentemente' expresa mejor εὐσχημόνως en este contexto exhortativo y suena más natural que 'de manera correcta'. 'Juergas' evita la connotación sexual moderna de 'orgías' y conserva el sentido de κώμοις como fiestas desenfrenadas asociadas con bebida. Se mantienen el resto de las decisiones del borrador y la nota semántica sobre ζήλῳ.
