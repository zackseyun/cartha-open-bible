translation:
  language: es
  text: Andemos decentemente[a], como en el día, no en juergas y borracheras, no en inmoralidad sexual y sensualidad, no en contiendas y celos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como es debido» para «decentemente».
    reason: lexical_alternative
  - marker: b
    text: O «envidia» para «celos»; el término griego puede denotar ambos, pero aquí lleva un sentido negativo en la lista de vicios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ἐν ἡμέρᾳ
  english_pob_choice: as in the daytime
  chosen_spanish: como en el día
  alternatives_spanish:
  - como de día
  - como en pleno día
  lexicon: BDAG
  rationale: La expresión funciona de manera idiomática y contrasta un andar propio de la luz con las obras de tinieblas en el contexto inmediato. 'Como en el día' conserva la imagen sin forzar una explicación interpretativa.
- source_word: εὐσχημόνως
  english_pob_choice: properly
  chosen_spanish: de manera correcta
  alternatives_spanish:
  - decentemente
  - honorablemente
  - con propiedad
  lexicon: BDAG
  rationale: El adverbio expresa conducta respetable o adecuada. 'De manera correcta' es claro en español moderno y mantiene el matiz de conducta apropiada; 'decentemente' queda como alternativa cercana.
- source_word: περιπατήσωμεν
  english_pob_choice: Let us walk
  chosen_spanish: Andemos
  alternatives_spanish:
  - vivamos
  - conduzcámonos
  lexicon: BDAG
  rationale: Pablo usa 'caminar' como metáfora habitual del modo de vivir. 'Andemos' preserva el idiomatismo paulino y la exhortación inclusiva del subjuntivo exhortativo.
- source_word: κώμοις
  english_pob_choice: revelries
  chosen_spanish: orgías
  alternatives_spanish:
  - borracheras festivas
  - carousas
  - juergas
  lexicon: BDAG
  rationale: El término se refiere a festines desordenados y licenciosos, a menudo asociados con bebida. 'Orgías' en español puede abarcar esa idea de desorden y exceso; se evita 'orgías' en sentido exclusivamente sexual por el contexto del siguiente par de vicios.
- source_word: μέθαις
  english_pob_choice: drunkenness
  chosen_spanish: borracheras
  alternatives_spanish:
  - embriaguez
  - ebriedad
  lexicon: BDAG
  rationale: El sustantivo denota estados o episodios de intoxicación. 'Borracheras' comunica con naturalidad el comportamiento de embriaguez y encaja bien en una lista de vicios.
- source_word: κοίταις
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - relaciones sexuales ilícitas
  - lujuria
  - lechos
  lexicon: BDAG
  rationale: Literalmente significa 'lechos', pero en este contexto es un eufemismo o referencia idiomática a conducta sexual ilícita. 'Inmoralidad sexual' expresa con claridad el sentido sin oscurecer la referencia.
- source_word: ἀσελγείαις
  english_pob_choice: sensuality
  chosen_spanish: sensualidad
  alternatives_spanish:
  - debauchería
  - licenciosidad
  - desenfreno
  lexicon: BDAG
  rationale: El término denota conducta desvergonzada y sin freno, con frecuencia sexual. 'Sensualidad' mantiene una palabra reconocible en español y acompaña bien al par anterior sin concretar más de lo que el texto dice.
- source_word: ἔριδι
  english_pob_choice: strife
  chosen_spanish: contiendas
  alternatives_spanish:
  - discordias
  - pleitos
  - riñas
  lexicon: BDAG
  rationale: El sustantivo refiere discordia o rivalidad contenciosa. 'Contiendas' preserva el tono de lista de vicios y suena natural en español bíblico contemporáneo.
- source_word: ζήλῳ
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - envidia
  - zelos
  lexicon: BDAG
  rationale: En esta lista de vicios el sentido negativo es claro. 'Celos' corresponde bien al emparejamiento con 'contiendas'; 'envidia' sigue siendo una alternativa válida y cercana al rango semántico.
theological_decisions:
- issue: Contraste ético del día y la noche
  english_pob_reading: Rendered the imagery straightforwardly as 'as in the daytime' without allegorizing beyond Paul's ethical contrast.
  chosen_spanish_reading: Se mantiene la imagen con 'como en el día', sin convertirla en una paráfrasis doctrinal.
  alternative_spanish_readings:
  - como si fuera de día
  - como en pleno día
  rationale: El versículo participa del contraste luz/tinieblas del contexto, pero aquí el texto solo exige conservar la imagen y su fuerza exhortativa. No se añade una explicación que no está explícita en la línea.
  doctrine_reference: Translation philosophy §3
- issue: Referencia sexual de κοίταις
  english_pob_reading: Translated by sense as 'sexual immorality' rather than the literal 'beds.'
  chosen_spanish_reading: Se traduce por sentido como 'inmoralidad sexual' en lugar de 'lechos'.
  alternative_spanish_readings:
  - lechos
  - relaciones sexuales ilícitas
  rationale: El literal 'lechos' sería opaco en español y no comunicaría el peso moral del término en la lista de vicios. La elección conserva la referencia sexual sin ampliar indebidamente el alcance.
  doctrine_reference: Translation philosophy §1, §6
- issue: ζήλῳ in a vice list
  english_pob_reading: the Greek term can denote either envy or jealousy, but here carries a negative sense in the vice list.
  chosen_spanish_reading: Se traduce 'celos', con nota de alternativa 'envidia'.
  alternative_spanish_readings:
  - envidia
  rationale: El contexto de vicios requiere un sentido negativo; 'celos' funciona bien con 'contiendas' y refleja el tono relacional de la lista. Se preserva la alternativa semántica donde el español también la admite.
  doctrine_reference: BDAG; Translation philosophy §2
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego de SBLGNT y coincide con el audit trail inglés en filosofía de equivalencia óptima; no se registran revisiones aplicadas y el control cruzado indicó alta concordancia.
  spanish_consistency_notes:
  - Se conserva el imperativo exhortativo plural con «Andemos».
  - Se mantiene la metáfora temporal con «como en el día» sin explicitar más allá del texto.
  - Se evita «SEÑOR» u otra sustitución no pertinente; no aparece terminología divina en este versículo.
  - Se usa un registro bíblico contemporáneo, claro y digno, sin arcaísmos innecesarios.
  - Las listas de vicios se traducen con términos naturales en español y de peso moral comparable.
