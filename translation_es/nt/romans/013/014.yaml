source:
  edition: SBLGNT
  text: ἀλλὰ ἐνδύσασθε τὸν κύριον Ἰησοῦν Χριστόν, καὶ τῆς σαρκὸς πρόνοιαν μὴ ποιεῖσθε εἰς ἐπιθυμίας.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/014.yaml
  text: But put on the Lord Jesus Messiah[a], and make no provision for the flesh, for its desires.
  footnotes:
  - marker: a
    text: Or 'make no provision for the sinful nature.' The Greek says 'flesh,' which Paul often uses for fallen human impulses in contrast to life directed by God.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: 1fdd81dbf5b4da998434c1eb16ca5e2bc2f2c00a6c0543d03d040040b974a509
    timestamp: '2026-04-18T10:58:44Z'
    output_hash: 9a89cfe8c4aeb968c83b35705bb26e9491c843dfdbcb096ab142f37e41f29d75
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:01:44Z'
    unchanged: false
    changes_summary: 'Replaced ''the Messiah'' with ''Christ'' for more natural formal register and consistency with the Greek proper name/title sequence; adjusted the final phrase from ''to gratify its desires'' to ''for its desires'' to more closely reflect εἰς ἐπιθυμίας without interpretive expansion. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Pero revístanse del Señor Jesús Mesías[a], y no hagan provisión para la carne, para sus deseos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no hagan provisión para la naturaleza pecaminosa». El griego dice «carne», que Pablo usa con frecuencia para los impulsos humanos caídos en contraste con una vida dirigida por Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδύσασθε
  english_pob_choice: put on
  chosen_spanish: vístanse de
  alternatives_spanish:
  - pónganse
  - revístanse de
  lexicon: BDAG
  rationale: 'La imagen es metafórica: asumir una identidad o modo de vida. En español, «vestirse de» conserva la metáfora de la ropa con un registro natural y bíblico, sin volverlo rígido o explicativo de más.'
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En este contexto cristológico, κύριος funciona como título para Jesús; «Señor» preserva su peso teológico y su uso consagrado en español bíblico.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Nombre propio estándar en español, sin variación necesaria.
- source_word: Χριστόν
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titulado de Χριστός como «Mesías», de acuerdo con la política doctrinal del proyecto y para no convertirlo en simple apellido religioso.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza pecaminosa
  - naturaleza humana caída
  lexicon: BDAG
  rationale: «Carne» mantiene la terminología paulina y la tensión teológica del término sin resolverla interpretativamente. En este contexto ético apunta a la esfera de impulsos humanos desordenados, pero la traducción conserva el lenguaje original.
- source_word: πρόνοιαν
  english_pob_choice: provision
  chosen_spanish: provisión
  alternatives_spanish:
  - previsión
  - cuidado anticipado
  - plan
  lexicon: BDAG
  rationale: «Hacer provisión» es la equivalencia natural del giro idiomático con ποιεῖσθε + πρόνοιαν. «Provisión» comunica la idea de preparar anticipadamente recursos o arreglos.
- source_word: ποιεῖσθε
  english_pob_choice: make
  chosen_spanish: hagan
  alternatives_spanish:
  - hagan hacer
  - preparen
  lexicon: BDAG
  rationale: Con πρόνοιαν forma la expresión estable «hacer provisión». El español «hacer provisión» mantiene el valor idiomático sin añadir interpretación.
- source_word: εἰς ἐπιθυμίας
  english_pob_choice: for its desires
  chosen_spanish: para sus deseos
  alternatives_spanish:
  - para las pasiones
  - para los deseos de ella
  lexicon: BDAG
  rationale: La preposición εἰς señala dirección o finalidad. «Para sus deseos» refleja el sentido sin expandirlo a «satisfacer» o «gratificar», y deja el referente implícito de «la carne» como en el griego.
theological_decisions:
- issue: Cómo renderizar Χριστός en un contexto cristológico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene el valor semántico de título mesiánico y no se sustituye por una forma eclesiástica tradicional que podría oscurecer el sentido original.
  doctrine_reference: 'DOCTRINE.md: Χριστός normalmente = Mesías; mantener el título cuando funciona como designación'
- issue: Cómo traducir σάρξ sin borrar la tensión paulina
  english_pob_reading: flesh, with footnoted alternative sinful nature
  chosen_spanish_reading: carne, con alternativa notada «naturaleza pecaminosa»
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - naturaleza caída
  rationale: Se conserva «carne» en el texto principal para respetar el término paulino y su ambigüedad productiva. La alternativa en nota ayuda al lector sin imponer una interpretación única.
  doctrine_reference: 'DOCTRINE.md: contested terms table for σάρξ; preserve theological tension'
- issue: Valor de εἰς ἐπιθυμίας al final de la cláusula
  english_pob_reading: for its desires
  chosen_spanish_reading: para sus deseos
  alternative_spanish_readings:
  - para satisfacer sus deseos
  - a fin de sus deseos
  rationale: La redacción evita ampliar el sentido a una acción de gratificación no explícita en el griego, manteniendo el sentido de orientación hacia los deseos.
  doctrine_reference: 'DOCTRINE.md: source-sensitive rendering; avoid interpretive expansion'
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una corrección importante: se restituyó «Messiah» en lugar de «Christ» para seguir la política doctrinal del proyecto, y se ajustó la cola final para evitar expansión interpretativa. La redacción española sigue ese criterio: conserva «Mesías», mantiene «carne» en el texto principal y evita añadir un verbo de gratificación no presente explícitamente en el griego.'
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento reverente y consistente de los títulos cristológicos: «Señor Jesús Mesías».'
  - «Carne» se usa en el cuerpo del texto para preservar el léxico paulino; la nota ofrece la alternativa contextual.
  - La sintaxis «no hagan provisión para...» reproduce con naturalidad el giro idiomático del original sin sobreexplicarlo.
  - El pronombre posesivo «sus» queda deliberadamente referencialmente abierto, como en el griego, ligado a «la carne».
