  text: ⸀ἀπόδοτε πᾶσι τὰς ὀφειλάς, τῷ τὸν φόρον τὸν φόρον, τῷ τὸ τέλος τὸ τέλος, τῷ τὸν φόβον τὸν φόβον, τῷ τὴν τιμὴν τὴν τιμήν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/007.yaml
  text: 'Pay to all what is owed: to the one due tax[a], tax; to the one due revenue, revenue; to the one due respect, respect; to the one due honor[b], honor.'
  footnotes:
  - marker: a
    text: Or 'tribute' for tax (φόρος), and 'customs duty' or 'toll' for revenue (τέλος). Paul likely distinguishes different kinds of civic payments.
    reason: lexical_alternative
  - marker: b
    text: Or 'respect' for fear. The Greek word is φόβος, literally 'fear,' but in this context it can include deferential respect toward those in authority.
    reason: lexical_alternative
