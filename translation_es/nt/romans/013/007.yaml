translation:
  language: es
  text: 'Den a todos lo que se les debe: al que se le debe impuesto[a], impuesto; al que se le debe gravamen, gravamen; al que se le debe respeto[b], respeto; al que se le debe honor, honor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tributo» para φόρος, y «derecho de aduana», «peaje» o «arancel» para τέλος. Pablo probablemente distingue distintos tipos de pagos cívicos.
    reason: lexical_alternative
  - marker: b
    text: O «temor» para φόβος. El griego significa literalmente «temor», pero en este contexto puede incluir una deferencia respetuosa hacia quienes ejercen autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόδοτε
  english_pob_choice: Pay
  chosen_spanish: Den
  alternatives_spanish:
  - Paguen
  - Entréguen
  lexicon: BDAG
  rationale: El imperativo aoristo plural pide una acción decidida y general. En español, «den» conserva el sentido de entregar o pagar lo debido sin forzar un solo matiz monetario, que el versículo amplía después.
- source_word: πᾶσι
  english_pob_choice: to all
  chosen_spanish: a todos
  alternatives_spanish:
  - a cada uno
  - a todas las personas
  lexicon: BDAG
  rationale: El dativo marca destinatarios. «A todos» conserva el alcance amplio y la brevedad del griego.
- source_word: ὀφειλάς
  english_pob_choice: what is owed
  chosen_spanish: lo que se les debe
  alternatives_spanish:
  - las deudas
  - las obligaciones
  - los debidos
  lexicon: BDAG
  rationale: El sustantivo puede ser «deudas», pero el contexto enumera varias clases de obligaciones cívicas y relacionales. «Lo que se les debe» preserva la categoría general sin reducirla solo a dinero.
- source_word: φόρον
  english_pob_choice: tax
  chosen_spanish: impuesto
  alternatives_spanish:
  - tributo
  lexicon: BDAG
  rationale: φόρος designa un impuesto o tributo pagado a la autoridad. «Impuesto» es el equivalente natural y claro en español actual; «tributo» queda como alternativa posible, pero es más marcada.
- source_word: τέλος
  english_pob_choice: revenue
  chosen_spanish: renta
  alternatives_spanish:
  - derecho de aduana
  - peaje
  - arancel
  lexicon: BDAG
  rationale: En esta pareja fiscal con φόρος, τέλος probablemente alude a cobros indirectos, como derechos o tasas. «Renta» mantiene una diferenciación funcional en español, aunque no agota las subclases posibles.
- source_word: φόβον
  english_pob_choice: respect
  chosen_spanish: respeto
  alternatives_spanish:
  - temor
  - reverencia
  lexicon: BDAG
  rationale: El sentido básico de φόβος es «temor», pero en este contexto cívico el POB inglés decidió «respect». En español, «respeto» comunica mejor la deferencia debida a la autoridad sin perder la fuerza relacional del término.
- source_word: τιμήν
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - estima
  - honra
  lexicon: BDAG
  rationale: τιμή denota honor o estima. «Honor» es la correspondencia directa y más precisa en español.
- source_word: τῷ ... τὸν/τὸ/τὴν ...
  english_pob_choice: to the one due ...
  chosen_spanish: al que se le debe ...
  alternatives_spanish:
  - a quien se le debe ...
  - al que corresponde ...
  lexicon: BDAG
  rationale: La construcción articulada repetida es elíptica. «Al que se le debe...» reproduce la distribución de cada obligación en un español natural y transparente.
theological_decisions:
- issue: φόβος aplicado a autoridades civiles
  english_pob_reading: respect
  chosen_spanish_reading: respeto
  alternative_spanish_readings:
  - temor
  - reverencia
  rationale: El contexto es cívico y relacional. Mantener «respeto» sigue la revisión inglesa más reciente y evita suavizar demasiado el término con una simple cortesía, sin convertirlo en una doctrina de terror o servilismo.
  doctrine_reference: Preservar la tensión léxica sin resolverla dogmáticamente.
translation_notes:
  revision_awareness: La revisión más reciente del POB en inglés cambió φόβος de «fear» a «respect» por ser más natural en el contexto cívico. Esta versión española sigue esa revisión, pero conserva en nota la posibilidad léxica de «temor» para no borrar la tensión semántica del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «honor» y no «honra» para alinear con el patrón léxico del POB y con τιμή.
  - Se eligieron términos cívico-fiscales actuales («impuesto», «renta») para preservar claridad sin perder el contraste entre φόρος y τέλος.
