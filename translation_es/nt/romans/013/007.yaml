    reason: lexical_alternative
  - marker: b
    text: O «temor» para φόβος. El griego significa literalmente «temor», pero en este contexto puede incluir una deferencia respetuosa hacia quienes ejercen autoridad.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «renta» por «gravamen» para representar mejor τέλος como cobro fiscal distinto de φόρος sin introducir el falso sentido común de alquiler o ingreso personal. Se conserva el resto porque es fiel al griego, claro en español y consistente con la auditoría inglesa.
