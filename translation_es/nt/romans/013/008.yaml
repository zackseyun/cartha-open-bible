  to: No le deban nada a nadie[a], excepto amarse unos a otros; porque el que ama al otro ha cumplido la ley.
  rationale: Se corrige la duplicación impropia «deban deber» a la forma española natural «le deban», que preserva exactamente la idea de ὀφείλετε. También se ajusta la excepción a «excepto amarse unos a otros», que comunica mejor en español el infinitivo articular τὸ ἀλλήλους ἀγαπᾶν sin calco torpe. Se mantiene «al otro» y su nota, de acuerdo con la decisión léxica documentada en inglés.
