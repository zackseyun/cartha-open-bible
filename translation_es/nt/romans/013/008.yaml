translation:
  language: es
  text: No le deban nada a nadie[a], excepto amarse unos a otros; porque el que ama al otro ha cumplido la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a otra persona». El griego dice «al otro».
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδενὶ μηδὲν
  english_pob_choice: no one anything
  chosen_spanish: a nadie nada
  alternatives_spanish:
  - nada a nadie
  - no deban nada a nadie
  - no le deban nada a nadie
  lexicon: BDAG
  rationale: 'Los dos negativos griegos expresan una prohibición amplia: no tener deuda con nadie en nada. En español, «a nadie nada» mantiene la fuerza total de la negación sin introducir una interpretación más estrecha que el original. El orden elegido busca conservar el paralelismo con la estructura griega, aunque en español también sería posible una formulación más idiomática con reordenamiento.'
- source_word: ὀφείλετε
  english_pob_choice: owe
  chosen_spanish: deban deber
  alternatives_spanish:
  - deban
  - estén obligados
  - tengan deuda
  lexicon: BDAG
  rationale: El verbo apunta aquí a deuda u obligación. «Deber» conserva ese campo semántico; la forma «deban deber» refleja con más transparencia la fuerza verbal del original, aunque en lectura corrida suene algo intensa. La alternativa más natural sería simplemente «deban», pero la elección principal preserva mejor el valor léxico de ὀφείλω.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  - a no ser que
  lexicon: BDAG
  rationale: La construcción introduce la única obligación permitida. «Sino» funciona naturalmente en español después de una negación y comunica la excepción de manera clara e idiomática. «Excepto» o «salvo» también serían viables, pero menos fluidos en esta estructura.
- source_word: τὸ ἀλλήλους ἀγαπᾶν
  english_pob_choice: to love one another
  chosen_spanish: el amarse unos a otros
  alternatives_spanish:
  - amarse unos a otros
  - el amor mutuo
  - el seguir amándose unos a otros
  lexicon: BDAG
  rationale: El infinitivo articular funciona como sustantivo que nombra la obligación única en curso. «El amarse unos a otros» conserva ese valor nominal sin perder el verbo. Se evita «el amor mutuo» porque suaviza la fuerza verbal del original; «amarse unos a otros» es una alternativa posible, pero la forma con artículo ayuda a reflejar la construcción griega.
- source_word: ἀγαπᾶν / ἀγαπῶν
  english_pob_choice: love / loves
  chosen_spanish: amar / ama
  alternatives_spanish:
  - amar / amar
  - querer bien / quiere bien
  - mostrar amor / muestra amor
  lexicon: BDAG
  rationale: Se mantiene «amar» por consistencia con el valor léxico de ἀγαπάω en el contexto paulino y con la carga teológica del pasaje. «Ama» en la segunda cláusula reproduce el participio sustantivado «el que ama». Se evita sustituirlo por «querer bien» o «mostrar amor», porque debilitaría la relación lexical con la orden anterior.
- source_word: ὁ γὰρ ἀγαπῶν
  english_pob_choice: for the one who loves
  chosen_spanish: porque el que ama
  alternatives_spanish:
  - pues el que ama
  - ya que quien ama
  - porque quien ama
  lexicon: BDAG
  rationale: El participio sustantivado singular se expresa naturalmente como «el que ama». «Porque» reproduce bien el valor explicativo de γάρ. «Quien ama» también sería válido, pero «el que ama» mantiene una correspondencia más directa con la forma griega y con el estilo bíblico en español.
- source_word: τὸν ἕτερον
  english_pob_choice: the other
  chosen_spanish: al otro
  alternatives_spanish:
  - a otro
  - al prójimo
  - a la otra persona
  lexicon: BDAG
  rationale: El griego dice «el otro», no «prójimo». Traducir «al otro» respeta la primacía del texto fuente y conserva la apertura semántica de ἕτερος. «Al prójimo» introduciría una interpretación más específica que el sintagma griego por sí solo no exige. La nota permite recordar la posibilidad de «otra persona» como matiz contextual.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la norma
  - la ley de Dios
  - la ley mosaica
  lexicon: BDAG
  rationale: En este contexto, νόμος se refiere a la ley conocida en el argumento paulino. «La ley» es la forma española más directa y fiel. Se evita especificar «ley mosaica» o «ley de Dios» porque el versículo no lo dice explícitamente y el pasaje desarrolla el tema en el contexto inmediato.
- source_word: πεπλήρωκεν
  english_pob_choice: has fulfilled
  chosen_spanish: ha cumplido
  alternatives_spanish:
  - ha llenado
  - ha completado
  - ha satisfecho plenamente
  lexicon: BDAG
  rationale: El perfecto indica una acción concluida con resultado vigente. «Ha cumplido» comunica bien la idea de llevar la ley a su plena realización en este contexto moral. «Ha cumplido la ley» es natural en español y preserva la equivalencia funcional con el inglés POB, aunque también podría decirse «ha satisfecho» en un registro más técnico.
theological_decisions:
- issue: Alcance de la prohibición sobre la deuda
  english_pob_reading: Render the statement straightforwardly as a prohibition on owing, while preserving the exception of mutual love without expanding it into a doctrinal claim about all financial borrowing.
  chosen_spanish_reading: Se traduce como una prohibición directa de deber/estar en deuda con nadie, preservando la excepción del amor mutuo, sin convertir el versículo en una tesis general sobre todo préstamo o financiamiento.
  alternative_spanish_readings:
  - No contraigan deudas con nadie bajo ninguna circunstancia
  - No tengan ninguna obligación moral con nadie salvo el amor
  - No deban nada en absoluto, ni siquiera en sentido figurado
  rationale: El texto griego habla de deuda/obligación y luego limita la excepción al amor mutuo. La traducción no debe resolver debates éticos más amplios que el versículo no formula. Se conserva la tensión entre deuda literal y obligación moral, dejando que el contexto determine el alcance.
  doctrine_reference: Preservar la tensión interpretativa en vez de resolverla dogmáticamente.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; el texto final mantiene la lectura de alta concordancia y no introduce cambios sustantivos respecto al audit trail.
  spanish_consistency_notes:
  - Se mantiene «ley» para νόμος y «amar» para ἀγαπάω, conservando consistencia léxica con el pasaje.
  - Se evita «prójimo» porque el griego dice ἕτερος, más general que una referencia explícita al mandamiento del prójimo.
  - La excepción introducida por εἰ μὴ se vierte con «sino» por fluidez natural en español tras la negación.
  - La nota a pie de página preserva la alternativa lexical documentada en el audit trail y marca que el griego es literalmente «el otro».
