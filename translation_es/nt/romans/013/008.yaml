  - severity: medium
    issue: La estructura «sino el amarse unos a otros» es menos natural de lo necesario
    rationale: Aunque intenta reflejar el infinitivo articular, en español resulta más fluido y fiel expresar la excepción como «excepto amarse unos a otros» o «excepto el amarse unos a otros». El objetivo es conservar la función sustantival sin rigidez innecesaria.
