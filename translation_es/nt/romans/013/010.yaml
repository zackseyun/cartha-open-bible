translation:
  language: es
  text: El amor no hace daño[a] al prójimo; por tanto, el amor es el cumplimiento[b] de la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no obra mal contra el prójimo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «amor es la plenitud de la ley».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: Se mantiene el término central y repetido del versículo con el equivalente español natural y transparente, sin introducir una terminología eclesiástica más estrecha que podría oscurecer la conexión interna del texto.
- source_word: τῷ πλησίον
  english_pob_choice: to a neighbor
  chosen_spanish: al prójimo
  alternatives_spanish:
  - al vecino
  - a un prójimo
  - al semejante
  lexicon: BDAG
  rationale: El dativo expresa la persona afectada por la acción. En español bíblico, 'prójimo' conserva con claridad el sentido ético general de la relación humana cercana, equivalente al uso genérico del griego.
- source_word: κακὸν
  english_pob_choice: harm
  chosen_spanish: daño
  alternatives_spanish:
  - mal
  - mal alguno
  - perjuicio
  lexicon: BDAG
  rationale: En este contexto κακόν apunta a daño o perjuicio causado a otra persona. 'Daño' suena natural en español y preserva el sentido concreto de lesión ética o relacional mejor que un abstracto 'mal'.
- source_word: οὐκ ἐργάζεται
  english_pob_choice: does no harm
  chosen_spanish: no hace
  alternatives_spanish:
  - no obra
  - no produce
  - no practica
  lexicon: BDAG
  rationale: La idea verbal es que el amor no produce ni ocasiona daño. 'No hace daño' integra el verbo y el objeto de modo idiomático en español, a la vez que conserva la fuerza del negativo.
- source_word: πλήρωμα
  english_pob_choice: the fulfillment
  chosen_spanish: el cumplimiento
  alternatives_spanish:
  - la plenitud
  - la satisfacción
  - la plenitud cumplidora
  lexicon: BDAG
  rationale: '''Cumplimiento'' expresa bien la idea paulina de aquello que lleva la ley a su realización prevista. ''Plenitud'' sería posible, pero en español aquí puede sonar menos preciso y menos directamente jurídico-ético.'
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - así que
  - por consiguiente
  - entonces
  lexicon: BDAG
  rationale: Marca la conclusión inferida a partir de la afirmación anterior. 'Por tanto' conserva el valor argumentativo de οὖν con registro claro y sobrio.
- source_word: νόμου
  english_pob_choice: of the law
  chosen_spanish: de la ley
  alternatives_spanish:
  - de la ley de Moisés
  - de Ley
  lexicon: BDAG
  rationale: El genitivo se refiere a la ley conocida en el argumento paulino; en español basta 'la ley', que mantiene la referencia sin sobreespecificar innecesariamente.
theological_decisions:
- issue: Relación del amor con la ley
  english_pob_reading: love is the fulfillment of the law
  chosen_spanish_reading: el amor es el cumplimiento de la ley
  alternative_spanish_readings:
  - el amor es la plenitud de la ley
  - el amor cumple la ley
  rationale: Se preserva la cláusula nominal del griego y la afirmación teológica de Pablo sin convertirla en un verbo explícito ni diluir la correspondencia entre amor y ley. 'Cumplimiento' mantiene la relación de realización prevista por el texto.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se siguió el texto griego de Romanos 13:10 y el hilo argumental del contexto inmediato. La redacción española conserva la cláusula nominal final y la relación semántica entre ἀγάπη, κακόν, ἐργάζεται y πλήρωμα sin depender mecánicamente del inglés. El registro se mantuvo publicable y claro para lectura eclesial amplia.
  spanish_consistency_notes:
  - Se usó 'amor' para ἀγάπη de manera consistente con el término repetido en el versículo.
  - Se eligió 'prójimo' para τῷ πλησίον por ser el equivalente bíblico más natural en español.
  - Se mantuvo 'ley' sin mayúscula, porque el contexto no exige una capitalización distintiva en español.
  - La nota alternativa de 'plenitud' se conserva porque el griego permite esa tensión semántica, aunque 'cumplimiento' fue preferido en el texto principal.
