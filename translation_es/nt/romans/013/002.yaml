revisions:
- from: Por tanto, el que se resiste a la autoridad se ha opuesto a la ordenanza[a] de Dios, y los que se han opuesto recibirán juicio sobre sí mismos.
  to: Por tanto, el que se resiste a la autoridad se ha opuesto a la ordenanza[a] de Dios, y los que se han opuesto atraerán juicio[b] sobre sí mismos.
  rationale: Se propone una revisión menor para resolver una torpeza idiomática al final del versículo. «Atraerán juicio sobre sí mismos» expresa con claridad y naturalidad en español que la consecuencia recae sobre los opositores, preservando el sentido reflexivo de ἑαυτοῖς. Además, se añade la nota sobre «juicio» para conservar la cautela teológica y léxica ya documentada en el English POB respecto a κρίμα.
  reviewer_model: gpt-5.4
