translation:
  language: es
  text: Por tanto, el que se resiste a la autoridad se ha opuesto a la ordenanza[a] de Dios, y los que se han opuesto atraerán juicio[b] sobre sí mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «la ordenanza de Dios».
    reason: lexical_alternative
  - marker: b
    text: «Juicio» también puede traducirse «condenación» o «sentencia», pero el griego no exige aquí el sentido más fuerte de condenación final.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Introduce una conclusión inferida del versículo anterior. «Por tanto» preserva la fuerza consecutiva con un español natural y sobrio.
- source_word: ὁ ἀντιτασσόμενος
  english_pob_choice: the one who resists
  chosen_spanish: el que se resiste
  alternatives_spanish:
  - quien resiste
  - el que se opone
  lexicon: BDAG
  rationale: El participio articular funciona de manera sustantiva y genérica. «Se resiste» comunica la oposición activa sin perder la construcción natural del español.
- source_word: τῇ ἐξουσίᾳ
  english_pob_choice: the authority
  chosen_spanish: a la autoridad
  alternatives_spanish:
  - a la autoridad gobernante
  - a la autoridad civil
  lexicon: BDAG
  rationale: Se mantiene el sustantivo singular «autoridad», dejando que el contexto inmediato de Romanos 13:1 determine su referencia gubernamental sin sobrecargar la frase.
- source_word: τῇ τοῦ θεοῦ διαταγῇ
  english_pob_choice: the ordinance of God
  chosen_spanish: la ordenanza de Dios
  alternatives_spanish:
  - la disposición de Dios
  - el orden de Dios
  - la orden de Dios
  lexicon: BDAG
  rationale: «διαταγή» apunta a una disposición u orden establecida. «Ordenanza» conserva el matiz formal e institucional que el contexto exige, y en español bíblico sigue siendo inteligible.
- source_word: ἀνθέστηκεν
  english_pob_choice: has opposed
  chosen_spanish: se ha opuesto
  alternatives_spanish:
  - ha resistido
  - se ha puesto contra
  lexicon: BDAG
  rationale: El perfecto expresa una postura ya tomada con efecto vigente. «Se ha opuesto» evita la repetición inmediata de «resiste» y mantiene la continuidad semántica.
- source_word: οἱ δὲ ἀνθεστηκότες
  english_pob_choice: and those who have opposed it
  chosen_spanish: y los que se han opuesto
  alternatives_spanish:
  - y los que han resistido
  - pero los que se han opuesto
  lexicon: BDAG
  rationale: Se conserva el paralelismo con el verbo anterior y se omite el objeto explícito porque en español queda claro por el contexto inmediato; añadir «ello» resultaría innecesario.
- source_word: ἑαυτοῖς
  english_pob_choice: on themselves
  chosen_spanish: sobre sí mismos
  alternatives_spanish:
  - a sí mismos
  - para sí mismos
  lexicon: BDAG
  rationale: La dativo reflexiva indica que el resultado recae sobre los propios opositores. «Sobre sí mismos» expresa bien la carga de responsabilidad o consecuencia.
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - condenación
  - sentencia
  lexicon: BDAG
  rationale: «Juicio» preserva el alcance amplio de κρίμα y evita introducir una condenación final que el texto no especifica explícitamente.
- source_word: λήμψονται
  english_pob_choice: will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - incurrirán en
  - obtendrán
  lexicon: BDAG
  rationale: El futuro medio indica que vendrá sobre ellos la consecuencia judicial. «Recibirán» es directo y mantiene la economía del original.
theological_decisions:
- issue: Alcance de κρίμα
  english_pob_reading: judgment
  chosen_spanish_reading: juicio
  alternative_spanish_readings:
  - condenación
  - sentencia
  rationale: El versículo afirma una consecuencia judicial para quien se opone, pero no precisa condenación eterna. «Juicio» conserva esa tensión sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica sin sobreexplicar el resultado.
- issue: Referencia de ἐξουσία
  english_pob_reading: civil/governing authority in context
  chosen_spanish_reading: autoridad gobernante en el contexto
  alternative_spanish_readings:
  - autoridad en sentido abstracto
  - autoridad civil
  rationale: El contexto inmediato trata de autoridades instituidas por Dios en el ámbito social. Mantener «autoridad» en el texto principal permite la claridad del español y respeta el anclaje contextual.
  doctrine_reference: Primacía del original sobre fórmulas eclesiásticas tradicionales.
translation_notes:
  revision_awareness: El borrador sigue el estado más reciente del auditor inglés, que no requirió cambios sustanciales. Se conservó la lectura de κρίμα como «juicio» y la referencia contextual de ἐξουσία a la autoridad gobernante, sin introducir una condenación más fuerte de la que el griego exige.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ, manteniendo el registro teológico estándar del proyecto.
  - Se prefirió «Por tanto» para ὥστε por su función conclusiva natural en español.
  - Se evitó «SEÑOR» como sustituto del nombre divino porque el versículo no contiene κύριος ni una cita directa del nombre.
  - La puntuación refleja una cláusula causal-consecutiva clara y fluida para lectura pública.
