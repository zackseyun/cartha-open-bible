review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura inferencial de ὥστε, mantiene «autoridad» para ἐξουσία en línea con el contexto de Rom 13:1, y traduce adecuadamente κρίμα como «juicio». También conserva bien el contraste entre «se resiste» y «se ha opuesto». Sin embargo, «recibirán juicio sobre sí mismos» suena poco natural en español y no es la mejor forma de expresar ἑαυτοῖς κρίμα λήμψονται; conviene reformular para mantener el sentido reflexivo de consecuencia que recae sobre ellos mismos.
  spanish_quality_summary: 'El texto es claro y bastante fiel, pero presenta una frase final algo calcada del inglés («recibirán juicio sobre sí mismos»). En español bíblico natural y moderno, «recibirán juicio» o mejor «recibirán juicio sobre sí mismos» no fluye bien; «recibirán juicio ellos mismos» tampoco es ideal. Una solución más idiomática y fiel es «recibirán juicio sobre sí mismos» sustituida por «recibirán juicio» con nota, o mejor «atraerán juicio sobre sí mismos». Dado que el proyecto prioriza no parafrasear más allá del original, la opción más equilibrada es «recibirán juicio sobre sí mismos» ajustar a «recibirán juicio sobre sí mismos»? No; sigue siendo torpe. «Recibirán juicio» pierde ἑαυτοῖς. «Atraerán juicio sobre sí mismos» expresa con claridad el valor reflexivo y es español natural, aunque interpreta algo λήμψονται. Más conservador: «recibirán juicio para sí mismos» también es torpe. Por tanto, se recomienda una reparación menor con formulación idiomática que preserve
    el retorno de la consecuencia.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios», «autoridad» y «juicio» están bien. «Ordenanza de Dios» es aceptable y coincide con la decisión inglesa documentada; la nota alternativa está bien anclada. No se requieren ajustes teológicos mayores.
  issues:
  - severity: medium
    issue: La frase «recibirán juicio sobre sí mismos» es poco natural en español.
    rationale: Aunque intenta reflejar ἑαυτοῖς, resulta calcada y pesada. El español requiere una formulación más idiomática para expresar que la consecuencia recae sobre los mismos opositores.
  - severity: low
    issue: La nota al pie solo preserva una alternativa para «ordenanza de Dios», pero no la alternativa documentada sobre «juicio».
    rationale: El English POB incluye una nota relevante sobre el alcance semántico de κρίμα. No es obligatorio replicarla siempre, pero aquí sería útil porque el español también puede malentender «juicio» como condenación final o sentencia penal estricta.
  revised_spanish_text: Por tanto, el que se resiste a la autoridad se ha opuesto a la ordenanza[a] de Dios, y los que se han opuesto atraerán juicio[b] sobre sí mismos.
  revised_footnotes:
  - marker: a
    text: También puede entenderse «la ordenanza de Dios».
    reason: lexical_alternative
  - marker: b
    text: «Juicio» también puede traducirse «condenación» o «sentencia», pero el griego no exige aquí el sentido más fuerte de condenación final.
    reason: alternative_reading
  revision_rationale: Se propone una revisión menor para resolver una torpeza idiomática al final del versículo. «Atraerán juicio sobre sí mismos» expresa con claridad y naturalidad en español que la consecuencia recae sobre los opositores, preservando el sentido reflexivo de ἑαυτοῖς. Además, se añade la nota sobre «juicio» para conservar la cautela teológica y léxica ya documentada en el English POB respecto a κρίμα.
