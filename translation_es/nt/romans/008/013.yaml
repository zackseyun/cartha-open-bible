translation:
  language: es
  text: Porque si viven según la carne[a], están a punto de morir; pero si por el Espíritu dan muerte a las obras del cuerpo, vivirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, "según la carne".
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conserva el valor explicativo y causal de γάρ al enlazar con el argumento previo, en español natural y publicable.
- source_word: κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - conforme a la carne
  - de acuerdo con la carne
  lexicon: BDAG
  rationale: Se mantiene la imagen literal de σάρξ como "carne", siguiendo la revisión auditada que volvió del sentido interpretativo "sinful nature" a una equivalencia más precisa. "Según" reproduce bien κατά en este giro.
- source_word: ζῆτε
  english_pob_choice: you live
  chosen_spanish: viven
  alternatives_spanish:
  - viven ustedes
  - están viviendo
  lexicon: BDAG
  rationale: El presente indicativo se expresa de manera simple y directa en español, dentro de una condición general.
- source_word: μέλλετε ἀποθνῄσκειν
  english_pob_choice: you are about to die
  chosen_spanish: están a punto de morir
  alternatives_spanish:
  - van a morir
  - están por morir
  lexicon: BDAG
  rationale: '"Están a punto de" refleja con cercanía el matiz de inminencia de μέλλω sin exagerar ni introducir una idea de destino que el griego no exige aquí.'
- source_word: πνεύματι
  english_pob_choice: by the Spirit
  chosen_spanish: por el Espíritu
  alternatives_spanish:
  - por espíritu
  - en el Espíritu
  lexicon: BDAG
  rationale: La mayúscula señala el referente del Espíritu Santo en el contexto de Romanos 8, y la preposición "por" mantiene el valor instrumental de la forma dativa.
- source_word: τὰς πράξεις τοῦ σώματος
  english_pob_choice: the deeds of the body
  chosen_spanish: las obras del cuerpo
  alternatives_spanish:
  - las acciones del cuerpo
  - las prácticas del cuerpo
  - las obras del cuerpo humano
  lexicon: BDAG
  rationale: '"Obras" conserva el contenido ético concreto de πράξεις en un español idiomático; "del cuerpo" mantiene el genitivo explícito y evita suavizar el lenguaje paulino.'
- source_word: θανατοῦτε
  english_pob_choice: you put to death
  chosen_spanish: hacen morir
  alternatives_spanish:
  - dan muerte a
  - mortifican
  lexicon: BDAG
  rationale: '"Hacen morir" transmite el valor causativo y decisivo del verbo sin recurrir a "mortifican", que suena más técnico o eclesiástico que el griego y menos transparente para lectores contemporáneos.'
- source_word: ζήσεσθε
  english_pob_choice: you will live
  chosen_spanish: vivirán
  alternatives_spanish:
  - tendrán vida
  - seguirán viviendo
  lexicon: BDAG
  rationale: El futuro simple expresa con naturalidad la promesa de vida resultante en la apódosis.
theological_decisions:
- issue: Sentido de σάρξ en la contraposición paulina
  english_pob_reading: according to the flesh
  chosen_spanish_reading: según la carne
  alternative_spanish_readings:
  - según la naturaleza pecaminosa
  - según la naturaleza humana
  rationale: El auditorio y la revisión textual favorecen conservar el término corporal/metafórico "carne" en vez de resolverlo interpretativamente como "naturaleza pecaminosa". Así se preserva la tensión lexical de Pablo y la coherencia con el texto griego.
  doctrine_reference: Mantener la distinción entre el término fuente y su interpretación teológica contextual, evitando una paráfrasis doctrinal excesiva.
- issue: Referencia de πνεύματι
  english_pob_reading: by the Spirit
  chosen_spanish_reading: por el Espíritu
  alternative_spanish_readings:
  - por el espíritu
  - en el Espíritu
  rationale: En Romanos 8 el contexto inmediato favorece el Espíritu Santo como agente de la acción; la mayúscula y el artículo implícito en español lo hacen claro sin añadir palabras ajenas al texto.
  doctrine_reference: Lectura pneumatológica del contexto inmediato de Romanos 8.
- issue: Valor de μέλλετε ἀποθνῄσκειν
  english_pob_reading: you are about to die
  chosen_spanish_reading: están a punto de morir
  alternative_spanish_readings:
  - van a morir
  - están destinados a morir
  rationale: La formulación conserva la inminencia del griego μέλλω sin convertirla en fatalismo ni en una expresión demasiado coloquial.
  doctrine_reference: Evitar leer una necesidad absoluta donde el griego destaca proximidad o consecuencia segura en el marco argumental.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del audit trail que corrigió la lectura interpretativa de σάρκα a una equivalencia más literal con "flesh" y ajustó μέλλετε ἀποθνῄσκειν hacia una expresión de inminencia más directa. La versión española sigue esa revisión, conservando además la decisión estable de leer πνεύματι como el Espíritu Santo y τὰς πράξεις τοῦ σώματος como "las obras del cuerpo".
  spanish_consistency_notes:
  - Se mantuvo "carne" en lugar de una paráfrasis doctrinal como "naturaleza pecaminosa", para respetar la terminología fuente.
  - Se usó "Espíritu" con mayúscula por el contexto de Romanos 8 y la decisión auditada de entender πνεύματι como el Espíritu Santo.
  - '"Obras del cuerpo" conserva la estructura nominal del griego y evita diluir la fuerza ética del pasaje.'
  - La nota al pie se reserva para la alternativa literal de κατὰ σάρκα, porque la decisión española principal ya opta por la literalidad revisada.
