revisions:
- from: ¿Quién es el que condena? Mesías Jesús es el que murió; más aún[a], que fue resucitado[b], que además está a la derecha de Dios[c], que también intercede por nosotros[d].
  to: ¿Quién es el que condena? Mesías Jesús es el que murió—más aún[a], el que fue resucitado[b]—, el que además está a la derecha de Dios[c], el que también intercede por nosotros[d].
  rationale: Se ajustó la sintaxis y la puntuación para reflejar mejor la estructura enfática del griego y del POB inglés, manteniendo intactas las decisiones léxicas principales. También se hizo más idiomática la nota alternativa sobre ὑπὲρ ἡμῶν.
