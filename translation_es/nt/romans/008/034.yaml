review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido griego y el rastro POB en los puntos principales: participio sustantivado (''¿Quién es el que condena?''), título Χριστός como ''Mesías'', pasiva de ἐγερθείς, expresión fija ''a la derecha de Dios'' e intercesión ''por nosotros''. Sin embargo, la puntuación y la sintaxis en español no reflejan bien la estructura enfática del original, donde ''Χριστὸς ὁ ἀποθανών'' funciona como respuesta elíptica y luego se intensifica con μᾶλλον δὲ ἐγερθείς. El uso de punto y coma tras ''murió'' rompe indebidamente esa continuidad.'
  spanish_quality_summary: El español es claro, pero 'Mesías Jesús es el que murió' suena algo forzado en registro natural. Además, la cadena de relativas con 'que... que... que...' queda pesada, y el punto y coma después de 'murió' no corresponde bien al flujo argumentativo. Una leve reestructuración con rayas mejora mucho la legibilidad y conserva la fuerza retórica.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: Χριστός → ''Mesías'', θεοῦ → ''Dios'', ἐντυγχάνει → ''intercede''. No hay conflicto con el glosario. La única mejora es estilístico-sintáctica, no terminológica.'
  issues:
  - severity: medium
    issue: Sintaxis poco natural en 'Mesías Jesús es el que murió'
    rationale: Aunque no es infiel, en español suena rígido. 'Mesías Jesús, el que murió...' o mantener la cadena con rayas reproduce mejor la respuesta enfática del griego y del POB inglés.
  - severity: medium
    issue: Puntuación incorrecta tras 'murió'
    rationale: El punto y coma interrumpe la progresión 'murió—más aún, fue resucitado—', que en griego y en el POB es una intensificación continua, no una nueva oración independiente.
  - severity: low
    issue: 'Nota d poco idiomática: ''a favor de nosotros'''
    rationale: La alternativa española natural para ὑπὲρ ἡμῶν es 'en favor de nosotros' o mejor 'en nuestro favor'. 'A favor de nosotros' suena menos natural.
  revised_spanish_text: ¿Quién es el que condena? Mesías Jesús es el que murió—más aún[a], el que fue resucitado[b]—, el que además está a la derecha de Dios[c], el que también intercede por nosotros[d].
  revised_footnotes:
