source:
  edition: SBLGNT
  text: τίς ὁ ⸀κατακρινῶν; ⸀Χριστὸς ὁ ἀποθανών, μᾶλλον ⸀δὲ ⸀ἐγερθείς, ὅς ⸀καί ἐστιν ἐν δεξιᾷ τοῦ θεοῦ, ὃς καὶ ἐντυγχάνει ὑπὲρ ἡμῶν·
base_translation:
  language: en
  yaml_path: translation/nt/romans/008/034.yaml
  text: Who is the one condemning? Messiah Jesus is the one who died—more than that[a], who was raised—who is also at the right hand of God[d][c][b], who also intercedes for us.
  footnotes:
  - marker: a
    text: Or “Christ.”
    reason: lexical_alternative
  - marker: b
    text: 'Or “who rose.” The Greek verb is passive: “who was raised.”'
    reason: alternative_reading
  - marker: c
    text: “At the right hand of God” is a biblical expression for the place of highest honor and authority.
    reason: cultural_note
  - marker: d
    text: Or “intercedes on our behalf.”
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
