translation:
  language: es
  text: ¿Quién es el que condena? Mesías Jesús es el que murió—más aún[a], el que fue resucitado[b]—, el que además está a la derecha de Dios[c], el que también intercede por nosotros[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “más bien”. La expresión griega μᾶλλον δέ introduce una intensificación o corrección ascendente desde la muerte hasta la resurrección.
    reason: lexical_alternative
  - marker: b
    text: 'O “el que resucitó”. El verbo griego está en pasiva: “el que fue resucitado”.'
    reason: alternative_reading
  - marker: c
    text: “A la derecha de Dios” es una expresión bíblica para el lugar de máximo honor y autoridad.
    reason: cultural_note
  - marker: d
    text: O “en nuestro favor”.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς ὁ κατακρινῶν
  english_pob_choice: Who is the one condemning?
  chosen_spanish: ¿Quién es el que condena?
  alternatives_spanish:
  - ¿Quién condenará?
  - ¿Quién es el condenador?
  lexicon: BDAG; sentido sustantivado del participio presente
  rationale: 'El participio articular presente se vierte de modo sustantivado para conservar la fuerza retórica del texto: no se trata de una abstracción, sino de la figura/persona que condena en curso o como función.'
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG; valor titular de Χριστός
  rationale: Aquí Χριστός funciona como título, no meramente como nombre fijo. Por eso se conserva 'Mesías', siguiendo la norma del proyecto para mantener el sentido titular y la tensión teológica del término.
- source_word: ἀποθανών
  english_pob_choice: who died
  chosen_spanish: que murió
  alternatives_spanish:
  - el que murió
  - que ha muerto
  lexicon: BDAG
  rationale: El aoristo participial se expresa con una relativa simple en pasado, natural en español y fiel al hecho histórico puntual.
- source_word: μᾶλλον δὲ
  english_pob_choice: more than that
  chosen_spanish: más aún
  alternatives_spanish:
  - más bien
  - o mejor dicho
  lexicon: BDAG
  rationale: La expresión intensifica y eleva la afirmación desde la muerte a la resurrección. 'Más aún' comunica bien esa escalada sin borrar el matiz correctivo del griego.
- source_word: ἐγερθείς
  english_pob_choice: who was raised
  chosen_spanish: que fue resucitado
  alternatives_spanish:
  - que resucitó
  - que fue levantado
  lexicon: BDAG
  rationale: 'Se mantiene la voz pasiva del griego: Cristo no es presentado como agente de su propia resurrección, sino como aquel a quien Dios resucitó. ''Fue resucitado'' preserva esa pasividad de forma clara en español.'
- source_word: ἐν δεξιᾷ τοῦ θεοῦ
  english_pob_choice: at the right hand of God
  chosen_spanish: a la derecha de Dios
  alternatives_spanish:
  - a la diestra de Dios
  - junto a Dios en su lugar de honor
  lexicon: BDAG
  rationale: '''A la derecha de Dios'' es una expresión bíblica reconocible y clara en español. Mantiene la imagen de posición de honor y autoridad sin cargar el texto con una glosa explicativa en el cuerpo principal.'
- source_word: ἐντυγχάνει
  english_pob_choice: intercedes
  chosen_spanish: intercede
  alternatives_spanish:
  - aboga por nosotros
  - ruega por nosotros
  lexicon: BDAG
  rationale: '''Intercede'' transmite la idea de representación activa ante Dios y conserva el peso teológico del verbo en contexto de mediación.'
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - en favor de nosotros
  - en nuestro nombre
  lexicon: BDAG
  rationale: '''Por nosotros'' es la equivalencia más natural y breve en español, sin perder el sentido representativo y beneficioso del preposición ὑπέρ.'
theological_decisions:
- issue: Título cristológico Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La lectura del POB en inglés opta por la función titular de Χριστός. En español, 'Mesías' conserva mejor esa carga semántica que 'Cristo', que tiende a funcionar como nombre propio eclesializado.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando el uso es titular'
- issue: Voz pasiva de ἐγερθείς
  english_pob_reading: who was raised
  chosen_spanish_reading: que fue resucitado
  alternative_spanish_readings:
  - que resucitó
  rationale: La pasiva se conserva para no desplazar el foco desde la acción sufrida/recibida por Cristo hacia una formulación activa. Esto mantiene la manera en que el griego presenta la resurrección como obra realizada sobre él.
  doctrine_reference: 'Doctrina de la resurrección: preservación de la voz gramatical del texto fuente'
- issue: Imagen de exaltación 'a la derecha de Dios'
  english_pob_reading: at the right hand of God
  chosen_spanish_reading: a la derecha de Dios
  alternative_spanish_readings:
  - a la diestra de Dios
  rationale: Se conserva la expresión bíblica de honra y autoridad sin sustituirla por una paráfrasis. 'A la derecha' es inteligible para lectores amplios y mantiene la metáfora establecida por el texto.
  doctrine_reference: Uso bíblico de la imagen de entronización/exaltación
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisión del POB en inglés: la oscilación entre ''Christ'' y ''Messiah'' fue resuelta a favor de ''Mesías'' por coherencia doctrinal y por el valor titular de Χριστός. También se preservó la voz pasiva de ἐγερθείς y el sentido representativo de ἐντυγχάνει ὑπὲρ ἡμῶν.'
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para θεοῦ sin mayúsculas reverenciales añadidas.
  - Se evitó 'Cristo' en el texto principal para no neutralizar el valor titular de Χριστός.
  - '''Resucitado'' se eligió con pasiva explícita para reflejar el griego; no se normalizó a una forma activa.'
  - '''A la derecha de Dios'' se prefirió sobre ''a la diestra'' por claridad contemporánea, dejando la alternativa en nota.'
  - La puntuación reproduce la progresión retórica del versículo con pausas equivalentes al original.
