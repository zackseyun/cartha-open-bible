source:
  edition: SBLGNT
  text: τὸ γὰρ ἀδύνατον τοῦ νόμου, ἐν ᾧ ἠσθένει διὰ τῆς σαρκός, ὁ θεὸς τὸν ἑαυτοῦ υἱὸν πέμψας ἐν ὁμοιώματι σαρκὸς ἁμαρτίας καὶ περὶ ἁμαρτίας κατέκρινε τὴν ἁμαρτίαν ἐν τῇ σαρκί,
base_translation:
  language: en
  yaml_path: translation/nt/romans/008/003.yaml
  text: For what the law could not do[a], in that it was weak through the flesh, God did by sending his own Son in the likeness of sinful flesh and for sin; he condemned sin in the flesh[d][c][b],
  footnotes:
  - marker: a
    text: Or, more literally, 'the law’s inability.'
    reason: lexical_alternative
  - marker: b
    text: '''Flesh'' here likely refers to human flesh in its fallen weakness; some translations render the term more interpretively as ''sinful nature'' in certain contexts.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for sin.' The Greek expression can carry a sacrificial sense, 'as a sin offering.'
    reason: alternative_reading
  - marker: d
    text: '''In the likeness of sinful flesh'' affirms the Son’s real humanity while carefully distinguishing him from sin itself.'
    reason: cultural_note
