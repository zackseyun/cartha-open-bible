translation:
  language: es
  text: Porque lo que la ley no podía hacer[a], por cuanto era débil por la carne, Dios lo hizo al enviar a su propio Hijo en semejanza de carne pecaminosa y por el pecado[c]; condenó al pecado en la carne[d][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la incapacidad de la ley».
    reason: lexical_alternative
  - marker: b
    text: «Carne» aquí probablemente se refiere a la carne humana en su debilidad caída; algunas traducciones la vierten más interpretativamente como «naturaleza pecaminosa» en ciertos contextos.
    reason: lexical_alternative
  - marker: c
    text: 'La expresión griega también puede tener un sentido sacrificial: «como ofrenda por el pecado».'
    reason: alternative_reading
  - marker: d
    text: «En semejanza de carne pecaminosa» afirma la verdadera humanidad del Hijo, distinguiéndolo cuidadosamente del pecado mismo.
    reason: cultural_note
lexical_decisions:
- source_word: τὸ γὰρ ἀδύνατον τοῦ νόμου
  english_pob_choice: what the law could not do
  chosen_spanish: lo que la ley no podía hacer
  alternatives_spanish:
  - la incapacidad de la ley
  - lo imposible de la ley
  lexicon: BDAG
  rationale: El neutro sustantivado expresa la incapacidad de la ley para lograr algo. En español, «lo que la ley no podía hacer» conserva esa fuerza impersonal y suena natural sin perder el sentido de limitación.
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: «Ley» comunica bien el referente mosaico en el contexto de Romanos 8, sin introducir una mayúscula interpretativa que el griego aquí no exige.
- source_word: ἠσθένει
  english_pob_choice: it was weak
  chosen_spanish: era débil
  alternatives_spanish:
  - estaba debilitada
  - carecía de fuerza
  lexicon: BDAG
  rationale: El verbo indica debilidad o falta de capacidad. «Era débil» conserva la idea de insuficiencia funcional de manera directa.
- source_word: διὰ τῆς σαρκός
  english_pob_choice: through the flesh
  chosen_spanish: mediante la carne
  alternatives_spanish:
  - por la carne
  - a través de la carne
  lexicon: BDAG
  rationale: «Carne» mantiene el término clave σάρξ sin interpretarlo prematuramente como «naturaleza pecaminosa». «Mediante» expresa mejor el medio o esfera de esa debilidad en español.
- source_word: πέμψας
  english_pob_choice: by sending
  chosen_spanish: al enviar
  alternatives_spanish:
  - habiendo enviado
  - cuando envió
  lexicon: BDAG
  rationale: 'El participio aoristo se vierte de modo instrumental y fluido en español: Dios actuó enviando a su Hijo.'
- source_word: τὸν ἑαυτοῦ υἱὸν
  english_pob_choice: his own Son
  chosen_spanish: a su propio Hijo
  alternatives_spanish:
  - a su Hijo
  - a su mismo Hijo
  lexicon: BDAG
  rationale: «Propio» preserva el énfasis posesivo y relacional de ἑαυτοῦ sin añadir formulaciones más explicativas que el texto no requiere.
- source_word: ἐν ὁμοιώματι σαρκὸς ἁμαρτίας
  english_pob_choice: in the likeness of sinful flesh
  chosen_spanish: en semejanza de carne pecaminosa
  alternatives_spanish:
  - en semejanza de carne de pecado
  - en semejanza de carne caracterizada por el pecado
  lexicon: BDAG
  rationale: «Semejanza» conserva la cautela cristológica del griego. «Carne pecaminosa» refleja la cualidad genitiva de ἁμαρτίας de forma idiomática en español y mantiene la tensión entre verdadera humanidad y ausencia de pecado personal.
- source_word: καὶ περὶ ἁμαρτίας
  english_pob_choice: and for sin
  chosen_spanish: y por el pecado
  alternatives_spanish:
  - y para el pecado
  - y como ofrenda por el pecado
  lexicon: BDAG; LXX usage
  rationale: La versión inglesa revisada optó por la lectura más literal «for sin» para no expandir interpretativamente el texto principal. En español, «por el pecado» conserva esa apertura y no impone de entrada la lectura sacrificial, que se preserva como posibilidad de nota.
- source_word: κατέκρινε
  english_pob_choice: he condemned
  chosen_spanish: condenó
  alternatives_spanish:
  - sentenció contra
  - declaró culpable
  lexicon: BDAG
  rationale: El verbo es judicial. «Condenó» mantiene la fuerza forense y la concisión del original.
- source_word: τὴν ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: al pecado
  alternatives_spanish:
  - el pecado
  lexicon: BDAG
  rationale: El acusativo directo exige un objeto explícito en español. «Al pecado» es natural y mantiene el referente abstracto sin suavizarlo.
- source_word: ἐν τῇ σαρκί
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en su carne
  - en el cuerpo
  lexicon: BDAG
  rationale: Se conserva el mismo término técnico «carne» para mantener la correspondencia con las dos ocurrencias de σάρξ en el versículo y no resolver prematuramente su alcance.
theological_decisions:
- issue: Sentido de σάρξ en el versículo
  english_pob_reading: Rendered 'flesh' in both occurrences, not 'sinful nature.'
  chosen_spanish_reading: Se traduce siempre como «carne», no como «naturaleza pecaminosa».
  alternative_spanish_readings:
  - «naturaleza pecaminosa» en contextos metafóricos
  - «condición humana caída»
  rationale: 'La POB inglesa preserva la tensión del término y evita un traslado interpretativo que borre la imagen paulina. En español, «carne» mantiene esa ambigüedad productiva: humanidad frágil, esfera de la debilidad y contexto de la encarnación.'
  doctrine_reference: 'Contested terms table: σάρξ'
- issue: Relación entre la incapacidad de la ley y la acción de Dios
  english_pob_reading: God did by sending his own Son.
  chosen_spanish_reading: «Dios lo hizo al enviar a su propio Hijo».
  alternative_spanish_readings:
  - «Dios lo realizó enviando a su propio Hijo»
  - «Dios cumplió esto al enviar a su propio Hijo»
  rationale: El añadido «lo hizo» expresa el contraste implícito entre lo que la ley no podía hacer y lo que Dios sí hizo, sin añadir contenido ajeno. «Al enviar» conserva el valor instrumental del participio.
  doctrine_reference: Preserve Greek syntactic contrast
- issue: Lectura de περὶ ἁμαρτίας
  english_pob_reading: for sin; the Greek expression can carry a sacrificial sense, 'as a sin offering.'
  chosen_spanish_reading: «por el pecado» en el texto principal, con posibilidad sacrificial preservada en nota.
  alternative_spanish_readings:
  - «como ofrenda por el pecado»
  - «por el pecado / como sacrificio por el pecado»
  rationale: La revisión inglesa prefirió no expandir la frase principal. En español se mantiene esa sobriedad, pero sin cerrar la puerta a la lectura sacrificial legítima que el uso bíblico permite.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Cristología de 'en semejanza de carne pecaminosa'
  english_pob_reading: Retained 'likeness' without weakening true incarnation or implying Christ's sinfulness.
  chosen_spanish_reading: Se conserva «semejanza» y se evita atribuir pecado personal al Hijo.
  alternative_spanish_readings:
  - formulaciones que eliminen «semejanza»
  - formulaciones que hagan decir al texto que el Hijo fue pecaminoso
  rationale: La traducción debe afirmar la verdadera encarnación y, a la vez, distinguir al Hijo del pecado. El griego sostiene esa tensión; la versión española también debe sostenerla.
  doctrine_reference: Definition of Chalcedon; preserve theological tension
translation_notes:
  revision_awareness: 'La edición inglesa más reciente reordenó la oración para reflejar la estructura griega y movió la frase de sacrificio desde una expansión interpretativa («as a sin offering») a la lectura más literal «for sin». Esta versión española sigue esa revisión: mantiene la prioridad del primer miembro («Porque lo que la ley no podía hacer...») y evita imponer en el texto principal la lectura sacrificial, reservándola para la nota. También conserva la tensión cristológica de «semejanza» y el uso consistente de «carne» para σάρξ.'
  spanish_consistency_notes:
  - Se conserva «carne» para σάρξ en ambas apariciones, en paralelo con la decisión inglesa de mantener «flesh».
  - «Ley» se usa de manera uniforme sin mayúscula interpretativa.
  - La estructura con «Porque... Dios lo hizo...» reproduce el contraste causal del griego.
  - Se evita «Cristo» porque el texto dice υἱός y la convención del proyecto favorece «Hijo» aquí.
  - Los marcadores de nota siguen el orden solicitado y cada uno se ancla en el texto principal.
