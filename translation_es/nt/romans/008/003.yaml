  to: Porque lo que la ley no podía hacer[a], por cuanto era débil por la carne, Dios lo hizo al enviar a su propio Hijo en semejanza de carne pecaminosa y por el pecado[c]; condenó al pecado en la carne[d][b].
  rationale: 'Se hicieron dos reparaciones menores: (1) «por la carne» mejora la naturalidad y refleja mejor el uso contextual de διὰ con σάρξ en Romanos; (2) se corrigió la nota de περὶ ἁμαρτίας para que preserve la alternativa sacrificial real sin repetir como alternativa lo que ya está en el texto principal. El resto del borrador es fiel al griego y a las decisiones documentadas de la POB.'
