  - severity: low
    issue: '''Porque'' puede sonar menos natural que ''Pues'' para γάρ al inicio de una afirmación explicativa.'
    rationale: γάρ aquí conecta con el argumento anterior. 'Pues' suele reflejar mejor ese valor discursivo en español bíblico moderno, aunque 'Porque' no es incorrecto.
  revised_spanish_text: Pues todos los que son guiados por el Espíritu de Dios, estos son hijos[a] de Dios.
