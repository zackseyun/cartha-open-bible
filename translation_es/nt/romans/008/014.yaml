translation:
  language: es
  text: Pues todos los que son guiados por el Espíritu de Dios, estos son hijos[a] de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'hijos de Dios' en sentido inclusivo de descendencia o pertenencia. Se conserva 'hijos' porque el griego dice υἱοί y en este contexto de adopción y herencia preserva mejor ese matiz.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσοι
  english_pob_choice: all who
  chosen_spanish: todos los que
  alternatives_spanish:
  - cuantos
  - los que
  lexicon: BDAG
  rationale: Expresa de manera natural el valor correlativo plural y el alcance universal del grupo, sin volverlo literal y pesado.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Mantiene el valor explicativo/conectivo con el argumento anterior en español natural y claro.
- source_word: πνεύματι θεοῦ
  english_pob_choice: by the Spirit of God
  chosen_spanish: por el Espíritu de Dios
  alternatives_spanish:
  - guiados por el Espíritu de Dios
  - en el Espíritu de Dios
  lexicon: BDAG
  rationale: Con ἄγονται, el dativo funciona instrumentalmente; 'por el Espíritu de Dios' conserva la relación y la formulación paulina. 'Espíritu' se capitaliza por referencia al Espíritu Santo.
- source_word: ἄγονται
  english_pob_choice: are led
  chosen_spanish: son guiados
  alternatives_spanish:
  - son conducidos
  - están siendo guiados
  lexicon: BDAG
  rationale: '''Guiados'' comunica bien la pasiva presente y su sentido direccional en español contemporáneo. ''Conducidos'' puede sonar más rígido o mecánico.'
- source_word: οὗτοι
  english_pob_choice: these are
  chosen_spanish: estos son
  alternatives_spanish:
  - ellos son
  - éstos son
  lexicon: BDAG
  rationale: Preserva el demostrativo enfático de la oración griega con una forma idiomática en español.
- source_word: υἱοί
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - hijos e hijas
  - hijos de familia
  lexicon: BDAG
  rationale: En español, 'hijos' es la forma natural y más clara para el plural masculino inclusivo de filiación; no se fuerza 'hijos varones', que sonaría extraño. Se conserva la idea de sonship/adopción sin introducir una expresión no idiomática.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - pertenecientes a Dios
  - de Dios mismo
  lexicon: BDAG
  rationale: Reproduce de forma directa el genitivo repetido, manteniendo la cadencia y la repetición del versículo.
theological_decisions:
- issue: Si υἱοί θεοῦ debe conservarse como lenguaje de filiación/sonship o suavizarse con una forma inclusiva explícita.
  english_pob_reading: sons of God
  chosen_spanish_reading: hijos de Dios
  alternative_spanish_readings:
  - hijos y hijas de Dios
  - hijos de Dios por adopción
  rationale: El griego usa υἱοί en plural masculino, pero en español 'hijos de Dios' transmite de manera natural la filiación y la herencia implícitas en el contexto de Romanos 8. 'Hijos y hijas' añade elementos no presentes en el texto; 'por adopción' es contextual y puede explicarse en notas, pero no sustituye el enunciado del versículo.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral), contexto de Romanos 8 sobre adopción e herencia
translation_notes:
  revision_awareness: 'El texto sigue el audit trail inglés: mantiene la conexión causal de γάρ, el dativo instrumental de πνεύματι θεοῦ con ''por el Espíritu de Dios'', y la demostración enfática de οὗτοι con ''estos son''. La única adaptación relevante es υἱοί, donde el español requiere una solución idiomática; se eligió ''hijos'' como equivalente natural de filiación, con nota que preserva la alternativa léxica documentada en el POB inglés.'
  spanish_consistency_notes:
  - Se usa 'Espíritu' con mayúscula por referencia al Espíritu Santo.
  - Se evita 'SEÑOR' u otra convención de ocultamiento del nombre divino porque el versículo usa θεοῦ, no κύριος.
  - '''hijos de Dios'' mantiene el paralelismo y la terminología paulina de adopción/inherencia sin calco innecesario.'
  - La nota [a] está anclada en el texto exactamente en 'Dios[a]' para cumplir la validación.
