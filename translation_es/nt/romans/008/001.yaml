translation:
  language: es
  text: Por tanto, ahora no hay condenación para los que están en Mesías Jesús[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos posteriores añaden: «que no andan conforme a la carne». Los testigos griegos más antiguos apoyan aquí la lectura breve.'
    reason: textual_variant
  - marker: b
    text: 'O: «Cristo Jesús».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐδὲν
  english_pob_choice: 'no'
  chosen_spanish: ninguna
  alternatives_spanish:
  - 'no'
  - ningún
  lexicon: BDAG
  rationale: 'En combinación con κατάκριμα, español natural exige una negación enfática: «ninguna condenación». Conserva la fuerza absoluta del griego sin sonar forzado.'
- source_word: ἄρα
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Expresa con claridad la inferencia lógica de la argumentación de Romanos, manteniendo el valor conclusivo de ἄρα.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - actualmente
  lexicon: BDAG
  rationale: 'Se conserva explícitamente el matiz temporal presente: una realidad vigente en el momento del anuncio paulino y para el lector.'
- source_word: κατάκριμα
  english_pob_choice: condemnation
  chosen_spanish: condenación
  alternatives_spanish:
  - sentencia condenatoria
  - condena penal
  lexicon: BDAG
  rationale: «Condenación» es la equivalencia más transparente y fiel para el veredicto judicial adverso expresado por κατάκριμα.
- source_word: τοῖς ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: for those in Messiah Jesus
  chosen_spanish: para los que están en Mesías Jesús
  alternatives_spanish:
  - para los que están en Cristo Jesús
  - para los que están en el Mesías Jesús
  lexicon: BDAG
  rationale: Se conserva la preposición de pertenencia/unión con «están en» para reflejar la relación paulina sin reducirla a una explicación causal. Se mantiene «Mesías» conforme a la política del proyecto para Χριστός como título con fuerza semántica activa.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se traduce el título en vez de transliterarlo, porque aquí λειτουργa como designación teológica y no como mero nombre fijo.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: BDAG
  rationale: Nombre propio estándar en español para Ἰησοῦς.
theological_decisions:
- issue: Sentido de «ἐν Χριστῷ Ἰησοῦ»
  english_pob_reading: A union-with-Christ phrase identifying those who belong to and are incorporated into Messiah Jesus.
  chosen_spanish_reading: 'Una expresión de unión/pertenencia: los que están unidos a Mesías Jesús.'
  alternative_spanish_readings:
  - los que están en Mesías Jesús como simple ubicación espiritual
  - los que están por causa de Mesías Jesús
  rationale: Se preserva la tensión teológica de la preposición ἐν como unión real y pertenencia, sin resolverla en una sola paráfrasis causal o locativa.
  doctrine_reference: Mantener la tensión teológica paulina de unión con Cristo/Mesías.
- issue: Variante textual larga añadida en manuscritos posteriores
  english_pob_reading: 'Some later manuscripts add: ''who do not walk according to the flesh.'' The earliest Greek witnesses support the shorter reading here.'
  chosen_spanish_reading: 'Se sigue la lectura breve: no se incorpora la cláusula larga en el texto principal.'
  alternative_spanish_readings:
  - incluir «que no andan conforme a la carne»
  - mencionar la cláusula solo en nota
  rationale: La evidencia griega más antigua favorece la forma breve, por lo que la cláusula adicional queda documentada solo como variante textual.
  doctrine_reference: Crítica textual del NT; priorizar el testimonio más antiguo.
translation_notes:
  revision_awareness: La base inglesa siguió la lectura corta y restauró «Messiah» tras una revisión que había introducido «Christ» contra la política del proyecto. En español se refleja esa restauración manteniendo «Mesías» en el texto principal y documentando la variante «Cristo Jesús» en nota.
  spanish_consistency_notes:
  - Se mantiene la negación absoluta con «ninguna condenación» para evitar una formulación más débil.
  - «Por tanto» conserva la lógica inferencial al inicio de la cláusula.
  - «Mesías Jesús» sigue la terminología del proyecto para Χριστός; se evita «Cristo» en el texto principal.
  - La nota textual a documenta la omisión de la cláusula larga, sin incorporarla al texto.
  - La nota b preserva la alternativa léxica española para lectores que prefieran la forma tradicional «Cristo Jesús».
