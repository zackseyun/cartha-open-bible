translation:
  language: es
  text: Porque estoy convencido de que ni la muerte ni la vida, ni los ángeles ni las autoridades[a], ni lo presente ni lo por venir, ni los poderes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «principados» para ἀρχαὶ; posible referencia a autoridades cósmicas o espirituales.
    reason: lexical_alternative
lexical_decisions:
- source_word: πέπεισμαι
  english_pob_choice: I am convinced
  chosen_spanish: estoy convencido
  alternatives_spanish:
  - estoy persuadido
  - he llegado a estar convencido
  lexicon: BDAG
  rationale: El perfecto griego expresa un estado presente resultante de una convicción previa. «Estoy convencido» comunica bien ese valor durativo y resulta natural en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón o apoyo de lo anterior; «Porque» conserva la fuerza explicativa de γάρ sin oscurecer el enlace lógico.
- source_word: οὔτε ... οὔτε
  english_pob_choice: neither ... nor
  chosen_spanish: ni ... ni
  alternatives_spanish:
  - no ... ni
  lexicon: BDAG
  rationale: La correlación negativa se expresa de forma natural en español con «ni ... ni», preservando el ritmo acumulativo de la lista.
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: BDAG
  rationale: Correspondencia directa y estándar; el artículo definido ayuda a la fluidez del español sin alterar el sentido.
- source_word: ζωή
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  lexicon: BDAG
  rationale: Traducción directa y antitética respecto de «la muerte».
- source_word: ἄγγελοι
  english_pob_choice: angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: El contexto de realidades cósmicas o suprahumanas favorece «ángeles»; «mensajeros» sería posible en abstracto, pero no se ajusta tan bien al campo semántico del pasaje.
- source_word: ἀρχαὶ
  english_pob_choice: rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - las autoridades
  - los principados
  lexicon: BDAG
  rationale: «Gobernantes» mantiene la amplitud de la referencia y evita imponer de entrada la fórmula técnica «principados y potestades». En español, «autoridades» podría sonar más institucional, y «principados» carga una tradición terminológica más específica.
- source_word: ἐνεστῶτα
  english_pob_choice: things present
  chosen_spanish: lo presente
  alternatives_spanish:
  - las cosas presentes
  - lo que está presente
  lexicon: BDAG
  rationale: Como participio sustantivado, se refiere a la esfera de la realidad presente. «Lo presente» es breve, natural y conserva el valor abstracto.
- source_word: μέλλοντα
  english_pob_choice: things to come
  chosen_spanish: lo por venir
  alternatives_spanish:
  - lo futuro
  - las cosas venideras
  lexicon: BDAG
  rationale: Mantiene el paralelismo con «lo presente» y reproduce la referencia amplia a la realidad futura sin reducirla a «cosas».
- source_word: δυνάμεις
  english_pob_choice: powers
  chosen_spanish: los poderes
  alternatives_spanish:
  - las potestades
  - las fuerzas
  lexicon: BDAG
  rationale: «Poderes» conserva la ambigüedad entre fuerzas impersonales y potestades personales o espirituales, tal como la mantiene el texto griego y la audita la POB en inglés.
theological_decisions:
- issue: Cómo rendir ἀρχαὶ sin resolver de antemano si son autoridades humanas o poderes cósmicos/espirituales
  english_pob_reading: Used the broader renderings 'rulers' and 'powers' in the main text
  chosen_spanish_reading: «los gobernantes» en la línea principal, manteniendo la amplitud de la lista
  alternative_spanish_readings:
  - los principados
  - las autoridades
  - los poderes
  rationale: El griego puede abarcar autoridades gobernantes o poderes cósmicos. «Los gobernantes» es comprensible y suficientemente amplio, y evita fijar una lectura técnico-dogmática. La nota permite la alternativa tradicional sin imponerla como única.
  doctrine_reference: Preservar la tensión teológica del término sin resolverla artificialmente.
translation_notes:
  revision_awareness: El contexto auditado en inglés no mostró revisiones sustanciales; la versión aprobada permanece estable. Se conservó la estructura acumulativa y la ambigüedad de ἀρχαὶ y δυνάμεις, usando equivalentes españoles naturales que no reducen el alcance del texto.
  spanish_consistency_notes:
  - Se mantiene «Cristo»/«Mesías» fuera de este versículo, sin implicación terminológica adicional.
  - Se usó «Poderes» con mayúscula solo si el contexto editorial de la serie lo requiriera; aquí se deja en minúscula para seguir la forma común y no añadir énfasis interpretativo.
  - La correlación negativa «ni ... ni» reproduce la cadencia del original sin expandir el listado.
