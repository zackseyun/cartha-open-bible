revisions:
- from: porque el pensamiento de la carne es hostilidad contra Dios[a], pues no se somete a la ley de Dios[b], porque ni siquiera puede.
  to: porque la mentalidad de la carne es hostil a Dios[a], pues no se somete a la ley de Dios[b], porque ni siquiera puede.
  rationale: Se ajusta φρόνημα a «mentalidad» para reflejar mejor la orientación disposicional del griego; se adopta «es hostil a Dios» por mayor naturalidad y en línea con la revisión inglesa auditada; y se corrige la nota [a] para preservar la alternativa interpretativa documentada para σάρξ («naturaleza pecaminosa»). No se requiere adjudicación adicional porque son reparaciones claras de fidelidad léxica y legibilidad.
