translation:
  language: es
  text: porque la mentalidad de la carne es hostil a Dios[a], pues no se somete a la ley de Dios[b], porque ni siquiera puede.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la naturaleza pecaminosa».
    reason: lexical_alternative
  - marker: b
    text: O «enemistad contra Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduces la causa de la afirmación anterior. «Porque» es la opción más natural y directa en español, y conserva el valor causal de διότι sin añadir matices explicativos indebidos.
- source_word: τὸ φρόνημα
  english_pob_choice: mindset
  chosen_spanish: el pensamiento
  alternatives_spanish:
  - la mentalidad
  - la manera de pensar
  - la disposición mental
  lexicon: BDAG
  rationale: φρόνημα apunta a una orientación o disposición mental más que a un acto aislado de pensar. En español, «pensamiento» funciona aquí como sustantivo de sentido amplio y evita una frase demasiado técnica; se deja la alternativa interpretativa en nota.
- source_word: τῆς σαρκὸς
  english_pob_choice: the flesh
  chosen_spanish: de la carne
  alternatives_spanish:
  - de la naturaleza pecaminosa
  lexicon: BDAG
  rationale: Se mantiene «carne» para preservar el término paulino y su tensión semántica. La alternativa interpretativa «naturaleza pecaminosa» se documenta como opción explicativa, pero no se sustituye en el texto principal.
- source_word: ἔχθρα
  english_pob_choice: hostile / hostility
  chosen_spanish: hostilidad
  alternatives_spanish:
  - enemistad
  - es hostil
  lexicon: BDAG
  rationale: 'El sustantivo expresa oposición activa. «Hostilidad» conserva el sustantivo griego y permite una construcción natural en español: «es hostilidad contra Dios». Se documenta también la opción adjetival como alternativa estilística.'
- source_word: εἰς θεόν
  english_pob_choice: to/toward God
  chosen_spanish: contra Dios
  alternatives_spanish:
  - hacia Dios
  - para con Dios
  lexicon: BDAG
  rationale: Aunque εἰς puede señalar dirección, en este contexto la hostilidad se dirige adversarialmente a Dios. «Contra Dios» comunica con claridad el sentido relacional de oposición sin perder la base direccional.
- source_word: ὑποτάσσεται
  english_pob_choice: does not submit
  chosen_spanish: no se somete
  alternatives_spanish:
  - no está sujeto
  - no se sujeta
  lexicon: BDAG
  rationale: El verbo indica subordinación voluntaria o reconocida. «No se somete» es idiomático y mantiene la idea de falta de rendición al orden de Dios.
- source_word: νόμῳ τοῦ θεοῦ
  english_pob_choice: the law of God
  chosen_spanish: la ley de Dios
  alternatives_spanish:
  - la ley de Dios
  - la ley divina
  lexicon: BDAG
  rationale: La construcción genitiva se conserva de modo directo. «La ley de Dios» es clara y formalmente equivalente, manteniendo el paralelismo con el griego.
- source_word: οὐδὲ γὰρ δύναται
  english_pob_choice: for it is not even able
  chosen_spanish: porque ni siquiera puede
  alternatives_spanish:
  - pues tampoco puede
  - porque no puede
  lexicon: BDAG
  rationale: δύναται expresa capacidad real, no solo voluntad. «Ni siquiera puede» reproduce el énfasis de οὐδέ y conserva la afirmación de incapacidad sin suavizarla ni resolver la tensión teológica.
theological_decisions:
- issue: Cómo traducir σάρξ sin borrar la carga paulina ni imponer una interpretación reductiva
  english_pob_reading: Render σάρξ as 'flesh' in the main text, with the interpretive alternative preserved in a footnote.
  chosen_spanish_reading: Traducir σάρξ como «carne» en el texto principal, con la alternativa interpretativa «naturaleza pecaminosa» en nota.
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - naturaleza humana caída
  rationale: El término es una metáfora paulina cargada y no debe neutralizarse del todo. «Carne» conserva la forma fuente y su ambigüedad teológica; la nota permite al lector ver la lectura interpretativa sin reemplazarla en el texto.
  doctrine_reference: 'Contested terms table: σάρξ = ''carne'' (principal) / ''naturaleza pecaminosa'' (interpretive alternative), context-sensitive.'
- issue: Cómo expresar ἔχθρα εἰς θεόν sin diluir la oposición hacia Dios
  english_pob_reading: hostile to God
  chosen_spanish_reading: «hostilidad contra Dios»
  alternative_spanish_readings:
  - enemistad contra Dios
  - hostil a Dios
  rationale: La frase puede leerse como estado o cualidad. «Hostilidad contra Dios» mantiene el sustantivo, refleja la fuerza relacional del griego y evita convertir prematuramente el sustantivo en adjetivo, aunque la alternativa adjetival es válida estilísticamente.
  doctrine_reference: Preserve lexical tension between noun and adjective in hostile/hostility language.
- issue: Si la cláusula final debe interpretarse como incapacidad o como simple negativa voluntaria
  english_pob_reading: 'Translate as a plain statement of inability: ''it is not even able.'''
  chosen_spanish_reading: «porque ni siquiera puede»
  alternative_spanish_readings:
  - porque no puede
  - pues no le es posible
  rationale: δύναμαι se refiere a capacidad. La traducción conserva la imposibilidad expresa del texto y no la reemplaza por una idea de mera resistencia voluntaria.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó una formulación para sonar más natural sin cambiar el sentido; por eso el español opta por una construcción igualmente natural («es hostilidad contra Dios») y mantiene intacta la afirmación de incapacidad final.
  spanish_consistency_notes:
  - Se conservó «carne» como término paulino principal y no se sustituyó por una paráfrasis doctrinal.
  - Se eligió «se somete» para ὑποτάσσεται por su naturalidad y porque preserva el matiz de subordinación.
  - Se evitó «Cristo» o terminología no pertinente; el versículo no contiene Χριστός.
  - 'La puntuación reproduce la progresión causal del griego: causa general, explicación, incapacidad final.'
