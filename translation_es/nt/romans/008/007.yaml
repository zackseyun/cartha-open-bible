review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura causal, mantiene «carne» para σάρξ, expresa correctamente la no sumisión a la ley de Dios y conserva la incapacidad final de δύναται. Sin embargo, «el pensamiento de la carne» no comunica tan bien como «la mentalidad de la carne» o «la manera de pensar de la carne» el valor disposicional de φρόνημα. Además, la nota [a] no preserva la alternativa documentada por el English POB para σάρξ («sinful nature»), sino que introduce una alternativa para φρόνημα, lo cual rompe la trazabilidad del expediente. También conviene mejorar la naturalidad de «es hostilidad contra Dios» con una formulación más idiomática que preserve el sentido de ἔχθρα.
  spanish_quality_summary: El español es comprensible, pero «el pensamiento de la carne» suena menos natural y menos preciso que «la mentalidad de la carne». «Es hostilidad contra Dios» es inteligible, pero en español bíblico moderno suena algo forzado; «es hostil a Dios» fluye mejor y coincide con la revisión inglesa auditada. La puntuación y el registro son adecuados.
  glossary_alignment: 'Alinea bien «carne», «Dios» y «la ley de Dios». No hay conflicto con terminología de proyecto. La principal desviación es de documentación léxica: la nota alternativa asociada al texto principal debería preservar la opción interpretativa de σάρξ («naturaleza pecaminosa») y no sustituirla por una alternativa de φρόνημα.'
  issues:
  - severity: medium
    issue: φρόνημα se vierte como «pensamiento»
    rationale: Aunque posible, «pensamiento» puede sugerir un pensamiento aislado más que una orientación o disposición mental. «Mentalidad» comunica mejor el sentido disposicional documentado en el expediente inglés.
  - severity: medium
    issue: La nota [a] no corresponde a la alternativa auditada para σάρξ
    rationale: El English POB conserva en nota la alternativa interpretativa «sinful nature» para σάρξ. El borrador español pone «la disposición de la carne», que cambia el foco a φρόνημα y pierde la trazabilidad lexical/theological requerida.
  - severity: low
    issue: «es hostilidad contra Dios» suena menos idiomático en español
    rationale: Preserva el sustantivo griego, pero la revisión inglesa ya optó por una formulación adjetival por naturalidad. «es hostil a Dios» mantiene el sentido de ἔχθρα εἰς θεόν con mejor legibilidad en español.
  revised_spanish_text: porque la mentalidad de la carne es hostil a Dios[a], pues no se somete a la ley de Dios[b], porque ni siquiera puede.
