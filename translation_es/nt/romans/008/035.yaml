translation:
  language: es
  text: ¿Quién nos separará del amor del Mesías? ¿Tribulación o angustia o persecución o hambruna o desnudez o peligro o espada?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “de nuestro amor por el Mesías”. El genitivo griego también puede leerse así, aunque el contexto favorece “el amor del Mesías”.
    reason: alternative_reading
lexical_decisions:
- source_word: τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Qué persona
  - ¿Quién es el que
  lexicon: BDAG
  rationale: Interrogativo personal natural en español para conservar la pregunta retórica de Pablo.
- source_word: χωρίσει
  english_pob_choice: will separate
  chosen_spanish: separará
  alternatives_spanish:
  - dividirá
  - apartará
  - severará
  lexicon: BDAG
  rationale: El futuro simple expresa la acción futura o potencial de separación de forma idiomática y directa en español.
- source_word: ἀγάπης
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor
  - afecto
  lexicon: BDAG
  rationale: Se sigue el valor básico de ἀγάπη como “amor”, sin suavizar el alcance relacional del término.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: the love of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  - del Mesías
  lexicon: BDAG
  rationale: 'Se mantiene la terminología del proyecto para Χριστός como “Mesías”. El genitivo se vierte de modo natural en español como relación posesiva: “el amor del Mesías”.'
- source_word: θλῖψις
  english_pob_choice: trouble
  chosen_spanish: tribulación
  alternatives_spanish:
  - aflicción
  - problema
  - tribulación
  lexicon: BDAG
  rationale: Para conservar la fuerza de presión/aflicción del término, “tribulación” comunica mejor el peso del contexto que un término demasiado general como “problema”.
- source_word: στενοχωρία
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - angustia
  - apremio
  - angustia/opresión
  lexicon: BDAG
  rationale: El campo de estrechez o constricción se puede expresar en español con “angustia”, que conserva la sensación de presión interna y externa.
- source_word: διωγμός
  english_pob_choice: persecution
  chosen_spanish: persecución
  alternatives_spanish:
  - persecución
  lexicon: BDAG
  rationale: Equivalente directo y preciso en español cristiano contemporáneo.
- source_word: λιμός
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambre
  - hambruna
  lexicon: BDAG
  rationale: Aunque “famine” puede ser “hambruna”, aquí “hambre” es más breve y natural en una lista retórica, sin perder la idea de carestía severa.
- source_word: γυμνότης
  english_pob_choice: nakedness
  chosen_spanish: desnudez
  alternatives_spanish:
  - desnudez
  - falta de ropa
  - carencia de vestido
  lexicon: BDAG
  rationale: “Desnudez” conserva la fuerza literal y la tradición bíblica sin sonar forzado en español moderno.
- source_word: κίνδυνος
  english_pob_choice: danger
  chosen_spanish: peligro
  alternatives_spanish:
  - peligro
  - riesgo
  - peril
  lexicon: BDAG
  rationale: “Peligro” es el equivalente natural y plenamente comprensible en español.
- source_word: μάχαιρα
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - espada
  - arma
  lexicon: BDAG
  rationale: Se mantiene la imagen literal de violencia letal; “espada” es la equivalencia directa y tradicional.
theological_decisions:
- issue: Genitivo en τοῦ Χριστοῦ
  english_pob_reading: the love of the Messiah
  chosen_spanish_reading: el amor del Mesías
  alternative_spanish_readings:
  - el amor por el Mesías
  - el amor hacia el Mesías
  rationale: En el contexto de Romanos 8:31–39, la lectura preferida es objetiva/sujetiva hacia la provisión amorosa del Mesías a favor de los creyentes; el español conserva la ambigüedad gramatical del genitivo de manera natural, sin forzarla a “amor por el Mesías”.
  doctrine_reference: Preservar la tensión del genitivo sin eliminar la lectura favorecida por el contexto.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando el marcador [a] en el texto principal. La redacción sigue de cerca el griego y el ajuste clave es mantener la nota alternativa sobre el genitivo de τοῦ Χριστοῦ, tal como indica el aparato inglés.
  spanish_consistency_notes:
  - Se conserva “Mesías” para Χριστός, conforme al criterio del proyecto.
  - Se mantiene la serie de sustantivos con paralelismo retórico y sin añadir conectores interpretativos.
  - La nota [a] está anclada exactamente en el punto donde la ambigüedad del genitivo afecta la traducción.
