review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta correctamente la estructura y el sentido básico del griego: γὰρ como conexión explicativa, κτίσις como alcance colectivo/cósmico, ἀποκάλυψις como futura manifestación, y υἱῶν τοῦ θεοῦ como filiación divina. Sin embargo, la formulación española ''la expectativa ansiosa de la creación aguarda'' suena innecesariamente abstracta y pesada, y no refleja tan bien como podría la solución adverbial del inglés POB para ἀποκαραδοκία.'
  spanish_quality_summary: 'La redacción actual es comprensible, pero algo rígida y poco idiomática. En español bíblico natural, ''la creación espera con ansiosa expectativa'' o ''aguarda con ansiosa expectativa'' fluye mejor que hacer de ''expectativa'' el sujeto. Además, la nota al pie está mal formulada: dice ''O «hijos de Dios»'' cuando el texto principal ya dice exactamente eso; debe ofrecer la alternativa real ''O «hijos/as» / «hijos de Dios» vs. «hijos»?''. Dado el audit trail inglés, la alternativa correcta es ''O «hijos e hijas de Dios»'' o más literalmente ''O «niños/children of God»'', pero en español eclesial la mejor equivalencia es ''O «hijos e hijas de Dios»'' o ''O «hijos de Dios»'' solo si el texto principal fuera distinto. Aquí no lo es.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Dios' y 'hijos de Dios' son adecuados. La principal mejora es estilística y de fidelidad funcional para ἀποκαραδοκία. La decisión de mantener 'hijos' es compatible con la justificación teológica del POB, pero la nota debe reflejar la alternativa inglesa 'children of God' de manera útil en español.
  issues:
  - severity: medium
    issue: 'Construcción poco natural: ''la expectativa ansiosa de la creación aguarda'''
    rationale: 'Aunque posible, esta nominalización duplica la idea de esperar y suena pesada en español. El inglés POB ya resolvió ἀποκαραδοκία de forma adverbial; en español conviene algo similar: ''la creación espera con ansiosa expectativa''.'
  - severity: medium
    issue: Nota al pie incorrecta o inútil
    rationale: 'La nota dice ''O «hijos de Dios»'', pero esa es exactamente la lectura del texto principal. No ofrece una alternativa real. Debe ajustarse a la alternativa documentada por el POB inglés: ''O «hijos e hijas de Dios»'' o equivalente explicativo.'
  revised_spanish_text: Porque la creación espera con ansiosa expectativa la revelación de los hijos de Dios[a].
  revised_footnotes:
  - marker: a
    text: O «hijos e hijas de Dios». El griego dice «hijos», lo cual también puede subrayar el estatus filial y la condición de herederos.
    reason: lexical_alternative
  revision_rationale: Se revisa para lograr un español más natural y fiel a la función del griego ἀποκαραδοκία, evitando una construcción abstracta y pesada. También se corrige la nota al pie para que presente una alternativa real y coherente con el audit trail inglés.
