translation:
  language: es
  text: Porque la creación espera con ansiosa expectativa la revelación de los hijos de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos e hijas de Dios». El griego dice «hijos», lo cual también puede subrayar el estatus filial y la condición de herederos.
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Así que
  - Ya que
  lexicon: BDAG
  rationale: Conecta de manera explicativa con el contexto anterior, conservando la relación lógica que el inglés POB expresó con 'For'.
- source_word: ἀποκαραδοκία
  english_pob_choice: with eager expectation
  chosen_spanish: la expectativa ansiosa
  alternatives_spanish:
  - la espera ansiosa
  - la ferviente expectativa
  - la esperanza ardiente
  lexicon: BDAG
  rationale: El sustantivo comunica una espera intensa y atenta; 'expectativa ansiosa' conserva esa fuerza sin volver la frase pesada en español.
- source_word: κτίσεως
  english_pob_choice: the creation
  chosen_spanish: la creación
  alternatives_spanish:
  - la criatura
  - el orden creado
  lexicon: BDAG
  rationale: '''La creación'' mantiene el alcance cósmico y colectivo del contexto paulino, no un ser individual.'
- source_word: ἀποκάλυψιν
  english_pob_choice: the revealing
  chosen_spanish: la revelación
  alternatives_spanish:
  - el revelarse
  - la manifestación
  lexicon: BDAG
  rationale: '''Revelación'' es natural en español bíblico y expresa la futura manifestación de lo que ahora está oculto; ''manifestación'' sería posible, pero menos directo con el sustantivo griego.'
- source_word: υἱῶν
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - hijos e hijas
  - niños
  lexicon: BDAG
  rationale: En español, 'hijos de Dios' conserva la filiación y el valor heredero sin sonar artificial como un calco de 'sons'. Dado que el texto receptor usa un sustantivo masculino genérico, no se pierde la referencia masculina griega de forma funcional en esta lengua.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios mismo
  lexicon: BDAG
  rationale: Genitivo relacional directo y transparente en español.
- source_word: ἀπεκδέχεται
  english_pob_choice: waits
  chosen_spanish: aguarda
  alternatives_spanish:
  - espera
  - está esperando
  lexicon: BDAG
  rationale: '''Aguarda'' conserva el matiz de espera orientada al futuro, con un tono algo más solemne que ''espera''. La idea de intensidad ya queda expresada por ''expectativa ansiosa''.'
theological_decisions:
- issue: Cómo reflejar la relación entre el sujeto colectivo 'la creación' y su espera escatológica.
  english_pob_reading: The creation waits with eager expectation for the revealing of the sons of God.
  chosen_spanish_reading: La creación aguarda la revelación de los hijos de Dios.
  alternative_spanish_readings:
  - La creación espera ansiosamente la revelación de los hijos de Dios.
  - La creación aguarda con ansiosa expectativa la revelación de los hijos de Dios.
  rationale: El español elegido distribuye la intensidad entre 'expectativa ansiosa' y 'aguarda' para evitar redundancia y mantener el énfasis escatológico del griego. No se atenúa la personificación de la creación ni su orientación al acto futuro de revelación.
  doctrine_reference: Romanos 8:19; escatología paulina
- issue: Si traducir υἱῶν como 'hijos' o 'hijos e hijas' en español.
  english_pob_reading: sons of God
  chosen_spanish_reading: hijos de Dios
  alternative_spanish_readings:
  - hijos e hijas de Dios
  - hijos varones de Dios
  rationale: La POB inglesa preserva 'sons' por precisión léxica y connota filiación/herencia. En español, 'hijos de Dios' es la forma idiomática natural que mantiene esa filiación sin forzar una construcción marcada; además, el masculino plural funciona de modo genérico en el receptor, sin borrar el trasfondo filial del término griego.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Coincide con el último pase de revisión indicado como sin cambios y con acuerdo alto; no se detectan revisiones aplicadas en el paquete de origen.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ de forma consistente con el estándar del proyecto.
  - Se evita 'Cristo' porque el versículo no contiene Χριστός.
  - Se preserva una cadencia bíblica clara en español sin depender de una calca inglesa demasiado rígida.
  - La nota de pie mantiene la alternativa lexical documentada por la POB inglesa y adapta la observación al español.
