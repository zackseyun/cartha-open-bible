- from: Porque la expectativa ansiosa de la creación aguarda la revelación de los hijos de Dios[a].
  to: Porque la creación espera con ansiosa expectativa la revelación de los hijos de Dios[a].
  rationale: Se revisa para lograr un español más natural y fiel a la función del griego ἀποκαραδοκία, evitando una construcción abstracta y pesada. También se corrige la nota al pie para que presente una alternativa real y coherente con el audit trail inglés.
