translation:
  language: es
  text: ni altura ni profundidad ni ninguna otra cosa creada[a] podrá separarnos del amor de Dios, que está en Mesías Jesús, nuestro Señor[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cualquier otra cosa en la creación» o «cualquier otra criatura».
    reason: lexical_alternative
  - marker: b
    text: «Mesías Jesús» traduce el título griego Χριστῷ Ἰησοῦ; tradicionalmente se ha vertido «Cristo Jesús».
    reason: lexical_alternative
  - marker: c
    text: Aquí «el amor de Dios» probablemente significa el amor de Dios por nosotros.
    reason: alternative_reading
lexical_decisions:
- source_word: ὕψωμα
  english_pob_choice: height
  chosen_spanish: altura
  alternatives_spanish:
  - alto
  - elevación
  lexicon: BDAG
  rationale: En la pareja con βάθος, el sentido espacial es el más natural. «Altura» conserva el contraste retórico y suena natural en español.
- source_word: βάθος
  english_pob_choice: depth
  chosen_spanish: profundidad
  alternatives_spanish:
  - lo profundo
  - abismo
  lexicon: BDAG
  rationale: Junto con ὕψωμα forma una merismo de extremos espaciales. «Profundidad» es claro y directo en español.
- source_word: κτίσις ἑτέρα
  english_pob_choice: any other created thing
  chosen_spanish: ninguna otra cosa creada
  alternatives_spanish:
  - ninguna otra criatura
  - cualquier otra cosa en la creación
  lexicon: BDAG
  rationale: κτίσις puede significar «creación» o «criatura», pero aquí el contexto favorece un sentido abarcador dentro del orden creado. «Cosa creada» preserva bien la fuerza general y evita restringir innecesariamente el término.
- source_word: δυνήσεται
  english_pob_choice: will be able
  chosen_spanish: podrá
  alternatives_spanish:
  - será capaz de
  - tendrá poder para
  lexicon: BDAG
  rationale: El futuro de capacidad se expresa de forma natural con «podrá», que mantiene el valor futuro y la idea de posibilidad/capacidad.
- source_word: χωρίσαι
  english_pob_choice: to separate
  chosen_spanish: separarnos
  alternatives_spanish:
  - apartarnos
  - dividirnos
  lexicon: BDAG
  rationale: «Separar» es la correspondencia más directa y la más adecuada en Romanos 8 para la seguridad de los creyentes. Se usa con enclítico para fluidez española.
- source_word: ἀγάπης
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor fraternal
  - caridad
  lexicon: BDAG
  rationale: 'Se sigue el equivalente normal de ἀγάπη en este contexto: «amor». Mantiene transparencia léxica y claridad.'
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - que procede de Dios
  lexicon: BDAG
  rationale: Se conserva el genitivo de manera literal en el texto principal. El contexto sugiere el amor de Dios hacia nosotros, pero el español mantiene la forma abierta y natural.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Cristo Jesús
  alternatives_spanish:
  - en Mesías Jesús
  - en el Mesías Jesús
  lexicon: BDAG
  rationale: Aunque la tradición eclesiástica suele decir «Cristo Jesús», aquí se conserva el título mesiánico en su forma asentada en español bíblico para un registro publicable y fiel al uso del nombre-título de la fuente.
- source_word: κυρίῳ
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es la equivalencia estable y adecuada para κύριος en la cristología paulina, y funciona naturalmente en la fórmula final.
theological_decisions:
- issue: Sentido de «el amor de Dios»
  english_pob_reading: God's love for believers
  chosen_spanish_reading: el amor de Dios hacia nosotros
  alternative_spanish_readings:
  - nuestro amor a Dios
  - un genitivo deliberadamente amplio que permita ambos sentidos
  rationale: En Romanos 8:31–39 el argumento culmina en la seguridad de que nada puede separarnos del amor divino. Aunque la frase se mantiene formalmente como «amor de Dios», el contexto favorece leerlo como el amor de Dios por los creyentes.
  doctrine_reference: Preservar la tensión cuando es genuina; aquí la pista contextual es suficientemente fuerte para orientar la nota sin cambiar el texto principal.
- issue: Término cristológico Χριστῷ
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Cristo Jesús
  alternative_spanish_readings:
  - Mesías Jesús
  - el Mesías Jesús
  rationale: En español bíblico, «Cristo Jesús» es la forma más estable y reconocible para Χριστῷ Ἰησοῦ en este tipo de fórmula paulina. No se fuerza «Mesías» donde la tradición y la naturalidad litúrgica favorecen «Cristo» en el texto principal.
  doctrine_reference: La traducción debe ser publicable y fiel al uso cristiano heredado cuando no se pierde el sentido del título.
translation_notes:
  revision_awareness: 'La traducción sigue el último estado del expediente, pero reconcilia la revisión terminológica: se conserva «Cristo Jesús» en español porque es la forma estable y natural para Χριστῷ Ἰησοῦ en este registro, sin perder la referencia mesiánica de fondo. Se mantiene también la nota de lectura para el genitivo de «el amor de Dios».'
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se traduce κτίσις con una expresión amplia («cosa creada») para no restringir indebidamente el alcance.
  - Se evita «SEÑOR» como máscara; «Señor» funciona como título cristológico natural en español.
  - Se conserva la estructura negativa acumulativa con «ni... ni... ni...», adecuada al paralelismo del griego.
