    reason: lexical_alternative
  - marker: c
    text: Aquí «el amor de Dios» probablemente significa el amor de Dios por nosotros.
    reason: alternative_reading
  revision_rationale: Se corrige únicamente el tratamiento de Χριστῷ para ajustarlo al griego, a la política terminológica del proyecto y al audit trail inglés que restauró «Messiah Jesus». El resto del verso y las notas pueden mantenerse con cambios mínimos.
