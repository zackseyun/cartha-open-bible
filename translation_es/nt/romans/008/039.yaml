review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: la serie negativa («ni… ni… ni…»), los extremos espaciales («altura… profundidad»), la incapacidad futura («podrá») y la idea central de que nada creado puede separarnos del amor de Dios. También conserva correctamente el genitivo «amor de Dios» en el texto principal y su explicación contextual en nota. Sin embargo, no sigue la política terminológica documentada del proyecto para Χριστῷ, ya que el English POB auditado restableció explícitamente «Messiah Jesus» y rechazó «Christ Jesus» como regresión. En español, por defecto del proyecto, debe reflejarse como «Mesías Jesús» salvo carve-out documentado, que aquí no existe.'
  spanish_quality_summary: 'El español es claro, natural y de registro bíblico digno. «Ni altura ni profundidad ni ninguna otra cosa creada» funciona bien y es muy legible. La coma antes de la relativa es aceptable en español para delimitar «el amor de Dios». La principal cuestión de calidad es terminológica, no estilística: la nota b actualmente justifica «Cristo Jesús», pero eso contradice la política del proyecto y el rastro de auditoría. Conviene ajustar también la nota para presentar «Cristo Jesús» como alternativa tradicional, no como texto principal.'
  glossary_alignment: Alineación parcial. Coincide con los valores esperados para θεοῦ → «Dios», κυρίῳ → «Señor», ἀγάπης → «amor», χωρίσαι → «separarnos». Pero no se alinea con la directriz del proyecto para Χριστός, que normalmente debe traducirse «Mesías» cuando es título. El caso presente está además reforzado por el English POB audit trail, que restauró «Messiah Jesus».
  issues:
  - severity: high
    issue: «Cristo Jesús» en el texto principal contradice la política terminológica del proyecto para Χριστός y el audit trail inglés.
    rationale: La revisión auditada en inglés corrigió explícitamente una regresión y restauró «Messiah Jesus». No hay carve-out documentado que autorice «Cristo» aquí; por tanto, el español debe reflejar «Mesías Jesús» en el texto principal.
  - severity: medium
    issue: La nota b explica el título de forma inversa a la decisión correcta del proyecto.
    rationale: Actualmente la nota presenta «Cristo Jesús» como correspondencia principal. Debe reformularse para que «Mesías Jesús» sea el texto principal y «Cristo Jesús» quede como alternativa tradicional.
  - severity: medium
    issue: Las decisiones léxicas y teológicas españolas sobre Χριστῷ justifican una opción contraria al material fuente auditado.
    rationale: La documentación interna del borrador afirma que «Cristo Jesús» es preferible por tradición y naturalidad. Eso no preserva la racionalidad lexical/theological ya establecida por el English POB, que exige traducir el título como «Mesías» salvo excepción documentada.
  revised_spanish_text: ni altura ni profundidad ni ninguna otra cosa creada[a] podrá separarnos del amor de Dios, que está en Mesías Jesús, nuestro Señor[b][c].
  revised_footnotes:
