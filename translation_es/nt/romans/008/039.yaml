  to: ni altura ni profundidad ni ninguna otra cosa creada[a] podrá separarnos del amor de Dios, que está en Mesías Jesús, nuestro Señor[b][c].
  rationale: Se corrige únicamente el tratamiento de Χριστῷ para ajustarlo al griego, a la política terminológica del proyecto y al audit trail inglés que restauró «Messiah Jesus». El resto del verso y las notas pueden mantenerse con cambios mínimos.
