translation:
  language: es
  text: ¿Quién presentará una acusación contra los escogidos de Dios? Es Dios quien justifica[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los elegidos de Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Quién acusará a los escogidos de Dios?».'
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula «Es Dios quien justifica» tiene sentido forense: Dios es quien declara justos.'
    reason: theological_note
lexical_decisions:
- source_word: τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién podría
  lexicon: BDAG
  rationale: Interrogativo directo y natural en español para la pregunta retórica del versículo.
- source_word: ἐγκαλέσει
  english_pob_choice: will bring a charge
  chosen_spanish: presentará una acusación
  alternatives_spanish:
  - acusará
  - formulará una acusación
  lexicon: BDAG
  rationale: El verbo tiene sentido jurídico/forense; «presentará una acusación» conserva mejor el registro de tribunal que un simple «acusará».
- source_word: κατὰ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - en contra de
  - frente a
  lexicon: BDAG
  rationale: Con lenguaje de acusación, «contra» reproduce de forma natural la relación adversativa/jurídica.
- source_word: ἐκλεκτῶν
  english_pob_choice: chosen ones
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los escogidos de Dios
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado. «Escogidos» mantiene la idea de personas seleccionadas por Dios sin importar un tecnicismo doctrinal ajeno al texto.
- source_word: θεοῦ
  english_pob_choice: God's
  chosen_spanish: de Dios
  alternatives_spanish:
  - pertenecientes a Dios
  - de Dios
  lexicon: BDAG
  rationale: Se conserva el genitivo posesivo de manera transparente en español.
- source_word: θεὸς
  english_pob_choice: It is God
  chosen_spanish: Dios es el que
  alternatives_spanish:
  - Es Dios quien
  - Dios, el que
  lexicon: BDAG
  rationale: En español, esta construcción expresa mejor el énfasis del griego que un mero «Es Dios». Mantiene la identificación enfática del sujeto.
- source_word: ὁ δικαιῶν
  english_pob_choice: who justifies
  chosen_spanish: justifica
  alternatives_spanish:
  - declara justo
  - declara righteous
  lexicon: BDAG
  rationale: «Justifica» conserva el lenguaje paulino y su carga forense. «Declara justo» es una alternativa explicativa válida, pero menos compacta.
theological_decisions:
- issue: Conservar el sentido forense de δικαιόω sin resolverlo en una sola fórmula doctrinal
  english_pob_reading: 'The clause "It is God who justifies" carries a forensic sense: God is the one who declares righteous.'
  chosen_spanish_reading: Dios es el que justifica
  alternative_spanish_readings:
  - Dios es el que declara justo
  - Es Dios quien justifica
  rationale: Se mantiene el término tradicional y bíblico «justifica», que en Pablo tiene peso jurídico. La nota aclara el matiz forense sin reemplazarlo por una paráfrasis interpretativa en el texto principal.
  doctrine_reference: Justificación forense en Pablo; mantener la tensión semántica del término sin sobreexplicarlo en el cuerpo principal.
- issue: Traducir ἐκλεκτῶν sin imponer una etiqueta técnica innecesaria
  english_pob_reading: chosen ones
  chosen_spanish_reading: los escogidos
  alternative_spanish_readings:
  - los elegidos
  - los escogidos de Dios
  rationale: «Escogidos» es claro, fiel y evita cargar el verso con un tecnicismo eclesial si no es imprescindible. La referencia a Dios ya está explícita en el versículo.
  doctrine_reference: Mantener claridad y sobriedad lexical; preservar la afirmación bíblica de elección sin sobretraducirla.
translation_notes:
  revision_awareness: La versión inglesa auditada está en alta concordancia y no requirió cambios recientes; esta redacción española sigue de cerca la decisión léxica y forense del texto griego y de la traducción inglesa POB.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «los escogidos» para ἐκλεκτῶν, en línea con el estilo POB y sin introducir «SEÑOR».
  - El verbo «justifica» conserva el valor paulino forense que la nota explica; no se reduce a una simple declaración moral.
  - Se emplea puntuación interrogativa española completa y una formulación natural de registro bíblico contemporáneo.
