  text: ὅτι οὓς προέγνω, καὶ προώρισεν συμμόρφους τῆς εἰκόνος τοῦ υἱοῦ αὐτοῦ, εἰς τὸ εἶναι αὐτὸν πρωτότοκον ἐν πολλοῖς ἀδελφοῖς·
base_translation:
  language: en
  yaml_path: translation/nt/romans/008/029.yaml
  text: For those whom he foreknew[a], he also predestined to be conformed to the image of his Son[b], so that he might be the firstborn among many brothers.
  footnotes:
  - marker: a
    text: Or “knew beforehand”; some understand “foreknew” here in a relational sense, that is, “set his regard on beforehand.”
    reason: alternative_reading
  - marker: b
    text: “Brothers” is grammatically masculine; the referent may include both men and women in God’s family.
    reason: cultural_note
