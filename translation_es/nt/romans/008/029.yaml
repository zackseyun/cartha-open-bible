translation:
  language: es
  text: Porque a los que conoció de antemano[a], también los predestinó a ser conformes a la imagen de su Hijo, para que él fuera el primogénito entre muchos hermanos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antes conoció»; algunos entienden aquí «antes puso su mirada en ellos» en un sentido relacional.
    reason: alternative_reading
  - marker: b
    text: «Hermanos» es masculino en la gramática; el referente puede incluir a hombres y mujeres en la familia de Dios.
    reason: cultural_note
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Al inicio de la cláusula, ὅτι introduce la base explicativa de lo anterior. «Porque» comunica de manera natural esa relación causal/explicativa en español sin sobrecargar el tono.
- source_word: προέγνω
  english_pob_choice: foreknew
  chosen_spanish: antes conoció
  alternatives_spanish:
  - conoció de antemano
  - previó
  lexicon: BDAG
  rationale: Se conserva la idea de conocimiento previo sin resolver la tensión teológica del verbo. «Antes conoció» mantiene la cercanía formal con el griego y evita añadir una interpretación relacional explícita que el texto no formula.
- source_word: προώρισεν
  english_pob_choice: predestined
  chosen_spanish: predestinó
  alternatives_spanish:
  - determinó de antemano
  - destinó de antemano
  lexicon: BDAG
  rationale: «Predestinó» es el equivalente normal y preciso en español para προορίζω, conservando el valor temporal del prefijo y la fuerza de designación previa.
- source_word: συμμόρφους
  english_pob_choice: to be conformed
  chosen_spanish: a ser conformes
  alternatives_spanish:
  - a ser hechos semejantes
  - a conformarse
  lexicon: BDAG
  rationale: La construcción expresa conformidad de forma o configuración. «A ser conformes» preserva el sentido transformacional sin perder la naturalidad en español.
- source_word: τῆς εἰκόνος
  english_pob_choice: the image
  chosen_spanish: a la imagen
  alternatives_spanish:
  - a la imagen
  - a la semejanza
  lexicon: BDAG
  rationale: «Imagen» corresponde al valor bíblico normal de εἰκών y mantiene la resonancia cristológica del pasaje.
- source_word: τοῦ υἱοῦ αὐτοῦ
  english_pob_choice: his Son
  chosen_spanish: de su Hijo
  alternatives_spanish:
  - de su Hijo
  - de su propio Hijo
  lexicon: BDAG
  rationale: Se conserva el título filial directo. «Su Hijo» comunica la relación sin añadir intensificación que no está explícita en el griego.
- source_word: εἰς τὸ εἶναι
  english_pob_choice: so that he might be
  chosen_spanish: para que él sea
  alternatives_spanish:
  - para que llegara a ser
  - con el fin de que sea
  lexicon: BDAG
  rationale: La construcción de infinitivo articular expresa propósito. «Para que él sea» reproduce el valor final de modo claro y fluido en español.
- source_word: πρωτότοκον
  english_pob_choice: firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero en nacer
  - el primogénito
  lexicon: BDAG
  rationale: «Primogénito» es el equivalente bíblico establecido para πρωτότοκος y conserva la carga teológica del término sin reemplazarlo por una paráfrasis interpretativa.
- source_word: ἐν πολλοῖς ἀδελφοῖς
  english_pob_choice: among many brothers
  chosen_spanish: entre muchos hermanos
  alternatives_spanish:
  - en medio de muchos hermanos
  - entre muchos hermanos y hermanas
  lexicon: BDAG
  rationale: «Entre muchos hermanos» refleja la preposición ἐν con valor locativo/social y mantiene el plural masculino del griego. El posible alcance inclusivo se aclara en nota, sin borrar la forma original.
theological_decisions:
- issue: Cómo traducir προέγνω sin decidir entre presciencia simple y elección relacional.
  english_pob_reading: Rendered as 'foreknew' without embedding a specific doctrinal interpretation.
  chosen_spanish_reading: «Antes conoció» sin explicitar una teoría particular del conocimiento previo.
  alternative_spanish_readings:
  - «conoció de antemano»
  - «escogió de antemano»
  rationale: La traducción conserva la tensión lexical del verbo y evita convertir el versículo en una glosa doctrinal. Así se mantiene abierto el debate sobre la naturaleza de ese conocimiento previo.
  doctrine_reference: Preservar la tensión teológica; no resolverla por traducción.
- issue: Cómo representar ἀδελφοῖς en español sin ocultar su forma gramatical masculina.
  english_pob_reading: Retained 'brothers' in the main text with an inclusive footnote.
  chosen_spanish_reading: «hermanos» en el texto principal, con nota sobre su posible referencia inclusiva.
  alternative_spanish_readings:
  - «hermanos y hermanas»
  - «hermanos/as»
  - «hermanos»
  rationale: El plural masculino griego se conserva en la línea principal, y la posible inclusión de mujeres en la familia de Dios se reconoce en nota. Esto respeta la forma del texto fuente y la claridad pastoral en español.
  doctrine_reference: Precisión gramatical con aclaración inclusiva en nota.
translation_notes:
  revision_awareness: El expediente inglés indica alta concordancia y ninguna revisión aplicada en la última pasada; por eso la redacción española sigue de cerca el trazado semántico auditado, sin introducir ajustes no motivados por el original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Se usa «Mesías/Cristo» no aplica aquí; el término presente es «Hijo».
  - 'Se conserva el paralelismo sintáctico del griego: conocimiento previo + predestinación + finalidad.'
  - La nota sobre «hermanos» preserva la forma masculina del griego y aclara el posible alcance inclusivo sin alterar el texto principal.
