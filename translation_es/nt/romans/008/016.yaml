translation:
  language: es
  text: El mismo Espíritu da testimonio con nuestro espíritu de que somos hijos de Dios[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «el Espíritu mismo». Se conserva el énfasis de αὐτό; en español no es necesario reflejar el neutro gramatical con una forma equivalente a «itself», porque el referente es personal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «testifica juntamente con nuestro espíritu». La idea es de testimonio conjunto, no solo de testimonio dirigido al espíritu humano.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «hijos de Dios». El griego también puede expresarse como «children of God», con énfasis en la relación filial más que en «hijos» en sentido exclusivamente masculino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸ τὸ πνεῦμα
  english_pob_choice: The Spirit himself
  chosen_spanish: el mismo Espíritu
  alternatives_spanish:
  - el Espíritu mismo
  - el Espíritu él mismo
  lexicon: BDAG
  rationale: En español, el énfasis de αὐτὸ τὸ πνεῦμα se conserva mejor con «el mismo Espíritu». No hace falta reproducir un pronombre de género como «él mismo»; «Espíritu» ya identifica claramente al referente personal del Espíritu Santo.
- source_word: συμμαρτυρεῖ
  english_pob_choice: testifies with
  chosen_spanish: da testimonio juntamente con
  alternatives_spanish:
  - testifica juntamente con
  - da testimonio con
  lexicon: BDAG
  rationale: El verbo indica un testimonio conjunto o acompañante. «Da testimonio juntamente con» preserva ese valor de co-testimonio con un registro natural y bíblico en español.
- source_word: τῷ πνεύματι ἡμῶν
  english_pob_choice: with our spirit
  chosen_spanish: con nuestro espíritu
  alternatives_spanish:
  - a nuestro espíritu
  - junto con nuestro espíritu
  lexicon: BDAG
  rationale: La construcción con συμμαρτυρεῖ favorece una relación de acompañamiento; por eso «con nuestro espíritu» refleja mejor la idea que una meta simple «a nuestro espíritu».
- source_word: ὅτι ἐσμὲν
  english_pob_choice: that we are
  chosen_spanish: de que somos
  alternatives_spanish:
  - que somos
  - que nosotros somos
  lexicon: BDAG
  rationale: En español, después de «da testimonio» la cláusula subordinada suena más natural con «de que». Mantiene el contenido declarativo sin añadir énfasis no requerido.
- source_word: τέκνα θεοῦ
  english_pob_choice: God's children
  chosen_spanish: hijos de Dios
  alternatives_spanish:
  - hijos e hijas de Dios
  - niños de Dios
  lexicon: BDAG
  rationale: Aunque τέκνα puede traducirse de forma genérica como «hijos/children», en español bíblico «hijos de Dios» es la forma más natural y directa para este título familiar. «Hijos e hijas» explicitaría el inclusivo, pero añade material no presente en el griego.
theological_decisions:
- issue: Cómo reflejar el sujeto personal del Espíritu Santo sin perder el neutro gramatical griego
  english_pob_reading: The Spirit himself
  chosen_spanish_reading: El mismo Espíritu
  alternative_spanish_readings:
  - el Espíritu mismo
  - el Espíritu
  rationale: El griego usa πνεῦμα, un sustantivo neutro, pero el referente es personal. En español, «el mismo Espíritu» conserva la fuerza enfática de αὐτό y evita una formulación impersonal que pudiera oscurecer la referencia al Espíritu Santo.
  doctrine_reference: Af. trinitaria; Romanos 8:16 en contexto pneumatológico
- issue: Relación entre el testimonio del Espíritu y el espíritu humano
  english_pob_reading: testifies with our spirit
  chosen_spanish_reading: da testimonio juntamente con nuestro espíritu
  alternative_spanish_readings:
  - da testimonio a nuestro espíritu
  - testifica con nuestro espíritu
  rationale: La lectura adoptada preserva la cooperación entre ambos testimonios, no una mera dirección del testimonio hacia el espíritu humano. Eso sigue la fuerza de συμμαρτυρεῖ y la nota auditada en inglés.
  doctrine_reference: Pneumatología; testimonio interno en Romanos 8
- issue: Traducción de τέκνα θεοῦ como filiación
  english_pob_reading: God's children
  chosen_spanish_reading: hijos de Dios
  alternative_spanish_readings:
  - hijos de Dios
  - hijos e hijas de Dios
  rationale: «Hijos de Dios» comunica la filiación en un español bíblico claro y fiel. No se introduce una glosa inclusiva que el griego no explicita aquí, aunque el término sea genérico en su referencia.
  doctrine_reference: Adopción/filiación en Romanos 8
translation_notes:
  revision_awareness: El texto coincide con el pasaje auditado de alta concordancia; no se reportaron revisiones aplicadas en el pase más reciente y no hay variantes textuales relevantes en el paquete provisto.
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula cuando se refiere al Espíritu Santo.
  - Se evita «SEÑOR» o «Cristo» porque no aparecen en este versículo.
  - «Hijos de Dios» conserva la formulación bíblica natural en español y la filiación relacional del griego τέκνα.
  - El orden y la puntuación siguen una estructura publicable y transparente, con las notas alternativas solo donde el inglés POB preservó ambigüedad lexical.
