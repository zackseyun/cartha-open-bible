  glossary_alignment: No hay conflicto con los términos troncales del proyecto. «Espíritu» y «Dios» están bien. «Hijos de Dios» es aceptable en este contexto aunque τέκνα sea más literalmente «hijos/niños/children»; en español eclesial es una formulación estable y fiel. No hay términos que requieran adjudicación especial.
