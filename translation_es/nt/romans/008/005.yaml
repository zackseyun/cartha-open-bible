translation:
  language: es
  text: Porque los que están según la carne tienen la mente puesta en las cosas de la carne[a], pero los que están según el Espíritu, en las cosas del Espíritu[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según la naturaleza pecaminosa» para «según la carne».
    reason: lexical_alternative
  - marker: b
    text: O «el espíritu» en ambas ocurrencias de «Espíritu».
    reason: alternative_reading
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón explicativa del versículo anterior; «Porque» conserva la conexión argumentativa de Pablo de manera natural en español.
- source_word: κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - de acuerdo con la carne
  - conforme a la carne
  lexicon: BDAG
  rationale: Mantiene la expresión clave σάρξ sin suavizarla a una paráfrasis interpretativa; «según» reproduce bien la orientación o esfera de vida del giro griego.
- source_word: ὄντες
  english_pob_choice: according to / are according to
  chosen_spanish: están
  alternatives_spanish:
  - son
  - viven
  lexicon: BDAG
  rationale: El participio de εἰμί se refleja de forma sobria con «están», evitando ampliar el sentido a «viven» y preservando la construcción griega sin sobreinterpretación.
- source_word: τὰ τῆς σαρκὸς
  english_pob_choice: the things of the flesh
  chosen_spanish: las cosas de la carne
  alternatives_spanish:
  - los asuntos de la carne
  - lo que pertenece a la carne
  lexicon: BDAG
  rationale: La estructura nominal paralela se conserva con «las cosas de la carne»; «carne» mantiene la repetición temática de σάρξ en ambos miembros.
- source_word: φρονοῦσιν
  english_pob_choice: set their minds on
  chosen_spanish: se ocupan de
  alternatives_spanish:
  - piensan en
  - tienen la mente puesta en
  - se inclinan hacia
  lexicon: BDAG
  rationale: En español, «se ocupan de» comunica una orientación sostenida y práctica del pensamiento y la atención; evita una traducción demasiado literal que sonaría rígida.
- source_word: κατὰ πνεῦμα
  english_pob_choice: according to the Spirit
  chosen_spanish: según el Espíritu
  alternatives_spanish:
  - de acuerdo con el Espíritu
  - conforme al Espíritu
  lexicon: BDAG
  rationale: Conserva el paralelo con «según la carne» y refleja el referente del Espíritu en Romanos 8; la mayúscula es coherente con la lectura del Espíritu Santo en este contexto.
- source_word: τὰ τοῦ πνεύματος
  english_pob_choice: the things of the Spirit
  chosen_spanish: las cosas del Espíritu
  alternatives_spanish:
  - los asuntos del Espíritu
  - lo que pertenece al Espíritu
  lexicon: BDAG
  rationale: Reproduce el paralelismo retórico del griego y la repetición de la estructura nominal, manteniendo el contraste entre carne y Espíritu.
theological_decisions:
- issue: 'Referencia de πνεῦμα: Espíritu Santo o espíritu humano'
  english_pob_reading: the Spirit
  chosen_spanish_reading: el Espíritu
  alternative_spanish_readings:
  - el espíritu
  rationale: En Romanos 8 el contraste carne/Espíritu apunta al Espíritu de Dios como principio rector. La mayúscula conserva esa lectura sin borrar la posibilidad gramatical alternativa.
  doctrine_reference: Romanos 8:1-16
- issue: Cómo verter σάρξ sin diluir su carga teológica
  english_pob_reading: the flesh
  chosen_spanish_reading: la carne
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - naturaleza humana
  rationale: «La carne» conserva el término paulino y su peso conceptual. «Naturaleza pecaminosa» explicaría el sentido, pero reemplazaría el léxico documentado y reduciría la tensión del original.
  doctrine_reference: Romanos 7:18; 8:3-9
translation_notes:
  revision_awareness: El texto inglés de POB fue revisado desde «live according to» a «are according to» para reflejar con más precisión ὄντες. La versión española sigue esa decisión con «están según», evitando convertir el participio en una paráfrasis verbal más amplia. También se preservó el paralelismo formal de las dos cláusulas y la capitalización de Espíritu acorde con la lectura contextual del audit trail.
  spanish_consistency_notes:
  - Se mantiene «carne» de forma consistente para σάρξ, sin sustituirlo por una explicación interpretativa en el texto principal.
  - Se mantiene «Espíritu» con mayúscula en el segundo miembro para seguir la lectura contextual del Espíritu Santo.
  - Se preserva la repetición de «las cosas de...» para reflejar la simetría del griego.
  - «Porque» sostiene la lógica discursiva del versículo como explicación de lo anterior.
  - La construcción «están según» busca reflejar ὄντες sin añadir la idea de acción habitual que el griego no expresa de manera explícita.
