review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la cadena correlativa del griego y preserva correctamente los tiempos principales: predestinó, llamó, glorificó. También mantiene la nota interpretativa sobre ἐδόξασεν. Sin embargo, en ἐδικαίωσεν se aparta innecesariamente de la decisión de la POB inglesa (''justified'') al expandirla como ''declaró justos''. Aunque semánticamente defendible, aquí la mejor conservación de la concisión paulina y de la terminología teológica documentada en la auditoría es ''justificó''.'
  spanish_quality_summary: 'El español es claro y legible, pero la repetición ''a esos'' en cada miembro suena algo pesada. Aun así, es aceptable por reflejar la estructura enfática del griego. El cambio principal necesario es léxico-teológico: ''justificó'' resulta más natural en registro bíblico y más alineado con la cadena compacta del versículo que ''declaró justos''.'
  glossary_alignment: 'No hay conflicto con los términos de proyecto como Yahvé/Mesías. La cuestión relevante es δικαιόω: el proyecto favorece ''justicia/rectitud'' por contexto, y la auditoría inglesa eligió específicamente ''justified''. En este contexto paulino, ''justificó'' es la correspondencia española más directa y convencional; ''declaró justos'' puede reservarse como explicación, no como texto principal.'
  issues:
  - severity: medium
    issue: '''ἐδικαίωσεν'' se tradujo como ''declaró justos'' en vez de ''justificó''.'
    rationale: Aunque expresa el matiz forense, expande el verbo más allá de la formulación compacta del griego y se aleja de la decisión léxica auditada de la POB inglesa. 'Justificó' preserva mejor la terminología paulina establecida y la simetría de la cadena verbal.
  - severity: low
    issue: La nota a sobre προώρισεν omite la alternativa más cercana al inglés 'foreordained'.
    rationale: La auditoría inglesa conserva 'foreordained' como alternativa principal. En español conviene incluir 'preordenó' junto con otras opciones para reflejar mejor el rastro léxico documentado.
  revised_spanish_text: Y a los que predestinó[a], a esos también llamó; y a los que llamó, a esos también justificó; y a los que justificó, a esos también glorificó[b].
  revised_footnotes:
  - marker: a
    text: O «preordenó», «ordenó de antemano» o «determinó de antemano» para «predestinó».
    reason: lexical_alternative
  - marker: b
    text: Griego «glorificó»; algunos entienden este pasado como una gloria futura tan segura que se expresa como ya cumplida.
    reason: alternative_reading
  revision_rationale: Se ajusta δικαιόω a «justificó» para conservar la concisión del griego, la terminología paulina habitual en español y la decisión léxica documentada por la POB inglesa. También se refuerza la nota léxica de προώρισεν añadiendo «preordenó», que refleja mejor la alternativa auditada «foreordained».
