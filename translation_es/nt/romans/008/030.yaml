translation:
  language: es
  text: Y a los que predestinó[a], a esos también llamó; y a los que llamó, a esos también justificó; y a los que justificó, a esos también glorificó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «preordenó», «ordenó de antemano» o «determinó de antemano» para «predestinó».
    reason: lexical_alternative
  - marker: b
    text: Griego «glorificó»; algunos entienden este pasado como una gloria futura tan segura que se expresa como ya cumplida.
    reason: alternative_reading
lexical_decisions:
- source_word: προώρισεν
  english_pob_choice: predestined
  chosen_spanish: predestinó
  alternatives_spanish:
  - ordenó de antemano
  - determinó de antemano
  - preordenó
  lexicon: BDAG
  rationale: El verbo expresa una decisión anterior sobre el destino o designio de personas. «Predestinó» conserva con precisión la fuerza compacta del griego y mantiene la terminología bíblica reconocible sin suavizar el sentido temporal previo.
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó a sí
  lexicon: BDAG
  rationale: «Llamó» es el equivalente natural y directo de καλέω en esta cadena paulina, y preserva la secuencia teológica del pasaje sin añadir una explicación del modo del llamado.
- source_word: ἐδικαίωσεν
  english_pob_choice: justified
  chosen_spanish: declaró justos
  alternatives_spanish:
  - justificó
  - declaró inocentes
  - vindicó
  lexicon: BDAG
  rationale: En español, «justificó» puede sonar demasiado técnico o ambiguo; «declaró justos» explicita el sentido forense que la POB documenta para δικαιόω, sin perder la tensión doctrinal del texto.
- source_word: ἐδόξασεν
  english_pob_choice: glorified
  chosen_spanish: glorificó
  alternatives_spanish:
  - honró
  - glorificará
  lexicon: BDAG
  rationale: Se conserva el aoristo con «glorificó» para respetar el tiempo verbal del griego y la secuencia retórica de Pablo. La alternativa futura se reserva solo como lectura interpretativa, no como traducción principal.
- source_word: οὓς ... τούτους
  english_pob_choice: those whom ... he
  chosen_spanish: a los que ... a esos
  alternatives_spanish:
  - a quienes ... a estos
  - los que ... los mismos
  lexicon: Greek grammar
  rationale: El correlativo repetido subraya que se trata del mismo grupo en cada paso. «A los que ... a esos» conserva esa repetición y su función enfática de manera natural en español.
- source_word: καί
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  lexicon: Greek grammar
  rationale: '«También» refleja la fuerza aditiva y progresiva de καί dentro de cada miembro de la cadena: predestinó → llamó → declaró justos → glorificó.'
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: Greek grammar
  rationale: Aquí δέ enlaza suavemente los miembros de la frase sin contraste fuerte. En español, «y» expresa mejor esa continuidad discursiva.
theological_decisions:
- issue: Cómo traducir δικαιόω sin perder el matiz forense ni imponer una formulación excesivamente interpretativa
  english_pob_reading: justified
  chosen_spanish_reading: declaró justos
  alternative_spanish_readings:
  - justificó
  - declaró righteous
  rationale: La POB inglesa conserva «justified» por su fuerza paulina y su concisión. En español, «declaró justos» comunica el sentido legal/forense con mayor claridad que un calco técnico y evita confundir el acto declarativo con una transformación moral inmediata.
  doctrine_reference: Justificación forense en Pablo; conservar la tensión entre declaración y transformación sin resolverla artificialmente.
- issue: 'Cómo reflejar ἐδόξασεν: pretérito aorístico o interpretación futura proléptica'
  english_pob_reading: glorified
  chosen_spanish_reading: glorificó
  alternative_spanish_readings:
  - glorificará
  - ha glorificado
  rationale: El griego usa aoristo y la POB mantiene el pasado en la línea principal. Aunque algunos lectores entienden este aoristo como prolepsis de una gloria futura segura, esa lectura se preserva en nota; el texto principal no debe anticipar ni corregir el tiempo verbal del original.
  doctrine_reference: Primacía del texto original; preservar la tensión interpretativa sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente sin cambios sustantivos; la redacción mantiene el acuerdo alto del control cruzado y preserva las decisiones léxicas y teológicas ya auditadas en la fuente inglesa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto no aplicable aquí, sin introducir sustituciones innecesarias.
  - Se prefirió «declaró justos» sobre «justificó» para clarificar el valor forense de δικαιόω en español.
  - Se conservó el aoristo en «glorificó» y se dejó la lectura proléptica en nota, para no deshacer la tensión interpretativa documentada.
  - Se usó el correlativo «a los que ... a esos» para reflejar la repetición enfática del griego sin sonar forzado en español.
