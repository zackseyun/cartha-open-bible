translation:
  language: es
  text: Pues considero que los sufrimientos del tiempo presente no vale la pena compararlos con la gloria que va a ser revelada a nosotros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en nosotros».
    reason: alternative_reading
lexical_decisions:
- source_word: Λογίζομαι
  english_pob_choice: I consider
  chosen_spanish: considero
  alternatives_spanish:
  - pienso
  - estimo
  - concluyo
  lexicon: BDAG
  rationale: λογίζομαι expresa una evaluación razonada; «considero» comunica un juicio reflexivo sin volverlo meramente emotivo ni demasiado técnico.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: BDAG
  rationale: El conector introduce fundamento o explicación. «Pues» funciona de manera natural en español para enlazar con la afirmación anterior.
- source_word: οὐκ ἄξια
  english_pob_choice: are not worth comparing with
  chosen_spanish: no son dignos de compararse
  alternatives_spanish:
  - no valen la comparación
  - no son comparables
  lexicon: BDAG
  rationale: La construcción con ἄξιος y πρὸς expresa desproporción en una comparación. «No son dignos de compararse» conserva el valor comparativo sin perder la fuerza valorativa.
- source_word: τὰ παθήματα
  english_pob_choice: the sufferings
  chosen_spanish: los sufrimientos
  alternatives_spanish:
  - las aflicciones
  - los padecimientos
  lexicon: BDAG
  rationale: En contexto paulino, πάθημα se refiere a sufrimientos padecidos. «Sufrimientos» es el equivalente más directo y claro en español.
- source_word: τοῦ νῦν καιροῦ
  english_pob_choice: of the present time
  chosen_spanish: del tiempo presente
  alternatives_spanish:
  - de este tiempo presente
  - de la presente época
  lexicon: BDAG
  rationale: καιρός señala el tiempo o momento presente. «Tiempo presente» mantiene la referencia temporal sin añadir un matiz de «edad» que no exige el texto.
- source_word: πρὸς
  english_pob_choice: to be compared with
  chosen_spanish: de compararse con
  alternatives_spanish:
  - en comparación con
  - frente a
  lexicon: BDAG
  rationale: Aquí πρός introduce el estándar de comparación. El giro español «de compararse con» hace explícita la relación comparativa de modo idiomático.
- source_word: τὴν μέλλουσαν δόξαν
  english_pob_choice: the glory that is going to be revealed
  chosen_spanish: la gloria que va a ser revelada
  alternatives_spanish:
  - la gloria venidera
  - la gloria futura
  lexicon: BDAG
  rationale: μέλλουσαν conserva la idea de futuro inminente/por venir; la perífrasis «va a ser revelada» refleja bien la orientación futura y evita reducirlo a un adjetivo menos preciso.
- source_word: ἀποκαλυφθῆναι
  english_pob_choice: that is going to be revealed
  chosen_spanish: ser revelada
  alternatives_spanish:
  - ser descubierta
  - ser manifestada
  lexicon: BDAG
  rationale: El infinitivo pasivo señala una revelación futura de la gloria. «Ser revelada» es la correspondencia más directa y teológicamente transparente.
- source_word: εἰς ἡμᾶς
  english_pob_choice: to us
  chosen_spanish: en nosotros
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: BDAG
  rationale: La preposición εἰς con personas admite un matiz de dirección o de participación interna. Se eligió «en nosotros» para preservar la posibilidad de una gloria que se hace presente en los creyentes, sin cerrar la lectura hacia una mera externalidad.
theological_decisions:
- issue: Valor de εἰς ἡμᾶς en la revelación de la gloria
  english_pob_reading: to us
  chosen_spanish_reading: en nosotros
  alternative_spanish_readings:
  - a nosotros
  - para nosotros
  rationale: El texto admite una lectura relacional y participativa. «En nosotros» conserva la tensión interpretativa que el inglés POB mantiene en nota con «in us», sin decidir dogmáticamente por una sola dirección.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: se evitó una formulación pesada como «no son dignos de ser comparados» y se optó por un español más natural; además, se mantuvo la tensión interpretativa de εἰς ἡμᾶς mediante una nota alternativa, siguiendo el tratamiento del audit trail inglés.'
  spanish_consistency_notes:
  - Se usó «sufrimientos» para πάθημα de forma consistente con el valor paulino documentado.
  - Se preservó «gloria» sin sustituirla por un término más explicativo, porque el griego no lo requiere.
  - Se eligió «Yahvé» no aplica aquí; no hay tetragrámaton en el versículo.
  - Se evitó «Cristo» u otra terminología litúrgica porque no aparecen en el texto base.
  - La puntuación y el orden sintáctico buscan una lectura fluida en español sin perder el paralelismo comparativo del griego.
