source:
  edition: SBLGNT
  text: Ὡσαύτως δὲ καὶ τὸ πνεῦμα συναντιλαμβάνεται ⸂τῇ ἀσθενείᾳ⸃ ἡμῶν· τὸ γὰρ τί ⸀προσευξώμεθα καθὸ δεῖ οὐκ οἴδαμεν, ἀλλὰ αὐτὸ τὸ πνεῦμα ⸀ὑπερεντυγχάνει στεναγμοῖς ἀλαλήτοις,
base_translation:
  language: en
  yaml_path: translation/nt/romans/008/026.yaml
  text: Likewise[a], the Spirit also helps in our weakness. For we do not know what we should pray for as we ought, but the Spirit himself intercedes with inexpressible groanings[b],
  footnotes:
  - marker: a
    text: Or 'with inexpressible groanings' or 'with wordless groanings.'
    reason: lexical_alternative
  - marker: b
    text: Greek has the neuter noun 'Spirit'; the translation uses 'himself' to reflect the Spirit’s personal action in context.
    reason: alternative_reading
  ai_draft:
