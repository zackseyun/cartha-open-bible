revisions:
- from: Así también el Espíritu nos ayuda[a] en nuestra debilidad. Porque no sabemos qué hemos de orar como conviene, pero el mismo Espíritu intercede con gemidos inefables.
  to: Así también el Espíritu nos ayuda en nuestra debilidad. Porque no sabemos qué hemos de pedir en oración, como conviene, pero el mismo Espíritu intercede con gemidos inefables[a].
  rationale: Se corrigió 'qué hemos de orar' a 'qué hemos de pedir en oración' para reflejar con naturalidad y precisión el objeto implícito de προσεύχομαι en este contexto. También se movió el marcador de nota al sintagma 'gemidos inefables' para que coincida con el contenido de la nota. Se mantuvo 'Así también', 'el mismo Espíritu' e 'inefables' por ser fieles y plenamente aceptables en español bíblico contemporáneo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:10:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego: el Espíritu ayuda en nuestra debilidad, no sabemos qué pedir en oración como conviene, y el Espíritu intercede con gemidos no expresables. Sin embargo, ''qué hemos de orar'' no preserva bien la construcción τί προσευξώμεθα, porque en español lo natural y semánticamente preciso es ''qué hemos de pedir en oración'' o ''por qué hemos de orar''. Además, la nota al pie está mal anclada: el marcador [a] aparece sobre ''nos ayuda'' pero la nota trata de ''gemidos inefables''.'
  spanish_quality_summary: El texto es legible y digno, pero 'qué hemos de orar' suena poco natural en español eclesial general y puede entenderse como 'cómo formular la oración' más que 'qué pedir'. 'Así también' es aceptable, aunque 'Asimismo' o 'De la misma manera' serían algo más fluidos; no es necesario corregirlo. 'Con gemidos inefables' es una buena opción para ἀλαλήτοις.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: πνεῦμα -> ''Espíritu'' con mayúscula contextual; ὑπερεντυγχάνει -> ''intercede''; ἀσθενείᾳ -> ''debilidad''. No hay conflictos con los términos troncales del glosario. La decisión teológica sobre la agencia personal del Espíritu está bien representada por ''el mismo Espíritu''.'
  issues:
  - severity: medium
    issue: '''qué hemos de orar'' es una formulación poco natural y semánticamente imprecisa'
    rationale: El griego τί προσευξώμεθα apunta al contenido de la oración ('qué pedir/orar'), y el propio expediente inglés explicó que en idiomas receptores suele explicitarse la idea de 'for'. En español, 'orar' sin complemento aquí suena incompleto; 'qué hemos de pedir en oración' preserva mejor el sentido.
  - severity: medium
    issue: La nota al pie está anclada en el lugar equivocado
    rationale: El marcador [a] aparece en 'nos ayuda[a]', pero la nota ofrece alternativas para 'gemidos inefables'. Según las reglas del proyecto, el marcador debe aparecer exactamente en la palabra o frase pertinente.
  revised_spanish_text: Así también el Espíritu nos ayuda en nuestra debilidad. Porque no sabemos qué hemos de pedir en oración, como conviene, pero el mismo Espíritu intercede con gemidos inefables[a].
  revised_footnotes:
  - marker: a
    text: 'O: ''con gemidos indecibles'' o ''con gemidos que no se pueden expresar''.'
    reason: lexical_alternative
  revision_rationale: Se corrigió 'qué hemos de orar' a 'qué hemos de pedir en oración' para reflejar con naturalidad y precisión el objeto implícito de προσεύχομαι en este contexto. También se movió el marcador de nota al sintagma 'gemidos inefables' para que coincida con el contenido de la nota. Se mantuvo 'Así también', 'el mismo Espíritu' e 'inefables' por ser fieles y plenamente aceptables en español bíblico contemporáneo.
