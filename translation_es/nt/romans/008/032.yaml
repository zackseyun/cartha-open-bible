revisions:
- from: Él, en efecto, no escatimó[a] a su propio Hijo, sino que lo entregó[b] por todos nosotros[c]; ¿cómo no nos dará también, junto con él, todas las cosas[d]?
  to: Él, en efecto, no escatimó[a] a su propio Hijo, sino que lo entregó[b] por todos nosotros[c]; ¿cómo no nos concederá también, junto con él, todas las cosas[d]?
  rationale: La revisión mantiene la excelente base del borrador, pero fortalece la fidelidad al griego y al POB inglés al expresar en el texto principal la fuerza donativa/graciosa de χαρίσεται con «nos concederá». También mejora la nota de παρέδωκεν para evitar una alternativa española poco natural y semánticamente débil.
