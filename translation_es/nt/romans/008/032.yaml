  text: ὅς γε τοῦ ἰδίου υἱοῦ οὐκ ἐφείσατο, ἀλλὰ ὑπὲρ ἡμῶν πάντων παρέδωκεν αὐτόν, πῶς οὐχὶ καὶ σὺν αὐτῷ τὰ πάντα ἡμῖν χαρίσεται;
base_translation:
  language: en
  yaml_path: translation/nt/romans/008/032.yaml
  text: He indeed did not spare his own Son[c][b][a], but gave him over for us all—how will he not also with him graciously give us all things?
