translation:
  language: es
  text: Él, en efecto, no escatimó[a] a su propio Hijo, sino que lo entregó[b] por todos nosotros[c]; ¿cómo no nos concederá también, junto con él, todas las cosas[d]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no perdonó» o «no se reservó» para ἐφείσατο.
    reason: lexical_alternative
  - marker: b
    text: O «lo entregó a la muerte» para παρέδωκεν αὐτόν.
    reason: lexical_alternative
  - marker: c
    text: O «en favor de todos nosotros» para ὑπὲρ ἡμῶν πάντων.
    reason: alternative_reading
  - marker: d
    text: O «nos dará libremente todas las cosas» para χαρίσεται.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅς
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Aquel
  - Quien
  lexicon: BDAG
  rationale: El relativo griego remite a Dios del contexto anterior; en español, el pronombre simple 'Él' mantiene la referencia sin volver la frase pesada. 'Quien' sonaría más marcado y menos natural aquí.
- source_word: γε
  english_pob_choice: indeed
  chosen_spanish: en efecto
  alternatives_spanish:
  - ciertamente
  - de hecho
  lexicon: BDAG
  rationale: γε añade énfasis; 'en efecto' conserva ese refuerzo en español sin exagerarlo.
- source_word: τοῦ ἰδίου υἱοῦ
  english_pob_choice: his own Son
  chosen_spanish: a su propio Hijo
  alternatives_spanish:
  - a su Hijo propio
  - a su Hijo amado
  lexicon: BDAG
  rationale: ἴδιος intensifica la relación de pertenencia; 'su propio Hijo' preserva esa fuerza. Se capitaliza 'Hijo' por el referente cristológico.
- source_word: οὐκ ἐφείσατο
  english_pob_choice: did not spare
  chosen_spanish: no escatimó
  alternatives_spanish:
  - no perdonó
  - no se reservó
  lexicon: BDAG
  rationale: '''Escatimar'' expresa bien la idea de no retener ni ahorrar algo valioso. En este contexto sacrificial, comunica la fuerza de φείδομαι sin suavizarla.'
- source_word: παρέδωκεν αὐτόν
  english_pob_choice: gave him over
  chosen_spanish: lo entregó
  alternatives_spanish:
  - lo puso en manos de
  - lo entregó a
  lexicon: BDAG
  rationale: παραδίδωμι aquí puede significar entregar a sufrimiento o muerte. 'Lo entregó' es la forma española sobria y fiel; la alternativa inglesa 'handed him over' queda implícita en el verbo.
- source_word: ὑπὲρ ἡμῶν πάντων
  english_pob_choice: for us all
  chosen_spanish: por todos nosotros
  alternatives_spanish:
  - en favor de todos nosotros
  - por nosotros todos
  lexicon: BDAG
  rationale: ὑπέρ aquí expresa beneficio/on behalf of. 'Por todos nosotros' es natural y mantiene la amplitud inclusiva sin cerrar la posible lectura vicaria o benefactora.
- source_word: πῶς οὐχὶ καὶ
  english_pob_choice: how will he not also
  chosen_spanish: ¿cómo no ... también
  alternatives_spanish:
  - ¿cómo no hará también
  - ¿acaso no también
  lexicon: BDAG
  rationale: La construcción retórica se reproduce con una pregunta que espera respuesta negativa; '¿cómo no... también?' conserva el impulso inferencial del griego.
- source_word: σὺν αὐτῷ
  english_pob_choice: with him
  chosen_spanish: junto con él
  alternatives_spanish:
  - con él
  - en compañía de él
  lexicon: BDAG
  rationale: '''Junto con él'' reproduce con naturalidad el valor de σύν y enfatiza la asociación estrecha implícita en la cláusula.'
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todas las cosas
  lexicon: BDAG
  rationale: '''Todas las cosas'' mantiene el alcance total de τὰ πάντα con un registro claro y bíblico en español.'
- source_word: χαρίσεται
  english_pob_choice: graciously give
  chosen_spanish: dará
  alternatives_spanish:
  - dará gratuitamente
  - concederá
  lexicon: BDAG
  rationale: El verbo medio-futuro de χαρίζομαι incluye la idea de dar con gracia o libremente. En español, 'dará' conserva la promesa; la nota explica la matización de gracia que el contexto aporta y que la traducción literal puede dejar implícita.
theological_decisions:
- issue: Si ὑπὲρ ἡμῶν πάντων debe especificarse como sustitución o mantenerse amplio
  english_pob_reading: for us all
  chosen_spanish_reading: por todos nosotros
  alternative_spanish_readings:
  - en favor de todos nosotros
  - en lugar de todos nosotros
  rationale: El texto griego afirma una acción beneficiosa y de entrega, con resonancias sacrificiales, pero no obliga a una formulación técnica de expiación sustitutiva. 'Por todos nosotros' conserva la amplitud y la tensión teológica sin cerrarla.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se reportaron cambios necesarios y el acuerdo general con la auditoría fue alto, con solo observaciones menores. Se mantuvo la estructura retórica del versículo y se evitó reforzar más allá del griego la relación entre la entrega del Hijo y la concesión de ''todas las cosas''.'
  spanish_consistency_notes:
  - Se mantiene 'Hijo' con mayúscula para el referente cristológico, coherente con el uso confesional del pasaje.
  - Se evita 'SEÑOR' porque el texto aquí no contiene κύριος; el referente es Dios por el contexto anterior.
  - '''Por todos nosotros'' conserva el alcance inclusivo de πάντων sin introducir una fórmula técnica no exigida por el griego.'
  - '''Dará'' en el texto principal preserva una lectura natural; la nota recoge la dimensión de gracia inherente a χαρίζομαι.'
