review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro de auditoría inglés en casi todos los puntos: ὅς γε -> «Él, en efecto»; τοῦ ἰδίου υἱοῦ -> «su propio Hijo»; οὐκ ἐφείσατο -> «no escatimó»; παρέδωκεν αὐτόν -> «lo entregó»; ὑπὲρ ἡμῶν πάντων -> «por todos nosotros»; y la inferencia retórica final está bien preservada. Sin embargo, el texto principal omite la matización léxica de χαρίσεται (‘dar graciosamente/libremente’), que el inglés POB sí preserva en el texto principal y no solo en nota.'
  spanish_quality_summary: 'El español es claro, natural y digno. La estructura suena bien para lectura eclesial amplia. El principal ajuste recomendado es explicitar en el texto la fuerza de χαρίσεται con «nos concederá generosamente» o equivalente, en vez de un simple «nos dará», que resulta demasiado plano frente al original y al POB inglés. También conviene mejorar la nota de παρέδωκεν αὐτόν: «lo puso en manos de» no refleja bien el sentido sacrificial/judicial del verbo aquí.'
  glossary_alignment: No hay conflictos con los términos teológicos globales del proyecto. La cristología y el registro son adecuados. La decisión «Hijo» y «Dios» por contexto es correcta. La única desalineación significativa con la filosofía léxica del POB está en χαρίσεται, cuya conexión con gracia/don gratuito debería aparecer en el texto principal en español, no quedar solo relegada a nota.
  issues:
  - severity: medium
    issue: χαρίσεται se traduce en el texto principal solo como «dará»
    rationale: El verbo griego incluye la idea de conceder libre o graciosamente. El inglés POB lo refleja en el cuerpo del texto («graciously give»). «Dará» no es falso, pero sí reduce una matización que el proyecto decidió preservar.
  - severity: medium
    issue: La nota alternativa para παρέδωκεν αὐτόν dice «lo puso en manos de»
    rationale: 'Esa opción suena perifrástica y puede sugerir solo transferencia física o administrativa. El griego en este contexto apunta a ‘entregar’/‘entregar a la muerte’/‘poner en manos’ en sentido más grave. Una alternativa como «lo entregó por completo» no es ideal tampoco; mejor conservar «lo entregó» en texto y usar «lo dio por entregado» o «lo entregó»/«lo entregó a la muerte» solo si se justifica. Dado el rastro inglés, la mejor nota es «O ‘lo entregó’/‘lo dio por entregado’» no es necesaria; más simple: «O ‘lo entregó por nosotros’» tampoco corresponde exactamente. Lo más seguro es usar «O ‘lo entregó’» no añade nada, así que conviene cambiarla a «O ‘lo entregó a la muerte’» como aclaración contextual.'
  - severity: low
    issue: La nota de χαρίσεται usa «gratuitamente nos dará todas las cosas» con orden algo pesado
    rationale: Es comprensible, pero si el texto principal se corrige, la nota puede simplificarse a una alternativa más literal como «O ‘nos dará libremente todas las cosas’».
  revised_spanish_text: Él, en efecto, no escatimó[a] a su propio Hijo, sino que lo entregó[b] por todos nosotros[c]; ¿cómo no nos concederá también, junto con él, todas las cosas[d]?
  revised_footnotes:
