translation:
  language: es
  text: 'Tal como está escrito: «Por causa de ti somos puestos a muerte todo el día; fuimos contados[a] como ovejas para el matadero».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuimos considerados como ovejas para el matadero».
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: Just as
  chosen_spanish: Justo como
  alternatives_spanish:
  - Así como
  - Tal como
  lexicon: BDAG
  rationale: La comparación introductoria necesita sonar natural en español y conservar la relación con la cita bíblica precedente. «Justo como» mantiene el valor comparativo de καθὼς sin volverlo torpe ni demasiado interpretativo.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  - se ha escrito
  lexicon: BDAG
  rationale: La fórmula perfecta pasiva sigue siendo un encabezado escriturario estable. «Está escrito» es la expresión española más natural y conserva la autoridad perdurable del texto citado.
- source_word: Ἕνεκεν σοῦ
  english_pob_choice: For your sake
  chosen_spanish: Por causa de ti
  alternatives_spanish:
  - A causa de ti
  - Por tu causa
  lexicon: BDAG
  rationale: La construcción causal se vierte de forma directa en español. Se conserva el trato en segunda persona y la fuerza causal sin diluirla en una paráfrasis más general.
- source_word: θανατούμεθα
  english_pob_choice: we are being put to death
  chosen_spanish: somos puestos a muerte
  alternatives_spanish:
  - estamos siendo muertos
  - somos muertos
  lexicon: BDAG
  rationale: El presente pasivo expresa una acción en curso y severa. «Somos puestos a muerte» mantiene esa continuidad y el peso formal del griego mejor que una forma demasiado coloquial o una pasiva menos clara.
- source_word: ὅλην τὴν ἡμέραν
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - durante todo el día
  - todo el tiempo
  lexicon: BDAG
  rationale: La expresión de extensión temporal se traduce con una locución idiomática y transparente en español. «Todo el día» conserva la idea de exposición continua sin añadir elementos ajenos.
- source_word: ἐλογίσθημεν
  english_pob_choice: we were counted
  chosen_spanish: fuimos contados
  alternatives_spanish:
  - fuimos considerados
  - fuimos tenidos por
  lexicon: BDAG
  rationale: El pasivo de λογίζομαι expresa ser reckoned/considered. «Fuimos contados» conserva la literalidad funcional de la metáfora de valoración o asignación, y deja abierta la alternativa interpretativa sin resolverla.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - cual
  - igual que
  lexicon: BDAG
  rationale: La partícula comparativa se mantiene con el equivalente español directo. «Como» preserva la comparación sencilla y formal del texto.
- source_word: πρόβατα σφαγῆς
  english_pob_choice: sheep for slaughter
  chosen_spanish: ovejas para el matadero
  alternatives_spanish:
  - ovejas para el sacrificio
  - ovejas destinadas al sacrificio
  lexicon: BDAG
  rationale: «Ovejas para el matadero» reproduce la imagen de seres destinados al degüello con naturalidad en español. Se evita «sacrificio» porque la imagen del contexto es de matanza, no necesariamente de rito sacrificial.
theological_decisions:
- issue: Mantenimiento del sentido de sufrimiento continuo sin precisar su forma histórica
  english_pob_reading: Retain the corporate, ongoing sense of believers being treated as destined for death without importing additional theological explanation into the translation.
  chosen_spanish_reading: Conservar el sentido corporativo y continuo de creyentes tratados como destinados a la muerte, sin añadir una especificación interpretativa que cierre el texto.
  alternative_spanish_readings:
  - Interpretarlo como una referencia explícita al martirio
  - Suavizarlo para que suene solo a oposición general
  rationale: El griego cita un lamento bíblico de aflicción que debe permanecer abierto a su alcance literario y teológico. La traducción evita estrechar el pasaje a una sola situación histórica y también evita atenuar su dureza.
  doctrine_reference: Preservar la tensión teológica en la cita de sufrimiento; no resolverla de antemano.
translation_notes:
  revision_awareness: El borrador sigue de cerca el trazado auditado del inglés POB y conserva la lectura comparativa, la fórmula escritural y la alternativa lexical de λογίζομαι sin introducir ampliaciones interpretativas. No se detectaron revisiones tardías que obligaran a cambiar el sentido base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aplique, pero aquí no aparece el nombre divino en forma directa; la cita usa segunda persona en una alusión bíblica.
  - Se conserva una sintaxis sobria y publicable, con puntuación de cita castellana y una cadencia cercana al texto griego.
  - «Ovejas» se mantiene para πρόβατα por su transparencia bíblica y porque «corderos» alteraría la imagen de la cita.
