review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la estructura y el sentido general del griego: introducción de cita escrituraria, causa dirigida a Dios, sufrimiento continuo, y comparación con ovejas destinadas a la matanza. Sin embargo, dos elecciones no son las más fieles ni naturales en español bíblico actual: «Justo como» suena coloquial/calco innecesario para καθὼς, y la nota [a] está anclada en «todo el día» aunque la alternativa corresponde a ἐλογίσθημεν («fuimos contados/considerados»).'
  spanish_quality_summary: La redacción es generalmente clara, pero «Justo como» resulta poco idiomático en este registro; «Tal como» o «Así como» encaja mejor. «Somos puestos a muerte» es comprensible y digno, aunque algo pesado; no requiere cambio obligatorio. La ubicación de la nota es defectuosa porque crea una referencia engañosa.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «ovejas para el matadero» refleja bien πρόβατα σφαγῆς. La decisión entre «fuimos contados» y «fuimos considerados» puede conservarse mediante nota léxica, pero el marcador debe ir sobre esa expresión, no sobre la frase temporal.
  issues:
  - severity: medium
    issue: «Justo como» para καθὼς
    rationale: Aunque inteligible, suena más coloquial y menos natural en español bíblico/literario que «Tal como» o «Así como». No refleja una mejora semántica sobre el original.
  - severity: high
    issue: Marcador de nota [a] colocado en «todo el día»
    rationale: La nota ofrece una alternativa para ἐλογίσθημεν («fuimos considerados»), no para ὅλην τὴν ἡμέραν. El anclaje actual induce a error y rompe la correspondencia exigida entre nota y expresión relevante.
  revised_spanish_text: 'Tal como está escrito: «Por causa de ti somos puestos a muerte todo el día; fuimos contados[a] como ovejas para el matadero».'
  revised_footnotes:
  - marker: a
    text: O «fuimos considerados como ovejas para el matadero».
    reason: lexical_alternative
  revision_rationale: Se ajusta καθὼς a una fórmula introductoria más natural y digna en español («Tal como»), y se corrige la ubicación del marcador de nota para que la alternativa léxica corresponda correctamente a «fuimos contados» (ἐλογίσθημεν). No se requieren cambios doctrinales ni de terminología del proyecto.
