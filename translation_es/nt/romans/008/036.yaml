  rationale: Se ajusta καθὼς a una fórmula introductoria más natural y digna en español («Tal como»), y se corrige la ubicación del marcador de nota para que la alternativa léxica corresponda correctamente a «fuimos contados» (ἐλογίσθημεν). No se requieren cambios doctrinales ni de terminología del proyecto.
