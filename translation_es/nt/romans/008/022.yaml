translation:
  language: es
  text: Porque sabemos que toda la creación[a] gime a una y sufre dolores de parto a una hasta ahora[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda creación»; alternativamente, «toda cosa creada», aunque aquí es más probable el sentido cósmico amplio.
    reason: lexical_alternative
  - marker: b
    text: La expresión «sufre dolores de parto a una» evoca los dolores del parto, sugiriendo no solo sufrimiento, sino sufrimiento orientado hacia nueva vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - hemos sabido
  - estamos conscientes
  lexicon: BDAG
  rationale: οἶδα funciona aquí con sentido de conocimiento presente y establecido; «sabemos» comunica un estado de conocimiento compartido sin forzar un perfecto en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - En efecto
  lexicon: BDAG
  rationale: Mantiene el valor explicativo de la conjunción y enlaza con el argumento anterior de manera natural en español.
- source_word: πᾶσα ἡ κτίσις
  english_pob_choice: the whole creation
  chosen_spanish: toda la creación
  alternatives_spanish:
  - toda la criatura
  - toda cosa creada
  - la creación entera
  lexicon: BDAG
  rationale: El contexto de Romanos 8:19–23 favorece el sentido cósmico de κτίσις; «toda la creación» conserva ese alcance colectivo y evita reducirlo a seres individuales.
- source_word: συστενάζει
  english_pob_choice: groans together
  chosen_spanish: gime en conjunto
  alternatives_spanish:
  - gime juntamente
  - gime con otros
  - gime al unísono
  lexicon: BDAG
  rationale: El verbo con συν- expresa un gemido compartido; «en conjunto» preserva la dimensión comunitaria del sufrimiento sin sonar artificial en español.
- source_word: συνωδίνει
  english_pob_choice: suffers labor pains together
  chosen_spanish: sufre dolores de parto en conjunto
  alternatives_spanish:
  - padece dolores de parto juntamente
  - está de parto en conjunto
  - sufre contracciones de parto en conjunto
  lexicon: BDAG
  rationale: El verbo evoca específicamente dolores de parto, no sufrimiento genérico. «Dolores de parto» conserva la imagen de nacimiento y la posibilidad de una consumación futura.
- source_word: ἄχρι τοῦ νῦν
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta el presente
  - hasta este momento
  lexicon: BDAG
  rationale: Reproduce con claridad el alcance temporal continuo hasta el presente.
theological_decisions:
- issue: Cómo traducir κτίσις en este contexto apocalíptico/cósmico
  english_pob_reading: creation
  chosen_spanish_reading: creación
  alternative_spanish_readings:
  - criatura
  - cosmos creado
  - todas las cosas creadas
  rationale: En Romanos 8 la personificación de la creación apunta al orden creado no humano que aguarda liberación; «creación» conserva esa amplitud y la tensión teológica sin resolverla artificialmente.
  doctrine_reference: Romanos 8:19–23; primacía del sentido del texto original sobre la tradición eclesiástica.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando el marcador huérfano y asegurando que todos los marcadores de nota aparezcan exactamente en el texto español. La redacción sigue de cerca el griego y el audit trail en inglés, sin depender mecánicamente de la traducción inglesa.
  spanish_consistency_notes:
  - «Creación» se mantiene de forma consistente para κτίσις en sentido cósmico.
  - «En conjunto» conserva el prefijo συν- de ambos verbos y evita alternar con fórmulas más libres.
  - «Dolores de parto» preserva la metáfora obstétrica que el inglés POB documenta.
  - Se evitó «Señor» o terminología de máscara divina, pues el versículo no la requiere.
