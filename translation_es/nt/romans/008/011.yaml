revisions:
- from: Y si el Espíritu de aquel que levantó[a] a Jesús de entre los muertos habita en ustedes, aquel que levantó de entre los muertos a Mesías Jesús[b] también dará vida a sus cuerpos mortales por medio de su Espíritu que habita en ustedes.
  to: Y si el Espíritu de aquel que levantó a Jesús de entre los muertos habita en ustedes, aquel que levantó de entre los muertos a Mesías Jesús[b] también dará vida a sus cuerpos mortales por medio de su Espíritu que habita en ustedes.
  rationale: Se elimina la nota [a] porque la alternativa «resucitó» no es la mejor ayuda exegética en este contexto y puede generar ambigüedad de sujeto en español. Se conserva el texto principal, que ya transmite fielmente el sentido de resurrección. Se mantiene la nota sobre «Mesías Jesús» con una leve mejora de estilo técnico en español.
  reviewer_model: gpt-5.4
