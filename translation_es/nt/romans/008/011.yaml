review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: Espíritu/espíritu como referente al Espíritu Santo, ἐγείρω con sentido de resurrección, ἐκ νεκρῶν como «de entre los muertos», οἰκεῖ/ἐνοικοῦν con continuidad de inhabitación, y Χριστὸν Ἰησοῦν con fuerza titular como «Mesías Jesús». Sin embargo, la nota [a] introduce una alternativa menos adecuada para este contexto, porque «resucitó» haría de Dios el sujeto que resucita por sí mismo, mientras que el griego dice «el que levantó a Jesús». Además, el anclaje de [a] sobre «levantó» en el primer miembro no es necesario y distrae de la decisión principal documentada en el audit trail.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «Habita», «cuerpos mortales» y «por medio de su Espíritu que habita en ustedes» suenan bien en español neutral. La única reparación recomendada es eliminar la nota [a], que puede confundir más que ayudar. La nota [b] está bien formulada, aunque conviene ajustar «λέγει» a una formulación más natural en español técnico.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: πνεῦμα -> «Espíritu», Ἰησοῦς -> «Jesús», Χριστός -> «Mesías» por fuerza titular, y no hay conflicto con otros términos base. La elección «Mesías Jesús» está correctamente justificada. La cláusula final sigue la revisión inglesa instrumental («por medio de su Espíritu...»), lo cual es aceptable dado el audit trail, aunque el trasfondo causal del acusativo queda reconocido en las decisiones léxicas.'
  issues:
  - severity: medium
    issue: La nota [a] propone «resucitó» como alternativa a «levantó».
    rationale: En español, «resucitó a Jesús» puede entenderse, pero la alternativa aislada «resucitó» aplicada al verbo corre el riesgo de desplazar el sujeto y sugerir que Jesús resucitó en vez de que Dios lo levantó. Dado que el texto principal ya es claro con «levantó ... de entre los muertos», la nota no añade valor suficiente y puede introducir ambigüedad.
  - severity: low
    issue: La nota [b] usa «el griego λέγει».
    rationale: No es incorrecto, pero suena menos natural en una nota española que «el griego tiene» o «el texto griego dice». Conviene suavizar la redacción técnica.
  revised_spanish_text: Y si el Espíritu de aquel que levantó a Jesús de entre los muertos habita en ustedes, aquel que levantó de entre los muertos a Mesías Jesús[b] también dará vida a sus cuerpos mortales por medio de su Espíritu que habita en ustedes.
  revised_footnotes:
  - marker: b
    text: O, «Cristo Jesús»; el griego tiene Χριστὸν Ἰησοῦν, con Χριστός en valor titular.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota [a] porque la alternativa «resucitó» no es la mejor ayuda exegética en este contexto y puede generar ambigüedad de sujeto en español. Se conserva el texto principal, que ya transmite fielmente el sentido de resurrección. Se mantiene la nota sobre «Mesías Jesús» con una leve mejora de estilo técnico en español.
