translation:
  language: es
  text: Y si el Espíritu de aquel que levantó a Jesús de entre los muertos habita en ustedes, aquel que levantó de entre los muertos a Mesías Jesús[b] también dará vida a sus cuerpos mortales por medio de su Espíritu que habita en ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O, «Cristo Jesús»; el griego tiene Χριστὸν Ἰησοῦν, con Χριστός en valor titular.
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: Se conserva la mayúscula para reflejar que aquí el referente es el Espíritu Santo, no un espíritu humano ni una fuerza impersonal.
- source_word: ἐγείραντος / ἐγείρας
  english_pob_choice: raised
  chosen_spanish: levantó
  alternatives_spanish:
  - resucitó
  - levantó de nuevo
  lexicon: BDAG
  rationale: '"Levantó" comunica el acto de resucitar en español bíblico vivo y mantiene la imagen verbal del griego sin sonar mecánico; el contexto de "de entre los muertos" deja claro el sentido de resurrección.'
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: '"De entre los muertos" reproduce con precisión la idea de salida desde la esfera de los muertos y es una fórmula natural en español bíblico.'
- source_word: οἰκεῖ
  english_pob_choice: dwells
  chosen_spanish: habita
  alternatives_spanish:
  - vive
  - reside
  lexicon: BDAG
  rationale: '"Habita" conserva el valor de permanencia e indwelling, y enlaza bien con el participio final "que habita".'
- source_word: Χριστὸν Ἰησοῦν
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  - el Mesías Jesús
  lexicon: BDAG
  rationale: Se mantiene la decisión del POB inglés de preservar el valor titular de Χριστός como "Mesías" en vez de convertirlo en nombre litúrgico fijo.
- source_word: ζῳοποιήσει
  english_pob_choice: will also give life
  chosen_spanish: también dará vida
  alternatives_spanish:
  - también vivificará
  - también hará vivir
  lexicon: BDAG
  rationale: '"Dará vida" es claro y natural en español, y conserva el futuro de la acción vivificante sin arcaísmo.'
- source_word: θνητὰ σώματα
  english_pob_choice: mortal bodies
  chosen_spanish: cuerpos mortales
  alternatives_spanish:
  - cuerpos sujetos a muerte
  - cuerpos mortales
  lexicon: BDAG
  rationale: '"Cuerpos mortales" es la equivalencia directa y conserva la concreción corporal y la condición de mortalidad.'
- source_word: διὰ τὸ ἐνοικοῦν αὐτοῦ πνεῦμα
  english_pob_choice: through his Spirit dwelling in you
  chosen_spanish: por medio de su Espíritu que habita en ustedes
  alternatives_spanish:
  - por su Espíritu que habita en ustedes
  - a causa de su Espíritu que habita en ustedes
  lexicon: BDAG
  rationale: Se opta por "por medio de" para reflejar la revisión del POB inglés que favoreció el valor instrumental más natural de διά con este participio, sin perder la relación causal/mediadora implícita en el contexto.
- source_word: ἐνοικοῦν
  english_pob_choice: dwelling
  chosen_spanish: que habita
  alternatives_spanish:
  - habitando
  - que mora
  lexicon: BDAG
  rationale: El participio se vierte con una oración relativa natural en español, manteniendo la continuidad semántica con "habita" al comienzo del versículo.
theological_decisions:
- issue: Cómo renderizar Χριστός sin neutralizar su fuerza titular
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  - Jesucristo
  rationale: 'Se preserva la tensión teológica y lexical del texto: Χριστός aquí funciona como título mesiánico, no solo como parte fija del nombre propio. "Mesías" es la manera más transparente de mantener esa fuerza en español.'
  doctrine_reference: Cristología; fidelidad al título mesiánico
- issue: Cómo traducir διά con el participio articular final
  english_pob_reading: through his Spirit dwelling in you
  chosen_spanish_reading: por medio de su Espíritu que habita en ustedes
  alternative_spanish_readings:
  - a causa de su Espíritu que habita en ustedes
  - por su Espíritu que habita en ustedes
  rationale: La formulación española sigue la revisión más reciente del POB inglés, que optó por un sentido instrumental natural para la cláusula final. Se mantiene abierta la relación entre mediación y causalidad, sin imponer una sola glosa teológica.
  doctrine_reference: Gramática griega; causalidad/mediación en traducción
- issue: Cómo expresar la resurrección sin perder la imaginería de ἐγείρω
  english_pob_reading: raised ... from the dead
  chosen_spanish_reading: levantó ... de entre los muertos
  alternative_spanish_readings:
  - resucitó ... de entre los muertos
  - levantó ... de los muertos
  rationale: '"Levantó" conserva la base verbal de ἐγείρω y el paralelismo interno del versículo; la expresión completa sigue dejando inequívoco el sentido de resurrección física.'
  doctrine_reference: Resurrección corporal de Jesús y de los creyentes
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del POB inglés en la cláusula final, donde se prefirió una lectura más natural de διά con acusativo: "through his Spirit dwelling in you". También conserva la decisión estable de traducir Χριστός como "Messiah" cuando mantiene fuerza titular.'
  spanish_consistency_notes:
  - Se usa "Espíritu" con mayúscula para la referencia al Espíritu Santo, y "espíritu" solo si el contexto lo exigiera, lo cual aquí no ocurre.
  - '"Mesías" se mantiene como traducción de Χριστός en este pasaje para sostener la distinción entre título y nombre propio.'
  - La construcción "de entre los muertos" se usa de manera consistente para ἐκ νεκρῶν.
  - '"Habita" y "que habita" se coordinan para mantener continuidad léxica entre οἰκεῖ y ἐνοικοῦν.'
  - No se emplea "SEÑOR" porque este versículo no contiene κύριος ni una cita directa del nombre divino.
