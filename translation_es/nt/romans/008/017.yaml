revisions:
- from: 'Y si somos hijos, también herederos: herederos de Dios y coherederos con el Mesías[a], si en verdad padecemos con él, para que también seamos glorificados con él.'
  to: 'Y si somos hijos[a], también herederos: herederos de Dios y coherederos con el Mesías[b], si en verdad padecemos con él, para que también seamos glorificados con él.'
  rationale: Se conserva la redacción española natural y cercana al borrador, pero se añade una nota en 'hijos' para reflejar la decisión lexical auditada sobre τέκνα como término no marcado por sexo. También se reancla la nota existente sobre «Cristo» al término «Mesías» para mantener la alternativa documentada. No se requiere adjudicación adicional porque el ajuste es pequeño y no altera la exégesis base.
