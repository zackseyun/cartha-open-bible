    changes_summary: 'Replaced ''the Messiah'' with ''Christ'' for closer lexical correspondence to Χριστοῦ and more natural consistency in this context. No other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Y si somos hijos[a], también herederos: herederos de Dios y coherederos con el Mesías[b], si en verdad padecemos con él, para que también seamos glorificados con él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gr. τέκνα, «hijos» en sentido inclusivo; también puede entenderse como «hijos e hijas».
    reason: lexical_clarity
  - marker: b
    text: O «coherederos con Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos e hijas
  lexicon: BDAG
  rationale: En este contexto jurídico-familiar, τέκνα señala filiación. En español, «hijos» comunica de forma natural la relación de pertenencia e herencia; «hijos e hijas» sería más explicativo, pero alarga sin añadir precisión aquí.
- source_word: κληρονόμοι
  english_pob_choice: heirs
  chosen_spanish: herederos
  alternatives_spanish:
  - herederos legítimos
  - inherederos
  lexicon: BDAG
  rationale: Es el término legal-familiar normal en español para quienes reciben herencia. Conserva la fuerza del argumento paulino sin sobreexplicar.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios como posesión
  - pertenecientes a Dios
  lexicon: BDAG
  rationale: El genitivo se expresa directamente como relación de pertenencia/origen en la fórmula de herencia. «De Dios» es claro y fiel al giro griego.
- source_word: συγκληρονόμοι
  english_pob_choice: fellow heirs
  chosen_spanish: coherederos
  alternatives_spanish:
  - consocios en la herencia
  - herederos juntamente
  lexicon: BDAG
  rationale: El prefijo συν- marca participación compartida. «Coherederos» es la forma más compacta y natural en español, y conserva la idea de herencia conjunta.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός como «Mesías», de acuerdo con la política doctrinal del proyecto y el audit trail que restauró esta lectura. En español, aquí funciona bien como título compartido de la herencia.
- source_word: εἴπερ
  english_pob_choice: if indeed
  chosen_spanish: si en verdad
  alternatives_spanish:
  - si de veras
  - si realmente
  lexicon: BDAG
  rationale: Mantiene la fuerza condicional con matiz de verificación/énfasis, sin debilitarla a mera causalidad.
- source_word: συμπάσχομεν
  english_pob_choice: we suffer with him
  chosen_spanish: padecemos con él
  alternatives_spanish:
  - sufrimos con él
  - compartimos sus padecimientos
  lexicon: BDAG
  rationale: El verbo compuesto expresa sufrimiento compartido; «padecemos con él» suena natural y mantiene la unión con el Mesías sin añadir una preposición ajena al griego. «Padecer» también preserva el tono serio del contexto.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Reproduce de forma idiomática la relación de finalidad/resultado.
- source_word: συνδοξασθῶμεν
  english_pob_choice: we may also be glorified with him
  chosen_spanish: seamos glorificados con él
  alternatives_spanish:
  - seamos también glorificados juntamente con él
  - participemos también de su gloria
  lexicon: BDAG
  rationale: El pasivo refleja recepción de gloria, y el prefijo συν- se conserva con «con él». Se evita añadir «también» en el verbo porque ya está cubierto por la estructura anterior y por el paralelismo del verso, aunque el sentido compartido permanece claro.
theological_decisions:
- issue: Si Χριστοῦ debe verterse como «Cristo» o «Mesías»
  english_pob_reading: English audit trail oscillates, but the restored doctrinally compliant reading is 'Messiah.'
  chosen_spanish_reading: «Mesías»
  alternative_spanish_readings:
  - Cristo
  rationale: El proyecto pide traducir Χριστός como «Mesías» salvo justificación especial. Aquí el término funciona como título, no como nombre fijo, y la herencia compartida con el Ungido se expresa con más transparencia en español con «Mesías».
  doctrine_reference: DOCTRINE.md policy on Χριστός / Messiah terminology
- issue: Si la condición εἴπερ συμπάσχομεν sugiere mérito o solo la pauta esperada de unión con el Mesías
  english_pob_reading: Rendered as a real condition without importing the idea that suffering earns glorification.
  chosen_spanish_reading: «si en verdad padecemos con él»
  alternative_spanish_readings:
  - puesto que padecemos con él
  - ya que padecemos con él
  rationale: 'Se mantiene la condicional real y su fuerza retórica; no se suaviza a causalidad. Así se conserva la tensión teológica: el sufrimiento acompaña la participación con el Mesías, pero no se presenta como mérito que compra la gloria.'
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Cómo reflejar el prefijo συν- en los compuestos de herencia, sufrimiento y gloria
  english_pob_reading: fellow heirs / we suffer with him / glorified with him
  chosen_spanish_reading: «coherederos», «padecemos con él», «glorificados con él»
  alternative_spanish_readings:
  - herederos juntamente
  - sufrimos junto con él
  - glorificados juntamente con él
  rationale: La repetición de ideas de participación compartida es importante en el verso. Se preserva con equivalentes naturales en español, sin sobrecargar el texto con glosas explicativas.
  doctrine_reference: Union with the Messiah and shared inheritance
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés, incluyendo la corrección doctrinal que restaura «Messiah» para Χριστός. La traducción española sigue esa decisión con «Mesías», y mantiene la condicional real de εἴπερ sin convertirla en causalidad. También se preservó el paralelismo del verso con herencia, sufrimiento compartido y glorificación compartida.
  spanish_consistency_notes:
  - Se usó «Mesías» para Χριστός conforme a la política del proyecto.
  - Se eligió «hijos» para τέκνα por naturalidad y precisión filiativa.
  - Se eligió «herederos» y «coherederos» para mantener el campo legal de la herencia.
  - Se mantuvo «padecemos con él» para reflejar el compuesto con συν- sin perder la naturalidad del español.
  - Se evitó «SEÑOR» u otro masking para el nombre divino porque el verso no contiene el tetragrámaton.
