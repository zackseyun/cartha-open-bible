review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: condición filial → herencia, luego especificación ''herederos de Dios y coherederos con el Mesías'', seguida de la condición real ''si en verdad padecemos con él'' y la finalidad/resultado ''para que también seamos glorificados con él''. También preserva correctamente la fuerza de συν- en los compuestos. Sin embargo, ''hijos'' para τέκνα reduce la amplitud inclusiva de ''children'' documentada en el audit trail; en español puede mantenerse mejor con ''hijos'' o ''hijas'' explícito, pero la opción más fiel y natural aquí es ''hijos'' solo si no se quiere marcar sexo. Dado que la decisión inglesa auditada enfatiza el valor no sexuado, conviene reparar el texto principal con ''hijos[a]'' y una nota aclaratoria, o mejor aún usar una solución natural más inclusiva. '
  spanish_quality_summary: 'El español es claro, digno y muy legible. ''Coherederos'', ''padecemos con él'' y ''glorificados con él'' suenan naturales y fieles. La puntuación funciona bien. La principal mejora es de precisión semántica más que de estilo: τέκνα se entiende mejor como filiación no marcada por sexo. Además, conviene mantener la nota alternativa sobre ''Cristo'' porque el audit trail la preserva.'
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: Χριστοῦ → ''Mesías'' correctamente, θεοῦ → ''Dios'', κληρονόμοι → ''herederos'', συγκληρονόμοι → ''coherederos''. No hay conflicto con Yahvé ni otros términos de glosario. El único punto a ajustar es τέκνα: la justificación inglesa favorece una expresión inclusiva; en español ''hijos'' puede funcionar genéricamente, pero no preserva tan transparentemente la rationale auditada.'
  issues:
  - severity: medium
    issue: τέκνα se vierte como 'hijos' sin reflejar claramente el valor no sexuado documentado
    rationale: El audit trail inglés eligió 'children' precisamente para evitar especificación de sexo. En español, 'hijos' puede usarse genéricamente, pero deja menos visible esa decisión. Una reparación breve con nota aclaratoria preserva mejor la evidencia y evita una expansión pesada en el texto principal.
  - severity: low
    issue: La nota actual solo preserva la alternativa sobre Χριστός, pero no la posible ambigüedad creada en español por 'hijos'
    rationale: Si se mantiene 'hijos' por naturalidad española, una nota puede explicar que el griego τέκνα significa 'children', es decir, descendencia/hijos en sentido inclusivo.
  revised_spanish_text: 'Y si somos hijos[a], también herederos: herederos de Dios y coherederos con el Mesías[b], si en verdad padecemos con él, para que también seamos glorificados con él.'
  revised_footnotes:
  - marker: a
    text: Gr. τέκνα, «hijos» en sentido inclusivo; también puede entenderse como «hijos e hijas».
    reason: lexical_clarity
  - marker: b
    text: O «coherederos con Cristo».
    reason: alternative_reading
  revision_rationale: Se conserva la redacción española natural y cercana al borrador, pero se añade una nota en 'hijos' para reflejar la decisión lexical auditada sobre τέκνα como término no marcado por sexo. También se reancla la nota existente sobre «Cristo» al término «Mesías» para mantener la alternativa documentada. No se requiere adjudicación adicional porque el ajuste es pequeño y no altera la exégesis base.
