translation:
  language: es
  text: Y el que examina los corazones sabe cuál es la intención[a] del Espíritu, porque intercede por los santos conforme a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la mente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐραυνῶν
  english_pob_choice: searches
  chosen_spanish: examina
  alternatives_spanish:
  - busca
  - sondea
  lexicon: BDAG
  rationale: «Examina» conserva la idea activa y penetrante de ἐραυνάω sin sonar forzado en español; «sondea» es posible, pero menos natural en este contexto.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - interior
  - ser
  lexicon: BDAG
  rationale: «Corazones» reproduce la metáfora bíblica de καρδία y mantiene la imagen antropológica del texto.
- source_word: τί τὸ φρόνημα
  english_pob_choice: what the mind is
  chosen_spanish: cuál es el pensamiento
  alternatives_spanish:
  - cuál es la mente
  - cuál es la disposición
  lexicon: BDAG
  rationale: φρόνημα en Romanos 8 apunta al contenido u orientación mental; «pensamiento» transmite de modo comprensible la idea sin sobrecargar el verso con un tecnicismo. Se evita «mente» por sonar menos natural con «cuál es».},{
theological_decisions:
- issue: Cómo rendir κατὰ θεὸν
  english_pob_reading: according to God
  chosen_spanish_reading: conforme a Dios
  alternative_spanish_readings:
  - según Dios
  - de acuerdo con Dios
  - conforme a la voluntad de Dios
  rationale: La frase griega dice literalmente «según/conforme a Dios» y no nombra explícitamente «voluntad». «Conforme a Dios» preserva esa sobriedad y deja la relación teológica abierta, como en el texto fuente.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Identidad de τοῦ πνεύματος
  english_pob_reading: of the Spirit
  chosen_spanish_reading: del Espíritu
  alternative_spanish_readings:
  - del espíritu
  rationale: El contexto inmediato de Romanos 8 favorece una referencia al Espíritu Santo; la mayúscula en español clarifica esa lectura sin añadir contenido ajeno al griego.
  doctrine_reference: Romanos 8 (contexto inmediato sobre el Espíritu).
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa al preferir una equivalencia más natural para φρόνημα y mantiene la reserva teológica de κατὰ θεόν sin explicitar «voluntad» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula por el contexto de Romanos 8.
  - «Santos» conserva la correspondencia regular con ἅγιοι.
  - Se evita «SEÑOR» para el nombre divino porque este versículo no contiene el tetragrámaton ni κύριος.
