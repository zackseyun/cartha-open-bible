translation:
  language: es
  text: Porque la ley[a] del Espíritu de vida en Mesías Jesús te ha liberado[b] de la ley del pecado y de la muerte[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «principio»: «el principio del Espíritu de vida».'
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen «me» en lugar de «te».
    reason: textual_variant
  - marker: c
    text: 'Traducción tradicional: «en Cristo Jesús».'
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - principio
  - poder
  lexicon: BDAG
  rationale: «Ley» conserva la repetición paulina de νόμος en ambos miembros de la frase y mantiene la tensión metafórica del pasaje. «Principio» o «poder» podrían explicar el sentido, pero estrechan demasiado el término griego.
- source_word: πνεύματος
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: Se capitaliza porque el contexto de Romanos 8 contrasta la carne, el pecado, la muerte y la acción vivificante del Espíritu de Dios. En español, «Espíritu» comunica mejor esa referencia personal al Espíritu Santo.
- source_word: ζωῆς
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida
  lexicon: BDAG
  rationale: «Vida» es la correspondencia directa y natural del genitivo y preserva la expresión compacta «Espíritu de vida» sin ampliarla innecesariamente.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se mantiene «Mesías» para Χριστός conforme a la terminología doctrinal del proyecto. «En» se conserva literal para no diluir el lenguaje paulino de unión con Cristo.
- source_word: ἠλευθέρωσέν
  english_pob_choice: has set ... free
  chosen_spanish: te ha liberado
  alternatives_spanish:
  - te ha hecho libre
  - te ha puesto en libertad
  lexicon: BDAG
  rationale: «Ha liberado» reproduce bien el valor perfecto con efecto vigente y suena natural en español. «Te ha hecho libre» es posible, pero menos directo; «te ha puesto en libertad» resulta más marcado.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - me
  lexicon: NA28/SBLGNT textual tradition
  rationale: Se sigue la lectura impresa de segunda persona singular (σε). La variante de primera persona singular («me») queda preservada como nota textual.
- source_word: ἁμαρτίας
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - sin
  lexicon: BDAG
  rationale: En español, «pecado» comunica con claridad la fuerza abstracta y esclavizante del término en este contexto. Aunque el inglés POB opta por «sin» para preservar el paralelo nominal, en español «pecado» evita una forma poco natural y sigue siendo fiel al sentido paulino.
- source_word: θανάτου
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - muerte
  lexicon: BDAG
  rationale: «Muerte» es la equivalencia directa y mantiene el paralelismo final de la frase con «pecado y muerte».
theological_decisions:
- issue: Si πνεύματος se refiere al Espíritu Santo o a un principio espiritual impersonal
  english_pob_reading: Holy Spirit (“Spirit” capitalized)
  chosen_spanish_reading: Espíritu Santo implícito por el contexto, expresado como «Espíritu»
  alternative_spanish_readings:
  - espíritu humano
  - principio espiritual
  rationale: Romanos 8 contrapone claramente carne, pecado, muerte y la acción vivificante de Dios; por eso la referencia al Espíritu Santo es la más sólida. Se conserva «Espíritu» con mayúscula, sin añadir «Santo» porque el texto no lo explicita aquí.
  doctrine_reference: Romanos 8:1–11; Gálatas 5:16–18
- issue: Cómo reflejar el valor de ἐν Χριστῷ Ἰησοῦ
  english_pob_reading: in Messiah Jesus
  chosen_spanish_reading: en Mesías Jesús
  alternative_spanish_readings:
  - en Cristo Jesús
  rationale: El proyecto privilegia «Mesías» como traducción del título Χριστός. Se mantiene la preposición «en» para respetar la unión incorporativa que Pablo expresa, sin reinterpretarla como mera localización.
  doctrine_reference: Romanos 6:3–11; 8:1
- issue: Cómo tratar la posible tensión entre traducción literal de νόμος y claridad española
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - principio
  - norma
  - poder
  rationale: '«Ley» preserva la reiteración y la posible ambigüedad deliberada del apóstol: no se reduce a una regla moral, sino a un régimen o esfera operante. La nota de alternativa en el inglés se recoge en español como posibilidad interpretativa sin imponerla en el texto principal.'
  doctrine_reference: Romanos 7:21–23; 8:2
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y se alineó con la revisión inglesa más reciente, que no requirió cambios. La redacción española conserva el paralelismo de νόμος... νόμου, la lectura textual de segunda persona singular, y la opción doctrinal por «Mesías» en lugar de la forma tradicional «Cristo».
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός de forma consistente con la política del proyecto.
  - «Espíritu» se capitaliza por referencia al Espíritu Santo según el contexto.
  - «Ley» reproduce el doble νόμος para conservar la estructura retórica del versículo.
  - Se usó «te» conforme a la lectura impresa; la variante «me» queda en nota.
  - La puntuación y el orden buscan naturalidad en español sin perder la sintaxis fuente.
