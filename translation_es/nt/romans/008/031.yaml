translation:
  language: es
  text: ¿Qué diremos, pues, ante estas cosas?[a] Si Dios está por nosotros[b], ¿quién estará contra nosotros?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre estas cosas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Ya que Dios está por nosotros, ¿quién estará contra nosotros?».'
    reason: alternative_reading
lexical_decisions:
- source_word: Τί
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - Cómo
  lexicon: BDAG
  rationale: Interrogativo directo para introducir la pregunta retórica. «Qué» mantiene la fuerza y la naturalidad del giro en español.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - por tanto
  lexicon: BDAG
  rationale: Marca la inferencia/discurso consecutivo sin volver la frase demasiado formal. «Pues» funciona bien en una pregunta retórica en español.
- source_word: ἐροῦμεν
  english_pob_choice: shall we say
  chosen_spanish: diremos
  alternatives_spanish:
  - hemos de decir
  - diremos nosotros
  lexicon: BDAG
  rationale: El futuro deliberativo griego se refleja de forma natural con «diremos» en español, conservando el matiz retórico.
- source_word: πρὸς ταῦτα
  english_pob_choice: to these things
  chosen_spanish: ante estas cosas
  alternatives_spanish:
  - sobre estas cosas
  - acerca de estas cosas
  - en respuesta a estas cosas
  lexicon: BDAG
  rationale: «Ante estas cosas» comunica la idea de responder frente a lo dicho antes sin sonar rígido. Mantiene el valor referencial del griego y la lectura POB de un cuestionamiento en vista de lo anterior.
- source_word: εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Ya que
  lexicon: BDAG
  rationale: Se conserva la forma condicional del griego. Aunque el sentido es retóricamente asumido, «Si» preserva la estructura y el efecto culminante.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Traducción directa y natural del sujeto; en español no hace falta el artículo para expresar el mismo valor.
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: a favor de nosotros
  alternatives_spanish:
  - por nosotros
  - en nuestro favor
  lexicon: BDAG
  rationale: «A favor de nosotros» explicita la relación benefactora/aliada sin perder el sentido de ὑπέρ. Se evita «por nosotros» por posible ambigüedad de causa o sustitución.
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: ¿quién
  alternatives_spanish:
  - ¿quién será
  lexicon: BDAG
  rationale: Interrogativo personal en una pregunta desafiante; «quién» es el equivalente más natural.
- source_word: καθ’ ἡμῶν
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - opuesto a nosotros
  - en contra de nosotros
  lexicon: BDAG
  rationale: «Contra nosotros» reproduce bien la oposición marcada por κατά con genitivo y suena idiomático en español.
theological_decisions:
- issue: Fuerza de la cláusula condicional εἰ ὁ θεὸς ὑπὲρ ἡμῶν
  english_pob_reading: Rendered as 'If God is for us' in the main text, with an alternative 'Since God is for us' footnote.
  chosen_spanish_reading: «Si Dios está a favor de nosotros» en el texto principal.
  alternative_spanish_readings:
  - «Ya que Dios está a favor de nosotros»
  rationale: Se mantiene la forma condicional del griego para conservar la estructura retórica. La lectura asumida no se oculta; se deja para nota la posibilidad de un valor causal/aseverativo en el contexto.
  doctrine_reference: Romanos 8:31; lectura retórica de la seguridad divina en el contexto paulino
- issue: Alcance relacional de ὑπὲρ ἡμῶν
  english_pob_reading: for us
  chosen_spanish_reading: «a favor de nosotros»
  alternative_spanish_readings:
  - «por nosotros»
  - «en nuestro favor»
  rationale: La fórmula preserva la idea de favor/alianza sin reducirla a mera asistencia abstracta. En esta pregunta triunfal, el matiz de respaldo divino resulta importante.
  doctrine_reference: Romanos 8:31; apoyo y benevolencia divinos
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se requieren revisiones sustanciales. La principal decisión en español fue elegir una formulación natural que conserve la pregunta retórica y la ambigüedad controlada de εἰ y πρὸς ταῦτα sin mecanicismo.
  spanish_consistency_notes:
  - Se usa «Dios» sin artículo, conforme al español bíblico natural y al valor del sujeto griego.
  - Se evita «SEÑOR» porque el texto no contiene κύριος ni una sustitución del nombre divino.
  - Se mantiene «contra nosotros» para reflejar la oposición de κατά con genitivo.
  - Los marcadores de nota aparecen en el texto exactamente donde corresponde.
