    changes_summary: 'Changed ''Messiah'' to ''Christ'' to reflect the Greek Χριστοῦ and maintain consistency with the source expression ''Spirit of Christ'' in this verse; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Pero ustedes no están en la carne sino en el Espíritu[a], si en verdad el Espíritu de Dios habita en ustedes. Pero si alguien no tiene el Espíritu de Mesías[b], esa persona no le pertenece[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la naturaleza pecaminosa». Griego: «en la carne».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Espíritu de Cristo».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «no es de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza pecaminosa
  - naturaleza humana pecaminosa
  lexicon: BDAG
  rationale: Se mantiene el término paulino básico 'carne' para conservar la categoría teológica y el contraste con 'Espíritu'. 'Naturaleza pecaminosa' explicita una interpretación posible, pero reduce la tensión lexical del original.
- source_word: πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: Aquí la mayúscula es apropiada porque el contexto identifica al 'Espíritu de Dios' y al 'Espíritu de Mesías', es decir, el Espíritu Santo, no una disposición humana.
- source_word: οἰκεῖ
  english_pob_choice: dwells
  chosen_spanish: habita
  alternatives_spanish:
  - vive
  - mora
  lexicon: BDAG
  rationale: '''Habita'' conserva la idea de residencia estable e inhabitación; es claro en español y reproduce bien el matiz de permanencia.'
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se usa 'Mesías' conforme al criterio del proyecto para Χριστός cuando funciona como título. En español mantiene el vínculo con la expectativa mesiánica sin convertirlo automáticamente en forma litúrgica fija.
- source_word: εἴπερ
  english_pob_choice: if indeed
  chosen_spanish: si en verdad
  alternatives_spanish:
  - si de veras
  - puesto que
  lexicon: BDAG
  rationale: '''Si en verdad'' preserva la forma condicional y el matiz de presuposición/racionalidad de la cláusula, sin volverla una explicación causal.'
- source_word: οὐκ ἔστιν αὐτοῦ
  english_pob_choice: does not belong to him
  chosen_spanish: no es de él
  alternatives_spanish:
  - no le pertenece
  - no pertenece a él
  lexicon: BDAG
  rationale: '''No es de él'' conserva la fuerza idiomática breve del griego (''no es suyo/no le pertenece'') y suena natural en español bíblico sin sobreactuar la explicación relacional.'
- source_word: Ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - tú
  lexicon: BDAG
  rationale: Se emplea 'ustedes' por ser la forma neutral latinoamericana y por mantener el plural enfático del griego.
- source_word: οὗτος
  english_pob_choice: he
  chosen_spanish: ese tal
  alternatives_spanish:
  - él
  - esa persona
  lexicon: BDAG
  rationale: '''Ese tal'' transmite el singular genérico con énfasis demostrativo y evita una frase demasiado dura o demasiado interpretativa; conserva la función representativa del pronombre.'
theological_decisions:
- issue: Contraste entre 'en la carne' y 'en el Espíritu'
  english_pob_reading: sphere/existence language tied to the Holy Spirit’s indwelling, without replacing Paul's term 'flesh' with an interpretive paraphrase
  chosen_spanish_reading: 'contraste de esfera o modo de existencia: no vivir bajo la esfera de la carne sino bajo la del Espíritu que habita en los creyentes'
  alternative_spanish_readings:
  - contraste moral entre pecaminosidad y espiritualidad
  - paráfrasis como 'naturaleza pecaminosa' frente a 'vida guiada por el Espíritu'
  rationale: Se conserva 'carne' para no diluir el término paulino y para dejar visible la tensión teológica del texto. La frase 'en el Espíritu' se entiende como esfera de pertenencia y no como mera emoción religiosa.
  doctrine_reference: Mantener la terminología paulina y la tensión lexical sin resolverla con paráfrasis doctrinal.
- issue: Antecedente de 'de él' en 'no es de él'
  english_pob_reading: the pronoun most naturally refers to the Messiah in the immediate phrase 'Spirit of the Messiah'
  chosen_spanish_reading: el referente inmediato más natural es Mesías, por lo que 'de él' se deja implícito sin sobreespecificarlo
  alternative_spanish_readings:
  - de Dios
  - de Cristo
  rationale: El griego permite dejar el posesivo abierto, y el español puede mantener esa ambigüedad controlada. No se añade un antecedente explícito que el texto no formula.
  doctrine_reference: No introducir una precisión doctrinal mayor que la del griego; respetar el antecedente inmediato más probable.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: la oscilación entre ''Mesías'' y ''Cristo'' en el inglés auditado fue corregida de vuelta a ''Mesías'' por consistencia con la política terminológica del proyecto; también se preservó la lectura literal de ''flesh'' sin reducirla a una paráfrasis interpretativa. El español sigue el mismo criterio auditable.'
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός como título, no como nombre litúrgico fijo.
  - '''carne'' se usa como equivalente técnico de σάρξ, con nota alternativa para el posible matiz interpretativo.'
  - '''Espíritu'' se capitaliza solo cuando el contexto indica al Espíritu Santo.'
  - '''habita'' refleja el matiz de residencia estable de οἰκεῖ.'
  - 'Se preserva el contraste sintáctico del griego: ''pero... sino...''.'
