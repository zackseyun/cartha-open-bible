base_translation:
  language: en
  yaml_path: translation/nt/romans/008/009.yaml
  text: But you are not in the flesh but in the Spirit[a], if indeed the Spirit of God dwells in you. But if anyone does not have the Spirit of Messiah[c][b], he does not belong to him.
  footnotes:
