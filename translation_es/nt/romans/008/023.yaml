translation:
  language: es
  text: Y no solo eso[a], sino que nosotros mismos también, los que tenemos las primicias del Espíritu, gemimos en nuestro interior, aguardando con ansias la adopción como hijos[b], la redención de nuestro cuerpo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «el Espíritu como primicias».'
    reason: alternative_reading
  - marker: b
    text: 'O simplemente: «la adopción». El término griego incluye más literalmente la idea de filiación o condición de hijos.'
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «de nuestro cuerpo», con singular usado distributivamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μόνον δέ, ἀλλὰ
  english_pob_choice: And not only that, but
  chosen_spanish: Y no solo eso, sino que
  alternatives_spanish:
  - Y no solo eso, pero
  - No solo eso, sino que
  lexicon: N/A
  rationale: Mantiene la contraposición enfática del griego y enlaza naturalmente con el contexto anterior en español.
- source_word: καὶ αὐτοὶ / ἡμεῖς καὶ αὐτοὶ
  english_pob_choice: we ourselves also, even we ourselves
  chosen_spanish: nosotros mismos
  alternatives_spanish:
  - nosotros también
  - nosotros mismos también
  - incluso nosotros mismos
  lexicon: N/A
  rationale: El griego repite el énfasis sobre el sujeto. En español, la repetición plena puede sonar pesada; se conserva el énfasis con una forma natural, y se marca la repetición adicional con el contexto y la puntuación.
- source_word: τὴν ἀπαρχὴν τοῦ πνεύματος
  english_pob_choice: the firstfruits of the Spirit
  chosen_spanish: las primicias del Espíritu
  alternatives_spanish:
  - la primicia del Espíritu
  - las primicias del espíritu
  lexicon: BDAG
  rationale: «Primicias» es la correspondencia natural y bíblica para ἀπαρχή. Se conserva «Espíritu» con mayúscula por el contexto de referencia al Espíritu Santo, manteniendo la ambigüedad de la construcción genitiva sin resolverla de más.
- source_word: ἔχοντες
  english_pob_choice: who have
  chosen_spanish: los que tenemos
  alternatives_spanish:
  - que tenemos
  - teniendo
  lexicon: N/A
  rationale: Convierte el participio en una relativa española fluida sin perder la idea de posesión presente.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: within ourselves
  chosen_spanish: dentro de nosotros mismos
  alternatives_spanish:
  - en nosotros mismos
  - interiormente
  lexicon: BDAG
  rationale: Expresa con claridad la localización interior del gemido, evitando un calco demasiado rígido.
- source_word: στενάζομεν
  english_pob_choice: groan
  chosen_spanish: gemimos
  alternatives_spanish:
  - gimimos
  - suspiramos
  lexicon: BDAG
  rationale: «Gemir» comunica bien la intensidad y conserva la conexión verbal con el gemido de la creación en el contexto inmediato.
- source_word: υἱοθεσίαν
  english_pob_choice: adoption as sons
  chosen_spanish: la adopción
  alternatives_spanish:
  - la adopción como hijos
  - la filiación
  lexicon: BDAG
  rationale: En español, «adopción» es suficiente y natural; el matiz de filiación queda disponible en nota, preservando la tensión lexical del término griego sin introducir una formulación forzada en el texto principal.
- source_word: ἀπεκδεχόμενοι
  english_pob_choice: eagerly awaiting
  chosen_spanish: aguardando con ansias
  alternatives_spanish:
  - esperando con anhelo
  - aguardando expectantes
  lexicon: BDAG
  rationale: Reproduce el sentido intensivo de espera expectante con una expresión idiomática clara en español.
- source_word: τὴν ἀπολύτρωσιν
  english_pob_choice: the redemption
  chosen_spanish: la redención
  alternatives_spanish:
  - la liberación
  - el rescate
  lexicon: BDAG
  rationale: «Redención» preserva el vocabulario paulino y su peso teológico escatológico.
- source_word: τοῦ σώματος ἡμῶν
  english_pob_choice: of our bodies
  chosen_spanish: de nuestro cuerpo
  alternatives_spanish:
  - de nuestros cuerpos
  lexicon: BDAG
  rationale: Se conserva el singular distributivo del griego en la forma principal, ya que el cuerpo es corporativo pero también individual en el contexto de resurrección.
theological_decisions:
- issue: Cómo rendir υἱοθεσίαν sin borrar el matiz de filiación/sonship del término
  english_pob_reading: adoption as sons
  chosen_spanish_reading: la adopción
  alternative_spanish_readings:
  - la adopción como hijos
  - la filiación
  rationale: La forma breve es la más natural en el cuerpo del texto. El matiz de filiación se sugiere con una nota para no ocultar la carga lexical del término griego y para respetar la tensión documentada por el POB inglés.
  doctrine_reference: Preservar la tensión léxica sin resolverla de más; lectura gender-accurate en el trasfondo doctrinal.
- issue: Ambigüedad de τὴν ἀπαρχὴν τοῦ πνεύματος
  english_pob_reading: the firstfruits of the Spirit / possibly, the Spirit as firstfruits
  chosen_spanish_reading: las primicias del Espíritu
  alternative_spanish_readings:
  - el Espíritu como primicias
  - las primicias que son del Espíritu
  rationale: La redacción principal mantiene abierta la relación genitiva, compatible con la lectura tradicional y con la posibilidad apposicional señalada por el POB inglés.
  doctrine_reference: Preservar la ambigüedad textual donde el griego lo permite.
translation_notes:
  revision_awareness: 'Se revisó el auditrastro inglés y no se detectaron cambios posteriores a la última pasada: la concordancia general es alta y no hubo revisiones aplicadas. La versión española conserva las decisiones lexicográficas y teológicas documentadas, incluyendo la ambigüedad de las primicias del Espíritu y el matiz de filiación en adopción.'
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula por referencia al Espíritu Santo.
  - Se preserva «primicias» como término bíblico estable para ἀπαρχή.
  - Se mantiene «redención» por su fuerza paulina y escatológica.
  - Se evita «SEÑOR» porque el versículo no contiene κύριος ni el tetragrámaton.
  - Se conserva el singular en «nuestro cuerpo» para reflejar el griego distributivo.
