base_translation:
  language: en
  yaml_path: translation/nt/romans/008/023.yaml
  text: And not only that[a], but we ourselves also, who have the firstfruits of the Spirit, even we ourselves groan within ourselves[c][b], eagerly awaiting adoption as sons—the redemption of our bodies.
  footnotes:
  - marker: a
    text: Or, possibly, “the Spirit as firstfruits.”
    reason: alternative_reading
  - marker: b
    text: Or simply, “adoption.” The Greek term more literally includes the sense of sonship.
    reason: lexical_alternative
  - marker: c
    text: 'Greek: “of our body,” with singular used distributively.'
    reason: lexical_alternative
