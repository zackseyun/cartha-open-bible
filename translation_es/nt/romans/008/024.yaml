translation:
  language: es
  text: Porque en esperanza fuimos salvos[a]. Pero la esperanza que se ve no es esperanza[b], porque ¿quién espera lo que ve?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por esperanza fuimos salvos».
    reason: alternative_reading
  - marker: b
    text: Es decir, la esperanza se refiere a lo que todavía no se ve.
    reason: cross_reference
lexical_decisions:
- source_word: τῇ ἐλπίδι
  english_pob_choice: in hope
  chosen_spanish: en esperanza
  alternatives_spanish:
  - por esperanza
  - con esperanza
  lexicon: BDAG
  rationale: 'El dativo expresa aquí esfera o modo. «En esperanza» conserva la tensión escatológica del pasaje: la salvación es real, pero todavía se vive orientada a lo que aún no se ve. «Por esperanza» podría sonar demasiado instrumental.'
- source_word: ἐσώθημεν
  english_pob_choice: we were saved
  chosen_spanish: fuimos salvados
  alternatives_spanish:
  - hemos sido salvados
  - fuimos rescatados
  lexicon: BDAG
  rationale: El aoristo pasivo se refleja con pretérito simple para no importar un matiz perfectivo no explicitado por la forma. «Salvados» preserva la voz pasiva y mantiene el lenguaje paulino sin forzar una paráfrasis.
- source_word: ἐλπὶς ... βλεπομένη
  english_pob_choice: hope that is seen
  chosen_spanish: la esperanza que se ve
  alternatives_spanish:
  - esperanza visible
  - la esperanza vista
  lexicon: BDAG
  rationale: La participio presente pasivo se vierte naturalmente con una oración de relativo. «Que se ve» conserva el contraste entre esperanza y visión sin volverlo artificial en español.
- source_word: οὐκ ἔστιν ἐλπίς
  english_pob_choice: is not hope
  chosen_spanish: no es esperanza
  alternatives_spanish:
  - no hay esperanza
  - no es verdadera esperanza
  lexicon: BDAG
  rationale: 'Se mantiene la fuerza cualitativa del predicado: lo que ya se ve deja de ser esperanza como tal. «No es esperanza» suena natural y reproduce la estructura del griego.'
- source_word: ὃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - eso que
  lexicon: BDAG
  rationale: El relativo neutro se refiere a una cosa vista; «lo que» es el equivalente idiomático más directo en español.
- source_word: βλέπει
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - uno ve
  - alguien ve
  lexicon: BDAG
  rationale: En español el sujeto genérico puede omitirse sin perder el sentido proverbial. El verbo queda abierto y natural, preservando el carácter general de la afirmación.
- source_word: τίς ἐλπίζει
  english_pob_choice: who hopes
  chosen_spanish: ¿quién espera?
  alternatives_spanish:
  - ¿quién tiene esperanza?
  - ¿quién sigue esperando?
  lexicon: BDAG
  rationale: Aunque el verbo griego es ἐλπίζω, en español «esperar» es el verbo normal para este campo semántico. «Tener esperanza» sería más explicativo y menos directo.
theological_decisions:
- issue: Relación entre salvación y esperanza en τῇ ἐλπίδι ἐσώθημεν
  english_pob_reading: The dative is rendered as "in hope," preserving the already/not-yet tension without making hope the efficient cause of salvation.
  chosen_spanish_reading: «En esperanza fuimos salvados» conserva la esfera o modo de la salvación y evita convertir la esperanza en causa instrumental.
  alternative_spanish_readings:
  - «Por esperanza fuimos salvados»
  - «Con esperanza fuimos salvados»
  rationale: El pasaje está dentro del contraste paulino entre lo recibido y lo todavía no visto. La preposición «en» mantiene mejor esa tensión que una lectura instrumental de «por» o una formulación más vaga con «con».
  doctrine_reference: Preservar la tensión escatológica ya/ todavía no sin resolverla artificialmente
- issue: Naturaleza de la esperanza en el paralelismo con la visión
  english_pob_reading: Hope concerns what is not yet seen.
  chosen_spanish_reading: La esperanza se define por lo que todavía no se ve; por eso lo ya visible deja de ser esperanza.
  alternative_spanish_readings:
  - La esperanza trata de lo invisible
  - La esperanza apunta a lo que no se ha visto
  rationale: 'La segunda cláusula explica la primera: lo que se ve no pertenece al orden de la esperanza. El español debe dejar claro ese contraste conceptual sin añadir explicaciones que no están en el texto.'
  doctrine_reference: Mantener la relación bíblica entre esperanza, espera y fe en lo no visto
translation_notes:
  revision_awareness: Esta versión sigue de cerca la lectura auditada del POB en inglés y no requiere revisión adicional según el informe más reciente; conserva el contraste escatológico y la sintaxis relativa natural en español.
  spanish_consistency_notes:
  - Se usa «salvados» para mantener la voz pasiva del griego y la preferencia del POB por conservar el aspecto léxico sin perífrasis innecesarias.
  - Se evita «Cristo» u otra terminología no pertinente; no hay vocabulario técnico que requiera normalización adicional.
  - «Esperanza» se mantiene de manera consistente para ἐλπίς y «esperar» para ἐλπίζει, reflejando el campo semántico sin introducir variantes innecesarias.
