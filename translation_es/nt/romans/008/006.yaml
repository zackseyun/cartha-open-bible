translation:
  language: es
  text: Porque la mentalidad de la carne[a] es muerte, pero la mentalidad del Espíritu[b] es vida y paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «naturaleza pecaminosa».
    reason: lexical_alternative
  - marker: b
    text: O «espíritu».
    reason: alternative_reading
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: BDAG
  rationale: Conserva el valor explicativo de la conexión con el argumento anterior en un español natural y publicable.
- source_word: φρόνημα
  english_pob_choice: mindset
  chosen_spanish: pensamiento
  alternatives_spanish:
  - mentalidad
  - modo de pensar
  - disposición
  lexicon: BDAG
  rationale: ‘Pensamiento’ comunica de forma breve la orientación interior, aunque es algo menos específico que ‘mindset’; se evita una expresión demasiado técnica o pesada en español.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana pecaminosa
  - naturaleza pecaminosa
  lexicon: BDAG
  rationale: Se mantiene el término bíblico ‘carne’ para preservar la tensión teológica paulina y no resolver interpretativamente el contraste.
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - muerte espiritual
  lexicon: BDAG
  rationale: Traducción directa y sobria que conserva el peso escatológico y moral del término.
- source_word: πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: En el contexto de Romanos 8, la referencia es al Espíritu Santo; la mayúscula refleja esa decisión contextual, mientras la alternativa queda registrada.
- source_word: ζωή
  english_pob_choice: life
  chosen_spanish: vida
  lexicon: BDAG
  rationale: Equivalente directo que mantiene el contraste compacto con ‘muerte’.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  lexicon: BDAG
  rationale: Equivalente directo y natural en español, adecuado para el sentido amplio de bienestar reconciliado.
theological_decisions:
- issue: Referencia de πνεῦμα en la segunda cláusula
  english_pob_reading: Holy Spirit
  chosen_spanish_reading: Espíritu Santo
  alternative_spanish_readings:
  - espíritu humano
  - espíritu en sentido general
  rationale: El argumento inmediato de Romanos 8 contrapone la carne con el Espíritu como agente divino de vida; por eso la mayúscula es la mejor decisión contextual.
  doctrine_reference: Romanos 8:1-17; Gálatas 5:16-25
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparezca explícitamente en el texto español: [a] junto a ‘carne’ y [b] junto a ‘Espíritu’. No se introdujeron notas sin ancla.'
  spanish_consistency_notes:
  - Se prefirió un registro claro y bíblico, evitando calcos innecesarios.
  - Se mantuvo la contraposición paulina ‘carne/ Espíritu’ sin suavizarla.
  - 'La puntuación reproduce el paralelismo del original: dos miembros contrastivos unidos por ‘pero’.'
