- from: Así que, hermanos, somos deudores[a], no a la carne[b], para vivir según la carne.
  to: Así que, hermanos[a], somos deudores, no con la carne[b], para vivir según la carne.
  rationale: Se reemplaza «no a la carne» por «no con la carne» para lograr un español natural que preserve la idea de que los creyentes no le deben nada a la carne. También se ancla la nota inclusiva en «hermanos» y se uniforman las comillas en la nota b.
