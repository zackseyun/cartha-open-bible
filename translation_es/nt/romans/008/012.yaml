translation:
  language: es
  text: Así que, hermanos[a], somos deudores, no con la carne[b], para vivir según la carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego usa la forma masculina plural como forma de dirección a la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: «Carne» aquí se refiere a la naturaleza humana caída; alternativamente, «naturaleza pecaminosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄρα οὖν
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - De modo que
  - Por tanto
  lexicon: BDAG
  rationale: La doble partícula inferencial introduce una conclusión. «Así que» comunica bien la transición lógica en español moderno sin volverse demasiado rígida.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanas y hermanos
  lexicon: BDAG
  rationale: Se mantiene la forma vocativa masculina plural del griego, que en español puede funcionar como forma de dirección a la comunidad creyente. La alternativa inclusiva puede explicarse en nota si se desea.
- source_word: ὀφειλέται ἐσμέν
  english_pob_choice: we are debtors
  chosen_spanish: somos deudores
  alternatives_spanish:
  - estamos obligados
  - somos deudores morales
  lexicon: BDAG
  rationale: «Deudores» conserva el sustantivo metafórico del griego con mayor cercanía léxica que una paráfrasis explicativa. En este contexto expresa obligación moral, no deuda financiera.
- source_word: σάρξ / σαρκί
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza pecaminosa
  - naturaleza humana caída
  lexicon: BDAG
  rationale: Se preserva el término paulino «carne» para no disolver la tensión teológica del pasaje. Las alternativas interpretativas se reservan para nota porque el contexto no se reduce a un simple sentido físico.
- source_word: τοῦ κατὰ σάρκα ζῆν
  english_pob_choice: to live according to the flesh
  chosen_spanish: para vivir según la carne
  alternatives_spanish:
  - para vivir conforme a la carne
  - para vivir como dicta la carne
  lexicon: BDAG
  rationale: La construcción final expresa el ámbito o norma de vida excluido por la negación. «Vivir según la carne» reproduce con naturalidad la fórmula paulina y mantiene el paralelismo con el contexto inmediato.
theological_decisions:
- issue: Cómo rendir σάρξ en la oposición paulina carne/Espíritu
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - naturaleza pecaminosa
  rationale: La traducción principal conserva «carne» para respetar el vocabulario de Pablo y no resolver demasiado pronto la tensión interpretativa. La alternativa más explicativa queda como posibilidad secundaria en nota.
  doctrine_reference: 'Contested terms table: σάρξ = flesh (literal) / sinful nature (metaphorical)'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión auditada del inglés POB: se conserva el valor inferencial de Ἄρα οὖν, se mantiene el sustantivo «deudores» para ὀφειλέται y se preserva «flesh» como «carne» con nota interpretativa, evitando una paráfrasis que borre la terminología paulina.'
  spanish_consistency_notes:
  - Se usa «carne» de manera consistente con el uso paulino del término en Romanos 8.
  - «Deudores» se entiende aquí en sentido figurado; no implica deuda económica.
  - La puntuación con coma y la estructura negativa buscan reflejar la relación lógica del griego sin sobreexplicarla.
