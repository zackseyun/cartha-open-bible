  glossary_alignment: 'Se alinea bien con los criterios del proyecto: ἀδελφοί -> «hermanos» con nota inclusiva; σάρξ -> «carne» con alternativa explicativa en nota; no hay conflictos con terminología teológica central. La revisión propuesta mantiene plenamente estas decisiones.'
