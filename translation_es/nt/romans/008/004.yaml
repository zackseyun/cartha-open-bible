translation:
  language: es
  text: para que la justa exigencia[a] de la ley se cumpla en nosotros, los que no andamos conforme a la carne[b], sino conforme al Espíritu[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «requisito de la ley».
    reason: lexical_alternative
  - marker: b
    text: «Carne» aquí se refiere a la naturaleza humana caída o a la vida orientada lejos de Dios; algunos traducen «naturaleza pecaminosa».
    reason: lexical_alternative
  - marker: c
    text: O «espíritu»; aquí probablemente se refiere al Espíritu Santo en el contexto de Romanos 8.
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα introduce propósito o resultado; en español bíblico contemporáneo, «para que» expresa de forma natural esa finalidad sin endurecer el estilo.
- source_word: δικαίωμα
  english_pob_choice: righteous requirement
  chosen_spanish: justa exigencia
  alternatives_spanish:
  - requisito justo
  - exigencia justa
  - prescripción justa
  lexicon: BDAG
  rationale: La POB inglesa preserva la fuerza legal y moral del término sin reducirlo a una simple «regla». En español, «justa exigencia» mantiene el matiz de demanda normativa y la cualidad de justicia, sin sonar técnico en exceso.
- source_word: νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la ley de Dios
  - la ley mosaica
  lexicon: BDAG
  rationale: En Romanos, νόμος suele referirse a «la ley» en sentido paulino. Se conserva la forma breve y natural en español, evitando especificaciones que el texto no explicita aquí.
- source_word: πληρωθῇ
  english_pob_choice: might be fulfilled
  chosen_spanish: se cumpla
  alternatives_spanish:
  - sea cumplida
  - llegue a cumplirse
  lexicon: BDAG
  rationale: El subjuntivo pasivo en una cláusula de propósito se vierte de modo natural con «se cumpla», que conserva la voz pasiva y la idea de realización sin sonar forzado.
- source_word: ἐν ἡμῖν
  english_pob_choice: in us
  chosen_spanish: en nosotros
  alternatives_spanish:
  - entre nosotros
  - por nosotros
  lexicon: BDAG
  rationale: Se mantiene la preposición «en» para no desplazar el sentido hacia una agencia humana explícita («por nosotros»).
- source_word: περιπατοῦσιν
  english_pob_choice: walk
  chosen_spanish: andamos
  alternatives_spanish:
  - vivimos
  - nos conducimos
  lexicon: BDAG
  rationale: Aunque «caminar» es literal, en español la metáfora ética paulina suena más natural con «andar». Conserva la imagen de conducta habitual y el eco bíblico sin mecanicismo.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana pecaminosa
  - vida orientada a la carne
  lexicon: BDAG
  rationale: Se conserva el término técnico-teológico «carne», siguiendo la decisión inglesa de no sustituirlo por una explicación interpretativa en el texto principal. La ambigüedad doctrinal se preserva para la nota.
- source_word: πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: En Romanos 8 el contraste con «carne» apunta con fuerza al Espíritu Santo; la mayúscula comunica esa lectura contextual, manteniendo abierta la posibilidad léxica más general en nota.
- source_word: κατὰ σάρκα ... κατὰ πνεῦμα
  english_pob_choice: according to the flesh ... according to the Spirit
  chosen_spanish: conforme a la carne ... conforme al Espíritu
  alternatives_spanish:
  - según la carne ... según el Espíritu
  - de acuerdo con la carne ... de acuerdo con el Espíritu
  lexicon: BDAG
  rationale: «Conforme a» reproduce bien el valor normativo/relacional de κατά en esta oposición ética, y evita el tono demasiado escolar de «según» en español eclesial moderno.
theological_decisions:
- issue: 'Referencia de πνεῦμα: Espíritu Santo o espíritu humano'
  english_pob_reading: the Spirit
  chosen_spanish_reading: el Espíritu
  alternative_spanish_readings:
  - el espíritu
  rationale: El contexto inmediato de Romanos 8 enfatiza la obra y esfera del Espíritu Santo; por eso la mayúscula es adecuada. Sin embargo, se conserva la tensión textual mediante la nota de alternativa lexical, sin resolverla de forma dogmática en el cuerpo principal.
  doctrine_reference: Preservar la tensión lexical y contextual; no sobretraducir la ambigüedad.
- issue: 'Valor de ἐν ἡμῖν: local/interno o instrumental/agentivo'
  english_pob_reading: fulfilled in us
  chosen_spanish_reading: se cumpla en nosotros
  alternative_spanish_readings:
  - se cumpla por nosotros
  - se cumpla entre nosotros
  rationale: La preposición «en» se mantiene para seguir de cerca el griego y evitar sugerir que la ley se cumple principalmente por el mérito humano. La frase admite un efecto transformador interno y comunitario, pero el texto no añade más.
  doctrine_reference: No importar una agencia humana que el texto no afirma.
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del último paso de revisión: se mantiene la decisión de traducir δικαίωμα con una expresión legal-moral fuerte, conservar σάρξ como «carne» en el texto principal y capitalizar πνεῦμα como «Espíritu» por el contexto de Romanos 8, sin cambios respecto del estado auditado.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico contemporáneo, claro y reverente, evitando arcaísmos innecesarios.
  - La puntuación sigue el orden lógico del griego y del texto inglés auditado, con una cláusula final explicativa.
  - Las notas preservan la ambigüedad de σάρξ y πνεῦμα sin desplazarla al cuerpo principal.
  - «Conforme a» se usa de manera consistente para κατά en la oposición ética de la oración.
