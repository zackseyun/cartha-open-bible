translation:
  language: es
  text: Porque la creación fue sometida a la futilidad[a], no por su propia voluntad, sino a causa del que la sometió[b], en esperanza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vanidad» o «frustración» para «futilidad».
    reason: lexical_alternative
  - marker: b
    text: «El que la sometió» no se identifica explícitamente en el griego.
    reason: alternative_reading
  - marker: c
    text: O «con esperanza».
    reason: lexical_alternative
lexical_decisions:
- source_word: ματαιότητι
  english_pob_choice: futility
  chosen_spanish: vanidad
  alternatives_spanish:
  - futilidad
  - frustración
  - vacío
  lexicon: BDAG
  rationale: ματαιότης en Romanos 8:20 expresa una condición de inutilidad, frustración o falta de cumplimiento del fin debido; en español, «vanidad» recoge bien ese matiz bíblico de algo vano o sin provecho. Se conserva la tensión lexical del inglés POB, que deja abiertas alternativas como «frustration» y «vanity».
- source_word: κτίσις
  english_pob_choice: creation
  chosen_spanish: creación
  alternatives_spanish:
  - criatura
  - orden creado
  lexicon: BDAG
  rationale: En el contexto inmediato de Romanos 8:19–22, κτίσις se refiere al conjunto de la creación no humana. «Creación» es el equivalente natural y transparente en español para ese sentido colectivo.
- source_word: ὑπετάγη
  english_pob_choice: was subjected
  chosen_spanish: fue sometida
  alternatives_spanish:
  - fue puesta bajo sujeción
  - fue subordinada
  lexicon: BDAG
  rationale: El pasivo aoristo señala una sujeción impuesta. «Fue sometida» reproduce con claridad esa pasividad y mantiene el valor verbal del texto griego.
- source_word: οὐχ ἑκοῦσα
  english_pob_choice: not willingly
  chosen_spanish: no por su propia voluntad
  alternatives_spanish:
  - no voluntariamente
  - no de propia voluntad
  lexicon: BDAG
  rationale: La construcción contrasta la falta de agencia de la creación con la acción del que la sometió. «No por su propia voluntad» expresa de manera natural y precisa el sentido de ἑκοῦσα sin sonar forzado en español.
- source_word: διὰ τὸν ὑποτάξαντα
  english_pob_choice: because of the one who subjected it
  chosen_spanish: por causa del que la sometió
  alternatives_spanish:
  - a causa del que la sometió
  - porque el que la sometió
  lexicon: BDAG
  rationale: 'διά con acusativo se entiende causalmente aquí. «Por causa del que la sometió» conserva la ambigüedad respetuosa del griego: el sujeto queda identificado solo como «el que la sometió», sin añadir explicaciones que el texto no da.'
- source_word: ἐφ’ ἑλπίδι
  english_pob_choice: in hope
  chosen_spanish: con esperanza
  alternatives_spanish:
  - en esperanza
  - sobre la base de esperanza
  lexicon: BDAG
  rationale: La expresión breve y compacta admite «en esperanza» o «con esperanza»; en español, «con esperanza» suena más natural y mantiene el tono prospectivo del griego. Se deja abierta la relación exacta de la esperanza, como hace el POB inglés con su nota alternativa «with hope».
theological_decisions:
- issue: Identidad del que sometió la creación
  english_pob_reading: 'The main text keeps the subject generic: ''the one who subjected it.'''
  chosen_spanish_reading: 'El texto principal conserva la referencia genérica: «el que la sometió».'
  alternative_spanish_readings:
  - Dios la sometió
  - Adán ocasionó su sometimiento
  - Satanás la sometió
  rationale: El griego no identifica explícitamente al sujeto, y la traducción debe preservar esa restricción textual. Por eso se evita resolver la cuestión interpretativa en el cuerpo principal, manteniendo la tensión teológica documentada por el POB inglés.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla en el texto principal.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó en acuerdo alto y sin observaciones pendientes. Se mantiene la misma lectura auditada del inglés POB para el español.'
  spanish_consistency_notes:
  - Se mantiene «creación» para κτίσις, en armonía con el uso contextual de Romanos 8:19–22.
  - Se evita «SEÑOR» u otra adaptación no presente en este versículo.
  - «Fue sometida» conserva el pasivo del griego y la acción impuesta.
  - «Vanidad» se usa como equivalente bíblico natural de ματαιότης, sin eliminar la alternativa semántica de futilidad/frustración.
  - La nota sobre el sujeto de la pasiva preserva la cautela interpretativa del texto fuente.
