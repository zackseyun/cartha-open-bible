    reason: lexical_alternative
  - marker: b
    text: «El que la sometió» no se identifica explícitamente en el griego.
    reason: alternative_reading
  - marker: c
    text: O «con esperanza».
    reason: lexical_alternative
  revision_rationale: Se ajusta ματαιότητι a «futilidad» para seguir la decisión principal del POB inglés y evitar la ambigüedad de «vanidad» en español. Se corrige ἐφ’ ἑλπίδι a «en esperanza» para reflejar mejor el texto base y dejar «con esperanza» como verdadera alternativa en nota. También se pule la fluidez de διά con acusativo con «a causa del que la sometió», manteniendo la ambigüedad sobre su identidad.
