revisions:
- from: Porque la creación fue sometida a la vanidad[a], no por su propia voluntad, sino por causa del que la sometió[b], con esperanza[c].
  to: Porque la creación fue sometida a la futilidad[a], no por su propia voluntad, sino a causa del que la sometió[b], en esperanza[c].
  rationale: Se ajusta ματαιότητι a «futilidad» para seguir la decisión principal del POB inglés y evitar la ambigüedad de «vanidad» en español. Se corrige ἐφ’ ἑλπίδι a «en esperanza» para reflejar mejor el texto base y dejar «con esperanza» como verdadera alternativa en nota. También se pule la fluidez de διά con acusativo con «a causa del que la sometió», manteniendo la ambigüedad sobre su identidad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:10:56Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: κτίσις como «creación», ὑπετάγη como pasivo «fue sometida», οὐχ ἑκοῦσα como falta de voluntad propia, y mantiene correctamente sin identificar «del que la sometió». Sin embargo, dos decisiones no siguen bien el rastro auditado del POB inglés: ματαιότητι se inclinó en inglés por «futility», no por «vanity», y en español «vanidad» puede sonar más moralizante o eco de Eclesiastés que de frustración cósmica; además la nota c repite exactamente el texto principal («con esperanza») en vez de preservar la alternativa documentada al inglés.'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero «vanidad» aquí puede resultar menos natural y más ambiguo que «futilidad». También «por causa del que la sometió» suena algo pesado; «a causa de» es un poco más natural. La frase final funciona mejor como «en esperanza», que además corresponde más de cerca a la formulación compacta del original y permite dejar «con esperanza» como alternativa en nota.
  glossary_alignment: 'No hay conflicto con los términos doctrinales principales del proyecto. La revisión propuesta mejora la alineación con las decisiones léxicas auditadas del POB: ματαιότητι → «futilidad» como opción principal; ἐφ’ ἑλπίδι → «en esperanza» con nota alternativa «con esperanza»; y se conserva la ambigüedad teológica de «el que la sometió».'
  issues:
  - severity: medium
    issue: «vanidad» como texto principal para ματαιότητι
    rationale: El POB inglés eligió «futility» como sentido principal por su matiz de frustración e incapacidad de alcanzar su fin. En español, «vanidad» introduce una asociación más fuerte con orgullo, apariencia o el registro de Eclesiastés, lo cual puede desviar el sentido contextual de Romanos 8:20.
  - severity: medium
    issue: La nota [c] no aporta una alternativa real
    rationale: El texto principal dice «con esperanza» y la nota [c] también dice «O «con esperanza»». Esto invalida la función de la nota y no preserva correctamente la alternativa documentada en inglés («with hope») frente al texto principal «in hope».
  - severity: low
    issue: «por causa del que la sometió» suena algo menos natural
    rationale: Aunque es fiel, «a causa del que la sometió» fluye mejor en español general sin cambiar el valor causal de διά con acusativo.
  revised_spanish_text: Porque la creación fue sometida a la futilidad[a], no por su propia voluntad, sino a causa del que la sometió[b], en esperanza[c].
  revised_footnotes:
  - marker: a
