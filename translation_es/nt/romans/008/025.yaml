translation:
  language: es
  text: Pero si esperamos lo que no vemos[a], con paciente perseverancia[b] lo aguardamos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo también puede significar «esperamos con anhelo» o «aguardamos con expectación».
    reason: lexical_alternative
  - marker: b
    text: O «con perseverancia».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: BDAG
  rationale: Conserva la fuerza condicional de εἰ y el matiz de continuación o contraste leve de δέ. En español, «Pero si» fluye bien desde el versículo anterior y mantiene la transición discursiva.
- source_word: ὃ οὐ βλέπομεν
  english_pob_choice: what we do not see
  chosen_spanish: lo que no vemos
  alternatives_spanish:
  - aquello que no vemos
  - lo que no podemos ver
  lexicon: BDAG
  rationale: El relativo neutro ὃ se vierte con naturalidad como «lo que». «No vemos» preserva el presente simple sin añadir matices ajenos como incapacidad o imposibilidad.
- source_word: ἐλπίζομεν
  english_pob_choice: we hope for
  chosen_spanish: esperamos
  alternatives_spanish:
  - ponemos nuestra esperanza en
  - esperamos por
  lexicon: BDAG
  rationale: En español, con este complemento, «esperamos» comunica de forma natural la orientación futura de la esperanza. El contexto ya aporta el sentido de espera confiada, por lo que no es necesario forzar «esperamos por».
- source_word: δι’ ὑπομονῆς
  english_pob_choice: with patient endurance
  chosen_spanish: con paciencia perseverante
  alternatives_spanish:
  - con perseverancia
  - con paciencia
  - con perseverancia paciente
  lexicon: BDAG
  rationale: 'ὑπομονή implica más que paciencia pasiva: resistencia firme bajo demora o dificultad. «Paciencia perseverante» conserva esa carga y sigue siendo claro en español.'
- source_word: ἀπεκδεχόμεθα
  english_pob_choice: we wait for it
  chosen_spanish: lo aguardamos
  alternatives_spanish:
  - lo esperamos
  - lo esperamos con anhelo
  - lo aguardamos con expectativa
  lexicon: BDAG
  rationale: El verbo expresa una espera orientada con expectativa. «Lo aguardamos» mantiene esa fuerza mejor que un simple «lo esperamos» y evita añadir explícitamente una emoción que el griego no exige en la forma verbal.
theological_decisions:
- issue: Esperanza cristiana y espera de lo no visible
  english_pob_reading: Rendered the verse in terms of ongoing hope and waiting without specifying the object beyond the Greek relative clause.
  chosen_spanish_reading: 'Se mantiene la referencia abierta: «lo que no vemos», sin introducir un objeto doctrinal más específico en el versículo.'
  alternative_spanish_readings:
  - salvación
  - redención
  - resurrección
  rationale: El contexto inmediato ilumina la referencia, pero el versículo mismo no la nombra. La traducción preserva esa reserva textual y evita resolver prematuramente la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios adicionales; la versión mantiene el sentido del griego y la restricción textual del audit trail inglés.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; no aplica en este versículo.
  - Se evitó «Cristo»/«Mesías» porque no aparece en el pasaje.
  - Se eligió «paciencia perseverante» como equivalente de ὑπομονή para preservar la intensidad de la espera bajo demora.
  - 'Se mantuvo el objeto indirecto/relativo sin expansión doctrinal: «lo que no vemos».'
