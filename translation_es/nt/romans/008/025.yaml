  spanish_quality_summary: El texto es claro y fiel, pero «paciencia perseverante» resulta algo forzado y redundante para lectura natural en español eclesial. «Con perseverancia paciente» o «con paciente perseverancia» suenan mejor; la segunda mantiene más estrechamente el peso semántico de ὑπομονή. También es preferible añadir notas breves para reflejar las alternativas documentadas del inglés, ya que en español «aguardamos» resuelve una de las opciones léxicas y conviene conservar la otra.
