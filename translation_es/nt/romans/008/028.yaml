translation:
  language: es
  text: Y sabemos que para los que aman a Dios[a], todas las cosas obran juntas para bien, para los que son llamados conforme al propósito[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «Dios hace que todas las cosas obren juntas para bien».'
    reason: textual_variant
  - marker: b
    text: 'O: «conforme a su propósito».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - hemos llegado a saber
  - estamos seguros
  lexicon: BDAG
  rationale: El verbo expresa conocimiento estable y compartido; «sabemos» es la forma natural en español y conserva el valor de certeza presente sin recargarlo.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Funciona como conector suave de continuidad en el argumento. «Y» mantiene el enlace sin introducir contraste que el griego no exige.
- source_word: τοῖς ἀγαπῶσι τὸν θεόν
  english_pob_choice: for those who love God
  chosen_spanish: para los que aman a Dios
  alternatives_spanish:
  - a los que aman a Dios
  - para quienes aman a Dios
  lexicon: BDAG
  rationale: La construcción dativa se vierte naturalmente con «para». «Los que aman a Dios» conserva el grupo definido de personas sin añadir matices ajenos.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto existe
  lexicon: BDAG
  rationale: El plural neutro se preserva de modo explícito. «Todas las cosas» mantiene el alcance amplio y evita simplificarlo a un singular más interpretativo.
- source_word: συνεργεῖ
  english_pob_choice: work together
  chosen_spanish: cooperan
  alternatives_spanish:
  - trabajan juntas
  - obran juntas
  lexicon: BDAG
  rationale: Con sujeto neutro plural implícito en πάντα, el verbo en español necesita concordancia plural. «Cooperan» comunica la idea de actuar conjuntamente sin introducir en el texto principal un sujeto explícito que no aparece en esta forma del griego.
- source_word: εἰς ἀγαθόν
  english_pob_choice: for good
  chosen_spanish: para bien
  alternatives_spanish:
  - hacia el bien
  - en bien
  lexicon: BDAG
  rationale: «Para bien» es una fórmula natural en español para resultado o beneficio. Conserva la dirección final del giro griego sin volverlo demasiado abstracto.
- source_word: τοῖς κατὰ πρόθεσιν κλητοῖς οὖσιν
  english_pob_choice: for those who are called according to purpose
  chosen_spanish: para los que son llamados conforme a propósito
  alternatives_spanish:
  - para los llamados conforme a su propósito
  - para los que son llamados de acuerdo con propósito
  lexicon: BDAG
  rationale: Se mantiene la descripción participial y no se añade un posesivo que no está explícito en el texto griego base. «Conforme a propósito» conserva la literalidad suficiente y el carácter intencional de la frase.
- source_word: πρόθεσιν
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - plan
  - designio
  lexicon: BDAG
  rationale: «Propósito» es el equivalente más claro y digno en español para la intención o finalidad expresada por πρόθεσις en este contexto.
- source_word: κλητοῖς
  english_pob_choice: called
  chosen_spanish: llamados
  alternatives_spanish:
  - invitados
  - convocados
  lexicon: BDAG
  rationale: «Llamados» es el término paulino establecido y el más fiel al campo semántico de κλητός; preserva la resonancia teológica sin suavizarla.
theological_decisions:
- issue: Sujeto implícito de συνεργεῖ
  english_pob_reading: The main text renders the clause as 'all things work together for good' rather than supplying 'God' as the explicit subject.
  chosen_spanish_reading: El texto principal dice «todas las cosas cooperan para bien» sin añadir explícitamente a Dios como sujeto.
  alternative_spanish_readings:
  - Dios hace que todas las cosas cooperen para bien
  - Dios coopera en todas las cosas para bien
  rationale: El griego presentado no expresa de manera explícita a Dios como sujeto de συνεργεῖ. La versión española conserva esa tensión en el cuerpo del texto y la documenta aparte para no resolverla interpretativamente.
  doctrine_reference: Preservar la tensión textual en vez de resolverla.
- issue: Posesivo implícito en κατὰ πρόθεσιν
  english_pob_reading: The main text keeps 'according to purpose' without adding 'his.'
  chosen_spanish_reading: La frase se vierte «conforme a propósito» sin añadir «su».
  alternative_spanish_readings:
  - conforme a su propósito
  - de acuerdo con su propósito
  rationale: Aunque el contexto favorece que el propósito sea de Dios, el griego no trae un posesivo explícito. La traducción española evita introducirlo en la línea principal y deja constancia de la alternativa interpretativa.
  doctrine_reference: Primacía del texto original sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'El texto inglés auditado osciló entre una formulación sin sujeto explícito («all things work together for good») y una revisión que añadió «his» en «his purpose». La presente versión española sigue el testimonio griego dado y preserva ambas tensiones: no introduce a Dios como sujeto en la línea principal y tampoco añade un posesivo explícito en «propósito», dejando esas opciones registradas en notas.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός en lugar de una sustitución devocional por «Señor», conforme al texto fuente.
  - «Llamados» mantiene el lenguaje paulino de κλητός sin pasar a «invitados» o «convocados», que serían menos precisos en este contexto.
  - «Cooperan» se eligió por concordancia con «todas las cosas» y para evitar una reexpresión que suplante la ambigüedad del griego.
  - Se conserva un registro de estilo moderno y eclesialmente legible, sin arcaísmos innecesarios.
