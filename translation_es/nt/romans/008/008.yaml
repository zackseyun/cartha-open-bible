translation:
  language: es
  text: Los que están en la carne[a] no pueden agradar a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la naturaleza pecaminosa». El griego dice «en la carne», término paulino clave en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ... ὄντες
  english_pob_choice: Those who are
  chosen_spanish: Los que están
  alternatives_spanish:
  - los que son
  - aquellos que están
  - los que viven
  lexicon: εἰμί
  rationale: La construcción con artículo y participio funciona sustantivamente para señalar a un grupo. En español, «los que están» conserva el valor de estado presente sin sonar forzado; «los que son» resulta menos natural aquí.
- source_word: ἐν σαρκὶ
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en la naturaleza pecaminosa
  - bajo el dominio de la carne
  lexicon: σάρξ
  rationale: Se mantiene «carne» para conservar el término paulino y su tensión teológica, como hace la POB inglesa. No se interpreta en el texto principal como «naturaleza pecaminosa» para no resolver la ambigüedad de σάρξ por paráfrasis.
- source_word: ἀρέσαι
  english_pob_choice: please
  chosen_spanish: agradar
  alternatives_spanish:
  - ser agradables a
  - complacer
  lexicon: ἀρέσκω
  rationale: «Agradar» expresa de modo natural la capacidad o imposibilidad de resultar aceptable ante Dios. «Ser agradables a» es posible, pero menos directo en español.
- source_word: θεῷ
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - para Dios
  lexicon: θεός
  rationale: El dativo griego se expresa con la preposición «a» en español para el verbo «agradar». Se conserva la referencia directa a Dios sin alterar el sentido relacional.
- source_word: οὐ δύνανται
  english_pob_choice: cannot
  chosen_spanish: no pueden
  alternatives_spanish:
  - no son capaces de
  - no pueden llegar a
  lexicon: δύναμαι
  rationale: «No pueden» es la equivalencia más natural para la negación de capacidad. Mantiene la fuerza modal del griego sin añadir matices que el texto no explicita.
theological_decisions:
- issue: Cómo rendir σάρξ en Romanos 8:8
  english_pob_reading: in the flesh
  chosen_spanish_reading: en la carne
  alternative_spanish_readings:
  - en la naturaleza pecaminosa
  - bajo la dominación de la carne
  rationale: La guía doctrinal pide preservar la tensión lexical paulina. «Carne» conserva el término del texto y su red de alusiones en Romanos 8; las opciones interpretativas quedan como alternativa, no en el cuerpo del versículo.
  doctrine_reference: 'Contested terms table: σάρξ → flesh (literal) / sinful nature (metaphorical), context-dependent'
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente del archivo inglés: no hubo cambios aplicados y el revisor confirmó alta concordancia. Por eso la versión española sigue de cerca la decisión establecida de mantener «flesh/σάρξ» como «carne» en el texto principal.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo usa θεῷ, no el tetragrámaton ni κύριος.
  - Se prefirió el presente de estado «están» para reflejar el participio sustantivado οἱ ... ὄντες.
  - La puntuación y el orden siguen una sintaxis natural en español, sin desplazar el foco lógico de la imposibilidad a la condición descrita.
