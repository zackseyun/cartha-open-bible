    text: O simplemente, «el Espíritu de adopción»; «adopción como hijos» preserva el matiz legal de filiación del griego.
    reason: lexical_alternative
  - marker: c
    text: O «en quien»; el relativo griego es neutro para concordar con «espíritu».
    reason: lexical_alternative
  revision_rationale: Se integra «como hijos» dentro de la expresión «Espíritu de adopción como hijos» para reflejar mejor πνεῦμα υἱοθεσίας y la decisión léxica del POB inglés sobre υἱοθεσία. También se corrige la nota b para que conserve una alternativa real y explique el matiz legal-filial, en vez de repetir casi el mismo texto ya presente en la línea principal.
