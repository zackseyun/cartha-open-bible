review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el contraste principal del griego entre «espíritu de esclavitud» y «Espíritu de adopción», y conserva adecuadamente «clamamos» y «Abba… Padre». Sin embargo, la secuencia «adopción como hijos» introduce en español una colocación algo forzada y menos fiel al valor legal-sonship que el expediente inglés quiso preservar con «adoption as sons». Además, la nota b actual está mal orientada: presenta como alternativa más literal precisamente la forma de superficie ya usada de hecho, en vez de explicar la alternativa documentada entre «Espíritu» y «espíritu» o la fuerza de «adopción como hijos».'
  spanish_quality_summary: El texto es legible y digno, pero «adopción como hijos» suena poco natural en español e interrumpe la fluidez. «Adopción filial» es más idiomático, pero perdería el componente explícito de «sons». La mejor reparación breve y fiel es «adopción como hijos» integrado sin separar artificialmente «adopción» de «como hijos», manteniendo claridad legal y lectura eclesial. También conviene ajustar la nota b para que realmente aporte una alternativa útil y coherente con el audit trail inglés.
  glossary_alignment: 'Se alinea bien con los términos del proyecto: πνεῦμα/Espíritu, δουλεία/esclavitud, κράζομεν/clamamos, y Αββα/Abba. No hay conflicto con Yahvé, Mesías, etc. La única tensión terminológica relevante es υἱοθεσία: el proyecto pide preservar el matiz de sonship; por eso conviene mantener «adopción como hijos» como unidad semántica, no diluirlo en «adopción ... como hijos» con nota confusa.'
  issues:
  - severity: medium
    issue: «adopción[b] como hijos» fragmenta innecesariamente υἱοθεσία
    rationale: El griego trata πνεῦμα υἱοθεσίας como una sola expresión; separar «adopción» de «como hijos» hace que el matiz legal-filial parezca un añadido explicativo más que parte del término.
  - severity: medium
    issue: La nota b no corresponde bien a la decisión léxica documentada
    rationale: La nota dice «O, más literalmente, “el Espíritu de adopción como hijos”», pero el texto ya comunica eso sustancialmente. No preserva de manera útil la alternativa auditada entre lectura personal/impersonal ni explica mejor el valor de υἱοθεσία.
  - severity: low
    issue: «para volver al miedo» es aceptable pero algo menos natural que «para volver a caer en miedo/temor»
    rationale: No requiere cambio obligatorio, porque sigue la racionalidad inglesa de no añadir verbo finito y mantiene πάλιν εἰς φόβον. Puede permanecer.
  revised_spanish_text: 'Porque no recibieron un espíritu de esclavitud para volver al miedo[a], sino que recibieron el Espíritu de adopción como hijos[b], por quien[c] clamamos: «¡Abba! ¡Padre!»'
