translation:
  language: es
  text: 'Porque no recibieron un espíritu de esclavitud para volver al miedo[a], sino que recibieron el Espíritu de adopción como hijos[b], por quien[c] clamamos: «¡Abba! ¡Padre!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que los llevara de nuevo al miedo».
    reason: alternative_reading
  - marker: b
    text: O simplemente, «el Espíritu de adopción»; «adopción como hijos» preserva el matiz legal de filiación del griego.
    reason: lexical_alternative
  - marker: c
    text: O «en quien»; el relativo griego es neutro para concordar con «espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα δουλείας
  english_pob_choice: a spirit of slavery
  chosen_spanish: un espíritu de esclavitud
  alternatives_spanish:
  - un espíritu de servidumbre
  - un espíritu de esclavitud / de atadura
  lexicon: BDAG
  rationale: Se conserva πνεῦμα como «espíritu» y δουλείας como «esclavitud» para mantener la fuerza léxica del contraste con la filiación/adopción. «Esclavitud» refleja mejor el peso del término que un atenuado «servidumbre».
- source_word: πάλιν εἰς φόβον
  english_pob_choice: leading back into fear
  chosen_spanish: para volver al miedo
  alternatives_spanish:
  - de vuelta al miedo
  - para caer otra vez en miedo
  - nuevamente hacia el miedo
  lexicon: BDAG
  rationale: «Para volver» comunica bien el valor de πάλιν con εἰς sin añadir una paráfrasis excesiva. «Miedo» es el equivalente natural de φόβον en español; aquí mantiene el sentido de temor servil o aterrorizado.
- source_word: πνεῦμα υἱοθεσίας
  english_pob_choice: the Spirit of adoption as sons
  chosen_spanish: el Espíritu de adopción
  alternatives_spanish:
  - un espíritu de adopción
  - el Espíritu de filiación
  - el Espíritu de adopción como hijos
  lexicon: BDAG
  rationale: El contexto de Romanos 8 favorece entender πνεῦμα aquí como el Espíritu Santo; por eso se capitaliza «Espíritu», siguiendo la decisión revisada en el POB inglés. «Adopción» conserva el término legal; la expansión «como hijos» se mantiene después para reflejar la nota de sonship sin recargar la frase.
- source_word: υἱοθεσίας
  english_pob_choice: adoption as sons
  chosen_spanish: adopción
  alternatives_spanish:
  - adopción como hijos
  - filiación adoptiva
  - adopción filial
  lexicon: BDAG
  rationale: En español, «adopción» ya porta la noción legal principal; la frase siguiente «como hijos» expresa el matiz de υἱοθεσία sin forzar una construcción artificial. Se evita borrar la tensión de género/estatus del original, pero se busca legibilidad natural.
- source_word: ἐν ᾧ
  english_pob_choice: by whom
  chosen_spanish: por quien
  alternatives_spanish:
  - en quien
  - en el cual
  - por el cual
  lexicon: BDAG
  rationale: Aunque la forma es literalmente local («en quien/lo cual»), el contexto hace natural una lectura instrumental. «Por quien» funciona bien en español para el Espíritu personal y mantiene la relación causal/instrumental que la versión inglesa señala.
- source_word: κράζομεν
  english_pob_choice: we cry
  chosen_spanish: clamamos
  alternatives_spanish:
  - gritamos
  - exclamamos
  - clamamos en voz alta
  lexicon: BDAG
  rationale: «Clamamos» preserva el tono ferviente y orante de κράζομεν mejor que un simple «decimos». En contexto de oración, suena más natural que «gritamos» y mantiene la intensidad del verbo.
- source_word: Αββα ὁ πατήρ
  english_pob_choice: Abba! Father!
  chosen_spanish: «¡Abba! ¡Padre!»
  alternatives_spanish:
  - «Abba, Padre»
  - «¡Abba, Padre!»
  - «Abba, ¡Padre!»
  lexicon: BDAG
  rationale: «Abba» se translitera por ser una forma vocativa conservada en el texto, y «Padre» traduce ὁ πατήρ como aposición vocativa. La puntuación exclamativa comunica la vivacidad de la invocación sin alterar el contenido.
theological_decisions:
- issue: Si πνεῦμα υἱοθεσίας debe entenderse como un espíritu impersonal o como el Espíritu Santo
  english_pob_reading: The English POB keeps a parallel phraseology with “a spirit of slavery” but revises the second clause to “the Spirit of adoption as sons,” signaling a personal divine referent in context.
  chosen_spanish_reading: «el Espíritu de adopción» capitaliza y personaliza el referente, sin perder la estructura contrastiva con «un espíritu de esclavitud».
  alternative_spanish_readings:
  - «un espíritu de adopción»
  - «el espíritu de adopción»
  - «un espíritu de adopción… en quien clamamos»
  rationale: Romanos 8 sugiere claramente al Espíritu Santo en este segundo miembro, especialmente por el clamor filial dirigido al Padre. A la vez, la construcción paralela con «espíritu de esclavitud» merece conservarse en el primer miembro. La solución española sigue la revisión inglesa y no borra esa tensión, sino que la hace legible.
  doctrine_reference: Pneumatología paulina; mantener la tensión retórica sin neutralizar el referente del Espíritu.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que capitaliza «Spirit» en la segunda cláusula para reflejar al Espíritu Santo en el contexto. También conserva la decisión revisada de traducir ἐν ᾧ de modo instrumental («por quien») y de mantener «adoption as sons» como «adopción» con un matiz filial explícito en el texto.
  spanish_consistency_notes:
  - Se usa «espíritu» en minúscula para πνεῦμα en la primera cláusula y «Espíritu» en la segunda por el cambio de referente contextual.
  - Se traduce δοῦλείας como «esclavitud» para preservar la fuerza de la imagen; no se suaviza a «servidumbre».
  - «Adopción» se mantiene como término jurídico-teológico; el matiz de filiación se expresa con «como hijos» en el texto principal y en la nota.
  - Se mantiene «Abba» sin traducir para conservar la forma aramea transmitida en la tradición apostólica.
