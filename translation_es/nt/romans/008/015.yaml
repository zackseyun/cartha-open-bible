  to: 'Porque no recibieron un espíritu de esclavitud para volver al miedo[a], sino que recibieron el Espíritu de adopción como hijos[b], por quien[c] clamamos: «¡Abba! ¡Padre!»'
  rationale: Se integra «como hijos» dentro de la expresión «Espíritu de adopción como hijos» para reflejar mejor πνεῦμα υἱοθεσίας y la decisión léxica del POB inglés sobre υἱοθεσία. También se corrige la nota b para que conserve una alternativa real y explique el matiz legal-filial, en vez de repetir casi el mismo texto ya presente en la línea principal.
