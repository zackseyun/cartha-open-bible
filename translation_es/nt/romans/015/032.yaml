    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis para un español más natural dentro de la cláusula de propósito y se cambia «descansar» por «ser refrescado» para reflejar mejor la elección principal del inglés POB y el matiz mutual de συναναπαύσωμαι. La nota conserva las alternativas documentadas, incluida la de descanso compartido.
