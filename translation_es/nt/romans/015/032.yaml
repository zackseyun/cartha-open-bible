translation:
  language: es
  text: para que, por la voluntad de Dios, pueda ir a ustedes con alegría y ser refrescado[a] junto con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser mutuamente refrescado con ustedes» o «hallar descanso junto con ustedes». El verbo griego expresa refresco o descanso compartido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce la cláusula de propósito de Pablo. En español, «para que» expresa con naturalidad la finalidad sin añadir matices ajenos.
- source_word: ἐν χαρᾷ
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - alegremente
  - en alegría
  lexicon: BDAG
  rationale: La preposición con sustantivo señala circunstancia acompañante. «Con alegría» conserva el sustantivo y suena natural en español bíblico contemporáneo.
- source_word: ἐλθὼν πρὸς ὑμᾶς
  english_pob_choice: I may come to you
  chosen_spanish: al venir a ustedes
  alternatives_spanish:
  - cuando venga a ustedes
  - para venir a ustedes
  - al llegar a ustedes
  lexicon: BDAG
  rationale: El participio aoristo queda subordinado al propósito; en español resulta más natural integrarlo como una acción de llegada/venida dentro de la finalidad.
- source_word: διὰ θελήματος θεοῦ
  english_pob_choice: by God's will
  chosen_spanish: por voluntad de Dios
  alternatives_spanish:
  - según la voluntad de Dios
  - por la voluntad de Dios
  - bajo la voluntad de Dios
  lexicon: BDAG
  rationale: διά con genitivo expresa medio/causa conforme al querer divino. «Por voluntad de Dios» es fiel y idiomático en español.
- source_word: θεοῦ
  english_pob_choice: God's
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios mismo
  lexicon: BDAG
  rationale: Se mantiene el genitivo posesivo de forma simple y natural en español, sin perder la referencia explícita a Dios.
- source_word: συναναπαύσωμαι
  english_pob_choice: be refreshed together with you
  chosen_spanish: pueda descansar junto con ustedes
  alternatives_spanish:
  - pueda ser refrescado junto con ustedes
  - pueda hallar descanso junto con ustedes
  - pueda ser aliviado junto con ustedes
  lexicon: BDAG
  rationale: El verbo compuesto sugiere descanso/refreshment compartido. En español, «descansar junto con ustedes» preserva la idea de descanso mutuo sin sobrecargar el texto; el matiz de reciprocidad queda explícito en la decisión teológica y la nota.
theological_decisions:
- issue: Mutualidad del descanso o refresco compartido entre Pablo y los creyentes romanos
  english_pob_reading: be refreshed together with you
  chosen_spanish_reading: pueda descansar junto con ustedes
  alternative_spanish_readings:
  - pueda ser refrescado junto con ustedes
  - pueda hallar descanso con ustedes
  rationale: El compuesto συν- en συναναπαύομαι aporta la idea de compartir descanso o alivio. En español, «junto con ustedes» conserva la reciprocidad sin introducir una formulación demasiado técnica o pesada.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto español sigue de cerca el paquete fuente griego y la lectura auditada en inglés. Se conserva la estructura de propósito, la circunstancia de alegría y el matiz de voluntad divina; para συναναπαύσωμαι se opta por una solución española natural que mantiene el componente de descanso compartido señalado en la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa «Dios» de manera explícita, sin sustituirlo por una convención de mayúsculas o un equivalente litúrgico menos transparente.
  - Se mantiene «junto con ustedes» para reflejar la reciprocidad de συνα- en el verbo compuesto.
  - «Con alegría» evita convertir el sustantivo χαρά en un adverbio no atestado por el texto.
  - La colocación «por voluntad de Dios» conserva el valor instrumental/causal de διά con genitivo en un español natural.
