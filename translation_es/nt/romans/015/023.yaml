review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura participial y el sentido general del griego: transición presente («Pero ahora»), cesación («ya no»), referencia a «estas regiones» y duración del anhelo «desde hace muchos años». También preserva adecuadamente la nota sobre τόπον como margen/oportunidad para el ministerio. Sin embargo, «teniendo lugar» suena poco natural en español para τόπον ἔχων, y «ir a ustedes» es menos fiel que «venir a ustedes» desde la perspectiva epistolar y del inglés auditado «come to you».'
  spanish_quality_summary: El texto es comprensible, pero «ya no teniendo lugar» resulta forzado y ambiguo en español actual; puede entenderse como ‘ocurriendo’ más que como ‘tener espacio/margen’. «Viniendo» no cabe; lo natural es «sin tener ya lugar[a]» o mejor «sin tener ya cabida[a]», pero esto último podría alejarse del giro auditado. Además, repetir «pero» tras «Pero ahora» es aceptable, aunque el flujo mejora manteniendo la estructura sin sonar mecánico. «Venir a ustedes» es más idiomático y alineado con el original que «ir a ustedes».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La nota léxica sobre τόπος debe conservar la alternativa «espacio/oportunidad». La decisión principal a ajustar es estilística y de fidelidad semántica: evitar «tener lugar» en el sentido de margen ministerial y preferir una formulación española natural que preserve la amplitud del griego.'
  issues:
  - severity: medium
    issue: «ya no teniendo lugar» para τόπον ἔχων
    rationale: Aunque intenta conservar la metáfora, en español «tener lugar» suele significar ‘ocurrir’, por lo que no comunica con claridad ‘tener espacio/margen/cabida’. Necesita una formulación más natural y fiel al contexto misionero.
  - severity: medium
    issue: «ir a ustedes» para τοῦ ἐλθεῖν πρὸς ὑμᾶς
    rationale: El griego ἐλθεῖν y el inglés auditado «to come to you» se reflejan mejor con «venir a ustedes». «Ir» cambia el punto de referencia y suena menos alineado con la formulación fuente.
  revised_spanish_text: Pero ahora[a], sin tener ya lugar en estas regiones, pero teniendo desde hace muchos años el deseo de venir a ustedes,
  revised_footnotes:
  - marker: a
    text: O «sin tener ya espacio/oportunidad en estas regiones»; la expresión griega puede referirse a no quedar margen para el ministerio allí, no solo a un lugar físico.
    reason: lexical_alternative
  revision_rationale: Se reemplazó «ya no teniendo lugar» por «sin tener ya lugar» para lograr un español más natural sin perder la construcción participial ni el sentido metafórico de τόπον. Se cambió «ir a ustedes» por «venir a ustedes» para alinearse mejor con ἐλθεῖν πρὸς ὑμᾶς y con la auditoría inglesa «to come to you». Se conservó la nota léxica porque sigue siendo necesaria para aclarar que «lugar» puede significar margen u oportunidad ministerial, no solo sitio físico.
