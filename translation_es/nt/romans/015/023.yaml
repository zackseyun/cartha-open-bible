translation:
  language: es
  text: Pero ahora[a], sin tener ya lugar en estas regiones, pero teniendo desde hace muchos años el deseo de venir a ustedes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin tener ya espacio/oportunidad en estas regiones»; la expresión griega puede referirse a no quedar margen para el ministerio allí, no solo a un lugar físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Ahora bien
  - Pero en este momento
  lexicon: BDAG
  rationale: νυνί marca el momento presente, y δέ aporta transición/contraste suave; «Pero ahora» conserva ese giro con español natural y digno.
- source_word: μηκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - no ya
  lexicon: BDAG
  rationale: La negación temporal expresa cesación de una condición previa; «ya no» es el equivalente más natural en español y mantiene el valor temporal de μηκέτι.
- source_word: τόπον ἔχων
  english_pob_choice: having any place
  chosen_spanish: teniendo lugar
  alternatives_spanish:
  - teniendo espacio
  - teniendo oportunidad
  - teniendo lugar/espacio
  lexicon: BDAG
  rationale: 'El giro es idiomático y metafórico: τόπος señala espacio o margen para actuar/ministerio. «Teniendo lugar» permite conservar la imagen sin forzar una literalidad extraña; la alternativa interpretativa «oportunidad» queda implícita pero no se explicita en el texto principal.'
- source_word: ἐν τοῖς κλίμασι τούτοις
  english_pob_choice: in these regions
  chosen_spanish: en estas regiones
  alternatives_spanish:
  - en estas partes
  - en estos distritos
  lexicon: BDAG
  rationale: κλίμασι se refiere a zonas o regiones geográficas; «regiones» es claro y mantiene el marco misionero del pasaje.
- source_word: ἐπιποθίαν ... ἔχων
  english_pob_choice: having had a longing
  chosen_spanish: teniendo desde hace muchos años el deseo
  alternatives_spanish:
  - anhelando desde hace muchos años
  - teniendo un fuerte deseo desde hace muchos años
  - habiendo deseado durante muchos años
  lexicon: BDAG
  rationale: ἐπιποθία denota un anhelo intenso; «deseo» es comprensible en español, y «desde hace muchos años» refleja ἀπὸ ἱκανῶν ἐτῶν con duración acumulada hasta el presente.
- source_word: τοῦ ἐλθεῖν πρὸς ὑμᾶς
  english_pob_choice: to come to you
  chosen_spanish: de ir a ustedes
  alternatives_spanish:
  - de venir a ustedes
  - de ir a verlos
  - de llegar hasta ustedes
  lexicon: BDAG
  rationale: El infinitivo expresa el contenido del deseo; en español, «ir a ustedes» transmite con naturalidad el movimiento hacia los destinatarios sin añadir la idea de visita que el griego no exige de forma explícita.
- source_word: ἀπὸ ⸀ἱκανῶν ἐτῶν
  english_pob_choice: for many years
  chosen_spanish: desde hace muchos años
  alternatives_spanish:
  - por muchos años
  - por bastante tiempo
  - desde hace bastantes años
  lexicon: BDAG
  rationale: Aunque la forma griega es literalmente «desde muchos años», el español idiomático requiere una expresión de duración como «desde hace muchos años».
theological_decisions:
- issue: Relación entre τόπος y la idea de ministerio/oportunidad
  english_pob_reading: The Greek expression can refer to no remaining scope for ministry there, not merely no physical location.
  chosen_spanish_reading: «Ya no teniendo lugar» conserva la metáfora sin reducirla a geografía física.
  alternative_spanish_readings:
  - ya no teniendo oportunidad
  - ya no teniendo campo de ministerio
  - ya no teniendo espacio
  rationale: El texto no habla solo de ubicación física; dejar «lugar» mantiene la amplitud semántica y evita cerrar indebidamente el sentido a una sola lectura.
  doctrine_reference: BDAG; cf. Romanos 15:19-24 contexto misionero
- issue: Matiz contrastivo de δέ en la segunda cláusula
  english_pob_reading: but having had a longing for many years to come to you
  chosen_spanish_reading: pero teniendo desde hace muchos años el deseo de ir a ustedes
  alternative_spanish_readings:
  - y teniendo desde hace muchos años el deseo de ir a ustedes
  rationale: El segundo δέ introduce continuidad con leve contraste; «pero» preserva mejor esa relación que una simple coordinación copulativa.
  doctrine_reference: Sintaxis griega del NT; SBLGNT
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el texto español. Además, se preservó la continuidad contrastiva de δέ con «pero» en la segunda cláusula, en línea con la revisión inglesa más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé»/«Mesías» fuera del versículo porque no aparecen en este pasaje.
  - Se evitó «visitar» para no añadir una matiz no explícito en πρὸς ὑμᾶς.
  - Se conservó un registro formal y publicable, con puntuación española estándar.
