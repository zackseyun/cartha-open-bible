revisions:
- from: Pero ahora[a], ya no teniendo lugar en estas regiones, pero teniendo desde hace muchos años el deseo de ir a ustedes,
  to: Pero ahora[a], sin tener ya lugar en estas regiones, pero teniendo desde hace muchos años el deseo de venir a ustedes,
  rationale: Se reemplazó «ya no teniendo lugar» por «sin tener ya lugar» para lograr un español más natural sin perder la construcción participial ni el sentido metafórico de τόπον. Se cambió «ir a ustedes» por «venir a ustedes» para alinearse mejor con ἐλθεῖν πρὸς ὑμᾶς y con la auditoría inglesa «to come to you». Se conservó la nota léxica porque sigue siendo necesaria para aclarar que «lugar» puede significar margen u oportunidad ministerial, no solo sitio físico.
