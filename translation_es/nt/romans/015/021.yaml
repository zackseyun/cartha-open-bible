translation:
  language: es
  text: 'pero, como está escrito: «A quienes no se les anunció acerca de él verán[a][b], y los que no han oído entenderán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Isaías 52:15 es la cita de fondo. En Isaías, el pronombre se refiere al siervo; Pablo aplica la cita a su proclamación del evangelio.
    reason: cross_reference
  - marker: b
    text: 'O: «Los que no oyeron anuncio concerniente a él… los que no han oído entenderán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - sin embargo
  lexicon: BDAG
  rationale: Marca contraste directo con la afirmación anterior. En español, "pero" es la adversativa natural y clara aquí.
- source_word: καθὼς γέγραπται
  english_pob_choice: as it is written
  chosen_spanish: como está escrito
  alternatives_spanish:
  - justo como está escrito
  - según está escrito
  lexicon: BDAG
  rationale: La fórmula citacional se expresa de manera idiomática en español con "como está escrito", manteniendo el valor de cita autorizada sin calco innecesario.
- source_word: Οἷς
  english_pob_choice: Those who
  chosen_spanish: Los que
  alternatives_spanish:
  - A quienes
  - Aquellos a quienes
  lexicon: BDAG
  rationale: El dativo relativo se vuelve una construcción natural en español. "Los que" conserva el referente personal y evita la rigidez de una traducción más literal.
- source_word: οὐκ ἀνηγγέλη
  english_pob_choice: were not told
  chosen_spanish: no fueron anunciados
  alternatives_spanish:
  - no se les anunció
  - no fueron informados
  lexicon: BDAG
  rationale: ἀναγγέλλω tiene el sentido de anunciar/reportar/decir. En español, la pasiva "no fueron anunciados" reproduce bien la fuerza de anuncio sin añadir un sujeto implícito demasiado explícito. Se conserva la ambigüedad útil entre anuncio y comunicación personal.
- source_word: περὶ αὐτοῦ
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - con respecto a él
  - sobre él
  lexicon: BDAG
  rationale: La preposición περί con genitivo expresa referencia. "Acerca de él" es sobrio y fiel, y mantiene el pronombre personal sin expandirlo en el texto principal.
- source_word: ὄψονται
  english_pob_choice: will see
  chosen_spanish: verán
  alternatives_spanish:
  - verán con sus ojos
  - percibirán
  lexicon: BDAG
  rationale: El futuro de ὁράω se traduce de manera directa con "verán". La literalidad aquí es apropiada porque la cláusula paralela ya introduce el entendimiento cognitivo.
- source_word: οἳ οὐκ ἀκηκόασιν
  english_pob_choice: those who have not heard
  chosen_spanish: los que no han oído
  alternatives_spanish:
  - los que no han escuchado
  - los que no habían oído
  lexicon: BDAG
  rationale: El perfecto de ἀκούω señala una condición resultante. "No han oído" preserva ese estado vigente en español y corresponde a la lectura inglesa auditada.
- source_word: συνήσουσιν
  english_pob_choice: will understand
  chosen_spanish: entenderán
  alternatives_spanish:
  - comprenderán
  - captarán
  lexicon: BDAG
  rationale: συνίημι significa entender/comprender. "Entenderán" es claro, natural y mantiene el paralelo profético con "verán".
theological_decisions:
- issue: Referente de "él" en la cita de Isaías
  english_pob_reading: Retain the pronoun 'him' without expanding it to 'the Messiah' or 'Christ.'
  chosen_spanish_reading: Conservar "él" sin expandirlo a "el Mesías" ni a "Cristo" en el cuerpo del versículo.
  alternative_spanish_readings:
  - acerca del Mesías
  - acerca de Cristo
  rationale: El griego usa el pronombre αὐτοῦ, y la cita conserva la textura del texto de Isaías. Expandir el referente en el texto principal introduciría interpretación que no está formulada explícitamente en la cita. La identificación mesiánica puede anotarse, pero no debe sustituir el pronombre del pasaje.
  doctrine_reference: Principio de primacía del texto fuente; no introducir en la traducción principal una aclaración interpretativa que el verso no enuncia.
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego de Romanos 15:21 y el auditorial inglés sin cambios de revisión relevantes; se mantiene la cita breve, el contraste adversativo y el pronombre no expandido para respetar el texto base.
  spanish_consistency_notes:
  - Se usa "acerca de él" para περί αὐτοῦ, manteniendo consistencia con el uso POB de referencias personales no ampliadas.
  - '"Verán" y "entenderán" conservan el paralelo verbal del original sin agregar interpretación.'
  - La nota a identifica el trasfondo de Isaías 52:15 sin alterar el texto principal.
