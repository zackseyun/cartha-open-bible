review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura de cita, el contraste inicial, el pronombre "él" y el paralelismo "verán / entenderán". Sin embargo, falla en un punto importante de alineación con el griego y con la auditoría inglesa: οὐκ ἀνηγγέλη con sujeto personal no significa que las personas "fueron anunciadas", sino que "no se les anunció / no les fue anunciado" algo acerca de él. La alternativa de la nota b ya refleja mejor esa sintaxis que el texto principal.'
  spanish_quality_summary: 'El texto es mayormente claro y de registro adecuado, pero "Los que no fueron anunciados acerca de él" suena antinatural y semánticamente equívoco en español, como si las personas mismas fueran el contenido anunciado. La reparación mínima produce una lectura natural y fiel: "A quienes no se les anunció acerca de él".'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se preserva correctamente el pronombre "él" sin expandirlo a "Mesías/Cristo", en línea con la decisión teológica auditada. "como está escrito", "verán" y "entenderán" están bien. El ajuste necesario es sintáctico-lexical en ἀνηγγέλη.
  issues:
  - severity: high
    issue: '"no fueron anunciados" traduce erróneamente οὐκ ἀνηγγέλη'
    rationale: En griego, el verbo pasivo expresa que no se anunció algo a ciertas personas acerca de él; el borrador español hace que "los que" sean aquello que fue anunciado. Esto altera el sentido básico de la cláusula y contradice la rationale auditada de "were not told".
  - severity: medium
    issue: La construcción actual es poco natural en español
    rationale: '"Los que no fueron anunciados acerca de él" no suena idiomático y genera confusión referencial. La reestructuración con dativo expreso "A quienes no se les anunció..." suena natural y conserva mejor la función de Οἷς.'
  - severity: low
    issue: La nota alternativa duplica una mejora necesaria del texto principal
    rationale: La formulación de la nota b representa la mejor traducción principal. Tras corregir el texto, conviene mover la alternativa hacia una opción más literal con "fue anunciado"/"concerniente a él" para que la nota siga aportando valor.
  revised_spanish_text: 'pero, como está escrito: «A quienes no se les anunció acerca de él verán[a][b], y los que no han oído entenderán».'
  revised_footnotes:
  - marker: a
    text: Isaías 52:15 es la cita de fondo. En Isaías, el pronombre se refiere al siervo; Pablo aplica la cita a su proclamación del evangelio.
    reason: cross_reference
  - marker: b
    text: 'O: «Los que no oyeron anuncio concerniente a él… los que no han oído entenderán».'
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula inicial para reflejar fielmente que a esas personas no se les anunció nada acerca de él, en vez de decir incorrectamente que ellas mismas fueron anunciadas. Se mantiene el pronombre "él", el paralelismo profético y el tono de cita escritural. La nota alternativa se ajusta para seguir siendo verdaderamente alternativa tras la corrección del texto principal.
