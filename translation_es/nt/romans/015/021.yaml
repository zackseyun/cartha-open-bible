revisions:
- from: 'pero, como está escrito: «Los que no fueron anunciados acerca de él verán[a][b], y los que no han oído entenderán».'
  to: 'pero, como está escrito: «A quienes no se les anunció acerca de él verán[a][b], y los que no han oído entenderán».'
  rationale: Se corrige la cláusula inicial para reflejar fielmente que a esas personas no se les anunció nada acerca de él, en vez de decir incorrectamente que ellas mismas fueron anunciadas. Se mantiene el pronombre "él", el paralelismo profético y el tono de cita escritural. La nota alternativa se ajusta para seguir siendo verdaderamente alternativa tras la corrección del texto principal.
