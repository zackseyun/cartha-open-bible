translation:
  language: es
  text: Por tanto, tengo motivo para gloriarme[a] en Mesías Jesús[b] en lo que se refiere a Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «razón para gloriarme» o «fundamento para gloriarme».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «en Cristo Jesús»; se vierte «en Mesías Jesús» porque aquí Χριστός funciona como título.'
    reason: alternative_reading
  - marker: c
    text: O «en las cosas concernientes a Dios» o «en los asuntos relacionados con Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχω
  english_pob_choice: I have
  chosen_spanish: tengo
  alternatives_spanish:
  - poseo
  - mantengo
  lexicon: BDAG
  rationale: El presente indicativo primera persona singular se expresa de forma directa con «tengo». En español conserva la afirmación personal inmediata de Pablo sin sobrecargar el verbo.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca una conclusión lógica respecto del contexto previo. «Por tanto» mantiene el valor inferencial con registro digno y natural en español.
- source_word: καύχησιν
  english_pob_choice: reason for boasting
  chosen_spanish: razón para gloriarme
  alternatives_spanish:
  - motivo de gloriarme
  - fundamento para gloriarme
  - boast
  lexicon: BDAG
  rationale: La revisión inglesa añadió «reason for» para reflejar el valor idiomático. En español, «razón para gloriarme» preserva esa fuerza y evita convertir el sustantivo en una afirmación de orgullo autónomo. «Gloriarme» mantiene el vínculo léxico con el campo de καύχησις.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  - por Mesías Jesús
  lexicon: BDAG
  rationale: Se conserva «en» para la esfera o unión indicada por ἐν. Siguiendo la directriz del proyecto y el valor titulado de Χριστός aquí, se traduce «Mesías» en lugar de «Cristo». La secuencia nominal se mantiene pegada al nombre propio para reflejar el original.
- source_word: τὰ πρὸς τὸν θεόν
  english_pob_choice: the things pertaining to God
  chosen_spanish: en las cosas que tienen que ver con Dios
  alternatives_spanish:
  - en las cosas concernientes a Dios
  - en los asuntos relacionados con Dios
  - en las cosas pertenecientes a Dios
  lexicon: BDAG
  rationale: La expresión idiomática griega abarca asuntos relacionados con Dios y no debe restringirse innecesariamente. «Que tienen que ver con Dios» es una formulación natural en español que preserva amplitud semántica y evita forzar un matiz exclusivamente cultual.
- source_word: θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Traducción estándar de θεός en este contexto. Se mantiene el referente divino sin añadir determinación innecesaria.
theological_decisions:
- issue: Renderización de Χριστός como título
  english_pob_reading: Greek 'in Christ Jesus'; rendered 'in Messiah Jesus' because Χριστός is a title here.
  chosen_spanish_reading: «Mesías Jesús» como título activo, no como forma litúrgica fija
  alternative_spanish_readings:
  - «Cristo Jesús»
  - «Jesucristo»
  rationale: El texto fuente presenta Χριστός con fuerza titulativa. Traducirlo como «Mesías» conserva el valor semántico del título y sigue la pauta del proyecto de traducir títulos en vez de transliterarlos cuando el contexto lo permite.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sentido de καύχησις y la tensión entre gloriarse y orgullo
  english_pob_reading: Paul claims legitimate boasting only in union with Messiah Jesus regarding his God-directed ministry
  chosen_spanish_reading: Pablo afirma una razón legítima para gloriarse, delimitada por su unión con Mesías Jesús y por su servicio orientado a Dios
  alternative_spanish_readings:
  - Pablo expresa solo satisfacción personal
  - Pablo se atribuye orgullo propio
  rationale: La frase no presenta una autoexaltación independiente, sino un motivo de gloriarse circunscrito por el marco cristológico y teológico inmediato. «Gloriarme» conserva la tensión léxica sin diluirla en mera alegría interior ni resolverla en orgullo humano.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del archivo inglés, que añadió explícitamente «reason for» para reflejar mejor el valor idiomático de καύχησιν. También conserva la decisión auditada de traducir Χριστός como «Mesías» en este contexto y de mantener la amplitud de τὰ πρὸς τὸν θεόν sin restringirla a servicio cultual.
  spanish_consistency_notes:
  - Se usó «Por tanto» para οὖν, coherente con una inferencia lógica.
  - Se evitó «SEÑOR» u otras máscaras para el nombre divino porque θεός aquí es simplemente «Dios».
  - Se mantuvo el patrón «en Mesías Jesús» para seguir la decisión titulativa documentada.
  - «Gloriarme» conserva el campo semántico de καύχησις sin introducir un tono excesivamente devocional ni moralizante.
