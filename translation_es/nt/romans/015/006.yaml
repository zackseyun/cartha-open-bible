    changes_summary: 'Replaced ''together'' with ''with one accord'' to reflect ὁμοθυμαδόν more precisely, retained ''with one mouth'' for ἐν ἑνὶ στόματι, and changed ''Jesus the Messiah'' to ''Jesus Christ'' for direct consistency with Ἰησοῦ Χριστοῦ in this verse. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: para que, con un mismo sentir y con una sola boca[a], glorifiquen al Dios y Padre de nuestro Señor Jesús Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «con una sola voz». El griego dice «con una sola boca», enfatizando la imagen de una alabanza unificada.
    reason: lexical_alternative
  - marker: b
    text: «Mesías» traduce el título griego Χριστός. La forma tradicional «Cristo» también es posible, pero aquí se privilegia el sentido del título.
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Expresa con naturalidad en español el valor final de ἵνα sin perder el sentido de propósito resultado que depende de la exhortación anterior.
- source_word: ὁμοθυμαδόν
  english_pob_choice: with one accord
  chosen_spanish: con un mismo sentir
  alternatives_spanish:
  - con una sola mente
  - con una sola alma
  lexicon: BDAG
  rationale: La idea central es unidad de disposición y propósito común. 'Con un mismo sentir' comunica bien esa unidad en español sin repetir de manera rígida la imagen vocal ya presente en la frase siguiente.
- source_word: ἐν ἑνὶ στόματι
  english_pob_choice: with one mouth
  chosen_spanish: con una sola voz
  alternatives_spanish:
  - con una sola boca
  - de común voz
  lexicon: BDAG
  rationale: En español, 'una sola voz' es la equivalencia idiomática más clara para la metáfora corporal del griego. Mantiene el sentido de alabanza unificada y naturaliza la imagen sin borrarla del todo.
- source_word: δοξάζητε
  english_pob_choice: you may glorify
  chosen_spanish: glorifiquen
  alternatives_spanish:
  - den gloria
  - alaben
  lexicon: BDAG
  rationale: '''Glorifiquen'' preserva el registro doxológico y la fuerza verbal de δοξάζω mejor que una paráfrasis más débil.'
- source_word: τὸν θεὸν καὶ πατέρα
  english_pob_choice: the God and Father
  chosen_spanish: al Dios y Padre
  alternatives_spanish:
  - al Dios, el Padre
  - al Dios y al Padre
  lexicon: BDAG
  rationale: El artículo único en griego une ambas designaciones; en español, 'al Dios y Padre' conserva la apposición estrecha sin sobredesarrollarla.
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: of our Lord
  chosen_spanish: de nuestro Señor
  alternatives_spanish:
  - de nuestro Dueño
  lexicon: BDAG
  rationale: '''Señor'' es el equivalente doctrinal y contextual estándar para κύριος en esta fórmula cristológica.'
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se conserva 'Mesías' para Χριστός conforme al principio del proyecto de traducir el título, no transliterarlo, cuando funciona de manera titular. En esta doxología la referencia es a la identidad mesiánica de Jesús.
theological_decisions:
- issue: Cómo renderizar Χριστοῦ en la fórmula nominal Ἰησοῦ Χριστοῦ
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: Se sigue la política del proyecto de traducir Χριστός como 'Mesías' cuando está funcionando como título. En este versículo no hay una necesidad idiomática fuerte de mantener 'Cristo', y 'Mesías' preserva el contenido semántico del original.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested terms for Χριστός'
- issue: Relación entre ὁμοθυμαδόν y ἐν ἑνὶ στόματι
  english_pob_reading: with one accord and with one mouth
  chosen_spanish_reading: con un mismo sentir y con una sola voz
  alternative_spanish_readings:
  - con unánime sentir y con una sola boca
  - con un mismo impulso y con una sola voz
  rationale: La primera expresión apunta a unidad interior; la segunda, a la expresión pública unificada de alabanza. En español, 'sentir' y 'voz' comunican esas dos capas con claridad y sin rusticidad.
  doctrine_reference: BDAG on ὁμοθυμαδόν; the source metaphor in ἐν ἑνὶ στόματι
translation_notes:
  revision_awareness: El audit trail inglés mostró una oscilación entre 'Jesus Messiah' y 'Jesus Christ' por la tensión entre política terminológica y consistencia de forma nominal. Para el español, se mantuvo la política base del proyecto ('Mesías') y se resolvió la metáfora de στόματι con la equivalencia idiomática 'una sola voz', marcada en nota para no perder la imagen fuente.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός y 'Señor' para κύριος, manteniendo la fórmula paulina estándar.
  - '''Mesías'' se reserva para Χριστός cuando funciona como título; no se usa ''Cristo'' en el texto principal.'
  - '''con un mismo sentir'' y ''con una sola voz'' separan adecuadamente unidad interior y expresión pública.'
  - La puntuación sigue el español moderno con una cláusula final introducida por 'para que'.
