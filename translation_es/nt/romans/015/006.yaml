  text: ἵνα ὁμοθυμαδὸν ἐν ἑνὶ στόματι δοξάζητε τὸν θεὸν καὶ πατέρα τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/015/006.yaml
  text: so that with one accord and with one mouth you may glorify the God and Father of our Lord Jesus Messiah[a][b].
