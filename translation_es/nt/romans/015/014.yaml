translation:
  language: es
  text: Y yo mismo estoy convencido acerca de ustedes, hermanos míos[a], de que ustedes mismos también están llenos de bondad, colmados de todo conocimiento, y son capaces también de instruirse unos a otros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» traduce el griego adelphoi, que puede dirigirse a los creyentes como grupo, incluyendo a mujeres y varones.
    reason: lexical_alternative
  - marker: b
    text: O «amonestarse unos a otros» o «advertirse unos a otros».
    reason: lexical_alternative
lexical_decisions:
- source_word: Πέπεισμαι
  english_pob_choice: I am convinced
  chosen_spanish: estoy convencido
  alternatives_spanish:
  - estoy persuadido
  lexicon: BDAG
  rationale: El perfecto con sentido de estado presente pide en español una expresión de convicción ya asentada; «estoy convencido» transmite bien esa seguridad personal de Pablo.
- source_word: δέ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ introduce una transición suave, no una oposición fuerte; «Y» mantiene el flujo natural en español.
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: hermanos míos
  alternatives_spanish:
  - hermanos y hermanas míos
  - hermanos
  lexicon: BDAG
  rationale: Se conserva el vocativo masculino plural como forma de dirección fraterna colectiva. En español, «hermanos míos» es natural y fiel; la posible inclusividad del grupo se explica en nota.
- source_word: καὶ αὐτὸς ἐγὼ
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo también
  - yo mismo también
  lexicon: BDAG
  rationale: La secuencia es enfática; «yo mismo» reproduce la insistencia personal de Pablo sin recargar la frase.
- source_word: περὶ ὑμῶν
  english_pob_choice: about you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - acerca de ustedes
  - respecto de ustedes
  lexicon: BDAG
  rationale: En español, con πείθομαι resulta más natural «estar convencido de» que «acerca de»; se preserva el vínculo semántico con περί y el genitivo.
- source_word: καὶ αὐτοὶ
  english_pob_choice: you yourselves also
  chosen_spanish: ustedes mismos también
  alternatives_spanish:
  - ustedes también
  - ustedes mismos
  lexicon: BDAG
  rationale: Se mantienen tanto el valor enfático de αὐτοί como el añadido de καί, con una formulación idiomática en español.
- source_word: μεστοί ἐστε ἀγαθωσύνης
  english_pob_choice: are full of goodness
  chosen_spanish: están llenos de bondad
  alternatives_spanish:
  - están llenos de bondad moral
  - están llenos de bien
  lexicon: BDAG
  rationale: μεστός con genitivo se rinde naturalmente como «llenos de»; ἀγαθωσύνη se expresa mejor aquí como «bondad», término claro y moralmente adecuado en español.
- source_word: πεπληρωμένοι πάσης γνώσεως
  english_pob_choice: filled with all knowledge
  chosen_spanish: llenos de todo conocimiento
  alternatives_spanish:
  - colmados de todo conocimiento
  - llenos de toda clase de conocimiento
  lexicon: BDAG
  rationale: El participio perfecto describe un estado resultante; «llenos de todo conocimiento» sigue de cerca el griego y conserva el alcance de πάσης γνώσεως.
- source_word: δυνάμενοι
  english_pob_choice: able
  chosen_spanish: capaces
  alternatives_spanish:
  - aptos
  - en condiciones de
  lexicon: BDAG
  rationale: «Capaces» expresa de manera natural la aptitud que brota de las cualidades previas, sin perder el matiz de potencialidad del participio.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - mutuamente
  lexicon: BDAG
  rationale: Es el equivalente recíproco más claro y común en español para el intercambio mutuo entre miembros de la comunidad.
- source_word: νουθετεῖν
  english_pob_choice: to instruct
  chosen_spanish: amonestarse
  alternatives_spanish:
  - instruirse
  - exhortarse
  - advertirse
  lexicon: BDAG
  rationale: νουθετέω combina instrucción correctiva y advertencia. En este contexto de elogio, «amonestarse» mantiene la fuerza correctiva sin reducirlo a mera enseñanza; la reciprocidad se refleja con «unos a otros».
theological_decisions:
- issue: Alcance de ἀδελφοί en una congregación mixta
  english_pob_reading: my brothers
  chosen_spanish_reading: hermanos míos
  alternative_spanish_readings:
  - hermanos y hermanas míos
  - hermanos y hermanas
  rationale: Se conserva la forma masculina plural del original como vocativo colectivo. Dado que la audiencia de Romanos es la comunidad creyente en general, se aclara en nota la inclusión de mujeres sin reemplazar la forma fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de νουθετεῖν en un contexto elogioso
  english_pob_reading: instruct one another
  chosen_spanish_reading: amonestarse unos a otros
  alternative_spanish_readings:
  - instruirse unos a otros
  - exhortarse unos a otros
  - advertirse unos a otros
  rationale: El verbo puede abarcar instrucción correctiva, amonestación o advertencia. En este versículo, Pablo elogia la madurez de los destinatarios, así que «amonestarse» conserva el componente correctivo sin desdibujar la amplitud léxica; la nota ofrece alternativas legítimas.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran acuerdo alto y no registran revisiones aplicadas; la presente redacción sigue esa lectura estable, trasladando al español las mismas decisiones léxicas y el mismo equilibrio entre claridad y cercanía al griego.
  spanish_consistency_notes:
  - Se mantiene «Y» para δέ como transición suave, coherente con el valor discursivo de la cláusula.
  - «Estar convencido de» se usa como equivalente idiomático de πείθομαι/perí + genitivo.
  - Se conserva el paralelismo de dos participios adjetivales con «llenos de... / llenos de...».
  - La nota sobre «hermanos» preserva la decisión gender-accurate sin alterar el texto principal.
  - «Amonestarse unos a otros» conserva la reciprocidad y la fuerza correctiva de νουθετεῖν.
