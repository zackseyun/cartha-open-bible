translation:
  language: es
  text: Cada uno de nosotros agrade a su prójimo para su bien[a], para edificarlo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para bien» o «para lo que es bueno». La frase griega enfatiza lo que beneficia, no la mera complacencia.
    reason: lexical_alternative
  - marker: b
    text: O «para edificación». El griego literalmente habla de «construir/edificar», usado aquí en sentido metafórico para fortalecer a la otra persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος ἡμῶν
  english_pob_choice: each of us
  chosen_spanish: cada uno de nosotros
  alternatives_spanish:
  - todos nosotros
  - cada uno
  lexicon: BDAG
  rationale: El distributivo singular pide una formulación individual dentro del grupo. «Cada uno de nosotros» conserva ese valor y suena natural en español, sin borrar el sentido colectivo.
- source_word: τῷ πλησίον
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su semejante
  - el prójimo
  lexicon: BDAG
  rationale: En este contexto ético, πλησίον significa el otro cercano, el semejante o prójimo. «Prójimo» es el equivalente más claro en español bíblico para esa relación moral, y evita restringirlo a un vecino geográfico.
- source_word: ἀρεσκέτω
  english_pob_choice: let ... please
  chosen_spanish: agrade
  alternatives_spanish:
  - procure agradar
  - busque agradar
  - plazca
  lexicon: BDAG
  rationale: El imperativo presente de tercera persona expresa exhortación. «Agrade» conserva la idea de agradar sin convertirla en simple cortesía ni suavizar la fuerza exhortativa.
- source_word: εἰς τὸ ἀγαθὸν
  english_pob_choice: for his good
  chosen_spanish: para su bien
  alternatives_spanish:
  - para lo bueno
  - para lo que es bueno
  - para su beneficio
  lexicon: BDAG
  rationale: La frase marca finalidad y beneficio, no mera complacencia. «Para su bien» expresa con naturalidad ese sentido de utilidad benéfica, manteniendo la restricción ética del mandato.
- source_word: πρὸς οἰκοδομήν
  english_pob_choice: for building him up
  chosen_spanish: para edificación
  alternatives_spanish:
  - para edificarlo
  - para su edificación
  - para construcción
  lexicon: BDAG
  rationale: οἰκοδομή es metafórico y alude a fortalecer/edificar espiritualmente. «Edificación» conserva el trasfondo metafórico con registro bíblico claro en español; la alternativa más literal «edificarlo» se omite por sonar menos nominal y menos estable en un enunciado de propósito.
theological_decisions:
- issue: El alcance moral de agradar al prójimo
  english_pob_reading: The command is qualified by the neighbor's good and edification, not by people-pleasing as an absolute value.
  chosen_spanish_reading: El mandato queda limitado por «para su bien» y «para edificación», de modo que no autoriza el complacerse sin discernimiento.
  alternative_spanish_readings:
  - Agradar al prójimo sin más, como ideal general de armonía
  - Buscar principalmente la aprobación ajena
  rationale: La doble cláusula final impide leer ἀρεσκέτω como una ética de aprobación humana en abstracto. La traducción mantiene ambas finalidades explícitas para preservar esa restricción semántica y teológica.
  doctrine_reference: Romanos 15:2; principio de la edificación del otro en la ética cristiana paulina.
translation_notes:
  revision_awareness: Coincide con el pasaje griego y con el audit trail inglés de alta concordancia. Se conserva la doble restricción final del verbo principal y se evita diluir οἰκοδομή en una paráfrasis demasiado explicativa.
  spanish_consistency_notes:
  - Se usa «prójimo» para πλησίον por su valor ético-bíblico en español.
  - Se mantiene «edificación» para οἰκοδομή, coherente con el léxico bíblico tradicional pero sin perder el sentido metafórico de fortalecimiento.
  - No se introduce «Cristo», «Señor» ni otra terminología no presente en el versículo.
  - La puntuación separa claramente las dos finalidades del mandato, como en el griego.
