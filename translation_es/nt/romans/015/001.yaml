translation:
  language: es
  text: Ahora bien, nosotros, los fuertes, debemos sobrellevar las debilidades de los débiles[a], y no agradarnos a nosotros mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las fallas de los débiles». El término griego puede denotar debilidades, limitaciones o fallas; aquí probablemente se refiere a los escrúpulos o limitaciones de conciencia tratados en el capítulo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὀφείλομεν
  english_pob_choice: ought
  chosen_spanish: debemos
  alternatives_spanish:
  - estamos obligados a
  - hemos de
  lexicon: BDAG
  rationale: El griego expresa una obligación moral; en español, «debemos» comunica esa obligación con naturalidad y sin sonar más tajante que el indicativo exhortativo del original.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Así que
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí funciona mejor como transición inferencial desde el contexto previo, sin fuerza adversativa fuerte. «Así que» refleja esa continuidad argumentativa en español.
- source_word: ἡμεῖς οἱ δυνατοὶ
  english_pob_choice: we who are strong
  chosen_spanish: nosotros, los fuertes
  alternatives_spanish:
  - nosotros que somos fuertes
  - nosotros, los que somos fuertes
  lexicon: BDAG
  rationale: La construcción sustantivada se vuelve natural en español con «los fuertes». Mantiene el énfasis del pronombre y el contraste colectivo con «los débiles».
- source_word: τὰ ἀσθενήματα
  english_pob_choice: the weaknesses
  chosen_spanish: las debilidades
  alternatives_spanish:
  - las flaquezas
  - las limitaciones
  lexicon: BDAG
  rationale: «Debilidades» conserva el sentido amplio del término sin moralizarlo como «fallas»; también deja abierto el matiz de limitaciones o escrúpulos de conciencia que indica el contexto.
- source_word: τῶν ἀδυνάτων
  english_pob_choice: of the weak
  chosen_spanish: de los débiles
  alternatives_spanish:
  - de los que son débiles
  - de los flacos
  lexicon: BDAG
  rationale: Se conserva el contraste fuerte/débil del pasaje con una expresión idiomática y clara en español. «Los débiles» reproduce el valor sustantivado del adjetivo.
- source_word: βαστάζειν
  english_pob_choice: to bear
  chosen_spanish: soportar
  alternatives_spanish:
  - llevar
  - cargar con
  lexicon: BDAG
  rationale: «Soportar» transmite la idea de cargar y sostener algo oneroso en español bíblico contemporáneo. Aunque «llevar» sería literal, puede sonar demasiado neutro; «soportar» mantiene el peso ético del mandato.
- source_word: ἑαυτοῖς ἀρέσκειν
  english_pob_choice: please ourselves
  chosen_spanish: agradarnos a nosotros mismos
  alternatives_spanish:
  - buscar agradarnos a nosotros mismos
  - complacernos a nosotros mismos
  lexicon: BDAG
  rationale: La forma reflexiva preserva la intención del griego y su contraste ético con cargar a otros. «Agradarnos» comunica bien la búsqueda de autopreferencia sin añadir una interpretación más fuerte que el texto.
theological_decisions:
- issue: Sentido de «los fuertes» y «los débiles»
  english_pob_reading: Se refiere principalmente a creyentes con distinta libertad o fortaleza de conciencia dentro del contexto de Romanos 14–15, no a fuerza física ni a poder social.
  chosen_spanish_reading: Se entiende principalmente como creyentes con distinta fortaleza o libertad de conciencia en el contexto de Romanos 14–15, no como fuerza física ni poder social.
  alternative_spanish_readings:
  - creyentes socialmente poderosos frente a débiles
  - personas físicamente fuertes frente a débiles
  rationale: El entorno literario trata disputas sobre comida y días; por eso la oposición fuerte/débil debe leerse como una diferencia ética y de conciencia. La traducción mantiene el contraste sin ampliarlo a otros campos semánticos.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de τὰ ἀσθενήματα
  english_pob_reading: The Greek term can denote weaknesses, limitations, or failings; here it likely refers to the scruples or limitations of conscience discussed in the previous chapter.
  chosen_spanish_reading: El término puede denotar debilidades, limitaciones o fallas; aquí probablemente se refiere a escrúpulos o limitaciones de conciencia del capítulo previo.
  alternative_spanish_readings:
  - fallas morales de los débiles
  - enfermedades o dolencias físicas
  rationale: La nota en inglés preserva la amplitud semántica del término y evita reducirlo a pecado o enfermedad. En español se conserva esa tensión, con una formulación que apunta al contexto de conciencia sin cerrar otras posibilidades léxicas.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio. Esta redacción sigue de cerca la lectura inglesa aprobada, pero ajusta el castellano para una fluidez natural y conserva la ambigüedad lexical documentada en τὰ ἀσθενήματα mediante una nota.
  spanish_consistency_notes:
  - Se mantiene «los fuertes / los débiles» para conservar el contraste técnico del pasaje en Romanos 14–15.
  - Se usa «debemos» para la obligación moral sin intensificarla indebidamente.
  - «Agradarnos a nosotros mismos» conserva el sentido reflexivo de ἑαυτοῖς ἀρέσκειν.
  - La nota lexical evita traducir τὰ ἀσθενήματα como «pecados», porque el contexto no exige ese estrechamiento.
