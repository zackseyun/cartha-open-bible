  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: obligación moral, contraste entre fuertes y débiles en el contexto de conciencia, y la prohibición de complacerse a sí mismos. Sin embargo, «Así que» introduce un matiz inferencial más fuerte que el simple δὲ transicional, y «soportar» en español puede inclinarse hacia mera tolerancia pasiva más que hacia cargar con las debilidades ajenas, mientras que βαστάζειν conserva mejor la imagen de llevar una carga.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para mayor naturalidad y precisión semántica. «Ahora bien» funciona mejor como transición suave. «Sobrellevar» o «cargar con» expresa mejor el sentido metafórico de llevar las debilidades sin sonar tosco. El resto de la frase es legible y apropiado para un registro eclesial amplio.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Los fuertes / los débiles» respeta la decisión contextual. La nota léxica sobre ἀσθενήματα está bien conservada. La revisión propuesta se centra en matiz discursivo y fuerza verbal de βαστάζειν.
  issues:
  - severity: medium
    issue: «Así que» para δὲ
    rationale: δὲ aquí marca una transición suave desde el argumento anterior, no una inferencia tan marcada como «Así que». «Ahora bien» o «Pero» sería más fiel; «Ahora bien» además suena natural en español bíblico contemporáneo.
  - severity: medium
    issue: «soportar» para βαστάζειν
    rationale: Aunque posible, «soportar» puede sugerir simplemente tolerar a personas molestas. El griego apunta a llevar/cargar con las debilidades del otro. «sobrellevar» preserva mejor la idea de cargar con una limitación ajena en este contexto.
  revised_spanish_text: Ahora bien, nosotros, los fuertes, debemos sobrellevar las debilidades de los débiles[a], y no agradarnos a nosotros mismos.
