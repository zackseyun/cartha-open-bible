translation:
  language: es
  text: Y sé que, cuando vaya a ustedes, iré con la plenitud de la bendición del Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «de Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: Y sé
  alternatives_spanish:
  - Y estoy seguro
  - Y tengo la certeza
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento/certidumbre. «Sé» mantiene la afirmación segura de Pablo con un español natural y sobrio.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector leve. «Y» reproduce el avance discursivo sin imponer contraste.
- source_word: ἐρχόμενος πρὸς ὑμᾶς
  english_pob_choice: when I come to you
  chosen_spanish: cuando vaya a ustedes
  alternatives_spanish:
  - al ir a ustedes
  - cuando venga a ustedes
  lexicon: BDAG
  rationale: El participio con πρὸς ὑμᾶς tiene sentido temporal respecto al futuro. «Cuando vaya a ustedes» es idiomático en español y conserva la relación temporal.
- source_word: ἐλεύσομαι
  english_pob_choice: I will come
  chosen_spanish: iré
  alternatives_spanish:
  - vendré
  - llegaré
  lexicon: BDAG
  rationale: El futuro de ἔρχομαι se expresa de forma directa. «Iré» mantiene la idea de desplazamiento con un giro natural; en contexto pastoral puede equivaler a «vendré», pero aquí «iré» sigue el movimiento desde el hablante.
- source_word: ἐν πληρώματι
  english_pob_choice: in the fullness
  chosen_spanish: con la plenitud
  alternatives_spanish:
  - en la plenitud
  - en pleno
  lexicon: BDAG
  rationale: ἐν con dativo puede indicar circunstancia o manera. En español, «con la plenitud» transmite mejor el carácter acompañante y evita una rigidez poco natural; «plenitud» conserva la metáfora de abundancia/completitud de πλήρωμα.
- source_word: εὐλογίας
  english_pob_choice: of the blessing
  chosen_spanish: de la bendición
  alternatives_spanish:
  - de bendición
  lexicon: BDAG
  rationale: El genitivo describe la plenitud como caracterizada por bendición. «La bendición» suena más fluido y conserva el matiz de contenido/atribución.
- source_word: Χριστοῦ
  english_pob_choice: of Messiah
  chosen_spanish: de Cristo
  alternatives_spanish:
  - del Mesías
  lexicon: BDAG
  rationale: Aunque el proyecto suele usar «Mesías» para Χριστός como título, el contexto español aquí admite con naturalidad «Cristo» sin pérdida de sentido. Dado el historial auditado en inglés y la forma fija del nombre/título en este versículo, «de Cristo» mantiene el registro eclesial claro y directo.
theological_decisions:
- issue: 'Χριστοῦ: título mesiánico vs. forma nominal fija'
  english_pob_reading: the Messiah / Christ (revision history alternated, restored to Messiah in audit trail)
  chosen_spanish_reading: Cristo
  alternative_spanish_readings:
  - Mesías
  rationale: El griego Χριστοῦ puede funcionar como título y como forma ya lexicalizada. En español, «Cristo» es la forma más estable y reconocible en este contexto litúrgico/epistolar, y no oscurece el sentido mesiánico. Se preserva la posibilidad semántica de «Mesías» en la nota textual.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested-term handling for Χριστός'
translation_notes:
  revision_awareness: El inglés auditado pasó por una oscilación entre «Messiah» y «Christ» para Χριστοῦ, con restauración final de «Messiah» en la revisión de regresión. Para el español, se optó por «Cristo» por naturalidad y consistencia eclesial, manteniendo la alternativa «Mesías» en nota para no borrar la tensión documentada del término.
  spanish_consistency_notes:
  - Se evitó el calco «en la plenitud» porque en español «con la plenitud» expresa mejor el matiz circunstancial de ἐν.
  - Se mantuvo el orden natural español con una sola cláusula principal y una subordinada temporal clara.
  - «Ustedes» se usa por neutralidad latinoamericana; podría alternar con «vosotros» en registros no latinoamericanos, pero no aquí.
