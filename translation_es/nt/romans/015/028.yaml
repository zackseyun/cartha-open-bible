translation:
  language: es
  text: Por tanto[a], cuando haya concluido esto y les haya sellado[a] este fruto[b], iré pasando por donde ustedes están[c] a España.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les haya entregado con seguridad este fruto». El verbo «sellar» probablemente alude a asegurar o certificar formalmente la colecta para sus destinatarios.'
    reason: lexical_alternative
  - marker: b
    text: «Este fruto» se refiere a la contribución económica reunida entre los creyentes gentiles para los santos de Jerusalén.
    reason: cultural_note
  - marker: c
    text: 'O: «por vía de ustedes» o «a través de ustedes». Probablemente Pablo piensa en su viaje vía Roma rumbo a España.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta tarea
  - este asunto
  lexicon: BDAG
  rationale: El demostrativo remite a la colecta y su entrega ya mencionadas. «Esto» conserva la referencia concisa y deja que el contexto explique el contenido, sin añadir interpretación innecesaria.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca inferencia y transición lógica desde lo anterior. «Por tanto» reproduce mejor esa relación formal que un conector más ligero.
- source_word: ἐπιτελέσας
  english_pob_choice: have completed
  chosen_spanish: haya concluido
  alternatives_spanish:
  - haya terminado
  - haya llevado a cabo
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción completada antes del verbo principal futuro. «Haya concluido» comunica bien esa anterioridad y el sentido de llevar una tarea a su fin.
- source_word: σφραγισάμενος
  english_pob_choice: have sealed to them
  chosen_spanish: haya entregado con seguridad ... a ellos
  alternatives_spanish:
  - haya sellado ... a ellos
  - haya asegurado ... para ellos
  - haya certificado ... para ellos
  lexicon: BDAG
  rationale: En este contexto, el verbo puede conservar la imagen de «sellar», pero en español la metáfora resulta menos natural si se mantiene de forma rígida. «Entregado con seguridad» preserva la fuerza de asegurar formalmente la ofrenda para sus destinatarios, sin borrar la idea de garantía documental o de custodia.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - para ellos
  lexicon: BDAG
  rationale: El dativo señala a los destinatarios de la contribución, los creyentes de Jerusalén. «A ellos» mantiene la dirección de la acción.
- source_word: τὸν καρπὸν τοῦτον
  english_pob_choice: this fruit
  chosen_spanish: este fruto
  alternatives_spanish:
  - este resultado
  - esta ofrenda
  - esta cosecha
  lexicon: BDAG
  rationale: Pablo usa «fruto» en sentido metafórico para el resultado tangible de la generosidad de los gentiles. Mantener «fruto» conserva la metáfora paulina; el contexto aclara que se trata de la colecta.
- source_word: ἀπελεύσομαι
  english_pob_choice: I will go on
  chosen_spanish: iré
  alternatives_spanish:
  - partiré
  - seguiré mi viaje
  lexicon: BDAG
  rationale: El futuro medio indica el desplazamiento de Pablo hacia el siguiente destino. «Iré» es la forma más natural y directa en español; el matiz de continuación lo aporta el contexto y la frase siguiente.
- source_word: δι’ ὑμῶν
  english_pob_choice: by way of you
  chosen_spanish: por medio de ustedes
  alternatives_spanish:
  - por ustedes
  - a través de ustedes
  - pasando por ustedes
  lexicon: BDAG
  rationale: La preposición con genitivo puede expresar tránsito «por medio de» o «por medio de la zona/mediación de». En contexto, Pablo parece ir vía Roma, posiblemente con apoyo de ellos. «Por medio de ustedes» conserva la idea de paso a través de su intermediación sin especificar más de lo que el texto dice.
- source_word: εἰς Σπανίαν
  english_pob_choice: to Spain
  chosen_spanish: hacia España
  alternatives_spanish:
  - a España
  - para España
  lexicon: BDAG
  rationale: La preposición de dirección indica destino. «Hacia España» suena natural en español y preserva el movimiento proyectado del viaje.
theological_decisions:
- issue: Sentido de «sellar» la colecta para los destinatarios
  english_pob_reading: Retain the metaphor 'sealed' in the main text rather than interpretively replacing it with 'delivered' or 'made sure they receive.'
  chosen_spanish_reading: 'Sustituir la metáfora por una expresión funcional: «entregado con seguridad ... a ellos».'
  alternative_spanish_readings:
  - haya sellado este fruto a ellos
  - haya certificado este fruto para ellos
  - haya asegurado este fruto para ellos
  rationale: En español, «sellar» sin más puede sonar oscuro o demasiado literal para lectores generales. Dado que la función probable del verbo es garantizar formalmente la ofrenda para sus receptores, una formulación funcional comunica el sentido sin forzar una imagen opaca. Aun así, se conserva el sustantivo «fruto» para no perder la metáfora paulina.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Identificación del «fruto»
  english_pob_reading: '''This fruit'' refers to the financial contribution gathered from the Gentile believers for the saints in Jerusalem.'
  chosen_spanish_reading: «Este fruto» se entiende como la colecta reunida entre los creyentes gentiles para los santos de Jerusalén.
  alternative_spanish_readings:
  - este resultado
  - esta ofrenda
  - esta cosecha
  rationale: La referencia no es doctrinalmente controvertida, pero sí culturalmente específica. Conviene explicitarla en nota para que el lector no confunda la metáfora con un fruto agrícola literal. Mantener «fruto» en el texto principal respeta la formulación paulina.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y toma como contexto auditado la decisión inglesa de conservar la metáfora de «sealed» y de «fruit», pero adapta el verbo a un español más natural sin perder la idea de garantía o entrega segura. También se conserva la relación lógica de οὖν y el movimiento de viaje hacia España.
  spanish_consistency_notes:
  - Se usa «Por tanto» para οὖν, coherente con un conector inferencial formal.
  - Se mantiene «fruto» para καρπός en vez de sustituirlo por «ofrenda» dentro del texto principal; la aclaración va en nota.
  - Se prefiere «Dios/Yahvé» solo cuando aparezcan términos divinos; este versículo no requiere ajuste terminológico.
  - Se evita «Cristo» porque el versículo no contiene Χριστός.
  - «España» se traduce como topónimo estándar, sin artículo añadido.
