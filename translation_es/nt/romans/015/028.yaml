base_translation:
  language: en
  yaml_path: translation/nt/romans/015/028.yaml
  text: Therefore[a], when I have completed this and have sealed this fruit to them[c][b], I will go on by way of you to Spain.
  footnotes:
  - marker: a
    text: Or 'have safely delivered to them this fruit.' The verb 'sealed' likely refers to formally securing or certifying the collection for its recipients.
    reason: lexical_alternative
  - marker: b
    text: '''This fruit'' refers to the financial contribution gathered from the Gentile believers for the saints in Jerusalem.'
    reason: cultural_note
  - marker: c
    text: Or 'through you'; Paul likely means he plans to travel by way of Rome on his journey to Spain.
    reason: lexical_alternative
