revisions:
- from: Por tanto[a], cuando haya concluido esto y haya entregado con seguridad este fruto[b] a ellos, iré por medio de ustedes[c] hacia España.
  to: Por tanto[a], cuando haya concluido esto y les haya sellado[a] este fruto[b], iré pasando por donde ustedes están[c] a España.
  rationale: La revisión restaura la metáfora principal «sellar» conforme a la decisión léxica y teológica auditada del POB, pero mantiene en nota la explicación funcional para claridad. También ajusta δι’ ὑμῶν a una expresión española más espacial y natural en contexto de viaje, y cambia «hacia España» por «a España» para reflejar mejor el destino. No requiere adjudicación adicional porque son correcciones claras de fidelidad y estilo.
