    unchanged: false
    changes_summary: 'Replaced ''the Messiah'' with ''Christ'' to reflect the Greek more directly and maintain expected register in Romans; simplified ''another man''s foundation'' to ''another''s foundation'' since ''man''s'' is not explicit in the source. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Y de esta manera tengo como ambición anunciar las buenas nuevas[a], no donde ya ha sido nombrado el Mesías[b], para no edificar sobre fundamento ajeno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el evangelio». Lit. «buenas nuevas»; el verbo griego se refiere a anunciar el mensaje de salvación.
    reason: lexical_alternative
  - marker: b
    text: O «Cristo». Aquí Χριστός se entiende como título, por eso se traduce «Mesías». También puede expresarse «sobre el fundamento de otro»; la imagen es arquitectónica y alude al trabajo apostólico previo de otra persona.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - de ese modo
  lexicon: BDAG
  rationale: Conecta con la estrategia ministerial ya descrita; «de esta manera» conserva el valor adverbial y suena natural en español.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora bien
  lexicon: BDAG
  rationale: Funciona como enlace leve del discurso, no como contraste fuerte. «Y» reproduce bien esa continuidad.
- source_word: φιλοτιμούμενον
  english_pob_choice: I make it my ambition
  chosen_spanish: me esfuerzo
  alternatives_spanish:
  - hago de ello mi ambición
  - aspiro con empeño
  - lo considero mi honra
  lexicon: BDAG
  rationale: El participio expresa empeño voluntario y propósito. En español, «me esfuerzo» mantiene la idea de dedicación activa sin forzar una expresión artificial.
- source_word: εὐαγγελίζεσθαι
  english_pob_choice: to proclaim the good news
  chosen_spanish: anunciar las buenas nuevas
  alternatives_spanish:
  - proclamar el evangelio
  - predicar el evangelio
  - anunciar el evangelio
  lexicon: BDAG
  rationale: «Buenas nuevas» conserva el sentido verbal de anunciar el mensaje gozoso y evita el tecnicismo eclesiástico como única opción.
- source_word: ὠνομάσθη
  english_pob_choice: has already been named
  chosen_spanish: ha sido nombrado
  alternatives_spanish:
  - ha sido mencionado
  - ha sido proclamado
  - ya era conocido
  lexicon: BDAG
  rationale: El pasivo de «nombrar» puede abarcar reconocimiento público del nombre/título. En contexto, la forma pasiva queda transparente en español.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός según la pauta doctrinal del proyecto cuando funciona como título y no como forma nominalizada fija.
- source_word: ἵνα μὴ
  english_pob_choice: so that I might not
  chosen_spanish: para no
  alternatives_spanish:
  - a fin de no
  - para que no
  lexicon: BDAG
  rationale: La finalidad negativa queda bien expresada con una construcción natural en español. «Para no» evita rigidez sin perder el propósito.
- source_word: ἐπ’ ἀλλότριον θεμέλιον
  english_pob_choice: on another's foundation
  chosen_spanish: sobre fundamento ajeno
  alternatives_spanish:
  - sobre el fundamento de otro
  - sobre la base de otro
  - sobre fundamento de otro
  lexicon: BDAG
  rationale: '«Ajeno» traduce ἀλλότριος con precisión relacional: perteneciente a otro. La metáfora arquitectónica se mantiene con «fundamento».'
- source_word: οἰκοδομῶ
  english_pob_choice: build
  chosen_spanish: edificar
  alternatives_spanish:
  - construir
  - edificar sobre
  lexicon: BDAG
  rationale: En la metáfora paulina, «edificar» es idiomático y conserva mejor el tono metafórico que un simple «construir».
theological_decisions:
- issue: Rendering of Χριστός as title
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La lectura del proyecto trata Χριστός como título en este contexto. «Mesías» preserva esa función titulataria en español y mantiene la diferencia entre título y nombre de uso fijo.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías (where title; Cristo where name-like)'
- issue: Paul's missionary principle
  english_pob_reading: Paul states a missionary aim to evangelize unreached places rather than a universal prohibition on all ministry where Christ is already known.
  chosen_spanish_reading: Pablo expresa una meta misionera personal, no una prohibición absoluta.
  alternative_spanish_readings:
  - una regla universal para todo ministerio
  - una prohibición total de trabajar donde ya hay creyentes
  rationale: La sintaxis de primera persona y finalidad debe conservarse como intención personal. La traducción evita convertir el versículo en norma universal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Preserve theological tension rather than resolve it'
- issue: Metaphor of foundation
  english_pob_reading: another's foundation
  chosen_spanish_reading: fundamento ajeno
  alternative_spanish_readings:
  - el fundamento de otro
  - fundamento de otro
  rationale: Se mantiene la metáfora constructiva y la idea de pertenencia a otro sin añadir un referente masculino que el griego no explicita.
  doctrine_reference: English audit trail revision restoring 'another's foundation' without 'man's'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del expediente: se restableció Χριστός como «Mesías» según la pauta doctrinal del proyecto, y se simplificó la metáfora a una forma sin «hombre» explícito, porque el griego solo dice «ajeno/ de otro».'
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστός en coherencia con la política del proyecto para usos titulares.
  - Se eligió «fundamento» en singular para respetar el paralelismo con el griego y la metáfora de edificación.
  - «Anunciar las buenas nuevas» conserva un registro comprensible y evita sobrecargar la frase con tecnicismo eclesiástico.
  - «Edificar» mantiene el campo semántico arquitectónico mejor que una paráfrasis no metafórica.
