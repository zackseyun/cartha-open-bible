  text: οὕτως δὲ ⸀φιλοτιμούμενον εὐαγγελίζεσθαι οὐχ ὅπου ὠνομάσθη Χριστός, ἵνα μὴ ἐπ’ ἀλλότριον θεμέλιον οἰκοδομῶ,
base_translation:
  language: en
  yaml_path: translation/nt/romans/015/020.yaml
  text: And in this way I make it my ambition to proclaim the good news[a], not where Messiah has already been named[b], so that I might not build on another's foundation.
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here because it functions as a title rather than a name-like form.
    reason: alternative_reading
  - marker: b
    text: Or 'on someone else's foundation.' The Greek says literally 'on another's foundation,' using a building metaphor for prior apostolic work.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
