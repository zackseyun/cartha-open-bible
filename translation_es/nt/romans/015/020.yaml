    text: O «el evangelio». Lit. «buenas nuevas»; el verbo griego se refiere a anunciar el mensaje de salvación.
    reason: lexical_alternative
  - marker: b
    text: O «Cristo». Aquí Χριστός se entiende como título, por eso se traduce «Mesías». También puede expresarse «sobre el fundamento de otro»; la imagen es arquitectónica y alude al trabajo apostólico previo de otra persona.
    reason: alternative_reading
