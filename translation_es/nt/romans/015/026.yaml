revisions:
- from: Porque Macedonia y Acaya se complacieron en hacer una cierta contribución para los pobres entre los santos que están en Jerusalén[a].
  to: Porque Macedonia y Acaya tuvieron a bien hacer una contribución para los pobres entre los santos en Jerusalén[a].
  rationale: Se ajusta el español para mayor naturalidad y fidelidad idiomática. «Tuvieron a bien» conserva la voluntad favorable de εὐδόκησαν sin sonar afectado. «Hacer una contribución» comunica con claridad el sentido material de κοινωνίαν τινὰ ποιήσασθαι en este contexto, mientras la nota preserva la alternativa de ‘compartir’ que refleja el matiz de comunión. «En Jerusalén» simplifica la frase sin pérdida de sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:11:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del griego: γάρ como explicación, Macedonia y Acaya como sujetos metonímicos, y la colecta destinada a los pobres de los santos en Jerusalén. Sin embargo, «hacer una cierta contribución» suena forzado en español y no comunica bien el carácter idiomático de κοινωνίαν τινὰ ποιήσασθαι. La nota alternativa con «participación» tampoco es la mejor opción en español para este contexto de ayuda material.'
  spanish_quality_summary: El texto es mayormente claro, pero «se complacieron» y especialmente «hacer una cierta contribución» resultan poco naturales. «Que están en Jerusalén» es comprensible, pero «en Jerusalén» basta y suena más limpio. Una redacción más idiomática puede conservar la precisión formal sin calco innecesario.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Santos» está bien alineado con ἅγιοι. La mejora principal es léxica/estilística: expresar κοινωνία material como «hacer una contribución» y reservar la nota para «compartir» o «hacer alguna muestra de comunión/participación» de forma más natural.'
  issues:
  - severity: medium
    issue: «hacer una cierta contribución» es un calco poco natural
    rationale: Aunque intenta reflejar τινά, en español bíblico natural suena rígido. «hacer una contribución» conserva el sentido práctico; la indefinición puede quedar implícita o explicarse en nota.
  - severity: low
    issue: «se complacieron» suena algo afectado en este contexto
    rationale: No es incorrecto, pero «tuvieron a bien» o «les pareció bien» suena más natural y mantiene la idea de voluntad favorable de εὐδόκησαν.
  - severity: low
    issue: La nota con «hacer una cierta participación» no suena idiomática
    rationale: «Participación» aquí no comunica bien el sentido de aporte material. La alternativa documentada en inglés apunta a ‘sharing’; en español conviene «hacer algún compartir» menos, o mejor «hacer alguna muestra de solidaridad/compartir», explicando la comunión expresada en ayuda material.
  revised_spanish_text: Porque Macedonia y Acaya tuvieron a bien hacer una contribución para los pobres entre los santos en Jerusalén[a].
  revised_footnotes:
  - marker: a
    text: O «hacer algún compartir»; la expresión griega subraya la comunión expresada mediante ayuda material.
    reason: lexical_alternative
  revision_rationale: Se ajusta el español para mayor naturalidad y fidelidad idiomática. «Tuvieron a bien» conserva la voluntad favorable de εὐδόκησαν sin sonar afectado. «Hacer una contribución» comunica con claridad el sentido material de κοινωνίαν τινὰ ποιήσασθαι en este contexto, mientras la nota preserva la alternativa de ‘compartir’ que refleja el matiz de comunión. «En Jerusalén» simplifica la frase sin pérdida de sentido.
