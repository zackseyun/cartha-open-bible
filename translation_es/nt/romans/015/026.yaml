translation:
  language: es
  text: Porque Macedonia y Acaya tuvieron a bien hacer una contribución para los pobres entre los santos en Jerusalén[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacer algún compartir»; la expresión griega subraya la comunión expresada mediante ayuda material.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐδόκησαν
  english_pob_choice: were pleased
  chosen_spanish: se complacieron
  alternatives_spanish:
  - quisieron con gusto
  - decidieron voluntariamente
  - les pareció bien
  lexicon: BDAG
  rationale: El aoristo de εὐδοκέω expresa una disposición favorable y voluntaria. «Se complacieron» conserva esa mezcla de gusto y voluntad, sin reducirlo a una simple decisión.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - En efecto
  lexicon: BDAG
  rationale: γάρ introduce la razón o explicación de lo dicho antes. «Porque» transmite bien esa función causal/explanatoria en español natural.
- source_word: Μακεδονία καὶ Ἀχαΐα
  english_pob_choice: Macedonia and Achaia
  chosen_spanish: Macedonia y Acaya
  alternatives_spanish:
  - las iglesias de Macedonia y Acaya
  - los creyentes de Macedonia y Acaya
  lexicon: BDAG
  rationale: El griego presenta las regiones como sujetos por metonimia. Mantener los nombres geográficos sigue de cerca el texto y evita añadir «iglesias» o «creyentes» que no están explícitos.
- source_word: κοινωνίαν τινὰ ποιήσασθαι
  english_pob_choice: to make a certain contribution
  chosen_spanish: hacer una cierta contribución
  alternatives_spanish:
  - hacer una cierta participación
  - hacer una cierta comunión
  - hacer una cierta colaboración
  lexicon: BDAG
  rationale: En este contexto de colecta, la expresión idiomática se refiere a un aporte material. «Contribución» comunica bien ese sentido práctico y conserva la nota de κοινωνία como compartir; «cierta» refleja τινά.
- source_word: εἰς τοὺς πτωχοὺς
  english_pob_choice: for the poor
  chosen_spanish: para los pobres
  alternatives_spanish:
  - en favor de los pobres
  - a los pobres
  lexicon: BDAG
  rationale: εἰς aquí indica destino o beneficio. «Para los pobres» es la manera más natural de expresarlo en español y conserva el valor benefactivo.
- source_word: τῶν ἁγίων
  english_pob_choice: among the saints
  chosen_spanish: entre los santos
  alternatives_spanish:
  - de los santos
  - entre los creyentes santos
  - entre el pueblo santo
  lexicon: BDAG
  rationale: El genitivo delimita a qué grupo pertenecen esos pobres. «Entre los santos» preserva la relación del grupo sin forzar una lectura posesiva que podría sonar menos clara en español.
- source_word: τῶν ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: que están en Jerusalén
  alternatives_spanish:
  - en Jerusalén
  - los que están en Jerusalén
  - que residen en Jerusalén
  lexicon: BDAG
  rationale: La construcción con ἐν + lugar funciona como modificador de «los santos». «Que están en Jerusalén» hace explícita esa relación en español sin añadir contenido extraño al texto.
theological_decisions:
- issue: Traducción de ἅγιοι en contexto paulino
  english_pob_reading: saints
  chosen_spanish_reading: santos
  alternative_spanish_readings:
  - santos de Dios
  - pueblo santo
  - personas santas
  rationale: En Pablo, ἅγιοι es una designación regular de los creyentes. «Santos» mantiene ese registro eclesial sin introducir connotaciones posteriores ajenas al contexto.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave)
translation_notes:
  revision_awareness: El texto sigue la lectura revisada del audit trail inglés, que prefirió «a certain contribution» para reflejar más directamente κοινωνίαν τινά. Por eso se conserva «una cierta contribución» en español, en un registro formal y publicable.
  spanish_consistency_notes:
  - Se mantiene «Macedonia» y «Acaya» como nombres propios regionales, siguiendo la metonimia del griego.
  - Se usa «santos» para ἅγιοι en coherencia con el uso paulino y con el criterio terminológico del proyecto.
  - «Contribución» conserva el sentido material de la colecta y no sustituye el matiz de comunión expresado por κοινωνία.
  - La nota al pie ofrece una alternativa léxica legítima sin romper la fluidez del texto principal.
