translation:
  language: es
  text: para que yo sea rescatado de los desobedientes[a] en Judea, y para que mi servicio para Jerusalén llegue a ser aceptable a los santos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los incrédulos en Judea». El participio griego puede expresar rechazo a creer y, por eso, desobediencia.
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that ... and that
  chosen_spanish: para que ... y para que
  alternatives_spanish:
  - con el fin de que ... y que
  lexicon: BDAG
  rationale: El griego introduce dos cláusulas de propósito coordinadas; en español, «para que» comunica naturalmente ese valor final sin forzar una estructura demasiado literal.
- source_word: ῥυσθῶ
  english_pob_choice: I may be rescued
  chosen_spanish: yo sea rescatado
  alternatives_spanish:
  - yo sea librado
  - yo sea salvado
  lexicon: BDAG
  rationale: «Rescatado» conserva la idea de ser sacado de un peligro o situación hostil, con un tono claro y moderno. «Librado» es posible, pero menos específico; «salvado» puede sonar más amplio de lo que pide el contexto.
- source_word: ἀπὸ τῶν ἀπειθούντων
  english_pob_choice: from those who are disobedient
  chosen_spanish: de los desobedientes
  alternatives_spanish:
  - de los incrédulos
  - de los que no obedecen
  lexicon: BDAG
  rationale: Se mantiene el valor principal de ἀπειθέω como desobediencia, respetando la decisión del POB inglés de no reducirlo solo a «incredulidad». En español, «desobedientes» conserva esa tensión semántica.
- source_word: ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: in Judea
  chosen_spanish: en Judea
  alternatives_spanish:
  - en la Judea
  lexicon: BDAG
  rationale: Es el equivalente geográfico normal y transparente en español.
- source_word: διακονία
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - ministerio
  - ayuda
  lexicon: BDAG
  rationale: «Servicio» reproduce el campo semántico amplio de διακονία y evita introducir una connotación institucional que «ministerio» podría sugerir en español.
- source_word: ἡ εἰς Ἰερουσαλήμ
  english_pob_choice: for Jerusalem
  chosen_spanish: para Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - a Jerusalén
  lexicon: BDAG
  rationale: La preposición εἰς expresa dirección o destino; «para Jerusalén» comunica bien la orientación de la acción y resulta idiomático en español.
- source_word: εὐπρόσδεκτος
  english_pob_choice: acceptable
  chosen_spanish: aceptable
  alternatives_spanish:
  - bien recibido
  - acogido favorablemente
  lexicon: BDAG
  rationale: «Aceptable» conserva el juicio de recepción favorable sin añadir matices que el texto no exige. Es el paralelo más directo al inglés auditado.
- source_word: τοῖς ἁγίοις
  english_pob_choice: to the saints
  chosen_spanish: a los santos
  alternatives_spanish:
  - a los creyentes
  - al pueblo santo
  lexicon: BDAG
  rationale: «Santos» preserva el término paulino establecido y su peso eclesial. No se sustituye por una glosa más explicativa, porque el POB inglés conserva la forma tradicional auditada.
- source_word: γένηται
  english_pob_choice: may become
  chosen_spanish: llegue a ser
  alternatives_spanish:
  - sea
  - pueda llegar a ser
  lexicon: BDAG
  rationale: La forma española «llegue a ser» refleja el matiz de llegar a existir o resultar aceptable, sin perder la fuerza de proceso implícita en γίνομαι.
theological_decisions:
- issue: Sentido de ἀπειθούντων entre desobediencia e incredulidad
  english_pob_reading: Rendered as 'those who are disobedient' in the main text, with a footnote noting 'the unbelieving' as an alternative.
  chosen_spanish_reading: «los desobedientes» en el texto principal, con nota que preserva «los incrédulos» como alternativa.
  alternative_spanish_readings:
  - los incrédulos
  - los que rehúsan creer
  rationale: Se preserva la tensión semántica del participio griego sin resolverla unilateralmente. El texto principal sigue la opción de desobediencia; la nota mantiene viva la lectura de incredulidad, tal como hace el audit trail inglés.
  doctrine_reference: Preservar la tensión lexical sin cerrarla prematuramente.
- issue: Alcance de διακονία aplicado a la colecta para Jerusalén
  english_pob_reading: service for Jerusalem
  chosen_spanish_reading: «mi servicio para Jerusalén»
  alternative_spanish_readings:
  - mi ministerio para Jerusalén
  - mi ayuda para Jerusalén
  rationale: Se evita sobrerreligiosizar el término. El contexto apunta a la entrega concreta de la colecta, pero el griego usa un sustantivo más amplio; «servicio» permite ambas dimensiones sin añadir interpretación extra.
  doctrine_reference: Mantener la amplitud del acto de servicio apostólico.
translation_notes:
  revision_awareness: 'El borrador sigue el audit trail inglés sin introducir cambios sustanciales: conserva la doble cláusula de propósito, mantiene la tensión semántica de ἀπειθούντων y refleja la recepción favorable de la ofrenda/servicio de Pablo en Jerusalén.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «santos» para τοῖς ἁγίοις, coherente con el uso paulino del proyecto.
  - «Servicio» traduce διακονία de manera amplia y consistente con el contexto de la colecta.
  - La nota de ἀπειθούντων se ancla en el mismo término del texto principal para no perder la alternativa documentada.
