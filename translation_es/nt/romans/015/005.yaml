source:
  edition: SBLGNT
  text: ὁ δὲ θεὸς τῆς ὑπομονῆς καὶ τῆς παρακλήσεως δῴη ὑμῖν τὸ αὐτὸ φρονεῖν ἐν ἀλλήλοις κατὰ ⸂Χριστὸν Ἰησοῦν⸃,
base_translation:
  language: en
  yaml_path: translation/nt/romans/015/005.yaml
  text: Now may the God of endurance and encouragement grant you to think the same way toward one another[a], in accordance with Messiah Jesus[b],
