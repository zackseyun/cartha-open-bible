- from: Y el Dios de la perseverancia y del consuelo les conceda tener el mismo sentir[a] entre ustedes, conforme a Mesías Jesús[b],
  to: Que el Dios de la perseverancia y del aliento les conceda tener el mismo sentir[a] entre ustedes, conforme a Mesías Jesús[b],
