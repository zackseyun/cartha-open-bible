translation:
  language: es
  text: Que el Dios de la perseverancia y del aliento les conceda tener el mismo sentir[a] entre ustedes, conforme a Mesías Jesús[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tener la misma mentalidad» o «pensar de la misma manera».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «conforme a Cristo Jesús»; se vierte «Mesías Jesús» para conservar el sentido titular de Χριστός.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δὲ θεὸς
  english_pob_choice: Now may the God
  chosen_spanish: Y el Dios
  alternatives_spanish:
  - Ahora, el Dios
  - Pero el Dios
  lexicon: BDAG
  rationale: La partícula δέ aquí solo enlaza con lo anterior y no exige una adversativa fuerte en español. «Y» conserva la continuidad del discurso sin introducir contraste excesivo.
- source_word: τῆς ὑπομονῆς
  english_pob_choice: of endurance
  chosen_spanish: de la perseverancia
  alternatives_spanish:
  - de la endurance
  - de la paciencia
  - de la constancia
  lexicon: BDAG
  rationale: ὑπομονή en Pablo expresa resistencia firme bajo presión. «Perseverancia» comunica bien esa idea en español natural; «paciencia» podría suavizar demasiado el sentido.
- source_word: τῆς παρακλήσεως
  english_pob_choice: and encouragement
  chosen_spanish: y del consuelo
  alternatives_spanish:
  - y de la exhortación
  - y del aliento
  lexicon: BDAG
  rationale: παράκλησις abarca consuelo, aliento y exhortación. «Consuelo» funciona aquí por la cercanía con la idea de sostén y fortalecimiento, aunque «aliento» o «exhortación» siguen siendo posibles.
- source_word: δῴη
  english_pob_choice: grant
  chosen_spanish: conceda
  alternatives_spanish:
  - dé
  - otorgue
  lexicon: BDAG
  rationale: El optativo aoristo en una fórmula de petición se vierte naturalmente con un subjuntivo de deseo en español. «Conceda» mantiene el tono de súplica benedictoria.
- source_word: τὸ αὐτὸ φρονεῖν
  english_pob_choice: to think the same way
  chosen_spanish: tener el mismo sentir
  alternatives_spanish:
  - pensar lo mismo
  - tener la misma mentalidad
  - ser de un mismo parecer
  lexicon: BDAG
  rationale: φρονέω apunta al modo de pensar, la disposición mental o el sentir. «Tener el mismo sentir» es idiomático en español e incluye la dimensión de actitud compartida sin imponer uniformidad absoluta.
- source_word: ἐν ἀλλήλοις
  english_pob_choice: toward one another
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - unos con otros
  - mutuamente
  - entre sí
  lexicon: BDAG
  rationale: La preposición marca la esfera relacional de la disposición compartida. «Entre ustedes» expresa bien la comunidad destinataria en español moderno y evita una calca pesada.
- source_word: κατὰ Χριστὸν Ἰησοῦν
  english_pob_choice: in accordance with Messiah Jesus
  chosen_spanish: conforme a Mesías Jesús
  alternatives_spanish:
  - de acuerdo con Mesías Jesús
  - según Mesías Jesús
  - conforme a Cristo Jesús
  lexicon: BDAG
  rationale: κατά expresa norma o conformidad. Se preserva «Mesías» para Χριστός según la preferencia terminológica del proyecto, ya que aquí el título conserva su fuerza semántica y no funciona como mero nombre fijo.
theological_decisions:
- issue: Renderización de Χριστός como título
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: 'Se mantiene el valor titular de Χριστός para no diluir el sentido cristológico. En esta frase exhortativa, el título sirve como norma de conducta: la unidad debe corresponder al Mesías Jesús.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve title/name distinctions'
- issue: Alcance de τὸ αὐτὸ φρονεῖν
  english_pob_reading: shared mindset/unity of thought
  chosen_spanish_reading: tener el mismo sentir
  alternative_spanish_readings:
  - uniformidad total de opinión
  - pensar exactamente igual
  rationale: La expresión pide concordia de mente y actitud, no uniformidad absoluta en todas las cuestiones. «Tener el mismo sentir» preserva esa tensión sin sobrerresolverla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tomó como base el texto griego SBLGNT y el aparato auditado en inglés. Aunque la revisión inglesa alternó entre ‘Christ Jesus’ y ‘Messiah Jesus’, aquí se conserva ‘Mesías’ conforme a la política terminológica del proyecto. También se prefirió una formulación española natural (‘tener el mismo sentir entre ustedes’) para τὸ αὐτὸ φρονεῖν / ἐν ἀλλήλοις, sin perder la fuerza relacional ni la dimensión de mente compartida.
  spanish_consistency_notes:
  - Se usa ‘Dios’ para θεός, ‘perseverancia’ para ὑπομονή, y ‘consuelo’ para παράκλησις dentro de este contexto.
  - ‘Mesías’ se mantiene como traducción de Χριστός en lugar de ‘Cristo’, siguiendo la regla del proyecto para títulos cristológicos.
  - La frase ‘entre ustedes’ conserva el carácter comunitario de ἐν ἀλλήλοις sin sonar forzada en español.
  - No se añade mayúscula a ‘mesías’ porque aquí funciona como título reverencial en medio de la frase, no como nombre propio aislado.
