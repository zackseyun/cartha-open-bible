  source_alignment_summary: El borrador sigue bien el griego en νυνὶ δὲ, πορεύομαι, εἰς Ἰερουσαλήμ y τοῖς ἁγίοις. Sin embargo, «ministrando» para διακονῶν suena demasiado calcado y eclesiástico en español contemporáneo, y aquí el contexto inmediato favorece servicio práctico/ayuda para los santos de Jerusalén. La nota ya preserva las alternativas y el trasfondo contextual.
  spanish_quality_summary: «Pero ahora voy a Jerusalén» es natural y fiel. «Ministrando a los santos» es comprensible, pero menos idiomático y menos claro que «para servir a los santos» o «sirviendo a los santos» en español bíblico actual. La revisión mejora la legibilidad sin perder el valor participial ni el vínculo con la nota.
  glossary_alignment: No hay conflicto con los términos por defecto del proyecto. «santos» está bien para ἅγιοι. La revisión cambia solo διακονῶν a «para servir a» por mejor español y mejor ajuste contextual, manteniendo en nota las opciones «ministrando»/«llevando ayuda».
