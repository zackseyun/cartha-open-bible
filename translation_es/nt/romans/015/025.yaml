    rationale: Si el cuerpo del texto ya usa «servir», la nota no debe ofrecer «sirviendo» como primera alternativa sin explicar que el texto principal adoptó esa opción. Conviene preservar «ministrando» como alternativa más literal al inglés/greigo y «llevando ayuda» como opción contextual.
