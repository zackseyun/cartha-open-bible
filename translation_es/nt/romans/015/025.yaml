translation:
  language: es
  text: Pero ahora voy a Jerusalén[a], para servir a los santos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ministrando a los santos» o «llevando ayuda a los santos». El participio διακονῶν puede denotar servicio práctico; aquí probablemente se refiere a la entrega de la colecta para los creyentes de Jerusalén (cf. Ro 15:26).
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Ahora, sin embargo
  - Pero en este momento
  lexicon: BDAG
  rationale: νυνί expresa el tiempo presente con énfasis, y δέ añade una transición adversativa suave. «Pero ahora» conserva ambos valores de forma natural en español sin volver el texto pesado.
- source_word: πορεύομαι
  english_pob_choice: I am going
  chosen_spanish: voy
  alternatives_spanish:
  - estoy yendo
  - estoy en camino
  lexicon: BDAG
  rationale: El presente indica movimiento actual hacia Jerusalén. En español, «voy» comunica con claridad el desplazamiento sin forzar una perífrasis menos natural.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - a la ciudad de Jerusalén
  lexicon: BDAG
  rationale: εἰς con nombre de ciudad señala destino o movimiento hacia ese lugar; «a Jerusalén» es la forma más directa y fiel en español.
- source_word: διακονῶν
  english_pob_choice: ministering
  chosen_spanish: ministrando
  alternatives_spanish:
  - sirviendo
  - prestando ayuda
  lexicon: BDAG
  rationale: «Ministrando» conserva el matiz de διακονέω que el POB inglés refleja con «ministering», manteniendo el lenguaje de servicio con posible carga de ayuda práctica sin reducirlo a un simple acto doméstico.
- source_word: τοῖς ἁγίοις
  english_pob_choice: to the saints
  chosen_spanish: a los santos
  alternatives_spanish:
  - a los creyentes
  - a los santos de Dios
  lexicon: BDAG
  rationale: En Pablo, οἱ ἅγιοι designa a los creyentes; «santos» preserva la formulación léxica y eclesial del original, en vez de explicitar el referente en el cuerpo del verso.
theological_decisions:
- issue: Referente de «los santos»
  english_pob_reading: believers in Jerusalem, especially the poor among them in the immediate context
  chosen_spanish_reading: los creyentes de Jerusalén, especialmente los necesitados en el contexto inmediato
  alternative_spanish_readings:
  - una referencia genérica a los santos sin especificar Jerusalén
  - los miembros de la iglesia de Jerusalén
  rationale: El texto griego dice literalmente «a los santos» y el contexto de Romanos 15:26 aclara que Pablo lleva una ofrenda para los creyentes de Jerusalén. La traducción mantiene el término formal en el versículo y deja la identificación contextual para la lectura continuada.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El texto inglés POB ya está en alto acuerdo y sin cambios recientes sustantivos; la principal decisión auditable en español es cómo verter διακονῶν sin perder su posible sentido de ayuda práctica dentro del contexto de la colecta para Jerusalén.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «santos» para οἱ ἅγιοι, consistente con la terminología paulina y con el inglés POB.
  - La nota al pie conserva la alternativa lexical del inglés y añade una formulación española natural sin cambiar el contenido auditable.
