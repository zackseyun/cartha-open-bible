translation:
  language: es
  text: Porque no me atreveré a hablar de cosa alguna sino de lo que el Mesías[a] ha realizado por medio de mí para la obediencia de los gentiles[b], de palabra y de obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo».
    reason: lexical_alternative
  - marker: b
    text: O «las naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: τολμήσω
  english_pob_choice: I will not dare
  chosen_spanish: no me atreveré
  alternatives_spanish:
  - no osaré
  - no me atrevo a
  lexicon: BDAG
  rationale: El futuro de οὐ γὰρ expresa la decisión/reserva de Pablo; «no me atreveré» conserva la idea de osadía/atrevimiento sin sonar forzado en español.
- source_word: τι λαλεῖν
  english_pob_choice: to speak of anything except
  chosen_spanish: hablar de cosa alguna sino de
  alternatives_spanish:
  - mencionar nada excepto
  - hablar de algo más que
  lexicon: BDAG
  rationale: 'La construcción con ὧν οὐ es restrictiva: Pablo limita el contenido de su habla a lo que Cristo ha hecho. «Sino de» transmite bien la restricción en español.'
- source_word: ὧν οὐ κατειργάσατο
  english_pob_choice: except what ... has accomplished
  chosen_spanish: de lo que ... ha realizado
  alternatives_spanish:
  - de lo que ... ha logrado
  - de lo que ... ha obrado
  lexicon: BDAG
  rationale: κατεργάζομαι aquí es ‘llevar a cabo, producir, realizar eficazmente’. «Ha realizado» conserva el sentido de obra efectuada; «ha obrado» sería posible, pero menos preciso para el resultado consumado.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: DOCTRINE.md contested terms
  rationale: Se preserva el valor de título mesiánico. En este pasaje Pablo presenta a Cristo como el agente que obra por medio de él; «Mesías» refleja mejor ese matiz que una mera forma nominalizada.
- source_word: δι’ ἐμοῦ
  english_pob_choice: through me
  chosen_spanish: por medio de mí
  alternatives_spanish:
  - por mí
  - a través de mí
  lexicon: BDAG
  rationale: διά con genitivo indica medio/agencia. «Por medio de mí» mantiene a Cristo como actor principal y a Pablo como instrumento.
- source_word: εἰς ὑπακοὴν ἐθνῶν
  english_pob_choice: for the obedience of the Gentiles
  chosen_spanish: para la obediencia de las naciones
  alternatives_spanish:
  - para la obediencia de los gentiles
  - para llevar a las naciones a la obediencia
  lexicon: BDAG
  rationale: Se conserva la estructura formal del griego. «Naciones» reproduce ἐθνῶν de manera directa; en Romanos puede referirse a los no judíos, pero el texto griego permite mantener el término amplio y dejar esa referencia en nota.
- source_word: λόγῳ καὶ ἔργῳ
  english_pob_choice: by word and deed
  chosen_spanish: de palabra y de obra
  alternatives_spanish:
  - por palabra y obra
  - en palabra y obra
  lexicon: BDAG
  rationale: Los dativos probablemente expresan medio. «De palabra y de obra» es idiomático en español y preserva el paralelismo entre proclamación y acción.
theological_decisions:
- issue: Χριστός como título mesiánico o nombre propio
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El contexto subraya la función de agente mesiánico que actúa por medio de Pablo. En coherencia con la política del proyecto, se conserva el sentido de título cuando el griego lo permite.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título; Cristo solo cuando el uso sea ya nombre-like o litúrgicamente fijo.'
- issue: ἐθνῶν como ‘Gentiles’ o ‘naciones’
  english_pob_reading: the Gentiles
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  - los no judíos
  rationale: Aunque en Romanos ἔθνη suele designar a los gentiles, el griego aquí admite el sentido literal de ‘naciones’. Se mantiene ‘naciones’ en el texto principal para no borrar la tensión léxica, y se explica el valor contextual en nota.
  doctrine_reference: Consistencia contextual en Romanos para ἔθνη/ἐθνῶν, sin anular el sentido léxico básico de ‘nations’.
translation_notes:
  revision_awareness: 'El expediente inglés muestra una oscilación revisada entre ‘Christ’ y ‘Messiah’ para Χριστός, con restitución final de ‘Messiah’ por política doctrinal. También conserva una nota alternativa para ἐθνῶν (‘the nations’ / ‘the Gentiles’). La propuesta española sigue esa resolución: traduce Χριστός como ‘el Mesías’ y mantiene ‘las naciones’ en el cuerpo con nota para el uso paulino contextual.'
  spanish_consistency_notes:
  - Se evitó ‘Señor’ o equivalentes de máscara para el nombre divino porque el verso no contiene יהוה ni κύριος con ese valor.
  - ‘de palabra y de obra’ conserva el paralelismo retórico del griego sin expandirlo a ‘palabras y acciones’.
  - La elección de ‘Mesías’ mantiene la terminología del proyecto para Χριστός cuando funciona como título, no como nombre fijo.
