  source_alignment_summary: 'El borrador sigue bien la sintaxis básica del griego: la reserva de Pablo (οὐ γὰρ τολμήσω), la restricción ‘sino de lo que’, la agencia instrumental ‘por medio de mí’ y el cierre instrumental ‘de palabra y de obra’. También preserva correctamente Χριστός como título mediante «el Mesías». Sin embargo, en εἰς ὑπακοὴν ἐθνῶν el borrador se aparta del English POB auditado, que eligió «Gentiles» por el uso paulino en Romanos; «las naciones» es léxicamente posible, pero aquí debilita el sentido contextual documentado.'
  spanish_quality_summary: El español es claro y natural. «No me atreveré», «ha realizado», «por medio de mí» y «de palabra y de obra» suenan bien y son fieles. La única mejora necesaria es ajustar «las naciones» a «los gentiles» para reflejar mejor el contexto de Romanos y la decisión auditada. Las notas actuales también deben reordenarse para que la alternativa principal quede en nota, no en el texto.
  glossary_alignment: 'Alineación buena en «Mesías» para Χριστός, conforme a la política del proyecto. No hay términos problemáticos adicionales. El punto de desalineación es ἐθνῶν: el proyecto y la auditoría inglesa favorecen «Gentiles» en este contexto romano-paulino; por tanto, el español debe usar «gentiles» en el texto y dejar «naciones» como alternativa léxica en nota.'
  issues:
