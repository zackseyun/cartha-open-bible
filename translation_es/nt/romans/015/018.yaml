    issue: «las naciones» en el texto principal para ἐθνῶν
    rationale: Aunque léxicamente posible, el English POB documenta «Gentiles» como la mejor lectura contextual en Romanos, donde Pablo suele contrastar judíos y no judíos. Mantener «naciones» en el texto principal oscurece ese matiz contextual preservado por la auditoría.
  - severity: low
