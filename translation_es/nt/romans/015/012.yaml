revisions:
- from: 'Y de nuevo Isaías dice[a]: «La raíz de Jesé vendrá, y el que se levanta para gobernar a las naciones; en él esperarán las naciones[b]».'
  to: 'Y de nuevo[a] Isaías dice: «La raíz de Jesé vendrá, es decir, el que se levanta para gobernar a los gentiles; en él los gentiles esperarán[b]».'
  rationale: Se corrigió el texto para alinearlo con la decisión fuente del POB inglés de traducir ἔθνη/ἐθνῶν como «gentiles» en el cuerpo principal, preservando «naciones» como alternativa en nota. Se movió la nota de πάλιν al lugar correcto y se refinó su alternativa. También se suavizó la sintaxis con «es decir» para reflejar mejor la relación explicativa entre «la raíz de Jesé» y «el que se levanta», manteniendo fidelidad al sentido sin sobreinterpretar el griego.
  reviewer_model: gpt-5.4
