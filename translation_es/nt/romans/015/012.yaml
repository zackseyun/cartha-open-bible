review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura general del griego y mantiene adecuadamente la imagen mesiánica «la raíz de Jesé» y el valor idiomático de ἐπ’ αὐτῷ como «en él». Sin embargo, no sigue la decisión auditada del POB inglés sobre ἔθνη/ἐθνῶν, que en este contexto paulino se tradujo en el texto principal como «Gentiles» con nota alternativa «naciones». Además, la nota [a] se ancla a «dice» aunque en realidad comenta πάλιν («de nuevo»), y «además» no es la mejor alternativa contextual.
  spanish_quality_summary: 'El español es claro y digno, pero la frase mejora si se alinea más estrechamente con la puntuación y el flujo del POB inglés: conviene introducir «es decir» para reflejar el valor explicativo de «even» en la auditoría inglesa, y usar «gentiles» en ambos lugares para coherencia argumentativa en Romanos 15. También es preferible mover la nota [a] a «de nuevo» y refinar su alternativa a «otra vez».'
  glossary_alignment: 'No hay conflictos con terminología base como Yahvé, Mesías, Jesús, etc. La desviación principal es contextual: ἔθνη debería ir como «gentiles» en el texto principal según la decisión teológica y léxica ya documentada, con «naciones» en nota alternativa. El resto de las decisiones léxicas principales son aceptables.'
  issues:
  - severity: medium
    issue: ἔθνη/ἐθνῶν se tradujo como «naciones» en el texto principal
    rationale: La auditoría inglesa eligió «Gentiles» en ambos casos por el contexto de Romanos 15; «nations» quedó solo como alternativa en nota. El español debe preservar esa decisión salvo razón fuerte en contra, que aquí no está justificada.
  - severity: low
    issue: La nota [a] está anclada a «dice» en vez de a «de nuevo»
    rationale: La alternativa comentada corresponde a πάλιν, no a λέγει. El anclaje actual puede inducir a confusión sobre qué palabra explica la nota.
  - severity: low
    issue: La alternativa «además» para πάλιν es débil en este contexto
    rationale: En una cadena de citas, «de nuevo/otra vez» refleja mejor la función discursiva de πάλιν que «además», que suena más aditivo que reiterativo.
  - severity: low
    issue: Falta reflejar en español el matiz explicativo de la revisión inglesa («even the one who rises…» )
    rationale: Aunque no exige literalismo, «y el que se levanta…» queda algo abrupto después de «vendrá». Una solución como «es decir, el que se levanta…» hace el español más natural y preserva la relación explicativa del texto auditado.
  revised_spanish_text: 'Y de nuevo[a] Isaías dice: «La raíz de Jesé vendrá, es decir, el que se levanta para gobernar a los gentiles; en él los gentiles esperarán[b]».'
  revised_footnotes:
