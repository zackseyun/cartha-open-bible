    text: O «otra vez».
    reason: alternative_reading
  - marker: b
    text: O «las naciones» en ambas ocurrencias de ἔθνη/ἐθνῶν; literalmente, «sobre él esperarán los gentiles».
    reason: alternative_reading
  revision_rationale: Se corrigió el texto para alinearlo con la decisión fuente del POB inglés de traducir ἔθνη/ἐθνῶν como «gentiles» en el cuerpo principal, preservando «naciones» como alternativa en nota. Se movió la nota de πάλιν al lugar correcto y se refinó su alternativa. También se suavizó la sintaxis con «es decir» para reflejar mejor la relación explicativa entre «la raíz de Jesé» y «el que se levanta», manteniendo fidelidad al sentido sin sobreinterpretar el griego.
