translation:
  language: es
  text: 'Y de nuevo[a] Isaías dice: «La raíz de Jesé vendrá, es decir, el que se levanta para gobernar a los gentiles; en él los gentiles esperarán[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «otra vez».
    reason: alternative_reading
  - marker: b
    text: O «las naciones» en ambas ocurrencias de ἔθνη/ἐθνῶν; literalmente, «sobre él esperarán los gentiles».
    reason: alternative_reading
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - además
  lexicon: BDAG
  rationale: Introduce otra cita de apoyo en la cadena de testimonios de Pablo; «de nuevo» es un marcador discursivo natural en español y conserva la función de repetición del original.
- source_word: Ἠσαΐας
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  lexicon: Transliteración estándar
  rationale: Se mantiene el nombre propio del profeta en la forma usual en español.
- source_word: Ἔσται
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - será
  - habrá
  lexicon: BDAG
  rationale: Aunque el griego es futuro de εἰμί, el contexto profético permite un futuro con valor de venida/aparición en español. «Vendrá» refleja mejor la lectura revisada del POB inglés y preserva la fuerza profética sin volverlo explicativo en exceso.
- source_word: ἡ ῥίζα τοῦ Ἰεσσαί
  english_pob_choice: the root of Jesse
  chosen_spanish: la raíz de Jesé
  alternatives_spanish:
  - el tronco de Jesé
  - la raíz de Isaí
  lexicon: BDAG
  rationale: Se conserva la imagen mesiánica literal. «Raíz de Jesé» es la forma establecida y transparente; «Jesé» sigue la transliteración habitual en español bíblico.
- source_word: ὁ ἀνιστάμενος
  english_pob_choice: the one who rises
  chosen_spanish: el que se levanta
  alternatives_spanish:
  - el que surge
  - el que resucita
  lexicon: BDAG
  rationale: El participio presente sustantivado mantiene el matiz verbal. «Se levanta» conserva la ambigüedad útil del original sin decidir prematuramente si el énfasis es aparición, exaltación o resurrección.
- source_word: ἄρχειν ἐθνῶν
  english_pob_choice: to rule the Gentiles
  chosen_spanish: para gobernar a las naciones
  alternatives_spanish:
  - para regir a los gentiles
  - para gobernar a los gentiles
  lexicon: BDAG
  rationale: ἄρχειν expresa gobierno/autoridad, por eso «gobernar» es directo y natural. Aquí se eligió «naciones» para preservar la amplitud posible de ἔθνη en la cita de Isaías; el contexto paulino permite también la lectura «gentiles», que queda registrada en nota.
- source_word: ἐπ’ αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  - en él confiarán
  lexicon: BDAG
  rationale: Aunque la preposición puede sugerir literalmente «sobre/upon», en la construcción con ἐλπίζω el sentido es poner la esperanza en alguien. «En él» es la forma idiomática y fiel en español.
- source_word: ἔθνη
  english_pob_choice: the Gentiles
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  lexicon: BDAG
  rationale: Se mantiene la consistencia con ἐθνῶν como «naciones» en esta versión principal. Dado el trasfondo paulino, «gentiles» es una alternativa válida y se documenta en nota para no borrar la tensión lexicográfica.
- source_word: ἐλπιοῦσιν
  english_pob_choice: will hope
  chosen_spanish: esperarán
  alternatives_spanish:
  - pondrán su esperanza
  - confiarán
  lexicon: BDAG
  rationale: El futuro de ἐλπίζω puede expresarse como esperanza activa. En español, «esperarán» sigue el valor verbal del original y encaja con «en él» sin sobrecargar la frase con una paráfrasis.
theological_decisions:
- issue: ἔθνη en la cita de Isaías dentro de Romanos 15:12
  english_pob_reading: Gentiles in both occurrences, with a note that ‘nations’ is also possible
  chosen_spanish_reading: naciones en el texto principal, con nota de alternativa «gentiles»
  alternative_spanish_readings:
  - gentiles en ambos casos
  rationale: En Romanos, Pablo aplica la profecía a la inclusión de los pueblos no judíos, pero el trasfondo de Isaías también conserva el sentido universal de «naciones». La versión principal evita fijar demasiado pronto una sola lectura y la nota conserva la tensión léxica documentada por el POB inglés.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza mesiánica de «la raíz de Jesé»
  english_pob_reading: Retained as a literal messianic title without explicit interpretive expansion
  chosen_spanish_reading: Se mantiene la metáfora literal mesiánica sin expansión interpretativa
  alternative_spanish_readings:
  - el descendiente de Jesé
  - el heredero de Jesé
  rationale: La imagen debe permanecer abierta y bíblica, no reescribirse como interpretación explícita. Así se conserva el eco de Isaías y su cumplimiento mesiánico sin añadir contenido que el griego no formula.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La auditoría inglesa muestra una revisión importante en Ἔσται, cambiando de «will be» a «will come» para una expresión profética más natural. La versión española sigue esa decisión con «vendrá». También se mantuvo la tensión documentada sobre ἔθνη/ἐθνῶν, que el inglés resolvió con «Gentiles» pero dejó anotada la alternativa «nations»; aquí se optó por «naciones» en el texto principal y se preservó la alternativa en nota.
  spanish_consistency_notes:
  - Se usa «Isaías» para el nombre del profeta y «Jesé» para Jesse, de manera consistente con el español bíblico estándar.
  - Se conserva «raíz» como imagen mesiánica literal, evitando una paráfrasis doctrinal.
  - «En él» traduce ἐπ’ αὐτῷ de forma idiomática y no se sustituye por una fórmula más literal que sonaría extraña en español.
  - La alternancia principal entre «naciones» y «gentiles» se documenta para no borrar la ambigüedad original de ἔθνη/ἐθνῶν.
