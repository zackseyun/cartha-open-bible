  to: Que el Dios de la esperanza los llene de todo gozo y paz al creer, para que abunden en esperanza por el poder del Espíritu Santo.
  rationale: Se ajusta el inicio a una forma desiderativa natural en español («Que...»), se reemplaza «en el creer» por «al creer» para mejorar la legibilidad manteniendo el valor circunstancial de ἐν τῷ πιστεύειν, y se resuelve la forma verbal provisional «abund[e]n» a «abunden». No se requieren notas al pie.
