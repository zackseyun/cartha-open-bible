review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: oración desiderativa al Dios de la esperanza, plenitud de gozo y paz, esfera de creer, propósito/resultado de abundar en esperanza, y medio instrumental del Espíritu Santo. Sin embargo, «en el creer» suena poco natural en español y «Y» para δὲ es menos adecuado aquí que una formulación de bendición como «Que». Además, «abund[e]n» contiene una marca editorial no apta para texto final.'
  spanish_quality_summary: El texto es mayormente claro y fiel, pero necesita pulido para legibilidad e idiomaticidad. «Que el Dios de la esperanza los llene...» reproduce mejor el tono de deseo/oración en español. «Al creer» comunica de forma natural el valor circunstancial de ἐν τῷ πιστεύειν sin reducirlo a sustantivo abstracto. También debe eliminarse la forma provisional «abund[e]n».
  glossary_alignment: 'La terminología clave está bien alineada: θεός → «Dios», ἐλπίς → «esperanza», χαρά → «gozo», εἰρήνη → «paz», πνεῦμα ἅγιον → «Espíritu Santo». No hay conflicto con los lineamientos del proyecto. La elección «Espíritu Santo» es correcta y eclesialmente legible.'
  issues:
  - severity: medium
    issue: Inicio con «Y el Dios de la esperanza»
    rationale: Aunque δὲ es conectivo suave, en español una bendición/desiderativo suena más natural con «Que el Dios de la esperanza...». «Y» deja una frase algo colgante y menos idiomática.
  - severity: medium
    issue: «en el creer» es poco natural
    rationale: Preserva de cerca la forma griega, pero en español amplio resulta forzado. «Al creer» o «mientras creen» comunica mejor la circunstancia/esfera sin perder el sentido.
  - severity: high
    issue: Forma no final «abund[e]n»
    rationale: La presencia de corchetes editoriales indica texto sin resolver y no es aceptable en la redacción publicada.
  revised_spanish_text: Que el Dios de la esperanza los llene de todo gozo y paz al creer, para que abunden en esperanza por el poder del Espíritu Santo.
  revision_rationale: Se ajusta el inicio a una forma desiderativa natural en español («Que...»), se reemplaza «en el creer» por «al creer» para mejorar la legibilidad manteniendo el valor circunstancial de ἐν τῷ πιστεύειν, y se resuelve la forma verbal provisional «abund[e]n» a «abunden». No se requieren notas al pie.
