translation:
  language: es
  text: Que el Dios de la esperanza los llene de todo gozo y paz al creer, para que abunden en esperanza por el poder del Espíritu Santo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ δὲ θεὸς τῆς ἐλπίδος
  english_pob_choice: Now may the God of hope
  chosen_spanish: Y el Dios de la esperanza
  alternatives_spanish:
  - Ahora, el Dios de la esperanza
  - Y el Dios esperanzador
  lexicon: BDAG
  rationale: 'Se conserva el valor conectivo suave de δὲ con «Y», sin forzar contraste. El genitivo τῆς ἐλπίδος se entiende de modo descriptivo: Dios como el Dios relacionado con la esperanza, por eso «de la esperanza» es más natural y fiel que una paráfrasis.'
- source_word: πληρώσαι
  english_pob_choice: fill
  chosen_spanish: los llene
  alternatives_spanish:
  - los haga llenos
  - los colme
  lexicon: BDAG
  rationale: El optativo de ruego se expresa de forma natural en español con «llene». Mantiene la metáfora de plenitud sin añadir matices no requeridos.
- source_word: πάσης χαρᾶς καὶ εἰρήνης
  english_pob_choice: with all joy and peace
  chosen_spanish: de todo gozo y paz
  alternatives_spanish:
  - con todo gozo y paz
  - de toda alegría y paz
  lexicon: BDAG
  rationale: En español, con un verbo de llenado, la construcción natural es «de todo...». «Gozo» preserva el registro bíblico y corresponde bien a χαρά; «paz» mantiene εἰρήνη sin sobrecargarlo con explicaciones.
- source_word: ἐν τῷ πιστεύειν
  english_pob_choice: in believing
  chosen_spanish: en el creer
  alternatives_spanish:
  - al creer
  - mientras creen
  - en la fe
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν señala esfera o circunstancia; «en el creer» es una solución breve y fiel. Se evita «en la fe» porque el griego usa el verbo πιστεύω, no el sustantivo πίστις.
- source_word: εἰς τὸ περισσεύειν ὑμᾶς
  english_pob_choice: so that you may abound
  chosen_spanish: para que abund[e]n
  alternatives_spanish:
  - para que ustedes abunden
  - a fin de que abunden
  lexicon: BDAG
  rationale: εἰς τὸ + infinitivo expresa finalidad o resultado; «para que» comunica bien ese propósito. Se mantiene el sujeto implícito de segunda persona plural. La forma verbal queda ajustada al texto final con una referencia clara a los destinatarios.
- source_word: ἐν τῇ ἐλπίδι
  english_pob_choice: in hope
  chosen_spanish: en esperanza
  alternatives_spanish:
  - con esperanza
  - en la esperanza
  lexicon: BDAG
  rationale: Se conserva el vínculo léxico con τῆς ἐλπίδος mediante «esperanza». Sin artículo, la frase suena más directa en español y mantiene la idea de esfera.
- source_word: ἐν δυνάμει
  english_pob_choice: by the power
  chosen_spanish: por el poder
  alternatives_spanish:
  - con el poder
  - mediante el poder
  lexicon: BDAG
  rationale: La fuerza instrumental de ἐν se expresa naturalmente con «por». «Por el poder» suena idiomático y claro en español, sin perder el sentido de medio o agente.
- source_word: πνεύματος ἁγίου
  english_pob_choice: of the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - del espíritu santo
  - del Espíritu de santidad
  lexicon: BDAG
  rationale: En contexto paulino se trata de la tercera persona divina. «Espíritu Santo» preserva el referente personal y es la forma habitual y comprensible en español eclesial.
theological_decisions:
- issue: Valor de θεὸς τῆς ἐλπίδος
  english_pob_reading: the God of hope
  chosen_spanish_reading: el Dios de la esperanza
  alternative_spanish_readings:
  - el Dios que da esperanza
  - el Dios esperanzador
  rationale: 'No se convierte en una frase explicativa más larga. La construcción mantiene la relación genitiva sin borrar la ambigüedad teológica útil: Dios como fuente y ámbito de la esperanza.'
  doctrine_reference: Romanos 15:13; uso bíblico de genitivo atributivo
- issue: πνεύματος ἁγίου como Espíritu personal
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - espíritu santo
  - espíritu de santidad
  rationale: El contexto paulino favorece la lectura del Espíritu divino personal, no una cualidad impersonal. La capitalización en español sostiene ese referente sin añadir comentario doctrinal al texto.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Romanos 8; Gálatas 5
- issue: ἐν τῷ πιστεύειν y ἐν τῇ ἐλπίδι
  english_pob_reading: in believing ... in hope
  chosen_spanish_reading: en el creer ... en esperanza
  alternative_spanish_readings:
  - al creer ... con esperanza
  - mientras creen ... en la esperanza
  rationale: Se mantiene la distinción entre la acción de creer y la esfera de la esperanza. No se fusionan ambos miembros en una sola paráfrasis para no perder la estructura retórica del ruego.
  doctrine_reference: Sintaxis de infinitivo articular en griego koiné
translation_notes:
  revision_awareness: La versión sigue de cerca el audit trail inglés, pero ajusta la sintaxis a un español natural. Se conserva la metáfora de plenitud, la conexión entre creer y esperanza, y la lectura personal del Espíritu Santo. No se introdujeron notas porque el verso no mostró variantes textuales relevantes ni alternativas lexicográficas que exigieran anclaje en el texto.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «Espíritu Santo» para πνεύματος ἁγίου, coherente con el resto del proyecto.
  - «Esperanza» se mantiene como sustantivo clave para conservar el enlace entre el genitivo inicial y el verso final.
  - «Gozo» se prefiere a «alegría» por registro bíblico y continuidad terminológica.
  - Se evita «Cristo» porque no aparece en el versículo.
  - La puntuación refleja un tono de bendición oracional en español, equivalente al optativo griego.
