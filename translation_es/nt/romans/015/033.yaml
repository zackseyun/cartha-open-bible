    issue: «Ahora, que el Dios de paz...» es poco natural en español bíblico actual
    rationale: Aunque δέ puede traducirse «Now» en inglés, «Ahora» al inicio de una bendición en español suena temporal o discursivamente torpe. Aquí conviene un enlace suave como «Y» o su omisión.
