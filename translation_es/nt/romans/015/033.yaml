  rationale: Se reemplaza «Ahora» por «Y» para reflejar mejor el valor conectivo suave de δέ en una despedida paulina y para producir un español más natural y digno. Se conserva la estructura benedictoria con subjuntivo («que ... esté»), el título «el Dios de paz», el alcance inclusivo «con todos ustedes» y la conclusión litúrgica «Amén».
