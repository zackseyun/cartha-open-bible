translation:
  language: es
  text: Y que el Dios de paz esté con todos ustedes. Amén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δώ aquí funciona como enlace transicional suave en una doxología final, no como contraste fuerte. «Ahora» reproduce bien ese giro discursivo en español y mantiene el tono de cierre.
- source_word: θεὸς τῆς εἰρήνης
  english_pob_choice: the God of peace
  chosen_spanish: el Dios de paz
  alternatives_spanish:
  - el Dios de la paz
  - Dios de paz
  lexicon: BDAG
  rationale: Se conserva el título paulino como sintagma genitival directo. «Dios de paz» es natural en español y preserva la designación sin añadir una paráfrasis explicativa.
- source_word: εἰρήνης
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz y bienestar
  - armonía
  lexicon: BDAG
  rationale: «Paz» es la equivalencia básica y más fiel. En esta bendición incluye la idea de plenitud reconciliada, pero no hace falta expandirla en el texto principal.
- source_word: μετὰ πάντων ὑμῶν
  english_pob_choice: be with all of you
  chosen_spanish: esté con todos ustedes
  alternatives_spanish:
  - sea con todos ustedes
  - esté entre todos ustedes
  lexicon: BDAG
  rationale: El griego es una fórmula de bendición sin verbo explícito; en español conviene suplir un verbo copulativo en subjuntivo para expresar el valor desiderativo. «Con todos ustedes» refleja πάντων ὑμῶν de manera inclusiva y natural.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  lexicon: BDAG
  rationale: Se conserva la forma litúrgica tradicional, que en español también se usa como cierre solemnizante. Traducirlo como «Así sea» debilitaría su carácter formular y ecuménico.
theological_decisions:
- issue: Cómo entender la cláusula sin verbo explícito
  english_pob_reading: 'Rendered as a benediction: ''Now may the God of peace be with all of you.'''
  chosen_spanish_reading: 'Se traduce como bendición/deseo: «Ahora, que el Dios de paz esté con todos ustedes».'
  alternative_spanish_readings:
  - Ahora el Dios de paz está con todos ustedes.
  - Y que el Dios de paz esté con todos ustedes.
  rationale: Aunque el griego presenta una construcción nominal, en saludos conclusivos paulinos funciona como bendición. El español necesita hacer explícito el valor desiderativo con «que ... esté» para no sonar a afirmación estática ni forzar una estructura ajena al uso epistolar.
  doctrine_reference: Principio de equivalencia óptima; mantener la función benedictoria del texto en español claro y reverente.
translation_notes:
  revision_awareness: El contexto textual y el audit trail inglés muestran acuerdo alto y no requieren revisión sustantiva; la traducción española sigue la misma lectura benedictoria sin añadir matices no sustentados.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «paz» para εἰρήνη, de acuerdo con los valores básicos del pasaje.
  - Se conserva «Amén» sin verterlo, conforme al uso litúrgico habitual en español.
  - La inclusión de «Ahora» reproduce el valor transicional de δέ al inicio de una bendición conclusiva.
