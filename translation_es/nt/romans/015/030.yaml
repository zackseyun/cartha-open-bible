source:
  edition: SBLGNT
  text: Παρακαλῶ δὲ ὑμᾶς, ἀδελφοί, διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ καὶ διὰ τῆς ἀγάπης τοῦ πνεύματος συναγωνίσασθαί μοι ἐν ταῖς προσευχαῖς ὑπὲρ ἐμοῦ πρὸς τὸν θεόν,
base_translation:
  language: en
  yaml_path: translation/nt/romans/015/030.yaml
  text: Now I urge you[a], brothers, through our Lord Jesus Messiah and through the love of the Spirit, to strive together with me in prayers to God for me[c][b],
  footnotes:
  - marker: a
    text: 'Or ''Christ'': Greek Christos, a title meaning ''Anointed One'' or ''Messiah.'''
    reason: alternative_reading
  - marker: b
    text: '''Brothers'' is grammatically masculine in Greek and may address the whole believing community, that is, brothers and sisters.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the Spirit's love' / 'the love produced by the Spirit'; the Greek genitive can be understood in more than one way.
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: ebe8d04b32d330d2677d0b0a495ddb312521d8ac701d03d73c995df75d19d8c3
    timestamp: '2026-04-18T11:13:45Z'
    output_hash: 032cdad5bfce1bb4f252a143f49671c05596b7826b6691ea74b18c64a17b78f9
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:01:52Z'
    unchanged: false
    changes_summary: 'Replaced ''the Messiah'' with ''Christ'' for closer lexical correspondence to Χριστοῦ and more natural consistency in this formal register. No other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Ahora les ruego[a], hermanos[b], por nuestro Señor Jesús Mesías y por el amor del Espíritu[c], que luchen junto conmigo en las oraciones por mí a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «les exhorto» / «les insto»: παρακαλέω expresa una apelación intensa.'
    reason: alternative_reading
  - marker: b
    text: «Hermanos» es masculino gramatical en griego y puede dirigirse a toda la comunidad creyente, es decir, hermanos y hermanas.
    reason: lexical_alternative
  - marker: c
    text: O «el amor del Espíritu» puede entenderse como «el amor que el Espíritu tiene» o «el amor producido por el Espíritu»; el genitivo griego admite más de una interpretación.
    reason: alternative_reading
lexical_decisions:
- source_word: Παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: les ruego
  alternatives_spanish:
  - les exhorto
  - les suplico
  - les insto
  lexicon: BDAG
  rationale: παρακαλέω aquí introduce una súplica apremiante y personal. «Les ruego» conserva el tono de apelación ferviente y suena natural y digno en español.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ marca transición del discurso, no oposición fuerte. «Ahora» comunica el paso a una nueva petición.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: El vocativo plural es masculino gramatical y puede abarcar a toda la comunidad. «Hermanos» preserva la forma del texto fuente; la posible referencia inclusiva se explicita en nota.
- source_word: διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: through our Lord Jesus Messiah
  chosen_spanish: por nuestro Señor Jesús Mesías
  alternatives_spanish:
  - por nuestro Señor Jesucristo
  - por medio de nuestro Señor Jesús Mesías
  lexicon: BDAG
  rationale: διά con genitivo funciona aquí como apelación basada en la relación con Cristo. «Por» es natural en español y conserva la fuerza del ruego. Se mantiene «Mesías» según la política del proyecto para Χριστός como título.
- source_word: ἀγάπης
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: ἀγάπη se traduce normalmente como «amor». «Caridad» sería demasiado eclesiástico o estrecho en este contexto.
- source_word: τοῦ πνεύματος
  english_pob_choice: of the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - del espíritu
  - producido por el Espíritu
  lexicon: BDAG
  rationale: 'La mayúscula refleja la referencia probable al Espíritu Santo. Se conserva la ambigüedad genitiva: puede ser el amor del Espíritu o el amor producido por el Espíritu.'
- source_word: συναγωνίσασθαί
  english_pob_choice: to strive together with me
  chosen_spanish: que luchen junto conmigo
  alternatives_spanish:
  - que se esfuercen conmigo
  - que contiendan conmigo
  - que colaboren conmigo en la lucha
  lexicon: BDAG
  rationale: El compuesto expresa esfuerzo intenso y compartido. «Luchen junto conmigo» conserva el prefijo συν- y el matiz agonístico sin sonar artificial.
- source_word: ἐν ταῖς προσευχαῖς
  english_pob_choice: in prayers
  chosen_spanish: en las oraciones
  alternatives_spanish:
  - en oración
  - en sus oraciones
  lexicon: BDAG
  rationale: El griego no añade posesivo; «en las oraciones» es transparente y fiel. Evita introducir «sus» sin base textual.
- source_word: ὑπὲρ ἐμοῦ
  english_pob_choice: for me
  chosen_spanish: por mí
  alternatives_spanish:
  - en favor de mí
  - en mi nombre
  lexicon: BDAG
  rationale: ὑπέρ con genitivo expresa intercesión a favor de Pablo. «Por mí» es idiomático y breve en español.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: ante Dios
  alternatives_spanish:
  - a Dios
  - hacia Dios
  lexicon: BDAG
  rationale: En lenguaje de oración, πρός con acusativo puede comunicar dirección hacia Dios. «Ante Dios» expresa bien el carácter de la intercesión sin perder la orientación del ruego.
theological_decisions:
- issue: Referencia de «el Espíritu» en «el amor del Espíritu»
  english_pob_reading: Holy Spirit
  chosen_spanish_reading: Espíritu Santo
  alternative_spanish_readings:
  - espíritu humano
  - espíritu en sentido no personal
  - amor producido por el Espíritu
  rationale: En Pablo, τὸ πνεῦμα en esta construcción suele referir al Espíritu Santo. La traducción lo capitaliza y mantiene la ambigüedad del genitivo, sin decidir de manera cerrada entre amor del Espíritu y amor producido por el Espíritu.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Renderización de Χριστοῦ
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: 'Aquí Χριστός funciona como título en una fórmula de apelación: «nuestro Señor Jesús Mesías». Se conserva la política terminológica del proyecto, y se deja la alternativa tradicional para familiaridad del lector.'
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
- issue: Renderización de ἀδελφοί
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: El plural masculino griego se mantiene en el texto principal para conservar la forma y el valor representativo del vocativo. La posible inclusión de toda la comunidad queda a salvo sin sustituir la forma fuente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que alternó entre «Messiah» y «Christ»; el último estado auditado restablece «Messiah», por lo que el español sigue esa opción terminológica. También se conservó la ambigüedad del genitivo de πνεύματος y la lectura inclusiva implícita de ἀδελφοί mediante nota, sin alterar el texto principal.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός en coherencia con la política del proyecto y con la última revisión auditada.
  - «Espíritu» va con mayúscula por la referencia probable al Espíritu Santo.
  - No se añadió posesivo en «en las oraciones», porque el griego no lo expresa.
  - Se prefirió «por» / «ante» para reproducir el encadenamiento de las preposiciones griegas sin sobrecargar el español.
