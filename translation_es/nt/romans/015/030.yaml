    text: 'O «les exhorto» / «les insto»: παρακαλέω expresa una apelación intensa.'
    reason: alternative_reading
  - marker: b
    text: «Hermanos» es masculino gramatical en griego y puede dirigirse a toda la comunidad creyente, es decir, hermanos y hermanas.
    reason: lexical_alternative
  - marker: c
    text: O «el amor del Espíritu» puede entenderse como «el amor que el Espíritu tiene» o «el amor producido por el Espíritu»; el genitivo griego admite más de una interpretación.
    reason: alternative_reading
  revision_rationale: Se corrige «ante Dios» a «a Dios» para reflejar con mayor fidelidad πρὸς τὸν θεόν en contexto de oración, conforme al expediente auditado. También se repara la nota c para que preserve la ambigüedad genitiva real de τοῦ πνεύματος, en lugar de introducir una falsa alternativa entre «Espíritu» y «Espíritu Santo». No se requieren cambios doctrinales ni de terminología principal.
