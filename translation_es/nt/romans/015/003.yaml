translation:
  language: es
  text: 'Porque aun el Mesías[a] no buscó agradarse a sí mismo, sino como está escrito: «Las afrentas de los que te afrentaban cayeron sobre mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo» por «el Mesías».
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For even
  chosen_spanish: Porque aun
  alternatives_spanish:
  - Pues aun
  - Porque incluso
  lexicon: BDAG
  rationale: La secuencia introduce la razón y añade énfasis; «porque aun» reproduce bien la fuerza inferencial y enfática sin sobrerrepresentar la conjunción.
- source_word: ὁ Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona con valor titular y ejemplar, no solo como nombre fijo; por eso «Mesías» sigue la decisión auditada del POB inglés y el uso del proyecto para este término.
- source_word: οὐχ ἑαυτῷ ἤρεσεν
  english_pob_choice: did not please himself
  chosen_spanish: no se agradó a sí mismo
  alternatives_spanish:
  - no buscó agradarse a sí mismo
  - no vivió para agradarse a sí mismo
  lexicon: BDAG
  rationale: La frase griega es breve y directa; «no se agradó a sí mismo» conserva el verbo de agradar y el reflexivo sin añadir interpretación.
- source_word: ἀλλὰ καθὼς γέγραπται
  english_pob_choice: but as it is written
  chosen_spanish: sino, como está escrito
  alternatives_spanish:
  - pero, como está escrito
  - más bien, como está escrito
  lexicon: BDAG
  rationale: «Sino» refleja bien el contraste correctivo con la negación anterior; «como está escrito» es la fórmula bíblica natural en español y conserva el valor perfectivo del griego.
- source_word: ὀνειδισμοί
  english_pob_choice: reproaches
  chosen_spanish: insultos
  alternatives_spanish:
  - reproches
  - afrentas
  - ultrajes
  lexicon: BDAG
  rationale: Aunque el POB inglés usa «reproaches», en español «insultos» comunica con más naturalidad el sentido de palabras de vergüenza y agresión verbal, manteniendo la repetición léxica con el participio siguiente.
- source_word: τῶν ὀνειδιζόντων σε
  english_pob_choice: of those who reproached you
  chosen_spanish: de los que te insultaban
  alternatives_spanish:
  - de los que te reprochaban
  - de tus insultadores
  lexicon: BDAG
  rationale: El participio presente requiere una construcción relativa natural en español; «te insultaban» conserva la reiteración del mismo campo semántico de ὀνειδισμός/ὀνειδίζω.
- source_word: ἐπέπεσαν ἐπ’ ἐμέ
  english_pob_choice: fell on me
  chosen_spanish: cayeron sobre mí
  alternatives_spanish:
  - recayeron sobre mí
  - vinieron sobre mí
  lexicon: BDAG
  rationale: «Cayeron sobre mí» mantiene la imagen verbal e idiomática del aoristo con ἐπί, y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Rendering of Χριστός as a title rather than a name-like form
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La referencia auditada entiende Χριστός como título mesiánico en un ejemplo ético; «Mesías» preserva esa lectura sin convertirlo en un nombre fijo eclesiástico.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título; preservar la tensión original-language primacy'
- issue: Citation speech and referent of 'me' in the quotation
  english_pob_reading: The quotation is rendered straightforwardly without specifying more than the text states about speaker identity.
  chosen_spanish_reading: La cita se presenta tal como está, sin identificar explícitamente en el cuerpo del verso al hablante de ‘mí’.
  alternative_spanish_readings:
  - identificar a ‘mí’ como el Mesías
  - parafrasear la cita para aclarar su aplicación cristológica
  rationale: La aplicación paulina a Cristo/Mesías es real, pero el texto citado debe permanecer citado; no se debe resolver en la traducción una tensión interpretativa que el propio contexto deja abierta.
  doctrine_reference: 'DOCTRINE.md: Preservar tensión teológica; primacía del texto original y de la cita'
translation_notes:
  revision_awareness: Pasaje revisado de acuerdo con el pasaje fuente griego y el audit trail inglés; no se registran revisiones aplicadas en el contexto provisto, y la lectura se mantiene estable respecto del último pase.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme a la terminología por defecto del proyecto cuando funciona como título.
  - Se evita «Señor» o sustituciones litúrgicas no motivadas por el texto.
  - La repetición semántica de insulto/reproche se conserva mediante «insultos» / «insultaban» para reflejar el vínculo léxico griego.
  - La cita se marca con comillas españolas y puntuación natural para lectura bíblica moderna.
