revisions:
- from: 'Porque aun el Mesías[a] no se agradó a sí mismo, sino, como está escrito: «Los insultos de los que te insultaban cayeron sobre mí».'
  to: 'Porque aun el Mesías[a] no buscó agradarse a sí mismo, sino como está escrito: «Las afrentas de los que te afrentaban cayeron sobre mí».'
  rationale: Se ajusta una expresión poco natural («no se agradó a sí mismo») a una formulación idiomática y fiel en español, se eleva el registro de la cita con «afrentas», y se limpia la puntuación. No se requiere adjudicación adicional porque el cambio es menor y está bien sustentado por el griego y la línea lexical del POB.
