translation:
  language: es
  text: cuando vaya[a] a España—pues espero, al pasar, verlos y ser encaminado por ustedes hasta allí[b], si primero quedo satisfecho en parte con su compañía[c]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando vaya a España». La construcción griega expresa un tiempo futuro indefinido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ayudado en el viaje por ustedes» o «acompañado por ustedes». El verbo puede implicar apoyo para continuar el trayecto.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «saciado en parte con su compañía». El griego dice literalmente «ser llenado en parte» y probablemente alude al gozo de una comunión limitada antes de seguir viaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ἂν πορεύωμαι
  english_pob_choice: whenever I go
  chosen_spanish: cuando vaya
  alternatives_spanish:
  - cuando vaya allá
  - cada vez que vaya
  lexicon: BDAG
  rationale: La construcción con ὡς ἄν + subjuntivo expresa tiempo futuro indefinido o contingente; en español, «cuando vaya» comunica bien esa referencia futura sin sonar forzado. Se evita «cada vez que», que sugeriría repetición no evidente.
- source_word: Σπανίαν
  english_pob_choice: Spain
  chosen_spanish: a España
  alternatives_spanish:
  - a Hispania
  lexicon: BDAG
  rationale: El nombre geográfico se naturaliza como «España», el equivalente normal en español moderno y plenamente transparente para el lector.
- source_word: ἐλπίζω γὰρ
  english_pob_choice: for I hope
  chosen_spanish: porque espero
  alternatives_spanish:
  - pues espero
  - porque confío
  lexicon: BDAG
  rationale: γάρ tiene función explicativa; «porque» la conserva con naturalidad en español. ἐλπίζω aquí expresa expectativa confiada, y «espero» lo reproduce de forma directa y digna.
- source_word: διαπορευόμενος
  english_pob_choice: as I pass through
  chosen_spanish: al pasar
  alternatives_spanish:
  - mientras paso
  - de paso
  lexicon: BDAG
  rationale: El participio circunstancial indica desplazamiento en ruta. «Al pasar» es idiomático y mantiene la idea de tránsito sin añadir matices innecesarios.
- source_word: θεάσασθαι ὑμᾶς
  english_pob_choice: to see you
  chosen_spanish: verlos
  alternatives_spanish:
  - visitarles
  - verles
  lexicon: BDAG
  rationale: En español contemporáneo de iglesia, el trato de segunda persona plural se expresa naturalmente como «verlos». Aunque θεάομαι puede tener un matiz de contemplar o visitar, aquí el sentido relacional de encuentro queda bien cubierto por «ver».
- source_word: ὑφ’ ὑμῶν προπεμφθῆναι ἐκεῖ
  english_pob_choice: to be sent on my way there by you
  chosen_spanish: ser encaminado por ustedes hasta allí
  alternatives_spanish:
  - ser ayudado en el viaje por ustedes
  - ser despedido por ustedes en el camino
  lexicon: BDAG
  rationale: προπέμπω en contextos de viaje puede implicar acompañar, ayudar o enviar adelante. «Ser encaminado... hasta allí» conserva la idea de apoyo para continuar el viaje sin especificar más de lo que el griego exige.
- source_word: ἐὰν ... ἐμπλησθῶ
  english_pob_choice: if ... I may be satisfied
  chosen_spanish: si primero me he saciado
  alternatives_spanish:
  - si primero quedo satisfecho
  - si primero me lleno
  lexicon: BDAG
  rationale: ἐμπίμπλημι conserva la imagen de llenura; «saciarse» mantiene ese valor concreto mejor que una mera «satisfacción» abstracta. El perfecto compuesto español («me he saciado») funciona como forma natural para expresar el estado logrado antes de seguir adelante.
- source_word: ὑμῶν πρῶτον
  english_pob_choice: if first
  chosen_spanish: si primero
  alternatives_spanish:
  - si antes
  - si en primer lugar
  lexicon: BDAG
  rationale: πρῶτον marca prioridad temporal. «Si primero» reproduce esa secuencia de manera sencilla y fiel.
- source_word: ἀπὸ μέρους
  english_pob_choice: in part
  chosen_spanish: en parte
  alternatives_spanish:
  - parcialmente
  - por un tiempo
  lexicon: BDAG
  rationale: El idiomatismo indica una medida parcial o limitada. «En parte» es la equivalencia española más directa y conserva la ambigüedad del alcance exacto.
- source_word: ὑμῶν
  english_pob_choice: with your company
  chosen_spanish: con su compañía
  alternatives_spanish:
  - con ustedes
  - en su compañía
  lexicon: BDAG
  rationale: Tras el verbo de llenarse/saciarse, el genitivo apunta al disfrute de la relación y compañía. «Con su compañía» explicita esa idea en español sin perder la cercanía del original.
theological_decisions:
- issue: Alcance de la ayuda que los romanos darían a Pablo en el viaje
  english_pob_reading: Rendered προπεμφθῆναι as 'to be sent on my way there by you,' implying practical support for onward mission without specifying financial or ecclesial details.
  chosen_spanish_reading: ser encaminado por ustedes hasta allí
  alternative_spanish_readings:
  - ser ayudado en el viaje por ustedes
  - ser despedido por ustedes en el camino
  rationale: El verbo puede abarcar acompañamiento y apoyo para el siguiente tramo, pero el texto no especifica el tipo exacto de ayuda. La redacción elegida conserva esa amplitud y evita importar detalles no presentes en el griego.
  doctrine_reference: 'Principio de transparencia textual: no precisar más de lo que el texto dice; preservar la ambigüedad cuando el original la mantiene.'
- issue: Naturaleza del deseo de Pablo de estar con los romanos antes de seguir viaje
  english_pob_reading: Rendered ἐμπλησθῶ with 'I may be satisfied in part with your company,' preserving the metaphor of fullness and the limitation expressed by ἀπὸ μέρους.
  chosen_spanish_reading: si primero me he saciado en parte con su compañía
  alternative_spanish_readings:
  - si primero quedo satisfecho en parte con su compañía
  - si primero disfruto en parte de su compañía
  rationale: La imagen de llenura/saciedad permanece en el verbo español elegido, y «en parte» conserva la limitación del tiempo o del disfrute. No se resuelve si la fuerza principal es satisfacción emocional, comunión o simple convivencia limitada; se deja abierta la tensión semántica.
  doctrine_reference: 'Principio de equivalencia óptima: conservar metáfora y tensión del original en lugar de aplanarlas en una paráfrasis.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión inglés: la preferencia final por «satisfied in part» confirma que el matiz de llenura/satisfacción sigue abierto, por lo que en español se conservó la imagen corporal de «saciarse» junto con «en parte».'
  spanish_consistency_notes:
  - Se usó «a España» para el destino geográfico, con mayúscula según norma española.
  - Se evitó «SEÑOR» u otras sustituciones no presentes, porque aquí no hay nombre divino en el versículo.
  - Se mantuvo el registro reverente y contemporáneo con segunda persona plural de trato eclesial («ustedes»).
  - Los corchetes de nota aparecen solo en palabras/segmentos que realmente reciben nota en el texto.
