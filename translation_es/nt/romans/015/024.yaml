  text: ὡς ⸀ἂν πορεύωμαι εἰς τὴν ⸀Σπανίαν, ἐλπίζω γὰρ διαπορευόμενος θεάσασθαι ὑμᾶς καὶ ὑφ’ ὑμῶν προπεμφθῆναι ἐκεῖ ἐὰν ὑμῶν πρῶτον ἀπὸ μέρους ἐμπλησθῶ—
base_translation:
  language: en
  yaml_path: translation/nt/romans/015/024.yaml
  text: whenever I go to Spain—for I hope[a], as I pass through, to see you and to be sent on my way there by you[c][b], if first I may be satisfied in part with your company—
  footnotes:
  - marker: a
    text: Or 'when I go to Spain.' The Greek construction expresses an indefinite future time.
    reason: lexical_alternative
  - marker: b
    text: Or 'to be helped on my journey there by you.' The verb can imply being assisted or accompanied onward.
    reason: lexical_alternative
  - marker: c
    text: Or 'if first I may be satisfied in part with you.' The Greek literally says 'be filled in part' and likely refers to enjoying limited fellowship with them before continuing on.
    reason: lexical_alternative
