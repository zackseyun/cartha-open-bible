translation:
  language: es
  text: para ser ministro de Mesías Jesús a los gentiles[a], prestando servicio sacerdotal[b] en el evangelio de Dios, para que la ofrenda de los gentiles llegue a ser aceptable[c], santificada por el Espíritu Santo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a las naciones».
    reason: lexical_alternative
  - marker: b
    text: O «sirviendo como sacerdote» o «ministrando de manera sacerdotal».
    reason: lexical_alternative
  - marker: c
    text: Es decir, probablemente los propios gentiles presentados a Dios como ofrenda; alternativamente, «la ofrenda hecha por los gentiles».
    reason: alternative_reading
  - marker: d
    text: O «santificada en el Espíritu Santo».
    reason: lexical_alternative
lexical_decisions:
- source_word: λειτουργὸν
  english_pob_choice: minister
  chosen_spanish: ministro
  alternatives_spanish:
  - siervo
  - servidor público
  lexicon: BDAG
  rationale: λειτουργός puede designar a alguien que presta un servicio de carácter público o sagrado. En español, «ministro» conserva la idea de servicio y también el matiz cultual que la frase siguiente refuerza con ἱερουργοῦντα, sin convertirlo en un oficio eclesiástico más técnico de lo que exige el texto.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  lexicon: BDAG
  rationale: El griego usa Χριστός como título, no como mero nombre propio. «Mesías Jesús» conserva ese valor titular y sigue la decisión documental de la POB inglesa.
- source_word: εἰς τὰ ἔθνη
  english_pob_choice: to the Gentiles
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los gentiles
  lexicon: BDAG
  rationale: Aunque en Romanos ἔθνη suele referirse a los no judíos, la forma más cercana al griego es «las naciones». Se mantiene así la amplitud semántica, y se deja la interpretación contextual como nota.
- source_word: ἱερουργοῦντα
  english_pob_choice: serving as a priest
  chosen_spanish: ejerciendo el ministerio sacerdotal
  alternatives_spanish:
  - sirviendo como sacerdote
  - prestando servicio sacerdotal
  lexicon: BDAG
  rationale: El participio es claramente cultual y sacerdotal. «Ejerciendo el ministerio sacerdotal» comunica el matiz de servicio sagrado sin sonar forzado en español y sin reducirlo a una simple función general de servicio.
- source_word: τὸ εὐαγγέλιον τοῦ θεοῦ
  english_pob_choice: the gospel of God
  chosen_spanish: el evangelio de Dios
  alternatives_spanish:
  - las buenas noticias de Dios
  - el evangelio que pertenece a Dios
  lexicon: BDAG
  rationale: «Evangelio» es el equivalente estable y transparente para el término paulino, y «de Dios» preserva el genitivo posesivo del griego.
- source_word: προσφορὰ τῶν ἐθνῶν
  english_pob_choice: the offering of the Gentiles
  chosen_spanish: la ofrenda de las naciones
  alternatives_spanish:
  - la ofrenda hecha por las naciones
  - las naciones como ofrenda
  lexicon: BDAG
  rationale: La construcción genitiva conserva en español su ambigüedad útil. «La ofrenda de las naciones» permite que el lector perciba tanto la referencia a los gentiles como el posible sentido de ofrenda compuesta por ellos o presentada de ellos.
- source_word: εὐπρόσδεκτος
  english_pob_choice: acceptable
  chosen_spanish: aceptable
  alternatives_spanish:
  - bien recibida
  - agradable
  lexicon: BDAG
  rationale: En contexto sacrificial, «aceptable» expresa adecuación y recepción favorable por parte de Dios con naturalidad en español.
- source_word: ἡγιασμένη
  english_pob_choice: sanctified
  chosen_spanish: santificada
  alternatives_spanish:
  - hecha santa
  - consagrada
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante de acción santificadora. «Santificada» preserva el registro bíblico y la relación con el lenguaje de santidad de Pablo.
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: by the Holy Spirit
  chosen_spanish: por el Espíritu Santo
  alternatives_spanish:
  - en el Espíritu Santo
  lexicon: BDAG
  rationale: La preposición puede entenderse de manera instrumental o locativa. Se eligió «por» para expresar mejor el medio/agencia de la santificación, manteniendo en nota la lectura alternativa «en el Espíritu Santo».
theological_decisions:
- issue: Lenguaje sacerdotal de Pablo
  english_pob_reading: Paul metaphorically describes his apostolic ministry to the Gentiles in priestly language without asserting a separate sacrificial atonement or importing later ecclesial office structures.
  chosen_spanish_reading: Pablo se describe metafóricamente en términos sacerdotales para su ministerio apostólico entre las naciones, sin convertir esto en una afirmación de sacerdocio expiatorio independiente ni en una estructura eclesial posterior.
  alternative_spanish_readings:
  - Una lectura que lo toma como afirmación de un oficio sacerdotal formal
  - Una lectura que borra el lenguaje sacerdotal y lo vuelve mera actividad ministerial
  rationale: La combinación de λειτουργός, ἱερουργέω y προσφορά obliga a conservar la metáfora sacerdotal. Al mismo tiempo, el contexto habla del ministerio del evangelio y de una ofrenda aceptable para Dios, no de un sacrificio expiatorio de Pablo.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Referente de «la ofrenda de las naciones»
  english_pob_reading: The Gentiles themselves are presented to God as the offering resulting from Paul's gospel ministry.
  chosen_spanish_reading: Las naciones mismas, ganadas por el evangelio, son presentadas a Dios como la ofrenda.
  alternative_spanish_readings:
  - Una ofrenda hecha por las naciones
  rationale: El entorno inmediato de la metáfora sacerdotal favorece entender que los gentiles convertidos son lo que se ofrece a Dios. Como el genitivo griego permite cierta ambigüedad, la redacción principal la conserva y la nota explicita la alternativa sin imponerla.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con la revisión más reciente y no requiere cambios sustanciales; la presente redacción sigue el audit trail inglés y conserva las notas sobre ambigüedad léxica y teológica.
  spanish_consistency_notes:
  - Se usa «Mesías» de manera consistente para Χριστός como título.
  - Se mantiene «evangelio de Dios» en vez de una paráfrasis como «buenas noticias» para respetar la fórmula paulina.
  - «Naciones» conserva la amplitud de ἔθνη, con la lectura contextual de gentiles explicada en nota.
  - «Por el Espíritu Santo» expresa el valor instrumental de ἐν, mientras la nota preserva la alternativa locativa.
  - La puntuación y el registro buscan una publicación bíblica moderna, digna y clara.
