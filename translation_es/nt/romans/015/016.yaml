revisions:
- from: para ser ministro de Mesías Jesús[a] a las naciones, ejerciendo el ministerio sacerdotal en el evangelio de Dios, para que la ofrenda de las naciones llegue a ser aceptable[c][b], santificada por el Espíritu Santo[d].
  to: para ser ministro de Mesías Jesús a los gentiles[a], prestando servicio sacerdotal[b] en el evangelio de Dios, para que la ofrenda de los gentiles llegue a ser aceptable[c], santificada por el Espíritu Santo[d].
  rationale: La revisión corrige la prioridad contextual de ἔθνη en Romanos, alineando el texto principal con 'gentiles' y dejando 'naciones' como alternativa, tal como documenta la auditoría inglesa. También aligera y verbaliza ἱερουργοῦντα con 'prestando servicio sacerdotal', que preserva mejor la acción sacerdotal metafórica. Se ajustan las notas para que coincidan con el texto revisado y con la ambigüedad preservada en προσφορὰ τῶν ἐθνῶν.
