    issue: εἰς τὰ ἔθνη se tradujo en el texto principal como 'a las naciones'
    rationale: La auditoría inglesa estableció 'to the Gentiles' como lectura contextual preferida en Romanos, conservando 'to the nations' solo como alternativa. En español, 'a las naciones' pierde precisión contextual y puede sonar geopolítico más que etnorreligioso.
  - severity: low
    issue: La nota [a] invierte la prioridad léxica documentada
    rationale: Si el texto principal usa 'a los gentiles', la alternativa debe ser 'a las naciones', no al revés, para mantener coherencia con el English POB y la justificación contextual.
  - severity: low
