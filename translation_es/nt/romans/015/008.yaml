translation:
  language: es
  text: Porque digo que el Mesías se ha hecho servidor para los circuncisos[a], por la verdad de Dios[b], para confirmar las promesas a los padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los circuncisos»; más literalmente, «de la circuncisión». El contexto favorece la idea de servicio dirigido al pueblo circuncidado, es decir, Israel.
    reason: lexical_alternative
  - marker: b
    text: O «por la veracidad de Dios»; también puede implicar la fidelidad de Dios al cumplir sus promesas.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω γὰρ
  english_pob_choice: For I say
  chosen_spanish: Porque digo
  alternatives_spanish:
  - Porque yo digo
  - Pues digo
  lexicon: BDAG
  rationale: γάρ introduce explicación o fundamento, por eso ‘Porque’ mantiene la conexión lógica. λέγω en este marco paulino se expresa con naturalidad como ‘digo’, sin sobrecargar el español.
- source_word: Χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: El contexto es de función salvífico-histórica y de promesas a Israel; por eso se conserva el valor titular de Χριστός como ‘Mesías’.
- source_word: διάκονον
  english_pob_choice: a servant
  chosen_spanish: servidor
  alternatives_spanish:
  - siervo
  - ministro
  lexicon: BDAG
  rationale: διάκονος aquí señala una función de servicio comisionado. ‘Servidor’ suena natural en español y evita el sentido eclesiástico posterior de ‘ministro’. Se evita ‘siervo’ porque en esta frase el matiz funcional se comunica mejor con ‘servidor’.
- source_word: γεγενῆσθαι
  english_pob_choice: has become
  chosen_spanish: se ha hecho
  alternatives_spanish:
  - ha llegado a ser
  - ha venido a ser
  lexicon: BDAG
  rationale: El perfecto infinitivo de γίνομαι expresa un estado resultante. ‘Se ha hecho’ conserva ese resultado de manera idiomática en español.
- source_word: περιτομῆς
  english_pob_choice: to the circumcised
  chosen_spanish: de los circuncisos
  alternatives_spanish:
  - para los circuncisos
  - de la circuncisión
  lexicon: BDAG
  rationale: El genitivo se refiere al pueblo circuncidado, es decir, al ámbito judío. ‘De los circuncisos’ reproduce bien la relación y es más transparente que ‘de la circuncisión’.
- source_word: ὑπὲρ ἀληθείας θεοῦ
  english_pob_choice: for the sake of God's truth
  chosen_spanish: por la verdad de Dios
  alternatives_spanish:
  - por la veracidad de Dios
  - por la fidelidad de Dios
  lexicon: BDAG
  rationale: ὑπέρ aquí expresa beneficio o finalidad, de modo que ‘por’ comunica bien el sentido. ἀλήθεια θεοῦ puede abarcar verdad y fidelidad; la forma principal ‘verdad de Dios’ conserva la ambigüedad sin resolverla en exceso.
- source_word: εἰς τὸ βεβαιῶσαι
  english_pob_choice: in order to confirm
  chosen_spanish: para confirmar
  alternatives_spanish:
  - con el fin de confirmar
  - para establecer
  lexicon: BDAG
  rationale: La construcción indica propósito. ‘Para confirmar’ es exacto y claro en español para βεβαιόω en este contexto de promesas.
- source_word: τὰς ἐπαγγελίας
  english_pob_choice: the promises
  chosen_spanish: las promesas
  alternatives_spanish:
  - las promesas hechas
  - los compromisos
  lexicon: BDAG
  rationale: Es la traducción estándar y adecuada en un contexto pactual.
- source_word: τῶν πατέρων
  english_pob_choice: to the fathers
  chosen_spanish: a los padres
  alternatives_spanish:
  - a los patriarcas
  - a los antepasados
  lexicon: BDAG
  rationale: ‘Los padres’ conserva la huella bíblica y la referencia salvífico-histórica a los antepasados de Israel. En español suena natural en contexto bíblico.
theological_decisions:
- issue: Rendering Χριστός as title rather than name-form
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El verso enlaza a Jesús con la circuncisión y las promesas a los padres; el título mesiánico es central. ‘Mesías’ mantiene el valor de título y evita tratarlo como simple nombre propio.
  doctrine_reference: 'DOCTRINE.md: contested terms — Χριστός default ''Messiah'' where title'
- issue: Nuance of ἀλήθεια θεοῦ
  english_pob_reading: God's truth
  chosen_spanish_reading: la verdad de Dios
  alternative_spanish_readings:
  - la veracidad de Dios
  - la fidelidad de Dios
  rationale: La expresión puede referir tanto a la verdad de Dios como a su fidelidad/veracidad en cumplir sus promesas. Como la cláusula siguiente menciona la confirmación de las promesas a los padres, se conserva la ambigüedad en el texto principal y se deja abierta la lectura de fidelidad implícita.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolving it prematurely'
- issue: διάκονος applied to the Messiah
  english_pob_reading: has become a servant
  chosen_spanish_reading: se ha hecho servidor
  alternative_spanish_readings:
  - se ha hecho siervo
  - ha sido constituido servidor
  rationale: La frase subraya la función de servicio del Mesías hacia Israel, no un cargo eclesial. ‘Servidor’ comunica bien esa idea en español contemporáneo.
  doctrine_reference: 'DOCTRINE.md: lexical precision in service-language'
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de SBLGNT y toma en cuenta el expediente en inglés: se mantuvo Χριστός como título mesiánico; se respetó el valor funcional de διάκονον; se conservó la ambigüedad de ἀλήθεια θεοῦ en una formulación que admite tanto ‘verdad’ como ‘veracidad/fidelidad’; y se reflejó la corrección revisada de la relación de περιτομῆς con el grupo destinatario (‘a/de los circuncisos’ en vez de una construcción menos natural).'
  spanish_consistency_notes:
  - Se usó ‘Mesías’ de forma consistente con la política del proyecto para Χριστός cuando actúa como título.
  - ‘Servidor’ se eligió por claridad moderna y para evitar el anacronismo de ‘deacon/ministro’ como oficio.
  - ‘Los circuncisos’ mantiene la referencia histórica a Israel sin sustituirla por una paráfrasis interpretativa.
  - 'La puntuación y el orden reproducen la lógica causal y final del original: explicación, servicio, finalidad, confirmación de promesas.'
