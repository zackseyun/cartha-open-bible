    rationale: El English POB eligió «Gentiles» en el texto principal por el énfasis de Romanos 15 en la inclusión de los no judíos junto con el pueblo de Dios. Mantener «naciones» como principal oscurece ese punto contextual y revierte la lógica de texto principal/nota.
  - severity: medium
    issue: La nota al pie está invertida respecto de la alternativa documentada.
    rationale: Si el texto principal pasa a «gentiles», la nota debe preservar la alternativa «naciones», no al revés.
