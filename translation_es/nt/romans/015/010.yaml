lexical_decisions:
- source_word: καὶ πάλιν λέγει
  english_pob_choice: And again he says
  chosen_spanish: Y otra vez dice
  alternatives_spanish:
  - Y de nuevo dice
  - Y otra vez él dice
  lexicon: SBLGNT; BDAG
  rationale: La fórmula de cita mantiene el presente discursivo de λέγει y el valor introductorio de πάλιν como repetición de una cita bíblica. «Otra vez» suena natural en español y conserva la función de encadenar testimonios escriturales.
- source_word: Εὐφράνθητε
  english_pob_choice: Rejoice
  chosen_spanish: Alégrense
  alternatives_spanish:
  - Regocíjense
  - Alégrense mucho
  lexicon: BDAG
  rationale: El imperativo aoristo pasivo funciona idiomáticamente como exhortación intransitiva. «Alégrense» conserva el tono exhortativo y es natural en español bíblico contemporáneo.
- source_word: ἔθνη
  english_pob_choice: Gentiles
  chosen_spanish: naciones
  alternatives_spanish:
  - gentiles
  - pueblos
  lexicon: BDAG
  rationale: Aunque en Romanos el contexto destaca la inclusión de los gentiles, la cita del AT tiene el matiz lexical de «naciones». Se conserva esa amplitud en el texto principal, dejando abierta la lectura contextual sin forzarla.
- source_word: μετὰ τοῦ λαοῦ αὐτοῦ
  english_pob_choice: with his people
  chosen_spanish: con su pueblo
  alternatives_spanish:
  - junto con su pueblo
  - con el pueblo de él
  lexicon: BDAG
  rationale: μετά con genitivo expresa asociación, y «con su pueblo» reproduce de modo natural la relación sin añadir explicaciones interpretativas.
- source_word: λαοῦ
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - pueblo de Israel
  - gente
  lexicon: BDAG
  rationale: «Pueblo» preserva el sentido de λαός como comunidad de pertenencia. En esta cita, especificar «Israel» sería una aclaración contextual legítima pero no necesaria en el texto base.
theological_decisions:
- issue: ἔθνη en una cita paulina sobre la alabanza conjunta de judíos y no judíos
  english_pob_reading: Gentiles
  chosen_spanish_reading: naciones
  alternative_spanish_readings:
  - gentiles
  rationale: En el contexto inmediato de Romanos 15, la referencia teológica apunta a la inclusión de los gentiles. Sin embargo, el vocablo griego citado desde el AT mantiene su amplitud semántica de «naciones». El texto principal conserva esa amplitud y no niega la lectura contextual; la alternativa más específica puede mantenerse implícita por el contexto.
  doctrine_reference: Romanos 15:8-12; filosofía de traducción POB sobre amplitud lexical y contexto paulino
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustantivos; se conserva el presente de cita («dice») y la decisión contextual sobre ἔθνη con una alternativa de nota.
  spanish_consistency_notes:
  - Se usa «pueblo» para λαός de forma consistente con el término de pacto sin especificar «Israel» en el texto principal.
  - Se mantiene «naciones» en el cuerpo por fidelidad al griego citado, y la nota preserva la alternativa contextual «gentiles».
  - El registro es bíblico y claro, evitando calcos como «regocíjense» donde «alégrense» comunica mejor la exhortación en español.
