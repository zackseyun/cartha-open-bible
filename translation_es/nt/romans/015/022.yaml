translation:
  language: es
  text: Por eso también muchas veces[a] se me impedía ir a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a menudo» o «repetidas veces»; la expresión griega τὰ πολλὰ es un modismo que indica repetición frecuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Introduce la conclusión lógica de lo dicho antes. «Por eso» mantiene la relación inferencial en un español natural y claro.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: BDAG
  rationale: Añade la circunstancia personal de Pablo con fuerza inclusiva. «También» reproduce bien el valor aditivo.
- source_word: ἐνεκοπτόμην
  english_pob_choice: was hindered
  chosen_spanish: era impedido
  alternatives_spanish:
  - fui impedido
  - era estorbado
  - se me impedía
  lexicon: BDAG
  rationale: El imperfecto pasivo señala una acción repetida o prolongada en el pasado. «Era impedido» conserva esa continuidad y la voz pasiva sin introducir un agente no expresado.
- source_word: τὰ πολλὰ
  english_pob_choice: often
  chosen_spanish: muchas veces
  alternatives_spanish:
  - a menudo
  - repetidas veces
  - frecuentemente
  lexicon: BDAG
  rationale: La frase acusativa funciona adverbialmente e indica repetición frecuente. «Muchas veces» refleja bien la idiomaticidad y deja visible la idea de reiteración documentada por el texto griego.
- source_word: τοῦ ἐλθεῖν
  english_pob_choice: from coming
  chosen_spanish: de ir
  alternatives_spanish:
  - de venir
  - de llegar
  - de venir a
  lexicon: BDAG
  rationale: El infinitivo articular con τοῦ expresa la acción de la que Pablo fue impedido. En español, «ir» comunica el movimiento hacia los romanos de manera natural; «venir» dependería del punto de vista del hablante y puede sonar menos directo aquí.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - hacia ustedes
  - a vosotros
  lexicon: BDAG
  rationale: πρός con acusativo indica movimiento hacia los destinatarios. «A ustedes» es un español reverente y ampliamente comprensible en América Latina; mantiene el sentido direccional sin añadir «visitar».
theological_decisions:
- issue: Mantenimiento de la frecuencia implícita en τὰ πολλὰ
  english_pob_reading: many times / repeatedly, with 'often' in the main text
  chosen_spanish_reading: muchas veces en el texto principal, con la noción de repetición preservada
  alternative_spanish_readings:
  - a menudo
  - repetidas veces
  rationale: 'No se debe borrar la tensión lexical: τὰ πολλὰ no es meramente un adverbio genérico, sino un modismo de repetición frecuente. «Muchas veces» conserva esa fuerza y permite la misma nota explicativa que el audit trail inglés.'
  doctrine_reference: No doctrinal issue; lexical precision only.
translation_notes:
  revision_awareness: 'Se siguió el sentido del texto griego y el audit trail inglés sin cambios sustantivos respecto a la lectura base: una afirmación personal de Pablo sobre impedimentos repetidos para ir a los romanos. Se preservó la ambigüedad idiomática de τὰ πολλὰ mediante una nota de alternativa léxica.'
  spanish_consistency_notes:
  - Se usó «Por eso» para Διὸ como conector inferencial natural en español.
  - Se eligió «era impedido» para mantener el imperfecto y la pasiva del griego.
  - Se evitó traducir mecánicamente «venía»/«venir» porque el movimiento hacia los destinatarios se expresa mejor con «ir» en español.
  - Se mantuvo un registro neutral y eclesialmente legible, sin sustituir la fuerza del original por formulaciones más tradicionales que no estén exigidas por la fuente.
