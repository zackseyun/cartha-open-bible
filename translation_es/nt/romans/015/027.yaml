translation:
  language: es
  text: Porque se complacieron en hacerlo, y son deudores de ellos. Pues si los gentiles[a] han participado de sus cosas espirituales[b], también deben servirles en las cosas materiales[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las naciones» para «los gentiles».
    reason: lexical_alternative
  - marker: b
    text: O «sus bendiciones espirituales». El griego dice literalmente «sus cosas espirituales».
    reason: lexical_alternative
  - marker: c
    text: Literalmente «en cosas carnales»; aquí el sentido es material o corporal, en contraste con las cosas espirituales.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐδόκησαν
  english_pob_choice: were pleased to do it
  chosen_spanish: se complacieron en hacerlo
  alternatives_spanish:
  - estuvieron dispuestos a hacerlo
  - les pareció bien hacerlo
  lexicon: BDAG
  rationale: El aoristo de εὐδοκέω expresa aprobación gozosa o voluntad favorable. «Se complacieron en hacerlo» comunica esa disposición positiva sin añadir más contenido del que exige el contexto inmediato de la ofrenda.
- source_word: ὀφειλέται εἰσὶν αὐτῶν
  english_pob_choice: they are indebted to them
  chosen_spanish: son deudores de ellos
  alternatives_spanish:
  - les deben a ellos
  - están obligados con ellos
  lexicon: BDAG
  rationale: ὀφειλέται señala obligación o deuda. «Son deudores de ellos» mantiene esa fuerza relacional y evita suavizar la idea de obligación que Pablo afirma.
- source_word: τὰ ἔθνη
  english_pob_choice: the Gentiles
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  lexicon: BDAG
  rationale: 'Aquí se conserva una alternativa literal legítima: ἔθνη puede significar «naciones». El contexto paulino puede contrastar con Israel/Jerusalén, pero el griego no nombra explícitamente «gentiles» en esta forma; por eso se deja «las naciones» y se documenta la alternativa tradicional.'
- source_word: τοῖς πνευματικοῖς αὐτῶν
  english_pob_choice: their spiritual things
  chosen_spanish: sus cosas espirituales
  alternatives_spanish:
  - sus bienes espirituales
  - sus bendiciones espirituales
  lexicon: BDAG
  rationale: El adjetivo πνευματικός está sustantivado. «Sus cosas espirituales» sigue de cerca la forma griega y evita introducir «bendiciones», que el sustantivo no expresa de manera explícita.
- source_word: ἐκοινώνησαν
  english_pob_choice: have shared in
  chosen_spanish: han compartido en
  alternatives_spanish:
  - han participado en
  - han tenido parte en
  lexicon: BDAG
  rationale: κοινωνέω indica participación o compartir. «Han compartido en» refleja esa relación de participación y encaja naturalmente con el dativo del griego.
- source_word: ἐν τοῖς σαρκικοῖς
  english_pob_choice: in material things
  chosen_spanish: en las cosas materiales
  alternatives_spanish:
  - en las cosas carnales
  - en asuntos materiales
  lexicon: BDAG
  rationale: σαρκικός aquí no es ético sino relativo a lo corporal/material, en contraste con lo espiritual. «Cosas materiales» preserva ese contraste en español sin cargar la expresión de connotaciones negativas de «carnales».
- source_word: λειτουργῆσαι
  english_pob_choice: to minister
  chosen_spanish: servirles
  alternatives_spanish:
  - ministrarles
  - prestarles servicio
  lexicon: BDAG
  rationale: λειτουργέω puede denotar servicio con dignidad pública. En español, «servirles» comunica la obligación práctica de apoyo material sin restringir indebidamente el verbo a un uso eclesiástico técnico.
theological_decisions:
- issue: Sentido de σαρκικοῖς en contraste con πνευματικοῖς
  english_pob_reading: material things
  chosen_spanish_reading: cosas materiales
  alternative_spanish_readings:
  - cosas carnales
  rationale: El pasaje trata de la colecta para Jerusalén, así que σαρκικοῖς se refiere a ayuda física/material, no a la «carne» en sentido moral. Se conserva el contraste con «cosas espirituales» y se evita oscurecerlo con un sentido ético que el contexto no apoya.
  doctrine_reference: 'DOCTRINE.md: Contested terms table on σάρξ / sarx; Translation philosophy #5'
- issue: Referente de αὐτῶν / αὐτοῖς
  english_pob_reading: the Jerusalem Jewish believers/saints are the ones to whom the Gentiles are indebted
  chosen_spanish_reading: las naciones quedan en deuda con los creyentes/santos de Jerusalén
  alternative_spanish_readings:
  - Israel en sentido amplio
  rationale: El contexto inmediato en Romanos 15:25–26 habla de la colecta para los santos en Jerusalén. Por eso la obligación se entiende primariamente hacia ellos, aunque el razonamiento de Pablo también tiene un trasfondo salvífico más amplio.
  doctrine_reference: Contexto inmediato de Romanos 15:25–26; notas de referencia POB
translation_notes:
  revision_awareness: 'El pasaje coincide con el último pase de revisión: no se registraron cambios respecto del texto auditado en inglés, y la evaluación cruzada informó alto acuerdo. La redacción española mantiene el contraste semántico entre «espirituales» y «materiales», conserva la idea de obligación/deuda y documenta la alternativa literal de ἔθνη y σαρκικοῖς.'
  spanish_consistency_notes:
  - Se usa «cosas espirituales» para πνευματικοῖς, en coherencia con el sustantivo griego implícito.
  - Se usa «cosas materiales» para σαρκικοῖς, evitando el falso sentido moral de «carnales».
  - 'Se mantiene una formulación explícita de obligación: «son deudores».'
  - Se conserva el orden y la lógica causal de dos cláusulas con «porque / pues» para reflejar el doble γάρ del griego.
