    reason: lexical_alternative
  - marker: b
    text: Or 'their spiritual blessings.' The Greek says 'their spiritual things.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'in fleshly things'; here the sense is material or bodily support, in contrast to spiritual things.
    reason: lexical_alternative
