base_translation:
  language: en
  yaml_path: translation/nt/romans/015/027.yaml
  text: For they were pleased to do it[a], and they are indebted to them. For if the Gentiles have shared in their spiritual things[c][b], they also owe it to minister to them in material things.
  footnotes:
