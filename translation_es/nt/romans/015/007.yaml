translation:
  language: es
  text: Por eso, recíbanse unos a otros[a], como también el Mesías[b] los recibió, para la gloria de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'acéptense unos a otros' / 'recíbanse unos a otros'.
    reason: lexical_alternative
  - marker: b
    text: O 'Cristo' para 'el Mesías'.
    reason: alternative_reading
lexical_decisions:
- source_word: Διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Expresa con naturalidad la conexión inferencial con lo anterior sin volverla rígidamente formal. En español, 'Por eso' comunica bien la consecuencia argumentativa.
- source_word: προσλαμβάνεσθε
  english_pob_choice: welcome
  chosen_spanish: recíbansen
  alternatives_spanish:
  - acójanse
  - den la bienvenida a
  lexicon: BDAG
  rationale: El verbo griego implica recepción activa y relacional entre creyentes. 'Recíbansen' conserva la reciprocidad y evita una paráfrasis demasiado libre; 'acójanse' y 'den la bienvenida a' serían opciones posibles, pero la primera mantiene mejor la fuerza verbal.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - mutuamente
  - entre sí
  lexicon: BDAG
  rationale: Reproduce de forma natural la reciprocidad mutua del pronombre sin perder claridad en español.
- source_word: ὁ Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí λειτουργa como título y no como forma litúrgica fija; 'Mesías' preserva el sentido hebraico del término, conforme a la decisión auditable de la POB en inglés.
- source_word: προσελάβετο
  english_pob_choice: welcomed
  chosen_spanish: recibió
  alternatives_spanish:
  - acogió
  - aceptó
  lexicon: BDAG
  rationale: Mantiene la correspondencia verbal con προσλαμβάνεσθε y conserva el campo semántico de recepción/aceptación. 'Recibió' es más directo y menos interpretativo que 'acogió' en este contexto.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: En español latinoamericano, el clítico 'los' fluye naturalmente con 'recibió' y preserva el objeto plural de forma idiomática.
- source_word: εἰς δόξαν τοῦ θεοῦ
  english_pob_choice: for the glory of God
  chosen_spanish: para la gloria de Dios
  alternatives_spanish:
  - con miras a la gloria de Dios
  - para honra de Dios
  lexicon: BDAG
  rationale: '''Para'' expresa bien el valor final/teleológico de εἰς con δόξαν, y ''gloria de Dios'' conserva el uso estándar para δόξα sin suavizarlo a ''honra''.'
theological_decisions:
- issue: Renderización de Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La lectura titulativa de Χριστός se conserva con 'Mesías' para evitar que el término se opaque como nombre propio. Esto mantiene la intención confesional e histórica del título sin cambiar la cristología.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός *Christos*'
- issue: Sentido comunitario de προσλαμβάνομαι
  english_pob_reading: welcome one another
  chosen_spanish_reading: recíbansen unos a otros
  alternative_spanish_readings:
  - acéptense unos a otros
  - acójanse unos a otros
  rationale: El contexto de Romanos 14–15 trata la recepción mutua en la comunidad; 'recibirse' conserva el acto relacional sin imponer una interpretación más estrecha de 'aceptar'.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5, 6'
- issue: εἰς δόξαν τοῦ θεοῦ
  english_pob_reading: for the glory of God
  chosen_spanish_reading: para la gloria de Dios
  alternative_spanish_readings:
  - con el fin de la gloria de Dios
  - en orden a la gloria de Dios
  rationale: La frase se entiende como finalidad o resultado; 'para' comunica esa orientación sin añadir matices doctrinales no explicitados por el griego.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 4'
translation_notes:
  revision_awareness: La versión en inglés fue revisada de 'to the glory of God' a 'for the glory of God' para reflejar mejor εἰς δόξαν τοῦ θεοῦ. En español, 'para la gloria de Dios' ya expresa naturalmente ese valor final, así que se mantuvo esa orientación semántica sin forzar un calco.
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' para Χριστός según la política terminológica del proyecto cuando el término funciona como título.
  - Se usó 'recíbansen' para conservar la reciprocidad implícita de ἀλλήλους y el imperativo comunitario del pasaje.
  - '''Gloria de Dios'' se mantuvo como traducción estándar de δόξα τοῦ θεοῦ, sin reemplazarla por ''honra''.'
  - El registro es bíblico y claro, evitando arcaísmos innecesarios pero preservando solemnidad.
