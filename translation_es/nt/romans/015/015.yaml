    text: Or 'more boldly ... on some points.' The phrase can mean that Paul wrote with greater boldness, or that he wrote boldly with reference to certain matters.
    reason: lexical_alternative
  - marker: b
    text: The expression 'the grace given to me by God' refers here to Paul's God-given ministry or commission, not merely to grace in a general sense.
