revisions:
- from: Pero les he escrito con algo de atrevimiento, en parte[a], como para recordarles, por la gracia dada a mí por Dios[b],
  to: Pero les he escrito con bastante atrevimiento, en parte[a], como para recordarles, por la gracia que me fue dada por Dios[b],
  rationale: Se ajusta τολμηρότερον a «con bastante atrevimiento» para conservar mejor la fuerza comparativa sin volver el español torpe, y se reemplaza «dada a mí» por «que me fue dada» para una sintaxis más natural y digna. Se mantienen el resto de las decisiones porque reflejan bien el griego y el audit trail inglés, incluida la nota sobre «en parte» y la explicación ministerial de «gracia».
