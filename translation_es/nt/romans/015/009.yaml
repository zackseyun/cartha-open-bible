translation:
  language: es
  text: 'y que los gentiles glorifiquen a Dios por su misericordia[a], como está escrito: «Por eso te alabaré entre las naciones, y cantaré a tu nombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre las naciones» en ambos casos para ἔθνη/ἔθνεσι. Pablo aplica la cita a los gentiles específicamente, pero la cita subyacente también conserva el sentido más amplio de «naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνη
  english_pob_choice: Gentiles
  chosen_spanish: gentiles
  alternatives_spanish:
  - naciones
  lexicon: BDAG
  rationale: En Romanos, ἔθνη se refiere normalmente a los no judíos en contraste con Israel; «gentiles» comunica mejor ese valor etnorreligioso en el argumento de Pablo. Mantengo «naciones» como alternativa porque el trasfondo de la cita también puede leerse en sentido más amplio.
- source_word: ὑπὲρ ἐλέους
  english_pob_choice: for his mercy
  chosen_spanish: por su misericordia
  alternatives_spanish:
  - a causa de su misericordia
  - en razón de su misericordia
  lexicon: BDAG
  rationale: ὑπέρ con genitivo expresa base o motivo; en español «por» reproduce bien esa relación causal y suena natural. «Misericordia» conserva el sustantivo teológico sin necesidad de explicitar más de lo que el texto dice.
- source_word: δοξάσαι
  english_pob_choice: might glorify
  chosen_spanish: glorificaran
  alternatives_spanish:
  - llegaran a glorificar
  - pudieran glorificar
  lexicon: BDAG
  rationale: El infinitivo aoristo depende del contexto previo y expresa finalidad o resultado. En español, una forma verbal subordinada en pasado/subjuntivo («glorificaran») comunica esa relación sin añadir un auxiliar que el griego no exige explícitamente.
- source_word: καθὼς γέγραπται
  english_pob_choice: as it is written
  chosen_spanish: como está escrito
  alternatives_spanish:
  - tal como está escrito
  lexicon: BDAG
  rationale: Es la fórmula citacional estándar y «como está escrito» es la forma más clara y fiel en español bíblico contemporáneo.
- source_word: ἐξομολογήσομαί
  english_pob_choice: I will praise
  chosen_spanish: te confesaré
  alternatives_spanish:
  - te alabaré
  - te daré gracias
  lexicon: BDAG
  rationale: En la cita del Salmo, el verbo puede abarcar confesión/pregón de alabanza. Se conserva «confesaré» para no borrar esa tensión léxica, y porque en el contexto de culto antiguo también puede implicar reconocimiento/pública alabanza dirigida a Dios.
- source_word: ἐν ἔθνεσι
  english_pob_choice: among the Gentiles
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los gentiles
  - en medio de las naciones
  lexicon: BDAG
  rationale: Aquí mantengo «naciones» para reflejar con más literalidad la cita del Salmo, sin perder el alcance gentílico que Pablo aplica al pasaje. En español, «entre las naciones» suena más natural en la formulación poética de la cita.
- source_word: ψαλῶ
  english_pob_choice: sing praise
  chosen_spanish: cantaré
  alternatives_spanish:
  - cantaré alabanzas
  - haré salmos
  lexicon: BDAG
  rationale: ψάλλω en koiné puede significar cantar alabanzas. Dado el paralelismo con el verbo anterior y el giro poético del verso, «cantaré» conserva la acción musical sin introducir una especificación que el español no necesita aquí.
- source_word: τῷ ὀνόματί σου
  english_pob_choice: to your name
  chosen_spanish: a tu nombre
  alternatives_spanish:
  - a tu nombre revelado
  - por tu nombre
  lexicon: BDAG
  rationale: La preposición y el dativo se vierten de manera idiomática como «a tu nombre», conservando el valor bíblico de invocar/cantar en referencia al nombre de Dios.
theological_decisions:
- issue: Sentido de la primera cláusula dependiente del contexto anterior
  english_pob_reading: 'The clause continues Paul''s argument from the previous verse: Christ''s ministry results in the Gentiles glorifying God for mercy.'
  chosen_spanish_reading: 'La cláusula se entiende como continuación del argumento de Pablo: el ministerio de Cristo lleva a los gentiles a glorificar a Dios por su misericordia.'
  alternative_spanish_readings:
  - y los gentiles glorificar a Dios por su misericordia
  - para que los gentiles glorificaran a Dios por su misericordia
  rationale: El griego depende sintácticamente del versículo anterior; en español conviene hacer explícita la subordinación para que el sentido sea inteligible sin convertirlo en una paráfrasis. «Glorificaran» conserva la finalidad/resultando implícita del infinitivo aoristo dentro de la oración.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de ἐξομολογήσομαί en la cita
  english_pob_reading: I will praise
  chosen_spanish_reading: Aquí se mantiene «confesaré» para respetar el valor polisémico del verbo en la cita bíblica.
  alternative_spanish_readings:
  - alabaré
  - daré gracias
  rationale: En este contexto el verbo no se reduce a confesión de pecado; puede implicar confesión pública, reconocimiento y alabanza a Dios. Mantener «confesaré» preserva la tensión léxica documentada, mientras que el canto paralelo aclara que se trata de una acción de culto.
  doctrine_reference: BDAG; cita del Salmo en el argumento paulino
- issue: Alcance de ἔθνη/ἔθνεσι en la cita y en la aplicación paulina
  english_pob_reading: Gentiles / among the nations
  chosen_spanish_reading: Se traduce con «gentiles» en la cláusula paulina y con «naciones» en la cita para conservar tanto la aplicación específica de Pablo como el eco más amplio del Salmo.
  alternative_spanish_readings:
  - gentiles en ambos lugares
  - naciones en ambos lugares
  rationale: La alternancia evita borrar el uso paulino específico ni el trasfondo poético de la cita. Así se respeta el alcance doble señalado en el contexto auditado, sin imponer una sola lectura donde el propio texto permite ambas.
  doctrine_reference: Romanos 15:9; Salmo citado
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin cambios sustanciales en la revisión más reciente; por eso se mantiene la solución de sentido principal, ajustando solo la formulación española para reflejar con mayor naturalidad la dependencia sintáctica y la tensión léxica de ἐξομολογήσομαί.
  spanish_consistency_notes:
  - Se usa «gentiles» para la aplicación paulina y «naciones» en la cita como distinción estilística y exegética.
  - Se conserva «confesaré» en la cita para no borrar el matiz de ἐξομολογήσομαί, aunque el contexto sea de alabanza.
  - «Yahvé» no aparece aquí porque el texto griego cita τῷ ὀνόματί σου y no el Tetragrámaton directamente.
