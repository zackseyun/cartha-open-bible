translation:
  language: es
  text: Porque todo lo que se escribió antes, para nuestra instrucción[a], se escribió, para que por la perseverancia y por el aliento[b] de las Escrituras tengamos esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enseñanza». διδασκαλία puede traducirse como instrucción o enseñanza; aquí se eligió «instrucción» por su matiz formativo.
    reason: lexical_alternative
  - marker: b
    text: O «consuelo» o «exhortación». παράκλησις puede significar aliento, consuelo o exhortación; el contexto de esperanza favorece «aliento» como fortalecimiento que sostiene la esperanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσα
  english_pob_choice: whatever
  chosen_spanish: todo lo que
  alternatives_spanish:
  - lo que sea
  - cuanto
  lexicon: BDAG
  rationale: ὅσα es neutro plural y abarca de manera amplia lo previamente escrito. En español, «todo lo que» transmite esa amplitud sin sonar forzado.
- source_word: προεγράφη
  english_pob_choice: was written beforehand
  chosen_spanish: se escribió antes
  alternatives_spanish:
  - se escribió previamente
  - se escribió de antemano
  lexicon: BDAG
  rationale: El prefijo προ- señala anterioridad. «Se escribió antes» conserva el valor temporal de forma natural en español.
- source_word: εἰς τὴν ἡμετέραν διδασκαλίαν
  english_pob_choice: for our instruction
  chosen_spanish: para nuestra instrucción
  alternatives_spanish:
  - para nuestra enseñanza
  - para nuestro aprendizaje
  lexicon: BDAG
  rationale: εἰς con acusativo expresa finalidad. διδασκαλία puede ser «enseñanza» o «instrucción»; aquí «instrucción» refleja mejor la función formativa del texto y la formulación del POB inglés.
- source_word: ἐγράφη
  english_pob_choice: was written
  chosen_spanish: se escribió
  alternatives_spanish:
  - fue escrito
  - quedó escrito
  lexicon: BDAG
  rationale: El pasivo simple de γράφω se repite en el versículo y conviene conservar esa repetición en español para mantener el énfasis retórico.
- source_word: διὰ τῆς ὑπομονῆς
  english_pob_choice: through the endurance
  chosen_spanish: por la perseverancia
  alternatives_spanish:
  - por la paciencia
  - por la resistencia
  lexicon: BDAG
  rationale: ὑπομονή denota perseverancia paciente bajo dificultad. «Perseverancia» es una equivalencia natural y fiel; «paciencia» sería más débil en este contexto.
- source_word: διὰ τῆς παρακλήσεως τῶν γραφῶν
  english_pob_choice: through the encouragement of the Scriptures
  chosen_spanish: por el consuelo de las Escrituras
  alternatives_spanish:
  - por el ánimo de las Escrituras
  - por la exhortación de las Escrituras
  lexicon: BDAG
  rationale: παράκλησις admite «consuelo», «ánimo», «exhortación» o «encouragement». Aquí se mantiene una opción amplia y bíblicamente reconocible; el contexto permite esta traducción sin cerrar la tensión semántica.
- source_word: τῶν γραφῶν
  english_pob_choice: of the Scriptures
  chosen_spanish: de las Escrituras
  alternatives_spanish:
  - de los escritos
  lexicon: BDAG
  rationale: En Pablo, γραφή normalmente refiere a las Escrituras sagradas. «Escrituras» comunica ese referente con claridad en español.
- source_word: τὴν ἐλπίδα
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - la esperanza
  lexicon: BDAG
  rationale: El sustantivo abstracto se expresa naturalmente como «esperanza». El artículo griego no exige aquí traducirse de manera rígida.
- source_word: ἔχωμεν
  english_pob_choice: we might have
  chosen_spanish: tengamos
  alternatives_spanish:
  - podamos tener
  - tengamos esperanza
  lexicon: BDAG
  rationale: La cláusula de propósito con ἵνα + subjuntivo admite un español natural con subjuntivo final. «Tengamos» mantiene el valor de finalidad sin sobrecargar la frase.
theological_decisions:
- issue: Relación entre las Escrituras, la perseverancia y la esperanza
  english_pob_reading: The verse states that previously written Scripture serves believers' instruction and, through its endurance-producing and encouraging ministry, leads to hope.
  chosen_spanish_reading: El versículo afirma que lo escrito antes sirve para nuestra instrucción y, por medio de la perseverancia y del consuelo que las Escrituras comunican, conduce a la esperanza.
  alternative_spanish_readings:
  - '...por medio de la perseverancia y del ánimo de las Escrituras...'
  - '...por medio del consuelo que brindan las Escrituras...'
  rationale: Se conserva la ambigüedad funcional del genitivo sin resolverla de forma dogmática. La frase española permite que el lector vea la conexión entre Escrituras, perseverancia y esperanza sin restringir indebidamente el sentido.
  doctrine_reference: Preservar la tensión interpretativa documentada en el POB.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca en el texto español exactamente donde corresponde. La redacción mantiene el paralelismo del griego y la decisión lexical del POB inglés, sin introducir una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se usa «Escrituras» con mayúscula para γραφῶν, siguiendo el referente bíblico reconocido en el contexto paulino.
  - Se mantiene el subjuntivo final «tengamos» para ἵνα + subjuntivo.
  - Se evita «SEÑOR» o terminología no presente en el versículo; no hay referencia directa al Tetragrámaton aquí.
  - «Perseverancia» se prefiere sobre «paciencia» por la fuerza de ὑπομονή en contextos de resistencia bajo prueba.
