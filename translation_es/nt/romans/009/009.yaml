translation:
  language: es
  text: 'Porque esta es la palabra de la promesa: «Para este tiempo yo vendré[a], y Sara tendrá un hijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «volveré». El griego aquí dice «vendré», aunque algunas traducciones reflejan el trasfondo de Génesis como «volveré».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπαγγελίας
  english_pob_choice: of promise
  chosen_spanish: de la promesa
  alternatives_spanish:
  - promisoria
  - de promesa
  lexicon: BDAG
  rationale: El genitivo modifica a λόγος y expresa una relación atributiva. «De la promesa» conserva con naturalidad en español el énfasis paulino en la promesa divina sin forzar una paráfrasis.
- source_word: λόγος
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - declaración
  lexicon: BDAG
  rationale: Aquí λόγος introduce la cita divina misma; «palabra» es la equivalencia más directa y readable en español bíblico, sin volverlo innecesariamente explicativo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La partícula introduce la razón de la afirmación previa. «Porque» expresa bien la conexión lógica en español y mantiene el valor explicativo.
- source_word: Κατὰ τὸν καιρὸν τοῦτον
  english_pob_choice: At this time
  chosen_spanish: A este tiempo
  alternatives_spanish:
  - En este tiempo
  - Para este tiempo
  - A la sazón
  lexicon: BDAG
  rationale: La frase reproduce la fórmula temporal de la promesa y apunta al momento señalado de cumplimiento. «A este tiempo» conserva esa referencia deíctica y resulta natural en español.
- source_word: ἐλεύσομαι
  english_pob_choice: I will come
  chosen_spanish: yo vendré
  alternatives_spanish:
  - yo iré
  - yo llegaré
  - yo volveré
  lexicon: BDAG
  rationale: El griego dice literalmente «vendré». Se mantiene esa forma para respetar la primacía del texto fuente, evitando «volveré», que sería una harmonización interpretativa con el trasfondo de Génesis.
- source_word: ἔσται τῇ Σάρρᾳ υἱός
  english_pob_choice: Sarah will have a son
  chosen_spanish: Sara tendrá un hijo
  alternatives_spanish:
  - habrá para Sara un hijo
  - a Sara le será un hijo
  - Sara tendrá un hijo varón
  lexicon: BDAG
  rationale: 'La construcción griega expresa idiomáticamente posesión o asignación: «será para Sara un hijo». En español, «tendrá un hijo» comunica el sentido sin aspereza, y «hijo» conserva el valor específico del sustantivo υἱός.'
- source_word: Σάρρᾳ
  english_pob_choice: Sarah
  chosen_spanish: Sara
  alternatives_spanish:
  - Sarah
  lexicon: BDAG
  rationale: Se usa la forma española habitual del nombre propio en traducción bíblica para una lectura natural y reconocible.
theological_decisions:
- issue: Cita de la promesa abrahámica y fidelidad al verbo griego de venir
  english_pob_reading: Preserve the promise straightforwardly as God's direct speech without importing interpretive expansions.
  chosen_spanish_reading: Conservar la promesa como habla directa de Dios, sin añadir «volveré» ni otra armonización interpretativa.
  alternative_spanish_readings:
  - «A este tiempo yo volveré»
  - «En este tiempo regresaré»
  rationale: El argumento de Pablo se apoya en la promesa divina tal como está formulada en Romanos. La traducción debe respetar el verbo griego y, a la vez, dejar visible la posible tensión con el eco veterotestamentario.
  doctrine_reference: Primacía del texto fuente; preservación de la tensión exegética sin resolverla por anticipado.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el control de revisión más reciente: no se requiere ajuste adicional respecto del texto auditado en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero en este versículo no aparece el tetragrámaton ni un equivalente directo.
  - Se emplea «palabra» para λόγος por ser el término más natural y fiel al contexto de una cita divina.
  - Se conserva la distinción entre «vendré» y la alternativa interpretativa «volveré», siguiendo la prioridad del griego de Romanos sobre una armonización con Génesis.
  - Se usa «Sara» como forma española habitual del nombre propio, sin alterar el referente bíblico.
