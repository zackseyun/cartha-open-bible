revisions:
- from: 'Porque esta es la palabra de la promesa: «A este tiempo yo vendré[a], y Sara tendrá un hijo».'
  to: 'Porque esta es la palabra de la promesa: «Para este tiempo yo vendré[a], y Sara tendrá un hijo».'
  rationale: Se reemplaza «A este tiempo» por «Para este tiempo» para lograr un español natural y ampliamente legible, manteniendo a la vez el sentido temporal específico de la promesa. Se conserva «yo vendré» con nota alternativa porque refleja fielmente ἐλεύσομαι y respeta la decisión auditada del POB.
