translation:
  language: es
  text: 'Porque dice a Moisés: «Tendré misericordia[a] de quien yo tenga misericordia, y tendré compasión de quien yo tenga compasión»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mostraré misericordia a quien yo muestre misericordia, y mostraré compasión a quien yo muestre compasión».'
    reason: lexical_alternative
  - marker: b
    text: Cita de Éxodo 33:19.
    reason: cross_reference
lexical_decisions:
- source_word: τῷ Μωϋσεῖ
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - para Moisés
  lexicon: BDAG
  rationale: El dativo con λέγει se expresa naturalmente en español con 'a'. Se conserva el nombre propio en su forma usual en español, y no se introduce ninguna paráfrasis.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Mantiene la conexión argumentativa con lo anterior. 'Porque' es claro y digno en español bíblico moderno.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dice ahora
  - afirma
  lexicon: BDAG
  rationale: Se conserva el presente de cita. Aunque el sujeto implícito remite a Dios en el contexto del Éxodo, en español basta el verbo sin explicitarlo más allá del griego.
- source_word: Ἐλεήσω
  english_pob_choice: I will have mercy
  chosen_spanish: Tendré misericordia
  alternatives_spanish:
  - Tendré compasión
  - Mostraré misericordia
  lexicon: BDAG
  rationale: '''Tener misericordia'' comunica con naturalidad el valor verbal de ἐλεέω y preserva el tono bíblico sin convertirlo en paráfrasis.'
- source_word: ὃν ἂν ἐλεῶ
  english_pob_choice: whomever I have mercy
  chosen_spanish: de quien yo tenga misericordia
  alternatives_spanish:
  - al que yo tenga misericordia
  - a quien yo tenga misericordia
  lexicon: BDAG
  rationale: La construcción relativa indefinida se vierte de manera idiomática con 'de quien yo tenga'. Se mantiene la repetición del verbo para reflejar el paralelismo del griego.
- source_word: οἰκτιρήσω
  english_pob_choice: I will have compassion
  chosen_spanish: tendré compasión
  alternatives_spanish:
  - mostraré compasión
  - me compadeceré
  lexicon: BDAG
  rationale: '''Tendré compasión'' conserva el paralelismo con el primer miembro y distingue el matiz de οἰκτίρω sin rebajarlo a ''piedad'' o ''lástima''.'
- source_word: ὃν ἂν οἰκτίρω
  english_pob_choice: whomever I have compassion
  chosen_spanish: de quien yo tenga compasión
  alternatives_spanish:
  - al que yo tenga compasión
  - a quien yo tenga compasión
  lexicon: BDAG
  rationale: Se repite la misma estructura para mantener el eco enfático del original y la ambigüedad deliberada sobre la libertad divina en la cita.
theological_decisions:
- issue: Identificación del hablante en la cita
  english_pob_reading: he says, referring to God speaking in Scripture to Moses
  chosen_spanish_reading: dice a Moisés
  alternative_spanish_readings:
  - dice la Escritura a Moisés
  - dice Dios a Moisés
  rationale: El verbo se deja personal, como en la auditoría inglesa. En español, 'dice a Moisés' conserva la referencia a la cita sin sobreexplicitar ni desplazar el foco del texto.
  doctrine_reference: Habla divina en la Escritura
- issue: Fuerza teológica de la repetición en misericordia/compasión
  english_pob_reading: Preserve the taut, repetitive formulation without softening it into an explanatory paraphrase
  chosen_spanish_reading: 'Mantener la repetición: ''Tendré misericordia de quien yo tenga misericordia, y tendré compasión de quien yo tenga compasión'''
  alternative_spanish_readings:
  - Tendré misericordia de quien decida tener misericordia
  - Tendré compasión de quien quiera compadecerme
  rationale: La redacción conserva la tensión teológica y la libertad soberana expresada en la cita, sin introducir 'decidir' u otros elementos interpretativos que no están en el griego.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación asegurando que cada marcador de nota aparece exactamente en el texto español: [a] junto a Moisés y [b] junto a misericordia. Se mantuvo la lectura auditada de la cita sin añadir notas sin anclaje.'
  spanish_consistency_notes:
  - Se prefirió 'misericordia' y 'compasión' para distinguir los dos verbos griegos sin borrar su paralelismo.
  - Se usó 'a Moisés' como complemento natural del verbo de habla en español.
  - La repetición verbal se conservó de forma estricta para reflejar el efecto retórico del griego.
  - Se evitó 'SEÑOR' porque el pasaje cita directamente a Dios hablando a Moisés; no hay necesidad de una convención de sustitución aquí.
