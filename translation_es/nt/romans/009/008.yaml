- from: Es decir, no son los hijos de la carne[a] los que son hijos de Dios[b], sino que los hijos de la promesa son contados como descendencia.
  to: Es decir, no son los hijos de la carne[a] los que son hijos de Dios, sino que los hijos de la promesa son tenidos por descendencia[b].
  rationale: Se corrige la ubicación de la nota [b] para que explique la cláusula final, en conformidad con el source y el audit trail inglés. También se mejora la naturalidad de λογίζεται εἰς σπέρμα con 'son tenidos por descendencia', que conserva el matiz de reconocimiento/cómputo sin sonar forzado.
