review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la estructura y el contraste principal del griego: explicación introductoria, negación de que los ''hijos de la carne'' sean ''hijos de Dios'', y afirmación de que los ''hijos de la promesa'' son contados como descendencia. Sin embargo, el anclaje de la nota [b] está mal ubicado: en el inglés POB la alternativa afecta a ''are counted as offspring'' / ''are reckoned as seed'', no a ''children of God''. Conviene además ajustar ''son contados'' a una formulación más idiomática en español bíblico moderno.'
  spanish_quality_summary: El español es claro y legible, pero 'son contados como descendencia' suena algo rígido; 'son tenidos por descendencia' o 'son considerados descendencia' fluye mejor. 'Hijos' es aceptable y natural en contexto genealógico, aunque pierde algo de la inclusividad de τέκνα; no alcanza nivel de error. La puntuación y el registro son adecuados.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: σάρξ -> ''carne'', θεοῦ -> ''Dios'', ἐπαγγελία -> ''promesa''. No hay conflicto con términos sensibles del glosario. La decisión ''hijos'' para τέκνα es defendible por naturalidad contextual, aunque ''hijos'' puede ser menos inclusivo que ''children''; dado el contexto de descendencia, se tolera.'
  issues:
  - severity: high
    issue: La nota [b] está anclada a 'hijos de Dios' en vez de a la cláusula final sobre λογίζεται εἰς σπέρμα.
    rationale: El audit trail inglés deja claro que la alternativa 'are reckoned as seed' corresponde a 'are counted as offspring', no a 'children of God'. La ubicación actual induce una lectura equivocada del aparato crítico.
  - severity: medium
    issue: '''Son contados como descendencia'' es comprensible pero poco idiomático en español.'
    rationale: Para λογίζεται εἰς σπέρμα, una formulación como 'son tenidos por descendencia' conserva el valor de cómputo/reconocimiento y suena más natural en español eclesial amplio.
  revised_spanish_text: Es decir, no son los hijos de la carne[a] los que son hijos de Dios, sino que los hijos de la promesa son tenidos por descendencia[b].
  revised_footnotes:
  - marker: a
    text: 'O: “los hijos según la descendencia natural”. Griego: “los hijos de la carne”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “son contados como simiente”. “Descendencia” traduce aquí el sentido de sperma como descendientes.'
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota [b] para que explique la cláusula final, en conformidad con el source y el audit trail inglés. También se mejora la naturalidad de λογίζεται εἰς σπέρμα con 'son tenidos por descendencia', que conserva el matiz de reconocimiento/cómputo sin sonar forzado.
