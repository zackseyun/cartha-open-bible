    text: 'Or ''the children by natural descent.'' Greek: ''the children of the flesh.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'are reckoned as seed.' 'Offspring' renders Greek sperma here in the sense of descendants.
    reason: lexical_alternative
