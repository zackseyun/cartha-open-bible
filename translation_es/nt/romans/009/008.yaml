  text: τοῦτ’ ἔστιν, οὐ τὰ τέκνα τῆς σαρκὸς ταῦτα τέκνα τοῦ θεοῦ, ἀλλὰ τὰ τέκνα τῆς ἐπαγγελίας λογίζεται εἰς σπέρμα·
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/008.yaml
  text: That is[a], it is not the children of the flesh who are the children of God[b], but the children of the promise are counted as offspring.
  footnotes:
