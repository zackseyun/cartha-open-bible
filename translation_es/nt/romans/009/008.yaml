translation:
  language: es
  text: Es decir, no son los hijos de la carne[a] los que son hijos de Dios, sino que los hijos de la promesa son tenidos por descendencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “los hijos según la descendencia natural”. Griego: “los hijos de la carne”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “son contados como simiente”. “Descendencia” traduce aquí el sentido de sperma como descendientes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτ’ ἔστιν
  english_pob_choice: That is
  chosen_spanish: Es decir
  alternatives_spanish:
  - Esto es
  - Quiere decir
  lexicon: BDAG
  rationale: Introduce la explicación de Pablo de manera natural en español y conserva el valor explicativo sin sonar rígido.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  lexicon: BDAG
  rationale: En esta cadena de parentesco y herencia, 'hijos' comunica bien la relación familiar y resulta natural en español. Aunque 'children' en inglés es inclusivo, 'hijos' aquí conserva el contraste genealógico del pasaje.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana
  - descendencia natural
  lexicon: BDAG
  rationale: Se mantiene el término paulino 'carne' para conservar el contraste literal con la promesa. No se sustituye por una paráfrasis porque el griego usa σάρξ de modo genealógico, no ético.
- source_word: τὰ τέκνα τῆς σαρκὸς
  english_pob_choice: the children of the flesh
  chosen_spanish: los hijos de la carne
  alternatives_spanish:
  - los hijos por descendencia natural
  - los hijos según la carne
  lexicon: BDAG
  rationale: La construcción genitiva se vierte de forma transparente para retener la oposición con 'los hijos de la promesa'. Aunque suena semítica, es entendible en español y preserva la redacción de Pablo.
- source_word: τέκνα τοῦ θεοῦ
  english_pob_choice: the children of God
  chosen_spanish: hijos de Dios
  alternatives_spanish:
  - hijos de Dios
  - los hijos de Dios
  lexicon: BDAG
  rationale: Se conserva la fórmula bíblica natural en español y el contraste retórico. La omisión del artículo antes de 'hijos de Dios' es idiomática en español y no altera el sentido.
- source_word: ἐπαγγελία
  english_pob_choice: promise
  chosen_spanish: promesa
  alternatives_spanish:
  - promesa
  - palabra prometida
  lexicon: BDAG
  rationale: El sustantivo 'promesa' comunica con claridad la referencia al compromiso divino en el contexto abrahámico.
- source_word: τὰ τέκνα τῆς ἐπαγγελίας
  english_pob_choice: the children of the promise
  chosen_spanish: los hijos de la promesa
  alternatives_spanish:
  - los hijos prometidos
  - los hijos de promesa
  lexicon: BDAG
  rationale: Se mantiene la relación genitiva con una fórmula clara y común en español, preservando la identidad de quienes están definidos por la promesa de Dios.
- source_word: λογίζεται
  english_pob_choice: are counted
  chosen_spanish: son contados
  alternatives_spanish:
  - son considerados
  - son tenidos por
  lexicon: BDAG
  rationale: '''Contados'' conserva el valor de reckoning/consideration del verbo y permite una traducción directa sin perder el matiz judicial o evaluativo.'
- source_word: εἰς σπέρμα
  english_pob_choice: as offspring
  chosen_spanish: como descendencia
  alternatives_spanish:
  - como simiente
  - como linaje
  lexicon: BDAG
  rationale: En este contexto abrahámico, σπέρμα significa descendientes. 'Descendencia' evita la ambigüedad de 'simiente' en español moderno y comunica el sentido de herencia y filiación.
theological_decisions:
- issue: Contraste entre descendencia física y la línea definida por la promesa
  english_pob_reading: The verse distinguishes physical descendants ('children of the flesh') from those recognized by God as Abraham's true offspring through the promise, without importing a narrower denominational scheme.
  chosen_spanish_reading: El versículo distingue entre los descendientes según la carne y los que pertenecen a la promesa, sin cerrar la tensión teológica con una explicación doctrinal añadida.
  alternative_spanish_readings:
  - Una lectura exclusivamente corporativo-histórica
  - Una lectura predestinacionista explícita en la traducción
  rationale: La traducción conserva la oposición textual y deja abierto el alcance teológico, tal como exige el griego y el audit trail en inglés. No se fuerza una resolución dogmática que el versículo no explicita.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete fuente; la redacción sigue el pasaje griego y el audit trail inglés sin cambios sustantivos reportados en la última pasada.
  spanish_consistency_notes:
  - Se conserva 'promesa' para ἐπαγγελία y 'descendencia' para σπέρμα en el sentido de descendientes.
  - Se mantiene 'carne' para σάρξ por fidelidad al contraste paulino.
  - La formulación es publicada en español neutro, evitando calcos innecesarios pero reteniendo la estructura retórica del versículo.
