translation:
  language: es
  text: Pero ¿y si Dios[a], queriendo mostrar su ira y dar a conocer su poder[b], soportó con mucha paciencia vasos de ira preparados para destrucción[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Pero si». El griego abre una oración condicional retórica que continúa en el versículo siguiente.
    reason: lexical_alternative
  - marker: b
    text: O «su poderío». La expresión griega alude literalmente a lo que es poderoso o posible para él, aquí en el sentido del poder de Dios.
    reason: lexical_alternative
  - marker: c
    text: El participio pasivo «preparados» no dice quién preparó estos vasos. Los intérpretes difieren sobre si Pablo implica una acción divina, un endurecimiento propio o simplemente un estado de disposición para el juicio.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: But what if
  chosen_spanish: Pero ¿y si
  alternatives_spanish:
  - Pero si
  - ¿Y si?
  lexicon: BDAG
  rationale: Conserva el tono condicional-retórico del griego y la continuidad con el versículo siguiente, sin cerrar indebidamente la oración.
- source_word: θέλων
  english_pob_choice: wanting to
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - queriendo hacer
  lexicon: BDAG
  rationale: Expresa la intención/voluntad en forma participial de modo natural en español y sin añadir matices ajenos al texto.
- source_word: ἐνδείξασθαι
  english_pob_choice: to display
  chosen_spanish: mostrar
  alternatives_spanish:
  - demostrar
  - exhibir
  lexicon: BDAG
  rationale: «Mostrar» comunica la idea de manifestar públicamente la ira divina con claridad y sin sobrerretórica.
- source_word: ὀργή
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - indignación
  lexicon: BDAG
  rationale: En español bíblico y contemporáneo, «ira» preserva el sentido judicial/divino; «cólera» sería más emocional y menos preciso aquí.
- source_word: γνωρίσαι
  english_pob_choice: make known
  chosen_spanish: dar a conocer
  alternatives_spanish:
  - hacer saber
  - manifestar
  lexicon: BDAG
  rationale: Mantiene el valor causativo de hacer conocido algo, con un giro idiomático natural en español.
- source_word: τὸ δυνατὸν αὐτοῦ
  english_pob_choice: his power
  chosen_spanish: su poder
  alternatives_spanish:
  - su might
  - lo que puede
  lexicon: BDAG
  rationale: La expresión griega alude a lo que es poderoso/posible en él; «su poder» es la equivalencia más clara y sobria en este contexto.
- source_word: ἤνεγκεν
  english_pob_choice: endured
  chosen_spanish: soportó
  alternatives_spanish:
  - sufrió
  - aguantó
  - toleró
  lexicon: BDAG
  rationale: En combinación con la frase siguiente, el verbo comunica el soporte paciente de personas o cosas bajo juicio; «soportó» es más adecuado que «sufrió» para conservar la fuerza activa del verbo.
- source_word: ἐν πολλῇ μακροθυμίᾳ
  english_pob_choice: with great patience
  chosen_spanish: con mucha paciencia
  alternatives_spanish:
  - con gran paciencia
  - con mucha longanimidad
  lexicon: BDAG
  rationale: Reproduce el sentido de μακροθυμία con español natural. «Longanimidad» sería más técnico pero menos transparente para la lectura pública.
- source_word: σκεύη
  english_pob_choice: vessels
  chosen_spanish: vasos
  alternatives_spanish:
  - vasijas
  - recipientes
  lexicon: BDAG
  rationale: «Vasos» conserva la imagen de alfarería del contexto inmediato en Romanos 9 y suena más familiar en español bíblico que «recipientes».
- source_word: σκεύη ὀργῆς
  english_pob_choice: vessels of wrath
  chosen_spanish: vasos de ira
  alternatives_spanish:
  - vasos destinados a ira
  - vasos sujetos a ira
  lexicon: BDAG
  rationale: La construcción genitiva se mantiene compacta sin resolver la relación semántica más allá de lo que el griego afirma. Se preserva así la tensión interpretativa.
- source_word: κατηρτισμένα
  english_pob_choice: prepared
  chosen_spanish: preparados
  alternatives_spanish:
  - dispuestos
  - alistados
  - hechos aptos
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe un estado de preparación, pero no nombra al agente. «Preparados» conserva esa pasividad sin adjudicar responsabilidad.
- source_word: εἰς ἀπώλειαν
  english_pob_choice: for destruction
  chosen_spanish: para destrucción
  alternatives_spanish:
  - para ruina
  - para perdición
  lexicon: BDAG
  rationale: «Destrucción» es la equivalencia más directa y mantiene el destino/resulto expresado por εἰς ἀπώλειαν.
theological_decisions:
- issue: Agencia implícita en κατηρτισμένα ('prepared')
  english_pob_reading: Render the passive as 'prepared' without specifying who prepared the vessels.
  chosen_spanish_reading: Traducir con «preparados» sin decir quién los preparó.
  alternative_spanish_readings:
  - preparados por Dios
  - hechos aptos para destrucción
  - que se prepararon a sí mismos para destrucción
  rationale: El griego perfecto pasivo señala un estado de preparación, pero no identifica al agente. En español se conserva la misma ambigüedad deliberada para no resolver una tensión doctrinal que el texto no resuelve explícitamente.
  doctrine_reference: Romanos 9:22; principio POБ de preservar la tensión teológica del pasivo.
- issue: Estructura condicional retórica iniciada por εἰ
  english_pob_reading: Retain the rhetorical conditional with 'But what if' and allow the sentence to continue into the next verse.
  chosen_spanish_reading: Mantener la apertura condicional con «Pero ¿y si…?» y dejar la oración abierta.
  alternative_spanish_readings:
  - Pero si
  - ¿Y si?
  - Sin embargo, si
  rationale: Pablo no cierra el período en este versículo; preservar la suspensión sintáctica evita convertir la pregunta condicional en una afirmación completa o demasiado cerrada.
  doctrine_reference: Romanos 9:22–23; continuidad sintáctica del argumento paulino.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del expediente inglés, que quedó sin cambios tras el control cruzado y fue confirmada con alto grado de acuerdo. No se aplicaron revisiones posteriores al contenido base.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al criterio del proyecto para el nombre divino; aquí el texto griego tiene ὁ θεός, por lo que no se traduce como SEÑOR ni se introduce una máscara litúrgica.
  - Se prefirió «ira» para ὀργή en lugar de un término más coloquial, para conservar el matiz judicial y teológico.
  - «Vasos» mantiene la imagen de alfarería coherente con Romanos 9 y con el inglés POB «vessels».
  - Se preservó la pasividad de «preparados» sin especificar agente, porque el expediente inglés documenta expresamente esa tensión.
  - La puntuación con signo de interrogación de apertura refleja el carácter condicional interrogativo del español y ayuda a señalar que la cláusula queda abierta.
