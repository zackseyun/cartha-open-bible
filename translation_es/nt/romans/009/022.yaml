source:
  edition: SBLGNT
  text: εἰ δὲ θέλων ὁ θεὸς ἐνδείξασθαι τὴν ὀργὴν καὶ γνωρίσαι τὸ δυνατὸν αὐτοῦ ἤνεγκεν ἐν πολλῇ μακροθυμίᾳ σκεύη ὀργῆς κατηρτισμένα εἰς ἀπώλειαν,
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/022.yaml
  text: But what if God[a], wanting to display his wrath and make known his power, endured with great patience vessels of wrath prepared for destruction[c][b],
  footnotes:
  - marker: a
    text: Or 'But if.' The Greek opens a rhetorical conditional sentence that continues into the next verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'his might.' The phrase literally refers to what is powerful or possible for him, here meaning God's power.
    reason: lexical_alternative
  - marker: c
    text: The passive 'prepared for destruction' does not state who prepared these vessels. Interpreters differ on whether Paul implies divine action, self-hardening, or simply a state of readiness for judgment.
    reason: alternative_reading
