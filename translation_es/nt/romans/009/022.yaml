revisions:
- from: Pero ¿y si Yahvé[a], queriendo mostrar su ira y dar a conocer su poder[b], soportó con mucha paciencia vasos de ira preparados para destrucción[c]?
  to: Pero ¿y si Dios[a], queriendo mostrar su ira y dar a conocer su poder[b], soportó con mucha paciencia vasos de ira preparados para destrucción[c],
  rationale: Se corrige «Yahvé» a «Dios» para ajustarse al griego θεός y a la terminología del proyecto. Se elimina el cierre interrogativo final y se mantiene la coma final para preservar la condición retórica suspendida que continúa en el v. 23. Se conservan las demás decisiones léxicas, que son fieles y naturales.
