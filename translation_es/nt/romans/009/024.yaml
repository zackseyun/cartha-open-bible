  spanish_quality_summary: El español es comprensible, pero 'a los cuales también llamó' suena rígido y, sin 'nosotros/a nosotros', queda truncado frente al original. Una formulación más natural y fiel es 'incluso a nosotros[a], a quienes también llamó[b], no solo de entre los judíos sino también de entre los gentiles—'. Esto mantiene el enlace con el versículo anterior, mejora la fluidez y preserva el énfasis.
  glossary_alignment: Se alinea bien con 'llamó' para ἐκάλεσεν y con 'judíos' para Ἰουδαίων. Sin embargo, no sigue la decisión auditada para ἐθνῶν en este contexto; debe ser 'gentiles' en el texto principal, con nota que preserve la alternativa más literal 'naciones'.
