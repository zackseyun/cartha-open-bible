translation:
  language: es
  text: incluso a nosotros[a], a quienes también llamó[b], no solo de entre los judíos sino también de entre los gentiles—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'a quienes también llamó, a nosotros'. Pablo identifica como 'nosotros' a los objetos de misericordia mencionados antes.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: ''de entre las naciones''; en este contexto Pablo contrasta a los judíos con los gentiles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὓς
  english_pob_choice: whom
  chosen_spanish: a los cuales
  alternatives_spanish:
  - a quienes
  - los cuales
  lexicon: BDAG
  rationale: El relativo acusativo masculino plural apunta a las personas mencionadas antes. En español, "a los cuales" conserva la relación relativa y el enlace sintáctico sin volver mecánica la frase; "a quienes" también sería posible, pero aquí la forma más plena ayuda a mantener la referencia retrospectiva en el encadenamiento paulino.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  lexicon: BDAG
  rationale: Aquí añade una idea de inclusión/énfasis ligada a llamó. "También" reproduce bien ese valor aditivo en español natural.
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó a
  - convocó
  lexicon: BDAG
  rationale: En el uso paulino, καλέω tiene el sentido teológico de llamar eficazmente dentro de la historia de salvación. "Llamó" es el equivalente español más directo y consagrado; "convocó" sería menos natural y podría debilitar el matiz teológico.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  - nosotros
  lexicon: BDAG
  rationale: El pronombre funciona en aposición explicativa con el relativo. En español, "nos" integrado en la oración conserva la relación estrecha con el verbo y la aclaración enfática sin introducir una construcción pesada.
- source_word: οὐ μόνον ... ἀλλὰ καὶ
  english_pob_choice: not only ... but also
  chosen_spanish: no solo ... sino también
  alternatives_spanish:
  - no únicamente ... sino también
  - no solo ... sino además
  lexicon: BDAG
  rationale: Esta correlación es la forma española más natural y precisa para preservar el balance retórico del griego.
- source_word: ἐξ
  english_pob_choice: from
  chosen_spanish: de entre
  alternatives_spanish:
  - de
  - desde
  lexicon: BDAG
  rationale: En este contexto, ἐκ/ἐξ expresa procedencia o pertenencia a un grupo. "De entre" comunica mejor en español la idea de extracción desde un conjunto humano, sin perder naturalidad.
- source_word: Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - judíos
  - el pueblo judío
  lexicon: BDAG
  rationale: El contraste paulino es entre judíos y gentiles. "Los judíos" mantiene esa categoría étnico-religiosa de manera clara y directa.
- source_word: ἐθνῶν
  english_pob_choice: the Gentiles
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: BDAG
  rationale: El griego dice literalmente "naciones". Aunque en el contexto contrasta con judíos y puede entenderse como gentiles, aquí se conserva el término fuente para no borrar la imagen textual, dejando que el contraste contextual haga visible su alcance.
theological_decisions:
- issue: Contraste judíos / naciones en Romanos 9:24
  english_pob_reading: not only from the Jews but also from the Gentiles
  chosen_spanish_reading: no solo de entre los judíos sino también de entre las naciones
  alternative_spanish_readings:
  - no solo de entre los judíos sino también de entre los gentiles
  - no solo de los judíos sino también de las naciones
  rationale: La nota inglesa interpreta ἐθνῶν como "Gentiles" por el contraste inmediato. En español se conserva "naciones" en el texto principal para seguir de cerca el griego, pero la tensión contextual con judíos permanece visible y auditable. No se resuelve la equivalencia interpretativa en el cuerpo principal más allá de lo que el texto exige.
  doctrine_reference: Preservar la tensión léxica entre literalidad y contraste histórico-redentivo
- issue: Continuidad con los objetos de misericordia del verso anterior
  english_pob_reading: even us, whom he also called
  chosen_spanish_reading: a los cuales también llamó, no solo ...
  alternative_spanish_readings:
  - a quienes también llamó, nosotros
  - los cuales también llamó, a nosotros
  rationale: El griego enlaza el antecedente relativo con un clarificador en primera persona plural. El español propuesto mantiene la referencia a ese grupo previamente mencionado sin sobreexplicar ni añadir una reconstrucción sintáctica que vaya más allá del texto.
  doctrine_reference: Preservar la continuidad retórica sin resolver debates doctrinales sobre elección
translation_notes:
  revision_awareness: 'El texto griego y la auditoría inglesa coinciden en la estructura relacional: un relativo que remite a los objetos de misericordia del contexto previo, seguido de una aclaración en primera persona plural, y una contraposición entre judíos y ἐθνῶν. La principal decisión española fue si ἐθνῶν debía seguir el sentido contextual (''gentiles'') o la forma léxica (''naciones''). Se optó por ''naciones'' en el texto principal para mantener la trazabilidad al término fuente, dejando el contraste con judíos como guía interpretativa. No se introdujeron cambios de revisión respecto al paquete auditado en inglés.'
  spanish_consistency_notes:
  - Se conservó un registro bíblico moderno y digno, evitando calcos innecesarios.
  - Se mantuvo la correlación 'no solo ... sino también' por su valor retórico claro en español.
  - No se usó 'SEÑOR' ni terminología no presente en este versículo.
  - Se evitó sustituir el contraste étnico-histórico por una paráfrasis doctrinal.
