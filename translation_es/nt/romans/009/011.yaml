translation:
  language: es
  text: Porque antes de que nacieran y antes de que hicieran algo bueno o malo[a], para que permaneciera[b] el propósito de Dios conforme a la elección[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «algo bueno o malo». El griego φαῦλον puede significar “malo”, “vil” o “moralmente malo”; «malo» en el texto principal conserva la correspondencia idiomática más natural con «bueno».
    reason: lexical_alternative
  - marker: b
    text: O «continuara» o «quedara en pie». El verbo griego μένω puede significar “permanecer”, “continuar” o, en este contexto, tener el matiz de mantenerse firme.
    reason: lexical_alternative
  - marker: c
    text: O «según la elección» o «el propósito electivo de Dios». La expresión griega ἡ κατ’ ἐκλογὴν πρόθεσις conserva visible la relación entre “propósito” y “elección” y no conviene simplificarla demasiado.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήπω
  english_pob_choice: before ... had yet
  chosen_spanish: aún no
  alternatives_spanish:
  - todavía no
  - antes de que
  lexicon: BDAG
  rationale: En español, μήπω en esta construcción temporal se expresa de manera natural con «aún no»; conserva la idea de que el hecho no había ocurrido hasta ese momento, sin forzar una paráfrasis más larga.
- source_word: γεννηθέντων
  english_pob_choice: had ... been born
  chosen_spanish: habían nacido
  alternatives_spanish:
  - habían sido nacidos
  - hubiesen nacido
  lexicon: BDAG
  rationale: 'El participio aoristo pasivo en genitivo absoluto se vierte idiomáticamente como una acción anterior completada: «habían nacido». «Habían sido nacidos» sería más literal pero poco natural en español.'
- source_word: πραξάντων
  english_pob_choice: had done
  chosen_spanish: habían hecho
  alternatives_spanish:
  - habían obrado
  - habían realizado
  lexicon: BDAG
  rationale: πράσσω aquí se refiere a haber realizado algo; «habían hecho» comunica bien la anterioridad y mantiene la amplitud del verbo sin introducir matices excesivos.
- source_word: τι ἀγαθὸν ἢ φαῦλον
  english_pob_choice: anything good or bad
  chosen_spanish: cosa alguna buena o mala
  alternatives_spanish:
  - algo bueno o malo
  - nada bueno o malo
  lexicon: BDAG
  rationale: La combinación τι + adjetivos se expresa con naturalidad como «cosa alguna». «Mala» mantiene la contraparte idiomática de «buena»; no se intensifica a «malvada» porque φαῦλος puede significar también “malo, vil, de poco valor”.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: «Para que» preserva la fuerza de finalidad de ἵνα en un español claro y sobrio, sin decidir indebidamente entre finalidad y resultado más allá de lo que el griego permite.
- source_word: ἡ κατ’ ἐκλογὴν πρόθεσις
  english_pob_choice: purpose according to election
  chosen_spanish: el propósito de Dios conforme a la elección
  alternatives_spanish:
  - el propósito electivo de Dios
  - el propósito de Dios según la elección
  lexicon: BDAG
  rationale: Se conserva la estructura de «propósito ... conforme a la elección» sin reducir ἐκλογή a una paráfrasis interpretativa. Añadir «de Dios» antes de la frase completa hace explícito el genitivo del texto griego de manera natural en español.
- source_word: τοῦ θεοῦ
  english_pob_choice: God’s
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios mismo
  lexicon: BDAG
  rationale: 'El genitivo posesivo se expresa con la construcción normal en español: «de Dios». No se sustituye por «Señor» ni por otra forma, de acuerdo con la política terminológica.'
- source_word: μένῃ
  english_pob_choice: might remain
  chosen_spanish: permaneciera
  alternatives_spanish:
  - continuara
  - se mantuviera
  lexicon: BDAG
  rationale: El subjuntivo de imperfecto en español transmite adecuadamente la idea de permanencia en una cláusula de finalidad pasada. «Permaneciera» conserva el valor de μένω sin forzar la noción de «estar firme» como lectura exclusiva.
theological_decisions:
- issue: Relación entre propósito divino y elección
  english_pob_reading: purpose according to election / electing purpose; preserve theological tension rather than resolve it
  chosen_spanish_reading: el propósito de Dios conforme a la elección
  alternative_spanish_readings:
  - el propósito electivo de Dios
  - el propósito de Dios según la elección
  rationale: La formulación mantiene visible la relación preposicional de ἐκλογή con πρόθεσις sin convertirla en una interpretación más cerrada. Así se conserva la tensión teológica del texto paulino, permitiendo leerlo como propósito relacionado con la elección sin decidir más de lo que dice la sintaxis.
  doctrine_reference: Preservar la tensión teológica del texto, sin resolver debates sobre elección/predestinación más allá de la forma gramatical.
- issue: Valor de ἵνα en un contexto de elección divina
  english_pob_reading: 'Rendered as purpose clause: ''so that God’s purpose according to election might remain'''
  chosen_spanish_reading: para que permaneciera el propósito de Dios conforme a la elección
  alternative_spanish_readings:
  - de modo que permaneciera el propósito de Dios conforme a la elección
  - a fin de que permaneciera el propósito de Dios conforme a la elección
  rationale: «Para que» mantiene el sentido de propósito sin cargar la frase con una conclusión doctrinal que el griego no obliga a especificar. Esto conserva abierta la lectura entre finalidad estricta y resultado intencional, como en la versión inglesa auditada.
  doctrine_reference: Preservar la tensión teológica del texto, sin resolver debates sobre finalidad/resultado en ἵνα.
translation_notes:
  revision_awareness: La revisión más reciente del tramo fuente no introdujo cambios; la lectura se alinea con el estado de alta concordancia (0.95) y conserva las decisiones léxicas auditadas en inglés, especialmente el valor temporal de μήπω, la amplitud semántica de φαῦλος y la relación entre πρόθεσις y ἐκλογή.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se introduce ninguna convención de ocultamiento nominal.
  - Se usa «elección» para ἐκλογή, conforme a la terminología POB y la auditabilidad del término paulino.
  - «Permaneciera» preserva el matiz de duración de μένω sin sobreinterpretarlo como ‘quedara firme’ en el cuerpo principal.
  - El texto principal sigue un español natural y publicable, sin depender de calcos excesivos del inglés.
