translation:
  language: es
  text: que son israelitas[a], a quienes pertenecen la adopción, la gloria, las alianzas, la entrega de la ley, el culto y las promesas[d][c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuyos son la adopción, la gloria, las alianzas, la entrega de la ley, el culto y las promesas».'
    reason: alternative_reading
  - marker: b
    text: «La gloria» probablemente alude a la presencia manifiesta de Dios entre Israel.
    reason: cross_reference
  - marker: c
    text: 'O: «adopción como hijos» o «filiación».'
    reason: lexical_alternative
  - marker: d
    text: Es decir, el culto y servicio pactual de Israel delante de Dios.
    reason: cultural_note
lexical_decisions:
- source_word: οἵτινές
  english_pob_choice: who
  chosen_spanish: que son
  alternatives_spanish:
  - quienes son
  - los cuales son
  lexicon: BDAG
  rationale: El relativo introducido por οἵτινές presenta una descripción identificadora; en español, 'que son' suena natural y conserva el valor explicativo sin sobrecargar el texto.
- source_word: Ἰσραηλῖται
  english_pob_choice: Israelites
  chosen_spanish: israelitas
  alternatives_spanish:
  - los de Israel
  - israelenses
  lexicon: BDAG
  rationale: '''Israelitas'' reproduce el etnónimo bíblico de forma directa y reconocible, manteniendo la identidad histórica y pactual del grupo.'
- source_word: ὧν
  english_pob_choice: to whom belong
  chosen_spanish: a quienes pertenecen
  alternatives_spanish:
  - de quienes son
  - cuyos son
  lexicon: BDAG
  rationale: El genitivo relacional expresa pertenencia; 'a quienes pertenecen' comunica esa relación con naturalidad en español y evita el giro más duro 'cuyos son'.
- source_word: υἱοθεσία
  english_pob_choice: the adoption
  chosen_spanish: la adopción
  alternatives_spanish:
  - la adopción como hijos
  - la filiación
  lexicon: BDAG
  rationale: '''La adopción'' preserva el término paulino sin añadir interpretaciones posteriores; en nota se conserva la alternativa de ''adopción como hijos''/''filiación'' para reflejar la tensión lexical.'
- source_word: δόξα
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - la gloria divina
  - la presencia gloriosa
  lexicon: BDAG
  rationale: Se mantiene el sustantivo desnudo 'la gloria', que deja abierta la densidad teológica del término sin estrecharlo indebidamente.
- source_word: διαθῆκαι
  english_pob_choice: the covenants
  chosen_spanish: los pactos
  alternatives_spanish:
  - los pactos del pacto
  - las alianzas
  lexicon: BDAG
  rationale: Aunque el POB inglés preserva el plural 'covenants', en español 'pactos' es la opción más idiomática y comunica el plural de διαθῆκαι; se evita 'alianzas' por su posible carga moderna menos bíblica. La nota conserva la posibilidad de 'pactos' como término pactual.
- source_word: νομοθεσία
  english_pob_choice: the giving of the law
  chosen_spanish: la promulgación de la ley
  alternatives_spanish:
  - la entrega de la ley
  - el dar la ley
  lexicon: BDAG
  rationale: El compuesto no significa solo 'ley' sino su establecimiento/enunciación. 'Promulgación de la ley' captura bien la acción de dar/establecer la ley en español formal y claro.
- source_word: λατρεία
  english_pob_choice: the worship
  chosen_spanish: el culto
  alternatives_spanish:
  - la adoración
  - el servicio de culto
  lexicon: BDAG
  rationale: '''Culto'' reproduce mejor el ámbito cultual/covenantal de λατρεία que ''adoración'', que en español puede sonar más interior y menos institucional; así se preserva la referencia a la práctica ordenada de Israel.'
- source_word: ἐπαγγελίαι
  english_pob_choice: the promises
  chosen_spanish: las promesas
  alternatives_spanish:
  - las promesas de Dios
  - las promesas pactales
  lexicon: BDAG
  rationale: Se conserva el plural directo 'las promesas', que en contexto remite a las promesas de Dios hechas a Israel sin añadir elementos no presentes en el texto.
theological_decisions:
- issue: Sentido de υἱοθεσία respecto de Israel
  english_pob_reading: Rendered as Israel's covenantal 'adoption' without importing later individual-soteriological nuances.
  chosen_spanish_reading: '''La adopción'' se entiende como privilegio pactual de Israel, sin convertirlo en una referencia primaria a la adopción individual del creyente.'
  alternative_spanish_readings:
  - la adopción como hijos
  - la filiación
  rationale: Romanos 9:4 enumera privilegios históricos de Israel. La traducción mantiene la metáfora filial pero evita ampliar su alcance más allá del listado pactual.
  doctrine_reference: Romanos 9:4; cf. Éxodo 4:22; Oseas 11:1
- issue: Referente de ἡ δόξα
  english_pob_reading: Left as 'the glory' in the main text, understood as God's manifested glory associated with Israel.
  chosen_spanish_reading: '''La gloria'' queda sin explicitar en el cuerpo, entendida como la presencia manifiesta de Dios asociada con Israel.'
  alternative_spanish_readings:
  - la gloria divina
  - la presencia gloriosa
  rationale: El griego preserva la densidad teológica del término; la traducción no la reduce, pero la nota aclara la posible referencia a la presencia divina manifestada.
  doctrine_reference: Éxodo 24:16-17; 40:34-38
- issue: Alcance de λατρεία
  english_pob_reading: Rendered 'the worship' to denote Israel's ordained cultic worship.
  chosen_spanish_reading: '''El culto'' denota la adoración/servicio cultual ordenado a Israel.'
  alternative_spanish_readings:
  - la adoración
  - el servicio de culto
  rationale: En español, 'culto' comunica mejor el carácter litúrgico y pactual del término que 'adoración' aislada, que puede sonar demasiado interior o general.
  doctrine_reference: Romanos 9:4; Hebreos 9:1-6
translation_notes:
  revision_awareness: 'Se siguió de cerca el cierre de la revisión más reciente del POB inglés: se mantiene la cláusula relativa directa sin añadir coordinaciones innecesarias y se conserva el orden listado de los privilegios de Israel. También se respetó la alta concordancia del proceso de revisión, sin introducir expansiones interpretativas fuera del alcance del texto griego.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de la lista con artículos definidos: la adopción, la gloria, los pactos, la promulgación de la ley, el culto y las promesas.'
  - Se prefirió un registro bíblico moderno y claro, evitando calcos como 'cuya son' o 'de quienes son'.
  - Se conservó el plural de διαθῆκαι como 'los pactos' para reflejar la pluralidad del original.
  - Se usó 'promulgación de la ley' para νομοθεσία, manteniendo el matiz de establecimiento de la ley más que la mera mención de 'ley'.
