translation:
  language: es
  text: ¿Por qué? Porque no por fe[a], sino como si fuera por obras[b]. Tropezaron con la piedra de tropiezo[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no sobre la base de la fe». El griego dice literalmente «no de fe».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como si proviniera de obras». La formulación conserva el matiz de «como si».'
    reason: lexical_alternative
  - marker: c
    text: Alusión a Isaías 8:14; compárese también Isaías 28:16 en el versículo siguiente.
    reason: cross_reference
  - marker: d
    text: 'O: «la piedra de escándalo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τί
  english_pob_choice: Why?
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Por qué razón?
  - ¿A qué se debe esto?
  lexicon: BDAG
  rationale: La pregunta es retórica y abre la explicación de Pablo; «¿Por qué?» reproduce con naturalidad la fuerza interrogativa sin añadir contenido ajeno.
- source_word: ὅτι
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación causal de la pregunta anterior. «Porque» es la opción más directa y clara en español.
- source_word: οὐκ ἐκ πίστεως
  english_pob_choice: not from faith
  chosen_spanish: no era por fe
  alternatives_spanish:
  - no provenía de fe
  - no era sobre la base de la fe
  - no era por medio de la fe
  lexicon: BDAG
  rationale: Se conserva la negación y la idea de origen/base de ἐκ con una construcción natural en español. «Por fe» mantiene la relación causal sin forzar un calco; la nota preserva la alternativa más literal «de fe».
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: En este contraste paulino, «fe» es el equivalente estándar y más reconocible; no hay indicio aquí de que deba preferirse un matiz más específico.
- source_word: ἀλλ’ ὡς ἐξ ἔργων
  english_pob_choice: but as if from works
  chosen_spanish: sino como si fuera por obras
  alternatives_spanish:
  - sino como si proviniera de obras
  - sino como si fuese por obras
  - sino como de obras
  lexicon: BDAG
  rationale: «ὡς» introduce un matiz de apariencia, no una afirmación sin reservas; «como si fuera» lo preserva con naturalidad. «Por obras» funciona en español para el sentido de base o criterio, sin perder la oposición con la fe.
- source_word: ἔργων
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: BDAG
  rationale: En Pablo, ἔργα en este contraste se traduce de manera estable como «obras». Mantiene la coherencia intertextual con Romanos.
- source_word: προσέκοψαν
  english_pob_choice: They stumbled over
  chosen_spanish: Tropezaron con
  alternatives_spanish:
  - Se tropezaron con
  - Chocaron con
  - Tropezaron sobre
  lexicon: BDAG
  rationale: La imagen es la de tropezar con un obstáculo; «Tropezaron con» transmite bien el sentido concreto y es idiomático en español.
- source_word: τῷ λίθῳ
  english_pob_choice: the stone
  chosen_spanish: la piedra
  alternatives_spanish:
  - la piedra
  - la roca
  lexicon: BDAG
  rationale: λίθος es «piedra» en español. Se evita «roca» para no diluir la imagen específica de la cita de Isaías.
- source_word: τοῦ προσκόμματος
  english_pob_choice: of stumbling
  chosen_spanish: de tropiezo
  alternatives_spanish:
  - de escándalo
  - de obstáculo
  - que hace tropezar
  lexicon: BDAG
  rationale: 'El genitivo describe la función de la piedra: provoca tropiezo. «De tropiezo» mantiene la imagen y empareja naturalmente con «tropezaron».'
theological_decisions:
- issue: Sentido de πίστις en el contraste fe/obras
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: El contexto presenta una oposición paulina clásica entre fe y obras. «Fe» conserva la categoría doctrinal usual y evita introducir un matiz no exigido por el pasaje.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Valor del ὡς en ὡς ἐξ ἔργων
  english_pob_reading: as if from works
  chosen_spanish_reading: como si fuera por obras
  alternative_spanish_readings:
  - como si proviniera de obras
  - como si fuese por obras
  - como de obras
  rationale: 'Se conserva la cautela semántica del ὡς: no afirma sin más que fuera realmente «de obras», sino que funcionaba como si ese fuera el principio. Esto evita borrar la tensión lexical documentada.'
  doctrine_reference: BDAG / lectura sintáctica de ὡς
- issue: Allusión veterotestamentaria a la piedra de tropiezo
  english_pob_reading: stone of stumbling
  chosen_spanish_reading: piedra de tropiezo
  alternative_spanish_readings:
  - piedra de escándalo
  - piedra de obstáculo
  rationale: La expresión conserva el eco de Isaías y el vínculo con el verbo «tropezaron». «Escándalo» es posible, pero «tropiezo» mantiene mejor la metáfora concreta.
  doctrine_reference: Isaías 8:14; 28:16
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y el cierre auditado en inglés: mantiene la pregunta retórica, la causalidad de ὅτι, el contraste entre fe y obras, el matiz de ὡς con «como si», y la imagen concreta de tropiezo/piedra. No se introdujeron revisiones posteriores en el registro inglés; se refleja el estado más reciente aprobado sin cambios.'
  spanish_consistency_notes:
  - Se usa «fe» de manera uniforme para πίστις en este versículo.
  - Se conserva «obras» para ἔργα, en coherencia paulina.
  - «Tropezaron» y «piedra de tropiezo» mantienen la misma imagen metafórica.
  - Las notas a y b preservan alternativas lexicales relevantes sin duplicar sentidos.
  - La puntuación y mayúsculas siguen el uso editorial del español bíblico moderno.
