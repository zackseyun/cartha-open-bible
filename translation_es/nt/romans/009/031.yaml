review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: contraste adversativo, participio de persecución activa, ''ley'' repetida y fracaso en alcanzarla. Sin embargo, se aparta del rastro auditado en un punto importante: δικαιοσύνης fue fijado en el inglés POB como ''righteousness'' con ''justice'' solo como alternativa de nota, mientras que el español principal lo convirtió en ''justicia''. Además, la nota [b] no preserva con suficiente precisión la alternativa auditada ''no alcanzó la ley''.'
  spanish_quality_summary: La redacción es natural y clara en español. 'Pero Israel, persiguiendo...' funciona bien, y 'esa ley' transmite el carácter resumptivo. No obstante, en un contexto paulino 'justicia' puede inclinar al lector hacia un campo semántico jurídico-social más que hacia 'rectitud' o 'justicia' en sentido de right standing; conviene alinear el texto principal con la decisión doctrinal del proyecto usando 'rectitud' o una formulación equivalente más cercana a 'righteousness'. También es preferible 'no alcanzó esa ley' o 'no alcanzó a esa ley' con nota mejor calibrada, evitando 'llegó hasta', que suena menos natural aquí.
  glossary_alignment: Alineación general buena con la terminología del proyecto, salvo δικαιοσύνη. Dado que la guía del proyecto privilegia 'justicia/rectitud' por contexto y el expediente inglés documenta específicamente 'righteousness' como lectura principal en Pablo, el español principal debe reflejar mejor ese valor con 'rectitud', dejando 'justicia' como alternativa en nota.
  issues:
  - severity: high
    issue: δικαιοσύνης se tradujo en el texto principal como 'justicia' en vez de una opción más alineada con 'righteousness'
    rationale: El expediente auditado fijó 'righteousness' como lectura principal por razones doctrinales y contextuales en Pablo. En español, 'justicia' es posible, pero aquí conviene una forma que preserve mejor el matiz de rectitud/right standing; 'rectitud' en texto y 'justicia' en nota respeta mejor la decisión documentada.
  - severity: medium
    issue: La nota [a] invierte la prioridad lexical auditada
    rationale: La nota presenta 'rectitud' como alternativa, cuando el expediente inglés usa 'justice' como alternativa a la lectura principal. En la adaptación al español debe mantenerse esa jerarquía semántica, aunque la palabra principal cambie para fidelidad contextual.
  - severity: medium
    issue: La nota [b] no conserva la alternativa auditada 'no alcanzar la ley' y añade 'llegó hasta'
    rationale: El inglés documenta 'did not reach it' y 'did not attain to the law'. En español, 'no llegó hasta esa ley' suena menos idiomático y desplaza la alternativa más literal 'no alcanzó la ley'/'no llegó a ella'.
  revised_spanish_text: Pero Israel, persiguiendo una ley de rectitud[a], no alcanzó esa ley[b].
  revised_footnotes:
  - marker: a
    text: 'O «justicia»: «una ley de justicia».'
    reason: lexical_alternative
  - marker: b
    text: O «no llegó a ella» o «no alcanzó la ley». La frase griega es comprimida y difícil.
    reason: lexical_alternative
  revision_rationale: Se revisa δικαιοσύνης a 'rectitud' en el texto principal para alinearlo mejor con la decisión auditada de 'righteousness' en contexto paulino, dejando 'justicia' como alternativa léxica en nota. Se ajusta la nota [b] para reflejar con mayor fidelidad las alternativas documentadas para εἰς νόμον οὐκ ἔφθασεν y mejorar la naturalidad del español.
