revisions:
- from: Pero Israel, persiguiendo una ley de justicia[a], no alcanzó esa ley[b].
  to: Pero Israel, persiguiendo una ley de rectitud[a], no alcanzó esa ley[b].
  rationale: Se revisa δικαιοσύνης a 'rectitud' en el texto principal para alinearlo mejor con la decisión auditada de 'righteousness' en contexto paulino, dejando 'justicia' como alternativa léxica en nota. Se ajusta la nota [b] para reflejar con mayor fidelidad las alternativas documentadas para εἰς νόμον οὐκ ἔφθασεν y mejorar la naturalidad del español.
  reviewer_model: gpt-5.4
