translation:
  language: es
  text: Pero Israel, persiguiendo una ley de rectitud[a], no alcanzó esa ley[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «justicia»: «una ley de justicia».'
    reason: lexical_alternative
  - marker: b
    text: O «no llegó a ella» o «no alcanzó la ley». La frase griega es comprimida y difícil.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  - Israel nacional
  lexicon: nombre propio
  rationale: Se conserva el nombre propio sin glosa, porque Pablo se refiere aquí a Israel étnico/nacional en su argumento.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: partícula adversativa
  rationale: '''Pero'' expresa bien el contraste con la afirmación anterior y suena natural en español bíblico contemporáneo.'
- source_word: διώκων
  english_pob_choice: pursuing
  chosen_spanish: persiguiendo
  alternatives_spanish:
  - buscando
  - esforzándose por
  lexicon: BDAG διώκω
  rationale: '''Persiguiendo'' conserva la idea de persecución/afán activo del participio presente, sin añadir una concesión explícita que el griego no marca.'
- source_word: νόμον δικαιοσύνης
  english_pob_choice: a law of righteousness
  chosen_spanish: una ley de justicia
  alternatives_spanish:
  - una ley de rectitud
  - una ley justa
  - la ley de justicia
  lexicon: νόμος; δικαιοσύνη
  rationale: Se mantiene el artículo indefinido de νόμον y se traduce δικαιοσύνη como 'justicia', opción léxica posible que el auditorio español entiende con naturalidad; la alternativa 'rectitud' se reserva cuando el contexto exija un matiz más moral o relacional.
- source_word: εἰς νόμον
  english_pob_choice: that law
  chosen_spanish: esa ley
  alternatives_spanish:
  - a esa ley
  - a la ley
  - al propósito de la ley
  lexicon: BDAG νόμος; εἰς
  rationale: La referencia resumptiva se expresa con 'esa ley', siguiendo la observación auditada de que el griego retoma la misma noción perseguida. 'Al propósito de la ley' sería una interpretación más amplia que el texto no exige.
- source_word: οὐκ ἔφθασεν
  english_pob_choice: did not attain
  chosen_spanish: no alcanzó
  alternatives_spanish:
  - no llegó a
  - no llegó hasta
  - no obtuvo
  lexicon: BDAG φθάνω
  rationale: '''No alcanzó'' comunica bien la idea de llegar al objetivo sin forzar una elaboración adicional; en español bíblico mantiene la fuerza del fracaso final.'
theological_decisions:
- issue: δικαιοσύνη en contexto paulino
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rrectitud
  rationale: Aunque el inglés POB privilegia 'righteousness' y nota 'justice' como alternativa, en español 'justicia' es el equivalente más directo y más estable en este pasaje. Se conserva la tensión semántica de δικαιοσύνη sin cambiar el sentido argumental de Pablo sobre la meta buscada.
  doctrine_reference: 'DOCTRINE.md — términos en disputa: δικαιοσύνη'
- issue: Relación entre el primer y el segundo νόμος
  english_pob_reading: that law
  chosen_spanish_reading: esa ley
  alternative_spanish_readings:
  - la ley
  - esa misma ley
  - la ley buscada
  rationale: Se evita armonizar el verso con una lectura interpretativa como 'el fin de la ley'. La redacción mantiene la estructura comprimida del griego y deja visible que Pablo habla de una ley perseguida pero no alcanzada.
  doctrine_reference: Comentario auditado de Romanos 9:31; revisión reciente sobre εἰς νόμον
translation_notes:
  revision_awareness: 'Se incorporó la revisión auditada que eliminó una concesión implícita (''though'') y ajustó el segundo miembro a una relación de alcance/meta. Por eso el español evita cualquier equivalente de ''aunque'' y usa una formulación directa: ''persiguiendo... no alcanzó esa ley''.'
  spanish_consistency_notes:
  - Se conserva 'ley' para νόμος de forma consistente dentro del versículo.
  - Se usa 'justicia' como opción principal en el texto, con nota de alternativa semántica en la nota a.
  - '''Pero'' mantiene el valor adversativo de δέ sin sobrecargarlo.'
  - '''Esa ley'' refleja el εἰς νόμον resumptivo sin añadir contenido interpretativo.'
