base_translation:
  language: en
  yaml_path: translation/nt/romans/009/033.yaml
  text: As it is written[a], “Look, I am laying in Zion a stone of stumbling and a rock of offense[d][c][b], and the one who believes in him will not be put to shame.”
  footnotes:
  - marker: a
    text: 'Or “on him.” Greek: “upon him.”'
    reason: lexical_alternative
  - marker: b
    text: Or “will not be disappointed.”
    reason: lexical_alternative
  - marker: c
    text: Paul combines Isaiah 8:14 and Isaiah 28:16 here.
    reason: cross_reference
  - marker: d
    text: Some translations render “it” instead of “him,” referring back to the stone; Paul’s context applies the image to the Messiah.
    reason: alternative_reading
