    issue: «roca de escándalo» es semánticamente ambigua en español
    rationale: Aunque «escándalo» puede reflejar σκάνδαλον, en español actual suele sugerir escándalo público o moral, no tanto causa de caída/ofensa. «Roca de ofensa» preserva mejor la distinción con «piedra de tropiezo» y sigue la auditoría inglesa.
  - severity: low
    issue: La nota a sobre ἐπ’ αὐτῷ podría parecer invertida respecto del anclaje
    rationale: La nota está anclada en «está escrito[a]» pero habla de «sobre/en él», que corresponde a otra parte del versículo. No impide comprensión del texto, pero en la revisión conviene mantener el sistema de notas claramente anclado al lugar pertinente.
