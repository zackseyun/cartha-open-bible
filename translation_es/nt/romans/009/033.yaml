translation:
  language: es
  text: 'Tal como está escrito: «Mira, estoy poniendo en Sion una piedra de tropiezo y una roca de ofensa[a][b], y el que cree en él[c][d] no será avergonzado[e]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pablo combina aquí Isaías 8:14 e Isaías 28:16.
    reason: cross_reference
  - marker: b
    text: Algunas traducciones vierten «escándalo». Aquí «ofensa» comunica mejor en español el sentido de σκάνδαλον y mantiene la distinción respecto de «tropiezo».
    reason: lexical_alternative
  - marker: c
    text: O «sobre él». El griego dice literalmente «sobre»; el español bíblico natural suele decir «creer en él».
    reason: lexical_alternative
  - marker: d
    text: Algunas traducciones vierten «ello», refiriéndose a la piedra; en el contexto de Pablo, la imagen se aplica al Mesías.
    reason: alternative_reading
  - marker: e
    text: O «no será defraudado» o «no será decepcionado».
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς γέγραπται
  english_pob_choice: As it is written
  chosen_spanish: Tal como está escrito
  alternatives_spanish:
  - Como está escrito
  - Así como está escrito
  lexicon: γράφω; fórmula de cita bíblica
  rationale: La fórmula conserva el valor introductorio de la cita y suena natural en español bíblico contemporáneo sin volverse arcaica.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Ve
  lexicon: ἰδού
  rationale: Mantiene el golpe deíctico de la cita profética con una forma directa y natural para el lector hispano.
- source_word: τίθημι
  english_pob_choice: I am laying
  chosen_spanish: estoy poniendo
  alternatives_spanish:
  - estoy colocando
  - estoy estableciendo
  lexicon: τίθημι
  rationale: El presente progresivo preserva la acción en curso de la imagen; «poniendo» comunica bien la metáfora de colocar una piedra, aunque «colocando» también sería posible.
- source_word: ἐν Σιὼν
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  lexicon: Σιών
  rationale: Se mantiene el nombre bíblico en su forma española corriente «Sion», que es transparente y reconocible.
- source_word: λίθον προσκόμματος
  english_pob_choice: a stone of stumbling
  chosen_spanish: una piedra de tropiezo
  alternatives_spanish:
  - una piedra para tropezar
  - una piedra de obstáculo
  lexicon: λίθος; πρόσκομμα
  rationale: «Piedra de tropiezo» reproduce la imagen y es una equivalencia estable en español bíblico sin perder la función causal del genitivo.
- source_word: πέτραν σκανδάλου
  english_pob_choice: a rock of offense
  chosen_spanish: una roca de escándalo
  alternatives_spanish:
  - una roca de ofensa
  - una roca de tropiezo
  lexicon: πέτρα; σκάνδαλον
  rationale: «Escándalo» conserva el peso de σκάνδαλον como causa de caída/ofensa y distingue esta expresión de la anterior, tal como hace el griego y la POB inglesa.
- source_word: ὁ πιστεύων
  english_pob_choice: the one who believes
  chosen_spanish: el que cree
  alternatives_spanish:
  - el que cree en él
  - quien cree
  lexicon: πιστεύω
  rationale: La construcción substantivada se vierte de manera natural como «el que cree», preservando el valor genérico singular.
- source_word: ἐπ’ αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  lexicon: ἐπί
  rationale: Con πιστεύω, el español idiomático pide «creer en»; «en él» comunica la relación de confianza y evita una literalidad extraña como «sobre él».
- source_word: καταισχυνθήσεται
  english_pob_choice: will not be put to shame
  chosen_spanish: no será avergonzado
  alternatives_spanish:
  - no será puesto en vergüenza
  - no quedará avergonzado
  - no será defraudado
  lexicon: καταισχύνω
  rationale: Se conserva el pasivo futuro y la vergüenza/honor implícita del verbo. «No será avergonzado» es breve y fiel; «defraudado» sería una lectura más interpretativa.
theological_decisions:
- issue: Referente de αὐτῷ en la cita de Isaías aplicada por Pablo
  english_pob_reading: The stone/rock image is rendered personally as 'him' in Paul's christological application.
  chosen_spanish_reading: Se traduce «en él», tomando la imagen de la piedra/roca en su aplicación personal a Mesías dentro del argumento de Pablo.
  alternative_spanish_readings:
  - en ello
  - en ella
  - sobre ella
  rationale: Aunque el antecedente gramatical inmediato es una piedra, el contexto paulino aplica la cita a Mesías; por eso la referencia personal se conserva sin neutralizarla. Esta elección sigue la lectura cristológica documentada por la POB inglesa.
  doctrine_reference: Cristología nicena/calcedoniana; la traducción sigue la aplicación del texto en Romanos 9:32–33 y 10:11.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios posteriores en el texto base ni en la lectura auditada; se mantiene la decisión cristológica personal para αὐτῷ y la distinción entre las dos imágenes de piedra/roca.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «Mesías» en la explicación teológica porque la POB inglesa documenta la aplicación cristológica; en el texto principal el referente queda implícito con «él» conforme al audit trail.
  - Se conserva la distinción «piedra de tropiezo» / «roca de escándalo» para reflejar la dualidad lexical del griego.
  - «Sion» sigue la ortografía española estándar para Σιών.
