revisions:
- from: 'Tal como está escrito[a]: «Mira, estoy poniendo en Sion una piedra de tropiezo y una roca de escándalo[c], y el que cree en él[b][d] no será avergonzado».'
  to: 'Tal como está escrito: «Mira, estoy poniendo en Sion una piedra de tropiezo y una roca de ofensa[a][b], y el que cree en él[c][d] no será avergonzado[e]».'
  rationale: Se revisa principalmente «roca de escándalo» a «roca de ofensa» para reflejar mejor σκάνδαλον en español contemporáneo sin perder la distinción con «piedra de tropiezo». También se reordenan y completan las notas para que coincidan con los lugares pertinentes del texto y para conservar la alternativa léxica de καταισχυνθήσεται presente en la auditoría inglesa. La nota sobre «como está escrito» se omite por no ser significativa en español y por no estar respaldada como alternativa necesaria del original.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y la auditoría inglesa en casi todo: conserva la fórmula de cita, el presente de τίθημι, la doble imagen de piedra/roca, la lectura cristológica de ἐπ’ αὐτῷ como «en él», y el pasivo futuro de καταισχυνθήσεται. La principal mejora necesaria es léxica y estilística en «roca de escándalo», que en español moderno suele sonar a escándalo moral/social más que a piedra que hace caer u ofende. Conviene explicitar mejor el sentido de σκάνδαλον sin colapsarlo con «tropiezo».'
  spanish_quality_summary: El texto es legible y digno, pero «roca de escándalo» suena menos natural y más ambiguo que el inglés auditado. «Piedra» y «roca» están bien diferenciadas; «Mira» funciona, aunque «He aquí» sería más tradicional. «No será avergonzado» es fiel y comprensible. La puntuación y el flujo general son buenos.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La referencia al Mesías en nota está bien alineada. La decisión clave es mantener una traducción de σκάνδαλον que preserve distinción respecto de πρόσκομμα sin introducir una acepción española equívoca; «ofensa» lo logra mejor aquí que «escándalo».
