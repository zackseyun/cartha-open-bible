base_translation:
  language: en
  yaml_path: translation/nt/romans/009/025.yaml
  text: as he also says in Hosea[a], “I will call those who were not my people, ‘my people,’ and her who was not loved[c][b], ‘loved.’”
  footnotes:
  - marker: a
    text: Or, more formally, “I will call the one not my people ‘my people,’ and the one not loved ‘loved.’” The Greek uses singular forms, but the first clause is naturally collective in English.
    reason: lexical_alternative
  - marker: b
    text: Quoted from Hosea (cf. Hos 2:23 LXX/MT numbering differs in some traditions). Paul applies Hosea’s restoration language to God’s calling of a people for himself.
    reason: cross_reference
  - marker: c
    text: Or “beloved” for the final term. The Greek is from the same love-word family used elsewhere for divine love.
    reason: lexical_alternative
