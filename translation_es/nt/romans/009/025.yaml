translation:
  language: es
  text: 'como también dice en Oseas[a]: «A los que no eran mi pueblo los llamaré “mi pueblo”, y a la que no era amada, “amada”»[b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Oseas: el griego usa una fórmula de cita bíblica; aquí se conserva el nombre del profeta sin expandirlo a «libro de Oseas».'
    reason: source_note
  - marker: b
    text: 'O, más formalmente: «Llamaré al que no era mi pueblo “mi pueblo”, y a la que no era amada, “amada”». El griego usa formas singulares, pero la primera cláusula se entiende naturalmente en sentido colectivo.'
    reason: lexical_alternative
  - marker: c
    text: «Amada» traduce el participio pasivo ἠγαπημένην. También puede traducirse «amada» o «bienamada» según el matiz; aquí se mantiene la relación léxica con el verbo de amar. Pablo cita Oseas 2:23; la numeración LXX/MT difiere en algunas tradiciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς καὶ
  english_pob_choice: as he also
  chosen_spanish: como también
  alternatives_spanish:
  - así como también
  - como asimismo
  lexicon: BDAG
  rationale: La combinación comparativa y corroborativa de ὡς καί se conserva de manera natural con «como también», que suena idiomático en español y mantiene la función introductoria de la cita.
- source_word: ἐν τῷ Ὡσηὲ
  english_pob_choice: in Hosea
  chosen_spanish: en Oseas
  alternatives_spanish:
  - en el libro de Oseas
  - por medio de Oseas
  lexicon: BDAG
  rationale: La fórmula cita el libro/profecía de Oseas. «En Oseas» reproduce de forma breve y fiel la preposición ἐν sin expandir innecesariamente el sentido.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - está diciendo
  - afirma
  lexicon: BDAG
  rationale: El verbo mantiene la fórmula escritural de cita directa. En español, el sujeto implícito funciona naturalmente sin añadir explicaciones que no están en el griego.
- source_word: Καλέσω
  english_pob_choice: I will call
  chosen_spanish: Llamaré
  alternatives_spanish:
  - Nombraré
  - Haré llamar
  lexicon: BDAG
  rationale: El futuro de καλέω en este contexto es de designación pactal/identificadora. «Llamaré» preserva el eco bíblico de Oseas y el valor verbal básico.
- source_word: τὸν οὐ λαόν μου
  english_pob_choice: those who were not my people
  chosen_spanish: al que no era mi pueblo
  alternatives_spanish:
  - a los que no eran mi pueblo
  - al que no pertenecía a mi pueblo
  lexicon: BDAG
  rationale: Aunque la forma griega es singular, en el uso de Oseas y Pablo funciona de modo colectivo o representativo. En español, «al que no era mi pueblo» conserva la estructura más cercana al griego sin perder la inteligibilidad; el artículo singular mantiene la tensión documental entre forma y sentido colectivo.
- source_word: λαόν μου
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi propio pueblo
  - un pueblo para mí
  lexicon: BDAG
  rationale: «Mi pueblo» es el equivalente pactal establecido y suficientemente claro en español. Evita sustituir la expresión bíblica por una paráfrasis más explicativa.
- source_word: τὴν οὐκ ἠγαπημένην
  english_pob_choice: her who was not loved
  chosen_spanish: a la que no era amada
  alternatives_spanish:
  - a la no amada
  - a la que no era querida
  lexicon: BDAG
  rationale: La forma femenina singular es importante por el trasfondo de Oseas y debe quedar visible. «A la que no era amada» conserva el género y el valor participial, y mantiene la relación léxica con ἀγαπάω.
- source_word: ἠγαπημένην
  english_pob_choice: loved
  chosen_spanish: amada
  alternatives_spanish:
  - amada con amor
  - querida
  lexicon: BDAG
  rationale: El participio perfecto/pasivo predicativo puede expresarse naturalmente como «amada». «Amada» mantiene la conexión con el lenguaje bíblico de amor divino sin sonar forzado.
theological_decisions:
- issue: Valor colectivo frente a forma singular en la primera cláusula
  english_pob_reading: The Greek uses singular forms, but the first clause is naturally collective in English.
  chosen_spanish_reading: 'Conservar el singular representativo: «al que no era mi pueblo».'
  alternative_spanish_readings:
  - «a los que no eran mi pueblo»
  - «al que no pertenecía a mi pueblo»
  rationale: La cita de Oseas en Pablo funciona como designación representativa de un pueblo llamado por Dios. En español, mantener el singular refleja mejor la forma griega y deja visible la tensión entre forma singular y sentido colectivo, sin eliminarla con una pluralización completa.
  doctrine_reference: Romanos 9:24-26; Oseas 2:23; lectura paulina de la llamada de un pueblo para Dios
- issue: Mantener la referencia femenina de la segunda cláusula
  english_pob_reading: The feminine singular in the second clause is significant to the Hosea source text and should be visible rather than flattened.
  chosen_spanish_reading: 'Conservar la femenina singular: «a la que no era amada».'
  alternative_spanish_readings:
  - «a la no amada»
  - «a la que no fue amada»
  rationale: La forma femenina singular está motivada por el trasfondo de Oseas y debe permanecer reconocible en español. «Era amada» reproduce el valor descriptivo del participio sin convertirlo en un pasado narrativo ajeno al tono de cita.
  doctrine_reference: Oseas 2:23; Romanos 9:25; continuidad de la restauración del pueblo y la esposa simbólica
translation_notes:
  revision_awareness: Se ha seguido el texto griego de Romanos 9:25 y la decisión auditable del POB inglés de conservar la forma singular/representativa de la primera cláusula y la femenina singular de la segunda. La redacción española evita una pluralización interpretativa completa, pero mantiene la inteligibilidad con artículos y verbos naturales en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se mantiene «pueblo mío» como idiomático bíblico para λαός μου, evitando reemplazos por expresiones menos pactales.
  - «Amada» se conserva en femenino para reflejar el texto de Oseas y la cita paulina.
  - La puntuación con comillas angulares y dos puntos sigue el estilo editorial español y delimita claramente la cita directa.
