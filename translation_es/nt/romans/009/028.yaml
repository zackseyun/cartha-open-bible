translation:
  language: es
  text: Porque el Señor llevará a cabo su palabra[a], terminándola y acortándola[b] en la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su asunto» o «su sentencia».
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «cortándola corta» o «acortándola» o, por implicación, «ejecutándola rápidamente».
    reason: lexical_alternative
  - marker: c
    text: Algunos traducen ἐπὶ τῆς γῆς como «en el país», reflejando el contexto original de Isaías; aquí Romanos se lee naturalmente como «en la tierra».
    reason: cross_reference
lexical_decisions:
- source_word: λόγον
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - la palabra
  - el asunto
  - la sentencia
  - el decreto
  lexicon: BDAG
  rationale: En este contexto de cita profética, λόγον funciona como objeto de ποιήσει y alude a lo que el Señor ha hablado y llevará a cumplimiento. «Su palabra» conserva el sentido declarativo y resulta natural en español; «asunto» o «sentencia» sonarían más restrictivos o más interpretativos.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - En efecto
  lexicon: BDAG
  rationale: γάρ introduce la base explicativa de la afirmación anterior. «Porque» mantiene la relación causal/explicativa de manera clara y fluida en español.
- source_word: συντελῶν
  english_pob_choice: finishing it
  chosen_spanish: terminándola
  alternatives_spanish:
  - llevándola a cumplimiento
  - completándola
  lexicon: BDAG
  rationale: El participio presente expresa la manera en que el Señor llevará a cabo su palabra. «Terminándola» comunica la idea de llevarla a su fin sin añadir precisión doctrinal no exigida por el griego.
- source_word: καὶ συντέμνων
  english_pob_choice: and cutting it short
  chosen_spanish: y acortándola
  alternatives_spanish:
  - y cortándola de forma breve
  - y ejecutándola rápidamente
  lexicon: BDAG
  rationale: συντέμνων puede significar «acortar» o «cortar de manera breve». «Acortándola» preserva la imagen y deja abierta la implicación de rapidez sin convertirla en paráfrasis interpretativa.
- source_word: ποιήσει
  english_pob_choice: will carry out
  chosen_spanish: llevará a cabo
  alternatives_spanish:
  - hará
  - cumplirá
  - ejecutará
  lexicon: BDAG
  rationale: ποιέω es amplio; con λόγον como objeto, «llevará a cabo» expresa de forma idiomática que el Señor realizará lo que ha dicho. «Cumplirá» también sería posible, pero «llevará a cabo» mantiene mejor el matiz de acción efectiva.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Se conserva el título reverencial tradicional en español. Dado que el texto de Romanos cita la Escritura y el término corresponde a la forma usada en la tradición bíblica, «el Señor» es claro y fiel.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en el país
  - en la tierra/país
  lexicon: BDAG
  rationale: La construcción griega en Romanos se traduce con alcance amplio. «Sobre la tierra» comunica bien el ámbito global del juicio/acción divina, mientras que «en el país» reflejaría una restricción contextual del Isaías original que el griego de Romanos no impone de manera explícita.
theological_decisions:
- issue: Alcance de la acción divina en la cita de Isaías
  english_pob_reading: The verse speaks of the Lord decisively bringing his spoken word to completion in judgment/history, without specifying a denominationally loaded doctrine beyond the text.
  chosen_spanish_reading: El versículo presenta al Señor llevando a término su palabra de manera decisiva, con el matiz de que la acción puede entenderse como juicio o cumplimiento histórico sin especificar más de lo que dice el texto.
  alternative_spanish_readings:
  - El Señor ejecutará una sentencia judicial de manera breve y decisiva
  - El Señor completará y abreviará su obra salvadora/judicial
  rationale: Los participios pueden sugerir trasfondo judicial, pero el español no debe resolver la tensión con una formulación excesivamente técnica. «Llevará a cabo su palabra, terminándola y acortándola» conserva la fuerza del texto y deja abierta la amplitud del efecto divino.
  doctrine_reference: Preservar la tensión teológica sin imponer una lectura doctrinal más específica que el griego.
translation_notes:
  revision_awareness: Se siguió el pasaje fuente griego de Romanos 9:28 y el audit trail inglés de la POB. No hubo revisiones posteriores aplicadas; la lectura actual coincide con el pass más reciente y conserva las decisiones léxicas y la nota de alcance geográfico.
  spanish_consistency_notes:
  - Se mantuvo «el Señor» para κύριος conforme al estándar bíblico en español.
  - Se tradujo λόγον con «su palabra» para conservar el valor declarativo sin borrar las alternativas semánticas documentadas.
  - Se conservó una formulación amplia para ἐπὶ τῆς γῆς, con nota sobre la posibilidad contextual de «en el país».
  - Se evitó introducir «Cristo» o lenguaje litúrgico no presente en el texto.
  - Se mantuvo la tensión entre «terminándola» y «acortándola» sin convertirla en paráfrasis explicativa.
