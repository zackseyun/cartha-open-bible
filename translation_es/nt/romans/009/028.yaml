    rationale: El inglés auditado señala «shortening it» o por implicación «executing it swiftly». «Haciéndola breve» es menos idiomático y menos preciso que «acortándola»; conviene ajustar la nota.
  revised_spanish_text: Porque el Señor llevará a cabo su palabra[a], terminándola y acortándola[b] en la tierra[c].
