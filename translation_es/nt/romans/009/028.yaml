    rationale: La nota a explica λόγον y debe anclarse en «palabra»; la nota c explica ἐπὶ τῆς γῆς y debe anclarse en «tierra». En el borrador ambas aparecen juntas tras «palabra», lo que distorsiona la referencia.
  - severity: medium
