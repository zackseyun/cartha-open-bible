  glossary_alignment: 'No hay conflicto con terminología de proyecto mayor. Los nombres propios ''Rebeca'' e ''Isaac'' son apropiados. La principal corrección es léxica y sintáctica: hacer inteligible el idiomatismo griego sin paraprasear más allá de la evidencia. ''De un solo hombre'' refleja bien ἐξ ἑνός según la rationale inglesa y evita la opacidad de ''de uno''.'
