translation:
  language: es
  text: Y no solo eso[a], sino que también Rebeca había concebido de un solo hombre, Isaac nuestro padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, algo como «teniendo concepción/cama de uno, Isaac nuestro padre»; es una expresión idiomática que se refiere a la concepción por un solo hombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μόνον δέ, ἀλλὰ καὶ
  english_pob_choice: And not only that, but ... also
  chosen_spanish: Y no solo eso, sino que también
  alternatives_spanish:
  - Y no solo así, sino que también
  - Y no solo esto, sino que también
  lexicon: BDAG
  rationale: La construcción correlativa se conserva con un giro natural en español que mantiene el avance argumental de Pablo y evita un calco rígido.
- source_word: Ῥεβέκκα
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Rébeca
  lexicon: BDAG
  rationale: Se usa la forma castellana establecida y transparente del nombre propio bíblico, fiel al referente griego y comprensible para lectores hispanos.
- source_word: ἐξ ἑνός
  english_pob_choice: by one man
  chosen_spanish: de uno
  alternatives_spanish:
  - por uno
  - de un solo hombre
  lexicon: BDAG
  rationale: La frase griega es abreviada e idiomática; en español, 'de uno' conserva la idea de procedencia única sin añadir explícitamente 'hombre' al texto principal, dado que el contexto y la nota pueden aclararlo.
- source_word: κοίτην ἔχουσα
  english_pob_choice: had conceived by one man
  chosen_spanish: teniendo
  alternatives_spanish:
  - habiendo concebido
  - habiendo tenido unión con
  lexicon: BDAG
  rationale: Se refleja el participio con una forma breve que deja visible el carácter idiomático de la expresión sin forzar una paráfrasis más explícita que el griego. La frase es difícil en español y se conserva su tensión en nota.
- source_word: Ἰσαὰκ
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico.
- source_word: τοῦ πατρὸς ἡμῶν
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - nuestro antepasado
  - nuestro patriarca
  lexicon: BDAG
  rationale: Se mantiene el genitivo ancestral/covenantal con la forma directa 'nuestro padre', tal como en el contexto paulino.
theological_decisions:
- issue: Cómo reflejar el idiomático κοίτην ἔχουσα sin borrar la tensión lexical
  english_pob_reading: Express the point as Rebekah having conceived by one man
  chosen_spanish_reading: Conservar una redacción breve y algo literal en el cuerpo, con nota que explique que la expresión alude a concepción por un solo hombre.
  alternative_spanish_readings:
  - Rebeca había concebido por un solo hombre
  - Rebeca estuvo encinta de un solo hombre
  rationale: La POB inglesa opta por aclarar el sentido idiomático; en español, el texto principal puede quedarse más cerca de la forma griega y la nota explicar la alusión a concepción/unión sexual. Así se preserva la evidencia textual y la claridad interpretativa sin sobrerreformular.
  doctrine_reference: Romanos 9:10; comparación con el argumento de elección en Romanos 9:11-13
- issue: Cómo tratar el elemento implícito de sexo masculino en ἐξ ἑνός
  english_pob_reading: by one man
  chosen_spanish_reading: de uno
  alternative_spanish_readings:
  - de un hombre
  - por un solo hombre
  rationale: '''De uno'' reproduce la economía del griego y deja que la nota haga explícito que el sentido contextual es ''de un solo hombre''. Esto evita introducir un sustantivo que no aparece en la forma breve del texto fuente.'
  doctrine_reference: Romanos 9:10-12
translation_notes:
  revision_awareness: 'El texto inglés fue revisado para quitar ''children'' porque no está explícito en el griego y para mantener una formulación más cercana a la fuente. En español, se siguió la misma cautela: no se añadió ''hijos'' en el cuerpo del texto, y se mantuvo una redacción que conserva la brevedad e idiomaticidad del original, con nota explicativa sobre el giro griego.'
  spanish_consistency_notes:
  - Se usa 'Rebeca' para el nombre propio, en línea con el español bíblico estándar.
  - Se conserva 'nuestro padre' como fórmula ancestral/covenantal.
  - No se introduce 'Mesías', 'SEÑOR' ni otras terminologías no pertinentes al versículo.
  - La nota aclara el valor idiomático de κοίτην ἔχουσα sin imponer una paráfrasis interpretativa en el texto principal.
