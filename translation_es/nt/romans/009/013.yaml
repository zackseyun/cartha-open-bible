translation:
  language: es
  text: 'como está escrito: «A Jacob amé[b], pero a Esaú aborrecí[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rechacé» o «amé menos». La cita procede de Malaquías 1:2–3; algunos entienden aquí «aborrecí» como rechazo del pacto o preferencia comparativa, más que como hostilidad emocional.
    reason: lexical_alternative
  - marker: b
    text: Cita de Malaquías 1:2–3.
    reason: cross_reference
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: BDAG
  rationale: Introduce la cita bíblica de forma natural en español y conserva la relación comparativa del griego sin añadir énfasis no presente en el texto.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - escrito está
  - se ha escrito
  lexicon: BDAG
  rationale: La fórmula de cita bíblica en español suena más natural como «está escrito», manteniendo el valor perfecto-pasivo de la cita establecida.
- source_word: Ἰακώβ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: convención onomástica
  rationale: Se conserva el nombre bíblico usual en español, concorde con la convención estable y con la referencia veterotestamentaria.
- source_word: ἠγάπησα
  english_pob_choice: I loved
  chosen_spanish: amé
  alternatives_spanish:
  - he amado
  - quise
  lexicon: BDAG
  rationale: El aoristo se expresa con pasado simple. «Amé» preserva el paralelismo con el verbo fuerte del griego y evita suavizar el enunciado.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - aunque
  lexicon: BDAG
  rationale: Marca contraste adversativo entre ambas cláusulas, de manera clara y natural en español.
- source_word: Ἠσαῦ
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esaú
  lexicon: convención onomástica
  rationale: Se usa la forma española estándar del nombre propio bíblico.
- source_word: ἐμίσησα
  english_pob_choice: I hated
  chosen_spanish: aborrecí
  alternatives_spanish:
  - odié
  - rechacé
  lexicon: BDAG
  rationale: El griego dice «odié/aborrecí» con fuerza lexical; en español, «aborrecí» conserva esa dureza sin sonar tan coloquial como «odié». Se evita suavizarlo en el texto principal para no resolver la tensión interpretativa.
theological_decisions:
- issue: Cómo reflejar el verbo fuerte μισέω sin diluir la tensión teológica de la cita de Malaquías
  english_pob_reading: Retain the direct rendering 'I hated' in the main text
  chosen_spanish_reading: 'Mantener un verbo fuerte: «aborrecí»'
  alternative_spanish_readings:
  - odié
  - rechacé
  - amé menos
  rationale: La cita griega presenta el verbo ordinario y fuerte de odio/aborrecimiento. Siguiendo el audit trail, la traducción principal conserva esa intensidad en vez de interpretarla como preferencia relativa o rechazo pactal, dejando la discusión exegética para nota.
  doctrine_reference: Preservar la tensión teológica sin resolverla en el texto principal
translation_notes:
  revision_awareness: 'Sin cambios respecto del control más reciente: la decisión clave sigue siendo conservar la fuerza lexical del griego en el texto principal y reservar las alternativas interpretativas para la nota.'
  spanish_consistency_notes:
  - Se mantiene el tono bíblico y sobrio, con puntuación de cita española.
  - Se conserva el paralelismo Jacob/Esaú con nombres bíblicos habituales en español.
  - La nota sobre Malaquías se ancla en la cita para preservar la trazabilidad del texto fuente.
