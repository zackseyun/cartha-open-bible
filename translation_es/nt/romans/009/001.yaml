    changes_summary: 'Changed ''the Messiah'' to ''Christ'' to reflect the Greek Χριστῷ more naturally and idiomatically in this Pauline context; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Digo la verdad en el Mesías[a]; no estoy mintiendo, como mi conciencia da testimonio conmigo en el Espíritu Santo[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Cristo». Χριστός puede funcionar como título («Mesías») o como nombre-forma litúrgica («Cristo»); aquí se vierte como título.
    reason: lexical_alternative
  - marker: b
    text: O «mi conciencia testificando conmigo» o «mi conciencia dando testimonio conmigo».
    reason: lexical_alternative
  - marker: c
    text: O posiblemente «en un espíritu santo», aunque en Pablo esto se entiende más naturalmente como una referencia al Espíritu Santo.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀλήθειαν λέγω
  english_pob_choice: I am telling the truth
  chosen_spanish: Estoy diciendo la verdad
  alternatives_spanish:
  - Digo la verdad
  - Estoy hablando con verdad
  lexicon: BDAG
  rationale: La construcción acusativa con λέγω expresa una declaración solemne de veracidad. En español, «Estoy diciendo la verdad» conserva el tono enfático y natural del presente progresivo, sin rigidizar la frase.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Χριστῷ se toma como título, no como nombre propio. Conforme al criterio del proyecto, se traduce el título cuando el contexto lo permite; «Mesías» preserva el valor titular y evita esconder la elección lexical original.
- source_word: οὐ ψεύδομαι
  english_pob_choice: I am not lying
  chosen_spanish: no estoy mintiendo
  alternatives_spanish:
  - no miento
  - no digo una falsedad
  lexicon: BDAG
  rationale: El verbo deponente en presente se vierte con una negación directa y actual. «No estoy mintiendo» suena natural en español y mantiene la fuerza inmediata de la negación.
- source_word: συμμαρτυρούσης
  english_pob_choice: as ... bears witness with me
  chosen_spanish: como ... da testimonio conmigo
  alternatives_spanish:
  - mientras ... testifica conmigo
  - mi conciencia testificando conmigo
  lexicon: BDAG
  rationale: El participio genitivo absoluto expresa circunstancia concomitante. «Como ... da testimonio conmigo» transmite el sentido de testimonio conjunto del prefijo συμ- sin forzar una estructura poco española.
- source_word: τῆς συνειδήσεώς μου
  english_pob_choice: my conscience
  chosen_spanish: mi conciencia
  alternatives_spanish:
  - mi propia conciencia
  lexicon: BDAG
  rationale: La expresión paulina estándar συνείδησις se traduce por «conciencia». El posesivo μου se integra de modo natural en español.
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_spanish: en el Espíritu Santo
  alternatives_spanish:
  - en un espíritu santo
  - por el Espíritu Santo
  lexicon: BDAG
  rationale: Aunque el griego carece de artículo, en el uso paulino la referencia más probable es al Espíritu Santo personal y divino. En español, la mayúscula y el artículo ayudan a comunicar esa lectura sin perder la preposición ἐν.
theological_decisions:
- issue: Referente de πνεύματι ἁγίῳ
  english_pob_reading: Reference to the Holy Spirit, the divine Spirit, not merely Paul's human spirit
  chosen_spanish_reading: Referencia al Espíritu Santo, el Espíritu divino, y no meramente al espíritu humano de Pablo
  alternative_spanish_readings:
  - al espíritu de Pablo entendido como santo por su disposición
  - a un espíritu santo en sentido cualitativo
  rationale: En el contexto paulino, la lectura más natural es la del Espíritu Santo. La traducción en español mantiene esa interpretación con mayúscula y artículo, sin borrar la ambigüedad gramatical del anartro griego más de lo necesario.
  doctrine_reference: Confesión nicena sobre el Espíritu Santo como persona divina; la traducción procura no rebajar la referencia explícita o probable al Espíritu.
translation_notes:
  revision_awareness: El contexto de revisión en inglés muestra una oscilación documentada entre «Christ» y «Messiah», con restauración final de «Messiah» por política del proyecto. Por eso la versión española mantiene «Mesías» y no neutraliza la decisión con «Cristo». También se conserva la lectura del Espíritu Santo como decisión interpretativa principal, acorde con la auditoría inglesa.
  spanish_consistency_notes:
  - 'Se mantuvo el orden retórico de tres miembros: afirmación, negación, corroboración.'
  - Se prefirió «Mesías» por coherencia con la política terminológica del proyecto en títulos cristológicos.
  - Se usó «Espíritu Santo» con mayúscula por la lectura teológica dominante del pasaje.
  - La puntuación reproduce la pausa enfática del original con dos comas y cierre final equivalente al manuscrito fuente.
