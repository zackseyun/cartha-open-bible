  text: Ἀλήθειαν λέγω ἐν Χριστῷ, οὐ ψεύδομαι, συμμαρτυρούσης μοι τῆς συνειδήσεώς μου ἐν πνεύματι ἁγίῳ,
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/001.yaml
  text: I am telling the truth in Messiah[a]; I am not lying, as my conscience bears witness with me in the Holy Spirit[c][b],
  footnotes:
  - marker: a
    text: Or 'in Christ.' The Greek title Χριστός can function title-like ('Messiah') or name-like ('Christ'); here it is rendered as a title.
    reason: lexical_alternative
  - marker: b
    text: Or 'with my conscience bearing witness' or 'my conscience testifying with me.'
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'in a holy spirit,' though in Paul this is most naturally understood as a reference to the Holy Spirit.
    reason: alternative_reading
