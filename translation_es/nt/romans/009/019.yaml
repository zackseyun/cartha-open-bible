revisions:
- from: 'Me dirás entonces: «¿Por qué, pues, todavía [a] culpa? Porque, ¿quién le ha resistido a su propósito?»,'
  to: 'Me dirás entonces: «¿Por qué, pues, todavía él culpa? Porque ¿quién ha resistido su propósito[a]?»'
  rationale: Se corrige la cláusula principal para que sea gramatical e inteligible en español, manteniendo el valor retórico del futuro («Me dirás»), los dos conectores inferenciales («entonces / pues»), el matiz de ἔτι («todavía»), y la elección teológicamente cuidadosa «propósito» para βούλημα. El marcador de nota se mueve al término pertinente y se regulariza la puntuación. Aunque «todavía él culpa» es algo enfático, preserva de forma bastante literal el sujeto implícito del griego; una opción más idiomática sería «¿Por qué, pues, todavía encuentra culpa?», pero la revisión propuesta ya corrige el problema principal con intervención mínima.
