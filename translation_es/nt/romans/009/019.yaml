translation:
  language: es
  text: 'Me dirás entonces: «¿Por qué, pues, todavía él culpa? Porque ¿quién ha resistido su propósito[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «voluntad». El griego βούλημα puede significar voluntad, intención o propósito.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐρεῖς
  english_pob_choice: You will say
  chosen_spanish: Me dirás
  alternatives_spanish:
  - Dirás
  - Tú dirás
  lexicon: λέγω
  rationale: La forma futura se conserva como futuro discursivo que introduce una objeción anticipada. En español, «Me dirás» suena natural en discurso directo y mantiene el valor de anuncio retórico.
- source_word: μοι
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: ἐγώ
  rationale: El dativo indirecto se expresa de forma natural con pronombre átono en español. «Me» es más idiomático que repetir la preposición.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: entonces / pues
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: οὖν
  rationale: El primer οὖν se refleja con «entonces» y el segundo con «pues» para reproducir el flujo inferencial y la fuerza discursiva sin volver la frase pesada.
- source_word: Τί οὖν ἔτι
  english_pob_choice: Why then does he still
  chosen_spanish: ¿Por qué, pues, todavía
  alternatives_spanish:
  - ¿Qué, pues, todavía
  - ¿Por qué todavía
  lexicon: τίς
  rationale: Aunque τί es literalmente «qué», aquí funciona idiomáticamente como pregunta de causa/razón. «Por qué» capta mejor la objeción retórica en español y «todavía» conserva ἔτι.
- source_word: μέμφεται
  english_pob_choice: find fault
  chosen_spanish: culpa
  alternatives_spanish:
  - reprende
  - encuentra falta
  - halla culpa
  lexicon: μέμφομαι
  rationale: El verbo de culpa/reproche se vierte con «culpa» en forma verbal breve y natural en español («¿Por qué… todavía culpa?»), preservando la idea de reprochar o atribuir falta. Se evita suavizarlo a «reprende» porque la objeción trata de la imputación de culpa.
- source_word: τῷ ... βουλήματι αὐτοῦ
  english_pob_choice: his purpose
  chosen_spanish: su propósito
  alternatives_spanish:
  - su voluntad
  - su intención
  - su querer
  lexicon: βούλημα
  rationale: βούλημα puede significar voluntad, intención o propósito. «Propósito» mantiene el sentido de intención deliberada y sigue la decisión inglesa de evitar un término demasiado cargado doctrinalmente como «voluntad».
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: ¿quién
  alternatives_spanish:
  - quién es el que
  - qué persona
  lexicon: τίς
  rationale: Pronombre interrogativo directo y natural en español.
- source_word: ἀνθέστηκεν
  english_pob_choice: has resisted
  chosen_spanish: ha resistido
  alternatives_spanish:
  - se ha opuesto
  - ha hecho frente
  - ha estado contra
  lexicon: ἀνθίστημι
  rationale: El perfecto griego conserva relevancia presente; «ha resistido» es idiomático y mantiene la oposición continua o efectiva frente al propósito divino.
theological_decisions:
- issue: βούλημα en contexto de soberanía divina
  english_pob_reading: his purpose
  chosen_spanish_reading: su propósito
  alternative_spanish_readings:
  - su voluntad
  - su intención
  rationale: Romanos 9 mantiene la tensión entre soberanía divina y responsabilidad humana. «Propósito» transmite una intención firme sin resolver la tensión mediante una terminología más sistemática o confesional.
  doctrine_reference: Preservar la tensión teológica del pasaje.
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de Romanos 9:19 y el recorrido auditado en inglés. Se conserva el futuro discursivo, la pregunta retórica, la fuerza de μέμφομαι y la ambigüedad lexical de βούλημα sin resolverla de forma doctrinal.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar para el nombre divino cuando corresponda; aquí no aparece.
  - Se mantiene «propósito» para βούλημα, coherente con el tratamiento auditado en inglés.
  - La puntuación reproduce la estructura de objeción y respuesta anticipada del griego.
  - Se evita reemplazar el campo semántico de culpa/reproche por un verbo menos preciso.
