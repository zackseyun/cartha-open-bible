translation:
  language: es
  text: Así que[a] tiene misericordia de quien quiere, y a quien quiere endurece[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por tanto». La partícula inferencial compuesta puede expresarse con varias fórmulas españolas sin cambiar el sentido básico.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hace obstinado» o «vuelve obstinado». El griego usa un verbo activo y no debe debilitarse como mera permisión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα οὖν
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  - Entonces
  lexicon: BDAG
  rationale: La combinación inferencial ἄρα οὖν introduce una conclusión a partir del argumento previo. «Así que» comunica bien esa inferencia en español moderno sin añadir énfasis ajeno ni sonar excesivamente formal.
- source_word: ὃν θέλει
  english_pob_choice: to whom he wills
  chosen_spanish: a quien quiere
  alternatives_spanish:
  - a quien él quiere
  - a quien desea
  - a quien quiere hacer
  lexicon: BDAG
  rationale: Se conserva la fuerza de la voluntad divina con el verbo «quiere», que en español suena natural y mantiene el paralelismo con la segunda cláusula. Evita suavizar θέλει a mera preferencia o deseo débil.
- source_word: ἐλεεῖ
  english_pob_choice: shows mercy
  chosen_spanish: le muestra misericordia
  alternatives_spanish:
  - tiene misericordia de
  - es misericordioso con
  lexicon: BDAG
  rationale: «Misericordia» expresa el sustantivo correspondiente y «le muestra» reproduce el carácter activo del verbo griego, sin perder claridad idiomática en español.
- source_word: ὃν δὲ θέλει
  english_pob_choice: and whom he wills
  chosen_spanish: y a quien quiere
  alternatives_spanish:
  - pero a quien quiere
  - y a quien desea
  - y a quien él quiere
  lexicon: BDAG
  rationale: «Y» mantiene la estructura paralela del griego, mientras que la oposición introducida por δέ queda implícita en la coordinación contrastiva del pasaje. Se conserva la repetición de θέλει para respetar la simetría textual.
- source_word: σκληρύνει
  english_pob_choice: hardens
  chosen_spanish: endurece
  alternatives_spanish:
  - hace obstinado
  - vuelve obstinado
  - hace duro
  lexicon: BDAG
  rationale: «Endurece» es el equivalente bíblico natural en español para σκληρύνει y conserva la acción activa atribuida al sujeto. No se debilita a permiso o mera pasividad, en línea con el audit trail inglés.
theological_decisions:
- issue: Voluntad divina en θέλει
  english_pob_reading: Retain the direct statement of God's willing without softening or resolving debates about predestination and human responsibility.
  chosen_spanish_reading: Mantener la afirmación directa de la voluntad divina sin suavizarla ni resolver aquí la tensión entre la elección divina y la responsabilidad humana.
  alternative_spanish_readings:
  - a quien desea
  - a quien le parece bien
  - a quien permite
  rationale: El griego declara dos veces θέλει de manera explícita; traducirlo con «quiere» conserva esa afirmación fuerte. No se introduce una explicación doctrinal que el texto no da.
  doctrine_reference: Preservar la tensión teológica sin resolverla; primacía del texto original.
- issue: Agencia en σκληρύνει
  english_pob_reading: Translate actively as 'he hardens.'
  chosen_spanish_reading: 'Traducir de forma activa: «endurece».'
  alternative_spanish_readings:
  - permite que sea endurecido
  - lo deja endurecerse
  - lo entrega a la dureza
  rationale: El verbo griego es activo y atribuye la acción al sujeto. La traducción activa evita convertir el pasaje en una simple permisión, lo cual iría más allá del source text.
  doctrine_reference: Primacía del original; preservar la tensión teológica del pasaje.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés disponible: no hubo revisiones aplicadas y el último pase se mantuvo sin cambios. La versión española sigue esa estabilidad y conserva la tensión teológica señalada en el contexto de Romanos 9:18.'
  spanish_consistency_notes:
  - Se mantiene «misericordia» para ἐλεεῖ y «endurece» para σκληρύνει, en continuidad con la terminología bíblica española clara y no eclesiásticamente recargada.
  - Se preserva el paralelismo retórico de las dos cláusulas con la repetición de «a quien quiere».
  - Se usa estilo español contemporáneo, pero sobrio, sin introducir una paráfrasis explicativa que diluya el original.
