base_translation:
  language: en
  yaml_path: translation/nt/romans/009/030.yaml
  text: What then shall we say? That the Gentiles[a], who were not pursuing righteousness[c][b], attained righteousness—the righteousness that is from faith.
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness' (δικαιοσύνη) here and in the repeated uses of the term; Paul can use the word with a range that includes both moral/legal rightness and covenantal justice.
    reason: lexical_alternative
  - marker: b
    text: Or 'the nations' for 'the Gentiles.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the righteousness that comes by faith' or, less likely here, 'the righteousness that comes from faithfulness.'
    reason: alternative_reading
