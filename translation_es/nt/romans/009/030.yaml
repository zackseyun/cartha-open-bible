translation:
  language: es
  text: '¿Qué, pues, diremos? Que los gentiles[a], que no perseguían justicia[b], alcanzaron justicia: la justicia que proviene de la fe[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las naciones» por «los gentiles». Aquí ἔθνη se refiere específicamente a los pueblos no judíos en contraste con Israel.
    reason: lexical_alternative
  - marker: b
    text: O «rectitud» por «justicia» aquí y en las repeticiones del término; Pablo puede usar δικαιοσύνη con un sentido que abarca rectitud moral/legal y justicia de pacto.
    reason: lexical_alternative
  - marker: c
    text: O «la justicia que viene de la fe» o «la justicia que procede de la fe»; menos probablemente aquí, «la justicia que proviene de la fidelidad».
    reason: alternative_reading
lexical_decisions:
- source_word: Τί οὖν ἐροῦμεν
  english_pob_choice: What then shall we say?
  chosen_spanish: ¿Qué, pues, diremos?
  alternatives_spanish:
  - ¿Qué, pues, diremos entonces?
  - ¿Qué diremos, pues?
  lexicon: BDAG
  rationale: Conserva la fórmula paulina deliberativa y su tono retórico sin volverla demasiado explicativa. «Diremos» mantiene el matiz de pregunta retórica; «pues» reproduce οὖν de forma natural en español.
- source_word: ἔθνη
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  lexicon: BDAG
  rationale: En el contexto paulino contrasta con Israel y se refiere a pueblos no judíos; «gentiles» es claro y coherente con el uso teológico habitual. Se mantiene en minúscula por estilo español corriente, aunque no pierde valor étnico-teológico.
- source_word: τὰ μὴ διώκοντα
  english_pob_choice: who were not pursuing
  chosen_spanish: que no perseguían
  alternatives_spanish:
  - que no estaban persiguiendo
  - que no perseguían continuamente
  lexicon: BDAG
  rationale: El participio presente describe una postura continua o característica. «No perseguían» es natural en español y conserva la idea de una acción no emprendida como hábito.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: BDAG
  rationale: Aunque la lectura inglesa prefirió «righteousness», en español «justicia» comunica mejor el campo semántico de δικαιοσύνη sin forzar un tecnicismo poco idiomático. Se deja abierta la amplitud moral y judicial del término, como en el apunte inglés sobre la posible gama de sentido.
- source_word: κατέλαβεν δικαιοσύνην
  english_pob_choice: attained righteousness
  chosen_spanish: alcanzaron justicia
  alternatives_spanish:
  - obtuvieron justicia
  - lograron justicia
  lexicon: BDAG
  rationale: «Alcanzaron» refleja bien la idea de llegar a poseer/obtener lo que no se estaba buscando. Mantiene el contraste argumental de Pablo y suena natural en español.
- source_word: δικαιοσύνην δὲ τὴν ἐκ πίστεως
  english_pob_choice: the righteousness that is from faith
  chosen_spanish: la justicia que es por fe
  alternatives_spanish:
  - la justicia que procede de la fe
  - la justicia que viene de la fe
  lexicon: BDAG
  rationale: Se conserva la relación de origen con ἐκ sin ampliar a fórmulas doctrinales más específicas. «Por fe» es una opción idiomática y teológicamente sobria en español; mantiene la tensión interpretativa sin resolverla hacia «por fe sola» o expresiones equivalentes.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: La traducción estándar y más directa en este contexto paulino es «fe». Se evita ampliar el término a «fidelidad» en el texto principal, aunque esa posibilidad existe en debates exegéticos.
theological_decisions:
- issue: Rango semántico de δικαιοσύνη
  english_pob_reading: Render δικαιοσύνη as 'righteousness' in the main text, while noting 'justice' as an alternative because Paul can use the word with a range including moral/legal rightness and covenantal justice.
  chosen_spanish_reading: Traducir δικαιοσύνη como «justicia» en el texto principal, dejando abierta su amplitud semántica.
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  - justicia del pacto
  rationale: En español, «justicia» preserva mejor la densidad de δικαιοσύνη que «rectitud» en un versículo donde Pablo contrapone un estado/condición alcanzada. No se estrecha el sentido a una sola doctrina; la nota permite reconocer la amplitud moral, legal y de pacto que el griego puede abarcar.
  doctrine_reference: 'Contested terms table: δικαιοσύνη → justice/righteousness; preserve theological breadth'
- issue: Sentido de ἐκ πίστεως
  english_pob_reading: Translate ἐκ πίστεως as 'from faith' rather than expanding to 'by faith alone' or another doctrinally loaded phrase.
  chosen_spanish_reading: Traducir ἐκ πίστεως como «por fe», sin ampliar a formulaciones doctrinales posteriores.
  alternative_spanish_readings:
  - de fe
  - a partir de la fe
  - por medio de la fe
  rationale: «Por fe» conserva el valor relacional/instrumental de ἐκ sin imponer una explicación sistemática que el texto no explicita. Así se mantiene la tensión interpretativa y el flujo paulino.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
- issue: Identidad de ἔθνη
  english_pob_reading: '''the Gentiles'' rather than ''the nations'''
  chosen_spanish_reading: «los gentiles»
  alternative_spanish_readings:
  - las naciones
  rationale: La oposición paulina a Israel se entiende con claridad mediante «gentiles». «Las naciones» sería más literal, pero en español puede sonar menos específico en este contexto.
  doctrine_reference: Pauline ethnic contrast; lexical decision consistent with NT usage
translation_notes:
  revision_awareness: The English audit trail shows a revision that removed 'but' before the appositional phrase because δέ introduces/specifies the kind of righteousness attained rather than contrasting it. The Spanish draft follows that revision by using a colon and not inserting a contrasting conjunction before 'la justicia que es por fe'.
  spanish_consistency_notes:
  - Se mantiene «justicia» como término principal para δικαιοσύνη, coherente con la decisión española de conservar amplitud semántica sin cargar el texto con tecnicismos.
  - «Por fe» se usa en la frase final para respetar ἐκ πίστεως con sobriedad, sin resolver el matiz hacia una fórmula doctrinal más extensa.
  - Se evita «SEÑOR» o cualquier convención innecesaria, pues este versículo no contiene el nombre divino.
  - La puntuación con dos puntos refleja la relación explicativa/apposicional de la última cláusula, conforme al ajuste de revisión del inglés POB.
