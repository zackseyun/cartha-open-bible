review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura argumentativa del griego: fórmula paulina inicial, identificación de los gentiles, participio de no perseguir, verbo de alcanzar y especificación final de la clase de justicia. Sin embargo, hay varios desajustes menores con el expediente POB: el inglés auditado usa una aposición con raya, no dos puntos; la nota sobre ἔθνη incluye una glosa impropia (''Or gente no''); y la decisión principal sobre δικαιοσύνη debería explicitar mejor la tensión entre ''justicia'' y ''rectitud'' sin introducir ruido. Además, ''por fe'' es defendible, pero ''que proviene de la fe'' preserva mejor el valor de ἐκ en español claro.'
  spanish_quality_summary: 'El español es legible y digno, pero necesita pulido editorial. ''¿Qué, pues, diremos?'' es aceptable; el resto suena natural. Los principales problemas son de puntuación y aparato de notas: los dos puntos después de ''justicia'' son menos fieles al valor appositivo del griego y del POB, y las notas están parcialmente en inglés y contienen una frase poco profesional. Conviene también armonizar las notas al español natural y mantener un registro uniforme.'
  glossary_alignment: Alineación parcial. 'gentiles' para ἔθνη está bien. 'justicia' para δικαιοσύνη es una elección posible en español si se conserva la amplitud semántica en nota, aunque el POB inglés privilegia 'righteousness'; no requiere cambio forzoso, pero sí una nota limpia. 'fe' para πίστις está bien. Para ἐκ πίστεως, 'por fe' no es incorrecto, pero 'que proviene de la fe' o 'que viene de la fe' refleja mejor el valor de origen indicado en el expediente.
  issues:
  - severity: medium
    issue: Puntuación principal menos fiel a la aposición final
    rationale: El griego repite δικαιοσύνην y luego la especifica; el expediente inglés revisado usa raya ('—the righteousness...') para una aclaración/apposición. Los dos puntos en español funcionan, pero la raya refleja mejor ese giro paulino y mantiene la cercanía con el audit trail.
  - severity: high
    issue: Nota b defectuosa y parcialmente en inglés
    rationale: La nota 'Or 'gente' no;...' es editorialmente incorrecta, mezcla idiomas y no corresponde al estilo del proyecto. Debe reemplazarse por una nota clara que preserve la alternativa 'las naciones' o eliminarse si resulta redundante.
  - severity: medium
    issue: Notas en inglés en vez de español
    rationale: Las notas a y c comienzan con 'Or ... for ...', lo cual no cumple con la meta de una edición española cuidada. Deben redactarse completamente en español.
  - severity: low
    issue: '''que es por fe'' es menos natural y menos preciso que una formulación con ''de/procede/viene'''
    rationale: Aunque 'por fe' es teológicamente sobrio, en esta construcción relativa 'la justicia que es por fe' suena algo calcado. 'La justicia que proviene de la fe' preserva mejor ἐκ y mejora la naturalidad sin sobreinterpretar.
