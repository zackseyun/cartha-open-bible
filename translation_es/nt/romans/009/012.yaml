translation:
  language: es
  text: 'no por obras, sino por el que llama[a], se le dijo[b][c]: «El mayor servirá al menor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no sobre la base de obras, sino sobre la base del que llama».'
    reason: lexical_alternative
  - marker: b
    text: Cita de Génesis 25:23.
    reason: cross_reference
  - marker: c
    text: 'O: «El más grande servirá al menor», con «mayor/menor» reflejando el contexto de Jacob y Esaú.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ ἐξ ἔργων
  english_pob_choice: not from works
  chosen_spanish: no por obras
  alternatives_spanish:
  - no a base de obras
  - no a partir de obras
  lexicon: BDAG
  rationale: ἐκ con genitivo expresa aquí origen o base; en español, «no por obras» comunica con naturalidad la exclusión de las obras como fundamento sin sobrecargar la frase.
- source_word: ἀλλ’ ἐκ τοῦ καλοῦντος
  english_pob_choice: but from the One who calls
  chosen_spanish: sino por el que llama
  alternatives_spanish:
  - sino por el que llama Dios
  - sino del que llama
  lexicon: BDAG
  rationale: El participio sustantivado τοῦ καλοῦντος se rinde de forma directa con «el que llama». «Por» conserva la idea de base/origen del contraste con ἐκ y mantiene la concisión del griego.
- source_word: ἐρρέθη αὐτῇ
  english_pob_choice: it was said to her
  chosen_spanish: se le dijo a ella
  alternatives_spanish:
  - fue dicho a ella
  - se le habló
  lexicon: BDAG
  rationale: El pasivo aoristo impersonal queda bien en español con «se le dijo». Añadir el pronombre explícito «a ella» mantiene la referencia pronominal del griego sin introducir un sujeto no expresado.
- source_word: Ὁ μείζων
  english_pob_choice: The older
  chosen_spanish: El mayor
  alternatives_spanish:
  - El mayor de edad
  - El más grande
  lexicon: BDAG
  rationale: En el contexto de Jacob y Esaú, el comparativo apunta a la relación de primacía/edad; «el mayor» es la forma más natural y fiel en español para ese contraste.
- source_word: δουλεύσει
  english_pob_choice: will serve
  chosen_spanish: servirá
  alternatives_spanish:
  - será esclavo de
  - estará sujeto a
  lexicon: BDAG
  rationale: Aunque δουλεύω puede tener fuerza servil, en esta cita de Génesis el sentido relacional y de subordinación se expresa bien con «servirá», evitando una sobretraducción que vuelva la frase más pesada.
- source_word: τῷ ἐλάσσονι
  english_pob_choice: the younger
  chosen_spanish: al menor
  alternatives_spanish:
  - al más pequeño
  - al menor de edad
  lexicon: BDAG
  rationale: En la contraposición con μείζων, ἐλάσσων no exige únicamente «menor en edad», sino el miembro inferior de la pareja; «al menor» preserva la comparación de manera idiomática y deja abierto el trasfondo contextual.
theological_decisions:
- issue: Si conviene explicitar una lectura doctrinal sobre elección incondicional o mantener la formulación compacta del contraste
  english_pob_reading: Retained the compact wording without interpretive expansion.
  chosen_spanish_reading: Se mantuvo una formulación compacta sin expansión interpretativa.
  alternative_spanish_readings:
  - no por obras sino por la elección de Dios
  - no por obras sino por el que llama soberanamente
  rationale: El versículo contrasta obras con el llamado de Dios, pero el texto no desarrolla aquí una conclusión doctrinal ampliada. La traducción conserva la tensión argumental sin imponer una glosa teológica adicional.
  doctrine_reference: Preservar la tensión teológica y argumentativa del pasaje, sin resolverla anticipadamente.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador permanece alineado con el pasaje griego y con el audit trail inglés, incluyendo la preferencia por una redacción compacta y la lectura contextual de μείζων/ἐλάσσων.
  spanish_consistency_notes:
  - Se mantiene «por» para reproducir el valor de base/origen de ἐκ en una construcción natural de español.
  - Se evita «Cristo» o terminología eclesiástica no presente en el versículo.
  - «Mayor/menor» preserva la pareja comparativa sin forzar un matiz exclusivamente etario ni exclusivamente de rango.
  - La cita se presenta con comillas españolas y puntuación compatible con uso bíblico moderno.
