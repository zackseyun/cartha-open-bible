translation:
  language: es
  text: 'Y tal como dijo antes Isaías[a]: «Si Yahvé de los ejércitos[b] no nos hubiera dejado descendencia[c], habríamos llegado a ser como Sodoma y habríamos sido hechos como Gomorra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cita de Isaías 1:9.
    reason: cross_reference
  - marker: b
    text: O «Yahvé Sabaot»; el griego Σαβαώθ translitera un título hebreo divino que suele verterse «de los ejércitos» o «de las huestes».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «semilla». Aquí se refiere a descendencia sobreviviente.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - justo como
  lexicon: BDAG
  rationale: Conserva la fuerza comparativa e introductoria de la cita, en un español natural y digno.
- source_word: προείρηκεν
  english_pob_choice: said before
  chosen_spanish: dijo antes
  alternatives_spanish:
  - había dicho antes
  - había dicho previamente
  lexicon: BDAG
  rationale: El perfecto griego señala una acción ya dicha con vigencia en el argumento; en español, el pretérito simple comunica bien la referencia anterior sin sobrerrecargar el tiempo verbal.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: BDAG
  rationale: Aunque el griego cita κύριος, el contexto es una cita de Isaías que alude al nombre divino. Según el criterio del proyecto, se restituye Yahvé en el texto principal para transparentar la referencia al nombre divino, no una mera máscara devocional.
- source_word: Σαβαὼθ
  english_pob_choice: of Hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - Sabaot
  - de los ejércitos celestiales
  lexicon: BDAG
  rationale: 'Se traduce el título hebreo trasliterado por su sentido: un título divino tradicionalmente equivalente a ''Hosts'', claro y reconocible en español.'
- source_word: ἐγκατέλιπεν
  english_pob_choice: had not left
  chosen_spanish: no nos hubiera dejado
  alternatives_spanish:
  - no nos hubiera abandonado
  - no nos hubiera preservado
  lexicon: BDAG
  rationale: En este contexto el verbo expresa dejar atrás un resto o descendencia. 'Dejado' conserva mejor la imagen verbal básica que 'preservado', aunque la idea resultante implica supervivencia.
- source_word: σπέρμα
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - semilla
  - descendientes
  - linaje
  lexicon: BDAG
  rationale: El término literal es 'semilla', pero aquí designa posteridad sobreviviente. 'Descendencia' es natural en español y mantiene la amplitud semántica sin imponer la lectura técnica de 'remanente'.
- source_word: ὡς Σόδομα
  english_pob_choice: like Sodom
  chosen_spanish: como Sodoma
  alternatives_spanish:
  - igual que Sodoma
  - semejantes a Sodoma
  lexicon: BDAG
  rationale: La comparación se expresa de forma directa y idiomática con 'como'.
- source_word: ἂν ἐγενήθημεν
  english_pob_choice: we would have become
  chosen_spanish: habríamos llegado a ser
  alternatives_spanish:
  - habríamos sido
  - nos habríamos convertido
  lexicon: BDAG
  rationale: ἐγενήθημεν marca un resultado contrafáctico; 'llegado a ser' preserva el matiz de cambio de estado mejor que un simple 'ser'.
- source_word: ὡς Γόμορρα
  english_pob_choice: like Gomorrah
  chosen_spanish: como Gomorra
  alternatives_spanish:
  - igual que Gomorra
  - semejantes a Gomorra
  lexicon: BDAG
  rationale: Se mantiene la misma construcción comparativa que con Sodoma para reflejar la paralela del griego.
- source_word: ἂν ὡμοιώθημεν
  english_pob_choice: been made like
  chosen_spanish: habríamos sido hechos semejantes
  alternatives_spanish:
  - habríamos sido asimilados
  - habríamos quedado semejantes
  lexicon: BDAG
  rationale: ὁμοιόω conserva el sentido de 'hacer semejante' o 'ser hecho como'. 'Hechos semejantes' mantiene la pasiva y distingue este segundo verbo de ἐγενήθημεν, respetando la pareja verbal del texto.
theological_decisions:
- issue: Cómo tratar el título divino κύριος Σαβαώθ en una cita de Isaías mediada por el griego
  english_pob_reading: the Lord of Hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Señor de los ejércitos
  - Yahvé Sabaot
  - el Señor de los ejércitos
  rationale: El texto fuente griego usa κύριος con Σαβαώθ transliterado; el contexto de Isaías remite al nombre divino. En español, 'Yahvé de los ejércitos' comunica el título con transparencia y evita ocultar el nombre divino bajo una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve divine-name transparency when the source context warrants it'
- issue: Si σπέρμα debe interpretarse como 'remanente' por el contexto teológico
  english_pob_reading: offspring
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - remanente
  - semilla
  - posteridad
  rationale: Aunque el argumento paulino alude al remanente, el vocablo concreto es σπέρμα. 'Descendencia' conserva el sentido lexical sin sustituirlo por un término doctrinalmente más cargado que el griego no usa aquí.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological tension rather than resolve it'
- issue: Mantener dos verbos distintos en la doble comparación final
  english_pob_reading: we would have become like Sodom and been made like Gomorrah
  chosen_spanish_reading: habríamos llegado a ser como Sodoma y habríamos sido hechos semejantes a Gomorra
  alternative_spanish_readings:
  - habríamos sido como Sodoma y sido hechos como Gomorra
  - nos habríamos convertido en Sodoma y habríamos sido semejantes a Gomorra
  rationale: 'El griego usa dos verbos diferentes: γίνομαι y ὁμοιόω. La traducción distingue ''llegado a ser'' de ''hechos semejantes'' para no aplanar la forma retórica ni la relación semántica del paralelismo.'
  doctrine_reference: 'DOCTRINE.md: Preserve lexical distinctions where the source text does so'
translation_notes:
  revision_awareness: Se siguió la revisión auditada del inglés POB que prefirió un aoristo simple en 'said before' y se evitó extender el valor profético más allá de la cita explícita. También se conservó la distinción entre los dos verbos finales del griego, análoga a la decisión inglesa de no colapsarlos en una sola forma.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al criterio del proyecto para יהוה cuando el contexto de cita bíblica lo transparenta.
  - Se evita 'SEÑOR' como máscara tipográfica en el texto principal; la nota ofrece la alternativa tradicional.
  - '''Descendencia'' mantiene la idea de posteridad sin introducir ''remanente'' en el cuerpo principal.'
  - La doble comparación final preserva dos verbos distintos para reflejar γίνομαι y ὁμοιόω.
  - La puntuación y las comillas siguen el uso español contemporáneo, manteniendo un registro bíblico formal.
