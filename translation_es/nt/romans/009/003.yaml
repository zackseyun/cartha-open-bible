translation:
  language: es
  text: Porque yo mismo desearía ser maldito[a] y separado del Mesías por causa de mis hermanos[b], mis parientes según la carne[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'anatema', 'bajo maldición' o 'separado del Mesías'. La expresión griega combina la idea de estar bajo maldición con la de separación del Mesías.
    reason: lexical_alternative
  - marker: b
    text: Griego 'mis hermanos'; en el contexto, Pablo se refiere a sus compatriotas israelitas, su parentela étnica.
    reason: cultural_note
  - marker: c
    text: '''Según la carne'' aquí significa por descendencia física o linaje étnico, no ''naturaleza pecaminosa''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ηὐχόμην
  english_pob_choice: I could wish
  chosen_spanish: yo mismo desearía
  alternatives_spanish:
  - yo estaba deseando
  - yo podría desear
  - yo mismo podría desear
  lexicon: BDAG
  rationale: El imperfecto de εὔχομαι aquí expresa un deseo hipotético o potencial, no una acción pasada simple. En español, 'desearía' comunica mejor esa irrealidad o posibilidad emotiva que un pretérito llano. Se conserva además el énfasis de αὐτὸς ἐγώ con 'yo mismo'.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - En efecto
  lexicon: BDAG
  rationale: Mantiene la conexión explicativa con el contexto anterior. 'Porque' suena natural en español y preserva la relación lógica sin endurecer el flujo argumentativo.
- source_word: ἀνάθεμα
  english_pob_choice: accursed
  chosen_spanish: anatema
  alternatives_spanish:
  - maldito
  - bajo maldición
  - consagrado a destrucción
  lexicon: BDAG
  rationale: El término griego combina la idea de maldición y de estar apartado para destrucción. 'Anatema' conserva esa fuerza técnico-teológica y evita reducirlo a una sola paráfrasis. Se acompaña con nota para explicitar la alternativa semántica.
- source_word: ἀπὸ τοῦ Χριστοῦ
  english_pob_choice: cut off from the Messiah
  chosen_spanish: estar separado del Mesías
  alternatives_spanish:
  - ser apartado del Mesías
  - quedar alejado del Mesías
  - estar cortado del Mesías
  lexicon: BDAG
  rationale: ἀπό marca separación. En español, 'estar separado de' expresa con claridad la idea sin sonar forzado; 'Mesías' sigue la política del proyecto para Χριστός como título, no como nombre fijo.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título mesiánico. 'Mesías' es la forma más transparente en español y conserva el sentido titulado que el POB documenta.
- source_word: ὑπὲρ
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - por causa de
  - en favor de
  - por el bien de
  lexicon: BDAG
  rationale: En este contexto de disposición sacrificial, 'por amor de' comunica la fuerza benefactora y el impulso personal de Pablo de modo natural en español, sin perder el sentido de beneficio de ὑπέρ.
- source_word: τῶν ἀδελφῶν μου
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis hermanos y hermanas
  - mis hermanos de sangre
  - mis compatriotas
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural del griego y el vínculo familiar/étnico. En este contexto Pablo aclara enseguida que se trata de sus parientes según la carne, por lo que 'hermanos' funciona como término de parentesco y de pertenencia étnica.
- source_word: τῶν συγγενῶν μου
  english_pob_choice: my kinsmen
  chosen_spanish: mis parientes
  alternatives_spanish:
  - mis allegados
  - mis familiares
  - mis de mi misma sangre
  lexicon: BDAG
  rationale: συγγενῶν señala parentesco de linaje; 'parientes' transmite bien la idea de consanguinidad/parentesco amplio en español, y armoniza con la aclaración final 'según la carne'.
- source_word: κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - por descendencia física
  - por linaje humano
  - según descendencia natural
  lexicon: BDAG
  rationale: Aquí σάρξ remite a descendencia física o etnicidad, no a 'naturaleza pecaminosa'. 'Según la carne' conserva la expresión paulina y permite mantener la tensión lexical con una nota explicativa.
theological_decisions:
- issue: Relación entre ἀνάθεμα y la separación de Cristo
  english_pob_reading: '''accursed and cut off from the Messiah'' combines curse and separation.'
  chosen_spanish_reading: '''anatema'' y ''estar separado del Mesías'' mantienen ambas ideas sin diluirlas.'
  alternative_spanish_readings:
  - '''maldito y apartado del Mesías'''
  - '''bajo maldición y separado del Mesías'''
  rationale: El griego no solo expresa maldición sino también separación/expulsión. La traducción conserva ambas dimensiones para no borrar la tensión del texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: curse/separation language in ἀνάθεμα'
- issue: Uso de 'Mesías' para Χριστός
  english_pob_reading: Rendered as 'the Messiah' in the main text.
  chosen_spanish_reading: '''Mesías'' en el texto principal.'
  alternative_spanish_readings:
  - '''Cristo'''
  rationale: El término funciona aquí como título. 'Mesías' es más transparente para lectores hispanos y preserva la referencia titulada que el POB documenta.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah where title; Christ where name-like'
- issue: Sentido de σάρξ en κατὰ σάρκα
  english_pob_reading: 'Literal/ethnic sense: ''according to the flesh.'''
  chosen_spanish_reading: '''según la carne'' con nota de parentesco físico/étnico.'
  alternative_spanish_readings:
  - '''por naturaleza humana'''
  - '''por descendencia física'''
  rationale: El contexto habla de parentesco étnico, no de antropología moral. Se conserva la frase paulina y se explicita el sentido con nota para evitar una lectura de 'naturaleza pecaminosa'.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ = flesh (literal) / sinful nature (metaphorical), context-dependent'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para unir más explícitamente 'accursed' y 'cut off'. La versión española refleja esa doble idea con 'anatema' y 'estar separado del Mesías', manteniendo la relación sin introducir una segunda cláusula independiente innecesaria.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός conforme a la política del proyecto cuando el término funciona como título.
  - '''Según la carne'' se conserva como fórmula paulina; la nota aclara el valor étnico para evitar confusión doctrinal.'
  - '''Hermanos'' y ''parientes'' siguen la distinción del griego entre ἀδελφοί y συγγενεῖς.'
  - La puntuación y el orden buscan fluidez natural en español sin desplazar el foco retórico de Pablo sobre sí mismo.
