base_translation:
  language: en
  yaml_path: translation/nt/romans/009/003.yaml
  text: For I could wish that I myself were accursed and cut off from the Messiah for the sake of my brothers[a], my kinsmen according to the flesh[c][b],
  footnotes:
  - marker: a
    text: Or 'accursed from Christ' or 'under a curse, separated from Christ.' The Greek expression combines the idea of being under a curse with separation from the Messiah.
    reason: lexical_alternative
  - marker: b
    text: Greek 'my brothers'; in context Paul refers to his fellow Israelites, his ethnic kindred.
    reason: cultural_note
  - marker: c
    text: '''According to the flesh'' here means by physical descent or ethnic lineage, not ''sinful nature.'''
    reason: lexical_alternative
