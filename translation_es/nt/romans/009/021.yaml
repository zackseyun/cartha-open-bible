  - severity: low
    issue: La nota alternativa «del mismo barro» para φύραμα es imprecisa
    rationale: φύραμα se refiere a una masa o mezcla amasada. «Del mismo barro» desplaza el sentido desde la masa común al material en abstracto, y por eso es menos fiel como alternativa léxica.
