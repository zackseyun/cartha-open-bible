translation:
  language: es
  text: ¿O no tiene autoridad el alfarero sobre el barro[d][a], para hacer de la misma masa[b] una vasija para honor y otra para deshonra[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no tiene el derecho sobre el barro».
    reason: lexical_alternative
  - marker: b
    text: O «de la misma pasta» o «de la misma mezcla».
    reason: lexical_alternative
  - marker: c
    text: O «una vasija para uso honorable y otra para uso común».
    reason: alternative_reading
  - marker: d
    text: La imagen recuerda pasajes del Antiguo Testamento sobre el alfarero y el barro, como Isaías 29:16; 45:9; Jeremías 18:1–6.
    reason: cross_reference
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿O acaso
  - ¿O más bien
  lexicon: BDAG
  rationale: La partícula introduce la siguiente pregunta retórica; «¿O» mantiene el encadenamiento argumentativo sin añadir énfasis ajeno al griego.
- source_word: οὐκ ἔχει ἐξουσίαν
  english_pob_choice: does ... not have authority
  chosen_spanish: no tiene autoridad
  alternatives_spanish:
  - no tiene derecho
  - no tiene poder
  - no tiene el derecho
  lexicon: BDAG
  rationale: ἐξουσία expresa prerrogativa o autoridad legítima, no mera capacidad. «Autoridad» conserva ese matiz jurídico-relacional y suena natural en español.
- source_word: ὁ κεραμεὺς
  english_pob_choice: the potter
  chosen_spanish: el alfarero
  alternatives_spanish:
  - el potero
  lexicon: BDAG
  rationale: En español, «alfarero» es el equivalente normal y preciso para el artesano que trabaja el barro, y preserva la imagen profética de la figura.
- source_word: τοῦ πηλοῦ
  english_pob_choice: over the clay
  chosen_spanish: sobre el barro
  alternatives_spanish:
  - sobre la arcilla
  - del barro
  lexicon: BDAG
  rationale: El genitivo con ἐξουσίαν se vierte idiomáticamente como relación de dominio «sobre». «Barro» es claro y adecuado para la imagen del alfarero.
- source_word: ἐκ τοῦ αὐτοῦ φυράματος
  english_pob_choice: from the same lump
  chosen_spanish: de la misma masa
  alternatives_spanish:
  - del mismo bulto
  - de la misma pasta
  - del mismo barro
  lexicon: BDAG
  rationale: φύραμα designa algo amasado o mezclado en una masa. «Masa» es más natural en español que «lump», y conserva la idea de material común sin explicar de más.
- source_word: ποιῆσαι
  english_pob_choice: to make
  chosen_spanish: para hacer
  alternatives_spanish:
  - para formar
  - para fabricar
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa naturalmente con «para hacer», que mantiene la sencillez del verbo griego sin introducir una metáfora más fuerte.
- source_word: ὃ μὲν ... ὃ δὲ
  english_pob_choice: one ... and another
  chosen_spanish: uno ... y otro
  alternatives_spanish:
  - uno ... pero otro
  - uno ... y el otro
  lexicon: BDAG
  rationale: La correlación μέν...δέ se reproduce con «uno ... y otro», una forma clara en español para la contraposición de dos objetos.
- source_word: εἰς τιμὴν
  english_pob_choice: for honor
  chosen_spanish: para honor
  alternatives_spanish:
  - para honra
  - para honorabilidad
  - para uso honorable
  lexicon: BDAG
  rationale: Se conserva el lenguaje honorífico directo del griego. «Honor» mantiene el contraste léxico con ἀτιμία sin reinterpretarlo prematuramente como función.
- source_word: σκεῦος
  english_pob_choice: vessel
  chosen_spanish: vaso
  alternatives_spanish:
  - vasija
  - recipiente
  - vaso
  lexicon: BDAG
  rationale: En español bíblico, «vaso» puede abarcar un recipiente u objeto formado por el alfarero. Aquí preserva la imagen sin sonar demasiado técnico.
- source_word: εἰς ἀτιμίαν
  english_pob_choice: for dishonor
  chosen_spanish: para deshonra
  alternatives_spanish:
  - para vergüenza
  - para ignominia
  - para deshonor
  lexicon: BDAG
  rationale: ἀτιμία es el opuesto de τιμή y significa deshonor o falta de honra. «Deshonra» conserva el contraste directo y la carga honor–vergüenza del pasaje.
theological_decisions:
- issue: Cómo rendir ἐξουσία en una discusión sobre la prerrogativa divina y la soberanía
  english_pob_reading: authority
  chosen_spanish_reading: autoridad
  alternative_spanish_readings:
  - derecho
  - poder
  rationale: «Autoridad» expresa la prerrogativa legítima del alfarero sin resolver el debate teológico sobre soberanía humana/divina. Preserva la tensión del argumento de Pablo en lugar de suavizarla.
  doctrine_reference: Mantener la tensión teológica; no resolverla en la traducción.
- issue: Cómo traducir τιμή / ἀτιμία sin convertir la metáfora en una explicación funcional
  english_pob_reading: for honor ... for dishonor
  chosen_spanish_reading: para honor ... para deshonra
  alternative_spanish_readings:
  - para uso honorable ... para uso común
  - para honra ... para vergüenza
  rationale: El griego usa el lenguaje honor–deshonor de forma explícita. Traducirlo así evita reducir la imagen a utilidad doméstica y deja abierta la fuerza metafórica del texto.
  doctrine_reference: Primacía del idioma fuente; preservar la tensión semántica y teológica.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios en el último pase; el acuerdo de revisión y control cruzado fue alto, por lo que no hay variantes textuales pendientes que obliguen a modificar la redacción española.
  spanish_consistency_notes:
  - Se mantuvo «autoridad» para ἐξουσία, coherente con la decisión léxica documentada.
  - Se conservó el contraste honor–deshonra, no la paráfrasis funcional «uso común», para respetar el rango semántico del griego.
  - «Barro» y «masa» reflejan el campo semántico de πηλός y φύραμα sin mezclar imágenes.
  - La puntuación interrogativa reproduce la pregunta retórica del original.
  - Se usó «vaso» para la imagen formada por el alfarero, en línea con el uso bíblico y la audit trail inglesa.
