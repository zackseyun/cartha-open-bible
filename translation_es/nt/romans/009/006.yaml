translation:
  language: es
  text: Pero no es como si la palabra de Dios hubiera fallado. Porque no todos los que descienden de Israel[a] son Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que proceden de Israel». La frase griega señala origen o descendencia.
    reason: lexical_alternative
  - marker: b
    text: El segundo «Israel» se usa en un sentido más restringido que el primero; Pablo distingue entre descendencia física y el sentido pactal más pleno de «Israel».
    reason: cross_reference
lexical_decisions:
- source_word: Οὐχ οἷον δὲ ὅτι
  english_pob_choice: But it is not as though
  chosen_spanish: Pero no es como si
  alternatives_spanish:
  - Pero no es que
  - Sin embargo, no es como si
  lexicon: BDAG
  rationale: La expresión introduce una corrección a una inferencia equivocada. «No es como si» conserva el giro idiomático y evita una paráfrasis explicativa excesiva.
- source_word: ἐκπέπτωκεν
  english_pob_choice: has failed
  chosen_spanish: hubiera fallado
  alternatives_spanish:
  - hubiera caído
  - hubiera llegado a nada
  - hubiera fracasado
  lexicon: BDAG
  rationale: El perfecto griego expresa un estado resultante; en español, el pluscuamperfecto de subjuntivo en una comparación irreal comunica que la palabra de Dios no ha quedado sin efecto. «Fallado» sigue de cerca la decisión inglesa sin endurecer el sentido.
- source_word: ὁ λόγος τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - la promesa de Dios
  - la palabra que viene de Dios
  lexicon: BDAG
  rationale: Se conserva «palabra de Dios» porque el griego dice λόγος de modo amplio; «promesa» sería interpretativo y estrecharía el alcance del texto.
- source_word: οὐ γὰρ πάντες
  english_pob_choice: For not all
  chosen_spanish: Porque no todos
  alternatives_spanish:
  - Pues no todos
  - Ya que no todos
  lexicon: BDAG
  rationale: γάρ introduce la explicación de la negación previa. «Porque no todos» es natural en español y mantiene la relación lógica.
- source_word: οἱ ἐξ Ἰσραήλ
  english_pob_choice: those from Israel
  chosen_spanish: los que descienden de Israel
  alternatives_spanish:
  - los de Israel
  - los que proceden de Israel
  - los descendientes de Israel
  lexicon: BDAG
  rationale: El griego ἐξ señala origen o procedencia. «Descienden de Israel» hace explícita la idea de linaje sin convertir el texto en una paráfrasis doctrinal.
- source_word: οὗτοι Ἰσραήλ
  english_pob_choice: are Israel
  chosen_spanish: son Israel
  alternatives_spanish:
  - estos son Israel
  - pertenecen a Israel
  lexicon: BDAG
  rationale: La cláusula es equativa y muy sobria en griego. «Son Israel» conserva la tensión paulina entre procedencia étnica y el sentido más estrecho de «Israel» sin resolverla en el cuerpo del texto.
theological_decisions:
- issue: Segundo uso de «Israel»
  english_pob_reading: The second 'Israel' is used in a narrower sense than the first; Paul distinguishes physical descent from the fuller covenantal sense of 'Israel.'
  chosen_spanish_reading: El segundo «Israel» se entiende en un sentido más estrecho que el primero; Pablo distingue entre la descendencia física y un uso más pleno o pactal de «Israel».
  alternative_spanish_readings:
  - El segundo «Israel» se refiere al Israel elegido dentro del Israel étnico
  - El segundo «Israel» se refiere al pueblo verdadero de Dios en sentido amplio
  rationale: 'La traducción principal no resuelve la identidad exacta del segundo término. Se conserva la tensión textual: no todo linaje físico agota el significado de «Israel» en el propósito salvador de Dios.'
  doctrine_reference: Preservar la tensión teológica del texto sin imponer una resolución confesional.
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso de la auditoría inglesa y no requiere revisión adicional según el último pase, que quedó sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «palabra de Dios» para λόγος τοῦ θεοῦ.
  - Se usa «Israel» sin sustituciones explicativas en el texto principal para conservar la tensión del pasaje.
  - La puntuación y el orden buscan una lectura bíblica natural en español sin depender de calcos rígidos.
