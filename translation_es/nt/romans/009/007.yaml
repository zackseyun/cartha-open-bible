translation:
  language: es
  text: No es que porque sean descendientes[a] de Abraham, todos sean hijos. Más bien[b], «En Isaac será llamada tu descendencia[c]».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «simiente». El término griego es singular pero colectivo, y puede referirse a descendencia o posteridad.
    reason: lexical_alternative
  - marker: b
    text: O «Pero». El conector marca una corrección enfática respecto de la cláusula anterior.
    reason: alternative_reading
  - marker: c
    text: O «En Isaac será llamada tu simiente», reflejando la cita de Génesis 21:12 de forma más formal. «Será llamada» también puede entenderse como «será nombrada» o, según el contexto, «será designada/contada».
    reason: cross_reference
lexical_decisions:
- source_word: οὐδ’ ὅτι
  english_pob_choice: Nor is it the case that because
  chosen_spanish: No es que porque
  alternatives_spanish:
  - Ni porque
  - Y no porque
  lexicon: BDAG
  rationale: La construcción introduce una negación enlazada con la argumentación anterior y una cláusula causal. En español, «No es que porque» conserva esa relación lógica sin volverla más rígida de lo necesario.
- source_word: εἰσὶν
  english_pob_choice: they are
  chosen_spanish: sean
  alternatives_spanish:
  - son
  - existen como
  lexicon: BDAG
  rationale: El subjuntivo encaja con la estructura impersonal «No es que...», y mantiene el matiz copulativo de εἰμί sin añadir contenido ajeno.
- source_word: σπέρμα Ἀβραάμ
  english_pob_choice: Abraham’s offspring
  chosen_spanish: descendientes de Abraham
  alternatives_spanish:
  - linaje de Abraham
  - simiente de Abraham
  lexicon: BDAG
  rationale: σπέρμα es singular y colectivo; en español «descendientes» comunica bien la descendencia colectiva sin sonar arcaico. Se mantiene la nota de alternativa para la posible lectura singular-colectiva de «linaje»/«simiente».
- source_word: πάντες τέκνα
  english_pob_choice: they are all children
  chosen_spanish: todos sean hijos
  alternatives_spanish:
  - todos sean niños
  - todos sean hijos e hijas
  lexicon: BDAG
  rationale: τέκνα es inclusivo y se puede traducir naturalmente por «hijos» en un contexto de filiación/covenant line. Se conserva la estructura predicativa del griego con un español fluido.
- source_word: ἀλλ’
  english_pob_choice: Rather
  chosen_spanish: Más bien
  alternatives_spanish:
  - Pero
  - Al contrario
  lexicon: BDAG
  rationale: «Más bien» expresa el contraste correctivo de ἀλλά de manera natural y precisa en español contemporáneo.
- source_word: Ἐν Ἰσαὰκ
  english_pob_choice: In Isaac
  chosen_spanish: En Isaac
  alternatives_spanish:
  - Por Isaac
  - A través de Isaac
  lexicon: BDAG
  rationale: Se conserva la preposición «en» porque el texto griego cita la formulación de Génesis con ese valor. Evita interpretar demasiado pronto el alcance lineal de la frase.
- source_word: κληθήσεταί
  english_pob_choice: will be called
  chosen_spanish: será llamado
  alternatives_spanish:
  - será nombrado
  - será considerado
  lexicon: BDAG
  rationale: El futuro pasivo de καλέω se refleja con «será llamado», que mantiene el vínculo lexical con la cita bíblica y evita introducir «designado/reconocido» como interpretación principal.
- source_word: σοι
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - de ti
  - para ti
  lexicon: BDAG
  rationale: 'El dativo se vierte naturalmente como posesivo en la cita bíblica: «tu linaje». Así se conserva la relación de promesa dirigida al patriarca.'
- source_word: σπέρμα
  english_pob_choice: offspring
  chosen_spanish: linaje
  alternatives_spanish:
  - descendencia
  - simiente
  lexicon: BDAG
  rationale: «Linaje» funciona bien en español para la descendencia de promesa, conserva cierta densidad bíblica y evita la literalidad de «simiente» sin perder la conexión con σπέρμα.
theological_decisions:
- issue: Distinción entre descendencia física y filiación de promesa
  english_pob_reading: The verse distinguishes being Abraham's physical offspring from being counted as his covenant children, without specifying here the full mechanism of election.
  chosen_spanish_reading: El versículo distingue entre ser descendientes físicos de Abraham y ser contados como hijos en la línea de la promesa, sin explicar aquí el mecanismo completo de la elección.
  alternative_spanish_readings:
  - Todos los descendientes de Abraham son automáticamente hijos de la promesa.
  - Solo una parte étnica de Israel queda excluida sin referencia a promesa.
  rationale: 'La traducción debe preservar la tensión del argumento paulino: pertenecer a Abraham por descendencia no equivale por sí mismo a la filiación prometida. No se añade una sistematización teológica que el versículo no formula explícitamente.'
  doctrine_reference: Preservar la tensión teológica del texto; no resolver aquí la relación entre descendencia natural y promesa.
- issue: Fuerza de la cita de Génesis
  english_pob_reading: The quotation is rendered in terms of lineal designation ('your offspring will be named') rather than explicit interpretation such as 'reckoned' or 'considered.'
  chosen_spanish_reading: 'La cita se mantiene como formulación de nombramiento: «será llamado», sin convertirla en «será considerado» o «será contado».'
  alternative_spanish_readings:
  - será considerado tu linaje
  - será contado tu linaje
  rationale: El griego usa lenguaje de llamado/nombre; traducirlo así conserva la cita y deja para el contexto la inferencia teológica. «Contado» o «considerado» son posibles, pero más interpretativos.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión doctrinal sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego SBLGNT y toma como guía el audit trail inglés: mantiene la negación encadenada, el contraste correctivo, la cita de Génesis con ἐν Ἰσαάκ y el futuro pasivo de καλέω. Se evita trasladar automáticamente la elección inglesa de ''offspring'' como ''offspring'' literal, optando por una solución española natural (''descendientes'' / ''linaje'') que conserva el valor colectivo-singular de σπέρμα. También se preserva la ambigüedad entre llamado, nombrado y designado, sin resolverla en la línea principal.'
  spanish_consistency_notes:
  - Se usa «hijos» para τέκνα en sentido de filiación, no como exclusión de género.
  - Se evita «SEÑOR» o equivalentes porque este versículo no contiene el nombre divino explícito.
  - Se mantiene «En Isaac» para reflejar la forma citada del texto fuente, aunque la nota ofrece alternativas más explicativas.
  - El texto principal usa un español sobrio y bíblico, sin arcaísmos innecesarios.
