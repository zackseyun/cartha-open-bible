review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la lógica del griego: niega que el mero hecho de ser σπέρμα de Abraham haga que todos sean τέκνα, y conserva la cita con «En Isaac ... será llamado». Sin embargo, hay dos desajustes importantes: «hijos» estrecha el inclusivo τέκνα, donde «hijos» en español puede sonar masculino y menos fiel que «hijos de Dios/descendencia», y sobre todo «tu linaje» para σπέρμα en la cita suena menos natural que «tu descendencia» y debilita la continuidad léxica con «descendientes». También conviene reflejar la nota inglesa b sobre la alternativa formal «tu simiente será llamada».'
  spanish_quality_summary: El español es claro y digno, pero «No es que porque...» suena algo forzado; «Ni por ser descendencia de Abraham son todos hijos» sería más compacto, aunque el actual es comprensible. El problema principal de legibilidad está en «será llamado tu linaje», que resulta poco idiomático en español bíblico actual. «Tu descendencia será llamada» o «será llamada tu descendencia» es más natural. «Más bien» funciona bien.
  glossary_alignment: 'No hay conflicto con terminología doctrinal principal del proyecto. La decisión sobre σπέρμα debería mantenerse de forma más consistente y natural en español: «descendencia» encaja mejor que «linaje» aquí, con nota para «simiente». Para τέκνα, «hijos» no preserva tan bien el valor inclusivo como «hijos»/«hijos e hijas», pero en español bíblico «hijos» puede tolerarse; aun así, «hijos» aquí puede conservarse si el contexto de filiación pesa más que la inclusividad explícita.'
  issues:
  - severity: medium
    issue: «tu linaje» para σπέρμα en la cita
    rationale: Aunque semánticamente posible, «linaje» con «será llamado» suena poco natural en español y se aleja de la formulación más directa de la cita. «Tu descendencia» preserva mejor el singular colectivo y la fluidez.
  - severity: medium
    issue: Falta una nota equivalente a la alternativa formal de la cita
    rationale: El inglés POB conserva la alternativa «In Isaac your seed will be called». El español debería preservar esa alternativa con «En Isaac será llamada tu simiente» o similar.
  - severity: low
    issue: «hijos» para τέκνα
    rationale: No es incorrecto en contexto de filiación, pero «τέκνα» es inclusivo. Conviene al menos reconocer que no significa específicamente «hijos varones».
