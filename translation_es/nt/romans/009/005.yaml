    rationale: El texto griego elide el verbo. En español, «es el Mesías» refleja mejor la cópula implícita sin añadir idea de procedencia verbal.
  - severity: low
    issue: Marcador [b] colocado en «Dios» en lugar de al final tras «los siglos».
    rationale: El POB inglés ancla [b] al final del verso (tras «forever»), no en «God». La adjudicación Opus reposiciona [b] al final para reflejar fielmente el POB inglés.
