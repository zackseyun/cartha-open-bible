translation:
  language: es
  text: de ellos son los padres[a], y de ellos, según la carne, procede el Mesías, el que está sobre todos, Dios[b] bendito por los siglos. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con respecto a la descendencia humana». Literalmente, «según la carne».'
    reason: lexical_alternative
  - marker: b
    text: 'O, tomando la última cláusula como una doxología aparte: «Sea bendito Dios, que está sobre todos, por los siglos. Amén», en vez de una descripción del Mesías.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ πατέρες
  english_pob_choice: the fathers
  chosen_spanish: los padres
  alternatives_spanish:
  - los patriarcas
  - los antepasados
  lexicon: BDAG
  rationale: Mantiene la correspondencia directa con el griego y conserva el lenguaje histórico del pacto. En español, «los padres» es suficientemente natural en un contexto bíblico y no estrecha indebidamente la referencia.
- source_word: ἐξ ὧν
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de quienes
  lexicon: BDAG
  rationale: «De ellos» expresa de forma idiomática el origen o procedencia de Israel sin sobrecargar la frase con una estructura más rígida.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός. «Mesías» es la opción preferida del proyecto para el título, y resulta más transparente en español que «Cristo» cuando no funciona como nombre fijo.
- source_word: τὸ κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - con respecto a la descendencia humana
  - según el linaje humano
  lexicon: BDAG
  rationale: La expresión española reproduce la fuerza idiomática de κατὰ σάρκα y deja visible el lenguaje paulino sobre ascendencia corporal/terrenal. No se suaviza a «humanamente» para no perder la tensión lexical de σάρξ.
- source_word: σάρκα
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana
  - linaje
  lexicon: BDAG
  rationale: Se mantiene «carne» por fidelidad al campo semántico paulino y porque aquí señala descendencia física, no naturaleza pecaminosa.
- source_word: ὁ ὢν ἐπὶ πάντων
  english_pob_choice: who is over all
  chosen_spanish: el que está sobre todos
  alternatives_spanish:
  - el que es sobre todos
  - el que reina sobre todos
  lexicon: BDAG
  rationale: «El que está sobre todos» conserva el participio sustantivado y comunica la idea de supremacía/autoridad con naturalidad en español.
- source_word: θεὸς εὐλογητὸς
  english_pob_choice: God blessed
  chosen_spanish: Dios bendito
  alternatives_spanish:
  - bendito sea Dios
  - Dios, bendito
  lexicon: BDAG
  rationale: La secuencia se mantiene lo más cerca posible del orden griego sin forzar una puntuación dogmática en el texto principal. «Dios bendito» permite la lectura cristológica principal y deja abierta, en nota, la alternativa doxológica.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: «Por los siglos» es una equivalencia española estándar para la fórmula doxológica y preserva el plural intensivo del griego mejor que un simple «para siempre».
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén.
  lexicon: BDAG
  rationale: Se conserva la transliteración litúrgica tradicional en español.
theological_decisions:
- issue: ¿A quién describe la cláusula final 'ὁ ὢν ἐπὶ πάντων, θεὸς εὐλογητὸς εἰς τοὺς αἰῶνας'?
  english_pob_reading: 'La cláusula continúa describiendo al Mesías: ''who is over all, God blessed forever.'''
  chosen_spanish_reading: 'La cláusula continúa describiendo al Mesías: ''el que está sobre todos, Dios bendito por los siglos.'''
  alternative_spanish_readings:
  - 'Una doxología separada: ''Sea bendito Dios, que está sobre todos, por los siglos.'''
  - 'Una lectura separada: ''Dios, que está sobre todos, sea bendito por los siglos.'''
  rationale: La sintaxis griega permite leer el participio articular como continuación de ὁ χριστός, y esa es la lectura principal del POB en inglés. El texto español conserva esa opción sin cerrar la discusión en la puntuación del cuerpo del versículo. La ambigüedad histórica y manuscrita debe permanecer visible en nota.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
translation_notes:
  revision_awareness: El borrador sigue el estado más reciente del expediente, que indica alta coincidencia y sin cambios necesarios en la revisión más reciente. Se conservó la alternativa doxológica documentada en inglés y se ajustó la formulación española para que sea publicable, manteniendo la ambigüedad sintáctica relevante en nota.
  spanish_consistency_notes:
  - Se usó «Mesías» conforme a la terminología por defecto del proyecto para Χριστός como título.
  - Se mantuvo «carne» para σάρξ y se explicó su valor de descendencia física en la nota.
  - Se evitó «SEÑOR» como máscara para el nombre divino, pero aquí no aparece el Tetragrámaton; la decisión principal afecta a θεός en la cláusula final.
  - «Amén» se dejó sin traducir por ser fórmula litúrgica estable en español.
  - La puntuación del texto principal favorece la lectura cristológica, pero la nota preserva la alternativa doxológica sin eliminar la tensión documentada.
