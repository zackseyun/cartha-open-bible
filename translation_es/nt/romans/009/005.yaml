review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro auditado del POB en sus decisiones principales: «los padres», «el Mesías», «según la carne», y la lectura principal cristológica de la cláusula final. También preserva correctamente la nota sobre la alternativa doxológica. Sin embargo, hay un desajuste importante de anclaje de nota: la nota [a] explica «según la carne», pero está colocada en «padres». Además, «procede» introduce un matiz verbal no presente en el texto, donde basta una cópula elíptica en español.'
  spanish_quality_summary: El español es en general claro y digno, pero requiere un pequeño arreglo para naturalidad y precisión. «De ellos son los padres» suena algo forzado; «de ellos son los padres» es tolerable en estilo bíblico, pero el problema real es «procede el Mesías», que explicita indebidamente una idea de procedencia verbal en lugar de simplemente afirmar que el Mesías es de ellos según la carne. Reubicar la nota [a] y ajustar esa frase mejora fidelidad y legibilidad.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: Χριστός -> «Mesías», σάρξ -> «carne», θεός -> «Dios», ἀμήν -> «Amén». No hay conflicto con los términos por defecto. La única excepción material es estilística/sintáctica, no de glosario.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en «padres», pero su contenido explica «según la carne».
    rationale: Esto viola la disciplina requerida de notas y puede confundir al lector sobre qué expresión tiene la alternativa léxica.
  - severity: medium
    issue: «Procede el Mesías» añade un matiz no expresado explícitamente en el griego ni en el POB inglés.
    rationale: El texto griego elide el verbo y afirma origen/descendencia por la construcción total; en español, «es el Mesías» o «viene el Mesías» no son equivalentes exactos, y «procede» suena más interpretativo de lo necesario.
  - severity: low
    issue: «De ellos son los padres» suena algo rígido en español actual.
    rationale: Aunque es aceptable en registro bíblico, una formulación ligeramente más fluida conserva mejor la dignidad y legibilidad sin perder cercanía al original.
  revised_spanish_text: de ellos son los padres, y de ellos es el Mesías según la carne[a], el que está sobre todos, Dios[b] bendito por los siglos. Amén.
  revised_footnotes:
  - marker: a
    text: 'O: «con respecto a la descendencia humana». Literalmente, «según la carne».'
    reason: lexical_alternative
  - marker: b
    text: 'O, tomando la última cláusula como una doxología aparte: «Sea bendito Dios, que está sobre todos, por los siglos. Amén», en vez de una descripción del Mesías.'
    reason: alternative_reading
  revision_rationale: Se reubica la nota [a] al sintagma que realmente comenta, «según la carne», y se reemplaza «procede el Mesías» por «es el Mesías» para evitar añadir un matiz verbal interpretativo no presente en el griego. Se conserva la lectura cristológica principal y la nota sobre la alternativa doxológica del POB inglés.
