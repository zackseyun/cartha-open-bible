  revision_rationale: 'Adjudicación Opus para Rom 9:5, el crux clásico sobre divinidad del Mesías. Decisiones: (1) mantener la lectura cristológica principal (Cristo es «Dios bendito por los siglos») conforme al POB inglés, los manuscritos sin puntuación, la sintaxis griega natural del participio articular ὁ ὢν como apositivo a ὁ χριστός, y el Credo Niceno-Constantinopolitano (381) / Definición de Calcedonia (451) referenciados en el expediente inglés. (2) Preservar la doxología alternativa en nota [b], como hace el POB inglés. (3) Mantener marcador [a] sobre «padres» (no sobre «carne») para reflejar exactamente el anclaje del POB inglés, que coloca [a] en «fathers» para introducir el discurso sobre los privilegios de Israel —el contenido literal de la nota sobre κατὰ σάρκα viene a continuación porque toda la cláusula sobre el Mesías «según la carne» está ligada a la introducción «de ellos son los padres». (4) Reposicionar [b] al final tras «los siglos» para mirroring exacto del EN. (5) Sustituir «procede» por «es» (cópula elíptica) para evitar matiz verbal interpretativo.'
