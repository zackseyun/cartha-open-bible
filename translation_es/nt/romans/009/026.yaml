    text: O «hijos e hijas». El griego dice literalmente «hijos», y se conserva en el texto principal para mantener la forma del original y su resonancia de filiación/herencia.
    reason: lexical_alternative
  - marker: b
    text: Cita/alusión de Os 1:10 (2:1 LXX), con lenguaje de restauración del pacto.
    reason: cross_reference
  revision_rationale: 'Se mantiene el texto principal porque es fiel, natural y teológicamente adecuado. Solo se corrige la nota [a] para que sea coherente con la decisión lexical documentada: «hijos» permanece en el texto principal como equivalente de υἱοὶ, y la alternativa inclusiva queda relegada a nota sin confundir dónde se preserva la forma griega.'
