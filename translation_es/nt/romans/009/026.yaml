review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: conserva la estructura de cita, la fórmula pactal «mi pueblo», el adverbio enfático de reversión («allí») y el pasivo «serán llamados». También mantiene correctamente «Dios vivo». Sin embargo, la nota léxica [a] no sigue fielmente la lógica del English POB: allí la alternativa es «children», mientras que el texto principal retiene «sons». En español, «hijos» ya puede funcionar como inclusivo, por lo que proponer «hijos e hijas» como alternativa principal desplaza innecesariamente la decisión documentada y además la explicación dice erróneamente que el griego masculino «se conserva en la nota», cuando en realidad se conserva en el texto principal.'
  spanish_quality_summary: El español es claro, natural y digno. «En el mismo lugar donde se les dijo» y «allí serán llamados hijos del Dios vivo» suenan bien en español bíblico contemporáneo. La única reparación necesaria es la redacción de la nota [a], para que sea internamente coherente y mejor alineada con la justificación lexical del proyecto.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: θεοῦ = «Dios», υἱοὶ = «hijos» en el texto principal, y λαός μου = «mi pueblo». No hay conflicto con los defaults principales. La excepción relevante es que la nota de υἱοὶ debe reflejar que el texto principal preserva la forma masculina/incluyente «hijos», y que una alternativa posible en español es «hijos/as» o «hijos e hijas», pero no debe presentarse como si esa fuera la opción auditada principal.'
  issues:
  - severity: medium
    issue: La nota [a] está desalineada con la decisión lexical auditada para υἱοὶ.
    rationale: El English POB conserva «sons» en el texto principal y da «children» como alternativa. El borrador español conserva «hijos» en el texto principal, pero la nota ofrece «hijos e hijas» y afirma de forma confusa que el griego masculino «se conserva en la nota», cuando en realidad se conserva en el texto principal. La nota debe explicar la alternativa sin contradecir la decisión principal.
  revised_spanish_text: 'Y en el mismo lugar donde se les dijo[b]: «Ustedes no son mi pueblo», allí serán llamados hijos[a] del Dios vivo.'
  revised_footnotes:
