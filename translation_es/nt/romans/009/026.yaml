translation:
  language: es
  text: 'Y en el mismo lugar donde se les dijo[b]: «Ustedes no son mi pueblo», allí serán llamados hijos[a] del Dios vivo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos e hijas». El griego dice literalmente «hijos», y se conserva en el texto principal para mantener la forma del original y su resonancia de filiación/herencia.
    reason: lexical_alternative
  - marker: b
    text: Cita/alusión de Os 1:10 (2:1 LXX), con lenguaje de restauración del pacto.
    reason: cross_reference
lexical_decisions:
- source_word: ἐν τῷ τόπῳ οὗ
  english_pob_choice: in the very place where
  chosen_spanish: en el mismo lugar donde
  alternatives_spanish:
  - en el lugar donde
  - en aquel mismo lugar donde
  lexicon: BDAG
  rationale: τόπος es 'lugar'; el contexto de cita de restauración pide marcar la correspondencia enfática. 'En el mismo lugar' conserva la repetición del lugar sin sonar forzado en español.
- source_word: ἐρρέθη αὐτοῖς
  english_pob_choice: it was said to them
  chosen_spanish: se les dijo
  alternatives_spanish:
  - fue dicho a ellos
  - les fue dicho
  lexicon: BDAG
  rationale: El pasivo impersonal de λέγω se vuelve natural en español con 'se les dijo', preservando que la voz divina queda implícita sin explicitarse más de lo que el griego permite.
- source_word: Οὐ λαός μου ὑμεῖς
  english_pob_choice: You are not my people
  chosen_spanish: Ustedes no son mi pueblo
  alternatives_spanish:
  - No son mi pueblo
  - No son ustedes mi pueblo
  lexicon: BDAG
  rationale: '''Mi pueblo'' mantiene la fórmula del pacto y la alusión a Oseas. ''Ustedes no son'' respeta el orden y la claridad del español moderno.'
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: '''Allí'' transmite el valor adverbial de reversión en el mismo lugar referido; es claro y solemne en español.'
- source_word: κληθήσονται
  english_pob_choice: will be called
  chosen_spanish: serán llamados
  alternatives_spanish:
  - serán nombrados
  - serán llamados por
  lexicon: BDAG
  rationale: El futuro pasivo de καλέω se conserva con 'serán llamados', evitando añadir agencia explícita no presente en el texto.
- source_word: υἱοὶ
  english_pob_choice: sons
  chosen_spanish: hijos[a]
  alternatives_spanish:
  - hijos e hijas
  - hijos
  lexicon: BDAG
  rationale: El griego usa υἱοὶ, pero en español 'hijos' comunica la filiación de modo natural e incluye a todos los incorporados al pueblo de Dios. Se mantiene la tensión lexical del masculino griego en la nota.
- source_word: θεοῦ ζῶντος
  english_pob_choice: of the living God
  chosen_spanish: del Dios vivo
  alternatives_spanish:
  - del Dios que vive
  - del Dios viviente
  lexicon: BDAG
  rationale: '''Dios vivo'' es la forma natural y fiel en español para θεοῦ ζῶντος, preservando el contraste bíblico con los ídolos y la cualidad vital de Dios.'
theological_decisions:
- issue: Referencia al pacto y restauración de Oseas
  english_pob_reading: Quotation/allusion from Hos 1:10(2:1 LXX), using covenant-restoration language.
  chosen_spanish_reading: Cita/alusión de Oseas 1:10 (2:1 LXX), con lenguaje de restauración del pacto.
  alternative_spanish_readings:
  - alusión a Oseas 1:10
  - cita de Oseas 1:10
  rationale: Romanos 9:26 reutiliza la fórmula de Oseas para describir la reintegración del pueblo de Dios. La nota ayuda a leer el verso como restauración del pacto, no como una frase aislada.
  doctrine_reference: DOCTRINE.md §Tipología y cumplimiento bíblico
- issue: Renderizado de υἱοὶ como término de filiación
  english_pob_reading: sons
  chosen_spanish_reading: hijos[a]
  alternative_spanish_readings:
  - hijos e hijas
  - descendientes
  rationale: Aunque el griego dice literalmente 'hijos' en masculino, el español bíblico permite 'hijos' como término inclusivo de filiación sin borrar la forma del original. La nota conserva la alternativa lexical y el matiz de herencia/filiación.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
- issue: Uso de 'pueblo' para λαός μου
  english_pob_reading: my people
  chosen_spanish_reading: mi pueblo
  alternative_spanish_readings:
  - mi propio pueblo
  - mi gente
  rationale: '''Mi pueblo'' es la fórmula pactal estable y más fiel al trasfondo de Oseas. ''Mi gente'' debilitaría el eco bíblico y ''mi propio pueblo'' añade énfasis no exigido por el texto.'
  doctrine_reference: DOCTRINE.md §Covenant language
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registraron cambios necesarios tras la verificación de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ y 'Dios vivo' para ζῶντος, sin sustituir por una forma más litúrgica.
  - Se conserva el pasivo en 'serán llamados' para κληθήσονται.
  - Se usa 'mi pueblo' como fórmula del pacto, coherente con la alusión a Oseas.
  - La nota [a] resuelve la tensión entre la forma griega masculina υἱοὶ y la naturalidad inclusiva del español bíblico.
