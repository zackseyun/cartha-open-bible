review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura del griego: finalidad con «para», «dar a conocer» para γνωρίσῃ, «las riquezas de su gloria», la metáfora «vasos de misericordia», y «preparó de antemano» para προητοίμασεν. Sin embargo, el uso principal de «sobre vasos de misericordia» para ἐπὶ σκεύη suena poco natural en español en este contexto y además desplaza la decisión auditada en inglés, donde el texto principal fue revisado a «for vessels of mercy» y la alternativa «on vessels» quedó en nota. En español, la mejor preservación del sentido relacional sin aspereza innecesaria es «para vasos de misericordia», con nota alternativa para «sobre».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero «dar a conocer ... sobre vasos» resulta forzado y difícil de leer fluidamente en español bíblico contemporáneo. «Para vasos de misericordia» mejora la naturalidad sin perder el matiz teleológico/relacional, mientras la nota puede conservar la opción más literal/metafórica «sobre». También conviene ajustar la nota a un español más natural: «dar a conocer» en vez de «hacer conocer».'
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: no aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. «Gloria», «misericordia», «vasos» y «preparó de antemano» están bien alineados con las decisiones léxicas y teológicas documentadas. La única desalineación relevante es que el español principal privilegia «sobre» donde la auditoría inglesa dejó esa opción como alternativa en nota.'
  issues:
  - severity: medium
    issue: La preposición principal «sobre vasos de misericordia» suena antinatural en español.
    rationale: Aunque ἐπί puede admitir «sobre», en español esta construcción después de «dar a conocer las riquezas de su gloria» se siente áspera y menos clara que «para». La nota puede preservar el matiz alternativo «sobre/en relación con».},{
  - severity: medium
    issue: El texto principal español no sigue la revisión auditada del POB inglés respecto a ἐπὶ.
    rationale: La revisión inglesa cambió el texto principal de «upon vessels» a «for vessels» y dejó «on vessels» como alternativa. El español debería reflejar esa decisión salvo razón fuerte en contra, que aquí no supera el costo de naturalidad.
  - severity: low
    issue: La nota a dice «hacer conocer», giro menos natural que «dar a conocer».
    rationale: La alternativa debe sonar idiomática en español; «dar a conocer» o «hacer saber» funciona mejor que «hacer conocer».
