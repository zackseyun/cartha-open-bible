translation:
  language: es
  text: y para dar a conocer las riquezas de su gloria para vasos de misericordia[b], que él preparó de antemano para gloria,
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O «sobre vasos de misericordia». La preposición puede entenderse aquí como «sobre» o «en relación con»; el sentido es que las riquezas de la gloria de Dios se muestran en relación con estos vasos.
