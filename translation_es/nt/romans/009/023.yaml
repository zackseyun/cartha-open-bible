lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - e incluso
  lexicon: BDAG
  rationale: Conector coordinante normal que mantiene la continuidad sintáctica del argumento.
- source_word: ἵνα
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de que
  - para que
  lexicon: BDAG
  rationale: Expresa finalidad de modo natural en español y conserva el valor purposivo del griego.
- source_word: γνωρίσῃ
  english_pob_choice: make known
  chosen_spanish: dar a conocer
  alternatives_spanish:
  - hacer saber
  - manifestar
  - revelar
  lexicon: BDAG
  rationale: «Dar a conocer» comunica bien la acción de hacer público o patente algo, sin cargar más de lo que permite el verbo griego.
- source_word: τὸν πλοῦτον
  english_pob_choice: the riches
  chosen_spanish: las riquezas
  alternatives_spanish:
  - la riqueza
  - la abundancia
  lexicon: BDAG
  rationale: El plural español refleja el sustantivo abstracto en uso colectivo y suena natural en el registro paulino.
- source_word: τῆς δόξης αὐτοῦ
  english_pob_choice: of his glory
  chosen_spanish: de su gloria
  alternatives_spanish:
  - de su majestad
  - de su esplendor
  lexicon: BDAG
  rationale: Se conserva el término bíblico central «gloria» sin suavizarlo.
- source_word: ἐπὶ σκεύη
  english_pob_choice: for vessels / upon vessels
  chosen_spanish: sobre vasos
  alternatives_spanish:
  - para vasos
  - en vasos
  - con respecto a vasos
  lexicon: BDAG
  rationale: «Sobre» permite reflejar el matiz espacial/metafórico de ἐπί con acusativo y mantiene la imagen de la gloria mostrada en relación con los vasos.
- source_word: σκεύη
  english_pob_choice: vessels
  chosen_spanish: vasos
  alternatives_spanish:
  - vasijas
  - recipientes
  - vasos
  lexicon: BDAG
  rationale: «Vasos» conserva la metáfora de recipiente/objeto y es una correspondencia transparente y reconocible en español bíblico.
- source_word: ἐλέους
  english_pob_choice: of mercy
  chosen_spanish: de misericordia
  alternatives_spanish:
  - de compasión
  - misericordiosos
  lexicon: BDAG
  rationale: Se mantiene el sustantivo abstracto como en la estructura paralela del contexto («vasos de ira» / «vasos de misericordia»).
- source_word: ἃ
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - las cuales
  - los cuales
  lexicon: BDAG
  rationale: Pronombre relativo natural en español que enlaza con «vasos» sin cambiar el referente plural neutro del griego.
- source_word: προητοίμασεν
  english_pob_choice: he prepared beforehand
  chosen_spanish: preparó de antemano
  alternatives_spanish:
  - preparó previamente
  - dispuso de antemano
  lexicon: BDAG
  rationale: La forma compuesta de προ- se refleja explícitamente con «de antemano», preservando el valor temporal y la iniciativa divina.
- source_word: εἰς δόξαν
  english_pob_choice: for glory
  chosen_spanish: para gloria
  alternatives_spanish:
  - hacia gloria
  - para la gloria
  lexicon: BDAG
  rationale: «Para gloria» mantiene la meta o finalidad de εἰς sin añadir elementos interpretativos.
theological_decisions:
- issue: Relación entre ἐπὶ σκεύη y la metáfora de los vasos
  english_pob_reading: The preposition can be rendered 'on/upon' here; the sense is that God's glorious riches are displayed in relation to these vessels.
  chosen_spanish_reading: «Sobre vasos» mantiene la imagen de exhibición o extensión de la gloria en relación con los vasos, sin convertir la frase en una paráfrasis explicativa.
  alternative_spanish_readings:
  - en relación con vasos
  - para vasos
  - en vasos
  rationale: El texto habla con imagen metafórica; «sobre» preserva el relieve figurado y evita borrar la tensión semántica del pasaje.
  doctrine_reference: Preservar la metáfora paulina y su ambigüedad relacional.
- issue: Alcance de προητοίμασεν y su peso doctrinal
  english_pob_reading: Retain the verbal idea 'he prepared beforehand' without adding interpretive qualifiers.
  chosen_spanish_reading: «Preparó de antemano» conserva la afirmación de preparación previa sin introducir ‘predestinó’ ni suavizar a un mero ‘dispuso’.
  alternative_spanish_readings:
  - predestinó de antemano
  - preparó previamente
  - lo dejó listo
  rationale: El griego afirma preparación previa divina; la traducción debe mantener esa afirmación sin resolver sistemas doctrinales posteriores.
  doctrine_reference: Preservar la tensión teológica sin imponer un marco confesional.
- issue: Metáfora de identidad corporativa en «vasos de misericordia»
  english_pob_reading: Keep the metaphor 'vessels of mercy' in the plural.
  chosen_spanish_reading: «Vasos de misericordia» mantiene el plural y la metáfora nominal, en lugar de reinterpretarla como simple descripción de personas.
  alternative_spanish_readings:
  - personas que reciben misericordia
  - objetos de misericordia
  - recipientes de misericordia
  rationale: La imagen es parte del argumento de Romanos 9 y no debe diluirse en una paráfrasis explicativa.
  doctrine_reference: Primacía del texto original sobre la explicación doctrinal implícita.
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantuvo la lectura de propósito para ἵνα, preservó la metáfora de «vessels of mercy», y revisó ἐπὶ hacia una formulación más natural en inglés («for vessels of mercy») sin abandonar su matiz relacional. La propuesta española sigue ese mismo equilibrio: conserva finalidad, metáfora y la referencia a la preparación previa, mientras usa una preposición española natural que no aplana la imagen.'
  spanish_consistency_notes:
  - Se mantiene «gloria» como término teológico central, no «majestad» ni «esplendor».
  - Se usa «vasos» para conservar la metáfora paulina y coherencia con Romanos 9.
  - «De antemano» refleja explícitamente el prefijo προ- de προητοίμασεν.
  - La puntuación conserva una sola oración coordinada, acorde con la sintaxis del griego.
