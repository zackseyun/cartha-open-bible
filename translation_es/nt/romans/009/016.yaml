translation:
  language: es
  text: Así que[a], no depende del que quiere ni del que corre[b], sino de Dios que tiene misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Por tanto, no es del que quiere ni del que corre, sino de Dios que tiene misericordia». El griego es elíptico; el sujeto implícito se entiende por el contexto del propósito y la misericordia de Dios.'
    reason: lexical_alternative
  - marker: b
    text: «Corre» probablemente conserva una imagen metafórica de esfuerzo o empeño humano, pero el verbo griego es literalmente «corre».
    reason: cultural_note
lexical_decisions:
- source_word: ἄρα οὖν
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: La doble partícula inferencial introduce una conclusión. «Así que» comunica bien la consecuencia lógica en español actual sin volver la frase excesivamente formal.
- source_word: οὐ
  english_pob_choice: does not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no depende
  - no es
  lexicon: BDAG
  rationale: 'El griego es elíptico; en español conviene suplir con una negación directa y una construcción verbal natural. Aquí la idea se expresa con «no depende». '
- source_word: τοῦ θέλοντος
  english_pob_choice: the one who wills
  chosen_spanish: del que quiere
  alternatives_spanish:
  - del que desea
  - del que pretende
  lexicon: BDAG
  rationale: El participio sustantivado expresa voluntad. «Quiere» es natural en español y conserva el sentido volitivo mejor que «desea», que puede sonar más afectivo.
- source_word: οὐδὲ
  english_pob_choice: or
  chosen_spanish: ni
  alternatives_spanish:
  - o
  - ni tampoco
  lexicon: BDAG
  rationale: Después de una negación, «ni» reproduce con claridad la continuación negativa del griego y suena idiomático en español.
- source_word: τοῦ τρέχοντος
  english_pob_choice: the one who runs
  chosen_spanish: del que corre
  alternatives_spanish:
  - del que se esfuerza
  - del que lucha
  lexicon: BDAG
  rationale: «Corre» mantiene la imagen literal del verbo griego. El matiz metafórico de esfuerzo queda disponible por contexto sin reemplazar la metáfora original.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - antes bien
  lexicon: BDAG
  rationale: Tras una negación, «sino» expresa mejor el contraste correctivo que «pero».
- source_word: τοῦ ἐλεῶντος θεοῦ
  english_pob_choice: God who shows mercy
  chosen_spanish: de Dios que tiene misericordia
  alternatives_spanish:
  - de Dios que muestra misericordia
  - del Dios misericordioso
  lexicon: BDAG
  rationale: La forma participial se conserva con un verbo activo de misericordia. «Tiene misericordia» es una expresión estable y natural en español, fiel al carácter verbal de ἐλεῶντος.
theological_decisions:
- issue: Sujeto elíptico y alcance de la dependencia
  english_pob_reading: It does not depend on the one who wills or the one who runs, but on God who shows mercy.
  chosen_spanish_reading: No depende del que quiere ni del que corre, sino de Dios que tiene misericordia.
  alternative_spanish_readings:
  - No depende de la voluntad humana ni del esfuerzo humano, sino de Dios que tiene misericordia.
  - No es del que quiere ni del que corre, sino de Dios que tiene misericordia.
  rationale: El griego es elíptico y el contexto inmediato trata del propósito misericordioso de Dios. La redacción principal conserva esa tensión sin explicitar más de lo que el versículo dice. Se evita resolver el alcance en una formulación doctrinal más cerrada.
  doctrine_reference: Preservar la tensión teológica sin imponer una explicación interpretativa en el texto principal.
translation_notes:
  revision_awareness: La versión española sigue el consenso alto del control de calidad y no requiere cambios de revisión respecto al texto base inglés; se mantiene la elipsis y la imagen verbal original.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ según la convención del proyecto.
  - Se mantiene «misericordia» como traducción de ἐλεῶντος sin convertirlo en adjetivo («misericordioso») en el texto principal.
  - «Sino» se emplea por ser la contraposición natural tras negación en español.
  - El tono es bíblico pero contemporáneo, sin recurrir a fórmulas eclesiásticas que oscurezcan la relación con el griego.
