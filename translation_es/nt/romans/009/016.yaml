  text: ἄρα οὖν οὐ τοῦ θέλοντος οὐδὲ τοῦ τρέχοντος ἀλλὰ τοῦ ἐλεῶντος θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/016.yaml
  text: So then[a], it does not depend on the one who wills or the one who runs[b], but on God who shows mercy.
  footnotes:
  - marker: a
    text: Or, more formally, 'Therefore it is not of the one who wills nor of the one who runs, but of God who shows mercy.' The Greek is elliptical; the implied subject is supplied from the context of God's purpose and mercy.
    reason: lexical_alternative
  - marker: b
    text: '''Runs'' likely carries a metaphor of human effort or striving, but the Greek verb is literally ''runs.'''
    reason: cultural_note
