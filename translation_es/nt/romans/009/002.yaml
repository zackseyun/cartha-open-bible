translation:
  language: es
  text: que tengo gran tristeza[a] y un dolor[b] incesante en mi corazón[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'aflicción' para 'tristeza'.
    reason: lexical_alternative
  - marker: b
    text: O 'angustia' para 'dolor'.
    reason: lexical_alternative
  - marker: c
    text: El griego dice literalmente 'a mi corazón', un modismo que en español se expresa naturalmente como 'en mi corazón'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: En este contexto, ὅτι introduce la explicación o fundamento de la afirmación anterior en un tono emocional y solemne; en español, 'porque' comunica esa continuidad discursiva con naturalidad. 'Que' también sería posible si se tomara como simple complemento declarativo, pero 'porque' refleja mejor la relación retórica aquí.
- source_word: λύπη
  english_pob_choice: sorrow
  chosen_spanish: tristeza
  alternatives_spanish:
  - dolor
  - aflicción
  - pena
  lexicon: BDAG
  rationale: '''Tristeza'' expresa el peso emocional de λύπη de forma clara y contemporánea. ''Dolor'' quedaría reservado aquí para ὀδύνη; ''aflicción'' y ''pena'' son alternativas válidas, pero menos naturales en esta combinación.'
- source_word: μοί ἐστιν
  english_pob_choice: I have
  chosen_spanish: tengo
  alternatives_spanish:
  - hay para mí
  - me es
  lexicon: BDAG
  rationale: La construcción griega con dativo + εἰμί expresa experiencia/posesión. 'Tengo' transmite la idea con precisión y evita una formulación calcada en español.
- source_word: μεγάλη
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - muy grande
  lexicon: BDAG
  rationale: '''Gran'' es la forma más natural antepuesta al sustantivo y conserva la intensidad de μεγάλη. ''Grande'' sería correcto, pero menos idiomático en este lugar.'
- source_word: ἀδιάλειπτος
  english_pob_choice: unceasing
  chosen_spanish: incesante
  alternatives_spanish:
  - constante
  - continuo
  lexicon: BDAG
  rationale: '''Incesante'' mantiene la fuerza de algo que no cesa, con un registro digno y bíblico. ''Constante'' o ''continuo'' suavizan un poco más la idea de interrupción inexistente.'
- source_word: ὀδύνη
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - angustia
  - aflicción
  lexicon: BDAG
  rationale: '''Dolor'' es la opción más directa para ὀδύνη en español y conserva la referencia a un sufrimiento interior intenso. ''Angustia'' enfatiza el estado emocional; ''aflicción'' resulta algo más general.'
- source_word: τῇ καρδίᾳ μου
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - para mi corazón
  - en mi interior
  lexicon: BDAG
  rationale: Se conserva la imagen concreta del corazón como sede de la vida interior. La traducción idiomática 'en mi corazón' corresponde bien al sentido griego y al uso bíblico en español.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan alta concordancia; se mantiene la estructura emotiva del original sin añadir explicaciones. No se incorporan notas porque no se documentó una ambigüedad relevante que requiera anclaje en el texto español.
  spanish_consistency_notes:
  - 'Se preserva el orden coordinado de dos expresiones paralelas: tristeza / dolor.'
  - Se evita traducir literalmente el dativo con 'a mí es' o 'hay para mí' por claridad idiomática.
  - No se usa 'SEÑOR' ni terminología teológica ajena al versículo.
  - El registro es sobrio y publicable, sin intensificación añadida más allá de 'gran' e 'incesante'.
