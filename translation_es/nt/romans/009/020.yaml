translation:
  language: es
  text: 'Pero[a] ¿quién eres tú[b], oh hombre, para replicarle a Dios? ¿Acaso lo formado[c] le dirá al que lo formó: «¿Por qué me hiciste así[d]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Al contrario» o «Más bien» para μενοῦνγε, haciendo más explícita su fuerza correctiva.
    reason: lexical_alternative
  - marker: b
    text: Vocativo masculino singular usado aquí de manera representativa para un ser humano.
    reason: cultural_note
  - marker: c
    text: O «¿No dirá lo formado…?». La pregunta griega espera una respuesta negativa.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «¿Por qué me hiciste así?»; también puede expresarse «de este modo».
    reason: lexical_alternative
lexical_decisions:
- source_word: μενοῦνγε
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Más bien
  - Al contrario
  lexicon: BDAG
  rationale: La partícula introduce un giro correctivo o contrastivo. «Pero» conserva la fuerza adversativa en español sin volver pesada la frase; «Al contrario» sería más explícita, pero menos natural en esta pregunta retórica.
- source_word: ὦ ἄνθρωπε
  english_pob_choice: O man
  chosen_spanish: oh hombre
  alternatives_spanish:
  - oh ser humano
  - hombre
  lexicon: BDAG
  rationale: El vocativo es directo y retórico. «Oh hombre» mantiene la forma apelativa y la carga representativa del singular masculino en el contexto, sin suavizar el reproche.
- source_word: σὺ τίς εἶ
  english_pob_choice: who are you
  chosen_spanish: ¿quién eres tú?
  alternatives_spanish:
  - ¿quién eres tú, entonces?
  - ¿quién eres tú en realidad?
  lexicon: BDAG
  rationale: La pregunta es desafiante, no meramente identificadora. «¿Quién eres tú?» es el equivalente natural y conserva la confrontación retórica.
- source_word: ὁ ἀνταποκρινόμενος τῷ θεῷ
  english_pob_choice: to answer back to God
  chosen_spanish: para replicarle a Dios
  alternatives_spanish:
  - para responderle en contra de Dios
  - para contestarle a Dios
  lexicon: BDAG
  rationale: El participio expresa responder de manera opositora o irrespetuosa, no una respuesta neutral. «Replicarle» comunica bien esa fuerza en español y mantiene la asimetría entre criatura y Dios.
- source_word: μὴ ἐρεῖ
  english_pob_choice: Will ... say
  chosen_spanish: ¿Acaso ... dirá
  alternatives_spanish:
  - ¿No dirá ...?
  - ¿Dirá ...?
  lexicon: BDAG
  rationale: La construcción con μή y futuro plantea una pregunta retórica con expectativa de respuesta negativa. «¿Acaso ... dirá?» reproduce esa expectativa de forma idiomática en español.
- source_word: τὸ πλάσμα
  english_pob_choice: what is formed
  chosen_spanish: la cosa formada
  alternatives_spanish:
  - lo formado
  - la obra formada
  lexicon: BDAG
  rationale: πλάσμα designa algo formado o moldeado. «La cosa formada» conserva la relación con el hacedor y evita introducir una interpretación más concreta de la que el griego exige.
- source_word: τῷ πλάσαντι
  english_pob_choice: to the one who formed it
  chosen_spanish: al que la formó
  alternatives_spanish:
  - al que la modeló
  - al que la moldeó
  lexicon: BDAG
  rationale: El participio aoristo nombra al hacedor. «Al que la formó» corresponde con claridad al paralelismo de formador/formada y suena natural en español.
- source_word: Τί με ἐποίησας οὕτως;
  english_pob_choice: Why did you make me like this?
  chosen_spanish: ¿Por qué me hiciste así?
  alternatives_spanish:
  - ¿Por qué me hiciste de este modo?
  - ¿Por qué me hiciste de esta manera?
  lexicon: BDAG
  rationale: El griego pregunta literalmente por haber sido hecho «así/ de este modo». «Así» es la equivalencia breve y fiel en español; no añade contenido ajeno al texto.
theological_decisions:
- issue: Tensión retórica entre criatura y Creador
  english_pob_reading: Preserved a sharp challenge without softening divine-human asymmetry
  chosen_spanish_reading: Se preserva una reprensión directa que mantiene la asimetría entre la criatura y Dios
  alternative_spanish_readings:
  - 'Una formulación más neutra: «para responderle a Dios»'
  - 'Una suavización: «para hablarle a Dios»'
  rationale: El verso no describe una conversación neutral sino una objeción impropia frente a Dios. «Replicarle» y el vocativo «oh hombre» conservan la fuerza de la reprensión sin atenuar el contraste.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Valor representativo de ἄνθρωπε
  english_pob_reading: Rendered as 'O man' rather than a gender-neutral form
  chosen_spanish_reading: 'Se mantiene el vocativo masculino representativo: «oh hombre»'
  alternative_spanish_readings:
  - oh ser humano
  - oh persona
  rationale: En este contexto el singular masculino funciona representativamente para la humanidad frente a Dios. Traducirlo con un neutro diluiría la forma apelativa del original y su filo retórico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Pregunta retórica con μή + futuro
  english_pob_reading: The Greek question expects a negative answer
  chosen_spanish_reading: Se expresa con «¿Acaso ... dirá?» para mantener la expectativa de respuesta negativa
  alternative_spanish_readings:
  - ¿No ... dirá?
  - ¿Dirá ...?
  rationale: La construcción griega no solo pregunta; presupone que la respuesta es no. «¿Acaso ... dirá?» ayuda a que ese valor retórico quede audible en español.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La comparación con la edición inglesa muestra acuerdo alto y sin cambios sustanciales en la última revisión; se mantuvo la lectura retórica y la red de verbos de formar/contestar sin introducir novedades interpretativas.
  spanish_consistency_notes:
  - Se usó «Dios» para θεῷ conforme a la norma del proyecto.
  - 'Se mantuvo la raíz verbal de formar: «formada / formó» para preservar el paralelismo πλάσμα / πλάσαντι.'
  - Se evitó «Cristo» y otras terminologías no pertinentes al versículo.
  - La puntuación reproduce la interrogación doble y el discurso directo final del griego.
