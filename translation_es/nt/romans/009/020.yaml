  text: ⸂ὦ ἄνθρωπε, μενοῦνγε⸃ σὺ τίς εἶ ὁ ἀνταποκρινόμενος τῷ θεῷ; μὴ ἐρεῖ τὸ πλάσμα τῷ πλάσαντι Τί με ἐποίησας οὕτως;
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/020.yaml
  text: But who are you[a], O man, to answer back to God? Will what is formed say to the one who formed it[d][c][b], “Why did you make me like this?”
  footnotes:
  - marker: a
    text: Or “On the contrary, O man” for μενοῦνγε, making the corrective force more explicit.
    reason: lexical_alternative
  - marker: b
    text: Greek “O man,” a masculine singular form used here representatively for a human being.
    reason: cultural_note
  - marker: c
    text: Or “Will not what is formed say…?” The Greek question expects a negative answer.
    reason: lexical_alternative
  - marker: d
    text: Literally, “Why did you make me thus?”
    reason: lexical_alternative
