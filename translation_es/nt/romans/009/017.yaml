translation:
  language: es
  text: 'Porque la Escritura dice a Faraón[a]: «Para esto mismo te levanté: para que yo muestre en ti[b] mi poder, y para que mi nombre sea proclamado en toda la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te preservé» / «te hice permanecer», reflejando el sentido más amplio del verbo en el contexto de la cita del Éxodo.
    reason: lexical_alternative
  - marker: b
    text: «Mi nombre» alude al renombre y la reputación revelada de Dios, no solo a una etiqueta pronunciada.
    reason: cultural_note
lexical_decisions:
- source_word: ἡ γραφή
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - Escritura
  lexicon: BDAG
  rationale: Se conserva el sustantivo singular definido y la personificación de la Escritura como hablante. En español, «la Escritura» es natural y refleja bien el artículo definido del griego.
- source_word: λέγει ... τῷ Φαραώ
  english_pob_choice: says to Pharaoh
  chosen_spanish: dice a Faraón
  alternatives_spanish:
  - dice al Faraón
  - habla a Faraón
  lexicon: BDAG
  rationale: Se mantiene el presente histórico de λέγει y la dirección del discurso a Faraón. «Dice a Faraón» es fiel y natural en español bíblico contemporáneo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación del argumento precedente con una conexión causal clara y fluida en español.
- source_word: Εἰς αὐτὸ τοῦτο
  english_pob_choice: For this very purpose
  chosen_spanish: Para esto mismo
  alternatives_spanish:
  - Para este mismo fin
  - Precisamente para esto
  lexicon: BDAG
  rationale: La expresión enfática de propósito se conserva de manera idiomática. «Para esto mismo» mantiene el énfasis sin forzar una paráfrasis excesiva.
- source_word: ἐξήγειρά σε
  english_pob_choice: I raised you up
  chosen_spanish: te levanté
  alternatives_spanish:
  - te alcé
  - te preservé
  - te hice surgir
  lexicon: BDAG
  rationale: '«Levanté» conserva la amplitud semántica que el POB inglés deja abierta: puede abarcar elevar, suscitar, poner en escena o preservar, sin cerrar indebidamente la tensión del texto.'
- source_word: ὅπως ἐνδείξωμαι
  english_pob_choice: that I might display
  chosen_spanish: para mostrar
  alternatives_spanish:
  - para manifestar
  - para demostrar
  lexicon: BDAG
  rationale: El valor de propósito se expresa de forma natural en español con infinitivo final. «Mostrar» conserva la idea de exhibir o manifestar el poder de Dios sin recargar la frase.
- source_word: ἐν σοὶ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - por medio de ti
  - sobre ti
  lexicon: BDAG
  rationale: Se conserva la preposición «en» para no desplazar el matiz griego hacia una interpretación instrumental más fuerte de la necesaria.
- source_word: τὴν δύναμίν μου
  english_pob_choice: my power
  chosen_spanish: mi poder
  alternatives_spanish:
  - mi fuerza
  - mi poderío
  lexicon: BDAG
  rationale: «Poder» es el equivalente directo y transparente de δύναμις en este contexto de manifestación divina.
- source_word: καὶ ὅπως διαγγελῇ
  english_pob_choice: and that ... might be proclaimed
  chosen_spanish: y para que ... sea proclamado
  alternatives_spanish:
  - y para que ... sea anunciado
  - y para que ... se dé a conocer
  lexicon: BDAG
  rationale: El pasivo de finalidad se conserva con una construcción final en español. «Sea proclamado» reproduce bien el sentido público y solemne de διαγγελῇ.
- source_word: τὸ ὄνομά μου
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi fama
  - mi renombre
  lexicon: BDAG
  rationale: Se mantiene la forma literal, que en lenguaje bíblico incluye identidad, reputación y renombre. El contexto ya da el alcance teológico sin necesidad de expandirlo en el texto principal.
- source_word: ἐν πάσῃ τῇ γῇ
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - por toda la tierra
  - en toda la tierra habitada
  lexicon: BDAG
  rationale: «Tierra» comunica de forma natural el alcance universal del texto y preserva la amplitud geográfica de la afirmación.
theological_decisions:
- issue: Alcance de ἐξήγειρά σε respecto de Faraón y la soberanía divina
  english_pob_reading: I raised you up, with a broad sense that can include bringing Pharaoh onto the scene, preserving him, or positioning him for this purpose.
  chosen_spanish_reading: te levanté, con un alcance amplio que puede incluir suscitarlo, preservarlo o colocarlo en escena para este propósito.
  alternative_spanish_readings:
  - te preservé
  - te hice surgir
  - te puse en este lugar
  rationale: Se preserva la tensión interpretativa del texto y del POB inglés sin resolverla en una sola opción doctrinal. La forma «te levanté» es suficientemente amplia para sostener el argumento paulino sobre la soberanía divina.
  doctrine_reference: Preservar la tensión teológica; no cerrar indebidamente el debate sobre la soberanía y la responsabilidad humana.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora los marcadores [a] y [b] aparecen exactamente en el texto español en los lugares correspondientes.'
  spanish_consistency_notes:
  - Se mantiene «Escritura» para ἡ γραφή, coherente con el uso bíblico personificado.
  - Se conserva «Faraón» sin artículo, conforme al flujo natural del español y al valor del dativo en la cita.
  - Se evita traducir κύριος o el nombre divino en este versículo, pues el texto cita el Éxodo sin ese término explícito.
  - Se conserva la amplitud semántica de ἐξήγειρά σε con una redacción que no fija indebidamente la interpretación.
