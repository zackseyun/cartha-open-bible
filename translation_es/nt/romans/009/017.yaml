source:
  edition: SBLGNT
  text: λέγει γὰρ ἡ γραφὴ τῷ Φαραὼ ὅτι Εἰς αὐτὸ τοῦτο ἐξήγειρά σε ὅπως ἐνδείξωμαι ἐν σοὶ τὴν δύναμίν μου, καὶ ὅπως διαγγελῇ τὸ ὄνομά μου ἐν πάσῃ τῇ γῇ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/017.yaml
  text: 'For the Scripture says to Pharaoh[a], “For this very purpose I raised you up: that I might display my power in you[b], and that my name might be proclaimed in all the earth.”'
  footnotes:
  - marker: a
    text: Or “I preserved you” / “I caused you to stand,” reflecting the broader sense of the verb in the Exodus citation context.
    reason: lexical_alternative
  - marker: b
    text: “My name” refers to God's revealed renown and reputation, not merely a spoken label.
    reason: cultural_note
