translation:
  language: es
  text: En cuanto al evangelio[a], son enemigos por causa de ustedes; pero en cuanto a la elección, son amados por causa de los padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Respecto al evangelio, son enemigos a causa de ustedes; pero respecto a la elección, son amados por causa de los padres».'
    reason: lexical_alternative
  - marker: b
    text: «Los padres» se refiere a los patriarcas de Israel, especialmente Abraham, Isaac y Jacob.
    reason: cross_reference
lexical_decisions:
- source_word: κατὰ μὲν τὸ εὐαγγέλιον
  english_pob_choice: With respect to the gospel
  chosen_spanish: En cuanto al evangelio
  alternatives_spanish:
  - As respecto del evangelio
  - Según el evangelio
  lexicon: BDAG
  rationale: κατά con acusativo aquí marca la esfera o punto de referencia, no movimiento. «En cuanto a» reproduce bien la función contrastiva de μέν...δέ en español natural, manteniendo la relación formal del griego sin volverla rígida.
- source_word: εὐαγγέλιον
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: «Evangelio» es el equivalente establecido y preciso en contexto paulino. «Buena noticia» es posible, pero menos técnico y menos fiel al uso eclesial y bíblico del término.
- source_word: ἐχθροὶ
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - hostiles
  - aborrecidos
  lexicon: BDAG
  rationale: 'El adjetivo nominativo plural funciona predicativamente: «son enemigos». «Enemigos» conserva el peso relacional y no diluye la fuerza nominal del griego.'
- source_word: δι’ ὑμᾶς
  english_pob_choice: for your sake
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - por ustedes
  - a causa de ustedes
  lexicon: BDAG
  rationale: διά con acusativo expresa razón o motivo. «Por causa de ustedes» comunica bien la idea de beneficio/razón en un español natural y transparente.
- source_word: κατὰ δὲ τὴν ἐκλογὴν
  english_pob_choice: but with respect to election
  chosen_spanish: pero en cuanto a la elección
  alternatives_spanish:
  - pero respecto de la elección
  - pero según la elección
  lexicon: BDAG
  rationale: Se conserva el paralelismo con la primera cláusula. «Elección» es el término teológico normal para ἐκλογή y mantiene la referencia a la elección divina sin expandirla innecesariamente.
- source_word: ἐκλογὴν
  english_pob_choice: election
  chosen_spanish: elección
  alternatives_spanish:
  - escogimiento
  - selección
  lexicon: BDAG
  rationale: «Elección» es el sustantivo más preciso y reconocido para el concepto paulino de ἐκλογή. «Escogimiento» suena más explicativo y «selección» es demasiado general.
- source_word: ἀγαπητοὶ
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados entrañablemente
  - queridos
  lexicon: BDAG
  rationale: En español, «amados» expresa de forma natural el valor predicativo del adjetivo y mantiene la relación de ser objeto de amor. «Beloved» no es idiomático como forma central del texto.
- source_word: διὰ τοὺς πατέρας
  english_pob_choice: because of the fathers
  chosen_spanish: por causa de los padres
  alternatives_spanish:
  - a causa de los padres
  - por amor a los padres
  lexicon: BDAG
  rationale: διά con acusativo indica motivo o fundamento. Se mantiene «los padres» como fórmula literal y con resonancia pactual, sin reemplazarla por «patriarcas» en el texto principal.
theological_decisions:
- issue: Referente de «ellos» implícito en «son enemigos / son amados»
  english_pob_reading: They refers to ethnic Israel / the Jewish people in Paul’s argument of Romans 9–11.
  chosen_spanish_reading: El sujeto implícito se entiende como Israel étnico / el pueblo judío en el argumento de Romanos 9–11.
  alternative_spanish_readings:
  - Más estrechamente, los judíos incrédulos del tiempo de Pablo
  rationale: El versículo habla corporativamente dentro del desarrollo de Romanos 9–11. La traducción no concreta más de lo que el griego exige, preservando la tensión histórica y pactual del pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
- issue: Sentido de «enemigos»
  english_pob_reading: The phrase describes their status in relation to the gospel, not a denial of God's covenantal love.
  chosen_spanish_reading: «Enemigos» describe su स्थिति/estado en relación con el evangelio, no niega el amor pactual de Dios.
  alternative_spanish_readings:
  - Dios los odia absolutamente
  - Solo significa oposición social
  rationale: El contraste del versículo entre «enemigos» y «amados» exige conservar ambos polos. La redacción española mantiene la paradoja paulina sin suavizarla ni absolutizarla indebidamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
- issue: Sentido de «los padres»
  english_pob_reading: A reference to the patriarchal ancestors (Abraham, Isaac, Jacob) as the basis of covenantal regard.
  chosen_spanish_reading: Referencia a los antepasados patriarcales (Abraham, Isaac y Jacob) como base del favor pactual.
  alternative_spanish_readings:
  - Antepasados en sentido étnico general
  rationale: En Romanos 9–11, «los padres» evoca naturalmente a los patriarcas y las promesas hechas a ellos. El texto principal conserva la expresión literal y la nota aclara el referente histórico-teológico.
  doctrine_reference: Preservar la base pactual del argumento paulino.
translation_notes:
  revision_awareness: La versión inglesa auditada ya estaba marcada como de alta concordancia y sin revisiones aplicadas; esta propuesta sigue esa lectura y conserva el paralelismo retórico y la tensión teológica del original sin cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «elección» para ἐκλογή y «evangelio» para εὐαγγέλιον, en continuidad con la terminología paulina del POB.
  - Se conserva «los padres» en el texto principal por fidelidad al griego; la nota aclara el referente patriarcal.
  - La cláusula contrastiva se vierte con «en cuanto a... pero en cuanto a...» para reflejar μέν...δέ con naturalidad en español.
