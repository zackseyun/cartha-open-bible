  rationale: Se corrigió la nota [a] para que no contradiga el griego, se ajustó «aunque eres» a «aunque eras» para reflejar mejor el participio concesivo en contexto pasado, y se mejoró la legibilidad de la última frase con «de la rica raíz del olivo», conservando en nota la alternativa más explícita «de la raíz y de la riqueza del olivo», que preserva la justificación léxica documentada.
