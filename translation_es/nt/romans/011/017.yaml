translation:
  language: es
  text: Pero si algunas de las ramas fueron quebradas[a], y tú, aunque eras un olivo silvestre, fuiste injertado entre ellas y llegaste a ser copartícipe de la rica raíz del olivo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron desgajadas».
    reason: lexical_alternative
  - marker: b
    text: O «llegaste a ser copartícipe de la raíz y de la riqueza del olivo»; tradicionalmente, «de la raíz y la gordura del olivo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ δέ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  lexicon: BDAG
  rationale: En español, «Pero si» conserva el valor condicional de εἰ y el matiz de contraste de δέ sin sonar forzado. «Mas si» es más arcaico; «Y si» atenúa el contraste.
- source_word: τινες τῶν κλάδων
  english_pob_choice: some of the branches
  chosen_spanish: algunas de las ramas
  alternatives_spanish:
  - algunas ramas
  - ciertas ramas
  lexicon: BDAG
  rationale: τινες expresa indefinición («algunas, ciertas»), y el genitivo partitivo se refleja naturalmente como «de las ramas». «Ramas» mantiene la imagen vegetal del pasaje.
- source_word: ἐξεκλάσθησαν
  english_pob_choice: were broken off
  chosen_spanish: fueron quebradas
  alternatives_spanish:
  - fueron cortadas
  - fueron desgajadas
  lexicon: BDAG
  rationale: El verbo pasivo aoristo conserva la imagen de una rama separada del árbol. «Quebradas» reproduce mejor la metáfora que «cortadas»; «desgajadas» es posible pero menos directo en español general.
- source_word: σὺ δὲ
  english_pob_choice: and you
  chosen_spanish: y tú
  alternatives_spanish:
  - pero tú
  - ahora tú
  lexicon: BDAG
  rationale: «Y tú» es la forma más natural dentro de la acumulación sintáctica del versículo, y el contraste introducido por δέ queda preservado por el contexto inmediato. «Pero tú» enfatiza más la oposición, pero puede sonar más duro.
- source_word: ἀγριέλαιος ὢν
  english_pob_choice: although being a wild olive tree
  chosen_spanish: aunque eres un olivo silvestre
  alternatives_spanish:
  - aunque siendo un olivo silvestre
  - aunque eras un olivo silvestre
  lexicon: BDAG
  rationale: Se mantiene la concesión de ὢν con «aunque». «Olivo silvestre» es una traducción literal y comprensible de ἀγριέλαιος; se conserva la metáfora sin convertirla en una paráfrasis doctrinal sobre gentiles.
- source_word: ἐνεκεντρίσθης
  english_pob_choice: were grafted in
  chosen_spanish: fuiste injertado
  alternatives_spanish:
  - fuiste injertado entre
  - fuiste injertado en
  lexicon: BDAG
  rationale: El término hortícola estándar en español es «injertado». Se omite «in» en la cláusula principal porque el complemento posterior aclara la relación espacial/metafórica.
- source_word: ἐν αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: entre ellas
  alternatives_spanish:
  - entre ellos
  - en medio de ellas
  lexicon: BDAG
  rationale: El referente inmediato son las ramas, por eso el femenino plural «ellas». «Entre» expresa bien el sentido de inserción dentro del conjunto de ramas restantes.
- source_word: συγκοινωνὸς
  english_pob_choice: a fellow partaker
  chosen_spanish: copartícipe
  alternatives_spanish:
  - participante junto con
  - partícipe
  lexicon: BDAG
  rationale: «Copartícipe» conserva la idea de participación compartida sin diluirla en una expresión más extensa. Es más sobrio y fiel que «participante junto con».
- source_word: τῆς ῥίζης
  english_pob_choice: of the root
  chosen_spanish: de la raíz
  alternatives_spanish:
  - en la raíz
  - de la base
  lexicon: BDAG
  rationale: La construcción genitiva se expresa con naturalidad como «de la raíz». No se introduce una preposición interpretativa como «en» para no desplazar la relación metafórica.
- source_word: τῆς πιότητος
  english_pob_choice: the rich
  chosen_spanish: la riqueza
  alternatives_spanish:
  - la abundancia
  - la gordura
  lexicon: BDAG
  rationale: πιότης puede significar riqueza, gordura o abundancia. «La riqueza» es la opción más clara y digna en español contemporáneo; «gordura» sería demasiado ruda, aunque conserva el matiz físico tradicional.
- source_word: τῆς ἐλαίας
  english_pob_choice: of the olive tree
  chosen_spanish: del olivo
  alternatives_spanish:
  - del árbol de olivo
  - del olivo cultivado
  lexicon: BDAG
  rationale: En español, «olivo» basta para referir el árbol sin añadir una perífrasis pesada. Mantiene la metáfora agrícola y evita un calco innecesario.
- source_word: ἐγένου
  english_pob_choice: became
  chosen_spanish: llegaste a ser
  alternatives_spanish:
  - te hiciste
  - pasaste a ser
  lexicon: BDAG
  rationale: «Llegaste a ser» refleja bien la entrada en un nuevo estado y suena natural en una afirmación metafórica de identidad compartida. «Te hiciste» podría insinuar una autoformación menos adecuada aquí.
theological_decisions:
- issue: Identidad metafórica de ἀγριέλαιος
  english_pob_reading: Render literally within the olive-tree metaphor as 'a wild olive tree' rather than interpretively identifying the addressee as 'a Gentile.'
  chosen_spanish_reading: Conservar «un olivo silvestre» dentro de la metáfora, sin explicitar «gentil» en el texto principal.
  alternative_spanish_readings:
  - un gentil proveniente de un olivo silvestre
  - un brote de olivo silvestre
  rationale: La imagen de Pablo depende del contraste entre ramas, injerto y olivo. Traducirla literalmente preserva la tensión retórica y evita una paráfrasis teológica que cierre la metáfora demasiado pronto.
  doctrine_reference: Romanos 11; filosofía de traducción POB §§1, 3, 6
- issue: Relación entre raíz y riqueza del olivo
  english_pob_reading: became a fellow partaker of the rich root of the olive tree
  chosen_spanish_reading: «copartícipe de la raíz de la riqueza del olivo»
  alternative_spanish_readings:
  - copartícipe de la raíz rica del olivo
  - copartícipe de la raíz y de la riqueza del olivo
  rationale: El griego apila genitivos de manera condensada. El español principal conserva la doble relación sin convertirla en una explicación interpretativa extensa. Se evita resolver la tensión con una sola paráfrasis adjetival.
  doctrine_reference: Romanos 11:17; filosofía de traducción POB §§3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB que ajustó la cláusula final a una representación más natural de συγκοινωνός y de la serie de genitivos. En español, se mantuvo la metáfora del injerto y se resolvió πιότης con «riqueza», evitando «gordura» en el cuerpo principal por claridad moderna, aunque se conserva como alternativa tradicional en nota. También se respetó el giro concesivo de ὢν con «aunque eres», en lugar de una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se usa «olivo» para ἐλαία, coherente con el campo agrícola del pasaje.
  - Se mantiene «copartícipe» para συγκοινωνός, evitando «participante» por ser menos preciso respecto de la participación compartida.
  - Se evita traducir ξηρά/ἐκκοπή con vocabulario de poda; la imagen es de quebrar ramas.
  - Los referentes de género en «entre ellas» siguen el antecedente inmediato «ramas», no una lectura personalizada.
  - Se conserva el registro bíblico claro y moderno, sin caer en arcaísmos de estilo Reina-Valera.
