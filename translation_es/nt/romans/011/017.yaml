review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional, la metáfora del olivo y términos clave como «olivo silvestre», «injertado» y «copartícipe». Sin embargo, hay dos problemas de fidelidad: la nota [a] es incorrecta porque atribuye a ἐξεκλάσθησαν el sentido de «fueron injertadas», cuando el griego dice «fueron quebradas/arrancadas»; y «aunque eres» desajusta el participio concesivo con el marco verbal pasado, donde «aunque eras» o «aunque siendo» representa mejor ὢν en contexto.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, «copartícipe de la raíz de la riqueza del olivo» suena forzado y menos natural que una formulación que preserve mejor los dos sustantivos genitivos. También conviene armonizar los tiempos verbales para mejorar fluidez.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Olivo silvestre», «injertado» y «copartícipe» están bien encaminados. La mejor alineación léxica y teológica en español aquí es expresar tanto «raíz» como «riqueza» como ámbito compartido, no convertir «riqueza» en simple modificador ni dejar una cadena genitiva opaca.
  issues:
  - severity: high
    issue: La nota [a] traduce erróneamente ἐξεκλάσθησαν como «fueron injertadas».
    rationale: El verbo griego significa «fueron quebradas/arrancadas/desprendidas», no «injertadas». La nota introduce un sentido opuesto al texto fuente y debe corregirse o eliminarse.
  - severity: medium
    issue: «Aunque eres un olivo silvestre» no armoniza con el aoristo narrativo del contexto.
    rationale: El participio ὢν es concesivo y acompaña a «fuiste injertado»/«llegaste a ser». En español, «aunque eras» o «aunque siendo» preserva mejor la relación temporal y sintáctica.
  - severity: medium
    issue: «copartícipe de la raíz de la riqueza del olivo» es poco natural y oscurece la relación entre «raíz» y «riqueza».
    rationale: La cadena de genitivos en griego es compacta, pero el español aquí queda duro y ambiguo. Conviene una formulación más clara, idealmente apoyada por nota, que conserve ambos elementos semánticos.
  revised_spanish_text: Pero si algunas de las ramas fueron quebradas[a], y tú, aunque eras un olivo silvestre, fuiste injertado entre ellas y llegaste a ser copartícipe de la rica raíz del olivo[b],
  revised_footnotes:
  - marker: a
    text: O «fueron desgajadas».
    reason: lexical_alternative
  - marker: b
    text: O «llegaste a ser copartícipe de la raíz y de la riqueza del olivo»; tradicionalmente, «de la raíz y la gordura del olivo».
    reason: lexical_alternative
  revision_rationale: Se corrigió la nota [a] para que no contradiga el griego, se ajustó «aunque eres» a «aunque eras» para reflejar mejor el participio concesivo en contexto pasado, y se mejoró la legibilidad de la última frase con «de la rica raíz del olivo», conservando en nota la alternativa más explícita «de la raíz y de la riqueza del olivo», que preserva la justificación léxica documentada.
