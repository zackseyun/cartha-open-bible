- from: Pero ¿qué le dice la respuesta divina? «He dejado para mí siete mil hombres[a][b], que no han doblado la rodilla ante Baal».
  to: Pero ¿qué le dice la respuesta divina[a]? «He guardado[b] para mí siete mil hombres, que no han doblado la rodilla ante Baal».
  rationale: Se cambia «he dejado» por «he guardado» para reflejar mejor el sentido de preservación/reserva del remanente y alinearse con la decisión lexical documentada en inglés. Se reubican las notas al pie a sus términos correspondientes, conforme al requisito de anclaje exacto. Se mantiene «respuesta divina», «siete mil hombres» y «no han doblado la rodilla ante Baal» por ser fieles y naturales en español.
