translation:
  language: es
  text: Pero ¿qué le dice la respuesta divina[a]? «He guardado[b] para mí siete mil hombres, que no han doblado la rodilla ante Baal».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la respuesta de Dios» o «el oráculo».
    reason: lexical_alternative
  - marker: b
    text: O «he reservado para mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: χρηματισμός
  english_pob_choice: the divine response
  chosen_spanish: la respuesta divina
  alternatives_spanish:
  - la respuesta de Dios
  - el oráculo
  - la contestación divina
  lexicon: BDAG
  rationale: El contexto cita la respuesta de Dios a Elías; «respuesta divina» conserva ese origen sin sonar artificial en español. «Oráculo» es posible, pero en español moderno suele ser más marcado y menos transparente. «Respuesta de Dios» es una alternativa válida y muy literal, pero menos fluida en esta pregunta introductoria.
- source_word: Κατέλιπον
  english_pob_choice: I have kept
  chosen_spanish: he dejado
  alternatives_spanish:
  - he reservado
  - he preservado
  - he guardado
  lexicon: BDAG
  rationale: El aoristo griego, en el discurso citado, señala la acción de Dios respecto del remanente; en español «he dejado» comunica de manera natural que ese grupo permanece. «He reservado» o «he preservado» también son posibles, pero suenan más técnicos o más interpretativos. Se mantiene la tensión entre acción pasada y resultado vigente.
- source_word: ἐμαυτῷ
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  - para mi propio uso
  lexicon: BDAG
  rationale: El dativo reflexivo expresa que Dios lo dejó para sí; «para mí» es la forma más natural y fiel en español. «Para mí mismo» refuerza el matiz reflexivo, pero resulta menos idiomático.
- source_word: ἑπτακισχιλίους ἄνδρας
  english_pob_choice: seven thousand men
  chosen_spanish: siete mil hombres
  alternatives_spanish:
  - siete mil personas
  - siete mil varones
  lexicon: BDAG
  rationale: El griego usa ἄνδρας, término masculino específico; por eso se conserva «hombres» y no se neutraliza a «personas». «Varones» sería más formal o bíblico, pero en español actual puede sonar más marcado que el original exige.
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - los cuales
  - quienes
  lexicon: BDAG
  rationale: La relativa definitoria funciona con naturalidad en español mediante «que». «Quienes» podría sonar más enfático, pero no añade una distinción necesaria.
- source_word: οὐκ ἔκαμψαν γόνυ
  english_pob_choice: have not bent the knee
  chosen_spanish: no han doblado la rodilla
  alternatives_spanish:
  - no se han arrodillado
  - no han inclinado la rodilla
  lexicon: BDAG
  rationale: Se conserva la imagen idiomática de adoración o sumisión con una frase clara y natural en español. «Doblar la rodilla» mantiene mejor el paralelismo con el griego que «arrodillarse», aunque esta última sería comprensible.
- source_word: τῇ Βάαλ
  english_pob_choice: to Baal
  chosen_spanish: ante Baal
  alternatives_spanish:
  - a Baal
  - frente a Baal
  lexicon: BDAG
  rationale: Aunque el griego tiene una preposición/dativo que en contexto expresa dirección o relación con la acción de culto, en español «ante Baal» comunica mejor el gesto de reverencia implicado. «A Baal» sería más literal, pero menos expresivo; se evita añadir artículo porque se trata de nombre propio.
theological_decisions:
- issue: Cómo explicitar el origen divino de χρηματισμός sin sobreinterpretar
  english_pob_reading: the divine response
  chosen_spanish_reading: la respuesta divina
  alternative_spanish_readings:
  - la respuesta de Dios
  - el oráculo
  rationale: La POB inglesa hace explícito que la contestación proviene de Dios. En español, «respuesta divina» mantiene esa claridad y conserva el tono solemne sin convertir el término en una explicación doctrinal adicional.
  doctrine_reference: Translation philosophy §1, §6
- issue: Mantenimiento del remanente fiel y del lenguaje masculino del texto
  english_pob_reading: seven thousand men
  chosen_spanish_reading: siete mil hombres
  alternative_spanish_readings:
  - siete mil personas
  - siete mil varones
  rationale: El texto griego especifica ἄνδρας; por eso la traducción no se neutraliza. Esto preserva el dato lexical y el detalle del remanente señalado en la cita de 1 Reyes 19.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del contexto auditado: χρηματισμός se rinde de forma explícitamente divina; Κατέλιπον se traduce con una forma que sugiere acción cumplida con efecto presente; ἄνδρας se conserva como «hombres». No se detectaron revisiones aplicadas en el registro inglés de referencia, por lo que no se introducen cambios de mayor alcance.'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en «respuesta divina» sin sustituir el término por «SEÑOR».
  - Se conserva el nombre propio «Baal» sin artículo.
  - La imagen de «doblar la rodilla» se vierte con un equivalente natural en español, evitando una paráfrasis interpretativa más amplia.
  - Se respetan los marcadores de nota al pie en el texto conforme al orden requerido.
