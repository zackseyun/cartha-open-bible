review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: γὰρ = «Porque», τὰ χαρίσματα = «los dones», ἡ κλῆσις = «el llamamiento», τοῦ θεοῦ = «de Dios», y ἀμεταμέλητα se capta adecuadamente con «son irrevocables». Sin embargo, la nota alternativa «no son objeto de arrepentimiento» suena poco natural en español y no representa bien la fuerza adjetival ni las alternativas del inglés auditado.'
  spanish_quality_summary: El texto principal es claro, fiel y de buen registro eclesial. «Llamamiento» es aceptable y digno, aunque «llamado» también sería posible; no requiere cambio. La mejora necesaria está en la nota, para que el español sea idiomático y no sugiera de manera extraña que los dones mismos 'son objeto de arrepentimiento'.
  glossary_alignment: 'Alineado con las pautas del proyecto: θεοῦ = «Dios», χάρισμα = «dones», y no hay conflicto terminológico mayor. La decisión de mantener «llamamiento» preserva el peso teológico de κλῆσις. «Irrevocables» coincide bien con la decisión POB para ἀμεταμέλητα.'
  issues:
  - severity: medium
    issue: La nota al pie usa la alternativa «no son objeto de arrepentimiento».
    rationale: Aunque intenta reflejar «are not regretted», en español resulta torpe y poco idiomática. Una formulación como «no son lamentados» o mejor «no son retirados» / «no se revocan» comunica más claramente el sentido documentado de algo no retractado o no quitado.
  - severity: low
    issue: La alternativa listada en decisiones léxicas «no se arrepienten» es semánticamente impropia.
    rationale: Atribuye arrepentimiento a «los dones» y «el llamamiento» como sujetos personales. No afecta el texto principal, pero confirma que la nota debería ajustarse para evitar esa dirección interpretativa.
  revised_spanish_text: Porque los dones y el llamamiento de Dios son irrevocables[a].
  revised_footnotes:
  - marker: a
    text: O «no son lamentados» o «no se revocan». Las versiones antiguas suelen decir «sin arrepentimiento».
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel, natural y teológicamente prudente. Solo se corrige la nota al pie para expresar de manera idiomática las alternativas léxicas de ἀμεταμέλητα sin sugerir una construcción antinatural en español.
