translation:
  language: es
  text: Porque los dones y el llamamiento de Dios son irrevocables[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no son objeto de arrepentimiento» o «no se revocan». Las versiones antiguas suelen decir «sin arrepentimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμεταμέλητα
  english_pob_choice: are irrevocable
  chosen_spanish: son irrevocables
  alternatives_spanish:
  - no se arrepienten
  - no se revocan
  - son sin arrepentimiento
  lexicon: BDAG
  rationale: El adjetivo expresa que no están sujetos a arrepentimiento, retractación o retiro. En español, «irrevocables» comunica con naturalidad que no pueden ser anulados o retirados, sin introducir la idea engañosa de que Dios necesita arrepentirse. Mantiene la fuerza idiomática que el POB inglés buscó con «are irrevocable».
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula introduce la base explicativa de la afirmación anterior. «Porque» conserva bien esa relación causal/explicativa en español actual y es natural al inicio de la oración.
- source_word: τὰ χαρίσματα
  english_pob_choice: the gifts
  chosen_spanish: los dones
  alternatives_spanish:
  - los regalos
  - los dones de gracia
  - las dádivas
  lexicon: BDAG
  rationale: χάρισμα designa dones concedidos por gracia. «Dones» es la opción española más sobria y fiel al plural, sin añadir un adjetivo interpretativo que no aparece explícitamente en el griego. «Dones de gracia» sería posible, pero carga más el sentido de lo que el texto dice aquí.
- source_word: ἡ κλῆσις
  english_pob_choice: the calling
  chosen_spanish: el llamamiento
  alternatives_spanish:
  - la llamada
  - el llamado
  lexicon: BDAG
  rationale: En contexto paulino, κλῆσις conserva peso teológico como el acto o realidad del llamado de Dios. «Llamamiento» mantiene ese tono más formal y doctrinal que «llamada» o «llamado», y respeta mejor el registro del pasaje.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - procedente de Dios
  lexicon: BDAG
  rationale: El genitivo identifica a Dios como la fuente y/o posesión de los dones y del llamamiento. «De Dios» preserva la relación abierta del griego sin forzar una precisión adicional.
theological_decisions:
- issue: Alcance de «los dones y el llamamiento de Dios»
  english_pob_reading: Retain the phrase without specifying in translation whether it refers narrowly to Israel's privileges/calling or more broadly to God's gracious gifts and calling generally.
  chosen_spanish_reading: Conservar la frase sin especificar en la traducción si se refiere de manera estricta a los privilegios y llamado de Israel o a un principio más general sobre los dones y el llamamiento de Dios.
  alternative_spanish_readings:
  - los dones y el llamamiento dados a Israel
  - los dones y el llamamiento de Dios en general
  rationale: El contexto inmediato de Romanos 9–11 trata de Israel, pero la formulación griega no lo explicita en esta cláusula. La traducción debe preservar esa amplitud y no resolver en el texto principal una tensión que el autor deja abierta.
  doctrine_reference: Preservar la tensión teológica y contextual; no añadir una determinación no explicitada en el texto.
translation_notes:
  revision_awareness: Este borrador sigue el acuerdo alto del control cruzado y mantiene sin cambios la decisión clave de ἀμεταμέλητα como «irrevocables», con una nota que preserva alternativas legítimas sin imponer la formulación antigua «sin arrepentimiento».
  spanish_consistency_notes:
  - Se usa «dones» para χάρισματα y no «regalos», por el registro paulino y la carga teológica del término.
  - Se usa «llamamiento» para κλῆσις, manteniendo el tono doctrinal del pasaje.
  - Se evita «SEÑOR» o «Cristo» porque el versículo solo contiene θεοῦ y no requiere esas equivalencias.
  - La puntuación reproduce una oración explicativa breve y natural en español, con el adverbio causal al inicio como en el griego.
