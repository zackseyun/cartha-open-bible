translation:
  language: es
  text: Porque ¿quién ha conocido la mente del Señor? ¿O quién ha llegado a ser su consejero?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pablo está aludiendo a Isaías 40:13, donde la versión griega plantea de manera semejante quién ha conocido la mente del Señor o ha sido su consejero.
    reason: cross_reference
lexical_decisions:
- source_word: Τίς
  english_pob_choice: who
  chosen_spanish: ¿quién
  alternatives_spanish:
  - ¿quién es el que
  - ¿quién sería
  lexicon: BDAG
  rationale: Interrogativo natural en español para conservar la pregunta retórica sin añadir explicación.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - En efecto
  lexicon: BDAG
  rationale: En español, 'Porque' comunica bien el nexo explicativo-retrospectivo con el contexto previo y mantiene la relación argumentativa.
- source_word: ἔγνω
  english_pob_choice: has known
  chosen_spanish: ha conocido
  alternatives_spanish:
  - conoció
  - ha entendido
  lexicon: BDAG
  rationale: El aoristo en esta cita bíblica funciona de modo gnómico; 'ha conocido' conserva la fuerza de experiencia/conocimiento sin desplazarlo a 'entendido', que sería más interpretativo.
- source_word: νοῦν
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - pensamiento
  lexicon: BDAG
  rationale: '''Mente'' es un equivalente claro y sobrio en español para νοῦς, manteniendo la referencia al conocimiento/propósito de Dios en la cita de Isaías.'
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  lexicon: BDAG
  rationale: El texto griego y el audit trail inglés usan κύριος/'the Lord'; en español, 'el Señor' preserva la forma neotestamentaria de la cita y su tono escritural. No se introduce 'Yahvé' en el cuerpo porque la fuente inmediata cita la tradición griega de Isaías.
- source_word: σύμβουλος
  english_pob_choice: counselor
  chosen_spanish: consejero
  alternatives_spanish:
  - asesor
  - uno que le aconseje
  lexicon: BDAG
  rationale: '''Consejero'' reproduce bien la función de quien da consejo y suena natural y digno en español bíblico contemporáneo.'
- source_word: ἐγένετο
  english_pob_choice: has become
  chosen_spanish: ha llegado a ser
  alternatives_spanish:
  - se ha hecho
  - se convirtió
  lexicon: BDAG
  rationale: '''Ha llegado a ser'' conserva el matiz de γίνομαι como llegar a ocupar una condición/rol, y en español evita una dureza innecesaria.'
theological_decisions:
- issue: Referencia de κύριος en la cita de Isaías dentro de Romanos
  english_pob_reading: Rendered as 'the Lord' without narrowing beyond the text; in Pauline context it refers to God and supports the doxological force of God's unsearchable wisdom.
  chosen_spanish_reading: Se mantiene 'el Señor' sin estrechar más la referencia; en el contexto paulino alude a Dios y sostiene el énfasis doxológico en su sabiduría inescrutable.
  alternative_spanish_readings:
  - '''Yahvé'' en el texto principal'
  - '''el Señor Yahvé'''
  rationale: La cita llega a través del griego de la tradición bíblica y el audit trail inglés conserva 'the Lord'. En español, 'el Señor' es la forma más fiel al eco intertextual inmediato; 'Yahvé' se reservaría para una base hebrea explícita en el texto fuente inmediato, que aquí no aparece.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios: el modelo mantuvo alta concordancia con la lectura previa, sin observaciones pendientes. Por eso el borrador español conserva el paralelismo retórico y la intertextualidad sin introducir ajustes interpretativos adicionales.'
  spanish_consistency_notes:
  - Se mantuvo la estructura de dos preguntas retóricas unidas por '¿O...?' para reflejar ἢ.
  - '''Señor'' se usa de manera consistente con el audit trail inglés para κύριος en esta cita del AT dentro del NT.'
  - No se trasladó automáticamente la convención 'Yahvé' porque el texto fuente inmediato es griego y el contexto citacional favorece 'el Señor'.
  - '''Consejero''/''consejero'' se evitó a favor de ''consejero'' en español moderno, por claridad y naturalidad.'
  - La puntuación interrogativa doble sigue la convención del español y conserva el ritmo de la cita bíblica.
