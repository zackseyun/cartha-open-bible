    issue: «tener misericordia» para ἐλεήσῃ es menos preciso que «mostrar misericordia»
    rationale: El griego ἐλεήσῃ expresa la acción de tener/mostrar misericordia. El audit trail inglés escogió explícitamente «show mercy» para hacer verbal la acción. En español, «mostrar misericordia a todos» preserva mejor esa fuerza dinámica y evita una formulación algo más estática.
  - severity: low
    issue: Las notas están ancladas sobre «desobediencia» aunque una de ellas trata del primer «todos»
