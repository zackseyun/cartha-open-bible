translation:
  language: es
  text: Porque Dios encerró a todos en desobediencia[a][b][c], para mostrar misericordia a todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «consignó a todos» o «confinó a todos».'
    reason: lexical_alternative
  - marker: b
    text: «Desobediencia» también puede traducirse «incredulidad» en algunos contextos; aquí parece preferible el sentido más amplio de negativa a obedecer.
    reason: lexical_alternative
  - marker: c
    text: El repetido «todos» conserva la redacción de Pablo y no debe restringirse prematuramente; en contexto habla de judíos y gentiles juntos.
    reason: alternative_reading
lexical_decisions:
- source_word: συνέκλεισεν
  english_pob_choice: has shut up
  chosen_spanish: encerró
  alternatives_spanish:
  - confinó
  - recluyó
  - metió bajo encierro
  lexicon: BDAG
  rationale: El verbo griego expresa la idea de cerrar, encerrar o confinar juntamente. «Encerró» conserva la imagen concreta y es natural en español; «recluyó» puede sonar más a retiro de personas que a una acción judicial/metafórica, y «metió bajo encierro» sería demasiado coloquial.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí γάρ introduce explicación del argumento precedente. «Porque» comunica bien la relación explicativa y fluye con naturalidad en español.
- source_word: τοὺς πάντας
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos los hombres
  - a todos las personas
  - a todos
  lexicon: BDAG
  rationale: La repetición de τοὺς πάντας pide conservar la amplitud y la simetría del texto. «A todos» mantiene el alcance abierto sin añadir restricciones interpretativas que el griego no explicita.
- source_word: εἰς ἀπείθειαν
  english_pob_choice: into disobedience
  chosen_spanish: en desobediencia
  alternatives_spanish:
  - a desobediencia
  - bajo desobediencia
  - en incredulidad
  lexicon: BDAG
  rationale: En español, «encerrar en desobediencia» conserva el sentido de estado o esfera resultante. Aunque ἀπείθεια puede incluir la idea de incredulidad en algunos contextos, aquí «desobediencia» preserva la amplitud ética y la tensión que la nota inglesa documenta.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - a fin de que
  - para que
  lexicon: BDAG
  rationale: ἵνα expresa propósito o resultado. En español, «para» ofrece una formulación breve y fiel; «para que» también sería posible, pero «para» evita una repetición menos elegante del subjuntivo y mantiene el flujo del verso.
- source_word: ἐλεήσῃ
  english_pob_choice: he may show mercy
  chosen_spanish: tener misericordia
  alternatives_spanish:
  - mostrar misericordia
  - compadecerse
  - hacer misericordia
  lexicon: BDAG
  rationale: ἐλεάω significa mostrar misericordia / tener misericordia. «Tener misericordia» es una equivalencia estable y digna en español bíblico contemporáneo; «mostrar misericordia» sería más explícito verbalmente, pero un poco más pesado aquí.
theological_decisions:
- issue: Alcance de «todos» en ambas cláusulas
  english_pob_reading: 'Render to

    ''tous pantas'' as ''all'' in both instances, preserving Paul''s symmetrical wording without narrowing or expanding the referent in translation.'
  chosen_spanish_reading: Conservar «a todos» en ambas apariciones, manteniendo la simetría paulina y sin resolver en la traducción si el alcance es representativo o universal.
  alternative_spanish_readings:
  - a toda la humanidad
  - a todos los hombres
  - a judíos y gentiles
  rationale: La frase griega repite la misma amplitud en ambas cláusulas. La traducción debe preservar esa tensión interpretativa, especialmente porque el contexto inmediato trata de judíos y gentiles, pero el verso en sí no reduce la expresión.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el paquete; el último pase indicó que no hacían falta cambios y el control cruzado señaló solo observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός, conforme al estándar del proyecto.
  - Se eligió «desobediencia» y no «incredulidad» como término principal para ἀπείθεια, respetando la decisión inglesa auditada.
  - Se preservó la repetición de «todos» con la misma amplitud retórica del griego.
  - Se usó puntuación española y una estructura sintáctica natural, sin añadir interpretación doctrinal al verso.
