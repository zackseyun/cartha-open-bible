translation:
  language: es
  text: si de algún modo pueda provocar celos en mi propia carne[a] y salvar a algunos de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi propio pueblo», es decir, mis hermanos judíos; literalmente, «mi carne».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ πως
  english_pob_choice: if somehow
  chosen_spanish: si de algún modo
  alternatives_spanish:
  - si por algún medio
  - si acaso
  lexicon: BDAG
  rationale: La combinación expresa una intención esperanzada pero incierta. «Si de algún modo» transmite bien la apertura e incertidumbre del griego sin volver el español arcaico.
- source_word: παραζηλώσω
  english_pob_choice: I may provoke ... to jealousy
  chosen_spanish: logro provocar ... a celos
  alternatives_spanish:
  - pueda provocar ... a celos
  - haga ... celosos
  lexicon: BDAG
  rationale: El verbo conserva la fuerza de provocar celos y el eco intertextual del contexto paulino. «Provocar ... a celos» mantiene el valor verbal del original; el matiz de eventualidad queda en la cláusula condicional.
- source_word: μου τὴν σάρκα
  english_pob_choice: my own people
  chosen_spanish: a los de mi propia carne
  alternatives_spanish:
  - a mi propio pueblo
  - a mis compatriotas según la carne
  - a mis parientes según la carne
  lexicon: BDAG
  rationale: σάρξ se mantiene con su sentido literal/metonímico de parentesco étnico. «De mi propia carne» preserva la imagen fuente y deja visible la tensión interpretativa que el propio audit trail explica como referencia a los judíos de Pablo.
- source_word: σώσω
  english_pob_choice: save
  chosen_spanish: salvar
  alternatives_spanish:
  - rescatar
  - traer a la salvación
  lexicon: BDAG
  rationale: En Pablo, σῴζω tiene peso soteriológico. «Salvar» es la equivalencia más directa y teológicamente transparente.
- source_word: τινὰς ἐξ αὐτῶν
  english_pob_choice: some of them
  chosen_spanish: a algunos de ellos
  alternatives_spanish:
  - a algunos de entre ellos
  - a unos pocos de ellos
  lexicon: BDAG
  rationale: El indefinido τινὰς se traduce de forma natural como «algunos», y ἐξ αὐτῶν marca el grupo del cual provienen. «De ellos» reproduce bien la relación de subconjunto.
theological_decisions:
- issue: Sentido de σάρξ en la auto-referencia de Pablo
  english_pob_reading: kinship/ethnic sense preserved as 'my own people'
  chosen_spanish_reading: a los de mi propia carne
  alternative_spanish_readings:
  - a mi propio pueblo
  - a mis compatriotas según la carne
  rationale: Aquí σάρξ no alude a la ‘naturaleza pecaminosa’, sino a su parentesco étnico con Israel. La traducción conserva la metáfora y evita borrar la tensión documentada por la nota en inglés, mientras el sentido queda claro por el contexto.
  doctrine_reference: 'DOCTRINE.md: σάρξ default ''flesh'' (literal) / ''sinful nature'' (metaphorical); context-dependent, per-verse documented'
- issue: Fuerza soteriológica de σώσω
  english_pob_reading: save
  chosen_spanish_reading: salvar
  alternative_spanish_readings:
  - rescatar
  - llevar a la salvación
  rationale: En el discurso paulino, el verbo normalmente mantiene una carga de salvación. «Salvar» conserva esa fuerza sin explicitar más de lo que el griego dice.
  doctrine_reference: Uso paulino de σῴζω en contextos de salvación
translation_notes:
  revision_awareness: El audit trail inglés revisó una solución más literal ('my own flesh') hacia una formulación interpretativa ('my own people') para hacer explícito el sentido étnico. En español se optó por conservar la imagen fuente ('de mi propia carne') en el texto principal y aclarar el referente en nota, siguiendo la tensión documentada entre literalidad y claridad.
  spanish_consistency_notes:
  - Se mantuvo «celos» para παραζηλώσω, no «envidia», por coherencia con la red paulina y el eco intertextual.
  - Se preservó «carne» en la imagen principal para respetar σάρξ; la nota evita confusión con el uso teológico de 'carne' en otros pasajes.
  - No se usó «Mesías» ni terminología adicional, porque el versículo no contiene χριστός ni un título cristológico.
  - El marcador [a] aparece exactamente en el texto principal y está vinculado a una sola nota.
