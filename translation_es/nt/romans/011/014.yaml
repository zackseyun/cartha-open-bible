    issue: «logro provocar» sobrerrepresenta el matiz verbal
    rationale: εἴ πως + subjuntivo/aoristo de finalidad esperanzada no comunica «lograr» como éxito alcanzado, sino «si de algún modo pueda / llegue a». La versión actual reduce la incertidumbre del original.
  - severity: medium
    issue: «a los de mi propia carne» es poco natural y añade una perífrasis ajena al griego
    rationale: μου τὴν σάρκα es literalmente «mi carne», con sentido étnico/kinship. La formulación española actual suena forzada y menos fiel que «mi propia carne», aclarada en nota.
  - severity: low
    issue: «provocar ... a celos» puede mejorarse idiomáticamente
    rationale: Aunque entendible, en español suena más natural «provocar celos en ...» sin perder el eco temático de παραζηλόω.
