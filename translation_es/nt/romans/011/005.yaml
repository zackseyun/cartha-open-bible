  rationale: Se reemplaza «ha llegado a haber» por «ha llegado a existir» para expresar γέγονεν de forma más natural en español, conservando el sentido resultativo del perfecto. Se ajusta levemente la puntuación para mejorar la fluidez sin alterar el significado ni las decisiones léxicas del POB inglés.
