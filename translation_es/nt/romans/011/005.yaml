translation:
  language: es
  text: Así pues[a], también en el tiempo presente, ha llegado a existir un remanente según la elección de gracia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de este modo, pues, también» o «así que, también».'
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως οὖν καὶ
  english_pob_choice: So then ... also
  chosen_spanish: Así pues[a], también
  alternatives_spanish:
  - De este modo, pues, también
  - Así que, también
  lexicon: BDAG
  rationale: οὕτως οὖν introduce una conclusión lógica a partir del ejemplo de Elías en el contexto previo; en español, «Así pues» mantiene el valor inferencial sin sonar forzado. καὶ se conserva con «también» para marcar la correspondencia con el tiempo presente.
- source_word: ἐν τῷ νῦν καιρῷ
  english_pob_choice: at the present time
  chosen_spanish: en el tiempo presente
  alternatives_spanish:
  - en el presente tiempo
  - en esta época presente
  lexicon: BDAG
  rationale: καιρός señala una coyuntura o periodo, no solo un instante cronológico. «Tiempo presente» comunica bien la contraposición paulina entre el tiempo de Elías y el ahora.
- source_word: λεῖμμα
  english_pob_choice: a remnant
  chosen_spanish: un remanente
  alternatives_spanish:
  - un resto
  - una porción sobreviviente
  lexicon: BDAG
  rationale: «Remanente» es el equivalente bíblico consolidado para λεῖμμα y conserva la carga teológica de un grupo preservado por Dios.
- source_word: κατ’ ἐκλογὴν χάριτος
  english_pob_choice: according to the election of grace
  chosen_spanish: según la elección de gracia
  alternatives_spanish:
  - según una elección graciosa
  - según la elección por gracia
  lexicon: BDAG
  rationale: La expresión compacta conserva ἐκλογή como «elección» y χάρις como «gracia», sin resolver la relación genitiva en una paráfrasis más estrecha. «Según» reproduce bien la idea de conformidad o norma implícita.
- source_word: γέγονεν
  english_pob_choice: has come to be
  chosen_spanish: ha llegado a haber
  alternatives_spanish:
  - ha venido a ser
  - ha surgido
  lexicon: BDAG
  rationale: El perfecto de γίνομαι expresa un estado resultante. «Ha llegado a haber» suena natural en español y preserva la idea de que el remanente existe como resultado de una acción previa.
theological_decisions:
- issue: ἀἱ elección de gracia y su relación exacta entre gracia y elección
  english_pob_reading: the election of grace
  chosen_spanish_reading: la elección de gracia
  alternative_spanish_readings:
  - la elección por gracia
  - la elección graciosa
  rationale: La frase queda deliberadamente abierta, como en el POB inglés, para no imponer si Pablo subraya el origen, la cualidad o el fundamento de la elección. «Elección de gracia» conserva la tensión teológica sin sobreespecificarla.
  doctrine_reference: 'Romanos 11:5; POB translation philosophy #3'
- issue: Forma de expresar el remanente en contraste con el contexto de Elías
  english_pob_reading: a remnant
  chosen_spanish_reading: un remanente
  alternative_spanish_readings:
  - un resto
  rationale: «Remanente» mantiene la resonancia veterotestamentaria y paulina del grupo preservado por Dios, evitando debilitar su sentido técnico con «resto».
  doctrine_reference: Romanos 11:5; conexión con el contexto inmediato de Romanos 11:1-4
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del POB inglés, especialmente la decisión de hacer explícito el matiz resultativo de γέγονεν y de conservar la relación compacta entre ἐκλογή y χάρις sin convertirla en una paráfrasis doctrinalmente más cerrada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto para el nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Se conserva «gracia» para χάρις y «elección» para ἐκλογή, en coherencia con el registro paulino del proyecto.
  - «Remanente» se usa en sentido bíblico-teológico, no meramente cuantitativo.
  - La puntuación reproduce una cadencia natural en español con la función inferencial de οὕτως οὖν.
