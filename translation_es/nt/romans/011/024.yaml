    reason: lexical_alternative
  - marker: b
    text: O «serán injertados de nuevo en su propio olivo». La idea de retorno está implícita por el contexto, aunque «de nuevo» no aparece en el verbo griego.
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva el sentido del griego y mejora dos aspectos: (1) alinea el español con la decisión documentada del POB inglés de suplir ''ramas'' en el texto principal para claridad contextual; (2) hace más natural la primera cláusula en español sin perder el matiz de κατὰ φύσιν. No se requiere adjudicación adicional.'
