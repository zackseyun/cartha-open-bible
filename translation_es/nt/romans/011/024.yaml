  revised_spanish_text: Porque si tú fuiste cortado de un olivo silvestre por naturaleza y, contra naturaleza, fuiste injertado en un olivo cultivado, ¿cuánto más estos, las ramas naturales[a], serán injertados en su propio olivo[b]?
  revised_footnotes:
