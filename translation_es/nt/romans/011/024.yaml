translation:
  language: es
  text: Porque si tú fuiste cortado de un olivo silvestre por naturaleza y, contra naturaleza, fuiste injertado en un olivo cultivado, ¿cuánto más estos, las ramas naturales[a], serán injertados en su propio olivo[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estos, los que son según naturaleza»; el griego dice simplemente «estos, los según naturaleza», sin decir explícitamente «ramas», que aquí se suple por la metáfora del olivo en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «serán injertados de nuevo en su propio olivo». La idea de retorno está implícita por el contexto, aunque «de nuevo» no aparece en el verbo griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεκόπης
  english_pob_choice: were cut
  chosen_spanish: fuiste cortado
  alternatives_spanish:
  - fuiste cortado de
  - fuiste desgajado de
  lexicon: BDAG
  rationale: ἐκκόπτω significa cortar fuera/de. En español, «fuiste cortado» mantiene la imagen agrícola con sobriedad y evita introducir «quebrado», que no está en el verbo.
- source_word: ἀγριελαίου
  english_pob_choice: a wild olive tree
  chosen_spanish: un olivo silvestre
  alternatives_spanish:
  - un olivo salvaje
  - un árbol de olivo silvestre
  lexicon: BDAG
  rationale: El término apunta a un olivo de tipo silvestre. «Olivo silvestre» es natural en español y conserva la metáfora botánica sin añadir una palabra innecesaria.
- source_word: παρὰ φύσιν
  english_pob_choice: contrary to nature
  chosen_spanish: contra naturaleza
  alternatives_spanish:
  - contrario a la naturaleza
  - contra lo natural
  lexicon: BDAG
  rationale: La expresión fija contrasta con κατὰ φύσιν. «Contra naturaleza» es breve, idiomática y preserva el contraste retórico del pasaje.
- source_word: ἐνεκεντρίσθης
  english_pob_choice: were grafted into
  chosen_spanish: fuiste injertado en
  alternatives_spanish:
  - fuiste injertado dentro de
  - fuiste injertado en medio de
  lexicon: BDAG
  rationale: ἐγκεντρίζω es el verbo técnico para injertar. «En» reproduce con claridad el sentido de inserción en el árbol cultivado.
- source_word: καλλιέλαιον
  english_pob_choice: a cultivated olive tree
  chosen_spanish: un olivo cultivado
  alternatives_spanish:
  - un olivo domesticado
  - un árbol de olivo cultivado
  lexicon: BDAG
  rationale: La forma contrasta con ἀγριέλαιος. «Olivo cultivado» comunica el contraste agrícola sin sobreinterpretar la valoración del término.
- source_word: πόσῳ μᾶλλον
  english_pob_choice: how much more
  chosen_spanish: ¿cuánto más?
  alternatives_spanish:
  - ¿cuánto más todavía?
  - ¿cuánto más será?
  lexicon: BDAG
  rationale: La expresión a fortiori se vierte de manera directa y natural en español. Aquí la estructura interrogativa retórica fluye bien al inicio de la cláusula final.
- source_word: οὗτοι οἱ κατὰ φύσιν
  english_pob_choice: these, the natural branches
  chosen_spanish: estos, los naturales
  alternatives_spanish:
  - estos, los que son según naturaleza
  - estos, las ramas naturales
  lexicon: BDAG
  rationale: El griego no dice explícitamente «ramas», aunque el contexto del olivo lo sugiere. Siguiendo el criterio del POB inglés, se conserva la elipsis en el texto principal y se deja la ampliación contextual en la nota.
- source_word: ἐγκεντρισθήσονται
  english_pob_choice: will be grafted
  chosen_spanish: serán injertados
  alternatives_spanish:
  - serán injertados de nuevo
  - serán injertados otra vez
  lexicon: BDAG
  rationale: El futuro pasivo de ἐγκεντρίζω pide «serán injertados». No se añade «de nuevo» en el texto principal porque no está explícito en el verbo, aunque el contexto lo implique.
- source_word: τῇ ἰδίᾳ ἐλαίᾳ
  english_pob_choice: into their own olive tree
  chosen_spanish: en su propio olivo
  alternatives_spanish:
  - en su propio olivo cultivado
  - a su propio olivo
  lexicon: BDAG
  rationale: El dativo se adapta en español con «en» para mantener la imagen del injerto. «Propio» traduce bien ἰδίᾳ como pertenencia legítima y personal.
theological_decisions:
- issue: Si hacer explícito que «estos» se refiere a Israel/Judíos
  english_pob_reading: Keep the referent implicit in the main text as 'these, the natural branches' and let the immediate context identify them.
  chosen_spanish_reading: Mantener implícito el referente en el texto principal como «estos, los naturales» y dejar que el contexto inmediato lo identifique.
  alternative_spanish_readings:
  - estos judíos
  - estos israelitas
  rationale: Pablo habla de Israel étnico en el contexto, pero aquí usa un demostrativo dentro de la metáfora del olivo. Preservar la forma metafórica evita introducir más de lo que el versículo dice de manera explícita.
  doctrine_reference: Primacía del texto original y conservación de la tensión exegética sin resolverla prematuramente.
- issue: Si suplir «ramas» aunque no aparece de forma explícita en griego
  english_pob_reading: Supply 'branches' in the main text.
  chosen_spanish_reading: No suplir «ramas» en el texto principal; dejar la referencia metafórica implícita.
  alternative_spanish_readings:
  - estos, las ramas naturales
  - estos, las ramas que son naturales
  rationale: En español, la elipsis puede mantenerse sin oscurecer el sentido, especialmente porque el contexto inmediato ya desarrolla el mismo campo metafórico. La nota puede señalar la alternativa interpretativa sin cargar el texto principal.
  doctrine_reference: Equivalencia óptima con mínima expansión interpretativa; respeto a la forma breve del griego.
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente sin cambios sustantivos: el contexto crítico muestra alta concordancia y no se registran revisiones aplicadas. La redacción española mantiene las tensiones documentadas entre la explicitud metafórica y la elipsis del griego, sin añadir términos no requeridos por el texto.'
  spanish_consistency_notes:
  - Se usó «olivo» de manera uniforme para ἀγριέλαιος, καλλιέλαιος y ἐλαία, manteniendo la metáfora botánica constante.
  - Se evitó traducir κατὰ φύσιν como una etiqueta teológica rígida; en el texto principal queda «los naturales», y la nota conserva la alternativa más literal.
  - «Contra naturaleza» y «según naturaleza» conservan el contraste retórico del pasaje.
  - Se mantuvo el pasivo futuro con «serán injertados», sin añadir «de nuevo» al cuerpo principal porque no es explícito en el verbo.
