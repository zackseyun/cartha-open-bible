  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: los profetas fueron muertos, los altares derribados, Elías quedó solo y buscan su vida. Sin embargo, hay dos desajustes con la evidencia auditada: el pie de nota [a] está mal orientado, porque el inglés documenta la alternativa literal de ζητοῦσιν τὴν ψυχήν μου (''mi alma''), no una glosa sobre Κύριε; y ''he quedado'' cambia el aoristo pasivo hacia un perfecto activo español menos cercano que ''quedé'' o ''fui dejado''.'
  spanish_quality_summary: El español es claro y eclesialmente natural. 'Señor', 'profetas', 'altares' y 'buscan mi vida' son buenas elecciones. No obstante, la nota actual confunde al lector y debe corregirse. Además, 'y yo solo he quedado' suena aceptable, pero 'y yo solo quedé' o 'y solo yo quedé' reproduce mejor el evento puntual y evita una sensación de estado presente no marcada en el griego.
  glossary_alignment: 'La terminología principal está bien alineada con las pautas del proyecto: κύριε -> ''Señor'' es apropiado en este NT; θυσιαστήριά -> ''altares'' es correcto; ψυχή -> ''vida'' en este modismo es la decisión adecuada. No hay conflicto con Yahvé/Mesías/esclavo u otros términos por defecto. La excepción respecto de no usar ''Yahvé'' está bien justificada por tratarse del vocativo griego κύριε en una cita.'
  issues:
  - severity: high
    issue: La nota [a] comenta 'Señor' en vez de la alternativa literal de 'ψυχή'.
    rationale: El rastro de auditoría inglés conserva una nota explícita sobre 'they seek my soul' como alternativa más literal. La nota española debe corresponder a ese punto léxico y anclarse en 'vida', no introducir una observación distinta sobre Κύριε.
  - severity: medium
    issue: '''he quedado'' no refleja tan bien el aoristo pasivo ὑπελείφθην.'
    rationale: Aunque es comprensible, el perfecto compuesto español enfatiza un resultado presente y el giro activo reduce la cercanía formal. 'quedé' conserva mejor el evento narrado y sigue siendo idiomático.
  revised_spanish_text: Señor, han matado a tus profetas, han derribado tus altares, y yo solo quedé, y buscan mi vida[a].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «buscan mi alma»; aquí el modismo griego significa «buscan mi vida».
    reason: lexical_alternative
  revision_rationale: 'Se corrige la nota para que siga la evidencia fuente y la auditoría inglesa: la alternativa literal preservada corresponde a ψυχή, no a Κύριε. También se ajusta ''he quedado'' a ''quedé'' para reflejar mejor el aoristo griego sin perder naturalidad en español.'
