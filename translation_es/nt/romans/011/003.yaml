translation:
  language: es
  text: Señor, han matado a tus profetas, han derribado tus altares, y yo solo quedé, y buscan mi vida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «buscan mi alma»; aquí el modismo griego significa «buscan mi vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Señor mío
  lexicon: BDAG
  rationale: Vocativo dirigido a Dios. En español, «Señor» conserva la solemnidad y la función de invocación directa mejor que «Maestro». No se usa una forma tipográfica que oculte el nombre divino, porque aquí el texto griego cita la invocación bíblica conocida.
- source_word: ἀπέκτειναν
  english_pob_choice: killed
  chosen_spanish: han matado
  alternatives_spanish:
  - mataron
  - han dado muerte a
  lexicon: BDAG
  rationale: El verbo expresa muerte violenta sin añadir por sí mismo la carga jurídica de «asesinar». En español, «han matado» resulta natural y conserva la fuerza del acto hostil.
- source_word: θυσιαστήριά
  english_pob_choice: altars
  chosen_spanish: altares
  alternatives_spanish:
  - altares sacrificiales
  lexicon: BDAG
  rationale: θυσιαστήριον significa «altar», especialmente de sacrificio. «Altares» basta en español y evita recargar el verso sin necesidad.
- source_word: κατέσκαψαν
  english_pob_choice: tore down
  chosen_spanish: han derribado
  alternatives_spanish:
  - han demolido
  - han destruido
  lexicon: BDAG
  rationale: El verbo sugiere derribar o arrasar desde abajo; en español, «derribado» comunica bien la acción concreta sobre los altares y conserva el matiz físico del verbo.
- source_word: κἀγὼ
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - y aun yo
  - y también yo
  lexicon: BDAG
  rationale: La contracción solo introduce al hablante. En español, «y yo» es suficiente; el énfasis se mantiene por la estructura del enunciado.
- source_word: ὑπελείφθην μόνος
  english_pob_choice: I alone was left
  chosen_spanish: solo he quedado
  alternatives_spanish:
  - yo solo he quedado
  - yo solo quedé
  - solo fui dejado
  lexicon: BDAG
  rationale: La forma griega resalta que el hablante quedó como el único. «Solo he quedado» transmite con naturalidad la exclusividad y el estado resultante; evita una pasiva forzada en español.
- source_word: ζητοῦσιν τὴν ψυχήν μου
  english_pob_choice: they are seeking my life
  chosen_spanish: buscan mi vida
  alternatives_spanish:
  - están buscando mi vida
  - buscan mi alma
  lexicon: BDAG
  rationale: Aquí ψυχή es un modismo que significa vida, no alma. «Buscan mi vida» conserva el sentido idiomático y evita introducir una lectura antropológica ajena al contexto. «Buscan mi alma» queda como alternativa literal posible, pero no es la preferida en el cuerpo del texto.
theological_decisions:
- issue: Tratamiento de Κύριε como invocación a Dios en una cita bíblica
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Señor mío
  rationale: La cita reproduce una oración bíblica dirigida a Dios; por eso se conserva el vocativo reverente «Señor». No se usa «Yahvé» en el texto porque el griego citado presenta la forma vocativa κύριε, y la función aquí es la de invocación directa heredada en la tradición textual.
  doctrine_reference: Romanos 11:2-4; 1 Reyes 19:10, 14 (cita de Elías)
- issue: ψυχή en una fórmula de amenaza
  english_pob_reading: my life
  chosen_spanish_reading: mi vida
  alternative_spanish_readings:
  - mi alma
  rationale: En este contexto la expresión significa que buscan quitarle la vida. Traducir «mi alma» preservaría una literalidad engañosa y podría sugerir una doctrina sobre el alma que Pablo no está tratando aquí.
  doctrine_reference: Romanos 11:3; uso idiomático de ψυχή en contextos de peligro
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se registran revisiones textuales o interpretativas adicionales. La única tensión lexical relevante es ψυχή, resuelta en español con un modismo de sentido idiomático («mi vida») y nota alternativa para la literalidad.
  spanish_consistency_notes:
  - Se mantiene «Señor» para el vocativo divino en lugar de una transliteración o forma tipográfica de ocultamiento.
  - Se usa «vida» para ψυχή en este modismo, conforme al sentido contextual y a la decisión inglesa.
  - 'El verso conserva un ritmo paralelo claro en español: acusación, destrucción, soledad y persecución.'
