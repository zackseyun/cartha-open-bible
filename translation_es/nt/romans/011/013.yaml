translation:
  language: es
  text: 'Ahora les digo a ustedes, los gentiles[a]: en la medida en que soy apóstol para los gentiles, engrandezco mi ministerio[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘las naciones’ para ἔθνη/ἐθνῶν en ambos lugares.
    reason: lexical_alternative
  - marker: b
    text: O ‘glorifico mi ministerio’.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - les hablo a ustedes
  - a ustedes les hablo
  lexicon: BDAG
  rationale: El dativo de destinatario con λέγω requiere en español una construcción natural con preposición o duplicación pronominal. ‘A ustedes’ conserva la dirección del habla; la duplicación con ‘les hablo’ hace explícita la función verbal sin forzar el orden del griego.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pero
  - Y
  lexicon: BDAG
  rationale: δέ aquí marca transición suave al dirigirse Pablo de manera directa a su audiencia. ‘Ahora’ comunica mejor el cambio discursivo que un adversativo fuerte como ‘Pero’.
- source_word: λέγω
  english_pob_choice: I am speaking
  chosen_spanish: les hablo
  alternatives_spanish:
  - digo
  - estoy hablando
  lexicon: BDAG
  rationale: El presente de λέγω en este contexto funciona como un acto de habla directo. En español, ‘les hablo’ suena natural y conserva la inmediatez sin caer en un calco rígido.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to you Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  - a los gentiles
  lexicon: BDAG
  rationale: En Romanos 9–11, ἔθνη se refiere al grupo no judío, por lo que ‘gentiles’ es la equivalencia contextual más precisa. Se mantiene el valor étnico-religioso frente a ‘naciones’.
- source_word: ἐφ’ ὅσον
  english_pob_choice: Inasmuch as
  chosen_spanish: Pues, en cuanto
  alternatives_spanish:
  - En la medida en que
  - En tanto que
  lexicon: BDAG
  rationale: La locución introduce la base o el alcance de lo que sigue. ‘En cuanto’ preserva bien la relación lógica en español; se añade ‘Pues’ para reflejar la continuidad discursiva y la transición del argumento.
- source_word: μὲν οὖν
  english_pob_choice: then
  chosen_spanish: Pues
  alternatives_spanish:
  - entonces
  - así pues
  lexicon: BDAG
  rationale: La combinación de partículas aporta continuidad y ligera insistencia. En español, ‘pues’ comunica el enlace argumentativo sin sobrecargar la frase con marcadores redundantes.
- source_word: ἐθνῶν
  english_pob_choice: to the Gentiles
  chosen_spanish: de los gentiles
  alternatives_spanish:
  - para los gentiles
  - entre los gentiles
  lexicon: BDAG
  rationale: El genitivo con ἀπόστολος puede expresarse de varias maneras. ‘De los gentiles’ conserva la relación de pertenencia o ámbito de misión, mientras que ‘a los gentiles’ sería una expansión interpretativa menos literal.
- source_word: ἀπόστολος
  english_pob_choice: an apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - enviado
  - mensajero
  lexicon: BDAG
  rationale: Se conserva el término técnico del oficio paulino. ‘Enviado’ o ‘mensajero’ diluirían la carga eclesial y apostólica que el contexto da por sentada.
- source_word: τὴν διακονίαν μου
  english_pob_choice: my ministry
  chosen_spanish: mi ministerio
  alternatives_spanish:
  - mi servicio
  - mi tarea
  lexicon: BDAG
  rationale: διακονία aquí designa la función o encargo apostólico. ‘Ministerio’ refleja bien el uso eclesial en español y mantiene la conexión con servicio sin reducirlo a una tarea genérica.
- source_word: δοξάζω
  english_pob_choice: I magnify
  chosen_spanish: engrandezco
  alternatives_spanish:
  - glorifico
  - honro
  lexicon: BDAG
  rationale: δοξάζω puede significar ‘glorificar’, pero aquí el contexto indica valorar, exaltar o hacer grande la importancia del ministerio. ‘Engrandezco’ comunica esa fuerza retórica en español sin sugerir autoexaltación personal.
theological_decisions:
- issue: Sentido de δοξάζω aplicado a ‘mi ministerio’
  english_pob_reading: Paul magnifies or highly esteems his ministry to the Gentiles, not himself.
  chosen_spanish_reading: Pablo engrandece o exalta la importancia de su ministerio entre los gentiles, no a sí mismo.
  alternative_spanish_readings:
  - Pablo glorifica su ministerio
  - Pablo se gloría en su ministerio
  rationale: El objeto verbal es el ministerio, pero el contexto de Romanos 11 muestra que Pablo no se presenta como objeto de gloria personal. ‘Engrandezco’ preserva la tensión entre honor y función sin convertir la frase en autoalabanza.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Referente de ἔθνη / ἐθνῶν
  english_pob_reading: Gentiles
  chosen_spanish_reading: gentiles
  alternative_spanish_readings:
  - naciones
  rationale: En la sección de Romanos 9–11, Pablo contrasta a Israel con los no judíos. ‘Gentiles’ mantiene esa distinción teológica y étnica, mientras que ‘naciones’ podría sonar demasiado geopolítico en español.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto griego y el auditoría inglesa muestran acuerdo alto y no requieren revisión sustantiva; la principal decisión en español es conservar el valor contextual de ἔθνη como ‘gentiles’ y traducir δοξάζω con un verbo que refleje exaltación retórica sin sugerir vanagloria.
  spanish_consistency_notes:
  - Se mantiene ‘gentiles’ en ambos casos de ἔθνη/ἐθνῶν para conservar la coherencia terminológica en Romanos 9–11.
  - ‘Ministerio’ se usa para διακονία en sentido apostólico, de acuerdo con el uso eclesial español y la decisión auditada en inglés.
  - 'La puntuación reproduce el quiebre de la unidad en dos miembros: declaración directa y fundamento lógico posterior.'
