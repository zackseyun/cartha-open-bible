review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: «Porque si» para εἰ γὰρ, «Dios» para ὁ θεός, la metáfora de «las ramas naturales» para τῶν κατὰ φύσιν κλάδων, y la advertencia directa en singular para σοῦ. Sin embargo, «perdonó / perdonará» para φείδομαι aquí es menos fiel al sentido contextual de ‘escatimar / no perdonar de daño / no spared’ en la metáfora de ramas cortadas. En Romanos 11, el contexto inmediato de ramas quebradas hace que «no escatimó ... tampoco te escatimará» o una formulación equivalente preserve mejor la severidad y el paralelismo verbal.'
  spanish_quality_summary: 'El español es claro y natural, pero «perdonó a las ramas» suena menos idiomático en este contexto metafórico y puede sugerir remisión de culpa más que no abstenerse de cortar/juzgar. «Escatimar» es más preciso y sobrio en registro bíblico moderno. La nota al pie actual también está mal formulada: presenta como alternativa exactamente la misma frase del texto principal.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Dios» está bien. No hay términos como Yahvé, Mesías, Espíritu, esclavo, etc., en juego aquí. El ajuste necesario es léxico-contextual para φείδομαι: conviene «escatimar» en vez de «perdonar» para alinearse mejor con la decisión inglesa ‘spare’ y con la imagen de las ramas.'
  issues:
  - severity: medium
    issue: «Perdonó / perdonará» debilita o desplaza el sentido de φείδομαι en este contexto
    rationale: En Romanos 11:21 el verbo se usa en paralelo con la imagen de ramas no preservadas. «Perdonar» en español suele oírse como absolver una culpa, mientras que aquí el sentido es ‘no escatimar / no abstenerse de tratar con severidad’. «Escatimar» conserva mejor el paralelismo y la fuerza de advertencia.
  - severity: medium
    issue: La nota al pie a repite el texto principal como si fuera variante
    rationale: 'La nota dice «O “las ramas naturales”», pero esa ya es la redacción del texto. La alternativa real documentada en inglés es la forma más literal: «las ramas según la naturaleza» o equivalente.'
  revised_spanish_text: Porque si Dios no escatimó a las ramas naturales[a], tampoco te escatimará a ti.
  revised_footnotes:
