revisions:
- from: Porque si Dios no perdonó[a] a las ramas naturales, tampoco te perdonará a ti.
  to: Porque si Dios no escatimó a las ramas naturales[a], tampoco te escatimará a ti.
  rationale: Se reemplaza «perdonó / perdonará» por «escatimó / escatimará» para representar mejor φείδομαι en el contexto de ramas no preservadas y mantener el paralelismo verbal del griego. También se corrige la nota al pie para que ofrezca una alternativa real y documentada, en lugar de repetir el texto principal.
  reviewer_model: gpt-5.4
