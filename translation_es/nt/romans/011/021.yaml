translation:
  language: es
  text: Porque si Dios no escatimó a las ramas naturales[a], tampoco te escatimará a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ramas según la naturaleza»; literalmente, «las ramas según la naturaleza».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pues si
  - Porque, si
  lexicon: BDAG
  rationale: La combinación condicional y explicativa se expresa de modo natural en español con «Porque si», conservando el avance argumentativo del contexto inmediato sin volverlo rígido o mecánico.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: θεός se traduce de forma estándar como «Dios». El artículo griego funciona normalmente como sujeto definido; en español basta «Dios» sin añadir énfasis artificial.
- source_word: τῶν κατὰ φύσιν κλάδων
  english_pob_choice: the natural branches
  chosen_spanish: las ramas naturales
  alternatives_spanish:
  - las ramas según la naturaleza
  - las ramas que eran naturales
  lexicon: BDAG
  rationale: κατὰ φύσιν conserva la idea de «según la naturaleza» o «natural». En español, «las ramas naturales» mantiene la metáfora y la fuerza adjetival con una forma clara y directa. Se evita explicitar el referente en el texto principal, como en el registro inglés revisado.
- source_word: οὐκ ἐφείσατο
  english_pob_choice: did not spare
  chosen_spanish: no perdonó
  alternatives_spanish:
  - no escatimó
  - no eximió
  lexicon: BDAG
  rationale: φείδομαι significa «ahorrar / perdonar / perdonar de daño» en el sentido de no abstenerse de castigar o destruir. «No perdonó» es idiomático en español bíblico actual y preserva la severidad del verbo. Se evita «mostrar misericordia» porque debilita el paralelismo y el golpe del aviso.
- source_word: οὐδὲ σοῦ φείσεται
  english_pob_choice: neither will he spare you
  chosen_spanish: tampoco te perdonará a ti
  alternatives_spanish:
  - ni te perdonará
  - tampoco te eximirá
  lexicon: BDAG
  rationale: La negación continuada con οὐδέ se refleja con «tampoco». El futuro medio se expresa de manera natural con «perdonará». Se conserva el singular de σοῦ con «te», manteniendo el carácter directo de la advertencia.
theological_decisions:
- issue: Metáfora de las ramas naturales
  english_pob_reading: Retained the metaphor without explicating the referent in the main text.
  chosen_spanish_reading: Se conserva la metáfora de «las ramas naturales» sin identificar explícitamente en el texto principal quiénes son, aunque el contexto apunta a Israel.
  alternative_spanish_readings:
  - las ramas naturales de Israel
  - las ramas naturales, es decir, Israel
  rationale: El griego nombra la imagen, no la explicación. Traducir de manera interpretativa resolvería una tensión contextual que Pablo deja abierta en el enunciado inmediato. La nota permite orientar al lector sin sobrecargar la línea principal.
  doctrine_reference: Principio de no paraphrasear más allá de lo que el texto fuente warrants; mantener la tensión interpretativa donde el original la mantiene.
- issue: Tono de la advertencia dirigida a «ti»
  english_pob_reading: Rendered as a direct warning without adding doctrinal qualifiers about perseverance, apostasy, or corporate vs. individual election.
  chosen_spanish_reading: La advertencia se mantiene directa y personal, sin añadir explicaciones doctrinales sobre perseverancia, apostasía o elección corporativa/individual.
  alternative_spanish_readings:
  - tampoco te dejará caer
  - tampoco te cortará
  rationale: El griego formula una advertencia real y sobria. La traducción no debe resolver debates sistemáticos que el versículo no desarrolla explícitamente.
  doctrine_reference: Afirmación editorial de no imponer una lectura denominacional cuando el griego no la determina de manera inequívoca.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que prefirió «the natural branches» como versión más directa de τῶν κατὰ φύσιν κλάδων. La versión española adopta la misma simplificación natural, evitando una expansión como «las ramas que eran naturales» y manteniendo el paralelismo severo de «no perdonó / tampoco te perdonará».
  spanish_consistency_notes:
  - Se usa «Dios» sin artículo añadido para un tono bíblico natural en español.
  - Se conserva el singular de la segunda persona con «te» para reflejar σοῦ.
  - Se prefiere «perdonó/perdonará» en el sentido de «no perdonar de daño», coherente con el valor de φείδομαι en este contexto.
  - La nota aclara la alternativa léxica de «según la naturaleza» sin convertirla en interpretación explícita del referente.
