review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y sentido del griego: mantiene el presente histórico («dice»), la fuerza yusiva/imprecatoria («Que ... se convierta»), la serie de cuatro resultados, y las imágenes de captura/tropiezo/retribución. Sin embargo, la cola final αὐτοῖς se representa mejor como «para ellos» aplicado a toda la secuencia o, más naturalmente en español bíblico aquí, con posesivo repetido en cada elemento («su trampa ... su piedra de tropiezo ... su retribución»), en vez de dejar «para ellos» solo con «retribución», lo que puede estrechar indebidamente su alcance.'
  spanish_quality_summary: 'El español es claro y legible, pero la puntuación con comas entre cada miembro resulta algo rígida. También hay un problema en las notas: los marcadores [a][b] están anclados tras «dice», cuando semánticamente corresponden a «lazo/trampa» y «retribución». Además, la nota b dice «Or «retribución» o «recompensa»» aunque el texto principal ya usa «retribución»; así formulada, la nota es incoherente.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «David», «mesa», «piedra de tropiezo» y «retribución» son adecuados. «Lazo» para παγίδα y «trampa» para θήραν preservan la distinción casi sinonímica bien documentada.
  issues:
  - severity: medium
    issue: Ubicación incorrecta de los marcadores de nota
    rationale: Las notas léxicas sobre «lazo/trampa» y «retribución» están ancladas a «David dice», no a las palabras relevantes del texto; esto incumple la disciplina de anclar cada nota en el lugar pertinente.
  - severity: medium
    issue: Nota b incoherente con el texto principal
    rationale: La nota dice «Or “retribución” o “recompensa”...» cuando el texto ya tiene «retribución». La alternativa debe presentar opciones reales frente al término elegido, no repetirlo como si fuera alternativo.
  - severity: low
    issue: αὐτοῖς puede expresarse con mayor naturalidad y alcance más claro
    rationale: «para ellos» solo al final suena aceptable, pero en español puede parecer ligado solo a «retribución». Repetir el posesivo en la serie aclara que toda la mesa llega a ser juicio para ellos y suena más idiomático.
  revised_spanish_text: 'Y David dice: «Que su mesa se convierta en lazo[a] y en trampa, y en piedra de tropiezo, y en su retribución[b]».'
  revised_footnotes:
  - marker: a
    text: O «lazo y trampa»; los dos términos cercanos expresan imágenes casi sinónimas de captura.
    reason: lexical_alternative
  - marker: b
    text: O «repago» o «recompensa»; aquí el contexto imprecatorio favorece «retribución».
    reason: lexical_alternative
  revision_rationale: Se reubicaron las notas en las palabras pertinentes y se corrigió la nota léxica de «retribución» para que no repita el término principal como si fuera alternativo. También se ajustó el final a «y en su retribución» para reflejar αὐτοῖς de forma más natural y con mejor alcance en español, evitando que «para ellos» parezca modificar solo el último elemento.
