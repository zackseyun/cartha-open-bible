  rationale: Se reubicaron las notas en las palabras pertinentes y se corrigió la nota léxica de «retribución» para que no repita el término principal como si fuera alternativo. También se ajustó el final a «y en su retribución» para reflejar αὐτοῖς de forma más natural y con mejor alcance en español, evitando que «para ellos» parezca modificar solo el último elemento.
