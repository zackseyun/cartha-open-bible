translation:
  language: es
  text: 'Y David dice: «Que su mesa se convierta en lazo[a] y en trampa, y en piedra de tropiezo, y en su retribución[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lazo y trampa»; los dos términos cercanos expresan imágenes casi sinónimas de captura.
    reason: lexical_alternative
  - marker: b
    text: O «repago» o «recompensa»; aquí el contexto imprecatorio favorece «retribución».
    reason: lexical_alternative
lexical_decisions:
- source_word: Δαυὶδ
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - Davíd
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar en español bíblico; se conserva la referencia al rey y salmista sin traducir el nombre.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El presente histórico funciona bien en una introducción de cita y mantiene la vivacidad del texto citado.
- source_word: Γενηθήτω
  english_pob_choice: Let ... become
  chosen_spanish: Que ... se convierta
  alternatives_spanish:
  - Que ... llegue a ser
  - Que ... se haga
  lexicon: BDAG
  rationale: El imperativo jussivo/petición citacional se expresa naturalmente en español con «Que ... se convierta», conservando el valor volitivo sin sonar forzado.
- source_word: τράπεζα
  english_pob_choice: table
  chosen_spanish: mesa
  alternatives_spanish:
  - tabla
  - mesa de banquete
  lexicon: BDAG
  rationale: «Mesa» es el equivalente directo y natural en español; retiene la imagen concreta de provisión/banquete que subyace en el salmo citado.
- source_word: παγίδα
  english_pob_choice: snare
  chosen_spanish: lazo
  alternatives_spanish:
  - snare
  - trampa
  lexicon: BDAG
  rationale: Se eligió «lazo» para un primer término de captura/entramado en español natural y distinguible del segundo término cercano, preservando la fuerza de la imagen.
- source_word: θήραν
  english_pob_choice: trap
  chosen_spanish: trampa
  alternatives_spanish:
  - presa
  - red de caza
  lexicon: BDAG
  rationale: «Trampa» comunica bien la segunda imagen de captura y mantiene la cercanía semántica con παγίς/παγίδα sin perder claridad.
- source_word: σκάνδαλον
  english_pob_choice: stumbling block
  chosen_spanish: piedra de tropiezo
  alternatives_spanish:
  - obstáculo
  - causa de caída
  lexicon: BDAG
  rationale: «Piedra de tropiezo» conserva la metáfora tradicional y transparente de algo que hace caer, sin reducirlo a un simple «obstáculo» emocional.
- source_word: ἀνταπόδομα
  english_pob_choice: retribution
  chosen_spanish: retribución
  alternatives_spanish:
  - retribución justa
  - recompensa
  - repago
  lexicon: BDAG
  rationale: «Retribución» refleja bien la idea de retribución/repago en la secuencia imprecatoria y sigue la revisión inglesa que prefirió una forma más natural en este contexto.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: Con «retribución» en español, «para ellos» expresa con naturalidad la dirección del resultado/juício sin sonar demasiado literal.
theological_decisions:
- issue: Cita imprecatoria de Salmo 69:22
  english_pob_reading: 'Retain the jussive imprecation directly: ''Let their table become...,'''' without softening it into a mere prediction.'
  chosen_spanish_reading: 'Conservar la fuerza de la imprecación: «Que su mesa se convierta...», sin rebajarla a una predicción neutra.'
  alternative_spanish_readings:
  - Su mesa se convertirá...
  - Quizá su mesa se convierta...
  rationale: El griego usa una forma exhortativa/volitiva en la cita, y el español debe reflejar ese tono judicial e imprecatorio sin suavizarlo. La construcción con «Que...» mantiene la fuerza del pasaje.
  doctrine_reference: Principio de mantener el sentido llano del texto fuente y su tono retórico en citas escriturales.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «repayment» por «retribution» para un matiz más natural y adecuado al tono imprecatorio. La versión española sigue esa decisión con «retribución» y mantiene la secuencia de captura con dos términos cercanos, distinguiéndolos mediante «lazo» y «trampa».
  spanish_consistency_notes:
  - Se usa «David» como nombre propio estándar, no «Davíd».
  - Se preserva el orden acumulativo de cuatro miembros de la serie con coordinación repetida («y ... y ... y ...»), acorde al énfasis del griego.
  - No se introduce «Señor» ni sustitución litúrgica alguna, pues aquí no aparece el tetragrámaton.
  - «Piedra de tropiezo» conserva la metáfora bíblica habitual y es más transparente que «escándalo» en este contexto.
