translation:
  language: es
  text: ¿Qué, pues? Lo que Israel busca, no lo obtuvo; pero los elegidos[a] lo obtuvieron, y los demás fueron endurecidos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la elección lo obtuvo». El griego ἐκλογή es literalmente «elección» o «escogimiento», pero aquí probablemente se refiere a las personas escogidas.
    reason: lexical_alternative
  - marker: b
    text: O «fueron insensibilizados». El verbo puede denotar endurecimiento o insensibilidad espiritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί οὖν
  english_pob_choice: What then?
  chosen_spanish: ¿Qué, pues?
  alternatives_spanish:
  - ¿Entonces qué?
  - ¿Qué, entonces?
  lexicon: BDAG
  rationale: La fórmula inferencial-retórica de Pablo se conserva de modo natural en español con «¿Qué, pues?», que mantiene el valor argumentativo de conclusión sin sonar artificial.
- source_word: ὃ ἐπιζητεῖ
  english_pob_choice: what it seeks
  chosen_spanish: lo que ... busca
  alternatives_spanish:
  - lo que ... busca con empeño
  - lo que ... procura
  lexicon: BDAG
  rationale: El relativo neutro se vierte mejor como «lo que»; «busca» comunica el presente durativo sin forzar una perífrasis. «Busca» es idiomático y preserva el objeto de la búsqueda de Israel.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: BDAG
  rationale: Se mantiene el nombre propio transliterado. El contexto apunta a Israel corporativo, no al patriarca individual.
- source_word: τοῦτο οὐκ ἐπέτυχεν
  english_pob_choice: did not obtain
  chosen_spanish: no lo obtuvo
  alternatives_spanish:
  - no lo alcanzó
  - no lo consiguió
  lexicon: BDAG
  rationale: «Obtuvo» reproduce con claridad ἐπιτυγχάνω en el sentido de alcanzar/obtener lo buscado y permite conservar el paralelismo con el verbo repetido más adelante en el versículo.
- source_word: ἡ δὲ ἐκλογὴ
  english_pob_choice: the elect
  chosen_spanish: los elegidos
  alternatives_spanish:
  - los escogidos
  - la elección
  lexicon: BDAG
  rationale: Aunque ἐκλογή es literalmente «elección», aquí funciona metonímicamente para el grupo de personas escogidas por Dios. En español, «los elegidos» comunica mejor ese referente personal y evita la abstracción de «la elección».
- source_word: ἐπέτυχεν
  english_pob_choice: obtained it
  chosen_spanish: lo obtuvieron
  alternatives_spanish:
  - lo alcanzaron
  - lo consiguieron
  lexicon: BDAG
  rationale: Se mantiene el mismo verbo en sentido español para preservar la repetición retórica del griego. El plural concuerda con la lectura colectiva de «los elegidos».
- source_word: οἱ δὲ λοιποὶ
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - el resto
  - los restantes
  lexicon: BDAG
  rationale: «Los demás» expresa con naturalidad el contraste con el grupo elegido. «El resto» también es posible, pero «los demás» fluye mejor en español y evita una posible lectura de masa impersonal.
- source_word: ἐπωρώθησαν
  english_pob_choice: were hardened
  chosen_spanish: fueron endurecidos
  alternatives_spanish:
  - quedaron endurecidos
  - fueron insensibilizados
  - fueron hechos duros
  lexicon: BDAG
  rationale: Se conserva el pasivo sin explicitar agente, porque el griego lo deja implícito. «Fueron endurecidos» preserva la metáfora bíblica de endurecimiento y mantiene abierta la tensión teológica sobre la agencia.
theological_decisions:
- issue: Sentido de ἡ ἐκλογὴ en el contraste con 'el resto'
  english_pob_reading: Rendered as 'the elect' (the people chosen by God), not the abstract noun 'election.'
  chosen_spanish_reading: «los elegidos», es decir, el grupo de personas escogidas por Dios, no una abstracción como «la elección»
  alternative_spanish_readings:
  - la elección
  - los escogidos
  rationale: El contraste con «los demás» indica personas dentro de Israel, no un concepto abstracto. «Los elegidos» conserva el sentido colectivo y evita introducir una formulación más teológica de lo que el texto exige.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
- issue: Agencia del pasivo en ἐπωρώθησαν
  english_pob_reading: Kept the passive 'were hardened' without specifying the agent.
  chosen_spanish_reading: Se conserva el pasivo «fueron endurecidos» sin nombrar al agente.
  alternative_spanish_readings:
  - Dios los endureció
  - se endurecieron
  rationale: El griego no explicita quién realiza la acción. Mantener el pasivo preserva la tensión doctrinal entre juicio divino y responsabilidad humana sin resolverla prematuramente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó ὃ ἐπιζητεῖ de una perífrasis («is seeking») a un presente simple («seeks»). Por eso el español adopta un presente simple natural («busca») para reflejar el valor aspectual sin sobrerrepresentarlo.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico contemporáneo y sobrio, evitando arcaísmos innecesarios.
  - Se conserva el paralelismo verbal entre «obtuvo/obtuvieron» para reflejar la repetición de ἐπέτυχεν.
  - Se evita traducir ἐκλογή como «elección» en el texto principal porque aquí designa al grupo, no al acto abstracto.
