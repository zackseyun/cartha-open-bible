review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la imaginería principal del griego: ojos oscurecidos, incapacidad de ver, y la espalda doblada continuamente. También mantiene la nota léxica sobre «oscurecidos» frente a «cegados» y la duración de διὰ παντός. Sin embargo, no preserva correctamente la sintaxis y la fuerza del segundo imperativo: «dobla» en singular informal introduce una mezcla de destinatario y registro poco natural en español bíblico; debe expresarse como súplica/imprecación coherente, p. ej. «y encorva su espalda continuamente» o «y dobla su espalda continuamente».'
  spanish_quality_summary: 'La primera mitad es legible, aunque «¡Sean oscurecidos sus ojos» suena algo rígido; aun así es aceptable. El problema principal es la segunda cláusula: «y dobla continuamente su espalda» resulta gramaticalmente chocante por el tuteo singular y por la colocación adverbial. Además, la puntuación final está incompleta y la distribución de notas no es ideal: la nota sobre «siempre» debe anclarse a «continuamente», no a «espalda».'
  glossary_alignment: 'No hay conflicto con los términos teológicos por defecto del proyecto. Las decisiones léxicas clave son mayormente correctas: σκοτισθήτωσαν→«sean oscurecidos», τοῦ μὴ βλέπειν→«para que no vean», διὰ παντός→«continuamente». Para σύγκαμψον, «encorva» funciona mejor en español que «dobla» al tomar «espalda» como objeto, sin perder la metáfora corporal ni la fuerza imperatival.'
  issues:
  - severity: high
    issue: La forma verbal «dobla» es inadecuada en esta cláusula.
    rationale: Introduce tuteo singular en una imprecación dirigida a Dios y produce una mezcla de registro impropia del contexto. El español necesita una forma más natural y digna, como «encorva», manteniendo el imperativo.
  - severity: medium
    issue: La nota [b] está anclada a «espalda» en vez de a «continuamente».
    rationale: La alternativa «siempre» corresponde semánticamente a διὰ παντός, no al sustantivo «espalda». El marcador debe moverse al adverbio relevante.
  - severity: low
    issue: Falta el signo de cierre de exclamación y la puntuación final es defectuosa.
    rationale: El texto termina con punto después de un inicio exclamativo sin cierre. Debe normalizarse la puntuación española.
  revised_spanish_text: ¡Sean oscurecidos sus ojos, para que no vean[a], y encorva su espalda continuamente[b]!
  revised_footnotes:
