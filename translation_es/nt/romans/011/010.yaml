    text: O «sean cegados». El griego literalmente dice «sean oscurecidos», conservando la imagen de oscuridad del texto fuente.
    reason: lexical_alternative
  - marker: b
    text: O «siempre». La expresión puede denotar duración continua o constante.
    reason: lexical_alternative
