translation:
  language: es
  text: ¡Sean oscurecidos sus ojos, para que no vean[a], y encorva su espalda continuamente[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sean cegados». El griego literalmente dice «sean oscurecidos», conservando la imagen de oscuridad del texto fuente.
    reason: lexical_alternative
  - marker: b
    text: O «siempre». La expresión puede denotar duración continua o constante.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκοτισθήτωσαν
  english_pob_choice: Let ... be darkened
  chosen_spanish: ¡Sean oscurecidos
  alternatives_spanish:
  - Sean cegados
  - Sean entenebrecidos
  lexicon: BDAG
  rationale: El griego es un imperativo/jusivo pasivo de tercera persona. «Sean oscurecidos» conserva la imagen de oscuridad del texto y evita reducirla a una interpretación más explícita como «cegados». «Entenebrecidos» sería posible, pero suena menos natural en español bíblico actual.
- source_word: οἱ ὀφθαλμοὶ αὐτῶν
  english_pob_choice: their eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - sus ojos
  - los ojos de ellos
  lexicon: BDAG
  rationale: La frase es directa y corporal; «sus ojos» comunica el posesivo de forma natural y conserva la imagen literal.
- source_word: τοῦ μὴ βλέπειν
  english_pob_choice: so that they may not see
  chosen_spanish: para que no vean
  alternatives_spanish:
  - a fin de que no vean
  - de modo que no vean
  lexicon: BDAG
  rationale: El infinitivo articular con μή expresa finalidad o resultado. «Para que no vean» es la formulación más natural en español y refleja la revisión inglesa que corrigió el matiz de propósito/resultad​o sin añadir explicación extra.
- source_word: τὸν νῶτον αὐτῶν
  english_pob_choice: their back
  chosen_spanish: su espalda
  alternatives_spanish:
  - su espalda
  - su espalda curvada
  - sus espaldas
  lexicon: BDAG
  rationale: Aunque el griego usa singular, en español «su espalda» mantiene la imagen de una sola zona corporal y se ajusta bien al paralelismo poético. «Sus espaldas» sería más distributivo, pero menos cercano al singular griego.
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: BDAG
  rationale: La expresión denota duración constante. «Continuamente» reproduce bien ese valor sin forzar el sentido a una eternidad absoluta.
- source_word: σύγκαμψον
  english_pob_choice: bend
  chosen_spanish: dobla
  alternatives_spanish:
  - hazla doblar
  - encorva
  lexicon: BDAG
  rationale: Es un imperativo aoristo activo. «Dobla» es breve, directo y conserva la metáfora corporal de ser encorvado. «Encorva» podría sonar más natural, pero introduce una equivalencia más interpretativa.
theological_decisions:
- issue: Fuerza imprecatoria/jusiva del pasaje
  english_pob_reading: 'Retain the jussive/imperatival force as a prayer-like imprecation: ''Let their eyes be darkened ... and bend their back continually.'''
  chosen_spanish_reading: 'Conservar el tono de ruego imprecatorio/jusivo: «¡Sean oscurecidos sus ojos... y dobla continuamente su espalda!»'
  alternative_spanish_readings:
  - Sus ojos serán oscurecidos...
  - Que sus ojos se oscurezcan...
  rationale: Pablo cita una Escritura con fuerza de juicio e imprecación. La traducción no debe convertirlo en simple predicción ni suavizar la dureza del texto. El imperativo en español mantiene esa tensión.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Imagen de oscuridad frente a una lectura explicativa de 'ceguera'
  english_pob_reading: '''Be darkened'' preserves the imagery of darkness from the source text rather than the more interpretive ''be blinded.'''
  chosen_spanish_reading: Mantener «oscurecidos» en vez de sustituirlo por «cegados».
  alternative_spanish_readings:
  - cegados
  - privados de vista
  rationale: El griego usa la imagen de oscuridad. En español, «oscurecidos» deja visible esa metáfora y evita borrar la conexión intertextual con el lenguaje de juicio del Salmo citado.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que ajustó el infinitivo a «so that they may not see», por lo que se traduce con «para que no vean» para reflejar finalidad/resultado sin endurecerlo como una mera afirmación de hecho. También se conserva la imagen de oscuridad de σκοτισθήτωσαν y el matiz de duración de διὰ παντός.
  spanish_consistency_notes:
  - Se prefirió «oscurecidos» para mantener la metáfora luminosa/oscura del texto fuente y del audit trail inglés.
  - Se usó «espalda» en singular para reflejar el singular griego νῶτον, aunque en español el plural sería posible por estilo distributivo.
  - Se tradujo διὰ παντός como «continuamente» para evitar tanto la banalización de «siempre» como la sobrerelación escatológica de «para siempre».
