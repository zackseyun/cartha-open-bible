translation:
  language: es
  text: Pero si por gracia[a], ya no es por obras; de otro modo, la gracia ya no es gracia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de otro modo, la gracia ya no es gracia». El verbo griego es «llega a ser», que en español puede suavizarse como «es».'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριτι
  english_pob_choice: by grace
  chosen_spanish: por gracia
  alternatives_spanish:
  - por la gracia
  - mediante gracia
  lexicon: BDAG
  rationale: El dativo instrumental expresa base o medio; en español, «por gracia» comunica con naturalidad que la base de la acción es la gracia. Mantiene el término paulino clave sin explicitar innecesariamente más allá del griego.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - ya no más
  lexicon: BDAG
  rationale: «Ya no» es la forma más idiomática en español para la negación temporal o lógica de una condición que antes valía. Conserva la exclusión que Pablo establece entre gracia y obras.
- source_word: ἐξ ἔργων
  english_pob_choice: from works
  chosen_spanish: por obras
  alternatives_spanish:
  - de obras
  - sobre la base de obras
  lexicon: BDAG
  rationale: Aunque el griego usa ἐκ/ἐξ con sentido de fuente o base, en español «por obras» comunica mejor la idea de fundamento o causa sin sonar forzado. Se evita especificar «obras de la ley» porque el texto no lo dice.
- source_word: ἐπεὶ
  english_pob_choice: otherwise
  chosen_spanish: de otra manera
  alternatives_spanish:
  - pues entonces
  - si no
  lexicon: BDAG
  rationale: La partícula introduce una consecuencia lógica dentro del argumento. «De otra manera» reproduce esa inferencia en un español claro y auditable, sin convertirla en una explicación doctrinal añadida.
- source_word: γίνεται
  english_pob_choice: is / becomes
  chosen_spanish: es
  alternatives_spanish:
  - llega a ser
  - se convierte en
  lexicon: BDAG
  rationale: 'Aunque el verbo griego es γίνομαι, en español la repetición literal de «llega a ser» o «se convierte en» suena menos natural aquí. «Es» conserva la fuerza de la afirmación y la paradoja retórica: si se mezcla con obras, la gracia deja de ser gracia.'
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: Se mantiene el término teológico «gracia» para conservar el juego verbal de Pablo. Repetir la misma palabra en español preserva el énfasis retórico del griego.
theological_decisions:
- issue: Relación excluyente entre gracia y obras
  english_pob_reading: 'The verse states a mutual exclusivity at the level of basis: if something is by grace, it is not on the basis of works.'
  chosen_spanish_reading: 'El versículo afirma una exclusión mutua en cuanto al fundamento: si algo es por gracia, no es por obras.'
  alternative_spanish_readings:
  - El versículo habla específicamente de las obras de la ley.
  - El versículo excluye toda cooperación humana en cualquier sentido.
  rationale: El griego sólo dice «obras» y no precisa «de la ley». Tampoco desarrolla aquí un sistema doctrinal completo. La redacción española conserva la tensión paulina sin cerrar el alcance más de lo que el texto permite.
  doctrine_reference: Mantener la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB en inglés, que prefirió «is no longer grace» frente a una formulación más literal con «becomes». En español se adopta una solución equivalente y natural («ya no es gracia») que conserva el juego retórico y la transparencia al verbo griego.
  spanish_consistency_notes:
  - Se usa «gracia» de forma consistente para χάρις, evitando «favor» salvo que el contexto exigiera otra cosa.
  - Se usa «obras» sin añadir especificaciones ajenas al texto.
  - Se evita «SEÑOR» o sustituciones innecesarias porque el versículo no contiene el nombre divino.
  - La puntuación reproduce la estructura condicional y consecuencial del griego de manera clara para lectura pública.
