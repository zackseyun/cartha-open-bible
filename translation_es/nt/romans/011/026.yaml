revisions:
- from: 'Y así todo Israel será salvo[a], tal como está escrito: «Vendrá de Sion[b] el Libertador[c]; apartará las impiedades de Jacob».'
  to: 'Y de esta manera todo Israel será salvo[a], tal como está escrito: «Vendrá de Sion[c] el Libertador; apartará la impiedad de Jacob».[b]'
  rationale: 'Se revisa para reflejar mejor el expediente del POB inglés y mejorar la naturalidad del español: 1) se añade la nota indispensable sobre «todo Israel»; 2) se cambia «Y así» por «Y de esta manera» para expresar más claramente el sentido modal de οὕτως en el texto principal; 3) se sustituye «las impiedades» por «la impiedad», que es más idiomático en español y conserva bien la fuerza abstracta de ἀσεβείας; 4) se simplifican y reordenan las notas para que correspondan mejor a los puntos significativos preservados por el POB.'
