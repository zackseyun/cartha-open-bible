translation:
  language: es
  text: 'Y de esta manera todo Israel será salvo[a], tal como está escrito: «Vendrá de Sion[c] el Libertador; apartará la impiedad de Jacob».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y así todo Israel será salvo». El adverbio griego οὕτως puede traducirse «así» o «de esta manera»; aquí probablemente señala el modo descrito en el contexto inmediato.
    reason: lexical_alternative
  - marker: b
    text: «Todo Israel» es una expresión discutida en la interpretación; la traducción conserva el griego sin decidir si Pablo se refiere a Israel étnico en conjunto, al remanente creyente o al pueblo de Dios en plenitud.
    reason: alternative_reading
  - marker: c
    text: Algunas versiones traducen ἐκ Σιὼν como «desde Sion» o «fuera de Sion».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ οὕτως
  english_pob_choice: And in this way
  chosen_spanish: Y así
  alternatives_spanish:
  - Y de esta manera
  - Y de este modo
  - Así
  lexicon: BDAG
  rationale: οὕτως aquí apunta al modo, no solo al resultado. En español, «Y así» comunica naturalmente la continuidad con lo dicho antes y mantiene abierta la referencia al proceso descrito en el contexto.
- source_word: πᾶς Ἰσραήλ
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - todo el pueblo de Israel
  lexicon: BDAG
  rationale: «Todo Israel» conserva la amplitud de la expresión griega sin resolver la disputa interpretativa sobre su referente. Se evita estrechar el sentido con una paráfrasis explicativa.
- source_word: σωθήσεται
  english_pob_choice: will be saved
  chosen_spanish: será salvo
  alternatives_spanish:
  - será rescatado
  - será librado
  lexicon: BDAG
  rationale: En Pablo, σῴζω aquí tiene fuerza salvífica. «Será salvo» preserva esa carga teológica mejor que opciones más generales como «librado».
- source_word: καθὼς γέγραπται
  english_pob_choice: just as it is written
  chosen_spanish: tal como está escrito
  alternatives_spanish:
  - como está escrito
  - justamente como está escrito
  lexicon: BDAG
  rationale: La fórmula citacional se rinde de manera estándar y clara en español. «Tal como» expresa bien la correspondencia entre la cita y la afirmación de Pablo.
- source_word: Ἥξει
  english_pob_choice: will come
  chosen_spanish: Vendrá
  alternatives_spanish:
  - Llegará
  - Habrá de venir
  lexicon: BDAG
  rationale: «Vendrá» es natural en español bíblico contemporáneo y mantiene el tono profético de la cita.
- source_word: ἐκ Σιὼν
  english_pob_choice: from Zion
  chosen_spanish: de Sion
  alternatives_spanish:
  - desde Sion
  - fuera de Sion
  lexicon: BDAG
  rationale: «De Sion» es la equivalencia más natural de ἐκ en este contexto. Se conserva la forma literal de la cita sin interpretar más de lo que el texto exige.
- source_word: ὁ ῥυόμενος
  english_pob_choice: the Deliverer
  chosen_spanish: el Libertador
  alternatives_spanish:
  - el que libra
  - el Rescatador
  lexicon: BDAG
  rationale: El participio sustantivado se vierte como título. «Libertador» mantiene el peso personal y mesiánico de la expresión, y en español resulta más idiomático que un giro más literal y pesado.
- source_word: ἀποστρέψει
  english_pob_choice: he will turn away
  chosen_spanish: apartará
  alternatives_spanish:
  - volverá atrás
  - desviará
  lexicon: BDAG
  rationale: «Apartará» conserva la imagen verbal de hacer que algo se aparte, sin añadir un matiz interpretativo como «eliminar».
- source_word: ἀσεβείας
  english_pob_choice: ungodliness
  chosen_spanish: las impiedades
  alternatives_spanish:
  - la impiedad
  - las irreverencias
  lexicon: BDAG
  rationale: Se mantiene el plural del griego, que sugiere la multiplicidad o extensión de los actos/condiciones de impiedad. «Impiedades» conserva la fuerza moral-religiosa del término.
- source_word: ἀπὸ Ἰακώβ
  english_pob_choice: from Jacob
  chosen_spanish: de Jacob
  alternatives_spanish:
  - desde Jacob
  - de Israel
  lexicon: BDAG
  rationale: Se traduce literalmente para preservar el paralelismo poético y la redacción de la cita bíblica, sin armonizar «Jacob» con «Israel».
theological_decisions:
- issue: Referente de «todo Israel»
  english_pob_reading: Retained the phrase 'all Israel' without interpretive expansion.
  chosen_spanish_reading: Se conserva «todo Israel» sin precisar si alude a Israel étnico, al remanente creyente o al pueblo de Dios en conjunto.
  alternative_spanish_readings:
  - todo el Israel étnico
  - el remanente creyente de Israel
  - todo el pueblo de Dios
  rationale: La expresión es teológicamente debatida. La traducción mantiene la tensión sin resolverla por paráfrasis, siguiendo el texto griego y la cautela del POB inglés.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Identidad mesiánica de «el Libertador»
  english_pob_reading: Capitalized 'Deliverer' as a title in a scriptural citation applied by Paul in a messianic context.
  chosen_spanish_reading: Se capitaliza «Libertador» como título en una cita bíblica usada por Pablo en contexto mesiánico.
  alternative_spanish_readings:
  - el libertador
  rationale: La cita tiene función cristológica en el contexto paulino. La mayúscula señala el valor titular sin añadir contenido ajeno al texto.
  doctrine_reference: Affirmations; Translation philosophy §2 (Translate titles; transliterate names)
translation_notes:
  revision_awareness: No se requirieron revisiones sustanciales en el pasaje de referencia. La presente redacción mantiene el acuerdo alto del control cruzado y conserva las tensiones interpretativas relevantes sin resolverlas artificialmente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente remite explícitamente al nombre divino; aquí no aparece.
  - «Mesías» no es necesario en este versículo porque el griego no usa Χριστός.
  - Se conserva «Jacob» y «Sion» en forma bíblica tradicional, sin modernizarlas ni explicarlas dentro del cuerpo del versículo.
  - «Impiedades» mantiene el plural griego para no suavizar la fuerza moral del término.
