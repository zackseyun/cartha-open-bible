translation:
  language: es
  text: Y este será el pacto mío con ellos[a], cuando quite sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el pacto de mi parte con ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: διαθήκη
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  lexicon: BDAG
  rationale: En este contexto paulino y de cita profética, el término expresa un pacto divino vinculante. En español, «pacto» comunica mejor esa relación de compromiso que «testamento», y evita una palabra más técnica como «alianza» si pudiera sonar menos natural en este contexto.
- source_word: ἡ παρ’ ἐμοῦ διαθήκη
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - el pacto de mí
  - el pacto que procede de mí
  lexicon: BDAG
  rationale: La frase griega indica origen/procedencia divina. En español, el posesivo «mi» transmite con naturalidad que el pacto proviene de Dios, sin forzar una construcción literal poco idiomática.
- source_word: αὐτοῖς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - para ellos
  - a ellos
  lexicon: BDAG
  rationale: Aunque el dativo puede leerse como «a/para ellos», junto con «pacto» la relación se expresa mejor en español con «con ellos», que refleja el sentido relacional del pacto.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  - siempre que
  lexicon: BDAG
  rationale: El contexto es una promesa escatológica/salvífica puntual, no una repetición indefinida. «Cuando» conserva la temporalidad profética y la certeza del cumplimiento.
- source_word: ἀφέλωμαι
  english_pob_choice: I take away
  chosen_spanish: quite
  alternatives_spanish:
  - retire
  - aleje
  lexicon: BDAG
  rationale: «Quitar» es el equivalente español más natural para la remoción de los pecados y conserva la imagen bíblica de quitar algo de en medio.
- source_word: ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - ofensas
  - culpas
  lexicon: BDAG
  rationale: El plural se traduce directamente como «pecados», que mantiene la referencia moral y teológica sin introducir matices más interpretativos.
- source_word: καὶ αὕτη
  english_pob_choice: And this will be
  chosen_spanish: Y este será
  alternatives_spanish:
  - Y esto será
  - Y este es
  lexicon: BDAG
  rationale: El griego es elíptico; en español se completa de forma natural con un verbo futuro implícito para reflejar el carácter promesivo de la cita. Se eligió «este» porque concuerda con «pacto» y evita una ambigüedad de género en español.
theological_decisions:
- issue: Cómo expresar el sentido de διαθήκη en la cita paulina
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - alianza
  - testamento
  rationale: La cita alude al marco bíblico del pacto divino prometido. «Pacto» preserva el peso teológico de una disposición vinculante de Dios y evita la asociación de «testamento» con el sentido moderno de última voluntad.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor temporal de ὅταν ἀφέλωμαι
  english_pob_reading: when I take away their sins
  chosen_spanish_reading: cuando quite sus pecados
  alternative_spanish_readings:
  - cada vez que quite sus pecados
  - cuando retire sus pecados
  rationale: El contexto apunta a un acto prometido dentro de la historia de la salvación, no a una acción repetida. «Cuando» mantiene la certeza y el carácter futuro de la promesa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El estado de revisión indica alta concordancia y sin cambios adicionales necesarios; se mantiene la solución aprobada en inglés, adaptándola al español con equivalencia óptima y sin introducir notas nuevas no exigidas por el texto fuente.
  spanish_consistency_notes:
  - Se mantuvo «pacto» de forma consistente para διαθήκη, en línea con el contexto paulino y la cita profética.
  - Se eligió «pecados» en plural para reflejar τὰς ἁμαρτίας sin singularizar indebidamente.
  - La nota al pie conserva la alternativa literal documentada en el audit trail inglés, ajustada al español.
  - La omisión de un equivalente explícito de αὐτοῖς en favor de «con ellos» sigue la decisión idiomática del POB y evita una construcción rígida.
