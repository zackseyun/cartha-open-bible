translation:
  language: es
  text: Porque si su rechazo significa reconciliación para el mundo, ¿qué significará su aceptación[a], sino vida de entre los muertos[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Aceptación» también puede entenderse como «recepción»; el término griego contrasta con «rechazo» y puede denotar ser recibidos nuevamente.
    reason: lexical_alternative
  - marker: b
    text: «Vida de entre los muertos» puede referirse figuradamente a una extraordinaria renovación espiritual o, más específicamente, a la resurrección; Pablo deja la expresión comprimida y evocadora.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποβολὴ
  english_pob_choice: rejection
  chosen_spanish: rechazo
  alternatives_spanish:
  - desecho
  - apartamiento
  - rechazo/puesta a un lado
  lexicon: BDAG
  rationale: En este contexto retoma el sentido relacional de ser apartado o no recibido. «Rechazo» mantiene bien el contraste con la idea posterior de ser nuevamente acogidos, sin volverlo demasiado técnico ni demasiado físico.
- source_word: καταλλαγὴ
  english_pob_choice: reconciliation
  chosen_spanish: reconciliación
  alternatives_spanish:
  - restauración de la relación
  - restablecimiento
  lexicon: BDAG
  rationale: Es el equivalente natural y preciso del vocabulario paulino de restauración relacional. «Reconciliación» comunica con claridad la relación reparada entre Dios y el mundo.
- source_word: κόσμου
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo de la humanidad
  - el mundo gentil
  lexicon: BDAG
  rationale: Se conserva la amplitud de κόσμος sin restringirlo en el texto principal. Aunque el contexto inmediato incluye a los gentiles, Pablo dice «el mundo», y la traducción debe respetar ese alcance.
- source_word: πρόσλημψις
  english_pob_choice: acceptance
  chosen_spanish: aceptación
  alternatives_spanish:
  - recepción
  - ser recibidos
  - acogida
  lexicon: BDAG
  rationale: «Aceptación» reproduce bien el contraste con «rechazo» y expresa la idea de ser recibidos nuevamente. En español es más natural que una forma demasiado literal como «recepción».
- source_word: ζωὴ ἐκ νεκρῶν
  english_pob_choice: life from the dead
  chosen_spanish: vida de entre los muertos
  alternatives_spanish:
  - vida de los muertos
  - vida resucitada
  - vida de los muertos / vida de entre los muertos
  lexicon: BDAG
  rationale: La frase española preserva la concisión y la imagen del griego sin interpretarla de antemano. «De entre los muertos» mantiene abierta la tensión entre renovación espiritual intensa y resurrección escatológica.
- source_word: εἰ μὴ
  english_pob_choice: if not
  chosen_spanish: sino
  alternatives_spanish:
  - si no
  - excepto
  lexicon: BDAG
  rationale: En una pregunta retórica en español, «sino» comunica con naturalidad la expectativa enfática del griego, evitando una construcción menos idiomática como «si no».
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ahora bien
  lexicon: BDAG
  rationale: «Porque» enlaza con la lógica argumentativa de la frase anterior y es plenamente natural en español. Mantiene el valor causal/explicativo de γάρ.
theological_decisions:
- issue: Alcance de «vida de entre los muertos»
  english_pob_reading: Retain the phrase as an open eschatological expression without specifying whether it refers to Israel's spiritual renewal, general resurrection, or a figurative worldwide enlivening.
  chosen_spanish_reading: Mantener la expresión abierta sin resolver si alude a renovación espiritual de Israel, a resurrección final o a un avivamiento figurado de alcance mundial.
  alternative_spanish_readings:
  - «vida nueva»
  - «resurrección»
  - «vida resucitada»
  rationale: El griego es comprimido y evocador; la traducción no debe cerrar la interpretación que Pablo deja abierta. «Vida de entre los muertos» conserva la tensión teológica y permite las posibilidades que señala el aparato inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide de cerca con la revisión final inglesa: se mantienen el paralelismo rechazo/aceptación, el alcance amplio de «el mundo» y la apertura interpretativa de «vida de entre los muertos», sin cambios sustanciales respecto del estado revisado más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se usa «rechazo/aceptación» para conservar el contraste lexical; no se sustituye por vocabulario eclesiástico más tradicional sin necesidad.
  - «Vida de entre los muertos» evita resolver la tensión escatológica presente en el griego.
  - La puntuación reproduce el énfasis retórico de la pregunta final en español moderno.
