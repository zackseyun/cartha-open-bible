  to: Porque así como ustedes antes fueron desobedientes[a] a Dios, ahora han recibido misericordia por la desobediencia de ellos,
  rationale: Se ajusta ποτε a «antes» para reflejar mejor el contraste temporal con «ahora», se suaviza la sintaxis eliminando «pero» tras «así como» para un español más natural sin pérdida del valor adversativo, y se mueve la nota al término léxicamente pertinente. También se formula la alternativa con paralelismo español más natural («incrédulos» / «incredulidad»).
