translation:
  language: es
  text: Porque así como ustedes antes fueron desobedientes[a] a Dios, ahora han recibido misericordia por la desobediencia de ellos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incrédulos» / «incredulidad»; los términos griegos para «fueron desobedientes» y «la desobediencia de ellos» pueden abarcar ambos matices en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque así como
  alternatives_spanish:
  - Así como
  - Pues así como
  lexicon: BDAG
  rationale: La combinación introduce una comparación explicativa; «Porque así como» conserva el valor causal/explicativo de γάρ y la comparación de ὥσπερ de manera natural en español.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes, los gentiles
  lexicon: BDAG
  rationale: El plural de segunda persona se expresa de forma natural con «ustedes» en español neutro latinoamericano, sin añadir información no explícita en la cláusula.
- source_word: ποτε
  english_pob_choice: once
  chosen_spanish: alguna vez
  alternatives_spanish:
  - antes
  - en otro tiempo
  lexicon: BDAG
  rationale: Marca contraste temporal con νῦν («ahora») y suena idiomático en español; evita una formulación demasiado rígida.
- source_word: ἠπειθήσατε
  english_pob_choice: were disobedient
  chosen_spanish: fueron desobedientes
  alternatives_spanish:
  - desobedecieron
  - rehusaron creer
  lexicon: BDAG
  rationale: «Desobedientes» preserva el campo semántico de ἀπειθέω sin reducirlo solo a incredulidad intelectual; mantiene la relación moral-relacional hacia Dios.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - contra Dios
  - para con Dios
  lexicon: BDAG
  rationale: El dativo con ἀπειθέω se representa con la preposición normal en español para expresar la desobediencia dirigida a Dios.
- source_word: νῦν δὲ
  english_pob_choice: but now
  chosen_spanish: pero ahora
  alternatives_spanish:
  - mas ahora
  - ahora, sin embargo
  lexicon: BDAG
  rationale: Conserva el giro adversativo y el fuerte contraste temporal del original.
- source_word: ἠλεήθητε
  english_pob_choice: have received mercy
  chosen_spanish: han recibido misericordia
  alternatives_spanish:
  - han sido objeto de misericordia
  - les ha sido mostrada misericordia
  lexicon: BDAG
  rationale: «Recibido misericordia» es natural en español y mantiene el foco en el don otorgado a los destinatarios; «misericordia» traduce con precisión ἐλεέω/ἔλεος.
- source_word: τῇ τούτων ἀπειθείᾳ
  english_pob_choice: because of their disobedience
  chosen_spanish: por la desobediencia de ellos
  alternatives_spanish:
  - a causa de la desobediencia de ellos
  - por su desobediencia
  lexicon: BDAG
  rationale: La construcción dativa admite sentido causal/instrumental; «por la desobediencia de ellos» expresa bien la relación sin sobrecargar el mecanismo. Se conserva «de ellos» para reflejar τούτων y evitar borrar la referencia contextual.
theological_decisions:
- issue: 'ἀπειθέω / ἀπείθεια: disobedience vs. unbelief'
  english_pob_reading: disobedience
  chosen_spanish_reading: desobediencia
  alternative_spanish_readings:
  - incredulidad
  - falta de fe
  rationale: Se preserva la conexión verbal-sustantiva de ἀπειθέω / ἀπείθεια y el tono relacional frente a Dios; aunque el contexto paulino puede incluir incredulidad, el texto griego aquí no obliga a reducirlo solo a un sentido cognitivo.
  doctrine_reference: Preservar la tensión lexical y teológica; no resolverla prematuramente.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español donde corresponde.
  spanish_consistency_notes:
  - Se mantiene la alternancia temporal «alguna vez / ahora» para reflejar ποτε / νῦν.
  - Se conserva la referencia a Dios con mayúscula reverente y sin sustituir el nombre divino, ya que el texto usa θεῷ aquí.
  - La decisión «desobediencia» se mantiene de forma consistente en verbo y sustantivo para respetar la relación léxica del griego.
