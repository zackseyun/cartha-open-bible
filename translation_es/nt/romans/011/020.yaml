translation:
  language: es
  text: 'Muy bien[a]: fueron arrancadas por la incredulidad, pero tú estás firme por la fe[b]. No seas arrogante[c], sino teme[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Bien» o «Eso es verdad».
    reason: lexical_alternative
  - marker: b
    text: O «por medio de la fe» o «por confianza». Gr. pistis se traduce aquí por defecto como «fe» en el texto principal.
    reason: alternative_reading
  - marker: c
    text: O «no seas altivo» o «no pienses con orgullo».
    reason: lexical_alternative
  - marker: d
    text: Es decir, teme con humilde reverencia y cautela delante de Dios, no con presunción arrogante.
    reason: lexical_alternative
lexical_decisions:
- source_word: καλῶς
  english_pob_choice: Quite right
  chosen_spanish: Muy bien
  alternatives_spanish:
  - Bien
  - Eso es verdad
  - Correcto
  lexicon: BDAG
  rationale: Como respuesta aprobatoria a la afirmación previa, «Muy bien» conserva la fuerza de asentimiento y suena natural en español sin perder el valor confirmatorio del adverbio.
- source_word: ἀπιστίᾳ
  english_pob_choice: because of unbelief
  chosen_spanish: por la incredulidad
  alternatives_spanish:
  - a causa de la incredulidad
  - por falta de fe
  lexicon: BDAG
  rationale: El dativo expresa aquí causa o motivo. «Incredulidad» reproduce con fidelidad el contraste paulino con «fe» y evita suavizar el término con una paráfrasis más general.
- source_word: ἐξεκλάσθησαν
  english_pob_choice: were broken off
  chosen_spanish: fueron desgajadas
  alternatives_spanish:
  - fueron cortadas
  - fueron quebradas
  lexicon: BDAG
  rationale: La imagen del olivo exige una solución vegetal y concreta en español. «Desgajadas» comunica la metáfora de ramas separadas del árbol con una naturalidad mayor que «rotas» o «cortadas».
- source_word: πίστει
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - por medio de la fe
  - mediante la fe
  - por confianza
  lexicon: BDAG
  rationale: Se mantiene «fe» como término principal de πίστις, y el dativo se expresa con «por» para comunicar base o medio de manera fluida en español.
- source_word: ἕστηκας
  english_pob_choice: you stand
  chosen_spanish: permaneces
  alternatives_spanish:
  - estás en pie
  - te mantienes firme
  - has permanecido
  lexicon: BDAG
  rationale: El perfecto griego presenta un estado vigente. «Permaneces» comunica continuidad y estabilidad en una forma española natural; la idea de firmeza queda implícita por el contraste del contexto.
- source_word: ὑψηλὰ φρόνει
  english_pob_choice: Do not be arrogant
  chosen_spanish: No seas arrogante
  alternatives_spanish:
  - No pienses con orgullo
  - No seas altivo
  - No tengas pensamientos soberbios
  lexicon: BDAG
  rationale: La expresión idiomática se vierte con el sentido claro de orgullo presuntuoso. «Arrogante» transmite la advertencia sin forzar un calco como «pienses alto».
- source_word: φοβοῦ
  english_pob_choice: fear
  chosen_spanish: teme
  alternatives_spanish:
  - ten reverente temor
  - teme con reverencia
  - sé temeroso
  lexicon: BDAG
  rationale: «Teme» preserva la aspereza retórica del imperativo. En español puede abarcar el matiz de temor reverente que el contexto exige, sin diluirse en «respeta».
theological_decisions:
- issue: Contraste μεταξύ incredulidad y fe
  english_pob_reading: they were broken off because of unbelief ... you stand by faith
  chosen_spanish_reading: fueron desgajadas por la incredulidad ... permaneces por la fe
  alternative_spanish_readings:
  - fueron desgajadas por falta de fe ... permaneces por la fe
  - fueron desgajadas a causa de la incredulidad ... permaneces por la fe
  rationale: Se conserva el contraste directo entre ἀπιστία y πίστις, importante en la argumentación paulina. «Incredulidad» mantiene la oposición conceptual sin reinterpretarla como simple ausencia de confianza.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → fe; preserve contrast with unbelief'
- issue: Fuerza del mandato φοβοῦ
  english_pob_reading: fear
  chosen_spanish_reading: teme
  alternative_spanish_readings:
  - ten temor reverente
  - teme con reverencia
  - ten cuidado
  rationale: 'El pasaje no permite suavizar la advertencia. «Teme» mantiene la tensión teológica: una actitud de humilde cautela ante Dios, no pánico ni mera formalidad religiosa.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios necesarios; se mantiene el acuerdo alto con el control cruzado y la filosofía óptima-equivalente del POB inglés.'
  spanish_consistency_notes:
  - Se mantiene «fe» para πίστις y «incredulidad» para ἀπιστία, conservando el contraste paulino.
  - Se evita «SEÑOR» o fórmulas eclesiásticas no presentes en el texto; este versículo no contiene el nombre divino.
  - «Desgajadas» respeta la metáfora agrícola del olivo mejor que un calco literal de ruptura.
  - «Teme» se deja sin suavizar para preservar la advertencia retórica y la tensión doctrinal del contexto.
