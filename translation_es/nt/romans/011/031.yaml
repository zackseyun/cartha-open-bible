translation:
  language: es
  text: Así también estos ahora han desobedecido[a] por la misericordia mostrada a ustedes, para que también ellos ahora reciban misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por medio de su misericordia». El griego podría entenderse más literalmente así, pero en contexto probablemente se refiere a la misericordia que Dios les mostró a ustedes.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: So also
  chosen_spanish: Así también
  alternatives_spanish:
  - De igual modo
  - Igualmente
  lexicon: BDAG
  rationale: Expresa la relación comparativa/inferencial con el contexto previo sin sonar rígido; 'así también' es natural en español y conserva el enlace argumental.
- source_word: οὗτοι
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - ellos
  - estas personas
  lexicon: BDAG
  rationale: Mantiene el demostrativo cercano y visible en el texto; en español 'estos' conserva la referencia histórica/contextual a Israel mejor que un simple pronombre.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - al presente
  lexicon: BDAG
  rationale: Marca el contraste temporal de la argumentación paulina con un adverbio natural y directo.
- source_word: ἠπείθησαν
  english_pob_choice: have been disobedient
  chosen_spanish: han sido desobedientes
  alternatives_spanish:
  - han desobedecido
  - han sido incrédulos
  lexicon: BDAG
  rationale: ἀπειθέω puede abarcar desobediencia e incredulidad; 'han sido desobedientes' preserva el alcance covenantal sin reducirlo solo a una falla intelectual.
- source_word: τῷ ὑμετέρῳ ἐλέει
  english_pob_choice: by the mercy shown to you
  chosen_spanish: mediante la misericordia mostrada a ustedes
  alternatives_spanish:
  - por la misericordia que se les mostró
  - a través de la misericordia para ustedes
  lexicon: BDAG
  rationale: La frase dativa es comprimida; 'mediante la misericordia mostrada a ustedes' hace explícito que se trata de la misericordia de Dios recibida por los destinatarios, no de misericordia ejercida por ellos.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: En español, 'para que' comunica de manera idiomática la relación de propósito/result resultante de la cláusula.
- source_word: αὐτοὶ
  english_pob_choice: they also
  chosen_spanish: también ellos
  alternatives_spanish:
  - ellos mismos también
  - a ellos también
  lexicon: BDAG
  rationale: Conserva la inclusión enfática de Israel en el plan divino sin sobrecargar la sintaxis.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - también ahora
  lexicon: BDAG
  rationale: La repetición de 'ahora' mantiene el énfasis temporal del griego y la simetría retórica del verso.
- source_word: ἐλεηθῶσιν
  english_pob_choice: may now receive mercy
  chosen_spanish: reciban misericordia
  alternatives_spanish:
  - se les muestre misericordia
  - obtengan misericordia
  lexicon: BDAG
  rationale: El pasivo comunica que la misericordia es otorgada por Dios; en español, 'reciban misericordia' es claro, sobrio y fiel, y evita una pasiva innecesariamente pesada.
theological_decisions:
- issue: 'Sentido de τῷ ὑμετέρῳ ἐλέει: si es misericordia ejercida por los gentiles o misericordia recibida por ellos de parte de Dios'
  english_pob_reading: the mercy shown to you
  chosen_spanish_reading: la misericordia mostrada a ustedes
  alternative_spanish_readings:
  - su misericordia
  - la misericordia que ustedes muestran
  rationale: El flujo de Romanos 11:30–32 contrapone desobediencia y misericordia divina recibida. Por eso se explicita que la misericordia es la que Dios mostró a los gentiles, no una cualidad activa de ellos.
  doctrine_reference: Romanos 11:30–32; principio de transparencia léxica de POB
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura inglesa auditada y mantiene la misma decisión interpretativa principal sobre τῷ ὑμετέρῳ ἐλέει. No se detectaron revisiones posteriores que alteren el sentido; se preserva la tensión entre la lectura más literal («por medio de su misericordia») y la lectura contextual («mediante la misericordia mostrada a ustedes»).
  spanish_consistency_notes:
  - Se prefirió 'misericordia' para ἔλεος, conforme al uso bíblico estándar y a la decisión inglesa auditada.
  - Se evitó 'SEÑOR' o paráfrasis teológica ajena; no aparece el Tetragrámaton en este versículo.
  - Se mantuvo la repetición de 'ahora' para reflejar el doble νῦν del griego.
  - '''Desobedientes'' conserva el valor de ἀπειθέω sin reducirlo a ''incredulidad'' exclusivamente.'
