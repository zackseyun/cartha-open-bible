translation:
  language: es
  text: ¿O quién le ha dado primero[a], para que se le devuelva[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «ha dado previamente».
    reason: lexical_alternative
  - marker: b
    text: Es decir, nadie le ha dado a Dios de tal manera que Dios quedara obligado a devolverle algo.
