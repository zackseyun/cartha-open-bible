lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿Acaso
  - ¿O bien
  lexicon: BDAG
  rationale: Mantiene la continuación retórica de la serie de preguntas en español de forma natural y breve.
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - qué persona
  lexicon: BDAG
  rationale: Interrogativo personal idiomático en español para esta pregunta retórica.
- source_word: προέδωκεν
  english_pob_choice: has first given
  chosen_spanish: ha dado primero[a]
  alternatives_spanish:
  - ha dado antes
  - dio primero
  lexicon: BDAG
  rationale: La forma compuesta puede expresar prioridad temporal de dar; «ha dado primero» conserva esa prioridad sin añadir una construcción pesada. Se deja la nota para la alternativa «dado previamente» / «dado antes» implícita en el griego compuesto.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: Se mantiene el pronombre como en el griego, preservando la forma retórica; el referente es claro por el contexto.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conjunción coordinante simple que conserva la estructura paralela del texto.
- source_word: ἀνταποδοθήσεται
  english_pob_choice: it will be repaid
  chosen_spanish: se le pagará de vuelta
  alternatives_spanish:
  - se le retribuirá
  - se le devolverá
  lexicon: BDAG
  rationale: El pasivo futuro expresa la idea de retribución/compensación. «Se le pagará de vuelta» conserva el sentido de devolver como pago, sin introducir un sujeto explícito que el griego no tiene.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: Se repite el pronombre dativo para mantener el paralelismo y la economía del original.
theological_decisions:
- issue: Referente de los pronombres dativos
  english_pob_reading: Rendered as 'him,' referring to God from the surrounding context.
  chosen_spanish_reading: Se conserva «a él» en lugar de sustituirlo por «a Dios».
  alternative_spanish_readings:
  - a Dios
  rationale: El griego emplea pronombres, no el sustantivo «Dios». Mantenerlos preserva la forma y el paralelismo retórico, mientras el contexto identifica claramente el referente.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza de προέδωκεν respecto a la obligación de Dios
  english_pob_reading: Included the priority nuance with 'has first given' to emphasize the rhetorical denial that anyone can place God under obligation.
  chosen_spanish_reading: «ha dado primero» conserva la prioridad temporal y la pregunta implícita sobre obligación/retribución.
  alternative_spanish_readings:
  - ha dado antes
  - ha dado previamente
  rationale: La frase subraya que nadie ha antecedido a Dios en dar de modo que pudiera imponerle una deuda. La elección mantiene esa fuerza sin sobreexplicar el texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El audit trail inglés no requirió revisiones posteriores; el veredicto final indicó sin cambios necesarios. La propuesta española sigue esa lectura estable y conserva la estructura retórica de la pregunta doble.
  spanish_consistency_notes:
  - Se mantiene «a él» para el referente divino, siguiendo la práctica de no reemplazar pronombres del original por el nombre explícito salvo necesidad clara.
  - Se prefirió «se le pagará de vuelta» por su transparencia semántica y por reflejar el pasivo impersonal del griego.
  - No se introdujo «Mesías», «Yahvé» u այլ terminología no pertinente a este versículo.
