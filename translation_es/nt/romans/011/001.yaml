translation:
  language: es
  text: 'Así que pregunto: ¿acaso Dios ha rechazado[a] a su pueblo? ¡De ningún modo![b] Porque yo mismo soy israelita, de la descendencia[c] de Abraham, de la tribu de Benjamín.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha desechado» a su pueblo.
    reason: lexical_alternative
  - marker: b
    text: Expresión fuerte de repudio; también puede traducirse «¡Jamás!» o «¡De ninguna manera!».
    reason: lexical_alternative
  - marker: c
    text: O «de la simiente de Abraham».
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγω οὖν
  english_pob_choice: So I ask
  chosen_spanish: Entonces pregunto
  alternatives_spanish:
  - Por tanto digo
  - Así que pregunto
  lexicon: BDAG
  rationale: λέγω introduce aquí una pregunta retórica, y οὖν marca consecuencia. «Entonces pregunto» comunica en español esa transición inferencial sin volverlo mecánico ni perder el carácter discursivo.
- source_word: μὴ ἀπώσατο
  english_pob_choice: has ... rejected
  chosen_spanish: ha rechazado
  alternatives_spanish:
  - ha desechado
  - ha apartado de sí
  - ha echado fuera
  lexicon: BDAG
  rationale: ἀπωθέομαι expresa rechazo/repudio. «Ha rechazado» es natural en español y conserva la fuerza del cuestionamiento paulino. «Desechado» sería posible, pero «rechazado» es más claro aquí.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Equivalencia directa y estándar para θεός.
- source_word: τὸν λαὸν αὐτοῦ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su pueblo propio
  - al pueblo que le pertenece
  lexicon: BDAG
  rationale: λαός tiene aquí sentido de pueblo de pertenencia pactal. «A su pueblo» conserva la referencia posesiva sin sobreexplicar.
- source_word: μὴ γένοιτο
  english_pob_choice: May it never be!
  chosen_spanish: ¡De ningún modo!
  alternatives_spanish:
  - ¡Jamás sea así!
  - ¡En ninguna manera!
  - ¡De ninguna manera!
  lexicon: BDAG
  rationale: La expresión paulina es una fuerte repudiación. «¡De ningún modo!» comunica bien la negación enfática y es idiomática en español. Se preserva la intensidad sin suavizarla.
- source_word: ἐγὼ
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo también
  - yo personalmente
  lexicon: BDAG
  rationale: El pronombre es enfático. «Yo mismo» refleja esa autosuficiencia retórica, mostrando que Pablo se presenta como ejemplo vivo.
- source_word: Ἰσραηλίτης
  english_pob_choice: an Israelite
  chosen_spanish: israelita
  alternatives_spanish:
  - un israelita
  - un hijo de Israel
  lexicon: BDAG
  rationale: Identificador étnico/covenantal. En español, el sustantivo/adjetivo «israelita» funciona con naturalidad y precisión.
- source_word: ἐκ σπέρματος Ἀβραάμ
  english_pob_choice: from the offspring of Abraham
  chosen_spanish: de la descendencia de Abraham
  alternatives_spanish:
  - del linaje de Abraham
  - de la simiente de Abraham
  - de la progenie de Abraham
  lexicon: BDAG
  rationale: σπέρμα puede traducirse literalmente como «simiente», pero en español contemporáneo «descendencia» comunica mejor la idea genealógica sin perder el vínculo conceptual. Se mantiene la estructura de origen con ἐκ mediante «de».
- source_word: φυλῆς Βενιαμίν
  english_pob_choice: of the tribe of Benjamin
  chosen_spanish: de la tribu de Benjamín
  alternatives_spanish:
  - de la casa de Benjamín
  lexicon: BDAG
  rationale: φυλή es «tribu». La construcción genealógica en español es natural y exacta.
theological_decisions:
- issue: Alcance del rechazo divino de Israel
  english_pob_reading: Render the question straightforwardly as 'has God rejected his people?' without adding qualifiers such as 'finally' or 'completely.'
  chosen_spanish_reading: «¿acaso Dios ha rechazado a su pueblo?» sin añadir «totalmente», «para siempre» ni «definitivamente».
  alternative_spanish_readings:
  - ¿acaso Dios ha rechazado completamente a su pueblo?
  - ¿acaso Dios ha desechado para siempre a su pueblo?
  rationale: El griego no añade un adverbio que delimite el alcance del rechazo. La traducción debe conservar la tensión retórica de Pablo y dejar que el contexto inmediato determine el alcance teológico, en lugar de resolverlo por adelantado.
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar el versículo.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran un acuerdo alto; no se requieren revisiones sustantivas. Se conserva la pregunta retórica, la negación enfática de μὴ γένοιτο y la referencia genealógica con σπέρμα sin añadir matices no presentes en el original.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «pueblo» para λαός en sentido de pertenencia pactal.
  - Se mantiene «israelita» como identificador étnico, y «tribu de Benjamín» como fórmula genealógica estándar.
  - Se prefirió «descendencia» a «simiente» en el texto principal por claridad actual, dejando la alternativa en nota.
  - La puntuación reproduce la pregunta retórica con dos puntos y la exclamación enfática en español natural.
