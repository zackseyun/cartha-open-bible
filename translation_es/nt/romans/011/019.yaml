review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: mantiene el futuro directo de ἐρεῖς, la fuerza inferencial de οὖν, la metáfora de κλάδοι/ἐκκλάω y la pasiva de ἐγκεντρισθῶ. Sin embargo, la sintaxis española de «Fueron desgajadas ramas» suena invertida y menos natural que una formulación con sujeto inicial o pasiva refleja. Además, el uso de nota al pie para justificar «desgajadas» no es necesario para el lector, ya que no preserva una alternativa textual ni resuelve una ambigüedad nueva en español.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «Fueron desgajadas ramas» resulta poco idiomático en español general. «Unas ramas fueron desgajadas» o «Ramas fueron desgajadas» mejora la naturalidad; la primera además refleja mejor la referencia indefinida del griego. «Entonces dirás» es aceptable, aunque «Dirás entonces» también sería natural. Conviene retirar la nota léxica innecesaria y dejar un texto limpio.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Injertado» refleja bien ἐγκεντρισθῶ. «Desgajadas» es defendible para preservar la imagen arbórea, aunque se puede mantener sin nota. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: Orden de palabras poco natural en «Fueron desgajadas ramas»
    rationale: Aunque comprensible, esta inversión suena forzada en español bíblico moderno. El griego no exige copiar ese orden; una reordenación mejora la legibilidad sin alterar el sentido.
  - severity: low
    issue: Nota al pie léxica innecesaria
    rationale: La nota no preserva una variante, ambigüedad relevante ni información que el lector necesite para entender el texto. El proyecto pide notas cuando hay una razón textual o una ambigüedad significativa, no para defender cada elección estilística.
  revised_spanish_text: 'Entonces dirás: «Unas ramas fueron desgajadas, para que yo fuera injertado»'
  revision_rationale: Se ajusta el orden de palabras para un español más natural y ampliamente legible, manteniendo intactos el sentido, la metáfora arbórea y la pasiva del original. Se elimina la nota al pie porque no añade una distinción necesaria para el lector ni responde a una ambigüedad del texto fuente.
