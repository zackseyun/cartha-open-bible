translation:
  language: es
  text: 'Entonces dirás: «Fueron desgajadas ramas, para que yo fuera injertado»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Desgajadas’ conserva la imagen arbórea del verbo griego mejor que un simple ‘cortadas’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρεῖς
  english_pob_choice: You will say
  chosen_spanish: Entonces dirás
  alternatives_spanish:
  - Luego dirás
  - Dirás entonces
  lexicon: BDAG
  rationale: El futuro de segunda persona singular conserva el valor directo del griego y encaja bien en el estilo de diatriba de Pablo. ‘Entonces’ reproduce la conexión inferencial de οὖν sin volver la frase rígida.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Es una partícula inferencial/discursiva; ‘entonces’ resulta natural en español y mantiene la progresión argumentativa sin sobrecargar el tono.
- source_word: Ἐξεκλάσθησαν
  english_pob_choice: were broken off
  chosen_spanish: Fueron desgajadas
  alternatives_spanish:
  - Fueron cortadas
  - Fueron arrancadas
  lexicon: BDAG
  rationale: En la metáfora del olivo, ‘desgajar’ comunica mejor la imagen de ramas separadas del árbol que un ‘cortar’ más abstracto. ‘Desgajadas’ conserva el golpe visual del pasivo aoristo.
- source_word: κλάδοι
  english_pob_choice: branches
  chosen_spanish: ramas
  alternatives_spanish:
  - ramas del árbol
  - sarmientos
  lexicon: BDAG
  rationale: ‘Ramas’ es el equivalente natural y claro en español para κλάδοι dentro del contexto agrícola de Romanos 11. ‘Sarmientos’ sería menos directo y más restringido.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: ‘Para que’ expresa finalidad de manera natural en español y refleja adecuadamente la relación de propósito/resultado del griego.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: BDAG
  rationale: El pronombre explícito conserva el énfasis de la primera persona sin añadir una intensificación que el griego no exige aquí.
- source_word: ἐγκεντρισθῶ
  english_pob_choice: might be grafted in
  chosen_spanish: fuera injertado
  alternatives_spanish:
  - fuese injertado
  - pudiera ser injertado
  lexicon: BDAG
  rationale: ‘Injertar’ es el verbo natural para la imagen agrícola. En la voz pasiva, ‘fuera injertado’ mantiene la relación verbal y el tono de discurso reportado sin introducir matices ajenos.
theological_decisions:
- issue: Si el versículo debe sonar como una afirmación del interlocutor imaginario o como una declaración directa del autor
  english_pob_reading: Retain the direct second-person address without adding explanatory wording in the main text
  chosen_spanish_reading: 'Mantener el trato directo: «dirás»'
  alternative_spanish_readings:
  - Dirás entonces, alguien podría decir
  - Entonces alguien dirá
  rationale: El griego simplemente dice ‘dirás entonces’; la forma directa preserva el estilo de diálogo polémico sin explicitar en el texto principal que se trata de un interlocutor imaginario.
  doctrine_reference: Principio de fidelidad al texto y de no ampliar más allá de lo que el pasaje afirma.
- issue: Cómo reflejar el propósito de la cláusula ἵνα sin convertirlo en una afirmación doctrinal independiente
  english_pob_reading: Translate the interlocutor's statement straightforwardly as 'so that I might be grafted in'
  chosen_spanish_reading: ‘para que yo fuera injertado’ como finalidad expresada por el hablante
  alternative_spanish_readings:
  - para que yo pudiera ser injertado
  - para ser injertado
  rationale: La frase presenta la supuesta conclusión del interlocutor y no una aprobación editorial. ‘Para que’ conserva el valor de finalidad sin reforzar indebidamente la conclusión del hablante.
  doctrine_reference: 'Filosofía de traducción POB: no resolver ni exagerar tensiones teológicas que el texto deja en el discurso.'
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del archivo fuente y con la revisión auditada: no se registran cambios posteriores ni correcciones pendientes en la traducción inglesa de referencia.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Se evitó ‘Cristo’, ‘Señor’ o vocabulario eclesiástico añadido; el versículo se limita a la metáfora del olivo y al discurso directo.
  - La voz pasiva en español se resolvió con una forma natural (‘fueron desgajadas’, ‘fuera injertado’) para conservar tanto la imagen como la fluidez idiomática.
