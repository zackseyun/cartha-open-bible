review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: Dios no ha rechazado a su pueblo, προέγνω se mantiene con un giro no dogmáticamente cargado, ἐν Ἠλίᾳ se aclara idiomáticamente como referencia al pasaje sobre Elías, y κατὰ τοῦ Ἰσραήλ se vierte correctamente como «contra Israel». Sin embargo, hay dos desajustes con el audit trail y el griego: (1) la nota [a] está anclada a «pueblo», pero explica el modismo «en Elías»; debe anclarse en la frase correspondiente, no en «pueblo»; (2) «interpela a Dios» para ἐντυγχάνει suena poco natural en español bíblico y puede sugerir cuestionamiento directo más que apelación o acusación ante Dios.'
  spanish_quality_summary: El español es mayormente claro y digno, pero la colocación de la nota es errónea y «cómo interpela a Dios contra Israel» resulta menos natural que «cómo apela a Dios contra Israel». Además, conviene conservar el enlace discursivo inicial «O» como en el griego y el inglés auditado, no necesariamente forzar solo «¿O...?», pero eso ya está aceptablemente representado. La frase revisada mejora legibilidad sin perder precisión.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεός = «Dios», γραφή = «la Escritura», Ἰσραήλ = «Israel». La decisión para προέγνω como «conoció de antemano» es aceptable y coherente con la nota teológica. No intervienen Yahvé/Mesías/u otros términos sensibles del glosario.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada al lugar equivocado en el texto.
    rationale: La nota explica el griego «en Elías», es decir ἐν Ἠλίᾳ, pero en el borrador aparece después de «su pueblo». Esto rompe la correspondencia entre texto y nota exigida por el proyecto.
  - severity: medium
    issue: «Interpela a Dios» no refleja con naturalidad ἐντυγχάνει en este contexto.
    rationale: Aunque intenta evitar el sentido positivo de «intercede», en español «interpelar» suele significar cuestionar o dirigirse a alguien de forma directa, no tanto apelar o presentar una acusación ante Dios. «Apela a Dios» preserva mejor el valor léxico y el contexto adversativo.
  - severity: low
    issue: La redacción de la nota [c] es torpe en español.
    rationale: «se deja sin resolver aquí esa tensión teológica» suena poco natural. Puede mejorarse a «el término griego se deja sin resolver en medio de esa tensión teológica aquí» o formulación equivalente más idiomática.
  revised_spanish_text: Dios no ha rechazado a su pueblo, al que conoció de antemano[c]. O ¿no saben lo que dice la Escritura en el pasaje[a] sobre Elías, cómo apela a Dios contra Israel[b]?
