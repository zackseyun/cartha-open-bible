translation:
  language: es
  text: Dios no ha rechazado a su pueblo, al que conoció de antemano[c]. O ¿no saben lo que dice la Escritura en el pasaje[a] sobre Elías, cómo apela a Dios contra Israel[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «en Elías», un modismo que significa «en el pasaje sobre Elías».'
    reason: lexical_alternative
  - marker: b
    text: O «cómo suplica a Dios contra Israel».
    reason: lexical_alternative
  - marker: c
    text: «Conoció de antemano» también puede expresarse como «conoció previamente»; algunos lo entienden con más fuerza como una alusión a una elección previa, pero el término griego se deja sin resolver aquí en medio de esa tensión teológica.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπώσατο
  english_pob_choice: has not rejected
  chosen_spanish: no ha rechazado
  alternatives_spanish:
  - no ha desechado
  - no ha echado fuera
  lexicon: BDAG
  rationale: El aoristo medio de ἀπωθέομαι expresa aquí rechazar o desechar. «No ha rechazado» es natural en español y preserva la fuerza negativa del texto.
- source_word: λαὸν αὐτοῦ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su pueblo Israel
  - a su gente
  lexicon: BDAG
  rationale: λαός se refiere al pueblo de pertenencia pactal. «Su pueblo» conserva esa relación sin anticipar «Israel», que aparece después explícitamente.
- source_word: προέγνω
  english_pob_choice: foreknew
  chosen_spanish: conoció de antemano
  alternatives_spanish:
  - previo
  - conoció antes
  lexicon: BDAG
  rationale: «Conoció de antemano» reproduce el valor léxico básico de προγινώσκω sin resolver la tensión teológica sobre si implica solo conocimiento previo o elección previa.
- source_word: ἢ οὐκ οἴδατε
  english_pob_choice: Or do you not know
  chosen_spanish: ¿O no saben?
  alternatives_spanish:
  - ¿O no saben ustedes?
  - ¿O no lo saben?
  lexicon: BDAG
  rationale: La pregunta retórica se vuelve natural y directa en español con segunda persona plural.
- source_word: ἐν Ἠλίᾳ
  english_pob_choice: in the passage about Elijah
  chosen_spanish: en el pasaje sobre Elías
  alternatives_spanish:
  - en Elías
  - en la sección sobre Elías
  lexicon: BDAG
  rationale: El griego es idiomático y alude a la sección bíblica acerca de Elías, no a una ubicación literal. «En el pasaje sobre Elías» comunica ese sentido con claridad.
- source_word: ἡ γραφή
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - la escritura
  - las Escrituras
  lexicon: BDAG
  rationale: En Pablo, γραφή suele referirse a la Escritura sagrada. El singular es el más adecuado aquí, como en el audit trail inglés.
- source_word: ὡς ἐντυγχάνει τῷ θεῷ
  english_pob_choice: how he appeals to God
  chosen_spanish: cómo interpela a Dios
  alternatives_spanish:
  - cómo ruega a Dios
  - cómo intercede ante Dios
  lexicon: BDAG
  rationale: ἐντυγχάνω admite «apelar», «interceder» o «suplicar». Dado que el contexto es adversativo («contra Israel»), «interpela a Dios» conserva la idea de dirigirse a Dios en este sentido polémico sin forzar un matiz devocional positivo.
- source_word: κατὰ τοῦ Ἰσραήλ
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - en contra de Israel
  - contra el pueblo de Israel
  lexicon: BDAG
  rationale: κατά con genitivo expresa oposición. «Contra Israel» es breve, claro y fiel al valor adversativo del griego.
theological_decisions:
- issue: Sentido de προέγνω y la elección divina
  english_pob_reading: foreknew
  chosen_spanish_reading: conoció de antemano
  alternative_spanish_readings:
  - previó
  - escogió de antemano
  - amó de antemano
  rationale: La traducción mantiene la tensión lexical sin convertir el verbo en una afirmación doctrinal más fuerte que la forma griega por sí sola. Esto deja abierta la discusión paulina sobre presciencia y elección.
  doctrine_reference: Translation philosophy §3; note on avoiding denominational distinctives unless unambiguous
- issue: Matiz de ἐντυγχάνει en contexto hostil
  english_pob_reading: how he appeals to God against Israel
  chosen_spanish_reading: cómo interpela a Dios contra Israel
  alternative_spanish_readings:
  - cómo intercede ante Dios contra Israel
  - cómo ruega a Dios contra Israel
  rationale: En español, «interceder» y «rogar» pueden sugerir favor hacia el objeto de la súplica. Dado que el texto añade «contra Israel», se prefiere una formulación que conserve el carácter de denuncia o apelación hostil sin suavizarlo.
  doctrine_reference: Contextual lexical-theological decision; Romans 11:2
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se detectaron cambios necesarios respecto del estado anterior; se mantiene el enfoque de equivalencia óptima y la tensión interpretativa en προέγνω y ἐντυγχάνει.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general, pero en este versículo el griego usa θεός y la referencia es a Dios; por eso se traduce «Dios».
  - Se usa «pueblo» para λαός, no «siervo», porque el contexto es corporativo y pactal.
  - Se mantiene «Escritura» en singular, coherente con el uso paulino de ἡ γραφή.
  - Se evita resolver προέγνω como «escogió de antemano» en el texto principal para no cerrar la tensión léxica y teológica documentada.
