revisions:
- from: Porque de él, por medio de él y para él son todas las cosas[a]. A él sea la gloria por los siglos[b]. Amén.
  to: Porque de él, por medio de él y a él son todas las cosas[a]. A él sea la gloria para siempre[b]. Amén.
  rationale: Se ajusta εἰς αὐτὸν a «a él» para preservar mejor la dirección/meta sin intensificar indebidamente la finalidad; se cambia εἰς τοὺς αἰῶνας a «para siempre» para una equivalencia principal más natural en español actual, manteniendo en nota la alternativa más literal. También se armoniza la nota [a] con la alternativa inglesa de ὅτι como conector causal («pues/because»), en vez de duplicar casi exactamente el texto principal.
