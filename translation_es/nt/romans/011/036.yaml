translation:
  language: es
  text: Porque de él, por medio de él y a él son todas las cosas[a]. A él sea la gloria para siempre[b]. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pues de él, por medio de él y a él son todas las cosas»
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hacia los siglos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la relación causal o de fundamento del doxología anterior. «Porque» conserva bien ese valor explicativo en español natural sin perder la fuerza de conexión.
- source_word: ἐξ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - desde él
  - a partir de él
  lexicon: BDAG
  rationale: ἐκ/ἐξ con genitivo indica origen o fuente. «De él» es la forma más natural y directa en español para expresar procedencia.
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por él
  - a través de él
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o agencia. «Por medio de él» hace explícita la mediación y evita ambigüedad con un simple «por».
- source_word: εἰς αὐτὸν
  english_pob_choice: to him
  chosen_spanish: para él
  alternatives_spanish:
  - hacia él
  - a él
  lexicon: BDAG
  rationale: εἰς puede señalar meta, dirección o finalidad. En este contexto doxológico, «para él» comunica bien la orientación y propósito sin sonar forzado.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto existe
  lexicon: BDAG
  rationale: El neutro plural abarca de manera totalizante la realidad creada. «Todas las cosas» conserva el alcance cósmico y solemne mejor que una paráfrasis más libre.
- source_word: αὐτῷ ἡ δόξα
  english_pob_choice: To him be the glory
  chosen_spanish: A él sea la gloria
  alternatives_spanish:
  - A él pertenece la gloria
  - De él sea la gloria
  lexicon: BDAG
  rationale: Es una atribución doxológica sin verbo expreso. En español, «sea» reproduce con naturalidad la fuerza optativa/aculativa del griego y mantiene el tono de alabanza.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - por los siglos de los siglos
  - para siempre
  lexicon: BDAG
  rationale: Literalmente significa «hacia/para los siglos», un modismo temporal de duración indefinida. «Por los siglos» es fiel, reverente y ampliamente comprensible en español litúrgico y bíblico.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén
  lexicon: BDAG
  rationale: Se conserva como afirmación litúrgica transliterada en español estándar, sin necesidad de traducirla.
theological_decisions:
- issue: Referente de los pronombres repetidos
  english_pob_reading: God is the referent throughout, in continuity with the immediate context of Romans 11:33–35.
  chosen_spanish_reading: Dios es el referente implícito en todo el versículo, en continuidad con el contexto inmediato de Romanos 11:33–35.
  alternative_spanish_readings:
  - Un referente teocéntrico más amplio no especificado explícitamente en el versículo
  rationale: La traducción mantiene los pronombres («él») en vez de sustituirlos por «Dios», respetando la forma retórica del doxología. El contexto deja claro el referente sin sobreexplicarlo.
  doctrine_reference: Romanos 11:33–35; principio de preservar la referencia contextual sin colmarla artificialmente
- issue: Naturaleza de la frase doxológica final
  english_pob_reading: To him be the glory
  chosen_spanish_reading: A él sea la gloria
  alternative_spanish_readings:
  - A él pertenece la gloria
  - La gloria es de él
  rationale: El griego es una atribución sin verbo copulativo. «Sea» reproduce la forma doxológica en español de manera natural y reverente, sin añadir contenido doctrinal extra.
  doctrine_reference: Filipenses 4:20; 1 Timoteo 1:17; principio de equivalencia óptima en doxología
- issue: Valor de εἰς τοὺς αἰῶνας
  english_pob_reading: Literally 'into the ages.'
  chosen_spanish_reading: Literalmente, «hacia/para los siglos».
  alternative_spanish_readings:
  - por siempre
  - por los siglos de los siglos
  rationale: Se conserva la imagen temporal del griego en una expresión española estable y bíblica. «Por los siglos» expresa duración continua sin expandir innecesariamente la fórmula.
  doctrine_reference: Apocalipsis 1:6; 5:13; 7:12; preservación del modismo temporal semítico/helénico
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail en inglés y el griego SBLGNT, manteniendo el orden retórico de la doxología y las relaciones preposicionales de origen, mediación y finalidad. No se detectaron revisiones textuales en el registro inglés; por eso no se introducen variantes críticas ni conjeturas.
  spanish_consistency_notes:
  - Se usa «él» para el referente implícito, sin nombrarlo, en continuidad con la retórica del texto.
  - «Gloria» se conserva como sustantivo doxológico fijo, acorde con el uso bíblico en español.
  - «Amén» se mantiene sin traducir por su uso litúrgico asentado.
  - «Por los siglos» preserva el registro solemne y la imagen temporal del original sin caer en calco rígido.
