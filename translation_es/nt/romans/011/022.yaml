revisions:
- from: 'Consideren[a], pues, la bondad y la severidad de Dios: severidad para con los que han caído, pero la bondad de Dios para contigo, si permaneces en esa bondad[b]; de otro modo, tú también serás cortado.'
  to: 'Considera[a], pues, la bondad y la severidad de Dios: severidad hacia los que han caído, pero la bondad de Dios hacia ti, si continúas en su bondad; de otro modo, tú también serás cortado[b].'
  rationale: Se corrige el imperativo al singular para concordar con el griego y con el resto del versículo; se repara la nota [a] para que ofrezca una alternativa real; se reemplaza 'para contigo' por 'hacia ti' para un español más natural; y se ajusta 'en esa bondad' a 'en su bondad' para mayor claridad y mejor alineación con el audit trail inglés.
