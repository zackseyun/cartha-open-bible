    issue: Desajuste de número en el imperativo inicial
    rationale: ἴδε es singular, y el resto del versículo está dirigido a un 'tú' singular. 'Consideren' rompe la concordancia interna; debe ser 'Considera'.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real
    rationale: El texto principal usa 'bondad' pero la nota dice 'O «bondad»'. Esto es un error material y no preserva la lógica del audit trail, donde la alternativa era 'goodness' frente a 'kindness'.
  - severity: low
    issue: '''Para contigo'' suena arcaizante o poco natural'
    rationale: Aunque comprensible, no es la mejor opción para español latinoamericano neutral y de lectura eclesial amplia. 'Hacia ti' o una reestructuración más natural mejora la fluidez sin pérdida de sentido.
  - severity: low
    issue: '''En esa bondad'' es menos natural que ''en su bondad'''
    rationale: El referente de la bondad es claramente Dios; 'su bondad' refleja mejor el griego contextualizado y la decisión inglesa de suplir el posesivo por claridad.
  revised_spanish_text: 'Considera[a], pues, la bondad y la severidad de Dios: severidad hacia los que han caído, pero la bondad de Dios hacia ti, si continúas en su bondad; de otro modo, tú también serás cortado[b].'
