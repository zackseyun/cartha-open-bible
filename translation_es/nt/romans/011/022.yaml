  text: ἴδε οὖν χρηστότητα καὶ ἀποτομίαν θεοῦ· ἐπὶ μὲν τοὺς πεσόντας ⸀ἀποτομία, ἐπὶ δὲ σὲ ⸂χρηστότης θεοῦ⸃, ἐὰν ⸀ἐπιμένῃς τῇ χρηστότητι, ἐπεὶ καὶ σὺ ἐκκοπήσῃ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/011/022.yaml
  text: 'Consider[a], then, the kindness and severity of God: severity toward those who have fallen, but God''s kindness toward you, if you continue in his kindness[b]; otherwise you too will be cut off.'
  footnotes:
  - marker: a
    text: Or 'goodness.' The Greek χρηστότης can denote kindness, goodness, or benevolence; 'kindness' was chosen to preserve the relational contrast with 'severity.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will be broken off.' The Greek verb literally means 'will be cut off'; 'broken off' is a contextual alternative because of the olive-tree imagery in the surrounding passage.
    reason: lexical_alternative
