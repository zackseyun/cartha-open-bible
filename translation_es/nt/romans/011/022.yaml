translation:
  language: es
  text: 'Considera[a], pues, la bondad y la severidad de Dios: severidad hacia los que han caído, pero la bondad de Dios hacia ti, si continúas en su bondad; de otro modo, tú también serás cortado[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «benignidad». El griego χρηστότης puede denotar bondad, benignidad o benevolencia; se eligió «bondad» para mantener con claridad el contraste con «severidad».
    reason: lexical_alternative
  - marker: b
    text: O «serás desgajado». El verbo griego significa literalmente «serás cortado»; «desgajado» es una alternativa contextual por la imagen del olivo en el pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴδε
  english_pob_choice: Consider
  chosen_spanish: Consideren
  alternatives_spanish:
  - Vean
  - Miren
  - Consideren
  lexicon: BDAG
  rationale: El imperativo llama a la reflexión atenta. En español, «Consideren» comunica de manera natural y digna la exhortación, mejor que un calco más literal como «Vean» o «Miren».
- source_word: χρηστότητα / χρηστότης
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - amabilidad
  - benignidad
  - bondad
  lexicon: BDAG
  rationale: En este contexto la palabra describe la benevolencia favorable de Dios. «Bondad» es claro en español y preserva el contraste relacional con «severidad»; «amabilidad» resultaría demasiado débil, y «benignidad» es posible pero menos natural.
- source_word: ἀποτομίαν / ἀποτομία
  english_pob_choice: severity
  chosen_spanish: severidad
  alternatives_spanish:
  - rigor
  - dureza
  - severidad
  lexicon: BDAG
  rationale: El término expresa una dureza o rigor decisivo en juicio. «Severidad» es el equivalente más natural y fiel en español para mantener el contraste con la bondad de Dios sin exagerar más allá del texto.
- source_word: θεοῦ
  english_pob_choice: of God / God’s
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  - de Dios mismo
  lexicon: BDAG
  rationale: Se conserva el genitivo de manera directa y natural en español. En el segundo miembro, no se introduce un posesivo adicional porque el contexto ya identifica a Dios como referente inmediato.
- source_word: ἐπὶ μὲν τοὺς πεσόντας
  english_pob_choice: toward those who have fallen
  chosen_spanish: para con los que han caído
  alternatives_spanish:
  - hacia los que han caído
  - sobre los que han caído
  - para con los que han caído
  lexicon: BDAG
  rationale: La construcción distributiva con ἐπί aquí se expresa mejor en español con «para con», que comunica la dirección o referencia del juicio. «Han caído» conserva el valor resultativo del participio sin forzar el aspecto.
- source_word: πεσόντας
  english_pob_choice: those who have fallen
  chosen_spanish: los que han caído
  alternatives_spanish:
  - los que cayeron
  - los caídos
  lexicon: BDAG
  rationale: El participio sustantivado se traduce de forma natural como «los que han caído», manteniendo la referencia a quienes han quedado en condición de caída dentro de la metáfora del olivo.
- source_word: ἐπὶ δὲ σὲ
  english_pob_choice: toward you
  chosen_spanish: para contigo
  alternatives_spanish:
  - hacia ti
  - sobre ti
  - para contigo
  lexicon: BDAG
  rationale: Para preservar el contraste distributivo y la relación personal del contexto, «para contigo» suena natural en español y refleja la orientación de la bondad divina al destinatario.
- source_word: ἐὰν ἐπιμένῃς
  english_pob_choice: if you continue
  chosen_spanish: si permaneces
  alternatives_spanish:
  - si continúas
  - si perseveras
  - si permaneces
  lexicon: BDAG
  rationale: El verbo indica continuar o mantenerse en algo. «Permaneces» expresa bien la continuidad requerida; «perseveras» añadiría una tonalidad más exhortativa que no es necesaria aquí.
- source_word: τῇ χρηστότητι
  english_pob_choice: in his kindness
  chosen_spanish: en esa bondad
  alternatives_spanish:
  - en su bondad
  - en esa bondad
  - en la bondad de Dios
  lexicon: BDAG
  rationale: El dativo se vierte con «en» para expresar la esfera de permanencia. «Esa bondad» retoma la bondad ya mencionada de Dios y evita repetir innecesariamente el posesivo, manteniendo la cohesión del pasaje.
- source_word: ἐπεὶ
  english_pob_choice: otherwise
  chosen_spanish: de otro modo
  alternatives_spanish:
  - si no
  - de otro modo
  - entonces
  lexicon: BDAG
  rationale: Aquí la partícula introduce la consecuencia negativa si no se cumple la condición. «De otro modo» reproduce bien la lógica del aviso en español actual.
- source_word: ἐκκοπήσῃ
  english_pob_choice: will be cut off
  chosen_spanish: serás cortado
  alternatives_spanish:
  - serás cortado
  - serás desgajado
  - serás quitado
  lexicon: BDAG
  rationale: El verbo significa literalmente «cortar». «Serás cortado» conserva la fuerza lexical directa del griego; no se opta por «serás desgajado» para no introducir demasiado explícitamente la imagen del olivo en el texto principal.
theological_decisions:
- issue: Advertencia condicional sobre la bondad y el juicio divinos
  english_pob_reading: 'Retained the straightforward conditional warning: God''s kindness toward the addressee is experienced if he continues in that kindness; otherwise he too will be cut off.'
  chosen_spanish_reading: 'Se mantiene una advertencia condicional directa: la bondad de Dios hacia el destinatario se experimenta si permanece en esa bondad; de otro modo, él también será cortado.'
  alternative_spanish_readings:
  - Una formulación que suavice la advertencia como mera hipótesis retórica
  - Una formulación que importe una doctrina confesional específica sobre perseverancia o apostasía
  rationale: El griego presenta una exhortación real con advertencia real, sin resolver los debates teológicos posteriores. La traducción conserva esa tensión en lugar de imponer una conclusión doctrinal ajena al texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que ajustó solo detalles de puntuación en el texto inglés; la traducción española mantiene el sentido auditado, conserva el contraste entre bondad y severidad, y ancla las alternativas léxicas en notas visibles con sus marcadores correspondientes.
  spanish_consistency_notes:
  - Se usó «bondad» para χρηστότης en coherencia con el contraste con «severidad».
  - Se evitó «SEÑOR» para θεός; se mantuvo «Dios» según el esquema terminológico del proyecto.
  - Se preservó el matiz condicional y advertencial de ἐὰν ἐπιμένῃς / ἐπεὶ καὶ σὺ ἐκκοπήσῃ sin suavizarlo doctrinalmente.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto español donde corresponden.
