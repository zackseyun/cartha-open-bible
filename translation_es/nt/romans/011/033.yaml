translation:
  language: es
  text: ¡Oh[a], la profundidad de las riquezas, de la sabiduría y del conocimiento de Dios! ¡Cuán inescrutables son sus juicios, e imposibles de rastrear[b] sus caminos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «¡Oh, la profundidad de las riquezas tanto de la sabiduría como del conocimiento de Dios!». La sintaxis griega permite una conexión más estrecha entre «riquezas» y el par siguiente, pero el texto principal toma los tres sustantivos como cualidades atribuidas a Dios.'
    reason: alternative_reading
  - marker: b
    text: «Imposibles de rastrear» intenta reproducir el matiz de un término que significa «no susceptible de ser seguido o rastreado hasta el final», distinto de «inescrutables».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ
  english_pob_choice: Oh
  chosen_spanish: ¡Oh!
  alternatives_spanish:
  - ¡O!
  lexicon: BDAG
  rationale: La partícula exclamativa introduce asombro doxológico. «¡Oh!» es natural en español moderno y conserva el tono de admiración; «¡O!» sería más solemne, pero también más arcaizante.
- source_word: βάθος
  english_pob_choice: depth
  chosen_spanish: profundidad
  alternatives_spanish:
  - hondura
  lexicon: BDAG
  rationale: El sustantivo expresa profundidad en sentido figurado. «Profundidad» es la opción más idiomática y clara en español para la grandeza insondable del tema.
- source_word: πλούτου
  english_pob_choice: riches
  chosen_spanish: riquezas
  alternatives_spanish:
  - abundancia
  - riqueza
  lexicon: BDAG
  rationale: En Pablo, πλοῦτος suele tener carga teológica de abundancia/riqueza. «Riquezas» preserva la imagen y el paralelismo con la tradición paulina, mejor que «abundancia».
- source_word: σοφίας
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  lexicon: BDAG
  rationale: Correspondencia directa con σοφία. «Sabiduría» mantiene el término distinto de «conocimiento» sin fusionarlos conceptualmente.
- source_word: γνώσεως
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  lexicon: BDAG
  rationale: γνῶσις se vierte de manera estándar como «conocimiento». En esta doxología conserva la distinción con «sabiduría».
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  lexicon: BDAG
  rationale: El genitivo modifica de manera natural los tres sustantivos anteriores. «De Dios» preserva la estructura formal y el cadencioso movimiento retórico del griego.
- source_word: ὡς
  english_pob_choice: How
  chosen_spanish: ¡Cuán!
  alternatives_spanish:
  - ¡Qué de!
  lexicon: BDAG
  rationale: En uso exclamativo, ὡς introduce la segunda mitad de la doxología. «¡Cuán!» expresa bien la admiración y funciona con naturalidad antes de un adjetivo plural.
- source_word: ἀνεξεραύνητα
  english_pob_choice: unsearchable
  chosen_spanish: inescrutables
  alternatives_spanish:
  - insondables
  - imposibles de investigar
  lexicon: BDAG
  rationale: El término significa no susceptible de ser buscado o investigado a fondo. «Inescrutables» es claro, digno y reproduce el campo semántico de algo que no puede agotarse por examen.
- source_word: κρίματα
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - decisiones
  - decretos
  lexicon: BDAG
  rationale: κρίμα puede abarcar juicio, veredicto o decisión. «Juicios» preserva la amplitud y el peso judicial sin restringirlo a «decretos».
- source_word: ἀνεξιχνίαστοι
  english_pob_choice: untraceable
  chosen_spanish: inrastreables
  alternatives_spanish:
  - insondables
  - imposibles de rastrear
  lexicon: BDAG
  rationale: El término denota lo que no puede ser rastreado o seguido hasta el final. «Inrastreables» mantiene la distinción respecto de «inescrutables», tal como la POB inglesa distingue «unsearchable» y «untraceable».
- source_word: ὁδοὶ
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - procederes
  lexicon: BDAG
  rationale: La metáfora de las «ways» como modos de obrar divinos se expresa con naturalidad como «caminos» en español bíblico contemporáneo.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: sus
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El posesivo se vierte de forma directa y mantiene la referencia a Dios sin sobrecargar la sintaxis.
theological_decisions:
- issue: Relación del genitivo «de Dios» con la tríada «riquezas, sabiduría y conocimiento»
  english_pob_reading: 'The genitive ''of God'' modifies all three nouns: riches, wisdom, and knowledge.'
  chosen_spanish_reading: '«De Dios» modifica de manera natural las tres realidades: riquezas, sabiduría y conocimiento.'
  alternative_spanish_readings:
  - «la profundidad de las riquezas, de la sabiduría y del conocimiento de Dios»
  - «la profundidad de las riquezas de Dios, y de su sabiduría y conocimiento»
  rationale: El griego admite más de una puntuación y enlace sintáctico, pero la lectura más sobria y coherente es la ascripción triple a Dios. La formulación española mantiene esa acumulación doxológica sin introducir jerarquías no explícitas.
  doctrine_reference: Translation philosophy §1, §3
- issue: Distinguir los dos adjetivos ἀνεξεραύνητα y ἀνεξιχνίαστοι
  english_pob_reading: 'Use two differentiated English renderings: ''unsearchable'' and ''untraceable''.'
  chosen_spanish_reading: 'Usar dos equivalentes diferenciados: «inescrutables» e «inrastreables».'
  alternative_spanish_readings:
  - «insondables» e «insondables»
  - «inescrutables» e «insondables»
  rationale: El griego emplea dos términos relacionados pero no idénticos. Mantener dos renderings distintos preserva la riqueza retórica del verso y evita aplanar el contraste que la POB inglesa también conservó.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios; el modelo revisor marcó acuerdo alto (1.0) y no propuso ajustes, por lo que este borrador sigue la lectura estable del texto fuente y de la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ, sin sustituirlo por una convención de máscara como «SEÑOR».
  - Se distinguió deliberadamente entre «inescrutables» y «inrastreables» para reflejar dos adjetivos griegos diferentes.
  - Se prefirió «caminos» para ὁδοὶ por ser la metáfora bíblica más natural en español.
  - El estilo mantiene tono doxológico y lectura pública, evitando paráfrasis expansivas.
