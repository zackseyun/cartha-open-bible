  text: Ὦ βάθος πλούτου καὶ σοφίας καὶ γνώσεως θεοῦ· ὡς ἀνεξεραύνητα τὰ κρίματα αὐτοῦ καὶ ἀνεξιχνίαστοι αἱ ὁδοὶ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/011/033.yaml
  text: Oh[b][a], the depth of the riches and wisdom and knowledge of God! How unsearchable are his judgments and untraceable his ways!
  footnotes:
  - marker: a
    text: Or, 'Oh, the depth of the riches both of the wisdom and knowledge of God!' The Greek syntax allows a tighter connection between 'riches' and the following pair, but the main text takes all three nouns together as qualities belonging to God.
    reason: alternative_reading
  - marker: b
    text: '''Untraceable'' renders a term meaning ''not capable of being tracked out'' or ''past tracing out,'' preserving a nuance distinct from ''unsearchable.'''
    reason: lexical_alternative
