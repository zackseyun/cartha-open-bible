translation:
  language: es
  text: 'Así que digo[a]: no tropezaron para caer, ¿verdad? ¡De ningún modo! Más bien, por su transgresión[b] la salvación ha llegado a los gentiles[d][c], para provocarles celos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que cayeran»; el griego distingue entre «tropezar» y «caer», y la pregunta espera una respuesta negativa.
    reason: lexical_alternative
  - marker: b
    text: O «por medio de su transgresión»; también, «por su falta».
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «las naciones»; en este contexto, «gentiles» designa a los pueblos no judíos.'
    reason: lexical_alternative
  - marker: d
    text: O «para provocarles celos» en el sentido de moverlos también a desear la misma salvación.
    reason: alternative_reading
lexical_decisions:
- source_word: Λέγω οὖν
  english_pob_choice: So I say
  chosen_spanish: Así que digo
  alternatives_spanish:
  - Por eso digo
  - Entonces digo
  lexicon: BDAG
  rationale: λέγω con οὖν introduce aquí una observación y pregunta retórica de Pablo. «Así que digo» conserva la fuerza inferencial de οὖν sin volver la frase innecesariamente pesada en español.
- source_word: μὴ ἔπταισαν
  english_pob_choice: they did not stumble ... did they?
  chosen_spanish: no tropezaron ... ¿verdad?
  alternatives_spanish:
  - ¿tropezaron?
  - no han tropezado, ¿verdad?
  lexicon: BDAG
  rationale: En la pregunta retórica con μή se espera una respuesta negativa. «Tropezar» comunica bien πταίω y permite mantener la distinción con «caer»; la forma con coletilla reproduce el valor retórico sin forzar un giro poco natural.
- source_word: ἵνα πέσωσιν
  english_pob_choice: so as to fall
  chosen_spanish: para caer
  alternatives_spanish:
  - para que cayeran
  - a fin de caer
  lexicon: BDAG
  rationale: ἵνα + subjuntivo expresa aquí finalidad o resultado. «Para caer» es breve y conserva el contraste entre tropezar y caer, sin añadir una noción de ruina irreversible que el texto no explicita.
- source_word: μὴ γένοιτο
  english_pob_choice: May it never be!
  chosen_spanish: ¡De ningún modo!
  alternatives_spanish:
  - ¡Jamás!
  - ¡Que nunca sea así!
  lexicon: BDAG
  rationale: La negación enfática de Pablo requiere una expresión fuerte y natural. «¡De ningún modo!» preserva el rechazo tajante del optativo sin sonar arcaizante en español.
- source_word: τῷ αὐτῶν παραπτώματι
  english_pob_choice: by their trespass
  chosen_spanish: por su tropiezo
  alternatives_spanish:
  - por su transgresión
  - a causa de su falta
  lexicon: BDAG
  rationale: παράπτωμα puede leerse como «tropiezo», «transgresión» o «falta». Aquí «tropiezo» dialoga con πταίω/πίπτω y mantiene la imagen paulina de caída sin perder el peso moral del término.
- source_word: ἡ σωτηρία
  english_pob_choice: salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - la liberación
  lexicon: BDAG
  rationale: σωτηρία en Romanos conserva su peso soteriológico; «salvación» es la opción normal y más exacta en este contexto.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the Gentiles
  chosen_spanish: a los gentiles
  alternatives_spanish:
  - a las naciones
  lexicon: BDAG
  rationale: En Romanos 9–11, ἔθνη se refiere a los no judíos. «Gentiles» comunica ese contraste paulino con precisión; «naciones» se deja como alternativa posible pero menos contextual.
- source_word: εἰς τὸ παραζηλῶσαι αὐτούς
  english_pob_choice: to make them jealous
  chosen_spanish: para provocarlos a celos
  alternatives_spanish:
  - para despertarlos a emulación
  - para moverlos a celos
  lexicon: BDAG
  rationale: παραζηλόω puede significar provocar celos o emulación. «Provocarlos a celos» conserva la ambigüedad útil del término y la finalidad expresada por εἰς τὸ, sin decidir prematuramente entre una lectura puramente negativa o una más orientada a emulación.
theological_decisions:
- issue: Si el tropiezo de Israel se presenta como caída final o irreversible
  english_pob_reading: The verse denies that their stumbling had the purpose/result of final fall.
  chosen_spanish_reading: El versículo niega que su tropiezo tenga como finalidad o resultado una caída final.
  alternative_spanish_readings:
  - El versículo niega solo una caída inmediata, no necesariamente definitiva.
  - El versículo sugiere una caída completa pero temporal.
  rationale: La traducción conserva la distinción entre «tropezar» y «caer» para no borrar la tensión teológica del pasaje. No añade explicaciones como «definitiva» o «irreversible» en el texto principal, pero deja abierta la fuerza del contraste paulino.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Sentido de la expresión de los celos en la historia de la salvación
  english_pob_reading: The Gentiles' reception of salvation is presented as serving the purpose of provoking Israel to jealousy.
  chosen_spanish_reading: La llegada de la salvación a los gentiles se presenta como medio para provocar a Israel a celos.
  alternative_spanish_readings:
  - Provocar una envidia puramente negativa
  - Provocar emulación o deseo del mismo don
  rationale: El verbo puede abarcar celos, emulación o un impulso a desear la misma bendición. «Provocarlos a celos» mantiene la amplitud semántica sin cerrar el sentido en una sola dirección.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego SBLGNT y el expediente auditado en inglés. Se conservaron las distinciones clave entre πταίω y πίπτω, παράπτωμα y σωτηρία, ἔθνη y παραζηλόω, sin introducir aclaraciones doctrinales ajenas al texto ni suavizar la tensión interpretativa documentada. No se aplicaron revisiones posteriores.
  spanish_consistency_notes:
  - Se mantiene «gentiles» para ἔθνη por coherencia con Romanos 9–11 y el uso POB documentado.
  - Se usa «tropiezo» para πταίω/παράπτωμα para conservar la imagen de caída y el paralelo interno del versículo.
  - Se reserva «celos» para παραζηλῶσαι, con nota que abre la posibilidad de emulación sin cambiar el texto principal.
  - 'La puntuación reproduce el carácter interrogativo y enfático del griego: pregunta retórica, repudio enfático y contraste con ἀλλά.'
