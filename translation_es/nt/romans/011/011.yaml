  rationale: La revisión corrige la principal falta de fidelidad léxica al reemplazar «tropiezo» por «transgresión» para παράπτωμα, preservando así el peso moral del sustantivo y la distinción con «tropezaron» (πταίω). También mejora la naturalidad del español con «provocarles celos». Se mantienen las notas esenciales y sus anclajes en orden único.
