  - severity: high
    issue: «por su tropiezo» para τῷ αὐτῶν παραπτώματι
    rationale: παράπτωμα en este contexto paulino denota una falta/transgresión, no simplemente un tropiezo físico o metafórico. Traducirlo como «tropiezo» borra la diferencia entre παράπτωμα y el verbo anterior πταίω («tropezaron»), y reduce el peso moral resaltado en la auditoría inglesa.
  - severity: medium
    issue: «para provocarlos a celos» suena menos idiomático
    rationale: Aunque comprensible, en español general resulta más natural «para provocarles celos» o «para ponerlos celosos». La primera opción conserva mejor la cercanía al griego y la ambigüedad teológica documentada.
  - severity: low
    issue: «Así que digo» puede sonar ligeramente calcado
    rationale: No es incorrecto, pero «Entonces digo» o «Por eso digo» fluyen algo mejor. Aun así, no requiere cambio obligatorio porque preserva bien la fuerza inferencial de οὖν.
