base_translation:
  language: en
  yaml_path: translation/nt/romans/011/008.yaml
  text: 'just as it is written: “God gave them a spirit of stupor[a], eyes so as not to see and ears so as not to hear, until this very day.”'
  footnotes:
  - marker: a
    text: Or “a spirit of deep sleep.” The phrase echoes Isaiah 29:10, though the Greek here uses a term meaning dullness or stupefaction.
    reason: alternative_reading
