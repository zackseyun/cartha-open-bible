translation:
  language: es
  text: 'tal como está escrito: «Dios les dio un espíritu de aturdimiento[a], ojos para no ver y oídos para no oír, hasta este mismo día».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu de profundo sueño». La frase recuerda Isaías 29:10, aunque aquí el griego emplea un término que significa embotamiento o aturdimiento.
    reason: alternative_reading
lexical_decisions:
- source_word: καθὼς γέγραπται
  english_pob_choice: just as it is written
  chosen_spanish: tal como está escrito
  alternatives_spanish:
  - como está escrito
  - así como está escrito
  lexicon: BDAG
  rationale: La fórmula introduce una cita bíblica. «Tal como» conserva el valor comparativo e intensificador de καθώς sin volver la frase pesada en español.
- source_word: Ἔδωκεν
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - ha dado
  - entregó
  lexicon: BDAG
  rationale: El aoristo narrativo en este contexto se rinde naturalmente con pasado simple en español. «Entregó» sería demasiado interpretativo.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: Coincide de manera directa con el sujeto explícito del griego.
- source_word: πνεῦμα κατανύξεως
  english_pob_choice: a spirit of stupor
  chosen_spanish: un espíritu de aturdimiento
  alternatives_spanish:
  - un espíritu de estupor
  - un espíritu de adormecimiento
  - un espíritu de sopor
  lexicon: BDAG, LSJ
  rationale: κατάνυξις expresa embotamiento, aturdimiento o insensibilidad. «Aturdimiento» comunica esa dullness en español sin depender de un término demasiado técnico; se preserva la tensión judicial del texto sin suavizarla.
- source_word: ὀφθαλμοὺς τοῦ μὴ βλέπειν
  english_pob_choice: eyes so as not to see
  chosen_spanish: ojos para no ver
  alternatives_spanish:
  - ojos que no ven
  - ojos a fin de no ver
  lexicon: BDAG
  rationale: El infinitivo con τοῦ + μή expresa finalidad/resultado. «Para no ver» reproduce bien la relación y suena natural en español, manteniendo el paralelismo bíblico.
- source_word: ὦτα τοῦ μὴ ἀκούειν
  english_pob_choice: ears so as not to hear
  chosen_spanish: oídos para no oír
  alternatives_spanish:
  - oídos que no oyen
  - oídos a fin de no oír
  lexicon: BDAG
  rationale: Se conserva el paralelismo con la frase anterior. «Oír» es más literal que «escuchar» porque ἀκούω aquí apunta a la facultad de oír.
- source_word: ἕως τῆς σήμερον ἡμέρας
  english_pob_choice: until this very day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta este mismo día
  - hasta hoy
  lexicon: BDAG
  rationale: «Hasta el día de hoy» es una equivalencia natural y solemne en español. «Este mismo día» sería más enfático, pero menos idiomático.
theological_decisions:
- issue: Agencia divina en el endurecimiento o insensibilidad judicial
  english_pob_reading: Retain the direct statement 'God gave them a spirit of stupor' without softening the subject or converting it into mere permission.
  chosen_spanish_reading: «Dios les dio un espíritu de aturdimiento» sin atenuar el sujeto ni convertirlo en simple permiso.
  alternative_spanish_readings:
  - Dios permitió que tuvieran un espíritu de aturdimiento
  - Dios los entregó a un espíritu de aturdimiento
  rationale: El griego atribuye de forma directa la acción a Dios con ἔδωκεν. La traducción conserva esa afirmación sin resolverla teológicamente, manteniendo la tensión entre juicio divino y responsabilidad humana tal como aparece en el texto.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del texto inglés, que ajustó la construcción de finalidad en «eyes so as not to see and ears so as not to hear». En español se reflejó esa precisión con «ojos para no ver y oídos para no oír», manteniendo el registro formal y la cadencia de cita bíblica.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, sin máscara de mayúsculas litúrgicas.
  - Se eligió «espíritu» en sentido de estado/impulso judicial, no como Espíritu Santo.
  - «Oídos» conserva el paralelismo bíblico y evita una paráfrasis con «escuchar».
  - La nota al pie preserva la alusión a Isaías 29:10 y la alternativa de «profundo sueño» como en el audit trail inglés.
