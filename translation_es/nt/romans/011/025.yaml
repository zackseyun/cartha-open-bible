translation:
  language: es
  text: 'Porque no quiero que desconozcan este misterio, hermanos[a], para que no se tengan por sabios en su propia opinión: un endurecimiento parcial ha venido sobre Israel hasta que haya entrado la plenitud de los gentiles[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hermanos y hermanas’; el griego dice ‘hermanos’ y puede dirigirse a un grupo mixto.
    reason: lexical_alternative
  - marker: b
    text: O ‘el número completo de los gentiles’.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγνοεῖν
  english_pob_choice: to be unaware
  chosen_spanish: ignoren
  alternatives_spanish:
  - no sepan
  - desconozcan
  - estén sin conocimiento
  lexicon: BDAG
  rationale: El giro paulino οὐ θέλω ὑμᾶς ἀγνοεῖν pide en español una negación natural de ‘estar sin saber’. ‘Ignoren’ conserva el sentido de ‘no estar informados’ sin cargar el matiz peyorativo de ‘ser ignorantes’.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: La forma griega es vocativo plural masculino; ‘hermanos’ mantiene la forma del texto fuente. En una nota se puede explicitar el posible valor inclusivo del grupo destinatario sin reemplazar la forma textual.
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  lexicon: BDAG
  rationale: En Pablo, μυστήριον designa un propósito divino antes oculto y ahora revelado. ‘Misterio’ conserva ese registro teológico mejor que ‘secreto’, que suena más privado o esotérico.
- source_word: ἵνα μὴ ἦτε ἑαυτοῖς φρόνιμοι
  english_pob_choice: so that you may not be wise in your own sight
  chosen_spanish: para que no se tengan por sabios en su propia opinión
  alternatives_spanish:
  - para que no sean sabios en sí mismos
  - para que no se crean sabios
  lexicon: BDAG
  rationale: La expresión comunica una advertencia contra la autosuficiencia o la presunción. ‘Tenerse por sabios en su propia opinión’ es idiomático en español y conserva la fuerza del reproche sin exagerar el sentido.
- source_word: πώρωσις
  english_pob_choice: hardening
  chosen_spanish: endurecimiento
  alternatives_spanish:
  - dureza
  - insensibilidad
  lexicon: BDAG
  rationale: En este contexto salvífico, πώρωσις describe una condición espiritual de endurecimiento. ‘Endurecimiento’ es la equivalencia más clara y natural en español bíblico moderno.
- source_word: ἀπὸ μέρους
  english_pob_choice: partial
  chosen_spanish: parcial
  alternatives_spanish:
  - en parte
  - parcialmente
  lexicon: BDAG
  rationale: La frase modifica el alcance del endurecimiento de Israel. ‘Parcial’ es conciso y reproduce bien la idea de extensión limitada.
- source_word: τῷ Ἰσραήλ
  english_pob_choice: upon Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - a Israel
  - para Israel
  lexicon: BDAG
  rationale: Con γέγονεν, el dativo puede expresarse como una condición que recae sobre Israel. ‘Sobre Israel’ comunica bien ese valor sin forzar una construcción menos natural.
- source_word: γέγονεν
  english_pob_choice: has come upon
  chosen_spanish: ha venido
  alternatives_spanish:
  - ha sobrevenido
  - ha llegado
  lexicon: BDAG
  rationale: El perfecto expresa un hecho pasado con efecto presente. ‘Ha venido sobre Israel’ mantiene la idea de irrupción y estado resultante, en una sintaxis fluida para el español.
- source_word: πλήρωμα
  english_pob_choice: fullness
  chosen_spanish: plenitud
  alternatives_spanish:
  - lleno número
  - totalidad
  lexicon: BDAG
  rationale: ‘Plenitud’ conserva la imagen semántica de πλήρωμα y, en este pasaje debatido, deja abierta la cuestión de si se trata del ‘número completo’, la ‘inclusión total’ o la ‘plenitud’ escatológica.
- source_word: τῶν ἐθνῶν
  english_pob_choice: of the Gentiles
  chosen_spanish: de los gentiles
  alternatives_spanish:
  - de las naciones
  lexicon: BDAG
  rationale: En contraste con Israel, ἐθνῶν se refiere a los no judíos. ‘Gentiles’ es el término más preciso en el registro paulino y preserva la oposición textual.
- source_word: εἰσέλθῃ
  english_pob_choice: has come in
  chosen_spanish: haya entrado
  alternatives_spanish:
  - entre
  - haya ingresado
  lexicon: BDAG
  rationale: Después de ἄχρι οὗ, el subjuntivo aoristo marca el límite temporal. ‘Haya entrado’ refleja bien la entrada como condición de término, con una forma natural en español.
theological_decisions:
- issue: Sentido de ‘la plenitud de los gentiles’
  english_pob_reading: Rendered as 'the fullness of the Gentiles' in the main text without specifying whether this means the full number, full inclusion, or eschatological completion.
  chosen_spanish_reading: ‘la plenitud de los gentiles’ en el texto principal, sin precisar si significa número completo, inclusión total o consumación escatológica.
  alternative_spanish_readings:
  - el número completo de los gentiles
  - la inclusión plena de los gentiles
  rationale: El pasaje admite varias lecturas teológicas legítimas. Mantener ‘plenitud’ preserva la tensión interpretativa en vez de resolverla prematuramente, y la nota puede ofrecer una alternativa común sin cerrar el sentido.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Alcance de ‘hermanos’
  english_pob_reading: Retained 'brothers' in the main text.
  chosen_spanish_reading: ‘hermanos’ en el texto principal.
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: La forma griega es masculina plural vocativa, por lo que la equivalencia formal se conserva. Dado que el auditorio romano es probablemente mixto, la nota puede aclarar el posible valor inclusivo sin sustituir la forma del original.
  doctrine_reference: Translation philosophy §4, Gender-accurate over gender-neutral.
translation_notes:
  revision_awareness: No se observaron revisiones aplicadas en el paquete de referencia; el texto inglés más reciente permanece sin cambios y el consenso de revisión es de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo ‘misterio’ para μυστήριον, no ‘secreto’, por coherencia con el registro paulino.
  - Se eligió ‘gentiles’ y no ‘naciones’ para conservar el contraste técnico con Israel.
  - Se preservó una formulación idiomática de ‘estar/tenerse por sabios’ para φρόνιμοι, evitando un calco rígido.
  - ‘Endurecimiento parcial’ refleja ἀπὸ μέρους con el valor de alcance limitado, no de duración.
  - La puntuación con dos puntos después de ‘propia opinión’ sigue la lectura explicativa del griego con ὅτι.
