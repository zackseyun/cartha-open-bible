review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la prohibición de jactarse sobre/contra las ramas, mantiene la metáfora de ramas y raíz, y conserva el contraste enfático entre 'tú' y 'la raíz'. Sin embargo, la cláusula final 'sino la raíz a ti' es gramaticalmente incompleta en español y no expresa con claridad el verbo implícito en la elipsis contrastiva del griego, que el inglés POB hizo explícito con 'supports'.
  spanish_quality_summary: El español es generalmente claro y digno, pero la segunda mitad de la oración suena truncada y poco natural. 'No eres tú quien sostiene la raíz, sino la raíz te sostiene a ti' preserva mejor el énfasis, la legibilidad y la relación metafórica de dependencia. La nota b también debe ajustarse para que el alternativo sea español idiomático.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Jactes', 'ramas', 'raíz' y 'sostiene' concuerdan bien con las decisiones léxicas auditadas. La excepción necesaria es completar en español el verbo de la segunda cláusula para evitar una calca defectuosa de la elipsis griega.
  issues:
  - severity: medium
    issue: La frase 'sino la raíz a ti' es antinatural e incompleta en español.
    rationale: Aunque el griego puede omitir el verbo por contraste, el español aquí requiere repetirlo o reformularlo para que la relación predicativa sea clara. Tal como está, dificulta la lectura y debilita el sentido de 'la raíz te sostiene'.
  - severity: low
    issue: La nota alternativa b repite la misma falta de naturalidad.
    rationale: '''No sostienes tú a la raíz, sino la raíz a ti'' no es una alternativa española bien formada. Debe decir ''sino la raíz te sostiene a ti'' o ''sino la raíz te lleva/sustenta a ti'', según la opción elegida.'
  revised_spanish_text: No te jactes[a] de las ramas. Pero si te jactas, no eres tú quien sostiene la raíz[b], sino la raíz te sostiene a ti.
  revised_footnotes:
