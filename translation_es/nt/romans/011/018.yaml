revisions:
- from: No te jactes[a] de las ramas. Pero si te jactas, no eres tú quien sostiene la raíz[b], sino la raíz a ti.
  to: No te jactes[a] de las ramas. Pero si te jactas, no eres tú quien sostiene la raíz[b], sino la raíz te sostiene a ti.
  rationale: Se mantiene la elección principal 'jactes' y la metáfora 'ramas/raíz', pero se corrige la segunda cláusula para hacer explícito en español el verbo elidido por el griego y así preservar con claridad el contraste enfático y la dependencia metafórica. También se ajusta la nota b para que la alternativa sea idiomática y fiel.
