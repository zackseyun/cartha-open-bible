translation:
  language: es
  text: No te jactes[a] de las ramas. Pero si te jactas, no eres tú quien sostiene la raíz[b], sino la raíz te sostiene a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te jactes contra las ramas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no sostienes tú a la raíz, sino la raíz te sostiene a ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ κατακαυχῶ / κατακαυχᾶσαι
  english_pob_choice: do not boast over / do boast
  chosen_spanish: No te jactes / si te jactas
  alternatives_spanish:
  - No te gloríes
  - No te vanaglories
  - No te jactes contra
  lexicon: BDAG
  rationale: κατακαυχάομαι expresa jactancia con sentido de superioridad sobre otro. 'Jactarse' comunica bien esa presunción en español, y la nota permite conservar la alternativa 'contra' porque el griego admite tanto la idea de superioridad sobre como de oposición contra las ramas.
- source_word: κλάδων
  english_pob_choice: the branches
  chosen_spanish: las ramas
  alternatives_spanish:
  - los brotes
  - las ramas específicas
  lexicon: BDAG
  rationale: '''Ramas'' es el equivalente natural y transparente para κλάδων en la imagen del olivo. Se mantiene el artículo porque Pablo alude a las ramas concretas del contexto inmediato.'
- source_word: ῥίζαν / ῥίζα
  english_pob_choice: the root
  chosen_spanish: la raíz
  alternatives_spanish:
  - el origen
  - la base
  lexicon: BDAG
  rationale: Se conserva el sustantivo físico-metafórico 'raíz' para mantener la imagen de sustento y procedencia. Traducirlo por 'origen' explicaría demasiado y debilitaría la metáfora.
- source_word: βαστάζεις
  english_pob_choice: support
  chosen_spanish: sostiene
  alternatives_spanish:
  - soporta
  - lleva
  - sustenta
  lexicon: BDAG
  rationale: En este contexto el verbo no significa simplemente 'cargar', sino mantener en pie o dar apoyo. 'Sostener' reproduce la relación de dependencia sin sonar forzado en español.
- source_word: οὐ σὺ ... ἀλλὰ ἡ ῥίζα σέ
  english_pob_choice: it is not you who support the root, but the root supports you
  chosen_spanish: no eres tú quien sostiene la raíz, sino la raíz a ti
  alternatives_spanish:
  - no sostienes tú a la raíz, sino la raíz a ti
  - no eres tú quien lleva la raíz, sino la raíz a ti
  lexicon: BDAG
  rationale: La construcción enfatiza el contraste entre 'tú' y 'la raíz'. El orden español mantiene esa inversión y deja visible la fuerza enfática del original sin introducir explicación interpretativa.
- source_word: μὴ
  english_pob_choice: do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No vayas a
  - No debes
  lexicon: BDAG
  rationale: La prohibición con presente imperativo se expresa de manera directa y natural con 'No te jactes', que conserva el tono exhortativo inmediato del griego.
theological_decisions:
- issue: Metáfora de raíz y ramas en la imagen del olivo
  english_pob_reading: Retain the metaphor plainly without explicating the identity of the root or branches in the main text.
  chosen_spanish_reading: Mantener la metáfora sin identificar en el texto principal qué representa exactamente la raíz.
  alternative_spanish_readings:
  - Explicar la raíz como los patriarcas
  - Explicar la raíz como Abraham
  - Explicar la raíz como las promesas del pacto
  rationale: El griego presenta la imagen sin glosa interpretativa. La traducción española debe conservar esa apertura teológica y no convertir en paráfrasis lo que el texto no explicita.
  doctrine_reference: 'Principio de fidelidad textual: preservar la tensión metafórica sin resolverla en la traducción.'
translation_notes:
  revision_awareness: El pasaje coincide con el último pase revisado y no requiere cambios sustanciales; se conserva la solución de equivalencia óptima y la misma oposición enfática entre sujeto y soporte metafórico.
  spanish_consistency_notes:
  - Se usa 'raíz' y 'ramas' de manera uniforme para mantener la metáfora del olivo.
  - Se prefiere 'jactes' sobre 'gloríes' para reflejar mejor la connotación de superioridad implícita en κατακαυχάομαι.
  - La inversión 'sino la raíz a ti' preserva el contraste enfático del griego y suena natural en español bíblico contemporáneo.
