translation:
  language: es
  text: Y aún ellos[a], si no permanecen en la incredulidad, serán injertados[b]; porque Dios es capaz de injertarlos de nuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si no permanecen en la infidelidad».'
    reason: alternative_reading
  - marker: b
    text: 'O: «injertarlos otra vez». El griego dice explícitamente «de nuevo» en la segunda cláusula.'
    reason: alternative_reading
lexical_decisions:
- source_word: κἀκεῖνοι
  english_pob_choice: even they
  chosen_spanish: Y aun ellos
  alternatives_spanish:
  - ellos también
  - aun ellos
  lexicon: BDAG
  rationale: El griego añade fuerza inclusiva con καί y retoma a los referidos previamente. «Y aun ellos» conserva el valor aditivo y el matiz de sorpresa/inclusión mejor que una simple repetición de «ellos también».
- source_word: ἐὰν μὴ ἐπιμένωσι
  english_pob_choice: if they do not continue
  chosen_spanish: si no permanecen
  alternatives_spanish:
  - si no continúan
  - si no persisten
  lexicon: BDAG
  rationale: ἐπιμένω expresa seguir en un estado; en español, «permanecer» comunica bien la continuidad durativa sin sonar forzado. Se evita «continuar» por resultar menos natural con la frase siguiente.
- source_word: τῇ ἀπιστίᾳ
  english_pob_choice: in unbelief
  chosen_spanish: en la incredulidad
  alternatives_spanish:
  - en la falta de fe
  - en la desconfianza
  lexicon: BDAG
  rationale: En Romanos 11 el contraste inmediato es creer/no creer. «Incredulidad» preserva ese valor principal mejor que «infidelidad» o «deslealtad», que ampliarían el sentido más allá del contexto inmediato.
- source_word: ἐγκεντρισθήσονται
  english_pob_choice: will be grafted in
  chosen_spanish: serán injertados
  alternatives_spanish:
  - serán injertados de nuevo
  - serán reenxertados
  lexicon: BDAG
  rationale: La metáfora agrícola pide «injertados». No se añade «de nuevo» en esta primera ocurrencia porque en el griego esa idea aparece explícitamente en la segunda cláusula con πάλιν.
- source_word: δυνατὸς
  english_pob_choice: able
  chosen_spanish: es capaz
  alternatives_spanish:
  - puede
  - tiene poder para
  lexicon: BDAG
  rationale: «Es capaz» reproduce de manera natural la construcción predicativa y el énfasis en la capacidad de Dios sin recargar el verso.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: πάλιν marca repetición/restauración. «De nuevo» es claro, sobrio y mantiene la referencia explícita a la reincorporación que el griego coloca en la segunda cláusula.
- source_word: ἐγκεντρίσαι
  english_pob_choice: to graft them in
  chosen_spanish: injertarlos
  alternatives_spanish:
  - injertarlos de nuevo
  - volver a injertarlos
  lexicon: BDAG
  rationale: Se mantiene el mismo verbo-metáfora que en la primera cláusula para conservar cohesión léxica. El matiz restaurativo queda ya expresado por πάλιν («de nuevo»).
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: BDAG
  rationale: Traducción directa y natural del sujeto explícito; no requiere expansión.
theological_decisions:
- issue: Sentido de ἀπιστία
  english_pob_reading: Rendered as 'unbelief' referring to refusal to believe, especially in Paul's olive-tree argument about Israel.
  chosen_spanish_reading: Se traduce como «incredulidad», entendida como negativa a creer.
  alternative_spanish_readings:
  - infidelidad
  - falta de fe
  rationale: En este contexto paulino la oposición es entre creer y no creer. «Incredulidad» conserva ese contraste sin introducir una categoría más amplia de deslealtad que el verso no explicita.
  doctrine_reference: Mantener la tensión léxica del texto sin resolverla por paráfrasis doctrinal.
- issue: Ubicación del matiz de restauración
  english_pob_reading: Kept 'will be grafted in' in the first clause and expressed restoration with 'again' in the second clause.
  chosen_spanish_reading: Se mantiene «serán injertados» en la primera cláusula y se expresa la restauración con «de nuevo» en la segunda.
  alternative_spanish_readings:
  - serán injertados de nuevo
  - volverán a ser injertados
  rationale: El griego sitúa πάλιν solo en la segunda cláusula. No conviene trasladar anticipadamente la idea de retorno a la primera, para respetar la distribución de sentido del original.
  doctrine_reference: Primacía del texto fuente y respeto por las marcas explícitas del griego.
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se detectaron cambios necesarios respecto del control más reciente; la redacción mantiene la distinción griega entre ἐγκεντρισθήσονται y ἐγκεντρίσαι con πάλιν reservado a la segunda cláusula.'
  spanish_consistency_notes:
  - Se conserva la metáfora agrícola de injertar de forma uniforme en ambos miembros de la oración.
  - Se usa «Dios» sin artículo para concordar con el sujeto explícito del griego.
  - Se mantiene un registro bíblico contemporáneo y claro, sin caer en formulaciones eclesiásticas arcaizantes.
  - La nota a diferencia «incredulidad/infidelidad» preserva la tensión léxica documentada por el audit trail en lugar de resolverla unilateralmente.
