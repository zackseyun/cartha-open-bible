translation:
  language: es
  text: Ahora bien, si su transgresión resulta en riqueza para el mundo, y su pérdida[a] en riqueza para los gentiles, ¡cuánto más su plenitud[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su derrota' o 'su disminución' para 'su pérdida'.
    reason: lexical_alternative
  - marker: b
    text: O 'su número completo' o 'su plena inclusión' para 'su plenitud'.
    reason: alternative_reading
lexical_decisions:
- source_word: παράπτωμα
  english_pob_choice: trespass
  chosen_spanish: tropiezo
  alternatives_spanish:
  - trasgresión
  - falta
  - pecado
  lexicon: BDAG
  rationale: παράπτωμα puede referirse a una caída en falta o un desvío moral. 'Tropiezo' conserva la imagen de una caída/desvío y funciona bien en español sin endurecer el matiz más de lo que exige el contexto. Evita también sonar más técnico o jurídico que el griego en esta frase compacta.
- source_word: πλοῦτος
  english_pob_choice: riches
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  - abundancia
  lexicon: BDAG
  rationale: El griego usa un sustantivo singular con sentido figurado. 'Riqueza' reproduce bien la metáfora en español y se ajusta al paralelismo de la oración; 'riquezas' sonaría menos preciso aquí.
- source_word: κόσμου
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la humanidad
  - el orden del mundo
  lexicon: BDAG
  rationale: κόσμος aquí designa de forma amplia al mundo beneficiado por la caída de Israel. 'El mundo' es la equivalencia más natural y suficientemente amplia en español.
- source_word: ἥττημα
  english_pob_choice: loss
  chosen_spanish: pérdida
  alternatives_spanish:
  - derrota
  - detrimento
  - disminución
  lexicon: BDAG
  rationale: ἥττημα es raro y puede sugerir pérdida, derrota o disminución. 'Pérdida' conserva la ambigüedad útil del griego y encaja con el paralelismo; las otras opciones quedan abiertas como matices posibles.
- source_word: ἐθνῶν
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  lexicon: BDAG
  rationale: En Romanos, ἔθνη contrasta regularmente con Israel y suele equivaler a 'gentiles'. Aunque 'naciones' es más literal, 'los gentiles' preserva mejor el contraste paulino para el lector hispano.
- source_word: πόσῳ μᾶλλον
  english_pob_choice: how much more
  chosen_spanish: ¡cuánto más!
  alternatives_spanish:
  - cuánto mayor será
  - con cuánta más razón
  lexicon: BDAG
  rationale: La expresión es un idiomático argumento a fortiori. '¡Cuánto más!' es la forma natural y concisa en español, y transmite el salto lógico retórico del griego.
- source_word: πλήρωμα
  english_pob_choice: fullness
  chosen_spanish: plenitud
  alternatives_spanish:
  - pleno número
  - plena inclusión
  - cumplimiento
  lexicon: BDAG
  rationale: πλήρωμα puede significar plenitud, número completo o plena inclusión. 'Plenitud' preserva la amplitud semántica sin resolver la discusión interpretativa, y suena más natural y solemne en español que un giro demasiado explicativo.
theological_decisions:
- issue: Alcance de 'su plenitud' (τὸ πλήρωμα αὐτῶν)
  english_pob_reading: Render broadly as 'their fullness' without specifying whether this means Israel's full number, full inclusion, or eschatological restoration.
  chosen_spanish_reading: Traducir como 'su plenitud' sin precisar si se trata del número completo, la inclusión plena o la restauración escatológica de Israel.
  alternative_spanish_readings:
  - su pleno número
  - su plena inclusión
  - su restauración
  rationale: La frase griega es compacta y deliberadamente abierta. Mantener 'plenitud' en el texto principal preserva la tensión teológica y evita cerrar una cuestión debatida que el versículo no resuelve explícitamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: The English POB latest revision pass reported no changes needed; the Spanish draft follows that stable reading and preserves the documented lexical/theological openness, especially for ἥττημα and πλήρωμα.
  spanish_consistency_notes:
  - Se mantiene 'gentiles' para ἐθνῶν, coherente con el contraste paulino en Romanos.
  - Se usa 'plenitud' para πλήρωμα para conservar la amplitud semántica y evitar una decisión interpretativa prematura.
  - Se emplea puntuación española con coma después de 'Ahora bien' y exclamación final para reflejar el tono retórico del argumento a fortiori.
