translation:
  language: es
  text: Su garganta es un sepulcro[a] abierto; con sus lenguas engañan[b]; el veneno de víboras[c] está debajo de sus labios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tumba». «Sepulcro» conserva el matiz funerario y la imagen de muerte activa del griego.
    reason: lexical_alternative
  - marker: b
    text: O «están engañando», preservando más explícitamente el valor durativo del imperfecto griego.
    reason: lexical_alternative
  - marker: c
    text: O «veneno de áspides»; el griego ἀσπίδων puede entenderse de manera más específica como «áspides», pero «víboras» es más claro para el español moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: τάφος
  english_pob_choice: grave
  chosen_spanish: sepulcro
  alternatives_spanish:
  - tumba
  - gruta funeraria
  lexicon: BDAG
  rationale: El griego presenta una imagen de muerte y corrupción. «Sepulcro» conserva el campo funerario con un tono natural y digno en español; «tumba» también es posible, pero puede sonar más a monumento funerario que a imagen de descomposición viva en el contexto metafórico.
- source_word: ἀνεῳγμένος
  english_pob_choice: open
  chosen_spanish: abierto
  alternatives_spanish:
  - que está abierto
  - habiéndose abierto
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo expresa un estado resultante: algo abierto y permaneciendo así. «Abierto» reproduce bien ese valor en español sin volver la frase pesada.'
- source_word: λάρυγξ
  english_pob_choice: throat
  chosen_spanish: garganta
  alternatives_spanish:
  - garguero
  - garganta interior
  lexicon: BDAG
  rationale: En este contexto metafórico, «garganta» es la equivalencia clara y natural en español. Mantiene la referencia anatómica y la fuerza visual del dicho.
- source_word: ἐδολιοῦσαν
  english_pob_choice: they deceive
  chosen_spanish: engañan
  alternatives_spanish:
  - están engañando
  - usaban engaño
  - engañaban
  lexicon: BDAG
  rationale: El imperfecto griego indica acción continua o habitual. En un reproche proverbial, «engañan» comunica esa conducta caracterizada sin sobrecargar la frase; la nota preserva la alternativa más durativa.
- source_word: ἰὸς
  english_pob_choice: venom
  chosen_spanish: veneno
  alternatives_spanish:
  - ponzoña
  - veneno mortal
  lexicon: BDAG
  rationale: Aunque el inglés moderno prefirió «venom» por precisión zoológica, en español «veneno» es el término natural y preciso en esta imagen de serpientes. «Ponzoña» sería posible, pero suena más arcaico o regional.
- source_word: ἀσπίδων
  english_pob_choice: asps
  chosen_spanish: víboras
  alternatives_spanish:
  - áspides
  - serpientes
  - aspides
  lexicon: BDAG
  rationale: «Áspides» es más literal, pero poco transparente para lectores modernos. Dado que el audit trail inglés admite términos más generales, «víboras» conserva la referencia serpentina y la carga amenazante en español contemporáneo.
- source_word: ὑπὸ τὰ χείλη αὐτῶν
  english_pob_choice: under their lips
  chosen_spanish: debajo de sus labios
  alternatives_spanish:
  - bajo sus labios
  - bajo los labios de ellos
  lexicon: BDAG
  rationale: La frase preposicional se vierte de modo directo para retener la imagen corporal concreta del original. «Debajo de sus labios» es idiomático y visual en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego SBLGNT y respeta el audit trail inglés: se mantiene la imagen de un órgano humano como sepulcro abierto, la acción habitual de engañar con la lengua y la metáfora serpentina del veneno bajo los labios. No se introdujeron cambios doctrinales ni se suavizó la fuerza de la denuncia.'
  spanish_consistency_notes:
  - Se usó «sepulcro» para mantener el campo funerario con naturalidad en español.
  - Se prefirió la forma verbal simple «engañan» para una acusación proverbial, con nota sobre el imperfecto griego.
  - Se eligió «víboras» en vez de «áspides» para legibilidad, dejando constancia de la alternativa más literal.
  - 'Se mantuvo el paralelismo de imágenes corporales del original: garganta, lengua y labios.'
