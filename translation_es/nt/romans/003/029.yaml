translation:
  language: es
  text: ¿O es Dios el Dios solo de los judíos? ¿No es también el Dios de los gentiles? Sí[a], también de los gentiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las naciones», una traducción más literal de ἐθνῶν.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O es... ?
  alternatives_spanish:
  - ¿O acaso es... ?
  - ¿Es... o...?
  lexicon: BDAG
  rationale: La partícula introduce una alternativa retórica en el argumento de Pablo. En español, «¿O es...?» conserva bien la fuerza disyuntiva sin añadir explicaciones que el griego no exige.
- source_word: Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judíos y no otros
  - el pueblo judío
  lexicon: BDAG
  rationale: El genitivo depende de «Dios» y se vierte naturalmente como «de los judíos». «Los judíos» mantiene el contraste paulino con los gentiles y evita suavizar el referente étnico.
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: BDAG
  rationale: La traducción estándar de θεός es «Dios». Se repite en la segunda cláusula para conservar la claridad del paralelo retórico en español.
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: solamente
  alternatives_spanish:
  - solo
  - únicamente
  lexicon: BDAG
  rationale: Expresa la exclusividad en la pregunta. En español, «solamente» mantiene el tono directo y natural de la restricción implícita en μόνον.
- source_word: οὐχὶ
  english_pob_choice: Is he not also
  chosen_spanish: ¿No es también... ?
  alternatives_spanish:
  - ¿Acaso no es también... ?
  - ¿No es asimismo... ?
  lexicon: BDAG
  rationale: οὐχί formula una pregunta que espera respuesta afirmativa. «¿No es también...?» preserva esa expectativa sin perder la forma interrogativa.
- source_word: ἐθνῶν
  english_pob_choice: the Gentiles
  chosen_spanish: de los gentiles
  alternatives_spanish:
  - de las naciones
  lexicon: BDAG
  rationale: En el contraste judíos/gentiles, ἔθνη se refiere a los no judíos. «Gentiles» es la opción más precisa para el argumento paulino; «naciones» queda como alternativa más literal pero menos explícita.
- source_word: ναὶ
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Claro que sí
  - En efecto
  lexicon: BDAG
  rationale: Una afirmación breve responde al intercambio retórico de modo natural en español y conserva la contundencia del original.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: BDAG
  rationale: «También» reproduce la adición inclusiva de καί, subrayando que los gentiles quedan comprendidos junto con los judíos.
theological_decisions:
- issue: Cómo traducir ἐθνῶν en el marco judíos/gentiles
  english_pob_reading: Gentiles rather than nations, because the verse contrasts Jews with non-Jews.
  chosen_spanish_reading: gentiles, no «naciones» en sentido político o geográfico.
  alternative_spanish_readings:
  - naciones
  - pueblos
  rationale: El contexto inmediato es la contraposición étnico-teológica entre judíos y no judíos. «Gentiles» preserva esa distinción paulina y evita una lectura más abstracta o estatal de ἔθνη.
  doctrine_reference: Maintain context-sensitive lexical precision; preserve theological tension rather than flattening it.
translation_notes:
  revision_awareness: El texto coincide con el sentido y la estructura retórica del griego SBLGNT y con el audit trail inglés; no se documentan revisiones que obliguen a un cambio adicional.
  spanish_consistency_notes:
  - Se mantiene «gentiles» de manera consistente para ἔθνη en este contexto.
  - Se conserva el paralelismo interrogativo-responsivo del griego con una formulación natural en español.
  - La repetición de «de los gentiles» en la respuesta imita el énfasis del original sin forzar el español.
