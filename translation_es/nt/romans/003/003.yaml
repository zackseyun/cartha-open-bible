translation:
  language: es
  text: ¿Qué, entonces? Si algunos fueron infieles, ¿su infidelidad anulará la fidelidad de Dios[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fe de Dios». La frase griega dice literalmente «la fe de Dios», pero aquí probablemente significa la fidelidad de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί γάρ
  english_pob_choice: What then?
  chosen_spanish: ¿Entonces qué?
  alternatives_spanish:
  - ¿Qué entonces?
  - ¿Qué, pues?
  lexicon: BDAG
  rationale: La expresión funciona como marcador discursivo de transición argumentativa. En español, «¿Entonces qué?» conserva el giro retórico breve y natural sin añadir contenido que el griego no expresa.
- source_word: ἠπίστησάν
  english_pob_choice: were unfaithful
  chosen_spanish: fueron infieles
  alternatives_spanish:
  - no creyeron
  - fueron incrédulos
  lexicon: BDAG
  rationale: El contexto inmediato contrapone ἀπιστία humana con la πίστις de Dios, de modo que «infieles» preserva mejor la relación de fidelidad/infidelidad que una simple idea de incredulidad.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - unos
  lexicon: BDAG
  rationale: Es un indefinido plural no marcado; «algunos» es el equivalente más natural y directo en español.
- source_word: ἀπιστία
  english_pob_choice: unfaithfulness
  chosen_spanish: infidelidad
  alternatives_spanish:
  - incredulidad
  lexicon: BDAG
  rationale: Se mantiene la simetría léxica con ἠπίστησάν. «Infidelidad» conserva la tensión del contraste con la fidelidad divina y evita resolver el matiz hacia mera falta de creencia.
- source_word: πίστιν τοῦ θεοῦ
  english_pob_choice: God's faithfulness
  chosen_spanish: la fidelidad de Dios
  alternatives_spanish:
  - la fe de Dios
  - la fidelidad que Dios muestra
  lexicon: BDAG
  rationale: Aunque πίστις puede traducirse por «fe», aquí el contraste con la infidelidad humana favorece el sentido de fidelidad/reliabilidad divina. «Fidelidad de Dios» refleja mejor la relación semántica y la lectura auditada del POB en inglés.
- source_word: καταργήσει
  english_pob_choice: nullify
  chosen_spanish: anulará
  alternatives_spanish:
  - invalidará
  - dejará sin efecto
  lexicon: BDAG
  rationale: «Anulará» comunica bien la idea de hacer ineficaz o sin efecto, con un registro claro y bíblicamente comprensible en español.
theological_decisions:
- issue: Sentido de πίστιν τοῦ θεοῦ en Romanos 3:3
  english_pob_reading: God's faithfulness
  chosen_spanish_reading: la fidelidad de Dios
  alternative_spanish_readings:
  - la fe de Dios
  - la fidelidad que Dios muestra
  rationale: La gramática permitiría «la fe de Dios», pero el paralelismo con la infidelidad humana y el audit trail en inglés señalan que el sentido dominante es la fidelidad/reliabilidad divina. Traducirlo así preserva la tensión teológica sin volverla ambigua para el lector español.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica; documentar alternativas donde πίστις sea discutida.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el análisis auditado en inglés y con la revisión más reciente: no se requirieron cambios respecto de la solución ya validada. La versión española sigue la misma decisión contextual para πίστις τοῦ θεοῦ, documentando la alternativa literal.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre ἠπίστησάν/ἀπιστία mediante «infieles/infidelidad».
  - Se evitó «SEÑOR» y otras sustituciones no presentes en el texto.
  - La nota al pie conserva la alternativa literal de la frase griega sin imponerla en el texto principal.
  - El tono es formal y publicable, con puntuación interrogativa española estándar.
