translation:
  language: es
  text: Porque concluimos que una persona[b] es justificada[a] por la fe, aparte de las obras de la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es declarada justa».
    reason: lexical_alternative
  - marker: b
    text: O «un hombre»; el término griego es gramaticalmente masculino, pero aquí se usa en sentido genérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: λογιζόμεθα
  english_pob_choice: we conclude
  chosen_spanish: concluimos
  alternatives_spanish:
  - consideramos
  - razonamos
  lexicon: BDAG
  rationale: El verbo expresa aquí una conclusión razonada en el flujo argumentativo de Pablo. «Concluimos» comunica bien ese juicio inferido sin sonar forzado en español.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula introduce la base explicativa de la afirmación anterior. «Porque» mantiene la relación lógica causal/explicativa de manera natural en español.
- source_word: δικαιοῦσθαι
  english_pob_choice: is justified
  chosen_spanish: es justificada
  alternatives_spanish:
  - es declarada justa
  - es absuelta
  lexicon: BDAG
  rationale: Se conserva el término paulino establecido «justificada» para mantener continuidad teológica y formal. La alternativa explicativa «es declarada justa» queda preservada en nota como opción de aclaración.
- source_word: πίστει
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - mediante la fe
  - a través de la fe
  lexicon: BDAG
  rationale: «Por la fe» expresa con naturalidad el valor instrumental de πίστει y coincide con el uso paulino clásico en español.
- source_word: ἄνθρωπον
  english_pob_choice: a person
  chosen_spanish: una persona[a]
  alternatives_spanish:
  - un hombre
  - un ser humano
  lexicon: BDAG
  rationale: Aunque la forma griega es masculina, el sentido es genérico. «Una persona» comunica el referente inclusivo sin perder el valor representativo del término.
- source_word: χωρὶς
  english_pob_choice: apart from
  chosen_spanish: aparte de
  alternatives_spanish:
  - sin
  - separada de
  lexicon: BDAG
  rationale: «Aparte de» conserva la idea de exclusión/separación entre la justificación por fe y las obras de la ley, con una construcción natural en español.
- source_word: ἔργων νόμου
  english_pob_choice: works of the law
  chosen_spanish: las obras de la ley
  alternatives_spanish:
  - las obras de la Ley
  - las obras requeridas por la ley
  lexicon: BDAG
  rationale: Se mantiene la expresión paulina técnica «las obras de la ley», que preserva la conexión formal con νόμος y evita reducirla a meras buenas acciones.
theological_decisions:
- issue: Sentido de δικαιοῦσθαι en Romanos 3:28
  english_pob_reading: is justified
  chosen_spanish_reading: es justificada
  alternative_spanish_readings:
  - es declarada justa
  - es absuelta
  rationale: La línea principal conserva la formulación forense tradicional sin resolver de antemano la tensión entre declaración y justicia conferida. La alternativa explicativa se ofrece en nota para hacer explícito el matiz sin desplazar el texto principal.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Valor genérico de ἄνθρωπον
  english_pob_reading: a person
  chosen_spanish_reading: una persona
  alternative_spanish_readings:
  - un hombre
  - un ser humano
  rationale: El griego usa una forma masculina con sentido genérico. En español, «una persona» refleja mejor el referente universal y evita sugerir un varón específico.
  doctrine_reference: Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente griego y el criterio auditado de la POB en inglés. Se mantiene la expresión paulina técnica «justificada» en el cuerpo principal, mientras que la alternativa explicativa de δικαιοῦσθαι se conserva en nota. La masculinidad gramatical de ἄνθρωπον se resuelve de manera genérica con «una persona», coherente con el uso representativo del término en este contexto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no lo requiere.
  - «Justificada» preserva la terminología paulina habitual; la nota evita borrar la tensión entre justificación declarativa y forense.
  - «Las obras de la ley» conserva la expresión técnica sin ampliarla a una paráfrasis interpretativa.
  - La puntuación y el orden reflejan el vínculo explicativo de γάρ con la frase anterior.
