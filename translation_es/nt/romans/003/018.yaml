translation:
  language: es
  text: No hay temor de Dios[a] delante de sus ojos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hay reverencia por Dios delante de sus ojos.»'
    reason: lexical_alternative
  - marker: b
    text: Citado de Salmo 36:1 (LXX 35:2).
    reason: cross_reference
lexical_decisions:
- source_word: οὐκ ἔστιν
  english_pob_choice: There is no
  chosen_spanish: No hay
  alternatives_spanish:
  - no existe
  - no se encuentra
  lexicon: BDAG
  rationale: La construcción existencial negativa es la forma más natural en español y conserva el valor de negación absoluta del verbo presente, sin añadir matices innecesarios.
- source_word: φόβος
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - reverencia
  lexicon: BDAG
  rationale: En español bíblico, «temor de Dios» es una expresión estable y precisa; conserva el sentido básico de φόβος y permite la tensión entre temor y reverencia sin resolverla en exceso en el texto principal.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - para Dios
  - hacia Dios
  lexicon: BDAG
  rationale: El genitivo se expresa de manera directa con «de Dios», manteniendo la formulación idiomática de la frase y dejando clara la relación del temor con Dios.
- source_word: ἀπέναντι
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: «Delante de» comunica bien la imagen espacial de estar expuesto a la vista, con un registro natural en español y cercano al valor metafórico del griego.
- source_word: τῶν ὀφθαλμῶν αὐτῶν
  english_pob_choice: their eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - su vista
  - sus ojos mismos
  lexicon: BDAG
  rationale: Se conserva la imagen concreta de «ojos», porque el griego usa el sustantivo físico y el POB inglés también retuvo esa concreción. En español, «sus ojos» mantiene la fuerza idiomática sin volverla abstracta.
theological_decisions:
- issue: φόβος θεοῦ como temor o reverencia
  english_pob_reading: There is no fear of God before their eyes. Or “There is no reverence for God before their eyes.”
  chosen_spanish_reading: No hay temor de Dios delante de sus ojos.
  alternative_spanish_readings:
  - No hay reverencia por Dios delante de sus ojos.
  rationale: El texto principal conserva «temor», que es la primera correspondencia léxica y la formulación bíblica más directa. Como en el POB inglés, se deja abierta la posibilidad de «reverencia» en una nota, sin borrar la ambigüedad semántica del término griego.
  doctrine_reference: Salmo 36:1; Romanos 3:18
- issue: Cita implícita de un salmo en la formulación paulina
  english_pob_reading: Quoted from Psalm 36:1 (LXX 35:2).
  chosen_spanish_reading: La frase se entiende como cita de Salmo 36:1 (LXX 35:2).
  alternative_spanish_readings:
  - Alusión a Salmo 36:1 (LXX 35:2).
  rationale: Conviene conservar en la nota la relación intertextual documentada por el POB inglés, porque la expresión paulina reproduce una línea salmódica reconocible y eso ayuda a la trazabilidad exegética.
  doctrine_reference: Salmo 36:1 (LXX 35:2); Romanos 3:18
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones aplicadas y el control más reciente indica que no hubo cambios necesarios; por eso la redacción española sigue de cerca la decisión léxica principal, preservando la alternativa semántica en nota sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantuvo la expresión bíblica estable «temor de Dios» para reflejar φόβος θεοῦ sin reemplazarla por una paráfrasis más explicativa en el texto principal.
  - «Delante de sus ojos» conserva la imagen concreta del griego y evita abstraerla a «en su presencia», que sería posible pero menos cercana al paralelismo tradicional.
  - La nota de cita se formula de manera breve y verificable, siguiendo la práctica auditada del POB inglés.
