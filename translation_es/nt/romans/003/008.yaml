translation:
  language: es
  text: ¿Y por qué no decir —como se nos calumnia y como algunos dicen que decimos— «Hagamos el mal para que venga el bien»? La condena de ellos es justa[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿Y no —como se nos calumnia y como algunos dicen que decimos— “Hagamos el mal para que venga el bien”?»'
    reason: lexical_alternative
  - marker: b
    text: «La condena de ellos» se refiere a quienes hacen esta acusación o respaldan este razonamiento.
    reason: alternative_reading
lexical_decisions:
- source_word: βλασφημούμεθα
  english_pob_choice: are slandered
  chosen_spanish: se nos calumnia
  alternatives_spanish:
  - somos calumniados
  - se nos difama
  - se nos blasfema
  lexicon: BDAG
  rationale: En este contexto el verbo describe una acusación hostil y falsa contra la enseñanza apostólica; en español, «se nos calumnia» comunica con naturalidad la idea de difamación injusta sin arrastrar necesariamente el sentido más teológico de «blasfemar».
- source_word: φασίν τινες
  english_pob_choice: some claim
  chosen_spanish: algunos dicen
  alternatives_spanish:
  - algunos afirman
  - algunos sostienen
  lexicon: BDAG
  rationale: La expresión introduce un reporte atribuido a ciertos interlocutores; «algunos dicen» conserva esa atribución de manera clara y directa.
- source_word: λέγειν
  english_pob_choice: that we say
  chosen_spanish: que decimos
  alternatives_spanish:
  - que estamos diciendo
  - que enseñamos
  lexicon: BDAG
  rationale: El infinitivo se refleja más literalmente con «decimos»; «enseñamos» interpretaría más allá del griego y del audit trail inglés.
- source_word: Ποιήσωμεν
  english_pob_choice: Let us do
  chosen_spanish: Hagamos
  alternatives_spanish:
  - Hagamos que
  - Vamos a hacer
  lexicon: BDAG
  rationale: El subjuntivo exhortativo/hortatorio de primera persona plural se expresa naturalmente en español con «hagamos».
- source_word: τὰ κακὰ
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - cosas malas
  lexicon: BDAG
  rationale: 'La construcción artículo + adjetivo funciona idiomáticamente en español como sustantivo abstracto: «el mal». Mantiene la fuerza moral general del griego y del inglés POB.'
- source_word: ἵνα ἔλθῃ τὰ ἀγαθά
  english_pob_choice: so that good may come
  chosen_spanish: para que venga el bien
  alternatives_spanish:
  - a fin de que llegue lo bueno
  - para que llegue el bien
  lexicon: BDAG
  rationale: «Para que» expresa con naturalidad la relación final; «venga» conserva el movimiento verbal de ἔλθῃ y «el bien» mantiene la abstracción del contraste con «el mal».
- source_word: κρίμα
  english_pob_choice: condemnation
  chosen_spanish: la condena
  alternatives_spanish:
  - el juicio
  - la sentencia
  lexicon: BDAG
  rationale: Aquí el sustantivo apunta a un veredicto judicial adverso; «la condena» comunica el sentido con precisión y en un registro bíblico natural.
- source_word: ἔνδικόν
  english_pob_choice: just
  chosen_spanish: justa
  alternatives_spanish:
  - merecida
  - recta
  lexicon: BDAG
  rationale: El adjetivo califica la condena como merecida/justa. «Justa» preserva el valor forense y moral sin añadir matiz interpretativo excesivo.
theological_decisions:
- issue: Elipsis inicial de καὶ μὴ καθὼς
  english_pob_reading: And why not say
  chosen_spanish_reading: ¿Y por qué no decir
  alternative_spanish_readings:
  - Y no como
  - ¿Y no decir
  rationale: El griego es elíptico y depende del argumento inmediato; la formulación interrogativa en español hace inteligible la lógica retórica sin añadir contenido nuevo.
  doctrine_reference: Retórica paulina; continuidad argumental con Romanos 3:7
- issue: Pronombre implícito en ὧν τὸ κρίμα
  english_pob_reading: Their condemnation
  chosen_spanish_reading: La condena de ellos
  alternative_spanish_readings:
  - Su condena
  - La condena de quienes dicen eso
  rationale: El antecedente puede abarcar a quienes formulan o aprueban la acusación y el razonamiento perverso. «La condena de ellos» mantiene esa referencia abierta sin precisar más de lo que el texto obliga.
  doctrine_reference: Responsabilidad moral de quienes pervierten el evangelio; Romanos 3:8 en contexto
- issue: Cita directa del dicho atribuido
  english_pob_reading: “Let us do evil so that good may come”
  chosen_spanish_reading: “Hagamos el mal para que venga el bien”
  alternative_spanish_readings:
  - “Hagamos el mal para que resulte el bien”
  - “Hagamos cosas malas para que venga lo bueno”
  rationale: La cita conserva la antítesis semítica/paulina entre mal y bien y el efecto de propósito. «Venga» mantiene la imagen verbal sin volverla más explicativa que el original.
  doctrine_reference: Rechazo de justificar el mal por un bien supuestamente mayor; Romanos 3:8
translation_notes:
  revision_awareness: El inglés auditado fue ajustado para fluidez mínima (se eliminó una coma antes de ‘and as some claim’) sin cambios de sentido. La versión española refleja ese mismo nivel de naturalidad, conservando la elipsis retórica, la acusación reportada y el cierre judicial.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - Se evita «Cristo»/«Mesías» porque el versículo no contiene cristología explícita.
  - «Se nos calumnia» sigue el valor hostil de βλασφημούμεθα sin imponer «blasfemar» donde el blanco es la enseñanza humana.
  - «El mal» y «el bien» conservan la abstracción del griego y la antítesis del texto.
  - «Condena» se prefiere a «juicio» para mantener la fuerza adversa de κρίμα en este contexto.
