translation:
  language: es
  text: Ruina[a] y miseria están en sus sendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Destrucción y miseria están en sus sendas».
    reason: lexical_alternative
lexical_decisions:
- source_word: σύντριμμα
  english_pob_choice: Ruin
  chosen_spanish: Ruin
  alternatives_spanish:
  - Destrucción
  - quebrantamiento
  lexicon: BDAG
  rationale: El griego nombra el resultado de una ruptura violenta o devastación. Aunque “destrucción” es posible, “ruin” funciona con naturalidad en español bíblico contemporáneo y conserva la idea de devastación consumada sin añadir matices no presentes.
- source_word: ταλαιπωρία
  english_pob_choice: misery
  chosen_spanish: miseria
  alternatives_spanish:
  - miseria profunda
  - desdicha
  - aflicción
  lexicon: BDAG
  rationale: “Miseria” comunica sufrimiento grave, penuria y condición lamentable de manera breve y natural. Mantiene la fuerza de la pareja nominal griega sin volver la línea demasiado explicativa.
- source_word: ἐν ταῖς ὁδοῖς αὐτῶν
  english_pob_choice: in their paths
  chosen_spanish: en sus sendas
  alternatives_spanish:
  - en sus caminos
  - en sus rutas
  lexicon: BDAG
  rationale: “Sendas” preserva la imagen concreta de camino/andar y sugiere, en español, el curso de vida o conducta. Es más cercano al carácter figurado de ὁδοῖς que una paráfrasis abstracta.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: Griego conectivo estándar
  rationale: Se mantiene la coordinación simple entre los dos sustantivos, como en el original.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y ninguna revisión aplicada. La versión española sigue de cerca la estructura nominal concisa del original y conserva la alternativa léxica principal documentada en inglés para σύντριμμα.
  spanish_consistency_notes:
  - Se preserva el paralelo breve de dos sustantivos unidos por coordinación simple.
  - No se introduce artículo definido donde el griego no lo requiere.
  - “Sendas” se eligió para mantener la metáfora del camino sin neutralizarla en una abstracción moral.
