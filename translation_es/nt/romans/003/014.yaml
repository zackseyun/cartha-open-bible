  text: cuya boca está llena de maldiciones y amargura.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὧν
  english_pob_choice: whose
  chosen_spanish: cuya
  alternatives_spanish:
  - de quienes
  - de los cuales
  lexicon: BDAG
  rationale: El relativo genitivo introduce una cláusula que describe a las personas del contexto anterior. En español, «cuya» conserva de forma natural la relación posesiva con «boca» y mantiene la fluidez del original.
- source_word: στόμα
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - boca
  lexicon: BDAG
  rationale: El sustantivo se traduce de manera directa. «Boca» es el equivalente natural en español y conserva el valor colectivo del miembro del cuerpo como órgano del habla.
- source_word: ἀρᾶς
  english_pob_choice: cursing
  chosen_spanish: maldiciones
  alternatives_spanish:
  - maldición
  - maldiciones de maldición
  - imprecaciones
  lexicon: BDAG
  rationale: Aunque el griego puede significar «maldición», en la construcción «la boca está llena de...» conviene un sustantivo plural que refleje el contenido habitual del habla. «Maldiciones» preserva el énfasis en palabras que invocan mal o daño, como en el inglés POB «cursing».
- source_word: πικρίας
  english_pob_choice: bitterness
  chosen_spanish: amargura
  alternatives_spanish:
  - amargura
  - aspereza
  - amargo hablar
  lexicon: BDAG
  rationale: «Amargura» es el equivalente más transparente y fiel al valor moral del término. Mantiene el paralelo con «maldiciones» sin introducir una paráfrasis excesiva.
- source_word: γέμει
  english_pob_choice: is full
  chosen_spanish: está llena
  alternatives_spanish:
  - está lleno
  - se halla llena de
  lexicon: BDAG
  rationale: El verbo expresa plenitud continua. En español, «está llena de» reproduce de forma natural la imagen de plenitud y el tiempo presente del griego.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y no requieren revisión textual; la versión española sigue de cerca la imagen idiomática del original con ajustes naturales de género y número para el español.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u այլ terminología doctrinal no pertinente; el verso no contiene vocabulario teológico disputado más allá del campo semántico de «ἀρᾶς» y «πικρίας».
  - Se eligió el plural «maldiciones» para reflejar mejor el carácter acumulativo del habla descrita en español, sin alterar el sentido del griego.
  - «Boca» y «está llena de» conservan la metáfora corporal y la noción de plenitud del texto fuente.
