translation:
  language: es
  text: ¿Qué, pues? ¿Somos mejores?[a] De ningún modo; porque ya hemos acusado[b] a judíos y a griegos, todos, de estar bajo el pecado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Tenemos alguna ventaja?»'
    reason: alternative_reading
  - marker: b
    text: 'O: «ya hemos presentado la acusación de que»'
    reason: lexical_alternative
  - marker: c
    text: 'O: «están todos bajo el poder del pecado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί οὖν
  english_pob_choice: What then?
  chosen_spanish: ¿Qué, pues?
  alternatives_spanish:
  - ¿Qué, entonces?
  - Entonces, ¿qué?
  lexicon: SBLGNT; discourse marker οὖν
  rationale: Mantiene el giro inferencial de Pablo y conserva el matiz discursivo de οὖν sin añadir contenido nuevo. En español, la inversión breve con «pues» suena natural y digna.
- source_word: προεχόμεθα
  english_pob_choice: Are we better?
  chosen_spanish: ¿Somos mejores?
  alternatives_spanish:
  - ¿Tenemos alguna ventaja?
  - ¿Sobresalimos?
  lexicon: BDAG
  rationale: La pregunta apunta al estatus comparativo. «Somos mejores» sigue de cerca la forma breve del griego y conserva la tensión de si se habla de superioridad o de ventaja.
- source_word: οὐ πάντως
  english_pob_choice: Not at all
  chosen_spanish: De ningún modo
  alternatives_spanish:
  - En absoluto
  - De ninguna manera
  lexicon: BDAG
  rationale: Es una negación enfática y idiomática en español, adecuada para la réplica tajante de Pablo.
- source_word: προῃτιασάμεθα
  english_pob_choice: we have already charged
  chosen_spanish: ya hemos acusado
  alternatives_spanish:
  - ya hemos cargado la acusación
  - ya hemos presentado la acusación
  lexicon: BDAG
  rationale: «Acusado» refleja bien el valor forense del verbo en el argumento de Romanos. Se mantiene el perfecto para expresar una acusación previa ya formulada.
- source_word: Ἰουδαίους τε καὶ Ἕλληνας
  english_pob_choice: both Jews and Greeks
  chosen_spanish: tanto judíos como griegos
  alternatives_spanish:
  - judíos y griegos por igual
  - judíos así como griegos
  lexicon: BDAG
  rationale: La correlación «tanto... como...» reproduce bien la construcción coordinada y deja intacto el contraste judíos/griegos del texto.
- source_word: πάντας
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos por igual
  - enteramente
  lexicon: BDAG
  rationale: Aporta la fuerza de totalidad del original sin sobreexplicar.
- source_word: ὑφ’ ἁμαρτίαν εἶναι
  english_pob_choice: are all under sin
  chosen_spanish: están todos bajo pecado
  alternatives_spanish:
  - están todos bajo el poder del pecado
  - están sometidos al pecado
  lexicon: BDAG
  rationale: Se conserva la metáfora de subordinación con «bajo pecado». Esta forma es fiel y permite que el lector perciba la densidad paulina sin expandirla demasiado.
theological_decisions:
- issue: 'Valor de προεχόμεθα: ventaja o superioridad'
  english_pob_reading: 'The question is rendered as Jewish comparative standing: ''Are we better?'''
  chosen_spanish_reading: ¿Somos mejores?
  alternative_spanish_readings:
  - ¿Tenemos alguna ventaja?
  - ¿Estamos en mejor स्थिति?
  rationale: La pregunta en Romanos 3:1-9 trata la posible superioridad judía dentro del argumento de responsabilidad universal. «Somos mejores» preserva la ambigüedad útil entre superioridad y ventaja, sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión exegética sin nivelar la pregunta.
- issue: 'ὑφ’ ἁμαρτίαν εἶναι: subjection to sin'
  english_pob_reading: are all under sin
  chosen_spanish_reading: están todos bajo pecado
  alternative_spanish_readings:
  - están todos bajo el poder del pecado
  - están todos bajo la dominación del pecado
  rationale: La frase breve «bajo pecado» respeta la concisión del griego y conserva la fuerza teológica de la esclavitud o sujeción al pecado, que la nota inglesa explicita como posible «under the power of sin».
  doctrine_reference: Romanos 3:9; cf. la nota lexical inglesa sobre la sujeción al pecado.
translation_notes:
  revision_awareness: La versión española sigue el último estado revisado del POB inglés, que ajustó la pregunta de «better off» a «better» para acercarse más a προεχόμεθα; por eso se eligió «¿Somos mejores?» en vez de una expansión interpretativa. También se preserva la nota alternativa sobre la posible lectura de ventaja y la glosa sobre la sujeción al pecado.
  spanish_consistency_notes:
  - Se usa «judíos» y «griegos» de manera consistente con la costumbre paulina y con el audit trail inglés.
  - Se mantiene «pecado» en singular para reflejar la construcción compacta ὑφ’ ἁμαρτίαν εἶναι.
  - El tono es sobrio y público, apto para una Biblia de lectura eclesial sin recurrir a fórmula tradicionalizante innecesaria.
