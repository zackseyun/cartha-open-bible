    reason: lexical_alternative
  revision_rationale: Se conserva la fuerza del original y del POB inglés, pero se corrige la sintaxis española para que exprese con naturalidad la acusación previa. Se mantuvo «¿Somos mejores?» por fidelidad a la decisión auditada y se conservó la metáfora paulina con nota explicativa.
