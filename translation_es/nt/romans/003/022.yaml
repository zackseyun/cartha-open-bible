review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: δικαιοσύνη θεοῦ se vierte como «justicia de Dios», διὰ πίστεως Ἰησοῦ Χριστοῦ como «por medio de la fe en Jesús Mesías», εἰς πάντας τοὺς πιστεύοντας como «para todos los que creen», y οὐ γάρ ἐστιν διαστολή como «porque no hay distinción». También preserva correctamente la alternativa interpretativa de πίστεως Ἰησοῦ Χριστοῦ en nota. Sin embargo, la nota [a] no preserva la alternativa del inglés; repite exactamente la lectura principal en vez de dar la alternativa léxica correspondiente a «righteousness / justice».'
  spanish_quality_summary: El español es claro, natural y de registro digno. «Por medio de la fe», «para todos los que creen» y «porque no hay distinción» leen bien en español bíblico moderno. «Jesús Mesías» sigue la política del proyecto, aunque suena menos tradicional; aquí sigue siendo inteligible. El único problema real es de consistencia editorial en la nota [a].
  glossary_alignment: 'La terminología principal está alineada con el glosario del proyecto: Χριστός → «Mesías», Ἰησοῦς → «Jesús», θεοῦ → «Dios». Para δικαιοσύνη, el borrador eligió «justicia» en el texto principal; eso puede sostenerse porque el propio expediente inglés preserva «justice» como alternativa significativa en contexto paulino. Pero entonces la nota debe ofrecer la alternativa española correspondiente, no duplicar el texto principal.'
  issues:
  - severity: medium
    issue: La nota [a] duplica la lectura principal en vez de dar una alternativa real.
    rationale: El inglés tiene texto principal «righteousness of God» con nota alternativa «justice of God». En español, al elegir «justicia de Dios» como texto principal, la nota debe reflejar una alternativa distinta, p. ej. «la rectitud de Dios», no repetir exactamente «la justicia de Dios».
  revised_spanish_text: Y la justicia de Dios por medio de la fe en Jesús Mesías, para todos los que creen[a]; porque no hay distinción.
  revised_footnotes:
  - marker: a
    text: O «por la fidelidad de Jesús Mesías».
    reason: alternative_reading
  revision_rationale: Se elimina la nota léxica defectuosa sobre «justicia de Dios», porque repetía el texto principal y no preservaba una alternativa útil. Se conserva la nota verdaderamente necesaria sobre la lectura alternativa de πίστεως Ἰησοῦ Χριστοῦ («fidelidad de Jesús Mesías»), anclándola en la cláusula relevante. No se requiere otro cambio al texto principal.
