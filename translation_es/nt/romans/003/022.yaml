translation:
  language: es
  text: Y la justicia de Dios por medio de la fe en Jesús Mesías, para todos los que creen[a]; porque no hay distinción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la fidelidad de Jesús Mesías».
    reason: alternative_reading
lexical_decisions:
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: En español, 'justicia de Dios' conserva la amplitud semántica de δικαιοσύνη y permite mantener la tensión paulina entre el carácter justo de Dios y su obrar salvífico. 'Rectitud' es posible, pero suena menos natural en este contexto y estrecha el alcance.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  lexicon: BDAG
  rationale: La construcción genitiva se mantiene de forma transparente como 'de Dios'. 'Procedente de Dios' sería una glosa interpretativa innecesaria.
- source_word: διὰ πίστεως
  english_pob_choice: through faith
  chosen_spanish: por medio de la fe
  alternatives_spanish:
  - por la fe
  - mediante la fe
  lexicon: BDAG
  rationale: '''Por medio de la fe'' expresa con claridad la mediación de διά con genitivo y suena natural en español. ''Por la fe'' también es posible, pero ''por medio de'' preserva mejor la relación instrumental.'
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se mantiene 'Mesías' por la política del proyecto para Χριστός cuando funciona como título. En español, 'Jesús Mesías' conserva la carga titular sin sustituirla por la forma eclesiástica tradicional 'Cristo'.
- source_word: εἰς ⸀πάντας τοὺς πιστεύοντας
  english_pob_choice: for all who believe
  chosen_spanish: para todos los que creen
  alternatives_spanish:
  - para todos los creyentes
  - para todos los que están creyendo
  lexicon: BDAG
  rationale: '''Para todos los que creen'' reproduce bien la fuerza inclusiva de εἰς con acusativo y el participio presente. ''Creyentes'' suena más nominal y menos verbal que el griego.'
- source_word: διαστολή
  english_pob_choice: distinction
  chosen_spanish: distinción
  alternatives_spanish:
  - diferencia
  - separación
  lexicon: BDAG
  rationale: '''Distinción'' es la opción más adecuada en contexto paulino de igualdad ante Dios. ''Diferencia'' sería más general; ''separación'' añade una idea no exigida por el término.'
theological_decisions:
- issue: δικαιοσύνη θεοῦ
  english_pob_reading: the righteousness of God
  chosen_spanish_reading: la justicia de Dios
  alternative_spanish_readings:
  - la rectitud de Dios
  - la justicia que procede de Dios
  rationale: La expresión puede aludir tanto al atributo justo de Dios como a su acción justiciera/salvífica. 'Justicia de Dios' preserva esa amplitud sin cerrar el debate semántico. 'Rectitud' y 'que procede de Dios' son posibles, pero menos naturales o más interpretativos.
  doctrine_reference: Contested terms table for δικαιοσύνη
- issue: πίστεως Ἰησοῦ Χριστοῦ
  english_pob_reading: faith in Jesus Messiah
  chosen_spanish_reading: la fe en Jesús Mesías
  alternative_spanish_readings:
  - la fidelidad de Jesús Mesías
  - la fe de Jesús Mesías
  rationale: Se adopta la lectura objetiva como texto principal, siguiendo el audit trail inglés. La alternativa subjetiva, 'fidelidad de Jesús Mesías', queda implícitamente preservada como posibilidad interpretativa sin forzarla en el texto principal.
  doctrine_reference: 'Translation philosophy #3; Contested terms table for πίστις'
translation_notes:
  revision_awareness: He seguido el estado más reciente del audit trail, pero sin adoptar la breve desviación que cambió Χριστός por 'Cristo'; la restauración a 'Mesías' se ajusta a la política del proyecto. También he conservado en español la misma tensión lexical y teológica que el inglés mantiene entre 'righteousness/justice' y 'faith/faithfulness'.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός, no 'Cristo', por consistencia con la política terminológica del proyecto.
  - '''Justicia'' se usa como equivalente principal de δικαιοσύνη, con nota alternativa para ''rectitud/justicia''.'
  - La frase 'por medio de la fe' evita ambigüedad y sigue de cerca la función de διὰ con genitivo.
  - '''Para todos los que creen'' conserva el participio presente y el alcance universal sin nominalizar demasiado.'
  - La puntuación reproduce el valor de pausa de los dos miembros finales del versículo.
