translation:
  language: es
  text: Pero ahora, aparte de la ley, se ha revelado la justicia de Dios[a], atestiguada por la Ley y los Profetas[b][c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la rectitud de Dios».
    reason: lexical_alternative
  - marker: b
    text: O posiblemente «la justicia que viene de Dios».
    reason: alternative_reading
  - marker: c
    text: Es decir, las Escrituras; compárese «la Ley y los Profetas» como designación del testimonio del Antiguo Testamento.
    reason: cross_reference
lexical_decisions:
- source_word: Νυνὶ δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Ahora bien
  - Pero en este tiempo
  lexicon: BDAG
  rationale: La expresión marca transición fuerte y contraste. «Pero ahora» conserva ambos matices en español natural y solemne.
- source_word: χωρὶς νόμου
  english_pob_choice: apart from the law
  chosen_spanish: aparte de la ley
  alternatives_spanish:
  - sin la ley
  - fuera de la ley
  lexicon: BDAG
  rationale: χωρίς expresa separación, no simple negación. «Aparte de» refleja mejor esa idea que «sin», y «la ley» mantiene la referencia paulina habitual a la ley mosaica.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: BDAG
  rationale: En español, «justicia» es una opción válida y más natural aquí; además preserva la alternativa lexical que el POB inglés también documenta. «Rectitud» queda como alternativa cercana, pero menos directa en este contexto.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - procedente de Dios
  - de Dios
  lexicon: BDAG
  rationale: El genitivo queda abierto en Pablo; «de Dios» mantiene esa ambigüedad sin cerrarla a «de parte de Dios» ni a una posesión más rígida.
- source_word: πεφανέρωται
  english_pob_choice: has been revealed
  chosen_spanish: se ha revelado
  alternatives_spanish:
  - ha sido revelada
  - ha sido manifestada
  lexicon: BDAG
  rationale: El perfecto expresa un estado presente resultante de una revelación previa. «Se ha revelado» es natural en español y preserva bien ese valor.
- source_word: μαρτυρουμένη
  english_pob_choice: being witnessed
  chosen_spanish: siendo testificada
  alternatives_spanish:
  - siendo atestiguada
  - de la que dan testimonio
  lexicon: BDAG
  rationale: El participio presente pasivo pide una relación continua con la cláusula principal. «Siendo testificada» conserva la forma participial sin resolverla a una paráfrasis activa.
- source_word: ὑπὸ τοῦ νόμου καὶ τῶν προφητῶν
  english_pob_choice: by the Law and the Prophets
  chosen_spanish: por la Ley y los Profetas
  alternatives_spanish:
  - por la ley y los profetas
  - por la Ley y los Profetas
  lexicon: BDAG
  rationale: La mayúscula señala la fórmula canónica reconocible, es decir, la sección escritural del testimonio antiguo. «Por» reproduce ὑπό con claridad en voz pasiva.
theological_decisions:
- issue: Sentido de δικαιοσύνη θεοῦ
  english_pob_reading: the righteousness of God
  chosen_spanish_reading: la justicia de Dios
  alternative_spanish_readings:
  - la justicia que viene de Dios
  - la rectitud de Dios
  - la justicia / rectitud de Dios
  rationale: El texto griego permite una tensión entre la justicia propia de Dios, su acción justa y el don/realidad que procede de él. «La justicia de Dios» preserva esa ambigüedad sin resolverla prematuramente. Se añade nota porque el POB inglés también conserva la alternativa «justice of God».
  doctrine_reference: Preservar la tensión lexical y teológica sin decidir una sola lectura doctrinal.
- issue: Valor de μαρτυρουμένη ὑπὸ τοῦ νόμου καὶ τῶν προφητῶν
  english_pob_reading: being witnessed by the Law and the Prophets
  chosen_spanish_reading: siendo testificada por la Ley y los Profetas
  alternative_spanish_readings:
  - de la que dan testimonio la Ley y los Profetas
  - atestiguada por la Ley y los Profetas
  rationale: La lectura participial conserva la dependencia sintáctica del verbo principal y el testimonio escritural. La formulación canónica «Ley y Profetas» se mantiene por su valor intertextual y porque en contexto alude al testimonio de las Escrituras.
  doctrine_reference: La Escritura anterior da testimonio de la revelación de Dios en el evangelio.
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión inglesa, que sustituyó «attested» por «being witnessed» para reflejar mejor el participio μαρτυρουμένη. En español, se ha conservado esa conexión participial con «siendo testificada» y se ha mantenido la ambigüedad de δικαιοσύνη θεοῦ mediante una nota lexical, sin forzar una interpretación doctrinal única.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo exige; aquí no aparece.
  - Se mantiene «la Ley y los Profetas» como fórmula canónica, con mayúscula por convención bíblica y por el eco escritural.
  - «Justicia» se eligió como término principal, pero se documenta la alternativa «rectitud» y la lectura «justicia que viene de Dios» por fidelidad al margen interpretativo del original.
  - No se sustituye «Ley» por un equivalente explicativo más amplio para no perder la referencia intertextual del POB.
