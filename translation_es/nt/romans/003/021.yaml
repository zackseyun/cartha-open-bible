review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue bien el griego en la transición («Pero ahora»), la separación de «χωρὶς νόμου» («aparte de la ley»), la ambigüedad de «δικαιοσύνη θεοῦ» («justicia de Dios») y la referencia canónica a «la Ley y los Profetas». También conserva adecuadamente el perfecto «se ha revelado». Sin embargo, la nota [a] no corresponde al texto, porque repite exactamente la lectura principal en vez de preservar la alternativa inglesa «justice» frente a «righteousness»; en español conviene reflejar la alternativa como «rectitud de Dios» o similar. Además, «siendo testificada» es comprensible pero suena forzado en español eclesial moderno; una forma más natural y fiel al participio es «atestiguada por…».
  spanish_quality_summary: 'La redacción es en general clara y digna, pero presenta dos problemas de calidad: (1) la nota [a] es defectuosa al no ofrecer una alternativa real; (2) «siendo testificada» es poco idiomático y algo pesado. «Atestiguada por la Ley y los Profetas» mantiene el sentido y mejora la legibilidad sin caer en paráfrasis excesiva. El resto del verso suena natural y conserva un tono bíblico moderno.'
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: «Dios», «ley», «justicia» y «la Ley y los Profetas» están bien manejados. No hay conflicto con Yahvé/Mesías u otros términos sensibles. Para «δικαιοσύνη», «justicia» puede mantenerse en el texto principal, pero la nota léxica debe ofrecer una alternativa real, idealmente «rectitud de Dios», ya que el inglés documenta una tensión léxica que el español actual no debe perder.'
  issues:
  - severity: medium
    issue: La nota [a] repite el texto principal en vez de ofrecer una alternativa léxica real.
    rationale: El texto principal ya dice «la justicia de Dios», pero la nota [a] también dice «la justicia de Dios». Esto no preserva la función de la nota inglesa, que registra una alternativa léxica significativa.
  - severity: medium
    issue: «siendo testificada» es una construcción poco natural en español.
    rationale: Aunque intenta seguir de cerca el participio griego, en español suena rígida y menos clara. «Atestiguada por…» conserva el valor pasivo y la relación con la cláusula principal, con mejor legibilidad.
  revised_spanish_text: Pero ahora, aparte de la ley, se ha revelado la justicia de Dios[a], atestiguada por la Ley y los Profetas[b][c],
  revised_footnotes:
  - marker: a
    text: O «la rectitud de Dios».
    reason: lexical_alternative
  - marker: b
    text: O posiblemente «la justicia que viene de Dios».
    reason: alternative_reading
  - marker: c
    text: Es decir, las Escrituras; compárese «la Ley y los Profetas» como designación del testimonio del Antiguo Testamento.
    reason: cross_reference
  revision_rationale: Se corrige la nota léxica para que aporte una alternativa real y se sustituye «siendo testificada» por «atestiguada», que es más natural en español y sigue siendo fiel a μαρτυρουμένη. También se elimina la nota [a] de «ahora», ya que en el material auditado esa nota pertenece al sintagma sobre «δικαιοσύνη θεοῦ», no a la transición inicial.
