revisions:
- from: Pero ahora[a], aparte de la ley, se ha revelado la justicia de Dios, siendo testificada por la Ley y los Profetas[b][c],
  to: Pero ahora, aparte de la ley, se ha revelado la justicia de Dios[a], atestiguada por la Ley y los Profetas[b][c],
  rationale: Se corrige la nota léxica para que aporte una alternativa real y se sustituye «siendo testificada» por «atestiguada», que es más natural en español y sigue siendo fiel a μαρτυρουμένη. También se elimina la nota [a] de «ahora», ya que en el material auditado esa nota pertenece al sintagma sobre «δικαιοσύνη θεοῦ», no a la transición inicial.
