translation:
  language: es
  text: No hay quien entienda; no hay quien busque[a] a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «busque con empeño» o «busque tras Dios». El verbo griego ἐκζητῶν puede intensificar la idea de buscar.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνίων
  english_pob_choice: understands
  chosen_spanish: entienda
  alternatives_spanish:
  - comprenda
  - capte con entendimiento
  lexicon: BDAG
  rationale: El participio expresa entender o captar con discernimiento. «Entienda» funciona de manera natural en español y conserva el sentido sin volverlo técnico ni interpretativo.
- source_word: ἐκζητῶν
  english_pob_choice: seeks
  chosen_spanish: busque
  alternatives_spanish:
  - busque con empeño
  - busque diligentemente
  - busque tras
  lexicon: BDAG
  rationale: El verbo compuesto intensifica la idea de buscar; en español, «busque» comunica claramente la acción, y el matiz intensivo puede quedar indicado en nota para no sobrecargar el verso.
- source_word: οὐκ ἔστιν
  english_pob_choice: There is no one
  chosen_spanish: No hay quien
  alternatives_spanish:
  - No existe nadie que
  - Ninguno hay que
  lexicon: BDAG
  rationale: La negación idiomática en español se expresa con naturalidad como «No hay quien», manteniendo la fuerza categórica del griego sin sonar forzado.
- source_word: ὁ συνίων / ὁ ἐκζητῶν
  english_pob_choice: the substantival participles are rendered as relative clauses ('who understands,' 'who seeks')
  chosen_spanish: quien entienda / quien busque
  alternatives_spanish:
  - el que entienda / el que busque
  - el entendiente / el buscador
  lexicon: Greek grammar
  rationale: Los participios sustantivados se vierten mejor con cláusulas relativas en español. «Quien» preserva la generalidad del griego y suena idiomático en una negación universal.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - al Dios verdadero
  lexicon: BDAG
  rationale: En español, el objeto directo personal requiere la preposición «a». «Dios» mantiene el referente sin añadir matices no presentes en el texto.
theological_decisions:
- issue: Alcance de la negación universal en la cita paulina
  english_pob_reading: Retain the absolute wording 'There is no one...' twice without softening it.
  chosen_spanish_reading: 'Mantener dos negaciones absolutas: «No hay quien…; no hay quien…»'
  alternative_spanish_readings:
  - No hay nadie que realmente entienda; no hay nadie que verdaderamente busque a Dios
  - Nadie entiende; nadie busca a Dios
  rationale: El griego presenta una negación categórica y total. La traducción debe conservar esa amplitud sin suavizarla con adverbios explicativos ni con una reformulación que debilite el paralelismo.
  doctrine_reference: Romanos 3:9-12; universalidad del pecado humano
translation_notes:
  revision_awareness: 'Coincide con el último repaso del texto inglés: no se requirieron cambios textuales en el POB inglés, y la presente versión española conserva la negación absoluta y el paralelismo de la cita.'
  spanish_consistency_notes:
  - Se usa «Dios» sin artículo en estilo español natural, manteniendo el referente del griego τὸν θεόν.
  - Se preserva el paralelismo sintáctico con dos miembros casi idénticos para reflejar la estructura de la cita.
  - «No hay quien» comunica la negación universal de forma idiomática y solemne en español bíblico contemporáneo.
