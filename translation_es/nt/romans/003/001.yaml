translation:
  language: es
  text: ¿Qué ventaja tiene, entonces, el judío?[b] ¿O cuál es el beneficio de la circuncisión?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «¿O cuál es el valor de la circuncisión?»'
    reason: lexical_alternative
  - marker: b
    text: «El judío» es un singular representativo, que se refiere al judío como categoría.
    reason: cultural_note
lexical_decisions:
- source_word: Τί οὖν
  english_pob_choice: What then
  chosen_spanish: ¿Qué ventaja tiene, entonces…?
  alternatives_spanish:
  - ¿Qué, pues…?
  - ¿Qué, entonces…?
  lexicon: BDAG
  rationale: Conserva la transición inferencial de οὖν y la forma interrogativa retórica en un español natural. Se integra ‘entonces’ sin sonar forzado.
- source_word: τὸ περισσὸν
  english_pob_choice: the advantage
  chosen_spanish: ventaja
  alternatives_spanish:
  - beneficio
  - valor
  - superioridad
  lexicon: BDAG
  rationale: ‘Ventaja’ comunica mejor la idea de algo provechoso o distintivo en este contexto que ‘superioridad’, que podría sonar más cargado, y evita ‘exceso’, que no corresponde bien al sentido aquí.
- source_word: τοῦ Ἰουδαίου
  english_pob_choice: of the Jew
  chosen_spanish: el judío
  alternatives_spanish:
  - el judío como categoría
  - el pueblo judío
  - el judío individual
  lexicon: BDAG
  rationale: Se mantiene el singular representativo del griego y del audit trail inglés. En español, el artículo definido seguido de un sustantivo masculino singular conserva la referencia genérica sin recargarla.
- source_word: ἢ τίς
  english_pob_choice: Or what
  chosen_spanish: ¿O cuál es…?
  alternatives_spanish:
  - ¿O qué…?
  - ¿O cuál…?
  lexicon: BDAG
  rationale: ‘¿O cuál es…?’ reproduce de modo natural el segundo miembro del paralelismo interrogativo y mantiene la solidez retórica del texto.
- source_word: ἡ ὠφέλεια
  english_pob_choice: the benefit
  chosen_spanish: el beneficio
  alternatives_spanish:
  - la utilidad
  - la ganancia
  - el valor
  lexicon: BDAG
  rationale: ‘Beneficio’ preserva la idea de provecho y mantiene la distinción léxica con ‘ventaja’ en la primera pregunta, como en el inglés POB.
- source_word: τῆς περιτομῆς
  english_pob_choice: of circumcision
  chosen_spanish: de la circuncisión
  alternatives_spanish:
  - de la circuncisión ritual
  - del rito de la circuncisión
  lexicon: BDAG
  rationale: La referencia es al rito mismo, no a una explicación interpretativa. En español, ‘circuncisión’ es la forma directa y transparentemente ligada al texto.
theological_decisions:
- issue: Singular representativo en Ἰουδαίου
  english_pob_reading: '''The Jew'' is a representative singular, referring to the Jewish person as a category.'
  chosen_spanish_reading: ‘el judío’ conserva el singular representativo como categoría.
  alternative_spanish_readings:
  - ‘el judío’ como individuo
  - ‘los judíos’
  rationale: El griego usa singular con artículo para una figura representativa. Mantener el singular evita perder la textura retórica de Pablo y no convierte la pregunta en una generalización plural que el texto no expresa directamente.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Ritual de la circuncisión como signo de identidad pactal
  english_pob_reading: circumcision
  chosen_spanish_reading: circuncisión
  alternative_spanish_readings:
  - circuncisión como señal del pacto
  - el rito de la circuncisión
  rationale: El texto nombra el rito directamente; la dimensión pactal se entiende por el contexto, pero no se añade al cuerpo principal para no sobretraducir. Si se explicita, debe quedar en nota o comentario, no en la línea principal.
  doctrine_reference: Contextual lexical restraint
translation_notes:
  revision_awareness: 'He seguido el audit trail inglés: se conserva el paralelismo interrogativo, el singular representativo de Ἰουδαίου y la distinción entre τὸ περισσόν y ἡ ὠφέλεια mediante ‘ventaja’ / ‘beneficio’. No hay revisiones previas aplicadas en el archivo fuente.'
  spanish_consistency_notes:
  - Uso ‘judío’ para Ἰουδαῖος en singular representativo, coherente con el texto griego y el criterio de fidelidad de POB.
  - Evito ‘SEÑOR’ u otras sustituciones no pertinentes; aquí no aparece κύριος.
  - Mantengo ‘circuncisión’ sin glosa en el cuerpo principal para no añadir interpretación no expresada por el griego.
