translation:
  language: es
  text: '¡De ninguna manera! Más bien, que Dios sea veraz, y todo ser humano mentiroso, como está escrito: «Para que seas justificado[a] en tus palabras y venzas cuando seas juzgado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seas declarado justo» o «quedes vindicado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando juzgues»; esto refleja más directamente la redacción hebrea del Salmo 51:4, mientras que el griego de Romanos se lee naturalmente como «cuando seas juzgado».'
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ γένοιτο
  english_pob_choice: May it never be!
  chosen_spanish: ¡De ninguna manera!
  alternatives_spanish:
  - ¡Jamás!
  - ¡Eso no puede ser!
  lexicon: BDAG
  rationale: Expresa la misma repulsa enfática e idiomática de Pablo sin sonar mecánico. En español, ‘¡De ninguna manera!’ comunica bien el rechazo tajante del griego.
- source_word: γινέσθω δὲ ὁ θεὸς ἀληθής
  english_pob_choice: let God be true
  chosen_spanish: que Dios sea veraz
  alternatives_spanish:
  - que Dios sea verdadero
  - que Dios resulte veraz
  lexicon: BDAG
  rationale: ‘Veraz’ conserva mejor la idea de fidelidad a la verdad que un simple adjetivo copulativo. Mantiene el contraste directo con ‘mentiroso’ en la frase siguiente.
- source_word: πᾶς δὲ ἄνθρωπος
  english_pob_choice: every person
  chosen_spanish: todo ser humano
  alternatives_spanish:
  - toda persona
  - cada ser humano
  lexicon: BDAG
  rationale: ‘ἄνθρωπος’ aquí tiene referencia genérica humana, no masculina. ‘Todo ser humano’ preserva el valor distributivo de πᾶς y su alcance universal.
- source_word: ψεύστης
  english_pob_choice: liar
  chosen_spanish: mentiroso
  alternatives_spanish:
  - embustero
  - falso
  lexicon: BDAG
  rationale: El sustantivo designa a quien miente. ‘Mentiroso’ es el equivalente natural y directo en español, y conserva la antítesis con ‘veraz’.
- source_word: καθὼς γέγραπται
  english_pob_choice: as it is written
  chosen_spanish: como está escrito
  alternatives_spanish:
  - tal como está escrito
  - según está escrito
  lexicon: BDAG
  rationale: Fórmula bíblica estándar en español, breve y fiel al valor escritural de la cita.
- source_word: δικαιωθῇς
  english_pob_choice: be justified
  chosen_spanish: seas justificado
  alternatives_spanish:
  - seas vindicado
  - seas declarado justo
  lexicon: BDAG
  rationale: Conserva el registro forense del verbo en la cita. ‘Justificado’ mantiene la cercanía formal al griego y deja abierta la idea de vindicación judicial que el contexto exige.
- source_word: λόγοις
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - declaraciones
  lexicon: BDAG
  rationale: ‘Palabras’ es la equivalencia más natural y suficiente para λόγοις en este contexto de discurso judicial.
- source_word: νικήσεις
  english_pob_choice: prevail
  chosen_spanish: venzcas
  alternatives_spanish:
  - triunfes
  - prevalezcas
  lexicon: BDAG
  rationale: En un marco judicial, ‘vencer’ comunica bien la idea de salir triunfante o tener la razón. ‘Venzas’ suena más natural que ‘prevalezcas’ y sigue de cerca la fuerza del verbo.
- source_word: ἐν τῷ κρίνεσθαί σε
  english_pob_choice: when you are judged
  chosen_spanish: cuando seas juzgado
  alternatives_spanish:
  - cuando seas sometido a juicio
  - cuando te juzguen
  lexicon: BDAG
  rationale: 'El griego de Romanos se lee de manera natural como pasivo: ‘cuando seas juzgado’. Esta opción refleja ese valor y mantiene el trasfondo judicial de la cita.'
theological_decisions:
- issue: Sentido forense de δικαιωθῇς aplicado a Dios en la cita
  english_pob_reading: Rendered as judicial vindication ('be justified') rather than moral transformation.
  chosen_spanish_reading: ‘Seas justificado’ se entiende como vindicación judicial, no como transformación moral.
  alternative_spanish_readings:
  - ‘seas vindicado’
  - ‘seas declarado justo’
  rationale: En el contexto, Dios contrasta su verdad con la mentira humana. La cita apunta a que Dios queda demostrado como justo en juicio; por eso conviene conservar el lenguaje forense sin suavizarlo.
  doctrine_reference: Justificación / vindicación judicial en el uso forense del término δικαιόω
- issue: 'Valor de la cita final: pasivo en Romanos frente a posible activo del Salmo hebreo'
  english_pob_reading: when you are judged
  chosen_spanish_reading: ‘cuando seas juzgado’ sigue la lectura natural del griego de Romanos.
  alternative_spanish_readings:
  - ‘cuando juzgues’
  - ‘cuando entres en juicio’
  rationale: El texto griego de Romanos favorece el pasivo. La alternativa activa se preserva solo como posibilidad relacionada con el trasfondo hebreo del Salmo, pero no como lectura principal del versículo en Romanos.
  doctrine_reference: Relación texto griego de Romanos / trasfondo del Salmo 51:4
- issue: Universalidad de ἄνθρωπος
  english_pob_reading: every person
  chosen_spanish_reading: ‘todo ser humano’ mantiene el alcance universal sin sesgo masculino.
  alternative_spanish_readings:
  - ‘toda persona’
  - ‘cada ser humano’
  rationale: El sustantivo griego es genérico. La traducción evita restringir indebidamente el sentido a varones y conserva el contraste universal con Dios.
  doctrine_reference: Humanidad universal bajo la verdad de Dios
translation_notes:
  revision_awareness: 'Revisión sin cambios respecto del último pase auditado: el veredicto de alta concordancia se mantiene, sin necesidad de ajustes adicionales.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ para el nombre divino cuando corresponde, pero en este versículo el texto griego cita ‘Dios’ (θεός), por lo que se traduce ‘Dios’.
  - Se mantuvo el registro forense de ‘justificado’/‘juzgado’ para no diluir la tensión judicial del pasaje.
  - Se evitó el masculino genérico en ἄνθρωπος, usando una forma inclusiva y natural en español.
  - La puntuación sigue el estilo español con comillas dobles angulares evitadas por consistencia editorial del borrador; se conservaron comillas tipográficas estándar en la cita interna.
