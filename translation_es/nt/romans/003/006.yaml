translation:
  language: es
  text: ¡De ninguna manera![a] Si no fuera así, ¿cómo juzgará Dios al mundo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «¡Por ningún motivo!» o, más formalmente, «¡Que nunca sea así!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ γένοιτο
  english_pob_choice: Absolutely not!
  chosen_spanish: ¡De ninguna manera!
  alternatives_spanish:
  - ¡Absolutamente no!
  - ¡Que nunca sea así!
  lexicon: BDAG
  rationale: La expresión es una negación idiomática fuerte de la inferencia anterior, no una construcción que deba verterse palabra por palabra. «¡De ninguna manera!» comunica con naturalidad y fuerza la réplica paulina en español, manteniendo la energía retórica sin añadir contenido doctrinal.
- source_word: ἐπεὶ
  english_pob_choice: Otherwise
  chosen_spanish: Si no fuera así
  alternatives_spanish:
  - De otro modo
  - Entonces
  lexicon: BDAG
  rationale: Aquí introduce la consecuencia lógica de la premisa rechazada. En español, «Si no fuera así» expresa mejor ese enlace argumentativo que un calco demasiado rígido, y conserva el flujo del razonamiento.
- source_word: κρινεῖ
  english_pob_choice: how will God judge
  chosen_spanish: ¿cómo juzgará Dios
  alternatives_spanish:
  - ¿cómo ha de juzgar Dios
  - ¿cómo puede Dios juzgar
  lexicon: BDAG
  rationale: El futuro indicativo griego se refleja con «juzgará», que es la equivalencia más directa y clara. Se mantiene la forma interrogativa retórica del original.
- source_word: θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: Louw-Nida 12.1
  rationale: El sustantivo sin artículo en griego se traduce de manera natural como «Dios» en español. No hay indicio aquí de un tratamiento especial que requiera otra forma.
- source_word: κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo habitado
  - la humanidad
  lexicon: BDAG
  rationale: κόσμος denota aquí el mundo en sentido amplio, como objeto del juicio divino. «El mundo» es la equivalencia más clara y natural en español.
theological_decisions:
- issue: Fórmula paulina de rechazo μὴ γένοιτο
  english_pob_reading: A strong denial of the preceding inference, rendered idiomatically rather than woodenly.
  chosen_spanish_reading: Una negación enfática e idiomática de la inferencia previa, sin suavizar la fuerza del rechazo.
  alternative_spanish_readings:
  - ¡Que nunca sea así!
  - ¡Absolutamente no!
  rationale: No conviene convertir la fórmula en una simple expresión devocional o en una paráfrasis débil. La traducción conserva el rechazo tajante de Pablo y el tono argumentativo del pasaje.
  doctrine_reference: Romanos 3:6; uso paulino recurrente de μὴ γένοιτο como repudio de una conclusión falsa.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alta concordancia; no se detectan revisiones textuales ni tensiones léxicas adicionales que requieran nota de variante. Se preservó el valor retórico de μὴ γένοιτο y el vínculo lógico de ἐπεὶ en una formulación española natural.
  spanish_consistency_notes:
  - Se usó «Dios» conforme al patrón terminológico del proyecto para θεός.
  - Se eligió «mundo» para κόσμος por su amplitud semántica y claridad en español.
  - Se mantuvo la interrogación retórica del original con orden natural del español.
  - La exclamación inicial conserva el tono enfático de la fórmula paulina sin volverla arcaica.
