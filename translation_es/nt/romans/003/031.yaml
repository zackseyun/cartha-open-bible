translation:
  language: es
  text: ¿Anulamos entonces la ley por medio de la fe? ¡De ninguna manera! Al contrario[a], sostenemos la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «establecemos la ley».
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - ley
  lexicon: BDAG
  rationale: Aunque el griego no lleva artículo, en este argumento de Romanos el referente es la ley en sentido definido; el español natural exige el artículo para conservar esa referencia concreta.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: «Entonces» reproduce bien el valor inferencial-retórico de οὖν en una pregunta que concluye el razonamiento previo, sin sonar excesivamente formal.
- source_word: καταργοῦμεν
  english_pob_choice: nullify
  chosen_spanish: anulamos
  alternatives_spanish:
  - invalidamos
  - abolimos
  - dejamos sin efecto
  lexicon: BDAG
  rationale: «Anular» expresa con precisión la idea de hacer inoperante o sin vigencia, y en español conversa mejor con «confirmamos» en el contraste final que «abolimos», que puede sonar más absoluto o legislativo.
- source_word: διὰ τῆς πίστεως
  english_pob_choice: through faith
  chosen_spanish: por medio de la fe
  alternatives_spanish:
  - por la fe
  - a través de la fe
  lexicon: BDAG
  rationale: «Por medio de» hace explícito el valor instrumental de διά con genitivo y mantiene la preferencia del proyecto por «fe» para πίστις.
- source_word: μὴ γένοιτο
  english_pob_choice: May it never be!
  chosen_spanish: ¡De ninguna manera!
  alternatives_spanish:
  - ¡Jamás!
  - ¡Eso no puede ser!
  - ¡Que no sea así!
  lexicon: BDAG
  rationale: La fórmula paulina exige una negación enérgica; «¡De ninguna manera!» comunica rechazo fuerte y natural en español, sin suavizar la réplica retórica.
- source_word: ἀλλὰ
  english_pob_choice: On the contrary
  chosen_spanish: Al contrario
  alternatives_spanish:
  - más bien
  - sino
  lexicon: BDAG
  rationale: «Al contrario» marca el giro correctivo con claridad y mantiene el contraste enfático del griego. En español funciona como equivalente idiomático de la corrección de Pablo.
- source_word: ἱστάνομεν
  english_pob_choice: uphold
  chosen_spanish: confirmamos
  alternatives_spanish:
  - establecemos
  - sostenemos
  - afirmamos
  lexicon: BDAG
  rationale: El griego permite tanto la idea de «establecer» como la de «confirmar/afirmar». Dado el riesgo de que «establecer la ley» suene a instituirla en vez de ratificar su validez, «confirmamos» conserva la tensión lexical sin imponer una lectura sistemática.
theological_decisions:
- issue: Relación entre la fe y la ley
  english_pob_reading: Do not render the verse as faith abolishing the law; present the conclusion as a positive affirmation of the law.
  chosen_spanish_reading: La fe no anula la ley; más bien la confirma.
  alternative_spanish_readings:
  - La fe no abroga la ley; más bien la establece.
  - La fe no invalida la ley; más bien la sostiene.
  rationale: El texto afirma una negación enfática seguida de un contraste positivo. «Confirma» evita la impresión de que la fe sustituye o destruye la ley, y conserva la afirmación de Pablo sin resolver de antemano todas las tensiones interpretativas de Romanos.
  doctrine_reference: Romanos 3:31; comparación con Romanos 3:20-28
- issue: Fuerza de la negación paulina
  english_pob_reading: May it never be!
  chosen_spanish_reading: ¡De ninguna manera!
  alternative_spanish_readings:
  - ¡Que no sea así!
  - ¡Jamás!
  rationale: La respuesta de Pablo es idiomática y enfática. En español, esta fórmula transmite adecuadamente la repulsa retórica sin convertirla en una simple negación informativa.
  doctrine_reference: Uso paulino de μή γένοιτο en Romanos
- issue: Tensión entre «confirmar» y «establecer»
  english_pob_reading: Or "we establish the law."
  chosen_spanish_reading: «confirmamos la ley» en el texto principal, con posibilidad de «establecemos la ley» como alternativa
  alternative_spanish_readings:
  - establecemos la ley
  - afirmamos la ley
  rationale: El griego de ἱστάνομεν admite una gama amplia. Se preserva la opción «establecer» en nota porque el español puede entenderla como fundar/instituir; «confirmar» comunica mejor la idea de ratificar o sostener el valor de la ley en el contexto inmediato.
  doctrine_reference: BDAG sobre ἵστημι / ἱστάνω; Romanos 3:31
translation_notes:
  revision_awareness: 'El antecedente inglés muestra alta concordancia entre revisiones y no introdujo cambios recientes; por eso el borrador español sigue la lectura estable de la nota lexical: mantener un contraste fuerte entre «anular» y una afirmación positiva final, sin sobreexplicar la relación ley-fe.'
  spanish_consistency_notes:
  - Se preserva «fe» para πίστις y «ley» para νόμος de manera consistente con el resto del proyecto.
  - Se evita «SEÑOR» y no hay término divino en este versículo.
  - La nota[a] se ancla en «Al contrario» para reflejar la alternativa léxica principal del cierre griego.
  - «Confirmamos» mantiene un registro bíblico claro y evita la ambigüedad de «establecemos» en español moderno.
