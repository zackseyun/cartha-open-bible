    rationale: La nota «O «establecemos la ley»» está bien, pero funciona mejor si el texto principal expresa claramente la alternativa de mantener/sostener, no otra forma cercana a «confirmar» que deja menos visible la tensión léxica documentada.
  revised_spanish_text: ¿Anulamos entonces la ley por medio de la fe? ¡De ninguna manera! Al contrario[a], sostenemos la ley.
