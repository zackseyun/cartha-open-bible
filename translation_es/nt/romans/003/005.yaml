translation:
  language: es
  text: Pero si nuestra injusticia demuestra la justicia de Dios[a], ¿qué diremos? ¿Es Dios injusto al descargar su ira? (Hablo de manera humana.)
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra injusticia demuestra la rectitud de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδικία
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - injusticia moral
  - maldad
  - injusticia/impiedad
  lexicon: BDAG
  rationale: En español, ἀδικία admite un contraste natural entre la falta humana y la justicia de Dios. Dado que el contexto debate la equidad de Dios al juzgar, «injusticia» comunica mejor aquí la fuerza relacional y forense del término; se conserva la tensión con δικαιοσύνη sin moralizar de más el pasaje.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia de Dios
  lexicon: BDAG
  rationale: El paralelo con ἀδικία favorece «justicia» en español, porque el argumento pregunta si la injusticia humana manifiesta la justicia de Dios. Mantiene abierta la resonancia legal y covenantal del término sin recurrir a una formulación más técnica que podría sonar menos natural.
- source_word: συνίστησιν
  english_pob_choice: demonstrates
  chosen_spanish: demuestra
  alternatives_spanish:
  - muestra
  - pone de manifiesto
  - comenta
  lexicon: BDAG
  rationale: «Demuestra» refleja bien la idea de hacer visible o evidenciar algo en el argumento de Pablo. Es suficientemente fuerte para evitar una lectura meramente declarativa y conserva el valor argumentativo del verbo.
- source_word: μὴ ἄδικος ὁ θεός
  english_pob_choice: Is God unjust?
  chosen_spanish: ¿Es Dios injusto?
  alternatives_spanish:
  - ¿No es Dios injusto?
  - ¿Acaso Dios es injusto?
  lexicon: BDAG
  rationale: La partícula μή introduce una pregunta con expectativa de respuesta negativa. En español, la forma directa interrogativa conserva mejor la fuerza retórica del griego que una pregunta con negación explícita añadida; no se añade un tag del tipo «¿verdad?» para no cargar el texto.
- source_word: ἐπιφέρων τὴν ὀργήν
  english_pob_choice: to inflict wrath
  chosen_spanish: al traer la ira
  alternatives_spanish:
  - al infligir ira
  - al hacer venir la ira
  - al hacer caer la ira
  lexicon: BDAG
  rationale: «Traer la ira» sigue de cerca el movimiento semántico de ἐπιφέρω y evita una paráfrasis demasiado interpretativa. «Ira» conserva ὀργή como juicio airado divino; en español suena natural junto a la pregunta sobre la justicia de Dios.
- source_word: κατὰ ἄνθρωπον λέγω
  english_pob_choice: I am speaking in a human way
  chosen_spanish: Hablo como hombre.
  alternatives_spanish:
  - Hablo humanamente.
  - Hablo según el hombre.
  - Lo digo humanamente.
  lexicon: BDAG
  rationale: La frase idiomática se vierte de forma breve y reconocible en español. «Hablo como hombre» preserva la idea de un modo de hablar meramente humano o acomodado a un razonamiento humano, sin ampliar innecesariamente el alcance del matiz.
theological_decisions:
- issue: Forma de la pregunta retórica sobre la justicia de Dios al juzgar
  english_pob_reading: 'Express the question with an expected negative answer: “Is God unjust to inflict wrath?”'
  chosen_spanish_reading: ¿Es Dios injusto al traer la ira?
  alternative_spanish_readings:
  - ¿No es Dios injusto al traer la ira?
  - ¿Acaso Dios es injusto al traer la ira?
  rationale: Se conserva la pregunta retórica sin convertirla en una afirmación ni suavizarla con un cierre explicativo. La expectativa de respuesta negativa está implícita en la forma de la pregunta, respetando la tensión del argumento paulino y la partícula μή.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla prematuramente; la traducción no debe adelantarse al desarrollo argumental de Romanos 3.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés coinciden en la lectura principal: ἀδικία se mantiene como contraparte moral/forense de δικαιοσύνη; συνίστησιν expresa evidencia o demostración; μή introduce una pregunta con respuesta negativa esperada; y κατὰ ἄνθρωπον λέγω funciona como disculpa metodológica, no como contenido doctrinal. La revisión inglesa reciente eliminó un tag negativo añadido, y la formulación española sigue esa corrección al dejar la pregunta en forma directa.'
  spanish_consistency_notes:
  - Se usa «Dios» en lugar de una máscara nominal, conforme al criterio del proyecto para θεός.
  - Se prefiere «justicia» para δικαιοσύνη en el texto principal por la simetría con «injusticia» y el argumento de Romanos 3.
  - «Ira» se mantiene como traducción de ὀργή en sentido judicial/escatológico.
  - La nota al pie conserva la alternativa lexical principal entre «injusticia» y «justicia» como corresponde al audit trail inglés.
