review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: condición inicial, pregunta retórica, referencia a la ira divina y la aclaración final. También acierta al usar «injusticia» / «justicia» para ἀδικία / δικαιοσύνη en este contexto paulino. Sin embargo, hay dos problemas de fidelidad auditada: (1) la nota [a] no preserva la alternativa inglesa documentada, porque repite el mismo texto principal en vez de dar la opción contrastiva; (2) «al traer la ira» es posible, pero en español bíblico actual suena menos natural y menos judicial que una opción como «al imponer castigo con ira» o «al descargar su ira»; dado el inglés POB y el sentido de ἐπιφέρων τὴν ὀργήν, conviene una formulación más idiomática sin perder el juicio divino.'
  spanish_quality_summary: La oración es legible y digna, pero la nota es defectuosa y «Hablo como hombre» suena algo ambigua en español contemporáneo, pudiendo insinuar masculinidad más que perspectiva humana. «Hablo de manera humana» comunica mejor el modismo κατὰ ἄνθρωπον λέγω. Asimismo, «traer la ira» es comprensible pero poco natural; una formulación más idiomática mejora la claridad.
  glossary_alignment: 'Se mantiene «Dios» correctamente. La elección «justicia» para δικαιοσύνη y «injusticia» para ἀδικία concuerda con las decisiones contextuales del proyecto. No hay conflicto con otros términos doctrinales globales. La principal desviación es documental: la nota léxica debe preservar la alternativa «injusticia / justicia» frente a la opción principal, no duplicar la redacción principal.'
  issues:
  - severity: high
    issue: La nota [a] repite el texto principal y no conserva la alternativa léxica auditada.
    rationale: 'El inglés POB preserva una alternativa real: “our injustice demonstrates God’s justice.” En español, si el texto principal usa «injusticia» y «justicia», la nota debe dar la alternativa contrastiva, p. ej. «nuestra injusticia demuestra la rectitud de Dios» o, si se invierte el principal, la otra combinación. La nota actual no aporta ninguna variante.'
  - severity: medium
    issue: «al traer la ira» suena poco idiomático y debilita el matiz judicial de ἐπιφέρων τὴν ὀργήν.
    rationale: Aunque «traer» puede calcar el movimiento del verbo, en español natural aplicado a Dios y juicio resulta mejor una expresión como «al descargar su ira» o «al ejecutar ira/castigo». Esto preserva mejor el sentido de imposición de juicio.
  - severity: medium
    issue: «Hablo como hombre» es ambiguo en español actual.
    rationale: La expresión puede entenderse como referencia al sexo masculino o a hablar ‘como cualquier hombre’, no necesariamente como un modismo de perspectiva humana. «Hablo de manera humana» o «Estoy hablando en términos humanos» comunica con más claridad el disclaimer paulino.
  revised_spanish_text: Pero si nuestra injusticia demuestra la justicia de Dios[a], ¿qué diremos? ¿Es Dios injusto al descargar su ira? (Hablo de manera humana.)
  revised_footnotes:
