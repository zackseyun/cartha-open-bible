revisions:
- from: Pero si nuestra injusticia[a] demuestra la justicia de Dios, ¿qué diremos? ¿Es Dios injusto al traer la ira? (Hablo como hombre.)
  to: Pero si nuestra injusticia demuestra la justicia de Dios[a], ¿qué diremos? ¿Es Dios injusto al descargar su ira? (Hablo de manera humana.)
  rationale: Se corrige la nota para que preserve una alternativa léxica real conforme al expediente inglés, se mejora «traer la ira» por una expresión española más natural y judicial, y se aclara el modismo final para evitar ambigüedad en español contemporáneo. Los cambios son menores y no requieren nueva adjudicación doctrinal.
