translation:
  language: es
  text: Sus pies son veloces para derramar sangre.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «agudos son sus pies para derramar sangre».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὀξεῖς
  english_pob_choice: swift
  chosen_spanish: veloces
  alternatives_spanish:
  - rápidos
  - agudos
  lexicon: BDAG
  rationale: El griego literalmente puede ser 'agudos', pero en este giro aplicado a los pies el sentido natural es de prontitud para la acción violenta. 'Veloces' comunica esa urgencia en español sin perder el valor dinámico del término.
- source_word: πόδες
  english_pob_choice: feet
  chosen_spanish: pies
  alternatives_spanish:
  - pies de ellos
  lexicon: BDAG
  rationale: Es la equivalencia directa y natural en español; conserva la imagen corporal del texto.
- source_word: ἐκχέαι
  english_pob_choice: to shed
  chosen_spanish: derramar
  alternatives_spanish:
  - verter
  - hacer correr
  lexicon: BDAG
  rationale: Aunque el verbo puede significar literalmente 'verter', con 'sangre' en español 'derramar' expresa de forma idiomática la violencia del acto y mantiene la fuerza del original.
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: BDAG
  rationale: Es la traducción estándar y precisa del sustantivo; no hay motivo contextual para variarla.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa naturalmente con 'sus' en español, conservando la referencia a los pies de los sujetos del pasaje.
translation_notes:
  revision_awareness: El texto griego y el registro auditado en inglés coinciden en la imagen idiomática de pies rápidos/preparados para derramar sangre; no se registran revisiones textuales o de traducción que afecten este verso.
  spanish_consistency_notes:
  - Se mantuvo un español moderno y sobrio, apto para lectura pública.
  - Se preservó la metáfora corporal del original en vez de convertirla en una paráfrasis abstracta.
  - La nota recoge la alternativa más literal del griego, en paralelo con la observación auditada en inglés.
