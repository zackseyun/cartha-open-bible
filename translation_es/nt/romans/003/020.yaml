review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura causal del griego y la terminología clave de δικαιόω, νόμος y ἐπίγνωσις. Sin embargo, dos puntos requieren ajuste para reflejar mejor el sentido y la legibilidad: (1) πᾶσα σὰρξ como ''ninguna carne'' suena poco idiomático en español bíblico actual; conviene usar ''nadie'' o ''ningún ser humano'' en el texto principal y preservar la literalidad en nota, especialmente porque el propio paquete fuente identifica el valor idiomático de humanidad general. (2) ''es el conocimiento del pecado'' calca el griego de manera torpe; en español natural y fiel debe expresarse ''viene el conocimiento del pecado'' o equivalente.'
  spanish_quality_summary: El borrador es comprensible, pero 'ninguna carne será justificada' resulta rígido y extraño para lectores hispanos, y 'pues por medio de la ley es el conocimiento del pecado' no es una oración natural. La revisión propuesta mantiene tono digno y precisión paulina, con mejor fluidez y claridad.
  glossary_alignment: 'Alinea bien ''ley'', ''justificada'' y ''pecado''. No hay términos del glosario mayor en disputa como Yahvé o Mesías. La decisión sobre σάρξ debe seguir la nota doctrinal del expediente: aquí no significa ''naturaleza pecaminosa'', sino humanidad; por eso en español conviene una forma idiomática en texto y la literal en nota.'
  issues:
  - severity: medium
    issue: πᾶσα σὰρξ traducido como 'ninguna carne' en el texto principal
    rationale: Aunque formalmente cercano al inglés revisado 'no flesh', en español contemporáneo eclesial suena antinatural y puede distraer o sugerir un sentido físico no pretendido. El expediente fuente explica que se trata de un modismo para la humanidad general; conviene comunicar eso en el texto principal y conservar la forma literal en nota.
  - severity: medium
    issue: '''es el conocimiento del pecado'' es un calco gramatical poco natural'
    rationale: 'ἐπίγνωσις ἁμαρτίας con διὰ γὰρ νόμου expresa resultado/medio: ''por medio de la ley viene el conocimiento del pecado''. La forma actual no suena a español normal y dificulta la lectura pública.'
  revised_spanish_text: porque por obras de la ley nadie será justificado delante de él[a], pues por medio de la ley viene el conocimiento del pecado.
  revised_footnotes:
  - marker: a
    text: Literalmente, 'ninguna carne'.
    reason: lexical_alternative
  revision_rationale: Se cambia 'ninguna carne' por 'nadie' para comunicar en español natural el modismo πᾶσα σὰρξ como referencia universal a la humanidad, preservando la literalidad en nota. Se ajusta 'es el conocimiento' a 'viene el conocimiento' para expresar con fidelidad y buena sintaxis el resultado señalado por διὰ γὰρ νόμου ἐπίγνωσις ἁμαρτίας. El resto del verso se mantiene por ser fiel y claro.
