revisions:
- from: porque por obras de la ley ninguna carne[a] será justificada delante de él, pues por medio de la ley es el conocimiento del pecado.
  to: porque por obras de la ley nadie será justificado delante de él[a], pues por medio de la ley viene el conocimiento del pecado.
  rationale: Se cambia 'ninguna carne' por 'nadie' para comunicar en español natural el modismo πᾶσα σὰρξ como referencia universal a la humanidad, preservando la literalidad en nota. Se ajusta 'es el conocimiento' a 'viene el conocimiento' para expresar con fidelidad y buena sintaxis el resultado señalado por διὰ γὰρ νόμου ἐπίγνωσις ἁμαρτίας. El resto del verso se mantiene por ser fiel y claro.
