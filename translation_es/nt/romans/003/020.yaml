translation:
  language: es
  text: porque por obras de la ley nadie será justificado delante de él[a], pues por medio de la ley viene el conocimiento del pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'ninguna carne'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la afirmación anterior con causalidad clara y natural en español contemporáneo.
- source_word: ἐξ ἔργων νόμου
  english_pob_choice: by works of the law
  chosen_spanish: por obras de la ley
  alternatives_spanish:
  - a partir de obras de la ley
  - mediante obras de la ley
  lexicon: BDAG
  rationale: Mantiene la construcción paulina sin sobreexplicar el genitivo; 'por' comunica bien la base o medio en español.
- source_word: οὐ δικαιωθήσεται
  english_pob_choice: will be justified
  chosen_spanish: será justificada
  alternatives_spanish:
  - será declarada justa
  - será absuelta
  lexicon: BDAG
  rationale: '''Justificada'' conserva el lenguaje forense paulino y corresponde al uso establecido de δικαιόω en este contexto.'
- source_word: πᾶσα σὰρξ
  english_pob_choice: no flesh
  chosen_spanish: ninguna carne
  alternatives_spanish:
  - toda carne
  - ningún ser humano
  lexicon: BDAG
  rationale: Se preserva la fuerza literal de σάρξ como 'carne' en la frase paulina, evitando una paráfrasis demasiado interpretativa; 'ninguna' expresa la negación universal.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: BDAG
  rationale: '''Delante de él'' conserva el sentido judicial y relacional, con español natural y digno.'
- source_word: διὰ γὰρ νόμου
  english_pob_choice: for through the law
  chosen_spanish: pues por medio de la ley
  alternatives_spanish:
  - porque por la ley
  - ya que por medio de la ley
  lexicon: BDAG
  rationale: '''Por medio de'' expresa con claridad el valor instrumental de διά con genitivo en español.'
- source_word: ἐπίγνωσις
  english_pob_choice: the knowledge
  chosen_spanish: el conocimiento
  alternatives_spanish:
  - el reconocimiento
  - la plena comprensión
  lexicon: BDAG
  rationale: '''Conocimiento'' reproduce el sustantivo sin estrecharlo indebidamente; en este contexto es el resultado cognitivo que la ley produce respecto del pecado.'
- source_word: ἁμαρτίας
  english_pob_choice: of sin
  chosen_spanish: del pecado
  alternatives_spanish:
  - del pecado humano
  lexicon: BDAG
  rationale: El genitivo se vierte de manera directa y sobria; 'del pecado' es la forma más natural y fiel en español.
theological_decisions:
- issue: Sentido de πᾶσα σὰρξ
  english_pob_reading: Idiomatic reference to all humanity, rendered 'no flesh' in context.
  chosen_spanish_reading: Se mantiene la expresión literal 'ninguna carne' para preservar la formulación paulina, entendida como referencia universal a la humanidad.
  alternative_spanish_readings:
  - ningún ser humano
  - toda persona
  rationale: El texto griego usa la expresión idiomática πᾶσα σὰρξ. La versión inglesa revisó desde 'no one' a 'no flesh' para acercarse más al original; el español puede conservar la literalidad sin perder inteligibilidad, y así no diluye la tensión léxica de σάρξ.
  doctrine_reference: σάρξ = 'carne' literal / idiomática para la humanidad en general; no se reduce aquí a 'naturaleza pecaminosa'.
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió 'no one' a 'no flesh' para reflejar mejor πᾶσα σὰρξ. El español sigue esa revisión conservando la literalidad de 'carne' en un registro publicable y comprensible.
  spanish_consistency_notes:
  - Se usa 'ley' para νόμος de manera uniforme, conforme al uso paulino en este pasaje.
  - '''Justificada'' conserva el término técnico forense y evita sustituirlo por una paráfrasis menos precisa.'
  - La nota al pie conserva la alternativa literal y ayuda a transparentar la idiomaticidad de πᾶσα σὰρξ.
  - '''Delante de él'' mantiene la orientación relacional/judicial sin introducir un matiz ajeno al griego.'
