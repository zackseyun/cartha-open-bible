translation:
  language: es
  text: pues Dios es uno[a], quien justificará al circunciso[b] por la fe y al incircunciso[b] mediante la fe[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si en verdad Dios es uno».'
    reason: alternative_reading
  - marker: b
    text: El griego usa «circuncisión» e «incircuncisión» por metonimia para decir «el circunciso» y «el incircunciso».
    reason: cultural_note
  - marker: c
    text: Pablo usa dos expresiones distintas, «por la fe» y «mediante la fe»; la diferencia puede ser estilística más que un contraste doctrinal fuerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴπερ
  english_pob_choice: since
  chosen_spanish: pues
  alternatives_spanish:
  - ya que
  - puesto que
  - si en verdad
  lexicon: BDAG
  rationale: En este contexto argumentativo, εἴπερ funciona como base inferencial más que como duda. «Pues» comunica bien la relación causal o explicativa en español sin volver hipotética la afirmación.
- source_word: εἷς ὁ θεός
  english_pob_choice: God is one
  chosen_spanish: Dios es uno
  alternatives_spanish:
  - hay un solo Dios
  - Dios es uno solo
  lexicon: BDAG
  rationale: «Dios es uno» conserva la afirmación monoteísta enfática y suena natural en español. La opción «hay un solo Dios» explicita la existencia, pero suaviza un poco la formulación compacta del griego.
- source_word: δικαιώσει
  english_pob_choice: will justify
  chosen_spanish: justificará
  alternatives_spanish:
  - declarará justo
  - hará justo
  lexicon: BDAG
  rationale: Se mantiene el futuro y el verbo paulino habitual «justificar» para δικαιόω. «Declarará justo» es posible, pero el término tradicional y técnicamente preciso aquí es «justificará».
- source_word: περιτομὴν
  english_pob_choice: the circumcised
  chosen_spanish: al circunciso
  alternatives_spanish:
  - a los circuncisos
  - la circuncisión
  lexicon: BDAG
  rationale: El sustantivo funciona metonímicamente por las personas circuncidadas. En singular colectivo, «al circunciso» es una forma natural en español para expresar ese sentido sin convertirlo en el rito mismo.
- source_word: ἐκ πίστεως
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - a partir de la fe
  - sobre la base de la fe
  lexicon: BDAG
  rationale: «Por la fe» expresa adecuadamente la base o medio indicado por ἐκ y es idiomático en español bíblico actual. Se evita «desde la fe», que suena menos claro en este contexto.
- source_word: ἀκροβυστίαν
  english_pob_choice: the uncircumcised
  chosen_spanish: al incircunciso
  alternatives_spanish:
  - a los incircuncisos
  - la incircuncisión
  lexicon: BDAG
  rationale: Como con περιτομήν, se trata de una metonimia para personas. «Al incircunciso» preserva esa referencia personal y evita que el lector entienda solo la abstracción ritual.
- source_word: διὰ τῆς πίστεως
  english_pob_choice: through faith
  chosen_spanish: mediante la fe
  alternatives_spanish:
  - por la fe
  - a través de la fe
  lexicon: BDAG
  rationale: Se conserva una diferencia visible frente a ἐκ πίστεως. «Mediante» refleja con claridad διά como medio/instrumento y ayuda a mantener la tensión preposicional del griego.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Se mantiene el sentido estándar de πίστις como «fe». En este versículo no se requiere desplazar el término hacia «fidelidad» ni hacia otra lectura menos directa.
theological_decisions:
- issue: Si εἴπερ debe sonar condicional o inferencial
  english_pob_reading: since God is one
  chosen_spanish_reading: pues Dios es uno
  alternative_spanish_readings:
  - si en verdad Dios es uno
  - ya que Dios es uno
  rationale: La secuencia del argumento de Pablo favorece una base compartida, no una duda. «Pues» deja abierta la fuerza inferencial/causal sin forzar una condición hipotética.
  doctrine_reference: Preservar la fuerza argumentativa del monoteísmo en Romanos 3:30.
- issue: Si πρέπει distinguirse doctrinalmente entre ἐκ πίστεως y διὰ τῆς πίστεως
  english_pob_reading: '''by faith'' and ''through faith''; the difference may be stylistic rather than a sharp contrast'
  chosen_spanish_reading: por la fe ... mediante la fe
  alternative_spanish_readings:
  - por la fe ... por la fe
  - desde la fe ... por la fe
  rationale: Se conserva la diferencia preposicional visible en el griego sin afirmar una oposición teológica más fuerte de la que el contexto exige. La traducción mantiene la tensión textual en lugar de resolverla.
  doctrine_reference: Preservar la tensión teológica y estilística del texto griego.
translation_notes:
  revision_awareness: 'Coincide con el control más reciente: no se requieren revisiones respecto del texto griego y del audit trail inglés. Se conserva la equivalencia óptima, la afirmación monoteísta y la diferencia preposicional entre ἐκ y διά.'
  spanish_consistency_notes:
  - Se usa «Dios» sin sustitución por una convención de mayúsculas litúrgicas, porque el versículo habla de θεός de manera general y no hay aquí un reemplazo del nombre divino.
  - Se mantiene «fe» para πίστις en ambas ocurrencias, siguiendo la consistencia del proyecto.
  - Se conserva el lenguaje personal «al circunciso / al incircunciso» para reflejar la metonimia del griego.
  - La diferencia entre «por la fe» y «mediante la fe» permite ver la variación preposicional del original sin exagerarla.
