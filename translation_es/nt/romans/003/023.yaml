translation:
  language: es
  text: Porque todos han pecado y carecen[a] de la gloria de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están faltos de la gloria de Dios» o «les falta la gloria de Dios».
    reason: lexical_alternative
  - marker: b
    text: La expresión «la gloria de Dios» puede referirse a la gloria propia de Dios, a la gloria que el ser humano estaba destinado a reflejar o a la gloria concedida por Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los seres humanos
  - toda persona
  lexicon: BDAG
  rationale: El plural nominativo tiene alcance universal en el contexto de Pablo. «Todos» mantiene la amplitud de la afirmación sin añadir contenido que no está en el griego.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: «Porque» comunica con naturalidad la fuerza explicativa de γάρ y enlaza el versículo con el argumento previo en español.
- source_word: ἥμαρτον
  english_pob_choice: have sinned
  chosen_spanish: han pecado
  alternatives_spanish:
  - pecaron
  lexicon: BDAG
  rationale: El aoristo resume la realidad del pecado humano. En español, «han pecado» expresa bien el hecho consumado con relevancia presente, sin volverlo demasiado narrativo.
- source_word: ὑστεροῦνται
  english_pob_choice: fall short
  chosen_spanish: están faltos de
  alternatives_spanish:
  - carecen de
  - quedan cortos de
  - fallan en alcanzar
  lexicon: BDAG
  rationale: La forma presente sugiere una condición vigente. «Están faltos de» conserva la idea de deficiencia continua; además, permite una lectura cercana a «carecen de» sin perder el matiz de insuficiencia.
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: BDAG
  rationale: «Gloria» es el equivalente teológicamente establecido para δόξα en este contexto y conserva la referencia divina del texto.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - otorgada por Dios
  lexicon: BDAG
  rationale: El genitivo se traduce de manera directa como «de Dios» para no resolver prematuramente la relación exacta entre la gloria y Dios; así se preserva la amplitud semántica del griego.
theological_decisions:
- issue: Sentido de «la gloria de Dios»
  english_pob_reading: Rendered neutrally as 'the glory of God' without interpretive expansion.
  chosen_spanish_reading: «la gloria de Dios» sin expansión interpretativa
  alternative_spanish_readings:
  - la gloria que viene de Dios
  - el estándar glorioso de Dios
  - participar de la gloria de Dios
  rationale: 'La frase griega es compacta y admite más de una relación teológica posible: la gloria propia de Dios, la gloria que el ser humano debía reflejar o la gloria concedida por Dios. La traducción mantiene esa tensión en lugar de cerrarla en el texto principal.'
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: 'Coincide con el pasaje de revisión más reciente: no se registraron cambios necesarios y el veredicto de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se prefirió «gloria» para δόξα y no se sustituyó por «honor» o «esplendor» en el texto principal.
  - Se evitó el calco rígido de «fall short» en favor de una construcción española natural que conserva la idea de deficiencia.
  - Los marcadores de nota aparecen en el texto en el mismo orden que las notas adjuntas.
