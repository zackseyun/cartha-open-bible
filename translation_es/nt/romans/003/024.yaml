translation:
  language: es
  text: siendo justificados gratuitamente por su gracia, por medio de la redención que está en Mesías Jesús[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tradicional: «Cristo Jesús».'
    reason: alternative_reading
  - marker: b
    text: 'O: «siendo declarados justos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιούμενοι
  english_pob_choice: being justified
  chosen_spanish: siendo justificados
  alternatives_spanish:
  - siendo declarados justos
  - siendo declarados rectos
  lexicon: BDAG
  rationale: Conserva el participio presente y el valor forense/legal de δικαιόω sin expandirlo indebidamente. «Justificados» es la forma más natural en español bíblico para el término paulino; «declarados justos» explicita el matiz, pero es más interpretativo y menos conciso.
- source_word: δωρεὰν
  english_pob_choice: freely
  chosen_spanish: gratuitamente
  alternatives_spanish:
  - libremente
  - como regalo
  - sin costo
  lexicon: BDAG
  rationale: El adverbio comunica que la justificación se concede sin mérito ni pago. «Gratuitamente» preserva bien la idea de don inmerecido en español y suena natural en registro bíblico.
- source_word: χάριτι
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: «Gracia» es el equivalente estable y teológicamente preciso en Pablo. Mantiene la referencia a la acción inmerecida de Dios sin diluirla en un sentido más general de favor.
- source_word: ἀπολυτρώσεως
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - liberación
  - rescate-redención
  lexicon: BDAG
  rationale: «Redención» conserva la fuerza de liberación mediante precio/rescate que suele tener el término en contexto soteriológico. Es el equivalente estándar y más transparente en español cristiano.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: that is in Messiah Jesus
  chosen_spanish: que está en Mesías Jesús
  alternatives_spanish:
  - que está en Cristo Jesús
  - en Jesús el Mesías
  lexicon: BDAG
  rationale: Se mantiene «Mesías» según la convención del proyecto para Χριστός cuando funciona como título, y se preserva la relación locativa de la frase. «Cristo Jesús» se reserva como alternativa tradicional documentada, pero no se adopta en el texto principal.
theological_decisions:
- issue: Naturaleza de la justificación paulina
  english_pob_reading: Retain 'justified' in the main text rather than replacing it with a fuller interpretive gloss.
  chosen_spanish_reading: Conservar «justificados» en el texto principal, sin sustituirlo por una paráfrasis explicativa.
  alternative_spanish_readings:
  - siendo declarados justos
  - siendo considerados justos
  rationale: El griego δικαιούμενοι es compacto y mantiene el lenguaje forense de Pablo. «Justificados» reproduce esa tensión teológica sin resolverla en una glosa que podría desdibujar el vínculo con el uso paulino de δικαιόω.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Título cristológico Χριστῷ
  english_pob_reading: Use 'Messiah' in the main text, preserving 'Christ Jesus' as traditional alternative.
  chosen_spanish_reading: Usar «Mesías» en el texto principal y dejar «Cristo Jesús» como alternativa tradicional.
  alternative_spanish_readings:
  - Cristo Jesús
  - Jesucristo
  rationale: La política del proyecto para Χριστός favorece «Mesías» cuando actúa como título. En este versículo la referencia es claramente titular, por lo que la traducción principal debe reflejarlo; la forma tradicional se conserva solo como variante documentada.
  doctrine_reference: Project terminology default for Χριστός / Messiah language
translation_notes:
  revision_awareness: 'El expediente inglés muestra una oscilación editorial sobre Χριστῷ Ἰησοῦ: una revisión intermedia cambió «Messiah Jesus» por «Christ Jesus», pero luego se restauró «Messiah Jesus» por coherencia doctrinal. Por eso el texto español principal adopta «Mesías Jesús» y conserva «Cristo Jesús» solo en nota como alternativa tradicional documentada.'
  spanish_consistency_notes:
  - Se mantuvo la estructura participial «siendo justificados» para reflejar el griego y el inglés POB.
  - Se evitó «SEÑOR» o sustituciones equivalentes, porque no hay aquí el nombre divino sino la expresión cristológica Χριστός.
  - 'La colocación de las notas sigue el orden de los marcadores del POB: primero la alternativa lexical de δικαιούμενοι, luego la alternativa tradicional de Χριστός.'
