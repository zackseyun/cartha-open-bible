translation:
  language: es
  text: a quien Dios presentó como propiciación[a] por medio de la fe en su sangre[b], para demostrar su justicia[c], a causa de haber pasado por alto los pecados cometidos anteriormente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «propiciatorio»; o «sacrificio de expiación».
    reason: lexical_alternative
  - marker: b
    text: O «por medio de la fe, por su sangre»; la frase también puede entenderse como «por su sangre, por medio de la fe».
    reason: alternative_reading
  - marker: c
    text: O «rectitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: προέθετο
  english_pob_choice: put forward
  chosen_spanish: puso
  alternatives_spanish:
  - presentó
  - dispuso públicamente
  lexicon: BDAG
  rationale: «Puso» comunica de manera natural en español la acción de colocar u ofrecer públicamente, sin añadir una carga interpretativa mayor que la del griego. «Presentó» y «dispuso públicamente» son posibles, pero «puso» conserva mejor la tersura del versículo en español.
- source_word: ἱλαστήριον
  english_pob_choice: propitiation
  chosen_spanish: propiciación
  alternatives_spanish:
  - propiciatorio
  - sacrificio de expiación
  lexicon: BDAG
  rationale: «Propiciación» mantiene el parentesco léxico con el inglés auditado y conserva la fuerza cultual y teológica del término sin reducirlo a una sola explicación. «Propiciatorio» y «sacrificio de expiación» son alternativas legítimas, pero la primera puede sonar demasiado técnica/objetiva y la segunda interpreta más explícitamente el término.
- source_word: διὰ πίστεως
  english_pob_choice: through faith
  chosen_spanish: por medio de la fe
  alternatives_spanish:
  - por la fe
  - a través de la fe
  lexicon: BDAG
  rationale: La frase griega admite una relación instrumental o mediadora; «por medio de la fe» es claro en español y preserva esa mediación sin forzar una lectura más estrecha.
- source_word: ἐν τῷ αὐτοῦ αἵματι
  english_pob_choice: in his blood
  chosen_spanish: en su sangre
  alternatives_spanish:
  - por su sangre
  - mediante su sangre
  lexicon: BDAG
  rationale: «En su sangre» sigue de cerca la forma griega y deja abierta la relación sintáctica con el término anterior, como en el audit trail inglés. Las alternativas instrumentales son válidas, pero el texto principal conserva la transparencia formal.
- source_word: εἰς ἔνδειξιν
  english_pob_choice: to demonstrate
  chosen_spanish: para demostrar
  alternatives_spanish:
  - para manifestar
  - como demostración de
  lexicon: BDAG
  rationale: «Para demostrar» transmite con naturalidad la finalidad visible del sintagma y mantiene la fuerza declarativa del griego.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: Aunque el inglés POB conserva «righteousness», en español «justicia» comunica mejor el alcance forense y ético de δικαιοσύνη en Romanos. «Rectitud» es posible, pero puede sonar más moralista y menos jurídico-covenantal.
- source_word: πάρεσιν
  english_pob_choice: passing over
  chosen_spanish: remisión
  alternatives_spanish:
  - pasar por alto
  - tolerancia
  lexicon: BDAG
  rationale: El sustantivo griego expresa un dejar pasar/no castigar en el período previo; «remisión» es la opción más idiomática en español bíblico, aunque no agota del todo la diferencia con πλήρης ἄφεσις. Se conserva así la tensión entre “dejar pasar” y “perdonar plenamente” sin caer en una expresión extraña.
- source_word: προγεγονότων ἁμαρτημάτων
  english_pob_choice: previously committed sins
  chosen_spanish: pecados cometidos anteriormente
  alternatives_spanish:
  - pecados anteriores
  - pecados previamente cometidos
  lexicon: BDAG
  rationale: Esta formulación reproduce claramente la referencia temporal del participio compuesto y su objeto, con español natural y preciso.
theological_decisions:
- issue: Cómo rendir ἱλαστήριον en un contexto paulino con fuerte carga cultual y doctrinal
  english_pob_reading: propitiation
  chosen_spanish_reading: propiciación
  alternative_spanish_readings:
  - propiciatorio
  - sacrificio de expiación
  rationale: La traducción principal mantiene la ambigüedad reverente del término y no la reduce a una sola imagen. «Propiciación» permite conservar el debate entre expiación, propiciación y alusión al lugar del sacrificio, sin imponer una paráfrasis explicativa en el texto principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: ἱλαστήριον'
- issue: Cómo entender la relación entre διὰ πίστεως y ἐν τῷ αὐτοῦ αἵματι
  english_pob_reading: through faith in his blood
  chosen_spanish_reading: por medio de la fe en su sangre
  alternative_spanish_readings:
  - por medio de la fe, por su sangre
  - por la fe en su sangre
  rationale: La lectura principal sigue la constricción más natural del audit trail inglés y mantiene la posibilidad de que «en su sangre» modifique la provisión de Dios o la esfera sacrificial. No se elimina la ambigüedad sintáctica del griego; solo se la expresa con español legible.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Cómo renderizar δικαιοσύνη en Romanos
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: En Romanos, δικαιοσύνη incluye no solo rectitud moral sino también justicia judicial y fidelidad del obrar divino. «Justicia» preserva mejor esa amplitud en español contemporáneo; «rectitud» puede servir, pero estrecha el alcance en este contexto.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó ἱλαστήριον de «atoning sacrifice» a «propitiation» por mayor correspondencia léxica. Esta propuesta española sigue ese ajuste con «propiciación» en el texto principal, pero conserva las alternativas interpretativas relevantes en nota. También respeta la revisión que mantiene la lectura de διὰ πίστεως ἐν τῷ αὐτοῦ αἵματι como una construcción debatida, sin resolverla de forma excesiva.
  spanish_consistency_notes:
  - Se evitó «Señor» para el nombre divino porque el texto griego aquí dice θεός y no κύριος.
  - Se eligió «justicia» como equivalente principal de δικαιοσύνη, consistente con el uso paulino y con el criterio doctrinal del proyecto.
  - Se mantuvo una sintaxis sobria y transparente, adecuada para lectura pública y revisión auditada.
  - Las notas de pie preservan las tensiones léxicas más importantes sin sobrecargar el texto principal.
