revisions:
- from: a quien Dios puso como propiciación[a] por medio de la fe en su sangre[b], para demostrar su justicia[c], a causa de la remisión de los pecados cometidos anteriormente.
  to: a quien Dios presentó como propiciación[a] por medio de la fe en su sangre[b], para demostrar su justicia[c], a causa de haber pasado por alto los pecados cometidos anteriormente.
  rationale: Se revisa el texto para preservar mejor la evidencia fuente y el audit trail inglés. «Presentó» expresa con más naturalidad española el sentido de προέθετο. Se reemplaza «remisión» por «haber pasado por alto» para reflejar πάρεσιν como tolerancia temporal/no castigo, no perdón pleno. Se corrige la nota sintáctica sobre «fe/sangre» para que realmente preserve la alternativa debatida. La nota sobre δικαιοσύνη se ajusta para no repetir el mismo término del texto principal.
