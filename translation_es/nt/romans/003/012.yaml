    rationale: La nota [a] anclada en 'se desviaron' explica χρηστότητα, que pertenece a 'lo bueno'; y la nota [b] no corresponde exactamente a cómo el inglés auditado distribuye las alternativas. Esto rompe la trazabilidad del audit trail y puede confundir al lector.
  - severity: medium
