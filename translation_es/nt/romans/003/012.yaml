translation:
  language: es
  text: Todos se desviaron; juntos se volvieron inútiles[a]. No hay quien haga lo bueno[b]; no hay ni siquiera uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se volvieron sin valor»; también puede entenderse como «se volvieron corruptos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «No hay quien haga bondad», con χρηστότητα también en el sentido de «benignidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Todas las personas
  - Todos los seres humanos
  lexicon: BDAG
  rationale: Mantiene el alcance universal del plural sin añadir un sustantivo explícito que el griego no expresa.
- source_word: ἐξέκλιναν
  english_pob_choice: have turned aside
  chosen_spanish: se desviaron
  alternatives_spanish:
  - se apartaron
  - se extraviaron
  lexicon: BDAG
  rationale: Expresa la idea moral de apartarse del camino con un español natural y con el sentido perfecto/resultativo del aoristo.
- source_word: ἅμα
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - todos juntos
  - al mismo tiempo
  lexicon: BDAG
  rationale: En este contexto colectivo, subraya que la condición es compartida por todos.
- source_word: ἠχρεώθησαν
  english_pob_choice: have become worthless
  chosen_spanish: se volvieron inútiles
  alternatives_spanish:
  - se volvieron inútiles e incapaces
  - se corrompieron
  lexicon: BDAG
  rationale: Conserva la valoración negativa fuerte del verbo sin sonar excesivamente abstracto en español; 'inútiles' también puede sugerir 'sin valor'.
- source_word: ποιῶν
  english_pob_choice: does
  chosen_spanish: haga
  alternatives_spanish:
  - practique
  - haya que hace
  lexicon: BDAG
  rationale: 'El participio sustantivado se vierte de forma idiomática como una cláusula relativa: ''quien haga'', preservando la acción habitual implícita.'
- source_word: χρηστότητα
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - la bondad
  - la benignidad
  lexicon: BDAG
  rationale: En este contexto moral, 'lo bueno' suena natural y mantiene el valor ético general del sustantivo, mientras que 'bondad' o 'benignidad' estrecharían o desplazarían el matiz.
- source_word: οὐκ ἔστιν
  english_pob_choice: There is no one
  chosen_spanish: No hay
  alternatives_spanish:
  - No existe
  - No se encuentra
  lexicon: BDAG
  rationale: Es la forma española más natural para introducir la negación existencial y conservar el énfasis absoluto del griego.
- source_word: ἕως ἑνός
  english_pob_choice: not even one
  chosen_spanish: ni siquiera uno
  alternatives_spanish:
  - ni uno solo
  - aun uno
  lexicon: BDAG
  rationale: Reproduce la conclusión enfática de exclusión total con una fórmula natural en español.
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso del paquete fuente y el control de revisión más reciente, sin cambios sustanciales respecto al sentido auditado en inglés.
  spanish_consistency_notes:
  - Se preserva el paralelismo de la doble negación final con 'No hay...; no hay ni siquiera uno'.
  - '''Lo bueno'' evita introducir una abstracción distinta y mantiene el valor moral del griego χρηστότητα.'
  - '''Se volvieron inútiles'' conserva la fuerza evaluativa fuerte del verbo sin traducirlo mecánicamente por un calco poco natural.'
