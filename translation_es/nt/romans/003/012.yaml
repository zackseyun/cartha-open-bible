    rationale: El inglés base eligió 'have become worthless' y dejó 'useless/corrupt' como alternativas. En español, si el texto mantiene 'inútiles', la nota debe reflejar una alternativa que capture mejor 'worthless', por ejemplo 'sin valor', además de 'corruptos'.
