lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  lexicon: BDAG
  rationale: Se mantiene la simple conjunción coordinante para conservar la acumulación de la catena paulina sin añadir matiz innecesario.
- source_word: ὁδὸν
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - ruta
  - sendero
  lexicon: BDAG
  rationale: «Camino» reproduce bien la imagen concreta y la posibilidad idiomática de una manera de vida o conducta, con una naturalidad adecuada en español bíblico actual.
- source_word: εἰρήνης
  english_pob_choice: peace
  chosen_spanish: de la paz
  alternatives_spanish:
  - de la tranquilidad
  - de la plenitud
  lexicon: BDAG
  rationale: «Paz» es la correspondencia más clara y estable para εἰρήνη; en esta construcción califica al camino y conserva el sentido bíblico usual sin explicitar más de lo que el griego dice.
- source_word: ἔγνωσαν
  english_pob_choice: have not known
  chosen_spanish: no conocieron
  alternatives_spanish:
  - no han conocido
  - no llegaron a conocer
  lexicon: BDAG
  rationale: El aoristo se vierte naturalmente en español con pretérito perfecto simple en una denuncia histórica. «No conocieron» preserva el juicio afirmativo-negativo del texto sin forzar un aspecto perifrástico.
translation_notes:
  revision_awareness: El texto griego y la audit trail inglesa muestran plena concordancia para una traducción breve y directa; no hubo revisiones aplicadas en la fuente inglesa, así que se mantiene la lectura más estable y literal posible dentro de un español natural.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes porque el versículo no contiene el nombre divino ni cristología explícita.
  - Se prefirió el pretérito simple «no conocieron» por ser más idiomático que el perfecto compuesto en una acusación general o histórica.
  - La nota al pie refleja la alternativa léxica documentada en la tradición auditada sin introducir una variante textual nueva.
