review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: καὶ = «y», ὁδὸν εἰρήνης = «el camino de la paz», οὐκ ἔγνωσαν = negación de conocer/reconocer ese camino. Sin embargo, el inglés POB auditado eligió «have not known» por naturalidad aspectual en contexto de acusación continua; en español, «no han conocido» reproduce mejor ese valor que «no conocieron», que suena más puntualmente histórico.'
  spanish_quality_summary: 'La redacción es clara y natural, pero puede mejorarse levemente para alinearse mejor con el matiz del POB inglés y con el flujo de la catena: «y no han conocido el camino de la paz». La nota al pie actual introduce «sendero», mientras que el rastro inglés preserva específicamente la alternativa «path»; en español conviene conservarla de forma más concisa como alternativa léxica.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Paz» y «camino» son adecuados. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión principal es aspectual/estilística en ἔγνωσαν: mejor «no han conocido» que «no conocieron» para reflejar la justificación documentada del POB.'
  issues:
  - severity: medium
    issue: «no conocieron» debilita la alineación con la decisión aspectual del POB inglés para ἔγνωσαν
    rationale: Aunque el aoristo puede verterse con pretérito simple en español, el expediente inglés justifica «have not known» como acusación vigente y natural. «No han conocido» conserva mejor ese valor en español sin sonar forzado.
  - severity: low
    issue: La nota léxica podría ajustarse más estrechamente a la alternativa auditada
    rationale: El POB inglés da «Or “the path of peace.”». La nota española actual explica demasiado y añade «sendero» como interpretación; una nota breve con «O “la senda de la paz”» preserva mejor la alternativa documentada.
  revised_spanish_text: y no han conocido el camino de la paz[a].
