translation:
  language: es
  text: ¿Dónde, entonces, está la jactancia? Ha sido excluida. ¿Por qué clase de ley? ¿De obras? No, sino por una ley de fe[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el principio de fe».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καύχησις
  english_pob_choice: boasting
  chosen_spanish: jactancia
  alternatives_spanish:
  - boast
  - alarde
  lexicon: BDAG
  rationale: El sustantivo expresa la acción o la base de gloriarse en uno mismo. «Jactancia» conserva ese sentido de autoexaltación y suena natural en español bíblico contemporáneo.
- source_word: ἐξεκλείσθη
  english_pob_choice: has been excluded
  chosen_spanish: ha sido excluida
  alternatives_spanish:
  - fue excluida
  - ha sido cerrada
  lexicon: BDAG
  rationale: El aoristo pasivo presenta la jactancia como decisivamente apartada. El pasivo en perfecto compuesto español comunica bien el estado resultante.
- source_word: διὰ
  english_pob_choice: by
  chosen_spanish: por medio de
  alternatives_spanish:
  - por
  - mediante
  lexicon: BDAG
  rationale: Aquí διά introduce medio o instrumento. «Por medio de» suena natural en la pregunta y la respuesta, y preserva el valor instrumental.
- source_word: ποίου
  english_pob_choice: what kind of
  chosen_spanish: qué clase de
  alternatives_spanish:
  - qué tipo de
  - de qué clase de
  lexicon: BDAG
  rationale: La pregunta no busca solo identificar la ley, sino su clase o carácter. «Qué clase de» refleja bien ese matiz.
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - principio
  - norma
  lexicon: BDAG
  rationale: Pablo repite νόμος tres veces en estrecha proximidad. Mantener «ley» conserva el paralelismo retórico; en la frase final se deja abierta la alternativa interpretativa en la nota.
- source_word: ἔργων
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: BDAG
  rationale: «Obras» es la terminología paulina más establecida en español y mantiene el contraste con fe.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Por defecto doctrinal, πίστις se traduce «fe» en el texto principal. Aquí designa el polo opuesto a obras.
theological_decisions:
- issue: Sentido de νόμος en «ley de fe»
  english_pob_reading: 'Retain ''law'' in the main text: ''by a law of faith.'''
  chosen_spanish_reading: 'Mantener «ley» en el texto principal: «por medio de una ley de fe».'
  alternative_spanish_readings:
  - por medio de un principio de fe
  - por medio del principio de fe
  rationale: La repetición de νόμος en el versículo tiene fuerza retórica y polémica. Traducir siempre «ley» preserva el juego verbal y la paradoja de que la fe, no las obras, funciona como norma operativa. La alternativa conceptual se conserva en la nota.
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: La versión inglesa auditada cambió de «through» a «by» para διὰ, y simplificó las preguntas elípticas. En español se optó por «por medio de» para conservar claridad y el valor instrumental sin perder el paralelismo del griego.
  spanish_consistency_notes:
  - Se mantiene el mismo término «ley» para νόμος en las tres apariciones, por coherencia retórica.
  - Se traduce καύχησις con «jactancia» para expresar el matiz de autoexaltación sin suavizarlo.
  - La nota [a] preserva la alternativa conceptual documentada para νόμος en la frase final.
