review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la estructura del griego y conserva bien la lógica de Pablo: la demostración de la justicia de Dios en el tiempo presente, para que él sea justo y justificador del que tiene fe en Jesús. Sin embargo, hay un desajuste importante en ἀνοχῇ: el inglés auditado eligió ''forbearance'' y el griego apunta a una contención deliberada del juicio; ''paciencia'' atenúa demasiado ese matiz. Además, ''de Yahvé'' no corresponde al griego, que tiene θεοῦ, no el nombre divino.'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. 'Demostración', 'tiempo presente', 'justo' y 'justificador' funcionan bien. La principal reparación necesaria es reemplazar 'paciencia de Yahvé' por una formulación más fiel y natural al sentido contextual, como 'la paciencia contenida de Dios' sería explicativa en exceso; 'la paciencia de Dios' mejora el sujeto pero aún no refleja del todo ἀνοχή. 'La tolerancia de Dios' suena permisiva. La opción más equilibrada y natural es 'la longanimidad de Dios', aunque es algo más eclesial; preserva mejor el matiz de contención.
  glossary_alignment: 'Hay una infracción del glosario principal: θεοῦ debe verterse como ''Dios'', no ''Yahvé'', ya que aquí no aparece יהוה/YHWH ni una cita griega de κύριος que exija explicar una referencia al nombre divino. En cuanto a δικαιοσύνη -> ''justicia'' y δικαιοῦντα -> ''justificador'', el borrador está alineado con las pautas del proyecto y con la auditoría inglesa. La nota sobre ἐκ πίστεως Ἰησοῦ preserva adecuadamente la alternativa debatida.'
  issues:
  - severity: high
    issue: Se tradujo θεοῦ como 'Yahvé'.
    rationale: El texto griego dice θεοῦ ('Dios'), no el nombre divino. El proyecto usa 'Yahvé' para יהוה/YHWH, no como sustituto general de θεός.
  - severity: medium
    issue: ἀνοχῇ se tradujo como 'paciencia', debilitando el matiz de contención deliberada.
    rationale: La auditoría inglesa escogió 'forbearance' precisamente para evitar la generalidad de 'patience'. En este contexto paulino conviene una opción española que sugiera suspensión o contención del castigo más que mera paciencia.
  - severity: low
    issue: La nota [a] repite la misma palabra que el texto principal.
    rationale: Si el texto principal se corrige, la nota puede conservar una alternativa real y útil. Tal como está, 'O «paciencia»' no añade valor suficiente frente al problema del término principal.
  revised_spanish_text: en la longanimidad de Dios[a], para la demostración de su justicia en el tiempo presente[c][b], para que él sea justo y el justificador del que cree en Jesús.
  revised_footnotes:
