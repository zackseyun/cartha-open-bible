translation:
  language: es
  text: en la longanimidad de Dios[a], para la demostración de su justicia en el tiempo presente[c][b], para que él sea justo y el justificador del que cree en Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «paciencia».
    reason: lexical_alternative
  - marker: b
    text: O «el que es de la fidelidad de Jesús».
    reason: alternative_reading
  - marker: c
    text: O «declara justo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνοχῇ
  english_pob_choice: forbearance
  chosen_spanish: paciencia
  alternatives_spanish:
  - tolerancia
  - forbearancia
  - reserva en castigar
  lexicon: BDAG
  rationale: En español, «paciencia» comunica con naturalidad la idea de contención divina ante el juicio. Mantiene la fuerza de demora activa que la POB inglesa expresa con «forbearance», aunque la opción «forbearance» no sea idiomática en español. Se evita «tolerancia» por sonar más pasiva o permisiva.
- source_word: ἔνδειξιν
  english_pob_choice: demonstration
  chosen_spanish: demostración
  alternatives_spanish:
  - prueba
  - manifestación
  - exhibición
  lexicon: BDAG
  rationale: «Demostración» conserva el matiz evidencial del sustantivo y suena natural en español teológico. «Prueba» puede ser válido, pero desplaza demasiado el énfasis hacia evidencia formal; «manifestación» es posible, aunque menos precisa para el tono argumentativo de Pablo.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: BDAG
  rationale: La POB inglesa preserva la tensión entre «righteousness» y la nota alternativa «justice». En español, «justicia» reproduce mejor ese campo semántico sin introducir un término más abstracto como «rectitud». Se mantiene el valor jurídico y covenantal del término.
- source_word: νῦν καιρῷ
  english_pob_choice: the present time
  chosen_spanish: el tiempo presente
  alternatives_spanish:
  - el presente tiempo
  - ahora
  - el momento presente
  lexicon: BDAG
  rationale: «El tiempo presente» refleja con claridad el contraste temporal de νῦν con καιρός y es idiomático en español. «Ahora» sería demasiado breve y perdería la sustantivación temporal.
- source_word: δίκαιον
  english_pob_choice: just
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: BDAG
  rationale: «Justo» reproduce el paralelismo con «justificador» y conserva el juego de palabras judicial del contexto. «Recto» debilitaría el matiz forense.
- source_word: δικαιοῦντα
  english_pob_choice: the justifier of
  chosen_spanish: el justificador de
  alternatives_spanish:
  - el que justifica
  - el que declara justo
  - el vindicador de
  lexicon: BDAG
  rationale: Se eligió un sustantivo agentivo, «justificador», para preservar el paralelismo con «justo» y la fuerza retórica del griego, igual que la POB inglesa. «El que justifica» sería más explicativo pero menos compacto.
- source_word: ἐκ πίστεως Ἰησοῦ
  english_pob_choice: has faith in Jesus
  chosen_spanish: cree en Jesús
  alternatives_spanish:
  - tiene fe en Jesús
  - es de la fidelidad de Jesús
  - depende de la fe de Jesús
  lexicon: BDAG
  rationale: La construcción se vierte de manera natural en español con «cree en Jesús». Esta opción comunica la lectura objetiva adoptada por la POB inglesa y evita una perífrasis pesada. Se conserva, no obstante, la alternativa debatida en la nota.
theological_decisions:
- issue: Sentido de ἐκ πίστεως Ἰησοῦ
  english_pob_reading: the one who has faith in Jesus
  chosen_spanish_reading: el que cree en Jesús
  alternative_spanish_readings:
  - el que es de la fidelidad de Jesús
  - el que tiene la fe de Jesús
  rationale: Se mantiene la lectura objetiva principal de la POB inglesa, pero la nota conserva la posibilidad del genitivo subjetivo («la fidelidad de Jesús»). Esto respeta la tensión exegética documentada sin resolverla indebidamente en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica cuando el original es genuinamente debatido; πίστις se vierte normalmente como fe.'
- issue: δικαιοσύνη αὐτοῦ en este contexto
  english_pob_reading: his righteousness
  chosen_spanish_reading: su justicia
  alternative_spanish_readings:
  - su rectitud
  - su justicia retributiva
  rationale: «Su justicia» conserva el alcance semántico amplio del término y permite que la nota alternativa «justicia»/«rectitud» siga siendo auditables. No se estrecha el sentido a una sola categoría moral o forense.
  doctrine_reference: 'DOCTRINE.md: Mantener la amplitud semántica de δικαιοσύνη según el contexto paulino.'
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente, que indica que no hubo cambios necesarios y que el acuerdo del control cruzado fue alto. La redacción española mantiene la arquitectura semántica de la POB inglesa: forbearance/paciencia, demonstration/demostración, righteousness/justicia, present time/tiempo presente, just/justo, justifier/justificador, y la lectura debatida de πίστεως Ἰησοῦ en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para θεός/YHWH cuando corresponde al trasfondo divino del contexto.
  - Se conserva «Jesús» sin añadir «Cristo», porque el texto griego nombra Ἰησοῦς y la POB inglesa no introduce un título aquí.
  - «Justicia» se usa como término principal para δικαιοσύνη, con nota de alternativa para preservar la tensión léxica documentada.
  - La estructura «el justificador de» sigue el paralelismo del original y evita una paráfrasis explicativa excesiva.
  - Se mantiene un registro bíblico moderno y claro, sin calcos innecesarios ni arcaísmos.
