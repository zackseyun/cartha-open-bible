review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: conocimiento compartido, referencia a la ley, propósito de silenciar toda defensa y alcance universal ante Dios. Sin embargo, dos decisiones debilitan la fidelidad fina al audit trail: (1) «lo dice a» borra innecesariamente la distinción entre λέγει y λαλεῖ, cuando puede preservarse naturalmente en español con «habla a»; (2) «quede reconocido como responsable» introduce una idea de reconocimiento no presente en ὑπόδικος γένηται y sobretraduce el matiz ingresivo de γένηται.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «todo el mundo quede reconocido como responsable» suena forzado y poco idiomático en registro bíblico natural. «Sea/hable» y «quede sujeto a juicio ante Dios» o equivalente mejora la fluidez y conserva mejor la fuerza forense. También conviene corregir la nota c, donde la alternativa principal repite el texto en vez de ofrecer alternativa real.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Dios» y «la ley» están bien. La cuestión central es semántica-jurídica: ὑπόδικος debe reflejar rendición de cuentas o sujeción a juicio sin intensificarse a condena plena; en español, «responsable» puede servir, pero no con «reconocido como».'
  issues:
  - severity: medium
    issue: «lo dice a» no preserva la distinción entre λέγει y λαλεῖ
    rationale: El griego usa dos verbos distintos en la misma cláusula. El audit trail inglés preserva esa diferencia con «says» / «speaks». En español, «todo lo que la ley dice, habla a...» resulta natural y mantiene el contraste mejor que repetir «dice».
  - severity: high
    issue: «quede reconocido como responsable» añade contenido no presente en el original
    rationale: Ni ὑπόδικος ni γένηται contienen la noción de ser 'reconocido como'. La frase introduce una capa interpretativa de reconocimiento/veredicto formal que excede el texto y además suena poco natural en español.
  - severity: medium
    issue: La nota c no ofrece alternativas bien calibradas respecto al texto principal
    rationale: Si el texto principal usa «responsable», la nota no debería comenzar con la misma palabra como alternativa. Además, conviene incluir opciones que reflejen mejor el campo semántico de ὑπόδικος, como «sujeto a juicio» o «expuesto a condena judicial», sin imponer «culpable» como sentido principal.
