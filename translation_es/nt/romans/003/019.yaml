translation:
  language: es
  text: Ahora sabemos que todo lo que la ley dice[a], lo habla a los que están bajo la ley, para que toda boca sea cerrada[b] y todo el mundo llegue a estar sujeto a juicio[c] ante Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «a los que están en la ley».
    reason: lexical_alternative
  - marker: b
    text: O «toda boca sea silenciada».
    reason: lexical_alternative
  - marker: c
    text: O «responsable», «obligado a responder», o «hallado culpable» ante Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδαμεν
  english_pob_choice: Now we know
  chosen_spanish: Ahora sabemos
  alternatives_spanish:
  - Y sabemos
  - Sabemos
  lexicon: BDAG
  rationale: «Ahora» recoge con naturalidad el matiz discursivo de δέ en español y presenta la afirmación como conocimiento compartido y vigente.
- source_word: νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la norma
  lexicon: BDAG
  rationale: «La ley» conserva el referente paulino sin cargar innecesariamente el texto con mayúscula o con un término más abstracto que el griego.
- source_word: τοῖς ἐν τῷ νόμῳ
  english_pob_choice: those under the law
  chosen_spanish: a los que están bajo la ley
  alternatives_spanish:
  - a los que están en la ley
  - a los que viven bajo la ley
  lexicon: BDAG
  rationale: El griego dice literalmente «los que están en la ley». En español, «bajo la ley» expresa mejor la idea de jurisdicción o condición dentro de ese ámbito, sin perder la referencia textual.
- source_word: λαλεῖ
  english_pob_choice: it speaks
  chosen_spanish: lo dice
  alternatives_spanish:
  - habla
  - se lo dice
  lexicon: BDAG
  rationale: En español, el paralelismo con «dice» suena más natural que una repetición literal de «habla»; mantiene la distinción entre λέγει y λαλεῖ sin volver torpe la frase.
- source_word: ἵνα πᾶν στόμα φραγῇ
  english_pob_choice: so that every mouth may be stopped
  chosen_spanish: para que toda boca sea cerrada
  alternatives_spanish:
  - para que toda boca sea callada
  - para que toda boca quede cerrada
  lexicon: BDAG
  rationale: Se conserva la metáfora concreta de «boca» y el sentido de ser cerrada como imagen de silenciar toda defensa o reclamo. «Sea cerrada» es una forma más directa y fiel al pasivo del griego en español.
- source_word: ὑπόδικος
  english_pob_choice: accountable
  chosen_spanish: reconocido como responsable
  alternatives_spanish:
  - responsable ante el juicio
  - sujeto a juicio
  - culpable
  lexicon: BDAG
  rationale: «Responsable» preserva la fuerza legal de ὑπόδικος sin traducirlo de modo más fuerte que el término griego. Se añadió «reconocido como» para expresar el giro resultativo de γένηται con claridad en español.
- source_word: γένηται
  english_pob_choice: may become
  chosen_spanish: quede reconocido como
  alternatives_spanish:
  - llegue a ser
  - sea
  lexicon: BDAG
  rationale: El verbo sugiere entrar en un estado o quedar constituido así. En español, «quede reconocido como» comunica ese resultado sin perder el matiz de transición implícito.
- source_word: πᾶς ὁ κόσμος
  english_pob_choice: the whole world
  chosen_spanish: todo el mundo
  alternatives_spanish:
  - el mundo entero
  - toda la humanidad
  lexicon: BDAG
  rationale: «Todo el mundo» es el equivalente natural y amplio en español para la totalidad de la humanidad bajo la vista judicial de Dios, manteniendo el alcance universal del texto.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: ante Dios
  alternatives_spanish:
  - a Dios
  - para Dios
  lexicon: BDAG
  rationale: Aunque la dativa es «a/para Dios», en este contexto judicial español «ante Dios» expresa mejor la idea de estar bajo su tribunal, que el audit trail inglés también destaca.
theological_decisions:
- issue: Alcance judicial de ὑπόδικος con τῷ θεῷ
  english_pob_reading: The whole world becomes accountable before God's judgment.
  chosen_spanish_reading: Todo el mundo queda reconocido como responsable ante Dios.
  alternative_spanish_readings:
  - todo el mundo queda culpable ante Dios
  - todo el mundo queda sujeto al juicio de Dios
  - todo el mundo queda obligado ante Dios
  rationale: La formulación mantiene la fuerza forense del pasaje sin intensificar ὑπόδικος a «culpable», que sería más fuerte que el valor léxico que el POB inglés prefirió evitar. «Ante Dios» expresa el ámbito de juicio implícito en el dativo.
  doctrine_reference: juicio divino; responsabilidad universal; Romanos 3:19 en su contexto argumental
- issue: Relación entre «la ley» y quienes están bajo ella
  english_pob_reading: Whatever the law says, it speaks to those under the law.
  chosen_spanish_reading: todo lo que la ley dice, lo dice a los que están bajo la ley
  alternative_spanish_readings:
  - todo lo que la ley dice, habla a los que están bajo la ley
  - todo lo que la ley dice, lo dice a los que están en la ley
  rationale: Se conserva el sentido de jurisdicción o ámbito que el POB inglés explicó con «under the law», sin borrar la literalidad del griego ni sustituirla por una paráfrasis doctrinal.
  doctrine_reference: autoridad de la ley; alcance de la acusación; argumentación paulina
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el trazado de decisiones del POB inglés. Se mantuvo la estructura causal de ἵνα, la distinción entre λέγει y λαλεῖ, y el campo judicial de ὑπόδικος sin sobrerresolverlo en «culpable». No se requieren cambios respecto del pasaje auditado; la versión española simplemente explicita en un español natural las mismas decisiones léxicas y teológicas.
  spanish_consistency_notes:
  - Se usa «la ley» de manera consistente para νόμος, evitando mayúsculas teológicas no exigidas por el contexto.
  - «Dios» se mantiene para θεός según el estándar del proyecto.
  - «Todo el mundo» conserva el alcance universal de πᾶς ὁ κόσμος sin introducir una restricción étnica o nacional.
  - La metáfora de la boca cerrada se preserva de forma natural en español.
  - La elección de «ante Dios» para el dativo final conserva el matiz forense del contexto, aunque el griego sea más breve.
