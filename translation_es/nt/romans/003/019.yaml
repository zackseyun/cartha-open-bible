revisions:
- from: Ahora sabemos que todo lo que la ley dice[a], lo dice a los que están bajo la ley, para que toda boca sea cerrada[b] y todo el mundo quede reconocido como responsable[c] ante Dios.
  to: Ahora sabemos que todo lo que la ley dice[a], lo habla a los que están bajo la ley, para que toda boca sea cerrada[b] y todo el mundo llegue a estar sujeto a juicio[c] ante Dios.
  rationale: La revisión elimina la sobreinterpretación «reconocido como», preserva mejor la distinción verbal del griego con «dice / habla», y expresa la fuerza forense de ὑπόδικος de forma natural en español con «sujeto a juicio», manteniendo las alternativas del audit trail sin endurecer indebidamente el sentido principal.
  reviewer_model: gpt-5.4
