    rationale: El English POB incluye una nota léxica para «Lord» con alternativas posibles. La revisión española debe preservar las alternativas significativas documentadas en la auditoría, salvo razón fuerte para omitirlas, y aquí no hay tal razón.
  - severity: medium
    issue: «Jesús Mesías» suena poco natural en español eclesial general.
    rationale: Aunque semánticamente defendible, en español amplio y publicable la forma titular más clara y digna es «Jesús el Mesías». Esto conserva la política Mesías/Cristo y mejora la legibilidad sin paráfrasis.
  - severity: low
    issue: La nota [a] acumula demasiadas alternativas para καυχώμενοι.
