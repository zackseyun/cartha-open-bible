source:
  edition: SBLGNT
  text: οὐ μόνον δέ, ἀλλὰ καὶ καυχώμενοι ἐν τῷ θεῷ διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, δι’ οὗ νῦν τὴν καταλλαγὴν ἐλάβομεν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/005/011.yaml
  text: And not only that[a], but we also boast in God through our Lord Jesus Messiah[d][c][b], through whom we have now received the reconciliation.
  footnotes:
  - marker: a
    text: Or 'boast' or 'exult in God.'
    reason: lexical_alternative
  - marker: b
    text: Greek Christos; traditionally 'Christ.'
    reason: alternative_reading
  - marker: c
    text: Or simply 'received reconciliation.'
    reason: lexical_alternative
  - marker: d
    text: For 'Lord,' alternatives sometimes considered include 'Master' or, in other contexts, 'LORD.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4
    prompt_id: nt_draft_v1
    prompt_sha256: dcc6bb49ed6f3117b5029d3e0ca2da705100f90894d30d00342331427ffe17e2
    timestamp: '2026-04-18T00:25:54Z'
    output_hash: fed00ce3868ad2720bef3b1b3575f72b758df211fc801310f9d2a8b1733856f8
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:00:54Z'
    unchanged: false
    changes_summary: 'Changed ''rejoice'' to ''boast'' to reflect καυχώμενοι more directly and consistently; changed ''Jesus the Messiah'' to ''Jesus Christ'' for standard formal rendering of Ἰησοῦ Χριστοῦ. Kept ''the reconciliation'' to reflect the article in τὴν καταλλαγήν. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Y no solo eso[a], sino que también nos gloriamos en Dios por medio de nuestro Señor[d] Jesús el Mesías[b], por medio de quien ahora hemos recibido la reconciliación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos gloriamos», «nos jactamos» o «exultamos en Dios».
    reason: lexical_alternative
  - marker: b
    text: Mesías traduce Χριστός como título; tradicionalmente se vierte «Cristo».
    reason: alternative_reading
  - marker: c
    text: O simplemente «hemos recibido reconciliación».
    reason: lexical_alternative
  - marker: d
    text: Para «Señor», alternativas que a veces se consideran incluyen «Maestro» o, en otros contextos, «SEÑOR».
    reason: lexical_alternative
lexical_decisions:
- source_word: καυχώμενοι
  english_pob_choice: boast / rejoice / exult
  chosen_spanish: nos gloriamos
  alternatives_spanish:
  - nos jactamos
  - nos regocijamos
  - exultamos
  lexicon: BDAG
  rationale: καυχάομαι puede expresar orgullo/confianza celebrativa según el contexto. En español, "gloriarse" conserva esa fuerza positiva sin sonar necesariamente a jactancia pecaminosa, y permite mantener la tensión entre entusiasmo y confianza en Dios.
- source_word: θεῷ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Dativo de esfera/objeto con sentido claro y directo; "en Dios" reproduce bien la relación verbal con καυχώμενοι.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Soberano
  lexicon: BDAG
  rationale: En uso cristológico del NT, "Señor" es la equivalencia más natural y fiel en español, manteniendo el valor de κύριος sin forzar una paráfrasis.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah / Jesus Christ
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Se preserva el valor titular de Χριστός como "Mesías", conforme a la política del proyecto y al audit trail inglés. "Jesús Mesías" es breve, publicable y mantiene el peso cristológico del título; se evita "Cristo" como forma fija tradicional cuando el título está funcionando semánticamente.
- source_word: τὴν καταλλαγὴν
  english_pob_choice: the reconciliation
  chosen_spanish: la reconciliación
  alternatives_spanish:
  - reconciliación
  - la restauración
  lexicon: BDAG
  rationale: καταλλαγή denota reconciliación/restablecimiento de relación. En español, el artículo definido "la reconciliación" conserva la referencia concreta al acto/realidad ya presentada en el contexto, sin oscurecer el sustantivo central.
- source_word: ἐλάβομεν
  english_pob_choice: have now received
  chosen_spanish: hemos recibido ahora
  alternatives_spanish:
  - hemos recibido
  - recibimos
  lexicon: BDAG
  rationale: El aoristo se vierte con perfecto español por el valor resultativo que el contexto aporta con νῦν. Se coloca "ahora" después del verbo para naturalidad, preservando la inmediatez temporal del griego.
theological_decisions:
- issue: Renderización de Χριστός como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene el valor de título de Χριστός y la política del proyecto de preferir "Mesías" cuando el término no funciona simplemente como parte del nombre fijo. Esto preserva la carga teológica del pasaje y evita el debilitamiento semántico de un nombre ya convencionalizado.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías (cuando es título; Cristo donde sea nombre fijo o por conveniencia idiomática documentada)'
- issue: Sentido de καυχώμενοι en un contexto de alabanza/confianza
  english_pob_reading: boast / rejoice / exult in God
  chosen_spanish_reading: nos gloriamos en Dios
  alternative_spanish_readings:
  - nos regocijamos en Dios
  - exultamos en Dios
  - nos jactamos en Dios
  rationale: La expresión paulina incluye una confianza celebrativa orientada a Dios. "Nos gloriamos" es suficientemente amplia para conservar esa mezcla de gozo, satisfacción y proclamación sin imponer en español una connotación puramente negativa.
  doctrine_reference: BDAG καυχάομαι; uso paulino de la confianza celebrativa en Dios
- issue: Artículo en τὴν καταλλαγήν
  english_pob_reading: the reconciliation
  chosen_spanish_reading: la reconciliación
  alternative_spanish_readings:
  - reconciliación
  rationale: El artículo griego señala una realidad específica y conocida por el contexto inmediato. En español, el artículo definido ayuda a conservar esa especificidad sin volver la frase artificial.
  doctrine_reference: Sintaxis contextual del artículo definido en griego koiné
translation_notes:
  revision_awareness: El auditarlo inglés pasó por una oscilación entre «rejoice» y «boast» para καυχώμενοι y entre «Jesus Christ» y «Jesus Messiah» para Χριστοῦ. La decisión final del proyecto restablece «Messiah» por política terminológica; en español se refleja con «Mesías» para preservar la misma elección teológica y lexical. También se conserva el artículo de καταλλαγή con «la reconciliación» por la referencia específica del contexto.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος y no «LORD» ni «Maestro», siguiendo el uso cristológico estándar en español y el contexto de Jesús.
  - Se usa «Dios» sin mayúscula especial adicional fuera del nombre propio convencional.
  - «Nos gloriamos» evita una traducción mecánica de «boast» y mantiene la ambigüedad paulina entre gloria, jactancia y exultación.
  - «Mesías» se reserva para Χριστός como título; no se usa «Cristo» en el cuerpo del verso para no borrar la decisión terminológica documentada.
  - «Reconciliación» conserva el sustantivo relacional central de καταλλαγή y su artículo definido para reflejar la especificidad del texto.
