translation:
  language: es
  text: Y el don no es como lo que vino por medio del que pecó[a]. Porque el juicio, a partir de una sola transgresión[b], resultó en condenación, pero el don de gracia, a partir de muchas transgresiones, resultó en justificación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el don no es como lo que vino por medio de un hombre que pecó».
    reason: lexical_alternative
  - marker: b
    text: O «de una sola ofensa».
    reason: lexical_alternative
  - marker: c
    text: O «resultó en un veredicto justo» o «resultó en absolución».
    reason: lexical_alternative
lexical_decisions:
- source_word: δώρημα
  english_pob_choice: the gift
  chosen_spanish: el don
  alternatives_spanish:
  - el regalo
  - el don gratuito
  lexicon: BDAG
  rationale: δώρημα es un don recibido; en español, «don» conserva la idea de algo concedido y suena más natural y sobrio que «regalo» en un contexto paulino jurídico-teológico. No añadí «gratuito» porque el sustantivo ya comunica la idea básica de un don dado.
- source_word: δι’ ἑνὸς ἁμαρτήσαντος
  english_pob_choice: what came through the one who sinned
  chosen_spanish: lo que vino por medio del que pecó
  alternatives_spanish:
  - lo que vino por medio de uno que pecó
  - lo que vino por medio del hombre que pecó
  lexicon: BDAG
  rationale: La frase griega es elíptica y apunta a una persona individual. «Por medio del que pecó» conserva esa referencia personal sin sobrecargar el texto; «vino» expresa bien la idea de lo que llega a través de alguien, como en el inglés POB.
- source_word: κρίμα
  english_pob_choice: the judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - la sentencia
  - el veredicto
  lexicon: BDAG
  rationale: κρίμα aquí es la decisión judicial misma. «Juicio» mantiene la fuerza forense de forma clara y neutral en español, y encaja bien con la oposición a «condenación» y «justificación».
- source_word: ἐξ ἑνὸς
  english_pob_choice: from one trespass
  chosen_spanish: a partir de una sola trasgresión
  alternatives_spanish:
  - por una sola trasgresión
  - desde una sola trasgresión
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «de uno», el contexto inmediato y la cláusula siguiente con «muchas trasgresiones» favorecen entender aquí una trasgresión singular. «A partir de» conserva la relación causal sin sonar rígido.
- source_word: κατάκριμα
  english_pob_choice: condemnation
  chosen_spanish: condenación
  alternatives_spanish:
  - sentencia de condenación
  - condena
  lexicon: BDAG
  rationale: κατάκριμα es condenación judicial; «condenación» es el equivalente español más directo y mantiene el contraste jurídico con δικαίωμα.
- source_word: χάρισμα
  english_pob_choice: the gracious gift
  chosen_spanish: el don de gracia
  alternatives_spanish:
  - el don gracioso
  - el don gratuito
  lexicon: BDAG
  rationale: χάρισμα destaca un don caracterizado por la gracia. «Don de gracia» preserva esa relación con χάρις y evita que «gracioso» suene coloquial o ambiguo en español.
- source_word: παραπτωμάτων
  english_pob_choice: trespasses
  chosen_spanish: trasgresiones
  alternatives_spanish:
  - ofensas
  - faltas
  lexicon: BDAG
  rationale: παράπτωμα es una caída o desviación moral. «Trasgresiones» conserva el matiz de violación de un límite; «ofensas» sería más suave y menos preciso en este contexto forense.
- source_word: δικαίωμα
  english_pob_choice: justification
  chosen_spanish: justificación
  alternatives_spanish:
  - veredicto justo
  - absolución
  lexicon: BDAG
  rationale: En este contexto judicial, δικαίωμα se toma como el resultado opuesto a condenación. «Justificación» conserva la lectura forense y, en español teológico, es el término más estable para esa oposición.
theological_decisions:
- issue: El alcance forense de δικαίωμα frente a κατάκριμα
  english_pob_reading: δικαίωμα is rendered 'justification' as the judicial outcome opposite condemnation.
  chosen_spanish_reading: δικαίωμα se traduce «justificación» como el resultado judicial opuesto a la condenación.
  alternative_spanish_readings:
  - veredicto justo
  - absolución
  rationale: 'La estructura del versículo es una antítesis jurídica: juicio/condenación frente a don de gracia/justificación. «Justificación» comunica bien ese contraste paulino sin perder el marco judicial del texto.'
  doctrine_reference: Doctrina paulina de la justificación en contraste con la condenación (Romanos 5:16).
translation_notes:
  revision_awareness: 'El texto sigue de cerca el pasaje griego y el análisis auditado en inglés POB: mantiene el contraste forense, conserva la referencia personal implícita en «el que pecó», y refleja la diferencia entre κρίμα, κατάκριμα y δικαίωμα sin diluirla.'
  spanish_consistency_notes:
  - Se emplea «don» para δώρημα y χάρισμα, diferenciando el segundo como «don de gracia» para conservar el matiz de gracia.
  - Se usa «trasgresión/trasgresiones» para παράπτωμα por su precisión moral-jurídica en español.
  - Se mantiene un registro bíblico contemporáneo y digno, evitando arcaísmos innecesarios.
  - Se conserva la terminología forense («juicio», «condenación», «justificación») para respetar la estructura argumental de Pablo.
