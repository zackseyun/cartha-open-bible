revisions:
- from: Y el don no es como lo que vino por medio del que pecó[a]. Porque el juicio, a partir de una sola trasgresión[b], llevó a condenación[c], pero el don de gracia, a partir de muchas trasgresiones, llevó a justificación.
  to: Y el don no es como lo que vino por medio del que pecó[a]. Porque el juicio, a partir de una sola transgresión[b], resultó en condenación, pero el don de gracia, a partir de muchas transgresiones, resultó en justificación[c].
  rationale: 'Se corrige un error importante de alineación con el expediente inglés: la nota alternativa debe aplicarse a ''justificación'' (δικαίωμα), no a ''condenación'' (κατάκριμα). También se normaliza la ortografía a ''transgresión'' y se pule la fluidez con ''resultó en'', manteniendo intacto el sentido forense del original.'
