translation:
  language: es
  text: Porque, si por la transgresión del uno la muerte reinó por medio del uno, mucho más los que reciben la abundancia de la gracia y el don de la rectitud[a] reinarán en vida por medio del uno[b], Jesús Mesías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el don de la justicia»; δικαιοσύνη puede expresar rectitud o justicia, incluyendo un matiz forense/covenantal en Pablo.
    reason: lexical_alternative
  - marker: b
    text: O «por uno solo».
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «Jesús Cristo». Aquí se traduce «Mesías» para conservar el valor titular de Χριστός conforme a la política del proyecto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραπτώματι
  english_pob_choice: trespass
  chosen_spanish: transgresión
  alternatives_spanish:
  - falta
  - pecado
  lexicon: BDAG
  rationale: En español, «transgresión» conserva el sentido concreto de una infracción o caída en falta sin volver la frase demasiado técnica. Evita la resonancia más cotidiana de «falta» y el ensanchamiento de «pecado», que aquí desdibujaría el paralelismo adámico.
- source_word: ἐβασίλευσεν
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - gobernó como rey
  - regía
  lexicon: BDAG
  rationale: «Reinó» mantiene la metáfora real del verbo griego y reproduce bien el contraste con el futuro «reinarán» en la segunda mitad del versículo.
- source_word: περισσείαν
  english_pob_choice: abundance
  chosen_spanish: abundancia
  alternatives_spanish:
  - sobreabundancia
  - desbordamiento
  lexicon: BDAG
  rationale: «Abundancia» es natural en español y comunica la idea de plenitud excedente sin añadir matices interpretativos que el griego no exige.
- source_word: χάριτος
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: «Gracia» es el equivalente paulino estándar y preserva tanto el don inmerecido como la iniciativa divina implícita en el contexto.
- source_word: δωρεᾶς
  english_pob_choice: gift
  chosen_spanish: don
  alternatives_spanish:
  - regalo
  - obsequio
  lexicon: BDAG
  rationale: «Don» da en español un tono más bíblico y preciso que «regalo», y se ajusta bien a la estructura paralela con «gracia».
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió «righteousness», en español «justicia» conserva mejor la amplitud semántica de δικαιοσύνη y permite mantener la alternativa doctrinal sin perder la fuerza forense/covenantal del contexto. En este versículo la construcción «don de la justicia» suena fiel y natural, y la nota preserva la alternativa «rectitud» donde pudiera ser útil.
- source_word: λαμβάνοντες
  english_pob_choice: receive
  chosen_spanish: reciben
  alternatives_spanish:
  - están recibiendo
  - aceptan
  lexicon: BDAG
  rationale: El participio sustantivado se expresa con naturalidad como «los que reciben», que identifica a un grupo caracterizado por la recepción del don.
- source_word: ἐν ζωῇ
  english_pob_choice: in life
  chosen_spanish: en vida
  alternatives_spanish:
  - en la vida
  - en la esfera de la vida
  lexicon: BDAG
  rationale: «En vida» reproduce la concisión del griego y conserva el contraste con la muerte que reina al inicio del versículo.
- source_word: βασιλεύσουσιν
  english_pob_choice: reign
  chosen_spanish: reinarán
  alternatives_spanish:
  - gobernarán como reyes
  lexicon: BDAG
  rationale: «Reinarán» mantiene el mismo campo metafórico que «reinó» y deja intacta la antítesis entre muerte y los creyentes.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Christ
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús Cristo
  lexicon: BDAG
  rationale: En español, la forma unida «Jesucristo» funciona como nombre establecido y natural para la expresión griega Ἰησοῦς Χριστός cuando el título ya se ha lexicalizado en el uso cristiano. Se preserva así la referencia personal sin forzar una construcción menos idiomática.
theological_decisions:
- issue: δικαιοσύνη en un contexto paulino de Adán/ Cristo
  english_pob_reading: gift of righteousness
  chosen_spanish_reading: don de la justicia
  alternative_spanish_readings:
  - don de la rectitud
  - don de la justificación
  rationale: La guía doctrinal del proyecto privilegia «righteousness» en inglés y mantiene «justice» como alternativa preservada. En español, «justicia» es el término más amplio y fiel para δικαιοσύνη en este pasaje, donde el contraste con la transgresión y la vida en reinar apunta tanto a una realidad forense como a un orden recto otorgado por Dios.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη → righteousness; justice preserved in footnotes for Pauline passages'
- issue: Χριστός en la fórmula nominal Ἰησοῦ Χριστοῦ
  english_pob_reading: Jesus Messiah / Jesus Christ revision history
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  rationale: Aunque el proyecto suele preferir «Mesías» cuando Χριστός funciona como título, en esta secuencia la expresión es ya nombre-forma consolidada. En español, «Jesucristo» comunica con naturalidad esa forma lexicalizada y evita un giro menos idiomático que podría distraer del énfasis principal del versículo.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Messiah where title; Christ where name-like'
translation_notes:
  revision_awareness: El inglés audit trail muestra un ajuste final entre «Jesus the Messiah» y «Jesus Christ», con restauración posterior de la preferencia doctrinal por «Messiah» en el registro inglés. Para el español, se evaluó la tensión entre el principio doctrinal de Χριστός→«Mesías» y el uso natural de la fórmula nominal. Se optó por «Jesucristo» como equivalente idiomático de la expresión fija Ἰησοῦς Χριστός, sin introducir una lectura teológica distinta ni suavizar la metáfora de reinar. La elección de «justicia» mantiene el debate léxico documentado para δικαιοσύνη mediante nota.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal «reinó / reinarán» para conservar la estructura argumentativa del versículo.
  - «Por medio del uno» traduce de forma consistente διὰ τοῦ ἑνός, evitando aclaraciones no presentes en el griego.
  - Se usó «la transgresión» en singular para reflejar el artículo y el referente adamítico específico.
  - La puntuación refleja una sola oración larga, como en el original griego, con comas que marcan el contraste lógico.
