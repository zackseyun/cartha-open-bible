translation:
  language: es
  text: y la perseverancia produce carácter probado[a], y el carácter probado produce esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'carácter examinado' o 'aprobación'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπομονή
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - aguante
  - resistencia
  - perseverancia paciente
  lexicon: BDAG
  rationale: En este encadenamiento paulino, ὑπομονή expresa la capacidad de mantenerse firme bajo prueba. En español, 'perseverancia' comunica bien esa constancia sostenida y es natural en registro bíblico contemporáneo; 'aguante' sería menos digno y 'resistencia' puede sonar demasiado técnica o impersonal.
- source_word: δοκιμή
  english_pob_choice: proven character
  chosen_spanish: carácter probado
  alternatives_spanish:
  - carácter aprobado
  - carácter probado por la prueba
  - carácter genuino
  lexicon: BDAG
  rationale: La idea no es solo una cualidad moral abstracta, sino el carácter que ha sido puesto a prueba y ha resultado genuino. 'Carácter probado' conserva ese sentido resultativo y mantiene la tensión interpretativa entre cualidad aprobada y carácter verificado por la prueba.
- source_word: ἐλπίς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - esperanza confiada
  - expectativa
  lexicon: BDAG
  rationale: '''Esperanza'' es el equivalente natural y fiel en español. En este contexto paulino, la palabra lleva la expectativa confiada en la acción futura de Dios, pero no hace falta explicitarlo en el texto principal.'
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ enlaza los elementos de una secuencia argumental. 'Y' reproduce mejor esa progresión que un contraste fuerte como 'pero'.
- source_word: verb ellipsis from context
  english_pob_choice: produces
  chosen_spanish: ;
  alternatives_spanish:
  - produce
  - genera
  - da lugar a
  lexicon: contextual ellipsis
  rationale: El griego repite de forma elíptica la idea verbal del contexto inmediato. En español, conviene hacer explícita la relación causal con una puntuación fluida en vez de forzar un verbo que podría sonar repetitivo o menos natural en esta estructura breve.
theological_decisions:
- issue: Sentido de δοκιμή como resultado de la prueba, no como proceso de probar
  english_pob_reading: A quality of character shown genuine through testing ('proven character')
  chosen_spanish_reading: Una cualidad del carácter que se ha mostrado genuina mediante la prueba ('carácter probado')
  alternative_spanish_readings:
  - el proceso de prueba
  - aprobación
  - carácter aprobado
  rationale: La secuencia del versículo presenta ὑπομονή como antecedente de δοκιμή; por eso el término final se entiende mejor como resultado de la perseverancia. 'Carácter probado' mantiene abierta la posibilidad de leer también 'carácter aprobado' sin cerrar indebidamente la tensión semántica.
  doctrine_reference: Conservar la tensión lexical y teológica; no resolver de forma reductiva el valor de δοκιμή.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: se mantiene la cadena conceptual endurance/character/hope, preservando la elipsis verbal del griego y la ambigüedad controlada de δοκιμή.'
  spanish_consistency_notes:
  - Se usa 'esperanza' de forma simple y natural, siguiendo la decisión inglesa.
  - '''Carácter probado'' conserva el matiz de resultado verificable sin diluirlo en una cualidad genérica.'
  - La conjunción 'y' refleja la progresión secuencial de δέ, no un contraste adversativo.
