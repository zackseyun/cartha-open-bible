translation:
  language: es
  text: Y no solo eso[a], sino que también nos gloriamos en las aflicciones, sabiendo que la aflicción produce perseverancia[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos regocijamos» o «exultamos» en las aflicciones.
    reason: lexical_alternative
  - marker: b
    text: O «tribulaciones» / «sufrimientos».
    reason: lexical_alternative
  - marker: c
    text: O «constancia» o «firmeza».
    reason: lexical_alternative
lexical_decisions:
- source_word: καυχώμεθα
  english_pob_choice: rejoice
  chosen_spanish: nos gloriamos
  alternatives_spanish:
  - nos regocijamos
  - nos jactamos
  - exultamos
  lexicon: BDAG
  rationale: El griego puede expresar tanto una alegría confiada como el acto de gloriarse. En español, "nos gloriamos" preserva la fuerza verbal y la tensión lexical sin reducirla a una mera emoción, mientras evita introducir una connotación orgullosa no requerida por el contexto.
- source_word: θλίψεσιν
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - tribulaciones
  - sufrimientos
  - angustias
  lexicon: BDAG
  rationale: '"Aflicciones" reproduce bien el sentido de presión, opresión o angustia del plural griego y es natural en español bíblico actual. "Tribulaciones" suena más tradicional; "sufrimientos" es más amplio.'
- source_word: θλῖψις
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - sufrimiento
  - angustia
  lexicon: BDAG
  rationale: Mantengo el singular para reflejar el cambio del plural experiencial al principio general en la segunda cláusula. "Aflicción" conserva el paralelismo con la primera mitad del versículo.
- source_word: ὑπομονήν
  english_pob_choice: endurance
  chosen_spanish: endurance
  alternatives_spanish:
  - perseverancia
  - constancia
  - resistencia
  lexicon: BDAG
  rationale: Aquí se conserva el término técnico ya adoptado en la tradición de este proyecto para no borrar la decisión auditada del inglés. En español, "endurance" puede funcionar como préstamo solo si el registro del proyecto lo admite; si se prefiere evitar anglicismo, la alternativa más cercana sería "perseverancia" o "constancia".
- source_word: κατεργάζεται
  english_pob_choice: produces
  chosen_spanish: produce
  alternatives_spanish:
  - obra
  - causa
  - da por resultado
  lexicon: BDAG
  rationale: '"Produce" comunica de forma directa la relación causal/resultativa del verbo sin sobrecargar el verso con perífrasis.'
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque sabemos
  - ya que sabemos
  lexicon: BDAG
  rationale: El gerundio español conserva la subordinación participial y la conexión lógica con la afirmación principal.
theological_decisions:
- issue: Renderizar καυχώμεθα sin resolver por completo la tensión entre "gloriarse" y "regocijarse"
  english_pob_reading: A positive, God-centered rejoicing rather than self-focused boasting
  chosen_spanish_reading: Un gloriarse positivo y centrado en la obra de Dios, no una jactancia egocéntrica
  alternative_spanish_readings:
  - regocijarnos
  - jactarnos
  - exultarnos
  rationale: 'El contexto paulino exige conservar la ambivalencia controlada del verbo: no es orgullo humano, pero tampoco mera emoción privada. "Nos gloriamos" deja visible la tensión teológica y lexical sin neutralizarla.'
  doctrine_reference: Romanos 5:3; mantener la tensión lexical/theological en vez de resolverla prematuramente.
- issue: Traducción del campo semántico de θλῖψις
  english_pob_reading: afflictions / affliction
  chosen_spanish_reading: aflicciones / aflicción
  alternative_spanish_readings:
  - tribulaciones / tribulación
  - sufrimientos / sufrimiento
  rationale: 'El plural y el singular no son intercambiables sin perder el matiz del griego: primero experiencias concretas, luego el principio general. La traducción conserva esa transición.'
  doctrine_reference: Romanos 5:3; retener el contraste entre experiencia plural y principio singular.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para quitar «our» antes de «afflictions», porque no está en el griego. La versión española evita cualquier posesivo añadido y conserva el paralelismo de las dos cláusulas, con el cambio de plural a singular reflejado en aflicciones/aflicción.
  spanish_consistency_notes:
  - Usé «Y no solo eso» para reflejar οὐ μόνον δέ sin añadir un sujeto explícito.
  - Preferí «nos gloriamos» para mantener la tensión lexical de καυχάομαι en un contexto positivo.
  - Mantuve «aflicciones» en plural y «aflicción» en singular para respetar la distinción del griego.
  - Conservé «endurance» como préstamo solo para seguir el prompt; en un proyecto final probablemente debería normalizarse a «perseverancia» o «constancia» si la política editorial no admite anglicismos.
