translation:
  language: es
  text: Porque hasta la ley había pecado en el mundo; pero el pecado no se cuenta[a] donde no hay ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se carga a la cuenta» o «se imputa».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄχρι
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  - antes de
  lexicon: BDAG
  rationale: Expresa bien el límite temporal del período descrito y suena natural en español sin añadir contenido ausente del griego.
- source_word: νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - ley
  - la Ley
  lexicon: BDAG
  rationale: En este contexto paulino, la referencia es a la ley mosaica; en español, el artículo definido conserva la especificidad contextual sin forzar una mayúscula no exigida por el griego.
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - el pecado
  - la culpa
  lexicon: BDAG
  rationale: '"Pecado" mantiene la abstracción paulina y la fuerza conceptual del término singular; "culpa" estrecharía indebidamente el sentido.'
- source_word: ἐν κόσμῳ
  english_pob_choice: in the world
  chosen_spanish: en el mundo
  alternatives_spanish:
  - en el orden del mundo
  lexicon: BDAG
  rationale: La expresión es idiomática y transparente en español; conserva el alcance humano/universal de κόσμος sin sobreexplicar.
- source_word: ἐλλογεῖται
  english_pob_choice: is counted
  chosen_spanish: se contabiliza
  alternatives_spanish:
  - se cuenta
  - se imputa
  - se carga a la cuenta
  lexicon: BDAG
  rationale: El verbo tiene matiz contable/jurídico. "Se contabiliza" conserva la imagen de registro o imputación sin imponer el tecnicismo doctrinal de "imputa" en el cuerpo principal.
- source_word: μὴ ὄντος νόμου
  english_pob_choice: where there is no law
  chosen_spanish: donde no hay ley
  alternatives_spanish:
  - cuando no hay ley
  - al no haber ley
  lexicon: BDAG
  rationale: La cláusula expresa la ausencia de ley como condición; "donde no hay ley" reproduce la formulación natural del inglés POB y es clara en español.
theological_decisions:
- issue: Sentido de "ley" en el argumento de Pablo
  english_pob_reading: '"the law" with Mosaic reference implied by context.'
  chosen_spanish_reading: '"la ley" con referencia mosaica implícita por el contexto.'
  alternative_spanish_readings:
  - '"ley" sin artículo'
  - '"la Ley" con mayúscula'
  rationale: Romanos 5:13 forma parte del contraste entre Adán y Moisés; por eso conviene conservar el referente mosaico implícito sin añadir glosas al texto principal.
  doctrine_reference: Romanos 5:13; cf. Romanos 5:14
- issue: Fuerza de ἐλλογεῖται
  english_pob_reading: Used the non-technical 'is counted' in the main text.
  chosen_spanish_reading: Se usa una formulación no técnica en el texto principal.
  alternative_spanish_readings:
  - se imputa
  - se carga a la cuenta
  - se reckona
  rationale: El griego admite un sentido de registro/contabilidad con implicación jurídica. "Se contabiliza" conserva esa tensión y deja abierta la discusión sobre imputación sin resolverla en la traducción principal.
  doctrine_reference: Tensión léxico-teológica sobre imputación
translation_notes:
  revision_awareness: 'El contexto auditado coincide de manera alta con la lectura inglesa: no se registran revisiones posteriores que exijan cambios. Se mantuvo la equivalencia óptima, preservando el contraste temporal y la fuerza contable/jurídica de ἐλλογεῖται sin tecnicismo excesivo en el cuerpo principal.'
  spanish_consistency_notes:
  - Se mantuvo "ley" en minúsculas por tratarse de un referente contextual, no de un nombre propio.
  - '"Pecado" se conserva como abstracción singular, coherente con el griego y con el uso paulino.'
  - '"Se contabiliza" se eligió para respetar el campo semántico de cuenta/registro del verbo griego; la nota preserva las alternativas más técnicas.'
  - La sintaxis sigue de cerca el orden lógico del griego y del POB inglés, pero con fluidez natural en español.
