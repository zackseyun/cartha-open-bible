    changes_summary: 'Replaced ''the Messiah'' with ''Christ'' to reflect the Greek proper name/title combination ''Ἰησοῦ Χριστοῦ'' in a formal, conventional rendering for this verse. No other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Por tanto[a], habiendo sido justificados por la fe[b], tenemos paz con Dios por medio de nuestro Señor Jesús Mesías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, en algunos manuscritos, 'tengamos paz con Dios'.
    reason: textual_variant
  - marker: b
    text: O 'sobre la base de la fe'.
    reason: lexical_alternative
  - marker: c
    text: Griego Christos, 'Mesías'; tradicionalmente 'Cristo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δικαιωθέντες
  english_pob_choice: having been justified / we have been justified
  chosen_spanish: habiendo sido justificados
  alternatives_spanish:
  - habiendo sido declarados justos
  - habiendo sido absueltos
  lexicon: BDAG
  rationale: El participio aoristo pasivo expresa una acción ya realizada por Dios; en español, 'habiendo sido justificados' conserva el sentido forense paulino sin expandirlo más de lo que el texto exige. 'Declarados justos' explica, pero tiende a interpretar; 'absueltos' es posible en sentido jurídico, pero puede estrechar demasiado el matiz de δικαιόω.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca una inferencia lógica desde el argumento anterior. 'Por tanto' reproduce bien la conexión inferencial en español formal y claro.
- source_word: ἐκ πίστεως
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - a base de la fe
  - desde la fe
  lexicon: BDAG
  rationale: Aunque ἐκ es literalmente 'de / desde', en esta construcción paulina el equivalente natural y fiel en español es 'por la fe'. Mantiene la relación causal o instrumental sin mecanizar la preposición.
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - reconciliación
  - tranquilidad
  lexicon: BDAG
  rationale: El sustantivo significa 'paz'. 'Reconciliación' es interpretativo y más estrecho; 'paz' preserva la amplitud relacional y teológica del término.
- source_word: ἔχομεν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - tengamos
  lexicon: BDAG
  rationale: El texto crítico leído aquí tiene indicativo presente 'ἔχομεν', por lo que corresponde 'tenemos'. Se evita trasladar al texto principal la variante exhortativa.
- source_word: πρὸς τὸν θεὸν
  english_pob_choice: with God
  chosen_spanish: con Dios
  alternatives_spanish:
  - hacia Dios
  - ante Dios
  lexicon: BDAG
  rationale: Con 'paz', πρὸς en este contexto se entiende relacionalmente como 'con'. En español suena natural y conserva la idea de una relación restaurada con Dios.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: '''Señor'' es el equivalente reverencial habitual para κύριος y funciona bien en esta fórmula cristológica. Mantiene la dignidad del título sin volverlo explicativo en exceso.'
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús de Nazaret
  lexicon: BDAG
  rationale: Nombre propio estándar; la forma española directa es 'Jesús'.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no solo como apellido fijo. 'Mesías' preserva su valor semántico original y sigue el criterio doctrinal del proyecto; 'Cristo' queda como alternativa tradicional pero menos transparente para el sentido del término.
theological_decisions:
- issue: Valor de δικαιωθέντες en la argumentación paulina
  english_pob_reading: Rendered as 'we have been justified' without expanding it into a fuller doctrinal formula.
  chosen_spanish_reading: '''habiendo sido justificados'' conserva la acción justificadora de Dios sin convertirla en una paráfrasis doctrinal.'
  alternative_spanish_readings:
  - '''habiendo sido declarados justos'''
  - '''habiendo sido hechos justos'''
  rationale: El versículo afirma el resultado de la acción justificadora, pero no especifica aquí todo el mecanismo teológico. La redacción española mantiene la tensión forense y evita imponer una explicación más cerrada que la del texto.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
- issue: Sentido de 'paz con Dios'
  english_pob_reading: Objective peace with God as restored relation, stated simply as 'peace with God.'
  chosen_spanish_reading: '''paz con Dios'' como relación restaurada con Dios, sin añadir una glosa como ''reconciliación'' en el texto principal.'
  alternative_spanish_readings:
  - '''reconciliación con Dios'''
  - '''paz interior de Dios'''
  rationale: La expresión apunta primariamente a una relación objetiva restaurada. 'Paz' respeta el sustantivo griego; 'reconciliación' puede ser una implicación legítima, pero no sustituye el término del texto.
  doctrine_reference: No importar al texto afirmaciones doctrinales que el versículo no formula explícitamente
- issue: Título cristológico Χριστοῦ
  english_pob_reading: Greek Christos, 'Messiah'; traditionally 'Christ.'
  chosen_spanish_reading: '''Mesías'' en el texto principal, porque Χριστός aquí es título y no mera etiqueta fija.'
  alternative_spanish_readings:
  - '''Cristo'''
  rationale: El proyecto prioriza 'Mesías' cuando el griego usa el título. En este versículo, además, la secuencia 'Jesús Mesías' hace visible el sentido del término original sin perder inteligibilidad.
  doctrine_reference: Mantener la distinción entre título y nombre convencional
- issue: Variante textual de ἔχομεν / ἔχωμεν
  english_pob_reading: The supplied SBLGNT text reads the indicative ἔχομεν; the hortatory subjunctive reading is a known textual variant and is preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue 'tenemos', con nota para la variante 'tengamos'.
  alternative_spanish_readings:
  - '''tengamos paz con Dios'''
  rationale: La lectura crítica base es indicativa. La variante exhortativa es real y debe quedar visible, pero no desplaza la lectura principal del testigo fuente usado aquí.
  doctrine_reference: Dar cuenta de la variante sin ocultar la lectura base
translation_notes:
  revision_awareness: El borrador sigue la lectura crítica SBLGNT con ἔχομεν ('tenemos') y conserva la variante exhortativa en nota. También recupera la política POB de traducir Χριστός como 'Mesías' en el texto principal, en lugar de 'Cristo', tras la oscilación documentada en las revisiones inglesas. Se evita mecanizar 'ἐκ πίστεως' como 'desde la fe' y se mantiene el valor relacional de πρὸς τὸν θεόν como 'con Dios'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - '''Mesías'' se reserva para Χριστός como título; ''Cristo'' queda en la nota como alternativa tradicional.'
  - '''Señor'' se mantiene para κύριος conforme al uso reverencial del NT.'
  - La puntuación y el orden de cláusulas buscan sonar naturales en español sin diluir la inferencia lógica de οὖν.
  - No se añadió glosa interpretativa a 'paz con Dios' en el cuerpo del texto.
