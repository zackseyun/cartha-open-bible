translation:
  language: es
  text: Con mucha más razón[a], habiendo sido ahora justificados[b] por su sangre[c], seremos salvos por medio de él de la ira[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mucho más entonces».'
    reason: alternative_reading
  - marker: b
    text: 'O: «habiendo sido declarados justos».'
    reason: lexical_alternative
  - marker: c
    text: Lit. «en su sangre».
    reason: lexical_alternative
  - marker: d
    text: Es decir, la ira divina implícita por el contexto.
    reason: cross_reference
lexical_decisions:
- source_word: πολλῷ οὖν μᾶλλον
  english_pob_choice: Much more then
  chosen_spanish: Mucho más entonces
  alternatives_spanish:
  - Así que mucho más
  - Con mucha más razón
  lexicon: BDAG
  rationale: Conserva la relación inferencial de οὖν y el intensificador comparativo μᾶλλον sin volver la frase pesada. «Entonces» refleja el enlace lógico; «Mucho más» mantiene el énfasis paulino.
- source_word: δικαιωθέντες
  english_pob_choice: having ... been justified
  chosen_spanish: habiendo ahora sido justificados
  alternatives_spanish:
  - habiendo sido declarados justos
  - una vez justificados
  lexicon: BDAG
  rationale: El participio aoristo pasivo pide una acción previa respecto del futuro principal. «Justificados» preserva el lenguaje forense paulino; se mantiene la posibilidad de «declarados justos» como alternativa interpretativa, pero no se coloca en el texto principal.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este tiempo
  - ya
  lexicon: BDAG
  rationale: Es un adverbio temporal simple que señala el estado presente resultante de la justificación.
- source_word: ἐν τῷ αἵματι αὐτοῦ
  english_pob_choice: by his blood
  chosen_spanish: en su sangre
  alternatives_spanish:
  - por su sangre
  - mediante su sangre
  lexicon: BDAG
  rationale: Aunque ἐν puede expresar medio, el español natural aquí conserva la preposición «en» con valor sacrificial/relacional, sin borrar el lenguaje bíblico directo de «sangre». La nota permite la alternativa instrumental que el inglés POB documentó.
- source_word: σωθησόμεθα
  english_pob_choice: shall we be saved
  chosen_spanish: seremos salvos
  alternatives_spanish:
  - seremos rescatados
  - seremos librados
  lexicon: BDAG
  rationale: El futuro pasivo indica una salvación aún futura. «Seremos salvos» es claro y fiel; se evita una paráfrasis que diluya la terminología soteriológica de Pablo.
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por él
  - a través de él
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación/instrumentalidad. «Por medio de él» suena natural en español y preserva con precisión la mediación personal de Cristo.
- source_word: ἀπὸ τῆς ὀργῆς
  english_pob_choice: from the wrath
  chosen_spanish: de la ira
  alternatives_spanish:
  - de la cólera
  - del juicio de ira
  lexicon: BDAG
  rationale: «La ira» mantiene la referencia definida del artículo griego sin añadir explícitamente «de Dios» al texto principal. En español bíblico, el término conserva la carga escatológica y judicial del pasaje.
theological_decisions:
- issue: Naturaleza de δικαιωθέντες
  english_pob_reading: Retain 'justified' in the main text
  chosen_spanish_reading: Retener «justificados» en el texto principal
  alternative_spanish_readings:
  - declarados justos
  rationale: Se preserva el lenguaje forense paulino sin resolver la tensión entre traducción lexical y explicación doctrinal. «Justificados» mantiene continuidad con el campo semántico de δικαιόω y evita una glosa interpretativa en el cuerpo del versículo.
  doctrine_reference: Conservar la tensión teológica/lexical documentada; no sustituir el término técnico por una explicación.
- issue: Referente de ἡ ὀργή
  english_pob_reading: Render as 'the wrath' without explicit expansion
  chosen_spanish_reading: Traducir «la ira» sin expansión explícita
  alternative_spanish_readings:
  - la ira de Dios
  rationale: El contexto apunta con fuerza a la ira divina, pero el griego no añade el genitivo «de Dios». La redacción principal conserva la forma textual y deja la inferencia al contexto, como hace el POB inglés.
  doctrine_reference: No importar afirmaciones doctrinales que el texto no enuncia de manera explícita.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés al evitar una apertura con «por tanto» y al reflejar la secuencia paulina como una inferencia intensificada: «Mucho más entonces». También se respetó la decisión revisada de mantener «su sangre», «por medio de él» y «la ira» sin expansiones no explícitas.'
  spanish_consistency_notes:
  - Se mantiene «justificados» como término técnico, coherente con el uso paulino y con el POB inglés.
  - «Ira» conserva la definitud del artículo griego sin añadir «de Dios» en el texto principal.
  - La elección de «por medio de él» mantiene la mediación personal de Cristo y evita un calco duro de la preposición griega.
  - Las alternativas entre corchetes con letras quedan ancladas en el texto principal y siguen el orden único de marcadores.
