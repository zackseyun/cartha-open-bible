translation:
  language: es
  text: por medio de quien también hemos obtenido acceso por la fe a esta gracia en la cual estamos,[a] y nos gloriamos en la esperanza de la gloria de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos regocijamos» o «exultamos».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσαγωγή
  english_pob_choice: access
  chosen_spanish: acceso
  alternatives_spanish:
  - entrada
  - introducción
  lexicon: BDAG
  rationale: «Acceso» comunica bien la idea de haber sido introducidos a una nueva condición ante Dios sin sonar forzado en español. «Entrada» es posible, pero puede sugerir simplemente un lugar; «introducción» suena demasiado abstracta o interpersonal.
- source_word: πίστει
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - mediante la fe
  lexicon: BDAG
  rationale: El dativo instrumental se expresa naturalmente con «por la fe» en español, conservando la relación de medio sin volver la frase pesada.
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: En este contexto paulino, «gracia» es la traducción directa y teológicamente estable. «Favor» explicita el sentido, pero pierde la forma lexical habitual del texto.
- source_word: ἑστήκαμεν
  english_pob_choice: we stand
  chosen_spanish: estamos firmes
  alternatives_spanish:
  - estamos de pie
  - permanecemos en pie
  - hemos estado
  lexicon: BDAG
  rationale: El perfecto griego expresa un estado presente resultante, no solo una acción pasada. «Estamos firmes» comunica ese estado continuo en español y mantiene el matiz de permanencia sin sonar artificial.
- source_word: καυχώμεθα
  english_pob_choice: we boast
  chosen_spanish: nos gloriamos
  alternatives_spanish:
  - nos jactamos
  - nos regocijamos
  - nos ufanamos
  lexicon: BDAG
  rationale: En español, «nos gloriamos» preserva mejor el valor positivo y retóricamente fuerte del verbo, sin cargarlo con la connotación negativa de «jactarse». «Nos regocijamos» suavizaría demasiado la tensión lexical que Pablo mantiene.
- source_word: ἐπ’ ἐλπίδι
  english_pob_choice: in the hope
  chosen_spanish: en la esperanza
  alternatives_spanish:
  - con esperanza
  - sobre la base de la esperanza
  lexicon: BDAG
  rationale: «En la esperanza» reproduce de manera natural la esfera o marco en que ocurre la acción. La alternativa «con esperanza» es correcta, pero menos precisa para este giro preposicional.
- source_word: δόξης τοῦ θεοῦ
  english_pob_choice: the glory of God
  chosen_spanish: la gloria de Dios
  alternatives_spanish:
  - la gloria de Dios
  - la gloria que pertenece a Dios
  lexicon: BDAG
  rationale: «La gloria de Dios» es la correspondencia más transparente del genitivo y conserva el tono solemne del original. No se requiere explicitar la relación genitiva en español.
theological_decisions:
- issue: Conservar la tensión lexical de καυχώμεθα sin resolverla hacia un simple sentimiento devocional
  english_pob_reading: we boast
  chosen_spanish_reading: nos gloriamos
  alternative_spanish_readings:
  - nos regocijamos
  - nos jactamos
  rationale: La POB inglesa preserva la fuerza del verbo con «we boast», y en español «nos gloriamos» mantiene ese tono de confianza celebrativa sin convertirlo en una jactancia peyorativa. «Nos regocijamos» suavizaría la tensión paulina; «nos jactamos» sonaría negativamente en español.
  doctrine_reference: Mantener la tensión retórica paulina en lugar de neutralizarla.
- issue: Expresar correctamente el estado presente del creyente en ἐν ᾗ ἑστήκαμεν
  english_pob_reading: in which we stand
  chosen_spanish_reading: en la cual estamos firmes
  alternative_spanish_readings:
  - en la cual permanecemos
  - en la cual estamos de pie
  rationale: El griego perfecto apunta a una condición actual y estable. «Estamos firmes» comunica mejor esa continuidad que una forma meramente literal, y evita una imagen corporal poco natural en español.
  doctrine_reference: La gracia es una esfera de permanencia concedida por Dios.
translation_notes:
  revision_awareness: El contexto inglés presenta acuerdo alto y sin cambios recientes; se mantiene la solución auditada de POB para προσαγωγή, πίστει, χάρις, ἑστήκαμεν, καυχώμεθα, ἐπ’ ἐλπίδι y δόξα τοῦ θεοῦ, con adaptación natural al español y sin introducir decisiones textuales nuevas.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo de las dos cláusulas principales: acceso a la gracia y jactancia/gloria en la esperanza.'
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino, sino θεοῦ, que se rinde como «Dios».
  - «Gracia» se mantiene como término técnico paulino, coherente con el uso estándar del proyecto.
  - «Nos gloriamos» conserva la ambivalencia positiva de καυχάομαι sin domesticarla a «alegrarse».
