translation:
  language: es
  text: Porque, mientras aún éramos débiles, a su debido tiempo el Mesías murió por los impíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en favor de los impíos».
    reason: alternative_reading
lexical_decisions:
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: En este contexto Χριστός funciona como título, no como nombre propio fijo; por eso se vierte con el título español “Mesías”, siguiendo la decisión del POB inglés y la política del proyecto para el valor titulado de Χριστός.
- source_word: ὄντων ἡμῶν ἀσθενῶν
  english_pob_choice: while we were still weak
  chosen_spanish: mientras aún éramos débiles
  alternatives_spanish:
  - mientras aún éramos impotentes
  - mientras aún estábamos débiles
  lexicon: BDAG
  rationale: El genitivo absoluto se expresa naturalmente en español con una subordinada temporal. “Débiles” conserva la amplitud semántica de ἀσθενῶν sin estrecharla a una debilidad solo física o a una incapacidad técnica más fuerte de lo que exige el griego.
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  lexicon: BDAG
  rationale: El adverbio marca continuidad de la condición. “Aún” reproduce con naturalidad esa persistencia en español y evita recargar la frase con repetición innecesaria.
- source_word: κατὰ καιρὸν
  english_pob_choice: at the right time
  chosen_spanish: a su debido tiempo
  alternatives_spanish:
  - en el tiempo señalado
  - en el momento oportuno
  lexicon: BDAG
  rationale: La frase indica un tiempo oportuno o fijado. “A su debido tiempo” comunica la idea de oportunidad y conveniencia temporal sin imponer una especificación doctrinal más fuerte que el griego.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - en nombre de
  lexicon: BDAG
  rationale: En este contexto sacrificial/representativo, “por” conserva la fuerza de beneficio o representación sin forzar la relación exacta entre sustitución y representación más allá de lo que el texto deja abierto.
- source_word: ἀσεβῶν
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los irreverentes
  - los sin piedad
  lexicon: BDAG
  rationale: “Impíos” es un equivalente natural y solemne en español para el ámbito paulino de personas sin reverencia hacia Dios. Mantiene el valor moral-religioso mejor que un término más explicativo o menos estable.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  lexicon: BDAG
  rationale: El aoristo se traduce de manera directa y sobria con “murió”; no hace falta expandir el verbo ni cargarlo con interpretaciones adicionales.
theological_decisions:
- issue: Alcance de ὑπὲρ ἀσεβῶν
  english_pob_reading: 'for the ungodly / possible gloss: on behalf of the ungodly'
  chosen_spanish_reading: por los impíos
  alternative_spanish_readings:
  - en favor de los impíos
  - en nombre de los impíos
  rationale: 'La traducción principal conserva la apertura de ὑπὲρ: Cristo murió “por” los impíos, sin resolver de antemano si la idea dominante es representación, beneficio o sustitución. Esto preserva la tensión lexical y teológica que el POB inglés dejó abierta con su nota alternativa.'
  doctrine_reference: Preservar la tensión teológica sin cerrarla en una fórmula sistemática no explicitada por el versículo.
translation_notes:
  revision_awareness: El contexto editorial inglés muestra una oscilación revisional entre “Christ” y “Messiah”, con restauración final de “Messiah” por coherencia con la política del proyecto para Χριστός. El español sigue esa decisión final con “Mesías” y mantiene la abertura semántica de ὑπὲρ mediante “por”, sin convertirla en una fórmula más técnica que el texto griego ni la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene “Mesías” para Χριστός conforme al criterio del proyecto.
  - “Impíos” traduce ἀσεβῶν con registro bíblico natural en español.
  - Se usa “aún” para ἔτι en una sola aparición, reflejando continuidad sin redundancia.
  - La nota [a] se ancla en “débiles” y recoge una alternativa española real dentro del campo semántico del adjetivo griego.
