translation:
  language: es
  text: Pero la muerte reinó desde Adán hasta Moisés, aun sobre los que no pecaron en la semejanza de la transgresión de Adán, quien es figura[a] del que ha de venir[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «modelo» o «prefiguración» para «figura».
    reason: lexical_alternative
  - marker: b
    text: O «el venidero». El referente en este contexto es Cristo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: Yet
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: ἀλλά
  rationale: Introduce un contraste fuerte con lo anterior; en español, «Pero» es natural y suficientemente marcado sin sonar excesivamente literario.
- source_word: ἐβασίλευσεν
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - gobernó
  - ejerció su dominio
  lexicon: βασιλεύω
  rationale: Conserva la personificación de la muerte como poder reinante, que es el valor que la POB inglesa preserva con «reigned».
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: θάνατος
  rationale: Traducción directa y clara; mantiene el sujeto personificado del verbo.
- source_word: ἀπὸ Ἀδὰμ μέχρι Μωϋσέως
  english_pob_choice: from Adam until Moses
  chosen_spanish: desde Adán hasta Moisés
  alternatives_spanish:
  - de Adán hasta Moisés
  - desde Adán y hasta Moisés
  lexicon: ἀπό / μέχρι
  rationale: Expresa con naturalidad el intervalo temporal completo sin perder precisión.
- source_word: ἐπὶ τοὺς μὴ ἁμαρτήσαντας
  english_pob_choice: even over those who did not sin
  chosen_spanish: aun sobre los que no pecaron
  alternatives_spanish:
  - también sobre los que no pecaron
  - incluso sobre los que no pecaron
  lexicon: ἐπί / ἁμαρτάνω
  rationale: «Aun sobre» reproduce el alcance sorprendente del reinado de la muerte, como en la lectura inglesa; «pecaron» conserva el sentido moral de ἁμαρτάνω.
- source_word: ἐπὶ τῷ ὁμοιώματι
  english_pob_choice: in the likeness
  chosen_spanish: en la semejanza
  alternatives_spanish:
  - según la semejanza
  - en la misma semejanza
  lexicon: ὁμοίωμα
  rationale: «Semejanza» es un equivalente natural y formal; evita explicar de más la comparación de Pablo.
- source_word: παραβάσεως
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - trasgresión
  - violación
  lexicon: παράβασις
  rationale: Mantiene el matiz de cruzar un límite o mandato, coherente con la opción teológica y léxica de la POB inglesa.
- source_word: τύπος
  english_pob_choice: type
  chosen_spanish: figura
  alternatives_spanish:
  - tipo
  - modelo
  - patrón
  lexicon: τύπος
  rationale: En español, «figura» comunica bien la relación tipológica sin el falso amigo técnico de «tipo», que puede sonar poco natural o ambiguo.
- source_word: τοῦ μέλλοντος
  english_pob_choice: the coming one
  chosen_spanish: del que había de venir
  alternatives_spanish:
  - del que viene
  - del venidero
  - del que está por venir
  lexicon: μέλλω
  rationale: La expresión evita identificarlo mecánicamente en el texto, pero deja abierta la referencia futura; es una forma natural y reverente en español.
theological_decisions:
- issue: Referente de «el que había de venir»
  english_pob_reading: The phrase refers to Christ as the future counterpart to Adam in Paul's typology.
  chosen_spanish_reading: La frase queda abierta en la traducción, pero el contexto apunta a Cristo como contraparte futura de Adán.
  alternative_spanish_readings:
  - el que viene
  - el futuro representante
  rationale: 'Se conserva la tensión interpretativa del griego y de la POB inglesa: el texto no añade «Cristo» en la línea principal, pero el contexto paulino lo identifica.'
  doctrine_reference: Romanos 5:12–21; tipología Adán-Cristo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se mantuvo la lectura óptima ya auditada. La redacción española sigue de cerca esa decisión, ajustando solo la naturalidad idiomática necesaria.
  spanish_consistency_notes:
  - Se mantiene «Adán» y «Moisés» con la grafía usual en español.
  - Se usa «transgresión» para παράβασις, en continuidad con la decisión inglesa.
  - Se evita importar «Cristo» al cuerpo principal para respetar la tensión textual del participio sustantivado.
  - «Figura» se usa en sentido tipológico, no meramente ornamental.
