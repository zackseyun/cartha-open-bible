revisions:
- from: Pero la muerte reinó desde Adán hasta Moisés[a], aun sobre los que no pecaron en la semejanza de la transgresión de Adán[b], quien es figura del que había de venir.
  to: Pero la muerte reinó desde Adán hasta Moisés, aun sobre los que no pecaron en la semejanza de la transgresión de Adán, quien es figura[a] del que ha de venir[b].
  rationale: 'Se corrigen las notas para que correspondan a las decisiones auditadas del griego y de la POB inglesa: la alternativa léxica va con τύπος («figura») y la nota interpretativa va con τοῦ μέλλοντος («del que ha de venir»). También se elimina una nota redundante sobre «Moisés» y se ajusta levemente «había de venir» a «ha de venir» para una formulación más natural y más cercana al valor del participio sustantivado.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:11:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego: mantiene el contraste de ἀλλὰ, la personificación de la muerte que «reinó», el alcance sorprendente «aun sobre los que no pecaron», la formulación relativamente formal de «semejanza de la transgresión de Adán» y la tipología de Adán como τύπος del futuro referente. Sin embargo, los pies de nota están mal asignados respecto del contenido auditado en inglés: la nota [a] no corresponde a «Moisés», sino a una alternativa para τύπος; y la nota [b] no debe repetir una frase del texto, sino aclarar la alternativa «el que ha de venir / el venidero» y su referente contextual.'
  spanish_quality_summary: 'El español principal es claro, digno y ampliamente legible. «Pero» y «reinó» funcionan bien. «Figura» es una buena solución para τύπος en español eclesial; «del que había de venir» suena natural y reverente, aunque «del que ha de venir» es un poco más directo y contemporáneo. El problema principal no es de redacción sino de aparato crítico: las notas actuales inducen a error y no reflejan la justificación léxica de la POB.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece YHWH, Mesías/Cristo como título principal, ni otros términos sensibles del glosario. La decisión «figura» para τύπος es una excepción razonable y bien motivada en español frente al inglés «type».
  issues:
  - severity: high
    issue: Las notas al pie están vinculadas a las frases equivocadas y no preservan las alternativas documentadas en la auditoría inglesa.
    rationale: En la POB inglesa, la nota a pertenece a «type» (τύπος) y la nota b a «the coming one» (τοῦ μέλλοντος). El borrador español pone [a] tras «Moisés» y [b] tras «Adán», con contenidos que no corresponden al texto fuente ni a la documentación.
  - severity: medium
    issue: La nota [a] propuesta («O “hasta Moisés”») es redundante y no aporta ninguna alternativa real.
    rationale: «Desde Adán hasta Moisés» ya está en el texto; la nota no conserva ninguna variante significativa del original ni de la auditoría inglesa.
  - severity: medium
    issue: La nota [b] propuesta repite una expresión ya presente en el texto en lugar de aclarar el referente de τοῦ μέλλοντος.
    rationale: La auditoría inglesa conserva la tensión textual en la línea principal, pero explica en nota la posibilidad «the one to come» y que el referente contextual es Cristo; eso debe reflejarse también en español.
  - severity: low
    issue: «Había de venir» es entendible, pero «ha de venir» o «el venidero» reflejan mejor el participio sustantivado sin sonar tan arcaizante.
    rationale: No es un error de fidelidad; es un ajuste menor de naturalidad y precisión temporal. Aun así, puede mantenerse si se prefiere su tono más tradicional.
  revised_spanish_text: Pero la muerte reinó desde Adán hasta Moisés, aun sobre los que no pecaron en la semejanza de la transgresión de Adán, quien es figura[a] del que ha de venir[b].
  revised_footnotes:
  - marker: a
    text: O «modelo» o «prefiguración» para «figura».
    reason: lexical_alternative
  - marker: b
    text: O «el venidero». El referente en este contexto es Cristo.
    reason: alternative_reading
  revision_rationale: 'Se corrigen las notas para que correspondan a las decisiones auditadas del griego y de la POB inglesa: la alternativa léxica va con τύπος («figura») y la nota interpretativa va con τοῦ μέλλοντος («del que ha de venir»). También se elimina una nota redundante sobre «Moisés» y se ajusta levemente «había de venir» a «ha de venir» para una formulación más natural y más cercana al valor del participio sustantivado.'
