translation:
  language: es
  text: Porque apenas alguien moriría por un justo[a]; aunque quizá por una persona buena[b] alguien incluso se atrevería a morir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un hombre justo». El griego es gramaticalmente masculino, pero aquí probablemente tiene fuerza genérica.'
    reason: lexical_alternative
  - marker: b
    text: La contraposición entre «justo» y «persona buena» puede ser intencional, no solo estilística.
    reason: alternative_reading
lexical_decisions:
- source_word: μόλις
  english_pob_choice: hardly
  chosen_spanish: apenas
  alternatives_spanish:
  - con dificultad
  - raramente
  - casi no
  lexicon: BDAG
  rationale: Expresa que algo sucede sólo de manera muy improbable o limitada. 'Apenas' es natural en español y conserva la fuerza de rareza o dificultad del enunciado.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - por causa de
  - en beneficio de
  lexicon: BDAG
  rationale: En este contexto, ὑπέρ marca relación de beneficio o representación. 'Por' es la opción más idiomática en español y deja abierta la precisión contextual sin forzar una explicación interpretativa.
- source_word: δικαίου
  english_pob_choice: righteous person
  chosen_spanish: un justo
  alternatives_spanish:
  - una persona justa
  - un hombre justo
  - un justo/a
  lexicon: BDAG
  rationale: El griego usa un adjetivo sustantivado con género masculino gramatical y fuerza genérica probable. 'Un justo' mantiene la categoría moral de 'righteous' sin sobrecargar con una perífrasis más larga; la genericidad se explica en nota.
- source_word: ἀποθανεῖται
  english_pob_choice: will die
  chosen_spanish: moriría
  alternatives_spanish:
  - morirá
  - habría de morir
  lexicon: BDAG
  rationale: En español, el condicional comunica mejor la idea general/proverbial del enunciado que un futuro meramente temporal. Preserva el matiz hipotético de la afirmación sin convertirla en simple predicción.
- source_word: τοῦ ἀγαθοῦ
  english_pob_choice: a good person
  chosen_spanish: un bueno
  alternatives_spanish:
  - una persona buena
  - un benefactor
  - un bienhechor
  lexicon: BDAG
  rationale: Se mantiene la distinción léxica respecto de 'justo' y el tono caracterizador del sustantivo/adjetivo griego. 'Un bueno' es breve y refleja la sustantivación; la alternativa más explicativa queda disponible, pero no se impone en el texto principal.
- source_word: τάχα
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - posiblemente
  - acaso
  lexicon: BDAG
  rationale: Marca posibilidad sin afirmación fuerte. 'Quizá' es claro, sobrio y compatible con el registro formal del pasaje.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: incluso
  alternatives_spanish:
  - hasta
  - también
  lexicon: BDAG
  rationale: 'Aquí καί es ascensivo: intensifica la posibilidad de atreverse a morir. ''Incluso'' reproduce bien ese valor en español.'
- source_word: τολμᾷ
  english_pob_choice: might even dare
  chosen_spanish: se atrevería
  alternatives_spanish:
  - osaría
  - se animaría a
  - llegaría a atreverse
  lexicon: BDAG
  rationale: El verbo expresa osadía o valentía ante una acción extrema. 'Se atrevería' es natural en español y conserva el sentido potencial del contexto junto con quizá.
- source_word: ἀποθανεῖν
  english_pob_choice: to die
  chosen_spanish: a morir
  alternatives_spanish:
  - morir
  - para morir
  lexicon: BDAG
  rationale: La repetición del motivo de la muerte se mantiene de forma directa y fluida en español. La preposición 'a' tras 'atreverse' es la construcción idiomática.
theological_decisions:
- issue: Distinguir δικαίου y ἀγαθοῦ sin aplanarlos
  english_pob_reading: Render them distinctly as 'righteous person' and 'good person.'
  chosen_spanish_reading: Renderizarlos distintamente como 'un justo' y 'un bueno'.
  alternative_spanish_readings:
  - tratar ambos como casi sinónimos y traducirlos de manera uniforme
  - usar 'una persona justa' y 'una persona buena'
  rationale: La frase griega parece avanzar de una categoría moral estricta a otra cualitativamente distinta, y el contraste puede ser intencional. La traducción distingue los términos para no borrar esa tensión, aunque se reconoce que el masculino gramatical puede ser genérico.
  doctrine_reference: Preservar la tensión teológica y léxica; consistencia de términos clave, salvo excepción documentada.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del expediente inglés: no se reportan cambios aplicados y el texto mantiene el acuerdo alto del control cruzado. La versión española conserva ese mismo equilibrio entre literalidad controlada y fluidez idiomática.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se preserva la distinción entre categorías morales distintas ('justo' / 'bueno') en lugar de suavizarlas.
  - Se usa un tono formal y eclesialmente legible, sin calcos innecesarios del inglés.
