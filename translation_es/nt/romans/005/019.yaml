    reason: lexical_alternative
  revision_rationale: 'Se corrige el español no idiomático «del uno hombre» a «del único hombre» / «del único», que comunica de forma natural la fuerza identificadora de τοῦ ἑνὸς en contexto. Se reordenan y rehacen las notas para que correspondan al audit trail: una alternativa léxica real para καθίστημι en ambas cláusulas y una nota específica en la segunda cláusula sobre la elipsis de «hombre». Así se preservan mejor el sentido fuente, la claridad en español y la justificación léxico-teológica documentada.'
