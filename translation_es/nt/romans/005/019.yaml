review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura comparativa, el contraste desobediencia/obediencia, «los muchos» para οἱ πολλοί, y evita interpretar δίκαιοι con «justificados». Sin embargo, hay errores en el manejo de las notas y en la expresión española de τοῦ ἑνὸς ἀνθρώπου / τοῦ ἑνὸς: el texto principal «del uno hombre» es antinatural e incorrecto en español, y las notas a/c quedaron asociadas al lugar equivocado, de modo que no preservan fielmente el audit trail inglés.'
  spanish_quality_summary: 'La legibilidad se ve afectada por «del uno [a] hombre», que suena no idiomático. «Del un hombre» tampoco sería adecuado; la forma natural es «del único hombre» o mejor «de un solo hombre», pero para reflejar el valor identificador y el audit trail conviene «del único hombre» en la primera cláusula. La segunda cláusula puede mantener «del único» con nota que indique que el griego dice literalmente «del uno» y que «hombre» se sobreentiende. También debe corregirse la colocación de notas: la nota sobre «constituidos pecadores» no puede ir anclada en «uno/hombre», y la nota sobre la elipsis de «hombre» debe ir en la segunda cláusula.'
  glossary_alignment: No hay términos del glosario de proyecto especialmente conflictivos aquí. «Justos» para δίκαιοι es aceptable y coherente con la decisión teológica documentada. «Constituidos» es defendible para καθίστημι, aunque algo técnico; sigue de cerca la rationale auditada. «Los muchos» preserva correctamente οἱ πολλοί.
  issues:
  - severity: high
    issue: «del uno hombre» es español incorrecto y no fielmente legible
    rationale: La secuencia no funciona en español natural y compromete la claridad del referente representativo de τοῦ ἑνὸς ἀνθρώπου. Debe reformularse idiomáticamente.
  - severity: high
    issue: Las notas a y c están mal ancladas y no corresponden al contenido del texto
    rationale: La nota a dice «O “fueron constituidos pecadores”», pero el texto principal ya dice exactamente eso y además el anclaje está en «uno/hombre». La nota c repite exactamente el texto principal «serán constituidos justos». Esto no preserva el patrón del audit trail inglés, que ofrecía alternativas reales.
  - severity: medium
    issue: La nota sobre la elipsis de «hombre» debe anclarse en la segunda cláusula, no en la primera
    rationale: El comentario léxico relevante corresponde a τοῦ ἑνὸς en la segunda mitad del versículo, donde el griego omite ἀνθρώπου.
  - severity: low
    issue: «constituidos» suena más técnico que «hechos», pero es admisible
    rationale: No requiere cambio obligatorio, porque refleja bien la alternativa léxica documentada y mantiene el paralelismo del versículo.
  revised_spanish_text: Porque así como por la desobediencia del único hombre los muchos fueron constituidos[a] pecadores, así también por la obediencia del único[b] los muchos serán constituidos[c] justos.
