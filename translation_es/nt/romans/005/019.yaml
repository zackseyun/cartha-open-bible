translation:
  language: es
  text: Porque así como por la desobediencia del único hombre los muchos fueron constituidos[a] pecadores, así también por la obediencia del único[b] los muchos serán constituidos[c] justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron hechos pecadores».
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «por la obediencia del uno»; «hombre» se sobreentiende por el paralelismo con la primera cláusula.
    reason: lexical_alternative
  - marker: c
    text: O «serán hechos justos».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακοῆς
  english_pob_choice: disobedience
  chosen_spanish: desobediencia
  alternatives_spanish:
  - transgresión
  lexicon: BDAG
  rationale: παρακοή expresa falta de obediencia; «desobediencia» reproduce de forma directa el contraste paulino con ὑπακοή y evita debilitar la antítesis.
- source_word: τοῦ ἑνὸς ἀνθρώπου
  english_pob_choice: of the one man
  chosen_spanish: del uno hombre
  alternatives_spanish:
  - del único hombre
  - del uno
  lexicon: BDAG
  rationale: El griego identifica a una sola persona representativa; en español, la omisión de «hombre» haría menos natural el paralelismo con la primera cláusula, por lo que se conserva explícitamente en forma breve.
- source_word: ἁμαρτωλοὶ
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - sinfundios
  - personas pecadoras
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente/predicativamente; «pecadores» es la equivalencia normal y clara en español bíblico contemporáneo.
- source_word: κατεστάθησαν
  english_pob_choice: were made
  chosen_spanish: fueron constituidos
  alternatives_spanish:
  - fueron hechos
  - fueron nombrados
  - fueron puestos
  lexicon: BDAG
  rationale: καθίστημι aquí apunta a un estado/condición constituida; «constituidos» preserva mejor la fuerza de estatus del pasivo y mantiene la tensión lexical que el inglés POB anotó con «were constituted sinners».
- source_word: οἱ πολλοί
  english_pob_choice: the many
  chosen_spanish: los muchos
  alternatives_spanish:
  - muchos
  lexicon: BDAG
  rationale: Se conserva el artículo con «los muchos» para reflejar el alcance formulado por Pablo sin resolver interpretativamente si equivale a «todos».
- source_word: ὑπακοῆς
  english_pob_choice: obedience
  chosen_spanish: obediencia
  alternatives_spanish:
  - sumisión
  lexicon: BDAG
  rationale: Es el correlato léxico directo de παρακοή y debe mantenerse en paralelo para preservar la estructura antitética del versículo.
- source_word: τοῦ ἑνὸς
  english_pob_choice: of the one man
  chosen_spanish: del uno
  alternatives_spanish:
  - del uno hombre
  - del único
  lexicon: BDAG
  rationale: En la segunda cláusula el griego omite ἀνθρώπου; en español se conserva la elipsis con «del uno», permitiendo que el paralelismo con la primera cláusula siga audible sin añadir innecesariamente «hombre».
- source_word: δίκαιοι
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - justificados
  lexicon: BDAG
  rationale: En este contexto paulino, δίκαιος puede expresarse como «justos» en español. Se evita «justificados» porque el griego no usa δικαιόω aquí; «justos» mantiene el sentido de estado/condición sin sobreespecificar la categoría forense.
- source_word: κατασταθήσονται
  english_pob_choice: will be made
  chosen_spanish: serán constituidos
  alternatives_spanish:
  - serán hechos
  - serán nombrados
  lexicon: BDAG
  rationale: El futuro pasivo mantiene el paralelismo con κατεστάθησαν. «Serán constituidos» conserva la idea de estado conferido/establecido y refleja la elección inglesa de no convertir el verbo en una declaración más interpretativa.
theological_decisions:
- issue: Cómo renderizar οἱ πολλοί sin resolver su alcance doctrinal.
  english_pob_reading: the many
  chosen_spanish_reading: los muchos
  alternative_spanish_readings:
  - todos
  - muchos
  rationale: Se preserva la expresión de Pablo sin convertirla en una explicación interpretativa. «Los muchos» conserva la tensión textual-teológica y evita cerrar el debate sobre su alcance.
  doctrine_reference: Preservar la tensión teológica del texto; no armonizar interpretativamente.
- issue: Si traducir δίκαιοι como lenguaje forense («declarados justos») o de estado («justos»).
  english_pob_reading: will be made righteous
  chosen_spanish_reading: serán constituidos justos
  alternative_spanish_readings:
  - serán declarados justos
  - serán hechos justos
  rationale: El griego usa καθίστημι con δίκαιοι, no δικαιόω. «Serán constituidos justos» mantiene el valor de constitución/estatus sin introducir una terminología forense ajena al texto.
  doctrine_reference: Primacía del original; evitar sustituir el verbo griego por un concepto doctrinal más explícito.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. La redacción mantiene el paralelismo adámico/cristológico y conserva la tensión de οἱ πολλοί y de καθίστημι sin resolverla interpretativamente.
  spanish_consistency_notes:
  - Se prefirió «constituidos» para reflejar καθίστημι en ambas cláusulas y conservar el paralelismo verbal.
  - Se mantuvo «los muchos» para οἱ πολλοί, evitando la reducción a «muchos» sin artículo o a «todos».
  - Se evitó «justificados» porque el griego no usa δικαιόω en este versículo.
  - La elipsis de ἀνθρώπου en la segunda cláusula se manejó con «del uno», siguiendo la economía del griego y la nota auditada en inglés.
