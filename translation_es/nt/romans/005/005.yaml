translation:
  language: es
  text: Y la esperanza no avergüenza[a], porque el amor de Dios ha sido derramado en nuestros corazones por medio del Espíritu Santo[b], que nos fue dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, menos probable, «nuestro amor por Dios».
    reason: alternative_reading
  - marker: b
    text: O «no defrauda».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπίς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - la esperanza
  lexicon: BDAG
  rationale: Esperanza es el equivalente natural y directo; el artículo se mantiene en español para fluidez, sin forzar una abstracción diferente.
- source_word: καταισχύνει
  english_pob_choice: does not put to shame
  chosen_spanish: no avergüenza
  alternatives_spanish:
  - no desilusiona
  - no defrauda
  lexicon: BDAG
  rationale: El verbo griego conserva la idea de vergüenza/honor más que simple decepción. En español, «no avergüenza» mantiene mejor esa fuerza semántica que «no decepciona».
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor
  lexicon: BDAG
  rationale: «Amor» es el equivalente idiomático y consistente con el valor de ἀγάπη en este contexto.
- source_word: τοῦ θεοῦ
  english_pob_choice: the love of God
  chosen_spanish: el amor de Dios
  alternatives_spanish:
  - el amor para con Dios
  - el amor que Dios tiene
  lexicon: BDAG
  rationale: Se conserva la forma genitiva formal de la fuente griega, como en la revisión inglesa, sin decidir de modo excesivo entre genitivo subjetivo u objetivo en el texto principal.
- source_word: ἐκκέχυται
  english_pob_choice: has been poured out
  chosen_spanish: ha sido derramado
  alternatives_spanish:
  - ha sido vertido
  - se ha derramado
  lexicon: BDAG
  rationale: «Derramado» reproduce bien la imagen de efusión y la voz/resultativo del perfecto pasivo; es natural en español bíblico contemporáneo.
- source_word: ἐν ταῖς καρδίαις ἡμῶν
  english_pob_choice: in our hearts
  chosen_spanish: en nuestros corazones
  alternatives_spanish:
  - en nuestros corazones
  lexicon: BDAG
  rationale: «Corazones» es la equivalencia idiomática estándar y comunica bien el centro interior de la persona.
- source_word: διὰ πνεύματος ἁγίου
  english_pob_choice: through the Holy Spirit
  chosen_spanish: por medio del Espíritu Santo
  alternatives_spanish:
  - por el Espíritu Santo
  - mediante el Espíritu Santo
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación/instrumentalidad; «por medio de» lo refleja con claridad en español y preserva el agente mediador.
- source_word: τοῦ δοθέντος ἡμῖν
  english_pob_choice: who was given to us
  chosen_spanish: que nos fue dado
  alternatives_spanish:
  - quien nos fue dado
  - el cual nos fue dado
  lexicon: BDAG
  rationale: El participio modifica a «Espíritu Santo». En español, «que nos fue dado» es natural y permite mantener el referente personal sin sobrecargar la sintaxis.
theological_decisions:
- issue: Genitivo ambiguo en ἡ ἀγάπη τοῦ θεοῦ
  english_pob_reading: the love of God, with the main text favoring God's love for us; alternative preserved in footnote as our love for God
  chosen_spanish_reading: el amor de Dios, dejando la lectura principal abierta en el texto y preservando la alternativa en nota
  alternative_spanish_readings:
  - el amor que Dios tiene
  - nuestro amor por Dios
  rationale: La frase griega es genuinamente ambigua. El contexto favorece la interpretación del amor que procede de Dios y se derrama en los creyentes, pero la redacción española debe conservar la forma del genitivo sin cerrar demasiado la ambigüedad. La nota mantiene la lectura alternativa, como en el POB inglés.
  doctrine_reference: Preservar tensión léxica y exegética cuando el griego permite más de una lectura; no eliminar ambigüedad documentada.
- issue: Valor de καταισχύνει en relación con 'hope'
  english_pob_reading: does not put to shame / does not disappoint
  chosen_spanish_reading: no avergüenza
  alternative_spanish_readings:
  - no defrauda
  - no decepciona
  rationale: «Avergonzar» conserva mejor el campo semántico de honor/vergüenza del verbo griego. «No decepciona» sería comprensible, pero debilita la imagen social y moral presente en la fuente.
  doctrine_reference: Priorizar la fuerza semántica del original cuando la equivalencia común en español la debilita.
translation_notes:
  revision_awareness: La revisión inglesa cambió de «God’s love» a «the love of God» para conservar más formalmente el genitivo griego y evitar una interpretación demasiado estrecha. El español sigue esa decisión con «el amor de Dios». También se conservó la fuerza de vergüenza/honor en «no avergüenza» en lugar de suavizarlo a «no decepciona».
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Espíritu Santo» para πνεύματος ἁγίου, conforme al estándar del proyecto.
  - Se usa «derramado» para ἐκκέχυται, coherente con la imaginería de efusión y con un perfecto resultativo.
  - La nota a conserva la ambigüedad de ἡ ἀγάπη τοῦ θεοῦ sin imponer una interpretación exclusiva.
  - Se evita «Cristo» porque el versículo no contiene Χριστός ni una fórmula cristológica fija.
