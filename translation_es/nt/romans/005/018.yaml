translation:
  language: es
  text: Por tanto[a], así como por una sola transgresión resultó condenación para todos los seres humanos, así también por un solo acto de justicia resultó justificación que trae vida para todos los seres humanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «por un solo acto de justicia ... para justificación de vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄρα οὖν
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: La doble conexión inferencial se expresa de manera natural en español con «Así que», que conserva el valor conclusivo sin sonar rígido.
- source_word: παραπτώματος
  english_pob_choice: trespass
  chosen_spanish: transgresión
  alternatives_spanish:
  - tropiezo
  - ofensa
  lexicon: BDAG
  rationale: «Transgresión» reproduce la idea de un acto de incumplimiento o desvío y es un equivalente claro y bíblicamente reconocible en español, sin diluir la culpa moral.
- source_word: κατάκριμα
  english_pob_choice: condemnation
  chosen_spanish: la condenación
  alternatives_spanish:
  - la sentencia de condena
  - la condena
  lexicon: BDAG
  rationale: «Condenación» conserva el matiz judicial fuerte de κατάκριμα y mantiene el contraste adámico-cristológico del versículo.
- source_word: δικαιώματος
  english_pob_choice: righteous act
  chosen_spanish: un solo acto de justicia
  alternatives_spanish:
  - una sola obra justa
  - un acto justo
  lexicon: BDAG
  rationale: El singular apunta al acto decisivo de obediencia de Cristo; «acto de justicia» preserva la fuerza sustantiva del término y sigue siendo comprensible en español.
- source_word: δικαίωσιν ζωῆς
  english_pob_choice: justification that brings life
  chosen_spanish: la justificación de vida
  alternatives_spanish:
  - la justificación que trae vida
  - la justificación para vida
  lexicon: BDAG
  rationale: Se conserva la construcción más literal porque el genitivo «de vida» mantiene la tensión jurídica y vivificante del griego, sin explicitar más de lo que el texto dice.
- source_word: πάντας ἀνθρώπους
  english_pob_choice: all people
  chosen_spanish: todos los seres humanos
  alternatives_spanish:
  - todas las personas
  - todos los hombres
  lexicon: BDAG
  rationale: La expresión griega es inclusiva; «todos los seres humanos» comunica el alcance universal sin restringirlo ni masculinizarlо innecesariamente.
theological_decisions:
- issue: Alcance universal de ambos miembros de la comparación
  english_pob_reading: Retain 'all people' in the main text without interpretive limitation.
  chosen_spanish_reading: Mantener «todos los seres humanos» en ambos miembros sin limitarlo interpretativamente.
  alternative_spanish_readings:
  - todos los justificados
  - todos los que creen
  rationale: El griego repite la misma expresión en ambas mitades; limitarla en la traducción resolvería una tensión teológica que el propio texto deja abierta para el contexto más amplio.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla en la traducción.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior integrando el marcador [a] directamente en el texto principal y manteniendo una única nota anclada a esa marca. No se añadieron notas no ancladas.
  spanish_consistency_notes:
  - Se mantuvo la distinción judicial de κατάκριμα como «condenación» y de δικαίωσις como «justificación», evitando confundir ambos términos.
  - Se preservó el paralelismo de «todos los seres humanos» en ambas cláusulas para respetar la simetría del griego.
  - Se eligió «acto de justicia» en lugar de una paráfrasis más expansiva para no borrar la tensión léxica entre literalidad y fluidez.
  - El texto principal usa puntuación española y conserva el ritmo comparativo de la oración griega.
