translation:
  language: es
  text: Pero el don no es como la transgresión. Porque si por la transgresión de un solo hombre murieron los muchos, mucho más la gracia de Dios y el don por la gracia[a] de un solo hombre, Jesús Mesías[b], abundaron para los muchos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el don en gracia» / «el don que vino por gracia».
    reason: lexical_alternative
  - marker: b
    text: O «Jesús Cristo».
    reason: lexical_alternative
lexical_decisions:
- source_word: παράπτωμα
  english_pob_choice: trespass
  chosen_spanish: transgresión
  alternatives_spanish:
  - falta
  - ofensa
  - trasgresión
  lexicon: BDAG
  rationale: παράπτωμα expresa un acto de desviación o caída culpable. «Transgresión» conserva el peso moral y jurídico del término sin cargarlo con una explicación adicional que el versículo no da.
- source_word: χάρισμα
  english_pob_choice: gift
  chosen_spanish: don
  alternatives_spanish:
  - regalo
  - obsequio
  - don gratuito
  lexicon: BDAG
  rationale: El contraste principal es con la culpa de Adán; «don» suena natural en español y mantiene la idea de una dádiva recibida. No duplico «gracia» en el sustantivo mismo porque el verso ya la desarrolla enseguida con χάρις.
- source_word: οἱ πολλοὶ / τοὺς πολλούς
  english_pob_choice: the many
  chosen_spanish: los muchos
  alternatives_spanish:
  - muchos
  - todos
  lexicon: BDAG
  rationale: «Los muchos» preserva la forma marcada del griego con artículo y mantiene la tensión retórica uno/muchos sin resolverla prematuramente como «todos».
- source_word: ἡ χάρις τοῦ θεοῦ
  english_pob_choice: the grace of God
  chosen_spanish: la gracia de Dios
  alternatives_spanish:
  - la gracia divina
  - la gracia que viene de Dios
  lexicon: BDAG
  rationale: Se conserva la estructura posesiva directa del griego y el vocabulario habitual de gracia sin añadir matices que el texto no exige.
- source_word: ἡ δωρεὰ ἐν χάριτι
  english_pob_choice: the gift by the grace
  chosen_spanish: el don por la gracia
  alternatives_spanish:
  - el don en gracia
  - el don que vino por gracia
  - el don en la gracia
  lexicon: BDAG
  rationale: «Por la gracia» comunica de forma idiomática la relación instrumental o asociativa de ἐν χάριτι, y deja abierta la alternativa entre «en gracia» y «por gracia» que el inglés POB también documenta.
- source_word: τοῦ ἑνὸς ἀνθρώπου
  english_pob_choice: the one man
  chosen_spanish: del uno
  alternatives_spanish:
  - del único hombre
  - del uno hombre
  - del hombre uno
  lexicon: BDAG
  rationale: En español, el contexto inmediato ya aclara que se trata de un hombre; «del uno» conserva el paralelismo breve y enfático con «los muchos». Si se tradujera literalmente como «del uno hombre», sonaría forzado.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Se mantiene «Mesías» conforme a la política del proyecto para Χριστός cuando su valor titular sigue audible. «Jesús Mesías» es breve, reconocible y evita la forma litúrgica fija «Cristo» salvo donde el contexto la requiera.
- source_word: ἐπερίσσευσεν
  english_pob_choice: overflowed
  chosen_spanish: se derramaron en abundancia
  alternatives_spanish:
  - abundaron
  - sobreabundaron
  - rebosaron
  lexicon: BDAG
  rationale: περισσεύω sugiere exceder en medida; en español, «se derramaron en abundancia» comunica expansión superabundante y encaja con el movimiento retórico de «mucho más». El plural verbal sigue el sujeto compuesto de la cláusula.
theological_decisions:
- issue: Alcance de «los muchos» en el paralelismo Adán/Cristo
  english_pob_reading: Retain 'the many' without resolving it to 'all'.
  chosen_spanish_reading: Mantener «los muchos» sin resolverlo en «todos».
  alternative_spanish_readings:
  - todos
  - muchos
  rationale: El griego conserva la tensión retórica entre el uno y los muchos. Traducir «todos» cerraría una cuestión teológica más amplia que este versículo, mientras que «los muchos» preserva la forma textual y el alcance argumentativo inmediato.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Χριστός como título o nombre en español
  english_pob_reading: Jesus Messiah rather than a fixed Christ-name formula.
  chosen_spanish_reading: Jesús Mesías, no «Jesús Cristo» en el texto principal.
  alternative_spanish_readings:
  - Jesús Cristo
  - Jesucristo
  rationale: En este contexto el título mesiánico sigue siendo significativo y no meramente un apellido fijo. Mantener «Mesías» respeta la decisión auditada del POB inglés y la distinción entre título y nombre propio en español.
  doctrine_reference: Project policy on Χριστός / Messiah language.
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación editorial entre Christ y Messiah, con una corrección final que restablece «Messiah» por política del proyecto. Para el español se siguió esa última línea y se evitó la forma fija «Cristo» en el texto principal. También se respetó la alternativa léxica de ἐν χάριτι como relación de medio o acompañamiento, reflejada en la nota sobre «por la gracia».
  spanish_consistency_notes:
  - Se mantuvo «los muchos» en ambas apariciones para conservar el paralelismo del griego.
  - Se tradujo θεός como «Dios» y Χριστός como «Mesías» según la política del proyecto.
  - Se evitó «SEÑOR» porque no aparece κύριος en este versículo; el nombre divino no está en el texto base.
  - La construcción «el don por la gracia» mantiene la ambigüedad útil entre matiz instrumental y asociativo.
  - El verbo plural «se derramaron» sigue al sujeto compuesto «la gracia de Dios y el don».
