revisions:
- from: Pero el don[a] no es como la transgresión. Porque si por la transgresión del uno murieron los muchos, mucho más la gracia de Dios y el don por la gracia[b] del uno, Jesús Mesías, se derramaron en abundancia sobre los muchos.
  to: Pero el don no es como la transgresión. Porque si por la transgresión de un solo hombre murieron los muchos, mucho más la gracia de Dios y el don por la gracia[a] de un solo hombre, Jesús Mesías[b], abundaron para los muchos.
  rationale: Se corrige la omisión de «hombre» en τοῦ ἑνὸς ἀνθρώπου, se mueve la nota alternativa al sintagma correcto «don por la gracia», y se ajusta el final a una formulación española más directa y fiel al sentido de ἐπερίσσευσεν sin alterar la decisión auditada de «Mesías».
