translation:
  language: es
  text: Por tanto, así como el pecado entró en el mundo por medio de un solo hombre, y por medio del pecado la muerte, así también la muerte se extendió a todos los seres humanos, porque todos pecaron[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «en quien todos pecaron».'
    reason: alternative_reading
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Expresa con naturalidad la transición inferencial del argumento anterior, manteniendo el valor conclusivo sin recargar el estilo.
- source_word: δι’ ἑνὸς ἀνθρώπου
  english_pob_choice: through one man
  chosen_spanish: por medio de un solo hombre
  alternatives_spanish:
  - por un solo hombre
  - a través de un solo hombre
  lexicon: BDAG
  rationale: διά con genitivo indica mediación/instrumentalidad; 'por medio de' conserva esa relación y mantiene la fuerza tipológica de Adán como representante humano masculino.
- source_word: ἡ ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - pecado
  lexicon: BDAG
  rationale: En español, el artículo definido ayuda a reproducir el valor sustantivado y casi personificado de ἡ ἁμαρτία en Pablo, sin añadir interpretación ajena.
- source_word: εἰς τὸν κόσμον εἰσῆλθεν
  english_pob_choice: entered into the world
  chosen_spanish: entró en el mundo
  alternatives_spanish:
  - entró al mundo
  - entró en este mundo
  lexicon: BDAG
  rationale: La forma española directa conserva el movimiento de entrada con naturalidad y evita una paráfrasis innecesaria.
- source_word: διὰ τῆς ἁμαρτίας ὁ θάνατος
  english_pob_choice: and death through sin
  chosen_spanish: y por medio del pecado la muerte
  alternatives_spanish:
  - y la muerte por medio del pecado
  - y por el pecado la muerte
  lexicon: BDAG
  rationale: Mantiene el paralelismo con la cláusula anterior y deja visible la relación causal/mediadora entre pecado y muerte.
- source_word: οὕτως
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - de este modo también
  - así
  lexicon: BDAG
  rationale: Reproduce el nexo comparativo-correspondiente con una fórmula natural en español bíblico contemporáneo.
- source_word: εἰς πάντας ἀνθρώπους
  english_pob_choice: to all people
  chosen_spanish: a todos los seres humanos
  alternatives_spanish:
  - a toda la humanidad
  - a todas las personas
  lexicon: BDAG
  rationale: '''Seres humanos'' refleja el valor inclusivo de ἀνθρώπους sin restringirlo a varones, y conserva un registro sobrio y amplio.'
- source_word: ὁ θάνατος διῆλθεν
  english_pob_choice: death spread
  chosen_spanish: la muerte se extendió
  alternatives_spanish:
  - la muerte pasó
  - la muerte atravesó
  lexicon: BDAG
  rationale: '''Se extendió'' comunica con claridad el alcance universal de διῆλθεν sin perder la imagen de propagación que el contexto sugiere.'
- source_word: ἐφ’ ᾧ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - puesto que
  - ya que
  - en quien
  lexicon: BDAG
  rationale: La lectura causal es la opción principal del POB inglés; 'porque' la expresa de forma directa y transparente en español.
- source_word: πάντες ἥμαρτον
  english_pob_choice: all sinned
  chosen_spanish: todos pecaron
  alternatives_spanish:
  - todos han pecado
  lexicon: BDAG
  rationale: El aoristo se vierte con pasado simple, conservando el valor verbal sin introducir un matiz aspectual diferente.
theological_decisions:
- issue: Sentido de ἐφ’ ᾧ πάντες ἥμαρτον
  english_pob_reading: 'causal: ''because all sinned'''
  chosen_spanish_reading: 'causal: ''porque todos pecaron'''
  alternative_spanish_readings:
  - 'representativo/incorporativo: ''en quien todos pecaron'''
  - 'resultado: ''de manera que todos pecaron'''
  rationale: Se mantiene la lectura causal que mejor se ajusta al flujo del argumento y al auditable POB inglés. La alternativa tradicional se conserva para no borrar la tensión interpretativa histórica.
  doctrine_reference: Romanos 5:12; preservar la tensión teológica sobre Adán y la universalidad del pecado sin resolverla más allá del texto.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado del contexto inglés: no se registraron cambios aplicados y el control cruzado reportó alto acuerdo. La redacción española sigue esa estabilidad textual y mantiene la lectura causal documentada, preservando la alternativa tradicional en nota.'
  spanish_consistency_notes:
  - Se usa 'pecado' y 'muerte' de manera consistente con la terminología paulina del pasaje.
  - '''Por medio de'' se mantiene para las dos relaciones instrumentales, conservando el paralelismo del griego.'
  - '''Seres humanos'' evita una lectura exclusivamente masculina de πάντας ἀνθρώπους y sigue la intención inclusiva documentada en el inglés.'
  - La nota al pie se ancla en la frase causal, como en el testimonio inglés, para preservar la alternativa representativa tradicional.
