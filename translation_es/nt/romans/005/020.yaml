translation:
  language: es
  text: Ahora la ley se introdujo junto a esto[a] para que la transgresión[b] aumentara; pero donde el pecado aumentó, la gracia abundó todavía más[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entró» o «se introdujo»; el griego sugiere entrar junto a algo o además de ello.
    reason: lexical_alternative
  - marker: b
    text: O «la ofensa».
    reason: lexical_alternative
  - marker: c
    text: O «la gracia abundó mucho más».
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la ley mosaica
  - la Ley
  lexicon: BDAG
  rationale: En Romanos, con artículo y en contexto paulino, νόμος suele referirse a la ley de Moisés. En español, «la ley» comunica naturalmente ese referente sin añadir una paráfrasis innecesaria.
- source_word: παρεισῆλθεν
  english_pob_choice: came in alongside
  chosen_spanish: entró al lado
  alternatives_spanish:
  - vino junto a
  - se introdujo al lado
  - entró en adición
  lexicon: BDAG
  rationale: El verbo sugiere una entrada «junto a» o «en adición», no solo una entrada simple. «Entró al lado» conserva la idea de presencia lateral/adicional, aunque suene menos idiomático que una reformulación más libre.
- source_word: ἵνα πλεονάσῃ
  english_pob_choice: so that ... might increase
  chosen_spanish: para que ... aumentara
  alternatives_spanish:
  - para que ... creciera
  - a fin de que ... aumentara
  - de modo que ... aumentara
  lexicon: BDAG
  rationale: Se preserva la fuerza final de ἵνα con subjuntivo mediante «para que». «Aumentara» expresa el incremento de forma clara y natural en español, manteniendo la tensión del propósito sin resolverla interpretativamente.
- source_word: τὸ παράπτωμα
  english_pob_choice: the trespass
  chosen_spanish: la transgresión
  alternatives_spanish:
  - la ofensa
  - la falta
  - el tropiezo
  lexicon: BDAG
  rationale: «Transgresión» refleja bien el acto concreto de quebrantar un límite y conserva la relación con la lectura lexical documentada en inglés («transgression / offense»). En español resulta más precisa que «pecado» para este sustantivo puntual.
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  lexicon: BDAG
  rationale: En la construcción contrastiva, «donde» es la forma natural y clara en español para marcar el ámbito en que ocurre el aumento del pecado.
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - el pecado cometido
  - la culpa
  lexicon: BDAG
  rationale: «Pecado» es el equivalente teológico estándar y natural para ἁμαρτία. Se añade el artículo para mantener la referencia genérica del texto paulino.
- source_word: ὑπερεπερίσσευσεν
  english_pob_choice: abounded all the more
  chosen_spanish: abundó todavía más
  alternatives_spanish:
  - sobreabundó
  - abundó mucho más
  - abundó en medida aún mayor
  lexicon: BDAG
  rationale: El compuesto intensifica la idea de abundancia. «Abundó todavía más» reproduce el contraste con el aumento del pecado y evita una expresión demasiado técnica o arcaica.
- source_word: ἡ χάρις
  english_pob_choice: grace
  chosen_spanish: la gracia
  alternatives_spanish:
  - el favor de Dios
  - la benevolencia
  lexicon: BDAG
  rationale: «Gracia» es el término teológico normal y más fiel para χάρις en este pasaje. No se sustituye por «favor» porque el contexto paulino tiene peso doctrinal acumulativo.
theological_decisions:
- issue: Cómo reflejar ἵνα πλεονάσῃ sin suavizar la relación entre la ley y el aumento de la transgresión.
  english_pob_reading: 'Rendered with a purpose-style clause: ''so that the trespass might increase.'' The Greek syntax is preserved, and the translation should not erase the theological tension.'
  chosen_spanish_reading: 'Se mantiene una cláusula de finalidad: «para que la transgresión aumentara».'
  alternative_spanish_readings:
  - con el resultado de que la transgresión aumentara
  - de modo que la transgresión aumentara
  rationale: La sintaxis griega usa ἵνα con subjuntivo, y el español debe conservar esa fuerza. La formulación no implica aprobación moral de la transgresión; simplemente deja intacto el propósito expresado por Pablo.
  doctrine_reference: Preservar la tensión teológica de Romanos 5:20 sin resolverla en la traducción.
- issue: Cómo traducir ὑπερεπερίσσευσεν sin perder la intensificación final de la gracia.
  english_pob_reading: '''Grace abounded all the more'' / revision to more directly reflect the compound verb while keeping formal register.'
  chosen_spanish_reading: «La gracia abundó todavía más».
  alternative_spanish_readings:
  - la gracia sobreabundó
  - la gracia abundó mucho más
  - la gracia abundó en grado aún mayor
  rationale: «Abundó todavía más» mantiene el paralelismo con «aumentó» y expresa la intensificación del verbo compuesto sin introducir un matiz demasiado técnico. Se conserva el énfasis de que la gracia no solo iguala, sino supera el incremento del pecado.
  doctrine_reference: La superabundancia de la gracia frente al aumento del pecado.
translation_notes:
  revision_awareness: El inglés auditado fue revisado desde una formulación más paraprástica ('overflowed all the more') a 'abounded all the more' para reflejar mejor ὑπερεπερίσσευσεν. La versión española sigue esa dirección con «abundó todavía más», manteniendo un registro formal y el paralelismo del versículo.
  spanish_consistency_notes:
  - Se usa «ley» para νόμος en sentido paulino, sin mayúscula innecesaria.
  - Se conserva «gracia» como término teológico fijo para χάρις.
  - «Transgresión» se emplea para παράπτωμα; «pecado» se reserva para ἁμαρτία, manteniendo la distinción lexical del griego.
  - 'La puntuación y el orden reflejan el contraste bipartito del versículo: ley/transgresión y pecado/gracia.'
