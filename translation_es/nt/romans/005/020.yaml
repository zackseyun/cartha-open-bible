    issue: «Entró al lado» es un calco poco idiomático para παρεισῆλθεν.
    rationale: Aunque intenta preservar el matiz de para-, en español suena torpe y poco natural. Una formulación como «se introdujo junto a esto» comunica entrada adicional/lateral con mejor legibilidad y dignidad.
  - severity: medium
