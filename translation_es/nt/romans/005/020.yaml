revisions:
- from: Ahora la ley entró al lado para que la transgresión aumentara[a]; pero donde el pecado aumentó, la gracia abundó todavía más[c][b].
  to: Ahora la ley se introdujo junto a esto[a] para que la transgresión[b] aumentara; pero donde el pecado aumentó, la gracia abundó todavía más[c].
  rationale: Se reemplaza «entró al lado» por «se introdujo junto a esto» para conservar el matiz aditivo de παρεισῆλθεν en un español natural y digno. También se corrige el anclaje de la nota sobre παράπτωμα para que aparezca en «transgresión». La nota [b] se simplifica porque el texto principal ya usa una de las alternativas inglesas documentadas («transgresión»), de modo que la única alternativa significativa restante es «ofensa».
