translation:
  language: es
  text: Porque si[a], cuando todavía éramos enemigos, fuimos reconciliados con Dios por medio de la muerte de su Hijo, mucho más, habiendo sido reconciliados, seremos salvos por su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seremos salvos en su vida».'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque, si
  alternatives_spanish:
  - Si
  - Pues si
  - Porque si
  lexicon: BDAG
  rationale: Conserva la conexión argumentativa de γάρ con «porque» y la condición de εἰ con «si», en un orden natural para el español sin perder la lógica paulina.
- source_word: ἐχθροὶ ὄντες
  english_pob_choice: while we were enemies
  chosen_spanish: cuando todavía éramos enemigos
  alternatives_spanish:
  - mientras éramos enemigos
  - siendo enemigos
  - cuando éramos hostiles
  lexicon: BDAG
  rationale: «Enemigos» transmite el valor relacional de ἐχθροί. «Todavía» hace explícito el estado previo a la reconciliación, respetando la fuerza temporal del participio sin endurecer el español con un calco.
- source_word: κατηλλάγημεν
  english_pob_choice: we were reconciled
  chosen_spanish: fuimos reconciliados
  alternatives_spanish:
  - nos reconciliamos
  - fuimos restaurados a favor
  - fuimos puestos en reconciliación
  lexicon: BDAG
  rationale: «Reconciliados» es el equivalente directo de καταλλάσσω en uso paulino y preserva la relación restaurada sin reemplazarla por una paráfrasis devocional.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: con Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: Aunque el dativo puede leerse direccionalmente como «a Dios», en español «reconciliados con Dios» es la forma más natural para la relación restablecida y no altera el sentido del griego.
- source_word: διὰ τοῦ θανάτου τοῦ υἱοῦ αὐτοῦ
  english_pob_choice: through the death of his Son
  chosen_spanish: por medio de la muerte de su Hijo
  alternatives_spanish:
  - a través de la muerte de su Hijo
  - mediante la muerte de su Hijo
  lexicon: BDAG
  rationale: «Por medio de» expresa bien διά con genitivo como medio/instrumento. «Hijo» conserva la designación cristológica filial sin expansión interpretativa.
- source_word: πολλῷ μᾶλλον
  english_pob_choice: much more
  chosen_spanish: mucho más
  alternatives_spanish:
  - cuánto más
  - con mucha más razón
  - muchísimo más
  lexicon: BDAG
  rationale: Es el equivalente idiomático normal de la expresión a fortiori de Pablo y mantiene su fuerza retórica de manera clara.
- source_word: καταλλαγέντες
  english_pob_choice: having been reconciled
  chosen_spanish: habiendo sido reconciliados
  alternatives_spanish:
  - ya reconciliados
  - una vez reconciliados
  - después de haber sido reconciliados
  lexicon: BDAG
  rationale: El participio aoristo pasivo antecede a σωθησόμεθα; «habiendo sido reconciliados» conserva esa secuencia temporal y su valor causal/previo.
- source_word: σωθησόμεθα
  english_pob_choice: will we be saved
  chosen_spanish: seremos salvos
  alternatives_spanish:
  - seremos librados
  - seremos salvados
  lexicon: BDAG
  rationale: «Seremos salvos» es el español bíblico más directo para σῴζω en este contexto soteriológico futuro, sin añadir matices ajenos al texto.
- source_word: ἐν τῇ ζωῇ αὐτοῦ
  english_pob_choice: by his life
  chosen_spanish: por su vida
  alternatives_spanish:
  - en su vida
  - mediante su vida
  lexicon: BDAG
  rationale: La preposición ἐν puede leerse instrumentalmente aquí, en paralelo con «por medio de la muerte». «Por su vida» comunica la fuerza causal/instrumental que la nota inglesa preserva y evita resolver la tensión con una glosa más explícita.
theological_decisions:
- issue: Valor de ἐν τῇ ζωῇ αὐτοῦ
  english_pob_reading: 'instrumental: ''by his life'''
  chosen_spanish_reading: 'instrumental: «por su vida»'
  alternative_spanish_readings:
  - 'locativo/associativo: «en su vida»'
  rationale: El contraste inmediato con «por medio de la muerte de su Hijo» favorece que la vida del Hijo funcione como medio/causa de la salvación futura. La traducción mantiene esa tensión sin explicitar más de lo que el griego dice.
  doctrine_reference: Preservar la tensión teológica del texto, no resolverla por paráfrasis
- issue: 'Relación de reconciliación: τῷ θεῷ'
  english_pob_reading: to God
  chosen_spanish_reading: con Dios
  alternative_spanish_readings:
  - a Dios
  rationale: En español, «reconciliados con Dios» expresa de manera natural la restauración relacional implícita en καταλλάσσω. No cambia la dirección teológica del pasaje y evita una fórmula menos idiomática.
  doctrine_reference: Uso relacional de la reconciliación paulina
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se mantuvo la estructura condicional-argumentativa, la reconciliación relacional, el medio por la muerte del Hijo y la lectura instrumental de «por su vida». No se requirieron revisiones adicionales, y la versión española conserva la misma tensión interpretativa documentada en el registro inglés.'
  spanish_consistency_notes:
  - Se usó «Dios» y no una sustitución litúrgica, porque el texto griego tiene τῷ θεῷ sin necesidad de ocultamiento del nombre divino.
  - Se prefirió «Hijo» para υἱοῦ, conservando la cristología filial del pasaje.
  - «Reconciliados» se mantuvo uniforme para καταλλάσσω/καταλλαγέντες.
  - La nota al pie conserva la alternativa documentada entre lectura instrumental («por su vida») y locativa («en su vida»).
