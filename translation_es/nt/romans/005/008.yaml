  text: συνίστησιν δὲ τὴν ἑαυτοῦ ἀγάπην εἰς ἡμᾶς ὁ θεὸς ὅτι ἔτι ἁμαρτωλῶν ὄντων ἡμῶν Χριστὸς ὑπὲρ ἡμῶν ἀπέθανεν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/005/008.yaml
  text: But God demonstrates his own love for us in that while we were still sinners[c][b][a], Messiah died for us.
  footnotes:
  - marker: a
    text: Or 'toward us' for 'for us' in the phrase 'his own love for us.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christos'; traditionally 'Christ.' Here rendered 'Messiah' as a title.
    reason: lexical_alternative
  - marker: c
    text: Or 'on our behalf' for 'for us.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4
    prompt_id: nt_draft_v1
    prompt_sha256: 5ee3771306c356aaae3457dfab89b18e29465e153d2607b4a99822f8699b87f3
    timestamp: '2026-04-18T00:24:36Z'
    output_hash: 580e7f642181c9c911dd0a757499356925e47e7fb998ea0575a8482d78923636
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:00:53Z'
    unchanged: false
    changes_summary: 'Replaced ''Messiah'' with ''Christ'' to reflect the Greek proper name/title Χριστός in standard formal register and maintain conventional consistency in this verse. No other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Pero Dios demuestra su propio amor para con nosotros, que mientras aún éramos pecadores, el Mesías murió por nosotros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνίστησιν
  english_pob_choice: demonstrates
  chosen_spanish: demuestra
  alternatives_spanish:
  - muestra
  - prueba
  - acredita
  lexicon: BDAG
  rationale: Verbo en presente que expresa la acción de poner de manifiesto o demostrar; 'demuestra' conserva la fuerza evidencial sin sonar arcaico.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Introduce un giro suave respecto de la frase anterior; 'Pero' refleja mejor el matiz contrastivo en español.
- source_word: ἑαυτοῦ
  english_pob_choice: his own
  chosen_spanish: su propio
  alternatives_spanish:
  - su
  lexicon: BDAG
  rationale: El reflexivo añade énfasis posesivo; 'su propio' preserva ese énfasis de manera natural.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor
  - cariño
  lexicon: BDAG
  rationale: Corresponde al valor usual de ἀγάπη y es claro en español bíblico contemporáneo.
- source_word: εἰς ἡμᾶς
  english_pob_choice: for us
  chosen_spanish: para con nosotros
  alternatives_spanish:
  - hacia nosotros
  - por nosotros
  lexicon: BDAG
  rationale: En español, 'para con nosotros' expresa mejor la dirección relacional del amor divino que un simple 'para nosotros', sin cargarlo de una lectura más específica que el griego no obliga.
- source_word: ὅτι
  english_pob_choice: in that
  chosen_spanish: en que
  alternatives_spanish:
  - porque
  - que
  lexicon: BDAG
  rationale: Introduce la explicación de cómo Dios demuestra su amor; 'en que' suena natural y mantiene la relación explicativa.
- source_word: ἔτι ἁμαρτωλῶν ὄντων ἡμῶν
  english_pob_choice: while we were still sinners
  chosen_spanish: mientras aún éramos pecadores
  alternatives_spanish:
  - cuando todavía éramos pecadores
  - mientras seguíamos siendo pecadores
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto se vierte como cláusula temporal; 'aún' preserva ἔτι y 'éramos pecadores' mantiene el sentido de estado.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene el criterio del proyecto para Χριστός como título traducido, conservando el matiz mesiánico en español.
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - para nosotros
  - en favor de nosotros
  - en nuestro lugar
  lexicon: BDAG
  rationale: '''Por nosotros'' reproduce de forma sobria la referencia benefactiva de ὑπέρ sin resolver la tensión atonamental hacia una formulación más específica que el texto no exige.'
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - padeció la muerte
  lexicon: BDAG
  rationale: Verbo simple de aoristo; 'murió' es directo, fiel y natural en español.
theological_decisions:
- issue: Rendering Χριστός as a title rather than a fixed name-form
  english_pob_reading: Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El expediente doctrinal del proyecto favorece traducir Χριστός como título cuando funciona cristológicamente. En este verso, 'el Mesías' conserva el sentido titular y evita importar automáticamente la forma eclesiástica tradicional.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando actúa como título; Cristo cuando el contexto idiomático lo exige'
- issue: Force of ὑπὲρ ἡμῶν
  english_pob_reading: for us
  chosen_spanish_reading: por nosotros
  alternative_spanish_readings:
  - en favor de nosotros
  - en nuestro lugar
  rationale: La preposición puede abarcar matices de beneficio, representación o sustitución, pero el texto no obliga a especificar más. 'Por nosotros' mantiene abierta esa tensión teológica.
  doctrine_reference: 'Translation philosophy §3: preservar tensión teológica sin resolverla prematuramente'
translation_notes:
  revision_awareness: La base inglesa tuvo una oscilación editorial entre 'Christ' y 'Messiah'; el contexto más reciente del expediente devuelve Χριστός a 'Messiah'. La versión española sigue esa decisión y evita añadir notas innecesarias al no haber ambigüedad textual adicional que requiera anclaje.
  spanish_consistency_notes:
  - Se usó 'Dios' para θεός conforme al estándar del proyecto.
  - Se evitó 'SEÑOR' porque no aparece el Tetragrámaton en el versículo.
  - '''Pecadores'' conserva el plural genérico del griego y el valor de estado/condición.'
  - No se añadieron notas al pie porque la redacción española puede sostenerse sin marcadores de alternativa obligatorios.
