review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del griego: cláusula de propósito con «para que», contraste paralelo entre pecado y gracia, «reinó/reine», y los sintagmas «en la muerte», «por medio de», «vida eterna» y «nuestro Señor». Sin embargo, no sigue fielmente la decisión auditada para Χριστός como título en este contexto: el inglés POB restauró explícitamente «Jesus Messiah», mientras que el español usa «Jesucristo», forma nombre-fijada que neutraliza en parte el valor titulativo. Además, la nota al pie actual para δικαιοσύνη está mal planteada: el texto principal ya usa «justicia», pero la nota ofrece «por la justicia», que no preserva la alternativa relevante del expediente inglés.'
  spanish_quality_summary: El español es natural y eclesialmente legible. «Para que, así como... así también...» funciona bien, y «la gracia reine» suena digno y claro. No obstante, «Jesús Mesías» resulta preferible aquí para respetar la política terminológica del proyecto y el razonamiento documentado; en español es comprensible y no excesivamente forzado en un contexto epistolar formal. También conviene ajustar la nota para que aporte una alternativa real y útil.
  glossary_alignment: 'Alineación parcial. «gracia», «justicia», «Señor» y «Jesús» están en línea con las directrices. La desviación principal es Χριστός: por defecto debe verterse «Mesías» cuando funciona como título, y aquí el expediente inglés insiste en ese valor. «Jesucristo» no está justificado por una carve-out documentada suficiente en este registro.'
  issues:
  - severity: high
    issue: «Jesucristo» no preserva la decisión auditada de traducir Χριστός como título.
    rationale: El expediente inglés terminó en «Jesus Messiah» por política doctrinal explícita. «Jesucristo» en español funciona más como nombre fosilizado y atenúa el sentido titulativo de Χριστός.
  - severity: medium
    issue: La nota al pie [a] no refleja una alternativa léxica significativa para δικαιοσύνη.
    rationale: El texto principal ya tiene «justicia», y la nota «O, ‘por la justicia’» solo cambia la preposición, no la alternativa sustantiva que el expediente inglés preserva («righteousness/justice»). En español, una alternativa útil es «rectitud».
  revised_spanish_text: para que, así como el pecado reinó en la muerte, así también la gracia reine por medio de la justicia[a] para vida eterna por medio de Jesús Mesías nuestro Señor.
  revised_footnotes:
  - marker: a
    text: O, «por medio de la rectitud».
    reason: lexical_alternative
  revision_rationale: 'Se mantiene casi toda la redacción porque refleja bien el griego y suena natural en español. Se corrige únicamente lo necesario: (1) «Jesucristo» pasa a «Jesús Mesías» para conservar el valor titulativo de Χριστός según el audit trail y la política del proyecto; (2) la nota sobre δικαιοσύνη se reemplaza por una alternativa léxica real («rectitud»), ya que la nota previa no añadía información útil. No se requiere adjudicación adicional porque la corrección es clara a partir del expediente existente.'
