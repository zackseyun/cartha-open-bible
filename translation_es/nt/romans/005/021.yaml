  to: para que, así como el pecado reinó en la muerte, así también la gracia reine por medio de la justicia[a] para vida eterna por medio de Jesús Mesías nuestro Señor.
  rationale: 'Se mantiene casi toda la redacción porque refleja bien el griego y suena natural en español. Se corrige únicamente lo necesario: (1) «Jesucristo» pasa a «Jesús Mesías» para conservar el valor titulativo de Χριστός según el audit trail y la política del proyecto; (2) la nota sobre δικαιοσύνη se reemplaza por una alternativa léxica real («rectitud»), ya que la nota previa no añadía información útil. No se requiere adjudicación adicional porque la corrección es clara a partir del expediente existente.'
