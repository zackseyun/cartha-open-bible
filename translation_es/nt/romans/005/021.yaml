translation:
  language: es
  text: para que, así como el pecado reinó en la muerte, así también la gracia reine por medio de la justicia[a] para vida eterna por medio de Jesús Mesías nuestro Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por medio de la rectitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Conserva la cláusula de propósito/resultado que introduce el subjuntivo siguiente y suena natural en español bíblico contemporáneo sin perder la relación lógica.
- source_word: ἐβασίλευσεν
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - gobernó como rey
  - imperó
  lexicon: BDAG
  rationale: El aoristo indicativo de βασιλεύω se vierte mejor con un pretérito simple que preserve la metáfora real de Pablo.
- source_word: ἡ ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - la falta
  - la transgresión
  lexicon: BDAG
  rationale: ἁμαρτία se traduce con el término bíblico usual 'pecado', que mantiene la personificación paulina y el contraste teológico con la gracia.
- source_word: ἐν τῷ θανάτῳ
  english_pob_choice: in death
  chosen_spanish: en la muerte
  alternatives_spanish:
  - en el ámbito de la muerte
  - por la muerte
  lexicon: BDAG
  rationale: La preposición ἐν señala con mayor probabilidad esfera o ámbito; 'en la muerte' conserva la brevedad del griego y la imagen sin sobreinterpretarla.
- source_word: ἡ χάρις
  english_pob_choice: grace
  chosen_spanish: la gracia
  alternatives_spanish:
  - el favor
  - el don
  lexicon: BDAG
  rationale: '''Gracia'' es la equivalencia estándar y preserva la personificación paulina en contraste con ''el pecado''.'
- source_word: βασιλεύσῃ
  english_pob_choice: might reign
  chosen_spanish: reine
  alternatives_spanish:
  - pueda reinar
  - deba reinar
  lexicon: BDAG
  rationale: El subjuntivo aoristo después de ἵνα se refleja de forma natural con 'reine', manteniendo el matiz de finalidad/resultado.
- source_word: διὰ δικαιοσύνης
  english_pob_choice: through righteousness
  chosen_spanish: por medio de la justicia
  alternatives_spanish:
  - por la justicia
  - a través de la justicia
  lexicon: BDAG
  rationale: Se conserva el valor de medio de διά con genitivo. En este contexto, 'justicia' preserva la dimensión forense y ética de δικαιοσύνη; se deja constancia de la alternativa 'justicia' frente a otras opciones como 'rectitud'.
- source_word: εἰς ζωὴν αἰώνιον
  english_pob_choice: to eternal life
  chosen_spanish: para vida eterna
  alternatives_spanish:
  - hacia vida eterna
  - a vida eterna
  lexicon: BDAG
  rationale: '''Para vida eterna'' transmite claramente la dirección/resultante de εἰς y mantiene la fórmula bíblica sin sonar arcaica.'
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Aunque el archivo inglés audita Χριστός como título, en español 'Jesucristo' es la forma eclesial y literaria más estable y reconocible en esta construcción epistolar, sin perder el referente cristológico. Se evita 'Mesías' en el nombre fijo por inteligibilidad y fluidez, dada la fuerte fijación tradicional del sintagma.
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - nuestro dueño
  - el Señor nuestro
  lexicon: BDAG
  rationale: κύριος se traduce aquí como 'Señor', el equivalente reverente y transparente en español; el posesivo se integra naturalmente como 'nuestro Señor'.
theological_decisions:
- issue: δικαιοσύνη en un contraste paulino entre pecado y gracia
  english_pob_reading: through righteousness
  chosen_spanish_reading: por medio de la justicia
  alternative_spanish_readings:
  - por medio de la rectitud
  - por la justicia
  rationale: La guía doctrinal inglesa preserva 'righteousness' en el texto principal y anota 'justice' como alternativa lexical. En español, 'justicia' mantiene esa tensión mejor que 'rectitud' y evita diluir el matiz forense/relacional de δικαιοσύνη en Pablo.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: Χριστός como título o forma nominal establecida
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús el Mesías
  rationale: El audit trail inglés osciló entre 'Messiah' y 'Christ' antes de restaurar la lectura titulativa. En español, el sintagma fijo 'Jesucristo' preserva el nombre cristológico tradicional sin introducir una perífrasis menos natural en este cierre epistolar. No se usa 'Cristo' como máscara, sino como forma nominal asentada.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός'
translation_notes:
  revision_awareness: El texto inglés pasó por revisiones que alternaron entre 'Jesus Messiah' y 'Jesus Christ' antes de restaurar 'Messiah'. La presente versión española no depende de ese vaivén; reconoce la tensión lexical de Χριστός pero elige 'Jesucristo' como forma estable y canónica en español, manteniendo al mismo tiempo la nota de alternativa para δικαιοσύνη. No se añaden notas sobre 'Jesucristo' porque la forma española es un nombre litúrgico consolidado y el POB ya documenta la decisión cristológica en el audit trail.
  spanish_consistency_notes:
  - Se mantiene 'gracia' para χάρις y 'pecado' para ἁμαρτία, preservando el paralelismo personificado.
  - '''Por medio de'' traduce consistentemente διά con genitivo como medio/instrumento en ambos miembros de la oración.'
  - '''Para vida eterna'' conserva el valor direccional/resultativo de εἰς sin recurrir a un calco rígido.'
  - Se evita 'SEÑOR' como máscara; 'Señor' refleja κύριος y funciona bien en español reverente.
  - La puntuación reproduce la simetría retórica de 'así como ... así también ...'.
