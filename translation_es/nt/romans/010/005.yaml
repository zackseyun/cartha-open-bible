base_translation:
  language: en
  yaml_path: translation/nt/romans/010/005.yaml
  text: 'For Moses writes about the righteousness that is from the law: the man who does these things will live by them[a][b][c].'
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness' (δικαιοσύνη).
    reason: lexical_alternative
  - marker: b
    text: '''The man'' is grammatically masculine in Greek and here represents any person who does these things.'
    reason: cultural_note
  - marker: c
    text: Or 'will live in them'; Paul is echoing Leviticus 18:5.
    reason: alternative_reading
