translation:
  language: es
  text: 'Porque Moisés escribe acerca de la justicia[a] que proviene de la ley: el hombre[b] que hace estas cosas vivirá por ellas[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud» para δικαιοσύνη.
    reason: lexical_alternative
  - marker: b
    text: El griego usa el masculino singular, con valor representativo para cualquier persona que haga estas cosas.
    reason: cultural_note
  - marker: c
    text: O «en ellas»; Pablo está aludiendo a Levítico 18:5.
    reason: alternative_reading
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce una explicación o apoyo al argumento previo; en español, «Porque» reproduce de manera natural la relación causal/expositiva sin forzar el orden.
- source_word: γράφει
  english_pob_choice: writes
  chosen_spanish: escribe
  alternatives_spanish:
  - dice
  - escribió
  lexicon: BDAG
  rationale: La forma presente en la cita bíblica se conserva mejor con «escribe», manteniendo el giro escritural de referencia.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: BDAG
  rationale: En este pasaje, la equivalencia lexical española más directa y auditable para δικαιοσύνη es «justicia». El inglés POB prefirió «righteousness» por su peso paulino; en español, «justicia» preserva mejor la tensión semántica y deja abierta la lectura forense/covenantal sin imponer una sola formulación devocional.
- source_word: τὴν ἐκ τοῦ νόμου
  english_pob_choice: that is from the law
  chosen_spanish: que es por la ley
  alternatives_spanish:
  - que viene de la ley
  - procedente de la ley
  - de la ley
  lexicon: BDAG
  rationale: ἐκ expresa origen o procedencia; «por la ley» mantiene el contraste paulino y suena natural en español, con una relación de fuente/medio que el contexto admite.
- source_word: νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - ley
  lexicon: BDAG
  rationale: El artículo definido conserva la categoría conocida en Pablo, normalmente la ley mosaica, por lo que «la ley» es la opción más clara y fiel.
- source_word: ὁ ποιήσας
  english_pob_choice: who does
  chosen_spanish: el que hace
  alternatives_spanish:
  - el que haya hecho
  - quien hace
  - el que practica
  lexicon: BDAG
  rationale: El participio aoristo en esta cita funciona como tipo general de persona caracterizada por obedecer; «el que hace» refleja bien la generalidad normativa sin perder la fuerza verbal.
- source_word: ἄνθρωπος
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: BDAG
  rationale: Se mantiene el singular masculino gramatical del griego, con valor representativo. En español, «el hombre» conserva la forma del texto fuente y la construcción proverbial de la cita.
- source_word: ζήσεται
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - vivirá por ellas
  - tendrá vida
  lexicon: BDAG
  rationale: El futuro medio se traduce de forma directa con «vivirá», preservando el eco de Levítico 18:5.
- source_word: ἐν αὐτῇ
  english_pob_choice: by them
  chosen_spanish: por ellas
  alternatives_spanish:
  - en ellas
  - por ella
  lexicon: BDAG
  rationale: Aunque el griego inmediato usa singular femenino, el eco de Levítico 18:5 apunta al vivir por los mandamientos/estatutos. «Por ellas» comunica el sentido idiomático en español y deja visible la tensión con el singular del pronombre griego.
theological_decisions:
- issue: Renderizado de δικαιοσύνη en Pablo
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justificación
  rationale: En Romanos, δικαιοσύνη sostiene un contraste teológico entre justicia de la ley y justicia por la fe. «Justicia» es el término español más estable y comprensible para preservar ese campo semántico sin reducirlo a una lectura meramente moral.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; preserve justice as allowed alternative'
- issue: Valor representativo de ἄνθρωπος
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - el ser humano
  rationale: El masculino singular griego es representativo y proverbial. Se conserva en la forma del texto para no suavizar la señal gramatical del original; el valor inclusivo queda implícito en la cita y puede aclararse en nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Relación entre la cita y Levítico 18:5
  english_pob_reading: will live by them / in them
  chosen_spanish_reading: vivirá por ellas
  alternative_spanish_readings:
  - vivirá en ellas
  rationale: La frase paulina ecoa Levítico 18:5 y en español el sentido idiomático «por ellas» comunica el medio o base de vida. Se preserva la posible alternativa literal «en ellas» en nota para no borrar la tensión textual.
  doctrine_reference: 'Cross-reference: Levítico 18:5'
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente sin cambios sustanciales; se mantiene el sentido del griego SBLGNT y el trazo auditado del POB inglés, pero se ajusta la solución española para hacer explícita la tensión de δικαιοσύνη y la construcción idiomática de ἐν αὐτῇ sin mecanicismo.
  spanish_consistency_notes:
  - Se conservó «la ley» para νόμος, en coherencia con el uso paulino.
  - Se evitó «Cristo»/«Mesías» porque no aparecen en este versículo.
  - Se mantuvo el masculino singular representativo de ἄνθρωπος y se aclaró en nota.
  - Se eligió una equivalencia española natural para la cita de Levítico sin borrar la variante literal posible.
