revisions:
- from: 'Pero no todos obedecieron al evangelio[a]. Porque Isaías dice: «Señor[b], ¿quién ha creído a lo que oímos?»'
  to: 'Pero no todos obedecieron al evangelio[a]. Porque Isaías dice: «Señor, ¿quién ha creído nuestro mensaje[b]?».'
  rationale: Se mantiene «obedecieron al evangelio» por fidelidad a ὑπήκουσαν y por buena idiomaticidad bíblica en español. Se conserva «evangelio» en el texto principal como equivalente natural en español, pero se corrige la nota para ofrecer la alternativa real «buena noticia». Se reemplaza «a lo que oímos» por «nuestro mensaje», que representa mejor el sentido contextual de ἀκοή en la cita y sigue la decisión auditada; además se añade una nota que preserva las alternativas «reporte» y el sentido literal relacionado con ‘oír’. Se elimina la nota sobre «Señor» por redundante.
