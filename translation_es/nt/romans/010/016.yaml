translation:
  language: es
  text: 'Pero no todos obedecieron al evangelio[a]. Porque Isaías dice: «Señor, ¿quién ha creído nuestro mensaje[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la buena noticia».
    reason: lexical_alternative
  - marker: b
    text: O «nuestro reporte»; literalmente, «nuestra audición» o «nuestro oír».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Introduce el contraste con la afirmación anterior de manera natural en español. «Pero» es la adversativa más directa y fluida aquí.
- source_word: οὐ πάντες
  english_pob_choice: not all
  chosen_spanish: no todos
  alternatives_spanish:
  - no כולם
  - no todas las personas
  lexicon: BDAG
  rationale: Mantiene la negación parcial sin convertirla en una negación absoluta. En español, «no todos» reproduce bien la fuerza sintáctica y retórica.
- source_word: ὑπήκουσαν
  english_pob_choice: obeyed
  chosen_spanish: obedecieron
  alternatives_spanish:
  - oyeron
  - dieron obediencia
  lexicon: BDAG
  rationale: ὑπακούω expresa obediencia, no mera audición. «Obedecieron» conserva esa fuerza moral y responde al paralelismo paulino con la fe como respuesta obediente.
- source_word: τῷ εὐαγγελίῳ
  english_pob_choice: the good news
  chosen_spanish: al evangelio
  alternatives_spanish:
  - a la buena noticia
  - al evangelio / a la buena noticia
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió «good news» por transparencia, en español «evangelio» es el equivalente natural y semánticamente fiel de εὐαγγέλιον. Aquí evita una circunlocución poco idiomática y conserva el término bíblico reconocido.
- source_word: Ἠσαΐας
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Esaias
  lexicon: BDAG
  rationale: Transliteración estándar en español del nombre del profeta.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - declara
  lexicon: BDAG
  rationale: El presente mantiene el modo habitual de citar la Escritura como voz vigente. «Dice» es natural y fiel al griego.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Oh Señor
  lexicon: BDAG
  rationale: En la cita de Isaías, κύριε funciona como vocativo reverente. «Señor» reproduce el vocativo sin sobrecargarlo, y es idiomático en español bíblico.
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: ¿quién?
  alternatives_spanish:
  - ¿quién
  lexicon: BDAG
  rationale: Interrogativo directo estándar en español.
- source_word: ἐπίστευσεν
  english_pob_choice: has believed
  chosen_spanish: ha creído
  alternatives_spanish:
  - creyó
  lexicon: BDAG
  rationale: El pretérito perfecto compuesto comunica bien la respuesta completada en relación con la cita y el argumento actual, como en el inglés POB.
- source_word: τῇ ἀκοῇ ἡμῶν
  english_pob_choice: our message
  chosen_spanish: a lo que oímos
  alternatives_spanish:
  - a nuestro mensaje
  - a nuestro reporte
  - a nuestra audición
  lexicon: BDAG
  rationale: ἀκοή puede significar «audición», «lo oído», «mensaje» o «reporte». En este contexto citacional, el sentido más pegado al griego es «lo que oímos»; preserva la ambigüedad entre el acto de oír y el contenido oído. Se evita fijar «mensaje» como si fuera el único valor posible.
theological_decisions:
- issue: Cómo expresar ὑπήκουσαν τῷ εὐαγγελίῳ sin reducir la obediencia a mera escucha
  english_pob_reading: Rendered as 'obeyed the good news' rather than reducing the verb to mere hearing or acceptance.
  chosen_spanish_reading: «obedecieron al evangelio» mantiene la exigencia de respuesta obediente al anuncio.
  alternative_spanish_readings:
  - no escucharon el evangelio
  - no hicieron caso al evangelio
  rationale: El griego habla de obediencia, no de percepción auditiva. La traducción conserva el peso exhortativo y no diluye la tensión paulina entre oír y obedecer.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Sentido de ἀκοή en la cita de Isaías
  english_pob_reading: Rendered as 'message' in the main text.
  chosen_spanish_reading: «a lo que oímos» refleja el contenido oído y también el acto de oír.
  alternative_spanish_readings:
  - a nuestro mensaje
  - a nuestro reporte
  - a nuestra audición
  rationale: El término griego admite varias posibilidades. En español, «a lo que oímos» es transparente y no fuerza un solo matiz; deja visible la conexión entre hearing/report/message sin borrar la tensión léxica.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés. Se decidió no traducir εὐαγγέλιον como una mera calca de «buenas noticias» en la línea principal, porque en español «evangelio» es el equivalente bíblico natural y semánticamente más exacto en este contexto paulino. También se evitó fijar ἀκοή como «mensaje» en el texto principal, para no borrar la ambigüedad productiva del griego entre lo oído, el reporte y la audiencia/hearing.
  spanish_consistency_notes:
  - Se mantiene «evangelio» como término técnico bíblico cuando el contexto paulino lo requiere.
  - Se conserva el vocativo «Señor» en la cita profética, sin añadir una partícula exclamativa innecesaria.
  - 'La puntuación reproduce la estructura del griego: contraste, explicación y cita directa.'
  - «Ha creído» sigue el valor aspectual del aoristo en una cita retórica, con español natural.
