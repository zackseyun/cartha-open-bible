translation:
  language: es
  text: Porque doy testimonio acerca de ellos de que tienen celo por Dios[a], pero no según conocimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tienen un celo de Dios»; el genitivo griego podría traducirse más literalmente, pero aquí probablemente significa celo dirigido hacia Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no con conocimiento pleno» o «no basado en conocimiento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτυρῶ
  english_pob_choice: I testify
  chosen_spanish: doy testimonio
  alternatives_spanish:
  - testifico
  - soy testigo
  lexicon: BDAG
  rationale: μαρτυρῶ expresa una afirmación testimonial directa. En español, 'doy testimonio' conserva el valor evidencial y suena natural en registro bíblico moderno sin perder precisión.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí introduce la base explicativa de lo dicho antes. 'Porque' comunica bien la conexión argumentativa en español actual.
- source_word: αὐτοῖς
  english_pob_choice: about them
  chosen_spanish: les
  alternatives_spanish:
  - acerca de ellos
  - con respecto a ellos
  lexicon: BDAG
  rationale: Con μαρτυρῶ, el dativo señala a las personas de quienes se da testimonio. En español, el dativo 'les' mantiene esa relación sin sobrecargar la frase.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que, a saber
  lexicon: BDAG
  rationale: Introduce de manera directa el contenido del testimonio de Pablo.
- source_word: ζῆλον
  english_pob_choice: zeal
  chosen_spanish: celo
  alternatives_spanish:
  - ardor
  - entusiasmo
  lexicon: BDAG
  rationale: '''Celo'' es el equivalente español más estable y bíblico para ζῆλος, y conserva tanto intensidad como devoción religiosa.'
- source_word: θεοῦ
  english_pob_choice: for God
  chosen_spanish: por Dios
  alternatives_spanish:
  - para Dios
  - de Dios
  lexicon: BDAG
  rationale: 'Se sigue la lectura objetiva del genitivo: el celo está dirigido hacia Dios. ''Por Dios'' evita la ambigüedad de ''de Dios'', que podría sugerir el celo propio de Dios.'
- source_word: ἔχουσιν
  english_pob_choice: they have
  chosen_spanish: tienen
  alternatives_spanish:
  - poseen
  lexicon: BDAG
  rationale: Verbo simple en presente; 'tienen' es la forma más natural y directa en español.
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - mas
  lexicon: BDAG
  rationale: Marca el contraste fuerte que Pablo establece entre la sinceridad del celo y su falta de conocimiento.
- source_word: οὐ κατ’ ἐπίγνωσιν
  english_pob_choice: not according to knowledge
  chosen_spanish: no según pleno conocimiento
  alternatives_spanish:
  - no conforme a conocimiento
  - no basados en conocimiento
  - no con conocimiento pleno
  lexicon: BDAG
  rationale: La construcción κατά + acusativo se refleja con 'según'. 'Pleno conocimiento' preserva la idea de ἐπίγνωσις como conocimiento verdadero/completo, sin resolver demasiado la tensión exegética. Se mantiene abierta la posibilidad de que el problema sea la falta de conocimiento correcto o suficiente.
theological_decisions:
- issue: Naturaleza del celo de Israel
  english_pob_reading: their zeal is directed toward God but lacks proper knowledge
  chosen_spanish_reading: su celo está dirigido a Dios, pero carece del conocimiento debido
  alternative_spanish_readings:
  - tienen un celo religioso sin especificar su objeto
  - tienen el celo de Dios
  rationale: 'La frase griega ζῆλον θεοῦ, en contexto, se entiende mejor como celo hacia Dios. La traducción conserva la afirmación positiva de su fervor y, a la vez, la corrección crítica de Pablo: falta conocimiento adecuado. Así se preserva la tensión teológica sin suavizarla.'
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente
translation_notes:
  revision_awareness: 'Se siguió de cerca el paquete fuente griego y el aparato auditado en inglés. No hubo revisiones aplicadas en el registro inglés final, y el consenso de revisión fue de alta concordancia. La redacción española busca reflejar esa misma decisión exegética: genitivo objetivo en ζῆλον θεοῦ y κατά + acusativo en οὐ κατ’ ἐπίγνωσιν, sin eliminar la tensión entre fervor sincero y conocimiento insuficiente.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' para el nombre divino porque aquí el texto habla de θεοῦ, no del tetragrámaton ni de κύριος citado como nombre propio.
  - Se prefirió 'celo' sobre 'ardor' o 'entusiasmo' por ser el equivalente bíblico más estable de ζῆλος.
  - '''Pleno conocimiento'' mantiene la apertura semántica de ἐπίγνωσις y evita decidir más de lo que el griego explicita.'
  - La puntuación reproduce la oposición del original con coma y contraste explícito.
