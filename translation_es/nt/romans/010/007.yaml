translation:
  language: es
  text: 'o: «¿Quién descenderá al abismo?» (es decir[a], para hacer subir al Mesías[b] de entre los muertos).'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la profundidad». Pablo alude a Deuteronomio 30:13, pero aquí usa «el abismo», aplicando el lenguaje a hacer subir al Mesías de entre los muertos.
    reason: lexical_alternative
  - marker: b
    text: Griego «Cristo»; se traduce «Mesías» aquí porque Χριστός funciona como título.
    reason: alternative_reading
lexical_decisions:
- source_word: ἤ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  lexicon: BDAG
  rationale: Introduce de manera natural el segundo miembro de la cita con valor contrastivo, manteniendo el flujo discursivo del griego y del POB inglés.
- source_word: Τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  lexicon: BDAG
  rationale: El interrogativo directo conserva la fuerza retórica de la pregunta griega sin añadir perífrasis innecesaria.
- source_word: καταβήσεται
  english_pob_choice: will descend
  chosen_spanish: descenderá
  alternatives_spanish:
  - bajará
  - irá hacia abajo
  lexicon: BDAG
  rationale: «Descenderá» reproduce el futuro y el registro elevado, y encaja bien con la imagen espacial de la frase.
- source_word: εἰς τὴν ἄβυσσον
  english_pob_choice: into the abyss
  chosen_spanish: al abismo
  alternatives_spanish:
  - a la profundidad
  - al fondo sin fondo
  lexicon: BDAG
  rationale: «Abismo» preserva el término específico ἄβυσσος y su peso imaginal; «al abismo» es la forma española natural correspondiente a la preposición con artículo definido.
- source_word: τοῦτ’ ἔστιν
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - esto es
  - o sea
  lexicon: BDAG
  rationale: La fórmula explicativa en español se expresa con naturalidad como «es decir», equivalente funcional de la glosa griega.
- source_word: Χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se traduce el título Χριστός como «Mesías» porque funciona aquí como designación titulativa, siguiendo la decisión auditada del POB de no dejarlo como transliteración/forma heredada cuando el contexto es explicativo.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - de entre los muertos mismos
  lexicon: BDAG
  rationale: «De entre los muertos» expresa con más precisión el matiz idiomático del grupo genitivo plural y es idiomático en español bíblico sin perder naturalidad.
- source_word: ἀναγαγεῖν
  english_pob_choice: to bring ... up
  chosen_spanish: traer ... de entre
  alternatives_spanish:
  - hacer subir ...
  - levantar ...
  lexicon: BDAG
  rationale: «Traer ... de entre» conserva la imagen direccional de ‘subir/arriba’ implícita en ἀνα- sin convertir la frase en una paráfrasis más interpretativa como «resucitar» o «levantar».
theological_decisions:
- issue: Término Χριστός como título
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En esta explicación paulina el término funciona titulativamente; por ello se mantiene el valor semántico de Χριστός como «Mesías» y no se deja como forma eclesiástica tradicional. Esto preserva la distinción entre título y nombre-forma.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Imagen de ἄβυσσος
  english_pob_reading: Retain 'abyss' in the main text without collapsing it into 'grave' or 'realm of the dead.'
  chosen_spanish_reading: Mantener «abismo» en el texto principal sin resolverlo en «sepulcro» o «morada de los muertos».
  alternative_spanish_readings:
  - profundidad
  - morada de los muertos
  - Hades
  rationale: La cita paulina conserva una tensión entre la imagen de profundidad y la referencia a traer al Mesías de entre los muertos. «Abismo» mantiene esa tensión textual y no sustituye el término por una interpretación más estrecha.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto sigue la última línea auditada del POB en inglés: la regresión que había cambiado «Mesías» por «Cristo» fue corregida, y se conserva el valor titulativo de Χριστός. También se mantiene «abismo» como término principal para reflejar la decisión lexical y la tensión teológica documentadas.'
  spanish_consistency_notes:
  - Se usa «abismo» de forma consistente con el término griego ἄβυσσος y con la política del POB de no diluirlo en una glosa más interpretativa.
  - «Mesías» se emplea para Χριστός según la decisión auditada; se evita «Cristo» en el texto principal salvo en la nota lexical.
  - La glosa «es decir» reproduce de manera natural τοῦτ’ ἔστιν sin expandir el sentido.
  - «De entre los muertos» conserva la referencia a ἐκ νεκρῶν con un español bíblico claro y actual.
