  text: πρὸς δὲ τὸν Ἰσραὴλ λέγει· Ὅλην τὴν ἡμέραν ἐξεπέτασα τὰς χεῖράς μου πρὸς λαὸν ἀπειθοῦντα καὶ ἀντιλέγοντα.
base_translation:
  language: en
  yaml_path: translation/nt/romans/010/021.yaml
  text: But concerning Israel he says[c][b][a], “All day long I have stretched out my hands to a disobedient and opposing people.”
  footnotes:
  - marker: a
    text: Or 'But to Israel he says.' The Greek construction can be understood as direct address or as speech concerning Israel.
    reason: alternative_reading
  - marker: b
    text: '''Disobedient'' can also carry the sense ''unbelieving'' or ''refusing to be persuaded.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'opposing,' 'contradicting,' or 'speaking against.'
    reason: lexical_alternative
