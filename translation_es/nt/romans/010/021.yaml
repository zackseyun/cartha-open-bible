translation:
  language: es
  text: 'Pero acerca de Israel dice[a][b][c]: «Todo el día he extendido mis manos hacia un pueblo desobediente y que se opone».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Pero a Israel dice». La construcción griega puede entenderse como un discurso acerca de Israel o como una dirección directa a Israel.
    reason: alternative_reading
  - marker: b
    text: «Desobediente» también puede abarcar el sentido de «incrédulo» o «que se niega a ser persuadido».
    reason: lexical_alternative
  - marker: c
    text: O «que se opone», «que contradice» o «que habla en contra».
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς δὲ τὸν Ἰσραὴλ
  english_pob_choice: But concerning Israel
  chosen_spanish: Pero acerca de Israel
  alternatives_spanish:
  - Pero a Israel
  - Pero con respecto a Israel
  lexicon: BDAG
  rationale: πρός con λέγει aquí introduce el tema o referencia de lo que se dice; en español, «acerca de» conserva ese valor sin forzar un dativo de destinatario que el contexto no exige.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dice de
  - dice a
  lexicon: BDAG
  rationale: Se conserva el presente para mantener el carácter vivo de la cita. El sujeto implícito permanece sin añadirlo, como en el griego.
- source_word: Ὅλην τὴν ἡμέραν
  english_pob_choice: All day long
  chosen_spanish: Todo el día
  alternatives_spanish:
  - Durante todo el día
  - Todo el día entero
  lexicon: BDAG
  rationale: Expresa la duración continua de forma natural en español y mantiene el sentido de extensión temporal.
- source_word: ἐξεπέτασα
  english_pob_choice: I have stretched out
  chosen_spanish: he extendido
  alternatives_spanish:
  - he tendido
  - extendí
  lexicon: BDAG
  rationale: «Extender las manos» es la imagen más natural y fiel en español. Mantiene el gesto de invitación o súplica sin volverlo interpretativo.
- source_word: τὰς χεῖράς μου
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis manos levantadas
  - mis manos abiertas
  lexicon: BDAG
  rationale: Se conserva la imagen corporal directa del texto. No se añade adjetivación que no está en el original.
- source_word: πρὸς λαὸν
  english_pob_choice: to a people
  chosen_spanish: hacia un pueblo
  alternatives_spanish:
  - a un pueblo
  - contra un pueblo
  lexicon: BDAG
  rationale: Con el verbo de gesto, πρός marca dirección; «hacia» reproduce mejor el movimiento de las manos extendidas.
- source_word: λαὸν
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - nación
  - gente
  lexicon: BDAG
  rationale: «Pueblo» conserva el matiz corporativo y de pacto que suele tener λαός en este contexto.
- source_word: ἀπειθοῦντα
  english_pob_choice: disobedient
  chosen_spanish: desobediente
  alternatives_spanish:
  - incrédulo
  - que no quiere ser persuadido
  lexicon: BDAG
  rationale: «Desobediente» refleja directamente la conducta resistente; la posible idea de incredulidad queda disponible como alternativa, sin imponerse como única lectura.
- source_word: ἀντιλέγοντα
  english_pob_choice: opposing
  chosen_spanish: que se opone
  alternatives_spanish:
  - contradictorio
  - que habla en contra
  - opositor
  lexicon: BDAG
  rationale: «Que se opone» transmite bien el participio sustantivado y preserva la fuerza de resistencia activa de ἀντιλέγω.
theological_decisions:
- issue: Caracterización de la respuesta de Israel a la invitación divina
  english_pob_reading: Rendered the participles as 'disobedient and opposing people' to preserve both refusal and active opposition without importing a narrower doctrinal claim about ethnic Israel beyond Paul's citation.
  chosen_spanish_reading: Se tradujo como «un pueblo desobediente y que se opone» para mantener tanto el rechazo moral como la resistencia activa, sin resolver debates más amplios sobre el estatus de Israel más allá de lo que la cita dice.
  alternative_spanish_readings:
  - un pueblo incrédulo y opositor
  - un pueblo desobediente y contradictor
  rationale: La cita conserva la tensión profética entre la iniciativa divina y la respuesta humana de rechazo. La redacción española no atenúa esa tensión ni la convierte en una tesis doctrinal adicional.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue la última revisión del POB inglés, que reemplazó «contrary» por «opposing» para reflejar con mayor precisión ἀντιλέγοντα ('speaking against/opposing'). La versión española adopta «que se opone» para mantener esa actualización semántica.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evitó «SEÑOR» u otras sustituciones no necesarias, porque la cita aquí no introduce explícitamente el nombre divino en el texto griego citado.
  - Se prefirió una sintaxis directa y publicable en español, con notas breves para las alternativas relevantes preservadas por el audit trail.
