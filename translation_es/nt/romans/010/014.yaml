translation:
  language: es
  text: ¿Cómo, entonces, invocarán a aquel en quien no han creído? ¿Y cómo creerán en aquel de quien no han oído?[a] ¿Y cómo oirán sin que alguien predique?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿cómo creerán en aquel acerca de quien no han oído?»'
    reason: alternative_reading
lexical_decisions:
- source_word: Πῶς οὖν
  english_pob_choice: How then
  chosen_spanish: ¿Cómo, entonces,
  alternatives_spanish:
  - ¿Cómo, pues,
  - ¿Cómo, entonces?
  lexicon: BDAG
  rationale: Conserva la fuerza inferencial de οὖν y el giro retórico. «Entonces» transmite bien la conclusión argumentativa y suena natural en español moderno.
- source_word: ἐπικαλέσωνται
  english_pob_choice: will they call on
  chosen_spanish: invocarán
  alternatives_spanish:
  - llamarán a
  - invocarán al
  lexicon: BDAG
  rationale: «Invocar» preserva el sentido idiomático de apelar o llamar en oración a una persona divina. En español evita la ambigüedad de «llamar» y mantiene la fuerza religiosa del verbo.
- source_word: εἰς ὃν
  english_pob_choice: on him in whom
  chosen_spanish: a aquel en quien
  alternatives_spanish:
  - sobre aquel en quien
  - en aquel en quien
  lexicon: BDAG
  rationale: La combinación con ἐπικαλέω pide una construcción que conserve la referencia personal. «Aquel en quien» reproduce la relación del verbo con el objeto de la fe sin forzar el español.
- source_word: ἐπίστευσαν
  english_pob_choice: they have not believed
  chosen_spanish: no han creído
  alternatives_spanish:
  - no creyeron
  - no han tenido fe
  lexicon: BDAG
  rationale: «Creer» es el equivalente normal de πιστεύω en el flujo paulino. Se usa perfecto compuesto para reflejar la negación previa con valor actual, como en el contexto argumental.
- source_word: πιστεύσωσιν
  english_pob_choice: will they believe
  chosen_spanish: creerán
  alternatives_spanish:
  - creerán ellos
  - tendrán fe
  lexicon: BDAG
  rationale: En la pregunta retórica, el futuro simple resulta natural en español y conserva la secuencia lógica de condiciones imposibles.
- source_word: οὗ
  english_pob_choice: of whom
  chosen_spanish: de quien
  alternatives_spanish:
  - sobre quien
  - acerca de quien
  lexicon: BDAG
  rationale: El genitivo relativo con ἀκούω se vierte de modo literal y fluido como «de quien». Mantiene la ambigüedad legítima entre oír a una persona y oír acerca de ella.
- source_word: ἤκουσαν
  english_pob_choice: they have not heard
  chosen_spanish: no han oído
  alternatives_spanish:
  - no oyeron
  - no han escuchado
  lexicon: BDAG
  rationale: «Oír» conserva la conexión léxica con el sustantivo de proclamación implícito y evita cargar el verso con un matiz de atención voluntaria que «escuchar» podría sugerir.
- source_word: ἀκούσωσιν
  english_pob_choice: will they hear
  chosen_spanish: oirán
  alternatives_spanish:
  - escucharán
  - oirán?
  lexicon: BDAG
  rationale: Se mantiene el verbo básico «oír» para sostener la cadena semántica con ἤκουσαν. En español la pregunta retórica se entiende con claridad sin añadir un objeto explícito.
- source_word: χωρὶς κηρύσσοντος
  english_pob_choice: without someone preaching
  chosen_spanish: sin alguien que predique
  alternatives_spanish:
  - sin un predicador
  - sin que alguien proclame
  - sin predicador alguno
  lexicon: BDAG
  rationale: «Predicar» refleja κηρύσσω como acto de proclamación. Se evita convertir el participio en un título («predicador») porque el griego enfatiza la acción, no un oficio.
theological_decisions:
- issue: πιστεύω / lenguaje de fe
  english_pob_reading: believe / believed
  chosen_spanish_reading: creer / han creído
  alternative_spanish_readings:
  - tener fe
  - confiar
  rationale: Se preserva la cadena verbal de πιστεύω con «creer», que es la forma más directa y consistente en español para la secuencia argumentativa de Pablo. «Tener fe» o «confiar» introducirían un matiz más interpretativo.
  doctrine_reference: 'DOCTRINE.md: mantener la tensión léxica de πίστις/πιστεύω sin resolverla excesivamente'
- issue: Objeto del oír en οὗ οὐκ ἤκουσαν
  english_pob_reading: of whom
  chosen_spanish_reading: de quien
  alternative_spanish_readings:
  - acerca de quien
  - sobre quien
  rationale: 'Se conserva la ambigüedad que el inglés POB preserva en una nota: el sentido puede ser tanto oír a la persona como oír acerca de ella. El español «de quien» permite ambas lecturas sin sobreexplicar en el texto principal.'
  doctrine_reference: 'DOCTRINE.md: primacía del original; conservar ambigüedad genuina'
- issue: κηρύσσοντος y el acto de proclamación
  english_pob_reading: someone preaching
  chosen_spanish_reading: alguien que predique
  alternative_spanish_readings:
  - un predicador
  - alguien proclamando
  rationale: El participio apunta a la acción de proclamar. «Que predique» mantiene el enfoque verbal y no impone una categoría eclesial ajena al énfasis del griego.
  doctrine_reference: 'DOCTRINE.md: preferir el acto de proclamación sobre el oficio cuando κηρύσσω funciona verbalmente'
translation_notes:
  revision_awareness: Se revisó el flujo retórico de tres preguntas encadenadas y se optó por un español natural que conserve la progresión lógica del griego. La alternativa principal atestiguada por la POB inglesa para οὗ se preserva en nota, porque el español «de quien» puede dejar ver la misma ambigüedad sin recargar el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «creer» para πιστεύω en todo el versículo por consistencia terminológica.
  - Se usó «oír» en ambas apariciones de ἀκούω para conservar la repetición léxica del griego.
  - «Invocar» se eligió para ἐπικαλέσωνται por su valor religioso y porque evita una ambigüedad innecesaria con «llamar».
  - La puntuación con preguntas retóricas separadas sigue la estructura del original y facilita la lectura en español.
