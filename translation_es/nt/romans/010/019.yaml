    issue: Se añadió un objeto explícito en «¿Israel no lo entendió?»
    rationale: El griego μὴ Ἰσραὴλ οὐκ ἔγνω no incluye pronombre objeto. En contexto puede sobreentenderse el mensaje oído, pero el «lo» en español introduce una especificación no expresada y hace la pregunta menos directa.
  - severity: low
    issue: «con lo que no es nación / con una nación…» debilita levemente el matiz instrumental
    rationale: La construcción con ἐπί en esta cita se vierte mejor en español como «por medio de» o «mediante», lo que preserva con mayor claridad la idea de que Dios usa a ese ‘no pueblo’ para provocar a Israel.
  revised_spanish_text: 'Pero pregunto[a]: ¿Israel no entendió? Primero Moisés dice: «Yo los provocaré a celos[b] por medio de lo que no es nación; por medio de una nación sin entendimiento los provocaré a ira».'
