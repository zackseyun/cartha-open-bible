translation:
  language: es
  text: 'Pero pregunto[a]: ¿Israel no entendió? Primero Moisés dice: «Yo los provocaré a celos[b] por medio de lo que no es nación; por medio de una nación sin entendimiento los provocaré a ira».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Israel no lo supo?» El verbo griego puede significar tanto saber como comprender; aquí probablemente apunta a captar la importancia de lo que se oyó.
    reason: lexical_alternative
  - marker: b
    text: Cita de Deuteronomio 32:21. «Lo que no es nación» puede referirse a un pueblo considerado como si no fuera una nación verdadera; es decir, a los gentiles.
    reason: cross_reference
lexical_decisions:
- source_word: μὴ ⸂Ἰσραὴλ οὐκ ἔγνω⸃
  english_pob_choice: did Israel not know?
  chosen_spanish: ¿Israel no lo entendió?
  alternatives_spanish:
  - ¿Israel no lo supo?
  - ¿Israel no lo conoció?
  lexicon: BDAG
  rationale: El verbo γινώσκω puede ser «saber» o «entender/percibir». En este contexto retórico, ligado al oír y responder al mensaje de Dios, «entendió» comunica mejor la idea de captar el sentido de lo escuchado sin volver la frase pesada en español.
- source_word: πρῶτος
  english_pob_choice: First
  chosen_spanish: Primero
  alternatives_spanish:
  - En primer lugar
  - Primeramente
  lexicon: BDAG
  rationale: Conserva la función discursiva de introducir el primer testimonio citado por Pablo, de forma natural en español.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: Transliteración estándar
  rationale: Nombre propio bíblico estándar en español.
- source_word: παραζηλώσω
  english_pob_choice: I will make you jealous
  chosen_spanish: los provocaré a celos
  alternatives_spanish:
  - los pondré celosos
  - los incitaré a celos
  lexicon: BDAG
  rationale: El verbo expresa provocar celos de manera causativa. «Provocar a celos» conserva el valor lexical y el tono bíblico sin perder naturalidad.
- source_word: ἐπ’ οὐκ ἔθνει
  english_pob_choice: by what is not a nation
  chosen_spanish: con lo que no es nación
  alternatives_spanish:
  - con una no nación
  - con aquellos que no son nación
  - por medio de lo que no es nación
  lexicon: BDAG
  rationale: Se preserva el neutro singular y el filo retórico de la cita de Deuteronomio 32:21. «Lo que no es nación» mantiene la literalidad suficiente sin forzar una glosa interpretativa en el texto principal.
- source_word: ἔθνει ἀσυνέτῳ
  english_pob_choice: by a nation without understanding
  chosen_spanish: con una nación sin entendimiento
  alternatives_spanish:
  - con una nación insensata
  - con una nación sin inteligencia
  - con una nación sin discernimiento
  lexicon: BDAG
  rationale: ἀσύνετος señala falta de comprensión o sensatez. «Sin entendimiento» sigue de cerca el griego y evita cargar la frase con una traducción más interpretativa como «insensata».
- source_word: παροργιῶ
  english_pob_choice: I will provoke you to anger
  chosen_spanish: los provocaré a ira
  alternatives_spanish:
  - los irritaré
  - los enfureceré
  - los provocaré a enojo
  lexicon: BDAG
  rationale: La forma causativa pide una expresión que conserve el matiz de provocar a indignación/ira. «A ira» suena bíblico y fiel; en español actual es comprensible y no atenúa el verbo.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - ustedes
  - a ustedes
  lexicon: Pronombre plural de segunda persona
  rationale: El plural se expresa naturalmente en español con objeto directo de tercera persona en el discurso citado. El referente colectivo de Israel se deja claro por el contexto.
theological_decisions:
- issue: Referente de «no es nación» y «nación sin entendimiento» en la cita de Deuteronomio
  english_pob_reading: Retain the quotation's wording without explicitly identifying the referent in the main text.
  chosen_spanish_reading: Mantener el lenguaje de la cita sin identificar explícitamente el referente en el cuerpo principal.
  alternative_spanish_readings:
  - gentiles
  - un pueblo que Israel considera como no nación
  - una gente pagana
  rationale: Romanos 10:19 cita Deuteronomio 32:21 para subrayar que Israel debía haber entendido que Dios usaría a otros pueblos para provocarlo. La traducción conserva la tensión bíblica de la cita y no introduce una glosa interpretativa en el texto principal.
  doctrine_reference: Preservar la tensión teológica en la cita; no resolverla en la traducción principal.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail inglés: se prefirió una forma que refleje con más precisión ἔγνω como percepción/comprensión en este contexto, y ἔθνει ἀσυνέτῳ como «nación sin entendimiento» en vez de una paráfrasis más libre. Se mantuvo la estructura de la cita y el paralelismo de los dos futuros causativos.'
  spanish_consistency_notes:
  - Se usa «Moisés» y no una transliteración del nombre, conforme al uso bíblico estándar en español.
  - Se conserva «ira» para παροργιῶ por fidelidad al registro bíblico; no se reemplaza por un término más coloquial.
  - «Lo que no es nación» mantiene el giro singular neutro del griego y evita resolver de antemano la identificación del grupo aludido.
  - La puntuación sigue un estilo de cita bíblica claro y publicable en español, con comillas angulares.
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton ni una cita directa de κύριος aplicada al nombre divino.
