base_translation:
  language: en
  yaml_path: translation/nt/romans/010/019.yaml
  text: But I ask[a], did Israel not know? First Moses says, “I will make you jealous by what is not a nation[b]; by a nation without understanding I will provoke you to anger.”
  footnotes:
  - marker: a
    text: Or “did Israel not know?” The Greek verb can mean either know or understand; here it likely carries the sense of grasping the significance of what was heard.
    reason: lexical_alternative
  - marker: b
    text: Quotation from Deuteronomy 32:21. “What is not a nation” may refer to a people regarded as no true nation, that is, the Gentiles.
    reason: cross_reference
