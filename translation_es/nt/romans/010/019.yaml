revisions:
- from: 'Pero pregunto[a]: ¿Israel no lo entendió? Primero Moisés dice: «Yo los provocaré a celos[b] con lo que no es nación; con una nación sin entendimiento los provocaré a ira».'
  to: 'Pero pregunto[a]: ¿Israel no entendió? Primero Moisés dice: «Yo los provocaré a celos[b] por medio de lo que no es nación; por medio de una nación sin entendimiento los provocaré a ira».'
  rationale: Se eliminó «lo» en la pregunta para evitar añadir un objeto no expreso en el griego. También se cambió «con» por «por medio de» en ambas frases instrumentales para reflejar mejor el valor de la cita y la decisión auditada en inglés, sin alterar el sentido ni la tensión teológica del pasaje.
