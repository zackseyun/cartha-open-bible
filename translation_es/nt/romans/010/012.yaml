translation:
  language: es
  text: Porque no hay distinción entre judío y griego[a], pues el mismo Señor es Señor de todos[b], rico para con todos los que lo invocan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Griego» aquí funciona como contraste judío/no judío; algunas traducciones dicen «gentil».
    reason: lexical_alternative
  - marker: b
    text: 'O: «el mismo Señor sobre todos».'
    reason: alternative_reading
lexical_decisions:
- source_word: διαστολή
  english_pob_choice: distinction
  chosen_spanish: distinción
  alternatives_spanish:
  - diferencia
  - distinción hecha
  lexicon: BDAG
  rationale: En este contexto paulino, el término señala una diferenciación entre grupos. «Distinción» es natural en español y conserva el contraste social-salvífico sin añadir una valoración que el texto no explicita.
- source_word: Ἰουδαίου ... Ἕλληνος
  english_pob_choice: Jew ... Greek
  chosen_spanish: judío ... griego
  alternatives_spanish:
  - judío ... gentil
  lexicon: BDAG
  rationale: El griego dice «griego», no «gentil». En Romanos el par funciona como contraste judío/no judío, pero la forma «judío ... griego» mantiene transparencia con la fuente.
- source_word: ὁ ... αὐτὸς κύριος πάντων
  english_pob_choice: the same Lord is Lord of all
  chosen_spanish: el mismo Señor es Señor de todos
  alternatives_spanish:
  - el mismo Señor de todos
  - el mismo Señor sobre todos
  lexicon: BDAG
  rationale: «Señor» conserva la traducción habitual de κύριος. Repetir el sustantivo hace explícita la oración nominal del griego y mantiene su fuerza en español.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En Romanos 10 el término tiene peso teológico y cristológico; «Señor» es la equivalencia normal y más fiel al valor confesional del texto.
- source_word: πλουτῶν
  english_pob_choice: being rich toward
  chosen_spanish: rico para
  alternatives_spanish:
  - rico hacia
  - abundante para
  - derramando riquezas sobre
  lexicon: BDAG
  rationale: El participio expresa la abundancia generosa del Señor. «Rico para» conserva la metáfora de riqueza y su relación participial con naturalidad en español.
- source_word: εἰς πάντας
  english_pob_choice: to all
  chosen_spanish: para todos
  alternatives_spanish:
  - a todos
  - hacia todos
  lexicon: BDAG
  rationale: Con πλουτῶν, la preposición expresa extensión de la generosidad. «Para todos» suena natural en español y preserva la apertura universal del texto sin absolutizarla fuera del sintagma siguiente.
- source_word: τοὺς ἐπικαλουμένους αὐτόν
  english_pob_choice: all who call on him
  chosen_spanish: los que lo invocan
  alternatives_spanish:
  - los que le llaman
  - todos los que invocan su nombre
  lexicon: BDAG
  rationale: ἐπικαλέω aquí es invocar/callar en apelación confiada. «Invocan» conserva el matiz bíblico y el referente personal de llamar al Señor en fe.
theological_decisions:
- issue: Referente de «Señor» en el contexto
  english_pob_reading: '''Lord'' refers to the same Lord confessed in the surrounding context, namely Jesus as Lord, while the wording also preserves the scriptural resonance of calling on the Lord.'
  chosen_spanish_reading: «Señor» refiere al mismo Señor confesado en el contexto inmediato, es decir, Jesús como Señor, aunque la formulación conserva también la resonancia escritural de invocar al Señor.
  alternative_spanish_readings:
  - Una referencia más general a Dios sin precisar a Cristo
  rationale: Romanos 10:9-13 centra la confesión de Jesús como Señor y cita el llamado a invocar al Señor. La traducción conserva el título sin expandirlo interpretativamente, dejando que el contexto sostenga la afirmación cristológica.
  doctrine_reference: 'Credo Niceno; Términos controvertidos: κύριος → Señor'
- issue: Alcance de «todos»
  english_pob_reading: '''All'' is qualified by ''who call on him,'' not an unqualified statement of salvation for every person.'
  chosen_spanish_reading: «Todos» queda cualificado por «los que lo invocan», no como una afirmación sin condición sobre la salvación de cada persona.
  alternative_spanish_readings:
  - Una lectura universalista sin condición
  rationale: La sintaxis limita los beneficiarios a los que invocan al Señor. La traducción mantiene tanto la disponibilidad universal entre judío y griego como la condición del participio, preservando la tensión teológica del pasaje.
  doctrine_reference: 'Filosofía de traducción §3: preservar la tensión teológica sin resolverla'
translation_notes:
  revision_awareness: La redacción sigue el estado revisado más reciente del audit trail en inglés, especialmente la preferencia por una formulación natural de la generosidad («to all»), sin perder la relación con el participio «being rich» ni el contraste universal/condicional del versículo.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος, coherente con el valor cristológico del contexto.
  - Se mantiene «judío ... griego» para transparentar la fuente griega y la pareja retórica del versículo.
  - «Invocan» conserva el matiz bíblico de ἐπικαλέω sin desplazarlo a una simple llamada verbal.
  - La frase «para todos los que lo invocan» preserva la universalidad condicionada del texto.
