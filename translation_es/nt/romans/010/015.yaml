base_translation:
  language: en
  yaml_path: translation/nt/romans/010/015.yaml
  text: And how are they to proclaim unless they are sent? As it is written[b][a], “How beautiful are the feet of those who bring good news of good things!”
  footnotes:
  - marker: a
    text: Or 'How welcome' or 'How timely' are the feet… The Greek adjective can suggest not only beauty but also the welcome, fitting arrival of the messenger.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'those who bring good news of good things.'
    reason: lexical_alternative
