translation:
  language: es
  text: '¿Y cómo proclamarán, si no son enviados? Como está escrito: «¡Cuán hermosos[a] son los pies de los que anuncian buenas noticias de cosas buenas!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Cuán bienvenidos!» o «¡Cuán oportunos!». El adjetivo griego puede sugerir no solo belleza, sino también la bienvenida o la llegada apropiada del mensajero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κηρύξωσιν
  english_pob_choice: proclaim
  chosen_spanish: proclamarán
  alternatives_spanish:
  - predicarán
  - heraldarán
  lexicon: BDAG
  rationale: κηρύσσω expresa anuncio público o proclamación. «Proclamarán» conserva ese valor amplio sin reducirlo a la idea más eclesiástica de «predicar»; además suena natural en español.
- source_word: ἀποσταλῶσιν
  english_pob_choice: are sent
  chosen_spanish: son enviados
  alternatives_spanish:
  - son comisionados
  - son despachados
  lexicon: BDAG
  rationale: El pasivo de ἀποστέλλω indica que alguien los envía. «Son enviados» es directo, idiomático y mantiene la dependencia de un remitente.
- source_word: καθὼς γέγραπται
  english_pob_choice: As it is written
  chosen_spanish: Como está escrito
  alternatives_spanish:
  - Tal como está escrito
  lexicon: BDAG
  rationale: Fórmula normal de cita bíblica; «Como está escrito» es la forma más natural y reverente en español.
- source_word: ὡραῖοι
  english_pob_choice: beautiful
  chosen_spanish: hermosos
  alternatives_spanish:
  - bellos
  - gratos
  - oportunos
  lexicon: BDAG
  rationale: En la cita de Isaías, ὡραῖος puede sugerir belleza, agrado o idoneidad/ocurrencia oportuna. «Hermosos» conserva el sentido principal y permite la nota sobre la posible idea de bienvenida u अवसरidad.
- source_word: πόδες
  english_pob_choice: feet
  chosen_spanish: pies
  alternatives_spanish:
  - plantas
  lexicon: BDAG
  rationale: Se mantiene el término corporal literal del texto citado, preservando la imagen del mensajero.
- source_word: εὐαγγελιζομένων
  english_pob_choice: those who bring good news
  chosen_spanish: los que anuncian buenas noticias
  alternatives_spanish:
  - los que proclaman buenas noticias
  - los que evangelizan
  lexicon: BDAG
  rationale: El participio significa anunciar buenas noticias. «Anuncian buenas noticias» conserva el gesto del mensajero y evita introducir jerga eclesial que no está en la cita.
- source_word: τὰ ἀγαθά
  english_pob_choice: good things
  chosen_spanish: cosas buenas
  alternatives_spanish:
  - bienes
  - lo bueno
  lexicon: BDAG
  rationale: La expresión es literalmente «las cosas buenas». «Cosas buenas» refleja el plural neutro con mayor fidelidad que reducirlo a «buenas noticias» otra vez.
theological_decisions:
- issue: Relación entre la proclamación y la imagen de mensajeros del pasaje de Isaías
  english_pob_reading: Retain the Isaiah-derived imagery of messengers whose arrival is celebrated, without narrowing it to ordained preaching only.
  chosen_spanish_reading: Mantener la imagen isaiana de mensajeros cuya llegada es celebrada, sin restringirla a la predicación ordenada solamente.
  alternative_spanish_readings:
  - Traducir κηρύξωσιν como «predicarán» y εὐαγγελιζομένων como «los que predican el evangelio», lo que sugiere un marco ministerial más específico.
  - Suavizar la imagen de los pies con una paráfrasis que pierda la metáfora corporal.
  rationale: La cadena argumental de Pablo une envío y proclamación del evangelio, pero la cita conserva la celebración de quienes traen buenas noticias. La traducción preserva ambos niveles sin imponer un oficio eclesiástico particular.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota con su marcador correspondiente en el texto español y manteniendo una sola secuencia de notas sin marcadores huérfanos.
  spanish_consistency_notes:
  - Se usó «Dios»/«Yahvé» según las normas generales del proyecto, pero este versículo no las activa explícitamente.
  - Se evitó «predicar» para κηρύσσω y «evangelizar» como verbo principal para εὐαγγελιζομένων, preservando el matiz de proclamación y anuncio.
  - Se mantuvo la imagen concreta de «pies» en la cita.
  - La puntuación y la cita siguen un registro bíblico moderno y publicable en español.
