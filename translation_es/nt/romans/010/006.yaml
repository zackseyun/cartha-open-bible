    unchanged: false
    changes_summary: 'Changed ''speaks this way'' to ''speaks in this way'' for more natural formal English, and replaced ''the Messiah'' with ''Christ'' to reflect the Greek Χριστόν more directly and maintain consistency with Paul''s usage. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Pero la justicia[a] que proviene de la fe habla así: «No digas en tu corazón: “¿Quién subirá al cielo?”» (es decir[c], para hacer bajar al Mesías[b]).'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'rectitud que proviene de la fe'. El griego δικαιοσύνη puede abarcar tanto 'justicia' como 'rectitud' en este contexto.
    reason: lexical_alternative
  - marker: b
    text: Griego 'Cristo'; aquí se traduce 'Mesías' porque Χριστός funciona como título, no como nombre.
    reason: lexical_alternative
  - marker: c
    text: Pablo está evocando Deuteronomio 30:12 y aplicándolo al Mesías.
    reason: cross_reference
lexical_decisions:
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia de Dios
  lexicon: BDAG
  rationale: En este contexto paulino δικαιοσύνη puede abarcar tanto 'righteousness' como 'justice'; en español, 'justicia' conserva mejor esa amplitud semántica y la tensión lexical documentada por la POB, mientras que 'rectitud' estrecha el matiz moral y 'justicia de Dios' añade algo no expresado aquí.
- source_word: ἐκ πίστεως
  english_pob_choice: from faith
  chosen_spanish: de la fe
  alternatives_spanish:
  - por fe
  - a partir de la fe
  lexicon: BDAG
  rationale: '''De la fe'' reproduce de modo más directo el valor de ἐκ y mantiene el contraste paulino con la justicia basada en la ley. ''Por fe'' es idiomático, pero algo más interpretativo; ''a partir de la fe'' suena menos natural en español bíblico.'
- source_word: οὕτως λέγει
  english_pob_choice: speaks in this way
  chosen_spanish: habla así
  alternatives_spanish:
  - dice así
  - habla de esta manera
  lexicon: BDAG
  rationale: '''Habla así'' refleja la personificación de δικαιοσύνη y suena natural en español sin perder el adverbio οὕτως. ''Dice así'' es posible, pero menos fluido con el sujeto personificado.'
- source_word: Μὴ εἴπῃς ἐν τῇ καρδίᾳ σου
  english_pob_choice: Do not say in your heart
  chosen_spanish: No digas en tu corazón
  alternatives_spanish:
  - No digas para tus adentros
  - No te digas en tu interior
  lexicon: BDAG
  rationale: Se conserva la cita deuteronómica con la imagen de 'corazón' como sede del pensamiento e intención. Las alternativas aclaran el sentido, pero reducen la resonancia escritural de la frase.
- source_word: Τίς ἀναβήσεται εἰς τὸν οὐρανόν;
  english_pob_choice: Who will ascend into heaven?
  chosen_spanish: ¿Quién subirá al cielo?
  alternatives_spanish:
  - ¿Quién ascenderá al cielo?
  - ¿Quién irá al cielo?
  lexicon: BDAG
  rationale: '''Subirá al cielo'' es natural en español y conserva el movimiento ascendente de ἀναβήσεται. ''Ascenderá'' es más formal; ''irá al cielo'' pierde la imagen verbal.'
- source_word: Χριστόν
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: La POB documenta que Χριστός aquí funciona como título, no como nombre fijo; por eso 'Mesías' preserva el valor titular y la decisión auditada, mientras que 'Cristo' sería más tradicional pero menos explicativo en español.
- source_word: καταγαγεῖν
  english_pob_choice: to bring ... down
  chosen_spanish: hacer bajar
  alternatives_spanish:
  - traer abajo
  - bajar
  lexicon: BDAG
  rationale: '''Hacer bajar'' expresa de forma natural la idea causativa de κατάγω en este contexto retórico. ''Traer abajo'' es menos idiomático; ''bajar'' pierde la causatividad explícita.'
theological_decisions:
- issue: Personificación de 'la justicia de la fe'
  english_pob_reading: 'Retained the personification: ''the righteousness from faith speaks this way'''
  chosen_spanish_reading: 'Se mantiene la personificación: ''la justicia de la fe habla así'''
  alternative_spanish_readings:
  - 'Se traduce de forma más abstracta: ''esto es lo que dice la justicia por fe'''
  - '''la justicia proveniente de la fe dice así'''
  rationale: El griego presenta δικαιοσύνη como sujeto de λέγει; mantener esa personificación conserva el estilo retórico de Pablo y la conexión con el argumento previo. Las alternativas suavizan la personificación, pero debilitan la forma del texto.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text sense over tradition where possible.'
- issue: Χριστός como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La POB documenta la preferencia por 'Mesías' cuando Χριστός funciona como título en un argumento escritural. Aquí la referencia apunta a la función salvífico-histórica del término dentro de la cita y su explicación.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ where name-like).'
translation_notes:
  revision_awareness: Se siguió el último estado de revisión del inglés POB para mantener 'speaks in this way' y la restauración de 'Messiah' frente a 'Christ'. La versión española refleja esa decisión titular con 'Mesías' y conserva la personificación y el eco de Deuteronomio 30:12 sin añadir notas no ancladas en el texto.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός en esta cláusula, coherente con la política POB cuando el término es titular.
  - Se usa 'de la fe' para ἐκ πίστεως en vez de 'por fe' para conservar la preposición más cercana al griego.
  - Se preserva 'corazón' como sede interior, no como mero sentimiento.
  - La puntuación y comillas siguen un registro bíblico moderno y claro en español latinoamericano.
