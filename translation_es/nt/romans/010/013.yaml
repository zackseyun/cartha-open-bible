translation:
  language: es
  text: Porque todo el que invoque el nombre del Señor será salvo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pablo cita Joel 2:32. En Joel, el referente es Yahvé; aquí Pablo aplica esa cita a Jesús en su contexto.
    reason: cross_reference
  - marker: b
    text: O «quien invoque». La expresión griega significa invocar o apelar al Señor por su nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶς
  english_pob_choice: everyone
  chosen_spanish: todo el que
  alternatives_spanish:
  - todos los que
  - toda persona que
  lexicon: BDAG
  rationale: La construcción griega πᾶς ... ὃς ἂν expresa alcance universal e indefinido. En español, «todo el que» comunica naturalmente esa generalización sin restringir el género ni volver la frase pesada.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: BDAG
  rationale: γάρ introduce la base explicativa o escritural del argumento previo. «Porque» conserva la fuerza explicativa de modo claro y directo en español bíblico actual.
- source_word: ἐπικαλέσηται
  english_pob_choice: calls on
  chosen_spanish: invoque
  alternatives_spanish:
  - llame
  - clamare
  - apele
  lexicon: BDAG
  rationale: En este giro bíblico, ἐπικαλέω con «el nombre» significa invocar, llamar en apelación o súplica. «Invoque» es fiel y conserva el sentido ritual/devocional del verbo griego.
- source_word: τὸ ὄνομα
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - el nombre
  lexicon: BDAG
  rationale: La expresión se traduce literalmente porque funciona como un modismo bíblico que denota identidad revelada, autoridad y persona invocada.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Jesús
  lexicon: BDAG
  rationale: El texto griego dice κυρίου. En la versión principal se mantiene «el Señor» para no ampliar el enunciado más allá del griego; el contexto paulino apunta cristológicamente a Jesús, mientras que la cita remite a Joel y al nombre divino.
- source_word: σωθήσεται
  english_pob_choice: will be saved
  chosen_spanish: será salvado
  alternatives_spanish:
  - será salvo
  - será rescatado
  - será librado
  lexicon: BDAG
  rationale: El futuro pasivo de σῴζω aquí tiene sentido soteriológico. «Será salvado» preserva la voz pasiva y la amplitud del verbo sin forzar una lectura meramente temporal.
theological_decisions:
- issue: Referente de «el Señor» en la cita de Joel usada por Pablo
  english_pob_reading: Retain 'the Lord' in the main text without specifying 'Jesus,' while recognizing that in Romans 10 Paul applies this scripture christologically.
  chosen_spanish_reading: Mantener «el Señor» en el texto principal, sin introducir «Jesús»; la nota recoge que Pablo aplica la cita de Joel a Jesús en su contexto.
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor Jesús
  rationale: 'El griego conserva κυρίου y la traducción no debe expandirlo en el cuerpo del versículo. Sin embargo, la nota puede preservar la tensión intertextual: Joel habla de Yahvé, y Pablo aplica ese texto a Jesús en Romanos.'
  doctrine_reference: 'Affirmations; Translation philosophy §§1, 3; Contested terms: κύριος, יְהוָה YHWH'
- issue: Valor de la expresión «invocar el nombre»
  english_pob_reading: The Greek expression means to invoke or appeal to the Lord by name.
  chosen_spanish_reading: Entender «invocar el nombre» como súplica, apelación y llamado devocional al Señor.
  alternative_spanish_readings:
  - llamar al Señor
  - apelar al Señor
  - invocar al Señor
  rationale: La frase griega es un modismo bíblico. «Invocar» es la opción más transparente en español para conservar el matiz de oración/apelación con resonancia escritural.
  doctrine_reference: BDAG; Joel 2:32; Romanos 10:13
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; este borrador sigue ese pasaje sin modificaciones sustanciales respecto del consenso del control cruzado.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto en notas cuando el trasfondo intertextual lo exige, pero el texto principal sigue el griego κυρίου con «el Señor».
  - Se mantiene el registro bíblico moderno y digno, evitando calcos rígidos como «llame sobre» o fórmulas eclesiásticas no sustentadas por el griego.
  - «Será salvado» reproduce la pasiva futura de σῴζω con claridad soteriológica; no se reduce a «rescatado» porque el contexto paulino es de salvación.
