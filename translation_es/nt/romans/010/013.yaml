  - severity: low
    issue: Redacción poco idiomática en la nota b
    rationale: «Apelar al Señor por nombre» suena forzado en español. Una redacción como «invocar o apelar al Señor por su nombre» o «invocar el nombre del Señor» comunica mejor la explicación léxica.
