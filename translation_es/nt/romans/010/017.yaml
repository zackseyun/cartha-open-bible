translation:
  language: es
  text: Así que la fe proviene del oír, y el oír, por medio de la palabra del Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por medio de la palabra acerca del Mesías» / «por medio del mensaje concerningiente al Mesías». El genitivo griego puede entenderse de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἄρα
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: La partícula introduce una conclusión inferida del argumento previo; «Así que» mantiene ese valor inferencial en un español natural y digno.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: En este contexto paulino la respuesta humana al anuncio es la fe; «fe» es la equivalencia más directa y estable en español.
- source_word: ἐξ ἀκοῆς
  english_pob_choice: comes from hearing
  chosen_spanish: proviene del oír
  alternatives_spanish:
  - viene del oír
  - surge del oír
  lexicon: BDAG
  rationale: ἐκ/ἐξ expresa origen o fuente. En español, el verbo «provenir» comunica bien esa procedencia sin añadir más de lo que el griego dice.
- source_word: ἀκοή
  english_pob_choice: hearing
  chosen_spanish: el oír
  alternatives_spanish:
  - la escucha
  - el oído
  - el escuchar
  lexicon: BDAG
  rationale: Aquí ἀκοή puede denotar el acto de oír/escuchar. «El oír» conserva el sentido verbal y la ambigüedad entre acto y contenido recibido.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: δέ enlaza la segunda cláusula sin contraste fuerte; «y» reproduce ese enlace suave en español.
- source_word: διὰ
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - a través de
  - mediante
  lexicon: BDAG
  rationale: Con genitivo, διά expresa medio o agencia. «Por medio de» comunica con claridad ese valor instrumental.
- source_word: ῥήματος
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - dicho
  lexicon: BDAG
  rationale: ῥῆμα puede ser palabra dicha, expresión o mensaje. «Palabra» preserva la forma léxica y funciona bien en español bíblico contemporáneo.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  - del Mesías
  - acerca del Mesías
  lexicon: BDAG
  rationale: Siguiendo el criterio terminológico del proyecto, Χριστός como título se vierte normalmente «Mesías». El genitivo se deja abierto para conservar la posible relación posesiva o referencial.
theological_decisions:
- issue: Sentido de πίστις en Romanos 10:17
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: El contexto inmediato (10:14–16) trata de la respuesta humana al mensaje anunciado; «fe» conserva ese sentido sin cargarlo hacia «fidelidad».
  doctrine_reference: 'DOCTRINE.md: πίστις → fe; se preservan alternativas cuando el contexto lo pide.'
- issue: Genitivo de Χριστοῦ después de ῥήματος
  english_pob_reading: the word of the Messiah
  chosen_spanish_reading: la palabra de Mesías
  alternative_spanish_readings:
  - la palabra acerca del Mesías
  - la palabra del Mesías
  rationale: El griego permite entender el genitivo de varias maneras. La versión principal mantiene la relación abierta, y las alternativas muestran la lectura objetiva posible sin cerrar indebidamente la tensión.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones teológicas/lexicales cuando el griego es ambiguo; Χριστός → Mesías como título.'
translation_notes:
  revision_awareness: El expediente inglés pasó por una revisión que oscciló entre «Christ» y «Messiah», y luego restauró «Messiah» para respetar la política terminológica. Esta propuesta sigue esa restauración y evita resolver de forma definitiva el genitivo de Χριστοῦ, manteniendo la ambigüedad con una redacción natural en español.
  spanish_consistency_notes:
  - Se usa «Mesías» en lugar de «Cristo» para Χριστός como título, conforme al criterio terminológico del proyecto.
  - Se evita «SEÑOR» porque el texto no contiene el nombre divino YHWH ni una cita directa de κύριος con valor de nombre divino.
  - «El oír» conserva la ambigüedad de ἀκοή entre acto y contenido, en armonía con el análisis auditado.
