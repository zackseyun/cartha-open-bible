translation:
  language: es
  text: Pero pregunto, ¿acaso no oyeron? ¡Claro que sí! «Su voz[a] salió por toda la tierra[b], y sus palabras hasta los confines del mundo habitado[c]».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sonido».'
    reason: lexical_alternative
  - marker: b
    text: Aquí Pablo cita Salmo 19:4 y aplica su lenguaje a la expansión del mensaje.
    reason: cross_reference
  - marker: c
    text: 'O simplemente: «mundo»; griego: «mundo habitado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ οὐκ ἤκουσαν
  english_pob_choice: did they not hear?
  chosen_spanish: ¿acaso no oyeron?
  alternatives_spanish:
  - ¿no oyeron?
  - ¿no han oído?
  lexicon: BDAG
  rationale: La doble negación introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿acaso no oyeron?» conserva bien esa fuerza interrogativa sin sonar rígido. El aoristo se rinde naturalmente con pasado simple aquí.
- source_word: μενοῦνγε
  english_pob_choice: Indeed they did
  chosen_spanish: ¡Claro que sí!
  alternatives_spanish:
  - ¡En verdad sí!
  - ¡Ciertamente!
  lexicon: BDAG
  rationale: La partícula responde con énfasis afirmativo a la pregunta anterior. «¡Claro que sí!» expresa esa afirmación contundente de forma natural en español y preserva el contraste retórico.
- source_word: φθόγγος
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - tono
  lexicon: BDAG
  rationale: Siguiendo el uso poético de Salmo 19, «voz» comunica bien el alcance de la proclamación y mantiene el paralelismo con «palabras». Se conserva la posibilidad lexical de «sonido» en nota.
- source_word: γῆ
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - tierra habitable
  lexicon: BDAG
  rationale: En esta cita de alcance universal, «tierra» reproduce con naturalidad el valor abarcador de γῆ sin restringirlo a un territorio específico.
- source_word: πέρατα
  english_pob_choice: ends
  chosen_spanish: confines
  alternatives_spanish:
  - extremos
  - fines
  lexicon: BDAG
  rationale: «Confines» es una equivalencia idiomática fuerte en español para «to the ends of», mantiene el paralelismo poético y suena bíblico sin arcaizar excesivamente.
- source_word: οἰκουμένης
  english_pob_choice: inhabited world
  chosen_spanish: mundo habitado
  alternatives_spanish:
  - mundo
  - tierra habitada
  lexicon: BDAG
  rationale: Se preserva la precisión de οἰκουμένη como «mundo habitado», en vez de reducirlo a «mundo» sin matiz. Esto mantiene la distinción lexical que la POB inglesa documenta.
- source_word: ῥήματα
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - mensajes
  - dichos
  lexicon: BDAG
  rationale: «Palabras» es la correspondencia más directa y conserva el paralelismo con «voz». «Mensaje» sería más interpretativo de lo que exige el griego.
- source_word: ἐξῆλθεν
  english_pob_choice: has gone out
  chosen_spanish: salió
  alternatives_spanish:
  - ha salido
  - se ha difundido
  lexicon: BDAG
  rationale: En una cita poética, el pasado simple funciona con naturalidad en español y evita forzar el presente perfecto. El sentido de difusión queda implícito en el contexto de la cita.
theological_decisions:
- issue: Referente de los pronombres posesivos en la cita de Salmo 19 aplicada por Pablo
  english_pob_reading: Retain the pronouns without interpretive expansion
  chosen_spanish_reading: Mantener «su» / «sus» sin aclarar el referente en el cuerpo del texto
  alternative_spanish_readings:
  - Explicitar «de ellos»
  - Interpretar «su» como referencia a los cielos
  rationale: Pablo cita el Salmo y aplica su lenguaje a la extensión del mensaje; la traducción debe conservar esa tensión intertextual sin resolverla prematuramente. Mantener los pronombres permite que el lector perciba la cita tal como funciona en el argumento paulino.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se registran cambios necesarios en el texto base; se mantiene la misma decisión óptima de equivalencia con el aparato de notas para la cita poética y sus matices léxicos.'
  spanish_consistency_notes:
  - Se mantiene «mundo habitado» para οἰκουμένη, coherente con la terminología POB ya documentada.
  - «Palabras» conserva la pareja léxica con «voz» y evita una paráfrasis interpretativa.
  - La cita se presenta entre comillas para marcar su dependencia de Salmo 19 sin alterar el contenido del argumento paulino.
