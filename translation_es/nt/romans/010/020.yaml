    text: 'O: «entre los que no me buscaban».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me di a conocer a los que no preguntaban por mí».'
    reason: lexical_alternative
  revision_rationale: 'Se corrigieron los anclajes y contenidos de las notas para que coincidan con las alternativas documentadas en el POB inglés: [a] ahora acompaña la primera cláusula citada y preserva «entre» como alternativa a «por»; [b] añade la alternativa idiomática «me di a conocer» para ἐμφανὴς ἐγενόμην. También se elevó ligeramente el registro con «es muy audaz» y se optó por «por los que no me buscaban» como texto principal, en línea con la decisión principal del POB inglés sobre el valor idiomático de ἐν en esta cita.'
