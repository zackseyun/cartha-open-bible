translation:
  language: es
  text: 'Pero Isaías es muy audaz y dice: «Fui hallado por los que no me buscaban[a]; me volví manifiesto a los que no preguntaban por mí[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre los que no me buscaban».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me di a conocer a los que no preguntaban por mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἠσαΐας
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Isaia
  lexicon: standard transliteration
  rationale: Nombre propio bíblico transliterado según el uso normal en español.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca el contraste con la línea argumental anterior y suena natural en español.
- source_word: ἀποτολμᾷ
  english_pob_choice: is very bold
  chosen_spanish: se atreve mucho
  alternatives_spanish:
  - se atreve
  - habla con mucha audacia
  lexicon: BDAG
  rationale: El verbo expresa atreverse con audacia; «se atreve mucho» comunica bien la fuerza pragmática sin perder naturalidad en español.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - afirma
  - declara
  lexicon: BDAG
  rationale: Verbo introductorio simple y directo para la cita.
- source_word: Εὑρέθην
  english_pob_choice: I was found
  chosen_spanish: Fui hallado
  alternatives_spanish:
  - fui encontrado
  lexicon: BDAG
  rationale: Aoristo pasivo de primera persona; «fui hallado» conserva la forma bíblica y la pasividad del griego.
- source_word: ἐν τοῖς ἐμὲ μὴ ζητοῦσιν
  english_pob_choice: by those who were not seeking me
  chosen_spanish: entre los que no me buscaban
  alternatives_spanish:
  - por los que no me buscaban
  - en medio de los que no me buscaban
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente «en/entre», en esta cita funciona idiomáticamente con «fui hallado»; «entre» conserva la relación espacial del griego y la alternativa más interpretativa queda implícita en el sentido.
- source_word: ζητοῦσιν
  english_pob_choice: seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - buscaban de mí
  - andaban en busca de mí
  lexicon: BDAG
  rationale: «Buscar» comunica bien ζητέω en español y mantiene la resonancia bíblica; aquí el imperfecto exige «buscaban».
- source_word: ἐμφανὴς ἐγενόμην
  english_pob_choice: I became manifest
  chosen_spanish: me hice manifiesto
  alternatives_spanish:
  - me volví manifiesto
  - llegué a ser manifiesto
  lexicon: BDAG
  rationale: La construcción predicativa con γίνομαι se vierte de manera bastante literal; «me hice manifiesto» preserva la estructura y evita suavizar la manifestación a simple conocimiento.
- source_word: ἐπερωτῶσιν
  english_pob_choice: asking for me
  chosen_spanish: preguntaban por mí
  alternatives_spanish:
  - inquirían por mí
  - me consultaban
  lexicon: BDAG
  rationale: ἐπερωτάω aquí es «preguntar/inquirir»; en español, «preguntar por mí» mantiene el paralelismo con «me buscaban» y el matiz relacional.
theological_decisions:
- issue: Forma de la auto-manifestación divina en la cita de Isaías
  english_pob_reading: I became manifest to those who were not asking for me
  chosen_spanish_reading: me hice manifiesto a los que no preguntaban por mí
  alternative_spanish_readings:
  - me hice visible a los que no preguntaban por mí
  - me di a conocer a los que no preguntaban por mí
  rationale: La redacción española conserva la tensión del griego entre manifestación y conocimiento, sin resolverla totalmente hacia una paráfrasis más explícita. «Me hice manifiesto» refleja con fidelidad la forma verbal-adjetival; «me di a conocer» se reserva como alternativa más interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
- issue: Preposición en la primera cláusula de la cita
  english_pob_reading: I was found by those who were not seeking me
  chosen_spanish_reading: Fui hallado entre los que no me buscaban
  alternative_spanish_readings:
  - Fui hallado por los que no me buscaban
  - Fui hallado en medio de los que no me buscaban
  rationale: El griego usa ἐν con un participio, y el POB inglés señaló que puede entenderse como «among». En español, «entre» preserva esa posibilidad textual y evita imponer demasiado pronto la relación agente/paciente.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que fortaleció ἀποτολμᾷ como «is very bold» y prefirió «became manifest» para ἐμφανὴς ἐγενόμην. La versión española refleja esa mayor intensidad con «se atreve mucho» y conserva «manifiesto» en lugar de una simplificación como «visible».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no porque aparezca aquí, sino como norma general del proyecto; este versículo no la requiere.
  - Se preservó el paralelismo de dos miembros con primera persona singular en la cita.
  - «Buscar» y «preguntar por» distinguen bien en español los dos verbos griegos relacionados, sin forzar sinonimia total.
  - Se evitó «Cristo», «Señor» o vocabulario doctrinal ajeno al versículo para no desplazar la cita de Isaías.
