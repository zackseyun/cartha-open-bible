translation:
  language: es
  text: Porque el Mesías es el fin[a] de la ley, para rectitud[b] a todo el que cree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «meta» o «culminación»: el vocablo griego traducido «fin» puede significar término, meta o cumplimiento.'
    reason: alternative_reading
  - marker: b
    text: O «justicia» para δικαιοσύνη en uso paulino.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέλος
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - meta
  - culminación
  - cumplimiento
  lexicon: BDAG
  rationale: τέλος puede expresar término, meta o culminación. En español, «fin» conserva de manera breve esa ambigüedad entre terminación y meta, y permite mantener el equilibrio interpretativo que el audit trail en inglés preserva con «end».
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce explicación o fundamento del argumento anterior. «Porque» es natural en español y mantiene la relación discursiva causal/explanatoria sin añadir matices no requeridos.
- source_word: νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - ley
  - la Ley
  lexicon: BDAG
  rationale: En Romanos, νόμος remite al marco mosaico conocido. «La ley» comunica ese referente de modo claro y neutro en español, sin convertirlo en un abstracto jurídico general.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: El contexto es titular y teológico, no meramente nominal. «Mesías» preserva el sentido del título hebreo y sigue la preferencia del proyecto por Χριστός cuando funciona como título.
- source_word: εἰς δικαιοσύνην
  english_pob_choice: for righteousness
  chosen_spanish: para justicia
  alternatives_spanish:
  - para rectitud
  - con miras a justicia
  lexicon: BDAG
  rationale: εἰς expresa dirección, propósito o resultado. «Para justicia» reproduce esa fuerza de manera natural en español y conserva la alternativa semántica que el audit trail inglés deja abierta. Se evita «rectitud» porque en Romanos suele oírse más débilmente como término paulino técnico.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: Siguiendo la alternativa semántica preservada en el material inglés, «justicia» es válida en español para δικαιοσύνη y aquí ayuda a mantener abierta la tensión entre justificación/rectitud/justicia sin fijarla demasiado pronto. Se mantiene una nota para la lectura alternativa más tradicional de «rectitud».
- source_word: παντὶ τῷ πιστεύοντι
  english_pob_choice: to everyone who believes
  chosen_spanish: a todo el que cree
  alternatives_spanish:
  - para todo el que cree
  - a cada creyente
  lexicon: BDAG
  rationale: La construcción dativa-participial se vierte de forma idiomática como una referencia inclusiva de destinatarios. «A todo el que cree» mantiene el singular distributivo del participio presente y su claridad en español.
theological_decisions:
- issue: Sentido de τέλος νόμου en relación con la ley mosaica
  english_pob_reading: '''end'' in the main text, preserving both termination and goal/culmination nuances'
  chosen_spanish_reading: «fin» en el texto principal, preservando tanto el sentido de término como de meta/culminación
  alternative_spanish_readings:
  - meta de la ley
  - culminación de la ley
  - cumplimiento de la ley
  rationale: 'Romanos 10:4 es un crux interpretativo. «Fin» conserva la ambigüedad teológica: puede leerse como término salvífico de la ley y también como su meta o culminación. La nota recoge explícitamente esa tensión en lugar de resolverla.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Valor de Χριστός en este versículo
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Aquí el término señala identidad y función salvífica en la historia de Israel, por lo que el valor titular debe quedar visible. «Mesías» evita la mera transliteración y hace auditable la decisión semántica.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Elección entre justicia y rectitud para δικαιοσύνη
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: En español, «justicia» conserva con más naturalidad el rango semántico paulino que el proyecto deja abierto con la nota inglesa sobre «justice». No obstante, se documenta «rectitud» como alternativa, porque ambos matices pueden ser relevantes para lectores distintos.
  doctrine_reference: 'Contested terms table: δικαιοσύνη → righteousness; justice preserved in footnotes for Pauline passages'
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con el audit trail inglés y no requiere revisión adicional: se mantiene la ambigüedad de τέλος con una nota, se conserva el valor titular de Χριστός como Mesías y se documenta la opción lexical de δικαιοσύνη sin resolverla unilateralmente.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» conforme a la terminología del proyecto para Χριστός cuando funciona como título.
  - «la ley» traduce νόμος en sentido mosaico, consistente con Romanos.
  - «justicia» se eligió como forma principal para δικαιοσύνη, con «rectitud» preservada en nota.
  - La puntuación y el orden siguen un español bíblico moderno y legible, sin depender de fórmulas tradicionales opacas.
