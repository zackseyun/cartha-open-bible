translation:
  language: es
  text: Porque con el corazón se cree para rectitud[a], y con la boca se confiesa para salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para justicia». El griego δικαιοσύνη también puede traducirse «justicia», aunque en Pablo «rectitud» suele ser la opción por defecto para preservar mejor su sentido amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: καρδίᾳ
  english_pob_choice: with the heart
  chosen_spanish: con el corazón
  alternatives_spanish:
  - en el corazón
  - por el corazón
  lexicon: BDAG
  rationale: El dativo es instrumental o de referencia a la persona interior. «Con el corazón» es natural en español y conserva el énfasis antropológico en la fe interior, no solo en el intelecto.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Marca explicación de la afirmación anterior. «Porque» mantiene la conexión causal/expositiva en un español bíblico claro sin forzar una inferencia mayor.
- source_word: πιστεύεται
  english_pob_choice: one believes
  chosen_spanish: se cree
  alternatives_spanish:
  - uno cree
  - es creído
  lexicon: BDAG
  rationale: La forma pasiva/media se usa de modo general. «Se cree» conserva el valor impersonal y proverbial en español, evitando una construcción pesada.
- source_word: εἰς δικαιοσύνην
  english_pob_choice: unto righteousness
  chosen_spanish: para justicia
  alternatives_spanish:
  - hacia justicia
  - resultando en justicia
  lexicon: BDAG
  rationale: εἰς indica meta o resultado. «Para justicia» conserva la dirección del griego y permite mantener la tensión léxica de δικαιοσύνη sin resolverla de antemano.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: En Romanos, δικαιοσύνη admite también «justicia»; el inglés POB preserva la alternativa doctrinal. En español, «justicia» es la opción más fiel al campo semántico y la nota retiene la alternativa frente a una posible lectura restrictiva.
- source_word: στόματι
  english_pob_choice: with the mouth
  chosen_spanish: con la boca
  alternatives_spanish:
  - por la boca
  - de boca
  lexicon: BDAG
  rationale: Mantiene el paralelismo con «con el corazón» y expresa de manera natural el órgano/instrumento de la confesión.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora bien
  lexicon: BDAG
  rationale: Aquí δέ enlaza de manera complementaria la segunda cláusula con la primera. «Y» refleja mejor la coordinación que una oposición fuerte.
- source_word: ὁμολογεῖται
  english_pob_choice: one confesses
  chosen_spanish: se confiesa
  alternatives_spanish:
  - se reconoce
  - se profesa
  lexicon: BDAG
  rationale: La forma generalizante se conserva con «se confiesa». En el contexto inmediato de Ro 10:9, la confesión verbal de Jesús como Señor hace que esta sea la opción más precisa.
- source_word: εἰς σωτηρίαν
  english_pob_choice: unto salvation
  chosen_spanish: para salvación
  alternatives_spanish:
  - hacia salvación
  - resultando en salvación
  lexicon: BDAG
  rationale: εἰς expresa meta o resultado. «Para salvación» mantiene el paralelismo con «para justicia» y la concisión del griego.
- source_word: σωτηρίαν
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: BDAG
  rationale: En el contexto paulino, «salvación» es el equivalente más estable y adecuado, preservando tanto la dimensión presente como la escatológica.
theological_decisions:
- issue: Relación entre creer/confesar, justicia/salvación
  english_pob_reading: 'Render the verse straightforwardly as describing the ordinary pattern: inward belief is unto righteousness, outward confession is unto salvation, without specifying a mechanistic order of justification or making confession a meritorious work.'
  chosen_spanish_reading: 'La traducción presenta el paralelismo de manera directa: la fe interior es para justicia y la confesión oral es para salvación, sin convertir la frase en un esquema mecánico de justificación ni en una obra meritoria.'
  alternative_spanish_readings:
  - Entender la confesión solo como evidencia de una salvación ya poseída.
  - Entender la confesión como una condición adicional que gana la salvación.
  rationale: El griego ofrece dos cláusulas paralelas con εἰς. La versión española debe conservar esa tensión y no resolver debates doctrinales que el texto mismo no explicita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y el aparato auditado en inglés. No se detectaron revisiones aplicadas en el pass más reciente; por eso la propuesta española mantiene el paralelismo y la ambigüedad teológica documentada, ajustándolos a un español natural.
  spanish_consistency_notes:
  - Se mantuvo «justicia» para δικαιοσύνη y no se sustituyó por «rectitud», siguiendo la decisión paulina documentada y la alternativa notada en el texto.
  - Se conservó la repetición de «para» para reflejar el doble εἰς y preservar el paralelismo retórico del verso.
  - Se usó «corazón» y «boca» como pares antropológicos claros en español, sin añadir explicaciones interpretativas.
  - La cláusula impersonal con «se» conserva el sentido generalizante de los verbos griegos sin forzar un sujeto explícito.
