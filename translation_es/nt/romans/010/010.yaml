revisions:
- from: Porque con el corazón se cree para justicia[a], y con la boca se confiesa para salvación.
  to: Porque con el corazón se cree para rectitud[a], y con la boca se confiesa para salvación.
  rationale: 'Se requiere una reparación léxica menor pero importante: cambiar «justicia» por «rectitud» en el texto principal para reflejar la decisión auditada de traducir δικαιοσύνη como ‘righteousness’ en Pablo, y corregir la nota para que preserve «justicia» como alternativa real. El resto del verso está bien alineado con el griego y su forma española es natural.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:12:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: mantiene el valor explicativo de γάρ, el paralelismo entre καρδίᾳ/στόματι, la impersonalidad generalizante de πιστεύεται/ὁμολογεῖται y la relación de meta/resultado de εἰς en ambas cláusulas. Sin embargo, no preserva la decisión léxica auditada del POB para δικαιοσύνη, que en Pablo debe ir por defecto como «rectitud»/«justicia» según contexto, y aquí el rastro inglés fijó «righteousness» con nota alternativa «justice». En español, «justicia» en el texto principal no refleja esa decisión y además la nota actual repite erróneamente la misma palabra como alternativa.'
  spanish_quality_summary: 'La redacción es clara y natural en español bíblico moderno. «Con el corazón se cree… y con la boca se confiesa…» funciona bien y conserva el paralelismo. El único problema importante de calidad es léxico-notacional: la nota al pie está defectuosa y el término principal debería alinearse mejor con el valor paulino de δικαιοσύνη sin perder legibilidad. «Rectitud» suena natural y distinguible de la alternativa «justicia».'
  glossary_alignment: 'Alineación parcial. No hay conflicto con términos de proyecto mayores (Yahvé, Mesías, etc.). Sí hay desalineación con la política para δικαιοσύνη: el expediente inglés estableció «righteousness» como valor principal y «justice» solo como alternativa en nota. El español debería reflejar eso con «rectitud» en el texto y «justicia» como alternativa en nota, no al revés.'
  issues:
  - severity: high
    issue: δικαιοσύνη está vertido como «justicia» en el texto principal contra la decisión auditada del POB.
    rationale: El English POB fijó «righteousness» como la traducción por defecto en Pablo y preservó «justice» solo como alternativa en nota. En español, mantener «justicia» como principal estrecha y desplaza el énfasis teológico previsto por la auditoría.
  - severity: high
    issue: La nota al pie es incorrecta porque ofrece «para justicia» como alternativa cuando esa misma expresión ya está en el texto principal.
    rationale: La nota no preserva una alternativa real y falla en transmitir el contraste documentado entre «righteousness» y «justice». Debe corregirse para que la alternativa sea distinta y útil al lector.
  - severity: medium
    issue: La rationale española para δικαιοσύνη contradice la rationale inglesa auditada.
    rationale: Afirma que «justicia» es la opción más fiel en español, cuando la documentación base estableció la opción principal equivalente a «righteousness». La revisión del texto debe seguir la evidencia auditada, no reabrir esa decisión.
  revised_spanish_text: Porque con el corazón se cree para rectitud[a], y con la boca se confiesa para salvación.
  revised_footnotes:
  - marker: a
    text: O «para justicia». El griego δικαιοσύνη también puede traducirse «justicia», aunque en Pablo «rectitud» suele ser la opción por defecto para preservar mejor su sentido amplio.
    reason: lexical_alternative
  revision_rationale: 'Se requiere una reparación léxica menor pero importante: cambiar «justicia» por «rectitud» en el texto principal para reflejar la decisión auditada de traducir δικαιοσύνη como ‘righteousness’ en Pablo, y corregir la nota para que preserve «justicia» como alternativa real. El resto del verso está bien alineado con el griego y su forma española es natural.'
