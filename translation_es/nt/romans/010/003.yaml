  source_alignment_summary: 'El borrador sigue bien la sintaxis y el argumento del griego: desconocen la δικαιοσύνη de Dios, buscan establecer la propia, y no se someten a la δικαιοσύνη de Dios. Sin embargo, no preserva el rastro de auditoría del POB en dos puntos importantes: omite la nota sobre la alternativa léxica de δικαιοσύνη (''justicia'') y la nota sobre la ambigüedad de ''de Dios'' / ''de parte de Dios'' / ''la justicia de Dios''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Porque, ignorando...' funciona, aunque la coma tras 'Porque' es prescindible. 'Procurando establecer la suya propia' es comprensible, pero 'buscando establecer la suya propia' refleja más de cerca ζητοῦντες sin sonar forzado. La frase revisada mejora levemente la fluidez y conserva mejor el paralelismo participial.
  glossary_alignment: 'Hay una desviación del criterio documentado del POB para δικαιοσύνη en contexto paulino: el inglés base eligió ''righteousness'' y conservó ''justice'' en nota. En español, lo más alineado es usar ''justicia'' en el texto por naturalidad, pero debe preservarse en nota la alternativa ''rectitud'' o una explicación equivalente, y también la ambigüedad de ''la justicia de Dios''. No hay conflicto con otros términos del glosario del proyecto.'
  issues:
