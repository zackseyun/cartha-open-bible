  text: ἀγνοοῦντες γὰρ τὴν τοῦ θεοῦ δικαιοσύνην, καὶ τὴν ⸀ἰδίαν ζητοῦντες στῆσαι, τῇ δικαιοσύνῃ τοῦ θεοῦ οὐχ ὑπετάγησαν·
base_translation:
  language: en
  yaml_path: translation/nt/romans/010/003.yaml
  text: For[a], being ignorant of the righteousness of God and seeking to establish their own[b], they did not submit to the righteousness of God.
  footnotes:
  - marker: a
    text: Or 'justice' (for both occurrences of 'righteousness'). In Paul, δικαιοσύνη can denote righteousness, justice, or God's righteous way of making people right.
    reason: lexical_alternative
  - marker: b
    text: '''The righteousness of God'' may also be understood as ''righteousness from God'' or ''God''s righteousness.'' The Greek wording allows more than one nuance.'
    reason: alternative_reading
