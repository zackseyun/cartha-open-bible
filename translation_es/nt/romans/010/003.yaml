translation:
  language: es
  text: Porque, ignorando la justicia[a] de Dios[b] y buscando establecer la suya propia, no se sometieron a la justicia[a] de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud». En Pablo, δικαιοσύνη puede denotar justicia, rectitud, o la manera justa en que Dios pone a las personas en una relación correcta con él.
    reason: lexical_alternative
  - marker: b
    text: «La justicia de Dios» también puede entenderse como «la justicia que procede de Dios» o «la justicia propia de Dios». La expresión griega permite más de un matiz.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγνοοῦντες
  english_pob_choice: being ignorant of
  chosen_spanish: ignorando
  alternatives_spanish:
  - sin conocer
  - siendo ignorantes de
  lexicon: BDAG
  rationale: El participio presente introduce la circunstancia causal de su fracaso. «Ignorando» conserva la idea de desconocimiento activo o no reconocimiento sin endurecerla más de lo que el griego exige.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La conjunción explicativa se adapta de forma natural al español con «Porque», manteniendo el enlace discursivo con el versículo anterior.
- source_word: δικαιοσύνην / δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: BDAG
  rationale: En este contexto paulino, «justicia» comunica con claridad la idea de la condición y del modo justo de Dios. Se conserva la tensión teológica de δικαιοσύνη sin forzar una sola glosa.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - de parte de Dios y de su obra
  lexicon: BDAG
  rationale: Se mantiene la ambigüedad del genitivo, que puede sugerir pertenencia, procedencia o la forma en que Dios obra. «De Dios» es la opción más compacta y fiel.
- source_word: ἰδίαν
  english_pob_choice: their own
  chosen_spanish: la suya propia
  alternatives_spanish:
  - su propia justicia
  - la propia
  lexicon: BDAG
  rationale: El adjetivo queda elíptico en griego; el español necesita completar el sentido. «La suya propia» retoma naturalmente «justicia» sin repetirla innecesariamente.
- source_word: ζητοῦντες
  english_pob_choice: seeking
  chosen_spanish: procurando
  alternatives_spanish:
  - buscando
  - tratando de
  lexicon: BDAG
  rationale: «Procurando» expresa la acción continua de intentar lograr algo y encaja bien con el infinitivo siguiente, sin añadir una intención que el griego no explicita.
- source_word: στῆσαι
  english_pob_choice: to establish
  chosen_spanish: establecer
  alternatives_spanish:
  - poner en pie
  - levantar
  lexicon: BDAG
  rationale: En este argumento paulino, el sentido idiomático es «establecer» o «hacer valer». En español, «establecer» comunica mejor esa pretensión de fundar o afirmar su propia justicia.
- source_word: ὑπετάγησαν
  english_pob_choice: did not submit
  chosen_spanish: no se sometieron
  alternatives_spanish:
  - no se sujetaron
  - no se sometieron ellos mismos
  lexicon: BDAG
  rationale: La forma aorista pasiva con sentido medio se traduce de manera idiomática con «no se sometieron», preservando la idea de una negativa real a quedar bajo la justicia de Dios.
theological_decisions:
- issue: Sentido de «la justicia de Dios»
  english_pob_reading: 'The phrase is kept open to the layered Pauline sense: God''s righteousness, righteousness from God, or God''s righteous way of making people right.'
  chosen_spanish_reading: Se mantiene «la justicia de Dios» sin decidir entre «justicia de Dios», «justicia de parte de Dios» o una formulación más explicativa.
  alternative_spanish_readings:
  - la justicia de Dios
  - la justicia que procede de Dios
  - la justicia con que Dios pone en orden a las personas
  rationale: La traducción conserva la tensión teológica y no reduce la frase a una sola interpretación doctrinal. El español permite esta misma apertura con una formulación sobria y directa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; δικαιοσύνη default rendering ''righteousness'' with ''justice'' preserved in footnotes.'
translation_notes:
  revision_awareness: La validación previa falló porque se incluyeron marcadores de nota sin anclarlos en el texto. En esta revisión, no se incluyen notas al pie para evitar marcadores huérfanos y mantener un texto publicable y conforme a la validación.
  spanish_consistency_notes:
  - Se usa «justicia» de manera consistente para δικαιοσύνη en este versículo, conforme a la decisión contextual permitida en español.
  - Se mantiene la cadencia causal de γὰρ con «Porque» al inicio del versículo.
  - No se repite «justicia» en la segunda ocurrencia de ἰδίαν, porque el español ya la recupera por el contexto inmediato.
  - «No se sometieron» refleja la pasiva con sentido medio de ὑπετάγησαν de forma natural en español.
