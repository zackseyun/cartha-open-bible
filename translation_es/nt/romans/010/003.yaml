  - marker: b
    text: «La justicia de Dios» también puede entenderse como «la justicia que procede de Dios» o «la justicia propia de Dios». La expresión griega permite más de un matiz.
    reason: alternative_reading
  revision_rationale: La revisión conserva el texto base español, pero restaura las dos notas significativas del POB inglés y ajusta 'procurando' a 'buscando' para reflejar más directamente ζητοῦντες. Se mantiene 'justicia' en el texto principal por claridad y naturalidad en español, mientras las notas preservan la tensión semántica y teológica documentada.
