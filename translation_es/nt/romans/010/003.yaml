    issue: Faltan las notas del rastro de auditoría inglés
    rationale: 'El POB inglés preserva dos matices significativos: (1) la alternativa léxica de δικαιοσύνη y (2) la ambigüedad del genitivo ''de Dios''. El borrador español no las traslada, pese a que siguen siendo relevantes en español.'
  - severity: low
