    rationale: En español, 'Porque ignoraban...' o 'Porque, ignorando...' pueden funcionar, pero la coma tras 'Porque' no aporta claridad aquí.
  revised_spanish_text: Porque, ignorando la justicia[a] de Dios[b] y buscando establecer la suya propia, no se sometieron a la justicia[a] de Dios[b].
