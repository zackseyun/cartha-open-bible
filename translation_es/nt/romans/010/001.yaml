translation:
  language: es
  text: Hermanos[a], el deseo de mi corazón y mi oración a Dios por ellos es para su salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego usa la forma masculina plural, que puede dirigirse a un grupo mixto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Hermanos y hermanas
  - Hermanos/as
  - Siblings
  lexicon: BDAG
  rationale: El vocativo plural masculino se conserva en la forma del texto, siguiendo la decisión POB de mantener la forma fuente. En español, «Hermanos» comunica de manera natural el uso congregacional dirigido a un grupo mixto, y la nota aclara la posible inclusión de hermanas sin reemplazar la forma original.
- source_word: εὐδοκία
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - buena voluntad
  - complacencia
  - deleite
  lexicon: BDAG
  rationale: En este contexto εὐδοκία expresa lo que Pablo quiere o anhela, no una idea abstracta de beneplácito. «Deseo» es natural en español y conserva bien la relación con «de mi corazón».
- source_word: τῆς ἐμῆς καρδίας
  english_pob_choice: of my heart
  chosen_spanish: de mi corazón
  alternatives_spanish:
  - en mi corazón
  - mi corazón
  lexicon: BDAG
  rationale: La construcción genitiva se reproduce de forma directa y clara. «De mi corazón» preserva la relación posesiva sin sobreexplicar ni suavizar la imagen.
- source_word: δέησις
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - petición
  - súplica
  lexicon: BDAG
  rationale: Aunque δέησις puede enfatizar petición ferviente, «oración» es la opción más natural y readable en español cuando va seguida de «a Dios por ellos». La intensidad de súplica queda implícita en el contexto.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - ante Dios
  - hacia Dios
  lexicon: BDAG
  rationale: La preposición πρός con acusativo aquí indica dirección del acto orante. «A Dios» es la equivalencia idiomática más simple y fiel en español.
- source_word: ὑπὲρ αὐτῶν
  english_pob_choice: for them
  chosen_spanish: por ellos
  alternatives_spanish:
  - en favor de ellos
  - en su favor
  - en nombre de ellos
  lexicon: BDAG
  rationale: ὑπέρ expresa beneficio o representación. «Por ellos» es breve y natural en español, y mantiene la referencia pronominal del griego sin introducir un sustantivo no presente en el texto.
- source_word: αὐτῶν
  english_pob_choice: them
  chosen_spanish: ellos
  alternatives_spanish:
  - Israel
  - mis compatriotas israelitas
  lexicon: BDAG
  rationale: El referente se deduce del contexto inmediato, pero el griego usa pronombre. Por eso el texto español conserva la referencia pronominal («ellos») y no sustituye el pronombre por el nombre del grupo.
- source_word: εἰς σωτηρίαν
  english_pob_choice: for their salvation
  chosen_spanish: para su salvación
  alternatives_spanish:
  - hacia su salvación
  - resultando en su salvación
  lexicon: BDAG
  rationale: εἰς marca meta o resultado. «Para su salvación» expresa con naturalidad que la finalidad o resultado se orienta a ellos, sin añadir interpretación más allá de la sintaxis griega.
theological_decisions:
- issue: 'Ἀδελφοί: address to the congregation and gendered form'
  english_pob_reading: 'Brothers; footnote: Or ''brothers and sisters''; the Greek uses the masculine plural form, which can address a mixed group.'
  chosen_spanish_reading: Hermanos[a]
  alternative_spanish_readings:
  - Hermanos y hermanas
  - Hermanos/as
  rationale: Se conserva la forma masculina plural del vocativo como reflejo del texto griego y de la decisión POB de no neutralizar la forma fuente en el cuerpo principal. La nota preserva la posibilidad inclusiva para lectores españoles sin borrar la forma documentada.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El pasaje coincide con el último pase de revisión y con el dictamen de alta concordancia; no se detectaron cambios sustanciales necesarios respecto del audit trail inglés. Se mantuvieron la dirección pronominal, la meta de la oración y la forma masculina plural con nota inclusiva.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - Se conserva la referencia pronominal «ellos» en lugar de expandirla a un sustantivo contextual, respetando el griego.
  - La preposición final se traduce con una construcción final natural («para su salvación») sin perder el valor de meta/resultdo de εἰς.
  - La nota al pie usa marcador único y aparece anclada en el vocativo principal.
