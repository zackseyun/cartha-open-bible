translation:
  language: es
  text: Pero ahora ya no soy yo quien lo hago[a], sino el pecado que habita en mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ya no lo hago yo, sino el pecado que habita en mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Ahora bien
  - Mas ahora
  lexicon: BDAG
  rationale: Expresa el giro temporal y argumentativo del griego con una conjunción natural en español. «Pero ahora» conserva el contraste de νυνὶ δὲ sin volver la frase artificial.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no ya
  - no más
  lexicon: BDAG
  rationale: «Ya no» comunica con naturalidad la cesación de la acción y su desacople respecto del yo; en español suena más idiomático que una calca literal.
- source_word: ἐγώ
  english_pob_choice: I am no longer the one
  chosen_spanish: soy yo quien
  alternatives_spanish:
  - yo
  - es ya no yo quien
  lexicon: BDAG
  rationale: El pronombre es enfático en griego; «soy yo quien» mantiene el foco sobre el sujeto y hace explícita la estructura contrastiva sin perder naturalidad.
- source_word: κατεργάζομαι
  english_pob_choice: doing
  chosen_spanish: lo hace
  alternatives_spanish:
  - lo hago
  - lo realizo
  - lo llevo a cabo
  lexicon: BDAG
  rationale: En este contexto el verbo apunta a ejecutar la acción mencionada. «Lo hace» evita sobredeterminar el matiz y mantiene el referente neutro del pronombre αὐτό.
- source_word: αὐτὸ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - esto
  - eso
  lexicon: BDAG
  rationale: El pronombre retoma la acción del contexto inmediato; en español, «lo» es la referencia más directa y sobria.
- source_word: ἡ οἰκοῦσα ἐν ἐμοὶ ἁμαρτία
  english_pob_choice: sin dwelling in me
  chosen_spanish: el pecado que habita en mí
  alternatives_spanish:
  - el pecado que mora en mí
  - el pecado que vive en mí
  lexicon: BDAG
  rationale: «Habita» conserva la imagen de permanencia de οἰκοῦσα y mantiene el tono más solemne de la metáfora. La frase con artículo y relativo hace más natural en español la personificación del pecado sin aplanarla.
theological_decisions:
- issue: La distinción entre «yo» y «el pecado que habita en mí» podría suavizarse o explicarse en exceso.
  english_pob_reading: Retain the text's stark distinction without explanatory smoothing.
  chosen_spanish_reading: Conservar la distinción tajante entre el sujeto responsable y el pecado personificado, sin añadir explicación interpretativa.
  alternative_spanish_readings:
  - Reformular para enfatizar solo el conflicto interior
  - Añadir una glosa que atenúe la atribución de agencia
  rationale: La fuente presenta la tensión de forma directa; la traducción debe preservarla para no resolverla prematuramente. «Soy yo quien... sino el pecado que habita en mí» mantiene el contraste sin neutralizar la fuerza retórica del pasaje.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se tomó en cuenta el estado de revisión más reciente, que no introdujo cambios y confirmó que no se requerían ajustes respecto del texto auditado en inglés.
  spanish_consistency_notes:
  - Se mantuvo «pecado» para ἁμαρτία, conforme al uso bíblico estándar y al sentido personificado del contexto.
  - Se prefirió «habita» para οἰκοῦσα, siguiendo la imagen de residencia permanente y evitando el coloquialismo de «vive».
  - La puntuación conserva el contraste fuerte entre la afirmación y la negación, en paralelo con el griego y con el inglés auditado.
