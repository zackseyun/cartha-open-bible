translation:
  language: es
  text: Pero ahora hemos sido liberados de la ley[a], habiendo muerto a aquello que nos retenía, de modo que servimos en novedad del Espíritu[b] y no en vejez de la letra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo muerto a aquello por lo cual estábamos atados».
    reason: lexical_alternative
  - marker: b
    text: O «espíritu».
    reason: alternative_reading
  - marker: c
    text: O «no en vejez del código escrito».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατηργήθημεν
  english_pob_choice: have been released
  chosen_spanish: hemos sido liberados
  alternatives_spanish:
  - hemos sido puestos en libertad
  - hemos sido desligados
  lexicon: BDAG
  rationale: El griego pasivo expresa quedar liberados de una relación vinculante con la ley, no la anulación de la ley misma. «Hemos sido liberados» mantiene ese valor relacional con español natural y digno.
- source_word: νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: En el contexto paulino aquí alude a la ley mosaica. «La ley» conserva claridad y evita cargar el término con una formulación más técnica que el pasaje no exige.
- source_word: ἀποθανόντες
  english_pob_choice: having died
  chosen_spanish: habiendo muerto
  alternatives_spanish:
  - después de morir
  - una vez muertos
  lexicon: BDAG
  rationale: El participio aoristo se refleja mejor con una construcción de anterioridad. «Habiendo muerto» preserva que los creyentes son el sujeto de la muerte, no la ley.
- source_word: ἐν ᾧ κατειχόμεθα
  english_pob_choice: to what held us
  chosen_spanish: a aquello que nos tenía sujetos
  alternatives_spanish:
  - a aquello en que estábamos sujetos
  - a aquello por lo cual estábamos atados
  lexicon: BDAG
  rationale: La construcción griega es compacta y apunta a una esclavitud o sujeción previa. «Nos tenía sujetos» recoge el sentido de κατέχω con fuerza relacional, sin sobreinterpretar.
- source_word: δουλεύειν
  english_pob_choice: serve
  chosen_spanish: servimos
  alternatives_spanish:
  - esclavizamos
  - prestamos servicio
  lexicon: BDAG
  rationale: Aunque δουλεύω puede conservar imaginería de esclavitud, aquí el contraste del pasaje se expresa mejor con «servimos» en español, manteniendo el verbo de la cláusula final sin añadir dureza innecesaria.
- source_word: καινότητι
  english_pob_choice: newness
  chosen_spanish: novedad
  alternatives_spanish:
  - novedad fresca
  - nueva condición
  lexicon: BDAG
  rationale: «Novedad» es un equivalente idiomático de «newness» y preserva el sustantivo abstracto en contraste con la «vejez» de la cláusula siguiente.
- source_word: πνεύματος
  english_pob_choice: the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - del espíritu
  lexicon: BDAG
  rationale: En la oposición paulina con «la letra», el referente más probable es el Espíritu Santo. Por eso el texto principal usa mayúscula; la lectura alternativa más general se conserva en nota.
- source_word: παλαιότητι
  english_pob_choice: oldness
  chosen_spanish: vejez
  alternatives_spanish:
  - antigüedad
  - viejez
  lexicon: BDAG
  rationale: «Vejez» reproduce el contraste formal con «novedad» y evita una paráfrasis más explicativa que el griego no requiere.
- source_word: γράμματος
  english_pob_choice: the letter
  chosen_spanish: la letra
  alternatives_spanish:
  - el escrito
  - el código escrito
  lexicon: BDAG
  rationale: «La letra» conserva el idioma paulino directo. La alternativa interpretativa «código escrito» no es necesaria en el texto principal, pero queda insinuada en nota.
theological_decisions:
- issue: '¿Quién muere en la cláusula participial: la ley o los creyentes?'
  english_pob_reading: 'Believers are the ones who died: “having died to what held us.”'
  chosen_spanish_reading: 'Los creyentes son los que han muerto: «habiendo muerto a aquello que nos tenía sujetos».'
  alternative_spanish_readings:
  - la ley murió respecto de nosotros
  - hemos muerto a la ley
  rationale: La forma participial nominativa plural se refiere al sujeto implícito «nosotros». La traducción principal sigue esa gramática y evita introducir como lectura principal que la ley sea la que murió.
  doctrine_reference: Romanos 7:4-6; Gálatas 2:19
- issue: ¿πνεύματος se refiere al Espíritu Santo o al espíritu humano?
  english_pob_reading: “the Spirit”
  chosen_spanish_reading: «el Espíritu»
  alternative_spanish_readings:
  - «espíritu»
  rationale: La contraposición con «la letra» y el marco de la nueva alianza favorecen la referencia al Espíritu Santo. Se conserva la posibilidad semántica más general en nota para no borrar la tensión documentada.
  doctrine_reference: Romanos 8:2-6; 2 Corintios 3:6
translation_notes:
  revision_awareness: 'La revisión más reciente del expediente inglés no cambió el contenido: el pasaje quedó confirmado sin ajustes. La versión española sigue el mismo criterio de equivalencia óptima y conserva las alternativas documentadas en el audit trail.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no aplica.
  - Se mantiene «la ley» en minúscula por consistencia con el contexto paulino y con el expediente inglés.
  - Se usa mayúscula en «Espíritu» por el sentido contextual más probable; la lectura alternativa «espíritu» queda documentada en nota.
  - «La letra» se conserva como eco directo de la formulación paulina y en simetría con «novedad»/«vejez».
