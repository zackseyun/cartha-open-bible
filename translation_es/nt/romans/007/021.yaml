translation:
  language: es
  text: 'Así que encuentro esta ley: cuando quiero hacer el bien[a], el mal está cerca de mí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «principio» o «regla».
    reason: alternative_reading
lexical_decisions:
- source_word: Εὑρίσκω
  english_pob_choice: I find
  chosen_spanish: hallo
  alternatives_spanish:
  - encuentro
  - descubro
  lexicon: BDAG
  rationale: Conserva el valor de reconocimiento actual y reflexivo del verbo, con un español natural y digno. "Hallar" comunica el hallazgo de una realidad ya percibida, sin añadir matices ajenos.
- source_word: ἄρα
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Expresa bien la inferencia lógica desde el argumento anterior en un español fluido, sin endurecer demasiado el enlace discursivo.
- source_word: τὸν νόμον
  english_pob_choice: law
  chosen_spanish: esta ley
  alternatives_spanish:
  - este principio
  - esta regla
  lexicon: BDAG
  rationale: Se mantiene "ley" para preservar la resonancia de νόμος en Pablo, pero con el demostrativo "esta" para reflejar la referencia concreta del hallazgo en el contexto. La alternativa interpretativa sigue abierta en nota.
- source_word: τῷ θέλοντι ἐμοὶ ποιεῖν τὸ καλὸν
  english_pob_choice: when I want to do what is good
  chosen_spanish: cuando quiero hacer lo bueno
  alternatives_spanish:
  - cuando quiero hacer el bien
  - al querer yo hacer lo bueno
  lexicon: BDAG
  rationale: La construcción dativa con participio se vierte de forma idiomática como una cláusula temporal-condicional natural en español, preservando el impulso volitivo de θέλω y la intención de ποιεῖν τὸ καλόν.
- source_word: τὸ καλὸν
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo que es bueno
  lexicon: BDAG
  rationale: '"Lo bueno" conserva el sustantivo neutro sin volverlo abstracto de más; en español suena más natural que "el bien" en este giro, y mantiene el contraste con "el mal".'
- source_word: τὸ κακὸν
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - el mal moral
  lexicon: BDAG
  rationale: En español, "el mal" reproduce con fuerza el sustantivo adjetival y crea un contraste claro con "lo bueno". Aunque "evil" en inglés se puede verter como "mal", aquí la decisión evita una formulación demasiado abstracta y mantiene el paralelismo.
- source_word: παράκειται
  english_pob_choice: lies close at hand
  chosen_spanish: está cerca de mí
  alternatives_spanish:
  - está a mi alcance
  - está presente conmigo
  - me acecha
  lexicon: BDAG
  rationale: La idea central es de proximidad inmediata o disponibilidad cercana. "Está cerca de mí" conserva esa cercanía sin introducir una imagen demasiado figurativa o más intensa de la que el verbo exige.
theological_decisions:
- issue: 'Sentido de νόμος en este contexto: ley mosaica o principio operativo'
  english_pob_reading: Rendered as 'law' in the main text while allowing the contextual sense of a principle.
  chosen_spanish_reading: '"ley" en el texto principal, dejando abierta la posibilidad de "principio" o "regla" en nota.'
  alternative_spanish_readings:
  - principio
  - regla
  rationale: Pablo usa νόμος de manera intencionalmente resonante. Traducirlo por "ley" preserva el eco del término, pero en este versículo el contexto puede apuntar a un principio operativo más que exclusivamente a la Ley mosaica. La nota evita resolver de antemano una tensión interpretativa real.
  doctrine_reference: Romanos 7:21; uso paulino de νόμος en contexto argumentativo
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo indicó alta concordancia; no se requieren ajustes textuales adicionales. La redacción española intenta mantener la misma tensión interpretativa que el texto base y la nota inglesa sobre νόμος.
  spanish_consistency_notes:
  - Se conserva la distinción entre "lo bueno" y "el mal" para reflejar el contraste del griego.
  - '"Yahvé" no aparece en este versículo; no aplica la convención del nombre divino.'
  - Se prefirió una cláusula natural en español para la construcción dativa griega, sin perder la fuerza volitiva de θέλοντι.
  - La nota de pie de página se ancla en "lo bueno" para preservar la alternativa interpretativa de νόμος sin sobrecargar el texto principal.
