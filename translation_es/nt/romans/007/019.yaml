translation:
  language: es
  text: Porque no hago el bien que quiero[a], sino el mal que no quiero; esto[b] practico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llevo a cabo» para «hago» (ποιῶ); el griego usa un verbo diferente más adelante en el versículo.
    reason: lexical_alternative
  - marker: b
    text: O «hago» para «practico» (πράσσω); la traducción distingue los dos verbos griegos para mayor claridad, aunque la superposición de significado es considerable.
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλω
  english_pob_choice: want
  chosen_spanish: quiero
  alternatives_spanish:
  - deseo
  - quiero
  lexicon: BDAG
  rationale: «Quiero» expresa con naturalidad la volición personal de Pablo y mantiene el contraste directo con «no quiero» al final del versículo.
- source_word: ποιῶ
  english_pob_choice: do
  chosen_spanish: hago
  alternatives_spanish:
  - realizo
  - llevo a cabo
  - hago
  lexicon: BDAG
  rationale: «Hago» es el equivalente más natural y conserva la oposición con el segundo verbo griego, que el texto distingue en la línea siguiente.
- source_word: ἀγαθόν
  english_pob_choice: the good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el bien
  - el acto bueno
  lexicon: BDAG
  rationale: En español, «el bien» comunica mejor la categoría moral sustantivada que «lo bueno» y preserva la fuerza ética del contraste.
- source_word: κακὸν
  english_pob_choice: the evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - el mal
  - el acto malo
  lexicon: BDAG
  rationale: «El mal» mantiene el paralelo con «el bien» y expresa una oposición moral fuerte sin suavizarla.
- source_word: πράσσω
  english_pob_choice: practice
  chosen_spanish: practico
  alternatives_spanish:
  - hago
  - practico
  - llevo a cabo
  lexicon: BDAG
  rationale: «Practico» conserva, en español, la idea de conducta realizada o ejercitada que la POB distingue del primer verbo, sin sobretraducirla.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: eso
  alternatives_spanish:
  - esto
  - eso
  lexicon: BDAG
  rationale: '«Eso» funciona de modo natural al retomar la acción mencionada y permite una frase española fluida: «eso practico».'
- source_word: οὐ γὰρ
  english_pob_choice: For ... not
  chosen_spanish: Porque ... no
  alternatives_spanish:
  - Pues ... no
  - Porque ... no
  lexicon: BDAG
  rationale: «Porque» conserva el valor explicativo de γάρ y enlaza el versículo con el argumento inmediato de Pablo.
theological_decisions:
- issue: Mantener el peso moral de la contraposición
  english_pob_reading: Retain “the good” / “the evil” as direct moral categories.
  chosen_spanish_reading: Conservar «el bien» / «el mal» como categorías morales directas.
  alternative_spanish_readings:
  - lo correcto / lo incorrecto
  - lo bueno / lo malo
  rationale: El griego presenta una oposición ética fuerte; traducirla de forma más suave diluiría la tensión retórica y teológica del pasaje.
  doctrine_reference: Preservar la tensión moral del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incluyendo el marcador [a] directamente en el texto traducido, anclado en «hago». La nota ahora está alineada con el versículo y con la distinción verbal del griego.
  spanish_consistency_notes:
  - Se conservó la distinción entre ποιῶ y πράσσω mediante «hago» / «practico».
  - Se mantuvo el paralelismo moral «el bien» / «el mal» en lugar de suavizarlo.
  - El conector causal «Porque» refleja el valor explicativo de γάρ en contexto.
  - El demostrativo τοῦτο se expresó naturalmente con «eso» para evitar rigidez sintáctica.
