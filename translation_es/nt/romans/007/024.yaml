translation:
  language: es
  text: ¡Miserable hombre que soy! ¿Quién me librará de este cuerpo de muerte?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «del cuerpo de esta muerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: ταλαίπωρος
  english_pob_choice: wretched
  chosen_spanish: desdichado
  alternatives_spanish:
  - miserable
  - miserable y desgraciado
  - desventurado
  lexicon: BDAG
  rationale: Expresa aflicción intensa y suena natural en español. 'Desdichado' conserva el tono de lamento sin sonar excesivamente coloquial o moralizante.
- source_word: ἐγὼ ἄνθρωπος
  english_pob_choice: man that I am
  chosen_spanish: de mí, hombre
  alternatives_spanish:
  - soy yo, hombre
  - hombre que soy
  - hombre soy
  lexicon: BDAG
  rationale: Mantiene el orden enfático del griego y la autoexclamación. 'Hombre' conserva el masculino singular del hablante, como en la decisión inglesa.
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - qué persona
  - quién será
  lexicon: BDAG
  rationale: Interrogativo personal directo y natural en español para buscar un libertador.
- source_word: ῥύσεται
  english_pob_choice: will rescue
  chosen_spanish: librará
  alternatives_spanish:
  - rescatará
  - liberará
  - salvará
  lexicon: BDAG
  rationale: '''Librará'' comunica bien la idea de sacar a alguien de una situación de peligro o esclavitud, con buena naturalidad en español bíblico moderno. Conserva la fuerza de deliver/rescue sin volverla demasiado técnica.'
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - fuera de
  - desde
  lexicon: BDAG
  rationale: Preposición normal en español para separación en este contexto.
- source_word: σώματος
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  - organismo
  lexicon: BDAG
  rationale: Se mantiene el sentido literal concreto de 'body', sin reemplazarlo por una paráfrasis abstracta.
- source_word: τοῦ θανάτου τούτου
  english_pob_choice: this body of death
  chosen_spanish: de muerte
  alternatives_spanish:
  - de esta muerte
  - perteneciente a esta muerte
  - de este cuerpo de muerte
  lexicon: BDAG
  rationale: Se preserva la unión del cuerpo con la muerte sin forzar una literalidad pesada en español. La frase completa 'cuerpo de muerte' reproduce la imagen y la tensión retórica del griego de manera entendible.
theological_decisions:
- issue: Cómo renderizar la exclamación inicial sin resolver la tensión retórica
  english_pob_reading: Wretched man that I am!
  chosen_spanish_reading: ¡Desdichado de mí, hombre!
  alternative_spanish_readings:
  - ¡Qué desdichado soy yo, hombre!
  - ¡Miserable hombre que soy!
  rationale: Se conserva el tono de lamento personal y la autoidentificación enfática del griego, sin suavizar la angustia del pasaje ni convertirlo en una exclamación explicativa.
  doctrine_reference: Romanos 7:24; mantener la tensión existencial del texto sin armonizarla prematuramente
- issue: Cómo tratar la frase final para no perder la imagen corporal y mortal
  english_pob_reading: this body of death
  chosen_spanish_reading: este cuerpo de muerte
  alternative_spanish_readings:
  - el cuerpo de esta muerte
  - este cuerpo mortal
  rationale: La forma 'cuerpo de muerte' conserva el genitivo griego y la carga imagética. Añadir 'de' con demostrativo en español produce una construcción inteligible que retiene la asociación entre cuerpo y muerte sin diluirla.
  doctrine_reference: Romanos 7:24; preservar la imagen y la ambigüedad sin explicarla doctrinalmente
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que ajustó la exclamación a 'Wretched man that I am!' para reflejar mejor el orden y el tono del griego. La traducción española sigue esa misma línea, manteniendo una autoexclamación breve, enfática y con lamento personal.
  spanish_consistency_notes:
  - Se usó 'desdichado' para reproducir la intensidad de ταλαίπωρος sin recurrir a un calco duro.
  - '''Librará'' refleja ῥύσεται con fuerza de rescate/liberación y suena natural en español.'
  - Se conservó 'cuerpo' como traducción literal de σώματος.
  - La frase final se mantuvo como 'cuerpo de muerte' para preservar la tensión del genitivo y la imagen del texto.
  - La nota al pie marcada [a] queda anclada explícitamente en el texto y ofrece la alternativa más literal.
