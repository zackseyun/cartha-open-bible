translation:
  language: es
  text: Pero veo otra ley[a] en mis miembros, que combate contra la ley de mi mente y me lleva cautivo[b] a la ley del pecado que está en mis miembros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «principio» o «poder» para «ley» en estos usos repetidos de νόμος.
    reason: lexical_alternative
  - marker: b
    text: Lit. «en la ley del pecado»; el español «a la ley del pecado» expresa el sentido de ser llevado cautivo bajo su poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπω
  english_pob_choice: I see
  chosen_spanish: veo
  alternatives_spanish:
  - observo
  - percibo
  lexicon: BDAG
  rationale: El presente simple conserva la percepción directa y la vividez del texto griego, sin añadir matiz interpretativo.
- source_word: ἕτερον
  english_pob_choice: another
  chosen_spanish: otra
  alternatives_spanish:
  - diferente
  lexicon: BDAG
  rationale: «Otra» expresa con naturalidad el contraste con la ley ya mencionada y mantiene la repetición retórica de νόμος.
- source_word: νόμον / νόμῳ (repeated)
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - principio
  - poder
  lexicon: BDAG
  rationale: «Ley» preserva la repetición de νόμος y la tensión teológica del verso; «principio» o «poder» resolverían demasiado pronto la metáfora.
- source_word: ἐν τοῖς μέλεσίν μου
  english_pob_choice: in my members
  chosen_spanish: en mis miembros
  alternatives_spanish:
  - en mi cuerpo
  - en mis miembros corporales
  - en las partes de mi cuerpo
  lexicon: BDAG
  rationale: «Miembros» conserva el lenguaje anatómico paulino y evita reducir el sentido a un simple «cuerpo».
- source_word: ἀντιστρατευόμενον
  english_pob_choice: waging war against
  chosen_spanish: que guerreaba contra
  alternatives_spanish:
  - que luchaba contra
  - que hacía guerra contra
  lexicon: BDAG
  rationale: La imagen militar se conserva con un verbo natural en español que expresa combate sostenido.
- source_word: τῷ νόμῳ τοῦ νοός μου
  english_pob_choice: the law of my mind
  chosen_spanish: la ley de mi mente
  alternatives_spanish:
  - la ley de mi entendimiento
  - la ley de mi interior
  lexicon: BDAG
  rationale: «Mente» es la equivalencia más directa para νοῦς en este contexto de facultad racional/volitiva.
- source_word: αἰχμαλωτίζοντά με
  english_pob_choice: taking me captive
  chosen_spanish: me llevaba cautivo
  alternatives_spanish:
  - me capturaba
  - me hacía prisionero
  lexicon: BDAG
  rationale: El participio presenta una acción de sujeción continua; «me llevaba cautivo» mantiene el efecto de dominio y encaja con el gerundio/participio narrativo español.
- source_word: ἐν τῷ νόμῳ τῆς ἁμαρτίας
  english_pob_choice: to the law of sin
  chosen_spanish: a la ley del pecado
  alternatives_spanish:
  - bajo la ley del pecado
  - en la ley del pecado
  lexicon: BDAG
  rationale: 'Aunque ἐν es literal «en», en español la relación de sometimiento se expresa con naturalidad como destino/resultado del cautiverio: «a la ley del pecado».'
- source_word: ἁμαρτίας
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecaminosidad
  lexicon: BDAG
  rationale: «Pecado» es la forma clara y estándar para ἁμαρτία y conserva la referencia ética y teológica del pasaje.
theological_decisions:
- issue: Cómo rendir νόμος sin diluir la tensión del verso.
  english_pob_reading: Render all instances as "law" in the main text.
  chosen_spanish_reading: Traducir todas las ocurrencias como «ley».
  alternative_spanish_readings:
  - «principio»
  - «poder»
  rationale: La repetición de νόμος es deliberada y retóricamente densa; mantener «ley» preserva la tensión entre la ley de la mente y la ley del pecado, sin interpretarla prematuramente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Cómo expresar el cautiverio final con ἐν τῷ νόμῳ τῆς ἁμαρτίας.
  english_pob_reading: '"to the law of sin" expresses the sense of being brought into captivity under its power.'
  chosen_spanish_reading: «a la ley del pecado»
  alternative_spanish_readings:
  - «en la ley del pecado»
  - «bajo la ley del pecado»
  rationale: En español, el destino del cautiverio se expresa de manera natural con «a»; el sentido de sometimiento queda implícito por el verbo «me llevaba cautivo» y por el paralelo con «guerreaba contra».
  doctrine_reference: Sujeción real al dominio del pecado.
translation_notes:
  revision_awareness: Se mantuvo la lectura revisada del audit trail sin cambios sustanciales; la única adaptación necesaria fue hacer coincidir las notas con marcas realmente presentes en el texto español.
  spanish_consistency_notes:
  - Se conservó la repetición de «ley» para reflejar la repetición de νόμος.
  - Se mantuvo «miembros» para μέλη y «mente» para νοῦς, en línea con el uso paulino.
  - Se evitó «SEÑOR» o equivalentes no presentes en el versículo.
  - La formulación «me llevaba cautivo» preserva la metáfora bélica y de esclavitud del participio griego.
