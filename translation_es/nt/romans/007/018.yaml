revisions:
- from: Porque sé que en mí no habita nada bueno[a] —esto es, en mi carne. Porque el querer está presente en mí, pero el hacer el bien no.
  to: Porque sé que en mí, es decir, en mi carne,[a] no habita nada bueno. Porque el querer está a mi alcance, pero el hacer el bien, no.
