review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: conocimiento presente (οἶδα), inhabitación metafórica (οἰκεῖ), aclaración aposicional sobre «mi carne» (τοῦτ’ ἔστιν ἐν τῇ σαρκί μου), y el paralelismo entre τὸ θέλειν y τὸ κατεργάζεσθαι. Sin embargo, «está presente en mí» para παράκειταί μοι desplaza innecesariamente el matiz de proximidad/presencia ‘conmigo’ o ‘a mi alcance’ hacia interioridad, cuando el griego usa dativo μοι, no ἐν ἐμοί. Además, la puntuación del inciso puede mejorarse para mayor naturalidad y fidelidad.'
  spanish_quality_summary: 'El español es claro y generalmente digno, pero tiene dos asperezas: 1) la raya con espacio y punto final queda menos natural que una pausa parentética bien puntuada; 2) «está presente en mí» suena algo forzado en español y repite el campo semántico de «en mí»/«en mi carne», oscureciendo el contraste retórico. «Está a mi alcance» comunica mejor la idea en español moderno sin perder el valor abstracto del infinitivo sustantivado.'
  glossary_alignment: 'Alinea correctamente con la terminología del proyecto: σάρξ → «carne» con nota alternativa «naturaleza pecaminosa»; no hay conflictos con Yahvé/Mesías u otros términos por defecto. «El querer» y «el hacer» preservan bien el paralelismo formal. Se mantiene la nota léxica documentada para σάρξ.'
  issues:
  - severity: medium
    issue: Renderización de παράκειταί μοι como «está presente en mí»
    rationale: El griego expresa cercanía/disponibilidad con dativo personal μοι; «en mí» introduce una interioridad que no está en esta cláusula y puede confundirse con el anterior «en mí ... en mi carne». Una opción como «está a mi alcance» o «está conmigo» representa mejor el valor semántico y suena más natural en español.
  - severity: low
    issue: Puntuación del inciso explicativo
    rationale: '«—esto es, en mi carne.» resulta menos natural con punto dentro del inciso y espacio previo. En español bíblico claro, una coma o rayas bien cerradas mejora la legibilidad: «..., es decir, en mi carne,...» o «—es decir, en mi carne—».'
  revised_spanish_text: Porque sé que en mí, es decir, en mi carne,[a] no habita nada bueno. Porque el querer está a mi alcance, pero el hacer el bien, no.
  revised_footnotes:
  - marker: a
    text: O «naturaleza pecaminosa» para «carne».
    reason: lexical_alternative
  revision_rationale: Se conserva la fidelidad principal del borrador, pero se corrige παράκειταί μοι a una expresión española más natural y más cercana al valor de proximidad/disponibilidad del griego. También se mejora la puntuación del inciso aclaratorio sin cambiar el contenido, y se mantiene la nota léxica sobre «carne» anclada en el término correspondiente.
