translation:
  language: es
  text: Porque sé que en mí, es decir, en mi carne,[a] no habita nada bueno. Porque el querer está a mi alcance, pero el hacer el bien, no.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «naturaleza pecaminosa» para «carne».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - yo sé
  - conozco
  lexicon: BDAG
  rationale: El perfecto con sentido presente en griego se expresa de manera natural en español con «sé», conservando el valor de conocimiento cierto y actual.
- source_word: οἰκεῖ
  english_pob_choice: dwells
  chosen_spanish: habita
  alternatives_spanish:
  - vive
  - reside
  lexicon: BDAG
  rationale: «Habita» conserva la imagen de permanencia interior y la metáfora de inhabitación mejor que «vive»; «reside» suena más técnico y menos natural.
- source_word: ἀγαθόν
  english_pob_choice: nothing good
  chosen_spanish: nada bueno
  alternatives_spanish:
  - ningún bien
  - lo bueno
  lexicon: BDAG
  rationale: En español, la negación con «nada bueno» refleja de modo idiomático el neutro sustantivado negado por οὐκ, sin perder la fuerza de la afirmación absoluta.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza pecaminosa
  - naturaleza humana
  lexicon: BDAG
  rationale: Se mantiene «carne» para preservar la formulación paulina y la tensión teológica documentada, en vez de resolverla interpretativamente con «naturaleza pecaminosa».
- source_word: θέλειν
  english_pob_choice: the willing
  chosen_spanish: el querer
  alternatives_spanish:
  - el deseo
  - querer
  lexicon: BDAG
  rationale: El infinitivo articular funciona como sustantivo; «el querer» reproduce bien esa abstracción y mantiene el paralelismo con «el hacer».
- source_word: παράκειταί μοι
  english_pob_choice: is present with me
  chosen_spanish: está presente en mí
  alternatives_spanish:
  - está a mi alcance
  - me está presente
  lexicon: BDAG
  rationale: La elección busca expresar la proximidad/disponibilidad del querer de forma idiomática en español. Aunque el inglés auditado usa «with me», en este contexto el dativo μοι puede comunicarse con «en mí» para mantener la coherencia con el contraste interior del versículo.
- source_word: κατεργάζεσθαι
  english_pob_choice: the doing
  chosen_spanish: el hacer
  alternatives_spanish:
  - el obrar
  - llevar a cabo
  lexicon: BDAG
  rationale: Como infinitivo sustantivado, «el hacer» preserva el paralelismo con «el querer» y evita añadir matices no obligados por el texto.
- source_word: τὸ καλόν
  english_pob_choice: the good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el bien moral
  lexicon: BDAG
  rationale: «El bien» es una sustantivación natural en español para τὸ καλόν y conserva la categoría moral sin volverla demasiado explicativa.
- source_word: οὔ
  english_pob_choice: is not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no está
  - no existe
  lexicon: BDAG
  rationale: La negación final es elíptica; en español queda bien como «no» al final de la cláusula, reproduciendo la concisión del griego.
theological_decisions:
- issue: Cómo traducir σάρξ sin resolver la tensión interpretativa
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - naturaleza humana
  rationale: Se conserva «carne» para no convertir la imagen paulina en una interpretación cerrada. Esto respeta la decisión auditada de mantener la tensión entre el yo y su condición carnal.
  doctrine_reference: 'Contested terms table: σάρξ → flesh (literal) / sinful nature (metaphorical)'
- issue: Relación entre «en mí» y la aclaración «en mi carne»
  english_pob_reading: nothing good dwells in me—that is, in my flesh
  chosen_spanish_reading: en mí ... esto es, en mi carne
  alternative_spanish_readings:
  - en mí ... es decir, en mi carne
  - en mí, o sea, en mi carne
  rationale: «Esto es» conserva la función explicativa de la apposición griega sin añadir interpretación. Mantener ambas expresiones permite oír la distinción paulina entre el yo y la esfera de la carne.
  doctrine_reference: 'Appositional clarification in Greek: τοῦτ’ ἔστιν ἐν τῇ σαρκί μου'
- issue: Valor del infinitivo articular en «el querer» y «el hacer»
  english_pob_reading: the willing ... the doing of the good
  chosen_spanish_reading: el querer ... el hacer el bien
  alternative_spanish_readings:
  - querer ... hacer el bien
  - el deseo ... el obrar el bien
  rationale: La sustantivación con artículo conserva el paralelismo formal del griego y el contraste entre disposición y ejecución, sin expandir el texto.
  doctrine_reference: 'Articular infinitive construction in Greek: τὸ θέλειν / τὸ κατεργάζεσθαι'
- issue: Posible traducción de τὸ καλόν
  english_pob_reading: the good
  chosen_spanish_reading: el bien
  alternative_spanish_readings:
  - lo bueno
  - el bien moral
  rationale: «El bien» es una opción estable en español para un bien moral concreto y mantiene la resonancia ética del pasaje; no se precisa más para no sobretraducir.
  doctrine_reference: Substantival adjective τὸ καλόν
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requirieron cambios adicionales. La formulación sigue de cerca el texto griego y el audit trail en inglés, preservando las decisiones clave sobre σάρξ, los infinitivos sustantivados y la apposición explicativa.'
  spanish_consistency_notes:
  - Se mantiene «carne» de manera consistente para σάρξ, conforme al criterio del POB en inglés.
  - Se usan sustantivaciones naturales («el querer», «el hacer») para reflejar los infinitivos articulares.
  - Se conserva la negación final breve («no») para respetar la concisión del griego.
  - La nota al pie marca la alternativa interpretativa documentada sin sustituir el texto principal.
