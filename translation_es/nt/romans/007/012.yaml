translation:
  language: es
  text: Así que, la ley es santa, y la orden es santa, justa y buena.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: La partícula introduce una conclusión inferida; «Así que» conserva esa fuerza lógica en un español natural y fluido.
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: «Ley» reproduce el término de forma directa y natural en español; en este contexto paulino puede referirse a la ley mosaica sin añadir una especificación que el griego no marca aquí.
- source_word: ἅγιος
  english_pob_choice: holy
  chosen_spanish: santa
  alternatives_spanish:
  - santo
  - consagrada
  lexicon: BDAG
  rationale: Con «ley» en femenino, «santa» conserva el valor de pureza/consecración que expresa ἅγιος y suena idiomático en español.
- source_word: ἐντολή
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - precepto
  lexicon: BDAG
  rationale: «Mandamiento» es la equivalencia más estable para ἐντολή y mantiene el matiz formal de una orden divina o normativa dentro de la ley.
- source_word: δικαία
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - recta
  - recta y justa
  lexicon: BDAG
  rationale: Aquí «justo» comunica bien el valor moral/legal de δικαία en español. Se evita «righteous» transliterado o una amplificación innecesaria.
- source_word: ἀγαθή
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - beneficioso
  - bondadoso
  lexicon: BDAG
  rationale: «Bueno» preserva la evaluación sencilla y completa de ἀγαθή sin interpretarla como «beneficioso», que sería más explicativo que el griego.
translation_notes:
  revision_awareness: El texto griego presenta una conclusión resumida con una estructura enfática leve (μὲν) pero sin una cláusula adversativa explícita; por eso la versión española mantiene la inferencia sin forzar contraste. La redacción coincide con la intención y el contenido del audit trail inglés, con ajuste natural de género para concordar con «ley» y una equivalencia semántica directa para «mandamiento» y los tres adjetivos.
  spanish_consistency_notes:
  - Se usa «ley» para νόμος y «mandamiento» para ἐντολή, manteniendo la distinción del griego.
  - «Santa» se eligió por concordancia con «ley» y para conservar el valor de ἅγιος.
  - «Justo» y «bueno» siguen la evaluación moral triple del texto sin añadir matices no presentes.
  - Se preserva el tono conclusivo de ὥστε con «Así que» y se omite un equivalente explícito de μὲν por fluidez en español.
