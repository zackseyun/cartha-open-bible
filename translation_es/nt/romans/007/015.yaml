translation:
  language: es
  text: Porque no entiendo[a] lo que hago; pues no practico lo que quiero, sino que hago precisamente eso que odio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sé» o «reconozco».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεργάζομαι
  english_pob_choice: am doing
  chosen_spanish: hago
  alternatives_spanish:
  - estoy haciendo
  - realizo
  - estoy obrando
  lexicon: BDAG
  rationale: En este contexto el verbo describe la conducta efectiva de Pablo. «Hago» es natural en español y mantiene el contraste con πράσσω y ποιῶ sin cargar el verso con una perífrasis innecesaria.
- source_word: γινώσκω
  english_pob_choice: understand
  chosen_spanish: entiendo
  alternatives_spanish:
  - sé
  - reconozco
  - comprendo
  lexicon: BDAG
  rationale: La fuerza no es mera información, sino falta de comprensión acerca de su propio obrar. «Entiendo» comunica bien esa tensión en español actual y mantiene la amplitud semántica del verbo.
- source_word: πράσσω
  english_pob_choice: practice
  chosen_spanish: practico
  alternatives_spanish:
  - hago
  - ejecuto
  - llevo a cabo
  lexicon: BDAG
  rationale: Se conserva una distinción moderada frente a ποιῶ. «Practico» sugiere conducta habitual o ejercitada, coherente con el valor contrastivo que el texto griego presenta entre los verbos.
- source_word: ποιῶ
  english_pob_choice: do
  chosen_spanish: hago
  alternatives_spanish:
  - realizo
  - ejecuto
  - llevo a cabo
  lexicon: BDAG
  rationale: Un verbo simple es lo más natural aquí. Traducirlo también como «hago» preserva una distinción leve respecto de πράσσω, sin forzar el español.
- source_word: θέλω
  english_pob_choice: want
  chosen_spanish: quiero
  alternatives_spanish:
  - deseo
  - quiero hacer
  - quiero ello
  lexicon: BDAG
  rationale: «Quiero» expresa con claridad la voluntad personal en español moderno y corresponde bien al sentido volitivo del verbo griego.
- source_word: μισῶ
  english_pob_choice: hate
  chosen_spanish: odio
  alternatives_spanish:
  - aborrezco
  - detesto
  lexicon: BDAG
  rationale: El verbo debe conservar su fuerza. «Odio» transmite adecuadamente la repulsión moral del hablante.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque / pues
  alternatives_spanish:
  - ya que
  - porque
  lexicon: BDAG
  rationale: El texto repite γάρ; en español, la combinación «Porque…; pues…» permite reflejar ese valor explicativo de manera fluida y relativamente formal. Se evita un calco rígido, pero se conserva la lógica causal/explicativa del verso.
- source_word: ἀλλά
  english_pob_choice: instead
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - en cambio
  lexicon: BDAG
  rationale: «Sino que» expresa de modo idiomático la oposición correctiva del griego después de una negación previa, y funciona mejor que un simple «pero» en esta estructura.
- source_word: ὃ ... τοῦτο
  english_pob_choice: what ... the very thing
  chosen_spanish: lo que ... lo que
  alternatives_spanish:
  - aquello que ... eso
  - la misma cosa que ... la misma cosa
  lexicon: Greek grammar
  rationale: La correlación es enfática, pero en español una repetición simple es más natural y fiel que una expansión interpretativa. No se añade «la misma cosa» porque podría sonar más explicativo que el griego.
translation_notes:
  revision_awareness: Se siguió el criterio del pasaje base de mantener un registro formal pero natural. La relación repetida de γάρ se reflejó en español con una explicación inicial y una segunda conexión causal más fluida, sin depender de una sola conjunción rígida. También se mantuvo la distinción verbal del griego entre πράσσω y ποιῶ con «practico» / «hago», mientras que el cierre enfático se dejó en una correlación simple y transparente.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantuvo «hago» para ambos verbos de acción finales, pero la distinción se sugirió con «practico» en la primera cláusula según el audit trail.
  - La puntuación con punto y coma ayuda a reflejar la estructura de dos explicaciones consecutivas sin introducir ambigüedad.
