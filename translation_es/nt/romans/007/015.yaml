- from: Porque no entiendo[a] lo que hago; pues no practico lo que quiero, sino que hago lo que odio.
  to: Porque no entiendo[a] lo que hago; pues no practico lo que quiero, sino que hago precisamente eso que odio.
  rationale: Se mantiene la estructura y la buena legibilidad del borrador, pero se corrige el cierre para reflejar mejor el énfasis correlativo del griego (ὃ ... τοῦτο) y se amplía/pule la nota léxica de γινώσκω para alinearla mejor con el expediente inglés. No requiere adjudicación adicional.
