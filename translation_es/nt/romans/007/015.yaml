review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: incomprensión de la propia conducta, contraste entre lo que se quiere y lo que se hace, y fuerza adecuada de «odio». También conserva de manera razonable la distinción entre πράσσω («practico») y ποιῶ/κατεργάζομαι («hago»). Sin embargo, omite el énfasis final de ὃ ... τοῦτο, que el POB inglés preserva con «the very thing», y la nota léxica de γινώσκω queda incompleta al reducir la alternativa a solo «reconozco» en vez de reflejar también «sé/conozco».'
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. «Porque ...; pues ...» funciona, pero el cierre «hago lo que odio» pierde un matiz enfático que puede expresarse idiomáticamente como «hago precisamente eso». Además, la nota actual necesita mejor redacción tipográfica y mayor fidelidad al abanico léxico documentado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones principales («entiendo», «practico», «quiero», «odio») son compatibles con el expediente inglés y con un español eclesial amplio. La mejora propuesta solo afina el énfasis correlativo y la nota léxica.
  issues:
  - severity: medium
    issue: Se pierde el énfasis de ὃ ... τοῦτο en la última cláusula.
    rationale: El griego marca correlación enfática («lo que ... eso»), y el POB inglés la explicitó con «the very thing». «Hago lo que odio» transmite el contenido, pero no ese relieve. «Hago precisamente eso» conserva mejor la fuerza sin sonar forzado.
  - severity: low
    issue: La nota al pie para γινώσκω es demasiado estrecha y está formulada de manera poco pulida.
    rationale: El expediente inglés conserva «know/recognize» como alternativas; en español conviene reflejar al menos «sé» y/o «reconozco», no solo una opción. Además, la redacción debe ir sin comillas innecesarias de apertura inglesa.
  revised_spanish_text: Porque no entiendo[a] lo que hago; pues no practico lo que quiero, sino que hago precisamente eso que odio.
  revised_footnotes:
  - marker: a
    text: 'O: «sé» o «reconozco».'
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura y la buena legibilidad del borrador, pero se corrige el cierre para reflejar mejor el énfasis correlativo del griego (ὃ ... τοῦτο) y se amplía/pule la nota léxica de γινώσκω para alinearla mejor con el expediente inglés. No requiere adjudicación adicional.
