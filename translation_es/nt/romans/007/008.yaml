translation:
  language: es
  text: Pero el pecado, tomando ocasión[a] por medio del mandamiento, produjo en mí toda clase de codicia[b]. Porque, aparte de la ley, el pecado está muerto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aprovechando una ocasión».
    reason: lexical_alternative
  - marker: b
    text: O «todo deseo»; en este contexto, el sentido es específicamente la codicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφορμήν
  english_pob_choice: opportunity
  chosen_spanish: ocasión
  alternatives_spanish:
  - oportunidad
  - base de operaciones
  lexicon: BDAG
  rationale: «Ocasión» reproduce bien la idea de un punto de apoyo o ventaja aprovechada por el pecado, y mantiene la imagen sin volverla demasiado interpretativa.
- source_word: λαβοῦσα
  english_pob_choice: seizing
  chosen_spanish: tomando
  alternatives_spanish:
  - aprovechando
  - apoderándose de
  lexicon: BDAG
  rationale: El participio expresa una acción anterior y oportunista; «tomando» es natural en español y conserva la relación con «ocasión» sin añadir un matiz más fuerte que el griego exige.
- source_word: ἡ ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - el pecado personificado
  - el pecado
  lexicon: BDAG
  rationale: Se conserva la personificación paulina con el sujeto gramatical «el pecado», que en español permite leerlo como agente sin explicarlo de más.
- source_word: διὰ τῆς ἐντολῆς
  english_pob_choice: through the commandment
  chosen_spanish: por medio del mandamiento
  alternatives_spanish:
  - a través del mandamiento
  - por el mandamiento
  lexicon: BDAG
  rationale: «Por medio de» comunica con claridad el instrumento o medio que el pecado explota; «mandamiento» retiene el singular concreto del contexto inmediato.
- source_word: κατειργάσατο
  english_pob_choice: produced
  chosen_spanish: produjo
  alternatives_spanish:
  - obró
  - causó
  - llevó a cabo
  lexicon: BDAG
  rationale: El verbo indica efectuar un resultado; «produjo» es directo y suficientemente fuerte para conservar la fuerza causal del texto.
- source_word: πᾶσαν ἐπιθυμίαν
  english_pob_choice: every kind of coveting
  chosen_spanish: toda clase de codicia
  alternatives_spanish:
  - toda clase de deseo
  - todo deseo
  - toda codicia
  lexicon: BDAG
  rationale: En este contexto el trasfondo inmediato es el mandamiento contra codiciar; «codicia» expresa mejor ese sentido específico que un «deseo» genérico. «Toda clase de» refleja idiomáticamente πᾶσαν.
- source_word: χωρὶς γὰρ νόμου
  english_pob_choice: For apart from the law
  chosen_spanish: Porque, aparte de la ley
  alternatives_spanish:
  - Porque, sin la ley
  - Pues, aparte de la ley
  - Porque, fuera de la ley
  lexicon: BDAG
  rationale: «Aparte de la ley» es una forma española natural para χωρὶς νόμου y preserva la explicación causal de γάρ.
- source_word: ἁμαρτία νεκρά
  english_pob_choice: sin is dead
  chosen_spanish: el pecado está muerto
  alternatives_spanish:
  - el pecado es muerto
  - el pecado está inerte
  lexicon: BDAG
  rationale: Se mantiene la metáfora fuerte de «muerto» sin suavizarla a «inerte»; en español, «está muerto» comunica bien el predicado con valor figurado.
theological_decisions:
- issue: Mantener la personificación del pecado y la metáfora de «muerto» sin interpretarla como mera inactividad
  english_pob_reading: Retain the personification (“sin, seizing… produced… sin is dead”) and preserve “dead” as metaphorical language.
  chosen_spanish_reading: Conservar «el pecado» como sujeto agente y «está muerto» como metáfora sin explicar ni rebajar su fuerza.
  alternative_spanish_readings:
  - Interpretar el pecado de modo más abstracto
  - Poner «inactivo» en el texto principal
  rationale: El griego presenta el pecado como una fuerza actuante que aprovecha el mandamiento; el español puede conservar esa tensión de forma natural sin resolverla interpretativamente.
  doctrine_reference: Preservar la tensión teológica del texto en vez de resolverla.
translation_notes:
  revision_awareness: No se aplicaron revisiones en el último pase; el texto actual mantiene el acuerdo alto y no requiere cambios adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino, aunque en este versículo no ocurre.
  - Se usa «ley» para νόμος siguiendo el audit trail inglés y la formulación paulina del contexto.
  - Se conserva el contraste entre singular concreto («mandamiento») y singular genérico/teológico («ley») sin nivelarlos.
  - Se eligió «codicia» por el contexto inmediato del mandamiento contra codiciar, manteniendo la tensión lexical documentada entre «deseo» y «codicia».
