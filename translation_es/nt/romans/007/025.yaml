    rationale: 'El inglés POB conserva una nota léxica: Greek ''through Jesus Christ our Lord''; ''Messiah'' reflects Χριστός as a title here. En español conviene preservar esa información, especialmente porque ''Cristo'' es la forma más esperable para muchos lectores.'
