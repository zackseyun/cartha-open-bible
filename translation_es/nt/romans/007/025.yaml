  rationale: Se cambia 'Jesucristo' por 'Jesús Mesías' para ajustarse a la política del proyecto y a la decisión auditada del inglés respecto de Χριστός como título. Se reordenan y corrigen las notas para que cada marcador aparezca junto al elemento pertinente del texto y para preservar la alternativa léxica documentada sobre 'Cristo'. El resto del español se mantiene por ser fiel y natural.
