  - severity: medium
    issue: La nota [a] está anclada en un lugar incorrecto
    rationale: El marcador aparece tras 'nuestro Señor', pero la nota habla de la alternativa para 'la carne'. Esto incumple la disciplina de notas y puede confundir al lector.
  - severity: medium
