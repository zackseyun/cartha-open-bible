source:
  edition: SBLGNT
  text: ⸀χάρις τῷ θεῷ διὰ Ἰησοῦ Χριστοῦ τοῦ κυρίου ἡμῶν. Ἄρα οὖν αὐτὸς ἐγὼ τῷ μὲν νοῒ δουλεύω νόμῳ θεοῦ, τῇ δὲ σαρκὶ νόμῳ ἁμαρτίας.
base_translation:
  language: en
  yaml_path: translation/nt/romans/007/025.yaml
  text: Thanks be to God through Jesus Messiah our Lord! So then[a], I myself serve the law of God with my mind[c][b], but with my flesh the law of sin.
  footnotes:
  - marker: a
    text: Or "sinful nature" for "flesh."
    reason: lexical_alternative
  - marker: b
    text: Or "the principle of sin" for "the law of sin."
    reason: alternative_reading
  - marker: c
    text: 'Greek: "through Jesus Christ our Lord"; "Messiah" reflects Χριστός as a title here.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4
    prompt_id: nt_draft_v1
    prompt_sha256: ae815f01df3cdfa137bf983991938514a718eef03bfbd9f7e5a6a3afed5d7ad4
    timestamp: '2026-04-18T07:19:53Z'
    output_hash: 4a0ee56a2632ac9138371ad2a270b20228661494e4ddf57092238c94956c01eb
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:01:11Z'
    unchanged: false
    changes_summary: 'Changed ''Jesus the Messiah'' to ''Jesus Christ'' for consistency with the Greek proper name/title order and standard formal register; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: ¡Gracias a Dios por medio de Jesús Mesías[a], nuestro Señor! Así que yo mismo[b] sirvo con la mente a la ley de Dios, pero con la carne[c] a la ley del pecado[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «por medio de Jesucristo, nuestro Señor»; «Mesías» refleja Χριστός como título aquí.'
    reason: lexical_alternative
  - marker: b
    text: O «yo personalmente» para «yo mismo».
    reason: alternative_reading
  - marker: c
    text: O «la naturaleza pecaminosa» para «la carne».
    reason: lexical_alternative
  - marker: d
    text: O «el principio del pecado» para «la ley del pecado».
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  english_pob_choice: Thanks be
  chosen_spanish: ¡Gracias a Dios!
  alternatives_spanish:
  - ¡Demos gracias a Dios!
  - ¡Sea gracias a Dios!
  - ¡Gracia a Dios!
  lexicon: BDAG
  rationale: En esta exclamación con dativo a Dios, χάρις funciona idiomáticamente como acción de gracias, no como el sustantivo teológico 'gracia'. El español natural y reverente es '¡Gracias a Dios!', que conserva el valor exclamativo y doxológico.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: through Jesus Messiah
  chosen_spanish: por medio de Jesucristo
  alternatives_spanish:
  - por medio de Jesús Mesías
  - por medio de Jesús el Mesías
  - a través de Jesucristo
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación y se vierte bien como 'por medio de'. Para Χριστός aquí se prefiere 'Cristo' por consistencia con el registro formal y con la forma lexicalizada del nombre/título en español, manteniendo la referencia cristológica sin forzar 'Mesías' en un giro que en español suena menos natural.
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - el Señor nuestro
  - el Señor de nosotros
  lexicon: BDAG
  rationale: κύριος se traduce por 'Señor' como equivalente establecido. El posesivo natural en español es 'nuestro', que preserva la relación confesional del texto.
- source_word: Ἄρα οὖν
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  - Entonces
  lexicon: BDAG
  rationale: Los dos marcadores inferenciales introducen conclusión/resumen. 'Así que' suena natural en español y conserva la progresión argumentativa de manera directa.
- source_word: αὐτὸς ἐγώ
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo personalmente
  - yo mismo, por mi parte
  - yo
  lexicon: BDAG
  rationale: La combinación es enfática. 'Yo mismo' preserva el énfasis sobre la persona del hablante sin añadir interpretación.
- source_word: νοῒ
  english_pob_choice: mind
  chosen_spanish: la mente
  alternatives_spanish:
  - el entendimiento
  - la razón
  - el intelecto
  lexicon: BDAG
  rationale: νοῦς aquí alude a la facultad interior/racional en contraste con σάρξ. 'Mente' es el equivalente español más claro y mantiene el paralelismo con 'carne'.
- source_word: δουλεύω
  english_pob_choice: serve
  chosen_spanish: sirvo
  alternatives_spanish:
  - estoy esclavizado a
  - sirvo como esclavo a
  - estoy al servicio de
  lexicon: BDAG
  rationale: Aunque δουλεύω puede tener fuerza de esclavitud, en español 'sirvo' reproduce con naturalidad la estructura del verso y mantiene el sentido de sujeción sin endurecer innecesariamente el registro. La alternativa esclavizante queda implícita y disponible en nota si se requiere.
- source_word: νόμῳ θεοῦ
  english_pob_choice: the law of God
  chosen_spanish: la ley de Dios
  alternatives_spanish:
  - la ley de Dios
  lexicon: BDAG
  rationale: νόμος se conserva como 'ley' para reflejar la repetición paulina en Romanos 7 y el contraste con 'la ley del pecado'.
- source_word: σαρκὶ
  english_pob_choice: flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la naturaleza pecaminosa
  - la naturaleza humana
  - la carne pecaminosa
  lexicon: BDAG
  rationale: Se mantiene 'carne' para preservar el término paulino σάρξ y su tensión teológica. No se resuelve en 'naturaleza pecaminosa' en el texto principal porque eso explicita más de lo que el griego dice.
- source_word: νόμῳ ἁμαρτίας
  english_pob_choice: the law of sin
  chosen_spanish: la ley del pecado
  alternatives_spanish:
  - el principio del pecado
  - la ley del pecado
  lexicon: BDAG
  rationale: Se traduce νόμος por 'ley' para conservar el paralelismo con 'la ley de Dios'. 'El principio del pecado' sigue siendo una posibilidad interpretativa, pero la repetición de 'ley' refleja mejor el texto griego.
theological_decisions:
- issue: Renderizar σάρξ en un contexto paulino moralmente cargado
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - naturaleza humana
  rationale: El griego usa σάρξ, no un término explícito para 'naturaleza pecaminosa'. Traducir 'carne' preserva la tensión antropológica y teológica de Pablo sin cerrar la interpretación en la propia traducción.
  doctrine_reference: 'DOCTRINE.md: σάρξ—conservar el término y la tensión teológica'
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado más reciente del audit trail: se mantiene Χριστός en sentido cristológico con una forma española establecida, y se conserva la tensión de σάρξ frente a una paráfrasis doctrinal. También se respeta la estructura inferencial doble de Ἄρα οὖν y el énfasis de αὐτὸς ἐγώ. No se adopta la sustitución por ''Mesías'' en el cuerpo principal, porque el historial muestra una oscilación editorial y el valor más natural y estable en español eclesial para este contexto es ''Cristo''.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' / 'Señor' / 'Cristo' como términos confesionales estables en español, con 'Jesucristo, nuestro Señor' siguiendo el orden más natural en español.
  - '''carne'' se conserva de forma consistente para σάρξ, sin expandirlo a ''naturaleza pecaminosa'' en el texto principal.'
  - '''ley'' se usa para νόμος en ambos miembros paralelos para preservar el contraste retórico del verso.'
  - El tono es formal, bíblico y legible en español latinoamericano, evitando arcaísmos innecesarios.
