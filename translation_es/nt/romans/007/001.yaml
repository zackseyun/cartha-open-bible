revisions:
- from: ¿O no sabéis[a], hermanos —pues hablo a los que conocen la ley—, que la ley tiene autoridad[b] sobre el hombre[c] mientras vive?
  to: ¿O no sabéis[a], hermanos—pues hablo a los que conocen la ley— que la ley tiene autoridad sobre una persona mientras vive?
  rationale: Se cambia 'el hombre' por 'una persona' para reflejar con más fidelidad y claridad el valor genérico de ἄνθρωπος en español actual, en línea con el expediente auditado. Se elimina la nota [b] por redundante y la [c] porque ya no hace falta explicar una opción menos natural. Se pule la puntuación del inciso sin alterar el sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:12:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: mantiene la transición retórica inicial, el vocativo ''hermanos'', el inciso explicativo sobre quienes conocen la ley, y la afirmación principal sobre la autoridad de la ley mientras una persona vive. Sin embargo, introduce dos problemas: añade una nota léxica redundante en [b] que repite exactamente el texto principal, y usa ''el hombre'' para ἄνθρωπος, aunque el expediente inglés documenta con razón el valor genérico ''a person''. En español actual y neutral, ''una persona'' preserva mejor el sentido genérico sin ambigüedad masculina.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero ''el hombre'' suena menos natural y más potencialmente excluyente en registro contemporáneo de amplia lectura eclesial. También conviene ajustar la puntuación de rayas para mayor fluidez: ''hermanos—pues...'' funciona mejor sin coma posterior al inciso. El resto del verso es legible y fiel.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. ''Hermanos'' está bien con nota inclusiva. ''La ley'' está bien. ''Tiene autoridad sobre'' es aceptable para κυριεύει. La excepción necesaria es ἄνθρωπος: aquí debe preferirse ''una persona'' en vez de ''el hombre'' para alinearse con la decisión auditada y con el español neutral actual.'
  issues:
  - severity: medium
    issue: τοῦ ἀνθρώπου se tradujo como 'el hombre'
    rationale: El griego usa ἄνθρωπος en sentido genérico. Aunque 'el hombre' puede ser genérico en español, hoy resulta menos claro y menos natural para lectura amplia. 'Una persona' refleja mejor el sentido representativo sin masculinizarlо innecesariamente.
  - severity: low
    issue: La nota [b] no aporta una alternativa real
    rationale: Dice 'O «tiene autoridad sobre»', que repite exactamente la redacción principal. Debe eliminarse en vez de conservar una nota vacía.
  - severity: low
    issue: Puntuación mejorable alrededor del inciso parentético
    rationale: La coma después de la raya de cierre no es necesaria; una secuencia con rayas emparenta mejor el inciso y mejora la naturalidad tipográfica del español bíblico moderno.
  revised_spanish_text: ¿O no sabéis[a], hermanos—pues hablo a los que conocen la ley— que la ley tiene autoridad sobre una persona mientras vive?
  revised_footnotes:
  - marker: a
    text: «Hermanos» traduce el plural masculino adelphoi; en este contexto probablemente incluye también a las mujeres entre los oyentes de Pablo.
    reason: cultural_note
  revision_rationale: Se cambia 'el hombre' por 'una persona' para reflejar con más fidelidad y claridad el valor genérico de ἄνθρωπος en español actual, en línea con el expediente auditado. Se elimina la nota [b] por redundante y la [c] porque ya no hace falta explicar una opción menos natural. Se pule la puntuación del inciso sin alterar el sentido.
