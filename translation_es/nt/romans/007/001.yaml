translation:
  language: es
  text: ¿O no sabéis[a], hermanos—pues hablo a los que conocen la ley— que la ley tiene autoridad sobre una persona mientras vive?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» traduce el plural masculino adelphoi; en este contexto probablemente incluye también a las mujeres entre los oyentes de Pablo.
    reason: cultural_note
lexical_decisions:
- source_word: Ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿O es que
  - ¿O acaso
  lexicon: BDAG
  rationale: Conserva la transición argumentativa de Pablo en forma de pregunta retórica natural en español, sin suavizarla en un mero conector discursivo.
- source_word: ἀγνοεῖτε
  english_pob_choice: do you not know
  chosen_spanish: sabéis
  alternatives_spanish:
  - no sabéis
  - ignoráis
  - no os dais cuenta
  lexicon: BDAG
  rationale: La pregunta retórica en español queda más natural como una apelación al conocimiento compartido; el negativo implícito de la construcción interrogativa se mantiene en el tono.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanas y hermanos
  - hermanos/as
  lexicon: BDAG
  rationale: Se conserva el masculino plural del vocativo como forma del original, y en español sigue siendo idiomático y eclesialmente claro para una audiencia mixta.
- source_word: γινώσκουσιν γὰρ νόμον λαλῶ
  english_pob_choice: for I am speaking to those who know the law
  chosen_spanish: pues hablo a los que conocen la ley
  alternatives_spanish:
  - porque hablo a quienes conocen la ley
  - pues hablo a los que saben de la ley
  lexicon: BDAG
  rationale: El participio con γάρ funciona como inciso explicativo; en español, 'pues' reproduce bien esa aclaración parentética. 'Conocen la ley' refleja el matiz de γινώσκω sin sobreinterpretarlo.
- source_word: νόμος / ὁ νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - ley
  - la Ley
  lexicon: BDAG
  rationale: Se mantiene la referencia general a 'la ley' sin especificar indebidamente su alcance, conservando la tensión interpretativa presente en el griego y el contexto paulino.
- source_word: κυριεύει
  english_pob_choice: has authority over
  chosen_spanish: tiene autoridad sobre
  alternatives_spanish:
  - domina sobre
  - señorea sobre
  - rige sobre
  lexicon: BDAG
  rationale: '''Tiene autoridad sobre'' reproduce con claridad el valor de dominio/autoridad de κυριεύω en un registro formal, evitando una traducción demasiado fuerte como ''domina'' o demasiado coloquial.'
- source_word: τοῦ ἀνθρώπου
  english_pob_choice: a person
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - un ser humano
  - la persona humana
  lexicon: BDAG
  rationale: Aunque el inglés POB optó por 'a person' para el valor genérico de ἄνθρωπος, en español el singular genérico 'el hombre' mantiene la forma representativa del griego y suena más cercano al paralelismo jurídico del versículo.
- source_word: ἐφ’ ὅσον χρόνον ζῇ
  english_pob_choice: for as long as he lives
  chosen_spanish: mientras vive
  alternatives_spanish:
  - durante todo el tiempo que vive
  - mientras esté vivo
  - por todo el tiempo que vive
  lexicon: BDAG
  rationale: La locución temporal se expresa de forma idiomática y concisa en español con 'mientras vive', que preserva el alcance temporal total sin redundancia.
theological_decisions:
- issue: Alcance de 'la ley' (νόμος)
  english_pob_reading: Rendered simply as 'the law' without narrowing it in translation.
  chosen_spanish_reading: Se traduce simplemente como 'la ley' sin restringirla a una sola referencia.
  alternative_spanish_readings:
  - la ley mosaica
  - la ley en sentido general
  rationale: El griego no determina de manera explícita el alcance completo en este versículo. Dado que el argumento inmediato de Pablo tiene a la ley mosaica en vista, pero la formulación es más amplia, la traducción debe conservar esa amplitud y no resolver la cuestión por anticipado.
  doctrine_reference: Preservar la tensión teológica sin cerrarla por traducción.
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del texto inglés, especialmente la preferencia por una expresión formal de κυριεύει como 'has authority over'. También conserva la decisión de no estrechar el alcance de νόμος.
  spanish_consistency_notes:
  - Se mantiene 'ley' para νόμος de forma consistente con el proyecto.
  - Se usa 'Jesús', 'Dios', etc., según norma del proyecto, aunque no aparezcan en este versículo.
  - El vocativo plural masculino se conserva sin neutralización en el texto principal, con nota explicativa sobre su posible inclusión mixta.
