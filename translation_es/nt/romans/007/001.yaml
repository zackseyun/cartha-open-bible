  text: Ἢ ἀγνοεῖτε, ἀδελφοί, γινώσκουσιν γὰρ νόμον λαλῶ, ὅτι ὁ νόμος κυριεύει τοῦ ἀνθρώπου ἐφ’ ὅσον χρόνον ζῇ;
base_translation:
  language: en
  yaml_path: translation/nt/romans/007/001.yaml
  text: Or do you not know[b][a], brothers—for I am speaking to those who know the law—that the law has authority over a person for as long as he lives?
  footnotes:
