translation:
  language: es
  text: '¿Qué diremos, entonces? ¿La ley es pecado? ¡De ningún modo! Al contrario, yo no habría conocido el pecado sino por medio de la ley. Porque yo no habría conocido el codiciar[a] si la ley no hubiera dicho: «No codiciarás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «deseo». En este contexto, la cita inmediata del mandamiento («No codiciarás») favorece el sentido más específico de «el codiciar».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί οὖν ἐροῦμεν
  english_pob_choice: What then shall we say?
  chosen_spanish: ¿Qué diremos, entonces?
  alternatives_spanish:
  - ¿Qué pues diremos?
  - ¿Qué vamos a decir, entonces?
  lexicon: No aplica (fórmula retórica paulina)
  rationale: Conserva la transición argumentativa retórica de Pablo en un español natural y solemne. 'Diremos' mantiene el tono de deliberación comunitaria y evita una paráfrasis más libre.
- source_word: ὁ νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: No aplica
  rationale: La equivalencia estándar en español para νόμος en el argumento paulino es 'ley'. Se mantiene el artículo definido porque el contexto remite a la ley mosaica como entidad conocida.
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - mal
  - culpa
  lexicon: No aplica
  rationale: '''Pecado'' es el equivalente directo y más transparente en español para ἁμαρτία. Aquí funciona como sustantivo predicativo: la ley no se identifica con el pecado.'
- source_word: μὴ γένοιτο
  english_pob_choice: May it never be!
  chosen_spanish: ¡De ningún modo!
  alternatives_spanish:
  - ¡Jamás!
  - ¡En absoluto!
  lexicon: No aplica
  rationale: Reproduce la fuerte negación idiomática de Pablo con una fórmula idiomática viva en español. Evita sonar mecánica mientras conserva la repulsa enfática.
- source_word: ἀλλὰ
  english_pob_choice: On the contrary
  chosen_spanish: Al contrario
  alternatives_spanish:
  - Pero
  - Sino que
  lexicon: No aplica
  rationale: Marca el giro correctivo con claridad. 'Al contrario' preserva mejor la fuerza de contraste que un simple 'pero'.
- source_word: τὴν ἁμαρτίαν οὐκ ἔγνων εἰ μὴ διὰ νόμου
  english_pob_choice: I would not have known sin except through the law
  chosen_spanish: yo no habría conocido el pecado sino por medio de la ley
  alternatives_spanish:
  - yo no habría conocido el pecado excepto por la ley
  - yo no habría reconocido el pecado sino por la ley
  lexicon: No aplica
  rationale: Se conserva la estructura contrafactual del griego con un condicional perfecto en español. 'Por medio de' expresa διὰ con naturalidad y mantiene la mediación instrumental de la ley.
- source_word: ἐπιθυμίαν
  english_pob_choice: coveting
  chosen_spanish: la codicia
  alternatives_spanish:
  - el deseo
  - el codiciar
  lexicon: No aplica
  rationale: Se elige 'codicia' porque el mandato citado a continuación fija un sentido más específico que el simple 'deseo'. En español, 'codicia' comunica mejor la prohibición concreta de desear lo ajeno, aunque no reproduce la forma verbal del mandato.
- source_word: οὐκ ᾔδειν
  english_pob_choice: I would not have known
  chosen_spanish: yo no habría conocido
  alternatives_spanish:
  - yo no habría sabido
  - yo no habría entendido
  lexicon: No aplica
  rationale: Mantiene el paralelismo con el verbo anterior y expresa bien el valor contrafactual del imperfecto/pluscuamperfecto de conocimiento en la frase.
- source_word: ὁ νόμος ἔλεγεν
  english_pob_choice: the law had said
  chosen_spanish: la ley no hubiera dicho
  alternatives_spanish:
  - la ley no habría dicho
  - no hubiera dicho la ley
  lexicon: No aplica
  rationale: La forma española sigue la negación de la condición anterior y conserva el vínculo con la cita introductoria del mandamiento.
- source_word: Οὐκ ἐπιθυμήσεις
  english_pob_choice: You shall not covet
  chosen_spanish: No codiciarás
  alternatives_spanish:
  - No desearás
  - No tendrás codicia
  lexicon: No aplica
  rationale: '''Codiciarás'' reproduce con fidelidad la fuerza legal del mandamiento y enlaza con ἐπιθυμίαν. En español bíblico, esta formulación es clara y normativa.'
theological_decisions:
- issue: ¿La ley se identifica con el pecado o solo es pecaminosa?
  english_pob_reading: Is the law sin? May it never be!
  chosen_spanish_reading: ¿La ley es pecado? ¡De ningún modo!
  alternative_spanish_readings:
  - ¿La ley es pecaminosa?
  - ¿La ley es un mal?
  rationale: Se conserva la pregunta con predicado nominal, que en griego pregunta si la ley debe ser identificada con el pecado mismo. No se suaviza hacia una mera cualidad moral.
  doctrine_reference: Romanos 7:7; cf. la función reveladora de la ley en el argumento paulino
- issue: Relación entre la ley y el conocimiento del pecado/codicia
  english_pob_reading: I would not have known sin except through the law... I would not have known coveting if the law had not said, 'You shall not covet.'
  chosen_spanish_reading: 'yo no habría conocido el pecado sino por medio de la ley... yo no habría conocido la codicia si la ley no hubiera dicho: «No codiciarás».'
  alternative_spanish_readings:
  - yo no habría reconocido el pecado...
  - yo no habría sabido de la codicia...
  rationale: La ley aparece como medio de conocimiento, no como origen del pecado. La segunda cláusula conserva el enlace entre ἐπιθυμία y el mandamiento citado, razón por la cual se prefiere un término español específico y no el más general 'deseo'.
  doctrine_reference: Romanos 7:7; Éxodo 20:17 / Deuteronomio 5:21
- issue: ¿Cómo traducir la prohibición final en español?
  english_pob_reading: You shall not covet
  chosen_spanish_reading: No codiciarás
  alternative_spanish_readings:
  - No desearás
  - No tendrás codicia
  rationale: La forma imperativa-jurídica de la cita exige una equivalencia breve y normativa. 'No codiciarás' suena más directamente bíblico y refleja el mandato citado sin diluir su fuerza.
  doctrine_reference: Éxodo 20:17; Deuteronomio 5:21; Romanos 7:7
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el último pass auditado: no se reportan revisiones aplicadas y el control cruzado marca alta concordancia. La redacción española conserva la estructura argumentativa, la negación enfática y la ambigüedad controlada de ἐπιθυμίαν mediante una decisión lexical explícita.'
  spanish_consistency_notes:
  - Se mantiene 'ley' para νόμος en todo el versículo, conforme al uso paulino y para evitar alternancia innecesaria con 'Ley' mayúscula.
  - Se usa 'pecado' para ἁμαρτία y 'codicia' para ἐπιθυμίαν, distinguiendo el pecado en general de la forma específica evocada por el mandamiento citado.
  - Se conserva 'No codiciarás' como cita legal breve y reconocible, con registro bíblico claro en español.
  - La negación enfática '¡De ningún modo!' se ancla con nota para preservar la fuerza idiomática del griego sin volverla rígida.
