translation:
  language: es
  text: y yo morí, y el mandamiento que era para vida[a] resultó ser para muerte[b] para mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mandamiento que estaba destinado a vida».
    reason: lexical_alternative
  - marker: b
    text: O «este mismo mandamiento resultó en muerte para mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέθανον
  english_pob_choice: I died
  chosen_spanish: morí
  alternatives_spanish:
  - estuve muerto
  - llegué a morir
  lexicon: BDAG
  rationale: El aoristo activo de primera persona singular expresa un hecho pasado consumado; «morí» reproduce de forma natural y directa el evento, sin convertirlo en proceso ni añadir matices no presentes en el griego.
- source_word: εὑρέθη μοι
  english_pob_choice: proved to be ... to me
  chosen_spanish: resultó para mí
  alternatives_spanish:
  - se encontró para mí
  - se mostró como ... para mí
  lexicon: BDAG
  rationale: La pasiva con dativo personal μοι comunica el resultado experimentado por Pablo. «Resultó para mí» conserva la idea de descubrimiento de un efecto real, sin forzar una pasiva extraña en español.
- source_word: ἐντολή
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  - el precepto
  lexicon: BDAG
  rationale: «Mandamiento» es el equivalente paulino/legal más natural en español para ἐντολή y mantiene el singular del texto sin ampliar innecesariamente a «ley» o «mandamiento de la ley».
- source_word: ἡ εἰς ζωὴν
  english_pob_choice: that was for life
  chosen_spanish: que era para vida
  alternatives_spanish:
  - que llevaba a vida
  - que estaba destinada a vida
  lexicon: BDAG
  rationale: La construcción εἰς + ζωή expresa orientación o finalidad. «Para vida» conserva esa dirección con claridad; «era para vida» refleja el valor del adjetivo participial implícito en la cláusula.
- source_word: αὕτη
  english_pob_choice: this very commandment
  chosen_spanish: el mandamiento...
  alternatives_spanish:
  - este mismo mandamiento
  - ese mismo mandamiento
  lexicon: BDAG
  rationale: El demostrativo intensifica la ironía del contraste, pero en español puede quedar absorbido en la estructura sin necesidad de una frontización artificiosa. La repetición del sustantivo mantiene suficiente énfasis.
- source_word: εἰς θάνατον
  english_pob_choice: for death
  chosen_spanish: para muerte
  alternatives_spanish:
  - con resultado de muerte
  - que acabó en muerte
  lexicon: BDAG
  rationale: Se conserva el paralelismo con εἰς ζωήν mediante la misma preposición «para», manteniendo la tensión retórica vida/muerte sin explicitar causalidad más allá del griego.
theological_decisions:
- issue: Si suavizar la afirmación de que el mandamiento quedó vinculado con la muerte
  english_pob_reading: Retain the more neutral 'proved to be for death to me'
  chosen_spanish_reading: 'Mantener una formulación neutral: «resultó para mí en muerte»'
  alternative_spanish_readings:
  - me trajo muerte
  - me condujo a la muerte
  - resultó mortal para mí
  rationale: El versículo no explica de manera exhaustiva la causalidad, sino el desenlace experimentado por Pablo. «Resultó para mí en muerte» preserva esa tensión teológica sin resolverla ni intensificarla más de lo que permite el griego.
  doctrine_reference: Preservar la tensión entre mandamiento bueno y efecto de muerte sin sobreexplicar la mediación humana o la culpa del mandamiento.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se retuvieron la brevedad del aoristo, la relación experiencial de εὑρέθη μοι y el paralelismo entre «para vida» y «para muerte», evitando una paráfrasis que resolviera la tensión del versículo.'
  spanish_consistency_notes:
  - Se prefirió «mandamiento» para ἐντολή, coherente con el uso paulino y con la terminología POB.
  - Se usó «vida» y «muerte» sin expansión explicativa para conservar el contraste retórico del griego.
  - La colocación de las notas [a][b] sigue el lugar donde se concentra la alternativa semántica principal en la cláusula relativa.
