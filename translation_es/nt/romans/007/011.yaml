translation:
  language: es
  text: Porque el pecado, tomando una ocasión[a] por medio del mandamiento, me engañó y por medio de él[b] me mató.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tomando ocasión». El griego puede sugerir también «tomando un punto de apoyo».
    reason: lexical_alternative
  - marker: b
    text: «Él» se refiere al «mandamiento».
    reason: cross_reference
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: BDAG
  rationale: γὰρ introduce explicación o razón; «Porque» conserva esa conexión causal/explicativa de manera natural en español.
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - el pecado
  - el pecado personificado
  lexicon: BDAG
  rationale: En español, «pecado» conserva el sujeto nominal y la personificación paulina sin añadir glosa interpretativa. Se evita suavizar la fuerza activa del sujeto.
- source_word: ἀφορμὴν λαβοῦσα
  english_pob_choice: having taken an opportunity
  chosen_spanish: habiendo tomado una ocasión
  alternatives_spanish:
  - habiendo aprovechado una ocasión
  - habiendo tomado una oportunidad
  lexicon: BDAG
  rationale: La expresión señala que el pecado tomó/aprovechó un punto de apoyo u ocasión. «Habiendo tomado una ocasión» sigue de cerca el sentido básico y mantiene la agencia del sujeto; «oportunidad» es posible, pero «ocasión» refleja mejor la ambigüedad del griego entre ocasión, base o punto de apoyo.
- source_word: διὰ τῆς ἐντολῆς
  english_pob_choice: through the commandment
  chosen_spanish: por medio del mandamiento
  alternatives_spanish:
  - a través del mandamiento
  - mediante el mandamiento
  lexicon: BDAG
  rationale: διά con genitivo expresa instrumento o medio. «Por medio de» es claro en español y conserva la función instrumental de la preposición sin perder la referencia singular al «mandamiento».
- source_word: ἐξηπάτησέν
  english_pob_choice: deceived
  chosen_spanish: me engañó
  alternatives_spanish:
  - me decepcionó
  - me sedujo
  lexicon: BDAG
  rationale: «Engañó» es el equivalente directo y natural en español. Mantiene el verbo de engaño sin intensificar ni moralizar más allá del griego.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: El objeto personal directo se conserva explícito y sin adornos.
- source_word: δι’ αὐτῆς
  english_pob_choice: through it
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por medio de ella
  - a través de él
  - a través de ella
  lexicon: BDAG
  rationale: El pronombre femenino singular se refiere a «mandamiento» (ἐντολή). En español, «mandamiento» es masculino, por lo que el referente se traduce naturalmente con «él» para evitar ambigüedad de género en la frase española, manteniendo el vínculo anafórico.
- source_word: ἀπέκτεινεν
  english_pob_choice: killed
  chosen_spanish: me mató
  alternatives_spanish:
  - me dio muerte
  - me dio muerte por medio de él
  lexicon: BDAG
  rationale: «Mató» es la forma más directa y natural en español moderno para el efecto letal del pecado. Conserva la contundencia del verbo sin introducir perífrasis que atenúen el impacto.
theological_decisions:
- issue: Grado de personificación del pecado
  english_pob_reading: Render sin as an active personal-like agent without adding interpretive wording beyond the Greek.
  chosen_spanish_reading: Traducir «el pecado» como sujeto activo que toma ocasión, engaña y mata, sin explicarlo ni despersonalizarlo.
  alternative_spanish_readings:
  - «el pecado» como fuerza impersonal
  - «la tendencia al pecado»
  rationale: Pablo presenta ἁμαρτία como sujeto de acciones encadenadas; la traducción mantiene esa tensión retórica y teológica. No se reemplaza por una explicación doctrinal que rebaje la personificación ni por una formulación moderna que no está en el texto.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «having taken an opportunity» como un giro más natural y estándar para ἀφορμὴν λαβοῦσα; en español se refleja con «habiendo tomado una ocasión», conservando el valor de ocasión/apoyo sin forzar una traducción mecánica. También se respetó la resolución anafórica de αὐτῆς hacia «el mandamiento», adaptando el género gramatical al español.
  spanish_consistency_notes:
  - Se usa «pecado» y no «pecado» suavizado como «naturaleza pecaminosa», para mantener la personificación paulina.
  - «Mandamiento» traduce ἐντολή de forma consistente con el singular del griego.
  - «Por medio de» preserva el valor instrumental de διά con genitivo.
  - La referencia pronominal de «él» evita confusión en español, aunque el antecedente griego sea femenino.
  - Se mantiene un registro digno y moderno, sin arcaísmos innecesarios.
