translation:
  language: es
  text: Yo antes estaba vivo aparte de la ley[a]; pero, cuando llegó el mandamiento, el pecado cobró vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pecado revivió».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔζων
  english_pob_choice: was ... alive
  chosen_spanish: vivía
  alternatives_spanish:
  - estaba vivo
  - era ... vivo
  - viví
  lexicon: BDAG
  rationale: En español, «vivía» expresa de manera natural el estado de estar con vida y conserva el contraste de vida/muerte que el contexto desarrolla; «estaba vivo» sería más explícito pero menos fluido, y «viví» sonaría demasiado absoluto o narrativo sin el matiz de estado.
- source_word: χωρὶς νόμου
  english_pob_choice: apart from the law
  chosen_spanish: aparte de la ley
  alternatives_spanish:
  - sin la ley
  - aparte de la ley mosaica
  lexicon: BDAG
  rationale: «Aparte de» conserva la fuerza separativa de χωρίς. «La ley» comunica de forma natural la referencia paulina a la ley mosaica sin añadir precisión interpretativa que el griego no explicita aquí.
- source_word: ποτέ
  english_pob_choice: once
  chosen_spanish: una vez
  alternatives_spanish:
  - antes
  - en otro tiempo
  - alguna vez
  lexicon: BDAG
  rationale: «Una vez» funciona bien en español para un recuerdo temporal puntual. Mantiene la concisión de ποτέ sin forzar un sentido más interpretativo como «antes» o «en otro tiempo».
- source_word: ἐλθούσης ... τῆς ἐντολῆς
  english_pob_choice: when the commandment came
  chosen_spanish: cuando llegó el mandamiento
  alternatives_spanish:
  - cuando vino el mandamiento
  - con la llegada del mandamiento
  lexicon: BDAG
  rationale: Se reestructura la construcción absoluta griega en una cláusula temporal natural en español, preservando el carácter de acontecimiento. «Llegó» mantiene la imagen de llegada con buena inteligibilidad.
- source_word: ἐντολῆς
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  - la orden
  lexicon: BDAG
  rationale: «Mandamiento» es el equivalente bíblico más establecido para ἐντολή en Pablo y conserva mejor la relación con «ley» en el contexto inmediato que «mandato» o «orden».
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - el pecado personificado
  - el pecado como poder
  lexicon: BDAG
  rationale: Se mantiene «el pecado» en singular como entidad personificada, coherente con Romanos 7. No se explicita «como poder» en el texto porque el griego tampoco lo formula así de manera abierta.
- source_word: ἀνέζησεν
  english_pob_choice: came to life
  chosen_spanish: cobró vida
  alternatives_spanish:
  - revivió
  - volvió a la vida
  - se animó
  lexicon: BDAG
  rationale: «Cobró vida» reproduce bien la metáfora de animación y suena natural en español contemporáneo. «Revivió» es posible, pero puede sugerir un retorno literal a una vida previa y perder claridad figurativa.
theological_decisions:
- issue: Alcance de la afirmación en primera persona
  english_pob_reading: Retained the simple first-person wording without interpretive expansion.
  chosen_spanish_reading: 'Se mantiene la primera persona simple: «Yo vivía...», sin aclarar si es autobiografía estricta, representación de Israel o voz humana general.'
  alternative_spanish_readings:
  - Yo una vez viví...
  - Israel vivía una vez...
  - La humanidad vivía una vez...
  rationale: El griego no resuelve el debate de alcance; por eso la traducción conserva la ambigüedad y evita imponer una interpretación doctrinal donde el texto no la explicita.
  doctrine_reference: Preservar la tensión teológica y la ambigüedad interpretativa.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó confirmado como estable y de alta concordancia, sin ajustes adicionales requeridos.
  spanish_consistency_notes:
  - Se usa «ley» para νόμος y «mandamiento» para ἐντολή, manteniendo la distinción conceptual del griego.
  - Se conserva el sujeto singular «el pecado» como entidad personificada.
  - No se añade artículo o explicación doctrinal que resuelva la cuestión interpretativa de la primera persona.
  - La puntuación refleja la pausa y el contraste del original con una coma fuerte y punto y coma implícito en la estructura española.
