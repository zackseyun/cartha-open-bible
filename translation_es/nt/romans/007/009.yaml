review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido general del griego: primera persona simple, separación de la ley, llegada del mandamiento y personificación del pecado. Sin embargo, la elección «vivía» para ἔζων debilita la decisión auditada del POB en inglés de preservar el contraste predicativo «was alive» frente a la muerte contextual; «estaba vivo» lo conserva con mayor fidelidad.'
  spanish_quality_summary: El español es claro y natural, pero «Yo vivía una vez» suena algo menos idiomático y menos preciso que «Yo antes estaba vivo» o «Yo una vez estaba vivo» en este contexto. El resto del verso fluye bien, y «cobró vida» es una buena solución para ἀνέζησεν.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «La ley», «mandamiento» y «pecado» están bien alineados. La nota alternativa «revivió» preserva adecuadamente la alternativa léxica documentada.
  issues:
  - severity: medium
    issue: ἔζων se tradujo como «vivía» en lugar de una forma predicativa como «estaba vivo».
    rationale: La auditoría inglesa justificó explícitamente «was ... alive» para mantener el contraste vida/muerte en el contexto. «Vivía» puede denotar simplemente existencia o modo de vida, y en español aquí atenúa esa fuerza semántica.
  - severity: low
    issue: La colocación de «una vez» después de «vivía» suena menos natural en español bíblico contemporáneo.
    rationale: Aunque no es incorrecto, «yo antes estaba vivo» o «yo una vez estaba vivo» suena más natural y comunica mejor el valor temporal de ποτέ sin rigidez.
  revised_spanish_text: Yo antes estaba vivo aparte de la ley[a]; pero, cuando llegó el mandamiento, el pecado cobró vida.
  revised_footnotes:
  - marker: a
    text: O «el pecado revivió».
