- from: Yo vivía una vez aparte de la ley[a]; pero, cuando llegó el mandamiento, el pecado cobró vida.
  to: Yo antes estaba vivo aparte de la ley[a]; pero, cuando llegó el mandamiento, el pecado cobró vida.
  rationale: Se ajusta ἔζων a «estaba vivo» para preservar el contraste contextual de vida y muerte conforme a la decisión léxica auditada del POB. También se cambia «una vez» por «antes» para un español más natural sin alterar el sentido temporal de ποτέ. Se conserva «aparte de la ley», «mandamiento» y «cobró vida», que representan bien el griego y mantienen buena legibilidad.
