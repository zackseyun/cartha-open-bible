revisions:
- from: Así que[a], hermanos míos, también ustedes fueron muertos[b] para[c] la ley por medio del cuerpo del Mesías[d], para que lleguen a pertenecer a otro, a aquel que fue resucitado de entre los muertos, a fin de que produzcamos fruto para Dios.
  to: Así que[a], hermanos míos, también ustedes fueron puestos a muerte[b] a[c] la ley por medio del cuerpo del Mesías[d], para que pertenezcan a otro[e], a aquel que fue resucitado de entre los muertos, a fin de que produzcamos fruto para Dios.
  rationale: Se ajusta «para la ley» a «a la ley» para seguir más de cerca el griego y la decisión del POB en inglés; se mejora la naturalidad y fidelidad del pasivo con «fueron puestos a muerte»; se simplifica «lleguen a pertenecer» a «pertenezcan» y se preserva la alternativa más literal en nota, manteniendo explícita la analogía matrimonial.
  reviewer_model: gpt-5.4
