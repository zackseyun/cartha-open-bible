translation:
  language: es
  text: Así que[a], hermanos míos, también ustedes fueron puestos a muerte[b] a[c] la ley por medio del cuerpo del Mesías[d], para que pertenezcan a otro[e], a aquel que fue resucitado de entre los muertos, a fin de que produzcamos fruto para Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas míos»; el griego usa un plural masculino que puede dirigirse a un grupo mixto.
    reason: lexical_alternative
  - marker: b
    text: O «fueron muertos»; el verbo griego está en pasivo aoristo, por lo que se conserva la idea de una acción recibida.
    reason: lexical_alternative
  - marker: c
    text: Literalmente «a la ley»; la construcción mantiene la imagen de haber muerto respecto del vínculo anterior con la ley.
    reason: lexical_alternative
  - marker: d
    text: Griego Χριστοῦ; se traduce «Mesías» porque aquí funciona como título, no solo como nombre propio.
    reason: lexical_alternative
  - marker: e
    text: Literalmente «para que lleguen a ser de otro»; la expresión continúa la analogía matrimonial del contexto anterior.
    reason: cultural_note
lexical_decisions:
- source_word: Ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De manera que
  lexicon: BDAG
  rationale: Expresa la fuerza inferencial/resultativa del conectivo griego y su transición discursiva sin sonar mecánico en español.
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: hermanos míos
  alternatives_spanish:
  - hermanos y hermanas míos
  - mis hermanos
  lexicon: BDAG
  rationale: Conserva la forma masculina plural del vocativo griego y el tono fraternal directo; la posible referencia inclusiva queda mejor tratada en nota.
- source_word: ἐθανατώθητε
  english_pob_choice: were put to death
  chosen_spanish: fueron muertos
  alternatives_spanish:
  - fueron puestos a muerte
  - murieron
  lexicon: BDAG
  rationale: Mantiene el pasivo aoristo y la imagen de una acción recibida, sin convertirlo en un intransitivo simple como 'murieron'.
- source_word: τῷ νόμῳ
  english_pob_choice: to the law
  chosen_spanish: para la ley
  alternatives_spanish:
  - a la ley
  - con respecto a la ley
  lexicon: BDAG
  rationale: En español, 'para la ley' comunica bien el valor relacional/final del dativo en esta imagen de muerte respecto a la antigua vinculación legal.
- source_word: διὰ τοῦ σώματος τοῦ Χριστοῦ
  english_pob_choice: through the body of the Messiah
  chosen_spanish: por medio del cuerpo del Mesías
  alternatives_spanish:
  - por el cuerpo del Mesías
  - por medio del cuerpo de Cristo
  lexicon: BDAG
  rationale: '''Por medio de'' refleja el valor instrumental de διά con genitivo; ''Mesías'' conserva la decisión titular del POB para Χριστός.'
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
  rationale: Sigue la política del proyecto para Χριστός como título, preservando su sentido ungido-mesiánico en español.
- source_word: εἰς τὸ γενέσθαι ὑμᾶς ἑτέρῳ
  english_pob_choice: so that you might belong to another
  chosen_spanish: para que lleguen a pertenecer a otro
  alternatives_spanish:
  - para que sean de otro
  - para que se unan a otro
  lexicon: BDAG
  rationale: '''Lleguen a pertenecer'' transmite en español la idea relacional de transferencia y pertenencia sin perder el matiz del infinitivo de propósito.'
- source_word: τῷ ἐκ νεκρῶν ἐγερθέντι
  english_pob_choice: to him who was raised from the dead
  chosen_spanish: a aquel que fue resucitado de entre los muertos
  alternatives_spanish:
  - al que fue levantado de entre los muertos
  - al resucitado de entre los muertos
  lexicon: BDAG
  rationale: La frase participa del antecedente cristológico; 'resucitado de entre los muertos' reproduce de forma natural el pasivo divino de ἐγείρω.
- source_word: ἵνα καρποφορήσωμεν
  english_pob_choice: in order that we might bear fruit
  chosen_spanish: a fin de que produzcamos fruto
  alternatives_spanish:
  - para que demos fruto
  - a fin de que demos fruto
  lexicon: BDAG
  rationale: '''Producir fruto'' conserva el verbo metafórico con español claro; el subjuntivo presente mantiene el propósito expresado por ἵνα.'
- source_word: τῷ θεῷ
  english_pob_choice: for God
  chosen_spanish: para Dios
  alternatives_spanish:
  - a Dios
  - para el Dios
  lexicon: BDAG
  rationale: El dativo se expresa naturalmente con finalidad/beneficio en español; 'para Dios' conserva la relación teleológica del fruto.
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La lectura del POB destaca el valor titular de Χριστός; en español, 'Mesías' conserva ese contenido teológico y evita volverlo mero nombre propio.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Imagen de transferencia relacional en εἰς τὸ γενέσθαι ὑμᾶς ἑτέρῳ
  english_pob_reading: so that you might belong to another
  chosen_spanish_reading: para que lleguen a pertenecer a otro
  alternative_spanish_readings:
  - para que sean de otro
  - para que se unan a otro
  rationale: La construcción sigue la analogía matrimonial del contexto y expresa la transferencia de vínculo sin explicitarla más allá de lo que el griego warrants.
  doctrine_reference: Romans 7 context / marriage analogy in the immediate discourse
translation_notes:
  revision_awareness: 'Concordé con el pasaje base del POB en su última revisión sin cambios: se mantiene la lectura óptima-equivalente, la elección titular de Mesías y la preservación del hilo argumental y de la metáfora relacional.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme a la política del proyecto.
  - Se conserva un español natural pero semánticamente cercano al griego, evitando un calco duro.
  - El cambio de persona en el cierre («produzcamos») refleja el griego inclusivo de ἵνα καρποφορήσωμεν sin suavizarlo.
  - Las notas preservan alternativas relevantes donde el español abre ambigüedades nuevas o donde el POB ya documentó una opción alternativa.
