review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: inferencia inicial, pasivo en ἐθανατώθητε, mediación por el cuerpo del Mesías, continuación de la analogía matrimonial, referencia al resucitado y propósito de dar fruto para Dios. Sin embargo, dos elecciones españolas debilitan la fidelidad precisa: «fueron muertos» suena poco natural y no es la mejor forma de conservar el pasivo; «para la ley» no representa bien τῷ νόμῳ en este contexto, donde «a la ley» preserva mejor la construcción y la imagen paulina.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «fueron muertos» es torpe en español bíblico actual y «para la ley» resulta extraña e interpretativa. «Lleguen a pertenecer» también añade un matiz aspectual no exigido por el griego; «pertenezcan» es más directo. El resto del verso es bien legible y mantiene un registro apropiado.
  glossary_alignment: Alineado con la política del proyecto en «Mesías» para Χριστοῦ y «Dios» para θεῷ. No hay conflicto con otros términos doctrinales clave. La revisión propuesta también mantiene la nota sobre la analogía matrimonial y simplifica notas donde el español no necesita justificar una opción menos fiel.
  issues:
  - severity: high
    issue: «para la ley» para τῷ νόμῳ
    rationale: El dativo con el verbo de muerte en este contexto se preserva mejor como «a la ley», como en el inglés POB «to the law». «Para la ley» introduce un matiz de finalidad poco natural y menos fiel a la imagen de haber muerto respecto del vínculo con la ley.
  - severity: medium
    issue: «fueron muertos» para ἐθανατώθητε
    rationale: Aunque intenta conservar el pasivo, en español suena duro y poco idiomático. «Fueron puestos a muerte» mantiene mejor la voz pasiva y la acción recibida sin sonar defectuoso.
  - severity: low
    issue: «lleguen a pertenecer» añade matiz aspectual
    rationale: El griego expresa propósito relacional, no necesariamente proceso o llegada gradual. «Para que pertenezcan a otro» comunica el sentido con más economía y fidelidad.
  - severity: low
    issue: Nota d usa «Greco Χριστοῦ»
    rationale: Debe decir «Griego Χριστοῦ» en español natural.
