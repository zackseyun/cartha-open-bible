  text: Ὥστε, ἀδελφοί μου, καὶ ὑμεῖς ἐθανατώθητε τῷ νόμῳ διὰ τοῦ σώματος τοῦ Χριστοῦ, εἰς τὸ γενέσθαι ὑμᾶς ἑτέρῳ, τῷ ἐκ νεκρῶν ἐγερθέντι ἵνα καρποφορήσωμεν τῷ θεῷ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/007/004.yaml
  text: So then[a], my brothers, you also were put to death to the law through the body of the Messiah[c][b], so that you might belong to another—to him who was raised from the dead—in order that we might bear fruit for God.
  footnotes:
  - marker: a
    text: Or 'my brothers and sisters'; Greek 'brothers' can address a mixed group.
    reason: lexical_alternative
  - marker: b
    text: 'Greek ''Christou''; rendered ''Messiah'' here because the title''s meaning is prominent. Alternative: ''Christ.'''
    reason: lexical_alternative
  - marker: c
    text: Literally 'so that you might become another's'; the wording continues the marriage analogy from the preceding context.
    reason: cultural_note
