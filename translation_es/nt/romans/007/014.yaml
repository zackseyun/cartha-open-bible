review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: «sabemos», «la ley», «espiritual», «vendido» y «bajo el pecado» siguen de cerca la forma y la compacta expresión paulina. Sin embargo, las notas al pie no preservan fielmente la auditoría inglesa: la nota [a] inglesa ofrece «of the flesh» como alternativa para σάρκινος/fleshly, no para πνευματικός; y falta la nota sobre la matización esclava de «sold under sin».'
  spanish_quality_summary: El español es claro y eclesialmente legible. «Carnal» es una opción natural y digna en este registro, aunque puede oírse más interpretativa en español contemporáneo; aun así, aquí funciona por la oposición con «espiritual». «Vendido bajo el pecado» es comprensible, pero necesita la nota de esclavitud/poder para preservar el razonamiento léxico del POB. También conviene eliminar la nota equivocada en «espiritual».
  glossary_alignment: 'Buena alineación con la terminología del proyecto en términos clave: νόμος → «la ley», πνευματικός → «espiritual», σάρκινος conservado con lenguaje de carne mediante «carnal», y ἁμαρτία → «pecado». La principal desviación no es terminológica sino de aparato: las notas están mal asignadas respecto de la documentación inglesa.'
  issues:
  - severity: high
    issue: La nota [a] está anclada a «espiritual» pero refleja una alternativa que no corresponde al inglés auditado.
    rationale: 'La nota inglesa para πνευματικός es «Or ''of the flesh.''»? No: en el registro dado, «Or ''of the flesh.''» claramente corresponde al contraste léxico alrededor de σάρκινος/fleshly, mientras que para πνευματικός las alternativas documentadas son «of the Spirit» o «spiritually characterized». En el borrador, «O «del Espíritu»» fue colocada como nota de «espiritual» sin apoyo en las notas inglesas preservadas.'
  - severity: high
    issue: Falta la nota sobre «sold as a slave under sin / under the power of sin».
    rationale: El inglés POB preserva explícitamente la fuerza esclava de πεπραμένος y la noción de subyugación mediante una nota; el español debe mantener esa información, idealmente anclada en «vendido bajo el pecado».
  - severity: medium
    issue: La distribución de marcadores de notas no sigue la evidencia auditada.
    rationale: Debe haber una nota en «carnal» para la alternativa «de la carne» y otra en «vendido bajo el pecado» para la lectura «vendido como esclavo… / bajo el poder del pecado». Mantener una nota en «espiritual» introduce ruido y desajusta el aparato.
  revised_spanish_text: Porque sabemos que la ley es espiritual, pero yo soy carnal[a], vendido bajo el pecado[b].
  revised_footnotes:
