translation:
  language: es
  text: Porque sabemos que la ley es espiritual, pero yo soy carnal[a], vendido bajo el pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la carne».
    reason: lexical_alternative
  - marker: b
    text: O «vendido como esclavo bajo el pecado», es decir, bajo el poder del pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - conocemos
  - sabemos bien
  lexicon: BDAG
  rationale: El verbo expresa conocimiento compartido y establecido; «sabemos» conserva la afirmación directa y natural del original sin añadir matiz explicativo.
- source_word: νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: «La ley» reproduce el sustantivo con claridad y mantiene la referencia inmediata del texto, sin forzar una mayúscula interpretativa.
- source_word: πνευματικός
  english_pob_choice: spiritual
  chosen_spanish: espiritual
  alternatives_spanish:
  - del Espíritu
  - espiritualmente caracterizada
  lexicon: BDAG
  rationale: «Espiritual» es el equivalente más directo y transparente; conserva la cualidad o esfera indicada por el griego y evita una paráfrasis más interpretiva.
- source_word: σάρκινός
  english_pob_choice: fleshly
  chosen_spanish: carnal
  alternatives_spanish:
  - de carne
  - de la carne
  - fleshy
  lexicon: BDAG
  rationale: El adjetivo griego derivado de σάρξ pide mantener la oposición con «espiritual». «Carnal» es un equivalente natural en español bíblico y conserva la relación léxica con «carne» sin introducir «naturaleza pecaminosa».
- source_word: πεπραμένος
  english_pob_choice: sold
  chosen_spanish: vendido
  alternatives_spanish:
  - vendido como esclavo
  - habiendo sido vendido
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante; «vendido» es breve y fiel. La connotación esclava se preserva en la nota, no en la paráfrasis principal.
- source_word: ὑπὸ τὴν ἁμαρτίαν
  english_pob_choice: under sin
  chosen_spanish: bajo el pecado
  alternatives_spanish:
  - bajo el poder del pecado
  - sometido al pecado
  lexicon: BDAG
  rationale: «Bajo el pecado» sigue de cerca la construcción griega y conserva la subordinación compacta que Pablo expresa, sin expandirla a una explicación más larga en el texto principal.
theological_decisions:
- issue: Cómo renderizar σάρκινος sin resolver la antropología paulina en una fórmula doctrinal posterior
  english_pob_reading: Retain 'fleshly' in the main text rather than 'sinful' or 'having a sinful nature.'
  chosen_spanish_reading: Conservar «carnal» en el texto principal, en vez de «pecaminoso» o «de naturaleza pecaminosa».
  alternative_spanish_readings:
  - pecaminoso
  - de naturaleza pecaminosa
  - no espiritual
  rationale: La guía de POB favorece el lenguaje de «carne» cuando el contexto lo permite. Aquí la oposición con «espiritual» queda intacta, y no se resuelve el término en una formulación doctrinal posterior que el griego no exige.
  doctrine_reference: σάρξ → carne (literal) / naturaleza pecaminosa (interpretativo)
translation_notes:
  revision_awareness: El registro inglés muestra alto acuerdo entre revisiones y ningún cambio aplicado; por eso la versión española sigue de cerca el trazado lexical ya validado, especialmente en πνευματικός, σάρκινος y πεπραμένος.
  spanish_consistency_notes:
  - Se mantiene «ley» y no «Ley» para conservar la forma léxica inmediata del enunciado.
  - Se evita «siervo» porque el griego no usa δοῦλος aquí; la esclavitud queda solo como matiz opcional en la nota.
  - «Bajo el pecado» preserva la brevedad de ὑπὸ τὴν ἁμαρτίαν y no añade una explicación causal en el texto principal.
  - El contraste entre «espiritual» y «carnal» reproduce la antítesis del griego con un español natural y publicable.
