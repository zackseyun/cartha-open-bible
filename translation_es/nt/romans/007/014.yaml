revisions:
- from: Porque sabemos que la ley es espiritual[a], pero yo soy carnal[b], vendido bajo el pecado.
  to: Porque sabemos que la ley es espiritual, pero yo soy carnal[a], vendido bajo el pecado[b].
  rationale: 'Se conserva el texto principal casi intacto porque es fiel y natural en español. La revisión corrige el aparato crítico para alinearlo con la auditoría inglesa y con las decisiones léxicas documentadas: se elimina la nota indebida de «espiritual», se mantiene la alternativa léxica de σάρκινος en «carnal», y se añade la nota necesaria para la fuerza de πεπραμένος/ὑπὸ τὴν ἁμαρτίαν.'
