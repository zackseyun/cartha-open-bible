translation:
  language: es
  text: Porque me deleito en la ley de Dios según el hombre interior[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi ser interior» o «mi yo interior».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήδομαι
  english_pob_choice: delight in
  chosen_spanish: me deleito en
  alternatives_spanish:
  - me complazco en
  - me regocijo en
  lexicon: BDAG
  rationale: El verbo expresa aprobación gozosa y agrado afectivo, no solo aceptación intelectual. «Me deleito en» comunica bien esa alegría interior en español y mantiene el matiz de disfrute personal.
- source_word: νόμῳ
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  - norma
  lexicon: BDAG
  rationale: En Romanos, νόμος tiene peso paulino estable como «ley»; esa forma preserva mejor la carga teológica y la continuidad con el contexto inmediato.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios mismo
  lexicon: BDAG
  rationale: El genitivo es directo y no requiere expansión. «De Dios» conserva la relación posesiva sin añadir interpretación.
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - conforme a
  - en relación con
  lexicon: BDAG
  rationale: Aquí κατά marca la esfera o norma conforme a la cual se da el deleite. «Según» suena natural en español y mantiene la relación de referencia sin volverla más explicativa de lo que el griego permite.
- source_word: τὸν ἔσω ἄνθρωπον
  english_pob_choice: the inner man
  chosen_spanish: el hombre interior
  alternatives_spanish:
  - el ser interior
  - el yo interior
  - la interioridad
  lexicon: BDAG
  rationale: La expresión paulina es metafórica y masculina en el griego. «Hombre interior» conserva la forma figurativa y el peso lexical del original; «interior» evita una paráfrasis psicológica excesiva. Se evita neutralizar el género de la imagen, siguiendo la cautela del texto fuente.
theological_decisions:
- issue: Matiz antropológico de «el hombre interior»
  english_pob_reading: Rendered as a recognizable Pauline expression without resolving broader doctrinal questions about human composition.
  chosen_spanish_reading: «el hombre interior» como imagen del yo interior, sin convertirla en una explicación doctrinal sobre la estructura de la persona.
  alternative_spanish_readings:
  - el ser interior
  - el yo interior
  rationale: La frase debe conservar su fuerza metafórica y no ser sustituida por una paráfrasis que cierre debates antropológicos que el versículo no desarrolla explícitamente.
  doctrine_reference: Antropología bíblica; preservar la tensión lexical y teológica sin sobreexplicarla.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «in my inner man» por «according to the inner man» para reflejar mejor κατὰ τὸν ἔσω ἄνθρωπον y evitar añadir «my», que no está explícito en el griego. La versión española sigue ese ajuste con «según el hombre interior», sin introducir un posesivo no atestiguado.
  spanish_consistency_notes:
  - Se mantiene «ley» para νόμος, coherente con el uso paulino y con la auditoría inglesa.
  - Se usa «Dios» para θεοῦ, sin mayúsculas devocionales añadidas ni sustituciones por «Señor».
  - «Hombre interior» preserva la metáfora y el género gramatical del original; la nota ofrece alternativas más idiomáticas pero no las sustituye en el texto principal.
  - «Según» reproduce con naturalidad la relación de κατά sin convertirla en una paráfrasis doctrinal.
