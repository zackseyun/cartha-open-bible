  text: Τὸ οὖν ἀγαθὸν ἐμοὶ ⸀ἐγένετο θάνατος; μὴ γένοιτο· ἀλλὰ ἡ ἁμαρτία, ἵνα φανῇ ἁμαρτία διὰ τοῦ ἀγαθοῦ μοι κατεργαζομένη θάνατον· ἵνα γένηται καθ’ ὑπερβολὴν ἁμαρτωλὸς ἡ ἁμαρτία διὰ τῆς ἐντολῆς.
base_translation:
  language: en
  yaml_path: translation/nt/romans/007/013.yaml
  text: So then[a], did what is good become death to me? May it never be! Rather, it was sin, so that it might be shown to be sin by producing death in me through what is good[b], in order that through the commandment sin might become exceedingly sinful.
  footnotes:
