translation:
  language: es
  text: Así pues, ¿lo que es bueno llegó a ser para mí muerte? ¡De ningún modo! Más bien, fue el pecado, produciendo muerte en mí por medio de lo bueno, para que se mostrara que es pecado[a], a fin de que, por medio del mandamiento, el pecado llegara a ser sumamente pecaminoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que el pecado apareciera como pecado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸ ... ἀγαθὸν
  english_pob_choice: what is good
  chosen_spanish: lo que es bueno
  alternatives_spanish:
  - el bien
  - la cosa buena
  lexicon: BDAG
  rationale: El neutro sustantivado pide una expresión abstracta en español. “Lo que es bueno” conserva el valor sustantivado sin convertirlo en una idea demasiado filosófica ni en un objeto concreto.
- source_word: ἐμοὶ
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Aquí el dativo expresa referencia personal dentro de la pregunta retórica; “para mí” suena natural en español y mantiene la orientación personal del enunciado.
- source_word: ἐγένετο θάνατος
  english_pob_choice: become death
  chosen_spanish: llegó a ser ... muerte
  alternatives_spanish:
  - se volvió muerte
  - resultó ser muerte
  lexicon: BDAG
  rationale: γίνομαι con predicado nominal conserva la idea de llegar a ser. En español, “llegó a ser muerte” mantiene la estructura sin explicitar más de lo que el griego dice.
- source_word: μὴ γένοιτο
  english_pob_choice: May it never be!
  chosen_spanish: ¡De ningún modo!
  alternatives_spanish:
  - ¡Jamás!
  - ¡En ninguna manera!
  lexicon: BDAG
  rationale: Es la negación enfática paulina. “¡De ningún modo!” es fuerte, idiomático y digno, sin sonar arcaico.
- source_word: ἡ ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - pecado
  lexicon: BDAG
  rationale: Se conserva el sustantivo abstracto/personificado “pecado”, que en español permite mantener tanto la culpa moral como la personificación retórica del pasaje.
- source_word: ἵνα φανῇ ἁμαρτία
  english_pob_choice: so that it might be shown to be sin
  chosen_spanish: para que ... se mostrara que es pecado
  alternatives_spanish:
  - para que apareciera como pecado
  - para que quedara de manifiesto como pecado
  lexicon: BDAG
  rationale: 'La repetición de ἁμαρτία tiene fuerza predicativa: el pecado queda revelado como tal. “Se mostrara que es pecado” conserva esa relación sin forzar una paráfrasis excesiva.'
- source_word: διὰ τοῦ ἀγαθοῦ
  english_pob_choice: through what is good
  chosen_spanish: por medio de lo bueno
  alternatives_spanish:
  - a través de lo bueno
  - mediante lo bueno
  lexicon: BDAG
  rationale: διά con genitivo expresa medio/instrumento. “Por medio de lo bueno” preserva el carácter instrumental y la correspondencia con el neutro sustantivado inicial.
- source_word: μοι κατεργαζομένη θάνατον
  english_pob_choice: by producing death in me
  chosen_spanish: produciendo muerte en mí
  alternatives_spanish:
  - obrando muerte en mí
  - causando muerte en mí
  lexicon: BDAG
  rationale: κατεργάζομαι aquí apunta a producir o efectuar un resultado. “Produciendo muerte en mí” mantiene el valor participial y la agencia del proceso sin suavizarlo.
- source_word: ἵνα γένηται
  english_pob_choice: in order that ... might become
  chosen_spanish: a fin de que ... llegara a ser
  alternatives_spanish:
  - para que ... fuera
  - con el fin de que ... llegara a ser
  lexicon: BDAG
  rationale: Se conserva la segunda cláusula final y el sentido de γίνομαι con un castellano fluido y formal.
- source_word: καθ’ ὑπερβολὴν
  english_pob_choice: exceedingly
  chosen_spanish: sumamente
  alternatives_spanish:
  - en extremo
  - excesivamente
  lexicon: BDAG
  rationale: La expresión adverbial intensifica al máximo. “Sumamente” comunica exceso e intensidad de manera natural en español.
- source_word: ἁμαρτωλὸς
  english_pob_choice: sinful
  chosen_spanish: pecaminoso
  alternatives_spanish:
  - muy pecador
  - sumamente malo
  lexicon: BDAG
  rationale: En este contexto, el adjetivo califica al pecado mismo. “Pecaminoso” conserva el enlace lexical con “pecado” y evita trasladarlo a una descripción de personas.
- source_word: διὰ τῆς ἐντολῆς
  english_pob_choice: through the commandment
  chosen_spanish: por medio del mandamiento
  alternatives_spanish:
  - mediante el mandamiento
  - a través del mandamiento
  lexicon: BDAG
  rationale: ἐντολή se traduce “mandamiento” para mantener el léxico paulino. El medio se expresa con “por medio de” para reproducir el valor de διά sin perder claridad.
theological_decisions:
- issue: La bondad de lo bueno/la ley frente al papel del pecado
  english_pob_reading: The verse denies that 'what is good' itself became death, and instead attributes the death-producing work to sin operating through the good commandment.
  chosen_spanish_reading: El versículo niega que lo bueno mismo se haya convertido en muerte para mí, y atribuye la obra que produce muerte al pecado, que actúa por medio de lo bueno y del mandamiento.
  alternative_spanish_readings:
  - Lo bueno me resultó muerte.
  - El mandamiento mismo se volvió muerte.
  rationale: 'La estructura adversativa debe quedar intacta: el problema no está en lo bueno ni en el mandamiento, sino en el pecado que obra a través de ellos. La redacción española conserva esa tensión sin resolverla ni atenuarla.'
  doctrine_reference: Preservar la tensión teológica del texto en lugar de armonizarla artificialmente.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios sustanciales; la presente redacción mantiene el acuerdo alto con el contexto inglés y conserva la estructura retórica de dos cláusulas finales, la negación enfática y la personificación del pecado.
  spanish_consistency_notes:
  - Se mantuvo “pecado” como sustantivo abstracto/personificado, en paralelo con el inglés POB.
  - Se tradujo ἐντολή como “mandamiento”, no como “ley”, porque el contexto inmediato enfatiza el precepto singular.
  - Se conservó “lo bueno” para reflejar el neutro sustantivado ἀγαθόν y su relación con la cláusula siguiente.
  - Se prefirió un castellano formal pero natural, evitando calco excesivo de la sintaxis griega.
