  rationale: Se ajustó únicamente la cláusula final de «no sea adúltera» a «no es adúltera» para expresar de forma más natural y exacta el resultado legal indicado por el infinitivo articular griego. Se mantienen las demás decisiones léxicas y las notas, que son fieles al expediente inglés y al contexto del original.
