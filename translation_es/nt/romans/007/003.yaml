review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura argumentativa del griego: conclusión inferencial, situación temporal mientras vive el marido, designación como adúltera al unirse/pertenecer a otro hombre, y libertad respecto de la ley tras la muerte del marido. Sin embargo, «de modo que no sea adúltera» no expresa con suficiente naturalidad ni precisión el valor resultativo de τοῦ μὴ εἶναι αὐτὴν μοιχαλίδα en este contexto; en español suena más a finalidad o subjuntivo dependiente. Conviene afirmar el resultado legal: «de modo que no es adúltera».'
  spanish_quality_summary: El texto es claro y legible, con registro adecuado. «Así pues», «será llamada adúltera» y «queda libre de la ley» funcionan bien. La principal mejora necesaria es suavizar y precisar la última cláusula para que suene natural en español jurídico-narrativo y preserve mejor la lógica del pasaje.
  glossary_alignment: No hay términos del glosario principal en conflicto. «La ley» respeta la decisión documentada sobre νόμος, con nota aclaratoria apropiada. «Adúltera» es exacto para μοιχαλίς. «Se une a otro hombre» es una opción defendible para ἀνδρὶ ἑτέρῳ, aunque la nota alternativa con «pertenece a otro hombre» ayuda a preservar el abanico léxico del POB inglés.
  issues:
  - severity: medium
    issue: La cláusula «de modo que no sea adúltera» usa subjuntivo donde el sentido es mejor como resultado afirmado.
    rationale: El griego τοῦ μὴ εἶναι αὐτὴν μοιχαλίδα expresa el resultado/consecuencia de quedar libre de la ley matrimonial. En español, «de modo que no es adúltera» o «de modo que ya no es adúltera» comunica mejor ese efecto jurídico. «No sea» suena menos natural y puede leerse como finalidad.
  revised_spanish_text: Así pues[a], mientras su marido vive, será llamada adúltera si se une a otro hombre. Pero si el marido muere, queda libre de la ley[b], de modo que no es adúltera si se une a otro hombre.
  revised_footnotes:
