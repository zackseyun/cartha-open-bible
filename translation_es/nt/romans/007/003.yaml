    unchanged: false
    changes_summary: Revised 'becomes another man’s wife' to 'belongs to another man' to more directly reflect γένηται/γενομένην ἀνδρὶ ἑτέρῳ without over-specifying 'wife.' Kept the rest unchanged.
translation:
  language: es
  text: Así pues[a], mientras su marido vive, será llamada adúltera si se une a otro hombre. Pero si el marido muere, queda libre de la ley[b], de modo que no es adúltera si se une a otro hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si pertenece a otro hombre» o «si se une a otro hombre».'
    reason: alternative_reading
  - marker: b
    text: Aquí «la ley» se refiere de inmediato al vínculo legal que gobierna la relación matrimonial.
    reason: cultural_note
lexical_decisions:
- source_word: ἄρα οὖν
  english_pob_choice: So then
  chosen_spanish: Así pues
  alternatives_spanish:
  - Por tanto
  - De manera que
  lexicon: —
  rationale: La doble partícula inferencial introduce una conclusión. «Así pues» conserva la fuerza conclusiva en español natural y digno, sin volverlo excesivamente técnico.
- source_word: ζῶντος τοῦ ἀνδρός
  english_pob_choice: while her husband is living
  chosen_spanish: mientras su marido vive
  alternatives_spanish:
  - mientras vive su marido
  - mientras su esposo vive
  lexicon: —
  rationale: El genitivo absoluto expresa circunstancia temporal. «Mientras su marido vive» reproduce el valor temporal con fluidez; «su» se sobreentiende por el contexto de la mujer casada.
- source_word: μοιχαλὶς
  english_pob_choice: adulteress
  chosen_spanish: adúltera
  alternatives_spanish:
  - mujer adúltera
  lexicon: BDAG
  rationale: El término designa específicamente a una mujer culpable de adulterio. «Adúltera» es la equivalencia directa y precisa en español.
- source_word: χρηματίσει
  english_pob_choice: will be called
  chosen_spanish: será llamada
  alternatives_spanish:
  - será considerada
  - será declarada
  lexicon: BDAG
  rationale: El verbo comunica la idea de ser llamada o designada como tal. «Será llamada» preserva el sentido y la forma pasiva de manera natural.
- source_word: ἐὰν γένηται ἀνδρὶ ἑτέρῳ
  english_pob_choice: if she belongs to another man
  chosen_spanish: si se une a otro hombre
  alternatives_spanish:
  - si pertenece a otro hombre
  - si queda unida a otro hombre
  - si se relaciona con otro hombre
  lexicon: BDAG
  rationale: La construcción con γίνομαι y dativo señala entrar en una relación con otro hombre en el marco matrimonial. «Se une a otro hombre» comunica esa relación sin sobreespecificar «esposa», como en la revisión inglesa más reciente.
- source_word: ἐλευθέρα ἐστὶν ἀπὸ τοῦ νόμου
  english_pob_choice: she is free from the law
  chosen_spanish: queda libre de la ley
  alternatives_spanish:
  - es libre de la ley
  - queda desligada de la ley
  - está libre de la ley
  lexicon: BDAG
  rationale: «Libre» expresa la falta de obligación o vínculo. «Queda libre» capta bien el resultado de la muerte del marido y mantiene el paralelismo legal del contexto.
- source_word: τοῦ νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la ley matrimonial
  - la norma
  - el vínculo legal
  lexicon: BDAG
  rationale: Se conserva la expresión simple «la ley» para respetar la redacción de Pablo; el contexto inmediato aclara que se trata del vínculo legal del matrimonio.
- source_word: τοῦ μὴ εἶναι αὐτὴν μοιχαλίδα
  english_pob_choice: so that she is not an adulteress
  chosen_spanish: de modo que no sea adúltera
  alternatives_spanish:
  - para que no sea adúltera
  - así que no es adúltera
  - con el resultado de que no sea adúltera
  lexicon: —
  rationale: El infinitivo articular expresa resultado o finalidad consecuente. «De modo que» mantiene esa relación lógica en español sin forzarla.
- source_word: γενομένην ἀνδρὶ ἑτέρῳ
  english_pob_choice: if she belongs to another man
  chosen_spanish: si se une a otro hombre
  alternatives_spanish:
  - si pertenece a otro hombre
  - si queda unida a otro hombre
  lexicon: BDAG
  rationale: El participio retoma la misma situación relacional del miembro anterior. Repetir «se une a otro hombre» conserva la coherencia de la analogía y evita añadir «esposa» donde el griego no lo dice explícitamente.
theological_decisions:
- issue: Alcance de νόμος
  english_pob_reading: Rendered as 'the law' in the main text, with the immediate referent understood as the legal bond governing the marriage relationship rather than a broad doctrinal statement about Mosaic law in general.
  chosen_spanish_reading: «la ley» en el texto principal, entendida aquí como el vínculo jurídico inmediato que regula el matrimonio.
  alternative_spanish_readings:
  - la ley matrimonial
  - la ley de Moisés en general
  - el vínculo legal
  rationale: El contexto inmediato trata del estado legal de la mujer respecto de su marido vivo o muerto. Mantener «la ley» respeta el texto griego y deja que el contexto determine el alcance, sin ampliar indebidamente el referente.
  doctrine_reference: Romanos 7:1-3; comparación del vínculo matrimonial en el argumento paulino
- issue: Relación expresada por γένηται / γενομένην ἀνδρὶ ἑτέρῳ
  english_pob_reading: if she belongs to another man
  chosen_spanish_reading: si se une a otro hombre
  alternative_spanish_readings:
  - si pertenece a otro hombre
  - si queda unida a otro hombre
  - si es de otro hombre
  rationale: La revisión inglesa optó por una fórmula relacional menos explícita que «wife». En español, «se une a otro hombre» mantiene esa relación sin introducir una formulación más interpretativa, y conserva el matiz legal-marital del pasaje.
  doctrine_reference: Mateo 5:32; Romanos 7:2-3
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente, que sustituyó una formulación más explícita («becomes another man’s wife») por «belongs to another man» para reflejar con más precisión γένηται / γενομένην ἀνδρὶ ἑτέρῳ sin sobreespecificar «esposa». En español se optó por «se une a otro hombre» por la misma razón, manteniendo la consistencia del paralelismo. También se conservó «la ley» en el sentido inmediato del vínculo jurídico matrimonial, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «adúltera» por correspondencia directa con μοιχαλὶς y con el uso lexical auditado.
  - Se evitó «Cristo» o terminología doctrinal ajena al versículo; no aplica aquí.
  - Se preservó el contraste temporal entre «mientras... vive» y «si el marido muere».
  - Se usó «la ley» sin mayúsculas de sustitución, siguiendo la instrucción del proyecto para YHWH, aunque aquí no aparece el nombre divino.
