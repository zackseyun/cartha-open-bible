source:
  edition: SBLGNT
  text: ἄρα οὖν ζῶντος τοῦ ἀνδρὸς μοιχαλὶς χρηματίσει ἐὰν γένηται ἀνδρὶ ἑτέρῳ· ἐὰν δὲ ἀποθάνῃ ὁ ἀνήρ, ἐλευθέρα ἐστὶν ἀπὸ τοῦ νόμου, τοῦ μὴ εἶναι αὐτὴν μοιχαλίδα γενομένην ἀνδρὶ ἑτέρῳ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/007/003.yaml
  text: So then[a], while her husband is living, she will be called an adulteress if she belongs to another man. But if the husband dies, she is free from the law[b], so that she is not an adulteress if she belongs to another man.
  footnotes:
  - marker: a
    text: Or 'if she belongs to another man' or 'if she is joined to another man.'
    reason: lexical_alternative
  - marker: b
    text: '''The law'' here refers immediately to the legal bond governing the marriage relationship.'
    reason: cultural_note
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4
