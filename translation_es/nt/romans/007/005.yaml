  text: ὅτε γὰρ ἦμεν ἐν τῇ σαρκί, τὰ παθήματα τῶν ἁμαρτιῶν τὰ διὰ τοῦ νόμου ἐνηργεῖτο ἐν τοῖς μέλεσιν ἡμῶν εἰς τὸ καρποφορῆσαι τῷ θανάτῳ·
base_translation:
  language: en
  yaml_path: translation/nt/romans/007/005.yaml
  text: For when we were in the flesh[a], the passions of sins, which were through the law[c][b], were at work in our members to bear fruit for death.
  footnotes:
  - marker: a
    text: Or 'in the sinful nature' / 'in our fallen human condition.'
    reason: alternative_reading
  - marker: b
    text: Lit. 'the passions of sins.'
    reason: lexical_alternative
  - marker: c
    text: '''Members'' here refers to the parts or faculties of the body as instruments of action.'
    reason: cultural_note
  ai_draft:
