revisions:
- from: Porque cuando estábamos en la carne[a], las pasiones de los pecados[b], que eran por medio de la ley, actuaban en nuestros miembros[c] para dar fruto para la muerte.
  to: Porque cuando estábamos en la carne[a], las pasiones de los pecados[b], que operaban por medio de la ley, actuaban en nuestros miembros[c] para dar fruto para muerte.
  rationale: Se conserva la fidelidad formal del borrador, pero se corrigen dos giros poco naturales en español. «Que operaban por medio de la ley» expresa mejor el valor instrumental de διὰ τοῦ νόμου dentro de la cláusula relativa que modifica a las pasiones. «Para dar fruto para muerte» elimina la repetición torpe de «para la muerte» después de «dar fruto» y mantiene el resultado sombrío de τῷ θανάτῳ sin sobreinterpretarlo.
