review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro auditado en los puntos principales: «en la carne» preserva σάρξ con nota aclaratoria; «las pasiones de los pecados» refleja la decisión formal reciente sobre τὰ παθήματα τῶν ἁμαρτιῶν; «por medio de la ley» mantiene bien διὰ τοῦ νόμου; «miembros» y «dar fruto» son fieles. Sin embargo, la construcción «que eran por medio de la ley» suena poco idiomática en español y no reproduce bien el valor operativo de la cláusula relativa; además, «para dar fruto para la muerte» es torpe por la repetición de «para».'
  spanish_quality_summary: 'La base es comprensible y digna, pero hay dos tropiezos de naturalidad importantes para español bíblico actual: «que eran por medio de la ley» resulta calcada, y «para dar fruto para la muerte» suena forzada. Una reparación menor mejora mucho la legibilidad sin alejarse del griego: «que operaban por medio de la ley» y «para dar fruto para muerte».'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: σάρξ = «carne» con nota; νόμος = «ley»; μέλη = «miembros»; καρποφορέω = «dar fruto». No hay conflicto con los defaults teológicos. La única ajuste léxico recomendado es hacer más natural y preciso el relativo de διὰ τοῦ νόμου mediante «operaban por medio de la ley».'
  issues:
  - severity: medium
    issue: «que eran por medio de la ley» es poco natural y semánticamente débil en español.
    rationale: Aunque formalmente cercano a «which were through the law», en español esa cláusula no comunica bien que esas pasiones actuaban/operaban mediante la ley. «Que operaban por medio de la ley» conserva el medio instrumental de διά y mejora la claridad.
  - severity: medium
    issue: «para dar fruto para la muerte» repite «para» de forma torpe.
    rationale: El griego tiene εἰς τὸ καρποφορῆσαι τῷ θανάτῳ; en español, la repetición preposicional suena antinatural. «Para dar fruto para muerte» o «para dar fruto hacia la muerte» evita el tropiezo; la primera es más concisa y suficientemente fiel.
  revised_spanish_text: Porque cuando estábamos en la carne[a], las pasiones de los pecados[b], que operaban por medio de la ley, actuaban en nuestros miembros[c] para dar fruto para muerte.
  revised_footnotes:
