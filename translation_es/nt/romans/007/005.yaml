    reason: lexical_alternative
  - marker: c
    text: «Miembros» aquí se refiere a las partes del cuerpo o facultades corporales como instrumentos de acción.
    reason: cultural_note
  revision_rationale: Se conserva la fidelidad formal del borrador, pero se corrigen dos giros poco naturales en español. «Que operaban por medio de la ley» expresa mejor el valor instrumental de διὰ τοῦ νόμου dentro de la cláusula relativa que modifica a las pasiones. «Para dar fruto para muerte» elimina la repetición torpe de «para la muerte» después de «dar fruto» y mantiene el resultado sombrío de τῷ θανάτῳ sin sobreinterpretarlo.
