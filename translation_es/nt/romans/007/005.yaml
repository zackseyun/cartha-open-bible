    changes_summary: Revised 'sinful passions' to 'the passions of sins' for closer lexical correspondence to τὰ παθήματα τῶν ἁμαρτιῶν, and 'that came through the law' to 'which were through the law' to reflect the Greek more formally while preserving natural English.
translation:
  language: es
  text: Porque cuando estábamos en la carne[a], las pasiones de los pecados[b], que operaban por medio de la ley, actuaban en nuestros miembros[c] para dar fruto para muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la naturaleza pecaminosa» / «en nuestra condición humana caída».
    reason: alternative_reading
  - marker: b
    text: 'Lit.: «las pasiones de los pecados».'
    reason: lexical_alternative
  - marker: c
    text: «Miembros» aquí se refiere a las partes del cuerpo o facultades corporales como instrumentos de acción.
    reason: cultural_note
lexical_decisions:
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza pecaminosa
  - condición humana caída
  lexicon: BDAG
  rationale: Se conserva el término concreto y cargado de Pablo, «carne», para no resolver de antemano su antropología. En español es el equivalente natural y permite mantener la tensión teológica documentada por la POB.
- source_word: παθήματα
  english_pob_choice: passions
  chosen_spanish: pasiones
  alternatives_spanish:
  - sufrimientos
  - deseos
  lexicon: BDAG
  rationale: Aquí no se trata de «sufrimientos», sino de impulsos o inclinaciones afectivas vinculadas con el pecado. «Pasiones» comunica bien ese sentido moral-psicológico.
- source_word: τῶν ἁμαρτιῶν
  english_pob_choice: of sins
  chosen_spanish: de los pecados
  alternatives_spanish:
  - pecaminosas
  - del pecado
  lexicon: BDAG
  rationale: El genitivo plural se mantiene de manera más cercana con «de los pecados». Aunque «pecaminosas» sería más idiomático, suaviza la correspondencia formal que la POB revisó para acercarse al griego.
- source_word: διὰ τοῦ νόμου
  english_pob_choice: which were through the law
  chosen_spanish: que eran por medio de la ley
  alternatives_spanish:
  - por la ley
  - que procedían de la ley
  - suscitadas por la ley
  lexicon: BDAG
  rationale: La preposición διά con genitivo expresa medio o agencia. «Por medio de la ley» conserva ese valor sin introducir la idea más interpretativa de «suscitadas».
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - Ley
  lexicon: BDAG
  rationale: «Ley» es la equivalencia natural en Romanos y preserva el referente mosaico sin añadir una mayúscula interpretativa que el texto no exige.
- source_word: ἐνηργεῖτο
  english_pob_choice: were at work
  chosen_spanish: actuaban
  alternatives_spanish:
  - estaban en actividad
  - obraban
  lexicon: BDAG
  rationale: El imperfecto griego indica acción continua en el pasado. «Actuaban» reproduce bien esa dinámica verbal en español, con un registro claro y digno.
- source_word: μέλεσιν
  english_pob_choice: members
  chosen_spanish: miembros
  alternatives_spanish:
  - partes del cuerpo
  - facultades corporales
  lexicon: BDAG
  rationale: «Miembros» conserva la correspondencia paulina tradicional y el sentido de partes del cuerpo como instrumentos de acción. Es suficientemente literal y entendible en español.
- source_word: καρποφορῆσαι
  english_pob_choice: to bear fruit
  chosen_spanish: dar fruto
  alternatives_spanish:
  - llevar fruto
  - producir fruto
  lexicon: BDAG
  rationale: «Dar fruto» es una equivalencia natural y fiel del metafórico καρποφορέω en español bíblico actual.
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: BDAG
  rationale: 'Se explicita el artículo para fluidez en español: «para dar fruto para la muerte». Conserva el valor resultativo del dativo y la severidad del contraste paulino.'
theological_decisions:
- issue: Cómo traducir ἐν τῇ σαρκί sin borrar la tensión entre sentido literal y sentido antropológico/moral
  english_pob_reading: in the flesh, with a footnote allowing 'sinful nature' / 'fallen human condition'
  chosen_spanish_reading: en la carne, con nota alternativa sobre 'naturaleza pecaminosa' / 'condición humana caída'
  alternative_spanish_readings:
  - en la naturaleza pecaminosa
  - en nuestra condición humana caída
  rationale: Se mantiene «carne» en el texto principal para respetar el lenguaje de Pablo y la decisión auditada de la POB. La nota aclara las alternativas interpretativas sin reemplazar el término cargado por una explicación doctrinal única.
  doctrine_reference: 'DOCTRINE.md: σάρξ = ''flesh'' literal / ''sinful nature'' metafórico, según el contexto; preservar la tensión donde siga siendo ambigua.'
- issue: Si τὰ παθήματα τῶν ἁμαρτιῶν debe suavizarse a 'pasiones pecaminosas' o conservar su correspondencia más formal
  english_pob_reading: the passions of sins, with a note 'Lit. the passions of sins'
  chosen_spanish_reading: las pasiones de los pecados
  alternative_spanish_readings:
  - las pasiones pecaminosas
  - las pasiones del pecado
  rationale: Se conserva la relación genitiva plural con mayor fidelidad al griego, siguiendo la revisión más reciente de la POB que prefirió acercarse a τὰ παθήματα τῶν ἁμαρτιῶν. La alternativa más idiomática queda implícita como posibilidad, pero no sustituye el texto base.
  doctrine_reference: La frase mantiene la descripción paulina del deseo desordenado sin atenuar la conexión con el pecado.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que ajustó la frase a «the passions of sins, which were through the law» para una correspondencia más cercana con τὰ παθήματα τῶν ἁμαρτιῶν τὰ διὰ τοῦ νόμου. La versión española conserva esa cercanía formal sin perder fluidez natural.
  spanish_consistency_notes:
  - Se mantuvo «carne» como término técnico principal, en coherencia con el tratamiento paulino y con el criterio POB de no resolver automáticamente σάρξ como 'naturaleza pecaminosa'.
  - Se preservó la pluralidad del genitivo con «de los pecados», porque el ajuste auditado en inglés buscó acercarse al griego en lugar de homogeneizarlo a un adjetivo interpretativo.
  - «Miembros» se dejó sin paráfrasis para sostener la continuidad paulina y la imagen corporal-instrumental del contexto.
  - Se evitó «Cristo»/«Mesías» porque no aparece en el versículo.
