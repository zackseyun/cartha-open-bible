translation:
  language: es
  text: Porque todos los que pecaron sin la ley[a], sin la ley también perecerán; y todos los que pecaron bajo la ley[b] serán juzgados por medio de la ley[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sin ley' o 'ilegalmente' para ambas ocurrencias de ἀνόμως; aquí 'sin la ley' expresa estar aparte de la ley como marco de referencia, no solo actuar de manera ilícita.
    reason: lexical_alternative
  - marker: b
    text: O 'en la ley'; 'bajo la ley' resalta la idea de estar dentro de la jurisdicción de la ley.
    reason: lexical_alternative
  - marker: c
    text: O 'por la ley'; 'por medio de la ley' expresa que la ley es el medio o criterio por el cual se dicta el juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅσοι ... καὶ ὅσοι
  english_pob_choice: all who ... and all who
  chosen_spanish: todos los que ... y todos los que
  alternatives_spanish:
  - quienes ... y quienes
  - los que ... y los que
  lexicon: BDAG
  rationale: Conserva el valor distributivo y el paralelismo del griego, con español natural y claro.
- source_word: ἀνόμως
  english_pob_choice: apart from the law
  chosen_spanish: sin la ley
  alternatives_spanish:
  - apartados de la ley
  - sin ley
  lexicon: BDAG
  rationale: En español, «sin la ley» comunica bien la ausencia de la esfera/autoridad de la ley; es más natural que una calca más pesada. La repetición mantiene el contraste con «bajo la ley».
- source_word: ἥμαρτον
  english_pob_choice: sinned
  chosen_spanish: pecaron
  alternatives_spanish:
  - pecaron contra
  - cometieron pecado
  lexicon: BDAG
  rationale: Verbo simple y directo para el aoristo, sin añadir matices no presentes en el texto.
- source_word: ἀπολοῦνται
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - morirán
  lexicon: BDAG
  rationale: «Perecerán» reproduce el valor de ruina/pérdida sin decidir el modo o alcance final de la destrucción.
- source_word: ἐν νόμῳ
  english_pob_choice: under the law
  chosen_spanish: bajo la ley
  alternatives_spanish:
  - en la ley
  - dentro de la ley
  lexicon: BDAG
  rationale: «Bajo la ley» expresa la idea jurisdiccional/covenantal que el inglés POB documenta para ἐν νόμῳ.
- source_word: διὰ νόμου
  english_pob_choice: through the law
  chosen_spanish: por la ley
  alternatives_spanish:
  - a través de la ley
  - mediante la ley
  lexicon: BDAG
  rationale: «Por la ley» es idiomático en español y conserva la idea de medio o estándar del juicio. Se evita recargar la frase manteniendo la distinción con ἐν νόμῳ.
- source_word: κριθήσονται
  english_pob_choice: will be judged
  chosen_spanish: serán juzgados
  alternatives_spanish:
  - serán condenados
  - recibirán juicio
  lexicon: BDAG
  rationale: Se mantiene una traducción neutral de juicio/evaluación, sin especificar condena en la forma verbal.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Marca adecuadamente la relación causal o justificativa del verso con el contexto inmediato.
theological_decisions:
- issue: Sentido de νόμος en Romanos 2:12
  english_pob_reading: Mosaic law in particular, expressed simply as 'the law'
  chosen_spanish_reading: La ley mosaica, expresada simplemente como «la ley»
  alternative_spanish_readings:
  - la ley en sentido moral general
  - la norma legal en general
  rationale: El contraste paulino aquí se entiende mejor como entre quienes están fuera de la ley mosaica y quienes están dentro de su jurisdicción; el texto español conserva esa referencia sin explicarla de más.
  doctrine_reference: Romanos 2; contraste judío-gentil en el argumento paulino
- issue: Fuerza de 'perecerán'
  english_pob_reading: Use 'will perish' without specifying annihilation or eternal punishment in the wording
  chosen_spanish_reading: «Perecerán» sin precisar el modo ni la duración de la ruina
  alternative_spanish_readings:
  - serán destruidos
  - serán condenados
  rationale: 'La frase conserva la tensión teológica del pasaje: anuncia un resultado judicial grave, pero no define mecánicamente su forma final.'
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando notas al pie no ancladas. El texto principal ahora no usa marcadores de nota, cumpliendo con la exigencia de que solo existan footnotes cuando cada marcador aparezca explícitamente en la traducción.
  spanish_consistency_notes:
  - Se mantiene «la ley» para νόμος y la combinación «sin la ley / bajo la ley / por la ley» para reproducir las contrastes del griego.
  - Se evita «Cristo», «SEÑOR» u otras sustituciones no pertinentes en este versículo.
  - La traducción conserva un tono formal, bíblico y publicable sin calcos innecesarios.
