  rationale: 'La revisión es pequeña: mantiene el buen texto base, pero restaura las alternativas léxicas importantes del expediente inglés y hace más nítida en español la distinción entre ἐν νόμῳ y διὰ νόμου. Así se preserva mejor tanto el sentido del griego como la trazabilidad editorial del POB.'
