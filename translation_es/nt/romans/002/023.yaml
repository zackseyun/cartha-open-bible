translation:
  language: es
  text: Tú que te jactas de la ley[a], ¿deshonras a Dios por medio de tu transgresión de la ley?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «por quebrantar la ley».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν νόμῳ
  english_pob_choice: in the law
  chosen_spanish: en la ley
  alternatives_spanish:
  - en ley
  - acerca de la ley
  lexicon: BDAG
  rationale: Mantiene la idea locativa de ἐν y conserva el sentido jurídico/pactual de νόμος. En español, "en la ley" es la forma natural y transparente para el lector bíblico sin convertirlo en una paráfrasis.
- source_word: καυχᾶσαι
  english_pob_choice: boast
  chosen_spanish: te jactas
  alternatives_spanish:
  - te glorías
  - te enorgulleces
  lexicon: BDAG
  rationale: '"Te jactas" comunica bien el tono crítico y confrontativo de Pablo. "Gloriarse" es posible, pero en español puede sonar más eclesiástico o menos directo; aquí se preserva la reprensión.'
- source_word: διὰ τῆς παραβάσεως
  english_pob_choice: through your transgression
  chosen_spanish: por medio de tu transgresión
  alternatives_spanish:
  - mediante tu transgresión
  - a través de tu transgresión
  lexicon: BDAG
  rationale: '"Por medio de" reproduce con naturalidad la idea instrumental de διά con artículo y sustantivo, y evita reducir el matiz a una simple locución verbal.'
- source_word: παραβάσεως τοῦ νόμου
  english_pob_choice: transgression of the law
  chosen_spanish: transgresión de la ley
  alternatives_spanish:
  - violación de la ley
  - quebrantamiento de la ley
  lexicon: BDAG
  rationale: '"Transgresión" conserva la fuerza nominal de παράβασις y mantiene la conexión lexical con la ley. "Ley" es la opción más clara en español para νόμος en este contexto paulino.'
- source_word: τὸν θεὸν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - al Dios
  lexicon: BDAG
  rationale: En español el objeto directo personal con 'deshonras' normalmente lleva la preposición 'a'. Se mantiene la referencia definida y no se añade artículo innecesario.
- source_word: ἀτιμάζεις
  english_pob_choice: dishonor
  chosen_spanish: deshonras
  alternatives_spanish:
  - avergüenzas
  - desacreditas
  lexicon: BDAG
  rationale: '"Deshonras" corresponde directamente a ἀτιμάζω y conserva la antítesis retórica con jactarse. Es más preciso que ''desacreditar'' y más natural que ''insultar'' en este contexto.'
theological_decisions:
- issue: νόμος en la acusación paulina
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - La Ley
  - la Ley mosaica
  rationale: El contexto identifica la referencia judía/mosaica, pero en español minúsculo 'la ley' es más natural y no impone una convención tipográfica que el griego no marca. Se conserva así la lectura pactual sin sobreespecificar.
  doctrine_reference: Primacía del texto original y claridad idiomática; no convertir la traducción en una glosa doctrinal.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente griego y el auditor inglés, manteniendo la acusación retórica y la relación lexical entre νόμος y παράβασις sin suavizarla. Se preserva la opción de la nota inglesa para una alternativa idiomática en español.
  spanish_consistency_notes:
  - Se usa "ley" en minúsculas para νόμος, coherente con el contexto paulino y con el estilo español natural.
  - Se conserva la fuerza verbal directa de la pregunta retórica con "¿deshonras a Dios...?".
  - '"Transgresión" mantiene la correspondencia con el sustantivo griego παράβασις y evita diluir el vínculo con "ley".'
