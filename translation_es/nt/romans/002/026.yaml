translation:
  language: es
  text: Así pues[a], si el incircunciso guarda los requisitos de la ley, ¿no será su incircuncisión tenida por circuncisión?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Así pues, si la incircuncisión guarda ... ¿no será su incircuncisión tenida por circuncisión?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκροβυστία
  english_pob_choice: the uncircumcised man
  chosen_spanish: el incircunciso
  alternatives_spanish:
  - la incircuncisión
  - la persona incircuncisa
  lexicon: BDAG
  rationale: En este contexto Pablo usa el sustantivo de manera personal, reforzado por αὐτοῦ ('su'). En español, 'el incircunciso' conserva el referente humano sin perder el contraste judío-gentil; además mantiene la fuerza semántica del término mejor que una mera abstracción como 'la incircuncisión'.
- source_word: δικαιώματα
  english_pob_choice: requirements
  chosen_spanish: estatutos
  alternatives_spanish:
  - requisitos
  - exigencias
  - ordenanzas
  lexicon: BDAG
  rationale: El plural apunta a aquello que la ley demanda o establece. 'Estatutos' comunica con naturalidad la idea de mandatos normativos en español bíblico sin volver la frase excesivamente técnica; 'requisitos' sería más moderno pero menos acorde al tono de la carta.
- source_word: νόμου
  english_pob_choice: of the law
  chosen_spanish: de la ley
  alternatives_spanish:
  - de la Ley
  lexicon: BDAG
  rationale: Se conserva el genitivo simple. 'Ley' en minúscula es la forma natural en español para el marco mosaico de este argumento.
- source_word: φυλάσσῃ
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - cumple
  lexicon: BDAG
  rationale: '''Guarda'' es una equivalencia natural y fiel para obedecer o cumplir preceptos. Conserva mejor el matiz de mantener/observar con fidelidad que una paráfrasis más interpretativa.'
- source_word: λογισθήσεται
  english_pob_choice: be counted
  chosen_spanish: será considerada
  alternatives_spanish:
  - será contada
  - será tenida por
  - será reputada
  lexicon: BDAG
  rationale: '''Ser considerada'' expresa bien el valor de cálculo/reconocimiento de λογίζομαι en este contexto y suena natural en español actual. ''Será contada'' es más literal, pero menos idiomática para muchos lectores.'
- source_word: εἰς περιτομὴν
  english_pob_choice: as circumcision
  chosen_spanish: como circuncisión
  alternatives_spanish:
  - por circuncisión
  - en circuncisión
  lexicon: BDAG
  rationale: La preposición εἰς aquí indica resultado o estatus. 'Como circuncisión' comunica que su incircuncisión será tenida en la categoría de circuncisión, sin forzar una lectura causal o local.
- source_word: οὐχ
  english_pob_choice: will not ... ?
  chosen_spanish: ¿acaso ... no ...?
  alternatives_spanish:
  - ¿no ...?
  - ¿no será ...?
  lexicon: Greek grammar
  rationale: La partícula negativa introduce una pregunta retórica que espera afirmación. '¿Acaso ... no ...?' reproduce bien esa fuerza en español y evita que la interrogación suene demasiado plana.
translation_notes:
  revision_awareness: 'Coincide con el griego SBLGNT y con el audit trail en inglés: se mantiene la lectura personal de ἀκροβυστία, el valor normativo de δικαιώματα y la pregunta retórica de οὐχ sin añadir matices doctrinales ajenos al versículo.'
  spanish_consistency_notes:
  - Se mantiene 'ley' en minúscula para el contexto paulino.
  - Se evita 'Cristo' u otras terminologías no presentes en el versículo.
  - La nota al pie preserva la alternativa literal 'incircuncisión' para no borrar la tensión léxica del griego.
