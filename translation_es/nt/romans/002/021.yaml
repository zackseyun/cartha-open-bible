  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. Las decisiones para «enseñas», «a otro», «a ti mismo», «proclamas» y «No robes» son adecuadas. La corrección principal es de registro y neutralidad dialectal: reemplazar «¿robás?» por «¿robas?».'
