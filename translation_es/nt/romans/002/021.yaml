translation:
  language: es
  text: 'Por tanto, tú, que enseñas a otro, ¿no te enseñas a ti mismo? Tú, que proclamas: «No robes», ¿robas?'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - por consiguiente
  lexicon: BDAG
  rationale: La inferencia lógica de οὖν se conserva con una transición natural en español. «Así que» suena menos rígido que «por tanto», pero mantiene la conexión argumentativa del contexto.
- source_word: διδάσκων
  english_pob_choice: who teach
  chosen_spanish: que enseñas
  alternatives_spanish:
  - que enseña
  - enseñando
  lexicon: BDAG
  rationale: El participio con valor sustantivo se vierte naturalmente con oración relativa en segunda persona, preservando el reproche directo y el carácter habitual de la acción.
- source_word: ἕτερον
  english_pob_choice: another
  chosen_spanish: a otro
  alternatives_spanish:
  - a alguien más
  - a otro hombre
  lexicon: BDAG
  rationale: «ἕτερον» es singular y se mantiene singular en español; «a otro» reproduce la precisión del griego sin ampliar indebidamente el referente.
- source_word: σεαυτὸν
  english_pob_choice: yourself
  chosen_spanish: a ti mismo
  alternatives_spanish:
  - a ti
  - a ti mismo
  lexicon: BDAG
  rationale: El reflexivo intensifica el contraste retórico. «A ti mismo» es la forma más clara y natural en español para conservar ese golpe de acusación.
- source_word: οὐ διδάσκεις;
  english_pob_choice: do you not teach
  chosen_spanish: ¿no te enseñas ...?
  alternatives_spanish:
  - ¿no enseñas ...?
  - ¿no te instruyes ...?
  lexicon: BDAG
  rationale: 'Aquí el foco no es solo impartir información sino poner en evidencia la inconsecuencia moral: enseñar a otro sin aplicarlo a sí mismo. Por eso «te enseñas» refleja la ironía del reproche. Se mantiene la forma interrogativa negativa.'
- source_word: κηρύσσων
  english_pob_choice: who proclaim
  chosen_spanish: que proclamas
  alternatives_spanish:
  - que anuncias
  - que predicas
  lexicon: BDAG
  rationale: «Proclamar» reproduce el sentido público de κηρύσσω sin cargar el texto con un matiz eclesiástico específico que «predicar» puede sugerir.
- source_word: μὴ κλέπτειν
  english_pob_choice: Do not steal
  chosen_spanish: «No robes»
  alternatives_spanish:
  - «No hurtes»
  - «No robarás»
  lexicon: BDAG
  rationale: Como contenido proclamado, una prohibición directa en discurso citado es más fiel e idiomática. «Robes» conserva el imperativo negativo y la fuerza moral del mandato.
- source_word: κλέπτεις;
  english_pob_choice: do you steal
  chosen_spanish: ¿robás?
  alternatives_spanish:
  - ¿robes?
  - ¿estás robando?
  lexicon: BDAG
  rationale: La pregunta retórica final debe sonar breve y acusatoria. Se usa el presente simple; la variante con voseo se eligió para una lectura latinoamericana amplia y natural, sin cambiar el contenido.
theological_decisions:
- issue: Forma del reproche retórico y tono acusatorio
  english_pob_reading: The negated question expects a rebuking force in context; the rhetoric exposes hypocrisy rather than seeking information.
  chosen_spanish_reading: Las preguntas retóricas mantienen un tono de reprensión que expone la incoherencia moral.
  alternative_spanish_readings:
  - Las preguntas podrían leerse como meramente informativas
  - Podría suavizarse el tono a una observación general
  rationale: El griego presenta preguntas retóricas encadenadas; en español deben conservar fuerza de acusación para no debilitar la intención paulina.
  doctrine_reference: Romanos 2:1-29; Santiago 1:22
- issue: Contenido del mandamiento citado
  english_pob_reading: Do not steal is rendered as direct prohibition in quotation marks.
  chosen_spanish_reading: 'La prohibición se cita como mandato directo: «No robes».'
  alternative_spanish_readings:
  - «No hurtes»
  - «No robarás»
  rationale: El infinitivo griego μὴ κλέπτειν funciona como contenido de proclamación; en español la forma imperativa negativa cita mejor el mandato y mantiene la brevedad retórica.
  doctrine_reference: Éxodo 20:15; Romanos 13:9
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando todo marcador de nota al pie para evitar anclajes huérfanos. El texto español se revisó para mantener la fuerza interrogativa y la referencia singular de «ἕτερον».
  spanish_consistency_notes:
  - Se mantuvo «proclamas» para κηρύσσων por su valor público, evitando un sesgo confesional innecesario.
  - Se evitó «señorear» o «predicar» por introducir connotaciones no requeridas por el griego.
  - Se preservó la singularidad de «a otro» frente a posibles plurales.
  - Se eligió un español neutral latinoamericano; el voseo final en «robás» se usa solo como opción estilística de cercanía retórica en un contexto amplio, aunque puede alternarse con «robes» si la línea editorial prefiere forma no voseante.
