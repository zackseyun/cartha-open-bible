translation:
  language: es
  text: Y sabemos que el juicio de Dios es conforme a la verdad contra los que practican tales cosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de acuerdo con la verdad»; es decir, el juicio de Dios se ajusta a lo que es verdadero.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - conocemos
  - sabemos con certeza
  lexicon: οἶδα
  rationale: El perfecto de οἶδα tiene sentido presente; «sabemos» comunica de manera natural ese valor de conocimiento asentado, sin añadir énfasis no presente en el griego.
- source_word: δέ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: δέ
  rationale: Aquí δέ enlaza el discurso sin contraste fuerte; «Y» conserva la continuidad retórica de forma idiomática en español.
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - veredicto
  - condena
  lexicon: κρίμα
  rationale: «Juicio» reproduce el campo judicial amplio de κρίμα sin reducirlo solo al resultado (condena) ni volverlo excesivamente técnico (veredicto).
- source_word: κατὰ ἀλήθειαν
  english_pob_choice: according to truth
  chosen_spanish: conforme a la verdad
  alternatives_spanish:
  - de acuerdo con la verdad
  - según la verdad
  - en conformidad con la verdad
  lexicon: κατὰ + ἀλήθεια
  rationale: La frase expresa conformidad con la verdad o la realidad. «Conforme a la verdad» mantiene el sentido relacional y judicial, y suena natural en español sin ocultar la base léxica.
- source_word: ἐπὶ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - en contra de
  lexicon: ἐπί
  rationale: Con personas bajo juicio adverso, «contra» expresa de manera directa la dirección judicial de ἐπί y coincide con el valor contextual resaltado en el audit trail.
- source_word: τὰ τοιαῦτα
  english_pob_choice: such things
  chosen_spanish: tales cosas
  alternatives_spanish:
  - esas cosas
  - cosas semejantes
  lexicon: τοιοῦτος
  rationale: El neutro plural apunta a conductas ya mencionadas; «tales cosas» conserva esa referencia resumida y el tono formal del texto.
- source_word: πράσσοντας
  english_pob_choice: practice
  chosen_spanish: practican
  alternatives_spanish:
  - hacen
  - cometen
  - llevan a cabo
  lexicon: πράσσω
  rationale: El participio presente indica acción característica o continuada. «Practican» comunica mejor la idea de conducta habitual que un simple «hacen».
theological_decisions:
- issue: Cómo expresar κατὰ ἀλήθειαν sin suavizar la afirmación sobre el criterio del juicio divino
  english_pob_reading: according to truth
  chosen_spanish_reading: conforme a la verdad
  alternative_spanish_readings:
  - de acuerdo con la verdad
  - en conformidad con la verdad
  - rectamente
  rationale: La opción elegida conserva la base literal de la frase y mantiene la idea de que el juicio de Dios se ajusta a la verdad o realidad. Se evita «rectamente» porque desplaza el énfasis desde la conformidad con la verdad hacia un adverbio interpretativo más general.
  doctrine_reference: 'Translation philosophy: primacía del texto fuente, preservación de tensión léxica, y equivalencia óptima sin paráfrasis excesiva'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: no hubo cambios de revisión posteriores, y la traducción española sigue la decisión establecida de conservar el sentido judicial de κρίμα y la conformidad expresa de κατὰ ἀλήθειαν sin reinterpretarla como un adverbio más libre.'
  spanish_consistency_notes:
  - Se conserva «Dios» para θεοῦ y no se introduce terminología eclesiástica ajena al texto.
  - «Juicio» y «contra» mantienen el tono forense coherente con el contexto paulino.
  - La nota al pie preserva la alternativa léxica documentada sin duplicar la lectura principal.
