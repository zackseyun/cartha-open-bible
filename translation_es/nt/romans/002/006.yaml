translation:
  language: es
  text: quien retribuirá a cada uno conforme a sus obras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hechos». «Obras» sigue más de cerca el término paulino τὰ ἔργα.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  english_pob_choice: who
  chosen_spanish: él
  alternatives_spanish:
  - quien
  - el que
  lexicon: BDAG
  rationale: El relativo griego retoma al sujeto inmediatamente anterior. En español, para un texto breve y jurídico, «él» mantiene la referencia sin sonar forzado; las opciones con relativo son posibles, pero aquí el antecedente ya está claro en el contexto inmediato.
- source_word: ἀποδώσει
  english_pob_choice: will repay
  chosen_spanish: pagará
  alternatives_spanish:
  - repagará
  - retribuirá
  - dará de vuelta
  lexicon: BDAG
  rationale: El verbo expresa retribución o compensación en contexto judicial. «Pagará» comunica bien esa idea en español moderno y conserva el matiz de compensación; «retribuirá» es más formal, pero menos natural.
- source_word: ἑκάστῳ
  english_pob_choice: each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada persona
  - a todos
  lexicon: BDAG
  rationale: La forma distributiva singular se preserva con una expresión natural en español. «A cada uno» conserva el énfasis individual sin neutralizarlo colectivamente.
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  lexicon: BDAG
  rationale: «Conforme a» reproduce bien la noción de medida o norma de juicio. En español bíblico contemporáneo suena claro y no debilita la relación de correspondencia.
- source_word: τὰ ἔργα
  english_pob_choice: works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: BDAG
  rationale: «Obras» es el equivalente más directo y mantiene consistencia paulina. «Hechos» o «acciones» serían posibles, pero suavizan la terminología lexical del griego.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: sus
  alternatives_spanish:
  - sus propias
  - su
  lexicon: BDAG
  rationale: El griego usa masculino singular representativo. En español, el posesivo plural «sus» evita una marca de género innecesaria y comunica naturalmente el valor genérico de «cada uno».
theological_decisions:
- issue: Recompensa/jucio según las obras
  english_pob_reading: Retain the judicial recompense wording without softening or harmonizing it with broader Pauline discussions of justification.
  chosen_spanish_reading: 'Mantener el lenguaje de retribución judicial: «pagará... conforme a sus obras».'
  alternative_spanish_readings:
  - tratará a cada uno según sus obras
  - recompensará a cada uno según sus obras
  rationale: La frase griega afirma una correspondencia entre la acción divina y las obras humanas; la traducción debe conservar esa tensión teológica sin reinterpretarla. «Pagará» mantiene el valor de retribución y no lo diluye en una formulación más general.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla interpretativamente.
translation_notes:
  revision_awareness: 'El contexto crítico muestra alta concordancia y ningún cambio reciente; se mantiene la línea de la POB inglesa: retribución judicial explícita, sin suavizarla ni armonizarla con otros pasajes paulinos. No hubo revisiones aplicadas en la pasada más reciente.'
  spanish_consistency_notes:
  - Se conserva «obras» para τὰ ἔργα por consistencia léxica paulina.
  - Se evita «SEÑOR» o sustituciones eufemísticas no presentes en el versículo.
  - «A cada uno» y el posesivo plural «sus» preservan el valor genérico distributivo del griego.
