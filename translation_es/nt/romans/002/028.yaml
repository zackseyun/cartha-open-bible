translation:
  language: es
  text: Porque no es judío[c] el que lo es en lo visible[a], ni es circuncisión la que es exterior en la carne[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «externamente» / «en lo que es visible».
    reason: lexical_alternative
  - marker: b
    text: «En la carne» es literal aquí y se refiere a la circuncisión física.
    reason: lexical_alternative
  - marker: c
    text: «Judío» también puede entenderse como «judeano» en algunos contextos, pero aquí el sentido de pacto es más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰουδαῖος
  english_pob_choice: Jew
  chosen_spanish: judío
  alternatives_spanish:
  - judeo
  - judío/a en sentido étnico-religioso
  lexicon: BDAG
  rationale: En Romanos, el contraste es de identidad del pueblo del pacto y su marca distintiva, no solo de procedencia geográfica. En español, «judío» comunica esa identidad religiosa y covenantal con naturalidad y fidelidad al contexto.
- source_word: ἐν τῷ φανερῷ
  english_pob_choice: outwardly
  chosen_spanish: en lo visible
  alternatives_spanish:
  - externamente
  - de manera externa
  - en lo manifiesto
  lexicon: BDAG
  rationale: La frase griega contrasta lo visible/exterior con la realidad interna del siguiente versículo. «En lo visible» conserva ese valor semántico sin sonar forzado en español; además deja abierta la tensión entre apariencia y realidad.
- source_word: περιτομή
  english_pob_choice: circumcision
  chosen_spanish: circuncisión
  alternatives_spanish:
  - circuncisión ritual
  lexicon: BDAG
  rationale: Es el término estándar y preciso para el signo del pacto en discusión. No requiere ampliación, porque el contexto ya lo define.
- source_word: ἐν σαρκί
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en el cuerpo
  - físicamente
  - en lo corporal
  lexicon: BDAG
  rationale: Aquí σάρξ es literal y física, no una referencia moral/teológica a «carne» como naturaleza humana pecaminosa. «En la carne» mantiene la formulación del texto y el contraste corporal con la realidad interior del v. 29.
- source_word: οὐδὲ ἡ ἐν τῷ φανερῷ ἐν σαρκὶ περιτομή
  english_pob_choice: nor is circumcision outward in the flesh
  chosen_spanish: ni es circuncisión la que es en lo visible, en la carne
  alternatives_spanish:
  - ni es circuncisión externa en la carne
  - ni la circuncisión visible es en la carne
  lexicon: BDAG
  rationale: El griego es elíptico y exige cierta fluidez en español. La solución mantiene la negación de una circuncisión meramente visible y física, sin añadir ideas ajenas ni suavizar la fuerza del paralelismo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación del argumento previo. «Porque» es natural en español y preserva la relación lógica del versículo con lo anterior.
theological_decisions:
- issue: Identidad del «judío» y valor del marcador de pacto
  english_pob_reading: Paul denies that merely visible ethnic-marker possession, by itself, defines true covenant standing.
  chosen_spanish_reading: Pablo niega que la mera posesión visible de la marca étnica o de pacto defina por sí sola la verdadera pertenencia.
  alternative_spanish_readings:
  - Pablo niega la identidad judía misma
  - Pablo sustituye la identidad judía por una categoría puramente espiritual
  rationale: La redacción española debe conservar la tensión entre lo externo y lo interno para que el v. 29 complete el argumento. No se debe borrar la identidad judía ni absolutizar el signo externo; el pasaje los relativiza sin destruirlos.
  doctrine_reference: Romanos 2:28–29; cf. Romanos 9:6
- issue: Sentido de σάρξ en la frase «en la carne»
  english_pob_reading: ‘In the flesh’ is literal here, referring to physical circumcision.
  chosen_spanish_reading: «En la carne» se entiende literalmente, como referencia a la circuncisión física.
  alternative_spanish_readings:
  - «Carne» como naturaleza humana
  - «En el cuerpo» como formulación explicativa
  rationale: Conviene mantener la literalidad porque la oposición del texto es entre lo visible y lo interior, y porque la referencia inmediata es al acto corporal de la circuncisión. Traducirlo de forma moral o antropológica borraría esa precisión.
  doctrine_reference: Génesis 17:10–14; Romanos 2:29
translation_notes:
  revision_awareness: 'He revisado la decisión de la POB inglesa de suprimir «something» en la reformulación más reciente y he seguido esa línea de mayor cercanía al griego: la frase española evita añadidos explicativos innecesarios. También he tenido en cuenta el archivo inglés que marca la ambigüedad de Ἰουδαῖος y de ἐν τῷ φανερῷ, preservando ambas tensiones con una formulación natural en español.'
  spanish_consistency_notes:
  - Se usa «judío» de manera consistente con el sentido de identidad del pacto en Romanos, no como mero etnónimo geográfico.
  - «En lo visible» conserva el contraste de φανερῷ sin convertirlo en un adverbio más interpretativo de lo necesario.
  - «En la carne» se mantiene literal para no perder el énfasis corporal del texto.
  - La puntuación mantiene el paralelismo negativo del griego y la conexión causal introducida por γὰρ.
