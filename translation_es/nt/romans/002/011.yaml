lexical_decisions:
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón que fundamenta la afirmación anterior; «Porque» conserva bien la fuerza explicativa y resulta natural en español.
- source_word: προσωπολημψία
  english_pob_choice: partiality
  chosen_spanish: acepción de personas
  alternatives_spanish:
  - parcialidad
  - favoritismo
  lexicon: BDAG
  rationale: El término griego alude a juzgar según apariencia, estatus o favor humano. «Acepción de personas» es una equivalencia bíblica y legalmente precisa en español, y preserva mejor el matiz judicial que «favoritismo».
- source_word: παρὰ τῷ θεῷ
  english_pob_choice: with God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - con Dios
  - ante Dios
  lexicon: BDAG
  rationale: La construcción expresa relación o presencia respecto de Dios. «Delante de Dios» comunica esa esfera de referencia con naturalidad y sin reducir el sentido a mera compañía.
theological_decisions:
- issue: Imparcialidad divina expresada como afirmación general
  english_pob_reading: For there is no partiality with God.
  chosen_spanish_reading: Porque no hay acepción de personas delante de Dios.
  alternative_spanish_readings:
  - Porque Dios no muestra acepción de personas.
  - Porque no hay parcialidad con Dios.
  rationale: Se mantiene la estructura existencial del griego y la afirmación sobre el carácter de Dios, sin convertirla en una paráfrasis verbal innecesaria. El español conserva el valor moral y judicial del enunciado.
  doctrine_reference: Santiago 2:1, 9; Hechos 10:34; Romanos 2:11
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador [a] directamente en el texto base, de modo que la nota quede anclada al término correspondiente.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico contemporáneo y sobrio.
  - Se evitó «SEÑOR» como sustituto del nombre divino, aunque este versículo no lo contiene.
  - «Acepción de personas» se eligió por su precisión jurídica y su uso reconocido en español bíblico.
  - La frase «delante de Dios» conserva la relación implícita del griego παρὰ τῷ θεῷ.
