translation:
  language: es
  text: un instructor de los necios[a], un maestro de infantes, teniendo en la ley la expresión concreta[b] del conocimiento y de la verdad—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los insensatos».
    reason: lexical_alternative
  - marker: b
    text: O «la forma del conocimiento y de la verdad».
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδευτὴν
  english_pob_choice: instructor
  chosen_spanish: instructor
  alternatives_spanish:
  - corrector
  - entrenador
  lexicon: BDAG
  rationale: παιδευτής denota a quien instruye, forma o disciplina. «Instructor» conserva la idea de formación y encaja con el tono de jactancia del pasaje sin cargar innecesariamente el sentido hacia el castigo.
- source_word: ἀφρόνων
  english_pob_choice: the foolish
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los imprudentes
  lexicon: BDAG
  rationale: ἄφρων expresa la idea de necedad o falta de entendimiento. «Ne cios» reproduce el tono despectivo natural en español y mantiene la carga retórica del texto.
- source_word: διδάσκαλον
  english_pob_choice: teacher
  chosen_spanish: maestro
  alternatives_spanish:
  - docente
  - enseñador
  lexicon: BDAG
  rationale: διδάσκαλος significa «maestro» o «maestro/maestro de enseñanza». «Maestro» es natural, digno y fiel al paralelo con «instructor».
- source_word: νηπίων
  english_pob_choice: infants
  chosen_spanish: niños
  alternatives_spanish:
  - infantes
  - bebés
  - pequeños
  lexicon: BDAG
  rationale: νήπιος puede referirse literalmente a infantes, pero en español «infantes» suena más técnico y menos transparente; «niños» comunica la imagen de inmadurez de modo claro y natural, sin perder el contraste retórico.
- source_word: ἔχοντα
  english_pob_choice: having
  chosen_spanish: que tiene
  alternatives_spanish:
  - teniendo
  - poseyendo
  lexicon: BDAG
  rationale: El participio presente se vierte con una subordinada relativa para que el español fluya con naturalidad y mantenga la relación con las descripciones anteriores.
- source_word: μόρφωσιν
  english_pob_choice: embodiment
  chosen_spanish: forma
  alternatives_spanish:
  - molde
  - configuración
  - expresión concreta
  lexicon: BDAG
  rationale: μόρφωσις puede significar forma, configuración o expresión. Dado que el audit trail inglés preserva la alternativa «form of knowledge and truth», «forma» mantiene la tensión léxica sin decidir demasiado por una paráfrasis más interpretativa.
- source_word: γνώσεως
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría
  - conocimiento pleno
  lexicon: BDAG
  rationale: γνῶσις se traduce de manera directa por «conocimiento». En español, «conocimiento» encaja bien con la pareja paralela «conocimiento y verdad».
- source_word: ἀληθείας
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - veracidad
  - realidad
  lexicon: BDAG
  rationale: ἀλήθεια se traduce naturalmente por «verdad», manteniendo la pareja paulina clásica con γνῶσις.
- source_word: ἐν τῷ νόμῳ
  english_pob_choice: in the law
  chosen_spanish: en la ley
  alternatives_spanish:
  - en la Ley
  - dentro de la ley
  lexicon: BDAG
  rationale: νόμος aquí se refiere a la ley mosaica como el ámbito dentro del cual se pretende poseer esa forma de conocimiento y verdad. En español, «la ley» reproduce bien la preposición y evita sobrerresaltar una mayúscula interpretativa.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia textual y no requiere cambios de revisión respecto del audit trail inglés. Se mantiene la estructura retórica y la ambigüedad léxica documentada en μόρφωσις mediante una nota alternativa.
  spanish_consistency_notes:
  - Se prefirió «la ley» en lugar de «la Ley» por consistencia con el uso contextual de νόμος como ámbito legal/covenantal, sin introducir una mayúscula no motivada por el texto.
  - Se evitó «siervo» porque no hay δοῦλος en el versículo; también se evitó suavizar el tono de ἀφρόνων.
  - La coordinación final «conocimiento y de la verdad» conserva el paralelo griego con repetición del artículo, naturalizado en español.
