review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: contraste entre quienes desobedecen a la verdad y obedecen a la ἀδικία, con el cierre elíptico «ira y furor». Sin embargo, «egoístas» no representa con suficiente precisión ἐξ ἐριθείας, que apunta más a una disposición de interés propio/ambición facciosa que a un rasgo genérico de egoísmo. Además, la decisión principal para ἀδικίᾳ debería alinearse mejor con el rastro POB en contexto paulino de juicio: en español conviene «injusticia» solo como alternativa, mientras que «injusticia» en el texto principal no preserva tan bien el peso teológico de «unrighteousness»; «injusticia» también produce una nota defectuosa y circular.'
  spanish_quality_summary: El español es generalmente claro, pero hay problemas de naturalidad y de edición. La colocación «son [a] egoístas» suena algo torpe con el marcador interpuesto; «buscan su propio interés» lee mejor y refleja el aspecto motivacional. La nota [b] es errónea porque ofrece «injusticia» como alternativa a «injusticia», sin contraste real, y repite el término. También conviene evitar el doble «pero» demasiado pesado; aun así, en este versículo el paralelismo antitético puede mantenerse con buena legibilidad.
  glossary_alignment: 'Alineación parcial. No hay términos de glosario mayor en conflicto salvo la gestión de ἀδικία. Dado el razonamiento auditado del inglés, la opción principal en español debería preservar el registro moral-teológico de «unrighteousness» mejor con «injusticia»/«injusticia»? En español la forma más fiel y legible es «injusticia» como alternativa y «injusticia» no resuelve la tensión doctrinal; por eso se recomienda «injusticia»? Mejor: usar «injusticia» no cambia nada. La solución adecuada es «maldad» solo si fuera necesario, pero aquí el mejor equivalente teológico y legible es «injusticia»? No: para el campo paulino del δικ- en español bíblico, «injusticia» es la forma estándar y aceptable, pero la nota debe explicar el sentido de oposición a la justicia de Dios. El principal problema de glosario no es la palabra en sí, sino la nota malformada y la falta de justificación coherente. También «egoístas» se aparta del matiz lexical auditado de self-seeking.'
  issues:
  - severity: medium
    issue: «egoístas» debilita el matiz de ἐξ ἐριθείας
    rationale: El griego señala una motivación de interés propio/ambición partidista; «egoístas» describe más un rasgo de carácter general. «buscan su propio interés» preserva mejor la idea fuente y coincide con la alternativa ya documentada.
  - severity: high
    issue: La nota [b] es defectuosa y circular
    rationale: 'Dice «O: “injusticia” para “injusticia”», lo cual no aporta alternativa real y parece un error editorial. Debe sustituirse por una nota útil, por ejemplo «O: “maldad”» o una explicación del sentido moral-teológico.'
  - severity: low
    issue: El anclaje de [a] dentro de «son [a] egoístas» entorpece la lectura
    rationale: El marcador queda mejor unido a la palabra o frase anotada, por ejemplo «interés[a]» o «egoístas[a]», para una lectura más fluida.
