revisions:
- from: 'Pero para los que son [a] egoístas y desobedecen a la verdad, pero obedecen a la injusticia[b]: ira y furor.'
  to: 'Pero para los que buscan su propio interés[a] y desobedecen a la verdad, pero obedecen a la injusticia[b]: ira y furor.'
  rationale: Se ajusta ἐξ ἐριθείας a una expresión española más fiel al matiz motivacional («buscan su propio interés»), manteniendo «son egoístas» solo como alternativa. Se corrige la nota [b], que era circular, para ofrecer una alternativa real y una aclaración teológica útil sobre ἀδικία. Se conserva «ira y furor» y la elipsis final, en línea con el griego y el rastro POB.
