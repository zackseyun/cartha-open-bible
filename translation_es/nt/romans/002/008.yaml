translation:
  language: es
  text: 'Pero para los que buscan su propio interés[a] y desobedecen a la verdad, pero obedecen a la injusticia[b]: ira y furor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «son egoístas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «maldad». «Injusticia» también puede entenderse en el sentido más amplio de oposición a la justicia de Dios.'
    reason: theological_note
lexical_decisions:
- source_word: ἐξ ἐριθείας
  english_pob_choice: self-seeking
  chosen_spanish: egoístas
  alternatives_spanish:
  - buscando su propio interés
  - ambiciosos por rivalidad
  lexicon: BDAG
  rationale: La frase expresa una motivación o procedencia interna. En español, «egoístas» comunica con naturalidad el impulso de centrarse en sí mismos, aunque «buscando su propio interés» conserva más explícitamente el matiz de búsqueda de provecho propio.
- source_word: ἀπειθοῦσι τῇ ἀληθείᾳ
  english_pob_choice: disobey the truth
  chosen_spanish: desobedecen a la verdad
  alternatives_spanish:
  - rechazan obedecer a la verdad
  - son desobedientes a la verdad
  lexicon: BDAG
  rationale: Se preserva el valor moral-volitivo de ἀπειθέω con «desobedecen», en paralelo con el resto de la cláusula. «La verdad» mantiene el referente concreto del dativo sin suavizarlo a una idea abstracta.
- source_word: πειθομένοις δὲ τῇ ἀδικίᾳ
  english_pob_choice: obey unrighteousness
  chosen_spanish: obedecen a la injusticia
  alternatives_spanish:
  - obedecen a la injusticia
  - se someten a la injusticia
  lexicon: BDAG
  rationale: El participio expresa la orientación contraria a la verdad. En español, «obedecen a la injusticia» conserva la estructura y el paralelismo; «se someten a la injusticia» es posible, pero menos directo para el contraste paulino.
- source_word: ἀδικίᾳ
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - injusticia
  - injustedad
  lexicon: BDAG
  rationale: Aunque «injusticia» puede sonar más relacional o social que «unrighteousness», aquí funciona bien en contraste con «verdad» y conserva el campo moral del pasaje. Se preserva la alternativa «injusticia» como la opción más natural en español.
- source_word: ὀργὴ
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - ira
  - indignación
  lexicon: BDAG
  rationale: «Ira» reproduce el tono judicial y serio del término. En español, «furor» ayuda a representar el segundo sustantivo del par sin perder la progresión intensiva.
- source_word: θυμός
  english_pob_choice: fury
  chosen_spanish: furor
  alternatives_spanish:
  - furia
  - rabia
  lexicon: BDAG
  rationale: El sustantivo intensifica ὀργή. «Furor» mantiene esa fuerza elevada en un registro bíblico y solemne; «furia» sería también posible, pero puede sonar algo más coloquial o violenta en español moderno.
theological_decisions:
- issue: ὀργή καὶ θυμός como par de juicio divino
  english_pob_reading: wrath and fury
  chosen_spanish_reading: ira y furor
  alternative_spanish_readings:
  - ira y furia
  - ira e indignación ardiente
  rationale: Se conserva el doblete sin diluirlo. «Ira» y «furor» permiten distinguir dos términos relacionados pero no idénticos, manteniendo la tensión retórica del juicio.
  doctrine_reference: 'DOCTRINE.md: términos de juicio divino; preservar distinción léxica entre ὀργή y θυμός'
- issue: ἀδικία en contexto paulino de oposición a la verdad
  english_pob_reading: unrighteousness
  chosen_spanish_reading: injusticia
  alternative_spanish_readings:
  - injusticia
  - maldad
  rationale: La frase opone verdad e injusticia en un marco moral. «Injusticia» es el equivalente español más claro y auditables para este contexto, sin borrar el componente ético-religioso del término.
  doctrine_reference: 'DOCTRINE.md: tensión justicia/injusticia en el campo δικ-'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que sustituyó una formulación más explicativa por «self-seeking» y ajustó la contraposición a una estructura más directa. La versión española refleja ese giro hacia mayor concisión, manteniendo el paralelismo entre desobedecer la verdad y obedecer la injusticia.
  spanish_consistency_notes:
  - Se usó «verdad» y «injusticia» con artículo definido en línea con el griego dativo articular.
  - Se mantuvo la estructura contrastiva con dos cláusulas introducidas por «pero» para reflejar el paralelismo del original.
  - Se eligió «ira y furor» para conservar el doblete léxico sin homogeneizarlo.
  - La nota a está anclada en «egoístas»; la nota b está anclada en «injusticia».
