    rationale: El griego sí tiene énfasis, pero en español la repetición de 'tú' antes de 'escaparás' resulta pesada. Puede mantenerse el énfasis con 'tú mismo' en la cláusula media sin repetir el pronombre en la final.
  - severity: low
