translation:
  language: es
  text: Pero ¿piensas[a] esto, oh hombre —tú que juzgas a los que practican tales cosas y tú mismo las haces—, que escaparás del juicio de Dios?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «persona». El griego usa un vocativo masculino singular que interpela a un ser humano representativo.
    reason: cultural_note
lexical_decisions:
- source_word: λογίζῃ
  english_pob_choice: do you suppose
  chosen_spanish: ¿piensas
  alternatives_spanish:
  - ¿supone
  - ¿consideras
  - ¿crees
  lexicon: BDAG
  rationale: El verbo expresa una evaluación mental o conclusión inferida. En español, «piensas» conserva la fuerza interrogativa y la censura retórica sin sonar forzado, y evita una formulación más pesada que no añade contenido.
- source_word: ἄνθρωπε
  english_pob_choice: O man
  chosen_spanish: oh hombre
  alternatives_spanish:
  - oh persona
  - oh ser humano
  lexicon: BDAG
  rationale: El vocativo griego es masculino singular y funciona como apelación representativa en el diatribe paulino. «Oh hombre» preserva esa forma y su valor retórico; «persona» diluiría la marcación gramatical y estilística.
- source_word: κρίνων
  english_pob_choice: judge
  chosen_spanish: juzgas
  alternatives_spanish:
  - condenas
  - emites juicio sobre
  lexicon: BDAG
  rationale: «Juzgar» es el equivalente directo del verbo en este contexto de evaluación moral. «Condenar» sería más fuerte de lo que exige el participio; «emites juicio sobre» resulta más explicativo que el griego.
- source_word: πράσσοντας
  english_pob_choice: practice
  chosen_spanish: practican
  alternatives_spanish:
  - hacen
  - cometen
  lexicon: BDAG
  rationale: Se mantiene la idea de conducta habitual o ejercitada. «Practican» conserva la distinción del audit trail inglés frente a ποιῶν y sugiere una conducta reiterada.
- source_word: ποιῶν
  english_pob_choice: do
  chosen_spanish: haces
  alternatives_spanish:
  - practicas
  - cometes
  lexicon: BDAG
  rationale: 'Se traduce distinto de πράσσοντας para conservar la variación léxica del griego. «Haces» es natural en español y permite expresar la acusación directa: «tú mismo las haces».'
- source_word: αὐτά
  english_pob_choice: them yourself
  chosen_spanish: las haces tú mismo
  alternatives_spanish:
  - las haces
  - las haces tú
  lexicon: BDAG
  rationale: El pronombre retoma «tales cosas» y la duplicación pronominal en español puede reforzar el énfasis del griego. «Tú mismo» reproduce bien la recriminación implícita y el contraste con el juicio ajeno.
- source_word: ἐκφεύξῃ
  english_pob_choice: will escape
  chosen_spanish: escaparás
  alternatives_spanish:
  - evitarás
  - saldrás librado
  lexicon: BDAG
  rationale: El futuro expresa la pregunta retórica sobre evadir una realidad venidera. «Escaparás» conserva la imagen de huida o evasión y sigue de cerca la fuerza del verbo.
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - veredicto
  lexicon: BDAG
  rationale: «Juicio» es la opción más clara y amplia para el acto judicial de Dios en este contexto. «Sentencia» estrecha demasiado el sentido; «veredicto» suena más técnico y menos natural aquí.
theological_decisions:
- issue: El alcance de ἄνθρωπε como vocativo representativo
  english_pob_reading: O man ... Greek 'man' is masculine singular and addresses a representative human being.
  chosen_spanish_reading: oh hombre ... vocativo masculino singular que interpela a un ser humano representativo
  alternative_spanish_readings:
  - oh persona
  - oh ser humano
  rationale: Se conserva la apelación masculina singular por fidelidad a la forma del texto y a la diatriba paulina. En español, «oh hombre» comunica mejor el golpe retórico y evita neutralizar una marcación que el griego sí presenta.
  doctrine_reference: Romanos 2:1-3; principio de lectura gramatical atenta al vocativo
- issue: La relación entre el juicio humano y el juicio de Dios
  english_pob_reading: that you will escape the judgment of God?
  chosen_spanish_reading: que tú escaparás del juicio de Dios?
  alternative_spanish_readings:
  - que escaparás del juicio de Dios?
  - que podrás evitar el juicio de Dios?
  rationale: La formulación mantiene la pregunta retórica sobre la imposibilidad de evadir el juicio divino. No se suaviza a simple posibilidad o evitación general, porque el griego proyecta una interrogación incisiva sobre la certeza del juicio de Dios.
  doctrine_reference: Romanos 2:2-3; justicia y juicio divinos
translation_notes:
  revision_awareness: Concordancia alta con el audit trail inglés y sin revisiones aplicadas en la fuente; se mantuvo la distinción léxica entre πράσσοντας y ποιῶν, así como el tono retórico de la pregunta.
  spanish_consistency_notes:
  - Se preserva «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se evita «condena» o «sentencia» para κρίμα porque el contexto apunta al juicio judicial amplio.
  - Se usa «juicio» en sentido forense, coherente con la acusación retórica de Pablo.
  - La duplicación «tú mismo» reproduce el énfasis de αὐτά y la recriminación directa del pasaje.
