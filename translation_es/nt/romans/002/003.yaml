  rationale: La revisión no cambia el sentido, pero mejora la fidelidad estilística y la legibilidad en español. Las rayas reproducen mejor la inserción apelativa del griego, se elimina el uso impropio de dos puntos dentro de la pregunta, y se evita la repetición innecesaria de 'tú' antes de 'escaparás' sin perder el énfasis ya expresado en 'tú mismo'.
