    rationale: '''¿piensas[a] esto'' es entendible, pero ''¿piensas esto[a]'' o mantener la nota sobre ''hombre'' sería más limpio; no obstante, el contenido de la nota es correcto y puede conservarse si el anclaje se deja en el mismo segmento traducido.'
  revised_spanish_text: Pero ¿piensas[a] esto, oh hombre —tú que juzgas a los que practican tales cosas y tú mismo las haces—, que escaparás del juicio de Dios?
