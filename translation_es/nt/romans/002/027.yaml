  text: καὶ κρινεῖ ἡ ἐκ φύσεως ἀκροβυστία τὸν νόμον τελοῦσα σὲ τὸν διὰ γράμματος καὶ περιτομῆς παραβάτην νόμου.
base_translation:
  language: en
  yaml_path: translation/nt/romans/002/027.yaml
  text: And the uncircumcised person by nature[a], if he fulfills the law, will judge you who, with the letter and circumcision[b], are a transgressor of the law.
  footnotes:
  - marker: a
    text: Literally, 'the uncircumcision'; that is, an uncircumcised person.
    reason: lexical_alternative
  - marker: b
    text: '''Through the letter'' may also be rendered ''with the written code.'''
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4
    prompt_id: nt_draft_v1
    prompt_sha256: 95aa47fc1376ffed2840b4731d3225e59cd5f2c3ac1b5fc8a1f8873e7e57c992
    timestamp: '2026-04-17T22:54:22Z'
    output_hash: c827e2d341c28d75a63f552dfe9d7467d7c7477367acb538bd0e2bf92b395ac4
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:00:42Z'
    unchanged: false
    changes_summary: Replaced 'while fulfilling' with 'if he fulfills' to better reflect the participle's conditional sense in context, and changed 'through the letter and circumcision' to 'with the letter and circumcision' for more natural rendering of διὰ here.
translation:
  language: es
  text: Y el incircunciso[a] por naturaleza, si cumple la ley, te juzgará a ti, que con la letra[b] y la circuncisión eres transgresor de la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la incircuncisión»; es decir, un incircunciso.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «con el código escrito».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκροβυστία
  english_pob_choice: the uncircumcised person
  chosen_spanish: el incircunciso
  alternatives_spanish:
  - la incircuncisión
  - la persona incircuncisa
  - el no circuncidado
  lexicon: BDAG
  rationale: El griego usa el sustantivo abstracto metonímicamente para una persona. En español, “el incircunciso” conserva el referente personal sin convertirlo en una etiqueta étnica más amplia que el texto no nombra explícitamente.
- source_word: ἐκ φύσεως
  english_pob_choice: by nature
  chosen_spanish: por naturaleza
  alternatives_spanish:
  - naturalmente
  - desde su naturaleza
  lexicon: BDAG
  rationale: “Por naturaleza” es la forma más directa y natural en español para mantener el contraste paulino entre condición natural y circuncisión recibida.
- source_word: τελοῦσα
  english_pob_choice: if he fulfills
  chosen_spanish: si cumple
  alternatives_spanish:
  - si guarda
  - si observa
  - si lleva a cabo
  lexicon: BDAG
  rationale: El participio expresa la idea de cumplir efectivamente la ley en el contexto argumentativo. “Cumple” comunica esa idea con claridad y sin perder la relación con la ley.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: Se mantiene el término común “ley” para reflejar la referencia mosaica en el contexto, con suficiente claridad para lectura pública.
- source_word: διὰ γράμματος
  english_pob_choice: with the letter
  chosen_spanish: con la letra
  alternatives_spanish:
  - por la letra
  - con el escrito
  - con el código escrito
  lexicon: BDAG
  rationale: La construcción se traduce de manera sobria y cercana al griego. “Con la letra” preserva la tensión interpretativa documentada en el audit trail, sin resolverla prematuramente en “código escrito”.
- source_word: περιτομῆς
  english_pob_choice: circumcision
  chosen_spanish: circuncisión
  alternatives_spanish:
  - circuncidarción
  lexicon: BDAG
  rationale: “Circuncisión” es el equivalente normal y preciso del signo del pacto, y coincide con el uso del POB inglés.
- source_word: παραβάτην νόμου
  english_pob_choice: a transgressor of the law
  chosen_spanish: transgresor de la ley
  alternatives_spanish:
  - quebrantador de la ley
  - violador de la ley
  - infractor de la ley
  lexicon: BDAG
  rationale: La frase conserva la relación explícita con νόμος. “Transgresor de la ley” es fiel, claro y no aplana la formulación griega a un solo sustantivo más idiomático.
theological_decisions:
- issue: Si traducir ἀκροβυστία como una categoría étnica amplia o mantener el contraste literal circuncisión/uncircuncisión
  english_pob_reading: Retain the narrower expression 'the uncircumcised person' in the main text.
  chosen_spanish_reading: Mantener “el incircunciso” en el texto principal.
  alternative_spanish_readings:
  - el gentil
  - el no judío
  rationale: El pasaje contrapone de forma explícita circuncisión e incircuncisión. Traducir “gentil” resolvería la tensión hacia una categoría más amplia que la del griego, por lo que se conserva la formulación más cercana al contraste textual.
  doctrine_reference: Preservar la tensión exegética sin sobredeterminarla
- issue: Cómo reflejar la condición condicional del participio τελοῦσα en la cláusula
  english_pob_reading: if he fulfills the law
  chosen_spanish_reading: si cumple la ley
  alternative_spanish_readings:
  - mientras cumple la ley
  - al cumplir la ley
  rationale: El contexto del argumento favorece una lectura condicional. “Si cumple” reproduce mejor esa función que una lectura meramente simultánea.
  doctrine_reference: Gramática del participio en contexto
- issue: Cómo rendir διὰ γράμματος sin borrar la alternativa interpretativa registrada por el POB
  english_pob_reading: '''Through the letter'' may also be rendered ''with the written code.'''
  chosen_spanish_reading: “con la letra” en el texto principal
  alternative_spanish_readings:
  - con el código escrito
  - por medio de la letra
  rationale: “Con la letra” mantiene la concisión del texto y deja abierta la ambigüedad entre referencia a lo escrito y a la forma literal de la ley, tal como indica el audit trail.
  doctrine_reference: Ambigüedad léxica preservada
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail al elegir una construcción condicional («si cumple») y una preposición más natural («con la letra») para διὰ γράμματος, en lugar de una traducción más mecánica. La versión final mantiene el contraste textual entre circuncisión e incircuncisión y evita resolverlo en una categoría étnica no explícita en el griego.
  spanish_consistency_notes:
  - 'Se conserva la terminología paulina directa: ley, circuncisión, transgresor.'
  - Se evita “SEÑOR” u otras sustituciones no presentes en el verso.
  - Las notas [a] y [b] están ancladas exactamente en el texto principal.
  - El registro mantiene un español público, claro y reverente, sin arcaísmos innecesarios.
