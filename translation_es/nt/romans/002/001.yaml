translation:
  language: es
  text: Por tanto, no tienes excusa[a], oh hombre, todo el que juzga. Porque al juzgar a otro, te condenas a ti mismo, pues tú, que juzgas, practicas las mismas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'oh persona' / 'oh ser humano'. El griego usa un masculino singular con fuerza representativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: Expresa bien la inferencia lógica del argumento anterior y suena natural en español bíblico actual sin perder el enlace argumental.
- source_word: ἀναπολόγητος
  english_pob_choice: without excuse
  chosen_spanish: inexcusable
  alternatives_spanish:
  - sin excusa
  - sin defensa
  lexicon: BDAG
  rationale: Mantiene el sentido forense de estar sin defensa válida ante el juicio. 'Inexcusable' conserva la fuerza judicial de una sola pieza en español.
- source_word: ὦ ἄνθρωπε
  english_pob_choice: O man
  chosen_spanish: oh hombre
  alternatives_spanish:
  - oh persona
  - oh ser humano
  lexicon: BDAG
  rationale: Conserva el vocativo masculino singular del griego y su tono retórico directo. En español, 'hombre' comunica la forma del texto fuente; la nota preserva la alternativa inclusiva.
- source_word: πᾶς ὁ κρίνων
  english_pob_choice: every one who judges
  chosen_spanish: todo el que juzga
  alternatives_spanish:
  - cada uno que juzga
  - quien juzga
  lexicon: BDAG
  rationale: Reproduce la fuerza universalizadora de πᾶς y el participio sustantivado sin volver la frase torpe en español. 'Todo el que' es natural y preciso.
- source_word: ἐν ᾧ γὰρ κρίνεις τὸν ἕτερον
  english_pob_choice: in passing judgment on another
  chosen_spanish: al juzgar a otro
  alternatives_spanish:
  - cuando juzgas a otro
  - en juzgar a otro
  - por el juicio con que juzgas a otro
  lexicon: BDAG
  rationale: La construcción griega combina matiz instrumental y temporal; en español, 'al juzgar' comunica la simultaneidad de la acción y su función causal de modo natural.
- source_word: τὸν ἕτερον
  english_pob_choice: another
  chosen_spanish: a otro
  alternatives_spanish:
  - al otro
  - a la otra persona
  lexicon: BDAG
  rationale: '''Otro'' conserva la oposición con el propio yo y evita sobreespecificar. El artículo indefinido en español queda implícito con la preposición ''a''.'
- source_word: κατακρίνεις
  english_pob_choice: you condemn
  chosen_spanish: te condenas
  alternatives_spanish:
  - te condenas a ti mismo
  - pronuncias condena sobre ti
  lexicon: BDAG
  rationale: En el contexto, el verbo requiere reflexividad explícita en español para reflejar que el juicio recaen sobre el propio sujeto. 'Te condenas' preserva la fuerza judicial del término.
- source_word: τὰ γὰρ αὐτὰ πράσσεις
  english_pob_choice: because you who judge practice the same things
  chosen_spanish: pues tú, que juzgas, practicas las mismas cosas
  alternatives_spanish:
  - porque tú, que juzgas, haces las mismas cosas
  - ya que tú, que juzgas, haces lo mismo
  lexicon: BDAG
  rationale: '''Practicas'' traduce bien πράσσω como conducta sostenida, no solo un acto aislado. ''Las mismas cosas'' mantiene la correspondencia enfática con el griego.'
- source_word: ὁ κρίνων
  english_pob_choice: you who judge
  chosen_spanish: tú, que juzgas
  alternatives_spanish:
  - el que juzga
  - quien juzga
  lexicon: BDAG
  rationale: La segunda persona directa reproduce el reproche del original y da fluidez al español. Se mantiene la función participial de identificación del destinatario.
theological_decisions:
- issue: Alcance representativo del vocativo masculino
  english_pob_reading: Retain 'O man' in the main text, with an inclusive lexical alternative footnoted.
  chosen_spanish_reading: Conservar 'oh hombre' en el texto principal, con nota que preserve la alternativa inclusiva.
  alternative_spanish_readings:
  - oh persona
  - oh ser humano
  rationale: El griego usa ἄνθρωπε en vocativo masculino singular con fuerza representativa. Para no borrar esa forma ni su tono admonitorio, el texto principal conserva 'hombre'; la nota evita que se pierda el sentido genérico/representativo.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Valor judicial de 'ἀναπολόγητος' y de 'κατακρίνεις'
  english_pob_reading: without excuse / you condemn
  chosen_spanish_reading: inexcusable / te condenas
  alternative_spanish_readings:
  - sin excusa / te condenas a ti mismo
  - sin defensa / pronuncias condena sobre ti
  rationale: 'El pasaje se mueve en un marco forense: falta de defensa y auto-condena. ''Inexcusable'' y ''te condenas'' sostienen ese lenguaje judicial sin diluirlo en mera desaprobación moral.'
  doctrine_reference: Translation philosophy §2 (Preserve lexical force where doctrinally/argumentatively significant)
translation_notes:
  revision_awareness: Se siguió el audit trail inglés y no hubo revisiones posteriores que alteraran el sentido base. La redacción española preserva la lógica inferencial, el matiz forense y la carga retórica del original griego, ajustando la construcción a un español natural.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó 'juzgar'/'juicio' en sentido judicial-ético, acorde con κρίνω/κατακρίνω en el contexto.
  - Se preservó el vocativo masculino representativo con nota explicativa, siguiendo la política del proyecto para ἄνθρωπος.
