translation:
  language: es
  text: vida eterna para los que, con perseverancia en buena obra, buscan gloria, honor e inmortalidad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθ’ ὑπομονὴν
  english_pob_choice: by perseverance
  chosen_spanish: con perseverancia
  alternatives_spanish:
  - por perseverancia
  - en perseverancia
  - con paciente perseverancia
  lexicon: BDAG
  rationale: La construcción con κατά + acusativo expresa aquí modo o norma. «Con perseverancia» comunica de manera natural en español la idea de una constancia sostenida, sin añadir intensidad interpretativa que el griego no exige.
- source_word: ἔργου ἀγαθοῦ
  english_pob_choice: in good work
  chosen_spanish: en buena obra
  alternatives_spanish:
  - en buen trabajo
  - en hacer el bien
  - en obra buena
  lexicon: BDAG
  rationale: El singular griego («obra buena») se mantiene con «buena obra» para respetar la forma del texto. «Obra» preserva mejor el paralelo moral y paulino que «trabajo», y evita diluir la referencia concreta a una obra caracterizada por el bien.
- source_word: ζητοῦσιν
  english_pob_choice: seek
  chosen_spanish: buscan
  alternatives_spanish:
  - buscan ansiosamente
  - persiguen
  - buscan continuamente
  lexicon: BDAG
  rationale: El participio presenta una orientación sostenida. «Buscan» es el equivalente natural y directo en español, y conserva la idea de una dirección constante sin sobrecargarla con matices de intensidad.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  lexicon: BDAG
  rationale: «Gloria» es la correspondencia más transparente y estable en español bíblico para δόξα, especialmente en un contexto moral y escatológico.
- source_word: τιμήν
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - estima
  lexicon: BDAG
  rationale: «Honor» es el equivalente directo y mantiene el balance retórico de la lista junto con «gloria».
- source_word: ἀφθαρσίαν
  english_pob_choice: immortality
  chosen_spanish: inmortalidad
  alternatives_spanish:
  - incorruptibilidad
  - imperdurabilidad
  lexicon: BDAG
  rationale: En este contexto escatológico, «inmortalidad» es el término español más claro y natural. Aunque ἀφθαρσίαν puede abarcar incorruptibilidad o imperishabilidad, el equivalente elegido expresa bien el destino final implícito en la lista.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida perdurable
  - vida sempiternal
  lexicon: BDAG
  rationale: «Vida eterna» es la traducción estable y más transparente para la expresión paulina ζωὴν αἰώνιον, conservando su sentido durativo y escatológico.
theological_decisions:
- issue: Relación de la frase con el verbo implícito del versículo anterior
  english_pob_reading: The English supplies a complete sense as 'eternal life to those who...,' carrying forward the implied recompense from Romans 2:6 without adding theological interpretation beyond the syntax.
  chosen_spanish_reading: Se deja el sentido completo en español como «vida eterna para los que...», retomando la recompensa implícita del versículo anterior sin introducir una interpretación adicional.
  alternative_spanish_readings:
  - «a los que... vida eterna»
  - «vida eterna para aquellos que...»
  rationale: El griego depende sintácticamente del versículo previo. En español conviene explicitar la relación con una formulación fluida y legible, manteniendo el vínculo con la retribución implícita sin alterar el contenido.
  doctrine_reference: Romanos 2:6-7; retribución según las obras, dentro de la secuencia argumental de Pablo
translation_notes:
  revision_awareness: El texto sigue el último estado del audit trail inglés, que consolidó la frase «in good work» para reflejar con mayor precisión el singular ἔργου ἀγαθοῦ. La versión española refleja ese ajuste mediante «en buena obra», manteniendo la misma fidelidad formal y naturalidad idiomática.
  spanish_consistency_notes:
  - Se usa «vida eterna» de forma estable para ζωὴν αἰώνιον.
  - Se mantiene «gloria, honor e inmortalidad» como tríada sin expansión explicativa.
  - No se introduce «Cristo» ni terminología no presente en el verso.
  - El orden final prioriza fluidez española, pero conserva el encadenamiento semántico del griego.
