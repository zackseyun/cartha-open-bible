translation:
  language: es
  text: Porque el nombre de Dios es blasfemado entre los gentiles[a] a causa de ustedes, tal como está escrito[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre las naciones».'
    reason: lexical_alternative
  - marker: b
    text: Pablo está haciendo eco de la Escritura, especialmente Isaías 52:5 y temas también reflejados en Ezequiel 36:20–23.
    reason: cross_reference
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación del reproche anterior; «Porque» conserva bien la conexión discursiva y suena natural en español bíblico contemporáneo.
- source_word: ὄνομα
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - reputación
  - renombre
  lexicon: BDAG
  rationale: El griego dice «nombre»; en este contexto puede incluir el honor o la reputación de Dios, pero no conviene sustituirlo en el texto principal sin necesidad.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: '«Dios» es la correspondencia directa y mantiene la construcción genitiva simple: «el nombre de Dios».'
- source_word: δι’ ὑμᾶς
  english_pob_choice: because of you
  chosen_spanish: a causa de ustedes
  alternatives_spanish:
  - por ustedes
  - por causa de ustedes
  lexicon: BDAG
  rationale: διά con acusativo expresa causa; «a causa de ustedes» comunica con claridad la acusación de Pablo en español natural.
- source_word: βλασφημεῖται
  english_pob_choice: is blasphemed
  chosen_spanish: es blasfemado
  alternatives_spanish:
  - es blasfemado públicamente
  - es maldecido
  lexicon: BDAG
  rationale: «Blasfemar» conserva el peso religioso del verbo; «es blasfemado» refleja el pasivo presente sin rebajarlo a mera injuria o difamación.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the Gentiles
  chosen_spanish: entre los gentiles
  alternatives_spanish:
  - entre las naciones
  - entre las naciones gentiles
  lexicon: BDAG
  rationale: En el marco paulino, ἔθνη remite de forma natural a los gentiles. Se mantiene «gentiles» en el texto principal y se preserva la alternativa «naciones» en nota.
- source_word: καθὼς γέγραπται
  english_pob_choice: just as it is written
  chosen_spanish: tal como está escrito
  alternatives_spanish:
  - como está escrito
  - justamente como está escrito
  lexicon: BDAG
  rationale: La fórmula introduce una cita o alusión escrituraria; «tal como está escrito» es fiel y fluido en español.
theological_decisions:
- issue: 'Alcance de ἔθνη: gentiles vs. naciones'
  english_pob_reading: among the Gentiles
  chosen_spanish_reading: entre los gentiles
  alternative_spanish_readings:
  - entre las naciones
  rationale: El contexto de Romanos 2 contrasta judíos y gentiles; por eso «gentiles» comunica mejor el referente humano del pasaje. Se deja constancia de la alternativa lexicalmente posible.
  doctrine_reference: Romanos 2:24; cf. Romanos 3:29-30
- issue: 'Sentido de βλασφημεῖται: injuria común o ofensa contra Dios'
  english_pob_reading: is blasphemed
  chosen_spanish_reading: es blasfemado
  alternative_spanish_readings:
  - es injuriado
  - es difamado
  rationale: Pablo no describe sólo daño reputacional; el verbo apunta a hablar impíamente contra Dios. «Es blasfemado» conserva esa fuerza teológica.
  doctrine_reference: Éxodo 20:7; Isaías 52:5
translation_notes:
  revision_awareness: El testimonio de revisión indica alta concordancia con el texto fuente y sin cambios sustantivos en la versión inglesa auditada; por ello, la redacción española sigue de cerca la estructura griega sin añadir paráfrasis.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «gentiles» para ἔθνεσιν, con nota de alternativa lexical.
  - «Tal como está escrito» conserva la fórmula escrituraria sin endurecerla innecesariamente.
  - El tono es formal y publicable, evitando tanto arcaísmos excesivos como banalización del reproche paulino.
