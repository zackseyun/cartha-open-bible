- from: Pero el judío lo es en lo interior[a], y la circuncisión es la del corazón, en espíritu, no en letra[b] —de quien la alabanza no proviene de los hombres, sino de Dios.
  to: Pero el judío lo es en lo interior[a], y la circuncisión es la del corazón, en espíritu, no en letra[b], cuya alabanza no proviene de las personas, sino de Dios.
