translation:
  language: es
  text: Pero el judío lo es en lo interior[a], y la circuncisión es la del corazón, en espíritu, no en letra[b], cuya alabanza no proviene de las personas, sino de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en lo escondido», es decir, en la realidad interior y no solo en lo visible exterior.'
    reason: alternative_reading
  - marker: b
    text: 'O: «en el Espíritu», si se entiende πνεύματι como referencia al Espíritu Santo; el texto también puede leerse como una contraposición entre realidad espiritual e instrucción escrita.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ κρυπτῷ
  english_pob_choice: inwardly
  chosen_spanish: en lo interior
  alternatives_spanish:
  - en secreto
  - en lo oculto
  - en la parte escondida
  lexicon: BDAG
  rationale: La idea no es meramente “en secreto”, sino una realidad interna/oculta en contraste con lo externo; “en lo interior” conserva ese contraste de manera natural en español.
- source_word: Ἰουδαῖος
  english_pob_choice: Jew
  chosen_spanish: judío
  alternatives_spanish:
  - judeano
  lexicon: BDAG
  rationale: En Romanos 2 el contraste es religioso y del pacto, no geográfico; “judío” comunica mejor el argumento paulino que “judeano”.
- source_word: περιτομὴ καρδίας
  english_pob_choice: circumcision is of the heart
  chosen_spanish: la circuncisión es la del corazón
  alternatives_spanish:
  - circuncisión del corazón
  - la circuncisión del corazón
  lexicon: BDAG
  rationale: Mantiene la metáfora con un giro natural en español y deja claro que la verdadera circuncisión es la del corazón, no solo la física.
- source_word: ἐν πνεύματι
  english_pob_choice: in spirit
  chosen_spanish: en espíritu
  alternatives_spanish:
  - por el Espíritu
  - en el Espíritu
  lexicon: BDAG
  rationale: La audiencia española puede leer la frase como referida al Espíritu Santo o al ámbito espiritual/interno; “en espíritu” preserva esa tensión sin resolverla prematuramente.
- source_word: οὐ γράμματι
  english_pob_choice: not in letter
  chosen_spanish: no en letra
  alternatives_spanish:
  - no por la letra
  - no según la letra
  lexicon: BDAG
  rationale: “Letra” reproduce el contraste paulino con πνεῦμα/espíritu y evita sobreinterpretar la expresión como “código escrito” si el contexto no lo exige.
- source_word: οὗ ὁ ἔπαινος
  english_pob_choice: whose praise
  chosen_spanish: de quien la alabanza
  alternatives_spanish:
  - cuya alabanza
  - su alabanza
  lexicon: BDAG
  rationale: “De quien” enlaza con el antecedente y conserva el matiz relativo del griego sin forzar una frase posesiva menos transparente.
- source_word: ἐξ ἀνθρώπων
  english_pob_choice: from people
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de la gente
  - de las personas
  lexicon: BDAG
  rationale: El plural genérico puede expresarse de forma tradicional y sobria como “los hombres”; aquí no hay necesidad de recalibrar el género porque el contraste retórico es con Dios.
- source_word: ἐκ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - por Dios
  - procedente de Dios
  lexicon: BDAG
  rationale: Traducción directa y natural de la fuente griega; no se requiere expansión interpretativa.
theological_decisions:
- issue: 'Sentido de ἐν πνεύματι: Espíritu Santo o espíritu humano / interioridad espiritual'
  english_pob_reading: The English audit trail preserved the ambiguity in the main text while noting that the Holy Spirit is the more likely Pauline referent, but without forcing the issue.
  chosen_spanish_reading: en espíritu
  alternative_spanish_readings:
  - por el Espíritu
  - en el Espíritu
  - en el espíritu humano
  rationale: 'La formulación española mantiene abierta la misma tensión documentada por el POB inglés: puede leerse como esfera/realidad espiritual o como referencia al Espíritu Santo, sin cerrar indebidamente el debate.'
  doctrine_reference: Preservar ambigüedad genuina; no resolver donde el texto y el audit trail señalan tensión interpretativa.
- issue: Contraste retórico entre elogio humano y elogio de Dios
  english_pob_reading: whose praise is not from people but from God
  chosen_spanish_reading: de quien la alabanza no proviene de los hombres, sino de Dios
  alternative_spanish_readings:
  - cuyo elogio no viene de la gente, sino de Dios
  - cuya alabanza no es de los hombres, sino de Dios
  rationale: La construcción resalta el origen del reconocimiento, que en el argumento de Pablo no depende de aprobación humana sino divina.
  doctrine_reference: Prioridad del juicio y aprobación de Dios sobre la de los seres humanos.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB inglés al reflejar ἐν πνεύματι οὐ γράμματι como “en espíritu, no en letra”, en lugar de “por el Espíritu, no por la letra”, para no decidir de manera cerrada la interpretación de πνεύματι. También conserva el giro relativo de οὗ ὁ ἔπαινος y el contraste final entre aprobación humana y divina.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino explícito; aquí el texto dice θεοῦ, por lo que corresponde «Dios».
  - Se conserva «judío» para Ἰουδαῖος por la naturaleza covenantal del argumento en Romanos 2.
  - Se usa «circuncisión» de forma literal y metafórica para preservar la imagen paulina sin paraphrasearla.
  - Se deja «en espíritu» sin mayúsculas en el texto principal para no resolver la referencia de πνεύματι; la nota ofrece la lectura del Espíritu Santo como alternativa.
  - «De los hombres» mantiene el contraste plural genérico con «Dios» y no requiere un giro más inclusivo para la fuerza retórica del versículo.
