    text: 'O: «en lo escondido», es decir, en la realidad interior y no solo en lo visible exterior.'
    reason: alternative_reading
  - marker: b
    text: 'O: «en el Espíritu», si se entiende πνεύματι como referencia al Espíritu Santo; el texto también puede leerse como una contraposición entre realidad espiritual e instrucción escrita.'
    reason: alternative_reading
  revision_rationale: Se corrige la sintaxis relativa y la puntuación para un español más natural y fielmente legible, sin cambiar el sentido. También se ajusta 'de los hombres' a 'de las personas' para reflejar mejor el valor genérico de ἀνθρώπων en español neutral contemporáneo, en línea con el audit trail inglés.
