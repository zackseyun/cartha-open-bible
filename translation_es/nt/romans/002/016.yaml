translation:
  language: es
  text: en el día en que Dios juzga los secretos de las personas por medio de Mesías Jesús[a], conforme a mi evangelio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por medio de Cristo Jesús».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ἡμέρᾳ ὅτε
  english_pob_choice: on the day when
  chosen_spanish: en el día cuando
  alternatives_spanish:
  - en el día en que
  - cuando
  lexicon: BDAG
  rationale: Conserva la construcción temporal explícita y la referencia a un día definido de juicio, sin volverlo demasiado libre. En español, «en el día cuando» es entendible y sigue de cerca la relación temporal del griego.
- source_word: κρίνει
  english_pob_choice: judges
  chosen_spanish: juzga
  alternatives_spanish:
  - juzgará
  lexicon: BDAG
  rationale: El presente indicativo en un marco escatológico puede mantenerse en español como presente gnómico/profético. «Juzga» conserva la forma verbal y la inmediatez del original.
- source_word: τὰ κρυπτὰ
  english_pob_choice: the secrets
  chosen_spanish: los secretos
  alternatives_spanish:
  - las cosas ocultas
  - las cosas secretas
  lexicon: BDAG
  rationale: «Los secretos» reproduce bien el sustantivo plural neutro y comunica lo oculto interior o no manifiesto sin sobreexplicar.
- source_word: τῶν ἀνθρώπων
  english_pob_choice: of people
  chosen_spanish: de las personas
  alternatives_spanish:
  - de los seres humanos
  - de los hombres
  lexicon: BDAG
  rationale: Es un genérico humano, no masculino. «Las personas» es claro, natural y evita la ambigüedad de género.
- source_word: κατὰ τὸ εὐαγγέλιόν μου
  english_pob_choice: according to my gospel
  chosen_spanish: conforme a mi evangelio
  alternatives_spanish:
  - según mi evangelio
  - de acuerdo con mi evangelio
  lexicon: BDAG
  rationale: «Conforme a» conserva la relación normativa/criterial de κατά con acusativo. «Evangelio» mantiene el término paulino estándar y el posesivo «mi» reproduce el matiz personal.
- source_word: διὰ Χριστοῦ Ἰησοῦ
  english_pob_choice: through Messiah Jesus
  chosen_spanish: por medio de Mesías Jesús
  alternatives_spanish:
  - por medio de Cristo Jesús
  - a través de Mesías Jesús
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o agencia; «por medio de» es la opción española más clara. Se conserva «Mesías» como rendimiento titular de Χριστός, de acuerdo con la política doctrinal del proyecto.
theological_decisions:
- issue: Renderización de Χριστοῦ como título o forma nombre-like
  english_pob_reading: through Messiah Jesus
  chosen_spanish_reading: por medio de Mesías Jesús
  alternative_spanish_readings:
  - por medio de Cristo Jesús
  rationale: El contexto mantiene fuerza titulary no requiere la forma litúrgica tradicional. «Mesías» preserva la decisión doctrinal del POB de traducir Χριστός cuando funciona como título.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título; Cristo sólo en excepciones justificadas'
translation_notes:
  revision_awareness: 'El paquete inglés pasó por una revisión que reemplazó temporalmente «Messiah Jesus» por «Christ Jesus», pero la corrección posterior restauró «Messiah» según la política doctrinal. La versión española sigue la lectura más reciente y estable del audit trail: Χριστός como título → Mesías.'
  spanish_consistency_notes:
  - Se mantiene el orden natural del español, pero sin perder la estructura temporal y causal del griego.
  - «Dios» se conserva como sujeto explícito, conforme al texto griego.
  - No se usa «SEÑOR» ni se oculta el nombre divino, porque aquí no aparece el Tetragrámaton.
  - El marcador de nota [a] aparece anclado directamente en la frase traducida para cumplir la trazabilidad editorial.
