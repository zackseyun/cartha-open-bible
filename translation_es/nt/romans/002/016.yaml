review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general el sentido del griego: día de juicio, Dios como sujeto, los secretos de la humanidad, el criterio de ''mi evangelio'' y la mediación de Mesías Jesús. Sin embargo, el orden sintáctico español actual separa de forma menos natural ''por medio de Mesías Jesús'' de ''juzga'', y ''en el día cuando'' suena calco del inglés/griego más que español natural. Además, la nota al pie está anclada en ''las personas'' aunque la variante corresponde a ''Mesías Jesús/Cristo Jesús''.'
  spanish_quality_summary: El texto es comprensible, pero 'en el día cuando' no es idiomático en español bíblico moderno; 'en el día en que' sí lo es. También conviene acercar 'por medio de Mesías Jesús' al verbo para reflejar mejor la relación de διά con el acto de juzgar. 'Los secretos de las personas' y 'conforme a mi evangelio' son aceptables y legibles.
  glossary_alignment: Buen alineamiento con la política del proyecto en 'Mesías Jesús' frente a la alternativa 'Cristo Jesús'. 'Dios', 'evangelio' y el resto de la terminología están bien. No hay conflicto con los términos doctrinales principales; la corrección necesaria es de sintaxis/anchura de nota, no de glosario.
  issues:
  - severity: medium
    issue: 'Construcción temporal poco natural: ''en el día cuando'''
    rationale: Aunque sigue de cerca el original, en español natural y digno la construcción esperable es 'en el día en que' o, más libremente, 'el día que'. La forma actual suena calcada.
  - severity: medium
    issue: Anclaje incorrecto de la nota al pie
    rationale: 'La nota ''O: «por medio de Cristo Jesús»'' debe ir anclada en la expresión ''Mesías Jesús'', no en ''las personas'', porque esa es la unidad léxica alternativa documentada.'
  - severity: low
    issue: Orden sintáctico menos claro para la relación de 'por medio de'
    rationale: En el borrador, 'por medio de Mesías Jesús' queda después de 'conforme a mi evangelio', lo que debilita en español su vínculo inmediato con 'juzga'. Reordenarlo mejora fidelidad y fluidez sin cambiar el sentido.
  revised_spanish_text: en el día en que Dios juzga los secretos de las personas por medio de Mesías Jesús[a], conforme a mi evangelio.
  revised_footnotes:
  - marker: a
    text: 'O: «por medio de Cristo Jesús».'
    reason: alternative_reading
  revision_rationale: Se corrige el calco 'en el día cuando' a 'en el día en que' para un español natural y formal; se reubica 'por medio de Mesías Jesús' junto al verbo para reflejar mejor διά con genitivo; y se mueve la nota al término correcto, ya que la alternativa textual/traslativa afecta a 'Mesías Jesús', no a 'las personas'.
