translation:
  language: es
  text: 'Tú que dices: «No cometas adulterio», ¿cometes adulterio? Tú que aborreces los ídolos, ¿saqueas templos?[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, en sentido más amplio, «¿cometes sacrilegio?»
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λέγων
  english_pob_choice: You who say
  chosen_spanish: Tú que dices
  alternatives_spanish:
  - El que dice
  - Tú, el que dices
  lexicon: BDAG
  rationale: El artículo con participio presente funciona de modo sustantivo y se dirige retóricamente a una persona representativa. En español, «Tú que dices» conserva la interpelación directa y suena natural sin perder el valor del participio.
- source_word: μὴ μοιχεύειν
  english_pob_choice: Do not commit adultery
  chosen_spanish: No cometas adulterio
  alternatives_spanish:
  - No adulteres
  - No seas adúltero
  lexicon: BDAG
  rationale: El infinitivo con μή expresa el contenido de una prohibición. «Cometer adulterio» es la equivalencia más precisa y clara en español para μοιχεύω en este contexto.
- source_word: μοιχεύεις
  english_pob_choice: do you commit adultery
  chosen_spanish: ¿cometes adulterio?
  alternatives_spanish:
  - ¿estás cometiendo adulterio?
  lexicon: BDAG
  rationale: El presente indicativo conserva el tono acusatorio y retórico de la diatriba paulina. El presente simple en español reproduce mejor esa fuerza que una perífrasis progresiva.
- source_word: ὁ βδελυσσόμενος
  english_pob_choice: You who detest
  chosen_spanish: Tú que aborreces
  alternatives_spanish:
  - Tú que detestas
  - El que aborrece
  lexicon: BDAG
  rationale: βδελύσσομαι expresa fuerte repulsión. «Aborrecer» comunica bien esa intensidad en español y evita una posible debilidad semántica de opciones más suaves.
- source_word: τὰ εἴδωλα
  english_pob_choice: idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - las imágenes
  - las imágenes idolátricas
  lexicon: BDAG
  rationale: En este contexto εἴδωλα se refiere a ídolos o imágenes cultuales. «Ídolos» es la forma más directa y reconocible en español.
- source_word: ἱεροσυλεῖς
  english_pob_choice: do you rob temples
  chosen_spanish: ¿robas los templos?
  alternatives_spanish:
  - ¿cometes sacrilegio?
  - ¿saqueas los templos?
  lexicon: BDAG
  rationale: ἱεροσυλέω denota de manera concreta el robo o saqueo de templos, no solo una irreverencia abstracta. «Robas los templos» preserva la ironía histórica y la concreción del texto.
theological_decisions:
- issue: La posible amplitud de ἱεροσυλεῖς entre robo concreto y sacrilegio general
  english_pob_reading: 'do you rob temples; footnote: Or, more broadly, “do you commit sacrilege?”'
  chosen_spanish_reading: ¿robas los templos?[a]
  alternative_spanish_readings:
  - ¿cometes sacrilegio?
  - ¿saqueas los templos?
  rationale: Se mantiene la lectura concreta principal por ser la más cercana al verbo griego y al contexto de ironía contra quien aborrece ídolos. La nota conserva la amplitud semántica reconocida por la POB inglesa.
  doctrine_reference: Lexical semantics of ἱεροσυλέω; rhetorical irony in Romans 2:22
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; se mantiene la lectura inglesa aprobada y la decisión de conservar la tensión léxica de ἱεροσυλεῖς con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Tú que...» para reproducir la estructura participial sustantivada y la diatriba directa.
  - Se mantiene «Yahvé» fuera del versículo porque no aparece ningún tetragrámaton ni cita explícita del nombre divino.
  - Se conserva el tono acusatorio del presente indicativo en ambas preguntas retóricas.
  - Se evita «siervo» o vocabulario eclesiástico no pertinente; el pasaje depende de contraste moral, no de estatus religioso.
