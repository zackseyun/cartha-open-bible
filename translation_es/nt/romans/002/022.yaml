  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ídolos», «adulterio» y la nota sobre «sacrilegio» están alineados con el expediente inglés y el sentido griego. La revisión propuesta mantiene la prioridad de la acepción concreta de ἱεροσυλέω y conserva la alternativa más amplia en nota.
