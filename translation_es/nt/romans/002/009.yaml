translation:
  language: es
  text: Habrá aflicción y angustia sobre toda alma humana[a] que hace el mal, al judío primero y también al griego[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sobre toda persona' o 'sobre todo ser humano'.
    reason: lexical_alternative
  - marker: b
    text: O 'al griego', es decir, al no judío en este contraste judío/griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: θλῖψις
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - opresión
  lexicon: BDAG
  rationale: Conserva la idea de presión o calamidad severa con un sustantivo natural en español. 'Tribulación' es posible, pero suena más tradicional; 'aflicción' comunica bien el peso del término sin perder solemnidad.
- source_word: στενοχωρία
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - angustia opresiva
  - apremio
  - congoja
  lexicon: BDAG
  rationale: 'Mantiene la distinción con θλῖψις: primero la presión externa, luego la constricción interna. ''Angustia'' es una equivalencia clara y digna en español.'
- source_word: ἐπὶ πᾶσαν ψυχὴν ἀνθρώπου
  english_pob_choice: upon every human soul
  chosen_spanish: sobre toda alma humana
  alternatives_spanish:
  - sobre toda persona
  - sobre todo ser humano
  lexicon: BDAG
  rationale: Conserva la imagen de ψυχή como 'alma' y deja explícito el carácter universal con 'humana'. Aunque 'persona' sería más fluido, perdería parte de la imaginería y solemnidad del griego.
- source_word: τοῦ κατεργαζομένου
  english_pob_choice: that does
  chosen_spanish: que hace
  alternatives_spanish:
  - que practica
  - que obra
  lexicon: BDAG
  rationale: El participio substantivado se vierte con una relativa simple y natural en español. 'Hace' es directo y suficientemente amplio para el marco moral del texto.
- source_word: τὸ κακόν
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - el malvado
  lexicon: BDAG
  rationale: En español, 'el mal' expresa mejor la fuerza genérica y moral del neutro articular que un sustantivo abstracto más cargado. Evita una paráfrasis excesiva.
- source_word: Ἰουδαίου
  english_pob_choice: Jew
  chosen_spanish: del judío
  alternatives_spanish:
  - del judío
  - del pueblo judío
  lexicon: BDAG
  rationale: En esta contraposición paulina, 'judío' nombra al grupo étnico-religioso y funciona naturalmente en español con artículo sustantivado.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - ante todo
  lexicon: BDAG
  rationale: Preserva la prioridad/secuencia del original de forma breve y directa.
- source_word: Ἕλληνος
  english_pob_choice: Greek
  chosen_spanish: del griego
  alternatives_spanish:
  - del griego
  - del no judío
  lexicon: BDAG
  rationale: Sigue el wording del griego y conserva la pareja recurrente 'judío/griego' de Romanos. En contexto, 'griego' funciona como contraparte representativa del no judío.
theological_decisions:
- issue: Cómo expresar la secuencia de juicio sin añadir un verbo inexistente en el griego
  english_pob_reading: There will be affliction and distress...
  chosen_spanish_reading: Habrá aflicción y angustia...
  alternative_spanish_readings:
  - Aflicción y angustia...
  - Habrá tribulación y angustia...
  rationale: El griego presenta una frase nominal de juicio; en español, 'Habrá' hace explícita la relación verbal necesaria sin introducir contenido doctrinal adicional. Mantiene el tono de sentencia.
  doctrine_reference: Romanos 2:5-11; juicio imparcial de Dios sobre judíos y griegos
translation_notes:
  revision_awareness: La revisión más reciente indica que el inglés POB quedó sin cambios tras la última pasada; por eso esta propuesta sigue de cerca las decisiones auditadas y solo las adapta a la gramática natural del español, sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene la pareja léxica judío/griego para respetar el contraste paulino documentado.
  - Se conserva 'alma' para ψυχή por coherencia con el énfasis del inglés POB en la concreción de 'soul'.
  - La construcción 'Habrá... sobre' refleja de manera sobria la sintaxis seminominal del original, evitando una expansión interpretativa innecesaria.
