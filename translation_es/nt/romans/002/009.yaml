  rationale: Se corrige la preposición antes de 'judío' y 'griego' para expresar adecuadamente el alcance del juicio según el griego y la auditoría inglesa. El resto del borrador puede mantenerse porque preserva bien el sentido, la imaginería y la solemnidad del original.
