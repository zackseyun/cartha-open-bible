lexical_decisions:
- source_word: Εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Ahora bien, si
  - Y si
  lexicon: N/A
  rationale: Conserva la fuerza condicional de εἰ y el matiz contrastivo de δέ en el argumento de Pablo, con un español natural y formal.
- source_word: Ἰουδαῖος
  english_pob_choice: Jew
  chosen_spanish: judío
  alternatives_spanish:
  - judeano
  lexicon: N/A
  rationale: En Romanos el término funciona aquí como categoría étnico-religiosa, por lo que 'judío' comunica mejor el contraste paulino que una opción geográfica.
- source_word: ἐπονομάζῃ
  english_pob_choice: call yourself
  chosen_spanish: te llamas
  alternatives_spanish:
  - eres llamado
  - llevas el nombre de
  lexicon: BDAG
  rationale: 'El medio admite un sentido reflexivo: asumir o portar la designación uno mismo. ''Te llamas'' es idiomático en español y mantiene el tono retórico.'
- source_word: ἐπαναπαύῃ
  english_pob_choice: rely on
  chosen_spanish: te apoyas en
  alternatives_spanish:
  - descansas en
  - confías en
  lexicon: BDAG
  rationale: Expresa la idea de apoyo o confianza indebida mejor que un descanso físico. 'Te apoyas en' conserva la crítica de Pablo y suena natural en español.
- source_word: νόμῳ
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - ley
  lexicon: N/A
  rationale: El contexto apunta a la ley mosaica como categoría conocida; en español, el artículo definido es la forma natural y clara.
- source_word: καυχᾶσαι
  english_pob_choice: boast
  chosen_spanish: te jactas
  alternatives_spanish:
  - te glorías
  - presumes
  lexicon: BDAG
  rationale: '''Jactarse'' preserva el matiz moralmente cargado del verbo y evita suavizar el reproche paulino.'
- source_word: ἐν θεῷ
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - acerca de Dios
  lexicon: N/A
  rationale: La preposición ἐν se mantiene de manera directa; 'en Dios' es natural en español y refleja la construcción paulina.
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente del expediente: no se registran revisiones aplicadas y el consenso de control cruzado es de alta concordancia.'
  spanish_consistency_notes:
