translation:
  language: es
  text: Pero si tú te llamas judío[b] y te apoyas en la ley[a] y te jactas en Dios,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «descansas en la ley».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «llevas el nombre de judío» o «eres llamado judío».'
