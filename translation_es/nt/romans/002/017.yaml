  - '''Ley'' se mantiene sin ampliar a ''ley de Moisés'' porque el contexto inmediato basta y el expediente inglés también la deja implícita.'
  - Se prefirió 'te jactas' para mantener la carga paulina de καυχάομαι, siguiendo la decisión auditada de 'boast'.
