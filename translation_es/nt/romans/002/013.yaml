translation:
  language: es
  text: Porque no son justos delante de Dios los que oyen la ley, sino los que cumplen la ley serán justificados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán declarados justos»; alternativamente, «serán vindicados».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκροαταὶ
  english_pob_choice: hearers
  chosen_spanish: los que oyen
  alternatives_spanish:
  - oyentes
  - los que escuchan
  lexicon: BDAG
  rationale: En español, «los que oyen» conserva con naturalidad el contraste con «los que la cumplen» y refleja el valor sustantivado de ἀκροαταί mejor que un sustantivo más rígido como «oyentes».
- source_word: νόμου
  english_pob_choice: of the law
  chosen_spanish: la ley
  alternatives_spanish:
  - de la ley
  - Ley
  lexicon: BDAG
  rationale: Aunque el griego carece de artículo, en este contexto paulino el referente es claramente la ley; en español, «la ley» es la forma más natural y transparente.
- source_word: δίκαιοι
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - justificados
  lexicon: BDAG
  rationale: «Justos» mantiene el campo semántico de δίκαιοι y evita introducir una formulación más interpretativa. En español suena más directo que «rectos» y más preciso aquí que «justificados».
- source_word: παρὰ τῷ θεῷ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en la presencia de Dios
  lexicon: BDAG
  rationale: «Delante de Dios» expresa bien la idea de evaluación o juicio divino y es idiomático en español bíblico sin depender de una calca excesiva.
- source_word: ποιηταὶ
  english_pob_choice: doers
  chosen_spanish: los que la cumplen
  alternatives_spanish:
  - hacedores
  - los que hacen la ley
  lexicon: BDAG
  rationale: «Los que la cumplen» conserva el contraste con «los que oyen» y comunica el sentido práctico de ποιηταί en una formulación natural para el lector español.
- source_word: δικαιωθήσονται
  english_pob_choice: will be justified
  chosen_spanish: serán justificados
  alternatives_spanish:
  - serán declarados justos
  - serán vindicados
  lexicon: BDAG
  rationale: «Serán justificados» preserva el término teológico central de δικαιόω y sigue de cerca la opción del POB inglés. Las alternativas explicitan posibles matices sin borrar la tensión lexical.
theological_decisions:
- issue: Renderizar δικαιωθήσονται sin reducirlo a una paráfrasis explicativa
  english_pob_reading: will be justified; alternatively, will be declared righteous / will be vindicated
  chosen_spanish_reading: serán justificados
  alternative_spanish_readings:
  - serán declarados justos
  - serán vindicados
  rationale: En Romanos, δικαιόω tiene peso teológico y forense. «Serán justificados» conserva esa continuidad doctrinal; las otras opciones se mantienen como alternativas legítimas que podrían sugerir el matiz declarativo o vindicativo.
  doctrine_reference: justificación forense en Romanos; δικαιόω
- issue: Mantener la antítesis retórica entre oír y hacer sin suavizarla
  english_pob_reading: hearers ... but the doers
  chosen_spanish_reading: los que oyen ... sino los que la cumplen
  alternative_spanish_readings:
  - oyentes ... sino hacedores
  - los que escuchan ... sino los que hacen la ley
  rationale: La forma elegida conserva la oposición directa del texto y su fuerza exhortativa. «Cumplir» comunica acción obediente de modo claro en español y evita una traducción demasiado técnica o forzada.
  doctrine_reference: obediencia y responsabilidad humana ante la ley
translation_notes:
  revision_awareness: El pasaje presenta una única tensión lexical importante en δικαιωθήσονται. La revisión inglesa reciente no cambió el contenido, y se mantuvo la opción principal «serán justificados» con una nota de alternativas para transparencia. No se aplicaron cambios textuales respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «ley» como traducción de νόμος en sentido paulino.
  - Se evitó «Cristo» u otra terminología no presente en el versículo.
  - La secuencia «oyen ... cumplen» preserva el paralelismo con «hearers ... doers».
  - El marcador de nota [a] se coloca solo en el punto donde aparece la alternativa lexical relevante.
