translation:
  language: es
  text: Porque cuando los gentiles[a], que no tienen la ley, hacen por naturaleza[b] las cosas de la ley[c], estos, aunque no tienen la ley, son ley para sí mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «naciones».
    reason: lexical_alternative
  - marker: b
    text: O «instintivamente» para «por naturaleza».
    reason: lexical_alternative
  - marker: c
    text: O «hacen lo que la ley requiere».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνη
  english_pob_choice: Gentiles
  chosen_spanish: gentiles
  alternatives_spanish:
  - naciones
  lexicon: BDAG
  rationale: En Pablo, el contraste con quienes poseen la ley apunta al sentido étnico-religioso de ἔθνη. «Gentiles» comunica ese valor mejor que «naciones», que en español suena más amplio y menos preciso en este contexto.
- source_word: νόμον / νόμου / νόμος
  english_pob_choice: law / the law
  chosen_spanish: ley / la ley
  alternatives_spanish:
  - ley
  - Ley
  lexicon: BDAG
  rationale: «Ley» es la equivalencia natural en español para νόμος en este pasaje. Conserva la referencia a la ley mosaica en el contexto inmediato y, en la cláusula final, permite mantener el juego retórico con «son ley para sí mismos».
- source_word: φύσει
  english_pob_choice: by nature
  chosen_spanish: por naturaleza
  alternatives_spanish:
  - instintivamente
  - naturalmente
  lexicon: BDAG
  rationale: «Por naturaleza» reproduce de manera transparente la expresión griega y preserva la amplitud interpretativa del término, sin reducirlo prematuramente a una sola explicación psicológica o moral.
- source_word: τὰ τοῦ νόμου ποιῶσιν
  english_pob_choice: do the things of the law
  chosen_spanish: hacen lo que es de la ley
  alternatives_spanish:
  - hacen lo que la ley requiere
  - practican las exigencias de la ley
  lexicon: BDAG
  rationale: La versión mantiene visible la estructura griega τὰ τοῦ νόμου y evita cerrar el sentido con una paráfrasis más interpretativa. «Lo que es de la ley» preserva el alcance conceptual y deja abierta la relación exacta con los requerimientos de la ley.
- source_word: ἑαυτοῖς εἰσιν νόμος
  english_pob_choice: are a law to themselves
  chosen_spanish: son ley para sí mismos
  alternatives_spanish:
  - son una ley para sí mismos
  - son una ley para ellos mismos
  lexicon: BDAG
  rationale: «Son ley para sí mismos» mantiene la formulación proverbial y el valor relacional del dativo, sin cargar de más la idea de autonomía absoluta. Conserva también el juego de palabras con νόμος.
theological_decisions:
- issue: Sentido de φύσει en relación con conciencia o conducta moral
  english_pob_reading: Retain the broader phrase “by nature” in the main text without explaining whether Paul means innate moral awareness, customary practice, or natural condition.
  chosen_spanish_reading: Conservar «por naturaleza» sin especificar si Pablo se refiere a conciencia moral innata, hábito, o condición natural.
  alternative_spanish_readings:
  - instintivamente
  - por su sentido natural
  rationale: El griego no obliga a resolver aquí la tensión interpretativa. La redacción española mantiene la apertura del argumento paulino y evita una explicación que vaya más allá de lo que el texto afirma.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La redacción sigue el estado más reciente del audit trail, sin revisiones aplicadas ni cambios posteriores; se mantiene el acuerdo alto del control cruzado.
  spanish_consistency_notes:
  - Se usa «gentiles» en minúscula para el valor étnico-religioso del término en el contexto paulino.
  - Se emplea «ley» de manera consistente para νόμος, incluyendo el cierre proverbial «son ley para sí mismos».
  - Se conserva la ambigüedad de φύσει mediante «por naturaleza», como en el POB inglés.
  - La puntuación respeta la estructura de una sola oración con la cláusula causal inicial y la proposición principal final.
