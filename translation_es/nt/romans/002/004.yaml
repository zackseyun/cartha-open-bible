translation:
  language: es
  text: ¿O menosprecias las riquezas de su bondad[a], indulgencia y paciencia, sin saber que la bondad de Dios te guía al arrepentimiento?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «benevolencia» para ambas ocurrencias de «bondad».
    reason: lexical_alternative
lexical_decisions:
- source_word: πλούτου
  english_pob_choice: riches
  chosen_spanish: riquezas
  alternatives_spanish:
  - abundancia
  - tesoros
  lexicon: BDAG
  rationale: «Riquezas» conserva la metáfora de abundancia valiosa y reproduce bien la construcción genitiva del griego, con un registro natural en español bíblico contemporáneo.
- source_word: χρηστότητος / τὸ χρηστὸν
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - amabilidad
  - benevolencia
  lexicon: BDAG
  rationale: Aquí «bondad» comunica el valor moral y benévolo de Dios de forma más idiomática en español que «amabilidad», y evita una repetición excesiva de «bondad» con matiz débil; el contexto de indulgencia hacia el pecador sostiene este campo semántico.
- source_word: ἀνοχῆς
  english_pob_choice: forbearance
  chosen_spanish: tolerancia
  alternatives_spanish:
  - aguante
  - contención
  lexicon: BDAG
  rationale: «Tolerancia» expresa la retención del juicio con claridad en español actual. Aunque puede sonar moderno, aquí no implica relativismo porque está modulado por el contexto de la paciencia divina.
- source_word: μακροθυμίας
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - longsufrimiento
  lexicon: BDAG
  rationale: «Paciencia» es la equivalencia más clara y digna en español. «Longanimidad» sería más técnica y «longsufrimiento» menos natural para la lectura pública.
- source_word: καταφρονεῖς
  english_pob_choice: despise
  chosen_spanish: menosprecias
  alternatives_spanish:
  - desprecias
  - miras con desprecio
  lexicon: BDAG
  rationale: «Menosprecias» conserva el tono de desdén y resulta muy idiomático en español para una reprensión directa, sin perder la fuerza del verbo.
- source_word: ἀγνοῶν
  english_pob_choice: not knowing
  chosen_spanish: sin saber
  alternatives_spanish:
  - ignorando
  - no sabiendo
  lexicon: BDAG
  rationale: «Sin saber» refleja el participio circunstancial de manera fluida y no fuerza una lectura de culpable ignorancia que el griego no exige explícitamente.
- source_word: εἰς μετάνοιάν
  english_pob_choice: to repentance
  chosen_spanish: al arrepentimiento
  alternatives_spanish:
  - hacia el arrepentimiento
  - a un cambio de mente
  lexicon: BDAG
  rationale: «Arrepentimiento» es la forma más natural y teológicamente reconocible en español para μετάνοια; mantiene el giro direccional de εἰς con una preposición contraída («al»).
- source_word: ἄγει
  english_pob_choice: is leading
  chosen_spanish: guía
  alternatives_spanish:
  - conduce
  - está llevando
  lexicon: BDAG
  rationale: «Guía» condensa bien el presente durativo y suena natural en español. Aunque «está llevando» reflejaría más explícitamente el aspecto progresivo, «guía» mantiene la imagen sin pesadez.
theological_decisions:
- issue: Cómo expresar χρηστότης / χρηστόν respecto al carácter de Dios sin perder el matiz relacional y moral.
  english_pob_reading: Rendered both occurrences as "kindness."
  chosen_spanish_reading: La primera ocurrencia se expresa como «bondad» y la segunda como «bondad de Dios», manteniendo el campo semántico de la benevolencia divina.
  alternative_spanish_readings:
  - «amabilidad» en ambas ocurrencias
  - «bondad» en ambas ocurrencias
  rationale: En español, «bondad» comunica mejor que «amabilidad» la benevolencia moral de Dios hacia el pecador. Se conserva la repetición conceptual del griego sin forzar una equivalencia mecánica; la variación mínima responde a la fluidez sintáctica del español.
  doctrine_reference: Translation philosophy §§5–6
- issue: 'Cómo verter μετάνοια: como cambio cognitivo o como respuesta moral/espiritual.'
  english_pob_reading: Changed from "a change of mind" to "repentance" to reflect μετάνοια more accurately and naturally.
  chosen_spanish_reading: «Arrepentimiento»
  alternative_spanish_readings:
  - «cambio de mente»
  - «cambio de pensamiento»
  rationale: Aunque μετάνοια puede incluir un componente de cambio de mente, aquí la dirección del texto y el contexto paulino apuntan a una respuesta de vuelta a Dios. «Arrepentimiento» es el equivalente español más fiel y natural para la lectura pública.
  doctrine_reference: Translation philosophy §§5–6
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «a change of mind» por «repentance» para μετάνοια; la versión española sigue esa decisión y evita una paráfrasis cognitiva más débil. También se ha mantenido la fuerza exhortativa de καταφρονεῖς y la secuencia de atributos divinos con un registro natural para lectura pública.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y no se introduce ninguna convención de máscara tipo «SEÑOR».
  - Se conserva la distinción entre bondad, tolerancia y paciencia para reflejar los tres sustantivos griegos sin colapsarlos.
  - El tono es de reprensión directa, acorde con la pregunta retórica inicial.
  - La terminología de μετάνοια se unifica como «arrepentimiento» para coherencia con el audit trail inglés.
