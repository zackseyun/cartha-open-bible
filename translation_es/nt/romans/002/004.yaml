revisions:
- from: ¿O menosprecias las riquezas de su bondad[a], tolerancia y paciencia, sin saber que la bondad de Dios te guía al arrepentimiento?
  to: ¿O menosprecias las riquezas de su bondad[a], indulgencia y paciencia, sin saber que la bondad de Dios te guía al arrepentimiento?
  rationale: Se reemplaza «tolerancia» por «indulgencia» para reflejar mejor ἀνοχή como contención del juicio, en línea con la rationale auditada para «forbearance». Se corrige la nota al pie para que preserve una alternativa léxica real para χρηστότης/χρηστόν sin redundancia ni formulación confusa. Se mantiene «bondad» en ambas ocurrencias porque en español es natural, digna y suficientemente relacional en este contexto.
