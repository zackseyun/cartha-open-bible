revisions:
- from: Pero por causa de tu dureza y de tu corazón[a] impenitente, te estás atesorando ira para ti mismo en el día de la ira y de la revelación del juicio justo de Dios.
  to: Pero por causa de tu dureza y de tu corazón impenitente[a], estás acumulando ira para ti mismo en el día de la ira y de la revelación del juicio justo de Dios.
  rationale: Se reemplaza 'te estás atesorando' por 'estás acumulando' para expresar θησαυρίζεις de manera natural y adecuada en un contexto negativo, preservando el sentido de acumulación para juicio. También se reubica la nota para no fracturar el sintagma 'corazón impenitente'. No se requiere adjudicación adicional porque el ajuste es estilístico y claramente apoyado por la evidencia léxica ya documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:09:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: conserva la causalidad de κατὰ δὲ, la metáfora de σκληρότης como ''dureza'', el corazón ''impenitente/no arrepentido'', la acumulación de ira para uno mismo, y la estructura nominal ''en el día de la ira y de la revelación del juicio justo de Dios''. Sin embargo, ''te estás atesorando ira'' suena poco natural y semánticamente chocante en español en un contexto negativo; el inglés auditado justamente evitó ''treasuring up'' por esa razón. También la colocación ''tu corazón[a] impenitente'' rompe innecesariamente la unidad de ἀμετανόητον καρδίαν.'
  spanish_quality_summary: La redacción es en general clara y digna, pero requiere un ajuste de naturalidad importante. 'Te estás atesorando ira' no es español bíblico natural ni claro para lectores amplios; 'estás acumulando ira para ti mismo' comunica mejor θησαυρίζεις + σεαυτῷ sin perder fuerza. Además, es preferible mantener unido 'corazón impenitente' con la nota al sintagma completo o al adjetivo, no insertarla entre 'corazón' e 'impenitente'.
  glossary_alignment: 'No hay conflictos con los términos doctrinales del proyecto: θεοῦ -> ''Dios'', ὀργή -> ''ira'' es aceptable en contexto, y δικαιοκρισία -> ''juicio justo'' sigue la decisión auditada. La nota léxica para ''impenitente'' como alternativa ''no arrepentido'' es válida, aunque debe anclarse mejor. La principal desviación no es de glosario sino de legibilidad/precisión estilística en θησαυρίζεις.'
  issues:
  - severity: medium
    issue: '''te estás atesorando ira'' es poco natural y semánticamente inadecuado en español'
    rationale: θησαυρίζεις conserva la imagen de acumular/guardar, pero en español 'atesorar' suele tener connotación positiva. En este contexto de ira divina, 'acumular' preserva mejor la fuerza negativa y coincide con la rationale del inglés POB.
  - severity: low
    issue: La nota [a] interrumpe el sintagma 'corazón impenitente'
    rationale: El griego presenta ἀμετανόητον καρδίαν como una unidad. En español resulta más limpio 'corazón impenitente[a]' o 'corazón[a] no arrepentido', pero no separar sustantivo y adjetivo visualmente.
  revised_spanish_text: Pero por causa de tu dureza y de tu corazón impenitente[a], estás acumulando ira para ti mismo en el día de la ira y de la revelación del juicio justo de Dios.
  revised_footnotes:
  - marker: a
    text: 'O: "no arrepentido".'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'te estás atesorando' por 'estás acumulando' para expresar θησαυρίζεις de manera natural y adecuada en un contexto negativo, preservando el sentido de acumulación para juicio. También se reubica la nota para no fracturar el sintagma 'corazón impenitente'. No se requiere adjudicación adicional porque el ajuste es estilístico y claramente apoyado por la evidencia léxica ya documentada.
