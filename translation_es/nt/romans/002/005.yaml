translation:
  language: es
  text: Pero por causa de tu dureza y de tu corazón impenitente[a], estás acumulando ira para ti mismo en el día de la ira y de la revelación del juicio justo de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "no arrepentido".'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ δὲ
  english_pob_choice: But because of
  chosen_spanish: Pero por causa de
  alternatives_spanish:
  - Pero a causa de
  - Pero debido a
  lexicon: BDAG
  rationale: κατά con acusativo aquí expresa la base o causa correspondiente a la condición del destinatario. En español, 'por causa de' comunica con naturalidad ese valor causal, y δέ se conserva con un adversativo leve mediante 'Pero'.
- source_word: σκληρότητά
  english_pob_choice: hardness
  chosen_spanish: dureza
  alternatives_spanish:
  - endurecimiento
  - terquedad
  lexicon: BDAG
  rationale: '''Dureza'' preserva la imagen moral de insensibilidad y es idiomática en español bíblico sin añadir paráfrasis.'
- source_word: ἀμετανόητον καρδίαν
  english_pob_choice: unrepentant heart
  chosen_spanish: corazón impenitente
  alternatives_spanish:
  - corazón no arrepentido
  - corazón sin arrepentimiento
  lexicon: BDAG
  rationale: Se mantiene el lenguaje del corazón como sede moral, y 'impenitente' refleja bien el prefijo negador de ἀμετανόητον con un registro digno y claro en español.
- source_word: θησαυρίζεις
  english_pob_choice: are storing up
  chosen_spanish: te estás atesorando
  alternatives_spanish:
  - estás acumulando
  - estás almacenando
  lexicon: BDAG
  rationale: El verbo conserva la metáfora de reunir/guardar tesoro; en este contexto negativo, el reflexivo 'te estás atesorando' comunica acumulación personal de forma cercana al griego.
- source_word: σεαυτῷ
  english_pob_choice: for yourself
  chosen_spanish: para ti mismo
  alternatives_spanish:
  - para ti
  - en tu propio favor
  lexicon: BDAG
  rationale: El dativo reflexivo expresa consecuencia personal directa; 'para ti mismo' es natural en español y mantiene esa orientación.
- source_word: ὀργὴν
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - castigo
  lexicon: BDAG
  rationale: Aunque 'ira' es menos marcadamente judicial que 'wrath', permite una lectura sobria y directa en español. Se evita 'castigo' porque el sustantivo griego es ὀργή, no una explicación del resultado.
- source_word: ἐν ἡμέρᾳ ὀργῆς καὶ ἀποκαλύψεως
  english_pob_choice: in the day of wrath and revelation
  chosen_spanish: en el día de la ira y de la revelación
  alternatives_spanish:
  - en el día de la ira y de la manifestación
  - el día de la ira y de la revelación
  lexicon: BDAG
  rationale: Se conserva la estructura nominal coordinada del griego. 'Revelación' traduce ἀποκάλυψις de manera transparente y mantiene el paralelismo con 'día de la ira'.
- source_word: δικαιοκρισίας
  english_pob_choice: righteous judgment
  chosen_spanish: juicio justo
  alternatives_spanish:
  - juicio recto
  - juicio de justicia
  lexicon: BDAG
  rationale: El compuesto subraya la cualidad justa del juicio divino. 'Juicio justo' es claro, fiel y mantiene la tensión lexical entre rectitud y juicio sin resolverla demasiado en una sola noción.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - de Dios mismo
  lexicon: BDAG
  rationale: Se mantiene la referencia explícita a Dios como sujeto/genitivo dependiente del juicio, sin reexpresión innecesaria.
theological_decisions:
- issue: Si traducir δικαιοκρισίας como 'juicio justo' o como 'justicia/rectitud de Dios'
  english_pob_reading: '''the revelation of the righteous judgment of God'' with a footnote alternative ''God’s just judgment.'''
  chosen_spanish_reading: '''la revelación del juicio justo de Dios'''
  alternative_spanish_readings:
  - '''la revelación del juicio de justicia de Dios'''
  - '''la revelación de la justa sentencia de Dios'''
  rationale: El griego presenta un compuesto que une la idea de justicia con la de juicio. 'Juicio justo' conserva ambas dimensiones sin convertir la frase en una explicación doctrinal más amplia. La alternativa 'justicia de Dios' podría desplazar el foco del acto judicial al atributo divino.
  doctrine_reference: Mantener la tensión lexical entre juicio y justicia; no resolverla reductivamente.
- issue: Si hacer explícita la relación temporal como cláusula interpretativa o conservar la estructura nominal
  english_pob_reading: 'Preserve the nominal structure: ''in the day of wrath and revelation of the righteous judgment of God.'''
  chosen_spanish_reading: Conservar 'en el día de la ira y de la revelación del juicio justo de Dios'
  alternative_spanish_readings:
  - '''cuando se revele el juicio justo de Dios'''
  - '''en el día en que Dios revele su juicio justo'''
  rationale: La construcción griega coordina sustantivos y no introduce un verbo finito. La versión española mantiene esa forma nominal, más cercana al texto y suficientemente clara.
  doctrine_reference: Preservar la estructura del texto fuente y la tensión teológica.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión del inglés POB, que prefirió 'in the day' para reflejar ἐν y reordenó la frase final para acercarse al griego. En español se preserva ese movimiento, manteniendo la secuencia nominal 'de la ira y de la revelación del juicio justo de Dios' sin introducir una cláusula interpretativa.
  spanish_consistency_notes:
  - Se usa 'Dios' de forma explícita, conforme al estándar del proyecto para θεός.
  - Se prefiere 'ira' para ὀργή en este contexto judicial-paulino, manteniendo la gravedad sin cambiar el término a una explicación.
  - Se conserva 'impenitente' como equivalente sobrio de ἀμετανόητον; la nota ofrece la alternativa más llana 'no arrepentido'.
  - Se mantiene la metáfora de acumulación con 'te estás atesorando', aunque la expresión es menos común, porque refleja el matiz de θησαυρίζεις.
  - No se introduce 'Cristo' ni otras terminologías no presentes en el versículo.
