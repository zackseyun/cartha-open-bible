translation:
  language: es
  text: y conoces la voluntad[a] y disciernes las cosas que difieren[b], siendo instruido de la ley,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su voluntad'; el griego no expresa explícitamente 'su', aunque Dios es el referente implícito en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'apruebas lo que es excelente'; más literalmente, 'pones a prueba las cosas que difieren'.
    reason: alternative_reading
lexical_decisions:
- source_word: γινώσκεις
  english_pob_choice: know
  chosen_spanish: conoces
  alternatives_spanish:
  - sabes
  - reconoces
  lexicon: BDAG
  rationale: El verbo está en presente indicativo y expresa conocimiento activo y directo. En español, 'conoces' mantiene esa fuerza de manera natural y pública, sin volverlo demasiado interpretativo.
- source_word: τὸ θέλημα
  english_pob_choice: his will
  chosen_spanish: la voluntad
  alternatives_spanish:
  - su voluntad
  - la voluntad de Dios
  lexicon: BDAG
  rationale: El griego no expresa un posesivo explícito. En este contexto, la referencia implícita es a Dios; en español conviene dejar 'la voluntad' en el texto y reservar la explicitación para una nota, para no añadir un posesivo que el griego no dice.
- source_word: δοκιμάζεις
  english_pob_choice: approve
  chosen_spanish: disciernes
  alternatives_spanish:
  - apruebas
  - pones a prueba
  lexicon: BDAG
  rationale: Aquí el verbo apunta al juicio evaluativo sobre lo que corresponde, no solo a un examen neutral. 'Disciernes' conserva la idea de evaluación atenta sin estrechar el sentido a una mera aprobación formal.
- source_word: τὰ διαφέροντα
  english_pob_choice: the things that differ
  chosen_spanish: las cosas que difieren
  alternatives_spanish:
  - lo diferente
  - las cosas excelentes
  lexicon: BDAG
  rationale: La revisión inglesa prefirió una traducción más directa de la estructura griega. En español, 'las cosas que difieren' refleja esa relación sin interpretar prematuramente si el énfasis es diferencia, contraste o valor superior.
- source_word: κατηχούμενος
  english_pob_choice: being instructed
  chosen_spanish: siendo instruido
  alternatives_spanish:
  - porque eres instruido
  - siendo enseñado
  lexicon: BDAG
  rationale: El participio pasivo requiere una construcción participial en español. 'Siendo instruido' sigue de cerca la forma griega y mantiene el matiz pedagógico de κατηχέω.
- source_word: ἐκ τοῦ νόμου
  english_pob_choice: from the law
  chosen_spanish: por la ley
  alternatives_spanish:
  - de la ley
  - a partir de la ley
  lexicon: BDAG
  rationale: Aunque ἐκ puede traducirse literalmente como 'de' o 'desde', en español 'por la ley' comunica con naturalidad la fuente o mediación del instruirse. Se conserva la idea de origen sin sonar forzado.
theological_decisions:
- issue: Referente implícito de 'la voluntad'
  english_pob_reading: his will; the Greek does not explicitly state 'his,' though God is the implied referent in context.
  chosen_spanish_reading: la voluntad; Dios queda como referente implícito por el contexto inmediato.
  alternative_spanish_readings:
  - su voluntad
  - la voluntad de Dios
  rationale: El griego carece de posesivo explícito. En español, explicitarlo en el texto principal sería una interpretación útil, pero no obligatoria; por eso se mantiene la forma abierta y se aclara el referente implícito en nota.
  doctrine_reference: Contexto literario de Romanos 2:17-18; referencia implícita a Dios en el discurso paulino.
- issue: Sentido de δοκιμάζεις y τὰ διαφέροντα
  english_pob_reading: approve the things that differ; more literally, 'test the things that differ.'
  chosen_spanish_reading: disciernes las cosas que difieren.
  alternative_spanish_readings:
  - apruebas las cosas que difieren
  - disciernes lo que es superior
  - pones a prueba las cosas que difieren
  rationale: La frase griega puede entenderse de manera más literal como 'las cosas que difieren' o de forma más interpretativa como 'lo que es superior'. Para no borrar esa tensión, el texto conserva una formulación cercana al griego y la nota recoge la alternativa interpretativa.
  doctrine_reference: Sabiduría/discernimiento moral en el contexto de la ley y la instrucción.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión del audit trail que volvió más directa la relación con el griego: conserva el participio pasivo con ''siendo instruido'' y evita estrechar τὰ διαφέροντα a ''lo que es superior''. También respeta que el posesivo de ''la voluntad'' no está explícito en el original.'
  spanish_consistency_notes:
  - Se usa 'Dios' como referente implícito solo en la nota, no en el cuerpo del verso, para no añadir contenido ausente en el griego.
  - Se evita 'SEÑOR' como sustituto automático del nombre divino, porque aquí no aparece el tetragrámaton ni una cita directa que lo exija.
  - '''Disciernes'' se eligió por su naturalidad en español y su capacidad de abarcar evaluación y reconocimiento sin borrar la ambigüedad del griego.'
  - '''Por la ley'' mantiene la idea de mediación o fuente de instrucción en español; se reconoce en nota que la relación griega es más literalmente ''desde/de la ley''.'
