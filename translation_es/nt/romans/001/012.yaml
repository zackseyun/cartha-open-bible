  to: esto es[a], que yo sea animado juntamente con ustedes, por medio de la fe compartida entre unos y otros[b], tanto la de ustedes como la mía.
  rationale: Se ajustó la redacción para que el español preserve con más claridad la mutualidad de συμπαρακληθῆναι y de ἐν ἀλλήλοις πίστεως sin crear la ambigüedad de que la fe esté puesta unos en otros. La nueva formulación mantiene la perspectiva singular de Pablo, la reciprocidad explícita y una lectura más natural en español eclesial contemporáneo.
